{"title": "Robust Graph Representation Learning via Adaptive Spectral Contrast", "author": "Zhuolong Li and Boxue Yang and Haopeng Chen", "abstract": "Spectral graph contrastive learning has emerged as a unified paradigm for handling both homophilic and heterophilic graphs by leveraging high-frequency components. However, we identify a fundamental spectral dilemma: while high-frequency signals are indispensable for encoding heterophily, our theoretical analysis proves they exhibit significantly higher variance under spectrally concentrated perturbations. We derive a regret lower bound showing that existing global (node-agnostic) spectral fusion is provably sub-optimal: on mixed graphs with separated node-wise frequency preferences, any global fusion strategy incurs non-vanishing regret relative to a node-wise oracle. To escape this bound, we propose ASPECT, a framework that resolves this dilemma through a reliability-aware spectral gating mechanism. Formulated as a minimax game, ASPECT employs a node-wise gate that dynamically re-weights frequency channels based on their stability against a purpose-built adversary, which explicitly targets spectral energy distributions via a Rayleigh quotient penalty. This design forces the encoder to learn representations that are both structurally discriminative and spectrally robust. Empirical results show that ASPECT achieves new state-of-the-art performance on 8 out of 9 benchmarks, effectively decoupling meaningful structural heterophily from incidental noise.", "link": "http://arxiv.org/abs/2604.01878v1", "date": "2026-04-02", "relevancy": 2.3995, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.491}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4901}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4586}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20Graph%20Representation%20Learning%20via%20Adaptive%20Spectral%20Contrast&body=Title%3A%20Robust%20Graph%20Representation%20Learning%20via%20Adaptive%20Spectral%20Contrast%0AAuthor%3A%20Zhuolong%20Li%20and%20Boxue%20Yang%20and%20Haopeng%20Chen%0AAbstract%3A%20Spectral%20graph%20contrastive%20learning%20has%20emerged%20as%20a%20unified%20paradigm%20for%20handling%20both%20homophilic%20and%20heterophilic%20graphs%20by%20leveraging%20high-frequency%20components.%20However%2C%20we%20identify%20a%20fundamental%20spectral%20dilemma%3A%20while%20high-frequency%20signals%20are%20indispensable%20for%20encoding%20heterophily%2C%20our%20theoretical%20analysis%20proves%20they%20exhibit%20significantly%20higher%20variance%20under%20spectrally%20concentrated%20perturbations.%20We%20derive%20a%20regret%20lower%20bound%20showing%20that%20existing%20global%20%28node-agnostic%29%20spectral%20fusion%20is%20provably%20sub-optimal%3A%20on%20mixed%20graphs%20with%20separated%20node-wise%20frequency%20preferences%2C%20any%20global%20fusion%20strategy%20incurs%20non-vanishing%20regret%20relative%20to%20a%20node-wise%20oracle.%20To%20escape%20this%20bound%2C%20we%20propose%20ASPECT%2C%20a%20framework%20that%20resolves%20this%20dilemma%20through%20a%20reliability-aware%20spectral%20gating%20mechanism.%20Formulated%20as%20a%20minimax%20game%2C%20ASPECT%20employs%20a%20node-wise%20gate%20that%20dynamically%20re-weights%20frequency%20channels%20based%20on%20their%20stability%20against%20a%20purpose-built%20adversary%2C%20which%20explicitly%20targets%20spectral%20energy%20distributions%20via%20a%20Rayleigh%20quotient%20penalty.%20This%20design%20forces%20the%20encoder%20to%20learn%20representations%20that%20are%20both%20structurally%20discriminative%20and%20spectrally%20robust.%20Empirical%20results%20show%20that%20ASPECT%20achieves%20new%20state-of-the-art%20performance%20on%208%20out%20of%209%20benchmarks%2C%20effectively%20decoupling%20meaningful%20structural%20heterophily%20from%20incidental%20noise.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01878v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobust%2520Graph%2520Representation%2520Learning%2520via%2520Adaptive%2520Spectral%2520Contrast%26entry.906535625%3DZhuolong%2520Li%2520and%2520Boxue%2520Yang%2520and%2520Haopeng%2520Chen%26entry.1292438233%3DSpectral%2520graph%2520contrastive%2520learning%2520has%2520emerged%2520as%2520a%2520unified%2520paradigm%2520for%2520handling%2520both%2520homophilic%2520and%2520heterophilic%2520graphs%2520by%2520leveraging%2520high-frequency%2520components.%2520However%252C%2520we%2520identify%2520a%2520fundamental%2520spectral%2520dilemma%253A%2520while%2520high-frequency%2520signals%2520are%2520indispensable%2520for%2520encoding%2520heterophily%252C%2520our%2520theoretical%2520analysis%2520proves%2520they%2520exhibit%2520significantly%2520higher%2520variance%2520under%2520spectrally%2520concentrated%2520perturbations.%2520We%2520derive%2520a%2520regret%2520lower%2520bound%2520showing%2520that%2520existing%2520global%2520%2528node-agnostic%2529%2520spectral%2520fusion%2520is%2520provably%2520sub-optimal%253A%2520on%2520mixed%2520graphs%2520with%2520separated%2520node-wise%2520frequency%2520preferences%252C%2520any%2520global%2520fusion%2520strategy%2520incurs%2520non-vanishing%2520regret%2520relative%2520to%2520a%2520node-wise%2520oracle.%2520To%2520escape%2520this%2520bound%252C%2520we%2520propose%2520ASPECT%252C%2520a%2520framework%2520that%2520resolves%2520this%2520dilemma%2520through%2520a%2520reliability-aware%2520spectral%2520gating%2520mechanism.%2520Formulated%2520as%2520a%2520minimax%2520game%252C%2520ASPECT%2520employs%2520a%2520node-wise%2520gate%2520that%2520dynamically%2520re-weights%2520frequency%2520channels%2520based%2520on% t%20resolves%20this%20dilemma%20through%20a%20reliability-aware%20spectral%20gating%20mechanism.%20Formulated%20as%20a%20minimax%20game%2C%20ASPECT%20employs%20a%20node-wise%20gate%20that%20dynamically%20re-weights%20frequency%20channels%20based%20on%20their%20stability%20against%20a%20purpose-built%20adversary%2C%20which%20explicitly%20targets%20spectral%20energy%20distributions%20via%20a%20Rayleigh%20quotient%20penalty.%20This%20design%20forces%20the%20encoder%20to%20learn%20representations%20that%20are%20both%20structurally%20discriminative%20and%20spectrally%20robust.%20Empirical%20results%20show%20that%20ASPECT%20achieves%20new%20state-of-the-art%20performance%20on%208%20out%20of%209%20benchmarks%2C%20effectively%20decoupling%20meaningful%20structural%20heterophily%20from%20incidental%20noise.&entry.1838667208=http%3A//arxiv.org/abs/2604.01878v1&entry.124074799=Read"},
{"title": "MaskAdapt: Learning Flexible Motion Adaptation via Mask-Invariant Prior for Physics-Based Characters", "author": "Soomin Park and Eunseong Lee and Kwang Bin Lee and Sung-Hee Lee", "abstract": "We present MaskAdapt, a framework for flexible motion adaptation in physics-based humanoid control. The framework follows a two-stage residual learning paradigm. In the first stage, we train a mask-invariant base policy using stochastic body-part masking and a regularization term that enforces consistent action distributions across masking conditions. This yields a robust motion prior that remains stable under missing observations, anticipating later adaptation in those regions. In the second stage, a residual policy is trained atop the frozen base controller to modify only the targeted body parts while preserving the original behaviors elsewhere. We demonstrate the versatility of this design through two applications: (i) motion composition, where varying masks enable multi-part adaptation within a single sequence, and (ii) text-driven partial goal tracking, where designated body parts follow kinematic targets provided by a pre-trained text-conditioned autoregressive motion generator. Through experiments, MaskAdapt demonstrates strong robustness and adaptability, producing diverse behaviors under masked observations and delivering superior targeted motion adaptation compared to prior work.", "link": "http://arxiv.org/abs/2603.29272v2", "date": "2026-04-02", "relevancy": 2.3832, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6324}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5743}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MaskAdapt%3A%20Learning%20Flexible%20Motion%20Adaptation%20via%20Mask-Invariant%20Prior%20for%20Physics-Based%20Characters&body=Title%3A%20MaskAdapt%3A%20Learning%20Flexible%20Motion%20Adaptation%20via%20Mask-Invariant%20Prior%20for%20Physics-Based%20Characters%0AAuthor%3A%20Soomin%20Park%20and%20Eunseong%20Lee%20and%20Kwang%20Bin%20Lee%20and%20Sung-Hee%20Lee%0AAbstract%3A%20We%20present%20MaskAdapt%2C%20a%20framework%20for%20flexible%20motion%20adaptation%20in%20physics-based%20humanoid%20control.%20The%20framework%20follows%20a%20two-stage%20residual%20learning%20paradigm.%20In%20the%20first%20stage%2C%20we%20train%20a%20mask-invariant%20base%20policy%20using%20stochastic%20body-part%20masking%20and%20a%20regularization%20term%20that%20enforces%20consistent%20action%20distributions%20across%20masking%20conditions.%20This%20yields%20a%20robust%20motion%20prior%20that%20remains%20stable%20under%20missing%20observations%2C%20anticipating%20later%20adaptation%20in%20those%20regions.%20In%20the%20second%20stage%2C%20a%20residual%20policy%20is%20trained%20atop%20the%20frozen%20base%20controller%20to%20modify%20only%20the%20targeted%20body%20parts%20while%20preserving%20the%20original%20behaviors%20elsewhere.%20We%20demonstrate%20the%20versatility%20of%20this%20design%20through%20two%20applications%3A%20%28i%29%20motion%20composition%2C%20where%20varying%20masks%20enable%20multi-part%20adaptation%20within%20a%20single%20sequence%2C%20and%20%28ii%29%20text-driven%20partial%20goal%20tracking%2C%20where%20designated%20body%20parts%20follow%20kinematic%20targets%20provided%20by%20a%20pre-trained%20text-conditioned%20autoregressive%20motion%20generator.%20Through%20experiments%2C%20MaskAdapt%20demonstrates%20strong%20robustness%20and%20adaptability%2C%20producing%20diverse%20behaviors%20under%20masked%20observations%20and%20delivering%20superior%20targeted%20motion%20adaptation%20compared%20to%20prior%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2 ve%2520motion%2520generator.%2520Through%2520experiments%252C%2520MaskAdapt%2520demonstrates%2520strong%2520robustness%2520and%2520adaptability%252C%2520producing%2520diverse%2520behaviors%2520under%2520masked%2520observations%2520and%2520delivering%2520superior%2520targeted%2520motion%2520adaptation%2520compared%2520to%2520prior%2520work.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29272v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MaskAdapt%3A%20Learning%20Flexible%20Motion%20Adaptation%20via%20Mask-Invariant%20Prior%20for%20Physics-Based%20Characters&entry.906535625=Soomin%20Park%20and%20Eunseong%20Lee%20and%20Kwang%20Bin%20Lee%20and%20Sung-Hee%20Lee&entry.1292438233=We%20present%20MaskAdapt%2C%20a%20framework%20for%20flexible%20motion%20adaptation%20in%20physics-based%20humanoid%20control.%20The%20framework%20follows%20a%20two-stage%20residual%20learning%20paradigm.%20In%20the%20first%20stage%2C%20we%20train%20a%20mask-invariant%20base%20policy%20using%20stochastic%20body-part%20masking%20and%20a%20regularization%20term%20that%20enforces%20consistent%20action%20distributions%20across%20masking%20conditions.%20This%20yields%20a%20robust%20motion%20prior%20that%20remains%20stable%20under%20missing%20observations%2C%20anticipating%20later%20adaptation%20in%20those%20regions.%20In%20the%20second%20stage%2C%20a%20residual%20policy%20is%20trained%20atop%20the%20frozen%20base%20controller%20to%20modify%20only%20the%20targeted%20body%20parts%20while%20preserving%20the%20original%20behaviors%20elsewhere.%20We%20demonstrate%20the%20versatility%20of%20this%20design%20through%20two%20applications%3A%20%28i%29%20motion%20composition%2C%20where%20varying%20masks%20enable%20multi-part%20adaptation%20within%20a%20single%20sequence%2C%20and%20%28ii%29%20text-driven%20partial%20goal%20tracking%2C%20where%20designated%20body%20parts%20follow%20kinematic%20targets%20 {"title": "Semantic Segmentation of Textured Non-manifold 3D Meshes using Transformers", "author": "Mohammadreza Heidarianbaei and Max Mehltretter and Franz Rottensteiner", "abstract": "Textured 3D meshes jointly represent geometry, topology, and appearance, yet their irregular structure poses significant challenges for deep-learning-based semantic segmentation. While a few recent methods operate directly on meshes without imposing geometric constraints, they typically overlook the rich textural information also provided by such meshes. We introduce a texture-aware transformer that learns directly from raw pixels associated with each mesh face, coupled with a new hierarchical learning scheme for multi-scale feature aggregation. A texture branch summarizes all face-level pixels into a learnable token, which is fused with geometrical descriptors and processed by a stack of Two-Stage Transformer Blocks (TSTB), which allow for both a local and a global information flow. We evaluate our model on the Semantic Urban Meshes (SUM) benchmark and a newly curated cultural-heritage dataset comprising textured roof tiles with triangle-level annotations for damage types. Our method achieves 81.9\\% mF1 and 94.3\\% OA on SUM and 49.7\\% mF1 and 72.8\\% OA on the new dataset, substantially outperforming existing approaches.", "link": "http://arxiv.org/abs/2604.01836v1", "date": "2026-04-02", "relevancy": 2.3694, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6169}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5832}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20Segmentation%20of%20Textu 2C%2520substantially%2520outperforming%2520existing%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01836v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semantic%20Segmentation%20of%20Textured%20Non-manifold%203D%20Meshes%20using%20Transformers&entry.906535625=Mohammadreza%20Heidarianbaei%20and%20Max%20Mehltretter%20and%20Franz%20Rottensteiner&entry.1292438233=Textured%203D%20meshes%20jointly%20represent%20geometry%2C%20topology%2C%20and%20appearance%2C%20yet%20their%20irregular%20structure%20poses%20significant%20challenges%20for%20deep-learning-based%20semantic%20segmentation.%20While%20a%20few%20recent%20methods%20operate%20directly%20on%20meshes%20without%20imposing%20geometric%20constraints%2C%20they%20typically%20overlook%20the%20rich%20textural%20information%20also%20provided%20by%20such%20meshes.%20We%20introduce%20a%20texture-aware%20transformer%20that%20learns%20directly%20from%20raw%20pixels%20associated%20with%20each%20mesh%20face%2C%20coupled%20with%20a%20new%20hierarchical%20learning%20scheme%20for%20multi-scale%20feature%20aggregation.%20A%20texture%20branch%20summarizes%20all%20face-level%20pixels%20into%20a%20learnable%20token%2C%20which%20is%20fused%20with%20geometrical%20descriptors%20and%20processed%20by%20a%20stack%20of%20Two-Stage%20Transformer%20Blocks%20%28TSTB%29%2C%20which%20allow%20for%20both%20a%20local%20and%20a%20global%20information%20flow.%20We%20evaluate%20our%20model%20on%20the%20Semantic%20Urban%20Meshes%20%28SUM%29%20benchmark%20and%20a%20newly%20curated%20cultural-heritage%20dataset%20comprising%20textured%20roof%20tiles%20with%20triangle-level%20annotations%20for%20damage%20types.%20Our%20method%20achieves%2081.9%5C%25%20mF1%20and%2094.3%5C%25%20OA%20on%20SUM%20and%2049.7%5C%25%20mF1%20and%2072.8%5C%25%20OA%20on%20the%20new%20dataset%2C%20substantially%20outperforming%20existing%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2604.01836v1&entry.124074799=Read"},
{"title": "Tackling Non-IIDness in HAPS-Aided Federated Learning", "author": "Amin Farajzadeh and Animesh Yadav and Halim Yanikomeroglu", "abstract": "High-altitude platform stations (HAPS) enable large-scale federated learning (FL) in non-terrestrial networks (NTN) by providing wide-area coverage and predominantly line-of-sight (LoS) connectivity to many ground users. However, practical deployments face heterogeneous and non-independently and identically distributed (non-IID) client data, which degrades accuracy and slows convergence. We propose a weighted attribute-based client selection strategy that leverages server-side indicators: historical traffic behavior, instantaneous channel quality, computational capability, and prior-round learning contribution. At each round, the HAPS computes a composite score and selects the top clients, while adapting attribute weights online based on their correlation with validation-loss improvement. We further provide theoretical justification that traffic-derived uniformity can serve as a proxy for latent data heterogeneity, enabling selection of client subsets with reduced expected non-IIDness. Simulations demonstrate improved test accuracy, faster convergence, and lower training loss compared with random, resource-only, and single-attribute baselines.", "link": "http://arxiv.org/abs/2401.05308v4", "date": "2026-04-02", "relevancy": 2.3345, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4714}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4673}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?sub {"title": "Stop Wandering: Efficient Vision-Language Navigation via Metacognitive Reasoning", "author": "Xueying Li and Feng Lyu and Hao Wu and Mingliu Liu and Jia-Nan Liu and Guozi Liu", "abstract": "Training-free Vision-Language Navigation (VLN) agents powered by foundation models can follow instructions and explore 3D environments. However, existing approaches rely on greedy frontier selection and passive spatial memory, leading to inefficient behaviors such as local oscillation and redundant revisiting. We argue that this stems from a lack of metacognitive capabilities: the agent cannot monitor its exploration progress, diagnose strategy failures, or adapt accordingly. To address this, we propose MetaNav, a metacognitive navigation agent integrating spatial memory, history-aware planning, and reflective correction. Spatial memory builds a persistent 3D semantic map. History-aware planning penalizes revisiting to improve efficiency. Reflective correction detects stagnation and uses an LLM to generate corrective rules that guide future frontier selection. Experiments on GOAT-Bench, HM3D-OVON, and A-EQA show that MetaNav achieves state-of-the-art performance while reducing VLM queries by 20.7%, demonstrating that metacognitive reasoning significantly improves robustness and efficiency.", "link": "http://arxiv.org/abs/2604.02318v1", "date": "2026-04-02", "relevancy": 2.3324, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6057}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5754}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5636}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stop%20Wandering%3A%20Efficient%20Vision-Language%20Navigation%20via%20Metacognitive%20Reasoning&body=Title%3A%20Stop%20Wandering%3A%20Efficient%20Vision-Language%20Navigation%20via%20Metacognitive%20Reasoning%0AAuthor%3A%20Xueying%20Li%20and%20Feng%20Lyu%20and%20Hao%20Wu%20and%20Mingliu%20Liu%20and%20Jia-Nan%20Liu%20and%20Guozi%20Liu%0AAbstract%3A%20Training-free%20Vision-Language%20Navigation%20%28VLN%29%20agents%20powered%20by%20foundation%20models%20can%20follow%20instructions%20and%20explore%203D%20environments.%20However%2C%20existing%20approaches%20rely%20on%20greedy%20frontier%20selection%20and%20passive%20spatial%20memory%2C%20leading%20to%20inefficient%20behaviors%20such%20as%20local%20oscillation%20and%20redundant%20revisiting.%20We%20argue%20that%20this%20stems%20from%20a%20lack%20of%20metacognitive%20capabilities%3A%20the%20agent%20cannot%20monitor%20its%20exploration%20progress%2C%20diagnose%20strategy%20failures%2C%20or%20adapt%20accordingly.%20To%20address%20this%2C%20we%20propose%20MetaNav%2C%20a%20metacognitive%20navigation%20agent%20integrating%20spatial%20memory%2C%20history-aware%20planning%2C%20and%20reflective%20correction.%20Spatial%20memory%20builds%20a%20persistent%203D%20semantic%20map.%20History-aware%20planning%20penalizes%20revisiting%20to%20improve%20efficiency.%20Reflective%20correction%20detects%20stagnation%20and%20uses%20an%20LLM%20to%20generate%20corrective%20rules%20that%20guide%20future%20frontier%20selection.%20Experiments%20on%20GOAT-Bench%2C%20HM3D-OVON%2C%20and%20A-EQA%20show%20that%20MetaNav%20achieves%20state-of-the-art%20performance%20while%20reducing%20VLM%20queries%20by%2020.7%25%2C%20demonstrating%20that%20metacognitive%20reasoning%20significantly%20improves%20robustness%20and%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02318v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStop%2520Wandering%253A%2520Efficient%2520Vision-Language%2520Navigation%2520via%2520Meta 124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Stop%20Wandering%3A%20Efficient%20Vision-Language%20Navigation%20via%20Metacognitive%20Reasoning&entry.906535625=Xueying%20Li%20and%20Feng%20Lyu%20and%20Hao%20Wu%20and%20Mingliu%20Liu%20and%20Jia-Nan%20Liu%20and%20Guozi%20Liu&entry.1292438233=Training-free%20Vision-Language%20Navigation%20%28VLN%29%20agents%20powered%20by%20foundation%20models%20can%20follow%20instructions%20and%20explore%203D%20environments.%20However%2C%20existing%20approaches%20rely%20on%20greedy%20frontier%20selection%20and%20passive%20spatial%20memory%2C%20leading%20to%20inefficient%20behaviors%20such%20as%20local%20oscillation%20and%20redundant%20revisiting.%20We%20argue%20that%20this%20stems%20from%20a%20lack%20of%20metacognitive%20capabilities%3A%20the%20agent%20cannot%20monitor%20its%20exploration%20progress%2C%20diagnose%20strategy%20failures%2C%20or%20adapt%20accordingly.%20To%20address%20this%2C%20we%20propose%20MetaNav%2C%20a%20metacognitive%20navigation%20agent%20integrating%20spatial%20memory%2C%20history-aware%20planning%2C%20and%20reflective%20correction.%20Spatial%20memory%20builds%20a%20persistent%203D%20semantic%20map.%20History-aware%20planning%20penalizes%20revisiting%20to%20improve%20efficiency.%20Reflective%20correction%20detects%20stagnation%20and%20uses%20an%20LLM%20to%20generate%20corrective%20rules%20that%20guide%20future%20frontier%20selection.%20Experiments%20on%20GOAT-Bench%2C%20HM3D-OVON%2C%20and%20A-EQA%20show%20that%20MetaNav%20achieves%20state-of-the-art%20performance%20while%20reducing%20VLM%20queries%20by%2020.7%25%2C%20demonstrating%20that%20metacognitive%20reasoning%20significantly%20improves%20robustness%20and%20efficiency.&entry.1838667208=http%3A//arxiv.org/abs/2604.02318v1&entry.124074799=Read"},
{"title": "Enhancing the Reliability of Medical AI through Expert-guided Uncertainty Modeling", "author": "Aleksei Khalin and Ekaterina Zaychenkova and Aleksandr Yugay and Andrey Goncharov and Sergey Korchagin and Alexey Zaytsev and Egor Ershov", "abstract": "Artificial intelligence (AI) systems accelerate medical workflows and improve diagnostic accuracy in healthcare, serving as second-opinion systems. However, the unpredictability of AI errors poses a significant challenge, particularly in healthcare contexts, where mistakes can have severe consequences. A widely adopted safeguard is to pair predictions with uncertainty estimation, enabling human experts to focus on high-risk cases while streamlining routine verification. Current uncertainty estimation methods, however, remain limited, particularly in quantifying aleatoric uncertainty, which arises from data ambiguity and noise. To address this, we propose a novel approach that leverages disagreement in expert responses to generate targets for training machine learning models. These targets are used in conjunction with standard data labels to estimate two components of uncertainty separately, as given by the law of total variance, via a two-ensemble approach, as well as its lightweight variant. We validate our method on binary image classification, binary and multi-class image segmentation, and multiple-choice question answering. Our experiments demonstrate that incorporating expert knowledge can enhance uncertainty estimation quality by $9\\%$ to $50\\%$ depending on the task, making this source of information invaluable for the construction of risk-aware AI systems in healthcare applications.", "link": "http://arxiv.org/abs/2604.01898v1", "date": "2026-04-02", "relevancy": 2.3207, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6611}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5694}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5586}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20the%20Reliability%20of%20Medical%20AI%20through%20Expert-guided%20Uncertainty%20Modeling&body=Title%3A%20Enhancing%20the%20Reliability%20of%20Medical%20AI%20through%20Expert-guided%20Uncertainty%20Modeling%0AAuthor%3A%20Aleksei%20Khalin%20and%20Ekaterina%20Zaychenkova%20and%20Aleksandr%20Yugay%20and%20Andrey%20Goncharov%20and%20Sergey%20Korchagin%20and%20Alexey%20Zaytsev%20and%20Egor%20Ershov%0AAbstract%3A%20Artificial%20intelligence%20%28AI%29%20systems%20accelerate%20medical%20workflows%20and%20improve%20diagnostic%20accuracy%20in%20healthcare%2C%20serving%20as%20second-opinion%20systems.%20However%2C%20the%20unpredictability%20of%20AI%20errors%20poses%20a%20significant%20challenge%2C%20particularly%20in%20healthcare%20contexts%2C%20where%20mistakes%20can%20have%20severe%20consequences.%20A%20widely%20adopted%20safeguard%20is%20to%20pair%20predictions%20with%20uncertainty%20estimation%2C%20enabling%20human%20experts%20to%20focus%20on%20high-risk%20cases%20while%20streamlining%20routine%20verification.%20Current%20uncertainty%20estimation%20methods%2C%20however%2C%20remain%20limited%2C%20particularly%20in%20quantifying%20aleatoric%20uncertainty%2C%20which%20arises%20from%20data%20ambiguity%20and%20noise.%20To%20address%20this%2C%20we%20propose%20a%20novel%20approach%20that%20leverages%20disagreement%20in%20expert%20responses%20to%20generate%20targets%20for%20training%20machine%20learning%20models.%20These%20targets%20are%20used%20in%20conjunction%20with%20standard%20data%20labels%20to%20estimate%20two%20components%20of%20uncertainty%20separately%2C%20as%20given%20by%20the%20law%20of%20total%20variance%2C%20via%20a%20two-ensemble%20approach%2C%20as%20well%20as%20its%20lightweight%20variant.%20We%20validate%20our%20method%20on%20binary%20image%20classification%2C%20binary%20and%20multi-class%20image%20segmentation%2C%20and%20multiple-choice%20question%20answering.%20Our%20experiments%20demonstrate%20that%20incorporating%20expert%20knowledge%20can%20enhance%20uncertainty%20estimation%20quality%20by%20%249%5C%25%24%20to%20%2450%5C%25%24%20depending%20on%20the%20task%2C%20making%20this%20source%20of%20information%20invaluable%20for%20the%20construction%20of%20risk-aware%20AI%20systems%20in%20healthcare%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01898v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520the%2520Reliability%2520of%2520Medical%2520AI%2520through%2520Expert-guided%2520Uncertainty%2520Modeling%26entry.906535625%3DAleksei%2520Khalin%2520and%2520Ekaterina%2520Zaychenkova%2520and%2520Aleksandr%2520Yugay%2520and%2520Andrey%2520Goncharov%2520and%2520Sergey%2520Korchagin%2520and%2520Alexey%2520Zaytsev%2520and%2520Egor%2520Ershov%26entry.1292438233%3DArtificial%2520intelligence%2520%2528AI%2529%2520systems%2520accelerate%2520medical%2520workflows%2520and%2520improve%2520diagnostic%2520accuracy%2520in%2520healthcare%252C%2520serving%2520as%2520second-opinion%2520systems.%2520However%252C%2520the%2520unpredictability%2520of%2520AI%2520errors%2520poses%2520a%2520significant%2520challenge%252C%2520particularly%2520in%2520healthcare%2520contexts%252C%2520where%2520mistakes%2520can%2520have%2520severe%2520consequences.%2520A%2520widely%2520adopted%2520safeguard%2520is%2520to%2520pair%2520predictions%2520with%2520uncertainty%2520estimation%252C%2520enabling%2520human%2520experts%2520to%2520focus%2520on%2520high-risk%2520cases%2520while%2520streamlining%2520routi {"title": "Semantic Richness or Geometric Reasoning? The Fragility of VLM's Visual Invariance", "author": "Jason Qiu and Zachary Meurer and Xavier Thomas and Deepti Ghadiyaram", "abstract": "This work investigates the fundamental fragility of state-of-the-art Vision-Language Models (VLMs) under basic geometric transformations. While modern VLMs excel at semantic tasks such as recognizing objects in canonical orientations and describing complex scenes, they exhibit systematic failures at a more fundamental level: lack of robust spatial invariance and equivariance required to reliably determine object identity under simple rotations, scaling, and identity transformations. We demonstrate this limitation through a systematic evaluation across diverse visual domains, including symbolic sketches, natural photographs, and abstract art. Performance drops sharply as semantic content becomes sparse, and this behavior is observed across architectures, model capacities, and prompting strategies. Overall, our results reveal a systematic gap between semantic understanding and spatial reasoning in current VLMs, highlighting the need for stronger geometric grounding in future multimodal systems.", "link": "http://arxiv.org/abs/2604.01848v1", "date": "2026-04-02", "relevancy": 2.3201, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5383}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20Richness%20or%20Geometric%20Reasoning%3F%20The%20Fragility%20of%20VLM%27s%20Visual%20Invariance&body=Title% {"title": "GenGait: A Transformer-Based Model for Human Gait Anomaly Detection and Normative Twin Generation", "author": "Elisa Motta and Marta Lorenzini and Clara Mouawad and Alberto Ranavolo and Mariano Serrao and Arash Ajoudani", "abstract": "Gait analysis provides an objective characterization of locomotor function and is widely used to support diagnosis and rehabilitation monitoring across neurological and orthopedic disorders. Deep learning has been increasingly applied to this domain, yet most approaches rely on supervised classifiers trained on disease-labeled data, limiting generalization to heterogeneous pathological presentations. This work proposes a label-free framework for joint-level anomaly detection and kinematic correction based on a Transformer masked autoencoder trained exclusively on normative gait sequences from 150 adults, acquired with a markerless multi-camera motion-capture system. At inference, a two-pass procedure is applied to potentially pathological input sequences, first it estimates joint inconsistency scores by occluding individual joints and measuring deviations from the learned normative prior. Then, it withholds the flagged joints from the encoder input and reconstructs the full skeleton from the remaining spatiotemporal context, yielding corrected kinematic trajectories at the flagged positions. Validation on 10 held-out normative participants, who mimicked seven simulated gait abnormalities, showed accurate localization of biomechanically inconsistent joints, a significant reduction in angular deviation across all analyzed joints with large effect sizes, and preservation of normative kinematics. The proposed approach enables interpretable, subject-specific localization of gait impairments without requiring disease labels. Video is available at https://youtu.be/Rcm3jqR5pN4.", "link": "http://arxiv.org/abs/2604.01997v1", "date": "2026-04-02", "relevancy": 2.3142, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "htt {"title": "Linear Attention for Joint Power Optimization and User-Centric Clustering in Cell-Free Networks", "author": "Irched Chafaa and Giacomo Bacci and Luca Sanguinetti", "abstract": "Optimal AP clustering and power allocation are critical in user-centric cell-free massive MIMO systems. Existing deep learning models lack flexibility to handle dynamic network configurations. Furthermore, many approaches overlook pilot contamination and suffer from high computational complexity. In this paper, we propose a lightweight transformer model that overcomes these limitations by jointly predicting AP clusters and powers solely from spatial coordinates of user devices and AP. Our model is architecture-agnostic to users load, handles both clustering and power allocation without channel estimation overhead, and eliminates pilot contamination by assigning users to AP within a pilot reuse constraint. We also incorporate a customized linear attention mechanism to capture user-AP interactions efficiently and enable linear scalability with respect to the number of users. Numerical results confirm the model's effectiveness in maximizing the minimum spectral efficiency and providing near-optimal performance while ensuring adaptability and scalability in dynamic scenarios.", "link": "http://arxiv.org/abs/2512.17466v3", "date": "2026-04-02", "relevancy": 2.3019, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4624}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4602}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4585}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Linear%20Attention%20for%20Joint%20Power%20Optimization%20and%20User-Centric%20Clustering%20i {"title": "AstroConcepts: A Large-Scale Multi-Label Classification Corpus for Astrophysics", "author": "Atilla Kaan Alkan and Felix Grezes and Sergi Blanco-Cuaresma and Jennifer Lynn Bartlett and Daniel Chivvis and Anna Kelbert and Kelly Lockhart and Alberto Accomazzi", "abstract": "Scientific multi-label text classification suffers from extreme class imbalance, where specialized terminology exhibits severe power-law distributions that challenge standard classification approaches. Existing scientific corpora lack comprehensive controlled vocabularies, focusing instead on broad categories and limiting systematic study of extreme imbalance. We introduce AstroConcepts, a corpus of English abstracts from 21,702 published astrophysics papers, labeled with 2,367 concepts from the Unified Astronomy Thesaurus. The corpus exhibits severe label imbalance, with 76% of concepts having fewer than 50 training examples. By releasing this resource, we enable systematic study of extreme class imbalance in scientific domains and establish strong baselines across traditional, neural, and vocabulary-constrained LLM methods. Our evaluation reveals three key patterns that provide new insights into scientific text classification. First, vocabulary-constrained LLMs achieve competitive performance relative to domain-adapted models in astrophysics classification, suggesting a potential for parameter-efficient approaches. Second, domain adaptation yields relatively larger improvements for rare, specialized terminology, although absolute performance remains limited across all methods. Third, we propose frequency-stratified evaluation to reveal performance patterns that are hidden by aggregate scores, thereby making robustness assessment central to scientific multi-label evaluation. These results offer actionable insights for scientific NLP and establish benchmarks for research on extreme imbalance.", "link": "http://arxiv.org/abs/2604.02156v1", "date": "2026-04-02", "relevancy": 2.3018, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4673}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.466}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AstroConcepts%3A%20A%20Large-Scale%20Multi-Label%20Classification%20Corpus%20for%20Astrophysics&body=Title%3A%20AstroConcepts%3A%20A%20Large-Scale%20Multi-Label%20Classification%20Corpus%20for%20Astrophysics%0AAuthor%3A%20Atilla%20Kaan%20Alkan%20and%20Felix%20Grezes%20and%20Sergi%20Blanco-Cuaresma%20and%20Jennifer%20Lynn%20Bartlett%20and%20Daniel%20Chivvis%20and%20Anna%20Kelbert%20and%20Kelly%20Lockhart%20and%20Alberto%20Accomazzi%0AAbstract%3A%20Scientific%20multi-label%20text%20classification%20suffers%20from%20extreme%20class%20imbalance%2C%20where%20specialized%20terminology%20exhibits%20severe%20power-law%20distributions%20that%20challenge%20standard%20classification%20approaches.%20Existing%20scientific%20corpora%20lack%20comprehensive%20controlled%20vocabularies%2C%20focusing%20instead%20on%20broad%20categories%20and%20limiting%20systematic%20study%20of%20extreme%20imbalance.%20We%20introduce%20AstroConcepts%2C%20a%20corpus%20of%20English%20abstracts%20from%2021%2C702%20published%20astrophysics%20papers%2C%20labeled%20with%202%2C367%20concepts%20from%20the%20Unified%20Astronomy%20Thesaurus.%20The%20corpus%20exhibits%20severe%20label%20imbalance%2C%20with%2076%25%20of%20concepts%20having%20fewer%20than%2050%20training%20examples.%20By%20releasing%20this%20resource%2C%20we%20enable%20systematic%20study%20of%20extreme%20class%20imbalance%20in%20scientific%20domains%20and%20establish%20strong%20baselines%20across%20traditional%2C%20neural%2C%20and%20vocabulary-constrained%20LLM%20methods.%20Our%20evaluation%20reveals%20three%20key%20patterns%20that%20provide%20new%20insights%20into%20scientific%20text%20classification.%20First%2C%20vocabulary-constrained%20LLMs%20achieve%20competitive%20performance%20relative%20to%20domain-adapted%20models%20in%20astrophysics%20classification%2C%20suggesting%20a%20potential%20for%20parameter-efficient%20approaches.%20Second%2C%20domain%20adaptation%20yields%20relatively%20larger%20improvements%20for%20rare%2C%20specialized%20terminology%2C%20although%20absolute%20performance%20remains%20limited%20across%20all%20methods.%20Third%2C%20we%20propose%20frequency-stratified%20evaluation%20to%20reveal%20performance%20patterns%20that%20are%20hidden%20by%20aggregate%20scores%2C%20thereby%20making%20robustness%20assessment%20central%20to%20scientific%20multi-label%20evaluation.%20These%20results%20offer%20actionable%20insights%20for%20scientific%20NLP%20and%20establish%20benchmarks%20for%20research%20on%20extreme%20imbalance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02156v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAstroConcepts%253A%2520A%2520Large-Scale%2520Multi-Label%2520Classification%2520Corpus%2520for%2520Astrophysics%26entry.906535625%3DAtilla%2520Kaan%2520Alkan%2520and%2520Felix%2520Grezes%2520and%2520Sergi%2520Blanco-Cuaresma%2520and%2520Jennifer%2520Lynn%2520Bartlett%2520and%2520Daniel%2520Chivvis%2520and%2520Anna%2520Kelbert%2520and%2520Kelly%2520Lockhart%2520and%2520Alberto%2520Accomazzi%26entry.1292438233%3DScientific%2520multi-label%2520text%2520classification%2520suffers%2520from%2520extreme%2520class%2520imbalance%252C%2520where%2520specialized%2520terminology%2520exhibits%2520severe%2520power-law%2520distributions%2520that%2520challenge%2520standard%2520classification%2520approaches.%2520Existing%2520scientific%2520corpora%2520lack%2520 {"title": "MAVFusion: Efficient Infrared and Visible Video Fusion via Motion-Aware Sparse Interaction", "author": "Xilai Li and Weijun Jiang and Xiaosong Li and Yang Liu and Hongbin Wang and Tao Ye and Huafeng Li and Haishu Tan", "abstract": "Infrared and visible video fusion combines the object saliency from infrared images with the texture details from visible images to produce semantically rich fusion results. However, most existing methods are designed for static image fusion and cannot effectively handle frame-to-frame motion in videos. Current video fusion methods improve temporal consistency by introducing interactions across frames, but they often require high computational cost. To mitigate these challenges, we propose MAVFusion, an end-to-end video fusion framework featuring a motion-aware sparse interaction mechanism that enhances efficiency while maintaining superior fusion quality. Specifically, we leverage optical flow to identify dynamic regions in multi-modal sequences, adaptively allocating computationally intensive cross-modal attention to these sparse areas to capture salient transitions and facilitate inter-modal information exchange. For static background regions, a lightweight weak interaction module is employed to maintain structural and appearance integrity. By decoupling the processing of dynamic and static regions, MAVFusion simultaneously preserves temporal consistency and fine-grained details while significantly accelerating inference. Extensive experiments demonstrate that MAVFusion achieves state-of-the-art performance on multiple infrared and visible video benchmarks, achieving a speed of 14.16\\,FPS at $640 \\times 480$ resolution. The source code will be available at https://github.com/ixilai/MAVFusion.", "link": "http://arxiv.org/abs/2604.01958v1", "date": "2026-04-02", "relevancy": 2.3009, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.593}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5747}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAVFusion%3A%20Efficient%20Infrared%20and%20Visible%20Video%20Fusion%20via%20Motion-Aware%20Sparse%20Interaction&body=Title%3A%20MAVFusion%3A%20Efficient%20Infrared%20and%20Visible%20Video%20Fusion%20via%20Motion-Aware%20Sparse%20Interaction%0AAuthor%3A%20Xilai%20Li%20and%20Weijun%20Jiang%20and%20Xiaosong%20Li%20and%20Yang%20Liu%20and%20Hongbin%20Wang%20and%20Tao%20Ye%20and%20Huafeng%20Li%20and%20Haishu%20Tan%0AAbstract%3A%20Infrared%20and%20visible%20video%20fusion%20combines%20the%20object%20saliency%20from%20infrared%20images%20with%20the%20texture%20details%20from%20visible%20images%20to%20produce%20semantically%20rich%20fusion%20results.%20However%2C%20most%20existing%20methods%20are%20designed%20for%20static%20image%20fusion%20and%20cannot%20effectively%20handle%20frame-to-frame%20motion%20in%20videos.%20Current%20video%20fusion%20methods%20improve%20temporal%20consistency%20by%20introducing%20interactions%20across%20frames%2C%20but%20they%20often%20require%20high%20computational%20cost.%20To%20mitigate%20these%20challenges%2C%20we%20propose%20MAVFusion%2C%20an%20end-to-end%20video%20fusion%20framework%20featuring%20a%20motion-aware%20sparse%20interaction%20mechanism%20that%20enhances%20efficiency%20while%20maintaining%20superior%20fusion%20quality.%20Specifically%2C%20we%20leverage%20optical%20flow%20to%20identify%20dynamic%20regions%20in%20multi-modal%20sequences%2C%20adaptively%20allocating%20computationally%20intensive%20cross-modal%20attention%20to%20these%20sparse%20areas%20to%20capture%20salient%20transitions%20and%20facilitate%20inter-modal%20information%20exchange.%20For%20static%20background%20regions%2C%20a%20lightweight%20weak%20interaction%20module%20is%20employed%20to%20maintain%20structural%20and%20appearance%20integrity.%20By%20decoupling%20the%20processing%20of%20dynamic%20and%20static%20regions%2C%20MAVFusion%20simultaneously%20preserves%20temporal%20consistency%20and%20fine-grained%20details%20while%20significantly%20accelerating%20inference.%20Extensive%20experiments%20demonstrate%20that%20MAVFusion%20achieves%20state-of-the-art%20performance%20on%20multiple%20infrared%20and%20visible%20video%20benchmarks%2C%20achieving%20a%20speed%20of%2014.16%5C%2CFPS%20at%20%24640%20%5Ctimes%20480%24%20resolution.%20The%20source%20code%20will%20be%20available%20at%20https%3A//github.com/ixilai/MAVFusion.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01958v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAVFusion%253A%2520Efficient%2520Infrared%2520and%2520Visible%2520Video%2520Fusion%2520via%2520Motion-Aware%2520Sparse%2520Interaction%26entry.906535625%3DXilai%2520Li%2520and%2520Weijun%2520Jiang%2520and%2520Xiaosong%2520Li%2520and%2520Yang%2520Liu%2520and%2520Hongbin%2520Wang%2520and%2520Tao%2520Ye%2520and%2520Huafeng%2520Li%2520and%2520Haishu%2520Tan%26entry.1292438233%3DInfrared%2520and%2520visible%2520video%2520fusion%2520combines%2520the%2520object%2520saliency%2520from%2520infrared%2520images%2520with%2520the%2520texture%2520details%2520from%2520visible%2520images%2520to%2520produce%2520semantically%2520rich%2520fusion%2520results.%2520However%252C%2520most%2520existing%2520methods%2520are%2520designed%2520for%2520static%2520image%2520fusion%2520and%2520cannot%2520effectively%2520handle%2520frame-to-frame%2520motion%2520in%2520videos.%2520Current%2520video%2520fusion%2520methods%2520improve%2520temporal%2520consistency%2520by%2520introducing%2520interactions%2520across%2520frames%252C%2520but%2520they%2520often%2520require%2520high%2520comp {"title": "CANDI: Curated Test-Time Adaptation for Multivariate Time-Series Anomaly Detection Under Distribution Shift", "author": "HyunGi Kim and Jisoo Mok and Hyungyu Lee and Juhyeon Shin and Sungroh Yoon", "abstract": "Multivariate time-series anomaly detection (MTSAD) aims to identify deviations from normality in multivariate time-series and is critical in real-world applications. However, in real-world deployments, distribution shifts are ubiquitous and cause severe performance degradation in pre-trained anomaly detector. Test-time adaptation (TTA) updates a pre-trained model on-the-fly using only unlabeled test data, making it promising for addressing this challenge. In this study, we propose CANDI (Curated test-time adaptation for multivariate time-series ANomaly detection under DIstribution shift), a novel TTA framework that selectively identifies and adapts to potential false positives while preserving pre-trained knowledge. CANDI introduces a False Positive Mining (FPM) strategy to curate adaptation samples based on anomaly scores and latent similarity, and incorporates a plug-and-play Spatiotemporally-Aware Normality Adaptation (SANA) module for structurally informed model updates. Extensive experiments demonstrate that CANDI significantly improves the performance of MTSAD under distribution shift, improving AUROC up to 14% while using fewer adaptation samples.", "link": "http://arxiv.org/abs/2604.01845v1", "date": "2026-04-02", "relevancy": 2.2992, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4685}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4569}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4541 {"title": "A3R: Agentic Affordance Reasoning via Cross-Dimensional Evidence in 3D Gaussian Scenes", "author": "Di Li and Jie Feng and Guanbin Li and Ronghua Shang and Yuhui Zheng and Weisheng Dong and Guangming Shi", "abstract": "Affordance reasoning in 3D Gaussian scenes aims to identify the region that supports the action specified by a given text instruction in complex environments. Existing methods typically cast this problem as one-shot prediction from static scene observations, assuming sufficient evidence is already available for reasoning. However, in complex 3D scenes, many failure cases arise not from weak prediction capacity, but from incomplete task-relevant evidence under fixed observations. To address this limitation, we reformulate fine-grained affordance reasoning as a sequential evidence acquisition process, where ambiguity is progressively reduced through complementary 3D geometric and 2D semantic evidence. Building on this formulation, we propose A3R, an agentic affordance reasoning framework that enables an MLLM-based policy to iteratively select evidence acquisition actions and update the affordance belief through cross-dimensional evidence acquisition. To optimize such sequential decision making, we further introduce a GRPO-based policy learning strategy that improves evidence acquisition efficiency and reasoning accuracy. Extensive experiments on scene-level benchmarks show that A3R consistently surpasses static one-shot baselines, demonstrating the advantage of agentic cross-dimensional evidence acquisition for fine-grained affordance reasoning in complex 3D Gaussian scenes.", "link": "http://arxiv.org/abs/2604.01882v1", "date": "2026-04-02", "relevancy": 2.2788, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5844}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5668}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A3R%3A%20Agentic%20Affordance%20Reasoning%20via%20Cross-Dimensional%20Evidence%20in%203D%20Gaussian%20Scenes&body=Title%3A%20A3R%3A%20Agentic%20Affordance%20Reasoning%20via%20Cross-Dimensional%20Evidence%20in%203D%20Gaussian%20Scenes%0AAuthor%3A%20Di%20Li%20and%20Jie%20Feng%20and%20Guanbin%20Li%20and%20Ronghua%20Shang%20and%20Yuhui%20Zheng%20and%20Weisheng%20Dong%20and%20Guangming%20Shi%0AAbstract%3A%20Affordance%20reasoning%20in%203D%20Gaussian%20scenes%20aims%20to%20identify%20the%20region%20that%20supports%20the%20action%20specified%20by%20a%20given%20text%20instruction%20in%20complex%20environments.%20Existing%20methods%20typically%20cast%20this%20problem%20as%20one-shot%20prediction%20from%20static%20scene%20observations%2C%20assuming%20sufficient%20evidence%20is%20already%20available%20for%20reasoning.%20However%2C%20in%20complex%203D%20scenes%2C%20many%20failure%20cases%20arise%20not%20from%20weak%20prediction%20capacity%2C%20but%20from%20incomplete%20task-relevant%20evidence%20under%20fixed%20observations.%20To%20address%20this%20limitation%2C%20we%20reformulate%20fine-grained%20affordance%20reasoning%20as%20a%20sequential%20evidence%20acquisition%20process%2C%20where%20ambiguity%20is%20progressively%20reduced%20through%20complementary%203D%20geometric%20and%202D%20semantic%20evidence.%20Building%20on%20this%20formulation%2C%20we%20propose%20A3R%2C%20an%20agentic%20affordance%20reasoning%20framework%20that%20enables%20an%20MLLM-based%20policy%20to%20iteratively%20select%20evidence%20acquisition%20actions%20and%20update%20the%20affordance%20belief%20through%20cross-dimensional%20evidence%20acquisition.%20To%20optimize%20such%20sequential%20decision%20making%2C%20we%20further%20introduce%20a%20GRPO-based%20policy%20learning%20strategy%20that%20improves%20evidence%20acquisition%20efficiency%20and%20reasoning%20accuracy.%20Extensive%20experiments%20on%20scene-level%20benchmarks%20show%20that%20A3R%20consistently%20surpasses%20static%20one-shot%20baselines%2C%20demonstrating%20the%20advantage%20of%20agentic%20cross-dimensional%20evidence%20acquisition%20for%20fine-grained%20affordance%20reasoning%20in%20complex%203D%20Gaussian%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01882v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA3R%253A%2520Agentic%2520Affordance%2520Reasoning%2520via%2520Cross-Dimensional%2520Evidence%2520in%25203D%2520Gaussian%2520Scenes%26entry.906535625%3DDi%2520Li%2520and%2520Jie%2520Feng%2520and%2520Guanbin%2520Li%2520and%2520Ronghua%2520Shang%2520and%2520Yuhui%2520Zheng%2520and%2520Weisheng%2520Dong%2520and%2520Guangming%2520Shi%26entry.1292438233%3DAffordance%2520reasoning%2520in%25203D%2520Gaussian%2520scenes%2520aims%2520to%2520identify%2520the%2520region%2520that%2520supports%2520the%2520action%2520specified%2520by%2520a%2520given%2520text%2520instruction%2520in%2520complex%2520environments.%2520Existing%2520methods%2520typically%2520cast%2520this%2520problem%2520as%2520one-shot%2520prediction%2520from%2520static%2520scene%2520observations%252C%2520assuming%2520sufficient%2520evidence%2520is%2520already%2520available%2520for%2520reasoning.%2520However%252C%2520in%2520complex%25203D%2520scenes%252C%2520many%2520failure%2520cases%2520arise%2520not%2520from%2520weak%2520prediction%2520capacity%252C%2520but%2520from%2520incomplete%2520task-relevant%2520evidence%2520under%2520fixed%2520observations.%2520To%2520address%2520this%2520limitation%252C%2520we%2520reformulate%2520fine-grained%2520affordance%2520reasoning%2520as%2520a%2520sequential%2520evidence%2520acquisition%2520process%252C%2520where%2520ambiguity%2520is%2520 {"title": "Modular Energy Steering for Safe Text-to-Image Generation with Foundation Models", "author": "Yaoteng Tan and Zikui Cai and M. Salman Asif", "abstract": "Controlling the behavior of text-to-image generative models is critical for safe and practical deployment. Existing safety approaches typically rely on model fine-tuning or curated datasets, which can degrade generation quality or limit scalability. We propose an inference-time steering framework that leverages gradient feedback from frozen pretrained foundation models to guide the generation process without modifying the underlying generator. Our key observation is that vision-language foundation models encode rich semantic representations that can be repurposed as off-the-shelf supervisory signals during generation. By injecting such feedback through clean latent estimates at each sampling step, our method formulates safety steering as an energy-based sampling problem. This design enables modular, training-free safety control that is compatible with both diffusion and flow-matching models and can generalize across diverse visual concepts. Experiments demonstrate state-of-the-art robustness against NSFW red-teaming benchmarks and effective multi-target steering, while preserving high generation quality on benign non-targeted prompts. Our framework provides a principled approach for utilizing foundation models as semantic energy estimators, enabling reliable and scalable safety control for text-to-image generation.", "link": "http://arxiv.org/abs/2604.02265v1", "date": "2026-04-02", "relevancy": 2.277, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5908}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5682}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5617}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Modular%20Energy%20Steering%20for%20Safe%20Text-to-Image%20Generation%20with%20Foundation%20Models&body=Title%3A%20Modular%20Energy%20Steering%20for%20Safe%20Text-to-Image%20Generation%20with%20Foundation%20Models%0AAuthor%3A%20Yaoteng%20Tan%20and%20Zikui%20Cai%20and%20M.%20Salman%20Asif%0AAbstract%3A%20Controlling%20the%20behavior%20of%20text-to-image%20generative%20models%20is%20critical%20for%20safe%20and%20practical%20deployment.%20Existing%20safety%20approaches%20typically%20rely%20on%20model%20fine-tuning%20or%20curated%20datasets%2C%20which%20can%20degrade%20generation%20quality%20or%20limit%20scalability.%20We%20propose%20an%20inference-time%20steering%20framework%20that%20leverages%20gradient%20feedback%20from%20frozen%20pretrained%20foundation%20models%20to%20guide%20the%20generation%20process%20without%20modifying%20the%20underlying%20generator.%20Our%20key%20observation%20is%20that%20vision-language%20foundation%20models%20encode%20rich%20semantic%20representations%20that%20can%20be%20repurposed%20as%20off-the-shelf%20supervisory%20signals%20during%20generation.%20By%20injecting%20such%20feedback%20through%20clean%20latent%20estimates%20at%20each%20sampling%20step%2C%20our%20method%20formulates%20safety%20steering%20as%20an%20energy-based%20sampling%20problem.%20This%20design%20enables%20modular%2C%20training-free%20safety%20control%20that%20is%20compatible%20with%20both%20diffusion%20and%20flow-matching%20models%20and%20can%20generalize%20across%20diverse%20visual%20concepts.%20Experiments%20demonstrate%20state-of-the-art%20robustness%20against%20NSFW%20red-teaming%20benchmarks%20and%20effective%20multi-target%20steering%2C%20while%20preserving%20high%20generation%20quality%20on%20benign%20non-targeted%20prompts.%20Our%20framework%20provides%20a%20principled%20approach%20for%20utilizing%20foundation%20models%20as%20semantic%20energy%20estimators%2C%20enabling%20reliable%20and%20scalable%20safety%20control%20for%20text-to-image%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02265v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModular%2520Energy%2520Steering%2520for%2520Safe%2520Text-to-Image%2520Generation%2520with%2520Foundation%2520Models%26entry.906535625%3DYaoteng%2520Tan%2520and%2520Zikui%2520Cai%2520and%2520M.%2520Salman%2520Asif%26entry.1292438233%3DControlling%2520the%2520behavior%2520of%2520text-to-image%2520generative%2520models%2520is%2520critical%2520for%2520safe%2520and%2520practical%2520deployment.%2520Existing%2520safety%2520approaches%2520typically%2520rely%2520on%2520model%2520fine-tuning%2520or%2520curated%2520datasets%252C%2520which%2520can%2520degrade%2520generation%2520quality%2520or%2520limit%2520scalability.%2520We%2520propose%2520an%2520inference-time%2520steering%2520framework%2520that%2520leverages%2520gradient%2520feedback%2520from%2520frozen%2520pretrained%2520foundation%2520models%2520to%2520guide%2520the%2520generation%2520process%2520without%2520modifying%2520the%2520underlying%2520generator.%2520Our%2520key%2520observation%2520is%2520that%2520vision-language%2520foundation%2520models%2520encode%2520rich%2520semantic%2520representations%2520that%2520can%2520be%2520repurposed%2520as%2520off-the-shelf%2520supervisory%2520signals%2520during%2520generation.%2520By%2520injecting%2520such%2520feedback%2520through%2520clean%2520latent%2520estimates%2520at%2520each%2520sampling%2520step%252C%2520our%2520method%2520formulates%2520safety%2520steering%2520as%2520an%2520energy-based%2520sampling%2520problem.%2520This%2520design%2520enables%2520modular%252C%2520training-free%2520safety%2520control%2520that%2520is%2520compatible%2520with%2520both%2520diffusion%2520and%2520flow-matching%2520models%2520and%2520can%2520generalize%2520across%2520diverse%2520visual%2520concepts.%2520Experiments%2520demonstrate%2520state-of-the- {"title": "VOID: Video Object and Interaction Deletion", "author": "Saman Motamed and William Harvey and Benjamin Klein and Luc Van Gool and Zhuoning Yuan and Ta-Ying Cheng", "abstract": "Existing video object removal methods excel at inpainting content \"behind\" the object and correcting appearance-level artifacts such as shadows and reflections. However, when the removed object has more significant interactions, such as collisions with other objects, current models fail to correct them and produce implausible results. We present VOID, a video object removal framework designed to perform physically-plausible inpainting in these complex scenarios. To train the model, we generate a new paired dataset of counterfactual object removals using Kubric and HUMOTO, where removing an object requires altering downstream physical interactions. During inference, a vision-language model identifies regions of the scene affected by the removed object. These regions are then used to guide a video diffusion model that generates physically consistent counterfactual outcomes. Experiments on both synthetic and real data show that our approach better preserves consistent scene dynamics after object removal compared to prior video object removal methods. We hope this framework sheds light on how to make video editing models better simulators of the world through high-level causal reasoning.", "link": "http://arxiv.org/abs/2604.02296v1", "date": "2026-04-02", "relevancy": 2.2725, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.587}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5681}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5606}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VOID%3A%20Video%20Object%20and%20Interaction%20Deletion&body=Title%3A%20VOID%3A%20Video%20Object%20and%20Interaction%20Deletion%0AAuthor%3A%20Saman%20Motamed%20and%20William%20Harvey%20and%20Benjamin%20Klein%20and%20Luc%20Van%20Gool%20and%20Zhuoning%20Yuan%20and%20Ta-Ying%20Cheng%0AAbstract%3A%20Existing%20video%20object%20removal%20methods%20excel%20at%20inpainting%20content%20%22behind%22%20the%20object%20and%20correcting%20appearance-level%20artifacts%20such%20as%20shadows%20and%20reflections.%20However%2C%20when%20the%20removed%20object%20has%20more%20significant%20interactions%2C%20such%20as%20collisions%20with%20other%20objects%2C%20current%20models%20fail%20to%20correct%20them%20and%20produce%20implausible%20results.%20We%20present%20VOID%2C%20a%20video%20object%20removal%20framework%20designed%20to%20perform%20physically-plausible%20inpainting%20in%20these%20complex%20scenarios.%20To%20train%20the%20model%2C%20we%20generate%20a%20new%20paired%20dataset%20of%20counterfactual%20object%20removals%20using%20Kubric%20and%20HUMOTO%2C%20where%20removing%20an%20object%20requires%20altering%20downstream%20physical%20interactions.%20During%20inference%2C%20a%20vision-language%20model%20identifies%20regions%20of%20the%20scene%20affected%20by%20the%20removed%20object.%20These%20regions%20are%20then%20used%20to%20guide%20a%20video%20diffusion%20model%20that%20generates%20physically%20consistent%20counterfactual%20outcomes.%20Experiments%20on%20both%20synthetic%20and%20real%20data%20show%20that%20our%20approach%20better%20preserves%20consistent%20scene%20dynamics%20after%20object%20removal%20compared%20to%20prior%20video%20object%20removal%20methods.%20We%20hope%20this%20framework%20sheds%20light%20on%20how%20to%20make%20video%20editing%20models%20better%20simulators%20of%20the%20world%20through%20high-level%20causal%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02296v1%0AForm%3A%20https%3A//docs.google.com/forms/ 20to%2520prior%2520video%2520object%2520removal%2520methods.%2520We%2520hope%2520this%2520framework%2520sheds%2520light%2520on%2520how%2520to%2520make%2520video%2520editing%2520models%2520better%2520simulators%2520of%2520the%2520world%2520through%2520high-level%2520causal%2520reasoning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02296v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VOID%3A%20Video%20Object%20and%20Interaction%20Deletion&entry.906535625=Saman%20Motamed%20and%20William%20Harvey%20and%20Benjamin%20Klein%20and%20Luc%20Van%20Gool%20and%20Zhuoning%20Yuan%20and%20Ta-Ying%20Cheng&entry.1292438233=Existing%20video%20object%20removal%20methods%20excel%20at%20inpainting%20content%20%22behind%22%20the%20object%20and%20correcting%20appearance-level%20artifacts%20such%20as%20shadows%20and%20reflections.%20However%2C%20when%20the%20removed%20object%20has%20more%20significant%20interactions%2C%20such%20as%20collisions%20with%20other%20objects%2C%20current%20models%20fail%20to%20correct%20them%20and%20produce%20implausible%20results.%20We%20present%20VOID%2C%20a%20video%20object%20removal%20framework%20designed%20to%20perform%20physically-plausible%20inpainting%20in%20these%20complex%20scenarios.%20To%20train%20the%20model%2C%20we%20generate%20a%20new%20paired%20dataset%20of%20counterfactual%20object%20removals%20using%20Kubric%20and%20HUMOTO%2C%20where%20removing%20an%20object%20requires%20altering%20downstream%20physical%20interactions.%20During%20inference%2C%20a%20vision-language%20model%20identifies%20regions%20of%20the%20scene%20affected%20by%20the%20removed%20object.%20These%20regions%20are%20then%20used%20to%20guide%20a%20video%20diffusion%20model%20that%20generates%20physically%20consistent%20counterfactual%20outcomes.%20Experiments%20on%20both%20synthetic%20and%20real%20data%20show%20that%20our%20approach%20better%20preserves%20consistent%20scene%20dynamics%20after%20object%20removal%20compared%20to%20prior%20video%20object%20removal%20methods.%20We%20hope%20this%20framework%20sheds%20light%20on%20how%20to%20make%20video%20editing%20models%20better%20simulators%20of%20the%20world%20through%20high-level%20causal%20reasoning.&entry.1838667208=http%3A//arxiv.org/abs/2604.02296v1&entry.124074799=Read"},
{"title": "Beyond the Black Box: Identifiable Interpretation and Control in Generative Models via Causal Minimality", "author": "Lingjing Kong and Shaoan Xie and Guangyi Chen and Yuewen Sun and Xiangchen Song and Eric P. Xing and Kun Zhang", "abstract": "Deep generative models, while revolutionizing fields like image and text generation, largely operate as opaque ``black boxes'', hindering human understanding, control, and alignment. While methods like sparse autoencoders (SAEs) show remarkable empirical success, they often lack theoretical guarantees, risking subjective insights. Our primary objective is to establish a principled foundation for interpretable generative models. We demonstrate that the principle of causal minimality -- favoring the simplest causal explanation -- can endow the latent representations of modern generative models with clear causal interpretation and robust, component-wise identifiable control. We introduce a novel theoretical framework for hierarchical selection models, where higher-level concepts emerge from the constrained composition of lower-level variables, better capturing the complex dependencies in data generation. Under theoretically derived minimality conditions, we show that learned representations can be equivalent to the true latent variables of the data-generating process. Empirically, applying these constraints to leading text-to-image diffusion models allows us to extract their innate hierarchical concept graphs, offering fresh insights into their internal knowledge organization. Furthermore, these causally grounded concepts serve as levers for fine-grained model steering, paving the way for transparent, reliable systems.", "link": "http://arxiv.org/abs/2512.10720v2", "date": "2026-04-02", "relevancy": 2.2655, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5824}, {"title": "Genie: Generative Interactive Environments" {"title": "ROS 2-Based LiDAR Perception Framework for Mobile Robots in Dynamic Production Environments, Utilizing Synthetic Data Generation, Transformation-Equivariant 3D Detection and Multi-Object Tracking", "author": "Lukas Bergs and Tan Chung and Marmik Thakkar and Alexander Moriz and Amon G\u00f6ppert and Chinnawut Nantabut and Robert Schmitt", "abstract": "Adaptive robots in dynamic production environments require robust perception capabilities, including 6D pose estimation and multi-object tracking. To address limitations in real-world data dependency, noise robustness, and spatiotemporal consistency, a LiDAR framework based on the Robot Operating System integrating a synthetic-data-trained Transformation-Equivariant 3D Detection with multi-object-tracking leveraging center poses is proposed. Validated across 72 scenarios with motion capture technology, overall results yield an Intersection over Union of 62.6% for standalone pose estimation, rising to 83.12% with multi-object-tracking integration. Our LiDAR-based framework achieves 91.12% of Higher Order Tracking Accuracy, advancing robustness and versatility of LiDAR-based perception systems for industrial mobile manipulators.", "link": "http://arxiv.org/abs/2604.02109v1", "date": "2026-04-02", "relevancy": 2.2633, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6089}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5573}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ROS%202-Based%20LiDAR%20Perception%20Framework%20for%20Mobile%20Robots%20in%20Dynamic%20Production%20Environments%2C%20 {"title": "Intervening to Learn and Compose Causally Disentangled Representations", "author": "Alex Markham and Isaac Hirsch and Jeri A. Chang and Liam Solus and Bryon Aragam", "abstract": "In designing generative models, it is commonly believed that in order to learn useful latent structure, we face a fundamental tension between expressivity and structure. In this paper we challenge this view by proposing a new approach to training arbitrarily expressive generative models that simultaneously learn causally disentangled concepts. This is accomplished by adding a simple context module to an arbitrarily complex black-box model, which learns to process concept information by implicitly inverting linear representations from the model's encoder. Inspired by the notion of intervention in a causal model, our module selectively modifies its architecture during training, allowing it to learn a compact joint model over different contexts. We show how adding this module leads to causally disentangled representations that can be composed for out-of-distribution generation on both real and simulated data. The resulting models can be trained end-to-end or fine-tuned from pre-trained models. To further validate our proposed approach, we prove a new identifiability result that extends existing work on identifying structured representations.", "link": "http://arxiv.org/abs/2507.04754v2", "date": "2026-04-02", "relevancy": 2.253, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.603}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5866}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5141}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Intervening%20to%20Learn%20and%20Compose%20Causally%20Disentangled%20Repres fying%2520structured%2520representations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.04754v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Intervening%20to%20Learn%20and%20Compose%20Causally%20Disentangled%20Representations&entry.906535625=Alex%20Markham%20and%20Isaac%20Hirsch%20and%20Jeri%20A.%20Chang%20and%20Liam%20Solus%20and%20Bryon%20Aragam&entry.1292438233=In%20designing%20generative%20models%2C%20it%20is%20commonly%20believed%20that%20in%20order%20to%20learn%20useful%20latent%20structure%2C%20we%20face%20a%20fundamental%20tension%20between%20expressivity%20and%20structure.%20In%20this%20paper%20we%20challenge%20this%20view%20by%20proposing%20a%20new%20approach%20to%20training%20arbitrarily%20expressive%20generative%20models%20that%20simultaneously%20learn%20causally%20disentangled%20concepts.%20This%20is%20accomplished%20by%20adding%20a%20simple%20context%20module%20to%20an%20arbitrarily%20complex%20black-box%20model%2C%20which%20learns%20to%20process%20concept%20information%20by%20implicitly%20inverting%20linear%20representations%20from%20the%20model%27s%20encoder.%20Inspired%20by%20the%20notion%20of%20intervention%20in%20a%20causal%20model%2C%20our%20module%20selectively%20modifies%20its%20architecture%20during%20training%2C%20allowing%20it%20to%20learn%20a%20compact%20joint%20model%20over%20different%20contexts.%20We%20show%20how%20adding%20this%20module%20leads%20to%20causally%20disentangled%20representations%20that%20can%20be%20composed%20for%20out-of-distribution%20generation%20on%20both%20real%20and%20simulated%20data.%20The%20resulting%20models%20can%20be%20trained%20end-to-end%20or%20fine-tuned%20from%20pre-trained%20models.%20To%20further%20validate%20our%20proposed%20approach%2C%20we%20prove%20a%20new%20identifiability%20result%20that%20extends%20existing%20work%20on%20identifying%20structured%20representations.&entry.1838667208=http%3

{"title": "HieraVid: Hierarchical Token Pruning for Fast Video Large Language Models", "author": "Yansong Guo and Chaoyang Zhu and Jiayi Ji and Jianghang Lin and Liujuan Cao", "abstract": "Video Large Language Models (VideoLLMs) have demonstrated impressive capabilities in video understanding, yet the massive number of input video tokens incurs a significant computational burden for deployment. Existing methods mainly prune video tokens at input level while neglecting the inherent information structure embedded in videos and large language models (LLMs). To address this, we propose HieraVid, a hierarchical pruning framework that progressively and dynamically reduces visual redundancy. Based on two observations that videos possess the segment-frame structure and LLMs internally propagate multi-modal information unidirectionally, we decompose pruning into three levels: 1) segment-level, where video tokens are first temporally segmented and spatially merged; 2) frame-level, where similar frames within the same segment are jointly pruned to preserve diversity; 3) layer-level, redundancy gradually shrinks as LLM layer increases w/o compromising performance. We conduct extensive experiments on four widely used video understanding benchmarks to comprehensively evaluate the effectiveness of HieraVid. Remarkably, with only 30% of tokens retained, HieraVid achieves new state-of-the-art performance, while maintaining over 98% and 99% of the performance of LLaVA-Video-7B and LLaVA-OneVision-7B, respectively.", "link": "http://arxiv.org/abs/2604.01881v1", "date": "2026-04-02", "relevancy": 2.6463, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.548}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4917}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HieraVid%3A%20Hierarchical%20Token%20Pruning%20for%20Fast%20Video%20Large%20Language%20Models&body=Title%3A%20HieraVid%3A%20Hierarchical%20Token%20Pruning%20for%20Fast%20Video%20Large%20Language%20Models%0AAuthor%3A%20Yansong%20Guo%20and%20Chaoyang%20Zhu%20and%20Jiayi%20Ji%20and%20Jianghang%20Lin%20and%20Liujuan%20Cao%0AAbstract%3A%20Video%20Large%20Language%20Models%20%28VideoLLMs%29%20have%20demonstrated%20impressive%20capabilities%20in%20video%20understanding%2C%20yet%20the%20massive%20number%20of%20input%20video%20tokens%20incurs%20a%20significant%20computational%20burden%20for%20deployment.%20Existing%20methods%20mainly%20prune%20video%20tokens%20at%20input%20level%20while%20neglecting%20the%20inherent%20information%20structure%20embedded%20in%20videos%20and%20large%20language%20models%20%28LLMs%29.%20To%20address%20this%2C%20we%20propose%20HieraVid%2C%20a%20hierarchical%20pruning%20framework%20that%20progressively%20and%20dynamically%20reduces%20visual%20redundancy.%20Based%20on%20two%20observations%20that%20videos%20possess%20the%20segment-frame%20structure%20and%20LLMs%20internally%20propagate%20multi-modal%20information%20unidirectionally%2C%20we%20decompose%20pruning%20into%20three%20levels%3A%201%29%20segment-level%2C%20where%20video%20tokens%20are%20first%20temporally%20segmented%20and%20spatially%20merged%3B%202%29%20frame-level%2C%20where%20similar%20frames%20within%20the%20same%20segment%20are%20jointly%20pruned%20to%20preserve%20diversity%3B%203%29%20layer-level%2C%20redundancy%20gradually%20shrinks%20as%20LLM%20layer%20increases%20w/o%20compromising%20performance.%20We%20conduct%20extensive%20experiments%20on%20four%20widely%20used%20video%20understanding%20benchmarks%20to%20comprehensively%20evaluate%20the%20effectiveness%20of%20HieraVid.%20Remarkably%2C%20with%20only%2030%25%20of%20tokens%20retained% {"title": "Night Eyes: A Reproducible Framework for Constellation-Based Corneal Reflection Matching", "author": "Virmarie Maquiling and Yasmeen Abdrabou and Enkelejda Kasneci", "abstract": "Corneal reflection (glint) detection plays an important role in pupil-corneal reflection (P-CR) eye tracking, but in practice it is often handled as heuristics embedded within larger systems, making reproducibility difficult across hardware setups. We introduce a 2D geometry-driven, constellation-based pipeline for mulit-glint detection and matching, focusing on reproducibility and clear evaluation. Inspired by lost-in-space star identification, we treat glints as structured constellations rather than independent blobs. We propose a Similarity-Layout Alignment (SLA) procedure which adapts constellation matching to the specific constraints of multi-LED eye tracking. The framework brings together controlled over-detection, adaptive candidate fallback, appearance-aware scoring, and optional semantic layout priors while keeping detection and correspondence explicitly separated. Evaluated on a public multi-LED dataset, the system provides stable identity-preserving correspondence under noisy conditions. We release code, presets, and evaluation scripts to enable transparent replication, comparison, and dataset annotation.", "link": "http://arxiv.org/abs/2604.01909v1", "date": "2026-04-02", "relevancy": 2.6423, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5465}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5341}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5047}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Night%20Eyes%3A%20A%20Reproducible%20Framework%20for%20Constellation-Based%20Corneal%20Reflection%20Matching&body=Title%3A%20Night%20Eyes%3A%20A%20Reproducible%20Framework%20for%20Constellation-Based%20Corneal%20Reflection%20Matching%0AAuthor%3A%20Virmarie%20Maquiling%20and%20Yasmeen%20Abdrabou%20and%20Enkelejda%20Kasneci%0AAbstract%3A%20Corneal%20reflection%20%28glint%29%20detection%20plays%20an%20important%20role%20in%20pupil-corneal%20reflection%20%28P-CR%29%20eye%20tracking%2C%20but%20in%20practice%20it%20is%20often%20handled%20as%20heuristics%20embedded%20within%20larger%20systems%2C%20making%20reproducibility%20difficult%20across%20hardware%20setups.%20We%20introduce%20a%202D%20geometry-driven%2C%20constellation-based%20pipeline%20for%20mulit-glint%20detection%20and%20matching%2C%20focusing%20on%20reproducibility%20and%20clear%20evaluation.%20Inspired%20by%20lost-in-space%20star%20identification%2C%20we%20treat%20glints%20as%20structured%20constellations%20rather%20than%20independent%20blobs.%20We%20propose%20a%20Similarity-Layout%20Alignment%20%28SLA%29%20procedure%20which%20adapts%20constellation%20matching%20to%20the%20specific%20constraints%20of%20multi-LED%20eye%20tracking.%20The%20framework%20brings%20together%20controlled%20over-detection%2C%20adaptive%20candidate%20fallback%2C%20appearance-aware%20scoring%2C%20and%20optional%20semantic%20layout%20priors%20while%20keeping%20detection%20and%20correspondence%20explicitly%20separated.%20Evaluated%20on%20a%20public%20multi-LED%20dataset%2C%20the%20system%20provides%20stable%20identity-preserving%20correspondence%20under%20noisy%20conditions.%20We%20release%20code%2C%20presets%2C%20and%20evaluation%20scripts%20to%20enable%20transparent%20replication%2C%20comparison%2C%20and%20dataset%20annotation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01909v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNight%2520Eyes%253A%2520A%2520Reproducib {"title": "The Expert Strikes Back: Interpreting Mixture-of-Experts Language Models at Expert Level", "author": "Jeremy Herbst and Jae Hee Lee and Stefan Wermter", "abstract": "Mixture-of-Experts (MoE) architectures have become the dominant choice for scaling Large Language Models (LLMs), activating only a subset of parameters per token. While MoE architectures are primarily adopted for computational efficiency, it remains an open question whether their sparsity makes them inherently easier to interpret than dense feed-forward networks (FFNs). We compare MoE experts and dense FFNs using $k$-sparse probing and find that expert neurons are consistently less polysemantic, with the gap widening as routing becomes sparser. This suggests that sparsity pressures both individual neurons and entire experts toward monosemanticity. Leveraging this finding, we zoom out from the neuron to the expert level as a more effective unit of analysis. We validate this approach by automatically interpreting hundreds of experts. This analysis allows us to resolve the debate on specialization: experts are neither broad domain specialists (e.g., biology) nor simple token-level processors. Instead, they function as fine-grained task experts, specializing in linguistic operations or semantic tasks (e.g., closing brackets in LaTeX). Our findings suggest that MoEs are inherently interpretable at the expert level, providing a clearer path toward large-scale model interpretability. Code is available at: https://github.com/jerryy33/MoE_analysis", "link": "http://arxiv.org/abs/2604.02178v1", "date": "2026-04-02", "relevancy": 2.6418, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5462}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5462}, {"title": "Flexible Visual Recognitio {"title": "Maximally Useful and Minimally Redundant: The Key to Self Supervised Learning for Imbalanced Data", "author": "Yash Kumar Sharma and Vineet Padmanabhan", "abstract": "Contrastive self supervised learning(CSSL) usually makes use of the multi-view assumption which states that all relevant information must be shared between all views. The main objective of CSSL is to maximize the mutual information(MI) between representations of different views and at the same time compress irrelevant information in each representation. Recently, as part of future work, Schwartz Ziv & Yan LeCun pointed out that, when the multi-view assumption is violated, one of the most significant challenges in SSL is in identifying new methods to separate relevant from irrelevant information based on alternative assumptions. Taking a cue from this intuition we make the following contributions in this paper: 1) We develop a CSSL framework wherein multiple images and multiple views(MIMV) are considered as input, which is different from the traditional multi-view assumption 2) We adopt a novel augmentation strategy that includes both normalized (invertible) and augmented (non-invertible) views so that complete information of one image can be preserved and hard augmentation can be chosen for the other image 3) An Information bottleneck(IB) principle is outlined for MIMV to produce optimal representations 4) We introduce a loss function that helps to learn better representations by filtering out extreme features 5) The robustness of our proposed framework is established by applying it to the imbalanced dataset problem wherein we achieve a new state-of-the-art accuracy (2% improvement in Cifar10-LT using Resnet-18, 5% improvement in Cifar100-LT using Resnet-18 and 3% improvement in Imagenet-LT (1k) using Resnet-50).", "link": "http://arxiv.org/abs/2509.08469v2", "date": "2026-04-02", "relevancy": 2.6211, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5449}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5235}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5042}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Maximally%20Useful%20and%20Minimally%20Redundant%3A%20The%20Key%20to%20Self%20Supervised%20Learning%20for%20Imbalanced%20Data&body=Title%3A%20Maximally%20Useful%20and%20Minimally%20Redundant%3A%20The%20Key%20to%20Self%20Supervised%20Learning%20for%20Imbalanced%20Data%0AAuthor%3A%20Yash%20Kumar%20Sharma%20and%20Vineet%20Padmanabhan%0AAbstract%3A%20Contrastive%20self%20supervised%20learning%28CSSL%29%20usually%20makes%20use%20of%20the%20multi-view%20assumption%20which%20states%20that%20all%20relevant%20information%20must%20be%20shared%20between%20all%20views.%20The%20main%20objective%20of%20CSSL%20is%20to%20maximize%20the%20mutual%20information%28MI%29%20between%20representations%20of%20different%20views%20and%20at%20the%20same%20time%20compress%20irrelevant%20information%20in%20each%20representation.%20Recently%2C%20as%20part%20of%20future%20work%2C%20Schwartz%20Ziv%20%26%20Yan%20LeCun%20pointed%20out%20that%2C%20when%20the%20multi-view%20assumption%20is%20violated%2C%20one%20of%20the%20most%20significant%20challenges%20in%20SSL%20is%20in%20identifying%20new%20methods%20to%20separate%20relevant%20from%20irrelevant%20information%20based%20on%20alternative%20assumptions.%20Taking%20a%20cue%20from%20this%20intuition%20we%20make%20the%20following%20contributions%20in%20this%20paper%3A%201%29%20We%20develop%20a%20CSSL%20framework%20wherein%20multiple%20images%20and%20multiple%20views%28MIMV%29%20are%20considered%20as%20input%2C%20which%20is%20different%20from%20the%20traditional%20multi-view%20assumption%202%29%20 {"title": "Learning Spatial Structure from Pre-Beamforming Per-Antenna Range-Doppler Radar Data via Visibility-Aware Cross-Modal Supervision", "author": "George Sebastian and Philipp Berthold and Bianca Forkel and Leon Pohl and Mirko Maehlisch", "abstract": "Automotive radar perception pipelines commonly construct angle-domain representations via beamforming before applying learning-based models. This work instead investigates a representational question: can meaningful spatial structure be learned directly from pre-beamforming per-antenna range-Doppler (RD) measurements? Experiments are conducted on a 6-TX x 8-RX (48 virtual antennas) commodity automotive radar employing an A/B chirp-sequence frequency-modulated continuous-wave (CS-FMCW) transmit scheme, in which the effective transmit aperture varies between chirps (single-TX vs. multi-TX), enabling controlled analysis of chirp-dependent transmit configurations. We operate on pre-beamforming per-antenna RD tensors using a dual-chirp shared-weight encoder trained in an end-to-end, fully data-driven manner, and evaluate spatial recoverability using bird's-eye-view (BEV) occupancy as a geometric probe rather than a performance-driven objective. Supervision is visibility-aware and cross-modal, derived from LiDAR with explicit modeling of the radar field-of-view and occlusion-aware LiDAR observability via ray-based visibility. Through chirp ablations (A-only, B-only, A+B), range-band analysis, and physics-aligned baselines, we assess how transmit configurations affect geometric recoverability. The results indicate that spatial structure can be learned directly from pre-beamforming per-antenna RD tensors without explicit angle-domain construction or hand-crafted signal-processing stages.", "link": "http://arxiv.org/abs/2604.01921v1", "date": "2026-04-02", "relevancy": 2.6047, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": {"title": "Support-Contra Asymmetry in LLM Explanations", "author": "Avinash Patil", "abstract": "Large Language Models (LLMs) increasingly produce natural language explanations alongside their predictions, yet it remains unclear whether these explanations reference predictive cues present in the input text. In this work, we present an empirical study of how LLM-generated explanations align with predictive lexical evidence from an external model in text classification tasks. To analyze this relationship, we compare explanation content against interpretable feature importance signals extracted from transparent linear classifiers. These reference models allow us to partition predictive lexical cues into supporting and contradicting evidence relative to the predicted label. Across three benchmark datasets-WIKIONTOLOGY, AG NEWS, and IMDB-we observe a consistent empirical pattern that we term support-contra asymmetry. Explanations accompanying correct predictions tend to reference more supporting lexical cues and fewer contradicting cues, whereas explanations associated with incorrect predictions reference substantially more contradicting evidence. This pattern appears consistently across datasets, across reference model families (logistic regression and linear SVM), and across multiple feature retrieval depths. These results suggest that LLM explanations often reflect lexical signals that are predictive for the task when predictions are correct, while incorrect predictions are more frequently associated with explanations that reference misleading cues present in the input. Our findings provide a simple empirical perspective on explanation-evidence alignment and illustrate how external sources of predictive evidence can be used to analyze the behavior of LLM-generated explanations.", "link": "http://arxiv.org/abs/2510.21884v2", "date": "2026-04-02", "relevancy": 2.6033, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5221}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5221}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5178}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Support-Contra%20Asymmetry%20in%20LLM%20Explanations&body=Title%3A%20Support-Contra%20Asymmetry%20in%20LLM%20Explanations%0AAuthor%3A%20Avinash%20Patil%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20increasingly%20produce%20natural%20language%20explanations%20alongside%20their%20predictions%2C%20yet%20it%20remains%20unclear%20whether%20these%20explanations%20reference%20predictive%20cues%20present%20in%20the%20input%20text.%20In%20this%20work%2C%20we%20present%20an%20empirical%20study%20of%20how%20LLM-generated%20explanations%20align%20with%20predictive%20lexical%20evidence%20from%20an%20external%20model%20in%20text%20classification%20tasks.%20To%20analyze%20this%20relationship%2C%20we%20compare%20explanation%20content%20against%20interpretable%20feature%20importance%20signals%20extracted%20from%20transparent%20linear%20classifiers.%20These%20reference%20models%20allow%20us%20to%20partition%20predictive%20lexical%20cues%20into%20supporting%20and%20contradicting%20evidence%20relative%20to%20the%20predicted%20label.%20Across%20three%20benchmark%20datasets-WIKIONTOLOGY%2C%20AG%20NEWS%2C%20and%20IMDB-we%20observe%20a%20consistent%20empirical%20pattern%20that%20we%20term%20support-contra%20asymmetry.%20Explanations%20accompanying%20correct%20predictions%20tend%20to%20reference%20more%20supporting%20lexical%20cues%20and%20fewer%20contradicting%20cues%2C%20whereas%20explanations%20associated%20with%20incorrect%20predictions%20reference%20substantially%20more%20contradicting%20evidence.%20This%20pattern%20appears%20consistently%20across%20datasets%2C%20across%20reference%20model%20families%20%28logistic%20regression%20and%20linear%20SVM%29%2C%20and%20across%20multiple%20feature%20retrieval%20depths.%20These%20results%20suggest%20that%20LLM%20explanations%20often%20reflect%20lexical%20signals%20that%20are%20predictive%20for%20the%20task%20when%20predictions%20are%20correct%2C%20while%20incorrect%20predictions%20are%20more%20frequently%20associated%20with%20explanations%20that%20reference%20misleading%20cues%20present%20in%20the%20input.%20Our%20findings%20provide%20a%20simple%20empirical%20perspective%20on%20explanation-evidence%20alignment%20and%20illustrate%20how%20external%20sources%20of%20predictive%20evidence%20can%20be%20used%20to%20analyze%20the%20behavior%20of%20LLM-generated%20explanations.%0ALink%3A%20http%3A//arxiv.org/abs/2510.21884v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSupport-Contra%2520Asymmetry%2520in%2520LLM%2520Explanations%26entry.906535625%3DAvinash%2520Patil%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520increasingly%2520produce%2520natural%2520language%2520explanations%2520alongside%2520their%2520predictions%252C%2520yet%2520it%2520remains%2520unclear%2520whether%2520these%2520explanations%2520reference%2520predictive%2520cues%2520present%2520in%2520the%2520input%2520text.%2520In%2520this%2520work%252C%2520we%2520present%2520an%2520empirical%2520study%2520of%2520how%2520LLM-generated%2520explanations%2520align%2520with%2520predictive%2520lexical%2520evidence%2520from%2520an%2520external%2520model%2520in%2520text%2520classification%2520tasks.%2520To%2520analyze%2520this%2520relationship%252C%2520we%2520compare%2520explanation%2520content%2520against%2520interpretable%2520feature%2520importance%2520signals%2520ex {"title": "Multigrade Neural Network Approximation", "author": "Shijun Zhang and Zuowei Shen and Yuesheng Xu", "abstract": "We study multigrade deep learning (MGDL) as a principled framework for structured error refinement in deep neural networks. While the approximation power of neural networks is now relatively well understood, training very deep architectures remains challenging due to highly non-convex and often ill-conditioned optimization landscapes. In contrast, for relatively shallow networks, most notably one-hidden-layer $\\texttt{ReLU}$ models, training admits convex reformulations with global guarantees, motivating learning paradigms that improve stability while scaling to depth. MGDL builds upon this insight by training deep networks grade by grade: previously learned grades are frozen, and each new residual block is trained solely to reduce the remaining approximation error, yielding an interpretable and stable hierarchical refinement process. We develop an operator-theoretic foundation for MGDL and prove that, for any continuous target function, there exists a fixed-width multigrade $\\texttt{ReLU}$ scheme whose residuals decrease strictly across grades and converge uniformly to zero. To the best of our knowledge, this work provides the first rigorous theoretical guarantee that grade-wise training yields provable vanishing approximation error in deep networks. Numerical experiments further illustrate the theoretical results.", "link": "http://arxiv.org/abs/2601.16884v2", "date": "2026-04-02", "relevancy": 2.6033, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5533}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5115}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4971}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multigrade%20Neural%20Network%20Approximation&body=Title%3A%20Multigrade%20Neural%20Network%20Approximation%0AAuthor%3A%20Shijun%20Zhang%20and%20Zuowei%20Shen%20and%20Yuesheng%20Xu%0AAbstract%3A%20We%20study%20multigrade%20deep%20learning%20%28MGDL%29%20as%20a%20principled%20framework%20for%20structured%20error%20refinement%20in%20deep%20neural%20networks.%20While%20the%20approximation%20power%20of%20neural%20networks%20is%20now%20relatively%20well%20understood%2C%20training%20very%20deep%20architectures%20remains%20challenging%20due%20to%20highly%20non-convex%20and%20often%20ill-conditioned%20optimization%20landscapes.%20In%20contrast%2C%20for%20relatively%20shallow%20networks%2C%20most%20notably%20one-hidden-layer%20%24%5Ctexttt%7BReLU%7D%24%20models%2C%20training%20admits%20convex%20reformulations%20with%20global%20guarantees%2C%20motivating%20learning%20paradigms%20that%20improve%20stability%20while%20scaling%20to%20depth.%20MGDL%20builds%20upon%20this%20insight%20by%20training%20deep%20networks%20grade%20by%20grade%3A%20previously%20learned%20grades%20are%20frozen%2C%20and%20each%20new%20residual%20block%20is%20trained%20solely%20to%20reduce%20the%20remaining%20approximation%20error%2C%20yielding%20an%20interpretable%20and%20stable%20hierarchical%20refinement%20process.%20We%20develop%20an%20operator-theoretic%20foundation%20for%20MGDL%20and%20prove%20that%2C%20for%20any%20continuous%20target%20function%2C%20there%20exists%20a%20fixed-width%20multigrade%20%24%5Ctexttt%7BReLU%7D%24%20scheme%20whose%20residuals%20decrease%20strictly%20across%20grades%20and%20converge%20uniformly%20to%20zero.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20work%20provides%20the%20first%20rigorous%20theoretical%20guarantee%20that%20grade-wise%20training%20yields%20provable%20vanishing%20approximation%20error%20in%20deep%20networks.%20Numerical%20experiments%20further%20illustrate%20the%20theoretical%20results.%0ALink%3A%20http%3A//arxiv. {"title": "ViT-Explainer: An Interactive Walkthrough of the Vision Transformer Pipeline", "author": "Juan Manuel Hernandez and Mariana Fernandez-Espinosa and Denis Parra and Diego Gomez-Zara", "abstract": "Transformer-based architectures have become the shared backbone of natural language processing and computer vision. However, understanding how these models operate remains challenging, particularly in vision settings, where images are processed as sequences of patch tokens. Existing interpretability tools often focus on isolated components or expert-oriented analysis, leaving a gap in guided, end-to-end understanding of the full inference pipeline. To bridge this gap, we present ViT-Explainer, a web-based interactive system that provides an integrated visualization of Vision Transformer inference, from patch tokenization to final classification. The system combines animated walkthroughs, patch-level attention overlays, and a vision-adapted Logit Lens within both guided and free exploration modes. A user study with six participants suggests that ViT-Explainer is easy to learn and use, helping users interpret and understand Vision Transformer behavior.", "link": "http://arxiv.org/abs/2604.02182v1", "date": "2026-04-02", "relevancy": 2.5994, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5249}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5249}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5099}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViT-Explainer%3A%20An%20Interactive%20Walkthrough%20of%20the%20Vision%20Transformer%20Pipeline&body=Title%3A%20ViT-Explainer%3A%20An%20Interactive%20Walkthrough%20of%20the%20Vision%20Transf {"title": "CASHG: Context-Aware Stylized Online Handwriting Generation", "author": "Jinsu Shin and Sungeun Hong and Jin Yeong Bak", "abstract": "Online handwriting represents strokes as time-ordered trajectories, which makes handwritten content easier to transform and reuse in a wide range of applications. However, generating natural sentence-level online handwriting that faithfully reflects a writer's style remains challenging, since sentence synthesis demands context-dependent characters with stroke continuity and spacing. Prior methods treat these boundary properties as implicit outcomes of sequence modeling, which becomes unreliable at the sentence scale and under limited compositional diversity. We propose CASHG, a context-aware stylized online handwriting generator that explicitly models inter-character connectivity for style-consistent sentence-level trajectory synthesis. CASHG uses a Character Context Encoder to obtain character identity and sentence-dependent context memory and fuses them in a bigram-aware sliding-window Transformer decoder that emphasizes local predecessor--current transitions, complemented by gated context fusion for sentence-level context.Training proceeds through a three-stage curriculum from isolated glyphs to full sentences, improving robustness under sparse transition coverage. We further introduce Connectivity and Spacing Metrics (CSM), a boundary-aware evaluation suite that quantifies cursive connectivity and spacing similarity. Under benchmark-matched evaluation protocols, CASHG consistently improves CSM over comparison methods while remaining competitive in DTW-based trajectory similarity, with gains corroborated by a human evaluation.", "link": "http://arxiv.org/abs/2604.02103v1", "date": "2026-04-02", "relevancy": 2.5965, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5441}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.522}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4918}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CASHG%3A%20Context-Aware%20Stylized%20Online%20Handwriting%20Generation&body=Title%3A%20CASHG%3A%20Context-Aware%20Stylized%20Online%20Handwriting%20Generation%0AAuthor%3A%20Jinsu%20Shin%20and%20Sungeun%20Hong%20and%20Jin%20Yeong%20Bak%0AAbstract%3A%20Online%20handwriting%20represents%20strokes%20as%20time-ordered%20trajectories%2C%20which%20makes%20handwritten%20content%20easier%20to%20transform%20and%20reuse%20in%20a%20wide%20range%20of%20applications.%20However%2C%20generating%20natural%20sentence-level%20online%20handwriting%20that%20faithfully%20reflects%20a%20writer%27s%20style%20remains%20challenging%2C%20since%20sentence%20synthesis%20demands%20context-dependent%20characters%20with%20stroke%20continuity%20and%20spacing.%20Prior%20methods%20treat%20these%20boundary%20properties%20as%20implicit%20outcomes%20of%20sequence%20modeling%2C%20which%20becomes%20unreliable%20at%20the%20sentence%20scale%20and%20under%20limited%20compositional%20diversity.%20We%20propose%20CASHG%2C%20a%20context-aware%20stylized%20online%20handwriting%20generator%20that%20explicitly%20models%20inter-character%20connectivity%20for%20style-consistent%20sentence-level%20trajectory%20synthesis.%20CASHG%20uses%20a%20Character%20Context%20Encoder%20to%20obtain%20character%20identity%20and%20sentence-dependent%20context%20memory%20and%20fuses%20them%20in%20a%20bigram-aware%20sliding-window%20Transformer%20decoder%20that%20emphasizes%20local%20predecessor--current%20transitions%2C%20complemented%20by%20gated%20context%20fusion%20for%20sentence-level%20context.Training%20proceeds%20through%20a%20three-stage%20curriculum%20from%20isolated%20glyphs%20to%20full%20sentences%2C%20improving%20robustness%20under%20sparse%20transition%20coverage.%20We%20further%20introduce%20Connectivity%20and%20Spacing%20Metrics%20%28CSM%29%2C%20a%20boundary-aware%20evaluation%20suite%20that%20quantifies%20cursive%20connectivity%20and%20spacing%20similarity.%20Under%20benchmark-matched%20evaluation%20protocols%2C%20CASHG%20consistently%20improves%20CSM%20over%20comparison%20methods%20while%20remaining%20competitive%20in%20DTW-based%20trajectory%20similarity%2C%20with%20gains%20corroborated%20by%20a%20human%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02103v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCASHG%253A%2520Context-Aware%2520Stylized%2520Online%2520Handwriting%2520Generation%26entry.906535625%3DJinsu%2520Shin%2520and%2520Sungeun%2520Hong%2520and%2520Jin%2520Yeong%2520Bak%26entry.1292438233%3DOnline%2520handwriting%2520represents%2520strokes%2520as%2520time-ordered%2520trajectories%252C%2520which%2520makes%2520handwritten%2520content%2520easier%2520to%2520transform%2520and%2520reuse%2520in%2520a%2520wide%2520range%2520of%2520applications.%2520However%252C%2520generating%2520natural%2520sentence-level%2520online%2520handwriting%2520that%2520faithfully%2520reflects%2520a%2520writer%2527s%2520style%2520remains%2520challenging%252C%2520since%2520sentence%2520synthesis%2520demands%2520context-dependent%2520characters%2520with%2520stroke%2520continuity%2520and%2520spacing.%2520Prior%2520methods%2520treat%2520these%2520boundary%2520properties%2520as%2520implicit%2520outcomes%2520of%2520sequence%2520modeling%252C%2520which%2520becomes%2520unreliable%2520at%2520the%2520sentence%2520scale%2520and%2520under%2520limited%2520compositional%2520diversity.%2520We%2520propose%2520CASHG%252C%2520a%2520context-aware%2520stylized%2520online%2520handwriting%2520generator%2520that%2520explicitly%2520models%2520inter-character%2520connectivity%2520for%2520style-consistent%2520sentence-level%2520trajectory%2520synthesis.%2520CASHG%2520 {"title": "Batched Contextual Reinforcement: A Task-Scaling Law for Efficient Reasoning", "author": "Bangji Yang and Hongbo Ma and Jiajun Fan and Ge Liu", "abstract": "Large Language Models employing Chain-of-Thought reasoning achieve strong performance but suffer from excessive token consumption that inflates inference costs. Existing efficiency methods such as explicit length penalties, difficulty estimators, or multi-stage curricula either degrade reasoning quality or require complex training pipelines. We introduce Batched Contextual Reinforcement, a minimalist, single-stage training paradigm that unlocks efficient reasoning through a simple structural modification: training the model to solve N problems simultaneously within a shared context window, rewarded purely by per-instance accuracy. This formulation creates an implicit token budget that yields several key findings: (1) We identify a novel task-scaling law: as the number of concurrent problems N increases during inference, per-problem token usage decreases monotonically while accuracy degrades far more gracefully than baselines, establishing N as a controllable throughput dimension. (2) BCR challenges the traditional accuracy-efficiency trade-off by demonstrating a \"free lunch\" phenomenon at standard single-problem inference. Across both 1.5B and 4B model families, BCR reduces token usage by 15.8% to 62.6% while consistently maintaining or improving accuracy across five major mathematical benchmarks. (3) Qualitative analyses reveal emergent self-regulated efficiency, where models autonomously eliminate redundant metacognitive loops without explicit length supervision. (4) Crucially, we empirically demonstrate that implicit budget constraints successfully circumvent the adversarial gradients and catastrophic optimization collapse inherent to explicit length penalties, offering a highly stable, constraint-based alternative for length control. These results prove BCR practical, showing simple structural incentives unlock latent high-density reasoning in LLMs.", "link": "http://arxiv.org/abs/2604.02322v1", "date": "2026-04-02", "relevancy": 2.5716, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5197}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5197}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Batched%20Contextual%20Reinforcement%3A%20A%20Task-Scaling%20Law%20for%20Efficient%20Reasoning&body=Title%3A%20Batched%20Contextual%20Reinforcement%3A%20A%20Task-Scaling%20Law%20for%20Efficient%20Reasoning%0AAuthor%3A%20Bangji%20Yang%20and%20Hongbo%20Ma%20and%20Jiajun%20Fan%20and%20Ge%20Liu%0AAbstract%3A%20Large%20Language%20Models%20employing%20Chain-of-Thought%20reasoning%20achieve%20strong%20performance%20but%20suffer%20from%20excessive%20token%20consumption%20that%20inflates%20inference%20costs.%20Existing%20efficiency%20methods%20such%20as%20explicit%20length%20penalties%2C%20difficulty%20estimators%2C%20or%20multi-stage%20curricula%20either%20degrade%20reasoning%20quality%20or%20require%20complex%20training%20pipelines.%20We%20introduce%20Batched%20Contextual%20Reinforcement%2C%20a%20minimalist%2C%20single-stage%20training%20paradigm%20that%20unlocks%20efficient%20reasoning%20through%20a%20simple%20structural%20modification%3A%20training%20the%20model%20to%20solve%20N%20problems%20simultaneously%20within%20a%20shared%20context%20window%2C%20rewarded%20purely%20by%20per-instance%20accuracy.%20This%20formulation%20creates%20an%20implicit%20token%20budget%20that%20yields%20several%20key%20findings%3A%20%281%29%20We%20identify%20a%20novel%20task-scaling%20law%3A%20as% {"title": "Impact of Multimodal and Conversational AI on Learning Outcomes and Experience", "author": "Karan Taneja and Anjali Singh and Ashok K. Goel", "abstract": "Multimodal Large Language Models (MLLMs) offer an opportunity to support multimedia learning through conversational systems grounded in educational content. However, while conversational AI is known to boost engagement, its impact on learning in visually-rich STEM domains remains under-explored. Moreover, there is limited understanding of how multimodality and conversationality jointly influence learning in generative AI systems. This work reports findings from a randomized controlled online study (N = 124) comparing three approaches to learning biology from textbook content: (1) a document-grounded conversational AI with interleaved text-and-image responses (MuDoC), (2) a document-grounded conversational AI with text-only responses (TexDoC), and (3) a textbook interface with semantic search and highlighting (DocSearch). Learners using MuDoC achieved the highest post-test scores and reported the most positive learning experience. Notably, while TexDoC was rated as significantly more engaging and easier to use than DocSearch, it led to the lowest post-test scores, revealing a disconnect between student perceptions and learning outcomes. Interpreted through the lens of the Cognitive Load Theory, these findings suggest that conversationality reduces extraneous load, while visual-verbal integration induced by multimodality increases germane load, leading to better learning outcomes. When conversationality is not complemented by multimodality, reduced cognitive effort may instead inflate perceived understanding without improving learning outcomes.", "link": "http://arxiv.org/abs/2604.02221v1", "date": "2026-04-02", "relevancy": 2.5625, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.525}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5062}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5062}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Impact%20of%20Multimodal%20and%20Conversational%20AI%20on%20Learning%20Outcomes%20and%20Experience&body=Title%3A%20Impact%20of%20Multimodal%20and%20Conversational%20AI%20on%20Learning%20Outcomes%20and%20Experience%0AAuthor%3A%20Karan%20Taneja%20and%20Anjali%20Singh%20and%20Ashok%20K.%20Goel%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20offer%20an%20opportunity%20to%20support%20multimedia%20learning%20through%20conversational%20systems%20grounded%20in%20educational%20content.%20However%2C%20while%20conversational%20AI%20is%20known%20to%20boost%20engagement%2C%20its%20impact%20on%20learning%20in%20visually-rich%20STEM%20domains%20remains%20under-explored.%20Moreover%2C%20there%20is%20limited%20understanding%20of%20how%20multimodality%20and%20conversationality%20jointly%20influence%20learning%20in%20generative%20AI%20systems.%20This%20work%20reports%20findings%20from%20a%20randomized%20controlled%20online%20study%20%28N%20%3D%20124%29%20comparing%20three%20approaches%20to%20learning%20biology%20from%20textbook%20content%3A%20%281%29%20a%20document-grounded%20conversational%20AI%20with%20interleaved%20text-and-image%20responses%20%28MuDoC%29%2C%20%282%29%20a%20document-grounded%20conversational%20AI%20with%20text-only%20responses%20%28TexDoC%29%2C%20and%20%283%29%20a%20textbook%20interface%20with%20semantic%20search%20and%20highlighting%20%28DocSearch%29.%20Learners%20using%20MuDoC%20achieved%20the%20highest%20post-test%20scores%20and%20reported%20the%20most%20positive%20learning%20experience.%20Notably%2C%20while%20TexDoC%20was%20rated%20as%20significantly%20more%20engaging%20and%20easier%20to%20use%20than%20DocSearch%2C%20it%20led%20to%20the%20lowest%20post-test%20scores%2C%20revealing%20a%20disconnect%20between%20student%20perceptions%20and%20learning%20outcomes.%20Interpreted%20through%20the%20lens%20of%20the%20Cognitive%20Load%20Theory%2C%20these%20findings%20suggest%20that%20conversationality%20reduces%20extraneous%20load%2C%20while%20visual-verbal%20integration%20induced%20by%20multimodality%20increases%20germane%20load%2C%20leading%20to%20better%20learning%20outcomes.%20When%20conversationality%20is%20not%20complemented%20by%20multimodality%2C%20reduced%20cognitive%20effort%20may%20instead%20inflate%20perceived%20understanding%20without%20improving%20learning%20outcomes.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02221v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImpact%2520of%2520Multimodal%2520and%2520Conversational%2520AI%2520on%2520Learning%2520Outcomes%2520and%2520Experience%26entry.906535625%3DKaran%2520Taneja%2520and%2520Anjali%2520Singh%2520and%2520Ashok%2520K.%2520Goel%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520offer%2520an%2520opportunity%2520to%2520support%2520multimedia%2520learning%2520through%2520conversational%2520systems%2520grounded%2520in%2520educational%2520content.%2520However%252C%2520while%2520conversational%2520AI%2520is%2520known%2520to%2520boost%2520engagement%252C%2520its%2520impact%2520on%2520learning%2520in%2520visually-rich%2520STEM%2520domains%2520remains%2520under-explored.%2520Moreover%252C%2520there%2520is%2520limited%2520understanding%2520of%2520how%2520multimodality%2520and%2520conversationality%2520jointly%2520influence%2520learning%2520in%2520generative%2520AI%2520systems.%2520This%2520work%2520reports%2520findings%2520from%2520a%2520randomized%2520controlled%2520online%2520study%2520%2528N%2520%253D%2520124%2529%2520comparing%2520three%2520approaches%2520to%252 {"title": "Tracking the emergence of linguistic structure in self-supervised models learning from speech", "author": "Marianne de Heer Kloots and Martijn Bentum and Hosein Mohebbi and Charlotte Pouw and Gaofei Shen and Willem Zuidema", "abstract": "Self-supervised speech models learn effective representations of spoken language, which have been shown to reflect various aspects of linguistic structure. But when does such structure emerge in model training? We study the encoding of a wide range of linguistic structures, across layers and intermediate checkpoints of six Wav2Vec2 and HuBERT models trained on spoken Dutch. We find that different levels of linguistic structure show notably distinct layerwise patterns as well as learning trajectories, which can partially be explained by differences in their degree of abstraction from the acoustic signal and the timescale at which information from the input is integrated. Moreover, we find that the level at which pre-training objectives are defined strongly affects both the layerwise organization and the learning trajectories of linguistic structures, with greater parallelism induced by higher-order prediction tasks (i.e. iteratively refined pseudo-labels).", "link": "http://arxiv.org/abs/2604.02043v1", "date": "2026-04-02", "relevancy": 2.5615, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5193}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5193}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4984}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tracking%20the%20emergence%20of%20linguistic%20structure%20in%20self-supervised%20models%20learning%20from%20speech&body=Title%3A%20Tracking {"title": "Towards Faithful Reasoning in Comics for Small MLLMs", "author": "Chengcheng Feng and Haojie Yin and Yucheng Jin and Kaizhu Huang", "abstract": "Comic understanding presents a significant challenge for Multimodal Large Language Models (MLLMs), as the intended meaning of a comic often emerges from the joint interpretation of visual, textual, and social cues. This naturally motivates Chain-of-Thought (CoT) prompting, since explicit intermediate reasoning appears promising for integrating such heterogeneous signals. However, existing CoT methods are poorly matched to this structure: they tend to force interpretation into a single reasoning path before multiple cues have been jointly considered, often degrading performance, especially for small MLLMs. Our key idea is to explicitly preserve multi-cue interpretation during supervision construction, rather than collapsing comic understanding into a single reasoning chain. To this end, we propose a two-stage framework for faithful comic reasoning in small MLLMs. First, we introduce MoCoT, a modular supervision construction framework that preserves multi-cue interpretation and turns it into more faithful supervision. Second, we propose VERA, a structured reward mechanism that turns such supervision into faithful reasoning behavior by aligning optimization with both reasoning faithfulness and answer correctness. Extensive experiments on five benchmarks spanning comic understanding and broader humor-centric and abstract visual reasoning tasks demonstrate that our framework achieves strong results in the $\\leq$ 4B regime, surpasses several 7B baselines, improves four small MLLMs by an average of $\\mathbf{12.1%}$ as a plug-in, and consistently enhances reasoning faithfulness while preserving inference efficiency.", "link": "http://arxiv.org/abs/2601.02991v2", "date": "2026-04-02", "relevancy": 2.553, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5141}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5141}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Faithful%20Reasoning%20in%20Comics%20for%20Small%20MLLMs&body=Title%3A%20Towards%20Faithful%20Reasoning%20in%20Comics%20for%20Small%20MLLMs%0AAuthor%3A%20Chengcheng%20Feng%20and%20Haojie%20Yin%20and%20Yucheng%20Jin%20and%20Kaizhu%20Huang%0AAbstract%3A%20Comic%20understanding%20presents%20a%20significant%20challenge%20for%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20as%20the%20intended%20meaning%20of%20a%20comic%20often%20emerges%20from%20the%20joint%20interpretation%20of%20visual%2C%20textual%2C%20and%20social%20cues.%20This%20naturally%20motivates%20Chain-of-Thought%20%28CoT%29%20prompting%2C%20since%20explicit%20intermediate%20reasoning%20appears%20promising%20for%20integrating%20such%20heterogeneous%20signals.%20However%2C%20existing%20CoT%20methods%20are%20poorly%20matched%20to%20this%20structure%3A%20they%20tend%20to%20force%20interpretation%20into%20a%20single%20reasoning%20path%20before%20multiple%20cues%20have%20been%20jointly%20considered%2C%20often%20degrading%20performance%2C%20especially%20for%20small%20MLLMs.%20Our%20key%20idea%20is%20to%20explicitly%20preserve%20multi-cue%20interpretation%20during%20supervision%20construction%2C%20rather%20than%20collapsing%20comic%20understanding%20into%20a%20single%20reasoning%20chain.%20To%20this%20end%2C%20we%20propose%20a%20two-stage%20framework%20for%20faithful%20comic%20reasoning%20in%20small%20MLLMs.%20First%2C%20we%20introduce%20MoCoT%2C%20a%20modular%20supervision%20construction%20framework%20that%20preserves%20multi-cue%20interpretation%20and%20turns%20it%20into%20more%20faithful%20supervision.%20Second%2C%20we%20propose%20VERA%2C%20a%20structured%20reward%20mechanism%20that%20turns%20such%20supervision%20into%20faithful%20reasoning%20behavior%20by%20aligning%20optimization%20with%20both%20reasoning%20faithfulness%20and%20answer%20correctness.%20Extensive%20experiments%20on%20five%20benchmarks%20spanning%20comic%20understanding%20and%20broader%20humor-centric%20and%20abstract%20visual%20reasoning%20tasks%20demonstrate%20that%20our%20framework%20achieves%20strong%20results%20in%20the%20%24%5Cleq%24%204B%20regime%2C%20surpasses%20several%207B%20baselines%2C%20improves%20four%20small%20MLLMs%20by%20an%20average%20of%20%24%5Cmathbf%7B12.1%25%7D%24%20as%20a%20plug-in%2C%20and%20consistently%20enhances%20reasoning%20faithfulness%20while%20preserving%20inference%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2601.02991v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Faithful%2520Reasoning%2520in%2520Comics%2520for%2520Small%2520MLLMs%26entry.906535625%3DChengcheng%2520Feng%2520and%2520Haojie%2520Yin%2520and%2520Yucheng%2520Jin%2520and%2520Kaizhu%2520Huang%26entry.1292438233%3DComic%2520understanding%2520presents%2520a%2520significant%2520challenge%2520for%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%252C%2520as%2520the%2520intended%2520meaning%2520of%2520a%2520comic%2520often%2520emerges%2520from%2520the%2520joint%2520interpretation%2520of%2520visual%252C%2520textual%252C%2520and%2520social%2520cues.%2520This%2520naturally%2520motivates%2520Chain-of-Thought%2520%2528CoT%2529%2520prompting%252C%2520since%2520explicit%2520intermediate%2520reasoning%2520appears%2520promising%2520for%2520integrating%2520such%2520heterogeneous%2520signals.%2520However%252C%2520existing%2520CoT .1838667208%3Dhttp%253A//arxiv.org/abs/2601.02991v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Towards%20Faithful%20Reasoning%20in%20Comics%20for%20Small%20MLLMs&entry.906535625=Chengcheng%20Feng%20and%20Haojie%20Yin%20and%20Yucheng%20Jin%20and%20Kaizhu%20Huang&entry.1292438233=Comic%20understanding%20presents%20a%20significant%20challenge%20for%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20as%20the%20intended%20meaning%20of%20a%20comic%20often%20emerges%20from%20the%20joint%20interpretation%20of%20visual%2C%20textual%2C%20and%20social%20cues.%20This%20naturally%20motivates%20Chain-of-Thought%20%28CoT%29%20prompting%2C%20since%20explicit%20intermediate%20reasoning%20appears%20promising%20for%20integrating%20such%20heterogeneous%20signals.%20However%2C%20existing%20CoT%20methods%20are%20poorly%20matched%20to%20this%20structure%3A%20they%20tend%20to%20force%20interpretation%20into%20a%20single%20reasoning%20path%20before%20multiple%20cues%20have%20been%20jointly%20considered%2C%20often%20degrading%20performance%2C%20especially%20for%20small%20MLLMs.%20Our%20key%20idea%20is%20to%20explicitly%20preserve%20multi-cue%20interpretation%20during%20supervision%20construction%2C%20rather%20than%20collapsing%20comic%20understanding%20into%20a%20single%20reasoning%20chain.%20To%20this%20end%2C%20we%20propose%20a%20two-stage%20framework%20for%20faithful%20comic%20reasoning%20in%20small%20MLLMs.%20First%2C%20we%20introduce%20MoCoT%2C%20a%20modular%20supervision%20construction%20framework%20that%20preserves%20multi-cue%20interpretation%20and%20turns%20it%20into%20more%20faithful%20supervision.%20Second%2C%20we%20propose%20VERA%2C%20a%20structured%20reward%20mechanism%20that%20turns%20such%20supervision%20into%20faithful%20reasoning%20behavior%20by%20aligning%20optimization%20with%20both%20reasoning%20faithfulness%20and%20answer%20correctness.%20Extensive%20exp {"title": "SHARC: Reference point driven Spherical Harmonic Representation for Complex Shapes", "author": "Panagiotis Sapoutzoglou and George Terzakis and Maria Pateraki", "abstract": "We propose SHARC, a novel framework that synthesizes arbitrary, genus-agnostic shapes by means of a collection of Spherical Harmonic (SH) representations of distance fields. These distance fields are anchored at optimally placed reference points in the interior volume of the surface in a way that maximizes learning of the finer details of the surface. To achieve this, we employ a cost function that jointly maximizes sparsity and centrality in terms of positioning, as well as visibility of the surface from their location. For each selected reference point, we sample the visible distance field to the surface geometry via ray-casting and compute the SH coefficients using the Fast Spherical Harmonic Transform (FSHT). To enhance geometric fidelity, we apply a configurable low-pass filter to the coefficients and refine the output using a local consistency constraint based on proximity. Evaluation of SHARC against state-of-the-art methods demonstrates that the proposed method outperforms existing approaches in both reconstruction accuracy and time efficiency without sacrificing model parsimony. The source code is available at https://github.com/POSE-Lab/SHARC.", "link": "http://arxiv.org/abs/2604.01894v1", "date": "2026-04-02", "relevancy": 2.5478, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5204}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5198}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4885}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SHARC%3A%20Reference%20point%20driven%20Spherical%20Harmonic%20Representation%20for%20Complex%20Shapes&body=Title%3A%20SHARC%3A%20Reference%20point%20driven%20Spherical%20Harmonic%20Representation%20for%20Complex%20Shapes%0AAuthor%3A%20Panagiotis%20Sapoutzoglou%20and%20George%20Terzakis%20and%20Maria%20Pateraki%0AAbstract%3A%20We%20propose%20SHARC%2C%20a%20novel%20framework%20that%20synthesizes%20arbitrary%2C%20genus-agnostic%20shapes%20by%20means%20of%20a%20collection%20of%20Spherical%20Harmonic%20%28SH%29%20representations%20of%20distance%20fields.%20These%20distance%20fields%20are%20anchored%20at%20optimally%20placed%20reference%20points%20in%20the%20interior%20volume%20of%20the%20surface%20in%20a%20way%20that%20maximizes%20learning%20of%20the%20finer%20details%20of%20the%20surface.%20To%20achieve%20this%2C%20we%20employ%20a%20cost%20function%20that%20jointly%20maximizes%20sparsity%20and%20centrality%20in%20terms%20of%20positioning%2C%20as%20well%20as%20visibility%20of%20the%20surface%20from%20their%20location.%20For%20each%20selected%20reference%20point%2C%20we%20sample%20the%20visible%20distance%20field%20to%20the%20surface%20geometry%20via%20ray-casting%20and%20compute%20the%20SH%20coefficients%20using%20the%20Fast%20Spherical%20Harmonic%20Transform%20%28FSHT%29.%20To%20enhance%20geometric%20fidelity%2C%20we%20apply%20a%20configurable%20low-pass%20filter%20to%20the%20coefficients%20and%20refine%20the%20output%20using%20a%20local%20consistency%20constraint%20based%20on%20proximity.%20Evaluation%20of%20SHARC%20against%20state-of-the-art%20methods%20demonstrates%20that%20the%20proposed%20method%20outperforms%20existing%20approaches%20in%20both%20reconstruction%20accuracy%20and%20time%20efficiency%20without%20sacrificing%20model%20parsimony.%20The%20source%20code%20is%20available%20at%20https%3A//github.com/POSE-Lab/SHARC.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01894v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848 0parsimony.%20The%20source%20code%20is%20available%20at%20https%3A//github.com/POSE-Lab/SHARC.&entry.1838667208=http%3A//arxiv.org/abs/2604.01894v1&entry.124074799=Read"},
{"title": "Jagle: Building a Large-Scale Japanese Multimodal Post-Training Dataset for Vision-Language Models", "author": "Issa Sugiura and Keito Sasagawa and Keisuke Nakao and Koki Maeda and Ziqi Yin and Zhishen Yang and Shuhei Kurita and Yusuke Oda and Ryoko Tokuhisa and Daisuke Kawahara and Naoaki Okazaki", "abstract": "Developing vision-language models (VLMs) that generalize across diverse tasks requires large-scale training datasets with diverse content. In English, such datasets are typically constructed by aggregating and curating numerous existing visual question answering (VQA) resources. However, this strategy does not readily extend to other languages, where VQA datasets remain limited in both scale and domain coverage, posing a major obstacle to building high-quality multilingual and non-English VLMs. In this work, we introduce Jagle, the largest Japanese multimodal post-training dataset to date, comprising approximately 9.2 million instances across diverse tasks. Rather than relying on existing VQA datasets, we collect heterogeneous source data, including images, image-text pairs, and PDF documents, and generate VQA pairs through multiple strategies such as VLM-based QA generation, translation, and text rendering. Experiments demonstrate that a 2.2B model trained with Jagle achieves strong performance on Japanese tasks, surpassing InternVL3.5-2B in average score across ten Japanese evaluation tasks and approaching within five points of Qwen3-VL-2B-Instruct. Furthermore, combining Jagle with FineVision does not degrade English performance; instead, it improves English performance compared to training with FineVision alone. To facilitate reproducibility and future research, we release the dataset, trained models, and code.", "link": "http://arxiv.org/abs/2604.02048v1", "date": "2026-04-02", "relevancy": 2.54, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5102}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5101}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5037}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Jagle%3A%20Building%20a%20Large-Scale%20Japanese%20Multimodal%20Post-Training%20Dataset%20for%20Vision-Language%20Models&body=Title%3A%20Jagle%3A%20Building%20a%20Large-Scale%20Japanese%20Multimodal%20Post-Training%20Dataset%20for%20Vision-Language%20Models%0AAuthor%3A%20Issa%20Sugiura%20and%20Keito%20Sasagawa%20and%20Keisuke%20Nakao%20and%20Koki%20Maeda%20and%20Ziqi%20Yin%20and%20Zhishen%20Yang%20and%20Shuhei%20Kurita%20and%20Yusuke%20Oda%20and%20Ryoko%20Tokuhisa%20and%20Daisuke%20Kawahara%20and%20Naoaki%20Okazaki%0AAbstract%3A%20Developing%20vision-language%20models%20%28VLMs%29%20that%20generalize%20across%20diverse%20tasks%20requires%20large-scale%20training%20datasets%20with%20diverse%20content.%20In%20English%2C%20such%20datasets%20are%20typically%20constructed%20by%20aggregating%20and%20curating%20numerous%20existing%20visual%20question%20answering%20%28VQA%29%20resources.%20However%2C%20this%20strategy%20does%20not%20readily%20extend%20to%20other%20languages%2C%20where%20VQA%20datasets%20remain%20limited%20in%20both%20scale%20and%20domain%20coverage%2C%20posing%20a%20major%20obstacle%20to%20building%20high-quality%20multilingual%20and%20non-English%20VLMs.%20In%20this%20work%2C%20we%20introduce%20Jagle%2C%20the%20largest%20Japanese%20multimodal%20post-training%20dataset%20to%20date%2C%20comprising%20approximately%209.2%20million%20instances%20across%20diverse%20tasks.%20Rather%20than%20relying%20on%20existing%20VQA%20datasets%2C%20we%20collect%20heterogeneous%20source%20data%2C%20including%20images%2C%20image-text%20pairs%2C%20and%20PDF%20documents%2C%20and%20generate%20VQA%20pairs%20through%20multiple%20strategies%20such%20as%20VLM-based%20QA%20generation%2C%20translation%2C%20and%20text%20rendering.%20Experiments%20demonstrate%20that%20a%202.2B%20model%20trained%20with%20Jagle%20achieves%20strong%20performance%20on%20Japanese%20tasks%2C%20surpassing%20InternVL3.5-2B%20in%20average%20score%20across%20ten%20Japanese%20evaluation%20tasks%20and%20approaching%20within%20five%20points%20of%20Qwen3-VL-2B-Instruct.%20Furthermore%2C%20combining%20Jagle%20with%20FineVision%20does%20not%20degrade%20English%20performance%3B%20instead%2C%20it%20improves%20English%20performance%20compared%20to%20training%20with%20FineVision%20alone.%20To%20facilitate%20reproducibility%20and%20future%20research%2C%20we%20release%20the%20dataset%2C%20trained%20models%2C%20and%20code.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02048v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJagle%253A%2520Building%2520a%2520Large-Scale%2520Japanese%2520Multimodal%2520Post-Training%2520Dataset%2520for%2520Vision-Language%2520Models%26entry.906535625%3DIssa%2520Sugiura%2520and%2520Keito%2520Sasagawa%2520and%2520Keisuke%2520Nakao%2520and%2520Koki%2520Maeda%2520and%2520Ziqi%2520Yin%2520and%2520Zhishen%2520Yang%2520and%2520Shuhei%2520Kurita%2520and%2520Yusuke%2520Oda%2520and%2520Ryoko%2520Tokuhisa%2520and%2520Daisuke%2520Kawahara%2520and%2520Naoaki%2520Okazaki%26entry.1292438233%3DDeveloping%2520vision-language%2520models%2520%2528VLMs%2529%2520that%2520generalize%2520across%2520diverse%2520tasks%2520requires%2520large-scale%2520training%2520datasets%2520with%2520diverse%2520content.%2520In%2520English%252C%2520such%2520datasets%2520are%2520typically%2520constructed%2520by%2520aggregating%2520and%2520curating%2520numerous%2520existing%2520visual%2520question%2520answering%2520%2528VQA%2529%2520resources.%2520However%252C%2520this%2520strategy%2520does%2520not%2520readily%2520extend%2520to 0performance%3B%20instead%2C%20it%20improves%20English%20performance%20compared%20to%20training%20with%20FineVision%20alone.%20To%20facilitate%20reproducibility%20and%20future%20research%2C%20we%20release%20the%20dataset%2C%20trained%20models%2C%20and%20code.&entry.1838667208=http%3A//arxiv.org/abs/2604.02048v1&entry.124074799=Read"},
{"title": "Lifting Unlabeled Internet-level Data for 3D Scene Understanding", "author": "Yixin Chen and Yaowei Zhang and Huangyue Yu and Junchao He and Yan Wang and Jiangyong Huang and Hongyu Shen and Junfeng Ni and Shaofei Wang and Baoxiong Jia and Song-Chun Zhu and Siyuan Huang", "abstract": "Annotated 3D scene data is scarce and expensive to acquire, while abundant unlabeled videos are readily available on the internet. In this paper, we demonstrate that carefully designed data engines can leverage web-curated, unlabeled videos to automatically generate training data, to facilitate end-to-end models in 3D scene understanding alongside human-annotated datasets. We identify and analyze bottlenecks in automated data generation, revealing critical factors that determine the efficiency and effectiveness of learning from unlabeled data. To validate our approach across different perception granularities, we evaluate on three tasks spanning low-level perception, i.e., 3D object detection and instance segmentation, to high-evel reasoning, i.e., 3D spatial Visual Question Answering (VQA) and Vision-Lanugage Navigation (VLN). Models trained on our generated data demonstrate strong zero-shot performance and show further improvement after finetuning. This demonstrates the viability of leveraging readily available web data as a path toward more capable scene understanding systems.", "link": "http://arxiv.org/abs/2604.01907v1", "date": "2026-04-02", "relevancy": 2.5364, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6353}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6353}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6282}], "mailto": "ma {"title": "Cross-attentive Cohesive Subgraph Embedding to Mitigate Oversquashing in GNNs", "author": "Tanvir Hossain and Muhammad Ifte Khairul Islam and Lilia Chebbah and Charles Fanning and Esra Akbas", "abstract": "Graph neural networks (GNNs) have achieved strong performance across various real-world domains. Nevertheless, they suffer from oversquashing, where long-range information is distorted as it is compressed through limited message-passing pathways. This bottleneck limits their ability to capture essential global context and decreases their performance, particularly in dense and heterophilic regions of graphs. To address this issue, we propose a novel graph learning framework that enriches node embeddings via cross-attentive cohesive subgraph representations to mitigate the impact of excessive long-range dependencies. This framework enhances the node representation by emphasizing cohesive structure in long-range information but removing noisy or irrelevant connections. It preserves essential global context without overloading the narrow bottlenecked channels, which further mitigates oversquashing. Extensive experiments on multiple benchmark datasets demonstrate that our model achieves consistent improvements in classification accuracy over standard baseline methods.", "link": "http://arxiv.org/abs/2603.27529v3", "date": "2026-04-02", "relevancy": 2.5276, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5188}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5036}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4942}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-attentive%20Cohesive%20Subgraph%20Embedding%20to%20Mitigate%20Oversquashing%20in%20GNNs&body=Title%3A%20Cross-attentive%20Cohesive%20Subgraph%20Embedding%20to%20Mitigate%20Oversquashing%20in%20GNNs%0AAuthor%3A%20Tanvir%20Hossain%20and%20Muhammad%20Ifte%20Khairul%20Islam%20and%20Lilia%20Chebbah%20and%20Charles%20Fanning%20and%20Esra%20Akbas%0AAbstract%3A%20Graph%20neural%20networks%20%28GNNs%29%20have%20achieved%20strong%20performance%20across%20various%20real-world%20domains.%20Nevertheless%2C%20they%20suffer%20from%20oversquashing%2C%20where%20long-range%20information%20is%20distorted%20as%20it%20is%20compressed%20through%20limited%20message-passing%20pathways.%20This%20bottleneck%20limits%20their%20ability%20to%20capture%20essential%20global%20context%20and%20decreases%20their%20performance%2C%20particularly%20in%20dense%20and%20heterophilic%20regions%20of%20graphs.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20graph%20learning%20framework%20that%20enriches%20node%20embeddings%20via%20cross-attentive%20cohesive%20subgraph%20representations%20to%20mitigate%20the%20impact%20of%20excessive%20long-range%20dependencies.%20This%20framework%20enhances%20the%20node%20representation%20by%20emphasizing%20cohesive%20structure%20in%20long-range%20information%20but%20removing%20noisy%20or%20irrelevant%20connections.%20It%20preserves%20essential%20global%20context%20without%20overloading%20the%20narrow%20bottlenecked%20channels%2C%20which%20further%20mitigates%20oversquashing.%20Extensive%20experiments%20on%20multiple%20benchmark%20datasets%20demonstrate%20that%20our%20model%20achieves%20consistent%20improvements%20in%20classification%20accuracy%20over%20standard%20baseline%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.27529v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-attentive%2520Cohesive%2520Subgraph%2520Embedding%2520to%2520Mitigate%2520Oversquashing%2520in%2520GNNs%26entry.906535625%3DTanvir%2520Hossain%2520and%2520Muhammad%2520Ifte%2520Khairul%2520Islam%2520and%2520Lilia%2520Chebbah%2520and%2520Charles%2520Fanning%2520and%2520Esra%2520Akbas%26entry.1292438233%3DGraph%2520neural%2520networks%2520%2528GNNs%2529%2520have%2520achieved%2520strong%2520performance%2520across%2520various%2520real-world%2520domains.%2520Nevertheless%252C%2520they%2520suffer%2520from%2520oversquashing%252C%2520where%2520long-range%2520information%2520is%2520distorted%2520as%2520it%2520is%2520compressed%2520through%2520limited%2520message-passing%2520pathways.%2520This%2520bottleneck%2520limits%2520their%2520ability%2520to%2520capture%2520essential%2520global%2520context%2520and%2520decreases%2520their%2520performance%252C%2520particularly%2520in%2520dense%2520and%2520heterophilic%2520regions%2520of%2520graphs.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520a%2520novel%2520graph%2520learning%2520framework%2520that%2520enriches%2520node%2520embeddings%2520via%2520cross-attentive%2520cohesive%2520subgraph%2520representations%2520to%2520mitigate%2520the%2520impact%2520of%2520excessive%2520long-range%2520dependencies.%2520This%2520framework%2520enhances%2520the%2520node%2520representation%2520by%2520emphasizing%2520cohesive%2520structure%2520in%2520long-range%2520information%2520but%2520removing%2520noisy%2520or%2520irrelevant%2520connections.%2520It%2520preserves%2520essential%2520global%2520context%2520without%2520overloading%2520the%2520narrow%2520bottlenecked%2520channels%252C%2520which%2520further%2520mitigates%2520oversquashing.%2520Extensive%2520experiments%2520on%2520multiple%2520benchmark%2520datasets%2520demonstrate%2520that%2520our%2520model%2520achieves%2520consistent%2520improvements%2520in%2520classification%2520accuracy%2520over%2520standard%2520baseline%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.27529v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Cross-attentive%20Cohesive%20Subgraph%20Embedding%20to%20Mitigate%20Oversquashing%20in%20GNNs&entry.906535625=Tanvir%20Hossain%20and%20Muhammad%20Ifte%20Khairul%20Islam%20and%20Lilia%20Chebbah%20and%20Charles%20Fanning%20and%20Esra%20Akbas&entry.1292438233=Graph%20neural%20networks%20%28GNNs%29%20have%20achieved%20strong%20performance%20across%20various%20real-world%20domains.%20Nevertheless%2C%20they%20suffer%20from%20oversquashing%2C%20where%20long-range%20information%20is%20distorted%20as%20it%20is%20compressed%20through%20limited%20message-passing%20pathways.%20This%20bottleneck%20limits%20their%20ability%20to%20capture%20essential%20global%20context%20and%20decreases%20their%20performance%2C%20particularly%20in%20dense%20and%20heterophilic%20regions%20of%20graphs.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20graph%20learning%20framework%20that%20enriches%20node%20embeddings%20via%20cross-attentive%20cohesive%20subgraph%20representations%20to%20mitigate%20the%20impact%20of%20excessive%20long-range%20dependencies.%20This%20framework%20enhances%20the%20node%20representation%20by%20emphasizing%20cohesive%20structure%20in%20long-range%20information%20but%20removing%20noisy%20or%20irrelevant%20connections.%20It%20preserves%20essential%20global%20context%20without%20overloading%20the%20narrow%20bottlenecked%20channels%2C%20which%20further%20mitigates%20oversquashing.%20Extensive%20experiments%20on%20multiple%20benchmark%20datasets%20demonstrate%20that%20our%20model%20achieves%20consistent%20improvements%20in%20classification%20accuracy%20over%20standard%20baseline%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2603.27529v3&entry.124074799=Read"},
{"title": "Beyond the Assistant Turn: User Turn Generation as a Probe of Interaction Awareness in Language Models", "author": "Sarath Shekkizhar and Romain Cosentino and Adam Earle", "abstract": "Standard LLM benchmarks evaluate the assistant turn: the model generates a response to an input, a verifier scores correctness, and the analysis ends. This paradigm leaves unmeasured whether the LLM encodes any awareness of what follows the assistant response. We propose user-turn generation as a probe of this gap: given a conversation context of user query and assistant response, we let a model generate under the user role. If the model's weights encode interaction awareness, the generated user turn will be a grounded follow-up that reacts to the preceding context. Through experiments across $11$ open-weight LLMs (Qwen3.5, gpt-oss, GLM) and $5$ datasets (math reasoning, instruction following, conversation), we show that interaction awareness is decoupled from task accuracy. In particular, within the Qwen3.5 family, GSM8K accuracy scales from $41\\%$ ($0.8$B) to $96.8\\%$ ($397$B-A$17$B), yet genuine follow-up rates under deterministic generation remain near zero. In contrast, higher temperature sampling reveals interaction awareness is latent with follow up rates reaching $22\\%$. Controlled perturbations validate that the proposed probe measures a real property of the model, and collaboration-oriented post-training on Qwen3.5-2B demonstrates an increase in follow-up rates. Our results show that user-turn generation captures a dimension of LLM behavior, interaction awareness, that is unexplored and invisible with current assistant-only benchmarks.", "link": "http://arxiv.org/abs/2604.02315v1", "date": "2026-04-02", "relevancy": 2.5115, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5347}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.49 re%20sampling%20reveals%20interaction%20awareness%20is%20latent%20with%20follow%20up%20rates%20reaching%20%2422%5C%25%24.%20Controlled%20perturbations%20validate%20that%20the%20proposed%20probe%20measures%20a%20real%20property%20of%20the%20model%2C%20and%20collaboration-oriented%20post-training%20on%20Qwen3.5-2B%20demonstrates%20an%20increase%20in%20follow-up%20rates.%20Our%20results%20show%20that%20user-turn%20generation%20captures%20a%20dimension%20of%20LLM%20behavior%2C%20interaction%20awareness%2C%20that%20is%20unexplored%20and%20invisible%20with%20current%20assistant-only%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02315v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520the%2520Assistant%2520Turn%253A%2520User%2520Turn%2520Generation%2520as%2520a%2520Probe%2520of%2520Interaction%2520Awareness%2520in%2520Language%2520Models%26entry.906535625%3DSarath%2520Shekkizhar%2520and%2520Romain%2520Cosentino%2520and%2520Adam%2520Earle%26entry.1292438233%3DStandard%2520LLM%2520benchmarks%2520evaluate%2520the%2520assistant%2520turn%253A%2520the%2520model%2520generates%2520a%2520response%2520to%2520an%2520input%252C%2520a%2520verifier%2520scores%2520correctness%252C%2520and%2520the%2520analysis%2520ends.%2520This%2520paradigm%2520leaves%2520unmeasured%2520whether%2520the%2520LLM%2520encodes%2520any%2520awareness%2520of%2520what%2520follows%2520the%2520assistant%2520response.%2520We%2520propose%2520user-turn%2520generation%2520as%2520a%2520probe%2520of%2520this%2520gap%253A%2520given%2520a%2520conversation%2520context%2520of%2520user%2520query%2520and%2520assistant%2520response%252C%2520we%2520let%2520a%2520model%2520generate%2520under%2520the%2520user%2520role.%2520If%2520the%2520model%2527s%2520weights%2520encode%2520interaction%2520awareness%252C%2520the%2520generated%2520user%2520turn%2520will%2520be%2520a%2520grounded%2520follow-up%2520that%2520reacts%2520to%2520the

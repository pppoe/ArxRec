{"title": "Human Insights Driven Latent Space for Different Driving Perspectives: A Unified Encoder for Efficient Multi-Task Inference", "author": "Huy-Dung Nguyen and Anass Bairouk and Mirjana Maras and Wei Xiao and Tsun-Hsuan Wang and Patrick Chareyre and Ramin Hasani and Marc Blanchon and Daniela Rus", "abstract": "Autonomous driving systems require a comprehensive understanding of the environment, achieved by extracting visual features essential for perception, planning, and control. However, models trained solely on single-task objectives or generic datasets often lack the contextual information needed for robust performance in complex driving scenarios. In this work, we propose a unified encoder trained on multiple computer vision tasks crucial for urban driving, including depth, pose, and 3D scene flow estimation, as well as semantic, instance, panoptic, and motion segmentation. By integrating these diverse visual cues-similar to human perceptual mechanisms-the encoder captures rich features that enhance navigation-related predictions. We evaluate the model on steering estimation as a downstream task, leveraging its dense latent space. To ensure efficient multi-task learning, we introduce a multi-scale feature network for pose estimation and apply knowledge distillation from a multi-backbone teacher model. Our findings highlight two key findings: (1) the unified encoder achieves competitive performance across all visual perception tasks, demonstrating strong generalization capabilities; and (2) for steering estimation, the frozen unified encoder-leveraging dense latent representations-outperforms both its fine-tuned counterpart and the same frozen model pretrained on generic datasets like ImageNet. These results underline the significance of task-specific visual features and demonstrate the promise of multi-task learning in advancing autonomous driving systems. More details and the pretrained model are available at https://hi-computervision.github.io/uni-encoder/.", "link": "http://arxiv.org/abs/2409.10095v3", "date": "2026-04-02", "relevancy": 2.4915, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6231}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6231}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6215}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Human%20Insights%20Driven%20Latent%20Space%20for%20Different%20Driving%20Perspectives%3A%20A%20Unified%20Encoder%20for%20Efficient%20Multi-Task%20Inference&body=Title%3A%20Human%20Insights%20Driven%20Latent%20Space%20for%20Different%20Driving%20Perspectives%3A%20A%20Unified%20Encoder%20for%20Efficient%20Multi-Task%20Inference%0AAuthor%3A%20Huy-Dung%20Nguyen%20and%20Anass%20Bairouk%20and%20Mirjana%20Maras%20and%20Wei%20Xiao%20and%20Tsun-Hsuan%20Wang%20and%20Patrick%20Chareyre%20and%20Ramin%20Hasani%20and%20Marc%20Blanchon%20and%20Daniela%20Rus%0AAbstract%3A%20Autonomous%20driving%20systems%20require%20a%20comprehensive%20understanding%20of%20the%20environment%2C%20achieved%20by%20extracting%20visual%20features%20essential%20for%20perception%2C%20planning%2C%20and%20control.%20However%2C%20models%20trained%20solely%20on%20single-task%20objectives%20or%20generic%20datasets%20often%20lack%20the%20contextual%20information%20needed%20for%20robust%20performance%20in%20complex%20driving%20scenarios.%20In%20this%20work%2C%20we%20propose%20a%20unified%20encoder%20trained%20on%20multiple%20computer%20vision%20tasks%20crucial%20for%20urban%20driving%2C%20including%20depth%2C%20pose%2C%20and%203D%20scene%20flow%20estimation%2C%20as%20well%20as%20semantic%2C%20instance%2C%20panoptic%2C%20and%20motion%20segmentation.%20By%20integrating%20these%20diverse%20visual%20cues-similar%20to%20human%20perceptual%20mechanisms-the%20encoder%20captures%20rich%20features%20that%20enhance%20navigation-related%20predictions.%20We%20evaluate%20the%20model%20on%20steering%20estimation%20as%20a%20downstream%20task%2C%20leveraging%20its%20dense%20latent%20space.%20To%20ensure%20efficient%20multi-task%20learning%2C%20we%20introduce%20a%20multi-scale%20feature%20network%20for%20pose%20estimation%20and%20apply%20knowledge%20distillation%20from%20a%20multi-backbone%20teacher%20model.%20Our%20findings%20highlight%20two%20key%20findings%3A%20%281%29%20the%20unified%20encoder%20achieves%20competitive%20performance%20across%20all%20visual%20perception%20tasks%2C%20demonstrating%20strong%20generalization%20capabilities%3B%20and%20%282%29%20for%20steering%20estimation%2C%20the%20frozen%20unified%20encoder-leveraging%20dense%20latent%20representations-outperforms%20both%20its%20fine-tuned%20counterpart%20and%20the%20same%20frozen%20model%20pretrained%20on%20generic%20datasets%20like%20ImageNet.%20These%20results%20underline%20the%20significance%20of%20task-specific%20visual%20features%20and%20demonstrate%20the%20promise%20of%20multi-task%20learning%20in%20advancing%20autonomous%20driving%20systems.%20More%20details%20and%20the%20pretrained%20model%20are%20available%20at%20https%3A//hi-computervision.github.io/uni-encoder/.%0ALink%3A%20http%3A//arxiv.org/abs/2409.10095v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHuman%2520Insights%2520Driven%2520Latent%2520Space%2520for%2520Different%2520Driving%2520Perspectives%253A%2520A%2520Unified%2520Encoder%2520for%2520Efficient%2520Multi-Task%2520Inference%26entry.906535625%3DHuy-Dung%2520Nguyen%2520and%2520Anass%2520Bairouk%2520and%2520Mirjana%2520Maras%2520and%2520Wei%2520Xiao%2520and%2520Tsun-Hsuan%2520Wang%2520and%2520Patrick%2520Chareyre%2520and%2520Ramin%2520Hasani%2520and%2520Marc%2520Blanchon {"title": "Goose: Anisotropic Speculation Trees for Training-Free Speculative Decoding", "author": "Tao Jin and Phuong Minh Nguyen and Naoya Inoue", "abstract": "Speculative decoding accelerates large language model inference by drafting multiple candidate tokens and verifying them in a single forward pass. Candidates are organized as a tree: deeper trees accept more tokens per step, but adding depth requires sacrificing breadth (fallback options) under a fixed verification budget. Existing training-free methods draft from a single token source and shape their trees without distinguishing candidate quality across origins. We observe that two common training-free token sources - n-gram matches copied from the input context, and statistical predictions from prior forward passes - differ dramatically in acceptance rate (~6x median gap, range 2-18x across five models and five benchmarks). We prove that when such a quality gap exists, the optimal tree is anisotropic (asymmetric): reliable tokens should form a deep chain while unreliable tokens spread as wide branches, breaking through the depth limit of balanced trees. We realize this structure in GOOSE, a training-free framework that builds an adaptive spine tree - a deep chain of high-acceptance context-matched tokens with wide branches of low-acceptance alternatives at each node. We prove that the number of tokens accepted per step is at least as large as that of either source used alone. On five LLMs (7B-33B) and five benchmarks, GOOSE achieves 1.9-4.3x lossless speedup, outperforming balanced-tree baselines by 12-33% under the same budget.", "link": "http://arxiv.org/abs/2604.02047v1", "date": "2026-04-02", "relevancy": 2.4863, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5085}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com {"title": "Generative AI Spotlights the Human Core of Data Science: Implications for Education", "author": "Nathan Taback", "abstract": "Generative AI (GAI) reveals an irreducible human core at the center of data science: advances in GAI should sharpen, rather than diminish, the focus on human reasoning in data science education. GAI can now execute many routine data science workflows, including cleaning, summarizing, visualizing, modeling, and drafting reports. Yet the competencies that matter most remain irreducibly human: problem formulation, measurement and design, causal identification, statistical and computational reasoning, ethics and accountability, and sensemaking. Drawing on Donoho's Greater Data Science framework, Nolan and Temple Lang's vision of computational literacy, and the McLuhan-Culkin insight that we shape our tools and thereafter our tools shape us, this paper traces the emergence of data science through three converging lineages: Tukey's intellectual vision of data analysis as a science, the commercial logic of surveillance capitalism that created industrial demand for data scientists, and the academic programs that followed. Mapping GAI's impact onto Donoho's six divisions of Greater Data Science shows that computing with data (GDS3) has been substantially automated, while data gathering, preparation, and exploration (GDS1) and science about data science (GDS6) still require essential human input. The educational implication is that data science curricula should focus on this human core while teaching students how to contribute effectively within iterative prompt-output-prompt cycles using retrieval-augmented generation, and that learning outcomes and assessments should explicitly evaluate reasoning and judgment.", "link": "http://arxiv.org/abs/2604.02238v1", "date": "2026-04-02", "relevancy": 2.4805, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5045}, {"title": {"title": "CoRegOVCD: Consistency-Regularized Open-Vocabulary Change Detection", "author": "Weidong Tang and Hanbin Sun and Zihan Li and Yikai Wang and Feifan Zhang", "abstract": "Remote sensing change detection (CD) aims to identify where land-cover semantics change across time, but most existing methods still assume a fixed label space and therefore cannot answer arbitrary user-defined queries. Open-vocabulary change detection (OVCD) instead asks for the change mask of a queried concept. In the fully training-free setting, however, dense concept responses are difficult to compare directly across dates: appearance variation, weak cross-concept competition, and the spatial continuity of many land-cover categories often produce noisy, fragmented, and semantically unreliable change evidence. We propose Consistency-Regularized Open-Vocabulary Change Detection (CoRegOVCD), a training-free dense inference framework that reformulates concept-specific change as calibrated posterior discrepancy. Competitive Posterior Calibration (CPC) and the Semantic Posterior Delta (SPD) convert raw concept responses into competition-aware queried-concept posteriors and quantify their cross-temporal discrepancy, making semantic change evidence more comparable without explicit instance matching. Geometry-Token Consistency Gate (GeoGate) and Regional Consensus Discrepancy (RCD) further suppress unsupported responses and improve spatial coherence through geometry-aware structural verification and regional consensus. Across four benchmarks spanning building-oriented and multi-class settings, CoRegOVCD consistently improves over the strongest previous training-free baseline by 2.24 to 4.98 F1$_C$ points and reaches a six-class average of 47.50% F1$_C$ on SECOND.", "link": "http://arxiv.org/abs/2604.02160v1", "date": "2026-04-02", "relevancy": 2.4767, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4989}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4989}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4881}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoRegOVCD%3A%20Consistency-Regularized%20Open-Vocabulary%20Change%20Detection&body=Title%3A%20CoRegOVCD%3A%20Consistency-Regularized%20Open-Vocabulary%20Change%20Detection%0AAuthor%3A%20Weidong%20Tang%20and%20Hanbin%20Sun%20and%20Zihan%20Li%20and%20Yikai%20Wang%20and%20Feifan%20Zhang%0AAbstract%3A%20Remote%20sensing%20change%20detection%20%28CD%29%20aims%20to%20identify%20where%20land-cover%20semantics%20change%20across%20time%2C%20but%20most%20existing%20methods%20still%20assume%20a%20fixed%20label%20space%20and%20therefore%20cannot%20answer%20arbitrary%20user-defined%20queries.%20Open-vocabulary%20change%20detection%20%28OVCD%29%20instead%20asks%20for%20the%20change%20mask%20of%20a%20queried%20concept.%20In%20the%20fully%20training-free%20setting%2C%20however%2C%20dense%20concept%20responses%20are%20difficult%20to%20compare%20directly%20across%20dates%3A%20appearance%20variation%2C%20weak%20cross-concept%20competition%2C%20and%20the%20spatial%20continuity%20of%20many%20land-cover%20categories%20often%20produce%20noisy%2C%20fragmented%2C%20and%20semantically%20unreliable%20change%20evidence.%20We%20propose%20Consistency-Regularized%20Open-Vocabulary%20Change%20Detection%20%28CoRegOVCD%29%2C%20a%20training-free%20dense%20inference%20framework%20that%20reformulates%20concept-specific%20change%20as%20calibrated%20posterior%20discrepancy.%20Competitive%20Posterior%20Calibration%20%28CPC%29%20and%20the%20Semantic%20Posterior%20Delta%20%28SPD%29%20convert%20raw%20concept%20responses%20into%20competition-aware%20queried-concept%20posteriors%20and%20quantify%20their%20cross-temporal%20discrepancy%2C%20making%20semantic%20change%20evidence%20more%20comparable%20without%20explicit%20instance%20matching.%20Geometry-Token%20Consistency%20Gate%20%28GeoGate%29%20and%20Regional%20Consensus%20Discrepancy%20%28RCD%29%20further%20suppress%20unsupported%20responses%20and%20improve%20spatial%20coherence%20through%20geometry-aware%20structural%20verification%20and%20regional%20consensus.%20Across%20four%20benchmarks%20spanning%20building-oriented%20and%20multi-class%20settings%2C%20CoRegOVCD%20consistently%20improves%20over%20the%20strongest%20previous%20training-free%20baseline%20by%202.24%20to%204.98%20F1%24_C%24%20points%20and%20reaches%20a%20six-class%20average%20of%2047.50%25%20F1%24_C%24%20on%20SECOND.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02160v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoRegOVCD%253A%2520Consistency-Regularized%2520Open-Vocabulary%2520Change%2520Detection%26entry.906535625%3DWeidong%2520Tang%2520and%2520Hanbin%2520Sun%2520and%2520Zihan%2520Li%2520and%2520Yikai%2520Wang%2520and%2520Feifan%2520Zhang%26entry.1292438233%3DRemote%2520sensing%2520change%2520detection%2520%2528CD%2529%2520aims%2520to%2520identify%2520where%2520land-cover%2520semantics%2520change%2520across%2520time%252C%2520but%2520most%2520existing%2520methods%2520still%2520assume%2520a%2520fixed%2520label%2520space%2520and%2520therefore%2520cannot%2520answer%2520arbitrary%2520user-defined%2520queries.%2520Open-vocabulary%2520change%2520detection%2520%2528OVCD%2529%2520instead%2520asks%2520for%2520the%2520change%2520mask%2520of%2520a%2520queried%2520concept.%2520In%2520the%2520fully%2520training-free%2520setting%252C%2520however%252C%2520dense%2520concept%2520responses%2520are%2520difficult%2520to%2520compare%2520directly%2520across%2520da {"title": "HyVGGT-VO: Tightly Coupled Hybrid Dense Visual Odometry with Feed-Forward Models", "author": "Junxiang Pan and Lipu Zhou and Baojie Chen", "abstract": "Dense visual odometry (VO), which provides pose estimation and dense 3D reconstruction, serves as the cornerstone for applications ranging from robotics to augmented reality. Recently, feed-forward models have demonstrated remarkable capabilities in dense mapping. However, when these models are used in dense visual SLAM systems, their heavy computational burden restricts them to yielding sparse pose outputs at keyframes while still failing to achieve real-time pose estimation. In contrast, traditional sparse methods provide high computational efficiency and high-frequency pose outputs, but lack the capability for dense reconstruction. To address these limitations, we propose HyVGGT-VO, a novel framework that combines the computational efficiency of sparse VO with the dense reconstruction capabilities of feed-forward models. To the best of our knowledge, this is the first work to tightly couple a traditional VO framework with VGGT, a state-of-the-art feed-forward model. Specifically, we design an adaptive hybrid tracking frontend that dynamically switches between traditional optical flow and the VGGT tracking head to ensure robustness. Furthermore, we introduce a hierarchical optimization framework that jointly refines VO poses and the scale of VGGT predictions to ensure global scale consistency. Our approach achieves an approximately 5x processing speedup compared to existing VGGT-based methods, while reducing the average trajectory error by 85% on the indoor EuRoC dataset and 12% on the outdoor KITTI benchmark. Our code will be publicly available upon acceptance. Project page: https://geneta2580.github.io/HyVGGT-VO.io.", "link": "http://arxiv.org/abs/2604.02107v1", "date": "2026-04-02", "relevancy": 2.4638, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6375}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6146}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5949}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyVGGT-VO%3A%20Tightly%20Coupled%20Hybrid%20Dense%20Visual%20Odometry%20with%20Feed-Forward%20Models&body=Title%3A%20HyVGGT-VO%3A%20Tightly%20Coupled%20Hybrid%20Dense%20Visual%20Odometry%20with%20Feed-Forward%20Models%0AAuthor%3A%20Junxiang%20Pan%20and%20Lipu%20Zhou%20and%20Baojie%20Chen%0AAbstract%3A%20Dense%20visual%20odometry%20%28VO%29%2C%20which%20provides%20pose%20estimation%20and%20dense%203D%20reconstruction%2C%20serves%20as%20the%20cornerstone%20for%20applications%20ranging%20from%20robotics%20to%20augmented%20reality.%20Recently%2C%20feed-forward%20models%20have%20demonstrated%20remarkable%20capabilities%20in%20dense%20mapping.%20However%2C%20when%20these%20models%20are%20used%20in%20dense%20visual%20SLAM%20systems%2C%20their%20heavy%20computational%20burden%20restricts%20them%20to%20yielding%20sparse%20pose%20outputs%20at%20keyframes%20while%20still%20failing%20to%20achieve%20real-time%20pose%20estimation.%20In%20contrast%2C%20traditional%20sparse%20methods%20provide%20high%20computational%20efficiency%20and%20high-frequency%20pose%20outputs%2C%20but%20lack%20the%20capability%20for%20dense%20reconstruction.%20To%20address%20these%20limitations%2C%20we%20propose%20HyVGGT-VO%2C%20a%20novel%20framework%20that%20combines%20the%20computational%20efficiency%20of%20sparse%20VO%20with%20the%20dense%20reconstruction%20capabilities%20of%20feed-forward%20models.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20work%20to%20tightly%20couple%20a%20traditional%20VO%20framework%20with%20VGGT%2C%20a%20state-of-the-art%20feed-forward%20model.%20Specifically%2C%20we%20design%20an%20adaptive%20hybrid%20tracking%20frontend%20that%20dynamically%20switches%20between%20traditional%20optical%20flow%20and%20the%20VGGT%20tracking%20head%20to%20ensure%20robustness.%20Furthermore%2C%20we%20introduce%20a%20hierarchical%20optimization%20framework%20that%20jointly%20refines%20VO%20poses%20and%20the%20scale%20of%20VGGT%20predictions%20to%20ensure%20global%20scale%20consistency.%20Our%20approach%20achieves%20an%20approximately%205x%20processing%20speedup%20compared%20to%20existing%20VGGT-based%20methods%2C%20while%20reducing%20the%20average%20trajectory%20error%20by%2085%25%20on%20the%20indoor%20EuRoC%20dataset%20and%2012%25%20on%20the%20outdoor%20KITTI%20benchmark.%20Our%20code%20will%20be%20publicly%20available%20upon%20acceptance.%20Project%20page%3A%20https%3A//geneta2580.github.io/HyVGGT-VO.io.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02107v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyVGGT-VO%253A%2520Tightly%2520Coupled%2520Hybrid%2520Dense%2520Visual%2520Odometry%2520with%2520Feed-Forward%2520Models%26entry.906535625%3DJunxiang%2520Pan%2520and%2520Lipu%2520Zhou%2520and%2520Baojie%2520Chen%26entry.1292438233%3DDense%2520visual%2520odometry%2520%2528VO%2529%252C%2520which%2520provides%2520pose%2520estimation%2520and%2520dense%25203D%2520reconstruction%252C%2520serves%2520as%2520the%2520cornerstone%2520for%2520applications%2520ranging%2520from%2520robotics%2520to%2520augmented%2520reality.%2520Recently%252C%2520feed-forward%2520models%2520have%2520demonstrated%2520remarkable%2520capabilities%2520in%2520dense%2520mapping.%2520However%252C%2520when%2520these%2520models%2520are%2520used%2520in%2520dense%2520visual%2520SLAM%2520systems%252C%2520their%2520heavy%2520computational%2520burden%2520restricts%2520them%2520to%2520yielding%2520sparse%2520pose%2520outputs%2520at%2520keyframes%2520while%2520still%2520failing%2520to%2520achieve%2520real-time%2520pose%2520estimation.%2520In%2520contrast%252C%2520traditional%2520sparse%2520methods%2520provide%2520high%2520computational%2520efficiency%2520and%2520high-frequency%2520pose%2520outputs%252C%2520but%2520lack%2520the%2520capability%2520for%2520dense%2520reconstruction.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520HyVGGT-VO%252C%2520a%2520novel%2520framework%2520that%2520combines%2520the%2520computational%2520efficiency%2520of%2520sparse%2520VO%2520with%2520the%2520dense%2520reconstruction%2520capabilities%2520of%2520feed-forward%2520models.%2520To%2520the%2520best%2520of%2520our%2520knowledge%252C%2520this%2520is%2520the%2520first%2520work%2520to%2520tightly%2520couple%2520a%2520traditional%2520VO%2520framework%2520with%2520VGGT%252C%2520a%2520state-of-the-art%2520feed-forward%2520model.%2520Specifically%252C%2520we%2520design%2520an%2520adaptive%2520hybrid%2520tracking%2520frontend%2520that%2520dynamically%2520switches%2520between%2520traditional%2520optical%2520flow%2520and%2520the%2520VGGT%2520tracking%2520head%2520to%2520ensure%2520robustness.%2520Furthermore%252C%2520we%2520introduce%2520a%2520hierarchical%2520optimization%2520framework%2520that%2520jointly%2520refines%2520VO%2520poses%2520and%2520the%2520scale%2520of%2520VGGT%2520predictions%2520to%2520ensure%2520global%2520scale%2520consistency.%2520Our%2520approach%2520achieves%2520an%2520approximately%25205x%2520processing%2520speedup%2520compared%2520to%2520existing%2520VGGT-based%2520methods%252C%2520while%2520reducing%2520the%2520average%2520trajectory%2520error%2520by%252085%2525%2520on%2520the%2520indoor%2520EuRoC%2520dataset%2520and%252012%2525%2520on%2520the%2520outdoor%2520KITTI%2520benchmark.%2520Our%2520code%2520will%2520be%2520publicly%2520available%2520upon%2520acceptance.%2520Project%2520page%253A%2520https%253A//geneta2580.github.io/HyVGGT-VO.io.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02107v1%26entry.124074799%3DRead", "form": "https:// {"title": "ORBIT: Scalable and Verifiable Data Generation for Search Agents on a Tight Budget", "author": "Nandan Thakur and Zijian Chen and Xueguang Ma and Jimmy Lin", "abstract": "Search agents, which integrate language models (LMs) with web search, are becoming crucial for answering complex user queries. Constructing training datasets for deep research tasks, involving multi-step retrieval and reasoning, remains challenging due to expensive human annotation, or cumbersome prerequisites. In this work, we introduce ORBIT, a training dataset with 20K reasoning-intensive queries with short verifiable answers, generated using a frugal framework without relying on paid API services. The modular framework relies on four stages: seed creation, question-answer pair generation, and two stages of verification: self and external. ORBIT spans 15 domains and each training pair requires 4-5 reasoning steps, with external search verification required from the complete web. We train Qwen3-4B as the base model on ORBIT using GRPO and evaluate it on Wikipedia question answering tasks. Extensive experiment results demonstrate that ORBIT-4B achieves strong performance among sub-4B LLMs as search agents, proving the utility of synthetic datasets. Our framework, code and datasets are open-sourced and available publicly.", "link": "http://arxiv.org/abs/2604.01195v2", "date": "2026-04-02", "relevancy": 2.4544, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4909}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4909}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4909}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ORBIT%3A%20Scalable%20and%20Verifiable%20Data%20Generation%20for%20Search%20Agents%20on%20a%20Tight%20Budget&body=Title%3A%20ORBIT%3A%20Scalable%20and%20Verifiable%20Data%20Generation%20for%20Search%20Agents%20on%20a%20Tight%20Budget%0AAuthor%3A%20Nandan%20Thakur%20and%20Zijian%20Chen%20and%20Xueguang%20Ma%20and%20Jimmy%20Lin%0AAbstract%3A%20Search%20agents%2C%20which%20integrate%20language%20models%20%28LMs%29%20with%20web%20search%2C%20are%20becoming%20crucial%20for%20answering%20complex%20user%20queries.%20Constructing%20training%20datasets%20for%20deep%20research%20tasks%2C%20involving%20multi-step%20retrieval%20and%20reasoning%2C%20remains%20challenging%20due%20to%20expensive%20human%20annotation%2C%20or%20cumbersome%20prerequisites.%20In%20this%20work%2C%20we%20introduce%20ORBIT%2C%20a%20training%20dataset%20with%2020K%20reasoning-intensive%20queries%20with%20short%20verifiable%20answers%2C%20generated%20using%20a%20frugal%20framework%20without%20relying%20on%20paid%20API%20services.%20The%20modular%20framework%20relies%20on%20four%20stages%3A%20seed%20creation%2C%20question-answer%20pair%20generation%2C%20and%20two%20stages%20of%20verification%3A%20self%20and%20external.%20ORBIT%20spans%2015%20domains%20and%20each%20training%20pair%20requires%204-5%20reasoning%20steps%2C%20with%20external%20search%20verification%20required%20from%20the%20complete%20web.%20We%20train%20Qwen3-4B%20as%20the%20base%20model%20on%20ORBIT%20using%20GRPO%20and%20evaluate%20it%20on%20Wikipedia%20question%20answering%20tasks.%20Extensive%20experiment%20results%20demonstrate%20that%20ORBIT-4B%20achieves%20strong%20performance%20among%20sub-4B%20LLMs%20as%20search%20agents%2C%20proving%20the%20utility%20of%20synthetic%20datasets.%20Our%20framework%2C%20code%20and%20datasets%20are%20open-sourced%20and%20available%20publicly.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01195v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DORBIT%253A%2520Scalable%2520and%2520Verifiable%2520Data%2520Generation%2520for%2520Search%2520Agents%2520on%2520a%2520Tight%2520Budget%26entry.906535625%3DNandan%2520Thakur%2520and%2520Zijian%2520Chen%2520and%2520Xueguang%2520Ma%2520and%2520Jimmy%2520Lin%26entry.1292438233%3DSearch%2520agents%252C%2520which%2520integrate%2520language%2520models%2520%2528LMs%2529%2520with%2520web%2520search%252C%2520are%2520becoming%2520crucial%2520for%2520answering%2520complex%2520user%2520queries.%2520Constructing%2520training%2520datasets%2520for%2520deep%2520research%2520tasks%252C%2520involving%2520multi-step%2520retrieval%2520and%2520reasoning%252C%2520remains%2520challenging%2520due%2520to%2520expensive%2520human%2520annotation%252C%2520or%2520cumbersome%2520prerequisites.%2520In%2520this%2520work%252C%2520we%2520introduce%2520ORBIT%252C%2520a%2520training%2520dataset%2520with%252020K%2520reasoning-intensive%2520queries%2520with%2520short%2520verifiable%2520answers%252C%2520generated%2520using%2520a%2520frugal%2520framework%2520without%2520relying%2520on%2520paid%2520API%2520services.%2520The%2520modular%2520framework%2520relies%2520on%2520four%2520stages%253A%2520seed%2520creation%252C%2520question-answer%2520pair%2520generation%252C%2520and%2520two%2520stages%2520of%2520verification%253A%2520self%2520and%2520external.%2520ORBIT%2520spans%252015%2520domains%2520and%2520each%2520training%2520pair%2520requires%25204-5%2520reasoning%2520steps%252C%2520with%2520external%2520search%2520verification%2520required%2520from%2520the%2520complete%2520web.%2520We%2520train%2520Qwen3-4B%2520as%2520the%2520base%2520model%2520on%2520ORBIT%2520using%2520GRPO%2520and%2520evaluate%2520it%2520on%2520Wikipedia%2520question%2520answering%2520tasks.%2520Extensive%2520experiment%2520results%2520demonstrate%2520that%2520ORBIT-4B%2520achieves%2520strong%2520performance%2520among%2520sub-4B%2520LLMs%2520as%2520search%2520agents%252C%2520proving%2520the%2520utility%2520of%2520synthetic%2520datasets.%2520Our%2520framework%252C%2520code%2520and%2520datasets%2520are%2520open-sourced%2520and%2520available%2520publicly.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01195v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ORBIT%3A%20Scalable%20and%20Verifiable%20Data%20Generation%20for%20Search%20Agents%20on%20a%20Tight%20Budget&entry.906535625=Nandan%20Thakur%20and%20Zijian%20Chen%20and%20Xueguang%20Ma%20and%20Jimmy%20Lin&entry.1292438233=Search%20agents%2C%20which%20integrate%20language%20models%20%28LMs%29%20with%20web%20search%2C%20are%20becoming%20crucial%20for%20answering%20complex%20user%20queries.%20Constructing%20training%20datasets%20for%20deep%20research%20tasks%2C%20involving%20multi-step%20retrieval%20and%20reasoning%2C%20remains%20challenging%20due%20to%20expensive%20human%20annotation%2C%20or%20cumbersome%20prerequisites.%20In%20this%20work%2C%20we%20introduce%20ORBIT%2C%20a%20training%20dataset%20with%2020K%20reasoning-intensive%20queries%20with%20short%20verifiable%20answers%2C%20generated%20using%20a%20frugal%20framework%20without%20relying%20on%20paid%20API%20services.%20The%20modular%20framework%20relies%20on%20four%20stages%3A%20seed%20creation%2C%20question-answer%20pair%20generation%2C%20and%20two%20stages%20of%20verification%3A%20self%20and%20external.%20ORBIT%20spans%2015%20domains%20and%20each%20training%20pair%20requires%204-5%20reasoning%20steps%2C%20with%20external%20search%20verification%20required%20from%20the%20complete%20web.%20We%20train%20Qwen3-4B%20as%20the%20base%20model%20on%20ORBIT%20using%20GRPO%20and%20evaluate%20it%20on%20Wikipedia%20question%20answering%20tasks.%20Extensive%20experiment%20results%20demonstrate%20that%20ORBIT-4B%20achieves%20strong%20performance%20among%20sub-4B%20LLMs%20as%20search%20agents%2C%20proving%20the%20utility%20of%20synthetic%20datasets.%20Our%20framework%2C%20code%20and%20datasets%20are%20open-sourced%20and%20available%20publicly.&ent {"title": "SDesc3D: Towards Layout-Aware 3D Indoor Scene Generation from Short Descriptions", "author": "Jie Feng and Jiawei Shen and Junjia Huang and Junpeng Zhang and Mingtao Feng and Weisheng Dong and Guanbin Li", "abstract": "3D indoor scene generation conditioned on short textual descriptions provides a promising avenue for interactive 3D environment construction without the need for labor-intensive layout specification. Despite recent progress in text-conditioned 3D scene generation, existing works suffer from poor physical plausibility and insufficient detail richness in such semantic condensation cases, largely due to their reliance on explicit semantic cues about compositional objects and their spatial relationships. This limitation highlights the need for enhanced 3D reasoning capabilities, particularly in terms of prior integration and spatial anchoring.Motivated by this, we propose SDesc3D, a short-text conditioned 3D indoor scene generation framework, that leverages multi-view structural priors and regional functionality implications to enable 3D layout reasoning under sparse textual guidance.Specifically, we introduce a Multi-view scene prior augmentation that enriches underspecified textual inputs with aggregated multi-view structural knowledge, shifting from inaccessible semantic relation cues to multi-view relational prior aggregation. Building on this, we design a Functionality-aware layout grounding, employing regional functionality grounding for implicit spatial anchors and conducting hierarchical layout reasoning to enhance scene organization and semantic plausibility.Furthermore, an Iterative reflection-rectification scheme is employed for progressive structural plausibility refinement via self-rectification.Extensive experiments show that our method outperforms existing approaches on short-text conditioned 3D indoor scene generation.Code will be publicly available.", "link": "http://arxiv.org/abs/2604.01972v1", "date": "2026-04-02", "relevancy": 2.4531, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6458}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6068}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6068}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SDesc3D%3A%20Towards%20Layout-Aware%203D%20Indoor%20Scene%20Generation%20from%20Short%20Descriptions&body=Title%3A%20SDesc3D%3A%20Towards%20Layout-Aware%203D%20Indoor%20Scene%20Generation%20from%20Short%20Descriptions%0AAuthor%3A%20Jie%20Feng%20and%20Jiawei%20Shen%20and%20Junjia%20Huang%20and%20Junpeng%20Zhang%20and%20Mingtao%20Feng%20and%20Weisheng%20Dong%20and%20Guanbin%20Li%0AAbstract%3A%203D%20indoor%20scene%20generation%20conditioned%20on%20short%20textual%20descriptions%20provides%20a%20promising%20avenue%20for%20interactive%203D%20environment%20construction%20without%20the%20need%20for%20labor-intensive%20layout%20specification.%20Despite%20recent%20progress%20in%20text-conditioned%203D%20scene%20generation%2C%20existing%20works%20suffer%20from%20poor%20physical%20plausibility%20and%20insufficient%20detail%20richness%20in%20such%20semantic%20condensation%20cases%2C%20largely%20due%20to%20their%20reliance%20on%20explicit%20semantic%20cues%20about%20compositional%20objects%20and%20their%20spatial%20relationships.%20This%20limitation%20highlights%20the%20need%20for%20enhanced%203D%20reasoning%20capabilities%2C%20particularly%20in%20terms%20of%20prior%20integration%20and%20spatial%20anchoring.Motivated%20by%20this%2C%20we%20propose%20SDesc3D%2C%20a%20short-text%20conditioned%203D%20indoor%20scene%20generation%20framework%2C%20that%20leverages%20multi-view%20structural%20priors%20and%20regional%20functionality%20implications%20to%20enable%203D%20layout%20reasoning%20under%20sparse%20textual%20guidance.Specifically%2C%20we%20introduce%20a%20Multi-view%20scene%20prior%20augmentation%20that%20enriches%20underspecified%20textual%20inputs%20with%20aggregated%20multi-view%20structural%20knowledge%2C%20shifting%20from%20inaccessible%20semantic%20relation%20cues%20to%20multi-view%20relational%20prior%20aggregation.%20Building%20on%20this%2C%20we%20design%20a%20Functionality-aware%20layout%20grounding%2C%20employing%20regional%20functionality%20grounding%20for%20implicit%20spatial%20anchors%20and%20conducting%20hierarchical%20layout%20reasoning%20to%20enhance%20scene%20organization%20and%20semantic%20plausibility.Furthermore%2C%20an%20Iterative%20reflection-rectification%20scheme%20is%20employed%20for%20progressive%20structural%20plausibility%20refinement%20via%20self-rectification.Extensive%20experiments%20show%20that%20our%20method%20outperforms%20existing%20approaches%20on%20short-text%20conditioned%203D%20indoor%20scene%20generation.Code%20will%20be%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01972v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSDesc3D%253A%2520Towards%2520Layout-Aware%25203D%2520Indoor%2520Scene%2520Generation%2520from%2520Short%2520Descriptions%26entry.906535625%3DJie%2520Feng%2520and%2520Jiawei%2520Shen%2520and%2520Junjia%2520Huang%2520and%2520Junpeng%2520Zhang%2520and%2520Mingtao%2520Feng%2520and%2520Weisheng%2520Dong%2520and%2520Guanbin%2520Li%26entry.1292438233%3D3D%2520indoor%2520scene%2520generation%2520conditioned%2520on%2520short%2520textual%2520descriptions%2520provides%2520a%2520promising%2520avenue%2520for%2520interactive%25203D%2520environment%2520construction%2520without%2520the%2520need%2520for%2520labor-intensive%2520layout%2520specification.%2520Despite%2520recent%2520progress%2520in%2520text-conditioned%25203D%2520scene%2520generation%252C%2 ing%2520approaches%2520on%2520short-text%2520conditioned%25203D%2520indoor%2520scene%2520generation.Code%2520will%2520be%2520publicly%2520available.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01972v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SDesc3D%3A%20Towards%20Layout-Aware%203D%20Indoor%20Scene%20Generation%20from%20Short%20Descriptions&entry.906535625=Jie%20Feng%20and%20Jiawei%20Shen%20and%20Junjia%20Huang%20and%20Junpeng%20Zhang%20and%20Mingtao%20Feng%20and%20Weisheng%20Dong%20and%20Guanbin%20Li&entry.1292438233=3D%20indoor%20scene%20generation%20conditioned%20on%20short%20textual%20descriptions%20provides%20a%20promising%20avenue%20for%20interactive%203D%20environment%20construction%20without%20the%20need%20for%20labor-intensive%20layout%20specification.%20Despite%20recent%20progress%20in%20text-conditioned%203D%20scene%20generation%2C%20existing%20works%20suffer%20from%20poor%20physical%20plausibility%20and%20insufficient%20detail%20richness%20in%20such%20semantic%20condensation%20cases%2C%20largely%20due%20to%20their%20reliance%20on%20explicit%20semantic%20cues%20about%20compositional%20objects%20and%20their%20spatial%20relationships.%20This%20limitation%20highlights%20the%20need%20for%20enhanced%203D%20reasoning%20capabilities%2C%20particularly%20in%20terms%20of%20prior%20integration%20and%20spatial%20anchoring.Motivated%20by%20this%2C%20we%20propose%20SDesc3D%2C%20a%20short-text%20conditioned%203D%20indoor%20scene%20generation%20framework%2C%20that%20leverages%20multi-view%20structural%20priors%20and%20regional%20functionality%20implications%20to%20enable%203D%20layout%20reasoning%20under%20sparse%20textual%20guidance.Specifically%2C%20we%20introduce%20a%20Multi-view%20scene%20prior%20augmentation%20that%20enriches%20underspecified%20textual%20inputs%20with%20aggregated%20multi-view%20structural%20knowledge%2C%20shifting%20from%20inaccess {"title": "Learn by Surprise, Commit by Proof", "author": "Kang-Sin Choi", "abstract": "We propose LSCP, a self-gated post-training framework for autonomous knowledge acquisition: learning only what a model does not already know, verified against what it does know, at a strength proportional to conviction, with no external oracle. When a passage produces anomalously high per-token loss, LSCP flags it, generates a Q&A chain that forces the model to articulate its own knowledge and identify gaps, then adjusts AdamW's $\u03b2_2$ proportionally to conviction depth k (the number of self-verification steps the passage survives) via $\u03b2_2 = 0.999 \\cdot r^k$. The entire learning intensity is governed by a single parameter $r$. Beyond new knowledge, this process sharpens weakly encoded existing knowledge, which is a primary source of hallucination. The framework is self-extinguishing: as the model learns, per-token loss on learned passages decreases toward the surprisal threshold and the system progressively converges to standard AdamW. This models biological memory consolidation: temporary information in the context window is selectively consolidated into parametric weights, the model's long-term memory. Experiments on the reference model (Qwen3-14B) and across six models (8B--32B, four families) show that standard fine-tuning produces rote memorization (perturbation gap (the ratio of paraphrase to original perplexity) of 11.6 +- 0.2 x baseline) while all LSCP conditions learn semantically (2.7--3.0x). The r=1.0 condition (identical optimizer, nearly identical data, only Q&A format differs) confirms that the training data format, not $\u03b2_2$ gating, is the primary mechanism preventing memorization; gating instead protects neighboring knowledge from contamination by corrupt content (93 +- 7% accuracy on adjacent questions at r=0.98 vs. 90% baseline).", "link": "http://arxiv.org/abs/2604.01951v1", "date": "2026-04-02", "relevancy": 2.4529, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4988}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4865}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4865}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learn%20by%20Surprise%2C%20Commit%20by%20Proof&body=Title%3A%20Learn%20by%20Surprise%2C%20Commit%20by%20Proof%0AAuthor%3A%20Kang-Sin%20Choi%0AAbstract%3A%20We%20propose%20LSCP%2C%20a%20self-gated%20post-training%20framework%20for%20autonomous%20knowledge%20acquisition%3A%20learning%20only%20what%20a%20model%20does%20not%20already%20know%2C%20verified%20against%20what%20it%20does%20know%2C%20at%20a%20strength%20proportional%20to%20conviction%2C%20with%20no%20external%20oracle.%20When%20a%20passage%20produces%20anomalously%20high%20per-token%20loss%2C%20LSCP%20flags%20it%2C%20generates%20a%20Q%26A%20chain%20that%20forces%20the%20model%20to%20articulate%20its%20own%20knowledge%20and%20identify%20gaps%2C%20then%20adjusts%20AdamW%27s%20%24%CE%B2_2%24%20proportionally%20to%20conviction%20depth%20k%20%28the%20number%20of%20self-verification%20steps%20the%20passage%20survives%29%20via%20%24%CE%B2_2%20%3D%200.999%20%5Ccdot%20r%5Ek%24.%20The%20entire%20learning%20intensity%20is%20governed%20by%20a%20single%20parameter%20%24r%24.%20Beyond%20new%20knowledge%2C%20this%20process%20sharpens%20weakly%20encoded%20existing%20knowledge%2C%20which%20is%20a%20primary%20source%20of%20hallucination.%20The%20framework%20is%20self-extinguishing%3A%20as%20the%20model%20learns%2C%20per-token%20loss%20on%20learned%20passages%20decreases%20toward%20the%20surprisal%20threshold%20and%20the%20system%20progressively%20converges%20to%20standard%20AdamW.%20This%20models%20biological%20memor {"title": "Abnormal Head Movements in Neurological Conditions: A Knowledge-Based Dataset with Application to Cervical Dystonia", "author": "Saja Al-Dabet and Sherzod Turaev and Nazar Zaki", "abstract": "Abnormal head movements (AHMs) manifest across a broad spectrum of neurological disorders; however, the absence of a multi-condition resource integrating kinematic measurements, clinical severity scores, and patient demographics constitutes a persistent barrier to the development of AI-driven diagnostic tools. To address this gap, this study introduces NeuroPose-AHM, a knowledge-based dataset of neurologically induced AHMs constructed through a multi-LLM extraction framework applied to 1,430 peer-reviewed publications. The dataset contains 2,756 patient-group-level records spanning 57 neurological conditions, derived from 846 AHM-relevant papers. Inter-LLM reliability analysis confirms robust extraction performance, with study-level classification achieving strong agreement (kappa = 0.822). To demonstrate the dataset's analytical utility, a four-task framework is applied to cervical dystonia (CD), the condition most directly defined by pathological head movement. First, Task 1 performs multi-label AHM type classification (F1 = 0.856). Task 2 constructs the Head-Neck Severity Index (HNSI), a unified metric that normalizes heterogeneous clinical rating scales. The clinical relevance of this index is then evaluated in Task 3, where HNSI is validated against real-world CD patient data, with aligned severe-band proportions (6.7%) providing a preliminary plausibility indication for index calibration within the high severity range. Finally, Task 4 performs bridge analysis between movement-type probabilities and HNSI scores, producing significant correlations (p less than 0.001). These results demonstrate the analytical utility of NeuroPose-AHM as a structured, knowledge-based resource for neurological AHM research. The NeuroPose-AHM dataset is publicly available on Zenodo ( {"title": "CXR-LT 2026 Challenge: Projection-Aware Multi-Label and Zero-Shot Chest X-Ray Classification", "author": "Juno Cho and Dohui Kim and Mingeon Kim and Hyunseo Jang and Chang Sun Lee and Jong Chul Ye", "abstract": "This challenge tackles multi-label classification for known chest X-ray (CXR) lesions and zero-shot classification for unseen ones. To handle diverse CXR projections, we integrate projection-specific models via a classification network into a unified framework. For zero-shot classification (Task 2), we extend CheXzero with a novel dual-branch architecture that combines contrastive learning, Asymmetric Loss (ASL), and LLM-generated descriptive prompts. This effectively mitigates severe long-tail imbalances and maximizes zero-shot generalization. Additionally, strong data and test-time augmentations (TTA) ensure robustness across both tasks.", "link": "http://arxiv.org/abs/2604.02185v1", "date": "2026-04-02", "relevancy": 2.4373, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5142}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.477}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4712}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CXR-LT%202026%20Challenge%3A%20Projection-Aware%20Multi-Label%20and%20Zero-Shot%20Chest%20X-Ray%20Classification&body=Title%3A%20CXR-LT%202026%20Challenge%3A%20Projection-Aware%20Multi-Label%20and%20Zero-Shot%20Chest%20X-Ray%20Classification%0AAuthor%3A%20Juno%20Cho%20and%20Dohui%20Kim%20and%20Mingeon%20Kim%20and%20Hyunseo%20Jang%20and%20Chang%20Sun%20Lee%20and%20Jong%20Chul%20Ye%0AAbstract%3A%20This%20challenge%20tackles%20multi-label%20classification%20for%20known%20chest%20X s%2520effectively%2520mitigates%2520severe%2520long-tail%2520imbalances%2520and%2520maximizes%2520zero-shot%2520generalization.%2520Additionally%252C%2520strong%2520data%2520and%2520test-time%2520augmentations%2520%2528TTA%2529%2520ensure%2520robustness%2520across%2520both%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02185v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CXR-LT%202026%20Challenge%3A%20Projection-Aware%20Multi-Label%20and%20Zero-Shot%20Chest%20X-Ray%20Classification&entry.906535625=Juno%20Cho%20and%20Dohui%20Kim%20and%20Mingeon%20Kim%20and%20Hyunseo%20Jang%20and%20Chang%20Sun%20Lee%20and%20Jong%20Chul%20Ye&entry.1292438233=This%20challenge%20tackles%20multi-label%20classification%20for%20known%20chest%20X-ray%20%28CXR%29%20lesions%20and%20zero-shot%20classification%20for%20unseen%20ones.%20To%20handle%20diverse%20CXR%20projections%2C%20we%20integrate%20projection-specific%20models%20via%20a%20classification%20network%20into%20a%20unified%20framework.%20For%20zero-shot%20classification%20%28Task%202%29%2C%20we%20extend%20CheXzero%20with%20a%20novel%20dual-branch%20architecture%20that%20combines%20contrastive%20learning%2C%20Asymmetric%20Loss%20%28ASL%29%2C%20and%20LLM-generated%20descriptive%20prompts.%20This%20effectively%20mitigates%20severe%20long-tail%20imbalances%20and%20maximizes%20zero-shot%20generalization.%20Additionally%2C%20strong%20data%20and%20test-time%20augmentations%20%28TTA%29%20ensure%20robustness%20across%20both%20tasks.&entry.1838667208=http%3A//arxiv.org/abs/2604.02185v1&entry.124074799=Read"},
{"title": "MemFactory: Unified Inference & Training Framework for Agent Memory", "author": "Ziliang Guo and Ziheng Li and Bo Tang and Feiyu Xiong and Zhiyu Li", "abstract": "Memory-augmented Large Language Models (LLMs) are essential for developing capable, long-term AI agents. Recently, applying Reinforcement Learning (RL) to optimize memory operations, such as extraction, updating, and retrieval, has emerged as a highly promising research direction. However, existing implementations remain highly fragmented and task-specific, lacking a unified infrastructure to streamline the integration, training, and evaluation of these complex pipelines. To address this gap, we present MemFactory, the first unified, highly modular training and inference framework specifically designed for memory-augmented agents. Inspired by the success of unified fine-tuning frameworks like LLaMA-Factory, MemFactory abstracts the memory lifecycle into atomic, plug-and-play components, enabling researchers to seamlessly construct custom memory agents via a \"Lego-like\" architecture. Furthermore, the framework natively integrates Group Relative Policy Optimization (GRPO) to fine-tune internal memory management policies driven by multi-dimensional environmental rewards. MemFactory provides out-of-the-box support for recent cutting-edge paradigms, including Memory-R1, RMM, and MemAgent. We empirically validate MemFactory on the open-source MemAgent architecture using its publicly available training and evaluation data. Across the evaluation sets, MemFactory improves performance over the corresponding base models on average, with relative gains of up to 14.8%. By providing a standardized, extensible, and easy-to-use infrastructure, MemFactory significantly lowers the barrier to entry, paving the way for future innovations in memory-driven AI agents.", "link": "http://arxiv.org/abs/2603.29493v3", "date": "2026-04-02", "relevancy": 2.4373, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4924}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4894}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4806}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MemFactory%3A%20Unified%20Inference%20%26%20Training%20Framework%20for%20Agent%20Memory&body=Title%3A%20MemFactory%3A%20Unified%20Inference%20%26%20Training%20Framework%20for%20Agent%20Memory%0AAuthor%3A%20Ziliang%20Guo%20and%20Ziheng%20Li%20and%20Bo%20Tang%20and%20Feiyu%20Xiong%20and%20Zhiyu%20Li%0AAbstract%3A%20Memory-augmented%20Large%20Language%20Models%20%28LLMs%29%20are%20essential%20for%20developing%20capable%2C%20long-term%20AI%20agents.%20Recently%2C%20applying%20Reinforcement%20Learning%20%28RL%29%20to%20optimize%20memory%20operations%2C%20such%20as%20extraction%2C%20updating%2C%20and%20retrieval%2C%20has%20emerged%20as%20a%20highly%20promising%20research%20direction.%20However%2C%20existing%20implementations%20remain%20highly%20fragmented%20and%20task-specific%2C%20lacking%20a%20unified%20infrastructure%20to%20streamline%20the%20integration%2C%20training%2C%20and%20evaluation%20of%20these%20complex%20pipelines.%20To%20address%20this%20gap%2C%20we%20present%20MemFactory%2C%20the%20first%20unified%2C%20highly%20modular%20training%20and%20inference%20framework%20specifically%20designed%20for%20memory-augmented%20agents.%20Inspired%20by%20the%20success%20of%20unified%20fine-tuning%20frameworks%20like%20LLaMA-Factory%2C%20MemFactory%20abstracts%20the%20memory%20lifecycle%20into%20atomic%2C%20plug-and-play%20components%2C%20enabling%20researchers%20to%20seamlessly%20construct%20custom%20memory%20agents%20via%20a%20%22Lego-like%22%20architecture.%20Furthermore%2C%20the%20framework%20natively%20integrates%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20to%20fine-tune%20internal%20memory%20management%20policies%20driven%20by%20multi-dimensional%20environmental%20rewards.%20MemFactory%20provides%20out-of-the-box%20support%20for%20recent%20cutting-edge%20paradigms%2C%20including%20Memory-R1%2C%20RMM%2C%20and%20MemAgent.%20We%20empirically%20validate%20MemFactory%20on%20the%20open-source%20MemAgent%20architecture%20using%20its%20publicly%20available%20training%20and%20evaluation%20data.%20Across%20the%20evaluation%20sets%2C%20MemFactory%20improves%20performance%20over%20the%20corresponding%20base%20models%20on%20average%2C%20with%20relative%20gains%20of%20up%20to%2014.8%25.%20By%20providing%20a%20standardized%2C%20extensible%2C%20and%20easy-to-use%20infrastructure%2C%20MemFactory%20significantly%20lowers%20the%20barrier%20to%20entry%2C%20paving%20the%20way%20for%20future%20innovations%20in%20memory-driven%20AI%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29493v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMemFactory%253A%2520Unified%2520Inference%2520%2526%2520Training%2520Framework%2520for%2520Agent%2520Memory%26entry.906535625%3DZiliang%2520Guo%2520and%2520Ziheng%2520Li%2520and%2520Bo%2520Tang%2520and%2520Feiyu%2520Xiong%2520and%2520Zhiyu%2520Li%26entry.1292438233%3DMemory-augmented%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520are%2520essential%2520for%2520developing%2520capable%252C%2520long-term%2520AI%2520agents.%2520Recently%252C%2520applying%2520Reinforcement%2520Learning%2520%2528RL%2529%2520to%2520optimize%2520memory%2520operations%252C%2520such%2520as%2520extraction%252C%2520updating%252C%2520and%2520retrieval%252C%2520has%2520emerged%2520as%2520a%2520highly%2520promising%2520research%2520direction.%2520However%252C%2520existing%2520implementations%2520remain%2520highly%2520fragmented%2520and%2520task-specific%252C%2520lacking%2520a%2520unified%2520infrastructure%2520to%2520stre entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29493v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MemFactory%3A%20Unified%20Inference%20%26%20Training%20Framework%20for%20Agent%20Memory&entry.906535625=Ziliang%20Guo%20and%20Ziheng%20Li%20and%20Bo%20Tang%20and%20Feiyu%20Xiong%20and%20Zhiyu%20Li&entry.1292438233=Memory-augmented%20Large%20Language%20Models%20%28LLMs%29%20are%20essential%20for%20developing%20capable%2C%20long-term%20AI%20agents.%20Recently%2C%20applying%20Reinforcement%20Learning%20%28RL%29%20to%20optimize%20memory%20operations%2C%20such%20as%20extraction%2C%20updating%2C%20and%20retrieval%2C%20has%20emerged%20as%20a%20highly%20promising%20research%20direction.%20However%2C%20existing%20implementations%20remain%20highly%20fragmented%20and%20task-specific%2C%20lacking%20a%20unified%20infrastructure%20to%20streamline%20the%20integration%2C%20training%2C%20and%20evaluation%20of%20these%20complex%20pipelines.%20To%20address%20this%20gap%2C%20we%20present%20MemFactory%2C%20the%20first%20unified%2C%20highly%20modular%20training%20and%20inference%20framework%20specifically%20designed%20for%20memory-augmented%20agents.%20Inspired%20by%20the%20success%20of%20unified%20fine-tuning%20frameworks%20like%20LLaMA-Factory%2C%20MemFactory%20abstracts%20the%20memory%20lifecycle%20into%20atomic%2C%20plug-and-play%20components%2C%20enabling%20researchers%20to%20seamlessly%20construct%20custom%20memory%20agents%20via%20a%20%22Lego-like%22%20architecture.%20Furthermore%2C%20the%20framework%20natively%20integrates%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20to%20fine-tune%20internal%20memory%20management%20policies%20driven%20by%20multi-dimensional%20environmental%20rewards.%20MemFactory%20provides%20out-of-the-box%20support%20for%20recent%20cutting-edge%20paradigms%2C%20including%20Memory-R1%2C%20RMM%2C%20and%20MemAgent.%20We%20empirically%20validate {"title": "Grounded Token Initialization for New Vocabulary in LMs for Generative Recommendation", "author": "Daiwei Chen and Zhoutong Fu and Chengming Jiang and Haichao Zhang and Ran Zhou and Tan Wang and Chunnan Yao and Guoyao Li and Rui Cai and Yihan Cao and Ruijie Jiang and Fedor Borisyuk and Jianqiang Shen and Jingwei Wu and Ramya Korlakai Vinayak", "abstract": "Language models (LMs) are increasingly extended with new learnable vocabulary tokens for domain-specific tasks, such as Semantic-ID tokens in generative recommendation. The standard practice initializes these new tokens as the mean of existing vocabulary embeddings, then relies on supervised fine-tuning to learn their representations. We present a systematic analysis of this strategy: through spectral and geometric diagnostics, we show that mean initialization collapses all new tokens into a degenerate subspace, erasing inter-token distinctions that subsequent fine-tuning struggles to fully recover. These findings suggest that \\emph{token initialization} is a key bottleneck when extending LMs with new vocabularies. Motivated by this diagnosis, we propose the \\emph{Grounded Token Initialization Hypothesis}: linguistically grounding novel tokens in the pretrained embedding space before fine-tuning better enables the model to leverage its general-purpose knowledge for novel-token domains. We operationalize this hypothesis as GTI (Grounded Token Initialization), a lightweight grounding stage that, prior to fine-tuning, maps new tokens to distinct, semantically meaningful locations in the pretrained embedding space using only paired linguistic supervision. Despite its simplicity, GTI outperforms both mean initialization and existing auxiliary-task adaptation methods in the majority of evaluation settings across multiple generative recommendation benchmarks, including industry-scale and public datasets. Further analyses show that grounded embeddings produce richer inter-token structure that persists through fine-tuning, corroborating the hypothesis that initialization quality is a key bottleneck in vocabulary extension.", "link": "http://arxiv.org/abs/2604.02324v1", "date": "2026-04-02", "relevancy": 2.4305, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.503}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4921}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Grounded%20Token%20Initialization%20for%20New%20Vocabulary%20in%20LMs%20for%20Generative%20Recommendation&body=Title%3A%20Grounded%20Token%20Initialization%20for%20New%20Vocabulary%20in%20LMs%20for%20Generative%20Recommendation%0AAuthor%3A%20Daiwei%20Chen%20and%20Zhoutong%20Fu%20and%20Chengming%20Jiang%20and%20Haichao%20Zhang%20and%20Ran%20Zhou%20and%20Tan%20Wang%20and%20Chunnan%20Yao%20and%20Guoyao%20Li%20and%20Rui%20Cai%20and%20Yihan%20Cao%20and%20Ruijie%20Jiang%20and%20Fedor%20Borisyuk%20and%20Jianqiang%20Shen%20and%20Jingwei%20Wu%20and%20Ramya%20Korlakai%20Vinayak%0AAbstract%3A%20Language%20models%20%28LMs%29%20are%20increasingly%20extended%20with%20new%20learnable%20vocabulary%20tokens%20for%20domain-specific%20tasks%2C%20such%20as%20Semantic-ID%20tokens%20in%20generative%20recommendation.%20The%20standard%20practice%20initializes%20these%20new%20tokens%20as%20the%20mean%20of%20existing%20vocabulary%20embeddings%2C%20then%20relies%20on%20supervised%20fine-tuning%20to%20learn%20their%20representations.%20We%20present%20a%20systematic%20analysis%20of%20this%20strategy%3A%20through%20spectral%20and%20geometric%20diagnostics%2C%20we%20show%20that%20mean%20initialization%20collapses%20all%20new%20tokens%20into%20a%20degenerate%20subspace%2C%20erasing%20inter-token%20distinctions%20that%20subsequent%20fine-tuning%20struggles%20to%20fully%20recover.%20These%20findings%20suggest%20that%20%5Cemph%7Btoken%20initialization%7D%20is%20a%20key%20bottleneck%20when%20extending%20LMs%20with%20new%20vocabularies.%20Motivated%20by%20this%20diagnosis%2C%20we%20propose%20the%20%5Cemph%7BGrounded%20Token%20Initialization%20Hypothesis%7D%3A%20linguistically%20grounding%20novel%20tokens%20in%20the%20pretrained%20embedding%20space%20before%20fine-tuning%20better%20enables%20the%20model%20to%20leverage%20its%20general-purpose%20knowledge%20for%20novel-token%20domains.%20We%20operationalize%20this%20hypothesis%20as%20GTI%20%28Grounded%20Token%20Initialization%29%2C%20a%20lightweight%20grounding%20stage%20that%2C%20prior%20to%20fine-tuning%2C%20maps%20new%20tokens%20to%20distinct%2C%20semantically%20meaningful%20locations%20in%20the%20pretrained%20embedding%20space%20using%20only%20paired%20linguistic%20supervision.%20Despite%20its%20simplicity%2C%20GTI%20outperforms%20both%20mean%20initialization%20and%20existing%20auxiliary-task%20adaptation%20methods%20in%20the%20majority%20of%20evaluation%20settings%20across%20multiple%20generative%20recommendation%20benchmarks%2C%20including%20industry-scale%20and%20public%20datasets.%20Further%20analyses%20show%20that%20grounded%20embeddings%20produce%20richer%20inter-token%20structure%20that%20persists%20through%20fine-tuning%2C%20corroborating%20the%20hypothesis%20that%20initialization%20quality%20is%20a%20key%20bottleneck%20in%20vocabulary%20extension.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02324v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGrounded%2520Token%2520Initialization%2520for%2520New%2520Vocabulary%2520in%2520LMs%2520for%2520Generative%2520Recommendation%26entry.906535625%3DDaiwei%2520Chen%2520and%2520Zhoutong%2520Fu%2520and%2520Chengming%2520Jiang%2520and%2520Haichao%2520Zhang%2520and%2520R {"title": "ThinkGrasp: A Vision-Language System for Strategic Part Grasping in Clutter", "author": "Yaoyao Qian and Xupeng Zhu and Ondrej Biza and Shuo Jiang and Linfeng Zhao and Haojie Huang and Yu Qi and Robert Platt", "abstract": "Robotic grasping in cluttered environments remains a significant challenge due to occlusions and complex object arrangements. We have developed ThinkGrasp, a plug-and-play vision-language grasping system that makes use of GPT-4o's advanced contextual reasoning for heavy clutter environment grasping strategies. ThinkGrasp can effectively identify and generate grasp poses for target objects, even when they are heavily obstructed or nearly invisible, by using goal-oriented language to guide the removal of obstructing objects. This approach progressively uncovers the target object and ultimately grasps it with a few steps and a high success rate. In both simulated and real experiments, ThinkGrasp achieved a high success rate and significantly outperformed state-of-the-art methods in heavily cluttered environments or with diverse unseen objects, demonstrating strong generalization capabilities.", "link": "http://arxiv.org/abs/2407.11298v2", "date": "2026-04-02", "relevancy": 2.409, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6455}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6128}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ThinkGrasp%3A%20A%20Vision-Language%20System%20for%20Strategic%20Part%20Grasping%20in%20Clutter&body=Title%3A%20ThinkGrasp%3A%20A%20Vision-Language%20System%20for%20Strategic%20Part%20Grasping%20in%20Clutter%0AAuthor%3A%20Yaoyao%20Qian%20and%20Xupeng%20Zhu%20and%20Ondrej%20Biza%20and%20Shuo%20Jiang%20and%20Linfeng%20Zhao%20and%20Haojie%20Huang%20and%20Yu%20Qi%20and%20Robert%20Platt%0AAbstract%3A%20Robotic%20grasping%20in%20cluttered%20environments%20remains%20a%20significant%20challenge%20due%20to%20occlusions%20and%20complex%20object%20arrangements.%20We%20have%20developed%20ThinkGrasp%2C%20a%20plug-and-play%20vision-language%20grasping%20system%20that%20makes%20use%20of%20GPT-4o%27s%20advanced%20contextual%20reasoning%20for%20heavy%20clutter%20environment%20grasping%20strategies.%20ThinkGrasp%20can%20effectively%20identify%20and%20generate%20grasp%20poses%20for%20target%20objects%2C%20even%20when%20they%20are%20heavily%20obstructed%20or%20nearly%20invisible%2C%20by%20using%20goal-oriented%20language%20to%20guide%20the%20removal%20of%20obstructing%20objects.%20This%20approach%20progressively%20uncovers%20the%20target%20object%20and%20ultimately%20grasps%20it%20with%20a%20few%20steps%20and%20a%20high%20success%20rate.%20In%20both%20simulated%20and%20real%20experiments%2C%20ThinkGrasp%20achieved%20a%20high%20success%20rate%20and%20significantly%20outperformed%20state-of-the-art%20methods%20in%20heavily%20cluttered%20environments%20or%20with%20diverse%20unseen%20objects%2C%20demonstrating%20strong%20generalization%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2407.11298v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinkGrasp%253A%2520A%2520Vision-Language%2520System%2520for%2520Strategic%2520Part%2520Grasping%2520in%2520Clutter%26entry.906535625%3DYaoyao%2520Qian%2520and%2520Xupeng%2520Zhu%2520and%2520Ondrej%2520Biza%2520and%2520Shuo%2520Jiang%2520and%2520Linfeng%2520Zhao%2520and%2520Haojie%2520Huang%2520and%2520Yu%2520Qi%2520and%2520Robert%2520Platt%26entry.1292438233%3DRobotic%2520grasping%2520in%2520cluttered%2520environments%2520remains%2520a%2520significant%2520challenge%2520due%2520to%252 {"title": "GenOM: Ontology Matching with Description Generation and Large Language Model", "author": "Yiping Song and Jiaoyan Chen and Renate A. Schmidt", "abstract": "Ontology matching (OM) plays an essential role in enabling semantic interoperability and integration across heterogeneous knowledge sources, particularly in the biomedical domain which contains numerous complex concepts related to diseases and pharmaceuticals. This paper introduces GenOM, a large language model (LLM)-based ontology alignment framework, which enriches the semantic representations of ontology concepts via generating textual definitions, retrieves alignment candidates with an embedding model, and incorporates exact matching-based tools to improve precision. Extensive experiments conducted on the OAEI Bio-ML track demonstrate that GenOM can often achieve competitive performance, surpassing many baselines including traditional OM systems and recent LLM-based methods. Further ablation studies confirm the effectiveness of semantic enrichment and few-shot prompting, highlighting the framework's robustness and adaptability.", "link": "http://arxiv.org/abs/2508.10703v3", "date": "2026-04-02", "relevancy": 2.4014, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4811}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4799}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4799}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenOM%3A%20Ontology%20Matching%20with%20Description%20Generation%20and%20Large%20Language%20Model&body=Title%3A%20GenOM%3A%20Ontology%20Matching%20with%20Description%20Generation%20and%20Large%20Language%20Model%0AAuthor%3A%20Yiping%20Song%20and%20Jiaoyan%20Chen%20and%20Renate%20A.%20Schmidt%0AAbstract%3A%20Ontology%20matching%20%28OM%29%20plays%20an%20essential%20role%20in%20enabling%20semantic%20interoperability%20and%20integration%20across%20heterogeneous%20knowledge%20sources%2C%20particularly%20in%20the%20biomedical%20domain%20which%20contains%20numerous%20complex%20concepts%20related%20to%20diseases%20and%20pharmaceuticals.%20This%20paper%20introduces%20GenOM%2C%20a%20large%20language%20model%20%28LLM%29-based%20ontology%20alignment%20framework%2C%20which%20enriches%20the%20semantic%20representations%20of%20ontology%20concepts%20via%20generating%20textual%20definitions%2C%20retrieves%20alignment%20candidates%20with%20an%20embedding%20model%2C%20and%20incorporates%20exact%20matching-based%20tools%20to%20improve%20precision.%20Extensive%20experiments%20conducted%20on%20the%20OAEI%20Bio-ML%20track%20demonstrate%20that%20GenOM%20can%20often%20achieve%20competitive%20performance%2C%20surpassing%20many%20baselines%20including%20traditional%20OM%20systems%20and%20recent%20LLM-based%20methods.%20Further%20ablation%20studies%20confirm%20the%20effectiveness%20of%20semantic%20enrichment%20and%20few-shot%20prompting%2C%20highlighting%20the%20framework%27s%20robustness%20and%20adaptability.%0ALink%3A%20http%3A//arxiv.org/abs/2508.10703v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenOM%253A%2520Ontology%2520Matching%2520with%2520Description%2520Generation%2520and%2520Large%2520Language%2520Model%26entry.906535625%3DYiping%2520Song%2520and%2520Jiaoyan%2520Chen%2520and%2520Renate%2520A.%2520Schmidt%26entry.1292438233%3DOntology%2520matching%2520%2528OM%2529%2520plays%2520an%2520essential%2520role%2520in%2520enabling%2520semantic%2520interoperability%2520and%2520integration%2520across%2520heterogeneous%2520knowledge%2520sources%252C%2520particularly%2520in%2520the%2520b {"title": "Prosodic ABX: A Language-Agnostic Method for Measuring Prosodic Contrast in Speech Representations", "author": "Haitong Sun and Stephen McIntosh and Kwanghee Choi and Eunjung Yeo and Daisuke Saito and Nobuaki Minematsu", "abstract": "Speech representations from self-supervised speech models (S3Ms) are known to be sensitive to phonemic contrasts, but their sensitivity to prosodic contrasts has not been directly measured. The ABX discrimination task has been used to measure phonemic contrast in S3M representations via minimal pairs. We introduce prosodic ABX, an extension of this framework to evaluate prosodic contrast with only a handful of examples and no explicit labels. Also, we build and release a dataset of English and Japanese minimal pairs and use it along with a Mandarin dataset to evaluate contrast in English stress, Japanese pitch accent, and Mandarin tone. Finally, we show that model and layer rankings are often preserved across several experimental conditions, making it practical for low-resource settings.", "link": "http://arxiv.org/abs/2604.02102v1", "date": "2026-04-02", "relevancy": 2.4011, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4893}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4893}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4622}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prosodic%20ABX%3A%20A%20Language-Agnostic%20Method%20for%20Measuring%20Prosodic%20Contrast%20in%20Speech%20Representations&body=Title%3A%20Prosodic%20ABX%3A%20A%20Language-Agnostic%20Method%20for%20Measuring%20Prosodic%20Contrast%20in%20Speech%20Representations%0AAuthor%3A%2 {"title": "Beyond Referring Expressions: Scenario Comprehension Visual Grounding", "author": "Ruozhen He and Nisarg A. Shah and Qihua Dong and Zilin Xiao and Jaywon Koo and Vicente Ordonez", "abstract": "Existing visual grounding benchmarks primarily evaluate alignment between image regions and literal referring expressions, where models can often succeed by matching a prominent named category. We explore a complementary and more challenging setting of scenario-based visual grounding, where the target must be inferred from roles, intentions, and relational context rather than explicit naming. We introduce Referring Scenario Comprehension (RSC), a benchmark designed for this setting. The queries in this benchmark are paragraph-length texts that describe object roles, user goals, and contextual cues, including deliberate references to distractor objects that often require deep understanding to resolve. Each instance is annotated with interpretable difficulty tags for uniqueness, clutter, size, overlap, and position which expose distinct failure modes and support fine-grained analysis. RSC contains approximately 31k training examples, 4k in-domain test examples, and a 3k out-of-distribution split with unseen object categories. We further propose ScenGround, a curriculum reasoning method serving as a reference point for this setting, combining supervised warm-starting with difficulty-aware reinforcement learning. Experiments show that scenario-based queries expose systematic failures in current models that standard benchmarks do not reveal, and that curriculum training improves performance on challenging slices and transfers to standard benchmarks.", "link": "http://arxiv.org/abs/2604.02323v1", "date": "2026-04-02", "relevancy": 2.3999, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6051}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6051}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Referring%20Expressions%3A%20Scenario%20Comprehension%20Visual%20Grounding&body=Title%3A%20Beyond%20Referring%20Expressions%3A%20Scenario%20Comprehension%20Visual%20Grounding%0AAuthor%3A%20Ruozhen%20He%20and%20Nisarg%20A.%20Shah%20and%20Qihua%20Dong%20and%20Zilin%20Xiao%20and%20Jaywon%20Koo%20and%20Vicente%20Ordonez%0AAbstract%3A%20Existing%20visual%20grounding%20benchmarks%20primarily%20evaluate%20alignment%20between%20image%20regions%20and%20literal%20referring%20expressions%2C%20where%20models%20can%20often%20succeed%20by%20matching%20a%20prominent%20named%20category.%20We%20explore%20a%20complementary%20and%20more%20challenging%20setting%20of%20scenario-based%20visual%20grounding%2C%20where%20the%20target%20must%20be%20inferred%20from%20roles%2C%20intentions%2C%20and%20relational%20context%20rather%20than%20explicit%20naming.%20We%20introduce%20Referring%20Scenario%20Comprehension%20%28RSC%29%2C%20a%20benchmark%20designed%20for%20this%20setting.%20The%20queries%20in%20this%20benchmark%20are%20paragraph-length%20texts%20that%20describe%20object%20roles%2C%20user%20goals%2C%20and%20contextual%20cues%2C%20including%20deliberate%20references%20to%20distractor%20objects%20that%20often%20require%20deep%20understanding%20to%20resolve.%20Each%20instance%20is%20annotated%20with%20interpretable%20difficulty%20tags%20for%20uniqueness%2C%20clutter%2C%20size%2C%20overlap%2C%20and%20position%20which%20expose%20distinct%20failure%20modes%20and%20support%20fine-grained%20analysis.%20RSC%20contains%20approximately%2031k%20training%20examples%2C%204k%20in-domain%20test%20examples%2C%20and%20a%203k%20out-of-distribution%20split%20with

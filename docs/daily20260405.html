{"title": "Seamless High-Resolution Terrain Reconstruction: A Prior-Based Vision Transformer Approach", "author": "Osher Rafaeli and Tal Svoray and Ariel Nahlieli", "abstract": "High-resolution elevation data is essential for hydrological modeling, hazard assessment, and environmental monitoring; however, globally consistent, fine-scale Digital Elevation Models (DEMs) remain unavailable. Very high-resolution single-view imagery enables the extraction of topographic information at the pixel level, allowing the reconstruction of fine terrain details over large spatial extents. In this paper, we present single-view-based DEM reconstruction shown to support practical analysis in GIS environments across multiple sub-national jurisdictions. Specifically, we produce high-resolution DEMs for large-scale basins, representing a substantial improvement over the 30 m resolution of globally available Shuttle Radar Topography Mission (SRTM) data. The DEMs are generated using a prior-based monocular depth foundation (MDE) model, extended in this work to the remote sensing height domain for high-resolution, globally consistent elevation reconstruction. We fine-tune the model by integrating low-resolution SRTM data as a global prior with high-resolution RGB imagery from the National Agriculture Imagery Program (NAIP), producing DEMs with near LiDAR-level accuracy. Our method achieves a 100x resolution enhancement (from 30 m to 30 cm), exceeding existing super-resolution approaches by an order of magnitude. Across two diverse landscapes, the model generalizes robustly, resolving fine-scale terrain features with a mean absolute error of less than 5 m relative to LiDAR and improving upon SRTM by up to 18 %. Hydrological analyses at both catchment and hillslope scales confirm the method's utility for hazard assessment and environmental monitoring, demonstrating improved streamflow representation and catchment delineation. Finally, we demonstrate the scalability of the framework by applying it across large geographic regions.", "link": "http://arxiv.org/abs/2507.09681v3", "date": "2026-04-02", "relevancy": 2.8051, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5747}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5542}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5542}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seamless%20High-Resolution%20Terrain%20Reconstruction%3A%20A%20Prior-Based%20Vision%20Transformer%20Approach&body=Title%3A%20Seamless%20High-Resolution%20Terrain%20Reconstruction%3A%20A%20Prior-Based%20Vision%20Transformer%20Approach%0AAuthor%3A%20Osher%20Rafaeli%20and%20Tal%20Svoray%20and%20Ariel%20Nahlieli%0AAbstract%3A%20High-resolution%20elevation%20data%20is%20essential%20for%20hydrological%20modeling%2C%20hazard%20assessment%2C%20and%20environmental%20monitoring%3B%20however%2C%20globally%20consistent%2C%20fine-scale%20Digital%20Elevation%20Models%20%28DEMs%29%20remain%20unavailable.%20Very%20high-resolution%20single-view%20imagery%20enables%20the%20extraction%20of%20topographic%20information%20at%20the%20pixel%20level%2C%20allowing%20the%20reconstruction%20of%20fine%20terrain%20details%20over%20large%20spatial%20extents.%20In%20this%20paper%2C%20we%20present%20single-view-based%20DEM%20reconstruction%20shown%20to%20support%20practical%20analysis%20in%20GIS%20environments%20across%20multiple%20sub-national%20jurisdictions.%20Specifically%2C%20we%20produce%20high-resolution%20DEMs%20for%20large-scale%20basins%2C%20representing%20a%20substantial%20improvement%20over%20the%2030%20m%20resolution%20of%20globally%20available%20Shuttle%20Radar%20Topography%20Mission%20%28SRTM%29%20data.%20The%20DEMs%20are%20generated%20using%20a%20prior-based%20monocular%20depth%20foundation%20%28MDE%29%20model%2C%20extended%20in%20this%20work%20to%20the%20remote%20sensing%20height%20domain%20for%20high-resolution%2C%20globally%20consistent%20elevation%20reconstruction.%20We%20fine-tune%20the%20model%20by%20integrating%20low-resolution%20SRTM%20data%20as%20a%20global%20prior%20with%20high-resolution%20RGB%20imagery%20from%20the%20National%20Agriculture%20Imagery%20Program%20%28NAIP%29%2C%20producing%20DEMs%20with%20near%20LiDAR-level%20accuracy.%20Our%20method%20achieves%20a%20100x%20resolution%20enhancement%20%28from%2030%20m%20to%2030%20cm%29%2C%20exceeding%20existing%20super-resolution%20approaches%20by%20an%20order%20of%20magnitude.%20Across%20two%20diverse%20landscapes%2C%20the%20model%20generalizes%20robustly%2C%20resolving%20fine-scale%20terrain%20features%20with%20a%20mean%20absolute%20error%20of%20less%20than%205%20m%20relative%20to%20LiDAR%20and%20improving%20upon%20SRTM%20by%20up%20to%2018%20%25.%20Hydrological%20analyses%20at%20both%20catchment%20and%20hillslope%20scales%20confirm%20the%20method%27s%20utility%20for%20hazard%20assessment%20and%20environmental%20monitoring%2C%20demonstrating%20improved%20streamflow%20representation%20and%20catchment%20delineation.%20Finally%2C%20we%20demonstrate%20the%20scalability%20of%20the%20framework%20by%20applying%20it%20across%20large%20geographic%20regions.%0ALink%3A%20http%3A//arxiv.org/abs/2507.09681v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeamless%2520High-Resolution%2520Terrain%2520Reconstruction%253A%2520A%2520Prior-Based%2520Vision%2520Transformer%2520Approach%26entry.906535625%3DOsher%2520Rafaeli%2520and%2520Tal%2520Svoray%2520and%2520Ariel%2520Nahlieli%26entry.1292438233%3DHigh-resolution%2520elevation%2520data%2520is%2520essential%2520for%2520hydrological%2520modeling%252C%2520hazard%2520assessment%252C%2520and%2520environmental%2520monitoring%253B%2520ho {"title": "Investigating Permutation-Invariant Discrete Representation Learning for Spatially Aligned Images", "author": "Jamie S. J. Stirling and Noura Al-Moubayed and Hubert P. H. Shum", "abstract": "Vector quantization approaches (VQ-VAE, VQ-GAN) learn discrete neural representations of images, but these representations are inherently position-dependent: codes are spatially arranged and contextually entangled, requiring autoregressive or diffusion-based priors to model their dependencies at sample time. In this work, we ask whether positional information is necessary for discrete representations of spatially aligned data. We propose the permutation-invariant vector-quantized autoencoder (PI-VQ), in which latent codes are constrained to carry no positional information. We find that this constraint encourages codes to capture global, semantic features, and enables direct interpolation between images without a learned prior. To address the reduced information capacity of permutation-invariant representations, we introduce matching quantization, a vector quantization algorithm based on optimal bipartite matching that increases effective bottleneck capacity by $3.5\\times$ relative to naive nearest-neighbour quantization. The compositional structure of the learned codes further enables interpolation-based sampling, allowing synthesis of novel images in a single forward pass. We evaluate PI-VQ on CelebA, CelebA-HQ and FFHQ, obtaining competitive precision, density and coverage metrics for images synthesised with our approach. We discuss the trade-offs inherent to position-free representations, including separability and interpretability of the latent codes, pointing to numerous directions for future work.", "link": "http://arxiv.org/abs/2604.01843v1", "date": "2026-04-02", "relevancy": 2.801, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5765}, {"title" t-neighbour%20quantization.%20The%20compositional%20structure%20of%20the%20learned%20codes%20further%20enables%20interpolation-based%20sampling%2C%20allowing%20synthesis%20of%20novel%20images%20in%20a%20single%20forward%20pass.%20We%20evaluate%20PI-VQ%20on%20CelebA%2C%20CelebA-HQ%20and%20FFHQ%2C%20obtaining%20competitive%20precision%2C%20density%20and%20coverage%20metrics%20for%20images%20synthesised%20with%20our%20approach.%20We%20discuss%20the%20trade-offs%20inherent%20to%20position-free%20representations%2C%20including%20separability%20and%20interpretability%20of%20the%20latent%20codes%2C%20pointing%20to%20numerous%20directions%20for%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01843v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInvestigating%2520Permutation-Invariant%2520Discrete%2520Representation%2520Learning%2520for%2520Spatially%2520Aligned%2520Images%26entry.906535625%3DJamie%2520S.%2520J.%2520Stirling%2520and%2520Noura%2520Al-Moubayed%2520and%2520Hubert%2520P.%2520H.%2520Shum%26entry.1292438233%3DVector%2520quantization%2520approaches%2520%2528VQ-VAE%252C%2520VQ-GAN%2529%2520learn%2520discrete%2520neural%2520representations%2520of%2520images%252C%2520but%2520these%2520representations%2520are%2520inherently%2520position-dependent%253A%2520codes%2520are%2520spatially%2520arranged%2520and%2520contextually%2520entangled%252C%2520requiring%2520autoregressive%2520or%2520diffusion-based%2520priors%2520to%2520model%2520their%2520dependencies%2520at%2520sample%2520time.%2520In%2520this%2520work%252C%2520we%2520ask%2520whether%2520positional%2520information%2520is%2520necessary%2520for%2520discrete%2520representations%2520of%2520spatially%2520aligned%2520data.%2520We%2520propose%2520the%2520permutation-invariant%2520vector-quantized%2520autoencoder%2520%2528PI-VQ%2529%252C%2520in%2520which%2520latent%2520codes%2520are%2520constrained%2520to%2520carry%2520no%2520pos {"title": "Test-Time Adaptation for Height Completion via Self-Supervised ViT Features and Monocular Foundation Models", "author": "Osher Rafaeli and Tal Svoray and Ariel Nahlieli", "abstract": "Accurate digital surface models (DSMs) are essential for many geospatial applications, including urban monitoring, environmental analyses, infrastructure management, and change detection. However, large-scale DSMs frequently contain incomplete or outdated regions due to acquisition limitations, reconstruction artifacts, or changes in the built environment. Traditional height completion approaches primarily rely on spatial interpolation or which assume spatial continuity and therefore fail when objects are missing. Recent learning-based approaches improve reconstruction quality but typically require supervised training on sensor-specific datasets, limiting their generalization across domains and sensing conditions. We propose Prior2DSM, a training-free framework for metric DSM completion that operates entirely at test time by leveraging foundation models. Unlike previous height completion approaches that require task-specific training, the proposed method combines self-supervised Vision Transformer (ViT) features from DINOv3 with monocular depth foundation models to propagate metric information from incomplete height priors through semantic feature-space correspondence. Test-time adaptation (TTA) is performed using parameter-efficient low-rank adaptation (LoRA) together with a lightweight multilayer perceptron (MLP), which predicts spatially varying scale and shift parameters to convert relative depth estimates into metric heights. Experiments demonstrate consistent improvements over interpolation based methods, prior-based rescaling height approaches, and state-of-the-art monocular depth estimation models. Prior2DSM reduces reconstruction error while preserving structural fidelity, achieving up to a 46% reduction in RMSE compared to linear fitting of MDE, and further enables DSM updating and coupled RGB-DSM generation.", "link": "http://arxiv.org/abs/2604.02009v1", "date": "2026-04-02", "relevancy": 2.8009, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5724}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5568}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Test-Time%20Adaptation%20for%20Height%20Completion%20via%20Self-Supervised%20ViT%20Features%20and%20Monocular%20Foundation%20Models&body=Title%3A%20Test-Time%20Adaptation%20for%20Height%20Completion%20via%20Self-Supervised%20ViT%20Features%20and%20Monocular%20Foundation%20Models%0AAuthor%3A%20Osher%20Rafaeli%20and%20Tal%20Svoray%20and%20Ariel%20Nahlieli%0AAbstract%3A%20Accurate%20digital%20surface%20models%20%28DSMs%29%20are%20essential%20for%20many%20geospatial%20applications%2C%20including%20urban%20monitoring%2C%20environmental%20analyses%2C%20infrastructure%20management%2C%20and%20change%20detection.%20However%2C%20large-scale%20DSMs%20frequently%20contain%20incomplete%20or%20outdated%20regions%20due%20to%20acquisition%20limitations%2C%20reconstruction%20artifacts%2C%20or%20changes%20in%20the%20built%20environment.%20Traditional%20height%20completion%20approaches%20primarily%20rely%20on%20spatial%20interpolation%20or%20which%20assume%20spatial%20continuity%20and%20therefore%20fail%20when%20objects%20are%20missing.%20Recent%20learning-based%20approaches%20improve%20reconstruction%20quality%20but%20typically%20require%20supervised%20training%20on%20sensor-specific%20datasets%2C%20limiting%20their%20generalization%20across%20domains%20and%20sensing%20conditions.%20W {"title": "VISTA: Visualization of Token Attribution via Efficient Analysis", "author": "Syed Ahmed and Bharathi Vokkaliga Ganesh and Jagadish Babu P and Karthick Selvaraj and Praneeth Talluri and Sanket Hingne and Anubhav Kumar and Anushka Yadav and Pratham Kumar Verma and Kiranmayee Janardhan and Mandanna A N", "abstract": "Understanding how Large Language Models (LLMs) process information from prompts remains a significant challenge. To shed light on this \"black box,\" attention visualization techniques have been developed to capture neuron-level perceptions and interpret how models focus on different parts of input data. However, many existing techniques are tailored to specific model architectures, particularly within the Transformer family, and often require backpropagation, resulting in nearly double the GPU memory usage and increased computational cost. A lightweight, model-agnostic approach for attention visualization remains lacking. In this paper, we introduce a model-agnostic token importance visualization technique to better understand how generative AI systems perceive and prioritize information from input text, without incurring additional computational cost. Our method leverages perturbation-based strategies combined with a three-matrix analytical framework to generate relevance maps that illustrate token-level contributions to model predictions. The framework comprises: (1) the Angular Deviation Matrix, which captures shifts in semantic direction; (2) the Magnitude Deviation Matrix, which measures changes in semantic intensity; and (3) the Dimensional Importance Matrix, which evaluates contributions across individual vector dimensions. By systematically removing each token and measuring the resulting impact across these three complementary dimensions, we derive a composite importance score that provides a nuanced and mathematically grounded measure of token significance. To support reproducibility and foster wider adoption, we provide open-source implementations of all proposed and utilized explainability techniques, with code and resources publicly available at https://github.com/Infosys/Infosys-Responsible-AI-Toolkit", "link": "http://arxiv.org/abs/2604.02217v1", "date": "2026-04-02", "relevancy": 2.7895, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5513}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VISTA%3A%20Visualization%20of%20Token%20Attribution%20via%20Efficient%20Analysis&body=Title%3A%20VISTA%3A%20Visualization%20of%20Token%20Attribution%20via%20Efficient%20Analysis%0AAuthor%3A%20Syed%20Ahmed%20and%20Bharathi%20Vokkaliga%20Ganesh%20and%20Jagadish%20Babu%20P%20and%20Karthick%20Selvaraj%20and%20Praneeth%20Talluri%20and%20Sanket%20Hingne%20and%20Anubhav%20Kumar%20and%20Anushka%20Yadav%20and%20Pratham%20Kumar%20Verma%20and%20Kiranmayee%20Janardhan%20and%20Mandanna%20A%20N%0AAbstract%3A%20Understanding%20how%20Large%20Language%20Models%20%28LLMs%29%20process%20information%20from%20prompts%20remains%20a%20significant%20challenge.%20To%20shed%20light%20on%20this%20%22black%20box%2C%22%20attention%20visualization%20techniques%20have%20been%20developed%20to%20capture%20neuron-level%20perceptions%20and%20interpret%20how%20models%20focus%20on%20different%20parts%20of%20input%20data.%20However%2C%20many%20existing%20techniques%20are%20tailored%20to%20specific%20model%20architectures%2C%20particularly%20within%20the%20Transformer%20family%2C%20and%20often%20require%20backpropagation%2C%20resulting%20in%20nearly%20double%20the%20GPU%20memory%20usage%20and%20increased%20computational%20cost.%20A%20lightweight%2C%20model-agnostic%20approach%20for%20attention%20visualization%20remains%20lacking.%20In%20this%20paper%2C%20we%20introduce%20a%20model-agnostic%20token%20importance%20visualization%20technique%20to%20better%20understand%20how%20generative%20AI%20systems%20perceive%20and%20prioritize%20information%20from%20input%20text%2C%20without%20incurring%20additional%20computational%20cost.%20Our%20method%20leverages%20perturbation-based%20strategies%20combined%20with%20a%20three-matrix%20analytical%20framework%20to%20generate%20relevance%20maps%20that%20illustrate%20token-level%20contributions%20to%20model%20predictions.%20The%20framework%20comprises%3A%20%281%29%20the%20Angular%20Deviation%20Matrix%2C%20which%20captures%20shifts%20in%20semantic%20direction%3B%20%282%29%20the%20Magnitude%20Deviation%20Matrix%2C%20which%20measures%20changes%20in%20semantic%20intensity%3B%20and%20%283%29%20the%20Dimensional%20Importance%20Matrix%2C%20which%20evaluates%20contributions%20across%20individual%20vector%20dimensions.%20By%20systematically%20removing%20each%20token%20and%20measuring%20the%20resulting%20impact%20across%20these%20three%20complementary%20dimensions%2C%20we%20derive%20a%20composite%20importance%20score%20that%20provides%20a%20nuanced%20and%20mathematically%20grounded%20measure%20of%20token%20significance.%20To%20support%20reproducibility%20and%20foster%20wider%20adoption%2C%20we%20provide%20open-source%20implementations%20of%20all%20proposed%20and%20utilized%20explainability%20techniques%2C%20with%20code%20and%20resources%20publicly%20available%20at%20https%3A//github.com/Infosys/Infosys-Responsible-AI-Toolkit%0ALink%3A%20http%3A//arxiv.org/abs/2604.02217v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVISTA%253A%2520Visualization%2520of%2520Token%2520Attribution%2520via%2520Efficient%2520Analysis%26entry.906535625%3DSyed%2520Ah {"title": "Lightweight Spatiotemporal Highway Lane Detection via 3D-ResNet and PINet with ROI-Aware Attention", "author": "Sorna Shanmuga Raja and Abdelhafid Zenati", "abstract": "This paper presents a lightweight, end-to-end highway lane detection architecture that jointly captures spatial and temporal information for robust performance in real-world driving scenarios. Building on the strengths of 3D convolutional neural networks and instance segmentation, we propose two models that integrate a 3D-ResNet encoder with a Point Instance Network (PINet) decoder. The first model enhances multi-scale feature representation using a Feature Pyramid Network (FPN) and Self-Attention mechanism to refine spatial dependencies. The second model introduces a Region of Interest (ROI) detection head to selectively focus on lane-relevant regions, thereby improving precision and reducing computational complexity.\n  Experiments conducted on the TuSimple dataset (highway driving scenarios) demonstrate that the proposed second model achieves 93.40% accuracy while significantly reducing false negatives. Compared to existing 2D and 3D baselines, our approach achieves improved performance with fewer parameters and reduced latency. The architecture has been validated through offline training and real-time inference in the Autonomous Systems Laboratory at City, St George's University of London. These results suggest that the proposed models are well-suited for integration into Advanced Driver Assistance Systems (ADAS), with potential scalability toward full Lane Assist Systems (LAS).", "link": "http://arxiv.org/abs/2604.02188v1", "date": "2026-04-02", "relevancy": 2.7849, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.602}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5445}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5245}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Lightweight%20Spatiotemporal%20Highway%20Lane%20Detection%20via%203D-ResNet%20and%20PINet%20with%20ROI-Aware%20Attention&body=Title%3A%20Lightweight%20Spatiotemporal%20Highway%20Lane%20Detection%20via%203D-ResNet%20and%20PINet%20with%20ROI-Aware%20Attention%0AAuthor%3A%20Sorna%20Shanmuga%20Raja%20and%20Abdelhafid%20Zenati%0AAbstract%3A%20This%20paper%20presents%20a%20lightweight%2C%20end-to-end%20highway%20lane%20detection%20architecture%20that%20jointly%20captures%20spatial%20and%20temporal%20information%20for%20robust%20performance%20in%20real-world%20driving%20scenarios.%20Building%20on%20the%20strengths%20of%203D%20convolutional%20neural%20networks%20and%20instance%20segmentation%2C%20we%20propose%20two%20models%20that%20integrate%20a%203D-ResNet%20encoder%20with%20a%20Point%20Instance%20Network%20%28PINet%29%20decoder.%20The%20first%20model%20enhances%20multi-scale%20feature%20representation%20using%20a%20Feature%20Pyramid%20Network%20%28FPN%29%20and%20Self-Attention%20mechanism%20to%20refine%20spatial%20dependencies.%20The%20second%20model%20introduces%20a%20Region%20of%20Interest%20%28ROI%29%20detection%20head%20to%20selectively%20focus%20on%20lane-relevant%20regions%2C%20thereby%20improving%20precision%20and%20reducing%20computational%20complexity.%0A%20%20Experiments%20conducted%20on%20the%20TuSimple%20dataset%20%28highway%20driving%20scenarios%29%20demonstrate%20that%20the%20proposed%20second%20model%20achieves%2093.40%25%20accuracy%20while%20significantly%20reducing%20false%20negatives.%20Compared%20to%20existing%202D%20and%203D%20baselines%2C%20our%20approach%20achieves%20improved%20performance%20with%20fewer%20parameters%20and%20reduced%20latency.%20The%20architecture%20has%20 et%29%20decoder.%20The%20first%20model%20enhances%20multi-scale%20feature%20representation%20using%20a%20Feature%20Pyramid%20Network%20%28FPN%29%20and%20Self-Attention%20mechanism%20to%20refine%20spatial%20dependencies.%20The%20second%20model%20introduces%20a%20Region%20of%20Interest%20%28ROI%29%20detection%20head%20to%20selectively%20focus%20on%20lane-relevant%20regions%2C%20thereby%20improving%20precision%20and%20reducing%20computational%20complexity.%0A%20%20Experiments%20conducted%20on%20the%20TuSimple%20dataset%20%28highway%20driving%20scenarios%29%20demonstrate%20that%20the%20proposed%20second%20model%20achieves%2093.40%25%20accuracy%20while%20significantly%20reducing%20false%20negatives.%20Compared%20to%20existing%202D%20and%203D%20baselines%2C%20our%20approach%20achieves%20improved%20performance%20with%20fewer%20parameters%20and%20reduced%20latency.%20The%20architecture%20has%20been%20validated%20through%20offline%20training%20and%20real-time%20inference%20in%20the%20Autonomous%20Systems%20Laboratory%20at%20City%2C%20St%20George%27s%20University%20of%20London.%20These%20results%20suggest%20that%20the%20proposed%20models%20are%20well-suited%20for%20integration%20into%20Advanced%20Driver%20Assistance%20Systems%20%28ADAS%29%2C%20with%20potential%20scalability%20toward%20full%20Lane%20Assist%20Systems%20%28LAS%29.&entry.1838667208=http%3A//arxiv.org/abs/2604.02188v1&entry.124074799=Read"},
{"title": "SPAR: Single-Pass Any-Resolution ViT for Open-vocabulary Segmentation", "author": "Naomi Kombol and Ivan Martinovi\u0107 and Sini\u0161a \u0160egvi\u0107 and Giorgos Tolias", "abstract": "Foundational Vision Transformers (ViTs) have limited effectiveness in tasks requiring fine-grained spatial understanding, due to their fixed pre-training resolution and inherently coarse patch-level representations. These challenges are especially pronounced in dense prediction scenarios, such as open-vocabulary segmentation with ViT-based vision-language models, where high-resolution inputs are essential for accurate pixel-level reasoning. Existing approaches typically process large-resolution images using a sliding-window strategy at the pre-training resolution. While this improves accuracy through finer strides, it comes at a significant computational cost. We introduce SPAR: Single-Pass Any-Resolution ViT, a resolution-agnostic dense feature extractor designed for efficient high-resolution inference. We distill the spatial reasoning capabilities of a finely-strided, sliding-window teacher into a single-pass student using a feature regression loss, without requiring architectural changes or pixel-level supervision. Applied to open-vocabulary segmentation, SPAR improves single-pass baselines by up to 10.5 mIoU and even surpasses the teacher, demonstrating effectiveness in efficient, high-resolution reasoning. Code: https://github.com/naomikombol/SPAR", "link": "http://arxiv.org/abs/2604.02252v1", "date": "2026-04-02", "relevancy": 2.7799, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5577}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5577}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "ht {"title": "GroundVTS: Visual Token Sampling in Multimodal Large Language Models for Video Temporal Grounding", "author": "Rong Fan and Kaiyan Xiao and Minghao Zhu and Liuyi Wang and Kai Dai and Zhao Yang", "abstract": "Video temporal grounding (VTG) is a critical task in video understanding and a key capability for extending video large language models (Vid-LLMs) to broader applications. However, existing Vid-LLMs rely on uniform frame sampling to extract video information, resulting in a sparse distribution of key frames and the loss of crucial temporal cues. To address this limitation, we propose Grounded Visual Token Sampling (GroundVTS), a Vid-LLM architecture that focuses on the most informative temporal segments. GroundVTS employs a fine-grained, query-guided mechanism to filter visual tokens before feeding them into the LLM, thereby preserving essential spatio-temporal information and maintaining temporal coherence. Futhermore, we introduce a progressive optimization strategy that enables the LLM to effectively adapt to the non-uniform distribution of visual features, enhancing its ability to model temporal dependencies and achieve precise video localization. We comprehensively evaluate GroundVTS on three standard VTG benchmarks, where it outperforms existing methods, achieving a 7.7-point improvement in mIoU for moment retrieval and 12.0-point improvement in mAP for highlight detection. Code is available at https://github.com/Florence365/GroundVTS.", "link": "http://arxiv.org/abs/2604.02093v1", "date": "2026-04-02", "relevancy": 2.7672, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5581}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5562}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", 20improvement%20in%20mAP%20for%20highlight%20detection.%20Code%20is%20available%20at%20https%3A//github.com/Florence365/GroundVTS.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02093v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGroundVTS%253A%2520Visual%2520Token%2520Sampling%2520in%2520Multimodal%2520Large%2520Language%2520Models%2520for%2520Video%2520Temporal%2520Grounding%26entry.906535625%3DRong%2520Fan%2520and%2520Kaiyan%2520Xiao%2520and%2520Minghao%2520Zhu%2520and%2520Liuyi%2520Wang%2520and%2520Kai%2520Dai%2520and%2520Zhao%2520Yang%26entry.1292438233%3DVideo%2520temporal%2520grounding%2520%2528VTG%2529%2520is%2520a%2520critical%2520task%2520in%2520video%2520understanding%2520and%2520a%2520key%2520capability%2520for%2520extending%2520video%2520large%2520language%2520models%2520%2528Vid-LLMs%2529%2520to%2520broader%2520applications.%2520However%252C%2520existing%2520Vid-LLMs%2520rely%2520on%2520uniform%2520frame%2520sampling%2520to%2520extract%2520video%2520information%252C%2520resulting%2520in%2520a%2520sparse%2520distribution%2520of%2520key%2520frames%2520and%2520the%2520loss%2520of%2520crucial%2520temporal%2520cues.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Grounded%2520Visual%2520Token%2520Sampling%2520%2528GroundVTS%2529%252C%2520a%2520Vid-LLM%2520architecture%2520that%2520focuses%2520on%2520the%2520most%2520informative%2520temporal%2520segments.%2520GroundVTS%2520employs%2520a%2520fine-grained%252C%2520query-guided%2520mechanism%2520to%2520filter%2520visual%2520tokens%2520before%2520feeding%2520them%2520into%2520the%2520LLM%252C%2520thereby%2520preserving%2520essential%2520spatio-temporal%2520information%2520and%2520maintaining%2520temporal%2520coherence.%2520Futhermore%252C%2520we%2520introduce%2520a%2520progressive%2520optimization%2520strategy%2520that%2520enables%2520the%2520LLM%2520to%2520effectively%2520adapt%2520to%2520the%2520non-unifo {"title": "MAR-MAER: Metric-Aware and Ambiguity-Adaptive Autoregressive Image Generation", "author": "Kai Dong and Tingting Bai", "abstract": "Autoregressive (AR) models have demonstrated significant success in the realm of text-to-image generation. However, they usually face two major challenges. Firstly, the generated images may not always meet the quality standards expected by humans. Furthermore, these models face difficulty when dealing with ambiguous prompts that could be interpreted in several valid ways. To address these issues, we introduce MAR-MAER, an innovative hierarchical autoregressive framework. It combines two main components. It is a metric-aware embedding regularization method. The other one is a probabilistic latent model used for handling ambiguous semantics. Our method utilizes a lightweight projection head, which is trained with an adaptive kernel regression loss function. This aligns the model's internal representations with human-preferred quality metrics, such as CLIPScore and HPSv2. As a result, the embedding space that is learned more accurately reflects human judgment. We are also introducing a conditional variational module. This approach incorporates an aspect of controlled randomness within the hierarchical token generation process. This capability allows the model to produce a diverse array of coherent images based on ambiguous or open-ended prompts. We conducted extensive experiments using COCO and a newly developed Ambiguous-Prompt Benchmark. The results show that MAR-MAER achieves excellent performance in both metric consistency and semantic flexibility. It exceeds the baseline Hi-MAR model's performance, showing an improvement of +1.6 in CLIPScore and +5.3 in HPSv2. For unclear inputs, it produces a notably wider range of outputs. These findings have been confirmed through both human evaluation and automated metrics.", "link": "http://arxiv.org/abs/2604.01864v1", "date": "2026-04-02", "relevancy": 2.7666, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.558}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5517}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5503}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAR-MAER%3A%20Metric-Aware%20and%20Ambiguity-Adaptive%20Autoregressive%20Image%20Generation&body=Title%3A%20MAR-MAER%3A%20Metric-Aware%20and%20Ambiguity-Adaptive%20Autoregressive%20Image%20Generation%0AAuthor%3A%20Kai%20Dong%20and%20Tingting%20Bai%0AAbstract%3A%20Autoregressive%20%28AR%29%20models%20have%20demonstrated%20significant%20success%20in%20the%20realm%20of%20text-to-image%20generation.%20However%2C%20they%20usually%20face%20two%20major%20challenges.%20Firstly%2C%20the%20generated%20images%20may%20not%20always%20meet%20the%20quality%20standards%20expected%20by%20humans.%20Furthermore%2C%20these%20models%20face%20difficulty%20when%20dealing%20with%20ambiguous%20prompts%20that%20could%20be%20interpreted%20in%20several%20valid%20ways.%20To%20address%20these%20issues%2C%20we%20introduce%20MAR-MAER%2C%20an%20innovative%20hierarchical%20autoregressive%20framework.%20It%20combines%20two%20main%20components.%20It%20is%20a%20metric-aware%20embedding%20regularization%20method.%20The%20other%20one%20is%20a%20probabilistic%20latent%20model%20used%20for%20handling%20ambiguous%20semantics.%20Our%20method%20utilizes%20a%20lightweight%20projection%20head%2C%20which%20is%20trained%20with%20an%20adaptive%20kernel%20regression%20loss%20function.%20This%20aligns%20the%20model%27s%20internal%20representations%20with%20human-preferred%20quality%20metrics%2C%20such%20as%20CLIPScore%20and%20HPSv2.%20As%20a%20result%2C%20the%20embedding%20space%20that%20is%20learned%20more%20accurately%20reflects%20human%20judgment.%20We%20are%20also%20introducing%20a%20conditional%20variational%20module.%20This%20approach%20incorporates%20an%20aspect%20of%20controlled%20randomness%20within%20the%20hierarchical%20token%20generation%20process.%20This%20capability%20allows%20the%20model%20to%20produce%20a%20diverse%20array%20of%20coherent%20images%20based%20on%20ambiguous%20or%20open-ended%20prompts.%20We%20conducted%20extensive%20experiments%20using%20COCO%20and%20a%20newly%20developed%20Ambiguous-Prompt%20Benchmark.%20The%20results%20show%20that%20MAR-MAER%20achieves%20excellent%20performance%20in%20both%20metric%20consistency%20and%20semantic%20flexibility.%20It%20exceeds%20the%20baseline%20Hi-MAR%20model%27s%20performance%2C%20showing%20an%20improvement%20of%20%2B1.6%20in%20CLIPScore%20and%20%2B5.3%20in%20HPSv2.%20For%20unclear%20inputs%2C%20it%20produces%20a%20notably%20wider%20range%20of%20outputs.%20These%20findings%20have%20been%20confirmed%20through%20both%20human%20evaluation%20and%20automated%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01864v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAR-MAER%253A%2520Metric-Aware%2520and%2520Ambiguity-Adaptive%2520Autoregressive%2520Image%2520Generation%26entry.906535625%3DKai%2520Dong%2520and%2520Tingting%2520Bai%26entry.1292438233%3DAutoregressive%2520%2528AR%2529%2520models%2520have%2520demonstrated%2520significant%2520success%2520in%2520the%2520realm%2520of%2520text-to-image%2520generation.%2520However%252C%2520they%2520usually%2520face%2520two%2520major%2520challenges.%2520Firstly%252C%2520the%2520generated%2520images%2520may%2520not%2520always%2520meet%2520the%2520quality%2520standards%2520expected%2520by%2520humans.%2520Furthermore%252C%2520these%2520models%2520face%2520difficulty%2520when%2520dealing%2520with%2520ambiguous%2520prompts%2520that%2520could%2520be%2520interpreted%2520in%2520several%2520valid%2520ways.%2520To% 0wider%2520range%2520of%2520outputs.%2520These%2520findings%2520have%2520been%2520confirmed%2520through%2520both%2520human%2520evaluation%2520and%2520automated%2520metrics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01864v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MAR-MAER%3A%20Metric-Aware%20and%20Ambiguity-Adaptive%20Autoregressive%20Image%20Generation&entry.906535625=Kai%20Dong%20and%20Tingting%20Bai&entry.1292438233=Autoregressive%20%28AR%29%20models%20have%20demonstrated%20significant%20success%20in%20the%20realm%20of%20text-to-image%20generation.%20However%2C%20they%20usually%20face%20two%20major%20challenges.%20Firstly%2C%20the%20generated%20images%20may%20not%20always%20meet%20the%20quality%20standards%20expected%20by%20humans.%20Furthermore%2C%20these%20models%20face%20difficulty%20when%20dealing%20with%20ambiguous%20prompts%20that%20could%20be%20interpreted%20in%20several%20valid%20ways.%20To%20address%20these%20issues%2C%20we%20introduce%20MAR-MAER%2C%20an%20innovative%20hierarchical%20autoregressive%20framework.%20It%20combines%20two%20main%20components.%20It%20is%20a%20metric-aware%20embedding%20regularization%20method.%20The%20other%20one%20is%20a%20probabilistic%20latent%20model%20used%20for%20handling%20ambiguous%20semantics.%20Our%20method%20utilizes%20a%20lightweight%20projection%20head%2C%20which%20is%20trained%20with%20an%20adaptive%20kernel%20regression%20loss%20function.%20This%20aligns%20the%20model%27s%20internal%20representations%20with%20human-preferred%20quality%20metrics%2C%20such%20as%20CLIPScore%20and%20HPSv2.%20As%20a%20result%2C%20the%20embedding%20space%20that%20is%20learned%20more%20accurately%20reflects%20human%20judgment.%20We%20are%20also%20introducing%20a%20conditional%20variational%20module.%20This%20approach%20incorporates%20an%20aspect%20of%20controlled%20randomness%20within%20the%20hierarchical%20token%20ge {"title": "Captioning Daily Activity Images in Early Childhood Education: Benchmark and Algorithm", "author": "Sixing Li and Zhibin Gu and Ziqi Zhang and Weiguo Pan and Bing Li and Ying Wang and Hongzhe Liu", "abstract": "Image captioning for Early Childhood Education (ECE) is essential for automated activity understanding and educational assessment. However, existing methods face two key challenges. First, the lack of large-scale, domain-specific datasets limits the model's ability to capture fine-grained semantic concepts unique to ECE scenarios, resulting in generic and imprecise descriptions. Second, conventional training paradigms exhibit limitations in enhancing professional object description capability, as supervised learning tends to favor high-frequency expressions, while reinforcement learning may suffer from unstable optimization on difficult samples.\n  To address these limitations, we introduce ECAC, a large-scale benchmark for ECE daily activity image captioning, comprising 256,121 real-world images annotated with expert-level captions and fine-grained labels. ECAC is further equipped with a domain-oriented evaluation protocol, the Teaching Toy Recognition Score (TTS), to explicitly measure professional object naming accuracy. Furthermore, we propose RSRS (Reward-Conditional Switch of Reinforcement Learning and Supervised Fine-Tuning), a hybrid training framework that dynamically alternates between RL and supervised optimization. By rerouting hard samples with zero rewards to supervised fine-tuning, RSRS effectively mitigates advantage collapse and enables stable optimization for fine-grained recognition. Leveraging ECAC and RSRS, we develop KinderMM-Cap-3B, a domain-adapted multimodal large language model. Extensive experiments demonstrate that our model achieves a TTS of 51.06, substantially outperforming state-of-the-art baselines while maintaining superior caption quality, highlighting its potential for specialized educational applications.", "link": "http://arxiv.org/abs/2604.01941v1", "date": "2026-04-02", "relevancy": 2.7663, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.559}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.559}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5417}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Captioning%20Daily%20Activity%20Images%20in%20Early%20Childhood%20Education%3A%20Benchmark%20and%20Algorithm&body=Title%3A%20Captioning%20Daily%20Activity%20Images%20in%20Early%20Childhood%20Education%3A%20Benchmark%20and%20Algorithm%0AAuthor%3A%20Sixing%20Li%20and%20Zhibin%20Gu%20and%20Ziqi%20Zhang%20and%20Weiguo%20Pan%20and%20Bing%20Li%20and%20Ying%20Wang%20and%20Hongzhe%20Liu%0AAbstract%3A%20Image%20captioning%20for%20Early%20Childhood%20Education%20%28ECE%29%20is%20essential%20for%20automated%20activity%20understanding%20and%20educational%20assessment.%20However%2C%20existing%20methods%20face%20two%20key%20challenges.%20First%2C%20the%20lack%20of%20large-scale%2C%20domain-specific%20datasets%20limits%20the%20model%27s%20ability%20to%20capture%20fine-grained%20semantic%20concepts%20unique%20to%20ECE%20scenarios%2C%20resulting%20in%20generic%20and%20imprecise%20descriptions.%20Second%2C%20conventional%20training%20paradigms%20exhibit%20limitations%20in%20enhancing%20professional%20object%20description%20capability%2C%20as%20supervised%20learning%20tends%20to%20favor%20high-frequency%20expressions%2C%20while%20reinforcement%20learning%20may%20suffer%20from%20unstable%20optimization%20on%20difficult%20samples.%0A%20%20To%20address%20these%20limitations%2C%20we%20introduce%20ECAC%2C%20a%20large-scale%20benchmark%20for%20ECE%20daily%20activity%20image%20captioning%2C%20comprising%20256%2C121%20real-world%20images%20annotated%20with%20expert-level%20captions%20and%20fine-grained%20labels.%20ECAC%20is%20further%20equipped%20with%20a%20domain-oriented%20evaluation%20protocol%2C%20the%20Teaching%20Toy%20Recognition%20Score%20%28TTS%29%2C%20to%20explicitly%20measure%20professional%20object%20naming%20accuracy.%20Furthermore%2C%20we%20propose%20RSRS%20%28Reward-Conditional%20Switch%20of%20Reinforcement%20Learning%20and%20Supervised%20Fine-Tuning%29%2C%20a%20hybrid%20training%20framework%20that%20dynamically%20alternates%20between%20RL%20and%20supervised%20optimization.%20By%20rerouting%20hard%20samples%20with%20zero%20rewards%20to%20supervised%20fine-tuning%2C%20RSRS%20effectively%20mitigates%20advantage%20collapse%20and%20enables%20stable%20optimization%20for%20fine-grained%20recognition.%20Leveraging%20ECAC%20and%20RSRS%2C%20we%20develop%20KinderMM-Cap-3B%2C%20a%20domain-adapted%20multimodal%20large%20language%20model.%20Extensive%20experiments%20demonstrate%20that%20our%20model%20achieves%20a%20TTS%20of%2051.06%2C%20substantially%20outperforming%20state-of-the-art%20baselines%20while%20maintaining%20superior%20caption%20quality%2C%20highlighting%20its%20potential%20for%20specialized%20educational%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01941v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCaptioning%2520Daily%2520Activity%2520Images%2520in%2520Early%2520Childhood%2520Education%253A%2520Benchmark%2520and%2520Algorithm%26entry.906535625%3DSixing%2520Li%2520and%2520Zhibin%2520Gu%2520and%2520Ziqi%2520Zhang%2520and%2520Weiguo%2520Pan%2520and%2520Bing%2520Li%2520and%2520Ying%2520Wang%2520and%2520Hongzhe%2520Liu%26entry.1292438233%3DImage%2520captioning%2520for%2520Early%2520Childhood%2520Education%2520%2528ECE%2529%2520is%2520essential%2520for%2520automated%2520activity%2520understanding%2520and%2520educational%252 {"title": "Molmo2: Open Weights and Data for Vision-Language Models with Video Understanding and Grounding", "author": "Christopher Clark and Jieyu Zhang and Zixian Ma and Jae Sung Park and Mohammadreza Salehi and Rohun Tripathi and Sangho Lee and Zhongzheng Ren and Chris Dongjoo Kim and Yinuo Yang and Vincent Shao and Yue Yang and Weikai Huang and Ziqi Gao and Taira Anderson and Jianrui Zhang and Jitesh Jain and George Stoica and Winson Han and Ali Farhadi and Ranjay Krishna", "abstract": "Today's strongest video-language models (VLMs) remain proprietary. The strongest open-weight models either rely on synthetic data from proprietary VLMs, effectively distilling from them, or do not disclose their training data or recipe. As a result, the open-source community lacks the foundations needed to improve on the state-of-the-art video (and image) language models. Crucially, many downstream applications require more than just high-level video understanding; they require grounding -- either by pointing or by tracking in pixels. Even proprietary models lack this capability. We present Molmo2, a new family of VLMs that are state-of-the-art among open-source models and demonstrate exceptional new capabilities in point-driven grounding in single image, multi-image, and video tasks. Our key contribution is a collection of 7 new video datasets and 2 multi-image datasets, including a dataset of highly detailed video captions for pre-training, a free-form video Q&A dataset for fine-tuning, a new object tracking dataset with complex queries, and an innovative new video pointing dataset, all collected without the use of closed VLMs. We also present a training recipe for this data utilizing an efficient packing and message-tree encoding scheme, and show bi-directional attention on vision tokens and a novel token-weight strategy improves performance. Our best-in-class 8B model outperforms others in the class of open weight and data models on short videos, counting, and captioning, and is competitive on long-videos. On video-grounding Molmo2 significantly outperforms existing open-weight models like Qwen3-VL (35.5 vs 29.6 accuracy on video counting) and surpasses proprietary models like Gemini 3 Pro on some tasks (38.4 vs 20.0 F1 on video pointing and 56.2 vs 41.1 J&F on video tracking).", "link": "http://arxiv.org/abs/2601.10611v4", "date": "2026-04-02", "relevancy": 2.7573, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5605}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5605}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5334}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Molmo2%3A%20Open%20Weights%20and%20Data%20for%20Vision-Language%20Models%20with%20Video%20Understanding%20and%20Grounding&body=Title%3A%20Molmo2%3A%20Open%20Weights%20and%20Data%20for%20Vision-Language%20Models%20with%20Video%20Understanding%20and%20Grounding%0AAuthor%3A%20Christopher%20Clark%20and%20Jieyu%20Zhang%20and%20Zixian%20Ma%20and%20Jae%20Sung%20Park%20and%20Mohammadreza%20Salehi%20and%20Rohun%20Tripathi%20and%20Sangho%20Lee%20and%20Zhongzheng%20Ren%20and%20Chris%20Dongjoo%20Kim%20and%20Yinuo%20Yang%20and%20Vincent%20Shao%20and%20Yue%20Yang%20and%20Weikai%20Huang%20and%20Ziqi%20Gao%20and%20Taira%20Anderson%20and%20Jianrui%20Zhang%20and%20Jitesh%20Jain%20and%20George%20Stoica%20and%20Winson%20Han%20and%20Ali%20Farhadi%20and%20Ranjay%20Krishna%0AAbstract%3A%20Today%27s%20strongest%20video-language%20models%20%28VLMs%29%20remain%20proprietary.%20The%20strongest%20open-weight%20models%20either%20rely%20on%20synthetic%20data%20from%20proprietary%20VLMs%2C%20effectively%20distilling%20from%20them%2C%20or%20do%20not%20disclose%20thei {"title": "Universal Hypernetworks for Arbitrary Models", "author": "Xuanfeng Zhou", "abstract": "Conventional hypernetworks are typically engineered around a specific base-model parameterization, so changing the target architecture often entails redesigning the hypernetwork and retraining it from scratch. We introduce the \\emph{Universal Hypernetwork} (UHN), a fixed-architecture generator that predicts weights from deterministic parameter, architecture, and task descriptors. This descriptor-based formulation decouples the generator architecture from target-network parameterization, so one generator can instantiate heterogeneous models across the tested architecture and task families. Our empirical claims are threefold: (1) one fixed UHN remains competitive with direct training across vision, graph, text, and formula-regression benchmarks; (2) the same UHN supports both multi-model generalization within a family and multi-task learning across heterogeneous models; and (3) UHN enables stable recursive generation with up to three intermediate generated UHNs before the final base model. Our code is available at https://github.com/Xuanfeng-Zhou/UHN.", "link": "http://arxiv.org/abs/2604.02215v1", "date": "2026-04-02", "relevancy": 2.7484, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5817}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5397}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Universal%20Hypernetworks%20for%20Arbitrary%20Models&body=Title%3A%20Universal%20Hypernetworks%20for%20Arbitrary%20Models%0AAuthor%3A%20Xuanfeng%20Zhou%0AAbstract%3A%20Conventional%20hypernetworks%20are%20typically%20engineered%20around%20a%20specific%20base-model%20parameterization%2C%20so%20changing%20the%20target%20architecture%20often%20entails%20redesigning%20the%20hypernetwork%20and%20retraining%20it%20from%20scratch.%20We%20introduce%20the%20%5Cemph%7BUniversal%20Hypernetwork%7D%20%28UHN%29%2C%20a%20fixed-architecture%20generator%20that%20predicts%20weights%20from%20deterministic%20parameter%2C%20architecture%2C%20and%20task%20descriptors.%20This%20descriptor-based%20formulation%20decouples%20the%20generator%20architecture%20from%20target-network%20parameterization%2C%20so%20one%20generator%20can%20instantiate%20heterogeneous%20models%20across%20the%20tested%20architecture%20and%20task%20families.%20Our%20empirical%20claims%20are%20threefold%3A%20%281%29%20one%20fixed%20UHN%20remains%20competitive%20with%20direct%20training%20across%20vision%2C%20graph%2C%20text%2C%20and%20formula-regression%20benchmarks%3B%20%282%29%20the%20same%20UHN%20supports%20both%20multi-model%20generalization%20within%20a%20family%20and%20multi-task%20learning%20across%20heterogeneous%20models%3B%20and%20%283%29%20UHN%20enables%20stable%20recursive%20generation%20with%20up%20to%20three%20intermediate%20generated%20UHNs%20before%20the%20final%20base%20model.%20Our%20code%20is%20available%20at%20https%3A//github.com/Xuanfeng-Zhou/UHN.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02215v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniversal%2520Hypernetworks%2520for%2520Arbitrary%2520Models%26entry.906535625%3DXuanfeng%2520Zhou%26entry.1292438233%3DConventional%2520hypernetworks%2520are%2520typically%2520engineered%2520around%2520a%2520specific%2520base-model%2520parameterization%252C%2520so%2520changing%2520the%2520target%2520architecture%2520often%2520entails%2520redesigning%2520the%2520hypernetwork%2520and%2520retraining%2520it%2520from%2520scratch.%2520We%2520introduce%2520the%2520%255Cemph%257BUniversal%2520Hypernetwork%257D%2520%2528UHN%2529%252C%2520a%2520fixed-architecture%2520generator%2520that%2520predicts%2520weights%2520from%2520deterministic%2520parameter%252C%2520architecture%252C%2520and%2520task%2520descriptors.%2520This%2520descriptor-based%2520formulation%2520decouples%2520the%2520generator%2520architecture%2520from%2520target-network%2520parameterization%252C%2520so%2520one%2520generator%2520can%2520instantiate%2520heterogeneous%2520models%2520across%2520the%2520tested%2520architecture%2520and%2520task%2520families.%2520Our%2520empirical%2520claims%2520are%2520threefold%253A%2520%25281%2529%2520one%2520fixed%2520UHN%2520remains%2520competitive%2520with%2520direct%2520training%2520across%2520vision%252C%2520graph%252C%2520text%252C%2520and%2520formula-regression%2520benchmarks%253B%2520%25282%2529%2520the%2520same%2520UHN%2520supports%2520both%2520multi-model%2520generalization%2520within%2520a%2520family%2520and%2520multi-task%2520learning%2520across%2520heterogeneous%2520models%253B%2520and%2520%25283%2529%2520UHN%2520enables%2520stable%2520recursive%2520generation%2520with%2520up%2520to%2520three%2520intermediate%2520generated%2520UHNs%2520before%2520the%2520final%2520base%2520model.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/Xuanfeng-Zhou/UHN.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02215v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Universal%20Hypernetworks%20for%20Arbitrary%20Models&entry.906535625=Xuanfeng%20Zhou&entry.1292438233=Conventional%20hypernetworks%20are%20typically%20engineered%20around%20a%20specific%20base-model%20parameterization%2C%20so%20changing%20the%20target%20architecture%20often%20entails%20redesigning%20the%20hypernetwork%20and%20retraining%20it%20from%20scratch.%20We%20introduce%20the%20%5Cemph%7BUniversal%20Hypernetwork%7D%20%28UHN%29%2C%20a%20fixed-architecture%20generator%20that%20predicts%20weights%20from%20deterministic%20parameter%2C%20architecture%2C%20 {"title": "Mining Instance-Centric Vision-Language Contexts for Human-Object Interaction Detection", "author": "Soo Won Seo and KyungChae Lee and Hyungchan Cho and Taein Son and Nam Ik Cho and Jun Won Choi", "abstract": "Human-Object Interaction (HOI) detection aims to localize human-object pairs and classify their interactions from a single image, a task that demands strong visual understanding and nuanced contextual reasoning. Recent approaches have leveraged Vision-Language Models (VLMs) to introduce semantic priors, significantly improving HOI detection performance. However, existing methods often fail to fully capitalize on the diverse contextual cues distributed across the entire scene. To overcome these limitations, we propose the Instance-centric Context Mining Network (InCoM-Net)-a novel framework that effectively integrates rich semantic knowledge extracted from VLMs with instance-specific features produced by an object detector. This design enables deeper interaction reasoning by modeling relationships not only within each detected instance but also across instances and their surrounding scene context. InCoM-Net comprises two core components: Instancecentric Context Refinement (ICR), which separately extracts intra-instance, inter-instance, and global contextual cues from VLM-derived features, and Progressive Context Aggregation (ProCA), which iteratively fuses these multicontext features with instance-level detector features to support high-level HOI reasoning. Extensive experiments on the HICO-DET and V-COCO benchmarks show that InCoM-Net achieves state-of-the-art performance, surpassing previous HOI detection methods. Code is available at https://github.com/nowuss/InCoM-Net.", "link": "http://arxiv.org/abs/2604.02071v1", "date": "2026-04-02", "relevancy": 2.7243, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5627}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5627}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5093}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mining%20Instance-Centric%20Vision-Language%20Contexts%20for%20Human-Object%20Interaction%20Detection&body=Title%3A%20Mining%20Instance-Centric%20Vision-Language%20Contexts%20for%20Human-Object%20Interaction%20Detection%0AAuthor%3A%20Soo%20Won%20Seo%20and%20KyungChae%20Lee%20and%20Hyungchan%20Cho%20and%20Taein%20Son%20and%20Nam%20Ik%20Cho%20and%20Jun%20Won%20Choi%0AAbstract%3A%20Human-Object%20Interaction%20%28HOI%29%20detection%20aims%20to%20localize%20human-object%20pairs%20and%20classify%20their%20interactions%20from%20a%20single%20image%2C%20a%20task%20that%20demands%20strong%20visual%20understanding%20and%20nuanced%20contextual%20reasoning.%20Recent%20approaches%20have%20leveraged%20Vision-Language%20Models%20%28VLMs%29%20to%20introduce%20semantic%20priors%2C%20significantly%20improving%20HOI%20detection%20performance.%20However%2C%20existing%20methods%20often%20fail%20to%20fully%20capitalize%20on%20the%20diverse%20contextual%20cues%20distributed%20across%20the%20entire%20scene.%20To%20overcome%20these%20limitations%2C%20we%20propose%20the%20Instance-centric%20Context%20Mining%20Network%20%28InCoM-Net%29-a%20novel%20framework%20that%20effectively%20integrates%20rich%20semantic%20knowledge%20extracted%20from%20VLMs%20with%20instance-specific%20features%20produced%20by%20an%20object%20detector.%20This%20design%20enables%20deeper%20interaction%20reasoning%20by%20modeling%20relationships%20not%20only%20within%20each%20detected%20instance%20but%20also%20across%20instances%20and%20their%20surrounding%20scene%20context.%20InCoM-Net%20comprises%20two%20core%20components%3A%20Instancecentric%20Context%20Refinement%20%28ICR%29%2C%20which%20separately%20extracts%20intra-instance%2C%20inter-instance%2C%20and%20global%20contextual%20cues%20from%20VLM-derived%20features%2C%20and%20Progressive%20Context%20Aggregation%20%28ProCA%29%2C%20which%20iteratively%20fuses%20these%20multicontext%20features%20with%20instance-level%20detector%20features%20to%20support%20high-level%20HOI%20reasoning.%20Extensive%20experiments%20on%20the%20HICO-DET%20and%20V-COCO%20benchmarks%20show%20that%20InCoM-Net%20achieves%20state-of-the-art%20performance%2C%20surpassing%20previous%20HOI%20detection%20methods.%20Code%20is%20available%20at%20https%3A//github.com/nowuss/InCoM-Net.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02071v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMining%2520Instance-Centric%2520Vision-Language%2520Contexts%2520for%2520Human-Object%2520Interaction%2520Detection%26entry.906535625%3DSoo%2520Won%2520Seo%2520and%2520KyungChae%2520Lee%2520and%2520Hyungchan%2520Cho%2520and%2520Taein%2520Son%2520and%2520Nam%2520Ik%2520Cho%2520and%2520Jun%2520Won%2520Choi%26entry.1292438233%3DHuman-Object%2520Interaction%2520%2528HOI%2529%2520detection%2520aims%2520to%2520localize%2520human-object%2520pairs%2520and%2520classify%2520their%2520interactions%2520from%2520a%2520single%2520image%252C%2520a%2520task%2520that%2520demands%2520strong%2520visual%2520understanding%2520and%2520nuanced%2520contextual%2520reasoning.%2520Recent%2520approaches%2520have%2520leveraged%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520to%2520introduce%2520semantic%2520priors%252C%2520significantly%2520improving%2520HOI%2520detection%2520performance.%2520However%252C%2520existing%2520methods%2520often%2520fail%2520to%2520fully%2520capitalize%2520on%2520the%2520diverse%2520contextual%2520cues%2520distributed%2520across%2520the%2520entire%2520scene.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520propose%2520the%2520Instance-centric%2520Context%2520Mining%2520Network%2520%2528InCoM-Net%2529-a%2520novel%2520framework%2520that%2520effectively%2520integrates%2520rich%2520semantic%2520knowledge%2520extracted%2520from%2520VLMs%2520with%2520instance-specific%2520features%2520produced%2520by%2520an%2520object%2520detector.%2520This%2520design%2520enables%2520deeper%2520interaction%2520reasoning%2520by%2520modeling%2520relationships%2520not%2520only%2520within%2520each%2520detected%2520instance%2520but%2520also%2520across%2520instances%2520and%2520their%2520surrounding%2520scene%2520context.%2520InCoM-Net%2520comprises%2520two%2520core%2520components%253A%2520Instancecentric%2520Context%2520Refinement%2520%2528ICR%2529%252C%2520which%2520separately%2520extracts%2520intra-instance%252C%2520inter-instance%252C%2520and%2520global%2520contextual%2520cues%2520from%2520VLM-derived%2520features%252C%2520and%2520Progressive%2520Context%2520Aggregation%2520%2528ProCA%2529%252C%2520which%2520iteratively%2520fuses%2520these%2520multicontext%2520features%2520with%2520instance-level%2520detector%2520features%2520to%2520support%2520high-level%2520HOI%2520reasoning.%2520Extensive%2520experiments%2520on%2520the%2520HICO-DET%2520and%2520V-COCO%2520benchmarks%2520show%2520that%2520InCoM-Net%2520achieves%2520state-of-the-art%2520performance%252C%2520surpassing%2520previous%2520HOI%2520detection%2520methods.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/nowuss/InCoM-Net.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02071v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Mining%20Instance-Centric%20Vision-Language%20Contexts%20for%20Human-Object%20Interaction%20Detection&entry.906535625=Soo%20Won%20Seo%20and%20KyungChae%20Lee%20and%20Hyungchan%20Cho%20and%20Taein%20Son%20and%20Nam%20Ik%20Cho%20and%20Jun%20Won%20Choi&entry.1292438233=Human-Object%20Interaction%20%28HOI%29%20detection%20aims%20to%20localize%20human-object%20pairs%20and%20classify%20their%20interactions%20from%20a%20single%20image%2C%20a%20task%20that%20demands%20strong%20visual%20understanding%20and%20nuanced%20contextual%20reasoning.%20Recent%20approaches%20have%20leveraged%20Vision-Language%20Models%20%28VLMs%29%20to%20introduce%20semantic%20priors%2C%20significantly%20improving%20HOI%20detection%20performance.%20However%2C%20existing%20methods%20often%20fail%20to%20fully%20capitalize%20on%20the%20diverse%20contextual%20cues%20distributed%20across%20the%20entire%20scene.%20To%20overcome%20these%20limitations%2C%20we%20propose%20the%20Instance-centric%20Context%20Mining%20Network%20%28InCoM-Net%29-a%20novel%20framework%20that%20effectively%20integrates%20rich%20semantic%20knowledge%20extracted%20from%20VLMs%20with%20instance-specific%20features%20produced%20by%20an%20object%20detector.%20This%20design%20enables%20deeper%20interaction%20reasoning%20by%20modeling%20relationships%20not%20only%20within%20each%20detected%20instance%20but%20also%20across%20instances%20and%20their%20surrounding%20scene%20context.%20InCoM-Net%20comprises%20two%20core%20components%3A%20Instancecentric%20Context%20Refinement%20%28ICR%29%2C%20which%20separately%20extracts%20intra-instance%2C%20inter-instance%2C%20and%20global%20contextual%20cues%20from%20VLM-derived%20features%2C%20and%20Progressive%20Context%20Aggregation%20%28ProCA%29%2C%20which%20iteratively%20fuses%20these%20multicontext%20features%20with%20instance-level%20detector%20features%20to%20support%20high-level%20HOI%20reasoning.%20Extensive%20experiments%20on%20the%20HICO-DET%20and%20V-COCO%20benchmarks%20show%20that%20InCoM-Net%20achieves%20state-of-the-art%20performance%2C%20surpassing%20previous%20HOI%20detection%20methods.%20Code%20is%20available%20at%20https%3A//github.com/nowuss/InCoM-Net.&entry.1838667208=http%3A//arxiv.org/abs/2604.02071v1&entry.124074799=Read"},
{"title": "BidirLM: From Text to Omnimodal Bidirectional Encoders by Adapting and Composing Causal LLMs", "author": "Nicolas Boizard and Th\u00e9o Deschamps-Berger and Hippolyte Gisserot-Boukhlef and C\u00e9line Hudelot and Pierre Colombo", "abstract": "Transforming causal generative language models into bidirectional encoders offers a powerful alternative to BERT-style architectures. However, current approaches remain limited: they lack consensus on optimal training objectives, suffer from catastrophic forgetting at scale, and fail to flexibly integrate the vast ecosystem of specialized generative models. In this work, through systematic ablations on the Gemma3 and Qwen3 families, we identify the key factors driving successful adaptation, highlighting the critical role of an often-omitted prior masking phase. To scale this process without original pre-training data, we introduce a dual strategy combining linear weight merging with a lightweight multi-domain data mixture that mitigates catastrophic forgetting. Finally, we augment our encoders by merging them with specialized causal models, seamlessly transferring modality- and domain-specific capabilities. This open-source recipe, designed for any causal decoder LLM, yields BidirLM, a family of five encoders that outperform alternatives on text, vision, and audio representation benchmarks.", "link": "http://arxiv.org/abs/2604.02045v1", "date": "2026-04-02", "relevancy": 2.7055, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5526}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D% {"title": "MOON3.0: Reasoning-aware Multimodal Representation Learning for E-commerce Product Understanding", "author": "Junxian Wu and Chenghan Fu and Zhanheng Nie and Daoze Zhang and Bowen Wan and Wanxian Guan and Chuan Yu and Jian Xu and Bo Zheng", "abstract": "With the rapid growth of e-commerce, exploring general representations rather than task-specific ones has attracted increasing attention. Although recent multimodal large language models (MLLMs) have driven significant progress in product understanding, they are typically employed as feature extractors that implicitly encode product information into global embeddings, thereby limiting their ability to capture fine-grained attributes. Therefore, we argue that leveraging the reasoning capabilities of MLLMs to explicitly model fine-grained product attributes holds significant potential. Nevertheless, achieving this goal remains non-trivial due to several key challenges: (i) long-context reasoning tends to dilute the model's attention to salient information in the raw input; (ii) supervised fine-tuning (SFT) primarily encourages rigid imitation, limiting the exploration of effective reasoning strategies; and (iii) fine-grained details are progressively attenuated during forward propagation. To address these issues, we propose MOON3.0, the first reasoning-aware MLLM-based model for product representation learning. Our method (1) employs a multi-head modality fusion module to adaptively integrate raw signals; (2) incorporates a joint contrastive and reinforcement learning framework to autonomously explore more effective reasoning strategies; and (3) introduces a fine-grained residual enhancement module to progressively preserve local details throughout the network. Additionally, we release a large-scale multimodal e-commerce benchmark MBE3.0. Experimentally, our model demonstrates state-of-the-art zero-shot performance across various downstream tasks on both our benchmark and public datasets.", "link": "http://arxiv.org/abs/2604.00513v2", "date": "2026-04-02", "relevancy": 2.6961, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5669}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5254}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5254}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MOON3.0%3A%20Reasoning-aware%20Multimodal%20Representation%20Learning%20for%20E-commerce%20Product%20Understanding&body=Title%3A%20MOON3.0%3A%20Reasoning-aware%20Multimodal%20Representation%20Learning%20for%20E-commerce%20Product%20Understanding%0AAuthor%3A%20Junxian%20Wu%20and%20Chenghan%20Fu%20and%20Zhanheng%20Nie%20and%20Daoze%20Zhang%20and%20Bowen%20Wan%20and%20Wanxian%20Guan%20and%20Chuan%20Yu%20and%20Jian%20Xu%20and%20Bo%20Zheng%0AAbstract%3A%20With%20the%20rapid%20growth%20of%20e-commerce%2C%20exploring%20general%20representations%20rather%20than%20task-specific%20ones%20has%20attracted%20increasing%20attention.%20Although%20recent%20multimodal%20large%20language%20models%20%28MLLMs%29%20have%20driven%20significant%20progress%20in%20product%20understanding%2C%20they%20are%20typically%20employed%20as%20feature%20extractors%20that%20implicitly%20encode%20product%20information%20into%20global%20embeddings%2C%20thereby%20limiting%20their%20ability%20to%20capture%20fine-grained%20attributes.%20Therefore%2C%20we%20argue%20that%20leveraging%20the%20reasoning%20capabilities%20of%20MLLMs%20to%20explicitly%20model%20fine-grained%20product%20attributes%20holds%20significant%20potential.%20Nevertheless%2C%20achieving%20this%20goal%20remains%20non-trivial%20due%20to%20several%20key%20challenges%3A%20%28i%29%20long-context%20reasoning%20tends%20to%20dilute%20the%20model%27s%20attention%20to%20salient%20information%20in%20the%20raw%20input%3B%20%28ii%29%20supervised%20fine-tuning%20%28SFT%29%20primarily%20encourages%20rigid%20imitation%2C%20limiting%20the%20exploration%20of%20effective%20reasoning%20strategies%3B%20and%20%28iii%29%20fine-grained%20details%20are%20progressively%20attenuated%20during%20forward%20propagation.%20To%20address%20these%20issues%2C%20we%20propose%20MOON3.0%2C%20the%20first%20reasoning-aware%20MLLM-based%20model%20for%20product%20representation%20learning.%20Our%20method%20%281%29%20employs%20a%20multi-head%20modality%20fusion%20module%20to%20adaptively%20integrate%20raw%20signals%3B%20%282%29%20incorporates%20a%20joint%20contrastive%20and%20reinforcement%20learning%20framework%20to%20autonomously%20explore%20more%20effective%20reasoning%20strategies%3B%20and%20%283%29%20introduces%20a%20fine-grained%20residual%20enhancement%20module%20to%20progressively%20preserve%20local%20details%20throughout%20the%20network.%20Additionally%2C%20we%20release%20a%20large-scale%20multimodal%20e-commerce%20benchmark%20MBE3.0.%20Experimentally%2C%20our%20model%20demonstrates%20state-of-the-art%20zero-shot%20performance%20across%20various%20downstream%20tasks%20on%20both%20our%20benchmark%20and%20public%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00513v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMOON3.0%253A%2520Reasoning-aware%2520Multimodal%2520Representation%2520Learning%2520for%2520E-commerce%2520Product%2520Understanding%26entry.906535625%3DJunxian%2520Wu%2520and%2520Chenghan%2520Fu%2520and%2520Zhanheng%2520Nie%2520and%2520Daoze%2520Zhang%2520and%2520Bowen%2520Wan%2520and%2520Wanxian%2520Guan%2520and%2520Chuan%2520Yu%2520and%2520Jian%2520Xu%2520and%2520Bo%2520Zheng%26entry.1292438233%3DWith%2520the%2520rapid%2520growth%2520of%2520e-commerce%252C%2520exploring%2520general%2520representations%2520rather%2520than%2520t {"title": "Enhancing Medical Visual Grounding via Knowledge-guided Spatial Prompts", "author": "Yifan Gao and Tao Zhou and Yi Zhou and Ke Zou and Yizhe Zhang and Huazhu Fu", "abstract": "Medical Visual Grounding (MVG) aims to identify diagnostically relevant phrases from free-text radiology reports and localize their corresponding regions in medical images, providing interpretable visual evidence to support clinical decision-making. Although recent Vision-Language Models (VLMs) exhibit promising multimodal reasoning ability, their grounding remains insufficient spatial precision, largely due to a lack of explicit localization priors when relying solely on latent embeddings. In this work, we analyze this limitation from an attention perspective and propose KnowMVG, a Knowledge-prior and global-local attention enhancement framework for MVG in VLMs that explicitly strengthens spatial awareness during decoding. Specifically, we present a knowledge-enhanced prompting strategy that encodes phrase related medical knowledge into compact embeddings, together with a global-local attention that jointly leverages coarse global information and refined local cues to guide precise region localization. localization. This design bridges high-level semantic understanding and fine-grained visual perception without introducing extra textual reasoning overhead. Extensive experiments on four MVG benchmarks demonstrate that our KnowMVG consistently outperforms existing approaches, achieving gains of 3.0% in AP50 and 2.6% in mIoU over prior state-of-the-art methods. Qualitative and ablation studies further validate the effectiveness of each component.", "link": "http://arxiv.org/abs/2604.01915v1", "date": "2026-04-02", "relevancy": 2.6752, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5385}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Und {"title": "Combining Boundary Supervision and Segment-Level Regularization for Fine-Grained Action Segmentation", "author": "Hinako Mitsuoka and Kazuhiro Hotta", "abstract": "Recent progress in Temporal Action Segmentation (TAS) has increasingly relied on complex architectures, which can hinder practical deployment. We present a lightweight dual-loss training framework that improves fine-grained segmentation quality with only one additional output channel and two auxiliary loss terms, requiring minimal architectural modification. Our approach combines a boundary-regression loss that promotes accurate temporal localization via a single-channel boundary prediction and a CDF-based segment-level regularization loss that encourages coherent within-segment structure by matching cumulative distributions over predicted and ground-truth segments. The framework is architecture-agnostic and can be integrated into existing TAS models (e.g., MS-TCN, C2F-TCN, FACT) as a training-time loss function. Across three benchmark datasets, the proposed method improves segment-level consistency and boundary quality, yielding higher F1 and Edit scores across three different models. Frame-wise accuracy remains largely unchanged, highlighting that precise segmentation can be achieved through simple loss design rather than heavier architectures or inference-time refinements.", "link": "http://arxiv.org/abs/2604.01859v1", "date": "2026-04-02", "relevancy": 2.6492, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5541}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5232}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5122}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Combining%20Boundary%20Supervision%20and%20Segment-Level%20Regularization%20for%20Fine-Grained%20Action%20Segmentation&body=Title%3A%20Combining%20Boundary%20Supervision%20and%20Segment-Level%20Regularization%20for%20Fine-Grained%20Action%20Segmentation%0AAuthor%3A%20Hinako%20Mitsuoka%20and%20Kazuhiro%20Hotta%0AAbstract%3A%20Recent%20progress%20in%20Temporal%20Action%20Segmentation%20%28TAS%29%20has%20increasingly%20relied%20on%20complex%20architectures%2C%20which%20can%20hinder%20practical%20deployment.%20We%20present%20a%20lightweight%20dual-loss%20training%20framework%20that%20improves%20fine-grained%20segmentation%20quality%20with%20only%20one%20additional%20output%20channel%20and%20two%20auxiliary%20loss%20terms%2C%20requiring%20minimal%20architectural%20modification.%20Our%20approach%20combines%20a%20boundary-regression%20loss%20that%20promotes%20accurate%20temporal%20localization%20via%20a%20single-channel%20boundary%20prediction%20and%20a%20CDF-based%20segment-level%20regularization%20loss%20that%20encourages%20coherent%20within-segment%20structure%20by%20matching%20cumulative%20distributions%20over%20predicted%20and%20ground-truth%20segments.%20The%20framework%20is%20architecture-agnostic%20and%20can%20be%20integrated%20into%20existing%20TAS%20models%20%28e.g.%2C%20MS-TCN%2C%20C2F-TCN%2C%20FACT%29%20as%20a%20training-time%20loss%20function.%20Across%20three%20benchmark%20datasets%2C%20the%20proposed%20method%20improves%20segment-level%20consistency%20and%20boundary%20quality%2C%20yielding%20higher%20F1%20and%20Edit%20scores%20across%20three%20different%20models.%20Frame-wise%20accuracy%20remains%20largely%20unchanged%2C%20highlighting%20that%20precise%20segmentation%20can%20be%20achieved%20through%20simple%20loss%20design%20rather%20than%20heavier%20architectures%20or%20inference-time%20refinements.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01859v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9s

{"title": "NearID: Identity Representation Learning via Near-identity Distractors", "author": "Aleksandar Cvejic and Rameen Abdal and Abdelrahman Eldesokey and Bernard Ghanem and Peter Wonka", "abstract": "When evaluating identity-focused tasks such as personalized generation and image editing, existing vision encoders entangle object identity with background context, leading to unreliable representations and metrics. We introduce the first principled framework to address this vulnerability using Near-identity (NearID) distractors, where semantically similar but distinct instances are placed on the exact same background as a reference image, eliminating contextual shortcuts and isolating identity as the sole discriminative signal. Based on this principle, we present the NearID dataset (19K identities, 316K matched-context distractors) together with a strict margin-based evaluation protocol. Under this setting, pre-trained encoders perform poorly, achieving Sample Success Rates (SSR), a strict margin-based identity discrimination metric, as low as 30.7% and often ranking distractors above true cross-view matches. We address this by learning identity-aware representations on a frozen backbone using a two-tier contrastive objective enforcing the hierarchy: same identity > NearID distractor > random negative. This improves SSR to 99.2%, enhances part-level discrimination by 28.0%, and yields stronger alignment with human judgments on DreamBench++, a human-aligned benchmark for personalization. Project page: https://gorluxor.github.io/NearID/", "link": "http://arxiv.org/abs/2604.01973v1", "date": "2026-04-02", "relevancy": 2.2383, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6037}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5331}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5155}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NearID%3A%20Identity%20Representation%20Learning%20via%20Near-identity%20Distractors&body=Title%3A%20NearID%3A%20Identity%20Representation%20Learning%20via%20Near-identity%20Distractors%0AAuthor%3A%20Aleksandar%20Cvejic%20and%20Rameen%20Abdal%20and%20Abdelrahman%20Eldesokey%20and%20Bernard%20Ghanem%20and%20Peter%20Wonka%0AAbstract%3A%20When%20evaluating%20identity-focused%20tasks%20such%20as%20personalized%20generation%20and%20image%20editing%2C%20existing%20vision%20encoders%20entangle%20object%20identity%20with%20background%20context%2C%20leading%20to%20unreliable%20representations%20and%20metrics.%20We%20introduce%20the%20first%20principled%20framework%20to%20address%20this%20vulnerability%20using%20Near-identity%20%28NearID%29%20distractors%2C%20where%20semantically%20similar%20but%20distinct%20instances%20are%20placed%20on%20the%20exact%20same%20background%20as%20a%20reference%20image%2C%20eliminating%20contextual%20shortcuts%20and%20isolating%20identity%20as%20the%20sole%20discriminative%20signal.%20Based%20on%20this%20principle%2C%20we%20present%20the%20NearID%20dataset%20%2819K%20identities%2C%20316K%20matched-context%20distractors%29%20together%20with%20a%20strict%20margin-based%20evaluation%20protocol.%20Under%20this%20setting%2C%20pre-trained%20encoders%20perform%20poorly%2C%20achieving%20Sample%20Success%20Rates%20%28SSR%29%2C%20a%20strict%20margin-based%20identity%20discrimination%20metric%2C%20as%20low%20as%2030.7%25%20and%20often%20ranking%20distractors%20above%20true%20cross-view%20matches.%20We%20address%20this%20by%20learning%20identity-aware%20representations%20on%20a%20frozen%20backbone%20using%20a%20two-tier%20contrastive%20objective%20enforcing%20the%20hierarchy%3A%20same%20identity%20%3E%20NearID%20distractor%20%3E%20random%20negative.%20This%20improves%20SSR%20to%2099.2%25%2C%20enhances%20part-level%20discrimination%20by%2028.0%25%2C%20and%20yields%20stronger%20alignment%20with%20human%20judgments%20on%20DreamBench%2B%2B%2C%20a%20human-aligned%20benchmark%20for%20personalization.%20Project%20page%3A%20https%3A//gorluxor.github.io/NearID/%0ALink%3A%20http%3A//arxiv.org/abs/2604.01973v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNearID%253A%2520Identity%2520Representation%2520Learning%2520via%2520Near-identity%2520Distractors%26entry.906535625%3DAleksandar%2520Cvejic%2520and%2520Rameen%2520Abdal%2520and%2520Abdelrahman%2520Eldesokey%2520and%2520Bernard%2520Ghanem%2520and%2520Peter%2520Wonka%26entry.1292438233%3DWhen%2520evaluating%2520identity-focused%2520tasks%2520such%2520as%2520personalized%2520generation%2520and%2520image%2520editing%252C%2520existing%2520vision%2520encoders%2520entangle%2520object%2520identity%2520with%2520background%2520context%252C%2520leading%2520to%2520unreliable%2520representations%2520and%2520metrics.%2520We%2520introduce%2520the%2520first%2520principled%2520framework%2520to%2520address%2520this%2520vulnerability%2520using%2520Near-identity%2520%2528NearID%2529%2520distractors%252C%2520where%2520semantically%2520similar%2520but%2520distinct%2520instances%2520are%2520placed%2520on%2520the%2520exact%2520same%2520background%2520as%2520a%2520reference%2520image%252C%2520eliminating%2520contextual%2520shortcuts%2520and%2520isolating%2520identity%2520as%2520the%2520sole%2520discriminative%2520signal.%2520Based%2520on%2520this%2520principle%252C%2520we%2520present%2520the%2520NearID%2520dataset%2520%252819K%2520identities%252C%2520316K%2520matched-context%2520distractors%2529%2520together%2520with%2520a%2520strict%2520margin-based%2520evaluation%2520protocol.%2520Under%2520this%2520setting%252C%2520pre-trained%2520encoders%2520perform%2520poorly%252C%2520achieving%2520Sample%25 0shortcuts%20and%20isolating%20identity%20as%20the%20sole%20discriminative%20signal.%20Based%20on%20this%20principle%2C%20we%20present%20the%20NearID%20dataset%20%2819K%20identities%2C%20316K%20matched-context%20distractors%29%20together%20with%20a%20strict%20margin-based%20evaluation%20protocol.%20Under%20this%20setting%2C%20pre-trained%20encoders%20perform%20poorly%2C%20achieving%20Sample%20Success%20Rates%20%28SSR%29%2C%20a%20strict%20margin-based%20identity%20discrimination%20metric%2C%20as%20low%20as%2030.7%25%20and%20often%20ranking%20distractors%20above%20true%20cross-view%20matches.%20We%20address%20this%20by%20learning%20identity-aware%20representations%20on%20a%20frozen%20backbone%20using%20a%20two-tier%20contrastive%20objective%20enforcing%20the%20hierarchy%3A%20same%20identity%20%3E%20NearID%20distractor%20%3E%20random%20negative.%20This%20improves%20SSR%20to%2099.2%25%2C%20enhances%20part-level%20discrimination%20by%2028.0%25%2C%20and%20yields%20stronger%20alignment%20with%20human%20judgments%20on%20DreamBench%2B%2B%2C%20a%20human-aligned%20benchmark%20for%20personalization.%20Project%20page%3A%20https%3A//gorluxor.github.io/NearID/&entry.1838667208=http%3A//arxiv.org/abs/2604.01973v1&entry.124074799=Read"},
{"title": "FTPFusion: Frequency-Aware Infrared and Visible Video Fusion with Temporal Perturbation", "author": "Xilai Li and Chusheng Fang and Xiaosong Li", "abstract": "Infrared and visible video fusion plays a critical role in intelligent surveillance and low-light monitoring. However, maintaining temporal stability while preserving spatial detail remains a fundamental challenge. Existing methods either focus on frame-wise enhancement with limited temporal modeling or rely on heavy spatio-temporal aggregation that often sacrifices high-frequency details. In this paper, we propose FTPFusion, a frequency-aware infrared and visible video fusion method based on temporal perturbation and sparse cross-modal interaction. Specifically, FTPFusion decomposes the feature representations into high-frequency and low-frequency components for collaborative modeling. The high-frequency branch performs sparse cross-modal spatio-temporal interaction to capture motion-related context and complementary details. The low-frequency branch introduces a temporal perturbation strategy to enhance robustness against complex video variations, such as flickering, jitter, and local misalignment. Furthermore, we design an offset-aware temporal consistency constraint to explicitly stabilize cross-frame representations under temporal disturbances. Extensive experiments on multiple public benchmarks demonstrate that FTPFusion consistently outperforms state-of-the-art methods across multiple metrics in both spatial fidelity and temporal consistency. The source code will be available at https://github.com/ixilai/FTPFusion.", "link": "http://arxiv.org/abs/2604.01900v1", "date": "2026-04-02", "relevancy": 2.225, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5951}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5513}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FTPFusion%3A%20Frequency-Aware%20Infrared%20and%20Visible%20Video%20Fusion%20with%20Temporal%20Perturbation&body=Title%3A%20FTPFusion%3A%20Frequency-Aware%20Infrared%20and%20Visible%20Video%20Fusion%20with%20Temporal%20Perturbation%0AAuthor%3A%20Xilai%20Li%20and%20Chusheng%20Fang%20and%20Xiaosong%20Li%0AAbstract%3A%20Infrared%20and%20visible%20video%20fusion%20plays%20a%20critical%20role%20in%20intelligent%20surveillance%20and%20low-light%20monitoring.%20However%2C%20maintaining%20temporal%20stability%20while%20preserving%20spatial%20detail%20remains%20a%20fundamental%20challenge.%20Existing%20methods%20either%20focus%20on%20frame-wise%20enhancement%20with%20limited%20temporal%20modeling%20or%20rely%20on%20heavy%20spatio-temporal%20aggregation%20that%20often%20sacrifices%20high-frequency%20details.%20In%20this%20paper%2C%20we%20propose%20FTPFusion%2C%20a%20frequency-aware%20infrared%20and%20visible%20video%20fusion%20method%20based%20on%20temporal%20perturbation%20and%20sparse%20cross-modal%20interaction.%20Specifically%2C%20FTPFusion%20decomposes%20the%20feature%20representations%20into%20high-frequency%20and%20low-frequency%20components%20for%20collaborative%20modeling.%20The%20high-frequency%20branch%20performs%20sparse%20cross-modal%20spatio-temporal%20interaction%20to%20capture%20motion-related%20context%20and%20complementary%20details.%20The%20low-frequency%20branch%20introduces%20a%20temporal%20perturbation%20strategy%20to%20enhance%20robustness%20against%20complex%20video%20variations%2C%20such%20as%20flickering%2C%20jitter%2C%20and%20local%20misalignment.%20Furthermore%2C%20we%20design%20an%20offset-aware%20temporal%20consistency%20constraint%20to%20explicitly%20stabilize%20cross-frame%20representations%20under%20temporal%20disturbances.%20Extensive%20experiments%20on%20multiple%20public%20benchmarks%20demonstrate%20that%20FTPFusion%20consistently%20outperforms%20state-of-the-art%20methods%20across%20multiple%20metrics%20in%20both%20spatial%20fidelity%20and%20temporal%20consistency.%20The%20source%20code%20will%20be%20available%20at%20https%3A//github.com/ixilai/FTPFusion.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01900v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFTPFusion%253A%2520Frequency-Aware%2520Infrared%2520and%2520Visible%2520Video%2520Fusion%2520with%2520Temporal%2520Perturbation%26entry.906535625%3DXilai%2520Li%2520and%2520Chusheng%2520Fang%2520and%2520Xiaosong%2520Li%26entry.1292438233%3DInfrared%2520and%2520visible%2520video%2520fusion%2520plays%2520a%2520critical%2520role%2520in%2520intelligent%2520surveillance%2520and%2520low-light%2520monitoring.%2520However%252C%2520maintaining%2520temporal%2520stability%2520while%2520preserving%2520spatial%2520detail%2520remains%2520a%2520fundamental%2520challenge.%2520Existing%2520methods%2520either%2520focus%2520on%2520frame-wise%2520enhancement%2520with%2520limited%2520temporal%2520modeling%2520or%2520rely%2520on%2520heavy%2520spatio-temporal%2520aggregation%2520that%2520often%2520sacrifices%2520high-frequency%2520details.%2520In%2520this%2520paper%252C%2520we%2520propose%2520FTPFusion%252C%2520a%2520frequency-aware%2520infrared%2520and%2520visible%2520video%2520fusion%2520method%2520based%2520on%2520temporal%2520perturbation%2520and%2520sparse%2520cross-modal%2520interaction.%2520Specifically%252C%2520FTPFusion%2520decomposes%2520the%2520feature%2520representations%2520into%2520high-frequency%2520and%2520low-frequency%2520components%2520for%2520collaborative%2520modeling.%2520The%2520high-frequency%2520branch%2520performs%2520sparse%2520cross-modal%2520spatio-temporal%2520interaction%2520to%2520capture%2520motion-related%2520context% {"title": "Qiana: A First-Order Formalism to Quantify over Contexts and Formulas with Temporality", "author": "Simon Coumes and Pierre-Henri Paris and Fran\u00e7ois Schwarzentruber and Fabian Suchanek", "abstract": "We introduce Qiana, a logic framework for reasoning on formulas that are true only in specific contexts. In Qiana, it is possible to quantify over both formulas and contexts to express, e.g., that ``everyone knows everything Alice says''. Qiana also permits paraconsistent logics within contexts, so that contexts can contain contradictions. Furthermore, Qiana is based on first-order logic, and is finitely axiomatizable, so that Qiana theories are compatible with pre-existing first-order logic theorem provers. We show how Qiana can be used to represent temporality, event calculus, and modal logic. We also discuss different design alternatives of Qiana.", "link": "http://arxiv.org/abs/2604.01952v1", "date": "2026-04-02", "relevancy": 1.3892, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.3513}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3458}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.3439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Qiana%3A%20A%20First-Order%20Formalism%20to%20Quantify%20over%20Contexts%20and%20Formulas%20with%20Temporality&body=Title%3A%20Qiana%3A%20A%20First-Order%20Formalism%20to%20Quantify%20over%20Contexts%20and%20Formulas%20with%20Temporality%0AAuthor%3A%20Simon%20Coumes%20and%20Pierre-Henri%20Paris%20and%20Fran%C3%A7ois%20Schwar {"title": "Resource-Efficient Variational Quantum Classifier", "author": "Petr Pt\u00e1\u010dek and Paulina Lewandowska and Ryszard Kukulski", "abstract": "We introduce the unambiguous quantum classifier based on Hamming distance measurements combined with classical post-processing. The proposed approach improves classification performance through a more effective use of ansatz expressivity, while requiring significantly fewer circuit evaluations. Moreover, the method demonstrates enhanced robustness to noise, which is crucial for near-term quantum devices. We evaluate the proposed method on a breast cancer classification dataset. The unambiguous classifier achieves an average accuracy of 90%, corresponding to an improvement of 6.9 percentage points over the baseline, while requiring eight times fewer circuit executions per prediction. In the presence of noise, the improvement is reduced to approximately 3.1 percentage points, with the same reduction in execution cost. We substantiate our experimental results with theoretical evidence supporting the practical performance of the approach.", "link": "http://arxiv.org/abs/2511.09204v2", "date": "2026-04-02", "relevancy": 1.7664, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.451}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4388}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4333}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Resource-Efficient%20Variational%20Quantum%20Classifier&body=Title%3A%20R {"title": "Intelligent Cloud Orchestration: A Hybrid Predictive and Heuristic Framework for Cost Optimization", "author": "Heet Nagoriya and Komal Rohit", "abstract": "Cloud computing allows scalable resource provisioning, but dynamic workload changes often lead to higher costs due to over-provisioning. Machine learning (ML) approaches, such as Long Short-Term Memory (LSTM) networks, are effective for predicting workload patterns at a higher level, but they can introduce delays during sudden traffic spikes. In contrast, mathematical heuristics like Game Theory provide fast and reliable scheduling decisions, but they do not account for future workload changes. To address this trade-off, this paper proposes a hybrid orchestration framework that combines LSTM-based predictive scaling with heuristic task allocation. The results show that this approach reduces infrastructure costs close to ML-based models while maintaining fast response times similar to heuristic methods. This work presents a practical approach for improving cost efficiency in cloud resource management.", "link": "http://arxiv.org/abs/2604.02131v1", "date": "2026-04-02", "relevancy": 1.3145, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4526}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4415}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4155}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Intelligent%20Cloud%20Orchestration%3A%20A%20Hybrid%20Predictive%20and%20Heuristic%20Framework%20for%20Cost%20Optimization&body=Title%3A%20Intelligent%20Cloud%20Orchestration%3A%20A%20Hybrid%20Predictive%20and%20Heuristic%20Framework%20for%20Cost%20Optimization%0AAuthor%3A%2 520networks%252C%2520are%2520effective%2520for%2520predicting%2520workload%2520patterns%2520at%2520a%2520higher%2520level%252C%2520but%2520they%2520can%2520introduce%2520delays%2520during%2520sudden%2520traffic%2520spikes.%2520In%2520contrast%252C%2520mathematical%2520heuristics%2520like%2520Game%2520Theory%2520provide%2520fast%2520and%2520reliable%2520scheduling%2520decisions%252C%2520but%2520they%2520do%2520not%2520account%2520for%2520future%2520workload%2520changes.%2520To%2520address%2520this%2520trade-off%252C%2520this%2520paper%2520proposes%2520a%2520hybrid%2520orchestration%2520framework%2520that%2520combines%2520LSTM-based%2520predictive%2520scaling%2520with%2520heuristic%2520task%2520allocation.%2520The%2520results%2520show%2520that%2520this%2520approach%2520reduces%2520infrastructure%2520costs%2520close%2520to%2520ML-based%2520models%2520while%2520maintaining%2520fast%2520response%2520times%2520similar%2520to%2520heuristic%2520methods.%2520This%2520work%2520presents%2520a%2520practical%2520approach%2520for%2520improving%2520cost%2520efficiency%2520in%2520cloud%2520resource%2520management.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02131v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Intelligent%20Cloud%20Orchestration%3A%20A%20Hybrid%20Predictive%20and%20Heuristic%20Framework%20for%20Cost%20Optimization&entry.906535625=Heet%20Nagoriya%20and%20Komal%20Rohit&entry.1292438233=Cloud%20computing%20allows%20scalable%20resource%20provisioning%2C%20but%20dynamic%20workload%20changes%20often%20lead%20to%20higher%20costs%20due%20to%20over-provisioning.%20Machine%20learning%20%28ML%29%20approaches%2C%20such%20as%20Long%20Short-Term%20Memory%20%28LSTM%29%20networks%2C%20are%20effective%20for%20predicting%20workload%20patterns%20at%20a%20higher%20level%2C%20but%20they%20can%20introduce%20delays%20during%20sudden%20traffic%20spikes.%20In%20contrast%2C%20ma {"title": "Global Geometry of Orthogonal Foliations in the Control Allocation of Signed-Quadratic Systems", "author": "Antonio Franchi", "abstract": "This work formalizes the differential topology of redundancy resolution for systems governed by signed-quadratic actuation maps. By analyzing the minimally redundant case, the global topology of the continuous fiber bundle defining the nonlinear actuation null-space is established. The distribution orthogonal to these fibers is proven to be globally integrable and governed by an exact logarithmic potential field. This field foliates the actuator space, inducing a structural stratification of all orthants into transverse layers whose combinatorial sizes follow a strictly binomial progression. Within these layers, adjacent orthants are continuously connected via lower-dimensional strata termed reciprocal hinges, while the layers themselves are separated by boundary hyperplanes, or portals, that act as global sections of the fibers. This partition formally distinguishes extremal and transitional layers, which exhibit fundamentally distinct fiber topologies and foliation properties. Through this geometric framework, classical pseudo-linear static allocation strategies are shown to inevitably intersect singular boundary hyperplanes, triggering infinite-derivative kinetic singularities and fragmenting the task space into an exponential number of singularity-separated sectors. In contrast, allocators derived from the orthogonal manifolds yield continuously differentiable global sections with only a linear number of sectors for transversal layers, or can even form a single global diffeomorphism to the task space in the case of the two extremal layers, thus completely avoiding geometric rank-loss and boundary-crossing singularities. These theoretical results directly apply to the control allocation of propeller-driven architectures, including multirotor UAVs, marine, and underwater vehicles.", "link": "http://arxiv.org/abs/2604.01912v1", "date": "2026-04-02", "relevancy": 2.0552, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4302}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4035}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.3993}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Global%20Geometry%20of%20Orthogonal%20Foliations%20in%20the%20Control%20Allocation%20of%20Signed-Quadratic%20Systems&body=Title%3A%20Global%20Geometry%20of%20Orthogonal%20Foliations%20in%20the%20Control%20Allocation%20of%20Signed-Quadratic%20Systems%0AAuthor%3A%20Antonio%20Franchi%0AAbstract%3A%20This%20work%20formalizes%20the%20differential%20topology%20of%20redundancy%20resolution%20for%20systems%20governed%20by%20signed-quadratic%20actuation%20maps.%20By%20analyzing%20the%20minimally%20redundant%20case%2C%20the%20global%20topology%20of%20the%20continuous%20fiber%20bundle%20defining%20the%20nonlinear%20actuation%20null-space%20is%20established.%20The%20distribution%20orthogonal%20to%20these%20fibers%20is%20proven%20to%20be%20globally%20integrable%20and%20governed%20by%20an%20exact%20logarithmic%20potential%20field.%20This%20field%20foliates%20the%20actuator%20space%2C%20inducing%20a%20structural%20stratification%20of%20all%20orthants%20into%20transverse%20layers%20whose%20combinatorial%20sizes%20follow%20a%20strictly%20binomial%20progression.%20Within%20these%20layers%2C%20adjacent%20orthants%20are%20continuously%20connected%20via%20lower-dimensional%20strata%20termed%20reciprocal%20hinges%2C%20while%20the%20layers%20themselves%20are%20separated%20by%20boundary%20hyperplanes%2C%20or%20portals%2C%20that%20act%20as%20global%20sections%20of%20the%20fibers.%20This%20partition%20formally%20distinguishes%20extremal%20and%20transitional%20layers%2C%20which%20exhibit%20fundamentally%20distinct%20fiber%20topologies%20and%20foliation%20properties.%20Through%20this%20geometric%20framework%2C%20classical%20pseudo-linear%20static%20allocation%20strategies%20are%20shown%20to%20inevitably%20intersect%20singular%20boundary%20hyperplanes%2C%20triggering%20infinite-derivative%20kinetic%20singularities%20and%20fragmenting%20the%20task%20space%20into%20an%20exponential%20number%20of%20singularity-separated%20sectors.%20In%20contrast%2C%20allocators%20derived%20from%20the%20orthogonal%20manifolds%20yield%20continuously%20differentiable%20global%20sections%20with%20only%20a%20linear%20number%20of%20sectors%20for%20transversal%20layers%2C%20or%20can%20even%20form%20a%20single%20global%20diffeomorphism%20to%20the%20task%20space%20in%20the%20case%20of%20the%20two%20extremal%20layers%2C%20thus%20completely%20avoiding%20geometric%20rank-loss%20and%20boundary-crossing%20singularities.%20These%20theoretical%20results%20directly%20apply%20to%20the%20control%20allocation%20of%20propeller-driven%20architectures%2C%20including%20multirotor%20UAVs%2C%20marine%2C%20and%20underwater%20vehicles.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01912v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGlobal%2520Geometry%2520of%2520Orthogonal%2520Foliations%2520in%2520the%2520Control%2520Allocation%2520of%2520Signed-Quadratic%2520Systems%26entry.906535625%3DAntonio%2520Franchi%26entry.1292438233%3DThis%2520work%2520formalizes%2520the%2520differential%2520topology%2520of%2520redundancy%2520resolution%2520for%2520systems%2520governed%2520by%2520signed-quadratic%2520actuation%2520maps.%2520By%2520analyzing%2520the%2520minimally%2520redundant%2520case%252C%2520the%2520global%2520topology%2520of%2520the%2520continuous%2520fiber%2520bundle%2520defining%2520the%2520nonlinear%2520actuation%2520null-space%2520is%2520established.%2520The%2520distribution%2520orthogonal%2520to%2520these%2520fibers%2520is%2520proven%2520to%2520be%2520globally%2520integrable%2520and%2520governed%2520by%2520an%2520exact%2520logarithmic%2520potential%2520field.%2520This%2520field%2520foliates%2520the%2520actuator%2520space%252C%2520inducing%2520a%2520structural%2520stratification%2520of%2520all%2520orthants%2520into%2520transverse%2520layers%2520whose%2520combinatorial%2520sizes%2520follow%2520a%2520strictly%2520binomial%2520progression.%2520Within%2520these%2520layers%252C%2520adjacent%2520orthants%2520are%2520continuously%2520connected%2520via%2520lower-dimensional%2520strata%2520termed%2520reciprocal%2520hinges%252C%2520while%2520the%2520layers%2520themselves%2520are%2520separated%2520by%2520boundary%2520hyperplanes%252C%2520or%2520portals%252C%2520that%2520act%2520as%2520global%2520sections%2520of%2520the%2520fibers.%2520This%2520partition%2520formally%2520distinguishes%2520extremal%2520and%2520transitional%2520layers%252C%2520which%2520exhibit%2520fundamentally%2520distinct%2520fiber%2520topologies%2520and%2520foliation%2520properties.%2520Through%2520this%2520geometric%2520framework%252C%2520classical%2520pseudo-linear%2520static%2520allocation%2520strategies%2520are%2520shown%2520to%2520inevitably%2520intersect%2520singular%2520boundary%2520hyperplanes%252C%2520triggering%2520infinite-derivative%2520kinetic%2520singularities%2520and%2520fragmenting%2520the%2520task%2520space%2520into%2520an%2520exponential%2520number%2520of%2520singularity-separated%2520sectors.%2520In%2520contrast%252C%2520allocators%2520derived%2520from%2520the%2520orthogonal%2520manifolds%2520yield%2520continuously%2520differentiable%2520global%2520sections%2520with%2520only%2520a%2520linear%2520number%2520of%2520sectors%2520for%2520transversal%2520layers%252C%2520or%2520can%2520even%2520form%2520a%2520single%2520global%2520diffeomorphism%2520to%2520the%2520task%2520space%2520in%2520the%2520case%2520of%2520the%2520two%2520extremal%2520layers%252C%2520thus%2520completely%2520avoiding%2520geometric%2520rank-loss%2520and%2520boundary-crossing%2520singularities.%2520These%2520theoretical%2520results%2520directly%2520apply%2520to%2520the%2520control%2520allocation%2520of%2520propeller-driven%2520architectures%252C%2520including%2520multirotor%2520UAVs%252C%2520marine%252C%2520and%2520underwater%2520vehicles.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01912v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Global%20Geometry%20of%20Orthogonal%20Foliations%20in%20the%20Control%20Allocation%20of%20Signed-Quadratic%20Systems&entry.906535625=Antonio%20Franchi&entry.1292438233=This%20work%20formalizes%20the%20differential%20topology%20of%20redundancy%20resolution%20for%20systems%20governed%20by%20signed-quadratic%20actuation%20maps.%20By%20analyzing%20the%20minimally%20redundant%20case%2C%20the%20global%20topology%20of%20the%20continuous%20fiber%20bundle%20defining%20the%20nonlinear%20actuation%20null-space%20is%20established.%20The%20distribution%20orthogonal%20to%20these%20fibers%20is%20proven%20to%20be%20globally%20integrable%20and%20governed%20by%20an%20exact%20logarithmic%20potential%20field.%20This%20field%20foliates%20the%20actuator%20space%2C%20inducing%20a%20structural%20stratification%20of%20all%20orthants%20into%20transverse%20layers%20whose%20combinatorial%20sizes%20follow%20a%20strictly%20binomial%20progression.%20Within%20these%20layers%2C%20adjacent%20orthants%20are%20continuously%20connected%20via%20lower-dimensional%20strata%20termed%20reciprocal%20hinges%2C%20while%20the%20layers%20themselves%20are%20separated%20by%20boundary%20hyperplanes%2C%20or%20portals%2C%20that%20act%20as%20global%20sections%20of%20the%20fibers.%20This%20partition%20formally%20distinguishes%20extremal%20and%20transitional%20layers%2C%20which%20exhibit%20fundamentally%20distinct%20fiber%20topologies%20and%20foliation%20properties.%20Through%20this%20geometric%20framework%2C%20classical%20pseudo-linear%20static%20allocation%20strategies%20are%20shown%20to%20inevitably%20intersect%20singular%20boundary%20hyperplanes%2C%20triggering%20infinite-derivative%20kinetic%20singularities%20and%20fragmenting%20the%20task%20space%20into%20an%20exponential%20number%20of%20singularity-separated%20sectors.%20In%20contrast%2C%20allocators%20derived%20from%20the%20orthogonal%20manifolds%20yield%20continuously%20differentiable%20global%20sections%20with%20only%20a%20linear%20number%20of%20sectors%20for%20transversal%20layers%2C%20or%20can%20even%20form%20a%20single%20global%20diffeomorphism%20to%20the%20task%20space%20in%20the%20case%20of%20the%20two%20extremal%20layers%2C%20thus%20completely%20avoiding%20geometric%20rank-loss%20and%20boundary-crossing%20singularities.%20These%20theoretical%20results%20directly%20apply%20to%20the%20control%20allocation%20of%20propeller-driven%20architectures%2C%20including%20multirotor%20UAVs%2C%20marine%2C%20and%20underwater%20vehicles.&entry.1838667208=http%3A//arxiv.org/abs/2604.01912v1&entry.124074799=Read"},
{"title": "Taming the Exponential: A Fast Softmax Surrogate for Integer-Native Edge Inference", "author": "Dimitrios Danopoulos and Enrico Lupi and Michael Kagan and Maurizio Pierini", "abstract": "Softmax can become a computational bottleneck in the Transformer model's Multi-Head Attention (MHA) block, particularly in small models under low-precision inference, where exponentiation and normalization incur significant overhead. As such, we suggest using Head-Calibrated Clipped-Linear Softmax (HCCS), a bounded, monotone surrogate to the exponential softmax function, which uses a clipped linear mapping of the max centered attention logits. This approximation produces a stable probability distribution, maintains the ordering of the original logits and has non-negative values. HCCS differs from previous softmax surrogates as it includes a set of lightweight calibration parameters that are optimized offline based on a representative dataset and calibrated for each individual attention head to preserve the statistical properties of the individual heads. We describe a hardware-motivated implementation of HCCS for high-throughput scenarios targeting the AMD Versal AI Engines. The current reference implementations from AMD for this platform rely upon either bfloat16 arithmetic or LUTs to perform the exponential operation, which might limit the throughput of the platform and fail to utilize the high-throughput integer vector processing units of the AI Engine. In contrast, HCCS provides a natural mapping to the AI Engines' int8 multiply accumulate (MAC) units. To the best of our knowledge, this is the first int8 optimized softmax surrogate for AMD AI engines that significantly exceeds the speed performance of other reference implementations while maintaining competitive task accuracy on small or heavily quantized MHA workloads after quantization-aware retraining.", "link": "http://arxiv.org/abs/2604.02292v1", "date": "2026-04-02", "relevancy": 1.97, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4968}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.492}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Taming%20the%20Exponential%3A%20A%20Fast%20Softmax%20Surrogate%20for%20Integer-Native%20Edge%20Inference&body=Title%3A%20Taming%20the%20Exponential%3A%20A%20Fast%20Softmax%20Surrogate%20for%20Integer-Native%20Edge%20Inference%0AAuthor%3A%20Dimitrios%20Danopoulos%20and%20Enrico%20Lupi%20and%20Michael%20Kagan%20and%20Maurizio%20Pierini%0AAbstract%3A%20Softmax%20can%20become%20a%20computational%20bottleneck%20in%20the%20Transformer%20model%27s%20Multi-Head%20Attention%20%28MHA%29%20block%2C%20particularly%20in%20small%20models%20under%20low-precision%20inference%2C%20where%20exponentiation%20and%20normalization%20incur%20significant%20overhead.%20As%20such%2C%20we%20suggest%20using%20Head-Calibrated%20Clipped-Linear%20Softmax%20%28HCCS%29%2C%20a%20bounded%2C%20monotone%20surrogate%20to%20the%20exponential%20softmax%20function%2C%20which%20uses%20a%20clipped%20linear%20mapping%20of%20the%20max%20centered%20attention%20logits.%20This%20approximation%20produces%20a%20stable%20probability%20distribution%2C%20maintains%20the%20ordering%20of%20the%20original%20logits%20and%20has%20non-negative%20values.%20HCCS%20differs%20from%20previous%20softmax%20surrogates%20as%20it%20includes%20a%20set%20of%20lightweight%20calibration%20parameters%20that%20are%20optimized%20offline%20based%20on%20a%20representative%20dataset%20and%20calibrated%20for%20each%20individual%20attention%20head%20to%20preserve%20the%20statistical%20properties%20of%20the%20individual%20heads.%20We%20describe%20a%20hardware-motivated%20implementation%20of%20HCCS%20for%20high-throughput%20scenarios%20targeting%20the%20AMD%20Versal%20AI%20Engines.%20The%20current%20reference%20implementations%20from%20AMD%20for%20this%20platform%20rely%20upon%20either%20bfloat16%20arithmetic%20or%20LUTs%20to%20perform%20the%20exponential%20operation%2C%20which%20might%20limit%20the%20throughput%20of%20the%20platform%20and%20fail%20to%20utilize%20the%20high-throughput%20integer%20vector%20processing%20units%20of%20the%20AI%20Engine.%20In%20contrast%2C%20HCCS%20provides%20a%20natural%20mapping%20to%20the%20AI%20Engines%27%20int8%20multiply%20accumulate%20%28MAC%29%20units.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20int8%20optimized%20softmax%20surrogate%20for%20AMD%20AI%20engines%20that%20significantly%20exceeds%20the%20speed%20performance%20of%20other%20reference%20implementations%20while%20maintaining%20competitive%20task%20accuracy%20on%20small%20or%20heavily%20quantized%20MHA%20workloads%20after%20quantization-aware%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02292v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTaming%2520the%2520Exponential%253A%2520A%2520Fast%2520Softmax%2520Surrogate%2520for%2520Integer-Native%2520Edge%2520Inference%26entry.906535625%3DDimitrios%2520Danopoulos%2520and%2520Enrico%2520Lupi%2520and%2520Michael%2520Kagan%2520and%2520Maurizio%2520Pierini%26entry.1292438233%3DSoftmax%2520can%2520become%2520a%2520computational%2520bottleneck%2520in%2520the%2520Transformer%2520model%2527s%2520Multi-Head%2520Attention%2520%2528MHA%2529%2520block%252C%2520particularly%2520in%2520small%2520models%2520under%2520low-precision%2520inference%252C%2520where%2520exponentiation%2520and%2520normalization%2520incur%2520significant%2520overhead.%2520As%2520such%252C%2520we%2520suggest%2520using%2520Head-Calibrated%2520Clipped-Linear%2520Softmax%2520%2528HCCS%2529%252C%2520a%2520bounded%252C%2520monotone%2520surrogate%2520to%2520the%2520exponential%2520softmax%2520function%252C%2520which%2520uses%2520a%2520clipped%2520linear%2520mapping%2520of%2520the%2520max%2520centered%2520attention%2520logits.%2520This%2520approximation%2520produces%2520a%2520stable%2520probability%2520distribution%252C%2520maintains%2520the%2520ordering%2520of%2520the%2520original%2520logits%2520and%2520has%2520non-negative%2520values.%2520HCCS%2520differs%2520from%2520previous%2520softmax%2520surrogates%2520as%2520it%2520includes%2520a%2520set%2520of%2520lightweight%2520calibration%2520parameters%2520that%2520are%2520optimized%2520offline%2520based%2520on%2520a%2520representative%2520dataset%2520and%2520calibrated%2520for%2520each%2520individual%2520attention%2520head%2520to%2520preserve%2520the%2520statistical%2520properties%2520of%2520the%2520individual%2520heads.%2520We%2520describe%2520a%2520hardware-motivated%2520implementation%2520of%2520HCCS%2520for%2520high-throughput%2520scenarios%2520targeting%2520the%2520AMD%2520Versal%2520AI%2520Engines.%2520The%2520current%2520reference%2520implementations%2520from%2520AMD%2520for%2520this%2520platform%2520rely%2520upon%2520either%2520bfloat16%2520arithmetic%2520or%2520LUTs%2520to%2520perform%2520the%2520exponential%2520operation%252C%2520which%2520might%2520limit%2520the%2520throughput%2520of%2520the%2520platform%2520and%2520fail%2520to%2520utilize%2520the%2520high-throughput%2520integer%2520vector%2520processing%2520units%2520of%2520the%2520AI%2520Engine.%2520In%2520contrast%252C%2520HCCS%2520provides%2520a%2520natural%2520mapping%2520to%2520the%2520AI%2520Engines%2527%2520int8%2520multiply%2520accumulate%2520%2528MAC%2529%2520units.%2520To%2520the%2520best%2520of%2520our%2520knowledge%252C%2520this%2520is%2520the%2520first%2520int8%2520optimized%2520softmax%2520surrogate%2520for%2520AMD%2520AI%2520engines%2520that%2520significantly%2520exceeds%2520the%2520speed%2520performance%2520of%2520other%2520reference%2520implementations%2520while%2520maintaining%2520competitive%2520task%2520accuracy%2520on%2520small%2520or%2520heavily%2520quantized%2520MHA%2520workloads%2520after%2520quantization-aware%2520retraining.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02292v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Taming%20the%20Exponential%3A%20A%20Fast%20Softmax%20Surrogate%20for%20Integer-Native%20Edge%20Inference&entry.906535625=Dimitrios%20Danopoulos%20and%20Enrico%20Lupi%20and%20Michael%20Kagan%20and%20Maurizio%20Pierini&entry.1292438233=Softmax%20can%20become%20a%20computational%20bottleneck%20in%20the%20Transformer%20model%27s%20Multi-Head%20Attention%20%28MHA%29%20block%2C%20particularly%20in%20small%20models%20under%20low-precision%20inference%2C%20where%20exponentiation%20and%20normalization%20incur%20significant%20overhead.%20As%20such%2C%20we%20suggest%20using%20Head-Calibrated%20Clipped-Linear%20Softmax%20%28HCCS%29%2C%20a%20bounded%2C%20monotone%20surrogate%20to%20the%20exponential%20softmax%20function%2C%20which%20uses%20a%20clipped%20linear%20mapping%20of%20the%20max%20centered%20attention%20logits.%20This%20approximation%20produces%20a%20stable%20probability%20distribution%2C%20maintains%20the%20ordering%20of%20the%20original%20logits%20and%20has%20non-negative%20values.%20HCCS%20differs%20from%20previous%20softmax%20surrogates%20as%20it%20includes%20a%20set%20of%20lightweight%20calibration%20parameters%20that%20are%20optimized%20offline%20based%20on%20a%20representative%20dataset%20and%20calibrated%20for%20each%20individual%20attention%20head%20to%20preserve%20the%20statistical%20properties%20of%20the%20individual%20heads.%20We%20describe%20a%20hardware-motivated%20implementation%20of%20HCCS%20for%20high-throughput%20scenarios%20targeting%20the%20AMD%20Versal%20AI%20Engines.%20The%20current%20reference%20implementations%20from%20AMD%20for%20this%20platform% {"title": "FastSurfer-CC: A robust, accurate, and comprehensive framework for corpus callosum morphometry", "author": "Clemens Pollak and Kersten Diers and Santiago Estrada and David K\u00fcgler and Martin Reuter", "abstract": "The corpus callosum, the largest commissural structure in the human brain, is a central focus in research on aging and neurological diseases. It is also a critical target for interventions such as deep brain stimulation and serves as an important biomarker in clinical trials, including those investigating remyelination therapies. Despite extensive research on corpus callosum segmentation, few publicly available tools provide a comprehensive and automated analysis pipeline. To address this gap, we present FastSurfer-CC, an efficient and fully automated framework for corpus callosum morphometry. FastSurfer-CC automatically identifies mid-sagittal slices, segments the corpus callosum and fornix, localizes the anterior and posterior commissures to standardize head positioning, generates thickness profiles and subdivisions, and extracts eight shape metrics for statistical analysis. We demonstrate that FastSurfer-CC outperforms existing specialized tools across the individual tasks. Moreover, our method reveals statistically significant differences between Huntington's disease patients and healthy controls that are not detected by the current state-of-the-art.", "link": "http://arxiv.org/abs/2511.16471v2", "date": "2026-04-02", "relevancy": 2.2126, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4517}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4379}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FastSurfer-CC%3A%20A%20robust%2C%20accurate%2C%20and%20comprehensive%20framework%20for%20corpus%20callosum%20morphometry&body=Title%3A%20FastSurfer-CC%3A%20A%20robust%2C%20accurate%2C%20and%20comprehensive%20framework%20for%20corpus%20callosum%20morphometry%0AAuthor%3A%20Clemens%20Pollak%20and%20Kersten%20Diers%20and%20Santiago%20Estrada%20and%20David%20K%C3%BCgler%20and%20Martin%20Reuter%0AAbstract%3A%20The%20corpus%20callosum%2C%20the%20largest%20commissural%20structure%20in%20the%20human%20brain%2C%20is%20a%20central%20focus%20in%20research%20on%20aging%20and%20neurological%20diseases.%20It%20is%20also%20a%20critical%20target%20for%20interventions%20such%20as%20deep%20brain%20stimulation%20and%20serves%20as%20an%20important%20biomarker%20in%20clinical%20trials%2C%20including%20those%20investigating%20remyelination%20therapies.%20Despite%20extensive%20research%20on%20corpus%20callosum%20segmentation%2C%20few%20publicly%20available%20tools%20provide%20a%20comprehensive%20and%20automated%20analysis%20pipeline.%20To%20address%20this%20gap%2C%20we%20present%20FastSurfer-CC%2C%20an%20efficient%20and%20fully%20automated%20framework%20for%20corpus%20callosum%20morphometry.%20FastSurfer-CC%20automatically%20identifies%20mid-sagittal%20slices%2C%20segments%20the%20corpus%20callosum%20and%20fornix%2C%20localizes%20the%20anterior%20and%20posterior%20commissures%20to%20standardize%20head%20positioning%2C%20generates%20thickness%20profiles%20and%20subdivisions%2C%20and%20extracts%20eight%20shape%20metrics%20for%20statistical%20analysis.%20We%20demonstrate%20that%20FastSurfer-CC%20outperforms%20existing%20specialized%20tools%20across%20the%20individual%20tasks.%20Moreover%2C%20our%20method%20reveals%20statistically%20significant%20differences%20between%20Huntington%27s%20disease%20patients%20and%20healthy%20controls%20that%20are%20not%20detected%20by%20the%20current%20state-of-the-art.%0ALink%3A%20http%3A//arxiv.org/abs/2511.16471v2%0AFo idual%2520tasks.%2520Moreover%252C%2520our%2520method%2520reveals%2520statistically%2520significant%2520differences%2520between%2520Huntington%2527s%2520disease%2520patients%2520and%2520healthy%2520controls%2520that%2520are%2520not%2520detected%2520by%2520the%2520current%2520state-of-the-art.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.16471v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FastSurfer-CC%3A%20A%20robust%2C%20accurate%2C%20and%20comprehensive%20framework%20for%20corpus%20callosum%20morphometry&entry.906535625=Clemens%20Pollak%20and%20Kersten%20Diers%20and%20Santiago%20Estrada%20and%20David%20K%C3%BCgler%20and%20Martin%20Reuter&entry.1292438233=The%20corpus%20callosum%2C%20the%20largest%20commissural%20structure%20in%20the%20human%20brain%2C%20is%20a%20central%20focus%20in%20research%20on%20aging%20and%20neurological%20diseases.%20It%20is%20also%20a%20critical%20target%20for%20interventions%20such%20as%20deep%20brain%20stimulation%20and%20serves%20as%20an%20important%20biomarker%20in%20clinical%20trials%2C%20including%20those%20investigating%20remyelination%20therapies.%20Despite%20extensive%20research%20on%20corpus%20callosum%20segmentation%2C%20few%20publicly%20available%20tools%20provide%20a%20comprehensive%20and%20automated%20analysis%20pipeline.%20To%20address%20this%20gap%2C%20we%20present%20FastSurfer-CC%2C%20an%20efficient%20and%20fully%20automated%20framework%20for%20corpus%20callosum%20morphometry.%20FastSurfer-CC%20automatically%20identifies%20mid-sagittal%20slices%2C%20segments%20the%20corpus%20callosum%20and%20fornix%2C%20localizes%20the%20anterior%20and%20posterior%20commissures%20to%20standardize%20head%20positioning%2C%20generates%20thickness%20profiles%20and%20subdivisions%2C%20and%20extracts%20eight%20shape%20metrics%20for%20statistical%20analysis.%20We%20demonstrate%20that%20FastSurfer-CC%20outperforms%20existing%20special {"title": "A Simple Baseline for Streaming Video Understanding", "author": "Yujiao Shen and Shulin Tian and Jingkang Yang and Ziwei Liu", "abstract": "Recent streaming video understanding methods increasingly rely on complex memory mechanisms to handle long video streams. We challenge this trend with a simple finding: a sliding-window baseline that feeds only the most recent N frames to an off-the-shelf VLM already matches or surpasses published streaming models. We formalize this baseline as SimpleStream and evaluate it against 13 major offline and online video LLM baselines on OVO-Bench and StreamingBench. Despite its simplicity, SimpleStream delivers consistently strong performance. With only 4 recent frames, it reaches 67.7% average accuracy on OVO-Bench and 80.59% on StreamingBench. Controlled ablations further show that the value of longer context is backbone-dependent rather than uniformly increasing with model scale, and reveal a consistent perception-memory trade-off: adding more historical context can improve recall, but often weakens real-time perception. This suggests that stronger memory, retrieval, or compression modules should not be taken as evidence of progress unless they clearly outperform SimpleStream under the same protocol. We therefore argue that future streaming benchmarks should separate recent-scene perception from long-range memory, so that performance improvements from added complexity can be evaluated more clearly.", "link": "http://arxiv.org/abs/2604.02317v1", "date": "2026-04-02", "relevancy": 2.1585, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.55}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.55}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "htt {"title": "Seeing through Light and Darkness: Sensor-Physics Grounded Deblurring HDR NeRF from Single-Exposure Images and Events", "author": "Yunshan Qi and Lin Zhu and Nan Bao and Yifan Zhao and Jia Li", "abstract": "Novel view synthesis from low dynamic range (LDR) blurry images, which are common in the wild, struggles to recover high dynamic range (HDR) and sharp 3D representations in extreme lighting conditions. Although existing methods employ event data to address this issue, they ignore the sensor-physics mismatches between the camera output and physical world radiance, resulting in suboptimal HDR and deblurring results. To cope with this problem, we propose a unified sensor-physics grounded NeRF framework for sharp HDR novel view synthesis from single-exposure blurry LDR images and corresponding events. We employ NeRF to directly represent the actual radiance of the 3D scene in the HDR domain and model raw HDR scene rays hitting the sensor pixels as in the physical world. A 2D pixel-wise RGB CRF model is introduced to align the NeRF rendered pixel values with the sensor-recorded LDR pixel values of the input images. A novel event CRF model is also designed to bridge the gap between physical scene dynamics and event sensor output. The two models are jointly optimized with the NeRF network, leveraging the spatial and temporal dynamic information in events to enhance the sharp HDR 3D representation learning. Experiments on the collected and public datasets demonstrate that our method achieves state-of-the-art HDR and deblurring novel view synthesis results with single-exposure blurry LDR images and corresponding events.", "link": "http://arxiv.org/abs/2601.15475v4", "date": "2026-04-02", "relevancy": 1.7178, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5908}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5731}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seeing%20through%20Light%20and%20Darkness%3A%20Sensor-Physics%20Grounded%20Deblurring%20HDR%20NeRF%20from%20Single-Exposure%20Images%20and%20Events&body=Title%3A%20Seeing%20through%20Light%20and%20Darkness%3A%20Sensor-Physics%20Grounded%20Deblurring%20HDR%20NeRF%20from%20Single-Exposure%20Images%20and%20Events%0AAuthor%3A%20Yunshan%20Qi%20and%20Lin%20Zhu%20and%20Nan%20Bao%20and%20Yifan%20Zhao%20and%20Jia%20Li%0AAbstract%3A%20Novel%20view%20synthesis%20from%20low%20dynamic%20range%20%28LDR%29%20blurry%20images%2C%20which%20are%20common%20in%20the%20wild%2C%20struggles%20to%20recover%20high%20dynamic%20range%20%28HDR%29%20and%20sharp%203D%20representations%20in%20extreme%20lighting%20conditions.%20Although%20existing%20methods%20employ%20event%20data%20to%20address%20this%20issue%2C%20they%20ignore%20the%20sensor-physics%20mismatches%20between%20the%20camera%20output%20and%20physical%20world%20radiance%2C%20resulting%20in%20suboptimal%20HDR%20and%20deblurring%20results.%20To%20cope%20with%20this%20problem%2C%20we%20propose%20a%20unified%20sensor-physics%20grounded%20NeRF%20framework%20for%20sharp%20HDR%20novel%20view%20synthesis%20from%20single-exposure%20blurry%20LDR%20images%20and%20corresponding%20events.%20We%20employ%20NeRF%20to%20directly%20represent%20the%20actual%20radiance%20of%20the%203D%20scene%20in%20the%20HDR%20domain%20and%20model%20raw%20HDR%20scene%20rays%20hitting%20the%20sensor%20pixels%20as%20in%20the%20physical%20world.%20A%202D%20pixel-wise%20RGB%20CRF%20model%20is%20introduced%20to%20align%20the%20NeRF%20rendered%20pixel%20values%20with%20the%20sensor-recorded%20LDR%20pixel%20values%20of%20the%20input%20images.%20A%20novel%20event%20CRF%20model%20is%20also%20designed%20to%20bridge%20the%20gap%20between%20physical%20scene%20dynamics%20and%20event%20sensor%20output.%20The%20two%20models%20are%20jointly%20optimized%20with%20the%20NeRF%20network%2C%20leveraging%20the%20spatial%20and%20temporal%20dynamic%20information%20in%20events%20to%20enhance%20the%20sharp%20HDR%203D%20representation%20learning.%20Experiments%20on%20the%20collected%20and%20public%20datasets%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20HDR%20and%20deblurring%20novel%20view%20synthesis%20results%20with%20single-exposure%20blurry%20LDR%20images%20and%20corresponding%20events.%0ALink%3A%20http%3A//arxiv.org/abs/2601.15475v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeeing%2520through%2520Light%2520and%2520Darkness%253A%2520Sensor-Physics%2520Grounded%2520Deblurring%2520HDR%2520NeRF%2520from%2520Single-Exposure%2520Images%2520and%2520Events%26entry.906535625%3DYunshan%2520Qi%2520and%2520Lin%2520Zhu%2520and%2520Nan%2520Bao%2520and%2520Yifan%2520Zhao%2520and%2520Jia%2520Li%26entry.1292438233%3DNovel%2520view%2520synthesis%2520from%2520low%2520dynamic%2520range%2520%2528LDR%2529%2520blurry%2520images%252C%2520which%2520are%2520common%2520in%2520the%2520wild%252C%2520struggles%2520to%2520recover%2520high%2520dynamic%2520range%2520%2528HDR%2529%2520and%2520sharp%25203D%2520representations%2520in%2520extreme%2520lighting%2520conditions.%2520Although%2520existing%2520methods%2520employ%2520event%2520data%2520to%2520address%2520this%2520issue%252C%2520they%2520ignore%2520the%2520sensor-physics%2520mismatches%2520between%2520the%2520camera%2520output%2520and%2520physical%2520world%2520radiance%252C%2520resulting%2520in%2520suboptimal%2520HDR%2520and%2520deblurring%2520results.%2520To%2520cope%2520with%2520this%2520problem%252C%2520we%2520propose%2520a%2520unified%2520sensor-physics%2520grounded%2520NeRF%2520framework%2520for%2520sharp%2520HDR%2520novel%2520view%2520sy {"title": "AA-SVD : Anchored and Adaptive SVD for Large Language Model Compression", "author": "Atul Kumar Sinha and Fran\u00e7ois Fleuret", "abstract": "We introduce a fast low-rank factorization-based framework for compressing large language models that enables rapid compression of billion-parameter models without retraining. Unlike existing factorization-based approaches that optimize only on the original inputs, ignoring distribution shifts from upstream compression and thus propagating errors forward, or those that rely only on shifted inputs and risk drifting away from the original outputs, our approach accounts for both. Beyond individual layer compression, we further refine each transformer block end-to-end, minimizing block-level output distortion and allowing compressed layers to jointly compensate for accumulated errors. By anchoring each compressed layer to the original outputs while explicitly modeling input distribution shifts, our method finds a low-rank approximation that maintains functional equivalence with the original model. Experiments on large language models show that our method consistently outperforms existing SVD-based baselines across compression ratios, with the advantage becoming increasingly pronounced at aggressive compression budgets, where competing methods degrade substantially or collapse entirely, offering a practical solution for efficient, large-scale model deployment.", "link": "http://arxiv.org/abs/2604.02119v1", "date": "2026-04-02", "relevancy": 1.4917, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5365}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5189}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4728}], "m {"title": "Deep Neural Network Based Roadwork Detection for Autonomous Driving", "author": "Sebastian Wullrich and Nicolai Steinke and Daniel Goehring", "abstract": "Road construction sites create major challenges for both autonomous vehicles and human drivers due to their highly dynamic and heterogeneous nature. This paper presents a real-time system that detects and localizes roadworks by combining a YOLO neural network with LiDAR data. The system identifies individual roadwork objects while driving, merges them into coherent construction sites and records their outlines in world coordinates. The model training was based on an adapted US dataset and a new dataset collected from test drives with a prototype vehicle in Berlin, Germany. Evaluations on real-world road construction sites showed a localization accuracy below 0.5 m. The system can support traffic authorities with up-to-date roadwork data and could enable autonomous vehicles to navigate construction sites more safely in the future.", "link": "http://arxiv.org/abs/2604.02282v1", "date": "2026-04-02", "relevancy": 2.1453, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5478}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5392}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5005}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deep%20Neural%20Network%20Based%20Roadwork%20Detection%20for%20Autonomous%20Driving&body=Title%3A%20Deep%20Neural%20Network%20Based%20Roadwork%20Detection%20for%20Autonomous%20Driving%0AAuthor%3A%20Sebastian%20Wullrich%20and%20Nicolai%20Steinke%20and%20Daniel%20Goehring%0AAbstract%       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

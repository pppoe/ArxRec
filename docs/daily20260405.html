d%20spatial%20distribution%20optimization%20for%20compact%203D%20Gaussian%20Splatting%20%28GS%5Ctextasciicircum2%29%2C%20which%20enhances%20reconstruction%20quality%20by%20optimizing%20the%20spatial%20distribution%20of%20Gaussian%20points.%20Specifically%2C%20we%20introduce%20an%20evidence%20lower%20bound%20%28ELBO%29-based%20adaptive%20densification%20strategy%20that%20automatically%20controls%20the%20densification%20process.%20In%20addition%2C%20an%20opacity-aware%20progressive%20pruning%20strategy%20is%20proposed%20to%20further%20reduce%20memory%20consumption%20by%20dynamically%20removing%20low-opacity%20Gaussian%20points.%20Furthermore%2C%20we%20propose%20a%20graph-based%20feature%20encoding%20module%20to%20adjust%20the%20spatial%20distribution%20via%20feature-guided%20point%20shifting.%20Extensive%20experiments%20validate%20that%20GS%5Ctextasciicircum2%20achieves%20a%20compact%20Gaussian%20representation%20while%20delivering%20superior%20rendering%20quality.%20Compared%20with%203DGS%2C%20it%20achieves%20higher%20PSNR%20with%20only%20about%2012.5%5C%25%20Gaussian%20points.%20Furthermore%2C%20it%20outperforms%20all%20compared%20baselines%20in%20both%20rendering%20quality%20and%20memory%20efficiency.&entry.1838667208=http%3A//arxiv.org/abs/2604.01884v1&entry.124074799=Read"},
{"title": "Omni123: Exploring 3D Native Foundation Models with Limited 3D Data by Unifying Text to 2D and 3D Generation", "author": "Chongjie Ye and Cheng Cao and Chuanyu Pan and Yiming Hao and Yihao Zhi and Yuanming Hu and Xiaoguang Han", "abstract": "Recent multimodal large language models have achieved strong performance in unified text and image understanding and generation, yet extending such native capability to 3D remains challenging due to limited data. Compared to abundant 2D imagery, high-quality 3D assets are scarce, making 3D synthesis under-constrained. Existing methods often rely on indirect pipelines that edit in 2D and lift results into 3D via optimization, sacrificing geometric consistency. We present Omni123, a 3D-native foundation model that unifies text-to-2D and text-to-3D generation within a single autoregressive framework. Our key insight is that cross-modal consistency between images and 3D can serve as an implicit structural constraint. By representing text, images, and 3D as discrete tokens in a shared sequence space, the model leverages abundant 2D data as a geometric prior to improve 3D representations. We introduce an interleaved X-to-X training paradigm that coordinates diverse cross-modal tasks over heterogeneous paired datasets without requiring fully aligned text-image-3D triplets. By traversing semantic-visual-geometric cycles (e.g., text to image to 3D to image) within autoregressive sequences, the model jointly enforces semantic alignment, appearance fidelity, and multi-view geometric consistency. Experiments show that Omni123 significantly improves text-guided 3D generation and editing, demonstrating a scalable path toward multimodal 3D world models.", "link": "http://arxiv.org/abs/2604.02289v1", "date": "2026-04-02", "relevancy": 3.2182, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6474}, {"title": "Lexicon3D: {"title": "ProDiG: Progressive Diffusion-Guided Gaussian Splatting for Aerial to Ground Reconstruction", "author": "Sirshapan Mitra and Yogesh S. Rawat", "abstract": "Generating ground-level views and coherent 3D site models from aerial-only imagery is challenging due to extreme viewpoint changes, missing intermediate observations, and large scale variations. Existing methods either refine renderings post-hoc, often producing geometrically inconsistent results, or rely on multi-altitude ground-truth, which is rarely available. Gaussian Splatting and diffusion-based refinements improve fidelity under small variations but fail under wide aerial-to-ground gaps. To address these limitations, we introduce ProDiG (Progressive Altitude Gaussian Splatting), a diffusion-guided framework that progressively transforms aerial 3D representations toward ground-level fidelity. ProDiG synthesizes intermediate-altitude views and refines the Gaussian representation at each stage using a geometry-aware causal attention module that injects epipolar structure into reference-view diffusion. A distance-adaptive Gaussian module dynamically adjusts Gaussian scale and opacity based on camera distance, ensuring stable reconstruction across large viewpoint gaps. Together, these components enable progressive, geometrically grounded refinement without requiring additional ground-truth viewpoints. Extensive experiments on synthetic and real-world datasets demonstrate that ProDiG produces visually realistic ground-level renderings and coherent 3D geometry, significantly outperforming existing approaches in terms of visual quality, geometric consistency, and robustness to extreme viewpoint changes.", "link": "http://arxiv.org/abs/2604.02003v1", "date": "2026-04-02", "relevancy": 3.2169, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.681}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6284}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6208}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProDiG%3A%20Progressive%20Diffusion-Guided%20Gaussian%20Splatting%20for%20Aerial%20to%20Ground%20Reconstruction&body=Title%3A%20ProDiG%3A%20Progressive%20Diffusion-Guided%20Gaussian%20Splatting%20for%20Aerial%20to%20Ground%20Reconstruction%0AAuthor%3A%20Sirshapan%20Mitra%20and%20Yogesh%20S.%20Rawat%0AAbstract%3A%20Generating%20ground-level%20views%20and%20coherent%203D%20site%20models%20from%20aerial-only%20imagery%20is%20challenging%20due%20to%20extreme%20viewpoint%20changes%2C%20missing%20intermediate%20observations%2C%20and%20large%20scale%20variations.%20Existing%20methods%20either%20refine%20renderings%20post-hoc%2C%20often%20producing%20geometrically%20inconsistent%20results%2C%20or%20rely%20on%20multi-altitude%20ground-truth%2C%20which%20is%20rarely%20available.%20Gaussian%20Splatting%20and%20diffusion-based%20refinements%20improve%20fidelity%20under%20small%20variations%20but%20fail%20under%20wide%20aerial-to-ground%20gaps.%20To%20address%20these%20limitations%2C%20we%20introduce%20ProDiG%20%28Progressive%20Altitude%20Gaussian%20Splatting%29%2C%20a%20diffusion-guided%20framework%20that%20progressively%20transforms%20aerial%203D%20representations%20toward%20ground-level%20fidelity.%20ProDiG%20synthesizes%20intermediate-altitude%20views%20and%20refines%20the%20Gaussian%20representation%20at%20each%20stage%20using%20a%20geometry-aware%20causal%20attention%20module%20that%20injects%20epipolar%20structure%20into%20reference-view%20diffusion.%20A%20distance-adaptive%20Gaussian%20module%20dynamically%20adjusts%20Gaussian%20scale%20and%20opacity%20based%20on%20camera%20distance%2C%20ensuring%20stable%20reconstruction%20across%20large%20viewpoint% {"title": "FaCT-GS: Fast and Scalable CT Reconstruction with Gaussian Splatting", "author": "Pawel Tomasz Pieta and Rasmus Juul Pedersen and Sina Borgi and Jakob Sauer J\u00f8rgensen and Jens Wenzel Andreasen and Vedrana Andersen Dahl", "abstract": "Gaussian Splatting (GS) has emerged as a dominating technique for image rendering and has quickly been adapted for the X-ray Computed Tomography (CT) reconstruction task. However, despite being on par or better than many of its predecessors, the benefits of GS are typically not substantial enough to motivate a transition from well-established reconstruction algorithms. This paper addresses the most significant remaining limitations of the GS-based approach by introducing FaCT-GS, a framework for fast and flexible CT reconstruction. Enabled by an in-depth optimization of the voxelization and rasterization pipelines, our new method is significantly faster than its predecessors and scales well with projection and output volume size. Furthermore, the improved voxelization enables rapid fitting of Gaussians to pre-existing volumes, which can serve as a prior for warm-starting the reconstruction, or simply as an alternative, compressed representation. FaCT-GS is over 4X faster than the State of the Art GS CT reconstruction on standard 512x512 projections, and over 13X faster on 2k projections. Implementation available at: https://github.com/PaPieta/fact-gs.", "link": "http://arxiv.org/abs/2604.01844v1", "date": "2026-04-02", "relevancy": 3.196, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6877}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6486}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5813}], {"title": "PAM: A Pose-Appearance-Motion Engine for Sim-to-Real HOI Video Generation", "author": "Mingju Gao and Kaisen Yang and Huan-ang Gao and Bohan Li and Ao Ding and Wenyi Li and Yangcheng Yu and Jinkun Liu and Shaocong Xu and Yike Niu and Haohan Chi and Hao Chen and Hao Tang and Yu Zhang and Li Yi and Hao Zhao", "abstract": "Hand-object interaction (HOI) reconstruction and synthesis are becoming central to embodied AI and AR/VR. Yet, despite rapid progress, existing HOI generation research remains fragmented across three disjoint tracks: (1) pose-only synthesis that predicts MANO trajectories without producing pixels; (2) single-image HOI generation that hallucinates appearance from masks or 2D cues but lacks dynamics; and (3) video generation methods that require both the entire pose sequence and the ground-truth first frame as inputs, preventing true sim-to-real deployment. Inspired by the philosophy of Joo et al. (2018), we think that HOI generation requires a unified engine that brings together pose, appearance, and motion within one coherent framework. Thus we introduce PAM: a Pose-Appearance-Motion Engine for controllable HOI video generation. The performance of our engine is validated by: (1) On DexYCB, we obtain an FVD of 29.13 (vs. 38.83 for InterDyn), and MPJPE of 19.37 mm (vs. 30.05 mm for CosHand), while generating higher-resolution 480x720 videos compared to 256x256 and 256x384 baselines. (2) On OAKINK2, our full multi-condition model improves FVD from 68.76 to 46.31. (3) An ablation over input conditions on DexYCB shows that combining depth, segmentation, and keypoints consistently yields the best results. (4) For a downstream hand pose estimation task using SimpleHand, augmenting training with 3,400 synthetic videos (207k frames) allows a model trained on only 50% of the real data plus our synthetic data to match the 100% real baseline.", "link": "http://arxiv.org/abs/2603.22193v3", "date": "2026-04-02", "relevancy": 3.123, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6487}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6446}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5805}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation&body=Title%3A%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation%0AAuthor%3A%20Mingju%20Gao%20and%20Kaisen%20Yang%20and%20Huan-ang%20Gao%20and%20Bohan%20Li%20and%20Ao%20Ding%20and%20Wenyi%20Li%20and%20Yangcheng%20Yu%20and%20Jinkun%20Liu%20and%20Shaocong%20Xu%20and%20Yike%20Niu%20and%20Haohan%20Chi%20and%20Hao%20Chen%20and%20Hao%20Tang%20and%20Yu%20Zhang%20and%20Li%20Yi%20and%20Hao%20Zhao%0AAbstract%3A%20Hand-object%20interaction%20%28HOI%29%20reconstruction%20and%20synthesis%20are%20becoming%20central%20to%20embodied%20AI%20and%20AR/VR.%20Yet%2C%20despite%20rapid%20progress%2C%20existing%20HOI%20generation%20research%20remains%20fragmented%20across%20three%20disjoint%20tracks%3A%20%281%29%20pose-only%20synthesis%20that%20predicts%20MANO%20trajectories%20without%20producing%20pixels%3B%20%282%29%20single-image%20HOI%20generation%20that%20hallucinates%20appearance%20from%20masks%20or%202D%20cues%20but%20lacks%20dynamics%3B%20and%20%283%29%20video%20generation%20methods%20that%20require%20both%20the%20entire%20pose%20sequence%20and%20the%20ground-truth%20first%20frame%20as%20inputs%2C%20preventing%20true%20sim-to-real%20deployment.%20Inspired%20by%20the%20philosophy%20of%20Joo%20et%20al.%20%282018%29%2C%20we%20think%20that%20HOI%20generation%20requires%20a%20unified%20engine%20that%20brings%20together%20pose%2C%20appearance%2C%20and%20motion%20within%20one%20coherent%20framework.%20Thus%20we%20introduce%20PAM%3A%20a%20Pose-Appearance-Motion%20Engine%20for%20controllable%20HOI%20video%20generation.%20The%20performance%20of%20our%20engine%20is%20validated%20by%3A%20%281%29%20On%20DexYCB%2C%20we%20obtain%20an%20FVD%20of%2029.13%20%28vs.%2038.83%20for%20InterDyn%29%2C%20and%20MPJPE%20of%2019.37%20mm%20%28vs.%2030.05%20mm%20for%20CosHand%29%2C%20while%20generating%20higher-resolution%20480x720%20videos%20compared%20to%20256x256%20and%20256x384%20baselines.%20%282%29%20On%20OAKINK2%2C%20our%20full%20multi-condition%20model%20improves%20FVD%20from%2068.76%20to%2046.31.%20%283%29%20An%20ablation%20over%20input%20conditions%20on%20DexYCB%20shows%20that%20combining%20depth%2C%20segmentation%2C%20and%20keypoints%20consistently%20yields%20the%20best%20results.%20%284%29%20For%20a%20downstream%20hand%20pose%20estimation%20task%20using%20SimpleHand%2C%20augmenting%20training%20with%203%2C400%20synthetic%20videos%20%28207k%20frames%29%20allows%20a%20model%20trained%20on%20only%2050%25%20of%20the%20real%20data%20plus%20our%20synthetic%20data%20to%20match%20the%20100%25%20real%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22193v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPAM%253A%2520A%2520Pose-Appearance-Motion%2520Engine%2520for%2520Sim-to-Real%2520HOI%2520Video%2520Generation%26entry.906535625%3DMingju%2520Gao%2520and%2520Kaisen%2520Yang%2520and%2520Huan-ang%2520Gao%2520and%2520Bohan%2520Li%2520and%2520Ao%2520Ding%2520and%2520Wenyi%2520Li%2520and%2520Yangcheng%2520Yu%2520and%2520Jinkun%2520Liu%2520and%2520Shaocong%2520Xu%2520and%2520Yike%2520Niu%2520and%2520Haohan%2520Chi%2520and%2520Hao%2520Chen%2520and%2520Hao%2520Tang%2520and%2520Yu%2520Zhang%2520and%2520Li%2520Yi%2520and%2520Hao%2520Zhao%26entry.1292438233%3DHand-object%2520interaction%2520%2528HOI%2529%2520reconstruction%2520and%2520synthesis%2520are%2520becoming%2520central%2520to%25 {"title": "Resonance4D: Frequency-Domain Motion Supervision for Preset-Free Physical Parameter Learning in 4D Dynamic Physical Scene Simulation", "author": "Changshe Zhang and Jie Feng and Siyu Chen and Guanbin Li and Ronghua Shang and Junpeng Zhang", "abstract": "Physics-driven 4D dynamic simulation from static 3D scenes remains constrained by an overlooked contradiction: reliable motion supervision often relies on online video diffusion or optical-flow pipelines whose computational cost exceeds that of the simulator itself. Existing methods further simplify inverse physical modeling by optimizing only partial material parameters, limiting realism in scenes with complex materials and dynamics. We present Resonance4D, a physics-driven 4D dynamic simulation framework that couples 3D Gaussian Splatting with the Material Point Method through lightweight yet physically expressive supervision. Our key insight is that dynamic consistency can be enforced without dense temporal generation by jointly constraining motion in complementary domains. To this end, we introduce Dual-domain Motion Supervision (DMS), which combines spatial structural consistency for local deformation with frequency-domain spectral consistency for oscillatory and global dynamic patterns, substantially reducing training cost and memory overhead while preserving physically meaningful motion cues. To enable stable full-parameter physical recovery, we further combine zero-shot text-prompted segmentation with simulation-guided initialization to automatically decompose Gaussians into object-part-level regions and support joint optimization of full material parameters. Experiments on both synthetic and real scenes show that Resonance4D achieves strong physical fidelity and motion consistency while reducing peak GPU memory from over 35\\,GB to around 20\\,GB, enabling high-fidelity physics-driven 4D simulation on a single consumer-grade GPU.", "link": "http://arxiv.org/abs/2604.01994v1", "date": "2026-04-02", "relevancy": 3.0713, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6469}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.602}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5939}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Resonance4D%3A%20Frequency-Domain%20Motion%20Supervision%20for%20Preset-Free%20Physical%20Parameter%20Learning%20in%204D%20Dynamic%20Physical%20Scene%20Simulation&body=Title%3A%20Resonance4D%3A%20Frequency-Domain%20Motion%20Supervision%20for%20Preset-Free%20Physical%20Parameter%20Learning%20in%204D%20Dynamic%20Physical%20Scene%20Simulation%0AAuthor%3A%20Changshe%20Zhang%20and%20Jie%20Feng%20and%20Siyu%20Chen%20and%20Guanbin%20Li%20and%20Ronghua%20Shang%20and%20Junpeng%20Zhang%0AAbstract%3A%20Physics-driven%204D%20dynamic%20simulation%20from%20static%203D%20scenes%20remains%20constrained%20by%20an%20overlooked%20contradiction%3A%20reliable%20motion%20supervision%20often%20relies%20on%20online%20video%20diffusion%20or%20optical-flow%20pipelines%20whose%20computational%20cost%20exceeds%20that%20of%20the%20simulator%20itself.%20Existing%20methods%20further%20simplify%20inverse%20physical%20modeling%20by%20optimizing%20only%20partial%20material%20parameters%2C%20limiting%20realism%20in%20scenes%20with%20complex%20materials%20and%20dynamics.%20We%20present%20Resonance4D%2C%20a%20physics-driven%204D%20dynamic%20simulation%20framework%20that%20couples%203D%20Gaussian%20Splatting%20with%20the%20Material%20Point%20Method%20through%20lightweight%20yet%20physically%20expressive%20supervision.%20Our%20key%20insight%20is%20that%20dynamic%20consistency%20can%20be%20enforced%20without%20dense%20temporal%20generation%20by%20jointly%20constraining%20motion%20in%20complementary%20domains.%20To%20this%20end%2C%20we%20introduce%20Dual-domain%20Motion%20Supervision%20%28DMS%29%2C%20which%20combines%20spatial%20structural%20consistency%20for%20local%20deformation%20with%20frequency-domain%20spectral%20consistency%20for%20oscillatory%20and%20global%20dynamic%20patterns%2C%20substantially%20reducing%20training%20cost%20and%20memory%20overhead%20while%20preserving%20physically%20meaningful%20motion%20cues.%20To%20enable%20stable%20full-parameter%20physical%20recovery%2C%20we%20further%20combine%20zero-shot%20text-prompted%20segmentation%20with%20simulation-guided%20initialization%20to%20automatically%20decompose%20Gaussians%20into%20object-part-level%20regions%20and%20support%20joint%20optimization%20of%20full%20material%20parameters.%20Experiments%20on%20both%20synthetic%20and%20real%20scenes%20show%20that%20Resonance4D%20achieves%20strong%20physical%20fidelity%20and%20motion%20consistency%20while%20reducing%20peak%20GPU%20memory%20from%20over%2035%5C%2CGB%20to%20around%2020%5C%2CGB%2C%20enabling%20high-fidelity%20physics-driven%204D%20simulation%20on%20a%20single%20consumer-grade%20GPU.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01994v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DResonance4D%253A%2520Frequency-Domain%2520Motion%2520Supervision%2520for%2520Preset-Free%2520Physical%2520Parameter%2520Learning%2520in%25204D%2520Dynamic%2520Physical%2520Scene%2520Simulation%26entry.906535625%3DChangshe%2520Zhang%2520and%2520Jie%2520Feng%2520and%2520Siyu%2520Chen%2520and%2520Guanbin%2520Li%2520and%2520Ronghua%2520Shang%2520and%2520Junpeng%2520Zhang%26entry.1292438233%3DPhysics-driven%25204D%2520dynamic%2520simulation%2520from%2520static%25203D%2520scenes%2520remains%2520constrained%2520by%2520an%2520overlooked%2520contradiction%253A%2520reliable%2520motion%2520supervision%2520often%2520relies%2520on%2520online%2520video%2520diffusion%2520or%2520optical {"title": "UniDriveVLA: Unifying Understanding, Perception, and Action Planning for Autonomous Driving", "author": "Yongkang Li and Lijun Zhou and Sixu Yan and Bencheng Liao and Tianyi Yan and Kaixin Xiong and Long Chen and Hongwei Xie and Bing Wang and Guang Chen and Hangjun Ye and Wenyu Liu and Haiyang Sun and Xinggang Wang", "abstract": "Vision-Language-Action (VLA) models have recently emerged in autonomous driving, with the promise of leveraging rich world knowledge to improve the cognitive capabilities of driving systems. However, adapting such models for driving tasks currently faces a critical dilemma between spatial perception and semantic reasoning. Consequently, existing VLA systems are forced into suboptimal compromises: directly adopting 2D Vision-Language Models yields limited spatial perception, whereas enhancing them with 3D spatial representations often impairs the native reasoning capacity of VLMs. We argue that this dilemma largely stems from the coupled optimization of spatial perception and semantic reasoning within shared model parameters. To overcome this, we propose UniDriveVLA, a Unified Driving Vision-Language-Action model based on Mixture-of-Transformers that addresses the perception-reasoning conflict via expert decoupling. Specifically, it comprises three experts for driving understanding, scene perception, and action planning, which are coordinated through masked joint attention. In addition, we combine a sparse perception paradigm with a three-stage progressive training strategy to improve spatial perception while maintaining semantic reasoning capability. Extensive experiments show that UniDriveVLA achieves state-of-the-art performance in open-loop evaluation on nuScenes and closed-loop evaluation on Bench2Drive. Moreover, it demonstrates strong performance across a broad range of perception, prediction, and understanding tasks, including 3D detection, online mapping, motion forecasting, and driving-oriented VQA, highlighting its broad applicability as a unified model for autonomous driving. Code and model have been released at https://github.com/xiaomi-research/unidrivevla", "link": "http://arxiv.org/abs/2604.02190v1", "date": "2026-04-02", "relevancy": 3.0395, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6141}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6141}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5954}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniDriveVLA%3A%20Unifying%20Understanding%2C%20Perception%2C%20and%20Action%20Planning%20for%20Autonomous%20Driving&body=Title%3A%20UniDriveVLA%3A%20Unifying%20Understanding%2C%20Perception%2C%20and%20Action%20Planning%20for%20Autonomous%20Driving%0AAuthor%3A%20Yongkang%20Li%20and%20Lijun%20Zhou%20and%20Sixu%20Yan%20and%20Bencheng%20Liao%20and%20Tianyi%20Yan%20and%20Kaixin%20Xiong%20and%20Long%20Chen%20and%20Hongwei%20Xie%20and%20Bing%20Wang%20and%20Guang%20Chen%20and%20Hangjun%20Ye%20and%20Wenyu%20Liu%20and%20Haiyang%20Sun%20and%20Xinggang%20Wang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20recently%20emerged%20in%20autonomous%20driving%2C%20with%20the%20promise%20of%20leveraging%20rich%20world%20knowledge%20to%20improve%20the%20cognitive%20capabilities%20of%20driving%20systems.%20However%2C%20adapting%20such%20models%20for%20driving%20tasks%20currently%20faces%20a%20critical%20dilemma%20between%20spatial%20perception%20and%20semantic%20reasoning.%20Consequently%2C%20existing%20VLA%20systems%20are%20forced%20into%20suboptimal%20compromises%3A%20directly%20adopting%202D%20Vision-Language%20Models%20yields%20limited%20spatial%20perception%2C%20whereas%20enhancing%20them%20with%203D%20spatial%20representations%20often%20impairs%20the%20native%20reasoning%20capacity%20of%20VLMs.%20We%20argue%20that%20this%20dilemma%20largely%20stems%20from%20the%20coupled%20optimization%20of%20spatial%20perception%20and%20semantic%20reasoning%20within%20shared%20model%20parameters.%20To%20overcome%20this%2C%20we%20propose%20UniDriveVLA%2C%20a%20Unified%20Driving%20Vision-Language-Action%20model%20based%20on%20Mixture-of-Transformers%20that%20addresses%20the%20perception-reasoning%20conflict%20via%20expert%20decoupling.%20Specifically%2C%20it%20comprises%20three%20experts%20for%20driving%20understanding%2C%20scene%20perception%2C%20and%20action%20planning%2C%20which%20are%20coordinated%20through%20masked%20joint%20attention.%20In%20addition%2C%20we%20combine%20a%20sparse%20perception%20paradigm%20with%20a%20three-stage%20progressive%20training%20strategy%20to%20improve%20spatial%20perception%20while%20maintaining%20semantic%20reasoning%20capability.%20Extensive%20experiments%20show%20that%20UniDriveVLA%20achieves%20state-of-the-art%20performance%20in%20open-loop%20evaluation%20on%20nuScenes%20and%20closed-loop%20evaluation%20on%20Bench2Drive.%20Moreover%2C%20it%20demonstrates%20strong%20performance%20across%20a%20broad%20range%20of%20perception%2C%20prediction%2C%20and%20understanding%20tasks%2C%20including%203D%20detection%2C%20online%20mapping%2C%20motion%20forecasting%2C%20and%20driving-oriented%20VQA%2C%20highlighting%20its%20broad%20applicability%20as%20a%20unified%20model%20for%20autonomous%20driving.%20Code%20and%20model%20have%20been%20released%20at%20https%3A//github.com/xiaomi-research/unidrivevla%0ALink%3A%20http%3A//arxiv.org/abs/2604.02190v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniDriveVLA%253A%2520Unifying%2520Understanding%252C%2520Perception%252C%2520and%2520Action%2520Planning%2520for%2520Autonomous%2520Driving%26entry.90 {"title": "Steerable Visual Representations", "author": "Jona Ruthardt and Manu Gaur and Deva Ramanan and Makarand Tapaswi and Yuki M. Asano", "abstract": "Pretrained Vision Transformers (ViTs) such as DINOv2 and MAE provide generic image features that can be applied to a variety of downstream tasks such as retrieval, classification, and segmentation. However, such representations tend to focus on the most salient visual cues in the image, with no way to direct them toward less prominent concepts of interest. In contrast, Multimodal LLMs can be guided with textual prompts, but the resulting representations tend to be language-centric and lose their effectiveness for generic visual tasks. To address this, we introduce Steerable Visual Representations, a new class of visual representations, whose global and local features can be steered with natural language. While most vision-language models (e.g., CLIP) fuse text with visual features after encoding (late fusion), we inject text directly into the layers of the visual encoder (early fusion) via lightweight cross-attention. We introduce benchmarks for measuring representational steerability, and demonstrate that our steerable visual features can focus on any desired objects in an image while preserving the underlying representation quality. Our method also matches or outperforms dedicated approaches on anomaly detection and personalized object discrimination, exhibiting zero-shot generalization to out-of-distribution tasks.", "link": "http://arxiv.org/abs/2604.02327v1", "date": "2026-04-02", "relevancy": 3.0203, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6049}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6049}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", " {"title": "Are VLMs Lost Between Sky and Space? LinkS$^2$Bench for UAV-Satellite Dynamic Cross-View Spatial Intelligence", "author": "Dian Liu and Jie Feng and Di Li and Yuhui Zheng and Guanbin Li and Weisheng Dong and Guangming Shi", "abstract": "Synergistic spatial intelligence between UAVs and satellites is indispensable for emergency response and security operations, as it uniquely integrates macro-scale global coverage with dynamic, real-time local perception. However, the capacity of Vision-Language Models (VLMs) to master this complex interplay remains largely unexplored. This gap persists primarily because existing benchmarks are confined to isolated Unmanned Aerial Vehicle (UAV) videos or static satellite imagery, failing to evaluate the dynamic local-to-global spatial mapping essential for comprehensive cross-view reasoning. To bridge this gap, we introduce LinkS$^2$Bench, the first comprehensive benchmark designed to evaluate VLMs' wide-area, dynamic cross-view spatial intelligence. LinkS$^2$Bench links 1,022 minutes of dynamic UAV footage with high-resolution satellite imagery covering over 200 km$^2$. Through an LMM-assisted pipeline and rigorous human annotation, we constructed 17.9k high-quality question-answer pairs comprising 12 fine-grained tasks across four dimensions: perception, localization, relation, and reasoning. Evaluations of 18 representative VLMs reveal a substantial gap compared to human baselines, identifying accurate cross-view dynamic alignment as the critical bottleneck. To alleviate this, we design a Cross-View Alignment Adapter, demonstrating that explicit alignment significantly improves model performance. Furthermore, fine-tuning experiments underscore the potential of LinkS$^2$Bench in advancing VLM adaptation for complex spatial reasoning.", "link": "http://arxiv.org/abs/2604.02020v1", "date": "2026-04-02", "relevancy": 3.0097, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6026}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6026}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6007}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Are%20VLMs%20Lost%20Between%20Sky%20and%20Space%3F%20LinkS%24%5E2%24Bench%20for%20UAV-Satellite%20Dynamic%20Cross-View%20Spatial%20Intelligence&body=Title%3A%20Are%20VLMs%20Lost%20Between%20Sky%20and%20Space%3F%20LinkS%24%5E2%24Bench%20for%20UAV-Satellite%20Dynamic%20Cross-View%20Spatial%20Intelligence%0AAuthor%3A%20Dian%20Liu%20and%20Jie%20Feng%20and%20Di%20Li%20and%20Yuhui%20Zheng%20and%20Guanbin%20Li%20and%20Weisheng%20Dong%20and%20Guangming%20Shi%0AAbstract%3A%20Synergistic%20spatial%20intelligence%20between%20UAVs%20and%20satellites%20is%20indispensable%20for%20emergency%20response%20and%20security%20operations%2C%20as%20it%20uniquely%20integrates%20macro-scale%20global%20coverage%20with%20dynamic%2C%20real-time%20local%20perception.%20However%2C%20the%20capacity%20of%20Vision-Language%20Models%20%28VLMs%29%20to%20master%20this%20complex%20interplay%20remains%20largely%20unexplored.%20This%20gap%20persists%20primarily%20because%20existing%20benchmarks%20are%20confined%20to%20isolated%20Unmanned%20Aerial%20Vehicle%20%28UAV%29%20videos%20or%20static%20satellite%20imagery%2C%20failing%20to%20evaluate%20the%20dynamic%20local-to-global%20spatial%20mapping%20essential%20for%20comprehensive%20cross-view%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20introduce%20LinkS%24%5E2%24Bench%2C%20the%20first%20comprehensive%20benchmark%20designed%20to%20evaluate%20VLMs%27%20wide-area%2C%20dynamic%20cross-view%20spatial%20intelligence.%20LinkS%24%5E2%24Bench%20links%201%2C022%20minutes%20of%20dynamic%20UAV%20footage%20with%20high-resolution%20satellite%20imagery%20covering%20over%20200%20km%24%5E2%24.%20Through%20an%20LMM-assisted%20pipeline%20and%20rigorous%20human%20annotation%2C%20we%20constructed%2017.9k%20high-quality%20question-answer%20pairs%20comprising%2012%20fine-grained%20tasks%20across%20four%20dimensions%3A%20perception%2C%20localization%2C%20relation%2C%20and%20reasoning.%20Evaluations%20of%2018%20representative%20VLMs%20reveal%20a%20substantial%20gap%20compared%20to%20human%20baselines%2C%20identifying%20accurate%20cross-view%20dynamic%20alignment%20as%20the%20critical%20bottleneck.%20To%20alleviate%20this%2C%20we%20design%20a%20Cross-View%20Alignment%20Adapter%2C%20demonstrating%20that%20explicit%20alignment%20significantly%20improves%20model%20performance.%20Furthermore%2C%20fine-tuning%20experiments%20underscore%20the%20potential%20of%20LinkS%24%5E2%24Bench%20in%20advancing%20VLM%20adaptation%20for%20complex%20spatial%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02020v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520VLMs%2520Lost%2520Between%2520Sky%2520and%2520Space%253F%2520LinkS%2524%255E2%2524Bench%2520for%2520UAV-Satellite%2520Dynamic%2520Cross-View%2520Spatial%2520Intelligence%26entry.906535625%3DDian%2520Liu%2520and%2520Jie%2520Feng%2520and%2520Di%2520Li%2520and%2520Yuhui%2520Zheng%2520and%2520Guanbin%2520Li%2520and%2520Weisheng%2520Dong%2520and%2520Guangming%2520Shi%26entry.1292438233%3DSynergistic%2520spatial%2520intelligence%2520between%2520UAVs%2520and%2520satellites%2520is%2520indispensable%2520for%2520emergency%2520response%2520and%2520security%2520operations%252C%2520as%2520it%2520uniquely%2520integrates%2520macro-scale%2520global%2520coverage%2520with%2520dynamic%252C%2520real-time%2520local%2520perception.%2520However%252C%2520the%2520capacity%2520of%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520to%2520master%2520this%2520complex% {"title": "Modulate-and-Map: Crossmodal Feature Mapping with Cross-View Modulation for 3D Anomaly Detection", "author": "Alex Costanzino and Pierluigi Zama Ramirez and Giuseppe Lisanti and Luigi Di Stefano", "abstract": "We present ModMap, a natively multiview and multimodal framework for 3D anomaly detection and segmentation. Unlike existing methods that process views independently, our method draws inspiration from the crossmodal feature mapping paradigm to learn to map features across both modalities and views, while explicitly modelling view-dependent relationships through feature-wise modulation. We introduce a cross-view training strategy that leverages all possible view combinations, enabling effective anomaly scoring through multiview ensembling and aggregation. To process high-resolution 3D data, we train and publicly release a foundational depth encoder tailored to industrial datasets. Experiments on SiM3D, a recent benchmark that introduces the first multiview and multimodal setup for 3D anomaly detection and segmentation, demonstrate that ModMap attains state-of-the-art performance by surpassing previous methods by wide margins.", "link": "http://arxiv.org/abs/2604.02328v1", "date": "2026-04-02", "relevancy": 3.0083, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6257}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6096}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5697}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Modulate-and-Map%3A%20Crossmodal%20Feature%20Mapping%20with%20Cross-View%20Modulation%20for%203D%20Anomaly%20Detection&body=Title%3A%20Modulate-and-Map%3A%20Crossmodal%20Feature%20Mapping%20with%20Cr {"title": "Large-scale Codec Avatars: The Unreasonable Effectiveness of Large-scale Avatar Pretraining", "author": "Junxuan Li and Rawal Khirodkar and Chengan He and Zhongshi Jiang and Giljoo Nam and Lingchen Yang and Jihyun Lee and Egor Zakharov and Zhaoen Su and Rinat Abdrashitov and Yuan Dong and Julieta Martinez and Kai Li and Qingyang Tan and Takaaki Shiratori and Matthew Hu and Peihong Guo and Xuhua Huang and Ariyan Zarei and Marco Pesavento and Yichen Xu and He Wen and Teng Deng and Wyatt Borsos and Anjali Thakrar and Jean-Charles Bazin and Carsten Stoll and Gin\u00e9s Hidalgo and James Booth and Lucy Wang and Xiaowen Ma and Yu Rong and Sairanjith Thalanki and Chen Cao and Christian H\u00e4ne and Abhishek Kar and Sofien Bouaziz and Jason Saragih and Yaser Sheikh and Shunsuke Saito", "abstract": "High-quality 3D avatar modeling faces a critical trade-off between fidelity and generalization. On the one hand, multi-view studio data enables high-fidelity modeling of humans with precise control over expressions and poses, but it struggles to generalize to real-world data due to limited scale and the domain gap between the studio environment and the real world. On the other hand, recent large-scale avatar models trained on millions of in-the-wild samples show promise for generalization across a wide range of identities, yet the resulting avatars are often of low-quality due to inherent 3D ambiguities. To address this, we present Large-Scale Codec Avatars (LCA), a high-fidelity, full-body 3D avatar model that generalizes to world-scale populations in a feedforward manner, enabling efficient inference. Inspired by the success of large language models and vision foundation models, we present, for the first time, a pre/post-training paradigm for 3D avatar modeling at scale: we pretrain on 1M in-the-wild videos to learn broad priors over appearance and geometry, then post-train on high-quality curated data to enhance expressivity and fidelity. LCA generalizes across hair styles, clothing, and demographics while providing precise, fine-grained facial expressions and finger-level articulation control, with strong identity preservation. Notably, we observe emergent generalization to relightability and loose garment support to unconstrained inputs, and zero-shot robustness to stylized imagery, despite the absence of direct supervision.", "link": "http://arxiv.org/abs/2604.02320v1", "date": "2026-04-02", "relevancy": 2.9996, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.603}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5938}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Large-scale%20Codec%20Avatars%3A%20The%20Unreasonable%20Effectiveness%20of%20Large-scale%20Avatar%20Pretraining&body=Title%3A%20Large-scale%20Codec%20Avatars%3A%20The%20Unreasonable%20Effectiveness%20of%20Large-scale%20Avatar%20Pretraining%0AAuthor%3A%20Junxuan%20Li%20and%20Rawal%20Khirodkar%20and%20Chengan%20He%20and%20Zhongshi%20Jiang%20and%20Giljoo%20Nam%20and%20Lingchen%20Yang%20and%20Jihyun%20Lee%20and%20Egor%20Zakharov%20and%20Zhaoen%20Su%20and%20Rinat%20Abdrashitov%20and%20Yuan%20Dong%20and%20Julieta%20Martinez%20and%20Kai%20Li%20and%20Qingyang%20Tan%20and%20Takaaki%20Shiratori%20and%20Matthew%20Hu%20and%20Peihong%20Guo%20and%20Xuhua%20Huang%20and%20Ariyan%20Zarei%20and%20Marco%20Pesavento%20and%20Yichen%20Xu%20and%20He%20Wen%20and%20Teng%20Deng%20and%20Wyatt%20Borsos%20and%20Anjali%20Thakrar%20and%20Jean-Charles%20Bazin%20and%20Carsten%20Stoll%20and%20Gin%C3%A9s%20Hidalgo%20and%20James%20Booth%20and%20Lucy%20Wang%20and%20Xiaowen%20Ma%20and%20Yu%20Rong%20and%20Sairanjith%20Thalanki%20and%20Chen%20Cao%20and%20Christia {"title": "Rare-Aware Autoencoding: Reconstructing Spatially Imbalanced Data", "author": "Alejandro Casta\u00f1eda Garcia and Jan van Gemert and Daan Brinks and Nergis T\u00f6men", "abstract": "Autoencoders can be challenged by spatially non-uniform sampling of image content. This is common in medical imaging, biology, and physics, where informative patterns occur rarely at specific image coordinates, as background dominates these locations in most samples, biasing reconstructions toward the majority appearance. In practice, autoencoders are biased toward dominant patterns resulting in the loss of fine-grained detail and causing blurred reconstructions for rare spatial inputs especially under spatial data imbalance. We address spatial imbalance by two complementary components: (i) self-entropy-based loss that upweights statistically uncommon spatial locations and (ii) Sample Propagation, a replay mechanism that selectively re-exposes the model to hard to reconstruct samples across batches during training. We benchmark existing data balancing strategies, originally developed for supervised classification, in the unsupervised reconstruction setting. Drawing on the limitations of these approaches, our method specifically targets spatial imbalance by encouraging models to focus on statistically rare locations, improving reconstruction consistency compared to existing baselines. We validate in a simulated dataset with controlled spatial imbalance conditions, and in three, uncontrolled, diverse real-world datasets spanning physical, biological, and astronomical domains. Our approach outperforms baselines on various reconstruction metrics, particularly under spatial imbalance distributions. These results highlight the importance of data representation in a batch and emphasize rare samples in unsupervised image reconstruction. We will make all code and related data available.", "link": "http://arxiv.org/abs/2604.02031v1", "date": "2026-04-02", "relevancy": 2.9529, "topK": [ egies%2C%20originally%20developed%20for%20supervised%20classification%2C%20in%20the%20unsupervised%20reconstruction%20setting.%20Drawing%20on%20the%20limitations%20of%20these%20approaches%2C%20our%20method%20specifically%20targets%20spatial%20imbalance%20by%20encouraging%20models%20to%20focus%20on%20statistically%20rare%20locations%2C%20improving%20reconstruction%20consistency%20compared%20to%20existing%20baselines.%20We%20validate%20in%20a%20simulated%20dataset%20with%20controlled%20spatial%20imbalance%20conditions%2C%20and%20in%20three%2C%20uncontrolled%2C%20diverse%20real-world%20datasets%20spanning%20physical%2C%20biological%2C%20and%20astronomical%20domains.%20Our%20approach%20outperforms%20baselines%20on%20various%20reconstruction%20metrics%2C%20particularly%20under%20spatial%20imbalance%20distributions.%20These%20results%20highlight%20the%20importance%20of%20data%20representation%20in%20a%20batch%20and%20emphasize%20rare%20samples%20in%20unsupervised%20image%20reconstruction.%20We%20will%20make%20all%20code%20and%20related%20data%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02031v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRare-Aware%2520Autoencoding%253A%2520Reconstructing%2520Spatially%2520Imbalanced%2520Data%26entry.906535625%3DAlejandro%2520Casta%25C3%25B1eda%2520Garcia%2520and%2520Jan%2520van%2520Gemert%2520and%2520Daan%2520Brinks%2520and%2520Nergis%2520T%25C3%25B6men%26entry.1292438233%3DAutoencoders%2520can%2520be%2520challenged%2520by%2520spatially%2520non-uniform%2520sampling%2520of%2520image%2520content.%2520This%2520is%2520common%2520in%2520medical%2520imaging%252C%2520biology%252C%2520and%2520physics%252C%2520where%2520informative%2520patterns%2520occur%2520rarely%2520at%2520specific%2520image%2520coordinates%252C%2520as%2520background%2520dominates%2520these%2520locations%2520in%2520most%2520samples%252C%2520biasing%2520reconstructions%2520toward% {"title": "LatentUM: Unleashing the Potential of Interleaved Cross-Modal Reasoning via a Latent-Space Unified Model", "author": "Jiachun Jin and Zetong Zhou and Xiao Yang and Hao Zhang and Pengfei Liu and Jun Zhu and Zhijie Deng", "abstract": "Unified models (UMs) hold promise for their ability to understand and generate content across heterogeneous modalities. Compared to merely generating visual content, the use of UMs for interleaved cross-modal reasoning is more promising and valuable, e.g., for solving understanding problems that require dense visual thinking, improving visual generation through self-reflection, or modeling visual dynamics of the physical world guided by stepwise action interventions. However, existing UMs necessitate pixel decoding as a bridge due to their disjoint visual representations for understanding and generation, which is both ineffective and inefficient. In this paper, we introduce LatentUM, a novel unified model that represents all modalities within a shared semantic latent space, eliminating the need for pixel-space mediation between visual understanding and generation. This design naturally enables flexible interleaved cross-modal reasoning and generation. Beyond improved computational efficiency, the shared representation substantially alleviates codec bias and strengthens cross-modal alignment, allowing LatentUM to achieve state-of-the-art performance on the Visual Spatial Planning benchmark, push the limits of visual generation through self-reflection, and support world modeling by predicting future visual states within the shared semantic latent space.", "link": "http://arxiv.org/abs/2604.02097v1", "date": "2026-04-02", "relevancy": 2.9373, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5911}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LatentUM%3A%20Unleashing%20the%20Potential%20of%20Interleaved%20Cross-Modal%20Reasoning%20via%20a%20Latent-Space%20Unified%20Model&body=Title%3A%20LatentUM%3A%20Unleashing%20the%20Potential%20of%20Interleaved%20Cross-Modal%20Reasoning%20via%20a%20Latent-Space%20Unified%20Model%0AAuthor%3A%20Jiachun%20Jin%20and%20Zetong%20Zhou%20and%20Xiao%20Yang%20and%20Hao%20Zhang%20and%20Pengfei%20Liu%20and%20Jun%20Zhu%20and%20Zhijie%20Deng%0AAbstract%3A%20Unified%20models%20%28UMs%29%20hold%20promise%20for%20their%20ability%20to%20understand%20and%20generate%20content%20across%20heterogeneous%20modalities.%20Compared%20to%20merely%20generating%20visual%20content%2C%20the%20use%20of%20UMs%20for%20interleaved%20cross-modal%20reasoning%20is%20more%20promising%20and%20valuable%2C%20e.g.%2C%20for%20solving%20understanding%20problems%20that%20require%20dense%20visual%20thinking%2C%20improving%20visual%20generation%20through%20self-reflection%2C%20or%20modeling%20visual%20dynamics%20of%20the%20physical%20world%20guided%20by%20stepwise%20action%20interventions.%20However%2C%20existing%20UMs%20necessitate%20pixel%20decoding%20as%20a%20bridge%20due%20to%20their%20disjoint%20visual%20representations%20for%20understanding%20and%20generation%2C%20which%20is%20both%20ineffective%20and%20inefficient.%20In%20this%20paper%2C%20we%20introduce%20LatentUM%2C%20a%20novel%20unified%20model%20that%20represents%20all%20modalities%20within%20a%20shared%20semantic%20latent%20space%2C%20eliminating%20the%20need%20for%20pixel-space%20mediation%20between%20visual%20understanding%20and%20generation.%20This%20design%20naturally%20enables%20flexible%20interleaved%20cross-modal%20reasoning%20and%20generation.%20Beyond%20improved%20computational%20efficiency%2 {"title": "ActionParty: Multi-Subject Action Binding in Generative Video Games", "author": "Alexander Pondaven and Ziyi Wu and Igor Gilitschenski and Philip Torr and Sergey Tulyakov and Fabio Pizzati and Aliaksandr Siarohin", "abstract": "Recent advances in video diffusion have enabled the development of \"world models\" capable of simulating interactive environments. However, these models are largely restricted to single-agent settings, failing to control multiple agents simultaneously in a scene. In this work, we tackle a fundamental issue of action binding in existing video diffusion models, which struggle to associate specific actions with their corresponding subjects. For this purpose, we propose ActionParty, an action controllable multi-subject world model for generative video games. It introduces subject state tokens, i.e. latent variables that persistently capture the state of each subject in the scene. By jointly modeling state tokens and video latents with a spatial biasing mechanism, we disentangle global video frame rendering from individual action-controlled subject updates. We evaluate ActionParty on the Melting Pot benchmark, demonstrating the first video world model capable of controlling up to seven players simultaneously across 46 diverse environments. Our results show significant improvements in action-following accuracy and identity consistency, while enabling robust autoregressive tracking of subjects through complex interactions.", "link": "http://arxiv.org/abs/2604.02330v1", "date": "2026-04-02", "relevancy": 2.9325, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5992}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5876}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5727}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ActionParty%3A%20Multi-Subject%20Action%20Binding%20in%20Generative%20Video%20Games&body=Title%3A%20ActionParty%3A%20Multi-Subject%20Action%20Binding%20in%20Generative%20Video%20Games%0AAuthor%3A%20Alexander%20Pondaven%20and%20Ziyi%20Wu%20and%20Igor%20Gilitschenski%20and%20Philip%20Torr%20and%20Sergey%20Tulyakov%20and%20Fabio%20Pizzati%20and%20Aliaksandr%20Siarohin%0AAbstract%3A%20Recent%20advances%20in%20video%20diffusion%20have%20enabled%20the%20development%20of%20%22world%20models%22%20capable%20of%20simulating%20interactive%20environments.%20However%2C%20these%20models%20are%20largely%20restricted%20to%20single-agent%20settings%2C%20failing%20to%20control%20multiple%20agents%20simultaneously%20in%20a%20scene.%20In%20this%20work%2C%20we%20tackle%20a%20fundamental%20issue%20of%20action%20binding%20in%20existing%20video%20diffusion%20models%2C%20which%20struggle%20to%20associate%20specific%20actions%20with%20their%20corresponding%20subjects.%20For%20this%20purpose%2C%20we%20propose%20ActionParty%2C%20an%20action%20controllable%20multi-subject%20world%20model%20for%20generative%20video%20games.%20It%20introduces%20subject%20state%20tokens%2C%20i.e.%20latent%20variables%20that%20persistently%20capture%20the%20state%20of%20each%20subject%20in%20the%20scene.%20By%20jointly%20modeling%20state%20tokens%20and%20video%20latents%20with%20a%20spatial%20biasing%20mechanism%2C%20we%20disentangle%20global%20video%20frame%20rendering%20from%20individual%20action-controlled%20subject%20updates.%20We%20evaluate%20ActionParty%20on%20the%20Melting%20Pot%20benchmark%2C%20demonstrating%20the%20first%20video%20world%20model%20capable%20of%20controlling%20up%20to%20seven%20players%20simultaneously%20across%2046%20diverse%20environments.%20Our%20results%20show%20significant%20improvements%20in%20action-following%20accuracy%20and%20identity%20consistency%2C%20while%20enabling%20robust%20autoregressive%20tracking%20of%20subjects%20through%20complex%20interaction {"title": "OmniWeaving: Towards Unified Video Generation with Free-form Composition and Reasoning", "author": "Kaihang Pan and Qi Tian and Jianwei Zhang and Weijie Kong and Jiangfeng Xiong and Yanxin Long and Shixue Zhang and Haiyi Qiu and Tan Wang and Zheqi Lv and Yue Wu and Liefeng Bo and Siliang Tang and Zhao Zhong", "abstract": "While proprietary systems such as Seedance-2.0 have achieved remarkable success in omni-capable video generation, open-source alternatives significantly lag behind. Most academic models remain heavily fragmented, and the few existing efforts toward unified video generation still struggle to seamlessly integrate diverse tasks within a single framework. To bridge this gap, we propose OmniWeaving, an omni-level video generation model featuring powerful multimodal composition and reasoning-informed capabilities. By leveraging a massive-scale pretraining dataset that encompasses diverse compositional and reasoning-augmented scenarios, OmniWeaving learns to temporally bind interleaved text, multi-image, and video inputs while acting as an intelligent agent to infer complex user intentions for sophisticated video creation. Furthermore, we introduce IntelligentVBench, the first comprehensive benchmark designed to rigorously assess next-level intelligent unified video generation. Extensive experiments demonstrate that OmniWeaving achieves SoTA performance among open-source unified models. The codes and model have already been publicly available. Project Page: https://omniweaving.github.io.", "link": "http://arxiv.org/abs/2603.24458v2", "date": "2026-04-02", "relevancy": 2.924, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5852}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5852}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.584}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniWeaving%3A%20Towards%20Unified%20Video%20Generation%20with%20Free-form%20Composition%20and%20Reasoning&body=Title%3A%20OmniWeaving%3A%20Towards%20Unified%20Video%20Generation%20with%20Free-form%20Composition%20and%20Reasoning%0AAuthor%3A%20Kaihang%20Pan%20and%20Qi%20Tian%20and%20Jianwei%20Zhang%20and%20Weijie%20Kong%20and%20Jiangfeng%20Xiong%20and%20Yanxin%20Long%20and%20Shixue%20Zhang%20and%20Haiyi%20Qiu%20and%20Tan%20Wang%20and%20Zheqi%20Lv%20and%20Yue%20Wu%20and%20Liefeng%20Bo%20and%20Siliang%20Tang%20and%20Zhao%20Zhong%0AAbstract%3A%20While%20proprietary%20systems%20such%20as%20Seedance-2.0%20have%20achieved%20remarkable%20success%20in%20omni-capable%20video%20generation%2C%20open-source%20alternatives%20significantly%20lag%20behind.%20Most%20academic%20models%20remain%20heavily%20fragmented%2C%20and%20the%20few%20existing%20efforts%20toward%20unified%20video%20generation%20still%20struggle%20to%20seamlessly%20integrate%20diverse%20tasks%20within%20a%20single%20framework.%20To%20bridge%20this%20gap%2C%20we%20propose%20OmniWeaving%2C%20an%20omni-level%20video%20generation%20model%20featuring%20powerful%20multimodal%20composition%20and%20reasoning-informed%20capabilities.%20By%20leveraging%20a%20massive-scale%20pretraining%20dataset%20that%20encompasses%20diverse%20compositional%20and%20reasoning-augmented%20scenarios%2C%20OmniWeaving%20learns%20to%20temporally%20bind%20interleaved%20text%2C%20multi-image%2C%20and%20video%20inputs%20while%20acting%20as%20an%20intelligent%20agent%20to%20infer%20complex%20user%20intentions%20for%20sophisticated%20video%20creation.%20Furthermore%2C%20we%20introduce%20IntelligentVBench%2C%20the%20first%20comprehensive%20benchmark%20designed%20to%20rigorously%20assess%20next-level%20intelligent%20unified%20video%20generation.%20Extensive%20experiments%20demonstrate%20that {"title": "ProVG: Progressive Visual Grounding via Language Decoupling for Remote Sensing Imagery", "author": "Ke Li and Ting Wang and Di Wang and Yongshan Zhu and Yiming Zhang and Tao Lei and Quan Wang", "abstract": "Remote sensing visual grounding (RSVG) aims to localize objects in remote sensing imagery according to natural language expressions. Previous methods typically rely on sentence-level vision-language alignment, which struggles to exploit fine-grained linguistic cues, such as \\textit{spatial relations} and \\textit{object attributes}, that are crucial for distinguishing objects with similar characteristics. Importantly, these cues play distinct roles across different grounding stages and should be leveraged accordingly to provide more explicit guidance. In this work, we propose \\textbf{ProVG}, a novel RSVG framework that improves localization accuracy by decoupling language expressions into global context, spatial relations, and object attributes. To integrate these linguistic cues, ProVG employs a simple yet effective progressive cross-modal modulator, which dynamically modulates visual attention through a \\textit{survey-locate-verify} scheme, enabling coarse-to-fine vision-language alignment. In addition, ProVG incorporates a cross-scale fusion module to mitigate the large-scale variations in remote sensing imagery, along with a language-guided calibration decoder to refine cross-modal alignment during prediction. A unified multi-task head further enables ProVG to support both referring expression comprehension and segmentation tasks. Extensive experiments on two benchmarks, \\textit{i.e.}, RRSIS-D and RISBench, demonstrate that ProVG consistently outperforms existing methods, achieving new state-of-the-art performance.", "link": "http://arxiv.org/abs/2604.01893v1", "date": "2026-04-02", "relevancy": 2.9034, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5966}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5966}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5488}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProVG%3A%20Progressive%20Visual%20Grounding%20via%20Language%20Decoupling%20for%20Remote%20Sensing%20Imagery&body=Title%3A%20ProVG%3A%20Progressive%20Visual%20Grounding%20via%20Language%20Decoupling%20for%20Remote%20Sensing%20Imagery%0AAuthor%3A%20Ke%20Li%20and%20Ting%20Wang%20and%20Di%20Wang%20and%20Yongshan%20Zhu%20and%20Yiming%20Zhang%20and%20Tao%20Lei%20and%20Quan%20Wang%0AAbstract%3A%20Remote%20sensing%20visual%20grounding%20%28RSVG%29%20aims%20to%20localize%20objects%20in%20remote%20sensing%20imagery%20according%20to%20natural%20language%20expressions.%20Previous%20methods%20typically%20rely%20on%20sentence-level%20vision-language%20alignment%2C%20which%20struggles%20to%20exploit%20fine-grained%20linguistic%20cues%2C%20such%20as%20%5Ctextit%7Bspatial%20relations%7D%20and%20%5Ctextit%7Bobject%20attributes%7D%2C%20that%20are%20crucial%20for%20distinguishing%20objects%20with%20similar%20characteristics.%20Importantly%2C%20these%20cues%20play%20distinct%20roles%20across%20different%20grounding%20stages%20and%20should%20be%20leveraged%20accordingly%20to%20provide%20more%20explicit%20guidance.%20In%20this%20work%2C%20we%20propose%20%5Ctextbf%7BProVG%7D%2C%20a%20novel%20RSVG%20framework%20that%20improves%20localization%20accuracy%20by%20decoupling%20language%20expressions%20into%20global%20context%2C%20spatial%20relations%2C%20and%20object%20attributes.%20To%20integrate%20these%20linguistic%20cues%2C%20ProVG%20employs%20a%20simple%20yet%20effective%20progressive%20cross-modal%20modulator%2C%20which%20dynamically%20modulates%20visual%20attention%20through%20a%20%5Ctextit%7Bsurvey-locate-verify%7D%20scheme%2C%20enabling%20coarse-to-fine%20vision-language%20alignment.%20In%20addition%2C%20ProVG%20incorporates%20a%20cross-scale%20fusion%20module%20to%20mitigate%20the%20large-scale%20variations%20in%20remote%20sensing%20imagery%2C%20along%20with%20a%20language-guided%20calibration%20decoder%20to%20refine%20cross-modal%20alignment%20during%20prediction.%20A%20unified%20multi-task%20head%20further%20enables%20ProVG%20to%20support%20both%20referring%20expression%20comprehension%20and%20segmentation%20tasks.%20Extensive%20experiments%20on%20two%20benchmarks%2C%20%5Ctextit%7Bi.e.%7D%2C%20RRSIS-D%20and%20RISBench%2C%20demonstrate%20that%20ProVG%20consistently%20outperforms%20existing%20methods%2C%20achieving%20new%20state-of-the-art%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01893v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProVG%253A%2520Progressive%2520Visual%2520Grounding%2520via%2520Language%2520Decoupling%2520for%2520Remote%2520Sensing%2520Imagery%26entry.906535625%3DKe%2520Li%2520and%2520Ting%2520Wang%2520and%2520Di%2520Wang%2520and%2520Yongshan%2520Zhu%2520and%2520Yiming%2520Zhang%2520and%2520Tao%2520Lei%2520and%2520Quan%2520Wang%26entry.1292438233%3DRemote%2520sensing%2520visual%2520grounding%2520%2528RSVG%2529%2520aims%2520to%2520localize%2520objects%2520in%2520remote%2520sensing%2520imagery%2520according%2520to%2520natural%2520language%2520expressions.%2520Previous%2520methods%2520typically%2520rely%2520on%2520sentence-level%2520vision-language%2520alignment%252C%2520which%2520struggles%2520to%2520exploit%2520fine-grained%2520linguistic%2520cues%252C%2520such%2520as%2520%255Ctextit%257Bspatial%2520relations%257D%2520and%2520%255Ctextit%257Bobject%2520attributes%257D%252C%2520that%2520are%2520crucial%2520for%2520distinguishing%2520objects%2520with%2520similar%2520characteristics.%2520Importantly%252C%2520these%2520cues%2 {"title": "Decouple and Rectify: Semantics-Preserving Structural Enhancement for Open-Vocabulary Remote Sensing Segmentation", "author": "Jie Feng and Fengze Li and Junpeng Zhang and Siyu Chen and Yuping Liang and Junying Chen and Ronghua Shang", "abstract": "Open-vocabulary semantic segmentation in the remote sensing (RS) field requires both language-aligned recognition and fine-grained spatial delineation. Although CLIP offers robust semantic generalization, its global-aligned visual representations inherently struggle to capture structural details. Recent methods attempt to compensate for this by introducing RS-pretrained DINO features. However, these methods treat CLIP representations as a monolithic semantic space and cannot localize where structural enhancement is required, failing to effectively delineate boundaries while risking the disruption of CLIP's semantic integrity. To address this limitation, we propose DR-Seg, a novel decouple-and-rectify framework in this paper. Our method is motivated by the key observation that CLIP feature channels exhibit distinct functional heterogeneity rather than forming a uniform semantic space. Building on this insight, DR-Seg decouples CLIP features into semantics-dominated and structure-dominated subspaces, enabling targeted structural enhancement by DINO without distorting language-aligned semantics. Subsequently, a prior-driven graph rectification module injects high-fidelity structural priors under DINO guidance to form a refined branch, while an uncertainty-guided adaptive fusion module dynamically integrates this refined branch with the original CLIP branch for final prediction. Comprehensive experiments across eight benchmarks demonstrate that DR-Seg establishes a new state-of-the-art.", "link": "http://arxiv.org/abs/2604.02010v1", "date": "2026-04-02", "relevancy": 2.9017, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5922}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5922}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5567}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decouple%20and%20Rectify%3A%20Semantics-Preserving%20Structural%20Enhancement%20for%20Open-Vocabulary%20Remote%20Sensing%20Segmentation&body=Title%3A%20Decouple%20and%20Rectify%3A%20Semantics-Preserving%20Structural%20Enhancement%20for%20Open-Vocabulary%20Remote%20Sensing%20Segmentation%0AAuthor%3A%20Jie%20Feng%20and%20Fengze%20Li%20and%20Junpeng%20Zhang%20and%20Siyu%20Chen%20and%20Yuping%20Liang%20and%20Junying%20Chen%20and%20Ronghua%20Shang%0AAbstract%3A%20Open-vocabulary%20semantic%20segmentation%20in%20the%20remote%20sensing%20%28RS%29%20field%20requires%20both%20language-aligned%20recognition%20and%20fine-grained%20spatial%20delineation.%20Although%20CLIP%20offers%20robust%20semantic%20generalization%2C%20its%20global-aligned%20visual%20representations%20inherently%20struggle%20to%20capture%20structural%20details.%20Recent%20methods%20attempt%20to%20compensate%20for%20this%20by%20introducing%20RS-pretrained%20DINO%20features.%20However%2C%20these%20methods%20treat%20CLIP%20representations%20as%20a%20monolithic%20semantic%20space%20and%20cannot%20localize%20where%20structural%20enhancement%20is%20required%2C%20failing%20to%20effectively%20delineate%20boundaries%20while%20risking%20the%20disruption%20of%20CLIP%27s%20semantic%20integrity.%20To%20address%20this%20limitation%2C%20we%20propose%20DR-Seg%2C%20a%20novel%20decouple-and-rectify%20framework%20in%20this%20paper.%20Our%20method%20is%20motivated%20by%20the%20key%20observation%20that%20CLIP%20feature%20channels%20exhibit%20distinct%20functional%20heterogeneity%20rather%20than%20forming%20a%20uniform%20semantic%20space.%20Building%20on%20this%20insight%2C%20DR-Seg%20decouples%20CLIP%20features%20into%20semantics-dominated%20and%20structure-dominated%20subspaces%2C%20enabling%20targeted%20structural%20enhancement%20by%20DINO%20without%20distorting%20language-aligned%20semantics.%20Subsequently%2C%20a%20prior-driven%20graph%20rectification%20module%20injects%20high-fidelity%20structural%20priors%20under%20DINO%20guidance%20to%20form%20a%20refined%20branch%2C%20while%20an%20uncertainty-guided%20adaptive%20fusion%20module%20dynamically%20integrates%20this%20refined%20branch%20with%20the%20original%20CLIP%20branch%20for%20final%20prediction.%20Comprehensive%20experiments%20across%20eight%20benchmarks%20demonstrate%20that%20DR-Seg%20establishes%20a%20new%20state-of-the-art.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02010v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecouple%2520and%2520Rectify%253A%2520Semantics-Preserving%2520Structural%2520Enhancement%2520for%2520Open-Vocabulary%2520Remote%2520Sensing%2520Segmentation%26entry.906535625%3DJie%2520Feng%2520and%2520Fengze%2520Li%2520and%2520Junpeng%2520Zhang%2520and%2520Siyu%2520Chen%2520and%2520Yuping%2520Liang%2520and%2520Junying%2520Chen%2520and%2520Ronghua%2520Shang%26entry.1292438233%3DOpen-vocabulary%2520semantic%2520segmentation%2520in%2520the%2520remote%2520sensing%2520%2528RS%2529%2520field%2520requires%2520both%2520language-aligned%2520recognition%2520and%2520fine-grained%2520spatial%2520delineation.%2520Although%2520CLIP%2520offers%2520robust%2520semantic%2520generalization%252C%2520its%2520global-aligned%2520visual%2520representations%2520inherently%2520struggle%2520to%2520capture%2520structural%2520details.%2520Recent%2520methods%2520attempt%2520to%2520compensate%2520for%2520this%2520by%2520introducing%2520RS-pretrained%2520DINO%2520features.%2520However%252C%2520these%2520methods%2520treat%2520CLIP%2520representations%2520as%2 {"title": "Not All Tokens See Equally: Perception-Grounded Policy Optimization for Large Vision-Language Models", "author": "Zekai Ye and Qiming Li and Xiaocheng Feng and Ruihan Chen and Ziming Li and Haoyu Ren and Kun Chen and Dandan Tu and Bing Qin", "abstract": "While Reinforcement Learning from Verifiable Rewards (RLVR) has advanced reasoning in Large Vision-Language Models (LVLMs), prevailing frameworks suffer from a foundational methodological flaw: by distributing identical advantages across all generated tokens, these methods inherently dilute the learning signals essential for optimizing the critical, visually-grounded steps of multimodal reasoning. To bridge this gap, we formulate \\textit{Token Visual Dependency}, quantifying the causal information gain of visual inputs via the Kullback-Leibler (KL) divergence between visual-conditioned and text-only predictive distributions. Revealing that this dependency is highly sparse and semantically pivotal, we introduce Perception-Grounded Policy Optimization (PGPO), which is a novel fine-grained credit assignment framework that dynamically reshapes advantages at the token level. Through a threshold-gated, mass-conserving mechanism, PGPO actively amplifies learning signals for visually-dependent tokens while suppressing gradient noise from linguistic priors. Extensive experiments based on the Qwen2.5-VL series across seven challenging multimodal reasoning benchmarks demonstrate that PGPO boosts models by 18.7% on average. Both theoretical and empirical analyses confirm that PGPO effectively reduces gradient variance, prevents training collapse, and acts as a potent regularizer for robust, perception-grounded multimodal reasoning. Code will be published on https://github.com/Yzk1114/PGPO.", "link": "http://arxiv.org/abs/2604.01840v1", "date": "2026-04-02", "relevancy": 2.8201, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5694}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5613}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5613}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Tokens%20See%20Equally%3A%20Perception-Grounded%20Policy%20Optimization%20for%20Large%20Vision-Language%20Models&body=Title%3A%20Not%20All%20Tokens%20See%20Equally%3A%20Perception-Grounded%20Policy%20Optimization%20for%20Large%20Vision-Language%20Models%0AAuthor%3A%20Zekai%20Ye%20and%20Qiming%20Li%20and%20Xiaocheng%20Feng%20and%20Ruihan%20Chen%20and%20Ziming%20Li%20and%20Haoyu%20Ren%20and%20Kun%20Chen%20and%20Dandan%20Tu%20and%20Bing%20Qin%0AAbstract%3A%20While%20Reinforcement%20Learning%20from%20Verifiable%20Rewards%20%28RLVR%29%20has%20advanced%20reasoning%20in%20Large%20Vision-Language%20Models%20%28LVLMs%29%2C%20prevailing%20frameworks%20suffer%20from%20a%20foundational%20methodological%20flaw%3A%20by%20distributing%20identical%20advantages%20across%20all%20generated%20tokens%2C%20these%20methods%20inherently%20dilute%20the%20learning%20signals%20essential%20for%20optimizing%20the%20critical%2C%20visually-grounded%20steps%20of%20multimodal%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20formulate%20%5Ctextit%7BToken%20Visual%20Dependency%7D%2C%20quantifying%20the%20causal%20information%20gain%20of%20visual%20inputs%20via%20the%20Kullback-Leibler%20%28KL%29%20divergence%20between%20visual-conditioned%20and%20text-only%20predictive%20distributions.%20Revealing%20that%20this%20dependency%20is%20highly%20sparse%20and%20semantically%20pivotal%2C%20we%20introduce%20Perception-Grounded%20Policy%20Optimization%20%28PGPO%29%2C%20which%20is%20a%20novel%20fine-grained%20credit%20assignment%20framework%20that%20dynamically%20reshapes%20advantages%20at%20the%20token%20level.%20Through%20a%20threshold-gated%2C%20mass-conserving%20mechanism%2C%20PGPO%20actively%20amplifies%20learning%20signals%20for%20visually-dependent%20tokens%20while%20suppressing%20gradient%20noise%20from%20linguistic%20priors.%20Extensive%20experiments%20based%20on%20the%20Qwen2.5-VL%20series%20across%20seven%20challenging%20multimodal%20reasoning%20benchmarks%20demonstrate%20that%20PGPO%20boosts%20models%20by%2018.7%25%20on%20average.%20Both%20theoretical%20and%20empirical%20analyses%20confirm%20that%20PGPO%20effectively%20reduces%20gradient%20variance%2C%20prevents%20training%20collapse%2C%20and%20acts%20as%20a%20potent%20regularizer%20for%20robust%2C%20perception-grounded%20multimodal%20reasoning.%20Code%20will%20be%20published%20on%20https%3A//github.com/Yzk1114/PGPO.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01840v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Tokens%2520See%2520Equally%253A%2520Perception-Grounded%2520Policy%2520Optimization%2520for%2520Large%2520Vision-Language%2520Models%26entry.906535625%3DZekai%2520Ye%2520and%2520Qiming%2520Li%2520and%2520Xiaocheng%2520Feng%2520and%2520Ruihan%2520Chen%2520and%2520Ziming%2520Li%2520and%2520Haoyu%2520Ren%2520and%2520Kun%2520Chen%2520and%2520Dandan%2520Tu%2520and%2520Bing%2520Qin%26entry.1292438233%3DWhile%2520Reinforcement%2520Learning%2520from%2520Verifiable%2520Rewards%2520%2528RLVR%2529%2520has%2520advanced%2520reasoning%2520in%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%252C%2520prevailing%2520frameworks%2520suffer%2520from%2520a%2520foundational%2520methodological%2520flaw%253A%2520by%2520distributing%2520identical%2520advantages%2520across%2520all%2520generated%2520tokens%252C%2520these%2520methods%2520inherently%2520dilute%2520the%2520learning%2520signals%2520essential%2520for%2520optimizing%2520the%2520critical%252C%2520visually-grounded%2520steps%2520 {"title": "The Latent Space: Foundation, Evolution, Mechanism, Ability, and Outlook", "author": "Xinlei Yu and Zhangquan Chen and Yongbo He and Tianyu Fu and Cheng Yang and Chengming Xu and Yue Ma and Xiaobin Hu and Zhe Cao and Jie Xu and Guibin Zhang and Jiale Tao and Jiayi Zhang and Siyuan Ma and Kaituo Feng and Haojie Huang and Youxing Li and Ronghao Chen and Huacan Wang and Chenglin Wu and Zikun Su and Xiaogang Xu and Kelu Yao and Kun Wang and Chen Gao and Yue Liao and Ruqi Huang and Tao Jin and Cheng Tan and Jiangning Zhang and Wenqi Ren and Yanwei Fu and Yong Liu and Yu Wang and Xiangyu Yue and Yu-Gang Jiang and Shuicheng Yan", "abstract": "Latent space is rapidly emerging as a native substrate for language-based models. While modern systems are still commonly understood through explicit token-level generation, an increasing body of work shows that many critical internal processes are more naturally carried out in continuous latent space than in human-readable verbal traces. This shift is driven by the structural limitations of explicit-space computation, including linguistic redundancy, discretization bottlenecks, sequential inefficiency, and semantic loss. This survey aims to provide a unified and up-to-date landscape of latent space in language-based models. We organize the survey into five sequential perspectives: Foundation, Evolution, Mechanism, Ability, and Outlook. We begin by delineating the scope of latent space, distinguishing it from explicit or verbal space and from the latent spaces commonly studied in generative visual models. We then trace the field's evolution from early exploratory efforts to the current large-scale expansion. To organize the technical landscape, we examine existing work through the complementary lenses of mechanism and ability. From the perspective of Mechanism, we identify four major lines of development: Architecture, Representation, Computation, and Optimization. From the perspective of Ability, we show how latent space supports a broad capability spectrum spanning Reasoning, Planning, Modeling, Perception, Memory, Collaboration, and Embodiment. Beyond consolidation, we discuss the key open challenges, and outline promising directions for future research. We hope this survey serves not only as a reference for existing work, but also as a foundation for understanding latent space as a general computational and systems paradigm for next-generation intelligence.", "link": "http://arxiv.org/abs/2604.02029v1", "date": "2026-04-02", "relevancy": 2.8082, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5814}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5814}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Latent%20Space%3A%20Foundation%2C%20Evolution%2C%20Mechanism%2C%20Ability%2C%20and%20Outlook&body=Title%3A%20The%20Latent%20Space%3A%20Foundation%2C%20Evolution%2C%20Mechanism%2C%20Ability%2C%20and%20Outlook%0AAuthor%3A%20Xinlei%20Yu%20and%20Zhangquan%20Chen%20and%20Yongbo%20He%20and%20Tianyu%20Fu%20and%20Cheng%20Yang%20and%20Chengming%20Xu%20and%20Yue%20Ma%20and%20Xiaobin%20Hu%20and%20Zhe%20Cao%20and%20Jie%20Xu%20and%20Guibin%20Zhang%20and%20Jiale%20Tao%20and%20Jiayi%20Zhang%20and%20Siyuan%20Ma%20and%20Kaituo%20Feng%20and%20Haojie%20Huang%20and%20Youxing%20Li%20and%20Ronghao%20Chen%20and%20Huacan%20Wang%20and%20Chenglin%20Wu%20and%20Zikun%20Su%20and%20Xiaogang%20Xu%20and%20Kelu%20Yao%20and%20Kun%20Wang%20and%20Chen%20Gao%20and%20Yue%20Liao%20and%20Ruqi%20Huang%20and%20Tao%20Jin%20and%20Cheng%20Tan%20and%20Jiangning%20Zhang%20and%20Wenqi%20Ren%20and%20Yanwei%20Fu%20and%20Yong%20Liu%20and%20Yu%20Wang%20and%20Xiangyu%

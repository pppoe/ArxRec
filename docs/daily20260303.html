{"title": "From Variance to Invariance: Qualitative Content Analysis for Narrative Graph Annotation", "author": "Junbo Huang and Max Weinig and Ulrich Fritsche and Ricardo Usbeck", "abstract": "Narratives in news discourse play a critical role in shaping public understanding of economic events, such as inflation. Annotating and evaluating these narratives in a structured manner remains a key challenge for Natural Language Processing (NLP). In this work, we introduce a narrative graph annotation framework that integrates principles from qualitative content analysis (QCA) to prioritize annotation quality by reducing annotation errors. We present a dataset of inflation narratives annotated as directed acyclic graphs (DAGs), where nodes represent events and edges encode causal relations. To evaluate annotation quality, we employed a $6\\times3$ factorial experimental design to examine the effects of narrative representation (six levels) and distance metric type (three levels) on inter-annotator agreement (Krippendorrf's $\u03b1$), capturing the presence of human label variation (HLV) in narrative interpretations. Our analysis shows that (1) lenient metrics (overlap-based distance) overestimate reliability, and (2) locally-constrained representations (e.g., one-hop neighbors) reduce annotation variability. Our annotation and implementation of graph-based Krippendorrf's $\u03b1$ are open-sourced. The annotation framework and evaluation results provide practical guidance for NLP research on graph-based narrative annotation under HLV.", "link": "http://arxiv.org/abs/2603.01930v1", "date": "2026-03-02", "relevancy": 2.329, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5234}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.437}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.437}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Variance%20to%20Invariance%3A%20Qualitative%20Content%20Analysis%20for%20Narrative%20Graph%20Annotation&body=Title%3A%20From%20Variance%20to%20Invariance%3A%20Qualitative%20Content%20Analysis%20for%20Narrative%20Graph%20Annotation%0AAuthor%3A%20Junbo%20Huang%20and%20Max%20Weinig%20and%20Ulrich%20Fritsche%20and%20Ricardo%20Usbeck%0AAbstract%3A%20Narratives%20in%20news%20discourse%20play%20a%20critical%20role%20in%20shaping%20public%20understanding%20of%20economic%20events%2C%20such%20as%20inflation.%20Annotating%20and%20evaluating%20these%20narratives%20in%20a%20structured%20manner%20remains%20a%20key%20challenge%20for%20Natural%20Language%20Processing%20%28NLP%29.%20In%20this%20work%2C%20we%20introduce%20a%20narrative%20graph%20annotation%20framework%20that%20integrates%20principles%20from%20qualitative%20content%20analysis%20%28QCA%29%20to%20prioritize%20annotation%20quality%20by%20reducing%20annotation%20errors.%20We%20present%20a%20dataset%20of%20inflation%20narratives%20annotated%20as%20directed%20acyclic%20graphs%20%28DAGs%29%2C%20where%20nodes%20represent%20events%20and%20edges%20encode%20causal%20relations.%20To%20evaluate%20annotation%20quality%2C%20we%20employed%20a%20%246%5Ctimes3%24%20factorial%20experimental%20design%20to%20examine%20the%20effects%20of%20narrative%20representation%20%28six%20levels%29%20and%20distance%20metric%20type%20%28three%20levels%29%20on%20inter-annotator%20agreement%20%28Krippendorrf%27s%20%24%CE%B1%24%29%2C%20capturing%20the%20presence%20of%20human%20label%20variation%20%28HLV%29%20in%20narrative%20interpretations.%20Our%20analysis%20shows%20that%20%281%29%20lenient%20metrics%20%28overlap-based%20distance%29%20overestimate%20reliability%2C%20and%20%282%29%20locally-constrained%20representations%20%28e.g.%2C%20one-hop%20 {"title": "Self-Harmony: Learning to Harmonize Self-Supervision and Self-Play in Test-Time Reinforcement Learning", "author": "Ru Wang and Wei Huang and Qi Cao and Yusuke Iwasawa and Yutaka Matsuo and Jiaxian Guo", "abstract": "Test-time reinforcement learning (TTRL) offers a label-free paradigm for adapting models using only synthetic signals at inference, but its success hinges on constructing reliable learning signals. Standard approaches such as majority voting often collapse to spurious yet popular answers. We introduce Self-Harmony, a framework built on a simple intuition: the correct answer should remain stable across both an original question and its paraphrase. Self-Harmony operationalizes this by employing a single model in two complementary roles: a Solver to produce answers and a Reframer to rephrase the input. Based on this, we further propose a pseudo-label method: instead of majority voting, it aggregates answer frequencies across these original and reframed views using the harmonic mean. This is a process that naturally selects for solutions stable under reframing, thereby avoiding the common trap of favoring view-dependent, spurious answers. Crucially, this requires no human supervision or auxiliary models. Across diverse reasoning benchmarks, Self-Harmony achieves state-of-the-art results at the label-free test-time setting, ranking first in 28 of 30 settings across multiple methods. Beyond accuracy, it demonstrates unprecedented robustness, with zero training failures in all experiments, underscoring its stability and reliability.", "link": "http://arxiv.org/abs/2511.01191v2", "date": "2026-03-02", "relevancy": 2.3185, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4775}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.46}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Harmony%3A%20Learning%20to%20Harmonize%20Self-Supervision%20and%20Self-Play%20in%20Test-Time%20Reinforcement%20Learning&body=Title%3A%20Self-Harmony%3A%20Learning%20to%20Harmonize%20Self-Supervision%20and%20Self-Play%20in%20Test-Time%20Reinforcement%20Learning%0AAuthor%3A%20Ru%20Wang%20and%20Wei%20Huang%20and%20Qi%20Cao%20and%20Yusuke%20Iwasawa%20and%20Yutaka%20Matsuo%20and%20Jiaxian%20Guo%0AAbstract%3A%20Test-time%20reinforcement%20learning%20%28TTRL%29%20offers%20a%20label-free%20paradigm%20for%20adapting%20models%20using%20only%20synthetic%20signals%20at%20inference%2C%20but%20its%20success%20hinges%20on%20constructing%20reliable%20learning%20signals.%20Standard%20approaches%20such%20as%20majority%20voting%20often%20collapse%20to%20spurious%20yet%20popular%20answers.%20We%20introduce%20Self-Harmony%2C%20a%20framework%20built%20on%20a%20simple%20intuition%3A%20the%20correct%20answer%20should%20remain%20stable%20across%20both%20an%20original%20question%20and%20its%20paraphrase.%20Self-Harmony%20operationalizes%20this%20by%20employing%20a%20single%20model%20in%20two%20complementary%20roles%3A%20a%20Solver%20to%20produce%20answers%20and%20a%20Reframer%20to%20rephrase%20the%20input.%20Based%20on%20this%2C%20we%20further%20propose%20a%20pseudo-label%20method%3A%20instead%20of%20majority%20voting%2C%20it%20aggregates%20answer%20frequencies%20across%20these%20original%20and%20reframed%20views%20using%20the%20harmonic%20mean.%20This%20is%20a%20process%20that%20naturally%20selects%20for%20solutions%20stable%20under%20reframing%2C%20thereby%20avoiding%20the%20common%20trap%20of%20favoring%20view-dependent%2C%20spurious%20answers.%20Crucially%2C%20this%20requires%20no%20human%20supervision%20or%20auxiliary%20models.%20Across%20diverse%20reasoning%20benchmarks%2C%20Self-Harmony%20achieves%20state-of-the-art%20results%20at%20the%20label-free%20test-time%20setting%2C%20ranking%20first%20in%2028%20of%2030%20settings%20across%20multiple%20methods.%20Beyond%20accuracy%2C%20it%20demonstrates%20unprecedented%20robustness%2C%20with%20zero%20training%20failures%20in%20all%20experiments%2C%20underscoring%20its%20stability%20and%20reliability.%0ALink%3A%20http%3A//arxiv.org/abs/2511.01191v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Harmony%253A%2520Learning%2520to%2520Harmonize%2520Self-Supervision%2520and%2520Self-Play%2520in%2520Test-Time%2520Reinforcement%2520Learning%26entry.906535625%3DRu%2520Wang%2520and%2520Wei%2520Huang%2520and%2520Qi%2520Cao%2520and%2520Yusuke%2520Iwasawa%2520and%2520Yutaka%2520Matsuo%2520and%2520Jiaxian%2520Guo%26entry.1292438233%3DTest-time%2520reinforcement%2520learning%2520%2528TTRL%2529%2520offers%2520a%2520label-free%2520paradigm%2520for%2520adapting%2520models%2520using%2520only%2520synthetic%2520signals%2520at%2520inference%252C%2520but%2520its%2520success%2520hinges%2520on%2520constructing%2520reliable%2520learning%2520signals.%2520Standard%2520approaches%2520such%2520as%2520majority%2520voting%2520often%2520collapse%2520to%2520spurious%2520yet%2520popular%2520answers.%2520We%2520introduce%2520Self-Harmony%252C%2520a%2520framework%2520built%2520on%2520a%2520simple%2520intuition%253A%2520the%2520correct%2520answer%2520should%2520remain%2520stable%2520across%2520both%2520an%2520original%2520question%2520and%2520its%2520paraphrase.%2520Self-Harmony%2520operationalizes%2520this%2520by%2520employing%2520a%2520single%2520model%2520in%2520two%2520complementary%2520roles%253A%2520a%2520Solver%2520to%2520produce%2520answers%2520and%2520a%2520Reframer%2520to%2520rephrase%2520the%2520input.%2520Based%2520on%2520this%252C%2520we%2520further%2520propose%2520a%2520pseudo-label%2520method%253A%2520instead%2520of%2520majority%2520voting%252C%2520it%252 {"title": "Robust White Blood Cell Classification with Stain-Normalized Decoupled Learning and Ensembling", "author": "Luu Le and Hoang-Loc Cao and Ha-Hieu Pham and Thanh-Huy Nguyen and Ulas Bagci", "abstract": "White blood cell (WBC) classification is fundamental for hematology applications such as infection assessment, leukemia screening, and treatment monitoring. However, real-world WBC datasets present substantial appearance variations caused by staining and scanning conditions, as well as severe class imbalance in which common cell types dominate while rare but clinically important categories are underrepresented. To address these challenges, we propose a stain-normalized, decoupled training framework that first learns transferable representations using instance-balanced sampling, and then rebalances the classifier with class-aware sampling and a hybrid loss combining effective-number weighting and focal modulation. In inference stage, we further enhance robustness by ensembling various trained backbones with test-time augmentation. Our approach achieved the top rank on the leaderboard of the WBCBench 2026: Robust White Blood Cell Classification Challenge at ISBI 2026.", "link": "http://arxiv.org/abs/2603.01976v1", "date": "2026-03-02", "relevancy": 2.3135, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4839}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4588}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4454}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20White%20Blood%20Cell%20Classification%20with%20Stain-Normalized%20Decoupled%20Learning%20and%20Ensembling&body=Title%3A%20Robust%20White%20Blood%20Cell%20Classification%20with%20Stain-Normalized%20Decoupled%20Learning%20and%20Ensembling%0AAuthor%3A%20Luu%20Le%20and%20Hoang-Loc%20Cao%20and%20Ha-Hieu%20Pham%20and%20Thanh-Huy%20Nguyen%20and%20Ulas%20Bagci%0AAbstract%3A%20White%20blood%20cell%20%28WBC%29%20classification%20is%20fundamental%20for%20hematology%20applications%20such%20as%20infection%20assessment%2C%20leukemia%20screening%2C%20and%20treatment%20monitoring.%20However%2C%20real-world%20WBC%20datasets%20present%20substantial%20appearance%20variations%20caused%20by%20staining%20and%20scanning%20conditions%2C%20as%20well%20as%20severe%20class%20imbalance%20in%20which%20common%20cell%20types%20dominate%20while%20rare%20but%20clinically%20important%20categories%20are%20underrepresented.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20stain-normalized%2C%20decoupled%20training%20framework%20that%20first%20learns%20transferable%20representations%20using%20instance-balanced%20sampling%2C%20and%20then%20rebalances%20the%20classifier%20with%20class-aware%20sampling%20and%20a%20hybrid%20loss%20combining%20effective-number%20weighting%20and%20focal%20modulation.%20In%20inference%20stage%2C%20we%20further%20enhance%20robustness%20by%20ensembling%20various%20trained%20backbones%20with%20test-time%20augmentation.%20Our%20approach%20achieved%20the%20top%20rank%20on%20the%20leaderboard%20of%20the%20WBCBench%202026%3A%20Robust%20White%20Blood%20Cell%20Classification%20Challenge%20at%20ISBI%202026.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01976v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobust%2520White%2520Blood%2520Cell%2520Classification%2520with%2520Stain-Normalized%2520Decoupled%2520Learning%2520and%2520Ensembling%26entry.906535625%3DLuu%2520Le%2520and%2520Hoang-Loc%2520Cao%2520and%2520Ha-Hieu%2520Pham%2520and%2520Thanh-Huy%2520Nguyen%2520and%2520Ulas%2520Bagci%26entry.1292438233%3DWhite%252 {"title": "TAO: Tolerance-Aware Optimistic Verification for Floating-Point Neural Networks", "author": "Jianzhu Yao and Hongxu Su and Taobo Liao and Zerui Cheng and Huan Zhang and Xuechao Wang and Pramod Viswanath", "abstract": "Neural networks increasingly run on hardware outside the user's control (cloud GPUs, inference marketplaces). Yet ML-as-a-Service reveals little about what actually ran or whether returned outputs faithfully reflect the intended inputs. Users lack recourse against service downgrades (model swaps, quantization, graph rewrites, or discrepancies like altered ad embeddings). Verifying outputs is hard because floating-point(FP) execution on heterogeneous accelerators is inherently nondeterministic. Existing approaches are either impractical for real FP neural networks or reintroduce vendor trust. We present TAO: a Tolerance Aware Optimistic verification protocol that accepts outputs within principled operator-level acceptance regions rather than requiring bitwise equality. TAO combines two error models: (i) sound per-operator IEEE-754 worst-case bounds and (ii) tight empirical percentile profiles calibrated across hardware. Discrepancies trigger a Merkle-anchored, threshold-guided dispute game that recursively partitions the computation graph until one operator remains, where adjudication reduces to a lightweight theoretical-bound check or a small honest-majority vote against empirical thresholds. Unchallenged results finalize after a challenge window, without requiring trusted hardware or deterministic kernels. We implement TAO as a PyTorch-compatible runtime and a contract layer currently deployed on Ethereum Holesky testnet. The runtime instruments graphs, computes per-operator bounds, and runs unmodified vendor kernels in FP32 with negligible overhead (0.3% on Qwen3-8B). Across CNNs, Transformers and diffusion models on A100, H100, RTX6000, RTX4090, empirical thresholds are $10^2-10^3$ times tighter than theoretical bounds, and bound-aware adversarial attacks achieve 0% success. Together, TAO reconciles scalability with verifiability for real-world heterogeneous ML compute.", "link": "http://arxiv.org/abs/2510.16028v3", "date": "2026-03-02", "relevancy": 2.3082, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4672}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4606}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TAO%3A%20Tolerance-Aware%20Optimistic%20Verification%20for%20Floating-Point%20Neural%20Networks&body=Title%3A%20TAO%3A%20Tolerance-Aware%20Optimistic%20Verification%20for%20Floating-Point%20Neural%20Networks%0AAuthor%3A%20Jianzhu%20Yao%20and%20Hongxu%20Su%20and%20Taobo%20Liao%20and%20Zerui%20Cheng%20and%20Huan%20Zhang%20and%20Xuechao%20Wang%20and%20Pramod%20Viswanath%0AAbstract%3A%20Neural%20networks%20increasingly%20run%20on%20hardware%20outside%20the%20user%27s%20control%20%28cloud%20GPUs%2C%20inference%20marketplaces%29.%20Yet%20ML-as-a-Service%20reveals%20little%20about%20what%20actually%20ran%20or%20whether%20returned%20outputs%20faithfully%20reflect%20the%20intended%20inputs.%20Users%20lack%20recourse%20against%20service%20downgrades%20%28model%20swaps%2C%20quantization%2C%20graph%20rewrites%2C%20or%20discrepancies%20like%20altered%20ad%20embeddings%29.%20Verifying%20outputs%20is%20hard%20because%20floating-point%28FP%29%20execution%20on%20heterogeneous%20accelerators%20is%20inherently%20nondeterministic.%20Existing%20approaches%20are%20either%20impractical%20for%20real%20FP%20neural%20networks%20or%20reintroduce%20vendor%20trust.%20We%20present%20TAO%3A%20a%20Tolerance%20Aware%20Optimistic%20verification%20protocol%20that%20accepts%20outputs%20within%20principled%20operator-level%20acceptance%20regions%20rather%20than%20requiring%20bitwise%20equality.%20TAO%20combines%20two%20error%20models%3A%20%28i%29%20sound%20per-operator%20IEEE-754%20worst-case%20bounds%20and%20%28ii%29%20tight%20empirical%20percentile%20profiles%20calibrated%20across%20hardware.%20Discrepancies%20trigger%20a%20Merkle-anchored%2C%20threshold-guided%20dispute%20game%20that%20recursively%20partitions%20the%20computation%20graph%20until%20one%20operator%20remains%2C%20where%20adjudication%20reduces%20to%20a%20lightweight%20theoretical-bound%20check%20or%20a%20small%20honest-majority%20vote%20against%20empirical%20thresholds.%20Unchallenged%20results%20finalize%20after%20a%20challenge%20window%2C%20without%20requiring%20trusted%20hardware%20or%20deterministic%20kernels.%20We%20implement%20TAO%20as%20a%20PyTorch-compatible%20runtime%20and%20a%20contract%20layer%20currently%20deployed%20on%20Ethereum%20Holesky%20testnet.%20The%20runtime%20instruments%20graphs%2C%20computes%20per-operator%20bounds%2C%20and%20runs%20unmodified%20vendor%20kernels%20in%20FP32%20with%20negligible%20overhead%20%280.3%25%20on%20Qwen3-8B%29.%20Across%20CNNs%2C%20Transformers%20and%20diffusion%20models%20on%20A100%2C%20H100%2C%20RTX6000%2C%20RTX4090%2C%20empirical%20thresholds%20are%20%2410%5E2-10%5E3%24%20times%20tighter%20than%20theoretical%20bounds%2C%20and%20bound-aware%20adversarial%20attacks%20achieve%200%25%20success.%20Together%2C%20TAO%20reconciles%20scalability%20with%20verifiability%20for%20real-world%20heterogeneous%20ML%20compute.%0ALink%3A%20http%3A//arxiv.org/abs/2510.16028v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTAO%253A%2520Tolerance-Aware%2520Optimistic%2520Verification%2520for%2520Floating-Point%2520Neural%2520Networks%26entry.906535625%3DJianzhu%2520Yao%2520and%2520Hongxu%2520Su%2520and%2520Taobo%2520Liao%2520and%2520Zerui {"title": "NextAds: Towards Next-generation Personalized Video Advertising", "author": "Yiyan Xu and Ruoxuan Xia and Wuqiang Zheng and Fengbin Zhu and Wenjie Wang and Fuli Feng", "abstract": "With the rapid growth of online video consumption, video advertising has become increasingly dominant in the digital advertising landscape. Yet diverse users and viewing contexts makes one-size-fits-all ad creatives insufficient for consistent effectiveness, underlining the importance of personalization. In practice, most personalized video advertising systems follow a retrieval-based paradigm, selecting the optimal one from a small set of professionally pre-produced creatives for each user. Such static and finite inventories limits both the granularity and the timeliness of personalization, and prevents the creatives from being continuously refined based on online user feedback. Recent advances in generative AI make it possible to move beyond retrieval toward optimizing video creatives in a continuous space at serving time.\n  In this light, we propose NextAds, a generation-based paradigm for next-generation personalized video advertising, and conceptualize NextAds with four core components. To enable comparable research progress, we formulate two representative tasks: personalized creative generation and personalized creative integration, and introduce corresponding lightweight benchmarks. To assess feasibility, we instantiate end-to-end pipelines for both tasks and conduct initial exploratory experiments, demonstrating that GenAI can generate and integrate personalized creatives with encouraging performance. Moreover, we discuss the key challenges and opportunities under this paradigm, aiming to provide actionable insights for both researchers and practitioners and to catalyze progress in personalized video advertising.", "link": "http://arxiv.org/abs/2603.02137v1", "date": "2026-03-02", "relevancy": 2.3081, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5988}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5919}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NextAds%3A%20Towards%20Next-generation%20Personalized%20Video%20Advertising&body=Title%3A%20NextAds%3A%20Towards%20Next-generation%20Personalized%20Video%20Advertising%0AAuthor%3A%20Yiyan%20Xu%20and%20Ruoxuan%20Xia%20and%20Wuqiang%20Zheng%20and%20Fengbin%20Zhu%20and%20Wenjie%20Wang%20and%20Fuli%20Feng%0AAbstract%3A%20With%20the%20rapid%20growth%20of%20online%20video%20consumption%2C%20video%20advertising%20has%20become%20increasingly%20dominant%20in%20the%20digital%20advertising%20landscape.%20Yet%20diverse%20users%20and%20viewing%20contexts%20makes%20one-size-fits-all%20ad%20creatives%20insufficient%20for%20consistent%20effectiveness%2C%20underlining%20the%20importance%20of%20personalization.%20In%20practice%2C%20most%20personalized%20video%20advertising%20systems%20follow%20a%20retrieval-based%20paradigm%2C%20selecting%20the%20optimal%20one%20from%20a%20small%20set%20of%20professionally%20pre-produced%20creatives%20for%20each%20user.%20Such%20static%20and%20finite%20inventories%20limits%20both%20the%20granularity%20and%20the%20timeliness%20of%20personalization%2C%20and%20prevents%20the%20creatives%20from%20being%20continuously%20refined%20based%20on%20online%20user%20feedback.%20Recent%20advances%20in%20generative%20AI%20make%20it%20possible%20to%20move%20beyond%20retrieval%20toward%20optimizing%20video%20creatives%20in%20a%20continuous%20space%20at%20serving%20time.%0A%20%20In%20this%20light%2C%20we%20propose%20NextAds%2C%20a%20generation-based%20paradigm%20for%20next-generation%20personalized%20video%20advertising%2C%20and%20conceptualize%20NextAds%20with%20four%20core%20components.%20To%20enable%20comparable%20research%20progress%2C%20we%20formulate%20two%20representative%20tasks%3A%20personalized%20creative%20generation%20and%20personalized%20creative%20integration%2C%20and%20introduce%20corresponding%20lightweight%20benchmarks.%20To%20assess%20feasibility%2C%20we%20instantiate%20end-to-end%20pipelines%20for%20both%20tasks%20and%20conduct%20initial%20exploratory%20experiments%2C%20demonstrating%20that%20GenAI%20can%20generate%20and%20integrate%20personalized%20creatives%20with%20encouraging%20performance.%20Moreover%2C%20we%20discuss%20the%20key%20challenges%20and%20opportunities%20under%20this%20paradigm%2C%20aiming%20to%20provide%20actionable%20insights%20for%20both%20researchers%20and%20practitioners%20and%20to%20catalyze%20progress%20in%20personalized%20video%20advertising.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02137v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNextAds%253A%2520Towards%2520Next-generation%2520Personalized%2520Video%2520Advertising%26entry.906535625%3DYiyan%2520Xu%2520and%2520Ruoxuan%2520Xia%2520and%2520Wuqiang%2520Zheng%2520and%2520Fengbin%2520Zhu%2520and%2520Wenjie%2520Wang%2520and%2520Fuli%2520Feng%26entry.1292438233%3DWith%2520the%2520rapid%2520growth%2520of%2520online%2520video%2520consumption%252C%2520video%2520advertising%2520has%2520become%2520increasingly%2520dominant%2520in%2520the%2520digital%2520advertising%2520landscape.%2520Yet%2520diverse%2520users%2520and%2520viewing%2520contexts%2520makes%2520one-size-fits-all%2520ad%2520creatives%2520insufficient%2520for%2520consistent%2520effectiveness%252C%2520underlining%2520the%2520importance%2520of%2520personalization.%2520In%2520practice%252C%2520most%2520personalized%2520video%2520advertising%2520systems%2520follow%2520a%2520retrieval-based%2520paradigm%252C%2520selecting%2520the%2520 {"title": "MAP-Diff: Multi-Anchor Guided Diffusion for Progressive 3D Whole-Body Low-Dose PET Denoising", "author": "Peiyuan Jing and Chun-Wun Cheng and Liutao Yang and Zhenxuan Zhang and Thiago V. Lima and Klaus Strobel and Antoine Leimgruber and Angelica Aviles-Rivero and Guang Yang and Javier A. Montoya-Zegarra", "abstract": "Low-dose Positron Emission Tomography (PET) reduces radiation exposure but suffers from severe noise and quantitative degradation. Diffusion-based denoising models achieve strong final reconstructions, yet their reverse trajectories are typically unconstrained and not aligned with the progressive nature of PET dose formation. We propose MAP-Diff, a multi-anchor guided diffusion framework for progressive 3D whole-body PET denoising. MAP-Diff introduces clinically observed intermediate-dose scans as trajectory anchors and enforces timestep-dependent supervision to regularize the reverse process toward dose-aligned intermediate states. Anchor timesteps are calibrated via degradation matching between simulated diffusion corruption and real multi-dose PET pairs, and a timestep-weighted anchor loss stabilizes stage-wise learning. At inference, the model requires only ultra-low-dose input while enabling progressive, dose-consistent intermediate restoration. Experiments on internal (Siemens Biograph Vision Quadra) and cross-scanner (United Imaging uEXPLORER) datasets show consistent improvements over strong CNN-, Transformer-, GAN-, and diffusion-based baselines. On the internal dataset, MAP-Diff improves PSNR from 42.48 dB to 43.71 dB (+1.23 dB), increases SSIM to 0.986, and reduces NMAE from 0.115 to 0.103 (-0.012) compared to 3D DDPM. Performance gains generalize across scanners, achieving 34.42 dB PSNR and 0.141 NMAE on the external cohort, outperforming all competing methods.", "link": "http://arxiv.org/abs/2603.02012v1", "date": "2026-03-02", "relevancy": 2.2999, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.596}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5708}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5708}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAP-Diff%3A%20Multi-Anchor%20Guided%20Diffusion%20for%20Progressive%203D%20Whole-Body%20Low-Dose%20PET%20Denoising&body=Title%3A%20MAP-Diff%3A%20Multi-Anchor%20Guided%20Diffusion%20for%20Progressive%203D%20Whole-Body%20Low-Dose%20PET%20Denoising%0AAuthor%3A%20Peiyuan%20Jing%20and%20Chun-Wun%20Cheng%20and%20Liutao%20Yang%20and%20Zhenxuan%20Zhang%20and%20Thiago%20V.%20Lima%20and%20Klaus%20Strobel%20and%20Antoine%20Leimgruber%20and%20Angelica%20Aviles-Rivero%20and%20Guang%20Yang%20and%20Javier%20A.%20Montoya-Zegarra%0AAbstract%3A%20Low-dose%20Positron%20Emission%20Tomography%20%28PET%29%20reduces%20radiation%20exposure%20but%20suffers%20from%20severe%20noise%20and%20quantitative%20degradation.%20Diffusion-based%20denoising%20models%20achieve%20strong%20final%20reconstructions%2C%20yet%20their%20reverse%20trajectories%20are%20typically%20unconstrained%20and%20not%20aligned%20with%20the%20progressive%20nature%20of%20PET%20dose%20formation.%20We%20propose%20MAP-Diff%2C%20a%20multi-anchor%20guided%20diffusion%20framework%20for%20progressive%203D%20whole-body%20PET%20denoising.%20MAP-Diff%20introduces%20clinically%20observed%20intermediate-dose%20scans%20as%20trajectory%20anchors%20and%20enforces%20timestep-dependent%20supervision%20to%20regularize%20the%20reverse%20process%20toward%20dose-aligned%20intermediate%20states.%20Anchor%20timesteps%20are%20calibrated%20via%20degradation%20matching%20between%20simulated%20diffusion%20corruption%20and%20real%20multi-dose%20PET%20pairs%2C%20and%20a%20timestep-weighted%20anchor%20loss%20stabilizes%20stage-wise%20learning.%20At%20inference%2C%20the%20model%20requires%20only%20ultra-low-dose%20input%20while%20enabling%20progressive%2C%20dose-consistent%20intermediate%20restoration.%20Experiments%20on%20internal%20%28Siemens%20Biograph%20Vision%20Quadra%29%20and%20cross-scanner%20%28United%20Imaging%20uEXPLORER%29%20datasets%20show%20consistent%20improvements%20over%20strong%20CNN-%2C%20Transformer-%2C%20GAN-%2C%20and%20diffusion-based%20baselines.%20On%20the%20internal%20dataset%2C%20MAP-Diff%20improves%20PSNR%20from%2042.48%20dB%20to%2043.71%20dB%20%28%2B1.23%20dB%29%2C%20increases%20SSIM%20to%200.986%2C%20and%20reduces%20NMAE%20from%200.115%20to%200.103%20%28-0.012%29%20compared%20to%203D%20DDPM.%20Performance%20gains%20generalize%20across%20scanners%2C%20achieving%2034.42%20dB%20PSNR%20and%200.141%20NMAE%20on%20the%20external%20cohort%2C%20outperforming%20all%20competing%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02012v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAP-Diff%253A%2520Multi-Anchor%2520Guided%2520Diffusion%2520for%2520Progressive%25203D%2520Whole-Body%2520Low-Dose%2520PET%2520Denoising%26entry.906535625%3DPeiyuan%2520Jing%2520and%2520Chun-Wun%2520Cheng%2520and%2520Liutao%2520Yang%2520and%2520Zhenxuan%2520Zhang%2520and%2520Thiago%2520V.%2520Lima%2520and%2520Klaus%2520Strobel%2520and%2520Antoine%2520Leimgruber%2520and%2520Angelica%2520Aviles-Rivero%2520and%2520Guang%2520Yang%2520and%2520Javier%2520A.%2520Montoya-Zegarra%26entry.1292438233%3DLow-dose%2520Positron%2520Emission%2520Tomography%2520%2528PET%2529%2520reduces%2520radiation%2520exposure%2520but%2520suffers%2520from%2520severe%2520noise%2520and%2520quantitative%2520degradation.%2520Diffusion-based%2520denoising%2520models%2520achieve%2520strong%2520final%2520reconstructions%252C%2520yet%2520their%2520reverse%2520trajectories%2520are%2520typically%2520unconstrained%2520and%2520not%2520aligned%2520with%2 {"title": "Theoretical Foundations of Superhypergraph and Plithogenic Graph Neural Networks", "author": "Takaaki Fujita and Florentin Smarandache", "abstract": "Hypergraphs generalize classical graphs by allowing a single edge to connect multiple vertices, providing a natural language for modeling higher-order interactions. Superhypergraphs extend this paradigm further by accommodating nested, set-valued entities and relations, enabling the representation of hierarchical, multi-level structures beyond the expressive reach of ordinary graphs or hypergraphs. In parallel, neural networks-especially Graph Neural Networks (GNNs)-have become a standard tool for learning from relational data, and recent years have seen rapid progress on Hypergraph Neural Networks (HGNNs) and their theoretical properties.\n  To model uncertainty and multi-aspect attributes in complex networks, several graded and multi-valued graph frameworks have been developed, including fuzzy graphs and neutrosophic graphs. The plithogenic graph framework unifies and refines these approaches by incorporating multi-valued attributes together with membership and contradiction mechanisms, offering a flexible representation for heterogeneous and partially inconsistent information.\n  This book develops the theoretical foundations of SuperHyperGraph Neural Networks (SHGNNs) and Plithogenic Graph Neural Networks, with the goal of extending message-passing principles to these advanced higher-order structures. We provide rigorous definitions, establish fundamental structural properties, and prove well-definedness results for key constructions, with particular emphasis on strengthened formulations of Soft Graph Neural Networks and Rough Graph Neural Networks.", "link": "http://arxiv.org/abs/2412.01176v2", "date": "2026-03-02", "relevancy": 2.2915, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4599}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4579}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Theoretical%20Foundations%20of%20Superhypergraph%20and%20Plithogenic%20Graph%20Neural%20Networks&body=Title%3A%20Theoretical%20Foundations%20of%20Superhypergraph%20and%20Plithogenic%20Graph%20Neural%20Networks%0AAuthor%3A%20Takaaki%20Fujita%20and%20Florentin%20Smarandache%0AAbstract%3A%20Hypergraphs%20generalize%20classical%20graphs%20by%20allowing%20a%20single%20edge%20to%20connect%20multiple%20vertices%2C%20providing%20a%20natural%20language%20for%20modeling%20higher-order%20interactions.%20Superhypergraphs%20extend%20this%20paradigm%20further%20by%20accommodating%20nested%2C%20set-valued%20entities%20and%20relations%2C%20enabling%20the%20representation%20of%20hierarchical%2C%20multi-level%20structures%20beyond%20the%20expressive%20reach%20of%20ordinary%20graphs%20or%20hypergraphs.%20In%20parallel%2C%20neural%20networks-especially%20Graph%20Neural%20Networks%20%28GNNs%29-have%20become%20a%20standard%20tool%20for%20learning%20from%20relational%20data%2C%20and%20recent%20years%20have%20seen%20rapid%20progress%20on%20Hypergraph%20Neural%20Networks%20%28HGNNs%29%20and%20their%20theoretical%20properties.%0A%20%20To%20model%20uncertainty%20and%20multi-aspect%20attributes%20in%20complex%20networks%2C%20several%20graded%20and%20multi-valued%20graph%20frameworks%20have%20been%20developed%2C%20including%20fuzzy%20graphs%20and%20neutrosophic%20graphs.%20The%20plithogenic%20graph%20framework%20unifies%20and%20refines%20these%20approaches%20by%20incorporating%20multi-valued%20attributes%20together%20with%20membership%20and%20contradiction%20mechanisms%2C%20offering%20a%20flexible%20representation%20for%20heterogeneous%20and%20partially%20inconsistent%20information.%0A%20%20This%20book%20develops%20the%20theoretical%20foundations%20of%20SuperHyperGraph%20Neural%20Networks%20%28SHGNNs%29%20and%20Plithogenic%20Graph%20Neural%20Networks%2C%20with%20the%20goal%20of%20extending%20message-passing%20principles%20to%20these%20advanced%20higher-order%20structures.%20We%20provide%20rigorous%20definitions%2C%20establish%20fundamental%20structural%20properties%2C%20and%20prove%20well-definedness%20results%20for%20key%20constructions%2C%20with%20particular%20emphasis%20on%20strengthened%20formulations%20of%20Soft%20Graph%20Neural%20Networks%20and%20Rough%20Graph%20Neural%20Networks.%0ALink%3A%20http%3A//arxiv.org/abs/2412.01176v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTheoretical%2520Foundations%2520of%2520Superhypergraph%2520and%2520Plithogenic%2520Graph%2520Neural%2520Networks%26entry.906535625%3DTakaaki%2520Fujita%2520and%2520Florentin%2520Smarandache%26entry.1292438233%3DHypergraphs%2520generalize%2520classical%2520graphs%2520by%2520allowing%2520a%2520single%2520edge%2520to%2520connect%2520multiple%2520vertices%252C%2520providing%2520a%2520natural%2520language%2520for%2520modeling%2520higher-order%2520interactions.%2520Superhypergraphs%2520extend%2520this%2520paradigm%2520further%2520by%2520accommodating%2520nested%252C%2520set-valued%2520entities%2520and%2520relations%252C%2520enabling%2520the%2520representation%2520of%2520hierarchical%252C%2520multi-level%2520structures%2520beyond%2520the%2520expressive%2520reach%2520of%2520ordinary%2520graphs%2520or%2520hypergraphs.%2520In%2520parallel%252C%2520neural%2520networks-especially%2520Graph%2520Neural%2520Networks%2520%2528GNNs%2529-have%2520become%2520a%2520standard%2520tool%2520for%2520learning%2520from%2520relational%2520data%252C%2520and%2520recent%2520years%2520have%2520seen%2520rapid%2520progress%2520on%2520Hypergraph%2520Neural%2520Networks%2520%2528HGNNs%2529%2520and%2520their%2520theore {"title": "LAD-Drive: Bridging Language and Trajectory with Action-Aware Diffusion Transformers", "author": "Fabian Schmidt and Karol Fedurko and Markus Enzweiler and Abhinav Valada", "abstract": "While multimodal large language models (MLLMs) provide advanced reasoning for autonomous driving, translating their discrete semantic knowledge into continuous trajectories remains a fundamental challenge. Existing methods often rely on unimodal planning heads that inherently limit their ability to represent multimodal driving behavior. Furthermore, most generative approaches frequently condition on one-hot encoded actions, discarding the nuanced navigational uncertainty critical for complex scenarios. To resolve these limitations, we introduce LAD-Drive, a generative framework that structurally disentangles high-level intention from low-level spatial planning. LAD-Drive employs an action decoder to infer a probabilistic meta-action distribution, establishing an explicit belief state that preserves the nuanced intent typically lost by one-hot encodings. This distribution, fused with the vehicle's kinematic state, conditions an action-aware diffusion decoder that utilizes a truncated denoising process to refine learned motion anchors into safe, kinematically feasible trajectories. Extensive evaluations on the LangAuto benchmark demonstrate that LAD-Drive achieves state-of-the-art results, outperforming competitive baselines by up to 59% in Driving Score while significantly reducing route deviations and collisions. We will publicly release the code and models on https://github.com/iis-esslingen/lad-drive.", "link": "http://arxiv.org/abs/2603.02035v1", "date": "2026-03-02", "relevancy": 2.2825, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5868}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5678}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.567}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LAD-Drive%3A%20Bridging%20Language%20and%20Trajectory%20with%20Action-Aware%20Diffusion%20Transformers&body=Title%3A%20LAD-Drive%3A%20Bridging%20Language%20and%20Trajectory%20with%20Action-Aware%20Diffusion%20Transformers%0AAuthor%3A%20Fabian%20Schmidt%20and%20Karol%20Fedurko%20and%20Markus%20Enzweiler%20and%20Abhinav%20Valada%0AAbstract%3A%20While%20multimodal%20large%20language%20models%20%28MLLMs%29%20provide%20advanced%20reasoning%20for%20autonomous%20driving%2C%20translating%20their%20discrete%20semantic%20knowledge%20into%20continuous%20trajectories%20remains%20a%20fundamental%20challenge.%20Existing%20methods%20often%20rely%20on%20unimodal%20planning%20heads%20that%20inherently%20limit%20their%20ability%20to%20represent%20multimodal%20driving%20behavior.%20Furthermore%2C%20most%20generative%20approaches%20frequently%20condition%20on%20one-hot%20encoded%20actions%2C%20discarding%20the%20nuanced%20navigational%20uncertainty%20critical%20for%20complex%20scenarios.%20To%20resolve%20these%20limitations%2C%20we%20introduce%20LAD-Drive%2C%20a%20generative%20framework%20that%20structurally%20disentangles%20high-level%20intention%20from%20low-level%20spatial%20planning.%20LAD-Drive%20employs%20an%20action%20decoder%20to%20infer%20a%20probabilistic%20meta-action%20distribution%2C%20establishing%20an%20explicit%20belief%20state%20that%20preserves%20the%20nuanced%20intent%20typically%20lost%20by%20one-hot%20encodings.%20This%20distribution%2C%20fused%20with%20the%20vehicle%27s%20kinematic%20state%2C%20conditions%20an%20action-aware%20diffusion%20decoder%20that%20utilizes%20a%20truncated%20denoising%20process%20to%20refine%20learned%20motion%20anchors%20into%20safe%2C%20kinematically%20feasible%20trajectories.%20Extensive%20evaluations%20on%20the%20LangAuto%20benchmark%20demonstrate%20that%20LAD-Drive%20achieves%20state-of-the-art%20results%2C%20outperforming%20competitive%20baselines%20by%20up%20to%2059%25%20in%20Driving%20Score%20while%20significantly%20reducing%20route%20deviations%20and%20collisions.%20We%20will%20publicly%20release%20the%20code%20and%20models%20on%20https%3A//github.com/iis-esslingen/lad-drive.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02035v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLAD-Drive%253A%2520Bridging%2520Language%2520and%2520Trajectory%2520with%2520Action-Aware%2520Diffusion%2520Transformers%26entry.906535625%3DFabian%2520Schmidt%2520and%2520Karol%2520Fedurko%2520and%2520Markus%2520Enzweiler%2520and%2520Abhinav%2520Valada%26entry.1292438233%3DWhile%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520provide%2520advanced%2520reasoning%2520for%2520autonomous%2520driving%252C%2520translating%2520their%2520discrete%2520semantic%2520knowledge%2520into%2520continuous%2520trajectories%2520remains%2520a%2520fundamental%2520challenge.%2520Existing%2520methods%2520often%2520rely%2520on%2520unimodal%2520planning%2520heads%2520that%2520inherently%2520limit%2520their%2520ability%2520to%2520represent%2520multimodal%2520driving%2520behavior.%2520Furthermore%252C%2520most%2520generative%2520approaches%2520frequently%2520condition%2520on%2520one-hot%2520encoded%2520actions%252C%2520discarding%2520the%2520nuanced%2520navigational%2520uncertainty%2520critical%2520for%2520complex%2520scenarios.%2520To%2520resolve%2520these%2520limitations%252C%2520we%2520introduce%2520LAD-Drive%252C%2520a%2520generative%2520framework%2520that%2520structurally%2520disentangles%2520high-level%2520intention%2520from%2520low-level%2520spatial%2520planning.%2520LAD-Drive%2520employs%2520an%2520action%2520decoder%2520to%2520infer%2520a%2520probabilistic%2520meta-action%2520distribution% {"title": "Phishing the Phishers with SpecularNet: Hierarchical Graph Autoencoding for Reference-Free Web Phishing Detection", "author": "Tailai Song and Pedro Casas and Michela Meo", "abstract": "Phishing remains the most pervasive threat to the Web, enabling large-scale credential theft and financial fraud through deceptive webpages. While recent reference-based and generative-AI-driven phishing detectors achieve strong accuracy, their reliance on external knowledge bases, cloud services, and complex multimodal pipelines fundamentally limits practicality, scalability, and reproducibility. In contrast, conventional deep learning approaches often fail to generalize to evolving phishing campaigns. We introduce SpecularNet, a novel lightweight framework for reference-free web phishing detection that demonstrates how carefully designed compact architectures can rival heavyweight systems. SpecularNet operates solely on the domain name and HTML structure, modeling the Document Object Model (DOM) as a tree and leveraging a hierarchical graph autoencoding architecture with directional, level-wise message passing. This design captures higher-order structural invariants of phishing webpages while enabling fast, end-to-end inference on standard CPUs. Extensive evaluation against 13 state of the art phishing detectors, including leading reference-based systems, shows that SpecularNet achieves competitive detection performance with dramatically lower computational cost. On benchmark datasets, it reaches an F1 score of 93.9%, trailing the best reference-based method slightly while reducing inference time from several seconds to approximately 20 milliseconds per webpage. Field and robustness evaluations further validate SpecularNet in real-world deployments, on a newly collected 2026 open-world dataset, and against adversarial attacks.", "link": "http://arxiv.org/abs/2603.01874v1", "date": "2026-03-02", "relevancy": 2.279, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4582}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4581}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Phishing%20the%20Phishers%20with%20SpecularNet%3A%20Hierarchical%20Graph%20Autoencoding%20for%20Reference-Free%20Web%20Phishing%20Detection&body=Title%3A%20Phishing%20the%20Phishers%20with%20SpecularNet%3A%20Hierarchical%20Graph%20Autoencoding%20for%20Reference-Free%20Web%20Phishing%20Detection%0AAuthor%3A%20Tailai%20Song%20and%20Pedro%20Casas%20and%20Michela%20Meo%0AAbstract%3A%20Phishing%20remains%20the%20most%20pervasive%20threat%20to%20the%20Web%2C%20enabling%20large-scale%20credential%20theft%20and%20financial%20fraud%20through%20deceptive%20webpages.%20While%20recent%20reference-based%20and%20generative-AI-driven%20phishing%20detectors%20achieve%20strong%20accuracy%2C%20their%20reliance%20on%20external%20knowledge%20bases%2C%20cloud%20services%2C%20and%20complex%20multimodal%20pipelines%20fundamentally%20limits%20practicality%2C%20scalability%2C%20and%20reproducibility.%20In%20contrast%2C%20conventional%20deep%20learning%20approaches%20often%20fail%20to%20generalize%20to%20evolving%20phishing%20campaigns.%20We%20introduce%20SpecularNet%2C%20a%20novel%20lightweight%20framework%20for%20reference-free%20web%20phishing%20detection%20that%20demonstrates%20how%20carefully%20designed%20compact%20architectures%20can%20rival%20heavyweight%20systems.%20SpecularNet%20operates%20solely%20on%20the%20domain%20name%20and%20HTML%20structure%2C%20modeling%20the%20Document%20Object%20Model%20%28DOM%29%20as%20a%20tree%20and%20leveraging%20a%20hierarchical%20graph%20autoencoding%20architecture%20with%20directional%2C%20level-wise%20message%20passing.%20This%20design%20captures%20higher-order%20structural%20invariants%20of%20phishing%20webpages%20while%20enabling%20fast%2C%20end-to-end%20inference%20on%20standard%20CPUs.%20Extensive%20evaluation%20against%2013%20state%20of%20the%20art%20phishing%20detectors%2C%20including%20leading%20reference-based%20systems%2C%20shows%20that%20SpecularNet%20achieves%20competitive%20detection%20performance%20with%20dramatically%20lower%20computational%20cost.%20On%20benchmark%20datasets%2C%20it%20reaches%20an%20F1%20score%20of%2093.9%25%2C%20trailing%20the%20best%20reference-based%20method%20slightly%20while%20reducing%20inference%20time%20from%20several%20seconds%20to%20approximately%2020%20milliseconds%20per%20webpage.%20Field%20and%20robustness%20evaluations%20further%20validate%20SpecularNet%20in%20real-world%20deployments%2C%20on%20a%20newly%20collected%202026%20open-world%20dataset%2C%20and%20against%20adversarial%20attacks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01874v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhishing%2520the%2520Phishers%2520with%2520SpecularNet%253A%2520Hierarchical%2520Graph%2520Autoencoding%2520for%2520Reference-Free%2520Web%2520Phishing%2520Detection%26entry.906535625%3DTailai%2520Song%2520and%2520Pedro%2520Casas%2520and%2520Michela%2520Meo%26entry.1292438233%3DPhishing%2520remains%2520the%2520most%2520pervasive%2520threat%2520to%2520the%2520Web%252C%2520enabling%2520large-scale%2520credential%2520theft%2520and%2520financial%2520fraud%2520through%2520deceptive%2520webpages.%2520While%2520recent%2520reference-based%2520and%2520generative-AI-driven%2520phishing%2520detectors%2520achieve%2520strong%2520accuracy%252C%2520their%2520reliance%2520on%2520external%2520knowledge%2520bases%252C%2520cloud%2520services%252C%2520and%2520complex%2520multimodal%2520pipelines%2520fundamentally%2520limits%2520practicality%25 {"title": "Neural Spelling: A Spell-Based BCI System for Language Neural Decoding", "author": "Xiaowei Jiang and Charles Zhou and Yiqun Duan and Ziyi Zhao and Thomas Do and Chin-Teng Lin", "abstract": "Brain-computer interfaces (BCIs) present a promising avenue by translating neural activity directly into text, eliminating the need for physical actions. However, existing non-invasive BCI systems have not successfully covered the entire alphabet, limiting their practicality. In this paper, we propose a novel non-invasive EEG-based BCI system with Curriculum-based Neural Spelling Framework, which recognizes all 26 alphabet letters by decoding neural signals associated with handwriting first, and then apply a Generative AI (GenAI) to enhance spell-based neural language decoding tasks. Our approach combines the ease of handwriting with the accessibility of EEG technology, utilizing advanced neural decoding algorithms and pre-trained large language models (LLMs) to translate EEG patterns into text with high accuracy. This system show how GenAI can improve the performance of typical spelling-based neural language decoding task, and addresses the limitations of previous methods, offering a scalable and user-friendly solution for individuals with communication impairments, thereby enhancing inclusive communication options.", "link": "http://arxiv.org/abs/2501.17489v2", "date": "2026-03-02", "relevancy": 2.2779, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4581}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4581}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4505}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Spelling%3A%20A%20Spell-Based%20BCI%20System%20for%20Language%20Neural%20Decoding&body=Title%3A%20Neural%20Spelling%3A%20A%20Spell-Based%20BCI%20System%20for%20Language%20Neural%20Decoding%0AAuthor%3A%20Xiaowei%20Jiang%20and%20Charles%20Zhou%20and%20Yiqun%20Duan%20and%20Ziyi%20Zhao%20and%20Thomas%20Do%20and%20Chin-Teng%20Lin%0AAbstract%3A%20Brain-computer%20interfaces%20%28BCIs%29%20present%20a%20promising%20avenue%20by%20translating%20neural%20activity%20directly%20into%20text%2C%20eliminating%20the%20need%20for%20physical%20actions.%20However%2C%20existing%20non-invasive%20BCI%20systems%20have%20not%20successfully%20covered%20the%20entire%20alphabet%2C%20limiting%20their%20practicality.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20non-invasive%20EEG-based%20BCI%20system%20with%20Curriculum-based%20Neural%20Spelling%20Framework%2C%20which%20recognizes%20all%2026%20alphabet%20letters%20by%20decoding%20neural%20signals%20associated%20with%20handwriting%20first%2C%20and%20then%20apply%20a%20Generative%20AI%20%28GenAI%29%20to%20enhance%20spell-based%20neural%20language%20decoding%20tasks.%20Our%20approach%20combines%20the%20ease%20of%20handwriting%20with%20the%20accessibility%20of%20EEG%20technology%2C%20utilizing%20advanced%20neural%20decoding%20algorithms%20and%20pre-trained%20large%20language%20models%20%28LLMs%29%20to%20translate%20EEG%20patterns%20into%20text%20with%20high%20accuracy.%20This%20system%20show%20how%20GenAI%20can%20improve%20the%20performance%20of%20typical%20spelling-based%20neural%20language%20decoding%20task%2C%20and%20addresses%20the%20limitations%20of%20previous%20methods%2C%20offering%20a%20scalable%20and%20user-friendly%20solution%20for%20individuals%20with%20communication%20impairments%2C%20thereby%20enhancing%20inclusive%20communication%20options.%0ALink%3A%20http%3A//arxiv.org/abs/2501.17489v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Spelling%253A%2520A%2520Spell-Ba {"title": "B$^2$F-Map: Crowd-sourced Mapping with Bayesian B-spline Fusion", "author": "Yiping Xie and Yuxuan Xia and Erik Stenborg and Junsheng Fu and Axel Beauvisage and Gabriel E. Garcia and Tianyu Wu and Gustaf Hendeby", "abstract": "Crowd-sourced mapping offers a scalable alternative to creating maps using traditional survey vehicles. Yet, existing methods either rely on prior high-definition (HD) maps or neglect uncertainties in the map fusion. In this work, we present a complete pipeline for HD map generation using production vehicles equipped only with a monocular camera, consumer-grade GNSS, and IMU. Our approach includes on-cloud localization using lightweight standard-definition maps, on-vehicle mapping via an extended object trajectory (EOT) Poisson multi-Bernoulli (PMB) filter with Gibbs sampling, and on-cloud multi-drive optimization and Bayesian map fusion. We represent the lane lines using B-splines, where each B-spline is parameterized by a sequence of Gaussian distributed control points, and propose a novel Bayesian fusion framework for B-spline trajectories with differing density representation, enabling principled handling of uncertainties. We evaluate our proposed approach, B$^2$F-Map, on large-scale real-world datasets collected across diverse driving conditions and demonstrate that our method is able to produce geometrically consistent lane-level maps.", "link": "http://arxiv.org/abs/2603.01673v1", "date": "2026-03-02", "relevancy": 2.2594, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6023}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5564}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5307}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20B%24%5E2%24F-Map%3A%20Crowd-sourced%20Mapping%20with%20Bayesian%20B-spline%20Fusion&body=Title%3A%20B%24%5E2%24F-Map%3A%20Crowd-sourced%20Mapping%20with%20Bayesian%20B-spline%20Fusion%0AAuthor%3A%20Yiping%20Xie%20and%20Yuxuan%20Xia%20and%20Erik%20Stenborg%20and%20Junsheng%20Fu%20and%20Axel%20Beauvisage%20and%20Gabriel%20E.%20Garcia%20and%20Tianyu%20Wu%20and%20Gustaf%20Hendeby%0AAbstract%3A%20Crowd-sourced%20mapping%20offers%20a%20scalable%20alternative%20to%20creating%20maps%20using%20traditional%20survey%20vehicles.%20Yet%2C%20existing%20methods%20either%20rely%20on%20prior%20high-definition%20%28HD%29%20maps%20or%20neglect%20uncertainties%20in%20the%20map%20fusion.%20In%20this%20work%2C%20we%20present%20a%20complete%20pipeline%20for%20HD%20map%20generation%20using%20production%20vehicles%20equipped%20only%20with%20a%20monocular%20camera%2C%20consumer-grade%20GNSS%2C%20and%20IMU.%20Our%20approach%20includes%20on-cloud%20localization%20using%20lightweight%20standard-definition%20maps%2C%20on-vehicle%20mapping%20via%20an%20extended%20object%20trajectory%20%28EOT%29%20Poisson%20multi-Bernoulli%20%28PMB%29%20filter%20with%20Gibbs%20sampling%2C%20and%20on-cloud%20multi-drive%20optimization%20and%20Bayesian%20map%20fusion.%20We%20represent%20the%20lane%20lines%20using%20B-splines%2C%20where%20each%20B-spline%20is%20parameterized%20by%20a%20sequence%20of%20Gaussian%20distributed%20control%20points%2C%20and%20propose%20a%20novel%20Bayesian%20fusion%20framework%20for%20B-spline%20trajectories%20with%20differing%20density%20representation%2C%20enabling%20principled%20handling%20of%20uncertainties.%20We%20evaluate%20our%20proposed%20approach%2C%20B%24%5E2%24F-Map%2C%20on%20large-scale%20real-world%20datasets%20collected%20across%20diverse%20driving%20conditions%20and%20demonstrate%20that%20our%20method%20is%20able%20to%20produce%20geometrically%20consistent%20lane-level%20maps.%0ALink%3A%20http%3A//ar {"title": "Open-Sora 2.0: Training a Commercial-Level Video Generation Model in $200k", "author": "Zangwei Zheng and Xiangyu Peng and Yuxuan Lou and Chenhui Shen and Tom Young and Xinying Guo and Binluo Wang and Hang Xu and Hongxin Liu and Mingyan Jiang and Wenjun Li and Yuhui Wang and Anbang Ye and Gang Ren and Qianran Ma and Wanying Liang and Xiang Lian and Xiwen Wu and Yuting Zhong and Zhuangyan Li and Chaoyu Gong and Guojun Lei and Leijun Cheng and Limin Zhang and Minghao Li and Ruijie Zhang and Silan Hu and Shijie Huang and Xiaokang Wang and Yuanheng Zhao and Yuqi Wang and Ziang Wei and Yang You", "abstract": "Video generation models have achieved remarkable progress in the past year. The quality of AI video continues to improve, but at the cost of larger model size, increased data quantity, and greater demand for training compute. In this report, we present Open-Sora 2.0, a commercial-level video generation model trained for only $200k. With this model, we demonstrate that the cost of training a top-performing video generation model is highly controllable. We detail all techniques that contribute to this efficiency breakthrough, including data curation, model architecture, training strategy, and system optimization. According to human evaluation results and VBench scores, Open-Sora 2.0 is comparable to global leading video generation models including the open-source HunyuanVideo and the closed-source Runway Gen-3 Alpha. By making Open-Sora 2.0 fully open-source, we aim to democratize access to advanced video generation technology, fostering broader innovation and creativity in content creation. All resources are publicly available at: https://github.com/hpcaitech/Open-Sora.", "link": "http://arxiv.org/abs/2503.09642v3", "date": "2026-03-02", "relevancy": 2.2563, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5932}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5454}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Open-Sora%202.0%3A%20Training%20a%20Commercial-Level%20Video%20Generation%20Model%20in%20%24200k&body=Title%3A%20Open-Sora%202.0%3A%20Training%20a%20Commercial-Level%20Video%20Generation%20Model%20in%20%24200k%0AAuthor%3A%20Zangwei%20Zheng%20and%20Xiangyu%20Peng%20and%20Yuxuan%20Lou%20and%20Chenhui%20Shen%20and%20Tom%20Young%20and%20Xinying%20Guo%20and%20Binluo%20Wang%20and%20Hang%20Xu%20and%20Hongxin%20Liu%20and%20Mingyan%20Jiang%20and%20Wenjun%20Li%20and%20Yuhui%20Wang%20and%20Anbang%20Ye%20and%20Gang%20Ren%20and%20Qianran%20Ma%20and%20Wanying%20Liang%20and%20Xiang%20Lian%20and%20Xiwen%20Wu%20and%20Yuting%20Zhong%20and%20Zhuangyan%20Li%20and%20Chaoyu%20Gong%20and%20Guojun%20Lei%20and%20Leijun%20Cheng%20and%20Limin%20Zhang%20and%20Minghao%20Li%20and%20Ruijie%20Zhang%20and%20Silan%20Hu%20and%20Shijie%20Huang%20and%20Xiaokang%20Wang%20and%20Yuanheng%20Zhao%20and%20Yuqi%20Wang%20and%20Ziang%20Wei%20and%20Yang%20You%0AAbstract%3A%20Video%20generation%20models%20have%20achieved%20remarkable%20progress%20in%20the%20past%20year.%20The%20quality%20of%20AI%20video%20continues%20to%20improve%2C%20but%20at%20the%20cost%20of%20larger%20model%20size%2C%20increased%20data%20quantity%2C%20and%20greater%20demand%20for%20training%20compute.%20In%20this%20report%2C%20we%20present%20Open-Sora%202.0%2C%20a%20commercial-level%20video%20generation%20model%20trained%20for%20only%20%24200k.%20With%20this%20model%2C%20we%20demonstrate%20that%20the%20cost%20of%20training%20a%20top-performing%20video%20generation%20model%20is%20highly%20controllable.%20We%20detail%20all%20techniques%20that%20contribute%20to%20this%20efficiency%20breakthrough%2C%20including%20data%20curation%2C%20mod {"title": "Building a Strong Instruction Language Model for a Less-Resourced Language", "author": "Domen Vre\u0161 and Tja\u0161a Ar\u010don and Timotej Petri\u010d and Dario Vajda and Marko Robnik-\u0160ikonja and Iztok Lebar Bajec", "abstract": "Large language models (LLMs) have become an essential tool for natural language processing and artificial intelligence in general. Current open-source models are primarily trained on English texts, resulting in poorer performance on less-resourced languages and cultures. We present a set of methodological approaches necessary for the successful adaptation of an LLM to a less-resourced language, and demonstrate them using the Slovene language. We present GaMS3-12B, a generative model for Slovene with 12 billion parameters, and demonstrate that it is the best-performing open-source model for Slovene within its parameter range. We adapted the model to the Slovene language using three-stage continual pre-training of the Gemma 3 model, followed by two-stage supervised fine-tuning (SFT). We trained the model on a combination of 140B Slovene, English, Bosnian, Serbian, and Croatian pretraining tokens, and over 200 thousand English and Slovene SFT examples. We evaluate GaMS3-12B on the Slovenian-LLM-Eval datasets, English-to-Slovene translation, and the Slovene LLM arena. We show that the described model outperforms 12B Gemma 3 across all three scenarios and performs comparably to much larger commercial GPT-4o in the Slovene LLM arena, achieving a win rate of over 60 %.", "link": "http://arxiv.org/abs/2603.01691v1", "date": "2026-03-02", "relevancy": 2.2533, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4552}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4552}, {"title": "TAMM: TriAdapter Multi-Modal Lear {"title": "Optimal transport unlocks end-to-end learning for single-molecule localization", "author": "Romain Seailles and Jean-Baptiste Masson and Jean Ponce and Julien Mairal", "abstract": "Single-molecule localization microscopy (SMLM) allows reconstructing biology-relevant structures beyond the diffraction limit by detecting and localizing individual fluorophores -- fluorescent molecules stained onto the observed specimen -- over time to reconstruct super-resolved images. Currently, efficient SMLM requires non-overlapping emitting fluorophores, leading to long acquisition times that hinders live-cell imaging. Recent deep-learning approaches can handle denser emissions, but they rely on variants of non-maximum suppression (NMS) layers, which are unfortunately non-differentiable and may discard true positives with their local fusion strategy. In this presentation, we reformulate the SMLM training objective as a set-matching problem, deriving an optimal-transport loss that eliminates the need for NMS during inference and enables end-to-end training. Additionally, we propose an iterative neural network that integrates knowledge of the microscope's optical system inside our model. Experiments on synthetic benchmarks and real biological data show that both our new loss function and architecture surpass the state of the art at moderate and high emitter densities. Code is available at https://github.com/RSLLES/SHOT.", "link": "http://arxiv.org/abs/2512.10683v2", "date": "2026-03-02", "relevancy": 2.2505, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5975}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5688}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "simi {"title": "Emerging Human-like Strategies for Semantic Memory Foraging in Large Language Models", "author": "Eric Lacosse and Mariana Duarte and Peter M. Todd and Daniel C. McNamee", "abstract": "Both humans and Large Language Models (LLMs) store a vast repository of semantic memories. In humans, efficient and strategic access to this memory store is a critical foundation for a variety of cognitive functions. Such access has long been a focus of psychology and the computational mechanisms behind it are now well characterized. Much of this understanding has been gleaned from a widely-used neuropsychological and cognitive science assessment called the Semantic Fluency Task (SFT), which requires the generation of as many semantically constrained concepts as possible. Our goal is to apply mechanistic interpretability techniques to bring greater rigor to the study of semantic memory foraging in LLMs. To this end, we present preliminary results examining SFT as a case study. A central focus is on convergent and divergent patterns of generative memory search, which in humans play complementary strategic roles in efficient memory foraging. We show that these same behavioral signatures, critical to human performance on the SFT, also emerge as identifiable patterns in LLMs across distinct layers. Potentially, this analysis provides new insights into how LLMs may be adapted into closer cognitive alignment with humans, or alternatively, guided toward productive cognitive \\emph{disalignment} to enhance complementary strengths in human-AI interaction.", "link": "http://arxiv.org/abs/2603.01822v1", "date": "2026-03-02", "relevancy": 2.2408, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5694}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5694}, {"title": {"title": "TCG CREST System Description for the DISPLACE-M Challenge", "author": "Nikhil Raghav and Md Sahidullah", "abstract": "This report presents the TCG CREST system description for Track 1 (Speaker Diarization) of the DISPLACE-M challenge, focusing on naturalistic medical conversations in noisy rural-healthcare scenarios. Our study evaluates the impact of various voice activity detection (VAD) methods and advanced clustering algorithms on overall speaker diarization (SD) performance. We compare and analyze two SD frameworks: a modular pipeline utilizing SpeechBrain with ECAPA-TDNN embeddings, and a state-of-the-art (SOTA) hybrid end-to-end neural diarization system, Diarizen, built on top of a pre-trained WavLM. With these frameworks, we explore diverse clustering techniques, including agglomerative hierarchical clustering (AHC), and multiple novel variants of spectral clustering, such as SC-adapt, SC-PNA, and SC-MK. Experimental results demonstrate that the Diarizen system provides an approximate $39\\%$ relative improvement in the diarization error rate (DER) on the post-evaluation analysis of Phase~I compared to the SpeechBrain baseline. Our best-performing submitted system employing the Diarizen baseline with AHC employing a median filtering with a larger context window of $29$ achieved a DER of 10.37\\% on the development and 9.21\\% on the evaluation sets, respectively. Our team ranked sixth out of the 11 participating teams after the Phase~I evaluation.", "link": "http://arxiv.org/abs/2603.02030v1", "date": "2026-03-02", "relevancy": 2.2401, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4505}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4505}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link" {"title": "SportR: A Benchmark for Multimodal Large Language Model Reasoning in Sports", "author": "Haotian Xia and Haonan Ge and Junbo Zou and Hyun Woo Choi and Xuebin Zhang and Danny Suradja and Botao Rui and Ethan Tran and Wendy Jin and Zhen Ye and Xiyang Lin and Christopher Lai and Shengjie Zhang and Junwen Miao and Shichao Chen and Rhys Tracy and Vicente Ordonez and Weining Shen and Hanjie Chen", "abstract": "Deeply understanding sports requires an intricate blend of fine-grained visual perception and rule-based reasoning - a challenge that pushes the limits of current multimodal models. To succeed, models must master three critical capabilities: perceiving nuanced visual details, applying abstract sport rule knowledge, and grounding that knowledge in specific visual evidence. Current sports benchmarks either cover single sports or lack the detailed reasoning chains and precise visual grounding needed to robustly evaluate these core capabilities in a multi-sport context. To address this gap, we introduce SportR, the first multi-sports large-scale benchmark designed to train and evaluate MLLMs on the fundamental reasoning required for sports intelligence. Our benchmark provides a dataset of 4,789 images and 2,052 videos. To enable granular evaluation, we structure our benchmark around a progressive hierarchy of question-answer pairs designed to probe reasoning at increasing depths - from simple infraction identification to complex penalty prediction. For the most advanced tasks requiring multi-step reasoning, such as determining penalties or explaining tactics, we provide 6,841 high-quality, human-authored Chain of Thought annotations. In addition, our benchmark incorporates both image and video modalities and provides manual bounding box annotations to test visual grounding in the image part directly. Extensive experiments demonstrate the profound difficulty of our benchmark. State-of-the-art baseline models perform poorly on our most challenging tasks. While training on our data via Supervised Fine-Tuning and Reinforcement Learning improves these scores, they remain relatively low, highlighting a significant gap in current model capabilities. SportR presents a new challenge for the community, providing a critical resource to drive future research in multimodal sports reasoning.", "link": "http://arxiv.org/abs/2511.06499v3", "date": "2026-03-02", "relevancy": 2.2384, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5627}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5627}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SportR%3A%20A%20Benchmark%20for%20Multimodal%20Large%20Language%20Model%20Reasoning%20in%20Sports&body=Title%3A%20SportR%3A%20A%20Benchmark%20for%20Multimodal%20Large%20Language%20Model%20Reasoning%20in%20Sports%0AAuthor%3A%20Haotian%20Xia%20and%20Haonan%20Ge%20and%20Junbo%20Zou%20and%20Hyun%20Woo%20Choi%20and%20Xuebin%20Zhang%20and%20Danny%20Suradja%20and%20Botao%20Rui%20and%20Ethan%20Tran%20and%20Wendy%20Jin%20and%20Zhen%20Ye%20and%20Xiyang%20Lin%20and%20Christopher%20Lai%20and%20Shengjie%20Zhang%20and%20Junwen%20Miao%20and%20Shichao%20Chen%20and%20Rhys%20Tracy%20and%20Vicente%20Ordonez%20and%20Weining%20Shen%20and%20Hanjie%20Chen%0AAbstract%3A%20Deeply%20understanding%20sports%20requires%20an%20intricate%20blend%20of%20fine-grained%20visual%20perception%20and%20rule-based%20reasoning%20-%20a%20challenge%20that%20pushes%20the%20limits%20of%20current%20multimodal%20models.%20To%20succeed%2C%20models%20must%20master%20three%20critical%20capabilities%3A%20perceiving%20nuanced%20 {"title": "TRAKNN: Efficient Trajectory Aware Spatiotemporal kNN for Rare Meteorological Trajectory Detection", "author": "Guillaume Coulaud and Davide Faranda", "abstract": "Extreme weather events, such as windstorms and heatwaves, are driven by persistent atmospheric circulation patterns that evolve over several consecutive days. While traditional circulation-based studies often focus on instantaneous atmospheric states, capturing the temporal evolution, or trajectory, of these spatial fields is essential for characterizing rare and potentially impactful atmospheric behavior. However, performing an exhaustive similarity search on multi-decadal, continental-scale gridded datasets presents significant computational and memory challenges. In this paper, we propose TRAKNN (TRajectory Aware KNN), a fully unsupervised and data-agnostic framework for detecting geometrically rare short trajectories in spatio-temporal data with an exact kNN approach. TRAKNN leverages a recurrence-based algorithm that decouples computational complexity from trajectory length and efficient batch operations, maximizing computational intensity. These optimizations enable exhaustive analysis on standard workstations, either on CPU or on GPU. We evaluate our approach on 75 years of daily European sea-level pressure data. Our results illustrate that rare trajectories identified by TRAKNN correspond to physically coherent atmospheric anomalies and align with independent extreme-event databases.", "link": "http://arxiv.org/abs/2603.02059v1", "date": "2026-03-02", "relevancy": 2.2354, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4565}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4479}, {"title": "RTG-SLAM: Real-time 3D Reconstruction a

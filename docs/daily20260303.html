{"title": "Detection-Gated Glottal Segmentation with Zero-Shot Cross-Dataset Transfer and Clinical Feature Extraction", "author": "Harikrishnan Unnikrishnan", "abstract": "Background: Accurate glottal segmentation in high-speed videoendoscopy (HSV) is essential for extracting kinematic biomarkers of laryngeal function. However, existing deep learning models often produce spurious artifacts in non-glottal frames and fail to generalize across different clinical settings.\n  Methods: We propose a detection-gated pipeline that integrates a YOLOv8-based detector with a U-Net segmenter. A temporal consistency wrapper ensures robustness by suppressing false positives during glottal closure and instrument occlusion. The model was trained on a limited subset of the GIRAFE dataset (600 frames) and evaluated via zero-shot transfer on the large-scale BAGLS dataset.\n  Results: The pipeline achieved state-of-the-art performance on the GIRAFE benchmark (DSC 0.81) and demonstrated superior generalizability on BAGLS (DSC 0.85, in-distribution) without institutional fine-tuning. Downstream validation on a 65-subject clinical cohort confirmed that automated kinematic features (Open Quotient, coefficient of variation) remained consistent with established clinical benchmarks. The coefficient of variation (CV) of the glottal area was found to be a significant marker for distinguishing healthy from pathological vocal function (p=0.006).\n  Conclusions: The detection-gated architecture provides a lightweight, computationally efficient solution (~35 frames/s) for real-time clinical use. By enabling robust zero-shot transfer, this framework facilitates the standardized, large-scale extraction of clinical biomarkers across diverse endoscopy platforms. Code, trained weights, and evaluation scripts are released at https://github.com/hari-krishnan/openglottal.", "link": "http://arxiv.org/abs/2603.02087v1", "date": "2026-03-02", "relevancy": 2.522, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5082}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5029}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5021}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Detection-Gated%20Glottal%20Segmentation%20with%20Zero-Shot%20Cross-Dataset%20Transfer%20and%20Clinical%20Feature%20Extraction&body=Title%3A%20Detection-Gated%20Glottal%20Segmentation%20with%20Zero-Shot%20Cross-Dataset%20Transfer%20and%20Clinical%20Feature%20Extraction%0AAuthor%3A%20Harikrishnan%20Unnikrishnan%0AAbstract%3A%20Background%3A%20Accurate%20glottal%20segmentation%20in%20high-speed%20videoendoscopy%20%28HSV%29%20is%20essential%20for%20extracting%20kinematic%20biomarkers%20of%20laryngeal%20function.%20However%2C%20existing%20deep%20learning%20models%20often%20produce%20spurious%20artifacts%20in%20non-glottal%20frames%20and%20fail%20to%20generalize%20across%20different%20clinical%20settings.%0A%20%20Methods%3A%20We%20propose%20a%20detection-gated%20pipeline%20that%20integrates%20a%20YOLOv8-based%20detector%20with%20a%20U-Net%20segmenter.%20A%20temporal%20consistency%20wrapper%20ensures%20robustness%20by%20suppressing%20false%20positives%20during%20glottal%20closure%20and%20instrument%20occlusion.%20The%20model%20was%20trained%20on%20a%20limited%20subset%20of%20the%20GIRAFE%20dataset%20%28600%20frames%29%20and%20evaluated%20via%20zero-shot%20transfer%20on%20the%20large-scale%20BAGLS%20dataset.%0A%20%20Results%3A%20The%20pipeline%20achieved%20state-of-the-art%20performance%20on%20the%20GIRAFE%20benchmark%20%28DSC%200.81%29%20and%20demonstrated%20superior%20generalizability%20on%20BAGLS%20%28DSC%200.85%2C%20in-distribution%29%20without%20institutional%20fine-tuning.%20Downstream%20validation%20on%20a%2065-subject%20clinical%20cohort%20confirmed%20that%20automated%20kinematic%20features%20%28Open%20Quotient%2C%20coefficient%20of%20variation%29%20remained%20consistent%20with%20established%20clinical%20benchmarks.%20The%20coefficient%20of%20variation%20%28CV%29%20of%20the%20glottal%20area%20was%20found%20to%20be%20a%20significant%20marker%20for%20distinguishing%20healthy%20from%20pathological%20vocal%20function%20%28p%3D0.006%29.%0A%20%20Conclusions%3A%20The%20detection-gated%20architecture%20provides%20a%20lightweight%2C%20computationally%20efficient%20solution%20%28~35%20frames/s%29%20for%20real-time%20clinical%20use.%20By%20enabling%20robust%20zero-shot%20transfer%2C%20this%20framework%20facilitates%20the%20standardized%2C%20large-scale%20extraction%20of%20clinical%20biomarkers%20across%20diverse%20endoscopy%20platforms.%20Code%2C%20trained%20weights%2C%20and%20evaluation%20scripts%20are%20released%20at%20https%3A//github.com/hari-krishnan/openglottal.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02087v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDetection-Gated%2520Glottal%2520Segmentation%2520with%2520Zero-Shot%2520Cross-Dataset%2520Transfer%2520and%2520Clinical%2520Feature%2520Extraction%26entry.906535625%3DHarikrishnan%2520Unnikrishnan%26entry.1292438233%3DBackground%253A%2520Accurate%2520glottal%2520segmentation%2520in%2520high-speed%2520videoendoscopy%2520%2528HSV%2529%2520is%2520essential%2520for%2520extracting%2520kinematic%2520biomarkers%2520of%2520laryngeal%2520function.%2520However%252C%2520existing%2520deep%2520learning%2520models%2520often%2520produce%2520spurious%2520artifacts%2520in%2520non-glottal%2520frames%2520and%2520fail%2520to%2520generalize%2520across%2520different%2520clinical%2520settings.%250A%2520%2520Methods%253A%2520We%2520propose%2520a%2520detection-gated%25 {"title": "Leveraging Model Soups to Classify Intangible Cultural Heritage Images from the Mekong Delta", "author": "Quoc-Khang Tran and Minh-Thien Nguyen and Nguyen-Khang Pham", "abstract": "The classification of Intangible Cultural Heritage (ICH) images in the Mekong Delta poses unique challenges due to limited annotated data, high visual similarity among classes, and domain heterogeneity. In such low-resource settings, conventional deep learning models often suffer from high variance or overfit to spurious correlations, leading to poor generalization. To address these limitations, we propose a robust framework that integrates the hybrid CoAtNet architecture with model soups, a lightweight weight-space ensembling technique that averages checkpoints from a single training trajectory without increasing inference cost. CoAtNet captures both local and global patterns through stage-wise fusion of convolution and self-attention. We apply two ensembling strategies - greedy and uniform soup - to selectively combine diverse checkpoints into a final model. Beyond performance improvements, we analyze the ensembling effect through the lens of bias-variance decomposition. Our findings show that model soups reduces variance by stabilizing predictions across diverse model snapshots, while introducing minimal additional bias. Furthermore, using cross-entropy-based distance metrics and Multidimensional Scaling (MDS), we show that model soups selects geometrically diverse checkpoints, unlike Soft Voting, which blends redundant models centered in output space. Evaluated on the ICH-17 dataset (7,406 images across 17 classes), our approach achieves state-of-the-art results with 72.36% top-1 accuracy and 69.28% macro F1-score, outperforming strong baselines including ResNet-50, DenseNet-121, and ViT. These results underscore that diversity-aware checkpoint averaging provides a principled and efficient way to reduce variance and enhance generalization in culturally rich, data-scarce classification tasks.", "link": "http://arxiv.org/abs/2603.02181v1", "date": "2026-03-02", "relevancy": 2.5218, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5102}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5096}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4933}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20Model%20Soups%20to%20Classify%20Intangible%20Cultural%20Heritage%20Images%20from%20the%20Mekong%20Delta&body=Title%3A%20Leveraging%20Model%20Soups%20to%20Classify%20Intangible%20Cultural%20Heritage%20Images%20from%20the%20Mekong%20Delta%0AAuthor%3A%20Quoc-Khang%20Tran%20and%20Minh-Thien%20Nguyen%20and%20Nguyen-Khang%20Pham%0AAbstract%3A%20The%20classification%20of%20Intangible%20Cultural%20Heritage%20%28ICH%29%20images%20in%20the%20Mekong%20Delta%20poses%20unique%20challenges%20due%20to%20limited%20annotated%20data%2C%20high%20visual%20similarity%20among%20classes%2C%20and%20domain%20heterogeneity.%20In%20such%20low-resource%20settings%2C%20conventional%20deep%20learning%20models%20often%20suffer%20from%20high%20variance%20or%20overfit%20to%20spurious%20correlations%2C%20leading%20to%20poor%20generalization.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20robust%20framework%20that%20integrates%20the%20hybrid%20CoAtNet%20architecture%20with%20model%20soups%2C%20a%20lightweight%20weight-space%20ensembling%20technique%20that%20averages%20checkpoints%20from%20a%20single%20training%20trajectory%20without%20increasing%20inference%20cost.%20CoAtNet%20captures%20both%20local%20and%20global%20patterns%20through%20stage-wise%20fusion%20of%20convolution%20and%20self-attention.%20We% {"title": "LVTINO: LAtent Video consisTency INverse sOlver for High Definition Video Restoration", "author": "Alessio Spagnoletti and Andr\u00e9s Almansa and Marcelo Pereyra", "abstract": "Computational imaging methods increasingly rely on powerful generative diffusion models to tackle challenging image restoration tasks. In particular, state-of-the-art zero-shot image inverse solvers leverage distilled text-to-image latent diffusion models (LDMs) to achieve unprecedented accuracy and perceptual quality with high computational efficiency. However, extending these advances to high-definition video restoration remains a significant challenge, due to the need to recover fine spatial detail while capturing subtle temporal dependencies. Consequently, methods that naively apply image-based LDM priors on a frame-by-frame basis often result in temporally inconsistent reconstructions. We address this challenge by leveraging recent advances in Video Consistency Models (VCMs), which distill video latent diffusion models into fast generators that explicitly capture temporal causality. Building on this foundation, we propose LVTINO, the first zero-shot or plug-and-play inverse solver for high definition video restoration with priors encoded by VCMs. Our conditioning mechanism bypasses the need for automatic differentiation and achieves state-of-the-art video reconstruction quality with only a few neural function evaluations, while ensuring strong measurement consistency and smooth temporal transitions across frames. Extensive experiments on a diverse set of video inverse problems show significant perceptual improvements over current state-of-the-art methods that apply image LDMs frame by frame, establishing a new benchmark in both reconstruction fidelity and computational efficiency. The code is available on GitHub.", "link": "http://arxiv.org/abs/2510.01339v2", "date": "2026-03-02", "relevancy": 2.521, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6447}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6226}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6133}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LVTINO%3A%20LAtent%20Video%20consisTency%20INverse%20sOlver%20for%20High%20Definition%20Video%20Restoration&body=Title%3A%20LVTINO%3A%20LAtent%20Video%20consisTency%20INverse%20sOlver%20for%20High%20Definition%20Video%20Restoration%0AAuthor%3A%20Alessio%20Spagnoletti%20and%20Andr%C3%A9s%20Almansa%20and%20Marcelo%20Pereyra%0AAbstract%3A%20Computational%20imaging%20methods%20increasingly%20rely%20on%20powerful%20generative%20diffusion%20models%20to%20tackle%20challenging%20image%20restoration%20tasks.%20In%20particular%2C%20state-of-the-art%20zero-shot%20image%20inverse%20solvers%20leverage%20distilled%20text-to-image%20latent%20diffusion%20models%20%28LDMs%29%20to%20achieve%20unprecedented%20accuracy%20and%20perceptual%20quality%20with%20high%20computational%20efficiency.%20However%2C%20extending%20these%20advances%20to%20high-definition%20video%20restoration%20remains%20a%20significant%20challenge%2C%20due%20to%20the%20need%20to%20recover%20fine%20spatial%20detail%20while%20capturing%20subtle%20temporal%20dependencies.%20Consequently%2C%20methods%20that%20naively%20apply%20image-based%20LDM%20priors%20on%20a%20frame-by-frame%20basis%20often%20result%20in%20temporally%20inconsistent%20reconstructions.%20We%20address%20this%20challenge%20by%20leveraging%20recent%20advances%20in%20Video%20Consistency%20Models%20%28VCMs%29%2C%20which%20distill%20video%20latent%20diffusion%20models%20into%20fast%20generators%20that%20explicitly%20capture%20temporal%20causality.%20Building%20on%20this%20foundation%2C%20we%20propose%20LVTINO%2C%20t {"title": "BiMotion: B-spline Motion for Text-guided Dynamic 3D Character Generation", "author": "Miaowei Wang and Qingxuan Yan and Zhi Cao and Yayuan Li and Oisin Mac Aodha and Jason J. Corso and Amir Vaxman", "abstract": "Text-guided dynamic 3D character generation has advanced rapidly, yet producing high-quality motion that faithfully reflects rich textual descriptions remains challenging. Existing methods tend to generate limited sub-actions or incoherent motion due to fixed-length temporal inputs and discrete frame-wise representations that fail to capture rich motion semantics. We address these limitations by representing motion with continuous differentiable B-spline curves, enabling more effective motion generation without modifying the capabilities of the underlying generative model. Specifically, our closed-form, Laplacian-regularized B-spline solver efficiently compresses variable-length motion sequences into compact representations with a fixed number of control points. Further, we introduce a normal-fusion strategy for input shape adherence along with correspondence-aware and local-rigidity losses for motion-restoration quality. To train our model, we collate BIMO, a new dataset containing diverse variable-length 3D motion sequences with rich, high-quality text annotations. Extensive evaluations show that our feed-forward framework BiMotion generates more expressive, higher-quality, and better prompt-aligned motions than existing state-of-the-art methods, while also achieving faster generation. Our project page is at: https://wangmiaowei.github.io/BiMotion.github.io/.", "link": "http://arxiv.org/abs/2602.18873v2", "date": "2026-03-02", "relevancy": 2.518, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6962}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5947}, {"t {"title": "Modular Memory is the Key to Continual Learning Agents", "author": "Vaggelis Dorovatas and Malte Schwerin and Andrew D. Bagdanov and Lucas Caccia and Antonio Carta and Laurent Charlin and Barbara Hammer and Tyler L. Hayes and Timm Hess and Christopher Kanan and Dhireesha Kudithipudi and Xialei Liu and Vincenzo Lomonaco and Jorge Mendez-Mendez and Darshan Patil and Ameya Prabhu and Elisa Ricci and Tinne Tuytelaars and Gido M. van de Ven and Liyuan Wang and Joost van de Weijer and Jonghyun Choi and Martin Mundt and Rahaf Aljundi", "abstract": "Foundation models have transformed machine learning through large-scale pretraining and increased test-time compute. Despite surpassing human performance in several domains, these models remain fundamentally limited in continuous operation, experience accumulation, and personalization, capabilities that are central to adaptive intelligence. While continual learning research has long targeted these goals, its historical focus on in-weight learning (IWL), i.e., updating a single model's parameters to absorb new knowledge, has rendered catastrophic forgetting a persistent challenge. Our position is that combining the strengths of In-Weight Learning (IWL) and the newly emerged capabilities of In-Context Learning (ICL) through the design of modular memory is the missing piece for continual adaptation at scale. We outline a conceptual framework for modular memory-centric architectures that leverage ICL for rapid adaptation and knowledge accumulation, and IWL for stable updates to model capabilities, charting a practical roadmap toward continually learning agents.", "link": "http://arxiv.org/abs/2603.01761v1", "date": "2026-03-02", "relevancy": 2.4997, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5153}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", " {"title": "BAED: a New Paradigm for Few-shot Graph Learning with Explanation in the Loop", "author": "Chao Chen and Xujia Li and Dongsheng Hong and Shanshan Lin and Xiangwen Liao and Chuanyi Liu and Lei Chen", "abstract": "The challenges of training and inference in few-shot environments persist in the area of graph representation learning. The quality and quantity of labels are often insufficient due to the extensive expert knowledge required to annotate graph data. In this context, Few-Shot Graph Learning (FSGL) approaches have been developed over the years. Through sophisticated neural architectures and customized training pipelines, these approaches enhance model adaptability to new label distributions. However, compromises in \\textcolor{black}{the model's} robustness and interpretability can result in overfitting to noise in labeled data and degraded performance. This paper introduces the first explanation-in-the-loop framework for the FSGL problem, called BAED. We novelly employ the belief propagation algorithm to facilitate label augmentation on graphs. Then, leveraging an auxiliary graph neural network and the gradient backpropagation method, our framework effectively extracts explanatory subgraphs surrounding target nodes. The final predictions are based on these informative subgraphs while mitigating the influence of redundant information from neighboring nodes. Extensive experiments on seven benchmark datasets demonstrate superior prediction accuracy, training efficiency, and explanation quality of BAED. As a pioneer, this work highlights the potential of the explanation-based research paradigm in FSGL.", "link": "http://arxiv.org/abs/2603.01941v1", "date": "2026-03-02", "relevancy": 2.4931, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5065}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4973}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4921}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BAED%3A%20a%20New%20Paradigm%20for%20Few-shot%20Graph%20Learning%20with%20Explanation%20in%20the%20Loop&body=Title%3A%20BAED%3A%20a%20New%20Paradigm%20for%20Few-shot%20Graph%20Learning%20with%20Explanation%20in%20the%20Loop%0AAuthor%3A%20Chao%20Chen%20and%20Xujia%20Li%20and%20Dongsheng%20Hong%20and%20Shanshan%20Lin%20and%20Xiangwen%20Liao%20and%20Chuanyi%20Liu%20and%20Lei%20Chen%0AAbstract%3A%20The%20challenges%20of%20training%20and%20inference%20in%20few-shot%20environments%20persist%20in%20the%20area%20of%20graph%20representation%20learning.%20The%20quality%20and%20quantity%20of%20labels%20are%20often%20insufficient%20due%20to%20the%20extensive%20expert%20knowledge%20required%20to%20annotate%20graph%20data.%20In%20this%20context%2C%20Few-Shot%20Graph%20Learning%20%28FSGL%29%20approaches%20have%20been%20developed%20over%20the%20years.%20Through%20sophisticated%20neural%20architectures%20and%20customized%20training%20pipelines%2C%20these%20approaches%20enhance%20model%20adaptability%20to%20new%20label%20distributions.%20However%2C%20compromises%20in%20%5Ctextcolor%7Bblack%7D%7Bthe%20model%27s%7D%20robustness%20and%20interpretability%20can%20result%20in%20overfitting%20to%20noise%20in%20labeled%20data%20and%20degraded%20performance.%20This%20paper%20introduces%20the%20first%20explanation-in-the-loop%20framework%20for%20the%20FSGL%20problem%2C%20called%20BAED.%20We%20novelly%20employ%20the%20belief%20propagation%20algorithm%20to%20facilitate%20label%20augmentation%20on%20graphs.%20Then%2C%20leveraging%20an%20auxiliary%20graph%20neural%20network%20and%20the%20gradient%20backpropagation%20method%2C%20our%20framework%20effectively%20extracts%20explanatory%20subgraphs%20surrounding%20target%20nodes %20extensive%20expert%20knowledge%20required%20to%20annotate%20graph%20data.%20In%20this%20context%2C%20Few-Shot%20Graph%20Learning%20%28FSGL%29%20approaches%20have%20been%20developed%20over%20the%20years.%20Through%20sophisticated%20neural%20architectures%20and%20customized%20training%20pipelines%2C%20these%20approaches%20enhance%20model%20adaptability%20to%20new%20label%20distributions.%20However%2C%20compromises%20in%20%5Ctextcolor%7Bblack%7D%7Bthe%20model%27s%7D%20robustness%20and%20interpretability%20can%20result%20in%20overfitting%20to%20noise%20in%20labeled%20data%20and%20degraded%20performance.%20This%20paper%20introduces%20the%20first%20explanation-in-the-loop%20framework%20for%20the%20FSGL%20problem%2C%20called%20BAED.%20We%20novelly%20employ%20the%20belief%20propagation%20algorithm%20to%20facilitate%20label%20augmentation%20on%20graphs.%20Then%2C%20leveraging%20an%20auxiliary%20graph%20neural%20network%20and%20the%20gradient%20backpropagation%20method%2C%20our%20framework%20effectively%20extracts%20explanatory%20subgraphs%20surrounding%20target%20nodes.%20The%20final%20predictions%20are%20based%20on%20these%20informative%20subgraphs%20while%20mitigating%20the%20influence%20of%20redundant%20information%20from%20neighboring%20nodes.%20Extensive%20experiments%20on%20seven%20benchmark%20datasets%20demonstrate%20superior%20prediction%20accuracy%2C%20training%20efficiency%2C%20and%20explanation%20quality%20of%20BAED.%20As%20a%20pioneer%2C%20this%20work%20highlights%20the%20potential%20of%20the%20explanation-based%20research%20paradigm%20in%20FSGL.&entry.1838667208=http%3A//arxiv.org/abs/2603.01941v1&entry.124074799=Read"},
{"title": "Learning Vision-Based Omnidirectional Navigation: A Teacher-Student Approach Using Monocular Depth Estimation", "author": "Jan Finke and Wayne Paul Martis and Adrian Schmelter and Lars Erbach and Christian Jestel and Marvin Wiedemann", "abstract": "Reliable obstacle avoidance in industrial settings demands 3D scene understanding, but widely used 2D LiDAR sensors perceive only a single horizontal slice of the environment, missing critical obstacles above or below the scan plane. We present a teacher-student framework for vision-based mobile robot navigation that eliminates the need for LiDAR sensors. A teacher policy trained via Proximal Policy Optimization (PPO) in NVIDIA Isaac Lab leverages privileged 2D LiDAR observations that account for the full robot footprint to learn robust navigation. The learned behavior is distilled into a student policy that relies solely on monocular depth maps predicted by a fine-tuned Depth Anything V2 model from four RGB cameras. The complete inference pipeline, comprising monocular depth estimation (MDE), policy execution, and motor control, runs entirely onboard an NVIDIA Jetson Orin AGX mounted on a DJI RoboMaster platform, requiring no external computation for inference. In simulation, the student achieves success rates of 82-96.5%, consistently outperforming the standard 2D LiDAR teacher (50-89%). In real-world experiments, the MDE-based student outperforms the 2D LiDAR teacher when navigating around obstacles with complex 3D geometries, such as overhanging structures and low-profile objects, that fall outside the single scan plane of a 2D LiDAR.", "link": "http://arxiv.org/abs/2603.01999v1", "date": "2026-03-02", "relevancy": 2.4905, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6573}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.615}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.591}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Vision-Based%20Omnidirectional%20Navigation%3A%20A%20Teacher-Student%20Approach%20Using%20Monocular%20Depth%20Estimation&body=Title%3A%20Learning%20Vision-Based%20Omnidirectional%20Navigation%3A%20A%20Teacher-Student%20Approach%20Using%20Monocular%20Depth%20Estimation%0AAuthor%3A%20Jan%20Finke%20and%20Wayne%20Paul%20Martis%20and%20Adrian%20Schmelter%20and%20Lars%20Erbach%20and%20Christian%20Jestel%20and%20Marvin%20Wiedemann%0AAbstract%3A%20Reliable%20obstacle%20avoidance%20in%20industrial%20settings%20demands%203D%20scene%20understanding%2C%20but%20widely%20used%202D%20LiDAR%20sensors%20perceive%20only%20a%20single%20horizontal%20slice%20of%20the%20environment%2C%20missing%20critical%20obstacles%20above%20or%20below%20the%20scan%20plane.%20We%20present%20a%20teacher-student%20framework%20for%20vision-based%20mobile%20robot%20navigation%20that%20eliminates%20the%20need%20for%20LiDAR%20sensors.%20A%20teacher%20policy%20trained%20via%20Proximal%20Policy%20Optimization%20%28PPO%29%20in%20NVIDIA%20Isaac%20Lab%20leverages%20privileged%202D%20LiDAR%20observations%20that%20account%20for%20the%20full%20robot%20footprint%20to%20learn%20robust%20navigation.%20The%20learned%20behavior%20is%20distilled%20into%20a%20student%20policy%20that%20relies%20solely%20on%20monocular%20depth%20maps%20predicted%20by%20a%20fine-tuned%20Depth%20Anything%20V2%20model%20from%20four%20RGB%20cameras.%20The%20complete%20inference%20pipeline%2C%20comprising%20monocular%20depth%20estimation%20%28MDE%29%2C%20policy%20execution%2C%20and%20motor%20control%2C%20runs%20entirely%20onboard%20an%20NVIDIA%20Jetson%20Orin%20AGX%20mounted%20on%20a%20DJI%20RoboMaster%20platform%2C%2 {"title": "Sketch2Colab: Sketch-Conditioned Multi-Human Animation via Controllable Flow Distillation", "author": "Divyanshu Daiya and Aniket Bera", "abstract": "We present Sketch2Colab, which turns storyboard-style 2D sketches into coherent, object-aware 3D multi-human motion with fine-grained control over agents, joints, timing, and contacts. Conventional diffusion-based motion generators have advanced realism; however, achieving precise adherence to rich interaction constraints typically demands extensive training and/or costly posterior guidance, and performance can degrade under strong multi-entity conditioning. Sketch2Colab instead first learns a sketch-driven diffusion prior and then distills it into an efficient rectified-flow student operating in latent space for fast, stable sampling. Differentiable energies over keyframes, trajectories, and physics-based constraints directly shape the student's transport field, steering samples toward motions that faithfully satisfy the storyboard while remaining physically plausible. To capture coordinated interaction, we augment the continuous flow with a continuous-time Markov chain (CTMC) planner that schedules discrete events such as touches, grasps, and handoffs, modulating the dynamics to produce crisp, well-phased human-object-human collaborations. Experiments on CORE4D and InterHuman show that Sketch2Colab achieves state-of-the-art constraint adherence and perceptual quality while offering significantly faster inference than diffusion-only baselines.", "link": "http://arxiv.org/abs/2603.02190v1", "date": "2026-03-02", "relevancy": 2.4856, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6945}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5698}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5676}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sketch2Colab%3A%20Sketch-Conditioned%20Multi-Human%20Animation%20via%20Controllable%20Flow%20Distillation&body=Title%3A%20Sketch2Colab%3A%20Sketch-Conditioned%20Multi-Human%20Animation%20via%20Controllable%20Flow%20Distillation%0AAuthor%3A%20Divyanshu%20Daiya%20and%20Aniket%20Bera%0AAbstract%3A%20We%20present%20Sketch2Colab%2C%20which%20turns%20storyboard-style%202D%20sketches%20into%20coherent%2C%20object-aware%203D%20multi-human%20motion%20with%20fine-grained%20control%20over%20agents%2C%20joints%2C%20timing%2C%20and%20contacts.%20Conventional%20diffusion-based%20motion%20generators%20have%20advanced%20realism%3B%20however%2C%20achieving%20precise%20adherence%20to%20rich%20interaction%20constraints%20typically%20demands%20extensive%20training%20and/or%20costly%20posterior%20guidance%2C%20and%20performance%20can%20degrade%20under%20strong%20multi-entity%20conditioning.%20Sketch2Colab%20instead%20first%20learns%20a%20sketch-driven%20diffusion%20prior%20and%20then%20distills%20it%20into%20an%20efficient%20rectified-flow%20student%20operating%20in%20latent%20space%20for%20fast%2C%20stable%20sampling.%20Differentiable%20energies%20over%20keyframes%2C%20trajectories%2C%20and%20physics-based%20constraints%20directly%20shape%20the%20student%27s%20transport%20field%2C%20steering%20samples%20toward%20motions%20that%20faithfully%20satisfy%20the%20storyboard%20while%20remaining%20physically%20plausible.%20To%20capture%20coordinated%20interaction%2C%20we%20augment%20the%20continuous%20flow%20with%20a%20continuous-time%20Markov%20chain%20%28CTMC%29%20planner%20that%20schedules%20discrete%20events%20such%20as%20touches%2C%20grasps%2C%20and%20handoffs%2C%20modulating%20the%20dynamics%20to%20produce%20crisp%2C%20well-phased%20human-object-human%20collaborations.%20Experiments%20on%20CORE4D%20and%20InterHuman%20show%20that%20Sketch2Colab%20achieves%20st {"title": "Using ChatGPT for Data Science Analyses", "author": "Ozan Evkaya and Miguel de Carvalho", "abstract": "As a result of recent advancements in generative AI, the field of data science is prone to various changes. The way practitioners construct their data science workflows is now irreversibly shaped by recent advancements, particularly by tools like OpenAI's Data Analysis plugin. While it offers powerful support as a quantitative co-pilot, its limitations demand careful consideration in empirical analysis. This paper assesses the potential of ChatGPT for data science analyses, illustrating its capabilities for data exploration and visualization, as well as for commonly used supervised and unsupervised modeling tasks. While we focus here on how the Data Analysis plugin can serve as co-pilot for Data Science workflows, its broader potential for automation is implicit throughout.", "link": "http://arxiv.org/abs/2404.08480v2", "date": "2026-03-02", "relevancy": 2.4685, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4955}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4937}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4919}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Using%20ChatGPT%20for%20Data%20Science%20Analyses&body=Title%3A%20Using%20ChatGPT%20for%20Data%20Science%20Analyses%0AAuthor%3A%20Ozan%20Evkaya%20and%20Miguel%20de%20Carvalho%0AAbstract%3A%20As%20a%20result%20of%20recent%20advancements%20in%20generative%20AI%2C%20the%20field%20of%20data%20science%20is%20prone%20to%20various%20changes.%20The%20way%20practitioners%20construct%20their%20data%20science%20workflows%20is%20now%20irreversibly%20shaped%20by%20recent%20advancements%2C%20pa {"title": "Look Back to Reason Forward: Revisitable Memory for Long-Context LLM Agents", "author": "Yaorui Shi and Yuxin Chen and Siyuan Wang and Sihang Li and Hengxing Cai and Qi Gu and Xiang Wang and An Zhang", "abstract": "Large language models face challenges in long-context question answering, where key evidence of a query may be dispersed across millions of tokens. Existing works equip large language models with a memory buffer that is dynamically updated via a linear document scan, also known as the \"memorize while reading\" methods. While this approach scales efficiently, it suffers from pruning of latent evidence, information loss through overwriting, and sparse reinforcement learning signals. To tackle these challenges, we present ReMemR1, which integrates the mechanism of memory retrieval into the memory update process, enabling the agent to selectively callback historical memories for non-linear reasoning. To further strengthen training, we propose a multi-level reward design, which combines final-answer rewards with dense, step-level signals that guide effective memory use. Together, these contributions mitigate information degradation, improve supervision, and support complex multi-hop reasoning. Extensive experiments demonstrate that ReMemR1 significantly outperforms state-of-the-art baselines on long-context question answering while incurring negligible computational overhead, validating its ability to trade marginal cost for robust long-context reasoning.", "link": "http://arxiv.org/abs/2509.23040v5", "date": "2026-03-02", "relevancy": 2.464, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4961}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4961}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", al-answer%2520rewards%2520with%2520dense%252C%2520step-level%2520signals%2520that%2520guide%2520effective%2520memory%2520use.%2520Together%252C%2520these%2520contributions%2520mitigate%2520information%2520degradation%252C%2520improve%2520supervision%252C%2520and%2520support%2520complex%2520multi-hop%2520reasoning.%2520Extensive%2520experiments%2520demonstrate%2520that%2520ReMemR1%2520significantly%2520outperforms%2520state-of-the-art%2520baselines%2520on%2520long-context%2520question%2520answering%2520while%2520incurring%2520negligible%2520computational%2520overhead%252C%2520validating%2520its%2520ability%2520to%2520trade%2520marginal%2520cost%2520for%2520robust%2520long-context%2520reasoning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.23040v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Look%20Back%20to%20Reason%20Forward%3A%20Revisitable%20Memory%20for%20Long-Context%20LLM%20Agents&entry.906535625=Yaorui%20Shi%20and%20Yuxin%20Chen%20and%20Siyuan%20Wang%20and%20Sihang%20Li%20and%20Hengxing%20Cai%20and%20Qi%20Gu%20and%20Xiang%20Wang%20and%20An%20Zhang&entry.1292438233=Large%20language%20models%20face%20challenges%20in%20long-context%20question%20answering%2C%20where%20key%20evidence%20of%20a%20query%20may%20be%20dispersed%20across%20millions%20of%20tokens.%20Existing%20works%20equip%20large%20language%20models%20with%20a%20memory%20buffer%20that%20is%20dynamically%20updated%20via%20a%20linear%20document%20scan%2C%20also%20known%20as%20the%20%22memorize%20while%20reading%22%20methods.%20While%20this%20approach%20scales%20efficiently%2C%20it%20suffers%20from%20pruning%20of%20latent%20evidence%2C%20information%20loss%20through%20overwriting%2C%20and%20sparse%20reinforcement%20learning%20signals.%20To%20tackle%20these%20challenges%2C%20we%20present%20ReMemR1%2C%20which%20integrates%20the%20mechanism%20of%20memory%20retrieval%20into%20the%20memory%20update% {"title": "From Leaderboard to Deployment: Code Quality Challenges in AV Perception Repositories", "author": "Mateus Karvat and Bram Adams and Sidney Givigi", "abstract": "Autonomous vehicle (AV) perception models are typically evaluated solely on benchmark performance metrics, with limited attention to code quality, production readiness and long-term maintainability. This creates a significant gap between research excellence and real-world deployment in safety-critical systems subject to international safety standards. To address this gap, we present the first large-scale empirical study of software quality in AV perception repositories, systematically analyzing 178 unique models from the KITTI and NuScenes 3D Object Detection leaderboards. Using static analysis tools (Pylint, Bandit, and Radon), we evaluated code errors, security vulnerabilities, maintainability, and development practices. Our findings revealed that only 7.3% of the studied repositories meet basic production-readiness criteria, defined as having zero critical errors and no high-severity security vulnerabilities. Security issues are highly concentrated, with the top five issues responsible for almost 80% of occurrences, which prompted us to develop a set of actionable guidelines to prevent them. Additionally, the adoption of Continuous Integration/Continuous Deployment pipelines was correlated with better code maintainability. Our findings highlight that leaderboard performance does not reflect production readiness and that targeted interventions could substantially improve the quality and safety of AV perception code.", "link": "http://arxiv.org/abs/2603.02194v1", "date": "2026-03-02", "relevancy": 2.4614, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5011}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.or able%20guidelines%20to%20prevent%20them.%20Additionally%2C%20the%20adoption%20of%20Continuous%20Integration/Continuous%20Deployment%20pipelines%20was%20correlated%20with%20better%20code%20maintainability.%20Our%20findings%20highlight%20that%20leaderboard%20performance%20does%20not%20reflect%20production%20readiness%20and%20that%20targeted%20interventions%20could%20substantially%20improve%20the%20quality%20and%20safety%20of%20AV%20perception%20code.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02194v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Leaderboard%2520to%2520Deployment%253A%2520Code%2520Quality%2520Challenges%2520in%2520AV%2520Perception%2520Repositories%26entry.906535625%3DMateus%2520Karvat%2520and%2520Bram%2520Adams%2520and%2520Sidney%2520Givigi%26entry.1292438233%3DAutonomous%2520vehicle%2520%2528AV%2529%2520perception%2520models%2520are%2520typically%2520evaluated%2520solely%2520on%2520benchmark%2520performance%2520metrics%252C%2520with%2520limited%2520attention%2520to%2520code%2520quality%252C%2520production%2520readiness%2520and%2520long-term%2520maintainability.%2520This%2520creates%2520a%2520significant%2520gap%2520between%2520research%2520excellence%2520and%2520real-world%2520deployment%2520in%2520safety-critical%2520systems%2520subject%2520to%2520international%2520safety%2520standards.%2520To%2520address%2520this%2520gap%252C%2520we%2520present%2520the%2520first%2520large-scale%2520empirical%2520study%2520of%2520software%2520quality%2520in%2520AV%2520perception%2520repositories%252C%2520systematically%2520analyzing%2520178%2520unique%2520models%2520from%2520the%2520KITTI%2520and%2520NuScenes%25203D%2520Object%2520Detection%2520leaderboards.%2520Using%2520static%2520analysis%2520tools%2520%2528Pylint%252C%2520Bandit%252C%2520and%2520Radon%2529%252C%2520we%2520evaluated%2520code%2520errors%252C%2520security%2520vulnerabilities%252C%2520maintainability%252C% ndards.%20To%20address%20this%20gap%2C%20we%20present%20the%20first%20large-scale%20empirical%20study%20of%20software%20quality%20in%20AV%20perception%20repositories%2C%20systematically%20analyzing%20178%20unique%20models%20from%20the%20KITTI%20and%20NuScenes%203D%20Object%20Detection%20leaderboards.%20Using%20static%20analysis%20tools%20%28Pylint%2C%20Bandit%2C%20and%20Radon%29%2C%20we%20evaluated%20code%20errors%2C%20security%20vulnerabilities%2C%20maintainability%2C%20and%20development%20practices.%20Our%20findings%20revealed%20that%20only%207.3%25%20of%20the%20studied%20repositories%20meet%20basic%20production-readiness%20criteria%2C%20defined%20as%20having%20zero%20critical%20errors%20and%20no%20high-severity%20security%20vulnerabilities.%20Security%20issues%20are%20highly%20concentrated%2C%20with%20the%20top%20five%20issues%20responsible%20for%20almost%2080%25%20of%20occurrences%2C%20which%20prompted%20us%20to%20develop%20a%20set%20of%20actionable%20guidelines%20to%20prevent%20them.%20Additionally%2C%20the%20adoption%20of%20Continuous%20Integration/Continuous%20Deployment%20pipelines%20was%20correlated%20with%20better%20code%20maintainability.%20Our%20findings%20highlight%20that%20leaderboard%20performance%20does%20not%20reflect%20production%20readiness%20and%20that%20targeted%20interventions%20could%20substantially%20improve%20the%20quality%20and%20safety%20of%20AV%20perception%20code.&entry.1838667208=http%3A//arxiv.org/abs/2603.02194v1&entry.124074799=Read"},
{"title": "The GeometricKernels Package: Heat and Mat\u00e9rn Kernels for Geometric Learning on Manifolds, Meshes, and Graphs", "author": "Peter Mostowsky and Vincent Dutordoir and Iskander Azangulov and No\u00e9mie Jaquier and Michael John Hutchinson and Aditya Ravuri and Leonel Rozo and Alexander Terenin and Viacheslav Borovitskiy", "abstract": "Kernels are a fundamental technical primitive in machine learning. In recent years, kernel-based methods such as Gaussian processes are becoming increasingly important in applications where quantifying uncertainty is of key interest. In settings that involve structured data defined on graphs, meshes, manifolds, or other related spaces, defining kernels with good uncertainty-quantification behavior, and computing their value numerically, is less straightforward than in the Euclidean setting. To address this difficulty, we present GeometricKernels, a Python software package which implements the geometric analogs of classical Euclidean squared exponential - also known as heat - and Mat\u00e9rn kernels, which are widely-used in settings where uncertainty is of key interest. As a byproduct, we obtain the ability to compute Fourier-feature-type expansions, which are widely used in their own right, on a wide set of geometric spaces. Our implementation supports automatic differentiation in every major current framework simultaneously via a backend-agnostic design. In this companion paper to the package and its documentation, we outline the capabilities of the package and present an illustrated example of its interface. We also include a brief overview of the theory the package is built upon and provide some historic context in the appendix.", "link": "http://arxiv.org/abs/2407.08086v2", "date": "2026-03-02", "relevancy": 2.453, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5232}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.514}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4346}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20GeometricKernels%20Package%3A%20Heat%20and%20Mat%C3%A9rn%20Kernels%20for%20Geometric%20Learning%20on%20Manifolds%2C%20Meshes%2C%20and%20Graphs&body=Title%3A%20The%20GeometricKernels%20Package%3A%20Heat%20and%20Mat%C3%A9rn%20Kernels%20for%20Geometric%20Learning%20on%20Manifolds%2C%20Meshes%2C%20and%20Graphs%0AAuthor%3A%20Peter%20Mostowsky%20and%20Vincent%20Dutordoir%20and%20Iskander%20Azangulov%20and%20No%C3%A9mie%20Jaquier%20and%20Michael%20John%20Hutchinson%20and%20Aditya%20Ravuri%20and%20Leonel%20Rozo%20and%20Alexander%20Terenin%20and%20Viacheslav%20Borovitskiy%0AAbstract%3A%20Kernels%20are%20a%20fundamental%20technical%20primitive%20in%20machine%20learning.%20In%20recent%20years%2C%20kernel-based%20methods%20such%20as%20Gaussian%20processes%20are%20becoming%20increasingly%20important%20in%20applications%20where%20quantifying%20uncertainty%20is%20of%20key%20interest.%20In%20settings%20that%20involve%20structured%20data%20defined%20on%20graphs%2C%20meshes%2C%20manifolds%2C%20or%20other%20related%20spaces%2C%20defining%20kernels%20with%20good%20uncertainty-quantification%20behavior%2C%20and%20computing%20their%20value%20numerically%2C%20is%20less%20straightforward%20than%20in%20the%20Euclidean%20setting.%20To%20address%20this%20difficulty%2C%20we%20present%20GeometricKernels%2C%20a%20Python%20software%20package%20which%20implements%20the%20geometric%20analogs%20of%20classical%20Euclidean%20squared%20exponential%20-%20also%20known%20as%20heat%20-%20and%20Mat%C3%A9rn%20kernels%2C%20which%20are%20widely-used%20in%20settings%20where%20uncertainty%20is%20of%20key%20interest.%20As%20a%20byproduct%2C%20we%20obtain%20the%20ability%20to%20compute%20Fourier-feature-type%20expansions%2C%20which%20are%20widely%20used%20in%20their%20own%20right%2C%20on%20a%20wide%20set%20of%20geometric%20spaces.%20Our%20implementation%20supports%20automatic%20differentiation%20in%20every%20major%20current%20framework%20simultaneously%20via%20a%20backend-agnostic%20design.%20In%20this%20companion%20paper%20to%20the%20package%20and%20its%20documentation%2C%20we%20outline%20the%20capabilities%20of%20the%20package%20and%20present%20an%20illustrated%20example%20of%20its%20interface.%20We%20also%20include%20a%20brief%20overview%20of%20the%20theory%20the%20package%20is%20built%20upon%20and%20provide%20some%20historic%20context%20in%20the%20appendix.%0ALink%3A%20http%3A//arxiv.org/abs/2407.08086v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520GeometricKernels%2520Package%253A%2520Heat%2520and%2520Mat%25C3%25A9rn%2520Kernels%2520for%2520Geometric%2520Learning%2520on%2520Manifolds%252C%2520Meshes%252C%2520and%2520Graphs%26entry.906535625%3DPeter%2520Mostowsky%2520and%2520Vincent%2520Dutordoir%2520and%2520Iskander%2520Azangulov%2520and%2520No%25C3%25A9mie%2520Jaquier%2520and%2520Michael%2520John%2520Hutchinson%2520and%2520Aditya%2520Ravuri%2520and%2520Leonel%2520Rozo%2520and%2520Alexander%2520Terenin%2520and%2520Viacheslav%2520Borovitskiy%26entry.1292438233%3DKernels%2520are%2520a%2520fundamental%2520technical%2520primitive%2520in%2520machine%2520learning.%2520In%2520recent%2520years%252C%2520kernel-based%2520methods%2520such%2520as%2520Gaussian%2520processes%2520are%2520becoming%2520increasingly%2520important%2520in%2520applications%2520where%2520quantifying%2520uncertainty%2520is%2520of%2520key%2520interest.%2520In%2520settings%2520that%2520involve%2520structured%2520data%2520defined%2520on%2520graphs%252C%2520meshes%252C%2520manifolds%252C%2520or%2520other%2520related%2520spaces%252C%2520defining%2520kernels%2520with%2520good%2520uncert {"title": "Multi-scale hypergraph meets LLMs: Aligning large language models for time series analysis", "author": "Zongjiang Shang and Dongliang Cui and Binqing Wu and Ling Chen", "abstract": "Recently, there has been great success in leveraging pre-trained large language models (LLMs) for time series analysis. The core idea lies in effectively aligning the modality between natural language and time series. However, the multi-scale structures of natural language and time series have not been fully considered, resulting in insufficient utilization of LLMs capabilities. To this end, we propose MSH-LLM, a Multi-Scale Hypergraph method that aligns Large Language Models for time series analysis. Specifically, a hyperedging mechanism is designed to enhance the multi-scale semantic information of time series semantic space. Then, a cross-modality alignment (CMA) module is introduced to align the modality between natural language and time series at different scales. In addition, a mixture of prompts (MoP) mechanism is introduced to provide contextual information and enhance the ability of LLMs to understand the multi-scale temporal patterns of time series. Experimental results on 27 real-world datasets across 5 different applications demonstrate that MSH-LLM achieves the state-of-the-art results.", "link": "http://arxiv.org/abs/2602.04369v2", "date": "2026-03-02", "relevancy": 2.4478, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5391}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4648}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4648}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-scale%20hypergraph%20meets%20LLMs%3A%20Aligning%20large%20language%20models%20for%20time%20series%20analysis&body=Title%3A%20Multi-scale%20hypergraph%20meets%20LLMs%3A%20Aligning%20large%20language%20models%20for%20time%20series%20analysis%0AAuthor%3A%20Zongjiang%20Shang%20and%20Dongliang%20Cui%20and%20Binqing%20Wu%20and%20Ling%20Chen%0AAbstract%3A%20Recently%2C%20there%20has%20been%20great%20success%20in%20leveraging%20pre-trained%20large%20language%20models%20%28LLMs%29%20for%20time%20series%20analysis.%20The%20core%20idea%20lies%20in%20effectively%20aligning%20the%20modality%20between%20natural%20language%20and%20time%20series.%20However%2C%20the%20multi-scale%20structures%20of%20natural%20language%20and%20time%20series%20have%20not%20been%20fully%20considered%2C%20resulting%20in%20insufficient%20utilization%20of%20LLMs%20capabilities.%20To%20this%20end%2C%20we%20propose%20MSH-LLM%2C%20a%20Multi-Scale%20Hypergraph%20method%20that%20aligns%20Large%20Language%20Models%20for%20time%20series%20analysis.%20Specifically%2C%20a%20hyperedging%20mechanism%20is%20designed%20to%20enhance%20the%20multi-scale%20semantic%20information%20of%20time%20series%20semantic%20space.%20Then%2C%20a%20cross-modality%20alignment%20%28CMA%29%20module%20is%20introduced%20to%20align%20the%20modality%20between%20natural%20language%20and%20time%20series%20at%20different%20scales.%20In%20addition%2C%20a%20mixture%20of%20prompts%20%28MoP%29%20mechanism%20is%20introduced%20to%20provide%20contextual%20information%20and%20enhance%20the%20ability%20of%20LLMs%20to%20understand%20the%20multi-scale%20temporal%20patterns%20of%20time%20series.%20Experimental%20results%20on%2027%20real-world%20datasets%20across%205%20different%20applications%20demonstrate%20that%20MSH-LLM%20achieves%20the%20state-of-the-art%20results.%0ALink%3A%20http%3A//arxiv.org/abs/2602.04369v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-scale%2520hypergraph%2520meets%2520LLMs%253A% {"title": "LEAR: Learning Edge-Aware Representations for Event-to-LiDAR Localization", "author": "Kuangyi Chen and Jun Zhang and Yuxi Hu and Yi Zhou and Friedrich Fraundorfer", "abstract": "Event cameras offer high-temporal-resolution sensing that remains reliable under high-speed motion and challenging lighting, making them promising for localization from LiDAR point clouds in GPS-denied and visually degraded environments. However, aligning sparse, asynchronous events with dense LiDAR maps is fundamentally ill-posed, as direct correspondence estimation suffers from modality gaps. We propose LEAR, a dual-task learning framework that jointly estimates edge structures and dense event-depth flow fields to bridge the sensing-modality divide. Instead of treating edges as a post-hoc aid, LEAR couples them with flow estimation through a cross-modal fusion mechanism that injects modality-invariant geometric cues into the motion representation, and an iterative refinement strategy that enforces mutual consistency between the two tasks over multiple update steps. This synergy produces edge-aware, depth-aligned flow fields that enable more robust and accurate pose recovery via Perspective-n-Point (PnP) solvers. On several popular and challenging datasets, LEAR achieves superior performance over the best prior method. The source code, trained models, and demo videos are made publicly available online.", "link": "http://arxiv.org/abs/2603.01839v1", "date": "2026-03-02", "relevancy": 2.4422, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6378}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6038}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5593}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LEAR%3A%20Learning%20Edge-Aware%20Representations%20for%20Event-to-LiDAR%20Localization&body=Title%3A%20LEAR%3A%20Learning%20Edge-Aware%20Representations%20for%20Event-to-LiDAR%20Localization%0AAuthor%3A%20Kuangyi%20Chen%20and%20Jun%20Zhang%20and%20Yuxi%20Hu%20and%20Yi%20Zhou%20and%20Friedrich%20Fraundorfer%0AAbstract%3A%20Event%20cameras%20offer%20high-temporal-resolution%20sensing%20that%20remains%20reliable%20under%20high-speed%20motion%20and%20challenging%20lighting%2C%20making%20them%20promising%20for%20localization%20from%20LiDAR%20point%20clouds%20in%20GPS-denied%20and%20visually%20degraded%20environments.%20However%2C%20aligning%20sparse%2C%20asynchronous%20events%20with%20dense%20LiDAR%20maps%20is%20fundamentally%20ill-posed%2C%20as%20direct%20correspondence%20estimation%20suffers%20from%20modality%20gaps.%20We%20propose%20LEAR%2C%20a%20dual-task%20learning%20framework%20that%20jointly%20estimates%20edge%20structures%20and%20dense%20event-depth%20flow%20fields%20to%20bridge%20the%20sensing-modality%20divide.%20Instead%20of%20treating%20edges%20as%20a%20post-hoc%20aid%2C%20LEAR%20couples%20them%20with%20flow%20estimation%20through%20a%20cross-modal%20fusion%20mechanism%20that%20injects%20modality-invariant%20geometric%20cues%20into%20the%20motion%20representation%2C%20and%20an%20iterative%20refinement%20strategy%20that%20enforces%20mutual%20consistency%20between%20the%20two%20tasks%20over%20multiple%20update%20steps.%20This%20synergy%20produces%20edge-aware%2C%20depth-aligned%20flow%20fields%20that%20enable%20more%20robust%20and%20accurate%20pose%20recovery%20via%20Perspective-n-Point%20%28PnP%29%20solvers.%20On%20several%20popular%20and%20challenging%20datasets%2C%20LEAR%20achieves%20superior%20performance%20over%20the%20best%20prior%20method.%20The%20source%20code%2C%20trained%20models%2C%20and%20demo%20videos%20are%20made%20publicly%20available%20online.% {"title": "When Numbers Tell Half the Story: Human-Metric Alignment in Topic Model Evaluation", "author": "Thibault Prouteau and Francis Lareau and Nicolas Dugu\u00e9 and Jean-Charles Lamirel and Christophe Malaterre", "abstract": "Topic models uncover latent thematic structures in text corpora, yet evaluating their quality remains challenging, particularly in specialized domains. Existing methods often rely on automated metrics like topic coherence and diversity, which may not fully align with human judgment. Human evaluation tasks, such as word intrusion, provide valuable insights but are costly and primarily validated on general-domain corpora. This paper introduces Topic Word Mixing (TWM), a novel human evaluation task assessing inter-topic distinctness by testing whether annotators can distinguish between word sets from single or mixed topics. TWM complements word intrusion's focus on intra-topic coherence and provides a human-grounded counterpart to diversity metrics. We evaluate six topic models - both statistical and embedding-based (LDA, NMF, Top2Vec, BERTopic, CFMF, CFMF-emb) - comparing automated metrics with human evaluation methods based on nearly 4,000 annotations from a domain-specific corpus of philosophy of science publications. Our findings reveal that word intrusion and coherence metrics do not always align, particularly in specialized domains, and that TWM captures human-perceived distinctness while appearing to align with diversity metrics. We release the annotated dataset and task generation code. This work highlights the need for evaluation frameworks bridging automated and human assessments, particularly for domain-specific corpora.", "link": "http://arxiv.org/abs/2603.01945v1", "date": "2026-03-02", "relevancy": 2.4398, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5149}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D {"title": "Overcoming Joint Intractability with Lossless Hierarchical Speculative Decoding", "author": "Yuxuan Zhou and Fei Huang and Heng Li and Fengyi Wu and Tianyu Wang and Jianwei Zhang and Junyang Lin and Zhi-Qi Cheng", "abstract": "Verification is a key bottleneck in improving inference speed while maintaining distribution fidelity in Speculative Decoding. Recent work has shown that sequence-level verification leads to a higher number of accepted tokens compared to token-wise verification. However, existing solutions often rely on surrogate approximations or are constrained by partial information, struggling with joint intractability. In this work, we propose Hierarchical Speculative Decoding (HSD), a provably lossless verification method that significantly boosts the expected number of accepted tokens and overcomes joint intractability by balancing excess and deficient probability mass across accessible branches. Our extensive large-scale experiments demonstrate that HSD yields consistent improvements in acceptance rates across diverse model families and benchmarks. Moreover, its strong explainability and generality make it readily integrable into a wide range of speculative decoding frameworks. Notably, integrating HSD into EAGLE-3 yields over a 12% performance gain, establishing state-of-the-art decoding efficiency without compromising distribution fidelity. Code is available at https://github.com/ZhouYuxuanYX/Hierarchical-Speculative-Decoding.", "link": "http://arxiv.org/abs/2601.05724v2", "date": "2026-03-02", "relevancy": 2.431, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4883}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4851}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link" s%20available%20at%20https%3A//github.com/ZhouYuxuanYX/Hierarchical-Speculative-Decoding.%0ALink%3A%20http%3A//arxiv.org/abs/2601.05724v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOvercoming%2520Joint%2520Intractability%2520with%2520Lossless%2520Hierarchical%2520Speculative%2520Decoding%26entry.906535625%3DYuxuan%2520Zhou%2520and%2520Fei%2520Huang%2520and%2520Heng%2520Li%2520and%2520Fengyi%2520Wu%2520and%2520Tianyu%2520Wang%2520and%2520Jianwei%2520Zhang%2520and%2520Junyang%2520Lin%2520and%2520Zhi-Qi%2520Cheng%26entry.1292438233%3DVerification%2520is%2520a%2520key%2520bottleneck%2520in%2520improving%2520inference%2520speed%2520while%2520maintaining%2520distribution%2520fidelity%2520in%2520Speculative%2520Decoding.%2520Recent%2520work%2520has%2520shown%2520that%2520sequence-level%2520verification%2520leads%2520to%2520a%2520higher%2520number%2520of%2520accepted%2520tokens%2520compared%2520to%2520token-wise%2520verification.%2520However%252C%2520existing%2520solutions%2520often%2520rely%2520on%2520surrogate%2520approximations%2520or%2520are%2520constrained%2520by%2520partial%2520information%252C%2520struggling%2520with%2520joint%2520intractability.%2520In%2520this%2520work%252C%2520we%2520propose%2520Hierarchical%2520Speculative%2520Decoding%2520%2528HSD%2529%252C%2520a%2520provably%2520lossless%2520verification%2520method%2520that%2520significantly%2520boosts%2520the%2520expected%2520number%2520of%2520accepted%2520tokens%2520and%2520overcomes%2520joint%2520intractability%2520by%2520balancing%2520excess%2520and%2520deficient%2520probability%2520mass%2520across%2520accessible%2520branches.%2520Our%2520extensive%2520large-scale%2520experiments%2520demonstrate%2520that%2520HSD%2520yields%2520consistent%2520improvements%2520in%2520acceptance%2520rates%2520across%2520diverse%2520model%2520families%2520and%2520benchmarks.%2520Moreover%252C%2520its%2520strong%2520explainability%2520and {"title": "From Pixels to Patches: Pooling Strategies for Earth Embeddings", "author": "Isaac Corley and Caleb Robinson and Inbal Becker-Reshef and Juan M. Lavista Ferres", "abstract": "As geospatial foundation models shift from patch-level to pixel-level embeddings, practitioners must aggregate thousands of pixel vectors into patch representations that preserve class-discriminative signal while matching downstream label resolution. The default choice, mean pooling, discards within-patch variability and can drop accuracy by more than 10% under spatial shift. To evaluate this effect, we introduce EuroSAT-Embed: 81,000 embedding GeoTIFFs derived from three foundation models: AlphaEarth, OlmoEarth, and Tessera. We benchmark 11 training-free and 2 parametric pooling methods under both random and geographically disjoint test splits. Our results show that richer pooling schemes reduce the geographic generalization gap by up to 40% relative to mean pooling and increases accuracy by up to 5% on spatial splits. We recommend Generalized Mean Pooling (GeM) as a drop-in replacement for mean pooling: it improves accuracy without increasing embedding dimensionality. For maximum accuracy, Stats pooling (concatenation of min/max/mean/std pooling) performs best at 4x the embedding size. We further find that pooling effectiveness varies across embedding sources and that higher-dimensional embeddings benefit most from distributional statistics.", "link": "http://arxiv.org/abs/2603.02080v1", "date": "2026-03-02", "relevancy": 2.4293, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4916}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.487}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Pixels%20to%20Patches%3A%20Pooling%20Strategies%20for%20Earth%20Embeddings&body=Title%3A%20From%20Pixels%20to%20Patches%3A%20Pooling%20Strategies%20for%20Earth%20Embeddings%0AAuthor%3A%20Isaac%20Corley%20and%20Caleb%20Robinson%20and%20Inbal%20Becker-Reshef%20and%20Juan%20M.%20Lavista%20Ferres%0AAbstract%3A%20As%20geospatial%20foundation%20models%20shift%20from%20patch-level%20to%20pixel-level%20embeddings%2C%20practitioners%20must%20aggregate%20thousands%20of%20pixel%20vectors%20into%20patch%20representations%20that%20preserve%20class-discriminative%20signal%20while%20matching%20downstream%20label%20resolution.%20The%20default%20choice%2C%20mean%20pooling%2C%20discards%20within-patch%20variability%20and%20can%20drop%20accuracy%20by%20more%20than%2010%25%20under%20spatial%20shift.%20To%20evaluate%20this%20effect%2C%20we%20introduce%20EuroSAT-Embed%3A%2081%2C000%20embedding%20GeoTIFFs%20derived%20from%20three%20foundation%20models%3A%20AlphaEarth%2C%20OlmoEarth%2C%20and%20Tessera.%20We%20benchmark%2011%20training-free%20and%202%20parametric%20pooling%20methods%20under%20both%20random%20and%20geographically%20disjoint%20test%20splits.%20Our%20results%20show%20that%20richer%20pooling%20schemes%20reduce%20the%20geographic%20generalization%20gap%20by%20up%20to%2040%25%20relative%20to%20mean%20pooling%20and%20increases%20accuracy%20by%20up%20to%205%25%20on%20spatial%20splits.%20We%20recommend%20Generalized%20Mean%20Pooling%20%28GeM%29%20as%20a%20drop-in%20replacement%20for%20mean%20pooling%3A%20it%20improves%20accuracy%20without%20increasing%20embedding%20dimensionality.%20For%20maximum%20accuracy%2C%20Stats%20pooling%20%28concatenation%20of%20min/max/mean/std%20pooling%29%20performs%20best%20at%204x%20the%20embedding%20size.%20We%20further%20find%20that%20pooling%20effectiveness%20varies%20across%20embedding%20sources%20and%20that%20higher-dimensional%20embeddings%20benefit%20most%20 {"title": "GenDB: The Next Generation of Query Processing -- Synthesized, Not Engineered", "author": "Jiale Lao and Immanuel Trummer", "abstract": "Traditional query processing relies on engines that are carefully optimized and engineered by many experts. However, new techniques and user requirements evolve rapidly, and existing systems often cannot keep pace. At the same time, these systems are difficult to extend due to their internal complexity, and developing new systems requires substantial engineering effort and cost. In this paper, we argue that recent advances in Large Language Models (LLMs) are starting to shape the next generation of query processing systems.\n  We propose using LLMs to synthesize execution code for each incoming query, instead of continuously building, extending, and maintaining complex query processing engines. As a proof of concept, we present GenDB, an LLM-powered agentic system that generates instance-optimized and customized query execution code tailored to specific data, workloads, and hardware resources.\n  We implemented an early prototype of GenDB that uses Claude Code Agent as the underlying component in the multi-agent system, and we evaluate it on OLAP workloads. We use queries from the well-known TPC-H benchmark and also construct a new benchmark designed to reduce potential data leakage from LLM training data. We compare GenDB with state-of-the-art query engines, including DuckDB, Umbra, MonetDB, ClickHouse, and PostgreSQL. GenDB achieves significantly better performance than these systems. Finally, we discuss the current limitations of GenDB and outline future extensions and related research challenges.", "link": "http://arxiv.org/abs/2603.02081v1", "date": "2026-03-02", "relevancy": 2.4239, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5259}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4661}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4622}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenDB%3A%20The%20Next%20Generation%20of%20Query%20Processing%20--%20Synthesized%2C%20Not%20Engineered&body=Title%3A%20GenDB%3A%20The%20Next%20Generation%20of%20Query%20Processing%20--%20Synthesized%2C%20Not%20Engineered%0AAuthor%3A%20Jiale%20Lao%20and%20Immanuel%20Trummer%0AAbstract%3A%20Traditional%20query%20processing%20relies%20on%20engines%20that%20are%20carefully%20optimized%20and%20engineered%20by%20many%20experts.%20However%2C%20new%20techniques%20and%20user%20requirements%20evolve%20rapidly%2C%20and%20existing%20systems%20often%20cannot%20keep%20pace.%20At%20the%20same%20time%2C%20these%20systems%20are%20difficult%20to%20extend%20due%20to%20their%20internal%20complexity%2C%20and%20developing%20new%20systems%20requires%20substantial%20engineering%20effort%20and%20cost.%20In%20this%20paper%2C%20we%20argue%20that%20recent%20advances%20in%20Large%20Language%20Models%20%28LLMs%29%20are%20starting%20to%20shape%20the%20next%20generation%20of%20query%20processing%20systems.%0A%20%20We%20propose%20using%20LLMs%20to%20synthesize%20execution%20code%20for%20each%20incoming%20query%2C%20instead%20of%20continuously%20building%2C%20extending%2C%20and%20maintaining%20complex%20query%20processing%20engines.%20As%20a%20proof%20of%20concept%2C%20we%20present%20GenDB%2C%20an%20LLM-powered%20agentic%20system%20that%20generates%20instance-optimized%20and%20customized%20query%20execution%20code%20tailored%20to%20specific%20data%2C%20workloads%2C%20and%20hardware%20resources.%0A%20%20We%20implemented%20an%20early%20prototype%20of%20GenDB%20that%20uses%20Claude%20Code%20Agent%20as%20the%20underlying%20component%20in%20the%20multi-agent%20system%2C%20and%20we%20evaluate%20it%20on%20OLAP%20workloads.%20We%20use%20queries%20from%20the%20well-known%20TPC-H%20benchmark%20and%20also%20construct%20a%20new%20benchmark%20designed%20to%20reduce%20potential%20data%20leakage%20from%20LLM%20training%20data.%20We%20compare%20GenDB%20with%20state-of-the-art%20query%20engines%2C%20including%20DuckDB%2C%20Umbra%2C%20MonetDB%2C%20ClickHouse%2C%20and%20PostgreSQL.%20GenDB%20achieves%20significantly%20better%20performance%20than%20these%20systems.%20Finally%2C%20we%20discuss%20the%20current%20limitations%20of%20GenDB%20and%20outline%20future%20extensions%20and%20related%20research%20challenges.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02081v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenDB%253A%2520The%2520Next%2520Generation%2520of%2520Query%2520Processing%2520--%2520Synthesized%252C%2520Not%2520Engineered%26entry.906535625%3DJiale%2520Lao%2520and%2520Immanuel%2520Trummer%26entry.1292438233%3DTraditional%2520query%2520processing%2520relies%2520on%2520engines%2520that%2520are%2520carefully%2520optimized%2520and%2520engineered%2520by%2520many%2520experts.%2520However%252C%2520new%2520techniques%2520and%2520user%2520requirements%2520evolve%2520rapidly%252C%2520and%2520existing%2520systems%2520often%2520cannot%2520keep%2520pace.%2520At%2520the%2520same%2520time%252C%2520these%2520systems%2520are%2520difficult%2520to%2520extend%2520due%2520to%2520their%2520internal%2520complexity%252C%2520and%2520developing%2520new%2520systems%2520requires%2520substantial%2520engineering%2520effort%2520and%2520cost.%2520In%2520this%2520paper%252C%2520we%2520argue%2520that%2520recent%2520advances%2520in%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520are%2520starting%2520to%2520shape%2520the%2520next%2520generation%2520of%2520query%2520processing%2520systems.%250A%2520%2520We%2520propose%2520using%2520LLMs%2520to%2520synthesize%2520execution%2520code%2520for%2520each%2520incoming%2520query%252C%2520instead%2520of%2520continuously%2520building%252C%2 {"title": "WiCompass: Oracle-driven Data Scaling for mmWave Human Pose Estimation", "author": "Bo Liang and Chen Gong and Haobo Wang and Qirui Liu and Rungui Zhou and Fengzhi Shao and Yubo Wang and Wei Gao and Kaichen Zhou and Guolong Cui and Chenren Xu", "abstract": "Millimeter-wave Human Pose Estimation (mmWave HPE) promises privacy but suffers from poor generalization under distribution shifts. We demonstrate that brute-force data scaling is ineffective for out-of-distribution (OOD) robustness; efficiency and coverage are the true bottlenecks. To address this, we introduce WiCompass, a coverage-aware data-collection framework. WiCompass leverages large-scale motion-capture corpora to build a universal pose space ``oracle'' that quantifies dataset redundancy and identifies underrepresented motions. Guided by this oracle, WiCompass employs a closed-loop policy to prioritize collecting informative missing samples. Experiments show that WiCompass consistently improves OOD accuracy at matched budgets and exhibits superior scaling behavior compared to conventional collection strategies. By shifting focus from brute-force scaling to coverage-aware data acquisition, this work offers a practical path toward robust mmWave sensing.", "link": "http://arxiv.org/abs/2602.18726v2", "date": "2026-03-02", "relevancy": 2.4234, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.492}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4875}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WiCompass%3A%20Oracle-driven%20Data%20Scaling%20for%20mmWave%20Human%20Pose%20Estimation&body=Title%3A%20WiCompass%3A%20Oracle-driven%20Data%20Scaling%20for%20mmWave%20Human%20Pose%20Estimation%0AAuthor%3A%20Bo%20Liang%20and%20Chen%20Gong%20and%20Haobo%20Wang%20and%20Qirui%20Liu%20and%20Rungui%20Zhou%20and%20Fengzhi%20Shao%20and%20Yubo%20Wang%20and%20Wei%20Gao%20and%20Kaichen%20Zhou%20and%20Guolong%20Cui%20and%20Chenren%20Xu%0AAbstract%3A%20Millimeter-wave%20Human%20Pose%20Estimation%20%28mmWave%20HPE%29%20promises%20privacy%20but%20suffers%20from%20poor%20generalization%20under%20distribution%20shifts.%20We%20demonstrate%20that%20brute-force%20data%20scaling%20is%20ineffective%20for%20out-of-distribution%20%28OOD%29%20robustness%3B%20efficiency%20and%20coverage%20are%20the%20true%20bottlenecks.%20To%20address%20this%2C%20we%20introduce%20WiCompass%2C%20a%20coverage-aware%20data-collection%20framework.%20WiCompass%20leverages%20large-scale%20motion-capture%20corpora%20to%20build%20a%20universal%20pose%20space%20%60%60oracle%27%27%20that%20quantifies%20dataset%20redundancy%20and%20identifies%20underrepresented%20motions.%20Guided%20by%20this%20oracle%2C%20WiCompass%20employs%20a%20closed-loop%20policy%20to%20prioritize%20collecting%20informative%20missing%20samples.%20Experiments%20show%20that%20WiCompass%20consistently%20improves%20OOD%20accuracy%20at%20matched%20budgets%20and%20exhibits%20superior%20scaling%20behavior%20compared%20to%20conventional%20collection%20strategies.%20By%20shifting%20focus%20from%20brute-force%20scaling%20to%20coverage-aware%20data%20acquisition%2C%20this%20work%20offers%20a%20practical%20path%20toward%20robust%20mmWave%20sensing.%0ALink%3A%20http%3A//arxiv.org/abs/2602.18726v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWiCompass%253A%2520Oracle-driven%2520Data%2520Scaling%2520for%2520mmWave%2520Human%2520Pose%2520Estimation%26entry.906535625%3DBo%2520Liang%2520and%2520Chen%2520Gong%2520and%2520Haobo%2520Wang%2520and%2520Qirui%2520Liu%2520and%2520Rungui%2520Z {"title": "Representing local protein environments with machine learning force fields", "author": "Meital Bojan and Sanketh Vedula and Advaith Maddipatla and Nadav Bojan Sellam and Federico Napoli and Paul Schanda and Alex M. Bronstein", "abstract": "The local structure of a protein strongly impacts its function and interactions with other molecules. Therefore, a concise, informative representation of a local protein environment is essential for modeling and designing proteins and biomolecular interactions. However, these environments' extensive structural and chemical variability makes them challenging to model, and such representations remain under-explored. In this work, we propose a novel representation for a local protein environment derived from the intermediate features of atomistic foundation models (AFMs). We demonstrate that this embedding effectively captures both local structure (e.g., secondary motifs), and chemical features (e.g., amino-acid identity and protonation state). We further show that the AFM-derived representation space exhibits meaningful structure, enabling the construction of data-driven priors over the distribution of biomolecular environments. Finally, in the context of biomolecular NMR spectroscopy, we demonstrate that the proposed representations enable a first-of-its-kind physics-informed chemical shift predictor that achieves state-of-the-art accuracy. Our results demonstrate the surprising effectiveness of atomistic foundation models and their emergent representations for protein modeling beyond traditional molecular simulations. We believe this will open new lines of work in constructing effective functional representations for protein environments.", "link": "http://arxiv.org/abs/2505.23354v4", "date": "2026-03-02", "relevancy": 2.4141, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4865}, {"

{"title": "Distributional Priors Guided Diffusion for Generating 3D Molecules in Low Data Regimes", "author": "Haokai Hong and Wanyu Lin and Ming Yang and Kay Chen Tan", "abstract": "Can we train a 3D molecule generator using data from dense regions to generate samples in sparse regions? This challenge can be framed as an out-of-distribution (OOD) generation problem. While prior research on OOD generation predominantly targets property shifts, structural shifts -- such as differences in molecular scaffolds or functional groups -- represent an equally critical source of distributional shifts. This work introduces the Geometric OOD Diffusion Model (GODD), a novel diffusion-based framework that enables training on data-abundant molecular distributions while generalizing to data-scarce distributions under distributional structural shifts. Central to our approach is a designated equivariant asymmetric autoencoder to capture distributional structural priors. The asymmetric design allows the model to generalize to unseen structural variations by capturing distributional priors representing distinct distributions. The encoded structural-grained priors guide generation toward sparse regions without requiring explicit training on such data. Evaluated across standard benchmarks encompassing OOD structural shifts (e.g., scaffolds, rings), GODD achieves an improvement of 12.6% in success rate, defined based on molecular validity, uniqueness, and novelty. Furthermore, the framework demonstrates promising performance and generalization on canonical fragment-based drug design tasks, highlighting its utility in learning-based molecular discovery.", "link": "http://arxiv.org/abs/2404.00962v2", "date": "2026-03-02", "relevancy": 2.2306, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5694}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5636}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5435}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Distributional%20Priors%20Guided%20Diffusion%20for%20Generating%203D%20Molecules%20in%20Low%20Data%20Regimes&body=Title%3A%20Distributional%20Priors%20Guided%20Diffusion%20for%20Generating%203D%20Molecules%20in%20Low%20Data%20Regimes%0AAuthor%3A%20Haokai%20Hong%20and%20Wanyu%20Lin%20and%20Ming%20Yang%20and%20Kay%20Chen%20Tan%0AAbstract%3A%20Can%20we%20train%20a%203D%20molecule%20generator%20using%20data%20from%20dense%20regions%20to%20generate%20samples%20in%20sparse%20regions%3F%20This%20challenge%20can%20be%20framed%20as%20an%20out-of-distribution%20%28OOD%29%20generation%20problem.%20While%20prior%20research%20on%20OOD%20generation%20predominantly%20targets%20property%20shifts%2C%20structural%20shifts%20--%20such%20as%20differences%20in%20molecular%20scaffolds%20or%20functional%20groups%20--%20represent%20an%20equally%20critical%20source%20of%20distributional%20shifts.%20This%20work%20introduces%20the%20Geometric%20OOD%20Diffusion%20Model%20%28GODD%29%2C%20a%20novel%20diffusion-based%20framework%20that%20enables%20training%20on%20data-abundant%20molecular%20distributions%20while%20generalizing%20to%20data-scarce%20distributions%20under%20distributional%20structural%20shifts.%20Central%20to%20our%20approach%20is%20a%20designated%20equivariant%20asymmetric%20autoencoder%20to%20capture%20distributional%20structural%20priors.%20The%20asymmetric%20design%20allows%20the%20model%20to%20generalize%20to%20unseen%20structural%20variations%20by%20capturing%20distributional%20priors%20representing%20distinct%20distributions.%20The%20encoded%20structural-grained%20priors%20guide%20generation%20toward%20sparse%20regions%20without%20requiring%20explicit%20training%20on%20such%20data.%20Evaluated%20across%20standard%20benchmarks%20encompassing%20OOD%20structural%20shifts%20%28e.g.%2C%20scaffolds%2C%20rings%29%2C%20GODD%20achieves%20an%20improvement%20of%2012.6%25%20in%20success%20rate%2C%20defined%20based%20on%20molecular%20validity%2C%20uniqueness%2C%20and%20novelty.%20Furthermore%2C%20the%20framework%20demonstrates%20promising%20performance%20and%20generalization%20on%20canonical%20fragment-based%20drug%20design%20tasks%2C%20highlighting%20its%20utility%20in%20learning-based%20molecular%20discovery.%0ALink%3A%20http%3A//arxiv.org/abs/2404.00962v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDistributional%2520Priors%2520Guided%2520Diffusion%2520for%2520Generating%25203D%2520Molecules%2520in%2520Low%2520Data%2520Regimes%26entry.906535625%3DHaokai%2520Hong%2520and%2520Wanyu%2520Lin%2520and%2520Ming%2520Yang%2520and%2520Kay%2520Chen%2520Tan%26entry.1292438233%3DCan%2520we%2520train%2520a%25203D%2520molecule%2520generator%2520using%2520data%2520from%2520dense%2520regions%2520to%2520generate%2520samples%2520in%2520sparse%2520regions%253F%2520This%2520challenge%2520can%2520be%2520framed%2520as%2520an%2520out-of-distribution%2520%2528OOD%2529%2520generation%2520problem.%2520While%2520prior%2520research%2520on%2520OOD%2520generation%2520predominantly%2520targets%2520property%2520shifts%252C%2520structural%2520shifts%2520--%2520such%2520as%2520differences%2520in%2520molecular%2520scaffolds%2520or%2520functional%2520groups%2520--%2520represent%2520an%2520equally%2520critical%2520source%2520of%2520distributional%2520shifts.%2520This%2520work%2520introduces%2520the%2520Geometric%2520OOD%2520Diffusion%2520Model%2520%2528GODD%2529%252C%2520a%2520novel%2520diffusion-based%2520framework%2520that%2520enables%2520training%2520on%2520data-abundant%2520molecular%2520distributions%2520while%2520generalizing%2520to%2520data-scarce%2520distributions%2520under%2520distributional%2520s {"title": "Spotlight on Token Perception for Multimodal Reinforcement Learning", "author": "Siyuan Huang and Xiaoye Qu and Yafu Li and Yun Luo and Zefeng He and Daizong Liu and Yu Cheng", "abstract": "While Reinforcement Learning with Verifiable Rewards (RLVR) has advanced the reasoning capabilities of Large Vision-Language Models (LVLMs), most existing methods in multimodal reasoning neglect the critical role of visual perception within the RLVR optimization process. In this paper, we undertake a pioneering exploration of multimodal RLVR through the novel perspective of token perception, which measures the visual dependency of each generated token. With a granular analysis of Chain-of-Thought (CoT) processes, we uncover two key insights: first, token perception in a rollout trajectory is sparsely distributed, where only a small fraction of tokens have high visual dependency for visually-grounded reasoning; second, different trajectories exhibit significant divergence in their overall visual dependency. Based on these observations, we propose Visually-Perceptive Policy Optimization (VPPO), a novel policy gradient algorithm that explicitly leverages token perception to refine the learning signal. Specifically, VPPO achieves this through a dual mechanism: it reweights a trajectory's advantage by its overall visual dependency, and focuses policy updates exclusively on perceptually pivotal tokens. On a comprehensive suite of eight perception and reasoning benchmarks, VPPO demonstrates substantial gains over leading open-source RL-tuned models, with its effectiveness consistently validated across 7B and 32B model scales. Our findings not only establish a new token-level perceptual perspective for analyzing multimodal RLVR but also present a novel and effective optimization strategy to significantly enhance the multimodal reasoning capabilities of LVLMs.", "link": "http://arxiv.org/abs/2510.09285v2", "date": "2026-03-02", "relevancy": 2.2304, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5636}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spotlight%20on%20Token%20Perception%20for%20Multimodal%20Reinforcement%20Learning&body=Title%3A%20Spotlight%20on%20Token%20Perception%20for%20Multimodal%20Reinforcement%20Learning%0AAuthor%3A%20Siyuan%20Huang%20and%20Xiaoye%20Qu%20and%20Yafu%20Li%20and%20Yun%20Luo%20and%20Zefeng%20He%20and%20Daizong%20Liu%20and%20Yu%20Cheng%0AAbstract%3A%20While%20Reinforcement%20Learning%20with%20Verifiable%20Rewards%20%28RLVR%29%20has%20advanced%20the%20reasoning%20capabilities%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29%2C%20most%20existing%20methods%20in%20multimodal%20reasoning%20neglect%20the%20critical%20role%20of%20visual%20perception%20within%20the%20RLVR%20optimization%20process.%20In%20this%20paper%2C%20we%20undertake%20a%20pioneering%20exploration%20of%20multimodal%20RLVR%20through%20the%20novel%20perspective%20of%20token%20perception%2C%20which%20measures%20the%20visual%20dependency%20of%20each%20generated%20token.%20With%20a%20granular%20analysis%20of%20Chain-of-Thought%20%28CoT%29%20processes%2C%20we%20uncover%20two%20key%20insights%3A%20first%2C%20token%20perception%20in%20a%20rollout%20trajectory%20is%20sparsely%20distributed%2C%20where%20only%20a%20small%20fraction%20of%20tokens%20have%20high%20visual%20dependency%20for%20visually-grounded%20reasoning%3B%20second%2C%20different%20trajectories%20exhibit%20significant%20divergence%20in%20their%20overall%20visual%20dependency.%20Based%20on%20these%20observations%2C%20we%20propose%20Visually-Perceptive%20Policy%20Optimization%20%28VPPO%29%2C%20a%20novel%20policy%20gradient%20algorithm%20that%20explicitly%20leverages%20token%20perception%20to%20refine%20the%20learning%20signal.%20Specifically%2C%20VPPO%20achieves%20this%20through%20a%20dual%20mechanism%3A%20it%20reweights%20a%20trajectory%27s%20advantage%20by%20its%20overall%20visual%20dependency%2C%20and%20focuses%20policy%20updates%20exclusively%20on%20perceptually%20pivotal%20tokens.%20On%20a%20comprehensive%20suite%20of%20eight%20perception%20and%20reasoning%20benchmarks%2C%20VPPO%20demonstrates%20substantial%20gains%20over%20leading%20open-source%20RL-tuned%20models%2C%20with%20its%20effectiveness%20consistently%20validated%20across%207B%20and%2032B%20model%20scales.%20Our%20findings%20not%20only%20establish%20a%20new%20token-level%20perceptual%20perspective%20for%20analyzing%20multimodal%20RLVR%20but%20also%20present%20a%20novel%20and%20effective%20optimization%20strategy%20to%20significantly%20enhance%20the%20multimodal%20reasoning%20capabilities%20of%20LVLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2510.09285v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpotlight%2520on%2520Token%2520Perception%2520for%2520Multimodal%2520Reinforcement%2520Learning%26entry.906535625%3DSiyuan%2520Huang%2520and%2520Xiaoye%2520Qu%2520and%2520Yafu%2520Li%2520and%2520Yun%2520Luo%2520and%2520Zefeng%2520He%2520and%2520Daizong%2520Liu%2520and%2520Yu%2520Cheng%26entry.1292438233%3DWhile%2520Reinforcement%2520Learning%2520with%2520Verifiable%2520Rewards%2520%2528RLVR%2529%2520has%2520advanced%2520the%2520reasoning%2520capabilities%2520of%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%252C%2520most%2520existing%2520methods%2520in%2520multimodal%2520reasoning%2520neglect%2520the%2520critical%2520role%2520of%2520visual%2520perception%2520within%2520the%2520RLVR%2520optimization%2520process.% {"title": "Generative Visual Chain-of-Thought for Image Editing", "author": "Zijin Yin and Tiankai Hang and Yiji Cheng and Shiyi Zhang and Runze He and Yu Xu and Chunyu Wang and Bing Li and Zheng Chang and Kongming Liang and Qinglin Lu and Zhanyu Ma", "abstract": "Existing image editing methods struggle to perceive where to edit, especially under complex scenes and nuanced spatial instructions. To address this issue, we propose Generative Visual Chain-of-Thought (GVCoT), a unified framework that performs native visual reasoning by first generating spatial cues to localize the target region and then executing the edit. Unlike prior text-only CoT or tool-dependent visual CoT paradigms, GVCoT jointly optimizes visual tokens generated during the reasoning and editing phases in an end-to-end manner. This way fosters the emergence of innate spatial reasoning ability and enables more effective utilization of visual-domain cues. The main challenge of training GCVoT lies in the scarcity of large-scale editing data with precise edit region annotations; to this end, we construct GVCoT-Edit-Instruct, a dataset of 1.8M high-quality samples spanning 19 tasks. We adopt a progressive training strategy: supervised fine-tuning to build foundational localization ability in reasoning trace before final editing, followed by reinforcement learning to further improve reasoning and editing quality. Finally, we introduce SREdit-Bench, a new benchmark designed to comprehensively stress-test models under sophisticated scenes and fine-grained referring expressions. Experiments demonstrate that GVCoT consistently outperforms state-of-the-art models on SREdit-Bench and ImgEdit. We hope our GVCoT will inspire future research toward interpretable and precise image editing.", "link": "http://arxiv.org/abs/2603.01893v1", "date": "2026-03-02", "relevancy": 2.2294, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", {"title": "Towards Real Zero-Shot Camouflaged Object Segmentation without Camouflaged Annotations", "author": "Cheng Lei and Jie Fan and Xinran Li and Tianzhu Xiang and Ao Li and Ce Zhu and Le Zhang", "abstract": "Camouflaged Object Segmentation (COS) faces significant challenges due to the scarcity of annotated data, where meticulous pixel-level annotation is both labor-intensive and costly, primarily due to the intricate object-background boundaries. Addressing the core question, \"Can COS be effectively achieved in a zero-shot manner without manual annotations for any camouflaged object?\" we affirmatively respond and introduce a robust zero-shot COS framework. This framework leverages the inherent local pattern bias of COS and employs a broad semantic feature space derived from salient object segmentation (SOS) for efficient zero-shot transfer. We incorporate an Masked Image Modeling (MIM) based image encoder optimized for Parameter-Efficient Fine-Tuning (PEFT), a Multimodal Large Language Model (M-LLM), and a Multi-scale Fine-grained Alignment (MFA) mechanism. The MIM pre-trained image encoder focuses on capturing essential low-level features, while the M-LLM generates caption embeddings processed alongside these visual cues. These embeddings are precisely aligned using MFA, enabling our framework to accurately interpret and navigate complex semantic contexts. To optimize operational efficiency, we introduce a learnable codebook that represents the M-LLM during inference, significantly reducing computational overhead. Our framework demonstrates its versatility and efficacy through rigorous experimentation, achieving state-of-the-art performance in zero-shot COS with $F_\u03b2^w$ scores of 72.9\\% on CAMO and 71.7\\% on COD10K. By removing the M-LLM during inference, we achieve an inference speed comparable to that of traditional end-to-end models, reaching 18.1 FPS. Code: https://github.com/AVC2-UESTC/ZSCOS-CaMF", "link": "http://arxiv.org/abs/2410.16953v2", "date": "2026-03-02", "relevancy": 2.2272, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5629}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5534}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5521}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Real%20Zero-Shot%20Camouflaged%20Object%20Segmentation%20without%20Camouflaged%20Annotations&body=Title%3A%20Towards%20Real%20Zero-Shot%20Camouflaged%20Object%20Segmentation%20without%20Camouflaged%20Annotations%0AAuthor%3A%20Cheng%20Lei%20and%20Jie%20Fan%20and%20Xinran%20Li%20and%20Tianzhu%20Xiang%20and%20Ao%20Li%20and%20Ce%20Zhu%20and%20Le%20Zhang%0AAbstract%3A%20Camouflaged%20Object%20Segmentation%20%28COS%29%20faces%20significant%20challenges%20due%20to%20the%20scarcity%20of%20annotated%20data%2C%20where%20meticulous%20pixel-level%20annotation%20is%20both%20labor-intensive%20and%20costly%2C%20primarily%20due%20to%20the%20intricate%20object-background%20boundaries.%20Addressing%20the%20core%20question%2C%20%22Can%20COS%20be%20effectively%20achieved%20in%20a%20zero-shot%20manner%20without%20manual%20annotations%20for%20any%20camouflaged%20object%3F%22%20we%20affirmatively%20respond%20and%20introduce%20a%20robust%20zero-shot%20COS%20framework.%20This%20framework%20leverages%20the%20inherent%20local%20pattern%20bias%20of%20COS%20and%20employs%20a%20broad%20semantic%20feature%20space%20derived%20from%20salient%20object%20segmentation%20%28SOS%29%20for%20efficient%20zero-shot%20transfer.%20We%20incorporate%20an%20Masked%20Image%20Modeling%20%28MIM%29%20based%20image%20encoder%20optimized%20for%20Parameter-Efficient%20Fine-Tuning%20%28PEFT%29%2C%20a%20Multimodal%20Large%20Language%20Model%20%28M-LLM%29%2C%20and%20a%20Multi-scale%20Fine-grained%20Alignment%20%28MFA%29%20mechanism.%20The%20MIM%20pre-trained%20image%20encoder%20focuses%20on%20capturing%20essential%20low-level%20features%2C%20while%20the%20M-LLM%20generates%20caption%20embeddings%20processed%20alongside%20these%20visual%20cues.%20These%20embeddings%20are%20precisely%20aligned%20using%20MFA%2C%20enabling%20our%20framework%20to%20accurately%20interpret%20and%20navigate%20complex%20semantic%20contexts.%20To%20optimize%20operational%20efficiency%2C%20we%20introduce%20a%20learnable%20codebook%20that%20represents%20the%20M-LLM%20during%20inference%2C%20significantly%20reducing%20computational%20overhead.%20Our%20framework%20demonstrates%20its%20versatility%20and%20efficacy%20through%20rigorous%20experimentation%2C%20achieving%20state-of-the-art%20performance%20in%20zero-shot%20COS%20with%20%24F_%CE%B2%5Ew%24%20scores%20of%2072.9%5C%25%20on%20CAMO%20and%2071.7%5C%25%20on%20COD10K.%20By%20removing%20the%20M-LLM%20during%20inference%2C%20we%20achieve%20an%20inference%20speed%20comparable%20to%20that%20of%20traditional%20end-to-end%20models%2C%20reaching%2018.1%20FPS.%20Code%3A%20https%3A//github.com/AVC2-UESTC/ZSCOS-CaMF%0ALink%3A%20http%3A//arxiv.org/abs/2410.16953v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Real%2520Zero-Shot%2520Camouflaged%2520Object%2520Segmentation%2520without%2520Camouflaged%2520Annotations%26entry.906535625%3DCheng%2520Lei%2520and%2520Jie%2520Fan%2520and%2520Xinran%2520Li%2520and%2520Tianzhu%2520Xiang%2520and%2520Ao%2520Li%2520and%2520Ce%2520Zhu%2520and%2520Le%2520Zhang%26entry.1292438233%3DCamouflaged%2520Object%2520Segmentation%2520%2528COS%2529%2520faces%2520significant%2520challenges%2520due%2520to%2520the%2520scarcity%2520of%2520annotated%2520data%252C%2520where%2520meticulous%2520pixel-level%2520annotation%2520is%2520both%2520labor-intensive%2520and%2520costly%252C%25 t%2520performance%2520in%2520zero-shot%2520COS%2520with%2520%2524F_%25CE%25B2%255Ew%2524%2520scores%2520of%252072.9%255C%2525%2520on%2520CAMO%2520and%252071.7%255C%2525%2520on%2520COD10K.%2520By%2520removing%2520the%2520M-LLM%2520during%2520inference%252C%2520we%2520achieve%2520an%2520inference%2520speed%2520comparable%2520to%2520that%2520of%2520traditional%2520end-to-end%2520models%252C%2520reaching%252018.1%2520FPS.%2520Code%253A%2520https%253A//github.com/AVC2-UESTC/ZSCOS-CaMF%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2410.16953v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Towards%20Real%20Zero-Shot%20Camouflaged%20Object%20Segmentation%20without%20Camouflaged%20Annotations&entry.906535625=Cheng%20Lei%20and%20Jie%20Fan%20and%20Xinran%20Li%20and%20Tianzhu%20Xiang%20and%20Ao%20Li%20and%20Ce%20Zhu%20and%20Le%20Zhang&entry.1292438233=Camouflaged%20Object%20Segmentation%20%28COS%29%20faces%20significant%20challenges%20due%20to%20the%20scarcity%20of%20annotated%20data%2C%20where%20meticulous%20pixel-level%20annotation%20is%20both%20labor-intensive%20and%20costly%2C%20primarily%20due%20to%20the%20intricate%20object-background%20boundaries.%20Addressing%20the%20core%20question%2C%20%22Can%20COS%20be%20effectively%20achieved%20in%20a%20zero-shot%20manner%20without%20manual%20annotations%20for%20any%20camouflaged%20object%3F%22%20we%20affirmatively%20respond%20and%20introduce%20a%20robust%20zero-shot%20COS%20framework.%20This%20framework%20leverages%20the%20inherent%20local%20pattern%20bias%20of%20COS%20and%20employs%20a%20broad%20semantic%20feature%20space%20derived%20from%20salient%20object%20segmentation%20%28SOS%29%20for%20efficient%20zero-shot%20transfer.%20We%20incorporate%20an%20Masked%20Image%20Modeling%20%28MIM%29%20based%20image%20encoder%20optimized%20for%20Parameter-Efficient%20Fine-Tuning%20%28PEFT%29%2C%20a%20Multimodal%20Large%20Language%20Model% {"title": "Rethinking Camera Choice: An Empirical Study on Fisheye Camera Properties in Robotic Manipulation", "author": "Han Xue and Nan Min and Xiaotong Liu and Wendi Chen and Yuan Fang and Jun Lv and Cewu Lu and Chuan Wen", "abstract": "The adoption of fisheye cameras in robotic manipulation, driven by their exceptionally wide Field of View (FoV), is rapidly outpacing a systematic understanding of their downstream effects on policy learning. This paper presents the first comprehensive empirical study to bridge this gap, rigorously analyzing the properties of wrist-mounted fisheye cameras for imitation learning. Through extensive experiments in both simulation and the real world, we investigate three critical research questions: spatial localization, scene generalization, and hardware generalization. Our investigation reveals that: (1) The wide FoV significantly enhances spatial localization, but this benefit is critically contingent on the visual complexity of the environment. (2) Fisheye-trained policies, while prone to overfitting in simple scenes, unlock superior scene generalization when trained with sufficient environmental diversity. (3) While naive cross-camera transfer leads to failures, we identify the root cause as scale overfitting and demonstrate that hardware generalization performance can be improved with a simple Random Scale Augmentation (RSA) strategy. Collectively, our findings provide concrete, actionable guidance for the large-scale collection and effective use of fisheye datasets in robotic learning. More results and videos are available on https://robo-fisheye.github.io/", "link": "http://arxiv.org/abs/2603.02139v1", "date": "2026-03-02", "relevancy": 1.0952, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5679}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http:/ {"title": "Token-Importance Guided Direct Preference Optimization", "author": "Ning Yang and Hai Lin and Yibo Liu and Baoliang Tian and Guoqing Liu and Haijun Zhang", "abstract": "Aligning Large Language Models (LLMs) with human preferences is crucial for safe and effective AI interactions. While popular methods like Direct Preference Optimization (DPO) have simplified alignment, they remain sensitive to data noise and overlook the differential importance of individual tokens. Existing token-level approaches often rely on probability prediction or simplistic weighting schemes to obtain token importance, which still cannot fully address these issues. To solve this problem, we propose the Token-Importance Guided Direct Preference Optimization (TI-DPO), a framework that achieves fine-grained semantic control through two synergistic innovations. First, we propose a novel hybrid weighting mechanism that combines gradient attribution with a Gaussian prior, ensuring both the accuracy and robustness of token importance scores. Second, we employ a triplet loss to provide structured guidance for the optimization, explicitly guiding model outputs to approach preferred responses and diverge from non-preferred ones. Experimental results show that TI-DPO achieves higher accuracy and stronger generative diversity, providing more stable and computationally efficient solutions compared with DPO and other RLHF methods.", "link": "http://arxiv.org/abs/2505.19653v3", "date": "2026-03-02", "relevancy": 1.5507, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5532}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4739}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.46 r%20the%20optimization%2C%20explicitly%20guiding%20model%20outputs%20to%20approach%20preferred%20responses%20and%20diverge%20from%20non-preferred%20ones.%20Experimental%20results%20show%20that%20TI-DPO%20achieves%20higher%20accuracy%20and%20stronger%20generative%20diversity%2C%20providing%20more%20stable%20and%20computationally%20efficient%20solutions%20compared%20with%20DPO%20and%20other%20RLHF%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2505.19653v3&entry.124074799=Read"},
{"title": "Learning Boltzmann Generators via Constrained Mass Transport", "author": "Christopher von Klitzing and Denis Blessing and Henrik Schopmans and Pascal Friederich and Gerhard Neumann", "abstract": "Efficient sampling from high-dimensional and multimodal unnormalized probability distributions is a central challenge in many areas of science and machine learning. We focus on Boltzmann generators (BGs) that aim to sample the Boltzmann distribution of physical systems, such as molecules, at a given temperature. Classical variational approaches that minimize the reverse Kullback-Leibler divergence are prone to mode collapse, while annealing-based methods, commonly using geometric schedules, can suffer from mass teleportation and rely heavily on schedule tuning. We introduce Constrained Mass Transport (CMT), a variational framework that generates intermediate distributions under constraints on both the KL divergence and the entropy decay between successive steps. These constraints enhance distributional overlap, mitigate mass teleportation, and counteract premature convergence. Across standard BG benchmarks and the here introduced ELIL tetrapeptide, the largest system studied to date without access to samples from molecular dynamics, CMT consistently surpasses state-of-the-art variational methods, achieving more than 2.5x higher effective sample size while avoiding mode collapse.", "link": "http://arxiv.org/abs/2510.18460v2", "date": "2026-03-02", "relevancy": 2.0055, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5111}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5028}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.496}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Boltzmann%20Generators%20via%20Constrained%20Mass%20Transport&body=Title%3A%20Learning%20Boltzmann%20Generators%20via%20Constrained%20Mass%20Transport%0AAuthor%3A%20Christopher%20von%20Klitzing%20and%20Denis%20Blessing%20and%20Henrik%20Schopmans%20and%20Pascal%20Friederich%20and%20Gerhard%20Neumann%0AAbstract%3A%20Efficient%20sampling%20from%20high-dimensional%20and%20multimodal%20unnormalized%20probability%20distributions%20is%20a%20central%20challenge%20in%20many%20areas%20of%20science%20and%20machine%20learning.%20We%20focus%20on%20Boltzmann%20generators%20%28BGs%29%20that%20aim%20to%20sample%20the%20Boltzmann%20distribution%20of%20physical%20systems%2C%20such%20as%20molecules%2C%20at%20a%20given%20temperature.%20Classical%20variational%20approaches%20that%20minimize%20the%20reverse%20Kullback-Leibler%20divergence%20are%20prone%20to%20mode%20collapse%2C%20while%20annealing-based%20methods%2C%20commonly%20using%20geometric%20schedules%2C%20can%20suffer%20from%20mass%20teleportation%20and%20rely%20heavily%20on%20schedule%20tuning.%20We%20introduce%20Constrained%20Mass%20Transport%20%28CMT%29%2C%20a%20variational%20framework%20that%20generates%20intermediate%20distributions%20under%20constraints%20on%20both%20the%20KL%20divergence%20and%20the%20entropy%20decay%20between%20successive%20steps.%20These%20constraints%20enhance%20distributional%20overlap%2C%20mitigate%20mass%20teleportation%2C%20and%20counteract%20premature%20convergence.%20Across%20standard%20BG%20benchmarks%20and%20the%20here%20introduced%20ELIL%20tetrapeptide%2C%20the%20largest%20system%20studied%20to%20date%20without%20access%20to%20samples%20from%20molecular%20dynamics%2C%20CMT%20consistently%20surpasses%20state-of-the-art%20variational%20methods%2C%20achieving%20more%20than%202.5x%20higher%20effective%20sample%20size%20while%20avoiding%20mode%20collapse.%0ALink%3A%20http%3A//arxiv.org/abs/2510.18460v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__ ar%20dynamics%2C%20CMT%20consistently%20surpasses%20state-of-the-art%20variational%20methods%2C%20achieving%20more%20than%202.5x%20higher%20effective%20sample%20size%20while%20avoiding%20mode%20collapse.&entry.1838667208=http%3A//arxiv.org/abs/2510.18460v2&entry.124074799=Read"},
{"title": "MVR: Multi-view Video Reward Shaping for Reinforcement Learning", "author": "Lirui Luo and Guoxi Zhang and Hongming Xu and Yaodong Yang and Cong Fang and Qing Li", "abstract": "Reward design is of great importance for solving complex tasks with reinforcement learning. Recent studies have explored using image-text similarity produced by vision-language models (VLMs) to augment rewards of a task with visual feedback. A common practice linearly adds VLM scores to task or success rewards without explicit shaping, potentially altering the optimal policy. Moreover, such approaches, often relying on single static images, struggle with tasks whose desired behavior involves complex, dynamic motions spanning multiple visually different states. Furthermore, single viewpoints can occlude critical aspects of an agent's behavior. To address these issues, this paper presents Multi-View Video Reward Shaping (MVR), a framework that models the relevance of states regarding the target task using videos captured from multiple viewpoints. MVR leverages video-text similarity from a frozen pre-trained VLM to learn a state relevance function that mitigates the bias towards specific static poses inherent in image-based methods. Additionally, we introduce a state-dependent reward shaping formulation that integrates task-specific rewards and VLM-based guidance, automatically reducing the influence of VLM guidance once the desired motion pattern is achieved. We confirm the efficacy of the proposed framework with extensive experiments on challenging humanoid locomotion tasks from HumanoidBench and manipulation tasks from MetaWorld, verifying the design choices through ablation studies.", "link": "http://arxiv.org/abs/2603.01694v1", "date": "2026-03-02", "relevancy": 1.6995, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5806}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5629}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MVR%3A%20Multi-view%20Video%20Reward%20Shaping%20for%20Reinforcement%20Learning&body=Title%3A%20MVR%3A%20Multi-view%20Video%20Reward%20Shaping%20for%20Reinforcement%20Learning%0AAuthor%3A%20Lirui%20Luo%20and%20Guoxi%20Zhang%20and%20Hongming%20Xu%20and%20Yaodong%20Yang%20and%20Cong%20Fang%20and%20Qing%20Li%0AAbstract%3A%20Reward%20design%20is%20of%20great%20importance%20for%20solving%20complex%20tasks%20with%20reinforcement%20learning.%20Recent%20studies%20have%20explored%20using%20image-text%20similarity%20produced%20by%20vision-language%20models%20%28VLMs%29%20to%20augment%20rewards%20of%20a%20task%20with%20visual%20feedback.%20A%20common%20practice%20linearly%20adds%20VLM%20scores%20to%20task%20or%20success%20rewards%20without%20explicit%20shaping%2C%20potentially%20altering%20the%20optimal%20policy.%20Moreover%2C%20such%20approaches%2C%20often%20relying%20on%20single%20static%20images%2C%20struggle%20with%20tasks%20whose%20desired%20behavior%20involves%20complex%2C%20dynamic%20motions%20spanning%20multiple%20visually%20different%20states.%20Furthermore%2C%20single%20viewpoints%20can%20occlude%20critical%20aspects%20of%20an%20agent%27s%20behavior.%20To%20address%20these%20issues%2C%20this%20paper%20presents%20Multi-View%20Video%20Reward%20Shaping%20%28MVR%29%2C%20a%20framework%20that%20models%20the%20relevance%20of%20states%20regarding%20the%20target%20task%20using%20videos%20captured%20from%20multiple%20viewpoints.%20MVR%20leverages%20video-text%20similarity%20from%20a%20frozen%20pre-trained%20VLM%20to%20learn%20a%20state%20relevance%20function%20that%20mitigates%20the%20bias%20towards%20specific%20static%20poses%20inherent%20in%20image-based%20methods.%20Additionally%2C%20we%20introduce%20a%20state-dependent%20reward%20shaping%20formulation%20that%20integrates%20task-specific%20rewards%20and%20VLM-based%20guidance%2C%20automatically%20reducing%20the%20influence%20of%20VLM%20guidance%20once%20the%20desired%20motion%20pattern%20is%20achieved.%20We%20confirm%20the%20efficacy%20of%20the%20proposed%20framework%20with%20extensive%20experiments%20on%20challenging%20humanoid%20locomotion%20tasks%20from%20HumanoidBench%20and%20manipulation%20tasks%20from%20MetaWorld%2C%20verifying%20the%20design%20choices%20through%20ablation%20studies.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01694v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMVR%253A%2520Multi-view%2520Video%2520Reward%2520Shaping%2520for%2520Reinforcement%2520Learning%26entry.906535625%3DLirui%2520Luo%2520and%2520Guoxi%2520Zhang%2520and%2520Hongming%2520Xu%2520and%2520Yaodong%2520Yang%2520and%2520Cong%2520Fang%2520and%2520Qing%2520Li%26entry.1292438233%3DReward%2520design%2520is%2520of%2520great%2520importance%2520for%2520solving%2520complex%2520tasks%2520with%2520reinforcement%2520learning.%2520Recent%2520studies%2520have%2520explored%2520using%2520image-text%2520similarity%2520produced%2520by%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520augment%2520rewards%2520of%2520a%2520task%2520with%2520visual%2520feedback.%2520A%2520common%2520practice%2520linearly%2520adds%2520VLM%2520scores%2520to%2520task%2520or%2520success%2520rewards%2520without%2520explicit%2520shaping%252C%2520potentially%2520altering%2520the%2520optimal%2520policy.%2520Moreover%252C%2520such%2520approaches%252C%2520often%2520relying%2520on%2520single%2520static%2520images%252C%2520struggle%2520with%2520tasks%2520whose%2520desired%2520behavior%2520involves%2520complex%252C%2520dynamic%2520motions%2520spanning%2520multiple%2520visually%2520different%2 g%20complex%20tasks%20with%20reinforcement%20learning.%20Recent%20studies%20have%20explored%20using%20image-text%20similarity%20produced%20by%20vision-language%20models%20%28VLMs%29%20to%20augment%20rewards%20of%20a%20task%20with%20visual%20feedback.%20A%20common%20practice%20linearly%20adds%20VLM%20scores%20to%20task%20or%20success%20rewards%20without%20explicit%20shaping%2C%20potentially%20altering%20the%20optimal%20policy.%20Moreover%2C%20such%20approaches%2C%20often%20relying%20on%20single%20static%20images%2C%20struggle%20with%20tasks%20whose%20desired%20behavior%20involves%20complex%2C%20dynamic%20motions%20spanning%20multiple%20visually%20different%20states.%20Furthermore%2C%20single%20viewpoints%20can%20occlude%20critical%20aspects%20of%20an%20agent%27s%20behavior.%20To%20address%20these%20issues%2C%20this%20paper%20presents%20Multi-View%20Video%20Reward%20Shaping%20%28MVR%29%2C%20a%20framework%20that%20models%20the%20relevance%20of%20states%20regarding%20the%20target%20task%20using%20videos%20captured%20from%20multiple%20viewpoints.%20MVR%20leverages%20video-text%20similarity%20from%20a%20frozen%20pre-trained%20VLM%20to%20learn%20a%20state%20relevance%20function%20that%20mitigates%20the%20bias%20towards%20specific%20static%20poses%20inherent%20in%20image-based%20methods.%20Additionally%2C%20we%20introduce%20a%20state-dependent%20reward%20shaping%20formulation%20that%20integrates%20task-specific%20rewards%20and%20VLM-based%20guidance%2C%20automatically%20reducing%20the%20influence%20of%20VLM%20guidance%20once%20the%20desired%20motion%20pattern%20is%20achieved.%20We%20confirm%20the%20efficacy%20of%20the%20proposed%20framework%20with%20extensive%20experiments%20on%20challenging%20humanoid%20locomotion%20tasks%20from%20HumanoidBench%20and%20manipulation%20tasks%20from%20MetaWorld%2C%20verifying%20the%20design%20choices%20through%20ablation%20studies.&entry.1838667208=http%3A//arxiv.org/abs/2603.01694v1&entry.124074799=Read"},
{"title": "MAC: A Conversion Rate Prediction Benchmark Featuring Labels Under Multiple Attribution Mechanisms", "author": "Jinqi Wu and Sishuo Chen and Zhangming Chan and Yong Bai and Lei Zhang and Sheng Chen and Chenghuan Hou and Xiang-Rong Sheng and Han Zhu and Jian Xu and Bo Zheng and Chaoyou Fu", "abstract": "Multi-attribution learning (MAL), which enhances model performance by learning from conversion labels yielded by multiple attribution mechanisms, has emerged as a promising learning paradigm for conversion rate (CVR) prediction. However, the conversion labels in public CVR datasets are generated by a single attribution mechanism, hindering the development of MAL approaches.\n  To address this data gap, we establish the Multi-Attribution Benchmark (MAC), the first public CVR dataset featuring labels from multiple attribution mechanisms. Besides, to promote reproducible research on MAL, we develop PyMAL, an open-source library covering a wide array of baseline methods. We conduct comprehensive experimental analyses on MAC and reveal three key insights: (1) MAL brings consistent performance gains across different attribution settings, especially for users featuring long conversion paths. (2) The performance growth scales up with objective complexity in most settings; however, when predicting first-click conversion targets, simply adding auxiliary objectives is counterproductive, underscoring the necessity of careful selection of auxiliary objectives. (3) Two architectural design principles are paramount: first, to fully learn the multi-attribution knowledge, and second, to fully leverage this knowledge to serve the main task. Motivated by these findings, we propose Mixture of Asymmetric Experts (MoAE), an effective MAL approach incorporating multi-attribution knowledge learning and main task-centric knowledge utilization. Experiments on MAC show that MoAE substantially surpasses the existing state-of-the-art MAL method. We believe that our benchmark and insights will foster future research in the MAL field. Our MAC benchmark and the PyMAL algorithm library are publicly available at https://github.com/alimama-tech/PyMAL.", "link": "http://arxiv.org/abs/2603.02184v1", "date": "2026-03-02", "relevancy": 1.9797, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5009}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4908}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4902}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAC%3A%20A%20Conversion%20Rate%20Prediction%20Benchmark%20Featuring%20Labels%20Under%20Multiple%20Attribution%20Mechanisms&body=Title%3A%20MAC%3A%20A%20Conversion%20Rate%20Prediction%20Benchmark%20Featuring%20Labels%20Under%20Multiple%20Attribution%20Mechanisms%0AAuthor%3A%20Jinqi%20Wu%20and%20Sishuo%20Chen%20and%20Zhangming%20Chan%20and%20Yong%20Bai%20and%20Lei%20Zhang%20and%20Sheng%20Chen%20and%20Chenghuan%20Hou%20and%20Xiang-Rong%20Sheng%20and%20Han%20Zhu%20and%20Jian%20Xu%20and%20Bo%20Zheng%20and%20Chaoyou%20Fu%0AAbstract%3A%20Multi-attribution%20learning%20%28MAL%29%2C%20which%20enhances%20model%20performance%20by%20learning%20from%20conversion%20labels%20yielded%20by%20multiple%20attribution%20mechanisms%2C%20has%20emerged%20as%20a%20promising%20learning%20paradigm%20for%20conversion%20rate%20%28CVR%29%20prediction.%20However%2C%20the%20conversion%20labels%20in%20public%20CVR%20datasets%20are%20generated%20by%20a%20single%20attribution%20mechanism%2C%20hindering%20the%20development%20of%20MAL%20approaches.%0A%20%20To%20address%20this%20data%20gap%2C%20we%20establish%20the%20Multi-Attribution%20Benchmark%20%28MAC%29%2C%20the%20first%20public%20CVR%20dataset%20featuring%20labels%20from%20multiple%20attribution%20mechanisms.%20Besides%2C%20to%20promote%20reproducible%20research%20on%20MAL%2C%20we%20develop%20PyMAL%2C%20an%20open-source%20library%20covering%20a%20wide%20array%20of%20baseline%20methods.%20We%20conduct%20comprehensive%20experimental%20analyses%20on%20MAC%20and%20reveal%20three%20key%20insights%3A%20%281%29%20MAL%20brings%20consistent%20performance%20gains%20across%20different%20attribution%20settings%2C%20especially%20for%20users%20featuring%20long%20conversion%20paths.%20%282%29%20The%20performance%20growth%20scales%20up%20with%20objective%20complexity%20in%20most%20settings%3B%20however%2C%20when%20predicting%20first-click%20conversion%20targets%2C%20simply%20adding%20auxiliary%20objectives%20is%20counterproductive%2C%20underscoring%20the%20necessity%20of%20careful%20selection%20of%20auxiliary%20objectives.%20%283%29%20Two%20architectural%20design%20principles%20are%20paramount%3A%20first%2C%20to%20fully%20learn%20the%20multi-attribution%20knowledge%2C%20and%20second%2C%20to%20fully%20leverage%20this%20knowledge%20to%20serve%20the%20main%20task.%20Motivated%20by%20these%20findings%2C%20we%20propose%20Mixture%20of%20Asymmetric%20Experts%20%28MoAE%29%2C%20an%20effective%20MAL%20approach%20incorporating%20multi-attribution%20knowledge%20learning%20and%20main%20task-centric%20knowledge%20utilization.%20Experiments%20on%20MAC%20show%20that%20MoAE%20substantially%20surpasses%20the%20existing%20state-of-the-art%20MAL%20method.%20We%20believe%20that%20our%20benchmark%20and%20insights%20will%20foster%20future%20research%20in%20the%20MAL%20field.%20Our%20MAC%20benchmark%20and%20the%20PyMAL%20algorithm%20library%20are%20publicly%20available%20at%20https%3A//github.com/alimama-tech/PyMAL.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02184v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAC%253A%2520A {"title": "Untargeted Jailbreak Attack", "author": "Xinzhe Huang and Wenjing Hu and Tianhang Zheng and Kedong Xiu and Xiaojun Jia and Di Wang and Zhan Qin and Kui Ren", "abstract": "Existing gradient-based jailbreak attacks on Large Language Models (LLMs) typically optimize adversarial suffixes to align the LLM output with predefined target responses. However, restricting the objective as inducing fixed targets inherently constrains the adversarial search space, limiting the overall attack efficacy. Furthermore, existing methods typically require numerous optimization iterations to fulfill the large gap between the fixed target and the original LLM output, resulting in low attack efficiency. To overcome these limitations, we propose the first gradient-based untargeted jailbreak attack (UJA), which relies on an untargeted objective to maximize the unsafety probability of the LLM output, without enforcing any response patterns. For tractable optimization, we further decompose this objective into two differentiable sub-objectives to search the optimal harmful response and the corresponding adversarial prompt, with a theoretical analysis to validate the decomposition. In contrast to existing attacks, UJA's unrestricted objective significantly expands the search space, enabling more flexible and efficient exploration of LLM vulnerabilities. Extensive evaluations show that UJA achieves over 80\\% attack success rates against recent safety-aligned LLMs with only 100 optimization iterations, outperforming the state-of-the-art gradient-based attacks by over 30\\%.", "link": "http://arxiv.org/abs/2510.02999v4", "date": "2026-03-02", "relevancy": 1.9225, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5117}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4609}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Untargeted%20Jailbreak%20Attack&body=Title%3A%20Untargeted%20Jailbreak%20Attack%0AAuthor%3A%20Xinzhe%20Huang%20and%20Wenjing%20Hu%20and%20Tianhang%20Zheng%20and%20Kedong%20Xiu%20and%20Xiaojun%20Jia%20and%20Di%20Wang%20and%20Zhan%20Qin%20and%20Kui%20Ren%0AAbstract%3A%20Existing%20gradient-based%20jailbreak%20attacks%20on%20Large%20Language%20Models%20%28LLMs%29%20typically%20optimize%20adversarial%20suffixes%20to%20align%20the%20LLM%20output%20with%20predefined%20target%20responses.%20However%2C%20restricting%20the%20objective%20as%20inducing%20fixed%20targets%20inherently%20constrains%20the%20adversarial%20search%20space%2C%20limiting%20the%20overall%20attack%20efficacy.%20Furthermore%2C%20existing%20methods%20typically%20require%20numerous%20optimization%20iterations%20to%20fulfill%20the%20large%20gap%20between%20the%20fixed%20target%20and%20the%20original%20LLM%20output%2C%20resulting%20in%20low%20attack%20efficiency.%20To%20overcome%20these%20limitations%2C%20we%20propose%20the%20first%20gradient-based%20untargeted%20jailbreak%20attack%20%28UJA%29%2C%20which%20relies%20on%20an%20untargeted%20objective%20to%20maximize%20the%20unsafety%20probability%20of%20the%20LLM%20output%2C%20without%20enforcing%20any%20response%20patterns.%20For%20tractable%20optimization%2C%20we%20further%20decompose%20this%20objective%20into%20two%20differentiable%20sub-objectives%20to%20search%20the%20optimal%20harmful%20response%20and%20the%20corresponding%20adversarial%20prompt%2C%20with%20a%20theoretical%20analysis%20to%20validate%20the%20decomposition.%20In%20contrast%20to%20existing%20attacks%2C%20UJA%27s%20unrestricted%20objective%20significantly%20expands%20the%20search%20space%2C%20enabling%20more%20flexible%20and%20efficient%20exploration%20of%20LLM%20vulnerabilities. {"title": "Doubly-Robust LLM-as-a-Judge: Externally Valid Estimation with Imperfect Personas", "author": "Luke Guerdan and Justin Whitehouse and Kimberly Truong and Kenneth Holstein and Zhiwei Steven Wu", "abstract": "As Generative AI (GenAI) systems see growing adoption, a key concern involves the external validity of evaluations, or the extent to which they generalize from lab-based to real-world deployment conditions. Threats to the external validity of GenAI evaluations arise when the source sample of human raters and system outputs used to obtain a system quality estimate differs from the target distribution at deployment time. In this work, we propose a doubly-robust estimation framework designed to address this evaluation sampling bias. Key to our approach is the use of \"persona\" ratings produced by prompting an LLM evaluator (i.e., an LLM-as-a-judge) to behave as a human rater with specific sociodemographic characteristics. Our doubly-robust framework combines these informative yet imperfect persona ratings with human ratings obtained under evaluation sampling bias to produce statistically valid system quality estimates. In particular, we show that our approach yields valid system quality estimates when either (i) a model trained to predict human ratings using persona ratings and source data observed under sampling bias, or (ii) a reweighting model that corrects for sampling bias is of sufficient quality. We validate our framework theoretically and via a novel Persona Simulation Framework (PSF) designed to systematically manipulate persona quality and the degree of evaluation sampling bias present in source data. Our work provides a principled foundation for combining imperfect persona ratings with human ratings observed under sampling bias to obtain valid system quality estimates.", "link": "http://arxiv.org/abs/2509.22957v2", "date": "2026-03-02", "relevancy": 1.5468, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.52}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5148}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Doubly-Robust%20LLM-as-a-Judge%3A%20Externally%20Valid%20Estimation%20with%20Imperfect%20Personas&body=Title%3A%20Doubly-Robust%20LLM-as-a-Judge%3A%20Externally%20Valid%20Estimation%20with%20Imperfect%20Personas%0AAuthor%3A%20Luke%20Guerdan%20and%20Justin%20Whitehouse%20and%20Kimberly%20Truong%20and%20Kenneth%20Holstein%20and%20Zhiwei%20Steven%20Wu%0AAbstract%3A%20As%20Generative%20AI%20%28GenAI%29%20systems%20see%20growing%20adoption%2C%20a%20key%20concern%20involves%20the%20external%20validity%20of%20evaluations%2C%20or%20the%20extent%20to%20which%20they%20generalize%20from%20lab-based%20to%20real-world%20deployment%20conditions.%20Threats%20to%20the%20external%20validity%20of%20GenAI%20evaluations%20arise%20when%20the%20source%20sample%20of%20human%20raters%20and%20system%20outputs%20used%20to%20obtain%20a%20system%20quality%20estimate%20differs%20from%20the%20target%20distribution%20at%20deployment%20time.%20In%20this%20work%2C%20we%20propose%20a%20doubly-robust%20estimation%20framework%20designed%20to%20address%20this%20evaluation%20sampling%20bias.%20Key%20to%20our%20approach%20is%20the%20use%20of%20%22persona%22%20ratings%20produced%20by%20prompting%20an%20LLM%20evaluator%20%28i.e.%2C%20an%20LLM-as-a-judge%29%20to%20behave%20as%20a%20human%20rater%20with%20specific%20sociodemographic%20characteristics.%20Our%20doubly-robust%20framework%20combines%20these%20informative%20yet%20imperfect%20persona%20ratings%20with%20human%20ratings%20obtained%20under%20evaluation%20sampling%20bias%20to%20produce%20statistically%20valid%20system%20quality%20estimates.%20In%20particular%2C%20we%20show%20that%20our%20approach%20yields%20valid%20system%20quality%20estimates%20when%20either%20%28i%29%20a%20model%20trained%20to%20predict%20human%20ratings%20using%20persona%20ratings%20and%20source%20data%20observed%20under%20sampling%20bias%2C%20or%20%28ii%29%20a%20reweighting%20model%20that%20corrects%20for%20sampling%20bias%20is%20of%20sufficient%20quality.%20We%20validate%20our%20framework%20theoretically%20and%20via%20a%20novel%20Persona%20Simulation%20Framework%20%28PSF%29%20designed%20to%20systematically%20manipulate%20persona%20quality%20and%20the%20degree%20of%20evaluation%20sampling%20bias%20present%20in%20source%20data.%20Our%20work%20provides%20a%20principled%20foundation%20for%20combining%20imperfect%20persona%20ratings%20with%20human%20ratings%20observed%20under%20sampling%20bias%20to%20obtain%20valid%20system%20quality%20estimates.%0ALink%3A%20http%3A//arxiv.org/abs/2509.22957v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDoubly-Robust%2520LLM-as-a-Judge%253A%2520Externally%2520Valid%2520Estimation%2520with%2520Imperfect%2520Personas%26entry.906535625%3DLuke%2520Guerdan%2520and%2520Justin%2520Whitehouse%2520and%2520Kimberly%2520Truong%2520and%2520Kenneth%2520Holstein%2520and%2520Zhiwei%2520Steven%2520Wu%26entry.1292438233%3DAs%2520Generative%2520AI%2520%2528GenAI%2529%2520systems%2520see%2520growing%2520adoption%252C%2520a%2520key%2520concern%2520involves%2520the%2520external%2520validity%2520of%2520evaluations%252C%2520or%2520the%2520extent%2520to%2520which%2520they%2520generalize%2520from%2520lab-based%2520to%2520real-world%2520deployment%2520conditions.%2520Threats%2520to%2520the%2520external%2520validity%2520of%2520GenAI%252 %2520combining%2520imperfect%2520persona%2520ratings%2520with%2520human%2520ratings%2520observed%2520under%2520sampling%2520bias%2520to%2520obtain%2520valid%2520system%2520quality%2520estimates.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.22957v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Doubly-Robust%20LLM-as-a-Judge%3A%20Externally%20Valid%20Estimation%20with%20Imperfect%20Personas&entry.906535625=Luke%20Guerdan%20and%20Justin%20Whitehouse%20and%20Kimberly%20Truong%20and%20Kenneth%20Holstein%20and%20Zhiwei%20Steven%20Wu&entry.1292438233=As%20Generative%20AI%20%28GenAI%29%20systems%20see%20growing%20adoption%2C%20a%20key%20concern%20involves%20the%20external%20validity%20of%20evaluations%2C%20or%20the%20extent%20to%20which%20they%20generalize%20from%20lab-based%20to%20real-world%20deployment%20conditions.%20Threats%20to%20the%20external%20validity%20of%20GenAI%20evaluations%20arise%20when%20the%20source%20sample%20of%20human%20raters%20and%20system%20outputs%20used%20to%20obtain%20a%20system%20quality%20estimate%20differs%20from%20the%20target%20distribution%20at%20deployment%20time.%20In%20this%20work%2C%20we%20propose%20a%20doubly-robust%20estimation%20framework%20designed%20to%20address%20this%20evaluation%20sampling%20bias.%20Key%20to%20our%20approach%20is%20the%20use%20of%20%22persona%22%20ratings%20produced%20by%20prompting%20an%20LLM%20evaluator%20%28i.e.%2C%20an%20LLM-as-a-judge%29%20to%20behave%20as%20a%20human%20rater%20with%20specific%20sociodemographic%20characteristics.%20Our%20doubly-robust%20framework%20combines%20these%20informative%20yet%20imperfect%20persona%20ratings%20with%20human%20ratings%20obtained%20under%20evaluation%20sampling%20bias%20to%20produce%20statistically%20valid%20system%20quality%20estimates.%20In%20particular%2C%20we%20show%20that%20our%20approach%20yields%20valid%20system%20quality%20estimates%20when%20either%2 {"title": "Co-Evolutionary Multi-Modal Alignment via Structured Adversarial Evolution", "author": "Guoxin Shi and Haoyu Wang and Zaihui Yang and Yuxing Wang and Yongzhe Chang", "abstract": "Adversarial behavior plays a central role in aligning large language models with human values. However, existing alignment methods largely rely on static adversarial settings, which fundamentally limit robustness, particularly in multimodal settings with a larger attack surface. In this work, we move beyond static adversarial supervision and introduce co-evolutionary alignment with evolving attacks, instantiated by CEMMA (Co-Evolutionary Multi-Modal Alignment), an automated and adaptive framework for multimodal safety alignment. We introduce an Evolutionary Attacker that decomposes adversarial prompts into method templates and harmful intents. By employing genetic operators, including mutation, crossover, and differential evolution, it enables simple seed attacks to inherit the structural efficacy of sophisticated jailbreaks. The Adaptive Defender is iteratively updated on the synthesized hard negatives, forming a closed-loop process that adapts alignment to evolving attacks. Experiments show that the Evolutionary Attacker substantially increases red-teaming jailbreak attack success rate (ASR), while the Adaptive Defender improves robustness and generalization across benchmarks with higher data efficiency, without inducing excessive benign refusal, and remains compatible with inference-time defenses such as AdaShield.", "link": "http://arxiv.org/abs/2603.01784v1", "date": "2026-03-02", "relevancy": 2.0117, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5241}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.491}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4797}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Co-Evolutionary%20Multi-Modal%20Alignment%20via%20Structured%20Adversarial%20Evolution&body=Title%3A%20Co-Evolutionary%20Multi-Modal%20Alignment%20via%20Structured%20Adversarial%20Evolution%0AAuthor%3A%20Guoxin%20Shi%20and%20Haoyu%20Wang%20and%20Zaihui%20Yang%20and%20Yuxing%20Wang%20and%20Yongzhe%20Chang%0AAbstract%3A%20Adversarial%20behavior%20plays%20a%20central%20role%20in%20aligning%20large%20language%20models%20with%20human%20values.%20However%2C%20existing%20alignment%20methods%20largely%20rely%20on%20static%20adversarial%20settings%2C%20which%20fundamentally%20limit%20robustness%2C%20particularly%20in%20multimodal%20settings%20with%20a%20larger%20attack%20surface.%20In%20this%20work%2C%20we%20move%20beyond%20static%20adversarial%20supervision%20and%20introduce%20co-evolutionary%20alignment%20with%20evolving%20attacks%2C%20instantiated%20by%20CEMMA%20%28Co-Evolutionary%20Multi-Modal%20Alignment%29%2C%20an%20automated%20and%20adaptive%20framework%20for%20multimodal%20safety%20alignment.%20We%20introduce%20an%20Evolutionary%20Attacker%20that%20decomposes%20adversarial%20prompts%20into%20method%20templates%20and%20harmful%20intents.%20By%20employing%20genetic%20operators%2C%20including%20mutation%2C%20crossover%2C%20and%20differential%20evolution%2C%20it%20enables%20simple%20seed%20attacks%20to%20inherit%20the%20structural%20efficacy%20of%20sophisticated%20jailbreaks.%20The%20Adaptive%20Defender%20is%20iteratively%20updated%20on%20the%20synthesized%20hard%20negatives%2C%20forming%20a%20closed-loop%20process%20that%20adapts%20alignment%20to%20evolving%20attacks.%20Experiments%20show%20that%20the%20Evolutionary%20Attacker%20substantially%20increases%20red-teaming%20jailbreak%20attack%20success%20rate%20%28ASR%29%2C%20while%20the%20Adaptive%20Defender%20improves%20robustness%20and%20generalization%20across%20benchmarks%20with%20higher%20data%20efficiency%2C%20without%20inducing%20excessive%20benign%20refusal%2C%20and%20remains%20compatible%20with%20inference-time%20defenses%20such%20as%20AdaShield.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01784v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCo-Evolutionary%2520Multi-Modal%2520Alignment%2520via%2520Structured%2520Adversarial%2520Evolution%26entry.906535625%3DGuoxin%2520Shi%2520and%2520Haoyu%2520Wang%2520and%2520Zaihui%2520Yang%2520and%2520Yuxing%2520Wang%2520and%2520Yongzhe%2520Chang%26entry.1292438233%3DAdversarial%2520behavior%2520plays%2520a%2520central%2520role%2520in%2520aligning%2520large%2520language%2520models%2520with%2520human%2520values.%2520However%252C%2520existing%2520alignment%2520methods%2520largely%2520rely%2520on%2520static%2520adversarial%2520settings%252C%2520which%2520fundamentally%2520limit%2520robustness%252C%2520particularly%2520in%2520multimodal%2520settings%2520with%2520a%2520larger%2520attack%2520surface.%2520In%2520this%2520work%252C%2520we%2520move%2520beyond%2520static%2520adversarial%2520supervision%2520and%2520introduce%2520co-evolutionary%2520alignment%2520with%2520evolving%2520attacks%252C%2520instantiated%2520by%2520CEMMA%2520%2528Co-Evolutionary%2520Multi-Modal%2520Alignment%2529%252C%2520an%2520automated%2520and%2520adaptive%2520framework%2520for%2520multimodal%2520safety%2520alignment.%2520We%2520introduce%2520an%2520Evolutionary%2520Attacker%2520that%2520decomposes%2520adversarial%2520prompts%2520into%2520method%2520templates%2520and%2520harmful%2520intents.%2520By%2520employing%2520genetic%2520operators%252C%2520including%2520mutation%252C%2520crossover%252C%2520and%2520differential%2520evolution%252C%2520it%2520enables%2520simple%2520seed%2520attacks%2520to%2520inherit%2520the%2520structural%2520efficacy%2520of%2520sophisticated%2520ja {"title": "Real-Time Thermal-Inertial Odometry on Embedded Hardware for High-Speed GPS-Denied Flight", "author": "Austin Stone and Mark Petersen and Cammy Peterson", "abstract": "We present a real-time monocular thermal-inertial odometry system designed for high-velocity, GPS-denied flight on embedded hardware. The system fuses measurements from a FLIR Boson+ 640 longwave infrared camera, a high-rate IMU, a laser range finder, a barometer, and a magnetometer within a fixed-lag factor graph. To sustain reliable feature tracks under motion blur, low contrast, and rapid viewpoint changes, we employ a lightweight thermal-optimized front-end with multi-stage feature filtering. Laser range finder measurements provide per-feature depth priors that stabilize scale during weakly observable motion. High-rate inertial data is first pre-filtered using a Chebyshev Type II infinite impulse response (IIR) filter and then preintegrated, improving robustness to airframe vibrations during aggressive maneuvers. To address barometric altitude errors induced at high airspeeds, we train an uncertainty-aware gated recurrent unit (GRU) network that models the temporal dynamics of static pressure distortion, outperforming polynomial and multi-layer perceptron (MLP) baselines. Integrated on an NVIDIA Jetson Xavier NX, the complete system supports closed-loop quadrotor flight at 30 m/s with drift under 2% over kilometer-scale trajectories. These contributions expand the operational envelope of thermal-inertial navigation, enabling reliable high-speed flight in visually degraded and GPS-denied environments.", "link": "http://arxiv.org/abs/2603.02114v1", "date": "2026-03-02", "relevancy": 2.1504, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5434}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxi n%20%28MLP%29%20baselines.%20Integrated%20on%20an%20NVIDIA%20Jetson%20Xavier%20NX%2C%20the%20complete%20system%20supports%20closed-loop%20quadrotor%20flight%20at%2030%20m/s%20with%20drift%20under%202%25%20over%20kilometer-scale%20trajectories.%20These%20contributions%20expand%20the%20operational%20envelope%20of%20thermal-inertial%20navigation%2C%20enabling%20reliable%20high-speed%20flight%20in%20visually%20degraded%20and%20GPS-denied%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReal-Time%2520Thermal-Inertial%2520Odometry%2520on%2520Embedded%2520Hardware%2520for%2520High-Speed%2520GPS-Denied%2520Flight%26entry.906535625%3DAustin%2520Stone%2520and%2520Mark%2520Petersen%2520and%2520Cammy%2520Peterson%26entry.1292438233%3DWe%2520present%2520a%2520real-time%2520monocular%2520thermal-inertial%2520odometry%2520system%2520designed%2520for%2520high-velocity%252C%2520GPS-denied%2520flight%2520on%2520embedded%2520hardware.%2520The%2520system%2520fuses%2520measurements%2520from%2520a%2520FLIR%2520Boson%252B%2520640%2520longwave%2520infrared%2520camera%252C%2520a%2520high-rate%2520IMU%252C%2520a%2520laser%2520range%2520finder%252C%2520a%2520barometer%252C%2520and%2520a%2520magnetometer%2520within%2520a%2520fixed-lag%2520factor%2520graph.%2520To%2520sustain%2520reliable%2520feature%2520tracks%2520under%2520motion%2520blur%252C%2520low%2520contrast%252C%2520and%2520rapid%2520viewpoint%2520changes%252C%2520we%2520employ%2520a%2520lightweight%2520thermal-optimized%2520front-end%2520with%2520multi-stage%2520feature%2520filtering.%2520Laser%2520range%2520finder%2520measurements%2520provide%2520per-feature%2520depth%2520priors%2520that%2520stabilize%2520scale%2520during%2520weakly%2520observable%2520motion.%2520High-rate%2520inertial%2520data%2520is%2520first%2520pre-filtered%2520using%2520a%2520Chebyshev%2520Type%2520II%2520infinite% {"title": "NICO-RAG: Multimodal Hypergraph Retrieval-Augmented Generation for Understanding the Nicotine Public Health Crisis", "author": "Manuel Serna-Aguilera and Raegan Anderes and Page Dobbs and Khoa Luu", "abstract": "The nicotine addiction public health crisis continues to be pervasive. In this century alone, the tobacco industry has released and marketed new products in an aggressive effort to lure new and young customers for life. Such innovations and product development, namely flavored nicotine or tobacco such as nicotine pouches, have undone years of anti-tobacco campaign work. Past work is limited both in scope and in its ability to connect large-scale data points. Thus, we introduce the Nicotine Innovation Counter-Offensive (NICO) Dataset to provide public health researchers with over 200,000 multimodal samples, including images and text descriptions, on 55 tobacco and nicotine product brands. In addition, to provide public health researchers with factual connections across a large-scale dataset, we propose NICO-RAG, a retrieval-augmented generation (RAG) framework that can retrieve image features without incurring the high-cost of language models, as well as the added cost of processing image tokens with large-scale datasets such as NICO. At construction time, NICO-RAG organizes image- and text-extracted entities and relations into hypergraphs to produce as factual responses as possible. This joint multimodal knowledge representation enables NICO-RAG to retrieve images for query answering not only by visual similarity but also by the semantic similarity of image descriptions. Experimentals show that without needing to process additional tokens from images for over 100 questions, NICO-RAG performs comparably to the state-of-the-art RAG method adapted for images.", "link": "http://arxiv.org/abs/2603.02047v1", "date": "2026-03-02", "relevancy": 1.843, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Dif       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

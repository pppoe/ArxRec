{"title": "3D Field of Junctions: A Noise-Robust, Training-Free Structural Prior for Volumetric Inverse Problems", "author": "Namhoon Kim and Narges Moeini and Justin Romberg and Sara Fridovich-Keil", "abstract": "Volume denoising is a foundational problem in computational imaging, as many 3D imaging inverse problems face high levels of measurement noise. Inspired by the strong 2D image denoising properties of Field of Junctions (ICCV 2021), we propose a novel, fully volumetric 3D Field of Junctions (3D FoJ) representation that optimizes a junction of 3D wedges that best explain each 3D patch of a full volume, while encouraging consistency between overlapping patches. In addition to direct volume denoising, we leverage our 3D FoJ representation as a structural prior that: (i) requires no training data, and thus precludes the risk of hallucination, (ii) preserves and enhances sharp edge and corner structures in 3D, even under low signal to noise ratio (SNR), and (iii) can be used as a drop-in denoising representation via projected or proximal gradient descent for any volumetric inverse problem with low SNR. We demonstrate successful volume reconstruction and denoising with 3D FoJ across three diverse 3D imaging tasks with low-SNR measurements: low-dose X-ray computed tomography (CT), cryogenic electron tomography (cryo-ET), and denoising point clouds such as those from lidar in adverse weather. Across these challenging low-SNR volumetric imaging problems, 3D FoJ outperforms a mixture of classical and neural methods.", "link": "http://arxiv.org/abs/2603.02149v1", "date": "2026-03-02", "relevancy": 2.7085, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.585}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5201}, {"title": "CAT3D: Create Anything in 3D with Multi-View Di {"title": "Brain-Semantoks: Learning Semantic Tokens of Brain Dynamics with a Self-Distilled Foundation Model", "author": "Sam Gijsen and Marc-Andre Schulz and Kerstin Ritter", "abstract": "The development of foundation models for functional magnetic resonance imaging (fMRI) time series holds significant promise for predicting phenotypes related to disease and cognition. Current models, however, are often trained using a mask-and-reconstruct objective on small brain regions. This focus on low-level information leads to representations that are sensitive to noise and temporal fluctuations, necessitating extensive fine-tuning for downstream tasks. We introduce Brain-Semantoks, a self-supervised framework designed specifically to learn abstract representations of brain dynamics. Its architecture is built on two core innovations: a semantic tokenizer that aggregates noisy regional signals into robust tokens representing functional networks, and a self-distillation objective that enforces representational stability across time. We show that this objective is stabilized through a novel training curriculum, ensuring the model robustly learns meaningful features from low signal-to-noise time series. We demonstrate that learned representations enable strong performance on a variety of downstream tasks even when only using a linear probe. Furthermore, we provide comprehensive scaling analyses indicating more unlabeled data reliably results in out-of-distribution performance gains without domain adaptation.", "link": "http://arxiv.org/abs/2512.11582v2", "date": "2026-03-02", "relevancy": 2.707, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5441}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5441}, {"title": "ToDo: Token Downsampling for Efficient Gene {"title": "OmniRet: Efficient and High-Fidelity Omni Modality Retrieval", "author": "Chuong Huynh and Manh Luong and Abhinav Shrivastava", "abstract": "Multimodal retrieval is the task of aggregating information from queries across heterogeneous modalities to retrieve desired targets. State-of-the-art multimodal retrieval models can understand complex queries, yet they are typically limited to two modalities: text and vision. This limitation impedes the development of universal retrieval systems capable of comprehending queries that combine more than two modalities. To advance toward this goal, we present OmniRet, the first retrieval model capable of handling complex, composed queries spanning three key modalities: text, vision, and audio. Our OmniRet model addresses two critical challenges for universal retrieval: computational efficiency and representation fidelity. First, feeding massive token sequences from modality-specific encoders to Large Language Models (LLMs) is computationally inefficient. We therefore introduce an attention-based resampling mechanism to generate compact, fixed-size representations from these sequences. Second, compressing rich omni-modal data into a single embedding vector inevitably causes information loss and discards fine-grained details. We propose Attention Sliced Wasserstein Pooling to preserve these fine-grained details, leading to improved omni-modal representations. OmniRet is trained on an aggregation of approximately 6 million query-target pairs spanning 30 datasets. We benchmark our model on 13 retrieval tasks and a MMEBv2 subset. Our model demonstrates significant improvements on composed query, audio and video retrieval tasks, while achieving on-par performance with state-of-the-art models on others. Furthermore, we curate a new Audio-Centric Multimodal Benchmark (ACM). This new benchmark introduces two critical, previously missing tasks-composed audio retrieval and audio-visual retrieval to more comprehensively evaluate a {"title": "HierLoc: Hyperbolic Entity Embeddings for Hierarchical Visual Geolocation", "author": "Hari Krishna Gadi and Daniel Matos and Hongyi Luo and Lu Liu and Yongliang Wang and Yanfeng Zhang and Liqiu Meng", "abstract": "Visual geolocalization, the task of predicting where an image was taken, remains challenging due to global scale, visual ambiguity, and the inherently hierarchical structure of geography. Existing paradigms rely on either large-scale retrieval, which requires storing a large number of image embeddings, grid-based classifiers that ignore geographic continuity, or generative models that diffuse over space but struggle with fine detail. We introduce an entity-centric formulation of geolocation that replaces image-to-image retrieval with a compact hierarchy of geographic entities embedded in Hyperbolic space. Images are aligned directly to country, region, subregion, and city entities through Geo-Weighted Hyperbolic contrastive learning by directly incorporating haversine distance into the contrastive objective. This hierarchical design enables interpretable predictions and efficient inference with 240k entity embeddings instead of over 5 million image embeddings on the OSV5M benchmark, on which our method establishes a new state-of-the-art performance. Compared to the current methods in the literature, it reduces mean geodesic error by 19.5\\%, while improving the fine-grained subregion accuracy by 43%. These results demonstrate that geometry-aware hierarchical embeddings provide a scalable and conceptually new alternative for global image geolocation.", "link": "http://arxiv.org/abs/2601.23064v2", "date": "2026-03-02", "relevancy": 2.7044, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.576}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5235}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5231}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HierLoc%3A%20Hyperbolic%20Entity%20Embeddings%20for%20Hierarchical%20Visual%20Geolocation&body=Title%3A%20HierLoc%3A%20Hyperbolic%20Entity%20Embeddings%20for%20Hierarchical%20Visual%20Geolocation%0AAuthor%3A%20Hari%20Krishna%20Gadi%20and%20Daniel%20Matos%20and%20Hongyi%20Luo%20and%20Lu%20Liu%20and%20Yongliang%20Wang%20and%20Yanfeng%20Zhang%20and%20Liqiu%20Meng%0AAbstract%3A%20Visual%20geolocalization%2C%20the%20task%20of%20predicting%20where%20an%20image%20was%20taken%2C%20remains%20challenging%20due%20to%20global%20scale%2C%20visual%20ambiguity%2C%20and%20the%20inherently%20hierarchical%20structure%20of%20geography.%20Existing%20paradigms%20rely%20on%20either%20large-scale%20retrieval%2C%20which%20requires%20storing%20a%20large%20number%20of%20image%20embeddings%2C%20grid-based%20classifiers%20that%20ignore%20geographic%20continuity%2C%20or%20generative%20models%20that%20diffuse%20over%20space%20but%20struggle%20with%20fine%20detail.%20We%20introduce%20an%20entity-centric%20formulation%20of%20geolocation%20that%20replaces%20image-to-image%20retrieval%20with%20a%20compact%20hierarchy%20of%20geographic%20entities%20embedded%20in%20Hyperbolic%20space.%20Images%20are%20aligned%20directly%20to%20country%2C%20region%2C%20subregion%2C%20and%20city%20entities%20through%20Geo-Weighted%20Hyperbolic%20contrastive%20learning%20by%20directly%20incorporating%20haversine%20distance%20into%20the%20contrastive%20objective.%20This%20hierarchical%20design%20enables%20interpretable%20predictions%20and%20efficient%20inference%20with%20240k%20entity%20embeddings%20instead%20of%20over%205%20million%20image%20embeddings%20on%20the%20OSV5M%20benchmark%2C%20on%20which%20our%20method%20establishes%20a%20new%20state-of-the-art%20per {"title": "How Do Optical Flow and Textual Prompts Collaborate to Assist in Audio-Visual Semantic Segmentation?", "author": "Yujian Lee and Peng Gao and Yongqi Xu and Wentao Fan", "abstract": "Audio-visual semantic segmentation (AVSS) represents an extension of the audio-visual segmentation (AVS) task, necessitating a semantic understanding of audio-visual scenes beyond merely identifying sound-emitting objects at the visual pixel level. Contrary to a previous methodology, by decomposing the AVSS task into two discrete subtasks by initially providing a prompted segmentation mask to facilitate subsequent semantic analysis, our approach innovates on this foundational strategy. We introduce a novel collaborative framework, \\textit{S}tepping \\textit{S}tone \\textit{P}lus (SSP), which integrates optical flow and textual prompts to assist the segmentation process. In scenarios where sound sources frequently coexist with moving objects, our pre-mask technique leverages optical flow to capture motion dynamics, providing essential temporal context for precise segmentation. To address the challenge posed by stationary sound-emitting objects, such as alarm clocks, SSP incorporates two specific textual prompts: one identifies the category of the sound-emitting object, and the other provides a broader description of the scene. Additionally, we implement a visual-textual alignment module (VTA) to facilitate cross-modal integration, delivering more coherent and contextually relevant semantic interpretations. Our training regimen involves a post-mask technique aimed at compelling the model to learn the diagram of the optical flow. Experimental results demonstrate that SSP outperforms existing AVS methods, delivering efficient and precise segmentation results.", "link": "http://arxiv.org/abs/2601.08133v2", "date": "2026-03-02", "relevancy": 2.6914, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5487}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5487}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5174}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20Do%20Optical%20Flow%20and%20Textual%20Prompts%20Collaborate%20to%20Assist%20in%20Audio-Visual%20Semantic%20Segmentation%3F&body=Title%3A%20How%20Do%20Optical%20Flow%20and%20Textual%20Prompts%20Collaborate%20to%20Assist%20in%20Audio-Visual%20Semantic%20Segmentation%3F%0AAuthor%3A%20Yujian%20Lee%20and%20Peng%20Gao%20and%20Yongqi%20Xu%20and%20Wentao%20Fan%0AAbstract%3A%20Audio-visual%20semantic%20segmentation%20%28AVSS%29%20represents%20an%20extension%20of%20the%20audio-visual%20segmentation%20%28AVS%29%20task%2C%20necessitating%20a%20semantic%20understanding%20of%20audio-visual%20scenes%20beyond%20merely%20identifying%20sound-emitting%20objects%20at%20the%20visual%20pixel%20level.%20Contrary%20to%20a%20previous%20methodology%2C%20by%20decomposing%20the%20AVSS%20task%20into%20two%20discrete%20subtasks%20by%20initially%20providing%20a%20prompted%20segmentation%20mask%20to%20facilitate%20subsequent%20semantic%20analysis%2C%20our%20approach%20innovates%20on%20this%20foundational%20strategy.%20We%20introduce%20a%20novel%20collaborative%20framework%2C%20%5Ctextit%7BS%7Dtepping%20%5Ctextit%7BS%7Dtone%20%5Ctextit%7BP%7Dlus%20%28SSP%29%2C%20which%20integrates%20optical%20flow%20and%20textual%20prompts%20to%20assist%20the%20segmentation%20process.%20In%20scenarios%20where%20sound%20sources%20frequently%20coexist%20with%20moving%20objects%2C%20our%20pre-mask%20technique%20leverages%20optical%20flow%20to%20capture%20motion%20dynamics%2C%20providing%20essential%20temporal%20context%20for%20precise%20segmentation.%20To%20address%20the%20challenge%20posed%20by%20stationary%20sound-emitting%20objects%2C%20such%20as%20alarm%20clocks%2C%20SSP%20incorporates%20two%20specific%20textual%20prompts%3A%20one%20identifies%20the%20category%20of%20the%20sound-emitting%20object%2C%20and%20the%20other%20provides%20a%20broader%20description%20of%20the%20scene.%20Additionally%2C%20we%20implement%20a%20visual-textual%20alignment%20module%20%28VTA%29%20to%20facilitate%20cross-modal%20integration%2C%20delivering%20more%20coherent%20and%20contextually%20relevant%20semantic%20interpretations.%20Our%20training%20regimen%20involves%20a%20post-mask%20technique%20aimed%20at%20compelling%20the%20model%20to%20learn%20the%20diagram%20of%20the%20optical%20flow.%20Experimental%20results%20demonstrate%20that%20SSP%20outperforms%20existing%20AVS%20methods%2C%20delivering%20efficient%20and%20precise%20segmentation%20results.%0ALink%3A%20http%3A//arxiv.org/abs/2601.08133v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520Do%2520Optical%2520Flow%2520and%2520Textual%2520Prompts%2520Collaborate%2520to%2520Assist%2520in%2520Audio-Visual%2520Semantic%2520Segmentation%253F%26entry.906535625%3DYujian%2520Lee%2520and%2520Peng%2520Gao%2520and%2520Yongqi%2520Xu%2520and%2520Wentao%2520Fan%26entry.1292438233%3DAudio-visual%2520semantic%2520segmentation%2520%2528AVSS%2529%2520represents%2520an%2520extension%2520of%2520the%2520audio-visual%2520segmentation%2520%2528AVS%2529%2520task%252C%2520necessitating%2520a%2520semantic%2520understanding%2520of%2520audio-visual%2520scenes%2520beyond%2520merely%2520identifying%2520sound-emitting%2520objects%2520at%2520the%2520visual%2520pixel%2520level.%2520Contrary%2520to%2520a%2520previous%2520methodology%252C%2520by%2520decomposing%2520the%2520AVSS%2520task%2520into%2520two%2520discrete%2520subtasks%2520by%2520initially%2520providing%2520a%2520prompted%2520segmentation%2520mask%2520to%2520facilitate%2520subsequent%2520semantic%2520analysis%252C% _1rDj9BurNNxUPYQ/viewform?entry.1380929848=How%20Do%20Optical%20Flow%20and%20Textual%20Prompts%20Collaborate%20to%20Assist%20in%20Audio-Visual%20Semantic%20Segmentation%3F&entry.906535625=Yujian%20Lee%20and%20Peng%20Gao%20and%20Yongqi%20Xu%20and%20Wentao%20Fan&entry.1292438233=Audio-visual%20semantic%20segmentation%20%28AVSS%29%20represents%20an%20extension%20of%20the%20audio-visual%20segmentation%20%28AVS%29%20task%2C%20necessitating%20a%20semantic%20understanding%20of%20audio-visual%20scenes%20beyond%20merely%20identifying%20sound-emitting%20objects%20at%20the%20visual%20pixel%20level.%20Contrary%20to%20a%20previous%20methodology%2C%20by%20decomposing%20the%20AVSS%20task%20into%20two%20discrete%20subtasks%20by%20initially%20providing%20a%20prompted%20segmentation%20mask%20to%20facilitate%20subsequent%20semantic%20analysis%2C%20our%20approach%20innovates%20on%20this%20foundational%20strategy.%20We%20introduce%20a%20novel%20collaborative%20framework%2C%20%5Ctextit%7BS%7Dtepping%20%5Ctextit%7BS%7Dtone%20%5Ctextit%7BP%7Dlus%20%28SSP%29%2C%20which%20integrates%20optical%20flow%20and%20textual%20prompts%20to%20assist%20the%20segmentation%20process.%20In%20scenarios%20where%20sound%20sources%20frequently%20coexist%20with%20moving%20objects%2C%20our%20pre-mask%20technique%20leverages%20optical%20flow%20to%20capture%20motion%20dynamics%2C%20providing%20essential%20temporal%20context%20for%20precise%20segmentation.%20To%20address%20the%20challenge%20posed%20by%20stationary%20sound-emitting%20objects%2C%20such%20as%20alarm%20clocks%2C%20SSP%20incorporates%20two%20specific%20textual%20prompts%3A%20one%20identifies%20the%20category%20of%20the%20sound-emitting%20object%2C%20and%20the%20other%20provides%20a%20broader%20description%20of%20the%20scene.%20Additionally%2C%20we%20implement%20a%20visual-textual%20alignment%20module%20%28VTA%29%20to%20facilitate%20cross-modal%20integration%2C%20delivering%20more%20coherent%20and%20contextually%20relevant%20semantic%20interpretations.%2 {"title": "SSFMamba: Learning Symmetry-driven Spatial-Frequency Modeling for Physically Consistent 3D Medical Image Segmentation", "author": "Bo Zhang and Yifan Zhang and Shuo Yan and Yu Bai and Zheng Zhang and Wu Liu and Wendong Wang and Yongdong Zhang", "abstract": "Accurate 3D medical image segmentation requires a delicate balance between fine-grained local details and global contextual understanding. While spatial-domain models often struggle with long-range dependencies, existing frequency-based approaches frequently overlook intrinsic spectral properties such as Hermitian symmetry, leading to suboptimal feature integration. In this paper, we propose SSFMamba, a Mamba based Symmetry-driven Spatial-Frequency fusion framework tailored for 3D medical imaging. Our architecture employs a complementary dual-branch design: the spatial branch preserves intricate anatomical textures, while the frequency branch captures global contextual dependencies in the frequency domain. A core innovation is the 3D Multi-Directional Scanning Mechanism (MDSM), which integrates Hermitian symmetry with the causal nature of State Space Models (SSMs) to enable direction-aware global modeling. Crucially, by shifting the modeling focus to frequency-domain spectral components, SSFMamba captures the underlying structural characteristics of anatomical tissues. This leads to a highly adaptable framework that excels in both MRI and CT applications, regardless of the significant variations in intensity distributions. Extensive evaluations on the BraTS2020, BraTS2023, and BTCV datasets demonstrate that SSFMamba consistently outperforms state-of-the-art methods. Notably, our approach achieves exceptional performance on low-contrast organs such as the pancreas (81.97% Dice), underscoring its potential as a unified and physically consistent perception framework for diverse 3D clinical applications.", "link": "http://arxiv.org/abs/2508.03069v2", "date": "2026-03-02", "relevancy": 2.6906, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5651}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5265}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5228}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SSFMamba%3A%20Learning%20Symmetry-driven%20Spatial-Frequency%20Modeling%20for%20Physically%20Consistent%203D%20Medical%20Image%20Segmentation&body=Title%3A%20SSFMamba%3A%20Learning%20Symmetry-driven%20Spatial-Frequency%20Modeling%20for%20Physically%20Consistent%203D%20Medical%20Image%20Segmentation%0AAuthor%3A%20Bo%20Zhang%20and%20Yifan%20Zhang%20and%20Shuo%20Yan%20and%20Yu%20Bai%20and%20Zheng%20Zhang%20and%20Wu%20Liu%20and%20Wendong%20Wang%20and%20Yongdong%20Zhang%0AAbstract%3A%20Accurate%203D%20medical%20image%20segmentation%20requires%20a%20delicate%20balance%20between%20fine-grained%20local%20details%20and%20global%20contextual%20understanding.%20While%20spatial-domain%20models%20often%20struggle%20with%20long-range%20dependencies%2C%20existing%20frequency-based%20approaches%20frequently%20overlook%20intrinsic%20spectral%20properties%20such%20as%20Hermitian%20symmetry%2C%20leading%20to%20suboptimal%20feature%20integration.%20In%20this%20paper%2C%20we%20propose%20SSFMamba%2C%20a%20Mamba%20based%20Symmetry-driven%20Spatial-Frequency%20fusion%20framework%20tailored%20for%203D%20medical%20imaging.%20Our%20architecture%20employs%20a%20complementary%20dual-branch%20design%3A%20the%20spatial%20branch%20preserves%20intricate%20anatomical%20textures%2C%20while%20the%20frequency%20branch%20captures%20global%20contextual%20dependencies%20in%20the%20frequency%20domain.%20A%20core%20innovation%20is%20the%203D%20Multi-Directional%20Scanning%20Mechanism%20%28MDSM%29%2C%20which%20inte {"title": "CubistMerge: Spatial-Preserving Token Merging For Diverse ViT Backbones", "author": "Wenyi Gong and Mieszko Lis", "abstract": "Many modern ViT backbones adopt spatial architectural designs, such as window attention, decomposed relative positional embeddings in SAM, and RoPE in DINOv3. Such architectures impose new challenges on token reduction, as the vast majority of existing methods fail to preserve the spatial structure these architectures depend on. In this paper, we introduce a simple yet effective token merging method that maintains spatial integrity, enabling seamless compatibility with spatial architectures. We reconcile two seemingly conflicting requirements: (i)exploiting the uneven information distribution across the spatial layout while (ii)preserving the spatial structure post-merging. Our approach employs (i)a 2D reduction strategy to enforce structured token layouts, (ii)a spatial-aware merging algorithm that maintains relative token positions, and (iii)a novel max-magnitude-per-dimension token representation that preserves salient features. Our method demonstrates strong performance both off-the-shelf and with fine-tuning, achieving state-of-the-art results on spatial and non-spatial architectures across various vision tasks. Specifically, we achieve 1.25x speedup on SAM-H with only 0.7% mIOU drop evaluated on COCO off-the-shelf, and 1.15x speedup on DeiT-B with no top-1 accuracy drop on ImageNet within just one epoch of fine-tuning.", "link": "http://arxiv.org/abs/2509.21764v2", "date": "2026-03-02", "relevancy": 2.6829, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5592}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5502}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5004}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CubistMerge%3A%20Spatial-Preserving%20Token%20Merging%20For%20Diverse%20ViT%20Backbones&body=Title%3A%20CubistMerge%3A%20Spatial-Preserving%20Token%20Merging%20For%20Diverse%20ViT%20Backbones%0AAuthor%3A%20Wenyi%20Gong%20and%20Mieszko%20Lis%0AAbstract%3A%20Many%20modern%20ViT%20backbones%20adopt%20spatial%20architectural%20designs%2C%20such%20as%20window%20attention%2C%20decomposed%20relative%20positional%20embeddings%20in%20SAM%2C%20and%20RoPE%20in%20DINOv3.%20Such%20architectures%20impose%20new%20challenges%20on%20token%20reduction%2C%20as%20the%20vast%20majority%20of%20existing%20methods%20fail%20to%20preserve%20the%20spatial%20structure%20these%20architectures%20depend%20on.%20In%20this%20paper%2C%20we%20introduce%20a%20simple%20yet%20effective%20token%20merging%20method%20that%20maintains%20spatial%20integrity%2C%20enabling%20seamless%20compatibility%20with%20spatial%20architectures.%20We%20reconcile%20two%20seemingly%20conflicting%20requirements%3A%20%28i%29exploiting%20the%20uneven%20information%20distribution%20across%20the%20spatial%20layout%20while%20%28ii%29preserving%20the%20spatial%20structure%20post-merging.%20Our%20approach%20employs%20%28i%29a%202D%20reduction%20strategy%20to%20enforce%20structured%20token%20layouts%2C%20%28ii%29a%20spatial-aware%20merging%20algorithm%20that%20maintains%20relative%20token%20positions%2C%20and%20%28iii%29a%20novel%20max-magnitude-per-dimension%20token%20representation%20that%20preserves%20salient%20features.%20Our%20method%20demonstrates%20strong%20performance%20both%20off-the-shelf%20and%20with%20fine-tuning%2C%20achieving%20state-of-the-art%20results%20on%20spatial%20and%20non-spatial%20architectures%20across%20various%20vision%20tasks.%20Specifically%2C%20we%20achieve%201.25x%20speedup%20on%20SAM-H%20with%20only%200.7%25%20mIOU%20drop%20evaluated%20on%20COCO%20off-the-shelf%2C%20and%201.15x%20sp {"title": "NAB: Neural Adaptive Binning for Sparse-View CT reconstruction", "author": "Wangduo Xie and Matthew B. Blaschko", "abstract": "Computed Tomography (CT) plays a vital role in inspecting the internal structures of industrial objects. Furthermore, achieving high-quality CT reconstruction from sparse views is essential for reducing production costs. While classic implicit neural networks have shown promising results for sparse reconstruction, they are unable to leverage shape priors of objects. Motivated by the observation that numerous industrial objects exhibit rectangular structures, we propose a novel Neural Adaptive Binning (NAB) method that effectively integrates rectangular priors into the reconstruction process. Specifically, our approach first maps coordinate space into a binned vector space. This mapping relies on an innovative binning mechanism based on differences between shifted hyperbolic tangent functions, with our extension enabling rotations around the input-plane normal vector. The resulting representations are then processed by a neural network to predict CT attenuation coefficients. This design enables end-to-end optimization of the encoding parameters -- including position, size, steepness, and rotation -- via gradient flow from the projection data, thus enhancing reconstruction accuracy. By adjusting the smoothness of the binning function, NAB can generalize to objects with more complex geometries. This research provides a new perspective on integrating shape priors into neural network-based reconstruction. Extensive experiments demonstrate that NAB achieves superior performance on two industrial datasets. It also maintains robust on medical datasets when the binning function is extended to more general expression. The code is available at https://github.com/Wangduo-Xie/NAB_CT_reconstruction.", "link": "http://arxiv.org/abs/2602.02356v2", "date": "2026-03-02", "relevancy": 2.6613, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5411}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5279}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5279}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NAB%3A%20Neural%20Adaptive%20Binning%20for%20Sparse-View%20CT%20reconstruction&body=Title%3A%20NAB%3A%20Neural%20Adaptive%20Binning%20for%20Sparse-View%20CT%20reconstruction%0AAuthor%3A%20Wangduo%20Xie%20and%20Matthew%20B.%20Blaschko%0AAbstract%3A%20Computed%20Tomography%20%28CT%29%20plays%20a%20vital%20role%20in%20inspecting%20the%20internal%20structures%20of%20industrial%20objects.%20Furthermore%2C%20achieving%20high-quality%20CT%20reconstruction%20from%20sparse%20views%20is%20essential%20for%20reducing%20production%20costs.%20While%20classic%20implicit%20neural%20networks%20have%20shown%20promising%20results%20for%20sparse%20reconstruction%2C%20they%20are%20unable%20to%20leverage%20shape%20priors%20of%20objects.%20Motivated%20by%20the%20observation%20that%20numerous%20industrial%20objects%20exhibit%20rectangular%20structures%2C%20we%20propose%20a%20novel%20Neural%20Adaptive%20Binning%20%28NAB%29%20method%20that%20effectively%20integrates%20rectangular%20priors%20into%20the%20reconstruction%20process.%20Specifically%2C%20our%20approach%20first%20maps%20coordinate%20space%20into%20a%20binned%20vector%20space.%20This%20mapping%20relies%20on%20an%20innovative%20binning%20mechanism%20based%20on%20differences%20between%20shifted%20hyperbolic%20tangent%20functions%2C%20with%20our%20extension%20enabling%20rotations%20around%20the%20input-plane%20normal%20vector.%20The%20resulting%20representations%20are%20then%20processed%20by%20a%20neural%20network%20to%20predict%20CT%20attenuation%20coefficients.%20This%20design%20enables%20end-to-end%20optimization%20of%20the%20encoding%20parameters%20--%20including%20position%2C%20size%2C%20steepness%2C%20and%20rotation%20--%20via%20gradient%20flow%20from%20the%20projection%20data%2C%20thus%20enhancing%20reconstruction%20accuracy.%20By%20adjusting%20the%20smoothness%20of%20the%20binning%20function%2C%20NAB%20can%20generalize%20to%20objects%20with%20more%20complex%20geometries.%20This%20research%20provides%20a%20new%20perspective%20on%20integrating%20shape%20priors%20into%20neural%20network-based%20reconstruction.%20Extensive%20experiments%20demonstrate%20that%20NAB%20achieves%20superior%20performance%20on%20two%20industrial%20datasets.%20It%20also%20maintains%20robust%20on%20medical%20datasets%20when%20the%20binning%20function%20is%20extended%20to%20more%20general%20expression.%20The%20code%20is%20available%20at%20https%3A//github.com/Wangduo-Xie/NAB_CT_reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2602.02356v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNAB%253A%2520Neural%2520Adaptive%2520Binning%2520for%2520Sparse-View%2520CT%2520reconstruction%26entry.906535625%3DWangduo%2520Xie%2520and%2520Matthew%2520B.%2520Blaschko%26entry.1292438233%3DComputed%2520Tomography%2520%2528CT%2529%2520plays%2520a%2520vital%2520role%2520in%2520inspecting%2520the%2520internal%2520structures%2520of%2520industrial%2520objects.%2520Furthermore%252C%2520achieving%2520high-quality%2520CT%2520reconstruction%2520from%2520sparse%2520views%2520is%2520essential%2520for%2520reducing%2520production%2520costs.%2520While%2520classic%2520implicit%2520neural%2520networks%2520have%2520shown%2520promising%2520results%2520for%2520sparse%2520reconstruction%252C%2520they%2520are%2520unable%2520to%2520leverage%2520shape%2520priors%2520of%2520objects.%2520Motivated%2520by%2520the%2520observation%2520that%2520numerous%2520industrial%2520objects%2520exhibit%2520rectangular%2520structures%25 {"title": "Dream2Learn: Structured Generative Dreaming for Continual Learning", "author": "Salvatore Calcagno and Matteo Pennisi and Federica Proietto Salanitri and Amelia Sorrenti and Simone Palazzo and Concetto Spampinato and Giovanni Bellitto", "abstract": "Continual learning requires balancing plasticity and stability while mitigating catastrophic forgetting. Inspired by human dreaming as a mechanism for internal simulation and knowledge restructuring, we introduce Dream2Learn (D2L), a framework in which a model autonomously generates structured synthetic experiences from its own internal representations and uses them for self-improvement. Rather than reconstructing past data as in generative replay, D2L enables a classifier to create novel, semantically distinct dreamed classes that are coherent with its learned knowledge yet do not correspond to previously observed data. These dreamed samples are produced by conditioning a frozen diffusion model through soft prompt optimization driven by the classifier itself. The generated data are not used to replace memory, but to expand and reorganize the representation space, effectively allowing the network to self-train on internally synthesized concepts. By integrating dreamed classes into continual training, D2L proactively structures latent features to support forward knowledge transfer and adaptation to future tasks. This prospective self-training mechanism mirrors the role of sleep in consolidating and reorganizing memory, turning internal simulations into a tool for improved generalization. Experiments on Mini-ImageNet, FG-ImageNet, and ImageNet-R demonstrate that D2L consistently outperforms strong rehearsal-based baselines and achieves positive forward transfer, confirming its ability to enhance adaptability through internally generated training signals.", "link": "http://arxiv.org/abs/2603.01935v1", "date": "2026-03-02", "relevancy": 2.655, "topK": [{"title": "Genie: Generative Interactive Environments", "link" %20to%20self-train%20on%20internally%20synthesized%20concepts.%20By%20integrating%20dreamed%20classes%20into%20continual%20training%2C%20D2L%20proactively%20structures%20latent%20features%20to%20support%20forward%20knowledge%20transfer%20and%20adaptation%20to%20future%20tasks.%20This%20prospective%20self-training%20mechanism%20mirrors%20the%20role%20of%20sleep%20in%20consolidating%20and%20reorganizing%20memory%2C%20turning%20internal%20simulations%20into%20a%20tool%20for%20improved%20generalization.%20Experiments%20on%20Mini-ImageNet%2C%20FG-ImageNet%2C%20and%20ImageNet-R%20demonstrate%20that%20D2L%20consistently%20outperforms%20strong%20rehearsal-based%20baselines%20and%20achieves%20positive%20forward%20transfer%2C%20confirming%20its%20ability%20to%20enhance%20adaptability%20through%20internally%20generated%20training%20signals.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01935v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDream2Learn%253A%2520Structured%2520Generative%2520Dreaming%2520for%2520Continual%2520Learning%26entry.906535625%3DSalvatore%2520Calcagno%2520and%2520Matteo%2520Pennisi%2520and%2520Federica%2520Proietto%2520Salanitri%2520and%2520Amelia%2520Sorrenti%2520and%2520Simone%2520Palazzo%2520and%2520Concetto%2520Spampinato%2520and%2520Giovanni%2520Bellitto%26entry.1292438233%3DContinual%2520learning%2520requires%2520balancing%2520plasticity%2520and%2520stability%2520while%2520mitigating%2520catastrophic%2520forgetting.%2520Inspired%2520by%2520human%2520dreaming%2520as%2520a%2520mechanism%2520for%2520internal%2520simulation%2520and%2520knowledge%2520restructuring%252C%2520we%2520introduce%2520Dream2Learn%2520%2528D2L%2529%252C%2520a%2520framework%2520in%2520which%2520a%2520model%2520autonomously%2520generates%2520structured%2520synthetic%2520experiences%2520from%2520its%2520own%2520internal%2520representations%2520and%2520uses%2520them%2520for%2520self-improvement.%2520R {"title": "Decoding Open-Ended Information Seeking Goals from Eye Movements in Reading", "author": "Cfir Avraham Hadar and Omer Shubi and Yoav Meiri and Amit Heshes and Yevgeni Berzak", "abstract": "When reading, we often have specific information that interests us in a text. For example, you might be reading this paper because you are curious about LLMs for eye movements in reading, the experimental design, or perhaps you wonder ``This sounds like science fiction. Does it actually work?''. More broadly, in daily life, people approach texts with any number of text-specific goals that guide their reading behavior. In this work, we ask, for the first time, whether open-ended reading goals can be automatically decoded solely from eye movements in reading. To address this question, we introduce goal decoding tasks and evaluation frameworks using large-scale eye tracking for reading data in English with hundreds of text-specific information seeking tasks. We develop and compare several discriminative and generative multimodal text and eye movements LLMs for these tasks. Our experiments show considerable success on the task of selecting the correct goal among several options, and even progress towards free-form textual reconstruction of the precise goal formulation. These results open the door for further scientific investigation of goal driven reading, as well as the development of educational and assistive technologies that will rely on real-time decoding of reader goals from their eye movements.", "link": "http://arxiv.org/abs/2505.02872v3", "date": "2026-03-02", "relevancy": 2.6507, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.558}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.558}, {"title": "Egocentric Computer Vision for Hands-Free Roboti {"title": "OmniZip: Learning a Unified and Lightweight Lossless Compressor for Multi-Modal Data", "author": "Yan Zhao and Zhengxue Cheng and Junxuan Zhang and Dajiang Zhou and Qunshan Gu and Qi Wang and Li Song", "abstract": "Lossless compression is essential for efficient data storage and transmission. Although learning-based lossless compressors achieve strong results, most of them are designed for a single modality, leading to redundant compressor deployments in multi-modal settings. Designing a unified multi-modal compressor is critical yet challenging, as different data types vary largely in format, dimension, and statistics. Multi-modal large language models offer a promising resolution but remain too complex for practical use. Thus, we propose \\textbf{OmniZip}, \\textbf{a unified and lightweight lossless compressor for multi-modal data (like image, text, speech, tactile, database, and gene sequence)}. Built on a lightweight backbone, OmniZip incorporates three key components to enable efficient multi-modal lossless compression: a modality-unified tokenizer that reversibly transforms diverse data into tokens, a modality-routing context learning mechanism that enables flexible multi-modal context modeling, and a modality-routing feedforward design that further enhances the model's nonlinear representation flexibility. A reparameterization training strategy is used to enhance model capacity. OmniZip outperforms or matches other state-of-the-art compressors on multiple modalities, achieving 42\\%, 57\\%, 62\\% and 42\\%, 53\\% higher compression efficiency than gzip on CLIC-M, TouchandGo, enwik9, LibriSpeech, and WikiSQL datasets, respectively. It also supports near real-time inference on resource-constrained edge devices, reaching about 1MB/s on MacBook CPUs and iPhone NPUs. Our code is released at https://github.com/adminasmi/OmniZip-CVPR2026.", "link": "http://arxiv.org/abs/2602.22286v2", "date": "2026-03-02", "relevancy": 2.6346, "topK": [{"title": "TAMM: Tr 20a%20modality-unified%20tokenizer%20that%20reversibly%20transforms%20diverse%20data%20into%20tokens%2C%20a%20modality-routing%20context%20learning%20mechanism%20that%20enables%20flexible%20multi-modal%20context%20modeling%2C%20and%20a%20modality-routing%20feedforward%20design%20that%20further%20enhances%20the%20model%27s%20nonlinear%20representation%20flexibility.%20A%20reparameterization%20training%20strategy%20is%20used%20to%20enhance%20model%20capacity.%20OmniZip%20outperforms%20or%20matches%20other%20state-of-the-art%20compressors%20on%20multiple%20modalities%2C%20achieving%2042%5C%25%2C%2057%5C%25%2C%2062%5C%25%20and%2042%5C%25%2C%2053%5C%25%20higher%20compression%20efficiency%20than%20gzip%20on%20CLIC-M%2C%20TouchandGo%2C%20enwik9%2C%20LibriSpeech%2C%20and%20WikiSQL%20datasets%2C%20respectively.%20It%20also%20supports%20near%20real-time%20inference%20on%20resource-constrained%20edge%20devices%2C%20reaching%20about%201MB/s%20on%20MacBook%20CPUs%20and%20iPhone%20NPUs.%20Our%20code%20is%20released%20at%20https%3A//github.com/adminasmi/OmniZip-CVPR2026.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22286v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniZip%253A%2520Learning%2520a%2520Unified%2520and%2520Lightweight%2520Lossless%2520Compressor%2520for%2520Multi-Modal%2520Data%26entry.906535625%3DYan%2520Zhao%2520and%2520Zhengxue%2520Cheng%2520and%2520Junxuan%2520Zhang%2520and%2520Dajiang%2520Zhou%2520and%2520Qunshan%2520Gu%2520and%2520Qi%2520Wang%2520and%2520Li%2520Song%26entry.1292438233%3DLossless%2520compression%2520is%2520essential%2520for%2520efficient%2520data%2520storage%2520and%2520transmission.%2520Although%2520learning-based%2520lossless%2520compressors%2520achieve%2520strong%2520results%252C%2520most%2520of%2520them%2520are%2520designed%2520for%2520a%2520single%2520modality%252C%2520leading%2520to%2520redundant%2520compressor%2520deployments%2520in%2520multi-modal%2520 {"title": "Learning Domain-Aware Task Prompt Representations for Multi-Domain All-in-One Image Restoration", "author": "Guanglu Dong and Chunlei Li and Chao Ren and Jingliang Hu and Yilei Shi and Xiao Xiang Zhu and Lichao Mou", "abstract": "Recently, significant breakthroughs have been made in all-in-one image restoration (AiOIR), which can handle multiple restoration tasks with a single model. However, existing methods typically focus on a specific image domain, such as natural scene, medical imaging, or remote sensing. In this work, we aim to extend AiOIR to multiple domains and propose the first multi-domain all-in-one image restoration method, DATPRL-IR, based on our proposed Domain-Aware Task Prompt Representation Learning. Specifically, we first construct a task prompt pool containing multiple task prompts, in which task-related knowledge is implicitly encoded. For each input image, the model adaptively selects the most relevant task prompts and composes them into an instance-level task representation via a prompt composition mechanism (PCM). Furthermore, to endow the model with domain awareness, we introduce another domain prompt pool and distill domain priors from multimodal large language models into the domain prompts. PCM is utilized to combine the adaptively selected domain prompts into a domain representation for each input image. Finally, the two representations are fused to form a domain-aware task prompt representation which can make full use of both specific and shared knowledge across tasks and domains to guide the subsequent restoration process. Extensive experiments demonstrate that our DATPRL-IR significantly outperforms existing SOTA image restoration methods, while exhibiting strong generalization capabilities. Code is available at https://github.com/GuangluDong0728/DATPRL-IR.", "link": "http://arxiv.org/abs/2603.01725v1", "date": "2026-03-02", "relevancy": 2.6291, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5533}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5184}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5058}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Domain-Aware%20Task%20Prompt%20Representations%20for%20Multi-Domain%20All-in-One%20Image%20Restoration&body=Title%3A%20Learning%20Domain-Aware%20Task%20Prompt%20Representations%20for%20Multi-Domain%20All-in-One%20Image%20Restoration%0AAuthor%3A%20Guanglu%20Dong%20and%20Chunlei%20Li%20and%20Chao%20Ren%20and%20Jingliang%20Hu%20and%20Yilei%20Shi%20and%20Xiao%20Xiang%20Zhu%20and%20Lichao%20Mou%0AAbstract%3A%20Recently%2C%20significant%20breakthroughs%20have%20been%20made%20in%20all-in-one%20image%20restoration%20%28AiOIR%29%2C%20which%20can%20handle%20multiple%20restoration%20tasks%20with%20a%20single%20model.%20However%2C%20existing%20methods%20typically%20focus%20on%20a%20specific%20image%20domain%2C%20such%20as%20natural%20scene%2C%20medical%20imaging%2C%20or%20remote%20sensing.%20In%20this%20work%2C%20we%20aim%20to%20extend%20AiOIR%20to%20multiple%20domains%20and%20propose%20the%20first%20multi-domain%20all-in-one%20image%20restoration%20method%2C%20DATPRL-IR%2C%20based%20on%20our%20proposed%20Domain-Aware%20Task%20Prompt%20Representation%20Learning.%20Specifically%2C%20we%20first%20construct%20a%20task%20prompt%20pool%20containing%20multiple%20task%20prompts%2C%20in%20which%20task-related%20knowledge%20is%20implicitly%20encoded.%20For%20each%20input%20image%2C%20the%20model%20adaptively%20selects%20the%20most%20relevant%20task%20prompts%20and%20composes%20them%20into%20an%20instance-level%20task%20representation%20via%20a%20prompt%20composition%20mechanism%20%28PCM%29.%20Furthermore%2C%20to%20endow%20the%20model%20with%20domain%20awareness%2C%20we%20introduce%20another%20domain%20prompt%20pool%20and%20distill%20domain%20priors%20from%20multimodal%20large%20language%20models%20into%20the%20domain%20prompts.%20PCM%20is%20utilized%20to%20combine%20the%20adaptively%20selected%20domain%20prompts%20into%20a%20domain%20representation%20for%20each%20input%20image.%20Finally%2C%20the%20two%20representations%20are%20fused%20to%20form%20a%20domain-aware%20task%20prompt%20representation%20which%20can%20make%20full%20use%20of%20both%20specific%20and%20shared%20knowledge%20across%20tasks%20and%20domains%20to%20guide%20the%20subsequent%20restoration%20process.%20Extensive%20experiments%20demonstrate%20that%20our%20DATPRL-IR%20significantly%20outperforms%20existing%20SOTA%20image%20restoration%20methods%2C%20while%20exhibiting%20strong%20generalization%20capabilities.%20Code%20is%20available%20at%20https%3A//github.com/GuangluDong0728/DATPRL-IR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01725v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Domain-Aware%2520Task%2520Prompt%2520Representations%2520for%2520Multi-Domain%2520All-in-One%2520Image%2520Restoration%26entry.906535625%3DGuanglu%2520Dong%2520and%2520Chunlei%2520Li%2520and%2520Chao%2520Ren%2520and%2520Jingliang%2520Hu%2520and%2520Yilei%2520Shi%2520and%2520Xiao%2520Xiang%2520Zhu%2520and%2520Lichao%2520Mou%26entry.1292438233%3DRecently%252C%2520significant%2520breakthroughs%2520have%2520been%2520made%2520in%2520all-in-one%2520image%2520restoration%2520%2528AiOIR%2529%252C%2520which%2520can%2520handle%2520multiple%2520restoration%2520tasks%2520with%2520a%2520single%2520model.%2520However%252C%2520existing%2520methods%2520typically%2520focus%2520on%2520a%2520specific%2520image%2520domain%252C%2520such%2520as%2520natural%2520scene%252C%2520medical%2520imaging%252C%2520or%2520remote%2520sensing.%2520In%2520this%2520work%252C%2520we%2520aim%2 {"title": "Exploiting Low-Dimensional Manifold of Features for Few-Shot Whole Slide Image Classification", "author": "Conghao Xiong and Zhengrui Guo and Zhe Xu and Yifei Zhang and Raymond Kai-Yu Tong and Si Yong Yeo and Hao Chen and Joseph J. Y. Sung and Irwin King", "abstract": "Few-shot Whole Slide Image (WSI) classification is severely hampered by overfitting. We argue that this is not merely a data-scarcity issue but a fundamentally geometric problem. Grounded in the manifold hypothesis, our analysis shows that features from pathology foundation models exhibit a low-dimensional manifold geometry that is easily perturbed by downstream models. This insight reveals a key potential issue in downstream multiple instance learning models: linear layers are geometry-agnostic and, as we show empirically, can distort the manifold geometry of the features. To address this, we propose the Manifold Residual (MR) block, a plug-and-play module that is explicitly geometry-aware. The MR block reframes the linear layer as residual learning and decouples it into two pathways: (1) a fixed, random matrix serving as a geometric anchor that approximately preserves topology while also acting as a spectral shaper to sharpen the feature spectrum; and (2) a trainable, low-rank residual pathway that acts as a residual learner for task-specific adaptation, with its structural bottleneck explicitly mirroring the low effective rank of the features. This decoupling imposes a structured inductive bias and reduces learning to a simpler residual fitting task. Through extensive experiments, we demonstrate that our approach achieves state-of-the-art results with significantly fewer parameters, offering a new paradigm for few-shot WSI classification. Code is available in https://github.com/BearCleverProud/MR-Block.", "link": "http://arxiv.org/abs/2505.15504v2", "date": "2026-03-02", "relevancy": 2.6074, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5228}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5214}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5202}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploiting%20Low-Dimensional%20Manifold%20of%20Features%20for%20Few-Shot%20Whole%20Slide%20Image%20Classification&body=Title%3A%20Exploiting%20Low-Dimensional%20Manifold%20of%20Features%20for%20Few-Shot%20Whole%20Slide%20Image%20Classification%0AAuthor%3A%20Conghao%20Xiong%20and%20Zhengrui%20Guo%20and%20Zhe%20Xu%20and%20Yifei%20Zhang%20and%20Raymond%20Kai-Yu%20Tong%20and%20Si%20Yong%20Yeo%20and%20Hao%20Chen%20and%20Joseph%20J.%20Y.%20Sung%20and%20Irwin%20King%0AAbstract%3A%20Few-shot%20Whole%20Slide%20Image%20%28WSI%29%20classification%20is%20severely%20hampered%20by%20overfitting.%20We%20argue%20that%20this%20is%20not%20merely%20a%20data-scarcity%20issue%20but%20a%20fundamentally%20geometric%20problem.%20Grounded%20in%20the%20manifold%20hypothesis%2C%20our%20analysis%20shows%20that%20features%20from%20pathology%20foundation%20models%20exhibit%20a%20low-dimensional%20manifold%20geometry%20that%20is%20easily%20perturbed%20by%20downstream%20models.%20This%20insight%20reveals%20a%20key%20potential%20issue%20in%20downstream%20multiple%20instance%20learning%20models%3A%20linear%20layers%20are%20geometry-agnostic%20and%2C%20as%20we%20show%20empirically%2C%20can%20distort%20the%20manifold%20geometry%20of%20the%20features.%20To%20address%20this%2C%20we%20propose%20the%20Manifold%20Residual%20%28MR%29%20block%2C%20a%20plug-and-play%20module%20that%20is%20explicitly%20geometry-aware.%20The%20MR%20block%20reframes%20the%20linear%20layer%20as%20residual%20learning%20and%20decouples%20it%20into%20two%20pathways%3A%20%281%29%20a%20fixed%2C%20random%20matrix%20serving%20as%20a%20geometric%20anchor%20that%20approximately%20preserves%20topology%20while%20also%20acting%20as%20a%20spectral%20shaper%20to%20sharpen%20the%20feature%20spectrum%3B%20and%20%282%29%20a%20trainable%2C%20low-rank%20residual%20pathway%20that%20acts%20as%20a%20residual%20learner%20for%20task-specific%20adaptation%2C%20with%20its%20structural%20bottleneck%20explicitly%20mirroring%20the%20low%20effective%20rank%20of%20the%20features.%20This%20decoupling%20imposes%20a%20structured%20inductive%20bias%20and%20reduces%20learning%20to%20a%20simpler%20residual%20fitting%20task.%20Through%20extensive%20experiments%2C%20we%20demonstrate%20that%20our%20approach%20achieves%20state-of-the-art%20results%20with%20significantly%20fewer%20parameters%2C%20offering%20a%20new%20paradigm%20for%20few-shot%20WSI%20classification.%20Code%20is%20available%20in%20https%3A//github.com/BearCleverProud/MR-Block.%0ALink%3A%20http%3A//arxiv.org/abs/2505.15504v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploiting%2520Low-Dimensional%2520Manifold%2520of%2520Features%2520for%2520Few-Shot%2520Whole%2520Slide%2520Image%2520Classification%26entry.906535625%3DConghao%2520Xiong%2520and%2520Zhengrui%2520Guo%2520and%2520Zhe%2520Xu%2520and%2520Yifei%2520Zhang%2520and%2520Raymond%2520Kai-Yu%2520Tong%2520and%2520Si%2520Yong%2520Yeo%2520and%2520Hao%2520Chen%2520and%2520Joseph%2520J.%2520Y.%2520Sung%2520and%2520Irwin%2520King%26entry.1292438233%3DFew-shot%2520Whole%2520Slide%2520Image%2520%2528WSI%2529%2520classification%2520is%2520severely%2520hampered%2520by%2520overfitting.%2520We%2520argue%2520that%2520this%2520is%2520not%2520merely%2520a%2520data-scarcity%2520issue%2520but%2520a%2520fundamentally%2520geometric%2520problem.%2520Grounded%2520in%2520the%2520manifold%2520hypothesis%252C%2520our%2520analysis%2520shows%2520that%2520features%2520from%2520pathology%2520foundatio {"title": "GAM-RAG: Gain-Adaptive Memory for Evolving Retrieval in Retrieval-Augmented Generation", "author": "Yifan Wang and Mingxuan Jiang and Zhihao Sun and Yixin Cao and Yicun Liu and Keyang Chen and Guangnan Ye and Hongfeng Chai", "abstract": "Retrieval-Augmented Generation (RAG) grounds large language models with external evidence, but many implementations rely on pre-built indices that remain static after construction. Related queries therefore repeat similar multi-hop traversal, increasing latency and compute. Motivated by schema-based learning in cognitive neuroscience, we propose GAM-RAG, a training-free framework that accumulates retrieval experience from recurring or related queries and updates retrieval memory over time. GAM-RAG builds a lightweight, relation-free hierarchical index whose links capture potential co-occurrence rather than fixed semantic relations. During inference, successful retrieval episodes provide sentence-level feedback, updating sentence memories so evidence useful for similar reasoning types becomes easier to activate later. To balance stability and adaptability under noisy feedback, we introduce an uncertainty-aware, Kalman-inspired gain rule that jointly updates memory states and perplexity-based uncertainty estimates. It applies fast updates for reliable novel signals and conservative refinement for stable or noisy memories. We provide a theoretical analysis of the update dynamics, and empirically show that GAM-RAG improves average performance by 3.95% over the strongest baseline and by 8.19% with 5-turn memory, while reducing inference cost by 61%. Our code and datasets are available at: https://anonymous.4open.science/r/GAM_RAG-2EF6.", "link": "http://arxiv.org/abs/2603.01783v1", "date": "2026-03-02", "relevancy": 2.606, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5289}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Art rtainty%20estimates.%20It%20applies%20fast%20updates%20for%20reliable%20novel%20signals%20and%20conservative%20refinement%20for%20stable%20or%20noisy%20memories.%20We%20provide%20a%20theoretical%20analysis%20of%20the%20update%20dynamics%2C%20and%20empirically%20show%20that%20GAM-RAG%20improves%20average%20performance%20by%203.95%25%20over%20the%20strongest%20baseline%20and%20by%208.19%25%20with%205-turn%20memory%2C%20while%20reducing%20inference%20cost%20by%2061%25.%20Our%20code%20and%20datasets%20are%20available%20at%3A%20https%3A//anonymous.4open.science/r/GAM_RAG-2EF6.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01783v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGAM-RAG%253A%2520Gain-Adaptive%2520Memory%2520for%2520Evolving%2520Retrieval%2520in%2520Retrieval-Augmented%2520Generation%26entry.906535625%3DYifan%2520Wang%2520and%2520Mingxuan%2520Jiang%2520and%2520Zhihao%2520Sun%2520and%2520Yixin%2520Cao%2520and%2520Yicun%2520Liu%2520and%2520Keyang%2520Chen%2520and%2520Guangnan%2520Ye%2520and%2520Hongfeng%2520Chai%26entry.1292438233%3DRetrieval-Augmented%2520Generation%2520%2528RAG%2529%2520grounds%2520large%2520language%2520models%2520with%2520external%2520evidence%252C%2520but%2520many%2520implementations%2520rely%2520on%2520pre-built%2520indices%2520that%2520remain%2520static%2520after%2520construction.%2520Related%2520queries%2520therefore%2520repeat%2520similar%2520multi-hop%2520traversal%252C%2520increasing%2520latency%2520and%2520compute.%2520Motivated%2520by%2520schema-based%2520learning%2520in%2520cognitive%2520neuroscience%252C%2520we%2520propose%2520GAM-RAG%252C%2520a%2520training-free%2520framework%2520that%2520accumulates%2520retrieval%2520experience%2520from%2520recurring%2520or%2520related%2520queries%2520and%2520updates%2520retrieval%2520memory%2520over%2520time.%2520GAM-RAG%2520builds%2520a%2520lightweight%252C%2520relation-free%2520hierarchical%2520index%2520whose {"title": "OnlineX: Unified Online 3D Reconstruction and Understanding with Active-to-Stable State Evolution", "author": "Chong Xia and Fangfu Liu and Yule Wang and Yize Pang and Yueqi Duan", "abstract": "Recent advances in generalizable 3D Gaussian Splatting (3DGS) have enabled rapid 3D scene reconstruction within seconds, eliminating the need for per-scene optimization. However, existing methods primarily follow an offline reconstruction paradigm, lacking the capacity for continuous reconstruction, which limits their applicability to online scenarios such as robotics and VR/AR. In this paper, we introduce OnlineX, a feed-forward framework that reconstructs both 3D visual appearance and language fields in an online manner using only streaming images. A key challenge in online formulation is the cumulative drift issue, which is rooted in the fundamental conflict between two opposing roles of the memory state: an active role that constantly refreshes to capture high-frequency local geometry, and a stable role that conservatively accumulates and preserves the long-term global structure. To address this, we introduce a decoupled active-to-stable state evolution paradigm. Our framework decouples the memory state into a dedicated active state and a persistent stable state, and then cohesively fuses the information from the former into the latter to achieve both fidelity and stability. Moreover, we jointly model visual appearance and language fields and incorporate an implicit Gaussian fusion module to enhance reconstruction quality. Experiments on mainstream datasets demonstrate that our method consistently outperforms prior work in novel view synthesis and semantic understanding, showcasing robust performance across input sequences of varying lengths with real-time inference speed.", "link": "http://arxiv.org/abs/2603.02134v1", "date": "2026-03-02", "relevancy": 2.5779, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6669}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6357}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6104}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OnlineX%3A%20Unified%20Online%203D%20Reconstruction%20and%20Understanding%20with%20Active-to-Stable%20State%20Evolution&body=Title%3A%20OnlineX%3A%20Unified%20Online%203D%20Reconstruction%20and%20Understanding%20with%20Active-to-Stable%20State%20Evolution%0AAuthor%3A%20Chong%20Xia%20and%20Fangfu%20Liu%20and%20Yule%20Wang%20and%20Yize%20Pang%20and%20Yueqi%20Duan%0AAbstract%3A%20Recent%20advances%20in%20generalizable%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20enabled%20rapid%203D%20scene%20reconstruction%20within%20seconds%2C%20eliminating%20the%20need%20for%20per-scene%20optimization.%20However%2C%20existing%20methods%20primarily%20follow%20an%20offline%20reconstruction%20paradigm%2C%20lacking%20the%20capacity%20for%20continuous%20reconstruction%2C%20which%20limits%20their%20applicability%20to%20online%20scenarios%20such%20as%20robotics%20and%20VR/AR.%20In%20this%20paper%2C%20we%20introduce%20OnlineX%2C%20a%20feed-forward%20framework%20that%20reconstructs%20both%203D%20visual%20appearance%20and%20language%20fields%20in%20an%20online%20manner%20using%20only%20streaming%20images.%20A%20key%20challenge%20in%20online%20formulation%20is%20the%20cumulative%20drift%20issue%2C%20which%20is%20rooted%20in%20the%20fundamental%20conflict%20between%20two%20opposing%20roles%20of%20the%20memory%20state%3A%20an%20active%20role%20that%20constantly%20refreshes%20to%20capture%20high-frequency%20local%20geometry%2C%20and%20a%20stable%20role%20that%20conservatively%20accumulates%20and%20preserves%20the%20long-term%20global%20structure.%20To%20address%20this%2C%20we%20introduce%20a%20decoupled%20active-to-stable%20state%20evolution%20paradigm.%20Our%20framework%20decouples%20the%20memory%20state%20into%20a%20dedicated%20active%20state%20and%20a%20persistent%20stable%20state%2C%20and%20then%20cohesively%20fuses%20the%20information%20from%20the%20former%20into%20the%20latter%20to%20achieve%20both%20fidelity%20and%20stability.%20Moreover%2C%20we%20jointly%20model%20visual%20appearance%20and%20language%20fields%20and%20incorporate%20an%20implicit%20Gaussian%20fusion%20module%20to%20enhance%20reconstruction%20quality.%20Experiments%20on%20mainstream%20datasets%20demonstrate%20that%20our%20method%20consistently%20outperforms%20prior%20work%20in%20novel%20view%20synthesis%20and%20semantic%20understanding%2C%20showcasing%20robust%20performance%20across%20input%20sequences%20of%20varying%20lengths%20with%20real-time%20inference%20speed.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02134v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOnlineX%253A%2520Unified%2520Online%25203D%2520Reconstruction%2520and%2520Understanding%2520with%2520Active-to-Stable%2520State%2520Evolution%26entry.906535625%3DChong%2520Xia%2520and%2520Fangfu%2520Liu%2520and%2520Yule%2520Wang%2520and%2520Yize%2520Pang%2520and%2520Yueqi%2520Duan%26entry.1292438233%3DRecent%2520advances%2520in%2520generalizable%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520have%2520enabled%2520rapid%25203D%2520scene%2520reconstruction%2520within%2520seconds%252C%2520eliminating%2520the%2520need%2520for%2520per-scene%2520optimization.%2520However%252C%2520existing%2520methods%2520primarily%2520follow%2520an%2520offline%2520reconstruction%2520paradigm%252C%2520lacking%2520the%2520capacity%2520for%2520continuous%2520reconstruction%252C%2520which%2520limits%2520their%2520applicability%2520to%2520online%2520scenarios%2520such%2520as%2520robotics%2520and%2520VR/AR.%2520In%2520this%2520paper%25 {"title": "Progressively Exploring and Exploiting Inference Data to Break Fine-Grained Classification Barrier", "author": "Li-Jun Zhao and Si-Yuan Zhang and Zhen-Duo Chen and Xin Luo and Xin-Shun Xu", "abstract": "Current fine-grained classification research primarily focuses on fine-grained feature learning. However, in real-world scenarios, fine-grained data annotation is challenging, and the features and semantics are highly diverse and frequently changing. These issues create inherent barriers between traditional experimental settings and real-world applications, limiting the effectiveness of conventional fine-grained classification methods. Although some recent studies have provided potential solutions to these issues, most of them still rely on limited supervised information and thus fail to offer effective solutions. In this paper, based on theoretical analysis, we propose a novel learning paradigm to break the barriers in fine-grained classification. This paradigm enables the model to progressively learn during inference, thereby leveraging cost-free data at inference time to more accurately represent fine-grained categories and adapt to dynamic semantic changes. On this basis, an efficient EXPloring and EXPloiting strategy and method (EXP2) is designed. Thereinto, useful inference data samples are explored according to class representations and exploited to optimize classifiers. Experimental results demonstrate the general effectiveness of our method, providing guidance for future in-depth understanding and exploration of real-world fine-grained classification.", "link": "http://arxiv.org/abs/2412.20383v3", "date": "2026-03-02", "relevancy": 2.5487, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5141}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5136}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5016}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Progressively%20Exploring%20and%20Exploiting%20Inference%20Data%20to%20Break%20Fine-Grained%20Classification%20Barrier&body=Title%3A%20Progressively%20Exploring%20and%20Exploiting%20Inference%20Data%20to%20Break%20Fine-Grained%20Classification%20Barrier%0AAuthor%3A%20Li-Jun%20Zhao%20and%20Si-Yuan%20Zhang%20and%20Zhen-Duo%20Chen%20and%20Xin%20Luo%20and%20Xin-Shun%20Xu%0AAbstract%3A%20Current%20fine-grained%20classification%20research%20primarily%20focuses%20on%20fine-grained%20feature%20learning.%20However%2C%20in%20real-world%20scenarios%2C%20fine-grained%20data%20annotation%20is%20challenging%2C%20and%20the%20features%20and%20semantics%20are%20highly%20diverse%20and%20frequently%20changing.%20These%20issues%20create%20inherent%20barriers%20between%20traditional%20experimental%20settings%20and%20real-world%20applications%2C%20limiting%20the%20effectiveness%20of%20conventional%20fine-grained%20classification%20methods.%20Although%20some%20recent%20studies%20have%20provided%20potential%20solutions%20to%20these%20issues%2C%20most%20of%20them%20still%20rely%20on%20limited%20supervised%20information%20and%20thus%20fail%20to%20offer%20effective%20solutions.%20In%20this%20paper%2C%20based%20on%20theoretical%20analysis%2C%20we%20propose%20a%20novel%20learning%20paradigm%20to%20break%20the%20barriers%20in%20fine-grained%20classification.%20This%20paradigm%20enables%20the%20model%20to%20progressively%20learn%20during%20inference%2C%20thereby%20leveraging%20cost-free%20data%20at%20inference%20time%20to%20more%20accurately%20represent%20fine-grained%20categories%20and%20adapt%20to%20dynamic%20semantic%20changes.%20On%20 {"title": "GCTAM: Global and Contextual Truncated Affinity Combined Maximization Model For Unsupervised Graph Anomaly Detection", "author": "Xiong Zhang and Hong Peng and Zhenli He and Cheng Xie and Xin Jin and Hua Jiang", "abstract": "Anomalies often occur in real-world information networks/graphs, such as malevolent users, malicious comments, banned users, and fake news in social graphs. The latest graph anomaly detection methods use a novel mechanism called truncated affinity maximization (TAM) to detect anomaly nodes without using any label information and achieve impressive results. TAM maximizes the affinities among the normal nodes while truncating the affinities of the anomalous nodes to identify the anomalies. However, existing TAM-based methods truncate suspicious nodes according to a rigid threshold that ignores the specificity and high-order affinities of different nodes. This inevitably causes inefficient truncations from both normal and anomalous nodes, limiting the effectiveness of anomaly detection. To this end, this paper proposes a novel truncation model combining contextual and global affinity to truncate the anomalous nodes. The core idea of the work is to use contextual truncation to decrease the affinity of anomalous nodes, while global truncation increases the affinity of normal nodes. Extensive experiments on massive real-world datasets show that our method surpasses peer methods in most graph anomaly detection tasks. In highlights, compared with previous state-of-the-art methods, the proposed method has +15\\% $\\sim$ +20\\% improvements in two famous real-world datasets, Amazon and YelpChi. Notably, our method works well in large datasets, Amazin-all and YelpChi-all, and achieves the best results, while most previous models cannot complete the tasks.", "link": "http://arxiv.org/abs/2603.01806v1", "date": "2026-03-02", "relevancy": 2.5361, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5433}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5048}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4735}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GCTAM%3A%20Global%20and%20Contextual%20Truncated%20Affinity%20Combined%20Maximization%20Model%20For%20Unsupervised%20Graph%20Anomaly%20Detection&body=Title%3A%20GCTAM%3A%20Global%20and%20Contextual%20Truncated%20Affinity%20Combined%20Maximization%20Model%20For%20Unsupervised%20Graph%20Anomaly%20Detection%0AAuthor%3A%20Xiong%20Zhang%20and%20Hong%20Peng%20and%20Zhenli%20He%20and%20Cheng%20Xie%20and%20Xin%20Jin%20and%20Hua%20Jiang%0AAbstract%3A%20Anomalies%20often%20occur%20in%20real-world%20information%20networks/graphs%2C%20such%20as%20malevolent%20users%2C%20malicious%20comments%2C%20banned%20users%2C%20and%20fake%20news%20in%20social%20graphs.%20The%20latest%20graph%20anomaly%20detection%20methods%20use%20a%20novel%20mechanism%20called%20truncated%20affinity%20maximization%20%28TAM%29%20to%20detect%20anomaly%20nodes%20without%20using%20any%20label%20information%20and%20achieve%20impressive%20results.%20TAM%20maximizes%20the%20affinities%20among%20the%20normal%20nodes%20while%20truncating%20the%20affinities%20of%20the%20anomalous%20nodes%20to%20identify%20the%20anomalies.%20However%2C%20existing%20TAM-based%20methods%20truncate%20suspicious%20nodes%20according%20to%20a%20rigid%20threshold%20that%20ignores%20the%20specificity%20and%20high-order%20affinities%20of%20different%20nodes.%20This%20inevitably%20causes%20inefficient%20truncations%20from%20both%20normal%20and%20anomalous%20nodes%2C%20limiting%20the%20effectiveness%20of%20anomaly%20detection.%20To%20this%20end%2C%20this%20paper%20proposes%20a%20novel%20truncation%20model%20combining%20contextual%20and%20global%20affinity%20to%20truncate%20the%20anomalous%20nodes.%20The%20core%20idea%20of%20the%20work%20is%20to%20use%20contextual%20truncation%20to%20decrease%20the%20affinity%20of%20anomalous%20nodes%2C%20while%20global%20truncation%20increases%20the%20affinity%20of%20normal%20nodes.%20Extensive%20experiments%20on%20massive%20real-world%20datasets%20show%20that%20our%20method%20surpasses%20peer%20methods%20in%20most%20graph%20anomaly%20detection%20tasks.%20In%20highlights%2C%20compared%20with%20previous%20state-of-the-art%20methods%2C%20the%20proposed%20method%20has%20%2B15%5C%25%20%24%5Csim%24%20%2B20%5C%25%20improvements%20in%20two%20famous%20real-world%20datasets%2C%20Amazon%20and%20YelpChi.%20Notably%2C%20our%20method%20works%20well%20in%20large%20datasets%2C%20Amazin-all%20and%20YelpChi-all%2C%20and%20achieves%20the%20best%20results%2C%20while%20most%20previous%20models%20cannot%20complete%20the%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01806v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGCTAM%253A%2520Global%2520and%2520Contextual%2520Truncated%2520Affinity%2520Combined%2520Maximization%2520Model%2520For%2520Unsupervised%2520Graph%2520Anomaly%2520Detection%26entry.906535625%3DXiong%2520Zhang%2520and%2520Hong%2520Peng%2520and%2520Zhenli%2520He%2520and%2520Cheng%2520Xie%2520and%2520Xin%2520Jin%2520and%2520Hua%2520Jiang%26entry.1292438233%3DAnomalies%2520often%2520occur%2520in%2520real-world%2520information%2520networks/graphs%252C%2520such%2520as%2520malevolent%2520users%252C%2520malicious%2520comments%252C%2520banned%2520users%252C%2520and%2520fake%2520news%2520in%2520social%2520graphs.%2520The%2520latest%2520graph%2520anomaly%2520detection%2520methods%2520use%2520a%2520novel%2520mechanism%2520called%2520truncated%2520affinity%2520maximization%2520%2528TAM%2529%2520to%2520detect%2520anomaly%2520nodes%2520without%2520using%2520any%2520label%2520information%252 te%2520the%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.01806v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GCTAM%3A%20Global%20and%20Contextual%20Truncated%20Affinity%20Combined%20Maximization%20Model%20For%20Unsupervised%20Graph%20Anomaly%20Detection&entry.906535625=Xiong%20Zhang%20and%20Hong%20Peng%20and%20Zhenli%20He%20and%20Cheng%20Xie%20and%20Xin%20Jin%20and%20Hua%20Jiang&entry.1292438233=Anomalies%20often%20occur%20in%20real-world%20information%20networks/graphs%2C%20such%20as%20malevolent%20users%2C%20malicious%20comments%2C%20banned%20users%2C%20and%20fake%20news%20in%20social%20graphs.%20The%20latest%20graph%20anomaly%20detection%20methods%20use%20a%20novel%20mechanism%20called%20truncated%20affinity%20maximization%20%28TAM%29%20to%20detect%20anomaly%20nodes%20without%20using%20any%20label%20information%20and%20achieve%20impressive%20results.%20TAM%20maximizes%20the%20affinities%20among%20the%20normal%20nodes%20while%20truncating%20the%20affinities%20of%20the%20anomalous%20nodes%20to%20identify%20the%20anomalies.%20However%2C%20existing%20TAM-based%20methods%20truncate%20suspicious%20nodes%20according%20to%20a%20rigid%20threshold%20that%20ignores%20the%20specificity%20and%20high-order%20affinities%20of%20different%20nodes.%20This%20inevitably%20causes%20inefficient%20truncations%20from%20both%20normal%20and%20anomalous%20nodes%2C%20limiting%20the%20effectiveness%20of%20anomaly%20detection.%20To%20this%20end%2C%20this%20paper%20proposes%20a%20novel%20truncation%20model%20combining%20contextual%20and%20global%20affinity%20to%20truncate%20the%20anomalous%20nodes.%20The%20core%20idea%20of%20the%20work%20is%20to%20use%20contextual%20truncation%20to%20decrease%20the%20affinity%20of%20anomalous%20nodes%2C%20while%20global%20truncation%20increases%20the%20affinity%20of%20normal%20nodes.%20Extensive%20experiments%20on%20massive%20real-world% {"title": "Decoupling Bias, Aligning Distributions: Synergistic Fairness Optimization for Deepfake Detection", "author": "Feng Ding and Wenhui Yi and Yunpeng Zhou and Xinan He and Hong Rao and Shu Hu", "abstract": "Fairness is a core element in the trustworthy deployment of deepfake detection models, especially in the field of digital identity security. Biases in detection models toward different demographic groups, such as gender and race, may lead to systemic misjudgments, exacerbating the digital divide and social inequities. However, current fairness-enhanced detectors often improve fairness at the cost of detection accuracy. To address this challenge, we propose a dual-mechanism collaborative optimization framework. Our proposed method innovatively integrates structural fairness decoupling and global distribution alignment: decoupling channels sensitive to demographic groups at the model architectural level, and subsequently reducing the distance between the overall sample distribution and the distributions corresponding to each demographic group at the feature level. Experimental results demonstrate that, compared with other methods, our framework improves both inter-group and intra-group fairness while maintaining overall detection accuracy across domains.", "link": "http://arxiv.org/abs/2511.10150v4", "date": "2026-03-02", "relevancy": 2.5246, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5112}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5064}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4972}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoupling%20Bias%2C%20Aligning%20Distributions%3A%20Synergistic%20Fairness%20Optimization%20for%20Deepfake%20Detection&body=Title%3A%20Decoupling%20Bias%2C%20Aligning%20Distributions%3A%20Synergistic%20Fairness%20Optimization%20for%20Deepfake%20Detection%0AAuthor%3A%20Feng%20Ding%20and%20Wenhui%20Yi%20and%20Yunpeng%20Zhou%20and%20Xinan%20He%20and%20Hong%20Rao%20and%20Shu%20Hu%0AAbstract%3A%20Fairness%20is%20a%20core%20element%20in%20the%20trustworthy%20deployment%20of%20deepfake%20detection%20models%2C%20especially%20in%20the%20field%20of%20digital%20identity%20security.%20Biases%20in%20detection%20models%20toward%20different%20demographic%20groups%2C%20such%20as%20gender%20and%20race%2C%20may%20lead%20to%20systemic%20misjudgments%2C%20exacerbating%20the%20digital%20divide%20and%20social%20inequities.%20However%2C%20current%20fairness-enhanced%20detectors%20often%20improve%20fairness%20at%20the%20cost%20of%20detection%20accuracy.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20dual-mechanism%20collaborative%20optimization%20framework.%20Our%20proposed%20method%20innovatively%20integrates%20structural%20fairness%20decoupling%20and%20global%20distribution%20alignment%3A%20decoupling%20channels%20sensitive%20to%20demographic%20groups%20at%20the%20model%20architectural%20level%2C%20and%20subsequently%20reducing%20the%20distance%20between%20the%20overall%20sample%20distribution%20and%20the%20distributions%20corresponding%20to%20each%20demographic%20group%20at%20the%20feature%20level.%20Experimental%20results%20demonstrate%20that%2C%20compared%20with%20other%20methods%2C%20our%20framework%20improves%20both%20inter-group%20and%20intra-group%20fairness%20while%20maintaining%20overall%20detection%20accuracy%20across%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2511.10150v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoupling%2520Bias%252C%2520Aligning%2520Distributions%253A%2520Synergistic%2520Fairness%2520Optimization%2520for%2520Deepfake

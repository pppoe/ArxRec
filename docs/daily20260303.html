{"title": "tttLRM: Test-Time Training for Long Context and Autoregressive 3D Reconstruction", "author": "Chen Wang and Hao Tan and Wang Yifan and Zhiqin Chen and Yuheng Liu and Kalyan Sunkavalli and Sai Bi and Lingjie Liu and Yiwei Hu", "abstract": "We propose tttLRM, a novel large 3D reconstruction model that leverages a Test-Time Training (TTT) layer to enable long-context, autoregressive 3D reconstruction with linear computational complexity, further scaling the model's capability. Our framework efficiently compresses multiple image observations into the fast weights of the TTT layer, forming an implicit 3D representation in the latent space that can be decoded into various explicit formats, such as Gaussian Splats (GS) for downstream applications. The online learning variant of our model supports progressive 3D reconstruction and refinement from streaming observations. We demonstrate that pretraining on novel view synthesis tasks effectively transfers to explicit 3D modeling, resulting in improved reconstruction quality and faster convergence. Extensive experiments show that our method achieves superior performance in feedforward 3D Gaussian reconstruction compared to state-of-the-art approaches on both objects and scenes.", "link": "http://arxiv.org/abs/2602.20160v2", "date": "2026-03-02", "relevancy": 3.147, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6807}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6065}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20tttLRM%3A%20Test-Time%20Training%20for%20Long%20Context%20and%20Autoregressive%203D%20Reconstruction&body=Title%3A%20tttLRM%3A%20Test-Time%20Training%20for%20Long%20Context%20and%20Autoregressive%203D%20Reconstruction%0AAuthor%3A%20Chen%20Wang%20and%20Hao%20Tan%20and%20Wang%20Yifan%20and%20Zhiqin%20Chen%20and%20Yuheng%20Liu%20and%20Kalyan%20Sunkavalli%20and%20Sai%20Bi%20and%20Lingjie%20Liu%20and%20Yiwei%20Hu%0AAbstract%3A%20We%20propose%20tttLRM%2C%20a%20novel%20large%203D%20reconstruction%20model%20that%20leverages%20a%20Test-Time%20Training%20%28TTT%29%20layer%20to%20enable%20long-context%2C%20autoregressive%203D%20reconstruction%20with%20linear%20computational%20complexity%2C%20further%20scaling%20the%20model%27s%20capability.%20Our%20framework%20efficiently%20compresses%20multiple%20image%20observations%20into%20the%20fast%20weights%20of%20the%20TTT%20layer%2C%20forming%20an%20implicit%203D%20representation%20in%20the%20latent%20space%20that%20can%20be%20decoded%20into%20various%20explicit%20formats%2C%20such%20as%20Gaussian%20Splats%20%28GS%29%20for%20downstream%20applications.%20The%20online%20learning%20variant%20of%20our%20model%20supports%20progressive%203D%20reconstruction%20and%20refinement%20from%20streaming%20observations.%20We%20demonstrate%20that%20pretraining%20on%20novel%20view%20synthesis%20tasks%20effectively%20transfers%20to%20explicit%203D%20modeling%2C%20resulting%20in%20improved%20reconstruction%20quality%20and%20faster%20convergence.%20Extensive%20experiments%20show%20that%20our%20method%20achieves%20superior%20performance%20in%20feedforward%203D%20Gaussian%20reconstruction%20compared%20to%20state-of-the-art%20approaches%20on%20both%20objects%20and%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20160v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DtttLRM%253A%2520Test-Time%2520Training%2520for%2520Long%2520Context%2520and%2520Autoregressive%25203D%2520Reconstruction%26entry.906535625%3DChen%2520Wang%2520and%2520Hao%2520Tan%2520and%2520Wang%2520Yifan%2520and%2520Zhiqin%2520Chen%2520and%2520Yuhen {"title": "Non-verbal Real-time Human-AI Interaction in Constrained Robotic Environments", "author": "Dragos Costea and Alina Marcu and Cristina Lazar and Marius Leordeanu", "abstract": "We study the ongoing debate regarding the statistical fidelity of AI-generated data compared to human-generated data in the context of non-verbal communication using full body motion. Concretely, we ask if contemporary generative models move beyond surface mimicry to participate in the silent, but expressive dialogue of body language. We tackle this question by introducing the first framework that generates a natural non-verbal interaction between Human and AI in real-time from 2D body keypoints. Our experiments utilize four lightweight architectures which run at up to 100 FPS on an NVIDIA Orin Nano, effectively closing the perception-action loop needed for natural Human-AI interaction. We trained on 437 human video clips and demonstrated that pretraining on synthetically-generated sequences reduces motion errors significantly, without sacrificing speed. Yet, a measurable reality gap persists. When the best model is evaluated on keypoints extracted from cutting-edge text-to-video systems, such as SORA and VEO, we observe that performance drops on SORA-generated clips. However, it degrades far less on VEO, suggesting that temporal coherence, not image fidelity, drives real-world performance. Our results demonstrate that statistically distinguishable differences persist between Human and AI motion.", "link": "http://arxiv.org/abs/2603.01804v1", "date": "2026-03-02", "relevancy": 3.0509, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6414}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5977}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5915}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Non-verbal%20Real-time%20Human-AI%20Interaction%20in%20Constrained%20Robotic%20Environments&body=Title%3A%20Non-verbal%20Real-time%20Human-AI%20Interaction%20in%20Constrained%20Robotic%20Environments%0AAuthor%3A%20Dragos%20Costea%20and%20Alina%20Marcu%20and%20Cristina%20Lazar%20and%20Marius%20Leordeanu%0AAbstract%3A%20We%20study%20the%20ongoing%20debate%20regarding%20the%20statistical%20fidelity%20of%20AI-generated%20data%20compared%20to%20human-generated%20data%20in%20the%20context%20of%20non-verbal%20communication%20using%20full%20body%20motion.%20Concretely%2C%20we%20ask%20if%20contemporary%20generative%20models%20move%20beyond%20surface%20mimicry%20to%20participate%20in%20the%20silent%2C%20but%20expressive%20dialogue%20of%20body%20language.%20We%20tackle%20this%20question%20by%20introducing%20the%20first%20framework%20that%20generates%20a%20natural%20non-verbal%20interaction%20between%20Human%20and%20AI%20in%20real-time%20from%202D%20body%20keypoints.%20Our%20experiments%20utilize%20four%20lightweight%20architectures%20which%20run%20at%20up%20to%20100%20FPS%20on%20an%20NVIDIA%20Orin%20Nano%2C%20effectively%20closing%20the%20perception-action%20loop%20needed%20for%20natural%20Human-AI%20interaction.%20We%20trained%20on%20437%20human%20video%20clips%20and%20demonstrated%20that%20pretraining%20on%20synthetically-generated%20sequences%20reduces%20motion%20errors%20significantly%2C%20without%20sacrificing%20speed.%20Yet%2C%20a%20measurable%20reality%20gap%20persists.%20When%20the%20best%20model%20is%20evaluated%20on%20keypoints%20extracted%20from%20cutting-edge%20text-to-video%20systems%2C%20such%20as%20SORA%20and%20VEO%2C%20we%20observe%20that%20performance%20drops%20on%20SORA-generated%20clips.%20However%2C%20it%20degrades%20far%20less%20on%20VEO%2C%20suggesting%20that%20temporal%20coherence%2C%20not%20image%20fidelity%2C%20drives%20real-world%20performance.%20Our%20results%20demonstrate%20that%20statistically%20distinguishable%20differences%20persist%20between%20Human%20and%20AI%20motion.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01804v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNon-verbal%2520Real-time%2520Human-AI%2520Interaction%2520in%2520Constrained%2520Robotic%2520Environments%26entry.906535625%3DDragos%2520Costea%2520and%2520Alina%2520Marcu%2520and%2520Cristina%2520Lazar%2520and%2520Marius%2520Leordeanu%26entry.1292438233%3DWe%2520study%2520the%2520ongoing%2520debate%2520regarding%2520the%2520statistical%2520fidelity%2520of%2520AI-generated%2520data%2520compared%2520to%2520human-generated%2520data%2520in%2520the%2520context%2520of%2520non-verbal%2520communication%2520using%2520full%2520body%2520motion.%2520Concretely%252C%2520we%2520ask%2520if%2520contemporary%2520generative%2520models%2520move%2520beyond%2520surface%2520mimicry%2520to%2520participate%2520in%2520the%2520silent%252C%2520but%2520expressive%2520dialogue%2520of%2520body%2520language.%2520We%2520tackle%2520this%2520question%2520by%2520introducing%2520the%2520first%2520framework%2520that%2520generates%2520a%2520natural%2520non-verbal%2520interaction%2520between%2520Human%2520and%2520AI%2520in%2520real-time%2520from%25202D%2520body%2520keypoints.%2520Our%2520experiments%2520utilize%2520four%2520lightweight%2520architectures%2520which%2520run%2520at%2520up%2520to%2520100%2520FPS%2520on%2520an%2520NVIDIA%2520Orin%2520Nano%252C%2520effectively%2520closing%2520the%2520perception-action%2520loop%2520needed%2520for%2520natural%2520Human-AI%2520interaction.%2520We%2520trained%2520on%2520437%2520human%2520video%2520clips%2520and%2520demonstrated%2520that%2520pretraining%2520on%2520synthetically-generated%2520sequences%2520reduces%2520motion%2520errors%2520significantly%252C%2520without%2520sacrificing%2520speed.%2520Yet%252C%2520a%2520measurable%2520reality%2520gap%2520persis {"title": "FastLightGen: Fast and Light Video Generation with Fewer Steps and Parameters", "author": "Shao Shitong and Gu Yufei and Xie Zeke", "abstract": "The recent advent of powerful video generation models, such as Hunyuan, WanX, Veo3, and Kling, has inaugurated a new era in the field. However, the practical deployment of these models is severely impeded by their substantial computational overhead, which stems from enormous parameter counts and the iterative, multi-step sampling process required during inference. Prior research on accelerating generative models has predominantly followed two distinct trajectories: reducing the number of sampling steps (e.g., LCM, DMD, and MagicDistillation) or compressing the model size for more efficient inference (e.g., ICMD). The potential of simultaneously compressing both to create a fast and lightweight model remains an unexplored avenue. In this paper, we propose FastLightGen, an algorithm that transforms large, computationally expensive models into fast, lightweight counterparts. The core idea is to construct an optimal teacher model, one engineered to maximize student performance, within a synergistic framework for distilling both model size and inference steps. Our extensive experiments on HunyuanVideo-ATI2V and WanX-TI2V reveal that a generator using 4-step sampling and 30\\% parameter pruning achieves optimal visual quality under a constrained inference budget. Furthermore, FastLightGen consistently outperforms all competing methods, establishing a new state-of-the-art in efficient video generation.", "link": "http://arxiv.org/abs/2603.01685v1", "date": "2026-03-02", "relevancy": 2.9859, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6024}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.599}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FastLightGen%3A%20Fast%20and%20Light%20Video%20Generation%20with%20Fewer%20Steps%20and%20Parameters&body=Title%3A%20FastLightGen%3A%20Fast%20and%20Light%20Video%20Generation%20with%20Fewer%20Steps%20and%20Parameters%0AAuthor%3A%20Shao%20Shitong%20and%20Gu%20Yufei%20and%20Xie%20Zeke%0AAbstract%3A%20The%20recent%20advent%20of%20powerful%20video%20generation%20models%2C%20such%20as%20Hunyuan%2C%20WanX%2C%20Veo3%2C%20and%20Kling%2C%20has%20inaugurated%20a%20new%20era%20in%20the%20field.%20However%2C%20the%20practical%20deployment%20of%20these%20models%20is%20severely%20impeded%20by%20their%20substantial%20computational%20overhead%2C%20which%20stems%20from%20enormous%20parameter%20counts%20and%20the%20iterative%2C%20multi-step%20sampling%20process%20required%20during%20inference.%20Prior%20research%20on%20accelerating%20generative%20models%20has%20predominantly%20followed%20two%20distinct%20trajectories%3A%20reducing%20the%20number%20of%20sampling%20steps%20%28e.g.%2C%20LCM%2C%20DMD%2C%20and%20MagicDistillation%29%20or%20compressing%20the%20model%20size%20for%20more%20efficient%20inference%20%28e.g.%2C%20ICMD%29.%20The%20potential%20of%20simultaneously%20compressing%20both%20to%20create%20a%20fast%20and%20lightweight%20model%20remains%20an%20unexplored%20avenue.%20In%20this%20paper%2C%20we%20propose%20FastLightGen%2C%20an%20algorithm%20that%20transforms%20large%2C%20computationally%20expensive%20models%20into%20fast%2C%20lightweight%20counterparts.%20The%20core%20idea%20is%20to%20construct%20an%20optimal%20teacher%20model%2C%20one%20engineered%20to%20maximize%20student%20performance%2C%20within%20a%20synergistic%20framework%20for%20distilling%20both%20model%20size%20and%20inference%20steps.%20Our%20extensive%20experiments%20on%20HunyuanVideo-ATI2V%20and%20WanX-TI2V%20reveal%20that%20a%20generator%20using%204-step%20sampling%20and%2030%5C%25%20parameter%20pruning%20achieves%20optimal%20visual%20quality%20under%20a%20constrained%20inference%20budget.%20Furthermore%2C%20FastLightGen%20consistently%20outperforms%20all%20competing%20methods%2C%20establishing%20a%20new%20state-of-the-art%20in%20efficient%20video%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01685v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFastLightGen%253A%2520Fast%2520and%2520Light%2520Video%2520Generation%2520with%2520Fewer%2520Steps%2520and%2520Parameters%26entry.906535625%3DShao%2520Shitong%2520and%2520Gu%2520Yufei%2520and%2520Xie%2520Zeke%26entry.1292438233%3DThe%2520recent%2520advent%2520of%2520powerful%2520video%2520generation%2520models%252C%2520such%2520as%2520Hunyuan%252C%2520WanX%252C%2520Veo3%252C%2520and%2520Kling%252C%2520has%2520inaugurated%2520a%2520new%2520era%2520in%2520the%2520field.%2520However%252C%2520the%2520practical%2520deployment%2520of%2520these%2520models%2520is%2520severely%2520impeded%2520by%2520their%2520substantial%2520computational%2520overhead%252C%2520which%2520stems%2520from%2520enormous%2520parameter%2520counts%2520and%2520the%2520iterative%252C%2520multi-step%2520sampling%2520process%2520required%2520during%2520inference.%2520Prior%2520research%2520on%2520accelerating%2520generative%2520models%2520has%2520predominantly%2520followed%2520two%2520distinct%2520trajectories%253A%2520reducing%2520the%2520number%2520of%2520sampling%2520steps%2520%2528e.g.%252C%2520LCM%252C%2520DMD%252C%2520and%2520MagicDistillation%2529%2520or%2520compressing%2520the%2520model%2520size%2520for%2520more%2520efficient%2520inference%2520%2528e.g.%252C%2520ICMD%2529.%2520The%2520potential%2520of%2520simultaneously%2520compressing%2520both%2520to%2520create%2520a%2520fast%2520and%2520lightweight%2520model%2520remains%2520an%2520unexplored%2520avenue.%2520In%2520this%2520paper%252C%2520we%2520propose%2520FastLightGen%25 {"title": "Pseudo Contrastive Learning for Diagram Comprehension in Multimodal Models", "author": "Hiroshi Sasaki", "abstract": "Recent multimodal models such as Contrastive Language-Image Pre-training (CLIP) have shown remarkable ability to align visual and linguistic representations. However, domains where small visual differences carry large semantic significance, such as diagram understanding, remain challenging due to the models' limited sensitivity to fine-grained structural variations.\n  We propose a new training paradigm designed to enhance diagram comprehension in vision-language models. Our approach introduces pseudo contrastive samples generated by a diagram renderer that creates synthetic diagrams using randomly picked text elements. These samples highlight structural differences in diagrammatic imagery without requiring any modification or editing of the original data. By incorporating these pseudo contrastive samples into the training objective, the model learns to capture more precise and semantically consistent diagram structures.\n  Empirical evaluations on a benchmark dataset of flowcharts demonstrate substantial improvements over standard CLIP and hard-negative CLIP training in both image-text matching and visual question answering tasks. The results underscore the value of domain-specific training strategies and contribute to advancing diagrammatic understanding within the broader context of vision-language learning.", "link": "http://arxiv.org/abs/2602.23589v2", "date": "2026-03-02", "relevancy": 2.9447, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.619}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5739}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5739}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pseudo%20Contrastive%20Learning%20for%20Diagram%20Comprehension%20in%20Multimodal%20Models&body=Title%3A%20Pseudo%20Contrastive%20Learning%20for%20Diagram%20Comprehension%20in%20Multimodal%20Models%0AAuthor%3A%20Hiroshi%20Sasaki%0AAbstract%3A%20Recent%20multimodal%20models%20such%20as%20Contrastive%20Language-Image%20Pre-training%20%28CLIP%29%20have%20shown%20remarkable%20ability%20to%20align%20visual%20and%20linguistic%20representations.%20However%2C%20domains%20where%20small%20visual%20differences%20carry%20large%20semantic%20significance%2C%20such%20as%20diagram%20understanding%2C%20remain%20challenging%20due%20to%20the%20models%27%20limited%20sensitivity%20to%20fine-grained%20structural%20variations.%0A%20%20We%20propose%20a%20new%20training%20paradigm%20designed%20to%20enhance%20diagram%20comprehension%20in%20vision-language%20models.%20Our%20approach%20introduces%20pseudo%20contrastive%20samples%20generated%20by%20a%20diagram%20renderer%20that%20creates%20synthetic%20diagrams%20using%20randomly%20picked%20text%20elements.%20These%20samples%20highlight%20structural%20differences%20in%20diagrammatic%20imagery%20without%20requiring%20any%20modification%20or%20editing%20of%20the%20original%20data.%20By%20incorporating%20these%20pseudo%20contrastive%20samples%20into%20the%20training%20objective%2C%20the%20model%20learns%20to%20capture%20more%20precise%20and%20semantically%20consistent%20diagram%20structures.%0A%20%20Empirical%20evaluations%20on%20a%20benchmark%20dataset%20of%20flowcharts%20demonstrate%20substantial%20improvements%20over%20standard%20CLIP%20and%20hard-negative%20CLIP%20training%20in%20both%20image-text%20matching%20and%20visual%20question%20answering%20tasks.%20The%20results%20underscore%20the%20value%20of%20domain-specific%20training%20strategies%20and%20contribute%20to%20advancing%20diagrammatic%20understanding%20within%20the%20broader%20context%20of%20vision-language%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23589v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPseudo%2520Contrastive%2520Learning%2520for%2520Diagram%2520Comprehension%2520in%2520Multimodal%2520Models%26entry.906535625%3DHiroshi%2520Sasaki%26entry.1292438233%3DRecent%2520multimodal%2520models%2520such%2520as%2520Contrastive%2520Language-Image%2520Pre-training%2520%2528CLIP%2529%2520have%2520shown%2520remarkable%2520ability%2520to%2520align%2520visual%2520and%2520linguistic%2520representations.%2520However%252C%2520domains%2520where%2520small%2520visual%2520differences%2520carry%2520large%2520semantic%2520significance%252C%2520such%2520as%2520diagram%2520understanding%252C%2520remain%2520challenging%2520due%2520to%2520the%2520models%2527%2520limited%2520sensitivity%2520to%2520fine-grained%2520structural%2520variations.%250A%2520%2520We%2520propose%2520a%2520new%2520training%2520paradigm%2520designed%2520to%2520enhance%2520diagram%2520comprehension%2520in%2520vision-language%2520models.%2520Our%2520approach%2520introduces%2520pseudo%2520contrastive%2520samples%2520generated%2520by%2520a%2520diagram%2520renderer%2520that%2520creates%2520synthetic%2520diagrams%2520using%2520randomly%2520picked%2520text%2520elements.%2520These%2520samples%2520highlight%2520structural%2520differences%2520in%2520diagrammatic%2520imagery%2520without%2520requiring%2520any%2520modification%2520or%2520editing%2520of%2520the%2520original%2520data.%2520By%2520incorporating%2520these%2520pseudo%2520contrastive%2520samples%2520into%2520the%2520training%2520objective%252C%2520the%2520model%2520learns%2520to%2520capture%2520more%2520precise%2520and%2520semantically%2520consistent%2520diagram%2520structures.%250A%2520%2520Empirical%2520evaluations%2520on%2520a%2520benchmark%2520dataset%2520of%2520flowcharts%2520demonstrate%2520substantial%2520improvements%2520over%2520standard%2520CLIP%2520and%2520hard-negative%2520CLIP%2520training%2520in%2520both%2520image-text%2520matching%2520and%2520visual%2520question%2520answering%2520tasks.%2520The%2520results%2520underscore%2520the%2520value%2520of%2520domain-specific%2520training%2520strategies%2520and%2520contribute%2520to%2520advancing%2520diagrammatic%2520understanding%2520within%2520the%2520broader%2520context%2520of%2520vision-language%2520learning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23589v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Pseudo%20Contrastive%20Learning%20for%20Diagram%20Comprehension%20in%20Multimodal%20Models&entry.906535625=Hiroshi%20Sasaki&entry.1292438233=Recent%20multimodal%20models%20such%20as%20Contrastive%20Language-Image%20Pre-training%20%28CLIP%29%20have%20shown%20remarkable%20ability%20to%20align%20visual%20and%20linguistic%20representations.%20However%2C%20domains%20where%20small%20visual%20differences%20carry%20large%20semantic%20significance%2C%20such%20as%20diagram%20understanding%2C%20remain%20challenging%20due%20to%20the%20models%27%20limited%20sensitivity%20to%20fine-grained%20structural%20variations.%0A%20%20We%20propose%20a%20new%20training%20paradigm%20designed%20to%20enhance%20diagram%20comprehension%20in%20vision-language%20models.%20Our%20approach%20introduces%20pseudo%20contrastive%20samples%20generated%20by%20a%20diagram%20renderer%20that%20creates%20synthetic%20diagrams%20using%20randomly%20picked%20text%20elements.%20These%20samples%20highlight%20structural%20differences%20in%20diagrammatic%20imagery%20without%20requiring%20any%20modification%20or%20editing%20of%20the%20original%20data.%20By%20incorporating%20these%20pseudo%20contrastive%20samples%20into%20the%20training%20objective%2C%20the%20model%20learns%20to%20capture%20more%20precise%20and%20semantically%20consistent%20diagram%20structures.%0A%20%20Empirical%20evaluations%20on%20a%20benchmark%20dataset%20of%20flowcharts%20demonstrate%20substantial%20improvements%20over%20standard%20CLIP%20and%20hard-negative%20CLIP%20training%20in%20both%20image-text%20matching%20and%20visual%20question%20answering%20tasks.%20The%20results%20underscore%20the%20value%20of%20domain-specific%20training%20strategies%20and%20contribute%20to%20advancing%20diagrammatic%20understanding%20within%20the%20broader%20context%20of%20vision-language%20learning.&entry.1838667208=http%3A//arxiv.org/abs/2602.23589v2&entry.124074799=Read"},
{"title": "Learning to Read Where to Look: Disease-Aware Vision-Language Pretraining for 3D CT", "author": "Simon Ging and Philipp Arnold and Sebastian Walter and Hani Alnahas and Hannah Bast and Elmar Kotter and Jiancheng Yang and Behzad Bozorgtabar and Thomas Brox", "abstract": "Recent 3D CT vision-language models align volumes with reports via contrastive pretraining, but typically rely on limited public data and provide only coarse global supervision. We train a 3D CT vision-language model on 98k report-volume pairs (50k patients) collected at a single hospital, combined with public datasets, using SigLIP-style contrastive pretraining together with prompt-based disease supervision in the shared vision-text embedding space. On CT-RATE, our model achieves state-of-the-art text-to-image retrieval (R@10 31.5 vs. 22.2) and competitive disease classification (AUC 83.8 vs. 83.8), with consistent results on Rad-ChestCT (AUC 77.0 vs. 77.3). We further observe that radiologists routinely reference specific images within their reports (e.g., ``series X, image Y''), linking textual descriptions to precise axial locations. We automatically mine 262k such snippet-slice pairs and introduce the task of intra-scan snippet localization -- predicting the axial depth referred to by a text snippet -- reducing mean absolute error to 36.3 mm at 12 mm feature resolution, compared with 67.0 mm for the best baseline. Adding this localization objective leaves retrieval and classification broadly unchanged within confidence bounds, yielding a single unified model for retrieval, classification, and intra-scan grounding.", "link": "http://arxiv.org/abs/2603.02026v1", "date": "2026-03-02", "relevancy": 2.9386, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5955}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5838}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5838}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Read%20Where%20to%20Look%3A%20Disease-Aware%20Vision-Language%20Pretraining%20for%203D%20CT&body=Title%3A%20Learning%20to%20Read%20Where%20to%20Look%3A%20Disease-Aware%20Vision-Language%20Pretraining%20for%203D%20CT%0AAuthor%3A%20Simon%20Ging%20and%20Philipp%20Arnold%20and%20Sebastian%20Walter%20and%20Hani%20Alnahas%20and%20Hannah%20Bast%20and%20Elmar%20Kotter%20and%20Jiancheng%20Yang%20and%20Behzad%20Bozorgtabar%20and%20Thomas%20Brox%0AAbstract%3A%20Recent%203D%20CT%20vision-language%20models%20align%20volumes%20with%20reports%20via%20contrastive%20pretraining%2C%20but%20typically%20rely%20on%20limited%20public%20data%20and%20provide%20only%20coarse%20global%20supervision.%20We%20train%20a%203D%20CT%20vision-language%20model%20on%2098k%20report-volume%20pairs%20%2850k%20patients%29%20collected%20at%20a%20single%20hospital%2C%20combined%20with%20public%20datasets%2C%20using%20SigLIP-style%20contrastive%20pretraining%20together%20with%20prompt-based%20disease%20supervision%20in%20the%20shared%20vision-text%20embedding%20space.%20On%20CT-RATE%2C%20our%20model%20achieves%20state-of-the-art%20text-to-image%20retrieval%20%28R%4010%2031.5%20vs.%2022.2%29%20and%20competitive%20disease%20classification%20%28AUC%2083.8%20vs.%2083.8%29%2C%20with%20consistent%20results%20on%20Rad-ChestCT%20%28AUC%2077.0%20vs.%2077.3%29.%20We%20further%20observe%20that%20radiologists%20routinely%20reference%20specific%20images%20within%20their%20reports%20%28e.g.%2C%20%60%60series%20X%2C%20image%20Y%27%27%29%2C%20linking%20textual%20descriptions%20to%20precise%20axial%20locations.%20We%20automatically%20mine%20262k%20such%20snippet-slice%20pairs%20and%20introduce%20the%20task%20of%20intra-scan%20snippet%20localization%20--%20predicting%20the%20axial%20depth%20referred%20to%20by%20a%20text%20snippet%20--%20reducing%20mean%20absolute%20error%20to%2036.3%20mm%20at%2012%20mm%20feature%20resolution%2C%20compared%20with%2067.0%20mm%20for%20the%20best%20baseline.%20Adding%20this%20localization%20objective%20leaves%20retrieval%20and%20classification%20broadly%20unchanged%20within%20confidence%20bounds%2C%20yielding%20a%20single%20unified%20model%20for%20retrieval%2C%20classification%2C%20and%20intra-scan%20grounding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02026v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Read%2520Where%2520to%2520Look%253A%2520Disease-Aware%2520Vision-Language%2520Pretraining%2520for%25203D%2520CT%26entry.906535625%3DSimon%2520Ging%2520and%2520Philipp%2520Arnold%2520and%2520Sebastian%2520Walter%2520and%2520Hani%2520Alnahas%2520and%2520Hannah%2520Bast%2520and%2520Elmar%2520Kotter%2520and%2520Jiancheng%2520Yang%2520and%2520Behzad%2520Bozorgtabar%2520and%2520Thomas%2520Brox%26entry.1292438233%3DRecent%25203D%2520CT%2520vision-language%2520models%2520align%2520volumes%2520with%2520reports%2520via%2520contrastive%2520pretraining%252C%2520but%2520typically%2520rely%2520on%2520limited%2520public%2520data%2520and%2520provide%2520only%2520coarse%2520global%2520supervision.%2520We%2520train%2520a%25203D%2520CT%2520vision-language%2520model%2520on%252098k%2520report-volume%2520pairs%2520%252850k%2520patients%2529%2520collected%2520at%2520a%2520single%2520hospital%252C%2520combined%2520with%2520public%2520datasets%252C%2520using%2520SigLIP-style%2520contrastive%2520pretraining%2520together%2520with%2520prompt-based%2520disease%2520supervision%2520in%2520the%2520shared%2520vision-text%2520embedding%2520space.%2520On%2520CT-RATE%252C%2520our%2520model%2520achieves%2520state-of-the-art%2520text-to-image%2520retrieval%2520%2528R%254010%252031.5%2520vs.%252022.2%2529%2520and%25 {"title": "Cross-modal Identity Mapping: Minimizing Information Loss in Modality Conversion via Reinforcement Learning", "author": "Haonan Jia and Shichao Dong and Xin Dong and Zenghui Sun and Jin Wang and Jinsong Lan and Xiaoyong Zhu and Bo Zheng and Kaifu Zhang", "abstract": "Large Vision-Language Models (LVLMs) often omit or misrepresent critical visual content in generated image captions. Minimizing such information loss will force LVLMs to focus on image details to generate precise descriptions. However, measuring information loss during modality conversion is inherently challenging due to the modal gap between visual content and text output. In this paper, we argue that the quality of an image caption is positively correlated with the similarity between images retrieved via text search using that caption. Based on this insight, we further propose Cross-modal Identity Mapping (CIM), a reinforcement learning framework that enhances image captioning without requiring additional annotations. Specifically, the method quantitatively evaluates the information loss from two perspectives: Gallery Representation Consistency and Query-gallery Image Relevance. Supervised under these metrics, LVLM minimizes information loss and aims to achieve identity mapping from images to captions. The experimental results demonstrate the superior performance of our method in image captioning, even when compared with Supervised Fine-Tuning. Particularly, on the COCO-LN500 benchmark, CIM achieves a 20% improvement in relation reasoning on Qwen2.5-VL-7B.The code will be released when the paper is accepted.", "link": "http://arxiv.org/abs/2603.01696v1", "date": "2026-03-02", "relevancy": 2.8878, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5945}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5799}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-modal%20Identity%20Mapping%3A%20Minimizing%20Information%20Loss%20in%20Modality%20Conversion%20via%20Reinforcement%20Learning&body=Title%3A%20Cross-modal%20Identity%20Mapping%3A%20Minimizing%20Information%20Loss%20in%20Modality%20Conversion%20via%20Reinforcement%20Learning%0AAuthor%3A%20Haonan%20Jia%20and%20Shichao%20Dong%20and%20Xin%20Dong%20and%20Zenghui%20Sun%20and%20Jin%20Wang%20and%20Jinsong%20Lan%20and%20Xiaoyong%20Zhu%20and%20Bo%20Zheng%20and%20Kaifu%20Zhang%0AAbstract%3A%20Large%20Vision-Language%20Models%20%28LVLMs%29%20often%20omit%20or%20misrepresent%20critical%20visual%20content%20in%20generated%20image%20captions.%20Minimizing%20such%20information%20loss%20will%20force%20LVLMs%20to%20focus%20on%20image%20details%20to%20generate%20precise%20descriptions.%20However%2C%20measuring%20information%20loss%20during%20modality%20conversion%20is%20inherently%20challenging%20due%20to%20the%20modal%20gap%20between%20visual%20content%20and%20text%20output.%20In%20this%20paper%2C%20we%20argue%20that%20the%20quality%20of%20an%20image%20caption%20is%20positively%20correlated%20with%20the%20similarity%20between%20images%20retrieved%20via%20text%20search%20using%20that%20caption.%20Based%20on%20this%20insight%2C%20we%20further%20propose%20Cross-modal%20Identity%20Mapping%20%28CIM%29%2C%20a%20reinforcement%20learning%20framework%20that%20enhances%20image%20captioning%20without%20requiring%20additional%20annotations.%20Specifically%2C%20the%20method%20quantitatively%20evaluates%20the%20information%20loss%20from%20two%20perspectives%3A%20Gallery%20Representation%20Consistency%20and%20Query-gallery%20Image%20Relevance.%20Supervised%20under%20these%20metrics%2C%20LVLM%20minimizes%20information%20loss%20and%20aims%20to%20achieve%20identity%20mapping%20from%20images%2 {"title": "A 3D mesh convolution-based autoencoder for geometry compression", "author": "Germain Bregeon and Marius Preda and Radu Ispas and Titus Zaharia", "abstract": "In this paper, we introduce a novel 3D mesh convolution-based autoencoder for geometry compression, able to deal with irregular mesh data without requiring neither preprocessing nor manifold/watertightness conditions. The proposed approach extracts meaningful latent representations by learning features directly from the mesh faces, while preserving connectivity through dedicated pooling and unpooling operations. The encoder compresses the input mesh into a compact base mesh space, which ensures that the latent space remains comparable. The decoder reconstructs the original connectivity and restores the compressed geometry to its full resolution. Extensive experiments on multi-class datasets demonstrate that our method outperforms state-of-the-art approaches in both 3D mesh geometry reconstruction and latent space classification tasks. Code available at: github.com/germainGB/MeshConv3D", "link": "http://arxiv.org/abs/2603.02125v1", "date": "2026-03-02", "relevancy": 2.8857, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6144}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.6041}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5129}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%203D%20mesh%20convolution-based%20autoencoder%20for%20geometry%20compression&body=Title%3A%20A%203D%20mesh%20convolution-based%20autoencoder%20for%20geometry%20compression%0AAuthor%3A%20Germain%20Bregeon%20and%20Marius%20Preda%20and%20Radu%20Ispas%20and%20Titus%20Zaharia %2520by%2520learning%2520features%2520directly%2520from%2520the%2520mesh%2520faces%252C%2520while%2520preserving%2520connectivity%2520through%2520dedicated%2520pooling%2520and%2520unpooling%2520operations.%2520The%2520encoder%2520compresses%2520the%2520input%2520mesh%2520into%2520a%2520compact%2520base%2520mesh%2520space%252C%2520which%2520ensures%2520that%2520the%2520latent%2520space%2520remains%2520comparable.%2520The%2520decoder%2520reconstructs%2520the%2520original%2520connectivity%2520and%2520restores%2520the%2520compressed%2520geometry%2520to%2520its%2520full%2520resolution.%2520Extensive%2520experiments%2520on%2520multi-class%2520datasets%2520demonstrate%2520that%2520our%2520method%2520outperforms%2520state-of-the-art%2520approaches%2520in%2520both%25203D%2520mesh%2520geometry%2520reconstruction%2520and%2520latent%2520space%2520classification%2520tasks.%2520Code%2520available%2520at%253A%2520github.com/germainGB/MeshConv3D%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02125v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%203D%20mesh%20convolution-based%20autoencoder%20for%20geometry%20compression&entry.906535625=Germain%20Bregeon%20and%20Marius%20Preda%20and%20Radu%20Ispas%20and%20Titus%20Zaharia&entry.1292438233=In%20this%20paper%2C%20we%20introduce%20a%20novel%203D%20mesh%20convolution-based%20autoencoder%20for%20geometry%20compression%2C%20able%20to%20deal%20with%20irregular%20mesh%20data%20without%20requiring%20neither%20preprocessing%20nor%20manifold/watertightness%20conditions.%20The%20proposed%20approach%20extracts%20meaningful%20latent%20representations%20by%20learning%20features%20directly%20from%20the%20mesh%20faces%2C%20while%20preserving%20connectivity%20through%20dedicated%20pooling%20and%20unpooling%20operations.%20The%20encoder%20compresses%20the%20input%20mesh%20into%20a%20compact%20base%20mesh%20space%2C%20which%20ensures%20that%20the%20latent%20space%20remains%20comparable.%20The%20decoder%20reconstructs%20the%20original%20connectivity%20and%20restores%20the%20compressed%20geometry%20to%20its%20full%20resolution.%20Extensive%20experiments%20on%20multi-class%20datasets%20demonstrate%20that%20our%20method%20outperforms%20state-of-the-art%20approaches%20in%20both%203D%20mesh%20geometry%20reconstruction%20and%20latent%20space%20classification%20tasks.%20Code%20available%20at%3A%20github.com/germainGB/MeshConv3D&entry.1838667208=http%3A//arxiv.org/abs/2603.02125v1&entry.124074799=Read"},
{"title": "Prune2Drive: A Plug-and-Play Framework for Accelerating Vision-Language Models in Autonomous Driving", "author": "Minhao Xiong and Zichen Wen and Zhuangcheng Gu and Xuyang Liu and Rui Zhang and Hengrui Kang and Jiabing Yang and Junyuan Zhang and Weijia Li and Conghui He and Yafei Wang and Linfeng Zhang", "abstract": "Vision-Language Models (VLMs) have emerged as a promising paradigm in autonomous driving (AD), providing a unified framework for perception and decision-making. However, their real-world deployment is hindered by significant computational overhead when processing high-resolution, multi-view images. This complexity stems from the massive number of visual tokens, which increases inference latency and memory consumption due to the quadratic complexity of self-attention. To address these challenges, we propose Prune2Drive, a plug-and-play visual token pruning framework for multi-view VLMs in AD. Prune2Drive introduces two core innovations: (i) a diversity-aware token selection mechanism that prioritizes semantic and spatial coverage across views, and (ii) a view-adaptive pruning controller that automatically learns optimal pruning ratios based on camera importance to downstream tasks. Unlike prior methods, Prune2Drive requires no model retraining or access to attention maps, ensuring compatibility with modern efficient attention implementations. Extensive experiments on the DriveLM and DriveLMM-o1 benchmarks demonstrate that Prune2Drive achieves significant speedups and memory savings with minimal performance impact. When retaining only 10% of visual tokens, our method achieves a 6.40x speedup in the prefilling phase and consumes only 13.4% of the original FLOPs, with a mere 3% average performance drop on the DriveLM benchmark. Code is available at: https://github.com/MinhaoXiong/Prune2Drive.git", "link": "http://arxiv.org/abs/2508.13305v2", "date": "2026-03-02", "relevancy": 2.8027, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5606}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5606}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5603}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prune2Drive%3A%20A%20Plug-and-Play%20Framework%20for%20Accelerating%20Vision-Language%20Models%20in%20Autonomous%20Driving&body=Title%3A%20Prune2Drive%3A%20A%20Plug-and-Play%20Framework%20for%20Accelerating%20Vision-Language%20Models%20in%20Autonomous%20Driving%0AAuthor%3A%20Minhao%20Xiong%20and%20Zichen%20Wen%20and%20Zhuangcheng%20Gu%20and%20Xuyang%20Liu%20and%20Rui%20Zhang%20and%20Hengrui%20Kang%20and%20Jiabing%20Yang%20and%20Junyuan%20Zhang%20and%20Weijia%20Li%20and%20Conghui%20He%20and%20Yafei%20Wang%20and%20Linfeng%20Zhang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20emerged%20as%20a%20promising%20paradigm%20in%20autonomous%20driving%20%28AD%29%2C%20providing%20a%20unified%20framework%20for%20perception%20and%20decision-making.%20However%2C%20their%20real-world%20deployment%20is%20hindered%20by%20significant%20computational%20overhead%20when%20processing%20high-resolution%2C%20multi-view%20images.%20This%20complexity%20stems%20from%20the%20massive%20number%20of%20visual%20tokens%2C%20which%20increases%20inference%20latency%20and%20memory%20consumption%20due%20to%20the%20quadratic%20complexity%20of%20self-attention.%20To%20address%20these%20challenges%2C%20we%20propose%20Prune2Drive%2C%20a%20plug-and-play%20visual%20token%20pruning%20framework%20for%20multi-view%20VLMs%20in%20AD.%20Prune2Drive%20introduces%20two%20core%20innovations%3A%20%28i%29%20a%20diversity-aware%20token%20selection%20mechanism%20that%20prioritizes%20semantic%20and%20spatial%20coverage%20across%20views%2C%20and%20%28ii%29%20a%20view-adaptive%20pruning%20controller%20that%20automatically%20learns%20optimal%20pruning%20ratios%20based%20on%20camera%20importance%20to%20downstream%20tasks.%20Unlike%20prior%20methods%2C%20Prune2Drive%20requires%20no%20model%20retraining%20or%20access%20to%20attention%20maps%2C%20ensuring%20compatibility%20with%20modern%20efficient%20attention%20implementations.%20Extensive%20experiments%20on%20the%20DriveLM%20and%20DriveLMM-o1%20benchmarks%20demonstrate%20that%20Prune2Drive%20achieves%20significant%20speedups%20and%20memory%20savings%20with%20minimal%20performance%20impact.%20When%20retaining%20only%2010%25%20of%20visual%20tokens%2C%20our%20method%20achieves%20a%206.40x%20speedup%20in%20the%20prefilling%20phase%20and%20consumes%20only%2013.4%25%20of%20the%20original%20FLOPs%2C%20with%20a%20mere%203%25%20average%20performance%20drop%20on%20the%20DriveLM%20benchmark.%20Code%20is%20available%20at%3A%20https%3A//github.com/MinhaoXiong/Prune2Drive.git%0ALink%3A%20http%3A//arxiv.org/abs/2508.13305v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrune2Drive%253A%2520A%2520Plug-and-Play%2520Framework%2520for%2520Accelerating%2520Vision-Language%2520Models%2520in%2520Autonomous%2520Driving%26entry.906535625%3DMinhao%2520Xiong%2520and%2520Zichen%2520Wen%2520and%2520Zhuangcheng%2520Gu%2520and%2520Xuyang%2520Liu%2520and%2520Rui%2520Zhang%2520and%2520Hengrui%2520Kang%2520and%2520Jiabing%2520Yang%2520and%2520Junyuan%2520Zhang%2520and%2520Weijia%2520Li%2520and%2520Conghui%2520He%2520and%2520Yafei%2520Wang%2520and%2520Linfeng%2520Zhang%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520emerged%2520as%2520a%2520promising%2520paradigm%2520in%2520autonomous%2520driving%2520%2528AD%2529%252C%2520providing%2520a%2520unified%2520framework%2520for%2520perception%2520and%2520decision-making.%2520However%252C%2520their%2520real-world%2520 {"title": "FireRed-OCR Technical Report", "author": "Hao Wu and Haoran Lou and Xinyue Li and Zuodong Zhong and Zhaojun Sun and Phellon Chen and Xuanhe Zhou and Kai Zuo and Yibo Chen and Xu Tang and Yao Hu and Boxiang Zhou and Jian Wu and Yongji Wu and Wenxin Yu and Yingmiao Liu and Yuhao Huang and Manjie Xu and Gang Liu and Yidong Ma and Zhichao Sun and Changhao Qiao", "abstract": "We present FireRed-OCR, a systematic framework to specialize general VLMs into high-performance OCR models. Large Vision-Language Models (VLMs) have demonstrated impressive general capabilities but frequently suffer from ``structural hallucination'' when processing complex documents, limiting their utility in industrial OCR applications. In this paper, we introduce FireRed-OCR, a novel framework designed to transform general-purpose VLMs (based on Qwen3-VL) into pixel-precise structural document parsing experts. To address the scarcity of high-quality structured data, we construct a ``Geometry + Semantics'' Data Factory. Unlike traditional random sampling, our pipeline leverages geometric feature clustering and multi-dimensional tagging to synthesize and curate a highly balanced dataset, effectively handling long-tail layouts and rare document types. Furthermore, we propose a Three-Stage Progressive Training strategy that guides the model from pixel-level perception to logical structure generation. This curriculum includes: (1) Multi-task Pre-alignment to ground the model's understanding of document structure; (2) Specialized SFT for standardizing full-image Markdown output; and (3) Format-Constrained Group Relative Policy Optimization (GRPO), which utilizes reinforcement learning to enforce strict syntactic validity and structural integrity (e.g., table closure, formula syntax). Extensive evaluations on OmniDocBench v1.5 demonstrate that FireRed-OCR achieves state-of-the-art performance with an overall score of 92.94\\%, significantly outperforming strong baselines such as DeepSeek-OCR 2 and OCRVerse across text, formula, table, and reading order metrics. We open-source our code and model weights to facilitate the ``General VLM to Specialized Structural Expert'' paradigm.", "link": "http://arxiv.org/abs/2603.01840v1", "date": "2026-03-02", "relevancy": 2.79, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5753}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5753}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5234}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FireRed-OCR%20Technical%20Report&body=Title%3A%20FireRed-OCR%20Technical%20Report%0AAuthor%3A%20Hao%20Wu%20and%20Haoran%20Lou%20and%20Xinyue%20Li%20and%20Zuodong%20Zhong%20and%20Zhaojun%20Sun%20and%20Phellon%20Chen%20and%20Xuanhe%20Zhou%20and%20Kai%20Zuo%20and%20Yibo%20Chen%20and%20Xu%20Tang%20and%20Yao%20Hu%20and%20Boxiang%20Zhou%20and%20Jian%20Wu%20and%20Yongji%20Wu%20and%20Wenxin%20Yu%20and%20Yingmiao%20Liu%20and%20Yuhao%20Huang%20and%20Manjie%20Xu%20and%20Gang%20Liu%20and%20Yidong%20Ma%20and%20Zhichao%20Sun%20and%20Changhao%20Qiao%0AAbstract%3A%20We%20present%20FireRed-OCR%2C%20a%20systematic%20framework%20to%20specialize%20general%20VLMs%20into%20high-performance%20OCR%20models.%20Large%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20impressive%20general%20capabilities%20but%20frequently%20suffer%20from%20%60%60structural%20hallucination%27%27%20when%20processing%20complex%20documents%2C%20limiting%20their%20utility%20in%20industrial%20OCR%20applications.%20In%20this%20paper%2C%20we%20introduce%20FireRed-OCR%2C%20a%20novel%20framework%20designed%20to%20transform%20general-purpose%20VLMs%20%28based%20on%20Qwen3-VL%29%20into%20pixel-precise%20structural%20document%20parsing%20experts.%20To%20address%20the%20scarcity%20of%20high-quality%20structured%20data%2C%20we%20construct%20a%20%60%60Geometry%20%2B%20Semantics%27%27%20Data%20Factory.%20Unlike%20traditional%20random%20sampling%2C%20our%20pipeline%20leverages%20geometric%20feature%20clustering%20and%20multi-dimensional%20tagging%20to%20synthesize%20and%20curate%20a%20highly%20balanced%20dataset%2C%20effectively%20handling%20long-tail%20layouts%20and%20rare%20document%20types.%20Furthermore%2C%20we%20propose%20a%20Three-Stage%20Progressive%20Training%20strategy%20that%20guides%20the%20model%20from%20pixel-level%20perception%20to%20logical%20structure%20generation.%20This%20curriculum%20includes%3A%20%281%29%20Multi-task%20Pre-alignment%20to%20ground%20the%20model%27s%20understanding%20of%20document%20structure%3B%20%282%29%20Specialized%20SFT%20for%20standardizing%20full-image%20Markdown%20output%3B%20and%20%283%29%20Format-Constrained%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%2C%20which%20utilizes%20reinforcement%20learning%20to%20enforce%20strict%20syntactic%20validity%20and%20structural%20integrity%20%28e.g.%2C%20table%20closure%2C%20formula%20syntax%29.%20Extensive%20evaluations%20on%20OmniDocBench%20v1.5%20demonstrate%20that%20FireRed-OCR%20achieves%20state-of-the-art%20performance%20with%20an%20overall%20score%20of%2092.94%5C%25%2C%20significantly%20outperforming%20strong%20baselines%20such%20as%20DeepSeek-OCR%202%20and%20OCRVerse%20across%20text%2C%20formula%2C%20table%2C%20and%20reading%20order%20metrics.%20We%20open-source%20our%20code%20and%20model%20weights%20to%20facilitate%20the%20%60%60General%20VLM%20to%20Specialized%20Structural%20Expert%27%27%20paradigm.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01840v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFireRed-OCR%2520Technical%2520Report%26entry.906535625%3DHao%2520Wu%2520and%2 {"title": "DGNet: Discrete Green Networks for Data-Efficient Learning of Spatiotemporal PDEs", "author": "Yingjie Tan and Quanming Yao and Yaqing Wang", "abstract": "Spatiotemporal partial differential equations (PDEs) underpin a wide range of scientific and engineering applications. Neural PDE solvers offer a promising alternative to classical numerical methods. However, existing approaches typically require large numbers of training trajectories, while high-fidelity PDE data are expensive to generate. Under limited data, their performance degrades substantially, highlighting their low data efficiency. A key reason is that PDE dynamics embody strong structural inductive biases that are not explicitly encoded in neural architectures, forcing models to learn fundamental physical structure from data. A particularly salient manifestation of this inefficiency is poor generalization to unseen source terms. In this work, we revisit Green's function theory-a cornerstone of PDE theory-as a principled source of structural inductive bias for PDE learning. Based on this insight, we propose DGNet, a discrete Green network for data-efficient learning of spatiotemporal PDEs. The key idea is to transform the Green's function into a graph-based discrete formulation, and embed the superposition principle into the hybrid physics-neural architecture, which reduces the burden of learning physical priors from data, thereby improving sample efficiency. Across diverse spatiotemporal PDE scenarios, DGNet consistently achieves state-of-the-art accuracy using only tens of training trajectories. Moreover, it exhibits robust zero-shot generalization to unseen source terms, serving as a stress test that highlights its data-efficient structural design.", "link": "http://arxiv.org/abs/2603.01762v1", "date": "2026-03-02", "relevancy": 2.7819, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5708}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5668}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5315}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DGNet%3A%20Discrete%20Green%20Networks%20for%20Data-Efficient%20Learning%20of%20Spatiotemporal%20PDEs&body=Title%3A%20DGNet%3A%20Discrete%20Green%20Networks%20for%20Data-Efficient%20Learning%20of%20Spatiotemporal%20PDEs%0AAuthor%3A%20Yingjie%20Tan%20and%20Quanming%20Yao%20and%20Yaqing%20Wang%0AAbstract%3A%20Spatiotemporal%20partial%20differential%20equations%20%28PDEs%29%20underpin%20a%20wide%20range%20of%20scientific%20and%20engineering%20applications.%20Neural%20PDE%20solvers%20offer%20a%20promising%20alternative%20to%20classical%20numerical%20methods.%20However%2C%20existing%20approaches%20typically%20require%20large%20numbers%20of%20training%20trajectories%2C%20while%20high-fidelity%20PDE%20data%20are%20expensive%20to%20generate.%20Under%20limited%20data%2C%20their%20performance%20degrades%20substantially%2C%20highlighting%20their%20low%20data%20efficiency.%20A%20key%20reason%20is%20that%20PDE%20dynamics%20embody%20strong%20structural%20inductive%20biases%20that%20are%20not%20explicitly%20encoded%20in%20neural%20architectures%2C%20forcing%20models%20to%20learn%20fundamental%20physical%20structure%20from%20data.%20A%20particularly%20salient%20manifestation%20of%20this%20inefficiency%20is%20poor%20generalization%20to%20unseen%20source%20terms.%20In%20this%20work%2C%20we%20revisit%20Green%27s%20function%20theory-a%20cornerstone%20of%20PDE%20theory-as%20a%20principled%20source%20of%20structural%20inductive%20bias%20for%20PDE%20learning.%20Based%20on%20this%20insight%2C%20we%20propose%20DGNet%2C%20a%20discrete%20Green%20network%20for%20data-efficient%20learning%20of%20spatiotemporal%20PDEs.%20The%20key%20idea%20is%20to%20transform%20the%20Green%27s%20function%20into%20a%20graph-based%20discrete%20formulation%2C%20and%20embed%20the%20superposition%20principle%20into%20the%20hybrid%20physics-neural%20architecture%2C%20which%20reduces%20the%20burden%20of%20learning%20physical%20priors%20from%20data%2C%20thereby%20improving%20sample%20efficiency.%20Across%20diverse%20spatiotemporal%20PDE%20scenarios%2C%20DGNet%20consistently%20achieves%20state-of-the-art%20accuracy%20using%20only%20tens%20of%20training%20trajectories.%20Moreover%2C%20it%20exhibits%20robust%20zero-shot%20generalization%20to%20unseen%20source%20terms%2C%20serving%20as%20a%20stress%20test%20that%20highlights%20its%20data-efficient%20structural%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01762v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDGNet%253A%2520Discrete%2520Green%2520Networks%2520for%2520Data-Efficient%2520Learning%2520of%2520Spatiotemporal%2520PDEs%26entry.906535625%3DYingjie%2520Tan%2520and%2520Quanming%2520Yao%2520and%2520Yaqing%2520Wang%26entry.1292438233%3DSpatiotemporal%2520partial%2520differential%2520equations%2520%2528PDEs%2529%2520underpin%2520a%2520wide%2520range%2520of%2520scientific%2520and%2520engineering%2520applications.%2520Neural%2520PDE%2520solvers%2520offer%2520a%2520promising%2520alternative%2520to%2520classical%2520numerical%2520methods.%2520However%252C%2520existing%2520approaches%2520typically%2520require%2520large%2520numbers%2520of%2520training%2520trajectories%252C%2520while%2520high-fidelity%2520PDE%2520data%2520are%2520expensive%2520to%2520generate.%2520Under%2520limited%2520data%252C%2520their%2520performance%2520degrades%2520substantially%252C%2520highlighting%2520their%2520low%2520data%2520efficiency.%2520A%2520key%2520reason%2520is%2520that%2520PDE%2520dynamics%2520embody%2520strong%2520structural%2520inductive%2520biases%2520that%2520are% {"title": "EgoNight: Towards Egocentric Vision Understanding at Night with a Challenging Benchmark", "author": "Deheng Zhang and Yuqian Fu and Runyi Yang and Yang Miao and Tianwen Qian and Xu Zheng and Guolei Sun and Ajad Chhatkuli and Xuanjing Huang and Yu-Gang Jiang and Luc Van Gool and Danda Pani Paudel", "abstract": "Most existing benchmarks for understanding egocentric vision focus primarily on daytime scenarios, overlooking the low-light conditions that are inevitable in real-world applications. To investigate this gap, we present EgoNight, the first comprehensive benchmark for nighttime egocentric vision, with visual question answering (VQA) as the core task. A key feature of EgoNight is the introduction of day-night aligned videos, which enhance night annotation quality using the daytime data and reveal clear performance gaps between lighting conditions. To achieve this, we collect both synthetic videos rendered by Blender and real-world recordings, ensuring that scenes and actions are visually and temporally aligned. Leveraging these paired videos, we construct EgoNight-VQA, supported by a novel day-augmented night auto-labeling engine and refinement through extensive human verification. Each QA pair is double-checked by annotators for reliability. In total, EgoNight-VQA contains 3658 QA pairs across 90 videos, spanning 12 diverse QA types, with more than 300 hours of human work. Evaluations of state-of-the-art multimodal large language models (MLLMs) reveal substantial performance drops when transferring from day to night, underscoring the challenges of reasoning under low-light conditions. Beyond VQA, EgoNight also introduces two auxiliary tasks, day-night correspondence retrieval and egocentric depth estimation at night, that further explore the boundaries of existing models. We believe EgoNight-VQA provides a strong foundation for advancing application-driven egocentric vision research and for developing models that generalize across illumination domains. The code and data can be found at https://github.com/dehezhang2/EgoNight.", "link": "http://arxiv.org/abs/2510.06218v2", "date": "2026-03-02", "relevancy": 2.7623, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5602}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5602}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.537}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EgoNight%3A%20Towards%20Egocentric%20Vision%20Understanding%20at%20Night%20with%20a%20Challenging%20Benchmark&body=Title%3A%20EgoNight%3A%20Towards%20Egocentric%20Vision%20Understanding%20at%20Night%20with%20a%20Challenging%20Benchmark%0AAuthor%3A%20Deheng%20Zhang%20and%20Yuqian%20Fu%20and%20Runyi%20Yang%20and%20Yang%20Miao%20and%20Tianwen%20Qian%20and%20Xu%20Zheng%20and%20Guolei%20Sun%20and%20Ajad%20Chhatkuli%20and%20Xuanjing%20Huang%20and%20Yu-Gang%20Jiang%20and%20Luc%20Van%20Gool%20and%20Danda%20Pani%20Paudel%0AAbstract%3A%20Most%20existing%20benchmarks%20for%20understanding%20egocentric%20vision%20focus%20primarily%20on%20daytime%20scenarios%2C%20overlooking%20the%20low-light%20conditions%20that%20are%20inevitable%20in%20real-world%20applications.%20To%20investigate%20this%20gap%2C%20we%20present%20EgoNight%2C%20the%20first%20comprehensive%20benchmark%20for%20nighttime%20egocentric%20vision%2C%20with%20visual%20question%20answering%20%28VQA%29%20as%20the%20core%20task.%20A%20key%20feature%20of%20EgoNight%20is%20the%20introduction%20of%20day-night%20aligned%20videos%2C%20which%20enhance%20night%20annotation%20quality%20using%20the%20daytime%20data%20and%20reveal%20clear%20performance%20gaps%20between%20lighting%20conditions.%20 {"title": "ToProVAR: Efficient Visual Autoregressive Modeling via Tri-Dimensional Entropy-Aware Semantic Analysis and Sparsity Optimization", "author": "Jiayu Chen and Ruoyu Lin and Zihao Zheng and Jingxin Li and Maoliang Li and Guojie Luo and Xiang Chen", "abstract": "Visual Autoregressive(VAR) models enhance generation quality but face a critical efficiency bottleneck in later stages. In this paper, we present a novel optimization framework for VAR models that fundamentally differs from prior approaches such as FastVAR and SkipVAR. Instead of relying on heuristic skipping strategies, our method leverages attention entropy to characterize the semantic projections across different dimensions of the model architecture. This enables precise identification of parameter dynamics under varying token granularity levels, semantic scopes, and generation scales. Building on this analysis, we further uncover sparsity patterns along three critical dimensions-token, layer, and scale-and propose a set of fine-grained optimization strategies tailored to these patterns. Extensive evaluation demonstrates that our approach achieves aggressive acceleration of the generation process while significantly preserving semantic fidelity and fine details, outperforming traditional methods in both efficiency and quality. Experiments on Infinity-2B and Infinity-8B models demonstrate that ToProVAR achieves up to 3.4x acceleration with minimal quality loss, effectively mitigating the issues found in prior work. Our code will be made publicly available.", "link": "http://arxiv.org/abs/2602.22948v2", "date": "2026-03-02", "relevancy": 2.7265, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5375}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ToProVAR%3A%20Efficient%20Visual%20Autoregressive%20Modeling%20via%20Tri-Dimensional%20Entropy-Aware%20Semantic%20Analysis%20and%20Sparsity%20Optimization&body=Title%3A%20ToProVAR%3A%20Efficient%20Visual%20Autoregressive%20Modeling%20via%20Tri-Dimensional%20Entropy-Aware%20Semantic%20Analysis%20and%20Sparsity%20Optimization%0AAuthor%3A%20Jiayu%20Chen%20and%20Ruoyu%20Lin%20and%20Zihao%20Zheng%20and%20Jingxin%20Li%20and%20Maoliang%20Li%20and%20Guojie%20Luo%20and%20Xiang%20Chen%0AAbstract%3A%20Visual%20Autoregressive%28VAR%29%20models%20enhance%20generation%20quality%20but%20face%20a%20critical%20efficiency%20bottleneck%20in%20later%20stages.%20In%20this%20paper%2C%20we%20present%20a%20novel%20optimization%20framework%20for%20VAR%20models%20that%20fundamentally%20differs%20from%20prior%20approaches%20such%20as%20FastVAR%20and%20SkipVAR.%20Instead%20of%20relying%20on%20heuristic%20skipping%20strategies%2C%20our%20method%20leverages%20attention%20entropy%20to%20characterize%20the%20semantic%20projections%20across%20different%20dimensions%20of%20the%20model%20architecture.%20This%20enables%20precise%20identification%20of%20parameter%20dynamics%20under%20varying%20token%20granularity%20levels%2C%20semantic%20scopes%2C%20and%20generation%20scales.%20Building%20on%20this%20analysis%2C%20we%20further%20uncover%20sparsity%20patterns%20along%20three%20critical%20dimensions-token%2C%20layer%2C%20and%20scale-and%20propose%20a%20set%20of%20fine-grained%20optimization%20strategies%20tailored%20to%20these%20patterns.%20Extensive%20evaluation%20demonstrates%20that%20our%20approach%20achieves%20aggressive%20acceleration%20of%20the%20generation%20process%20while%20significantly%20preserving%20semantic%20fidelity%20and%20fine%20details%2C%20outperforming%20traditional%20methods%20in%20 {"title": "HiFi-Inpaint: Towards High-Fidelity Reference-Based Inpainting for Generating Detail-Preserving Human-Product Images", "author": "Yichen Liu and Donghao Zhou and Jie Wang and Xin Gao and Guisheng Liu and Jiatong Li and Quanwei Zhang and Qiang Lyu and Lanqing Guo and Shilei Wen and Weiqiang Wang and Pheng-Ann Heng", "abstract": "Human-product images, which showcase the integration of humans and products, play a vital role in advertising, e-commerce, and digital marketing. The essential challenge of generating such images lies in ensuring the high-fidelity preservation of product details. Among existing paradigms, reference-based inpainting offers a targeted solution by leveraging product reference images to guide the inpainting process. However, limitations remain in three key aspects: the lack of diverse large-scale training data, the struggle of current models to focus on product detail preservation, and the inability of coarse supervision for achieving precise guidance. To address these issues, we propose HiFi-Inpaint, a novel high-fidelity reference-based inpainting framework tailored for generating human-product images. HiFi-Inpaint introduces Shared Enhancement Attention (SEA) to refine fine-grained product features and Detail-Aware Loss (DAL) to enforce precise pixel-level supervision using high-frequency maps. Additionally, we construct a new dataset, HP-Image-40K, with samples curated from self-synthesis data and processed with automatic filtering. Experimental results show that HiFi-Inpaint achieves state-of-the-art performance, delivering detail-preserving human-product images.", "link": "http://arxiv.org/abs/2603.02210v1", "date": "2026-03-02", "relevancy": 2.712, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5567}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5428}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5277}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiFi-Inpaint%3A%20Towards%20High-Fidelity%20Reference-Based%20Inpainting%20for%20Generating%20Detail-Preserving%20Human-Product%20Images&body=Title%3A%20HiFi-Inpaint%3A%20Towards%20High-Fidelity%20Reference-Based%20Inpainting%20for%20Generating%20Detail-Preserving%20Human-Product%20Images%0AAuthor%3A%20Yichen%20Liu%20and%20Donghao%20Zhou%20and%20Jie%20Wang%20and%20Xin%20Gao%20and%20Guisheng%20Liu%20and%20Jiatong%20Li%20and%20Quanwei%20Zhang%20and%20Qiang%20Lyu%20and%20Lanqing%20Guo%20and%20Shilei%20Wen%20and%20Weiqiang%20Wang%20and%20Pheng-Ann%20Heng%0AAbstract%3A%20Human-product%20images%2C%20which%20showcase%20the%20integration%20of%20humans%20and%20products%2C%20play%20a%20vital%20role%20in%20advertising%2C%20e-commerce%2C%20and%20digital%20marketing.%20The%20essential%20challenge%20of%20generating%20such%20images%20lies%20in%20ensuring%20the%20high-fidelity%20preservation%20of%20product%20details.%20Among%20existing%20paradigms%2C%20reference-based%20inpainting%20offers%20a%20targeted%20solution%20by%20leveraging%20product%20reference%20images%20to%20guide%20the%20inpainting%20process.%20However%2C%20limitations%20remain%20in%20three%20key%20aspects%3A%20the%20lack%20of%20diverse%20large-scale%20training%20data%2C%20the%20struggle%20of%20current%20models%20to%20focus%20on%20product%20detail%20preservation%2C%20and%20the%20inability%20of%20coarse%20supervision%20for%20achieving%20precise%20guidance.%20To%20address%20these%20issues%2C%20we%20propose%20HiFi-Inpaint%2C%20a%20novel%20high-fidelity%20reference-based%20inpainting%20framework%20tailored%20for%20generating%20human-product%20images.%20HiFi-Inpaint%20introduces%20Shared%20Enhancement%20Attention%20%28SEA%29%20to%20refine%20fine-grained%20product%20features%20and%20Detail-Aware%20Loss%20%28DAL%29%20to%20enforce%20precise%20pixel-level%20supervision%20using%20high-frequency%20maps.%20Additionally%2C%20we%20construct%20a%20new%20dataset%2C%20HP-Image-40K%2C%20with%20samples%20curated%20from%20self-synthesis%20data%20and%20processed%20with%20automatic%20filtering.%20Experimental%20results%20show%20that%20HiFi-Inpaint%20achieves%20state-of-the-art%20performance%2C%20delivering%20detail-preserving%20human-product%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02210v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiFi-Inpaint%253A%2520Towards%2520High-Fidelity%2520Reference-Based%2520Inpainting%2520for%2520Generating%2520Detail-Preserving%2520Human-Product%2520Images%26entry.906535625%3DYichen%2520Liu%2520and%2520Donghao%2520Zhou%2520and%2520Jie%2520Wang%2520and%2520Xin%2520Gao%2520and%2520Guisheng%2520Liu%2520and%2520Jiatong%2520Li%2520and%2520Quanwei%2520Zhang%2520and%2520Qiang%2520Lyu%2520and%2520Lanqing%2520Guo%2520and%2520Shilei%2520Wen%2520and%2520Weiqiang%2520Wang%2520and%2520Pheng-Ann%2520Heng%26entry.1292438233%3DHuman-product%2520images%252C%2520which%2520showcase%2520the%2520integration%2520of%2520humans%2520and%2520products%252C%2520play%2520a%2520vital%2520role%2520in%2520advertising%252C%2520e-commerce%252C%2520and%2520digital%2520marketing.%2520The%2520essential%2520challenge%2520of%2520generating%2520such%2520images%2520lies%2520in%2520ensuring%2520the%2520high-fidelity%2520preservation%2520of%2520product%2520details.%2520Among%2520existing%2520paradigms%252C%2520reference-based%2520inpainting%2520offers%2520a%2520targeted%2520solution%2520by%2520leveraging%2520product%2520reference%2520images%2520to%2520guide%2520the%2520inpainting%2520process.%2520However%252C%2520limitations%2520remain%2520in%2520three%2520key%2520aspects% C%20play%20a%20vital%20role%20in%20advertising%2C%20e-commerce%2C%20and%20digital%20marketing.%20The%20essential%20challenge%20of%20generating%20such%20images%20lies%20in%20ensuring%20the%20high-fidelity%20preservation%20of%20product%20details.%20Among%20existing%20paradigms%2C%20reference-based%20inpainting%20offers%20a%20targeted%20solution%20by%20leveraging%20product%20reference%20images%20to%20guide%20the%20inpainting%20process.%20However%2C%20limitations%20remain%20in%20three%20key%20aspects%3A%20the%20lack%20of%20diverse%20large-scale%20training%20data%2C%20the%20struggle%20of%20current%20models%20to%20focus%20on%20product%20detail%20preservation%2C%20and%20the%20inability%20of%20coarse%20supervision%20for%20achieving%20precise%20guidance.%20To%20address%20these%20issues%2C%20we%20propose%20HiFi-Inpaint%2C%20a%20novel%20high-fidelity%20reference-based%20inpainting%20framework%20tailored%20for%20generating%20human-product%20images.%20HiFi-Inpaint%20introduces%20Shared%20Enhancement%20Attention%20%28SEA%29%20to%20refine%20fine-grained%20product%20features%20and%20Detail-Aware%20Loss%20%28DAL%29%20to%20enforce%20precise%20pixel-level%20supervision%20using%20high-frequency%20maps.%20Additionally%2C%20we%20construct%20a%20new%20dataset%2C%20HP-Image-40K%2C%20with%20samples%20curated%20from%20self-synthesis%20data%20and%20processed%20with%20automatic%20filtering.%20Experimental%20results%20show%20that%20HiFi-Inpaint%20achieves%20state-of-the-art%20performance%2C%20delivering%20detail-preserving%20human-product%20images.&entry.1838667208=http%3A//arxiv.org/abs/2603.02210v1&entry.124074799=Read"},
{"title": "Action-Guided Attention for Video Action Anticipation", "author": "Tsung-Ming Tai and Sofia Casarin and Andrea Pilzer and Werner Nutt and Oswald Lanz", "abstract": "Anticipating future actions in videos is challenging, as the observed frames provide only evidence of past activities, requiring the inference of latent intentions to predict upcoming actions. Existing transformer-based approaches, which rely on dot-product attention over pixel representations, often lack the high-level semantics necessary to model video sequences for effective action anticipation. As a result, these methods tend to overfit to explicit visual cues present in the past frames, limiting their ability to capture underlying intentions and degrading generalization to unseen samples. To address this, we propose Action-Guided Attention (AGA), an attention mechanism that explicitly leverages predicted action sequences as queries and keys to guide sequence modeling. Our approach fosters the attention module to emphasize relevant moments from the past based on the upcoming activity and combine this information with the current frame embedding via a dedicated gating function. The design of AGA enables post-training analysis of the knowledge discovered from the training set. Experiments on the widely adopted EPIC-Kitchens-100 benchmark demonstrate that AGA generalizes well from validation to unseen test sets. Post-training analysis can further examine the action dependencies captured by the model and the counterfactual evidence it has internalized, offering transparent and interpretable insights into its anticipative predictions.", "link": "http://arxiv.org/abs/2603.01743v1", "date": "2026-03-02", "relevancy": 2.7099, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5521}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5451}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5287}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Action-Guided%20Attention%20for%20Video%20Action%20Anticipation&body=Title%3A%20Action-Guided%20Attention%20for%20Video%20Action%20Anticipation%0AAuthor%3A%20Tsung-Ming%20Tai%20and%20Sofia%20Casarin%20and%20Andrea%20Pilzer%20and%20Werner%20Nutt%20and%20Oswald%20Lanz%0AAbstract%3A%20Anticipating%20future%20actions%20in%20videos%20is%20challenging%2C%20as%20the%20observed%20frames%20provide%20only%20evidence%20of%20past%20activities%2C%20requiring%20the%20inference%20of%20latent%20intentions%20to%20predict%20upcoming%20actions.%20Existing%20transformer-based%20approaches%2C%20which%20rely%20on%20dot-product%20attention%20over%20pixel%20representations%2C%20often%20lack%20the%20high-level%20semantics%20necessary%20to%20model%20video%20sequences%20for%20effective%20action%20anticipation.%20As%20a%20result%2C%20these%20methods%20tend%20to%20overfit%20to%20explicit%20visual%20cues%20present%20in%20the%20past%20frames%2C%20limiting%20their%20ability%20to%20capture%20underlying%20intentions%20and%20degrading%20generalization%20to%20unseen%20samples.%20To%20address%20this%2C%20we%20propose%20Action-Guided%20Attention%20%28AGA%29%2C%20an%20attention%20mechanism%20that%20explicitly%20leverages%20predicted%20action%20sequences%20as%20queries%20and%20keys%20to%20guide%20sequence%20modeling.%20Our%20approach%20fosters%20the%20attention%20module%20to%20emphasize%20relevant%20moments%20from%20the%20past%20based%20on%20the%20upcoming%20activity%20and%20combine%20this%20information%20with%20the%20current%20frame%20embedding%20via%20a%20dedicated%20gating%20function.%20The%20design%20of%20AGA%20enables%20post-training%20analysis%20of%20the%20knowledge%20discovered%20from%20the%20training%20set.%20Experiments%20on%20the%20widely%20adopted%20EPIC-Kitchens-100%20benchmark%20demonstrate%20that%20AGA%20generalizes%20well%20from%20validation%20to%20unseen%20test%20sets.%20Post-training%20analysis%20can%20further%20examine%20the%20action%20dependencies%20captured%20by%20the%20model%20and%20the%20counterfactual%20evidence%20it%20has%20internalized%2C%20offering%20transparent%20and%20interpretable%20insights%20into%20its%20anticipative%20predictions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01743v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAction-Guided%2520Attention%2520for%2520Video%2520Action%2520Anticipation%26entry.906535625%3DTsung-Ming%2520Tai%2520and%2520Sofia%2520Casarin%2520and%2520Andrea%2520Pilzer%2520and%2520Werner%2520Nutt%2520and%2520Oswald%2520Lanz%26entry.1292438233%3DAnticipating%2520future%2520actions%2520in%2520videos%2520is%2520challenging%252C%2520as%2520the%2520observed%2520frames%2520provide%2520only%2520evidence%2520of%2520past%2520activities%252C%2520requiring%2520the%2520inference%2520of%2520latent%2520intentions%2520to%2520predict%2520upcoming%2520actions.%2520Existing%2520transformer-based%2520approaches%252C%2520which%2520rely%2520on%2520dot-product%2520attention%2520over%2520pixel%2520representations%252C%2520often%2520lack%2520the%2520high-level%2520semantics%2520necessary%2520to%2520model%2520video%2520sequences%2520for%2520effective%2520action%2520anticipation.%2520As%2520a%2520result%252C%2520these%2520methods%2520tend%2520to%2520overfit%2520to%2520explicit%2520visual%2520cues%2520present%2520in%2520the%2520past%2520frames%252C%2520limiting%2520their%2520ability%2520to%2520capture%2520underlying%2520intentions%2520and%2520degrading%2520generalization%2520to%2520unseen%2520samples.%2520To%2520address%2520this%252C%2520we%2520propose%2520Action-Guided%2520Attention%2520%2528AGA%2529%252C%2520an%2520attention%2520mechanism%2520that%2520explicitly%2520leverages%2520predicted%25

ironments.%20Finally%2C%20in%20the%20context%20of%20biomolecular%20NMR%20spectroscopy%2C%20we%20demonstrate%20that%20the%20proposed%20representations%20enable%20a%20first-of-its-kind%20physics-informed%20chemical%20shift%20predictor%20that%20achieves%20state-of-the-art%20accuracy.%20Our%20results%20demonstrate%20the%20surprising%20effectiveness%20of%20atomistic%20foundation%20models%20and%20their%20emergent%20representations%20for%20protein%20modeling%20beyond%20traditional%20molecular%20simulations.%20We%20believe%20this%20will%20open%20new%20lines%20of%20work%20in%20constructing%20effective%20functional%20representations%20for%20protein%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2505.23354v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresenting%2520local%2520protein%2520environments%2520with%2520machine%2520learning%2520force%2520fields%26entry.906535625%3DMeital%2520Bojan%2520and%2520Sanketh%2520Vedula%2520and%2520Advaith%2520Maddipatla%2520and%2520Nadav%2520Bojan%2520Sellam%2520and%2520Federico%2520Napoli%2520and%2520Paul%2520Schanda%2520and%2520Alex%2520M.%2520Bronstein%26entry.1292438233%3DThe%2520local%2520structure%2520of%2520a%2520protein%2520strongly%2520impacts%2520its%2520function%2520and%2520interactions%2520with%2520other%2520molecules.%2520Therefore%252C%2520a%2520concise%252C%2520informative%2520representation%2520of%2520a%2520local%2520protein%2520environment%2520is%2520essential%2520for%2520modeling%2520and%2520designing%2520proteins%2520and%2520biomolecular%2520interactions.%2520However%252C%2520these%2520environments%2527%2520extensive%2520structural%2520and%2520chemical%2520variability%2520makes%2520them%2520challenging%2520to%2520model%252C%2520and%2520such%2520representations%2520remain%2520under-explored.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%2520representation%2520for%2520a%2520local%2520protein%2520environment%252 {"title": "Adaptive Data Augmentation with Multi-armed Bandit: Sample-Efficient Embedding Calibration for Implicit Pattern Recognition", "author": "Minxue Tang and Yangyang Yu and Aolin Ding and Maziyar Baran Pouyan and Taha Belkhouja and Yujia Bao", "abstract": "Recognizing implicit visual and textual patterns is essential in many real-world applications of modern AI. However, tackling long-tail pattern recognition tasks remains challenging for current pre-trained foundation models such as LLMs and VLMs. While finetuning pre-trained models can improve accuracy in recognizing implicit patterns, it is usually infeasible due to a lack of training data and high computational overhead. In this paper, we propose ADAMAB, an efficient embedding calibration framework for few-shot pattern recognition. To maximally reduce the computational costs, ADAMAB trains embedder-agnostic light-weight calibrators on top of fixed embedding models without accessing their parameters. To mitigate the need for large-scale training data, we introduce an adaptive data augmentation strategy based on the Multi-Armed Bandit (MAB) mechanism. With a modified upper confidence bound algorithm, ADAMAB diminishes the gradient shifting and offers theoretically guaranteed convergence in few-shot training. Our multi-modal experiments justify the superior performance of ADAMAB, with up to 40% accuracy improvement when training with less than 5 initial data samples of each class.", "link": "http://arxiv.org/abs/2602.19385v2", "date": "2026-03-02", "relevancy": 2.4119, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.6334}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5964}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link {"title": "ProfVLM: A Lightweight Video-Language Model for Multi-View Proficiency Estimation", "author": "Edoardo Bianchi and Jacopo Staiano and Antonio Liotta", "abstract": "Most existing approaches formulate action quality assessment and skill proficiency estimation as discriminative prediction tasks, typically producing discrete labels or scores without explicitly modeling the reasoning process underlying the assessment. We instead reformulate the problem as generative vision-language modeling, introducing ProfVLM, a parameter-efficient vision-language model that jointly predicts proficiency levels and generates expert-like natural language feedback from multi-view videos. ProfVLM leverages conditional language generation to provide actionable insights along with quantitative evaluation scores. Central to our method is an AttentiveGatedProjector that dynamically fuses and projects multi-view egocentric and exocentric features from a frozen TimeSformer backbone into a language model fine-tuned for feedback generation. Trained on EgoExo4D with expert commentaries, ProfVLM surpasses state-of-the-art methods while using up to 20x fewer parameters and reducing training time by up to 60% compared to existing classification-based methods. By providing natural language critiques aligned with performance levels, this work shows that generative vision-language modeling offers a powerful and efficient paradigm shift for interpretable action quality assessment.", "link": "http://arxiv.org/abs/2509.26278v3", "date": "2026-03-02", "relevancy": 2.4111, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.61}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.61}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5667}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProfVLM%3A%20A%20Lightweight%20Video-Language%20Model%20for%20Multi-View%20Proficiency%20Estimation&body=Title%3A%20ProfVLM%3A%20A%20Lightweight%20Video-Language%20Model%20for%20Multi-View%20Proficiency%20Estimation%0AAuthor%3A%20Edoardo%20Bianchi%20and%20Jacopo%20Staiano%20and%20Antonio%20Liotta%0AAbstract%3A%20Most%20existing%20approaches%20formulate%20action%20quality%20assessment%20and%20skill%20proficiency%20estimation%20as%20discriminative%20prediction%20tasks%2C%20typically%20producing%20discrete%20labels%20or%20scores%20without%20explicitly%20modeling%20the%20reasoning%20process%20underlying%20the%20assessment.%20We%20instead%20reformulate%20the%20problem%20as%20generative%20vision-language%20modeling%2C%20introducing%20ProfVLM%2C%20a%20parameter-efficient%20vision-language%20model%20that%20jointly%20predicts%20proficiency%20levels%20and%20generates%20expert-like%20natural%20language%20feedback%20from%20multi-view%20videos.%20ProfVLM%20leverages%20conditional%20language%20generation%20to%20provide%20actionable%20insights%20along%20with%20quantitative%20evaluation%20scores.%20Central%20to%20our%20method%20is%20an%20AttentiveGatedProjector%20that%20dynamically%20fuses%20and%20projects%20multi-view%20egocentric%20and%20exocentric%20features%20from%20a%20frozen%20TimeSformer%20backbone%20into%20a%20language%20model%20fine-tuned%20for%20feedback%20generation.%20Trained%20on%20EgoExo4D%20with%20expert%20commentaries%2C%20ProfVLM%20surpasses%20state-of-the-art%20methods%20while%20using%20up%20to%2020x%20fewer%20parameters%20and%20reducing%20training%20time%20by%20up%20to%2060%25%20compared%20to%20existing%20classification-based%20methods.%20By%20providing%20natural%20language%20critiques%20aligned%20with%20performance%20levels%2C%20this%20work%20shows%20that%20generative%20vision-language%20modeling%20offers%20a%20powerful%20and%20efficient%20paradigm%20shift%20for%20interpretable%20action%20quality%20assessment.%0ALink%3A%20http%3A//arxiv.org/abs/2509.26278v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProfVLM%253A%2520A%2520Lightweight%2520Video-Language%2520Model%2520for%2520Multi-View%2520Proficiency%2520Estimation%26entry.906535625%3DEdoardo%2520Bianchi%2520and%2520Jacopo%2520Staiano%2520and%2520Antonio%2520Liotta%26entry.1292438233%3DMost%2520existing%2520approaches%2520formulate%2520action%2520quality%2520assessment%2520and%2520skill%2520proficiency%2520estimation%2520as%2520discriminative%2520prediction%2520tasks%252C%2520typically%2520producing%2520discrete%2520labels%2520or%2520scores%2520without%2520explicitly%2520modeling%2520the%2520reasoning%2520process%2520underlying%2520the%2520assessment.%2520We%2520instead%2520reformulate%2520the%2520problem%2520as%2520generative%2520vision-language%2520modeling%252C%2520introducing%2520ProfVLM%252C%2520a%2520parameter-efficient%2520vision-language%2520model%2520that%2520jointly%2520predicts%2520proficiency%2520levels%2520and%2520generates%2520expert-like%2520natural%2520language%2520feedback%2520from%2520multi-view%2520videos.%2520ProfVLM%2520leverages%2520conditional%2520language%2520generation%2520to%2520provide%2520actionable%2520insights%2520along%2520with%2520quantitative%2520evaluation%2520scores.%2520Central%2520to%2520our%2520method%2520is%2520an%2520AttentiveGatedProjector%2520that%2520dynamically%2520fuses%2520and%2520projects%2520multi-view%2520egocentric%2520and%2520exocentric%2520features%2520from%2520a%2520frozen%2520TimeSformer%2520backbone%2520into%2520a%2520language%2520model%2520fine-tuned%2520for%2520feedback%2520generation.%2520Trained%2520on%2520EgoExo4D%2520with%2520expert%2520commentaries%252C%2520ProfVLM%2520surpasses%2520state-of-the-art%2520methods%2520while%2520using%2520up%2520to%252020x%2520fewer%2520parameters%2520and%2520reducing%2520training%2520time%2520by%2520up%2520to%252060%2525%2520compared%2520to%2520existing%2520classification-based%2520methods.%2520By%2520providing%2520natural%2520language%2520critiques%2520aligned%2520with%2520performance%2520levels%252C%2520this%2520work%2520shows%2520that%2520generative%2520vision-language%2520modeling%2520offers%2520a%2520powerful%2520and%2520efficient%2520paradigm%2520shift%2520for%2520interpretable%2520action%2520quality%2520assessment.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.26278v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ProfVLM%3A%20A%20Lightweight%20Video-Language%20Model%20for%20Multi-View%20Proficiency%20Estimation&entry.906535625=Edoardo%20Bianchi%20and%20Jacopo%20Staiano%20and%20Antonio%20Liotta&entry.1292438233=Most%20existing%20approaches%20formulate%20action%20quality%20assessment%20and%20skill%20proficiency%20estimation%20as%20discriminative%20prediction%20tasks%2C%20typically%20producing%20discrete%20labels%20or%20scores%20without%20explicitly%20modeling%20the%20reasoning%20process%20underlying%20the%20assessment.%20We%20instead%20reformulate%20the%20problem%20as%20generative%20vision-language%20modeling%2C%20introducing%20ProfVLM%2C%20a%20parameter-efficient%20vision-language%20model%20that%20jointly%20predicts%20proficiency%20levels%20and%20generates%20expert-like%20natural%20language%20feedback%20from%20multi-view%20videos.%20ProfVLM%20leverages%20conditional%20language%20generation%20to%20provide%20actionable%20insights%20along%20with%20quantitative%20evaluation%20scores.%20Central%20to%20our%20method%20is%20an%20AttentiveGatedProjector%20that%20dynamically%20fuses%20and%20projects%20multi-view%20egocentric%20and%20exocentric%20features%20from%20a%20frozen%20TimeSformer%20backbone%20into%20a%20language%20model%20fine-tuned%20for%20feedback%20generation.%20Trained%20on%20EgoEx {"title": "Aggressive or Imperceptible, or Both: Network Pruning Assisted Hybrid Byzantines in Federated Learning", "author": "Emre Ozfatura and Kerem Ozfatura and Baturalp Buyukates and Mert Coskuner and Alptekin Kupcu and Deniz Gunduz", "abstract": "In federated learning (FL), profiling and verifying each client is inherently difficult, which introduces a significant security vulnerability: malicious clients, commonly referred to as Byzantines, can degrade the accuracy of the global model by submitting poisoned updates during training. To mitigate this, the aggregation process at the parameter server must be robust against such adversarial behaviour. Most existing defences approach the Byzantine problem from an outlier detection perspective, treating malicious updates as statistical anomalies and ignoring the internal structure of the trained neural network (NN). Motivated by this, this work highlights the potential of leveraging side information tied to the NN architecture to design stronger, more targeted attacks. In particular, inspired by insights from sparse NNs, we introduce a hybrid sparse Byzantine attack. The attack consists of two coordinated components: (i) A sparse attack component that selectively manipulates parameters with higher sensitivity in the NN, aiming to cause maximum disruption with minimal visibility; (ii) A slow-accumulating attack component that silently poisons parameters over multiple rounds to evade detection. Together, these components create a strong but imperceptible attack strategy that can bypass common defences. We evaluate the proposed attack through extensive simulations and demonstrate its effectiveness against eight state-of-the-art defence mechanisms.", "link": "http://arxiv.org/abs/2404.06230v2", "date": "2026-03-02", "relevancy": 2.4078, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4992}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4933}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4522}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Aggressive%20or%20Imperceptible%2C%20or%20Both%3A%20Network%20Pruning%20Assisted%20Hybrid%20Byzantines%20in%20Federated%20Learning&body=Title%3A%20Aggressive%20or%20Imperceptible%2C%20or%20Both%3A%20Network%20Pruning%20Assisted%20Hybrid%20Byzantines%20in%20Federated%20Learning%0AAuthor%3A%20Emre%20Ozfatura%20and%20Kerem%20Ozfatura%20and%20Baturalp%20Buyukates%20and%20Mert%20Coskuner%20and%20Alptekin%20Kupcu%20and%20Deniz%20Gunduz%0AAbstract%3A%20In%20federated%20learning%20%28FL%29%2C%20profiling%20and%20verifying%20each%20client%20is%20inherently%20difficult%2C%20which%20introduces%20a%20significant%20security%20vulnerability%3A%20malicious%20clients%2C%20commonly%20referred%20to%20as%20Byzantines%2C%20can%20degrade%20the%20accuracy%20of%20the%20global%20model%20by%20submitting%20poisoned%20updates%20during%20training.%20To%20mitigate%20this%2C%20the%20aggregation%20process%20at%20the%20parameter%20server%20must%20be%20robust%20against%20such%20adversarial%20behaviour.%20Most%20existing%20defences%20approach%20the%20Byzantine%20problem%20from%20an%20outlier%20detection%20perspective%2C%20treating%20malicious%20updates%20as%20statistical%20anomalies%20and%20ignoring%20the%20internal%20structure%20of%20the%20trained%20neural%20network%20%28NN%29.%20Motivated%20by%20this%2C%20this%20work%20highlights%20the%20potential%20of%20leveraging%20side%20information%20tied%20to%20the%20NN%20architecture%20to%20design%20stronger%2C%20more%20targeted%20attacks.%20In%20particular%2C%20inspired%20by%20insights%20from%20sparse%20NNs%2C%20we%20introduce%20a%20hybrid%20sparse%20Byzantine%20attack.%20The%20attack%20consists%20of%20two%20coordinated%20components%3A%20%28i%29%20A%20sparse%20attack%20component%20that%20selectively%20manipulates%20parameters%20with%20higher%20sensitivity%20in%20the%20NN%2C%20aiming%20to%20cause%20maximum%20disruption%20with%20minimal%20visibility%3B%20%28ii%29%20A%20slow-accumulating%20attack%20component%20that%20silently%20poisons%20parameters%20over%20multiple%20rounds%20to%20evade%20detection.%20Together%2C%20these%20components%20create%20a%20strong%20but%20imperceptible%20attack%20strategy%20that%20can%20bypass%20common%20defences.%20We%20evaluate%20the%20proposed%20attack%20through%20extensive%20simulations%20and%20demonstrate%20its%20effectiveness%20against%20eight%20state-of-the-art%20defence%20mechanisms.%0ALink%3A%20http%3A//arxiv.org/abs/2404.06230v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAggressive%2520or%2520Imperceptible%252C%2520or%2520Both%253A%2520Network%2520Pruning%2520Assisted%2520Hybrid%2520Byzantines%2520in%2520Federated%2520Learning%26entry.906535625%3DEmre%2520Ozfatura%2520and%2520Kerem%2520Ozfatura%2520and%2520Baturalp%2520Buyukates%2520and%2520Mert%2520Coskuner%2520and%2520Alptekin%2520Kupcu%2520and%2520Deniz%2520Gunduz%26entry.1292438233%3DIn%2520federated%2520learning%2520%2528FL%2529%252C%2520profiling%2520and%2520verifying%2520each%2520client%2520is%2520inherently%2520difficult%252C%2520which%2520introduces%2520a%2520significant%2520security%2520vulnerability%253A%2520malicious%2520clients%252C%2520commonly%2520referred%2520to%2520as%2520Byzantines%252C%2520can%2520degrade%2520the%2520accuracy%2520of%2520the%2520global%2520model%2520by%2520submitting%2520poisoned%2520updates%2520during%2520training.%2520To%2520mitigate%2520this%252C%2520the%2520aggregation%2520process%2520at%2520the%2520parameter%2520server%2520m {"title": "Nano-EmoX: Unifying Multimodal Emotional Intelligence from Perception to Empathy", "author": "Jiahao Huang and Fengyan Lin and Xuechao Yang and Chen Feng and Kexin Zhu and Xu Yang and Zhide Chen", "abstract": "The development of affective multimodal language models (MLMs) has long been constrained by a gap between low-level perception and high-level interaction, leading to fragmented affective capabilities and limited generalization. To bridge this gap, we propose a cognitively inspired three-level hierarchy that organizes affective tasks according to their cognitive depth-perception, understanding, and interaction-and provides a unified conceptual foundation for advancing affective modeling. Guided by this hierarchy, we introduce Nano-EmoX, a small-scale multitask MLM, and P2E (Perception-to-Empathy), a curriculum-based training framework. Nano-EmoX integrates a suite of omni-modal encoders, including an enhanced facial encoder and a fusion encoder, to capture key multimodal affective cues and improve cross-task transferability. The outputs are projected into a unified language space via heterogeneous adapters, empowering a lightweight language model to tackle diverse affective tasks. Concurrently, P2E progressively cultivates emotional intelligence by aligning rapid perception with chain-of-thought-driven empathy. To the best of our knowledge, Nano-EmoX is the first compact MLM (2.2B) to unify six core affective tasks across all three hierarchy levels, achieving state-of-the-art or highly competitive performance across multiple benchmarks, demonstrating excellent efficiency and generalization.", "link": "http://arxiv.org/abs/2603.02123v1", "date": "2026-03-02", "relevancy": 2.406, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4826}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4826}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4784}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Nano-EmoX%3A%20Unifying%20Multimodal%20Emotional%20Intelligence%20from%20Perception%20to%20Empathy&body=Title%3A%20Nano-EmoX%3A%20Unifying%20Multimodal%20Emotional%20Intelligence%20from%20Perception%20to%20Empathy%0AAuthor%3A%20Jiahao%20Huang%20and%20Fengyan%20Lin%20and%20Xuechao%20Yang%20and%20Chen%20Feng%20and%20Kexin%20Zhu%20and%20Xu%20Yang%20and%20Zhide%20Chen%0AAbstract%3A%20The%20development%20of%20affective%20multimodal%20language%20models%20%28MLMs%29%20has%20long%20been%20constrained%20by%20a%20gap%20between%20low-level%20perception%20and%20high-level%20interaction%2C%20leading%20to%20fragmented%20affective%20capabilities%20and%20limited%20generalization.%20To%20bridge%20this%20gap%2C%20we%20propose%20a%20cognitively%20inspired%20three-level%20hierarchy%20that%20organizes%20affective%20tasks%20according%20to%20their%20cognitive%20depth-perception%2C%20understanding%2C%20and%20interaction-and%20provides%20a%20unified%20conceptual%20foundation%20for%20advancing%20affective%20modeling.%20Guided%20by%20this%20hierarchy%2C%20we%20introduce%20Nano-EmoX%2C%20a%20small-scale%20multitask%20MLM%2C%20and%20P2E%20%28Perception-to-Empathy%29%2C%20a%20curriculum-based%20training%20framework.%20Nano-EmoX%20integrates%20a%20suite%20of%20omni-modal%20encoders%2C%20including%20an%20enhanced%20facial%20encoder%20and%20a%20fusion%20encoder%2C%20to%20capture%20key%20multimodal%20affective%20cues%20and%20improve%20cross-task%20transferability.%20The%20outputs%20are%20projected%20into%20a%20unified%20language%20space%20via%20heterogeneous%20adapters%2C%20empowering%20a%20lightweight%20language%20model%20to%20tackle%20diverse%20affective%20tasks.%20Concurrently%2C%20P2E%20progressively%20cultivates%20emotional%20intelligence%20by%20aligning%20rapid%20perception%20with%20chain-of-thought-driven%20empathy.%20To%20the%20best%20of%20our%20knowledge%2C%20Nano-EmoX%20is%20the%20first%20compact%20MLM%20%282.2B%29%20to%20unify%20six%20core%20affective%20tasks%20across%20all%20three%20hierarchy%20levels%2C%20achieving%20state-of-the-art%20or%20highly%20competitive%20performance%20across%20multiple%20benchmarks%2C%20demonstrating%20excellent%20efficiency%20and%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02123v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNano-EmoX%253A%2520Unifying%2520Multimodal%2520Emotional%2520Intelligence%2520from%2520Perception%2520to%2520Empathy%26entry.906535625%3DJiahao%2520Huang%2520and%2520Fengyan%2520Lin%2520and%2520Xuechao%2520Yang%2520and%2520Chen%2520Feng%2520and%2520Kexin%2520Zhu%2520and%2520Xu%2520Yang%2520and%2520Zhide%2520Chen%26entry.1292438233%3DThe%2520development%2520of%2520affective%2520multimodal%2520language%2520models%2520%2528MLMs%2529%2520has%2520long%2520been%2520constrained%2520by%2520a%2520gap%2520between%2520low-level%2520perception%2520and%2520high-level%2520interaction%252C%2520leading%2520to%2520fragmented%2520affective%2520capabilities%2520and%2520limited%2520generalization.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520a%2520cognitively%2520inspired%2520three-level%2520hierarchy%2520that%2520organizes%2520affective%2520tasks%2520according%2520to%2520their%2520cognitive%2520depth-perception%252C%2520understanding%252C%2520and%2520interaction-and%2520provides%2520a%2520unified%2520conceptual%2520foundation%2520for%2520advancing%2520affective%2520modeling.%2520Guided%2520by%2520this%2520hierarchy%252C%2520we%2520introduce%2520Nano-EmoX%252C%2520a%2520small-scale%2520multitask%2520MLM%252C%2520and%2520P2E%2520%2528Perception-to-Empathy%2529%252C%2520a%2520curriculum-based%2520training%2520framework.%2520Nano-EmoX% {"title": "Unifying Heterogeneous Multi-Modal Remote Sensing Detection Via Language-Pivoted Pretraining", "author": "Yuxuan Li and Yuming Chen and Yunheng Li and Ming-Ming Cheng and Xiang Li and Jian Yang", "abstract": "Heterogeneous multi-modal remote sensing object detection aims to accurately detect objects from diverse sensors (e.g., RGB, SAR, Infrared). Existing approaches largely adopt a late alignment paradigm, in which modality alignment and task-specific optimization are entangled during downstream fine-tuning. This tight coupling complicates optimization and often results in unstable training and suboptimal generalization. To address these limitations, we propose BabelRS, a unified language-pivoted pretraining framework that explicitly decouples modality alignment from downstream task learning. BabelRS comprises two key components: Concept-Shared Instruction Aligning (CSIA) and Layerwise Visual-Semantic Annealing (LVSA). CSIA aligns each sensor modality to a shared set of linguistic concepts, using language as a semantic pivot to bridge heterogeneous visual representations. To further mitigate the granularity mismatch between high-level language representations and dense detection objectives, LVSA progressively aggregates multi-scale visual features to provide fine-grained semantic guidance. Extensive experiments demonstrate that BabelRS stabilizes training and consistently outperforms state-of-the-art methods without bells and whistles. Code: https://github.com/zcablii/SM3Det.", "link": "http://arxiv.org/abs/2603.01758v1", "date": "2026-03-02", "relevancy": 2.4027, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6067}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5985}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesi {"title": "Adversarial D\u00e9j\u00e0 Vu: Jailbreak Dictionary Learning for Stronger Generalization to Unseen Attacks", "author": "Mahavir Dabas and Tran Huynh and Nikhil Reddy Billa and Jiachen T. Wang and Peng Gao and Charith Peris and Yao Ma and Rahul Gupta and Ming Jin and Prateek Mittal and Ruoxi Jia", "abstract": "Large language models remain vulnerable to jailbreak attacks that bypass safety guardrails to elicit harmful outputs. Defending against novel jailbreaks represents a critical challenge in AI safety. Adversarial training -- designed to make models robust against worst-case perturbations -- has been the dominant paradigm for adversarial robustness. However, due to optimization challenges and difficulties in defining realistic threat models, adversarial training methods often fail on newly developed jailbreaks in practice. This paper proposes a new paradigm for improving robustness against unseen jailbreaks, centered on the Adversarial D\u00e9j\u00e0 Vu hypothesis: novel jailbreaks are not fundamentally new, but largely recombinations of adversarial skills from previous attacks. We study this hypothesis through a large-scale analysis of 32 attack papers published over two years. Using an automated pipeline, we extract and compress adversarial skills into a sparse dictionary of primitives, with LLMs generating human-readable descriptions. Our analysis reveals that unseen attacks can be effectively explained as sparse compositions of earlier skills, with explanatory power increasing monotonically as skill coverage grows. Guided by this insight, we introduce Adversarial Skill Compositional Training (ASCoT), which trains on diverse compositions of skill primitives rather than isolated attack instances. ASCoT substantially improves robustness to unseen attacks, including multi-turn jailbreaks, while maintaining low over-refusal rates. We also demonstrate that expanding adversarial skill coverage, not just data scale, is key to defending against novel attacks. \\textcolor{red}{\\textbf{Warning: This paper contains content that may be harmful or offensive in nature.", "link": "http://arxiv.org/abs/2510.21910v3", "date": "2026-03-02", "relevancy": 2.3882, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4963}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4735}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4631}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adversarial%20D%C3%A9j%C3%A0%20Vu%3A%20Jailbreak%20Dictionary%20Learning%20for%20Stronger%20Generalization%20to%20Unseen%20Attacks&body=Title%3A%20Adversarial%20D%C3%A9j%C3%A0%20Vu%3A%20Jailbreak%20Dictionary%20Learning%20for%20Stronger%20Generalization%20to%20Unseen%20Attacks%0AAuthor%3A%20Mahavir%20Dabas%20and%20Tran%20Huynh%20and%20Nikhil%20Reddy%20Billa%20and%20Jiachen%20T.%20Wang%20and%20Peng%20Gao%20and%20Charith%20Peris%20and%20Yao%20Ma%20and%20Rahul%20Gupta%20and%20Ming%20Jin%20and%20Prateek%20Mittal%20and%20Ruoxi%20Jia%0AAbstract%3A%20Large%20language%20models%20remain%20vulnerable%20to%20jailbreak%20attacks%20that%20bypass%20safety%20guardrails%20to%20elicit%20harmful%20outputs.%20Defending%20against%20novel%20jailbreaks%20represents%20a%20critical%20challenge%20in%20AI%20safety.%20Adversarial%20training%20--%20designed%20to%20make%20models%20robust%20against%20worst-case%20perturbations%20--%20has%20been%20the%20dominant%20paradigm%20for%20adversarial%20robustness.%20However%2C%20due%20to%20optimization%20challenges%20and%20difficulties%20in%20defining%20realistic%20threat%20models%2C%20adversarial%20training%20methods%20often%20fail%20on%20newly%20developed%20jailbreaks%20in%20practice.%20This%20paper%20proposes%20a%20new%20paradigm%20for%20improving%20robustness%20against%20unseen%20jailbreaks%2C%20centered%20on%20the%20Adversarial%20D%C3%A9j%C3%A0%20Vu%20hypothesis%3A%20novel%20jailbreaks%20are%20not%20fundamentally%20new%2C%20but%20largely%20recombinations%20of%20adversarial%20skills%20from%20previous%20attacks.%20We%20study%20this%20hypothesis%20through%20a%20large-scale%20analysis%20of%2032%20attack%20papers%20published%20over%20two%20years.%20Using%20an%20automated%20pipeline%2C%20we%20extract%20and%20compress%20adversarial%20skills%20into%20a%20sparse%20dictionary%20of%20primitives%2C%20with%20LLMs%20generating%20human-readable%20descriptions.%20Our%20analysis%20reveals%20that%20unseen%20attacks%20can%20be%20effectively%20explained%20as%20sparse%20compositions%20of%20earlier%20skills%2C%20with%20explanatory%20power%20increasing%20monotonically%20as%20skill%20coverage%20grows.%20Guided%20by%20this%20insight%2C%20we%20introduce%20Adversarial%20Skill%20Compositional%20Training%20%28ASCoT%29%2C%20which%20trains%20on%20diverse%20compositions%20of%20skill%20primitives%20rather%20than%20isolated%20attack%20instances.%20ASCoT%20substantially%20improves%20robustness%20to%20unseen%20attacks%2C%20including%20multi-turn%20jailbreaks%2C%20while%20maintaining%20low%20over-refusal%20rates.%20We%20also%20demonstrate%20that%20expanding%20adversarial%20skill%20coverage%2C%20not%20just%20data%20scale%2C%20is%20key%20to%20defending%20against%20novel%20attacks.%20%5Ctextcolor%7Bred%7D%7B%5Ctextbf%7BWarning%3A%20This%20paper%20contains%20content%20that%20may%20be%20harmful%20or%20offensive%20in%20nature.%0ALink%3A%20http%3A//arxiv.org/abs/2510.21910v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdversarial%2520D%25C3%25A9j%25C3%25A0%2520Vu%253A%2520Jailbreak%2520Dictionary%2520Learning%2520for%2520Stronger%2520Generalization%2520to%2520Unseen%2520Attacks%26entry.9065356 {"title": "OpenRad: a Curated Repository of Open-access AI models for Radiology", "author": "Konstantinos Vrettos and Galini Papadaki and Emmanouil Brilakis and Matthaios Triantafyllou and Dimitrios Leventis and Despina Staraki and Maria Mavroforou and Eleftherios Tzanis and Konstantina Giouroukou and Michail E. Klontzas", "abstract": "The rapid developments in artificial intelligence (AI) research in radiology have produced numerous models that are scattered across various platforms and sources, limiting discoverability, reproducibility and clinical translation. Herein, OpenRad was created, a curated, standardized, open-access repository that aggregates radiology AI models and providing details such as the availability of pretrained weights and interactive applications. Retrospective analysis of peer reviewed literature and preprints indexed in PubMed, arXiv and Scopus was performed until Dec 2025 (n = 5239 records). Model records were generated using a locally hosted LLM (gpt-oss:120b), based on the RSNA AI Roadmap JSON schema, and manually verified by ten expert reviewers. Stability of LLM outputs was assessed on 225 randomly selected papers using text similarity metrics. A total of 1694 articles were included after review. Included models span all imaging modalities (CT, MRI, X-ray, US) and radiology subspecialties. Automated extraction demonstrated high stability for structured fields (Levenshtein ratio > 90%), with 78.5% of record edits being characterized as minor during expert review. Statistical analysis of the repository revealed CNN and transformer architectures as dominant, while MRI was the most commonly used modality (in 621 neuroradiology AI models). Research output was mostly concentrated in China and the United States. The OpenRad web interface enables model discovery via keyword search and filters for modality, subspecialty, intended use, verification status and demo availability, alongside live statistics. The community can contribute new models through a dedicated portal. OpenRad contains approx. 1700 open access, curated radiology AI models with standardized metadata, supplemented with analysis of code repositories, thereby creating a comprehensive, searchable resource for the radiology community.", "link": "http://arxiv.org/abs/2603.02062v1", "date": "2026-03-02", "relevancy": 2.378, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.484}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.484}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OpenRad%3A%20a%20Curated%20Repository%20of%20Open-access%20AI%20models%20for%20Radiology&body=Title%3A%20OpenRad%3A%20a%20Curated%20Repository%20of%20Open-access%20AI%20models%20for%20Radiology%0AAuthor%3A%20Konstantinos%20Vrettos%20and%20Galini%20Papadaki%20and%20Emmanouil%20Brilakis%20and%20Matthaios%20Triantafyllou%20and%20Dimitrios%20Leventis%20and%20Despina%20Staraki%20and%20Maria%20Mavroforou%20and%20Eleftherios%20Tzanis%20and%20Konstantina%20Giouroukou%20and%20Michail%20E.%20Klontzas%0AAbstract%3A%20The%20rapid%20developments%20in%20artificial%20intelligence%20%28AI%29%20research%20in%20radiology%20have%20produced%20numerous%20models%20that%20are%20scattered%20across%20various%20platforms%20and%20sources%2C%20limiting%20discoverability%2C%20reproducibility%20and%20clinical%20translation.%20Herein%2C%20OpenRad%20was%20created%2C%20a%20curated%2C%20standardized%2C%20open-access%20repository%20that%20aggregates%20radiology%20AI%20models%20and%20providing%20details%20such%20as%20the%20availability%20of%20pretrained%20weights%20and%20interactive%20applications.%20Retrospective%20analysis%20of%20peer%20reviewed%20literature%20and%20preprints%20indexed%20in%20PubMed%2C%20arXiv%20and%20Scopus%20was%20performed%20until%20Dec%202025%20%28n%20%3D%205239%20records%29.%20Model%20records%20were%20generated%20using%20a%20locally%20hosted%20LLM%20%28gpt-oss%3A120b%29%2C%20based%20on%20the%20RSNA%20AI%20Roadmap%20JSON%20schema%2C%20and%20manually%20verified%20by%20ten%20expert%20reviewers.%20Stability%20of%20LLM%20outputs%20was%20assessed%20on%20225%20randomly%20selected%20papers%20using%20text%20similarity%20metrics.%20A%20total%20of%201694%20articles%20were%20included%20after%20review.%20Included%20models%20span%20all%20imaging%20modalities%20%28CT%2C%20MRI%2C%20X-ray%2C%20US%29%20and%20radiology%20subspecialties.%20Automated%20extraction%20demonstrated%20high%20stability%20for%20structured%20fields%20%28Levenshtein%20ratio%20%3E%2090%25%29%2C%20with%2078.5%25%20of%20record%20edits%20being%20characterized%20as%20minor%20during%20expert%20review.%20Statistical%20analysis%20of%20the%20repository%20revealed%20CNN%20and%20transformer%20architectures%20as%20dominant%2C%20while%20MRI%20was%20the%20most%20commonly%20used%20modality%20%28in%20621%20neuroradiology%20AI%20models%29.%20Research%20output%20was%20mostly%20concentrated%20in%20China%20and%20the%20United%20States.%20The%20OpenRad%20web%20interface%20enables%20model%20discovery%20via%20keyword%20search%20and%20filters%20for%20modality%2C%20subspecialty%2C%20intended%20use%2C%20verification%20status%20and%20demo%20availability%2C%20alongside%20live%20statistics.%20The%20community%20can%20contribute%20new%20models%20through%20a%20dedicated%20portal.%20OpenRad%20contains%20approx.%201700%20open%20access%2C%20curated%20radiology%20AI%20models%20with%20standardized%20metadata%2C%20supplemented%20with%20analysis%20of%20code%20repositories%2C%20thereby%20creating%20a%20comprehensive%2C%20searchable%20resource%20for%20the%20radiology%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02062v1%0AForm%3A%20https%3A//docs.google.com/forms/ {"title": "ORGAN: Object-Centric Representation Learning using Cycle Consistent Generative Adversarial Networks", "author": "Jo\u00ebl K\u00fcchler and Ellen van Maren and Vaiva Vasiliauskait\u0117 and Katarina Vuli\u0107 and Reza Abbasi-Asl and Stephan J. Ihle", "abstract": "Although data generation is often straightforward, extracting information from data is more difficult. Object-centric representation learning can extract information from images in an unsupervised manner. It does so by segmenting an image into its subcomponents: the objects. Each object is then represented in a low-dimensional latent space that can be used for downstream processing. Object-centric representation learning is dominated by autoencoder architectures (AEs). Here, we present ORGAN, a novel approach for object-centric representation learning, which is based on cycle-consistent Generative Adversarial Networks instead. We show that it performs similarly to other state-of-the-art approaches on synthetic datasets, while at the same time being the only approach tested here capable of handling more challenging real-world datasets with many objects and low visual contrast. Complementing these results, ORGAN creates expressive latent space representations that allow for object manipulation. Finally, we show that ORGAN scales well both with respect to the number of objects and the size of the images, giving it a unique edge over current state-of-the-art approaches.", "link": "http://arxiv.org/abs/2603.02063v1", "date": "2026-03-02", "relevancy": 2.3667, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6181}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5873}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5855}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ORGAN%3A%20Object-Centric%20Representation%20Learning%20using%20Cycle%20Consistent%20Generative%20Adversarial%20Networks&body=Title%3A%20ORGAN%3A%20Object-Centric%20Representation%20Learning%20using%20Cycle%20Consistent%20Generative%20Adversarial%20Networks%0AAuthor%3A%20Jo%C3%ABl%20K%C3%BCchler%20and%20Ellen%20van%20Maren%20and%20Vaiva%20Vasiliauskait%C4%97%20and%20Katarina%20Vuli%C4%87%20and%20Reza%20Abbasi-Asl%20and%20Stephan%20J.%20Ihle%0AAbstract%3A%20Although%20data%20generation%20is%20often%20straightforward%2C%20extracting%20information%20from%20data%20is%20more%20difficult.%20Object-centric%20representation%20learning%20can%20extract%20information%20from%20images%20in%20an%20unsupervised%20manner.%20It%20does%20so%20by%20segmenting%20an%20image%20into%20its%20subcomponents%3A%20the%20objects.%20Each%20object%20is%20then%20represented%20in%20a%20low-dimensional%20latent%20space%20that%20can%20be%20used%20for%20downstream%20processing.%20Object-centric%20representation%20learning%20is%20dominated%20by%20autoencoder%20architectures%20%28AEs%29.%20Here%2C%20we%20present%20ORGAN%2C%20a%20novel%20approach%20for%20object-centric%20representation%20learning%2C%20which%20is%20based%20on%20cycle-consistent%20Generative%20Adversarial%20Networks%20instead.%20We%20show%20that%20it%20performs%20similarly%20to%20other%20state-of-the-art%20approaches%20on%20synthetic%20datasets%2C%20while%20at%20the%20same%20time%20being%20the%20only%20approach%20tested%20here%20capable%20of%20handling%20more%20challenging%20real-world%20datasets%20with%20many%20objects%20and%20low%20visual%20contrast.%20Complementing%20these%20results%2C%20ORGAN%20creates%20expressive%20latent%20space%20representations%20that%20allow%20for%20object%20manipulation.%20Finally%2C%20we%20show%20that%20ORGAN%20scales%20well%20both%20with%20respect%20to%20the%20number%20of%20objects%20and%20the%20size%20of%20the%20images%2C%20giving%20it%20a%20unique%20edge%20over%20current%20state-of-the-art%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02063v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DORGAN%253A%2520Object-Centric%2520Representation%2520Learning%2520using%2520Cycle%2520Consistent%2520Generative%2520Adversarial%2520Networks%26entry.906535625%3DJo%25C3%25ABl%2520K%25C3%25BCchler%2520and%2520Ellen%2520van%2520Maren%2520and%2520Vaiva%2520Vasiliauskait%25C4%2597%2520and%2520Katarina%2520Vuli%25C4%2587%2520and%2520Reza%2520Abbasi-Asl%2520and%2520Stephan%2520J.%2520Ihle%26entry.1292438233%3DAlthough%2520data%2520generation%2520is%2520often%2520straightforward%252C%2520extracting%2520information%2520from%2520data%2520is%2520more%2520difficult.%2520Object-centric%2520representation%2520learning%2520can%2520extract%2520information%2520from%2520images%2520in%2520an%2520unsupervised%2520manner.%2520It%2520does%2520so%2520by%2520segmenting%2520an%2520image%2520into%2520its%2520subcomponents%253A%2520the%2520objects.%2520Each%2520object%2520is%2520then%2520represented%2520in%2520a%2520low-dimensional%2520latent%2520space%2520that%2520can%2520be%2520used%2520for%2520downstream%2520processing.%2520Object-centric%2520representation%2520learning%2520is%2520dominated%2520by%2520autoencoder%2520architectures%2520%2528AEs%2529.%2520Here%252C%2520we%2520present%2520ORGAN%252C%2520a%2520novel%2520approach%2520for%2520object-centric%2520representation%2520learning%252C%2520which%2520is%2520based%2520on%2520cycle-consistent%2520Generative%2520Adversarial%2520Networks%2520instead.%2520We%2520show%2520that%2520it%2520performs%2520similarly%2520to%2520other%2520state-of-the-art%2520approaches%2520on%2520synthetic%2520datasets%252C%2520while%2520at%2520the%2520same%2520time%2520being%2520the%2520only%2520approach%2520tested%2520here%2520capable%2520of%2520handling%2520more%2520challenging%2520real-world%2520datasets%2520with%2520many%2520objects%2520and%2520low%2520visual%2520contrast.%2520Complementing%2520these%2520results%252C%2520ORGAN%2520creates%2520expressive%2520latent%2520space%2520representations%2520that%2520allow%2520for%2520object%2520manipulation.%2520Finally%252C%2520we%2520show%2520that%2520ORGAN%2520scales%2520well%2520both%2520with%2520respect%2520to%2520the%2520number%2520of%2520objects%2520and%2520the%2520size%2520of%2520the%2520images%252C%2520giving%2520it%2520a%2520unique%2520edge%2520over%2520current%2520state-of-the-art%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02063v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ORGAN%3A%20Object-Centric%20Representation%20Learning%20using%20Cycle%20Consistent%20Generative%20Adversarial%20Networks&entry.906535625=Jo%C3%ABl%20K%C3%BCchler%20and%20Ellen%20van%20Maren%20and%20Vaiva%20Vasiliauskait%C4%97%20and%20Katarina%20Vuli%C4%87%20and%20Reza%20Abbasi-Asl%20and%20Stephan%20J.%20Ihle&entry.1292438233=Although%20data%20generation%20is%20often%20straightforward%2C%20extracting%20information%20from%20data%20is%20more%20difficult.%20Object-centric%20representation%20learning%20can%20extract%20information%20from%20images%20in%20an%20unsupervised%20manner.%20It%20does%20so%20by%20segmenting%20an%20image%20into%20its%20subcomponents%3A%20the%20objects.%20Each%20object%20is%20then%20represented%20in%20a%20low-dimensional%20latent%20space%20that%20can%20be%20used%20for%20downstream%20processing.%20Object-centric%20representation%20learning%20is%20dominated%20by%20autoencoder%20architectures%20%28AEs%29.%20Here%2C%20we%20present%20ORGAN%2C%20a%20novel%20approach%20for%20object-centric%20representation%20learning%2C%20which%20is%20based%20on%20cycle-consistent%20Generative%20Adversarial%20Networks%20instead.%20We%20show%20that%20it%20performs%20similarly%20to%20other%20state-of-the-art%20approaches%20on%20synthetic%20datasets%2C%20while%20at {"title": "InstructPro: Natural Language Guided Ligand-Binding Protein Design", "author": "Zhenqiao Song and Ramith Hettiarachchi and Chuan Li and Jianwen Xie and Lei Li", "abstract": "The de novo design of ligand-binding proteins with tailored functions is essential for advancing biotechnology and molecular medicine, yet existing AI approaches are limited by scarce protein-ligand complex data. To circumvent this data bottleneck, we leverage the abundant natural language descriptions characterizing protein-ligand interactions. Here, we introduce InstructPro, a family of generative models that design proteins following the guidance of natural language instructions and ligand formulas. InstructPro produces protein sequences consistent with specified function descriptions and ligand targets. To enable training and evaluation, we develop InstructProBench, a large-scale dataset of 9.6 million (function description, ligand, protein) triples. We train two model variants -- InstructPro-1B and InstructPro-3B -- that substantially outperform strong baselines. InstructPro-1B achieves an AlphaFold3 ipTM of 0.918 and a binding affinity of -8.764 on seen ligands, while maintaining robust performance in a zero-shot setting with scores of 0.869 and -6.713, respectively. These results are accompanied by novelty scores of 70.1% and 68.8%, underscoring the model's ability to generalize beyond the training set. Furthermore, the model yields a superior binding free energy of -20.9 kcal/mol and an average of 5.82 intermolecular hydrogen bonds, validating its proficiency in designing high-affinity ligand-binding proteins. Notably, scaling to InstructPro-3B further improves the zero-shot ipTM to 0.882, binding affinity to -6.797, and binding free energy to -25.8 kcal/mol, demonstrating clear performance gains associated with increased model capacity. These findings highlight the power of natural language-guided generative models to mitigate the data bottlenecks in traditional structure-based methods, significantly broadening the scope of de novo protein design.", "link": "http://arxiv.org/abs/2506.09332v3", "date": "2026-03-02", "relevancy": 2.3664, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4822}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4688}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4688}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InstructPro%3A%20Natural%20Language%20Guided%20Ligand-Binding%20Protein%20Design&body=Title%3A%20InstructPro%3A%20Natural%20Language%20Guided%20Ligand-Binding%20Protein%20Design%0AAuthor%3A%20Zhenqiao%20Song%20and%20Ramith%20Hettiarachchi%20and%20Chuan%20Li%20and%20Jianwen%20Xie%20and%20Lei%20Li%0AAbstract%3A%20The%20de%20novo%20design%20of%20ligand-binding%20proteins%20with%20tailored%20functions%20is%20essential%20for%20advancing%20biotechnology%20and%20molecular%20medicine%2C%20yet%20existing%20AI%20approaches%20are%20limited%20by%20scarce%20protein-ligand%20complex%20data.%20To%20circumvent%20this%20data%20bottleneck%2C%20we%20leverage%20the%20abundant%20natural%20language%20descriptions%20characterizing%20protein-ligand%20interactions.%20Here%2C%20we%20introduce%20InstructPro%2C%20a%20family%20of%20generative%20models%20that%20design%20proteins%20following%20the%20guidance%20of%20natural%20language%20instructions%20and%20ligand%20formulas.%20InstructPro%20produces%20protein%20sequences%20consistent%20with%20specified%20function%20descriptions%20and%20ligand%20targets.%20To%20enable%20training%20and%20evaluation%2C%20we%20develop%20InstructProBench%2C%20a%20large-scale%20dataset%20of%209.6%20million%20%28function%20description%2C%20ligand%2C%20protein%29%20triples.%20We%20train%20two%20model%20variants%20--%20InstructPro-1B%20and%20InstructPro-3B%20--%20that%20substantially%20outperform%20strong%20baselines.%20InstructPro-1B%20achieves%20an%20AlphaFold3%20ipTM%20of%200.918%20and%20a%20binding%20affinity%20of%20-8.764%20on%20seen%20ligands%2C%20while%20maintaining%20robust%20performance%20in%20a%20zero-shot%20setting%20with%20scores%20of%200.869%20and%20-6.713%2C%20respectively.%20These%20results%20are%20accompanied%20by%20novelty%20scores%20of%2070.1%25%20and%2068.8%25%2C%20underscoring%20the%20model%27s%20ability%20to%20generalize%20beyond%20the%20training%20set.%20Furthermore%2C%20the%20model%20yields%20a%20superior%20binding%20free%20energy%20of%20-20.9%20kcal/mol%20and%20an%20average%20of%205.82%20intermolecular%20hydrogen%20bonds%2C%20validating%20its%20proficiency%20in%20designing%20high-affinity%20ligand-binding%20proteins.%20Notably%2C%20scaling%20to%20InstructPro-3B%20further%20improves%20the%20zero-shot%20ipTM%20to%200.882%2C%20binding%20affinity%20to%20-6.797%2C%20and%20binding%20free%20energy%20to%20-25.8%20kcal/mol%2C%20demonstrating%20clear%20performance%20gains%20associated%20with%20increased%20model%20capacity.%20These%20findings%20highlight%20the%20power%20of%20natural%20language-guided%20generative%20models%20to%20mitigate%20the%20data%20bottlenecks%20in%20traditional%20structure-based%20methods%2C%20significantly%20broadening%20the%20scope%20of%20de%20novo%20protein%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2506.09332v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInstructPro%253A%2520Natural%2520Language%2520Guided%2520Ligand-Binding%2520Protein%2520Design%26entry.906535625%3DZhenqiao%2520Song%2520and%2520Ramith%2520Hettiarachchi%2520and%2520Chuan%2520Li%2520and%2520Jianwen%2520Xie%2520and%2520Lei%2520Li%26entry.1292438233%3DThe%2520de%2520novo%2520design%2520of%2520ligand-binding%2520proteins%2520with%2520tailored%2520functions%2520 {"title": "A Practical Guide to Streaming Continual Learning", "author": "Andrea Cossu and Federico Giannini and Giacomo Ziffer and Alessio Bernardo and Alexander Gepperth and Emanuele Della Valle and Barbara Hammer and Davide Bacciu", "abstract": "Continual Learning (CL) and Streaming Machine Learning (SML) study the ability of agents to learn from a stream of non-stationary data. Despite sharing some similarities, they address different and complementary challenges. While SML focuses on rapid adaptation after changes (concept drifts), CL aims to retain past knowledge when learning new tasks. After a brief introduction to CL and SML, we discuss Streaming Continual Learning (SCL), an emerging paradigm providing a unifying solution to real-world problems, which may require both SML and CL abilities. We claim that SCL can i) connect the CL and SML communities, motivating their work towards the same goal, and ii) foster the design of hybrid approaches that can quickly adapt to new information (as in SML) without forgetting previous knowledge (as in CL). We conclude the paper with a motivating example and a set of experiments, highlighting the need for SCL by showing how CL and SML alone struggle in achieving rapid adaptation and knowledge retention.", "link": "http://arxiv.org/abs/2603.01677v1", "date": "2026-03-02", "relevancy": 2.3625, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4969}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4727}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Practical%20Guide%20to%20Streaming%20Continual%20Learning&body=Title%3A%20A%20Practical%20Guide%20to%20Strea {"title": "Uni-X: Mitigating Modality Conflict with a Two-End-Separated Architecture for Unified Multimodal Models", "author": "Jitai Hao and Hao Liu and Xinyan Xiao and Qiang Huang and Jun Yu", "abstract": "Unified Multimodal Models (UMMs) built on shared autoregressive (AR) transformers are attractive for their architectural simplicity. However, we identify a critical limitation: when trained on multimodal inputs, modality-shared transformers suffer from severe gradient conflicts between vision and text, particularly in shallow and deep layers. We trace this issue to the fundamentally different low-level statistical properties of images and text, while noting that conflicts diminish in middle layers where representations become more abstract and semantically aligned. To overcome this challenge, we propose Uni-X, a two-end-separated, middle-shared architecture. Uni-X dedicates its initial and final layers to modality-specific processing, while maintaining shared parameters in the middle layers for high-level semantic fusion. This X-shaped design not only eliminates gradient conflicts at both ends but also further alleviates residual conflicts in the shared layers. Extensive experiments validate the effectiveness of Uni-X. Under identical training conditions, Uni-X achieves superior training efficiency compared to strong baselines. When scaled to 3B parameters with larger training data, Uni-X matches or surpasses 7B AR-based UMMs, achieving a GenEval score of 82 for image generation alongside strong performance in text and vision understanding tasks. These results establish Uni-X as a parameter-efficient and scalable foundation for future unified multimodal modeling. Our code is available at https://github.com/CURRENTF/Uni-X", "link": "http://arxiv.org/abs/2509.24365v3", "date": "2026-03-02", "relevancy": 2.3537, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5983}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5852}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5719}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uni-X%3A%20Mitigating%20Modality%20Conflict%20with%20a%20Two-End-Separated%20Architecture%20for%20Unified%20Multimodal%20Models&body=Title%3A%20Uni-X%3A%20Mitigating%20Modality%20Conflict%20with%20a%20Two-End-Separated%20Architecture%20for%20Unified%20Multimodal%20Models%0AAuthor%3A%20Jitai%20Hao%20and%20Hao%20Liu%20and%20Xinyan%20Xiao%20and%20Qiang%20Huang%20and%20Jun%20Yu%0AAbstract%3A%20Unified%20Multimodal%20Models%20%28UMMs%29%20built%20on%20shared%20autoregressive%20%28AR%29%20transformers%20are%20attractive%20for%20their%20architectural%20simplicity.%20However%2C%20we%20identify%20a%20critical%20limitation%3A%20when%20trained%20on%20multimodal%20inputs%2C%20modality-shared%20transformers%20suffer%20from%20severe%20gradient%20conflicts%20between%20vision%20and%20text%2C%20particularly%20in%20shallow%20and%20deep%20layers.%20We%20trace%20this%20issue%20to%20the%20fundamentally%20different%20low-level%20statistical%20properties%20of%20images%20and%20text%2C%20while%20noting%20that%20conflicts%20diminish%20in%20middle%20layers%20where%20representations%20become%20more%20abstract%20and%20semantically%20aligned.%20To%20overcome%20this%20challenge%2C%20we%20propose%20Uni-X%2C%20a%20two-end-separated%2C%20middle-shared%20architecture.%20Uni-X%20dedicates%20its%20initial%20and%20final%20layers%20to%20modality-specific%20processing%2C%20while%20maintaining%20shared%20parameters%20in%20the%20middle%20layers%20for%20high-level%20semantic%20fusion.%20This%20X-shaped%20design%20not%20only%20eliminates%20gradient%20conflicts%20at%20both%20ends%20but%20also%20further%20alleviates%20residual%20conflicts%20in%20the%20shared%20layers.%20Extensive%20experiments%20validate%20the%20effectiveness%20of%20Uni-X.%20Under%20identical%20training%20conditions%2C%20Uni-X%20achieves%20superior%20training%20efficiency%20compared%20to%20strong%20baselines.%20When%20scaled%20to%203B%20parameters%20with%20larger%20training%20data%2C%20Uni-X%20matches%20or%20surpasses%207B%20AR-based%20UMMs%2C%20achieving%20a%20GenEval%20score%20of%2082%20for%20image%20generation%20alongside%20strong%20performance%20in%20text%20and%20vision%20understanding%20tasks.%20These%20results%20establish%20Uni-X%20as%20a%20parameter-efficient%20and%20scalable%20foundation%20for%20future%20unified%20multimodal%20modeling.%20Our%20code%20is%20available%20at%20https%3A//github.com/CURRENTF/Uni-X%0ALink%3A%20http%3A//arxiv.org/abs/2509.24365v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUni-X%253A%2520Mitigating%2520Modality%2520Conflict%2520with%2520a%2520Two-End-Separated%2520Architecture%2520for%2520Unified%2520Multimodal%2520Models%26entry.906535625%3DJitai%2520Hao%2520and%2520Hao%2520Liu%2520and%2520Xinyan%2520Xiao%2520and%2520Qiang%2520Huang%2520and%2520Jun%2520Yu%26entry.1292438233%3DUnified%2520Multimodal%2520Models%2520%2528UMMs%2529%2520built%2520on%2520shared%2520autoregressive%2520%2528AR%2529%2520transformers%2520are%2520attractive%2520for%2520their%2520architectural%2520simplicity.%2520However%252C%2520we%2520identify%2520a%2520critical%2520limitation%253A%2520when%2520trained%2520on%2520multimodal%2520inputs%252C%2520modality-shared%2520transformers%2520suffer%2520from%2520severe%2520gradient%2520conflicts%2520between%2520vision%2520and%2520text%252C%2520particularly%2520in%2520shallow%2520and%2520deep%2520layers.%2520We%2520trace%2520this%2520issue%2520to%2520the%2520fundamentally%2520different%2520low-level%2520statistical%2520properties%2520of%2520images%2520and%2520text%252C%2520while%2520noting%2520that%2520conflicts%2520diminish%2520in%2520middle%2 {"title": "EstLLM: Enhancing Estonian Capabilities in Multilingual LLMs via Continued Pretraining and Post-Training", "author": "Aleksei Dorkin and Taido Purason and Emil Kalbaliyev and Hele-Andra Kuulmets and Marii Ojastu and Mark Fi\u0161el and Tanel Alum\u00e4e and Eleri Aedmaa and Krister Kruusmaa and Kairit Sirts", "abstract": "Large language models (LLMs) are predominantly trained on English-centric data, resulting in uneven performance for smaller languages. We study whether continued pretraining (CPT) can substantially improve Estonian capabilities in a pretrained multilingual LLM while preserving its English and general reasoning performance. Using Llama 3.1 8B as the main base model, we perform CPT on a mixture that increases Estonian exposure while approximating the original training distribution through English replay and the inclusion of code, mathematics, and instruction-like data. We subsequently apply supervised fine-tuning, preference optimization, and chat vector merging to introduce robust instruction-following behavior. Evaluation on a comprehensive suite of Estonian benchmarks shows consistent gains in linguistic competence, knowledge, reasoning, translation quality, and instruction-following compared to the original base model and its instruction-tuned variant, while maintaining competitive performance on English benchmarks. These findings indicate that CPT, with an appropriately balanced data mixture, together with post-training alignment, can substantially improve single-language capabilities in pretrained multilingual LLMs.", "link": "http://arxiv.org/abs/2603.02041v1", "date": "2026-03-02", "relevancy": 2.3506, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.498}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4561}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4561}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EstLLM%3A%20Enhancing%20Estonian%20Capabilities%20in%20Multilingual%20LLMs%20via%20Continued%20Pretraining%20and%20Post-Training&body=Title%3A%20EstLLM%3A%20Enhancing%20Estonian%20Capabilities%20in%20Multilingual%20LLMs%20via%20Continued%20Pretraining%20and%20Post-Training%0AAuthor%3A%20Aleksei%20Dorkin%20and%20Taido%20Purason%20and%20Emil%20Kalbaliyev%20and%20Hele-Andra%20Kuulmets%20and%20Marii%20Ojastu%20and%20Mark%20Fi%C5%A1el%20and%20Tanel%20Alum%C3%A4e%20and%20Eleri%20Aedmaa%20and%20Krister%20Kruusmaa%20and%20Kairit%20Sirts%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20predominantly%20trained%20on%20English-centric%20data%2C%20resulting%20in%20uneven%20performance%20for%20smaller%20languages.%20We%20study%20whether%20continued%20pretraining%20%28CPT%29%20can%20substantially%20improve%20Estonian%20capabilities%20in%20a%20pretrained%20multilingual%20LLM%20while%20preserving%20its%20English%20and%20general%20reasoning%20performance.%20Using%20Llama%203.1%208B%20as%20the%20main%20base%20model%2C%20we%20perform%20CPT%20on%20a%20mixture%20that%20increases%20Estonian%20exposure%20while%20approximating%20the%20original%20training%20distribution%20through%20English%20replay%20and%20the%20inclusion%20of%20code%2C%20mathematics%2C%20and%20instruction-like%20data.%20We%20subsequently%20apply%20supervised%20fine-tuning%2C%20preference%20optimization%2C%20and%20chat%20vector%20merging%20to%20introduce%20robust%20instruction-following%20behavior.%20Evaluation%20on%20a%20comprehensive%20suite%20of%20Estonian%20benchmarks%20shows%20consistent%20gains%20in%20linguistic%20competence%2C%20knowledge%2C%20reasoning%2C%20translation%20quality%2C%20and%20instruction-following%20compared%20to%20the%20original%20base%20model%20and%20its%20instruction-tuned%20variant%2C%20while%20maintaining%20competitive%20performance%20on%20English%20benchmarks.%20These%20findings%20indicate%20that%20CPT%2C%20with%20an%20appropriately%20balanced%20data%20mixture%2C%20together%20with%20post-training%20alignment%2C%20can%20substantially%20improve%20single-language%20capabilities%20in%20pretrained%20multilingual%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02041v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEstLLM%253A%2520Enhancing%2520Estonian%2520Capabilities%2520in%2520Multilingual%2520LLMs%2520via%2520Continued%2520Pretraining%2520and%2520Post-Training%26entry.906535625%3DAleksei%2520Dorkin%2520and%2520Taido%2520Purason%2520and%2520Emil%2520Kalbaliyev%2520and%2520Hele-Andra%2520Kuulmets%2520and%2520Marii%2520Ojastu%2520and%2520Mark%2520Fi%25C5%25A1el%2520and%2520Tanel%2520Alum%25C3%25A4e%2520and%2520Eleri%2520Aedmaa%2520and%2520Krister%2520Kruusmaa%2520and%2520Kairit%2520Sirts%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520are%2520predominantly%2520trained%2520on%2520English-centric%2520data%252C%2520resulting%2520in%2520uneven%2520performance%2520for%2520smaller%2520languages.%2520We%2520study%2520whether%2520continued%2520pretraining%2520%2528CPT%2529%2520can%2520substantially%2520improve%2520Estonian%2520capabilities%2520in%2520a%2520pretrained%2520multilingual%2520LLM%2520while%2520preserving%2520its%2520English%2520and%2520general%2520reasoning%2520performance.%2520Using%2520Llama%25203.1%25208B%2520as%2520the%2520main%2520base%2520model%252C%2520we%2520perform%2520CPT%2520on%2520a%2520mixture%2520that%2520increases%2520Estonian%2520exposure%2520while%2520approximating%2520the%2520original%2520training%2520distribution%2520through%2520English%2520replay%2520and%2520the%2520inclusion%2520of%2520code%252C%2520mathematics%252C%2520and%2520instruction-like%2520data.%2520We%2520subsequently%2520apply%2520supervised%2520fine-tuning%252C%2520preference%2520optimization%252C%2520and%2520chat%2520vector%2520merging%2520to%2520introduce%2520robust%2520instruction-following%2520behavior.%2520Evaluation%2520on%2520a%2520comprehensive%2520suite%2520of%2520Estonian%2520benchmarks%2520shows%2520consistent%2520gains%2520in%2520linguistic%2520competence%252C%2520knowledge%252C%2520reasoning%252C%2520translation%2520quality%252C%2520and%2520instruction-following%2520compared%2520to%2520the%2520original%2520base%2520model%2520and%2520its%2520instruction-tuned%2520variant%252C%2520while%2520maintaining%2520competitive%2520performance%2520on%2520English%2520benchmarks.%2520These%2520findings%2520indicate%2520that%2520CPT%252C%2520with%2520an%2520appropriately%2520balanced%2520data%2520mixture%252C%2520together%2520with%2520post-training%2520alignment%252C%2520can%2520substantially%2520improve%2520single-language%2520capabilities%2520in%2520pretrained%2520multilingual%2520LLMs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02041v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EstLLM%3A%20Enhancing%20Estonian%20Capabilities%20in%20Multilingual%20LLMs%20via%20Continued%20Pretraining%20and%20Post-Training&entry.906535625=Aleksei%20Dorkin%20and%20Taido%20Purason%20and%20Emil%20Kalbaliyev%20and%20Hele-Andra%20Kuulmets%20and%20Marii%20Ojastu%20and%20Mark%20Fi%C5%A1el%20and%20Tanel%20Alum%C3%A4e%20and%20Eleri%20Aedmaa%20and%20Krister%20Kruusmaa%20and%20Kairit%20Sirts&entry.1292438233=Large%20language%20models%20%28LLMs%29%20are%20predominantly%20trained%20on%20English-centric%20data%2C%20resulting%20in%20uneven%20performance%20for%20smaller%20languages.%20We%20study%20whether%20continued%20pretraining%20%28CPT%29%20can%20substantially%20improve%20Estonian%20capabilities%20in%20a%20pretrained%20multilingual%20LLM%20while%20preserving%20its%20English%20and%20general%20reasoning%20performance. {"title": "CA-AFP: Cluster-Aware Adaptive Federated Pruning", "author": "Om Govind Jha and Harsh Shukla and Haroon R. Lone", "abstract": "Federated Learning (FL) faces major challenges in real-world deployments due to statistical heterogeneity across clients and system heterogeneity arising from resource-constrained devices. While clustering-based approaches mitigate statistical heterogeneity and pruning techniques improve memory and communication efficiency, these strategies are typically studied in isolation.\n  We propose CA-AFP, a unified framework that jointly addresses both challenges by performing cluster-specific model pruning. In CA-AFP, clients are first grouped into clusters, and a separate model for each cluster is adaptively pruned during training. The framework introduces two key innovations: (1) a cluster-aware importance scoring mechanism that combines weight magnitude, intra-cluster coherence, and gradient consistency to identify parameters for pruning, and (2) an iterative pruning schedule that progressively removes parameters while enabling model self-healing through weight regrowth.\n  We evaluate CA-AFP on two widely used human activity recognition benchmarks, UCI HAR and WISDM, under natural user-based federated partitions. Experimental results demonstrate that CA-AFP achieves a favorable balance between predictive accuracy, inter-client fairness, and communication efficiency. Compared to pruning-based baselines, CA-AFP consistently improves accuracy and lower performance disparity across clients with limited fine-tuning, while requiring substantially less communication than dense clustering-based methods. It also shows robustness to different Non-IID levels of data. Finally, ablation studies analyze the impact of clustering, pruning schedules and scoring mechanism offering practical insights into the design of efficient and adaptive FL systems.", "link": "http://arxiv.org/abs/2603.01739v1", "date": "2026-03-02", "relevancy": 2.3337, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4739}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4656}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4607}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CA-AFP%3A%20Cluster-Aware%20Adaptive%20Federated%20Pruning&body=Title%3A%20CA-AFP%3A%20Cluster-Aware%20Adaptive%20Federated%20Pruning%0AAuthor%3A%20Om%20Govind%20Jha%20and%20Harsh%20Shukla%20and%20Haroon%20R.%20Lone%0AAbstract%3A%20Federated%20Learning%20%28FL%29%20faces%20major%20challenges%20in%20real-world%20deployments%20due%20to%20statistical%20heterogeneity%20across%20clients%20and%20system%20heterogeneity%20arising%20from%20resource-constrained%20devices.%20While%20clustering-based%20approaches%20mitigate%20statistical%20heterogeneity%20and%20pruning%20techniques%20improve%20memory%20and%20communication%20efficiency%2C%20these%20strategies%20are%20typically%20studied%20in%20isolation.%0A%20%20We%20propose%20CA-AFP%2C%20a%20unified%20framework%20that%20jointly%20addresses%20both%20challenges%20by%20performing%20cluster-specific%20model%20pruning.%20In%20CA-AFP%2C%20clients%20are%20first%20grouped%20into%20clusters%2C%20and%20a%20separate%20model%20for%20each%20cluster%20is%20adaptively%20pruned%20during%20training.%20The%20framework%20introduces%20two%20key%20innovations%3A%20%281%29%20a%20cluster-aware%20importance%20scoring%20mechanism%20that%20combines%20weight%20magnitude%2C%20intra-cluster%20coherence%2C%20and%20gradient%20consistency%20to%20identify%20parameters%20for%20pruning%2C%20and%20%282%29%20an%20iterative%20pruning%20schedule%20that%20progressively%20removes%20parameters%20while%20enablin dules%2520and%2520scoring%2520mechanism%2520offering%2520practical%2520insights%2520into%2520the%2520design%2520of%2520efficient%2520and%2520adaptive%2520FL%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.01739v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CA-AFP%3A%20Cluster-Aware%20Adaptive%20Federated%20Pruning&entry.906535625=Om%20Govind%20Jha%20and%20Harsh%20Shukla%20and%20Haroon%20R.%20Lone&entry.1292438233=Federated%20Learning%20%28FL%29%20faces%20major%20challenges%20in%20real-world%20deployments%20due%20to%20statistical%20heterogeneity%20across%20clients%20and%20system%20heterogeneity%20arising%20from%20resource-constrained%20devices.%20While%20clustering-based%20approaches%20mitigate%20statistical%20heterogeneity%20and%20pruning%20techniques%20improve%20memory%20and%20communication%20efficiency%2C%20these%20strategies%20are%20typically%20studied%20in%20isolation.%0A%20%20We%20propose%20CA-AFP%2C%20a%20unified%20framework%20that%20jointly%20addresses%20both%20challenges%20by%20performing%20cluster-specific%20model%20pruning.%20In%20CA-AFP%2C%20clients%20are%20first%20grouped%20into%20clusters%2C%20and%20a%20separate%20model%20for%20each%20cluster%20is%20adaptively%20pruned%20during%20training.%20The%20framework%20introduces%20two%20key%20innovations%3A%20%281%29%20a%20cluster-aware%20importance%20scoring%20mechanism%20that%20combines%20weight%20magnitude%2C%20intra-cluster%20coherence%2C%20and%20gradient%20consistency%20to%20identify%20parameters%20for%20pruning%2C%20and%20%282%29%20an%20iterative%20pruning%20schedule%20that%20progressively%20removes%20parameters%20while%20enabling%20model%20self-healing%20through%20weight%20regrowth.%0A%20%20We%20evaluate%20CA-AFP%20on%20two%20widely%20used%20human%20activity%20recognition%20benchmarks%2C%20UCI%20HAR%20and%20WISDM%2C%20under%20natural%20user-based%20federated%20partitions.%20Experime {"title": "Phase-Type Variational Autoencoders for Heavy-Tailed Data", "author": "Abdelhakim Ziani and Andr\u00e1s Horv\u00e1th and Paolo Ballarini", "abstract": "Heavy-tailed distributions are ubiquitous in real-world data, where rare but extreme events dominate risk and variability. However, standard Variational Autoencoders (VAEs) employ simple decoder distributions (e.g., Gaussian) that fail to capture heavy-tailed behavior, while existing heavy-tail-aware extensions remain restricted to predefined parametric families whose tail behavior is fixed a priori.\n  We propose the Phase-Type Variational Autoencoder (PH-VAE), whose decoder distribution is a latent-conditioned Phase-Type (PH) distribution defined as the absorption time of a continuous-time Markov chain (CTMC). This formulation composes multiple exponential time scales, yielding a flexible and analytically tractable decoder that adapts its tail behavior directly from the observed data. Experiments on synthetic and real-world benchmarks demonstrate that PH-VAE accurately recovers diverse heavy-tailed distributions, significantly outperforming Gaussian, Student-t, and extreme-value-based VAE decoders in modeling tail behavior and extreme quantiles. In multivariate settings, PH-VAE captures realistic cross-dimensional tail dependence through its shared latent representation. To our knowledge, this is the first work to integrate Phase-Type distributions into deep generative modeling, bridging applied probability and representation learning.", "link": "http://arxiv.org/abs/2603.01800v1", "date": "2026-03-02", "relevancy": 2.3292, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4744}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4702}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Phase-Type%20Variational%20Autoencoders%20for%20Heavy-Tailed%20Data&body=Title%3A%20Phase-Type%20Variational%20Autoencoders%20for%20Heavy-Tailed%20Data%0AAuthor%3A%20Abdelhakim%20Ziani%20and%20Andr%C3%A1s%20Horv%C3%A1th%20and%20Paolo%20Ballarini%0AAbstract%3A%20Heavy-tailed%20distributions%20are%20ubiquitous%20in%20real-world%20data%2C%20where%20rare%20but%20extreme%20events%20dominate%20risk%20and%20variability.%20However%2C%20standard%20Variational%20Autoencoders%20%28VAEs%29%20employ%20simple%20decoder%20distributions%20%28e.g.%2C%20Gaussian%29%20that%20fail%20to%20capture%20heavy-tailed%20behavior%2C%20while%20existing%20heavy-tail-aware%20extensions%20remain%20restricted%20to%20predefined%20parametric%20families%20whose%20tail%20behavior%20is%20fixed%20a%20priori.%0A%20%20We%20propose%20the%20Phase-Type%20Variational%20Autoencoder%20%28PH-VAE%29%2C%20whose%20decoder%20distribution%20is%20a%20latent-conditioned%20Phase-Type%20%28PH%29%20distribution%20defined%20as%20the%20absorption%20time%20of%20a%20continuous-time%20Markov%20chain%20%28CTMC%29.%20This%20formulation%20composes%20multiple%20exponential%20time%20scales%2C%20yielding%20a%20flexible%20and%20analytically%20tractable%20decoder%20that%20adapts%20its%20tail%20behavior%20directly%20from%20the%20observed%20data.%20Experiments%20on%20synthetic%20and%20real-world%20benchmarks%20demonstrate%20that%20PH-VAE%20accurately%20recovers%20diverse%20heavy-tailed%20distributions%2C%20significantly%20outperforming%20Gaussian%2C%20Student-t%2C%20and%20extreme-value-based%20VAE%20decoders%20in%20modeling%20tail%20behavior%20and%20extreme%20quantiles.%20In%20multivariate%20settings%2C%20PH-VAE%20captures%20realistic%20cross-dimensional%20tail%20dependence%20through%20its%20shared%20latent%20representation.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20work%20to%20

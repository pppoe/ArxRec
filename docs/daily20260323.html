rDj9BurNNxUPYQ/viewform?entry.1380929848=Radar-Inertial%20Odometry%20with%20Online%20Spatio-Temporal%20Calibration%20via%20Continuous-Time%20IMU%20Modeling&entry.906535625=Vlaho-Josip%20%C5%A0tironja%20and%20Luka%20Petrovi%C4%87%20and%20Juraj%20Per%C5%A1i%C4%87%20and%20Ivan%20Markovi%C4%87%20and%20Ivan%20Petrovi%C4%87&entry.1292438233=Radar-Inertial%20Odometry%20%28RIO%29%20has%20emerged%20as%20a%20robust%20alternative%20to%20vision-%20and%20LiDAR-based%20odometry%20in%20challenging%20conditions%20such%20as%20low%20light%2C%20fog%2C%20featureless%20environments%2C%20or%20in%20adverse%20weather.%20However%2C%20many%20existing%20RIO%20approaches%20assume%20known%20radar-IMU%20extrinsic%20calibration%20or%20rely%20on%20sufficient%20motion%20excitation%20for%20online%20extrinsic%20estimation%2C%20while%20temporal%20misalignment%20between%20sensors%20is%20often%20neglected%20or%20treated%20independently.%20In%20this%20work%2C%20we%20present%20a%20RIO%20framework%20that%20performs%20joint%20online%20spatial%20and%20temporal%20calibration%20within%20a%20factor-graph%20optimization%20formulation%2C%20based%20on%20continuous-time%20modeling%20of%20inertial%20measurements%20using%20uniform%20cubic%20B-splines.%20The%20proposed%20continuous-time%20representation%20of%20acceleration%20and%20angular%20velocity%20accurately%20captures%20the%20asynchronous%20nature%20of%20radar-IMU%20measurements%2C%20enabling%20reliable%20convergence%20of%20both%20the%20temporal%20offset%20and%20extrinsic%20calibration%20parameters%2C%20without%20relying%20on%20scan%20matching%2C%20target%20tracking%2C%20or%20environment-specific%20assumptions.&entry.1838667208=http%3A//arxiv.org/abs/2603.19958v1&entry.124074799=Read"},
{"title": "HortiMulti: A Multi-Sensor Dataset for Localisation and Mapping in Horticultural Polytunnels", "author": "Shuoyuan Xu and Zhipeng Zhong and Tiago Barros and Matthew Coombes and Cristiano Premebida and Hao Wu and Cunjia Liu", "abstract": "Agricultural robotics is gaining increasing relevance in both research and real-world deployment. As these systems are expected to operate autonomously in more complex tasks, the availability of representative real-world datasets becomes essential. While domains such as urban and forestry robotics benefit from large and established benchmarks, horticultural environments remain comparatively under-explored despite the economic significance of this sector. To address this gap, we present HortiMulti, a multimodal, cross-season dataset collected in commercial strawberry and raspberry polytunnels across an entire growing season, capturing substantial appearance variation, dynamic foliage, specular reflections from plastic covers, severe perceptual aliasing, and GNSS-unreliable conditions, all of which directly degrade existing localisation and perception algorithms. The sensor suite includes two 3D LiDARs, four RGB cameras, an IMU, GNSS, and wheel odometry. Ground truth trajectories are derived from a combination of Total Station surveying, AprilTag fiducial markers, and LiDAR-inertial odometry, spanning dense, sparse, and marker-free coverage to support evaluation under both controlled and realistic conditions. We release time-synchronised raw measurements, calibration files, reference trajectories, and baseline benchmarks for visual, LiDAR, and multi-sensor SLAM, with results confirming that current state-of-the-art methods remain inadequate for reliable polytunnel deployment, establishing HortiMulti as a one-stop resource for developing and testing robotic perception systems in horticulture environments.", "link": "http://arxiv.org/abs/2603.20150v1", "date": "2026-03-20", "relevancy": 2.1541, "topK": [{"title": "You've Got {"title": "CoVR-R:Reason-Aware Composed Video Retrieval", "author": "Omkar Thawakar and Dmitry Demidov and Vaishnav Potlapalli and Sai Prasanna Teja Reddy Bogireddy and Viswanatha Reddy Gajjala and Alaa Mostafa Lasheen and Rao Muhammad Anwer and Fahad Khan", "abstract": "Composed Video Retrieval (CoVR) aims to find a target video given a reference video and a textual modification. Prior work assumes the modification text fully specifies the visual changes, overlooking after-effects and implicit consequences (e.g., motion, state transitions, viewpoint or duration cues) that emerge from the edit. We argue that successful CoVR requires reasoning about these after-effects. We introduce a reasoning-first, zero-shot approach that leverages large multimodal models to (i) infer causal and temporal consequences implied by the edit, and (ii) align the resulting reasoned queries to candidate videos without task-specific finetuning. To evaluate reasoning in CoVR, we also propose CoVR-Reason, a benchmark that pairs each (reference, edit, target) triplet with structured internal reasoning traces and challenging distractors that require predicting after-effects rather than keyword matching. Experiments show that our zero-shot method outperforms strong retrieval baselines on recall at K and particularly excels on implicit-effect subsets. Our automatic and human analysis confirm higher step consistency and effect factuality in our retrieved results. Our findings show that incorporating reasoning into general-purpose multimodal models enables effective CoVR by explicitly accounting for causal and temporal after-effects. This reduces dependence on task-specific supervision, improves generalization to challenging implicit-effect cases, and enhances interpretability of retrieval outcomes. These results point toward a scalable and principled framework for explainable video search. The model, code, and benchmark are available at https://github.com/mbzuai-oryx/CoVR-R.", "link": "http://arxiv.org/abs/2603.20190v1", "date": "2026-03-20", "relevancy": 2.1537, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5452}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5371}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5371}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoVR-R%3AReason-Aware%20Composed%20Video%20Retrieval&body=Title%3A%20CoVR-R%3AReason-Aware%20Composed%20Video%20Retrieval%0AAuthor%3A%20Omkar%20Thawakar%20and%20Dmitry%20Demidov%20and%20Vaishnav%20Potlapalli%20and%20Sai%20Prasanna%20Teja%20Reddy%20Bogireddy%20and%20Viswanatha%20Reddy%20Gajjala%20and%20Alaa%20Mostafa%20Lasheen%20and%20Rao%20Muhammad%20Anwer%20and%20Fahad%20Khan%0AAbstract%3A%20Composed%20Video%20Retrieval%20%28CoVR%29%20aims%20to%20find%20a%20target%20video%20given%20a%20reference%20video%20and%20a%20textual%20modification.%20Prior%20work%20assumes%20the%20modification%20text%20fully%20specifies%20the%20visual%20changes%2C%20overlooking%20after-effects%20and%20implicit%20consequences%20%28e.g.%2C%20motion%2C%20state%20transitions%2C%20viewpoint%20or%20duration%20cues%29%20that%20emerge%20from%20the%20edit.%20We%20argue%20that%20successful%20CoVR%20requires%20reasoning%20about%20these%20after-effects.%20We%20introduce%20a%20reasoning-first%2C%20zero-shot%20approach%20that%20leverages%20large%20multimodal%20models%20to%20%28i%29%20infer%20causal%20and%20temporal%20consequences%20implied%20by%20the%20edit%2C%20and%20%28ii%29%20align%20the%20resulting%20reasoned%20queries%20to%20candidate%20videos%20without%20task-specific%20finetuning.%20To%20evaluate%20reasoning%20in%20CoVR%2C%20we%20also%20propose%20CoVR-Reason%2C%20a%20benchmark%20that%20pairs%20each%20%28reference%2C%20edit%2C%20target%29%20triplet%20with%20structured%20internal%20reasoning%20traces%20and%20challenging%20distractors%20that%20require%20predicting%20after-effects%20rather%20than%20keyword%20matching.%20Experiments%20show%20that%20our%20zero-shot%20method%20outperforms%20strong%20retrieval%20baselines%20on%20recall%20at%20K%20and%20particularly%20excels%20on%20implicit-effect%20subsets.%20Our%20automatic%20and%20human%20analysis%20confirm%20higher%20step%20consistency%20and%20effect%20factuality%20in%20our%20retrieved%20results.%20Our%20findings%20show%20that%20incorporating%20reasoning%20into%20general-purpose%20multimodal%20models%20enables%20effective%20CoVR%20by%20explicitly%20accounting%20for%20causal%20and%20temporal%20after-effects.%20This%20reduces%20dependence%20on%20task-specific%20supervision%2C%20improves%20generalization%20to%20challenging%20implicit-effect%20cases%2C%20and%20enhances%20interpretability%20of%20retrieval%20outcomes.%20These%20results%20point%20toward%20a%20scalable%20and%20principled%20framework%20for%20explainable%20video%20search.%20The%20model%2C%20code%2C%20and%20benchmark%20are%20available%20at%20https%3A//github.com/mbzuai-oryx/CoVR-R.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20190v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoVR-R%253AReason-Aware%2520Composed%2520Video%2520Retrieval%26entry.906535625%3DOmkar%2520Thawakar%2520and%2520Dmitry%2520Demidov%2520and%2520Vaishnav%2520Potlapalli%2520and%2520Sai%2520Prasanna%2520Teja%2520Reddy%2520Bogireddy%2520and%2520Viswanatha%2520Reddy%2520Gajjala%2520and%2520Alaa%2520Mostafa%2520Lasheen%2520and%2520Rao%2520Muhammad%2520Anwer%2520and%2520Fahad%2520Khan%26entry.1292438233%3DComposed%2520Video%2520Retrieval%2520%2528CoVR%2529%2520aims%2520to%2520find%2520a%2520target%2520video%2520given%2520a%2520reference%2520video%2520and%2520a%2520textual%2520modi {"title": "From Masks to Pixels and Meaning: A New Taxonomy, Benchmark, and Metrics for VLM Image Tampering", "author": "Xinyi Shang and Yi Tang and Jiacheng Cui and Ahmed Elhagry and Salwa K. Al Khatib and Sondos Mahmoud Bsharat and Jiacheng Liu and Xiaohan Zhao and Jing-Hao Xue and Hao Li and Salman Khan and Zhiqiang Shen", "abstract": "Existing tampering detection benchmarks largely rely on object masks, which severely misalign with the true edit signal: many pixels inside a mask are untouched or only trivially modified, while subtle yet consequential edits outside the mask are treated as natural. We reformulate VLM image tampering from coarse region labels to a pixel-grounded, meaning and language-aware task. First, we introduce a taxonomy spanning edit primitives (replace/remove/splice/inpaint/attribute/colorization, etc.) and their semantic class of tampered object, linking low-level changes to high-level understanding. Second, we release a new benchmark with per-pixel tamper maps and paired category supervision to evaluate detection and classification within a unified protocol. Third, we propose a training framework and evaluation metrics that quantify pixel-level correctness with localization to assess confidence or prediction on true edit intensity, and further measure tamper meaning understanding via semantics-aware classification and natural language descriptions for the predicted regions. We also re-evaluate the existing strong segmentation/localization baselines on recent strong tamper detectors and reveal substantial over- and under-scoring using mask-only metrics, and expose failure modes on micro-edits and off-mask changes. Our framework advances the field from masks to pixels, meanings and language descriptions, establishing a rigorous standard for tamper localization, semantic classification and description. Code and benchmark data are available at https://github.com/VILA-Lab/PIXAR.", "link": "http://arxiv.org/abs/2603.20193v1", "date": "2026-03-20", "relevancy": 2.1454, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5561}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5257}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5208}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Masks%20to%20Pixels%20and%20Meaning%3A%20A%20New%20Taxonomy%2C%20Benchmark%2C%20and%20Metrics%20for%20VLM%20Image%20Tampering&body=Title%3A%20From%20Masks%20to%20Pixels%20and%20Meaning%3A%20A%20New%20Taxonomy%2C%20Benchmark%2C%20and%20Metrics%20for%20VLM%20Image%20Tampering%0AAuthor%3A%20Xinyi%20Shang%20and%20Yi%20Tang%20and%20Jiacheng%20Cui%20and%20Ahmed%20Elhagry%20and%20Salwa%20K.%20Al%20Khatib%20and%20Sondos%20Mahmoud%20Bsharat%20and%20Jiacheng%20Liu%20and%20Xiaohan%20Zhao%20and%20Jing-Hao%20Xue%20and%20Hao%20Li%20and%20Salman%20Khan%20and%20Zhiqiang%20Shen%0AAbstract%3A%20Existing%20tampering%20detection%20benchmarks%20largely%20rely%20on%20object%20masks%2C%20which%20severely%20misalign%20with%20the%20true%20edit%20signal%3A%20many%20pixels%20inside%20a%20mask%20are%20untouched%20or%20only%20trivially%20modified%2C%20while%20subtle%20yet%20consequential%20edits%20outside%20the%20mask%20are%20treated%20as%20natural.%20We%20reformulate%20VLM%20image%20tampering%20from%20coarse%20region%20labels%20to%20a%20pixel-grounded%2C%20meaning%20and%20language-aware%20task.%20First%2C%20we%20introduce%20a%20taxonomy%20spanning%20edit%20primitives%20%28replace/remove/splice/inpaint/attribute/colorization%2C%20etc.%29%20and%20their%20semantic%20class%20of%20tampered%20object%2C%20linking%20low-level%20changes%20to%20high-level%20understanding.%20Second%2C%20we%20release%20a%20new%20benchmark%20with%20per-pixel%20tamper%20maps%20and%20paired%20category%20supervision%20to%20evaluate%20detection%20and%20classification%20within%20a%20unified%20protocol.%20Third%2C%20we%20propose%20a%20training%20framework%20and%20evaluation%20metrics%20that%20quantify%20pixel-level%20correctness%20with%20localization%20to%20assess%20confidence%20or%20prediction%20on%20true%20edit%20intensity%2C%20and%20further%20measure%20tamper%20meaning%20understanding%20via%20semantics-aware%20classification%20and%20natural%20language%20descriptions%20for%20the%20predicted%20regions.%20We%20also%20re-evaluate%20the%20existing%20strong%20segmentation/localization%20baselines%20on%20recent%20strong%20tamper%20detectors%20and%20reveal%20substantial%20over-%20and%20under-scoring%20using%20mask-only%20metrics%2C%20and%20expose%20failure%20modes%20on%20micro-edits%20and%20off-mask%20changes.%20Our%20framework%20advances%20the%20field%20from%20masks%20to%20pixels%2C%20meanings%20and%20language%20descriptions%2C%20establishing%20a%20rigorous%20standard%20for%20tamper%20localization%2C%20semantic%20classification%20and%20description.%20Code%20and%20benchmark%20data%20are%20available%20at%20https%3A//github.com/VILA-Lab/PIXAR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20193v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Masks%2520to%2520Pixels%2520and%2520Meaning%253A%2520A%2520New%2520Taxonomy%252C%2520Benchmark%252C%2520and%2520Metrics%2520for%2520VLM%2520Image%2520Tampering%26entry.906535625%3DXinyi%2520Shang%2520and%2520Yi%2520Tang%2520and%2520Jiacheng%2520Cui%2520and%2520Ahmed%2520Elhagry%2520and%2520Salwa%2520K.%2520Al%2520Khatib%2520and%2520Sondos%2520Mahmoud%2520Bsharat%2520and%2520Jiacheng%2520Liu%2520and%2520Xiaohan%2520Zhao%2520and%2520Jing-Hao%2520Xue%2520and%2520Hao%2520Li%2520and%2520Salman%2520Khan%2520and%2520Zhiqiang%2520Shen%26entry.1292438233%3DExisting%2520tampering%2520detection%2520benchmarks%2520largely%2520rely%2520on%2520obje work%2520advances%2520the%2520field%2520from%2520masks%2520to%2520pixels%252C%2520meanings%2520and%2520language%2520descriptions%252C%2520establishing%2520a%2520rigorous%2520standard%2520for%2520tamper%2520localization%252C%2520semantic%2520classification%2520and%2520description.%2520Code%2520and%2520benchmark%2520data%2520are%2520available%2520at%2520https%253A//github.com/VILA-Lab/PIXAR.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20193v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Masks%20to%20Pixels%20and%20Meaning%3A%20A%20New%20Taxonomy%2C%20Benchmark%2C%20and%20Metrics%20for%20VLM%20Image%20Tampering&entry.906535625=Xinyi%20Shang%20and%20Yi%20Tang%20and%20Jiacheng%20Cui%20and%20Ahmed%20Elhagry%20and%20Salwa%20K.%20Al%20Khatib%20and%20Sondos%20Mahmoud%20Bsharat%20and%20Jiacheng%20Liu%20and%20Xiaohan%20Zhao%20and%20Jing-Hao%20Xue%20and%20Hao%20Li%20and%20Salman%20Khan%20and%20Zhiqiang%20Shen&entry.1292438233=Existing%20tampering%20detection%20benchmarks%20largely%20rely%20on%20object%20masks%2C%20which%20severely%20misalign%20with%20the%20true%20edit%20signal%3A%20many%20pixels%20inside%20a%20mask%20are%20untouched%20or%20only%20trivially%20modified%2C%20while%20subtle%20yet%20consequential%20edits%20outside%20the%20mask%20are%20treated%20as%20natural.%20We%20reformulate%20VLM%20image%20tampering%20from%20coarse%20region%20labels%20to%20a%20pixel-grounded%2C%20meaning%20and%20language-aware%20task.%20First%2C%20we%20introduce%20a%20taxonomy%20spanning%20edit%20primitives%20%28replace/remove/splice/inpaint/attribute/colorization%2C%20etc.%29%20and%20their%20semantic%20class%20of%20tampered%20object%2C%20linking%20low-level%20changes%20to%20high-level%20understanding.%20Second%2C%20we%20release%20a%20new%20benchmark%20with%20per-pixel%20tamper%20maps%20and%20paired%20category%20supervision%20to%20evaluate%20detection%20and%20classification%20 {"title": "Var-JEPA: A Variational Formulation of the Joint-Embedding Predictive Architecture -- Bridging Predictive and Generative Self-Supervised Learning", "author": "Moritz G\u00f6gl and Christopher Yau", "abstract": "The Joint-Embedding Predictive Architecture (JEPA) is often seen as a non-generative alternative to likelihood-based self-supervised learning, emphasizing prediction in representation space rather than reconstruction in observation space. We argue that the resulting separation from probabilistic generative modeling is largely rhetorical rather than structural: the canonical JEPA design, coupled encoders with a context-to-target predictor, mirrors the variational posteriors and learned conditional priors obtained when variational inference is applied to a particular class of coupled latent-variable models, and standard JEPA can be viewed as a deterministic specialization in which regularization is imposed via architectural and training heuristics rather than an explicit likelihood. Building on this view, we derive the Variational JEPA (Var-JEPA), which makes the latent generative structure explicit by optimizing a single Evidence Lower Bound (ELBO). This yields meaningful representations without ad-hoc anti-collapse regularizers and allows principled uncertainty quantification in the latent space. We instantiate the framework for tabular data (Var-T-JEPA) and achieve strong representation learning and downstream performance, consistently improving over T-JEPA while remaining competitive with strong raw-feature baselines.", "link": "http://arxiv.org/abs/2603.20111v1", "date": "2026-03-20", "relevancy": 2.1233, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5359}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5275}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5264}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Var-JEPA%3A%20A%20Variational%20Formulation%20of%20the%20Joint-Embedding%20Predictive%20Architecture%20--%20Bridging%20Predictive%20and%20Generative%20Self-Supervised%20Learning&body=Title%3A%20Var-JEPA%3A%20A%20Variational%20Formulation%20of%20the%20Joint-Embedding%20Predictive%20Architecture%20--%20Bridging%20Predictive%20and%20Generative%20Self-Supervised%20Learning%0AAuthor%3A%20Moritz%20G%C3%B6gl%20and%20Christopher%20Yau%0AAbstract%3A%20The%20Joint-Embedding%20Predictive%20Architecture%20%28JEPA%29%20is%20often%20seen%20as%20a%20non-generative%20alternative%20to%20likelihood-based%20self-supervised%20learning%2C%20emphasizing%20prediction%20in%20representation%20space%20rather%20than%20reconstruction%20in%20observation%20space.%20We%20argue%20that%20the%20resulting%20separation%20from%20probabilistic%20generative%20modeling%20is%20largely%20rhetorical%20rather%20than%20structural%3A%20the%20canonical%20JEPA%20design%2C%20coupled%20encoders%20with%20a%20context-to-target%20predictor%2C%20mirrors%20the%20variational%20posteriors%20and%20learned%20conditional%20priors%20obtained%20when%20variational%20inference%20is%20applied%20to%20a%20particular%20class%20of%20coupled%20latent-variable%20models%2C%20and%20standard%20JEPA%20can%20be%20viewed%20as%20a%20deterministic%20specialization%20in%20which%20regularization%20is%20imposed%20via%20architectural%20and%20training%20heuristics%20rather%20than%20an%20explicit%20likelihood.%20Building%20on%20this%20view%2C%20we%20derive%20the%20Variational%20JEPA%20%28Var-JEPA%29%2C%20which%20makes%20the%20latent%20generative%20structure%20explicit%20by%20optimizing%20a%20single%20Evidence%20Lower%20Bound%20%28ELBO%29.%20This%20yields%20meaningful%20representations%20without%20ad-hoc%20anti-collapse%20regularizers%20and%20allows%20principled%20uncertainty%20quantification%20in%20the%20latent%20space.%20We%20instantiate%20the%20framework%20for%20tabular%20data%20%28Var-T-JEPA%29%20and%20achieve%20strong%20representation%20learning%20and%20downstream%20performance%2C%20consistently%20improving%20over%20T-JEPA%20while%20remaining%20competitive%20with%20strong%20raw-feature%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20111v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVar-JEPA%253A%2520A%2520Variational%2520Formulation%2520of%2520the%2520Joint-Embedding%2520Predictive%2520Architecture%2520--%2520Bridging%2520Predictive%2520and%2520Generative%2520Self-Supervised%2520Learning%26entry.906535625%3DMoritz%2520G%25C3%25B6gl%2520and%2520Christopher%2520Yau%26entry.1292438233%3DThe%2520Joint-Embedding%2520Predictive%2520Architecture%2520%2528JEPA%2529%2520is%2520often%2520seen%2520as%2520a%2520non-generative%2520alternative%2520to%2520likelihood-based%2520self-supervised%2520learning%252C%2520emphasizing%2520prediction%2520in%2520representation%2520space%2520rather%2520than%2520reconstruction%2520in%2520observation%2520space.%2520We%2520argue%2520that%2520the%2520resulting%2520separation%2520from%2520probabilistic%2520generative%2520modeling%2520is%2520largely%2520rhetorical%2520rather%2520than%2520structural%253A%2520the%2520canonical%2520JEPA%2520design%252C%2520coupled%2520encoders%2520with%2520a%2520context-to-target%2520predictor%252C%2520mirrors%2520the%2520variational%2520posteriors%2520and%2520learned%2520conditional%2520priors%2520obtained%2520when%2520variational%2520inference%2520is%2520applied%2520to%2520a%2520particular%2520class%2520of%2520coupled%2520latent-variable%2520models%252C%2520and%2520standard%2520JEPA%2520can%2520be%2520viewed%2520as%2520a%2520deterministic%2520specialization%2520in%2520which%2520regularization%2520is%2520imposed%2520via%2 {"title": "Multi-Agent Motion Planning on Industrial Magnetic Levitation Platforms: A Hybrid ADMM-HOCBF approach", "author": "Bavo Tistaert and Stan Servaes and Alejandro Gonzalez-Garcia and Ibrahim Ibrahim and Louis Callens and Jan Swevers and Wilm Decr\u00e9", "abstract": "This paper presents a novel hybrid motion planning method for holonomic multi-agent systems. The proposed decentralised model predictive control (MPC) framework tackles the intractability of classical centralised MPC for a growing number of agents while providing safety guarantees. This is achieved by combining a decentralised version of the alternating direction method of multipliers (ADMM) with a centralised high-order control barrier function (HOCBF) architecture. Simulation results show significant improvement in scalability over classical centralised MPC. We validate the efficacy and real-time capability of the proposed method by developing a highly efficient C++ implementation and deploying the resulting trajectories on a real industrial magnetic levitation platform.", "link": "http://arxiv.org/abs/2603.19838v1", "date": "2026-03-20", "relevancy": 2.1183, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5722}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5305}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5116}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Agent%20Motion%20Planning%20on%20Industrial%20Magnetic%20Levitation%20Platforms%3A%20A%20Hybrid%20ADMM-HOCBF%20approach&body=Title%3A%20Multi-Agent%20Motion%20Planning%20on%20Industrial%20Magnetic%20Levitation%20Platforms%3A%20A%20Hybrid%20ADMM-HOCBF%20 {"title": "TeleDex: Accessible Dexterous Teleoperation", "author": "Omar Rayyan and Maximilian Gilles and Yuchen Cui", "abstract": "Despite increasing dataset scale and model capacity, robot manipulation policies still struggle to generalize beyond their training distributions. As a result, deploying state-of-the-art policies in new environments, tasks, or robot embodiments often requires collecting additional demonstrations. Enabling this in real-world deployment settings requires tools that allow users to collect demonstrations quickly, affordably, and with minimal setup. We present TeleDex, an open-source system for intuitive teleoperation of dexterous hands and robotic manipulators using any readily available phone. The system streams low-latency 6-DoF wrist poses and articulated 21-DoF hand state estimates from the phone, which are retargeted to robot arms and multi-fingered hands without requiring external tracking infrastructure. TeleDex supports both a handheld phone-only mode and an optional 3D-printable hand-mounted interface for finger-level teleoperation. By lowering the hardware and setup barriers to dexterous teleoperation, TeleDex enables users to quickly collect demonstrations during deployment to support policy fine-tuning. We evaluate the system across simulation and real-world manipulation tasks, demonstrating its effectiveness as a unified scalable interface for robot teleoperation. All software and hardware designs, along with demonstration videos, are open-source and available at orayyan.com/teledex.", "link": "http://arxiv.org/abs/2603.17065v2", "date": "2026-03-20", "relevancy": 2.1124, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5409}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5255}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5163}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TeleDex%3A%20Accessible%20Dexterous%20Teleoperation&body=Title%3A%20TeleDex%3A%20Accessible%20Dexterous%20Teleoperation%0AAuthor%3A%20Omar%20Rayyan%20and%20Maximilian%20Gilles%20and%20Yuchen%20Cui%0AAbstract%3A%20Despite%20increasing%20dataset%20scale%20and%20model%20capacity%2C%20robot%20manipulation%20policies%20still%20struggle%20to%20generalize%20beyond%20their%20training%20distributions.%20As%20a%20result%2C%20deploying%20state-of-the-art%20policies%20in%20new%20environments%2C%20tasks%2C%20or%20robot%20embodiments%20often%20requires%20collecting%20additional%20demonstrations.%20Enabling%20this%20in%20real-world%20deployment%20settings%20requires%20tools%20that%20allow%20users%20to%20collect%20demonstrations%20quickly%2C%20affordably%2C%20and%20with%20minimal%20setup.%20We%20present%20TeleDex%2C%20an%20open-source%20system%20for%20intuitive%20teleoperation%20of%20dexterous%20hands%20and%20robotic%20manipulators%20using%20any%20readily%20available%20phone.%20The%20system%20streams%20low-latency%206-DoF%20wrist%20poses%20and%20articulated%2021-DoF%20hand%20state%20estimates%20from%20the%20phone%2C%20which%20are%20retargeted%20to%20robot%20arms%20and%20multi-fingered%20hands%20without%20requiring%20external%20tracking%20infrastructure.%20TeleDex%20supports%20both%20a%20handheld%20phone-only%20mode%20and%20an%20optional%203D-printable%20hand-mounted%20interface%20for%20finger-level%20teleoperation.%20By%20lowering%20the%20hardware%20and%20setup%20barriers%20to%20dexterous%20teleoperation%2C%20TeleDex%20enables%20users%20to%20quickly%20collect%20demonstrations%20during%20deployment%20to%20support%20policy%20fine-tuning.%20We%20evaluate%20the%20system%20across%20simulation%20and%20real-world%20manipulation%20tasks%2C%20demonstrating%20its%20effectiveness%20as%20a%20unified%20scalable%20interface%20for%20robot%20teleoperation.%20All%20software%20and%20hardware%20designs%2C%20along%20with%20demonstration%20videos%2C%20are%20open-source%20and%20available%20at%20orayyan.com/teledex.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17065v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTeleDex%253A%2520Accessible%2520Dexterous%2520Teleoperation%26entry.906535625%3DOmar%2520Rayyan%2520and%2520Maximilian%2520Gilles%2520and%2520Yuchen%2520Cui%26entry.1292438233%3DDespite%2520increasing%2520dataset%2520scale%2520and%2520model%2520capacity%252C%2520robot%2520manipulation%2520policies%2520still%2520struggle%2520to%2520generalize%2520beyond%2520their%2520training%2520distributions.%2520As%2520a%2520result%252C%2520deploying%2520state-of-the-art%2520policies%2520in%2520new%2520environments%252C%2520tasks%252C%2520or%2520robot%2520embodiments%2520often%2520requires%2520collecting%2520additional%2520demonstrations.%2520Enabling%2520this%2520in%2520real-world%2520deployment%2520settings%2520requires%2520tools%2520that%2520allow%2520users%2520to%2520collect%2520demonstrations%2520quickly%252C%2520affordably%252C%2520and%2520with%2520minimal%2520setup.%2520We%2520present%2520TeleDex%252C%2520an%2520open-source%2520system%2520for%2520intuitive%2520teleoperation%2520of%2520dexterous%2520hands%2520and%2520robotic%2520manipulators%2520using%2520any%2520readily%2520available%2520phone.%2520The%2520system%2520streams%2520low-latency%25206-DoF%2520wrist%2520poses%2520and%2520articulated%252021-DoF%2520hand%2520state%2520estimates%2520from%2520the%2520phone%252C%2520which%2520are%2520retargeted%2520to%2520robot%2520arms%2520and%2520multi-fingered%2520hands%2520without%2520requiring%2520external%2520tracking%2520infrastructure.%2520TeleDex%2520supports%2520both%2520a%2520handheld%2520phone-only%2520mode%2520and%2520an%2520optional%25203D-printable%2520hand-mounted%2520interface%2520for%2520finger-level%2520teleoperation.%2520By%2520lowering%2520the%2520hardware%2520and%2520setup%2520barriers%2520to%2520dexterous%2520teleoperation%252C%2520TeleDex%2520enables%2520users%2520to%2520quickly%2520collect%2520demonstrations%2520during%2520deployment%2520to%2520support%2520policy%2520fine-tuning.%2520We%2520evaluate%2520the%2520system%2520across%2520simulation%2520and%2520real-world%2520manipulation%2520tasks%252C%2520demonstrating%2520its%2520effectiveness%2520as%2520a%2520unified%2520scalable%2520interface%2520for%2520robot%2520teleoperation.%2520All%2520software%2520and%2520hardware%2520designs%252C%2520along%2520with%2520demonstration%2520videos%252C%2520are%2520open-source%2520and%2520available%2520at%2520orayyan.com/teledex.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17065v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TeleDex%3A%20Accessible%20Dexterous%20Teleoperation&entry.906535625=Omar%20Rayyan%20and%20Maximilian%20Gilles%20and%20Yuchen%20Cui&entry.1292438233=Despite%20increasing%20dataset%20scale%20and%20model%20capacity%2C%20robot%20manipulation%20policies%20still%20struggle%20to%20generalize%20beyond%20their%20training%20distributions.%20As%20a%20result%2C%20deploying%20state-of-the-art%20policies%20in%20new%20environments%2C%20tasks%2C%20or%20robot%20embodiments%20often%20requires%20collecting%20additional%20demonstrations.%20Enabling%20this%20in%20real-world%20deployment%20settings%20requires%20tools%20that%20allow%20users%20to%20collect%20demonstrations%20quickly%2C%20affordably%2C%20and%20with%20minimal%20setup.%20We%20present%20TeleDex%2C%20an%20open-source%20system%20for%20intuitive%20teleoperation%20of%20dexterous%20hands%20and%20robotic%20manipulators%20using%20any%20readily%20available%20phone.%20The%20system%20streams%20low-latency%206-DoF%20wrist%20poses%20and%20articulated%2021-DoF%20hand%20state%20estimates%20from%20the%20 {"title": "SIMPLER: Efficient Foundation Model Adaptation via Similarity-Guided Layer Pruning for Earth Observation", "author": "V\u00edctor Barreiro and Johannes Jakubik and Francisco Arg\u00fcello and Dora B. Heras", "abstract": "Fine-tuning foundation models for Earth Observation is computationally expensive, with high training time and memory demands for both training and deployment. Parameter-efficient methods reduce training cost but retain full inference complexity, while post-hoc compression optimizes inference only after costly full fine-tuning. We introduce SIMPLER, a pre-fine-tuning architecture selection method that reduces inference and deployment costs by identifying an effective model depth before adaptation. SIMPLER exploits stabilization of representations in deeper layers of pre-trained vision transformers: it computes layer-wise representation similarity on unlabeled task data and applies an automated scoring function to select redundant layers, with no gradients, magnitude heuristics, or hyperparameter tuning required. On Prithvi-EO-2, SIMPLER prunes up to 79% of parameters while retaining 94% of baseline performance, yielding a 2.1x training speedup and 2.6x inference speedup. The method generalizes to TerraMind (a multimodal EO foundation model) and ImageNet-pretrained ViT-MAE, demonstrating applicability across tasks, architectures, and spectral modalities. Code is available at https://gitlab.citius.gal/hpc4rs/simpler.", "link": "http://arxiv.org/abs/2603.19873v1", "date": "2026-03-20", "relevancy": 2.1029, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5323}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5253}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5193}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SIMPLER%3A%20Efficient%20Foundation%20Model%20Adaptation%20via%20Similarity-Guided%20Layer%20Pruning%20for%20Earth%20Observation&body=Title%3A%20SIMPLER%3A%20Efficient%20Foundation%20Model%20Adaptation%20via%20Similarity-Guided%20Layer%20Pruning%20for%20Earth%20Observation%0AAuthor%3A%20V%C3%ADctor%20Barreiro%20and%20Johannes%20Jakubik%20and%20Francisco%20Arg%C3%BCello%20and%20Dora%20B.%20Heras%0AAbstract%3A%20Fine-tuning%20foundation%20models%20for%20Earth%20Observation%20is%20computationally%20expensive%2C%20with%20high%20training%20time%20and%20memory%20demands%20for%20both%20training%20and%20deployment.%20Parameter-efficient%20methods%20reduce%20training%20cost%20but%20retain%20full%20inference%20complexity%2C%20while%20post-hoc%20compression%20optimizes%20inference%20only%20after%20costly%20full%20fine-tuning.%20We%20introduce%20SIMPLER%2C%20a%20pre-fine-tuning%20architecture%20selection%20method%20that%20reduces%20inference%20and%20deployment%20costs%20by%20identifying%20an%20effective%20model%20depth%20before%20adaptation.%20SIMPLER%20exploits%20stabilization%20of%20representations%20in%20deeper%20layers%20of%20pre-trained%20vision%20transformers%3A%20it%20computes%20layer-wise%20representation%20similarity%20on%20unlabeled%20task%20data%20and%20applies%20an%20automated%20scoring%20function%20to%20select%20redundant%20layers%2C%20with%20no%20gradients%2C%20magnitude%20heuristics%2C%20or%20hyperparameter%20tuning%20required.%20On%20Prithvi-EO-2%2C%20SIMPLER%20prunes%20up%20to%2079%25%20of%20parameters%20while%20retaining%2094%25%20of%20baseline%20performance%2C%20yielding%20a%202.1x%20training%20speedup%20and%202.6x%20inference%20speedup.%20The%20method%20generalizes%20to%20TerraMind%20%28a%20multimodal%20EO%20foundation%20model%29%20and%20ImageNet-pretrained%20ViT-MAE%2C%20demonstrating%20applicability%20across%20tasks%2C%20architectures%2C%20and%20spectral%20modalities.%20Code%20is%20available%20at%20https%3A//gitlab.citius.gal/hpc4rs/simpler.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19873v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIMPLER%253A%2520Efficient%2520Foundation%2520Model%2520Adaptation%2520via%2520Similarity-Guided%2520Layer%2520Pruning%2520for%2520Earth%2520Observation%26entry.906535625%3DV%25C3%25ADctor%2520Barreiro%2520and%2520Johannes%2520Jakubik%2520and%2520Francisco%2520Arg%25C3%25BCello%2520and%2520Dora%2520B.%2520Heras%26entry.1292438233%3DFine-tuning%2520foundation%2520models%2520for%2520Earth%2520Observation%2520is%2520computationally%2520expensive%252C%2520with%2520high%2520training%2520time%2520and%2520memory%2520demands%2520for%2520both%2520training%2520and%2520deployment.%2520Parameter-efficient%2520methods%2520reduce%2520training%2520cost%2520but%2520retain%2520full%2520inference%2520complexity%252C%2520while%2520post-hoc%2520compression%2520optimizes%2520inference%2520only%2520after%2520costly%2520full%2520fine-tuning.%2520We%2520introduce%2520SIMPLER%252C%2520a%2520pre-fine-tuning%2520architecture%2520selection%2520method%2520that%2520reduces%2520inference%2520and%2520deployment%2520costs%2520by%2520identifying%2520an%2520effective%2520model%2520depth%2520before%2520adaptation.%2520SIMPLER%2520exploits%2520stabilization%2520of%2520representations%2520in%2520deeper%2520layers%2520of%2520pre-trained%2520vision%2520transformers%253A%2520it%2520computes%2520layer-wise%2520representation%2520similarity%2520on%2520unlabeled%2520task%2520data%2520and%2520applies%2520an%2520automated%2520scoring%2520function%2520to%2520select%2520redundant%2520layers%252C%2520with%2520no%2520gradients%252C%2520magnitude%2520heuristics%252C%2520or%2520hyperparameter%2520tuning%2520required.%2520On%2520Prithvi-EO-2%252C%2520SIMPLER%2520prunes%2520up%2520to%252079%2525%2520of%2520parameters%2520while%2520retaining%252094%2525%2520of%2520baseline%2520performance%252C%2520yielding%2520a%25202.1x%2520training%2520speedup%2520and%25202.6x%2520inference%2520speedup.%2520The%2520method%2520generalizes%2520to%2520TerraMind%2520%2528a%2520multimodal%2520EO%2520foundation%2520model%2529%2520and%2520ImageNet-pretrained%2520ViT-MAE%252C%2520demonstrating%2520applicability%2520across%2520tasks%252C%2520architectures%252C%2520and%2520spectral%2520modalities.%2520Code%2520is%2520available%2520at%2520https%253A//gitlab.citius.gal/hpc4rs/simpler.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19873v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SIMPLER%3A%20Efficient%20Foundation%20Model%20Adaptation%20via%20Similarity-Guided%20Layer%20Pruning%20for%20Earth%20Observation&entry.906535625=V%C3%ADctor%20Barreiro%20and%20Johannes%20Jakubik%20and%20Francisco%20Arg%C3%BCello%20and%20Dora%20B.%20Heras&entry.1292438233=Fine-tuning%20foundation%20models%20for%20Earth%20Observation%20is%20computationally%20expensive%2C%20with%20high%20training%20time%20and%20memory%20demands%20for%20both%20training%20and%20deployment.%20Parameter-efficient%20methods%20reduce%20training%20cost%20but%20retain%20full%20inference%20complexity%2C%20while%20post-hoc%20compression%20optimizes%20inference%20only%20after%20costly%20full%20fine-tuning.%20We%20introduce%20SIMPLER%2C%20a%20pre-fine-tuning%20architecture%20selection%20method%20that%20reduces%20inference%20and%20deployment%20costs%20by%20identifying%20an%20effective%20model%20depth%20before%20adaptation.%20SIMPLER%20exploits%20stabilization%20of%20representations%20in%20deeper%20layers%20of%20pre-trained%20vision%20transformers%3A%20it%20computes%20layer-wise%20representation%20similarity%20on%20unlabeled%20task%20data%20and%20applies%20an%20automated%20scoring%20function%20to%20select%20redundant%20layers%2C%20with%20no%20gradients%2C%20magnitude%20heuristics%2C%20or%20hyp {"title": "Preference-Guided Debiasing for No-Reference Enhancement Image Quality Assessment", "author": "Shiqi Gao and Kang Fu and Zitong Xu and Huiyu Duan and Xiongkuo Min and Jia Wang and Guangtao Zhai", "abstract": "Current no-reference image quality assessment (NR-IQA) models for enhanced images often struggle to generalize, as they tend to overfit to the distinct patterns of specific enhancement algorithms rather than evaluating genuine perceptual quality. To address this issue, we propose a preference-guided debiasing framework for no-reference enhancement image quality assessment (EIQA). Specifically, we first learn a continuous enhancement-preference embedding space using supervised contrastive learning, where images generated by similar enhancement styles are encouraged to have closer representations. Based on this, we further estimate the enhancement-induced nuisance component contained in the raw quality representation and remove it before quality regression. In this way, the model is guided to focus on algorithm-invariant perceptual quality cues instead of enhancement-specific visual fingerprints. To facilitate stable optimization, we adopt a two-stage training strategy that first learns the enhancement-preference space and then performs debiased quality prediction. Extensive experiments on public EIQA benchmarks demonstrate that the proposed method effectively mitigates algorithm-induced representation bias and achieves superior robustness and cross-algorithm generalization compared with existing approaches.", "link": "http://arxiv.org/abs/2603.20086v1", "date": "2026-03-20", "relevancy": 2.096, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5273}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5229}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5183}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Preference-Guided%20Debiasing%20for%20No-Reference%20Enhancement%20Image%20Quality%20Assessment&body=Title%3A%20Preference-Guided%20Debiasing%20for%20No-Reference%20Enhancement%20Image%20Quality%20Assessment%0AAuthor%3A%20Shiqi%20Gao%20and%20Kang%20Fu%20and%20Zitong%20Xu%20and%20Huiyu%20Duan%20and%20Xiongkuo%20Min%20and%20Jia%20Wang%20and%20Guangtao%20Zhai%0AAbstract%3A%20Current%20no-reference%20image%20quality%20assessment%20%28NR-IQA%29%20models%20for%20enhanced%20images%20often%20struggle%20to%20generalize%2C%20as%20they%20tend%20to%20overfit%20to%20the%20distinct%20patterns%20of%20specific%20enhancement%20algorithms%20rather%20than%20evaluating%20genuine%20perceptual%20quality.%20To%20address%20this%20issue%2C%20we%20propose%20a%20preference-guided%20debiasing%20framework%20for%20no-reference%20enhancement%20image%20quality%20assessment%20%28EIQA%29.%20Specifically%2C%20we%20first%20learn%20a%20continuous%20enhancement-preference%20embedding%20space%20using%20supervised%20contrastive%20learning%2C%20where%20images%20generated%20by%20similar%20enhancement%20styles%20are%20encouraged%20to%20have%20closer%20representations.%20Based%20on%20this%2C%20we%20further%20estimate%20the%20enhancement-induced%20nuisance%20component%20contained%20in%20the%20raw%20quality%20representation%20and%20remove%20it%20before%20quality%20regression.%20In%20this%20way%2C%20the%20model%20is%20guided%20to%20focus%20on%20algorithm-invariant%20perceptual%20quality%20cues%20instead%20of%20enhancement-specific%20visual%20fingerprints.%20To%20facilitate%20stable%20optimization%2C%20we%20adopt%20a%20two-stage%20training%20strategy%20that%20first%20learns%20the%20enhancement-preference%20space%20and%20then%20performs%20debiased%20quality%20prediction.%20Extensive%20experiments%20on%20public%20EIQA%20benchmarks%20demonstrate%20that%20the%20proposed%20method%20effectively%20mitigates%20algorithm-induced%20representation%20bias%20and%20achieves%20superior%20robustness%20and%20cross-algorithm%20generalization%20compared%20with%20existing%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20086v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPreference-Guided%2520Debiasing%2520for%2520No-Reference%2520Enhancement%2520Image%2520Quality%2520Assessment%26entry.906535625%3DShiqi%2520Gao%2520and%2520Kang%2520Fu%2520and%2520Zitong%2520Xu%2520and%2520Huiyu%2520Duan%2520and%2520Xiongkuo%2520Min%2520and%2520Jia%2520Wang%2520and%2520Guangtao%2520Zhai%26entry.1292438233%3DCurrent%2520no-reference%2520image%2520quality%2520assessment%2520%2528NR-IQA%2529%2520models%2520for%2520enhanced%2520images%2520often%2520struggle%2520to%2520generalize%252C%2520as%2520they%2520tend%2520to%2520overfit%2520to%2520the%2520distinct%2520patterns%2520of%2520specific%2520enhancement%2520algorithms%2520rather%2520than%2520evaluating%2520genuine%2520perceptual%2520quality.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520a%2520preference-guided%2520debiasing%2520framework%2520for%2520no-reference%2520enhancement%2520image%2520quality%2520assessment%2520%2528EIQA%2529.%2520Specifically%252C%2520we%2520first%2520learn%2520a%2520continuous%2520enhancement-preference%2520embedding%2520space%2520using%2520supervised%2520contrastive%2520learning%252C%2520where%2520images%2520generated%2520by%2520similar%2520enhancement%2520styles%2520are%2520encouraged%2520to%2520have%2520closer%2520representations.%2520Based%2520on%2520this%252C%2520we%2520further%2520estimate%2520the%2520enhancement-induced%2520nuisance%2520component%2520contained%2520in%2520the%2520raw%2520quality%2520representation%2520and%2520remove%2520it%2520before%2520quality%2520regression.%2520In%2520this%2520way%252C%2520the%2520model%2520is%2520guided%2520to%2520focus%2520on%2520algorithm-invariant%2520perceptual%2520quality%2520cues%2520instead%2520of%2520enhancement-specific%2520visual%2520fingerprints.%2520To%2520facilitate%2520stable%2520optimization%252C%2520we%2520adopt%2520a%2520two-stage%2520training%2520strategy%2520that%2520first%2520learns%2520the%2520enhancement-preference%2520space%2520and%2520then%2520performs%2520debiased%2520quality%2520prediction.%2520Extensive%2520experiments%2520on%2520public%2520EIQA%2520benchmarks%2520demonstrate%2520that%2520the%2520proposed%2520method%2520effectively%2520mitigates%2520algorithm-induced%2520representation%2520bias%2520and%2520achieves%2520superior%2520robustness%2520and%2520cross-algorithm%2520generalization%2520compared%2520with%2520existing%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20086v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Preference-Guided%20Debiasing%20for%20No-Reference%20Enhancement%20Image%20Quality%20Assessment&entry.906535625=Shiqi%20Gao%20and%20Kang%20Fu%20and%20Zitong%20Xu%20and%20Huiyu%20Duan%20and%20Xiongkuo%20Min%20and%20Jia%20Wang%20and%20Guangtao%20Zhai&entry.1292438233=Current%20no-reference%20image%20quality%20assessment%20%28NR-IQA%29%20models%20for%20enhanced%20images%20often%20struggle%20to%20generalize%2C%20as%20they%20tend%20to%20overfit%20to%20the%20distinct%20patterns%20of%20specific%20enhancement%20algorithms%20rather%20than%20evaluating%20genuine%20perceptual%20quality.%20To%20address%20this%20issue%2C%20we%20propose%20a%20preference-guided%20debiasing%20framework%20for%20no-reference%20enhancement%20image%20quality%20assessment%20%28EIQA%29.%20Specifically%2C%20we%20first%20learn%20a%20continuous%20enhancement-preference%20embedding%20space%20using%20supervised%20contrastive%20learning%2C%20where%20images%20generated%20by%20similar%20enhancement%20styles%20are%20enc {"title": "KUKAloha: A General, Low-Cost, and Shared-Control based Teleoperation Framework for Construction Robot Arm", "author": "Yifan Xu and Qizhang Shen and Vineet Kamat and Carol Menassa", "abstract": "This paper presents KUKAloha, a general, low-cost, and shared-control teleoperation framework designed for construction robot arms. The proposed system employs a leader-follower paradigm in which a lightweight leading arm enables intuitive human guidance for coarse robot motion, while an autonomous perception module based on AprilTag detection performs precise alignment and grasp execution. By explicitly decoupling human control from fine manipulation, KUKAloha improves safety and repeatability when operating large-scale manipulators. We implement the framework on a KUKA robot arm and conduct a usability study with representative construction manipulation tasks. Experimental results demonstrate that KUKAloha reduces operator workload, improves task completion efficiency, and provides a practical solution for scalable demonstration collection and shared human-robot control in construction environments.", "link": "http://arxiv.org/abs/2603.20129v1", "date": "2026-03-20", "relevancy": 2.0803, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.538}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5135}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KUKAloha%3A%20A%20General%2C%20Low-Cost%2C%20and%20Shared-Control%20based%20Teleoperation%20Framework%20for%20Construction%20Robot%20Arm&body=Title%3A%20KUKAloha%3A%20A%20General%2C%20Low-Cost%2C%20and%20Shared-Control%20based%20Teleoperation%20Framework%20for%20Construction%20Robot%20Arm%0AAuthor%3A%20Yifan%20Xu%20and%20Qizhang%20Shen%20and%20Vineet%20Kamat%20and%20Carol%20Menassa%0AAbstract%3A%20This%20paper%20presents%20KUKAloha%2C%20a%20general%2C%20low-cost%2C%20and%20shared-control%20teleoperation%20framework%20designed%20for%20construction%20robot%20arms.%20The%20proposed%20system%20employs%20a%20leader-follower%20paradigm%20in%20which%20a%20lightweight%20leading%20arm%20enables%20intuitive%20human%20guidance%20for%20coarse%20robot%20motion%2C%20while%20an%20autonomous%20perception%20module%20based%20on%20AprilTag%20detection%20performs%20precise%20alignment%20and%20grasp%20execution.%20By%20explicitly%20decoupling%20human%20control%20from%20fine%20manipulation%2C%20KUKAloha%20improves%20safety%20and%20repeatability%20when%20operating%20large-scale%20manipulators.%20We%20implement%20the%20framework%20on%20a%20KUKA%20robot%20arm%20and%20conduct%20a%20usability%20study%20with%20representative%20construction%20manipulation%20tasks.%20Experimental%20results%20demonstrate%20that%20KUKAloha%20reduces%20operator%20workload%2C%20improves%20task%20completion%20efficiency%2C%20and%20provides%20a%20practical%20solution%20for%20scalable%20demonstration%20collection%20and%20shared%20human-robot%20control%20in%20construction%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20129v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKUKAloha%253A%2520A%2520General%252C%2520Low-Cost%252C%2520and%2520Shared-Control%2520based%2520Teleoperation%2520Framework%2520for%2520Construction%2520Robot%2520Arm%26entry.906535625%3DYifan%2520Xu%2520and%2520Qizhang%2520Shen%2520and%2520Vineet%2520Kamat%2520and%2520Carol%2520Menassa%26entry.1292438233%3DThis%2520paper%2520presents%2520KUKAloha%252C%2520a%2520general%252C%2520low-cost%252C%2520and%2520shared-control%2520teleoperation%2520framework%2520designed%2520for%2520construction%2520robot%2520arms.%2520The%2520proposed%2520system%2520employs%2520a%2520leader-follower%2520paradigm%2520in%2520which%2520a%2520lightweight%2520leading%2520arm%2520enables%2520intuitive%2520human%2520guidance%2520for%2520coarse%2520robot%2520motion%252C%2520while%2520an%2520autonomous%2520perception%2520module%2520based%2520on%2520AprilTag%2520detection%2520performs%2520precise%2520alignment%2520and%2520grasp%2520execution.%2520By%2520explicitly%2520decoupling%2520human%2520control%2520from%2520fine%2520manipulation%252C%2520KUKAloha%2520improves%2520safety%2520and%2520repeatability%2520when%2520operating%2520large-scale%2520manipulators.%2520We%2520implement%2520the%2520framework%2520on%2520a%2520KUKA%2520robot%2520arm%2520and%2520conduct%2520a%2520usability%2520study%2520with%2520representative%2520construction%2520manipulation%2520tasks.%2520Experimental%2520results%2520demonstrate%2520that%2520KUKAloha%2520reduces%2520operator%2520workload%252C%2520improves%2520task%2520completion%2520efficiency%252C%2520and%2520provides%2520a%2520practical%2520solution%2520for%2520scalable%2520demonstration%2520collection%2520and%2520shared%2520human-robot%2520control%2520in%2520construction%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20129v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=KUKAloha%3A%20A%20General%2C%20Low-Cost%2C%20and%20Shared-Control%20based%20Teleoperation%20Framework%20for%20Construction%20Robot%20Arm&entry.906535625=Yifan%20Xu%20and%20Qizhang%20Shen%20and%20Vineet%20Kamat%20and%20Carol%20Menassa&entry.1292438233=This%20paper%20presents%20KUKAloha%2C%20a%20general%2C%20low-cost%2C%20and%20shared-control%20teleoperation%20framework%20designed%20for%20construction%20robot%20arms.%20The%20proposed%20system%20employs%20a%20leader-follower%20paradigm%20in%20which%20a%20lightweight%20leading%20arm%20enable {"title": "Less is More: Towards Simple Graph Contrastive Learning", "author": "Yanan Zhao and Feng Ji and Jingyang Dai and Jiaze Ma and Wee Peng Tay", "abstract": "Graph Contrastive Learning (GCL) has shown strong promise for unsupervised graph representation learning, yet its effectiveness on heterophilic graphs, where connected nodes often belong to different classes, remains limited. Most existing methods rely on complex augmentation schemes, intricate encoders, or negative sampling, which raises the question of whether such complexity is truly necessary in this challenging setting. In this work, we revisit the foundations of supervised and unsupervised learning on graphs and uncover a simple yet effective principle for GCL: mitigating node feature noise by aggregating it with structural features derived from the graph topology. This observation suggests that the original node features and the graph structure naturally provide two complementary views for contrastive learning. Building on this insight, we propose an embarrassingly simple GCL model that uses a GCN encoder to capture structural features and an MLP encoder to isolate node feature noise. Our design requires neither data augmentation nor negative sampling, yet achieves state-of-the-art results on heterophilic benchmarks with minimal computational and memory overhead, while also offering advantages in homophilic graphs in terms of complexity, scalability, and robustness. We provide theoretical justification for our approach and validate its effectiveness through extensive experiments, including robustness evaluations against both black-box and white-box adversarial attacks.", "link": "http://arxiv.org/abs/2509.25742v3", "date": "2026-03-20", "relevancy": 2.0722, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5465}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5045}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4808}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Less%20is%20More%3A%20Towards%20Simple%20Graph%20Contrastive%20Learning&body=Title%3A%20Less%20is%20More%3A%20Towards%20Simple%20Graph%20Contrastive%20Learning%0AAuthor%3A%20Yanan%20Zhao%20and%20Feng%20Ji%20and%20Jingyang%20Dai%20and%20Jiaze%20Ma%20and%20Wee%20Peng%20Tay%0AAbstract%3A%20Graph%20Contrastive%20Learning%20%28GCL%29%20has%20shown%20strong%20promise%20for%20unsupervised%20graph%20representation%20learning%2C%20yet%20its%20effectiveness%20on%20heterophilic%20graphs%2C%20where%20connected%20nodes%20often%20belong%20to%20different%20classes%2C%20remains%20limited.%20Most%20existing%20methods%20rely%20on%20complex%20augmentation%20schemes%2C%20intricate%20encoders%2C%20or%20negative%20sampling%2C%20which%20raises%20the%20question%20of%20whether%20such%20complexity%20is%20truly%20necessary%20in%20this%20challenging%20setting.%20In%20this%20work%2C%20we%20revisit%20the%20foundations%20of%20supervised%20and%20unsupervised%20learning%20on%20graphs%20and%20uncover%20a%20simple%20yet%20effective%20principle%20for%20GCL%3A%20mitigating%20node%20feature%20noise%20by%20aggregating%20it%20with%20structural%20features%20derived%20from%20the%20graph%20topology.%20This%20observation%20suggests%20that%20the%20original%20node%20features%20and%20the%20graph%20structure%20naturally%20provide%20two%20complementary%20views%20for%20contrastive%20learning.%20Building%20on%20this%20insight%2C%20we%20propose%20an%20embarrassingly%20simple%20GCL%20model%20that%20uses%20a%20GCN%20encoder%20to%20capture%20structural%20features%20and%20an%20MLP%20encoder%20to%20isolate%20node%20feature%20noise.%20Our%20design%20requires%20neither%20data%20augmentation%20nor%20negative%20sampling%2C%20yet%20achieves%20state-of-the-art%20results%20on%20heterophilic%20benchmarks%20with%20minimal%20computational%20and%20memory%20overhead%2C%20while%20also%20offering%20advantages%20in%20homophilic%20graphs%20in%20terms%20of%20complexity%2C%20scalability%2C%20and%20robustness.%20We%20provide%20theoretical%20justification%20for%20our%20approach%20and%20validate%20its%20effectiveness%20through%20extensive%20experiments%2C%20including%20robustness%20evaluations%20against%20both%20black-box%20and%20white-box%20adversarial%20attacks.%0ALink%3A%20http%3A//arxiv.org/abs/2509.25742v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLess%2520is%2520More%253A%2520Towards%2520Simple%2520Graph%2520Contrastive%2520Learning%26entry.906535625%3DYanan%2520Zhao%2520and%2520Feng%2520Ji%2520and%2520Jingyang%2520Dai%2520and%2520Jiaze%2520Ma%2520and%2520Wee%2520Peng%2520Tay%26entry.1292438233%3DGraph%2520Contrastive%2520Learning%2520%2528GCL%2529%2520has%2520shown%2520strong%2520promise%2520for%2520unsupervised%2520graph%2520representation%2520learning%252C%2520yet%2520its%2520effectiveness%2520on%2520heterophilic%2520graphs%252C%2520where%2520connected%2520nodes%2520often%2520belong%2520to%2520different%2520classes%252C%2520remains%2520limited.%2520Most%2520existing%2520methods%2520rely%2520on%2520complex%2520augmentation%2520schemes%252C%2520intricate%2520encoders%252C%2520or%2520negative%2520sampling%252C%2520which%2520raises%2520the%2520question%2520of%2520whether%2520such%2520complexity%2520is%2520truly%2520necessary%2520in%2520this%2520challenging%2520setting.%2520In%2520this%2520work%252C%2520we%2520revisit%2520the%2520foundations%2520of%2520supervised%2520and%2520unsupervised%2520learning%2520on%2520graphs%2520and%2520uncover%2520a%2520simple%2520yet%2520effective%2520principle%2520for%2520GCL%253A%2520mitigating%2520node%2520feature%2520noise%2520by%2520aggregating%2520it%2520with%2520structural%2520features%2520derived%2520from%2520the%2520graph%2520top {"title": "FD-VLA: Force-Distilled Vision-Language-Action Model for Contact-Rich Manipulation", "author": "Ruiteng Zhao and Wenshuo Wang and Yicheng Ma and Xiaocong Li and Francis E. H. Tay and Marcelo H. Ang and Haiyue Zhu", "abstract": "Force sensing is a crucial modality for Vision-Language-Action (VLA) frameworks, as it enables fine-grained perception and dexterous manipulation in contact-rich tasks. We present Force-Distilled VLA (FD-VLA), a novel framework that integrates force awareness into contact-rich manipulation without relying on physical force sensors. The core of our approach is a Force Distillation Module (FDM), which distills force by mapping a learnable query token, conditioned on visual observations and robot states, into a predicted force token aligned with the latent representation of actual force signals. During inference, this distilled force token is injected into the pretrained VLM, enabling force-aware reasoning while preserving the integrity of its vision-language semantics. This design provides two key benefits: first, it allows practical deployment across a wide range of robots that lack expensive or fragile force-torque sensors, thereby reducing hardware cost and complexity; second, the FDM introduces an additional force-vision-state fusion prior to the VLM, which improves cross-modal alignment and enhances perception-action robustness in contact-rich scenarios. Surprisingly, our physical experiments show that the distilled force token outperforms direct sensor force measurements as well as other baselines, which highlights the effectiveness of this force-distilled VLA approach.", "link": "http://arxiv.org/abs/2602.02142v2", "date": "2026-03-20", "relevancy": 2.0618, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5492}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "MedQ-Engine: A Closed-Loop Data Engine for Evolving MLLMs in Medical Image Quality Assessment", "author": "Jiyao Liu and Junzhi Ning and Wanying Qu and Lihao Liu and Chenglong Ma and Junjun He and Ningsheng Xu", "abstract": "Medical image quality assessment (Med-IQA) is a prerequisite for clinical AI deployment, yet multimodal large language models (MLLMs) still fall substantially short of human experts, particularly when required to provide descriptive assessments with clinical reasoning beyond simple quality scores. However, improving them is hindered by the high cost of acquiring descriptive annotations and by the inability of one-time data collection to adapt to the model's evolving weaknesses. To address these challenges, we propose MedQ-Engine, a closed-loop data engine that iteratively evaluates the model to discover failure prototypes via data-driven clustering, explores a million-scale image pool using these prototypes as retrieval anchors with progressive human-in-the-loop annotation, and evolves through quality-assured fine-tuning, forming a self-improving cycle. Models are evaluated on complementary perception and description tasks. An entropy-guided routing mechanism triages annotations to minimize labeling cost. Experiments across five medical imaging modalities show that MedQ-Engine elevates an 8B-parameter model to surpass GPT-4o by over 13% and narrow the gap with human experts to only 4.34%, using only 10K annotations with more than 4x sample efficiency over random sampling.", "link": "http://arxiv.org/abs/2603.19863v1", "date": "2026-03-20", "relevancy": 2.0585, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6051}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4965}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4965}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedQ-Engine%3A%20A%20Closed-Loop%20Data%20Engine%20for%20Evolving%20MLLMs%20in%20Medical%20Image%20Quality%20Assessment&body=Title%3A%20MedQ-Engine%3A%20A%20Closed-Loop%20Data%20Engine%20for%20Evolving%20MLLMs%20in%20Medical%20Image%20Quality%20Assessment%0AAuthor%3A%20Jiyao%20Liu%20and%20Junzhi%20Ning%20and%20Wanying%20Qu%20and%20Lihao%20Liu%20and%20Chenglong%20Ma%20and%20Junjun%20He%20and%20Ningsheng%20Xu%0AAbstract%3A%20Medical%20image%20quality%20assessment%20%28Med-IQA%29%20is%20a%20prerequisite%20for%20clinical%20AI%20deployment%2C%20yet%20multimodal%20large%20language%20models%20%28MLLMs%29%20still%20fall%20substantially%20short%20of%20human%20experts%2C%20particularly%20when%20required%20to%20provide%20descriptive%20assessments%20with%20clinical%20reasoning%20beyond%20simple%20quality%20scores.%20However%2C%20improving%20them%20is%20hindered%20by%20the%20high%20cost%20of%20acquiring%20descriptive%20annotations%20and%20by%20the%20inability%20of%20one-time%20data%20collection%20to%20adapt%20to%20the%20model%27s%20evolving%20weaknesses.%20To%20address%20these%20challenges%2C%20we%20propose%20MedQ-Engine%2C%20a%20closed-loop%20data%20engine%20that%20iteratively%20evaluates%20the%20model%20to%20discover%20failure%20prototypes%20via%20data-driven%20clustering%2C%20explores%20a%20million-scale%20image%20pool%20using%20these%20prototypes%20as%20retrieval%20anchors%20with%20progressive%20human-in-the-loop%20annotation%2C%20and%20evolves%20through%20quality-assured%20fine-tuning%2C%20forming%20a%20self-improving%20cycle.%20Models%20are%20evaluated%20on%20complementary%20perception%20and%20description%20tasks.%20An%20entropy-guided%20routing%20mechanism%20triages%20annotations%20to%20minimize%20labeling%20cost.%20Experiments%20across%20five%20medical%20imaging%20modalities%20show%2 %27s%20evolving%20weaknesses.%20To%20address%20these%20challenges%2C%20we%20propose%20MedQ-Engine%2C%20a%20closed-loop%20data%20engine%20that%20iteratively%20evaluates%20the%20model%20to%20discover%20failure%20prototypes%20via%20data-driven%20clustering%2C%20explores%20a%20million-scale%20image%20pool%20using%20these%20prototypes%20as%20retrieval%20anchors%20with%20progressive%20human-in-the-loop%20annotation%2C%20and%20evolves%20through%20quality-assured%20fine-tuning%2C%20forming%20a%20self-improving%20cycle.%20Models%20are%20evaluated%20on%20complementary%20perception%20and%20description%20tasks.%20An%20entropy-guided%20routing%20mechanism%20triages%20annotations%20to%20minimize%20labeling%20cost.%20Experiments%20across%20five%20medical%20imaging%20modalities%20show%20that%20MedQ-Engine%20elevates%20an%208B-parameter%20model%20to%20surpass%20GPT-4o%20by%20over%2013%25%20and%20narrow%20the%20gap%20with%20human%20experts%20to%20only%204.34%25%2C%20using%20only%2010K%20annotations%20with%20more%20than%204x%20sample%20efficiency%20over%20random%20sampling.&entry.1838667208=http%3A//arxiv.org/abs/2603.19863v1&entry.124074799=Read"},
{"title": "MeanFlow Meets Control: Scaling Sampled-Data Control for Swarms", "author": "Anqi Dong and Yongxin Chen and Karl H. Johansson and Johan Karlsson", "abstract": "Steering large-scale swarms in only a few control updates is challenging because real systems operate in sampled-data form: control inputs are updated intermittently and applied over finite intervals. In this regime, the natural object is not an instantaneous velocity field, but a finite-window control quantity that captures the system response over each sampling interval. Inspired by MeanFlow, we introduce a control-space learning framework for swarm steering under linear time-invariant dynamics. The learned object is the coefficient that parameterizes the finite-horizon minimum-energy control over each interval. We show that this coefficient admits both an integral representation and a local differential identity along bridge trajectories, which leads to a simple stop-gradient training objective. At implementation time, the learned coefficient is used directly in sampled-data updates, so the prescribed dynamics and actuation map are respected by construction. The resulting framework provides a scalable approach to few-step swarm steering that is consistent with the sampled-data structure of real control systems.", "link": "http://arxiv.org/abs/2603.20189v1", "date": "2026-03-20", "relevancy": 2.0574, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5504}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4897}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4856}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MeanFlow%20Meets%20Control%3A%20Scaling%20Sampled-Data%20Control%20for%20Swarms&body=Title%3A%20MeanFlow%20Meets%20Control%3A%20Scaling%20Sampled-Data%20Control%20for%20Swarms%0AAuthor%3A%20Anqi%20Dong%20and%20Yongxin%20Chen%20and%20Karl%20H.%20Johansson%20and%20Johan%20Karlsson%0AAbstract%3A%20Steering%20large-scale%20swarms%20in%20only%20a%20few%20control%20updates%20is%20challenging%20because%20real%20systems%20operate%20in%20sampled-data%20form%3A%20control%20inputs%20are%20updated%20intermittently%20and%20applied%20over%20finite%20intervals.%20In%20this%20regime%2C%20the%20natural%20object%20is%20not%20an%20instantaneous%20velocity%20field%2C%20but%20a%20finite-window%20control%20quantity%20that%20captures%20the%20system%20response%20over%20each%20sampling%20interval.%20Inspired%20by%20MeanFlow%2C%20we%20introduce%20a%20control-space%20learning%20framework%20for%20swarm%20steering%20under%20linear%20time-invariant%20dynamics.%20The%20learned%20object%20is%20the%20coefficient%20that%20parameterizes%20the%20finite-horizon%20minimum-energy%20control%20over%20each%20interval.%20We%20show%20that%20this%20coefficient%20admits%20both%20an%20integral%20representation%20and%20a%20local%20differential%20identity%20along%20bridge%20trajectories%2C%20which%20leads%20to%20a%20simple%20stop-gradient%20training%20objective.%20At%20implementation%20time%2C%20the%20learned%20coefficient%20is%20used%20directly%20in%20sampled-data%20updates%2C%20so%20the%20prescribed%20dynamics%20and%20actuation%20map%20are%20respected%20by%20construction.%20The%20resulting%20framework%20provides%20a%20scalable%20approach%20to%20few-step%20swarm%20steering%20that%20is%20consistent%20with%20the%20sampled-data%20structure%20of%20real%20control%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20189v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMeanFlow%2520Meets%2520Control%253A%2520Scaling%2520Sampled-Data%2520Control%2520for%2520Swarms%26entry.906535625%3DAnqi%2520Dong%2520and%2520Yongxin%2520Chen%2520and%2520K {"title": "Explainable cluster analysis: a bagging approach", "author": "Federico Maria Quetti and Elena Ballante and Silvia Figini and Paolo Giudici", "abstract": "A major limitation of clustering approaches is their lack of explainability: methods rarely provide insight into which features drive the grouping of similar observations. To address this limitation, we propose an ensemble-based clustering framework that integrates bagging and feature dropout to generate feature importance scores, in analogy with feature importance mechanisms in supervised random forests. By leveraging multiple bootstrap resampling schemes and aggregating the resulting partitions, the method improves stability and robustness of the cluster definition, particularly in small-sample or noisy settings. Feature importance is assessed through an information-theoretic approach: at each step, the mutual information between each feature and the estimated cluster labels is computed and weighted by a measure of clustering validity to emphasize well-formed partitions, before being aggregated into a final score. The method outputs both a consensus partition and a corresponding measure of feature importance, enabling a unified interpretation of clustering structure and variable relevance. Its effectiveness is demonstrated on multiple simulated and real-world datasets.", "link": "http://arxiv.org/abs/2603.19840v1", "date": "2026-03-20", "relevancy": 2.0565, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4295}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4162}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.3882}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Explainable%20cluster%20analysis%3A%20a%20bagging%20approach&body=Title%3A%20Explainable%20cluster%20analysis%3A%20a%20bagging%20approach%0AAuthor%3A%20Federico%20Maria%20Quetti%20and%20Elena%20Ballante%20and%20Silvia%20Figini%20and%20Paolo%20Giudici%0AAbstract%3A%20A%20major%20limitation%20of%20clustering%20approaches%20is%20their%20lack%20of%20explainability%3A%20methods%20rarely%20provide%20insight%20into%20which%20features%20drive%20the%20grouping%20of%20similar%20observations.%20To%20address%20this%20limitation%2C%20we%20propose%20an%20ensemble-based%20clustering%20framework%20that%20integrates%20bagging%20and%20feature%20dropout%20to%20generate%20feature%20importance%20scores%2C%20in%20analogy%20with%20feature%20importance%20mechanisms%20in%20supervised%20random%20forests.%20By%20leveraging%20multiple%20bootstrap%20resampling%20schemes%20and%20aggregating%20the%20resulting%20partitions%2C%20the%20method%20improves%20stability%20and%20robustness%20of%20the%20cluster%20definition%2C%20particularly%20in%20small-sample%20or%20noisy%20settings.%20Feature%20importance%20is%20assessed%20through%20an%20information-theoretic%20approach%3A%20at%20each%20step%2C%20the%20mutual%20information%20between%20each%20feature%20and%20the%20estimated%20cluster%20labels%20is%20computed%20and%20weighted%20by%20a%20measure%20of%20clustering%20validity%20to%20emphasize%20well-formed%20partitions%2C%20before%20being%20aggregated%20into%20a%20final%20score.%20The%20method%20outputs%20both%20a%20consensus%20partition%20and%20a%20corresponding%20measure%20of%20feature%20importance%2C%20enabling%20a%20unified%20interpretation%20of%20clustering%20structure%20and%20variable%20relevance.%20Its%20effectiveness%20is%20demonstrated%20on%20multiple%20simulated%20and%20real-world%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19840v1%0AForm%3A%20https%3A//docs.google.com/

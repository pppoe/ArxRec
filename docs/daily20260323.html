{"title": "Memori: A Persistent Memory Layer for Efficient, Context-Aware LLM Agents", "author": "Luiz C. Borro and Luiz A. B. Macarini and Gordon Tindall and Michael Montero and Adam B. Struck", "abstract": "As large language models (LLMs) evolve into autonomous agents, persistent memory at the API layer is essential for enabling context-aware behavior across LLMs and multi-session interactions. Existing approaches force vendor lock-in and rely on injecting large volumes of raw conversation into prompts, leading to high token costs and degraded performance.\n  We introduce Memori, an LLM-agnostic persistent memory layer that treats memory as a data structuring problem. Its Advanced Augmentation pipeline converts unstructured dialogue into compact semantic triples and conversation summaries, enabling precise retrieval and coherent reasoning.\n  Evaluated on the LoCoMo benchmark, Memori achieves 81.95% accuracy, outperforming existing memory systems while using only 1,294 tokens per query (~5% of full context). This results in substantial cost reductions, including 67% fewer tokens than competing approaches and over 20x savings compared to full-context methods.\n  These results show that effective memory in LLM agents depends on structured representations instead of larger context windows, enabling scalable and cost-efficient deployment.", "link": "http://arxiv.org/abs/2603.19935v1", "date": "2026-03-20", "relevancy": 2.3574, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4908}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4618}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Memori%3A%20A%20Persistent%20Memory%20Layer%20for%20Efficient%2C%20Context-Aware%20LLM%20Agents&body=Title%3A%20Memori%3A%20A%20Persistent%20Memory%20Layer%20for%20Efficient%2C%20Context-Aware%20LLM%20Agents%0AAuthor%3A%20Luiz%20C.%20Borro%20and%20Luiz%20A.%20B.%20Macarini%20and%20Gordon%20Tindall%20and%20Michael%20Montero%20and%20Adam%20B.%20Struck%0AAbstract%3A%20As%20large%20language%20models%20%28LLMs%29%20evolve%20into%20autonomous%20agents%2C%20persistent%20memory%20at%20the%20API%20layer%20is%20essential%20for%20enabling%20context-aware%20behavior%20across%20LLMs%20and%20multi-session%20interactions.%20Existing%20approaches%20force%20vendor%20lock-in%20and%20rely%20on%20injecting%20large%20volumes%20of%20raw%20conversation%20into%20prompts%2C%20leading%20to%20high%20token%20costs%20and%20degraded%20performance.%0A%20%20We%20introduce%20Memori%2C%20an%20LLM-agnostic%20persistent%20memory%20layer%20that%20treats%20memory%20as%20a%20data%20structuring%20problem.%20Its%20Advanced%20Augmentation%20pipeline%20converts%20unstructured%20dialogue%20into%20compact%20semantic%20triples%20and%20conversation%20summaries%2C%20enabling%20precise%20retrieval%20and%20coherent%20reasoning.%0A%20%20Evaluated%20on%20the%20LoCoMo%20benchmark%2C%20Memori%20achieves%2081.95%25%20accuracy%2C%20outperforming%20existing%20memory%20systems%20while%20using%20only%201%2C294%20tokens%20per%20query%20%28~5%25%20of%20full%20context%29.%20This%20results%20in%20substantial%20cost%20reductions%2C%20including%2067%25%20fewer%20tokens%20than%20competing%20approaches%20and%20over%2020x%20savings%20compared%20to%20full-context%20methods.%0A%20%20These%20results%20show%20that%20effective%20memory%20in%20LLM%20agents%20depends%20on%20structured%20representations%20instead%20of%20larger%20context%20windows%2C%20enabling%20scalable%20and%20cost-efficient%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19935v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K_ ive%20memory%20in%20LLM%20agents%20depends%20on%20structured%20representations%20instead%20of%20larger%20context%20windows%2C%20enabling%20scalable%20and%20cost-efficient%20deployment.&entry.1838667208=http%3A//arxiv.org/abs/2603.19935v1&entry.124074799=Read"},
{"title": "Learning Discrete Abstractions for Visual Rearrangement Tasks Using Vision-Guided Graph Coloring", "author": "Abhiroop Ajith and Constantinos Chamzas", "abstract": "Learning abstractions directly from data is a core challenge in robotics. Humans naturally operate at an abstract level, reasoning over high-level subgoals while delegating execution to low-level motor skills -- an ability that enables efficient problem solving in complex environments. In robotics, abstractions and hierarchical reasoning have long been central to planning, yet they are typically hand-engineered, demanding significant human effort and limiting scalability. Automating the discovery of useful abstractions directly from visual data would make planning frameworks more scalable and more applicable to real-world robotic domains. In this work, we focus on rearrangement tasks where the state is represented with raw images, and propose a method to induce discrete, graph-structured abstractions by combining structural constraints with an attention-guided visual distance. Our approach leverages the inherent bipartite structure of rearrangement problems, integrating structural constraints and visual embeddings into a unified framework. This enables the autonomous discovery of abstractions from vision alone, which can subsequently support high-level planning. We evaluate our method on two rearrangement tasks in simulation and show that it consistently identifies meaningful abstractions that facilitate effective planning and outperform existing approaches.", "link": "http://arxiv.org/abs/2509.14460v2", "date": "2026-03-20", "relevancy": 2.3516, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6322}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5581}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Discrete%20Abstractions%20for%20Visual%20Rearrangement%20Tasks%20Using%20Vision-Guided%20Graph%20Coloring&body=Title%3A%20Learning%20Discrete%20Abstractions%20for%20Visual%20Rearrangement%20Tasks%20Using%20Vision-Guided%20Graph%20Coloring%0AAuthor%3A%20Abhiroop%20Ajith%20and%20Constantinos%20Chamzas%0AAbstract%3A%20Learning%20abstractions%20directly%20from%20data%20is%20a%20core%20challenge%20in%20robotics.%20Humans%20naturally%20operate%20at%20an%20abstract%20level%2C%20reasoning%20over%20high-level%20subgoals%20while%20delegating%20execution%20to%20low-level%20motor%20skills%20--%20an%20ability%20that%20enables%20efficient%20problem%20solving%20in%20complex%20environments.%20In%20robotics%2C%20abstractions%20and%20hierarchical%20reasoning%20have%20long%20been%20central%20to%20planning%2C%20yet%20they%20are%20typically%20hand-engineered%2C%20demanding%20significant%20human%20effort%20and%20limiting%20scalability.%20Automating%20the%20discovery%20of%20useful%20abstractions%20directly%20from%20visual%20data%20would%20make%20planning%20frameworks%20more%20scalable%20and%20more%20applicable%20to%20real-world%20robotic%20domains.%20In%20this%20work%2C%20we%20focus%20on%20rearrangement%20tasks%20where%20the%20state%20is%20represented%20with%20raw%20images%2C%20and%20propose%20a%20method%20to%20induce%20discrete%2C%20graph-structured%20abstractions%20by%20combining%20structural%20constraints%20with%20an%20attention-guided%20visual%20distance.%20Our%20approach%20leverages%20the%20inherent%20bipartite%20structure%20of%20rearrangement%20problems%2C%20integrating%20structural%20constraints%20and%20visual%20embeddings%20into%20a%20unified%20framework.%20This%20enables%20the%20autonomous%20discovery%20of%20abstractions%20from%20vision%20alone%2C%20which%20can%20subsequently%20support%20high-level%20planning.%20We%20evaluate%20our%20method%20on%20two%20rearrangement%20tasks%20in%20simulation%20and%20show%20that%20it%20consistently%20identifies%20meaningful%20abstractions%20that%20facilitate%20effective%20planning%20and%20outperform%20existing%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2509.14460v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Discrete%2520Abstractions%2520for%2520Visual%2520Rearrangement%2520Tasks%2520Using%2520Vision-Guided%2520Graph%2520Coloring%26entry.906535625%3DAbhiroop%2520Ajith%2520and%2520Constantinos%2520Chamzas%26entry.1292438233%3DLearning%2520abstractions%2520directly%2520from%2520data%2520is%2520a%2520core%2520challenge%2520in%2520robotics.%2520Humans%2520naturally%2520operate%2520at%2520an%2520abstract%2520level%252C%2520reasoning%2520over%2520high-level%2520subgoals%2520while%2520delegating%2520execution%2520to%2520low-level%2520motor%2520skills%2520--%2520an%2520ability%2520that%2520enables%2520efficient%2520problem%2520solving%2520in%2520complex%2520environments.%2520In%2520robotics%252C%2520abstractions%2520and%2520hierarchical%2520reasoning%2520have%2520long%2520been%2520central%2520to%2520planning%252C%2520yet%2520they%2520are%2520typically%2520hand-engineered%252C%2520demanding%2520significant%2520human%2520effort%2520and%2520limiting%2520scalability.%2520Automating%2520the%2520discovery%2520of%2520useful%2520abstractions%2520directly%2520from%2520visual%2520data%2520would%2520make%2520planning%2520frameworks%2520more%2520scalable%2520and%2520more%2520applicable%2520to%2520real-world%2520robotic%2520domains.%2520In%2520this%2520work%252C%2520we%2520focus%2520on%2520rearrangement%2520tasks%2520where%2520the%2520state%2520is%2520represented%2520with%2520raw%2520images%252C%2520and%2520propose%2520a%2520method%2520to%2520induce%2520discrete%252C%2520graph-structured%2520abstractions%2520by%2520combining%2520structural%2520constraints%2520with%2520an%2520attention-guided%2520visual%2520distance.%2520Our%2520approach%2520leverages%2520the%2520inherent%2520bipartite%2520structure%2520of%2520rearrangement%2520problems%252C%2520integrating%2520structural%2520constraints%2520and%2520visual%2520embeddings%2520into%2520a%2520unified%2520framework.%2520This%2520enables%2520the%2520autonomous%2520discovery%2520of%2520abstractions%2520from%2520vision%2520alone%252C%2520which%2520can%2520subsequently%2520support%2520high-level%2520planning.%2520We%2520evaluate%2520our%2520method%2520on%2520two%2520rearrangement%2520tasks%2520in%2520simulation%2520and%2520show%2520that%2520it%2520consistently%2520identifies%2520meaningful%2520abstractions%2520that%2520facilitate%2520effective%2520planning%2520and%2520outperform%2520existing%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.14460v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20Discrete%20Abstractions%20for%20Visual%20Rearrangement%20Tasks%20Using%20Vision-Guided%20Graph%20Coloring&entry.906535625=Abhiroop%20Ajith%20and%20Constantinos%20Chamzas&entry.1292438233=Learning%20abstractions%20directly%20from%20data%20is%20a%20core%20challenge%20in%20robotics.%20Humans%20naturally%20operate%20at%20an%20abstract%20level%2C%20reasoning%20over%20high-level%20subgoals%20while%20delegating%20execution%20to%20low-level%20motor%20skills%20--%20an%20ability%20that%20enables%20efficient%20problem%20solving%20in%20complex%20environments.%20In%20robotics%2C%20abstractions%20and%20hierarchical%20reasoning%20have%20long%20been%20central%20to%20planning%2C%20yet%20they%20are%20typically%20hand-engineered%2C%20demanding%20significant%20human%20effort%20and%20limiting%20scalability.%20Automating%20the%20discovery%20of%20useful%20abstractions%20directly%20from%20visual%20data%20woul {"title": "LagerNVS: Latent Geometry for Fully Neural Real-time Novel View Synthesis", "author": "Stanislaw Szymanowicz and Minghao Chen and Jianyuan Wang and Christian Rupprecht and Andrea Vedaldi", "abstract": "Recent work has shown that neural networks can perform 3D tasks such as Novel View Synthesis (NVS) without explicit 3D reconstruction. Even so, we argue that strong 3D inductive biases are still helpful in the design of such networks. We show this point by introducing LagerNVS, an encoder-decoder neural network for NVS that builds on `3D-aware' latent features. The encoder is initialized from a 3D reconstruction network pre-trained using explicit 3D supervision. This is paired with a lightweight decoder, and trained end-to-end with photometric losses. LagerNVS achieves state-of-the-art deterministic feed-forward Novel View Synthesis (including 31.4 PSNR on Re10k), with and without known cameras, renders in real time, generalizes to in-the-wild data, and can be paired with a diffusion decoder for generative extrapolation.", "link": "http://arxiv.org/abs/2603.20176v1", "date": "2026-03-20", "relevancy": 2.3269, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6016}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5739}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5649}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LagerNVS%3A%20Latent%20Geometry%20for%20Fully%20Neural%20Real-time%20Novel%20View%20Synthesis&body=Title%3A%20LagerNVS%3A%20Latent%20Geometry%20for%20Fully%20Neural%20Real-time%20Novel%20View%20Synthesis%0AAuthor%3A%20Stanislaw%20Szymanowicz%20and%20Minghao%20Chen%20and%20Jianyuan%20Wang%20and%20Christian%20Rupprecht%20and%20Andrea%20Vedaldi%0AAbstract%3A%20Recent%20work%20has%20shown%20that%20neural%20networks%20can%20perform%203D%20tasks%20such%20as%20Novel%20View%20Synthesis%20%28NVS%29%20without%20explicit%203D%20reconstruction.%20Even%20so%2C%20we%20argue%20that%20strong%203D%20inductive%20biases%20are%20still%20helpful%20in%20the%20design%20of%20such%20networks.%20We%20show%20this%20point%20by%20introducing%20LagerNVS%2C%20an%20encoder-decoder%20neural%20network%20for%20NVS%20that%20builds%20on%20%603D-aware%27%20latent%20features.%20The%20encoder%20is%20initialized%20from%20a%203D%20reconstruction%20network%20pre-trained%20using%20explicit%203D%20supervision.%20This%20is%20paired%20with%20a%20lightweight%20decoder%2C%20and%20trained%20end-to-end%20with%20photometric%20losses.%20LagerNVS%20achieves%20state-of-the-art%20deterministic%20feed-forward%20Novel%20View%20Synthesis%20%28including%2031.4%20PSNR%20on%20Re10k%29%2C%20with%20and%20without%20known%20cameras%2C%20renders%20in%20real%20time%2C%20generalizes%20to%20in-the-wild%20data%2C%20and%20can%20be%20paired%20with%20a%20diffusion%20decoder%20for%20generative%20extrapolation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLagerNVS%253A%2520Latent%2520Geometry%2520for%2520Fully%2520Neural%2520Real-time%2520Novel%2520View%2520Synthesis%26entry.906535625%3DStanislaw%2520Szymanowicz%2520and%2520Minghao%2520Chen%2520and%2520Jianyuan%2520Wang%2520and%2520Christian%2520Rupprecht%2520and%2520Andrea%2520Vedaldi%26entry.1292438233%3DRecent%2520work%2520has%2520shown%2520that%2520neural%2520networks%2520can%2520perform%25203D%2520tasks%2520such%2520as%2520Novel%2520View%2520Synthesis%2520%2528NVS%2529%2520without%2520explicit%25203D%2520reconstruction.%2520Even%2520so%252C%2520we%2520argue%2520that%2520strong%25203D%2520inductive%2520biases%2520are%2520still%2520helpful%2520in%2520the%2520design%2520of%2520such%2520networks.%2520We%2520show%2520this%2520point%2520by%2520introducing%2520LagerNVS%252C%2520an%2520encoder-decoder%2520neural%2520network%2520for%2520NVS%2520that%2520builds%2520on%2520%25603D-aware%2527%2520latent%2520features.%2520The%2520encoder%2520is%2520initialized%2520from%2520a%25203D%2520reconstruction%2520network%2520pre-trained%2520using%2520explicit%25203D%2520supervision.%2520This%2520is%2520paired%2520with%2520a%2520lightweight%2520decoder%252C%2520and%2520trained%2520end-to-end%2520with%2520photometric%2520losses.%2520LagerNVS%2520achieves%2520state-of-the-art%2520deterministic%2520feed-forward%2520Novel%2520View%2520Synthesis%2520%2528including%252031.4%2520PSNR%2520on%2520Re10k%2529%252C%2520with%2520and%2520without%2520known%2520cameras%252C%2520renders%2520in%2520real%2520time%252C%2520generalizes%2520to%2520in-the-wild%2520data%252C%2520and%2520can%2520be%2520paired%2520with%2520a%2520diffusion%2520decoder%2520for%2520generative%2520extrapolation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20176v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LagerNVS%3A%20Latent%20Geometry%20for%20Fully%20Neural%20Real-time%20Novel%20View%20Synthesis&entry.906535625=Stanislaw%20Szymanowicz%20and%20Minghao%20Chen%20and%20Jianyuan%20Wang%20and%20Christian%20Rupprecht%20and%20Andrea%20Vedaldi&entry.1292438233=Recent%20work%20has%20shown%20that%20neural%20networks%20can%20perform%203D%20tasks%20such%20as%20Novel%20View%20Synthesis%20%28NVS%29%20without%20explicit%203D%20reconstruction.%20Even%20so%2C%20we%20argue%20that%20strong%203D%20inductive%20biases%20are%20still%20helpful%20in%20the%20design%20of%20such%20networks.%20We%20show%20this%20point%20by%20introducing%20LagerNVS%2C%20an%20encoder-decoder%20neural%20network%20for%20NVS%20that%20builds%20on%20%603D-aware%27%20latent%20features.%20The%20encoder%20is%20initialized%20from%2 {"title": "CoverageBench: Evaluating Information Coverage across Tasks and Domains", "author": "Saron Samuel and Andrew Yates and Dawn Lawrie and Ian Soboroff and Trevor Adriaanse and Benjamin Van Durme and Eugene Yang", "abstract": "We wish to measure the information coverage of an ad hoc retrieval algorithm, that is, how much of the range of available relevant information is covered by the search results. Information coverage is a central aspect for retrieval, especially when the retrieval system is integrated with generative models in a retrieval-augmented generation (RAG) system. The classic metrics for ad hoc retrieval, precision and recall, reward a system as more and more relevant documents are retrieved. However, since relevance in ad hoc test collections is defined for a document without any relation to other documents that might contain the same information, high recall is sufficient but not necessary to ensure coverage. The same is true for other metrics such as rank-biased precision (RBP), normalized discounted cumulative gain (nDCG), and mean average precision (MAP). Test collections developed around the notion of diversity ranking in web search incorporate multiple aspects that support a concept of coverage in the web domain. In this work, we construct a suite of collections for evaluating information coverage from existing collections. This suite offers researchers a unified testbed spanning multiple genres and tasks. All topics, nuggets, relevance labels, and baseline rankings are released on Hugging Face Datasets, along with instructions for accessing the publicly available document collections.", "link": "http://arxiv.org/abs/2603.20034v1", "date": "2026-03-20", "relevancy": 2.3179, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4708}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4708}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoverageBench%3A%20Evaluating%20Information%20Coverage%20across%20Tasks%20and%20Domains&body=Title%3A%20CoverageBench%3A%20Evaluating%20Information%20Coverage%20across%20Tasks%20and%20Domains%0AAuthor%3A%20Saron%20Samuel%20and%20Andrew%20Yates%20and%20Dawn%20Lawrie%20and%20Ian%20Soboroff%20and%20Trevor%20Adriaanse%20and%20Benjamin%20Van%20Durme%20and%20Eugene%20Yang%0AAbstract%3A%20We%20wish%20to%20measure%20the%20information%20coverage%20of%20an%20ad%20hoc%20retrieval%20algorithm%2C%20that%20is%2C%20how%20much%20of%20the%20range%20of%20available%20relevant%20information%20is%20covered%20by%20the%20search%20results.%20Information%20coverage%20is%20a%20central%20aspect%20for%20retrieval%2C%20especially%20when%20the%20retrieval%20system%20is%20integrated%20with%20generative%20models%20in%20a%20retrieval-augmented%20generation%20%28RAG%29%20system.%20The%20classic%20metrics%20for%20ad%20hoc%20retrieval%2C%20precision%20and%20recall%2C%20reward%20a%20system%20as%20more%20and%20more%20relevant%20documents%20are%20retrieved.%20However%2C%20since%20relevance%20in%20ad%20hoc%20test%20collections%20is%20defined%20for%20a%20document%20without%20any%20relation%20to%20other%20documents%20that%20might%20contain%20the%20same%20information%2C%20high%20recall%20is%20sufficient%20but%20not%20necessary%20to%20ensure%20coverage.%20The%20same%20is%20true%20for%20other%20metrics%20such%20as%20rank-biased%20precision%20%28RBP%29%2C%20normalized%20discounted%20cumulative%20gain%20%28nDCG%29%2C%20and%20mean%20average%20precision%20%28MAP%29.%20Test%20collections%20developed%20around%20the%20notion%20of%20diversity%20ranking%20in%20web%20search%20incorporate%20multiple%20aspe {"title": "MuSteerNet: Human Reaction Generation from Videos via Observation-Reaction Mutual Steering", "author": "Yuan Zhou and Yongzhi Li and Yanqi Dai and Xingyu Zhu and Yi Tan and Qingshan Xu and Beier Zhu and Richang Hong and Hanwang Zhang", "abstract": "Video-driven human reaction generation aims to synthesize 3D human motions that directly react to observed video sequences, which is crucial for building human-like interactive AI systems. However, existing methods often fail to effectively leverage video inputs to steer human reaction synthesis, resulting in reaction motions that are mismatched with the content of video sequences. We reveal that this limitation arises from a severe relational distortion between visual observations and reaction types. In light of this, we propose MuSteerNet, a simple yet effective framework that generates 3D human reactions from videos via observation-reaction mutual steering. Specifically, we first propose a Prototype Feedback Steering mechanism to mitigate relational distortion by refining visual observations with a gated delta-rectification modulator and a relational margin constraint, guided by prototypical vectors learned from human reactions. We then introduce Dual-Coupled Reaction Refinement that fully leverages rectified visual cues to further steer the refinement of generated reaction motions, thereby effectively improving reaction quality and enabling MuSteerNet to achieve competitive performance. Extensive experiments and ablation studies validate the effectiveness of our method. Code coming soon: https://github.com/zhouyuan888888/MuSteerNet.", "link": "http://arxiv.org/abs/2603.20187v1", "date": "2026-03-20", "relevancy": 2.3075, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5843}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5801}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MuSteerNet%3A%20Human%20Reaction%20Generation%20from%20Videos%20via%20Observation-Reaction%20Mutual%20Steering&body=Title%3A%20MuSteerNet%3A%20Human%20Reaction%20Generation%20from%20Videos%20via%20Observation-Reaction%20Mutual%20Steering%0AAuthor%3A%20Yuan%20Zhou%20and%20Yongzhi%20Li%20and%20Yanqi%20Dai%20and%20Xingyu%20Zhu%20and%20Yi%20Tan%20and%20Qingshan%20Xu%20and%20Beier%20Zhu%20and%20Richang%20Hong%20and%20Hanwang%20Zhang%0AAbstract%3A%20Video-driven%20human%20reaction%20generation%20aims%20to%20synthesize%203D%20human%20motions%20that%20directly%20react%20to%20observed%20video%20sequences%2C%20which%20is%20crucial%20for%20building%20human-like%20interactive%20AI%20systems.%20However%2C%20existing%20methods%20often%20fail%20to%20effectively%20leverage%20video%20inputs%20to%20steer%20human%20reaction%20synthesis%2C%20resulting%20in%20reaction%20motions%20that%20are%20mismatched%20with%20the%20content%20of%20video%20sequences.%20We%20reveal%20that%20this%20limitation%20arises%20from%20a%20severe%20relational%20distortion%20between%20visual%20observations%20and%20reaction%20types.%20In%20light%20of%20this%2C%20we%20propose%20MuSteerNet%2C%20a%20simple%20yet%20effective%20framework%20that%20generates%203D%20human%20reactions%20from%20videos%20via%20observation-reaction%20mutual%20steering.%20Specifically%2C%20we%20first%20propose%20a%20Prototype%20Feedback%20Steering%20mechanism%20to%20mitigate%20relational%20distortion%20by%20refining%20visual%20observations%20with%20a%20gated%20delta-rectification%20modulator%20and%20a%20relational%20margin%20constraint%2C%20guided%20by%20prototypical%20vectors%20learned%20from%20human%20reactions.%20We%20then%20introduce%20Dual-Coupled%20Reaction%20Refinement%20that%20fully%20leverages%20rectified%20visual%20cues%20to%20further%20steer%20the%20refinement%20of%20generated%20reaction%20motions%2C%20thereby%20effectively%20improving%20reaction%20quality%20and%20enabling%20MuSteerNet%20to%20achieve%20competitive%20performance.%20Extensive%20experiments%20and%20ablation%20studies%20validate%20the%20effectiveness%20of%20our%20method.%20Code%20coming%20soon%3A%20https%3A//github.com/zhouyuan888888/MuSteerNet.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20187v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMuSteerNet%253A%2520Human%2520Reaction%2520Generation%2520from%2520Videos%2520via%2520Observation-Reaction%2520Mutual%2520Steering%26entry.906535625%3DYuan%2520Zhou%2520and%2520Yongzhi%2520Li%2520and%2520Yanqi%2520Dai%2520and%2520Xingyu%2520Zhu%2520and%2520Yi%2520Tan%2520and%2520Qingshan%2520Xu%2520and%2520Beier%2520Zhu%2520and%2520Richang%2520Hong%2520and%2520Hanwang%2520Zhang%26entry.1292438233%3DVideo-driven%2520human%2520reaction%2520generation%2520aims%2520to%2520synthesize%25203D%2520human%2520motions%2520that%2520directly%2520react%2520to%2520observed%2520video%2520sequences%252C%2520which%2520is%2520crucial%2520for%2520building%2520human-like%2520interactive%2520AI%2520systems.%2520However%252C%2520existing%2520methods%2520often%2520fail%2520to%2520effectively%2520leverage%2520video%2520inputs%2520to%2520steer%2520human%2520reaction%2520synthesis%252C%2520resulting%2520in%2520reaction%2520motions%2520that%2520are%2520mismatched%2520with%2520the%2520content%2520of%2520video%2520sequences.%2520We%2520reveal%2520that%2520this%2520limitation%2520arises%2520from%2520a%2520severe%2520relational%2520distortion%2520between%2520visual%2520observations%2520and%2520reaction%2520types.%2520In%2520light%2520of%2520this%252C%2520we%2520propose%2520MuSteerNet%252C%2520a%2520simple%2520yet%2520effective%2520framework%2520that%2520generates%25203D%2520human%2520reactions%2520from%2520videos%2520via%2520observation-reaction%2520mutual%2520steering.%2520Specifically%252C%2520we%2520first%2520propose%2520a%2520Prototype%2520Feedback%2520Steering%2520mechanism%2520to%2520mitigate%2520relational%2520distortion%2520by%2520refining%2520visual%2520observations%2520with%2520a%2520gated%2520delta-rectification%2520modulator%2520and%2520a%2520relational%2520margin%2520constraint%252C%2520guided%2520by%2520prototypical%2520vectors%2520learned%2520from%2520human%2520reactions.%2520We%2520then%2520introduce%2520Dual-Coupled%2520Reaction%2520Refinement%2520that%2520fully%2520leverages%2520rectified%2520visual%2520cues%2520to%2520further%2520steer%2520the%2520refinement%2520of%2520generated%2520reaction%2520motions%252C%2520thereby%2520effectively%2520improving%2520reaction%2520quality%2520and%2520enabling%2520MuSteerNet%2520to%2520achieve%2520competitive%2520performance.%2520Extensive%2520experiments%2520and%2520ablation%2520studies%2520validate%2520the%2520effectiveness%2520of%2520our%2520method.%2520Code%2520coming%2520soon%253A%2520https%253A//github.com/zhouyuan888888/MuSteerNet.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20187v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MuSteerNet%3A%20Human%20Reaction%20Generation%20from%20Videos%20via%20Observation-Reaction%20Mutual%20Steering&entry.906535625=Yuan%20Zhou%20and%20Yongzhi%20Li%20and%20Yanqi%20Dai%20and%20Xingyu%20Zhu%20and%20Yi%20Tan%20and%20Qingshan%20Xu%20and%20Beier%20Zhu%20and%20Richang%20Hong%20and%20Hanwang%20Zhang&entry.1292438233=Video-driven%20human%20reaction%20generation%20aims%20to%20synthesize%203D%20human%20motions%20that%20directly%20react%20to%20observed%20video%20sequences%2C%20which%20is%20crucial%20for%20building%20human-like%20interactive%20AI%20systems.%20However%2C%20existing%20methods%20often%20fail%20to%20effectively%20leverage%20video%20inputs%20to%20steer%20human%20reaction%20synt {"title": "2K Retrofit: Entropy-Guided Efficient Sparse Refinement for High-Resolution 3D Geometry Prediction", "author": "Tianbao Zhang and Zhenyu Liang and Zhenbo Song and Nana Wang and Xiaomei Zhang and Xudong Cai and Zheng Zhu and Kejian Wu and Gang Wang and Zhaoxin Fan", "abstract": "High-resolution geometric prediction is essential for robust perception in autonomous driving, robotics, and AR/MR, but current foundation models are fundamentally limited by their scalability to real-world, high-resolution scenarios. Direct inference on 2K images with these models incurs prohibitive computational and memory demands, making practical deployment challenging. To tackle the issue, we present 2K Retrofit, a novel framework that enables efficient 2K-resolution inference for any geometric foundation model, without modifying or retraining the backbone. Our approach leverages fast coarse predictions and an entropy-based sparse refinement to selectively enhance high-uncertainty regions, achieving precise and high-fidelity 2K outputs with minimal overhead. Extensive experiments on widely used benchmark demonstrate that 2K Retrofit consistently achieves state-of-the-art accuracy and speed, bridging the gap between research advances and scalable deployment in high-resolution 3D vision applications. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.19964v1", "date": "2026-03-20", "relevancy": 2.3065, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6023}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5584}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.558}], "mailto": "mailto:haoxiang.li.2024@gmail.co {"title": "PanORama: Multiview Consistent Panoptic Segmentation in Operating Rooms", "author": "Tuna G\u00fcrb\u00fcz and Ege \u00d6zsoy and Tony Danjun Wang and Nassir Navab", "abstract": "Operating rooms (ORs) are cluttered, dynamic, highly occluded environments, where reliable spatial understanding is essential for situational awareness during complex surgical workflows. Achieving spatial understanding for panoptic segmentation from sparse multiview images poses a fundamental challenge, as limited visibility in a subset of views often leads to mispredictions across cameras. To this end, we introduce PanORama, the first panoptic segmentation for the operating room that is multiview-consistent by design. By modeling cross-view interactions at the feature level inside the backbone in a single forward pass, view consistency emerges directly rather than through post-hoc refinement. We evaluate on the MM-OR and 4D-OR datasets, achieving >70% Panoptic Quality (PQ) performance, and outperforming the previous state of the art. Importantly, PanORama is calibration-free, requiring no camera parameters, and generalizes to unseen camera viewpoints within any multiview configuration at inference time. By substantially enhancing multiview segmentation and, consequently, spatial understanding in the OR, we believe our approach opens new opportunities for surgical perception and assistance. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.19920v1", "date": "2026-03-20", "relevancy": 2.3033, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6062}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.577}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.545}] n%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19920v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPanORama%253A%2520Multiview%2520Consistent%2520Panoptic%2520Segmentation%2520in%2520Operating%2520Rooms%26entry.906535625%3DTuna%2520G%25C3%25BCrb%25C3%25BCz%2520and%2520Ege%2520%25C3%2596zsoy%2520and%2520Tony%2520Danjun%2520Wang%2520and%2520Nassir%2520Navab%26entry.1292438233%3DOperating%2520rooms%2520%2528ORs%2529%2520are%2520cluttered%252C%2520dynamic%252C%2520highly%2520occluded%2520environments%252C%2520where%2520reliable%2520spatial%2520understanding%2520is%2520essential%2520for%2520situational%2520awareness%2520during%2520complex%2520surgical%2520workflows.%2520Achieving%2520spatial%2520understanding%2520for%2520panoptic%2520segmentation%2520from%2520sparse%2520multiview%2520images%2520poses%2520a%2520fundamental%2520challenge%252C%2520as%2520limited%2520visibility%2520in%2520a%2520subset%2520of%2520views%2520often%2520leads%2520to%2520mispredictions%2520across%2520cameras.%2520To%2520this%2520end%252C%2520we%2520introduce%2520PanORama%252C%2520the%2520first%2520panoptic%2520segmentation%2520for%2520the%2520operating%2520room%2520that%2520is%2520multiview-consistent%2520by%2520design.%2520By%2520modeling%2520cross-view%2520interactions%2520at%2520the%2520feature%2520level%2520inside%2520the%2520backbone%2520in%2520a%2520single%2520forward%2520pass%252C%2520view%2520consistency%2520emerges%2520directly%2520rather%2520than%2520through%2520post-hoc%2520refinement.%2520We%2520evaluate%2520on%2520the%2520MM-OR%2520and%25204D-OR%2520datasets%252C%2520achieving%2520%253E70%2525%2520Panoptic%2520Quality%2520%2528PQ%2529%2520performance%252C%2520and%2520outperforming%2520the%2520previous%2520state%2520of%2520the%2520art.%2520Importantly%252C%2520PanORama%2520is%2520calibration-free%252C%2520requiring%2520no%2520camera%2520parameters%252C%2520and%2520generalizes%2520to%2520unseen%2520camera%2520viewpoints%2520within%2520any%2520multiview%2520configuration%2520at%2520inference%2520time.%2520By%2520substantially%2520enhancing%2520multiview%2520segmentation%2520and%252C%2520consequently%252C%2520spatial%2520understanding%2520in%2520the%2520OR%252C%2520we%2520believe%2520our%2520approach%2520opens%2520new%2520opportunities%2520for%2520surgical%2520perception%2520and%2520assistance.%2520Code%2520will%2520be%2520released%2520upon%2520acceptance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19920v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PanORama%3A%20Multiview%20Consistent%20Panoptic%20Segmentation%20in%20Operating%20Rooms&entry.906535625=Tuna%20G%C3%BCrb%C3%BCz%20and%20Ege%20%C3%96zsoy%20and%20Tony%20Danjun%20Wang%20and%20Nassir%20Navab&entry.1292438233=Operating%20rooms%20%28ORs%29%20are%20cluttered%2C%20dynamic%2C%20highly%20occluded%20environments%2C%20where%20reliable%20spatial%20understanding%20is%20essential%20for%20situational%20awareness%20during%20complex%20surgical%20workflows.%20Achieving%20spatial%20understanding%20for%20panoptic%20segmentation%20from%20sparse%20multiview%20images%20poses%20a%20fundamental%20challenge%2C%20as%20limited%20visibility%20in%20a%20subset%20of%20views%20often%20leads%20to%20mispredictions%20across%20cameras.%20To%20this%20end%2C%20we%20introduce%20PanORama%2C%20the%20first%20panoptic%20segmentation%20for%20the%20operating%20room%20that%20is%20multiview-consistent%20by%20design.%20By%20modeling%20cross-view%20interactions%20at%20the%20feature%20level%20inside%20the%20backbone%20in%20a%20single%20forward%20pass%2C%20view%20consistency%20emerges%20directly%20rather%20than%20through%20post-hoc%20refinement.%20We%20evaluate%20on%20the%20MM-OR%20and%204D-OR%20datasets%2C%20achieving%20%3E70%25%20Panoptic%20Quality%20%28PQ%29%20performance%2C%20and%20outperforming%20the%20previous%20state%2 {"title": "DecoVLN: Decoupling Observation, Reasoning, and Correction for Vision-and-Language Navigation", "author": "Zihao Xin and Wentong Li and Yixuan Jiang and Bin Wang and Runming Cong and Jie Qin and Shengjun Huang", "abstract": "Vision-and-Language Navigation (VLN) requires agents to follow long-horizon instructions and navigate complex 3D environments. However, existing approaches face two major challenges: constructing an effective long-term memory bank and overcoming the compounding errors problem. To address these issues, we propose DecoVLN, an effective framework designed for robust streaming perception and closed-loop control in long-horizon navigation. First, we formulate long-term memory construction as an optimization problem and introduce adaptive refinement mechanism that selects frames from a historical candidate pool by iteratively optimizing a unified scoring function. This function jointly balances three key criteria: semantic relevance to the instruction, visual diversity from the selected memory, and temporal coverage of the historical trajectory. Second, to alleviate compounding errors, we introduce a state-action pair-level corrective finetuning strategy. By leveraging geodesic distance between states to precisely quantify deviation from the expert trajectory, the agent collects high-quality state-action pairs in the trusted region while filtering out the polluted data with low relevance. This improves both the efficiency and stability of error correction. Extensive experiments demonstrate the effectiveness of DecoVLN, and we have deployed it in real-world environments.", "link": "http://arxiv.org/abs/2603.13133v2", "date": "2026-03-20", "relevancy": 2.2846, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5735}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxi {"title": "CFCML: A Coarse-to-Fine Crossmodal Learning Framework For Disease Diagnosis Using Multimodal Images and Tabular Data", "author": "Tianling Liu and Hongying Liu and Fanhua Shang and Lequan Yu and Tong Han and Liang Wan", "abstract": "In clinical practice, crossmodal information including medical images and tabular data is essential for disease diagnosis. There exists a significant modality gap between these data types, which obstructs advancements in crossmodal diagnostic accuracy. Most existing crossmodal learning (CML) methods primarily focus on exploring relationships among high-level encoder outputs, leading to the neglect of local information in images. Additionally, these methods often overlook the extraction of task-relevant information. In this paper, we propose a novel coarse-to-fine crossmodal learning (CFCML) framework to progressively reduce the modality gap between multimodal images and tabular data, by thoroughly exploring inter-modal relationships. At the coarse stage, we explore the relationships between multi-granularity features from various image encoder stages and tabular information, facilitating a preliminary reduction of the modality gap. At the fine stage, we generate unimodal and crossmodal prototypes that incorporate class-aware information, and establish hierarchical anchor-based relationship mining (HRM) strategy to further diminish the modality gap and extract discriminative crossmodal information. This strategy utilize modality samples, unimodal prototypes, and crossmodal prototypes as anchors to develop contrastive learning approaches, effectively enhancing inter-class disparity while reducing intra-class disparity from multiple perspectives. Experimental results indicate that our method outperforms the state-of-the-art (SOTA) methods, achieving improvements of 1.53% and 0.91% in AUC metrics on the MEN and Derm7pt datasets, respectively. The code is available at https://github.com/IsDling/CFCML.", "link": "http://arxiv.org/abs/2603.20016v1", "date": "2026-03-20", "relevancy": 2.2821, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5975}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5744}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.542}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CFCML%3A%20A%20Coarse-to-Fine%20Crossmodal%20Learning%20Framework%20For%20Disease%20Diagnosis%20Using%20Multimodal%20Images%20and%20Tabular%20Data&body=Title%3A%20CFCML%3A%20A%20Coarse-to-Fine%20Crossmodal%20Learning%20Framework%20For%20Disease%20Diagnosis%20Using%20Multimodal%20Images%20and%20Tabular%20Data%0AAuthor%3A%20Tianling%20Liu%20and%20Hongying%20Liu%20and%20Fanhua%20Shang%20and%20Lequan%20Yu%20and%20Tong%20Han%20and%20Liang%20Wan%0AAbstract%3A%20In%20clinical%20practice%2C%20crossmodal%20information%20including%20medical%20images%20and%20tabular%20data%20is%20essential%20for%20disease%20diagnosis.%20There%20exists%20a%20significant%20modality%20gap%20between%20these%20data%20types%2C%20which%20obstructs%20advancements%20in%20crossmodal%20diagnostic%20accuracy.%20Most%20existing%20crossmodal%20learning%20%28CML%29%20methods%20primarily%20focus%20on%20exploring%20relationships%20among%20high-level%20encoder%20outputs%2C%20leading%20to%20the%20neglect%20of%20local%20information%20in%20images.%20Additionally%2C%20these%20methods%20often%20overlook%20the%20extraction%20of%20task-relevant%20information.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20coarse-to-fine%20crossmodal%20learning%20%28CFCML%29%20framework%20to%20progressively%20reduce%20the%20modality%20gap%20between%20multimodal%20images%20and%20tabular%20data%2C%20by%20thoroughly%20exploring%20inter-modal%20relationships.%20At%20the%20coarse%20stage%2C%20we%20explore%20the%20relationships%20between%20multi-granularity%20features%20from%20various%20image%20encoder%20stages%20and%20tabular%20information%2C%20facilitating%20a%20preliminary%20reduction%20of%20the%20modality%20gap.%20At%20the%20fine%20stage%2C%20we%20generate%20unimodal%20and%20crossmodal%20prototypes%20that%20incorporate%20class-aware%20information%2C%20and%20establish%20hierarchical%20anchor-based%20relationship%20mining%20%28HRM%29%20strategy%20to%20further%20diminish%20the%20modality%20gap%20and%20extract%20discriminative%20crossmodal%20information.%20This%20strategy%20utilize%20modality%20samples%2C%20unimodal%20prototypes%2C%20and%20crossmodal%20prototypes%20as%20anchors%20to%20develop%20contrastive%20learning%20approaches%2C%20effectively%20enhancing%20inter-class%20disparity%20while%20reducing%20intra-class%20disparity%20from%20multiple%20perspectives.%20Experimental%20results%20indicate%20that%20our%20method%20outperforms%20the%20state-of-the-art%20%28SOTA%29%20methods%2C%20achieving%20improvements%20of%201.53%25%20and%200.91%25%20in%20AUC%20metrics%20on%20the%20MEN%20and%20Derm7pt%20datasets%2C%20respectively.%20The%20code%20is%20available%20at%20https%3A//github.com/IsDling/CFCML.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20016v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCFCML%253A%2520A%2520Coarse-to-Fine%2520Crossmodal%2520Learning%2520Framework%2520For%2520Disease%2520Diagnosis%2520Using%2520Multimodal%2520Images%2520and%2520Tabular%2520Data%26entry.906535625%3DTianling%2520Liu%2520and%2520Hongying%2520Liu%2520and%2520Fanhua%2520Shang%2520and%2520Lequan%2520Yu%2520and%2520Tong%2520Han%2520and%2520Liang%2520Wan%26entry.1292438233%3DIn%2520clinical%2520practice%252C%2520crossmodal%2520information%2520including%2520medical%2520images%2520and%2520tabular%2520data%2520is%2520essential%252 {"title": "Principled Multimodal Representation Learning", "author": "Xiaohao Liu and Xiaobo Xia and See-Kiong Ng and Tat-Seng Chua", "abstract": "Multimodal representation learning seeks to create a unified representation space by integrating diverse data modalities to improve multimodal understanding. Traditional methods often depend on pairwise contrastive learning, which relies on a predefined anchor modality, restricting alignment across all modalities. Recent advances have investigated the simultaneous alignment of multiple modalities, yet several challenges remain, such as limitations imposed by fixed anchor points and instability arising from optimizing the product of singular values. To address the challenges, in this paper, we propose Principled Multimodal Representation Learning (PMRL), a novel framework that achieves simultaneous alignment of multiple modalities without anchor dependency in a more stable manner. Specifically, grounded in the theoretical insight that full alignment corresponds to a rank-1 Gram matrix, PMRL optimizes the dominant singular value of the representation matrix to align modalities along a shared leading direction. We propose a softmax-based loss function that treats singular values as logits to prioritize the largest singular value. Besides, instance-wise contrastive regularization on the leading eigenvectors maintains inter-instance separability and prevents representation collapse. Extensive experiments across diverse tasks demonstrate PMRL's superiority compared to baseline methods. Source code can be found in https://github.com/Xiaohao-Liu/PMRL.", "link": "http://arxiv.org/abs/2507.17343v3", "date": "2026-03-20", "relevancy": 2.2737, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6031}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5468}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Principled%20Multimodal%20Representation%20Learning&body=Title%3A%20Principled%20Multimodal%20Representation%20Learning%0AAuthor%3A%20Xiaohao%20Liu%20and%20Xiaobo%20Xia%20and%20See-Kiong%20Ng%20and%20Tat-Seng%20Chua%0AAbstract%3A%20Multimodal%20representation%20learning%20seeks%20to%20create%20a%20unified%20representation%20space%20by%20integrating%20diverse%20data%20modalities%20to%20improve%20multimodal%20understanding.%20Traditional%20methods%20often%20depend%20on%20pairwise%20contrastive%20learning%2C%20which%20relies%20on%20a%20predefined%20anchor%20modality%2C%20restricting%20alignment%20across%20all%20modalities.%20Recent%20advances%20have%20investigated%20the%20simultaneous%20alignment%20of%20multiple%20modalities%2C%20yet%20several%20challenges%20remain%2C%20such%20as%20limitations%20imposed%20by%20fixed%20anchor%20points%20and%20instability%20arising%20from%20optimizing%20the%20product%20of%20singular%20values.%20To%20address%20the%20challenges%2C%20in%20this%20paper%2C%20we%20propose%20Principled%20Multimodal%20Representation%20Learning%20%28PMRL%29%2C%20a%20novel%20framework%20that%20achieves%20simultaneous%20alignment%20of%20multiple%20modalities%20without%20anchor%20dependency%20in%20a%20more%20stable%20manner.%20Specifically%2C%20grounded%20in%20the%20theoretical%20insight%20that%20full%20alignment%20corresponds%20to%20a%20rank-1%20Gram%20matrix%2C%20PMRL%20optimizes%20the%20dominant%20singular%20value%20of%20the%20representation%20matrix%20to%20align%20modalities%20along%20a%20shared%20leading%20direction.%20We%20propose%20a%20softmax-based%20loss%20function%20that%20treats%20singular%20values%20as%20logits%20to%20prioritize%20the%20largest%20singular%20value.%20Besides%2C%20instance-wise%20contrastive%20regularization%20on%20the%20leading%20eigenvectors%20maintains%20inter-instance%20separability%20and%20prevents%20representation%20collapse.%20Extensive%20experiments%20across%20diverse%20tasks%20demonstrate%20PMRL%27s%20superiority%20compared%20to%20baseline%20methods.%20Source%20code%20can%20be%20found%20in%20https%3A//github.com/Xiaohao-Liu/PMRL.%0ALink%3A%20http%3A//arxiv.org/abs/2507.17343v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrincipled%2520Multimodal%2520Representation%2520Learning%26entry.906535625%3DXiaohao%2520Liu%2520and%2520Xiaobo%2520Xia%2520and%2520See-Kiong%2520Ng%2520and%2520Tat-Seng%2520Chua%26entry.1292438233%3DMultimodal%2520representation%2520learning%2520seeks%2520to%2520create%2520a%2520unified%2520representation%2520space%2520by%2520integrating%2520diverse%2520data%2520modalities%2520to%2520improve%2520multimodal%2520understanding.%2520Traditional%2520methods%2520often%2520depend%2520on%2520pairwise%2520contrastive%2520learning%252C%2520which%2520relies%2520on%2520a%2520predefined%2520anchor%2520modality%252C%2520restricting%2520alignment%2520across%2520all%2520modalities.%2520Recent%2520advances%2520have%2520investigated%2520the%2520simultaneous%2520alignment%2520of%2520multiple%2520modalities%252C%2520yet%2520several%2520challenges%2520remain%252C%2520such%2520as%2520limitations%2520imposed%2520by%2520fixed%2520anchor%2520points%2520and%2520instability%2520arising%2520from%2520optimizing%2520the%2520product%2520of%2520singular%2520values.%2520To%2520address%2520the%2520challenges%252C%2520in%2520this%2520paper%252C%2520we%2520propose%2520Principled%2520Multimodal%2520Representation%2520Learning%2520%2528PMRL%2529%252C%2520a%2520novel%2520framework%2520that%2520achieves%2520simultaneous%2520alignment%2520of%2520multiple%2520modalities%2520without%2520anchor%2520dependency%2520in%2520a%2520more {"title": "Deep Autocorrelation Modeling for Time-Series Forecasting: Progress and Prospects", "author": "Hao Wang and Licheng Pan and Qingsong Wen and Jialin Yu and Zhichao Chen and Chunyuan Zheng and Xiaoxi Li and Zhixuan Chu and Chao Xu and Mingming Gong and Haoxuan Li and Yuan Lu and Zhouchen Lin and Philip Torr and Yan Liu", "abstract": "Autocorrelation is a defining characteristic of time-series data, where each observation is statistically dependent on its predecessors. In the context of deep time-series forecasting, autocorrelation arises in both the input history and the label sequences, presenting two central research challenges: (1) designing neural architectures that model autocorrelation in history sequences, and (2) devising learning objectives that model autocorrelation in label sequences. Recent studies have made strides in tackling these challenges, but a systematic survey examining both aspects remains lacking. To bridge this gap, this paper provides a comprehensive review of deep time-series forecasting from the perspective of autocorrelation modeling. In contrast to existing surveys, this work makes two distinctive contributions. First, it proposes a novel taxonomy that encompasses recent literature on both model architectures and learning objectives -- whereas prior surveys neglect or inadequately discuss the latter aspect. Second, it offers a thorough analysis of the motivations, insights, and progression of the surveyed literature from a unified, autocorrelation-centric perspective, providing a holistic overview of the evolution of deep time-series forecasting. The full list of papers and resources is available at https://github.com/Master-PLC/Awesome-TSF-Papers.", "link": "http://arxiv.org/abs/2603.19899v1", "date": "2026-03-20", "relevancy": 2.2603, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4551}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4513}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deep%20Autocorrelation%20Modeling%20for%20Time-Series%20Forecasting%3A%20Progress%20and%20Prospects&body=Title%3A%20Deep%20Autocorrelation%20Modeling%20for%20Time-Series%20Forecasting%3A%20Progress%20and%20Prospects%0AAuthor%3A%20Hao%20Wang%20and%20Licheng%20Pan%20and%20Qingsong%20Wen%20and%20Jialin%20Yu%20and%20Zhichao%20Chen%20and%20Chunyuan%20Zheng%20and%20Xiaoxi%20Li%20and%20Zhixuan%20Chu%20and%20Chao%20Xu%20and%20Mingming%20Gong%20and%20Haoxuan%20Li%20and%20Yuan%20Lu%20and%20Zhouchen%20Lin%20and%20Philip%20Torr%20and%20Yan%20Liu%0AAbstract%3A%20Autocorrelation%20is%20a%20defining%20characteristic%20of%20time-series%20data%2C%20where%20each%20observation%20is%20statistically%20dependent%20on%20its%20predecessors.%20In%20the%20context%20of%20deep%20time-series%20forecasting%2C%20autocorrelation%20arises%20in%20both%20the%20input%20history%20and%20the%20label%20sequences%2C%20presenting%20two%20central%20research%20challenges%3A%20%281%29%20designing%20neural%20architectures%20that%20model%20autocorrelation%20in%20history%20sequences%2C%20and%20%282%29%20devising%20learning%20objectives%20that%20model%20autocorrelation%20in%20label%20sequences.%20Recent%20studies%20have%20made%20strides%20in%20tackling%20these%20challenges%2C%20but%20a%20systematic%20survey%20examining%20both%20aspects%20remains%20lacking.%20To%20bridge%20this%20gap%2C%20this%20paper%20provides%20a%20comprehensive%20review%20of%20deep%20time-series%20forecasting%20from%20the%20perspective%20of%20autocorrelation%20modeling.%20In%20contrast%20to%20existing%20surveys%2C%20this%20work%20makes%20two%20distinctive%20contributions.%20First%2C% {"title": "VideoSeek: Long-Horizon Video Agent with Tool-Guided Seeking", "author": "Jingyang Lin and Jialian Wu and Jiang Liu and Ximeng Sun and Ze Wang and Xiaodong Yu and Jiebo Luo and Zicheng Liu and Emad Barsoum", "abstract": "Video agentic models have advanced challenging video-language tasks. However, most agentic approaches still heavily rely on greedy parsing over densely sampled video frames, resulting in high computational cost. We present VideoSeek, a long-horizon video agent that leverages video logic flow to actively seek answer-critical evidence instead of exhaustively parsing the full video. This insight allows the model to use far fewer frames while maintaining, or even improving, its video understanding capability. VideoSeek operates in a think-act-observe loop with a well-designed toolkit for collecting multi-granular video observations. This design enables query-aware exploration over accumulated observations and supports practical video understanding and reasoning. Experiments on four challenging video understanding and reasoning benchmarks demonstrate that VideoSeek achieves strong accuracy while using far fewer frames than prior video agents and standalone LMMs. Notably, VideoSeek achieves a 10.2 absolute points improvement on LVBench over its base model, GPT-5, while using 93% fewer frames. Further analysis highlights the significance of leveraging video logic flow, strong reasoning capability, and the complementary roles of toolkit design.", "link": "http://arxiv.org/abs/2603.20185v1", "date": "2026-03-20", "relevancy": 2.2597, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5695}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5695}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n {"title": "Investigating a Policy-Based Formulation for Endoscopic Camera Pose Recovery", "author": "Jan Emily Mangulabnan and Akshat Chauhan and Laura Fleig and Lalithkumar Seenivasan and Roger D. Soberanis-Mukul and S. Swaroop Vedula and Russell H. Taylor and Masaru Ishii and Gregory D. Hager and Mathias Unberath", "abstract": "In endoscopic surgery, surgeons continuously locate the endoscopic view relative to the anatomy by interpreting the evolving visual appearance of the intraoperative scene in the context of their prior knowledge. Vision-based navigation systems seek to replicate this capability by recovering camera pose directly from endoscopic video, but most approaches do not embody the same principles of reasoning about new frames that makes surgeons successful. Instead, they remain grounded in feature matching and geometric optimization over keyframes, an approach that has been shown to degrade under the challenging conditions of endoscopic imaging like low texture and rapid illumination changes. Here, we pursue an alternative approach and investigate a policy-based formulation of endoscopic camera pose recovery that seeks to imitate experts in estimating trajectories conditioned on the previous camera state. Our approach directly predicts short-horizon relative motions without maintaining an explicit geometric representation at inference time. It thus addresses, by design, some of the notorious challenges of geometry-based approaches, such as brittle correspondence matching, instability in texture-sparse regions, and limited pose coverage due to reconstruction failure. We evaluate the proposed formulation on cadaveric sinus endoscopy. Under oracle state conditioning, we compare short-horizon motion prediction quality to geometric baselines achieving lowest mean translation error and competitive rotational accuracy. We analyze robustness by grouping prediction windows according to texture richness and illumination change indicating reduced sensitivity to low-texture conditions. These findings suggest that a learned motion policy offers a viable alternative formulation for endoscopic camera pose recovery.", "link": "http://arxiv.org/abs/2603.20045v1", "date": "2026-03-20", "relevancy": 2.257, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.574}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5632}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.555}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Investigating%20a%20Policy-Based%20Formulation%20for%20Endoscopic%20Camera%20Pose%20Recovery&body=Title%3A%20Investigating%20a%20Policy-Based%20Formulation%20for%20Endoscopic%20Camera%20Pose%20Recovery%0AAuthor%3A%20Jan%20Emily%20Mangulabnan%20and%20Akshat%20Chauhan%20and%20Laura%20Fleig%20and%20Lalithkumar%20Seenivasan%20and%20Roger%20D.%20Soberanis-Mukul%20and%20S.%20Swaroop%20Vedula%20and%20Russell%20H.%20Taylor%20and%20Masaru%20Ishii%20and%20Gregory%20D.%20Hager%20and%20Mathias%20Unberath%0AAbstract%3A%20In%20endoscopic%20surgery%2C%20surgeons%20continuously%20locate%20the%20endoscopic%20view%20relative%20to%20the%20anatomy%20by%20interpreting%20the%20evolving%20visual%20appearance%20of%20the%20intraoperative%20scene%20in%20the%20context%20of%20their%20prior%20knowledge.%20Vision-based%20navigation%20systems%20seek%20to%20replicate%20this%20capability%20by%20recovering%20camera%20pose%20directly%20from%20endoscopic%20video%2C%20but%20most%20approaches%20do%20not%20embody%20the%20same%20principles%20of%20reasoning%20about%20new%20frames%20that%20makes%20surgeons%20successful.%20Instead%2C%20they%20remain%20grounded%20in%20feature%20matching%20and%20geometric%20optimization%20over%20keyframes%2C%20an%20approach%20that%20has%20been%20shown%20to%20degrade%20under%20the%20challenging%20conditions%20of%20endoscopic%20imaging%20like%20low%20texture%20and%20rapid%20illumination%20changes.%20Here%2C%20we%20pursue%20an%20alternative%20approach%20and%20investigate%20a%20policy-based%20formulation%20of%20endoscopic%20camera%20pose%20recovery%20that%20seeks%20to%20imitate%20experts%20in%20estimating%20trajectories%20conditioned%20on%20the%20previous%20camera%20state.%20Our%20approach%20directly%20predicts%20short-horizon%20relative%20motions%20without%20maintaining%20an%20explicit%20geometric%20representation%20at%20inference%20time.%20It%20thus%20addresses%2C%20by%20design%2C%20some%20of%20the%20notorious%20challenges%20of%20geometry-based%20approaches%2C%20such%20as%20brittle%20correspondence%20matching%2C%20instability%20in%20texture-sparse%20regions%2C%20and%20limited%20pose%20coverage%20due%20to%20reconstruction%20failure.%20We%20evaluate%20the%20proposed%20formulation%20on%20cadaveric%20sinus%20endoscopy.%20Under%20oracle%20state%20conditioning%2C%20we%20compare%20short-horizon%20motion%20prediction%20quality%20to%20geometric%20baselines%20achieving%20lowest%20mean%20translation%20error%20and%20competitive%20rotational%20accuracy.%20We%20analyze%20robustness%20by%20grouping%20prediction%20windows%20according%20to%20texture%20richness%20and%20illumination%20change%20indicating%20reduced%20sensitivity%20to%20low-texture%20conditions.%20These%20findings%20suggest%20that%20a%20learned%20motion%20policy%20offers%20a%20viable%20alternative%20formulation%20for%20endoscopic%20camera%20pose%20recovery.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20045v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInvestigating%2520a%2520Policy-Based%2520Formulation%2520for%2520Endoscopic%2520Camera%2520Pose%2520Recovery%26entry.906535625%3DJan%2520Emily%2520Mangulabnan%2520and%2520Akshat%2520Chauhan%252 {"title": "Failure Modes for Deep Learning-Based Online Mapping: How to Measure and Address Them", "author": "Michael Hubbertz and Qi Han and Tobias Meisen", "abstract": "Deep learning-based online mapping has emerged as a cornerstone of autonomous driving, yet these models frequently fail to generalize beyond familiar environments. We propose a framework to identify and measure the underlying failure modes by disentangling two effects: Memorization of input features and overfitting to known map geometries. We propose measures based on evaluation subsets that control for geographical proximity and geometric similarity between training and validation scenes. We introduce Fr\u00e9chet distance-based reconstruction statistics that capture per-element shape fidelity without threshold tuning, and define complementary failure-mode scores: a localization overfitting score quantifying the performance drop when geographic cues disappear, and a map geometry overfitting score measuring degradation as scenes become geometrically novel. Beyond models, we analyze dataset biases and contribute map geometry-aware diagnostics: A minimum-spanning-tree (MST) diversity measure for training sets and a symmetric coverage measure to quantify geometric similarity between splits. Leveraging these, we formulate an MST-based sparsification strategy that reduces redundancy and improves balancing and performance while shrinking training size. Experiments on nuScenes and Argoverse 2 across multiple state-of-the-art models yield more trustworthy assessment of generalization and show that map geometry-diverse and balanced training sets lead to improved performance. Our results motivate failure-mode-aware protocols and map geometry-centric dataset design for deployable online mapping.", "link": "http://arxiv.org/abs/2603.19852v1", "date": "2026-03-20", "relevancy": 2.2466, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5803}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.553}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5367}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Failure%20Modes%20for%20Deep%20Learning-Based%20Online%20Mapping%3A%20How%20to%20Measure%20and%20Address%20Them&body=Title%3A%20Failure%20Modes%20for%20Deep%20Learning-Based%20Online%20Mapping%3A%20How%20to%20Measure%20and%20Address%20Them%0AAuthor%3A%20Michael%20Hubbertz%20and%20Qi%20Han%20and%20Tobias%20Meisen%0AAbstract%3A%20Deep%20learning-based%20online%20mapping%20has%20emerged%20as%20a%20cornerstone%20of%20autonomous%20driving%2C%20yet%20these%20models%20frequently%20fail%20to%20generalize%20beyond%20familiar%20environments.%20We%20propose%20a%20framework%20to%20identify%20and%20measure%20the%20underlying%20failure%20modes%20by%20disentangling%20two%20effects%3A%20Memorization%20of%20input%20features%20and%20overfitting%20to%20known%20map%20geometries.%20We%20propose%20measures%20based%20on%20evaluation%20subsets%20that%20control%20for%20geographical%20proximity%20and%20geometric%20similarity%20between%20training%20and%20validation%20scenes.%20We%20introduce%20Fr%C3%A9chet%20distance-based%20reconstruction%20statistics%20that%20capture%20per-element%20shape%20fidelity%20without%20threshold%20tuning%2C%20and%20define%20complementary%20failure-mode%20scores%3A%20a%20localization%20overfitting%20score%20quantifying%20the%20performance%20drop%20when%20geographic%20cues%20disappear%2C%20and%20a%20map%20geometry%20overfitting%20score%20measuring%20degradation%20as%20scenes%20become%20geometrically%20novel.%20Beyond%20models%2C%20we%20analyze%20dataset%20biases%20and%20contribute%20map%20geometry-aware%20diagnostics%3A%20A%20minimum-spanning-tree%20%28MST%29%20diversity%20measure%20for%20training%20sets%20and%20a%20symmetric%20coverage%20measure%20to%20quantify%20geometric%20similarity%20between%20splits.%20Leveraging%20these%2C%20we%20formulate%20an%20MST-based%20sparsification%20strategy%20that%20reduces%20redundancy%20and%20improves%20balancing%20and%20performance%20while%20shrinking%20training%20size.%20Experiments%20on%20nuScenes%20and%20Argoverse%202%20across%20multiple%20state-of-the-art%20models%20yield%20more%20trustworthy%20assessment%20of%20generalization%20and%20show%20that%20map%20geometry-diverse%20and%20balanced%20training%20sets%20lead%20to%20improved%20performance.%20Our%20results%20motivate%20failure-mode-aware%20protocols%20and%20map%20geometry-centric%20dataset%20design%20for%20deployable%20online%20mapping.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19852v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFailure%2520Modes%2520for%2520Deep%2520Learning-Based%2520Online%2520Mapping%253A%2520How%2520to%2520Measure%2520and%2520Address%2520Them%26entry.906535625%3DMichael%2520Hubbertz%2520and%2520Qi%2520Han%2520and%2520Tobias%2520Meisen%26entry.1292438233%3DDeep%2520learning-based%2520online%2520mapping%2520has%2520emerged%2520as%2520a%2520cornerstone%2520of%2520autonomous%2520driving%252C%2520yet%2520these%2520models%2520frequently%2520fail%2520to%2520generalize%2520beyond%2520familiar%2520environments.%2520We%2520propose%2520a%2520framework%2520to%2520identify%2520and%2520measure%2520the%2520underlying%2520failure%2520modes%2520by%2520disentangling%2520two%2520effects%253A%2520Memorization%2520of%2520input%2520features%2520and%2520overfitting%2520to%2520known%2520map%2520geometries.%2520We%2520propose%2520measures%2520based%2520on%2520evaluation%2520subsets%2520that%2520control%2520for%2520geographical%2520proximity%2520and%2520geometric%2520si {"title": "PlanTwin: Privacy-Preserving Planning Abstractions for Cloud-Assisted LLM Agents", "author": "Guangsheng Yu and Qin Wang and Rui Lang and Shuai Su and Xu Wang", "abstract": "Cloud-hosted large language models (LLMs) have become the de facto planners in agentic systems, coordinating tools and guiding execution over local environments. In many deployments, however, the environment being planned over is private, containing source code, files, credentials, and metadata that cannot be exposed to the cloud. Existing solutions address adjacent concerns, such as execution isolation, access control, or confidential inference, but they do not control what cloud planners observe during planning: within the permitted scope, \\textit{raw environment state is still exposed}.\n  We introduce PlanTwin, a privacy-preserving architecture for cloud-assisted planning without exposing raw local context. The key idea is to project the real environment into a \\textit{planning-oriented digital twin}: a schema-constrained and de-identified abstract graph that preserves planning-relevant structure while removing reconstructable details. The cloud planner operates solely on this sanitized twin through a bounded capability interface, while a local gatekeeper enforces safety policies and cumulative disclosure budgets. We further formalize the privacy-utility trade-off as a capability granularity problem, define architectural privacy goals using $(k,\u03b4)$-anonymity and $\u03b5$-unlinkability, and mitigate compositional leakage through multi-turn disclosure control.\n  We implement PlanTwin as middleware between local agents and cloud planners and evaluate it on 60 agentic tasks across ten domains with four cloud planners. PlanTwin achieves full sensitive-item non-disclosure (SND = 1.0) while maintaining planning quality close to full-context systems: three of four planners achieve PQS $> 0.79$, and the full pipeline incurs less than 2.2\\% utility loss.", "link": "http://arxiv.org/abs/2603.18377v2", "date": "2026-03-20", "relevancy": 2.2369, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4621}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4479}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4322}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PlanTwin%3A%20Privacy-Preserving%20Planning%20Abstractions%20for%20Cloud-Assisted%20LLM%20Agents&body=Title%3A%20PlanTwin%3A%20Privacy-Preserving%20Planning%20Abstractions%20for%20Cloud-Assisted%20LLM%20Agents%0AAuthor%3A%20Guangsheng%20Yu%20and%20Qin%20Wang%20and%20Rui%20Lang%20and%20Shuai%20Su%20and%20Xu%20Wang%0AAbstract%3A%20Cloud-hosted%20large%20language%20models%20%28LLMs%29%20have%20become%20the%20de%20facto%20planners%20in%20agentic%20systems%2C%20coordinating%20tools%20and%20guiding%20execution%20over%20local%20environments.%20In%20many%20deployments%2C%20however%2C%20the%20environment%20being%20planned%20over%20is%20private%2C%20containing%20source%20code%2C%20files%2C%20credentials%2C%20and%20metadata%20that%20cannot%20be%20exposed%20to%20the%20cloud.%20Existing%20solutions%20address%20adjacent%20concerns%2C%20such%20as%20execution%20isolation%2C%20access%20control%2C%20or%20confidential%20inference%2C%20but%20they%20do%20not%20control%20what%20cloud%20planners%20observe%20during%20planning%3A%20within%20the%20permitted%20scope%2C%20%5Ctextit%7Braw%20environment%20state%20is%20still%20exposed%7D.%0A%20%20We%20introduce%20PlanTwin%2C%20a%20privacy-preserving%20architecture%20for%20cloud-assisted%20planning%20without%20exposing%20raw%20local%20context.%20The%20key%20idea%20is%20to%20project%20the%20real%20environment%20into%20a%20%5Ctextit%7Bplanning-oriented%20digital%20twin%7D%3A%20a%20schema-constrained%20and%20de-identified%20abstract%20graph%20that%20preserves%20planning-relevant%20structure%20while%20removing%20reconstructable%20details.%20The%20cloud%20planner%20operates%20solely%20on%20this%20sanitized%20twin%20through%20a%20bounded%20capability%20interface%2C%20while%20a%20local%20gatekeeper%20enforces%20safety%20policies%20and%20cumulative%20disclosure%20budgets.%20We%20further%20formalize%20the%20privacy-utility%20trade-off%20as%20a%20capability%20granularity%20problem%2C%20define%20architectural%20privacy%20goals%20using%20%24%28k%2C%CE%B4%29%24-anonymity%20and%20%24%CE%B5%24-unlinkability%2C%20and%20mitigate%20compositional%20leakage%20through%20multi-turn%20disclosure%20control.%0A%20%20We%20implement%20PlanTwin%20as%20middleware%20between%20local%20agents%20and%20cloud%20planners%20and%20evaluate%20it%20on%2060%20agentic%20tasks%20across%20ten%20domains%20with%20four%20cloud%20planners.%20PlanTwin%20achieves%20full%20sensitive-item%20non-disclosure%20%28SND%20%3D%201.0%29%20while%20maintaining%20planning%20quality%20close%20to%20full-context%20systems%3A%20three%20of%20four%20planners%20achieve%20PQS%20%24%3E%200.79%24%2C%20and%20the%20full%20pipeline%20incurs%20less%20than%202.2%5C%25%20utility%20loss.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18377v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPlanTwin%253A%2520Privacy-Preserving%2520Planning%2520Abstractions%2520for%2520Cloud-Assisted%2520LLM%2520Agents%26entry.906535625%3DGuangsheng%2520Yu%2520and%2520Qin%2520Wang%2520and%2520Rui%2520Lang%2520and%2520Shuai%2520Su%2520and%2520Xu%2520Wang%26entry.1292438233%3DCloud-hosted%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520become%2520the%2520de%2520facto%2520planners%2520in%2520agentic%2520systems%252C%2520coordinating%2520tools%2520and%2520guiding%2520execution%2520over%2520local%2520environments.%2520In%2520ma

{"title": "Pseudo-Simulation for Autonomous Driving", "author": "Wei Cao and Marcel Hallgarten and Tianyu Li and Daniel Dauner and Xunjiang Gu and Caojun Wang and Yakov Miron and Marco Aiello and Hongyang Li and Igor Gilitschenski and Boris Ivanovic and Marco Pavone and Andreas Geiger and Kashyap Chitta", "abstract": "Existing evaluation paradigms for Autonomous Vehicles (AVs) face critical limitations. Real-world evaluation is often challenging due to safety concerns and a lack of reproducibility, whereas closed-loop simulation can face insufficient realism or high computational costs. Open-loop evaluation, while being efficient and data-driven, relies on metrics that generally overlook compounding errors. In this paper, we propose pseudo-simulation, a novel paradigm that addresses these limitations. Pseudo-simulation operates on real datasets, similar to open-loop evaluation, but augments them with synthetic observations generated prior to evaluation using 3D Gaussian Splatting. Our key idea is to approximate potential future states the AV might encounter by generating a diverse set of observations that vary in position, heading, and speed. Our method then assigns a higher importance to synthetic observations that best match the AV's likely behavior using a novel proximity-based weighting scheme. This enables evaluating error recovery and the mitigation of causal confusion, as in closed-loop benchmarks, without requiring sequential interactive simulation. We show that pseudo-simulation is better correlated with closed-loop simulations ($R^2=0.8$) than the best existing open-loop approach ($R^2=0.7$). We also establish a public leaderboard for the community to benchmark new methodologies with pseudo-simulation. Our code is available at https://github.com/autonomousvision/navsim.", "link": "http://arxiv.org/abs/2506.04218v3", "date": "2026-03-20", "relevancy": 2.2283, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5701}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5658}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5432}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pseudo-Simulation%20for%20Autonomous%20Driving&body=Title%3A%20Pseudo-Simulation%20for%20Autonomous%20Driving%0AAuthor%3A%20Wei%20Cao%20and%20Marcel%20Hallgarten%20and%20Tianyu%20Li%20and%20Daniel%20Dauner%20and%20Xunjiang%20Gu%20and%20Caojun%20Wang%20and%20Yakov%20Miron%20and%20Marco%20Aiello%20and%20Hongyang%20Li%20and%20Igor%20Gilitschenski%20and%20Boris%20Ivanovic%20and%20Marco%20Pavone%20and%20Andreas%20Geiger%20and%20Kashyap%20Chitta%0AAbstract%3A%20Existing%20evaluation%20paradigms%20for%20Autonomous%20Vehicles%20%28AVs%29%20face%20critical%20limitations.%20Real-world%20evaluation%20is%20often%20challenging%20due%20to%20safety%20concerns%20and%20a%20lack%20of%20reproducibility%2C%20whereas%20closed-loop%20simulation%20can%20face%20insufficient%20realism%20or%20high%20computational%20costs.%20Open-loop%20evaluation%2C%20while%20being%20efficient%20and%20data-driven%2C%20relies%20on%20metrics%20that%20generally%20overlook%20compounding%20errors.%20In%20this%20paper%2C%20we%20propose%20pseudo-simulation%2C%20a%20novel%20paradigm%20that%20addresses%20these%20limitations.%20Pseudo-simulation%20operates%20on%20real%20datasets%2C%20similar%20to%20open-loop%20evaluation%2C%20but%20augments%20them%20with%20synthetic%20observations%20generated%20prior%20to%20evaluation%20using%203D%20Gaussian%20Splatting.%20Our%20key%20idea%20is%20to%20approximate%20potential%20future%20states%20the%20AV%20might%20encounter%20by%20generating%20a%20diverse%20set%20of%20observations%20that%20vary%20in%20position%2C%20heading%2C%20and%20speed.%20Our%20method%20then%20assigns%20a%20higher%20importance%20to%20synthetic%20observations%20that%20best%20match%20the%20AV%27s%20likely%20behavior%20using%20a%20novel%20proximity-based%20weighting%20scheme.%20This%20enables%20evaluating%20error%20recovery%20and%20the%20mitigation%20of%20causal%20confusion%2C%20as%20in%20closed-loop%20benchmarks%2C%20without%20requiring%20sequential%20interactive%20simulation.%20We%20show%20that%20pseudo-simulation%20is%20better%20correlated%20with%20closed-loop%20simulations%20%28%24R%5E2%3D0.8%24%29%20than%20the%20best%20existing%20open-loop%20approach%20%28%24R%5E2%3D0.7%24%29.%20We%20also%20establish%20a%20public%20leaderboard%20for%20the%20community%20to%20benchmark%20new%20methodologies%20with%20pseudo-simulation.%20Our%20code%20is%20available%20at%20https%3A//github.com/autonomousvision/navsim.%0ALink%3A%20http%3A//arxiv.org/abs/2506.04218v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPseudo-Simulation%2520for%2520Autonomous%2520Driving%26entry.906535625%3DWei%2520Cao%2520and%2520Marcel%2520Hallgarten%2520and%2520Tianyu%2520Li%2520and%2520Daniel%2520Dauner%2520and%2520Xunjiang%2520Gu%2520and%2520Caojun%2520Wang%2520and%2520Yakov%2520Miron%2520and%2520Marco%2520Aiello%2520and%2520Hongyang%2520Li%2520and%2520Igor%2520Gilitschenski%2520and%2520Boris%2520Ivanovic%2520and%2520Marco%2520Pavone%2520and%2520Andreas%2520Geiger%2520and%2520Kashyap%2520Chitta%26entry.1292438233%3DExisting%2520evaluation%2520paradigms%2520for%2520Autonomous%2520Vehicles%2520%2528AVs%2529%2520face%2520critical%2520limitations.%2520Real-world%2520evaluation%2520is%2520often%2520challenging%2520due%2520to%2520safety%2520concerns%2520and%2520a%2520lack%2520of%2520reproducibility%252C%2520whereas%2520closed-loop%2520simulation%2520can%2520face%2520insufficient%2520realism%2520or%2520high%2520computational%252 rg/abs/2506.04218v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Pseudo-Simulation%20for%20Autonomous%20Driving&entry.906535625=Wei%20Cao%20and%20Marcel%20Hallgarten%20and%20Tianyu%20Li%20and%20Daniel%20Dauner%20and%20Xunjiang%20Gu%20and%20Caojun%20Wang%20and%20Yakov%20Miron%20and%20Marco%20Aiello%20and%20Hongyang%20Li%20and%20Igor%20Gilitschenski%20and%20Boris%20Ivanovic%20and%20Marco%20Pavone%20and%20Andreas%20Geiger%20and%20Kashyap%20Chitta&entry.1292438233=Existing%20evaluation%20paradigms%20for%20Autonomous%20Vehicles%20%28AVs%29%20face%20critical%20limitations.%20Real-world%20evaluation%20is%20often%20challenging%20due%20to%20safety%20concerns%20and%20a%20lack%20of%20reproducibility%2C%20whereas%20closed-loop%20simulation%20can%20face%20insufficient%20realism%20or%20high%20computational%20costs.%20Open-loop%20evaluation%2C%20while%20being%20efficient%20and%20data-driven%2C%20relies%20on%20metrics%20that%20generally%20overlook%20compounding%20errors.%20In%20this%20paper%2C%20we%20propose%20pseudo-simulation%2C%20a%20novel%20paradigm%20that%20addresses%20these%20limitations.%20Pseudo-simulation%20operates%20on%20real%20datasets%2C%20similar%20to%20open-loop%20evaluation%2C%20but%20augments%20them%20with%20synthetic%20observations%20generated%20prior%20to%20evaluation%20using%203D%20Gaussian%20Splatting.%20Our%20key%20idea%20is%20to%20approximate%20potential%20future%20states%20the%20AV%20might%20encounter%20by%20generating%20a%20diverse%20set%20of%20observations%20that%20vary%20in%20position%2C%20heading%2C%20and%20speed.%20Our%20method%20then%20assigns%20a%20higher%20importance%20to%20synthetic%20observations%20that%20best%20match%20the%20AV%27s%20likely%20behavior%20using%20a%20novel%20proximity-based%20weighting%20scheme.%20This%20enables%20evaluating%20error%20recovery%20and%20the%20mitigation%20of%20causal%20confusion%2C%20as%20in%20closed-loop%20benc {"title": "Adaptive Greedy Frame Selection for Long Video Understanding", "author": "Yuning Huang and Fengqing Zhu", "abstract": "Large vision--language models (VLMs) are increasingly applied to long-video question answering, yet inference is often bottlenecked by the number of input frames and resulting visual tokens. Naive sparse sampling can miss decisive moments, while purely relevance-driven selection frequently collapses onto near-duplicate frames and sacrifices coverage of temporally distant evidence. We propose a question-adaptive greedy frame selection method that jointly optimizes query relevance and semantic representativeness under a fixed frame budget. Our approach constructs a 1~FPS candidate pool (capped at 1000) with exact timestamp alignment, embeds candidates in two complementary spaces (SigLIP for question relevance and DINOv2 for semantic similarity), and selects frames by greedily maximizing a weighted sum of a modular relevance term and a facility-location coverage term. This objective is normalized, monotone, and submodular, yielding a standard (1-1/e) greedy approximation guarantee. To account for question-dependent trade-offs between relevance and coverage, we introduce four preset strategies and a lightweight text-only question-type classifier that routes each query to its best-performing preset. Experiments on MLVU show consistent accuracy gains over uniform sampling and a strong recent baseline across frame budgets, with the largest improvements under tight budgets.", "link": "http://arxiv.org/abs/2603.20180v1", "date": "2026-03-20", "relevancy": 2.2282, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptive%20Greedy%20Frame%20Selection%20for%20Long%20Video%20Understanding&body=Title%3A%20Adaptive%20Greedy%20Frame%20Selection%20for%20Long%20Video%20Understanding%0AAuthor%3A%20Yuning%20Huang%20and%20Fengqing%20Zhu%0AAbstract%3A%20Large%20vision--language%20models%20%28VLMs%29%20are%20increasingly%20applied%20to%20long-video%20question%20answering%2C%20yet%20inference%20is%20often%20bottlenecked%20by%20the%20number%20of%20input%20frames%20and%20resulting%20visual%20tokens.%20Naive%20sparse%20sampling%20can%20miss%20decisive%20moments%2C%20while%20purely%20relevance-driven%20selection%20frequently%20collapses%20onto%20near-duplicate%20frames%20and%20sacrifices%20coverage%20of%20temporally%20distant%20evidence.%20We%20propose%20a%20question-adaptive%20greedy%20frame%20selection%20method%20that%20jointly%20optimizes%20query%20relevance%20and%20semantic%20representativeness%20under%20a%20fixed%20frame%20budget.%20Our%20approach%20constructs%20a%201~FPS%20candidate%20pool%20%28capped%20at%201000%29%20with%20exact%20timestamp%20alignment%2C%20embeds%20candidates%20in%20two%20complementary%20spaces%20%28SigLIP%20for%20question%20relevance%20and%20DINOv2%20for%20semantic%20similarity%29%2C%20and%20selects%20frames%20by%20greedily%20maximizing%20a%20weighted%20sum%20of%20a%20modular%20relevance%20term%20and%20a%20facility-location%20coverage%20term.%20This%20objective%20is%20normalized%2C%20monotone%2C%20and%20submodular%2C%20yielding%20a%20standard%20%281-1/e%29%20greedy%20approximation%20guarantee.%20To%20account%20for%20question-dependent%20trade-offs%20between%20relevance%20and%20coverage%2C%20we%20introduce%20four%20preset%20strategies%20and%20a%20lightweight%20text-only%20question-type%20classifier%20that%20routes%20each%20query%20to%20its%20best-performing%20preset.%20Experiments%20on%20MLVU%20show%20consistent%20accuracy%20gains%20over%20uniform%20sampling%20and%20a%20strong%20recent%20baseline%20across%20frame%20budgets%2C%20with%20the%20largest%20improvements%20under%20tight%20budgets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20180v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaptive%2520Greedy%2520Frame%2520Selection%2520for%2520Long%2520Video%2520Understanding%26entry.906535625%3DYuning%2520Huang%2520and%2520Fengqing%2520Zhu%26entry.1292438233%3DLarge%2520vision--language%2520models%2520%2528VLMs%2529%2520are%2520increasingly%2520applied%2520to%2520long-video%2520question%2520answering%252C%2520yet%2520inference%2520is%2520often%2520bottlenecked%2520by%2520the%2520number%2520of%2520input%2520frames%2520and%2520resulting%2520visual%2520tokens.%2520Naive%2520sparse%2520sampling%2520can%2520miss%2520decisive%2520moments%252C%2520while%2520purely%2520relevance-driven%2520selection%2520frequently%2520collapses%2520onto%2520near-duplicate%2520frames%2520and%2520sacrifices%2520coverage%2520of%2520temporally%2520distant%2520evidence.%2520We%2520propose%2520a%2520question-adaptive%2520greedy%2520frame%2520selection%2520method%2520that%2520jointly%2520optimizes%2520query%2520relevance%2520and%2520semantic%2520representativeness%2520under%2520a%2520fixed%2520frame%2520budget.%2520Our%2520approach%2520constructs%2520a%25201~FPS%2520candidate%2520pool%2520%2528capped%2520at%25201000%2529%2520with%2520exact%2520timestamp%2520alignment%252C%2520embeds%2520candidates%2520in%2520two%2520complementary%2520spaces%2520%2528SigLIP%2520for%2520question%2520relevance%2520and%2520DINOv2%2520for%2520semantic%2520similarity%2529%252C%2520and%2520selects%2520frames%2520by%2520greedily%2520maximizing%2520a%2520weighted%2520sum%2520of%2520a%2520modular%2520relevance%2520term%2520and%2520a%2520facility-location%2520coverage%2520term.%2520This%2520objective%2520is%2520normalized%252C%2520monotone%252C%2520and%2520submodular%252C%2520yielding%2520a%2520standard%2520%25281-1/e%2529%2520greedy%2520approximation%2520guarantee.%2520To%2520account%2520for%2520question-dependent%2520trade-offs%2520between%2520relevance%2520and%2520coverage%252C%2520we%2520introduce%2520four%2520preset%2520strategies%2520and%2520a%2520lightweight%2520text-only%2520question-type%2520classifier%2520that%2520routes%2520each%2520query%2520to%2520its%2520best-performing%2520preset.%2520Experiments%2520on%2520MLVU%2520show%2520consistent%2520accuracy%2520gains%2520over%2520uniform%2520sampling%2520and%2520a%2520strong%2520recent%2520baseline%2520across%2520frame%2520budgets%252C%2520with%2520the%2520largest%2520improvements%2520under%2520tight%2520budgets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20180v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Adaptive%20Greedy%20Frame%20Selection%20for%20Long%20Video%20Understanding&entry.906535625=Yuning%20Huang%20and%20Fengqing%20Zhu&entry.1292438233=Large%20vision--language%20models%20%28VLMs%29%20are%20increasingly%20applied%20to%20long-video%20question%20answering%2C%20yet%20inference%20is%20often%20bottlenecked%20by%20the%20number%20of%20input%20frames%20and%20resulting%20visual%20tokens.%20Naive%20sparse%20sampling%20can%20miss%20decisive%20moments%2C%20while%20purely%20relevance-driven%20selection%20frequently%20collapses%20onto%20near-duplicate%20frames%20and%20sacrifices%20coverage%20of%20temporally%20distant%20evidence.%20We%20propose%20a%20question-adaptive%20greedy%20frame%20selection%20method%20that%20jointly%20optimizes%20query%20relevance%20and%20semantic%20representativeness%20under%20a%20fixed%20frame%20budget.%20Our%20approach%20constructs%20a%201~FPS%20candidate%20pool%20%28capped%20at%201000%29%20with%20exact%20timestamp%20alignment%2C%20embeds%20candidates%20in%20two%20complementary%20spaces%20%28SigLIP%20for%20question%20relevance%20and%20DINOv2%20for%20semantic%20similarity%29%2C%20and%20selects%20frames%20by%20greedily%20maximizing%20a%20weighted%20sum%20of%20a%20modular%20relevance%20term%20and%20a%20facility-location%20coverage%20term.%20This%20objective%20is%20normalized%2C%20monotone%2C%20and%20submodular%2C%20yielding%20a%20standard%20%281-1/e%29%20greedy%20approximation%20guarantee.%20To%20account%20for%20question-dependent%20trade-offs%20between%20relevance%20and%20coverage%2C%20we%20introduce%20four%20preset%20strategies%20and%20a%20lightweight%20text-only%20question-type%20classifier%20that%20routes%20each%20query%20to%20its%20best-performing%20preset.%20Experiments%20on%20MLVU%20show%20consistent%20accuracy%20gains%20over%20uniform%20sampling%20and%20a%20strong%20recent%20baseline%20across%20frame%20budgets%2C%20with%20the%20largest%20improvements%20under%20tight%20budgets.&entry.1838667208=http%3A//arxiv.org/abs/2603.20180v1&entry.124074799=Read"},
{"title": "AGILE: A Comprehensive Workflow for Humanoid Loco-Manipulation Learning", "author": "Huihua Zhao and Rafael Cathomen and Lionel Gulich and Wei Liu and Efe Arda Ongan and Michael Lin and Shalin Jain and Soha Pouya and Yan Chang", "abstract": "Recent advances in reinforcement learning (RL) have enabled impressive humanoid behaviors in simulation, yet transferring these results to new robots remains challenging. In many real deployments, the primary bottleneck is no longer simulation throughput or algorithm design, but the absence of systematic infrastructure that links environment verification, training, evaluation, and deployment in a coherent loop.\n  To address this gap, we present AGILE, an end-to-end workflow for humanoid RL that standardizes the policy-development lifecycle to mitigate common sim-to-real failure modes. AGILE comprises four stages: (1) interactive environment verification, (2) reproducible training, (3) unified evaluation, and (4) descriptor-driven deployment via robot/task configuration descriptors. For evaluation stage, AGILE supports both scenario-based tests and randomized rollouts under a shared suite of motion-quality diagnostics, enabling automated regression testing and principled robustness assessment. AGILE also incorporates a set of training stabilizations and algorithmic enhancements in training stage to improve optimization stability and sim-to-real transfer.\n  With this pipeline in place, we validate AGILE across five representative humanoid skills spanning locomotion, recovery, motion imitation, and loco-manipulation on two hardware platforms (Unitree G1 and Booster T1), achieving consistent sim-to-real transfer. Overall, AGILE shows that a standardized, end-to-end workflow can substantially improve the reliability and reproducibility of humanoid RL development.", "link": "http://arxiv.org/abs/2603.20147v1", "date": "2026-03-20", "relevancy": 2.2271, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5972}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5564}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AGILE%3A%20A%20Comprehensive%20Workflow%20for%20Humanoid%20Loco-Manipulation%20Learning&body=Title%3A%20AGILE%3A%20A%20Comprehensive%20Workflow%20for%20Humanoid%20Loco-Manipulation%20Learning%0AAuthor%3A%20Huihua%20Zhao%20and%20Rafael%20Cathomen%20and%20Lionel%20Gulich%20and%20Wei%20Liu%20and%20Efe%20Arda%20Ongan%20and%20Michael%20Lin%20and%20Shalin%20Jain%20and%20Soha%20Pouya%20and%20Yan%20Chang%0AAbstract%3A%20Recent%20advances%20in%20reinforcement%20learning%20%28RL%29%20have%20enabled%20impressive%20humanoid%20behaviors%20in%20simulation%2C%20yet%20transferring%20these%20results%20to%20new%20robots%20remains%20challenging.%20In%20many%20real%20deployments%2C%20the%20primary%20bottleneck%20is%20no%20longer%20simulation%20throughput%20or%20algorithm%20design%2C%20but%20the%20absence%20of%20systematic%20infrastructure%20that%20links%20environment%20verification%2C%20training%2C%20evaluation%2C%20and%20deployment%20in%20a%20coherent%20loop.%0A%20%20To%20address%20this%20gap%2C%20we%20present%20AGILE%2C%20an%20end-to-end%20workflow%20for%20humanoid%20RL%20that%20standardizes%20the%20policy-development%20lifecycle%20to%20mitigate%20common%20sim-to-real%20failure%20modes.%20AGILE%20comprises%20four%20stages%3A%20%281%29%20interactive%20environment%20verification%2C%20%282%29%20reproducible%20training%2C%20%283%29%20unified%20evaluation%2C%20and%20%284%29%20descriptor-driven%20deployment%20via%20robot/task%20configuration%20descriptors.%20For%20evaluation%20stage%2C%20AGILE%20supports%20both%20scenario-based%20tests%20and%20randomized%20rollouts%20under%20a%20shared%20suite%20of%20motion-quality%20diagnostics%2C%20enabling%20automated%20regression%20testing%20and%20principled%20robustness%20assessment.%20AGILE%20also%20incorporates%20a%20set%20of%20training%20stabilizations%20and%20algorithmic%20enhancements%20in%20training%20stage%20to%20improve%20optimization%20stability%20and%20sim-to-real%20transfer.%0A%20%20With%20this%20pipeline%20in%20place%2C%20we%20validate%20AGILE%20across%20five%20representative%20humanoid%20skills%20spanning%20locomotion%2C%20recovery%2C%20motion%20imitation%2C%20and%20loco-manipulation%20on%20two%20hardware%20platforms%20%28Unitree%20G1%20and%20Booster%20T1%29%2C%20achieving%20consistent%20sim-to-real%20transfer.%20Overall%2C%20AGILE%20shows%20that%20a%20standardized%2C%20end-to-end%20workflow%20can%20substantially%20improve%20the%20reliability%20and%20reproducibility%20of%20humanoid%20RL%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20147v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAGILE%253A%2520A%2520Comprehensive%2520Workflow%2520for%2520Humanoid%2520Loco-Manipulation%2520Learning%26entry.906535625%3DHuihua%2520Zhao%2520and%2520Rafael%2520Cathomen%2520and%2520Lionel%2520Gulich%2520and%2520Wei%2520Liu%2520and%2520Efe%2520Arda%2520Ongan%2520and%2520Michael%2520Lin%2520and%2520Shalin%2520Jain%2520and%2520Soha%2520Pouya%2520and%2520Yan%2520Chang%26entry.1292438233%3DRecent%2520advances%2520in%2520reinforcement%2520learning%2520%2528RL%2529%2520have%2520enabled%2520impressive%2520humanoid%2520behaviors%2520in%2520simulation%252C%2520yet%2520transferring%2520these%2520results%2520to%2520new%2520robots%2520remains%2520challenging.%2520In%2520many%2520real%2520deployments%252C%2520the%2520primary%2520bottleneck%2520is%2520no%2520longer%2520simulation%2520throughput%2520or%2520algorithm%2520design%252C%2520but%2520the%2520absence%2520of%2520systematic%2520infrastructure%2520that%2520links%2520environment%2520verification%252C%2520training%252C%2520evaluation%252C%2520and%2520deployment%2520in%2520a%2520coherent%2520loop.%250A%2520%2520To%2520address%2520this%2520gap%252C%2520we%2520present%2520AGILE%252C%2520an%2520end-to-end%2520workflow%2520for%2520humanoid%2520RL%2520that%2520standardizes%2520the%2520policy-development%2520lifecycle%2520to%2520mitigate%2520common%2520sim-to-real%2520failure%2520modes.%2520AGILE%2520comprises%2520four%2520stages%253A%2520%25281%2529%2520interactive%2520environment%2520verification%252C%2520%25282%2529%2520reproducible%2520training%252C%2520%25283%2529%2520unified%2520evaluation%252C%2520and%2520%25284%2529%2520descriptor-driven%2520deployment%2520via%2520robot/task%2520configuration%2520descriptors.%2520For%2520evaluation%2520stage%252C%2520AGILE%2520supports%2520both%2520scenario-based%2520tests%2520and%2520randomized%2520rollouts%2520under%2520a%2520shared%2520suite%2520of%2520motion-quality%2520diagnostics%252C%2520enabling%2520automated%2520regression%2520testing%2520and%2520principled%2520robustness%2520assessment.%2520AGILE%2520also%2520incorporates%2520a%2520set%2520of%2520training%2520stabilizations%2520and%2520algorithmic%2520enhancements%2520in%2520training%2520stage%2520to%2520improve%2520optimization%2520stability%2520and%2520sim-to-real%2520transfer.%250A%2520%2520With%2520this%2520pipeline%2520in%2520place%252C%2520we%2520validate%2520AGILE%2520across%2520five%2520representative%2520humanoid%2520skills%2520spanning%2520locomotion%252C%2520recovery%252C%2520motion%2520imitation%252C%2520and%2520loco-manipulation%2520on%2520two%2520hardware%2520platforms%2520%2528Unitree%2520G1%2520and%2520Booster%2520T1%2529%252C%2520achieving%2520consistent%2520sim-to-real%2520transfer.%2520Overall%252C%2520AGILE%2520shows%2520that%2520a%2520standardized%252C%2520end-to-end%2520workflow%2520can%2520substantially%2520improve%2520the%2520reliability%2520and%2520reproducibility%2520of%2520humanoid%2520RL%2520development.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20147v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AGILE%3A%20A%20Comprehensive%20Workflow%20for%20Humanoid%20Loco-Manipulation%20Learning&entry.906535625=Huihua%20Zhao%20and%20Rafael%20Cathomen%20and%20Lionel%20Gulich%20and%20Wei%20Liu%20and%20Efe%20Arda%20Ongan%20and%20Michael%20Lin%20and%20Shalin%20Jain%20and%20Soha%20Pouya%20and%20Yan%20Chang&entry.1292438233=Recent%20advances%20in%20reinforcement%20learning%20%28RL%29%20have%20enabled%20impressive%20humanoid%20behaviors%20in%20simulation%2C%20yet%20transferring%20these%20results%20to%20new%20robots%20remains%20challenging.%20In%20many%20real%20deployments%2C%20the%20primary%20bottleneck%20is%20no%20longer%20simulation%20throughput%20or%20algorithm%20design%2C%20but%20the%20absence%20of%20systematic%20infrastructure%20that%20links%20environment%20verification%2C%20training%2C%20evaluation%2C%20and%20deployment%20in%20a%20coherent%20loop.%0A%20%20To%20address%20this%20gap%2C%20we%20present%20AGILE%2C%20an%20end-to-end%20workflow%20for%20humanoid%20RL%20that%20standardizes%20the%20policy-development%20lifecycle%20to%20mitigate%20common%20sim-to-real%20failure%20modes.%20AGILE%20comprises%20four%20stages%3A%20%281%29%20interactive%20environment%20verification%2C%20%282%29%20reproducible%20training%2C%20%283%29%20unified%20evaluation%2C%20and%20%284%29%20descriptor-driven%20deployment%20via%20robot/task%20configuration%20descriptors.%20For%20evaluation%20stage%2C%20AGILE%20supports%20both%20scenario-based%20tests%20and%20randomized%20rollouts%20under%20a%20shared%20suite%20of%20motion-quality%20diagnostics%2C%20enabling%20automated%20regression%20testing%20and%20principled%20robustness%20assessment.%20AGILE%20also%20incorporates%20a%20set%20of%20training%20stabilizations%20and%20algorithmic%20enhancements%20in%20training%20stage%20to%20impr {"title": "A Unified Framework to Quantify Cultural Intelligence of AI", "author": "Sunipa Dev and Vinodkumar Prabhakaran and Rutledge Chin Feman and Aida Davani and Remi Denton and Charu Kalia and Piyawat Lertvittayakumjorn and Madhurima Maji and Rida Qadri and Negar Rostamzadeh and Renee Shelby and Romina Stella and Hayk Stepanyan and Erin van Liemt and Aishwarya Verma and Oscar Wahltinez and Edem Wornyo and Andrew Zaldivar and Sa\u0161ka Mojsilovi\u0107", "abstract": "As generative AI technologies are increasingly being launched across the globe, assessing their competence to operate in different cultural contexts is exigently becoming a priority. While recent years have seen numerous and much-needed efforts on cultural benchmarking, these efforts have largely focused on specific aspects of culture and evaluation. While these efforts contribute to our understanding of cultural competence, a unified and systematic evaluation approach is needed for us as a field to comprehensively assess diverse cultural dimensions at scale. Drawing on measurement theory, we present a principled framework to aggregate multifaceted indicators of cultural capabilities into a unified assessment of cultural intelligence. We start by developing a working definition of culture that includes identifying core domains of culture. We then introduce a broad-purpose, systematic, and extensible framework for assessing cultural intelligence of AI systems. Drawing on theoretical framing from psychometric measurement validity theory, we decouple the background concept (i.e., cultural intelligence) from its operationalization via measurement. We conceptualize cultural intelligence as a suite of core capabilities spanning diverse domains, which we then operationalize through a set of indicators designed for reliable measurement. Finally, we identify the considerations, challenges, and research pathways to meaningfully measure these indicators, specifically focusing on data collection, probing strategies, and evaluation metrics.", "link": "http://arxiv.org/abs/2603.01211v2", "date": "2026-03-20", "relevancy": 2.2161, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4557}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4408}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4332}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Unified%20Framework%20to%20Quantify%20Cultural%20Intelligence%20of%20AI&body=Title%3A%20A%20Unified%20Framework%20to%20Quantify%20Cultural%20Intelligence%20of%20AI%0AAuthor%3A%20Sunipa%20Dev%20and%20Vinodkumar%20Prabhakaran%20and%20Rutledge%20Chin%20Feman%20and%20Aida%20Davani%20and%20Remi%20Denton%20and%20Charu%20Kalia%20and%20Piyawat%20Lertvittayakumjorn%20and%20Madhurima%20Maji%20and%20Rida%20Qadri%20and%20Negar%20Rostamzadeh%20and%20Renee%20Shelby%20and%20Romina%20Stella%20and%20Hayk%20Stepanyan%20and%20Erin%20van%20Liemt%20and%20Aishwarya%20Verma%20and%20Oscar%20Wahltinez%20and%20Edem%20Wornyo%20and%20Andrew%20Zaldivar%20and%20Sa%C5%A1ka%20Mojsilovi%C4%87%0AAbstract%3A%20As%20generative%20AI%20technologies%20are%20increasingly%20being%20launched%20across%20the%20globe%2C%20assessing%20their%20competence%20to%20operate%20in%20different%20cultural%20contexts%20is%20exigently%20becoming%20a%20priority.%20While%20recent%20years%20have%20seen%20numerous%20and%20much-needed%20efforts%20on%20cultural%20benchmarking%2C%20these%20efforts%20have%20largely%20focused%20on%20specific%20aspects%20of%20culture%20and%20evaluation.%20While%20these%20efforts%20contribute%20to%20our%20understanding%20of%20cultural%20competence%2C%20a%20unified%20and%20systematic%20evaluation%20approach%20is%20needed%20for%20us%20as%20a%20field%20to%20comprehensively%20assess%20divers {"title": "GO-GenZip: Goal-Oriented Generative Sampling and Hybrid Compression", "author": "Pietro Talli and Qi Liao and Alessandro Lieto and Parijat Bhattacharjee and Federico Chiariotti and Andrea Zanella", "abstract": "Current network data telemetry pipelines consist of massive streams of fine-grained Key Performance Indicators (KPIs) from multiple distributed sources towards central aggregators, making data storage, transmission, and real-time analysis increasingly unsustainable. This work presents a generative AI (GenAI)-driven sampling and hybrid compression framework that redesigns network telemetry from a goal-oriented perspective. Unlike conventional approaches that passively compress fully observed data, our approach jointly optimizes what to observe and how to encode it, guided by the relevance of information to downstream tasks. The framework integrates adaptive sampling policies, using adaptive masking techniques, with generative modeling to identify patterns and preserve critical features across temporal and spatial dimensions. The selectively acquired data are further processed through a hybrid compression scheme that combines traditional lossless coding with GenAI-driven, lossy compression. Experimental results on real network datasets demonstrate over 50$\\%$ reductions in sampling and data transfer costs, while maintaining comparable reconstruction accuracy and goal-oriented analytical fidelity in downstream tasks.", "link": "http://arxiv.org/abs/2603.20109v1", "date": "2026-03-20", "relevancy": 2.2088, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5562}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5535}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5389}], "mail h%2520GenAI-driven%252C%2520lossy%2520compression.%2520Experimental%2520results%2520on%2520real%2520network%2520datasets%2520demonstrate%2520over%252050%2524%255C%2525%2524%2520reductions%2520in%2520sampling%2520and%2520data%2520transfer%2520costs%252C%2520while%2520maintaining%2520comparable%2520reconstruction%2520accuracy%2520and%2520goal-oriented%2520analytical%2520fidelity%2520in%2520downstream%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20109v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GO-GenZip%3A%20Goal-Oriented%20Generative%20Sampling%20and%20Hybrid%20Compression&entry.906535625=Pietro%20Talli%20and%20Qi%20Liao%20and%20Alessandro%20Lieto%20and%20Parijat%20Bhattacharjee%20and%20Federico%20Chiariotti%20and%20Andrea%20Zanella&entry.1292438233=Current%20network%20data%20telemetry%20pipelines%20consist%20of%20massive%20streams%20of%20fine-grained%20Key%20Performance%20Indicators%20%28KPIs%29%20from%20multiple%20distributed%20sources%20towards%20central%20aggregators%2C%20making%20data%20storage%2C%20transmission%2C%20and%20real-time%20analysis%20increasingly%20unsustainable.%20This%20work%20presents%20a%20generative%20AI%20%28GenAI%29-driven%20sampling%20and%20hybrid%20compression%20framework%20that%20redesigns%20network%20telemetry%20from%20a%20goal-oriented%20perspective.%20Unlike%20conventional%20approaches%20that%20passively%20compress%20fully%20observed%20data%2C%20our%20approach%20jointly%20optimizes%20what%20to%20observe%20and%20how%20to%20encode%20it%2C%20guided%20by%20the%20relevance%20of%20information%20to%20downstream%20tasks.%20The%20framework%20integrates%20adaptive%20sampling%20policies%2C%20using%20adaptive%20masking%20techniques%2C%20with%20generative%20modeling%20to%20identify%20patterns%20and%20preserve%20critical%20features%20across%20temporal%20and%20spatial%20dimensions.%20The%20selectively%20acquired%20data%20are%2 {"title": "GazeShift: Unsupervised Gaze Estimation and Dataset for VR", "author": "Gil Shapira and Ishay Goldin and Evgeny Artyomov and Donghoon Kim and Yosi Keller and Niv Zehngut", "abstract": "Gaze estimation is instrumental in modern virtual reality (VR) systems. Despite significant progress in remote-camera gaze estimation, VR gaze research remains constrained by data scarcity, particularly the lack of large-scale, accurately labeled datasets captured with the off-axis camera configurations typical of modern headsets. Gaze annotation is difficult since fixation on intended targets cannot be guaranteed. To address these challenges, we introduce VRGaze, the first large-scale off-axis gaze estimation dataset for VR, comprising 2.1 million near-eye infrared images collected from 68 participants. We further propose GazeShift, an attention-guided unsupervised framework for learning gaze representations without labeled data. Unlike prior redirection-based methods that rely on multi-view or 3D geometry, GazeShift is tailored to near-eye imagery, achieving effective gaze-appearance disentanglement in a compact, real-time model. GazeShift embeddings can be optionally adapted to individual users via lightweight few-shot calibration, achieving a 1.84\u00b0 mean error on VRGaze. On the remote-camera MPIIGaze dataset, the model achieves a 7.15\u00b0 person-agnostic error, doing so with 10x fewer parameters and 35x fewer FLOPs than baseline methods. Deployed natively on a VR headset GPU, inference takes only 5 ms. Combined with demonstrated robustness to illumination changes, these results highlight GazeShift as a label-efficient, real-time solution for VR gaze tracking. Project code and the VRGaze dataset are released at https://github.com/gazeshift3/gazeshift", "link": "http://arxiv.org/abs/2603.07832v2", "date": "2026-03-20", "relevancy": 2.1862, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5506}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5496}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GazeShift%3A%20Unsupervised%20Gaze%20Estimation%20and%20Dataset%20for%20VR&body=Title%3A%20GazeShift%3A%20Unsupervised%20Gaze%20Estimation%20and%20Dataset%20for%20VR%0AAuthor%3A%20Gil%20Shapira%20and%20Ishay%20Goldin%20and%20Evgeny%20Artyomov%20and%20Donghoon%20Kim%20and%20Yosi%20Keller%20and%20Niv%20Zehngut%0AAbstract%3A%20Gaze%20estimation%20is%20instrumental%20in%20modern%20virtual%20reality%20%28VR%29%20systems.%20Despite%20significant%20progress%20in%20remote-camera%20gaze%20estimation%2C%20VR%20gaze%20research%20remains%20constrained%20by%20data%20scarcity%2C%20particularly%20the%20lack%20of%20large-scale%2C%20accurately%20labeled%20datasets%20captured%20with%20the%20off-axis%20camera%20configurations%20typical%20of%20modern%20headsets.%20Gaze%20annotation%20is%20difficult%20since%20fixation%20on%20intended%20targets%20cannot%20be%20guaranteed.%20To%20address%20these%20challenges%2C%20we%20introduce%20VRGaze%2C%20the%20first%20large-scale%20off-axis%20gaze%20estimation%20dataset%20for%20VR%2C%20comprising%202.1%20million%20near-eye%20infrared%20images%20collected%20from%2068%20participants.%20We%20further%20propose%20GazeShift%2C%20an%20attention-guided%20unsupervised%20framework%20for%20learning%20gaze%20representations%20without%20labeled%20data.%20Unlike%20prior%20redirection-based%20methods%20that%20rely%20on%20multi-view%20or%203D%20geometry%2C%20GazeShift%20is%20tailored%20to%20near-eye%20imagery%2C%20achieving%20effective%20gaze-appearance%20disentanglement%20in%20a%20compact%2C%20real-time%20model.%20GazeShift%20embeddings%20can%20be%20optionally%20adapted%20to%20individual%20users%20via%20lightweight%20few-shot%20calibration%2C%20achieving%20a%201.84%C2%B0%20mean%20error%20on%20VRGaze.%20On%20the%20remote-camera%20MPIIGaze%20dataset%2C%20the%20model%20achieves%20a%207.15%C2%B0%20person-agnostic%20error%2C%20doing%20so%20with%2010x%20fewer%20parameters%20and%2035x%20fewer%20FLOPs%20than%20baseline%20methods.%20Deployed%20natively%20on%20a%20VR%20headset%20GPU%2C%20inference%20takes%20only%205%20ms.%20Combined%20with%20demonstrated%20robustness%20to%20illumination%20changes%2C%20these%20results%20highlight%20GazeShift%20as%20a%20label-efficient%2C%20real-time%20solution%20for%20VR%20gaze%20tracking.%20Project%20code%20and%20the%20VRGaze%20dataset%20are%20released%20at%20https%3A//github.com/gazeshift3/gazeshift%0ALink%3A%20http%3A//arxiv.org/abs/2603.07832v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGazeShift%253A%2520Unsupervised%2520Gaze%2520Estimation%2520and%2520Dataset%2520for%2520VR%26entry.906535625%3DGil%2520Shapira%2520and%2520Ishay%2520Goldin%2520and%2520Evgeny%2520Artyomov%2520and%2520Donghoon%2520Kim%2520and%2520Yosi%2520Keller%2520and%2520Niv%2520Zehngut%26entry.1292438233%3DGaze%2520estimation%2520is%2520instrumental%2520in%2520modern%2520virtual%2520reality%2520%2528VR%2529%2520systems.%2520Despite%2520significant%2520progress%2520in%2520remote-camera%2520gaze%2520estimation%252C%2520VR%2520gaze%2520research%2520remains%2520constrained%2520by%2520data%2520scarcity%252C%2520particularly%2520the%2520lack%2520of%2520large-scale%252C%2520accurately%2520labeled%2520datasets%2520captured%2520with%2520the%2520off-axis%2520camera%2520configurations%2520typical%2520of%2520modern%2520headsets.%2520Gaze%2520annotation%2520is%2520difficult%2520since%2520fixation%2520on%2520intended%2520targets%2520cannot%2520be%2520guaranteed.%2520To%2520address%2520these%2520challenges%252C%2520we%2520introduce%2520VRGaze%252C%2520the%2520first%2520large-scale%2520off-axis%2520gaze%2520estimation%2520dataset%2520for%2520VR%252C%2520comprising%25202.1%2520million%2520near-eye%2520infrared%2520images%2520collected%2520from%252068%2520participants.%2520We%2520further%2520propose%2520GazeShift%252C%2520an%2520attention-guided%2520unsupervised%2520framework%2520for%2520learning%2520gaze%2520representations%2520without%2520labeled%2520data.%2520Unlike%2520prior%2520redirection-based%2520methods%2520that%2520rely%2520on%2520multi-view%2520or%25203D%2520geometry%252C%2520GazeShift%2520is%2520tailored%2520to%2520near-eye%2520imagery%252C%2520achieving%2520effective%2520gaze-appearance%2520disentanglement%2520in%2520a%2520compact%252C%2520real-time%2520model.%2520GazeShift%2520embeddings%2520can%2520be%2520optionally%2520adapted%2520to%2520individual%2520users%2520via%2520lightweight%2520few-shot%2520calibration%252C%2520achieving%2520a%25201.84%25C2%25B0%2520mean%2520error%2520on%2520VRGaze.%2520On%2520the%2520remote-camera%2520MPIIGaze%2520dataset%252C%2520the%2520model%2520achieves%2520a%25207.15%25C2%25B0%2520person-agnostic%2520error%252C%2520doing%2520so%2520with%252010x%2520fewer%2520parameters%2520and%252035x%2520fewer%2520FLOPs%2520than%2520baseline%2520methods.%2520Deployed%2520natively%2520on%2520a%2520VR%2520headset%2520GPU%252C%2520inference%2520takes%2520only%25205%2520ms.%2520Combined%2520with%2520demonstrated%2520robustness%2520to%2520illumination%2520changes%252C%2520these%2520results%2520highlight%2520GazeShift%2520as%2520a%2520label-efficient%252C%2520real-time%2520solution%2520for%2520VR%2520gaze%2520tracking.%2520Project%2520code%2520and%2520the%2520VRGaze%2520dataset%2520are%2520released%2520at%2520https%253A//github.com/gazeshift3/gazeshift%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.07832v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GazeShift%3A%20Uns {"title": "AC-Foley: Reference-Audio-Guided Video-to-Audio Synthesis with Acoustic Transfer", "author": "Pengjun Fang and Yingqing He and Yazhou Xing and Qifeng Chen and Ser-Nam Lim and Harry Yang", "abstract": "Existing video-to-audio (V2A) generation methods predominantly rely on text prompts alongside visual information to synthesize audio. However, two critical bottlenecks persist: semantic granularity gaps in training data, such as conflating acoustically distinct sounds under coarse labels, and textual ambiguity in describing micro-acoustic features. These bottlenecks make it difficult to perform fine-grained sound synthesis using text-controlled modes. To address these limitations, we propose AC-Foley, an audio-conditioned V2A model that directly leverages reference audio to achieve precise and fine-grained control over generated sounds. This approach enables fine-grained sound synthesis, timbre transfer, zero-shot sound generation, and improved audio quality. By directly conditioning on audio signals, our approach bypasses the semantic ambiguities of text descriptions while enabling precise manipulation of acoustic attributes. Empirically, AC-Foley achieves state-of-the-art performance for Foley generation when conditioned on reference audio, while remaining competitive with state-of-the-art video-to-audio methods even without audio conditioning. Code and demo are available at: https://ff2416.github.io/AC-Foley-Page", "link": "http://arxiv.org/abs/2603.15597v2", "date": "2026-03-20", "relevancy": 2.184, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5488}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5488}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5318}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AC-Foley%3A%20Reference-Audio-Guided%20Video-to-Audio%20Synthesis%20with%20Acoustic%20Transfer&body=Title%3A%20AC-Foley%3A%20Reference-Audio-Guided%20Video-to-Audio%20Synthesis%20with%20Acoustic%20Transfer%0AAuthor%3A%20Pengjun%20Fang%20and%20Yingqing%20He%20and%20Yazhou%20Xing%20and%20Qifeng%20Chen%20and%20Ser-Nam%20Lim%20and%20Harry%20Yang%0AAbstract%3A%20Existing%20video-to-audio%20%28V2A%29%20generation%20methods%20predominantly%20rely%20on%20text%20prompts%20alongside%20visual%20information%20to%20synthesize%20audio.%20However%2C%20two%20critical%20bottlenecks%20persist%3A%20semantic%20granularity%20gaps%20in%20training%20data%2C%20such%20as%20conflating%20acoustically%20distinct%20sounds%20under%20coarse%20labels%2C%20and%20textual%20ambiguity%20in%20describing%20micro-acoustic%20features.%20These%20bottlenecks%20make%20it%20difficult%20to%20perform%20fine-grained%20sound%20synthesis%20using%20text-controlled%20modes.%20To%20address%20these%20limitations%2C%20we%20propose%20AC-Foley%2C%20an%20audio-conditioned%20V2A%20model%20that%20directly%20leverages%20reference%20audio%20to%20achieve%20precise%20and%20fine-grained%20control%20over%20generated%20sounds.%20This%20approach%20enables%20fine-grained%20sound%20synthesis%2C%20timbre%20transfer%2C%20zero-shot%20sound%20generation%2C%20and%20improved%20audio%20quality.%20By%20directly%20conditioning%20on%20audio%20signals%2C%20our%20approach%20bypasses%20the%20semantic%20ambiguities%20of%20text%20descriptions%20while%20enabling%20precise%20manipulation%20of%20acoustic%20attributes.%20Empirically%2C%20AC-Foley%20achieves%20state-of-the-art%20performance%20for%20Foley%20generation%20when%20conditioned%20on%20reference%20audio%2C%20while%20remaining%20competitive%20with%20state-of-the-art%20video-to-audio%20methods%20even%20without%20audio%20conditioning.%20Code%20and%20demo%20are%20available%20at%3A%20https%3A//ff2416.github.io/AC-Foley-Page%0ALink%3A%20http%3A//arxiv.org/abs/2603.15597v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAC-Foley%253A%2520Reference-Audio-Guided%2520Video-to-Audio%2520Synthesis%2520with%2520Acoustic%2520Transfer%26entry.906535625%3DPengjun%2520Fang%2520and%2520Yingqing%2520He%2520and%2520Yazhou%2520Xing%2520and%2520Qifeng%2520Chen%2520and%2520Ser-Nam%2520Lim%2520and%2520Harry%2520Yang%26entry.1292438233%3DExisting%2520video-to-audio%2520%2528V2A%2529%2520generation%2520methods%2520predominantly%2520rely%2520on%2520text%2520prompts%2520alongside%2520visual%2520information%2520to%2520synthesize%2520audio.%2520However%252C%2520two%2520critical%2520bottlenecks%2520persist%253A%2520semantic%2520granularity%2520gaps%2520in%2520training%2520data%252C%2520such%2520as%2520conflating%2520acoustically%2520distinct%2520sounds%2520under%2520coarse%2520labels%252C%2520and%2520textual%2520ambiguity%2520in%2520describing%2520micro-acoustic%2520features.%2520These%2520bottlenecks%2520make%2520it%2520difficult%2520to%2520perform%2520fine-grained%2520sound%2520synthesis%2520using%2520text-controlled%2520modes.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520AC-Foley%252C%2520an%2520audio-conditioned%2520V2A%2520model%2520that%2520directly%2520leverages%2520reference%2520audio%2520to%2520achieve%2520precise%2520and%2520fine-grained%2520control%2520over%2520generated%2520sounds.%2520This%2520approach%2520enables%2520fine-grained%2520sound%2520synthesis%252C%2520timbre%2520transfer%252C%2520zero-shot%2520sound%2520generation%252C%2520and%2520improved%2520audio%2520quality.%2520By%2520directly%2520conditioning%2520on%2520audio%2520signals%252C%2520our%2520approach%2520bypasses%2520the%2520semantic%2520ambiguities%2520of%2520text%2520descriptions%2520while%2520enabling%2520precise%2520manipulation%2520of%2520acoustic%2520attributes.%2520Empirically%252C%2520AC-Foley%2520achieves%2520state-of-the-art%2520performance%2520for%2520Foley%2520generation%2520when%2520conditioned%2520on%2520reference%2520audio%252C%2520while%2520remaining%2520competitive%2520with%2520state-of-the-art%2520video-to-audio%2520methods%2520even%2520without%2520audio%2520conditioning.%2520Code%2520and%2520demo%2520are%2520available%2520at%253A%2520https%253A//ff2416.github.io/AC-Foley-Page%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15597v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AC-Foley%3A%20Reference-Audio-Guided%20Video-to-Audio%20Synthesis%20with%20Acoustic%20Transfer&entry.906535625=Pengjun%20Fang%20and%20Yingqing%20He%20and%20Yazhou%20Xing%20and%20Qifeng%20Chen%20and%20Ser-Nam%20Lim%20and%20Harry%20Yang&entry.1292438233=Existing%20video-to-audio%20%28V2A%29%20generation%20methods%20predominantly%20rely%20on%20text%20prompts%20alongside%20visual%20information%20to%20synthesize%20audio.%20However%2C%20two%20critical%20bottlenecks%20persist%3A%20semantic%20granularity%20gaps%20in%20training%20data%2C%20such%20as%20conflating%20acoustically%20distinct%20sounds%20under%20coarse%20labels%2C%20and%20textual%20ambiguity%20in%20describing%20micro-acoustic%20features.%20These%20bottlenecks%20make%20it%20difficult%20to%20perform%20fine-grained%20sound%20synthesis%20using%20text-controlled%20modes.%20To%20address%20these%20limitations%2C%20we%20propose%20AC-Foley%2C%20an%20audio-conditioned%20V2A%20model%20that%20directly%20leverages%20reference%20audio%20to%20achieve%20precise%20and%20fine-grained%20control%20over%20generated%20sounds.%20This%20approach%20enables%20fine-grained%20sound%20synthesis%2C%20timbre%20transfer%2C%20zero-shot%20sound%20generation%2C%20and%20improved%20audio%20quality.%20By%20directly%20conditioning%20on%20audio%20signals%2C%20our%20approach%20bypasses%20the%20semantic%20ambiguities%20of%20text%20descriptions%20 {"title": "LoASR-Bench: Evaluating Large Speech Language Models on Low-Resource Automatic Speech Recognition Across Language Families", "author": "Jianan Chen and Xiaoxue Gao and Tatsuya Kawahara and Nancy F. Chen", "abstract": "Large language models (LLMs) have driven substantial advances in speech language models (SpeechLMs), yielding strong performance in automatic speech recognition (ASR) under high-resource conditions. However, existing benchmarks predominantly focus on high-resource languages, leaving the ASR behavior of SpeechLMs in low-resource languages insufficiently understood. This gap is critical, as practical ASR systems must reliably support low-resource languages and generalize across diverse language families, and it directly hinders the deployment of SpeechLM-based ASR in real-world multilingual scenarios. As a result, it is essential to evaluate SpeechLMs on low-resource languages to ensure their generalizability across different language families. To address this problem, we propose \\textbf{LoASR-Bench}, a comprehensive benchmark designed to evaluate \\textbf{lo}w-resource \\textbf{a}utomatic \\textbf{s}peech \\textbf{r}ecognition (\\textbf{ASR}) of the latest SpeechLMs across diverse language families. LoASR-Bench comprises 25 languages from 9 language families, featuring both Latin and non-Latin scripts, enabling cross-linguistic and cross-script assessment of ASR performance of current SpeechLMs. Experimental results highlight the limitations of the latest SpeechLMs in handling real-world low-resource languages.", "link": "http://arxiv.org/abs/2603.20042v1", "date": "2026-03-20", "relevancy": 2.1756, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4445}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4445}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4164}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoASR-Bench%3A%20Evaluating%20Large%20Speech%20Language%20Models%20on%20Low-Resource%20Automatic%20Speech%20Recognition%20Across%20Language%20Families&body=Title%3A%20LoASR-Bench%3A%20Evaluating%20Large%20Speech%20Language%20Models%20on%20Low-Resource%20Automatic%20Speech%20Recognition%20Across%20Language%20Families%0AAuthor%3A%20Jianan%20Chen%20and%20Xiaoxue%20Gao%20and%20Tatsuya%20Kawahara%20and%20Nancy%20F.%20Chen%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20have%20driven%20substantial%20advances%20in%20speech%20language%20models%20%28SpeechLMs%29%2C%20yielding%20strong%20performance%20in%20automatic%20speech%20recognition%20%28ASR%29%20under%20high-resource%20conditions.%20However%2C%20existing%20benchmarks%20predominantly%20focus%20on%20high-resource%20languages%2C%20leaving%20the%20ASR%20behavior%20of%20SpeechLMs%20in%20low-resource%20languages%20insufficiently%20understood.%20This%20gap%20is%20critical%2C%20as%20practical%20ASR%20systems%20must%20reliably%20support%20low-resource%20languages%20and%20generalize%20across%20diverse%20language%20families%2C%20and%20it%20directly%20hinders%20the%20deployment%20of%20SpeechLM-based%20ASR%20in%20real-world%20multilingual%20scenarios.%20As%20a%20result%2C%20it%20is%20essential%20to%20evaluate%20SpeechLMs%20on%20low-resource%20languages%20to%20ensure%20their%20generalizability%20across%20different%20language%20families.%20To%20address%20this%20problem%2C%20we%20propose%20%5Ctextbf%7BLoASR-Bench%7D%2C%20a%20comprehensive%20benchmark%20designed%20to%20evaluate%20%5Ctextbf%7Blo%7Dw-resource%20%5Ctextbf%7Ba%7Dutomatic%20%5Ctextbf%7Bs%7Dpeech%20%5Ctextbf%7Br%7Decognition%20%28%5Ctextbf%7BASR%7D%29%20of%20the%20latest%20SpeechLMs%20across%20diverse%20language%20families.%20L %2C%20as%20practical%20ASR%20systems%20must%20reliably%20support%20low-resource%20languages%20and%20generalize%20across%20diverse%20language%20families%2C%20and%20it%20directly%20hinders%20the%20deployment%20of%20SpeechLM-based%20ASR%20in%20real-world%20multilingual%20scenarios.%20As%20a%20result%2C%20it%20is%20essential%20to%20evaluate%20SpeechLMs%20on%20low-resource%20languages%20to%20ensure%20their%20generalizability%20across%20different%20language%20families.%20To%20address%20this%20problem%2C%20we%20propose%20%5Ctextbf%7BLoASR-Bench%7D%2C%20a%20comprehensive%20benchmark%20designed%20to%20evaluate%20%5Ctextbf%7Blo%7Dw-resource%20%5Ctextbf%7Ba%7Dutomatic%20%5Ctextbf%7Bs%7Dpeech%20%5Ctextbf%7Br%7Decognition%20%28%5Ctextbf%7BASR%7D%29%20of%20the%20latest%20SpeechLMs%20across%20diverse%20language%20families.%20LoASR-Bench%20comprises%2025%20languages%20from%209%20language%20families%2C%20featuring%20both%20Latin%20and%20non-Latin%20scripts%2C%20enabling%20cross-linguistic%20and%20cross-script%20assessment%20of%20ASR%20performance%20of%20current%20SpeechLMs.%20Experimental%20results%20highlight%20the%20limitations%20of%20the%20latest%20SpeechLMs%20in%20handling%20real-world%20low-resource%20languages.&entry.1838667208=http%3A//arxiv.org/abs/2603.20042v1&entry.124074799=Read"},
{"title": "Revealing Domain-Spatiality Patterns for Configuration Tuning: Domain Knowledge Meets Fitness Landscapes", "author": "Yulong Ye and Hongyuan Liang and Chao Jiang and Miqing Li and Tao Chen", "abstract": "Configuration tuning for better performance is crucial in quality assurance. Yet, there has long been a mystery on tuners' effectiveness, due to the black-box nature of configurable systems. Prior efforts predominantly adopt static domain analysis (e.g., static taint analysis), which often lacks generalizability, or dynamic data analysis (e.g., benchmarking performance analysis), limiting explainability. In this work, we embrace Fitness Landscape Analysis (FLA) as a bridge between domain knowledge and difficulty of the tuning. We propose Domland, a two-pronged methodology that synergizes the spatial information obtained from FLA and domain-driven analysis to systematically capture the hidden characteristics of configuration tuning cases, explaining how and why a tuner might succeed or fail. This helps to better interpret and contextualize the behavior of tuners and inform tuner design. To evaluate Domland, we conduct a case study of nine software systems and 93 workloads, from which we reveal several key findings: (1) configuration landscapes are inherently system-specific, with no single domain factor (e.g., system area, programming language, or resource intensity) consistently shaping their structure; (2) the core options (e.g., pic-struct of x264), which control the main functional flows, exert a stronger influence on landscape ruggedness (i.e. the difficulty of tuning) compared to resource options (e.g., cpu-independent of x264); (3) Workload effects on landscape structure are not uniformly tied to type or scale. Both contribute to landscape variations, but their impact is system-dependent.", "link": "http://arxiv.org/abs/2603.19897v1", "date": "2026-03-20", "relevancy": 2.1747, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4413}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4318}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4318}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revealing%20Domain-Spatiality%20Patterns%20for%20Configuration%20Tuning%3A%20Domain%20Knowledge%20Meets%20Fitness%20Landscapes&body=Title%3A%20Revealing%20Domain-Spatiality%20Patterns%20for%20Configuration%20Tuning%3A%20Domain%20Knowledge%20Meets%20Fitness%20Landscapes%0AAuthor%3A%20Yulong%20Ye%20and%20Hongyuan%20Liang%20and%20Chao%20Jiang%20and%20Miqing%20Li%20and%20Tao%20Chen%0AAbstract%3A%20Configuration%20tuning%20for%20better%20performance%20is%20crucial%20in%20quality%20assurance.%20Yet%2C%20there%20has%20long%20been%20a%20mystery%20on%20tuners%27%20effectiveness%2C%20due%20to%20the%20black-box%20nature%20of%20configurable%20systems.%20Prior%20efforts%20predominantly%20adopt%20static%20domain%20analysis%20%28e.g.%2C%20static%20taint%20analysis%29%2C%20which%20often%20lacks%20generalizability%2C%20or%20dynamic%20data%20analysis%20%28e.g.%2C%20benchmarking%20performance%20analysis%29%2C%20limiting%20explainability.%20In%20this%20work%2C%20we%20embrace%20Fitness%20Landscape%20Analysis%20%28FLA%29%20as%20a%20bridge%20between%20domain%20knowledge%20and%20difficulty%20of%20the%20tuning.%20We%20propose%20Domland%2C%20a%20two-pronged%20methodology%20that%20synergizes%20the%20spatial%20information%20obtained%20from%20FLA%20and%20domain-driven%20analysis%20to%20systematically%20capture%20the%20hidden%20characteristics%20of%20configuration%20tuning%20cases%2C%20explaining%20how%20and%20why%20a%20tuner%20might%20succeed%20or%20fail.%20This%20helps%20to%20better%20interpret%20and%20contextualize%20the%20behavior%20of%20tuners%20and%20inform%20tuner%20design.%20To%20evaluate%20Domland%2C%20we%20conduct%20a%20case%20study%20of%20nine%20software%20systems%20and%2093%20workloads%2C%20from%20which%20we%20reveal%20several%20key%20findings%3A%20%281%29%20configuration%20landscapes%20are%20inherently%20system-specific%2C%20with%20no%20single%20domain%20factor%20%28e.g.%2C%20system%20area%2C%20programming%20language%2C%20or%20resource%20intensity%29%20consistently%20shaping%20their%20structure%3B%20%282%29%20the%20core%20options%20%28e.g.%2C%20pic-struct%20of%20x264%29%2C%20which%20control%20the%20main%20functional%20flows%2C%20exert%20a%20stronger%20influence%20on%20landscape%20ruggedness%20%28i.e.%20the%20difficulty%20of%20tuning%29%20compared%20to%20resource%20options%20%28e.g.%2C%20cpu-independent%20of%20x264%29%3B%20%283%29%20Workload%20effects%20on%20landscape%20structure%20are%20not%20uniformly%20tied%20to%20type%20or%20scale.%20Both%20contribute%20to%20landscape%20variations%2C%20but%20their%20impact%20is%20system-dependent.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19897v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevealing%2520Domain-Spatiality%2520Patterns%2520for%2520Configuration%2520Tuning%253A%2520Domain%2520Knowledge%2520Meets%2520Fitness%2520Landscapes%26entry.906535625%3DYulong%2520Ye%2520and%2520Hongyuan%2520Liang%2520and%2520Chao%2520Jiang%2520and%2520Miqing%2520Li%2520and%2520Tao%2520Chen%26entry.1292438233%3DConfiguration%2520tuning%2520for%2520better%2520performance%2520is%2520crucial%2520in%2520quality%2520assurance.%2520Yet%252C%2520there%2520has%2520long%2520been%2520a%2520mystery%2520on%2520tuners%2527%2520effectiveness%252C%2520due%2520to%2520the%2520black-box%2520nature%2520of%2520configurable%2520systems.%2520Prior%2520efforts%2520predominantly%2520adopt%2520static%2520domain%2520analysis%2520%2528e.g.%252C%2520static%2520taint%2520analysis%2 {"title": "ReconMIL: Synergizing Latent Space Reconstruction with Bi-Stream Mamba for Whole Slide Image Analysis", "author": "Lubin Gan and Jing Zhang and Heng Zhang and Xin Di and Zhifeng Wang and Wenke Huang and Xiaoyan Sun", "abstract": "Whole slide image (WSI) analysis heavily relies on multiple instance learning (MIL). While recent methods benefit from large-scale foundation models and advanced sequence modeling to capture long-range dependencies, they still struggle with two critical issues. First, directly applying frozen, task-agnostic features often leads to suboptimal separability due to the domain gap with specific histological tasks. Second, relying solely on global aggregators can cause over-smoothing, where sparse but critical diagnostic signals are overshadowed by the dominant background context. In this paper, we present ReconMIL, a novel framework designed to bridge this domain gap and balance global-local feature aggregation. Our approach introduces a Latent Space Reconstruction module that adaptively projects generic features into a compact, task-specific manifold, improving boundary delineation. To prevent information dilution, we develop a bi-stream architecture combining a Mamba-based global stream for contextual priors and a CNN-based local stream to preserve subtle morphological anomalies. A scale-adaptive selection mechanism dynamically fuses these two streams, determining when to rely on overall architecture versus local saliency. Evaluations across multiple diagnostic and survival prediction benchmarks show that ReconMIL consistently outperforms current state-of-the-art methods, effectively localizing fine-grained diagnostic regions while suppressing background noise. Visualization results confirm the models superior ability to localize diagnostic regions by effectively balancing global structure and local granularity.", "link": "http://arxiv.org/abs/2603.19925v1", "date": "2026-03-20", "relevancy": 2.1684, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5472}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5389}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5372}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReconMIL%3A%20Synergizing%20Latent%20Space%20Reconstruction%20with%20Bi-Stream%20Mamba%20for%20Whole%20Slide%20Image%20Analysis&body=Title%3A%20ReconMIL%3A%20Synergizing%20Latent%20Space%20Reconstruction%20with%20Bi-Stream%20Mamba%20for%20Whole%20Slide%20Image%20Analysis%0AAuthor%3A%20Lubin%20Gan%20and%20Jing%20Zhang%20and%20Heng%20Zhang%20and%20Xin%20Di%20and%20Zhifeng%20Wang%20and%20Wenke%20Huang%20and%20Xiaoyan%20Sun%0AAbstract%3A%20Whole%20slide%20image%20%28WSI%29%20analysis%20heavily%20relies%20on%20multiple%20instance%20learning%20%28MIL%29.%20While%20recent%20methods%20benefit%20from%20large-scale%20foundation%20models%20and%20advanced%20sequence%20modeling%20to%20capture%20long-range%20dependencies%2C%20they%20still%20struggle%20with%20two%20critical%20issues.%20First%2C%20directly%20applying%20frozen%2C%20task-agnostic%20features%20often%20leads%20to%20suboptimal%20separability%20due%20to%20the%20domain%20gap%20with%20specific%20histological%20tasks.%20Second%2C%20relying%20solely%20on%20global%20aggregators%20can%20cause%20over-smoothing%2C%20where%20sparse%20but%20critical%20diagnostic%20signals%20are%20overshadowed%20by%20the%20dominant%20background%20context.%20In%20this%20paper%2C%20we%20present%20ReconMIL%2C%20a%20novel%20framework%20designed%20to%20bridge%20this%20domain%20gap%20and%20balance%20global-local%20feature%20aggregation.%20Our%20approach%20introduces%20a%20Latent%20Space%20Reconstruction%20module%20that%20adaptively%20projects%20generic%20features%20into%20a%20compact%2C%20task-specific%20manifold%2C%20improving%20boundary%20delineation.%20To%20prevent%20information%20dilution%2C%20we%20develop%20a%20bi-stream%20architecture%20combining%20a%20Mamba-based%20global%20stream%20for%20contextual%20priors%20and%20a%20CNN-based%20local%20stream%20to%20preserve%20subtle%20morphological%20anomalies.%20A%20scale-adaptive%20selection%20mechanism%20dynamically%20fuses%20these%20two%20streams%2C%20determining%20when%20to%20rely%20on%20overall%20architecture%20versus%20local%20saliency.%20Evaluations%20across%20multiple%20diagnostic%20and%20survival%20prediction%20benchmarks%20show%20that%20ReconMIL%20consistently%20outperforms%20current%20state-of-the-art%20methods%2C%20effectively%20localizing%20fine-grained%20diagnostic%20regions%20while%20suppressing%20background%20noise.%20Visualization%20results%20confirm%20the%20models%20superior%20ability%20to%20localize%20diagnostic%20regions%20by%20effectively%20balancing%20global%20structure%20and%20local%20granularity.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19925v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReconMIL%253A%2520Synergizing%2520Latent%2520Space%2520Reconstruction%2520with%2520Bi-Stream%2520Mamba%2520for%2520Whole%2520Slide%2520Image%2520Analysis%26entry.906535625%3DLubin%2520Gan%2520and%2520Jing%2520Zhang%2520and%2520Heng%2520Zhang%2520and%2520Xin%2520Di%2520and%2520Zhifeng%2520Wang%2520and%2520Wenke%2520Huang%2520and%2520Xiaoyan%2520Sun%26entry.1292438233%3DWhole%2520slide%2520image%2520%2528WSI%2529%2520analysis%2520heavily%2520relies%2520on%2520multiple%2520instance%2520learning%2520%2528MIL%2529.%2520While%2520recent%2520methods%2520benefit%2520from%2520large-scale%2520foundation%2520models%2520and%2520advanced%2520sequence%2520modeling%2520to%2520capture%2520long-range%2520dependencies%252C%2520they%2520still%2520struggle%2520with%25 20to%2520localize%2520diagnostic%2520regions%2520by%2520effectively%2520balancing%2520global%2520structure%2520and%2520local%2520granularity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19925v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ReconMIL%3A%20Synergizing%20Latent%20Space%20Reconstruction%20with%20Bi-Stream%20Mamba%20for%20Whole%20Slide%20Image%20Analysis&entry.906535625=Lubin%20Gan%20and%20Jing%20Zhang%20and%20Heng%20Zhang%20and%20Xin%20Di%20and%20Zhifeng%20Wang%20and%20Wenke%20Huang%20and%20Xiaoyan%20Sun&entry.1292438233=Whole%20slide%20image%20%28WSI%29%20analysis%20heavily%20relies%20on%20multiple%20instance%20learning%20%28MIL%29.%20While%20recent%20methods%20benefit%20from%20large-scale%20foundation%20models%20and%20advanced%20sequence%20modeling%20to%20capture%20long-range%20dependencies%2C%20they%20still%20struggle%20with%20two%20critical%20issues.%20First%2C%20directly%20applying%20frozen%2C%20task-agnostic%20features%20often%20leads%20to%20suboptimal%20separability%20due%20to%20the%20domain%20gap%20with%20specific%20histological%20tasks.%20Second%2C%20relying%20solely%20on%20global%20aggregators%20can%20cause%20over-smoothing%2C%20where%20sparse%20but%20critical%20diagnostic%20signals%20are%20overshadowed%20by%20the%20dominant%20background%20context.%20In%20this%20paper%2C%20we%20present%20ReconMIL%2C%20a%20novel%20framework%20designed%20to%20bridge%20this%20domain%20gap%20and%20balance%20global-local%20feature%20aggregation.%20Our%20approach%20introduces%20a%20Latent%20Space%20Reconstruction%20module%20that%20adaptively%20projects%20generic%20features%20into%20a%20compact%2C%20task-specific%20manifold%2C%20improving%20boundary%20delineation.%20To%20prevent%20information%20dilution%2C%20we%20develop%20a%20bi-stream%20architecture%20combining%20a%20Mamba-based%20global%20stream%20for%20contextual%20priors%20and%20a%20CNN-based%20local% {"title": "Minimax Generalized Cross-Entropy", "author": "Kartheek Bondugula and Santiago Mazuelas and Aritz P\u00e9rez and Anqi Liu", "abstract": "Loss functions play a central role in supervised classification. Cross-entropy (CE) is widely used, whereas the mean absolute error (MAE) loss can offer robustness but is difficult to optimize. Interpolating between the CE and MAE losses, generalized cross-entropy (GCE) has recently been introduced to provide a trade-off between optimization difficulty and robustness. Existing formulations of GCE result in a non-convex optimization over classification margins that is prone to underfitting, leading to poor performances with complex datasets. In this paper, we propose a minimax formulation of generalized cross-entropy (MGCE) that results in a convex optimization over classification margins. Moreover, we show that MGCEs can provide an upper bound on the classification error. The proposed bilevel convex optimization can be efficiently implemented using stochastic gradient computed via implicit differentiation. Using benchmark datasets, we show that MGCE achieves strong accuracy, faster convergence, and better calibration, especially in the presence of label noise.", "link": "http://arxiv.org/abs/2603.19874v1", "date": "2026-03-20", "relevancy": 2.1611, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4521}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4385}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minimax%20Generalized%20Cross-Entropy&body=Title%3A%20Minimax%20Generalized%20Cross-Entropy%0AAuthor%3A%20Kartheek%20Bondugula%20and%20Santiago%20Mazuelas%20and%20Aritz%20P%C3%A9rez%20and%20Anqi%20Liu%0AAbstract%3A%20Loss%20functions%20play%20a%20central%20role%20in%20supervised%20classification.%20Cross-entropy%20%28CE%29%20is%20widely%20used%2C%20whereas%20the%20mean%20absolute%20error%20%28MAE%29%20loss%20can%20offer%20robustness%20but%20is%20difficult%20to%20optimize.%20Interpolating%20between%20the%20CE%20and%20MAE%20losses%2C%20generalized%20cross-entropy%20%28GCE%29%20has%20recently%20been%20introduced%20to%20provide%20a%20trade-off%20between%20optimization%20difficulty%20and%20robustness.%20Existing%20formulations%20of%20GCE%20result%20in%20a%20non-convex%20optimization%20over%20classification%20margins%20that%20is%20prone%20to%20underfitting%2C%20leading%20to%20poor%20performances%20with%20complex%20datasets.%20In%20this%20paper%2C%20we%20propose%20a%20minimax%20formulation%20of%20generalized%20cross-entropy%20%28MGCE%29%20that%20results%20in%20a%20convex%20optimization%20over%20classification%20margins.%20Moreover%2C%20we%20show%20that%20MGCEs%20can%20provide%20an%20upper%20bound%20on%20the%20classification%20error.%20The%20proposed%20bilevel%20convex%20optimization%20can%20be%20efficiently%20implemented%20using%20stochastic%20gradient%20computed%20via%20implicit%20differentiation.%20Using%20benchmark%20datasets%2C%20we%20show%20that%20MGCE%20achieves%20strong%20accuracy%2C%20faster%20convergence%2C%20and%20better%20calibration%2C%20especially%20in%20the%20presence%20of%20label%20noise.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19874v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMinimax%2520Generalized%2520Cross-Entropy%26entry.906535625%3DKartheek%2520Bondugula%2520and%2520Santiago%2520Mazuelas%2520and%2520Aritz%2520P%25C3%25A9rez%2520and%2520Anqi%2520Liu%26entry.1292438233% {"title": "Radar-Inertial Odometry with Online Spatio-Temporal Calibration via Continuous-Time IMU Modeling", "author": "Vlaho-Josip \u0160tironja and Luka Petrovi\u0107 and Juraj Per\u0161i\u0107 and Ivan Markovi\u0107 and Ivan Petrovi\u0107", "abstract": "Radar-Inertial Odometry (RIO) has emerged as a robust alternative to vision- and LiDAR-based odometry in challenging conditions such as low light, fog, featureless environments, or in adverse weather. However, many existing RIO approaches assume known radar-IMU extrinsic calibration or rely on sufficient motion excitation for online extrinsic estimation, while temporal misalignment between sensors is often neglected or treated independently. In this work, we present a RIO framework that performs joint online spatial and temporal calibration within a factor-graph optimization formulation, based on continuous-time modeling of inertial measurements using uniform cubic B-splines. The proposed continuous-time representation of acceleration and angular velocity accurately captures the asynchronous nature of radar-IMU measurements, enabling reliable convergence of both the temporal offset and extrinsic calibration parameters, without relying on scan matching, target tracking, or environment-specific assumptions.", "link": "http://arxiv.org/abs/2603.19958v1", "date": "2026-03-20", "relevancy": 2.1563, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.566}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5345}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5329}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Radar-Inertial%20Odometry%20with%20Online%20Spatio-Temporal%20Calibration%20via%20Continuous-Time%20IMU%20Modeling&body=Title%3A%20Radar-Inertial%20Odometry%20with%20Online%20Spatio-Temporal%20Calibration%20via%20Continuous-Time%20IMU%20Modeling%0AAuthor%3A%20Vlaho-Josip%20%C5%A0tironja%20and%20Luka%20Petrovi%C4%87%20and%20Juraj%20Per%C5%A1i%C4%87%20and%20Ivan%20Markovi%C4%87%20and%20Ivan%20Petrovi%C4%87%0AAbstract%3A%20Radar-Inertial%20Odometry%20%28RIO%29%20has%20emerged%20as%20a%20robust%20alternative%20to%20vision-%20and%20LiDAR-based%20odometry%20in%20challenging%20conditions%20such%20as%20low%20light%2C%20fog%2C%20featureless%20environments%2C%20or%20in%20adverse%20weather.%20However%2C%20many%20existing%20RIO%20approaches%20assume%20known%20radar-IMU%20extrinsic%20calibration%20or%20rely%20on%20sufficient%20motion%20excitation%20for%20online%20extrinsic%20estimation%2C%20while%20temporal%20misalignment%20between%20sensors%20is%20often%20neglected%20or%20treated%20independently.%20In%20this%20work%2C%20we%20present%20a%20RIO%20framework%20that%20performs%20joint%20online%20spatial%20and%20temporal%20calibration%20within%20a%20factor-graph%20optimization%20formulation%2C%20based%20on%20continuous-time%20modeling%20of%20inertial%20measurements%20using%20uniform%20cubic%20B-splines.%20The%20proposed%20continuous-time%20representation%20of%20acceleration%20and%20angular%20velocity%20accurately%20captures%20the%20asynchronous%20nature%20of%20radar-IMU%20measurements%2C%20enabling%20reliable%20convergence%20of%20both%20the%20temporal%20offset%20and%20extrinsic%20calibration%20parameters%2C%20without%20relying%20on%20scan%20matching%2C%20target%20tracking%2C%20or%20environment-specific%20assumptions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19958v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRadar-Inertial%2520Odometry%2520with%2520Online%2520Spatio-Temporal%2520Calibration%2520via%2520Continuous-Time%2520IMU%2520Modeling

{"title": "CARES: Context-Aware Resolution Selector for VLMs", "author": "Moshe Kimhi and Nimrod Shabtay and Raja Giryes and Chaim Baskin and Eli Schwartz", "abstract": "Large vision-language models (VLMs) commonly process images at native or high resolution to remain effective across tasks. This inflates visual tokens ofter to 97-99% of total tokens, resulting in high compute and latency, even when low-resolution images would suffice. We introduce \\emph{CARES}-a \\textbf{C}ontext-\\textbf{A}ware \\textbf{R}esolution \\textbf{S}elector, a lightweight preprocessing module that, given an image-query pair, predicts the \\emph{minimal} sufficient input resolution. CARES uses a compact VLM (350M) to extract features and predict when a target pretrained VLM's response converges to its peak ability to answer correctly. Though trained as a discrete classifier over a set of optional resolutions, CARES interpolates continuous resolutions at inference for fine-grained control. Across five multimodal benchmarks spanning documents and natural images, as well as diverse target VLMs, CARES preserves task performance while reducing compute by up to 80%.", "link": "http://arxiv.org/abs/2510.19496v2", "date": "2026-03-20", "relevancy": 2.556, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.512}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.512}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5096}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CARES%3A%20Context-Aware%20Resolution%20Selector%20for%20VLMs&body=Title%3A%20CARES%3A%20Context-Aware%20Resolution%20Selector%20for%20VLMs%0AAuthor%3A%20Moshe%20Kimhi%20and%20Nimrod%20Shabtay%20and%20Raja%20Giryes%20and%20Chaim%20Baskin%20and%20Eli%20Schwartz%0AAbstract%3A%20Large%20vision-language%20models%20%28VLMs%29%20commonly%20process%20images%20at%20native%20or%20high%20resolution%20to%20remain%20effective%20across%20tasks.%20This%20inflates%20visual%20tokens%20ofter%20to%2097-99%25%20of%20total%20tokens%2C%20resulting%20in%20high%20compute%20and%20latency%2C%20even%20when%20low-resolution%20images%20would%20suffice.%20We%20introduce%20%5Cemph%7BCARES%7D-a%20%5Ctextbf%7BC%7Dontext-%5Ctextbf%7BA%7Dware%20%5Ctextbf%7BR%7Desolution%20%5Ctextbf%7BS%7Delector%2C%20a%20lightweight%20preprocessing%20module%20that%2C%20given%20an%20image-query%20pair%2C%20predicts%20the%20%5Cemph%7Bminimal%7D%20sufficient%20input%20resolution.%20CARES%20uses%20a%20compact%20VLM%20%28350M%29%20to%20extract%20features%20and%20predict%20when%20a%20target%20pretrained%20VLM%27s%20response%20converges%20to%20its%20peak%20ability%20to%20answer%20correctly.%20Though%20trained%20as%20a%20discrete%20classifier%20over%20a%20set%20of%20optional%20resolutions%2C%20CARES%20interpolates%20continuous%20resolutions%20at%20inference%20for%20fine-grained%20control.%20Across%20five%20multimodal%20benchmarks%20spanning%20documents%20and%20natural%20images%2C%20as%20well%20as%20diverse%20target%20VLMs%2C%20CARES%20preserves%20task%20performance%20while%20reducing%20compute%20by%20up%20to%2080%25.%0ALink%3A%20http%3A//arxiv.org/abs/2510.19496v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCARES%253A%2520Context-Aware%2520Resolution%2520Selector%2520for%2520VLMs%26entry.906535625%3DMoshe%2520Kimhi%2520and%2520Nimrod%2520Shabtay%2520and%2520Raja%2520Giryes%2520and%2520Chaim%2520Baskin%2520and%2520Eli%2520Schwartz%26entry.1292438233%3DLarge%2520vision-language%2520models%2520%2528VLMs%2529%2520commonly%2520process%2520images%2520at%2520native%2520or%2520high%2520resolution%2520to%2520remain%2520effective%2520across%2520tasks.%2520This%2520inflates%2520visual%2520tokens%2520ofter%2520to%252097-99%2525%2520of%2520total%2520tokens%252C%2520resulting%2520in%2520high%2520compute%2520and%2520latency%252C%2520even%2520when%2520low-resolution%2520images%2520would%2520suffice.%2520We%2520introduce%2520%255Cemph%257BCARES%257D-a%2520%255Ctextbf%257BC%257Dontext-%255Ctextbf%257BA%257Dware%2520%255Ctextbf%257BR%257Desolution%2520%255Ctextbf%257BS%257Delector%252C%2520a%2520lightweight%2520preprocessing%2520module%2520that%252C%2520given%2520an%2520image-query%2520pair%252C%2520predicts%2520the%2520%255Cemph%257Bminimal%257D%2520sufficient%2520input%2520resolution.%2520CARES%2520uses%2520a%2520compact%2520VLM%2520%2528350M%2529%2520to%2520extract%2520features%2520and%2520predict%2520when%2520a%2520target%2520pretrained%2520VLM%2527s%2520response%2520converges%2520to%2520its%2520peak%2520ability%2520to%2520answer%2520correctly.%2520Though%2520trained%2520as%2520a%2520discrete%2520classifier%2520over%2520a%2520set%2520of%2520optional%2520resolutions%252C%2520CARES%2520interpolates%2520continuous%2520resolutions%2520at%2520inference%2520for%2520fine-grained%2520control.%2520Across%2520five%2520multimodal%2520benchmarks%2520spanning%2520documents%2520and%2520natural%2520images%252C%2520as%2520well%2520as%2520diverse%2520target%2520VLMs%252C%2520CARES%2520preserves%2520task%2520performance%2520while%2520reducing%2520compute%2520by%2520up%2520to%252080%2525.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.19496v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CARES%3A%20Context-Aware%20Resolution%20Selector%20for%20VLMs&entry.906535625=Moshe%20Kimhi%20and%20Nimrod%20Shabtay%20and%20Raja%20Giryes%20and%20Chaim%20Baskin%20and%20Eli%20Schwartz&entry.1292438233=Large%20vision-language%20models%20%28VLMs%29%20commonly%20process%20images%20at%20native%20or%20high%20resolution%20to%20remain%20effecti {"title": "AtGCN: A Graph Convolutional Network For Ataxic Gait Detection", "author": "Karan Bania and Tanmay Verlekar", "abstract": "Video-based gait analysis can be defined as the task of diagnosing pathologies, such as ataxia, using videos of patients walking in front of a camera. This paper presents a graph convolution network called AtGCN for detecting ataxic gait and identifying its severity using 2D videos. The problem is especially challenging as the deviation of an ataxic gait from a healthy gait is very subtle. The datasets for ataxic gait detection are also quite small, with the largest dataset having only 149 videos. The paper addresses the first problem using special spatiotemporal graph convolution that successfully captures important gait-related features. To handle the small dataset size, a deep spatiotemporal graph convolution network pre-trained on an action recognition dataset is systematically truncated and then fine-tuned on the ataxia dataset to obtain the AtGCN model. The paper also presents an augmentation strategy that segments a video sequence into multiple gait cycles. The proposed AtGCN model then operates on a graph of body part locations belonging to a single gait cycle. The evaluation results support the strength of the proposed AtGCN model, as it outperforms the state-of-the-art in detection and severity prediction with an accuracy of 93.46% and a MAE of 0.4169, respectively, while being 5.5 times smaller than the state-of-the-art.", "link": "http://arxiv.org/abs/2410.22862v2", "date": "2026-03-20", "relevancy": 2.4898, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5148}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4903}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4889}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AtGCN%3A%20A%20Graph%20Convolutional%20Network%20For%20Ataxic%20Gait%20Detection&body=Title%3A%20AtGCN%3A%20A%20Graph%20Convolutional%20Network%20For%20Ataxic%20Gait%20Detection%0AAuthor%3A%20Karan%20Bania%20and%20Tanmay%20Verlekar%0AAbstract%3A%20Video-based%20gait%20analysis%20can%20be%20defined%20as%20the%20task%20of%20diagnosing%20pathologies%2C%20such%20as%20ataxia%2C%20using%20videos%20of%20patients%20walking%20in%20front%20of%20a%20camera.%20This%20paper%20presents%20a%20graph%20convolution%20network%20called%20AtGCN%20for%20detecting%20ataxic%20gait%20and%20identifying%20its%20severity%20using%202D%20videos.%20The%20problem%20is%20especially%20challenging%20as%20the%20deviation%20of%20an%20ataxic%20gait%20from%20a%20healthy%20gait%20is%20very%20subtle.%20The%20datasets%20for%20ataxic%20gait%20detection%20are%20also%20quite%20small%2C%20with%20the%20largest%20dataset%20having%20only%20149%20videos.%20The%20paper%20addresses%20the%20first%20problem%20using%20special%20spatiotemporal%20graph%20convolution%20that%20successfully%20captures%20important%20gait-related%20features.%20To%20handle%20the%20small%20dataset%20size%2C%20a%20deep%20spatiotemporal%20graph%20convolution%20network%20pre-trained%20on%20an%20action%20recognition%20dataset%20is%20systematically%20truncated%20and%20then%20fine-tuned%20on%20the%20ataxia%20dataset%20to%20obtain%20the%20AtGCN%20model.%20The%20paper%20also%20presents%20an%20augmentation%20strategy%20that%20segments%20a%20video%20sequence%20into%20multiple%20gait%20cycles.%20The%20proposed%20AtGCN%20model%20then%20operates%20on%20a%20graph%20of%20body%20part%20locations%20belonging%20to%20a%20single%20gait%20cycle.%20The%20evaluation%20results%20support%20the%20strength%20of%20the%20proposed%20AtGCN%20model%2C%20as%20it%20outperforms%20the%20state-of-the-art%20in%20detection%20and%20severity%20prediction%20with%2 {"title": "Layered Quantum Architecture Search for 3D Point Cloud Classification", "author": "Natacha Kuete Meli and Jovita Lukasik and Vladislav Golyanik and Michael Moeller", "abstract": "We introduce layered Quantum Architecture Search (layered-QAS), a strategy inspired by classical network morphism that designs Parametrised Quantum Circuit (PQC) architectures by progressively growing and adapting them. PQCs offer strong expressiveness with relatively few parameters, yet they lack standard architectural layers (e.g., convolution, attention) that encode inductive biases for a given learning task. To assess the effectiveness of our method, we focus on 3D point cloud classification as a challenging yet highly structured problem. Whereas prior work on this task has used PQCs only as feature extractors for classical classifiers, our approach uses the PQC as the main building block of the classification model. Simulations show that our layered-QAS mitigates barren plateau, outperforms quantum-adapted local and evolutionary QAS baselines, and achieves state-of-the-art results among PQC-based methods on the ModelNet dataset.", "link": "http://arxiv.org/abs/2603.20024v1", "date": "2026-03-20", "relevancy": 2.4797, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5005}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4938}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4935}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Layered%20Quantum%20Architecture%20Search%20for%203D%20Point%20Cloud%20Classification&body=Title%3A%20Layered%20Quantum%20Architecture%20Search%20for%203D%20Point%20Cloud%20Classification%0AAuthor%3A% igns%2520Parametrised%2520Quantum%2520Circuit%2520%2528PQC%2529%2520architectures%2520by%2520progressively%2520growing%2520and%2520adapting%2520them.%2520PQCs%2520offer%2520strong%2520expressiveness%2520with%2520relatively%2520few%2520parameters%252C%2520yet%2520they%2520lack%2520standard%2520architectural%2520layers%2520%2528e.g.%252C%2520convolution%252C%2520attention%2529%2520that%2520encode%2520inductive%2520biases%2520for%2520a%2520given%2520learning%2520task.%2520To%2520assess%2520the%2520effectiveness%2520of%2520our%2520method%252C%2520we%2520focus%2520on%25203D%2520point%2520cloud%2520classification%2520as%2520a%2520challenging%2520yet%2520highly%2520structured%2520problem.%2520Whereas%2520prior%2520work%2520on%2520this%2520task%2520has%2520used%2520PQCs%2520only%2520as%2520feature%2520extractors%2520for%2520classical%2520classifiers%252C%2520our%2520approach%2520uses%2520the%2520PQC%2520as%2520the%2520main%2520building%2520block%2520of%2520the%2520classification%2520model.%2520Simulations%2520show%2520that%2520our%2520layered-QAS%2520mitigates%2520barren%2520plateau%252C%2520outperforms%2520quantum-adapted%2520local%2520and%2520evolutionary%2520QAS%2520baselines%252C%2520and%2520achieves%2520state-of-the-art%2520results%2520among%2520PQC-based%2520methods%2520on%2520the%2520ModelNet%2520dataset.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20024v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Layered%20Quantum%20Architecture%20Search%20for%203D%20Point%20Cloud%20Classification&entry.906535625=Natacha%20Kuete%20Meli%20and%20Jovita%20Lukasik%20and%20Vladislav%20Golyanik%20and%20Michael%20Moeller&entry.1292438233=We%20introduce%20layered%20Quantum%20Architecture%20Search%20%28layered-QAS%29%2C%20a%20strategy%20inspired%20by%20classical%20network%20morphism%20that%20designs%20Parametrised%20Quantum%20Circuit%20%28PQC%29%20architectures%20by%20progres {"title": "SegVGGT: Joint 3D Reconstruction and Instance Segmentation from Multi-View Images", "author": "Jinyuan Qu and Hongyang Li and Lei Zhang", "abstract": "3D instance segmentation methods typically rely on high-quality point clouds or posed RGB-D scans, requiring complex multi-stage processing pipelines, and are highly sensitive to reconstruction noise. While recent feed-forward transformers have revolutionized multi-view 3D reconstruction, they remain decoupled from high-level semantic understanding. In this work, we present SegVGGT, a unified end-to-end framework that simultaneously performs feed-forward 3D reconstruction and instance segmentation directly from multi-view RGB images. By introducing object queries that interact with multi-level geometric features, our method deeply integrates instance identification into the visual geometry grounded transformer. To address the severe attention dispersion problem caused by the massive number of global image tokens, we propose the Frame-level Attention Distribution Alignment (FADA) strategy. FADA explicitly guides object queries to attend to instance-relevant frames during training, providing structured supervision without extra inference overhead. Extensive experiments demonstrate that SegVGGT achieves the state-of-the-art performance on ScanNetv2 and ScanNet200, outperforming both recent joint models and RGB-D-based approaches, while exhibiting strong generalization capabilities on ScanNet++.", "link": "http://arxiv.org/abs/2603.19926v1", "date": "2026-03-20", "relevancy": 2.4712, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6245}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6204}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5945}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SegVGGT%3A%20Joint%203D%20Reconstruction%20and%20Instance%20Segmentation%20from%20Multi-View%20Images&body=Title%3A%20SegVGGT%3A%20Joint%203D%20Reconstruction%20and%20Instance%20Segmentation%20from%20Multi-View%20Images%0AAuthor%3A%20Jinyuan%20Qu%20and%20Hongyang%20Li%20and%20Lei%20Zhang%0AAbstract%3A%203D%20instance%20segmentation%20methods%20typically%20rely%20on%20high-quality%20point%20clouds%20or%20posed%20RGB-D%20scans%2C%20requiring%20complex%20multi-stage%20processing%20pipelines%2C%20and%20are%20highly%20sensitive%20to%20reconstruction%20noise.%20While%20recent%20feed-forward%20transformers%20have%20revolutionized%20multi-view%203D%20reconstruction%2C%20they%20remain%20decoupled%20from%20high-level%20semantic%20understanding.%20In%20this%20work%2C%20we%20present%20SegVGGT%2C%20a%20unified%20end-to-end%20framework%20that%20simultaneously%20performs%20feed-forward%203D%20reconstruction%20and%20instance%20segmentation%20directly%20from%20multi-view%20RGB%20images.%20By%20introducing%20object%20queries%20that%20interact%20with%20multi-level%20geometric%20features%2C%20our%20method%20deeply%20integrates%20instance%20identification%20into%20the%20visual%20geometry%20grounded%20transformer.%20To%20address%20the%20severe%20attention%20dispersion%20problem%20caused%20by%20the%20massive%20number%20of%20global%20image%20tokens%2C%20we%20propose%20the%20Frame-level%20Attention%20Distribution%20Alignment%20%28FADA%29%20strategy.%20FADA%20explicitly%20guides%20object%20queries%20to%20attend%20to%20instance-relevant%20frames%20during%20training%2C%20providing%20structured%20supervision%20without%20extra%20inference%20overhead.%20Extensive%20experiments%20demonstrate%20that%20SegVGGT%20achieves%20the%20state-of-the-art%20performance%20on%20ScanNetv2%20and%20ScanNet200%2C%20outperforming%20both%20recent%20joint%20models%20and%20RGB-D-based%20approaches%2C%20while%20exhibiting%20strong%20generalization%20capabilities%20on%20ScanNet%2B%2B.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19926v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSegVGGT%253A%2520Joint%25203D%2520Reconstruction%2520and%2520Instance%2520Segmentation%2520from%2520Multi-View%2520Images%26entry.906535625%3DJinyuan%2520Qu%2520and%2520Hongyang%2520Li%2520and%2520Lei%2520Zhang%26entry.1292438233%3D3D%2520instance%2520segmentation%2520methods%2520typically%2520rely%2520on%2520high-quality%2520point%2520clouds%2520or%2520posed%2520RGB-D%2520scans%252C%2520requiring%2520complex%2520multi-stage%2520processing%2520pipelines%252C%2520and%2520are%2520highly%2520sensitive%2520to%2520reconstruction%2520noise.%2520While%2520recent%2520feed-forward%2520transformers%2520have%2520revolutionized%2520multi-view%25203D%2520reconstruction%252C%2520they%2520remain%2520decoupled%2520from%2520high-level%2520semantic%2520understanding.%2520In%2520this%2520work%252C%2520we%2520present%2520SegVGGT%252C%2520a%2520unified%2520end-to-end%2520framework%2520that%2520simultaneously%2520performs%2520feed-forward%25203D%2520reconstruction%2520and%2520instance%2520segmentation%2520directly%2520from%2520multi-view%2520RGB%2520images.%2520By%2520introducing%2520object%2520queries%2520that%2520interact%2520with%2520multi-level%2520geometric%2520features%252C%2520our%2520method%2520deeply%2520integrates%2520instance%2520identification%2520into%2520the%2520visual%2520geometry%2520grounded%2520transformer.%2520To%2520address%2520the%2520severe%2520attention%2520dispersion%2520problem%2520caused%2520by%2520the%2520massive%2520number%2520of%2520global%2520image%2520tokens%252C%2520we%2520propose%2520the%2520Frame-level%2520Attention%2520Distribution%2520Alignment%2520%2528FADA%2529%2520strategy.%2520FADA%2520explicitly%2520guides%2520object%2520queries%2520to%2520attend%2520to%2520instance-relevant%2520frames%2 stribution%20Alignment%20%28FADA%29%20strategy.%20FADA%20explicitly%20guides%20object%20queries%20to%20attend%20to%20instance-relevant%20frames%20during%20training%2C%20providing%20structured%20supervision%20without%20extra%20inference%20overhead.%20Extensive%20experiments%20demonstrate%20that%20SegVGGT%20achieves%20the%20state-of-the-art%20performance%20on%20ScanNetv2%20and%20ScanNet200%2C%20outperforming%20both%20recent%20joint%20models%20and%20RGB-D-based%20approaches%2C%20while%20exhibiting%20strong%20generalization%20capabilities%20on%20ScanNet%2B%2B.&entry.1838667208=http%3A//arxiv.org/abs/2603.19926v1&entry.124074799=Read"},
{"title": "EgoForge: Goal-Directed Egocentric World Simulator", "author": "Yifan Shen and Jiateng Liu and Xinzhuo Li and Yuanzhe Liu and Bingxuan Li and Houze Yang and Wenqi Jia and Yijiang Li and Tianjiao Yu and James Matthew Rehg and Xu Cao and Ismini Lourentzou", "abstract": "Generative world models have shown promise for simulating dynamic environments, yet egocentric video remains challenging due to rapid viewpoint changes, frequent hand-object interactions, and goal-directed procedures whose evolution depends on latent human intent. Existing approaches either focus on hand-centric instructional synthesis with limited scene evolution, perform static view translation without modeling action dynamics, or rely on dense supervision, such as camera trajectories, long video prefixes, synchronized multicamera capture, etc. In this work, we introduce EgoForge, an egocentric goal-directed world simulator that generates coherent, first-person video rollouts from minimal static inputs: a single egocentric image, a high-level instruction, and an optional auxiliary exocentric view. To improve intent alignment and temporal consistency, we propose VideoDiffusionNFT, a trajectory-level reward-guided refinement that optimizes goal completion, temporal causality, scene consistency, and perceptual fidelity during diffusion sampling. Extensive experiments show EgoForge achieves consistent gains in semantic alignment, geometric stability, and motion fidelity over strong baselines, and robust performance in real-world smart-glasses experiments.", "link": "http://arxiv.org/abs/2603.20169v1", "date": "2026-03-20", "relevancy": 2.4533, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6513}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.606}, {"title": "Genie: Generative Interactive Environments", "link": {"title": "LumosX: Relate Any Identities with Their Attributes for Personalized Video Generation", "author": "Jiazheng Xing and Fei Du and Hangjie Yuan and Pengwei Liu and Hongbin Xu and Hai Ci and Ruigang Niu and Weihua Chen and Fan Wang and Yong Liu", "abstract": "Recent advances in diffusion models have significantly improved text-to-video generation, enabling personalized content creation with fine-grained control over both foreground and background elements. However, precise face-attribute alignment across subjects remains challenging, as existing methods lack explicit mechanisms to ensure intra-group consistency. Addressing this gap requires both explicit modeling strategies and face-attribute-aware data resources. We therefore propose LumosX, a framework that advances both data and model design. On the data side, a tailored collection pipeline orchestrates captions and visual cues from independent videos, while multimodal large language models (MLLMs) infer and assign subject-specific dependencies. These extracted relational priors impose a finer-grained structure that amplifies the expressive control of personalized video generation and enables the construction of a comprehensive benchmark. On the modeling side, Relational Self-Attention and Relational Cross-Attention intertwine position-aware embeddings with refined attention dynamics to inscribe explicit subject-attribute dependencies, enforcing disciplined intra-group cohesion and amplifying the separation between distinct subject clusters. Comprehensive evaluations on our benchmark demonstrate that LumosX achieves state-of-the-art performance in fine-grained, identity-consistent, and semantically aligned personalized multi-subject video generation. Code and models are available at https://jiazheng-xing.github.io/lumosx-home/.", "link": "http://arxiv.org/abs/2603.20192v1", "date": "2026-03-20", "relevancy": 2.4499, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http: f%20personalized%20video%20generation%20and%20enables%20the%20construction%20of%20a%20comprehensive%20benchmark.%20On%20the%20modeling%20side%2C%20Relational%20Self-Attention%20and%20Relational%20Cross-Attention%20intertwine%20position-aware%20embeddings%20with%20refined%20attention%20dynamics%20to%20inscribe%20explicit%20subject-attribute%20dependencies%2C%20enforcing%20disciplined%20intra-group%20cohesion%20and%20amplifying%20the%20separation%20between%20distinct%20subject%20clusters.%20Comprehensive%20evaluations%20on%20our%20benchmark%20demonstrate%20that%20LumosX%20achieves%20state-of-the-art%20performance%20in%20fine-grained%2C%20identity-consistent%2C%20and%20semantically%20aligned%20personalized%20multi-subject%20video%20generation.%20Code%20and%20models%20are%20available%20at%20https%3A//jiazheng-xing.github.io/lumosx-home/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20192v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLumosX%253A%2520Relate%2520Any%2520Identities%2520with%2520Their%2520Attributes%2520for%2520Personalized%2520Video%2520Generation%26entry.906535625%3DJiazheng%2520Xing%2520and%2520Fei%2520Du%2520and%2520Hangjie%2520Yuan%2520and%2520Pengwei%2520Liu%2520and%2520Hongbin%2520Xu%2520and%2520Hai%2520Ci%2520and%2520Ruigang%2520Niu%2520and%2520Weihua%2520Chen%2520and%2520Fan%2520Wang%2520and%2520Yong%2520Liu%26entry.1292438233%3DRecent%2520advances%2520in%2520diffusion%2520models%2520have%2520significantly%2520improved%2520text-to-video%2520generation%252C%2520enabling%2520personalized%2520content%2520creation%2520with%2520fine-grained%2520control%2520over%2520both%2520foreground%2520and%2520background%2520elements.%2520However%252C%2520precise%2520face-attribute%2520alignment%2520across%2520subjects%2520remains%2520challenging%252C%2520as%2520existing%2520methods%2520lack%2520explicit%2520mechanisms%2520to%2520ensure%2520intra-group%2520consistency.%2520Addressing {"title": "Can Large Multimodal Models Inspect Buildings? A Hierarchical Benchmark for Structural Pathology Reasoning", "author": "Hui Zhong and Yichun Gao and Luyan Liu and Hai Yang and Wang Wang and Haowei Zhang and Xinhu Zheng", "abstract": "Automated building facade inspection is a critical component of urban resilience and smart city maintenance. Traditionally, this field has relied on specialized discriminative models (e.g., YOLO, Mask R-CNN) that excel at pixel-level localization but are constrained to passive perception and worse generization without the visual understandng to interpret structural topology. Large Multimodal Models (LMMs) promise a paradigm shift toward active reasoning, yet their application in such high-stakes engineering domains lacks rigorous evaluation standards. To bridge this gap, we introduce a human-in-the-loop semi-automated annotation framework, leveraging expert-proposal verification to unify 12 fragmented datasets into a standardized, hierarchical ontology. Building on this foundation, we present \\textit{DefectBench}, the first multi-dimensional benchmark designed to interrogate LMMs beyond basic semantic recognition. \\textit{DefectBench} evaluates 18 state-of-the-art (SOTA) LMMs across three escalating cognitive dimensions: Semantic Perception, Spatial Localization, and Generative Geometry Segmentation. Extensive experiments reveal that while current LMMs demonstrate exceptional topological awareness and semantic understanding (effectively diagnosing \"what\" and \"how\"), they exhibit significant deficiencies in metric localization precision (\"where\"). Crucially, however, we validate the viability of zero-shot generative segmentation, showing that general-purpose foundation models can rival specialized supervised networks without domain-specific training. This work provides both a rigorous benchmarking standard and a high-quality open-source database, establishing a new baseline for the advancement of autonomous AI agents in civil engineering.", "link": "http://arxiv.org/abs/2603.20148v1", "date": "2026-03-20", "relevancy": 2.4165, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6042}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6042}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20Large%20Multimodal%20Models%20Inspect%20Buildings%3F%20A%20Hierarchical%20Benchmark%20for%20Structural%20Pathology%20Reasoning&body=Title%3A%20Can%20Large%20Multimodal%20Models%20Inspect%20Buildings%3F%20A%20Hierarchical%20Benchmark%20for%20Structural%20Pathology%20Reasoning%0AAuthor%3A%20Hui%20Zhong%20and%20Yichun%20Gao%20and%20Luyan%20Liu%20and%20Hai%20Yang%20and%20Wang%20Wang%20and%20Haowei%20Zhang%20and%20Xinhu%20Zheng%0AAbstract%3A%20Automated%20building%20facade%20inspection%20is%20a%20critical%20component%20of%20urban%20resilience%20and%20smart%20city%20maintenance.%20Traditionally%2C%20this%20field%20has%20relied%20on%20specialized%20discriminative%20models%20%28e.g.%2C%20YOLO%2C%20Mask%20R-CNN%29%20that%20excel%20at%20pixel-level%20localization%20but%20are%20constrained%20to%20passive%20perception%20and%20worse%20generization%20without%20the%20visual%20understandng%20to%20interpret%20structural%20topology.%20Large%20Multimodal%20Models%20%28LMMs%29%20promise%20a%20paradigm%20shift%20toward%20active%20reasoning%2C%20yet%20their%20application%20in%20such%20high-stakes%20engineering%20domains%20lacks%20rigorous%20evaluation%20standards.%20To%20bridge%20this%20gap%2C%20we%20introduce%20a%20human-in-the-loop%20semi-automated%20annotation%20framework%2C%20leveraging%20expert-proposal%20verification%20to%20unify%2012%20fragmented%20datasets%20into%20a%20standardized%2C%20hierarchical%20ontology.%20Building%20on%20this%20foundation%2C%20we%20present%20%5Ctextit%7BDefectBench%7D%2C%20the%20first%20multi-dimensional%20benchmark%20designed%20to%20interrogate%20LMMs%20beyond%20basic%20semantic%20recognition.%20%5Ctextit%7BDefectBench%7D%20evaluates%2018%20state-of-the-art%20%28SOTA%29%20LMMs%20across%20three%20escalating%20cognitive%20dimensions%3A%20Semantic%20Perception%2C%20Spatial%20Localization%2C%20and%20Generative%20Geometry%20Segmentation.%20Extensive%20experiments%20reveal%20that%20while%20current%20LMMs%20demonstrate%20exceptional%20topological%20awareness%20and%20semantic%20understanding%20%28effectively%20diagnosing%20%22what%22%20and%20%22how%22%29%2C%20they%20exhibit%20significant%20deficiencies%20in%20metric%20localization%20precision%20%28%22where%22%29.%20Crucially%2C%20however%2C%20we%20validate%20the%20viability%20of%20zero-shot%20generative%20segmentation%2C%20showing%20that%20general-purpose%20foundation%20models%20can%20rival%20specialized%20supervised%20networks%20without%20domain-specific%20training.%20This%20work%20provides%20both%20a%20rigorous%20benchmarking%20standard%20and%20a%20high-quality%20open-source%20database%2C%20establishing%20a%20new%20baseline%20for%20the%20advancement%20of%20autonomous%20AI%20agents%20in%20civil%20engineering.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20148v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520Large%2520Multimodal%2520Models%2520Inspect%2520Buildings%253F%2520A%2520Hierarchical%2520Benchmark%2520for%2520Structural%2520Pathology%2520Reasoning%26entry.906535625%3DHui%2520Zhong%2520and%2520Yichun%2520Gao%2520and%2520Luyan%2520Liu%2520and%2520Hai%2520Yang%2520and%2520Wang%2520Wang%2520and%2520Haowei%2520Zhang%2520and%2520Xinhu%2520Zheng%26entry.1292438233%3DAutomated%2520build {"title": "Diffusion-Based Makeup Transfer with Facial Region-Aware Makeup Features", "author": "Zheng Gao and Debin Meng and Yunqi Miao and Zhensong Zhang and Songcen Xu and Ioannis Patras and Jifei Song", "abstract": "Current diffusion-based makeup transfer methods commonly use the makeup information encoded by off-the-shelf foundation models (e.g., CLIP) as condition to preserve the makeup style of reference image in the generation. Although effective, these works mainly have two limitations: (1) foundation models pre-trained for generic tasks struggle to capture makeup styles; (2) the makeup features of reference image are injected to the diffusion denoising model as a whole for global makeup transfer, overlooking the facial region-aware makeup features (i.e., eyes, mouth, etc) and limiting the regional controllability for region-specific makeup transfer. To address these, in this work, we propose Facial Region-Aware Makeup features (FRAM), which has two stages: (1) makeup CLIP fine-tuning; (2) identity and facial region-aware makeup injection. For makeup CLIP fine-tuning, unlike prior works using off-the-shelf CLIP, we synthesize annotated makeup style data using GPT-o3 and text-driven image editing model, and then use the data to train a makeup CLIP encoder through self-supervised and image-text contrastive learning. For identity and facial region-aware makeup injection, we construct before-and-after makeup image pairs from the edited images in stage 1 and then use them to learn to inject identity of source image and makeup of reference image to the diffusion denoising model for makeup transfer. Specifically, we use learnable tokens to query the makeup CLIP encoder to extract facial region-aware makeup features for makeup injection, which is learned via an attention loss to enable regional control. As for identity injection, we use a ControlNet Union to encode source image and its 3D mesh simultaneously. The experimental results verify the superiority of our regional controllability and our makeup transfer performance.", "link": "http://arxiv.org/abs/2603.20012v1", "date": "2026-03-20", "relevancy": 2.4162, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.616}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6134}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Diffusion-Based%20Makeup%20Transfer%20with%20Facial%20Region-Aware%20Makeup%20Features&body=Title%3A%20Diffusion-Based%20Makeup%20Transfer%20with%20Facial%20Region-Aware%20Makeup%20Features%0AAuthor%3A%20Zheng%20Gao%20and%20Debin%20Meng%20and%20Yunqi%20Miao%20and%20Zhensong%20Zhang%20and%20Songcen%20Xu%20and%20Ioannis%20Patras%20and%20Jifei%20Song%0AAbstract%3A%20Current%20diffusion-based%20makeup%20transfer%20methods%20commonly%20use%20the%20makeup%20information%20encoded%20by%20off-the-shelf%20foundation%20models%20%28e.g.%2C%20CLIP%29%20as%20condition%20to%20preserve%20the%20makeup%20style%20of%20reference%20image%20in%20the%20generation.%20Although%20effective%2C%20these%20works%20mainly%20have%20two%20limitations%3A%20%281%29%20foundation%20models%20pre-trained%20for%20generic%20tasks%20struggle%20to%20capture%20makeup%20styles%3B%20%282%29%20the%20makeup%20features%20of%20reference%20image%20are%20injected%20to%20the%20diffusion%20denoising%20model%20as%20a%20whole%20for%20global%20makeup%20transfer%2C%20overlooking%20the%20facial%20region-aware%20makeup%20features%20%28i.e.%2C%20eyes%2C%20mouth%2C%20etc%29%20and%20limiting%20the%20regional%20controllability%20for%20region-specific%20makeup%20transfer.%20To%20address%20these%2C%20in%20this%20work%2C%20we%20propose%20Facial%20Region-Aware%20Makeup%20features%20%28FRAM%29%2C%20which%20has%20two%20stages%3A%20%281%29%20makeup%20CLIP%20fine-tuning%3B%20%282%29%20identity%20and%20facial%20region-aware%20makeup%20injection.%20For%20makeup%20CLIP%20fine-tuning%2C%20unlike%20prior%20works%20using%20off-the-shelf%20CLIP%2C%20we%20synthesize%20annotated%20makeup%20style%20data%20using%20GPT-o3%20and%20text-driven%20image%20editing%20model%2C%20and%20then%20use%20the%20data%20to%20train%20a%20makeup%20CLIP%20encoder%20through%20self-supervised%20and%20image-text%20contrastive%20learning.%20For%20identity%20and%20facial%20region-aware%20makeup%20injection%2C%20we%20construct%20before-and-after%20makeup%20image%20pairs%20from%20the%20edited%20images%20in%20stage%201%20and%20then%20use%20them%20to%20learn%20to%20inject%20identity%20of%20source%20image%20and%20makeup%20of%20reference%20image%20to%20the%20diffusion%20denoising%20model%20for%20makeup%20transfer.%20Specifically%2C%20we%20use%20learnable%20tokens%20to%20query%20the%20makeup%20CLIP%20encoder%20to%20extract%20facial%20region-aware%20makeup%20features%20for%20makeup%20injection%2C%20which%20is%20learned%20via%20an%20attention%20loss%20to%20enable%20regional%20control.%20As%20for%20identity%20injection%2C%20we%20use%20a%20ControlNet%20Union%20to%20encode%20source%20image%20and%20its%203D%20mesh%20simultaneously.%20The%20experimental%20results%20verify%20the%20superiority%20of%20our%20regional%20controllability%20and%20our%20makeup%20transfer%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20012v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiffusion-Based%2520Makeup%2520Transfer%2520with%2520Facial%2520Region-Aware%2520Makeup%2520Features%26entry.906535625%3DZheng%2520Gao%2520and%2520Debin%2520Meng%2520and%2520Yunqi%2520Miao%2520and%2520Zhensong%2520Zhang%2520and%2520Songcen%2520Xu%2520and%2520Ioannis%2520Patras%2520and%2520Jifei%2520Song%26entry {"title": "Real-Time Structural Detection for Indoor Navigation from 3D LiDAR Using Bird's-Eye-View Images", "author": "Guanliang Li and Pedro Espinosa Angulo and David Perez Saura and Santiago Tapia Fernandez", "abstract": "Efficient structural perception is essential for mapping and autonomous navigation on resource-constrained robots. Existing 3D methods are computationally prohibitive, while traditional 2D geometric approaches lack robustness. This paper presents a lightweight, real-time framework that projects 3D LiDAR data into 2D Bird's-Eye-View (BEV) images to enable efficient detection of structural elements relevant to mapping and navigation. Within this representation, we systematically evaluate several feature extraction strategies, including classical geometric techniques (Hough Transform, RANSAC, and LSD) and a deep learning detector based on YOLO-OBB. The resulting detections are integrated through a spatiotemporal fusion module that improves stability and robustness across consecutive frames. Experiments conducted on a standard mobile robotic platform highlight clear performance trade-offs. Classical methods such as Hough and LSD provide fast responses but exhibit strong sensitivity to noise, with LSD producing excessive segment fragmentation that leads to system congestion. RANSAC offers improved robustness but fails to meet real-time constraints. In contrast, the YOLO-OBB-based approach achieves the best balance between robustness and computational efficiency, maintaining an end-to-end latency (satisfying 10 Hz operation) while effectively filtering cluttered observations in a low-power single-board computer (SBC) without using GPU acceleration. The main contribution of this work is a computationally efficient BEV-based perception pipeline enabling reliable real-time structural detection from 3D LiDAR on resource-constrained robotic platforms that cannot rely on GPU-intensive processing.", "link": "http://arxiv.org/abs/2603.19830v1", "date": "2026-03-20", "relevancy": 2.4127, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6218}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5909}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Real-Time%20Structural%20Detection%20for%20Indoor%20Navigation%20from%203D%20LiDAR%20Using%20Bird%27s-Eye-View%20Images&body=Title%3A%20Real-Time%20Structural%20Detection%20for%20Indoor%20Navigation%20from%203D%20LiDAR%20Using%20Bird%27s-Eye-View%20Images%0AAuthor%3A%20Guanliang%20Li%20and%20Pedro%20Espinosa%20Angulo%20and%20David%20Perez%20Saura%20and%20Santiago%20Tapia%20Fernandez%0AAbstract%3A%20Efficient%20structural%20perception%20is%20essential%20for%20mapping%20and%20autonomous%20navigation%20on%20resource-constrained%20robots.%20Existing%203D%20methods%20are%20computationally%20prohibitive%2C%20while%20traditional%202D%20geometric%20approaches%20lack%20robustness.%20This%20paper%20presents%20a%20lightweight%2C%20real-time%20framework%20that%20projects%203D%20LiDAR%20data%20into%202D%20Bird%27s-Eye-View%20%28BEV%29%20images%20to%20enable%20efficient%20detection%20of%20structural%20elements%20relevant%20to%20mapping%20and%20navigation.%20Within%20this%20representation%2C%20we%20systematically%20evaluate%20several%20feature%20extraction%20strategies%2C%20including%20classical%20geometric%20techniques%20%28Hough%20Transform%2C%20RANSAC%2C%20and%20LSD%29%20and%20a%20deep%20learning%20detector%20based%20on%20YOLO-OBB.%20The%20resulting%20detections%20are%20integrated%20through%20a%20spatiotemporal%20fusion%20module%20that%20improves%20stability%20and%20robustness%20across%20consecutive%20frames.%20Experiments%20conducted%20on%20a%20standard%20mobile%20robotic%20platform%20highlight%20clear%20performance%20trade-offs.%20Classical%20methods%20such%20as%20Hough%20and%20LSD%20provide%20fast%20responses%20but%20exhibit%20strong%20sensitivity%20to%20noise%2C%20with%20LSD%20producing%20excessive%20segment%20fragmentation%20that%20leads%20to%20system%20congestion.%20RANSAC%20offers%20improved%20robustness%20but%20fails%20to%20meet%20real-time%20constraints.%20In%20contrast%2C%20the%20YOLO-OBB-based%20approach%20achieves%20the%20best%20balance%20between%20robustness%20and%20computational%20efficiency%2C%20maintaining%20an%20end-to-end%20latency%20%28satisfying%2010%20Hz%20operation%29%20while%20effectively%20filtering%20cluttered%20observations%20in%20a%20low-power%20single-board%20computer%20%28SBC%29%20without%20using%20GPU%20acceleration.%20The%20main%20contribution%20of%20this%20work%20is%20a%20computationally%20efficient%20BEV-based%20perception%20pipeline%20enabling%20reliable%20real-time%20structural%20detection%20from%203D%20LiDAR%20on%20resource-constrained%20robotic%20platforms%20that%20cannot%20rely%20on%20GPU-intensive%20processing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19830v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReal-Time%2520Structural%2520Detection%2520for%2520Indoor%2520Navigation%2520from%25203D%2520LiDAR%2520Using%2520Bird%2527s-Eye-View%2520Images%26entry.906535625%3DGuanliang%2520Li%2520and%2520Pedro%2520Espinosa%2520Angulo%2520and%2520David%2520Perez%2520Saura%2520and%2520Santiago%2520Tapia%2520Fernandez%26entry.1292438233%3DEfficient%2520structural%2520perception%2520is%2520essential%2520for%2520mapping%2520and%2520autonomous%2520navigation%2520on%2520resource-constrained%2520robots.%2520Existing%25203D%2520methods%2520are%2520computationally%2520prohibitive%252C%2520while%2520traditional%25 {"title": "Balancing the Reasoning Load: Difficulty-Differentiated Policy Optimization with Length Redistribution for Efficient and Robust Reinforcement Learning", "author": "Yinan Xia and Haotian Zhang and Huiming Wang", "abstract": "Large Reasoning Models (LRMs) have shown exceptional reasoning capabilities, but they also suffer from the issue of overthinking, often generating excessively long and redundant answers.\n  For problems that exceed the model's capabilities, LRMs tend to exhibit the overconfidence phenomenon, generating overly short but incorrect answers, which may contribute to suboptimal performance.\n  To address these issues, we propose Difficulty-Differentiated Policy Optimization (DDPO), an efficient reinforcement learning algorithm that optimizes simple and complex tasks separately based on the overconfidence phenomenon.\n  Specifically, it reduces the output length for simple tasks without compromising accuracy, while for complex tasks, it expands the exploration space to improve performance. We further derive the theoretical conditions for maximizing expected accuracy, which require the length distribution to closely approximate the optimal length and be as concentrated as possible. Based on these conditions, we propose using the difficulty-level average as a well-founded reference for length optimization.\n  Extensive experiments on both in-domain and out-of-domain benchmarks validate the superiority and effectiveness of DDPO. Compared to GRPO, DDPO reduces the average answer length by 12% while improving accuracy by 1.85% across multiple benchmarks, achieving a better trade-off between accuracy and length. The code is available at https://github.com/Yinan-Xia/DDPO.", "link": "http://arxiv.org/abs/2603.18533v2", "date": "2026-03-20", "relevancy": 2.4115, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4851}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4836}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4782}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Balancing%20the%20Reasoning%20Load%3A%20Difficulty-Differentiated%20Policy%20Optimization%20with%20Length%20Redistribution%20for%20Efficient%20and%20Robust%20Reinforcement%20Learning&body=Title%3A%20Balancing%20the%20Reasoning%20Load%3A%20Difficulty-Differentiated%20Policy%20Optimization%20with%20Length%20Redistribution%20for%20Efficient%20and%20Robust%20Reinforcement%20Learning%0AAuthor%3A%20Yinan%20Xia%20and%20Haotian%20Zhang%20and%20Huiming%20Wang%0AAbstract%3A%20Large%20Reasoning%20Models%20%28LRMs%29%20have%20shown%20exceptional%20reasoning%20capabilities%2C%20but%20they%20also%20suffer%20from%20the%20issue%20of%20overthinking%2C%20often%20generating%20excessively%20long%20and%20redundant%20answers.%0A%20%20For%20problems%20that%20exceed%20the%20model%27s%20capabilities%2C%20LRMs%20tend%20to%20exhibit%20the%20overconfidence%20phenomenon%2C%20generating%20overly%20short%20but%20incorrect%20answers%2C%20which%20may%20contribute%20to%20suboptimal%20performance.%0A%20%20To%20address%20these%20issues%2C%20we%20propose%20Difficulty-Differentiated%20Policy%20Optimization%20%28DDPO%29%2C%20an%20efficient%20reinforcement%20learning%20algorithm%20that%20optimizes%20simple%20and%20complex%20tasks%20separately%20based%20on%20the%20overconfidence%20phenomenon.%0A%20%20Specifically%2C%20it%20reduces%20the%20output%20length%20for%20simple%20tasks%20without%20compromising%20accuracy%2C%20while%20for%20complex%20tasks%2C%20it%20expands%20the%20exploration%20space%20to%20improve%20performance.%20We%20further%20derive%20the%20theoretical%20conditions%20for%20maximizing%20expected%20accuracy%2C%20which%20require%20the%20length%20distribution%20to%20closely%20approximate%20the%20optimal%20length%20and%20be%20as%20concentrated%20as%20possible.%20Based%20on%20these%20conditions%2C%20we%20propose%20using%20the%20difficulty-level%20average%20as%20a%20well-founded%20reference%20for%20length%20optimization.%0A%20%20Extensive%20experiments%20on%20both%20in-domain%20and%20out-of-domain%20benchmarks%20validate%20the%20superiority%20and%20effectiveness%20of%20DDPO.%20Compared%20to%20GRPO%2C%20DDPO%20reduces%20the%20average%20answer%20length%20by%2012%25%20while%20improving%20accuracy%20by%201.85%25%20across%20multiple%20benchmarks%2C%20achieving%20a%20better%20trade-off%20between%20accuracy%20and%20length.%20The%20code%20is%20available%20at%20https%3A//github.com/Yinan-Xia/DDPO.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18533v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBalancing%2520the%2520Reasoning%2520Load%253A%2520Difficulty-Differentiated%2520Policy%2520Optimization%2520with%2520Length%2520Redistribution%2520for%2520Efficient%2520and%2520Robust%2520Reinforcement%2520Learning%26entry.906535625%3DYinan%2520Xia%2520and%2520Haotian%2520Zhang%2520and%2520Huiming%2520Wang%26entry.1292438233%3DLarge%2520Reasoning%2520Models%2520%2528LRMs%2529%2520have%2520shown%2520exceptional%2520reasoning%2520capabilities%252C%2520but%2520they%2520also%2520suffer%2520from%2520the%2520issue%2520of%2520overthinking%252C%2520often%2520generating%2520excessively%2520long%2520and%2520redundant%2520answers.%250A%2520%2520For%2520problems%2520that%2520exceed%2520the%2520model%2527s%2520capabilities%252C%2520LRMs%2520tend%2520to%2520exhibit%2520the%2520overconfidence%2520phenomenon%252C%2520generating%2520overly%2520short%2520but%2520incorrect%2520answers%252C%2520which%2520may%2520contribute%2520to%2520suboptimal%2520performance.%250A%2520%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520Difficulty-Differentiated%2520Policy%2520Optimization%2520%2 {"title": "Revisiting Gene Ontology Knowledge Discovery with Hierarchical Feature Selection and Virtual Study Group of AI Agents", "author": "Cen Wan and Alex A. Freitas", "abstract": "Large language models have achieved great success in multiple challenging tasks, and their capacity can be further boosted by the emerging agentic AI techniques. This new computing paradigm has already started revolutionising the traditional scientific discovery pipelines. In this work, we propose a novel agentic AI-based knowledge discovery-oriented virtual study group that aims to extract meaningful ageing-related biological knowledge considering highly ageing-related Gene Ontology terms that are selected by hierarchical feature selection methods. We investigate the performance of the proposed agentic AI framework by considering four different model organisms' ageing-related Gene Ontology terms and validate the biological findings by reviewing existing research articles. It is found that the majority of the AI agent-generated scientific claims can be supported by existing literatures and the proposed internal mechanisms of the virtual study group also play an important role in the designed agentic AI-based knowledge discovery framework.", "link": "http://arxiv.org/abs/2603.20132v1", "date": "2026-03-20", "relevancy": 2.4058, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5086}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4683}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4666}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Gene%20Ontology%20Knowledge%20Discovery%20with%20Hierarchical%20Feature%20Selection%20and {"title": "An Empirical Study of SFT-DPO Interaction and Parameterization in Small Language Models", "author": "Yuming Feng and Christy Yang", "abstract": "Direct Preference Optimization (DPO) is widely used after supervised fine-tuning (SFT) to align language models, yet empirical behavior under small backbones and modest data is under-specified. We systematically compare SFT-only, DPO-only, and staged SFT-to-DPO training alongside full fine-tuning (FFT) versus LoRA on a GPT-2-scale decoder, evaluating paraphrase detection and Shakespearean sonnet continuation. DPO yields small, task-dependent gains over strong SFT and can match competitive SFT accuracy without a warm start when the preference construction closely parallels the supervised objective. In contrast, parameterization dominates: FFT consistently outperforms LoRA at matched training depth, and LoRA does not reduce wall-clock time on our hardware. These findings indicate that, in this small-scale regime, supervised full-parameter adaptation remains the primary performance lever, while preference optimization and low-rank adaptation provide limited marginal returns.", "link": "http://arxiv.org/abs/2603.20100v1", "date": "2026-03-20", "relevancy": 2.405, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4829}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4801}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4801}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Empirical%20Study%20of%20SFT-DPO%20Interaction%20and%20Parameterization%20in%20Small%20Language%20Models&body=Title%3A%20An%20Empirical%20Study%20of%20SFT-DPO%20Interaction%20and%20Parameterization%20in%20Small%20Language%20Models%0AAuthor%3A%20Yuming%20Feng%20and%20Christy%20Yang%0AAbstract%3A%20Direct%20Preference%20Optimization%20%28DPO%29%20is%20widely%20used%20after%20supervised%20fine-tuning%20%28SFT%29%20to%20align%20language%20models%2C%20yet%20empirical%20behavior%20under%20small%20backbones%20and%20modest%20data%20is%20under-specified.%20We%20systematically%20compare%20SFT-only%2C%20DPO-only%2C%20and%20staged%20SFT-to-DPO%20training%20alongside%20full%20fine-tuning%20%28FFT%29%20versus%20LoRA%20on%20a%20GPT-2-scale%20decoder%2C%20evaluating%20paraphrase%20detection%20and%20Shakespearean%20sonnet%20continuation.%20DPO%20yields%20small%2C%20task-dependent%20gains%20over%20strong%20SFT%20and%20can%20match%20competitive%20SFT%20accuracy%20without%20a%20warm%20start%20when%20the%20preference%20construction%20closely%20parallels%20the%20supervised%20objective.%20In%20contrast%2C%20parameterization%20dominates%3A%20FFT%20consistently%20outperforms%20LoRA%20at%20matched%20training%20depth%2C%20and%20LoRA%20does%20not%20reduce%20wall-clock%20time%20on%20our%20hardware.%20These%20findings%20indicate%20that%2C%20in%20this%20small-scale%20regime%2C%20supervised%20full-parameter%20adaptation%20remains%20the%20primary%20performance%20lever%2C%20while%20preference%20optimization%20and%20low-rank%20adaptation%20provide%20limited%20marginal%20returns.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20100v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Empirical%2520Study%2520of%2520SFT-DPO%2520Interaction%2520and%2520Parameterization%2520in%2520Small%2520Language%2520Models%26entry.906535625%3DYuming%2520Feng%2520and%2520Christy%2520Yang%26entry.1292438233%3DDirect%2520Preference%2520Optimization%2520%2528DPO%2529%2520is%2520widely%2520used%2520after%2520supervised%2520fine-tuning%2520%2528SFT%2529%2520to%2520align%2520language%2520models%252C%2520yet%2520empirical%2520behavior%252 {"title": "Timestep-Aware Block Masking for Efficient Diffusion Model Inference", "author": "Haodong He and Yuan Gao and Weizhong Zhang and Gui-Song Xia", "abstract": "Diffusion Probabilistic Models (DPMs) have achieved great success in image generation but suffer from high inference latency due to their iterative denoising nature. Motivated by the evolving feature dynamics across the denoising trajectory, we propose a novel framework to optimize the computational graph of pre-trained DPMs on a per-timestep basis. By learning timestep-specific masks, our method dynamically determines which blocks to execute or bypass through feature reuse at each inference stage. Unlike global optimization methods that incur prohibitive memory costs via full-chain backpropagation, our method optimizes masks for each timestep independently, ensuring a memory-efficient training process. To guide this process, we introduce a timestep-aware loss scaling mechanism that prioritizes feature fidelity during sensitive denoising phases, complemented by a knowledge-guided mask rectification strategy to prune redundant spatial-temporal dependencies. Our approach is architecture-agnostic and demonstrates significant efficiency gains across a broad spectrum of models, including DDPM, LDM, DiT, and PixArt. Experimental results show that by treating the denoising process as a sequence of optimized computational paths, our method achieves a superior balance between sampling speed and generative quality. Our code will be released.", "link": "http://arxiv.org/abs/2603.19939v1", "date": "2026-03-20", "relevancy": 2.4038, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6662}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6004}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5754}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Timestep-Aware%20Block%20Masking%20for%20Efficient%20Diffusion%20Model%20Inference&body=Title%3A%20Timestep-Aware%20Block%20Masking%20for%20Efficient%20Diffusion%20Model%20Inference%0AAuthor%3A%20Haodong%20He%20and%20Yuan%20Gao%20and%20Weizhong%20Zhang%20and%20Gui-Song%20Xia%0AAbstract%3A%20Diffusion%20Probabilistic%20Models%20%28DPMs%29%20have%20achieved%20great%20success%20in%20image%20generation%20but%20suffer%20from%20high%20inference%20latency%20due%20to%20their%20iterative%20denoising%20nature.%20Motivated%20by%20the%20evolving%20feature%20dynamics%20across%20the%20denoising%20trajectory%2C%20we%20propose%20a%20novel%20framework%20to%20optimize%20the%20computational%20graph%20of%20pre-trained%20DPMs%20on%20a%20per-timestep%20basis.%20By%20learning%20timestep-specific%20masks%2C%20our%20method%20dynamically%20determines%20which%20blocks%20to%20execute%20or%20bypass%20through%20feature%20reuse%20at%20each%20inference%20stage.%20Unlike%20global%20optimization%20methods%20that%20incur%20prohibitive%20memory%20costs%20via%20full-chain%20backpropagation%2C%20our%20method%20optimizes%20masks%20for%20each%20timestep%20independently%2C%20ensuring%20a%20memory-efficient%20training%20process.%20To%20guide%20this%20process%2C%20we%20introduce%20a%20timestep-aware%20loss%20scaling%20mechanism%20that%20prioritizes%20feature%20fidelity%20during%20sensitive%20denoising%20phases%2C%20complemented%20by%20a%20knowledge-guided%20mask%20rectification%20strategy%20to%20prune%20redundant%20spatial-temporal%20dependencies.%20Our%20approach%20is%20architecture-agnostic%20and%20demonstrates%20significant%20efficiency%20gains%20across%20a%20broad%20spectrum%20of%20models%2C%20including%20DDPM%2C%20LDM%2C%20DiT%2C%20and%20PixArt.%20Experimental%20results%20show%20that%20by%20treating%20the%20denoising%20process%20as%20a%20sequence%20of%20optimized%20computational%20paths%2C%20our%20method%20achieves%20a%20superior%20balance%20between%20sampling%20speed%20and%20generative%20quality.%20Our%20code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19939v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTimestep-Aware%2520Block%2520Masking%2520for%2520Efficient%2520Diffusion%2520Model%2520Inference%26entry.906535625%3DHaodong%2520He%2520and%2520Yuan%2520Gao%2520and%2520Weizhong%2520Zhang%2520and%2520Gui-Song%2520Xia%26entry.1292438233%3DDiffusion%2520Probabilistic%2520Models%2520%2528DPMs%2529%2520have%2520achieved%2520great%2520success%2520in%2520image%2520generation%2520but%2520suffer%2520from%2520high%2520inference%2520latency%2520due%2520to%2520their%2520iterative%2520denoising%2520nature.%2520Motivated%2520by%2520the%2520evolving%2520feature%2520dynamics%2520across%2520the%2520denoising%2520trajectory%252C%2520we%2520propose%2520a%2520novel%2520framework%2520to%2520optimize%2520the%2520computational%2520graph%2520of%2520pre-trained%2520DPMs%2520on%2520a%2520per-timestep%2520basis.%2520By%2520learning%2520timestep-specific%2520masks%252C%2520our%2520method%2520dynamically%2520determines%2520which%2520blocks%2520to%2520execute%2520or%2520bypass%2520through%2520feature%2520reuse%2520at%2520each%2520inference%2520stage.%2520Unlike%2520global%2520optimization%2520methods%2520that%2520incur%2520prohibitive%2520memory%2520costs%2520via%2520full-chain%2520backpropagation%252C%2520our%2520method%2520optimizes%2520masks%2520for%2520each%2520timestep%2520independently%252C%2520ensuring%2520a%2520memory-efficient%2520training%2520process.%2520To%2520guide%2520this%2520process%252C%2520we%2520introduce%2520a%2520timestep-aware%2520loss%2520scaling%2520mechanism%2520that%2520prioritizes%2520feature%2520fidelity%2520during%2520sensitive%2520denoising%2520phases%252C%2520complemented%2520by%2520a%2520knowl {"title": "ReMAP-DP: Reprojected Multi-view Aligned PointMaps for Diffusion Policy", "author": "Xinzhang Yang and Renjun Wu and Jinyan Liu and Xuesong Li", "abstract": "Generalist robot policies built upon 2D visual representations excel at semantic reasoning but inherently lack the explicit 3D spatial awareness required for high-precision tasks. Existing 3D integration methods struggle to bridge this gap due to the structural irregularity of sparse point clouds and the geometric distortion introduced by multi-view orthographic rendering. To overcome these barriers, we present ReMAP-DP, a novel framework synergizing standardized perspective reprojection with a structure-aware dual-stream diffusion policy. By coupling the re-projected views with pixel-aligned PointMaps, our dual-stream architecture leverages learnable modality embeddings to fuse frozen semantic features and explicit geometric descriptors, ensuring precise implicit patch-level alignment. Extensive experiments across simulation and real-world environments demonstrate ReMAP-DP's superior performance in diverse manipulation tasks. On RoboTwin 2.0, it attains a 59.3% average success rate, outperforming the DP3 baseline by +6.6%. On ManiSkill 3, our method yields a 28% improvement over DP3 on the geometrically challenging Stack Cube task. Furthermore, ReMAP-DP exhibits remarkable real-world robustness, executing high-precision and dynamic manipulations with superior data efficiency from only a handful of demonstrations. Project page is available at: https://icr-lab.github.io/ReMAP-DP/", "link": "http://arxiv.org/abs/2603.14977v2", "date": "2026-03-20", "relevancy": 2.4015, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6051}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v {"title": "Conditioning Protein Generation via Hopfield Pattern Multiplicity", "author": "Jeffrey D. Varner", "abstract": "Protein sequence generation via stochastic attention produces plausible family members from small alignments without training, but treats all stored sequences equally and cannot direct generation toward a functional subset of interest. We show that a single scalar parameter, added as a bias to the sampler's attention logits, continuously shifts generation from the full family toward a user-specified subset, with no retraining and no change to the model architecture. A practitioner supplies a small set of sequences (for example, hits from a binding screen) and a multiplicity ratio that controls how strongly generation favors them. The method is agnostic to what the subset represents: binding, stability, specificity, or any other property. We find that the conditioning is exact at the level of the sampler's internal representation, but that the decoded sequence phenotype can fall short because the dimensionality reduction used to encode sequences does not always preserve the residue-level variation that defines the functional split. We term this discrepancy the calibration gap and show that it is predicted by a simple geometric measure of how well the encoding separates the functional subset from the rest of the family. Experiments on five Pfam families (Kunitz, SH3, WW, Homeobox, and Forkhead domains) confirm the monotonic relationship between separation and gap across a fourfold range of geometries. Applied to omega-conotoxin peptides targeting a calcium channel involved in pain signaling, curated seeding from 23 characterized binders produces over a thousand candidates that preserve the primary pharmacophore and all experimentally identified binding determinants. These results show that stochastic attention enables practitioners to expand a handful of experimentally characterized sequences into diverse candidate libraries without retraining a generative model.", "link": "http://arxiv.org/abs/2603.20115v1", "date": "2026-03-20", "relevancy": 2.3889, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4876}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4738}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4719}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conditioning%20Protein%20Generation%20via%20Hopfield%20Pattern%20Multiplicity&body=Title%3A%20Conditioning%20Protein%20Generation%20via%20Hopfield%20Pattern%20Multiplicity%0AAuthor%3A%20Jeffrey%20D.%20Varner%0AAbstract%3A%20Protein%20sequence%20generation%20via%20stochastic%20attention%20produces%20plausible%20family%20members%20from%20small%20alignments%20without%20training%2C%20but%20treats%20all%20stored%20sequences%20equally%20and%20cannot%20direct%20generation%20toward%20a%20functional%20subset%20of%20interest.%20We%20show%20that%20a%20single%20scalar%20parameter%2C%20added%20as%20a%20bias%20to%20the%20sampler%27s%20attention%20logits%2C%20continuously%20shifts%20generation%20from%20the%20full%20family%20toward%20a%20user-specified%20subset%2C%20with%20no%20retraining%20and%20no%20change%20to%20the%20model%20architecture.%20A%20practitioner%20supplies%20a%20small%20set%20of%20sequences%20%28for%20example%2C%20hits%20from%20a%20binding%20screen%29%20and%20a%20multiplicity%20ratio%20that%20controls%20how%20strongly%20generation%20favors%20them.%20The%20method%20is%20agnostic%20to%20what%20the%20subset%20represents%3A%20binding%2C%20stability%2C%20specificity%2C%20or%20any%20other%20property.%20We%20find%20that%20the%20conditioning%20is%20exact%20at%20the%20level%20of%20the%20sampler%27s%20internal%20representation%2C%20but%20that%20the%20decoded%20sequence%20phenotype%20can%20fall%20short%20b {"title": "Fine-tuning Timeseries Predictors Using Reinforcement Learning", "author": "Hugo Cazaux and Ralph Rudd and Hlynur Stef\u00e1nsson and Sverrir \u00d3lafsson and Eyj\u00f3lfur Ingi \u00c1sgeirsson", "abstract": "This chapter presents three major reinforcement learning algorithms used for fine-tuning financial forecasters. We propose a clear implementation plan for backpropagating the loss of a reinforcement learning task to a model trained using supervised learning, and compare the performance before and after the fine-tuning. We find an increase in performance after fine-tuning, and transfer learning properties to the models, indicating the benefits of fine-tuning. We also highlight the tuning process and empirical results for future implementation by practitioners.", "link": "http://arxiv.org/abs/2603.20063v1", "date": "2026-03-20", "relevancy": 2.3735, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5196}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4663}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4381}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fine-tuning%20Timeseries%20Predictors%20Using%20Reinforcement%20Learning&body=Title%3A%20Fine-tuning%20Timeseries%20Predictors%20Using%20Reinforcement%20Learning%0AAuthor%3A%20Hugo%20Cazaux%20and%20Ralph%20Rudd%20and%20Hlynur%20Stef%C3%A1nsson%20and%20Sverrir%20%C3%93lafsson%20and%20Eyj%C3%B3lfur%20Ingi%20%C3%81sgeirsson%0AAbstract%3A%20This%20chapter%20presents%20three%20major%20reinforcement%20learning%20algorithms%20used%20for%20fine-tuning%20financial%20forecasters.%20We%20propose%20a%20clear%20implementation%20plan%20for%20backpropagating%20the%20loss%20of%20a%20reinforcement%20learning%20task%20to%20a%20model%20trained%20using%20supervised%20learning%2C%20and%20compare%20the%20performance%20before%20and%20after%20the%20fine-tuning.%20We%20find%20an%20increase%20in%20performance%20after%20fine-tuning%2C%20and%20transfer%20learning%20properties%20to%20the%20models%2C%20indicating%20the%20benefits%20of%20fine-tuning.%20We%20also%20highlight%20the%20tuning%20process%20and%20empirical%20results%20for%20future%20implementation%20by%20practitioners.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20063v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFine-tuning%2520Timeseries%2520Predictors%2520Using%2520Reinforcement%2520Learning%26entry.906535625%3DHugo%2520Cazaux%2520and%2520Ralph%2520Rudd%2520and%2520Hlynur%2520Stef%25C3%25A1nsson%2520and%2520Sverrir%2520%25C3%2593lafsson%2520and%2520Eyj%25C3%25B3lfur%2520Ingi%2520%25C3%2581sgeirsson%26entry.1292438233%3DThis%2520chapter%2520presents%2520three%2520major%2520reinforcement%2520learning%2520algorithms%2520used%2520for%2520fine-tuning%2520financial%2520forecasters.%2520We%2520propose%2520a%2520clear%2520implementation%2520plan%2520for%2520backpropagating%2520the%2520loss%2520of%2520a%2520reinforcement%2520learning%2520task%2520to%2520a%2520model%2520trained%2520using%2520supervised%2520learning%252C%2520and%2520compare%2520the%2520performance%2520before%2520and%2520after%2520the%2520fine-tuning.%2520We%2520find%2520an%2520increase%2520in%2520performance%2520after%2520fine-tuning%252C%2520and%2520transfer%2520learning%2520properties%2520to%2520the%2520models%252C%2520indicating%2520the%2520benefits%2520of%2520fine-tuning.%2520We%2520also%2520highlight%2520the%2520tuning%2520process%2520and%2520empirical%2520results%2520for%2520future%2520implementation%2520by%2520practitioners.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20063v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFq {"title": "Generalized Hand-Object Pose Estimation with Occlusion Awareness", "author": "Hui Yang and Wei Sun and Jian Liu and Jian Xiao and Tao Xie and Hossein Rahmani and Ajmal Saeed mian and Nicu Sebe and Gim Hee Lee", "abstract": "Generalized 3D hand-object pose estimation from a single RGB image remains challenging due to the large variations in object appearances and interaction patterns, especially under heavy occlusion. We propose GenHOI, a framework for generalized hand-object pose estimation with occlusion awareness. GenHOI integrates hierarchical semantic knowledge with hand priors to enhance model generalization under challenging occlusion conditions. Specifically, we introduce a hierarchical semantic prompt that encodes object states, hand configurations, and interaction patterns via textual descriptions. This enables the model to learn abstract high-level representations of hand-object interactions for generalization to unseen objects and novel interactions while compensating for missing or ambiguous visual cues. To enable robust occlusion reasoning, we adopt a multi-modal masked modeling strategy over RGB images, predicted point clouds, and textual descriptions. Moreover, we leverage hand priors as stable spatial references to extract implicit interaction constraints. This allows reliable pose inference even under significant variations in object shapes and interaction patterns. Extensive experiments on the challenging DexYCB and HO3Dv2 benchmarks demonstrate that our method achieves state-of-the-art performance in hand-object pose estimation.", "link": "http://arxiv.org/abs/2603.19013v2", "date": "2026-03-20", "relevancy": 2.3696, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6188}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5743}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5733}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalized%20Hand-Object%20Pose%20Estimation%20with%20Occlusion%20Awareness&body=Title%3A%20Generalized%20Hand-Object%20Pose%20Estimation%20with%20Occlusion%20Awareness%0AAuthor%3A%20Hui%20Yang%20and%20Wei%20Sun%20and%20Jian%20Liu%20and%20Jian%20Xiao%20and%20Tao%20Xie%20and%20Hossein%20Rahmani%20and%20Ajmal%20Saeed%20mian%20and%20Nicu%20Sebe%20and%20Gim%20Hee%20Lee%0AAbstract%3A%20Generalized%203D%20hand-object%20pose%20estimation%20from%20a%20single%20RGB%20image%20remains%20challenging%20due%20to%20the%20large%20variations%20in%20object%20appearances%20and%20interaction%20patterns%2C%20especially%20under%20heavy%20occlusion.%20We%20propose%20GenHOI%2C%20a%20framework%20for%20generalized%20hand-object%20pose%20estimation%20with%20occlusion%20awareness.%20GenHOI%20integrates%20hierarchical%20semantic%20knowledge%20with%20hand%20priors%20to%20enhance%20model%20generalization%20under%20challenging%20occlusion%20conditions.%20Specifically%2C%20we%20introduce%20a%20hierarchical%20semantic%20prompt%20that%20encodes%20object%20states%2C%20hand%20configurations%2C%20and%20interaction%20patterns%20via%20textual%20descriptions.%20This%20enables%20the%20model%20to%20learn%20abstract%20high-level%20representations%20of%20hand-object%20interactions%20for%20generalization%20to%20unseen%20objects%20and%20novel%20interactions%20while%20compensating%20for%20missing%20or%20ambiguous%20visual%20cues.%20To%20enable%20robust%20occlusion%20reasoning%2C%20we%20adopt%20a%20multi-modal%20masked%20modeling%20strategy%20over%20RGB%20images%2C%20predicted%20point%20clouds%2C%20and%20textual%20descriptions.%20Moreover%2C%20we%20leverage%20hand%20priors%20as%20stable%20spatial%20references%20to%20extract%20implicit%20interaction%20constraints.%20This%20allows%20reliable%20pose%20inference%20even%20under%20significant%20variations%20in%20object%20shapes%20and%20interaction%20patterns.%20Extensive%20experiments%20on%20the%20challenging%20DexYCB%20and%20HO3Dv2%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20in%20hand-object%20pose%20estimation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19013v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneralized%2520Hand-Object%2520Pose%2520Estimation%2520with%2520Occlusion%2520Awareness%26entry.906535625%3DHui%2520Yang%2520and%2520Wei%2520Sun%2520and%2520Jian%2520Liu%2520and%2520Jian%2520Xiao%2520and%2520Tao%2520Xie%2520and%2520Hossein%2520Rahmani%2520and%2520Ajmal%2520Saeed%2520mian%2520and%2520Nicu%2520Sebe%2520and%2520Gim%2520Hee%2520Lee%26entry.1292438233%3DGeneralized%25203D%2520hand-object%2520pose%2520estimation%2520from%2520a%2520single%2520RGB%2520image%2520remains%2520challenging%2520due%2520to%2520the%2520large%2520variations%2520in%2520object%2520appearances%2520and%2520interaction%2520patterns%252C%2520especially%2520under%2520heavy%2520occlusion.%2520We%2520propose%2520GenHOI%252C%2520a%2520framework%2520for%2520generalized%2520hand-object%2520pose%2520estimation%2520with%2520occlusion%2520awareness.%2520GenHOI%2520integrates%2520hierarchical%2520semantic%2520knowledge%2520with%2520hand%2520priors%2520to%2520enhance%2520model%2520generalization%2520under%2520challenging%2520occlusion%2520conditions.%2520Specifically%252C%2520we%2520introduce%2520a%2520hierarchical%2520semantic%2520prompt%2520that%2520encodes%2520object%2520states%252C%2520hand%2520configurations%252C%2520and%2520interaction%2520patterns%2520via%2520textual%2520descriptions.%2520This%2520enables%2520the%2520model%2520to%2520learn%2520abstract%2520high-level%2520representations%2520of%2520hand-object%2520interactions%2520for%2520generalization%2520to%2520unseen%2520objects%2520and%2520novel

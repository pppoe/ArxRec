{"title": "Stand-In: A Lightweight and Plug-and-Play Identity Control for Video Generation", "author": "Bowen Xue and Zheng-Peng Duan and Qixin Yan and Wenjing Wang and Hao Liu and Chun-Le Guo and Chongyi Li and Chen Li and Jing Lyu", "abstract": "Generating high-fidelity human videos that match user-specified identities is important yet challenging in the field of generative AI. Existing methods often rely on an excessive number of training parameters and lack compatibility with other AIGC tools. In this paper, we propose Stand-In, a lightweight and plug-and-play framework for identity preservation in video generation. Specifically, we introduce a conditional image branch into the pre-trained video generation model. Identity control is achieved through restricted self-attentions with conditional position mapping. Thanks to these designs, which greatly preserve the pre-trained prior of the video generation model, our approach is able to outperform other full-parameter training methods in video quality and identity preservation, even with just $\\sim$1% additional parameters and only 2000 training pairs. Moreover, our framework can be seamlessly integrated for other tasks, such as subject-driven video generation, pose-referenced video generation, stylization, and face swapping.", "link": "http://arxiv.org/abs/2508.07901v4", "date": "2026-03-20", "relevancy": 3.1654, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.7137}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5958}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5897}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stand-In%3A%20A%20Lightweight%20and%20Plug-and-Play%20Identity%20Control%20for%20Video%20Generation&body=Title%3A%2 {"title": "VirPro: Visual-referred Probabilistic Prompt Learning for Weakly-Supervised Monocular 3D Detection", "author": "Chupeng Liu and Jiyong Rao and Shangquan Sun and Runkai Zhao and Weidong Cai", "abstract": "Monocular 3D object detection typically relies on pseudo-labeling techniques to reduce dependency on real-world annotations. Recent advances demonstrate that deterministic linguistic cues can serve as effective auxiliary weak supervision signals, providing complementary semantic context. However, hand-crafted textual descriptions struggle to capture the inherent visual diversity of individuals across scenes, limiting the model's ability to learn scene-aware representations. To address this challenge, we propose Visual-referred Probabilistic Prompt Learning (VirPro), an adaptive multi-modal pretraining paradigm that can be seamlessly integrated into diverse weakly supervised monocular 3D detection frameworks. Specifically, we generate a diverse set of learnable, instance-conditioned prompts across scenes and store them in an Adaptive Prompt Bank (APB). Subsequently, we introduce Multi-Gaussian Prompt Modeling (MGPM), which incorporates scene-based visual features into the corresponding textual embeddings, allowing the text prompts to express visual uncertainties. Then, from the fused vision-language embeddings, we decode a prompt-targeted Gaussian, from which we derive a unified object-level prompt embedding for each instance. RoI-level contrastive matching is employed to enforce modality alignment, bringing embeddings of co-occurring objects within the same scene closer in the latent space, thus enhancing semantic coherence. Extensive experiments on the KITTI benchmark demonstrate that integrating our pretraining paradigm consistently yields substantial performance gains, achieving up to a 4.8% average precision improvement than the baseline. Code is available at https://github.com/AustinLCP/VirPro.", "link": "http://arxiv.org/abs/2603.17470v2", "date": "2026-03-20", "relevancy": 3.1436, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6318}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6318}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6225}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VirPro%3A%20Visual-referred%20Probabilistic%20Prompt%20Learning%20for%20Weakly-Supervised%20Monocular%203D%20Detection&body=Title%3A%20VirPro%3A%20Visual-referred%20Probabilistic%20Prompt%20Learning%20for%20Weakly-Supervised%20Monocular%203D%20Detection%0AAuthor%3A%20Chupeng%20Liu%20and%20Jiyong%20Rao%20and%20Shangquan%20Sun%20and%20Runkai%20Zhao%20and%20Weidong%20Cai%0AAbstract%3A%20Monocular%203D%20object%20detection%20typically%20relies%20on%20pseudo-labeling%20techniques%20to%20reduce%20dependency%20on%20real-world%20annotations.%20Recent%20advances%20demonstrate%20that%20deterministic%20linguistic%20cues%20can%20serve%20as%20effective%20auxiliary%20weak%20supervision%20signals%2C%20providing%20complementary%20semantic%20context.%20However%2C%20hand-crafted%20textual%20descriptions%20struggle%20to%20capture%20the%20inherent%20visual%20diversity%20of%20individuals%20across%20scenes%2C%20limiting%20the%20model%27s%20ability%20to%20learn%20scene-aware%20representations.%20To%20address%20this%20challenge%2C%20we%20propose%20Visual-referred%20Probabilistic%20Prompt%20Learning%20%28VirPro%29%2C%20an%20adaptive%20multi-modal%20pretraining%20paradigm%20that%20can%20be%20seamlessly%20integrated%20into%20diverse%20weakly%20supervised%20monocular%203D%20detection%20frameworks.%20Specifically%2C%20we%20generate%20a%20diverse%20set%20of%20learnable%2C%20instance-conditioned%20prompts%20across%20scenes%20and%20store%20them%20in%20an%20Adaptive%20Prompt%20Bank%20%28APB%29.%20Subsequently%2C%20we%20introduce%20Multi-Gaussian%20Prompt%20Modeling%20%28MGPM%29%2C%20which%20incorporates%20scene-based%20visual%20features%20into%20the%20corresponding%20textual%20embeddings%2C%20allowing%20the%20text%20prompts%20to%20express%20visual%20uncertainties.%20Then%2C%20from%20the%20fused%20vision-language%20embeddings%2C%20we%20decode%20a%20prompt-targeted%20Gaussian%2C%20from%20which%20we%20derive%20a%20unified%20object-level%20prompt%20embedding%20for%20each%20instance.%20RoI-level%20contrastive%20matching%20is%20employed%20to%20enforce%20modality%20alignment%2C%20bringing%20embeddings%20of%20co-occurring%20objects%20within%20the%20same%20scene%20closer%20in%20the%20latent%20space%2C%20thus%20enhancing%20semantic%20coherence.%20Extensive%20experiments%20on%20the%20KITTI%20benchmark%20demonstrate%20that%20integrating%20our%20pretraining%20paradigm%20consistently%20yields%20substantial%20performance%20gains%2C%20achieving%20up%20to%20a%204.8%25%20average%20precision%20improvement%20than%20the%20baseline.%20Code%20is%20available%20at%20https%3A//github.com/AustinLCP/VirPro.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17470v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVirPro%253A%2520Visual-referred%2520Probabilistic%2520Prompt%2520Learning%2520for%2520Weakly-Supervised%2520Monocular%25203D%2520Detection%26entry.906535625%3DChupeng%2520Liu%2520and%2520Jiyong%2520Rao%2520and%2520Shangquan%2520Sun%2520and%2520Runkai%2520Zhao%2520and%2520Weidong%2520Cai%26entry.1292438233%3DMonocular%25203D%2520object%2520detection%2520typically%2520relies%2520on%2520pseudo-labeling%2520techniques%2520to%2520reduce%2520dependency%2520on%2520real-world%2520annotations.%2520Recent%2520advances%2520demonstrate%2520that%2520deterministic%2520linguistic%2520cues%2520can%2520serve%2520as%2520effective%2520auxiliary%2520w 2520demonstrate%2520that%2520integrating%2520our%2520pretraining%2520paradigm%2520consistently%2520yields%2520substantial%2520performance%2520gains%252C%2520achieving%2520up%2520to%2520a%25204.8%2525%2520average%2520precision%2520improvement%2520than%2520the%2520baseline.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/AustinLCP/VirPro.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17470v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VirPro%3A%20Visual-referred%20Probabilistic%20Prompt%20Learning%20for%20Weakly-Supervised%20Monocular%203D%20Detection&entry.906535625=Chupeng%20Liu%20and%20Jiyong%20Rao%20and%20Shangquan%20Sun%20and%20Runkai%20Zhao%20and%20Weidong%20Cai&entry.1292438233=Monocular%203D%20object%20detection%20typically%20relies%20on%20pseudo-labeling%20techniques%20to%20reduce%20dependency%20on%20real-world%20annotations.%20Recent%20advances%20demonstrate%20that%20deterministic%20linguistic%20cues%20can%20serve%20as%20effective%20auxiliary%20weak%20supervision%20signals%2C%20providing%20complementary%20semantic%20context.%20However%2C%20hand-crafted%20textual%20descriptions%20struggle%20to%20capture%20the%20inherent%20visual%20diversity%20of%20individuals%20across%20scenes%2C%20limiting%20the%20model%27s%20ability%20to%20learn%20scene-aware%20representations.%20To%20address%20this%20challenge%2C%20we%20propose%20Visual-referred%20Probabilistic%20Prompt%20Learning%20%28VirPro%29%2C%20an%20adaptive%20multi-modal%20pretraining%20paradigm%20that%20can%20be%20seamlessly%20integrated%20into%20diverse%20weakly%20supervised%20monocular%203D%20detection%20frameworks.%20Specifically%2C%20we%20generate%20a%20diverse%20set%20of%20learnable%2C%20instance-conditioned%20prompts%20across%20scenes%20and%20store%20them%20in%20an%20Adaptive%20Prompt%20Bank%20%28APB%29.%20Subsequently%2C%20we%20introduce%20Multi-Gaussian%20Prompt%20Modeling%20%28M {"title": "3D-Consistent Multi-View Editing by Correspondence Guidance", "author": "Josef Bengtson and David Nilsson and Dong In Lee and Yaroslava Lochman and Fredrik Kahl", "abstract": "Recent advancements in diffusion and flow models have greatly improved text-based image editing, yet methods that edit images independently often produce geometrically and photometrically inconsistent results across different views of the same scene. Such inconsistencies are particularly problematic for editing of 3D representations such as NeRFs or Gaussian splat models. We propose a training-free guidance framework that enforces multi-view consistency during the image editing process. The key idea is that corresponding points should look similar after editing. To achieve this, we introduce a consistency loss that guides the denoising process toward coherent edits. The framework is flexible and can be combined with widely varying image editing methods, supporting both dense and sparse multi-view editing setups. Experimental results show that our approach significantly improves 3D consistency compared to existing multi-view editing methods. We also show that this increased consistency enables high-quality Gaussian splat editing with sharp details and strong fidelity to user-specified text prompts. Please refer to our project page for video results: https://3d-consistent-editing.github.io/", "link": "http://arxiv.org/abs/2511.22228v2", "date": "2026-03-20", "relevancy": 3.0196, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6063}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6028}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6028}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D-Consistent%20Multi-View%20Editing%20by%20Correspondence%20Guidance&body=Title%3A%203D-Consistent%20Multi-View%20Editing%20by%20Correspondence%20Guidance%0AAuthor%3A%20Josef%20Bengtson%20and%20David%20Nilsson%20and%20Dong%20In%20Lee%20and%20Yaroslava%20Lochman%20and%20Fredrik%20Kahl%0AAbstract%3A%20Recent%20advancements%20in%20diffusion%20and%20flow%20models%20have%20greatly%20improved%20text-based%20image%20editing%2C%20yet%20methods%20that%20edit%20images%20independently%20often%20produce%20geometrically%20and%20photometrically%20inconsistent%20results%20across%20different%20views%20of%20the%20same%20scene.%20Such%20inconsistencies%20are%20particularly%20problematic%20for%20editing%20of%203D%20representations%20such%20as%20NeRFs%20or%20Gaussian%20splat%20models.%20We%20propose%20a%20training-free%20guidance%20framework%20that%20enforces%20multi-view%20consistency%20during%20the%20image%20editing%20process.%20The%20key%20idea%20is%20that%20corresponding%20points%20should%20look%20similar%20after%20editing.%20To%20achieve%20this%2C%20we%20introduce%20a%20consistency%20loss%20that%20guides%20the%20denoising%20process%20toward%20coherent%20edits.%20The%20framework%20is%20flexible%20and%20can%20be%20combined%20with%20widely%20varying%20image%20editing%20methods%2C%20supporting%20both%20dense%20and%20sparse%20multi-view%20editing%20setups.%20Experimental%20results%20show%20that%20our%20approach%20significantly%20improves%203D%20consistency%20compared%20to%20existing%20multi-view%20editing%20methods.%20We%20also%20show%20that%20this%20increased%20consistency%20enables%20high-quality%20Gaussian%20splat%20editing%20with%20sharp%20details%20and%20strong%20fidelity%20to%20user-specified%20text%20prompts.%20Please%20refer%20to%20our%20project%20page%20for%20video%20results%3A%20https%3A//3d-consistent-editing.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2511.22228v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurN {"title": "Fast 3D Diffusion for Scalable Granular Media Synthesis", "author": "Muhammad Moeeze Hassan and R\u00e9gis Cottereau and Filippo Gatti and Patryk Dec", "abstract": "Discrete Element Method (DEM) simulations of granular media are computationally intensive, particularly during initialization phases dominated by large displacements and kinetic energy. This paper presents a novel generative pipeline based on 3D diffusion models that directly synthesizes arbitrarily large granular assemblies in mechanically realistic configurations. The approach employs a two-stage pipeline. First, an unconditional diffusion model generates independent 3D voxel grids representing granular media; second, a 3D inpainting model, adapted from 2D techniques using masked inputs and repainting strategies, seamlessly stitches these grids together. The inpainting model uses the outputs of the unconditional diffusion model to learn from the context of adjacent generations and creates new regions that blend smoothly into the context region. Both models are trained on binarized 3D occupancy grids derived from a database of small-scale DEM simulations, scaling linearly with the number of output voxels. Simulations that spanned over days can now run in hours, practically enabling simulations containing more than 200k ballast particles. The pipeline remains fully compatible with existing DEM workflows as it post-processes the diffusion generated voxel grids into DEM compatible particle meshes. Being mechanically consistent on key granulometry metrics with the original DEM simulations, the pipeline is also compatible with many other applications in the field of granular media, with capability of generating both convex and non-convex particles. Showcased on two examples (railway ballast and lunar regolith), the pipeline reimagines the way initialization of granular media simulations is performed, enabling scales of generation previously unattainable with traditional DEM simulations.", "link": rized%203D%20occupancy%20grids%20derived%20from%20a%20database%20of%20small-scale%20DEM%20simulations%2C%20scaling%20linearly%20with%20the%20number%20of%20output%20voxels.%20Simulations%20that%20spanned%20over%20days%20can%20now%20run%20in%20hours%2C%20practically%20enabling%20simulations%20containing%20more%20than%20200k%20ballast%20particles.%20The%20pipeline%20remains%20fully%20compatible%20with%20existing%20DEM%20workflows%20as%20it%20post-processes%20the%20diffusion%20generated%20voxel%20grids%20into%20DEM%20compatible%20particle%20meshes.%20Being%20mechanically%20consistent%20on%20key%20granulometry%20metrics%20with%20the%20original%20DEM%20simulations%2C%20the%20pipeline%20is%20also%20compatible%20with%20many%20other%20applications%20in%20the%20field%20of%20granular%20media%2C%20with%20capability%20of%20generating%20both%20convex%20and%20non-convex%20particles.%20Showcased%20on%20two%20examples%20%28railway%20ballast%20and%20lunar%20regolith%29%2C%20the%20pipeline%20reimagines%20the%20way%20initialization%20of%20granular%20media%20simulations%20is%20performed%2C%20enabling%20scales%20of%20generation%20previously%20unattainable%20with%20traditional%20DEM%20simulations.%0ALink%3A%20http%3A//arxiv.org/abs/2508.19752v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFast%25203D%2520Diffusion%2520for%2520Scalable%2520Granular%2520Media%2520Synthesis%26entry.906535625%3DMuhammad%2520Moeeze%2520Hassan%2520and%2520R%25C3%25A9gis%2520Cottereau%2520and%2520Filippo%2520Gatti%2520and%2520Patryk%2520Dec%26entry.1292438233%3DDiscrete%2520Element%2520Method%2520%2528DEM%2529%2520simulations%2520of%2520granular%2520media%2520are%2520computationally%2520intensive%252C%2520particularly%2520during%2520initialization%2520phases%2520dominated%2520by%2520large%2520displacements%2520and%2520kinetic%2520energy.%2520This%2520paper%2520presents%2520a%2520novel%2520generative%2520pipeline%2520based%2 {"title": "Fourier Splatting: Generalized Fourier encoded primitives for scalable radiance fields", "author": "Mihnea-Bogdan Jurca and Bert Van hauwermeiren and Adrian Munteanu", "abstract": "Novel view synthesis has recently been revolutionized by 3D Gaussian Splatting (3DGS), which enables real-time rendering through explicit primitive rasterization. However, existing methods tie visual fidelity strictly to the number of primitives: quality downscaling is achieved only through pruning primitives. We propose the first inherently scalable primitive for radiance field rendering. Fourier Splatting employs scalable primitives with arbitrary closed shapes obtained by parameterizing planar surfels with Fourier encoded descriptors. This formulation allows a single trained model to be rendered at varying levels of detail simply by truncating Fourier coefficients at runtime. To facilitate stable optimization, we employ a straight-through estimator for gradient extension beyond the primitive boundary, and introduce HYDRA, a densification strategy that decomposes complex primitives into simpler constituents within the MCMC framework. Our method achieves state-of-the-art rendering quality among planar-primitive frameworks and comparable perceptual metrics compared to leading volumetric representations on standard benchmarks, providing a versatile solution for bandwidth-constrained high-fidelity rendering.", "link": "http://arxiv.org/abs/2603.19834v1", "date": "2026-03-20", "relevancy": 2.9485, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6342}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5826}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fourier%20Splatting%3A%20Generalized%20Fourier%20encoded%20primitives%20for%20scalable%20radiance%20fields&body=Title%3A%20Fourier%20Splatting%3A%20Generalized%20Fourier%20encoded%20primitives%20for%20scalable%20radiance%20fields%0AAuthor%3A%20Mihnea-Bogdan%20Jurca%20and%20Bert%20Van%20hauwermeiren%20and%20Adrian%20Munteanu%0AAbstract%3A%20Novel%20view%20synthesis%20has%20recently%20been%20revolutionized%20by%203D%20Gaussian%20Splatting%20%283DGS%29%2C%20which%20enables%20real-time%20rendering%20through%20explicit%20primitive%20rasterization.%20However%2C%20existing%20methods%20tie%20visual%20fidelity%20strictly%20to%20the%20number%20of%20primitives%3A%20quality%20downscaling%20is%20achieved%20only%20through%20pruning%20primitives.%20We%20propose%20the%20first%20inherently%20scalable%20primitive%20for%20radiance%20field%20rendering.%20Fourier%20Splatting%20employs%20scalable%20primitives%20with%20arbitrary%20closed%20shapes%20obtained%20by%20parameterizing%20planar%20surfels%20with%20Fourier%20encoded%20descriptors.%20This%20formulation%20allows%20a%20single%20trained%20model%20to%20be%20rendered%20at%20varying%20levels%20of%20detail%20simply%20by%20truncating%20Fourier%20coefficients%20at%20runtime.%20To%20facilitate%20stable%20optimization%2C%20we%20employ%20a%20straight-through%20estimator%20for%20gradient%20extension%20beyond%20the%20primitive%20boundary%2C%20and%20introduce%20HYDRA%2C%20a%20densification%20strategy%20that%20decomposes%20complex%20primitives%20into%20simpler%20constituents%20within%20the%20MCMC%20framework.%20Our%20method%20achieves%20state-of-the-art%20rendering%20quality%20among%20planar-primitive%20frameworks%20and%20comparable%20perceptual%20metrics%20compared%20to%20leading%20volumetric%20representations%20on%20standard%20benchmarks%2C%20providing%20a%20versatile%20solution%20for%20bandwidth-constrained%20high-fidelity%20rendering.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19834v1%0AForm%3A%20https%3A// %2520perceptual%2520metrics%2520compared%2520to%2520leading%2520volumetric%2520representations%2520on%2520standard%2520benchmarks%252C%2520providing%2520a%2520versatile%2520solution%2520for%2520bandwidth-constrained%2520high-fidelity%2520rendering.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19834v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Fourier%20Splatting%3A%20Generalized%20Fourier%20encoded%20primitives%20for%20scalable%20radiance%20fields&entry.906535625=Mihnea-Bogdan%20Jurca%20and%20Bert%20Van%20hauwermeiren%20and%20Adrian%20Munteanu&entry.1292438233=Novel%20view%20synthesis%20has%20recently%20been%20revolutionized%20by%203D%20Gaussian%20Splatting%20%283DGS%29%2C%20which%20enables%20real-time%20rendering%20through%20explicit%20primitive%20rasterization.%20However%2C%20existing%20methods%20tie%20visual%20fidelity%20strictly%20to%20the%20number%20of%20primitives%3A%20quality%20downscaling%20is%20achieved%20only%20through%20pruning%20primitives.%20We%20propose%20the%20first%20inherently%20scalable%20primitive%20for%20radiance%20field%20rendering.%20Fourier%20Splatting%20employs%20scalable%20primitives%20with%20arbitrary%20closed%20shapes%20obtained%20by%20parameterizing%20planar%20surfels%20with%20Fourier%20encoded%20descriptors.%20This%20formulation%20allows%20a%20single%20trained%20model%20to%20be%20rendered%20at%20varying%20levels%20of%20detail%20simply%20by%20truncating%20Fourier%20coefficients%20at%20runtime.%20To%20facilitate%20stable%20optimization%2C%20we%20employ%20a%20straight-through%20estimator%20for%20gradient%20extension%20beyond%20the%20primitive%20boundary%2C%20and%20introduce%20HYDRA%2C%20a%20densification%20strategy%20that%20decomposes%20complex%20primitives%20into%20simpler%20constituents%20within%20the%20MCMC%20framework.%20Our%20method%20achieves%20state-of-the-art%20rendering%20quality%20among%20planar-primitive%20frameworks%20and%20comparable%20perceptual%20metrics%20compared%20to%20leading%20volumetric%20representations%20on%20standard%20benchmarks%2C%20providing%20a%20versatile%20solution%20for%20bandwidth-constrained%20high-fidelity%20rendering.&entry.1838667208=http%3A//arxiv.org/abs/2603.19834v1&entry.124074799=Read"},
{"title": "DreamCS: Geometry-Aware Text-to-3D Generation with Unpaired 3D Reward Supervision", "author": "Xiandong Zou and Ruihao Xia and Hongsong Wang and Pan Zhou", "abstract": "While text-to-3D generation has attracted growing interest, existing methods often struggle to produce 3D assets that align well with human preferences. Current preference alignment techniques for 3D content typically rely on hardly-collected preference-paired multi-view 2D images to train 2D reward models, when then guide 3D generation -- leading to geometric artifacts due to their inherent 2D bias. To address these limitations, we construct 3D-MeshPref, the first large-scale unpaired 3D preference dataset, featuring diverse 3D meshes annotated by a large language model and refined by human evaluators. We then develop RewardCS, the first reward model trained directly on unpaired 3D-MeshPref data using a novel Cauchy-Schwarz divergence objective, enabling effective learning of human-aligned 3D geometric preferences without requiring paired comparisons. Building on this, we propose DreamCS, a unified framework that integrates RewardCS into text-to-3D pipelines -- enhancing both implicit and explicit 3D generation with human preference feedback. Extensive experiments show DreamCS outperforms prior methods, producing 3D assets that are both geometrically faithful and human-preferred. Code and models will be released publicly.", "link": "http://arxiv.org/abs/2506.09814v3", "date": "2026-03-20", "relevancy": 2.8869, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5846}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5737}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5737}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DreamCS%3A%20Geometry-Aware%20Text-to-3D%20Generation%20with%20Unpaired%203D%20Reward%20Supervision&body=Title%3A%20DreamCS%3A%20Geometry-Aware%20Text-to-3D%20Generation%20with%20Unpaired%203D%20Reward%20Supervision%0AAuthor%3A%20Xiandong%20Zou%20and%20Ruihao%20Xia%20and%20Hongsong%20Wang%20and%20Pan%20Zhou%0AAbstract%3A%20While%20text-to-3D%20generation%20has%20attracted%20growing%20interest%2C%20existing%20methods%20often%20struggle%20to%20produce%203D%20assets%20that%20align%20well%20with%20human%20preferences.%20Current%20preference%20alignment%20techniques%20for%203D%20content%20typically%20rely%20on%20hardly-collected%20preference-paired%20multi-view%202D%20images%20to%20train%202D%20reward%20models%2C%20when%20then%20guide%203D%20generation%20--%20leading%20to%20geometric%20artifacts%20due%20to%20their%20inherent%202D%20bias.%20To%20address%20these%20limitations%2C%20we%20construct%203D-MeshPref%2C%20the%20first%20large-scale%20unpaired%203D%20preference%20dataset%2C%20featuring%20diverse%203D%20meshes%20annotated%20by%20a%20large%20language%20model%20and%20refined%20by%20human%20evaluators.%20We%20then%20develop%20RewardCS%2C%20the%20first%20reward%20model%20trained%20directly%20on%20unpaired%203D-MeshPref%20data%20using%20a%20novel%20Cauchy-Schwarz%20divergence%20objective%2C%20enabling%20effective%20learning%20of%20human-aligned%203D%20geometric%20preferences%20without%20requiring%20paired%20comparisons.%20Building%20on%20this%2C%20we%20propose%20DreamCS%2C%20a%20unified%20framework%20that%20integrates%20RewardCS%20into%20text-to-3D%20pipelines%20--%20enhancing%20both%20implicit%20and%20explicit%203D%20generation%20with%20human%20preference%20feedback.%20Extensive%20experiments%20show%20DreamCS%20outperforms%20prior%20methods%2C%20producing%203D%20assets%20that%20are%20both%20geometrically%20faithful%20and%20human-preferred.%20Code%20and%20models%20will%20be%20released%20publicly.%0ALink%3A%20http%3A//arxiv.org/abs/2506.09814v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDreamCS%253A%2520Geometry-Aware%2520Text-to-3D%2520Generation%2520with%2520Unpaired%25203D%2520Reward%2520Supervision%26entry.906535625%3DXiandong%2520Zou%2520and%2520Ruihao%2520Xia%2520and%2520Hongsong%2520Wang%2520and%2520Pan%2520Zhou%26entry.1292438233%3DWhile%2520text-to-3D%2520generation%2520has%2520attracted%2520growing%2520interest%252C%2520existing%2520methods%2520often%2520struggle%2520to%2520produce%25203D%2520assets%2520that%2520align%2520well%2520with%2520human%2520preferences.%2520Current%2520preference%2520alignment%2520techniques%2520for%25203D%2520content%2520typically%2520rely%2520on%2520hardly-collected%2520preference-paired%2520multi-view%25202D%2520images%2520to%2520train%25202D%2520reward%2520models%252C%2520when%2520then%2520guide%25203D%2520generation%2520--%2520leading%2520to%2520geometric%2520artifacts%2520due%2520to%2520their%2520inherent%25202D%2520bias.%2520To%2520address%2520these%2520limitations%252C%2520we%2520construct%25203D-MeshPref%252C%2520the%2520first%2520large-scale%2520unpaired%25203D%2520preference%2520dataset%252C%2520featuring%2520diverse%25203D%2520meshes%2520annotated%2520by%2520a%2520large%2520language%2520model%2520and%2520refined%2520by%2520human%2520evaluators.%2520We%2520then%2520develop%2520RewardCS%252C%2520the%2520first%2520reward%2520model%2520trained%2520directly%2520on%2520unpaired%25203D-MeshPref%2520data%2520using%2520a%2520novel%2520Cauchy-Schwarz%2520divergence%2520objective%252C%2520enabling%2520effective%2520learning%2520of%2520human-aligned%25203D%2520geometric%2520preferences%2520without%2520requiring%2520paired%2520comparisons.%2520Building%2520on%2520this%252C%2520we%2520propose%2520DreamCS%252C%2520a%2520unified%2520framework%2520that%2520integrates%2520RewardCS%2520into%2520text-to-3D%2520pipelines%2520--%2520enhancing%2520both%2520implicit%2520and%2520explicit%25203D%2520generation%2520with%2520human%2520preference%2520feedback.%2520Extensive%2520experiments%2520show%2520DreamCS%2520outperforms%2520prior%2520methods%252C%2520producing%25203D%2520assets%2520that%2520are%2520both%2520geometrically%2520faithful%2520and%2520human-preferred.%2520Code%2520and%2520models%2520will%2520be%2520released%2520publicly.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.09814v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DreamCS%3A%20Geometry-Aware%20Text-to-3D%20Generation%20with%20Unpaired%203D%20Reward%20Supervision&entry.906535625=Xiandong%20Zou%20and%20Ruihao%20Xia%20and%20Hongsong%20Wang%20and%20Pan%20Zhou&entry.1292438233=While%20text-to-3D%20generation%20has%20attracted%20growing%20interest%2C%20existing%20methods%20often%20struggle%20to%20produce%203D%20assets%20that%20align%20well%20with%20human%20preferences.%20Current%20preference%20alignment%20techniques%20for%203D%20content%20typically%20rely%20on%20hardly-collected%20preference-paired%20multi-view%202D%20images%20to%20train%202D%20reward%20models%2C%20when%20then%20guide%203D%20generation%20--%20leading%20to%20geometric%20artifacts%20due%20to%20their%20inherent%202D%20bias.%20To%20address%20these%20limitations%2C%20we%20construct%203D-MeshPref%2C%20the%20first%20large-scale%20unpaired%203D%20preference%20dataset%2C%20featuring%20diverse%203D%20meshes%20annotated%20by%20a%20large%20language%20model%20and%20refined%20by%20human%20evaluators.%20We%20then%20develop%20RewardCS%2C%20the%20first%20reward%20model%20trained%20directly%20on%20unpaired%203D-MeshPref%20data%20using%20a%20novel%20Cauchy-Schwarz%20divergence%20objective%2C%20enabling%20effective%20learning%20of%20human-aligned%203D%20geometric%20preferences%20without%20requiring%20paired%20comparisons.%20Building%20on%20this%2C%20we%20propose%20DreamCS%2C%20a%20unified%20framework%20that%20integrates%20RewardCS%20into%20text-to-3D%20pipelines%20--%20enhancing%20both%20implicit%20and%20explicit%203D%20generation%20with%20human%20preference%20feedback.%20Extensive%20experiments%20show%20DreamCS%20outperforms%20prior%20methods%2C%20producing%203D%20assets%20that%20are%20both%20geometrically%20faithful%20and%20human-preferred.%20Code%20and%20models%20will%20be%20released%20publicly.&entry.1838667208=http%3A//arxiv.org/abs/2506.09814v3&entry.124074799=Read"},
{"title": "On the Cone Effect and Modality Gap in Medical Vision-Language Embeddings", "author": "David Restrepo and Miguel L Martins and Chenwei Wu and Luis Filipe Nakayama and Diego M Lopez and Stergios Christodoulidis and Maria Vakalopoulou and Enzo Ferrante", "abstract": "Vision-Language Models (VLMs) exhibit a characteristic \"cone effect\" in which nonlinear encoders map embeddings into highly concentrated regions of the representation space, contributing to cross-modal separation known as the modality gap. While this phenomenon has been widely observed, its practical impact on supervised multimodal learning -- particularly in medical domains -- remains unclear. In this work, we introduce a lightweight post-hoc mechanism that keeps pretrained VLM encoders frozen while continuously controlling cross-modal separation through a single hyperparameter {\u03bb}. This enables systematic analysis of how the modality gap affects downstream multimodal performance without expensive retraining. We evaluate generalist (CLIP, SigLIP) and medically specialized (BioMedCLIP, MedSigLIP) models across diverse medical and natural datasets in a supervised multimodal settings. Results consistently show that reducing excessive modality gap improves downstream performance, with medical datasets exhibiting stronger sensitivity to gap modulation; however, fully collapsing the gap is not always optimal, and intermediate, task-dependent separation yields the best results. These findings position the modality gap as a tunable property of multimodal representations rather than a quantity that should be universally minimized.", "link": "http://arxiv.org/abs/2603.17246v2", "date": "2026-03-20", "relevancy": 2.8684, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5787}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5787}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Cone%20Effect%20and%20Modality%20Gap%20in%20Medical%20Vision-Language%20Embeddings&body=Title%3A%20On%20the%20Cone%20Effect%20and%20Modality%20Gap%20in%20Medical%20Vision-Language%20Embeddings%0AAuthor%3A%20David%20Restrepo%20and%20Miguel%20L%20Martins%20and%20Chenwei%20Wu%20and%20Luis%20Filipe%20Nakayama%20and%20Diego%20M%20Lopez%20and%20Stergios%20Christodoulidis%20and%20Maria%20Vakalopoulou%20and%20Enzo%20Ferrante%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20exhibit%20a%20characteristic%20%22cone%20effect%22%20in%20which%20nonlinear%20encoders%20map%20embeddings%20into%20highly%20concentrated%20regions%20of%20the%20representation%20space%2C%20contributing%20to%20cross-modal%20separation%20known%20as%20the%20modality%20gap.%20While%20this%20phenomenon%20has%20been%20widely%20observed%2C%20its%20practical%20impact%20on%20supervised%20multimodal%20learning%20--%20particularly%20in%20medical%20domains%20--%20remains%20unclear.%20In%20this%20work%2C%20we%20introduce%20a%20lightweight%20post-hoc%20mechanism%20that%20keeps%20pretrained%20VLM%20encoders%20frozen%20while%20continuously%20controlling%20cross-modal%20separation%20through%20a%20single%20hyperparameter%20%7B%CE%BB%7D.%20This%20enables%20systematic%20analysis%20of%20how%20the%20modality%20gap%20affects%20downstream%20multimodal%20performance%20without%20expensive%20retraining.%20We%20evaluate%20generalist%20%28CLIP%2C%20SigLIP%29%20and%20medically%20specialized%20%28BioMedCLIP%2C%20MedSigLIP%29%20models%20across%20diverse%20medical%20and%20natural%20datasets%20in%20a%20supervised%20multimodal%20settings.%20Results%20consistently%20show%20that%20reducing%20excessive%20modality%20gap%20improves%20downstream%20performance%2C%20with%20medical%20datasets%20exhibiting%20stronger%20sensitivity%20to%20gap%20modulation%3B%20however%2C%20fully%20collapsing%20the%20gap%20is%20not%20always%20optimal%2C%20and%20intermediate%2C%20task-dependent%20separation%20yields%20the%20best%20results.%20These%20findings%20position%20the%20modality%20gap%20as%20a%20tunable%20property%20of%20multimodal%20representations%20rather%20than%20a%20quantity%20that%20should%20be%20universally%20minimized.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17246v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Cone%2520Effect%2520and%2520Modality%2520Gap%2520in%2520Medical%2520Vision-Language%2520Embeddings%26entry.906535625%3DDavid%2520Restrepo%2520and%2520Miguel%2520L%2520Martins%2520and%2520Chenwei%2520Wu%2520and%2520Luis%2520Filipe%2520Nakayama%2520and%2520Diego%2520M%2520Lopez%2520and%2520Stergios%2520Christodoulidis%2520and%2520Maria%2520Vakalopoulou%2520and%2520Enzo%2520Ferrante%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520exhibit%2520a%2520characteristic%2520%2522cone%2520effect%2522%2520in%2520which%2520nonlinear%2520encoders%2520map%2520embeddings%2520into%2520highly%2520concentrated%2520regions%2520of%2520the%2520representation%2520space%252C%2520contributing%2520to%2520cross-modal%2520separation%2520known%2520as%2520the%2520modality%2520gap.%2520While%2520this%2520phenomenon%2520has%2520been%2520widely%2520observed%252C%2520its%2520practical%2520impact%2520on%2520supervised%2520multimodal%2520learning%2520--%2520particularly%2520in%2520medical%2520domains%2520--%2520remains%2520unclear.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520lightweight%2520post-hoc%2520mechanism%2520that%2520keeps%2520pretrained%2520VLM%2520encoders%2520frozen%2520while%2520continuously%2520controlling%2520cross-modal%2520separation%2520through%2520a%2520single%2520hyperparameter%2520%257B%25CE%25BB%257D. {"title": "RAM: Recover Any 3D Human Motion in-the-Wild", "author": "Sen Jia and Ning Zhu and Jinqin Zhong and Jiale Zhou and Huaping Zhang and Jenq-Neng Hwang and Lei Li", "abstract": "RAM incorporates a motion-aware semantic tracker with adaptive Kalman filtering to achieve robust identity association under severe occlusions and dynamic interactions. A memory-augmented Temporal HMR module further enhances human motion reconstruction by injecting spatio-temporal priors for consistent and smooth motion estimation. Moreover, a lightweight Predictor module forecasts future poses to maintain reconstruction continuity, while a gated combiner adaptively fuses reconstructed and predicted features to ensure coherence and robustness. Experiments on in-the-wild multi-person benchmarks such as PoseTrack and 3DPW, demonstrate that RAM substantially outperforms previous state-of-the-art in both Zero-shot tracking stability and 3D accuracy, offering a generalizable paradigm for markerless 3D human motion capture in-the-wild.", "link": "http://arxiv.org/abs/2603.19929v1", "date": "2026-03-20", "relevancy": 2.8629, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.598}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5645}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RAM%3A%20Recover%20Any%203D%20Human%20Motion%20in-the-Wild&body=Title%3A%20RAM%3A%20Recover%20Any%203D%20Human%20Motion%20in-the-Wild%0AAuthor%3A%20Sen%20Jia%20and%20Ning%20Zhu%20and%20Jinqin%20Zhong%20and%20Jiale%20Zhou%20and%20Huaping%20Zhang%20and%20Jenq-Neng%20Hwang%20and%20Lei%20Li%0AAbstract%3A%20RAM%20incorporates%20a%20motion-aware%20semantic%20tracker%20with%20adaptive%20Kalman%20filtering%20to%20achieve%20robust%20identity%20association%20under%20severe%20occlusions%20and%20dynamic%20interactions.%20A%20memory-augmented%20Temporal%20HMR%20module%20further%20enhances%20human%20motion%20reconstruction%20by%20injecting%20spatio-temporal%20priors%20for%20consistent%20and%20smooth%20motion%20estimation.%20Moreover%2C%20a%20lightweight%20Predictor%20module%20forecasts%20future%20poses%20to%20maintain%20reconstruction%20continuity%2C%20while%20a%20gated%20combiner%20adaptively%20fuses%20reconstructed%20and%20predicted%20features%20to%20ensure%20coherence%20and%20robustness.%20Experiments%20on%20in-the-wild%20multi-person%20benchmarks%20such%20as%20PoseTrack%20and%203DPW%2C%20demonstrate%20that%20RAM%20substantially%20outperforms%20previous%20state-of-the-art%20in%20both%20Zero-shot%20tracking%20stability%20and%203D%20accuracy%2C%20offering%20a%20generalizable%20paradigm%20for%20markerless%203D%20human%20motion%20capture%20in-the-wild.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19929v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRAM%253A%2520Recover%2520Any%25203D%2520Human%2520Motion%2520in-the-Wild%26entry.906535625%3DSen%2520Jia%2520and%2520Ning%2520Zhu%2520and%2520Jinqin%2520Zhong%2520and%2520Jiale%2520Zhou%2520and%2520Huaping%2520Zhang%2520and%2520Jenq-Neng%2520Hwang%2520and%2520Lei%2520Li%26entry.1292438233%3DRAM%2520incorporates%2520a%2520motion-aware%2520semantic%2520tracker%2520with%2520adaptive%2520Kalman%2520filtering%2520to%2520achieve%2520robust%2520identity%2520association%2520under%2520severe%2520occlusions%2520and%2520dynamic%2520interactions.%2520A%2520memory-augmented%2520Temporal%2520HMR%2520module%2520further%2520enhances%2520human%2520motion%2520reconstruction%2520by%2520injecting%2520spatio-temporal%2520priors%2520for%2520consistent%2520and%2520smooth%2520motion%2520estimation.%2520Moreover%252C%2520a%2520lightweight% {"title": "Detached Skip-Links and $R$-Probe: Decoupling Feature Aggregation from Gradient Propagation for MLLM OCR", "author": "Ziye Yuan and Ruchang Yao and Chengxin Zheng and Yusheng Zhao and Daxiang Dong and Ming Zhang", "abstract": "Multimodal large language models (MLLMs) excel at high-level reasoning yet fail on OCR tasks where fine-grained visual details are compromised or misaligned. We identify an overlooked optimization issue in multi-layer feature fusion. Skip pathways introduce direct back-propagation paths from high-level semantic objectives to early visual layers. This mechanism overwrites low-level signals and destabilizes training. To mitigate this gradient interference, we propose Detached Skip-Links, a minimal modification that reuses shallow features in the forward pass while stopping gradients through the skip branch during joint training. This asymmetric design reduces gradient interference, improving stability and convergence without adding learnable parameters. To diagnose whether fine-grained information is preserved and usable by an LLM, we introduce $R$-Probe, which measures pixel-level reconstructability of projected visual tokens using a shallow decoder initialized from the first quarter of the LLM layers. Across multiple ViT backbones and multimodal benchmarks, and at scales up to 7M training samples, our approach consistently improves OCR-centric benchmarks and delivers clear gains on general multimodal tasks.", "link": "http://arxiv.org/abs/2603.20020v1", "date": "2026-03-20", "relevancy": 2.8406, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5826}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5826}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/24 onsistently%20improves%20OCR-centric%20benchmarks%20and%20delivers%20clear%20gains%20on%20general%20multimodal%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20020v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDetached%2520Skip-Links%2520and%2520%2524R%2524-Probe%253A%2520Decoupling%2520Feature%2520Aggregation%2520from%2520Gradient%2520Propagation%2520for%2520MLLM%2520OCR%26entry.906535625%3DZiye%2520Yuan%2520and%2520Ruchang%2520Yao%2520and%2520Chengxin%2520Zheng%2520and%2520Yusheng%2520Zhao%2520and%2520Daxiang%2520Dong%2520and%2520Ming%2520Zhang%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520excel%2520at%2520high-level%2520reasoning%2520yet%2520fail%2520on%2520OCR%2520tasks%2520where%2520fine-grained%2520visual%2520details%2520are%2520compromised%2520or%2520misaligned.%2520We%2520identify%2520an%2520overlooked%2520optimization%2520issue%2520in%2520multi-layer%2520feature%2520fusion.%2520Skip%2520pathways%2520introduce%2520direct%2520back-propagation%2520paths%2520from%2520high-level%2520semantic%2520objectives%2520to%2520early%2520visual%2520layers.%2520This%2520mechanism%2520overwrites%2520low-level%2520signals%2520and%2520destabilizes%2520training.%2520To%2520mitigate%2520this%2520gradient%2520interference%252C%2520we%2520propose%2520Detached%2520Skip-Links%252C%2520a%2520minimal%2520modification%2520that%2520reuses%2520shallow%2520features%2520in%2520the%2520forward%2520pass%2520while%2520stopping%2520gradients%2520through%2520the%2520skip%2520branch%2520during%2520joint%2520training.%2520This%2520asymmetric%2520design%2520reduces%2520gradient%2520interference%252C%2520improving%2520stability%2520and%2520convergence%2520without%2520adding%2520learnable%2520parameters.%2520To%2520diagnose%2520whether%2520fine-grained%2520information%2520is%2520preserved%2520and%2520usable%2520by%2520an%2520LLM%252C%2520we%2520introduce%2520%2524R {"title": "Locally-Supervised Global Image Restoration", "author": "Benjamin Walder and Daniel Toader and Robert Nuster and G\u00fcnther Paltauf and Peter Burgholzer and Gregor Langer and Lukas Krainer and Markus Haltmeier", "abstract": "We address the problem of image reconstruction from incomplete measurements, encompassing both upsampling and inpainting, within a learning-based framework. Conventional supervised approaches require fully sampled ground truth data, while self-supervised methods allow incomplete ground truth but typically rely on random sampling that, in expectation, covers the entire image. In contrast, we consider fixed, deterministic sampling patterns with inherently incomplete coverage, even in expectation. To overcome this limitation, we exploit multiple invariances of the underlying image distribution, which theoretically allows us to achieve the same reconstruction performance as fully supervised approaches. We validate our method on optical-resolution image upsampling in photoacoustic microscopy (PAM), demonstrating competitive or superior results while requiring substantially less ground truth data.", "link": "http://arxiv.org/abs/2511.01998v2", "date": "2026-03-20", "relevancy": 2.802, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.585}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5549}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5413}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Locally-Supervised%20Global%20Image%20Restoration&body=Title%3A%20Locally-Supervised%20Global%20Image%20Restoration%0AAuthor%3A%20Benjamin%20Walder%20and%20Daniel%20Toader%20and%20Robert%20Nuster%20and%20G%C3%BCnther%20Paltauf%20and%20Peter%20Burgholzer%20and%20Gregor%20Langer%20and%20Lukas%20Krainer%20and%20Markus%20Haltmeier%0AAbstract%3A%20We%20address%20the%20problem%20of%20image%20reconstruction%20from%20incomplete%20measurements%2C%20encompassing%20both%20upsampling%20and%20inpainting%2C%20within%20a%20learning-based%20framework.%20Conventional%20supervised%20approaches%20require%20fully%20sampled%20ground%20truth%20data%2C%20while%20self-supervised%20methods%20allow%20incomplete%20ground%20truth%20but%20typically%20rely%20on%20random%20sampling%20that%2C%20in%20expectation%2C%20covers%20the%20entire%20image.%20In%20contrast%2C%20we%20consider%20fixed%2C%20deterministic%20sampling%20patterns%20with%20inherently%20incomplete%20coverage%2C%20even%20in%20expectation.%20To%20overcome%20this%20limitation%2C%20we%20exploit%20multiple%20invariances%20of%20the%20underlying%20image%20distribution%2C%20which%20theoretically%20allows%20us%20to%20achieve%20the%20same%20reconstruction%20performance%20as%20fully%20supervised%20approaches.%20We%20validate%20our%20method%20on%20optical-resolution%20image%20upsampling%20in%20photoacoustic%20microscopy%20%28PAM%29%2C%20demonstrating%20competitive%20or%20superior%20results%20while%20requiring%20substantially%20less%20ground%20truth%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2511.01998v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLocally-Supervised%2520Global%2520Image%2520Restoration%26entry.906535625%3DBenjamin%2520Walder%2520and%2520Daniel%2520Toader%2520and%2520Robert%2520Nuster%2520and%2520G%25C3%25BCnther%2520Paltauf%2520and%2520Peter%2520Burgholzer%2520and%2520Gregor%2520Langer%2520and%2520Lukas%2520Krainer%2520and%2520Markus%2520Haltmeier%26entry.1292438233%3DWe%2520address%2520the%2520problem%2520of%2520image%2520reconstruction%2520from%2520incomplete%2520measurements%252C%2520encompassing%2520both%2520upsampling%2520 {"title": "IsoCLIP: Decomposing CLIP Projectors for Efficient Intra-modal Alignment", "author": "Simone Magistri and Dipam Goswami and Marco Mistretta and Bart\u0142omiej Twardowski and Joost van de Weijer and Andrew D. Bagdanov", "abstract": "Vision-Language Models like CLIP are extensively used for inter-modal tasks which involve both visual and text modalities. However, when the individual modality encoders are applied to inherently intra-modal tasks like image-to-image retrieval, their performance suffers from the intra-modal misalignment. In this paper we study intra-modal misalignment in CLIP with a focus on the role of the projectors that map pre-projection image and text embeddings into the shared embedding space. By analyzing the form of the cosine similarity applied to projected features, and its interaction with the contrastive CLIP loss, we show that there is an inter-modal operator responsible for aligning the two modalities during training, and a second, intra-modal operator that only enforces intra-modal normalization but does nothing to promote intra-modal alignment. Via spectral analysis of the inter-modal operator, we identify an approximately isotropic subspace in which the two modalities are well-aligned, as well as anisotropic directions specific to each modality. We demonstrate that this aligned subspace can be directly obtained from the projector weights and that removing the anisotropic directions improves intra-modal alignment. Our experiments on intra-modal retrieval and classification benchmarks show that our training-free method reduces intra-modal misalignment, greatly lowers latency, and outperforms existing approaches across multiple pre-trained CLIP-like models. The code is publicly available at: https://github.com/simomagi/IsoCLIP.", "link": "http://arxiv.org/abs/2603.19862v1", "date": "2026-03-20", "relevancy": 2.8011, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6155}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5326}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5326}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IsoCLIP%3A%20Decomposing%20CLIP%20Projectors%20for%20Efficient%20Intra-modal%20Alignment&body=Title%3A%20IsoCLIP%3A%20Decomposing%20CLIP%20Projectors%20for%20Efficient%20Intra-modal%20Alignment%0AAuthor%3A%20Simone%20Magistri%20and%20Dipam%20Goswami%20and%20Marco%20Mistretta%20and%20Bart%C5%82omiej%20Twardowski%20and%20Joost%20van%20de%20Weijer%20and%20Andrew%20D.%20Bagdanov%0AAbstract%3A%20Vision-Language%20Models%20like%20CLIP%20are%20extensively%20used%20for%20inter-modal%20tasks%20which%20involve%20both%20visual%20and%20text%20modalities.%20However%2C%20when%20the%20individual%20modality%20encoders%20are%20applied%20to%20inherently%20intra-modal%20tasks%20like%20image-to-image%20retrieval%2C%20their%20performance%20suffers%20from%20the%20intra-modal%20misalignment.%20In%20this%20paper%20we%20study%20intra-modal%20misalignment%20in%20CLIP%20with%20a%20focus%20on%20the%20role%20of%20the%20projectors%20that%20map%20pre-projection%20image%20and%20text%20embeddings%20into%20the%20shared%20embedding%20space.%20By%20analyzing%20the%20form%20of%20the%20cosine%20similarity%20applied%20to%20projected%20features%2C%20and%20its%20interaction%20with%20the%20contrastive%20CLIP%20loss%2C%20we%20show%20that%20there%20is%20an%20inter-modal%20operator%20responsible%20for%20aligning%20the%20two%20modalities%20during%20training%2C%20and%20a%20second%2C%20intra-modal%20operator%20that%20only%20enforces%20intra-modal%20normalization%20but%20does%20nothing%20to%20promote%20intra-modal%20alignment.%20Via%20spectral%20analysis%20of%20the%20inter-modal%20operator%2C%20we%20identify%20an%20approximately%20isotropic%20subspace%20in%20which%20the%20two%20modalities%20are%20well-aligned%2C%20as%20well%20as%20anisotropic%20directions%20specific%20to%20each%20modality.%20We%20demonstrate%20that%20this%20aligned%20subspace%20can%20be%20directly%20obtained%20from%20the%20projector%20weights%20and%20that%20removing%20the%20anisotropic%20directions%20improves%20intra-modal%20alignment.%20Our%20experiments%20on%20intra-modal%20retrieval%20and%20classification%20benchmarks%20show%20that%20our%20training-free%20method%20reduces%20intra-modal%20misalignment%2C%20greatly%20lowers%20latency%2C%20and%20outperforms%20existing%20approaches%20across%20multiple%20pre-trained%20CLIP-like%20models.%20The%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/simomagi/IsoCLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19862v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIsoCLIP%253A%2520Decomposing%2520CLIP%2520Projectors%2520for%2520Efficient%2520Intra-modal%2520Alignment%26entry.906535625%3DSimone%2520Magistri%2520and%2520Dipam%2520Goswami%2520and%2520Marco%2520Mistretta%2520and%2520Bart%25C5%2582omiej%2520Twardowski%2520and%2520Joost%2520van%2520de%2520Weijer%2520and%2520Andrew%2520D.%2520Bagdanov%26entry.1292438233%3DVision-Language%2520Models%2520like%2520CLIP%2520are%2520extensively%2520used%2520for%2520inter-modal%2520tasks%2520which%2520involve%2520both%2520visual%2520and%2520text%2520modalities.%2520However%252C%2520when%2520the%2520individual%2520modality%2520encoders%2520are%2520applied%2520to%2520inherently%2520intra-modal%2520tasks%2520like%2520image-to-image%2520retrieval%252C%2520their%2520performance%2520suffers%2520from%2520the%2520intra-modal%2520misalignment.%2520In%2520this%2520paper%2520we%2520study%2520intra-modal%2520misalignment%2520in%2520CLIP%2520with%2520a%2520focus%2520on%2520the%2520role%2520of%2520the%2520projectors%25 {"title": "Generalizable NGP-SR: Generalizable Neural Radiance Fields Super-Resolution via Neural Graph Primitives", "author": "Wanqi Yuan and Omkar Sharad Mayekar and Connor Pennington and Nianyi Li", "abstract": "Neural Radiance Fields (NeRF) achieve photorealistic novel view synthesis but become costly when high-resolution (HR) rendering is required, as HR outputs demand dense sampling and higher-capacity models. Moreover, naively super-resolving per-view renderings in 2D often breaks multi-view consistency. We propose Generalizable NGP-SR, a 3D-aware super-resolution framework that reconstructs an HR radiance field directly from low-resolution (LR) posed images. Built on Neural Graphics Primitives (NGP), NGP-SR conditions radiance prediction on 3D coordinates and learned local texture tokens, enabling recovery of high-frequency details within the radiance field and producing view-consistent HR novel views without external HR references or post-hoc 2D upsampling. Importantly, our model is generalizable: once trained, it can be applied to unseen scenes and rendered from novel viewpoints without per-scene optimization. Experiments on multiple datasets show that NGP-SR consistently improves both reconstruction quality and runtime efficiency over prior NeRF-based super-resolution methods, offering a practical solution for scalable high-resolution novel view synthesis.", "link": "http://arxiv.org/abs/2603.20128v1", "date": "2026-03-20", "relevancy": 2.7883, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6182}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.543}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5118}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalizable%20NGP-SR%3A%20Generalizable%20Neural%20Radiance%20Fields%20Super-Resolution%20via%20Neural%20Graph%20Primitives&body=Title%3A%20Generalizable%20NGP-SR%3A%20Generalizable%20Neural%20Radiance%20Fields%20Super-Resolution%20via%20Neural%20Graph%20Primitives%0AAuthor%3A%20Wanqi%20Yuan%20and%20Omkar%20Sharad%20Mayekar%20and%20Connor%20Pennington%20and%20Nianyi%20Li%0AAbstract%3A%20Neural%20Radiance%20Fields%20%28NeRF%29%20achieve%20photorealistic%20novel%20view%20synthesis%20but%20become%20costly%20when%20high-resolution%20%28HR%29%20rendering%20is%20required%2C%20as%20HR%20outputs%20demand%20dense%20sampling%20and%20higher-capacity%20models.%20Moreover%2C%20naively%20super-resolving%20per-view%20renderings%20in%202D%20often%20breaks%20multi-view%20consistency.%20We%20propose%20Generalizable%20NGP-SR%2C%20a%203D-aware%20super-resolution%20framework%20that%20reconstructs%20an%20HR%20radiance%20field%20directly%20from%20low-resolution%20%28LR%29%20posed%20images.%20Built%20on%20Neural%20Graphics%20Primitives%20%28NGP%29%2C%20NGP-SR%20conditions%20radiance%20prediction%20on%203D%20coordinates%20and%20learned%20local%20texture%20tokens%2C%20enabling%20recovery%20of%20high-frequency%20details%20within%20the%20radiance%20field%20and%20producing%20view-consistent%20HR%20novel%20views%20without%20external%20HR%20references%20or%20post-hoc%202D%20upsampling.%20Importantly%2C%20our%20model%20is%20generalizable%3A%20once%20trained%2C%20it%20can%20be%20applied%20to%20unseen%20scenes%20and%20rendered%20from%20novel%20viewpoints%20without%20per-scene%20optimization.%20Experiments%20on%20multiple%20datasets%20show%20that%20NGP-SR%20consistently%20improves%20both%20reconstruction%20quality%20and%20runtime%20efficiency%20over%20prior%20NeRF-based%20super-resolution%20methods%2C%20offering%20a%20practical%20solution%20for%20scalable%20high-resolution%20novel%20view%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20128v1%0AForm%3A%20https%3A//docs.google.com/fo on%2520quality%2520and%2520runtime%2520efficiency%2520over%2520prior%2520NeRF-based%2520super-resolution%2520methods%252C%2520offering%2520a%2520practical%2520solution%2520for%2520scalable%2520high-resolution%2520novel%2520view%2520synthesis.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20128v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generalizable%20NGP-SR%3A%20Generalizable%20Neural%20Radiance%20Fields%20Super-Resolution%20via%20Neural%20Graph%20Primitives&entry.906535625=Wanqi%20Yuan%20and%20Omkar%20Sharad%20Mayekar%20and%20Connor%20Pennington%20and%20Nianyi%20Li&entry.1292438233=Neural%20Radiance%20Fields%20%28NeRF%29%20achieve%20photorealistic%20novel%20view%20synthesis%20but%20become%20costly%20when%20high-resolution%20%28HR%29%20rendering%20is%20required%2C%20as%20HR%20outputs%20demand%20dense%20sampling%20and%20higher-capacity%20models.%20Moreover%2C%20naively%20super-resolving%20per-view%20renderings%20in%202D%20often%20breaks%20multi-view%20consistency.%20We%20propose%20Generalizable%20NGP-SR%2C%20a%203D-aware%20super-resolution%20framework%20that%20reconstructs%20an%20HR%20radiance%20field%20directly%20from%20low-resolution%20%28LR%29%20posed%20images.%20Built%20on%20Neural%20Graphics%20Primitives%20%28NGP%29%2C%20NGP-SR%20conditions%20radiance%20prediction%20on%203D%20coordinates%20and%20learned%20local%20texture%20tokens%2C%20enabling%20recovery%20of%20high-frequency%20details%20within%20the%20radiance%20field%20and%20producing%20view-consistent%20HR%20novel%20views%20without%20external%20HR%20references%20or%20post-hoc%202D%20upsampling.%20Importantly%2C%20our%20model%20is%20generalizable%3A%20once%20trained%2C%20it%20can%20be%20applied%20to%20unseen%20scenes%20and%20rendered%20from%20novel%20viewpoints%20without%20per-scene%20optimization.%20Experiments%20on%20multiple%20datasets%20show%20that%20NGP-SR%20consistently%20improves%20both% {"title": "MME-CoF-Pro: Evaluating Reasoning Coherence in Video Generative Models with Text and Visual Hints", "author": "Yu Qi and Xinyi Xu and Ziyu Guo and Siyuan Ma and Renrui Zhang and Xinyan Chen and Ruichuan An and Ruofan Xing and Jiayi Zhang and Haojie Huang and Pheng-Ann Heng and Jonathan Tremblay and Lawson L. S. Wong", "abstract": "Video generative models show emerging reasoning behaviors. It is essential to ensure that generated events remain causally consistent across frames for reliable deployment, a property we define as reasoning coherence. To bridge the gap in literature for missing reasoning coherence evaluation, we propose MME-CoF-Pro, a comprehensive video reasoning benchmark to assess reasoning coherence in video models. Specifically, MME-CoF-Pro contains 303 samples across 16 categories, ranging from visual logical to scientific reasoning. It introduces Reasoning Score as evaluation metric for assessing process-level necessary intermediate reasoning steps, and includes three evaluation settings, (a) no hint (b) text hint and (c) visual hint, enabling a controlled investigation into the underlying mechanisms of reasoning hint guidance. Evaluation results in 7 open and closed-source video models reveals insights including: (1) Video generative models exhibit weak reasoning coherence, decoupled from generation quality. (2) Text hints boost apparent correctness but often cause inconsistency and hallucinated reasoning (3) Visual hints benefit structured perceptual tasks but struggle with fine-grained perception. Website: https://video-reasoning-coherence.github.io/", "link": "http://arxiv.org/abs/2603.20194v1", "date": "2026-03-20", "relevancy": 2.7715, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5638}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5638}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5354}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MME-CoF-Pro%3A%20Evaluating%20Reasoning%20Coherence%20in%20Video%20Generative%20Models%20with%20Text%20and%20Visual%20Hints&body=Title%3A%20MME-CoF-Pro%3A%20Evaluating%20Reasoning%20Coherence%20in%20Video%20Generative%20Models%20with%20Text%20and%20Visual%20Hints%0AAuthor%3A%20Yu%20Qi%20and%20Xinyi%20Xu%20and%20Ziyu%20Guo%20and%20Siyuan%20Ma%20and%20Renrui%20Zhang%20and%20Xinyan%20Chen%20and%20Ruichuan%20An%20and%20Ruofan%20Xing%20and%20Jiayi%20Zhang%20and%20Haojie%20Huang%20and%20Pheng-Ann%20Heng%20and%20Jonathan%20Tremblay%20and%20Lawson%20L.%20S.%20Wong%0AAbstract%3A%20Video%20generative%20models%20show%20emerging%20reasoning%20behaviors.%20It%20is%20essential%20to%20ensure%20that%20generated%20events%20remain%20causally%20consistent%20across%20frames%20for%20reliable%20deployment%2C%20a%20property%20we%20define%20as%20reasoning%20coherence.%20To%20bridge%20the%20gap%20in%20literature%20for%20missing%20reasoning%20coherence%20evaluation%2C%20we%20propose%20MME-CoF-Pro%2C%20a%20comprehensive%20video%20reasoning%20benchmark%20to%20assess%20reasoning%20coherence%20in%20video%20models.%20Specifically%2C%20MME-CoF-Pro%20contains%20303%20samples%20across%2016%20categories%2C%20ranging%20from%20visual%20logical%20to%20scientific%20reasoning.%20It%20introduces%20Reasoning%20Score%20as%20evaluation%20metric%20for%20assessing%20process-level%20necessary%20intermediate%20reasoning%20steps%2C%20and%20includes%20three%20evaluation%20settings%2C%20%28a%29%20no%20hint%20%28b%29%20text%20hint%20and%20%28c%29%20visual%20hint%2C%20enabling%20a%20controlled%20investigation%20into%20the%20underlying%20mechanisms%20of%20reasoning%20hint%20guidance.%20Evaluation%20results%20in%207%20open%20and%20closed-source%20video%20models {"title": "LIORNet: Self-Supervised LiDAR Snow Removal Framework for Autonomous Driving under Adverse Weather Conditions", "author": "Ji-il Park and Inwook Shim", "abstract": "LiDAR sensors provide high-resolution 3D perception and long-range detection, making them indispensable for autonomous driving and robotics. However, their performance significantly degrades under adverse weather conditions such as snow, rain, and fog, where spurious noise points dominate the point cloud and lead to false perception. To address this problem, various approaches have been proposed: distance-based filters exploiting spatial sparsity, intensity-based filters leveraging reflectance distributions, and learning-based methods that adapt to complex environments. Nevertheless, distance-based methods struggle to distinguish valid object points from noise, intensity-based methods often rely on fixed thresholds that lack adaptability to changing conditions, and learning-based methods suffer from the high cost of annotation, limited generalization, and computational overhead. In this study, we propose LIORNet, which eliminates these drawbacks and integrates the strengths of all three paradigms. LIORNet is built upon a U-Net++ backbone and employs a self-supervised learning strategy guided by pseudo-labels generated from multiple physical and statistical cues, including range-dependent intensity thresholds, snow reflectivity, point sparsity, and sensing range constraints. This design enables LIORNet to distinguish noise points from environmental structures without requiring manual annotations, thereby overcoming the difficulty of snow labeling and the limitations of single-principle approaches. Extensive experiments on the WADS and CADC datasets demonstrate that LIORNet outperforms state-of-the-art filtering algorithms in both accuracy and runtime while preserving critical environmental features. These results highlight LIORNet as a practical and robust solution for LiDAR perception in extreme weather, with strong potential for real-time deployment in autonomous driving systems.", "link": "http://arxiv.org/abs/2603.19936v1", "date": "2026-03-20", "relevancy": 2.7632, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5776}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.543}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5373}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LIORNet%3A%20Self-Supervised%20LiDAR%20Snow%20Removal%20Framework%20for%20Autonomous%20Driving%20under%20Adverse%20Weather%20Conditions&body=Title%3A%20LIORNet%3A%20Self-Supervised%20LiDAR%20Snow%20Removal%20Framework%20for%20Autonomous%20Driving%20under%20Adverse%20Weather%20Conditions%0AAuthor%3A%20Ji-il%20Park%20and%20Inwook%20Shim%0AAbstract%3A%20LiDAR%20sensors%20provide%20high-resolution%203D%20perception%20and%20long-range%20detection%2C%20making%20them%20indispensable%20for%20autonomous%20driving%20and%20robotics.%20However%2C%20their%20performance%20significantly%20degrades%20under%20adverse%20weather%20conditions%20such%20as%20snow%2C%20rain%2C%20and%20fog%2C%20where%20spurious%20noise%20points%20dominate%20the%20point%20cloud%20and%20lead%20to%20false%20perception.%20To%20address%20this%20problem%2C%20various%20approaches%20have%20been%20proposed%3A%20distance-based%20filters%20exploiting%20spatial%20sparsity%2C%20intensity-based%20filters%20leveraging%20reflectance%20distributions%2C%20and%20learning-based%20methods%20that%20adapt%20to%20complex%20environments.%20Nevertheless%2C%20distance-based%20methods%20struggle%20to%20distinguish%20valid%20object%20points%20from%20noise%2C%20intensity-based%20methods%20often%20rely%20on%20fixed%20thresholds%20that%20lack%20adaptability%20to%20changing%20conditions%2C%20and%20learning-based%20methods%20suffer%20from%20the%20high%20cost%20of%20annotation%2C%20limited%20generalization%2C%20and%20computational%20overhead.%20In%20this%20study%2C%20we%20propose%20LIORNet%2C%20which%20eliminates%20these%20drawbacks%20and%20integrates%20the%20strengths%20of%20all%20three%20paradigms.%20LIORNet%20is%20built%20upon%20a%20U-Net%2B%2B%20backbone%20and%20employs%20a%20self-supervised%20learning%20strategy%20guided%20by%20pseudo-labels%20generated%20from%20multiple%20physical%20and%20statistical%20cues%2C%20including%20range-dependent%20intensity%20thresholds%2C%20snow%20reflectivity%2C%20point%20sparsity%2C%20and%20sensing%20range%20constraints.%20This%20design%20enables%20LIORNet%20to%20distinguish%20noise%20points%20from%20environmental%20structures%20without%20requiring%20manual%20annotations%2C%20thereby%20overcoming%20the%20difficulty%20of%20snow%20labeling%20and%20the%20limitations%20of%20single-principle%20approaches.%20Extensive%20experiments%20on%20the%20WADS%20and%20CADC%20datasets%20demonstrate%20that%20LIORNet%20outperforms%20state-of-the-art%20filtering%20algorithms%20in%20both%20accuracy%20and%20runtime%20while%20preserving%20critical%20environmental%20features.%20These%20results%20highlight%20LIORNet%20as%20a%20practical%20and%20robust%20solution%20for%20LiDAR%20perception%20in%20extreme%20weather%2C%20with%20strong%20potential%20for%20real-time%20deployment%20in%20autonomous%20driving%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19936v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLIORNet%253A%2520Self-Supervised%2520LiDAR%2520Snow%2520Removal%2520Framework%2520for%2520Autonomous%2520Driving%2520under%2520Adverse%2520Weather%2520Conditions%26entry.906535625%3DJi-il%2520Park%2520and%2520Inwook%2520Shim%26entry.1292438233%3D

lters%20leveraging%20reflectance%20distributions%2C%20and%20learning-based%20methods%20that%20adapt%20to%20complex%20environments.%20Nevertheless%2C%20distance-based%20methods%20struggle%20to%20distinguish%20valid%20object%20points%20from%20noise%2C%20intensity-based%20methods%20often%20rely%20on%20fixed%20thresholds%20that%20lack%20adaptability%20to%20changing%20conditions%2C%20and%20learning-based%20methods%20suffer%20from%20the%20high%20cost%20of%20annotation%2C%20limited%20generalization%2C%20and%20computational%20overhead.%20In%20this%20study%2C%20we%20propose%20LIORNet%2C%20which%20eliminates%20these%20drawbacks%20and%20integrates%20the%20strengths%20of%20all%20three%20paradigms.%20LIORNet%20is%20built%20upon%20a%20U-Net%2B%2B%20backbone%20and%20employs%20a%20self-supervised%20learning%20strategy%20guided%20by%20pseudo-labels%20generated%20from%20multiple%20physical%20and%20statistical%20cues%2C%20including%20range-dependent%20intensity%20thresholds%2C%20snow%20reflectivity%2C%20point%20sparsity%2C%20and%20sensing%20range%20constraints.%20This%20design%20enables%20LIORNet%20to%20distinguish%20noise%20points%20from%20environmental%20structures%20without%20requiring%20manual%20annotations%2C%20thereby%20overcoming%20the%20difficulty%20of%20snow%20labeling%20and%20the%20limitations%20of%20single-principle%20approaches.%20Extensive%20experiments%20on%20the%20WADS%20and%20CADC%20datasets%20demonstrate%20that%20LIORNet%20outperforms%20state-of-the-art%20filtering%20algorithms%20in%20both%20accuracy%20and%20runtime%20while%20preserving%20critical%20environmental%20features.%20These%20results%20highlight%20LIORNet%20as%20a%20practical%20and%20robust%20solution%20for%20LiDAR%20perception%20in%20extreme%20weather%2C%20with%20strong%20potential%20for%20real-time%20deployment%20in%20autonomous%20driving%20systems.&entry.1838667208=http%3A//arxiv.org/abs/2603.19936v1&entry.124074799=Read"},
{"title": "Medical Image Spatial Grounding with Semantic Sampling", "author": "Andrew Seohwan Yu and Mohsen Hariri and Kunio Nakamura and Mingrui Yang and Xiaojuan Li and Vipin Chaudhary", "abstract": "Vision language models (VLMs) have shown significant promise in visual grounding for images as well as videos. In medical imaging research, VLMs represent a bridge between object detection and segmentation, and report understanding and generation. However, spatial grounding of anatomical structures in the three-dimensional space of medical images poses many unique challenges. In this study, we examine image modalities, slice directions, and coordinate systems as differentiating factors for vision components of VLMs, and the use of anatomical, directional, and relational terminology as factors for the language components. We then demonstrate that visual and textual prompting systems such as labels, bounding boxes, and mask overlays have varying effects on the spatial grounding ability of VLMs. To enable measurement and reproducibility, we introduce MIS-Ground, a benchmark that comprehensively tests a VLM for vulnerabilities against specific modes of Medical Image Spatial Grounding. We release MIS-Ground to the public at https://anonymous.4open.science/r/mis-ground. In addition, we present MIS-SemSam, a low-cost, inference-time, and model-agnostic optimization of VLMs that improve their spatial grounding ability with the use of Semantic Sampling. We find that MIS-SemSam improves the accuracy of Qwen3-VL-32B on MIS-Ground by 13.06%.", "link": "http://arxiv.org/abs/2603.14579v2", "date": "2026-03-20", "relevancy": 2.7551, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Medical%20Image%20Spatial%20Grounding%20with%20Semantic%20Sampling&body=Title%3A%20Medical%20Image%20Spatial%20Grounding%20with%20Semantic%20Sampling%0AAuthor%3A%20Andrew%20Seohwan%20Yu%20and%20Mohsen%20Hariri%20and%20Kunio%20Nakamura%20and%20Mingrui%20Yang%20and%20Xiaojuan%20Li%20and%20Vipin%20Chaudhary%0AAbstract%3A%20Vision%20language%20models%20%28VLMs%29%20have%20shown%20significant%20promise%20in%20visual%20grounding%20for%20images%20as%20well%20as%20videos.%20In%20medical%20imaging%20research%2C%20VLMs%20represent%20a%20bridge%20between%20object%20detection%20and%20segmentation%2C%20and%20report%20understanding%20and%20generation.%20However%2C%20spatial%20grounding%20of%20anatomical%20structures%20in%20the%20three-dimensional%20space%20of%20medical%20images%20poses%20many%20unique%20challenges.%20In%20this%20study%2C%20we%20examine%20image%20modalities%2C%20slice%20directions%2C%20and%20coordinate%20systems%20as%20differentiating%20factors%20for%20vision%20components%20of%20VLMs%2C%20and%20the%20use%20of%20anatomical%2C%20directional%2C%20and%20relational%20terminology%20as%20factors%20for%20the%20language%20components.%20We%20then%20demonstrate%20that%20visual%20and%20textual%20prompting%20systems%20such%20as%20labels%2C%20bounding%20boxes%2C%20and%20mask%20overlays%20have%20varying%20effects%20on%20the%20spatial%20grounding%20ability%20of%20VLMs.%20To%20enable%20measurement%20and%20reproducibility%2C%20we%20introduce%20MIS-Ground%2C%20a%20benchmark%20that%20comprehensively%20tests%20a%20VLM%20for%20vulnerabilities%20against%20specific%20modes%20of%20Medical%20Image%20Spatial%20Grounding.%20We%20release%20MIS-Ground%20to%20the%20public%20at%20https%3A//anonymous.4open.science/r/mis-ground.%20In%20addition%2C%20we%20present%20MIS-SemSam%2C%20a%20low-cost%2C%20inference-time%2C%20and%20model-agnostic%20optimization%20of%20VLMs%20that%20improve%20their%20spatial%20grounding%20ability%20with%20the%20use%20of%20Semantic%20Sampling.%20We%20find%20that%20MIS-SemSam%20improves%20the%20accuracy%20of%20Qwen3-VL-32B%20on%20MIS-Ground%20by%2013.06%25.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14579v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedical%2520Image%2520Spatial%2520Grounding%2520with%2520Semantic%2520Sampling%26entry.906535625%3DAndrew%2520Seohwan%2520Yu%2520and%2520Mohsen%2520Hariri%2520and%2520Kunio%2520Nakamura%2520and%2520Mingrui%2520Yang%2520and%2520Xiaojuan%2520Li%2520and%2520Vipin%2520Chaudhary%26entry.1292438233%3DVision%2520language%2520models%2520%2528VLMs%2529%2520have%2520shown%2520significant%2520promise%2520in%2520visual%2520grounding%2520for%2520images%2520as%2520well%2520as%2520videos.%2520In%2520medical%2520imaging%2520research%252C%2520VLMs%2520represent%2520a%2520bridge%2520between%2520object%2520detection%2520and%2520segmentation%252C%2520and%2520report%2520understanding%2520and%2520generation.%2520However%252C%2520spatial%2520grounding%2520of%2520anatomical%2520structures%2520in%2520the%2520three-dimensional%2520space%2520of%2520medical%2520images%2520poses%2520many%2520unique%2520challenges.%2520In%2520this%2520study%252C%2520we%2520examine%2520image%2520modalities%252C%2520slice%2520directions%252C%2520and%2520coordinate%2520systems%2520as%2520differentiating%2520factors%2520for%2520vision%2520components%2520of%2520VLMs%252C%2520and%2520the%2520use%2520of%2520anatomical%252C%2520directional%252C%2520and%2520relational%2520terminology%2520as%2520factors%2520for%2520the%2520language%2520components.%2520We%2520then%2520demonstrate%2520that%2520visual%2520and%2520textual%2520prompting%2520systems%2520such%2520as%2520labels%252C%2520bounding%2520boxes%252C%2520and%2520mask%2520overlays%2520have%2520var {"title": "Chain-of-Adaptation: Surgical Vision-Language Adaptation with Reinforcement Learning", "author": "Jiajie Li and Chenhui Xu and Meihuan Liu and Jinjun Xiong", "abstract": "Conventional fine-tuning on domain-specific datasets can inadvertently alter a model's pretrained multimodal priors, leading to reduced generalization. To address this, we propose Chain-of-Adaptation (CoA), an adaptation framework designed to integrate domain knowledge while maintaining the model's inherent reasoning and perceptual capabilities. CoA introduces a structured reasoning format that enhances domain alignment without sacrificing general multimodal competence by reinforcement learning. Experiments on standard surgical benchmarks, under both in-distribution and out-of-distribution settings, demonstrate that CoA achieves higher accuracy, stronger generalization, and more stable behavior than supervised fine-tuning. Furthermore, ablation studies confirm that CoA effectively preserves the model's core visual-language abilities, providing a reliable pathway for domain specialization in VLMs.", "link": "http://arxiv.org/abs/2603.20116v1", "date": "2026-03-20", "relevancy": 2.7536, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5785}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5368}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Chain-of-Adaptation%3A%20Surgical%20Vision-Language%20Adaptation%20with%20Reinforcement%20Learning&body=Title%3A%20Chain-of-Adaptation%3A%20Surgical%20Vision-Language%20Adaptation%20with%20Reinforcement%20Learning%0AAuthor%3A%20Jiajie%20Li%20and%20Chenhui%20Xu%20and%20Meihuan%20Liu%20and%20Jinjun%20Xiong%0AAbstract%3A%20Conventional%20fine-tuning%20on%20domain-specific%20datasets%20can%20inadvertently%20alter%20a%20model%27s%20pretrained%20multimodal%20priors%2C%20leading%20to%20reduced%20generalization.%20To%20address%20this%2C%20we%20propose%20Chain-of-Adaptation%20%28CoA%29%2C%20an%20adaptation%20framework%20designed%20to%20integrate%20domain%20knowledge%20while%20maintaining%20the%20model%27s%20inherent%20reasoning%20and%20perceptual%20capabilities.%20CoA%20introduces%20a%20structured%20reasoning%20format%20that%20enhances%20domain%20alignment%20without%20sacrificing%20general%20multimodal%20competence%20by%20reinforcement%20learning.%20Experiments%20on%20standard%20surgical%20benchmarks%2C%20under%20both%20in-distribution%20and%20out-of-distribution%20settings%2C%20demonstrate%20that%20CoA%20achieves%20higher%20accuracy%2C%20stronger%20generalization%2C%20and%20more%20stable%20behavior%20than%20supervised%20fine-tuning.%20Furthermore%2C%20ablation%20studies%20confirm%20that%20CoA%20effectively%20preserves%20the%20model%27s%20core%20visual-language%20abilities%2C%20providing%20a%20reliable%20pathway%20for%20domain%20specialization%20in%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20116v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChain-of-Adaptation%253A%2520Surgical%2520Vision-Language%2520Adaptation%2520with%2520Reinforcement%2520Learning%26entry.906535625%3DJiajie%2520Li%2520and%2520Chenhui%2520Xu%2520and%2520Meihuan%2520Liu%2520and%2520Jinjun%2520Xiong%26entry.1292438233%3DConventional%2520fine-tuning%2520on%2520domain-specific%2520datasets%2520can%2520inadvertently%2520alter%2520a%2520model%2527s%2520pretrained%2520multimodal%2520priors%252C%2520leading%2520to%2520reduced%2520generalization.%2520To%2520address%2520this%252C%2520we%2520propose%2520Chain-of-Adaptation%2520%2528CoA%2529%252C%2520an%2520adaptation%2520framework%2520designed%2520to%2520integrate%2520domain%2520knowledge%2520while%2520maintaining%2520the%2520model%2527s%2520inherent%2520reasoning%2520and%2520perceptual%2520capabilities.%2520CoA%2520introduces%2520a%2520structured%2520reasoning%2520format%2520that%2520enhances%2520domain%2520alignment%2520without%2520sacrificing%2520general%2520multimodal%2520competence%2520by%2520reinforcement%2520learning.%2520Experiments%2520on%2520standard%2520surgical%2520benchmarks%252C%2520under%2520both%2520in-distribution%2520and%2520out-of-distribution%2520settings%252C%2520demonstrate%2520that%2520CoA%2520achieves%2520higher%2520accuracy%252C%2520stronger%2520generalization%252C%2520and%2520more%2520stable%2520behavior%2520than%2520supervised%2520fine-tuning.%2520Furthermore%252C%2520ablation%2520studies%2520confirm%2520that%2520CoA%2520effectively%2520preserves%2520the%2520model%2527s%2520core%2520visual-language%2520abilities%252C%2520providing%2520a%2520reliable%2520pathway%2520for%2520domain%2520specialization%2520in%2520VLMs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20116v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Chain-of-Adaptation%3A%20Surgical%20Vision-Language%20Adaptation%20with%20Reinforcement%20Learning&entry.906535625=Jiajie%20Li%20and%20Chenhui%20Xu%20and%20Meihuan%20Liu%20and%20Jinjun%20Xiong&entry.1292438233=Conventional%20fine-tuning%20on%20domain-specific%20datasets%20can%20inadvertently%20alter%20a%20model%27s%20pretrained%20multimodal%20priors%2C%20leading%20to%20reduced%20generalization.%20To%20address%20this%2C%20we%20propose%20Chain-of-Adaptation%20%28CoA%29%2C%20an%20adaptation%20framework%20designed%20to%20integrate%20domain%20knowledge%20while%20maintaining%20the%20model%27s%20inherent%20reasoning%20and%20perceptual%20capabilities.%20CoA%20introduces%20a%20structured%20reasoning%20format%20that%20enhances%20domain%20alignment%20without%2 {"title": "A Unified Platform and Quality Assurance Framework for 3D Ultrasound Reconstruction with Robotic, Optical, and Electromagnetic Tracking", "author": "Lewis Howell and Manisha Waterston and Tze Min Wah and James H. Chandler and James R. McLaughlan", "abstract": "Three-dimensional (3D) Ultrasound (US) can facilitate diagnosis, treatment planning, and image-guided therapy. However, current studies rarely provide a comprehensive evaluation of volumetric accuracy and reproducibility, highlighting the need for robust Quality Assurance (QA) frameworks, particularly for tracked 3D US reconstruction using freehand or robotic acquisition. This study presents a QA framework for 3D US reconstruction and a flexible open source platform for tracked US research. A custom phantom containing geometric inclusions with varying symmetry properties enables straightforward evaluation of optical, electromagnetic, and robotic kinematic tracking for 3D US at different scanning speeds and insonation angles. A standardised pipeline performs real-time segmentation and 3D reconstruction of geometric targets (DSC = 0.97, FPS = 46) without GPU acceleration, followed by automated registration and comparison with ground-truth geometries. Applying this framework showed that our robotic 3D US achieves state-of-the-art reconstruction performance (DSC-3D = 0.94 +- 0.01, HD95 = 1.17 +- 0.12), approaching the spatial resolution limit imposed by the transducer. This work establishes a flexible experimental platform and a reproducible validation methodology for 3D US reconstruction. The proposed framework enables robust cross-platform comparisons and improved reporting practices, supporting the safe and effective clinical translation of 3D ultrasound in diagnostic and image-guided therapy applications.", "link": "http://arxiv.org/abs/2603.20077v1", "date": "2026-03-20", "relevancy": 2.726, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.or 7v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Unified%20Platform%20and%20Quality%20Assurance%20Framework%20for%203D%20Ultrasound%20Reconstruction%20with%20Robotic%2C%20Optical%2C%20and%20Electromagnetic%20Tracking&entry.906535625=Lewis%20Howell%20and%20Manisha%20Waterston%20and%20Tze%20Min%20Wah%20and%20James%20H.%20Chandler%20and%20James%20R.%20McLaughlan&entry.1292438233=Three-dimensional%20%283D%29%20Ultrasound%20%28US%29%20can%20facilitate%20diagnosis%2C%20treatment%20planning%2C%20and%20image-guided%20therapy.%20However%2C%20current%20studies%20rarely%20provide%20a%20comprehensive%20evaluation%20of%20volumetric%20accuracy%20and%20reproducibility%2C%20highlighting%20the%20need%20for%20robust%20Quality%20Assurance%20%28QA%29%20frameworks%2C%20particularly%20for%20tracked%203D%20US%20reconstruction%20using%20freehand%20or%20robotic%20acquisition.%20This%20study%20presents%20a%20QA%20framework%20for%203D%20US%20reconstruction%20and%20a%20flexible%20open%20source%20platform%20for%20tracked%20US%20research.%20A%20custom%20phantom%20containing%20geometric%20inclusions%20with%20varying%20symmetry%20properties%20enables%20straightforward%20evaluation%20of%20optical%2C%20electromagnetic%2C%20and%20robotic%20kinematic%20tracking%20for%203D%20US%20at%20different%20scanning%20speeds%20and%20insonation%20angles.%20A%20standardised%20pipeline%20performs%20real-time%20segmentation%20and%203D%20reconstruction%20of%20geometric%20targets%20%28DSC%20%3D%200.97%2C%20FPS%20%3D%2046%29%20without%20GPU%20acceleration%2C%20followed%20by%20automated%20registration%20and%20comparison%20with%20ground-truth%20geometries.%20Applying%20this%20framework%20showed%20that%20our%20robotic%203D%20US%20achieves%20state-of-the-art%20reconstruction%20performance%20%28DSC-3D%20%3D%200.94%20%2B-%200.01%2C%20HD95%20%3D%201.17%20%2B-%200.12%29%2C%20approaching%20the%20spatial%20resolution%20 {"title": "CycleCap: Improving VLMs Captioning Performance via Self-Supervised Cycle Consistency Fine-Tuning", "author": "Marios Krestenitis and Christos Tzelepis and Konstantinos Ioannidis and Stefanos Vrochidis and Ioannis Kompatsiaris and Georgios Tzimiropoulos and Shaogang Gong and Ioannis Patras", "abstract": "Visual-Language Models (VLMs) have achieved remarkable progress in image captioning, visual question answering, and visual reasoning. Yet they remain prone to vision-language misalignment, often producing overly generic or hallucinated descriptions. Existing approaches address this via instruction tuning-requiring costly, large-scale annotated datasets or via complex test-time frameworks for caption refinement. In this work, we revisit image-text alignment through the lens of cycle consistency: given an image and a caption generated by an image-to-text model, the backward mapping through a text-to-image model should reconstruct an image that closely matches the original. In our setup, a VLM serves as the image-to-text component, while a pre-trained text-to-image model closes the loop by reconstructing the image from the generated caption. Building on this, we introduce CycleCap, a fine-tuning scheme to improve image captioning using Group Relative Policy Optimization (GRPO) with a reward based on the similarity between the original and reconstructed images, computed on-the-fly. Unlike previous work that uses cycle consistency loss for preference dataset construction, our method leverages cycle consistency directly as a self-supervised training signal. This enables the use of raw images alone, eliminating the need for curated image-text datasets, while steering the VLM to produce more accurate and grounded text descriptions. Applied to four VLMs ranging from 1B to 7B parameters, CycleCap yields consistent improvements across captioning and hallucination benchmarks, surpassing state-of-the-art methods that rely on supervised cycle consistency training.", "link": "http://arxiv.org/abs/2603.18282v2", "date": "2026-03-20", "relevancy": 2.6949, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5514}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5454}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5203}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CycleCap%3A%20Improving%20VLMs%20Captioning%20Performance%20via%20Self-Supervised%20Cycle%20Consistency%20Fine-Tuning&body=Title%3A%20CycleCap%3A%20Improving%20VLMs%20Captioning%20Performance%20via%20Self-Supervised%20Cycle%20Consistency%20Fine-Tuning%0AAuthor%3A%20Marios%20Krestenitis%20and%20Christos%20Tzelepis%20and%20Konstantinos%20Ioannidis%20and%20Stefanos%20Vrochidis%20and%20Ioannis%20Kompatsiaris%20and%20Georgios%20Tzimiropoulos%20and%20Shaogang%20Gong%20and%20Ioannis%20Patras%0AAbstract%3A%20Visual-Language%20Models%20%28VLMs%29%20have%20achieved%20remarkable%20progress%20in%20image%20captioning%2C%20visual%20question%20answering%2C%20and%20visual%20reasoning.%20Yet%20they%20remain%20prone%20to%20vision-language%20misalignment%2C%20often%20producing%20overly%20generic%20or%20hallucinated%20descriptions.%20Existing%20approaches%20address%20this%20via%20instruction%20tuning-requiring%20costly%2C%20large-scale%20annotated%20datasets%20or%20via%20complex%20test-time%20frameworks%20for%20caption%20refinement.%20In%20this%20work%2C%20we%20revisit%20image-text%20alignment%20through%20the%20lens%20of%20cycle%20consistency%3A%20given%20an%20image%20and%20a%20caption%20generated%20by%20an%20image-to-text%20model%2C%20the%20backward%20mapping%20through%20a%20text-to-image%20model%20should%20reconstruct%20an%20image%20that%20closely%20matches%20the%20original.%20In%20our%20setup%2C%20a%20VLM%20serves%20as%20the%20image-to-text%20component%2C%20while%20a%20pre-trained%20text-to-image%20model%20closes%20the%20loop%20by%20reconstructing%20the%20image%20from%20the%20generated%20caption.%20Building%20on%20this%2C%20we%20introduce%20CycleCap%2C%20a%20fine-tuning%20scheme%20to%20improve%20image%20captioning%20using%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20with%20a%20reward%20based%20on%20the%20similarity%20between%20the%20original%20and%20reconstructed%20images%2C%20computed%20on-the-fly.%20Unlike%20previous%20work%20that%20uses%20cycle%20consistency%20loss%20for%20preference%20dataset%20construction%2C%20our%20method%20leverages%20cycle%20consistency%20directly%20as%20a%20self-supervised%20training%20signal.%20This%20enables%20the%20use%20of%20raw%20images%20alone%2C%20eliminating%20the%20need%20for%20curated%20image-text%20datasets%2C%20while%20steering%20the%20VLM%20to%20produce%20more%20accurate%20and%20grounded%20text%20descriptions.%20Applied%20to%20four%20VLMs%20ranging%20from%201B%20to%207B%20parameters%2C%20CycleCap%20yields%20consistent%20improvements%20across%20captioning%20and%20hallucination%20benchmarks%2C%20surpassing%20state-of-the-art%20methods%20that%20rely%20on%20supervised%20cycle%20consistency%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18282v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCycleCap%253A%2520Improving%2520VLMs%2520Captioning%2520Performance%2520via%2520Self-Supervised%2520Cycle%2520Consistency%2520Fine-Tuning%26entry.906535625%3DMarios%2520Krestenitis%2520and%2520Christos%2520Tzelepis%2520and%2520Konstantinos%2520Ioannidis%2520and%2520Stefanos%2520Vrochidis%2520and%2520Ioannis%2520Kompatsiaris%2520and%2520Georgios%2520Tzimiropoulos%2520and%2520Shaogang%2520Gong%2520and%2520Ioannis%2520Patras%26entry.1292438233%3DVisual-Language%2520Models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520progress% {"title": "GDEGAN: Gaussian Dynamic Equivariant Graph Attention Network for Ligand Binding Site Prediction", "author": " Animesh and Plaban Kumar Bhowmick and Pralay Mitra", "abstract": "Accurate prediction of binding sites of a given protein, to which ligands can bind, is a critical step in structure-based computational drug discovery. Recently, Equivariant Graph Neural Networks (GNNs) have emerged as a powerful paradigm for binding site identification methods due to the large-scale availability of 3D structures of proteins via protein databases and AlphaFold predictions. The state-of-the-art equivariant GNN methods implement dot product attention, disregarding the variation in the chemical and geometric properties of the neighboring residues. To capture this variation, we propose GDEGAN (Gaussian Dynamic Equivariant Graph Attention Network), which replaces dot-product attention with adaptive kernels that recognize binding sites. The proposed attention mechanism captures variation in neighboring residues using statistics of their characteristic local feature distributions. Our mechanism dynamically computes neighborhood statistics at each layer, using local variance as an adaptive bandwidth parameter with learnable per-head temperatures, enabling each protein region to determine its own context-specific importance. GDEGAN outperforms existing methods with relative improvements of 37-66% in DCC and 7-19% DCA success rates across COACH420, HOLO4k, and PDBBind2020 datasets. These advances have direct application in accelerating protein-ligand docking by identifying potential binding sites for therapeutic target identification.", "link": "http://arxiv.org/abs/2603.19817v1", "date": "2026-03-20", "relevancy": 2.6792, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5576}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5364}, { {"title": "FoleyDirector: Fine-Grained Temporal Steering for Video-to-Audio Generation via Structured Scripts", "author": "You Li and Dewei Zhou and Fan Ma and Fu Li and Dongliang He and Yi Yang", "abstract": "Recent Video-to-Audio (V2A) methods have achieved remarkable progress, enabling the synthesis of realistic, high-quality audio. However, they struggle with fine-grained temporal control in multi-event scenarios or when visual cues are insufficient, such as small regions, off-screen sounds, or occluded or partially visible objects. In this paper, we propose FoleyDirector, a framework that, for the first time, enables precise temporal guidance in DiT-based V2A generation while preserving the base model's audio quality and allowing seamless switching between V2A generation and temporally controlled synthesis. FoleyDirector introduces Structured Temporal Scripts (STS), a set of captions corresponding to short temporal segments, to provide richer temporal information. These features are integrated via the Script-Guided Temporal Fusion Module, which employs Temporal Script Attention to fuse STS features coherently. To handle complex multi-event scenarios, we further propose Bi-Frame Sound Synthesis, enabling parallel in-frame and out-of-frame audio generation and improving controllability. To support training and evaluation, we construct the DirectorSound dataset and introduce VGGSoundDirector and DirectorBench. Experiments demonstrate that FoleyDirector substantially enhances temporal controllability while maintaining high audio fidelity, empowering users to act as Foley directors and advancing V2A toward more expressive and controllable generation.", "link": "http://arxiv.org/abs/2603.19857v1", "date": "2026-03-20", "relevancy": 2.6604, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.556}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5242}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.516}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FoleyDirector%3A%20Fine-Grained%20Temporal%20Steering%20for%20Video-to-Audio%20Generation%20via%20Structured%20Scripts&body=Title%3A%20FoleyDirector%3A%20Fine-Grained%20Temporal%20Steering%20for%20Video-to-Audio%20Generation%20via%20Structured%20Scripts%0AAuthor%3A%20You%20Li%20and%20Dewei%20Zhou%20and%20Fan%20Ma%20and%20Fu%20Li%20and%20Dongliang%20He%20and%20Yi%20Yang%0AAbstract%3A%20Recent%20Video-to-Audio%20%28V2A%29%20methods%20have%20achieved%20remarkable%20progress%2C%20enabling%20the%20synthesis%20of%20realistic%2C%20high-quality%20audio.%20However%2C%20they%20struggle%20with%20fine-grained%20temporal%20control%20in%20multi-event%20scenarios%20or%20when%20visual%20cues%20are%20insufficient%2C%20such%20as%20small%20regions%2C%20off-screen%20sounds%2C%20or%20occluded%20or%20partially%20visible%20objects.%20In%20this%20paper%2C%20we%20propose%20FoleyDirector%2C%20a%20framework%20that%2C%20for%20the%20first%20time%2C%20enables%20precise%20temporal%20guidance%20in%20DiT-based%20V2A%20generation%20while%20preserving%20the%20base%20model%27s%20audio%20quality%20and%20allowing%20seamless%20switching%20between%20V2A%20generation%20and%20temporally%20controlled%20synthesis.%20FoleyDirector%20introduces%20Structured%20Temporal%20Scripts%20%28STS%29%2C%20a%20set%20of%20captions%20corresponding%20to%20short%20temporal%20segments%2C%20to%20provide%20richer%20temporal%20information.%20These%20features%20are%20integrated%20via%20the%20Script-Guided%20Temporal%20Fusion%20Module%2C%20which%20employs%20Temporal%20Script%20Attention%20to%20fuse%20STS%20features%20coherently.%20To%20handle%20complex%20multi-event%20scenarios%2C%20we%20further%20propose%20Bi-Frame%20Sound%20Synthesis%2C%20enabling%20parallel%20in-frame%20and%20out-of-frame%20audio%20generation%20and%20improving%20controllability.%20To%20support%20training%20and%20evaluation%2C%20we%20construct%20the%20DirectorSound%20dataset%20and%20introduce%20VGGSoundDirector%20and%20DirectorBench.%20Experiments%20demonstrate%20that%20FoleyDirector%20substantially%20enhances%20temporal%20controllability%20while%20maintaining%20high%20audio%20fidelity%2C%20empowering%20users%20to%20act%20as%20Foley%20directors%20and%20advancing%20V2A%20toward%20more%20expressive%20and%20controllable%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19857v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFoleyDirector%253A%2520Fine-Grained%2520Temporal%2520Steering%2520for%2520Video-to-Audio%2520Generation%2520via%2520Structured%2520Scripts%26entry.906535625%3DYou%2520Li%2520and%2520Dewei%2520Zhou%2520and%2520Fan%2520Ma%2520and%2520Fu%2520Li%2520and%2520Dongliang%2520He%2520and%2520Yi%2520Yang%26entry.1292438233%3DRecent%2520Video-to-Audio%2520%2528V2A%2529%2520methods%2520have%2520achieved%2520remarkable%2520progress%252C%2520enabling%2520the%2520synthesis%2520of%2520realistic%252C%2520high-quality%2520audio.%2520However%252C%2520they%2520struggle%2520with%2520fine-grained%2520temporal%2520control%2520in%2520multi-event%2520scenarios%2520or%2520when%2520visual%2520cues%2520are%2520insufficient%252C%2520such%2520as%2520small%2520regions%252C%2520off-screen%2520sounds%252C%2520or%2520occluded%2520or%2520partially%2520visible%2520objects.%2520In%2520this%2520paper%252C%2520we%2520propose%2520FoleyDirector%252C%2520a%2520framework%2520that%252C%2520for%2520the%2520first%2520time%252C%2520enables%2520precise%2520temporal%2520guidance%2520in%2520DiT-based%2520V2A%2520generation%2520while%2520preserving%2520the%2520base%2520model%2527s%2520audio%2520quality%2520and%2520allowing%2520seamless%2520switching%2520between%2520V2A%252 {"title": "HUGE-Bench: A Benchmark for High-Level UAV Vision-Language-Action Tasks", "author": "Jingyu Guo and Ziye Chen and Ziwen Li and Zhengqing Gao and Jiaxin Huang and Hanlue Zhang and Fengming Huang and Yu Yao and Tongliang Liu and Mingming Gong", "abstract": "Existing UAV vision-language navigation (VLN) benchmarks have enabled language-guided flight, but they largely focus on long, step-wise route descriptions with goal-centric evaluation, making them less diagnostic for real operations where brief, high-level commands must be grounded into safe multi-stage behaviors. We present HUGE-Bench, a benchmark for High-Level UAV Vision-Language-Action (HL-VLA) tasks that tests whether an agent can interpret concise language and execute complex, process-oriented trajectories with safety awareness. HUGE-Bench comprises 4 real-world digital twin scenes, 8 high-level tasks, and 2.56M meters of trajectories, and is built on an aligned 3D Gaussian Splatting (3DGS)-Mesh representation that combines photorealistic rendering with collision-capable geometry for scalable generation and collision-aware evaluation. We introduce process-oriented and collision-aware metrics to assess process fidelity, terminal accuracy, and safety. Experiments on representative state-of-the-art VLA models reveal significant gaps in high-level semantic completion and safe execution, highlighting HUGE-Bench as a diagnostic testbed for high-level UAV autonomy.", "link": "http://arxiv.org/abs/2603.19822v1", "date": "2026-03-20", "relevancy": 2.6529, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org {"title": "HiPath: Hierarchical Vision-Language Alignment for Structured Pathology Report Prediction", "author": "Ruicheng Yuan and Zhenxuan Zhang and Anbang Wang and Liwei Hu and Xiangqian Hua and Yaya Peng and Jiawei Luo and Guang Yang", "abstract": "Pathology reports are structured, multi-granular documents encoding diagnostic conclusions, histological grades, and ancillary test results across one or more anatomical sites; yet existing pathology vision-language models (VLMs) reduce this output to a flat label or free-form text. We present HiPath, a lightweight VLM framework built on frozen UNI2 and Qwen3 backbones that treats structured report prediction as its primary training objective. Three trainable modules totalling 15M parameters address complementary aspects of the problem: a Hierarchical Patch Aggregator (HiPA) for multi-image visual encoding, Hierarchical Contrastive Learning (HiCL) for cross-modal alignment via optimal transport, and Slot-based Masked Diagnosis Prediction (Slot-MDP) for structured diagnosis generation. Trained on 749K real-world Chinese pathology cases from three hospitals, HiPath achieves 68.9% strict and 74.7% clinically acceptable accuracy with a 97.3% safety rate, outperforming all baselines under the same frozen backbone. Cross-hospital evaluation confirms generalisation with only a 3.4pp drop in strict accuracy while maintaining 97.1% safety.", "link": "http://arxiv.org/abs/2603.19957v1", "date": "2026-03-20", "relevancy": 2.6261, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5389}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5184}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5184}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiPath%3A%20Hierarchical%20Vision-Language%20Alignment%20for%20Structured%20Pathology%20Report%20Prediction&body=Title%3A%20HiPath%3A%20Hierarchical%20Vision-Language%20Alignment%20for%20Structured%20Pathology%20Report%20Prediction%0AAuthor%3A%20Ruicheng%20Yuan%20and%20Zhenxuan%20Zhang%20and%20Anbang%20Wang%20and%20Liwei%20Hu%20and%20Xiangqian%20Hua%20and%20Yaya%20Peng%20and%20Jiawei%20Luo%20and%20Guang%20Yang%0AAbstract%3A%20Pathology%20reports%20are%20structured%2C%20multi-granular%20documents%20encoding%20diagnostic%20conclusions%2C%20histological%20grades%2C%20and%20ancillary%20test%20results%20across%20one%20or%20more%20anatomical%20sites%3B%20yet%20existing%20pathology%20vision-language%20models%20%28VLMs%29%20reduce%20this%20output%20to%20a%20flat%20label%20or%20free-form%20text.%20We%20present%20HiPath%2C%20a%20lightweight%20VLM%20framework%20built%20on%20frozen%20UNI2%20and%20Qwen3%20backbones%20that%20treats%20structured%20report%20prediction%20as%20its%20primary%20training%20objective.%20Three%20trainable%20modules%20totalling%2015M%20parameters%20address%20complementary%20aspects%20of%20the%20problem%3A%20a%20Hierarchical%20Patch%20Aggregator%20%28HiPA%29%20for%20multi-image%20visual%20encoding%2C%20Hierarchical%20Contrastive%20Learning%20%28HiCL%29%20for%20cross-modal%20alignment%20via%20optimal%20transport%2C%20and%20Slot-based%20Masked%20Diagnosis%20Prediction%20%28Slot-MDP%29%20for%20structured%20diagnosis%20generation.%20Trained%20on%20749K%20real-world%20Chinese%20pathology%20cases%20from%20three%20hospitals%2C%20HiPath%20achieves%2068.9%25%20strict%20and%2074.7%25%20clinically%20acceptable%20accuracy%20with%20a%2097.3%25%20safety%20rate%2C%20outperforming%20all%20baselines%20under%20the%20same%20frozen%20backbone.%20Cross-hospital%20evaluation%20confirms%20generalisation%20with%20only%20a%203.4pp%20drop%20in%20strict%20accuracy%20while%20maintaining%2097.1%25%20safety.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19957v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiPath%253A%2520Hierarchical%2520Vision-Language%2520Alignment%2520for%2520Structured%2520Pathology%2520Report%2520Prediction%26entry.906535625%3DRuicheng%2520Yuan%2520and%2520Zhenxuan%2520Zhang%2520and%2520Anbang%2520Wang%2520and%2520Liwei%2520Hu%2520and%2520Xiangqian%2520Hua%2520and%2520Yaya%2520Peng%2520and%2520Jiawei%2520Luo%2520and%2520Guang%2520Yang%26entry.1292438233%3DPathology%2520reports%2520are%2520structured%252C%2520multi-granular%2520documents%2520encoding%2520diagnostic%2520conclusions%252C%2520histological%2520grades%252C%2520and%2520ancillary%2520test%2520results%2520across%2520one%2520or%2520more%2520anatomical%2520sites%253B%2520yet%2520existing%2520pathology%2520vision-language%2520models%2520%2528VLMs%2529%2520reduce%2520this%2520output%2520to%2520a%2520flat%2520label%2520or%2520free-form%2520text.%2520We%2520present%2520HiPath%252C%2520a%2520lightweight%2520VLM%2520framework%2520built%2520on%2520frozen%2520UNI2%2520and%2520Qwen3%2520backbones%2520that%2520treats%2520structured%2520report%2520prediction%2520as%2520its%2520primary%2520training%2520objective.%2520Three%2520trainable%2520modules%2520totalling%252015M%2520parameters%2520address%2520complementary%2520aspects%2520of%2520the%2520problem%253A%2520a%2520Hierarchical%2520Patch%2520Aggregator%2520%2528HiPA%2529%2520for%2520multi-image%2520visual%2520encoding%252C%2520Hierarchical%2520Contrastive%2520Learning%2520%2528HiCL%2529%2520for%2520cross-modal%2520alignment%2520via%2520optimal%2520transport%252C%2520and%2520Slot-based%2520Masked%2520Diagnosis%2520Prediction%2520%2528Slot-MDP%2529%2520for%2520structured%2520diagnosis%2520generation.%2520Trained%2520on%2520749K%2520real-world%2520Chinese%2520pathology%2520cases%2520from%2520three%2520hospitals%252C%2520HiPath%2520achieves%252068.9%2525%2520strict%2520and%252074.7%2525%2520clinically%2520acceptable%2520accuracy%2520with%2520a%252097.3%2525%2520safety%2520rate%252C%2520outperforming%2520all%2520baselines%2520under%2520the%2520same%2520frozen%2520backbone.%2520Cross-hospital%2520evaluation%2520confirms%2520generalisation%2520with%2520only%2520a%25203.4pp%2520drop%2520in%2520strict%2520accuracy%2520while%2520maintaining%252097.1%2525%2520safety.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19957v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HiPath%3A%20Hierarchical%20Vision-Language%20Alignment%20for%20Structured%20Pathology%20Report%20Prediction&entry.906535625=Ruicheng%20Yuan%20and%20Zhenxuan%20Zhang%20and%20Anbang%20Wang%20and%20Liwei%20Hu%20and%20Xiangqian%20Hua%20and%20Yaya%20Peng%20and%20Jiawei%20Luo%20and%20Guang%20Yang&entry.1292438233=Pathology%20reports%20are%20structured%2C%20multi-granular%20documents%20encoding%20diagnostic%20conclusions%2C%20histological%20grades%2C%20and%20ancillary%20test%20results%20across%20one%20or%20more%20anatomical%20sites%3B%20yet%20existing%20pathology%20vision-language%20models%20%28VLMs%29%20reduce%20this%20output%20to%20a%20flat%20label%20or%20free-form%20text.%20We%20present%20HiPath%2C%20a%20lightweight%20VLM%20framework%20built%20on%20frozen%20UNI2%20and%20Qwen3%20backbones%20that%20treats%20structured%20report%20prediction%20as%20its%20primary%20training%20objective.%20Three%20trainable%20modules%20totalling%2015M%20parameters%20address%20complementary%20aspects%20of%20the%20problem%3A%20a%20Hierarchical%20Patch%20Aggregator%20%28HiPA%29%20for%20multi-image%20visual%20encoding%2C%20Hierarchical%20Contrastive%20Learning%20%28HiCL%29%20for%20cross-modal%20alignment%20via%20optimal%20transport%2C%20and%20Slot-based%20Masked%20Diagnosis%20Prediction%20%28Slot-MDP%29%20for%20structured%20diagnosis%20generation.%20Trained%20on%20749K%20real-world%20Chinese%20pathology%20cases%20from%20three%20hospitals {"title": "Continual Learning as Shared-Manifold Continuation Under Compatible Shift", "author": "Henry J. Kobs", "abstract": "Continual learning methods usually preserve old behavior by regularizing parameters, matching old outputs, or replaying previous examples. These strategies can reduce forgetting, but they do not directly specify how the latent representation should evolve. We study a narrower geometric alternative for the regime where old and new data should remain on the same latent support: continual learning as continuation of a shared manifold. We instantiate this view within Support-Preserving Manifold Assimilation (SPMA) and evaluate a geometry-preserving variant, SPMA-OG, that combines sparse replay, output distillation, relational geometry preservation, local smoothing, and chart-assignment regularization on old anchors. On representative compatible-shift CIFAR10 and Tiny-ImageNet runs, SPMA-OG improves over sparse replay baselines in old-task retention and representation-preservation metrics while remaining competitive on new-task accuracy. On a controlled synthetic atlas-manifold benchmark, it achieves near-perfect anchor-geometry preservation while also improving new-task accuracy over replay. These results provide evidence that geometry-aware anchor regularization is a useful inductive bias when continual learning should preserve a shared latent support rather than create a new one.", "link": "http://arxiv.org/abs/2603.20036v1", "date": "2026-03-20", "relevancy": 2.6124, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5457}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5161}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5057}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continual%20Learning%20as%20Shared-Manifold%20Continuation%20Under%20Compatible%20Shift&body=Title%3A%20Continual%20Learning%20as%20Shared-Manifold%20Continuation%20Under%20Compatible%20Shift%0AAuthor%3A%20Henry%20J.%20Kobs%0AAbstract%3A%20Continual%20learning%20methods%20usually%20preserve%20old%20behavior%20by%20regularizing%20parameters%2C%20matching%20old%20outputs%2C%20or%20replaying%20previous%20examples.%20These%20strategies%20can%20reduce%20forgetting%2C%20but%20they%20do%20not%20directly%20specify%20how%20the%20latent%20representation%20should%20evolve.%20We%20study%20a%20narrower%20geometric%20alternative%20for%20the%20regime%20where%20old%20and%20new%20data%20should%20remain%20on%20the%20same%20latent%20support%3A%20continual%20learning%20as%20continuation%20of%20a%20shared%20manifold.%20We%20instantiate%20this%20view%20within%20Support-Preserving%20Manifold%20Assimilation%20%28SPMA%29%20and%20evaluate%20a%20geometry-preserving%20variant%2C%20SPMA-OG%2C%20that%20combines%20sparse%20replay%2C%20output%20distillation%2C%20relational%20geometry%20preservation%2C%20local%20smoothing%2C%20and%20chart-assignment%20regularization%20on%20old%20anchors.%20On%20representative%20compatible-shift%20CIFAR10%20and%20Tiny-ImageNet%20runs%2C%20SPMA-OG%20improves%20over%20sparse%20replay%20baselines%20in%20old-task%20retention%20and%20representation-preservation%20metrics%20while%20remaining%20competitive%20on%20new-task%20accuracy.%20On%20a%20controlled%20synthetic%20atlas-manifold%20benchmark%2C%20it%20achieves%20near-perfect%20anchor-geometry%20preservation%20while%20also%20improving%20new-task%20accuracy%20over%20replay.%20These%20results%20provide%20evidence%20that%20geometry-aware%20anchor%20regularization%20is%20a%20useful%20inductive%20bias%20when%20continual%20learning%20should%20preserve%20a%20shared%20latent%20support%20rather%20than%20create%20a%20new%20one.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20036v1%0AForm% .%2520These%2520results%2520provide%2520evidence%2520that%2520geometry-aware%2520anchor%2520regularization%2520is%2520a%2520useful%2520inductive%2520bias%2520when%2520continual%2520learning%2520should%2520preserve%2520a%2520shared%2520latent%2520support%2520rather%2520than%2520create%2520a%2520new%2520one.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20036v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Continual%20Learning%20as%20Shared-Manifold%20Continuation%20Under%20Compatible%20Shift&entry.906535625=Henry%20J.%20Kobs&entry.1292438233=Continual%20learning%20methods%20usually%20preserve%20old%20behavior%20by%20regularizing%20parameters%2C%20matching%20old%20outputs%2C%20or%20replaying%20previous%20examples.%20These%20strategies%20can%20reduce%20forgetting%2C%20but%20they%20do%20not%20directly%20specify%20how%20the%20latent%20representation%20should%20evolve.%20We%20study%20a%20narrower%20geometric%20alternative%20for%20the%20regime%20where%20old%20and%20new%20data%20should%20remain%20on%20the%20same%20latent%20support%3A%20continual%20learning%20as%20continuation%20of%20a%20shared%20manifold.%20We%20instantiate%20this%20view%20within%20Support-Preserving%20Manifold%20Assimilation%20%28SPMA%29%20and%20evaluate%20a%20geometry-preserving%20variant%2C%20SPMA-OG%2C%20that%20combines%20sparse%20replay%2C%20output%20distillation%2C%20relational%20geometry%20preservation%2C%20local%20smoothing%2C%20and%20chart-assignment%20regularization%20on%20old%20anchors.%20On%20representative%20compatible-shift%20CIFAR10%20and%20Tiny-ImageNet%20runs%2C%20SPMA-OG%20improves%20over%20sparse%20replay%20baselines%20in%20old-task%20retention%20and%20representation-preservation%20metrics%20while%20remaining%20competitive%20on%20new-task%20accuracy.%20On%20a%20controlled%20synthetic%20atlas-manifold%20benchmark%2C%20it%20achieves%20near-perfect%20anchor-geometry%20preservation%20while%20also%20improving%20new-task%20accuracy%20over%20replay.%20These%20results%20provide%20evidence%20that%20geometry-aware%20anchor%20regularization%20is%20a%20useful%20inductive%20bias%20when%20continual%20learning%20should%20preserve%20a%20shared%20latent%20support%20rather%20than%20create%20a%20new%20one.&entry.1838667208=http%3A//arxiv.org/abs/2603.20036v1&entry.124074799=Read"},
{"title": "Learning Like Humans: Analogical Concept Learning for Generalized Category Discovery", "author": "Jizhou Han and Chenhao Ding and Yuhang He and Qiang Wang and Shaokun Wang and SongLin Dong and Yihong Gong", "abstract": "Generalized Category Discovery (GCD) seeks to uncover novel categories in unlabeled data while preserving recognition of known categories, yet prevailing visual-only pipelines and the loose coupling between supervised learning and discovery often yield brittle boundaries on fine-grained, look-alike categories. We introduce the Analogical Textual Concept Generator (ATCG), a plug-and-play module that analogizes from labeled knowledge to new observations, forming textual concepts for unlabeled samples. Fusing these analogical textual concepts with visual features turns discovery into a visual-textual reasoning process, transferring prior knowledge to novel data and sharpening category separation. ATCG attaches to both parametric and clustering style GCD pipelines and requires no changes to their overall design. Across six benchmarks, ATCG consistently improves overall, known-class, and novel-class performance, with the largest gains on fine-grained data. Our code is available at: https://github.com/zhou-9527/AnaLogical-GCD.", "link": "http://arxiv.org/abs/2603.19918v1", "date": "2026-03-20", "relevancy": 2.6062, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5255}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5217}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5165}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Like%20Humans%3A%20Analogical%20Concept%20Learning%20for%20Generalized%20Category%20Discovery&body=Title%3A%20Learning%20Like%20Humans%3A%20Analogical%20Concept%20Learning%20for%20Generalized%20Category%20Discovery%0AAuthor%3A%20Jizhou%20Han%20and%20Chenhao%20Ding%20and%20Yuhang%20He%20and%20Qiang%20Wang%20and%20Shaokun%20Wang%20and%20SongLin%20Dong%20and%20Yihong%20Gong%0AAbstract%3A%20Generalized%20Category%20Discovery%20%28GCD%29%20seeks%20to%20uncover%20novel%20categories%20in%20unlabeled%20data%20while%20preserving%20recognition%20of%20known%20categories%2C%20yet%20prevailing%20visual-only%20pipelines%20and%20the%20loose%20coupling%20between%20supervised%20learning%20and%20discovery%20often%20yield%20brittle%20boundaries%20on%20fine-grained%2C%20look-alike%20categories.%20We%20introduce%20the%20Analogical%20Textual%20Concept%20Generator%20%28ATCG%29%2C%20a%20plug-and-play%20module%20that%20analogizes%20from%20labeled%20knowledge%20to%20new%20observations%2C%20forming%20textual%20concepts%20for%20unlabeled%20samples.%20Fusing%20these%20analogical%20textual%20concepts%20with%20visual%20features%20turns%20discovery%20into%20a%20visual-textual%20reasoning%20process%2C%20transferring%20prior%20knowledge%20to%20novel%20data%20and%20sharpening%20category%20separation.%20ATCG%20attaches%20to%20both%20parametric%20and%20clustering%20style%20GCD%20pipelines%20and%20requires%20no%20changes%20to%20their%20overall%20design.%20Across%20six%20benchmarks%2C%20ATCG%20consistently%20improves%20overall%2C%20known-class%2C%20and%20novel-class%20performance%2C%20with%20the%20largest%20gains%20on%20fine-grained%20data.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/zhou-9527/AnaLogical-GCD.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19918v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Like%2520Humans%253A%2520Analogical%2520Concept%2520Learning%2520for%2520Generalized%2520Category%2520Discovery%26entry.906535625%3DJizhou%2520Han%2520and%2520Chenhao%2520Ding%2520and%2520Yuhang%2520He%2520and%2520Qiang%2520Wang%2520a {"title": "Enhancing Hyperspace Analogue to Language (HAL) Representations via Attention-Based Pooling for Text Classification", "author": "Ali Sakour and Zoalfekar Sakour", "abstract": "The Hyperspace Analogue to Language (HAL) model relies on global word co-occurrence matrices to construct distributional semantic representations. While these representations capture lexical relationships effectively, aggregating them into sentence-level embeddings via standard mean pooling often results in information loss. Mean pooling assigns equal weight to all tokens, thereby diluting the impact of contextually salient words with uninformative structural tokens. In this paper, we address this limitation by integrating a learnable, temperature-scaled additive attention mechanism into the HAL representation pipeline. To mitigate the sparsity and high dimensionality of the raw co-occurrence matrices, we apply Truncated Singular Value Decomposition (SVD) to project the vectors into a dense latent space prior to the attention layer. We evaluate the proposed architecture on the IMDB sentiment analysis dataset. Empirical results demonstrate that the attention-based pooling approach achieves a test accuracy of 82.38%, yielding an absolute improvement of 6.74 percentage points over the traditional mean pooling baseline (75.64%). Furthermore, qualitative analysis of the attention weights indicates that the mechanism successfully suppresses stop-words and selectively attends to sentiment-bearing tokens, improving both classification performance and model interpretability.", "link": "http://arxiv.org/abs/2603.20149v1", "date": "2026-03-20", "relevancy": 2.5885, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5449}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5087}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4995}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Hyperspace%20Analogue%20to%20Language%20%28HAL%29%20Representations%20via%20Attention-Based%20Pooling%20for%20Text%20Classification&body=Title%3A%20Enhancing%20Hyperspace%20Analogue%20to%20Language%20%28HAL%29%20Representations%20via%20Attention-Based%20Pooling%20for%20Text%20Classification%0AAuthor%3A%20Ali%20Sakour%20and%20Zoalfekar%20Sakour%0AAbstract%3A%20The%20Hyperspace%20Analogue%20to%20Language%20%28HAL%29%20model%20relies%20on%20global%20word%20co-occurrence%20matrices%20to%20construct%20distributional%20semantic%20representations.%20While%20these%20representations%20capture%20lexical%20relationships%20effectively%2C%20aggregating%20them%20into%20sentence-level%20embeddings%20via%20standard%20mean%20pooling%20often%20results%20in%20information%20loss.%20Mean%20pooling%20assigns%20equal%20weight%20to%20all%20tokens%2C%20thereby%20diluting%20the%20impact%20of%20contextually%20salient%20words%20with%20uninformative%20structural%20tokens.%20In%20this%20paper%2C%20we%20address%20this%20limitation%20by%20integrating%20a%20learnable%2C%20temperature-scaled%20additive%20attention%20mechanism%20into%20the%20HAL%20representation%20pipeline.%20To%20mitigate%20the%20sparsity%20and%20high%20dimensionality%20of%20the%20raw%20co-occurrence%20matrices%2C%20we%20apply%20Truncated%20Singular%20Value%20Decomposition%20%28SVD%29%20to%20project%20the%20vectors%20into%20a%20dense%20latent%20space%20prior%20to%20the%20attention%20layer.%20We%20evaluate%20the%20proposed%20architecture%20on%20the%20IMDB%20sentiment%20analysis%20dataset.%20Empirical%20results%20demonstrate%20that%20the%20attention-based%20pooling%20approach%20achieves%20a%20test%20accuracy%20of%2082.38%25%2C%20yielding%20an%20absolute%20improvement%20of%206.74%20percentage%20points%20over%20the%20traditional%20mean%20pooling%20baseline%20%2875.64%25%29.%20Furthermore%2C%20qualitative%20analysis%20of%20the%20attention%20weights%20indicates%20that%20the%20mechanism%20successfully%20suppresses%20stop-words%20and%20selectively%20attends%20to%20sentiment-bearing%20tokens%2C%20improving%20both%20classification%20performance%20and%20model%20interpretability.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20149v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Hyperspace%2520Analogue%2520to%2520Language%2520%2528HAL%2529%2520Representations%2520via%2520Attention-Based%2520Pooling%2520for%2520Text%2520Classification%26entry.906535625%3DAli%2520Sakour%2520and%2520Zoalfekar%2520Sakour%26entry.1292438233%3DThe%2520Hyperspace%2520Analogue%2520to%2520Language%2520%2528HAL%2529%2520model%2520relies%2520on%2520global%2520word%2520co-occurrence%2520matrices%2520to%2520construct%2520distributional%2520semantic%2520representations.%2520While%2520these%2520representations%2520capture%2520lexical%2520relationships%2520effectively%252C%2520aggregating%2520them%2520into%2520sentence-level%2520embeddings%2520via%2520standard%2520mean%2520pooling%2520often%2520results%2520in%2520information%2520loss.%2520Mean%2520pooling%2520assigns%2520equal%2520weight%2520to%2520all%2520tokens%252C%2520thereby%2520diluting%2520the%2520impact%2520of%2520contextually%2520salient%2520words%2520with%2520uninformative%2520structural%2520tokens.%2520In%2520this%2520paper%252C%2520we%2520address%2520this%2520limitation%2520by%2520integrating%2520a%2520learnable%252C%2520temperature-scaled%2520additive%2520attention%2520mechanism%2520into%2520the%2520HAL%2520representation%2520pipeline.%2520To%2520mitigate%2520the%2520sparsity%2520and%2520high%2520dimensionality%2520of%2520the%2520raw%2520co-occurrence%2520matrices%252C%2520we%2520apply%2520Truncated%2520Singular%2520Value%2520Decomposition%2520%2528SVD%2529%2520to%2520project%2520the%2520vectors%2520into%2520a%2520dense%2520latent%2520space%2520prior%2520to%2520the%2520attention%2520layer.%2520We%2520evaluate%2520the%2520proposed%2520architecture%2520on%2520the%2520IMDB%2520sentiment%2520analysis%2520dataset.%2520Empirical%2520results%2520demonstrate%2520that%2520the%2520attention-based%2520pooling%2520approach%2520achieves%2520a%2520test%2520accuracy%2520of%252082.38%2525%252C%2520yielding%2520an%2520absolute%2520improvement%2520of%25206.74%2520percentage%2520points%2520over%2520the%2520traditional%2520mean%2520pooling%2520baseline%2520%252875.64%2525%2529.%2520Furthermore%252C%2520qualitative%2520analysis%2520of%2520the%2520attention%2520weights%2520indicates%2520that%2520the%2520mechanism%2520successfully%2520suppresses%2520stop-words%2520and%2520selectively%2520attends%2520to%2520sentiment-bearing%2520tokens%252C%2520improving%2520both%2520classification%2520performance%2520and%2520model%2520interpretability.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20149v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Enhancing%20Hyperspace%20Analogue%20to%20Language%20%28HAL%29%20Representations%20via%20Attention-Based%20Pooling%20for%20Text%20Classification&entry.906535625=Ali%20Sakour%20and%20Zoalfekar%20Sakour&entry.1292438233=The%20Hyperspace%20Analogue%20to%20Language%20%28HAL%29%20model%20relies%20on%20global%20word%20co-occurrence%20matrices%20to%20construct%20distributional%20semantic%20representations.%20While%20these%20representations%20capture%20lexical%20relationships%20effectively%2C%20aggregating%20them%20into%20sentence-level%20embeddings%20via%20standard%20mean%20pooling%20often%20results%20in%20information%20loss.%20Mean%20pooling%20assigns%20equal%20weight%20to%20all%20tokens%2C%20thereby%20diluting%20the%20impact%20of%20contextually%20salient%20words%20with%20uninformative%2 {"title": "Hyper-Connections for Adaptive Multi-Modal MRI Brain Tumor Segmentation", "author": "Lokendra Kumar and Shubham Aggarwal", "abstract": "We present the first study of Hyper-Connections (HC) for volumetric multi-modal brain tumor segmentation, integrating them as a drop-in replacement for fixed residual connections across five architectures: nnU-Net, SwinUNETR, VT-UNet, U-Net, and U-Netpp. Dynamic HC consistently improves all 3D models on the BraTS 2021 dataset, yielding up to +1.03 percent mean Dice gain with negligible parameter overhead. Gains are most pronounced in the Enhancing Tumor sub-region, reflecting improved fine-grained boundary delineation. Modality ablation further reveals that HC-equipped models develop sharper sensitivity toward clinically dominant sequences, specifically T1ce for Tumor Core and Enhancing Tumor, and FLAIR for Whole Tumor, a behavior absent in fixed-connection baselines and consistent across all architectures. In 2D settings, improvements are smaller and configuration-sensitive, suggesting that volumetric spatial context amplifies the benefit of adaptive aggregation. These results establish HC as a simple, efficient, and broadly applicable mechanism for multi-modal feature fusion in medical image segmentation.", "link": "http://arxiv.org/abs/2603.19844v1", "date": "2026-03-20", "relevancy": 2.5786, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5463}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5065}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4943}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hyper-Connections%20for%20Adaptive%20Multi-Modal%20MRI%20Brain%20Tumor%20Segmentation&body=Title%3A%20Hyper-Connections%20for%20Adaptive%20Multi-Modal%20MRI%20Brain%20Tumor%20Segmentation%0AAuthor%3A%20Lokendra%20Kumar%20and%20Shubham%20Aggarwal%0AAbstract%3A%20We%20present%20the%20first%20study%20of%20Hyper-Connections%20%28HC%29%20for%20volumetric%20multi-modal%20brain%20tumor%20segmentation%2C%20integrating%20them%20as%20a%20drop-in%20replacement%20for%20fixed%20residual%20connections%20across%20five%20architectures%3A%20nnU-Net%2C%20SwinUNETR%2C%20VT-UNet%2C%20U-Net%2C%20and%20U-Netpp.%20Dynamic%20HC%20consistently%20improves%20all%203D%20models%20on%20the%20BraTS%202021%20dataset%2C%20yielding%20up%20to%20%2B1.03%20percent%20mean%20Dice%20gain%20with%20negligible%20parameter%20overhead.%20Gains%20are%20most%20pronounced%20in%20the%20Enhancing%20Tumor%20sub-region%2C%20reflecting%20improved%20fine-grained%20boundary%20delineation.%20Modality%20ablation%20further%20reveals%20that%20HC-equipped%20models%20develop%20sharper%20sensitivity%20toward%20clinically%20dominant%20sequences%2C%20specifically%20T1ce%20for%20Tumor%20Core%20and%20Enhancing%20Tumor%2C%20and%20FLAIR%20for%20Whole%20Tumor%2C%20a%20behavior%20absent%20in%20fixed-connection%20baselines%20and%20consistent%20across%20all%20architectures.%20In%202D%20settings%2C%20improvements%20are%20smaller%20and%20configuration-sensitive%2C%20suggesting%20that%20volumetric%20spatial%20context%20amplifies%20the%20benefit%20of%20adaptive%20aggregation.%20These%20results%20establish%20HC%20as%20a%20simple%2C%20efficient%2C%20and%20broadly%20applicable%20mechanism%20for%20multi-modal%20feature%20fusion%20in%20medical%20image%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19844v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyper-Connections%2520for%2520Adaptive%2520Multi-Modal%2520MRI%2520Brain%2520Tumor%2520Segmentation%26entry.906535625%3DLokendra%2520Kumar%2520and%2520Shubham%2520Aggarwal%26entry.1292438233%3DWe -Connections%20for%20Adaptive%20Multi-Modal%20MRI%20Brain%20Tumor%20Segmentation&entry.906535625=Lokendra%20Kumar%20and%20Shubham%20Aggarwal&entry.1292438233=We%20present%20the%20first%20study%20of%20Hyper-Connections%20%28HC%29%20for%20volumetric%20multi-modal%20brain%20tumor%20segmentation%2C%20integrating%20them%20as%20a%20drop-in%20replacement%20for%20fixed%20residual%20connections%20across%20five%20architectures%3A%20nnU-Net%2C%20SwinUNETR%2C%20VT-UNet%2C%20U-Net%2C%20and%20U-Netpp.%20Dynamic%20HC%20consistently%20improves%20all%203D%20models%20on%20the%20BraTS%202021%20dataset%2C%20yielding%20up%20to%20%2B1.03%20percent%20mean%20Dice%20gain%20with%20negligible%20parameter%20overhead.%20Gains%20are%20most%20pronounced%20in%20the%20Enhancing%20Tumor%20sub-region%2C%20reflecting%20improved%20fine-grained%20boundary%20delineation.%20Modality%20ablation%20further%20reveals%20that%20HC-equipped%20models%20develop%20sharper%20sensitivity%20toward%20clinically%20dominant%20sequences%2C%20specifically%20T1ce%20for%20Tumor%20Core%20and%20Enhancing%20Tumor%2C%20and%20FLAIR%20for%20Whole%20Tumor%2C%20a%20behavior%20absent%20in%20fixed-connection%20baselines%20and%20consistent%20across%20all%20architectures.%20In%202D%20settings%2C%20improvements%20are%20smaller%20and%20configuration-sensitive%2C%20suggesting%20that%20volumetric%20spatial%20context%20amplifies%20the%20benefit%20of%20adaptive%20aggregation.%20These%20results%20establish%20HC%20as%20a%20simple%2C%20efficient%2C%20and%20broadly%20applicable%20mechanism%20for%20multi-modal%20feature%20fusion%20in%20medical%20image%20segmentation.&entry.1838667208=http%3A//arxiv.org/abs/2603.19844v1&entry.124074799=Read"},
{"title": "Discovering Intersectional Bias via Directional Alignment in Face Recognition Embeddings", "author": "Ignacio Serna", "abstract": "Modern face recognition models embed identities on a unit hypersphere, where identity variation forms tight clusters. Conversely, shared semantic attributes can often be effectively approximated as linear directions in the latent space. Existing bias evaluation methods rely on predefined attribute labels, synthetic counterfactuals, or proximity-based clustering, all of which fail to capture intersectional subpopulations that emerge along latent directions. We introduce LatentAlign, an attribute-free algorithm that discovers semantically coherent and interpretable subpopulations by iteratively aligning embeddings along dominant latent directions. Unlike distance-based clustering, LatentAlign exploits the geometry of hyperspherical embeddings to isolate directional structures shared across identities, allowing for the interpretable discovery of attributes. Across four state-of-the-art recognition backbones (ArcFace, CosFace, ElasticFace, PartialFC) and two benchmarks (RFW, CelebA), LatentAlign consistently yields more semantically coherent groups than $k$-means, spherical $k$-means, nearest-neighbor search, and DBSCAN. Crucially, the discovered subpopulations expose severe intersectional vulnerabilities, with False Match Rates up to 4x higher than groups defined by explicit annotations. Our results show that by treating semantic attributes as directional features rather than spatial clusters, we can effectively isolate intersectional subpopulations and expose hidden biases that standard audits miss.", "link": "http://arxiv.org/abs/2510.15520v2", "date": "2026-03-20", "relevancy": 2.5716, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5203}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5133}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5094}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Discovering%20Intersectional%20Bias%20via%20Directional%20Alignment%20in%20Face%20Recognition%20Embeddings&body=Title%3A%20Discovering%20Intersectional%20Bias%20via%20Directional%20Alignment%20in%20Face%20Recognition%20Embeddings%0AAuthor%3A%20Ignacio%20Serna%0AAbstract%3A%20Modern%20face%20recognition%20models%20embed%20identities%20on%20a%20unit%20hypersphere%2C%20where%20identity%20variation%20forms%20tight%20clusters.%20Conversely%2C%20shared%20semantic%20attributes%20can%20often%20be%20effectively%20approximated%20as%20linear%20directions%20in%20the%20latent%20space.%20Existing%20bias%20evaluation%20methods%20rely%20on%20predefined%20attribute%20labels%2C%20synthetic%20counterfactuals%2C%20or%20proximity-based%20clustering%2C%20all%20of%20which%20fail%20to%20capture%20intersectional%20subpopulations%20that%20emerge%20along%20latent%20directions.%20We%20introduce%20LatentAlign%2C%20an%20attribute-free%20algorithm%20that%20discovers%20semantically%20coherent%20and%20interpretable%20subpopulations%20by%20iteratively%20aligning%20embeddings%20along%20dominant%20latent%20directions.%20Unlike%20distance-based%20clustering%2C%20LatentAlign%20exploits%20the%20geometry%20of%20hyperspherical%20embeddings%20to%20isolate%20directional%20structures%20shared%20across%20identities%2C%20allowing%20for%20the%20interpretable%20discovery%20of%20attributes.%20Across%20four%20state-of-the-art%20recognition%20backbones%20%28ArcFace%2C%20CosFace%2C%20ElasticFace%2C%20PartialFC%29%20and%20two%20benchmarks%20%28RFW%2C%20CelebA%29%2C%20LatentAlign%20consistently%20yields%20more%20semantically%20coherent%20groups%20than%20%24k%24-means%2C%20spherical%20%24k%24-means%2C%20nearest-neighbor%20search%2C%20and%20DBSCAN.%20Crucially%2C%20the%20discovered%20subpopulations%20expose%20severe%20intersectional%20vulnerabilities%2C%20with%20False%20Match%20Rates%20up%20to%204x%20higher%20than%20groups%20defined%20by%20explicit%20annotations.%20Our%20results%20show%20that%20by%20treating%20semantic%20attributes%20as%20directional%20features%20rather%20than%20spatial%20clusters%2C%20we%20can%20effectively%20isolate%20intersectional%20subpopulations%20and%20expose%20hidden%20biases%20that%20standard%20audits%20miss.%0ALink%3A%20http%3A//arxiv.org/abs/2510.15520v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiscovering%2520Intersectional%2520Bias%2520via%2520Directional%2520Alignment%2520in%2520Face%2520Recognition%2520Embeddings%26entry.906535625%3DIgnacio%2520Serna%26entry.1292438233%3DModern%2520face%2520recognition%2520models%2520embed%2520identities%2520on%2520a%2520unit%2520hypersphere%252C%2520where%2520identity%2520variation%2520forms%2520tight%2520clusters.%2520Conversely%252C%2520shared%2520semantic%2520attributes%2520can%2520often%2520be%2520effectively%2520approximated%2520as%2520linear%2520directions%2520in%2520the%2520latent%2520space.%2520Existing%2520bias%2520evaluation%2520methods%2520rely%2520on%2520predefined%2520attribute%2520labels%252C%2520synthetic%2520counterfactuals%252C%2520or%2520proximity-based%2520clustering%252C%2520all%2520of%2520which%2520fail%2520to%2520capture%2520intersectional%2520subpopulations%2520that%2520emerge%2520along%2520latent%2520directions.%2520We%2520introduce%2520LatentAlign%252C%2520an%2520attribute-free%2520algorithm%2520that%2520discovers%2520semantically%2520coherent%2520and%2520interpretable%2520subpopulations%2520by%2520iteratively%2520aligning%2520embeddings%2520along%2520dominant%2520 {"title": "Rep2Text: Decoding Full Text from a Single LLM Token Representation", "author": "Haiyan Zhao and Zirui He and Yiming Tang and Fan Yang and Ali Payani and Dianbo Liu and Mengnan Du", "abstract": "Large language models (LLMs) have achieved remarkable progress across diverse tasks, yet their internal mechanisms remain largely opaque. In this work, we investigate a fundamental question: to what extent can the original input text be recovered from a single last-token representation in an LLM? To this end, we propose Rep2Text, a novel framework for decoding text from last-token representations. Rep2Text employs a trainable adapter that maps a target model's last-token representation into the token embedding space of a decoding language model, which then autoregressively reconstructs the input text. Experiments across various model combinations (Llama-3.1-8B, Gemma-7B, Mistral-7B-v0.1, Llama-3.2-3B, etc.) show that, on average, roughly half of the tokens in 16-token sequences can be recovered from this compressed representation while preserving strong semantic coherence. Further analysis reveals a clear information bottleneck effect: as sequence length increases, token-level recovery declines, while semantic information remains relatively well preserved. We also find that scaling effects are less pronounced in inversion tasks. Finally, our framework demonstrates robust generalization to out-of-distribution clinical data.", "link": "http://arxiv.org/abs/2511.06571v2", "date": "2026-03-20", "relevancy": 2.558, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5256}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5046}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5046}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rep2Text%3A%20Decoding%20Full%20Text%20from%20a%20Single%20LLM%20Token%20Representation&body=Title%3A%20Rep2Text%3A%20Decoding%20Full%20Text%20from%20a%20Single%20LLM%20Token%20Representation%0AAuthor%3A%20Haiyan%20Zhao%20and%20Zirui%20He%20and%20Yiming%20Tang%20and%20Fan%20Yang%20and%20Ali%20Payani%20and%20Dianbo%20Liu%20and%20Mengnan%20Du%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20have%20achieved%20remarkable%20progress%20across%20diverse%20tasks%2C%20yet%20their%20internal%20mechanisms%20remain%20largely%20opaque.%20In%20this%20work%2C%20we%20investigate%20a%20fundamental%20question%3A%20to%20what%20extent%20can%20the%20original%20input%20text%20be%20recovered%20from%20a%20single%20last-token%20representation%20in%20an%20LLM%3F%20To%20this%20end%2C%20we%20propose%20Rep2Text%2C%20a%20novel%20framework%20for%20decoding%20text%20from%20last-token%20representations.%20Rep2Text%20employs%20a%20trainable%20adapter%20that%20maps%20a%20target%20model%27s%20last-token%20representation%20into%20the%20token%20embedding%20space%20of%20a%20decoding%20language%20model%2C%20which%20then%20autoregressively%20reconstructs%20the%20input%20text.%20Experiments%20across%20various%20model%20combinations%20%28Llama-3.1-8B%2C%20Gemma-7B%2C%20Mistral-7B-v0.1%2C%20Llama-3.2-3B%2C%20etc.%29%20show%20that%2C%20on%20average%2C%20roughly%20half%20of%20the%20tokens%20in%2016-token%20sequences%20can%20be%20recovered%20from%20this%20compressed%20representation%20while%20preserving%20strong%20semantic%20coherence.%20Further%20analysis%20reveals%20a%20clear%20information%20bottleneck%20effect%3A%20as%20sequence%20length%20increases%2C%20token-level%20recovery%20declines%2C%20while%20semantic%20information%20remains%20relatively%20well%20preserved.%20We%20also%20find%20that%20scaling%20effects%20are%20less%20pronounced%20in%20inversion%20tasks.%20Finally%2C%20our%20framework%20demonstrates%20robust

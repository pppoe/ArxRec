able%20relevance.%20Its%20effectiveness%20is%20demonstrated%20on%20multiple%20simulated%20and%20real-world%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2603.19840v1&entry.124074799=Read"},
{"title": "Gesture2Speech: How Far Can Hand Movements Shape Expressive Speech?", "author": "Lokesh Kumar and Nirmesh Shah and Ashishkumar P. Gudmalwar and Pankaj Wasnik", "abstract": "Human communication seamlessly integrates speech and bodily motion, where hand gestures naturally complement vocal prosody to express intent, emotion, and emphasis. While recent text-to-speech (TTS) systems have begun incorporating multimodal cues such as facial expressions or lip movements, the role of hand gestures in shaping prosody remains largely underexplored. We propose a novel multimodal TTS framework, Gesture2Speech, that leverages visual gesture cues to modulate prosody in synthesized speech. Motivated by the observation that confident and expressive speakers coordinate gestures with vocal prosody, we introduce a multimodal Mixture-of-Experts (MoE) architecture that dynamically fuses linguistic content and gesture features within a dedicated style extraction module. The fused representation conditions an LLM-based speech decoder, enabling prosodic modulation that is temporally aligned with hand movements. We further design a gesture-speech alignment loss that explicitly models their temporal correspondence to ensure fine-grained synchrony between gestures and prosodic contours. Evaluations on the PATS dataset show that Gesture2Speech outperforms state-of-the-art baselines in both speech naturalness and gesture-speech synchrony. To the best of our knowledge, this is the first work to utilize hand gesture cues for prosody control in neural speech synthesis. Demo samples are available at https://research.sri-media-analysis.com/aaai26-beeu-gesture2speech/", "link": "http://arxiv.org/abs/2603.19831v1", "date": "2026-03-20", "relevancy": 2.0396, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5269}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5071}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4941}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gesture2Speech%3A%20How%20Far%20Can%20Hand%20Movements%20Shape%20Expressive%20Speech%3F&body=Title%3A%20Gesture2Speech%3A%20How%20Far%20Can%20Hand%20Movements%20Shape%20Expressive%20Speech%3F%0AAuthor%3A%20Lokesh%20Kumar%20and%20Nirmesh%20Shah%20and%20Ashishkumar%20P.%20Gudmalwar%20and%20Pankaj%20Wasnik%0AAbstract%3A%20Human%20communication%20seamlessly%20integrates%20speech%20and%20bodily%20motion%2C%20where%20hand%20gestures%20naturally%20complement%20vocal%20prosody%20to%20express%20intent%2C%20emotion%2C%20and%20emphasis.%20While%20recent%20text-to-speech%20%28TTS%29%20systems%20have%20begun%20incorporating%20multimodal%20cues%20such%20as%20facial%20expressions%20or%20lip%20movements%2C%20the%20role%20of%20hand%20gestures%20in%20shaping%20prosody%20remains%20largely%20underexplored.%20We%20propose%20a%20novel%20multimodal%20TTS%20framework%2C%20Gesture2Speech%2C%20that%20leverages%20visual%20gesture%20cues%20to%20modulate%20prosody%20in%20synthesized%20speech.%20Motivated%20by%20the%20observation%20that%20confident%20and%20expressive%20speakers%20coordinate%20gestures%20with%20vocal%20prosody%2C%20we%20introduce%20a%20multimodal%20Mixture-of-Experts%20%28MoE%29%20architecture%20that%20dynamically%20fuses%20linguistic%20content%20and%20gesture%20features%20within%20a%20dedicated%20style%20extraction%20module.%20The%20fused%20representation%20conditions%20an%20LLM-based%20speech%20decoder%2C%20enabling%20prosodic%20modulation%20that%20is%20temporally%20aligned%20with%20hand%20movements.%20We%20further%20design%20a%20gesture-speech%20alignment%20loss%20that%20explicitly%20models%20their%20temporal%20correspondence%20to%20ensure%20fine-grained%20synchrony%20between%20gestures%20and%20prosodic%20contours.%20Evaluations%20on%20the%20PATS%20dataset%20show%20that%20Gesture2Speech%20outperforms%20state-of-the-art%20baselines%20in%20both%20speech%20naturalness%20and%20gesture-speech%20synchrony.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20work%20to%20utilize%20hand%20gesture%20cues%20for%20prosody%20control%20in%20neural%20speech%20synthesis.%20Demo%20samples%20are%20available%20at%20https%3A//research.sri-media-analysis.com/aaai26-beeu-gesture2speech/%0ALink%3A%20http%3A//arxiv.org/abs/2603.19831v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGesture2Speech%253A%2520How%2520Far%2520Can%2520Hand%2520Movements%2520Shape%2520Expressive%2520Speech%253F%26entry.906535625%3DLokesh%2520Kumar%2520and%2520Nirmesh%2520Shah%2520and%2520Ashishkumar%2520P.%2520Gudmalwar%2520and%2520Pankaj%2520Wasnik%26entry.1292438233%3DHuman%2520communication%2520seamlessly%2520integrates%2520speech%2520and%2520bodily%2520motion%252C%2520where%2520hand%2520gestures%2520naturally%2520complement%2520vocal%2520prosody%2520to%2520express%2520intent%252C%2520emotion%252C%2520and%2520emphasis.%2520While%2520recent%2520text-to-speech%2520%2528TTS%2529%2520systems%2520have%2520begun%2520incorporating%2520multimodal%2520cues%2520such%2520as%2520facial%2520expressions%2520or%2520lip%2520movements%252C%2520the%2520role%2520of%2520hand%2520gestures%2520in%2520shaping%2520prosody%2520remains%2520largely%2520underexplored.%2520We%2520propose%2520a%2520novel%2520multimodal%2520TTS%2520framework%252C%2520Gesture2Speech%252C%2520that%2520leverages%2520visual%2520gesture%2520cues%2520to%2520modulate%2520prosody%2520in%2520synthesized%2520speech.%2520Motivated%2520by%2520the%2520observation%2520that%2520confident%2520and%2520expressive%2520speakers%2520coordinate%2520gestures%2520with%2520vocal%2520prosody%252C%2520we%2520introduce%2520a%2520multimodal%2520Mixture-of-Experts%2520%2528MoE%2529%2520archite {"title": "Modeling subgrid scale production rates on complex meshes using graph neural networks", "author": "Priyabrat Dash and Mathis Bode and Konduri Aditya", "abstract": "Large-eddy simulations (LES) require closures for filtered production rates because the resolved fields do not contain all correlations that govern chemical source terms. We develop a graph neural network (GNN) that predicts filtered species production rates on non-uniform meshes from inputs of filtered mass fractions and temperature. Direct numerical simulations of turbulent premixed hydrogen-methane jet flames with hydrogen fractions of 10%, 50%, and 80% provide the dataset. All fields are Favre filtered with the filter width matched to the operating mesh, and learning is performed on subdomain graphs constructed from mesh-point connectivity. A compact set of reactants, intermediates, and products is used, and their filtered production rates form the targets. The model is trained on 10% and 80% blends and evaluated on the unseen 50% blend to test cross-composition generalization. The GNN is compared against an unclosed reference that evaluates rates at the filtered state, and a convolutional neural network baseline that requires remeshing. Across in-distribution and out-of-distribution cases, the GNN yields lower errors and closer statistical agreement with the reference data. Furthermore, the model demonstrates robust generalization across varying filter widths without retraining, maintaining bounded errors at coarser spatial resolutions. A backward facing step configuration further confirms prediction efficacy on a practically relevant geometry. These results highlight the capability of GNNs as robust data-driven closure models for LES on complex meshes.", "link": "http://arxiv.org/abs/2603.19841v1", "date": "2026-03-20", "relevancy": 2.0301, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "si {"title": "The $\\mathbf{Y}$-Combinator for LLMs: Solving Long-Context Rot with $\u03bb$-Calculus", "author": "Amartya Roy and Rasul Tutunov and Xiaotong Ji and Matthieu Zimmer and Haitham Bou-Ammar", "abstract": "LLMs are increasingly used as general-purpose reasoners, but long inputs remain bottlenecked by a fixed context window. Recursive Language Models (RLMs) address this by externalising the prompt and recursively solving subproblems. Yet existing RLMs depend on an open-ended read-eval-print loop (REPL) in which the model generates arbitrary control code, making execution difficult to verify, predict, and analyse.\n  We introduce $\u03bb$-RLM, a framework for long-context reasoning that replaces free-form recursive code generation with a typed functional runtime grounded in $\u03bb$-calculus. It executes a compact library of pre-verified combinators and uses neural inference only on bounded leaf subproblems, turning recursive reasoning into a structured functional program with explicit control flow. We show that $\u03bb$-RLM admits formal guarantees absent from standard RLMs, including termination, closed-form cost bounds, controlled accuracy scaling with recursion depth, and an optimal partition rule under a simple cost model. Empirically, across four long-context reasoning tasks and nine base models, $\u03bb$-RLM outperforms standard RLM in 29 of 36 model-task comparisons, improves average accuracy by up to +21.9 points across model tiers, and reduces latency by up to 4.1x. These results show that typed symbolic control yields a more reliable and efficient foundation for long-context reasoning than open-ended recursive code generation. The complete implementation of $\u03bb$-RLM, is open-sourced for the community at: https://github.com/lambda-calculus-LLM/lambda-RLM.", "link": "http://arxiv.org/abs/2603.20105v1", "date": "2026-03-20", "relevancy": 1.7931, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", nt%20from%20standard%20RLMs%2C%20including%20termination%2C%20closed-form%20cost%20bounds%2C%20controlled%20accuracy%20scaling%20with%20recursion%20depth%2C%20and%20an%20optimal%20partition%20rule%20under%20a%20simple%20cost%20model.%20Empirically%2C%20across%20four%20long-context%20reasoning%20tasks%20and%20nine%20base%20models%2C%20%24%CE%BB%24-RLM%20outperforms%20standard%20RLM%20in%2029%20of%2036%20model-task%20comparisons%2C%20improves%20average%20accuracy%20by%20up%20to%20%2B21.9%20points%20across%20model%20tiers%2C%20and%20reduces%20latency%20by%20up%20to%204.1x.%20These%20results%20show%20that%20typed%20symbolic%20control%20yields%20a%20more%20reliable%20and%20efficient%20foundation%20for%20long-context%20reasoning%20than%20open-ended%20recursive%20code%20generation.%20The%20complete%20implementation%20of%20%24%CE%BB%24-RLM%2C%20is%20open-sourced%20for%20the%20community%20at%3A%20https%3A//github.com/lambda-calculus-LLM/lambda-RLM.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20105v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520%2524%255Cmathbf%257BY%257D%2524-Combinator%2520for%2520LLMs%253A%2520Solving%2520Long-Context%2520Rot%2520with%2520%2524%25CE%25BB%2524-Calculus%26entry.906535625%3DAmartya%2520Roy%2520and%2520Rasul%2520Tutunov%2520and%2520Xiaotong%2520Ji%2520and%2520Matthieu%2520Zimmer%2520and%2520Haitham%2520Bou-Ammar%26entry.1292438233%3DLLMs%2520are%2520increasingly%2520used%2520as%2520general-purpose%2520reasoners%252C%2520but%2520long%2520inputs%2520remain%2520bottlenecked%2520by%2520a%2520fixed%2520context%2520window.%2520Recursive%2520Language%2520Models%2520%2528RLMs%2529%2520address%2520this%2520by%2520externalising%2520the%2520prompt%2520and%2520recursively%2520solving%2520subproblems.%2520Yet%2520existing%2520RLMs%2520depend%2520on%2520an%2520open-ended%2520read-eval-print%2520loop%2520%2528REPL%2529%2520in%2520which%2520the%2520model%2520generate {"title": "Consistency-based Abductive Reasoning over Perceptual Errors of Multiple Pre-trained Models in Novel Environments", "author": "Mario Leiva and Noel Ngu and Joshua Shay Kricheli and Aditya Taparia and Ransalu Senanayake and Paulo Shakarian and Nathaniel Bastian and John Corcoran and Gerardo Simari", "abstract": "The deployment of pre-trained perception models in novel environments often leads to performance degradation due to distributional shifts. Although recent artificial intelligence approaches for metacognition use logical rules to characterize and filter model errors, improving precision often comes at the cost of reduced recall. This paper addresses the hypothesis that leveraging multiple pre-trained models can mitigate this recall reduction. We formulate the challenge of identifying and managing conflicting predictions from various models as a consistency-based abduction problem, building on the idea of abductive learning (ABL) but applying it to test-time instead of training. The input predictions and the learned error detection rules derived from each model are encoded in a logic program. We then seek an abductive explanation--a subset of model predictions--that maximizes prediction coverage while ensuring the rate of logical inconsistencies (derived from domain constraints) remains below a specified threshold. We propose two algorithms for this knowledge representation task: an exact method based on Integer Programming (IP) and an efficient Heuristic Search (HS). Through extensive experiments on a simulated aerial imagery dataset featuring controlled, complex distributional shifts, we demonstrate that our abduction-based framework outperforms individual models and standard ensemble baselines, achieving, for instance, average relative improvements of approximately 13.6\\% in F1-score and 16.6\\% in accuracy across 15 diverse test datasets when compared to the best individual model. Our results validate the use of consistency-based abduction as an effective mechanism to robustly integrate knowledge from multiple imperfect models in challenging, novel scenarios.", "link": "http://arxiv.org/abs/2505.19361v6", "date": "2026-03-20", "relevancy": 1.7204, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5838}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5767}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5445}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Consistency-based%20Abductive%20Reasoning%20over%20Perceptual%20Errors%20of%20Multiple%20Pre-trained%20Models%20in%20Novel%20Environments&body=Title%3A%20Consistency-based%20Abductive%20Reasoning%20over%20Perceptual%20Errors%20of%20Multiple%20Pre-trained%20Models%20in%20Novel%20Environments%0AAuthor%3A%20Mario%20Leiva%20and%20Noel%20Ngu%20and%20Joshua%20Shay%20Kricheli%20and%20Aditya%20Taparia%20and%20Ransalu%20Senanayake%20and%20Paulo%20Shakarian%20and%20Nathaniel%20Bastian%20and%20John%20Corcoran%20and%20Gerardo%20Simari%0AAbstract%3A%20The%20deployment%20of%20pre-trained%20perception%20models%20in%20novel%20environments%20often%20leads%20to%20performance%20degradation%20due%20to%20distributional%20shifts.%20Although%20recent%20artificial%20intelligence%20approaches%20for%20metacognition%20use%20logical%20rules%20to%20characterize%20and%20filter%20model%20errors%2C%20improving%20precision%20often%20comes%20at%20the%20cost%20of%20reduced%20recall.%20This%20paper%20addresses%20the%20hypothesis%20that%20leveraging%20multiple%20pre-trained%20models%20can%20mitigate {"title": "TinyML Enhances CubeSat Mission Capabilities", "author": "Luigi Capogrosso and Michele Magno", "abstract": "Earth observation (EO) missions traditionally rely on transmitting raw or minimally processed imagery from satellites to ground stations for computationally intensive analysis. This paradigm is infeasible for CubeSat systems due to stringent constraints on the onboard embedded processors, energy availability, and communication bandwidth. To overcome these limitations, the paper presents a TinyML-based Convolutional Neural Networks (ConvNets) model optimization and deployment pipeline for onboard image classification, enabling accurate, energy-efficient, and hardware-aware inference under CubeSat-class constraints. Our pipeline integrates structured iterative pruning, post-training INT8 quantization, and hardware-aware operator mapping to compress models and align them with the heterogeneous compute architecture of the STM32N6 microcontroller from STMicroelectronics. This Microcontroller Unit (MCU) integrates a novel Arm Cortex-M55 core and a Neural-ART Neural Processing Unit (NPU), providing a realistic proxy for CubeSat onboard computers. The paper evaluates the proposed approach on three EO benchmark datasets (i.e., EuroSAT, RS_C11, MEDIC) and four models (i.e., SqueezeNet, MobileNetV3, EfficientNet, MCUNetV1). We demonstrate an average reduction in RAM usage of 89.55% and Flash memory of 70.09% for the optimized models, significantly decreasing downlink bandwidth requirements while maintaining task-acceptable accuracy (with a drop ranging from 0.4 to 8.6 percentage points compared to the Float32 baseline). The energy consumption per inference ranges from 0.68 mJ to 6.45 mJ, with latency spanning from 3.22 ms to 30.38 ms. These results fully satisfy the stringent energy budgets and real-time constraints required for efficient onboard EO processing.", "link": "http://arxiv.org/abs/2603.20174v1", "date": "2026-03-20", "relevancy": 1.4592, "topK": [{ {"title": "Wildfire Spread Scenarios: Increasing Sample Diversity of Segmentation Diffusion Models with Training-Free Methods", "author": "Sebastian Gerard and Josephine Sullivan", "abstract": "Predicting future states in uncertain environments, such as wildfire spread, medical diagnosis, or autonomous driving, requires models that can consider multiple plausible outcomes. While diffusion models can effectively learn such multi-modal distributions, naively sampling from these models is computationally inefficient, potentially requiring hundreds of samples to find low-probability modes that may still be operationally relevant. In this work, we address the challenge of sample-efficient ambiguous segmentation by evaluating several training-free sampling methods that encourage diverse predictions. We adapt two techniques, particle guidance and SPELL, originally designed for the generation of diverse natural images, to discrete segmentation tasks, and additionally propose a simple clustering-based technique. We validate these approaches on the LIDC medical dataset, a modified version of the Cityscapes dataset, and MMFire, a new simulation-based wildfire spread dataset introduced in this paper. Compared to naive sampling, these approaches increase the HM IoU* metric by up to 7.5% on MMFire and 16.4% on Cityscapes, demonstrating that training-free methods can be used to efficiently increase the sample diversity of segmentation diffusion models with little cost to image quality and runtime.\n  Code and dataset: https://github.com/SebastianGer/wildfire-spread-scenarios", "link": "http://arxiv.org/abs/2603.20188v1", "date": "2026-03-20", "relevancy": 1.5924, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5637}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5234}, {" {"title": "The End of Rented Discovery: How AI Search Redistributes Power Between Hotels and Intermediaries", "author": "Peiying Zhu and Sidi Chang", "abstract": "When a traveler asks an AI search engine to recommend a hotel, which sources get cited -- and does query framing matter? We audit 1,357 grounding citations from Google Gemini across 156 hotel queries in Tokyo and document a systematic pattern we call the Intent-Source Divide. Experiential queries draw 55.9\\% of their citations from non-OTA sources, compared to 30.8\\% for transactional queries -- a 25.1 percentage-point gap ($p < 5 \\times 10^{-20}$). The effect is amplified in Japanese, where experiential queries draw 62.1\\% non-OTA citations compared to 50.0\\% in English -- consistent with a more diverse Japanese non-OTA content ecosystem. For an industry in which hotels have long paid OTAs for demand acquisition, this pattern matters because it suggests that AI search may make hotel discovery less exclusively controlled by commission-based intermediaries.", "link": "http://arxiv.org/abs/2603.20062v1", "date": "2026-03-20", "relevancy": 1.396, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3686}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.3473}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.3429}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20End%20of%20Rented%20Discovery%3A%20How%20AI%20Search%20Redistributes%20Power%20Between%20Hotels%20and%20Intermediaries&body=Title%3A%20The%20End%20of%20Rented%20Discovery%3A%20How%20AI%20Search%20Redistributes%20Power%20Between%20Hotels%20and%20Intermedi {"title": "NASimJax: GPU-Accelerated Policy Learning Framework for Penetration Testing", "author": "Raphael Simon and Jos\u00e9 Carrasquel and Wim Mees and Pieter Libin", "abstract": "Penetration testing, the practice of simulating cyberattacks to identify vulnerabilities, is a complex sequential decision-making task that is inherently partially observable and features large action spaces. Training reinforcement learning (RL) policies for this domain faces a fundamental bottleneck: existing simulators are too slow to train on realistic network scenarios at scale, resulting in policies that fail to generalize. We present NASimJax, a complete JAX-based reimplementation of the Network Attack Simulator (NASim), achieving up to 100x higher environment throughput than the original simulator. By running the entire training pipeline on hardware accelerators, NASimJax enables experimentation on larger networks under fixed compute budgets that were previously infeasible. We formulate automated penetration testing as a Contextual POMDP and introduce a network generation pipeline that produces structurally diverse and guaranteed-solvable scenarios. Together, these provide a principled basis for studying zero-shot policy generalization. We use the framework to investigate action-space scaling and generalization across networks of up to 40 hosts. We find that Prioritized Level Replay better handles dense training distributions than Domain Randomization, particularly at larger scales, and that training on sparser topologies yields an implicit curriculum that improves out-of-distribution generalization, even on topologies denser than those seen during training. To handle linearly growing action spaces, we propose a two-stage action decomposition (2SAS) that substantially outperforms flat action masking at scale. Finally, we identify a failure mode arising from the interaction between Prioritized Level Replay's episode-reset behaviour and 2SAS's credit assignment structure. NASimJax thus provides a fast, flexible, and realistic platform for advancing RL-based penetration testing.", "link": "http://arxiv.org/abs/2603.19864v1", "date": "2026-03-20", "relevancy": 1.4783, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4995}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4936}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4839}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NASimJax%3A%20GPU-Accelerated%20Policy%20Learning%20Framework%20for%20Penetration%20Testing&body=Title%3A%20NASimJax%3A%20GPU-Accelerated%20Policy%20Learning%20Framework%20for%20Penetration%20Testing%0AAuthor%3A%20Raphael%20Simon%20and%20Jos%C3%A9%20Carrasquel%20and%20Wim%20Mees%20and%20Pieter%20Libin%0AAbstract%3A%20Penetration%20testing%2C%20the%20practice%20of%20simulating%20cyberattacks%20to%20identify%20vulnerabilities%2C%20is%20a%20complex%20sequential%20decision-making%20task%20that%20is%20inherently%20partially%20observable%20and%20features%20large%20action%20spaces.%20Training%20reinforcement%20learning%20%28RL%29%20policies%20for%20this%20domain%20faces%20a%20fundamental%20bottleneck%3A%20existing%20simulators%20are%20too%20slow%20to%20train%20on%20realistic%20network%20scenarios%20at%20scale%2C%20resulting%20in%20policies%20that%20fail%20to%20generalize.%20We%20present%20NASimJax%2C%20a%20complete%20JAX-based%20reimplementation%20of%20the%20Network%20Attack%20Simulator%20%28NASim%29%2C%20achieving%20up%20to%20100x%20higher%20environment%20throughput%20than%20the%20original%20simulator.%20By%20running%20the%20entire%20training%20pipeline%20on%20hardware%20accelerators%2C%20NASimJax%20enables%20experimentation%20on%20larger%20networks%20under%20fixed%20compute%20budgets%20that%20were%20previously%20infeasible.%20We%20formulate%20automated%20penetration%20testing%20as%20a%20Contextual%20POMDP%20and%20introduce%20a%20network%20generation%20pipeline%20that%20produces%20structurally%20diverse%20and%20guaranteed-solvable%20scenarios.%20Together%2C%20these%20provide%20a%20principled%20basis%20for%20studying%20zero-shot%20policy%20generalization.%20We%20use%20the%20framework%20to%20investigate%20action-space%20scaling%20and%20generalization%20across%20networks%20of%20up%20to%2040%20hosts.%20We%20find%20that%20Prioritized%20Level%20Replay%20better%20handles%20dense%20training%20distributions%20than%20Domain%20Randomization%2C%20particularly%20at%20larger%20scales%2C%20and%20that%20training%20on%20sparser%20topologies%20yields%20an%20implicit%20curriculum%20that%20improves%20out-of-distribution%20generalization%2C%20even%20on%20topologies%20denser%20than%20those%20seen%20during%20training.%20To%20handle%20linearly%20growing%20action%20spaces%2C%20we%20propose%20a%20two-stage%20action%20decomposition%20%282SAS%29%20that%20substantially%20outperforms%20flat%20action%20masking%20at%20scale.%20Finally%2C%20we%20identify%20a%20failure%20mode%20arising%20from%20the%20interaction%20between%20Prioritized%20Level%20Replay%27s%20episode-reset%20behaviour%20and%202SAS%27s%20credit%20assignment%20structure.%20NASimJax%20thus%20provides%20a%20fast%2C%20flexible%2C%20and%20realistic%20platform%20for%20advancing%20RL-based%20penetration%20testing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19864v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNASimJax%253A%2520GPU-Accelerated%2520Policy%2520Learning%2520Framework%2520for%2520Penetration%2520Testing%26entry.906535625%3DRaphael%2520Simon%2520and%2520Jos%25C3%25A9%2520Carrasquel%2520and%2520Wim%2520Mees%2520and%2520Pieter%2520Libin%26entry.1292438233%3DPenetration%2520testin 520at%2520larger%2520scales%252C%2520and%2520that%2520training%2520on%2520sparser%2520topologies%2520yields%2520an%2520implicit%2520curriculum%2520that%2520improves%2520out-of-distribution%2520generalization%252C%2520even%2520on%2520topologies%2520denser%2520than%2520those%2520seen%2520during%2520training.%2520To%2520handle%2520linearly%2520growing%2520action%2520spaces%252C%2520we%2520propose%2520a%2520two-stage%2520action%2520decomposition%2520%25282SAS%2529%2520that%2520substantially%2520outperforms%2520flat%2520action%2520masking%2520at%2520scale.%2520Finally%252C%2520we%2520identify%2520a%2520failure%2520mode%2520arising%2520from%2520the%2520interaction%2520between%2520Prioritized%2520Level%2520Replay%2527s%2520episode-reset%2520behaviour%2520and%25202SAS%2527s%2520credit%2520assignment%2520structure.%2520NASimJax%2520thus%2520provides%2520a%2520fast%252C%2520flexible%252C%2520and%2520realistic%2520platform%2520for%2520advancing%2520RL-based%2520penetration%2520testing.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19864v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NASimJax%3A%20GPU-Accelerated%20Policy%20Learning%20Framework%20for%20Penetration%20Testing&entry.906535625=Raphael%20Simon%20and%20Jos%C3%A9%20Carrasquel%20and%20Wim%20Mees%20and%20Pieter%20Libin&entry.1292438233=Penetration%20testing%2C%20the%20practice%20of%20simulating%20cyberattacks%20to%20identify%20vulnerabilities%2C%20is%20a%20complex%20sequential%20decision-making%20task%20that%20is%20inherently%20partially%20observable%20and%20features%20large%20action%20spaces.%20Training%20reinforcement%20learning%20%28RL%29%20policies%20for%20this%20domain%20faces%20a%20fundamental%20bottleneck%3A%20existing%20simulators%20are%20too%20slow%20to%20train%20on%20realistic%20network%20scenarios%20at%20scale%2C%20resulting%20in%20policies%20that%20fail%20to%20generalize.%20We%20present%20NASimJax {"title": "TempPerturb-Eval: On the Joint Effects of Internal Temperature and External Perturbations in RAG Robustness", "author": "Yongxin Zhou and Philippe Mulhem and Didier Schwab", "abstract": "The evaluation of Retrieval-Augmented Generation (RAG) systems typically examines retrieval quality and generation parameters like temperature in isolation, overlooking their interaction. This work presents a systematic investigation of how text perturbations (simulating noisy retrieval) interact with temperature settings across multiple LLM runs. We propose a comprehensive RAG Perturbation-Temperature Analysis Framework that subjects retrieved documents to three distinct perturbation types across varying temperature settings. Through extensive experiments on HotpotQA with both open-source and proprietary LLMs, we demonstrate that performance degradation follows distinct patterns: high-temperature settings consistently amplify vulnerability to perturbations, while certain perturbation types exhibit non-linear sensitivity across the temperature range. Our work yields three key contributions: (1) a diagnostic benchmark for assessing RAG robustness, (2) an analytical framework for quantifying perturbation-temperature interactions, and (3) practical guidelines for model selection and parameter tuning under noisy retrieval conditions.", "link": "http://arxiv.org/abs/2512.01183v2", "date": "2026-03-20", "relevancy": 1.3423, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4603}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4418}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4207}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TempPerturb-Eval%3A%20On%20the%20Joint%20Effects%20of%20Internal%20Temperature%20and%20External%20Perturbations%20in%20RAG%20Robustness&body=Title%3A%20TempPerturb-Eval%3A%20On%20the%20Joint%20Effects%20of%20Internal%20Temperature%20and%20External%20Perturbations%20in%20RAG%20Robustness%0AAuthor%3A%20Yongxin%20Zhou%20and%20Philippe%20Mulhem%20and%20Didier%20Schwab%0AAbstract%3A%20The%20evaluation%20of%20Retrieval-Augmented%20Generation%20%28RAG%29%20systems%20typically%20examines%20retrieval%20quality%20and%20generation%20parameters%20like%20temperature%20in%20isolation%2C%20overlooking%20their%20interaction.%20This%20work%20presents%20a%20systematic%20investigation%20of%20how%20text%20perturbations%20%28simulating%20noisy%20retrieval%29%20interact%20with%20temperature%20settings%20across%20multiple%20LLM%20runs.%20We%20propose%20a%20comprehensive%20RAG%20Perturbation-Temperature%20Analysis%20Framework%20that%20subjects%20retrieved%20documents%20to%20three%20distinct%20perturbation%20types%20across%20varying%20temperature%20settings.%20Through%20extensive%20experiments%20on%20HotpotQA%20with%20both%20open-source%20and%20proprietary%20LLMs%2C%20we%20demonstrate%20that%20performance%20degradation%20follows%20distinct%20patterns%3A%20high-temperature%20settings%20consistently%20amplify%20vulnerability%20to%20perturbations%2C%20while%20certain%20perturbation%20types%20exhibit%20non-linear%20sensitivity%20across%20the%20temperature%20range.%20Our%20work%20yields%20three%20key%20contributions%3A%20%281%29%20a%20diagnostic%20benchmark%20for%20assessing%20RAG%20robustness%2C%20%282%29%20an%20analytical%20framework%20for%20quantifying%20perturbation-temperature%20interactions%2C%20and%20%283%29%20practical%20guidelines%20for%20model%20selection%20and%20parameter%20tuning%20under%20noisy%20retrieval%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2512.01183v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIa lection%2520and%2520parameter%2520tuning%2520under%2520noisy%2520retrieval%2520conditions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.01183v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TempPerturb-Eval%3A%20On%20the%20Joint%20Effects%20of%20Internal%20Temperature%20and%20External%20Perturbations%20in%20RAG%20Robustness&entry.906535625=Yongxin%20Zhou%20and%20Philippe%20Mulhem%20and%20Didier%20Schwab&entry.1292438233=The%20evaluation%20of%20Retrieval-Augmented%20Generation%20%28RAG%29%20systems%20typically%20examines%20retrieval%20quality%20and%20generation%20parameters%20like%20temperature%20in%20isolation%2C%20overlooking%20their%20interaction.%20This%20work%20presents%20a%20systematic%20investigation%20of%20how%20text%20perturbations%20%28simulating%20noisy%20retrieval%29%20interact%20with%20temperature%20settings%20across%20multiple%20LLM%20runs.%20We%20propose%20a%20comprehensive%20RAG%20Perturbation-Temperature%20Analysis%20Framework%20that%20subjects%20retrieved%20documents%20to%20three%20distinct%20perturbation%20types%20across%20varying%20temperature%20settings.%20Through%20extensive%20experiments%20on%20HotpotQA%20with%20both%20open-source%20and%20proprietary%20LLMs%2C%20we%20demonstrate%20that%20performance%20degradation%20follows%20distinct%20patterns%3A%20high-temperature%20settings%20consistently%20amplify%20vulnerability%20to%20perturbations%2C%20while%20certain%20perturbation%20types%20exhibit%20non-linear%20sensitivity%20across%20the%20temperature%20range.%20Our%20work%20yields%20three%20key%20contributions%3A%20%281%29%20a%20diagnostic%20benchmark%20for%20assessing%20RAG%20robustness%2C%20%282%29%20an%20analytical%20framework%20for%20quantifying%20perturbation-temperature%20interactions%2C%20and%20%283%29%20practical%20guidelines%20for%20model%20selection%20and%20parameter%20tuning%20under%20noisy%20retrieval%20conditions.&entry.1838667208=http%3A//arxiv.org/abs/2512.01183v2&entry.124074799=Read"},
{"title": "On the Dynamics & Transferability of Latent Generalization during Memorization", "author": "Simran Ketha and Venkatakrishnan Ramaswamy", "abstract": "Deep networks have been known to have extraordinary generalization abilities, via mechanisms that aren't yet well understood. It is also known that upon shuffling labels in the training data to varying degrees, deep networks, trained with standard methods, can still achieve perfect or high accuracy on this corrupted training data. This phenomenon is called memorization, and typically comes at the cost of poorer generalization to true labels. Our recent work has demonstrated, that the internal representations of such models retain significantly better latent generalization abilities than is directly apparent from the model. In particular, it has been shown that such latent generalization can be recovered via simple probes (called MASC probes) on the layer-wise representations of the model. However, the origin and dynamics over training of this latent generalization during memorization is not well understood. Here, we track the training dynamics, empirically, and find that latent generalization abilities largely peak early in training, with model generalization. Next, we investigate to what extent the specific nature of the MASC probe is critical for our ability to extract latent generalization from the model's layerwise outputs. To this end, we first examine the mathematical structure of the MASC probe and show that it is a quadratic classifier, i.e. is non-linear. This brings up the question of the extent to which this latent generalization might be linearly decodable from layerwise outputs. To investigate this, we designed a new linear probe for this setting. Next, we consider the question of whether it is possible to transfer latent generalization to model generalization by directly editing model weights. To this end, we devise a way to transfer the latent generalization present in last-layer representations to the model using the new linear probe.", "link": "http://arxiv.org/abs/2603.19865v1", "date": "2026-03-20", "relevancy": 1.9801, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.505}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4916}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4785}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Dynamics%20%26%20Transferability%20of%20Latent%20Generalization%20during%20Memorization&body=Title%3A%20On%20the%20Dynamics%20%26%20Transferability%20of%20Latent%20Generalization%20during%20Memorization%0AAuthor%3A%20Simran%20Ketha%20and%20Venkatakrishnan%20Ramaswamy%0AAbstract%3A%20Deep%20networks%20have%20been%20known%20to%20have%20extraordinary%20generalization%20abilities%2C%20via%20mechanisms%20that%20aren%27t%20yet%20well%20understood.%20It%20is%20also%20known%20that%20upon%20shuffling%20labels%20in%20the%20training%20data%20to%20varying%20degrees%2C%20deep%20networks%2C%20trained%20with%20standard%20methods%2C%20can%20still%20achieve%20perfect%20or%20high%20accuracy%20on%20this%20corrupted%20training%20data.%20This%20phenomenon%20is%20called%20memorization%2C%20and%20typically%20comes%20at%20the%20cost%20of%20poorer%20generalization%20to%20true%20labels.%20Our%20recent%20work%20has%20demonstrated%2C%20that%20the%20internal%20representations%20of%20such%20models%20retain%20significantly%20better%20latent%20generalization%20abilities%20than%20is%20directly%20apparent%20from%20the%20model.%20In%20particular%2C%20it%20has%20been%20shown%20that%20such%20latent%20generalization%20can%20be%20recovered%20via%20simple%20probes%20%28called%20MASC%20probes%29%20on%20the%20layer-wise%20representations%20of%20the%20model.%20However%2C%20the%20origin%20and%20dynamics%20over%20training%20of%20this%20latent%20generalization%20during%20memorization%20is%20not%20well%20understood.%20Here%2C%20we%20track%20the%20training%20dynamics%2C%20empirically%2C%20and%20find%20that%20latent%20generalization%20abilities%20largely%20peak%20early%20in%20training%2C%20with%20model%20generalization.%20Next%2C%20we%20investigate%20to%20what%20extent%20the%20specific%20nature%20of%20the%20MASC%20probe%20is%20critical%20for%20our%20ability%20to%20extract%20latent%20generalization%20from%20the%20model%27s%20layerwise%20outputs.%20To%20this%20end%2C%20we%20first%20examine%20the%20mathematical%20structure%20of%20the%20MASC%20probe%20and%20show%20that%20it%20is%20a%20quadratic%20classifier%2C%20i.e.%20is%20non-linear.%20This%20brings%20up%20the%20question%20of%20the%20extent%20to%20which%20this%20latent%20generalization%20might%20be%20linearly%20decodable%20from%20layerwise%20outputs.%20To%20investigate%20this%2C%20we%20designed%20a%20new%20linear%20probe%20for%20this%20setting.%20Next%2C%20we%20consider%20the%20question%20of%20whether%20it%20is%20possible%20to%20transfer%20latent%20generalization%20to%20model%20generalization%20by%20directly%20editing%20model%20weights.%20To%20this%20end%2C%20we%20devise%20a%20way%20to%20transfer%20the%20latent%20generalization%20present%20in%20last-layer%20representations%20to%20the%20model%20using%20the%20new%20linear%20probe.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19865v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Dynamics%2520%2526%2520Transferability%2520of%2520Latent%2520Generalization%2520during%2520Memorization%26entry.906535625%3DSimran%2520Ketha%2520and%2520Venkatakrishnan%2520Ramaswamy%26entry.1292438233%3DDeep%2520networks%2520have%2520been%2520known%2520to%2520have%2520extraordinary%2520generalization%2520abilities%252C%2520via%2520mechanisms%2520that%2520aren%2527t% {"title": "HPS: Hard Preference Sampling for Human Preference Alignment", "author": "Xiandong Zou and Wanyu Lin and Yuchen Li and Pan Zhou", "abstract": "Aligning Large Language Model (LLM) responses with human preferences is vital for building safe and controllable AI systems. While preference optimization methods based on Plackett-Luce (PL) and Bradley-Terry (BT) models have shown promise, they face challenges such as poor handling of harmful content, inefficient use of dispreferred responses, and, specifically for PL, high computational costs. To address these issues, we propose Hard Preference Sampling (HPS), a novel framework for robust and efficient human preference alignment. HPS introduces a training loss that prioritizes the most preferred response while rejecting all dispreferred and harmful ones. It emphasizes \"hard\" dispreferred responses -- those closely resembling preferred ones -- to enhance the model's rejection capabilities. By leveraging a single-sample Monte Carlo sampling strategy, HPS reduces computational overhead while maintaining alignment quality. Theoretically, HPS improves sample efficiency over existing PL methods and maximizes the reward margin between preferred and dispreferred responses, ensuring clearer distinctions. Experiments on HH-RLHF and PKU-Safety datasets validate HPS's effectiveness, achieving comparable BLEU and reward scores while greatly improving reward margins and thus reducing harmful content generation.", "link": "http://arxiv.org/abs/2502.14400v5", "date": "2026-03-20", "relevancy": 1.4159, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4856}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4565}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

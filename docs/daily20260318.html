{"title": "ProgressiveAvatars: Progressive Animatable 3D Gaussian Avatars", "author": "Kaiwen Song and Jinkai Cui and Juyong Zhang", "abstract": "In practical real-time XR and telepresence applications, network and computing resources fluctuate frequently. Therefore, a progressive 3D representation is needed. To this end, we propose ProgressiveAvatars, a progressive avatar representation built on a hierarchy of 3D Gaussians grown by adaptive implicit subdivision on a template mesh. 3D Gaussians are defined in face-local coordinates to remain animatable under varying expressions and head motion across multiple detail levels. The hierarchy expands when screen-space signals indicate a lack of detail, allocating resources to important areas. Leveraging importance ranking, ProgressiveAvatars supports incremental loading and rendering, adding new Gaussians as they arrive while preserving previous content, thus achieving smooth quality improvements across varying bandwidths. ProgressiveAvatars enables progressive delivery and progressive rendering under fluctuating network bandwidth and varying compute and memory resources.", "link": "http://arxiv.org/abs/2603.16447v1", "date": "2026-03-17", "relevancy": 3.3114, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6905}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6905}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6058}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProgressiveAvatars%3A%20Progressive%20Animatable%203D%20Gaussian%20Avatars&body=Title%3A%20ProgressiveAvatars%3A%20Progressive%20Animatable%203D%20Gaussian%20Avatars%0AAuthor%3A%20Kaiwen%20Song%20and%20Jinkai%20Cui%20and%20Juyong%20Zhang%0AAbstract%3A%20In%20practical%20rea {"title": "M^3: Dense Matching Meets Multi-View Foundation Models for Monocular Gaussian Splatting SLAM", "author": "Kerui Ren and Guanghao Li and Changjian Jiang and Yingxiang Xu and Tao Lu and Linning Xu and Junting Dong and Jiangmiao Pang and Mulin Yu and Bo Dai", "abstract": "Streaming reconstruction from uncalibrated monocular video remains challenging, as it requires both high-precision pose estimation and computationally efficient online refinement in dynamic environments. While coupling 3D foundation models with SLAM frameworks is a promising paradigm, a critical bottleneck persists: most multi-view foundation models estimate poses in a feed-forward manner, yielding pixel-level correspondences that lack the requisite precision for rigorous geometric optimization. To address this, we present M^3, which augments the Multi-view foundation model with a dedicated Matching head to facilitate fine-grained dense correspondences and integrates it into a robust Monocular Gaussian Splatting SLAM. M^3 further enhances tracking stability by incorporating dynamic area suppression and cross-inference intrinsic alignment. Extensive experiments on diverse indoor and outdoor benchmarks demonstrate state-of-the-art accuracy in both pose estimation and scene reconstruction. Notably, M^3 reduces ATE RMSE by 64.3% compared to VGGT-SLAM 2.0 and outperforms ARTDECO by 2.11 dB in PSNR on the ScanNet++ dataset.", "link": "http://arxiv.org/abs/2603.16844v1", "date": "2026-03-17", "relevancy": 3.2926, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6953}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6416}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6386}], " {"title": "MessyKitchens: Contact-rich object-level 3D scene reconstruction", "author": "Junaid Ahmed Ansari and Ran Ding and Fabio Pizzati and Ivan Laptev", "abstract": "Monocular 3D scene reconstruction has recently seen significant progress. Powered by the modern neural architectures and large-scale data, recent methods achieve high performance in depth estimation from a single image. Meanwhile, reconstructing and decomposing common scenes into individual 3D objects remains a hard challenge due to the large variety of objects, frequent occlusions and complex object relations. Notably, beyond shape and pose estimation of individual objects, applications in robotics and animation require physically-plausible scene reconstruction where objects obey physical principles of non-penetration and realistic contacts. In this work we advance object-level scene reconstruction along two directions. First, we introduceMessyKitchens, a new dataset with real-world scenes featuring cluttered environments and providing high-fidelity object-level ground truth in terms of 3D object shapes, poses and accurate object contacts. Second, we build on the recent SAM 3D approach for single-object reconstruction and extend it with Multi-Object Decoder (MOD) for joint object-level scene reconstruction. To validate our contributions, we demonstrate MessyKitchens to significantly improve previous datasets in registration accuracy and inter-object penetration. We also compare our multi-object reconstruction approach on three datasets and demonstrate consistent and significant improvements of MOD over the state of the art. Our new benchmark, code and pre-trained models will become publicly available on our project website: https://messykitchens.github.io/.", "link": "http://arxiv.org/abs/2603.16868v1", "date": "2026-03-17", "relevancy": 3.0919, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6307}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6307}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5936}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MessyKitchens%3A%20Contact-rich%20object-level%203D%20scene%20reconstruction&body=Title%3A%20MessyKitchens%3A%20Contact-rich%20object-level%203D%20scene%20reconstruction%0AAuthor%3A%20Junaid%20Ahmed%20Ansari%20and%20Ran%20Ding%20and%20Fabio%20Pizzati%20and%20Ivan%20Laptev%0AAbstract%3A%20Monocular%203D%20scene%20reconstruction%20has%20recently%20seen%20significant%20progress.%20Powered%20by%20the%20modern%20neural%20architectures%20and%20large-scale%20data%2C%20recent%20methods%20achieve%20high%20performance%20in%20depth%20estimation%20from%20a%20single%20image.%20Meanwhile%2C%20reconstructing%20and%20decomposing%20common%20scenes%20into%20individual%203D%20objects%20remains%20a%20hard%20challenge%20due%20to%20the%20large%20variety%20of%20objects%2C%20frequent%20occlusions%20and%20complex%20object%20relations.%20Notably%2C%20beyond%20shape%20and%20pose%20estimation%20of%20individual%20objects%2C%20applications%20in%20robotics%20and%20animation%20require%20physically-plausible%20scene%20reconstruction%20where%20objects%20obey%20physical%20principles%20of%20non-penetration%20and%20realistic%20contacts.%20In%20this%20work%20we%20advance%20object-level%20scene%20reconstruction%20along%20two%20directions.%20First%2C%20we%20introduceMessyKitchens%2C%20a%20new%20dataset%20with%20real-world%20scenes%20featuring%20cluttered%20environments%20and%20providing%20high-fidelity%20object-level%20ground%20truth%20in%20terms%20of%203D%20object%20shapes%2C%20poses%20and%20accurate%20object%20contacts.%20Second%2C%20we%20build%20on%20the%20recent%20SAM%203D%20approach%20for%20single-object%20reconstruction%20and%20extend%20it%20with%20Multi-Object%20Decoder%20%28MOD%29%20for%20joint%20object-level%20scene%20reconstruction.%20To%20validate%20our%20contributions%2C%20we%20demonstrate%20MessyKitchens%20to%20significantly%20improve%20previous%20datasets%20in%20registration%20accuracy%20and%20inter-object%20penetration.%20We%20also%20compare%20our%20multi-object%20reconstruction%20approach%20on%20three%20datasets%20and%20demonstrate%20consistent%20and%20significant%20improvements%20of%20MOD%20over%20the%20state%20of%20the%20art.%20Our%20new%20benchmark%2C%20code%20and%20pre-trained%20models%20will%20become%20publicly%20available%20on%20our%20project%20website%3A%20https%3A//messykitchens.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16868v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMessyKitchens%253A%2520Contact-rich%2520object-level%25203D%2520scene%2520reconstruction%26entry.906535625%3DJunaid%2520Ahmed%2520Ansari%2520and%2520Ran%2520Ding%2520and%2520Fabio%2520Pizzati%2520and%2520Ivan%2520Laptev%26entry.1292438233%3DMonocular%25203D%2520scene%2520reconstruction%2520has%2520recently%2520seen%2520significant%2520progress.%2520Powered%2520by%2520the%2520modern%2520neural%2520architectures%2520and%2520large-scale%2520data%252C%2520recent%2520methods%2520achieve%2520high%2520performance%2520in%2520depth%2520estimation%2520from%2520a%2520single%2520image.%2520Meanwhile%252C%2520reconstructing%2520and%2520decomposing%2520common%2520scenes%2520into%2520individual%25203D%2520objects%2520remains%2520a%2520hard%2520challenge%2520due%2520to%2520the%2520large%2520variety%2520of%2520objects%252C%2520frequent%2520occlusions%2520and%2520complex%2520object%2520relations.%2520Notably%252C%2520beyond%2520shape%2520and%2520pose%2520estimation%2520of%2520individual%2520objects%252C%2520applications%2520in%2520robotics%2520and%2520animation%2520require%2520physically-plausible%2520scene%2520reconstruction%25 ar%203D%20scene%20reconstruction%20has%20recently%20seen%20significant%20progress.%20Powered%20by%20the%20modern%20neural%20architectures%20and%20large-scale%20data%2C%20recent%20methods%20achieve%20high%20performance%20in%20depth%20estimation%20from%20a%20single%20image.%20Meanwhile%2C%20reconstructing%20and%20decomposing%20common%20scenes%20into%20individual%203D%20objects%20remains%20a%20hard%20challenge%20due%20to%20the%20large%20variety%20of%20objects%2C%20frequent%20occlusions%20and%20complex%20object%20relations.%20Notably%2C%20beyond%20shape%20and%20pose%20estimation%20of%20individual%20objects%2C%20applications%20in%20robotics%20and%20animation%20require%20physically-plausible%20scene%20reconstruction%20where%20objects%20obey%20physical%20principles%20of%20non-penetration%20and%20realistic%20contacts.%20In%20this%20work%20we%20advance%20object-level%20scene%20reconstruction%20along%20two%20directions.%20First%2C%20we%20introduceMessyKitchens%2C%20a%20new%20dataset%20with%20real-world%20scenes%20featuring%20cluttered%20environments%20and%20providing%20high-fidelity%20object-level%20ground%20truth%20in%20terms%20of%203D%20object%20shapes%2C%20poses%20and%20accurate%20object%20contacts.%20Second%2C%20we%20build%20on%20the%20recent%20SAM%203D%20approach%20for%20single-object%20reconstruction%20and%20extend%20it%20with%20Multi-Object%20Decoder%20%28MOD%29%20for%20joint%20object-level%20scene%20reconstruction.%20To%20validate%20our%20contributions%2C%20we%20demonstrate%20MessyKitchens%20to%20significantly%20improve%20previous%20datasets%20in%20registration%20accuracy%20and%20inter-object%20penetration.%20We%20also%20compare%20our%20multi-object%20reconstruction%20approach%20on%20three%20datasets%20and%20demonstrate%20consistent%20and%20significant%20improvements%20of%20MOD%20over%20the%20state%20of%20the%20art.%20Our%20new%20benchmark%2C%20code%20and%20pre-trained%20models%20will%20become%20publicly%20available%20on%20our%20project%20website%3A%20https%3A//messyk {"title": "VideoMatGen: PBR Materials through Joint Generative Modeling", "author": "Jon Hasselgren and Zheng Zeng and Milos Hasan and Jacob Munkberg", "abstract": "We present a method for generating physically-based materials for 3D shapes based on a video diffusion transformer architecture. Our method is conditioned on input geometry and a text description, and jointly models multiple material properties (base color, roughness, metallicity, height map) to form physically plausible materials. We further introduce a custom variational auto-encoder which encodes multiple material modalities into a compact latent space, which enables joint generation of multiple modalities without increasing the number of tokens. Our pipeline generates high-quality materials for 3D shapes given a text prompt, compatible with common content creation tools.", "link": "http://arxiv.org/abs/2603.16566v1", "date": "2026-03-17", "relevancy": 3.0425, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.649}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5952}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5812}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoMatGen%3A%20PBR%20Materials%20through%20Joint%20Generative%20Modeling&body=Title%3A%20VideoMatGen%3A%20PBR%20Materials%20through%20Joint%20Generative%20Modeling%0AAuthor%3A%20Jon%20Hasselgren%20and%20Zheng%20Zeng%20and%20Milos%20Hasan%20and%20Jacob%20Munkberg%0AAbstract%3A%20We%20present%20a%20method%20for%20generating%20physically-based%20materials%20for%203D%20shapes%20based%20on%20a%20video%20diffusion%20transformer%20architecture.%20Our%20method%20is%20conditioned%20on%20input%20geometry%20and%20a%20text%20description%2C%20and% %25203D%2520shapes%2520given%2520a%2520text%2520prompt%252C%2520compatible%2520with%2520common%2520content%2520creation%2520tools.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16566v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VideoMatGen%3A%20PBR%20Materials%20through%20Joint%20Generative%20Modeling&entry.906535625=Jon%20Hasselgren%20and%20Zheng%20Zeng%20and%20Milos%20Hasan%20and%20Jacob%20Munkberg&entry.1292438233=We%20present%20a%20method%20for%20generating%20physically-based%20materials%20for%203D%20shapes%20based%20on%20a%20video%20diffusion%20transformer%20architecture.%20Our%20method%20is%20conditioned%20on%20input%20geometry%20and%20a%20text%20description%2C%20and%20jointly%20models%20multiple%20material%20properties%20%28base%20color%2C%20roughness%2C%20metallicity%2C%20height%20map%29%20to%20form%20physically%20plausible%20materials.%20We%20further%20introduce%20a%20custom%20variational%20auto-encoder%20which%20encodes%20multiple%20material%20modalities%20into%20a%20compact%20latent%20space%2C%20which%20enables%20joint%20generation%20of%20multiple%20modalities%20without%20increasing%20the%20number%20of%20tokens.%20Our%20pipeline%20generates%20high-quality%20materials%20for%203D%20shapes%20given%20a%20text%20prompt%2C%20compatible%20with%20common%20content%20creation%20tools.&entry.1838667208=http%3A//arxiv.org/abs/2603.16566v1&entry.124074799=Read"},
{"title": "GAP-MLLM: Geometry-Aligned Pre-training for Activating 3D Spatial Perception in Multimodal Large Language Models", "author": "Jiaxin Zhang and Junjun Jiang and Haijie Li and Youyu Chen and Kui Jiang and Dave Zhenyu Chen", "abstract": "Multimodal Large Language Models (MLLMs) demonstrate exceptional semantic reasoning but struggle with 3D spatial perception when restricted to pure RGB inputs. Despite leveraging implicit geometric priors from 3D reconstruction models, image-based methods still exhibit a notable performance gap compared to methods using explicit 3D data. We argue that this gap does not arise from insufficient geometric priors, but from a misalignment in the training paradigm: text-dominated fine-tuning fails to activate geometric representations within MLLMs. Existing approaches typically resort to naive feature concatenation and optimize directly for downstream tasks without geometry-specific supervision, leading to suboptimal structural utilization. To address this limitation, we propose GAP-MLLM, a Geometry-Aligned Pre-training paradigm that explicitly activates structural perception before downstream adaptation. Specifically, we introduce a visual-prompted joint task that compels the MLLMs to predict sparse pointmaps alongside semantic labels, thereby enforcing geometric awareness. Furthermore, we design a multi-level progressive fusion module with a token-level gating mechanism, enabling adaptive integration of geometric priors without suppressing semantic reasoning. Extensive experiments demonstrate that GAP-MLLM significantly enhances geometric feature fusion and consistently enhances performance across 3D visual grounding, 3D dense captioning, and 3D video object detection tasks.", "link": "http://arxiv.org/abs/2603.16461v1", "date": "2026-03-17", "relevancy": 3.0379, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6412}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5911}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5904}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GAP-MLLM%3A%20Geometry-Aligned%20Pre-training%20for%20Activating%203D%20Spatial%20Perception%20in%20Multimodal%20Large%20Language%20Models&body=Title%3A%20GAP-MLLM%3A%20Geometry-Aligned%20Pre-training%20for%20Activating%203D%20Spatial%20Perception%20in%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Jiaxin%20Zhang%20and%20Junjun%20Jiang%20and%20Haijie%20Li%20and%20Youyu%20Chen%20and%20Kui%20Jiang%20and%20Dave%20Zhenyu%20Chen%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20demonstrate%20exceptional%20semantic%20reasoning%20but%20struggle%20with%203D%20spatial%20perception%20when%20restricted%20to%20pure%20RGB%20inputs.%20Despite%20leveraging%20implicit%20geometric%20priors%20from%203D%20reconstruction%20models%2C%20image-based%20methods%20still%20exhibit%20a%20notable%20performance%20gap%20compared%20to%20methods%20using%20explicit%203D%20data.%20We%20argue%20that%20this%20gap%20does%20not%20arise%20from%20insufficient%20geometric%20priors%2C%20but%20from%20a%20misalignment%20in%20the%20training%20paradigm%3A%20text-dominated%20fine-tuning%20fails%20to%20activate%20geometric%20representations%20within%20MLLMs.%20Existing%20approaches%20typically%20resort%20to%20naive%20feature%20concatenation%20and%20optimize%20directly%20for%20downstream%20tasks%20without%20geometry-specific%20supervision%2C%20leading%20to%20suboptimal%20structural%20utilization.%20To%20address%20this%20limitation%2C%20we%20propose%20GAP-MLLM%2C%20a%20Geometry-Aligned%20Pre-training%20paradigm%20that%20explicitly%20activates%20structural%20perception%20before%20downstream%20adaptation.%20Specifically%2C%20we%20introduce%20a%20visual-prompted%20joint%20task%20that%20compels%20the%20MLLMs%20to%20predict%20sparse%20pointmaps%20alongside%20semantic%20labels%2C%20thereby%20enforcing%20geometric%20awareness.%20Furthermore%2C%20we%20design%20a%20multi-level%20progressive%20fusion%20module%20with%20a%20token-level%20gating%20mechanism%2C%20enabling%20adaptive%20integration%20of%20geometric%20priors%20without%20suppressing%20semantic%20reasoning.%20Extensive%20experiments%20demonstrate%20that%20GAP-MLLM%20significantly%20enhances%20geometric%20feature%20fusion%20and%20consistently%20enhances%20performance%20across%203D%20visual%20grounding%2C%203D%20dense%20captioning%2C%20and%203D%20video%20object%20detection%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16461v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGAP-MLLM%253A%2520Geometry-Aligned%2520Pre-training%2520for%2520Activating%25203D%2520Spatial%2520Perception%2520in%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DJiaxin%2520Zhang%2520and%2520Junjun%2520Jiang%2520and%2520Haijie%2520Li%2520and%2520Youyu%2520Chen%2520and%2520Kui%2520Jiang%2520and%2520Dave%2520Zhenyu%2520Chen%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520demonstrate%2520exceptional%2520semantic%2520reasoning%2520but%2520struggle%2520with%25203D%2520spatial%2520perception%2520when%2520restricted%2520to%2520pure%2520RGB%2520inputs.%2520Despite%2520leveraging%2520implicit%2520geometric%2520priors%2520from%25203D%2520reconstruction%2520models%252C%2520image-based%2520methods%2520still%2520exhibit%2520a%2520notable%2520performance%2520gap%2520compared%2520to%2520methods%2520using%2520explicit%25203D%2520data.%2520We%2520argue%2520that%2520this%2520gap%2520does%2520not%2520arise%2520from%2520insufficient%2520geometric%2520priors%252C%2520but%2520from%2520a%2520misalignment%252 {"title": "Let it Snow! Animating 3D Gaussian Scenes with Dynamic Weather Effects via Physics-Guided Score Distillation", "author": "Gal Fiebelman and Hadar Averbuch-Elor and Sagie Benaim", "abstract": "3D Gaussian Splatting has recently enabled fast and photorealistic reconstruction of static 3D scenes. However, dynamic editing of such scenes remains a significant challenge. We introduce a novel framework, Physics-Guided Score Distillation, to address a fundamental conflict: physics simulation provides a strong motion prior that is insufficient for photorealism , while video-based Score Distillation Sampling (SDS) alone cannot generate coherent motion for complex, multi-particle scenarios. We resolve this through a unified optimization framework where physics simulation guides Score Distillation to jointly refine the motion prior for photorealism while simultaneously optimizing appearance. Specifically, we learn a neural dynamics model that predicts particle motion and appearance, optimized end-to-end via a combined loss integrating Video-SDS for photorealism with our physics-guidance prior. This allows for photorealistic refinements while ensuring the dynamics remain plausible. Our framework enables scene-wide dynamic weather effects, including snowfall, rainfall, fog, and sandstorms, with physically plausible motion. Experiments demonstrate our physics-guided approach significantly outperforms baselines, with ablations confirming this joint refinement is essential for generating coherent, high-fidelity dynamics.", "link": "http://arxiv.org/abs/2504.05296v3", "date": "2026-03-17", "relevancy": 3.0172, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6149}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6048}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5907}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Let%20it%20Snow%21%20Animating%203D%20Gaussian%20Scenes%20with%20Dynamic%20Weather%20Effects%20via%20Physics-Guided%20Score%20Distillation&body=Title%3A%20Let%20it%20Snow%21%20Animating%203D%20Gaussian%20Scenes%20with%20Dynamic%20Weather%20Effects%20via%20Physics-Guided%20Score%20Distillation%0AAuthor%3A%20Gal%20Fiebelman%20and%20Hadar%20Averbuch-Elor%20and%20Sagie%20Benaim%0AAbstract%3A%203D%20Gaussian%20Splatting%20has%20recently%20enabled%20fast%20and%20photorealistic%20reconstruction%20of%20static%203D%20scenes.%20However%2C%20dynamic%20editing%20of%20such%20scenes%20remains%20a%20significant%20challenge.%20We%20introduce%20a%20novel%20framework%2C%20Physics-Guided%20Score%20Distillation%2C%20to%20address%20a%20fundamental%20conflict%3A%20physics%20simulation%20provides%20a%20strong%20motion%20prior%20that%20is%20insufficient%20for%20photorealism%20%2C%20while%20video-based%20Score%20Distillation%20Sampling%20%28SDS%29%20alone%20cannot%20generate%20coherent%20motion%20for%20complex%2C%20multi-particle%20scenarios.%20We%20resolve%20this%20through%20a%20unified%20optimization%20framework%20where%20physics%20simulation%20guides%20Score%20Distillation%20to%20jointly%20refine%20the%20motion%20prior%20for%20photorealism%20while%20simultaneously%20optimizing%20appearance.%20Specifically%2C%20we%20learn%20a%20neural%20dynamics%20model%20that%20predicts%20particle%20motion%20and%20appearance%2C%20optimized%20end-to-end%20via%20a%20combined%20loss%20integrating%20Video-SDS%20for%20photorealism%20with%20our%20physics-guidance%20prior.%20This%20allows%20for%20photorealistic%20refinements%20while%20ensuring%20the%20dynamics%20remain%20plausible.%20Our%20framework%20enables%20scene-wide%20dynamic%20weather%20effects%2C%20including%20snowfall%2C%20rainfall%2C%20fog%2C%20and%20sandstorms%2C%20with%20physically%20plausible%20motion.%20Experiments%20demonstrate%20our%20physics-guided%20approach%20significantly%20outperforms%20baselines%2C%20with%20ablations%20confirming%20this%20joint%20refinement%20is%20essential%20for%20generating%20coherent%2C%20high-fidelity%20dynamics.%0ALink%3A%20http%3A//arxiv.org/abs/2504.05296v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLet%2520it%2520Snow%2521%2520Animating%25203D%2520Gaussian%2520Scenes%2520with%2520Dynamic%2520Weather%2520Effects%2520via%2520Physics-Guided%2520Score%2520Distillation%26entry.906535625%3DGal%2520Fiebelman%2520and%2520Hadar%2520Averbuch-Elor%2520and%2520Sagie%2520Benaim%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520has%2520recently%2520enabled%2520fast%2520and%2520photorealistic%2520reconstruction%2520of%2520static%25203D%2520scenes.%2520However%252C%2520dynamic%2520editing%2520of%2520such%2520scenes%2520remains%2520a%2520significant%2520challenge.%2520We%2520introduce%2520a%2520novel%2520framework%252C%2520Physics-Guided%2520Score%2520Distillation%252C%2520to%2520address%2520a%2520fundamental%2520conflict%253A%2520physics%2520simulation%2520provides%2520a%2520strong%2520motion%2520prior%2520that%2520is%2520insufficient%2520for%2520photorealism%2520%252C%2520while%2520video-based%2520Score%2520Distillation%2520Sampling%2520%2528SDS%2529%2520alone%2520cannot%2520generate%2520coherent%2520motion%2520for%2520complex%252C%2520multi-particle%2520scenarios.%2520We%2520resolve%2520this%2520through%2520a%2520unified%2520optimization%2520framework%2520where%2520physics%2520simulation%2520guides%2520Score%2520Distillation%2520to%2520jointly%2520refine%2520the%2520motion%2520prior%2520for%2520photorealism%2520while%2520simultaneously%2520optimizing%2520appearance.%2520Specifically%252C%2520we%2520learn%2520a%2520neural%2520dynamics%2520model%2520that%2520predicts%2520particle%2520motion%2520and%2520appearance%252C%2520optimized%2520end-to-end%2520via%2520a% {"title": "What DINO saw: ALiBi positional encoding reduces positional bias in Vision Transformers", "author": "Moritz Pawlowsky and Antonis Vamvakeros and Alexander Weiss and Anja Bielefeld and Samuel J. Cooper and Ronan Docherty", "abstract": "Vision transformers (ViTs) - especially feature foundation models like DINOv2 - learn rich representations useful for many downstream tasks. However, architectural choices (such as positional encoding) can lead to these models displaying positional biases and artefacts independent of semantic content. This makes zero-shot adaption difficult in fields like material science, where images are often cross-sections of homogeneous microstructure (i.e. having no preferred direction). In this work, we investigate the positional bias in ViTs via linear probing, finding it present across a range of objectives and positional encodings, and subsequently reduce it by finetuning models to use ALiBi relative positional encoding. We demonstrate that these models retain desirable general semantics and their unbiased features can be used successfully in trainable segmentation of complex microscopy images.", "link": "http://arxiv.org/abs/2603.16840v1", "date": "2026-03-17", "relevancy": 3.0149, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.625}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.625}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20DINO%20saw%3A%20ALiBi%20positional%20encoding%20reduces%20positional%20bias%20in%20Vision%20Transformers&body=Title%3A%20What%20DINO%20saw%3A%20ALiBi%20positional%20encoding%20reduces%20positional%20bias%20in%20Vision%20Transformers%0AAuthor%3A%20Moritz%20Pawlowsky%20and%20Antonis%20Vamvakeros%20and%20Alexander%20Weiss%20and%20Anja%20Bielefeld%20and%20Samuel%20J.%20Cooper%20and%20Ronan%20Docherty%0AAbstract%3A%20Vision%20transformers%20%28ViTs%29%20-%20especially%20feature%20foundation%20models%20like%20DINOv2%20-%20learn%20rich%20representations%20useful%20for%20many%20downstream%20tasks.%20However%2C%20architectural%20choices%20%28such%20as%20positional%20encoding%29%20can%20lead%20to%20these%20models%20displaying%20positional%20biases%20and%20artefacts%20independent%20of%20semantic%20content.%20This%20makes%20zero-shot%20adaption%20difficult%20in%20fields%20like%20material%20science%2C%20where%20images%20are%20often%20cross-sections%20of%20homogeneous%20microstructure%20%28i.e.%20having%20no%20preferred%20direction%29.%20In%20this%20work%2C%20we%20investigate%20the%20positional%20bias%20in%20ViTs%20via%20linear%20probing%2C%20finding%20it%20present%20across%20a%20range%20of%20objectives%20and%20positional%20encodings%2C%20and%20subsequently%20reduce%20it%20by%20finetuning%20models%20to%20use%20ALiBi%20relative%20positional%20encoding.%20We%20demonstrate%20that%20these%20models%20retain%20desirable%20general%20semantics%20and%20their%20unbiased%20features%20can%20be%20used%20successfully%20in%20trainable%20segmentation%20of%20complex%20microscopy%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16840v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520DINO%2520saw%253A%2520ALiBi%2520positional%2520encoding%2520reduces%2520positional%2520bias%2520in%2520Vision%2520Transformers%26entry.906535625%3DMoritz%2520Pawlowsky%2520and%2520Antonis%2520Vamvakeros%2520and%2520Alexander%2520Weiss%2520and%2520Anja%2520Bielefeld%2520and%2520Samuel%2520J.%2520Cooper%2520and%2520Ronan%2520Docherty%26entry.1292438233%3DVision%2520transformers%2520%2528ViTs%2529%2520-%2520especially%2520feature% {"title": "DiG: Differential Grounding for Enhancing Fine-Grained Perception in Multimodal Large Language Model", "author": "Zhou Tao and Shida Wang and Yongxiang Hua and Haoyu Cao and Linli Xu", "abstract": "Multimodal Large Language Models have achieved impressive performance on a variety of vision-language tasks, yet their fine-grained visual perception and precise spatial reasoning remain limited. In this work, we introduce DiG (Differential Grounding), a novel proxy task framework where MLLMs learn fine-grained perception by identifying and localizing all differences between similar image pairs without prior knowledge of their number. To support scalable training, we develop an automated 3D rendering-based data generation pipeline that produces high-quality paired images with fully controllable discrepancies. To address the sparsity of difference signals, we further employ curriculum learning that progressively increases complexity from single to multiple differences, enabling stable optimization. Extensive experiments demonstrate that DiG significantly improves model performance across a variety of visual perception benchmarks and that the learned fine-grained perception skills transfer effectively to standard downstream tasks, including RefCOCO, RefCOCO+, RefCOCOg, and general multimodal perception benchmarks. Our results highlight differential grounding as a scalable and robust approach for advancing fine-grained visual reasoning in MLLMs.", "link": "http://arxiv.org/abs/2512.12633v2", "date": "2026-03-17", "relevancy": 2.9911, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6009}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6009}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D {"title": "Synergizing Understanding and Generation with Interleaved Analyzing-Drafting Thinking", "author": "Shengqiong Wu and Bobo Li and Xinkai Wang and Xiangtai Li and Lei Cui and Furu Wei and Shuicheng Yan and Hao Fei and Tat-seng Chua", "abstract": "Unified Vision-Language Models (UVLMs) aim to advance multimodal learning by supporting both understanding and generation within a single framework. However, existing approaches largely focus on architectural unification while overlooking the need for explicit interaction between the two capabilities during task solving. As a result, current models treat understanding and generation as parallel skills rather than synergistic processes. To achieve real synergy, we introduce the interleaved Analyzing-Drafting problem-solving loop (AD-Loop), a new think paradigm that dynamically alternates between analytic and drafting operations. By interleaving textual thoughts with visual thoughts, AD-Loop enables models to iteratively refine both comprehension and outputs, fostering genuine synergy. To train this mechanism, we design a two-stage strategy: supervised learning on interleaved thought data to initialize alternation, followed by reinforcement learning to promote adaptive and autonomous control. Extensive experiments demonstrate that AD-Loop consistently improves performance across standard benchmarks for both understanding and generation, with strong transferability to various UVLMs architectures. Visual analyses further validate the effectiveness of implicit visual thoughts. These results highlight AD-Loop as a principled and broadly applicable strategy for synergizing comprehension and creation. The project page is at https://sqwu.top/AD-Loop.", "link": "http://arxiv.org/abs/2602.21435v2", "date": "2026-03-17", "relevancy": 2.9871, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.604}, {"title": "Lexico rcement%20learning%20to%20promote%20adaptive%20and%20autonomous%20control.%20Extensive%20experiments%20demonstrate%20that%20AD-Loop%20consistently%20improves%20performance%20across%20standard%20benchmarks%20for%20both%20understanding%20and%20generation%2C%20with%20strong%20transferability%20to%20various%20UVLMs%20architectures.%20Visual%20analyses%20further%20validate%20the%20effectiveness%20of%20implicit%20visual%20thoughts.%20These%20results%20highlight%20AD-Loop%20as%20a%20principled%20and%20broadly%20applicable%20strategy%20for%20synergizing%20comprehension%20and%20creation.%20The%20project%20page%20is%20at%20https%3A//sqwu.top/AD-Loop.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21435v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSynergizing%2520Understanding%2520and%2520Generation%2520with%2520Interleaved%2520Analyzing-Drafting%2520Thinking%26entry.906535625%3DShengqiong%2520Wu%2520and%2520Bobo%2520Li%2520and%2520Xinkai%2520Wang%2520and%2520Xiangtai%2520Li%2520and%2520Lei%2520Cui%2520and%2520Furu%2520Wei%2520and%2520Shuicheng%2520Yan%2520and%2520Hao%2520Fei%2520and%2520Tat-seng%2520Chua%26entry.1292438233%3DUnified%2520Vision-Language%2520Models%2520%2528UVLMs%2529%2520aim%2520to%2520advance%2520multimodal%2520learning%2520by%2520supporting%2520both%2520understanding%2520and%2520generation%2520within%2520a%2520single%2520framework.%2520However%252C%2520existing%2520approaches%2520largely%2520focus%2520on%2520architectural%2520unification%2520while%2520overlooking%2520the%2520need%2520for%2520explicit%2520interaction%2520between%2520the%2520two%2520capabilities%2520during%2520task%2520solving.%2520As%2520a%2520result%252C%2520current%2520models%2520treat%2520understanding%2520and%2520generation%2520as%2520parallel%2520skills%2520rather%2520than%2520synergistic%2520processes.%2520To%2520achieve%2520real%2520synergy%252C%2520we%2520introduce%2520the%2520interleaved%2520Analyzin {"title": "Gaze-guided Hand-Object Interaction Synthesis: Dataset and Method", "author": "Jie Tian and Ran Ji and Lingxiao Yang and Suting Ni and Yuexin Ma and Lan Xu and Jingyi Yu and Ye Shi and Jingya Wang", "abstract": "Gaze plays a crucial role in revealing human attention and intention, particularly in hand-object interaction scenarios, where it guides and synchronizes complex tasks that require precise coordination between the brain, hand, and object. Motivated by this, we introduce a novel task: Gaze-Guided Hand-Object Interaction Synthesis, with potential applications in augmented reality, virtual reality, and assistive technologies. To support this task, we present GazeHOI, the first dataset to capture simultaneous 3D modeling of gaze, hand, and object interactions. This task poses significant challenges due to the inherent sparsity and noise in gaze data, as well as the need for high consistency and physical plausibility in generating hand and object motions. To tackle these issues, we propose a stacked gaze-guided hand-object interaction diffusion model, named GHO-Diffusion. The stacked design effectively reduces the complexity of motion generation. We also introduce HOI-Manifold Guidance during the sampling stage of GHO-Diffusion, enabling fine-grained control over generated motions while maintaining the data manifold. Additionally, we propose a spatial-temporal gaze feature encoding for the diffusion condition and select diffusion results based on consistency scores between gaze-contact maps and gaze-interaction trajectories. Extensive experiments highlight the effectiveness of our method and the unique contributions of our dataset. More details in https://takiee.github.io/gaze-hoi/.", "link": "http://arxiv.org/abs/2403.16169v6", "date": "2026-03-17", "relevancy": 2.9853, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6218}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5853}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaze-guided%20Hand-Object%20Interaction%20Synthesis%3A%20Dataset%20and%20Method&body=Title%3A%20Gaze-guided%20Hand-Object%20Interaction%20Synthesis%3A%20Dataset%20and%20Method%0AAuthor%3A%20Jie%20Tian%20and%20Ran%20Ji%20and%20Lingxiao%20Yang%20and%20Suting%20Ni%20and%20Yuexin%20Ma%20and%20Lan%20Xu%20and%20Jingyi%20Yu%20and%20Ye%20Shi%20and%20Jingya%20Wang%0AAbstract%3A%20Gaze%20plays%20a%20crucial%20role%20in%20revealing%20human%20attention%20and%20intention%2C%20particularly%20in%20hand-object%20interaction%20scenarios%2C%20where%20it%20guides%20and%20synchronizes%20complex%20tasks%20that%20require%20precise%20coordination%20between%20the%20brain%2C%20hand%2C%20and%20object.%20Motivated%20by%20this%2C%20we%20introduce%20a%20novel%20task%3A%20Gaze-Guided%20Hand-Object%20Interaction%20Synthesis%2C%20with%20potential%20applications%20in%20augmented%20reality%2C%20virtual%20reality%2C%20and%20assistive%20technologies.%20To%20support%20this%20task%2C%20we%20present%20GazeHOI%2C%20the%20first%20dataset%20to%20capture%20simultaneous%203D%20modeling%20of%20gaze%2C%20hand%2C%20and%20object%20interactions.%20This%20task%20poses%20significant%20challenges%20due%20to%20the%20inherent%20sparsity%20and%20noise%20in%20gaze%20data%2C%20as%20well%20as%20the%20need%20for%20high%20consistency%20and%20physical%20plausibility%20in%20generating%20hand%20and%20object%20motions.%20To%20tackle%20these%20issues%2C%20we%20propose%20a%20stacked%20gaze-guided%20hand-object%20interaction%20diffusion%20model%2C%20named%20GHO-Diffusion.%20The%20stacked%20design%20effectively%20reduces%20the%20complexity%20of%20motion%20generation.%20We%20also%20introduce%20HOI-Manifold%20Guidance%20during%20the%20sampling%20stage%20of%20GHO-Diffusion%2C%20enabling%20fine-grained%20control%20over%20generated%20motions%20while%20maintaining%20the%20data%20manifold.%20Additionally%2C%20we%20propose%20a%20spatial-temporal%20gaze%20feature%20encoding%20for%20the%20diffusion%20condition%20and%20select%20diffusion%20results%20based%20on%20consistency%20scores%20between%20gaze-contact%20maps%20and%20gaze-interaction%20trajectories.%20Extensive%20experiments%20highlight%20the%20effectiveness%20of%20our%20method%20and%20the%20unique%20contributions%20of%20our%20dataset.%20More%20details%20in%20https%3A//takiee.github.io/gaze-hoi/.%0ALink%3A%20http%3A//arxiv.org/abs/2403.16169v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGaze-guided%2520Hand-Object%2520Interaction%2520Synthesis%253A%2520Dataset%2520and%2520Method%26entry.906535625%3DJie%2520Tian%2520and%2520Ran%2520Ji%2520and%2520Lingxiao%2520Yang%2520and%2520Suting%2520Ni%2520and%2520Yuexin%2520Ma%2520and%2520Lan%2520Xu%2520and%2520Jingyi%2520Yu%2520and%2520Ye%2520Shi%2520and%2520Jingya%2520Wang%26entry.1292438233%3DGaze%2520plays%2520a%2520crucial%2520role%2520in%2520revealing%2520human%2520attention%2520and%2520intention%252C%2520particularly%2520in%2520hand-object%2520interaction%2520scenarios%252C%2520where%2520it%2520guides%2520and%2520synchronizes%2520complex%2520tasks%2520that%2520require%2520precise%2520coordination%2520between%2520the%2520brain%252C%2520hand%252C%2520and%2520object.%2520Motivated%2520by%2520this%252C%2520we%2520introduce%2520a%2520novel%2520task%253A%2520Gaze-Guided%2520Hand-Object%2520Interaction%2520Synthesis%252C%2520with%2520potential%2520applications%2520in%2520augmented%2520reality%252C%2520virtual%2520reality%252C%2520and%2520assistive%2520technologies.%2520To%2520support%2520this%2520task%252C%2520we%2520present%2520GazeHOI%252C%2520the%2520first%2520dataset%2520to%2520capture%2520 {"title": "CFM: Language-aligned Concept Foundation Model for Vision", "author": "Kai Wittenmayer and Sukrut Rao and Amin Parchami-Araghi and Bernt Schiele and Jonas Fischer", "abstract": "Language-aligned vision foundation models perform strongly across diverse downstream tasks. Yet, their learned representations remain opaque, making interpreting their decision-making difficult. Recent work decompose these representations into human-interpretable concepts, but provide poor spatial grounding and are limited to image classification tasks. In this work, we propose CFM, a language-aligned concept foundation model for vision that provides fine-grained concepts, which are human-interpretable and spatially grounded in the input image. When paired with a foundation model with strong semantic representations, we get explanations for any of its downstream tasks. Examining local co-occurrence dependencies of concepts allows us to define concept relationships through which we improve concept naming and obtain richer explanations. On benchmark data, we show that CFM provides performance on classification, segmentation, and captioning that is competitive with opaque foundation models while providing fine-grained, high quality concept-based explanations. Code at https://github.com/kawi19/CFM.", "link": "http://arxiv.org/abs/2601.13798v2", "date": "2026-03-17", "relevancy": 2.9793, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.619}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.619}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5495}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CFM%3A%20Language-aligned%20Concept%20Foundation%20Model%20for%20Vision&body=Title%3A%20CFM%3A%20Language-aligned%20Concept%20Foundation%20Model%20for%20Vision%0AAuthor%3A%20Kai%20Wittenmayer%20and%20Sukrut%20Rao%20and%20Amin%20Parchami-Araghi%20and%20Bernt%20Schiele%20and%20Jonas%20Fischer%0AAbstract%3A%20Language-aligned%20vision%20foundation%20models%20perform%20strongly%20across%20diverse%20downstream%20tasks.%20Yet%2C%20their%20learned%20representations%20remain%20opaque%2C%20making%20interpreting%20their%20decision-making%20difficult.%20Recent%20work%20decompose%20these%20representations%20into%20human-interpretable%20concepts%2C%20but%20provide%20poor%20spatial%20grounding%20and%20are%20limited%20to%20image%20classification%20tasks.%20In%20this%20work%2C%20we%20propose%20CFM%2C%20a%20language-aligned%20concept%20foundation%20model%20for%20vision%20that%20provides%20fine-grained%20concepts%2C%20which%20are%20human-interpretable%20and%20spatially%20grounded%20in%20the%20input%20image.%20When%20paired%20with%20a%20foundation%20model%20with%20strong%20semantic%20representations%2C%20we%20get%20explanations%20for%20any%20of%20its%20downstream%20tasks.%20Examining%20local%20co-occurrence%20dependencies%20of%20concepts%20allows%20us%20to%20define%20concept%20relationships%20through%20which%20we%20improve%20concept%20naming%20and%20obtain%20richer%20explanations.%20On%20benchmark%20data%2C%20we%20show%20that%20CFM%20provides%20performance%20on%20classification%2C%20segmentation%2C%20and%20captioning%20that%20is%20competitive%20with%20opaque%20foundation%20models%20while%20providing%20fine-grained%2C%20high%20quality%20concept-based%20explanations.%20Code%20at%20https%3A//github.com/kawi19/CFM.%0ALink%3A%20http%3A//arxiv.org/abs/2601.13798v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCFM%253A%2520Language-aligned%2520Concept%2520Foundation%2520Model%2520for%2520Vision%26entry.906535625%3DKai%2520Wittenmayer%2520and%2520Sukrut%2520Rao%252 _1rDj9BurNNxUPYQ/viewform?entry.1380929848=CFM%3A%20Language-aligned%20Concept%20Foundation%20Model%20for%20Vision&entry.906535625=Kai%20Wittenmayer%20and%20Sukrut%20Rao%20and%20Amin%20Parchami-Araghi%20and%20Bernt%20Schiele%20and%20Jonas%20Fischer&entry.1292438233=Language-aligned%20vision%20foundation%20models%20perform%20strongly%20across%20diverse%20downstream%20tasks.%20Yet%2C%20their%20learned%20representations%20remain%20opaque%2C%20making%20interpreting%20their%20decision-making%20difficult.%20Recent%20work%20decompose%20these%20representations%20into%20human-interpretable%20concepts%2C%20but%20provide%20poor%20spatial%20grounding%20and%20are%20limited%20to%20image%20classification%20tasks.%20In%20this%20work%2C%20we%20propose%20CFM%2C%20a%20language-aligned%20concept%20foundation%20model%20for%20vision%20that%20provides%20fine-grained%20concepts%2C%20which%20are%20human-interpretable%20and%20spatially%20grounded%20in%20the%20input%20image.%20When%20paired%20with%20a%20foundation%20model%20with%20strong%20semantic%20representations%2C%20we%20get%20explanations%20for%20any%20of%20its%20downstream%20tasks.%20Examining%20local%20co-occurrence%20dependencies%20of%20concepts%20allows%20us%20to%20define%20concept%20relationships%20through%20which%20we%20improve%20concept%20naming%20and%20obtain%20richer%20explanations.%20On%20benchmark%20data%2C%20we%20show%20that%20CFM%20provides%20performance%20on%20classification%2C%20segmentation%2C%20and%20captioning%20that%20is%20competitive%20with%20opaque%20foundation%20models%20while%20providing%20fine-grained%2C%20high%20quality%20concept-based%20explanations.%20Code%20at%20https%3A//github.com/kawi19/CFM.&entry.1838667208=http%3A//arxiv.org/abs/2601.13798v2&entry.124074799=Read"},
{"title": "Demystifing Video Reasoning", "author": "Ruisi Wang and Zhongang Cai and Fanyi Pu and Junxiang Xu and Wanqi Yin and Maijunxian Wang and Ran Ji and Chenyang Gu and Bo Li and Ziqi Huang and Hokin Deng and Dahua Lin and Ziwei Liu and Lei Yang", "abstract": "Recent advances in video generation have revealed an unexpected phenomenon: diffusion-based video models exhibit non-trivial reasoning capabilities. Prior work attributes this to a Chain-of-Frames (CoF) mechanism, where reasoning is assumed to unfold sequentially across video frames. In this work, we challenge this assumption and uncover a fundamentally different mechanism. We show that reasoning in video models instead primarily emerges along the diffusion denoising steps. Through qualitative analysis and targeted probing experiments, we find that models explore multiple candidate solutions in early denoising steps and progressively converge to a final answer, a process we term Chain-of-Steps (CoS). Beyond this core mechanism, we identify several emergent reasoning behaviors critical to model performance: (1) working memory, enabling persistent reference; (2) self-correction and enhancement, allowing recovery from incorrect intermediate solutions; and (3) perception before action, where early steps establish semantic grounding and later steps perform structured manipulation. During a diffusion step, we further uncover self-evolved functional specialization within Diffusion Transformers, where early layers encode dense perceptual structure, middle layers execute reasoning, and later layers consolidate latent representations. Motivated by these insights, we present a simple training-free strategy as a proof-of-concept, demonstrating how reasoning can be improved by ensembling latent trajectories from identical models with different random seeds. Overall, our work provides a systematic understanding of how reasoning emerges in video generation models, offering a foundation to guide future research in better exploiting the inherent reasoning dynamics of video models as a new substrate for intelligence.", "link": "http://arxiv.org/abs/2603.16870v1", "date": "2026-03-17", "relevancy": 2.9646, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.605}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5869}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5869}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Demystifing%20Video%20Reasoning&body=Title%3A%20Demystifing%20Video%20Reasoning%0AAuthor%3A%20Ruisi%20Wang%20and%20Zhongang%20Cai%20and%20Fanyi%20Pu%20and%20Junxiang%20Xu%20and%20Wanqi%20Yin%20and%20Maijunxian%20Wang%20and%20Ran%20Ji%20and%20Chenyang%20Gu%20and%20Bo%20Li%20and%20Ziqi%20Huang%20and%20Hokin%20Deng%20and%20Dahua%20Lin%20and%20Ziwei%20Liu%20and%20Lei%20Yang%0AAbstract%3A%20Recent%20advances%20in%20video%20generation%20have%20revealed%20an%20unexpected%20phenomenon%3A%20diffusion-based%20video%20models%20exhibit%20non-trivial%20reasoning%20capabilities.%20Prior%20work%20attributes%20this%20to%20a%20Chain-of-Frames%20%28CoF%29%20mechanism%2C%20where%20reasoning%20is%20assumed%20to%20unfold%20sequentially%20across%20video%20frames.%20In%20this%20work%2C%20we%20challenge%20this%20assumption%20and%20uncover%20a%20fundamentally%20different%20mechanism.%20We%20show%20that%20reasoning%20in%20video%20models%20instead%20primarily%20emerges%20along%20the%20diffusion%20denoising%20steps.%20Through%20qualitative%20analysis%20and%20targeted%20probing%20experiments%2C%20we%20find%20that%20models%20explore%20multiple%20candidate%20solutions%20in%20early%20denoising%20steps%20and%20progressively%20converge%20to%20a%20final%20answer%2C%20a%20process%20we%20term%20Chain-of-Steps%20%28CoS%29.%20Beyond%20this%20core%20mechanism%2C%20we%20identify%20several%20emergent%20reasoning%20behaviors%20critical%20to%20model%20performance%3A%20%281%29%20working%20memory%2C%20enabling%20persistent%20reference%3B%20%282%29%20self-correction%20and%20enhancement%2C%20allowing%20recovery%20from%20incorrect%20intermediate%20solutions%3B%20and%20%283%29%20perception%20before%20action%2C%20where%20early%20steps%20establish%20semantic%20grounding%20and%20later%20steps%20perform%20structured%20manipulation.%20During%20a%20diffusion%20step%2C%20we%20further%20uncover%20self-evolved%20functional%20specialization%20within%20Diffusion%20Transformers%2C%20where%20early%20layers%20encode%20dense%20perceptual%20structure%2C%20middle%20layers%20execute%20reasoning%2C%20and%20later%20layers%20consolidate%20latent%20representations.%20Motivated%20by%20these%20insights%2C%20we%20present%20a%20simple%20training-free%20strategy%20as%20a%20proof-of-concept%2C%20demonstrating%20how%20reasoning%20can%20be%20improved%20by%20ensembling%20latent%20trajectories%20from%20identical%20models%20with%20different%20random%20seeds.%20Overall%2C%20our%20work%20provides%20a%20systematic%20understanding%20of%20how%20reasoning%20emerges%20in%20video%20generation%20models%2C%20offering%20a%20foundation%20to%20guide%20future%20research%20in%20better%20exploiting%20the%20inherent%20reasoning%20dynamics%20of%20video%20models%20as%20a%20new%20substrate%20for%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16870v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDemystifing%2520Video%2520Reasoning%26entry.906535625%3DRuisi%2520Wang%2520and%2520Zhongang%2520Cai%2520and%2520Fanyi%2520Pu%2520and%2520Junxiang%2520Xu%2520and%2520Wanqi%2520Yin%2520and%2520Maijunxian%2520Wang%2520and%2520Ran%2520Ji%2520and%2520Chenyang%2520Gu%2520and%2520Bo%2520Li%2520and%2520Ziqi%2520Huang%2520and%2520Hokin%25 {"title": "SOMA: Unifying Parametric Human Body Models", "author": "Jun Saito and Jiefeng Li and Michael de Ruyter and Miguel Guerrero and Edy Lim and Ehsan Hassani and Roger Blanco Ribera and Hyejin Moon and Magdalena Dadela and Marco Di Lucca and Qiao Wang and Xueting Li and Jan Kautz and Simon Yuen and Umar Iqbal", "abstract": "Parametric human body models are foundational to human reconstruction, animation, and simulation, yet they remain mutually incompatible: SMPL, SMPL-X, MHR, Anny, and related models each diverge in mesh topology, skeletal structure, shape parameterization, and unit convention, making it impractical to exploit their complementary strengths within a single pipeline. We present SOMA, a unified body layer that bridges these heterogeneous representations through three abstraction layers. Mesh topology abstraction maps any source model's identity to a shared canonical mesh in constant time per vertex. Skeletal abstraction recovers a full set of identity-adapted joint transforms from any body shape, whether in rest pose or an arbitrary posed configuration, in a single closed-form pass, with no iterative optimization or per-model training. Pose abstraction inverts the skinning pipeline to recover unified skeleton rotations directly from posed vertices of any supported model, enabling heterogeneous motion datasets to be consumed without custom retargeting. Together, these layers reduce the $O(M^2)$ per-pair adapter problem to $O(M)$ single-backend connectors, letting practitioners freely mix identity sources and pose data at inference time. The entire pipeline is fully differentiable end-to-end and GPU-accelerated via NVIDIA-Warp.", "link": "http://arxiv.org/abs/2603.16858v1", "date": "2026-03-17", "relevancy": 2.9586, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6072}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6047}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SOMA%3A%20Unifying%20Parametric%20Human%20Body%20Models&body=Title%3A%20SOMA%3A%20Unifying%20Parametric%20Human%20Body%20Models%0AAuthor%3A%20Jun%20Saito%20and%20Jiefeng%20Li%20and%20Michael%20de%20Ruyter%20and%20Miguel%20Guerrero%20and%20Edy%20Lim%20and%20Ehsan%20Hassani%20and%20Roger%20Blanco%20Ribera%20and%20Hyejin%20Moon%20and%20Magdalena%20Dadela%20and%20Marco%20Di%20Lucca%20and%20Qiao%20Wang%20and%20Xueting%20Li%20and%20Jan%20Kautz%20and%20Simon%20Yuen%20and%20Umar%20Iqbal%0AAbstract%3A%20Parametric%20human%20body%20models%20are%20foundational%20to%20human%20reconstruction%2C%20animation%2C%20and%20simulation%2C%20yet%20they%20remain%20mutually%20incompatible%3A%20SMPL%2C%20SMPL-X%2C%20MHR%2C%20Anny%2C%20and%20related%20models%20each%20diverge%20in%20mesh%20topology%2C%20skeletal%20structure%2C%20shape%20parameterization%2C%20and%20unit%20convention%2C%20making%20it%20impractical%20to%20exploit%20their%20complementary%20strengths%20within%20a%20single%20pipeline.%20We%20present%20SOMA%2C%20a%20unified%20body%20layer%20that%20bridges%20these%20heterogeneous%20representations%20through%20three%20abstraction%20layers.%20Mesh%20topology%20abstraction%20maps%20any%20source%20model%27s%20identity%20to%20a%20shared%20canonical%20mesh%20in%20constant%20time%20per%20vertex.%20Skeletal%20abstraction%20recovers%20a%20full%20set%20of%20identity-adapted%20joint%20transforms%20from%20any%20body%20shape%2C%20whether%20in%20rest%20pose%20or%20an%20arbitrary%20posed%20configuration%2C%20in%20a%20single%20closed-form%20pass%2C%20with%20no%20iterative%20optimization%20or%20per-model%20training.%20Pose%20abstraction%20inverts%20the%20skinning%20pipeline%20to%20recover%20unified%20skeleton%20rotations%20directly%20from {"title": "Learning Human-Object Interaction for 3D Human Pose Estimation from LiDAR Point Clouds", "author": "Daniel Sungho Jung and Dohee Cho and Kyoung Mu Lee", "abstract": "Understanding humans from LiDAR point clouds is one of the most critical tasks in autonomous driving due to its close relationships with pedestrian safety, yet it remains challenging in the presence of diverse human-object interactions and cluttered backgrounds. Nevertheless, existing methods largely overlook the potential of leveraging human-object interactions to build robust 3D human pose estimation frameworks. There are two major challenges that motivate the incorporation of human-object interaction. First, human-object interactions introduce spatial ambiguity between human and object points, which often leads to erroneous 3D human keypoint predictions in interaction regions. Second, there exists severe class imbalance in the number of points between interacting and non-interacting body parts, with the interaction-frequent regions such as hand and foot being sparsely observed in LiDAR data. To address these challenges, we propose a Human-Object Interaction Learning (HOIL) framework for robust 3D human pose estimation from LiDAR point clouds. To mitigate the spatial ambiguity issue, we present human-object interaction-aware contrastive learning (HOICL) that effectively enhances feature discrimination between human and object points, particularly in interaction regions. To alleviate the class imbalance issue, we introduce contact-aware part-guided pooling (CPPool) that adaptively reallocates representational capacity by compressing overrepresented points while preserving informative points from interacting body parts. In addition, we present an optional contact-based temporal refinement that refines erroneous per-frame keypoint estimates using contact cues over time. As a result, our HOIL effectively leverages human-object interaction to resolve spatial ambiguity and class imbalance in interaction regions. Codes will be released.", "link": "http://arxiv.org/abs/2603.16343v1", "date": "2026-03-17", "relevancy": 2.9575, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6014}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5969}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5763}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Human-Object%20Interaction%20for%203D%20Human%20Pose%20Estimation%20from%20LiDAR%20Point%20Clouds&body=Title%3A%20Learning%20Human-Object%20Interaction%20for%203D%20Human%20Pose%20Estimation%20from%20LiDAR%20Point%20Clouds%0AAuthor%3A%20Daniel%20Sungho%20Jung%20and%20Dohee%20Cho%20and%20Kyoung%20Mu%20Lee%0AAbstract%3A%20Understanding%20humans%20from%20LiDAR%20point%20clouds%20is%20one%20of%20the%20most%20critical%20tasks%20in%20autonomous%20driving%20due%20to%20its%20close%20relationships%20with%20pedestrian%20safety%2C%20yet%20it%20remains%20challenging%20in%20the%20presence%20of%20diverse%20human-object%20interactions%20and%20cluttered%20backgrounds.%20Nevertheless%2C%20existing%20methods%20largely%20overlook%20the%20potential%20of%20leveraging%20human-object%20interactions%20to%20build%20robust%203D%20human%20pose%20estimation%20frameworks.%20There%20are%20two%20major%20challenges%20that%20motivate%20the%20incorporation%20of%20human-object%20interaction.%20First%2C%20human-object%20interactions%20introduce%20spatial%20ambiguity%20between%20human%20and%20object%20points%2C%20which%20often%20leads%20to%20erroneous%203D%20human%20keypoint%20predictions%20in%20interaction%20regions.%20Second%2C%20there%20exists%20severe%20class%20imbalance%20in%20the%20number%20of%20points%20between%20interacting%20and%20non-interacting%20body%20parts%2C%20with%20the%20interaction-frequent%20regions%20such%20as%20hand%20and%20foot%20being%20sparsely%20observed%20in%20LiDAR%20data.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20Human-Object%20Interaction%20Learning%20%28HOIL%29%20framework%20for%20robust%203D%20human%20pose%20estimation%20from%20LiDAR%20point%20clouds.%20To%20mitigate%20the%20spatial%20ambiguity%20issue%2C%20we%20present%20human-object%20interaction-aware%20contrastive%20learning%20%28HOICL%29%20that%20effectively%20enhances%20feature%20discrimination%20between%20human%20and%20object%20points%2C%20particularly%20in%20interaction%20regions.%20To%20alleviate%20the%20class%20imbalance%20issue%2C%20we%20introduce%20contact-aware%20part-guided%20pooling%20%28CPPool%29%20that%20adaptively%20reallocates%20representational%20capacity%20by%20compressing%20overrepresented%20points%20while%20preserving%20informative%20points%20from%20interacting%20body%20parts.%20In%20addition%2C%20we%20present%20an%20optional%20contact-based%20temporal%20refinement%20that%20refines%20erroneous%20per-frame%20keypoint%20estimates%20using%20contact%20cues%20over%20time.%20As%20a%20result%2C%20our%20HOIL%20effectively%20leverages%20human-object%20interaction%20to%20resolve%20spatial%20ambiguity%20and%20class%20imbalance%20in%20interaction%20regions.%20Codes%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16343v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Human-Object%2520Interaction%2520for%25203D%2520Human%2520Pose%2520Estimation%2520from%2520LiDAR%2520Point%2520Clouds%26entry.906535625%3DDaniel%2520Sungho%2520Jung%2520and%2520Dohee%2520Cho%2520and%2520Kyoung%2520Mu%2520Lee%26entry.1292438233%3DUnderstanding%2520humans%2520from%2520LiDAR%2520point%2520clouds%2520is%2520one%2520of%2520the%2520most%2520critical%2520tasks%2520in%2520autonomous%2520driv {"title": "ManiTwin: Scaling Data-Generation-Ready Digital Object Dataset to 100K", "author": "Kaixuan Wang and Tianxing Chen and Jiawei Liu and Honghao Su and Shaolong Zhu and Minxuan Wang and Zixuan Li and Yue Chen and Huan-ang Gao and Yusen Qin and Jiawei Wang and Qixuan Zhang and Lan Xu and Jingyi Yu and Yao Mu and Ping Luo", "abstract": "Learning in simulation provides a useful foundation for scaling robotic manipulation capabilities. However, this paradigm often suffers from a lack of data-generation-ready digital assets, in both scale and diversity. In this work, we present ManiTwin, an automated and efficient pipeline for generating data-generation-ready digital object twins. Our pipeline transforms a single image into simulation-ready and semantically annotated 3D asset, enabling large-scale robotic manipulation data generation. Using this pipeline, we construct ManiTwin-100K, a dataset containing 100K high-quality annotated 3D assets. Each asset is equipped with physical properties, language descriptions, functional annotations, and verified manipulation proposals. Experiments demonstrate that ManiTwin provides an efficient asset synthesis and annotation workflow, and that ManiTwin-100K offers high-quality and diverse assets for manipulation data generation, random scene synthesis, and VQA data generation, establishing a strong foundation for scalable simulation data synthesis and policy learning. Our webpage is available at https://manitwin.github.io/.", "link": "http://arxiv.org/abs/2603.16866v1", "date": "2026-03-17", "relevancy": 2.9553, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5969}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5969}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5794}], "mailto": "ma age%20is%20available%20at%20https%3A//manitwin.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16866v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DManiTwin%253A%2520Scaling%2520Data-Generation-Ready%2520Digital%2520Object%2520Dataset%2520to%2520100K%26entry.906535625%3DKaixuan%2520Wang%2520and%2520Tianxing%2520Chen%2520and%2520Jiawei%2520Liu%2520and%2520Honghao%2520Su%2520and%2520Shaolong%2520Zhu%2520and%2520Minxuan%2520Wang%2520and%2520Zixuan%2520Li%2520and%2520Yue%2520Chen%2520and%2520Huan-ang%2520Gao%2520and%2520Yusen%2520Qin%2520and%2520Jiawei%2520Wang%2520and%2520Qixuan%2520Zhang%2520and%2520Lan%2520Xu%2520and%2520Jingyi%2520Yu%2520and%2520Yao%2520Mu%2520and%2520Ping%2520Luo%26entry.1292438233%3DLearning%2520in%2520simulation%2520provides%2520a%2520useful%2520foundation%2520for%2520scaling%2520robotic%2520manipulation%2520capabilities.%2520However%252C%2520this%2520paradigm%2520often%2520suffers%2520from%2520a%2520lack%2520of%2520data-generation-ready%2520digital%2520assets%252C%2520in%2520both%2520scale%2520and%2520diversity.%2520In%2520this%2520work%252C%2520we%2520present%2520ManiTwin%252C%2520an%2520automated%2520and%2520efficient%2520pipeline%2520for%2520generating%2520data-generation-ready%2520digital%2520object%2520twins.%2520Our%2520pipeline%2520transforms%2520a%2520single%2520image%2520into%2520simulation-ready%2520and%2520semantically%2520annotated%25203D%2520asset%252C%2520enabling%2520large-scale%2520robotic%2520manipulation%2520data%2520generation.%2520Using%2520this%2520pipeline%252C%2520we%2520construct%2520ManiTwin-100K%252C%2520a%2520dataset%2520containing%2520100K%2520high-quality%2520annotated%25203D%2520assets.%2520Each%2520asset%2520is%2520equipped%2520with%2520physical%2520properties%252C%2520language%2520descriptions%252C%2520functional%2520annotations%252C%2520and%2520verified%2520manipulation%2520proposals.%2520Experiments%2520demonstrate%2520

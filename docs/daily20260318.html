{"title": "VideoReasonBench: Can MLLMs Perform Vision-Centric Complex Video Reasoning?", "author": "Yuanxin Liu and Kun Ouyang and Haoning Wu and Yi Liu and Lin Sui and Xinhao Li and Yan Zhong and Y. Charles and Xinyu Zhou and Xu Sun", "abstract": "Recent studies have shown that long chain-of-thought (CoT) reasoning can significantly enhance the performance of large language models (LLMs) on complex tasks. However, this benefit is yet to be demonstrated in the domain of video understanding, since most existing benchmarks lack the reasoning depth required to demonstrate the advantages of extended CoT chains. While recent efforts have proposed benchmarks aimed at video reasoning, the tasks are often knowledge-driven and do not rely heavily on visual content. To bridge this gap, we introduce VideoReasonBench, a benchmark designed to evaluate vision-centric, complex video reasoning. To ensure visual richness and high reasoning complexity, each video in VideoReasonBench depicts a sequence of fine-grained operations on a latent state that is only visible in part of the video. The questions evaluate three escalating levels of video reasoning skills: recalling observed visual information, inferring the content of latent states, and predicting information beyond the video. Under such task setting, models have to precisely recall multiple operations in the video, and perform step-by-step reasoning to get correct final answers for these questions. Using VideoReasonBench, we comprehensively evaluate 18 state-of-the-art multimodal LLMs (MLLMs), finding that most perform poorly on complex video reasoning -- e.g., GPT-4o achieves only 6.9% accuracy -- while the thinking-enhanced Gemini-2.5-Pro significantly outperforms others with 56.0% accuracy. Our investigations on \"test-time scaling\" further reveal that extended thinking budget, while offering none or minimal benefits on existing video benchmarks, is essential for improving the performance on VideoReasonBench.", "link": "http://arxiv.org/abs/2505.23359v2", "date": "2026-03-17", "relevancy": 2.4396, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6265}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6265}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5272}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoReasonBench%3A%20Can%20MLLMs%20Perform%20Vision-Centric%20Complex%20Video%20Reasoning%3F&body=Title%3A%20VideoReasonBench%3A%20Can%20MLLMs%20Perform%20Vision-Centric%20Complex%20Video%20Reasoning%3F%0AAuthor%3A%20Yuanxin%20Liu%20and%20Kun%20Ouyang%20and%20Haoning%20Wu%20and%20Yi%20Liu%20and%20Lin%20Sui%20and%20Xinhao%20Li%20and%20Yan%20Zhong%20and%20Y.%20Charles%20and%20Xinyu%20Zhou%20and%20Xu%20Sun%0AAbstract%3A%20Recent%20studies%20have%20shown%20that%20long%20chain-of-thought%20%28CoT%29%20reasoning%20can%20significantly%20enhance%20the%20performance%20of%20large%20language%20models%20%28LLMs%29%20on%20complex%20tasks.%20However%2C%20this%20benefit%20is%20yet%20to%20be%20demonstrated%20in%20the%20domain%20of%20video%20understanding%2C%20since%20most%20existing%20benchmarks%20lack%20the%20reasoning%20depth%20required%20to%20demonstrate%20the%20advantages%20of%20extended%20CoT%20chains.%20While%20recent%20efforts%20have%20proposed%20benchmarks%20aimed%20at%20video%20reasoning%2C%20the%20tasks%20are%20often%20knowledge-driven%20and%20do%20not%20rely%20heavily%20on%20visual%20content.%20To%20bridge%20this%20gap%2C%20we%20introduce%20VideoReasonBench%2C%20a%20benchmark%20designed%20to%20evaluate%20vision-centric%2C%20complex%20video%20reasoning.%20To%20ensure%20visual%20richness%20and%20high%20reasoning%20complexity%2C%20each%20video%20in%20VideoReasonBench%20depicts%20a%20sequence%20of%20fine-grained%20operations%20on%20a%20latent%20state%20that%20is%20only%20visible%20in%20part%20of%20the%20video.%20The%20questions%20evaluate%20three%20escalating%20levels%20of%20video%20reasoning%20skills%3A%20recalling%20observed%20visual%20information%2C%20inferring%20the%20content%20of%20latent%20states%2C%20and%20predicting%20information%20beyond%20the%20video.%20Under%20such%20task%20setting%2C%20models%20have%20to%20precisely%20recall%20multiple%20operations%20in%20the%20video%2C%20and%20perform%20step-by-step%20reasoning%20to%20get%20correct%20final%20answers%20for%20these%20questions.%20Using%20VideoReasonBench%2C%20we%20comprehensively%20evaluate%2018%20state-of-the-art%20multimodal%20LLMs%20%28MLLMs%29%2C%20finding%20that%20most%20perform%20poorly%20on%20complex%20video%20reasoning%20--%20e.g.%2C%20GPT-4o%20achieves%20only%206.9%25%20accuracy%20--%20while%20the%20thinking-enhanced%20Gemini-2.5-Pro%20significantly%20outperforms%20others%20with%2056.0%25%20accuracy.%20Our%20investigations%20on%20%22test-time%20scaling%22%20further%20reveal%20that%20extended%20thinking%20budget%2C%20while%20offering%20none%20or%20minimal%20benefits%20on%20existing%20video%20benchmarks%2C%20is%20essential%20for%20improving%20the%20performance%20on%20VideoReasonBench.%0ALink%3A%20http%3A//arxiv.org/abs/2505.23359v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoReasonBench%253A%2520Can%2520MLLMs%2520Perform%2520Vision-Centric%2520Complex%2520Video%2520Reasoning%253F%26entry.906535625%3DYuanxin%2520Liu%2520and%2520Kun%2520Ouyang%2520and%2520Haoning%2520Wu%2520and%2520Yi%2520Liu%2520and%2520Lin%2520Sui%2520and%2520Xinhao%2520Li%2520and%2520Yan%2520Zhong%2520and%2520Y.%2520Charles%2520and%2520Xinyu%2520Zhou%2520and%2520Xu%2520Sun%26entry.1292438233%3DRecent%2520studies%2520have%2520shown%2520that%2520long% {"title": "Aletheia: What Makes RLVR For Code Verifiers Tick?", "author": "Vatsal Venkatkrishna and Indraneil Paul and Iryna Gurevych", "abstract": "Multi-domain thinking verifiers trained via Reinforcement Learning with Verifiable Rewards (RLVR) are a cornerstone of modern post-training. However, their adoption in code generation has lagged behind execution feedback due to the prohibitive costs of the full RLVR pipeline. In this work, we ablate three primary drivers of RLVR performance and cost: intermediate thinking traces, learning from negative samples, and on-policy training. We introduce Aletheia, a controlled, execution-grounded testbed to facilitate a contamination-free analysis of code verifiers across disparate model sizes and covariate shifts. Our analysis reveals that the optimal training recipe is scale-dependent: on-policy learning is the primary performance driver for small verifiers, whereas thinking traces become the most vital factor for larger sizes. Furthermore, we show that negative samples stabilize training at large sizes, and scaling inference-time compute cannot compensate for any core RLVR component. These findings provide a compute-optimal roadmap for practitioners, offering concrete strategies to simplify verifier training based on model size. Consequently, our work establishes a foundation for scalable supervision, enabling efficiently trained code verifiers to reliably supervise much larger code generation policies.", "link": "http://arxiv.org/abs/2601.12186v2", "date": "2026-03-17", "relevancy": 2.4357, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4894}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.486}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Aletheia%3A%20What%20Makes%20RLVR%20For%20Code%20Verifiers%20Tick%3F&body=Title%3A%20Aletheia%3A%20What%20Makes%20RLVR%20For%20Code%20Verifiers%20Tick%3F%0AAuthor%3A%20Vatsal%20Venkatkrishna%20and%20Indraneil%20Paul%20and%20Iryna%20Gurevych%0AAbstract%3A%20Multi-domain%20thinking%20verifiers%20trained%20via%20Reinforcement%20Learning%20with%20Verifiable%20Rewards%20%28RLVR%29%20are%20a%20cornerstone%20of%20modern%20post-training.%20However%2C%20their%20adoption%20in%20code%20generation%20has%20lagged%20behind%20execution%20feedback%20due%20to%20the%20prohibitive%20costs%20of%20the%20full%20RLVR%20pipeline.%20In%20this%20work%2C%20we%20ablate%20three%20primary%20drivers%20of%20RLVR%20performance%20and%20cost%3A%20intermediate%20thinking%20traces%2C%20learning%20from%20negative%20samples%2C%20and%20on-policy%20training.%20We%20introduce%20Aletheia%2C%20a%20controlled%2C%20execution-grounded%20testbed%20to%20facilitate%20a%20contamination-free%20analysis%20of%20code%20verifiers%20across%20disparate%20model%20sizes%20and%20covariate%20shifts.%20Our%20analysis%20reveals%20that%20the%20optimal%20training%20recipe%20is%20scale-dependent%3A%20on-policy%20learning%20is%20the%20primary%20performance%20driver%20for%20small%20verifiers%2C%20whereas%20thinking%20traces%20become%20the%20most%20vital%20factor%20for%20larger%20sizes.%20Furthermore%2C%20we%20show%20that%20negative%20samples%20stabilize%20training%20at%20large%20sizes%2C%20and%20scaling%20inference-time%20compute%20cannot%20compensate%20for%20any%20core%20RLVR%20component.%20These%20findings%20provide%20a%20compute-optimal%20roadmap%20for%20practitioners%2C%20offering%20concrete%20strategies%20to%20simplify%20verifier%20training%20based%20on%20model%20size.%20Consequently%2C%20our%20work%20establishes%20a%20foundation%20for%20scalable%20supervision%2C%20enabling%20efficiently%20trained%20code%20verifiers%20to%20r {"title": "Dexterous grasp data augmentation based on grasp synthesis with fingertip workspace cloud and contact-aware sampling", "author": "Liqi Wu and Haoyu Jia and Kento Kawaharazuka and Hirokazu Ishida and Kei Okada", "abstract": "Robotic grasping is a fundamental yet crucial component of robotic applications, as effective grasping often serves as the starting point for various tasks. With the rapid advancement of neural networks, data-driven approaches for robotic grasping have become mainstream. However, efficiently generating grasp datasets for training remains a bottleneck. This is compounded by the diverse structures of robotic hands, making the design of generalizable grasp generation methods even more complex. In this work, we propose a teleoperation-based framework to collect a small set of grasp pose demonstrations, which are augmented using FSG--a Fingertip-contact-aware Sampling-based Grasp generator. Based on the demonstrated grasp poses, we propose AutoWS, which automatically generates structured workspace clouds of robotic fingertips, embedding the hand structure information directly into the clouds to eliminate the need for inverse kinematics calculations. Experiments on grasping the YCB objects show that our method significantly outperforms existing approaches in both speed and valid pose generation rate. Our framework enables real-time grasp generation for hands with arbitrary structures and produces human-like grasps when combined with demonstrations, providing an efficient and robust data augmentation tool for data-driven grasp training.", "link": "http://arxiv.org/abs/2603.16609v1", "date": "2026-03-17", "relevancy": 2.4356, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.7163}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5542}, {"title": "GST: Precise {"title": "$D^3$-RSMDE: 40$\\times$ Faster and High-Fidelity Remote Sensing Monocular Depth Estimation", "author": "Ruizhi Wang and Weihan Li and Zunlei Feng and Haofei Zhang and Mingli Song and Jiayu Wang and Jie Song and Li Sun", "abstract": "Real-time, high-fidelity monocular depth estimation from remote sensing imagery is crucial for numerous applications, yet existing methods face a stark trade-off between accuracy and efficiency. Although using Vision Transformer (ViT) backbones for dense prediction is fast, they often exhibit poor perceptual quality. Conversely, diffusion models offer high fidelity but at a prohibitive computational cost. To overcome these limitations, we propose Depth Detail Diffusion for Remote Sensing Monocular Depth Estimation ($D^3$-RSMDE), an efficient framework designed to achieve an optimal balance between speed and quality. Our framework first leverages a ViT-based module to rapidly generate a high-quality preliminary depth map construction, which serves as a structural prior, effectively replacing the time-consuming initial structure generation stage of diffusion models. Based on this prior, we propose a Progressive Linear Blending Refinement (PLBR) strategy, which uses a lightweight U-Net to refine the details in only a few iterations. The entire refinement step operates efficiently in a compact latent space supported by a Variational Autoencoder (VAE). Extensive experiments demonstrate that $D^3$-RSMDE achieves a notable 11.85% reduction in the Learned Perceptual Image Patch Similarity (LPIPS) perceptual metric over leading models like Marigold, while also achieving over a 40x speedup in inference and maintaining VRAM usage comparable to lightweight ViT models.", "link": "http://arxiv.org/abs/2603.16362v1", "date": "2026-03-17", "relevancy": 2.4336, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6486}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6013}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5994}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24D%5E3%24-RSMDE%3A%2040%24%5Ctimes%24%20Faster%20and%20High-Fidelity%20Remote%20Sensing%20Monocular%20Depth%20Estimation&body=Title%3A%20%24D%5E3%24-RSMDE%3A%2040%24%5Ctimes%24%20Faster%20and%20High-Fidelity%20Remote%20Sensing%20Monocular%20Depth%20Estimation%0AAuthor%3A%20Ruizhi%20Wang%20and%20Weihan%20Li%20and%20Zunlei%20Feng%20and%20Haofei%20Zhang%20and%20Mingli%20Song%20and%20Jiayu%20Wang%20and%20Jie%20Song%20and%20Li%20Sun%0AAbstract%3A%20Real-time%2C%20high-fidelity%20monocular%20depth%20estimation%20from%20remote%20sensing%20imagery%20is%20crucial%20for%20numerous%20applications%2C%20yet%20existing%20methods%20face%20a%20stark%20trade-off%20between%20accuracy%20and%20efficiency.%20Although%20using%20Vision%20Transformer%20%28ViT%29%20backbones%20for%20dense%20prediction%20is%20fast%2C%20they%20often%20exhibit%20poor%20perceptual%20quality.%20Conversely%2C%20diffusion%20models%20offer%20high%20fidelity%20but%20at%20a%20prohibitive%20computational%20cost.%20To%20overcome%20these%20limitations%2C%20we%20propose%20Depth%20Detail%20Diffusion%20for%20Remote%20Sensing%20Monocular%20Depth%20Estimation%20%28%24D%5E3%24-RSMDE%29%2C%20an%20efficient%20framework%20designed%20to%20achieve%20an%20optimal%20balance%20between%20speed%20and%20quality.%20Our%20framework%20first%20leverages%20a%20ViT-based%20module%20to%20rapidly%20generate%20a%20high-quality%20preliminary%20depth%20map%20construction%2C%20which%20serves%20as%20a%20structural%20prior%2C%20effectively%20replacing%20the%20time-consuming%20initial%20structure%20generation%20stage%20of%20diffusion%20models.%20Based%20on%20this%20prior%2C%20we%20propose%20a%20Progressive%20Linear%20Blending%20Refinement%20%28PLBR%29%20strategy%2C%20which%20uses%20a%20lightweight%20U-Net%20to%20refine%20the%20details%20in%20only%20a%20few%20iterations.%20The%20entire%20refinement%20step%20operates%20efficiently%20in%20a%20compact%20latent%20space%20supported%20by%20a%20Variational%20Autoencoder%20%28VAE%29.%20Extensive%20experiments%20demonstrate%20that%20%24D%5E3%24-RSMDE%20achieves%20a%20notable%2011.85%25%20reduction%20in%20the%20Learned%20Perceptual%20Image%20Patch%20Similarity%20%28LPIPS%29%20perceptual%20metric%20over%20leading%20models%20like%20Marigold%2C%20while%20also%20achieving%20over%20a%2040x%20speedup%20in%20inference%20and%20maintaining%20VRAM%20usage%20comparable%20to%20lightweight%20ViT%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16362v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2524D%255E3%2524-RSMDE%253A%252040%2524%255Ctimes%2524%2520Faster%2520and%2520High-Fidelity%2520Remote%2520Sensing%2520Monocular%2520Depth%2520Estimation%26entry.906535625%3DRuizhi%2520Wang%2520and%2520Weihan%2520Li%2520and%2520Zunlei%2520Feng%2520and%2520Haofei%2520Zhang%2520and%2520Mingli%2520Song%2520and%2520Jiayu%2520Wang%2520and%2520Jie%2520Song%2520and%2520Li%2520Sun%26entry.1292438233%3DReal-time%252C%2520high-fidelity%2520monocular%2520depth%2520estimation%2520from%2520remote%2520sensing%2520imagery%2520is%2520crucial%2520for%2520numerous%2520applications%252C%2520yet%2520existing%2520methods%2520face%2520a%2520stark%2520trade-off%2520between%2520accuracy%2520and%2520efficiency.%2520Although%2520using%2520Vision%2520Transformer%2520%2528ViT%2529%2520backbones%2520for%2520dense%2520prediction%2520is%2520fast%252C%2520they%2520often%2520exhibit%2520poor%2520perceptual%2520quality.%2520Conversely%252C%2520diffusion%2520models%2520offer%2520high%2520fidelity%2520but%2520at%2520a%2520prohibitive%2520computational%2520cost.%2520To%2520overcome%2520these%2520limitat Remote%20Sensing%20Monocular%20Depth%20Estimation&entry.906535625=Ruizhi%20Wang%20and%20Weihan%20Li%20and%20Zunlei%20Feng%20and%20Haofei%20Zhang%20and%20Mingli%20Song%20and%20Jiayu%20Wang%20and%20Jie%20Song%20and%20Li%20Sun&entry.1292438233=Real-time%2C%20high-fidelity%20monocular%20depth%20estimation%20from%20remote%20sensing%20imagery%20is%20crucial%20for%20numerous%20applications%2C%20yet%20existing%20methods%20face%20a%20stark%20trade-off%20between%20accuracy%20and%20efficiency.%20Although%20using%20Vision%20Transformer%20%28ViT%29%20backbones%20for%20dense%20prediction%20is%20fast%2C%20they%20often%20exhibit%20poor%20perceptual%20quality.%20Conversely%2C%20diffusion%20models%20offer%20high%20fidelity%20but%20at%20a%20prohibitive%20computational%20cost.%20To%20overcome%20these%20limitations%2C%20we%20propose%20Depth%20Detail%20Diffusion%20for%20Remote%20Sensing%20Monocular%20Depth%20Estimation%20%28%24D%5E3%24-RSMDE%29%2C%20an%20efficient%20framework%20designed%20to%20achieve%20an%20optimal%20balance%20between%20speed%20and%20quality.%20Our%20framework%20first%20leverages%20a%20ViT-based%20module%20to%20rapidly%20generate%20a%20high-quality%20preliminary%20depth%20map%20construction%2C%20which%20serves%20as%20a%20structural%20prior%2C%20effectively%20replacing%20the%20time-consuming%20initial%20structure%20generation%20stage%20of%20diffusion%20models.%20Based%20on%20this%20prior%2C%20we%20propose%20a%20Progressive%20Linear%20Blending%20Refinement%20%28PLBR%29%20strategy%2C%20which%20uses%20a%20lightweight%20U-Net%20to%20refine%20the%20details%20in%20only%20a%20few%20iterations.%20The%20entire%20refinement%20step%20operates%20efficiently%20in%20a%20compact%20latent%20space%20supported%20by%20a%20Variational%20Autoencoder%20%28VAE%29.%20Extensive%20experiments%20demonstrate%20that%20%24D%5E3%24-RSMDE%20achieves%20a%20notable%2011.85%25%20reduction%20in%20the%20Learned%20Perceptual%20Image%20Patch%20Similarity%20%28LPIPS%29%20perceptual%20metric%20over%20leading%20 {"title": "Why the Valuable Capabilities of LLMs Are Precisely the Unexplainable Ones", "author": "Quan Cheng", "abstract": "This paper proposes and argues for a counterintuitive thesis: the truly valuable capabilities of large language models (LLMs) reside precisely in the part that cannot be fully captured by human-readable discrete rules. The core argument is a proof by contradiction via expert system equivalence: if the full capabilities of an LLM could be described by a complete set of human-readable rules, then that rule set would be functionally equivalent to an expert system; but expert systems have been historically and empirically demonstrated to be strictly weaker than LLMs; therefore, a contradiction arises -- the capabilities of LLMs that exceed those of expert systems are exactly the capabilities that cannot be rule-encoded. This thesis is further supported by the Chinese philosophical concept of Wu (sudden insight through practice), the historical failure of expert systems, and a structural mismatch between human cognitive tools and complex systems. The paper discusses implications for interpretability research, AI safety, and scientific epistemology.", "link": "http://arxiv.org/abs/2603.15238v2", "date": "2026-03-17", "relevancy": 2.4267, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5006}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4777}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4777}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20the%20Valuable%20Capabilities%20of%20LLMs%20Are%20Precisely%20the%20Unexplainable%20Ones&body=Title%3A%20Why%20the%20Valuable%20Capabilities%20of%20LLMs%20Are%20Precisely%20the%20Unexplainable%20Ones%0AAuthor%3A%20Quan%20Cheng%0AAbstract%3A%20This%20paper%20proposes%20and%20argues%20for%20a%20counterintuitive%20thesis%3A%20the%20truly%20valuable%20capabilities%20of%20large%20language%20models%20%28LLMs%29%20reside%20precisely%20in%20the%20part%20that%20cannot%20be%20fully%20captured%20by%20human-readable%20discrete%20rules.%20The%20core%20argument%20is%20a%20proof%20by%20contradiction%20via%20expert%20system%20equivalence%3A%20if%20the%20full%20capabilities%20of%20an%20LLM%20could%20be%20described%20by%20a%20complete%20set%20of%20human-readable%20rules%2C%20then%20that%20rule%20set%20would%20be%20functionally%20equivalent%20to%20an%20expert%20system%3B%20but%20expert%20systems%20have%20been%20historically%20and%20empirically%20demonstrated%20to%20be%20strictly%20weaker%20than%20LLMs%3B%20therefore%2C%20a%20contradiction%20arises%20--%20the%20capabilities%20of%20LLMs%20that%20exceed%20those%20of%20expert%20systems%20are%20exactly%20the%20capabilities%20that%20cannot%20be%20rule-encoded.%20This%20thesis%20is%20further%20supported%20by%20the%20Chinese%20philosophical%20concept%20of%20Wu%20%28sudden%20insight%20through%20practice%29%2C%20the%20historical%20failure%20of%20expert%20systems%2C%20and%20a%20structural%20mismatch%20between%20human%20cognitive%20tools%20and%20complex%20systems.%20The%20paper%20discusses%20implications%20for%20interpretability%20research%2C%20AI%20safety%2C%20and%20scientific%20epistemology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15238v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhy%2520the%2520Valuable%2520Capabilities%2520of%2520LLMs%2520Are%2520Precisely%2520the%2520Unexplainable%2520Ones%26entry.906535625%3DQuan%2520Cheng%26entry.1292438233%3DThis%2520paper%2520proposes%2520and%2520argues%2520for%2520a%2520counterintuitive%2520thesis%253A%2520the%2520truly%2520valuable%2520capabilities%2520of%2520large%2520language%2520models%2520%2528LLMs%2529%2520reside%2520precisely%2520in%2520the%2520part%2520that%2520cannot%2520be%2520fully%2520captured%2520by%2520human-readable%2520discrete%2520rules.%2520The%2520core%2520argument%2520is%2520a%2520proof%2520by%2520contradiction%2520via%2520expert%2520system%2520equivalence%253A%2520if%2520the%2520full%2520capabilities%2520of%2520an%2520LLM%2520could%2520be%2520described%2520by%2520a%2520complete%2520set%2520of%2520human-readable%2520rules%252C%2520then%2520that%2520rule%2520set%2520would%2520be%2520functionally%2520equivalent%2520to%2520an%2520expert%2520system%253B%2520but%2520expert%2520systems%2520have%2520been%2520historically%2520and%2520empirically%2520demonstrated%2520to%2520be%2520strictly%2520weaker%2520than%2520LLMs%253B%2520therefore%252C%2520a%2520contradiction%2520arises%2520--%2520the%2520capabilities%2520of%2520LLMs%2520that%2520exceed%2520those%2520of%2520expert%2520systems%2520are%2520exactly%2520the%2520capabilities%2520that%2520cannot%2520be%2520rule-encoded.%2520This%2520thesis%2520is%2520further%2520supported%2520by%2520the%2520Chinese%2520philosophical%2520concept%2520of%2520Wu%2520%2528sudden%2520insight%2520through%2520practice%2529%252C%2520the%2520historical%2520failure%2520of%2520expert%2520systems%252C%2520and%2520a%2520structural%2520mismatch%2520between%2520human%2520cognitive%2520tools%2520and%2520complex%2520systems.%2520The%2520paper%2520discusses%2520implications%2520for%2520interpretability%2520research%252C%2520AI%2520safety%252C%2520and%2520scientific%2520epistemology.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15238v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Why%20the%20Valuable%20Capabilities%20of%20LLMs%20Are%20Precisely%20the%20Unexplainable%20One {"title": "BiGraspFormer: End-to-End Bimanual Grasp Transformer", "author": "Kangmin Kim and Seunghyeok Back and Geonhyup Lee and Sangbeom Lee and Sangjun Noh and Kyoobin Lee", "abstract": "Bimanual grasping is essential for robots to handle large and complex objects. However, existing methods either focus solely on single-arm grasping or employ separate grasp generation and bimanual evaluation stages, leading to coordination problems including collision risks and unbalanced force distribution. To address these limitations, we propose BiGraspFormer, a unified end-to-end transformer framework that directly generates coordinated bimanual grasps from object point clouds. Our key idea is the Single-Guided Bimanual (SGB) strategy, which first generates diverse single grasp candidates using a transformer decoder, then leverages their learned features through specialized attention mechanisms to jointly predict bimanual poses and quality scores. This conditioning strategy reduces the complexity of the 12-DoF search space while ensuring coordinated bimanual manipulation. Comprehensive simulation experiments and real-world validation demonstrate that BiGraspFormer consistently outperforms existing methods while maintaining efficient inference speed (<0.05s), confirming the effectiveness of our framework. Code and supplementary materials are available at https://sites.google.com/view/bigraspformer", "link": "http://arxiv.org/abs/2509.19142v2", "date": "2026-03-17", "relevancy": 2.4202, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.7019}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5439}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5327}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BiGraspFormer%3A%20End-to-End%20Bimanual%20Grasp%20Transformer&body=Title%3A%20BiGraspFormer%3A%20End-to-End%20Bimanual%20Grasp%20Transformer%0AAuthor%3A%20Kangmin%20Kim%20and%20Seunghyeok%20Back%20and%20Geonhyup%20Lee%20and%20Sangbeom%20Lee%20and%20Sangjun%20Noh%20and%20Kyoobin%20Lee%0AAbstract%3A%20Bimanual%20grasping%20is%20essential%20for%20robots%20to%20handle%20large%20and%20complex%20objects.%20However%2C%20existing%20methods%20either%20focus%20solely%20on%20single-arm%20grasping%20or%20employ%20separate%20grasp%20generation%20and%20bimanual%20evaluation%20stages%2C%20leading%20to%20coordination%20problems%20including%20collision%20risks%20and%20unbalanced%20force%20distribution.%20To%20address%20these%20limitations%2C%20we%20propose%20BiGraspFormer%2C%20a%20unified%20end-to-end%20transformer%20framework%20that%20directly%20generates%20coordinated%20bimanual%20grasps%20from%20object%20point%20clouds.%20Our%20key%20idea%20is%20the%20Single-Guided%20Bimanual%20%28SGB%29%20strategy%2C%20which%20first%20generates%20diverse%20single%20grasp%20candidates%20using%20a%20transformer%20decoder%2C%20then%20leverages%20their%20learned%20features%20through%20specialized%20attention%20mechanisms%20to%20jointly%20predict%20bimanual%20poses%20and%20quality%20scores.%20This%20conditioning%20strategy%20reduces%20the%20complexity%20of%20the%2012-DoF%20search%20space%20while%20ensuring%20coordinated%20bimanual%20manipulation.%20Comprehensive%20simulation%20experiments%20and%20real-world%20validation%20demonstrate%20that%20BiGraspFormer%20consistently%20outperforms%20existing%20methods%20while%20maintaining%20efficient%20inference%20speed%20%28%3C0.05s%29%2C%20confirming%20the%20effectiveness%20of%20our%20framework.%20Code%20and%20supplementary%20materials%20are%20available%20at%20https%3A//sites.google.com/view/bigraspformer%0ALink%3A%20http%3A//arxiv.org/abs/2509.19142v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GW {"title": "Semantic One-Dimensional Tokenizer for Image Reconstruction and Generation", "author": "Yunpeng Qu and Kaidong Zhang and Yukang Ding and Ying Chen and Jian Wang", "abstract": "Visual generative models based on latent space have achieved great success, underscoring the significance of visual tokenization. Mapping images to latents boosts efficiency and enables multimodal alignment for scaling up in downstream tasks. Existing visual tokenizers primarily map images into fixed 2D spatial grids and focus on pixel-level restoration, which hinders the capture of representations with compact global semantics. To address these issues, we propose \\textbf{SemTok}, a semantic one-dimensional tokenizer that compresses 2D images into 1D discrete tokens with high-level semantics. SemTok sets a new state-of-the-art in image reconstruction, achieving superior fidelity with a remarkably compact token representation. This is achieved via a synergistic framework with three key innovations: a 2D-to-1D tokenization scheme, a semantic alignment constraint, and a two-stage generative training strategy. Building on SemTok, we construct a masked autoregressive generation framework, which yields notable improvements in downstream image generation tasks. Experiments confirm the effectiveness of our semantic 1D tokenization. Our code will be open-sourced.", "link": "http://arxiv.org/abs/2603.16373v1", "date": "2026-03-17", "relevancy": 2.3877, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6431}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5691}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5619}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20One-Dimensional%20Tokenizer%20for%20Image%20Reconstruction%20and%20Generation&body=Title%3A%20Semantic%20One-Dimensional%20Tokenizer%20for%20Image%20Reconstruction%20and%20Generation%0AAuthor%3A%20Yunpeng%20Qu%20and%20Kaidong%20Zhang%20and%20Yukang%20Ding%20and%20Ying%20Chen%20and%20Jian%20Wang%0AAbstract%3A%20Visual%20generative%20models%20based%20on%20latent%20space%20have%20achieved%20great%20success%2C%20underscoring%20the%20significance%20of%20visual%20tokenization.%20Mapping%20images%20to%20latents%20boosts%20efficiency%20and%20enables%20multimodal%20alignment%20for%20scaling%20up%20in%20downstream%20tasks.%20Existing%20visual%20tokenizers%20primarily%20map%20images%20into%20fixed%202D%20spatial%20grids%20and%20focus%20on%20pixel-level%20restoration%2C%20which%20hinders%20the%20capture%20of%20representations%20with%20compact%20global%20semantics.%20To%20address%20these%20issues%2C%20we%20propose%20%5Ctextbf%7BSemTok%7D%2C%20a%20semantic%20one-dimensional%20tokenizer%20that%20compresses%202D%20images%20into%201D%20discrete%20tokens%20with%20high-level%20semantics.%20SemTok%20sets%20a%20new%20state-of-the-art%20in%20image%20reconstruction%2C%20achieving%20superior%20fidelity%20with%20a%20remarkably%20compact%20token%20representation.%20This%20is%20achieved%20via%20a%20synergistic%20framework%20with%20three%20key%20innovations%3A%20a%202D-to-1D%20tokenization%20scheme%2C%20a%20semantic%20alignment%20constraint%2C%20and%20a%20two-stage%20generative%20training%20strategy.%20Building%20on%20SemTok%2C%20we%20construct%20a%20masked%20autoregressive%20generation%20framework%2C%20which%20yields%20notable%20improvements%20in%20downstream%20image%20generation%20tasks.%20Experiments%20confirm%20the%20effectiveness%20of%20our%20semantic%201D%20tokenization.%20Our%20code%20will%20be%20open-sourced.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16373v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic%2520One-Dimensional%2520Tokenizer%2520for%2520Image%2520Reconstruction%2520and%2520Generation%26entry.906535625%3DYunpeng%2520Qu%2520and%2520Kaidong%2520Zhang%2520and%2520Yukang%2520Ding%2520and%2520Ying%2520Chen%2520and%2520Jian%2520Wang%26entry.1292438233%3DVisual%2520generative%2520models%2520based%2520on%2520latent%2520space%2520have%2520achieved%2520great%2520success%252C%2520underscoring%2520the%2520significance%2520of%2520visual%2520tokenization.%2520Mapping%2520images%2520to%2520latents%2520boosts%2520efficiency%2520and%2520enables%2520multimodal%2520alignment%2520for%2520scaling%2520up%2520in%2520downstream%2520tasks.%2520Existing%2520visual%2520tokenizers%2520primarily%2520map%2520images%2520into%2520fixed%25202D%2520spatial%2520grids%2520and%2520focus%2520on%2520pixel-level%2520restoration%252C%2520which%2520hinders%2520the%2520capture%2520of%2520representations%2520with%2520compact%2520global%2520semantics.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520%255Ctextbf%257BSemTok%257D%252C%2520a%2520semantic%2520one-dimensional%2520tokenizer%2520that%2520compresses%25202D%2520images%2520into%25201D%2520discrete%2520tokens%2520with%2520high-level%2520semantics.%2520SemTok%2520sets%2520a%2520new%2520state-of-the-art%2520in%2520image%2520reconstruction%252C%2520achieving%2520superior%2520fidelity%2520with%2520a%2520remarkably%2520compact%2520token%2520representation.%2520This%2520is%2520achieved%2520via%2520a%2520synergistic%2520framework%2520with%2520three%2520key%2520innovations%253A%2520a%25202D-to-1D%2520tokenization%2520scheme%252C%2520a%2520semantic%2520alignment%2520constraint%252C%2520and%2520a%2520two-stage%2520generative%2520training%2520strategy.%2520Building%2520on%2520SemTok%252C%2520we%2520construct%2520a%2520masked%2520autoregressive%2520generation%2520framework%252C%2520which%2520yields%2520notable%2520improvements%2520in%2520downstream%2520image%2520generation%2520tasks.%2520Experiments%2520confirm%2520the%2520effectiveness%2520of%2520our%2520semantic%25201D%2520tokenization.%2520Our%2520code%2520will%2520be%2520open-sourced.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16373v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semantic%20One-Dimensional%20Tokenizer%20for%20Image%20Reconstruction%20and%20Generation&entry.906535625=Yunpeng%20Qu%20and%20Kaidong%20Zhang%20and%20Yukang%20Ding%20and%20Ying%20Chen%20and%20Jian%20Wang&entry.1292438233=Visual%20generative%20models%20based%20on%20latent%20space%20have%20achieved%20great%20success%2C%20underscoring%20the%20significance%20of%20visual%20tokenization.%20Mapping%20images%20to%20latents%20boosts%20efficiency%20and%20enables%20multimodal%20alignment%20for%20scaling%20up%20in%20downstream%20tasks.%20Existing%20visual%20tokenizers%20primarily%20map%20images%20into%20fixed%202D%20spatial%20grids%20and%20focus%20on%20pixel-level%20restoration%2C%20which%20hinders%20the%20capture%20of%20representations%20with%20compact%20global%20semantics.%20To%20address%20these%20issues%2C%20we%20propose%20%5Ctextbf%7BSemTok%7D%2C%20a%20semantic%20one-dimensional%20tokenizer%20that%20compresses%202D%20images%20into%201D%20discrete%20tokens%20with%20high-level%20semantics.%20SemTok%20sets%20a%20new%20state-of-the-art%20in%20image%20reconstruction%2C%20achieving%20superior%20fidelity%20with%20a%20remarkably%20compact%20token%20representation.%20This%20is%20achieved%20via%20a%20synergistic%20framework%20with%20three%20key%20innovations%3A%20a%202D-to-1D%20tokenization%20scheme%2C%20a%20semantic%20alignment%20constraint%2C%20and%20a%20two-stage%20generative%20training%20strategy.%20Building%20on%20SemTok%2C%20we%20construct%20a%20masked%20autoregressive%20generation%20framework%2C%20which%20yields%20notable%20improvements%20in%20downstream%20image%20generation%20tasks.%20Experiments%20confirm%20the%20effectiveness%20of%20our%20semantic%201D%20tokenization.%20Our%20code%20will%20be%20open-sourced.&entry.1838667208=http%3A//arxiv.org/abs/2603.16373v1&entry.124074799=Read"},
{"title": "ALPCAH: Subspace Learning for Sample-wise Heteroscedastic Data", "author": "Javier Salazar Cavazos and Jeffrey A. Fessler and Laura Balzano", "abstract": "Principal component analysis (PCA) is a key tool in the field of data dimensionality reduction. However, some applications involve heterogeneous data that vary in quality due to noise characteristics associated with each data sample. Heteroscedastic methods aim to deal with such mixed data quality. This paper develops a subspace learning method, named ALPCAH, that can estimate the sample-wise noise variances and use this information to improve the estimate of the subspace basis associated with the low-rank structure of the data. Our method makes no distributional assumptions of the low-rank component and does not assume that the noise variances are known. Further, this method uses a soft rank constraint that does not require subspace dimension to be known. Additionally, this paper develops a matrix factorized version of ALPCAH, named LR-ALPCAH, that is much faster and more memory efficient at the cost of requiring subspace dimension to be known or estimated. Simulations and real data experiments show the effectiveness of accounting for data heteroscedasticity compared to existing algorithms. Code available at https://github.com/javiersc1/ALPCAH.", "link": "http://arxiv.org/abs/2505.07272v2", "date": "2026-03-17", "relevancy": 2.3862, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4927}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4796}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4593}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ALPCAH%3A%20Subspace%20Learning%20for%20Sample-wise%20Heteroscedastic%20Data&body=Title%3A%20ALPCAH%3A%20Subspace%20Learning%20for%20Sample-wise%20Heteroscedastic%20Data%0AAuthor%3A%20Javier%20Salazar%20Cavazos%20and%20Jeffrey%20A.%20Fessler%20and%20Laura%20Balzano%0AAbstract%3A%20Principal%20component%20analysis%20%28PCA%29%20is%20a%20key%20tool%20in%20the%20field%20of%20data%20dimensionality%20reduction.%20However%2C%20some%20applications%20involve%20heterogeneous%20data%20that%20vary%20in%20quality%20due%20to%20noise%20characteristics%20associated%20with%20each%20data%20sample.%20Heteroscedastic%20methods%20aim%20to%20deal%20with%20such%20mixed%20data%20quality.%20This%20paper%20develops%20a%20subspace%20learning%20method%2C%20named%20ALPCAH%2C%20that%20can%20estimate%20the%20sample-wise%20noise%20variances%20and%20use%20this%20information%20to%20improve%20the%20estimate%20of%20the%20subspace%20basis%20associated%20with%20the%20low-rank%20structure%20of%20the%20data.%20Our%20method%20makes%20no%20distributional%20assumptions%20of%20the%20low-rank%20component%20and%20does%20not%20assume%20that%20the%20noise%20variances%20are%20known.%20Further%2C%20this%20method%20uses%20a%20soft%20rank%20constraint%20that%20does%20not%20require%20subspace%20dimension%20to%20be%20known.%20Additionally%2C%20this%20paper%20develops%20a%20matrix%20factorized%20version%20of%20ALPCAH%2C%20named%20LR-ALPCAH%2C%20that%20is%20much%20faster%20and%20more%20memory%20efficient%20at%20the%20cost%20of%20requiring%20subspace%20dimension%20to%20be%20known%20or%20estimated.%20Simulations%20and%20real%20data%20experiments%20show%20the%20effectiveness%20of%20accounting%20for%20data%20heteroscedasticity%20compared%20to%20existing%20algorithms.%20Code%20available%20at%20https%3A//github.com/javiersc1/ALPCAH.%0ALink%3A%20http%3A//arxiv.org/abs/2505.07272v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848% ed%2520to%2520existing%2520algorithms.%2520Code%2520available%2520at%2520https%253A//github.com/javiersc1/ALPCAH.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.07272v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ALPCAH%3A%20Subspace%20Learning%20for%20Sample-wise%20Heteroscedastic%20Data&entry.906535625=Javier%20Salazar%20Cavazos%20and%20Jeffrey%20A.%20Fessler%20and%20Laura%20Balzano&entry.1292438233=Principal%20component%20analysis%20%28PCA%29%20is%20a%20key%20tool%20in%20the%20field%20of%20data%20dimensionality%20reduction.%20However%2C%20some%20applications%20involve%20heterogeneous%20data%20that%20vary%20in%20quality%20due%20to%20noise%20characteristics%20associated%20with%20each%20data%20sample.%20Heteroscedastic%20methods%20aim%20to%20deal%20with%20such%20mixed%20data%20quality.%20This%20paper%20develops%20a%20subspace%20learning%20method%2C%20named%20ALPCAH%2C%20that%20can%20estimate%20the%20sample-wise%20noise%20variances%20and%20use%20this%20information%20to%20improve%20the%20estimate%20of%20the%20subspace%20basis%20associated%20with%20the%20low-rank%20structure%20of%20the%20data.%20Our%20method%20makes%20no%20distributional%20assumptions%20of%20the%20low-rank%20component%20and%20does%20not%20assume%20that%20the%20noise%20variances%20are%20known.%20Further%2C%20this%20method%20uses%20a%20soft%20rank%20constraint%20that%20does%20not%20require%20subspace%20dimension%20to%20be%20known.%20Additionally%2C%20this%20paper%20develops%20a%20matrix%20factorized%20version%20of%20ALPCAH%2C%20named%20LR-ALPCAH%2C%20that%20is%20much%20faster%20and%20more%20memory%20efficient%20at%20the%20cost%20of%20requiring%20subspace%20dimension%20to%20be%20known%20or%20estimated.%20Simulations%20and%20real%20data%20experiments%20show%20the%20effectiveness%20of%20accounting%20for%20data%20heteroscedasticity%20compared%20to%20existing%20algorithms.%20Code%20available%20at%2 {"title": "Can Linguistically Related Languages Guide LLM Translation in Low-Resource Settings?", "author": "Aishwarya Ramasethu and Niyathi Allu and Rohin Garg and Harshwardhan Fartale and Dun Li Chan", "abstract": "Large Language Models (LLMs) have achieved strong performance across many downstream tasks, yet their effectiveness in extremely low-resource machine translation remains limited. Standard adaptation techniques typically rely on large-scale parallel data or extensive fine-tuning, which are infeasible for the long tail of underrepresented languages. In this work, we investigate a more constrained question: in data-scarce settings, to what extent can linguistically similar pivot languages and few-shot demonstrations provide useful guidance for on-the-fly adaptation in LLMs? We study a data-efficient experimental setup that combines linguistically related pivot languages with few-shot in-context examples, without any parameter updates, and evaluate translation behavior under controlled conditions. Our analysis shows that while pivot-based prompting can yield improvements in certain configurations, particularly in settings where the target language is less well represented in the model's vocabulary, the gains are often modest and sensitive to few shot example construction. For closely related or better represented varieties, we observe diminishing or inconsistent gains. Our findings provide empirical guidance on how and when inference-time prompting and pivot-based examples can be used as a lightweight alternative to fine-tuning in low-resource translation settings.", "link": "http://arxiv.org/abs/2603.16660v1", "date": "2026-03-17", "relevancy": 2.3778, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4783}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4783}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.47}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20Linguistically%20Related%20Languages%20Guide%20LLM%20Translation%20in%20Low-Resource%20Settings%3F&body=Title%3A%20Can%20Linguistically%20Related%20Languages%20Guide%20LLM%20Translation%20in%20Low-Resource%20Settings%3F%0AAuthor%3A%20Aishwarya%20Ramasethu%20and%20Niyathi%20Allu%20and%20Rohin%20Garg%20and%20Harshwardhan%20Fartale%20and%20Dun%20Li%20Chan%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20strong%20performance%20across%20many%20downstream%20tasks%2C%20yet%20their%20effectiveness%20in%20extremely%20low-resource%20machine%20translation%20remains%20limited.%20Standard%20adaptation%20techniques%20typically%20rely%20on%20large-scale%20parallel%20data%20or%20extensive%20fine-tuning%2C%20which%20are%20infeasible%20for%20the%20long%20tail%20of%20underrepresented%20languages.%20In%20this%20work%2C%20we%20investigate%20a%20more%20constrained%20question%3A%20in%20data-scarce%20settings%2C%20to%20what%20extent%20can%20linguistically%20similar%20pivot%20languages%20and%20few-shot%20demonstrations%20provide%20useful%20guidance%20for%20on-the-fly%20adaptation%20in%20LLMs%3F%20We%20study%20a%20data-efficient%20experimental%20setup%20that%20combines%20linguistically%20related%20pivot%20languages%20with%20few-shot%20in-context%20examples%2C%20without%20any%20parameter%20updates%2C%20and%20evaluate%20translation%20behavior%20under%20controlled%20conditions.%20Our%20analysis%20shows%20that%20while%20pivot-based%20prompting%20can%20yield%20improvements%20in%20certain%20configurations%2C%20particularly%20in%20settings%20where%20the%20target%20language%20is%20less%20well%20represented%20in%20the%20model%27s%20vocabulary%2C%20the%20gains%20are%20often%20modest%20and%20sensitive%20to%20few%20shot%20example%20construction.%20For%20closely%20related%20or%20better%20represented%20varieties%2C%20we%20observe%20diminishing%20or%20inconsistent%20gains.%20Our%20findings%20provide%20empirical%20guidance%20on%20how%20and%20when%20inference-time%20prompting%20and%20pivot-based%20examples%20can%20be%20used%20as%20a%20lightweight%20alternative%20to%20fine-tuning%20in%20low-resource%20translation%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16660v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520Linguistically%2520Related%2520Languages%2520Guide%2520LLM%2520Translation%2520in%2520Low-Resource%2520Settings%253F%26entry.906535625%3DAishwarya%2520Ramasethu%2520and%2520Niyathi%2520Allu%2520and%2520Rohin%2520Garg%2520and%2520Harshwardhan%2520Fartale%2520and%2520Dun%2520Li%2520Chan%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520achieved%2520strong%2520performance%2520across%2520many%2520downstream%2520tasks%252C%2520yet%2520their%2520effectiveness%2520in%2520extremely%2520low-resource%2520machine%2520translation%2520remains%2520limited.%2520Standard%2520adaptation%2520techniques%2520typically%2520rely%2520on%2520large-scale%2520parallel%2520data%2520or%2520extensive%2520fine-tuning%252C%2520which%2520are%2520infeasible%2520for%2520the%2520long%2520tail%2520of%2520underrepresented%2520languages.%2520In%2520this%2520work%252C%2520we%2520investigate%2520a%2520more%2520constrained%2520question%253A%2520in%2520data-scarce%2520settings%252C%2520to%2520what%2520extent%2520can%2520linguistically%2520similar%2520pivot%2520languages%2520and%2520few-shot%2520demonstrations%2520provide%2520useful%2520guidance%2520for%2520on-the-fly%2520adaptation%2520in%2520LLMs%253F%2520We%2520study%2520a%2520data-efficient%2520experimental%2520setup%2520that%2520combines%2520linguistically%2520related%2520pivot%2520languages%2520with%2520few-shot%2520in-context%2520examples%252C%2520without%2520any%2520parameter%2520updates%252C%2520and%2520evaluate%2520translation%2520behavior%2520under%2520controlled%2520conditions.%2520Our%2520analysis%2520shows%2520that%2520while%2520pivot-based%2520prompting%2520can%2520yield%2520improvements%2520in%2520certain%2520configurations%252C%2520particularly%2520in%2520settings%2520where%2520the%2520target%2520language%2520is%2520less%2520well%2520represented%2520in%2520the%2520model%2527s%2520vocabulary%252C%2520the%2520gains%2520are%2520often%2520modest%2520and%2520sensitive%2520to%2520few%2520shot%2520example%2520construction.%2520For%2520closely%2520related%2520or%2520better%2520represented%2520varieties%252C%2520we%2520observe%2520diminishing%2520or%2520inconsistent%2520gains.%2520Our%2520findings%2520provide%2520empirical%2520guidance%2520on%2520how%2520and%2520when%2520inference-time%2520prompting%2520and%2520pivot-based%2520examples%2520can%2520be%2520used%2520as%2520a%2520lightweight%2520alternative%2520to%2520fine-tuning%2520in%2520low-resource%2520translation%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16660v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Can%20Linguistically%20Related%20Languages%20Guide%20LLM%20Translation%20in%20Low-Resource%20Settings%3F&entry.906535625=Aishwarya%20Ramasethu%20and%20Niyathi%20Allu%20and%20Rohin%20Garg%20and%20Harshwardhan%20Fartale%20and%20Dun%20Li%20Chan&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20strong%20performance%20across%20many%20downstream%20tasks%2C%20yet%20their%20effectiveness%20in%20extremely%20low-resource%20machine%20translation%20remains%20limited.%20Standard%20adaptation%20techniques%20typically%20rely%20on%20large-scale%20parallel%20data%20or%20extensive%20fine-tuning%2C%20which%20are%20infeasible%20for%20the%20long%20tail%20of%20underrepresented%20languages.%20In%20this%20work%2C%20we%20inve {"title": "High-Quality Facial Geometry and Appearance Capture at Home", "author": "Yuxuan Han and Junfeng Lyu and Feng Xu", "abstract": "Facial geometry and appearance capture have demonstrated tremendous success in 3D scanning real humans in studios. Recent works propose to democratize this technique while keeping the results high quality. However, they are still inconvenient for daily usage. In addition, they focus on an easier problem of only capturing facial skin. This paper proposes a novel method for high-quality face capture, featuring an easy-to-use system and the capability to model the complete face with skin, mouth interior, hair, and eyes. We reconstruct facial geometry and appearance from a single co-located smartphone flashlight sequence captured in a dim room where the flashlight is the dominant light source (e.g. rooms with curtains or at night). To model the complete face, we propose a novel hybrid representation to effectively model both eyes and other facial regions, along with novel techniques to learn it from images. We apply a combined lighting model to compactly represent real illuminations and exploit a morphable face albedo model as a reflectance prior to disentangle diffuse and specular. Experiments show that our method can capture high-quality 3D relightable scans.", "link": "http://arxiv.org/abs/2312.03442v2", "date": "2026-03-17", "relevancy": 2.3761, "topK": [{"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.6346}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5859}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5859}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20High-Quality%20Facial%20Geometry%20and%20Appearance%20Capture%20at%20Home&body=Title%3A%20High-Quality%20Facial%20Geometry%20and%20Appearance%20Capture%20at%20Home%0AAuthor%3A%20Yuxuan%20Han%20and%20Junfeng%20Lyu%20and%20Feng%20Xu%0AAbstract%3A%20Facial%20geometry%20and%20appearance%20capture%20have%20demonstrated%20tremendous%20success%20in%203D%20scanning%20real%20humans%20in%20studios.%20Recent%20works%20propose%20to%20democratize%20this%20technique%20while%20keeping%20the%20results%20high%20quality.%20However%2C%20they%20are%20still%20inconvenient%20for%20daily%20usage.%20In%20addition%2C%20they%20focus%20on%20an%20easier%20problem%20of%20only%20capturing%20facial%20skin.%20This%20paper%20proposes%20a%20novel%20method%20for%20high-quality%20face%20capture%2C%20featuring%20an%20easy-to-use%20system%20and%20the%20capability%20to%20model%20the%20complete%20face%20with%20skin%2C%20mouth%20interior%2C%20hair%2C%20and%20eyes.%20We%20reconstruct%20facial%20geometry%20and%20appearance%20from%20a%20single%20co-located%20smartphone%20flashlight%20sequence%20captured%20in%20a%20dim%20room%20where%20the%20flashlight%20is%20the%20dominant%20light%20source%20%28e.g.%20rooms%20with%20curtains%20or%20at%20night%29.%20To%20model%20the%20complete%20face%2C%20we%20propose%20a%20novel%20hybrid%20representation%20to%20effectively%20model%20both%20eyes%20and%20other%20facial%20regions%2C%20along%20with%20novel%20techniques%20to%20learn%20it%20from%20images.%20We%20apply%20a%20combined%20lighting%20model%20to%20compactly%20represent%20real%20illuminations%20and%20exploit%20a%20morphable%20face%20albedo%20model%20as%20a%20reflectance%20prior%20to%20disentangle%20diffuse%20and%20specular.%20Experiments%20show%20that%20our%20method%20can%20capture%20high-quality%203D%20relightable%20scans.%0ALink%3A%20http%3A//arxiv.org/abs/2312.03442v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHigh-Quality%2520Facial%2520Geometry%2520and%2520Appearance%2520Capture%2520at%2520Home%26entry.906535625%3DYuxuan%2520Han%252 {"title": "DexGrasp-Zero: A Morphology-Aligned Policy for Zero-Shot Cross-Embodiment Dexterous Grasping", "author": "Yuliang Wu and Yanhan Lin and WengKit Lao and Yuhao Lin and Yi-Lin Wei and Wei-Shi Zheng and Ancong Wu", "abstract": "To meet the demands of increasingly diverse dexterous hand hardware, it is crucial to develop a policy that enables zero-shot cross-embodiment grasping without redundant re-learning. Cross-embodiment alignment is challenging due to heterogeneous hand kinematics and physical constraints. Existing approaches typically predict intermediate motion targets and retarget them to each embodiment, which may introduce errors and violate embodiment-specific limits, hindering transfer across diverse hands. To overcome these limitations, we propose \\textit{DexGrasp-Zero}, a policy that learns universal grasping skills from diverse embodiments, enabling zero-shot transfer to unseen hands. We first introduce a morphology-aligned graph representation that maps each hand's kinematic keypoints to anatomically grounded nodes and equips each node with tri-axial orthogonal motion primitives, enabling structural and semantic alignment across different morphologies. Relying on this graph-based representation, we design a \\textit{Morphology-Aligned Graph Convolutional Network} (MAGCN) to encode the graph for policy learning. MAGCN incorporates a \\textit{Physical Property Injection} mechanism that fuses hand-specific physical constraints into the graph features, enabling adaptive compensation for varying link lengths and actuation limits for precise and stable grasping. Our extensive simulation evaluations on the YCB dataset demonstrate that our policy, jointly trained on four heterogeneous hands (Allegro, Shadow, Schunk, Ability), achieves an 85\\% zero-shot success rate on unseen hardware (LEAP, Inspire), outperforming the state-of-the-art method by 59.5\\%. Real-world experiments further evaluate our policy on three robot platforms (LEAP, Inspire, Revo2), achieving an 82\\% average success rate on unseen objects.", "link": "http://arxiv.org/abs/2603.16806v1", "date": "2026-03-17", "relevancy": 2.3644, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6614}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5419}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5385}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DexGrasp-Zero%3A%20A%20Morphology-Aligned%20Policy%20for%20Zero-Shot%20Cross-Embodiment%20Dexterous%20Grasping&body=Title%3A%20DexGrasp-Zero%3A%20A%20Morphology-Aligned%20Policy%20for%20Zero-Shot%20Cross-Embodiment%20Dexterous%20Grasping%0AAuthor%3A%20Yuliang%20Wu%20and%20Yanhan%20Lin%20and%20WengKit%20Lao%20and%20Yuhao%20Lin%20and%20Yi-Lin%20Wei%20and%20Wei-Shi%20Zheng%20and%20Ancong%20Wu%0AAbstract%3A%20To%20meet%20the%20demands%20of%20increasingly%20diverse%20dexterous%20hand%20hardware%2C%20it%20is%20crucial%20to%20develop%20a%20policy%20that%20enables%20zero-shot%20cross-embodiment%20grasping%20without%20redundant%20re-learning.%20Cross-embodiment%20alignment%20is%20challenging%20due%20to%20heterogeneous%20hand%20kinematics%20and%20physical%20constraints.%20Existing%20approaches%20typically%20predict%20intermediate%20motion%20targets%20and%20retarget%20them%20to%20each%20embodiment%2C%20which%20may%20introduce%20errors%20and%20violate%20embodiment-specific%20limits%2C%20hindering%20transfer%20across%20diverse%20hands.%20To%20overcome%20these%20limitations%2C%20we%20propose%20%5Ctextit%7BDexGrasp-Zero%7D%2C%20a%20policy%20that%20learns%20universal%20grasping%20skills%20from%20diverse%20embodiments%2C%20enabling%20zero-shot%20transfer%20to%20unseen%20hands.%20We%20first%20introduce%20a%20morphology-aligned%20graph%20representation%20that%20maps%20each%20hand%27s%20kinematic%20keypoints%20to%20anatomically%20grounded%20nodes%20and%20equips%20each%20node%20with%20tri-axial%20orthogonal%20motion%20primitives%2C%20enabling%20structural%20and%20semantic%20alignment%20across%20different%20morphologies.%20Relying%20on%20this%20graph-based%20representation%2C%20we%20design%20a%20%5Ctextit%7BMorphology-Aligned%20Graph%20Convolutional%20Network%7D%20%28MAGCN%29%20to%20encode%20the%20graph%20for%20policy%20learning.%20MAGCN%20incorporates%20a%20%5Ctextit%7BPhysical%20Property%20Injection%7D%20mechanism%20that%20fuses%20hand-specific%20physical%20constraints%20into%20the%20graph%20features%2C%20enabling%20adaptive%20compensation%20for%20varying%20link%20lengths%20and%20actuation%20limits%20for%20precise%20and%20stable%20grasping.%20Our%20extensive%20simulation%20evaluations%20on%20the%20YCB%20dataset%20demonstrate%20that%20our%20policy%2C%20jointly%20trained%20on%20four%20heterogeneous%20hands%20%28Allegro%2C%20Shadow%2C%20Schunk%2C%20Ability%29%2C%20achieves%20an%2085%5C%25%20zero-shot%20success%20rate%20on%20unseen%20hardware%20%28LEAP%2C%20Inspire%29%2C%20outperforming%20the%20state-of-the-art%20method%20by%2059.5%5C%25.%20Real-world%20experiments%20further%20evaluate%20our%20policy%20on%20three%20robot%20platforms%20%28LEAP%2C%20Inspire%2C%20Revo2%29%2C%20achieving%20an%2082%5C%25%20average%20success%20rate%20on%20unseen%20objects.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16806v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDexGrasp-Zero%253A%2520A%2520Morphology-Aligned%2520Policy%2520for%2520Zero-Shot%2520Cross-Embodiment%2520Dexterous%2520Grasping%26entry.906535625%3DYuliang%2520Wu%2520and%2520Yanhan%2520Lin%2520and%2520WengKit%2520Lao%2520and%2520Yuhao%2520Lin%2520and%2520Yi-Lin%2520Wei%2520and%2520Wei-Shi%2520Zheng%2520and%2520Ancong%2520Wu%26entry.1292438233%3DTo%2520meet%2 {"title": "V-Co: A Closer Look at Visual Representation Alignment via Co-Denoising", "author": "Han Lin and Xichen Pan and Zun Wang and Yue Zhang and Chu Wang and Jaemin Cho and Mohit Bansal", "abstract": "Pixel-space diffusion has recently re-emerged as a strong alternative to latent diffusion, enabling high-quality generation without pretrained autoencoders. However, standard pixel-space diffusion models receive relatively weak semantic supervision and are not explicitly designed to capture high-level visual structure. Recent representation-alignment methods (e.g., REPA) suggest that pretrained visual features can substantially improve diffusion training, and visual co-denoising has emerged as a promising direction for incorporating such features into the generative process. However, existing co-denoising approaches often entangle multiple design choices, making it unclear which design choices are truly essential. Therefore, we present V-Co, a systematic study of visual co-denoising in a unified JiT-based framework. This controlled setting allows us to isolate the ingredients that make visual co-denoising effective. Our study reveals four key ingredients for effective visual co-denoising. First, preserving feature-specific computation while enabling flexible cross-stream interaction motivates a fully dual-stream architecture. Second, effective classifier-free guidance (CFG) requires a structurally defined unconditional prediction. Third, stronger semantic supervision is best provided by a perceptual-drifting hybrid loss. Fourth, stable co-denoising further requires proper cross-stream calibration, which we realize through RMS-based feature rescaling. Together, these findings yield a simple recipe for visual co-denoising. Experiments on ImageNet-256 show that, at comparable model sizes, V-Co outperforms the underlying pixel-space diffusion baseline and strong prior pixel-diffusion methods while using fewer training epochs, offering practical guidance for future representation-aligned generative models.", "link": "http://arxiv.org/abs/2603.16792v1", "date": "2026-03-17", "relevancy": 2.3594, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.597}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5919}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5819}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20V-Co%3A%20A%20Closer%20Look%20at%20Visual%20Representation%20Alignment%20via%20Co-Denoising&body=Title%3A%20V-Co%3A%20A%20Closer%20Look%20at%20Visual%20Representation%20Alignment%20via%20Co-Denoising%0AAuthor%3A%20Han%20Lin%20and%20Xichen%20Pan%20and%20Zun%20Wang%20and%20Yue%20Zhang%20and%20Chu%20Wang%20and%20Jaemin%20Cho%20and%20Mohit%20Bansal%0AAbstract%3A%20Pixel-space%20diffusion%20has%20recently%20re-emerged%20as%20a%20strong%20alternative%20to%20latent%20diffusion%2C%20enabling%20high-quality%20generation%20without%20pretrained%20autoencoders.%20However%2C%20standard%20pixel-space%20diffusion%20models%20receive%20relatively%20weak%20semantic%20supervision%20and%20are%20not%20explicitly%20designed%20to%20capture%20high-level%20visual%20structure.%20Recent%20representation-alignment%20methods%20%28e.g.%2C%20REPA%29%20suggest%20that%20pretrained%20visual%20features%20can%20substantially%20improve%20diffusion%20training%2C%20and%20visual%20co-denoising%20has%20emerged%20as%20a%20promising%20direction%20for%20incorporating%20such%20features%20into%20the%20generative%20process.%20However%2C%20existing%20co-denoising%20approaches%20often%20entangle%20multiple%20design%20choices%2C%20making%20it%20unclear%20which%20design%20choices%20are%20truly%20essential.%20Therefore%2C%20we%20present%20V-Co%2C%20a%20systematic%20study%20of%20visual%20co-denoising%20in%20a%20unified%20JiT-based%20framework.%20This%20controlled%20setting%20allows%20us%20to%20isolate%20the%20ingredients%20that%20make%20visual%20co-denoising%20effective.%20Our%20study%20reveals%20four%20key%20ingredients%20for%20effective%20visual%20co-denoising.%20First%2C%20preserving%20feature-specific%20computation%20while%20enabling%20flexible%20cross-stream%20interaction%20motivates%20a%20fully%20dual-stream%20architecture.%20Second%2C%20effective%20classifier-free%20guidance%20%28CFG%29%20requires%20a%20structurally%20defined%20unconditional%20prediction.%20Third%2C%20stronger%20semantic%20supervision%20is%20best%20provided%20by%20a%20perceptual-drifting%20hybrid%20loss.%20Fourth%2C%20stable%20co-denoising%20further%20requires%20proper%20cross-stream%20calibration%2C%20which%20we%20realize%20through%20RMS-based%20feature%20rescaling.%20Together%2C%20these%20findings%20yield%20a%20simple%20recipe%20for%20visual%20co-denoising.%20Experiments%20on%20ImageNet-256%20show%20that%2C%20at%20comparable%20model%20sizes%2C%20V-Co%20outperforms%20the%20underlying%20pixel-space%20diffusion%20baseline%20and%20strong%20prior%20pixel-diffusion%20methods%20while%20using%20fewer%20training%20epochs%2C%20offering%20practical%20guidance%20for%20future%20representation-aligned%20generative%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16792v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DV-Co%253A%2520A%2520Closer%2520Look%2520at%2520Visual%2520Representation%2520Alignment%2520via%2520Co-Denoising%26entry.906535625%3DHan%2520Lin%2520and%2520Xichen%2520Pan%2520and%2520Zun%2520Wang%2520and%2520Yue%2520Zhang%2520and%2520Chu%2520Wang%2520and%2520Jaemin%2520Cho%2520and%2520Mohit%2520Bansal%26entry.1292438233%3DPixel-space%2520diffusion%2520has%2520recently%2520re-emerged%2520as%2520a%2520strong%2520alternative%2520to%2520latent%2520diffusion%252C%2520enabling%2520h {"title": "Model Medicine: A Clinical Framework for Understanding, Diagnosing, and Treating AI Models", "author": "Jihoon Jeong", "abstract": "Model Medicine is the science of understanding, diagnosing, treating, and preventing disorders in AI models, grounded in the principle that AI models -- like biological organisms -- have internal structures, dynamic processes, heritable traits, observable symptoms, classifiable conditions, and treatable states. This paper introduces Model Medicine as a research program, bridging the gap between current AI interpretability research (anatomical observation) and the systematic clinical practice that complex AI systems increasingly require. We present five contributions: (1) a discipline taxonomy organizing 15 subdisciplines across four divisions -- Basic Model Sciences, Clinical Model Sciences, Model Public Health, and Model Architectural Medicine; (2) the Four Shell Model (v3.3), a behavioral genetics framework empirically grounded in 720 agents and 24,923 decisions from the Agora-12 program, explaining how model behavior emerges from Core--Shell interaction; (3) Neural MRI (Model Resonance Imaging), a working open-source diagnostic tool mapping five medical neuroimaging modalities to AI interpretability techniques, validated through four clinical cases demonstrating imaging, comparison, localization, and predictive capability; (4) a five-layer diagnostic framework for comprehensive model assessment; and (5) clinical model sciences including the Model Temperament Index for behavioral profiling, Model Semiology for symptom description, and M-CARE for standardized case reporting. We additionally propose the Layered Core Hypothesis -- a biologically-inspired three-layer parameter architecture -- and a therapeutic framework connecting diagnosis to treatment.", "link": "http://arxiv.org/abs/2603.04722v2", "date": "2026-03-17", "relevancy": 2.3583, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Gym-V: A Unified Vision Environment System for Agentic Vision Research", "author": "Fanqing Meng and Lingxiao Du and Jiawei Gu and Jiaqi Liao and Linjie Li and Zijian Wu and Xiangyan Liu and Ziqi Zhao and Mengkang Hu and Yue Zhang and Zichen Liu and Jiaheng Zhang and Michael Qizhe Shieh", "abstract": "As agentic systems increasingly rely on reinforcement learning from verifiable rewards, standardized ``gym'' infrastructure has become essential for rapid iteration, reproducibility, and fair comparison. Vision agents lack such infrastructure, limiting systematic study of what drives their learning and where current models fall short. We introduce \\textbf{Gym-V}, a unified platform of 179 procedurally generated visual environments across 10 domains with controllable difficulty, enabling controlled experiments that were previously infeasible across fragmented toolkits. Using it, we find that observation scaffolding is more decisive for training success than the choice of RL algorithm, with captions and game rules determining whether learning succeeds at all. Cross-domain transfer experiments further show that training on diverse task categories generalizes broadly while narrow training can cause negative transfer, with multi-turn interaction amplifying all of these effects. Gym-V is released as a convenient foundation for training environments and evaluation toolkits, aiming to accelerate future research on agentic VLMs.", "link": "http://arxiv.org/abs/2603.15432v2", "date": "2026-03-17", "relevancy": 2.3357, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6152}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5735}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research&body=Title%3A%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research%0AAuthor%3A%20Fanqing%20Meng%20and%20Lingxiao%20Du%20and%20Jiawei%20Gu%20and%20Jiaqi%20Liao%20and%20Linjie%20Li%20and%20Zijian%20Wu%20and%20Xiangyan%20Liu%20and%20Ziqi%20Zhao%20and%20Mengkang%20Hu%20and%20Yue%20Zhang%20and%20Zichen%20Liu%20and%20Jiaheng%20Zhang%20and%20Michael%20Qizhe%20Shieh%0AAbstract%3A%20As%20agentic%20systems%20increasingly%20rely%20on%20reinforcement%20learning%20from%20verifiable%20rewards%2C%20standardized%20%60%60gym%27%27%20infrastructure%20has%20become%20essential%20for%20rapid%20iteration%2C%20reproducibility%2C%20and%20fair%20comparison.%20Vision%20agents%20lack%20such%20infrastructure%2C%20limiting%20systematic%20study%20of%20what%20drives%20their%20learning%20and%20where%20current%20models%20fall%20short.%20We%20introduce%20%5Ctextbf%7BGym-V%7D%2C%20a%20unified%20platform%20of%20179%20procedurally%20generated%20visual%20environments%20across%2010%20domains%20with%20controllable%20difficulty%2C%20enabling%20controlled%20experiments%20that%20were%20previously%20infeasible%20across%20fragmented%20toolkits.%20Using%20it%2C%20we%20find%20that%20observation%20scaffolding%20is%20more%20decisive%20for%20training%20success%20than%20the%20choice%20of%20RL%20algorithm%2C%20with%20captions%20and%20game%20rules%20determining%20whether%20learning%20succeeds%20at%20all.%20Cross-domain%20transfer%20experiments%20further%20show%20that%20training%20on%20diverse%20task%20categories%20generalizes%20broadly%20while%20narrow%20training%20can%20cause%20negative%20transfer%2C%20with%20multi-turn%20interaction%20amplifying%20all%20of%20these%20effects.%20Gym-V%20is%20released%20as%20a%20convenient%20foundation%20for%20training%20environments%20and%20evaluation%20toolkits%2C%20aiming%20to%20accelerate%20future%20research%20on%20agentic%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15432v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGym-V%253A%2520A%2520Unified%2520Vision%2520Environment%2520System%2520for%2520Agentic%2520Vision%2520Research%26entry.906535625%3DFanqing%2520Meng%2520and%2520Lingxiao%2520Du%2520and%2520Jiawei%2520Gu%2520and%2520Jiaqi%2520Liao%2520and%2520Linjie%2520Li%2520and%2520Zijian%2520Wu%2520and%2520Xiangyan%2520Liu%2520and%2520Ziqi%2520Zhao%2520and%2520Mengkang%2520Hu%2520and%2520Yue%2520Zhang%2520and%2520Zichen%2520Liu%2520and%2520Jiaheng%2520Zhang%2520and%2520Michael%2520Qizhe%2520Shieh%26entry.1292438233%3DAs%2520agentic%2520systems%2520increasingly%2520rely%2520on%2520reinforcement%2520learning%2520from%2520verifiable%2520rewards%252C%2520standardized%2520%2560%2560gym%2527%2527%2520infrastructure%2520has%2520become%2520essential%2520for%2520rapid%2520iteration%252C%2520reproducibility%252C%2520and%2520fair%2520comparison.%2520Vision%2520agents%2520lack%2520such%2520infrastructure%252C%2520limiting%2520systematic%2520study%2520of%2520what%2520drives%2520their%2520learning%2520and%2520where%2520current%2520models%2520fall%2520short.%2520We%2520introduce%2520%255Ctextbf%257BGym-V%257D%252C%2520a%2520unified%2520platform%2520of%2520179%2520procedurally%2520generated%2520visual%2520environments%2520across%252010%2520domains%2520with%2520controllable%2520difficulty%252C%2520enabling%2520controlled%2520experiments%2520that%2520were%2520previously%2520infeasible%2520across%2520fragmented%2520toolkits.%2520Using%2520it%252C%2520we%2520find%2520that%2520observation%2520scaffolding%2520is%2520more%2520decisive%2520for%2520training%2520success%2520than%2520the%2520choice%2520of%2520RL%2520algorithm%252C%2520with%2520captions%2520and%2520game%2520rules%2520determining%2520whether%2520learning%2520succeeds%2520at%2520all.%2520Cross-domain%2

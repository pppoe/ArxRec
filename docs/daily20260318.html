{"title": "TCATSeg: A Tooth Center-Wise Attention Network for 3D Dental Model Semantic Segmentation", "author": "Qiang He and Wentian Qu and Jiajia Dai and Changsong Lei and Shaofeng Wang and Feifei Zuo and Yajie Wang and Yaqian Liang and Xiaoming Deng and Cuixia Ma and Yong-Jin Liu and Hongan Wang", "abstract": "Accurate semantic segmentation of 3D dental models is essential for digital dentistry applications such as orthodontics and dental implants. However, due to complex tooth arrangements and similarities in shape among adjacent teeth, existing methods struggle with accurate segmentation, because they often focus on local geometry while neglecting global contextual information. To address this, we propose TCATSeg, a novel framework that combines local geometric features with global semantic context. We introduce a set of sparse yet physically meaningful superpoints to capture global semantic relationships and enhance segmentation accuracy. Additionally, we present a new dataset of 400 dental models, including pre-orthodontic samples, to evaluate the generalization of our method. Extensive experiments demonstrate that TCATSeg outperforms state-of-the-art approaches.", "link": "http://arxiv.org/abs/2603.16620v1", "date": "2026-03-17", "relevancy": 2.6728, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5418}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5348}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.527}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TCATSeg%3A%20A%20Tooth%20Center-Wise%20Attention%20Network%20for%203D%20Dental%20Model%20Semantic%20Segmentation&body=Title%3A%20TCATSeg%3A%20A%20Tooth%20Center-Wise%20At {"title": "SocialOmni: Benchmarking Audio-Visual Social Interactivity in Omni Models", "author": "Tianyu Xie and Jinfa Huang and Yuexiao Ma and Rongfang Luo and Yan Yang and Wang Chen and Yuhui Zeng and Ruize Fang and Yixuan Zou and Xiawu Zheng and Jiebo Luo and Rongrong Ji", "abstract": "Omni-modal large language models (OLMs) redefine human-machine interaction by natively integrating audio, vision, and text. However, existing OLM benchmarks remain anchored to static, accuracy-centric tasks, leaving a critical gap in assessing social interactivity, the fundamental capacity to navigate dynamic cues in natural dialogues. To this end, we propose SocialOmni, a comprehensive benchmark that operationalizes the evaluation of this conversational interactivity across three core dimensions: (i) speaker separation and identification (who is speaking), (ii) interruption timing control (when to interject), and (iii) natural interruption generation (how to phrase the interruption). SocialOmni features 2,000 perception samples and a quality-controlled diagnostic set of 209 interaction-generation instances with strict temporal and contextual constraints, complemented by controlled audio-visual inconsistency scenarios to test model robustness. We benchmarked 12 leading OLMs, which uncovers significant variance in their social-interaction capabilities across models. Furthermore, our analysis reveals a pronounced decoupling between a model's perceptual accuracy and its ability to generate contextually appropriate interruptions, indicating that understanding-centric metrics alone are insufficient to characterize conversational social competence. More encouragingly, these diagnostics from SocialOmni yield actionable signals for bridging the perception-interaction divide in future OLMs.", "link": "http://arxiv.org/abs/2603.16859v1", "date": "2026-03-17", "relevancy": 2.6512, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": " {"title": "TennisExpert: Towards Expert-Level Analytical Sports Video Understanding", "author": "Zhaoyu Liu and Xi Weng and Lianyu Hu and Zhe Hou and Kan Jiang and Jin Song Dong and Yang Liu", "abstract": "Tennis is one of the most widely followed sports, generating extensive broadcast footage with strong potential for professional analysis, automated coaching, and real-time commentary. However, automatic tennis understanding remains underexplored due to two key challenges: (1) the lack of large-scale benchmarks with fine-grained annotations and expert-level commentary, and (2) the difficulty of building accurate yet efficient multimodal systems suitable for real-time deployment. To address these challenges, we introduce TennisVL, a large-scale tennis benchmark comprising over 200 professional matches (471.9 hours) and 40,000+ rally-level clips. Unlike existing commentary datasets that focus on descriptive play-by-play narration, TennisVL emphasizes expert analytical commentary capturing tactical reasoning, player decisions, and match momentum. Furthermore, we propose TennisExpert, a multimodal tennis understanding framework that integrates a video semantic parser with a memory-augmented model built on Qwen3-VL-8B. The parser extracts key match elements (e.g., scores, shot sequences, ball bounces, and player locations), while hierarchical memory modules capture both short- and long-term temporal context. Experiments show that TennisExpert consistently outperforms strong proprietary baselines, including GPT-5, Gemini, and Claude, and demonstrates improved ability to capture tactical context and match dynamics. Our dataset and code are publicly available at https://github.com/LZYAndy/TennisExpert.", "link": "http://arxiv.org/abs/2603.13397v2", "date": "2026-03-17", "relevancy": 2.6455, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.531}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.531}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5253}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TennisExpert%3A%20Towards%20Expert-Level%20Analytical%20Sports%20Video%20Understanding&body=Title%3A%20TennisExpert%3A%20Towards%20Expert-Level%20Analytical%20Sports%20Video%20Understanding%0AAuthor%3A%20Zhaoyu%20Liu%20and%20Xi%20Weng%20and%20Lianyu%20Hu%20and%20Zhe%20Hou%20and%20Kan%20Jiang%20and%20Jin%20Song%20Dong%20and%20Yang%20Liu%0AAbstract%3A%20Tennis%20is%20one%20of%20the%20most%20widely%20followed%20sports%2C%20generating%20extensive%20broadcast%20footage%20with%20strong%20potential%20for%20professional%20analysis%2C%20automated%20coaching%2C%20and%20real-time%20commentary.%20However%2C%20automatic%20tennis%20understanding%20remains%20underexplored%20due%20to%20two%20key%20challenges%3A%20%281%29%20the%20lack%20of%20large-scale%20benchmarks%20with%20fine-grained%20annotations%20and%20expert-level%20commentary%2C%20and%20%282%29%20the%20difficulty%20of%20building%20accurate%20yet%20efficient%20multimodal%20systems%20suitable%20for%20real-time%20deployment.%20To%20address%20these%20challenges%2C%20we%20introduce%20TennisVL%2C%20a%20large-scale%20tennis%20benchmark%20comprising%20over%20200%20professional%20matches%20%28471.9%20hours%29%20and%2040%2C000%2B%20rally-level%20clips.%20Unlike%20existing%20commentary%20datasets%20that%20focus%20on%20descriptive%20play-by-play%20narration%2C%20TennisVL%20emphasizes%20expert%20analytical%20commentary%20capturing%20tactical%20reasoning%2C%20player%20decisions%2C%20and%20match%20momentum.%20Furthermore%2C%20we%20propose%20TennisExpert%2C%20a%20multimodal%20tennis%20understanding%20framework%20that%20integrates%20a%20video%20semantic%20parser%20with%20a%20memory-augmented%20model%20built%20on%20Qwen3-VL-8B.%20The%20parser%20extracts%20key%20match%20elements%20%28e.g.%2C%20scores%2C%20shot%20sequences%2C%20ball%20bounces%2C%20and%20player%20locations%29%2C%20while%20hierarchical%20memory%20modules%20capture%20both%20short-%20and%20long-term%20temporal%20context.%20Experiments%20show%20that%20TennisExpert%20consistently%20outperforms%20strong%20proprietary%20baselines%2C%20including%20GPT-5%2C%20Gemini%2C%20and%20Claude%2C%20and%20demonstrates%20improved%20ability%20to%20capture%20tactical%20context%20and%20match%20dynamics.%20Our%20dataset%20and%20code%20are%20publicly%20available%20at%20https%3A//github.com/LZYAndy/TennisExpert.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13397v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTennisExpert%253A%2520Towards%2520Expert-Level%2520Analytical%2520Sports%2520Video%2520Understanding%26entry.906535625%3DZhaoyu%2520Liu%2520and%2520Xi%2520Weng%2520and%2520Lianyu%2520Hu%2520and%2520Zhe%2520Hou%2520and%2520Kan%2520Jiang%2520and%2520Jin%2520Song%2520Dong%2520and%2520Yang%2520Liu%26entry.1292438233%3DTennis%2520is%2520one%2520of%2520the%2520most%2520widely%2520followed%2520sports%252C%2520generating%2520extensive%2520broadcast%2520footage%2520with%2520strong%2520potential%2520for%2520professional%2520analysis%252C%2520automated%2520coaching%252C%2520and%2520real-time%2520commentary.%2520However%252C%2520automatic%2520tennis%2520understanding%2520remains%2520underexplored%2520due%2520to%2520two%2520key%2520challenges%253A%2520%25281%2529%2520the%2520lack%2520of%2520large-scale%2520benchmarks%2520with%2520fine-grained%2520annotations%2520and%2520expert-level%2520commentary%252C%2520and%2520%25282%2529%2520the%2520difficulty%2520of%2520building%2520accurate%2520yet%2520efficient%2520multimodal%2520systems%2520suitable%2520for%2520real-time%2520deployment.%2520To%2520address%2520these%2520challen {"title": "Making Multi-Axis Gaussian Graphical Models Scalable to Millions of Cells", "author": "Bailey Andrew and Erica L. Harris and James A. Poulter and David R. Westhead and Luisa Cutillo", "abstract": "Motivation: Networks underlie the generation and interpretation of many biological datasets: gene networks shed light on the regulatory structure of the genome, and cell networks can capture structure of the tumor micro-environment. However, most methods that learn such networks make the faulty 'independence assumption'; to learn the gene network, they assume that no cell network exists. 'Multi-axis' methods, which do not make this assumption, fail to scale beyond a few thousand cells or genes. This limits their applicability to only the smallest datasets.\n  Results: We develop a multi-axis method capable of processing million-cell datasets within minutes. This was previously impossible, and unlocks the use of such methods on modern scRNA-seq datasets, as well as more complex datasets. We show that our method yields novel biological insights from real single-cell data, and compares favorably to the existing hdWGCNA methodology. In particular, it identifies long non-coding RNA genes that potentially have a regulatory or functional role in neuronal development.\n  Availability and implementation: Our methodology is available as a Python package GmGM on PyPI (https://pypi.org/project/GmGM/0.5.3/). The code for all experiments performed in this paper is available on GitHub (https://github.com/BaileyAndrew/GmGM-Bioinformatics).\n  Contact: sceba@leeds.ac.uk\n  Supplementary information: Our proofs, and some additional experiments, are available in the supplementary material.\n  Keywords: gaussian graphical models, multi-axis models, transcriptomics, multi-omics, scalability", "link": "http://arxiv.org/abs/2407.19892v2", "date": "2026-03-17", "relevancy": 2.6374, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5507}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5232}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5085}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Making%20Multi-Axis%20Gaussian%20Graphical%20Models%20Scalable%20to%20Millions%20of%20Cells&body=Title%3A%20Making%20Multi-Axis%20Gaussian%20Graphical%20Models%20Scalable%20to%20Millions%20of%20Cells%0AAuthor%3A%20Bailey%20Andrew%20and%20Erica%20L.%20Harris%20and%20James%20A.%20Poulter%20and%20David%20R.%20Westhead%20and%20Luisa%20Cutillo%0AAbstract%3A%20Motivation%3A%20Networks%20underlie%20the%20generation%20and%20interpretation%20of%20many%20biological%20datasets%3A%20gene%20networks%20shed%20light%20on%20the%20regulatory%20structure%20of%20the%20genome%2C%20and%20cell%20networks%20can%20capture%20structure%20of%20the%20tumor%20micro-environment.%20However%2C%20most%20methods%20that%20learn%20such%20networks%20make%20the%20faulty%20%27independence%20assumption%27%3B%20to%20learn%20the%20gene%20network%2C%20they%20assume%20that%20no%20cell%20network%20exists.%20%27Multi-axis%27%20methods%2C%20which%20do%20not%20make%20this%20assumption%2C%20fail%20to%20scale%20beyond%20a%20few%20thousand%20cells%20or%20genes.%20This%20limits%20their%20applicability%20to%20only%20the%20smallest%20datasets.%0A%20%20Results%3A%20We%20develop%20a%20multi-axis%20method%20capable%20of%20processing%20million-cell%20datasets%20within%20minutes.%20This%20was%20previously%20impossible%2C%20and%20unlocks%20the%20use%20of%20such%20methods%20on%20modern%20scRNA-seq%20datasets%2C%20as%20well%20as%20more%20complex%20datasets.%20We%20show%20that%20our%20method%20yields%20novel%20biological%20insights%20from%20real%20single-cell%20data%2C%20and%20compares%20favorably%20to%20the%20existing%20hdWGCNA%20methodology.%20In%20particular%2C%20it%20identifies%20long%20non-coding%20RNA%20genes%20that%20potentially%20have%20a%20regulatory%20or%20functional%20role%20in%20neuronal%20development.%0A%20%20Availability%20and%20implementation%3A%20Our%20methodology%20is%20available%20as%20a%20Python%20package%20GmGM%20on%20PyPI%20%28https%3A//pypi.org/project/GmGM/0.5.3/%29.%20The%20code%20for%20all%20experiments%20performed%20in%20this%20paper%20is%20available%20on%20GitHub%20%28https%3A//github.com/BaileyAndrew/GmGM-Bioinformatics%29.%0A%20%20Contact%3A%20sceba%40leeds.ac.uk%0A%20%20Supplementary%20information%3A%20Our%20proofs%2C%20and%20some%20additional%20experiments%2C%20are%20available%20in%20the%20supplementary%20material.%0A%20%20Keywords%3A%20gaussian%20graphical%20models%2C%20multi-axis%20models%2C%20transcriptomics%2C%20multi-omics%2C%20scalability%0ALink%3A%20http%3A//arxiv.org/abs/2407.19892v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMaking%2520Multi-Axis%2520Gaussian%2520Graphical%2520Models%2520Scalable%2520to%2520Millions%2520of%2520Cells%26entry.906535625%3DBailey%2520Andrew%2520and%2520Erica%2520L.%2520Harris%2520and%2520James%2520A.%2520Poulter%2520and%2520David%2520R.%2520Westhead%2520and%2520Luisa%2520Cutillo%26entry.1292438233%3DMotivation%253A%2520Networks%2520underlie%2520the%2520generation%2520and%2520interpretation%2520of%2520many%2520biological%2520datasets%253A%2520gene%2520networks%2520shed%2520light%2520on%2520the%2520regulatory%2520structure%2520of%2520the%2520genome%252C%2520and%2520cell%2520networks%2520can%2520capture%2520structure%2520of%2520the%2520tumor%2520micro-environment.%2520However%252C%2520most%2520methods%2520that%2520learn%2520such%2520networks%2520make%2520the%2520faulty%2520%2527independence%2520assumption%2527%253B%2520to%2520learn%2520the%2520gene%2520network%252C%2520they%2520assume%2520that%2520no%2520cell%2520network%2520exists.%2520%2527Multi-axis%2527%2520methods%252C%2520which%2520do%2520not%2520make%2520this%2520assumption%252C%2520fail%2520to%2520scale%2520beyond%2520a%2520few%2520thousand%2520cells%2520or%2520genes.%2520This%2520limits%2520their%2520applicability%2520to%2520only%2520the%2520smallest%2520datasets.%250A%2520%2520Results%253A%2520We%2520develop%2520a%2520multi-axis%2520method%2520capable%2520of%2520processing%2520million-cell%2520datasets%2520within%2520minutes.%2520This%2520was%2520previously%2520impossible%252C%2520and%2520unlocks%2520the%2520use%2520of%2520such%2520methods%2520on%2520modern%2520scRNA-seq%2520datasets%252C%2520as%2520well%2520as%2520more%2520complex%2520datasets.%2520We%2520show%2520that%2520our%2520method%2520yields%2520novel%2520biological%2520insights%2520from%2520real%2520single-cell%2520data%252C%2520and%2520compares%2520favorably%2520to%2520the%2520existing%2520hdWGCNA%2520methodology.%2520In%2520particular%252C%2520it%2520identifies%2520long%2520non-coding%2520RNA%2520genes%2520that%2520potentially%2520have%2520a%2520regulatory%2520or%2520functional%2520role%2520in%2520neuronal%2520development.%250A%2520%2520Availability%2520and%2520implementation%253A%2520Our%2520methodology%2520is%2520available%2520as%2520a%2520Python%2520package%2520GmGM%2520on%2520PyPI%2520%2528https%253A//pypi.org/project/GmGM/0.5.3/%2529.%2520The%2520code%2520for%2520all%2520experiments%2520performed%2520in%2520this%2520paper%2520is%2520available%2520on%2520GitHub%2520%2528https%253A//github.com/BaileyAndrew/GmGM-Bioinformatics%2529.%250A%2520%2520Contact%253A%2520sceba%2540leeds.ac.uk%250A%2520%2520Supplementary%2520information%253A%2520Our%2520proofs%252C%2520and%2520some%2520additional%2520experiments%252C%2520are%2520available%2520in%2520the%2520supplementary%2520material.%250A%2520%2520Keywords%253A%2520gaussian%2520graphical%2520models%252C%2520multi-axis%2520models%252C%2520transcriptomics%252C%2520multi-omics%252C%252 {"title": "FEAT: A Linear-Complexity Foundation Model for Extremely Large Structured Data", "author": "Zhenghang Song and Tang Qian and Lu Chen and Yushuai Li and Zhengke Hu and Bingbing Fang and Yumeng Song and Junbo Zhao and Sheng Zhang and Tianyi Li", "abstract": "Structured data is foundational to healthcare, finance, e-commerce, and scientific data management. Large structured-data models (LDMs) extend the foundation model paradigm to unify heterogeneous datasets for tasks such as classification, regression, and decision support. However, existing LDMs face major limitations. First, most rely on sample-wise self-attention, whose O(N^2) complexity limits the sample count. Second, linear sequence models often degrade representations due to hidden-state compression and artificial causal bias. Third, synthetic-only pre-training often fails to match real-world distributions. We propose FEAT, a linear-complexity foundation model for extremely large structured data. FEAT introduces a multi-layer dual-axis architecture that replaces quadratic attention with hybrid linear encoding. The architecture combines adaptive-fusion bi-Mamba-2 (AFBM) for local sample dependencies and convolutional gated linear attention (Conv-GLA) for global memory. This design enables linear-complexity cross-sample modeling while preserving expressive representations. To improve robustness, FEAT adopts a hybrid structural causal model pipeline and a stable reconstruction objective. Experiments on 11 real-world datasets show that FEAT consistently outperforms baselines in zero-shot performance, while scaling linearly and achieving up to 40x faster inference.", "link": "http://arxiv.org/abs/2603.16513v1", "date": "2026-03-17", "relevancy": 2.6367, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5376}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Und {"title": "Fast-HaMeR: Boosting Hand Mesh Reconstruction using Knowledge Distillation", "author": "Hunain Ahmed Jillani and Ahmed Tawfik Aboukhadra and Ahmed Elhayek and Jameel Malik and Nadia Robertini and Didier Stricker", "abstract": "Fast and accurate 3D hand reconstruction is essential for real-time applications in VR/AR, human-computer interaction, robotics, and healthcare. Most state-of-the-art methods rely on heavy models, limiting their use on resource-constrained devices like headsets, smartphones, and embedded systems. In this paper, we investigate how the use of lightweight neural networks, combined with Knowledge Distillation, can accelerate complex 3D hand reconstruction models by making them faster and lighter, while maintaining comparable reconstruction accuracy. While our approach is suited for various hand reconstruction frameworks, we focus primarily on boosting the HaMeR model, currently the leading method in terms of reconstruction accuracy. We replace its original ViT-H backbone with lighter alternatives, including MobileNet, MobileViT, ConvNeXt, and ResNet, and evaluate three knowledge distillation strategies: output-level, feature-level, and a hybrid of both. Our experiments show that using lightweight backbones that are only 35% the size of the original achieves 1.5x faster inference speed while preserving similar performance quality with only a minimal accuracy difference of 0.4mm. More specifically, we show how output-level distillation notably improves student performance, while feature-level distillation proves more effective for higher-capacity students. Overall, the findings pave the way for efficient real-world applications on low-power devices. The code and models are publicly available under https://github.com/hunainahmedj/Fast-HaMeR.", "link": "http://arxiv.org/abs/2603.16444v1", "date": "2026-03-17", "relevancy": 2.6318, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.532}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5243}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5228}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fast-HaMeR%3A%20Boosting%20Hand%20Mesh%20Reconstruction%20using%20Knowledge%20Distillation&body=Title%3A%20Fast-HaMeR%3A%20Boosting%20Hand%20Mesh%20Reconstruction%20using%20Knowledge%20Distillation%0AAuthor%3A%20Hunain%20Ahmed%20Jillani%20and%20Ahmed%20Tawfik%20Aboukhadra%20and%20Ahmed%20Elhayek%20and%20Jameel%20Malik%20and%20Nadia%20Robertini%20and%20Didier%20Stricker%0AAbstract%3A%20Fast%20and%20accurate%203D%20hand%20reconstruction%20is%20essential%20for%20real-time%20applications%20in%20VR/AR%2C%20human-computer%20interaction%2C%20robotics%2C%20and%20healthcare.%20Most%20state-of-the-art%20methods%20rely%20on%20heavy%20models%2C%20limiting%20their%20use%20on%20resource-constrained%20devices%20like%20headsets%2C%20smartphones%2C%20and%20embedded%20systems.%20In%20this%20paper%2C%20we%20investigate%20how%20the%20use%20of%20lightweight%20neural%20networks%2C%20combined%20with%20Knowledge%20Distillation%2C%20can%20accelerate%20complex%203D%20hand%20reconstruction%20models%20by%20making%20them%20faster%20and%20lighter%2C%20while%20maintaining%20comparable%20reconstruction%20accuracy.%20While%20our%20approach%20is%20suited%20for%20various%20hand%20reconstruction%20frameworks%2C%20we%20focus%20primarily%20on%20boosting%20the%20HaMeR%20model%2C%20currently%20the%20leading%20method%20in%20terms%20of%20reconstruction%20accuracy.%20We%20replace%20its%20original%20ViT-H%20backbone%20with%20lighter%20alternatives%2C%20including%20MobileNet%2C%20MobileViT%2C%20ConvNeXt%2C%20and%20ResNet%2C%20and%20evaluate%20three%20knowledge%20distillation%20strategies%3A%20output-level%2C%20feature-level%2C%20and%20a%20hybrid%20of%20both.%20Our%20experiments%20show%20that%20using%20lightweight%20backbones%20that%20are%20only%2035%25%20the%20size%20of%20the%20original%20achieves%201.5x%20faster%20inference%20speed%20while%20preserving%20similar%20performance%20quality%20with%20only%20a%20minimal%20accuracy%20difference%20of%200.4mm.%20More%20specifically%2C%20we%20show%20how%20output-level%20distillation%20notably%20improves%20student%20performance%2C%20while%20feature-level%20distillation%20proves%20more%20effective%20for%20higher-capacity%20students.%20Overall%2C%20the%20findings%20pave%20the%20way%20for%20efficient%20real-world%20applications%20on%20low-power%20devices.%20The%20code%20and%20models%20are%20publicly%20available%20under%20https%3A//github.com/hunainahmedj/Fast-HaMeR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16444v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFast-HaMeR%253A%2520Boosting%2520Hand%2520Mesh%2520Reconstruction%2520using%2520Knowledge%2520Distillation%26entry.906535625%3DHunain%2520Ahmed%2520Jillani%2520and%2520Ahmed%2520Tawfik%2520Aboukhadra%2520and%2520Ahmed%2520Elhayek%2520and%2520Jameel%2520Malik%2520and%2520Nadia%2520Robertini%2520and%2520Didier%2520Stricker%26entry.1292438233%3DFast%2520and%2520accurate%25203D%2520hand%2520reconstruction%2520is%2520essential%2520for%2520real-time%2520applications%2520in%2520VR/AR%252C%2520human-computer%2520interaction%252C%2520robotics%252C%2520and%2520healthcare.%2520Most%2520state-of-the-art%2520methods%2520rely%2520on%2520heavy%2520models%252C%2520limiting%2520their%2520use%2520on%2520resource-constrained%2520devices%2520like%2520headsets%252C%2520smartphones%252C%2520and%2520embedded%2520systems.%2520In%2520this%2520paper%252C%2520we%2520investigate%2520how%2520the%2520use%2520of%2520lightweight%2520neural%2520networks%252C%2520combined%2520with%2520Knowledge%2520Distillation%252C {"title": "ExpressMind: A Multimodal Pretrained Large Language Model for Expressway Operation", "author": "Zihe Wang and Yihuan Wang and Haiyang Yu. Zhiyong Cui and Xiaojian Liao and Chengcheng Wang and Yonglin Tian and Yongxin Tong", "abstract": "The current expressway operation relies on rule-based and isolated models, which limits the ability to jointly analyze knowledge across different systems. Meanwhile, Large Language Models (LLMs) are increasingly applied in intelligent transportation, advancing traffic models from algorithmic to cognitive intelligence. However, general LLMs are unable to effectively understand the regulations and causal relationships of events in unconventional scenarios in the expressway field. Therefore, this paper constructs a pre-trained multimodal large language model (MLLM) for expressways, ExpressMind, which serves as the cognitive core for intelligent expressway operations. This paper constructs the industry's first full-stack expressway dataset, encompassing traffic knowledge texts, emergency reasoning chains, and annotated video events to overcome data scarcity. This paper proposes a dual-layer LLM pre-training paradigm based on self-supervised training and unsupervised learning. Additionally, this study introduces a Graph-Augmented RAG framework to dynamically index the expressway knowledge base. To enhance reasoning for expressway incident response strategies, we develop a RL-aligned Chain-of-Thought (RL-CoT) mechanism that enforces consistency between model reasoning and expert problem-solving heuristics for incident handling. Finally, ExpressMind integrates a cross-modal encoder to align the dynamic feature sequences under the visual and textual channels, enabling it to understand traffic scenes in both video and image modalities. Extensive experiments on our newly released multi-modal expressway benchmark demonstrate that ExpressMind comprehensively outperforms existing baselines in event detection, safety response generation, and complex traffic analysis. The code and data are available at: https://wanderhee.github.io/ExpressMind/.", "link": "http://arxiv.org/abs/2603.16495v1", "date": "2026-03-17", "relevancy": 2.6215, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5269}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5269}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.519}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ExpressMind%3A%20A%20Multimodal%20Pretrained%20Large%20Language%20Model%20for%20Expressway%20Operation&body=Title%3A%20ExpressMind%3A%20A%20Multimodal%20Pretrained%20Large%20Language%20Model%20for%20Expressway%20Operation%0AAuthor%3A%20Zihe%20Wang%20and%20Yihuan%20Wang%20and%20Haiyang%20Yu.%20Zhiyong%20Cui%20and%20Xiaojian%20Liao%20and%20Chengcheng%20Wang%20and%20Yonglin%20Tian%20and%20Yongxin%20Tong%0AAbstract%3A%20The%20current%20expressway%20operation%20relies%20on%20rule-based%20and%20isolated%20models%2C%20which%20limits%20the%20ability%20to%20jointly%20analyze%20knowledge%20across%20different%20systems.%20Meanwhile%2C%20Large%20Language%20Models%20%28LLMs%29%20are%20increasingly%20applied%20in%20intelligent%20transportation%2C%20advancing%20traffic%20models%20from%20algorithmic%20to%20cognitive%20intelligence.%20However%2C%20general%20LLMs%20are%20unable%20to%20effectively%20understand%20the%20regulations%20and%20causal%20relationships%20of%20events%20in%20unconventional%20scenarios%20in%20the%20expressway%20field.%20Therefore%2C%20this%20paper%20constructs%20a%20pre-trained%20multimodal%20large%20language%20model%20%28MLLM%29%20for%20expressways%2C%20ExpressMind%2C%20which%20serves%20as%20the%20cognitive%20core%20for%20intelligent%20expressway%20operations.%20This%20paper%20constructs%20the%20industry%27s%20first%20full-stack%20expressway%20dataset%2C%20encompassing%20traffic%20knowledge%20texts%2C%20emergency%20reasoning%20chains%2C%20and%20annotated%20video%20events%20to%20overcome%20data%20scarcity.%20This%20paper%20proposes%20a%20dual-layer%20LLM%20pre-training%20paradigm%20based%20on%20self-supervised%20training%20and%20unsupervised%20learning.%20Additionally%2C%20this%20study%20introduces%20a%20Graph-Augmented%20RAG%20framework%20to%20dynamically%20index%20the%20expressway%20knowledge%20base.%20To%20enhance%20reasoning%20for%20expressway%20incident%20response%20strategies%2C%20we%20develop%20a%20RL-aligned%20Chain-of-Thought%20%28RL-CoT%29%20mechanism%20that%20enforces%20consistency%20between%20model%20reasoning%20and%20expert%20problem-solving%20heuristics%20for%20incident%20handling.%20Finally%2C%20ExpressMind%20integrates%20a%20cross-modal%20encoder%20to%20align%20the%20dynamic%20feature%20sequences%20under%20the%20visual%20and%20textual%20channels%2C%20enabling%20it%20to%20understand%20traffic%20scenes%20in%20both%20video%20and%20image%20modalities.%20Extensive%20experiments%20on%20our%20newly%20released%20multi-modal%20expressway%20benchmark%20demonstrate%20that%20ExpressMind%20comprehensively%20outperforms%20existing%20baselines%20in%20event%20detection%2C%20safety%20response%20generation%2C%20and%20complex%20traffic%20analysis.%20The%20code%20and%20data%20are%20available%20at%3A%20https%3A//wanderhee.github.io/ExpressMind/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16495v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExpressMind%253A%2520A%2520Multimodal%2520Pretrained%2520Large%2520Language%2520Model%2520for%2520Expressway%2520Operation%26entry.906535625%3DZihe%2520Wang%2520and%2520Yihuan%2520Wang%2520and%2520Haiyang%2520Yu.%2520Zhiyong%2520Cui%2520and%2520Xiaojian%2520Liao%2520and%252 {"title": "FSMC-Pose: Frequency and Spatial Fusion with Multiscale Self-calibration for Cattle Mounting Pose Estimation", "author": "Fangjing Li and Zhihai Wang and Xinxin Ding and Haiyang Liu and Ronghua Gao and Rong Wang and Yao Zhu and Ming Jin", "abstract": "Mounting posture is an important visual indicator of estrus in dairy cattle. However, achieving reliable mounting pose estimation in real-world environments remains challenging due to cluttered backgrounds and frequent inter-animal occlusion. We present FSMC-Pose, a top-down framework that integrates a lightweight frequency-spatial fusion backbone, CattleMountNet, and a multiscale self-calibration head, SC2Head. Specifically, we design two algorithmic components for CattleMountNet: the Spatial Frequency Enhancement Block (SFEBlock) and the Receptive Aggregation Block (RABlock). SFEBlock separates cattle from cluttered backgrounds, while RABlock captures multiscale contextual information. The Spatial-Channel Self-Calibration Head (SC2Head) attends to spatial and channel dependencies and introduces a self-calibration branch to mitigate structural misalignment under inter-animal overlap. We construct a mounting dataset, MOUNT-Cattle, covering 1176 mounting instances, which follows the COCO format and supports drop-in training across pose estimation models. Using a comprehensive dataset that combines MOUNT-Cattle with the public NWAFU-Cattle dataset, FSMC-Pose achieves higher accuracy than strong baselines, with markedly lower computational and parameter costs, while maintaining real-time inference on commodity GPUs. Extensive experiments and qualitative analyses show that FSMC-Pose effectively captures and estimates cattle mounting pose in complex and cluttered environments. Dataset and code are available at https://github.com/elianafang/FSMC-Pose.", "link": "http://arxiv.org/abs/2603.16596v1", "date": "2026-03-17", "relevancy": 2.6212, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5353}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5227}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5148}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FSMC-Pose%3A%20Frequency%20and%20Spatial%20Fusion%20with%20Multiscale%20Self-calibration%20for%20Cattle%20Mounting%20Pose%20Estimation&body=Title%3A%20FSMC-Pose%3A%20Frequency%20and%20Spatial%20Fusion%20with%20Multiscale%20Self-calibration%20for%20Cattle%20Mounting%20Pose%20Estimation%0AAuthor%3A%20Fangjing%20Li%20and%20Zhihai%20Wang%20and%20Xinxin%20Ding%20and%20Haiyang%20Liu%20and%20Ronghua%20Gao%20and%20Rong%20Wang%20and%20Yao%20Zhu%20and%20Ming%20Jin%0AAbstract%3A%20Mounting%20posture%20is%20an%20important%20visual%20indicator%20of%20estrus%20in%20dairy%20cattle.%20However%2C%20achieving%20reliable%20mounting%20pose%20estimation%20in%20real-world%20environments%20remains%20challenging%20due%20to%20cluttered%20backgrounds%20and%20frequent%20inter-animal%20occlusion.%20We%20present%20FSMC-Pose%2C%20a%20top-down%20framework%20that%20integrates%20a%20lightweight%20frequency-spatial%20fusion%20backbone%2C%20CattleMountNet%2C%20and%20a%20multiscale%20self-calibration%20head%2C%20SC2Head.%20Specifically%2C%20we%20design%20two%20algorithmic%20components%20for%20CattleMountNet%3A%20the%20Spatial%20Frequency%20Enhancement%20Block%20%28SFEBlock%29%20and%20the%20Receptive%20Aggregation%20Block%20%28RABlock%29.%20SFEBlock%20separates%20cattle%20from%20cluttered%20backgrounds%2C%20while%20RABlock%20captures%20multiscale%20contextual%20information.%20The%20Spatial-Channel%20Self-Calibration%20Head%20%28SC2Head%29%20attends%20to%20spatial%20and%20channel%20dependencies%20and%20introduces%20a%20self-calibration%20branch%20to%20mitigate%20structural%20misalignment%20under%20inter-animal%20overlap.%20We%20construct%20a%20mounting%20dataset%2C%20MOUNT-Cattle%2C%20covering%201176%20mounting%20instances%2C%20which%20follows%20the%20COCO%20format%20and%20supports%20drop-in%20training%20across%20pose%20estimation%20models.%20Using%20a%20comprehensive%20dataset%20that%20combines%20MOUNT-Cattle%20with%20the%20public%20NWAFU-Cattle%20dataset%2C%20FSMC-Pose%20achieves%20higher%20accuracy%20than%20strong%20baselines%2C%20with%20markedly%20lower%20computational%20and%20parameter%20costs%2C%20while%20maintaining%20real-time%20inference%20on%20commodity%20GPUs.%20Extensive%20experiments%20and%20qualitative%20analyses%20show%20that%20FSMC-Pose%20effectively%20captures%20and%20estimates%20cattle%20mounting%20pose%20in%20complex%20and%20cluttered%20environments.%20Dataset%20and%20code%20are%20available%20at%20https%3A//github.com/elianafang/FSMC-Pose.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16596v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFSMC-Pose%253A%2520Frequency%2520and%2520Spatial%2520Fusion%2520with%2520Multiscale%2520Self-calibration%2520for%2520Cattle%2520Mounting%2520Pose%2520Estimation%26entry.906535625%3DFangjing%2520Li%2520and%2520Zhihai%2520Wang%2520and%2520Xinxin%2520Ding%2520and%2520Haiyang%2520Liu%2520and%2520Ronghua%2520Gao%2520and%2520Rong%2520Wang%2520and%2520Yao%2520Zhu%2520and%2520Ming%2520Jin%26entry.1292438233%3DMounting%2520posture%2520is%2520an%2520important%2520visual%2520indicator%2520of%2520estrus%2520in%2520dairy%2520cattle.%2520However%252C%2520achieving%2520reliable%2520mounting%2520pose%2520estimation%2520in%2520real-world%2520environments%2520remains%2520challenging%2520due%2520to%2520cluttered%2520backgrounds%2520and%2520frequent%2520inter-animal%2520occlusion.%2520We%2520present%2520FSMC-Pose%252C%2520a%2520top-down%2520framework%2520that%2520integ 03.16596v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FSMC-Pose%3A%20Frequency%20and%20Spatial%20Fusion%20with%20Multiscale%20Self-calibration%20for%20Cattle%20Mounting%20Pose%20Estimation&entry.906535625=Fangjing%20Li%20and%20Zhihai%20Wang%20and%20Xinxin%20Ding%20and%20Haiyang%20Liu%20and%20Ronghua%20Gao%20and%20Rong%20Wang%20and%20Yao%20Zhu%20and%20Ming%20Jin&entry.1292438233=Mounting%20posture%20is%20an%20important%20visual%20indicator%20of%20estrus%20in%20dairy%20cattle.%20However%2C%20achieving%20reliable%20mounting%20pose%20estimation%20in%20real-world%20environments%20remains%20challenging%20due%20to%20cluttered%20backgrounds%20and%20frequent%20inter-animal%20occlusion.%20We%20present%20FSMC-Pose%2C%20a%20top-down%20framework%20that%20integrates%20a%20lightweight%20frequency-spatial%20fusion%20backbone%2C%20CattleMountNet%2C%20and%20a%20multiscale%20self-calibration%20head%2C%20SC2Head.%20Specifically%2C%20we%20design%20two%20algorithmic%20components%20for%20CattleMountNet%3A%20the%20Spatial%20Frequency%20Enhancement%20Block%20%28SFEBlock%29%20and%20the%20Receptive%20Aggregation%20Block%20%28RABlock%29.%20SFEBlock%20separates%20cattle%20from%20cluttered%20backgrounds%2C%20while%20RABlock%20captures%20multiscale%20contextual%20information.%20The%20Spatial-Channel%20Self-Calibration%20Head%20%28SC2Head%29%20attends%20to%20spatial%20and%20channel%20dependencies%20and%20introduces%20a%20self-calibration%20branch%20to%20mitigate%20structural%20misalignment%20under%20inter-animal%20overlap.%20We%20construct%20a%20mounting%20dataset%2C%20MOUNT-Cattle%2C%20covering%201176%20mounting%20instances%2C%20which%20follows%20the%20COCO%20format%20and%20supports%20drop-in%20training%20across%20pose%20estimation%20models.%20Using%20a%20comprehensive%20dataset%20that%20combines%20MOUNT-Cattle%20with%20the%20public%20NWAFU-Cattle%20dataset%2C%20FSMC-Pose%20achieves%20hig {"title": "World Reconstruction From Inconsistent Views", "author": "Lukas H\u00f6llein and Matthias Nie\u00dfner", "abstract": "Video diffusion models generate high-quality and diverse worlds; however, individual frames often lack 3D consistency across the output sequence, which makes the reconstruction of 3D worlds difficult. To this end, we propose a new method that handles these inconsistencies by non-rigidly aligning the video frames into a globally-consistent coordinate frame that produces sharp and detailed pointcloud reconstructions. First, a geometric foundation model lifts each frame into a pixel-wise 3D pointcloud, which contains unaligned surfaces due to these inconsistencies. We then propose a tailored non-rigid iterative frame-to-model ICP to obtain an initial alignment across all frames, followed by a global optimization that further sharpens the pointcloud. Finally, we leverage this pointcloud as initialization for 3D reconstruction and propose a novel inverse deformation rendering loss to create high quality and explorable 3D environments from inconsistent views. We demonstrate that our 3D scenes achieve higher quality than baselines, effectively turning video models into 3D-consistent world generators.", "link": "http://arxiv.org/abs/2603.16736v1", "date": "2026-03-17", "relevancy": 2.5956, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7219}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6343}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6343}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20World%20Reconstruction%20From%20Inconsistent%20Views&body=Title%3A%20World%20Reconstruction%20From%20Inconsistent%20Views%0AAuthor%3A%20Lukas%20H%C3%B6llein%20and%20Matthias%20Nie%C3%9Fner%0AAbstract%3A%20Video%20diffusion%20models%20generate%20high-quality%20and%20diverse%20worlds%3B%20however%2C%20individual%20frames%20often%20lack%203D%20consistency%20across%20the%20output%20sequence%2C%20which%20makes%20the%20reconstruction%20of%203D%20worlds%20difficult.%20To%20this%20end%2C%20we%20propose%20a%20new%20method%20that%20handles%20these%20inconsistencies%20by%20non-rigidly%20aligning%20the%20video%20frames%20into%20a%20globally-consistent%20coordinate%20frame%20that%20produces%20sharp%20and%20detailed%20pointcloud%20reconstructions.%20First%2C%20a%20geometric%20foundation%20model%20lifts%20each%20frame%20into%20a%20pixel-wise%203D%20pointcloud%2C%20which%20contains%20unaligned%20surfaces%20due%20to%20these%20inconsistencies.%20We%20then%20propose%20a%20tailored%20non-rigid%20iterative%20frame-to-model%20ICP%20to%20obtain%20an%20initial%20alignment%20across%20all%20frames%2C%20followed%20by%20a%20global%20optimization%20that%20further%20sharpens%20the%20pointcloud.%20Finally%2C%20we%20leverage%20this%20pointcloud%20as%20initialization%20for%203D%20reconstruction%20and%20propose%20a%20novel%20inverse%20deformation%20rendering%20loss%20to%20create%20high%20quality%20and%20explorable%203D%20environments%20from%20inconsistent%20views.%20We%20demonstrate%20that%20our%203D%20scenes%20achieve%20higher%20quality%20than%20baselines%2C%20effectively%20turning%20video%20models%20into%203D-consistent%20world%20generators.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16736v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWorld%2520Reconstruction%2520From%2520Inconsistent%2520Views%26entry.906535625%3DLukas%2520H%25C3%25B6llein%2520and%2520Matthias%2520Nie%25C3%259Fner%26entry.1292438233%3DVideo%2520diffusion%2520models%2520generate%2520high-quality%2520and%2520diverse%2520worlds%253B%2520however%252C%2520individual%2520frames%2520often%2520lack%25203D%2520con e%20worlds%3B%20however%2C%20individual%20frames%20often%20lack%203D%20consistency%20across%20the%20output%20sequence%2C%20which%20makes%20the%20reconstruction%20of%203D%20worlds%20difficult.%20To%20this%20end%2C%20we%20propose%20a%20new%20method%20that%20handles%20these%20inconsistencies%20by%20non-rigidly%20aligning%20the%20video%20frames%20into%20a%20globally-consistent%20coordinate%20frame%20that%20produces%20sharp%20and%20detailed%20pointcloud%20reconstructions.%20First%2C%20a%20geometric%20foundation%20model%20lifts%20each%20frame%20into%20a%20pixel-wise%203D%20pointcloud%2C%20which%20contains%20unaligned%20surfaces%20due%20to%20these%20inconsistencies.%20We%20then%20propose%20a%20tailored%20non-rigid%20iterative%20frame-to-model%20ICP%20to%20obtain%20an%20initial%20alignment%20across%20all%20frames%2C%20followed%20by%20a%20global%20optimization%20that%20further%20sharpens%20the%20pointcloud.%20Finally%2C%20we%20leverage%20this%20pointcloud%20as%20initialization%20for%203D%20reconstruction%20and%20propose%20a%20novel%20inverse%20deformation%20rendering%20loss%20to%20create%20high%20quality%20and%20explorable%203D%20environments%20from%20inconsistent%20views.%20We%20demonstrate%20that%20our%203D%20scenes%20achieve%20higher%20quality%20than%20baselines%2C%20effectively%20turning%20video%20models%20into%203D-consistent%20world%20generators.&entry.1838667208=http%3A//arxiv.org/abs/2603.16736v1&entry.124074799=Read"},
{"title": "VIEW2SPACE: Studying Multi-View Visual Reasoning from Sparse Observations", "author": "Fucai Ke and Zhixi Cai and Boying Li and Long Chen and Beibei Lin and Weiqing Wang and Pari Delir Haghighi and Gholamreza Haffari and Hamid Rezatofighi", "abstract": "Multi-view visual reasoning is essential for intelligent systems that must understand complex environments from sparse and discrete viewpoints, yet existing research has largely focused on single-image or temporally dense video settings. In real-world scenarios, reasoning across views requires integrating partial observations without explicit guidance, while collecting large-scale multi-view data with accurate geometric and semantic annotations remains challenging. To address this gap, we leverage physically grounded simulation to construct diverse, high-fidelity 3D scenes with precise per-view metadata, enabling scalable data generation that remains transferable to real-world settings. Based on this engine, we introduce VIEW2SPACE, a multi-dimensional benchmark for sparse multi-view reasoning, together with a scalable, disjoint training split supporting millions of grounded question-answer pairs. Using this benchmark, a comprehensive evaluation of state-of-the-art vision-language and spatial models reveals that multi-view reasoning remains largely unsolved, with most models performing only marginally above random guessing. We further investigate whether training can bridge this gap. Our proposed Grounded Chain-of-Thought with Visual Evidence substantially improves performance under moderate difficulty, and generalizes to real-world data, outperforming existing approaches in cross-dataset evaluation. We further conduct difficulty-aware scaling analyses across model size, data scale, reasoning depth, and visibility constraints, indicating that while geometric perception can benefit from scaling under sufficient visibility, deep compositional reasoning across sparse views remains a fundamental challenge.", "link": "http://arxiv.org/abs/2603.16506v1", "date": "2026-03-17", "relevancy": 2.5895, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.657}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.657}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5991}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VIEW2SPACE%3A%20Studying%20Multi-View%20Visual%20Reasoning%20from%20Sparse%20Observations&body=Title%3A%20VIEW2SPACE%3A%20Studying%20Multi-View%20Visual%20Reasoning%20from%20Sparse%20Observations%0AAuthor%3A%20Fucai%20Ke%20and%20Zhixi%20Cai%20and%20Boying%20Li%20and%20Long%20Chen%20and%20Beibei%20Lin%20and%20Weiqing%20Wang%20and%20Pari%20Delir%20Haghighi%20and%20Gholamreza%20Haffari%20and%20Hamid%20Rezatofighi%0AAbstract%3A%20Multi-view%20visual%20reasoning%20is%20essential%20for%20intelligent%20systems%20that%20must%20understand%20complex%20environments%20from%20sparse%20and%20discrete%20viewpoints%2C%20yet%20existing%20research%20has%20largely%20focused%20on%20single-image%20or%20temporally%20dense%20video%20settings.%20In%20real-world%20scenarios%2C%20reasoning%20across%20views%20requires%20integrating%20partial%20observations%20without%20explicit%20guidance%2C%20while%20collecting%20large-scale%20multi-view%20data%20with%20accurate%20geometric%20and%20semantic%20annotations%20remains%20challenging.%20To%20address%20this%20gap%2C%20we%20leverage%20physically%20grounded%20simulation%20to%20construct%20diverse%2C%20high-fidelity%203D%20scenes%20with%20precise%20per-view%20metadata%2C%20enabling%20scalable%20data%20generation%20that%20remains%20transferable%20to%20real-world%20settings.%20Based%20on%20this%20engine%2C%20we%20introduce%20VIEW2SPACE% {"title": "PKINet-v2: Towards Powerful and Efficient Poly-Kernel Remote Sensing Object Detection", "author": "Xinhao Cai and Liulei Li and Gensheng Pei and Zeren Sun and Yazhou Yao and Wenguan Wang", "abstract": "Object detection in remote sensing images (RSIs) is challenged by the coexistence of geometric and spatial complexity: targets may appear with diverse aspect ratios, while spanning a wide range of object sizes under varied contexts. Existing RSI backbones address the two challenges separately, either by adopting anisotropic strip kernels to model slender targets or by using isotropic large kernels to capture broader context. However, such isolated treatments lead to complementary drawbacks: the strip-only design can disrupt spatial coherence for regular-shaped objects and weaken tiny details, whereas isotropic large kernels often introduce severe background noise and geometric mismatch for slender structures. In this paper, we extend PKINet, and present a powerful and efficient backbone that jointly handles both challenges within a unified paradigm named Poly Kernel Inception Network v2 (PKINet-v2). PKINet-v2 synergizes anisotropic axial-strip convolutions with isotropic square kernels and builds a multi-scope receptive field, preserving fine-grained local textures while progressively aggregating long-range context across scales. To enable efficient deployment, we further introduce a Heterogeneous Kernel Re-parameterization (HKR) Strategy that fuses all heterogeneous branches into a single depth-wise convolution for inference, eliminating fragmented kernel launches without accuracy loss. Extensive experiments on four widely-used benchmarks, including DOTA-v1.0, DOTA-v1.5, HRSC2016, and DIOR-R, demonstrate that PKINet-v2 achieves state-of-the-art accuracy while delivering a $\\textbf{3.9}\\times$ FPS acceleration compared to PKINet-v1, surpassing previous remote sensing backbones in both effectiveness and efficiency.", "link": "http://arxiv.org/abs/2603.16341v1", "date": "2026-03-17", "relevancy": 2.5825, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5361}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5085}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5049}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PKINet-v2%3A%20Towards%20Powerful%20and%20Efficient%20Poly-Kernel%20Remote%20Sensing%20Object%20Detection&body=Title%3A%20PKINet-v2%3A%20Towards%20Powerful%20and%20Efficient%20Poly-Kernel%20Remote%20Sensing%20Object%20Detection%0AAuthor%3A%20Xinhao%20Cai%20and%20Liulei%20Li%20and%20Gensheng%20Pei%20and%20Zeren%20Sun%20and%20Yazhou%20Yao%20and%20Wenguan%20Wang%0AAbstract%3A%20Object%20detection%20in%20remote%20sensing%20images%20%28RSIs%29%20is%20challenged%20by%20the%20coexistence%20of%20geometric%20and%20spatial%20complexity%3A%20targets%20may%20appear%20with%20diverse%20aspect%20ratios%2C%20while%20spanning%20a%20wide%20range%20of%20object%20sizes%20under%20varied%20contexts.%20Existing%20RSI%20backbones%20address%20the%20two%20challenges%20separately%2C%20either%20by%20adopting%20anisotropic%20strip%20kernels%20to%20model%20slender%20targets%20or%20by%20using%20isotropic%20large%20kernels%20to%20capture%20broader%20context.%20However%2C%20such%20isolated%20treatments%20lead%20to%20complementary%20drawbacks%3A%20the%20strip-only%20design%20can%20disrupt%20spatial%20coherence%20for%20regular-shaped%20objects%20and%20weaken%20tiny%20details%2C%20whereas%20isotropic%20large%20kernels%20often%20introduce%20severe%20background%20noise%20and%20geometric%20mismatch%20for%20slender%20structures.%20In%20this%20paper%2C%20we%20extend%20PKINet%2C%20and%20present%20a%20powerful%20and%20efficient%20backbone%20that%20jointly%20handles%20both%20challenges%20within%20a%20unified%20paradigm%20named%20Poly%20Kernel%20Inception%20Network%20v2%20%28PKINet-v2%29.%20PKINet-v2%20synergizes%20anisotropic%20axial-strip%20convolutions%20with%20isotropic%20square%20kernels%20and%20builds%20a%20multi-scope%20receptive%20field%2C%20preserving%20fine-grained%20local%20textures%20while%20progressively%20aggregating%20long-range%20context%20across%20scales.%20To%20enable%20efficient%20deployment%2C%20we%20further%20introduce%20a%20Heterogeneous%20Kernel%20Re-parameterization%20%28HKR%29%20Strategy%20that%20fuses%20all%20heterogeneous%20branches%20into%20a%20single%20depth-wise%20convolution%20for%20inference%2C%20eliminating%20fragmented%20kernel%20launches%20without%20accuracy%20loss.%20Extensive%20experiments%20on%20four%20widely-used%20benchmarks%2C%20including%20DOTA-v1.0%2C%20DOTA-v1.5%2C%20HRSC2016%2C%20and%20DIOR-R%2C%20demonstrate%20that%20PKINet-v2%20achieves%20state-of-the-art%20accuracy%20while%20delivering%20a%20%24%5Ctextbf%7B3.9%7D%5Ctimes%24%20FPS%20acceleration%20compared%20to%20PKINet-v1%2C%20surpassing%20previous%20remote%20sensing%20backbones%20in%20both%20effectiveness%20and%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16341v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPKINet-v2%253A%2520Towards%2520Powerful%2520and%2520Efficient%2520Poly-Kernel%2520Remote%2520Sensing%2520Object%2520Detection%26entry.906535625%3DXinhao%2520Cai%2520and%2520Liulei%2520Li%2520and%2520Gensheng%2520Pei%2520and%2520Zeren%2520Sun%2520and%2520Yazhou%2520Yao%2520and%2520Wenguan%2520Wang%26entry.1292438233%3DObject%2520detection%2520in%2520remote%2520sensing%2520images%2520%2528RSIs%2529%2520is%2520challenged%2520by%2520the%2520coexistence%2520of%2520geometric%2520and%2520spatial%2520complexity%253A%2520targets%2520may%2520appear%2520with%2520 nd%20efficient%20backbone%20that%20jointly%20handles%20both%20challenges%20within%20a%20unified%20paradigm%20named%20Poly%20Kernel%20Inception%20Network%20v2%20%28PKINet-v2%29.%20PKINet-v2%20synergizes%20anisotropic%20axial-strip%20convolutions%20with%20isotropic%20square%20kernels%20and%20builds%20a%20multi-scope%20receptive%20field%2C%20preserving%20fine-grained%20local%20textures%20while%20progressively%20aggregating%20long-range%20context%20across%20scales.%20To%20enable%20efficient%20deployment%2C%20we%20further%20introduce%20a%20Heterogeneous%20Kernel%20Re-parameterization%20%28HKR%29%20Strategy%20that%20fuses%20all%20heterogeneous%20branches%20into%20a%20single%20depth-wise%20convolution%20for%20inference%2C%20eliminating%20fragmented%20kernel%20launches%20without%20accuracy%20loss.%20Extensive%20experiments%20on%20four%20widely-used%20benchmarks%2C%20including%20DOTA-v1.0%2C%20DOTA-v1.5%2C%20HRSC2016%2C%20and%20DIOR-R%2C%20demonstrate%20that%20PKINet-v2%20achieves%20state-of-the-art%20accuracy%20while%20delivering%20a%20%24%5Ctextbf%7B3.9%7D%5Ctimes%24%20FPS%20acceleration%20compared%20to%20PKINet-v1%2C%20surpassing%20previous%20remote%20sensing%20backbones%20in%20both%20effectiveness%20and%20efficiency.&entry.1838667208=http%3A//arxiv.org/abs/2603.16341v1&entry.124074799=Read"},
{"title": "MASS: MoErging through Adaptive Subspace Selection", "author": "Donato Crisostomi and Alessandro Zirilli and Antonio Andrea Gargiulo and Maria Sofia Bucarelli and Simone Scardapane and Fabrizio Silvestri and Iacopo Masi and Emanuele Rodol\u00e0", "abstract": "Model merging has recently emerged as a lightweight alternative to ensembling, combining multiple fine-tuned models into a single set of parameters with no additional training overhead. Yet, existing merging methods fall short of matching the full accuracy of separately fine-tuned endpoints. We present MASS (MoErging through Adaptive Subspace Selection), a new approach that closes this gap by unifying multiple fine-tuned models while retaining near state-of-the-art performance across tasks. Building on the low-rank decomposition of per-task updates, MASS stores only the most salient singular components for each task and merges them into a shared model. At inference time, a non-parametric, data-free router identifies which subspace (or combination thereof) best explains an input's intermediate features and activates the corresponding task-specific block. This procedure is fully training-free and introduces only a two-pass inference overhead plus a ~2 storage factor compared to a single pretrained model, irrespective of the number of tasks. We evaluate MASS on CLIP-based image classification using ViT-B-16, ViT-B-32 and ViT-L-14 for benchmarks of 8, 14 and 20 tasks respectively, establishing a new state-of-the-art. Most notably, MASS recovers up to ~98% of the average accuracy of individual fine-tuned models, making it a practical alternative to ensembling at a fraction of the storage cost.", "link": "http://arxiv.org/abs/2504.05342v2", "date": "2026-03-17", "relevancy": 2.5773, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5559}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian 20~2%20storage%20factor%20compared%20to%20a%20single%20pretrained%20model%2C%20irrespective%20of%20the%20number%20of%20tasks.%20We%20evaluate%20MASS%20on%20CLIP-based%20image%20classification%20using%20ViT-B-16%2C%20ViT-B-32%20and%20ViT-L-14%20for%20benchmarks%20of%208%2C%2014%20and%2020%20tasks%20respectively%2C%20establishing%20a%20new%20state-of-the-art.%20Most%20notably%2C%20MASS%20recovers%20up%20to%20~98%25%20of%20the%20average%20accuracy%20of%20individual%20fine-tuned%20models%2C%20making%20it%20a%20practical%20alternative%20to%20ensembling%20at%20a%20fraction%20of%20the%20storage%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2504.05342v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMASS%253A%2520MoErging%2520through%2520Adaptive%2520Subspace%2520Selection%26entry.906535625%3DDonato%2520Crisostomi%2520and%2520Alessandro%2520Zirilli%2520and%2520Antonio%2520Andrea%2520Gargiulo%2520and%2520Maria%2520Sofia%2520Bucarelli%2520and%2520Simone%2520Scardapane%2520and%2520Fabrizio%2520Silvestri%2520and%2520Iacopo%2520Masi%2520and%2520Emanuele%2520Rodol%25C3%25A0%26entry.1292438233%3DModel%2520merging%2520has%2520recently%2520emerged%2520as%2520a%2520lightweight%2520alternative%2520to%2520ensembling%252C%2520combining%2520multiple%2520fine-tuned%2520models%2520into%2520a%2520single%2520set%2520of%2520parameters%2520with%2520no%2520additional%2520training%2520overhead.%2520Yet%252C%2520existing%2520merging%2520methods%2520fall%2520short%2520of%2520matching%2520the%2520full%2520accuracy%2520of%2520separately%2520fine-tuned%2520endpoints.%2520We%2520present%2520MASS%2520%2528MoErging%2520through%2520Adaptive%2520Subspace%2520Selection%2529%252C%2520a%2520new%2520approach%2520that%2520closes%2520this%2520gap%2520by%2520unifying%2520multiple%2520fine-tuned%2520models%2520while%2520retaining%2520near%2520state-of-the-art%2520performance%2520across%2520tasks.%2520Building%2520on%2520the%2520l {"title": "Manifold-Matching Autoencoders", "author": "Laurent Cheret and Vincent L\u00e9tourneau and Isar Nejadgholi and Chris Drummond and Hussein Al Osman and Maia Fraser", "abstract": "We study a simple unsupervised regularization scheme for autoencoders called Manifold-Matching (MMAE): we align the pairwise distances in the latent space to those of the input data space by minimizing mean squared error. Because alignment occurs on pairwise distances rather than coordinates, it can also be extended to a lower-dimensional representation of the data, adding flexibility to the method. We find that this regularization outperforms similar methods on metrics based on preservation of nearest-neighbor distances and persistent homology-based measures. We also observe that MMAE provides a scalable approximation of Multi-Dimensional Scaling (MDS).", "link": "http://arxiv.org/abs/2603.16568v1", "date": "2026-03-17", "relevancy": 2.5721, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5366}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5087}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Manifold-Matching%20Autoencoders&body=Title%3A%20Manifold-Matching%20Autoencoders%0AAuthor%3A%20Laurent%20Cheret%20and%20Vincent%20L%C3%A9tourneau%20and%20Isar%20Nejadgholi%20and%20Chris%20Drummond%20and%20Hussein%20Al%20Osman%20and%20Maia%20Fraser%0AAbstract%3A%20We%20study%20a%20simple%20unsupervised%20regularization%20scheme%20for%20autoencoders%20called%20Manifold-Matching%20%28MMAE%29%3A%20we%20align%20the%20pairwise%20distances%20in%20the%20latent%20space%20to%20those%20of%20t o%2520observe%2520that%2520MMAE%2520provides%2520a%2520scalable%2520approximation%2520of%2520Multi-Dimensional%2520Scaling%2520%2528MDS%2529.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16568v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Manifold-Matching%20Autoencoders&entry.906535625=Laurent%20Cheret%20and%20Vincent%20L%C3%A9tourneau%20and%20Isar%20Nejadgholi%20and%20Chris%20Drummond%20and%20Hussein%20Al%20Osman%20and%20Maia%20Fraser&entry.1292438233=We%20study%20a%20simple%20unsupervised%20regularization%20scheme%20for%20autoencoders%20called%20Manifold-Matching%20%28MMAE%29%3A%20we%20align%20the%20pairwise%20distances%20in%20the%20latent%20space%20to%20those%20of%20the%20input%20data%20space%20by%20minimizing%20mean%20squared%20error.%20Because%20alignment%20occurs%20on%20pairwise%20distances%20rather%20than%20coordinates%2C%20it%20can%20also%20be%20extended%20to%20a%20lower-dimensional%20representation%20of%20the%20data%2C%20adding%20flexibility%20to%20the%20method.%20We%20find%20that%20this%20regularization%20outperforms%20similar%20methods%20on%20metrics%20based%20on%20preservation%20of%20nearest-neighbor%20distances%20and%20persistent%20homology-based%20measures.%20We%20also%20observe%20that%20MMAE%20provides%20a%20scalable%20approximation%20of%20Multi-Dimensional%20Scaling%20%28MDS%29.&entry.1838667208=http%3A//arxiv.org/abs/2603.16568v1&entry.124074799=Read"},
{"title": "SpikeCLR: Contrastive Self-Supervised Learning for Few-Shot Event-Based Vision using Spiking Neural Networks", "author": "Maxime Vaillant and Axel Carlier and Lai Xing Ng and Christophe Hurter and Benoit R. Cottereau", "abstract": "Event-based vision sensors provide significant advantages for high-speed perception, including microsecond temporal resolution, high dynamic range, and low power consumption. When combined with Spiking Neural Networks (SNNs), they can be deployed on neuromorphic hardware, enabling energy-efficient applications on embedded systems. However, this potential is severely limited by the scarcity of large-scale labeled datasets required to effectively train such models. In this work, we introduce SpikeCLR, a contrastive self-supervised learning framework that enables SNNs to learn robust visual representations from unlabeled event data. We adapt prior frame-based methods to the spiking domain using surrogate gradient training and introduce a suite of event-specific augmentations that leverage spatial, temporal, and polarity transformations. Through extensive experiments on CIFAR10-DVS, N-Caltech101, N-MNIST, and DVS-Gesture benchmarks, we demonstrate that self-supervised pretraining with subsequent fine-tuning outperforms supervised learning in low-data regimes, achieving consistent gains in few-shot and semi-supervised settings. Our ablation studies reveal that combining spatial and temporal augmentations is critical for learning effective spatio-temporal invariances in event data. We further show that learned representations transfer across datasets, contributing to efforts for powerful event-based models in label-scarce settings.", "link": "http://arxiv.org/abs/2603.16338v1", "date": "2026-03-17", "relevancy": 2.5705, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.53}, {"title": "Boosted dynamic neural {"title": "Efficient Reasoning on the Edge", "author": "Yelysei Bondarenko and Thomas Hehn and Rob Hesselink and Romain Lepert and Fabio Valerio Massoli and Evgeny Mironov and Leyla Mirvakhabova and Tribhuvanesh Orekondy and Spyridon Stasis and Andrey Kuzmin and Anna Kuzina and Markus Nagel and Ankita Nayak and Corrado Rainone and Ork de Rooij and Paul N Whatmough and Arash Behboodi and Babak Ehteshami Bejnordi", "abstract": "Large language models (LLMs) with chain-of-thought reasoning achieve state-of-the-art performance across complex problem-solving tasks, but their verbose reasoning traces and large context requirements make them impractical for edge deployment. These challenges include high token generation costs, large KV-cache footprints, and inefficiencies when distilling reasoning capabilities into smaller models for mobile devices. Existing approaches often rely on distilling reasoning traces from larger models into smaller models, which are verbose and stylistically redundant, undesirable for on-device inference. In this work, we propose a lightweight approach to enable reasoning in small LLMs using LoRA adapters combined with supervised fine-tuning. We further introduce budget forcing via reinforcement learning on these adapters, significantly reducing response length with minimal accuracy loss. To address memory-bound decoding, we exploit parallel test-time scaling, improving accuracy at minor latency increase. Finally, we present a dynamic adapter-switching mechanism that activates reasoning only when needed and a KV-cache sharing strategy during prompt encoding, reducing time-to-first-token for on-device inference. Experiments on Qwen2.5-7B demonstrate that our method achieves efficient, accurate reasoning under strict resource constraints, making LLM reasoning practical for mobile scenarios. Videos demonstrating our solution running on mobile devices are available on our project page.", "link": "http://arxiv.org/abs/2603.16867v1", "date": "2026-03-17", "relevancy": 2.5587, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5257}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5048}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Reasoning%20on%20the%20Edge&body=Title%3A%20Efficient%20Reasoning%20on%20the%20Edge%0AAuthor%3A%20Yelysei%20Bondarenko%20and%20Thomas%20Hehn%20and%20Rob%20Hesselink%20and%20Romain%20Lepert%20and%20Fabio%20Valerio%20Massoli%20and%20Evgeny%20Mironov%20and%20Leyla%20Mirvakhabova%20and%20Tribhuvanesh%20Orekondy%20and%20Spyridon%20Stasis%20and%20Andrey%20Kuzmin%20and%20Anna%20Kuzina%20and%20Markus%20Nagel%20and%20Ankita%20Nayak%20and%20Corrado%20Rainone%20and%20Ork%20de%20Rooij%20and%20Paul%20N%20Whatmough%20and%20Arash%20Behboodi%20and%20Babak%20Ehteshami%20Bejnordi%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20with%20chain-of-thought%20reasoning%20achieve%20state-of-the-art%20performance%20across%20complex%20problem-solving%20tasks%2C%20but%20their%20verbose%20reasoning%20traces%20and%20large%20context%20requirements%20make%20them%20impractical%20for%20edge%20deployment.%20These%20challenges%20include%20high%20token%20generation%20costs%2C%20large%20KV-cache%20footprints%2C%20and%20inefficiencies%20when%20distilling%20reasoning%20capabilities%20into%20smaller%20models%20for%20mobile%20devices.%20Existing%20approaches%20often%20rely%20on%20distilling%20reasoning%20traces%20from%20larger%20models%20into%20smaller%20models%2C%20which%20are%20verbose%20and%20stylistically%20redundant%2C%20undesirable%20for%20on-device%20inference.%20In%20this%20work%2C%20we%20propose%20a%20lightweight%20approach%20to%20enable%20reasoning%20in%20small%20LLMs%20using%20LoRA%20adapters%20combined%20with%20supervised%20fine-tuning.%20We%20further%20introduce%20budget%20forcing%20via%20reinforcement%20learning%20on%20these%20adapters%2C%20significantly%20reducing%20response%20length%20with%20minimal%20accuracy%20loss.%20To%20address%20memory-bound%20decoding%2C%20we%20exploit%20parallel%20test-time%20scaling%2C%20improving%20accuracy%20at%20minor%20latency%20increase.%20Finally%2C%20we%20present%20a%20dynamic%20adapter-switching%20mechanism%20that%20activates%20reasoning%20only%20when%20needed%20and%20a%20KV-cache%20sharing%20strategy%20during%20prompt%20encoding%2C%20reducing%20time-to-first-token%20for%20on-device%20inference.%20Experiments%20on%20Qwen2.5-7B%20demonstrate%20that%20our%20method%20achieves%20efficient%2C%20accurate%20reasoning%20under%20strict%20resource%20constraints%2C%20making%20LLM%20reasoning%20practical%20for%20mobile%20scenarios.%20Videos%20demonstrating%20our%20solution%20running%20on%20mobile%20devices%20are%20available%20on%20our%20project%20page.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16867v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Reasoning%2520on%2520the%2520Edge%26entry.906535625%3DYelysei%2520Bondarenko%2520and%2520Thomas%2520Hehn%2520and%2520Rob%2520Hesselink%2520and%2520Romain%2520Lepert%2520and%2520Fabio%2520Valerio%2520Massoli%2520and%2520Evgeny%2520Mironov%2520and%2520Leyla%2520Mirvakhabova%2520and%2520Tribhuvanesh%2520Orekondy%2520and%2520Spyridon%2520Stasis%2520and%2520Andrey%2520Kuzmin%2520and%2520Anna%2520Kuzina%2520and%2520Markus%2520Nagel%2520and%2520Ankita%2520Nayak%2520and%2520Corrado%2520Rainone%2520and%2520Ork%2520de%2520Rooij%2520and%2520Paul%2520N%2520Whatmough%2520and%2520Arash%2520Behboodi%2520and%2520Babak%2520Ehteshami%2520Bejnordi%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs% {"title": "SpecMoE: Spectral Mixture-of-Experts Foundation Model for Cross-Species EEG Decoding", "author": "D. Darankoum and C. Habermacher and J. Volle and S. Grudinin", "abstract": "Decoding the orchestration of neural activity in electroencephalography (EEG) signals is a central challenge in bridging neuroscience with artificial intelligence. Foundation models have made strides in generalized EEG decoding, yet many existing frameworks primarily relying on separate temporal and spectral masking of raw signals during self-supervised pretraining. Such strategies often tend to bias learning toward high-frequency oscillations, as low-frequency rhythmic patterns can be easily inferred from the unmasked signal. We introduce a foundation model that utilizes a novel Gaussian-smoothed masking scheme applied to short-time Fourier transform (STFT) maps. By jointly applying time, frequency, and time-frequency Gaussian masks, we make the reconstruction task much more challenging, forcing the model to learn intricate neural patterns across both high- and low-frequency domains. To effectively recover signals under this aggressive masking strategy, we design SpecHi-Net, a U-shaped hierarchical architecture with multiple encoding and decoding stages. To accelerate large-scale pretraining, we partition the data into three subsets, each used to train an independent expert model. We then combine these models through SpecMoE, a mixture of experts framework guided by a learned spectral gating mechanism. SpecMoE achieves state-of-the-art performance across a diverse set of EEG decoding tasks, including sleep staging, emotion recognition, motor imagery classification, abnormal signal detection, and drug effect prediction. Importantly, the model demonstrates strong cross-species and cross-subject generalization, maintaining high accuracy on both human and murine EEG datasets.", "link": "http://arxiv.org/abs/2603.16739v1", "date": "2026-03-17", "relevancy": 2.5569, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5223}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5223}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4895}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpecMoE%3A%20Spectral%20Mixture-of-Experts%20Foundation%20Model%20for%20Cross-Species%20EEG%20Decoding&body=Title%3A%20SpecMoE%3A%20Spectral%20Mixture-of-Experts%20Foundation%20Model%20for%20Cross-Species%20EEG%20Decoding%0AAuthor%3A%20D.%20Darankoum%20and%20C.%20Habermacher%20and%20J.%20Volle%20and%20S.%20Grudinin%0AAbstract%3A%20Decoding%20the%20orchestration%20of%20neural%20activity%20in%20electroencephalography%20%28EEG%29%20signals%20is%20a%20central%20challenge%20in%20bridging%20neuroscience%20with%20artificial%20intelligence.%20Foundation%20models%20have%20made%20strides%20in%20generalized%20EEG%20decoding%2C%20yet%20many%20existing%20frameworks%20primarily%20relying%20on%20separate%20temporal%20and%20spectral%20masking%20of%20raw%20signals%20during%20self-supervised%20pretraining.%20Such%20strategies%20often%20tend%20to%20bias%20learning%20toward%20high-frequency%20oscillations%2C%20as%20low-frequency%20rhythmic%20patterns%20can%20be%20easily%20inferred%20from%20the%20unmasked%20signal.%20We%20introduce%20a%20foundation%20model%20that%20utilizes%20a%20novel%20Gaussian-smoothed%20masking%20scheme%20applied%20to%20short-time%20Fourier%20transform%20%28STFT%29%20maps.%20By%20jointly%20applying%20time%2C%20frequency%2C%20and%20time-frequency%20Gaussian%20masks%2C%20we%20make%20the%20reconstruction%20task%20much%20more%20challenging%2C%20forcing%20the%20model%20to%20learn%20intricate%20neural%20patterns%20across%20both%20high-%20and%20low-frequency%20domains.%20To%20effectively%20recover%20signals%20under%20this%20aggressive%20masking%20strategy%2C%20we%20design%20SpecHi-Net%2C%20a%20U-shaped%20hierarchical%20architecture%20with%20multiple%20encoding%20and%20decoding%20stages.%20To%20accelerate%20large-scale%20pretraining%2C%20we%20partition%20the%20data%20into%20three%20subsets%2C%20each%20used%20to%20train%20an%20independent%20expert%20model.%20We%20then%20combine%20these%20models%20through%20SpecMoE%2C%20a%20mixture%20of%20experts%20framework%20guided%20by%20a%20learned%20spectral%20gating%20mechanism.%20SpecMoE%20achieves%20state-of-the-art%20performance%20across%20a%20diverse%20set%20of%20EEG%20decoding%20tasks%2C%20including%20sleep%20staging%2C%20emotion%20recognition%2C%20motor%20imagery%20classification%2C%20abnormal%20signal%20detection%2C%20and%20drug%20effect%20prediction.%20Importantly%2C%20the%20model%20demonstrates%20strong%20cross-species%20and%20cross-subject%20generalization%2C%20maintaining%20high%20accuracy%20on%20both%20human%20and%20murine%20EEG%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16739v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpecMoE%253A%2520Spectral%2520Mixture-of-Experts%2520Foundation%2520Model%2520for%2520Cross-Species%2520EEG%2520Decoding%26entry.906535625%3DD.%2520Darankoum%2520and%2520C.%2520Habermacher%2520and%2520J.%2520Volle%2520and%2520S.%2520Grudinin%26entry.1292438233%3DDecoding%2520the%2520orchestration%2520of%2520neural%2520activity%2520in%2520electroencephalography%2520%2528EEG%2529%2520signals%2520is%2520a%2520central%2520challenge%2520in%2520bridging%2520neuroscience%2520with%2520artificial%2520intelligence.%2520Foundation%2520models%2520have%2520made%2520strides%2520in%2520generalized%2520EEG%2520decoding%252C%2520yet%2520many%2520existing%2520frameworks%2520primarily%2520relying%2520on%2520separate%2520temporal%2520and%2520spectral%2520masking%2520of%2520raw%2520sig

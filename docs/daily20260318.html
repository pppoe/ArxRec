{"title": "CompDiff: Hierarchical Compositional Diffusion for Fair and Zero-Shot Intersectional Medical Image Generation", "author": "Mahmoud Ibrahim and Bart Elen and Chang Sun and Gokhan Ertaylan and Michel Dumontier", "abstract": "Generative models are increasingly used to augment medical imaging datasets for fairer AI. Yet a key assumption often goes unexamined: that generators themselves produce equally high-quality images across demographic groups. Models trained on imbalanced data can inherit these imbalances, yielding degraded synthesis quality for rare subgroups and struggling with demographic intersections absent from training. We refer to this as the imbalanced generator problem. Existing remedies such as loss reweighting operate at the optimization level and provide limited benefit when training signal is scarce or absent for certain combinations. We propose CompDiff, a hierarchical compositional diffusion framework that addresses this problem at the representation level. A dedicated Hierarchical Conditioner Network (HCN) decomposes demographic conditioning, producing a demographic token concatenated with CLIP embeddings as cross-attention context. This structured factorization encourages parameter sharing across subgroups and supports compositional generalization to rare or unseen demographic intersections. Experiments on chest X-rays (MIMIC-CXR) and fundus images (FairGenMed) show that CompDiff compares favorably against both standard fine-tuning and FairDiffusion across image quality (FID: 64.3 vs. 75.1), subgroup equity (ES-FID), and zero-shot intersectional generalization (up to 21% FID improvement on held-out intersections). Downstream classifiers trained on CompDiff-generated data also show improved AUROC and reduced demographic bias, suggesting that architectural design of demographic conditioning is an important and underexplored factor in fair medical image generation. Code is available at https://anonymous.4open.science/r/CompDiff-6FE6.", "link": "http://arxiv.org/abs/2603.16551v1", "date": "2026-03-17", "relevancy": 2.3355, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6136}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5792}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5767}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CompDiff%3A%20Hierarchical%20Compositional%20Diffusion%20for%20Fair%20and%20Zero-Shot%20Intersectional%20Medical%20Image%20Generation&body=Title%3A%20CompDiff%3A%20Hierarchical%20Compositional%20Diffusion%20for%20Fair%20and%20Zero-Shot%20Intersectional%20Medical%20Image%20Generation%0AAuthor%3A%20Mahmoud%20Ibrahim%20and%20Bart%20Elen%20and%20Chang%20Sun%20and%20Gokhan%20Ertaylan%20and%20Michel%20Dumontier%0AAbstract%3A%20Generative%20models%20are%20increasingly%20used%20to%20augment%20medical%20imaging%20datasets%20for%20fairer%20AI.%20Yet%20a%20key%20assumption%20often%20goes%20unexamined%3A%20that%20generators%20themselves%20produce%20equally%20high-quality%20images%20across%20demographic%20groups.%20Models%20trained%20on%20imbalanced%20data%20can%20inherit%20these%20imbalances%2C%20yielding%20degraded%20synthesis%20quality%20for%20rare%20subgroups%20and%20struggling%20with%20demographic%20intersections%20absent%20from%20training.%20We%20refer%20to%20this%20as%20the%20imbalanced%20generator%20problem.%20Existing%20remedies%20such%20as%20loss%20reweighting%20operate%20at%20the%20optimization%20level%20and%20provide%20limited%20benefit%20when%20training%20signal%20is%20scarce%20or%20absent%20for%20certain%20combinations.%20We%20propose%20CompDiff%2C%20a%20hierarchical%20compositional%20diffusion%20framework%20that%20addresses%20this%20problem%20at%20the%20representation%20level.%20A%20dedicated%20Hierarchical%20Conditioner%20Network%20%28HCN%29%20decomposes%20demographic%20conditioning%2C%20producing%20a%20demographic%20token%20concatenated%20with%20CLIP%20embeddings%20as%20cross-attention%20context.%20This%20structured%20factorization%20encourages%20parameter%20sharing%20across%20subgroups%20and%20supports%20compositional%20generalization%20to%20rare%20or%20unseen%20demographic%20intersections.%20Experiments%20on%20chest%20X-rays%20%28MIMIC-CXR%29%20and%20fundus%20images%20%28FairGenMed%29%20show%20that%20CompDiff%20compares%20favorably%20against%20both%20standard%20fine-tuning%20and%20FairDiffusion%20across%20image%20quality%20%28FID%3A%2064.3%20vs.%2075.1%29%2C%20subgroup%20equity%20%28ES-FID%29%2C%20and%20zero-shot%20intersectional%20generalization%20%28up%20to%2021%25%20FID%20improvement%20on%20held-out%20intersections%29.%20Downstream%20classifiers%20trained%20on%20CompDiff-generated%20data%20also%20show%20improved%20AUROC%20and%20reduced%20demographic%20bias%2C%20suggesting%20that%20architectural%20design%20of%20demographic%20conditioning%20is%20an%20important%20and%20underexplored%20factor%20in%20fair%20medical%20image%20generation.%20Code%20is%20available%20at%20https%3A//anonymous.4open.science/r/CompDiff-6FE6.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16551v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCompDiff%253A%2520Hierarchical%2520Compositional%2520Diffusion%2520for%2520Fair%2520and%2520Zero-Shot%2520Intersectional%2520Medical%2520Image%2520Generation%26entry.906535625%3DMahmoud%2520Ibrahim%2520and%2520Bart%2520Elen%2520and%2520Chang%2520Sun%2520and%2520Gokhan%2520Ertaylan%2520and%2520Michel%2520Dumontier%26entry.1292438233%3DGenerative%2520models%2520are%2520increasingly%2520used%2520to%2520augment%2520medical%2520imaging%2520datasets%2520for%2520fairer%2520AI.%2520Yet%2520a%2520key%2520assumption%2520often%2520goes%2520une {"title": "WildDepth: A Multimodal Dataset for 3D Wildlife Perception and Depth Estimation", "author": "Muhammad Aamir and Naoya Muramatsu and Sangyun Shin and Matthew Wijers and Jiaxing Jhong and Xinyu Hou and Amir Patel and Andrew Markham", "abstract": "Depth estimation and 3D reconstruction have been extensively studied as core topics in computer vision. Starting from rigid objects with relatively simple geometric shapes, such as vehicles, the research has expanded to address general objects, including challenging deformable objects, such as humans and animals. However, for the animal, in particular, the majority of existing models are trained based on datasets without metric scale, which can help validate image-only models. To address this limitation, we present WildDepth, a multimodal dataset and benchmark suite for depth estimation, behavior detection, and 3D reconstruction from diverse categories of animals ranging from domestic to wild environments with synchronized RGB and LiDAR. Experimental results show that the use of multi-modal data improves depth reliability by up to 10% RMSE, while RGB-LiDAR fusion enhances 3D reconstruction fidelity by 12% in Chamfer distance. By releasing WildDepth and its benchmarks, we aim to foster robust multimodal perception systems that generalize across domains.", "link": "http://arxiv.org/abs/2603.16816v1", "date": "2026-03-17", "relevancy": 2.3221, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5811}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5811}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WildDepth%3A% {"title": "Scalable Feature Learning on Huge Knowledge Graphs for Downstream Machine Learning", "author": "F\u00e9lix Lefebvre and Ga\u00ebl Varoquaux", "abstract": "Many machine learning tasks can benefit from external knowledge. Large knowledge graphs store such knowledge, and embedding methods can be used to distill it into ready-to-use vector representations for downstream applications. For this purpose, current models have however two limitations: they are primarily optimized for link prediction, via local contrastive learning, and their application to the largest graphs requires significant engineering effort due to GPU memory limits. To address these, we introduce SEPAL: a Scalable Embedding Propagation ALgorithm for large knowledge graphs designed to produce high-quality embeddings for downstream tasks at scale. The key idea of SEPAL is to ensure global embedding consistency by optimizing embeddings only on a small core of entities, and then propagating them to the rest of the graph with message passing. We evaluate SEPAL on 7 large-scale knowledge graphs and 46 downstream machine learning tasks. Our results show that SEPAL significantly outperforms previous methods on downstream tasks. In addition, SEPAL scales up its base embedding model, enabling fitting huge knowledge graphs on commodity hardware.", "link": "http://arxiv.org/abs/2507.00965v3", "date": "2026-03-17", "relevancy": 2.3199, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4804}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.456}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4555}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scala ng%2520model%252C%2520enabling%2520fitting%2520huge%2520knowledge%2520graphs%2520on%2520commodity%2520hardware.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.00965v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Scalable%20Feature%20Learning%20on%20Huge%20Knowledge%20Graphs%20for%20Downstream%20Machine%20Learning&entry.906535625=F%C3%A9lix%20Lefebvre%20and%20Ga%C3%ABl%20Varoquaux&entry.1292438233=Many%20machine%20learning%20tasks%20can%20benefit%20from%20external%20knowledge.%20Large%20knowledge%20graphs%20store%20such%20knowledge%2C%20and%20embedding%20methods%20can%20be%20used%20to%20distill%20it%20into%20ready-to-use%20vector%20representations%20for%20downstream%20applications.%20For%20this%20purpose%2C%20current%20models%20have%20however%20two%20limitations%3A%20they%20are%20primarily%20optimized%20for%20link%20prediction%2C%20via%20local%20contrastive%20learning%2C%20and%20their%20application%20to%20the%20largest%20graphs%20requires%20significant%20engineering%20effort%20due%20to%20GPU%20memory%20limits.%20To%20address%20these%2C%20we%20introduce%20SEPAL%3A%20a%20Scalable%20Embedding%20Propagation%20ALgorithm%20for%20large%20knowledge%20graphs%20designed%20to%20produce%20high-quality%20embeddings%20for%20downstream%20tasks%20at%20scale.%20The%20key%20idea%20of%20SEPAL%20is%20to%20ensure%20global%20embedding%20consistency%20by%20optimizing%20embeddings%20only%20on%20a%20small%20core%20of%20entities%2C%20and%20then%20propagating%20them%20to%20the%20rest%20of%20the%20graph%20with%20message%20passing.%20We%20evaluate%20SEPAL%20on%207%20large-scale%20knowledge%20graphs%20and%2046%20downstream%20machine%20learning%20tasks.%20Our%20results%20show%20that%20SEPAL%20significantly%20outperforms%20previous%20methods%20on%20downstream%20tasks.%20In%20addition%2C%20SEPAL%20scales%20up%20its%20base%20embedding%20model%2C%20enabling%20fitting%20huge%20knowledge%20gra {"title": "Unlearning for One-Step Generative Models via Unbalanced Optimal Transport", "author": "Hyundo Choi and Junhyeong An and Jinseong Park and Jaewoong Choi", "abstract": "Recent advances in one-step generative frameworks, such as flow map models, have significantly improved the efficiency of image generation by learning direct noise-to-data mappings in a single forward pass. However, machine unlearning for ensuring the safety of these powerful generators remains entirely unexplored. Existing diffusion unlearning methods are inherently incompatible with these one-step models, as they rely on a multi-step iterative denoising process. In this work, we propose UOT-Unlearn, a novel plug-and-play class unlearning framework for one-step generative models based on the Unbalanced Optimal Transport (UOT). Our method formulates unlearning as a principled trade-off between a forget cost, which suppresses the target class, and an $f$-divergence penalty, which preserves overall generation fidelity via relaxed marginal constraints. By leveraging UOT, our method enables the probability mass of the forgotten class to be smoothly redistributed to the remaining classes, rather than collapsing into low-quality or noise-like samples. Experimental results on CIFAR-10 and ImageNet-256 demonstrate that our framework achieves superior unlearning success (PUL) and retention quality (u-FID), significantly outperforming baselines.", "link": "http://arxiv.org/abs/2603.16489v1", "date": "2026-03-17", "relevancy": 2.3074, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5931}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5803}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5669}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unlearning%20for%20One-Step%20Generative%20Models%20via%20Unbalanced%20Optimal%20Transport&body=Title%3A%20Unlearning%20for%20One-Step%20Generative%20Models%20via%20Unbalanced%20Optimal%20Transport%0AAuthor%3A%20Hyundo%20Choi%20and%20Junhyeong%20An%20and%20Jinseong%20Park%20and%20Jaewoong%20Choi%0AAbstract%3A%20Recent%20advances%20in%20one-step%20generative%20frameworks%2C%20such%20as%20flow%20map%20models%2C%20have%20significantly%20improved%20the%20efficiency%20of%20image%20generation%20by%20learning%20direct%20noise-to-data%20mappings%20in%20a%20single%20forward%20pass.%20However%2C%20machine%20unlearning%20for%20ensuring%20the%20safety%20of%20these%20powerful%20generators%20remains%20entirely%20unexplored.%20Existing%20diffusion%20unlearning%20methods%20are%20inherently%20incompatible%20with%20these%20one-step%20models%2C%20as%20they%20rely%20on%20a%20multi-step%20iterative%20denoising%20process.%20In%20this%20work%2C%20we%20propose%20UOT-Unlearn%2C%20a%20novel%20plug-and-play%20class%20unlearning%20framework%20for%20one-step%20generative%20models%20based%20on%20the%20Unbalanced%20Optimal%20Transport%20%28UOT%29.%20Our%20method%20formulates%20unlearning%20as%20a%20principled%20trade-off%20between%20a%20forget%20cost%2C%20which%20suppresses%20the%20target%20class%2C%20and%20an%20%24f%24-divergence%20penalty%2C%20which%20preserves%20overall%20generation%20fidelity%20via%20relaxed%20marginal%20constraints.%20By%20leveraging%20UOT%2C%20our%20method%20enables%20the%20probability%20mass%20of%20the%20forgotten%20class%20to%20be%20smoothly%20redistributed%20to%20the%20remaining%20classes%2C%20rather%20than%20collapsing%20into%20low-quality%20or%20noise-like%20samples.%20Experimental%20results%20on%20CIFAR-10%20and%20ImageNet-256%20demonstrate%20that%20our%20framework%20achieves%20superior%20unlearning%20success%20%28PUL%29%20and%20retention%20quality%20%28u-FID%29%2C%20significantly%20outperforming%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16489v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnlearning%2520for%2520One-Step%2520Generative%2520Models%2520via%2520Unbalanced%2520Optimal%2520Transport%26entry.906535625%3DHyundo%2520Choi%2520and%2520Junhyeong%2520An%2520and%2520Jinseong%2520Park%2520and%2520Jaewoong%2520Choi%26entry.1292438233%3DRecent%2520advances%2520in%2520one-step%2520generative%2520frameworks%252C%2520such%2520as%2520flow%2520map%2520models%252C%2520have%2520significantly%2520improved%2520the%2520efficiency%2520of%2520image%2520generation%2520by%2520learning%2520direct%2520noise-to-data%2520mappings%2520in%2520a%2520single%2520forward%2520pass.%2520However%252C%2520machine%2520unlearning%2520for%2520ensuring%2520the%2520safety%2520of%2520these%2520powerful%2520generators%2520remains%2520entirely%2520unexplored.%2520Existing%2520diffusion%2520unlearning%2520methods%2520are%2520inherently%2520incompatible%2520with%2520these%2520one-step%2520models%252C%2520as%2520they%2520rely%2520on%2520a%2520multi-step%2520iterative%2520denoising%2520process.%2520In%2520this%2520work%252C%2520we%2520propose%2520UOT-Unlearn%252C%2520a%2520novel%2520plug-and-play%2520class%2520unlearning%2520framework%2520for%2520one-step%2520generative%2520models%2520based%2520on%2520the%2520Unbalanced%2520Optimal%2520Transport%2520%2528UOT%2529.%2520Our%2520method%2520formulates%2520unlearning%2520as%2520a%2520principled%2520trade-off%2520between%2520a%2520forget%2520cost%252C%2520which%2520suppresses%2520the%2520target%2520class%252C%2520and%2520an%2520%2524f%2524-divergence%2520penalty%252C%2520which%2520preserves%2520overall%2520generation%2520fidelity%2520via%2520relaxed%2520marginal%2520constraints.%2520By%2520leveraging%2520UOT%252C%2520our%2520method%2520enables%2520the%2520probability%2520mass%2520of%2520the%2520forgotten%2520class%2520to%2520be%2520smoothly%2520redistributed%2520to%2520the%2520remaining%2520clas {"title": "EngGPT2: Sovereign, Efficient and Open Intelligence", "author": "G. Ciarfaglia and A. Rosanova and S. Cipolla and J. Bartoli and A. Di Domenico and C. Fioroni and A. Fontana and M. R. Scoleri and M. I. Mone and D. Franchi and M. C. Del Gaudio and F. Picariello and M. Gabusi and S. Bonura and V. Morreale and I. Bailo", "abstract": "EngGPT2-16B-A3B is the latest iteration of Engineering Group's Italian LLM and it's built to be a Sovereign, Efficient and Open model. EngGPT2 is trained on 2.5 trillion tokens - less than Qwen3's 36T or Llama3's 15T - and delivers performance on key benchmarks, including MMLU-Pro, GSM8K, IFEval and HumanEval, comparable to dense models in the 8B-16B range, while requiring one-fifth to half of the inference power, and between one-tenth to one-sixth of the training data and consequent needed training power. Designed as a trained-from-scratch Mixture-of-Experts (MoE) architecture, EngGPT2 features 16 billion parameters with 3 billion active per inference, with expert sizes positioned between those used in GPT-OSS and Qwen3. Approximately 25% of its training corpus consists of Italian-language data, to deliver strong capabilities for European and Italian NLP tasks among models of similar scale. This efficiency aims to position EngGPT2 as a key contributor to the growing portfolio of open-weight European models, combining performance and efficiency with full alignment to the EU AI Act. EngGPT2 is also a single model capable of multiple reasoning modes: non-reasoning, reasoning in Italian or English, and turbo-reasoning (a concise, bullet-point style reasoning available in both languages designed for real-time reasoning use cases). EngGPT2 aims to set a new standard for resource-conscious, high-performance LLMs tailored to European and Italian contexts.", "link": "http://arxiv.org/abs/2603.16430v1", "date": "2026-03-17", "relevancy": 2.2995, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4723}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EngGPT2%3A%20Sovereign%2C%20Efficient%20and%20Open%20Intelligence&body=Title%3A%20EngGPT2%3A%20Sovereign%2C%20Efficient%20and%20Open%20Intelligence%0AAuthor%3A%20G.%20Ciarfaglia%20and%20A.%20Rosanova%20and%20S.%20Cipolla%20and%20J.%20Bartoli%20and%20A.%20Di%20Domenico%20and%20C.%20Fioroni%20and%20A.%20Fontana%20and%20M.%20R.%20Scoleri%20and%20M.%20I.%20Mone%20and%20D.%20Franchi%20and%20M.%20C.%20Del%20Gaudio%20and%20F.%20Picariello%20and%20M.%20Gabusi%20and%20S.%20Bonura%20and%20V.%20Morreale%20and%20I.%20Bailo%0AAbstract%3A%20EngGPT2-16B-A3B%20is%20the%20latest%20iteration%20of%20Engineering%20Group%27s%20Italian%20LLM%20and%20it%27s%20built%20to%20be%20a%20Sovereign%2C%20Efficient%20and%20Open%20model.%20EngGPT2%20is%20trained%20on%202.5%20trillion%20tokens%20-%20less%20than%20Qwen3%27s%2036T%20or%20Llama3%27s%2015T%20-%20and%20delivers%20performance%20on%20key%20benchmarks%2C%20including%20MMLU-Pro%2C%20GSM8K%2C%20IFEval%20and%20HumanEval%2C%20comparable%20to%20dense%20models%20in%20the%208B-16B%20range%2C%20while%20requiring%20one-fifth%20to%20half%20of%20the%20inference%20power%2C%20and%20between%20one-tenth%20to%20one-sixth%20of%20the%20training%20data%20and%20consequent%20needed%20training%20power.%20Designed%20as%20a%20trained-from-scratch%20Mixture-of-Experts%20%28MoE%29%20architecture%2C%20EngGPT2%20features%2016%20billion%20parameters%20with%203%20billion%20active%20per%20inference%2C%20with%20expert%20sizes%20positioned%20between%20those%20used%20in%20GPT-OSS%20and%20Qwen3.%20Approximately%2025%25%20of%20its%20training%20corpus%20consists%20of%20Italian-language%20data%2C%20to%20deliver%20strong%20capabilities%20for%20European%20and%20Italian%20NLP%20tasks%20among%20models%20of%20similar%20scale.%20This%20efficiency%20aims%20to%20position%20EngGPT2%20as%20a%20key%20contributor%20to%20the%20growing%20portfolio%20of%20open-weight%20European%20models%2C%20combining%20performance%20and%20efficiency%20with%20full%20alignment%20to%20the%20EU%20AI%20Act.%20EngGPT2%20is%20also%20a%20single%20model%20capable%20of%20multiple%20reasoning%20modes%3A%20non-reasoning%2C%20reasoning%20in%20Italian%20or%20English%2C%20and%20turbo-reasoning%20%28a%20concise%2C%20bullet-point%20style%20reasoning%20available%20in%20both%20languages%20designed%20for%20real-time%20reasoning%20use%20cases%29.%20EngGPT2%20aims%20to%20set%20a%20new%20standard%20for%20resource-conscious%2C%20high-performance%20LLMs%20tailored%20to%20European%20and%20Italian%20contexts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16430v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEngGPT2%253A%2520Sovereign%252C%2520Efficient%2520and%2520Open%2520Intelligence%26entry.906535625%3DG.%2520Ciarfaglia%2520and%2520A.%2520Rosanova%2520and%2520S.%2520Cipolla%2520and%2520J.%2520Bartoli%2520and%2520A.%2520Di%2520Domenico%2520and%2520C.%2520Fioroni%2520and%2520A.%2520Fontana%2520and%2520M.%2520R.%2520Scoleri%2520and%2520M.%2520I.%2520Mone%2520and%2520D.%2520Franchi%2520and%2520M.%2520C.%2520Del%2520Gaudio%2520and%2520F.%2520Picariello%2520and%2520M.%2520Gabusi%2520and%2520S.%2520Bonura%2520and%2520V.%2520Morreale%2520and%2520I.%2520Bailo%26entry.1292438233%3DEngGPT2-16B-A3B%2520is%2520the%2520latest%2520iteration%2520of%2520Engineering%2520Group%2527s%2520Italian%2520LLM%2520and%2520it%2527s%2520built%2520to%2520be%2520a%2520Sovereign%252C%2520Efficient%2520and%2520Open%2520model.%2520EngGPT2%2520is%2520trained%2520on%25202.5%2520trillion%2520tokens%2520-%2520less%2520than scious%252C%2520high-performance%2520LLMs%2520tailored%2520to%2520European%2520and%2520Italian%2520contexts.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16430v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EngGPT2%3A%20Sovereign%2C%20Efficient%20and%20Open%20Intelligence&entry.906535625=G.%20Ciarfaglia%20and%20A.%20Rosanova%20and%20S.%20Cipolla%20and%20J.%20Bartoli%20and%20A.%20Di%20Domenico%20and%20C.%20Fioroni%20and%20A.%20Fontana%20and%20M.%20R.%20Scoleri%20and%20M.%20I.%20Mone%20and%20D.%20Franchi%20and%20M.%20C.%20Del%20Gaudio%20and%20F.%20Picariello%20and%20M.%20Gabusi%20and%20S.%20Bonura%20and%20V.%20Morreale%20and%20I.%20Bailo&entry.1292438233=EngGPT2-16B-A3B%20is%20the%20latest%20iteration%20of%20Engineering%20Group%27s%20Italian%20LLM%20and%20it%27s%20built%20to%20be%20a%20Sovereign%2C%20Efficient%20and%20Open%20model.%20EngGPT2%20is%20trained%20on%202.5%20trillion%20tokens%20-%20less%20than%20Qwen3%27s%2036T%20or%20Llama3%27s%2015T%20-%20and%20delivers%20performance%20on%20key%20benchmarks%2C%20including%20MMLU-Pro%2C%20GSM8K%2C%20IFEval%20and%20HumanEval%2C%20comparable%20to%20dense%20models%20in%20the%208B-16B%20range%2C%20while%20requiring%20one-fifth%20to%20half%20of%20the%20inference%20power%2C%20and%20between%20one-tenth%20to%20one-sixth%20of%20the%20training%20data%20and%20consequent%20needed%20training%20power.%20Designed%20as%20a%20trained-from-scratch%20Mixture-of-Experts%20%28MoE%29%20architecture%2C%20EngGPT2%20features%2016%20billion%20parameters%20with%203%20billion%20active%20per%20inference%2C%20with%20expert%20sizes%20positioned%20between%20those%20used%20in%20GPT-OSS%20and%20Qwen3.%20Approximately%2025%25%20of%20its%20training%20corpus%20consists%20of%20Italian-language%20data%2C%20to%20deliver%20strong%20capabilities%20for%20European%20and%20Italian%20NLP%20tasks%20among%20models%20of%20similar%20scale.%20This%20efficiency% {"title": "Iris: Bringing Real-World Priors into Diffusion Model for Monocular Depth Estimation", "author": "Xinhao Cai and Gensheng Pei and Zeren Sun and Yazhou Yao and Fumin Shen and Wenguan Wang", "abstract": "In this paper, we propose \\textbf{Iris}, a deterministic framework for Monocular Depth Estimation (MDE) that integrates real-world priors into the diffusion model. Conventional feed-forward methods rely on massive training data, yet still miss details. Previous diffusion-based methods leverage rich generative priors yet struggle with synthetic-to-real domain transfer. Iris, in contrast, preserves fine details, generalizes strongly from synthetic to real scenes, and remains efficient with limited training data. To this end, we introduce a two-stage Priors-to-Geometry Deterministic (PGD) schedule: the prior stage uses Spectral-Gated Distillation (SGD) to transfer low-frequency real priors while leaving high-frequency details unconstrained, and the geometry stage applies Spectral-Gated Consistency (SGC) to enforce high-frequency fidelity while refining with synthetic ground truth. The two stages share weights and are executed with a high-to-low timestep schedule. Extensive experimental results confirm that Iris achieves significant improvements in MDE performance with strong in-the-wild generalization.", "link": "http://arxiv.org/abs/2603.16340v1", "date": "2026-03-17", "relevancy": 2.2956, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6044}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5747}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5609}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Iris%3A%20Bringing%20Real-World%20Priors%20into%20Diffusion%20Model%20for%20Monocular%20Dept %26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16340v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Iris%3A%20Bringing%20Real-World%20Priors%20into%20Diffusion%20Model%20for%20Monocular%20Depth%20Estimation&entry.906535625=Xinhao%20Cai%20and%20Gensheng%20Pei%20and%20Zeren%20Sun%20and%20Yazhou%20Yao%20and%20Fumin%20Shen%20and%20Wenguan%20Wang&entry.1292438233=In%20this%20paper%2C%20we%20propose%20%5Ctextbf%7BIris%7D%2C%20a%20deterministic%20framework%20for%20Monocular%20Depth%20Estimation%20%28MDE%29%20that%20integrates%20real-world%20priors%20into%20the%20diffusion%20model.%20Conventional%20feed-forward%20methods%20rely%20on%20massive%20training%20data%2C%20yet%20still%20miss%20details.%20Previous%20diffusion-based%20methods%20leverage%20rich%20generative%20priors%20yet%20struggle%20with%20synthetic-to-real%20domain%20transfer.%20Iris%2C%20in%20contrast%2C%20preserves%20fine%20details%2C%20generalizes%20strongly%20from%20synthetic%20to%20real%20scenes%2C%20and%20remains%20efficient%20with%20limited%20training%20data.%20To%20this%20end%2C%20we%20introduce%20a%20two-stage%20Priors-to-Geometry%20Deterministic%20%28PGD%29%20schedule%3A%20the%20prior%20stage%20uses%20Spectral-Gated%20Distillation%20%28SGD%29%20to%20transfer%20low-frequency%20real%20priors%20while%20leaving%20high-frequency%20details%20unconstrained%2C%20and%20the%20geometry%20stage%20applies%20Spectral-Gated%20Consistency%20%28SGC%29%20to%20enforce%20high-frequency%20fidelity%20while%20refining%20with%20synthetic%20ground%20truth.%20The%20two%20stages%20share%20weights%20and%20are%20executed%20with%20a%20high-to-low%20timestep%20schedule.%20Extensive%20experimental%20results%20confirm%20that%20Iris%20achieves%20significant%20improvements%20in%20MDE%20performance%20with%20strong%20in-the-wild%20generalization.&entry.1838667208=http%3A//arxiv.org/abs/2603.16340v1&entry.124074799=Read"},
{"title": "High-Dimensional Gaussian Mean Estimation under Realizable Contamination", "author": "Ilias Diakonikolas and Daniel M. Kane and Thanasis Pittas", "abstract": "We study mean estimation for a Gaussian distribution with identity covariance in $\\mathbb{R}^d$ under a missing data scheme termed realizable $\u03b5$-contamination model. In this model an adversary can choose a function $r(x)$ between 0 and $\u03b5$ and each sample $x$ goes missing with probability $r(x)$. Recent work Ma et al., 2024 proposed this model as an intermediate-strength setting between Missing Completely At Random (MCAR) -- where missingness is independent of the data -- and Missing Not At Random (MNAR) -- where missingness may depend arbitrarily on the sample values and can lead to non-identifiability issues. That work established information-theoretic upper and lower bounds for mean estimation in the realizable contamination model. Their proposed estimators incur runtime exponential in the dimension, leaving open the possibility of computationally efficient algorithms in high dimensions. In this work, we establish an information-computation gap in the Statistical Query model (and, as a corollary, for Low-Degree Polynomials and PTF tests), showing that algorithms must either use substantially more samples than information-theoretically necessary or incur exponential runtime. We complement our SQ lower bound with an algorithm whose sample-time tradeoff nearly matches our lower bound. Together, these results qualitatively characterize the complexity of Gaussian mean estimation under $\u03b5$-realizable contamination.", "link": "http://arxiv.org/abs/2603.16798v1", "date": "2026-03-17", "relevancy": 2.2938, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.475}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.451}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4503}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20High-Dimensional%20Gaussian%20Mean%20Estimation%20under%20Realizable%20Contamination&body=Title%3A%20High-Dimensional%20Gaussian%20Mean%20Estimation%20under%20Realizable%20Contamination%0AAuthor%3A%20Ilias%20Diakonikolas%20and%20Daniel%20M.%20Kane%20and%20Thanasis%20Pittas%0AAbstract%3A%20We%20study%20mean%20estimation%20for%20a%20Gaussian%20distribution%20with%20identity%20covariance%20in%20%24%5Cmathbb%7BR%7D%5Ed%24%20under%20a%20missing%20data%20scheme%20termed%20realizable%20%24%CE%B5%24-contamination%20model.%20In%20this%20model%20an%20adversary%20can%20choose%20a%20function%20%24r%28x%29%24%20between%200%20and%20%24%CE%B5%24%20and%20each%20sample%20%24x%24%20goes%20missing%20with%20probability%20%24r%28x%29%24.%20Recent%20work%20Ma%20et%20al.%2C%202024%20proposed%20this%20model%20as%20an%20intermediate-strength%20setting%20between%20Missing%20Completely%20At%20Random%20%28MCAR%29%20--%20where%20missingness%20is%20independent%20of%20the%20data%20--%20and%20Missing%20Not%20At%20Random%20%28MNAR%29%20--%20where%20missingness%20may%20depend%20arbitrarily%20on%20the%20sample%20values%20and%20can%20lead%20to%20non-identifiability%20issues.%20That%20work%20established%20information-theoretic%20upper%20and%20lower%20bounds%20for%20mean%20estimation%20in%20the%20realizable%20contamination%20model.%20Their%20proposed%20estimators%20incur%20runtime%20exponential%20in%20the%20dimension%2C%20leaving%20open%20the%20possibility%20of%20computationally%20efficient%20algorithms%20in%20high%20dimensions.%20In%20this%20work%2C%20we%20establish%20an%20information-computation%20gap%20in%20the%20Statistical%20Query%20model%20%28and%2C%20as%20a%20corollary%2C%20for%20Low-Degree%20Polynomials%20and%20PTF%20tests%29%2C%20showing%20that%20algorithms%20must%20either%20use%20substantially%20more%20samples%20than%20information-theoretically%20necessary%20or%20incur%20exponential%20runtime.%20We%20complement%20our%20SQ%20lower%20bound%20with%20an%20algorithm%20whose%20sample-time%20tradeoff%20nearly%20matches%20our%20lower%20bound.%20Together%2C%20these%20results%20qualitatively%20characterize%20the%20complexity%20of%20Gaussian%20mean%20estimation%20under%20%24%CE%B5%24-realizable%20contamination.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16798v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHigh-Dimensional%2520Gaussian%2520Mean%2520Estimation%2520under%2520Realizable%2520Contamination%26entry.906535625%3DIlias%2520Diakonikolas%2520and%2520Daniel%2520M.%2520Kane%2520and%2520Thanasis%2520Pittas%26entry.1292438233%3DWe%2520study%2520mean%2520estimation%2520for%2520a%2520Gaussian%2520distribution%2520with%2520identity%2520covariance%2520in%2520%2524%255Cmathbb%257BR%257D%255Ed%2524%2520under%2520a%2520missing%2520data%2520scheme%2520termed%2520realizable%2520%2524%25CE%25B5%2524-contamination%2520model.%2520In%2520this%2520model%2520an%2520adversary%2520can%2520choose%2520a%2520function%2520%2524r%2528x%2529%2524%2520between%25200%2520and%2520%2524%25CE%25B5%2524%2520and%2520each%2520sample%2520%2524x%2524%2520goes%2520missing%2520with%2520probability%2520%2524r%2528x%2529%2524.%2520Recent%2520work%2520Ma%2520et%2520al.%252C%25202024%2520proposed%2520this%2520model%2520as%2520an%2520intermediate-strength%2520setting%2520between%2520Missing%2520Completely%2520At%2520Random%2520%2528MCAR%2529%2520--%2520where%2520missingness%2520is%2520independent%2520of%2520the%2520data%2520--%2520and%2520Missing%2520Not%2520At%2520Random%2520%2528MNAR%2529%2520--%2520where%2520missingness%2520may%2520depend%2520arbitrarily%2520on%2520the%2520sample%2520values%2520and%2520can%2520lead%2520to%2520non-identifiability%2520issues.%2520That%2520work%2520estab {"title": "VideoITG: Multimodal Video Understanding with Instructed Temporal Grounding", "author": "Shihao Wang and Guo Chen and De-an Huang and Zhiqi Li and Minghan Li and Guilin Liu and Jose M. Alvarez and Lei Zhang and Zhiding Yu", "abstract": "While Video Large Language Models (Video-LLMs) have shown significant potential in multimodal understanding and reasoning tasks, how to efficiently select the most informative frames from videos remains a critical challenge. Existing methods attempt to optimize frame sampling by reducing inter-frame redundancy or employing unsupervised event localization. However, these approaches often fall short in handling complex instruction-following tasks and scenarios that demand precise temporal modeling, resulting in limited performance in both semantic alignment and temporal reasoning. To address the above challenges, we introduce Instructed Temporal Grounding for Videos (VideoITG), a framework aiming to adaptively customize frame sampling strategies based on user instructions. Specifically, we design the VidThinker pipeline, which automates annotation by generating instruction-conditioned captions, retrieving relevant video segments, and selecting key frames to enable efficient supervision. Using VidThinker, we build the VideoITG-40K dataset with 40K videos and 500K temporal grounding annotations. Our plug-and-play VideoITG model leverages Video-LLMs' visual-language alignment and reasoning for discriminative frame selection. VideoITG consistently boosts the performance on multiple multimodal video understanding benchmarks, demonstrating its effectiveness and potential.", "link": "http://arxiv.org/abs/2507.13353v2", "date": "2026-03-17", "relevancy": 2.2892, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5851}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5654}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoITG%3A%20Multimodal%20Video%20Understanding%20with%20Instructed%20Temporal%20Grounding&body=Title%3A%20VideoITG%3A%20Multimodal%20Video%20Understanding%20with%20Instructed%20Temporal%20Grounding%0AAuthor%3A%20Shihao%20Wang%20and%20Guo%20Chen%20and%20De-an%20Huang%20and%20Zhiqi%20Li%20and%20Minghan%20Li%20and%20Guilin%20Liu%20and%20Jose%20M.%20Alvarez%20and%20Lei%20Zhang%20and%20Zhiding%20Yu%0AAbstract%3A%20While%20Video%20Large%20Language%20Models%20%28Video-LLMs%29%20have%20shown%20significant%20potential%20in%20multimodal%20understanding%20and%20reasoning%20tasks%2C%20how%20to%20efficiently%20select%20the%20most%20informative%20frames%20from%20videos%20remains%20a%20critical%20challenge.%20Existing%20methods%20attempt%20to%20optimize%20frame%20sampling%20by%20reducing%20inter-frame%20redundancy%20or%20employing%20unsupervised%20event%20localization.%20However%2C%20these%20approaches%20often%20fall%20short%20in%20handling%20complex%20instruction-following%20tasks%20and%20scenarios%20that%20demand%20precise%20temporal%20modeling%2C%20resulting%20in%20limited%20performance%20in%20both%20semantic%20alignment%20and%20temporal%20reasoning.%20To%20address%20the%20above%20challenges%2C%20we%20introduce%20Instructed%20Temporal%20Grounding%20for%20Videos%20%28VideoITG%29%2C%20a%20framework%20aiming%20to%20adaptively%20customize%20frame%20sampling%20strategies%20based%20on%20user%20instructions.%20Specifically%2C%20we%20design%20the%20VidThinker%20pipeline%2C%20which%20automates%20annotation%20by%20generating%20instruction-conditioned%20captions%2C%20retrieving%20relevant%20video%20segments%2C%20and%20selecting%20key%20frames%20to%20enable%20efficient%20supervision.%20Using%20VidThinker%2C%20we%20build%20the%20VideoITG-40K%20dataset%20with%2040K%20videos%20and%20500K%20temporal%20grounding%20annotations.%20Our%20plug-and-play%20VideoITG%20model%20leverages%20Video-LLMs%27%20visual-language%20alignment%20and%20reasoning%20for%20discriminative%20frame%20selection.%20VideoITG%20consistently%20boosts%20the%20performance%20on%20multiple%20multimodal%20video%20understanding%20benchmarks%2C%20demonstrating%20its%20effectiveness%20and%20potential.%0ALink%3A%20http%3A//arxiv.org/abs/2507.13353v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoITG%253A%2520Multimodal%2520Video%2520Understanding%2520with%2520Instructed%2520Temporal%2520Grounding%26entry.906535625%3DShihao%2520Wang%2520and%2520Guo%2520Chen%2520and%2520De-an%2520Huang%2520and%2520Zhiqi%2520Li%2520and%2520Minghan%2520Li%2520and%2520Guilin%2520Liu%2520and%2520Jose%2520M.%2520Alvarez%2520and%2520Lei%2520Zhang%2520and%2520Zhiding%2520Yu%26entry.1292438233%3DWhile%2520Video%2520Large%2520Language%2520Models%2520%2528Video-LLMs%2529%2520have%2520shown%2520significant%2520potential%2520in%2520multimodal%2520understanding%2520and%2520reasoning%2520tasks%252C%2520how%2520to%2520efficiently%2520select%2520the%2520most%2520informative%2520frames%2520from%2520videos%2520remains%2520a%2520critical%2520challenge.%2520Existing%2520methods%2520attempt%2520to%2520optimize%2520frame%2520sampling%2520by%2520reducing%2520inter-frame%2520redundancy%2520or%2520employing%2520unsupervised%2520event%2520localization.%2520However%252C%2520these%2520approaches%2520often%2520fall%2520short%2520in%2520handling%2520complex%2520instruction-following%2520tasks%2520and%2520scenarios%2520that%2520demand%2520precise%2520temporal%2520modeling%252C%2520resulting%2520in%2520limited%2520performance%2520in%2520both%2520semantic%2520alignment%2520and%2520temporal%2520reasoning.%2520To%2520address%2520the%2520above%2520challenges%252C%2520we%2520introduce%2520Instr {"title": "Unbiased Object Detection Beyond Frequency with Visually Prompted Image Synthesis", "author": "Xinhao Cai and Liulei Li and Gensheng Pei and Tao Chen and Jinshan Pan and Yazhou Yao and Wenguan Wang", "abstract": "This paper presents a generation-based debiasing framework for object detection. Prior debiasing methods are often limited by the representation diversity of samples, while naive generative augmentation often preserves the biases it aims to solve. Moreover, our analysis reveals that simply generating more data for rare classes is suboptimal due to two core issues: i) instance frequency is an incomplete proxy for the true data needs of a model, and ii) current layout-to-image synthesis lacks the fidelity and control to generate high-quality, complex scenes. To overcome this, we introduce the representation score (RS) to diagnose representational gaps beyond mere frequency, guiding the creation of new, unbiased layouts. To ensure high-quality synthesis, we replace ambiguous text prompts with a precise visual blueprint and employ a generative alignment strategy, which fosters communication between the detector and generator. Our method significantly narrows the performance gap for underrepresented object groups, \\eg, improving large/rare instances by 4.4/3.6 mAP over the baseline, and surpassing prior L2I synthesis models by 15.9 mAP for layout accuracy in generated images.", "link": "http://arxiv.org/abs/2510.18229v3", "date": "2026-03-17", "relevancy": 2.2845, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6442}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5585}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unbiased%20Object%20Detection%20Beyond%20Frequency%20with%20Visually%20Prompted%20Image%20Synthesis&body=Title%3A%20Unbiased%20Object%20Detection%20Beyond%20Frequency%20with%20Visually%20Prompted%20Image%20Synthesis%0AAuthor%3A%20Xinhao%20Cai%20and%20Liulei%20Li%20and%20Gensheng%20Pei%20and%20Tao%20Chen%20and%20Jinshan%20Pan%20and%20Yazhou%20Yao%20and%20Wenguan%20Wang%0AAbstract%3A%20This%20paper%20presents%20a%20generation-based%20debiasing%20framework%20for%20object%20detection.%20Prior%20debiasing%20methods%20are%20often%20limited%20by%20the%20representation%20diversity%20of%20samples%2C%20while%20naive%20generative%20augmentation%20often%20preserves%20the%20biases%20it%20aims%20to%20solve.%20Moreover%2C%20our%20analysis%20reveals%20that%20simply%20generating%20more%20data%20for%20rare%20classes%20is%20suboptimal%20due%20to%20two%20core%20issues%3A%20i%29%20instance%20frequency%20is%20an%20incomplete%20proxy%20for%20the%20true%20data%20needs%20of%20a%20model%2C%20and%20ii%29%20current%20layout-to-image%20synthesis%20lacks%20the%20fidelity%20and%20control%20to%20generate%20high-quality%2C%20complex%20scenes.%20To%20overcome%20this%2C%20we%20introduce%20the%20representation%20score%20%28RS%29%20to%20diagnose%20representational%20gaps%20beyond%20mere%20frequency%2C%20guiding%20the%20creation%20of%20new%2C%20unbiased%20layouts.%20To%20ensure%20high-quality%20synthesis%2C%20we%20replace%20ambiguous%20text%20prompts%20with%20a%20precise%20visual%20blueprint%20and%20employ%20a%20generative%20alignment%20strategy%2C%20which%20fosters%20communication%20between%20the%20detector%20and%20generator.%20Our%20method%20significantly%20narrows%20the%20performance%20gap%20for%20underrepresented%20object%20groups%2C%20%5Ceg%2C%20improving%20large/rare%20instances%20by%204.4/3.6%20mAP%20over%20the%20baseline%2C%20and%20surpassing%20prior%20L2I%20synthesis%20models%20by%2015.9%20mAP%20for%20layout%20accuracy%20in%20generated%20images.%0ALink% e%2520detector%2520and%2520generator.%2520Our%2520method%2520significantly%2520narrows%2520the%2520performance%2520gap%2520for%2520underrepresented%2520object%2520groups%252C%2520%255Ceg%252C%2520improving%2520large/rare%2520instances%2520by%25204.4/3.6%2520mAP%2520over%2520the%2520baseline%252C%2520and%2520surpassing%2520prior%2520L2I%2520synthesis%2520models%2520by%252015.9%2520mAP%2520for%2520layout%2520accuracy%2520in%2520generated%2520images.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.18229v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unbiased%20Object%20Detection%20Beyond%20Frequency%20with%20Visually%20Prompted%20Image%20Synthesis&entry.906535625=Xinhao%20Cai%20and%20Liulei%20Li%20and%20Gensheng%20Pei%20and%20Tao%20Chen%20and%20Jinshan%20Pan%20and%20Yazhou%20Yao%20and%20Wenguan%20Wang&entry.1292438233=This%20paper%20presents%20a%20generation-based%20debiasing%20framework%20for%20object%20detection.%20Prior%20debiasing%20methods%20are%20often%20limited%20by%20the%20representation%20diversity%20of%20samples%2C%20while%20naive%20generative%20augmentation%20often%20preserves%20the%20biases%20it%20aims%20to%20solve.%20Moreover%2C%20our%20analysis%20reveals%20that%20simply%20generating%20more%20data%20for%20rare%20classes%20is%20suboptimal%20due%20to%20two%20core%20issues%3A%20i%29%20instance%20frequency%20is%20an%20incomplete%20proxy%20for%20the%20true%20data%20needs%20of%20a%20model%2C%20and%20ii%29%20current%20layout-to-image%20synthesis%20lacks%20the%20fidelity%20and%20control%20to%20generate%20high-quality%2C%20complex%20scenes.%20To%20overcome%20this%2C%20we%20introduce%20the%20representation%20score%20%28RS%29%20to%20diagnose%20representational%20gaps%20beyond%20mere%20frequency%2C%20guiding%20the%20creation%20of%20new%2C%20unbiased%20layouts.%20To%20ensure%20high-quality%20synthesis%2C%20we%20replace%20ambiguous%20text%20prompts%20with%20a%2 {"title": "Coded Robust Aggregation for Distributed Learning under Byzantine Attacks", "author": "Chengxi Li and Ming Xiao and Mikael Skoglund", "abstract": "In this paper, we investigate the problem of distributed learning (DL) in the presence of Byzantine attacks. For this problem, various robust bounded aggregation (RBA) rules have been proposed at the central server to mitigate the impact of Byzantine attacks. However, current DL methods apply RBA rules for the local gradients from the honest devices and the disruptive information from Byzantine devices, and the learning performance degrades significantly when the local gradients of different devices vary considerably from each other. To overcome this limitation, we propose a new DL method to cope with Byzantine attacks based on coded robust aggregation (CRA-DL). Before training begins, the training data are allocated to the devices redundantly. During training, in each iteration, the honest devices transmit coded gradients to the server computed from the allocated training data, and the server then aggregates the information received from both honest and Byzantine devices using RBA rules. In this way, the global gradient can be approximately recovered at the server to update the global model. Compared with current DL methods applying RBA rules, the improvement of CRA-DL is attributed to the fact that the coded gradients sent by the honest devices are closer to each other. This closeness enhances the robustness of the aggregation against Byzantine attacks, since Byzantine messages tend to be significantly different from those of honest devices in this case. We theoretically analyze the convergence performance of CRA-DL. Finally, we present numerical results to verify the superiority of the proposed method over existing baselines, showing its enhanced learning performance under Byzantine attacks.", "link": "http://arxiv.org/abs/2506.01989v2", "date": "2026-03-17", "relevancy": 2.2788, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4609}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4558}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coded%20Robust%20Aggregation%20for%20Distributed%20Learning%20under%20Byzantine%20Attacks&body=Title%3A%20Coded%20Robust%20Aggregation%20for%20Distributed%20Learning%20under%20Byzantine%20Attacks%0AAuthor%3A%20Chengxi%20Li%20and%20Ming%20Xiao%20and%20Mikael%20Skoglund%0AAbstract%3A%20In%20this%20paper%2C%20we%20investigate%20the%20problem%20of%20distributed%20learning%20%28DL%29%20in%20the%20presence%20of%20Byzantine%20attacks.%20For%20this%20problem%2C%20various%20robust%20bounded%20aggregation%20%28RBA%29%20rules%20have%20been%20proposed%20at%20the%20central%20server%20to%20mitigate%20the%20impact%20of%20Byzantine%20attacks.%20However%2C%20current%20DL%20methods%20apply%20RBA%20rules%20for%20the%20local%20gradients%20from%20the%20honest%20devices%20and%20the%20disruptive%20information%20from%20Byzantine%20devices%2C%20and%20the%20learning%20performance%20degrades%20significantly%20when%20the%20local%20gradients%20of%20different%20devices%20vary%20considerably%20from%20each%20other.%20To%20overcome%20this%20limitation%2C%20we%20propose%20a%20new%20DL%20method%20to%20cope%20with%20Byzantine%20attacks%20based%20on%20coded%20robust%20aggregation%20%28CRA-DL%29.%20Before%20training%20begins%2C%20the%20training%20data%20are%20allocated%20to%20the%20devices%20redundantly.%20During%20training%2C%20in%20each%20iteration%2C%20the%20honest%20devices%20transmit%20coded%20gradients%20to%20the%20server%20computed%20from%20the%20allocated%20training%20data%2C%20and%20the%20server%20then%20aggregates%20the%20information%20received%20from%20both%20honest%20and%20Byzantine%20devices%20using%20RBA%20rules.%20In%20this%20way%2C%20the%20global%20gradient%20can%20be%20approximately%20recovered%20at%20the%20server%20to%20update%20the%20global%20model.%20Compared%20with%20current%20DL%20methods%20applying%20RBA%20rules%2C%20the%20improvement%20of%20CRA-DL%20is%20attributed%20to%20the%20fact%20that%20the%20coded%20gradients%20sent%20by%20the%20honest%20devices%20are%20closer%20to%20each%20other.%20This%20closeness%20enhances%20the%20robustness%20of%20the%20aggregation%20against%20Byzantine%20attacks%2C%20since%20Byzantine%20messages%20tend%20to%20be%20significantly%20different%20from%20those%20of%20honest%20devices%20in%20this%20case.%20We%20theoretically%20analyze%20the%20convergence%20performance%20of%20CRA-DL.%20Finally%2C%20we%20present%20numerical%20results%20to%20verify%20the%20superiority%20of%20the%20proposed%20method%20over%20existing%20baselines%2C%20showing%20its%20enhanced%20learning%20performance%20under%20Byzantine%20attacks.%0ALink%3A%20http%3A//arxiv.org/abs/2506.01989v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoded%2520Robust%2520Aggregation%2520for%2520Distributed%2520Learning%2520under%2520Byzantine%2520Attacks%26entry.906535625%3DChengxi%2520Li%2520and%2520Ming%2520Xiao%2520and%2520Mikael%2520Skoglund%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520investigate%2520the%2520problem%2520of%2520distributed%2520learning%2520%2528DL%2529%2520in%2520the%2520presence%2520of%2520Byzantine%2520attacks.%2520For%2520this%2520problem%252C%2520various%2520robust%2520bounded%2520aggregation%2520%2528RBA%2529%2520rules%2520have%2520been%2520proposed%2520at%2520the%2520central%2520server%2520to%2520mitigate%2520the%2520impact%2520of%2520Byzantine%2520attacks.%2520However%252C%2520current%2520DL%25 {"title": "Fanar 2.0: Arabic Generative AI Stack", "author": " FANAR TEAM and Ummar Abbas and Mohammad Shahmeer Ahmad and Minhaj Ahmad and Abdulaziz Al-Homaid and Anas Al-Nuaimi and Enes Altinisik and Ehsaneddin Asgari and Sanjay Chawla and Shammur Chowdhury and Fahim Dalvi and Kareem Darwish and Nadir Durrani and Mohamed Elfeky and Ahmed Elmagarmid and Mohamed Eltabakh and Asim Ersoy and Masoomali Fatehkia and Mohammed Qusay Hashim and Majd Hawasly and Mohamed Hefeeda and Mus'ab Husaini and Keivin Isufaj and Soon-Gyo Jung and Houssam Lachemat and Ji Kim Lucas and Abubakr Mohamed and Tasnim Mohiuddin and Basel Mousi and Hamdy Mubarak and Ahmad Musleh and Mourad Ouzzani and Amin Sadeghi and Husrev Taha Sencar and Mohammed Shinoy and Omar Sinan and Yifan Zhang", "abstract": "We present Fanar 2.0, the second generation of Qatar's Arabic-centric Generative AI platform. Sovereignty is a first-class design principle: every component, from data pipelines to deployment infrastructure, was designed and operated entirely at QCRI, Hamad Bin Khalifa University. Fanar 2.0 is a story of resource-constrained excellence: the effort ran on 256 NVIDIA H100 GPUs, with Arabic having only ~0.5% of web data despite 400 million native speakers. Fanar 2.0 adopts a disciplined strategy of data quality over quantity, targeted continual pre-training, and model merging to achieve substantial gains within these constraints. At the core is Fanar-27B, continually pre-trained from a Gemma-3-27B backbone on a curated corpus of 120 billion high-quality tokens across three data recipes. Despite using 8x fewer pre-training tokens than Fanar 1.0, it delivers substantial benchmark improvements: Arabic knowledge (+9.1 pts), language (+7.3 pts), dialects (+3.5 pts), and English capability (+7.6 pts). Beyond the core LLM, Fanar 2.0 introduces a rich stack of new capabilities. FanarGuard is a state-of-the-art 4B bilingual moderation filter for Arabic safety and cultural alignment. The speech family Aura gains a long-form ASR model for hours-long audio. Oryx vision family adds Arabic-aware image and video understanding alongside culturally grounded image generation. An agentic tool-calling framework enables multi-step workflows. Fanar-Sadiq utilizes a multi-agent architecture for Islamic content. Fanar-Diwan provides classical Arabic poetry generation. FanarShaheen delivers LLM-powered bilingual translation. A redesigned multi-layer orchestrator coordinates all components through intent-aware routing and defense-in-depth safety validation. Taken together, Fanar 2.0 demonstrates that sovereign, resource-constrained AI development can produce systems competitive with those built at far greater scale.", "link": "http://arxiv.org/abs/2603.16397v1", "date": "2026-03-17", "relevancy": 2.2765, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4855}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4498}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4307}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fanar%202.0%3A%20Arabic%20Generative%20AI%20Stack&body=Title%3A%20Fanar%202.0%3A%20Arabic%20Generative%20AI%20Stack%0AAuthor%3A%20%20FANAR%20TEAM%20and%20Ummar%20Abbas%20and%20Mohammad%20Shahmeer%20Ahmad%20and%20Minhaj%20Ahmad%20and%20Abdulaziz%20Al-Homaid%20and%20Anas%20Al-Nuaimi%20and%20Enes%20Altinisik%20and%20Ehsaneddin%20Asgari%20and%20Sanjay%20Chawla%20and%20Shammur%20Chowdhury%20and%20Fahim%20Dalvi%20and%20Kareem%20Darwish%20and%20Nadir%20Durrani%20and%20Mohamed%20Elfeky%20and%20Ahmed%20Elmagarmid%20and%20Mohamed%20Eltabakh%20and%20Asim%20Ersoy%20and%20Masoomali%20Fatehkia%20and%20Mohammed%20Qusay%20Hashim%20and%20Majd%20Hawasly%20and%20Mohamed%20Hefeeda%20and%20M {"title": "CloSE: A Geometric Shape-Agnostic Cloth State Representation", "author": "Jay Kamat and J\u00falia Borr\u00e0s and Carme Torras", "abstract": "Cloth manipulation is a difficult problem mainly because of the non-rigid nature of cloth, which makes a good representation of deformation essential. We present a new representation for the deformation-state of clothes. First, we propose the dGLI disk representation based on topological indices computed for edge segments of the cloth border that are arranged on a circular grid. The heat-map of the dGLI disk uncovers patterns that correspond to features of the cloth state that are consistent for different shapes, sizes or orientation of the cloth. We then abstract these important features from the dGLI disk into a circle, calling it the Cloth StatE representation (CloSE). This representation is compact, continuous, and general for different shapes. We show that this representation is able to accurately predict the fold locations for several simulation clothing datasets. Finally, we also show the strengths of this representation in two relevant applications: semantic labeling and high- and low-level planning. The code and the dataset can be accessed from: https://close-representation.github.io/", "link": "http://arxiv.org/abs/2504.05033v2", "date": "2026-03-17", "relevancy": 2.2743, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5819}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5723}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CloSE%3A%20A%20Geometric%20Shape-Agnostic%20Cloth%20State%20Representation&body=Title%3A%20CloSE%3A%20A%20Geometric%20Shape-Agnostic%20Cloth%20State%20Representation%0AAuthor%3A%20Jay%20Kamat%20and%20J%C3%BAlia%20Borr%C3%A0s%20and%20Carme%20Torras%0AAbstract%3A%20Cloth%20manipulation%20is%20a%20difficult%20problem%20mainly%20because%20of%20the%20non-rigid%20nature%20of%20cloth%2C%20which%20makes%20a%20good%20representation%20of%20deformation%20essential.%20We%20present%20a%20new%20representation%20for%20the%20deformation-state%20of%20clothes.%20First%2C%20we%20propose%20the%20dGLI%20disk%20representation%20based%20on%20topological%20indices%20computed%20for%20edge%20segments%20of%20the%20cloth%20border%20that%20are%20arranged%20on%20a%20circular%20grid.%20The%20heat-map%20of%20the%20dGLI%20disk%20uncovers%20patterns%20that%20correspond%20to%20features%20of%20the%20cloth%20state%20that%20are%20consistent%20for%20different%20shapes%2C%20sizes%20or%20orientation%20of%20the%20cloth.%20We%20then%20abstract%20these%20important%20features%20from%20the%20dGLI%20disk%20into%20a%20circle%2C%20calling%20it%20the%20Cloth%20StatE%20representation%20%28CloSE%29.%20This%20representation%20is%20compact%2C%20continuous%2C%20and%20general%20for%20different%20shapes.%20We%20show%20that%20this%20representation%20is%20able%20to%20accurately%20predict%20the%20fold%20locations%20for%20several%20simulation%20clothing%20datasets.%20Finally%2C%20we%20also%20show%20the%20strengths%20of%20this%20representation%20in%20two%20relevant%20applications%3A%20semantic%20labeling%20and%20high-%20and%20low-level%20planning.%20The%20code%20and%20the%20dataset%20can%20be%20accessed%20from%3A%20https%3A//close-representation.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2504.05033v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCloSE%253A%2520A%2520Geometric%2520Shape-Agnostic%2520Cloth%2520State%2520Representation%26entry.906535625%3DJay%2520Kamat%2520and%2520J%25C3%25BAlia%2 {"title": "Conservative Continuous-Time Treatment Optimization", "author": "Nora Schneider and Georg Manten and Niki Kilbertus", "abstract": "We develop a conservative continuous-time stochastic control framework for treatment optimization from irregularly sampled patient trajectories. The unknown patient dynamics are modeled as a controlled stochastic differential equation with treatment as a continuous-time control. Naive model-based optimization can exploit model errors and propose out-of-support controls, so optimizing the estimated dynamics may not optimize the true dynamics. To limit extrapolation, we add a consistent signature-based MMD regularizer on path space that penalizes treatment plans whose induced trajectory distribution deviates from observed trajectories. The resulting objective minimizes a computable upper bound on the true cost. Experiments on benchmark datasets show improved robustness and performance compared to non-conservative baselines.", "link": "http://arxiv.org/abs/2603.16789v1", "date": "2026-03-17", "relevancy": 2.2626, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4751}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4465}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conservative%20Continuous-Time%20Treatment%20Optimization&body=Title%3A%20Conservative%20Continuous-Time%20Treatment%20Optimization%0AAuthor%3A%20Nora%20Schneider%20and%20Georg%20Manten%20and%20Niki%20Kilbertus%0AAbstract%3A%20We%20develop%20a%20conservative%20continuous-time%20stochastic%20control%20framework%20for%20treatment%20optimization%20from%20irregularly%20sampled%20patient%20trajectories.%20The%20unknown%20patient%20dynamics%20are%20modeled% ce%2520that%2520penalizes%2520treatment%2520plans%2520whose%2520induced%2520trajectory%2520distribution%2520deviates%2520from%2520observed%2520trajectories.%2520The%2520resulting%2520objective%2520minimizes%2520a%2520computable%2520upper%2520bound%2520on%2520the%2520true%2520cost.%2520Experiments%2520on%2520benchmark%2520datasets%2520show%2520improved%2520robustness%2520and%2520performance%2520compared%2520to%2520non-conservative%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16789v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Conservative%20Continuous-Time%20Treatment%20Optimization&entry.906535625=Nora%20Schneider%20and%20Georg%20Manten%20and%20Niki%20Kilbertus&entry.1292438233=We%20develop%20a%20conservative%20continuous-time%20stochastic%20control%20framework%20for%20treatment%20optimization%20from%20irregularly%20sampled%20patient%20trajectories.%20The%20unknown%20patient%20dynamics%20are%20modeled%20as%20a%20controlled%20stochastic%20differential%20equation%20with%20treatment%20as%20a%20continuous-time%20control.%20Naive%20model-based%20optimization%20can%20exploit%20model%20errors%20and%20propose%20out-of-support%20controls%2C%20so%20optimizing%20the%20estimated%20dynamics%20may%20not%20optimize%20the%20true%20dynamics.%20To%20limit%20extrapolation%2C%20we%20add%20a%20consistent%20signature-based%20MMD%20regularizer%20on%20path%20space%20that%20penalizes%20treatment%20plans%20whose%20induced%20trajectory%20distribution%20deviates%20from%20observed%20trajectories.%20The%20resulting%20objective%20minimizes%20a%20computable%20upper%20bound%20on%20the%20true%20cost.%20Experiments%20on%20benchmark%20datasets%20show%20improved%20robustness%20and%20performance%20compared%20to%20non-conservative%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2603.16789v1&entry.124074799=Read"},
{"title": "IRIS: A Real-World Benchmark for Inverse Recovery and Identification of Physical Dynamic Systems from Monocular Video", "author": "Rasul Khanbayov and Mohamed Rayan Barhdadi and Erchin Serpedin and Hasan Kurban", "abstract": "Unsupervised physical parameter estimation from video lacks a common benchmark: existing methods evaluate on non-overlapping synthetic data, the sole real-world dataset is restricted to single-body systems, and no established protocol addresses governing-equation identification. This work introduces IRIS, a high-fidelity benchmark comprising 220 real-world videos captured at 4K resolution and 60\\,fps, spanning both single- and multi-body dynamics with independently measured ground-truth parameters and uncertainty estimates. Each dynamical system is recorded under controlled laboratory conditions and paired with its governing equations, enabling principled evaluation. A standardized evaluation protocol is defined encompassing parameter accuracy, identifiability, extrapolation, robustness, and governing-equation selection. Multiple baselines are evaluated, including a multi-step physics loss formulation and four complementary equation-identification strategies (VLM temporal reasoning, describe-then-classify prompting, CNN-based classification, and path-based labelling), establishing reference performance across all IRIS scenarios and exposing systematic failure modes that motivate future research. The dataset, annotations, evaluation toolkit, and all baseline implementations are publicly released.", "link": "http://arxiv.org/abs/2603.16432v1", "date": "2026-03-17", "relevancy": 2.2429, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5956}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5579}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.527}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IRIS%3A%20A%20Real-World%20Benchmark%20for%20Inverse%20Recovery%20and%20Identification%20of%20Physical%20Dynamic%20Systems%20from%20Monocular%20Video&body=Title%3A%20IRIS%3A%20A%20Real-World%20Benchmark%20for%20Inverse%20Recovery%20and%20Identification%20of%20Physical%20Dynamic%20Systems%20from%20Monocular%20Video%0AAuthor%3A%20Rasul%20Khanbayov%20and%20Mohamed%20Rayan%20Barhdadi%20and%20Erchin%20Serpedin%20and%20Hasan%20Kurban%0AAbstract%3A%20Unsupervised%20physical%20parameter%20estimation%20from%20video%20lacks%20a%20common%20benchmark%3A%20existing%20methods%20evaluate%20on%20non-overlapping%20synthetic%20data%2C%20the%20sole%20real-world%20dataset%20is%20restricted%20to%20single-body%20systems%2C%20and%20no%20established%20protocol%20addresses%20governing-equation%20identification.%20This%20work%20introduces%20IRIS%2C%20a%20high-fidelity%20benchmark%20comprising%20220%20real-world%20videos%20captured%20at%204K%20resolution%20and%2060%5C%2Cfps%2C%20spanning%20both%20single-%20and%20multi-body%20dynamics%20with%20independently%20measured%20ground-truth%20parameters%20and%20uncertainty%20estimates.%20Each%20dynamical%20system%20is%20recorded%20under%20controlled%20laboratory%20conditions%20and%20paired%20with%20its%20governing%20equations%2C%20enabling%20principled%20evaluation.%20A%20standardized%20evaluation%20protocol%20is%20defined%20encompassing%20parameter%20accuracy%2C%20identifiability%2C%20extrapolation%2C%20robustness%2C%20and%20governing-equation%20selection.%20Multiple%20baselines%20are%20evaluated%2C%20including%20a%20multi-step%20physics%20loss%20formulation%20and%20four%20complementary%20equation-identification%20strategies%20%28VLM%20temporal%20reasoning%2C%20describe-then-classify%20prompting%2C%20CNN-based%20classification%2C%20and%20path-based%20labelling%29%2C%20establishing%20reference%20performance%20across%20all%20IRIS%20scenarios%20and%20exposing%20systematic%20failure%20modes%20that%20motivate%20future%20research.%20The%20dataset%2C%20annotations%2C%20evaluation%20toolkit%2C%20and%20all%20baseline%20implementations%20are%20publicly%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16432v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIRIS%253A%2520A%2520Real-World%2520Benchmark%2520for%2520Inverse%2520Recovery%2520and%2520Identification%2520of%2520Physical%2520Dynamic%2520Systems%2520from%2520Monocular%2520Video%26entry.906535625%3DRasul%2520Khanbayov%2520and%2520Mohamed%2520Rayan%2520Barhdadi%2520and%2520Erchin%2520Serpedin%2520and%2520Hasan%2520Kurban%26entry.1292438233%3DUnsupervised%2520physical%2520parameter%2520estimation%2520from%2520video%2520lacks%2520a%2520common%2520benchmark%253A%2520existing%2520methods%2520evaluate%2520on%2520non-overlapping%2520synthetic%2520data%252C%2520the%2520sole%2520real-world%2520dataset%2520is%2520restricted%2520to%2520single-body%2520systems%252C%2520and%2520no%2520established%2520protocol%2520addresses%2520governing-equation%2520identification.%2520This%2520work%2520introduces%2520IRIS%252C%2520a%2520high-fidelity%2520benchmark%2520comprising%2520220%2520real-world%2520videos%2520captured%2520at%25204K%2520resolution%2520and%252060%255C%252Cfps%252C%2520spanning%2520both%2520single-%2520and%2520multi-body%2520dynamics%2520with%2520independently%2520measured%2520ground-truth%2520parameters%2520and%2520uncertainty%2520estimates.%2520Each%2520dynamical%2520system%2520is%2520recorded%2520under%2520controlled%2520laboratory%2520conditions%2520and%2520paired%2520with%2520its%2520governing%2520equations%252C%2520enabling%2520principled%2520evaluation.%2520A%2520standardized%2520evaluation%2520protocol%2520is%2520defined%2520encompassing%2520parameter%2520accuracy%252C%2520identifiability%252C%2520extrapolation%252C%2520robustness%252C%2520and%2520governing-equation%2520selection.%2520Multiple%2520baselines%2520are%2520evaluated%252C%2520including%2520a%2520multi-step%2520physics%2520loss%2520formulation%2520and%2520four%2520complementary%2520equation-identification%2520strategies%2520%2528VLM%2520temporal%2520reasoning%252C%2520describe-then-classify%2520prompting%252C%2520CNN-based%2520classification%252C%2520and%2520path-based%2520labelling%2529%252C%2520establishing%2520reference%2520performance%2520across%2520all%2520IRIS%2520scenarios%2520and%2520exposing%2520systematic%2520failure%2520modes%2520that%2520motivate%2520future%2520research.%2520The%2520dataset%252C%2520annotations%252C%2520evaluation%2520toolkit%252C%2520and%2520all%2520baseline%2520implementations%2520are%2520publicly%2520released.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16432v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=IRIS%3A%20A%20Real-World%20Benchmark%20for%20Inverse%20Recovery%20and%20Identification%20of%20Physical%20Dynamic%20Systems%20from%20Monocular%20Video&entry.906535625=Rasul%20Khanbayov%20and%20Mohamed%20Rayan%20Barhdadi%20and%20Erchin%20Serpedin%20and%20Hasan%20Kurban&entry.1292438233=Unsupervised%20physical%20parameter%20estimation%20from%20video%20lacks%20a%20common%20benchmark%3A%20existing%20methods%20evaluate%20on%20non-overlapping%20synthetic%20data%2C%20the%20sole%20real-world%20dataset%20is%20restricted%20to%20single-body%20systems%2C%20and%20no%20established%20protocol%20addresses%20governing-equation%20identification.%20This%20work%20introduces%20IRIS%2C%20a%20high-fidelity%20benchmark%20comprising%20220%20real-world%20videos%20captured%20at%204K%20resolution%20and%2060%5C%2Cfps%2C%20spanning%20both%20single-%20and%20multi-body%20dynamics%20with%20independently%20measured%20ground-truth%20parameters%20and%20uncertainty%20estimates.%20Each%20dynamical%20system%20is%20recorded%20under%20controlled%20laboratory%20conditions%20and%20paired%20with%20its%20governing%20equations%2C%20enabling%20principled%20evaluation.%20A%20standardized%20evaluation%20protocol%20is%20defined%20encompassing%20parameter%20accuracy%2C%20identifiability%2C%20extrapolation%2C%20robustness%2C%20and%20governing-equation%20selection.%20Multiple%20baselines%20are%20evaluated%2C%20including%20a%20multi-step%20physics%20loss%20formulation%20and%20four%20complementary%20equation-identification%20strategies%20%28VLM%20temporal%20reasoning%2C%20describe-then-classify%20prompting%2C%20CNN-based%20classification%2C%20and%20path-based%20labelling%29%2C%20establishing%20reference%20performance%20across%20all%20IRIS%20scenarios%20and%20exposing%20systematic%20failure%20modes%20that%20motivate%20future%20research.%20The%20dataset%2C%20annotations%2C%20evaluation%20toolkit%2C%20and%20all%20baseline%20implementations%20are%20publicly%20released.&entry.1838667208=http%3A//arxiv.org/abs/2603.16432v1&entry.124074799=Read"},
{"title": "Minimal Intervention Shared Control with Guaranteed Safety under Non-Convex Constraints", "author": "Shivam Chaubey and Francesco Verdoja and Shankar Deka and Ville Kyrki", "abstract": "Shared control combines human intention with autonomous decision-making. At the low level, the primary goal is to maintain safety regardless of the user's input to the system. However, existing shared control methods-based on, e.g., Model Predictive Control, Control Barrier Functions, or learning-based control-often face challenges with feasibility, scalability, and mixed constraints.\n  To address these challenges, we propose a Constraint-Aware Assistive Controller that computes control actions online while ensuring recursive feasibility, strict constraint satisfaction, and minimal deviation from the user's intent. It also accommodates a structured class of non-convex constraints common in real-world settings. We leverage Robust Controlled Invariant Sets for recursive feasibility and a Mixed-Integer Quadratic Programming formulation to handle non-convex constraints. We validate the approach through a large-scale user study with 66 participants-one of the most extensive in shared control research-using a simulated environment to assess task load, trust, and perceived control, in addition to performance. The results show consistent improvements across all these aspects without compromising safety and user intent. Additionally, a real-world experiment on a robotic manipulator demonstrates the framework's applicability under bounded disturbances, ensuring safety and collision-free operation.", "link": "http://arxiv.org/abs/2507.02438v2", "date": "2026-03-17", "relevancy": 2.2288, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5688}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5668}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5041}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minimal%20Intervention%20Shared%20Control%20with%20Guaranteed%20Safety%20under%20Non-Convex%20Constraints&body=Title%3A%20Minimal%20Intervention%20Shared%20Control%20with%20Guaranteed%20Safety%20under%20Non-Convex%20Constraints%0AAuthor%3A%20Shivam%20Chaubey%20and%20Francesco%20Verdoja%20and%20Shankar%20Deka%20and%20Ville%20Kyrki%0AAbstract%3A%20Shared%20control%20combines%20human%20intention%20with%20autonomous%20decision-making.%20At%20the%20low%20level%2C%20the%20primary%20goal%20is%20to%20maintain%20safety%20regardless%20of%20the%20user%27s%20input%20to%20the%20system.%20However%2C%20existing%20shared%20control%20methods-based%20on%2C%20e.g.%2C%20Model%20Predictive%20Control%2C%20Control%20Barrier%20Functions%2C%20or%20learning-based%20control-often%20face%20challenges%20with%20feasibility%2C%20scalability%2C%20and%20mixed%20constraints.%0A%20%20To%20address%20these%20challenges%2C%20we%20propose%20a%20Constraint-Aware%20Assistive%20Controller%20that%20computes%20control%20actions%20online%20while%20ensuring%20recursive%20feasibility%2C%20strict%20constraint%20satisfaction%2C%20and%20minimal%20deviation%20from%20the%20user%27s%20intent.%20It%20also%20accommodates%20a%20structured%20class%20of%20non-convex%20constraints%20common%20in%20real-world%20settings.%20We%20leverage%20Robust%20Controlled%20Invariant%20Sets%20for%20recursive%20feasibility%20and%20a%20Mixed-Integer%20Quadratic%20Programming%20formulation%20to%20handle%20non-convex%20constraints.%20We%20validate%20the%20approach%20through%20a%20large-scale%20user%20study%20with%2066%20participants-one%20of%20the%20most%20extensive%20in%20shared%20control%20research-using%20a%20simulated%20environment%20to%20assess%20task%20

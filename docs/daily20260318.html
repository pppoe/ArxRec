{"title": "VFEFL: Privacy-Preserving Federated Learning against Malicious Clients via Verifiable Functional Encryption", "author": "Nina Cai and Jinguang Han and Weizhi Meng", "abstract": "Federated learning is a promising distributed learning paradigm that enables collaborative model training without exposing local client data, thereby protecting data privacy. However, it also brings new threats and challenges. The advancement of model inversion attacks has rendered the plaintext transmission of local models insecure, while the distributed nature of federated learning makes it particularly vulnerable to attacks raised by malicious clients. To protect data privacy and prevent malicious client attacks, this paper proposes a privacy-preserving Federated Learning framework based on Verifiable Functional Encryption (VFEFL), without a non-colluding dual-server assumption or additional trusted third-party. Specifically, we propose a novel Cross-Ciphertext Decentralized Verifiable Functional Encryption (CC-DVFE) scheme that enables the verification of specific relationships over multi-dimensional ciphertexts. This scheme is formally treated, in terms of definition, security model and security proof. Furthermore, based on the proposed CC-DVFE scheme, we design a privacy-preserving federated learning framework that incorporates a novel robust aggregation rule to detect malicious clients, enabling the effective training of high-accuracy models under adversarial settings. Finally, we provide the formal analysis and empirical evaluation of VFEFL. The results demonstrate that our approach achieves the desired privacy protection, robustness, verifiability and fidelity, while eliminating the reliance on non-colluding dual-server assumption or trusted third parties required by most existing methods.", "link": "http://arxiv.org/abs/2506.12846v9", "date": "2026-03-17", "relevancy": 1.8707, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5001}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.462}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4376}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VFEFL%3A%20Privacy-Preserving%20Federated%20Learning%20against%20Malicious%20Clients%20via%20Verifiable%20Functional%20Encryption&body=Title%3A%20VFEFL%3A%20Privacy-Preserving%20Federated%20Learning%20against%20Malicious%20Clients%20via%20Verifiable%20Functional%20Encryption%0AAuthor%3A%20Nina%20Cai%20and%20Jinguang%20Han%20and%20Weizhi%20Meng%0AAbstract%3A%20Federated%20learning%20is%20a%20promising%20distributed%20learning%20paradigm%20that%20enables%20collaborative%20model%20training%20without%20exposing%20local%20client%20data%2C%20thereby%20protecting%20data%20privacy.%20However%2C%20it%20also%20brings%20new%20threats%20and%20challenges.%20The%20advancement%20of%20model%20inversion%20attacks%20has%20rendered%20the%20plaintext%20transmission%20of%20local%20models%20insecure%2C%20while%20the%20distributed%20nature%20of%20federated%20learning%20makes%20it%20particularly%20vulnerable%20to%20attacks%20raised%20by%20malicious%20clients.%20To%20protect%20data%20privacy%20and%20prevent%20malicious%20client%20attacks%2C%20this%20paper%20proposes%20a%20privacy-preserving%20Federated%20Learning%20framework%20based%20on%20Verifiable%20Functional%20Encryption%20%28VFEFL%29%2C%20without%20a%20non-colluding%20dual-server%20assumption%20or%20additional%20trusted%20third-party.%20Specifically%2C%20we%20propose%20a%20novel%20Cross-Ciphertext%20Decentralized%20Verifiable%20Functional%20Encryption%20%28CC-DVFE%29%20scheme%20that%20enables%20the%20verification%20of%20specific%20relationships%20over%20multi-dimensional%20ciphertexts.%20This%20scheme%20is%20formally%20treated%2C%20in%20terms%20of%20definition%2C%20security%20model%20and%20security%20proof.%20Furthermore%2C%20based%20on%20the%20proposed%20CC-DVFE%20scheme%2C%20we%20design%20a%20privacy-preserving%20federated%20learning%20framework%20that%20incorporates%20a%20novel%20robust%20aggregation%20rule%20to%20detect%20malicious%20clients%2C%20enabling%20the%20effective%20training%20of%20high-accuracy%20models%20under%20adversarial%20settings.%20Finally%2C%20we%20provide%20the%20formal%20analysis%20and%20empirical%20evaluation%20of%20VFEFL.%20The%20results%20demonstrate%20that%20our%20approach%20achieves%20the%20desired%20privacy%20protection%2C%20robustness%2C%20verifiability%20and%20fidelity%2C%20while%20eliminating%20the%20reliance%20on%20non-colluding%20dual-server%20assumption%20or%20trusted%20third%20parties%20required%20by%20most%20existing%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2506.12846v9%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVFEFL%253A%2520Privacy-Preserving%2520Federated%2520Learning%2520against%2520Malicious%2520Clients%2520via%2520Verifiable%2520Functional%2520Encryption%26entry.906535625%3DNina%2520Cai%2520and%2520Jinguang%2520Han%2520and%2520Weizhi%2520Meng%26entry.1292438233%3DFederated%2520learning%2520is%2520a%2520promising%2520distributed%2520learning%2520paradigm%2520that%2520enables%2520collaborative%2520model%2520training%2520without%2520exposing%2520local%2520client%2520data%252C%2520thereby%2520protecting%2520data%2520privacy.%2520However%252C%2520it%2520also%2520brings%2520new%2520threats%2520and%2520challenges.%2520The%2520advancement%2520of%2520model%2520inversion%2520attacks%2520has%2520rendered%2520the%2520plaintext%2520transmission%2520of%2520local%2520models%2520insecure%252C%2520while%2520the%2520dis {"title": "Explainable machine learning workflows for radio astronomical data processing", "author": "S. Yatawatta and A. Ahmadi and B. Asabere and M. Iacobelli and N. Peters and M. Veldhuis", "abstract": "Radio astronomy relies heavily on efficient and accurate processing pipelines to deliver science ready data. With the increasing data flow of modern radio telescopes, manual configuration of such data processing pipelines is infeasible. Machine learning (ML) is already emerging as a viable solution for automating data processing pipelines. However, almost all existing ML enabled pipelines are of black-box type, where the decisions made by the automating agents are not easily deciphered by astronomers. In order to improve the explainability of the ML aided data processing pipelines in radio astronomy, we propose the joint use of fuzzy rule based inference and deep learning. We consider one application in radio astronomy, i.e., calibration, to showcase the proposed approach of ML aided decision making using a Takagi-Sugeno-Kang (TSK) fuzzy system. We provide results based on simulations to illustrate the increased explainability of the proposed approach, not compromising on the quality or accuracy.", "link": "http://arxiv.org/abs/2603.16350v1", "date": "2026-03-17", "relevancy": 1.3927, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5025}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4664}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.448}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Explainable%20machine%20learning%20workflows%20for%20radio%20astronomical%20data%20process {"title": "Scalable Sample-Level Causal Discovery in Event Sequences via Autoregressive Density Estimation", "author": "Hugo Math and Rainer Lienhart", "abstract": "We study causal discovery from a single observed sequence of discrete events generated by a stochastic process, as encountered in vehicle logs, manufacturing systems, or patient trajectories. This regime is particularly challenging due to the absence of repeated samples, high dimensionality, and long-range temporal dependencies of the single observation during inference. We introduce TRACE, a scalable framework that repurposes autoregressive models as pretrained density estimators for conditional mutual information estimation. TRACE infers the summary causal graph between event types in a sequence, scaling linearly with the event vocabulary and supporting delayed causal effects, while being fully parallel on GPUs. We establish its theoretical identifiability under imperfect autoregressive models. Experiments demonstrate robust performance across different baselines and varying vocabulary sizes including an application to root-cause analysis in vehicle diagnostics with over 29,100 event types.", "link": "http://arxiv.org/abs/2602.01135v2", "date": "2026-03-17", "relevancy": 1.3293, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4597}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4559}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scalable%20Sample-Level%20Causal%20Discovery%20in%20Event%20Sequences%20via%20Autoregressive%20Density%20Estimation&body=Title%3A%20Scalable%20Sample-Level%20Causal%20Discovery%20in%20Event%20Sequences%20via%20Autoregressive%20Density%20Estimation%0AAuthor%3A%20Hugo%20Math%20and%20Rainer%20Lienhart%0AAbstract%3A%20We%20study%20causal%20discovery%20from%20a%20single%20observed%20sequence%20of%20discrete%20events%20generated%20by%20a%20stochastic%20process%2C%20as%20encountered%20in%20vehicle%20logs%2C%20manufacturing%20systems%2C%20or%20patient%20trajectories.%20This%20regime%20is%20particularly%20challenging%20due%20to%20the%20absence%20of%20repeated%20samples%2C%20high%20dimensionality%2C%20and%20long-range%20temporal%20dependencies%20of%20the%20single%20observation%20during%20inference.%20We%20introduce%20TRACE%2C%20a%20scalable%20framework%20that%20repurposes%20autoregressive%20models%20as%20pretrained%20density%20estimators%20for%20conditional%20mutual%20information%20estimation.%20TRACE%20infers%20the%20summary%20causal%20graph%20between%20event%20types%20in%20a%20sequence%2C%20scaling%20linearly%20with%20the%20event%20vocabulary%20and%20supporting%20delayed%20causal%20effects%2C%20while%20being%20fully%20parallel%20on%20GPUs.%20We%20establish%20its%20theoretical%20identifiability%20under%20imperfect%20autoregressive%20models.%20Experiments%20demonstrate%20robust%20performance%20across%20different%20baselines%20and%20varying%20vocabulary%20sizes%20including%20an%20application%20to%20root-cause%20analysis%20in%20vehicle%20diagnostics%20with%20over%2029%2C100%20event%20types.%0ALink%3A%20http%3A//arxiv.org/abs/2602.01135v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScalable%2520Sample-Level%2520Causal%2520Discovery%2520in%2520Event%2520Sequences%2520via%2520Autoregressive%2520Density%2520Estimation%26entry.906535625%3DHugo%2520Math%2520and%2520Rainer%2520Lienhart%26entry.1292438233%3DWe%2520study%2520causal%2520discovery%2520from%2520a%2520single%2520observed%2520sequence%2520of%2520discrete%2520events%2520generated%2520by% {"title": "An approximate graph elicits detonation lattice", "author": "Vansh Sharma and Venkat Raman", "abstract": "This study presents a novel algorithm based on graph theory for the precise segmentation and measurement of detonation cells from 3D pressure traces, termed detonation lattices, addressing the limitations of manual and primitive 2D edge detection methods prevalent in the field. Using a segmentation model, the proposed training-free algorithm is designed to accurately extract cellular patterns, a longstanding challenge in detonations research. First, the efficacy of segmentation on generated data is shown with a prediction error 2%. Next, 3D simulation data is used to establish performance of the graph-based workflow. The results of statistics and joint probability densities show oblong cells aligned with the wave propagation axis with 17% deviation, whereas larger dispersion in volume reflects cubic amplification of linear variability. Although the framework is robust, it remains challenging to reliably segment and quantify highly complex cellular patterns. However, the graph-based formulation generalizes across diverse cellular geometries, positioning it as a practical tool for detonation analysis and a strong foundation for future extensions in triple-point collision studies.", "link": "http://arxiv.org/abs/2603.16524v1", "date": "2026-03-17", "relevancy": 1.748, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4435}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4336}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4293}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20approximate%20graph%20elicits%20detonation%20la {"title": "Follow the Clues, Frame the Truth: Hybrid-evidential Deductive Reasoning in Open-Vocabulary Multimodal Emotion Recognition", "author": "Yu Liu and Lei Zhang and Haoxun Li and Hanlei Shi and Yuxuan Ding and Leyuan Qu and Taihao Li", "abstract": "Open-Vocabulary Multimodal Emotion Recognition (OV-MER) is inherently challenging due to the ambiguity of equivocal multimodal cues, which often stem from distinct unobserved situational dynamics. While Multimodal Large Language Models (MLLMs) offer extensive semantic coverage, their performance is often bottlenecked by premature commitment to dominant data priors, resulting in suboptimal heuristics that overlook crucial, complementary affective cues across modalities. We argue that effective affective reasoning requires more than surface-level association; it necessitates reconstructing nuanced emotional states by synthesizing multiple evidence-grounded rationales that reconcile these observations from diverse latent perspectives. We introduce HyDRA, a Hybrid-evidential Deductive Reasoning Architecture that formalizes inference as a Propose-Verify-Decide protocol. To internalize this abductive process, we employ reinforcement learning with hierarchical reward shaping, aligning the reasoning trajectories with final task performance to ensure they best reconcile the observed multimodal cues. Systematic evaluations validate our design choices, with HyDRA consistently outperforming strong baselines--especially in ambiguous or conflicting scenarios--while providing interpretable, diagnostic evidence traces.", "link": "http://arxiv.org/abs/2603.16463v1", "date": "2026-03-17", "relevancy": 1.7482, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.604}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5726}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Follow%20the%20Clues%2C%20Frame%20the%20Truth%3A%20Hybrid-evidential%20Deductive%20Reasoning%20in%20Open-Vocabulary%20Multimodal%20Emotion%20Recognition&body=Title%3A%20Follow%20the%20Clues%2C%20Frame%20the%20Truth%3A%20Hybrid-evidential%20Deductive%20Reasoning%20in%20Open-Vocabulary%20Multimodal%20Emotion%20Recognition%0AAuthor%3A%20Yu%20Liu%20and%20Lei%20Zhang%20and%20Haoxun%20Li%20and%20Hanlei%20Shi%20and%20Yuxuan%20Ding%20and%20Leyuan%20Qu%20and%20Taihao%20Li%0AAbstract%3A%20Open-Vocabulary%20Multimodal%20Emotion%20Recognition%20%28OV-MER%29%20is%20inherently%20challenging%20due%20to%20the%20ambiguity%20of%20equivocal%20multimodal%20cues%2C%20which%20often%20stem%20from%20distinct%20unobserved%20situational%20dynamics.%20While%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20offer%20extensive%20semantic%20coverage%2C%20their%20performance%20is%20often%20bottlenecked%20by%20premature%20commitment%20to%20dominant%20data%20priors%2C%20resulting%20in%20suboptimal%20heuristics%20that%20overlook%20crucial%2C%20complementary%20affective%20cues%20across%20modalities.%20We%20argue%20that%20effective%20affective%20reasoning%20requires%20more%20than%20surface-level%20association%3B%20it%20necessitates%20reconstructing%20nuanced%20emotional%20states%20by%20synthesizing%20multiple%20evidence-grounded%20rationales%20that%20reconcile%20these%20observations%20from%20diverse%20latent%20perspectives.%20We%20introduce%20HyDRA%2C%20a%20Hybrid-evidential%20Deductive%20Reasoning%20Architecture%20that%20formalizes%20inference%20as%20a%20Propose-Verify-Decide%20protocol.%20To%20internalize%20this%20abductive%20process%2C%20we%20employ%20reinforcement%20learning%20with%20hierarchical%20reward%20shaping%2C%20aligning%20the%20reasoning%20trajectories%20with%20final%20task%20performance%20to%20ensure%20they%20best%20reconcile%20the%20observed%20multimodal%20cues.%20Systematic%20evaluations%20validate%20our%20design%20choices%2C%20with%20HyDRA%20consistently%20outperforming%20strong%20baselines--especially%20in%20ambiguous%20or%20conflicting%20scenarios--while%20providing%20interpretable%2C%20diagnostic%20evidence%20traces.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16463v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFollow%2520the%2520Clues%252C%2520Frame%2520the%2520Truth%253A%2520Hybrid-evidential%2520Deductive%2520Reasoning%2520in%2520Open-Vocabulary%2520Multimodal%2520Emotion%2520Recognition%26entry.906535625%3DYu%2520Liu%2520and%2520Lei%2520Zhang%2520and%2520Haoxun%2520Li%2520and%2520Hanlei%2520Shi%2520and%2520Yuxuan%2520Ding%2520and%2520Leyuan%2520Qu%2520and%2520Taihao%2520Li%26entry.1292438233%3DOpen-Vocabulary%2520Multimodal%2520Emotion%2520Recognition%2520%2528OV-MER%2529%2520is%2520inherently%2520challenging%2520due%2520to%2520the%2520ambiguity%2520of%2520equivocal%2520multimodal%2520cues%252C%2520which%2520often%2520stem%2520from%2520distinct%2520unobserved%2520situational%2520dynamics.%2520While%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520offer%2520extensive%2520semantic%2520coverage%252C%2520their%2520performance%2520is%2520often%2520bottlenecked%2520by%2520premature%2520commitment%2520to%2520dominant%2520data%2520priors%252C%2520resulting%2520in%2520suboptimal%2520heuristics%2520that%2520overlook%2520crucial%252C%2520complementary%2520affective%2520cues%2520across%2520modalities.%2520We%2520argue%2520that%2520effective%2520affective%2520reasoning%2520requires%2520more%2520than%2520surface-level%2520association%253B%2520it%2520necessitates%2520reconstructing%2520nuanced%2520emotional%2520states%2520by%2520synthesizing%2520multiple%2520evidence-grounded%2520rationales%2520that%2520reconcile%2520these%2520observations%2520from%2520diverse%2520latent%2520perspectives.%2520We%2520introduce%2520HyDRA%252C%2520a%2520Hybrid-evidential%2520Deductive%2520Reasoning%2520Architecture%2520that%2520formalizes%2520inference%2520as%2520a%2520Propose-Verify-Decide%2520protocol.%2520To%2520internalize%2520this%2520abductive%2520process%252C%2520we%2520employ%2520reinforcement%2520learning%2520with%2520hierarchical%2520reward%2520shaping%252C%2520aligning%2520the%2520reasoning%2520trajectories%2520with%2520final%2520task%2520performance%2520to%2520ensure%2520they%2520best%2520reconcile%2520the%2520observed%2520multimodal%2520cues.%2520Systematic%2520evaluations%2520validate%2520our%2520design%2520choices%252C%2520with%2520HyDRA%2520consistently%2520outperforming%2520strong%2520baselines--especially%2520in%2520ambiguous%2520or%2520conflicting%2520scenarios--while%2520providing%2520interpretable%252C%2520diagnostic%2520evidence%2520traces.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16463v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Follow%20the%20Clues%2C%20Frame%20the%20Truth%3A%20Hybrid-evidential%20Deductive%20Reasoning%20in%20Open-Vocabulary%20Multimodal%20Emotion%20Recognition&entry.906535625=Yu%20Liu%20and%20Lei%20Zhang%20and%20Haoxun%20Li%20and%20Hanlei%20Shi%20and%20Yuxuan%20Ding%20and%20Leyuan%20Qu%20and%20Taihao%20Li&entry.1292438233=Open-Vocabulary%20Multimodal%20Emotion%20Recognition%20%28OV-MER%29%20is%20inherently%20challenging%20due%20to%20the%20ambiguity%20of%20equivocal%20multimodal%20cues%2C%20which%20often%20stem%20from%20distinct%20unobserved%20situational%20dynamics.%20While%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20offer%20extensive%20semantic%20coverage%2C%20their%20 {"title": "Dynamics Within Latent Chain-of-Thought: An Empirical Study of Causal Structure", "author": "Zirui Li and Xuefeng Bai and Kehai Chen and Yizhi Li and Jian Yang and Chenghua Lin and Min Zhang", "abstract": "Latent or continuous chain-of-thought methods replace explicit textual rationales with a number of internal latent steps, but these intermediate computations are difficult to evaluate beyond correlation-based probes. In this paper, we view latent chain-of-thought as a manipulable causal process in representation space by modeling latent steps as variables in a structural causal model (SCM) and analyzing their effects through step-wise $\\mathrm{do}$-interventions. We study two representative paradigms (i.e., Coconut and CODI) on both mathematical and general reasoning tasks to investigate three key questions: (1) which steps are causally necessary for correctness and when answers become decidable early; (2) how does influence propagate across steps, and how does this structure compare to explicit CoT; and (3) do intermediate trajectories retain competing answer modes, and how does output-level commitment differ from representational commitment across steps. We find that latent-step budgets behave less like homogeneous extra depth and more like staged functionality with non-local routing, and we identify a persistent gap between early output bias and late representational commitment. These results motivate mode-conditional and stability-aware analyses -- and corresponding training/decoding objectives -- as more reliable tools for interpreting and improving latent reasoning systems. Code is available at https://github.com/J1mL1/causal-latent-cot.", "link": "http://arxiv.org/abs/2602.08783v2", "date": "2026-03-17", "relevancy": 1.9326, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4846}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4829}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dynamics%20Within%20Latent%20Chain-of-Thought%3A%20An%20Empirical%20Study%20of%20Causal%20Structure&body=Title%3A%20Dynamics%20Within%20Latent%20Chain-of-Thought%3A%20An%20Empirical%20Study%20of%20Causal%20Structure%0AAuthor%3A%20Zirui%20Li%20and%20Xuefeng%20Bai%20and%20Kehai%20Chen%20and%20Yizhi%20Li%20and%20Jian%20Yang%20and%20Chenghua%20Lin%20and%20Min%20Zhang%0AAbstract%3A%20Latent%20or%20continuous%20chain-of-thought%20methods%20replace%20explicit%20textual%20rationales%20with%20a%20number%20of%20internal%20latent%20steps%2C%20but%20these%20intermediate%20computations%20are%20difficult%20to%20evaluate%20beyond%20correlation-based%20probes.%20In%20this%20paper%2C%20we%20view%20latent%20chain-of-thought%20as%20a%20manipulable%20causal%20process%20in%20representation%20space%20by%20modeling%20latent%20steps%20as%20variables%20in%20a%20structural%20causal%20model%20%28SCM%29%20and%20analyzing%20their%20effects%20through%20step-wise%20%24%5Cmathrm%7Bdo%7D%24-interventions.%20We%20study%20two%20representative%20paradigms%20%28i.e.%2C%20Coconut%20and%20CODI%29%20on%20both%20mathematical%20and%20general%20reasoning%20tasks%20to%20investigate%20three%20key%20questions%3A%20%281%29%20which%20steps%20are%20causally%20necessary%20for%20correctness%20and%20when%20answers%20become%20decidable%20early%3B%20%282%29%20how%20does%20influence%20propagate%20across%20steps%2C%20and%20how%20does%20this%20structure%20compare%20to%20explicit%20CoT%3B%20and%20%283%29%20do%20intermediate%20trajectories%20retain%20competing%20answer%20modes%2C%20and%20how%20does%20output-level%20commitment%20differ%20from%20representational%20commitment%20across%20steps.%20We%20find%20that%20latent-step%20budgets%20behave%20less%20like%20homogeneous%20extra%20depth%20and%20more%20like%20staged%20functionality%20with%20non-local%20routing%2C%20and%20we%20identify%20a%20persistent%20gap%20between%20early%20output%20bias%20and%20late%20representational%20commitment.%20These%20results%20motivate%20mode-conditional%20and%20stability-aware%20analyses%20--%20and%20corresponding%20training/decoding%20objectives%20--%20as%20more%20reliable%20tools%20for%20interpreting%20and%20improving%20latent%20reasoning%20systems.%20Code%20is%20available%20at%20https%3A//github.com/J1mL1/causal-latent-cot.%0ALink%3A%20http%3A//arxiv.org/abs/2602.08783v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDynamics%2520Within%2520Latent%2520Chain-of-Thought%253A%2520An%2520Empirical%2520Study%2520of%2520Causal%2520Structure%26entry.906535625%3DZirui%2520Li%2520and%2520Xuefeng%2520Bai%2520and%2520Kehai%2520Chen%2520and%2520Yizhi%2520Li%2520and%2520Jian%2520Yang%2520and%2520Chenghua%2520Lin%2520and%2520Min%2520Zhang%26entry.1292438233%3DLatent%2520or%2520continuous%2520chain-of-thought%2520methods%2520replace%2520explicit%2520textual%2520rationales%2520with%2520a%2520number%2520of%2520internal%2520latent%2520steps%252C%2520but%2520these%2520intermediate%2520computations%2520are%2520difficult%2520to%2520evaluate%2520beyond%2520correlation-based%2520probes.%2520In%2520this%2520paper%252C%2520we%2520view%2520latent%2520chain-of-thought%2520as%2520a%2520manipulable%2520causal%2520process%2520in%2520representation%2520space%2520by%2520modeling%2520latent%2520steps%2520as%2520variables%2520in%2520a%2520structural%2520causal%2520model%2520%2528SCM%2529%2520and%2520analyzing%2520their%2520effects%2520through%2520step-wise%2520%2524%255Cmathrm%257Bdo%257D%2524-interventions.%2520We%2520study%2520two%2520representative%2520paradigms%2520%2528i.e.%252C%2520Co {"title": "High-dimensional estimation with missing data: Statistical and computational limits", "author": "Kabir Aladin Verchand and Ankit Pensia and Saminul Haque and Rohith Kuditipudi", "abstract": "We consider computationally-efficient estimation of population parameters when observations are subject to missing data. In particular, we consider estimation under the realizable contamination model of missing data in which an $\u03b5$ fraction of the observations are subject to an arbitrary (and unknown) missing not at random (MNAR) mechanism. When the true data is Gaussian, we provide evidence towards statistical-computational gaps in several problems. For mean estimation in $\\ell_2$ norm, we show that in order to obtain error at most $\u03c1$, for any constant contamination $\u03b5\\in (0, 1)$, (roughly) $n \\gtrsim d e^{1/\u03c1^2}$ samples are necessary and that there is a computationally-inefficient algorithm which achieves this error. On the other hand, we show that any computationally-efficient method within certain popular families of algorithms requires a much larger sample complexity of (roughly) $n \\gtrsim d^{1/\u03c1^2}$ and that there exists a polynomial time algorithm based on sum-of-squares which (nearly) achieves this lower bound. For covariance estimation in relative operator norm, we show that a parallel development holds. Finally, we turn to linear regression with missing observations and show that such a gap does not persist. Indeed, in this setting we show that minimizing a simple, strongly convex empirical risk nearly achieves the information-theoretic lower bound in polynomial time.", "link": "http://arxiv.org/abs/2603.16712v1", "date": "2026-03-17", "relevancy": 1.3034, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4372}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": e%20complexity%20of%20%28roughly%29%20%24n%20%5Cgtrsim%20d%5E%7B1/%CF%81%5E2%7D%24%20and%20that%20there%20exists%20a%20polynomial%20time%20algorithm%20based%20on%20sum-of-squares%20which%20%28nearly%29%20achieves%20this%20lower%20bound.%20For%20covariance%20estimation%20in%20relative%20operator%20norm%2C%20we%20show%20that%20a%20parallel%20development%20holds.%20Finally%2C%20we%20turn%20to%20linear%20regression%20with%20missing%20observations%20and%20show%20that%20such%20a%20gap%20does%20not%20persist.%20Indeed%2C%20in%20this%20setting%20we%20show%20that%20minimizing%20a%20simple%2C%20strongly%20convex%20empirical%20risk%20nearly%20achieves%20the%20information-theoretic%20lower%20bound%20in%20polynomial%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16712v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHigh-dimensional%2520estimation%2520with%2520missing%2520data%253A%2520Statistical%2520and%2520computational%2520limits%26entry.906535625%3DKabir%2520Aladin%2520Verchand%2520and%2520Ankit%2520Pensia%2520and%2520Saminul%2520Haque%2520and%2520Rohith%2520Kuditipudi%26entry.1292438233%3DWe%2520consider%2520computationally-efficient%2520estimation%2520of%2520population%2520parameters%2520when%2520observations%2520are%2520subject%2520to%2520missing%2520data.%2520In%2520particular%252C%2520we%2520consider%2520estimation%2520under%2520the%2520realizable%2520contamination%2520model%2520of%2520missing%2520data%2520in%2520which%2520an%2520%2524%25CE%25B5%2524%2520fraction%2520of%2520the%2520observations%2520are%2520subject%2520to%2520an%2520arbitrary%2520%2528and%2520unknown%2529%2520missing%2520not%2520at%2520random%2520%2528MNAR%2529%2520mechanism.%2520When%2520the%2520true%2520data%2520is%2520Gaussian%252C%2520we%2520provide%2520evidence%2520towards%2520statistical-computational%2520gaps%2520in%2520several%2520problems.%2520For%2520mean%2520estimation%2520in%2520%2524%255Cell_2%2524%2520 {"title": "Toward Experimentation-as-a-Service in 5G/6G: The Plaza6G Prototype for AI-Assisted Trials", "author": "Sergio Barrachina-Mu\u00f1oz and Marc Carrascosa-Zamacois and Horacio Bleda and Umair Riaz and Yasir Maqsood and Xavier Calle and Selva V\u00eda and Miquel Payar\u00f3 and Josep Mangues-Bafalluy", "abstract": "This paper presents Plaza6G, the first operational Experiment-as-a-Service (ExaS) platform unifying cloud resources with next-generation wireless infrastructure. Developed at CTTC in Barcelona, Plaza6G integrates GPU-accelerated compute clusters, multiple 5G cores, both open-source (e.g., Free5GC) and commercial (e.g., Cumucore), programmable RANs, and physical or emulated user equipment under unified orchestration. In Plaza6G, the experiment design requires minimal expertise as it is expressed in natural language via a web portal or a REST API. The web portal and REST API are enhanced with a Large Language Model (LLM)-based assistant, which employs retrieval-augmented generation (RAG) for up-to-date experiment knowledge and Low-Rank Adaptation (LoRA) for continuous domain fine-tuning. Over-the-air (OTA) trials leverage a four-chamber anechoic facility and a dual-site outdoor 5G network operating in sub-6~GHz and mmWave bands. Demonstrations include automated CI/CD integration with sub-ten-minute setup and interactive OTA testing under programmable propagation conditions. Machine-readable experiment descriptors ensure reproducibility, while future work targets policy-aware orchestration, safety validation, and federated testbed integration toward open, reproducible wireless experimentation.", "link": "http://arxiv.org/abs/2603.16356v1", "date": "2026-03-17", "relevancy": 1.5903, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4135}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "htt {"title": "Masked Auto-Regressive Variational Acceleration: Fast Inference Makes Practical Reinforcement Learning", "author": "Yuxuan Gu and Weimin Bai and Yifei Wang and Weijian Luo and He Sun", "abstract": "Masked auto-regressive diffusion models (MAR) benefit from the expressive modeling ability of diffusion models and the flexibility of masked auto-regressive ordering. However, vanilla MAR suffers from slow inference due to its hierarchical inference mechanism: an outer AR unmasking loop and an inner diffusion denoising chain. Such decoupled structure not only harm the generation efficiency but also hinder the practical use of MAR for reinforcement learning (RL), an increasingly critical paradigm for generative model post-training.To address this fundamental issue, we introduce MARVAL (Masked Auto-regressive Variational Acceleration), a distillation-based framework that compresses the diffusion chain into a single AR generation step while preserving the flexible auto-regressive unmasking order. Such a distillation with MARVAL not only yields substantial inference acceleration but, crucially, makes RL post-training with verifiable rewards practical, resulting in scalable yet human-preferred fast generative models. Our contributions are twofold: (1) a novel score-based variational objective for distilling masked auto-regressive diffusion models into a single generation step without sacrificing sample quality; and (2) an efficient RL framework for masked auto-regressive models via MARVAL-RL. On ImageNet 256*256, MARVAL-Huge achieves an FID of 2.00 with more than 30 times speedup compared with MAR-diffusion, and MARVAL-RL yields consistent improvements in CLIP and image-reward scores on ImageNet datasets with entity names. In conclusion, MARVAL demonstrates the first practical path to distillation and RL of masked auto-regressive diffusion models, enabling fast sampling and better preference alignments.", "link": "http://arxiv.org/abs/2511.15190v3", "date": "2026-03-17", "relevancy": 1.6292, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5799}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5561}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5231}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Masked%20Auto-Regressive%20Variational%20Acceleration%3A%20Fast%20Inference%20Makes%20Practical%20Reinforcement%20Learning&body=Title%3A%20Masked%20Auto-Regressive%20Variational%20Acceleration%3A%20Fast%20Inference%20Makes%20Practical%20Reinforcement%20Learning%0AAuthor%3A%20Yuxuan%20Gu%20and%20Weimin%20Bai%20and%20Yifei%20Wang%20and%20Weijian%20Luo%20and%20He%20Sun%0AAbstract%3A%20Masked%20auto-regressive%20diffusion%20models%20%28MAR%29%20benefit%20from%20the%20expressive%20modeling%20ability%20of%20diffusion%20models%20and%20the%20flexibility%20of%20masked%20auto-regressive%20ordering.%20However%2C%20vanilla%20MAR%20suffers%20from%20slow%20inference%20due%20to%20its%20hierarchical%20inference%20mechanism%3A%20an%20outer%20AR%20unmasking%20loop%20and%20an%20inner%20diffusion%20denoising%20chain.%20Such%20decoupled%20structure%20not%20only%20harm%20the%20generation%20efficiency%20but%20also%20hinder%20the%20practical%20use%20of%20MAR%20for%20reinforcement%20learning%20%28RL%29%2C%20an%20increasingly%20critical%20paradigm%20for%20generative%20model%20post-training.To%20address%20this%20fundamental%20issue%2C%20we%20introduce%20MARVAL%20%28Masked%20Auto-regressive%20Variational%20Acceleration%29%2C%20a%20distillation-based%20framework%20that%20compresses%20the%20diffusion%20chain%20into%20a%20single%20AR%20generation%20step%20while%20preserving%20the%20flexible%20auto-regressive%20unmasking%20order.%20Such%20a%20distillation%20with%20MARVAL%20not%20only%20yields%20substantial%20inference%20acceleration%20but%2C%20crucially%2C%20makes%20RL%20post-training%20with%20verifiable%20rewards%20practical%2C%20resulting%20in%20scalable%20yet%20human-preferred%20fast%20generative%20models.%20Our%20contributions%20are%20twofold%3A%20%281%29%20a%20novel%20score-based%20variational%20objective%20for%20distilling%20masked%20auto-regressive%20diffusion%20models%20into%20a%20single%20generation%20step%20without%20sacrificing%20sample%20quality%3B%20and%20%282%29%20an%20efficient%20RL%20framework%20for%20masked%20auto-regressive%20models%20via%20MARVAL-RL.%20On%20ImageNet%20256%2A256%2C%20MARVAL-Huge%20achieves%20an%20FID%20of%202.00%20with%20more%20than%2030%20times%20speedup%20compared%20with%20MAR-diffusion%2C%20and%20MARVAL-RL%20yields%20consistent%20improvements%20in%20CLIP%20and%20image-reward%20scores%20on%20ImageNet%20datasets%20with%20entity%20names.%20In%20conclusion%2C%20MARVAL%20demonstrates%20the%20first%20practical%20path%20to%20distillation%20and%20RL%20of%20masked%20auto-regressive%20diffusion%20models%2C%20enabling%20fast%20sampling%20and%20better%20preference%20alignments.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15190v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMasked%2520Auto-Regressive%2520Variational%2520Acceleration%253A%2520Fast%2520Inference%2520Makes%2520Practical%2520Reinforcement%2520Learning%26entry.906535625%3DYuxuan%2520Gu%2520and%2520Weimin%2520Bai%2520and%2520Yifei%2520Wang%2520and%2520Weijian%2520Luo%2520and%2520He%2520Sun%26entry.1292438233%3DMasked%2520auto-regressive%2520diffusion%2520models%2520%2528MAR%2529%2520benefit%2520from%2520the%2520expressive%2520modeling%2520ability%2520of%2520diffusion%2520models%2520and%2520the%2520flexibility%2520of%2520masked%2520auto-regressive%2520ordering.%2520However%252C%2520vanilla%2520MAR%2520suffers%2520from%2520slow%252 {"title": "More Test-Time Compute Can Hurt: Overestimation Bias in LLM Beam Search", "author": "Gal Dalal and Assaf Hallak and Gal Chechik and Yftah Ziser", "abstract": "Wider beam search should improve LLM reasoning, but when should you stop widening? Prior work on beam width selection has focused on inference efficiency \\citep{qin2025dsbd, freitag2017beam}, without analyzing whether wider search can \\emph{hurt} output quality. We present an analysis, grounded in Extreme Value Theory, that answers this question. Beam selection over noisy scorer outputs introduces a systematic overestimation bias that grows with the candidate pool size, and we derive a maximum useful beam width $\\hat{k}$ beyond which search degrades performance. This critical width depends on the signal-to-noise ratio of the scorer: $\\hat{k}$ grows exponentially with $(\u0394/\u03c3)^2$, where $\u0394> 0$ is the quality advantage of correct paths over incorrect ones and $\u03c3$ is the scorer noise. We validate this theory by comparing perplexity-guided and PRM-guided beam search across three 7B-parameter models and ten domains on MR-BEN (5,975 questions). Perplexity scoring, with its high noise, yields $\\hat{k} = 1$: search provides no benefit at any width tested. PRM scoring, with lower noise, yields $\\hat{k} \\geq 4$, with gains of up to 8.9 percentage points. The same model, the same algorithm, but different scorers place $\\hat{k}$ at opposite ends of the beam width range. Our analysis identifies the scorer's signal-to-noise ratio as the key quantity governing beam width selection, and we propose diagnostic indicators for choosing the beam width in practice.", "link": "http://arxiv.org/abs/2603.15377v2", "date": "2026-03-17", "relevancy": 2.2211, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4464}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scen       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

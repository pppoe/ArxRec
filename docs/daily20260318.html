{"title": "IOSVLM: A 3D Vision-Language Model for Unified Dental Diagnosis from Intraoral Scans", "author": "Huimin Xiong and Zijie Meng and Tianxiang Hu and Chenyi Zhou and Yang Feng and Zuozhu Liu", "abstract": "3D intraoral scans (IOS) are increasingly adopted in routine dentistry due to abundant geometric evidence, and unified multi-disease diagnosis is desirable for clinical documentation and communication. While recent works introduce dental vision-language models (VLMs) to enable unified diagnosis and report generation on 2D images or multi-view images rendered from IOS, they do not fully leverage native 3D geometry. Such work is necessary and also challenging, due to: (i) heterogeneous scan forms and the complex IOS topology, (ii) multi-disease co-occurrence with class imbalance and fine-grained morphological ambiguity, (iii) limited paired 3D IOS-text data. Thus, we present IOSVLM, an end-to-end 3D VLM that represents scans as point clouds and follows a 3D encoder-projector-LLM design for unified diagnosis and generative visual question-answering (VQA), together with IOSVQA, a large-scale multi-source IOS diagnosis VQA dataset comprising 19,002 cases and 249,055 VQA pairs over 23 oral diseases and heterogeneous scan types. To address the distribution gap between color-free IOS data and color-dependent 3D pre-training, we propose a geometry-to-chromatic proxy that stabilizes fine-grained geometric perception and cross-modal alignment. A two-stage curriculum training strategy further enhances robustness. IOSVLM consistently outperforms strong baselines, achieving gains of at least +9.58% macro accuracy and +1.46% macro F1, indicating the effectiveness of direct 3D geometry modeling for IOS-based diagnosis.", "link": "http://arxiv.org/abs/2603.16781v1", "date": "2026-03-17", "relevancy": 2.9346, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6065}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6065}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IOSVLM%3A%20A%203D%20Vision-Language%20Model%20for%20Unified%20Dental%20Diagnosis%20from%20Intraoral%20Scans&body=Title%3A%20IOSVLM%3A%20A%203D%20Vision-Language%20Model%20for%20Unified%20Dental%20Diagnosis%20from%20Intraoral%20Scans%0AAuthor%3A%20Huimin%20Xiong%20and%20Zijie%20Meng%20and%20Tianxiang%20Hu%20and%20Chenyi%20Zhou%20and%20Yang%20Feng%20and%20Zuozhu%20Liu%0AAbstract%3A%203D%20intraoral%20scans%20%28IOS%29%20are%20increasingly%20adopted%20in%20routine%20dentistry%20due%20to%20abundant%20geometric%20evidence%2C%20and%20unified%20multi-disease%20diagnosis%20is%20desirable%20for%20clinical%20documentation%20and%20communication.%20While%20recent%20works%20introduce%20dental%20vision-language%20models%20%28VLMs%29%20to%20enable%20unified%20diagnosis%20and%20report%20generation%20on%202D%20images%20or%20multi-view%20images%20rendered%20from%20IOS%2C%20they%20do%20not%20fully%20leverage%20native%203D%20geometry.%20Such%20work%20is%20necessary%20and%20also%20challenging%2C%20due%20to%3A%20%28i%29%20heterogeneous%20scan%20forms%20and%20the%20complex%20IOS%20topology%2C%20%28ii%29%20multi-disease%20co-occurrence%20with%20class%20imbalance%20and%20fine-grained%20morphological%20ambiguity%2C%20%28iii%29%20limited%20paired%203D%20IOS-text%20data.%20Thus%2C%20we%20present%20IOSVLM%2C%20an%20end-to-end%203D%20VLM%20that%20represents%20scans%20as%20point%20clouds%20and%20follows%20a%203D%20encoder-projector-LLM%20design%20for%20unified%20diagnosis%20and%20generative%20visual%20question-answering%20%28VQA%29%2C%20together%20with%20IOSVQA%2C%20a%20large-scale%20multi-source%20IOS%20diagnosis%20VQA%20dataset%20comprising%2019%2C002%20cases%20and%20249%2C055%20VQA%20pairs%20over%2023%20oral%20diseases%20and%20heterogeneous%20scan%20types.%20To%20address%20the%20distribution%20gap%20between%20color-free%20IOS%20data%20and%20color-dependent%203D%20pre-training%2C%20we%20propose%20a%20geometry-to-chromatic%20proxy%20that%20stabilizes%20fine-grained%20geometric%20perception%20and%20cross-modal%20alignment.%20A%20two-stage%20curriculum%20training%20strategy%20further%20enhances%20robustness.%20IOSVLM%20consistently%20outperforms%20strong%20baselines%2C%20achieving%20gains%20of%20at%20least%20%2B9.58%25%20macro%20accuracy%20and%20%2B1.46%25%20macro%20F1%2C%20indicating%20the%20effectiveness%20of%20direct%203D%20geometry%20modeling%20for%20IOS-based%20diagnosis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16781v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIOSVLM%253A%2520A%25203D%2520Vision-Language%2520Model%2520for%2520Unified%2520Dental%2520Diagnosis%2520from%2520Intraoral%2520Scans%26entry.906535625%3DHuimin%2520Xiong%2520and%2520Zijie%2520Meng%2520and%2520Tianxiang%2520Hu%2520and%2520Chenyi%2520Zhou%2520and%2520Yang%2520Feng%2520and%2520Zuozhu%2520Liu%26entry.1292438233%3D3D%2520intraoral%2520scans%2520%2528IOS%2529%2520are%2520increasingly%2520adopted%2520in%2520routine%2520dentistry%2520due%2520to%2520abundant%2520geometric%2520evidence%252C%2520and%2520unified%2520multi-disease%2520diagnosis%2520is%2520desirable%2520for%2520clinical%2520documentation%2520and%2520communication.%2520While%2520recent%2520works%2520introduce%2520dental%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520enable%2520unified%2520diagnosis%2520and%2520report%2520generation%2520on%25202D%2520images%2520or%2520multi-view%2520images%2520rendered%2520from%2520IOS%252C%2520they%2520do%2520not%2520fully%2520leverage%2520native%25203D%2520geometry.%2520Such%2520work%2520is%2520necessary%2520and%2520also%2520challenging%252C%2520due%2520to%253A%2520%2528i%2529%2520heterogeneous%2520scan%2520forms%2520and%2520the%2520complex%2520IOS%2520topology%252C%2520%2528ii%2529%2520multi-disease%2520co-occurrence%2520with%2520class%2520imbalance%2520and%2520fine-grained%2520morphological%2520ambiguity%252C%2520%2528iii%2529%2520limited%2520paired%25203D%2520IOS-text%2520data.%2520Thus%252C%2520we%2520present%2520IOSVLM%252C%2520an%2520end-to-end%25203D%2520VLM%2520that%2520represents%2520scans%2520as%2520point%2520clouds%2520and%2520follows%2520a%25203D%2520encoder-projector-LLM%2520design%2520for%2520unified%2520diagnosis%2520and%2520generative%2520visual%2520question-answering%2520%2528VQA%2529%252C%2520together%2520with%2520IOSVQA%252C%2520a%2520large-scale%2520multi-source%2520IOS%2520diagnosis%2520VQA%2520dataset%2520comprising%252019%252C002%2520cases%2520and%2520249%252C055%2520VQA%2520pairs%2520over%252023%2520oral%2520diseases%2520and%2520heterogeneous%2520scan%2520types.%2520To%2520address%2520the%2520distribution%2520gap%2520between%2520color-free%2520IOS%2520data%2520and%2520color-dependent%25203D%2520pre-training%252C%2520we%2520propose%2520a%2520geometry-to-chromatic%2520proxy%2520that%2520stabilizes%2520fine-grained%2520geometric%2520perception%2520and%2520cross-modal%2520alignment.%2520A%2520two-stage%2520curriculum%2520training%2520strategy%2520further%2520enhances%2520robustness.%2520IOSVLM%2520consistently%2520outperforms%2520strong%2520baselines%252C%2520achieving%2520gains%2520of%2520at%2520least%2520%252B9.58%2525%2520macro%2520accuracy%2520and%2520%252B1.46%2525%2520macro%2520F1%252C%2520indicating%2520the%2520effectiveness%2520of%2520direct%25203D%2520geometry%2520modeling%2520for%2520IOS-based%2520diagnosis.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16781v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=IOSVLM%3A%20A%203D%20Vision-Language%20Model%20for%20Unified%20Dental%20Diagnosis%20from%20Intraoral%20Scans&entry.906535625=Huimin%20Xiong%20and%20Zijie%20Meng%20and%20Tianxiang%20Hu%20and%20Chenyi%20Zhou%20and%20Yang%20Feng%20and%20Zuozhu%20Liu&entry.1292438233=3D%20intraoral%20scans%20%28IOS%29%20are%20increasingly%20adopted%20in%20routine%20dentistry%20due%20to%20abundant%20geometric%20evidence%2C%20and%20unified%20multi-disease%20diagnosis%20is%20desirable%20for%20clinical%20documentation%20and%20communication.%20While%20recent%20works%20introduce%20dental%20vision-language%20models%20%28VLMs%29%20to%20enable%20unified%20diagnosis%20and%20report%20generation%20on%202D%20images%20or%20multi-view%20images%20rendered%20from%20IOS%2C%20they%20do%20not%20fully%20leverage%20native%203D%20geometry.%20Such%20work%20is%20necessary%20and%20also%20challenging%2C%20due%20to%3A%20%28i%29%20heterogeneous%20scan%20forms%20and%20the%20complex%20IOS%20topology%2C%20%28ii%29%20multi-disease%20co-occurrence%20with%20class%20imbalance%20and%20fine-grained%20morphological%20ambiguity%2C%20%28iii%29%20limited%20paired%203D%20IOS-text%20data.%20Thus%2C%20we%20present%20IOSVLM%2C%20an%20end-to-end%203D%20VLM%20that%20represents%20scans%20as%20point%20clouds%20and%20follows%20a%203D%20encoder-projector-LLM%20design%20for%20unified%20diagnosis%20and%20generative%20visual%20question-answering%20%28VQA%29%2C%20together%20with%20IOSVQA%2C%20a%20large-scale%20multi-source%20IOS%20diagnosis%20VQA%20dataset%20comprising%2019%2C002%20cases%20and%20249%2C055%20VQA%20pairs%20over%2023%20oral%20diseases%20and%20heterogeneous%20scan%20types.%20To%20address%20the%20distribution%20gap%20between%20color-free%20IOS%20data%20and%20color-dependent%203D%20pre-training%2C%20we%20propose%20a%20geometry-to-chromatic%20proxy%20that%20stabilizes%20fine-grained%20geometric%20perception%20and%20cross-modal%20alignment.%20A%20two-stage%20curriculum%20training%20strategy%20further%20enhances%20robustness.%20IOSVLM%20consistently%20outperforms%20strong%20baselines%2C%20achieving%20gains%20of%20at%20least%20%2B9.58%25%20macro%20accuracy%20and%20%2B1.46%25%20macro%20F1%2C%20indicating%20the%20effectiveness%20of%20direct%203D%20geometry%20modeling%20for%20IOS-based%20diagnosis.&entry.1838667208=http%3A//arxiv.org/abs/2603.16781v1&entry.124074799=Read"},
{"title": "Look Before Acting: Enhancing Vision Foundation Representations for Vision-Language-Action Models", "author": "Yulin Luo and Hao Chen and Zhuangzhe Wu and Bowen Sui and Jiaming Liu and Chenyang Gu and Zhuoyang Liu and Qiuxuan Feng and Jiale Yu and Shuo Gu and Peng Jia and Pheng-Ann Heng and Shanghang Zhang", "abstract": "Vision-Language-Action (VLA) models have recently emerged as a promising paradigm for robotic manipulation, in which reliable action prediction critically depends on accurately interpreting and integrating visual observations conditioned on language instructions. Although recent works have sought to enhance the visual capabilities of VLA models, most approaches treat the LLM backbone as a black box, providing limited insight into how visual information is grounded into action generation. Therefore, we perform a systematic analysis of multiple VLA models across different action-generation paradigms and observe that sensitivity to visual tokens progressively decreases in deeper layers during action generation. Motivated by this observation, we propose \\textbf{DeepVision-VLA}, built on a \\textbf{Vision-Language Mixture-of-Transformers (VL-MoT)} framework. This framework enables shared attention between the vision foundation model and the VLA backbone, injecting multi-level visual features from the vision expert into deeper layers of the VLA backbone to enhance visual representations for precise and complex manipulation. In addition, we introduce \\textbf{Action-Guided Visual Pruning (AGVP)}, which leverages shallow-layer attention to prune irrelevant visual tokens while preserving task-relevant ones, reinforcing critical visual cues for manipulation with minimal computational overhead. DeepVision-VLA outperforms prior state-of-the-art methods by 9.0\\% and 7.5\\% on simulated and real-world tasks, respectively, providing new insights for the design of visually enhanced VLA models.", "link": "http://arxiv.org/abs/2603.15618v2", "date": "2026-03-17", "relevancy": 2.9333, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6082}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6082}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5435}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Look%20Before%20Acting%3A%20Enhancing%20Vision%20Foundation%20Representations%20for%20Vision-Language-Action%20Models&body=Title%3A%20Look%20Before%20Acting%3A%20Enhancing%20Vision%20Foundation%20Representations%20for%20Vision-Language-Action%20Models%0AAuthor%3A%20Yulin%20Luo%20and%20Hao%20Chen%20and%20Zhuangzhe%20Wu%20and%20Bowen%20Sui%20and%20Jiaming%20Liu%20and%20Chenyang%20Gu%20and%20Zhuoyang%20Liu%20and%20Qiuxuan%20Feng%20and%20Jiale%20Yu%20and%20Shuo%20Gu%20and%20Peng%20Jia%20and%20Pheng-Ann%20Heng%20and%20Shanghang%20Zhang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20recently%20emerged%20as%20a%20promising%20paradigm%20for%20robotic%20manipulation%2C%20in%20which%20reliable%20action%20prediction%20critically%20depends%20on%20accurately%20interpreting%20and%20integrating%20visual%20observations%20conditioned%20on%20language%20instructions.%20Although%20recent%20works%20have%20sought%20to%20enhance%20the%20visual%20capabilities%20of%20VLA%20models%2C%20most%20approaches%20treat%20the%20LLM%20backbone%20as%20a%20black%20box%2C%20providing%20limited%20insight%20into%20how%20visual%20information%20is%20grounded%20into%20action%20generation.%20Therefore%2C%20we%20perform%20a%20systematic%20analysis%20of%20multiple%20VLA%20models%20across%20different%20action-generation%20paradigms%20and%20observe%20that%20sensitivity%20to%20visual%20tokens%20progressively%20decreases%20in%20deeper%20layers%20during%20action%20generation.%20Motivated%20by%20this%20observation%2C%20we%20propose%20%5Ctextbf%7BDeepVision-VLA%7D%2C%20built%20on%20a%20%5Ctextbf%7BVision-Language%20Mixture-of-Transformers%20%28VL-MoT%29%7D%20framework.%20This%20framework%20enables%20shared%20attention%20between%20the%20vision%20foundation%20model%20and%20the%20VLA%20backbone%2C%20injecting%20multi-level%20visual%20features%20from%20the%20vision%20expert%20into%20deeper%20layers%20of%20the%20VLA%20backbone%20to%20enhance%20visual%20representations%20for%20precise%20and%20complex%20manipulation.%20In%20addition%2C%20we%20introduce%20%5Ctextbf%7BAction-Guided%20Visual%20Pruning%20%28AGVP%29%7D%2C%20which%20leverages%20shallow-layer%20attention%20to%20prune%20irrelevant%20visual%20tokens%20while%20preserving%20task-relevant%20ones%2C%20reinforcing%20critical%20visual%20cues%20for%20manipulation%20with%20minimal%20computational%20overhead.%20DeepVision-VLA%20outperforms%20prior%20state-of-the-art%20methods%20by%209.0%5C%25%20and%207.5%5C%25%20on%20simulated%20and%20real-world%20tasks%2C%20respectively%2C%20providing%20new%20insights%20for%20the%20design%20of%20visually%20enhanced%20VLA%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15618v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLook%2520Before%2520Acting%253A%2520Enhancing%2520Vision%2520Foundation%2520Representations%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DYulin%2520Luo%2520and%2520Hao%2520Chen%2520and%2520Zhuangzhe%2520Wu%2520and%2520Bowen%2520Sui%2520and%2520Jiaming%2520Liu%2520and%2520Chenyang%2520Gu%2520and%2520Zhuoyang%2520Liu%2520and%2520Qiuxuan%2520Feng%2520and%2520Jiale%2520Yu%2520and%2520Shuo%2520Gu%2520and%2520Peng%2520Jia%2520and%2520Pheng-Ann%2520Heng%2520and%2520Shanghang%2520Zhang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520recently%2520emerged%252 {"title": "Fixed Anchors Are Not Enough: Dynamic Retrieval and Persistent Homology for Dataset Distillation", "author": "Muquan Li and Hang Gou and Yingyi Ma and Rongzheng Wang and Ke Qin and Tao He", "abstract": "Decoupled dataset distillation (DD) compresses large corpora into a few synthetic images by matching a frozen teacher's statistics. However, current residual-matching pipelines rely on static real patches, creating a fit-complexity gap and a pull-to-anchor effect that reduce intra-class diversity and hurt generalization. To address these issues, we introduce RETA -- a Retrieval and Topology Alignment framework for decoupled DD. First, Dynamic Retrieval Connection (DRC) selects a real patch from a prebuilt pool by minimizing a fit-complexity score in teacher feature space; the chosen patch is injected via a residual connection to tighten feature fit while controlling injected complexity. Second, Persistent Topology Alignment (PTA) regularizes synthesis with persistent homology: we build a mutual k-NN feature graph, compute persistence images of components and loops, and penalize topology discrepancies between real and synthetic sets, mitigating pull-to-anchor effect. Across CIFAR-100, Tiny-ImageNet, ImageNet-1K, and multiple ImageNet subsets, RETA consistently outperforms various baselines under comparable time and memory, especially reaching 64.3% top-1 accuracy on ImageNet-1K with ResNet-18 at 50 images per class, +3.1% over the best prior.", "link": "http://arxiv.org/abs/2602.24144v3", "date": "2026-03-17", "relevancy": 2.9267, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.593}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5871}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fixed%20Anchors%20Are%20Not%20Enough%3A%20Dynamic%20Retrieval%20and%20Persistent%20Homology%20for%20Dataset%20Distillation&body=Title%3A%20Fixed%20Anchors%20Are%20Not%20Enough%3A%20Dynamic%20Retrieval%20and%20Persistent%20Homology%20for%20Dataset%20Distillation%0AAuthor%3A%20Muquan%20Li%20and%20Hang%20Gou%20and%20Yingyi%20Ma%20and%20Rongzheng%20Wang%20and%20Ke%20Qin%20and%20Tao%20He%0AAbstract%3A%20Decoupled%20dataset%20distillation%20%28DD%29%20compresses%20large%20corpora%20into%20a%20few%20synthetic%20images%20by%20matching%20a%20frozen%20teacher%27s%20statistics.%20However%2C%20current%20residual-matching%20pipelines%20rely%20on%20static%20real%20patches%2C%20creating%20a%20fit-complexity%20gap%20and%20a%20pull-to-anchor%20effect%20that%20reduce%20intra-class%20diversity%20and%20hurt%20generalization.%20To%20address%20these%20issues%2C%20we%20introduce%20RETA%20--%20a%20Retrieval%20and%20Topology%20Alignment%20framework%20for%20decoupled%20DD.%20First%2C%20Dynamic%20Retrieval%20Connection%20%28DRC%29%20selects%20a%20real%20patch%20from%20a%20prebuilt%20pool%20by%20minimizing%20a%20fit-complexity%20score%20in%20teacher%20feature%20space%3B%20the%20chosen%20patch%20is%20injected%20via%20a%20residual%20connection%20to%20tighten%20feature%20fit%20while%20controlling%20injected%20complexity.%20Second%2C%20Persistent%20Topology%20Alignment%20%28PTA%29%20regularizes%20synthesis%20with%20persistent%20homology%3A%20we%20build%20a%20mutual%20k-NN%20feature%20graph%2C%20compute%20persistence%20images%20of%20components%20and%20loops%2C%20and%20penalize%20topology%20discrepancies%20between%20real%20and%20synthetic%20sets%2C%20mitigating%20pull-to-anchor%20effect.%20Across%20CIFAR-100%2C%20Tiny-ImageNet%2C%20ImageNet-1K%2C%20and%20multiple%20ImageNet%20subsets%2C%20RETA%20consistently%20outperforms%20various%20baselines%20under%20comparable%20ti {"title": "Evo-Retriever: LLM-Guided Curriculum Evolution with Viewpoint-Pathway Collaboration for Multimodal Document Retrieval", "author": "Weiqing Li and Jinyue Guo and Yaqi Wang and Haiyang Xiao and Yuewei Zhang and Guohua Liu and Hao Henry Wang", "abstract": "Visual-language models (VLMs) excel at data mappings, but real-world document heterogeneity and unstructuredness disrupt the consistency of cross-modal embeddings. Recent late-interaction methods enhance image-text alignment through multi-vector representations, yet traditional training with limited samples and static strategies cannot adapt to the model's dynamic evolution, causing cross-modal retrieval confusion. To overcome this, we introduce Evo-Retriever, a retrieval framework featuring an LLM-guided curriculum evolution built upon a novel Viewpoint-Pathway collaboration. First, we employ multi-view image alignment to enhance fine-grained matching via multi-scale and multi-directional perspectives. Then, a bidirectional contrastive learning strategy generates \"hard queries\" and establishes complementary learning paths for visual and textual disambiguation to rebalance supervision. Finally, the model-state summary from the above collaboration is fed into an LLM meta-controller, which adaptively adjusts the training curriculum using expert knowledge to promote the model's evolution. On ViDoRe V2 and MMEB (VisDoc), Evo-Retriever achieves state-of-the-art performance, with nDCG@5 scores of 65.2% and 77.1%.", "link": "http://arxiv.org/abs/2603.16455v1", "date": "2026-03-17", "relevancy": 2.9061, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5889}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5774}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "li earning%2520paths%2520for%2520visual%2520and%2520textual%2520disambiguation%2520to%2520rebalance%2520supervision.%2520Finally%252C%2520the%2520model-state%2520summary%2520from%2520the%2520above%2520collaboration%2520is%2520fed%2520into%2520an%2520LLM%2520meta-controller%252C%2520which%2520adaptively%2520adjusts%2520the%2520training%2520curriculum%2520using%2520expert%2520knowledge%2520to%2520promote%2520the%2520model%2527s%2520evolution.%2520On%2520ViDoRe%2520V2%2520and%2520MMEB%2520%2528VisDoc%2529%252C%2520Evo-Retriever%2520achieves%2520state-of-the-art%2520performance%252C%2520with%2520nDCG%25405%2520scores%2520of%252065.2%2525%2520and%252077.1%2525.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16455v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Evo-Retriever%3A%20LLM-Guided%20Curriculum%20Evolution%20with%20Viewpoint-Pathway%20Collaboration%20for%20Multimodal%20Document%20Retrieval&entry.906535625=Weiqing%20Li%20and%20Jinyue%20Guo%20and%20Yaqi%20Wang%20and%20Haiyang%20Xiao%20and%20Yuewei%20Zhang%20and%20Guohua%20Liu%20and%20Hao%20Henry%20Wang&entry.1292438233=Visual-language%20models%20%28VLMs%29%20excel%20at%20data%20mappings%2C%20but%20real-world%20document%20heterogeneity%20and%20unstructuredness%20disrupt%20the%20consistency%20of%20cross-modal%20embeddings.%20Recent%20late-interaction%20methods%20enhance%20image-text%20alignment%20through%20multi-vector%20representations%2C%20yet%20traditional%20training%20with%20limited%20samples%20and%20static%20strategies%20cannot%20adapt%20to%20the%20model%27s%20dynamic%20evolution%2C%20causing%20cross-modal%20retrieval%20confusion.%20To%20overcome%20this%2C%20we%20introduce%20Evo-Retriever%2C%20a%20retrieval%20framework%20featuring%20an%20LLM-guided%20curriculum%20evolution%20built%20upon%20a%20novel%20Viewpoint-Pathway%20collaboration.%20First%2C%20we%20employ%20multi-view%20image%20alignment%20to%20enhanc {"title": "Order Matters: 3D Shape Generation from Sequential VR Sketches", "author": "Yizi Chen and Sidi Wu and Tianyi Xiao and Nina Wiedemann and Loic Landrieu", "abstract": "VR sketching lets users explore and iterate on ideas directly in 3D, offering a faster and more intuitive alternative to conventional CAD tools. However, existing sketch-to-shape models ignore the temporal ordering of strokes, discarding crucial cues about structure and design intent. We introduce VRSketch2Shape, the first framework and multi-category dataset for generating 3D shapes from sequential VR sketches. Our contributions are threefold: (i) an automated pipeline that generates sequential VR sketches from arbitrary shapes, (ii) a dataset of over 20k synthetic and 900 hand-drawn sketch-shape pairs across four categories, and (iii) an order-aware sketch encoder coupled with a diffusion-based 3D generator. Our approach yields higher geometric fidelity than prior work, generalizes effectively from synthetic to real sketches with minimal supervision, and performs well even on partial sketches. All data and models will be released open-source at https://chenyizi086.github.io/VRSketch2Shape_website.", "link": "http://arxiv.org/abs/2512.04761v3", "date": "2026-03-17", "relevancy": 2.8753, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5765}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5765}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5722}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Order%20Matters%3A%203D%20Shape%20Generation%20from%20Sequential%20VR%20Sketches&body=Title%3A%20Order%20Matters%3A%203D%20Shape%20Generation%20from%20Sequential%20VR%20Sketches%0AAuthor%3A%20Yizi%20Chen%20and%20Sidi%20Wu%20and%20 {"title": "SegviGen: Repurposing 3D Generative Model for Part Segmentation", "author": "Lin Li and Haoran Feng and Zehuan Huang and Haohua Chen and Wenbo Nie and Shaohua Hou and Keqing Fan and Pan Hu and Sheng Wang and Buyu Li and Lu Sheng", "abstract": "We introduce SegviGen, a framework that repurposes native 3D generative models for 3D part segmentation. Existing pipelines either lift strong 2D priors into 3D via distillation or multi-view mask aggregation, often suffering from cross-view inconsistency and blurred boundaries, or explore native 3D discriminative segmentation, which typically requires large-scale annotated 3D data and substantial training resources. In contrast, SegviGen leverages the structured priors encoded in pretrained 3D generative model to induce segmentation through distinctive part colorization, establishing a novel and efficient framework for part segmentation. Specifically, SegviGen encodes a 3D asset and predicts part-indicative colors on active voxels of a geometry-aligned reconstruction. It supports interactive part segmentation, full segmentation, and full segmentation with 2D guidance in a unified framework. Extensive experiments show that SegviGen improves over the prior state of the art by 40% on interactive part segmentation and by 15% on full segmentation, while using only 0.32% of the labeled training data. It demonstrates that pretrained 3D generative priors transfer effectively to 3D part segmentation, enabling strong performance with limited supervision. See our project page at https://fenghora.github.io/SegviGen-Page/.", "link": "http://arxiv.org/abs/2603.16869v1", "date": "2026-03-17", "relevancy": 2.8683, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5747}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5747}, {"title": "GST: Precise 3D {"title": "HeBA: Heterogeneous Bottleneck Adapters for Robust Vision-Language Models", "author": "Md Jahidul Islam", "abstract": "Adapting large-scale Vision-Language Models (VLMs) like CLIP to downstream tasks often suffers from a \"one-size-fits-all\" architectural approach, where visual and textual tokens are processed uniformly by wide, generic adapters. We argue that this homogeneity ignores the distinct structural nature of the modalities -- spatial locality in images versus semantic density in text. To address this, we propose HeBA (Heterogeneous Bottleneck Adapter), a unified architectural framework that introduces modality-specific structural inductive biases. HeBA departs from conventional designs through three key architectural innovations: (1) Heterogeneity: It processes visual tokens via 2D depthwise-separable convolutions to preserve spatial correlations, while distinctively processing text tokens via dense linear projections to capture semantic relationships; (2) Bottleneck Regularization: Unlike standard expanding adapters, HeBA employs a compression bottleneck (D -> D/4) that explicitly forces the model to learn compact, robust features and acts as a structural regularizer; and (3) Active Gradient Initialization: We challenge the restrictive zero-initialization paradigm, utilizing a Kaiming initialization strategy that ensures sufficient initial gradient flow to accelerate convergence without compromising the frozen backbone's pre-trained knowledge. Extensive experiments demonstrate that HeBA's architecturally specialized design achieves superior stability and accuracy, establishing a new state-of-the-art on 11 few-shot benchmarks. Code is available at https://github.com/Jahid12012021/VLM-HeBA.", "link": "http://arxiv.org/abs/2603.16653v1", "date": "2026-03-17", "relevancy": 2.862, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6207}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5482}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5482}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HeBA%3A%20Heterogeneous%20Bottleneck%20Adapters%20for%20Robust%20Vision-Language%20Models&body=Title%3A%20HeBA%3A%20Heterogeneous%20Bottleneck%20Adapters%20for%20Robust%20Vision-Language%20Models%0AAuthor%3A%20Md%20Jahidul%20Islam%0AAbstract%3A%20Adapting%20large-scale%20Vision-Language%20Models%20%28VLMs%29%20like%20CLIP%20to%20downstream%20tasks%20often%20suffers%20from%20a%20%22one-size-fits-all%22%20architectural%20approach%2C%20where%20visual%20and%20textual%20tokens%20are%20processed%20uniformly%20by%20wide%2C%20generic%20adapters.%20We%20argue%20that%20this%20homogeneity%20ignores%20the%20distinct%20structural%20nature%20of%20the%20modalities%20--%20spatial%20locality%20in%20images%20versus%20semantic%20density%20in%20text.%20To%20address%20this%2C%20we%20propose%20HeBA%20%28Heterogeneous%20Bottleneck%20Adapter%29%2C%20a%20unified%20architectural%20framework%20that%20introduces%20modality-specific%20structural%20inductive%20biases.%20HeBA%20departs%20from%20conventional%20designs%20through%20three%20key%20architectural%20innovations%3A%20%281%29%20Heterogeneity%3A%20It%20processes%20visual%20tokens%20via%202D%20depthwise-separable%20convolutions%20to%20preserve%20spatial%20correlations%2C%20while%20distinctively%20processing%20text%20tokens%20via%20dense%20linear%20projections%20to%20capture%20semantic%20relationships%3B%20%282%29%20Bottleneck%20Regularization%3A%20Unlike%20standard%20expanding%20adapters%2C%20HeBA%20employs%20a%20compression%20bottleneck%20%28D%20-%3E%20D/4%29%20that%20explicitly%20forces%20the%20model%20to%20learn%20compact%2C%20robust%20features%20and%20acts%20as%20a%20structural%20regularizer%3B%20and%20%283%29%20Active%20Gradient%20Initialization%3A%20We%20challenge%20the%20restrictive%20zero-initialization%20paradigm%2C%20utilizing%20a%20Kaiming%20initialization%20strategy%20that%20ensures%20sufficient%20initial%20gradient%20flow%20to%20accelerate%20convergence%20without%20compromising%20the%20frozen%20backbone%27s%20pre-trained%20knowledge.%20Extensive%20experiments%20demonstrate%20that%20HeBA%27s%20architecturally%20specialized%20design%20achieves%20superior%20stability%20and%20accuracy%2C%20establishing%20a%20new%20state-of-the-art%20on%2011%20few-shot%20benchmarks.%20Code%20is%20available%20at%20https%3A//github.com/Jahid12012021/VLM-HeBA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16653v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHeBA%253A%2520Heterogeneous%2520Bottleneck%2520Adapters%2520for%2520Robust%2520Vision-Language%2520Models%26entry.906535625%3DMd%2520Jahidul%2520Islam%26entry.1292438233%3DAdapting%2520large-scale%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520like%2520CLIP%2520to%2520downstream%2520tasks%2520often%2520suffers%2520from%2520a%2520%2522one-size-fits-all%2522%2520architectural%2520approach%252C%2520where%2520visual%2520and%2520textual%2520tokens%2520are%2520processed%2520uniformly%2520by%2520wide%252C%2520generic%2520adapters.%2520We%2520argue%2520that%2520this%2520homogeneity%2520ignores%2520the%2520distinct%2520structural%2520nature%2520of%2520the%2520modalities%2520--%2520spatial%2520locality%2520in%2520images%2520versus%2520semantic%2520density%2520in%2520text.%2520To%2520address%2520this%252C%2520we%2520propose%2520HeBA%2520%2528Heterogeneous%2520Bottleneck%2520Adapter%2529%252C%2520a%2520unified%2520architectural%2520framework%2520that%2520introduces%2520modality-specific%2520structural%2520inductive%2520biases.%2520HeBA%2520departs%2520from%2520conventional%2520designs%2520through%2520three%2520 {"title": "V-JEPA 2.1: Unlocking Dense Features in Video Self-Supervised Learning", "author": "Lorenzo Mur-Labadia and Matthew Muckley and Amir Bar and Mido Assran and Koustuv Sinha and Mike Rabbat and Yann LeCun and Nicolas Ballas and Adrien Bardes", "abstract": "We present V-JEPA 2.1, a family of self-supervised models that learn dense, high-quality visual representations for both images and videos while retaining strong global scene understanding. The approach combines four key components. First, a dense predictive loss uses a masking-based objective in which both visible and masked tokens contribute to the training signal, encouraging explicit spatial and temporal grounding. Second, deep self-supervision applies the self-supervised objective hierarchically across multiple intermediate encoder layers to improve representation quality. Third, multi-modal tokenizers enable unified training across images and videos. Finally, the model benefits from effective scaling in both model capacity and training data. Together, these design choices produce representations that are spatially structured, semantically coherent, and temporally consistent.\n  Empirically, V-JEPA 2.1 achieves state-of-the-art performance on several challenging benchmarks, including 7.71 mAP on Ego4D for short-term object-interaction anticipation and 40.8 Recall@5 on EPIC-KITCHENS for high-level action anticipation, as well as a 20-point improvement in real-robot grasping success rate over V-JEPA-2 AC. The model also demonstrates strong performance in robotic navigation (5.687 ATE on TartanDrive), depth estimation (0.307 RMSE on NYUv2 with a linear probe), and global recognition (77.7 on Something-Something-V2). These results show that V-JEPA 2.1 significantly advances the state of the art in dense visual understanding and world modeling.", "link": "http://arxiv.org/abs/2603.14482v2", "date": "2026-03-17", "relevancy": 2.8586, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Comple %20semantically%20coherent%2C%20and%20temporally%20consistent.%0A%20%20Empirically%2C%20V-JEPA%202.1%20achieves%20state-of-the-art%20performance%20on%20several%20challenging%20benchmarks%2C%20including%207.71%20mAP%20on%20Ego4D%20for%20short-term%20object-interaction%20anticipation%20and%2040.8%20Recall%405%20on%20EPIC-KITCHENS%20for%20high-level%20action%20anticipation%2C%20as%20well%20as%20a%2020-point%20improvement%20in%20real-robot%20grasping%20success%20rate%20over%20V-JEPA-2%20AC.%20The%20model%20also%20demonstrates%20strong%20performance%20in%20robotic%20navigation%20%285.687%20ATE%20on%20TartanDrive%29%2C%20depth%20estimation%20%280.307%20RMSE%20on%20NYUv2%20with%20a%20linear%20probe%29%2C%20and%20global%20recognition%20%2877.7%20on%20Something-Something-V2%29.%20These%20results%20show%20that%20V-JEPA%202.1%20significantly%20advances%20the%20state%20of%20the%20art%20in%20dense%20visual%20understanding%20and%20world%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14482v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DV-JEPA%25202.1%253A%2520Unlocking%2520Dense%2520Features%2520in%2520Video%2520Self-Supervised%2520Learning%26entry.906535625%3DLorenzo%2520Mur-Labadia%2520and%2520Matthew%2520Muckley%2520and%2520Amir%2520Bar%2520and%2520Mido%2520Assran%2520and%2520Koustuv%2520Sinha%2520and%2520Mike%2520Rabbat%2520and%2520Yann%2520LeCun%2520and%2520Nicolas%2520Ballas%2520and%2520Adrien%2520Bardes%26entry.1292438233%3DWe%2520present%2520V-JEPA%25202.1%252C%2520a%2520family%2520of%2520self-supervised%2520models%2520that%2520learn%2520dense%252C%2520high-quality%2520visual%2520representations%2520for%2520both%2520images%2520and%2520videos%2520while%2520retaining%2520strong%2520global%2520scene%2520understanding.%2520The%2520approach%2520combines%2520four%2520key%2520components.%2520First%252C%2520a%2520dense%2520predictive%2520loss%2520uses%2520a%2520masking-based%2520objectiv {"title": "A Novel Patch-Based TDA Approach for Computed Tomography Imaging", "author": "Dashti A. Ali and Aras T. Asaad and Jacob J. Peoples and Ahmad Bashir Barekzai and Camila Vilela and Hala Khasawneh and Jayasree Chakraborty and Jo\u00e3o Miranda and Mohammad Hamghalam and Natalie Gangai and Natally Horvat and Richard K. G. Do and Alice C. Wei and Amber L. Simpson", "abstract": "The development of machine learning (ML) models based on computed tomography (CT) imaging has been a major focus due to the promise that imaging holds for diagnosis, staging, and prognostication. These models often rely on the extraction of hand-crafted features, incorporating robust feature engineering improves the performance of these models. Topological data analysis (TDA), based on the mathematical field of algebraic topology, focuses on data from a topological perspective, extracting deeper insight and higher dimensional structures. Persistent homology (PH), a fundamental tool in TDA, extracts topological features such as connected components, cycles, and voids. A popular approach to construct PH from 3D CT images is to utilize the 3D cubical complex filtration, a method adapted for grid-structured data. However, this approach is subject to poor performance and high computational cost with higher resolution CT images. This study introduces a novel patch-based PH construction approach tailored for volumetric CT imaging data that improves performance and reduces computational time. This study conducts a series of systematic experiments to comprehensively analyze the performance of the proposed method with various parameters and benchmarks against the 3D cubical complex algorithm and radiomic features. Our results highlight the dominance of the patch-based TDA approach in terms of both classification performance and computational time. The proposed approach outperformed the cubical complex method and radiomic features, achieving average improvement of 7.2%, 3.6%, 2.7%, 8.0%, and 7.2% in accuracy, AUC, sensitivity, specificity, and F1 score, respectively, across all datasets. Finally, we provide a convenient python package, Patch-TDA, to facilitate the utilization of the proposed approach.", "link": "http://arxiv.org/abs/2512.12108v4", "date": "2026-03-17", "relevancy": 2.8288, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5733}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5733}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Novel%20Patch-Based%20TDA%20Approach%20for%20Computed%20Tomography%20Imaging&body=Title%3A%20A%20Novel%20Patch-Based%20TDA%20Approach%20for%20Computed%20Tomography%20Imaging%0AAuthor%3A%20Dashti%20A.%20Ali%20and%20Aras%20T.%20Asaad%20and%20Jacob%20J.%20Peoples%20and%20Ahmad%20Bashir%20Barekzai%20and%20Camila%20Vilela%20and%20Hala%20Khasawneh%20and%20Jayasree%20Chakraborty%20and%20Jo%C3%A3o%20Miranda%20and%20Mohammad%20Hamghalam%20and%20Natalie%20Gangai%20and%20Natally%20Horvat%20and%20Richard%20K.%20G.%20Do%20and%20Alice%20C.%20Wei%20and%20Amber%20L.%20Simpson%0AAbstract%3A%20The%20development%20of%20machine%20learning%20%28ML%29%20models%20based%20on%20computed%20tomography%20%28CT%29%20imaging%20has%20been%20a%20major%20focus%20due%20to%20the%20promise%20that%20imaging%20holds%20for%20diagnosis%2C%20staging%2C%20and%20prognostication.%20These%20models%20often%20rely%20on%20the%20extraction%20of%20hand-crafted%20features%2C%20incorporating%20robust%20feature%20engineering%20improves%20the%20performance%20of%20these%20models.%20Topological%20data%20analysis%20%28TDA%29%2C%20based%20on%20the%20mathematical%20field%20of%20algebraic%20topology%2C%20focuses%20on%20data%20from%20a%20topological%20perspective%2C%20extracting%20deeper%20insight%20and%20higher%20dimensional%20structures.%20Persistent%20homology%20%28PH%29%2C%20a%20fundamental%20tool%20in%20TDA%2C%20extracts%20topological%20features%20such%20as%20connected%20components%2C%20cycles%2C%20and%20voids.%20A%20popular%20approach%20to%20construct%20PH%20from%203D%20CT%20images%20is%20to%20utilize%20the%203D%20cubical%20complex%20filtration%2C%20a%20method%20adapted%20for%20grid-structured%20data.%20However%2C%20this%20approach%20is%20subject%20to%20poor%20performance%20and%20high%20computational%20cost%20with%20higher%20resolution%20CT%20images.%20This%20study%20introduces%20a%20novel%20patch-based%20PH%20construction%20approach%20tailored%20for%20volumetric%20CT%20imaging%20data%20that%20improves%20performance%20and%20reduces%20computational%20time.%20This%20study%20conducts%20a%20series%20of%20systematic%20experiments%20to%20comprehensively%20analyze%20the%20performance%20of%20the%20proposed%20method%20with%20various%20parameters%20and%20benchmarks%20against%20the%203D%20cubical%20complex%20algorithm%20and%20radiomic%20features.%20Our%20results%20highlight%20the%20dominance%20of%20the%20patch-based%20TDA%20approach%20in%20terms%20of%20both%20classification%20performance%20and%20computational%20time.%20The%20proposed%20approach%20outperformed%20the%20cubical%20complex%20method%20and%20radiomic%20features%2C%20achieving%20average%20improvement%20of%207.2%25%2C%203.6%25%2C%202.7%25%2C%208.0%25%2C%20and%207.2%25%20in%20accuracy%2C%20AUC%2C%20sensitivity%2C%20specificity%2C%20and%20F1%20score%2C%20respectively%2C%20across%20all%20datasets.%20Finally%2C%20we%20provide%20a%20convenient%20python%20package%2C%20Patch-TDA%2C%20to%20facilitate%20the%20utilization%20of%20the%20proposed%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2512.12108v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Novel {"title": "GeoBridge: A Semantic-Anchored Multi-View Foundation Model Bridging Images and Text for Geo-Localization", "author": "Zixuan Song and Jing Zhang and Di Wang and Zidie Zhou and Wenbin Liu and Haonan Guo and En Wang and Bo Du", "abstract": "Cross-view geo-localization infers a location by retrieving geo-tagged reference images that visually correspond to a query image. However, the traditional satellite-centric paradigm limits robustness when high-resolution or up-to-date satellite imagery is unavailable. It further underexploits complementary cues across views (\\eg, drone, satellite, and street) and modalities (\\eg, language and image). To address these challenges, we propose GeoBridge, a novel model that performs bidirectional matching across views and supports language-to-image retrieval. Going beyond traditional satellite-centric formulations, GeoBridge builds on a novel semantic-anchor mechanism that bridges multi-view features through textual descriptions for robust, flexible localization. In support of this task, we construct GeoLoc, the first large-scale, cross-modal, and multi-view aligned dataset comprising over 50,000 pairs of drone, street-view panorama, and satellite images as well as their textual descriptions, collected from 36 countries, ensuring both geographic and semantic alignment. We performed broad evaluations across multiple tasks. Experiments confirm that GeoLoc pre-training markedly improves geo-location accuracy for GeoBridge while promoting cross-domain generalization and cross-modal knowledge transfer. Code, dataset, and pretrained models will be released at https://github.com/MiliLab/GeoBridge.", "link": "http://arxiv.org/abs/2512.02697v2", "date": "2026-03-17", "relevancy": 2.8243, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5794}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoBridge%3A%20A%20Semantic-Anchored%20Multi-View%20Foundation%20Model%20Bridging%20Images%20and%20Text%20for%20Geo-Localization&body=Title%3A%20GeoBridge%3A%20A%20Semantic-Anchored%20Multi-View%20Foundation%20Model%20Bridging%20Images%20and%20Text%20for%20Geo-Localization%0AAuthor%3A%20Zixuan%20Song%20and%20Jing%20Zhang%20and%20Di%20Wang%20and%20Zidie%20Zhou%20and%20Wenbin%20Liu%20and%20Haonan%20Guo%20and%20En%20Wang%20and%20Bo%20Du%0AAbstract%3A%20Cross-view%20geo-localization%20infers%20a%20location%20by%20retrieving%20geo-tagged%20reference%20images%20that%20visually%20correspond%20to%20a%20query%20image.%20However%2C%20the%20traditional%20satellite-centric%20paradigm%20limits%20robustness%20when%20high-resolution%20or%20up-to-date%20satellite%20imagery%20is%20unavailable.%20It%20further%20underexploits%20complementary%20cues%20across%20views%20%28%5Ceg%2C%20drone%2C%20satellite%2C%20and%20street%29%20and%20modalities%20%28%5Ceg%2C%20language%20and%20image%29.%20To%20address%20these%20challenges%2C%20we%20propose%20GeoBridge%2C%20a%20novel%20model%20that%20performs%20bidirectional%20matching%20across%20views%20and%20supports%20language-to-image%20retrieval.%20Going%20beyond%20traditional%20satellite-centric%20formulations%2C%20GeoBridge%20builds%20on%20a%20novel%20semantic-anchor%20mechanism%20that%20bridges%20multi-view%20features%20through%20textual%20descriptions%20for%20robust%2C%20flexible%20localization.%20In%20support%20of%20this%20task%2C%20we%20construct%20GeoLoc%2C%20the%20first%20large-scale%2C%20cross-modal%2C%20and%20multi-view%20aligned%20dataset%20comprising%20over%2050%2C000%20pairs%20of%20drone%2C%20street-view ges%20that%20visually%20correspond%20to%20a%20query%20image.%20However%2C%20the%20traditional%20satellite-centric%20paradigm%20limits%20robustness%20when%20high-resolution%20or%20up-to-date%20satellite%20imagery%20is%20unavailable.%20It%20further%20underexploits%20complementary%20cues%20across%20views%20%28%5Ceg%2C%20drone%2C%20satellite%2C%20and%20street%29%20and%20modalities%20%28%5Ceg%2C%20language%20and%20image%29.%20To%20address%20these%20challenges%2C%20we%20propose%20GeoBridge%2C%20a%20novel%20model%20that%20performs%20bidirectional%20matching%20across%20views%20and%20supports%20language-to-image%20retrieval.%20Going%20beyond%20traditional%20satellite-centric%20formulations%2C%20GeoBridge%20builds%20on%20a%20novel%20semantic-anchor%20mechanism%20that%20bridges%20multi-view%20features%20through%20textual%20descriptions%20for%20robust%2C%20flexible%20localization.%20In%20support%20of%20this%20task%2C%20we%20construct%20GeoLoc%2C%20the%20first%20large-scale%2C%20cross-modal%2C%20and%20multi-view%20aligned%20dataset%20comprising%20over%2050%2C000%20pairs%20of%20drone%2C%20street-view%20panorama%2C%20and%20satellite%20images%20as%20well%20as%20their%20textual%20descriptions%2C%20collected%20from%2036%20countries%2C%20ensuring%20both%20geographic%20and%20semantic%20alignment.%20We%20performed%20broad%20evaluations%20across%20multiple%20tasks.%20Experiments%20confirm%20that%20GeoLoc%20pre-training%20markedly%20improves%20geo-location%20accuracy%20for%20GeoBridge%20while%20promoting%20cross-domain%20generalization%20and%20cross-modal%20knowledge%20transfer.%20Code%2C%20dataset%2C%20and%20pretrained%20models%20will%20be%20released%20at%20https%3A//github.com/MiliLab/GeoBridge.&entry.1838667208=http%3A//arxiv.org/abs/2512.02697v2&entry.124074799=Read"},
{"title": "V-DyKnow: A Dynamic Benchmark for Time-Sensitive Knowledge in Vision Language Models", "author": "Seyed Mahed Mousavi and Christian Moiola and Massimo Rizzoli and Simone Alghisi and Giuseppe Riccardi", "abstract": "Vision-Language Models (VLMs) are trained on data snapshots of documents, including images and texts. Their training data and evaluation benchmarks are typically static, implicitly treating factual knowledge as time-invariant. However, real-world facts are intrinsically time-sensitive and subject to erratic and periodic changes, causing model predictions to become outdated. We present V-DyKnow, a Visual Dynamic Knowledge benchmark for evaluating time-sensitive factual knowledge in VLMs. Using V-DyKnow, we benchmark closed- and open-source VLMs and analyze a) the reliability (correctness and consistency) of model responses across modalities and input perturbations; b) the efficacy of knowledge editing and multi-modal RAG methods for knowledge updates across modalities; and c) the sources of outdated predictions, through data and mechanistic analysis. Our results show that VLMs frequently output outdated facts, reflecting outdated snapshots used in the (pre-)training phase. Factual reliability degrades from textual to visual stimuli, even when entities are correctly recognized. Besides, existing alignment approaches fail to consistently update the models' knowledge across modalities. Together, these findings highlight fundamental limitations in how current VLMs acquire and update time-sensitive knowledge across modalities. We release the benchmark, code, and evaluation data.", "link": "http://arxiv.org/abs/2603.16581v1", "date": "2026-03-17", "relevancy": 2.7665, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5615}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5615}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20V-DyKnow%3A%20A%20Dynamic%20Benchmark%20for%20Time-Sensitive%20Knowledge%20in%20Vision%20Language%20Models&body=Title%3A%20V-DyKnow%3A%20A%20Dynamic%20Benchmark%20for%20Time-Sensitive%20Knowledge%20in%20Vision%20Language%20Models%0AAuthor%3A%20Seyed%20Mahed%20Mousavi%20and%20Christian%20Moiola%20and%20Massimo%20Rizzoli%20and%20Simone%20Alghisi%20and%20Giuseppe%20Riccardi%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20are%20trained%20on%20data%20snapshots%20of%20documents%2C%20including%20images%20and%20texts.%20Their%20training%20data%20and%20evaluation%20benchmarks%20are%20typically%20static%2C%20implicitly%20treating%20factual%20knowledge%20as%20time-invariant.%20However%2C%20real-world%20facts%20are%20intrinsically%20time-sensitive%20and%20subject%20to%20erratic%20and%20periodic%20changes%2C%20causing%20model%20predictions%20to%20become%20outdated.%20We%20present%20V-DyKnow%2C%20a%20Visual%20Dynamic%20Knowledge%20benchmark%20for%20evaluating%20time-sensitive%20factual%20knowledge%20in%20VLMs.%20Using%20V-DyKnow%2C%20we%20benchmark%20closed-%20and%20open-source%20VLMs%20and%20analyze%20a%29%20the%20reliability%20%28correctness%20and%20consistency%29%20of%20model%20responses%20across%20modalities%20and%20input%20perturbations%3B%20b%29%20the%20efficacy%20of%20knowledge%20editing%20and%20multi-modal%20RAG%20methods%20for%20knowledge%20updates%20across%20modalities%3B%20and%20c%29%20the%20sources%20of%20outdated%20predictions%2C%20through%20data%20and%20mechanistic%20analysis.%20Our%20results%20show%20that%20VLMs%20frequently%20output%20outdated%20facts%2C%20reflecting%20outdated%20snapshots%20used%20in%20the%20%28pre-%29training%20phase.%20Factual%20reliability%20degrades%20from%20textual%20to%20visual%20stimuli%2C%20even%20when%20entities%20are%20correctly%20recognized.%20Besides%2C%20existing%20alignment%20approaches%20fail%20to%20consistently%20update%20the%20models%27%20knowledge%20across%20modalities.%20Together%2C%20these%20findings%20highlight%20fundamental%20limitations%20in%20how%20current%20VLMs%20acquire%20and%20update%20time-sensitive%20knowledge%20across%20modalities.%20We%20release%20the%20benchmark%2C%20code%2C%20and%20evaluation%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16581v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DV-DyKnow%253A%2520A%2520Dynamic%2520Benchmark%2520for%2520Time-Sensitive%2520Knowledge%2520in%2520Vision%2520Language%2520Models%26entry.906535625%3DSeyed%2520Mahed%2520Mousavi%2520and%2520Christian%2520Moiola%2520and%2520Massimo%2520Rizzoli%2520and%2520Simone%2520Alghisi%2520and%2520Giuseppe%2520Riccardi%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520are%2520trained%2520on%2520data%2520snapshots%2520of%2520documents%252C%2520including%2520images%2520and%2520texts.%2520Their%2520training%2520data%2520and%2520evaluation%2520benchmarks%2520are%2520typically%2520static%252C%2520implicitly%2520treating%2520factual%2520knowledge%2520as%2520time-invariant.%2520However%252C%2520real-world%2520facts%2520are%2520intrinsically%2520time-sensitive%2520and%2520subject%2520to%2520erratic%2520and%2520periodic%2520changes%252C%2520causing%2520model%2520predictions%2520to%2520become%2520outdated.%2520We%2520present%2520V-DyKnow%252C%2520a%2520Visual%2520Dynamic%2520Knowledge%2520benchmark%2520for%2520evaluating%2520time-sensitive%2520factual%2520knowledge%2520in%2520VLMs.%2520Using%2520V-DyKnow%252C%2520we%2520benchmark%2520closed-%2520and%2520open-source%2520VLMs%2520and%2520analyze%2520a%2529%2 {"title": "Semi-supervised Latent Disentangled Diffusion Model for Textile Pattern Generation", "author": "Chenggong Hu and Yi Wang and Mengqi Xue and Haofei Zhang and Jie Song and Li Sun", "abstract": "Textile pattern generation (TPG) aims to synthesize fine-grained textile pattern images based on given clothing images. Although previous studies have not explicitly investigated TPG, existing image-to-image models appear to be natural candidates for this task. However, when applied directly, these methods often produce unfaithful results, failing to preserve fine-grained details due to feature confusion between complex textile patterns and the inherent non-rigid texture distortions in clothing images. In this paper, we propose a novel method, SLDDM-TPG, for faithful and high-fidelity TPG. Our method consists of two stages: (1) a latent disentangled network (LDN) that resolves feature confusion in clothing representations and constructs a multi-dimensional, independent clothing feature space; and (2) a semi-supervised latent diffusion model (S-LDM), which receives guidance signals from LDN and generates faithful results through semi-supervised diffusion training, combined with our designed fine-grained alignment strategy. Extensive evaluations show that SLDDM-TPG reduces FID by 4.1 and improves SSIM by up to 0.116 on our CTP-HD dataset, and also demonstrate good generalization on the VITON-HD dataset.", "link": "http://arxiv.org/abs/2603.16747v1", "date": "2026-03-17", "relevancy": 2.7503, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.7153}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6946}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.657}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semi-supervised%20Latent%20Disentangled%20Diffusion%20Model%20for%20Textile%20Pattern%20Generation&body=Title%3A%20Semi-supervised%20Latent%20Disentangled%20Diffusion%20Model%20for%20Textile%20Pattern%20Generation%0AAuthor%3A%20Chenggong%20Hu%20and%20Yi%20Wang%20and%20Mengqi%20Xue%20and%20Haofei%20Zhang%20and%20Jie%20Song%20and%20Li%20Sun%0AAbstract%3A%20Textile%20pattern%20generation%20%28TPG%29%20aims%20to%20synthesize%20fine-grained%20textile%20pattern%20images%20based%20on%20given%20clothing%20images.%20Although%20previous%20studies%20have%20not%20explicitly%20investigated%20TPG%2C%20existing%20image-to-image%20models%20appear%20to%20be%20natural%20candidates%20for%20this%20task.%20However%2C%20when%20applied%20directly%2C%20these%20methods%20often%20produce%20unfaithful%20results%2C%20failing%20to%20preserve%20fine-grained%20details%20due%20to%20feature%20confusion%20between%20complex%20textile%20patterns%20and%20the%20inherent%20non-rigid%20texture%20distortions%20in%20clothing%20images.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20method%2C%20SLDDM-TPG%2C%20for%20faithful%20and%20high-fidelity%20TPG.%20Our%20method%20consists%20of%20two%20stages%3A%20%281%29%20a%20latent%20disentangled%20network%20%28LDN%29%20that%20resolves%20feature%20confusion%20in%20clothing%20representations%20and%20constructs%20a%20multi-dimensional%2C%20independent%20clothing%20feature%20space%3B%20and%20%282%29%20a%20semi-supervised%20latent%20diffusion%20model%20%28S-LDM%29%2C%20which%20receives%20guidance%20signals%20from%20LDN%20and%20generates%20faithful%20results%20through%20semi-supervised%20diffusion%20training%2C%20combined%20with%20our%20designed%20fine-grained%20alignment%20strategy.%20Extensive%20evaluations%20show%20that%20SLDDM-TPG%20reduces%20FID%20by%204.1%20and%20improves%20SSIM%20by%20up%20to%200.116%20on%20our%20CTP-HD%20dataset%2C%20and%20also%20demonstrate%20good%20generalization%20on%20the%20VITON-HD%20dataset.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16747v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemi-supervised%2520Latent%2520Disentangled%2520Diffusion%2520Model%2520for%2520Textile%2520Pattern%2520Generation%26entry.906535625%3DChenggong%2520Hu%2520and%2520Yi%2520Wang%2520and%2520Mengqi%2520Xue%2520and%2520Haofei%2520Zhang%2520and%2520Jie%2520Song%2520and%2520Li%2520Sun%26entry.1292438233%3DTextile%2520pattern%2520generation%2520%2528TPG%2529%2520aims%2520to%2520synthesize%2520fine-grained%2520textile%2520pattern%2520images%2520based%2520on%2520given%2520clothing%2520images.%2520Although%2520previous%2520studies%2520have%2520not%2520explicitly%2520investigated%2520TPG%252C%2520existing%2520image-to-image%2520models%2520appear%2520to%2520be%2520natural%2520candidates%2520for%2520this%2520task.%2520However%252C%2520when%2520applied%2520directly%252C%2520these%2520methods%2520often%2520produce%2520unfaithful%2520results%252C%2520failing%2520to%2520preserve%2520fine-grained%2520details%2520due%2520to%2520feature%2520confusion%2520between%2520complex%2520textile%2520patterns%2520and%2520the%2520inherent%2520non-rigid%2520texture%2520distortions%2520in%2520clothing%2520images.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520method%252C%2520SLDDM-TPG%252C%2520for%2520faithful%2520and%2520high-fidelity%2520TPG.%2520Our%2520method%2520consists%2520of%2520two%2520stages%253A%2520%25281%2529%2520a%2520latent%2520disentangled%2520network%2520%2528LDN%2529%2520that%2520resolves%2520feature%2520confusion%2520in%2520clothing%2520representations%2520and%2520constructs%2520a%2520multi-dimensional%252C%2520independent%2520clothing%2520feature%2520space%253B%2520and%2520%25282%2529%2520a%2520semi-supervised%2520latent%2520diffusion%2520model%2520%2528S-LDM%2529%252C%2520which%2520receives%2520guidance%2520signals%2520from%2520LDN%2520and%2520generates%2520faithful%2520results%2520through%2520semi-supervised%2520diffusion%2520training%252C%2520combined%2520with%2520our%2520designed%2520fine-grained%2520alignment%2520strategy.%2520Extensive%2520evaluations%2520show%2520that%2520SLDDM-TPG%2520reduces%2520FID%2520by%25204.1%2520and%2520improves%2520SSIM%2520by%2520up%2520to%25200.116%2520on%2520our%2520CTP-HD%2520dataset%252C%2520and%2520also%2520demonstrate%2520good%2520generalization%2520on%2520the%2520VITON-HD%2520dataset.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16747v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semi-supervised%20Latent%20Disentangled%20Diffusion%20Model%20for%20Textile%20Pattern%20Generation&entry.906535625=Chenggong%20Hu%20and%20Yi%20Wang%20and%20Mengqi%20Xue%20and%20Haofei%20Zhang%20and%20Jie%20Song%20and%20Li%20Sun&entry.1292438233=Textile%20pattern%20generation%20%28TPG%29%20aims%20to%20synthesize%20fine-grained%20textile%20pattern%20images%20based%20on%20given%20clothing%20images.%20Although%20previous%20studies%20have%20not%20explicitly%20investigated%20TPG%2C%20existing%20image-to-image%20models%20appear%20to%20be%20natural%20candidates%20for%20this%20task.%20However%2C%20when%20applied%20directly%2C%20these%20methods%20often%20produce%20unfaithful%20results%2C%20failing%20to%20preserve%20fine-grained%20details%20due%20to%20feature%20confusion%20between%20complex%20textile%20patterns%20and%20the%20inherent%20non-rigid%20texture%20distortions%20in%20clothing%20images.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20method%2C%20SLDDM-TPG%2C%20for%20faithful%20and%20high-fidelity%20TPG.%20Our%20method%20consists%20of%20two%20stages%3A%20%281%29%20a%20latent%20disentangled%20network%20%28LDN%29%20that%20resolves%20feature%20confusion%20in%20clothing%20representations%20and%20constructs%20a%20multi-dimensional%2C%20independent%20clothing%20fe {"title": "Retrieving Counterfactuals Improves Visual In-Context Learning", "author": "Guangzhi Xiong and Sanchit Sinha and Zhenghao He and Aidong Zhang", "abstract": "Vision-language models (VLMs) have achieved impressive performance across a wide range of multimodal reasoning tasks, but they often struggle to disentangle fine-grained visual attributes and reason about underlying causal relationships. In-context learning (ICL) offers a promising avenue for VLMs to adapt to new tasks, but its effectiveness critically depends on the selection of demonstration examples. Existing retrieval-augmented approaches typically rely on passive similarity-based retrieval, which tends to select correlated but non-causal examples, amplifying spurious associations and limiting model robustness. We introduce CIRCLES (Composed Image Retrieval for Causal Learning Example Selection), a novel framework that actively constructs demonstration sets by retrieving counterfactual-style examples through targeted, attribute-guided composed image retrieval. By incorporating counterfactual-style examples, CIRCLES enables VLMs to implicitly reason about the causal relations between attributes and outcomes, moving beyond superficial correlations and fostering more robust and grounded reasoning. Comprehensive experiments on four diverse datasets demonstrate that CIRCLES consistently outperforms existing methods across multiple architectures, especially on small-scale models, with pronounced gains under information scarcity. Furthermore, CIRCLES retrieves more diverse and causally informative examples, providing qualitative insights into how models leverage in-context demonstrations for improved reasoning. Our code is available at https://github.com/gzxiong/CIRCLES.", "link": "http://arxiv.org/abs/2603.16737v1", "date": "2026-03-17", "relevancy": 2.7494, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1" {"title": "VisTIRA: Closing the Image-Text Modality Gap in Visual Math Reasoning via Structured Tool Integration", "author": "Saeed Khaki and Ashudeep Singh and Nima Safaei and Kamal Ginotra", "abstract": "Vision-language models (VLMs) lag behind text-only language models on mathematical reasoning when the same problems are presented as images rather than text. We empirically characterize this as a modality gap: the same question in text form yields markedly higher accuracy than its visually typeset counterpart, due to compounded failures in reading dense formulas, layout, and mixed symbolic-diagrammatic context. First, we introduce VisTIRA (Vision and Tool-Integrated Reasoning Agent), a tool-integrated reasoning framework that enables structured problem solving by iteratively decomposing a given math problem (as an image) into natural language rationales and executable Python steps to determine the final answer. Second, we build a framework to measure and improve visual math reasoning: a LaTeX-based pipeline that converts chain-of-thought math corpora (e.g., NuminaMath) into challenging image counterparts, and a large set of synthetic tool-use trajectories derived from a real-world, homework-style image dataset (called SnapAsk) for fine-tuning VLMs. Our experiments show that tool-integrated supervision improves image-based reasoning, and OCR grounding can further narrow the gap for smaller models, although its benefit diminishes at scale. These findings highlight that modality gap severity inversely correlates with model size, and that structured reasoning and OCR-based grounding are complementary strategies for advancing visual mathematical reasoning.", "link": "http://arxiv.org/abs/2601.14440v2", "date": "2026-03-17", "relevancy": 2.7442, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5757}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VisTIRA%3A%20Closing%20the%20Image-Text%20Modality%20Gap%20in%20Visual%20Math%20Reasoning%20via%20Structured%20Tool%20Integration&body=Title%3A%20VisTIRA%3A%20Closing%20the%20Image-Text%20Modality%20Gap%20in%20Visual%20Math%20Reasoning%20via%20Structured%20Tool%20Integration%0AAuthor%3A%20Saeed%20Khaki%20and%20Ashudeep%20Singh%20and%20Nima%20Safaei%20and%20Kamal%20Ginotra%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20lag%20behind%20text-only%20language%20models%20on%20mathematical%20reasoning%20when%20the%20same%20problems%20are%20presented%20as%20images%20rather%20than%20text.%20We%20empirically%20characterize%20this%20as%20a%20modality%20gap%3A%20the%20same%20question%20in%20text%20form%20yields%20markedly%20higher%20accuracy%20than%20its%20visually%20typeset%20counterpart%2C%20due%20to%20compounded%20failures%20in%20reading%20dense%20formulas%2C%20layout%2C%20and%20mixed%20symbolic-diagrammatic%20context.%20First%2C%20we%20introduce%20VisTIRA%20%28Vision%20and%20Tool-Integrated%20Reasoning%20Agent%29%2C%20a%20tool-integrated%20reasoning%20framework%20that%20enables%20structured%20problem%20solving%20by%20iteratively%20decomposing%20a%20given%20math%20problem%20%28as%20an%20image%29%20into%20natural%20language%20rationales%20and%20executable%20Python%20steps%20to%20determine%20the%20final%20answer.%20Second%2C%20we%20build%20a%20framework%20to%20measure%20and%20improve%20visual%20math%20reasoning%3A%20a%20LaTeX-based%20pipeline%20that%20converts%20chain-of-thought%20math%20corpora%20%28e.g.%2C%20NuminaMath%29%20into%20challenging%20image%20counterparts%2C%20and%20a%20large%20set%20of%20synthetic%20tool-use%20trajectories%20derived%20from%20a%20real-world%2C%20homework-style%20image%20dataset%20%28called%20SnapAsk%29%20for%20fine-tuning%20VLMs.%20Our%20experiments%20show%20that%20tool-integrated%20supervision%20improves%20image-based%20reasoning%2C%20and%20OCR%20grounding%20can%20further%20narrow%20the%20gap%20for%20smaller%20models%2C%20although%20its%20benefit%20diminishes%20at%20scale.%20These%20findings%20highlight%20that%20modality%20gap%20severity%20inversely%20correlates%20with%20model%20size%2C%20and%20that%20structured%20reasoning%20and%20OCR-based%20grounding%20are%20complementary%20strategies%20for%20advancing%20visual%20mathematical%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2601.14440v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisTIRA%253A%2520Closing%2520the%2520Image-Text%2520Modality%2520Gap%2520in%2520Visual%2520Math%2520Reasoning%2520via%2520Structured%2520Tool%2520Integration%26entry.906535625%3DSaeed%2520Khaki%2520and%2520Ashudeep%2520Singh%2520and%2520Nima%2520Safaei%2520and%2520Kamal%2520Ginotra%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520lag%2520behind%2520text-only%2520language%2520models%2520on%2520mathematical%2520reasoning%2520when%2520the%2520same%2520problems%2520are%2520presented%2520as%2520images%2520rather%2520than%2520text.%2520We%2520empirically%2520characterize%2520this%2520as%2520a%2520modality%2520gap%253A%2520the%2520same%2520question%2520in%2520text%2520form%2520yields%2520markedly%2520higher%2520accuracy%2520than%2520its%2520visually%2520typeset%2520counterpart%252C%2520due%2520to%2520compounded%2520failures%2520in%2520reading%2520dense%2520formulas%252C%2520layout%252C%2520and%2520mixed%2520symbolic-diagrammatic%2520context.%2520First%252C%2520we%2520introduce%2520VisTIRA%2520%2528Vision%2520and%2520Tool-Integrated%2520Reasoning%2520Agent%2529%252C%2520a%2520tool-integrated%2520reasoning%2520framework%2520that%2520enables%2520structured {"title": "A Unified Benchmark for HOI Evaluation across Vision-Language Models and HOI-Specific Methods", "author": "Qinqian Lei and Bo Wang and Robby T. Tan", "abstract": "HOI detection has long been dominated by task-specific models, sometimes with early vision-language backbones such as CLIP. With the rise of large generative VLMs, a key question is whether standalone VLMs can perform HOI detection competitively against specialized HOI methods. Existing benchmarks such as HICO-DET require exact label matching under incomplete annotations, so any unmatched prediction is marked wrong. This unfairly penalizes valid outputs, especially from less constrained VLMs, and makes cross-paradigm comparison unreliable. To address this limitation, we introduce CrossHOI-Bench, a multiple-choice HOI benchmark with explicit positives and curated negatives, enabling unified and reliable evaluation of both VLMs and HOI-specific models. We further focus on challenging scenarios, such as multi-person scenes and fine-grained interaction distinctions, which are crucial for revealing real differences between the two paradigms. Experiments show that large VLMs achieve competitive, sometimes superior, zero-shot performance, yet they struggle with multiple concurrent actions and with correctly assigning interactions to the target person. Conversely, HOI-specific methods remain weaker in general HOI reasoning but demonstrate stronger multi-action recognition and more reliable identification of which person performs which action. These findings expose complementary strengths and weaknesses of VLMs and HOI-specific methods, which existing benchmarks fail to reveal due to incorrect penalization.", "link": "http://arxiv.org/abs/2508.18753v3", "date": "2026-03-17", "relevancy": 2.6915, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5541}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5541}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5066}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Unified%20Benchmark%20for%20HOI%20Evaluation%20across%20Vision-Language%20Models%20and%20HOI-Specific%20Methods&body=Title%3A%20A%20Unified%20Benchmark%20for%20HOI%20Evaluation%20across%20Vision-Language%20Models%20and%20HOI-Specific%20Methods%0AAuthor%3A%20Qinqian%20Lei%20and%20Bo%20Wang%20and%20Robby%20T.%20Tan%0AAbstract%3A%20HOI%20detection%20has%20long%20been%20dominated%20by%20task-specific%20models%2C%20sometimes%20with%20early%20vision-language%20backbones%20such%20as%20CLIP.%20With%20the%20rise%20of%20large%20generative%20VLMs%2C%20a%20key%20question%20is%20whether%20standalone%20VLMs%20can%20perform%20HOI%20detection%20competitively%20against%20specialized%20HOI%20methods.%20Existing%20benchmarks%20such%20as%20HICO-DET%20require%20exact%20label%20matching%20under%20incomplete%20annotations%2C%20so%20any%20unmatched%20prediction%20is%20marked%20wrong.%20This%20unfairly%20penalizes%20valid%20outputs%2C%20especially%20from%20less%20constrained%20VLMs%2C%20and%20makes%20cross-paradigm%20comparison%20unreliable.%20To%20address%20this%20limitation%2C%20we%20introduce%20CrossHOI-Bench%2C%20a%20multiple-choice%20HOI%20benchmark%20with%20explicit%20positives%20and%20curated%20negatives%2C%20enabling%20unified%20and%20reliable%20evaluation%20of%20both%20VLMs%20and%20HOI-specific%20models.%20We%20further%20focus%20on%20challenging%20scenarios%2C%20such%20as%20multi-person%20scenes%20and%20fine-grained%20interaction%20distinctions%2C%20which%20are%20crucial%20for%20revealing%20real%20differences%20between%20the%20two%20paradigms.%20Experiments%20show%20that%20large%20VLMs%20achieve%20competitive%2C%20sometimes%20superior%2C%20zero-shot%20performance%2C%20yet%20they%20struggle%20with%20multiple%20concurrent%20actions%20and%20with%20correctly%20assigning%20interactions%20to%20the%20target%20person.%20Conversely%2C%20HOI-specific%20methods%20remain%20weaker%20in%20general%20HOI%20reasoning%20but%20demonstrate%20stronger%20multi-action%20recognition%20and%20more%20reliable%20identification%20of%20which%20person%20performs%20which%20action.%20These%20findings%20expose%20complementary%20strengths%20and%20weaknesses%20of%20VLMs%20and%20HOI-specific%20methods%2C%20which%20existing%20benchmarks%20fail%20to%20reveal%20due%20to%20incorrect%20penalization.%0ALink%3A%20http%3A//arxiv.org/abs/2508.18753v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Unified%2520Benchmark%2520for%2520HOI%2520Evaluation%2520across%2520Vision-Language%2520Models%2520and%2520HOI-Specific%2520Methods%26entry.906535625%3DQinqian%2520Lei%2520and%2520Bo%2520Wang%2520and%2520Robby%2520T.%2520Tan%26entry.1292438233%3DHOI%2520detection%2520has%2520long%2520been%2520dominated%2520by%2520task-specific%2520models%252C%2520sometimes%2520with%2520early%2520vision-language%2520backbones%2520such%2520as%2520CLIP.%2520With%2520the%2520rise%2520of%2520large%2520generative%2520VLMs%252C%2520a%2520key%2520question%2520is%2520whether%2520standalone%2520VLMs%2520can%2520perform%2520HOI%2520detection%2520competitively%2520against%2520specialized%2520HOI%2520methods.%2520Existing%2520benchmarks%2520such%2520as%2520HICO-DET%2520require%2520exact%2520label%2520matching%2520under%2520incomplete%2520annotations%252C%2520so%2520any%2520unmatched%2520prediction%2520is%2520marked%2520wrong.%2520This%2520unfairly%2520penalizes%2520valid%2520outputs%252C%2520especially%2520from%2520less%2520constrained%2520VLMs%252C%2520and%2520makes

arge-scale%20pretraining%2C%20we%20partition%20the%20data%20into%20three%20subsets%2C%20each%20used%20to%20train%20an%20independent%20expert%20model.%20We%20then%20combine%20these%20models%20through%20SpecMoE%2C%20a%20mixture%20of%20experts%20framework%20guided%20by%20a%20learned%20spectral%20gating%20mechanism.%20SpecMoE%20achieves%20state-of-the-art%20performance%20across%20a%20diverse%20set%20of%20EEG%20decoding%20tasks%2C%20including%20sleep%20staging%2C%20emotion%20recognition%2C%20motor%20imagery%20classification%2C%20abnormal%20signal%20detection%2C%20and%20drug%20effect%20prediction.%20Importantly%2C%20the%20model%20demonstrates%20strong%20cross-species%20and%20cross-subject%20generalization%2C%20maintaining%20high%20accuracy%20on%20both%20human%20and%20murine%20EEG%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2603.16739v1&entry.124074799=Read"},
{"title": "S2WMamba: A Wavelet-Assisted Mamba-Based Dual-Branch Network For Pansharpening", "author": "Haoyu Zhang and Junhan Luo and Yugang Cao and Jie Huang and  Liangjian-Deng", "abstract": "Pansharpening fuses a high-resolution panchromatic (PAN) image with a low-resolution multispectral (LRMS) image to produce a high-resolution multispectral (HRMS) image. A key difficulty is that jointly processing PAN and MS features often entangles spatial detail enhancement with spectral fidelity. To address this feature entanglement, we propose S2WMamba, a framework that explicitly disentangles modality-specific frequency information for highly controlled crossmodal interaction. Concretely, unlike global frequency transforms, a localized 2D Haar DWT is applied to the PAN image to precisely isolate spatial edges and textures. Concurrently, a novel channel-wise 1D Haar DWT treats each pixel's spectrum as a 1D signal, isolating the shared spectral base from band-specific variations to strictly limit spectral distortion. The resulting Spectral branch injects wavelet-extracted spatial details into MS features, while the Spatial branch refines PAN features using spectra from the DWT1D process. To overcome inadequate frequency fusion, the two branches exchange information via Mambabased cross-modulation, which explicitly models long-range dependencies across these decoupled sub-bands with linear complexity. On WV3, GF2, and QB datasets, S2WMamba matches or surpasses recent strong baselines (FusionMamba, CANNet, U2Net, PanNet), improving PSNR by up to 0.23 dB and reaching an HQNR of 0.956 on full-resolution WV3. Extensive ablations justify the modality-specific DWT placement and the parallel dual-branch architecture.", "link": "http://arxiv.org/abs/2512.06330v3", "date": "2026-03-17", "relevancy": 2.5484, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5258}, {" s%20using%20spectra%20from%20the%20DWT1D%20process.%20To%20overcome%20inadequate%20frequency%20fusion%2C%20the%20two%20branches%20exchange%20information%20via%20Mambabased%20cross-modulation%2C%20which%20explicitly%20models%20long-range%20dependencies%20across%20these%20decoupled%20sub-bands%20with%20linear%20complexity.%20On%20WV3%2C%20GF2%2C%20and%20QB%20datasets%2C%20S2WMamba%20matches%20or%20surpasses%20recent%20strong%20baselines%20%28FusionMamba%2C%20CANNet%2C%20U2Net%2C%20PanNet%29%2C%20improving%20PSNR%20by%20up%20to%200.23%20dB%20and%20reaching%20an%20HQNR%20of%200.956%20on%20full-resolution%20WV3.%20Extensive%20ablations%20justify%20the%20modality-specific%20DWT%20placement%20and%20the%20parallel%20dual-branch%20architecture.%0ALink%3A%20http%3A//arxiv.org/abs/2512.06330v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DS2WMamba%253A%2520A%2520Wavelet-Assisted%2520Mamba-Based%2520Dual-Branch%2520Network%2520For%2520Pansharpening%26entry.906535625%3DHaoyu%2520Zhang%2520and%2520Junhan%2520Luo%2520and%2520Yugang%2520Cao%2520and%2520Jie%2520Huang%2520and%2520%2520Liangjian-Deng%26entry.1292438233%3DPansharpening%2520fuses%2520a%2520high-resolution%2520panchromatic%2520%2528PAN%2529%2520image%2520with%2520a%2520low-resolution%2520multispectral%2520%2528LRMS%2529%2520image%2520to%2520produce%2520a%2520high-resolution%2520multispectral%2520%2528HRMS%2529%2520image.%2520A%2520key%2520difficulty%2520is%2520that%2520jointly%2520processing%2520PAN%2520and%2520MS%2520features%2520often%2520entangles%2520spatial%2520detail%2520enhancement%2520with%2520spectral%2520fidelity.%2520To%2520address%2520this%2520feature%2520entanglement%252C%2520we%2520propose%2520S2WMamba%252C%2520a%2520framework%2520that%2520explicitly%2520disentangles%2520modality-specific%2520frequency%2520information%2520for%2520highly%2520controlled%2520crossmodal%2520interaction.%2520Concretely%252C%2520unlike%2520gl {"title": "Kinema4D: Kinematic 4D World Modeling for Spatiotemporal Embodied Simulation", "author": "Mutian Xu and Tianbao Zhang and Tianqi Liu and Zhaoxi Chen and Xiaoguang Han and Ziwei Liu", "abstract": "Simulating robot-world interactions is a cornerstone of Embodied AI. Recently, a few works have shown promise in leveraging video generations to transcend the rigid visual/physical constraints of traditional simulators. However, they primarily operate in 2D space or are guided by static environmental cues, ignoring the fundamental reality that robot-world interactions are inherently 4D spatiotemporal events that require precise interactive modeling. To restore this 4D essence while ensuring the precise robot control, we introduce Kinema4D, a new action-conditioned 4D generative robotic simulator that disentangles the robot-world interaction into: i) Precise 4D representation of robot controls: we drive a URDF-based 3D robot via kinematics, producing a precise 4D robot control trajectory. ii) Generative 4D modeling of environmental reactions: we project the 4D robot trajectory into a pointmap as a spatiotemporal visual signal, controlling the generative model to synthesize complex environments' reactive dynamics into synchronized RGB/pointmap sequences. To facilitate training, we curated a large-scale dataset called Robo4D-200k, comprising 201,426 robot interaction episodes with high-quality 4D annotations. Extensive experiments demonstrate that our method effectively simulates physically-plausible, geometry-consistent, and embodiment-agnostic interactions that faithfully mirror diverse real-world dynamics. For the first time, it shows potential zero-shot transfer capability, providing a high-fidelity foundation for advancing next-generation embodied simulation.", "link": "http://arxiv.org/abs/2603.16669v1", "date": "2026-03-17", "relevancy": 2.5379, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "simi g%20the%20generative%20model%20to%20synthesize%20complex%20environments%27%20reactive%20dynamics%20into%20synchronized%20RGB/pointmap%20sequences.%20To%20facilitate%20training%2C%20we%20curated%20a%20large-scale%20dataset%20called%20Robo4D-200k%2C%20comprising%20201%2C426%20robot%20interaction%20episodes%20with%20high-quality%204D%20annotations.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20effectively%20simulates%20physically-plausible%2C%20geometry-consistent%2C%20and%20embodiment-agnostic%20interactions%20that%20faithfully%20mirror%20diverse%20real-world%20dynamics.%20For%20the%20first%20time%2C%20it%20shows%20potential%20zero-shot%20transfer%20capability%2C%20providing%20a%20high-fidelity%20foundation%20for%20advancing%20next-generation%20embodied%20simulation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16669v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKinema4D%253A%2520Kinematic%25204D%2520World%2520Modeling%2520for%2520Spatiotemporal%2520Embodied%2520Simulation%26entry.906535625%3DMutian%2520Xu%2520and%2520Tianbao%2520Zhang%2520and%2520Tianqi%2520Liu%2520and%2520Zhaoxi%2520Chen%2520and%2520Xiaoguang%2520Han%2520and%2520Ziwei%2520Liu%26entry.1292438233%3DSimulating%2520robot-world%2520interactions%2520is%2520a%2520cornerstone%2520of%2520Embodied%2520AI.%2520Recently%252C%2520a%2520few%2520works%2520have%2520shown%2520promise%2520in%2520leveraging%2520video%2520generations%2520to%2520transcend%2520the%2520rigid%2520visual/physical%2520constraints%2520of%2520traditional%2520simulators.%2520However%252C%2520they%2520primarily%2520operate%2520in%25202D%2520space%2520or%2520are%2520guided%2520by%2520static%2520environmental%2520cues%252C%2520ignoring%2520the%2520fundamental%2520reality%2520that%2520robot-world%2520interactions%2520are%2520inherently%25204D%2520spatiotemporal%2520events%2520that%2520require%2520precise%2520interactive%2520modeling.%2520To%2520r {"title": "A Survey of Mamba", "author": "Haohao Qu and Liangbo Ning and Rui An and Wenqi Fan and Tyler Derr and Hui Liu and Xin Xu and Qing Li", "abstract": "As one of the most representative DL techniques, Transformer architecture has empowered numerous advanced models, especially the large language models (LLMs) that comprise billions of parameters, becoming a cornerstone in deep learning. Despite the impressive achievements, Transformers still face inherent limitations, particularly the time-consuming inference resulting from the quadratic computation complexity of attention calculation. Recently, a novel architecture named Mamba, drawing inspiration from classical state space models (SSMs), has emerged as a promising alternative for building foundation models, delivering comparable modeling abilities to Transformers while preserving near-linear scalability concerning sequence length. This has sparked an increasing number of studies actively exploring Mamba's potential to achieve impressive performance across diverse domains. Given such rapid evolution, there is a critical need for a systematic review that consolidates existing Mamba-empowered models, offering a comprehensive understanding of this emerging model architecture. In this survey, we therefore conduct an in-depth investigation of recent Mamba-associated studies, covering three main aspects: the advancements of Mamba-based models, the techniques of adapting Mamba to diverse data, and the applications where Mamba can excel. Specifically, we first review the foundational knowledge of various representative deep learning models and the details of Mamba-1&2 as preliminaries. Then, to showcase the significance of Mamba for AI, we comprehensively review the related studies focusing on Mamba models' architecture design, data adaptability, and applications. Finally, we present a discussion of current limitations and explore various promising research directions to provide deeper insights for future investigations.", "link": "http://arxiv.org/abs/2408.01129v7", "date": "2026-03-17", "relevancy": 2.5288, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5068}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5068}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5037}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Survey%20of%20Mamba&body=Title%3A%20A%20Survey%20of%20Mamba%0AAuthor%3A%20Haohao%20Qu%20and%20Liangbo%20Ning%20and%20Rui%20An%20and%20Wenqi%20Fan%20and%20Tyler%20Derr%20and%20Hui%20Liu%20and%20Xin%20Xu%20and%20Qing%20Li%0AAbstract%3A%20As%20one%20of%20the%20most%20representative%20DL%20techniques%2C%20Transformer%20architecture%20has%20empowered%20numerous%20advanced%20models%2C%20especially%20the%20large%20language%20models%20%28LLMs%29%20that%20comprise%20billions%20of%20parameters%2C%20becoming%20a%20cornerstone%20in%20deep%20learning.%20Despite%20the%20impressive%20achievements%2C%20Transformers%20still%20face%20inherent%20limitations%2C%20particularly%20the%20time-consuming%20inference%20resulting%20from%20the%20quadratic%20computation%20complexity%20of%20attention%20calculation.%20Recently%2C%20a%20novel%20architecture%20named%20Mamba%2C%20drawing%20inspiration%20from%20classical%20state%20space%20models%20%28SSMs%29%2C%20has%20emerged%20as%20a%20promising%20alternative%20for%20building%20foundation%20models%2C%20delivering%20comparable%20modeling%20abilities%20to%20Transformers%20while%20preserving%20near-linear%20scalability%20concerning%20sequence%20length.%20This%20has%20sparked%20an%20increasing%20number%20of%20studies%20actively%20exploring%20Mamba%27s%20potential%20to%20achieve%20impressive%20performance%20across%20diverse%20domains.%20Given%20such%20rapid%20evolution%2C%20there%20is%20a%20critical%20need%20for%20a%20systematic%20review%20that%20consolidates%20existing%20Mamba-empowered%20models%2C%20offering%20a%20comprehensive%20understanding%20of%20this%20emerging%20model%20architecture.%20In%20this%20survey%2C%20we%20therefore%20conduct%20an%20in-depth%20investigation%20of%20recent%20Mamba-associated%20studies%2C%20covering%20three%20main%20aspects%3A%20the%20advancements%20of%20Mamba-based%20models%2C%20the%20techniques%20of%20adapting%20Mamba%20to%20diverse%20data%2C%20and%20the%20applications%20where%20Mamba%20can%20excel.%20Specifically%2C%20we%20first%20review%20the%20foundational%20knowledge%20of%20various%20representative%20deep%20learning%20models%20and%20the%20details%20of%20Mamba-1%262%20as%20preliminaries.%20Then%2C%20to%20showcase%20the%20significance%20of%20Mamba%20for%20AI%2C%20we%20comprehensively%20review%20the%20related%20studies%20focusing%20on%20Mamba%20models%27%20architecture%20design%2C%20data%20adaptability%2C%20and%20applications.%20Finally%2C%20we%20present%20a%20discussion%20of%20current%20limitations%20and%20explore%20various%20promising%20research%20directions%20to%20provide%20deeper%20insights%20for%20future%20investigations.%0ALink%3A%20http%3A//arxiv.org/abs/2408.01129v7%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Survey%2520of%2520Mamba%26entry.906535625%3DHaohao%2520Qu%2520and%2520Liangbo%2520Ning%2520and%2520Rui%2520An%2520and%2520Wenqi%2520Fan%2520and%2520Tyler%2520Derr%2520and%2520Hui%2520Liu%2520and%2520Xin%2520Xu%2520and%2520Qing%2520Li%26entry.1292438233%3DAs%2520one%2520of%2520the%2520most%2520representative%2520DL%2520techniques%252C%2520Transformer%2520architecture%2520has%2520empowered%2520numerous%2520advanced%2520models%252C%2520especially%2520the%2520large%2520language%2520models%2520%2528LLMs%2529%2520that%2520comprise%2520billions% {"title": "3D Fourier-based Global Feature Extraction for Hyperspectral Image Classification", "author": "Muhammad Ahmad", "abstract": "Hyperspectral image classification (HSIC) has been significantly advanced by deep learning methods that exploit rich spatial-spectral correlations. However, existing approaches still face fundamental limitations: transformer-based models suffer from poor scalability due to the quadratic complexity of self-attention, while recent Fourier transform-based methods typically rely on 2D spatial FFTs and largely ignore critical inter-band spectral dependencies inherent to hyperspectral data. To address these challenges, we propose Hybrid GFNet (HGFNet), a novel architecture that integrates localized 3D convolutional feature extraction with frequency-domain global filtering via GFNet-style blocks for efficient and robust spatial-spectral representation learning. HGFNet introduces three complementary frequency transforms tailored to hyperspectral imagery: Spectral Fourier Transform (a 1D FFT along the spectral axis), Spatial Fourier Transform (a 2D FFT over spatial dimensions), and Spatial-Spatial Fourier Transform (a 3D FFT jointly over spectral and spatial dimensions), enabling comprehensive and high-dimensional frequency modeling. The 3D convolutional layers capture fine-grained local spatial-spectral structures, while the Fourier-based global filtering modules efficiently model long-range dependencies and suppress noise. To further mitigate the severe class imbalance commonly observed in HSIC, HGFNet incorporates an Adaptive Focal Loss (AFL) that dynamically adjusts class-wise focusing and weighting, improving discrimination for underrepresented classes.", "link": "http://arxiv.org/abs/2603.16426v1", "date": "2026-03-17", "relevancy": 2.517, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5239}, {"tit 29%2C%20enabling%20comprehensive%20and%20high-dimensional%20frequency%20modeling.%20The%203D%20convolutional%20layers%20capture%20fine-grained%20local%20spatial-spectral%20structures%2C%20while%20the%20Fourier-based%20global%20filtering%20modules%20efficiently%20model%20long-range%20dependencies%20and%20suppress%20noise.%20To%20further%20mitigate%20the%20severe%20class%20imbalance%20commonly%20observed%20in%20HSIC%2C%20HGFNet%20incorporates%20an%20Adaptive%20Focal%20Loss%20%28AFL%29%20that%20dynamically%20adjusts%20class-wise%20focusing%20and%20weighting%2C%20improving%20discrimination%20for%20underrepresented%20classes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16426v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3D%2520Fourier-based%2520Global%2520Feature%2520Extraction%2520for%2520Hyperspectral%2520Image%2520Classification%26entry.906535625%3DMuhammad%2520Ahmad%26entry.1292438233%3DHyperspectral%2520image%2520classification%2520%2528HSIC%2529%2520has%2520been%2520significantly%2520advanced%2520by%2520deep%2520learning%2520methods%2520that%2520exploit%2520rich%2520spatial-spectral%2520correlations.%2520However%252C%2520existing%2520approaches%2520still%2520face%2520fundamental%2520limitations%253A%2520transformer-based%2520models%2520suffer%2520from%2520poor%2520scalability%2520due%2520to%2520the%2520quadratic%2520complexity%2520of%2520self-attention%252C%2520while%2520recent%2520Fourier%2520transform-based%2520methods%2520typically%2520rely%2520on%25202D%2520spatial%2520FFTs%2520and%2520largely%2520ignore%2520critical%2520inter-band%2520spectral%2520dependencies%2520inherent%2520to%2520hyperspectral%2520data.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520Hybrid%2520GFNet%2520%2528HGFNet%2529%252C%2520a%2520novel%2520architecture%2520that%2520integrates%2520localized%25203D%2520convolutional%2520feature%2520extraction%2520with%2520frequency-domain%2520 {"title": "On Geometric Understanding and Learned Priors in Feed-forward 3D Reconstruction Models", "author": "Jelena Bratuli\u0107 and Sudhanshu Mittal and Thomas Brox and Christian Rupprecht", "abstract": "Feed-forward 3D reconstruction models such as DUSt3R, VGGT, and Depth Anything 3 (DA3) are transformer-based foundation models that infer camera geometry and dense scene structure in a single forward pass. Trained at scale in a supervised fashion, they raise a central question: do these models build upon geometric principles akin to traditional multi-view pipelines, or do they primarily rely on learned priors arising from the large-scale training setup? We find that epipolar geometry emerges within the intermediate layers of all three models and is causally linked to correspondence patterns in attention heads. To study this, we perform a systematic analysis of their internal representations across three real-world datasets and a controlled synthetic dataset. We quantify geometric understanding by probing intermediate features, analyzing attention patterns to identify correspondence matching patterns, and performing targeted interventions at the attention level. Further, we assess the role of learned priors by applying challenging input-level perturbations, such as occlusions, scene ambiguities, and varying camera configurations, and compare them against classical multi-stage reconstruction pipelines.", "link": "http://arxiv.org/abs/2512.11508v2", "date": "2026-03-17", "relevancy": 2.4963, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6311}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6311}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20Geometric%20Understanding%20and%20Learned%20Priors%20in%20Feed-forward%203D%20Reconstruction%20Models&body=Title%3A%20On%20Geometric%20Understanding%20and%20Learned%20Priors%20in%20Feed-forward%203D%20Reconstruction%20Models%0AAuthor%3A%20Jelena%20Bratuli%C4%87%20and%20Sudhanshu%20Mittal%20and%20Thomas%20Brox%20and%20Christian%20Rupprecht%0AAbstract%3A%20Feed-forward%203D%20reconstruction%20models%20such%20as%20DUSt3R%2C%20VGGT%2C%20and%20Depth%20Anything%203%20%28DA3%29%20are%20transformer-based%20foundation%20models%20that%20infer%20camera%20geometry%20and%20dense%20scene%20structure%20in%20a%20single%20forward%20pass.%20Trained%20at%20scale%20in%20a%20supervised%20fashion%2C%20they%20raise%20a%20central%20question%3A%20do%20these%20models%20build%20upon%20geometric%20principles%20akin%20to%20traditional%20multi-view%20pipelines%2C%20or%20do%20they%20primarily%20rely%20on%20learned%20priors%20arising%20from%20the%20large-scale%20training%20setup%3F%20We%20find%20that%20epipolar%20geometry%20emerges%20within%20the%20intermediate%20layers%20of%20all%20three%20models%20and%20is%20causally%20linked%20to%20correspondence%20patterns%20in%20attention%20heads.%20To%20study%20this%2C%20we%20perform%20a%20systematic%20analysis%20of%20their%20internal%20representations%20across%20three%20real-world%20datasets%20and%20a%20controlled%20synthetic%20dataset.%20We%20quantify%20geometric%20understanding%20by%20probing%20intermediate%20features%2C%20analyzing%20attention%20patterns%20to%20identify%20correspondence%20matching%20patterns%2C%20and%20performing%20targeted%20interventions%20at%20the%20attention%20level.%20Further%2C%20we%20assess%20the%20role%20of%20learned%20priors%20by%20applying%20challenging%20input-level%20perturbations%2C%20such%20as%20occlusions%2C%20scene%20ambiguities%2C%20and%20varying%20camera%20configurations%2C%20and%20compare%20them%20against%20classical%20multi-stage%20reconstruction%20pipelines.%0ALink%3A%20http%3A//arxiv.org/abs/2512.11508v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520Geometric%2520Understanding%2520and%2520Learned%2520Priors%2520in%2520Feed-forward%25203D%2520Reconstruction%2520Models%26entry.906535625%3DJelena%2520Bratuli%25C4%2587%2520and%2520Sudhanshu%2520Mittal%2520and%2520Thomas%2520Brox%2520and%2520Christian%2520Rupprecht%26entry.1292438233%3DFeed-forward%25203D%2520reconstruction%2520models%2520such%2520as%2520DUSt3R%252C%2520VGGT%252C%2520and%2520Depth%2520Anything%25203%2520%2528DA3%2529%2520are%2520transformer-based%2520foundation%2520models%2520that%2520infer%2520camera%2520geometry%2520and%2520dense%2520scene%2520structure%2520in%2520a%2520single%2520forward%2520pass.%2520Trained%2520at%2520scale%2520in%2520a%2520supervised%2520fashion%252C%2520they%2520raise%2520a%2520central%2520question%253A%2520do%2520these%2520models%2520build%2520upon%2520geometric%2520principles%2520akin%2520to%2520traditional%2520multi-view%2520pipelines%252C%2520or%2520do%2520they%2520primarily%2520rely%2520on%2520learned%2520priors%2520arising%2520from%2520the%2520large-scale%2520training%2520setup%253F%2520We%2520find%2520that%2520epipolar%2520geometry%2520emerges%2520within%2520the%2520intermediate%2520layers%2520of%2520all%2520three%2520models%2520and%2520is%2520causally%2520linked%2520to%2520correspondence%2520patterns%2520in%2520attention%2520heads.%2520To%2520study%2520this%252C%2520we%2520perform%2520a%2520systematic%2520analysis%2520of%2520their%2520internal%2520representations%2520across%2520three%2520real-world%2520datasets%2520and%2520a%2520controlled%2520synthetic%2520dataset.%2520We%2520quantify%2520geometric%2520understanding%2520by%2520probing%2520intermediate%2520features%252C%2520analyzing%2520attention%2520patterns%2520to%2520identify%2520correspondence%2520matching%2520patterns%252C%2520and%2520performing%2520targeted%2520interventions%2520at%2520the%2520attention%2520level.%2520Further%252C%2520we%2520assess%2520the%2520role%2520of%2520learned%2520priors%2520by%2520applying%2520challenging%2520input-level%2520perturbations%252C%2520such%2520as%2520occlusions%252C%2520scene%2520ambiguities%252C%2520and%2520varying%2520camera%2520configurations%252C%2520and%2520compare%2520them%2520against%2520classical%2520multi-stage%2520reconstruction%2520pipelines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.11508v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=On%20Geometric%20Understanding%20and%20Learned%20Priors%20in%20Feed-forward%203D%20Reconstruction%20Models&entry.906535625=Jelena%20Bratuli%C4%87%20and%20Sudhanshu%20Mittal%20and%20Thomas%20Brox%20and%20Christian%20Rupprecht&entry.1292438233=Feed-forward%203D%20reconstruction%20models%20such%20as%20DUSt3R%2C%20VGGT%2C%20and%20Depth%20Anything%203%20%28DA3%29%20are%20transformer-based%20foundation%20models%20that%20infer%20camera%20geometry%20and%20dense%20scene%20structure%20in%20a%20single%20forward%20pass.%20Trained%20at%20scale%20in%20a%20supervised%20fashion%2C%20they%20raise%20a%20central%20question%3A%20do%20these%20models%20build%20upon%20geometric%20principles%20akin%20to%20traditional%20multi-view%20pipelines%2C%20or%20do%20they%20primarily%20rely%20on%20learned%20priors%20arising%20from%20the%20large-scale%20training%20setup%3F%20We%20find%20that%20epipolar%20geometry%20emerges%20within%20the%20intermediate%20layers%20of%20all%20three%20models%20and%20is%20causally%20linked%20to%20correspondence%20patterns%20in%20attention%20heads.%20To%20study%20this%2C%20we%20perform%20a%20systematic%20analysis%20of%20their%20internal%20representations%20across%20three%20real-world%20datasets%20and%20a%20controlled%20synthetic%20dataset.%20We%20quantify%20geometric%20understanding%20by%20probing%20intermediate%20features%2C%20analyzing%20attention%20patterns%20to%20identify%20correspondence%20matching%20patterns%2C%20and%20performing%20targeted%20interventions%20at%20the%20attention%20level.%20Further%2C%20we%20assess%20the%20role%20of%20learned%20priors%20by%20applying%20challenging%20input-level%20perturbations%2C%20such%20as%20occlusions%2C%20scene%20ambiguities%2C%20and%20varying%20camera%20configurations%2C%20and%20compare%20them%20against%20classical%20multi-stage%20reconstruction%20pipelines.&entry.1838667208=http%3A//arxiv.org/abs/2512.11508v2&entry.124074799=Read"},
{"title": "Think3D: Thinking with Space for Spatial Reasoning", "author": "Zaibin Zhang and Yuhan Wu and Lianjie Jia and Yifan Wang and Zhongbo Zhang and Yijiang Li and Binghao Ran and Fuxi Zhang and Zhuohan Sun and Zhenfei Yin and Lijun Wang and Huchuan Lu", "abstract": "While contemporary Vision-Language Models (VLMs) excel at 2D visual understanding, they remain constrained by a passive, 2D-centric paradigm that severely limits genuine 3D spatial reasoning. To bridge this gap, we introduce Think3D, a novel framework that equips VLM agents with interactive, 3D chain-of-thought reasoning capabilities. By integrating a suite of 3D manipulation tools, Think3D transforms passive perception into active spatial exploration, closely mirroring human geometric reasoning. We demonstrate that Think3D acts as a highly effective zero-shot plug-in for state-of-the-art closed-source models (e.g., GPT-4.1, Gemini 2.5 Pro), yielding absolute performance gains of +7.8% on BLINK Multi-view and MindCube, and +4.7% on VSI-Bench. Furthermore, to optimize tool-use in smaller open-weight models, we propose Think3D-RL, a reinforcement learning paradigm designed to autonomously learn spatial exploration strategies. When applied to Qwen3-VL-4B, Think3D-RL amplifies the performance gain from a marginal +0.7% to a substantial +10.7%. Notably, this RL formulation induces an exploration policy that qualitatively aligns with the sophisticated behavior of much larger models, entirely circumventing the need for costly operation-trajectory annotations. Ultimately, Think3D establishes tool-augmented active exploration as an effective paradigm for unlocking human-like 3D reasoning in multimodal agents. Code, models, and data are available at https://github.com/zhangzaibin/spagent.", "link": "http://arxiv.org/abs/2601.13029v3", "date": "2026-03-17", "relevancy": 2.4949, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6286}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6286}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5993}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think3D%3A%20Thinking%20with%20Space%20for%20Spatial%20Reasoning&body=Title%3A%20Think3D%3A%20Thinking%20with%20Space%20for%20Spatial%20Reasoning%0AAuthor%3A%20Zaibin%20Zhang%20and%20Yuhan%20Wu%20and%20Lianjie%20Jia%20and%20Yifan%20Wang%20and%20Zhongbo%20Zhang%20and%20Yijiang%20Li%20and%20Binghao%20Ran%20and%20Fuxi%20Zhang%20and%20Zhuohan%20Sun%20and%20Zhenfei%20Yin%20and%20Lijun%20Wang%20and%20Huchuan%20Lu%0AAbstract%3A%20While%20contemporary%20Vision-Language%20Models%20%28VLMs%29%20excel%20at%202D%20visual%20understanding%2C%20they%20remain%20constrained%20by%20a%20passive%2C%202D-centric%20paradigm%20that%20severely%20limits%20genuine%203D%20spatial%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20introduce%20Think3D%2C%20a%20novel%20framework%20that%20equips%20VLM%20agents%20with%20interactive%2C%203D%20chain-of-thought%20reasoning%20capabilities.%20By%20integrating%20a%20suite%20of%203D%20manipulation%20tools%2C%20Think3D%20transforms%20passive%20perception%20into%20active%20spatial%20exploration%2C%20closely%20mirroring%20human%20geometric%20reasoning.%20We%20demonstrate%20that%20Think3D%20acts%20as%20a%20highly%20effective%20zero-shot%20plug-in%20for%20state-of-the-art%20closed-source%20models%20%28e.g.%2C%20GPT-4.1%2C%20Gemini%202.5%20Pro%29%2C%20yielding%20absolute%20performance%20gains%20of%20%2B7.8%25%20on%20BLINK%20Multi-view%20and%20MindCube%2C%20and%20%2B4.7%25%20on%20VSI-Bench.%20Furthermore%2C%20to%20optimize%20tool-use%20in%20smaller%20open-weight%20models%2C%20we%20propose%20Think3D-RL%2C%20a%20reinforcement%20learning%20paradigm%20designed%2 {"title": "Decoding the Critique Mechanism in Large Reasoning Models", "author": "Hoang Phan and Quang H. Nguyen and Hung T. Q. Le and Xiusi Chen and Heng Ji and Khoa D. Doan", "abstract": "Large Reasoning Models (LRMs) exhibit backtracking and self-verification mechanisms that enable them to revise intermediate steps and reach correct solutions, yielding strong performance on complex logical benchmarks. We hypothesize that such behaviors are beneficial only when the model has sufficiently strong \"critique\" ability to detect its own mistakes. This work systematically investigates how current LRMs recover from errors by inserting arithmetic mistakes in their intermediate reasoning steps. Notably, we discover a peculiar yet important phenomenon: despite the error propagating through the chain-of-thought (CoT), resulting in an incorrect intermediate conclusion, the model still reaches the correct final answer. This recovery implies that the model must possess an internal mechanism to detect errors and trigger self-correction, which we refer to as the hidden critique ability. Building on feature space analysis, we identify a highly interpretable critique vector representing this behavior. Extensive experiments across multiple model scales and families demonstrate that steering latent representations with this vector improves the model's error detection capability and enhances the performance of test-time scaling at no extra training cost. Our findings provide a valuable understanding of LRMs' critique behavior, suggesting a promising direction to control and improve their self-verification mechanism. Our code is available at https://github.com/mail-research/lrm-critique-vectors.", "link": "http://arxiv.org/abs/2603.16331v1", "date": "2026-03-17", "relevancy": 2.4892, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5153}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5153}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4629}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoding%20the%20Critique%20Mechanism%20in%20Large%20Reasoning%20Models&body=Title%3A%20Decoding%20the%20Critique%20Mechanism%20in%20Large%20Reasoning%20Models%0AAuthor%3A%20Hoang%20Phan%20and%20Quang%20H.%20Nguyen%20and%20Hung%20T.%20Q.%20Le%20and%20Xiusi%20Chen%20and%20Heng%20Ji%20and%20Khoa%20D.%20Doan%0AAbstract%3A%20Large%20Reasoning%20Models%20%28LRMs%29%20exhibit%20backtracking%20and%20self-verification%20mechanisms%20that%20enable%20them%20to%20revise%20intermediate%20steps%20and%20reach%20correct%20solutions%2C%20yielding%20strong%20performance%20on%20complex%20logical%20benchmarks.%20We%20hypothesize%20that%20such%20behaviors%20are%20beneficial%20only%20when%20the%20model%20has%20sufficiently%20strong%20%22critique%22%20ability%20to%20detect%20its%20own%20mistakes.%20This%20work%20systematically%20investigates%20how%20current%20LRMs%20recover%20from%20errors%20by%20inserting%20arithmetic%20mistakes%20in%20their%20intermediate%20reasoning%20steps.%20Notably%2C%20we%20discover%20a%20peculiar%20yet%20important%20phenomenon%3A%20despite%20the%20error%20propagating%20through%20the%20chain-of-thought%20%28CoT%29%2C%20resulting%20in%20an%20incorrect%20intermediate%20conclusion%2C%20the%20model%20still%20reaches%20the%20correct%20final%20answer.%20This%20recovery%20implies%20that%20the%20model%20must%20possess%20an%20internal%20mechanism%20to%20detect%20errors%20and%20trigger%20self-correction%2C%20which%20we%20refer%20to%20as%20the%20hidden%20critique%20ability.%20Building%20on%20feature%20space%20analysis%2C%20we%20identify%20a%20highly%20interpretable%20critique%20vector%20representing%20this%20behavior.%20Extensive%20experiments%20across%20multiple%20model%20scales%20and%20families%20demonstrate%20that%20steering%20latent%20representations%20with%20this%20vector%20improves%20the%20model%27s%20error%20detection%20capability%20and%20enhances%20the%20performance%20of%20test-time%20scaling%20at%20no%20extra%20training%20cost.%20Our%20findings%20provide%20a%20valuable%20understanding%20of%20LRMs%27%20critique%20behavior%2C%20suggesting%20a%20promising%20direction%20to%20control%20and%20improve%20their%20self-verification%20mechanism.%20Our%20code%20is%20available%20at%20https%3A//github.com/mail-research/lrm-critique-vectors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16331v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoding%2520the%2520Critique%2520Mechanism%2520in%2520Large%2520Reasoning%2520Models%26entry.906535625%3DHoang%2520Phan%2520and%2520Quang%2520H.%2520Nguyen%2520and%2520Hung%2520T.%2520Q.%2520Le%2520and%2520Xiusi%2520Chen%2520and%2520Heng%2520Ji%2520and%2520Khoa%2520D.%2520Doan%26entry.1292438233%3DLarge%2520Reasoning%2520Models%2520%2528LRMs%2529%2520exhibit%2520backtracking%2520and%2520self-verification%2520mechanisms%2520that%2520enable%2520them%2520to%2520revise%2520intermediate%2520steps%2520and%2520reach%2520correct%2520solutions%252C%2520yielding%2520strong%2520performance%2520on%2520complex%2520logical%2520benchmarks.%2520We%2520hypothesize%2520that%2520such%2520behaviors%2520are%2520beneficial%2520only%2520when%2520the%2520model%2520has%2520sufficiently%2520strong%2520%2522critique%2522%2520ability%2520to%2520detect%2520its%2520own%2520mistakes.%2520This%2520work%2520systematically%2520investigates%2520how%2520current%2520LRMs%2520recover%2520from%2520errors%2520by%2520inserting%2520arithmetic%2520mistakes%2520in%2520their%2520intermediate%2520reasoning%2520steps.%2520Notably%252C%2520we%2520discover%2520a%2520peculiar%2520yet%2520important%2520phenomenon%253A%2520despite%2520the%2520error%2520propagating%2520through%2520the%2520chain-of-thought%2520%2528CoT%2529%252C%2520resulting%2520in%2520an%2520incorrect%2520intermediate%2520conclusion%252C%2520the%2520model%2520still%2520reaches%2520the%2520correct%2520final%2520answer.%2520This%2520recovery%2520implies%2520that%2520the%2520model%2520must%2520possess%2520an%2520internal%2520mechanism%2520to%2520detect%2520errors%2520and%2520trigger%2520self-correction%252C%2520which%2520we%2520refer%2520to%2520as%2520the%2520hidden%2520critique%2520ability.%2520Building%2520on%2520feature%2520space%2520analysis%252C%2520we%2520identify%2520a%2520highly%2520interpretable%2520critique%2520vector%2520representing%2520this%2520behavior.%2520Extensive%2520experiments%2520across%2520multiple%2520model%2520scales%2520and%2520families%2520demonstrate%2520that%2520steering%2520latent%2520representations%2520with%2520this%2520vector%2520improves%2520the%2520model%2527s%2520error%2520detection%2520capability%2520and%2520enhances%2520the%2520performance%2520of%2520test-time%2520scaling%2520at%2520no%2520extra%2520training%2520cost.%2520Our%2520findings%2520provide%2520a%2520valuable%2520understanding%2520of%2520LRMs%2527%2520critique%2520behavior%252C%2520suggesting%2520a%2520promising%2520direction%2520to%2520control%2520and%2520improve%2520their%2520self-verification%2520mechanism.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/mail-research/lrm-critique-vectors.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16331v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Decoding%20the%20Critique%20Mechanism%20in%20Large%20Reasoning%20Models&entry.906535625=Hoang%20Phan%20and%20Quang%20H.%20Nguyen%20and%20Hung%20T.%20Q.%20Le%20and%20Xiusi%20Chen%20and%20Heng%20Ji%20and%20Khoa%20D.%20Doan&entry.1292438233=Large%20Reasoning%20Models%20%28LRMs%29%20exhibit%20backtracking%20and%20self-v {"title": "When and Why Does Unsupervised RL Succeed in Mathematical Reasoning? A Manifold Envelopment Perspective", "author": "Zelin Zhang and Fei Cheng and Chenhui Chu", "abstract": "Although outcome-based reinforcement learning (RL) significantly advances the mathematical reasoning capabilities of Large Language Models (LLMs), its reliance on computationally expensive ground-truth annotations imposes a severe scalability bottleneck. Unsupervised RL guided by intrinsic rewards offers a scalable alternative, yet it suffers from opaque training dynamics and catastrophic instability, such as policy collapse and reward hacking. In this paper, we first design and evaluate a suite of intrinsic rewards that explicitly enforce concise and certain generation. Second, to discover the boundaries of this approach, we test base models across a spectrum of intrinsic reasoning capabilities, revealing how a model's foundational logical prior dictates its success or failure. Finally, to demystify why certain configurations stabilize while others collapse, we introduce a novel geometric diagnostic lens, showing that successful cases are enveloped by manifolds. Ultimately, our work goes beyond merely demonstrating that enforcing concise and certain responses successfully boosts mathematical reasoning; we reveal when this unsupervised approach breaks down and geometrically diagnose why.", "link": "http://arxiv.org/abs/2603.16578v1", "date": "2026-03-17", "relevancy": 2.4873, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4996}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4996}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20and%20Why%20Does%20Unsupervised%20RL%20Succeed%20in%20Mathematical%20Reasoning%3F%20A%20Manifold%20Envelopment%20Perspective&body=Title%3A%20When%20and%20Why%20Does%20Unsupervised%20RL%20Succeed%20in%20Mathematical%20Reasoning%3F%20A%20Manifold%20Envelopment%20Perspective%0AAuthor%3A%20Zelin%20Zhang%20and%20Fei%20Cheng%20and%20Chenhui%20Chu%0AAbstract%3A%20Although%20outcome-based%20reinforcement%20learning%20%28RL%29%20significantly%20advances%20the%20mathematical%20reasoning%20capabilities%20of%20Large%20Language%20Models%20%28LLMs%29%2C%20its%20reliance%20on%20computationally%20expensive%20ground-truth%20annotations%20imposes%20a%20severe%20scalability%20bottleneck.%20Unsupervised%20RL%20guided%20by%20intrinsic%20rewards%20offers%20a%20scalable%20alternative%2C%20yet%20it%20suffers%20from%20opaque%20training%20dynamics%20and%20catastrophic%20instability%2C%20such%20as%20policy%20collapse%20and%20reward%20hacking.%20In%20this%20paper%2C%20we%20first%20design%20and%20evaluate%20a%20suite%20of%20intrinsic%20rewards%20that%20explicitly%20enforce%20concise%20and%20certain%20generation.%20Second%2C%20to%20discover%20the%20boundaries%20of%20this%20approach%2C%20we%20test%20base%20models%20across%20a%20spectrum%20of%20intrinsic%20reasoning%20capabilities%2C%20revealing%20how%20a%20model%27s%20foundational%20logical%20prior%20dictates%20its%20success%20or%20failure.%20Finally%2C%20to%20demystify%20why%20certain%20configurations%20stabilize%20while%20others%20collapse%2C%20we%20introduce%20a%20novel%20geometric%20diagnostic%20lens%2C%20showing%20that%20successful%20cases%20are%20enveloped%20by%20manifolds.%20Ultimately%2C%20our%20work%20goes%20beyond%20merely%20demonstrating%20that%20enforcing%20concise%20and%20certain%20responses%20successfully%20boosts%20mathematical%20reasoning%3B%20we%20reveal%20when%20this%20unsupervised%20approach%20breaks%20down%20and%20geometrically%20diagnose%20why.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16578v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520and%2520Why%2520Does%2520Unsupervised%2520RL%2520Succeed%2520in%2520Mathematical%2520Reasoning%253F%2520A%2520Manifold%2520Envelopment%2520Perspective%26entry.906535625%3DZelin%2520Zhang%2520and%2520Fei%2520Cheng%2520and%2520Chenhui%2520Chu%26entry.1292438233%3DAlthough%2520outcome-based%2520reinforcement%2520learning%2520%2528RL%2529%2520significantly%2520advances%2520the%2520mathematical%2520reasoning%2520capabilities%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520its%2520reliance%2520on%2520computationally%2520expensive%2520ground-truth%2520annotations%2520imposes%2520a%2520severe%2520scalability%2520bottleneck.%2520Unsupervised%2520RL%2520guided%2520by%2520intrinsic%2520rewards%2520offers%2520a%2520scalable%2520alternative%252C%2520yet%2520it%2520suffers%2520from%2520opaque%2520training%2520dynamics%2520and%2520catastrophic%2520instability%252C%2520such%2520as%2520policy%2520collapse%2520and%2520reward%2520hacking.%2520In%2520this%2520paper%252C%2520we%2520first%2520design%2520and%2520evaluate%2520a%2520suite%2520of%2520intrinsic%2520rewards%2520that%2520explicitly%2520enforce%2520concise%2520and%2520certain%2520generation.%2520Second%252C%2520to%2520discover%2520the%2520boundaries%2520of%2520this%2520approach%252C%2520we%2520test%2520base%2520models%2520across%2520a%2520spectrum%2520of%2520intrinsic%2520reasoning%2520capabilities%252C%2520revealing%2520how%2520a%2520model%2527s%2520foundational%2520logical%2520prior%2520dictates%2520its%2520success%2520or%2520failure.%2520Finally%252C%2520to%2520demystify%2520why%2520certain%2520configurations%2520stabilize%2520while%2520others%2520collapse%252C%2520we%2520introduce%2520a%2520novel%2520geometric%2520diagnostic%2520lens%252C%2520showing%2520that%2520successful%2520cases%2520are%2520enveloped%2520by%2520manifolds.%2520Ultimately%252C%2520our%2520work%2520goes%2520beyond%2520merely%2520demonstrating%2520that%2520enforcing%2520concise%2520and%2520certain%2520responses%2520successfully%2520boosts%2520mathematical%2520reasoning%253B%2520we%2520reveal%2520when%2520this%2520unsupervised%2520approach%2520breaks%2520down%2520and%2520geometrically%2520diagnose%2520why.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16578v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20and%20Why%20Does%20Unsupervised%20RL%20Succeed%20in%20Mathematical%20Reasoning%3F%20A%20Manifold%20Envelopment%20Perspective&entry.906535625=Zelin%20Zhang%20and%20Fei%20Cheng%20and%20Chenhui%20Chu&entry.1292438233=Although%20outcome-based%20reinforcement%20learning%20%28RL%29%20significantly%20advances%20the%20mathematical%20reasoning%20capabilities%20of%20Large%20Language%20Models%20%28LLMs%29%2C%20its%20reliance%20on%20computationally%20expensive%20ground-truth%20annotations%20imposes%20a%20severe%20scalability%20bottleneck.%20Unsupervised%20RL%20guided%20by%20intrinsic%20rewards%20offers%20a%20scalable%20alternative%2C%20yet%20it%20suffers%20from%20opaque%20training%20dynamics%20and%20catastrophic%20instability%2C%20such%20as%20policy%20collapse%20and%20reward%20hacking.%20In%20this%20paper%2C%20we%20first%20design%20and%20evaluate%20a%20suite%20of%20intrinsic%20rewards%20that%20explicitly%20enforce%20concise%20and%20certain%20generation.%20Second%2C%20to%20discover%20the%20boundaries%20of%20this%20approach%2C%20we%20test%20base%20models%20across%20a%20spectrum%20of%20intrinsic%20reasoning%20capabilities%2C%20revealing%20how%20a%20model%27s%20foundational%20logical%20prior%20dictates%20its%20success%20or%20failure.%20Finally%2C%20to%20demystify%20why%20certain%20configurations%20stabilize%20while%20others%20collapse%2C%20we%20introduce%20a%20novel%20geometric%20diagnostic%20lens%2C%20showing%20that%20successful%20cases%20are%20enveloped%20by%20manifolds.%20Ultimately%2C%20our%20work%20goes%20beyond%20merely%20demonstrating%20that%20enforcing%20concise%20and%20certain%20responses%20successfully%20boosts%20mathematical%20reasoning%3B%20we%20reveal%20when%20this%20unsupervised%20approach%20breaks%20down%20and%20geometrically%20diagnose%20why.&entry.1838667208=http%3A//arxiv.org/abs/2603.16578v1&entry.124074799=Read"},
{"title": "VideoVerse: Does Your T2V Generator Have World Model Capability to Synthesize Videos?", "author": "Zeqing Wang and Xinyu Wei and Bairui Li and Zhen Guo and Jinrui Zhang and Hongyang Wei and Keze Wang and Lei Zhang", "abstract": "The recent rapid advancement of Text-to-Video (T2V) generation technologies are engaging the trained models with more world model ability, making the existing benchmarks increasingly insufficient to evaluate state-of-the-art T2V models. First, current evaluation dimensions, such as per-frame aesthetic quality and temporal consistency, are no longer able to differentiate state-of-the-art T2V models. Second, event-level temporal causality-an essential property that differentiates videos from other modalities-remains largely unexplored. Third, existing benchmarks lack a systematic assessment of world knowledge, which are essential capabilities for building world models. To address these issues, we introduce VideoVerse, a comprehensive benchmark focusing on evaluating whether the current T2V model could understand complex temporal causality and world knowledge to synthesize videos. We collect representative videos across diverse domains and extract their event-level descriptions with inherent temporal causality, which are then rewritten into text-to-video prompts by independent annotators. For each prompt, we design ten evaluation dimensions covering dynamic and static properties, resulting in 300 prompts, 815 events, and 793 evaluation questions. Consequently, a human preference-aligned QA-based evaluation pipeline is developed by using modern vision-language models to systematically benchmark leading open- and closed-source T2V systems, revealing the current gap between T2V models and desired world modeling abilities.", "link": "http://arxiv.org/abs/2510.08398v3", "date": "2026-03-17", "relevancy": 2.4795, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6448}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6161}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5964}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoVerse%3A%20Does%20Your%20T2V%20Generator%20Have%20World%20Model%20Capability%20to%20Synthesize%20Videos%3F&body=Title%3A%20VideoVerse%3A%20Does%20Your%20T2V%20Generator%20Have%20World%20Model%20Capability%20to%20Synthesize%20Videos%3F%0AAuthor%3A%20Zeqing%20Wang%20and%20Xinyu%20Wei%20and%20Bairui%20Li%20and%20Zhen%20Guo%20and%20Jinrui%20Zhang%20and%20Hongyang%20Wei%20and%20Keze%20Wang%20and%20Lei%20Zhang%0AAbstract%3A%20The%20recent%20rapid%20advancement%20of%20Text-to-Video%20%28T2V%29%20generation%20technologies%20are%20engaging%20the%20trained%20models%20with%20more%20world%20model%20ability%2C%20making%20the%20existing%20benchmarks%20increasingly%20insufficient%20to%20evaluate%20state-of-the-art%20T2V%20models.%20First%2C%20current%20evaluation%20dimensions%2C%20such%20as%20per-frame%20aesthetic%20quality%20and%20temporal%20consistency%2C%20are%20no%20longer%20able%20to%20differentiate%20state-of-the-art%20T2V%20models.%20Second%2C%20event-level%20temporal%20causality-an%20essential%20property%20that%20differentiates%20videos%20from%20other%20modalities-remains%20largely%20unexplored.%20Third%2C%20existing%20benchmarks%20lack%20a%20systematic%20assessment%20of%20world%20knowledge%2C%20which%20are%20essential%20capabilities%20for%20building%20world%20models.%20To%20address%20these%20issues%2C%20we%20introduce%20VideoVerse%2C%20a%20comprehensive%20benchmark%20focusing%20on%20evaluating%20whether%20the%20current%20T2V%20model%20could%20understand%20complex%20temporal%20causality%20and%20world%20knowledge%20to%20synthesize%20videos.%20We%20collect%20representative%20videos%20across%20diverse%20domains%20and%20extract%20their%20event-level%20descriptions%20with%20inherent%20temporal%20causality%2C%20which%20are%20then%20rewritten%20into%20text-to-video%20prompts%20by%20independent%20annotators.%20For%20each%20prompt%2C%20we%20design%20ten%20evaluation%20dimensions%20covering%20dynamic%20and%20static%20properties%2C%20resulting%20in%20300%20prompts%2C%20815%20events%2C%20and%20793%20evaluation%20questions.%20Consequently%2C%20a%20human%20preference-aligned%20QA-based%20evaluation%20pipeline%20is%20developed%20by%20using%20modern%20vision-language%20models%20to%20systematically%20benchmark%20leading%20open-%20and%20closed-source%20T2V%20systems%2C%20revealing%20the%20current%20gap%20between%20T2V%20models%20and%20desired%20world%20modeling%20abilities.%0ALink%3A%20http%3A//arxiv.org/abs/2510.08398v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoVerse%253A%2520Does%2520Your%2520T2V%2520Generator%2520Have%2520World%2520Model%2520Capability%2520to%2520Synthesize%2520Videos%253F%26entry.906535625%3DZeqing%2520Wang%2520and%2520Xinyu%2520Wei%2520and%2520Bairui%2520Li%2520and%2520Zhen%2520Guo%2520and%2520Jinrui%2520Zhang%2520and%2520Hongyang%2520Wei%2520and%2520Keze%2520Wang%2520and%2520Lei%2520Zhang%26entry.1292438233%3DThe%2520recent%2520rapid%2520advancement%2520of%2520Text-to-Video%2520%2528T2V%2529%2520generation%2520technologies%2520are%2520engaging%2520the%2520trained%2520models%2520with%2520more%2520world%2520model%2520ability%252C%2520making%2520the%2520existing%2520benchmarks%2520increasingly%2520insufficient%2520to%2520evaluate%2520state-of-the-art%2520T2V%2520models.%2520First%252C%2520current%2520evaluation%2520dimensions%252C%2520such%2520as%2520per-frame%2520aesthetic%2520quality%2520and%2520temporal%2520consistency%252C%2520are%2520no%2520longer%2520able%2520to%2520differentiate%2520state-o {"title": "drGT: Attention-Guided Gene Assessment of Drug Response Utilizing a Drug-Cell-Gene Heterogeneous Network", "author": "Yoshitaka Inoue and Hunmin Lee and Tianfan Fu and Rui Kuang and Augustin Luna", "abstract": "For translational impact, both accurate drug response prediction and biological plausibility of predictive features are needed. We present drGT, a heterogeneous graph deep learning model over drugs, genes, and cell lines that couples prediction with mechanism-oriented interpretability via attention coefficients (ACs).\n  We assess both predictive generalization (random, unseen-drug, unseen-cell, and zero-shot splits) and biological plausibility (use of text-mined PubMed gene-drug co-mentions and comparison to a structure-based DTI predictor) on GDSC, NCI60, and CTRP datasets. Across benchmarks, drGT consistently delivers top regression performance while maintaining competitive classification accuracy for drug sensitivity. Under random 5-fold cross-validation, drGT attains an AUROC of up to 0.945 (3rd overall) and an $R^2$ up to 0.690, outperforming all baselines on regression. In leave-one-out tests for unseen cell lines and drugs, drGT achieves AUROCs of 0.706 and 0.844, and $R^2$ values of 0.692 and 0.022, the only model yielding positive $R^2$ for unseen drugs. In zero-shot prediction, drGT achieves an AUROC of 0.786 and a regression $R^2$ of 0.334, both representing the highest scores among all models. For interpretability, AC-derived drug-gene links recover known biology: among 976 drugs with known DTIs, 36.9% of predicted links match established DTIs, and 63.7% are supported by either PubMed abstracts or a structure-based predictive model. Enrichment analyses of AC-prioritized genes reveal drug-perturbed biological processes, providing pathway-level explanations.\n  drGT advances predictive generalization and mechanism-centered interpretability, offering state-of-the-art regression accuracy and literature-supported biological hypotheses that {"title": "The Cost of Reasoning: Chain-of-Thought Induces Overconfidence in Vision-Language Models", "author": "Robert Welch and Emir Konuk and Kevin Smith", "abstract": "Vision-language models (VLMs) are increasingly deployed in high-stakes settings where reliable uncertainty quantification (UQ) is as important as predictive accuracy. Extended reasoning via chain-of-thought (CoT) prompting or reasoning-trained models has become ubiquitous in modern VLM pipelines, yet its effect on UQ reliability remains poorly understood. We show that reasoning consistently degrades the quality of most uncertainty estimates, even when it improves task accuracy. We identify implicit answer conditioning as the primary mechanism: as reasoning traces converge on a conclusion before the final answer is generated, token probabilities increasingly reflect consistency with the model's own reasoning trace rather than uncertainty about correctness. In effect, the model becomes overconfident in its answer. In contrast, agreement-based consistency remains robust and often improves under reasoning, making it a practical choice for uncertainty estimation in reasoning-enabled VLMs.", "link": "http://arxiv.org/abs/2603.16728v1", "date": "2026-03-17", "relevancy": 2.4695, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5083}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4867}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4867}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Cost%20of%20Reasoning%3A%20Chain-of-Thought%20Indu {"title": "Efficient Brood Cell Detection in Layer Trap Nests for Bees and Wasps: Balancing Labeling Effort and Species Coverage", "author": "Chenchang Liu and Felix Fornoff and Annika Grasreiner and Patrick Maeder and Henri Greil and Marco Seeland", "abstract": "Monitoring cavity-nesting wild bees and wasps is vital for biodiversity research and conservation. Layer trap nests (LTNs) are emerging as a valuable tool to study the abundance and species richness of these insects, offering insights into their nesting activities and ecological needs. However, manually evaluating LTNs to detect and classify brood cells is labor-intensive and time-consuming. To address this, we propose a deep learning based approach for efficient brood cell detection and classification in LTNs. LTNs present additional challenges due to densely packed brood cells, leading to a high labeling effort per image. Moreover, we observe a significant imbalance in class distribution, with common species having notably more occurrences than rare species. Comprehensive labeling of common species is time-consuming and exacerbates data imbalance, while partial labeling introduces data incompleteness which degrades model performance. To reduce labeling effort and mitigate the impact of unlabeled data, we introduce a novel Constrained False Positive Loss (CFPL) strategy. CFPL dynamically masks predictions from unlabeled data, preventing them from interfering with the classification loss during training. We evaluate our approach on a dataset of 712 LTN images collected over one season, covering 28 fine-grained classes describing the taxonomy and status of brood cells. To minimize labeling effort, we limit the training set to a maximum of 300 labels per class. Experimental results demonstrate that deep learning can be effectively used to detect brood cells in LTNs. Our CFPL method further improves performance and balances model accuracy and labeling effort while also mitigating class imbalance.", "link": "http://arxiv.org/abs/2603.16652v1", "date": "2026-03-17", "relevancy": 2.4499, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5005}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4899}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Brood%20Cell%20Detection%20in%20Layer%20Trap%20Nests%20for%20Bees%20and%20Wasps%3A%20Balancing%20Labeling%20Effort%20and%20Species%20Coverage&body=Title%3A%20Efficient%20Brood%20Cell%20Detection%20in%20Layer%20Trap%20Nests%20for%20Bees%20and%20Wasps%3A%20Balancing%20Labeling%20Effort%20and%20Species%20Coverage%0AAuthor%3A%20Chenchang%20Liu%20and%20Felix%20Fornoff%20and%20Annika%20Grasreiner%20and%20Patrick%20Maeder%20and%20Henri%20Greil%20and%20Marco%20Seeland%0AAbstract%3A%20Monitoring%20cavity-nesting%20wild%20bees%20and%20wasps%20is%20vital%20for%20biodiversity%20research%20and%20conservation.%20Layer%20trap%20nests%20%28LTNs%29%20are%20emerging%20as%20a%20valuable%20tool%20to%20study%20the%20abundance%20and%20species%20richness%20of%20these%20insects%2C%20offering%20insights%20into%20their%20nesting%20activities%20and%20ecological%20needs.%20However%2C%20manually%20evaluating%20LTNs%20to%20detect%20and%20classify%20brood%20cells%20is%20labor-intensive%20and%20time-consuming.%20To%20address%20this%2C%20we%20propose%20a%20deep%20learning%20based%20approach%20for%20efficient%20brood%20cell%20detection%20and%20classification%20in%20LTNs.%20LTNs%20present%20additional%20challenges%20due%20to%20densely%20packed%20brood%20cells%2C%20leading%20to%20a%20high%20labeling%20effort%20per%20image.%20Moreover%2C%20we%20observe%20a%20significant%20imbalance%20in%20class%20distribution%2C%20with%20common%20species%20having%20notably%20more%20occurrences%20than%20rare%20species.%20Comprehensive%20labeling%20of%20common%20species%20is%20time-consuming%20and%20exacerbates%20data%20imbalance%2C%20while%20partial%20labeling%20introduces%20data%20incompleteness%20which%20degrades%20model%20performance.%20To%20reduce%20labeling%20effort%20and%20mitigate%20the%20impact%20of%20unlabeled%20data%2C%20we%20introduce%20a%20novel%20Constrained%20False%20Positive%20Loss%20%28CFPL%29%20strategy.%20CFPL%20dynamically%20masks%20predictions%20from%20unlabeled%20data%2C%20preventing%20them%20from%20interfering%20with%20the%20classification%20loss%20during%20training.%20We%20evaluate%20our%20approach%20on%20a%20dataset%20of%20712%20LTN%20images%20collected%20over%20one%20season%2C%20covering%2028%20fine-grained%20classes%20describing%20the%20taxonomy%20and%20status%20of%20brood%20cells.%20To%20minimize%20labeling%20effort%2C%20we%20limit%20the%20training%20set%20to%20a%20maximum%20of%20300%20labels%20per%20class.%20Experimental%20results%20demonstrate%20that%20deep%20learning%20can%20be%20effectively%20used%20to%20detect%20brood%20cells%20in%20LTNs.%20Our%20CFPL%20method%20further%20improves%20performance%20and%20balances%20model%20accuracy%20and%20labeling%20effort%20while%20also%20mitigating%20class%20imbalance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16652v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Brood%2520Cell%2520Detection%2520in%2520Layer%2520Trap%2520Nests%2520for%2520Bees%2520and%2520Wasps%253A%2520Balancing%2520Labeling%2520Effort%2520and%2520Species%2520Coverage%26entry.906535625%3DChenchang%2520Liu%2520and%2520Felix%2520Fornoff%2520and%2520Annika%2520Grasreiner%2520and%2520Patrick%2520Maeder%2520and%2520Henri%2520Greil%2520and%2520Marco%2520Seeland%26entry. {"title": "Probing Cultural Signals in Large Language Models through Author Profiling", "author": "Valentin Lafargue and Ariel Guerra-Adames and Emmanuelle Claeys and Elouan Vuichard and Jean-Michel Loubes", "abstract": "Large language models (LLMs) are increasingly deployed in applications with societal impact, raising concerns about the cultural biases they encode. We probe these representations by evaluating whether LLMs can perform author profiling from song lyrics in a zero-shot setting, inferring singers' gender and ethnicity without task-specific fine-tuning. Across several open-source models evaluated on more than 10,000 lyrics, we find that LLMs achieve non-trivial profiling performance but demonstrate systematic cultural alignment: most models default toward North American ethnicity, while DeepSeek-1.5B aligns more strongly with Asian ethnicity. This finding emerges from both the models' prediction distributions and an analysis of their generated rationales. To quantify these disparities, we introduce two fairness metrics, Modality Accuracy Divergence (MAD) and Recall Divergence (RD), and show that Ministral-8B displays the strongest ethnicity bias among the evaluated models, whereas Gemma-12B shows the most balanced behavior. Our code is available on GitHub (https://github.com/ValentinLafargue/CulturalProbingLLM).", "link": "http://arxiv.org/abs/2603.16749v1", "date": "2026-03-17", "relevancy": 2.4476, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5082}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5082}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4521}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Probing%20Cultural%20Signals%20in%20Large%20Language%20Models%20through%20Author%20Profiling&body=Title%3A%20Probing%20Cultural%20Signals%20in%20Large%20Language%20Models%20through%20Author%20Profiling%0AAuthor%3A%20Valentin%20Lafargue%20and%20Ariel%20Guerra-Adames%20and%20Emmanuelle%20Claeys%20and%20Elouan%20Vuichard%20and%20Jean-Michel%20Loubes%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20increasingly%20deployed%20in%20applications%20with%20societal%20impact%2C%20raising%20concerns%20about%20the%20cultural%20biases%20they%20encode.%20We%20probe%20these%20representations%20by%20evaluating%20whether%20LLMs%20can%20perform%20author%20profiling%20from%20song%20lyrics%20in%20a%20zero-shot%20setting%2C%20inferring%20singers%27%20gender%20and%20ethnicity%20without%20task-specific%20fine-tuning.%20Across%20several%20open-source%20models%20evaluated%20on%20more%20than%2010%2C000%20lyrics%2C%20we%20find%20that%20LLMs%20achieve%20non-trivial%20profiling%20performance%20but%20demonstrate%20systematic%20cultural%20alignment%3A%20most%20models%20default%20toward%20North%20American%20ethnicity%2C%20while%20DeepSeek-1.5B%20aligns%20more%20strongly%20with%20Asian%20ethnicity.%20This%20finding%20emerges%20from%20both%20the%20models%27%20prediction%20distributions%20and%20an%20analysis%20of%20their%20generated%20rationales.%20To%20quantify%20these%20disparities%2C%20we%20introduce%20two%20fairness%20metrics%2C%20Modality%20Accuracy%20Divergence%20%28MAD%29%20and%20Recall%20Divergence%20%28RD%29%2C%20and%20show%20that%20Ministral-8B%20displays%20the%20strongest%20ethnicity%20bias%20among%20the%20evaluated%20models%2C%20whereas%20Gemma-12B%20shows%20the%20most%20balanced%20behavior.%20Our%20code%20is%20available%20on%20GitHub%20%28https%3A//github.com/ValentinLafargue/CulturalProbingLLM%29.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16749v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPY 520Our%2520code%2520is%2520available%2520on%2520GitHub%2520%2528https%253A//github.com/ValentinLafargue/CulturalProbingLLM%2529.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16749v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Probing%20Cultural%20Signals%20in%20Large%20Language%20Models%20through%20Author%20Profiling&entry.906535625=Valentin%20Lafargue%20and%20Ariel%20Guerra-Adames%20and%20Emmanuelle%20Claeys%20and%20Elouan%20Vuichard%20and%20Jean-Michel%20Loubes&entry.1292438233=Large%20language%20models%20%28LLMs%29%20are%20increasingly%20deployed%20in%20applications%20with%20societal%20impact%2C%20raising%20concerns%20about%20the%20cultural%20biases%20they%20encode.%20We%20probe%20these%20representations%20by%20evaluating%20whether%20LLMs%20can%20perform%20author%20profiling%20from%20song%20lyrics%20in%20a%20zero-shot%20setting%2C%20inferring%20singers%27%20gender%20and%20ethnicity%20without%20task-specific%20fine-tuning.%20Across%20several%20open-source%20models%20evaluated%20on%20more%20than%2010%2C000%20lyrics%2C%20we%20find%20that%20LLMs%20achieve%20non-trivial%20profiling%20performance%20but%20demonstrate%20systematic%20cultural%20alignment%3A%20most%20models%20default%20toward%20North%20American%20ethnicity%2C%20while%20DeepSeek-1.5B%20aligns%20more%20strongly%20with%20Asian%20ethnicity.%20This%20finding%20emerges%20from%20both%20the%20models%27%20prediction%20distributions%20and%20an%20analysis%20of%20their%20generated%20rationales.%20To%20quantify%20these%20disparities%2C%20we%20introduce%20two%20fairness%20metrics%2C%20Modality%20Accuracy%20Divergence%20%28MAD%29%20and%20Recall%20Divergence%20%28RD%29%2C%20and%20show%20that%20Ministral-8B%20displays%20the%20strongest%20ethnicity%20bias%20among%20the%20evaluated%20models%2C%20whereas%20Gemma-12B%20shows%20the%20most%20balanced%20behavior.%20Our%20code%20is%20available%20on%20GitHub%20%28https {"title": "LogicSkills: A Structured Benchmark for Formal Reasoning in Large Language Models", "author": "Brian Rabern and Philipp Mondorf and Barbara Plank", "abstract": "Large language models perform well on many logical reasoning benchmarks, but it remains unclear which core logical skills they truly master. To address this, we introduce LogicSkills, a benchmark that isolates three fundamental logical skills: (i) $\\textit{formal symbolization}\\unicode{x2014}{}$translating premises into first-order logic; (ii) $\\textit{countermodel construction}\\unicode{x2014}$showing that an argument is logically invalid by constructing a finite countermodel; and (iii) $\\textit{validity assessment}\\unicode{x2014}$determining whether a conclusion follows from a set of premises. Items are drawn from the two-variable fragment of first-order logic without identity and are presented in both English and a Carrollian nonce-word language. All instances are solver-verified with Z3 for correctness and non-triviality. Across conventional instruction-tuned LLMs, performance is high on $\\textit{validity assessment}$ but substantially lower on $\\textit{formal symbolization}$ and $\\textit{countermodel construction}$, highlighting that high task-level accuracy can mask weaknesses in core logical skills. In contrast, recent reasoning-tuned models perform strongly across all three tasks, suggesting a more systematic logical skill profile.", "link": "http://arxiv.org/abs/2602.06533v2", "date": "2026-03-17", "relevancy": 2.4398, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.513}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.513}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LogicSkills%3A%20A%20Structured%20Benchmark%20for%20Formal%20Reasoning%20in%20Large%20Language%20Models&body=Title%3A%20LogicSkills%3A%20A%20Structured%20Benchmark%20for%20Formal%20Reasoning%20in%20Large%20Language%20Models%0AAuthor%3A%20Brian%20Rabern%20and%20Philipp%20Mondorf%20and%20Barbara%20Plank%0AAbstract%3A%20Large%20language%20models%20perform%20well%20on%20many%20logical%20reasoning%20benchmarks%2C%20but%20it%20remains%20unclear%20which%20core%20logical%20skills%20they%20truly%20master.%20To%20address%20this%2C%20we%20introduce%20LogicSkills%2C%20a%20benchmark%20that%20isolates%20three%20fundamental%20logical%20skills%3A%20%28i%29%20%24%5Ctextit%7Bformal%20symbolization%7D%5Cunicode%7Bx2014%7D%7B%7D%24translating%20premises%20into%20first-order%20logic%3B%20%28ii%29%20%24%5Ctextit%7Bcountermodel%20construction%7D%5Cunicode%7Bx2014%7D%24showing%20that%20an%20argument%20is%20logically%20invalid%20by%20constructing%20a%20finite%20countermodel%3B%20and%20%28iii%29%20%24%5Ctextit%7Bvalidity%20assessment%7D%5Cunicode%7Bx2014%7D%24determining%20whether%20a%20conclusion%20follows%20from%20a%20set%20of%20premises.%20Items%20are%20drawn%20from%20the%20two-variable%20fragment%20of%20first-order%20logic%20without%20identity%20and%20are%20presented%20in%20both%20English%20and%20a%20Carrollian%20nonce-word%20language.%20All%20instances%20are%20solver-verified%20with%20Z3%20for%20correctness%20and%20non-triviality.%20Across%20conventional%20instruction-tuned%20LLMs%2C%20performance%20is%20high%20on%20%24%5Ctextit%7Bvalidity%20assessment%7D%24%20but%20substantially%20lower%20on%20%24%5Ctextit%7Bformal%20symbolization%7D%24%20and%20%24%5Ctextit%7Bcountermodel%20construction%7D%24%2C%20highlighting%20that%20high%20task-level%20accuracy%20can%20mask%20weaknesses%20in%20core%20logical%20skills.%20In%20contrast%2C%20recent%20reasoning-tuned%20models%20perform%20strongly%20across%20all%20three%20tasks%2C%20suggesting%20a%20more%20systematic%20logical%20skill%20profile.%0ALink%3A%20http%3A//arxiv.org/abs/2602.06533v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLogicSkills%253A%2520A%2520Structured%2520Benchmark%2520for%2520Formal%2520Reasoning%2520in%2520Large%2520Language%2520Models%26entry.906535625%3DBrian%2520Rabern%2520and%2520Philipp%2520Mondorf%2520and%2520Barbara%2520Plank%26entry.1292438233%3DLarge%2520language%2520models%2520perform%2520well%2520on%2520many%2520logical%2520reasoning%2520benchmarks%252C%2520but%2520it%2520remains%2520unclear%2520which%2520core%2520logical%2520skills%2520they%2520truly%2520master.%2520To%2520address%2520this%252C%2520we%2520introduce%2520LogicSkills%252C%2520a%2520benchmark%2520that%2520isolates%2520three%2520fundamental%2520logical%2520skills%253A%2520%2528i%2529%2520%2524%255Ctextit%257Bformal%2520symbolization%257D%255Cunicode%257Bx2014%257D%257B%257D%2524translating%2520premises%2520into%2520first-order%2520logic%253B%2520%2528ii%2529%2520%2524%255Ctextit%257Bcountermodel%2520construction%257D%255Cunicode%257Bx2014%257D%2524showing%2520that%2520an%2520argument%2520is%2520logically%2520invalid%2520by%2520constructing%2520a%2520finite%2520countermodel%253B%2520and%2520%2528iii%2529%2520%2524%255Ctextit%257Bvalidity%2520assessment%257D%255Cunicode%257Bx2014%257D%2524determining%2520whether%2520a%2520conclusion%2520follows%2520from%2520a%2520set%2520of%2520premises.%2520Items%2520are%2520drawn%2520from%2520the%2520two-variable%2520fragment%2520of%2520first-order%2520logic%2520without%2520identity%2520and%2520are%2520presented%2520in%2520both%2520English%2520and%2520a%2520Carrollian%2520nonce-word%2520language.%2520All%2520instances%2520are%2520solver-verified%2520with%2520Z3%2520for%2520correctness%252

ing%20when%20LRT%20surpasses%20Q-guidance-especially%20when%20off-support%20errors%20dominate.%20Overall%2C%20LRT-Diffusion%20is%20a%20drop-in%2C%20inference-time%20method%20that%20adds%20principled%2C%20calibrated%20risk%20control%20to%20diffusion%20policies%20for%20offline%20RL.&entry.1838667208=http%3A//arxiv.org/abs/2510.24983v2&entry.124074799=Read"},
{"title": "Improving segmentation of retinal arteries and veins using cardiac signal in doppler holograms", "author": "Marius Dubosc and Yann Fischer and Zacharie Auray and Nicolas Boutry and Edwin Carlinet and Michael Atlan and Thierry Geraud", "abstract": "Doppler holography is an emerging retinal imaging technique that captures the dynamic behavior of blood flow with high temporal resolution, enabling quantitative assessment of retinal hemodynamics. This requires accurate segmentation of retinal arteries and veins, but traditional segmentation methods focus solely on spatial information and overlook the temporal richness of holographic data. In this work, we propose a simple yet effective approach for artery-vein segmentation in temporal Doppler holograms using standard segmentation architectures. By incorporating features derived from a dedicated pulse analysis pipeline, our method allows conventional U-Nets to exploit temporal dynamics and achieve performance comparable to more complex attention- or iteration-based models. These findings demonstrate that time-resolved preprocessing can unlock the full potential of deep learning for Doppler holography, opening new perspectives for quantitative exploration of retinal hemodynamics. The dataset is publicly available at https://huggingface.co/datasets/DigitalHolography/", "link": "http://arxiv.org/abs/2511.14654v2", "date": "2026-02-19", "relevancy": 1.52, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.512}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5068}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improving%20segmentation%20of%20retinal%20arteries%20and%20veins%20using%20cardiac%20signal%20in%20doppler%20holograms&body=Title%3A%20Improving%20segmentation%20of%20retinal%20arteries%20and%20veins%20using%20cardiac%20signal%20in%20doppler%20holograms%0AAuthor%3A%20Marius%20Dubosc%20and%20Yann%20Fischer%20and%20Zacharie%20Auray%20and%20Nicolas%20Boutry%20and%20Edwin%20Carlinet%20and%20Michael%20Atlan%20and%20Thierry%20Geraud%0AAbstract%3A%20Doppler%20holography%20is%20an%20emerging%20retinal%20imaging%20technique%20that%20captures%20the%20dynamic%20behavior%20of%20blood%20flow%20with%20high%20temporal%20resolution%2C%20enabling%20quantitative%20assessment%20of%20retinal%20hemodynamics.%20This%20requires%20accurate%20segmentation%20of%20retinal%20arteries%20and%20veins%2C%20but%20traditional%20segmentation%20methods%20focus%20solely%20on%20spatial%20information%20and%20overlook%20the%20temporal%20richness%20of%20holographic%20data.%20In%20this%20work%2C%20we%20propose%20a%20simple%20yet%20effective%20approach%20for%20artery-vein%20segmentation%20in%20temporal%20Doppler%20holograms%20using%20standard%20segmentation%20architectures.%20By%20incorporating%20features%20derived%20from%20a%20dedicated%20pulse%20analysis%20pipeline%2C%20our%20method%20allows%20conventional%20U-Nets%20to%20exploit%20temporal%20dynamics%20and%20achieve%20performance%20comparable%20to%20more%20complex%20attention-%20or%20iteration-based%20models.%20These%20findings%20demonstrate%20that%20time-resolved%20preprocessing%20can%20unlock%20the%20full%20potential%20of%20deep%20learning%20for%20Doppler%20holography%2C%20opening%20new%20perspectives%20for%20quantitative%20exploration%20of%20retinal%20hemodynamics.%20The%20dataset%20is%20publicly%20available%20at%20https%3A//huggingface.co/datasets/DigitalHolography/%0ALink%3A%20http%3A//arxiv.org/abs/2511.14654v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproving%2520segmentation%2520of%2520retinal%2520arteries%2520and%2520veins%2520using%2520cardiac%2520signal%2520in%2520doppler%2520holograms%26entry.906535625%3DMarius%2520Dubosc%2520and%2520Yann%2520Fischer%2520and%2520Zacharie%2520Auray%2520and%2520Nicolas%2520Boutry%2520and%2520Edwin%2520Carlinet%2520and%2520Michael%2520Atlan%2520and%2520Thierry%2520Geraud%26entry.1292438233%3DDoppler%2520holography%2520is%2520an%2520emerging%2520retinal%2520imaging%2520technique%2520that%2520captures%2520the%2520dynamic%2520behavior%2520of%2520blood%2520flow%2520with%2520high%2520temporal%2520resolution%252C%2520enabling%2520quantitative%2520assessment%2520of%2520retinal%2520hemodynamics.%2520This%2520requires%2520accurate%2520segmentation%2520of%2520retinal%2520arteries%2520and%2520veins%252C%2520but%2520traditional%2520segmentation%2520methods%2520focus%2520solely%2520on%2520spatial%2520information%2520and%2520overlook%2520the%2520temporal%2520richness%2520of%2520holographic%2520data.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520simple%2520yet%2520effective%2520approach%2520for%2520artery-vein%2520segmentation%2520in%2520temporal%2520Doppler%2520holograms%2520using%2520standard%2520segmentation%2520architectures.%2520By%2520incorporating%2520features%2520derived%2520from%2520a%2520dedicated%2520pulse%2520analysis%2520pipeline%252C%2520our%2520method%2520allows%2520conventional%2520U-Nets%2520to%2520exploit%2520temporal%2520dynamics%2520and%2520achieve%2520performance%2520comparable%2520to%2520more%2520complex%2520attention-%2520or%2520iteration-based%2520models.%2520These%2520findings%2520demonstrate%2520that%2520time-resolved%2520preprocessing%2520can%2520unlock%2520the%2520full%2520potential%2520of%2520deep%2520learning%2520for%2520Doppler%2520holography%252C%2520opening%2520new%2520perspectives%2520for%2520quantitative%2520exploration%2520of%2520retinal%2520hemodynamics.%2520The%2520dataset%2520is%2520publicly%2520available%2520at%2520https%253A//huggingface.co/datasets/DigitalHolography/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.14654v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Improving%20segmentation%20of%20retinal%20arteries%20and%20veins%20using%20cardiac%20signal%20in%20doppler%20holograms&entry.906535625=Marius%20Dubosc%20and%20Yann%20Fischer%20and%20Zacharie%20Auray%20and%20Nicolas%20Boutry%20and%20Edwin%20Carlinet%20and%20Michael%20Atlan%20and%20Thierry%20Geraud&entry.1292438233=Doppler%20holography%20is%20an%20emerging%20retinal%20imaging%20technique%20that%20captures%20the%20dynamic%20behavior%20of%20blood%20flow%20with%20high%20temporal%20resolution%2C%20enabling%20quantitative%20assessment%20of%20retinal%20hemodynamics.%20This%20requires%20accurate%20segmentation%20of%20retinal%20arteries%20and%20veins%2C%20but%20traditional%20segmentation%20methods%20focus%20solely%20on%20spatial%20information%20and%20overlook%20the%20temporal%20richness%20of%20holographic%20data.%20In%20this%20work%2C%20we%20propose%20a%20simple%20yet%20effective%20approach%20for%20artery-vein%20segmentation%20in%20temporal%20Doppler%20holograms%20using%20standard%20segmentation%20architectures.%20By%20incorporating%20features%20derived%20from%20a%20dedicated%20pulse%20analysis%20pipeline%2C%20our%20method%20allows%20conventional%20U-Nets%20to%20exploit%20temporal%20dynamics%20and%20achieve%20performance%20comparable%20to%20more%20complex%20attention-%20or%20iteration-based%20models.%20These%20findings%20demonstrate%20that%20time-resolved%20preprocessing%20can%20unlock%20the%20full%20potential%20of%20deep%20learning%20for%20Doppler%20holography%2C%20opening%20new%20perspectives%20for%20quantitative%20exploration%20of%20retinal%20hemodynamics.%20The%20dataset%20is%20publicly%20available%20at%20https%3A//huggingface.co/datasets/DigitalHolography/&entry.1838667208=http%3A//arxiv.org/abs/2511.14654v2&entry.124074799=Read"},
{"title": "DeepQuark: A Deep-Neural-Network Approach to Multiquark Bound States", "author": "Wei-Lin Wu and Lu Meng and Shi-Lin Zhu", "abstract": "For the first time, we implement the deep-neural-network-based variational Monte Carlo approach for the multiquark bound states, whose complexity surpasses that of electron or nucleon systems due to strong SU(3) color interactions. We design a novel and high-efficiency architecture, DeepQuark, to address the unique challenges in multiquark systems such as stronger correlations, extra discrete quantum numbers, and intractable confinement interaction. Our method demonstrates competitive performance with state-of-the-art approaches, including diffusion Monte Carlo and Gaussian expansion method, in the nucleon, doubly heavy tetraquark, and fully heavy tetraquark systems. Notably, it outperforms existing calculations for pentaquarks, exemplified by the triply heavy pentaquark. For the nucleon, we successfully incorporate three-body flux-tube confinement interactions without additional computational costs. In tetraquark systems, we consistently describe hadronic molecule $T_{cc}$ and compact tetraquark $T_{bb}$ with an unbiased form of wave function ansatz. In the pentaquark sector, we obtain weakly bound $\\bar D^*\u039e_{cc}^*$ molecule $P_{cc\\bar c}(5715)$ with $S=\\frac{5}{2}$ and its bottom partner $P_{bb\\bar b}(15569)$. They can be viewed as the analogs of the molecular $T_{cc}$. We recommend experimental search of $P_{cc\\bar c}(5715)$ in the D-wave $J/\u03c8\u039b_c$ channel. DeepQuark holds great promise for extension to larger multiquark systems, overcoming the computational barriers in conventional methods. It also serves as a powerful framework for exploring confining mechanism beyond two-body interactions in multiquark states, which may offer valuable insights into nonperturbative QCD and general many-body physics.", "link": "http://arxiv.org/abs/2506.20555v2", "date": "2026-02-19", "relevancy": 1.6588, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4257}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4125}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4125}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DeepQuark%3A%20A%20Deep-Neural-Network%20Approach%20to%20Multiquark%20Bound%20States&body=Title%3A%20DeepQuark%3A%20A%20Deep-Neural-Network%20Approach%20to%20Multiquark%20Bound%20States%0AAuthor%3A%20Wei-Lin%20Wu%20and%20Lu%20Meng%20and%20Shi-Lin%20Zhu%0AAbstract%3A%20For%20the%20first%20time%2C%20we%20implement%20the%20deep-neural-network-based%20variational%20Monte%20Carlo%20approach%20for%20the%20multiquark%20bound%20states%2C%20whose%20complexity%20surpasses%20that%20of%20electron%20or%20nucleon%20systems%20due%20to%20strong%20SU%283%29%20color%20interactions.%20We%20design%20a%20novel%20and%20high-efficiency%20architecture%2C%20DeepQuark%2C%20to%20address%20the%20unique%20challenges%20in%20multiquark%20systems%20such%20as%20stronger%20correlations%2C%20extra%20discrete%20quantum%20numbers%2C%20and%20intractable%20confinement%20interaction.%20Our%20method%20demonstrates%20competitive%20performance%20with%20state-of-the-art%20approaches%2C%20including%20diffusion%20Monte%20Carlo%20and%20Gaussian%20expansion%20method%2C%20in%20the%20nucleon%2C%20doubly%20heavy%20tetraquark%2C%20and%20fully%20heavy%20tetraquark%20systems.%20Notably%2C%20it%20outperforms%20existing%20calculations%20for%20pentaquarks%2C%20exemplified%20by%20the%20triply%20heavy%20pentaquark.%20For%20the%20nucleon%2C%20we%20successfully%20incorporate%20three-body%20flux-tube%20confinement%20interactions%20without%20additional%20computational%20costs.%20In%20tetraquark%20systems%2C%20we%20consistently%20describe%20hadronic%20molecule%20%24T_%7Bcc%7D%24%20and%20compact%20tetraquark%20%24T_%7Bbb%7D%24%20with%20an%20unbiased%20form%20of%20wave%20function%20ansatz.%20In%20the%20pentaquark%20sector%2C%20we%20obtain%20weakly%20bound%20%24%5Cbar%20D%5E%2A%CE%9E_%7Bcc%7D%5E%2A%24%20molecule%20%24P_%7Bcc%5Cbar%20c%7D%285715%29%24%20with%20%24S%3D%5Cfrac%7B5%7D%7B2%7D%24%20and%20its%20bottom%20partner%20%24P_%7Bbb%5Cbar%20b%7D%2815569%29%24.%20They%20can%20be%20viewed%20as%20the%20analogs%20of%20the%20molecular%20%24T_%7Bcc%7D%24.%20We%20recommend%20experimental%20search%20of%20%24P_%7Bcc%5Cbar%20c%7D%285715%29%24%20in%20the%20D-wave%20%24J/%CF%88%CE%9B_c%24%20channel.%20DeepQuark%20holds%20great%20promise%20for%20extension%20to%20larger%20multiquark%20systems%2C%20overcoming%20the%20computational%20barriers%20in%20conventional%20methods.%20It%20also%20serves%20as%20a%20powerful%20framework%20for%20exploring%20confining%20mechanism%20beyond%20two-body%20interactions%20in%20multiquark%20states%2C%20which%20may%20offer%20valuable%20insights%20into%20nonperturbative%20QCD%20and%20general%20many-body%20physics.%0ALink%3A%20http%3A//arxiv.org/abs/2506.20555v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDeepQuark%253A%2520A%2520Deep-Neural-Network%2520Approach%2520to%2520Multiquark%2520Bound%2520States%26entry.906535625%3DWei-Lin%2520Wu%2520and%2520Lu%2520Meng%2520and%2520Shi-Lin%2520Zhu%26entry.1292438233%3DFor%2520the%2520first%2520time%252C%2520we%2520implement%2520the%2520deep-neural-network-based%2520variational%2520Monte%2520Carlo%2520approach%2520for%2520the%2520multiquark%2520bound%2520states%252C%2520whose%2520complexity%2520surpasses%2520that%2520of%2520electron%2520or%2520nucleon%2520systems%2520due%2520to%2520strong%2520SU%25283%2529%2520color%2520interactions.%2520We%2520design%2520a%2520novel%2520and%2520high-efficiency%2520architecture%252C%2520DeepQuark%252C%2520to%2520address       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();

{"title": "Efficient privacy loss accounting for subsampling and random allocation", "author": "Vitaly Feldman and Moshe Shenfeld", "abstract": "We consider the privacy amplification properties of a sampling scheme in which a user's data is used in $k$ steps chosen randomly and uniformly from a sequence (or set) of $t$ steps. This sampling scheme has been recently applied in the context of differentially private optimization (Chua et al., 2024a; Choquette-Choo et al., 2025) and communication-efficient high-dimensional private aggregation (Asi et al., 2025), where it was shown to have utility advantages over the standard Poisson sampling. Theoretical analyses of this sampling scheme (Feldman & Shenfeld, 2025; Dong et al., 2025) lead to bounds that are close to those of Poisson sampling, yet still have two significant shortcomings. First, in many practical settings, the resulting privacy parameters are not tight due to the approximation steps in the analysis. Second, the computed parameters are either the hockey stick or Renyi divergence, both of which introduce overheads when used in privacy loss accounting.\n  In this work, we demonstrate that the privacy loss distribution (PLD) of random allocation applied to any differentially private algorithm can be computed efficiently. When applied to the Gaussian mechanism, our results demonstrate that the privacy-utility trade-off for random allocation is at least as good as that of Poisson subsampling. In particular, random allocation is better suited for training via DP-SGD. To support these computations, our work develops new tools for general privacy loss accounting based on a notion of PLD realization. This notion allows us to extend accurate privacy loss accounting to subsampling which previously required manual noise-mechanism-specific analysis.", "link": "http://arxiv.org/abs/2602.17284v1", "date": "2026-02-19", "relevancy": 2.3487, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4729}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4722}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20privacy%20loss%20accounting%20for%20subsampling%20and%20random%20allocation&body=Title%3A%20Efficient%20privacy%20loss%20accounting%20for%20subsampling%20and%20random%20allocation%0AAuthor%3A%20Vitaly%20Feldman%20and%20Moshe%20Shenfeld%0AAbstract%3A%20We%20consider%20the%20privacy%20amplification%20properties%20of%20a%20sampling%20scheme%20in%20which%20a%20user%27s%20data%20is%20used%20in%20%24k%24%20steps%20chosen%20randomly%20and%20uniformly%20from%20a%20sequence%20%28or%20set%29%20of%20%24t%24%20steps.%20This%20sampling%20scheme%20has%20been%20recently%20applied%20in%20the%20context%20of%20differentially%20private%20optimization%20%28Chua%20et%20al.%2C%202024a%3B%20Choquette-Choo%20et%20al.%2C%202025%29%20and%20communication-efficient%20high-dimensional%20private%20aggregation%20%28Asi%20et%20al.%2C%202025%29%2C%20where%20it%20was%20shown%20to%20have%20utility%20advantages%20over%20the%20standard%20Poisson%20sampling.%20Theoretical%20analyses%20of%20this%20sampling%20scheme%20%28Feldman%20%26%20Shenfeld%2C%202025%3B%20Dong%20et%20al.%2C%202025%29%20lead%20to%20bounds%20that%20are%20close%20to%20those%20of%20Poisson%20sampling%2C%20yet%20still%20have%20two%20significant%20shortcomings.%20First%2C%20in%20many%20practical%20settings%2C%20the%20resulting%20privacy%20parameters%20are%20not%20tight%20due%20to%20the%20approximation%20steps%20in%20the%20analysis.%20Second%2C%20the%20computed%20parameters%20are%20either%20the%20hockey%20stick%20or%20Renyi%20divergence%2C%20both%20of%20which%20introduce%20overheads%20when%20used%20in%20privacy%20loss%20accounting.%0A%20%20In%20this%20work%2C%20we%20demonstrate%20that%20the%20privacy%20loss%20distribution%20%28PLD%29%20of%20random%20allocation%20applied%20to%20any%20differentially%20private%20algorithm%20can%20be%20computed%20efficiently.%20When%20applied%20to%20the%20Gaussian%20mechanism%2C%20our%20results%20demonstrate%20that%20the%20privacy-utility%20trade-off%20for%20random%20allocation%20is%20at%20least%20as%20good%20as%20that%20of%20Poisson%20subsampling.%20In%20particular%2C%20random%20allocation%20is%20better%20suited%20for%20training%20via%20DP-SGD.%20To%20support%20these%20computations%2C%20our%20work%20develops%20new%20tools%20for%20general%20privacy%20loss%20accounting%20based%20on%20a%20notion%20of%20PLD%20realization.%20This%20notion%20allows%20us%20to%20extend%20accurate%20privacy%20loss%20accounting%20to%20subsampling%20which%20previously%20required%20manual%20noise-mechanism-specific%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17284v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520privacy%2520loss%2520accounting%2520for%2520subsampling%2520and%2520random%2520allocation%26entry.906535625%3DVitaly%2520Feldman%2520and%2520Moshe%2520Shenfeld%26entry.1292438233%3DWe%2520consider%2520the%2520privacy%2520amplification%2520properties%2520of%2520a%2520sampling%2520scheme%2520in%2520which%2520a%2520user%2527s%2520data%2520is%2520used%2520in%2520%2524k%2524%2520steps%2520chosen%2520randomly%2520and%2520uniformly%2520from%2520a%2520sequence%2520%2528or%2520set%2529%2520of%2520%2524t%2524%2520steps.%2520This%2520sampling%2520scheme%2520has%2520been%2520recently%2520applied%2520in%2520the%2520context%2520of%2520differentially%2520private%2520optimization%2520%2528Chua%2520et%2520al.%252C%25202024a%253B%2520Choquette-Choo%2520et%2520al.%252C%25202025%2529%2520and%2520communicatio {"title": "Intracoronary Optical Coherence Tomography Image Processing and Vessel Classification Using Machine Learning", "author": "Amal Lahchim and Lambros Athanasiou", "abstract": "Intracoronary Optical Coherence Tomography (OCT) enables high-resolution visualization of coronary vessel anatomy but presents challenges due to noise, imaging artifacts, and complex tissue structures. This paper proposes a fully automated pipeline for vessel segmentation and classification in OCT images using machine learning techniques. The proposed method integrates image preprocessing, guidewire artifact removal, polar-to-Cartesian transformation, unsupervised K-means clustering, and local feature extraction. These features are used to train Logistic Regression and Support Vector Machine classifiers for pixel-wise vessel classification. Experimental results demonstrate excellent performance, achieving precision, recall, and F1-score values up to 1.00 and overall classification accuracy of 99.68%. The proposed approach provides accurate vessel boundary detection while maintaining low computational complexity and requiring minimal manual annotation. This method offers a reliable and efficient solution for automated OCT image analysis and has potential applications in clinical decision support and real-time medical image processing.", "link": "http://arxiv.org/abs/2602.15579v2", "date": "2026-02-19", "relevancy": 2.3485, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4741}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4713}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Intracoronary%20Op {"title": "RA-Nav: A Risk-Aware Navigation System Based on Semantic Segmentation for Aerial Robots in Unpredictable Environments", "author": "Ziyi Zong and Xin Dong and Jinwu Xiang and Daochun Li and Zhan Tu", "abstract": "Existing aerial robot navigation systems typically plan paths around static and dynamic obstacles, but fail to adapt when a static obstacle suddenly moves. Integrating environmental semantic awareness enables estimation of potential risks posed by suddenly moving obstacles. In this paper, we propose RA- Nav, a risk-aware navigation framework based on semantic segmentation. A lightweight multi-scale semantic segmentation network identifies obstacle categories in real time. These obstacles are further classified into three types: stationary, temporarily static, and dynamic. For each type, corresponding risk estimation functions are designed to enable real-time risk prediction, based on which a complete local risk map is constructed. Based on this map, the risk-informed path search algorithm is designed to guarantee planning that balances path efficiency and safety. Trajectory optimization is then applied to generate trajectories that are safe, smooth, and dynamically feasible. Comparative simulations demonstrate that RA-Nav achieves higher success rates than baselines in sudden obstacle state transition scenarios. Its effectiveness is further validated in simulations using real- world data.", "link": "http://arxiv.org/abs/2602.17515v1", "date": "2026-02-19", "relevancy": 2.3479, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6109}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5861}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5783}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RA-Nav%3A%20A%20Risk-Aware%20Navigation%20System%20Based%20on%20Semantic%20Segmentation%20for%20Aerial%20Robots%20in%20Unpredictable%20Environments&body=Title%3A%20RA-Nav%3A%20A%20Risk-Aware%20Navigation%20System%20Based%20on%20Semantic%20Segmentation%20for%20Aerial%20Robots%20in%20Unpredictable%20Environments%0AAuthor%3A%20Ziyi%20Zong%20and%20Xin%20Dong%20and%20Jinwu%20Xiang%20and%20Daochun%20Li%20and%20Zhan%20Tu%0AAbstract%3A%20Existing%20aerial%20robot%20navigation%20systems%20typically%20plan%20paths%20around%20static%20and%20dynamic%20obstacles%2C%20but%20fail%20to%20adapt%20when%20a%20static%20obstacle%20suddenly%20moves.%20Integrating%20environmental%20semantic%20awareness%20enables%20estimation%20of%20potential%20risks%20posed%20by%20suddenly%20moving%20obstacles.%20In%20this%20paper%2C%20we%20propose%20RA-%20Nav%2C%20a%20risk-aware%20navigation%20framework%20based%20on%20semantic%20segmentation.%20A%20lightweight%20multi-scale%20semantic%20segmentation%20network%20identifies%20obstacle%20categories%20in%20real%20time.%20These%20obstacles%20are%20further%20classified%20into%20three%20types%3A%20stationary%2C%20temporarily%20static%2C%20and%20dynamic.%20For%20each%20type%2C%20corresponding%20risk%20estimation%20functions%20are%20designed%20to%20enable%20real-time%20risk%20prediction%2C%20based%20on%20which%20a%20complete%20local%20risk%20map%20is%20constructed.%20Based%20on%20this%20map%2C%20the%20risk-informed%20path%20search%20algorithm%20is%20designed%20to%20guarantee%20planning%20that%20balances%20path%20efficiency%20and%20safety.%20Trajectory%20optimization%20is%20then%20applied%20to%20generate%20trajectories%20that%20are%20safe%2C%20smooth%2C%20and%20dynamically%20feasible.%20Comparative%20simulations%20demonstrate%20that%20RA-Nav%20achieves%20higher%20success%20rates%20than%20baselines%20in%20sudden%20obstacle%20state% th%2520efficiency%2520and%2520safety.%2520Trajectory%2520optimization%2520is%2520then%2520applied%2520to%2520generate%2520trajectories%2520that%2520are%2520safe%252C%2520smooth%252C%2520and%2520dynamically%2520feasible.%2520Comparative%2520simulations%2520demonstrate%2520that%2520RA-Nav%2520achieves%2520higher%2520success%2520rates%2520than%2520baselines%2520in%2520sudden%2520obstacle%2520state%2520transition%2520scenarios.%2520Its%2520effectiveness%2520is%2520further%2520validated%2520in%2520simulations%2520using%2520real-%2520world%2520data.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17515v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RA-Nav%3A%20A%20Risk-Aware%20Navigation%20System%20Based%20on%20Semantic%20Segmentation%20for%20Aerial%20Robots%20in%20Unpredictable%20Environments&entry.906535625=Ziyi%20Zong%20and%20Xin%20Dong%20and%20Jinwu%20Xiang%20and%20Daochun%20Li%20and%20Zhan%20Tu&entry.1292438233=Existing%20aerial%20robot%20navigation%20systems%20typically%20plan%20paths%20around%20static%20and%20dynamic%20obstacles%2C%20but%20fail%20to%20adapt%20when%20a%20static%20obstacle%20suddenly%20moves.%20Integrating%20environmental%20semantic%20awareness%20enables%20estimation%20of%20potential%20risks%20posed%20by%20suddenly%20moving%20obstacles.%20In%20this%20paper%2C%20we%20propose%20RA-%20Nav%2C%20a%20risk-aware%20navigation%20framework%20based%20on%20semantic%20segmentation.%20A%20lightweight%20multi-scale%20semantic%20segmentation%20network%20identifies%20obstacle%20categories%20in%20real%20time.%20These%20obstacles%20are%20further%20classified%20into%20three%20types%3A%20stationary%2C%20temporarily%20static%2C%20and%20dynamic.%20For%20each%20type%2C%20corresponding%20risk%20estimation%20functions%20are%20designed%20to%20enable%20real-time%20risk%20prediction%2C%20based%20on%20which%20a%20complete%20local%20risk%20map%20is%20constructed.%20Based% {"title": "LoRA-Squeeze: Simple and Effective Post-Tuning and In-Tuning Compression of LoRA Modules", "author": "Ivan Vuli\u0107 and Adam Grycner and Quentin de Laroussilhe and Jonas Pfeiffer", "abstract": "Despite its huge number of variants, standard Low-Rank Adaptation (LoRA) is still a dominant technique for parameter-efficient fine-tuning (PEFT). Nonetheless, it faces persistent challenges, including the pre-selection of an optimal rank and rank-specific hyper-parameters, as well as the deployment complexity of heterogeneous-rank modules and more sophisticated LoRA derivatives. In this work, we introduce LoRA-Squeeze, a simple and efficient methodology that aims to improve standard LoRA learning by changing LoRA module ranks either post-hoc or dynamically during training}. Our approach posits that it is better to first learn an expressive, higher-rank solution and then compress it, rather than learning a constrained, low-rank solution directly. The method involves fine-tuning with a deliberately high(er) source rank, reconstructing or efficiently approximating the reconstruction of the full weight update matrix, and then using Randomized Singular Value Decomposition (RSVD) to create a new, compressed LoRA module at a lower target rank. Extensive experiments across 13 text and 10 vision-language tasks show that post-hoc compression often produces lower-rank adapters that outperform those trained directly at the target rank, especially if a small number of fine-tuning steps at the target rank is allowed. Moreover, a gradual, in-tuning rank annealing variant of LoRA-Squeeze consistently achieves the best LoRA size-performance trade-off.", "link": "http://arxiv.org/abs/2602.10993v2", "date": "2026-02-19", "relevancy": 2.3363, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4767}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4636}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoRA-Squeeze%3A%20Simple%20and%20Effective%20Post-Tuning%20and%20In-Tuning%20Compression%20of%20LoRA%20Modules&body=Title%3A%20LoRA-Squeeze%3A%20Simple%20and%20Effective%20Post-Tuning%20and%20In-Tuning%20Compression%20of%20LoRA%20Modules%0AAuthor%3A%20Ivan%20Vuli%C4%87%20and%20Adam%20Grycner%20and%20Quentin%20de%20Laroussilhe%20and%20Jonas%20Pfeiffer%0AAbstract%3A%20Despite%20its%20huge%20number%20of%20variants%2C%20standard%20Low-Rank%20Adaptation%20%28LoRA%29%20is%20still%20a%20dominant%20technique%20for%20parameter-efficient%20fine-tuning%20%28PEFT%29.%20Nonetheless%2C%20it%20faces%20persistent%20challenges%2C%20including%20the%20pre-selection%20of%20an%20optimal%20rank%20and%20rank-specific%20hyper-parameters%2C%20as%20well%20as%20the%20deployment%20complexity%20of%20heterogeneous-rank%20modules%20and%20more%20sophisticated%20LoRA%20derivatives.%20In%20this%20work%2C%20we%20introduce%20LoRA-Squeeze%2C%20a%20simple%20and%20efficient%20methodology%20that%20aims%20to%20improve%20standard%20LoRA%20learning%20by%20changing%20LoRA%20module%20ranks%20either%20post-hoc%20or%20dynamically%20during%20training%7D.%20Our%20approach%20posits%20that%20it%20is%20better%20to%20first%20learn%20an%20expressive%2C%20higher-rank%20solution%20and%20then%20compress%20it%2C%20rather%20than%20learning%20a%20constrained%2C%20low-rank%20solution%20directly.%20The%20method%20involves%20fine-tuning%20with%20a%20deliberately%20high%28er%29%20source%20rank%2C%20reconstructing%20or%20efficiently%20approximating%20the%20reconstruction%20of%20the%20full%20weight%20update%20matrix%2C%20and%20then%20using%20Randomized%20Singular%20Value%20Decomposition%20%28RSVD%29%20to%20create%20a%20new%2C%20compressed%20LoRA%20module%20at%20a%20lower%20target%20rank.%20Extensive%20experiments%20across%2013%20text%20and%2010%20vision-language%20tasks%20show%20that%20post-hoc%20compression%20often%20produces%20lower-rank%20adapters%20that%20outperform%20those%20trained%20directly%20at%20the%20target%20rank%2C%20especially%20if%20a%20small%20number%20of%20fine-tuning%20steps%20at%20the%20target%20rank%20is%20allowed.%20Moreover%2C%20a%20gradual%2C%20in-tuning%20rank%20annealing%20variant%20of%20LoRA-Squeeze%20consistently%20achieves%20the%20best%20LoRA%20size-performance%20trade-off.%0ALink%3A%20http%3A//arxiv.org/abs/2602.10993v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoRA-Squeeze%253A%2520Simple%2520and%2520Effective%2520Post-Tuning%2520and%2520In-Tuning%2520Compression%2520of%2520LoRA%2520Modules%26entry.906535625%3DIvan%2520Vuli%25C4%2587%2520and%2520Adam%2520Grycner%2520and%2520Quentin%2520de%2520Laroussilhe%2520and%2520Jonas%2520Pfeiffer%26entry.1292438233%3DDespite%2520its%2520huge%2520number%2520of%2520variants%252C%2520standard%2520Low-Rank%2520Adaptation%2520%2528LoRA%2529%2520is%2520still%2520a%2520dominant%2520technique%2520for%2520parameter-efficient%2520fine-tuning%2520%2528PEFT%2529.%2520Nonetheless%252C%2520it%2520faces%2520persistent%2520challenges%252C%2520including%2520the%2520pre-selection%2520of%2520an%2520optimal%2520rank%2520and%2520rank-specific%2520hyper-parameters%252C%2520as%2520well%2520as%2520the%2520deployment%2520complexity%2520of%2520heterogeneous-rank%2520modules%2520and%2520more%2520sophisticated%2520LoRA%2520derivatives.%2520In%2520this%2520work%252C%2520we%2520introduce%2520LoRA-Squeeze%252C%2520a%2520simple%2520and%2520efficient%2520methodology%2520that%2520aims%2520to%2520improve%2520standard%2520LoRA%2520learning%2520by%2520changing%2520LoRA%2520module%2520ranks%2520either%2520post-hoc%2520or%2520dynamically%2520during%2520training%257D.%2520Our%2520ap nique%20for%20parameter-efficient%20fine-tuning%20%28PEFT%29.%20Nonetheless%2C%20it%20faces%20persistent%20challenges%2C%20including%20the%20pre-selection%20of%20an%20optimal%20rank%20and%20rank-specific%20hyper-parameters%2C%20as%20well%20as%20the%20deployment%20complexity%20of%20heterogeneous-rank%20modules%20and%20more%20sophisticated%20LoRA%20derivatives.%20In%20this%20work%2C%20we%20introduce%20LoRA-Squeeze%2C%20a%20simple%20and%20efficient%20methodology%20that%20aims%20to%20improve%20standard%20LoRA%20learning%20by%20changing%20LoRA%20module%20ranks%20either%20post-hoc%20or%20dynamically%20during%20training%7D.%20Our%20approach%20posits%20that%20it%20is%20better%20to%20first%20learn%20an%20expressive%2C%20higher-rank%20solution%20and%20then%20compress%20it%2C%20rather%20than%20learning%20a%20constrained%2C%20low-rank%20solution%20directly.%20The%20method%20involves%20fine-tuning%20with%20a%20deliberately%20high%28er%29%20source%20rank%2C%20reconstructing%20or%20efficiently%20approximating%20the%20reconstruction%20of%20the%20full%20weight%20update%20matrix%2C%20and%20then%20using%20Randomized%20Singular%20Value%20Decomposition%20%28RSVD%29%20to%20create%20a%20new%2C%20compressed%20LoRA%20module%20at%20a%20lower%20target%20rank.%20Extensive%20experiments%20across%2013%20text%20and%2010%20vision-language%20tasks%20show%20that%20post-hoc%20compression%20often%20produces%20lower-rank%20adapters%20that%20outperform%20those%20trained%20directly%20at%20the%20target%20rank%2C%20especially%20if%20a%20small%20number%20of%20fine-tuning%20steps%20at%20the%20target%20rank%20is%20allowed.%20Moreover%2C%20a%20gradual%2C%20in-tuning%20rank%20annealing%20variant%20of%20LoRA-Squeeze%20consistently%20achieves%20the%20best%20LoRA%20size-performance%20trade-off.&entry.1838667208=http%3A//arxiv.org/abs/2602.10993v2&entry.124074799=Read"},
{"title": "Sufficient, Necessary and Complete Causal Explanations in Image Classification", "author": "David A Kelly and Hana Chockler", "abstract": "Existing algorithms for explaining the outputs of image classifiers are based on a variety of approaches and produce explanations that frequently lack formal rigour. On the other hand, logic-based explanations are formally and rigorously defined but their computability relies on strict assumptions about the model that do not hold on image classifiers.\n  In this paper, we show that causal explanations, in addition to being formally and rigorously defined, enjoy the same formal properties as logic-based ones, while still lending themselves to black-box algorithms and being a natural fit for image classifiers. We prove formal properties of causal explanations and their equivalence to logic-based explanations. We demonstrate how to subdivide an image into its sufficient and necessary components. We introduce $\u03b4$-complete explanations, which have a minimum confidence threshold and 1-complete causal explanations, explanations that are classified with the same confidence as the original image.\n  We implement our definitions, and our experimental results demonstrate that different models have different patterns of sufficiency, necessity, and completeness. Our algorithms are efficiently computable, taking on average 6s per image on a ResNet model to compute all types of explanations, and are totally black-box, needing no knowledge of the model, no access to model internals, no access to gradient, nor requiring any properties, such as monotonicity, of the model.", "link": "http://arxiv.org/abs/2507.23497v2", "date": "2026-02-19", "relevancy": 2.3088, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity .%0A%20%20We%20implement%20our%20definitions%2C%20and%20our%20experimental%20results%20demonstrate%20that%20different%20models%20have%20different%20patterns%20of%20sufficiency%2C%20necessity%2C%20and%20completeness.%20Our%20algorithms%20are%20efficiently%20computable%2C%20taking%20on%20average%206s%20per%20image%20on%20a%20ResNet%20model%20to%20compute%20all%20types%20of%20explanations%2C%20and%20are%20totally%20black-box%2C%20needing%20no%20knowledge%20of%20the%20model%2C%20no%20access%20to%20model%20internals%2C%20no%20access%20to%20gradient%2C%20nor%20requiring%20any%20properties%2C%20such%20as%20monotonicity%2C%20of%20the%20model.%0ALink%3A%20http%3A//arxiv.org/abs/2507.23497v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSufficient%252C%2520Necessary%2520and%2520Complete%2520Causal%2520Explanations%2520in%2520Image%2520Classification%26entry.906535625%3DDavid%2520A%2520Kelly%2520and%2520Hana%2520Chockler%26entry.1292438233%3DExisting%2520algorithms%2520for%2520explaining%2520the%2520outputs%2520of%2520image%2520classifiers%2520are%2520based%2520on%2520a%2520variety%2520of%2520approaches%2520and%2520produce%2520explanations%2520that%2520frequently%2520lack%2520formal%2520rigour.%2520On%2520the%2520other%2520hand%252C%2520logic-based%2520explanations%2520are%2520formally%2520and%2520rigorously%2520defined%2520but%2520their%2520computability%2520relies%2520on%2520strict%2520assumptions%2520about%2520the%2520model%2520that%2520do%2520not%2520hold%2520on%2520image%2520classifiers.%250A%2520%2520In%2520this%2520paper%252C%2520we%2520show%2520that%2520causal%2520explanations%252C%2520in%2520addition%2520to%2520being%2520formally%2520and%2520rigorously%2520defined%252C%2520enjoy%2520the%2520same%2520formal%2520properties%2520as%2520logic-based%2520ones%252C%2520while%2520still%2520lending%2520themselves%2520to%2520black-box%2520algorithms%2520and%2520being%2520a%2520natural%2520fi {"title": "CoreEditor: Correspondence-constrained Diffusion for Consistent 3D Editing", "author": "Zhe Zhu and Honghua Chen and Peng Li and Mingqiang Wei", "abstract": "Text-driven 3D editing seeks to modify 3D scenes according to textual descriptions, and most existing approaches tackle this by adapting pre-trained 2D image editors to multi-view inputs. However, without explicit control over multi-view information exchange, they often fail to maintain cross-view consistency, leading to insufficient edits and blurry details. We introduce CoreEditor, a novel framework for consistent text-to-3D editing. The key innovation is a correspondence-constrained attention mechanism that enforces precise interactions between pixels expected to remain consistent throughout the diffusion denoising process. Beyond relying solely on geometric alignment, we further incorporate semantic similarity estimated during denoising, enabling more reliable correspondence modeling and robust multi-view editing. In addition, we design a selective editing pipeline that allows users to choose preferred results from multiple candidates, offering greater flexibility and user control. Extensive experiments show that CoreEditor produces high-quality, 3D-consistent edits with sharper details, significantly outperforming prior methods.", "link": "http://arxiv.org/abs/2508.11603v3", "date": "2026-02-19", "relevancy": 2.2972, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.595}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5731}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5673}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoreEditor%3A%20Correspondence-constrained%20Diffusion%20for%20Consistent%203D%20Editing&body=Title%3A%20CoreEditor%3A%20Correspondence-constrained%20Diffusion%20for%20Consistent%203D%20Editing%0AAuthor%3A%20Zhe%20Zhu%20and%20Honghua%20Chen%20and%20Peng%20Li%20and%20Mingqiang%20Wei%0AAbstract%3A%20Text-driven%203D%20editing%20seeks%20to%20modify%203D%20scenes%20according%20to%20textual%20descriptions%2C%20and%20most%20existing%20approaches%20tackle%20this%20by%20adapting%20pre-trained%202D%20image%20editors%20to%20multi-view%20inputs.%20However%2C%20without%20explicit%20control%20over%20multi-view%20information%20exchange%2C%20they%20often%20fail%20to%20maintain%20cross-view%20consistency%2C%20leading%20to%20insufficient%20edits%20and%20blurry%20details.%20We%20introduce%20CoreEditor%2C%20a%20novel%20framework%20for%20consistent%20text-to-3D%20editing.%20The%20key%20innovation%20is%20a%20correspondence-constrained%20attention%20mechanism%20that%20enforces%20precise%20interactions%20between%20pixels%20expected%20to%20remain%20consistent%20throughout%20the%20diffusion%20denoising%20process.%20Beyond%20relying%20solely%20on%20geometric%20alignment%2C%20we%20further%20incorporate%20semantic%20similarity%20estimated%20during%20denoising%2C%20enabling%20more%20reliable%20correspondence%20modeling%20and%20robust%20multi-view%20editing.%20In%20addition%2C%20we%20design%20a%20selective%20editing%20pipeline%20that%20allows%20users%20to%20choose%20preferred%20results%20from%20multiple%20candidates%2C%20offering%20greater%20flexibility%20and%20user%20control.%20Extensive%20experiments%20show%20that%20CoreEditor%20produces%20high-quality%2C%203D-consistent%20edits%20with%20sharper%20details%2C%20significantly%20outperforming%20prior%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2508.11603v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoreEditor%253A%2520Correspondence-constrained%2520Diffusion%2520for%2520Consistent%25 9%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CoreEditor%3A%20Correspondence-constrained%20Diffusion%20for%20Consistent%203D%20Editing&entry.906535625=Zhe%20Zhu%20and%20Honghua%20Chen%20and%20Peng%20Li%20and%20Mingqiang%20Wei&entry.1292438233=Text-driven%203D%20editing%20seeks%20to%20modify%203D%20scenes%20according%20to%20textual%20descriptions%2C%20and%20most%20existing%20approaches%20tackle%20this%20by%20adapting%20pre-trained%202D%20image%20editors%20to%20multi-view%20inputs.%20However%2C%20without%20explicit%20control%20over%20multi-view%20information%20exchange%2C%20they%20often%20fail%20to%20maintain%20cross-view%20consistency%2C%20leading%20to%20insufficient%20edits%20and%20blurry%20details.%20We%20introduce%20CoreEditor%2C%20a%20novel%20framework%20for%20consistent%20text-to-3D%20editing.%20The%20key%20innovation%20is%20a%20correspondence-constrained%20attention%20mechanism%20that%20enforces%20precise%20interactions%20between%20pixels%20expected%20to%20remain%20consistent%20throughout%20the%20diffusion%20denoising%20process.%20Beyond%20relying%20solely%20on%20geometric%20alignment%2C%20we%20further%20incorporate%20semantic%20similarity%20estimated%20during%20denoising%2C%20enabling%20more%20reliable%20correspondence%20modeling%20and%20robust%20multi-view%20editing.%20In%20addition%2C%20we%20design%20a%20selective%20editing%20pipeline%20that%20allows%20users%20to%20choose%20preferred%20results%20from%20multiple%20candidates%2C%20offering%20greater%20flexibility%20and%20user%20control.%20Extensive%20experiments%20show%20that%20CoreEditor%20produces%20high-quality%2C%203D-consistent%20edits%20with%20sharper%20details%2C%20significantly%20outperforming%20prior%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2508.11603v3&entry.124074799=Read"},
{"title": "CORAL: Correspondence Alignment for Improved Virtual Try-On", "author": "Jiyoung Kim and Youngjin Shin and Siyoon Jin and Dahyun Chung and Jisu Nam and Tongmin Kim and Jongjae Park and Hyeonwoo Kang and Seungryong Kim", "abstract": "Existing methods for Virtual Try-On (VTON) often struggle to preserve fine garment details, especially in unpaired settings where accurate person-garment correspondence is required. These methods do not explicitly enforce person-garment alignment and fail to explain how correspondence emerges within Diffusion Transformers (DiTs). In this paper, we first analyze full 3D attention in DiT-based architecture and reveal that the person-garment correspondence critically depends on precise person-garment query-key matching within the full 3D attention. Building on this insight, we then introduce CORrespondence ALignment (CORAL), a DiT-based framework that explicitly aligns query-key matching with robust external correspondences. CORAL integrates two complementary components: a correspondence distillation loss that aligns reliable matches with person-garment attention, and an entropy minimization loss that sharpens the attention distribution. We further propose a VLM-based evaluation protocol to better reflect human preference. CORAL consistently improves over the baseline, enhancing both global shape transfer and local detail preservation. Extensive ablations validate our design choices.", "link": "http://arxiv.org/abs/2602.17636v1", "date": "2026-02-19", "relevancy": 2.281, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5792}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5639}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CORAL%3A%20Correspondence%20Alignment%20for%20Improved%20Virtual%20Try-On&body=Title%3A%20CORAL%3A%20Correspondence%20Alignment%20for%20Improved%20Virtual%20Try-On%0AAuthor%3A%20Jiyoung%20Kim%20and%20Youngjin%20Shin%20and%20Siyoon%20Jin%20and%20Dahyun%20Chung%20and%20Jisu%20Nam%20and%20Tongmin%20Kim%20and%20Jongjae%20Park%20and%20Hyeonwoo%20Kang%20and%20Seungryong%20Kim%0AAbstract%3A%20Existing%20methods%20for%20Virtual%20Try-On%20%28VTON%29%20often%20struggle%20to%20preserve%20fine%20garment%20details%2C%20especially%20in%20unpaired%20settings%20where%20accurate%20person-garment%20correspondence%20is%20required.%20These%20methods%20do%20not%20explicitly%20enforce%20person-garment%20alignment%20and%20fail%20to%20explain%20how%20correspondence%20emerges%20within%20Diffusion%20Transformers%20%28DiTs%29.%20In%20this%20paper%2C%20we%20first%20analyze%20full%203D%20attention%20in%20DiT-based%20architecture%20and%20reveal%20that%20the%20person-garment%20correspondence%20critically%20depends%20on%20precise%20person-garment%20query-key%20matching%20within%20the%20full%203D%20attention.%20Building%20on%20this%20insight%2C%20we%20then%20introduce%20CORrespondence%20ALignment%20%28CORAL%29%2C%20a%20DiT-based%20framework%20that%20explicitly%20aligns%20query-key%20matching%20with%20robust%20external%20correspondences.%20CORAL%20integrates%20two%20complementary%20components%3A%20a%20correspondence%20distillation%20loss%20that%20aligns%20reliable%20matches%20with%20person-garment%20attention%2C%20and%20an%20entropy%20minimization%20loss%20that%20sharpens%20the%20attention%20distribution.%20We%20further%20propose%20a%20VLM-based%20evaluation%20protocol%20to%20better%20reflect%20human%20preference.%20CORAL%20consistently%20improves%20over%20the%20baseline%2C%20enhancing%20both%20global%20shape%20transfer%20and%20local%20detail%20preservation.%20Extensive%20ablations%20validate%20our%20design%20choices.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17636v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCORAL%253A%2520Correspondence%2520Alignment%2520for%2520Improved%2520Virtual%2520Try-On%26entry.906535625%3DJiyoung%2520Kim%2520and%2520Youngjin%2520Shin%2520and%2520Siyoon%2520Jin%2520and%2520Dahyun%2520Chung%2520and%2520Jisu%2520Nam%2520and%2520Tongmin%2520Kim%2520and%2520Jongjae%2520Park%2520and%2520Hyeonwoo%2520Kang%2520and%2520Seungryong%2520Kim%26entry.1292438233%3DExisting%2520methods%2520for%2520Virtual%2520Try-On%2520%2528VTON%2529%2520often%2520struggle%2520to%2520preserve%2520fine%2520garment%2520details%252C%2520especially%2520in%2520unpaired%2520settings%2520where%2520accurate%2520person-garment%2520correspondence%2520is%2520required.%2520These%2520methods%2520do%2520not%2520explicitly%2520enforce%2520person-garment%2520alignment%2520and%2520fail%2520to%2520explain%2520how%2520correspondence%2520emerges%2520within%2520Diffusion%2520Transformers%2520%2528DiTs%2529.%2520In%2520this%2520paper%252C%2520we%2520first%2520analyze%2520full%25203D%2520attention%2520in%2520DiT-based%2520architecture%2520and%2520reveal%2520that%2520the%2520person-garment%2520correspondence%2520critically%2520depends%2520on%2520precise%2520person-garment%2520query-key%2520matching%2520within%2520the%2520full%25203D%2520attention.%2520Building%2520on%2520this%2520insight%252C%2520we%2520then%2520introduce%2520CORrespondence%2520ALignment%2520%2528CORAL%2529%252C%2520a%2520DiT-based%2520framework%2520that%2520explicitly%2520aligns%2520query-key%2520matching%2520with%2520robust%2520external%2520correspondences.%2520CORAL%2520integrates%2520two%2520complementary%2520components%253A%2520a%2520correspondence%2520distillation%2520loss%2520that%2520aligns%2520reliable%2520matches%2520with%2520person-garment%2520attention%252C%2520and%2520an%2520entropy%2520minimization%2520loss%2520that%2520sharpens%2520the%2520attention%2520distribution.%2520We%2520further%2520propose%2520a%2520VLM-based%2520evaluation%2520protocol%2520to%2520better%2520reflect%2520human%2520preference.%2520CORAL%2520consistently%2520improves%2520over%2520the%2520baseline%252C%2520enhancing%2520both%2520global%2520shape%2520transfer%2520and%2520local%2520detail%2520preservation.%2520Extensive%2520ablations%2520validate%2520our%2520design%2520choices.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17636v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CORAL%3A%20Correspondence%20Alignment%20for%20Improved%20Virtual%20Try-On&entry.906535625=Jiyoung%20Kim%20and%20Youngjin%20Shin%20and%20Siyoon%20Jin%20and%20Dahyun%20Chung%20and%20Jisu%20Nam%20and%20Tongmin%20Kim%20and%20Jongjae%20Park%20and%20Hyeonwoo%20Kang%20and%20Seungryong%20Kim&entry.1292438233=Existing%20methods%20for%20Virtual%20Try-On%20%28VTON%29%20often%20struggle%20to%20preserve%20fine%20garment%20details%2C%20especially%20in%20unpaired%20settings%20where%20accurate%20person-garment%20correspondence%20is%20required.%20These%20methods%20do%20not%20explicitly%20enforce%20person-garment%20alignment%20and%20fail%20to%20explain%20how%20correspondence%20emerges%20within%20Diffusion%20Transformers%20%28DiTs%29.%20In%20this%20paper%2C%20we%20first%20analyze%20full%203D%20attention%20in%20DiT-based%20architecture%20and%20reveal%20that%20the%20person-garment%20correspondence%20critically%20depends%20on%20precise%20person-garment%20query-key%20matching%20within%20the%20full%203D%20attention.%20Building%20on%20this%20insight%2C%20we%20then%20introduce%20CORrespondence%20ALignment%20%28CORAL%29%2C%20a%20DiT-based%20framework%20that%20explicitly%20aligns%20query-key%20matching%20with%20robust%20external%20correspondences.%20CORAL%20integrates%20two%20complementary%20components%3A%20a%20correspondence%20distillation%20loss%20that% {"title": "Boosting Medical Visual Understanding From Multi-Granular Language Learning", "author": "Zihan Li and Yiqing Wang and Sina Farsiu and Paul Kinahan", "abstract": "Recent advances in image-text pretraining have significantly enhanced visual understanding by aligning visual and textual representations. Contrastive Language-Image Pretraining (CLIP) has played a pivotal role in multimodal learning. However, its focus on single-label, single-granularity alignment limits its effectiveness in complex domains such as medical imaging, where images often correspond to multiple high-level labels (e.g., disease categories) across different annotation granularities (e.g., diagnostic description, clinical explanation). To address this, we propose Multi-Granular Language Learning (MGLL), a contrastive learning framework designed to improve both multi-label and cross-granularity alignment. MGLL leverages structured multi-label supervision, integrates textual descriptions across granularities, and introduces soft-label supervision with point-wise constraints to enhance alignment. MGLL employs smooth Kullback-Leibler (KL) divergence to ensure cross-granularity consistency while maintaining computational efficiency as a plug-and-play module for vision-language models. Pretrained on our constructed large-scale multi-granular datasets and evaluated across multiple datasets, MGLL outperforms other state-of-the-art methods in downstream tasks. The code is available at https://github.com/HUANGLIZI/MGLL.", "link": "http://arxiv.org/abs/2511.15943v2", "date": "2026-02-19", "relevancy": 2.2791, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6159}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5429}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5344}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Boosting%20Medical%20Visual%20Understanding%20From%20Multi-Granular%20Language%20Learning&body=Title%3A%20Boosting%20Medical%20Visual%20Understanding%20From%20Multi-Granular%20Language%20Learning%0AAuthor%3A%20Zihan%20Li%20and%20Yiqing%20Wang%20and%20Sina%20Farsiu%20and%20Paul%20Kinahan%0AAbstract%3A%20Recent%20advances%20in%20image-text%20pretraining%20have%20significantly%20enhanced%20visual%20understanding%20by%20aligning%20visual%20and%20textual%20representations.%20Contrastive%20Language-Image%20Pretraining%20%28CLIP%29%20has%20played%20a%20pivotal%20role%20in%20multimodal%20learning.%20However%2C%20its%20focus%20on%20single-label%2C%20single-granularity%20alignment%20limits%20its%20effectiveness%20in%20complex%20domains%20such%20as%20medical%20imaging%2C%20where%20images%20often%20correspond%20to%20multiple%20high-level%20labels%20%28e.g.%2C%20disease%20categories%29%20across%20different%20annotation%20granularities%20%28e.g.%2C%20diagnostic%20description%2C%20clinical%20explanation%29.%20To%20address%20this%2C%20we%20propose%20Multi-Granular%20Language%20Learning%20%28MGLL%29%2C%20a%20contrastive%20learning%20framework%20designed%20to%20improve%20both%20multi-label%20and%20cross-granularity%20alignment.%20MGLL%20leverages%20structured%20multi-label%20supervision%2C%20integrates%20textual%20descriptions%20across%20granularities%2C%20and%20introduces%20soft-label%20supervision%20with%20point-wise%20constraints%20to%20enhance%20alignment.%20MGLL%20employs%20smooth%20Kullback-Leibler%20%28KL%29%20divergence%20to%20ensure%20cross-granularity%20consistency%20while%20maintaining%20computational%20efficiency%20as%20a%20plug-and-play%20module%20for%20vision-language%20models.%20Pretrained%20on%20our%20constructed%20large-scale%20multi-granular%20datasets%20and%20evaluated%20across%20multiple%20datasets%2C%20MGLL%20outperforms%20other%20state-of-the-art%20methods%20in%20downstream%20tasks.%20The%20code%20is%20available%20at%20https%3A//github.com/HUANGLIZI/MGLL.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15943v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoosting%2520Medical%2520Visual%2520Understanding%2520From%2520Multi-Granular%2520Language%2520Learning%26entry.906535625%3DZihan%2520Li%2520and%2520Yiqing%2520Wang%2520and%2520Sina%2520Farsiu%2520and%2520Paul%2520Kinahan%26entry.1292438233%3DRecent%2520advances%2520in%2520image-text%2520pretraining%2520have%2520significantly%2520enhanced%2520visual%2520understanding%2520by%2520aligning%2520visual%2520and%2520textual%2520representations.%2520Contrastive%2520Language-Image%2520Pretraining%2520%2528CLIP%2529%2520has%2520played%2520a%2520pivotal%2520role%2520in%2520multimodal%2520learning.%2520However%252C%2520its%2520focus%2520on%2520single-label%252C%2520single-granularity%2520alignment%2520limits%2520its%2520effectiveness%2520in%2520complex%2520domains%2520such%2520as%2520medical%2520imaging%252C%2520where%2520images%2520often%2520correspond%2520to%2520multiple%2520high-level%2520labels%2520%2528e.g.%252C%2520disease%2520categories%2529%2520across%2520different%2520annotation%2520granularities%2520%2528e.g.%252C%2520diagnostic%2520description%252C%2520clinical%2520explanation%2529.%2520To%2520address%2520this%252C%2520we%2520propose%2520Multi-Granular%2520Language%2520Learning%2520%2528MGLL%2529%252C%2520a%2520contrastive%2520learning%2520framework%2520designed%2520to%2520improve%2520both%2520multi-label%2520and%2520cross-granularity%2520alignment.%2520MGLL%2520leverages%2520structured%2520multi-label%2520supervision%252C%2520integrates%2520textual%2520descriptions%2520across%2520granularities%252C%2520and%2520introduces%2520soft-label%2520supervision%2520with%2520point-wise%2520constraints%2520to%2520enhance%2520alignment.%2520MGLL%2520employs%2520smooth%2520Kullback-Leibler%2520%2528KL%2529%2520divergence%2520to%2520ensure%2520cross-granularity%2520consistency%2520while%2520maintaining%2520computational%2520efficiency%2520as%2520a%2520plug-and-play%2520module%2520for%2520vision-language%2520models.%2520Pretrained%2520on%2520our%2520constructed%2520large-scale%2520multi-granular%2520datasets%2520and%2520evaluated%2520across%2520multiple%2520datasets%252C%2520MGLL%2520outperforms%2520other%2520state-of-the-art%2520methods%2520in%2520downstream%2520tasks.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/HUANGLIZI/MGLL.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.15943v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Boosting%20Medical%20Visual%20Understanding%20From%20Multi-Granular%20Language%20Learning&entry.906535625=Zihan%20Li%20and%20Yiqing%20Wang%20and%20Sina%20Farsiu%20and%20Paul%20Kinahan&entry.1292438233=Recent%20advances%20in%20image-text%20pretraining%20have%20significantly%20enhanced%20visual%20understanding%20by%20aligning%20visual%20and%20textual%20representations.%20Contrastive%20Language-Image%20Pretraining%20%28CLIP%29%20has%20played%20a%20pivotal%20role%20in%20multimodal%20learning.%20However%2C%20its%20focus%20on%20single-label%2C%20single-granularity%20alignment%20limits%20its%20effectiveness%20in%20complex%20domains%20such%20as%20medical%20imaging%2C%20where%20images%20often%20correspond%20to%20multiple%20high-level%20labels%20%28e.g.%2C%20disease%20categories%29%20across%20different%20annotation%20granularities%20%28e.g.%2C%20diagnostic%20description%2C%20clinical%20explanation%29.%20To%20address%20this%2C%20we%20propose%20Multi-Granular%20Language%20Learning%20%28MGLL%29%2C%20a%20contrastive%20learning%20framework%20designed%20to%20improve%20both%20multi-label%20and%20cross-granularity%20alignment.%20MGLL%20leverages%20structured%20multi-label%20supervision%2C%20integrates%20textual%20descriptions%20across%20granularities%2C%20and%20introduces%20soft-label%20supervision%20with%20point-wise%20constraints%20to%20enhance%20alignment.%20MGLL%20employs%20smooth%20Kullback-Leibler%20%28KL%29%20divergence%20to%20ensure%20cross-granularity%20consistency%20while%20maintaining%20computational%20efficiency%20as%20a%20plug-and-play%20module%20for%20vision-language%20models.%20Pretrained%20on%20our%20constructed%20large-scale%20multi-granular%20datasets%20and%20evaluated%20across%20multiple%20datasets%2C%20MGLL%20outperforms%20other%20state-of-the-art%20methods%20in%20downstream%20tasks.%20The%20code%20is%20available%20at%20https%3A//github.com/HUANGLIZI/MGLL.&entry.1838667208=http%3A//arxiv.org/abs/2511.15943v2&entry.124074799=Read"},
{"title": "IRIS: Learning-Driven Task-Specific Cinema Robot Arm for Visuomotor Motion Control", "author": "Qilong Cheng and Matthew Mackay and Ali Bereyhi", "abstract": "Robotic camera systems enable dynamic, repeatable motion beyond human capabilities, yet their adoption remains limited by the high cost and operational complexity of industrial-grade platforms. We present the Intelligent Robotic Imaging System (IRIS), a task-specific 6-DOF manipulator designed for autonomous, learning-driven cinematic motion control. IRIS integrates a lightweight, fully 3D-printed hardware design with a goal-conditioned visuomotor imitation learning framework based on Action Chunking with Transformers (ACT). The system learns object-aware and perceptually smooth camera trajectories directly from human demonstrations, eliminating the need for explicit geometric programming. The complete platform costs under $1,000 USD, supports a 1.5 kg payload, and achieves approximately 1 mm repeatability. Real-world experiments demonstrate accurate trajectory tracking, reliable autonomous execution, and generalization across diverse cinematic motions.", "link": "http://arxiv.org/abs/2602.17537v1", "date": "2026-02-19", "relevancy": 2.2789, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5831}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5654}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5581}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IRIS%3A%20Learning-Driven%20Task-Specific%20Cinema%20Robot%20Arm%20for%20Visuomotor%20Motion%20Control&body=Title%3A%20IRIS%3A%20Learning-Driven%20Task-Specific%20Cinema%20Robot%20Arm%20for%20Visuomotor%20Motion%2 {"title": "Convergence Analysis of Two-Layer Neural Networks under Gaussian Input Masking", "author": "Afroditi Kolomvaki and Fangshuo Liao and Evan Dramko and Ziyun Guang and Anastasios Kyrillidis", "abstract": "We investigate the convergence guarantee of two-layer neural network training with Gaussian randomly masked inputs. This scenario corresponds to Gaussian dropout at the input level, or noisy input training common in sensor networks, privacy-preserving training, and federated learning, where each user may have access to partial or corrupted features. Using a Neural Tangent Kernel (NTK) analysis, we demonstrate that training a two-layer ReLU network with Gaussian randomly masked inputs achieves linear convergence up to an error region proportional to the mask's variance. A key technical contribution is resolving the randomness within the non-linear activation, a problem of independent interest.", "link": "http://arxiv.org/abs/2602.17423v1", "date": "2026-02-19", "relevancy": 2.2746, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4587}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4549}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4512}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Convergence%20Analysis%20of%20Two-Layer%20Neural%20Networks%20under%20Gaussian%20Input%20Masking&body=Title%3A%20Convergence%20Analysis%20of%20Two-Layer%20Neural%20Networks%20under%20Gaussian%20Input%20Masking%0AAuthor%3A%20Afroditi%20Kolomvaki%20and%20Fangshuo%20Liao%20and%20Evan%20Dramko%20and%20Ziyun%20Guang%20and%20Anastasios%20Kyrillidis%0AAbstract%3A%20We%20investigate%20the%20convergence%20guarantee%20of%20two-layer%20neural%20network%20training%20with%20Gaussian%20randomly%20m {"title": "HiMAP: History-aware Map-occupancy Prediction with Fallback", "author": "Yiming Xu and Yi Yang and Hao Cheng and Monika Sester", "abstract": "Accurate motion forecasting is critical for autonomous driving, yet most predictors rely on multi-object tracking (MOT) with identity association, assuming that objects are correctly and continuously tracked. When tracking fails due to, e.g., occlusion, identity switches, or missed detections, prediction quality degrades and safety risks increase. We present \\textbf{HiMAP}, a tracking-free, trajectory prediction framework that remains reliable under MOT failures. HiMAP converts past detections into spatiotemporally invariant historical occupancy maps and introduces a historical query module that conditions on the current agent state to iteratively retrieve agent-specific history from unlabeled occupancy representations. The retrieved history is summarized by a temporal map embedding and, together with the final query and map context, drives a DETR-style decoder to produce multi-modal future trajectories. This design lifts identity reliance, supports streaming inference via reusable encodings, and serves as a robust fallback when tracking is unavailable. On Argoverse~2, HiMAP achieves performance comparable to tracking-based methods while operating without IDs, and it substantially outperforms strong baselines in the no-tracking setting, yielding relative gains of 11\\% in FDE, 12\\% in ADE, and a 4\\% reduction in MR over a fine-tuned QCNet. Beyond aggregate metrics, HiMAP delivers stable forecasts for all agents simultaneously without waiting for tracking to recover, highlighting its practical value for safety-critical autonomy. The code is available under: https://github.com/XuYiMing83/HiMAP.", "link": "http://arxiv.org/abs/2602.17231v1", "date": "2026-02-19", "relevancy": 2.2657, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6012}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.575}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiMAP%3A%20History-aware%20Map-occupancy%20Prediction%20with%20Fallback&body=Title%3A%20HiMAP%3A%20History-aware%20Map-occupancy%20Prediction%20with%20Fallback%0AAuthor%3A%20Yiming%20Xu%20and%20Yi%20Yang%20and%20Hao%20Cheng%20and%20Monika%20Sester%0AAbstract%3A%20Accurate%20motion%20forecasting%20is%20critical%20for%20autonomous%20driving%2C%20yet%20most%20predictors%20rely%20on%20multi-object%20tracking%20%28MOT%29%20with%20identity%20association%2C%20assuming%20that%20objects%20are%20correctly%20and%20continuously%20tracked.%20When%20tracking%20fails%20due%20to%2C%20e.g.%2C%20occlusion%2C%20identity%20switches%2C%20or%20missed%20detections%2C%20prediction%20quality%20degrades%20and%20safety%20risks%20increase.%20We%20present%20%5Ctextbf%7BHiMAP%7D%2C%20a%20tracking-free%2C%20trajectory%20prediction%20framework%20that%20remains%20reliable%20under%20MOT%20failures.%20HiMAP%20converts%20past%20detections%20into%20spatiotemporally%20invariant%20historical%20occupancy%20maps%20and%20introduces%20a%20historical%20query%20module%20that%20conditions%20on%20the%20current%20agent%20state%20to%20iteratively%20retrieve%20agent-specific%20history%20from%20unlabeled%20occupancy%20representations.%20The%20retrieved%20history%20is%20summarized%20by%20a%20temporal%20map%20embedding%20and%2C%20together%20with%20the%20final%20query%20and%20map%20context%2C%20drives%20a%20DETR-style%20decoder%20to%20produce%20multi-modal%20future%20trajectories.%20This%20design%20lifts%20identity%20reliance%2C%20supports%20streaming%20inference%20via%20reusable%20encodings%2C%20and%20serves%20as%20a%20robust%20fallback%20when%20tracking%20is%20unavailable.%20On%20Argoverse~2%2C%20HiMAP%20achieves%20performance%20comparable%20to%20tracking-based%20methods%20while%20operating%20without%20IDs%2C%20and%20it%20substantially%20outperforms%20strong%20baselines%20in%20the%20no-tracking%20setting%2C%20yielding%20relative%20gains%20of%2011%5C%25%20in%20FDE%2C%2012%5C%25%20in%20ADE%2C%20and%20a%204%5C%25%20reduction%20in%20MR%20over%20a%20fine-tuned%20QCNet.%20Beyond%20aggregate%20metrics%2C%20HiMAP%20delivers%20stable%20forecasts%20for%20all%20agents%20simultaneously%20without%20waiting%20for%20tracking%20to%20recover%2C%20highlighting%20its%20practical%20value%20for%20safety-critical%20autonomy.%20The%20code%20is%20available%20under%3A%20https%3A//github.com/XuYiMing83/HiMAP.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17231v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiMAP%253A%2520History-aware%2520Map-occupancy%2520Prediction%2520with%2520Fallback%26entry.906535625%3DYiming%2520Xu%2520and%2520Yi%2520Yang%2520and%2520Hao%2520Cheng%2520and%2520Monika%2520Sester%26entry.1292438233%3DAccurate%2520motion%2520forecasting%2520is%2520critical%2520for%2520autonomous%2520driving%252C%2520yet%2520most%2520predictors%2520rely%2520on%2520multi-object%2520tracking%2520%2528MOT%2529%2520with%2520identity%2520association%252C%2520assuming%2520that%2520objects%2520are%2520correctly%2520and%2520continuously%2520tracked.%2520When%2520tracking%2520fails%2520due%2520to%252C%2520e.g.%252C%2520occlusion%252C%2520identity%2520switches%252C%2520or%2520missed%2520detections%252C%2520prediction%2520quality%2520degrades%2520and%2520safety%2520risks%2520increase.%2520We%2520present%2520%255Ctextbf%257BHiMAP%257D%252C%2520a%2520tracking-free%252C%2520trajectory%2520prediction%2520framework%2520that%2520remains%2520reliable%2520under%2520MOT%2 {"title": "2Mamba2Furious: Linear in Complexity, Competitive in Accuracy", "author": "Gabriel Mongaras and Eric C. Larson", "abstract": "Linear attention transformers have become a strong alternative to softmax attention due to their efficiency. However, linear attention tends to be less expressive and results in reduced accuracy compared to softmax attention. To bridge the accuracy gap between softmax attention and linear attention, we manipulate Mamba-2, a very strong linear attention variant. We first simplify Mamba-2 down to its most fundamental and important components, evaluating which specific choices make it most accurate. From this simplified Mamba variant (Mamba-2S), we improve the A-mask and increase the order of the hidden state, resulting in a method, which we call 2Mamba, that is nearly as accurate as softmax attention, yet much more memory efficient for long context lengths. We also investigate elements to Mamba-2 that help surpass softmax attention accuracy. Code is provided for all our experiments", "link": "http://arxiv.org/abs/2602.17363v1", "date": "2026-02-19", "relevancy": 2.2586, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4585}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.455}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4417}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%202Mamba2Furious%3A%20Linear%20in%20Complexity%2C%20Competitive%20in%20Accuracy&body=Title%3A%202Mamba2Furious%3A%20Linear%20in%20Complexity%2C%20Competitive%20in%20Accuracy%0AAuthor%3A%20Gabriel%20Mongaras%20and%20Eric%20C.%20Larson%0AAbstract%3A%20Linear%20attention%20transformers%20have%20become%20a%20strong%20alternative%20to%20softmax%20attention%20due%20to%20their%20efficiency.%20However%2C%20linear%20attention%20tends%20to%20be%20less%20expressive%20and%20results%20in%20reduced%20accuracy%20compared%20to%20softmax%20attention.%20To%20bridge%20the%20accuracy%20gap%20between%20softmax%20attention%20and%20linear%20attention%2C%20we%20manipulate%20Mamba-2%2C%20a%20very%20strong%20linear%20attention%20variant.%20We%20first%20simplify%20Mamba-2%20down%20to%20its%20most%20fundamental%20and%20important%20components%2C%20evaluating%20which%20specific%20choices%20make%20it%20most%20accurate.%20From%20this%20simplified%20Mamba%20variant%20%28Mamba-2S%29%2C%20we%20improve%20the%20A-mask%20and%20increase%20the%20order%20of%20the%20hidden%20state%2C%20resulting%20in%20a%20method%2C%20which%20we%20call%202Mamba%2C%20that%20is%20nearly%20as%20accurate%20as%20softmax%20attention%2C%20yet%20much%20more%20memory%20efficient%20for%20long%20context%20lengths.%20We%20also%20investigate%20elements%20to%20Mamba-2%20that%20help%20surpass%20softmax%20attention%20accuracy.%20Code%20is%20provided%20for%20all%20our%20experiments%0ALink%3A%20http%3A//arxiv.org/abs/2602.17363v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D2Mamba2Furious%253A%2520Linear%2520in%2520Complexity%252C%2520Competitive%2520in%2520Accuracy%26entry.906535625%3DGabriel%2520Mongaras%2520and%2520Eric%2520C.%2520Larson%26entry.1292438233%3DLinear%2520attention%2520transformers%2520have%2520become%2520a%2520strong%2520alternative%2520to%2520softmax%2520attention%2520due%2520to%2520their%2520efficiency.%2520However%252C%2520linear%2520attention%2520tends%2520to%2520be%2520less%2520expressive%2520and%2520results%2520in%2520reduced%2520accuracy%2520compared%2520to%2520softmax%2520attention.%2520To%2520bridge%2520the%2520accuracy%2520gap%2520between%2520softmax%2520attention%2520and%2520linear%2520attention%252C%2520we%2520manipulate% {"title": "Contact-Anchored Proprioceptive Odometry for Quadruped Robots", "author": "Minxing Sun and Yao Mao", "abstract": "Reliable odometry for legged robots without cameras or LiDAR remains challenging due to IMU drift and noisy joint velocity sensing. This paper presents a purely proprioceptive state estimator that uses only IMU and motor measurements to jointly estimate body pose and velocity, with a unified formulation applicable to biped, quadruped, and wheel-legged robots. The key idea is to treat each contacting leg as a kinematic anchor: joint-torque--based foot wrench estimation selects reliable contacts, and the corresponding footfall positions provide intermittent world-frame constraints that suppress long-term drift. To prevent elevation drift during extended traversal, we introduce a lightweight height clustering and time-decay correction that snaps newly recorded footfall heights to previously observed support planes. To improve foot velocity observations under encoder quantization, we apply an inverse-kinematics cubature Kalman filter that directly filters foot-end velocities from joint angles and velocities. The implementation further mitigates yaw drift through multi-contact geometric consistency and degrades gracefully to a kinematics-derived heading reference when IMU yaw constraints are unavailable or unreliable. We evaluate the method on four quadruped platforms (three Astrall robots and a Unitree Go2 EDU) using closed-loop trajectories. On Astrall point-foot robot~A, a $\\sim$200\\,m horizontal loop and a $\\sim$15\\,m vertical loop return with 0.1638\\,m and 0.219\\,m error, respectively; on wheel-legged robot~B, the corresponding errors are 0.2264\\,m and 0.199\\,m. On wheel-legged robot~C, a $\\sim$700\\,m horizontal loop yields 7.68\\,m error and a $\\sim$20\\,m vertical loop yields 0.540\\,m error. Unitree Go2 EDU closes a $\\sim$120\\,m horizontal loop with 2.2138\\,m error and a $\\sim$8\\,m vertical loop with less than 0.1\\,m vertical error. github.com/ShineMinxing/Ros2Go2Estimator.git", "link": "http://arxiv.org/abs/2602.17393v1", "date": "2026-02-19", "relevancy": 2.2378, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6444}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5758}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Contact-Anchored%20Proprioceptive%20Odometry%20for%20Quadruped%20Robots&body=Title%3A%20Contact-Anchored%20Proprioceptive%20Odometry%20for%20Quadruped%20Robots%0AAuthor%3A%20Minxing%20Sun%20and%20Yao%20Mao%0AAbstract%3A%20Reliable%20odometry%20for%20legged%20robots%20without%20cameras%20or%20LiDAR%20remains%20challenging%20due%20to%20IMU%20drift%20and%20noisy%20joint%20velocity%20sensing.%20This%20paper%20presents%20a%20purely%20proprioceptive%20state%20estimator%20that%20uses%20only%20IMU%20and%20motor%20measurements%20to%20jointly%20estimate%20body%20pose%20and%20velocity%2C%20with%20a%20unified%20formulation%20applicable%20to%20biped%2C%20quadruped%2C%20and%20wheel-legged%20robots.%20The%20key%20idea%20is%20to%20treat%20each%20contacting%20leg%20as%20a%20kinematic%20anchor%3A%20joint-torque--based%20foot%20wrench%20estimation%20selects%20reliable%20contacts%2C%20and%20the%20corresponding%20footfall%20positions%20provide%20intermittent%20world-frame%20constraints%20that%20suppress%20long-term%20drift.%20To%20prevent%20elevation%20drift%20during%20extended%20traversal%2C%20we%20introduce%20a%20lightweight%20height%20clustering%20and%20time-decay%20correction%20that%20snaps%20newly%20recorded%20footfall%20heights%20to%20previously%20observed%20support%20planes.%20To%20improve%20foot%20velocity%20observations%20under%20encoder%20quantization%2C%20we%20apply%20an%20inverse-kinematics%20cubature%20Kalman%20filter%20that%20directly%20filters%20foot-end%20velocities%20from%20joint%20angles%20and%20velocities.%20The%20implementation%20further%20mitigates%20yaw%20drift%20through%20multi-contact%20geometric%20consistency%20and%20degrades%20gracefully%20to%20a%20kinematics-derived%20heading%20reference%20when%20IMU%20yaw%20constraints%20are%20unavailable%20or%20unreliable.%20We%20evaluate%20the%20method%20on%20four%20quadruped%20platforms%20%28three%20Astrall%20robots%20and%20a%20Unitree%20Go2%20EDU%29%20using%20closed-loop%20trajectories.%20On%20Astrall%20point-foot%20robot~A%2C%20a%20%24%5Csim%24200%5C%2Cm%20horizontal%20loop%20and%20a%20%24%5Csim%2415%5C%2Cm%20vertical%20loop%20return%20with%200.1638%5C%2Cm%20and%200.219%5C%2Cm%20error%2C%20respectively%3B%20on%20wheel-legged%20robot~B%2C%20the%20corresponding%20errors%20are%200.2264%5C%2Cm%20and%200.199%5C%2Cm.%20On%20wheel-legged%20robot~C%2C%20a%20%24%5Csim%24700%5C%2Cm%20horizontal%20loop%20yields%207.68%5C%2Cm%20error%20and%20a%20%24%5Csim%2420%5C%2Cm%20vertical%20loop%20yields%200.540%5C%2Cm%20error.%20Unitree%20Go2%20EDU%20closes%20a%20%24%5Csim%24120%5C%2Cm%20horizontal%20loop%20with%202.2138%5C%2Cm%20error%20and%20a%20%24%5Csim%248%5C%2Cm%20vertical%20loop%20with%20less%20than%200.1%5C%2Cm%20vertical%20error.%20github.com/ShineMinxing/Ros2Go2Estimator.git%0ALink%3A%20http%3A//arxiv.org/abs/2602.17393v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContact-Anchored%2520Proprioceptive%2520Odometry%2520for%2520Quadruped%2520Robots%26entry.906535625%3DMinxing%2520Sun%2520and%2520Yao%2520Mao%26entry.1292438233%3DReliable%2520odometry%2520for%2520legged%2520robots%2520without%2520cameras%2520or%2520LiDAR%2520remains%2520challenging%2520due%2520to% {"title": "HPMixer: Hierarchical Patching for Multivariate Time Series Forecasting", "author": "Jung Min Choi and Vijaya Krishna Yalavarthi and Lars Schmidt-Thieme", "abstract": "In long-term multivariate time series forecasting, effectively capturing both periodic patterns and residual dynamics is essential. To address this within standard deep learning benchmark settings, we propose the Hierarchical Patching Mixer (HPMixer), which models periodicity and residuals in a decoupled yet complementary manner. The periodic component utilizes a learnable cycle module [7] enhanced with a nonlinear channel-wise MLP for greater expressiveness. The residual component is processed through a Learnable Stationary Wavelet Transform (LSWT) to extract stable, shift-invariant frequency-domain representations. Subsequently, a channel-mixing encoder models explicit inter-channel dependencies, while a two-level non-overlapping hierarchical patching mechanism captures coarse- and fine-scale residual variations. By integrating decoupled periodicity modeling with structured, multi-scale residual learning, HPMixer provides an effective framework. Extensive experiments on standard multivariate benchmarks demonstrate that HPMixer achieves competitive or state-of-the-art performance compared to recent baselines.", "link": "http://arxiv.org/abs/2602.16468v2", "date": "2026-02-19", "relevancy": 2.2317, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4661}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4391}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HPMixer%3A%20Hierarchical%20 v7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HPMixer%3A%20Hierarchical%20Patching%20for%20Multivariate%20Time%20Series%20Forecasting&entry.906535625=Jung%20Min%20Choi%20and%20Vijaya%20Krishna%20Yalavarthi%20and%20Lars%20Schmidt-Thieme&entry.1292438233=In%20long-term%20multivariate%20time%20series%20forecasting%2C%20effectively%20capturing%20both%20periodic%20patterns%20and%20residual%20dynamics%20is%20essential.%20To%20address%20this%20within%20standard%20deep%20learning%20benchmark%20settings%2C%20we%20propose%20the%20Hierarchical%20Patching%20Mixer%20%28HPMixer%29%2C%20which%20models%20periodicity%20and%20residuals%20in%20a%20decoupled%20yet%20complementary%20manner.%20The%20periodic%20component%20utilizes%20a%20learnable%20cycle%20module%20%5B7%5D%20enhanced%20with%20a%20nonlinear%20channel-wise%20MLP%20for%20greater%20expressiveness.%20The%20residual%20component%20is%20processed%20through%20a%20Learnable%20Stationary%20Wavelet%20Transform%20%28LSWT%29%20to%20extract%20stable%2C%20shift-invariant%20frequency-domain%20representations.%20Subsequently%2C%20a%20channel-mixing%20encoder%20models%20explicit%20inter-channel%20dependencies%2C%20while%20a%20two-level%20non-overlapping%20hierarchical%20patching%20mechanism%20captures%20coarse-%20and%20fine-scale%20residual%20variations.%20By%20integrating%20decoupled%20periodicity%20modeling%20with%20structured%2C%20multi-scale%20residual%20learning%2C%20HPMixer%20provides%20an%20effective%20framework.%20Extensive%20experiments%20on%20standard%20multivariate%20benchmarks%20demonstrate%20that%20HPMixer%20achieves%20competitive%20or%20state-of-the-art%20performance%20compared%20to%20recent%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2602.16468v2&entry.124074799=Read"},
{"title": "Improved Object-Centric Diffusion Learning with Registers and Contrastive Alignment", "author": "Bac Nguyen and Yuhta Takida and Naoki Murata and Chieh-Hsin Lai and Toshimitsu Uesaka and Stefano Ermon and Yuki Mitsufuji", "abstract": "Slot Attention (SA) with pretrained diffusion models has recently shown promise for object-centric learning (OCL), but suffers from slot entanglement and weak alignment between object slots and image content. We propose Contrastive Object-centric Diffusion Alignment (CODA), a simple extension that (i) employs register slots to absorb residual attention and reduce interference between object slots, and (ii) applies a contrastive alignment loss to explicitly encourage slot-image correspondence. The resulting training objective serves as a tractable surrogate for maximizing mutual information (MI) between slots and inputs, strengthening slot representation quality. On both synthetic (MOVi-C/E) and real-world datasets (VOC, COCO), CODA improves object discovery (e.g., +6.1% FG-ARI on COCO), property prediction, and compositional image generation over strong baselines. Register slots add negligible overhead, keeping CODA efficient and scalable. These results indicate potential applications of CODA as an effective framework for robust OCL in complex, real-world scenes. Code and pretrained models are available at https://github.com/sony/coda.", "link": "http://arxiv.org/abs/2601.01224v2", "date": "2026-02-19", "relevancy": 2.2219, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5645}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5565}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5461}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improved%20Object-Centric%20Diffusion%20Learning%20with%20Registers%20and%20Contrastive%20Alignment&body=Title%3A%20Improved%20Object-Centric%20Diffusion%20Learning%20with%20Registers%20and%20Contrastive%20Alignment%0AAuthor%3A%20Bac%20Nguyen%20and%20Yuhta%20Takida%20and%20Naoki%20Murata%20and%20Chieh-Hsin%20Lai%20and%20Toshimitsu%20Uesaka%20and%20Stefano%20Ermon%20and%20Yuki%20Mitsufuji%0AAbstract%3A%20Slot%20Attention%20%28SA%29%20with%20pretrained%20diffusion%20models%20has%20recently%20shown%20promise%20for%20object-centric%20learning%20%28OCL%29%2C%20but%20suffers%20from%20slot%20entanglement%20and%20weak%20alignment%20between%20object%20slots%20and%20image%20content.%20We%20propose%20Contrastive%20Object-centric%20Diffusion%20Alignment%20%28CODA%29%2C%20a%20simple%20extension%20that%20%28i%29%20employs%20register%20slots%20to%20absorb%20residual%20attention%20and%20reduce%20interference%20between%20object%20slots%2C%20and%20%28ii%29%20applies%20a%20contrastive%20alignment%20loss%20to%20explicitly%20encourage%20slot-image%20correspondence.%20The%20resulting%20training%20objective%20serves%20as%20a%20tractable%20surrogate%20for%20maximizing%20mutual%20information%20%28MI%29%20between%20slots%20and%20inputs%2C%20strengthening%20slot%20representation%20quality.%20On%20both%20synthetic%20%28MOVi-C/E%29%20and%20real-world%20datasets%20%28VOC%2C%20COCO%29%2C%20CODA%20improves%20object%20discovery%20%28e.g.%2C%20%2B6.1%25%20FG-ARI%20on%20COCO%29%2C%20property%20prediction%2C%20and%20compositional%20image%20generation%20over%20strong%20baselines.%20Register%20slots%20add%20negligible%20overhead%2C%20keeping%20CODA%20efficient%20and%20scalable.%20These%20results%20indicate%20potential%20applications%20of%20CODA%20as%20an%20effective%20framework%20for%20robust%20OCL%20in%20complex%2C%20real-world%20scenes.%20Code%20and%20pretrained%20models%20are%20available%20at%20https%3A//github.com/sony/coda.%0ALink%3A%20http%3A//arxiv.org/abs/2601.01224v2%0 2C%2520keeping%2520CODA%2520efficient%2520and%2520scalable.%2520These%2520results%2520indicate%2520potential%2520applications%2520of%2520CODA%2520as%2520an%2520effective%2520framework%2520for%2520robust%2520OCL%2520in%2520complex%252C%2520real-world%2520scenes.%2520Code%2520and%2520pretrained%2520models%2520are%2520available%2520at%2520https%253A//github.com/sony/coda.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.01224v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Improved%20Object-Centric%20Diffusion%20Learning%20with%20Registers%20and%20Contrastive%20Alignment&entry.906535625=Bac%20Nguyen%20and%20Yuhta%20Takida%20and%20Naoki%20Murata%20and%20Chieh-Hsin%20Lai%20and%20Toshimitsu%20Uesaka%20and%20Stefano%20Ermon%20and%20Yuki%20Mitsufuji&entry.1292438233=Slot%20Attention%20%28SA%29%20with%20pretrained%20diffusion%20models%20has%20recently%20shown%20promise%20for%20object-centric%20learning%20%28OCL%29%2C%20but%20suffers%20from%20slot%20entanglement%20and%20weak%20alignment%20between%20object%20slots%20and%20image%20content.%20We%20propose%20Contrastive%20Object-centric%20Diffusion%20Alignment%20%28CODA%29%2C%20a%20simple%20extension%20that%20%28i%29%20employs%20register%20slots%20to%20absorb%20residual%20attention%20and%20reduce%20interference%20between%20object%20slots%2C%20and%20%28ii%29%20applies%20a%20contrastive%20alignment%20loss%20to%20explicitly%20encourage%20slot-image%20correspondence.%20The%20resulting%20training%20objective%20serves%20as%20a%20tractable%20surrogate%20for%20maximizing%20mutual%20information%20%28MI%29%20between%20slots%20and%20inputs%2C%20strengthening%20slot%20representation%20quality.%20On%20both%20synthetic%20%28MOVi-C/E%29%20and%20real-world%20datasets%20%28VOC%2C%20COCO%29%2C%20CODA%20improves%20object%20discovery%20%28e.g.%2C%20%2B6.1%25%20FG-ARI%20on%20COCO%29%2C%20property%20prediction%2C%20and%20compositional%20image%2

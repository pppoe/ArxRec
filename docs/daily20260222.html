ective%20high-recall%20safety%20guidance.%20Across%20multiple%20model%20families%20and%20attack%20scenarios%2C%20adaptive%20regularization%20with%20either%20risk%20estimation%20approach%20consistently%20lowers%20attack%20success%20rate%20compared%20to%20standard%20fine-tuning%2C%20preserves%20downstream%20performance%2C%20and%20adds%20no%20inference-time%20cost.%20This%20work%20demonstrates%20a%20principled%20mechanism%20for%20maintaining%20safety%20without%20sacrificing%20utility.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17546v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Stay%2520Safe%253A%2520Adaptive%2520Regularization%2520Against%2520Safety%2520Degradation%2520during%2520Fine-Tuning%26entry.906535625%3DJyotin%2520Goel%2520and%2520Souvik%2520Maji%2520and%2520Pratik%2520Mazumder%26entry.1292438233%3DInstruction-following%2520language%2520models%2520are%2520trained%2520to%2520be%2520helpful%2520and%2520safe%252C%2520yet%2520their%2520safety%2520behavior%2520can%2520deteriorate%2520under%2520benign%2520fine-tuning%2520and%2520worsen%2520under%2520adversarial%2520updates.%2520Existing%2520defenses%2520often%2520offer%2520limited%2520protection%2520or%2520force%2520a%2520trade-off%2520between%2520safety%2520and%2520utility.%2520We%2520introduce%2520a%2520training%2520framework%2520that%2520adapts%2520regularization%2520in%2520response%2520to%2520safety%2520risk%252C%2520enabling%2520models%2520to%2520remain%2520aligned%2520throughout%2520fine-tuning.%2520To%2520estimate%2520safety%2520risk%2520at%2520training%2520time%252C%2520we%2520explore%2520two%2520distinct%2520approaches%253A%2520a%2520judge-based%2520Safety%2520Critic%2520that%2520assigns%2520high-level%2520harm%2520scores%2520to%2520training%2520batches%252C%2520and%2520an%2520activation-based%2520risk%2520predictor%2520built%2520with%2520a%2520lightweight%2520classifier%2520trained%2520on%2520interme {"title": "SceneVGGT: VGGT-based online 3D semantic SLAM for indoor scene understanding and navigation", "author": "Anna Gelencs\u00e9r-Horv\u00e1th and Gergely Dinya and Dorka Bogl\u00e1rka Er\u0151s and P\u00e9ter Hal\u00e1sz and Islam Muhammad Muqsit and Krist\u00f3f Karacs", "abstract": "We present SceneVGGT, a spatio-temporal 3D scene understanding framework that combines SLAM with semantic mapping for autonomous and assistive navigation. Built on VGGT, our method scales to long video streams via a sliding-window pipeline. We align local submaps using camera-pose transformations, enabling memory- and speed-efficient mapping while preserving geometric consistency. Semantics are lifted from 2D instance masks to 3D objects using the VGGT tracking head, maintaining temporally coherent identities for change detection. As a proof of concept, object locations are projected onto an estimated floor plane for assistive navigation. The pipeline's GPU memory usage remains under 17 GB, irrespectively of the length of the input sequence and achieves competitive point-cloud performance on the ScanNet++ benchmark. Overall, SceneVGGT ensures robust semantic identification and is fast enough to support interactive assistive navigation with audio feedback.", "link": "http://arxiv.org/abs/2602.15899v2", "date": "2026-02-19", "relevancy": 1.9949, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6938}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6311}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6267}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SceneVGGT%3A%20VGGT-based%20online%203D%20semantic%20SLAM%20for%20indoor%20scene%20understanding%20and%20navigation&body= {"title": "LORA-CRAFT: Cross-layer Rank Adaptation via Frozen Tucker Decomposition of Pre-trained Attention Weights", "author": "Kasun Dewage and Marianna Pensky and Suranadi De Silva and Shankadeep Mondal", "abstract": "We introduce CRAFT (Cross-layer Rank Adaptation via Frozen Tucker), a parameter-efficient fine-tuning (PEFT) method that applies Tucker tensor decomposition to pre-trained attention weight matrices stacked across transformer layers and trains only small square adaptation matrices on the resulting frozen Tucker factors. Existing tensor-based PEFT methods decompose gradient updates: LoTR applies Tucker decomposition with shared factor matrices, while SuperLoRA groups and reshapes $\u0394W$ across layers before applying Tucker decomposition. Separately, methods like PiSSA apply SVD to pre-trained weights but operate independently per layer. CRAFT bridges these two lines of work: it performs full Tucker decomposition via Higher-Order SVD (HOSVD) directly on pre-trained weights organized as cross-layer 3D tensors, freezes all resulting factors, and adapts the model through lightweight trainable transformations applied to each factor matrix. Experiments on the GLUE benchmark using RoBERTa-base and RoBERTa-large demonstrate that CRAFT achieves competitive performance with existing methods while requiring only 41K Tucker adaptation parameters--a count independent of model dimension and depth at fixed Tucker ranks.", "link": "http://arxiv.org/abs/2602.17510v1", "date": "2026-02-19", "relevancy": 1.993, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5196}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.492}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4793 {"title": "Systematic Evaluation of Single-Cell Foundation Model Interpretability Reveals Attention Captures Co-Expression Rather Than Unique Regulatory Signal", "author": "Ihor Kendiukhov", "abstract": "We present a systematic evaluation framework - thirty-seven analyses, 153 statistical tests, four cell types, two perturbation modalities - for assessing mechanistic interpretability in single-cell foundation models. Applying this framework to scGPT and Geneformer, we find that attention patterns encode structured biological information with layer-specific organisation - protein-protein interactions in early layers, transcriptional regulation in late layers - but this structure provides no incremental value for perturbation prediction: trivial gene-level baselines outperform both attention and correlation edges (AUROC 0.81-0.88 versus 0.70), pairwise edge scores add zero predictive contribution, and causal ablation of regulatory heads produces no degradation. These findings generalise from K562 to RPE1 cells; the attention-correlation relationship is context-dependent, but gene-level dominance is universal. Cell-State Stratified Interpretability (CSSI) addresses an attention-specific scaling failure, improving GRN recovery up to 1.85x. The framework establishes reusable quality-control standards for the field.", "link": "http://arxiv.org/abs/2602.17532v1", "date": "2026-02-19", "relevancy": 1.9921, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5033}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5033}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4717}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Systematic%20Evaluati %2520for%2520the%2520field.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17532v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Systematic%20Evaluation%20of%20Single-Cell%20Foundation%20Model%20Interpretability%20Reveals%20Attention%20Captures%20Co-Expression%20Rather%20Than%20Unique%20Regulatory%20Signal&entry.906535625=Ihor%20Kendiukhov&entry.1292438233=We%20present%20a%20systematic%20evaluation%20framework%20-%20thirty-seven%20analyses%2C%20153%20statistical%20tests%2C%20four%20cell%20types%2C%20two%20perturbation%20modalities%20-%20for%20assessing%20mechanistic%20interpretability%20in%20single-cell%20foundation%20models.%20Applying%20this%20framework%20to%20scGPT%20and%20Geneformer%2C%20we%20find%20that%20attention%20patterns%20encode%20structured%20biological%20information%20with%20layer-specific%20organisation%20-%20protein-protein%20interactions%20in%20early%20layers%2C%20transcriptional%20regulation%20in%20late%20layers%20-%20but%20this%20structure%20provides%20no%20incremental%20value%20for%20perturbation%20prediction%3A%20trivial%20gene-level%20baselines%20outperform%20both%20attention%20and%20correlation%20edges%20%28AUROC%200.81-0.88%20versus%200.70%29%2C%20pairwise%20edge%20scores%20add%20zero%20predictive%20contribution%2C%20and%20causal%20ablation%20of%20regulatory%20heads%20produces%20no%20degradation.%20These%20findings%20generalise%20from%20K562%20to%20RPE1%20cells%3B%20the%20attention-correlation%20relationship%20is%20context-dependent%2C%20but%20gene-level%20dominance%20is%20universal.%20Cell-State%20Stratified%20Interpretability%20%28CSSI%29%20addresses%20an%20attention-specific%20scaling%20failure%2C%20improving%20GRN%20recovery%20up%20to%201.85x.%20The%20framework%20establishes%20reusable%20quality-control%20standards%20for%20the%20field.&entry.1838667208=http%3A//arxiv.org/abs/2602.17532v1&entry.124074799=Read"},
{"title": "ABCD: All Biases Come Disguised", "author": "Mateusz Nowak and Xavier Cadet and Peter Chin", "abstract": "Multiple-choice question (MCQ) benchmarks have been a standard evaluation practice for measuring LLMs' ability to reason and answer knowledge-based questions. Through a synthetic NonsenseQA benchmark, we observe that different LLMs exhibit varying degrees of label-position-few-shot-prompt bias, where the model either uses the answer position, the label in front of the answer, the distributions of correct answers present in the few-shot prompt, or a combination of all to answer each MCQ question. We propose a simple bias-reduced evaluation protocol that replaces the labels of each question with uniform, unordered labels and prompts the LLM to use the whole answer presented. With a simple sentence similarity model, we demonstrate improved robustness and lower standard deviation between different permutations of answers with a minimal drop in LLM's performance, exposing the LLM's capabilities under reduced evaluation artifacts, without any help from the prompt examples or the option labels. Across multiple benchmarks and models, this protocol substantially improves the robustness to answer permutations, reducing mean accuracy variance $3\\times$ with only a minimal decrease in the mean model's performance. Through ablation studies on various embedding models and similarity functions, we show that the method is more robust than the standard ones.", "link": "http://arxiv.org/abs/2602.17445v1", "date": "2026-02-19", "relevancy": 1.9838, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5092}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599 {"title": "Towards Cross-lingual Values Assessment: A Consensus-Pluralism Perspective", "author": "Yukun Chen and Xinyu Zhang and Jialong Tang and Yu Wan and Baosong Yang and Yiming Li and Zhan Qin and Kui Ren", "abstract": "While large language models (LLMs) have become pivotal to content safety, current evaluation paradigms primarily focus on detecting explicit harms (e.g., violence or hate speech), neglecting the subtler value dimensions conveyed in digital content. To bridge this gap, we introduce X-Value, a novel Cross-lingual Values Assessment Benchmark designed to evaluate LLMs' ability to assess deep-level values of content from a global perspective. X-Value consists of more than 5,000 QA pairs across 18 languages, systematically organized into 7 core domains grounded in Schwartz's Theory of Basic Human Values and categorized into easy and hard levels for discriminative evaluation. We further propose a unique two-stage annotation framework that first identifies whether an issue falls under global consensus (e.g., human rights) or pluralism (e.g., religion), and subsequently conducts a multi-party evaluation of the latent values embedded within the content. Systematic evaluations on X-Value reveal that current SOTA LLMs exhibit deficiencies in cross-lingual values assessment ($Acc < 77\\%$), with significant performance disparities across different languages ($\u0394Acc > 20\\%$). This work highlights the urgent need to improve the nuanced, values-aware content assessment capability of LLMs. Our X-Value is available at: https://huggingface.co/datasets/Whitolf/X-Value.", "link": "http://arxiv.org/abs/2602.17283v1", "date": "2026-02-19", "relevancy": 1.9813, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5004}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5004}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.47}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Cross-lingual%20Values%20Assessment%3A%20A%20Consensus-Pluralism%20Perspective&body=Title%3A%20Towards%20Cross-lingual%20Values%20Assessment%3A%20A%20Consensus-Pluralism%20Perspective%0AAuthor%3A%20Yukun%20Chen%20and%20Xinyu%20Zhang%20and%20Jialong%20Tang%20and%20Yu%20Wan%20and%20Baosong%20Yang%20and%20Yiming%20Li%20and%20Zhan%20Qin%20and%20Kui%20Ren%0AAbstract%3A%20While%20large%20language%20models%20%28LLMs%29%20have%20become%20pivotal%20to%20content%20safety%2C%20current%20evaluation%20paradigms%20primarily%20focus%20on%20detecting%20explicit%20harms%20%28e.g.%2C%20violence%20or%20hate%20speech%29%2C%20neglecting%20the%20subtler%20value%20dimensions%20conveyed%20in%20digital%20content.%20To%20bridge%20this%20gap%2C%20we%20introduce%20X-Value%2C%20a%20novel%20Cross-lingual%20Values%20Assessment%20Benchmark%20designed%20to%20evaluate%20LLMs%27%20ability%20to%20assess%20deep-level%20values%20of%20content%20from%20a%20global%20perspective.%20X-Value%20consists%20of%20more%20than%205%2C000%20QA%20pairs%20across%2018%20languages%2C%20systematically%20organized%20into%207%20core%20domains%20grounded%20in%20Schwartz%27s%20Theory%20of%20Basic%20Human%20Values%20and%20categorized%20into%20easy%20and%20hard%20levels%20for%20discriminative%20evaluation.%20We%20further%20propose%20a%20unique%20two-stage%20annotation%20framework%20that%20first%20identifies%20whether%20an%20issue%20falls%20under%20global%20consensus%20%28e.g.%2C%20human%20rights%29%20or%20pluralism%20%28e.g.%2C%20religion%29%2C%20and%20subsequently%20conducts%20a%20multi-party%20evaluation%20of%20the%20latent%20values%20embedded%20within%20the%20content.%20Systematic%20evaluations%20on%20X-Value%20reveal%20that%20current%20SOTA%20LLMs%20exhibit ng%20the%20subtler%20value%20dimensions%20conveyed%20in%20digital%20content.%20To%20bridge%20this%20gap%2C%20we%20introduce%20X-Value%2C%20a%20novel%20Cross-lingual%20Values%20Assessment%20Benchmark%20designed%20to%20evaluate%20LLMs%27%20ability%20to%20assess%20deep-level%20values%20of%20content%20from%20a%20global%20perspective.%20X-Value%20consists%20of%20more%20than%205%2C000%20QA%20pairs%20across%2018%20languages%2C%20systematically%20organized%20into%207%20core%20domains%20grounded%20in%20Schwartz%27s%20Theory%20of%20Basic%20Human%20Values%20and%20categorized%20into%20easy%20and%20hard%20levels%20for%20discriminative%20evaluation.%20We%20further%20propose%20a%20unique%20two-stage%20annotation%20framework%20that%20first%20identifies%20whether%20an%20issue%20falls%20under%20global%20consensus%20%28e.g.%2C%20human%20rights%29%20or%20pluralism%20%28e.g.%2C%20religion%29%2C%20and%20subsequently%20conducts%20a%20multi-party%20evaluation%20of%20the%20latent%20values%20embedded%20within%20the%20content.%20Systematic%20evaluations%20on%20X-Value%20reveal%20that%20current%20SOTA%20LLMs%20exhibit%20deficiencies%20in%20cross-lingual%20values%20assessment%20%28%24Acc%20%3C%2077%5C%25%24%29%2C%20with%20significant%20performance%20disparities%20across%20different%20languages%20%28%24%CE%94Acc%20%3E%2020%5C%25%24%29.%20This%20work%20highlights%20the%20urgent%20need%20to%20improve%20the%20nuanced%2C%20values-aware%20content%20assessment%20capability%20of%20LLMs.%20Our%20X-Value%20is%20available%20at%3A%20https%3A//huggingface.co/datasets/Whitolf/X-Value.&entry.1838667208=http%3A//arxiv.org/abs/2602.17283v1&entry.124074799=Read"},
{"title": "Inferring Height from Earth Embeddings: First insights using Google AlphaEarth", "author": "Alireza Hamoudzadeh and Valeria Belloni and Roberta Ravanelli", "abstract": "This study investigates whether the geospatial and multimodal features encoded in \\textit{Earth Embeddings} can effectively guide deep learning (DL) regression models for regional surface height mapping. In particular, we focused on AlphaEarth Embeddings at 10 m spatial resolution and evaluated their capability to support terrain height inference using a high-quality Digital Surface Model (DSM) as reference. U-Net and U-Net++ architectures were thus employed as lightweight convolutional decoders to assess how well the geospatial information distilled in the embeddings can be translated into accurate surface height estimates. Both architectures achieved strong training performance (both with $R^2 = 0.97$), confirming that the embeddings encode informative and decodable height-related signals. On the test set, performance decreased due to distribution shifts in height frequency between training and testing areas. Nevertheless, U-Net++ shows better generalization ($R^2 = 0.84$, median difference = -2.62 m) compared with the standard U-Net ($R^2 = 0.78$, median difference = -7.22 m), suggesting enhanced robustness to distribution mismatch. While the testing RMSE (approximately 16 m for U-Net++) and residual bias highlight remaining challenges in generalization, strong correlations indicate that the embeddings capture transferable topographic patterns. Overall, the results demonstrate the promising potential of AlphaEarth Embeddings to guide DL-based height mapping workflows, particularly when combined with spatially aware convolutional architectures, while emphasizing the need to address bias for improved regional transferability.", "link": "http://arxiv.org/abs/2602.17250v1", "date": "2026-02-19", "relevancy": 1.9761, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5132}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4924}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.488}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inferring%20Height%20from%20Earth%20Embeddings%3A%20First%20insights%20using%20Google%20AlphaEarth&body=Title%3A%20Inferring%20Height%20from%20Earth%20Embeddings%3A%20First%20insights%20using%20Google%20AlphaEarth%0AAuthor%3A%20Alireza%20Hamoudzadeh%20and%20Valeria%20Belloni%20and%20Roberta%20Ravanelli%0AAbstract%3A%20This%20study%20investigates%20whether%20the%20geospatial%20and%20multimodal%20features%20encoded%20in%20%5Ctextit%7BEarth%20Embeddings%7D%20can%20effectively%20guide%20deep%20learning%20%28DL%29%20regression%20models%20for%20regional%20surface%20height%20mapping.%20In%20particular%2C%20we%20focused%20on%20AlphaEarth%20Embeddings%20at%2010%20m%20spatial%20resolution%20and%20evaluated%20their%20capability%20to%20support%20terrain%20height%20inference%20using%20a%20high-quality%20Digital%20Surface%20Model%20%28DSM%29%20as%20reference.%20U-Net%20and%20U-Net%2B%2B%20architectures%20were%20thus%20employed%20as%20lightweight%20convolutional%20decoders%20to%20assess%20how%20well%20the%20geospatial%20information%20distilled%20in%20the%20embeddings%20can%20be%20translated%20into%20accurate%20surface%20height%20estimates.%20Both%20architectures%20achieved%20strong%20training%20performance%20%28both%20with%20%24R%5E2%20%3D%200.97%24%29%2C%20confirming%20that%20the%20embeddings%20encode%20informative%20and%20decodable%20height-related%20signals.%20On%20the%20test%20set%2C%20performance%20decreased%20due%20to%20distribution%20shifts%20in%20height%20frequency%20between%20training%20and%20testing%20areas.%20Nevertheless%2C%20U-Net%2B%2B%20shows%20better%20generalization%20%28%24R%5E2%20%3D%200.84%24%2C%20median%20difference%20%3D%20-2.62%20m%29%20compared%20with%20the%20standard%20U-Net%20%28%24R%5E2%20%3D%200.78%24%2C%20median%20difference%20%3D%20-7.22%20m%29%2C%20suggesting%20enhanced%20robustness%20to%20distribution%20mismatch.%20While%20the%20testing%20RMSE%20%28approximately%2016%20m%20for%20U-Net%2B%2B%29%20and%20residual%20bias%20highlight%20remaining%20challenges%20in%20generalization%2C%20strong%20correlations%20indicate%20that%20the%20embeddings%20capture%20transferable%20topographic%20patterns.%20Overall%2C%20the%20results%20demonstrate%20the%20promising%20potential%20of%20AlphaEarth%20Embeddings%20to%20guide%20DL-based%20height%20mapping%20workflows%2C%20particularly%20when%20combined%20with%20spatially%20aware%20convolutional%20architectures%2C%20while%20emphasizing%20the%20need%20to%20address%20bias%20for%20improved%20regional%20transferability.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17250v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInferring%2520Height%2520from%2520Earth%2520Embeddings%253A%2520First%2520insights%2520using%2520Google%2520AlphaEarth%26entry.906535625%3DAlireza%2520Hamoudzadeh%2520and%2520Valeria%2520Belloni%2520and%2520Roberta%2520Ravanelli%26entry.1292438233%3DThis%2520study%2520investigates%2520whether%2520the%2520geospatial%2520and%2520multimodal%2520features%2520encoded%2520in%2520%255Ctextit%257BEarth%2520Embeddings%257D%2520can%2520effectively%2520guide%2520deep%2520learning%2520%2528DL%2529%2520regression%2520models%2520for%2520regional%2520surface%2520height%2520mapping.%2520In%2520particular%252C%2520we%2520focused%2520on%2520AlphaEarth%2520Embeddings%2520at%252010%2520m%2520spatial%2520resolution%2520and%2520evaluated%2520their%2520capability%2520to%2520support%2520terrain%2520height%2520inference%2520u {"title": "Data Augmentation Scheme for Raman Spectra with Highly Correlated Annotations", "author": "Christoph Lange and Isabel Thiele and Lara Santolin and Sebastian L. Riedel and Maxim Borisyak and Peter Neubauer and M. Nicolas Cruz Bournazou", "abstract": "In biotechnology Raman Spectroscopy is rapidly gaining popularity as a process analytical technology (PAT) that measures cell densities, substrate- and product concentrations. As it records vibrational modes of molecules it provides that information non-invasively in a single spectrum. Typically, partial least squares (PLS) is the model of choice to infer information about variables of interest from the spectra. However, biological processes are known for their complexity where convolutional neural networks (CNN) present a powerful alternative. They can handle non-Gaussian noise and account for beam misalignment, pixel malfunctions or the presence of additional substances. However, they require a lot of data during model training, and they pick up non-linear dependencies in the process variables. In this work, we exploit the additive nature of spectra in order to generate additional data points from a given dataset that have statistically independent labels so that a network trained on such data exhibits low correlations between the model predictions. We show that training a CNN on these generated data points improves the performance on datasets where the annotations do not bear the same correlation as the dataset that was used for model training. This data augmentation technique enables us to reuse spectra as training data for new contexts that exhibit different correlations. The additional data allows for building a better and more robust model. This is of interest in scenarios where large amounts of historical data are available but are currently not used for model training. We demonstrate the capabilities of the proposed method using synthetic spectra of Ralstonia eutropha batch cultivations to monitor substrate, biomass and polyhydroxyalkanoate (PHA) biopolymer concentrations during of the experiments.", "link": "http://arxiv.org/abs/2402.00851v2", "date": "2026-02-19", "relevancy": 1.9752, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5024}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4933}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4735}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Data%20Augmentation%20Scheme%20for%20Raman%20Spectra%20with%20Highly%20Correlated%20Annotations&body=Title%3A%20Data%20Augmentation%20Scheme%20for%20Raman%20Spectra%20with%20Highly%20Correlated%20Annotations%0AAuthor%3A%20Christoph%20Lange%20and%20Isabel%20Thiele%20and%20Lara%20Santolin%20and%20Sebastian%20L.%20Riedel%20and%20Maxim%20Borisyak%20and%20Peter%20Neubauer%20and%20M.%20Nicolas%20Cruz%20Bournazou%0AAbstract%3A%20In%20biotechnology%20Raman%20Spectroscopy%20is%20rapidly%20gaining%20popularity%20as%20a%20process%20analytical%20technology%20%28PAT%29%20that%20measures%20cell%20densities%2C%20substrate-%20and%20product%20concentrations.%20As%20it%20records%20vibrational%20modes%20of%20molecules%20it%20provides%20that%20information%20non-invasively%20in%20a%20single%20spectrum.%20Typically%2C%20partial%20least%20squares%20%28PLS%29%20is%20the%20model%20of%20choice%20to%20infer%20information%20about%20variables%20of%20interest%20from%20the%20spectra.%20However%2C%20biological%20processes%20are%20known%20for%20their%20complexity%20where%20convolutional%20neural%20networks%20%28CNN%29%20present%20a%20powerful%20alternative.%20They%20can%20handle%20non-Gaussian%20noise%20and%20account {"title": "Explanation Bias is a Product: Revealing the Hidden Lexical and Position Preferences in Post-Hoc Feature Attribution", "author": "Jonathan Kamp and Roos Bakker and Dominique Blok", "abstract": "Good quality explanations strengthen the understanding of language models and data. Feature attribution methods, such as Integrated Gradient, are a type of post-hoc explainer that can provide token-level insights. However, explanations on the same input may vary greatly due to underlying biases of different methods. Users may be aware of this issue and mistrust their utility, while unaware users may trust them inadequately. In this work, we delve beyond the superficial inconsistencies between attribution methods, structuring their biases through a model- and method-agnostic framework of three evaluation metrics. We systematically assess both lexical and position bias (what and where in the input) for two transformers; first, in a controlled, pseudo-random classification task on artificial data; then, in a semi-controlled causal relation detection task on natural data. We find a trade-off between lexical and position biases in our model comparison, with models that score high on one type score low on the other. We also find signs that anomalous explanations are more likely to be biased.", "link": "http://arxiv.org/abs/2512.11108v2", "date": "2026-02-19", "relevancy": 1.9716, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4959}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4959}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Explanation%20Bias%20is%20a%20Product%3A%20Revealing%20the%20Hidden%20Lexical%20and%20Position%20Preferences%20in%20Post-Hoc%20Feature%20Attribution&body=Title%3A%20Explanation%20Bias%20is%20a%20Product%3A%20Revealing%20the%20Hidden%20Lexical%20and%20Position%20Preferences%20in%20Post-Hoc%20Feature%20Attribution%0AAuthor%3A%20Jonathan%20Kamp%20and%20Roos%20Bakker%20and%20Dominique%20Blok%0AAbstract%3A%20Good%20quality%20explanations%20strengthen%20the%20understanding%20of%20language%20models%20and%20data.%20Feature%20attribution%20methods%2C%20such%20as%20Integrated%20Gradient%2C%20are%20a%20type%20of%20post-hoc%20explainer%20that%20can%20provide%20token-level%20insights.%20However%2C%20explanations%20on%20the%20same%20input%20may%20vary%20greatly%20due%20to%20underlying%20biases%20of%20different%20methods.%20Users%20may%20be%20aware%20of%20this%20issue%20and%20mistrust%20their%20utility%2C%20while%20unaware%20users%20may%20trust%20them%20inadequately.%20In%20this%20work%2C%20we%20delve%20beyond%20the%20superficial%20inconsistencies%20between%20attribution%20methods%2C%20structuring%20their%20biases%20through%20a%20model-%20and%20method-agnostic%20framework%20of%20three%20evaluation%20metrics.%20We%20systematically%20assess%20both%20lexical%20and%20position%20bias%20%28what%20and%20where%20in%20the%20input%29%20for%20two%20transformers%3B%20first%2C%20in%20a%20controlled%2C%20pseudo-random%20classification%20task%20on%20artificial%20data%3B%20then%2C%20in%20a%20semi-controlled%20causal%20relation%20detection%20task%20on%20natural%20data.%20We%20find%20a%20trade-off%20between%20lexical%20and%20position%20biases%20in%20our%20model%20comparison%2C%20with%20models%20that%20score%20high%20on%20one%20type%20score%20low%20on%20the%20other.%20We%20also%20find%20signs%20that%20anomalous%20explanations%20are%20more%20likely%20to%20be%20biased.%0ALink%3A%20http%3A//arxiv.org/abs/2512.11108v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9B 520on%2520the%2520other.%2520We%2520also%2520find%2520signs%2520that%2520anomalous%2520explanations%2520are%2520more%2520likely%2520to%2520be%2520biased.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.11108v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Explanation%20Bias%20is%20a%20Product%3A%20Revealing%20the%20Hidden%20Lexical%20and%20Position%20Preferences%20in%20Post-Hoc%20Feature%20Attribution&entry.906535625=Jonathan%20Kamp%20and%20Roos%20Bakker%20and%20Dominique%20Blok&entry.1292438233=Good%20quality%20explanations%20strengthen%20the%20understanding%20of%20language%20models%20and%20data.%20Feature%20attribution%20methods%2C%20such%20as%20Integrated%20Gradient%2C%20are%20a%20type%20of%20post-hoc%20explainer%20that%20can%20provide%20token-level%20insights.%20However%2C%20explanations%20on%20the%20same%20input%20may%20vary%20greatly%20due%20to%20underlying%20biases%20of%20different%20methods.%20Users%20may%20be%20aware%20of%20this%20issue%20and%20mistrust%20their%20utility%2C%20while%20unaware%20users%20may%20trust%20them%20inadequately.%20In%20this%20work%2C%20we%20delve%20beyond%20the%20superficial%20inconsistencies%20between%20attribution%20methods%2C%20structuring%20their%20biases%20through%20a%20model-%20and%20method-agnostic%20framework%20of%20three%20evaluation%20metrics.%20We%20systematically%20assess%20both%20lexical%20and%20position%20bias%20%28what%20and%20where%20in%20the%20input%29%20for%20two%20transformers%3B%20first%2C%20in%20a%20controlled%2C%20pseudo-random%20classification%20task%20on%20artificial%20data%3B%20then%2C%20in%20a%20semi-controlled%20causal%20relation%20detection%20task%20on%20natural%20data.%20We%20find%20a%20trade-off%20between%20lexical%20and%20position%20biases%20in%20our%20model%20comparison%2C%20with%20models%20that%20score%20high%20on%20one%20type%20score%20low%20on%20the%20other.%20We%20also%20find%20signs%20that {"title": "Federated Latent Space Alignment for Multi-user Semantic Communications", "author": "Giuseppe Di Poce and Mario Edoardo Pandolfo and Emilio Calvanese Strinati and Paolo Di Lorenzo", "abstract": "Semantic communication aims to convey meaning for effective task execution, but differing latent representations in AI-native devices can cause semantic mismatches that hinder mutual understanding. This paper introduces a novel approach to mitigating latent space misalignment in multi-agent AI- native semantic communications. In a downlink scenario, we consider an access point (AP) communicating with multiple users to accomplish a specific AI-driven task. Our method implements a protocol that shares a semantic pre-equalizer at the AP and local semantic equalizers at user devices, fostering mutual understanding and task-oriented communication while considering power and complexity constraints. To achieve this, we employ a federated optimization for the decentralized training of the semantic equalizers at the AP and user sides. Numerical results validate the proposed approach in goal-oriented semantic communication, revealing key trade-offs among accuracy, com- munication overhead, complexity, and the semantic proximity of AI-native communication devices.", "link": "http://arxiv.org/abs/2602.17271v1", "date": "2026-02-19", "relevancy": 1.9689, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5039}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4925}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4873}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Federated%20Latent%20Space%20Alignment%20for%20Multi- /viewform?entry.1380929848=Federated%20Latent%20Space%20Alignment%20for%20Multi-user%20Semantic%20Communications&entry.906535625=Giuseppe%20Di%20Poce%20and%20Mario%20Edoardo%20Pandolfo%20and%20Emilio%20Calvanese%20Strinati%20and%20Paolo%20Di%20Lorenzo&entry.1292438233=Semantic%20communication%20aims%20to%20convey%20meaning%20for%20effective%20task%20execution%2C%20but%20differing%20latent%20representations%20in%20AI-native%20devices%20can%20cause%20semantic%20mismatches%20that%20hinder%20mutual%20understanding.%20This%20paper%20introduces%20a%20novel%20approach%20to%20mitigating%20latent%20space%20misalignment%20in%20multi-agent%20AI-%20native%20semantic%20communications.%20In%20a%20downlink%20scenario%2C%20we%20consider%20an%20access%20point%20%28AP%29%20communicating%20with%20multiple%20users%20to%20accomplish%20a%20specific%20AI-driven%20task.%20Our%20method%20implements%20a%20protocol%20that%20shares%20a%20semantic%20pre-equalizer%20at%20the%20AP%20and%20local%20semantic%20equalizers%20at%20user%20devices%2C%20fostering%20mutual%20understanding%20and%20task-oriented%20communication%20while%20considering%20power%20and%20complexity%20constraints.%20To%20achieve%20this%2C%20we%20employ%20a%20federated%20optimization%20for%20the%20decentralized%20training%20of%20the%20semantic%20equalizers%20at%20the%20AP%20and%20user%20sides.%20Numerical%20results%20validate%20the%20proposed%20approach%20in%20goal-oriented%20semantic%20communication%2C%20revealing%20key%20trade-offs%20among%20accuracy%2C%20com-%20munication%20overhead%2C%20complexity%2C%20and%20the%20semantic%20proximity%20of%20AI-native%20communication%20devices.&entry.1838667208=http%3A//arxiv.org/abs/2602.17271v1&entry.124074799=Read"},
{"title": "MedClarify: An information-seeking AI agent for medical diagnosis with case-specific follow-up questions", "author": "Hui Min Wong and Philip Heesen and Pascal Janetzky and Martin Bendszus and Stefan Feuerriegel", "abstract": "Large language models (LLMs) are increasingly used for diagnostic tasks in medicine. In clinical practice, the correct diagnosis can rarely be immediately inferred from the initial patient presentation alone. Rather, reaching a diagnosis often involves systematic history taking, during which clinicians reason over multiple potential conditions through iterative questioning to resolve uncertainty. This process requires considering differential diagnoses and actively excluding emergencies that demand immediate intervention. Yet, the ability of medical LLMs to generate informative follow-up questions and thus reason over differential diagnoses remains underexplored. Here, we introduce MedClarify, an AI agent for information-seeking that can generate follow-up questions for iterative reasoning to support diagnostic decision-making. Specifically, MedClarify computes a list of candidate diagnoses analogous to a differential diagnosis, and then proactively generates follow-up questions aimed at reducing diagnostic uncertainty. By selecting the question with the highest expected information gain, MedClarify enables targeted, uncertainty-aware reasoning to improve diagnostic performance. In our experiments, we first demonstrate the limitations of current LLMs in medical reasoning, which often yield multiple, similarly likely diagnoses, especially when patient cases are incomplete or relevant information for diagnosis is missing. We then show that our information-theoretic reasoning approach can generate effective follow-up questioning and thereby reduces diagnostic errors by ~27 percentage points (p.p.) compared to a standard single-shot LLM baseline. Altogether, MedClarify offers a path to improve medical LLMs through agentic information-seeking and to thus promote effective dialogues with medical LLMs that reflect the iterative and uncertain nature of real-world clinical reasoning.", "link": "http://arxiv.org/abs/2602.17308v1", "date": "2026-02-19", "relevancy": 1.9556, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5481}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4902}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4639}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedClarify%3A%20An%20information-seeking%20AI%20agent%20for%20medical%20diagnosis%20with%20case-specific%20follow-up%20questions&body=Title%3A%20MedClarify%3A%20An%20information-seeking%20AI%20agent%20for%20medical%20diagnosis%20with%20case-specific%20follow-up%20questions%0AAuthor%3A%20Hui%20Min%20Wong%20and%20Philip%20Heesen%20and%20Pascal%20Janetzky%20and%20Martin%20Bendszus%20and%20Stefan%20Feuerriegel%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20increasingly%20used%20for%20diagnostic%20tasks%20in%20medicine.%20In%20clinical%20practice%2C%20the%20correct%20diagnosis%20can%20rarely%20be%20immediately%20inferred%20from%20the%20initial%20patient%20presentation%20alone.%20Rather%2C%20reaching%20a%20diagnosis%20often%20involves%20systematic%20history%20taking%2C%20during%20which%20clinicians%20reason%20over%20multiple%20potential%20conditions%20through%20iterative%20questioning%20to%20resolve%20uncertainty.%20This%20process%20requires%20considering%20differential%20diagnoses%20and%20actively%20excluding%20emergencies%20that%20demand%20immediate%20intervention.%20Yet%2C%20the%20ability%20of%20medical%20LLMs%20to%20generate%20informative%20follow-up%20questions%20and%20thus%20reason%20over%20differential%20diagnoses%20remains%20underexplored.%20Here%2C%20we%20introduce%20MedClarify%2C%20an%20AI%20agent%20for%20information-seeking%20that%20can%20generate%20follow-up%20questions%20for%20iterative%20reasoning%20to%20support%20diagnostic%20decision-making.%20Specifically%2C%20MedClarify%20computes%20a%20list%20of%20candidate%20diagnoses%20analogous%20to%20a%20differential%20diagnosis%2C%20and%20then%20proactively%20generates%20follow-up%20questions%20aimed%20at%20reducing%20diagnostic%20uncertainty.%20By%20selecting%20the%20question%20with%20the%20highest%20expected%20information%20gain%2C%20MedClarify%20enables%20targeted%2C%20uncertainty-aware%20reasoning%20to%20improve%20diagnostic%20performance.%20In%20our%20experiments%2C%20we%20first%20demonstrate%20the%20limitations%20of%20current%20LLMs%20in%20medical%20reasoning%2C%20which%20often%20yield%20multiple%2C%20similarly%20likely%20diagnoses%2C%20especially%20when%20patient%20cases%20are%20incomplete%20or%20relevant%20information%20for%20diagnosis%20is%20missing.%20We%20then%20show%20that%20our%20information-theoretic%20reasoning%20approach%20can%20generate%20effective%20follow-up%20questioning%20and%20thereby%20reduces%20diagnostic%20errors%20by%20~27%20percentage%20points%20%28p.p.%29%20compared%20to%20a%20standard%20single-shot%20LLM%20baseline.%20Altogether%2C%20MedClarify%20offers%20a%20path%20to%20improve%20medical%20LLMs%20through%20agentic%20information-seeking%20and%20to%20thus%20promote%20effective%20dialogues%20with%20medical%20LLMs%20that%20reflect%20the%20iterative%20and%20uncertain%20nature%20of%20real-world%20clinical%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17308v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedClarify%253A%2520An%2520inform {"title": "Attention-Enhanced U-Net for Accurate Segmentation of COVID-19 Infected Lung Regions in CT Scans", "author": "Amal Lahchim and Lazar Davic", "abstract": "In this study, we propose a robust methodology for automatic segmentation of infected lung regions in COVID-19 CT scans using convolutional neural networks. The approach is based on a modified U-Net architecture enhanced with attention mechanisms, data augmentation, and postprocessing techniques. It achieved a Dice coefficient of 0.8658 and mean IoU of 0.8316, outperforming other methods. The dataset was sourced from public repositories and augmented for diversity. Results demonstrate superior segmentation performance. Future work includes expanding the dataset, exploring 3D segmentation, and preparing the model for clinical deployment.", "link": "http://arxiv.org/abs/2505.12298v2", "date": "2026-02-19", "relevancy": 1.9552, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5048}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4885}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4826}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attention-Enhanced%20U-Net%20for%20Accurate%20Segmentation%20of%20COVID-19%20Infected%20Lung%20Regions%20in%20CT%20Scans&body=Title%3A%20Attention-Enhanced%20U-Net%20for%20Accurate%20Segmentation%20of%20COVID-19%20Infected%20Lung%20Regions%20in%20CT%20Scans%0AAuthor%3A%20Amal%20Lahchim%20and%20Lazar%20Davic%0AAbstract%3A%20In%20this%20study%2C%20we%20propose%20a%20robust%20methodology%20for%20automatic%20segmentation%20of%20infected%20lung%20regions%20in%20COVID-19%20CT%20scans%20using%20convolutional%20neural%20networks.%20The%20approach%20is%20 {"title": "Gradient Testing and Estimation by Comparisons", "author": "Xiwen Tao and Chenyi Zhang and Helin Wang and Yexin Zhang and Tongyang Li", "abstract": "We study gradient testing and gradient estimation of smooth functions using only a comparison oracle that, given two points, indicates which one has the larger function value. For any smooth $f\\colon\\mathbb R^n\\to\\mathbb R$, $\\mathbf{x}\\in\\mathbb R^n$, and $\\varepsilon>0$, we design a gradient testing algorithm that determines whether the normalized gradient $\\nabla f(\\mathbf{x})/\\|\\nabla f(\\mathbf{x})\\|$ is $\\varepsilon$-close or $2\\varepsilon$-far from a given unit vector $\\mathbf{v}$ using $O(1)$ queries, as well as a gradient estimation algorithm that outputs an $\\varepsilon$-estimate of $\\nabla f(\\mathbf{x})/\\|\\nabla f(\\mathbf{x})\\|$ using $O(n\\log(1/\\varepsilon))$ queries which we prove to be optimal. Furthermore, we study gradient estimation in the quantum comparison oracle model where queries can be made in superpositions, and develop a quantum algorithm using $O(\\log (n/\\varepsilon))$ queries.", "link": "http://arxiv.org/abs/2405.11454v2", "date": "2026-02-19", "relevancy": 1.9521, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4043}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.3867}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.3802}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gradient%20Testing%20and%20Estimation%20by%20Comparisons&body=Title%3A%20Gradient%20Testing%20and%20Estimation%20by%20Comparisons%0AAuthor%3A%20Xiwen%20Tao%20and%20Chenyi%20Zhang%20and%20Helin%20Wang%20and%20Yexin%20Zhang%20and%20Tongyang%20Li%0AAbstract%3A%20We%20study%20gradient%20testing%20and%20gradient%20estimation {"title": "AutoNumerics: An Autonomous, PDE-Agnostic Multi-Agent Pipeline for Scientific Computing", "author": "Jianda Du and Youran Sun and Haizhao Yang", "abstract": "PDEs are central to scientific and engineering modeling, yet designing accurate numerical solvers typically requires substantial mathematical expertise and manual tuning. Recent neural network-based approaches improve flexibility but often demand high computational cost and suffer from limited interpretability. We introduce \\texttt{AutoNumerics}, a multi-agent framework that autonomously designs, implements, debugs, and verifies numerical solvers for general PDEs directly from natural language descriptions. Unlike black-box neural solvers, our framework generates transparent solvers grounded in classical numerical analysis. We introduce a coarse-to-fine execution strategy and a residual-based self-verification mechanism. Experiments on 24 canonical and real-world PDE problems demonstrate that \\texttt{AutoNumerics} achieves competitive or superior accuracy compared to existing neural and LLM-based baselines, and correctly selects numerical schemes based on PDE structural properties, suggesting its viability as an accessible paradigm for automated PDE solving.", "link": "http://arxiv.org/abs/2602.17607v1", "date": "2026-02-19", "relevancy": 1.9518, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4988}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4926}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AutoNumerics%3A%20An%20Autonomous%2C%20PDE-Agnostic%20Multi-Agent%20 {"title": "MolHIT: Advancing Molecular-Graph Generation with Hierarchical Discrete Diffusion Models", "author": "Hojung Jung and Rodrigo Hormazabal and Jaehyeong Jo and Youngrok Park and Kyunggeun Roh and Se-Young Yun and Sehui Han and Dae-Woong Jeong", "abstract": "Molecular generation with diffusion models has emerged as a promising direction for AI-driven drug discovery and materials science. While graph diffusion models have been widely adopted due to the discrete nature of 2D molecular graphs, existing models suffer from low chemical validity and struggle to meet the desired properties compared to 1D modeling. In this work, we introduce MolHIT, a powerful molecular graph generation framework that overcomes long-standing performance limitations in existing methods. MolHIT is based on the Hierarchical Discrete Diffusion Model, which generalizes discrete diffusion to additional categories that encode chemical priors, and decoupled atom encoding that splits the atom types according to their chemical roles. Overall, MolHIT achieves new state-of-the-art performance on the MOSES dataset with near-perfect validity for the first time in graph diffusion, surpassing strong 1D baselines across multiple metrics. We further demonstrate strong performance in downstream tasks, including multi-property guided generation and scaffold extension.", "link": "http://arxiv.org/abs/2602.17602v1", "date": "2026-02-19", "relevancy": 1.5672, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5306}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5245}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4998}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MolHIT%3A%20Advancing%20Molecular-Graph%20Generat {"title": "Entropy After $\\langle \\texttt{/Think} \\rangle$ for reasoning model early exiting", "author": "Xi Wang and James McInerney and Lequn Wang and Nathan Kallus", "abstract": "Reasoning LLMs show improved performance with longer chains of thought. However, recent work has highlighted their tendency to overthink, continuing to revise answers even after reaching the correct solution. We quantitatively confirm this inefficiency from the distribution dynamics perspective by tracking Pass@1 for answers averaged over a large number of rollouts and find the model often begins to always produce the correct answer early in the reasoning, making extra reasoning tokens wasteful. To detect and prevent overthinking, we propose a simple and inexpensive novel signal, Entropy After </Think> (EAT), for monitoring and deciding whether to exit reasoning early. By appending a stop thinking token (</think>) and monitoring the entropy of the following token as the model reasons, we obtain a trajectory that decreases and stabilizes when Pass@1 plateaus; thresholding its variance under an exponential moving average yields a practical stopping rule. Importantly, our approach enables adaptively allocating compute based on the EAT trajectory, allowing us to spend compute in a more efficient way compared with fixing the token budget for all questions. Empirically, on MATH500 and AIME2025, EAT reduces token usage by 12 - 22% without harming accuracy. EAT also remains effective in black box settings where logits from the reasoning model are not accessible, and EAT is computed with proxy models: We verified the feasibility via early stopping Llama 70B with a 1.5B model and Claude 3.7 with a local 4B model.", "link": "http://arxiv.org/abs/2509.26522v2", "date": "2026-02-19", "relevancy": 1.7844, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4784}, {"title": "Flexible Visual {"title": "MGD: Moment Guided Diffusion for Maximum Entropy Generation", "author": "Etienne Lempereur and Nathana\u00ebl Cuvelle--Magar and Florentin Coeurdoux and St\u00e9phane Mallat and Eric Vanden-Eijnden", "abstract": "Generating samples from limited information is a fundamental problem across scientific domains. Classical maximum entropy methods provide principled uncertainty quantification from moment constraints but require sampling via MCMC or Langevin dynamics, which typically exhibit exponential slowdown in high dimensions. In contrast, generative models based on diffusion and flow matching efficiently transport noise to data but offer limited theoretical guarantees and can overfit when data is scarce. We introduce Moment Guided Diffusion (MGD), which combines elements of both approaches. Building on the stochastic interpolant framework, MGD samples maximum entropy distributions by solving a stochastic differential equation that guides moments toward prescribed values in finite time, thereby avoiding slow mixing in equilibrium-based methods. We formally obtain, in the large-volatility limit, convergence of MGD to the maximum entropy distribution and derive a tractable estimator of the resulting entropy computed directly from the dynamics. Applications to financial time series, turbulent flows, and cosmological fields using wavelet scattering moments yield estimates of negentropy for high-dimensional multiscale processes.", "link": "http://arxiv.org/abs/2602.17211v1", "date": "2026-02-19", "relevancy": 1.534, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.523}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.511}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "simi 0processes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17211v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMGD%253A%2520Moment%2520Guided%2520Diffusion%2520for%2520Maximum%2520Entropy%2520Generation%26entry.906535625%3DEtienne%2520Lempereur%2520and%2520Nathana%25C3%25ABl%2520Cuvelle--Magar%2520and%2520Florentin%2520Coeurdoux%2520and%2520St%25C3%25A9phane%2520Mallat%2520and%2520Eric%2520Vanden-Eijnden%26entry.1292438233%3DGenerating%2520samples%2520from%2520limited%2520information%2520is%2520a%2520fundamental%2520problem%2520across%2520scientific%2520domains.%2520Classical%2520maximum%2520entropy%2520methods%2520provide%2520principled%2520uncertainty%2520quantification%2520from%2520moment%2520constraints%2520but%2520require%2520sampling%2520via%2520MCMC%2520or%2520Langevin%2520dynamics%252C%2520which%2520typically%2520exhibit%2520exponential%2520slowdown%2520in%2520high%2520dimensions.%2520In%2520contrast%252C%2520generative%2520models%2520based%2520on%2520diffusion%2520and%2520flow%2520matching%2520efficiently%2520transport%2520noise%2520to%2520data%2520but%2520offer%2520limited%2520theoretical%2520guarantees%2520and%2520can%2520overfit%2520when%2520data%2520is%2520scarce.%2520We%2520introduce%2520Moment%2520Guided%2520Diffusion%2520%2528MGD%2529%252C%2520which%2520combines%2520elements%2520of%2520both%2520approaches.%2520Building%2520on%2520the%2520stochastic%2520interpolant%2520framework%252C%2520MGD%2520samples%2520maximum%2520entropy%2520distributions%2520by%2520solving%2520a%2520stochastic%2520differential%2520equation%2520that%2520guides%2520moments%2520toward%2520prescribed%2520values%2520in%2520finite%2520time%252C%2520thereby%2520avoiding%2520slow%2520mixing%2520in%2520equilibrium-based%2520methods.%2520We%2520formally%2520obtain%252C%2520in%2520the%2520large-volatility%2520limit%252C%2520convergence%2520of%2520MGD%2520to%2520the%2520maximum%2520entropy%2520distribution%2520and%2520derive%2520a%2520tractable%2520estimator%2520of%2520the%2520resulting%2520entropy%2520computed%2520directly%2520from%2520the%2520dynamics.%2520Applications%2520to%2520financial%2520time%2520series%252C%2520turbulent%2520flows%252C%2520and%2520cosmological%2520fields%2520using%2520wavelet%2520scattering%2520moments%2520yield%2520estimates%2520of%2520negentropy%2520for%2520high-dimensional%2520multiscale%2520processes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17211v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MGD%3A%20Moment%20Guided%20Diffusion%20for%20Maximum%20Entropy%20Generation&entry.906535625=Etienne%20Lempereur%20and%20Nathana%C3%ABl%20Cuvelle--Magar%20and%20Florentin%20Coeurdoux%20and%20St%C3%A9phane%20Mallat%20and%20Eric%20Vanden-Eijnden&entry.1292438233=Generating%20samples%20from%20limited%20information%20is%20a%20fundamental%20problem%20across%20scientific%20domains.%20Classical%20maximum%20entropy%20methods%20provide%20principled%20uncertainty%20quantification%20from%20moment%20constraints%20but%20require%20sampling%20via%20MCMC%20or%20Langevin%20dynamics%2C%20which%20typically%20exhibit%20exponential%20slowdown%20in%20high%20dimensions.%20In%20contrast%2C%20generative%20models%20based%20on%20diffusion%20and%20flow%20matching%20efficiently%20transport%20noise%20to%20data%20but%20offer%20limited%20theoretical%20guarantees%20and%20can%20overfit%20when%20data%20is%20scarce.%20We%20introduce%20Moment%20Guided%20Diffusion%20%28MGD%29%2C%20which%20combines%20elements%20of%20both%20approaches.%20Building%20on%20the%20stochastic%20interpolant%20framework%2C%20MGD%20samples%20maximum%20entropy%20distributions%20by%20solving%20a%20stochastic%20differential%20equation%20that%20guides%20moments%20toward%20prescribed%20values%20in%20finite%20time%2C%20thereby%20avoiding%20slow%20mixing%20in%20equilibrium-based%20methods.%20We%20formally% {"title": "Capturing Individual Human Preferences with Reward Features", "author": "Andr\u00e9 Barreto and Vincent Dumoulin and Yiran Mao and Mark Rowland and Nicolas Perez-Nieves and Bobak Shahriari and Yann Dauphin and Doina Precup and Hugo Larochelle", "abstract": "Reinforcement learning from human feedback usually models preferences using a reward function that does not distinguish between people. We argue that this is unlikely to be a good design choice in contexts with high potential for disagreement, like in the training of large language models. We formalise and analyse the problem of learning a reward model that can be specialised to a user. Using the principle of empirical risk minimisation, we derive a probably approximately correct (PAC) bound showing the dependency of the approximation error on the number of training examples, as usual, and also on the number of human raters who provided feedback on them. Based on our theoretical findings, we discuss how to best collect pairwise preference data and argue that adaptive reward models should be beneficial when there is considerable disagreement among users. We also propose a concrete architecture for an adaptive reward model. Our approach leverages the observation that individual preferences can be captured as a linear combination of a set of general reward features. We show how to learn such features and subsequently use them to quickly adapt the reward model to a specific individual, even if their preferences are not reflected in the training data. We present experiments with large language models illustrating our theoretical results and comparing the proposed architecture with a non-adaptive baseline. Consistent with our analysis, the benefits provided by our model increase with the number of raters and the heterogeneity of their preferences. We also show that our model compares favourably to adaptive counterparts, including those performing in-context personalisation.", "link": "http://arxiv.org/abs/2503.17338v2", "date": "2026-02-19", "relevancy": 1.9387, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4871}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4834}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4828}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Capturing%20Individual%20Human%20Preferences%20with%20Reward%20Features&body=Title%3A%20Capturing%20Individual%20Human%20Preferences%20with%20Reward%20Features%0AAuthor%3A%20Andr%C3%A9%20Barreto%20and%20Vincent%20Dumoulin%20and%20Yiran%20Mao%20and%20Mark%20Rowland%20and%20Nicolas%20Perez-Nieves%20and%20Bobak%20Shahriari%20and%20Yann%20Dauphin%20and%20Doina%20Precup%20and%20Hugo%20Larochelle%0AAbstract%3A%20Reinforcement%20learning%20from%20human%20feedback%20usually%20models%20preferences%20using%20a%20reward%20function%20that%20does%20not%20distinguish%20between%20people.%20We%20argue%20that%20this%20is%20unlikely%20to%20be%20a%20good%20design%20choice%20in%20contexts%20with%20high%20potential%20for%20disagreement%2C%20like%20in%20the%20training%20of%20large%20language%20models.%20We%20formalise%20and%20analyse%20the%20problem%20of%20learning%20a%20reward%20model%20that%20can%20be%20specialised%20to%20a%20user.%20Using%20the%20principle%20of%20empirical%20risk%20minimisation%2C%20we%20derive%20a%20probably%20approximately%20correct%20%28PAC%29%20bound%20showing%20the%20dependency%20of%20the%20approximation%20error%20on%20the%20number%20of%20training%20examples%2C%20as%20usual%2C%20and%20also%20on%20the%20number%20of%20human%20raters%20who%20provided%20feedback%20on%20them.%20Based%20on%20our%20theoretical%20findings%2C%20we%20discuss%20how%20to%20best%20collect%20pairwise%20preference%20data%20and%20argue%20that%20adaptive%20reward%20models%20should%20be%20beneficial%20when%20there%20is%20considerable%20disagreement%20among%20users.%20We%20also%20propose%20a%20concrete%20architecture%20for%20an%20adaptive%20reward%20model.%20Our%20approach%20leverages%20the%20observation%20that%20individual%20preferences%20can%20be%20captured%20as%20a%20linear%20combination%20of%20a%20set%20of%20general%20reward%20features.%20We%20show%20how%20to%20learn%20such%20features%20and%20subsequently%20use%20them%20to%20quickly%20adapt%20the%20reward%20model%20to%20a%20specific%20individual%2C%20even%20if%20their%20preferences%20are%20not%20reflected%20in%20the%20training%20data.%20We%20present%20experiments%20with%20large%20language%20models%20illustrating%20our%20theoretical%20results%20and%20comparing%20the%20proposed%20architecture%20with%20a%20non-adaptive%20baseline.%20Consistent%20with%20our%20analysis%2C%20the%20benefits%20provided%20by%20our%20model%20increase%20with%20the%20number%20of%20raters%20and%20the%20heterogeneity%20of%20their%20preferences.%20We%20also%20show%20that%20our%20model%20compares%20favourably%20to%20adaptive%20counterparts%2C%20including%20those%20performing%20in-context%20personalisation.%0ALink%3A%20http%3A//arxiv.org/abs/2503.17338v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCapturing%2520Individual%2520Human%2520Preferences%2520with%2520Reward%2520Features%26entry.906535625%3DAndr%25C3%25A9%2520Barreto%2520and%2520Vincent%2520Dumoulin%2520and%2520Yiran%2520Mao%2520and%2520Mark%2520Rowland%2520and%2520Nicolas%2520Perez-Nieves%2520and%2520Bobak%2520Shahriari%2520and%2520Yann%2520Dauphin%2520and%2520Doina%2520Precup%2520and%2520Hugo%2520Larochelle%26entry {"title": "Diffusion-Guided Pretraining for Brain Graph Foundation Models", "author": "Xinxu Wei and Rong Zhou and Lifang He and Yu Zhang", "abstract": "With the growing interest in foundation models for brain signals, graph-based pretraining has emerged as a promising paradigm for learning transferable representations from connectome data. However, existing contrastive and masked autoencoder methods typically rely on naive random dropping or masking for augmentation, which is ill-suited for brain graphs and hypergraphs as it disrupts semantically meaningful connectivity patterns. Moreover, commonly used graph-level readout and reconstruction schemes fail to capture global structural information, limiting the robustness of learned representations. In this work, we propose a unified diffusion-based pretraining framework that addresses both limitations. First, diffusion is designed to guide structure-aware dropping and masking strategies, preserving brain graph semantics while maintaining effective pretraining diversity. Second, diffusion enables topology-aware graph-level readout and node-level global reconstruction by allowing graph embeddings and masked nodes to aggregate information from globally related regions. Extensive experiments across multiple neuroimaging datasets with over 25,000 subjects and 60,000 scans involving various mental disorders and brain atlases demonstrate consistent performance improvements.", "link": "http://arxiv.org/abs/2602.09437v2", "date": "2026-02-19", "relevancy": 1.0958, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5576}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5538}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5322}], "ma {"title": "Bluetooth Phased-array Aided Inertial Navigation Using Factor Graphs: Experimental Verification", "author": "Glen Hjelmerud M\u00f8rkbak S\u00f8rensen and Torleiv H. Bryne and Kristoffer Gryte and Tor Arne Johansen", "abstract": "Phased-array Bluetooth systems have emerged as a low-cost alternative for performing aided inertial navigation in GNSS-denied use cases such as warehouse logistics, drone landings, and autonomous docking. Basing a navigation system off of commercial-off-the-shelf components may reduce the barrier of entry for phased-array radio navigation systems, albeit at the cost of significantly noisier measurements and relatively short feasible range. In this paper, we compare robust estimation strategies for a factor graph optimisation-based estimator using experimental data collected from multirotor drone flight. We evaluate performance in loss-of-GNSS scenarios when aided by Bluetooth angular measurements, as well as range or barometric pressure.", "link": "http://arxiv.org/abs/2602.17407v1", "date": "2026-02-19", "relevancy": 1.8549, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4874}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4832}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4348}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bluetooth%20Phased-array%20Aided%20Inertial%20Navigation%20Using%20Factor%20Graphs%3A%20Experimental%20Verification&body=Title%3A%20Bluetooth%20Phased-array%20Aided%20Inertial%20Navigation%20Using%20Factor%20Graphs%3A%20Experimental%20Verification%0AAuthor%3A%20Glen%20Hjelmerud%20M%C3%B8rkbak%20S%C3%B8ren {"title": "FAMOSE: A ReAct Approach to Automated Feature Discovery", "author": "Keith Burghardt and Jienan Liu and Sadman Sakib and Yuning Hao and Bo Li", "abstract": "Feature engineering remains a critical yet challenging bottleneck in machine learning, particularly for tabular data, as identifying optimal features from an exponentially large feature space traditionally demands substantial domain expertise. To address this challenge, we introduce FAMOSE (Feature AugMentation and Optimal Selection agEnt), a novel framework that leverages the ReAct paradigm to autonomously explore, generate, and refine features while integrating feature selection and evaluation tools within an agent architecture. To our knowledge, FAMOSE represents the first application of an agentic ReAct framework to automated feature engineering, especially for both regression and classification tasks. Extensive experiments demonstrate that FAMOSE is at or near the state-of-the-art on classification tasks (especially tasks with more than 10K instances, where ROC-AUC increases 0.23% on average), and achieves the state-of-the-art for regression tasks by reducing RMSE by 2.0% on average, while remaining more robust to errors than other algorithms. We hypothesize that FAMOSE's strong performance is because ReAct allows the LLM context window to record (via iterative feature discovery and evaluation steps) what features did or did not work. This is similar to a few-shot prompt and guides the LLM to invent better, more innovative features. Our work offers evidence that AI agents are remarkably effective in solving problems that require highly inventive solutions, such as feature engineering.", "link": "http://arxiv.org/abs/2602.17641v1", "date": "2026-02-19", "relevancy": 1.4891, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.543}, {"title": "Breadcrumbs: Adversarial class- {"title": "LRT-Diffusion: Calibrated Risk-Aware Guidance for Diffusion Policies", "author": "Ximan Sun and Xiang Cheng", "abstract": "Diffusion policies are competitive for offline reinforcement learning (RL) but are typically guided at sampling time by heuristics that lack a statistical notion of risk. We introduce LRT-Diffusion, a risk-aware sampling rule that treats each denoising step as a sequential hypothesis test between the unconditional prior and the state-conditional policy head. Concretely, we accumulate a log-likelihood ratio and gate the conditional mean with a logistic controller whose threshold tau is calibrated once under H0 to meet a user-specified Type-I level alpha. This turns guidance from a fixed push into an evidence-driven adjustment with a user-interpretable risk budget. Importantly, we deliberately leave training vanilla (two heads with standard epsilon-prediction) under the structure of DDPM. LRT guidance composes naturally with Q-gradients: critic-gradient updates can be taken at the unconditional mean, at the LRT-gated mean, or a blend, exposing a continuum from exploitation to conservatism. We standardize states and actions consistently at train and test time and report a state-conditional out-of-distribution (OOD) metric alongside return. On D4RL MuJoCo tasks, LRT-Diffusion improves the return-OOD trade-off over strong Q-guided baselines in our implementation while honoring the desired alpha. Theoretically, we establish level-alpha calibration, concise stability bounds, and a return comparison showing when LRT surpasses Q-guidance-especially when off-support errors dominate. Overall, LRT-Diffusion is a drop-in, inference-time method that adds principled, calibrated risk control to diffusion policies for offline RL.", "link": "http://arxiv.org/abs/2510.24983v2", "date": "2026-02-19", "relevancy": 0.9721, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4978}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4881}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4723}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LRT-Diffusion%3A%20Calibrated%20Risk-Aware%20Guidance%20for%20Diffusion%20Policies&body=Title%3A%20LRT-Diffusion%3A%20Calibrated%20Risk-Aware%20Guidance%20for%20Diffusion%20Policies%0AAuthor%3A%20Ximan%20Sun%20and%20Xiang%20Cheng%0AAbstract%3A%20Diffusion%20policies%20are%20competitive%20for%20offline%20reinforcement%20learning%20%28RL%29%20but%20are%20typically%20guided%20at%20sampling%20time%20by%20heuristics%20that%20lack%20a%20statistical%20notion%20of%20risk.%20We%20introduce%20LRT-Diffusion%2C%20a%20risk-aware%20sampling%20rule%20that%20treats%20each%20denoising%20step%20as%20a%20sequential%20hypothesis%20test%20between%20the%20unconditional%20prior%20and%20the%20state-conditional%20policy%20head.%20Concretely%2C%20we%20accumulate%20a%20log-likelihood%20ratio%20and%20gate%20the%20conditional%20mean%20with%20a%20logistic%20controller%20whose%20threshold%20tau%20is%20calibrated%20once%20under%20H0%20to%20meet%20a%20user-specified%20Type-I%20level%20alpha.%20This%20turns%20guidance%20from%20a%20fixed%20push%20into%20an%20evidence-driven%20adjustment%20with%20a%20user-interpretable%20risk%20budget.%20Importantly%2C%20we%20deliberately%20leave%20training%20vanilla%20%28two%20heads%20with%20standard%20epsilon-prediction%29%20under%20the%20structure%20of%20DDPM.%20LRT%20guidance%20composes%20naturally%20with%20Q-gradients%3A%20critic-gradient%20updates%20can%20be%20taken%20at%20the%20unconditional%20mean%2C%20at%20the%20LRT-gated%20mean%2C%20or%20a%20blend%2C%20exposing%20a%20continuum%20from%20exploitation%20to%20conservatism.%20We%20standardize%20states%20and%20actions%20consistently%20at%20train%20and%20test%20time%20and%20report%20a%20state-conditional%20out-of-distribution%20%28OOD%29%20metric%20alongside%20return.%20On%20D4RL%20MuJoCo%20tasks%2C%20LRT-Diffusion%20improves%20the%20return-OOD%20trade-off%20over%20strong%20Q-guided%20baselines%20in%20our%20implementation%20while%20honoring%20the%20desired%20alpha.%20Theoretically%2C%20we%20establish%20level-alpha%20calibration%2C%20concise%20stability%20bounds%2C%20and%20a%20return%20comparison%20showing%20when%20LRT%20surpasses%20Q-guidance-especially%20when%20off-support%20errors%20dominate.%20Overall%2C%20LRT-Diffusion%20is%20a%20drop-in%2C%20inference-time%20method%20that%20adds%20principled%2C%20calibrated%20risk%20control%20to%20diffusion%20policies%20for%20offline%20RL.%0ALink%3A%20http%3A//arxiv.org/abs/2510.24983v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLRT-Diffusion%253A%2520Calibrated%2520Risk-Aware%2520Guidance%2520for%2520Diffusion%2520Policies%26entry.906535625%3DXiman%2520Sun%2520and%2520Xiang%2520Cheng%26entry.1292438233%3DDiffusion%2520policies%2520are%2520competitive%2520for%2520offline%2520reinforcement%2520learning%2520%2528RL%2529%2520but%2520are%2520typically%2520guided%2520at%2520sampling%2520time%2520by%2520heuristics%2520that%2520lack%2520a%2520statistical%2520notion%2520of%2520risk.%2520We%2520introduce%2520LRT-Diffusion%252C%2520a%2520risk-aware%2520sampling%2520rule%2520that%2520treats%2520each%2520denoising%2520step%2520as%2520a%2520sequential%2520hypothesis%2520test%2520between%2520the%2520unconditional%2520prior%2520and%2520the%2520state-conditional%2520policy%2520head.%2520Concretely%252C%2520we%2520accumulate%2520a%2520log-likelihood%2520ratio%2520and%2520gate%2520the%2520conditional%2520mean%2520with%2520a%2520logistic%2520controller%2520whose%2520threshold%2520tau%2520is%2520calibrated%2520once%2520unde

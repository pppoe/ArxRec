{"title": "From Subtle to Significant: Prompt-Driven Self-Improving Optimization in Test-Time Graph OOD Detection", "author": "Luzhi Wang and Xuanshuo Fu and He Zhang and Chuang Liu and Xiaobao Wang and Hongbo Liu", "abstract": "Graph Out-of-Distribution (OOD) detection aims to identify whether a test graph deviates from the distribution of graphs observed during training, which is critical for ensuring the reliability of Graph Neural Networks (GNNs) when deployed in open-world scenarios. Recent advances in graph OOD detection have focused on test-time training techniques that facilitate OOD detection without accessing potential supervisory information (e.g., training data). However, most of these methods employ a one-pass inference paradigm, which prevents them from progressively correcting erroneous predictions to amplify OOD signals. To this end, we propose a \\textbf{S}elf-\\textbf{I}mproving \\textbf{G}raph \\textbf{O}ut-\\textbf{o}f-\\textbf{D}istribution detector (SIGOOD), which is an unsupervised framework that integrates continuous self-learning with test-time training for effective graph OOD detection. Specifically, SIGOOD generates a prompt to construct a prompt-enhanced graph that amplifies potential OOD signals. To optimize prompts, SIGOOD introduces an Energy Preference Optimization (EPO) loss, which leverages energy variations between the original test graph and the prompt-enhanced graph. By iteratively optimizing the prompt by involving it into the detection model in a self-improving loop, the resulting optimal prompt-enhanced graph is ultimately used for OOD detection. Comprehensive evaluations on 21 real-world datasets confirm the effectiveness and outperformance of our SIGOOD method. The code is at https://github.com/Ee1s/SIGOOD.", "link": "http://arxiv.org/abs/2602.17342v1", "date": "2026-02-19", "relevancy": 2.5622, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.545}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5095}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4828}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Subtle%20to%20Significant%3A%20Prompt-Driven%20Self-Improving%20Optimization%20in%20Test-Time%20Graph%20OOD%20Detection&body=Title%3A%20From%20Subtle%20to%20Significant%3A%20Prompt-Driven%20Self-Improving%20Optimization%20in%20Test-Time%20Graph%20OOD%20Detection%0AAuthor%3A%20Luzhi%20Wang%20and%20Xuanshuo%20Fu%20and%20He%20Zhang%20and%20Chuang%20Liu%20and%20Xiaobao%20Wang%20and%20Hongbo%20Liu%0AAbstract%3A%20Graph%20Out-of-Distribution%20%28OOD%29%20detection%20aims%20to%20identify%20whether%20a%20test%20graph%20deviates%20from%20the%20distribution%20of%20graphs%20observed%20during%20training%2C%20which%20is%20critical%20for%20ensuring%20the%20reliability%20of%20Graph%20Neural%20Networks%20%28GNNs%29%20when%20deployed%20in%20open-world%20scenarios.%20Recent%20advances%20in%20graph%20OOD%20detection%20have%20focused%20on%20test-time%20training%20techniques%20that%20facilitate%20OOD%20detection%20without%20accessing%20potential%20supervisory%20information%20%28e.g.%2C%20training%20data%29.%20However%2C%20most%20of%20these%20methods%20employ%20a%20one-pass%20inference%20paradigm%2C%20which%20prevents%20them%20from%20progressively%20correcting%20erroneous%20predictions%20to%20amplify%20OOD%20signals.%20To%20this%20end%2C%20we%20propose%20a%20%5Ctextbf%7BS%7Delf-%5Ctextbf%7BI%7Dmproving%20%5Ctextbf%7BG%7Draph%20%5Ctextbf%7BO%7Dut-%5Ctextbf%7Bo%7Df-%5Ctextbf%7BD%7Distribution%20detector%20%28SIGOOD%29%2C%20which%20is%20an%20unsupervised%20framework%20that%20integrates%20continuous%20self-learning%20with%20test-time%20training%20for%20effective%20graph%20OOD%20detection.%20Specifically%2C%20SIGOOD%20generates%20a%20prompt%20to%20construct%20a%20prompt-enhanced%20graph%20that%20amplifies%20potential%20OOD%20signals.%20To%20optimize%20prompts%2C%20SIGOOD%20introduces%20an%20Energy%20Preference%20Optimization%20%28EPO%29%20loss%2C%20which%20leverages%20energy%20variations%20between%20the%20original%20test%20graph%20and%20the%20prompt-enhanced%20graph.%20By%20iteratively%20optimizing%20the%20prompt%20by%20involving%20it%20into%20the%20detection%20model%20in%20a%20self-improving%20loop%2C%20the%20resulting%20optimal%20prompt-enhanced%20graph%20is%20ultimately%20used%20for%20OOD%20detection.%20Comprehensive%20evaluations%20on%2021%20real-world%20datasets%20confirm%20the%20effectiveness%20and%20outperformance%20of%20our%20SIGOOD%20method.%20The%20code%20is%20at%20https%3A//github.com/Ee1s/SIGOOD.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17342v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Subtle%2520to%2520Significant%253A%2520Prompt-Driven%2520Self-Improving%2520Optimization%2520in%2520Test-Time%2520Graph%2520OOD%2520Detection%26entry.906535625%3DLuzhi%2520Wang%2520and%2520Xuanshuo%2520Fu%2520and%2520He%2520Zhang%2520and%2520Chuang%2520Liu%2520and%2520Xiaobao%2520Wang%2520and%2520Hongbo%2520Liu%26entry.1292438233%3DGraph%2520Out-of-Distribution%2520%2528OOD%2529%2520detection%2520aims%2520to%2520identify%2520whether%2520a%2520test%2520graph%2520deviates%2520from%2520the%2520distribution%2520of%2520graphs%2520observed%2520during%2520training%252C%2520which%2520is%2520critical%2520for%2520ensuring%2520the%2520reliability%2520of%2520Graph%2520Neural%2520Networks%2520%2528GNNs%2529%2520when%2520deployed%2520in%2520open-world%2520scenarios.%2520Recent%2520advances%2520in%2520graph%2520OOD%2520detection%2520have%2520focused%2520on%2520test-time%2520training%2520techniques%2520that%2520facilitate%2520OOD%2520detection%2520without%2520accessing%2520potential%2520supervisory%2520information%2520%2528e.g.%252C%2520training%2520data%2529.%2520However%252C%2520most%2520of%2520these%2520methods%2520employ%2520a%2520one-pass%2520inference%2520paradigm%252C%2520which%2520prevents%2520them%2520from%2520progressively%2520correcting%2520erroneous%2520predictions%2520to%2520amplify%2520OOD%2520signals.%2520To%2520this%2520end%252C%2520we%2520propose%2520a%2520%255Ctextbf%257BS%257Delf-%255Ctextbf%257BI%257Dmproving%2520%255Ctextbf%257BG%257Draph%2520%255Ctextbf%257BO%257Dut-%255Ctextbf%257Bo%257Df-%255Ctextbf%257BD%257Distribution%2520detector%2520%2528SIGOOD%2529%252C%2520which%2520is%2520an%2520unsupervised%2520framework%2520that%2520integrates%2520continuous%2520self-learning%2520with%2520test-time%2520training%2520for%2520effective%2520graph%2520OOD%2520detection.%2520Specifically%252C%2520SIGOOD%2520generates%2520a%2520prompt%2520to%2520construct%2520a%2520prompt-enhanced%2520graph%2520that%2520amplifies%2520potential%2520OOD%2520signals.%2520To%2520optimize%2520prompts%252C%2520SIGOOD%2520introduces%2520an%2520Energy%2520Preference%2520Optimization%2520%2528EPO%2529%2520loss%252C%2520which%2520leverages%2520energy%2520variations%2520between%2520the%2520original%2520test%2520graph%2520and%2520the%2520prompt-enhanced%2520graph.%2520By%2520iteratively%2520optimizing%2520the%2520prompt%2520by%2520involving%2520it%2520into%2520the%2520detection%2520model%2520in%2520a%2520self-improving%2520loop%252C%2520the%2520resulting%2520optimal%2520prompt-enhanced%2520graph%2520is%2520ultimately%2520used%2520for%2520OOD%2520detection.%2520Comprehensive%2520evaluations%2520on%252021%2520real-world%2520datasets%2520confirm%2520the%2520effectiveness%2520and%2520outperformance%2520of%2520our%2520SIGOOD%2520method.%2520The%2520code%2520is%2520at%2520https%253A//github.com/Ee1s/SIGOOD.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17342v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Subtle%20to%20Significant%3A%20Prompt-Driven%20Self-Improving%20Optimization%20in%20Test-Time%20Graph%20OOD%20Detection&entry.906535625=Luzhi%20Wang%20and%20Xuanshuo%20Fu%20and%20He%20Zhang%20and%20Chuang%20Liu%20and%20Xiaobao%20Wang%20and%20Hongbo%20Liu&entry.1292438233=Graph%20Out-of-Distribution%20%28OOD%29%20detection%20aims%20to%20identify%20whether%20a%20test%20graph%20deviates%20from%20the%20distribution%20of%20graphs%20observed%20during%20training%2C%20which%20is%20critical%20for%20ensuring%20the%20reliability%20of%20Graph%20Neural%20Networks%20%28GNNs%29%20when%20deployed%20in%20open-world%20scenarios.%20Recent%20advances%20in%20graph%20OOD%20detection%20have%20focused%20on%20test-time%20training%20techniques%20that%20facilitate%20OOD%20detection%20without%20accessing%20potential%20supervisory%20information%20%28e.g.%2C%20training%20data%29.%20However%2C%20most%20of%20these%20methods%20employ%20a%20one-pass%20inference%20paradigm%2C%20which%20prevents%20them%20from%20progressively%20correcting%20erroneous%20predictions%20to%20amplify%20OOD%20signals.%20To%20this%20end%2C%20we%20propose%20a%20%5Ctextbf%7BS%7Delf-%5Ctextbf%7BI%7Dmproving%20%5Ctextbf%7BG%7Draph%20%5Ctextbf%7BO%7Dut-%5Ctextbf%7Bo%7Df-%5Ctextbf%7BD%7Distribution%20detector%20%28SIGOOD%29%2C%20which%20is%20an%20unsupervised%20framework%20that%20integrates%20continuous%20self-learning%20with%20test-time%20training%20for%20effective%20graph%20OOD%20detection.%20Specifically%2C%20SIGOOD%20generates%20a%20prompt%20to%20construct%20a%20prompt-enhanced%20graph%20that%20amplifies%20potential%20OOD%20signals.%20To%20optimize%20prompts%2C%20SIGOOD%20introduces%20an%20Energy%20Preference%20Optimization%20%28EPO%29%20loss%2C%20which%20leverages%20energy%20variations%20between%20the%20original%20test%20graph%20and%20the%20prompt-enhanced%20graph.%20By%20iteratively%20optimizing%20the%20prompt%20by%20involving%20it%20into%20the%20detection%20mod {"title": "Enhancing Multilingual LLM Pretraining with Model-Based Data Selection", "author": "Bettina Messmer and Vinko Sabol\u010dec and Martin Jaggi", "abstract": "Dataset curation has become a basis for strong large language model (LLM) performance. While various rule-based filtering heuristics exist for English and multilingual datasets, model-based filtering techniques have primarily focused on English. To address the disparity stemming from limited research on non-English languages, we develop a model-based filtering framework for multilingual datasets that aims to identify a diverse set of structured and knowledge-rich samples. Our approach emphasizes transparency, simplicity, and efficiency, leveraging Transformer- and FastText-based classifiers to ensure the broad accessibility of our technique and data. We conduct comprehensive ablation studies on the FineWeb-2 web crawl dataset across diverse language families, scripts, and resource availability to demonstrate the effectiveness of our method. Training a 1B-parameter Llama model for 70B and 119B tokens, our approach can match the baseline MMLU score with as little as 15% of the training tokens, while also improving across other benchmarks and mitigating the curse of multilinguality. These findings provide strong evidence for the generalizability of our approach to other languages. As a result, we extend our framework to 20 languages for which we release the refined pretraining datasets.", "link": "http://arxiv.org/abs/2502.10361v2", "date": "2026-02-19", "relevancy": 2.5495, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5263}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5017}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org %20to%2020%20languages%20for%20which%20we%20release%20the%20refined%20pretraining%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2502.10361v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Multilingual%2520LLM%2520Pretraining%2520with%2520Model-Based%2520Data%2520Selection%26entry.906535625%3DBettina%2520Messmer%2520and%2520Vinko%2520Sabol%25C4%258Dec%2520and%2520Martin%2520Jaggi%26entry.1292438233%3DDataset%2520curation%2520has%2520become%2520a%2520basis%2520for%2520strong%2520large%2520language%2520model%2520%2528LLM%2529%2520performance.%2520While%2520various%2520rule-based%2520filtering%2520heuristics%2520exist%2520for%2520English%2520and%2520multilingual%2520datasets%252C%2520model-based%2520filtering%2520techniques%2520have%2520primarily%2520focused%2520on%2520English.%2520To%2520address%2520the%2520disparity%2520stemming%2520from%2520limited%2520research%2520on%2520non-English%2520languages%252C%2520we%2520develop%2520a%2520model-based%2520filtering%2520framework%2520for%2520multilingual%2520datasets%2520that%2520aims%2520to%2520identify%2520a%2520diverse%2520set%2520of%2520structured%2520and%2520knowledge-rich%2520samples.%2520Our%2520approach%2520emphasizes%2520transparency%252C%2520simplicity%252C%2520and%2520efficiency%252C%2520leveraging%2520Transformer-%2520and%2520FastText-based%2520classifiers%2520to%2520ensure%2520the%2520broad%2520accessibility%2520of%2520our%2520technique%2520and%2520data.%2520We%2520conduct%2520comprehensive%2520ablation%2520studies%2520on%2520the%2520FineWeb-2%2520web%2520crawl%2520dataset%2520across%2520diverse%2520language%2520families%252C%2520scripts%252C%2520and%2520resource%2520availability%2520to%2520demonstrate%2520the%2520effectiveness%2520of%2520our%2520method.%2520Training%2520a%25201B-parameter%2520Llama%2520model%2520for%252070B%2520and%2520119B%2520tokens%252C%2520our%2520approach%2520can%2520match%2520the%2520baseline%2520MMLU%2520score%2520with%2520as%2520little%2520as%252015%2525%2520of%2520the%2520training%2520tokens%252C%2520while%2520also%2520improving%2520across%2520other%2520benchmarks%2520and%2520mitigating%2520the%2520curse%2520of%2520multilinguality.%2520These%2520findings%2520provide%2520strong%2520evidence%2520for%2520the%2520generalizability%2520of%2520our%2520approach%2520to%2520other%2520languages.%2520As%2520a%2520result%252C%2520we%2520extend%2520our%2520framework%2520to%252020%2520languages%2520for%2520which%2520we%2520release%2520the%2520refined%2520pretraining%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2502.10361v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Enhancing%20Multilingual%20LLM%20Pretraining%20with%20Model-Based%20Data%20Selection&entry.906535625=Bettina%20Messmer%20and%20Vinko%20Sabol%C4%8Dec%20and%20Martin%20Jaggi&entry.1292438233=Dataset%20curation%20has%20become%20a%20basis%20for%20strong%20large%20language%20model%20%28LLM%29%20performance.%20While%20various%20rule-based%20filtering%20heuristics%20exist%20for%20English%20and%20multilingual%20datasets%2C%20model-based%20filtering%20techniques%20have%20primarily%20focused%20on%20English.%20To%20address%20the%20disparity%20stemming%20from%20limited%20research%20on%20non-English%20languages%2C%20we%20develop%20a%20model-based%20filtering%20framework%20for%20multilingual%20datasets%20that%20aims%20to%20identify%20a%20diverse%20set%20of%20structured%20and%20knowledge-rich%20samples.%20Our%20approach%20emphasizes%20transparency%2C%20simplicity%2C%20and%20efficiency%2C%20leveraging%20Transformer-%20and%20FastText-based%20classifiers%20to%20ensure%20the%20broad%20accessibility%20of%20our%20technique%20and%20data.%20We%20conduct%20comprehensive%20ablation%20studies%20on%20the%20FineWeb-2%20web%20crawl%20dataset%20across%20diverse%20language%20families%2C%20scripts%2C%20and%20resource%20availability%20to%20demonstrate%20the%20effectiveness%20of%20our%20method.%20Training%20a%201B-parameter%20Llama%20model%20for%2070B%20and%20119B%20tokens%2C%20our%20approach%20can%20match%20the%20baseline%20MMLU%20score%20with%20as%20little%20as%2015%25%20of%20the%20training%20tokens%2C%20while%20also%20improving%20across%20other%20benchmarks%20and%20mitigating%20the%20curse%20of%20multilinguality.%20These%20findings%20provide%20strong%20evidence%20for%20the%20generalizability%20of%20our%20approach%20to%20other%20languages.%20As%20a%20result%2C%20we%20extend%20our%20framework%20to%2020%20languages%20for%20which%20we%20release%20the%20refined%20pretraining%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2502.10361v2&entry.124074799=Read"},
{"title": "Polaffini: A feature-based approach for robust affine and polyaffine image registration", "author": "Antoine Legouhy and Cosimo Campo and Ross Callaghan and Hojjat Azadbakht and Hui Zhang", "abstract": "In this work we present Polaffini, a robust and versatile framework for anatomically grounded registration. Medical image registration is dominated by intensity-based registration methods that rely on surrogate measures of alignment quality. In contrast, feature-based approaches that operate by identifying explicit anatomical correspondences, while more desirable in theory, have largely fallen out of favor due to the challenges of reliably extracting features. However, such challenges are now significantly overcome thanks to recent advances in deep learning, which provide pre-trained segmentation models capable of instantly delivering reliable, fine-grained anatomical delineations. We aim to demonstrate that these advances can be leveraged to create new anatomically-grounded image registration algorithms. To this end, we propose Polaffini, which obtains, from these segmented regions, anatomically grounded feature points with 1-to-1 correspondence in a particularly simple way: extracting their centroids. These enable efficient global and local affine matching via closed-form solutions. Those are used to produce an overall transformation ranging from affine to polyaffine with tunable smoothness. Polyaffine transformations can have many more degrees of freedom than affine ones allowing for finer alignment, and their embedding in the log-Euclidean framework ensures diffeomorphic properties. Polaffini has applications both for standalone registration and as pre-alignment for subsequent non-linear registration, and we evaluate it against popular intensity-based registration techniques. Results demonstrate that Polaffini outperforms competing methods in terms of structural alignment and provides improved initialisation for downstream non-linear registration. Polaffini is fast, robust, and accurate, making it particularly well-suited for integration into medical image processing pipelines.", "link": "http://arxiv.org/abs/2602.17337v1", "date": "2026-02-19", "relevancy": 2.5453, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5329}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5107}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4836}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Polaffini%3A%20A%20feature-based%20approach%20for%20robust%20affine%20and%20polyaffine%20image%20registration&body=Title%3A%20Polaffini%3A%20A%20feature-based%20approach%20for%20robust%20affine%20and%20polyaffine%20image%20registration%0AAuthor%3A%20Antoine%20Legouhy%20and%20Cosimo%20Campo%20and%20Ross%20Callaghan%20and%20Hojjat%20Azadbakht%20and%20Hui%20Zhang%0AAbstract%3A%20In%20this%20work%20we%20present%20Polaffini%2C%20a%20robust%20and%20versatile%20framework%20for%20anatomically%20grounded%20registration.%20Medical%20image%20registration%20is%20dominated%20by%20intensity-based%20registration%20methods%20that%20rely%20on%20surrogate%20measures%20of%20alignment%20quality.%20In%20contrast%2C%20feature-based%20approaches%20that%20operate%20by%20identifying%20explicit%20anatomical%20correspondences%2C%20while%20more%20desirable%20in%20theory%2C%20have%20largely%20fallen%20out%20of%20favor%20due%20to%20the%20challenges%20of%20reliably%20extracting%20features.%20However%2C%20such%20challenges%20are%20now%20significantly%20overcome%20thanks%20to%20recent%20advances%20in%20deep%20learning%2C%20which%20provide%20pre-trained%20segmentation%20models%20capable%20of%20instantly%20delivering%20reliable%2C%20fine-grained%20anatomical%20delineations.%20We%20aim%20to%20demonstrate%20that%20these%20advances%20can%20be%20leveraged%20to%20create%20new%20anatomically-grounded%20image%20registration%20algorithms.%20To%20this%20end%2C%20we%20propose%20Polaffini%2C%20which%20obtains%2C%20from%20these%20segmented%20regions%2C%20anatomically%20grounded%20feature%20points%20with%201-to-1%20correspondence%20in%20a%20particularly%20simple%20way%3A%20extracting%20their%20centroids.%20These%20enable%20efficient%20global%20and%20local%20affine%20matching%20via%20closed-form%20solutions.%20Those%20are%20used%20to%20produce%20an%20overall%20transformation%20ranging%20from%20affine%20to%20polyaffine%20with%20tunable%20smoothness.%20Polyaffine%20transformations%20can%20have%20many%20more%20degrees%20of%20freedom%20than%20affine%20ones%20allowing%20for%20finer%20alignment%2C%20and%20their%20embedding%20in%20the%20log-Euclidean%20framework%20ensures%20diffeomorphic%20properties.%20Polaffini%20has%20applications%20both%20for%20standalone%20registration%20and%20as%20pre-alignment%20for%20subsequent%20non-linear%20registration%2C%20and%20we%20evaluate%20it%20against%20popular%20intensity-based%20registration%20techniques.%20Results%20demonstrate%20that%20Polaffini%20outperforms%20competing%20methods%20in%20terms%20of%20structural%20alignment%20and%20provides%20improved%20initialisation%20for%20downstream%20non-linear%20registration.%20Polaffini%20is%20fast%2C%20robust%2C%20and%20accurate%2C%20making%20it%20particularly%20well-suited%20for%20integration%20into%20medical%20image%20processing%20pipelines.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17337v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPolaffini%253A%2520A%2520feature-based%2520approach%2520for%2520robust%2520affine%2520and%2520polyaffine%2520image%2520registration%26entry.906535625%3DAntoine%2520Legouhy%2520and%2520Cosimo%2520Campo%25 {"title": "Supervised Graph Contrastive Learning for Gene Regulatory Networks", "author": "Sho Oshima and Yuji Okamoto and Taisei Tosaki and Ryosuke Kojima", "abstract": "Graph Contrastive Learning (GCL) is a powerful self-supervised learning framework that performs data augmentation through graph perturbations, with growing applications in the analysis of biological networks such as Gene Regulatory Networks (GRNs). The artificial perturbations commonly used in GCL, such as node dropping, induce structural changes that can diverge from biological reality. This concern has contributed to a broader trend in graph representation learning toward augmentation-free methods, which view such structural changes as problematic and should be avoided. However, this trend overlooks the fundamental insight that structural changes from biologically meaningful perturbations are not a problem to be avoided, but rather a rich source of information, thereby ignoring the valuable opportunity to leverage data from real biological experiments. Motivated by this insight, we propose SupGCL (Supervised Graph Contrastive Learning), a new GCL method for GRNs that directly incorporates biological perturbations from gene knockdown experiments as supervision. SupGCL is a probabilistic formulation that continuously generalizes conventional GCL, linking artificial augmentations with real perturbations measured in knockdown experiments, and using the latter as explicit supervision. On patient-derived GRNs from three cancer types, we train GRN representations with SupGCL and evaluate it in two regimes: (i) embedding space analysis, where it yields clearer disease-subtype structure and improves clustering, and (ii) task-specific fine-tuning, where it consistently outperforms strong graph representation learning baselines on 13 downstream tasks spanning gene-level functional annotation and patient-level prediction.", "link": "http://arxiv.org/abs/2505.17786v5", "date": "2026-02-19", "relevancy": 2.538 %29%2C%20a%20new%20GCL%20method%20for%20GRNs%20that%20directly%20incorporates%20biological%20perturbations%20from%20gene%20knockdown%20experiments%20as%20supervision.%20SupGCL%20is%20a%20probabilistic%20formulation%20that%20continuously%20generalizes%20conventional%20GCL%2C%20linking%20artificial%20augmentations%20with%20real%20perturbations%20measured%20in%20knockdown%20experiments%2C%20and%20using%20the%20latter%20as%20explicit%20supervision.%20On%20patient-derived%20GRNs%20from%20three%20cancer%20types%2C%20we%20train%20GRN%20representations%20with%20SupGCL%20and%20evaluate%20it%20in%20two%20regimes%3A%20%28i%29%20embedding%20space%20analysis%2C%20where%20it%20yields%20clearer%20disease-subtype%20structure%20and%20improves%20clustering%2C%20and%20%28ii%29%20task-specific%20fine-tuning%2C%20where%20it%20consistently%20outperforms%20strong%20graph%20representation%20learning%20baselines%20on%2013%20downstream%20tasks%20spanning%20gene-level%20functional%20annotation%20and%20patient-level%20prediction.%0ALink%3A%20http%3A//arxiv.org/abs/2505.17786v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSupervised%2520Graph%2520Contrastive%2520Learning%2520for%2520Gene%2520Regulatory%2520Networks%26entry.906535625%3DSho%2520Oshima%2520and%2520Yuji%2520Okamoto%2520and%2520Taisei%2520Tosaki%2520and%2520Ryosuke%2520Kojima%26entry.1292438233%3DGraph%2520Contrastive%2520Learning%2520%2528GCL%2529%2520is%2520a%2520powerful%2520self-supervised%2520learning%2520framework%2520that%2520performs%2520data%2520augmentation%2520through%2520graph%2520perturbations%252C%2520with%2520growing%2520applications%2520in%2520the%2520analysis%2520of%2520biological%2520networks%2520such%2520as%2520Gene%2520Regulatory%2520Networks%2520%2528GRNs%2529.%2520The%2520artificial%2520perturbations%2520commonly%2520used%2520in%2520GCL%252C%2520such%2520as%2520node%2520dropping%252C%2520induce%2520structural%2520changes%2 rong%2520graph%2520representation%2520learning%2520baselines%2520on%252013%2520downstream%2520tasks%2520spanning%2520gene-level%2520functional%2520annotation%2520and%2520patient-level%2520prediction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.17786v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Supervised%20Graph%20Contrastive%20Learning%20for%20Gene%20Regulatory%20Networks&entry.906535625=Sho%20Oshima%20and%20Yuji%20Okamoto%20and%20Taisei%20Tosaki%20and%20Ryosuke%20Kojima&entry.1292438233=Graph%20Contrastive%20Learning%20%28GCL%29%20is%20a%20powerful%20self-supervised%20learning%20framework%20that%20performs%20data%20augmentation%20through%20graph%20perturbations%2C%20with%20growing%20applications%20in%20the%20analysis%20of%20biological%20networks%20such%20as%20Gene%20Regulatory%20Networks%20%28GRNs%29.%20The%20artificial%20perturbations%20commonly%20used%20in%20GCL%2C%20such%20as%20node%20dropping%2C%20induce%20structural%20changes%20that%20can%20diverge%20from%20biological%20reality.%20This%20concern%20has%20contributed%20to%20a%20broader%20trend%20in%20graph%20representation%20learning%20toward%20augmentation-free%20methods%2C%20which%20view%20such%20structural%20changes%20as%20problematic%20and%20should%20be%20avoided.%20However%2C%20this%20trend%20overlooks%20the%20fundamental%20insight%20that%20structural%20changes%20from%20biologically%20meaningful%20perturbations%20are%20not%20a%20problem%20to%20be%20avoided%2C%20but%20rather%20a%20rich%20source%20of%20information%2C%20thereby%20ignoring%20the%20valuable%20opportunity%20to%20leverage%20data%20from%20real%20biological%20experiments.%20Motivated%20by%20this%20insight%2C%20we%20propose%20SupGCL%20%28Supervised%20Graph%20Contrastive%20Learning%29%2C%20a%20new%20GCL%20method%20for%20GRNs%20that%20directly%20incorporates%20biological%20perturbations%20from%20gene%20knockdown%20experiments%20as%20sup {"title": "Tracing Copied Pixels and Regularizing Patch Affinity in Copy Detection", "author": "Yichen Lu and Siwei Nie and Minlong Lu and Xudong Yang and Xiaobo Zhang and Peng Zhang", "abstract": "Image Copy Detection (ICD) aims to identify manipulated content between image pairs through robust feature representation learning. While self-supervised learning (SSL) has advanced ICD systems, existing view-level contrastive methods struggle with sophisticated edits due to insufficient fine-grained correspondence learning. We address this limitation by exploiting the inherent geometric traceability in edited content through two key innovations. First, we propose PixTrace - a pixel coordinate tracking module that maintains explicit spatial mappings across editing transformations. Second, we introduce CopyNCE, a geometrically-guided contrastive loss that regularizes patch affinity using overlap ratios derived from PixTrace's verified mappings. Our method bridges pixel-level traceability with patch-level similarity learning, suppressing supervision noise in SSL training. Extensive experiments demonstrate not only state-of-the-art performance (88.7% uAP / 83.9% RP90 for matcher, 72.6% uAP / 68.4% RP90 for descriptor on DISC21 dataset) but also better interpretability over existing methods.", "link": "http://arxiv.org/abs/2602.17484v1", "date": "2026-02-19", "relevancy": 2.5316, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5277}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.511}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4803}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tracing%20Copied%20Pixels%20and%20Regularizing%20Patch%20Affin orm": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Tracing%20Copied%20Pixels%20and%20Regularizing%20Patch%20Affinity%20in%20Copy%20Detection&entry.906535625=Yichen%20Lu%20and%20Siwei%20Nie%20and%20Minlong%20Lu%20and%20Xudong%20Yang%20and%20Xiaobo%20Zhang%20and%20Peng%20Zhang&entry.1292438233=Image%20Copy%20Detection%20%28ICD%29%20aims%20to%20identify%20manipulated%20content%20between%20image%20pairs%20through%20robust%20feature%20representation%20learning.%20While%20self-supervised%20learning%20%28SSL%29%20has%20advanced%20ICD%20systems%2C%20existing%20view-level%20contrastive%20methods%20struggle%20with%20sophisticated%20edits%20due%20to%20insufficient%20fine-grained%20correspondence%20learning.%20We%20address%20this%20limitation%20by%20exploiting%20the%20inherent%20geometric%20traceability%20in%20edited%20content%20through%20two%20key%20innovations.%20First%2C%20we%20propose%20PixTrace%20-%20a%20pixel%20coordinate%20tracking%20module%20that%20maintains%20explicit%20spatial%20mappings%20across%20editing%20transformations.%20Second%2C%20we%20introduce%20CopyNCE%2C%20a%20geometrically-guided%20contrastive%20loss%20that%20regularizes%20patch%20affinity%20using%20overlap%20ratios%20derived%20from%20PixTrace%27s%20verified%20mappings.%20Our%20method%20bridges%20pixel-level%20traceability%20with%20patch-level%20similarity%20learning%2C%20suppressing%20supervision%20noise%20in%20SSL%20training.%20Extensive%20experiments%20demonstrate%20not%20only%20state-of-the-art%20performance%20%2888.7%25%20uAP%20/%2083.9%25%20RP90%20for%20matcher%2C%2072.6%25%20uAP%20/%2068.4%25%20RP90%20for%20descriptor%20on%20DISC21%20dataset%29%20but%20also%20better%20interpretability%20over%20existing%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2602.17484v1&entry.124074799=Read"},
{"title": "FoundationPose-Initialized 3D-2D Liver Registration for Surgical Augmented Reality", "author": "Hanyuan Zhang and Lucas He and Runlong He and Abdolrahim Kadkhodamohammadi and Danail Stoyanov and Brian R. Davidson and Evangelos B. Mazomenos and Matthew J. Clarkson", "abstract": "Augmented reality can improve tumor localization in laparoscopic liver surgery. Existing registration pipelines typically depend on organ contours; deformable (non-rigid) alignment is often handled with finite-element (FE) models coupled to dimensionality-reduction or machine-learning components. We integrate laparoscopic depth maps with a foundation pose estimator for camera-liver pose estimation and replace FE-based deformation with non-rigid iterative closest point (NICP) to lower engineering/modeling complexity and expertise requirements. On real patient data, the depth-augmented foundation pose approach achieved 9.91 mm mean registration error in 3 cases. Combined rigid-NICP registration outperformed rigid-only registration, demonstrating NICP as an efficient substitute for finite-element deformable models. This pipeline achieves clinically relevant accuracy while offering a lightweight, engineering-friendly alternative to FE-based deformation.", "link": "http://arxiv.org/abs/2602.17517v1", "date": "2026-02-19", "relevancy": 2.5215, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5142}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5047}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4941}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FoundationPose-Initialized%203D-2D%20Liver%20Registration%20for%20Surgical%20Augmented%20Reality&body=Title%3A%20FoundationPose-Initialized%203D-2D%20Liver%20Registration%20for%20Surgical%20Augmented%20Reality%0AAuthor%3A%20Hanyuan%20Zhang%20and%20Lucas%20He%20and%20Runlong%20He%20and%20Abdolrahim%20Kadkhodamohammadi%20and%20Danail%20Stoyanov%20and%20Brian%20R.%20Davidson%20and%20Evangelos%20B.%20Mazomenos%20and%20Matthew%20J.%20Clarkson%0AAbstract%3A%20Augmented%20reality%20can%20improve%20tumor%20localization%20in%20laparoscopic%20liver%20surgery.%20Existing%20registration%20pipelines%20typically%20depend%20on%20organ%20contours%3B%20deformable%20%28non-rigid%29%20alignment%20is%20often%20handled%20with%20finite-element%20%28FE%29%20models%20coupled%20to%20dimensionality-reduction%20or%20machine-learning%20components.%20We%20integrate%20laparoscopic%20depth%20maps%20with%20a%20foundation%20pose%20estimator%20for%20camera-liver%20pose%20estimation%20and%20replace%20FE-based%20deformation%20with%20non-rigid%20iterative%20closest%20point%20%28NICP%29%20to%20lower%20engineering/modeling%20complexity%20and%20expertise%20requirements.%20On%20real%20patient%20data%2C%20the%20depth-augmented%20foundation%20pose%20approach%20achieved%209.91%20mm%20mean%20registration%20error%20in%203%20cases.%20Combined%20rigid-NICP%20registration%20outperformed%20rigid-only%20registration%2C%20demonstrating%20NICP%20as%20an%20efficient%20substitute%20for%20finite-element%20deformable%20models.%20This%20pipeline%20achieves%20clinically%20relevant%20accuracy%20while%20offering%20a%20lightweight%2C%20engineering-friendly%20alternative%20to%20FE-based%20deformation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17517v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFoundationPose-Initialized%25203D-2D%2520Liver%2520Registration%2520for%2520Surgical%2520Augmented%2520Reality%26entry.906535625%3DHanyuan%2520Zhang%2520and%2520Lucas%2520He%2520and%2520Runlong%2520He%2520and%2520Abdolrah d%20Lucas%20He%20and%20Runlong%20He%20and%20Abdolrahim%20Kadkhodamohammadi%20and%20Danail%20Stoyanov%20and%20Brian%20R.%20Davidson%20and%20Evangelos%20B.%20Mazomenos%20and%20Matthew%20J.%20Clarkson&entry.1292438233=Augmented%20reality%20can%20improve%20tumor%20localization%20in%20laparoscopic%20liver%20surgery.%20Existing%20registration%20pipelines%20typically%20depend%20on%20organ%20contours%3B%20deformable%20%28non-rigid%29%20alignment%20is%20often%20handled%20with%20finite-element%20%28FE%29%20models%20coupled%20to%20dimensionality-reduction%20or%20machine-learning%20components.%20We%20integrate%20laparoscopic%20depth%20maps%20with%20a%20foundation%20pose%20estimator%20for%20camera-liver%20pose%20estimation%20and%20replace%20FE-based%20deformation%20with%20non-rigid%20iterative%20closest%20point%20%28NICP%29%20to%20lower%20engineering/modeling%20complexity%20and%20expertise%20requirements.%20On%20real%20patient%20data%2C%20the%20depth-augmented%20foundation%20pose%20approach%20achieved%209.91%20mm%20mean%20registration%20error%20in%203%20cases.%20Combined%20rigid-NICP%20registration%20outperformed%20rigid-only%20registration%2C%20demonstrating%20NICP%20as%20an%20efficient%20substitute%20for%20finite-element%20deformable%20models.%20This%20pipeline%20achieves%20clinically%20relevant%20accuracy%20while%20offering%20a%20lightweight%2C%20engineering-friendly%20alternative%20to%20FE-based%20deformation.&entry.1838667208=http%3A//arxiv.org/abs/2602.17517v1&entry.124074799=Read"},
{"title": "Restrictive Hierarchical Semantic Segmentation for Stratified Tooth Layer Detection", "author": "Ryan Banks and Camila Lindoni Azevedo and Hongying Tang and Yunpeng Li", "abstract": "Accurate understanding of anatomical structures is essential for reliably staging certain dental diseases. A way of introducing this within semantic segmentation models is by utilising hierarchy-aware methodologies. However, existing hierarchy-aware segmentation methods largely encode anatomical structure through the loss functions, providing weak and indirect supervision. We introduce a general framework that embeds an explicit anatomical hierarchy into semantic segmentation by coupling a recurrent, level-wise prediction scheme with restrictive output heads and top-down feature conditioning. At each depth of the class tree, the backbone is re-run on the original image concatenated with logits from the previous level. Child class features are conditioned using Feature-wise Linear Modulation of their parent class probabilities, to modulate child feature spaces for fine grained detection. A probabilistic composition rule enforces consistency between parent and descendant classes. Hierarchical loss combines per-level class weighted Dice and cross entropy loss and a consistency term loss, ensuring parent predictions are the sum of their children. We validate our approach on our proposed dataset, TL-pano, containing 194 panoramic radiographs with dense instance and semantic segmentation annotations, of tooth layers and alveolar bone. Utilising UNet and HRNet as donor models across a 5-fold cross validation scheme, the hierarchical variants consistently increase IoU, Dice, and recall, particularly for fine-grained anatomies, and produce more anatomically coherent masks. However, hierarchical variants also demonstrated increased recall over precision, implying increased false positives. The results demonstrate that explicit hierarchical structuring improves both performance and clinical plausibility, especially in low data dental imaging regimes.", "link": "http://arxiv.org/abs/2512.07984v4", "date": "2026-02-19", "relevancy": 2.5144, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5051}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5051}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4985}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Restrictive%20Hierarchical%20Semantic%20Segmentation%20for%20Stratified%20Tooth%20Layer%20Detection&body=Title%3A%20Restrictive%20Hierarchical%20Semantic%20Segmentation%20for%20Stratified%20Tooth%20Layer%20Detection%0AAuthor%3A%20Ryan%20Banks%20and%20Camila%20Lindoni%20Azevedo%20and%20Hongying%20Tang%20and%20Yunpeng%20Li%0AAbstract%3A%20Accurate%20understanding%20of%20anatomical%20structures%20is%20essential%20for%20reliably%20staging%20certain%20dental%20diseases.%20A%20way%20of%20introducing%20this%20within%20semantic%20segmentation%20models%20is%20by%20utilising%20hierarchy-aware%20methodologies.%20However%2C%20existing%20hierarchy-aware%20segmentation%20methods%20largely%20encode%20anatomical%20structure%20through%20the%20loss%20functions%2C%20providing%20weak%20and%20indirect%20supervision.%20We%20introduce%20a%20general%20framework%20that%20embeds%20an%20explicit%20anatomical%20hierarchy%20into%20semantic%20segmentation%20by%20coupling%20a%20recurrent%2C%20level-wise%20prediction%20scheme%20with%20restrictive%20output%20heads%20and%20top-down%20feature%20conditioning.%20At%20each%20depth%20of%20the%20class%20tree%2C%20the%20backbone%20is%20re-run%20on%20the%20original%20image%20concatenated%20with%20logits%20from%20the%20previous%20level.%20Child%20class%20features%20 {"title": "AI-Assisted Decision Making with Human Learning", "author": "Gali Noti and Kate Donahue and Jon Kleinberg and Sigal Oren", "abstract": "AI systems increasingly support human decision-making. In many cases, despite the algorithm's superior performance, the final decision remains in human hands. For example, an AI may assist doctors in determining which diagnostic tests to run, but the doctor ultimately makes the diagnosis. This paper studies such AI-assisted decision-making settings, where the human learns through repeated interactions with the algorithm. In our framework, the algorithm -- designed to maximize decision accuracy according to its own model -- determines which features the human can consider. The human then makes a prediction based on their own less accurate model. We observe that the discrepancy between the algorithm's model and the human's model creates a fundamental tradeoff: Should the algorithm prioritize recommending more informative features, encouraging the human to learn their importance, even if it results in less accurate predictions in the short term until learning occurs? Or is it preferable to forgo educating the human and instead select features that align more closely with their existing understanding, minimizing the immediate cost of learning? Our analysis reveals how this trade-off is shaped by both the algorithm's patience (the time-discount rate of its objective over multiple periods) and the human's willingness and ability to learn. We show that optimal feature selection has a surprisingly clean combinatorial characterization, reducible to a stationary sequence of feature subsets that is tractable to compute. As the algorithm becomes more \"patient\" or the human's learning improves, the algorithm increasingly selects more informative features, enhancing both prediction accuracy and the human's understanding.", "link": "http://arxiv.org/abs/2502.13062v2", "date": "2026-02-19", "relevancy": 2.4884, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.504}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4959}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4932}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI-Assisted%20Decision%20Making%20with%20Human%20Learning&body=Title%3A%20AI-Assisted%20Decision%20Making%20with%20Human%20Learning%0AAuthor%3A%20Gali%20Noti%20and%20Kate%20Donahue%20and%20Jon%20Kleinberg%20and%20Sigal%20Oren%0AAbstract%3A%20AI%20systems%20increasingly%20support%20human%20decision-making.%20In%20many%20cases%2C%20despite%20the%20algorithm%27s%20superior%20performance%2C%20the%20final%20decision%20remains%20in%20human%20hands.%20For%20example%2C%20an%20AI%20may%20assist%20doctors%20in%20determining%20which%20diagnostic%20tests%20to%20run%2C%20but%20the%20doctor%20ultimately%20makes%20the%20diagnosis.%20This%20paper%20studies%20such%20AI-assisted%20decision-making%20settings%2C%20where%20the%20human%20learns%20through%20repeated%20interactions%20with%20the%20algorithm.%20In%20our%20framework%2C%20the%20algorithm%20--%20designed%20to%20maximize%20decision%20accuracy%20according%20to%20its%20own%20model%20--%20determines%20which%20features%20the%20human%20can%20consider.%20The%20human%20then%20makes%20a%20prediction%20based%20on%20their%20own%20less%20accurate%20model.%20We%20observe%20that%20the%20discrepancy%20between%20the%20algorithm%27s%20model%20and%20the%20human%27s%20model%20creates%20a%20fundamental%20tradeoff%3A%20Should%20the%20algorithm%20prioritize%20recommending%20more%20informative%20features%2C%20encouraging%20the%20human%20to%20learn%20their%20importance%2C%20even%20if%20it%20results%20in%20less%20accurate%20predictions%20in%20the%20short%20term%20until%20learning%20occurs%3F%20Or%20is%20it%20preferable%20to%20forgo%20educating%20the%20human%20and%20instead%20select%20features%20that%20align%20more%20closely%20with%20their%20existing%20understanding%2C%20minimizing%20the%20immediate%20cost%20of%20learning%3F%20Our%20analysis%20reveals%20how%20this%20trade-off%20is%20shaped%20by%20both%20the%20algorithm%27s%20patience%20%28the%20time-discount%20rate%20of%20its%20objective%20over%20multiple%20periods%29%20and%20the%20human%27s%20willingness%20and%20ability%20to%20learn.%20We%20show%20that%20optimal%20feature%20selection%20has%20a%20surprisingly%20clean%20combinatorial%20characterization%2C%20reducible%20to%20a%20stationary%20sequence%20of%20feature%20subsets%20that%20is%20tractable%20to%20compute.%20As%20the%20algorithm%20becomes%20more%20%22patient%22%20or%20the%20human%27s%20learning%20improves%2C%20the%20algorithm%20increasingly%20selects%20more%20informative%20features%2C%20enhancing%20both%20prediction%20accuracy%20and%20the%20human%27s%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2502.13062v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAI-Assisted%2520Decision%2520Making%2520with%2520Human%2520Learning%26entry.906535625%3DGali%2520Noti%2520and%2520Kate%2520Donahue%2520and%2520Jon%2520Kleinberg%2520and%2520Sigal%2520Oren%26entry.1292438233%3DAI%2520systems%2520increasingly%2520support%2520human%2520decision-making.%2520In%2520many%2520cases%252C%2520despite%2520the%2520algorithm%2527s%2520superior%2520performance%252C%2520the%2520final%2520decision%2520remains%2520in%2520human%2520hands.%2520For%2520example%252C%2520an%2520AI%2520may%2520assist%2520doctors%2520in%2520determining%2520which%2520diagnostic%2520tests%2520to%2520run%252C%2520but%2520the%2520doctor%2520ultimately%2520makes%2520the%2520diag 20short%20term%20until%20learning%20occurs%3F%20Or%20is%20it%20preferable%20to%20forgo%20educating%20the%20human%20and%20instead%20select%20features%20that%20align%20more%20closely%20with%20their%20existing%20understanding%2C%20minimizing%20the%20immediate%20cost%20of%20learning%3F%20Our%20analysis%20reveals%20how%20this%20trade-off%20is%20shaped%20by%20both%20the%20algorithm%27s%20patience%20%28the%20time-discount%20rate%20of%20its%20objective%20over%20multiple%20periods%29%20and%20the%20human%27s%20willingness%20and%20ability%20to%20learn.%20We%20show%20that%20optimal%20feature%20selection%20has%20a%20surprisingly%20clean%20combinatorial%20characterization%2C%20reducible%20to%20a%20stationary%20sequence%20of%20feature%20subsets%20that%20is%20tractable%20to%20compute.%20As%20the%20algorithm%20becomes%20more%20%22patient%22%20or%20the%20human%27s%20learning%20improves%2C%20the%20algorithm%20increasingly%20selects%20more%20informative%20features%2C%20enhancing%20both%20prediction%20accuracy%20and%20the%20human%27s%20understanding.&entry.1838667208=http%3A//arxiv.org/abs/2502.13062v2&entry.124074799=Read"},
{"title": "Multi-session Localization and Mapping Exploiting Topological Information", "author": "Lorenzo Montano-Olivan and Julio A. Placed and Luis Montano and Maria T. Lazaro", "abstract": "Operating in previously visited environments is becoming increasingly crucial for autonomous systems, with direct applications in autonomous driving, surveying, and warehouse or household robotics. This repeated exposure to observing the same areas poses significant challenges for mapping and localization -- key components for enabling any higher-level task. In this work, we propose a novel multi-session framework that builds on map-based localization, in contrast to the common practice of greedily running full SLAM sessions and trying to find correspondences between the resulting maps. Our approach incorporates a topology-informed, uncertainty-aware decision-making mechanism that analyzes the pose-graph structure to detect low-connectivity regions, selectively triggering mapping and loop closing modules. The resulting map and pose-graph are seamlessly integrated into the existing model, reducing accumulated error and enhancing global consistency. We validate our method on overlapping sequences from datasets and demonstrate its effectiveness in a real-world mine-like environment.", "link": "http://arxiv.org/abs/2602.17226v1", "date": "2026-02-19", "relevancy": 2.466, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6421}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6015}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5899}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20M LSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Multi-session%20Localization%20and%20Mapping%20Exploiting%20Topological%20Information&entry.906535625=Lorenzo%20Montano-Olivan%20and%20Julio%20A.%20Placed%20and%20Luis%20Montano%20and%20Maria%20T.%20Lazaro&entry.1292438233=Operating%20in%20previously%20visited%20environments%20is%20becoming%20increasingly%20crucial%20for%20autonomous%20systems%2C%20with%20direct%20applications%20in%20autonomous%20driving%2C%20surveying%2C%20and%20warehouse%20or%20household%20robotics.%20This%20repeated%20exposure%20to%20observing%20the%20same%20areas%20poses%20significant%20challenges%20for%20mapping%20and%20localization%20--%20key%20components%20for%20enabling%20any%20higher-level%20task.%20In%20this%20work%2C%20we%20propose%20a%20novel%20multi-session%20framework%20that%20builds%20on%20map-based%20localization%2C%20in%20contrast%20to%20the%20common%20practice%20of%20greedily%20running%20full%20SLAM%20sessions%20and%20trying%20to%20find%20correspondences%20between%20the%20resulting%20maps.%20Our%20approach%20incorporates%20a%20topology-informed%2C%20uncertainty-aware%20decision-making%20mechanism%20that%20analyzes%20the%20pose-graph%20structure%20to%20detect%20low-connectivity%20regions%2C%20selectively%20triggering%20mapping%20and%20loop%20closing%20modules.%20The%20resulting%20map%20and%20pose-graph%20are%20seamlessly%20integrated%20into%20the%20existing%20model%2C%20reducing%20accumulated%20error%20and%20enhancing%20global%20consistency.%20We%20validate%20our%20method%20on%20overlapping%20sequences%20from%20datasets%20and%20demonstrate%20its%20effectiveness%20in%20a%20real-world%20mine-like%20environment.&entry.1838667208=http%3A//arxiv.org/abs/2602.17226v1&entry.124074799=Read"},
{"title": "State of the Art in Text Classification for South Slavic Languages: Fine-Tuning or Prompting?", "author": "Taja Kuzman Punger\u0161ek and Peter Rupnik and Ivan Porupski and Vuk Dini\u0107 and Nikola Ljube\u0161i\u0107", "abstract": "Until recently, fine-tuned BERT-like models provided state-of-the-art performance on text classification tasks. With the rise of instruction-tuned decoder-only models, commonly known as large language models (LLMs), the field has increasingly moved toward zero-shot and few-shot prompting. However, the performance of LLMs on text classification, particularly on less-resourced languages, remains under-explored. In this paper, we evaluate the performance of current language models on text classification tasks across several South Slavic languages. We compare openly available fine-tuned BERT-like models with a selection of open-source and closed-source LLMs across three tasks in three domains: sentiment classification in parliamentary speeches, topic classification in news articles and parliamentary speeches, and genre identification in web texts. Our results show that LLMs demonstrate strong zero-shot performance, often matching or surpassing fine-tuned BERT-like models. Moreover, when used in a zero-shot setup, LLMs perform comparably in South Slavic languages and English. However, we also point out key drawbacks of LLMs, including less predictable outputs, significantly slower inference, and higher computational costs. Due to these limitations, fine-tuned BERT-like models remain a more practical choice for large-scale automatic text annotation.", "link": "http://arxiv.org/abs/2511.07989v2", "date": "2026-02-19", "relevancy": 2.4566, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5075}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5075}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20State%20of%20the%20Art%20in%20Text%20Classification%20for%20South%20Slavic%20Languages%3A%20Fine-Tuning%20or%20Prompting%3F&body=Title%3A%20State%20of%20the%20Art%20in%20Text%20Classification%20for%20South%20Slavic%20Languages%3A%20Fine-Tuning%20or%20Prompting%3F%0AAuthor%3A%20Taja%20Kuzman%20Punger%C5%A1ek%20and%20Peter%20Rupnik%20and%20Ivan%20Porupski%20and%20Vuk%20Dini%C4%87%20and%20Nikola%20Ljube%C5%A1i%C4%87%0AAbstract%3A%20Until%20recently%2C%20fine-tuned%20BERT-like%20models%20provided%20state-of-the-art%20performance%20on%20text%20classification%20tasks.%20With%20the%20rise%20of%20instruction-tuned%20decoder-only%20models%2C%20commonly%20known%20as%20large%20language%20models%20%28LLMs%29%2C%20the%20field%20has%20increasingly%20moved%20toward%20zero-shot%20and%20few-shot%20prompting.%20However%2C%20the%20performance%20of%20LLMs%20on%20text%20classification%2C%20particularly%20on%20less-resourced%20languages%2C%20remains%20under-explored.%20In%20this%20paper%2C%20we%20evaluate%20the%20performance%20of%20current%20language%20models%20on%20text%20classification%20tasks%20across%20several%20South%20Slavic%20languages.%20We%20compare%20openly%20available%20fine-tuned%20BERT-like%20models%20with%20a%20selection%20of%20open-source%20and%20closed-source%20LLMs%20across%20three%20tasks%20in%20three%20domains%3A%20sentiment%20classification%20in%20parliamentary%20speeches%2C%20topic%20classification%20in%20news%20articles%20and%20parliamentary%20speeches%2C%20and%20genre%20identification%20in%20web%20texts.%20Our%20results%20show%20that%20LLMs%20demonstrate%20strong%20zero-shot%20performance%2C%20often%20matching%20or%20surpassing%20fine-tuned%20BERT-like%20models.%20Moreover%2C%20when%20used%20in%20a%20zero-shot%20setup%2C%20LLMs%20perform%20comparably%20in%20South%20Slavic%20languages%20and%20English.%20However%2C%20we%20also%20point%20out%20key%20drawbacks%20of%20LLMs%2C%20including%20less%20predictable%20outputs%2C%20significantly%20slower%20inference%2C%20and%20higher%20computational%20costs.%20Due%20to%20these%20limitations%2C%20fine-tuned%20BERT-like%20models%20remain%20a%20more%20practical%20choice%20for%20large-scale%20automatic%20text%20annotation.%0ALink%3A%20http%3A//arxiv.org/abs/2511.07989v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DState%2520of%2520the%2520Art%2520in%2520Text%2520Classification%2520for%2520South%2520Slavic%2520Languages%253A%2520Fine-Tuning%2520or%2520Prompting%253F%26entry.906535625%3DTaja%2520Kuzman%2520Punger%25C5%25A1ek%2520and%2520Peter%2520Rupnik%2520and%2520Ivan%2520Porupski%2520and%2520Vuk%2520Dini%25C4%2587%2520and%2520Nikola%2520Ljube%25C5%25A1i%25C4%2587%26entry.1292438233%3DUntil%2520recently%252C%2520fine-tuned%2520BERT-like%2520models%2520provided%2520state-of-the-art%2520performance%2520on%2520text%2520classification%2520tasks.%2520With%2520the%2520rise%2520of%2520instruction-tuned%2520decoder-only%2520models%252C%2520commonly%2520known%2520as%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520the%2520field%2520has%2520increasingly%2520moved%2520toward%2520zero-shot%2520and%2520few-shot%2520prompting.%2520However%252C%2520the%2520performance%2520of%2520LLMs%2520on%2520text%2520classification%252C%2520particularly%2520on%2520less-resourced%2520languages%252C%2520remains%2520under-explored.%2520In%2520this%2520paper%252C%2520we%2520evaluate%2520the%2520performance%2520of%2520current%2520language%2520models%2520on%2520text%2520classification%2520tasks%2520across%2520several%2520South%2520Slavic%2520languages.%2520We%2520compare%2520openly%2520available%2520fine-tuned%2520BERT-like%2520models%2520with%2520a%25 {"title": "A High-Level Survey of Optical Remote Sensing", "author": "Panagiotis Koletsis and Vasilis Efthymiou and Maria Vakalopoulou and Nikos Komodakis and Anastasios Doulamis and Georgios Th. Papadopoulos", "abstract": "In recent years, significant advances in computer vision have also propelled progress in remote sensing. Concurrently, the use of drones has expanded, with many organizations incorporating them into their operations. Most drones are equipped by default with RGB cameras, which are both robust and among the easiest sensors to use and interpret. The body of literature on optical remote sensing is vast, encompassing diverse tasks, capabilities, and methodologies. Each task or methodology could warrant a dedicated survey. This work provides a comprehensive overview of the capabilities of the field, while also presenting key information, such as datasets and insights. It aims to serve as a guide for researchers entering the field, offering high-level insights and helping them focus on areas most relevant to their interests. To the best of our knowledge, no existing survey addresses this holistic perspective.", "link": "http://arxiv.org/abs/2602.17397v1", "date": "2026-02-19", "relevancy": 2.4544, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.492}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4903}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4903}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20High-Level%20Survey%20of%20Optical%20Remote%20Sensing&body=Title%3A%20A%20High-Level%20Survey%20of%20Optical%20Remote%20Sensing%0AAuthor%3A%20Panagiotis%20Koletsis%20and%20Vasilis%20Efthymiou%20a {"title": "Mine and Refine: Optimizing Graded Relevance in E-commerce Search Retrieval", "author": "Jiaqi Xi and Raghav Saboo and Luming Chen and Martin Wang and Sudeep Das", "abstract": "We propose a two-stage \"Mine and Refine\" contrastive training framework for semantic text embeddings to enhance multi-category e-commerce search retrieval. Large scale e-commerce search demands embeddings that generalize to long tail, noisy queries while adhering to scalable supervision compatible with product and policy constraints. A practical challenge is that relevance is often graded: users accept substitutes or complements beyond exact matches, and production systems benefit from clear separation of similarity scores across these relevance strata for stable hybrid blending and thresholding. To obtain scalable policy consistent supervision, we fine-tune a lightweight LLM on human annotations under a three-level relevance guideline and further reduce residual noise via engagement driven auditing. In Stage 1, we train a multilingual Siamese two-tower retriever with a label aware supervised contrastive objective that shapes a robust global semantic space. In Stage 2, we mine hard samples via ANN and re-annotate them with the policy aligned LLM, and introduce a multi-class extension of circle loss that explicitly sharpens similarity boundaries between relevance levels, to further refine and enrich the embedding space. Robustness is additionally improved through additive spelling augmentation and synthetic query generation. Extensive offline evaluations and production A/B tests show that our framework improves retrieval relevance and delivers statistically significant gains in engagement and business impact.", "link": "http://arxiv.org/abs/2602.17654v1", "date": "2026-02-19", "relevancy": 2.4251, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4852}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4849}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4849}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mine%20and%20Refine%3A%20Optimizing%20Graded%20Relevance%20in%20E-commerce%20Search%20Retrieval&body=Title%3A%20Mine%20and%20Refine%3A%20Optimizing%20Graded%20Relevance%20in%20E-commerce%20Search%20Retrieval%0AAuthor%3A%20Jiaqi%20Xi%20and%20Raghav%20Saboo%20and%20Luming%20Chen%20and%20Martin%20Wang%20and%20Sudeep%20Das%0AAbstract%3A%20We%20propose%20a%20two-stage%20%22Mine%20and%20Refine%22%20contrastive%20training%20framework%20for%20semantic%20text%20embeddings%20to%20enhance%20multi-category%20e-commerce%20search%20retrieval.%20Large%20scale%20e-commerce%20search%20demands%20embeddings%20that%20generalize%20to%20long%20tail%2C%20noisy%20queries%20while%20adhering%20to%20scalable%20supervision%20compatible%20with%20product%20and%20policy%20constraints.%20A%20practical%20challenge%20is%20that%20relevance%20is%20often%20graded%3A%20users%20accept%20substitutes%20or%20complements%20beyond%20exact%20matches%2C%20and%20production%20systems%20benefit%20from%20clear%20separation%20of%20similarity%20scores%20across%20these%20relevance%20strata%20for%20stable%20hybrid%20blending%20and%20thresholding.%20To%20obtain%20scalable%20policy%20consistent%20supervision%2C%20we%20fine-tune%20a%20lightweight%20LLM%20on%20human%20annotations%20under%20a%20three-level%20relevance%20guideline%20and%20further%20reduce%20residual%20noise%20via%20engagement%20driven%20auditing.%20In%20Stage%201%2C%20we%20train%20a%20multilingual%20Siamese%20two-tower%20retriever%20with%20a%20label%20aware%20supervised%20contrastive%20objective%20that%20shapes%20a%20robust%20global%20semantic%20space.%20In%20Stage%202%2C%20we%20mine%20hard%20samples%20via%20ANN%20and%20re-annotate%20them%20with%20the%20policy%20aligned%20LLM%2C%20and%20introduce%20a%20multi-class%20extension%20of%20circle%20loss%20that%20explicitly%20sharpens%20similarity%20boundaries%20between%20relevance%20levels%2C%20to%20further%20refine%20and%20enrich%20the%20embedding%20space.%20Robustness%20is%20additionally%20improved%20through%20additive%20spelling%20augmentation%20and%20synthetic%20query%20generation.%20Extensive%20offline%20evaluations%20and%20production%20A/B%20tests%20show%20that%20our%20framework%20improves%20retrieval%20relevance%20and%20delivers%20statistically%20significant%20gains%20in%20engagement%20and%20business%20impact.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17654v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMine%2520and%2520Refine%253A%2520Optimizing%2520Graded%2520Relevance%2520in%2520E-commerce%2520Search%2520Retrieval%26entry.906535625%3DJiaqi%2520Xi%2520and%2520Raghav%2520Saboo%2520and%2520Luming%2520Chen%2520and%2520Martin%2520Wang%2520and%2520Sudeep%2520Das%26entry.1292438233%3DWe%2520propose%2520a%2520two-stage%2520%2522Mine%2520and%2520Refine%2522%2520contrastive%2520training%2520framework%2520for%2520semantic%2520text%2520embeddings%2520to%2520enhance%2520multi-category%2520e-commerce%2520search%2520retrieval.%2520Large%2520scale%2520e-commerce%2520search%2520demands%2520embeddings%2520that%2520generalize%2520to%2520long%2520tail%252C%2520noisy%2520queries%2520while%2520adhering%2520to%2520scalable%2520supervision%2520compatible%2520with%2520product%2520and%2520policy%2520constraints.%2520A%2520practical%2520challenge%2520is%2520that%2520relevance%2520is%2520often%2520graded%253A%2520users%2520accept%2520substitutes%2520or%2520complements%2520beyond%2520exact%2520matches%252C%2520and%2520production%2520systems%2520benefit%2520from%2520clear%2520separation%2520of%2520similarity%252 {"title": "LATA: Laplacian-Assisted Transductive Adaptation for Conformal Uncertainty in Medical VLMs", "author": "Behzad Bozorgtabar and Dwarikanath Mahapatra and Sudipta Roy and Muzammal Naseer and Imran Razzak and Zongyuan Ge", "abstract": "Medical vision-language models (VLMs) are strong zero-shot recognizers for medical imaging, but their reliability under domain shift hinges on calibrated uncertainty with guarantees. Split conformal prediction (SCP) offers finite-sample coverage, yet prediction sets often become large (low efficiency) and class-wise coverage unbalanced-high class-conditioned coverage gap (CCV), especially in few-shot, imbalanced regimes; moreover, naively adapting to calibration labels breaks exchangeability and voids guarantees. We propose \\texttt{\\textbf{LATA}} (Laplacian-Assisted Transductive Adaptation), a \\textit{training- and label-free} refinement that operates on the joint calibration and test pool by smoothing zero-shot probabilities over an image-image k-NN graph using a small number of CCCP mean-field updates, preserving SCP validity via a deterministic transform. We further introduce a \\textit{failure-aware} conformal score that plugs into the vision-language uncertainty (ViLU) framework, providing instance-level difficulty and label plausibility to improve prediction set efficiency and class-wise balance at fixed coverage. \\texttt{\\textbf{LATA}} is black-box (no VLM updates), compute-light (windowed transduction, no backprop), and includes an optional prior knob that can run strictly label-free or, if desired, in a label-informed variant using calibration marginals once. Across \\textbf{three} medical VLMs and \\textbf{nine} downstream tasks, \\texttt{\\textbf{LATA}} consistently reduces set size and CCV while matching or tightening target coverage, outperforming prior transductive baselines and narrowing the gap to label-using methods, while using far less compute. Comprehensive ablations and qualitative analyses show that \\texttt{\\textbf{LATA}} sharpens zero-shot predictions without compromising exchangeability.", "link": "http://arxiv.org/abs/2602.17535v1", "date": "2026-02-19", "relevancy": 2.3861, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6206}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5945}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LATA%3A%20Laplacian-Assisted%20Transductive%20Adaptation%20for%20Conformal%20Uncertainty%20in%20Medical%20VLMs&body=Title%3A%20LATA%3A%20Laplacian-Assisted%20Transductive%20Adaptation%20for%20Conformal%20Uncertainty%20in%20Medical%20VLMs%0AAuthor%3A%20Behzad%20Bozorgtabar%20and%20Dwarikanath%20Mahapatra%20and%20Sudipta%20Roy%20and%20Muzammal%20Naseer%20and%20Imran%20Razzak%20and%20Zongyuan%20Ge%0AAbstract%3A%20Medical%20vision-language%20models%20%28VLMs%29%20are%20strong%20zero-shot%20recognizers%20for%20medical%20imaging%2C%20but%20their%20reliability%20under%20domain%20shift%20hinges%20on%20calibrated%20uncertainty%20with%20guarantees.%20Split%20conformal%20prediction%20%28SCP%29%20offers%20finite-sample%20coverage%2C%20yet%20prediction%20sets%20often%20become%20large%20%28low%20efficiency%29%20and%20class-wise%20coverage%20unbalanced-high%20class-conditioned%20coverage%20gap%20%28CCV%29%2C%20especially%20in%20few-shot%2C%20imbalanced%20regimes%3B%20moreover%2C%20naively%20adapting%20to%20calibration%20labels%20breaks%20exchangeability%20and%20voids%20guarantees.%20We%20propose%20%5Ctexttt%7B%5Ctextbf%7BLATA%7D%7D%20%28Laplacian-Assisted%20Transductive%20Adaptation%29%2C%20a%20%5Ctextit%7Btraining-%20and%20label-free%7D%20refinement%2 {"title": "Motion Prior Distillation in Time Reversal Sampling for Generative Inbetweening", "author": "Wooseok Jeon and Seunghyun Shin and Dongmin Shin and Hae-Gon Jeon", "abstract": "Recent progress in image-to-video (I2V) diffusion models has significantly advanced the field of generative inbetweening, which aims to generate semantically plausible frames between two keyframes. In particular, inference-time sampling strategies, which leverage the generative priors of large-scale pre-trained I2V models without additional training, have become increasingly popular. However, existing inference-time sampling, either fusing forward and backward paths in parallel or alternating them sequentially, often suffers from temporal discontinuities and undesirable visual artifacts due to the misalignment between the two generated paths. This is because each path follows the motion prior induced by its own conditioning frame. In this work, we propose Motion Prior Distillation (MPD), a simple yet effective inference-time distillation technique that suppresses bidirectional mismatch by distilling the motion residual of the forward path into the backward path. Our method can deliberately avoid denoising the end-conditioned path which causes the ambiguity of the path, and yield more temporally coherent inbetweening results with the forward motion prior. We not only perform quantitative evaluations on standard benchmarks, but also conduct extensive user studies to demonstrate the effectiveness of our approach in practical scenarios.", "link": "http://arxiv.org/abs/2602.12679v2", "date": "2026-02-19", "relevancy": 2.375, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6084}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5853}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Motion%20Prior%20Distillation%20in%20Time%20Reversal%20Sampling%20for%20Generative%20Inbetweening&body=Title%3A%20Motion%20Prior%20Distillation%20in%20Time%20Reversal%20Sampling%20for%20Generative%20Inbetweening%0AAuthor%3A%20Wooseok%20Jeon%20and%20Seunghyun%20Shin%20and%20Dongmin%20Shin%20and%20Hae-Gon%20Jeon%0AAbstract%3A%20Recent%20progress%20in%20image-to-video%20%28I2V%29%20diffusion%20models%20has%20significantly%20advanced%20the%20field%20of%20generative%20inbetweening%2C%20which%20aims%20to%20generate%20semantically%20plausible%20frames%20between%20two%20keyframes.%20In%20particular%2C%20inference-time%20sampling%20strategies%2C%20which%20leverage%20the%20generative%20priors%20of%20large-scale%20pre-trained%20I2V%20models%20without%20additional%20training%2C%20have%20become%20increasingly%20popular.%20However%2C%20existing%20inference-time%20sampling%2C%20either%20fusing%20forward%20and%20backward%20paths%20in%20parallel%20or%20alternating%20them%20sequentially%2C%20often%20suffers%20from%20temporal%20discontinuities%20and%20undesirable%20visual%20artifacts%20due%20to%20the%20misalignment%20between%20the%20two%20generated%20paths.%20This%20is%20because%20each%20path%20follows%20the%20motion%20prior%20induced%20by%20its%20own%20conditioning%20frame.%20In%20this%20work%2C%20we%20propose%20Motion%20Prior%20Distillation%20%28MPD%29%2C%20a%20simple%20yet%20effective%20inference-time%20distillation%20technique%20that%20suppresses%20bidirectional%20mismatch%20by%20distilling%20the%20motion%20residual%20of%20the%20forward%20path%20into%20the%20backward%20path.%20Our%20method%20can%20deliberately%20avoid%20denoising%20the%20end-conditioned%20path%20which%20causes%20the%20ambiguity%20of%20the%20path%2C%20and%20yield%20more%20temporally%20coherent%20inbetweening%20results%20with%20the%20forward%20motion%20prior.%20We%20not%20only%20perform%20quantitative%20evaluations%20on%20standard%20benchmarks%2C%20but%20also%20conduct%20extensive%20user%20studies%20to%20demonstrate%20the%20effectiveness%20of%20our%20approach%20in%20practical%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2602.12679v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMotion%2520Prior%2520Distillation%2520in%2520Time%2520Reversal%2520Sampling%2520for%2520Generative%2520Inbetweening%26entry.906535625%3DWooseok%2520Jeon%2520and%2520Seunghyun%2520Shin%2520and%2520Dongmin%2520Shin%2520and%2520Hae-Gon%2520Jeon%26entry.1292438233%3DRecent%2520progress%2520in%2520image-to-video%2520%2528I2V%2529%2520diffusion%2520models%2520has%2520significantly%2520advanced%2520the%2520field%2520of%2520generative%2520inbetweening%252C%2520which%2520aims%2520to%2520generate%2520semantically%2520plausible%2520frames%2520between%2520two%2520keyframes.%2520In%2520particular%252C%2520inference-time%2520sampling%2520strategies%252C%2520which%2520leverage%2520the%2520generative%2520priors%2520of%2520large-scale%2520pre-trained%2520I2V%2520models%2520without%2520additional%2520training%252C%2520have%2520become%2520increasingly%2520popular.%2520However%252C%2520existing%2520inference-time%2520sampling%252C%2520either%2520fusing%2520forward%2520and%2520backward%2520paths%2520in%2520parallel%2520or%2520alternating%2520them%2520sequentially%252C%2520often%2520suffers%2520from%2520temporal%2520discontinuities%2520and%2520undesirable%2520visual%2520artifacts%2520due%2520to%2520the%2520misalignment%2520between%2520the%2520two%2520generated%2520paths.%2520This%2520is%2520because%2520each%2520path%2520follows%2520the%2520motion%2520prior%2520induced%2520by%2520its%2520own%2520conditioning%2520frame.%2520In%2520this%2520work%252C%2520we%2520propose%2520Motion%2520Prior%2520Distillation%2520%2528MPD%2529%252C%2520a%2520simple%2520yet%2520effective%2520inference-ti {"title": "PyRadiomics-cuda: 3D features extraction from medical images for HPC using GPU acceleration", "author": "Jakub Lisowski and Piotr Tyrakowski and Szymon Zygu\u0142a and Krzysztof Kaczmarski", "abstract": "PyRadiomics-cuda is a GPU-accelerated extension of the PyRadiomics library, designed to address the computational challenges of extracting three-dimensional shape features from medical images. By offloading key geometric computations to GPU hardware it dramatically reduces processing times for large volumetric datasets. The system maintains full compatibility with the original PyRadiomics API, enabling seamless integration into existing AI workflows without code modifications. This transparent acceleration facilitates efficient, scalable radiomics analysis, supporting rapid feature extraction essential for high-throughput AI pipeline. Tests performed on a typical computational cluster, budget and home devices prove usefulness in all scenarios.", "link": "http://arxiv.org/abs/2510.02894v2", "date": "2026-02-19", "relevancy": 2.362, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4808}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4808}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4556}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PyRadiomics-cuda%3A%203D%20features%20extraction%20from%20medical%20images%20for%20HPC%20using%20GPU%20acceleration&body=Title%3A%20PyRadiomics-cuda%3A%203D%20features%20extraction%20from%20medical%20images%20for%20HPC%20using%20GPU%20acceleration%0AAuthor%3A%20Jakub%20Lisowski%20and%20Piotr%20Tyrakowski%20and%20Szymon%20Zygu%C5%82a%20and%20Krzysztof%20Kaczmarski%0AAbstract%3A%20PyRadiomics-cuda%20is%20a%20GPU-accelerated

{"title": "Point Linguist Model: Segment Any Object via Bridged Large 3D-Language Model", "author": "Zhuoxu Huang and Mingqi Gao and Jungong Han", "abstract": "3D object segmentation with Large Language Models (LLMs) has become a prevailing paradigm due to its broad semantics, task flexibility, and strong generalization. However, this paradigm is hindered by representation misalignment: LLMs process high-level semantic tokens, whereas 3D point clouds convey only dense geometric structures. In prior methods, misalignment limits both input and output. At the input stage, dense point patches require heavy pre-alignment, weakening object-level semantics and confusing similar distractors. At the output stage, predictions depend only on dense features without explicit geometric cues, leading to a loss of fine-grained accuracy. To address these limitations, we present the Point Linguist Model (PLM), a general framework that bridges the representation gap between LLMs and dense 3D point clouds without requiring large-scale pre-alignment between 3D-text or 3D-images. Specifically, we introduce Object-centric Discriminative Representation (OcDR), which learns object-centric tokens that capture target semantics and scene relations under a hard negative-aware training objective. This mitigates the misalignment between LLM tokens and 3D points, enhances resilience to distractors, and facilitates semantic-level reasoning within LLMs. For accurate segmentation, we introduce the Geometric Reactivation Decoder (GRD), which predicts masks by combining OcDR tokens carrying LLM-inferred geometry with corresponding dense features, preserving comprehensive dense features throughout the pipeline. Extensive experiments show that PLM achieves significant improvements of +7.3 mIoU on ScanNetv2 and +6.0 mIoU on Multi3DRefer for 3D referring segmentation, with consistent gains across 7 benchmarks spanning 4 different tasks, demonstrating the effectiveness of comprehensive object-centric reasoning for robust 3D understanding.", "link": "http://arxiv.org/abs/2509.07825v2", "date": "2026-02-19", "relevancy": 3.0774, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6163}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6163}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.614}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Point%20Linguist%20Model%3A%20Segment%20Any%20Object%20via%20Bridged%20Large%203D-Language%20Model&body=Title%3A%20Point%20Linguist%20Model%3A%20Segment%20Any%20Object%20via%20Bridged%20Large%203D-Language%20Model%0AAuthor%3A%20Zhuoxu%20Huang%20and%20Mingqi%20Gao%20and%20Jungong%20Han%0AAbstract%3A%203D%20object%20segmentation%20with%20Large%20Language%20Models%20%28LLMs%29%20has%20become%20a%20prevailing%20paradigm%20due%20to%20its%20broad%20semantics%2C%20task%20flexibility%2C%20and%20strong%20generalization.%20However%2C%20this%20paradigm%20is%20hindered%20by%20representation%20misalignment%3A%20LLMs%20process%20high-level%20semantic%20tokens%2C%20whereas%203D%20point%20clouds%20convey%20only%20dense%20geometric%20structures.%20In%20prior%20methods%2C%20misalignment%20limits%20both%20input%20and%20output.%20At%20the%20input%20stage%2C%20dense%20point%20patches%20require%20heavy%20pre-alignment%2C%20weakening%20object-level%20semantics%20and%20confusing%20similar%20distractors.%20At%20the%20output%20stage%2C%20predictions%20depend%20only%20on%20dense%20features%20without%20explicit%20geometric%20cues%2C%20leading%20to%20a%20loss%20of%20fine-grained%20accuracy.%20To%20address%20these%20limitations%2C%20we%20present%20the%20Point%20Linguist%20Model%20%28PLM%29%2C%20a%20general%20framework%20that%20bridges%20the%20representation%20gap%20between%20LLMs%20and%20dense%203D%20point%20clouds%20without%20requiring%20large-scale%20pre-alignment%20between%203D-text%20or%203D-images.%20Specifically%2C%20we%20introduce%20Object-centric%20Discriminative%20Representation%20%28OcDR%29%2C%20which%20learns%20object-centric%20tokens%20that%20capture%20target%20semantics%20and%20scene%20relations%20under%20a%20hard%20negative-aware%20training%20objective.%20This%20mitigates%20the%20misalignment%20between%20LLM%20tokens%20and%203D%20points%2C%20enhances%20resilience%20to%20distractors%2C%20and%20facilitates%20semantic-level%20reasoning%20within%20LLMs.%20For%20accurate%20segmentation%2C%20we%20introduce%20the%20Geometric%20Reactivation%20Decoder%20%28GRD%29%2C%20which%20predicts%20masks%20by%20combining%20OcDR%20tokens%20carrying%20LLM-inferred%20geometry%20with%20corresponding%20dense%20features%2C%20preserving%20comprehensive%20dense%20features%20throughout%20the%20pipeline.%20Extensive%20experiments%20show%20that%20PLM%20achieves%20significant%20improvements%20of%20%2B7.3%20mIoU%20on%20ScanNetv2%20and%20%2B6.0%20mIoU%20on%20Multi3DRefer%20for%203D%20referring%20segmentation%2C%20with%20consistent%20gains%20across%207%20benchmarks%20spanning%204%20different%20tasks%2C%20demonstrating%20the%20effectiveness%20of%20comprehensive%20object-centric%20reasoning%20for%20robust%203D%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2509.07825v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPoint%2520Linguist%2520Model%253A%2520Segment%2520Any%2520Object%2520via%2520Bridged%2520Large%25203D-Language%2520Model%26entry.906535625%3DZhuoxu%2520Huang%2520and%2520Mingqi%2520Gao%2520and%2520Jungong%2520Han%26entry.1292438233%3D3D%2520object%2520segmentation%2520with%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520has%2520become%2520a%2520prevailing%2520paradigm%2520due%2520to%2520its%2520broad%2520seman {"title": "Neural Implicit Representations for 3D Synthetic Aperture Radar Imaging", "author": "Nithin Sugavanam and Emre Ertin", "abstract": "Synthetic aperture radar (SAR) is a tomographic sensor that measures 2D slices of the 3D spatial Fourier transform of the scene. In many operational scenarios, the measured set of 2D slices does not fill the 3D space in the Fourier domain, resulting in significant artifacts in the reconstructed imagery. Traditionally, simple priors, such as sparsity in the image domain, are used to regularize the inverse problem. In this paper, we review our recent work that achieves state-of-the-art results in 3D SAR imaging employing neural structures to model the surface scattering that dominates SAR returns. These neural structures encode the surface of the objects in the form of a signed distance function learned from the sparse scattering data. Since estimating a smooth surface from a sparse and noisy point cloud is an ill-posed problem, we regularize the surface estimation by sampling points from the implicit surface representation during the training step. We demonstrate the model's ability to represent target scattering using measured and simulated data from single vehicles and a larger scene with a large number of vehicles. We conclude with future research directions calling for methods to learn complex-valued neural representations to enable synthesizing new collections from the volumetric neural implicit representation.", "link": "http://arxiv.org/abs/2602.17556v1", "date": "2026-02-19", "relevancy": 2.8813, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5868}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5819}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v ons%20to%20enable%20synthesizing%20new%20collections%20from%20the%20volumetric%20neural%20implicit%20representation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17556v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Implicit%2520Representations%2520for%25203D%2520Synthetic%2520Aperture%2520Radar%2520Imaging%26entry.906535625%3DNithin%2520Sugavanam%2520and%2520Emre%2520Ertin%26entry.1292438233%3DSynthetic%2520aperture%2520radar%2520%2528SAR%2529%2520is%2520a%2520tomographic%2520sensor%2520that%2520measures%25202D%2520slices%2520of%2520the%25203D%2520spatial%2520Fourier%2520transform%2520of%2520the%2520scene.%2520In%2520many%2520operational%2520scenarios%252C%2520the%2520measured%2520set%2520of%25202D%2520slices%2520does%2520not%2520fill%2520the%25203D%2520space%2520in%2520the%2520Fourier%2520domain%252C%2520resulting%2520in%2520significant%2520artifacts%2520in%2520the%2520reconstructed%2520imagery.%2520Traditionally%252C%2520simple%2520priors%252C%2520such%2520as%2520sparsity%2520in%2520the%2520image%2520domain%252C%2520are%2520used%2520to%2520regularize%2520the%2520inverse%2520problem.%2520In%2520this%2520paper%252C%2520we%2520review%2520our%2520recent%2520work%2520that%2520achieves%2520state-of-the-art%2520results%2520in%25203D%2520SAR%2520imaging%2520employing%2520neural%2520structures%2520to%2520model%2520the%2520surface%2520scattering%2520that%2520dominates%2520SAR%2520returns.%2520These%2520neural%2520structures%2520encode%2520the%2520surface%2520of%2520the%2520objects%2520in%2520the%2520form%2520of%2520a%2520signed%2520distance%2520function%2520learned%2520from%2520the%2520sparse%2520scattering%2520data.%2520Since%2520estimating%2520a%2520smooth%2520surface%2520from%2520a%2520sparse%2520and%2520noisy%2520point%2520cloud%2520is%2520an%2520ill-posed%2520problem%252C%2520we%2520regularize%2520the%2520surface%2520estimation%2520by%2520sampling%2520points%2520from%2520the {"title": "Canonicalizing Multimodal Contrastive Representation Learning", "author": "Sharut Gupta and Sanyam Kansal and Stefanie Jegelka and Phillip Isola and Vikas Garg", "abstract": "As models and data scale, independently trained networks often induce analogous notions of similarity. But, matching similarities is weaker than establishing an explicit correspondence between the representation spaces, especially for multimodal models, where consistency must hold not only within each modality, but also for the learned image-text coupling. We therefore ask: given two independently trained multimodal contrastive models (with encoders $(f, g)$ and $(\\widetilde{f},\\widetilde{g})$) -- trained on different distributions and with different architectures -- does a systematic geometric relationship exist between their embedding spaces? If so, what form does it take, and does it hold uniformly across modalities? In this work, we show that across model families such as CLIP, SigLIP, and FLAVA, this geometric relationship is well approximated by an orthogonal map (up to a global mean shift), i.e., there exists an orthogonal map $Q$ where $Q^\\top Q = I$ such that $\\widetilde{f}(x)\\approx Q f(x)$ for paired images $x$. Strikingly, the same $Q$ simultaneously aligns the text encoders i.e., $\\widetilde{g}(y)\\approx Q g(y)$ for texts $y$. Theoretically, we prove that if the multimodal kernel agrees across models on a small anchor set i.e. $\\langle f(x), g(y)\\rangle \\approx \\langle \\widetilde{f}(x), \\widetilde{g}(y)\\rangle$, then the two models must be related by a single orthogonal map $Q$ and the same $Q$ maps images and text across models. More broadly, this finding enables backward-compatible model upgrades, avoiding costly re-embedding, and has implications for the privacy of learned representations.\n  Our project page: https://canonical-multimodal.github.io/", "link": "http://arxiv.org/abs/2602.17584v1", "date": "2026-02-19", "relevancy": 2.8435, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6145}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5498}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5419}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Canonicalizing%20Multimodal%20Contrastive%20Representation%20Learning&body=Title%3A%20Canonicalizing%20Multimodal%20Contrastive%20Representation%20Learning%0AAuthor%3A%20Sharut%20Gupta%20and%20Sanyam%20Kansal%20and%20Stefanie%20Jegelka%20and%20Phillip%20Isola%20and%20Vikas%20Garg%0AAbstract%3A%20As%20models%20and%20data%20scale%2C%20independently%20trained%20networks%20often%20induce%20analogous%20notions%20of%20similarity.%20But%2C%20matching%20similarities%20is%20weaker%20than%20establishing%20an%20explicit%20correspondence%20between%20the%20representation%20spaces%2C%20especially%20for%20multimodal%20models%2C%20where%20consistency%20must%20hold%20not%20only%20within%20each%20modality%2C%20but%20also%20for%20the%20learned%20image-text%20coupling.%20We%20therefore%20ask%3A%20given%20two%20independently%20trained%20multimodal%20contrastive%20models%20%28with%20encoders%20%24%28f%2C%20g%29%24%20and%20%24%28%5Cwidetilde%7Bf%7D%2C%5Cwidetilde%7Bg%7D%29%24%29%20--%20trained%20on%20different%20distributions%20and%20with%20different%20architectures%20--%20does%20a%20systematic%20geometric%20relationship%20exist%20between%20their%20embedding%20spaces%3F%20If%20so%2C%20what%20form%20does%20it%20take%2C%20and%20does%20it%20hold%20uniformly%20across%20modalities%3F%20In%20this%20work%2C%20we%20show%20that%20across%20model%20families%20such%20as%20CLIP%2C%20SigLIP%2C%20and%20FLAVA%2C%20this%20geometric%20relationship%20is%20well%20approximated%20by%20an%20orthogonal%20map%20%28up%20to%20a%20global%20mean%20shift%29%2C%20i.e.%2C%20there%20exists%20an%20orthogonal%20map%20%24Q%24%20where%20%24Q%5E%5Ctop%20Q%20%3D%20I%24%20such%20that%20%24%5Cwidetilde%7Bf%7D%28x%29%5Capprox%20Q%20f%28x%29%24%20for%20paired%20images%20%24x%24.%20Strikingly%2C%20the%20same%20%24Q%24%20simultaneously%20aligns%20the%20text%20encoders%20i.e.%2C%20%24%5Cwidetilde%7Bg%7D%28y%29%5Capprox%20Q%20g%28y%29%24%20for%20texts%20%24y%24.%20Theoretically%2C%20we%20prove%20that%20if%20the%20multimodal%20kernel%20agrees%20across%20models%20on%20a%20small%20anchor%20set%20i.e.%20%24%5Clangle%20f%28x%29%2C%20g%28y%29%5Crangle%20%5Capprox%20%5Clangle%20%5Cwidetilde%7Bf%7D%28x%29%2C%20%5Cwidetilde%7Bg%7D%28y%29%5Crangle%24%2C%20then%20the%20two%20models%20must%20be%20related%20by%20a%20single%20orthogonal%20map%20%24Q%24%20and%20the%20same%20%24Q%24%20maps%20images%20and%20text%20across%20models.%20More%20broadly%2C%20this%20finding%20enables%20backward-compatible%20model%20upgrades%2C%20avoiding%20costly%20re-embedding%2C%20and%20has%20implications%20for%20the%20privacy%20of%20learned%20representations.%0A%20%20Our%20project%20page%3A%20https%3A//canonical-multimodal.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2602.17584v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCanonicalizing%2520Multimodal%2520Contrastive%2520Representation%2520Learning%26entry.906535625%3DSharut%2520Gupta%2520and%2520Sanyam%2520Kansal%2520and%2520Stefanie%2520Jegelka%2520and%2520Phillip%2520Isola%2520and%2520Vikas%2520Garg%26entry.1292438233%3DAs%2520models%2520and%2520data%2520scale%252C%2520independently%2520trained%2520networks%2520often%2520induce%2520analogous%2520notions%2520of%2520similarity.%2520But%252C%2520matching%2520similarities%2520is%2520weaker%2520than%2520establishing%2520an%2520explicit%2520correspondence%2520between%2520the%2520representation%2520s {"title": "Visual Model Checking: Graph-Based Inference of Visual Routines for Image Retrieval", "author": "Adri\u00e0 Molina and Oriol Ramos Terrades and Josep Llad\u00f3s", "abstract": "Information retrieval lies at the foundation of the modern digital industry. While natural language search has seen dramatic progress in recent years largely driven by embedding-based models and large-scale pretraining, the field still faces significant challenges. Specifically, queries that involve complex relationships, object compositions, or precise constraints such as identities, counts and proportions often remain unresolved or unreliable within current frameworks. In this paper, we propose a novel framework that integrates formal verification into deep learning-based image retrieval through a synergistic combination of graph-based verification methods and neural code generation. Our approach aims to support open-vocabulary natural language queries while producing results that are both trustworthy and verifiable. By grounding retrieval results in a system of formal reasoning, we move beyond the ambiguity and approximation that often characterize vector representations. Instead of accepting uncertainty as a given, our framework explicitly verifies each atomic truth in the user query against the retrieved content. This allows us to not only return matching results, but also to identify and mark which specific constraints are satisfied and which remain unmet, thereby offering a more transparent and accountable retrieval process while boosting the results of the most popular embedding-based approaches.", "link": "http://arxiv.org/abs/2602.17386v1", "date": "2026-02-19", "relevancy": 2.7301, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5539}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Visual%20Model%20Checking%3A%20Graph-Based%20Inference%20of%20Visual%20Routines%20for%20Image%20Retrieval&body=Title%3A%20Visual%20Model%20Checking%3A%20Graph-Based%20Inference%20of%20Visual%20Routines%20for%20Image%20Retrieval%0AAuthor%3A%20Adri%C3%A0%20Molina%20and%20Oriol%20Ramos%20Terrades%20and%20Josep%20Llad%C3%B3s%0AAbstract%3A%20Information%20retrieval%20lies%20at%20the%20foundation%20of%20the%20modern%20digital%20industry.%20While%20natural%20language%20search%20has%20seen%20dramatic%20progress%20in%20recent%20years%20largely%20driven%20by%20embedding-based%20models%20and%20large-scale%20pretraining%2C%20the%20field%20still%20faces%20significant%20challenges.%20Specifically%2C%20queries%20that%20involve%20complex%20relationships%2C%20object%20compositions%2C%20or%20precise%20constraints%20such%20as%20identities%2C%20counts%20and%20proportions%20often%20remain%20unresolved%20or%20unreliable%20within%20current%20frameworks.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20framework%20that%20integrates%20formal%20verification%20into%20deep%20learning-based%20image%20retrieval%20through%20a%20synergistic%20combination%20of%20graph-based%20verification%20methods%20and%20neural%20code%20generation.%20Our%20approach%20aims%20to%20support%20open-vocabulary%20natural%20language%20queries%20while%20producing%20results%20that%20are%20both%20trustworthy%20and%20verifiable.%20By%20grounding%20retrieval%20results%20in%20a%20system%20of%20formal%20reasoning%2C%20we%20move%20beyond%20the%20ambiguity%20and%20approximation%20that%20often%20characterize%20vector%20representations.%20Instead%20of%20accepting%20uncertainty%20as%20a%20given%2C%20our%20framework%20explicitly%20verifies%20each%20atomic%20truth%20in%20the%20user%20query%20against%20the%20retrieved%20content.%20This%20allows%20us%20to%20not%20only%20return%20matching%20results%2C%20but%20also%20to%20identify%20and%20mark%20which%20specific%20constraints%20are%20satisfied%20and%20which%20remain%20unmet%2C%20thereby%20offering%20a%20more%20transparent%20and%20accountable%20retrieval%20process%20while%20boosting%20the%20results%20of%20the%20most%20popular%20embedding-based%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17386v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisual%2520Model%2520Checking%253A%2520Graph-Based%2520Inference%2520of%2520Visual%2520Routines%2520for%2520Image%2520Retrieval%26entry.906535625%3DAdri%25C3%25A0%2520Molina%2520and%2520Oriol%2520Ramos%2520Terrades%2520and%2520Josep%2520Llad%25C3%25B3s%26entry.1292438233%3DInformation%2520retrieval%2520lies%2520at%2520the%2520foundation%2520of%2520the%2520modern%2520digital%2520industry.%2520While%2520natural%2520language%2520search%2520has%2520seen%2520dramatic%2520progress%2520in%2520recent%2520years%2520largely%2520driven%2520by%2520embedding-based%2520models%2520and%2520large-scale%2520pretraining%252C%2520the%2520field%2520still%2520faces%2520significant%2520challenges.%2520Specifically%252C%2520queries%2520that%2520involve%2520complex%2520relationships%252C%2520object%2520compositions%252C%2520or%2520precise%2520constraints%2520such%2520as%2520identities%252C%2520counts%2520and%2520proportions%2520often%2520remain%2520unresolved%2520or%2520unreliable%2520within%2520current%2520frameworks.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520framework%2520that%2520integrates%2520formal%2520verification%2520into%2520deep%2520learning-based%2520image%2520retrieval%2520through%2520a%2520synergistic%2520combination% {"title": "Structured Prototype-Guided Adaptation for EEG Foundation Models", "author": "Jingying Ma and Feng Wu and Yucheng Xing and Qika Lin and Tianyu Liu and Chenyu Liu and Ziyu Jia and Mengling Feng", "abstract": "Electroencephalography (EEG) foundation models (EFMs) have achieved strong performance under full fine-tuning but exhibit poor generalization when subject-level supervision is limited, a common constraint in real-world clinical settings. We show that this failure stems not merely from limited supervision, but from a structural mismatch between noisy, limited supervision and the highly plastic parameter space of EFMs. To address this challenge, we propose SCOPE, a Structured COnfidence-aware Prototype-guided adaptation framework for EFM fine-tuning. SCOPE follows a two-stage pipeline. In the first stage, we construct reliable external supervision by learning geometry-regularized task priors, constructing balanced class-level prototypes over the resulting embeddings, and producing confidence-aware pseudo-labels from their agreement to filter unreliable signals on unlabeled data. In the second stage, we introduce ProAdapter, which adapts frozen EEG foundation models via a lightweight adapter conditioned on the structured prototypes. Experiments across three EEG tasks and five foundation model backbones demonstrate that SCOPE consistently achieves strong performance and efficiency under label-limited cross-subject settings.", "link": "http://arxiv.org/abs/2602.17251v1", "date": "2026-02-19", "relevancy": 2.6883, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.184 bel-limited%20cross-subject%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17251v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructured%2520Prototype-Guided%2520Adaptation%2520for%2520EEG%2520Foundation%2520Models%26entry.906535625%3DJingying%2520Ma%2520and%2520Feng%2520Wu%2520and%2520Yucheng%2520Xing%2520and%2520Qika%2520Lin%2520and%2520Tianyu%2520Liu%2520and%2520Chenyu%2520Liu%2520and%2520Ziyu%2520Jia%2520and%2520Mengling%2520Feng%26entry.1292438233%3DElectroencephalography%2520%2528EEG%2529%2520foundation%2520models%2520%2528EFMs%2529%2520have%2520achieved%2520strong%2520performance%2520under%2520full%2520fine-tuning%2520but%2520exhibit%2520poor%2520generalization%2520when%2520subject-level%2520supervision%2520is%2520limited%252C%2520a%2520common%2520constraint%2520in%2520real-world%2520clinical%2520settings.%2520We%2520show%2520that%2520this%2520failure%2520stems%2520not%2520merely%2520from%2520limited%2520supervision%252C%2520but%2520from%2520a%2520structural%2520mismatch%2520between%2520noisy%252C%2520limited%2520supervision%2520and%2520the%2520highly%2520plastic%2520parameter%2520space%2520of%2520EFMs.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520SCOPE%252C%2520a%2520Structured%2520COnfidence-aware%2520Prototype-guided%2520adaptation%2520framework%2520for%2520EFM%2520fine-tuning.%2520SCOPE%2520follows%2520a%2520two-stage%2520pipeline.%2520In%2520the%2520first%2520stage%252C%2520we%2520construct%2520reliable%2520external%2520supervision%2520by%2520learning%2520geometry-regularized%2520task%2520priors%252C%2520constructing%2520balanced%2520class-level%2520prototypes%2520over%2520the%2520resulting%2520embeddings%252C%2520and%2520producing%2520confidence-aware%2520pseudo-labels%2520from%2520their%2520agreement%2520to%2520filter%2520unreliable%2520signals%2520on%2520unlabeled%2520data.%2520In%2520the%2520second%2520stage%252C%2520we%2520introd {"title": "EA-Swin: An Embedding-Agnostic Swin Transformer for AI-Generated Video Detection", "author": "Hung Mai and Loi Dinh and Duc Hai Nguyen and Dat Do and Luong Doan and Khanh Nguyen Quoc and Huan Vu and Phong Ho and Naeem Ul Islam and Tuan Do", "abstract": "Recent advances in foundation video generators such as Sora2, Veo3, and other commercial systems have produced highly realistic synthetic videos, exposing the limitations of existing detection methods that rely on shallow embedding trajectories, image-based adaptation, or computationally heavy MLLMs. We propose EA-Swin, an Embedding-Agnostic Swin Transformer that models spatiotemporal dependencies directly on pretrained video embeddings via a factorized windowed attention design, making it compatible with generic ViT-style patch-based encoders. Alongside the model, we construct the EA-Video dataset, a benchmark dataset comprising 130K videos that integrates newly collected samples with curated existing datasets, covering diverse commercial and open-source generators and including unseen-generator splits for rigorous cross-distribution evaluation. Extensive experiments show that EA-Swin achieves 0.97-0.99 accuracy across major generators, outperforming prior SoTA methods (typically 0.8-0.9) by a margin of 5-20%, while maintaining strong generalization to unseen distributions, establishing a scalable and robust solution for modern AI-generated video detection.", "link": "http://arxiv.org/abs/2602.17260v1", "date": "2026-02-19", "relevancy": 2.6752, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5422}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5336}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5293}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EA-Swin%3A%20An%20Embedding-Agnostic%20Swin%20Transformer%20for%20AI-Generated%20Video%20Detection&body=Title%3A%20EA-Swin%3A%20An%20Embedding-Agnostic%20Swin%20Transformer%20for%20AI-Generated%20Video%20Detection%0AAuthor%3A%20Hung%20Mai%20and%20Loi%20Dinh%20and%20Duc%20Hai%20Nguyen%20and%20Dat%20Do%20and%20Luong%20Doan%20and%20Khanh%20Nguyen%20Quoc%20and%20Huan%20Vu%20and%20Phong%20Ho%20and%20Naeem%20Ul%20Islam%20and%20Tuan%20Do%0AAbstract%3A%20Recent%20advances%20in%20foundation%20video%20generators%20such%20as%20Sora2%2C%20Veo3%2C%20and%20other%20commercial%20systems%20have%20produced%20highly%20realistic%20synthetic%20videos%2C%20exposing%20the%20limitations%20of%20existing%20detection%20methods%20that%20rely%20on%20shallow%20embedding%20trajectories%2C%20image-based%20adaptation%2C%20or%20computationally%20heavy%20MLLMs.%20We%20propose%20EA-Swin%2C%20an%20Embedding-Agnostic%20Swin%20Transformer%20that%20models%20spatiotemporal%20dependencies%20directly%20on%20pretrained%20video%20embeddings%20via%20a%20factorized%20windowed%20attention%20design%2C%20making%20it%20compatible%20with%20generic%20ViT-style%20patch-based%20encoders.%20Alongside%20the%20model%2C%20we%20construct%20the%20EA-Video%20dataset%2C%20a%20benchmark%20dataset%20comprising%20130K%20videos%20that%20integrates%20newly%20collected%20samples%20with%20curated%20existing%20datasets%2C%20covering%20diverse%20commercial%20and%20open-source%20generators%20and%20including%20unseen-generator%20splits%20for%20rigorous%20cross-distribution%20evaluation.%20Extensive%20experiments%20show%20that%20EA-Swin%20achieves%200.97-0.99%20accuracy%20across%20major%20generators%2C%20outperforming%20prior%20SoTA%20methods%20%28typically%200.8-0.9%29%20by%20a%20margin%20of%205-20%25%2C%20while%20maintaining%20strong%20generalization%20to%20unseen%20distributions%2C%20establishing%20a%20scalable%20and%20robust%20solution%20for%20modern%20AI-generated%20video%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17260v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEA-Swin%253A%2520An%2520Embedding-Agnostic%2520Swin%2520Transformer%2520for%2520AI-Generated%2520Video%2520Detection%26entry.906535625%3DHung%2520Mai%2520and%2520Loi%2520Dinh%2520and%2520Duc%2520Hai%2520Nguyen%2520and%2520Dat%2520Do%2520and%2520Luong%2520Doan%2520and%2520Khanh%2520Nguyen%2520Quoc%2520and%2520Huan%2520Vu%2520and%2520Phong%2520Ho%2520and%2520Naeem%2520Ul%2520Islam%2520and%2520Tuan%2520Do%26entry.1292438233%3DRecent%2520advances%2520in%2520foundation%2520video%2520generators%2520such%2520as%2520Sora2%252C%2520Veo3%252C%2520and%2520other%2520commercial%2520systems%2520have%2520produced%2520highly%2520realistic%2520synthetic%2520videos%252C%2520exposing%2520the%2520limitations%2520of%2520existing%2520detection%2520methods%2520that%2520rely%2520on%2520shallow%2520embedding%2520trajectories%252C%2520image-based%2520adaptation%252C%2520or%2520computationally%2520heavy%2520MLLMs.%2520We%2520propose%2520EA-Swin%252C%2520an%2520Embedding-Agnostic%2520Swin%2520Transformer%2520that%2520models%2520spatiotemporal%2520dependencies%2520directly%2520on%2520pretrained%2520video%2520embeddings%2520via%2520a%2520factorized%2520windowed%2520attention%2520design%252C%2520making%2520it%2520compatible%2520with%2520generic%2520ViT-style%2520patch-based%2520encoders.%2520Alongside%2520the%2520model%252C%2520we%2520construct%2520the%2520EA-Video%2520dataset%252C%2520a%2520benchmark%2520dataset%2520comprising%2520130K%2520videos%2520that%2520integrates%2520newly%2520collected%2520samples%2520with%2520curated%2520existing%2520datasets%252C%2520covering%2520diverse%2520commercial%2520and%2520open-source%2520generators%2520and%2520including%2520unseen-generator%2520splits%2520for%2520rigorous%2520cross-distribution%2520evaluation.%2520Extensive%2520experiments%2520show%2520that%2 {"title": "How Multimodal Large Language Models Support Access to Visual Information: A Diary Study With Blind and Low Vision People", "author": "Ricardo E. Gonzalez Penuela and Crescentia Jung and Sharon Y Lin and Ruiying Hu and Shiri Azenkot", "abstract": "Multimodal large language models (MLLMs) are changing how Blind and Low Vision (BLV) people access visual information. Unlike traditional visual interpretation tools that only provide descriptions, MLLM-enabled applications offer conversational assistance, where users can ask questions to obtain goal-relevant details. However, evidence about their performance in the real-world and implications for BLV people's daily lives remains limited. To address this, we conducted a two-week diary study, where we captured 20 BLV participants' use of an MLLM-enabled visual interpretation application. Although participants rated the visual interpretations of the application as \"trustworthy\" (mean=3.76 out of 5, max=extremely trustworthy) and \"somewhat satisfying\" (mean=4.13 out of 5, max=very satisfying), the AI often produced incorrect answers (22.2%) or abstained (10.8%) from responding to users' requests. Our findings show that while MLLMs can improve visual interpretations' descriptive accuracy, supporting everyday use also depends on the \"visual assistant\" skill: behaviors for providing goal-directed, reliable assistance. We conclude by proposing the \"visual assistant\" skill and guidelines to help MLLM-enabled visual interpretation applications better support BLV people's access to visual information.", "link": "http://arxiv.org/abs/2602.13469v2", "date": "2026-02-19", "relevancy": 2.6696, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5392}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5392}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5233}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20Multimodal%20Large%20Language%20Models%20Support%20Access%20to%20Visual%20Information%3A%20A%20Diary%20Study%20With%20Blind%20and%20Low%20Vision%20People&body=Title%3A%20How%20Multimodal%20Large%20Language%20Models%20Support%20Access%20to%20Visual%20Information%3A%20A%20Diary%20Study%20With%20Blind%20and%20Low%20Vision%20People%0AAuthor%3A%20Ricardo%20E.%20Gonzalez%20Penuela%20and%20Crescentia%20Jung%20and%20Sharon%20Y%20Lin%20and%20Ruiying%20Hu%20and%20Shiri%20Azenkot%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20are%20changing%20how%20Blind%20and%20Low%20Vision%20%28BLV%29%20people%20access%20visual%20information.%20Unlike%20traditional%20visual%20interpretation%20tools%20that%20only%20provide%20descriptions%2C%20MLLM-enabled%20applications%20offer%20conversational%20assistance%2C%20where%20users%20can%20ask%20questions%20to%20obtain%20goal-relevant%20details.%20However%2C%20evidence%20about%20their%20performance%20in%20the%20real-world%20and%20implications%20for%20BLV%20people%27s%20daily%20lives%20remains%20limited.%20To%20address%20this%2C%20we%20conducted%20a%20two-week%20diary%20study%2C%20where%20we%20captured%2020%20BLV%20participants%27%20use%20of%20an%20MLLM-enabled%20visual%20interpretation%20application.%20Although%20participants%20rated%20the%20visual%20interpretations%20of%20the%20application%20as%20%22trustworthy%22%20%28mean%3D3.76%20out%20of%205%2C%20max%3Dextremely%20trustworthy%29%20and%20%22somewhat%20satisfying%22%20%28mean%3D4.13%20out%20of%205%2C%20max%3Dvery%20satisfying%29%2C%20the%20AI%20often%20produced%20incorrect%20answers%20%2822.2%25%29%20or%20abstained%20%2810.8%25%29%20from%20responding%20to%20users%27%20requests.%20Our%20findings%20show%20that%20while%20MLLMs%20can%20improve%20visual%20interpretations%27%20descriptive%20accuracy%2C%20supporting%20everyday%20use%20also%20depends%20on%20the%20%22visual%20assistant%22%20skill%3A%20behaviors%20for%20providing%20goal-directed%2C%20reliable%20assistance.%20We%20conclude%20by%20proposing%20the%20%22visual%20assistant%22%20skill%20and%20guidelines%20to%20help%20MLLM-enabled%20visual%20interpretation%20applications%20better%20support%20BLV%20people%27s%20access%20to%20visual%20information.%0ALink%3A%20http%3A//arxiv.org/abs/2602.13469v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520Multimodal%2520Large%2520Language%2520Models%2520Support%2520Access%2520to%2520Visual%2520Information%253A%2520A%2520Diary%2520Study%2520With%2520Blind%2520and%2520Low%2520Vision%2520People%26entry.906535625%3DRicardo%2520E.%2520Gonzalez%2520Penuela%2520and%2520Crescentia%2520Jung%2520and%2520Sharon%2520Y%2520Lin%2520and%2520Ruiying%2520Hu%2520and%2520Shiri%2520Azenkot%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520are%2520changing%2520how%2520Blind%2520and%2520Low%2520Vision%2520%2528BLV%2529%2520people%2520access%2520visual%2520information.%2520Unlike%2520traditional%2520visual%2520interpretation%2520tools%2520that%2520only%2520provide%2520descriptions%252C%2520MLLM-enabled%2520applications%2520offer%2520conversational%2520assistance%252C%2520where%2520users%2520can%2520ask%2520questions%2520to%2520obtain%2520goal-relevant%2520details.%2520However%252C%2520evidence%2520about%2520their%2520performance%2520in%2520the%2520real-world%2520and%2520implications%2520for%2520BLV%2520people%2527s%2520daily%2520lives%2520remains%2520limited.%2520To%2520address%2520this%252C%2520we%2520conducted%2520a%2520two-week%2520diary%2520study%252C%2520where%2520we%2520captured%252020%2520BLV%2520participants%2527%2520use%2520of%2520an%2520MLLM-enabled%2520visual%2520interpretation%2520application.%2520Althoug {"title": "Mechanistic Interpretability of Cognitive Complexity in LLMs via Linear Probing using Bloom's Taxonomy", "author": "Bianca Raimondi and Maurizio Gabbrielli", "abstract": "The black-box nature of Large Language Models necessitates novel evaluation frameworks that transcend surface-level performance metrics. This study investigates the internal neural representations of cognitive complexity using Bloom's Taxonomy as a hierarchical lens. By analyzing high-dimensional activation vectors from different LLMs, we probe whether different cognitive levels, ranging from basic recall (Remember) to abstract synthesis (Create), are linearly separable within the model's residual streams. Our results demonstrate that linear classifiers achieve approximately 95% mean accuracy across all Bloom levels, providing strong evidence that cognitive level is encoded in a linearly accessible subspace of the model's representations. These findings provide evidence that the model resolves the cognitive difficulty of a prompt early in the forward pass, with representations becoming increasingly separable across layers.", "link": "http://arxiv.org/abs/2602.17229v1", "date": "2026-02-19", "relevancy": 2.6598, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5565}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5565}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mechanistic%20Interpretability%20of%20Cognitive%20Complexity%20in%20LLMs%20via%20Linear%20Probing%20using%20Bloom%27s%20Taxonomy&body=Title%3A%20Mechanistic%20Interpretability%20of%20Cognitive%20Complexity%20in%20LLMs%20via%20Linear%20Probing%20using%20Bloom%27s%20Taxonomy%0AAuthor%3A%20Bianca%20Raimondi%20and%20Maurizio%20Gabbrielli%0AAbstract%3A%20The%20black-box%20nature%20of%20Large%20Language%20Models%20necessitates%20novel%20evaluation%20frameworks%20that%20transcend%20surface-level%20performance%20metrics.%20This%20study%20investigates%20the%20internal%20neural%20representations%20of%20cognitive%20complexity%20using%20Bloom%27s%20Taxonomy%20as%20a%20hierarchical%20lens.%20By%20analyzing%20high-dimensional%20activation%20vectors%20from%20different%20LLMs%2C%20we%20probe%20whether%20different%20cognitive%20levels%2C%20ranging%20from%20basic%20recall%20%28Remember%29%20to%20abstract%20synthesis%20%28Create%29%2C%20are%20linearly%20separable%20within%20the%20model%27s%20residual%20streams.%20Our%20results%20demonstrate%20that%20linear%20classifiers%20achieve%20approximately%2095%25%20mean%20accuracy%20across%20all%20Bloom%20levels%2C%20providing%20strong%20evidence%20that%20cognitive%20level%20is%20encoded%20in%20a%20linearly%20accessible%20subspace%20of%20the%20model%27s%20representations.%20These%20findings%20provide%20evidence%20that%20the%20model%20resolves%20the%20cognitive%20difficulty%20of%20a%20prompt%20early%20in%20the%20forward%20pass%2C%20with%20representations%20becoming%20increasingly%20separable%20across%20layers.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17229v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMechanistic%2520Interpretability%2520of%2520Cognitive%2520Complexity%2520in%2520LLMs%2520via%2520Linear%2520Probing%2520using%2520Bloom%2527s%2520Taxonomy%26entry.906535625%3DBianca%2520Raimondi%2520and%2520Maurizio%2520Gabbrielli%26entry.1292438233%3DThe%2520black-box%2520nature%2520of%2520Large%2520Language%2520Models%2520necessitates%2520novel%2520evaluation%2520frameworks%2520that%2520transcend%2520surface-level%2520performance%2520metrics.%2520This%2520study%2520investigates%2520the%2520inte {"title": "IntRec: Intent-based Retrieval with Contrastive Refinement", "author": "Pourya Shamsolmoali and Masoumeh Zareapoor and Eric Granger and Yue Lu", "abstract": "Retrieving user-specified objects from complex scenes remains a challenging task, especially when queries are ambiguous or involve multiple similar objects. Existing open-vocabulary detectors operate in a one-shot manner, lacking the ability to refine predictions based on user feedback. To address this, we propose IntRec, an interactive object retrieval framework that refines predictions based on user feedback. At its core is an Intent State (IS) that maintains dual memory sets for positive anchors (confirmed cues) and negative constraints (rejected hypotheses). A contrastive alignment function ranks candidate objects by maximizing similarity to positive cues while penalizing rejected ones, enabling fine-grained disambiguation in cluttered scenes. Our interactive framework provides substantial improvements in retrieval accuracy without additional supervision. On LVIS, IntRec achieves 35.4 AP, outperforming OVMR, CoDet, and CAKE by +2.3, +3.7, and +0.5, respectively. On the challenging LVIS-Ambiguous benchmark, it improves performance by +7.9 AP over its one-shot baseline after a single corrective feedback, with less than 30 ms of added latency per interaction.", "link": "http://arxiv.org/abs/2602.17639v1", "date": "2026-02-19", "relevancy": 2.6527, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.539}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.539}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignora {"title": "Pushing the Frontier of Black-Box LVLM Attacks via Fine-Grained Detail Targeting", "author": "Xiaohan Zhao and Zhaoyi Li and Yaxin Luo and Jiacheng Cui and Zhiqiang Shen", "abstract": "Black-box adversarial attacks on Large Vision-Language Models (LVLMs) are challenging due to missing gradients and complex multimodal boundaries. While prior state-of-the-art transfer-based approaches like M-Attack perform well using local crop-level matching between source and target images, we find this induces high-variance, nearly orthogonal gradients across iterations, violating coherent local alignment and destabilizing optimization. We attribute this to (i) ViT translation sensitivity that yields spike-like gradients and (ii) structural asymmetry between source and target crops. We reformulate local matching as an asymmetric expectation over source transformations and target semantics, and build a gradient-denoising upgrade to M-Attack. On the source side, Multi-Crop Alignment (MCA) averages gradients from multiple independently sampled local views per iteration to reduce variance. On the target side, Auxiliary Target Alignment (ATA) replaces aggressive target augmentation with a small auxiliary set from a semantically correlated distribution, producing a smoother, lower-variance target manifold. We further reinterpret momentum as Patch Momentum, replaying historical crop gradients; combined with a refined patch-size ensemble (PE+), this strengthens transferable directions. Together these modules form M-Attack-V2, a simple, modular enhancement over M-Attack that substantially improves transfer-based black-box attacks on frontier LVLMs: boosting success rates on Claude-4.0 from 8% to 30%, Gemini-2.5-Pro from 83% to 97%, and GPT-5 from 98% to 100%, outperforming prior black-box LVLM attacks. Code and data are publicly available at: https://github.com/vila-lab/M-Attack-V2.", "link": "http://arxiv.org/abs/2602.17645v1", "date": "2026-02-19", "relevancy": 2.6409, "topK": {"title": "Beyond the Encoder: Joint Encoder-Decoder Contrastive Pre-Training Improves Dense Prediction", "author": "S\u00e9bastien Quetin and Tapotosh Ghosh and Farhad Maleki", "abstract": "Contrastive learning methods in self-supervised settings have primarily focused on pre-training encoders, while decoders are typically introduced and trained separately for downstream dense prediction tasks. However, this conventional approach overlooks the potential benefits of jointly pre-training both encoder and decoder. In this paper, we propose DeCon, an efficient encoder-decoder self-supervised learning (SSL) framework that supports joint contrastive pre-training. We first extend existing SSL architectures to accommodate diverse decoders and their corresponding contrastive losses. Then, we introduce a weighted encoder-decoder contrastive loss with non-competing objectives to enable the joint pre-training of encoder-decoder architectures. By adapting a contrastive SSL framework for dense prediction, DeCon establishes consistent state-of-the-art performance on most of the evaluated tasks when pre-trained on Imagenet-1K, COCO and COCO+. Notably, when pre-training a ResNet-50 encoder on COCO dataset, DeCon improves COCO object detection and instance segmentation compared to the baseline framework by +0.37 AP and +0.32 AP, respectively, and boosts semantic segmentation by +1.42 mIoU on Pascal VOC and by +0.50 mIoU on Cityscapes. These improvements generalize across recent backbones, decoders, datasets, and dense tasks beyond segmentation and object detection, and persist in out-of-domain scenarios, including limited-data settings, demonstrating that joint pre-training significantly enhances representation quality for dense prediction. Code is available at https://github.com/sebquetin/DeCon.git.", "link": "http://arxiv.org/abs/2503.17526v3", "date": "2026-02-19", "relevancy": 2.6298, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5312}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5233}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5233}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20the%20Encoder%3A%20Joint%20Encoder-Decoder%20Contrastive%20Pre-Training%20Improves%20Dense%20Prediction&body=Title%3A%20Beyond%20the%20Encoder%3A%20Joint%20Encoder-Decoder%20Contrastive%20Pre-Training%20Improves%20Dense%20Prediction%0AAuthor%3A%20S%C3%A9bastien%20Quetin%20and%20Tapotosh%20Ghosh%20and%20Farhad%20Maleki%0AAbstract%3A%20Contrastive%20learning%20methods%20in%20self-supervised%20settings%20have%20primarily%20focused%20on%20pre-training%20encoders%2C%20while%20decoders%20are%20typically%20introduced%20and%20trained%20separately%20for%20downstream%20dense%20prediction%20tasks.%20However%2C%20this%20conventional%20approach%20overlooks%20the%20potential%20benefits%20of%20jointly%20pre-training%20both%20encoder%20and%20decoder.%20In%20this%20paper%2C%20we%20propose%20DeCon%2C%20an%20efficient%20encoder-decoder%20self-supervised%20learning%20%28SSL%29%20framework%20that%20supports%20joint%20contrastive%20pre-training.%20We%20first%20extend%20existing%20SSL%20architectures%20to%20accommodate%20diverse%20decoders%20and%20their%20corresponding%20contrastive%20losses.%20Then%2C%20we%20introduce%20a%20weighted%20encoder-decoder%20contrastive%20loss%20with%20non-competing%20objectives%20to%20enable%20the%20joint%20pre-training%20of%20encoder-decoder%20architectures.%20By%20adapting%20a%20contrastive%20SSL%20framework%20for%20dense%20prediction%2C%20DeCon%20establishes%20consistent%20state-of-the-art%20performance%20on%20most%20of%20the%20evaluated%20tasks%20when%20pre-trained%20on%20Imagenet-1K%2C%20COCO%20and%20COCO%2B.%20Notably%2C%20when%20pre-training%20a%20ResNet-50%20encoder%20on%20COCO%20dataset%2C%20DeCon%20improves%20COCO%20object%20detection%20and%20instance%20segmentation%20compared%20to%20the%20baseline%20framework%20by%20%2B0.37%20AP%20and%20%2B0.32%20AP%2C%20respectively%2C%20and%20boosts%20semantic%20segmentation%20by%20%2B1.42%20mIoU%20on%20Pascal%20VOC%20and%20by%20%2B0.50%20mIoU%20on%20Cityscapes.%20These%20improvements%20generalize%20across%20recent%20backbones%2C%20decoders%2C%20datasets%2C%20and%20dense%20tasks%20beyond%20segmentation%20and%20object%20detection%2C%20and%20persist%20in%20out-of-domain%20scenarios%2C%20including%20limited-data%20settings%2C%20demonstrating%20that%20joint%20pre-training%20significantly%20enhances%20representation%20quality%20for%20dense%20prediction.%20Code%20is%20available%20at%20https%3A//github.com/sebquetin/DeCon.git.%0ALink%3A%20http%3A//arxiv.org/abs/2503.17526v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520the%2520Encoder%253A%2520Joint%2520Encoder-Decoder%2520Contrastive%2520Pre-Training%2520Improves%2520Dense%2520Prediction%26entry.906535625%3DS%25C3%25A9bastien%2520Quetin%2520and%2520Tapotosh%2520Ghosh%2520and%2520Farhad%2520Maleki%26entry.1292438233%3DContrastive%2520learning%2520methods%2520in%2520self-supervised%2520settings%2520have%2520primarily%2520focused%2520on%2520pre-training%2520encoders%252C%2520while%2520decoders%2520are%2520typically%2520introduced%2520and%2520trained%2520separately%2520for%2520downstream%2520dense%2520prediction%2520tasks.%2520However%252C%2520this%2520conventional%2520approach%2520overlooks%2520the%2520potential%2520benefits%2520of%2520jointly%2520pre-training%2520both%2520encoder%2520and%2520decoder.%2520In%2520this%2520paper%252C%2520we%2520propose%2520DeCon%252C%2520an%2520efficient%2520encoder-decoder%2520self-supervised%2520learning%2520%2528SSL%2529%2520framework%2520that%2520supports%2520joint%2520contrastive%2520pre-training.%2520We%2520first%2520extend%2520existing%2520SSL%2520architectures%2520to%2520accommodate%2520diverse%2520decoders%2520and%2520their%2520corresponding%2520contrastive%2520losses.%2520Then%252C%2520we%2520introduce%2520a%2520weighted%2520encoder-decoder%2520contrastive%2520loss%2520with%2520non-competing%2520objectives%2520to%2520enable%2520the%2520joint%2520pre-training%2520of%2520encoder-decoder%2520architectures.%2520By%2520adapting%2520a%2520contrastive%2520SSL%2520framework%2520for%2520dense%2520prediction%252C%2520DeCon%2520establishes%2520consistent%2520state-of-the-art%2520performance%2520on%2520most%2520of%2520the%2520evaluated%2520tasks%2520when%2520pre-trained%2520on%2520Imagenet-1K%252C%2520COCO%2520and%2520COCO%252B.%2520Notably%252C%2520when%2520pre-training%2520a%2520ResNet-50%2520encoder%2520on%2520COCO%2520dataset%252C%2520DeCon%2520improves%2520COCO%2520object%2520detection%2520and%2520instance%2520segmentation%2520compared%2520to%2520the%2520baseline%2520framework%2520by%2520%252B0.37%2520AP%2520and%2520%252B0.32%2520AP%252C%2520respectively%252C%2520and%2520boosts%2520semantic%2520segmentation%2520by%2520%252B1.42%2520mIoU%2520on%2520Pascal%2520VOC%2520and%2520by%2520%252B0.50%2520mIoU%2520on%2520Cityscapes.%2520These%2520improvements%2520generalize%2520across%2520recent%2520backbones%252C%2520decoders%252C%2520datasets%252C%2520and%2520dense%2520tasks%2520beyond%2520segmentation%2520and%2520object%2520detection%252C%2520and%2520persist%2520in%2520out-of-domain%2520scenarios%252C%2520including%2520limited-data%2520settings%252C%2520demonstrating%2520that%2520joint%2520pre-training%2520significantly%2520enhances%2520representation%2520quality%2520for%2520dense%2520prediction.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/sebquetin/DeCon.git.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2503.17526v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20the%20Encoder%3A%20Joint%20Encoder-Decoder%20Contrastive%20Pre-Training%20Improves%20Dense%20Prediction&entry.906535625=S%C3%A9bastien%20Quetin%20and%20Tapotosh%20Ghosh%20and%20Farhad%20Maleki&entry.1292438233=Contrastive%20learning%20methods%20in%20self-supervised%20settings%20have%20primarily%20focused%20on%20pre-training%20encoders%2C%20while%20decoders%20are%20typically%20introduced%20and%20trained%20separately%20for%20downstream%20dense%20prediction%20tasks.%20However%2C%20this%20conventional%20approach%20overlooks%20the%20potential%20benefits%20of%20jointly%20pre-training%20both%20encoder%20and%20decoder.%20In%20this%20paper%2C%20we%20propose%20DeCon%2C%20an%20efficient%20encoder-decoder%20self-supervised%20learning%20%28SSL%29%20framework%20that%20supports%20joint%20contrastive%20pre-training.%20We%20first%20extend%20existing%20SSL%20architectures%20to%20accommodate%20diverse%20decoders%20and%20their%20corresponding%20contrastive%20losses.%20Then%2C%20we%20introduce%20a%20weighted%20encoder-decoder%20contrastive%20loss%20with%20non-competing%20objectives%20to%20enable%20the%20joint%20pre-training%20of%20encoder-decoder%20architectures.%20By%20adapting%20a%20contrastive%20SSL%20framework%20for%20dense%20prediction%2C%20DeCon%20establishes%20consistent%20state-of-the-art%20performance%20on%20most%20of%20the%20evaluated%20tasks%20when%20pre-trained%20on%20Imagenet-1K%2C%20COCO%20and%20COCO%2B.%20Notably%2C%20when%20pre-training%20a%20ResNet-50%20encoder%20on%20COCO%20dataset%2C%20DeCon%20improves%20COCO%20object%20detection%20and%20instance%20segmentation%20compared%20to%20the%20baseline%20framework%20by%20%2B0.37%20AP%20and%20%2B0.32%20AP%2C%20respectively%2C%20and%20boosts%20semantic%20segmentation%20by%20%2B1.42%20mIoU%20on%20Pascal%20VOC%20and%20by%20%2B0.50%20mIoU%20on%20Cityscapes.%20These%20improvements%20generalize%20across%20recent%20backbones%2C%20decoders%2C%20datasets%2C%20and%20dense%20tasks%20beyond%20segmentation%20and%20object%20detection%2C%20and%20persist%20in%20out-of-domain%20scenarios%2C%20including%20limited-data%20settings%2C%20demonstrating%20that%20joint%20pre-training%20significantly%20enhances%20representation%20quality%20for%20dense%20prediction.%20Code%20is%20available%20at%20https%3A//github.com/sebquetin/DeCon.git.&entry.1838667208=http%3A//arxiv.org/abs/2503.17526v3&entry.124074799=Read"},
{"title": "FR-GESTURE: An RGBD Dataset For Gesture-based Human-Robot Interaction In First Responder Operations", "author": "Konstantinos Foteinos and Georgios Angelidis and Aggelos Psiris and Vasileios Argyriou and Panagiotis Sarigiannidis and Georgios Th. Papadopoulos", "abstract": "The ever increasing intensity and number of disasters make even more difficult the work of First Responders (FRs). Artificial intelligence and robotics solutions could facilitate their operations, compensating these difficulties. To this end, we propose a dataset for gesture-based UGV control by FRs, introducing a set of 12 commands, drawing inspiration from existing gestures used by FRs and tactical hand signals and refined after incorporating feedback from experienced FRs. Then we proceed with the data collection itself, resulting in 3312 RGBD pairs captured from 2 viewpoints and 7 distances. To the best of our knowledge, this is the first dataset especially intended for gesture-based UGV guidance by FRs. Finally we define evaluation protocols for our RGBD dataset, termed FR-GESTURE, and we perform baseline experiments, which are put forward for improvement. We have made data publicly available to promote future research on the domain: https://doi.org/10.5281/zenodo.18131333.", "link": "http://arxiv.org/abs/2602.17573v1", "date": "2026-02-19", "relevancy": 2.6238, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5259}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5252}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5232}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FR-GESTURE%3A%20An%20RGBD%20Dataset%20For%20Gesture-based%20Human-Robot%20Interaction%20In%20First%20Responder%20Operations&body=Title%3A%20FR-GESTURE%3A%20An%20RGBD%20Dataset%20For%20Gesture-based%20Human-Robot%20Interaction%20In%20First%20Responder%20Operations%0AAuthor%3A%20Konstantinos%20Foteinos%20and%20Georgios%20Angelidis%20and%20Aggelos%20Psiris%20and%20Vasileios%20Argyriou%20and%20Panagiotis%20Sarigiannidis%20and%20Georgios%20Th.%20Papadopoulos%0AAbstract%3A%20The%20ever%20increasing%20intensity%20and%20number%20of%20disasters%20make%20even%20more%20difficult%20the%20work%20of%20First%20Responders%20%28FRs%29.%20Artificial%20intelligence%20and%20robotics%20solutions%20could%20facilitate%20their%20operations%2C%20compensating%20these%20difficulties.%20To%20this%20end%2C%20we%20propose%20a%20dataset%20for%20gesture-based%20UGV%20control%20by%20FRs%2C%20introducing%20a%20set%20of%2012%20commands%2C%20drawing%20inspiration%20from%20existing%20gestures%20used%20by%20FRs%20and%20tactical%20hand%20signals%20and%20refined%20after%20incorporating%20feedback%20from%20experienced%20FRs.%20Then%20we%20proceed%20with%20the%20data%20collection%20itself%2C%20resulting%20in%203312%20RGBD%20pairs%20captured%20from%202%20viewpoints%20and%207%20distances.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20dataset%20especially%20intended%20for%20gesture-based%20UGV%20guidance%20by%20FRs.%20Finally%20we%20define%20evaluation%20protocols%20for%20our%20RGBD%20dataset%2C%20termed%20FR-GESTURE%2C%20and%20we%20perform%20baseline%20experiments%2C%20which%20are%20put%20forward%20for%20improvement.%20We%20have%20made%20data%20publicly%20available%20to%20promote%20future%20research%20on%20the%20domain%3A%20https%3A//doi.org/10.5281/zenodo.18131333.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17573v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFR-GESTURE%253A%2520An%2520RGBD%2520Dataset%2520For%2520Gesture-based%2520Human-Robot%2520Interaction%2520In%2520First%2520Responder%2520Operation /e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FR-GESTURE%3A%20An%20RGBD%20Dataset%20For%20Gesture-based%20Human-Robot%20Interaction%20In%20First%20Responder%20Operations&entry.906535625=Konstantinos%20Foteinos%20and%20Georgios%20Angelidis%20and%20Aggelos%20Psiris%20and%20Vasileios%20Argyriou%20and%20Panagiotis%20Sarigiannidis%20and%20Georgios%20Th.%20Papadopoulos&entry.1292438233=The%20ever%20increasing%20intensity%20and%20number%20of%20disasters%20make%20even%20more%20difficult%20the%20work%20of%20First%20Responders%20%28FRs%29.%20Artificial%20intelligence%20and%20robotics%20solutions%20could%20facilitate%20their%20operations%2C%20compensating%20these%20difficulties.%20To%20this%20end%2C%20we%20propose%20a%20dataset%20for%20gesture-based%20UGV%20control%20by%20FRs%2C%20introducing%20a%20set%20of%2012%20commands%2C%20drawing%20inspiration%20from%20existing%20gestures%20used%20by%20FRs%20and%20tactical%20hand%20signals%20and%20refined%20after%20incorporating%20feedback%20from%20experienced%20FRs.%20Then%20we%20proceed%20with%20the%20data%20collection%20itself%2C%20resulting%20in%203312%20RGBD%20pairs%20captured%20from%202%20viewpoints%20and%207%20distances.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20dataset%20especially%20intended%20for%20gesture-based%20UGV%20guidance%20by%20FRs.%20Finally%20we%20define%20evaluation%20protocols%20for%20our%20RGBD%20dataset%2C%20termed%20FR-GESTURE%2C%20and%20we%20perform%20baseline%20experiments%2C%20which%20are%20put%20forward%20for%20improvement.%20We%20have%20made%20data%20publicly%20available%20to%20promote%20future%20research%20on%20the%20domain%3A%20https%3A//doi.org/10.5281/zenodo.18131333.&entry.1838667208=http%3A//arxiv.org/abs/2602.17573v1&entry.124074799=Read"},
{"title": "SpectralGCD: Spectral Concept Selection and Cross-modal Representation Learning for Generalized Category Discovery", "author": "Lorenzo Caselli and Marco Mistretta and Simone Magistri and Andrew D. Bagdanov", "abstract": "Generalized Category Discovery (GCD) aims to identify novel categories in unlabeled data while leveraging a small labeled subset of known classes. Training a parametric classifier solely on image features often leads to overfitting to old classes, and recent multimodal approaches improve performance by incorporating textual information. However, they treat modalities independently and incur high computational cost. We propose SpectralGCD, an efficient and effective multimodal approach to GCD that uses CLIP cross-modal image-concept similarities as a unified cross-modal representation. Each image is expressed as a mixture over semantic concepts from a large task-agnostic dictionary, which anchors learning to explicit semantics and reduces reliance on spurious visual cues. To maintain the semantic quality of representations learned by an efficient student, we introduce Spectral Filtering which exploits a cross-modal covariance matrix over the softmaxed similarities measured by a strong teacher model to automatically retain only relevant concepts from the dictionary. Forward and reverse knowledge distillation from the same teacher ensures that the cross-modal representations of the student remain both semantically sufficient and well-aligned. Across six benchmarks, SpectralGCD delivers accuracy comparable to or significantly superior to state-of-the-art methods at a fraction of the computational cost. The code is publicly available at: https://github.com/miccunifi/SpectralGCD.", "link": "http://arxiv.org/abs/2602.17395v1", "date": "2026-02-19", "relevancy": 2.5933, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5514}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5045}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5001}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpectralGCD%3A%20Spectral%20Concept%20Selection%20and%20Cross-modal%20Representation%20Learning%20for%20Generalized%20Category%20Discovery&body=Title%3A%20SpectralGCD%3A%20Spectral%20Concept%20Selection%20and%20Cross-modal%20Representation%20Learning%20for%20Generalized%20Category%20Discovery%0AAuthor%3A%20Lorenzo%20Caselli%20and%20Marco%20Mistretta%20and%20Simone%20Magistri%20and%20Andrew%20D.%20Bagdanov%0AAbstract%3A%20Generalized%20Category%20Discovery%20%28GCD%29%20aims%20to%20identify%20novel%20categories%20in%20unlabeled%20data%20while%20leveraging%20a%20small%20labeled%20subset%20of%20known%20classes.%20Training%20a%20parametric%20classifier%20solely%20on%20image%20features%20often%20leads%20to%20overfitting%20to%20old%20classes%2C%20and%20recent%20multimodal%20approaches%20improve%20performance%20by%20incorporating%20textual%20information.%20However%2C%20they%20treat%20modalities%20independently%20and%20incur%20high%20computational%20cost.%20We%20propose%20SpectralGCD%2C%20an%20efficient%20and%20effective%20multimodal%20approach%20to%20GCD%20that%20uses%20CLIP%20cross-modal%20image-concept%20similarities%20as%20a%20unified%20cross-modal%20representation.%20Each%20image%20is%20expressed%20as%20a%20mixture%20over%20semantic%20concepts%20from%20a%20large%20task-agnostic%20dictionary%2C%20which%20anchors%20learning%20to%20explicit%20semantics%20and%20reduces%20reliance%20on%20spurious%20visual%20cues.%20To%20maintain%20the%20semantic%20quality%20of%20representations%20learned%20by%20an%20efficient%20student%2C%20we%20introduce%20Spectral%20Filtering%20which%20exploits%20a%20cross-modal%20covariance%20matrix%20over%20the%20softmaxed%20similarities%20measured%20by%20a%20strong%20teacher%20model%20to%20automatically%20retain%20only%20relevant%20concepts%20from%20the%20dictionary.%20Forward%20and%20reverse%20knowledge%20distillation%20from%20the%20same%20teacher%20ensures%20that%20the%20cross-modal%20representations%20of%20the%20student%20remain%20both%20semantically%20sufficient%20and%20well-aligned.%20Across%20six%20benchmarks%2C%20SpectralGCD%20delivers%20accuracy%20comparable%20to%20or%20significantly%20superior%20to%20state-of-the-art%20methods%20at%20a%20fraction%20of%20the%20computational%20cost.%20The%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/miccunifi/SpectralGCD.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17395v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectralGCD%253A%2520Spectral%2520Concept%2520Selection%2520and%2520Cross-modal%2520Representation%2520Learning%2520for%2520Generalized%2520Category%2520Discovery%26entry.906535625%3DLorenzo%2520Caselli%2520and%2520Marco%2520Mistretta%2520and%2520Simone%2520Magistri%2520and%2520Andrew%2520D.%2520Bagdanov%26entry.1292438233%3DGeneralized%2520Category%2520Discovery%2520%2528GCD%2529%2520aims%2520to%2520identify%2520novel%2520categories%2520in%2520unlabeled%2520data%2520while%2520leveraging%2520a%2520small%2520labeled%2520subset%2520of%2520known%2520classes.%2520Training%2520a%2520parametric%2520classifier%2520solely%2520on%2520image%2520features%2520often%2520leads%2520to%2520overfitting%2520to%2520old%2520classes%252C%2520and%2520recent%2520multimodal%2520approaches%2520improve%2520performance%2520by%2520incorporating%2520textual%2520information.%2520However%252C%2520they%2520treat%2520modalities%2520independently%2520and%2520incur%2520high%2520computational%2520cost.%2520We%2520propose%2520SpectralGCD%252C%2520an%2520efficient%2520and%2520effect {"title": "4D Monocular Surgical Reconstruction under Arbitrary Camera Motions", "author": "Jiwei Shan and Zeyu Cai and Cheng-Tai Hsieh and Yirui Li and Hao Liu and Lijun Han and Hesheng Wang and Shing Shin Cheng", "abstract": "Reconstructing deformable surgical scenes from endoscopic videos is challenging and clinically important. Recent state-of-the-art methods based on implicit neural representations or 3D Gaussian splatting have made notable progress. However, most are designed for deformable scenes with fixed endoscope viewpoints and rely on stereo depth priors or accurate structure-from-motion for initialization and optimization, limiting their ability to handle monocular sequences with large camera motion in real clinical settings. To address this, we propose Local-EndoGS, a high-quality 4D reconstruction framework for monocular endoscopic sequences with arbitrary camera motion. Local-EndoGS introduces a progressive, window-based global representation that allocates local deformable scene models to each observed window, enabling scalability to long sequences with substantial motion. To overcome unreliable initialization without stereo depth or accurate structure-from-motion, we design a coarse-to-fine strategy integrating multi-view geometry, cross-window information, and monocular depth priors, providing a robust foundation for optimization. We further incorporate long-range 2D pixel trajectory constraints and physical motion priors to improve deformation plausibility. Experiments on three public endoscopic datasets with deformable scenes and varying camera motions show that Local-EndoGS consistently outperforms state-of-the-art methods in appearance quality and geometry. Ablation studies validate the effectiveness of our key designs. Code will be released upon acceptance at: https://github.com/IRMVLab/Local-EndoGS.", "link": "http://arxiv.org/abs/2602.17473v1", "date": "2026-02-19", "relevancy": 2.5885, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6563}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.646}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%204D%20Monocular%20Surgical%20Reconstruction%20under%20Arbitrary%20Camera%20Motions&body=Title%3A%204D%20Monocular%20Surgical%20Reconstruction%20under%20Arbitrary%20Camera%20Motions%0AAuthor%3A%20Jiwei%20Shan%20and%20Zeyu%20Cai%20and%20Cheng-Tai%20Hsieh%20and%20Yirui%20Li%20and%20Hao%20Liu%20and%20Lijun%20Han%20and%20Hesheng%20Wang%20and%20Shing%20Shin%20Cheng%0AAbstract%3A%20Reconstructing%20deformable%20surgical%20scenes%20from%20endoscopic%20videos%20is%20challenging%20and%20clinically%20important.%20Recent%20state-of-the-art%20methods%20based%20on%20implicit%20neural%20representations%20or%203D%20Gaussian%20splatting%20have%20made%20notable%20progress.%20However%2C%20most%20are%20designed%20for%20deformable%20scenes%20with%20fixed%20endoscope%20viewpoints%20and%20rely%20on%20stereo%20depth%20priors%20or%20accurate%20structure-from-motion%20for%20initialization%20and%20optimization%2C%20limiting%20their%20ability%20to%20handle%20monocular%20sequences%20with%20large%20camera%20motion%20in%20real%20clinical%20settings.%20To%20address%20this%2C%20we%20propose%20Local-EndoGS%2C%20a%20high-quality%204D%20reconstruction%20framework%20for%20monocular%20endoscopic%20sequences%20with%20arbitrary%20camera%20motion.%20Local-EndoGS%20introduces%20a%20progressive%2C%20window-based%20global%20representation%20that%20allocates%20local%20deformable%20scene%20models%20to%20each%20observed%20window%2C%20enabling%20scalability%20to%20long%20sequences%20with%20substantial%20motion.%20To%20overcome%20unreliable%20initialization%20without%20stereo%20depth%20or%20accurate%20structure-from-motion%2C%20we%20design%20a%20coarse-to-fine%20strategy%20integrating%20multi-view%20geometry%2C%20cross-window%20information%2C%20and%20monocular%20depth%20priors%2C%20providing%20a%20robust%20foundation%20for%20optimization.%20We%20further%20incorporate%20long-range%202D%20pixel%20trajectory%20constraints%20and%20physical%20motion%20priors%20to%20improve%20deformation%20plausibility.%20Experiments%20on%20three%20public%20endoscopic%20datasets%20with%20deformable%20scenes%20and%20varying%20camera%20motions%20show%20that%20Local-EndoGS%20consistently%20outperforms%20state-of-the-art%20methods%20in%20appearance%20quality%20and%20geometry.%20Ablation%20studies%20validate%20the%20effectiveness%20of%20our%20key%20designs.%20Code%20will%20be%20released%20upon%20acceptance%20at%3A%20https%3A//github.com/IRMVLab/Local-EndoGS.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17473v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D4D%2520Monocular%2520Surgical%2520Reconstruction%2520under%2520Arbitrary%2520Camera%2520Motions%26entry.906535625%3DJiwei%2520Shan%2520and%2520Zeyu%2520Cai%2520and%2520Cheng-Tai%2520Hsieh%2520and%2520Yirui%2520Li%2520and%2520Hao%2520Liu%2520and%2520Lijun%2520Han%2520and%2520Hesheng%2520Wang%2520and%2520Shing%2520Shin%2520Cheng%26entry.1292438233%3DReconstructing%2520deformable%2520surgical%2520scenes%2520from%2520endoscopic%2520videos%2520is%2520challenging%2520and%2520clinically%2520important.%2520Recent%2520state-of-the-art%2520methods%2520based%2520on%2520implicit%2520neural%2520representations%2520or%25203D%2520Gaussian%2520splatting%2520have%2520made%2520notable%2520progress.%2520However%252C%2520most%2520are%2520designed%2520for%2520deformable%2520scenes%2520with%2520fixed%2520endoscope%2520viewpoints%2520and%2520rely%2520on%2520stereo%2520depth%2520p 17473v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=4D%20Monocular%20Surgical%20Reconstruction%20under%20Arbitrary%20Camera%20Motions&entry.906535625=Jiwei%20Shan%20and%20Zeyu%20Cai%20and%20Cheng-Tai%20Hsieh%20and%20Yirui%20Li%20and%20Hao%20Liu%20and%20Lijun%20Han%20and%20Hesheng%20Wang%20and%20Shing%20Shin%20Cheng&entry.1292438233=Reconstructing%20deformable%20surgical%20scenes%20from%20endoscopic%20videos%20is%20challenging%20and%20clinically%20important.%20Recent%20state-of-the-art%20methods%20based%20on%20implicit%20neural%20representations%20or%203D%20Gaussian%20splatting%20have%20made%20notable%20progress.%20However%2C%20most%20are%20designed%20for%20deformable%20scenes%20with%20fixed%20endoscope%20viewpoints%20and%20rely%20on%20stereo%20depth%20priors%20or%20accurate%20structure-from-motion%20for%20initialization%20and%20optimization%2C%20limiting%20their%20ability%20to%20handle%20monocular%20sequences%20with%20large%20camera%20motion%20in%20real%20clinical%20settings.%20To%20address%20this%2C%20we%20propose%20Local-EndoGS%2C%20a%20high-quality%204D%20reconstruction%20framework%20for%20monocular%20endoscopic%20sequences%20with%20arbitrary%20camera%20motion.%20Local-EndoGS%20introduces%20a%20progressive%2C%20window-based%20global%20representation%20that%20allocates%20local%20deformable%20scene%20models%20to%20each%20observed%20window%2C%20enabling%20scalability%20to%20long%20sequences%20with%20substantial%20motion.%20To%20overcome%20unreliable%20initialization%20without%20stereo%20depth%20or%20accurate%20structure-from-motion%2C%20we%20design%20a%20coarse-to-fine%20strategy%20integrating%20multi-view%20geometry%2C%20cross-window%20information%2C%20and%20monocular%20depth%20priors%2C%20providing%20a%20robust%20foundation%20for%20optimization.%20We%20further%20incorporate%20long-range%202D%20pixel%20trajectory%20constraints%20and%20physical%20motion%20pri

{"title": "Variational Grey-Box Dynamics Matching", "author": "Gurjeet Sangra Singh and Frantzeska Lavda and Giangiacomo Mercatali and Alexandros Kalousis", "abstract": "Deep generative models such as flow matching and diffusion models have shown great potential in learning complex distributions and dynamical systems, but often act as black-boxes, neglecting underlying physics. In contrast, physics-based simulation models described by ODEs/PDEs remain interpretable, but may have missing or unknown terms, unable to fully describe real-world observations. We bridge this gap with a novel grey-box method that integrates incomplete physics models directly into generative models. Our approach learns dynamics from observational trajectories alone, without ground-truth physics parameters, in a simulation-free manner that avoids scalability and stability issues of Neural ODEs. The core of our method lies in modelling a structured variational distribution within the flow matching framework, by using two latent encodings: one to model the missing stochasticity and multi-modal velocity, and a second to encode physics parameters as a latent variable with a physics-informed prior. Furthermore, we present an adaptation of the framework to handle second-order dynamics. Our experiments on representative ODE/PDE problems show that our method performs on par with or superior to fully data-driven approaches and previous grey-box baselines, while preserving the interpretability of the physics model. Our code is available at https://github.com/DMML-Geneva/VGB-DM.", "link": "http://arxiv.org/abs/2602.17477v1", "date": "2026-02-19", "relevancy": 2.2129, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5736}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5417}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.531}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Variational%20Grey-Box%20Dynamics%20Matching&body=Title%3A%20Variational%20Grey-Box%20Dynamics%20Matching%0AAuthor%3A%20Gurjeet%20Sangra%20Singh%20and%20Frantzeska%20Lavda%20and%20Giangiacomo%20Mercatali%20and%20Alexandros%20Kalousis%0AAbstract%3A%20Deep%20generative%20models%20such%20as%20flow%20matching%20and%20diffusion%20models%20have%20shown%20great%20potential%20in%20learning%20complex%20distributions%20and%20dynamical%20systems%2C%20but%20often%20act%20as%20black-boxes%2C%20neglecting%20underlying%20physics.%20In%20contrast%2C%20physics-based%20simulation%20models%20described%20by%20ODEs/PDEs%20remain%20interpretable%2C%20but%20may%20have%20missing%20or%20unknown%20terms%2C%20unable%20to%20fully%20describe%20real-world%20observations.%20We%20bridge%20this%20gap%20with%20a%20novel%20grey-box%20method%20that%20integrates%20incomplete%20physics%20models%20directly%20into%20generative%20models.%20Our%20approach%20learns%20dynamics%20from%20observational%20trajectories%20alone%2C%20without%20ground-truth%20physics%20parameters%2C%20in%20a%20simulation-free%20manner%20that%20avoids%20scalability%20and%20stability%20issues%20of%20Neural%20ODEs.%20The%20core%20of%20our%20method%20lies%20in%20modelling%20a%20structured%20variational%20distribution%20within%20the%20flow%20matching%20framework%2C%20by%20using%20two%20latent%20encodings%3A%20one%20to%20model%20the%20missing%20stochasticity%20and%20multi-modal%20velocity%2C%20and%20a%20second%20to%20encode%20physics%20parameters%20as%20a%20latent%20variable%20with%20a%20physics-informed%20prior.%20Furthermore%2C%20we%20present%20an%20adaptation%20of%20the%20framework%20to%20handle%20second-order%20dynamics.%20Our%20experiments%20on%20representative%20ODE/PDE%20problems%20show%20that%20our%20method%20performs%20on%20par%20with%20or%20superior%20to%20fully%20data-driven%20approaches%20and%20previous%20grey-box%20baselines%2C%20while%20preserving%20the%20interpretability%20of%20the%20physics%20model.%20Our%20code%20is%20available%20at%20https%3A//github.com/DMML-Geneva/VGB-DM.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17477v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVariational%2520Grey-Box%2520Dynamics%2520Matching%26entry.906535625%3DGurjeet%2520Sangra%2520Singh%2520and%2520Frantzeska%2520Lavda%2520and%2520Giangiacomo%2520Mercatali%2520and%2520Alexandros%2520Kalousis%26entry.1292438233%3DDeep%2520generative%2520models%2520such%2520as%2520flow%2520matching%2520and%2520diffusion%2520models%2520have%2520shown%2520great%2520potential%2520in%2520learning%2520complex%2520distributions%2520and%2520dynamical%2520systems%252C%2520but%2520often%2520act%2520as%2520black-boxes%252C%2520neglecting%2520underlying%2520physics.%2520In%2520contrast%252C%2520physics-based%2520simulation%2520models%2520described%2520by%2520ODEs/PDEs%2520remain%2520interpretable%252C%2520but%2520may%2520have%2520missing%2520or%2520unknown%2520terms%252C%2520unable%2520to%2520fully%2520describe%2520real-world%2520observations.%2520We%2520bridge%2520this%2520gap%2520with%2520a%2520novel%2520grey-box%2520method%2520that%2520integrates%2520incomplete%2520physics%2520models%2520directly%2520into%2520generative%2520models.%2520Our%2520approach%2520learns%2520dynamics%2520from%2520observational%2520trajectories%2520alone%252C%2520without%2520ground-truth%2520physics%2520parameters%252C%2520in%2520a%2520simulation-free%2520manner%2520that%2520avoids%2520scalability%2520and%2520stability%2520issues%2520of%2520Neural%2520ODEs.%2520The%2520core%2520of%2520our%2520method%2520lies%2520in%2520modelling%2520a%2520structured%2520variational%2520distribution%2520within%2520the%2520flow%2520matching%2520framework%252C%2520by%2520using%2520two%2520latent%2520 ctories%20alone%2C%20without%20ground-truth%20physics%20parameters%2C%20in%20a%20simulation-free%20manner%20that%20avoids%20scalability%20and%20stability%20issues%20of%20Neural%20ODEs.%20The%20core%20of%20our%20method%20lies%20in%20modelling%20a%20structured%20variational%20distribution%20within%20the%20flow%20matching%20framework%2C%20by%20using%20two%20latent%20encodings%3A%20one%20to%20model%20the%20missing%20stochasticity%20and%20multi-modal%20velocity%2C%20and%20a%20second%20to%20encode%20physics%20parameters%20as%20a%20latent%20variable%20with%20a%20physics-informed%20prior.%20Furthermore%2C%20we%20present%20an%20adaptation%20of%20the%20framework%20to%20handle%20second-order%20dynamics.%20Our%20experiments%20on%20representative%20ODE/PDE%20problems%20show%20that%20our%20method%20performs%20on%20par%20with%20or%20superior%20to%20fully%20data-driven%20approaches%20and%20previous%20grey-box%20baselines%2C%20while%20preserving%20the%20interpretability%20of%20the%20physics%20model.%20Our%20code%20is%20available%20at%20https%3A//github.com/DMML-Geneva/VGB-DM.&entry.1838667208=http%3A//arxiv.org/abs/2602.17477v1&entry.124074799=Read"},
{"title": "GraphThinker: Reinforcing Video Reasoning with Event Graph Thinking", "author": "Zixu Cheng and Da Li and Jian Hu and Ziquan Liu and Wei Li and Shaogang Gong", "abstract": "Video reasoning requires understanding the causal relationships between events in a video. However, such relationships are often implicit and costly to annotate manually. While existing multimodal large language models (MLLMs) often infer event relations through dense captions or video summaries for video reasoning, such modeling still lacks causal understanding. Without explicit causal structure modeling within and across video events, these models suffer from hallucinations during the video reasoning. In this work, we propose GraphThinker, a reinforcement finetuning-based method that constructs structural event-level scene graphs and enhances visual grounding to jointly reduce hallucinations in video reasoning. Specifically, we first employ an MLLM to construct an event-based video scene graph (EVSG) that explicitly models both intra- and inter-event relations, and incorporate these formed scene graphs into the MLLM as an intermediate thinking process. We also introduce a visual attention reward during reinforcement finetuning, which strengthens video grounding and further mitigates hallucinations. We evaluate GraphThinker on two datasets, RexTime and VidHalluc, where it shows superior ability to capture object and event relations with more precise event localization, reducing hallucinations in video reasoning compared to prior methods.", "link": "http://arxiv.org/abs/2602.17555v1", "date": "2026-02-19", "relevancy": 2.1967, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5494}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5494}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraphThinker%3A%20Reinforcing%20Video%20Reasoning%20with%20Event%20Graph%20Thinking&body=Title%3A%20GraphThinker%3A%20Reinforcing%20Video%20Reasoning%20with%20Event%20Graph%20Thinking%0AAuthor%3A%20Zixu%20Cheng%20and%20Da%20Li%20and%20Jian%20Hu%20and%20Ziquan%20Liu%20and%20Wei%20Li%20and%20Shaogang%20Gong%0AAbstract%3A%20Video%20reasoning%20requires%20understanding%20the%20causal%20relationships%20between%20events%20in%20a%20video.%20However%2C%20such%20relationships%20are%20often%20implicit%20and%20costly%20to%20annotate%20manually.%20While%20existing%20multimodal%20large%20language%20models%20%28MLLMs%29%20often%20infer%20event%20relations%20through%20dense%20captions%20or%20video%20summaries%20for%20video%20reasoning%2C%20such%20modeling%20still%20lacks%20causal%20understanding.%20Without%20explicit%20causal%20structure%20modeling%20within%20and%20across%20video%20events%2C%20these%20models%20suffer%20from%20hallucinations%20during%20the%20video%20reasoning.%20In%20this%20work%2C%20we%20propose%20GraphThinker%2C%20a%20reinforcement%20finetuning-based%20method%20that%20constructs%20structural%20event-level%20scene%20graphs%20and%20enhances%20visual%20grounding%20to%20jointly%20reduce%20hallucinations%20in%20video%20reasoning.%20Specifically%2C%20we%20first%20employ%20an%20MLLM%20to%20construct%20an%20event-based%20video%20scene%20graph%20%28EVSG%29%20that%20explicitly%20models%20both%20intra-%20and%20inter-event%20relations%2C%20and%20incorporate%20these%20formed%20scene%20graphs%20into%20the%20MLLM%20as%20an%20intermediate%20thinking%20process.%20We%20also%20introduce%20a%20visual%20attention%20reward%20during%20reinforcement%20finetuning%2C%20which%20strengthens%20video%20grounding%20and%20further%20mitigates%20hallucinations.%20We%20evaluate%20GraphThinker%20on%20two%20datasets%2C%20RexTime%20and%20VidHalluc%2C%20where%20it%20shows%20superior%20ability%20to%20capture%20object%20and%20event%20relations%20with%20more%20precise%20event%20localization%2C%20reducing%20hallucinations%20in%20video%20reasoning%20compared%20to%20prior%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17555v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraphThinker%253A%2520Reinforcing%2520Video%2520Reasoning%2520with%2520Event%2520Graph%2520Thinking%26entry.906535625%3DZixu%2520Cheng%2520and%2520Da%2520Li%2520and%2520Jian%2520Hu%2520and%2520Ziquan%2520Liu%2520and%2520Wei%2520Li%2520and%2520Shaogang%2520Gong%26entry.1292438233%3DVideo%2520reasoning%2520requires%2520understanding%2520the%2520causal%2520relationships%2520between%2520events%2520in%2520a%2520video.%2520However%252C%2520such%2520relationships%2520are%2520often%2520implicit%2520and%2520costly%2520to%2520annotate%2520manually.%2520While%2520existing%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520often%2520infer%2520event%2520relations%2520through%2520dense%2520captions%2520or%2520video%2520summaries%2520for%2520video%2520reasoning%252C%2520such%2520modeling%2520still%2520lacks%2520causal%2520understanding.%2520Without%2520explicit%2520causal%2520structure%2520modeling%2520within%2520and%2520across%2520video%2520events%252C%2520these%2520models%2520suffer%2520from%2520hallucinations%2520during%2520the%2520video%2520reasoning.%2520In%2520this%2520work%252C%2520we%2520propose%2520GraphThinker%252C%2520a%2520reinforcement%2520finetuning-based%2520method%2520that%2520constructs%2520structural%2520event-level%2520scene%2520graphs%2520and%2520enhances%2520visual%2520grounding%2520to%2520jointly%2520reduce%2520hallucinations%2520in%2520video%2520reasoning.%2520Specifically%252C%2520we%2520first%2520employ%2520an%2520MLLM%2520to%2520construct%2520an%2520event-based%2520 {"title": "I-FailSense: Towards General Robotic Failure Detection with Vision-Language Models", "author": "Clemence Grislain and Hamed Rahimi and Olivier Sigaud and Mohamed Chetouani", "abstract": "Language-conditioned robotic manipulation in open-world settings requires not only accurate task execution but also the ability to detect failures for robust deployment in real-world environments. Although recent advances in vision-language models (VLMs) have significantly improved the spatial reasoning and task-planning capabilities of robots, they remain limited in their ability to recognize their own failures. In particular, a critical yet underexplored challenge lies in detecting semantic misalignment errors, where the robot executes a task that is semantically meaningful but inconsistent with the given instruction. To address this, we propose a method for building datasets targeting Semantic Misalignment Failures detection, from existing language-conditioned manipulation datasets. We also present I-FailSense, an open-source VLM framework with grounded arbitration designed specifically for failure detection. Our approach relies on post-training a base VLM, followed by training lightweight classification heads, called FS blocks, attached to different internal layers of the VLM and whose predictions are aggregated using an ensembling mechanism. Experiments show that I-FailSense outperforms state-of-the-art VLMs, both comparable in size and larger, in detecting semantic misalignment errors. Notably, despite being trained only on semantic misalignment detection, I-FailSense generalizes to broader robotic failure categories and effectively transfers to other simulation environments and real-world with zero-shot or minimal post-training. The datasets and models are publicly released on HuggingFace (Webpage: https://clemgris.github.io/I-FailSense/).", "link": "http://arxiv.org/abs/2509.16072v3", "date": "2026-02-19", "relevancy": 2.1966, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5985}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5397}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20I-FailSense%3A%20Towards%20General%20Robotic%20Failure%20Detection%20with%20Vision-Language%20Models&body=Title%3A%20I-FailSense%3A%20Towards%20General%20Robotic%20Failure%20Detection%20with%20Vision-Language%20Models%0AAuthor%3A%20Clemence%20Grislain%20and%20Hamed%20Rahimi%20and%20Olivier%20Sigaud%20and%20Mohamed%20Chetouani%0AAbstract%3A%20Language-conditioned%20robotic%20manipulation%20in%20open-world%20settings%20requires%20not%20only%20accurate%20task%20execution%20but%20also%20the%20ability%20to%20detect%20failures%20for%20robust%20deployment%20in%20real-world%20environments.%20Although%20recent%20advances%20in%20vision-language%20models%20%28VLMs%29%20have%20significantly%20improved%20the%20spatial%20reasoning%20and%20task-planning%20capabilities%20of%20robots%2C%20they%20remain%20limited%20in%20their%20ability%20to%20recognize%20their%20own%20failures.%20In%20particular%2C%20a%20critical%20yet%20underexplored%20challenge%20lies%20in%20detecting%20semantic%20misalignment%20errors%2C%20where%20the%20robot%20executes%20a%20task%20that%20is%20semantically%20meaningful%20but%20inconsistent%20with%20the%20given%20instruction.%20To%20address%20this%2C%20we%20propose%20a%20method%20for%20building%20datasets%20targeting%20Semantic%20Misalignment%20Failures%20detection%2C%20from%20existing%20language-conditioned%20manipulation%20datasets.%20We%20also%20present%20I-FailSense%2C%20an%20open-source%20VLM%20framework%20with%20grounded%20arbitration%20designed%20specifically%20for%20failure%20detection.%20Our%20approach%20relies%20on%20post-training%20a%20base%20VLM%2C%20followed%20by%20training%20lightweight%20classification%20heads%2C%20called%20FS%20blocks%2C%20attached%20to%20different%20internal%20layers%20of%20the%20VLM%20and%20whose%20predictions%20are%20aggregated%20using%20an%20ensembling%20mechanism.%20Experiments%20show%20that%20I-FailSense%20outperforms%20state-of-the-art%20VLMs%2C%20both%20comparable%20in%20size%20and%20larger%2C%20in%20detecting%20semantic%20misalignment%20errors.%20Notably%2C%20despite%20being%20trained%20only%20on%20semantic%20misalignment%20detection%2C%20I-FailSense%20generalizes%20to%20broader%20robotic%20failure%20categories%20and%20effectively%20transfers%20to%20other%20simulation%20environments%20and%20real-world%20with%20zero-shot%20or%20minimal%20post-training.%20The%20datasets%20and%20models%20are%20publicly%20released%20on%20HuggingFace%20%28Webpage%3A%20https%3A//clemgris.github.io/I-FailSense/%29.%0ALink%3A%20http%3A//arxiv.org/abs/2509.16072v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DI-FailSense%253A%2520Towards%2520General%2520Robotic%2520Failure%2520Detection%2520with%2520Vision-Language%2520Models%26entry.906535625%3DClemence%2520Grislain%2520and%2520Hamed%2520Rahimi%2520and%2520Olivier%2520Sigaud%2520and%2520Mohamed%2520Chetouani%26entry.1292438233%3DLanguage-conditioned%2520robotic%2520manipulation%2520in%2520open-world%2520settings%2520requires%2520not%2520only%2520accurate%2520task%2520execution%2520but%2520also%2520the%2520ability%2520to%2520detect%2520failures%2520for%2520robust%2520deployment%2520in%2520real-world%2520environments.%2520Although%2520recent%2520advances%2520in%2520vision-language%2520models%2520%2528VLMs%2529%252 {"title": "Generating Directed Graphs with Dual Attention and Asymmetric Encoding", "author": "Alba Carballo-Castro and Manuel Madeira and Yiming Qin and Dorina Thanou and Pascal Frossard", "abstract": "Directed graphs naturally model systems with asymmetric, ordered relationships, essential to applications in biology, transportation, social networks, and visual understanding. Generating such graphs enables tasks such as simulation, data augmentation and novel instance discovery; however, directed graph generation remains underexplored. We identify two key factors limiting progress in this direction: first, modeling edge directionality introduces a substantially larger dependency space, making the underlying distribution harder to learn; second, the absence of standardized benchmarks hinders rigorous evaluation. Addressing the former requires more expressive models that are sensitive to directional topologies. We propose Directo, the first generative model for directed graphs built upon the discrete flow matching framework. Our approach combines: (i) principled positional encodings tailored to asymmetric pairwise relations, (ii) a dual-attention mechanism capturing both incoming and outgoing dependencies, and (iii) a robust, discrete generative framework. To support evaluation, we introduce a benchmark suite covering synthetic and real-world datasets. It shows that our method performs strongly across diverse settings and even competes with specialized models for particular classes, such as directed acyclic graphs. Our results highlight the effectiveness and generality of our approach, establishing a solid foundation for future research in directed graph generation.", "link": "http://arxiv.org/abs/2506.16404v3", "date": "2026-02-19", "relevancy": 2.1786, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5673}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.543}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5373}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generating%20Directed%20Graphs%20with%20Dual%20Attention%20and%20Asymmetric%20Encoding&body=Title%3A%20Generating%20Directed%20Graphs%20with%20Dual%20Attention%20and%20Asymmetric%20Encoding%0AAuthor%3A%20Alba%20Carballo-Castro%20and%20Manuel%20Madeira%20and%20Yiming%20Qin%20and%20Dorina%20Thanou%20and%20Pascal%20Frossard%0AAbstract%3A%20Directed%20graphs%20naturally%20model%20systems%20with%20asymmetric%2C%20ordered%20relationships%2C%20essential%20to%20applications%20in%20biology%2C%20transportation%2C%20social%20networks%2C%20and%20visual%20understanding.%20Generating%20such%20graphs%20enables%20tasks%20such%20as%20simulation%2C%20data%20augmentation%20and%20novel%20instance%20discovery%3B%20however%2C%20directed%20graph%20generation%20remains%20underexplored.%20We%20identify%20two%20key%20factors%20limiting%20progress%20in%20this%20direction%3A%20first%2C%20modeling%20edge%20directionality%20introduces%20a%20substantially%20larger%20dependency%20space%2C%20making%20the%20underlying%20distribution%20harder%20to%20learn%3B%20second%2C%20the%20absence%20of%20standardized%20benchmarks%20hinders%20rigorous%20evaluation.%20Addressing%20the%20former%20requires%20more%20expressive%20models%20that%20are%20sensitive%20to%20directional%20topologies.%20We%20propose%20Directo%2C%20the%20first%20generative%20model%20for%20directed%20graphs%20built%20upon%20the%20discrete%20flow%20matching%20framework.%20Our%20approach%20combines%3A%20%28i%29%20principled%20positional%20encodings%20tailored%20to%20asymmetric%20pairwise%20relations%2C%20%28ii%29%20a%20dual-attention%20mechanism%20capturing%20both%20incoming%20and%20outgoing%20dependencies%2C%20and%20%28iii%29%20a%20robust%2C%20discrete%20generative%20framework.%20To%20support%20evaluation%2C%20we%20introduce%20a%20benchmark%20suite%20covering%20synthetic%20and%20real-world%20datasets.%20It%20shows%20that%20our%20method%20performs%20strongly%20across%20diverse%20settings%20and%20even%20competes%20with%20specialized%20models%20for%20particular%20classes%2C%20such%20as%20directed%20acyclic%20graphs.%20Our%20results%20highlight%20the%20effectiveness%20and%20generality%20of%20our%20approach%2C%20establishing%20a%20solid%20foundation%20for%20future%20research%20in%20directed%20graph%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2506.16404v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerating%2520Directed%2520Graphs%2520with%2520Dual%2520Attention%2520and%2520Asymmetric%2520Encoding%26entry.906535625%3DAlba%2520Carballo-Castro%2520and%2520Manuel%2520Madeira%2520and%2520Yiming%2520Qin%2520and%2520Dorina%2520Thanou%2520and%2520Pascal%2520Frossard%26entry.1292438233%3DDirected%2520graphs%2520naturally%2520model%2520systems%2520with%2520asymmetric%252C%2520ordered%2520relationships%252C%2520essential%2520to%2520applications%2520in%2520biology%252C%2520transportation%252C%2520social%2520networks%252C%2520and%2520visual%2520understanding.%2520Generating%2520such%2520graphs%2520enables%2520tasks%2520such%2520as%2520simulation%252C%2520data%2520augmentation%2520and%2520novel%2520instance%2520discovery%253B%2520however%252C%2520directed%2520graph%2520generation%2520remains%2520underexplored.%2520We%2520identify%2520two%2520key%2520factors%2520limiting%2520progress%2520in%2520this%2520direction%253A%2520first%252C%2520modeling%2520edge%2520directionality%2520introduces%2520a%2520substantially%2520larger%2520dependency%2520space%252C%2520making%2520the%2520underlying%2520distribution%2520harder%2520to%2520learn%253B%2520second%252C%2520the%2520absence%2520of%2520standardized%2520benchmarks%2520hinders%2520rigorous%2520evaluation.%2 {"title": "Block-Recurrent Dynamics in Vision Transformers", "author": "Mozes Jacobs and Thomas Fel and Richard Hakim and Alessandra Brondetta and Demba Ba and T. Andy Keller", "abstract": "As Vision Transformers (ViTs) become standard vision backbones, a mechanistic account of their computational phenomenology is essential. Despite architectural cues that hint at dynamical structure, there is no settled framework that interprets Transformer depth as a well-characterized flow. In this work, we introduce the Block-Recurrent Hypothesis (BRH), arguing that trained ViTs admit a block-recurrent depth structure such that the computation of the original $L$ blocks can be accurately rewritten using only $k \\ll L$ distinct blocks applied recurrently. Across diverse ViTs, between-layer representational similarity matrices suggest few contiguous phases. To determine whether these phases reflect genuinely reusable computation, we train block-recurrent surrogates of pretrained ViTs: Recurrent Approximations to Phase-structured TransfORmers (Raptor). In small-scale, we demonstrate that stochastic depth and training promote recurrent structure and subsequently correlate with our ability to accurately fit Raptor. We then provide an empirical existence proof for BRH by training a Raptor model to recover $96\\%$ of DINOv2 ImageNet-1k linear probe accuracy in only 2 blocks at equivalent runtime. Finally, we leverage our hypothesis to develop a program of Dynamical Interpretability. We find i) directional convergence into class-dependent angular basins with self-correcting trajectories under small perturbations, ii) token-specific dynamics, where cls executes sharp late reorientations while patch tokens exhibit strong late-stage coherence toward their mean direction, and iii) a collapse to low rank updates in late depth, consistent with convergence to low-dimensional attractors. Altogether, we find a compact recurrent program emerges along ViT depth, pointing to a low-complexity normative solution that enables these models to be studied through principled dynamical systems analysis.", "link": "http://arxiv.org/abs/2512.19941v5", "date": "2026-02-19", "relevancy": 2.1686, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5854}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5335}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5335}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Block-Recurrent%20Dynamics%20in%20Vision%20Transformers&body=Title%3A%20Block-Recurrent%20Dynamics%20in%20Vision%20Transformers%0AAuthor%3A%20Mozes%20Jacobs%20and%20Thomas%20Fel%20and%20Richard%20Hakim%20and%20Alessandra%20Brondetta%20and%20Demba%20Ba%20and%20T.%20Andy%20Keller%0AAbstract%3A%20As%20Vision%20Transformers%20%28ViTs%29%20become%20standard%20vision%20backbones%2C%20a%20mechanistic%20account%20of%20their%20computational%20phenomenology%20is%20essential.%20Despite%20architectural%20cues%20that%20hint%20at%20dynamical%20structure%2C%20there%20is%20no%20settled%20framework%20that%20interprets%20Transformer%20depth%20as%20a%20well-characterized%20flow.%20In%20this%20work%2C%20we%20introduce%20the%20Block-Recurrent%20Hypothesis%20%28BRH%29%2C%20arguing%20that%20trained%20ViTs%20admit%20a%20block-recurrent%20depth%20structure%20such%20that%20the%20computation%20of%20the%20original%20%24L%24%20blocks%20can%20be%20accurately%20rewritten%20using%20only%20%24k%20%5Cll%20L%24%20distinct%20blocks%20applied%20recurrently.%20Across%20diverse%20ViTs%2C%20between-layer%20representational%20similarity%20matrices%20suggest%20few%20contiguous%20phases.%20To%20determine%20whether%20these%20phases%20reflect%20genuinely%20reusable%20computation%2C%20we%20train%20block-recurrent%20surrogates%20of%20pretrained%20ViTs%3A%20Recurrent%20Approximations%20to%20Phase-structured%20TransfORmers%20%28Raptor%29.%20In%20small-scale%2C%20we%20demonstrate%20that%20stochastic%20depth%20and%20training%20promote%20recurrent%20structure%20and%20subsequently%20correlate%20with%20our%20ability%20to%20accurately%20fit%20Raptor.%20We%20then%20provide%20an%20empirical%20existence%20proof%20for%20BRH%20by%20training%20a%20Raptor%20model%20to%20recover%20%2496%5C%25%24%20of%20DINOv2%20ImageNet-1k%20linear%20probe%20accuracy%20in%20only%202%20blocks%20at%20equivalent%20runtime.%20Finally%2C%20we%20leverage%20our%20hypothesis%20to%20develop%20a%20program%20of%20Dynamical%20Interpretability.%20We%20find%20i%29%20directional%20convergence%20into%20class-dependent%20angular%20basins%20with%20self-correcting%20trajectories%20under%20small%20perturbations%2C%20ii%29%20token-specific%20dynamics%2C%20where%20cls%20executes%20sharp%20late%20reorientations%20while%20patch%20tokens%20exhibit%20strong%20late-stage%20coherence%20toward%20their%20mean%20direction%2C%20and%20iii%29%20a%20collapse%20to%20low%20rank%20updates%20in%20late%20depth%2C%20consistent%20with%20convergence%20to%20low-dimensional%20attractors.%20Altogether%2C%20we%20find%20a%20compact%20recurrent%20program%20emerges%20along%20ViT%20depth%2C%20pointing%20to%20a%20low-complexity%20normative%20solution%20that%20enables%20these%20models%20to%20be%20studied%20through%20principled%20dynamical%20systems%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19941v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBlock-Recurrent%2520Dynamics%2520in%2520Vision%2520Transformers%26entry.906535625%3DMozes%2520Jacobs%2520and%2520Thomas%2520Fel%2520and%2520Richard%2520Hakim%2520and%2520Alessandra%2520Brondetta%2520and%2520Demba%2520Ba%2520and%2520T.%2520Andy%2520Keller%26entry.1292438233%3DAs%2520Vision {"title": "Leveraging Contrastive Learning for a Similarity-Guided Tampered Document Data Generation Pipeline", "author": "Mohamed Dhouib and Davide Buscaldi and Sonia Vanier and Aymen Shabou", "abstract": "Detecting tampered text in document images is a challenging task due to data scarcity. To address this, previous work has attempted to generate tampered documents using rule-based methods. However, the resulting documents often suffer from limited variety and poor visual quality, typically leaving highly visible artifacts that are rarely observed in real-world manipulations. This undermines the model's ability to learn robust, generalizable features and results in poor performance on real-world data. Motivated by this discrepancy, we propose a novel method for generating high-quality tampered document images. We first train an auxiliary network to compare text crops, leveraging contrastive learning with a novel strategy for defining positive pairs and their corresponding negatives. We also train a second auxiliary network to evaluate whether a crop tightly encloses the intended characters, without cutting off parts of characters or including parts of adjacent ones. Using a carefully designed generation pipeline that leverages both networks, we introduce a framework capable of producing diverse, high-quality tampered document images. We assess the effectiveness of our data generation pipeline by training multiple models on datasets derived from the same source images, generated using our method and existing approaches, under identical training protocols. Evaluating these models on various open-source datasets shows that our pipeline yields consistent performance improvements across architectures and datasets.", "link": "http://arxiv.org/abs/2602.17322v1", "date": "2026-02-19", "relevancy": 2.1621, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5416}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5409}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5393}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20Contrastive%20Learning%20for%20a%20Similarity-Guided%20Tampered%20Document%20Data%20Generation%20Pipeline&body=Title%3A%20Leveraging%20Contrastive%20Learning%20for%20a%20Similarity-Guided%20Tampered%20Document%20Data%20Generation%20Pipeline%0AAuthor%3A%20Mohamed%20Dhouib%20and%20Davide%20Buscaldi%20and%20Sonia%20Vanier%20and%20Aymen%20Shabou%0AAbstract%3A%20Detecting%20tampered%20text%20in%20document%20images%20is%20a%20challenging%20task%20due%20to%20data%20scarcity.%20To%20address%20this%2C%20previous%20work%20has%20attempted%20to%20generate%20tampered%20documents%20using%20rule-based%20methods.%20However%2C%20the%20resulting%20documents%20often%20suffer%20from%20limited%20variety%20and%20poor%20visual%20quality%2C%20typically%20leaving%20highly%20visible%20artifacts%20that%20are%20rarely%20observed%20in%20real-world%20manipulations.%20This%20undermines%20the%20model%27s%20ability%20to%20learn%20robust%2C%20generalizable%20features%20and%20results%20in%20poor%20performance%20on%20real-world%20data.%20Motivated%20by%20this%20discrepancy%2C%20we%20propose%20a%20novel%20method%20for%20generating%20high-quality%20tampered%20document%20images.%20We%20first%20train%20an%20auxiliary%20network%20to%20compare%20text%20crops%2C%20leveraging%20contrastive%20learning%20with%20a%20novel%20strategy%20for%20defining%20positive%20pairs%20and%20their%20corresponding%20negatives.%20We%20also%20train%20a%20second%20auxiliary%20network%20to%20evaluate%20whether%20a%20crop%20tightly%20encloses%20the%20intended%20characters%2C%20without%20cutting%20off%20parts%20of%20characters%20or%20including%20parts%20of%20adjacent%20ones.%20Using%20a%20carefully%20designed%20generation%20pipeline%20that%20leverages%20both%20networks%2C%20we%20introduce%20a%20framework%20capable%20of%20producing%20diverse%2C%20high-quality%20tampered%20document%20images.%20We%20assess%20the%20effectiveness%20of%20our%20data%20generation%20pipeline%20by%20training%20multiple%20models%20on%20datasets%20derived%20from%20the%20same%20source%20images%2C%20generated%20using%20our%20method%20and%20existing%20approaches%2C%20under%20identical%20training%20protocols.%20Evaluating%20these%20models%20on%20various%20open-source%20datasets%20shows%20that%20our%20pipeline%20yields%20consistent%20performance%20improvements%20across%20architectures%20and%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17322v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeveraging%2520Contrastive%2520Learning%2520for%2520a%2520Similarity-Guided%2520Tampered%2520Document%2520Data%2520Generation%2520Pipeline%26entry.906535625%3DMohamed%2520Dhouib%2520and%2520Davide%2520Buscaldi%2520and%2520Sonia%2520Vanier%2520and%2520Aymen%2520Shabou%26entry.1292438233%3DDetecting%2520tampered%2520text%2520in%2520document%2520images%2520is%2520a%2520challenging%2520task%2520due%2520to%2520data%2520scarcity.%2520To%2520address%2520this%252C%2520previous%2520work%2520has%2520attempted%2520to%2520generate%2520tampered%2520documents%2520using%2520rule-based%2520methods.%2520However%252C%2520the%2520resulting%2520documents%2520often%2520suffer%2520from%2520limited%2520variety%2520and%2520poor%2520visual%2520quality%252C%2520typically%2520leaving%2520highly%2520visible%2520artifacts%2520that%2520are%2520rarely%2520observed%2520in%2520real-world%2520manipulations.%2520This%2520undermines%2520the%2520model%2527s%2520ability%2520to%2520learn%2520robust%252C%2520generalizable%2520features%2520and%2520results%2520in%2520poor%2520performance%2520on%2520real-world%2520data.%2520Motivated%2520by%25 {"title": "Accelerating Large-Scale Dataset Distillation via Exploration-Exploitation Optimization", "author": "Muhammad J. Alahmadi and Peng Gao and Feiyi Wang and Dongkuan Xu", "abstract": "Dataset distillation compresses the original data into compact synthetic datasets, reducing training time and storage while retaining model performance, enabling deployment under limited resources. Although recent decoupling-based distillation methods enable dataset distillation at large scale, they continue to face an efficiency gap: optimization-based decoupling methods achieve higher accuracy but demand intensive computation, whereas optimization-free decoupling methods are efficient but sacrifice accuracy. To overcome this trade-off, we propose Exploration--Exploitation Distillation (E$^2$D), a simple, practical method that minimizes redundant computation through an efficient pipeline that begins with full-image initialization to preserve semantic integrity and feature diversity. It then uses a two-phase optimization strategy: an exploration phase that performs uniform updates and identifies high-loss regions, and an exploitation phase that focuses updates on these regions to accelerate convergence. We evaluate E$^2$D on large-scale benchmarks, surpassing the state-of-the-art on ImageNet-1K while being $18\\times$ faster, and on ImageNet-21K, our method substantially improves accuracy while remaining $4.3\\times$ faster. These results demonstrate that targeted, redundancy-reducing updates, rather than brute-force optimization, bridge the gap between accuracy and efficiency in large-scale dataset distillation. Code is available at https://github.com/ncsu-dk-lab/E2D.", "link": "http://arxiv.org/abs/2602.15277v2", "date": "2026-02-19", "relevancy": 2.1574, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5627}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5392}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5301}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Accelerating%20Large-Scale%20Dataset%20Distillation%20via%20Exploration-Exploitation%20Optimization&body=Title%3A%20Accelerating%20Large-Scale%20Dataset%20Distillation%20via%20Exploration-Exploitation%20Optimization%0AAuthor%3A%20Muhammad%20J.%20Alahmadi%20and%20Peng%20Gao%20and%20Feiyi%20Wang%20and%20Dongkuan%20Xu%0AAbstract%3A%20Dataset%20distillation%20compresses%20the%20original%20data%20into%20compact%20synthetic%20datasets%2C%20reducing%20training%20time%20and%20storage%20while%20retaining%20model%20performance%2C%20enabling%20deployment%20under%20limited%20resources.%20Although%20recent%20decoupling-based%20distillation%20methods%20enable%20dataset%20distillation%20at%20large%20scale%2C%20they%20continue%20to%20face%20an%20efficiency%20gap%3A%20optimization-based%20decoupling%20methods%20achieve%20higher%20accuracy%20but%20demand%20intensive%20computation%2C%20whereas%20optimization-free%20decoupling%20methods%20are%20efficient%20but%20sacrifice%20accuracy.%20To%20overcome%20this%20trade-off%2C%20we%20propose%20Exploration--Exploitation%20Distillation%20%28E%24%5E2%24D%29%2C%20a%20simple%2C%20practical%20method%20that%20minimizes%20redundant%20computation%20through%20an%20efficient%20pipeline%20that%20begins%20with%20full-image%20initialization%20to%20preserve%20semantic%20integrity%20and%20feature%20diversity.%20It%20then%20uses%20a%20two-phase%20optimization%20strategy%3A%20an%20exploration%20phase%20that%20performs%20uniform%20updates%20and%20identifies%20high-loss%20regions%2C%20and%20an%20exploitation%20phase%20that%20focuses%20updates%20on%20these%20regions%20to%20accelerate%20convergence.%20We%20evaluate%20E%24%5E2%24D%20on%20large-scale%20benchmarks%2C%20surpassing%20the%20state-of-the-art%20on%20ImageNet-1K%20while%20being%20%2418%5Ctimes%24%20faster%2C%20and%20on%20ImageNet-21K%2C%20our%20method%20substantially%20improves%20accuracy%20while%20remaining%20%244.3%5Ctimes%24%20faster.%20These%20results%20demonstrate%20that%20targeted%2C%20redundancy-reducing%20updates%2C%20rather%20than%20brute-force%20optimization%2C%20bridge%20the%20gap%20between%20accuracy%20and%20efficiency%20in%20large-scale%20dataset%20distillation.%20Code%20is%20available%20at%20https%3A//github.com/ncsu-dk-lab/E2D.%0ALink%3A%20http%3A//arxiv.org/abs/2602.15277v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAccelerating%2520Large-Scale%2520Dataset%2520Distillation%2520via%2520Exploration-Exploitation%2520Optimization%26entry.906535625%3DMuhammad%2520J.%2520Alahmadi%2520and%2520Peng%2520Gao%2520and%2520Feiyi%2520Wang%2520and%2520Dongkuan%2520Xu%26entry.1292438233%3DDataset%2520distillation%2520compresses%2520the%2520original%2520data%2520into%2520compact%2520synthetic%2520datasets%252C%2520reducing%2520training%2520time%2520and%2520storage%2520while%2520retaining%2520model%2520performance%252C%2520enabling%2520deployment%2520under%2520limited%2520resources.%2520Although%2520recent%2520decoupling-based%2520distillation%2520methods%2520enable%2520dataset%2520distillation%2520at%2520large%2520scale%252C%2520they%2520continue%2520to%2520face%2520an%2520efficiency%2520gap%253A%2520optimization-based%2520decoupling%2520methods%2520achieve%2520higher%2520accuracy%2520but%2520demand%2520intensive%2520computation%252C%2520whereas%2520optimization-free%2520decoupling%2520methods%2520are%2520efficient%2520but%2520sacrifice%2520accuracy.%2520To%2520overcome%2520this%2520trade-off%252C%2520we%2520propose%2520Exploration--Exploitation%2520Distillation%2520%2528E%2524%255E2%2524D%2529%252C%2520a%2520simple%252C%2520practical%2520method%2520that%2520minimizes%2520redundant% {"title": "Adapting Actively on the Fly: Relevance-Guided Online Meta-Learning with Latent Concepts for Geospatial Discovery", "author": "Jowaria Khan and Anindya Sarkar and Yevgeniy Vorobeychik and Elizabeth Bondi-Kelly", "abstract": "In many real-world settings, such as environmental monitoring, disaster response, or public health, with costly and difficult data collection and dynamic environments, strategically sampling from unobserved regions is essential for efficiently uncovering hidden targets under tight resource constraints. Yet, sparse and biased geospatial ground truth limits the applicability of existing learning-based methods, such as reinforcement learning. To address this, we propose a unified geospatial discovery framework that integrates active learning, online meta-learning, and concept-guided reasoning. Our approach introduces two key innovations built on a shared notion of *concept relevance*, which captures how domain-specific factors influence target presence: a *concept-weighted uncertainty sampling strategy*, where uncertainty is modulated by learned relevance based on readily-available domain-specific concepts (e.g., land cover, source proximity); and a *relevance-aware meta-batch formation strategy* that promotes semantic diversity during online-meta updates, improving generalization in dynamic environments. Our experiments include testing on a real-world dataset of cancer-causing PFAS (Per- and polyfluoroalkyl substances) contamination, showcasing our method's reliability at uncovering targets with limited data and a varying environment.", "link": "http://arxiv.org/abs/2602.17605v1", "date": "2026-02-19", "relevancy": 2.152, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.56}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.or {"title": "When Vision Overrides Language: Evaluating and Mitigating Counterfactual Failures in VLAs", "author": "Yu Fang and Yuchun Feng and Dong Jing and Jiaqi Liu and Yue Yang and Zhenyu Wei and Daniel Szafir and Mingyu Ding", "abstract": "Vision-Language-Action models (VLAs) promise to ground language instructions in robot control, yet in practice often fail to faithfully follow language. When presented with instructions that lack strong scene-specific supervision, VLAs suffer from counterfactual failures: they act based on vision shortcuts induced by dataset biases, repeatedly executing well-learned behaviors and selecting objects frequently seen during training regardless of language intent. To systematically study it, we introduce LIBERO-CF, the first counterfactual benchmark for VLAs that evaluates language following capability by assigning alternative instructions under visually plausible LIBERO layouts. Our evaluation reveals that counterfactual failures are prevalent yet underexplored across state-of-the-art VLAs. We propose Counterfactual Action Guidance (CAG), a simple yet effective dual-branch inference scheme that explicitly regularizes language conditioning in VLAs. CAG combines a standard VLA policy with a language-unconditioned Vision-Action (VA) module, enabling counterfactual comparison during action selection. This design reduces reliance on visual shortcuts, improves robustness on under-observed tasks, and requires neither additional demonstrations nor modifications to existing architectures or pretrained models. Extensive experiments demonstrate its plug-and-play integration across diverse VLAs and consistent improvements. For example, on LIBERO-CF, CAG improves $\u03c0_{0.5}$ by 9.7% in language following accuracy and 3.6% in task success on under-observed tasks using a training-free strategy, with further gains of 15.5% and 8.5%, respectively, when paired with a VA model. In real-world evaluations, CAG reduces counterfactual failures of 9.4% and improves task success by 17.2% on average.", "link": "http://arxiv.org/abs/2602.17659v1", "date": "2026-02-19", "relevancy": 2.1443, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5396}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5396}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5182}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Vision%20Overrides%20Language%3A%20Evaluating%20and%20Mitigating%20Counterfactual%20Failures%20in%20VLAs&body=Title%3A%20When%20Vision%20Overrides%20Language%3A%20Evaluating%20and%20Mitigating%20Counterfactual%20Failures%20in%20VLAs%0AAuthor%3A%20Yu%20Fang%20and%20Yuchun%20Feng%20and%20Dong%20Jing%20and%20Jiaqi%20Liu%20and%20Yue%20Yang%20and%20Zhenyu%20Wei%20and%20Daniel%20Szafir%20and%20Mingyu%20Ding%0AAbstract%3A%20Vision-Language-Action%20models%20%28VLAs%29%20promise%20to%20ground%20language%20instructions%20in%20robot%20control%2C%20yet%20in%20practice%20often%20fail%20to%20faithfully%20follow%20language.%20When%20presented%20with%20instructions%20that%20lack%20strong%20scene-specific%20supervision%2C%20VLAs%20suffer%20from%20counterfactual%20failures%3A%20they%20act%20based%20on%20vision%20shortcuts%20induced%20by%20dataset%20biases%2C%20repeatedly%20executing%20well-learned%20behaviors%20and%20selecting%20objects%20frequently%20seen%20during%20training%20regardless%20of%20language%20intent.%20To%20systematically%20study%20it%2C%20we%20introduce%20LIBERO-CF%2C%20the%20first%20counterfactual%20benchmark%20for%20VLAs%20that%20evaluates%20language%20following%20capability%20by%20assigning%20alternative%20instructions%20under%20visually%20plausible%20LIBERO%20layouts.%20Our%20evaluation%20reveals%20that%20counterfactual%20failures%20are%20prevalent%20yet%20underexplored%20across%20state-of-the-art%20VLAs.%20We%20propose%20Counterfactual%20Action%20Guidance%20%28CAG%29%2C%20a%20simple%20yet%20effective%20dual-branch%20inference%20scheme%20that%20explicitly%20regularizes%20language%20conditioning%20in%20VLAs.%20CAG%20combines%20a%20standard%20VLA%20policy%20with%20a%20language-unconditioned%20Vision-Action%20%28VA%29%20module%2C%20enabling%20counterfactual%20comparison%20during%20action%20selection.%20This%20design%20reduces%20reliance%20on%20visual%20shortcuts%2C%20improves%20robustness%20on%20under-observed%20tasks%2C%20and%20requires%20neither%20additional%20demonstrations%20nor%20modifications%20to%20existing%20architectures%20or%20pretrained%20models.%20Extensive%20experiments%20demonstrate%20its%20plug-and-play%20integration%20across%20diverse%20VLAs%20and%20consistent%20improvements.%20For%20example%2C%20on%20LIBERO-CF%2C%20CAG%20improves%20%24%CF%80_%7B0.5%7D%24%20by%209.7%25%20in%20language%20following%20accuracy%20and%203.6%25%20in%20task%20success%20on%20under-observed%20tasks%20using%20a%20training-free%20strategy%2C%20with%20further%20gains%20of%2015.5%25%20and%208.5%25%2C%20respectively%2C%20when%20paired%20with%20a%20VA%20model.%20In%20real-world%20evaluations%2C%20CAG%20reduces%20counterfactual%20failures%20of%209.4%25%20and%20improves%20task%20success%20by%2017.2%25%20on%20average.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17659v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Vision%2520Overrides%2520Language%253A%2520Evaluating%2520and%2520Mitigating%2520Counterfactual%2520Failures%2520in%2520VLAs%26entry.906535625%3DYu%2520Fang%2520and%2520Yuchun%2520Feng%2520and%2520Dong%2520Jing%2520and%2520Jiaqi%2520Liu%2520and%2520Yue%2520Yang%2520and%2520Zhenyu%2520Wei%2520and%2520Daniel%2520Szafir%2520and%2520Min {"title": "Fine-Grained Uncertainty Quantification for Long-Form Language Model Outputs: A Comparative Study", "author": "Dylan Bouchard and Mohit Singh Chauhan and Viren Bajaj and David Skarbrevik", "abstract": "Uncertainty quantification has emerged as an effective approach to closed-book hallucination detection for LLMs, but existing methods are largely designed for short-form outputs and do not generalize well to long-form generation. We introduce a taxonomy for fine-grained uncertainty quantification in long-form LLM outputs that distinguishes methods by design choices at three stages: response decomposition, unit-level scoring, and response-level aggregation. We formalize several families of consistency-based black-box scorers, providing generalizations and extensions of existing methods. In our experiments across multiple LLMs and datasets, we find 1) claim-response entailment consistently performs better or on par with more complex claim-level scorers, 2) claim-level scoring generally yields better results than sentence-level scoring, and 3) uncertainty-aware decoding is highly effective for improving the factuality of long-form outputs. Our framework clarifies relationships between prior methods, enables apples-to-apples comparisons, and provides practical guidance for selecting components for fine-grained UQ.", "link": "http://arxiv.org/abs/2602.17431v1", "date": "2026-02-19", "relevancy": 2.1441, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5875}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5354}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http %2520enables%2520apples-to-apples%2520comparisons%252C%2520and%2520provides%2520practical%2520guidance%2520for%2520selecting%2520components%2520for%2520fine-grained%2520UQ.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17431v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Fine-Grained%20Uncertainty%20Quantification%20for%20Long-Form%20Language%20Model%20Outputs%3A%20A%20Comparative%20Study&entry.906535625=Dylan%20Bouchard%20and%20Mohit%20Singh%20Chauhan%20and%20Viren%20Bajaj%20and%20David%20Skarbrevik&entry.1292438233=Uncertainty%20quantification%20has%20emerged%20as%20an%20effective%20approach%20to%20closed-book%20hallucination%20detection%20for%20LLMs%2C%20but%20existing%20methods%20are%20largely%20designed%20for%20short-form%20outputs%20and%20do%20not%20generalize%20well%20to%20long-form%20generation.%20We%20introduce%20a%20taxonomy%20for%20fine-grained%20uncertainty%20quantification%20in%20long-form%20LLM%20outputs%20that%20distinguishes%20methods%20by%20design%20choices%20at%20three%20stages%3A%20response%20decomposition%2C%20unit-level%20scoring%2C%20and%20response-level%20aggregation.%20We%20formalize%20several%20families%20of%20consistency-based%20black-box%20scorers%2C%20providing%20generalizations%20and%20extensions%20of%20existing%20methods.%20In%20our%20experiments%20across%20multiple%20LLMs%20and%20datasets%2C%20we%20find%201%29%20claim-response%20entailment%20consistently%20performs%20better%20or%20on%20par%20with%20more%20complex%20claim-level%20scorers%2C%202%29%20claim-level%20scoring%20generally%20yields%20better%20results%20than%20sentence-level%20scoring%2C%20and%203%29%20uncertainty-aware%20decoding%20is%20highly%20effective%20for%20improving%20the%20factuality%20of%20long-form%20outputs.%20Our%20framework%20clarifies%20relationships%20between%20prior%20methods%2C%20enables%20apples-to-apples%20comparisons%2C%20and%20provides%20practic {"title": "Distributed Virtual Model Control for Scalable Human-Robot Collaboration in Shared Workspace", "author": "Yi Zhang and Omar Faris and Chapa Sirithunge and Kai-Fung Chu and Fumiya Iida and Fulvio Forni", "abstract": "We present a decentralized, agent agnostic, and safety-aware control framework for human-robot collaboration based on Virtual Model Control (VMC). In our approach, both humans and robots are embedded in the same virtual-component-shaped workspace, where motion is the result of the interaction with virtual springs and dampers rather than explicit trajectory planning. A decentralized, force-based stall detector identifies deadlocks, which are resolved through negotiation. This reduces the probability of robots getting stuck in the block placement task from up to 61.2% to zero in our experiments. The framework scales without structural changes thanks to the distributed implementation: in experiments we demonstrate safe collaboration with up to two robots and two humans, and in simulation up to four robots, maintaining inter-agent separation at around 20 cm. Results show that the method shapes robot behavior intuitively by adjusting control parameters and achieves deadlock-free operation across team sizes in all tested scenarios.", "link": "http://arxiv.org/abs/2602.17415v1", "date": "2026-02-19", "relevancy": 2.1378, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5489}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5347}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5199}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Distributed%20Virtual%20Model%20Control%20for%20Scalable%20Human-Robot%20Collabora {"title": "Graph Neural Model Predictive Control for High-Dimensional Systems", "author": "Patrick Benito Eberhard and Luis Pabon and Daniele Gammelli and Hugo Buurmeijer and Amon Lahr and Mark Leone and Andrea Carron and Marco Pavone", "abstract": "The control of high-dimensional systems, such as soft robots, requires models that faithfully capture complex dynamics while remaining computationally tractable. This work presents a framework that integrates Graph Neural Network (GNN)-based dynamics models with structure-exploiting Model Predictive Control to enable real-time control of high-dimensional systems. By representing the system as a graph with localized interactions, the GNN preserves sparsity, while a tailored condensing algorithm eliminates state variables from the control problem, ensuring efficient computation. The complexity of our condensing algorithm scales linearly with the number of system nodes, and leverages Graphics Processing Unit (GPU) parallelization to achieve real-time performance. The proposed approach is validated in simulation and experimentally on a physical soft robotic trunk. Results show that our method scales to systems with up to 1,000 nodes at 100 Hz in closed-loop, and demonstrates real-time reference tracking on hardware with sub-centimeter accuracy, outperforming baselines by 63.6%. Finally, we show the capability of our method to achieve effective full-body obstacle avoidance.", "link": "http://arxiv.org/abs/2602.17601v1", "date": "2026-02-19", "relevancy": 2.1266, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5327}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5312}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5308}], e.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17601v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph%2520Neural%2520Model%2520Predictive%2520Control%2520for%2520High-Dimensional%2520Systems%26entry.906535625%3DPatrick%2520Benito%2520Eberhard%2520and%2520Luis%2520Pabon%2520and%2520Daniele%2520Gammelli%2520and%2520Hugo%2520Buurmeijer%2520and%2520Amon%2520Lahr%2520and%2520Mark%2520Leone%2520and%2520Andrea%2520Carron%2520and%2520Marco%2520Pavone%26entry.1292438233%3DThe%2520control%2520of%2520high-dimensional%2520systems%252C%2520such%2520as%2520soft%2520robots%252C%2520requires%2520models%2520that%2520faithfully%2520capture%2520complex%2520dynamics%2520while%2520remaining%2520computationally%2520tractable.%2520This%2520work%2520presents%2520a%2520framework%2520that%2520integrates%2520Graph%2520Neural%2520Network%2520%2528GNN%2529-based%2520dynamics%2520models%2520with%2520structure-exploiting%2520Model%2520Predictive%2520Control%2520to%2520enable%2520real-time%2520control%2520of%2520high-dimensional%2520systems.%2520By%2520representing%2520the%2520system%2520as%2520a%2520graph%2520with%2520localized%2520interactions%252C%2520the%2520GNN%2520preserves%2520sparsity%252C%2520while%2520a%2520tailored%2520condensing%2520algorithm%2520eliminates%2520state%2520variables%2520from%2520the%2520control%2520problem%252C%2520ensuring%2520efficient%2520computation.%2520The%2520complexity%2520of%2520our%2520condensing%2520algorithm%2520scales%2520linearly%2520with%2520the%2520number%2520of%2520system%2520nodes%252C%2520and%2520leverages%2520Graphics%2520Processing%2520Unit%2520%2528GPU%2529%2520parallelization%2520to%2520achieve%2520real-time%2520performance.%2520The%2520proposed%2520approach%2520is%2520validated%2520in%2520simulation%2520and%2520experimentally%2520on%2520a%2520physical%2520soft%2520robotic%2520trunk.%2520Results%2520show%2520that%2520our%2520method%2520scales%2520to%2520systems%2520with%2520up%2520to%25201%252C000%2520nodes%2520at%2520100%2520Hz%2520in%2520closed-loop%252C%2520and%2520demonstrates%2520real-time%2520reference%2520tracking%2520on%2520hardware%2520with%2520sub-centimeter%2520accuracy%252C%2520outperforming%2520baselines%2520by%252063.6%2525.%2520Finally%252C%2520we%2520show%2520the%2520capability%2520of%2520our%2520method%2520to%2520achieve%2520effective%2520full-body%2520obstacle%2520avoidance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17601v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Graph%20Neural%20Model%20Predictive%20Control%20for%20High-Dimensional%20Systems&entry.906535625=Patrick%20Benito%20Eberhard%20and%20Luis%20Pabon%20and%20Daniele%20Gammelli%20and%20Hugo%20Buurmeijer%20and%20Amon%20Lahr%20and%20Mark%20Leone%20and%20Andrea%20Carron%20and%20Marco%20Pavone&entry.1292438233=The%20control%20of%20high-dimensional%20systems%2C%20such%20as%20soft%20robots%2C%20requires%20models%20that%20faithfully%20capture%20complex%20dynamics%20while%20remaining%20computationally%20tractable.%20This%20work%20presents%20a%20framework%20that%20integrates%20Graph%20Neural%20Network%20%28GNN%29-based%20dynamics%20models%20with%20structure-exploiting%20Model%20Predictive%20Control%20to%20enable%20real-time%20control%20of%20high-dimensional%20systems.%20By%20representing%20the%20system%20as%20a%20graph%20with%20localized%20interactions%2C%20the%20GNN%20preserves%20sparsity%2C%20while%20a%20tailored%20condensing%20algorithm%20eliminates%20state%20variables%20from%20the%20control%20problem%2C%20ensuring%20efficient%20computation.%20The%20complexity%20of%20our%20condensing%20algorithm%20scales%20linearly%20with%20the%20number%20of%20system%20nodes%2C%20and%20leverages%20Graphics%20Processing%20Unit%20%28GPU%29%20parallelization%20to%20achieve%20real-time%20performance.%20The%20proposed%20approach%20is%20validated%20in%20sim {"title": "Physics Encoded Spatial and Temporal Generative Adversarial Network for Tropical Cyclone Image Super-resolution", "author": "Ruoyi Zhang and Jiawei Yuan and Lujia Ye and Runling Yu and Liling Zhao", "abstract": "High-resolution satellite imagery is indispensable for tracking the genesis, intensification, and trajectory of tropical cyclones (TCs). However, existing deep learning-based super-resolution (SR) methods often treat satellite image sequences as generic videos, neglecting the underlying atmospheric physical laws governing cloud motion. To address this, we propose a Physics Encoded Spatial and Temporal Generative Adversarial Network (PESTGAN) for TC image super-resolution. Specifically, we design a disentangled generator architecture incorporating a PhyCell module, which approximates the vorticity equation via constrained convolutions and encodes the resulting approximate physical dynamics as implicit latent representations to separate physical dynamics from visual textures. Furthermore, a dual-discriminator framework is introduced, employing a temporal discriminator to enforce motion consistency alongside spatial realism. Experiments on the Digital Typhoon dataset for 4$\\times$ upscaling demonstrate that PESTGAN establishes a better performance in structural fidelity and perceptual quality. While maintaining competitive pixel-wise accuracy compared to existing approaches, our method significantly excels in reconstructing meteorologically plausible cloud structures with superior physical fidelity.", "link": "http://arxiv.org/abs/2602.17277v1", "date": "2026-02-19", "relevancy": 2.1197, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5633}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.521}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5001}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physics%20Encoded%20Spatial%20and%20Temporal%20Generative%20Adversarial%20Network%20for%20Tropical%20Cyclone%20Image%20Super-resolution&body=Title%3A%20Physics%20Encoded%20Spatial%20and%20Temporal%20Generative%20Adversarial%20Network%20for%20Tropical%20Cyclone%20Image%20Super-resolution%0AAuthor%3A%20Ruoyi%20Zhang%20and%20Jiawei%20Yuan%20and%20Lujia%20Ye%20and%20Runling%20Yu%20and%20Liling%20Zhao%0AAbstract%3A%20High-resolution%20satellite%20imagery%20is%20indispensable%20for%20tracking%20the%20genesis%2C%20intensification%2C%20and%20trajectory%20of%20tropical%20cyclones%20%28TCs%29.%20However%2C%20existing%20deep%20learning-based%20super-resolution%20%28SR%29%20methods%20often%20treat%20satellite%20image%20sequences%20as%20generic%20videos%2C%20neglecting%20the%20underlying%20atmospheric%20physical%20laws%20governing%20cloud%20motion.%20To%20address%20this%2C%20we%20propose%20a%20Physics%20Encoded%20Spatial%20and%20Temporal%20Generative%20Adversarial%20Network%20%28PESTGAN%29%20for%20TC%20image%20super-resolution.%20Specifically%2C%20we%20design%20a%20disentangled%20generator%20architecture%20incorporating%20a%20PhyCell%20module%2C%20which%20approximates%20the%20vorticity%20equation%20via%20constrained%20convolutions%20and%20encodes%20the%20resulting%20approximate%20physical%20dynamics%20as%20implicit%20latent%20representations%20to%20separate%20physical%20dynamics%20from%20visual%20textures.%20Furthermore%2C%20a%20dual-discriminator%20framework%20is%20introduced%2C%20employing%20a%20temporal%20discriminator%20to%20enforce%20motion%20consistency%20alongside%20spatial%20realism.%20Experiments%20on%20the%20Digital%20Typhoon%20dataset%20for%204%24%5Ctimes%24%20upscaling%20demonstrate%20that%20PESTGAN%20establishes%20a%20better%20performance%20in%20structural%20fidelity%20and%20perceptual%20quality.%20While%20maintaining%20competitive%20pixel-wise%20accuracy%20compared%20to%20existing%20approaches%2C%20our%20method%20significantly%20excels%20in%20reconstructing%20meteorologically%20plausible%20cloud%20structures%20with%20superior%20physical%20fidelity.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17277v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysics%2520Encoded%2520Spatial%2520and%2520Temporal%2520Generative%2520Adversarial%2520Network%2520for%2520Tropical%2520Cyclone%2520Image%2520Super-resolution%26entry.906535625%3DRuoyi%2520Zhang%2520and%2520Jiawei%2520Yuan%2520and%2520Lujia%2520Ye%2520and%2520Runling%2520Yu%2520and%2520Liling%2520Zhao%26entry.1292438233%3DHigh-resolution%2520satellite%2520imagery%2520is%2520indispensable%2520for%2520tracking%2520the%2520genesis%252C%2520intensification%252C%2520and%2520trajectory%2520of%2520tropical%2520cyclones%2520%2528TCs%2529.%2520However%252C%2520existing%2520deep%2520learning-based%2520super-resolution%2520%2528SR%2529%2520methods%2520often%2520treat%2520satellite%2520image%2520sequences%2520as%2520generic%2520videos%252C%2520neglecting%2520the%2520underlying%2520atmospheric%2520physical%2520laws%2520governing%2520cloud%2520motion.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520Physics%2520Encoded%2520Spatial%2520and%2520Temporal%2520Generative%2520Adversarial%2520Network%2520%2528PESTGAN%2529%2520for%2520TC%2520image%2520super-resolution.%2520Specifically%252C%2520we%2520design%2520a%2520disentangled%2520generator%2520architecture%2520incorporating%2520a%2520PhyCell%2520module%252C%2520which%2520approximates%2520the%2520vorticity%2520equation%2520via%2520constrained%2520convolutions%2520and%2520encodes%2520the%2520resulting%2520approximate%2520physical%2520dynamics%2520as%2520implicit%2520latent%2520representations%2520to%2520separate%2520physical%2520dynamics%2520from%2520visual%2520textures.%2520Furthermore%252C%25 {"title": "CT-Bench: A Benchmark for Multimodal Lesion Understanding in Computed Tomography", "author": "Qingqing Zhu and Qiao Jin and Tejas S. Mathai and Yin Fang and Zhizheng Wang and Yifan Yang and Maame Sarfo-Gyamfi and Benjamin Hou and Ran Gu and Praveen T. S. Balamuralikrishna and Kenneth C. Wang and Ronald M. Summers and Zhiyong Lu", "abstract": "Artificial intelligence (AI) can automatically delineate lesions on computed tomography (CT) and generate radiology report content, yet progress is limited by the scarcity of publicly available CT datasets with lesion-level annotations. To bridge this gap, we introduce CT-Bench, a first-of-its-kind benchmark dataset comprising two components: a Lesion Image and Metadata Set containing 20,335 lesions from 7,795 CT studies with bounding boxes, descriptions, and size information, and a multitask visual question answering benchmark with 2,850 QA pairs covering lesion localization, description, size estimation, and attribute categorization. Hard negative examples are included to reflect real-world diagnostic challenges. We evaluate multiple state-of-the-art multimodal models, including vision-language and medical CLIP variants, by comparing their performance to radiologist assessments, demonstrating the value of CT-Bench as a comprehensive benchmark for lesion analysis. Moreover, fine-tuning models on the Lesion Image and Metadata Set yields significant performance gains across both components, underscoring the clinical utility of CT-Bench.", "link": "http://arxiv.org/abs/2602.14879v2", "date": "2026-02-19", "relevancy": 2.1162, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5349}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5285}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Cert-SSBD: Certified Backdoor Defense with Sample-Specific Smoothing Noises", "author": "Ting Qiao and Yingjia Wang and Xing Liu and Sixing Wu and Jianbin Li and Yiming Li", "abstract": "Deep neural networks (DNNs) are vulnerable to backdoor attacks, where an attacker manipulates a small portion of the training data to implant hidden backdoors into the model. The compromised model behaves normally on clean samples but misclassifies backdoored samples into the attacker-specified target class, posing a significant threat to real-world DNN applications. Currently, several empirical defense methods have been proposed to mitigate backdoor attacks, but they are often bypassed by more advanced backdoor techniques. In contrast, certified defenses based on randomized smoothing have shown promise by adding random noise to training and testing samples to counteract backdoor attacks. In this paper, we reveal that existing randomized smoothing defenses implicitly assume that all samples are equidistant from the decision boundary. However, it may not hold in practice, leading to suboptimal certification performance. To address this issue, we propose a sample-specific certified backdoor defense method, termed Cert-SSB. Cert-SSB first employs stochastic gradient ascent to optimize the noise magnitude for each sample, ensuring a sample-specific noise level that is then applied to multiple poisoned training sets to retrain several smoothed models. After that, Cert-SSB aggregates the predictions of multiple smoothed models to generate the final robust prediction. In particular, in this case, existing certification methods become inapplicable since the optimized noise varies across different samples. To conquer this challenge, we introduce a storage-update-based certification method, which dynamically adjusts each sample's certification region to improve certification performance. We conduct extensive experiments on multiple benchmark datasets, demonstrating the effectiveness of our proposed method. Our code is available at https://github.com/NcepuQiaoTing/Cert-SSB.", "link": "http://arxiv.org/abs/2504.21730v2", "date": "2026-02-19", "relevancy": 2.1136, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5404}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5385}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4731}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cert-SSBD%3A%20Certified%20Backdoor%20Defense%20with%20Sample-Specific%20Smoothing%20Noises&body=Title%3A%20Cert-SSBD%3A%20Certified%20Backdoor%20Defense%20with%20Sample-Specific%20Smoothing%20Noises%0AAuthor%3A%20Ting%20Qiao%20and%20Yingjia%20Wang%20and%20Xing%20Liu%20and%20Sixing%20Wu%20and%20Jianbin%20Li%20and%20Yiming%20Li%0AAbstract%3A%20Deep%20neural%20networks%20%28DNNs%29%20are%20vulnerable%20to%20backdoor%20attacks%2C%20where%20an%20attacker%20manipulates%20a%20small%20portion%20of%20the%20training%20data%20to%20implant%20hidden%20backdoors%20into%20the%20model.%20The%20compromised%20model%20behaves%20normally%20on%20clean%20samples%20but%20misclassifies%20backdoored%20samples%20into%20the%20attacker-specified%20target%20class%2C%20posing%20a%20significant%20threat%20to%20real-world%20DNN%20applications.%20Currently%2C%20several%20empirical%20defense%20methods%20have%20been%20proposed%20to%20mitigate%20backdoor%20attacks%2C%20but%20they%20are%20often%20bypassed%20by%20more%20advanced%20backdoor%20techniques.%20In%20contrast%2C%20certified%20defenses%20based%20on%20randomized%20smoothing%20have%20shown%20promise%20by%20adding%20random%20noise%20to%20training%20and%20testing%20samples%20to%20counteract%20backdoor%20attacks.%20In%20this%20paper%2C%20we%20reveal%20that%20existing%20randomized%20smoothing%20defenses%20implicitly%20assume%20that%20all%20samples%20are%20equidistant%20from%20the%20decision%20boundary.%20However%2C%20it%20may%20not%20hold%20in%20practice%2C%20leading%20to%20suboptimal%20certification%20performance.%20To%20address%20this%20issue%2C%20we%20propose%20a%20sample-specific%20certified%20backdoor%20defense%20method%2C%20termed%20Cert-SSB.%20Cert-SSB%20first%20employs%20stochastic%20gradient%20ascent%20to%20optimize%20the%20noise%20magnitude%20for%20each%20sample%2C%20ensuring%20a%20sample-specific%20noise%20level%20that%20is%20then%20applied%20to%20multiple%20poisoned%20training%20sets%20to%20retrain%20several%20smoothed%20models.%20After%20that%2C%20Cert-SSB%20aggregates%20the%20predictions%20of%20multiple%20smoothed%20models%20to%20generate%20the%20final%20robust%20prediction.%20In%20particular%2C%20in%20this%20case%2C%20existing%20certification%20methods%20become%20inapplicable%20since%20the%20optimized%20noise%20varies%20across%20different%20samples.%20To%20conquer%20this%20challenge%2C%20we%20introduce%20a%20storage-update-based%20certification%20method%2C%20which%20dynamically%20adjusts%20each%20sample%27s%20certification%20region%20to%20improve%20certification%20performance.%20We%20conduct%20extensive%20experiments%20on%20multiple%20benchmark%20datasets%2C%20demonstrating%20the%20effectiveness%20of%20our%20proposed%20method.%20Our%20code%20is%20available%20at%20https%3A//github.com/NcepuQiaoTing/Cert-SSB.%0ALink%3A%20http%3A//arxiv.org/abs/2504.21730v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCert-SSBD%253A%2520Certified%2520Backdoor%2520Defense%2520with%2520Sample-Specific%2520Smoothing%2520Noises%26entry.906535625%3DTing%2520Qiao%2520and%2520Yingjia%2520Wang%2520and%2520Xing%2520Liu%2520and%2520Sixing%2520Wu%2520and%2520Jianbin%2520Li%2520and%2520Yiming%2520Li%26entry.1292438233 eral%2520smoothed%2520models.%2520After%2520that%252C%2520Cert-SSB%2520aggregates%2520the%2520predictions%2520of%2520multiple%2520smoothed%2520models%2520to%2520generate%2520the%2520final%2520robust%2520prediction.%2520In%2520particular%252C%2520in%2520this%2520case%252C%2520existing%2520certification%2520methods%2520become%2520inapplicable%2520since%2520the%2520optimized%2520noise%2520varies%2520across%2520different%2520samples.%2520To%2520conquer%2520this%2520challenge%252C%2520we%2520introduce%2520a%2520storage-update-based%2520certification%2520method%252C%2520which%2520dynamically%2520adjusts%2520each%2520sample%2527s%2520certification%2520region%2520to%2520improve%2520certification%2520performance.%2520We%2520conduct%2520extensive%2520experiments%2520on%2520multiple%2520benchmark%2520datasets%252C%2520demonstrating%2520the%2520effectiveness%2520of%2520our%2520proposed%2520method.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/NcepuQiaoTing/Cert-SSB.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2504.21730v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Cert-SSBD%3A%20Certified%20Backdoor%20Defense%20with%20Sample-Specific%20Smoothing%20Noises&entry.906535625=Ting%20Qiao%20and%20Yingjia%20Wang%20and%20Xing%20Liu%20and%20Sixing%20Wu%20and%20Jianbin%20Li%20and%20Yiming%20Li&entry.1292438233=Deep%20neural%20networks%20%28DNNs%29%20are%20vulnerable%20to%20backdoor%20attacks%2C%20where%20an%20attacker%20manipulates%20a%20small%20portion%20of%20the%20training%20data%20to%20implant%20hidden%20backdoors%20into%20the%20model.%20The%20compromised%20model%20behaves%20normally%20on%20clean%20samples%20but%20misclassifies%20backdoored%20samples%20into%20the%20attacker-specified%20target%20class%2C%20posing%20a%20significant%20threat%20to%20real-world%20DNN%20applications.%20Currently%2C%20several%20empirical%20defense%20methods%20have%20been%20

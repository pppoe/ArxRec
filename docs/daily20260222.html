{"title": "Efficient Reinforcement Learning for Large Language Models with Intrinsic Exploration", "author": "Yan Sun and Jia Guo and Stanley Kok and Zihao Wang and Zujie Wen and Zhiqiang Zhang", "abstract": "Reinforcement learning with verifiable rewards (RLVR) has improved the reasoning ability of large language models, yet training remains costly because many rollouts contribute little to optimization, considering the amount of computation required. This study investigates how simply leveraging intrinsic data properties, almost free benefit during training, can improve data efficiency for RLVR. We propose PREPO with two complementary components. First, we adopt prompt perplexity as an indicator of model adaptability in learning, enabling the model to progress from well-understood contexts to more challenging ones. Second, we amplify the discrepancy among the rollouts by differentiating their relative entropy, and prioritize sequences that exhibit a higher degree of exploration. Together, these mechanisms reduce rollout demand while preserving competitive performance. On the Qwen and Llama models, PREPO achieves effective results on mathematical reasoning benchmarks with up to 3 times fewer rollouts than the baselines. Beyond empirical gains, we provide theoretical and in-depth analyses explaining the underlying rationale of our method to improve the data efficiency of RLVR.", "link": "http://arxiv.org/abs/2511.00794v3", "date": "2026-02-19", "relevancy": 2.1027, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5354}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4768}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Reinforcement%20Learning%20for%20Large%20Language%20Models%20with%20Intrinsic%20Exploration&body=Title%3A%20Efficient%20Reinforcement%20Learning%20for%20Large%20Language%20Models%20with%20Intrinsic%20Exploration%0AAuthor%3A%20Yan%20Sun%20and%20Jia%20Guo%20and%20Stanley%20Kok%20and%20Zihao%20Wang%20and%20Zujie%20Wen%20and%20Zhiqiang%20Zhang%0AAbstract%3A%20Reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%20has%20improved%20the%20reasoning%20ability%20of%20large%20language%20models%2C%20yet%20training%20remains%20costly%20because%20many%20rollouts%20contribute%20little%20to%20optimization%2C%20considering%20the%20amount%20of%20computation%20required.%20This%20study%20investigates%20how%20simply%20leveraging%20intrinsic%20data%20properties%2C%20almost%20free%20benefit%20during%20training%2C%20can%20improve%20data%20efficiency%20for%20RLVR.%20We%20propose%20PREPO%20with%20two%20complementary%20components.%20First%2C%20we%20adopt%20prompt%20perplexity%20as%20an%20indicator%20of%20model%20adaptability%20in%20learning%2C%20enabling%20the%20model%20to%20progress%20from%20well-understood%20contexts%20to%20more%20challenging%20ones.%20Second%2C%20we%20amplify%20the%20discrepancy%20among%20the%20rollouts%20by%20differentiating%20their%20relative%20entropy%2C%20and%20prioritize%20sequences%20that%20exhibit%20a%20higher%20degree%20of%20exploration.%20Together%2C%20these%20mechanisms%20reduce%20rollout%20demand%20while%20preserving%20competitive%20performance.%20On%20the%20Qwen%20and%20Llama%20models%2C%20PREPO%20achieves%20effective%20results%20on%20mathematical%20reasoning%20benchmarks%20with%20up%20to%203%20times%20fewer%20rollouts%20than%20the%20baselines.%20Beyond%20empirical%20gains%2C%20we%20provide%20theoretical%20and%20in-depth%20analyses%20explaining%20the%20underlying%20rationale%20of%20our%20method%20to%20improve%20the%20data%20efficiency%20of%20RLVR.%0ALink%3A%20http easoning%2520benchmarks%2520with%2520up%2520to%25203%2520times%2520fewer%2520rollouts%2520than%2520the%2520baselines.%2520Beyond%2520empirical%2520gains%252C%2520we%2520provide%2520theoretical%2520and%2520in-depth%2520analyses%2520explaining%2520the%2520underlying%2520rationale%2520of%2520our%2520method%2520to%2520improve%2520the%2520data%2520efficiency%2520of%2520RLVR.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.00794v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Efficient%20Reinforcement%20Learning%20for%20Large%20Language%20Models%20with%20Intrinsic%20Exploration&entry.906535625=Yan%20Sun%20and%20Jia%20Guo%20and%20Stanley%20Kok%20and%20Zihao%20Wang%20and%20Zujie%20Wen%20and%20Zhiqiang%20Zhang&entry.1292438233=Reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%20has%20improved%20the%20reasoning%20ability%20of%20large%20language%20models%2C%20yet%20training%20remains%20costly%20because%20many%20rollouts%20contribute%20little%20to%20optimization%2C%20considering%20the%20amount%20of%20computation%20required.%20This%20study%20investigates%20how%20simply%20leveraging%20intrinsic%20data%20properties%2C%20almost%20free%20benefit%20during%20training%2C%20can%20improve%20data%20efficiency%20for%20RLVR.%20We%20propose%20PREPO%20with%20two%20complementary%20components.%20First%2C%20we%20adopt%20prompt%20perplexity%20as%20an%20indicator%20of%20model%20adaptability%20in%20learning%2C%20enabling%20the%20model%20to%20progress%20from%20well-understood%20contexts%20to%20more%20challenging%20ones.%20Second%2C%20we%20amplify%20the%20discrepancy%20among%20the%20rollouts%20by%20differentiating%20their%20relative%20entropy%2C%20and%20prioritize%20sequences%20that%20exhibit%20a%20higher%20degree%20of%20exploration.%20Together%2C%20these%20mechanisms%20reduce%20rollout%20demand%20while%20preserving%20competitive%20performance.%20On%20the%20Qwen%20and%20Llam {"title": "Conditional Flow Matching for Continuous Anomaly Detection in Autonomous Driving on a Manifold-Aware Spectral Space", "author": "Antonio Guillen-Perez", "abstract": "Safety validation for Level 4 autonomous vehicles (AVs) is currently bottlenecked by the inability to scale the detection of rare, high-risk long-tail scenarios using traditional rule-based heuristics. We present Deep-Flow, an unsupervised framework for safety-critical anomaly detection that utilizes Optimal Transport Conditional Flow Matching (OT-CFM) to characterize the continuous probability density of expert human driving behavior. Unlike standard generative approaches that operate in unstable, high-dimensional coordinate spaces, Deep-Flow constrains the generative process to a low-rank spectral manifold via a Principal Component Analysis (PCA) bottleneck. This ensures kinematic smoothness by design and enables the computation of the exact Jacobian trace for numerically stable, deterministic log-likelihood estimation. To resolve multi-modal ambiguity at complex junctions, we utilize an Early Fusion Transformer encoder with lane-aware goal conditioning, featuring a direct skip-connection to the flow head to maintain intent-integrity throughout the network. We introduce a kinematic complexity weighting scheme that prioritizes high-energy maneuvers (quantified via path tortuosity and jerk) during the simulation-free training process. Evaluated on the Waymo Open Motion Dataset (WOMD), our framework achieves an AUC-ROC of 0.766 against a heuristic golden set of safety-critical events. More significantly, our analysis reveals a fundamental distinction between kinematic danger and semantic non-compliance. Deep-Flow identifies a critical predictability gap by surfacing out-of-distribution behaviors, such as lane-boundary violations and non-normative junction maneuvers, that traditional safety filters overlook. This work provides a mathematically rigorous foundation for defining statistical safety gates, enabling objective, data-driven validation for the safe deployment of autonomous fleets.", "link": "http://arxiv.org/abs/2602.17586v1", "date": "2026-02-19", "relevancy": 2.0911, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5472}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5313}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5045}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conditional%20Flow%20Matching%20for%20Continuous%20Anomaly%20Detection%20in%20Autonomous%20Driving%20on%20a%20Manifold-Aware%20Spectral%20Space&body=Title%3A%20Conditional%20Flow%20Matching%20for%20Continuous%20Anomaly%20Detection%20in%20Autonomous%20Driving%20on%20a%20Manifold-Aware%20Spectral%20Space%0AAuthor%3A%20Antonio%20Guillen-Perez%0AAbstract%3A%20Safety%20validation%20for%20Level%204%20autonomous%20vehicles%20%28AVs%29%20is%20currently%20bottlenecked%20by%20the%20inability%20to%20scale%20the%20detection%20of%20rare%2C%20high-risk%20long-tail%20scenarios%20using%20traditional%20rule-based%20heuristics.%20We%20present%20Deep-Flow%2C%20an%20unsupervised%20framework%20for%20safety-critical%20anomaly%20detection%20that%20utilizes%20Optimal%20Transport%20Conditional%20Flow%20Matching%20%28OT-CFM%29%20to%20characterize%20the%20continuous%20probability%20density%20of%20expert%20human%20driving%20behavior.%20Unlike%20standard%20generative%20approaches%20that%20operate%20in%20unstable%2C%20high-dimensional%20coordinate%20spaces%2C%20Deep-Flow%20constrains%20the%20generative%20process%20to%20a%20low-rank%20spectral%20manifold%20via%20a%20Principal%20Component%20Analysis%20%28PCA%29 {"title": "Open Datasets in Learning Analytics: Trends, Challenges, and Best PRACTICE", "author": "Valdemar \u0160v\u00e1bensk\u00fd and Brendan Flanagan and Erwin Daniel L\u00f3pez Zapata and Atsushi Shimada", "abstract": "Open datasets play a crucial role in three research domains that intersect data science and education: learning analytics, educational data mining, and artificial intelligence in education. Researchers in these domains apply computational methods to analyze data from educational contexts, aiming to better understand and improve teaching and learning. Providing open datasets alongside research papers supports reproducibility, collaboration, and trust in research findings. It also provides individual benefits for authors, such as greater visibility, credibility, and citation potential. Despite these advantages, the availability of open datasets and the associated practices within the learning analytics research communities, especially at their flagship conference venues, remain unclear. We surveyed available datasets published alongside research papers in learning analytics. We manually examined 1,125 papers from three flagship conferences (LAK, EDM, and AIED) over the past five years. We discovered, categorized, and analyzed 172 datasets used in 204 publications. Our study presents the most comprehensive collection and analysis of open educational datasets to date, along with the most detailed categorization. Of the 172 datasets identified, 143 were not captured in any prior survey of open data in learning analytics. We provide insights into the datasets' context, analytical methods, use, and other properties. Based on this survey, we summarize the current gaps in the field. Furthermore, we list practical recommendations, advice, and 8-item guidelines under the acronym PRACTICE with a checklist to help researchers publish their data. Lastly, we share our original dataset: an annotated inventory detailing the discovered datasets and the corresponding publications. We hope these findings will support further adoption of open data practices in learning analytics communities and beyond.", "link": "http://arxiv.org/abs/2602.17314v1", "date": "2026-02-19", "relevancy": 2.0811, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4169}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4159}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4159}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Open%20Datasets%20in%20Learning%20Analytics%3A%20Trends%2C%20Challenges%2C%20and%20Best%20PRACTICE&body=Title%3A%20Open%20Datasets%20in%20Learning%20Analytics%3A%20Trends%2C%20Challenges%2C%20and%20Best%20PRACTICE%0AAuthor%3A%20Valdemar%20%C5%A0v%C3%A1bensk%C3%BD%20and%20Brendan%20Flanagan%20and%20Erwin%20Daniel%20L%C3%B3pez%20Zapata%20and%20Atsushi%20Shimada%0AAbstract%3A%20Open%20datasets%20play%20a%20crucial%20role%20in%20three%20research%20domains%20that%20intersect%20data%20science%20and%20education%3A%20learning%20analytics%2C%20educational%20data%20mining%2C%20and%20artificial%20intelligence%20in%20education.%20Researchers%20in%20these%20domains%20apply%20computational%20methods%20to%20analyze%20data%20from%20educational%20contexts%2C%20aiming%20to%20better%20understand%20and%20improve%20teaching%20and%20learning.%20Providing%20open%20datasets%20alongside%20research%20papers%20supports%20reproducibility%2C%20collaboration%2C%20and%20trust%20in%20research%20findings.%20It%20also%20provides%20individual%20benefits%20for%20authors%2C%20such%20as%20greater%20visibility%2C%20credibility%2C%20and%20citation%20potential.%20Despite%20these%20advantages%2C%20the%20availability%20of%20open%20datasets%20and%20the%20associated%20practices%20within%20the%20learning%20analytics%20research%20communities%2C%20especially%20at%20their%20flagship%20conference%20venues%2C%20remain%20unclear.%20We%20surveyed%20available%20datasets%20published%20alongside%20research%20papers%20in%20learning%20analytics.%20We%20manually%20examined%201%2C125%20papers%20from%20three%20flagship%20conferences%20%28LAK%2C%20EDM%2C%20and%20AIED%29%20over%20the%20past%20five%20years.%20We%20discovered%2C%20categorized%2C%20and%20analyzed%20172%20datasets%20used%20in%20204%20publications.%20Our%20study%20presents%20the%20most%20comprehensive%20collection%20and%20analysis%20of%20open%20educational%20datasets%20to%20date%2C%20along%20with%20the%20most%20detailed%20categorization.%20Of%20the%20172%20datasets%20identified%2C%20143%20were%20not%20captured%20in%20any%20prior%20survey%20of%20open%20data%20in%20learning%20analytics.%20We%20provide%20insights%20into%20the%20datasets%27%20context%2C%20analytical%20methods%2C%20use%2C%20and%20other%20properties.%20Based%20on%20this%20survey%2C%20we%20summarize%20the%20current%20gaps%20in%20the%20field.%20Furthermore%2C%20we%20list%20practical%20recommendations%2C%20advice%2C%20and%208-item%20guidelines%20under%20the%20acronym%20PRACTICE%20with%20a%20checklist%20to%20help%20researchers%20publish%20their%20data.%20Lastly%2C%20we%20share%20our%20original%20dataset%3A%20an%20annotated%20inventory%20detailing%20the%20discovered%20datasets%20and%20the%20corresponding%20publications.%20We%20hope%20these%20findings%20will%20support%20further%20adoption%20of%20open%20data%20practices%20in%20learning%20analytics%20communities%20and%20beyond.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17314v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOpen%2520Datasets%2520in%2520Learning%2520Analytics%253A%2520Trends%252C%2520Challenges%252C%2520and%2520Best%2520PRACTICE%26entry.906535625%3DValdemar%25 {"title": "Same Meaning, Different Scores: Lexical and Syntactic Sensitivity in LLM Evaluation", "author": "Bogdan Kosti\u0107 and Conor Fallon and Julian Risch and Alexander L\u00f6ser", "abstract": "The rapid advancement of Large Language Models (LLMs) has established standardized evaluation benchmarks as the primary instrument for model comparison. Yet, their reliability is increasingly questioned due to sensitivity to shallow variations in input prompts. This paper examines how controlled, truth-conditionally equivalent lexical and syntactic perturbations affect the absolute performance and relative ranking of 23 contemporary LLMs across three benchmarks: MMLU, SQuAD, and AMEGA. We employ two linguistically principled pipelines to generate meaning-preserving variations: one performing synonym substitution for lexical changes, and another using dependency parsing to determine applicable syntactic transformations. Results show that lexical perturbations consistently induce substantial, statistically significant performance degradation across nearly all models and tasks, while syntactic perturbations have more heterogeneous effects, occasionally improving results. Both perturbation types destabilize model leaderboards on complex tasks. Furthermore, model robustness did not consistently scale with model size, revealing strong task dependence. Overall, the findings suggest that LLMs rely more on surface-level lexical patterns than on abstract linguistic competence, underscoring the need for robustness testing as a standard component of LLM evaluation.", "link": "http://arxiv.org/abs/2602.17316v1", "date": "2026-02-19", "relevancy": 2.077, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Same%20Meaning%2C%20Different%20Scores%3A%20Lexical%20and%20Syntactic%20Sensitivity%20in%20LLM%20Evaluation&body=Title%3A%20Same%20Meaning%2C%20Different%20Scores%3A%20Lexical%20and%20Syntactic%20Sensitivity%20in%20LLM%20Evaluation%0AAuthor%3A%20Bogdan%20Kosti%C4%87%20and%20Conor%20Fallon%20and%20Julian%20Risch%20and%20Alexander%20L%C3%B6ser%0AAbstract%3A%20The%20rapid%20advancement%20of%20Large%20Language%20Models%20%28LLMs%29%20has%20established%20standardized%20evaluation%20benchmarks%20as%20the%20primary%20instrument%20for%20model%20comparison.%20Yet%2C%20their%20reliability%20is%20increasingly%20questioned%20due%20to%20sensitivity%20to%20shallow%20variations%20in%20input%20prompts.%20This%20paper%20examines%20how%20controlled%2C%20truth-conditionally%20equivalent%20lexical%20and%20syntactic%20perturbations%20affect%20the%20absolute%20performance%20and%20relative%20ranking%20of%2023%20contemporary%20LLMs%20across%20three%20benchmarks%3A%20MMLU%2C%20SQuAD%2C%20and%20AMEGA.%20We%20employ%20two%20linguistically%20principled%20pipelines%20to%20generate%20meaning-preserving%20variations%3A%20one%20performing%20synonym%20substitution%20for%20lexical%20changes%2C%20and%20another%20using%20dependency%20parsing%20to%20determine%20applicable%20syntactic%20transformations.%20Results%20show%20that%20lexical%20perturbations%20consistently%20induce%20substantial%2C%20statistically%20significant%20performance%20degradation%20across%20nearly%20all%20models%20and%20tasks%2C%20while%20syntactic%20perturbations%20have%20more%20heterogeneous%20effects%2C%20occasionally%20improving%20results.%20Both%20perturbation%20types%20destabilize%20model%20leaderboards%20on%20complex%20tasks.%20Furthermore%2C%20model%20robustness%20did%20not%20consistently%20scale%20with%20model%20size%2C%20revealing%20strong%20task%20dependence.%20Overall%2C%20the%20findings%20suggest%20that%20LLMs%20rely%20more%20on%20surface-level%20lexical%20patterns%20than%20on%20abstract%20linguistic%20competence%2C%20underscoring%20the%20need%20for%20robustness%20testing%20as%20a%20standard%20component%20of%20LLM%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17316v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSame%2520Meaning%252C%2520Different%2520Scores%253A%2520Lexical%2520and%2520Syntactic%2520Sensitivity%2520in%2520LLM%2520Evaluation%26entry.906535625%3DBogdan%2520Kosti%25C4%2587%2520and%2520Conor%2520Fallon%2520and%2520Julian%2520Risch%2520and%2520Alexander%2520L%25C3%25B6ser%26entry.1292438233%3DThe%2520rapid%2520advancement%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520has%2520established%2520standardized%2520evaluation%2520benchmarks%2520as%2520the%2520primary%2520instrument%2520for%2520model%2520comparison.%2520Yet%252C%2520their%2520reliability%2520is%2520increasingly%2520questioned%2520due%2520to%2520sensitivity%2520to%2520shallow%2520variations%2520in%2520input%2520prompts.%2520This%2520paper%2520examines%2520how%2520controlled%252C%2520truth-conditionally%2520equivalent%2520lexical%2520and%2520syntactic%2520perturbations%2520affect%2520the%2520absolute%2520performance%2520and%2520relative%2520ranking%2520of%252023%2520contemporary%2520LLMs%2520across%2520three%2520benchmarks%253A%2520MMLU%252C%2520SQuAD%252C%2520and%2520AMEGA.%2520We%2520employ%2520two%2520linguistically%2520principled%2520pipelines%2520to%2520generate%2520meaning-preserving%2520variations%253A%2520one%2520performing%2520synonym%2520substitution%2520for%2520lexical%2520changes%252C%2520and%2520another%2520using%2520dependency%2520parsing%2520to%2520determine%2520applicable%2520syntactic%2520transformations.%2520Results%2520show%2520that%2520lexical%2520perturbations%2520consistently%2520induce%2520substantial%252C%2520statistically%2520significant%2520performance%2520degradation%2520across%2520nearly%2520all%2520models%2520and%2520tasks%252C%2520while%2520syntactic%2520perturbations%2520have%2520more%2520heterogeneous%2520effects%252C%2520occasionally%2520improving%2520results.%2520Both%2520perturbation%2520types%2520destabilize%2520model%2520leaderboards%2520on%2520complex%2520tasks.%2520Furthermore%252C%2520model%2520robustness%2520did%2520not%2520consistently%2520scale%2520with%2520model%2520size%252C%2520revealing%2520strong%2520task%2520dependence.%2520Overall%252C%2520the%2520findings%2520suggest%2520that%2520LLMs%2520rely%2520more%2520on%2520surface-level%2520lexical%2520patterns%2520than%2520on%2520abstract%2520linguistic%2520competence%252C%2520underscoring%2520the%2520need%2520for%2520robustness%2520testing%2520as%2520a%2520standard%2520component%2520of%2520LLM%2520evaluation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17316v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Same%20Meaning%2C%20Different%20Scores%3A%20Lexical%20and%20Syntactic%20Sensitivity%20in%20LLM%20Evaluation&entry.906535625=Bogdan%20Kosti%C4%87%20and%20Conor%20Fallon%20and%20Julian%20Risch%20and%20Alexander%20L%C3%B6ser&entry.1292438233=The%20rapid%20advancement%20of%20Large%20Language%20Models%20%28LLMs%29%20has%20established%20standardized%20evaluation%20benchmarks%20as%20the%20primary%20instrument%20for%20model%20comparison.%20Yet%2C%20their%20reliability%20is%20increasingly%20questioned%20due%20to%20sensitivity%20to%20shallow%20variations%20in%20input%20prompts.%20This%20paper%20examines%20how%20controlled%2C%20truth-conditionally%20equivalent%20lexical%20and%20syntactic%20perturbations%20affect%20the%20absolute%20performance%20and%20relative%20ranking%20of%2023%20contemporary%20LLMs%20across%20three%20benchmarks%3A%2 {"title": "EAGLE: Expert-Augmented Attention Guidance for Tuning-Free Industrial Anomaly Detection in Multimodal Large Language Models", "author": "Xiaomeng Peng and Xilang Huang and Seon Han Choi", "abstract": "Industrial anomaly detection is important for smart manufacturing, but many deep learning approaches produce only binary decisions and provide limited semantic explanations. Multimodal large language models (MLLMs) can potentially generate fine-grained, language-based analyses, yet existing methods often require costly fine-tuning and do not consistently improve anomaly detection accuracy compared to lightweight specialist detectors. We propose expert-augmented attention guidance for industrial anomaly detection in MLLMs (EAGLE), a tuning-free framework that integrates outputs from expert model to guide MLLMs toward both accurate detection and interpretable anomaly descriptions. We further study how EAGLE affects MLLMs internals by examining the attention distribution of MLLMs to the anomalous image regions in the intermediate layers. We observe that successful anomaly detection is associated with increased attention concentration on anomalous regions, and EAGLE tends to encourage this alignment. Experiments on MVTec-AD and VisA show that EAGLE improves anomaly detection performance across multiple MLLMs without any parameter updates, achieving results comparable to fine-tuning based methods. Code is available at \\href{https://github.com/shengtun/Eagle}{https://github.com/shengtun/Eagle}", "link": "http://arxiv.org/abs/2602.17419v1", "date": "2026-02-19", "relevancy": 2.0766, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5745}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5163}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4998}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EAGLE%3A%20Expert-Augmented%20Attention%20Guidance%20for%20Tuning-Free%20Industrial%20Anomaly%20Detection%20in%20Multimodal%20Large%20Language%20Models&body=Title%3A%20EAGLE%3A%20Expert-Augmented%20Attention%20Guidance%20for%20Tuning-Free%20Industrial%20Anomaly%20Detection%20in%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Xiaomeng%20Peng%20and%20Xilang%20Huang%20and%20Seon%20Han%20Choi%0AAbstract%3A%20Industrial%20anomaly%20detection%20is%20important%20for%20smart%20manufacturing%2C%20but%20many%20deep%20learning%20approaches%20produce%20only%20binary%20decisions%20and%20provide%20limited%20semantic%20explanations.%20Multimodal%20large%20language%20models%20%28MLLMs%29%20can%20potentially%20generate%20fine-grained%2C%20language-based%20analyses%2C%20yet%20existing%20methods%20often%20require%20costly%20fine-tuning%20and%20do%20not%20consistently%20improve%20anomaly%20detection%20accuracy%20compared%20to%20lightweight%20specialist%20detectors.%20We%20propose%20expert-augmented%20attention%20guidance%20for%20industrial%20anomaly%20detection%20in%20MLLMs%20%28EAGLE%29%2C%20a%20tuning-free%20framework%20that%20integrates%20outputs%20from%20expert%20model%20to%20guide%20MLLMs%20toward%20both%20accurate%20detection%20and%20interpretable%20anomaly%20descriptions.%20We%20further%20study%20how%20EAGLE%20affects%20MLLMs%20internals%20by%20examining%20the%20attention%20distribution%20of%20MLLMs%20to%20the%20anomalous%20image%20regions%20in%20the%20intermediate%20layers.%20We%20observe%20that%20successful%20anomaly%20detection%20is%20associated%20with%20increased%20attention%20concentration%20on%20anomalous%20regions%2C%20and%20EAGLE%20tends%20to%20encourage%20this%20alignment.%20Experiments%20on%20MVTec-AD%20and%20VisA%20show%20that%20EAGLE%20improves%20anomaly%20detection%20performance%20across%20multiple%20MLLMs%20without%20any%20parameter%20updates%2C%20achieving%20results%20comparable%20to%20fine-tuning%20based%20methods.%20Code%20is%20available%20at%20%5Chref%7Bhttps%3A//github.com/shengtun/Eagle%7D%7Bhttps%3A//github.com/shengtun/Eagle%7D%0ALink%3A%20http%3A//arxiv.org/abs/2602.17419v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEAGLE%253A%2520Expert-Augmented%2520Attention%2520Guidance%2520for%2520Tuning-Free%2520Industrial%2520Anomaly%2520Detection%2520in%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DXiaomeng%2520Peng%2520and%2520Xilang%2520Huang%2520and%2520Seon%2520Han%2520Choi%26entry.1292438233%3DIndustrial%2520anomaly%2520detection%2520is%2520important%2520for%2520smart%2520manufacturing%252C%2520but%2520many%2520deep%2520learning%2520approaches%2520produce%2520only%2520binary%2520decisions%2520and%2520provide%2520limited%2520semantic%2520explanations.%2520Multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520can%2520potentially%2520generate%2520fine-grained%252C%2520language-based%2520analyses%252C%2520yet%2520existing%2520methods%2520often%2520require%2520costly%2520fine-tuning%2520and%2520do%2520not%2520consistently%2520improve%2520anomaly%2520detection%2520accuracy%2520compared%2520to%2520lightweight%2520specialist%2520detectors.%2520We%2520propose%2520expert-augmented%2520attention%2520guidance%2520for%2520industrial%2520anomaly%2520detection%2520in%2520MLLMs%2520%2528EAGLE%2529%252C%2520a%2520tuning-free%2520framework%2520that%2520integrates%2520outputs%2520from%2520expert%2520model%2520to%2520guide%2520MLLMs%2520toward%2520both%2520accurate%2520detection%2520and%2520interpretable%2520anomaly%2520descriptions.%2520We%2520further%2520study%2520how%2520EAGLE%2520affects%2520MLLMs%2520internals%2520by%2520examining%2520the%2520attention%2520distribution%2520of%2520MLLMs%2520to%2520the%2520anomalous%2520image%2520regions%2520in%2520the%2520intermediate%2520layers.%2520We%2520observe%2520that%2520successful%2520anomaly%2520detection%2520is%2520associated%2520with%2520increased%2520attention%2520concentration%2520on%2520anomalous%2520regions%252C%2520and%2520EAGLE%2520tends%2520to%2520encourage%2520this%2520alignment.%2520Experiments%2520on%2520MVTec-AD%2520and%2520VisA%2520show%2520that%2520EAGLE%2520improves%2520anomaly%2520detection%2520performance%2520across%2520multiple%2520MLLMs%2520without%2520any%2520parameter%2520updates%252C%2520achieving%2520results%2520comparable%2520to%2520fine-tuning%2520based%2520methods.%2520Code%2520is%2520available%2520at%2520%255Chref%257Bhttps%253A//github.com/shengtun/Eagle%257D%257Bhttps%253A//github.com/shengtun/Eagle%257D%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.17419v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EAGLE%3A%20Expert-Augmented%20Attention%20Guidance%20for%20Tuning-Free%20Industrial%20Anomaly%20Detection%20in%20Multimodal%20Large%20Language%20Models&entry.906535625=Xiaomeng%20Peng%20and%20Xilang%20Huang%20and%20Seon%20Han%20Choi&entry.1292438233=Industrial%20anomaly%20detection%20is%20important%20for%20smart%20manufacturing%2C%20but%20many%20deep%20learning%20approaches%20produce%20only%20binary%20decisions%20and%20provide%20limited%20semantic%20explanations.%20Multimodal%20large%20language%20models%20%28MLLMs%29%20can%20potentially%20generate%20fine-grained%2C%20language-based%20analyses%2C%20yet%20existing%20methods%20often%20require%20costly%20fine-tuning%20and%20do%20not%20consistently%20improve%20anomaly%20detection%20accuracy%20compared%20to%20lightweight%20specialist%20detectors.%20We%20propose%20expert-augmented%20attention%20guidance%20for%20industrial%20anomaly%20detection%20in%20MLLMs%20%28EAGLE%29%2C%20a%20tuning-free%20framework%20that%20integrates%20outputs%20from%20expert%20model%20to%20gu {"title": "ArXiv-to-Model: A Practical Study of Scientific LM Training", "author": "Anuj Gupta", "abstract": "While frontier large language models demonstrate strong reasoning and mathematical capabilities, the practical process of training domain-specialized scientific language models from raw sources remains under-documented. In this work, we present a detailed case study of training a 1.36B-parameter scientific language model directly from raw arXiv LaTeX sources spanning mathematics, computer science, and theoretical physics. We describe an end-to-end pipeline covering metadata filtering, archive validation, LaTeX extraction, text normalization, domain-aware tokenization, and dense transformer training under constrained compute (2xA100 GPUs). Through 24 experimental runs, we analyze training stability, scaling behavior, data yield losses, and infrastructure bottlenecks. Our findings highlight how preprocessing decisions significantly affect usable token volume, how tokenization impacts symbolic stability, and how storage and I/O constraints can rival compute as limiting factors. We further analyze convergence dynamics and show stable training behavior in a data-rich regime (52B pretraining tokens). Rather than proposing a novel architecture, this work provides an engineering-grounded, transparent account of training a small scientific language model from scratch. We hope these insights support researchers operating under moderate compute budgets who seek to build domain-specialized models.", "link": "http://arxiv.org/abs/2602.17288v1", "date": "2026-02-19", "relevancy": 2.0749, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5392}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5146}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ArXiv-to-Model%3A%20A%20Practical%20Study%20of%20Scientific%20LM%20Training&body=Title%3A%20ArXiv-to-Model%3A%20A%20Practical%20Study%20of%20Scientific%20LM%20Training%0AAuthor%3A%20Anuj%20Gupta%0AAbstract%3A%20While%20frontier%20large%20language%20models%20demonstrate%20strong%20reasoning%20and%20mathematical%20capabilities%2C%20the%20practical%20process%20of%20training%20domain-specialized%20scientific%20language%20models%20from%20raw%20sources%20remains%20under-documented.%20In%20this%20work%2C%20we%20present%20a%20detailed%20case%20study%20of%20training%20a%201.36B-parameter%20scientific%20language%20model%20directly%20from%20raw%20arXiv%20LaTeX%20sources%20spanning%20mathematics%2C%20computer%20science%2C%20and%20theoretical%20physics.%20We%20describe%20an%20end-to-end%20pipeline%20covering%20metadata%20filtering%2C%20archive%20validation%2C%20LaTeX%20extraction%2C%20text%20normalization%2C%20domain-aware%20tokenization%2C%20and%20dense%20transformer%20training%20under%20constrained%20compute%20%282xA100%20GPUs%29.%20Through%2024%20experimental%20runs%2C%20we%20analyze%20training%20stability%2C%20scaling%20behavior%2C%20data%20yield%20losses%2C%20and%20infrastructure%20bottlenecks.%20Our%20findings%20highlight%20how%20preprocessing%20decisions%20significantly%20affect%20usable%20token%20volume%2C%20how%20tokenization%20impacts%20symbolic%20stability%2C%20and%20how%20storage%20and%20I/O%20constraints%20can%20rival%20compute%20as%20limiting%20factors.%20We%20further%20analyze%20convergence%20dynamics%20and%20show%20stable%20training%20behavior%20in%20a%20data-rich%20regime%20%2852B%20pretraining%20tokens%29.%20Rather%20than%20proposing%20a%20novel%20architecture%2C%20this%20work%20provides%20an%20engineering-grounded%2C%20transparent%20account%20of%20training%20a%20small%20scientific%20language%20model%20from%20scratch.%20We%20hope%20these%20insights%20support%20researchers%20operating%20under%20moderate%20compute%20budgets%20who%20seek%20to%20build%20domain-specialized%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17288v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DArXiv-to-Model%253A%2520A%2520Practical%2520Study%2520of%2520Scientific%2520LM%2520Training%26entry.906535625%3DAnuj%2520Gupta%26entry.1292438233%3DWhile%2520frontier%2520large%2520language%2520models%2520demonstrate%2520strong%2520reasoning%2520and%2520mathematical%2520capabilities%252C%2520the%2520practical%2520process%2520of%2520training%2520domain-specialized%2520scientific%2520language%2520models%2520from%2520raw%2520sources%2520remains%2520under-documented.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520detailed%2520case%2520study%2520of%2520training%2520a%25201.36B-parameter%2520scientific%2520language%2520model%2520directly%2520from%2520raw%2520arXiv%2520LaTeX%2520sources%2520spanning%2520mathematics%252C%2520computer%2520science%252C%2520and%2520theoretical%2520physics.%2520We%2520describe%2520an%2520end-to-end%2520pipeline%2520covering%2520metadata%2520filtering%252C%2520archive%2520validation%252C%2520LaTeX%2520extraction%252C%2520text%2520normalization%252C%2520domain-aware%2520tokenization%252C%2520and%2520dense%2520transformer%2520training%2520under%2520constrained%2520compute%2520%25282xA100%2520GPUs%2529.%2520Through%252024%2520experimental%2520runs%252C%2520we%2520analyze%2520training%2520stability%252C%2520scaling%2520behavior%252C%2520data%2520yield%2520losses%252C%2520and%2520infrastructure%2520bottlenecks.%2520Our%2520findings%2520highlight%2520how%2520preprocessing%2520decisions%2520significantly%2520affect%2520usable%2520token%2520volume%252C%2520how%2520tokenization%2520impacts%2520symbolic%2520stability%252C%2520and%2520how%2520storage%2520and%2520I/O%2520constraints%25 0losses%2C%20and%20infrastructure%20bottlenecks.%20Our%20findings%20highlight%20how%20preprocessing%20decisions%20significantly%20affect%20usable%20token%20volume%2C%20how%20tokenization%20impacts%20symbolic%20stability%2C%20and%20how%20storage%20and%20I/O%20constraints%20can%20rival%20compute%20as%20limiting%20factors.%20We%20further%20analyze%20convergence%20dynamics%20and%20show%20stable%20training%20behavior%20in%20a%20data-rich%20regime%20%2852B%20pretraining%20tokens%29.%20Rather%20than%20proposing%20a%20novel%20architecture%2C%20this%20work%20provides%20an%20engineering-grounded%2C%20transparent%20account%20of%20training%20a%20small%20scientific%20language%20model%20from%20scratch.%20We%20hope%20these%20insights%20support%20researchers%20operating%20under%20moderate%20compute%20budgets%20who%20seek%20to%20build%20domain-specialized%20models.&entry.1838667208=http%3A//arxiv.org/abs/2602.17288v1&entry.124074799=Read"},
{"title": "KLong: Training LLM Agent for Extremely Long-horizon Tasks", "author": "Yue Liu and Zhiyuan Hu and Flood Sung and Jiaheng Zhang and Bryan Hooi", "abstract": "This paper introduces KLong, an open-source LLM agent trained to solve extremely long-horizon tasks. The principle is to first cold-start the model via trajectory-splitting SFT, then scale it via progressive RL training. Specifically, we first activate basic agentic abilities of a base model with a comprehensive SFT recipe. Then, we introduce Research-Factory, an automated pipeline that generates high-quality training data by collecting research papers and constructing evaluation rubrics. Using this pipeline, we build thousands of long-horizon trajectories distilled from Claude 4.5 Sonnet (Thinking). To train with these extremely long trajectories, we propose a new trajectory-splitting SFT, which preserves early context, progressively truncates later context, and maintains overlap between sub-trajectories. In addition, to further improve long-horizon task-solving capability, we propose a novel progressive RL, which schedules training into multiple stages with progressively extended timeouts. Experiments demonstrate the superiority and generalization of KLong, as shown in Figure 1. Notably, our proposed KLong (106B) surpasses Kimi K2 Thinking (1T) by 11.28% on PaperBench, and the performance improvement generalizes to other coding benchmarks like SWE-bench Verified and MLE-bench.", "link": "http://arxiv.org/abs/2602.17547v1", "date": "2026-02-19", "relevancy": 2.0721, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5599}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4918}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4789}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KLong%3A%20Training%20LLM%20Agent%20for%20Extremely%20Long-horizon%20Tasks&body=Title%3A%20KLong%3A%20Training%20LLM%20Agent%20for%20Extremely%20Long-horizon%20Tasks%0AAuthor%3A%20Yue%20Liu%20and%20Zhiyuan%20Hu%20and%20Flood%20Sung%20and%20Jiaheng%20Zhang%20and%20Bryan%20Hooi%0AAbstract%3A%20This%20paper%20introduces%20KLong%2C%20an%20open-source%20LLM%20agent%20trained%20to%20solve%20extremely%20long-horizon%20tasks.%20The%20principle%20is%20to%20first%20cold-start%20the%20model%20via%20trajectory-splitting%20SFT%2C%20then%20scale%20it%20via%20progressive%20RL%20training.%20Specifically%2C%20we%20first%20activate%20basic%20agentic%20abilities%20of%20a%20base%20model%20with%20a%20comprehensive%20SFT%20recipe.%20Then%2C%20we%20introduce%20Research-Factory%2C%20an%20automated%20pipeline%20that%20generates%20high-quality%20training%20data%20by%20collecting%20research%20papers%20and%20constructing%20evaluation%20rubrics.%20Using%20this%20pipeline%2C%20we%20build%20thousands%20of%20long-horizon%20trajectories%20distilled%20from%20Claude%204.5%20Sonnet%20%28Thinking%29.%20To%20train%20with%20these%20extremely%20long%20trajectories%2C%20we%20propose%20a%20new%20trajectory-splitting%20SFT%2C%20which%20preserves%20early%20context%2C%20progressively%20truncates%20later%20context%2C%20and%20maintains%20overlap%20between%20sub-trajectories.%20In%20addition%2C%20to%20further%20improve%20long-horizon%20task-solving%20capability%2C%20we%20propose%20a%20novel%20progressive%20RL%2C%20which%20schedules%20training%20into%20multiple%20stages%20with%20progressively%20extended%20timeouts.%20Experiments%20demonstrate%20the%20superiority%20and%20generalization%20of%20KLong%2C%20as%20shown%20in%20Figure%201.%20Notably%2C%20our%20proposed%20KLong%20%28106B%29%20surpasses%20Kimi%20K2%20Thinking%20%281T%29%20by%2011.28%25%20on%20PaperBench%2C%20and%20 {"title": "Decoding the Human Factor: High Fidelity Behavioral Prediction for Strategic Foresight", "author": "Ben Yellin and Ehud Ezra and Mark Foreman and Shula Grinapol", "abstract": "Predicting human decision-making in high-stakes environments remains a central challenge for artificial intelligence. While large language models (LLMs) demonstrate strong general reasoning, they often struggle to generate consistent, individual-specific behavior, particularly when accurate prediction depends on complex interactions between psychological traits and situational constraints. Prompting-based approaches can be brittle in this setting, exhibiting identity drift and limited ability to leverage increasingly detailed persona descriptions. To address these limitations, we introduce the Large Behavioral Model (LBM), a behavioral foundation model fine-tuned to predict individual strategic choices with high fidelity. LBM shifts from transient persona prompting to behavioral embedding by conditioning on a structured, high-dimensional trait profile derived from a comprehensive psychometric battery. Trained on a proprietary dataset linking stable dispositions, motivational states, and situational constraints to observed choices, LBM learns to map rich psychological profiles to discrete actions across diverse strategic dilemmas. In a held-out scenario evaluation, LBM fine-tuning improves behavioral prediction relative to the unadapted Llama-3.1-8B-Instruct backbone and performs comparably to frontier baselines when conditioned on Big Five traits. Moreover, we find that while prompting-based baselines exhibit a complexity ceiling, LBM continues to benefit from increasingly dense trait profiles, with performance improving as additional trait dimensions are provided. Together, these results establish LBM as a scalable approach for high-fidelity behavioral simulation, enabling applications in strategic foresight, negotiation analysis, cognitive security, and decision support.", "link": "http://arxiv.org/abs/2602.17222v1", "date": "2026-02-19", "relevancy": 2.0629, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.526}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5137}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5137}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoding%20the%20Human%20Factor%3A%20High%20Fidelity%20Behavioral%20Prediction%20for%20Strategic%20Foresight&body=Title%3A%20Decoding%20the%20Human%20Factor%3A%20High%20Fidelity%20Behavioral%20Prediction%20for%20Strategic%20Foresight%0AAuthor%3A%20Ben%20Yellin%20and%20Ehud%20Ezra%20and%20Mark%20Foreman%20and%20Shula%20Grinapol%0AAbstract%3A%20Predicting%20human%20decision-making%20in%20high-stakes%20environments%20remains%20a%20central%20challenge%20for%20artificial%20intelligence.%20While%20large%20language%20models%20%28LLMs%29%20demonstrate%20strong%20general%20reasoning%2C%20they%20often%20struggle%20to%20generate%20consistent%2C%20individual-specific%20behavior%2C%20particularly%20when%20accurate%20prediction%20depends%20on%20complex%20interactions%20between%20psychological%20traits%20and%20situational%20constraints.%20Prompting-based%20approaches%20can%20be%20brittle%20in%20this%20setting%2C%20exhibiting%20identity%20drift%20and%20limited%20ability%20to%20leverage%20increasingly%20detailed%20persona%20descriptions.%20To%20address%20these%20limitations%2C%20we%20introduce%20the%20Large%20Behavioral%20Model%20%28LBM%29%2C%20a%20behavioral%20foundation%20model%20fine-tuned%20to%20predict%20individual%20strategic%20choices%20with%20high%20fidelity.%20LBM%20shifts%20from%20transient%20persona%20prompting%20to%20behavioral%20embedding%20by%20conditioning%20on%20a%20structured%2C%20high-dimensional%20trait%20profile%20derived%20from%20a%20comprehensive%20psychometric%20battery.%20Trained%20on%20a%20proprietary%20dataset%20linking%20stable%20dispositions%2C%20motivational%20states%2C%20and%20situational%20constraints%20to%20observed%20choices%2C%20LBM%20learns%20to%20map%20rich%20psychological%20profiles%20to%20discrete%20actions%20across%20diverse%20strategic%20dilemmas.%20In%20a%20held-out%20scenario%20evaluation%2C%20LBM%20fine-tuning%20improves%20behavioral%20prediction%20relative%20to%20the%20unadapted%20Llama-3.1-8B-Instruct%20backbone%20and%20performs%20comparably%20to%20frontier%20baselines%20when%20conditioned%20on%20Big%20Five%20traits.%20Moreover%2C%20we%20find%20that%20while%20prompting-based%20baselines%20exhibit%20a%20complexity%20ceiling%2C%20LBM%20continues%20to%20benefit%20from%20increasingly%20dense%20trait%20profiles%2C%20with%20performance%20improving%20as%20additional%20trait%20dimensions%20are%20provided.%20Together%2C%20these%20results%20establish%20LBM%20as%20a%20scalable%20approach%20for%20high-fidelity%20behavioral%20simulation%2C%20enabling%20applications%20in%20strategic%20foresight%2C%20negotiation%20analysis%2C%20cognitive%20security%2C%20and%20decision%20support.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17222v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoding%2520the%2520Human%2520Factor%253A%2520High%2520Fidelity%2520Behavioral%2520Prediction%2520for%2520Strategic%2520Foresight%26entry.906535625%3DBen%2520Yellin%2520and%2520Ehud%2520Ezra%2520and%2520Mark%2520Foreman%2520and%2520Shula%2520Grinapol%26entry.1292438233%3DPredicting%2520human%2520decision-making%2520in%2520high-stakes%2520environments%2520remains%2520a%2520central%2520challenge%2520for%2520artificial%2520intelligence.%2520While%2520large%2520language%2520models%2520%2528LLMs%2529%252 {"title": "Attachment Anchors: A Novel Framework for Laparoscopic Grasping Point Prediction in Colorectal Surgery", "author": "Dennis N. Schneider and Lars Wagner and Daniel Rueckert and Dirk Wilhelm", "abstract": "Accurate grasping point prediction is a key challenge for autonomous tissue manipulation in minimally invasive surgery, particularly in complex and variable procedures such as colorectal interventions. Due to their complexity and prolonged duration, colorectal procedures have been underrepresented in current research. At the same time, they pose a particularly interesting learning environment due to repetitive tissue manipulation, making them a promising entry point for autonomous, machine learning-driven support. Therefore, in this work, we introduce attachment anchors, a structured representation that encodes the local geometric and mechanical relationships between tissue and its anatomical attachments in colorectal surgery. This representation reduces uncertainty in grasping point prediction by normalizing surgical scenes into a consistent local reference frame. We demonstrate that attachment anchors can be predicted from laparoscopic images and incorporated into a grasping framework based on machine learning. Experiments on a dataset of 90 colorectal surgeries demonstrate that attachment anchors improve grasping point prediction compared to image-only baselines. There are particularly strong gains in out-of-distribution settings, including unseen procedures and operating surgeons. These results suggest that attachment anchors are an effective intermediate representation for learning-based tissue manipulation in colorectal surgery.", "link": "http://arxiv.org/abs/2602.17310v1", "date": "2026-02-19", "relevancy": 2.0578, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.522}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5135}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4978}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attachment%20Anchors%3A%20A%20Novel%20Framework%20for%20Laparoscopic%20Grasping%20Point%20Prediction%20in%20Colorectal%20Surgery&body=Title%3A%20Attachment%20Anchors%3A%20A%20Novel%20Framework%20for%20Laparoscopic%20Grasping%20Point%20Prediction%20in%20Colorectal%20Surgery%0AAuthor%3A%20Dennis%20N.%20Schneider%20and%20Lars%20Wagner%20and%20Daniel%20Rueckert%20and%20Dirk%20Wilhelm%0AAbstract%3A%20Accurate%20grasping%20point%20prediction%20is%20a%20key%20challenge%20for%20autonomous%20tissue%20manipulation%20in%20minimally%20invasive%20surgery%2C%20particularly%20in%20complex%20and%20variable%20procedures%20such%20as%20colorectal%20interventions.%20Due%20to%20their%20complexity%20and%20prolonged%20duration%2C%20colorectal%20procedures%20have%20been%20underrepresented%20in%20current%20research.%20At%20the%20same%20time%2C%20they%20pose%20a%20particularly%20interesting%20learning%20environment%20due%20to%20repetitive%20tissue%20manipulation%2C%20making%20them%20a%20promising%20entry%20point%20for%20autonomous%2C%20machine%20learning-driven%20support.%20Therefore%2C%20in%20this%20work%2C%20we%20introduce%20attachment%20anchors%2C%20a%20structured%20representation%20that%20encodes%20the%20local%20geometric%20and%20mechanical%20relationships%20between%20tissue%20and%20its%20anatomical%20attachments%20in%20colorectal%20surgery.%20This%20representation%20reduces%20uncertainty%20in%20grasping%20point%20prediction%20by%20normalizing%20surgical%20scenes%20into%20a%20consistent%20local%20reference%20frame.%20We%20demonstrate%20that%20attachment%20anchors%20can%20be%20predicted%20from%20laparoscopic%20images%20and%20incorporated%20into%20a%20grasping%20framework%20based%20on%20machine%20learning.%20Experiments%20on%20a%20dataset%20of%2090%20colorectal%20surgeries%20demonstrate%20that%20attachment%20anchors%20improve%20grasping%20point%20prediction%20compared%20to%20image-only%20baselines.%20There%20are%20particularly%20strong%20gains%20in%20out-of-distribution%20settings%2C%20including%20unseen%20procedures%20and%20operating%20surgeons.%20These%20results%20suggest%20that%20attachment%20anchors%20are%20an%20effective%20intermediate%20representation%20for%20learning-based%20tissue%20manipulation%20in%20colorectal%20surgery.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17310v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttachment%2520Anchors%253A%2520A%2520Novel%2520Framework%2520for%2520Laparoscopic%2520Grasping%2520Point%2520Prediction%2520in%2520Colorectal%2520Surgery%26entry.906535625%3DDennis%2520N.%2520Schneider%2520and%2520Lars%2520Wagner%2520and%2520Daniel%2520Rueckert%2520and%2520Dirk%2520Wilhelm%26entry.1292438233%3DAccurate%2520grasping%2520point%2520prediction%2520is%2520a%2520key%2520challenge%2520for%2520autonomous%2520tissue%2520manipulation%2520in%2520minimally%2520invasive%2520surgery%252C%2520particularly%2520in%2520complex%2520and%2520variable%2520procedures%2520such%2520as%2520colorectal%2520interventions.%2520Due%2520to%2520their%2520complexity%2520and%2520prolonged%2520duration%252C%2520colorectal%2520procedures%2520have%2520been%2520underrepresented%2520in%2520current%2520research.%2520At%2520the%2520same%2520time%252C%2520they%2520pose%2520a%2520particularly%2520interesting%2520learning%2520environment%2520due%2520to%2520repetitive%2520tissue%2520manipulation%252C%2520making%2520them%2520a%2520promising%2520entry%2520point%2520for%2520autonomous%252C%2520machine%2520learning-driven%2520support.%2520Therefore%252C%2520in%2520this%2520work%252C%2520we%2520introduce%2520attachment%2520anchors%252C%2520a%2520structured%2520repre {"title": "DRetHTR: Linear-Time Decoder-Only Retentive Network for Handwritten Text Recognition", "author": "Changhun Kim and Martin Mayr and Thomas Gorges and Fei Wu and Mathias Seuret and Andreas Maier and Vincent Christlein", "abstract": "State-of-the-art handwritten text recognition (HTR) systems commonly use Transformers, whose growing key-value (KV) cache makes decoding slow and memory-intensive. We introduce DRetHTR, a decoder-only model built on Retentive Networks (RetNet). Compared to an equally sized decoder-only Transformer baseline, DRetHTR delivers 1.6-1.9x faster inference with 38-42% less memory usage, without loss of accuracy. By replacing softmax attention with softmax-free retention and injecting multi-scale sequential priors, DRetHTR avoids a growing KV cache: decoding is linear in output length in both time and memory. To recover the local-to-global inductive bias of attention, we propose layer-wise gamma scaling, which progressively enlarges the effective retention horizon in deeper layers. This encourages early layers to model short-range dependencies and later layers to capture broader context, mitigating the flexibility gap introduced by removing softmax. Consequently, DRetHTR achieves best reported test character error rates of 2.26% (IAM-A, en), 1.81% (RIMES, fr), and 3.46% (Bentham, en), and is competitive on READ-2016 (de) with 4.21%. This demonstrates that decoder-only RetNet enables Transformer-level HTR accuracy with substantially improved decoding speed and memory efficiency.", "link": "http://arxiv.org/abs/2602.17387v1", "date": "2026-02-19", "relevancy": 2.0429, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.538}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5157}, {"title": "Boosted dynamic neural networks", "link": "ht {"title": "BEADs: Bias Evaluation Across Domains", "author": "Shaina Raza and Mizanur Rahman and Michael R. Zhang", "abstract": "Recent advances in large language models (LLMs) have substantially improved natural language processing (NLP) applications. However, these models often inherit and amplify biases present in their training data. Although several datasets exist for bias detection, most are limited to one or two NLP tasks, typically classification or evaluation and do not provide broad coverage across diverse task settings. To address this gap, we introduce the \\textbf{Bias Evaluations Across Domains} (\\textbf{B}\\texttt{EADs}) dataset, designed to support a wide range of NLP tasks, including text classification, token classification, bias quantification, and benign language generation. A key contribution of this work is a gold-standard annotation scheme that supports both evaluation and supervised training of language models. Experiments on state-of-the-art models reveal some gaps: some models exhibit systematic bias toward specific demographics, while others apply safety guardrails more strictly or inconsistently across groups. Overall, these results highlight persistent shortcomings in current models and underscore the need for comprehensive bias evaluation. Project: https://vectorinstitute.github.io/BEAD/ Data: https://huggingface.co/datasets/shainar/BEAD", "link": "http://arxiv.org/abs/2406.04220v6", "date": "2026-02-19", "relevancy": 2.0356, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.517}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5055}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.497}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BEADs%3A%20Bias%20Evaluation%20Across%20Domains&body=Title%3A%20BEADs%3A%20Bias%20Evaluation%20Across%20Domains%0AAuthor%3A%20Shaina%20Raza%20and%20Mizanur%20Rahman%20and%20Michael%20R.%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20large%20language%20models%20%28LLMs%29%20have%20substantially%20improved%20natural%20language%20processing%20%28NLP%29%20applications.%20However%2C%20these%20models%20often%20inherit%20and%20amplify%20biases%20present%20in%20their%20training%20data.%20Although%20several%20datasets%20exist%20for%20bias%20detection%2C%20most%20are%20limited%20to%20one%20or%20two%20NLP%20tasks%2C%20typically%20classification%20or%20evaluation%20and%20do%20not%20provide%20broad%20coverage%20across%20diverse%20task%20settings.%20To%20address%20this%20gap%2C%20we%20introduce%20the%20%5Ctextbf%7BBias%20Evaluations%20Across%20Domains%7D%20%28%5Ctextbf%7BB%7D%5Ctexttt%7BEADs%7D%29%20dataset%2C%20designed%20to%20support%20a%20wide%20range%20of%20NLP%20tasks%2C%20including%20text%20classification%2C%20token%20classification%2C%20bias%20quantification%2C%20and%20benign%20language%20generation.%20A%20key%20contribution%20of%20this%20work%20is%20a%20gold-standard%20annotation%20scheme%20that%20supports%20both%20evaluation%20and%20supervised%20training%20of%20language%20models.%20Experiments%20on%20state-of-the-art%20models%20reveal%20some%20gaps%3A%20some%20models%20exhibit%20systematic%20bias%20toward%20specific%20demographics%2C%20while%20others%20apply%20safety%20guardrails%20more%20strictly%20or%20inconsistently%20across%20groups.%20Overall%2C%20these%20results%20highlight%20persistent%20shortcomings%20in%20current%20models%20and%20underscore%20the%20need%20for%20comprehensive%20bias%20evaluation.%20Project%3A%20https%3A//vectorinstitute.github.io/BEAD/%20Data%3A%20https%3A//huggingface.co/datasets/shainar/BEAD%0ALink%3A%20http%3A//arxiv.org/abs/2406.04220v6%0AForm%3A%20https%3A//docs.goog {"title": "A Multi-modal Detection System for Infrastructure-based Freight Signal Priority", "author": "Ziyan Zhang and Chuheng Wei and Xuanpeng Zhao and Siyan Li and Will Snyder and Mike Stas and Peng Hao and Kanok Boriboonsomsin and Guoyuan Wu", "abstract": "Freight vehicles approaching signalized intersections require reliable detection and motion estimation to support infrastructure-based Freight Signal Priority (FSP). Accurate and timely perception of vehicle type, position, and speed is essential for enabling effective priority control strategies. This paper presents the design, deployment, and evaluation of an infrastructure-based multi-modal freight vehicle detection system integrating LiDAR and camera sensors. A hybrid sensing architecture is adopted, consisting of an intersection-mounted subsystem and a midblock subsystem, connected via wireless communication for synchronized data transmission. The perception pipeline incorporates both clustering-based and deep learning-based detection methods with Kalman filter tracking to achieve stable real-time performance. LiDAR measurements are registered into geodetic reference frames to support lane-level localization and consistent vehicle tracking. Field evaluations demonstrate that the system can reliably monitor freight vehicle movements at high spatio-temporal resolution. The design and deployment provide practical insights for developing infrastructure-based sensing systems to support FSP applications.", "link": "http://arxiv.org/abs/2602.17252v1", "date": "2026-02-19", "relevancy": 2.0339, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5359}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5058}, {"title": "DDM-NET: End-to-end learning of keypoint feature {"title": "Retrospective In-Context Learning for Temporal Credit Assignment with Large Language Models", "author": "Wen-Tse Chen and Jiayu Chen and Fahim Tajwar and Hao Zhu and Xintong Duan and Ruslan Salakhutdinov and Jeff Schneider", "abstract": "Learning from self-sampled data and sparse environmental feedback remains a fundamental challenge in training self-evolving agents. Temporal credit assignment mitigates this issue by transforming sparse feedback into dense supervision signals. However, previous approaches typically depend on learning task-specific value functions for credit assignment, which suffer from poor sample efficiency and limited generalization. In this work, we propose to leverage pretrained knowledge from large language models (LLMs) to transform sparse rewards into dense training signals (i.e., the advantage function) through retrospective in-context learning (RICL). We further propose an online learning framework, RICOL, which iteratively refines the policy based on the credit assignment results from RICL. We empirically demonstrate that RICL can accurately estimate the advantage function with limited samples and effectively identify critical states in the environment for temporal credit assignment. Extended evaluation on four BabyAI scenarios show that RICOL achieves comparable convergent performance with traditional online RL algorithms with significantly higher sample efficiency. Our findings highlight the potential of leveraging LLMs for temporal credit assignment, paving the way for more sample-efficient and generalizable RL paradigms.", "link": "http://arxiv.org/abs/2602.17497v1", "date": "2026-02-19", "relevancy": 2.0324, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5119}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity" four%20BabyAI%20scenarios%20show%20that%20RICOL%20achieves%20comparable%20convergent%20performance%20with%20traditional%20online%20RL%20algorithms%20with%20significantly%20higher%20sample%20efficiency.%20Our%20findings%20highlight%20the%20potential%20of%20leveraging%20LLMs%20for%20temporal%20credit%20assignment%2C%20paving%20the%20way%20for%20more%20sample-efficient%20and%20generalizable%20RL%20paradigms.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17497v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRetrospective%2520In-Context%2520Learning%2520for%2520Temporal%2520Credit%2520Assignment%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DWen-Tse%2520Chen%2520and%2520Jiayu%2520Chen%2520and%2520Fahim%2520Tajwar%2520and%2520Hao%2520Zhu%2520and%2520Xintong%2520Duan%2520and%2520Ruslan%2520Salakhutdinov%2520and%2520Jeff%2520Schneider%26entry.1292438233%3DLearning%2520from%2520self-sampled%2520data%2520and%2520sparse%2520environmental%2520feedback%2520remains%2520a%2520fundamental%2520challenge%2520in%2520training%2520self-evolving%2520agents.%2520Temporal%2520credit%2520assignment%2520mitigates%2520this%2520issue%2520by%2520transforming%2520sparse%2520feedback%2520into%2520dense%2520supervision%2520signals.%2520However%252C%2520previous%2520approaches%2520typically%2520depend%2520on%2520learning%2520task-specific%2520value%2520functions%2520for%2520credit%2520assignment%252C%2520which%2520suffer%2520from%2520poor%2520sample%2520efficiency%2520and%2520limited%2520generalization.%2520In%2520this%2520work%252C%2520we%2520propose%2520to%2520leverage%2520pretrained%2520knowledge%2520from%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520transform%2520sparse%2520rewards%2520into%2520dense%2520training%2520signals%2520%2528i.e.%252C%2520the%2520advantage%2520function%2529%2520through%2520retrospective%2520in-context%2520learning%2520%2528RICL%2529.%2520We%2520further%2 {"title": "Application and Evaluation of the Common Circles Method", "author": "Michael Quellmalz and Mia Kv\u00e5le L\u00f8vmo and Simon Moser and Franziska Strasser and Monika Ritsch-Marte", "abstract": "We investigate the application of the common circle method for estimating sample motion in optical diffraction tomography (ODT) of sub-millimeter sized biological tissue. When samples are confined via contact-free acoustical force fields, their motion must be estimated from the captured images. The common circle method identifies intersections of Ewald spheres in Fourier space to determine rotational motion. This paper presents a practical implementation, incorporating temporal consistency constraints to achieve stable reconstructions. Our results on both simulated and real-world data demonstrate that the common circle method provides a computationally efficient alternative to full optimization methods for motion detection.", "link": "http://arxiv.org/abs/2602.17353v1", "date": "2026-02-19", "relevancy": 2.0221, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.509}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.509}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4881}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Application%20and%20Evaluation%20of%20the%20Common%20Circles%20Method&body=Title%3A%20Application%20and%20Evaluation%20of%20the%20Common%20Circles%20Method%0AAuthor%3A%20Michael%20Quellmalz%20and%20Mia%20Kv%C3%A5le%20L%C3%B8vmo%20and%20Simon%20Moser%20and%20Franziska%20Strasser%20and%20Monika%20Ritsch-Marte%0AAbstract%3A%20We%20investigate%20the%20application%20of%20the%20common%20circle%20method%20for%20estimating%20sample%20motion%20in%20optical%20 {"title": "AI Gamestore: Scalable, Open-Ended Evaluation of Machine General Intelligence with Human Games", "author": "Lance Ying and Ryan Truong and Prafull Sharma and Kaiya Ivy Zhao and Nathan Cloos and Kelsey R. Allen and Thomas L. Griffiths and Katherine M. Collins and Jos\u00e9 Hern\u00e1ndez-Orallo and Phillip Isola and Samuel J. Gershman and Joshua B. Tenenbaum", "abstract": "Rigorously evaluating machine intelligence against the broad spectrum of human general intelligence has become increasingly important and challenging in this era of rapid technological advance. Conventional AI benchmarks typically assess only narrow capabilities in a limited range of human activity. Most are also static, quickly saturating as developers explicitly or implicitly optimize for them. We propose that a more promising way to evaluate human-like general intelligence in AI systems is through a particularly strong form of general game playing: studying how and how well they play and learn to play \\textbf{all conceivable human games}, in comparison to human players with the same level of experience, time, or other resources. We define a \"human game\" to be a game designed by humans for humans, and argue for the evaluative suitability of this space of all such games people can imagine and enjoy -- the \"Multiverse of Human Games\". Taking a first step towards this vision, we introduce the AI GameStore, a scalable and open-ended platform that uses LLMs with humans-in-the-loop to synthesize new representative human games, by automatically sourcing and adapting standardized and containerized variants of game environments from popular human digital gaming platforms. As a proof of concept, we generated 100 such games based on the top charts of Apple App Store and Steam, and evaluated seven frontier vision-language models (VLMs) on short episodes of play. The best models achieved less than 10\\% of the human average score on the majority of the games, and especially struggled with games that challenge world-model learning, memory and planning. We conclude with a set of next steps for building out the AI GameStore as a practical way to measure and drive progress toward human-like general intelligence in machines.", "link": "http://arxiv.org/abs/2602.17594v1", "date": "2026-02-19", "relevancy": 2.0093, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5298}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5101}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4717}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI%20Gamestore%3A%20Scalable%2C%20Open-Ended%20Evaluation%20of%20Machine%20General%20Intelligence%20with%20Human%20Games&body=Title%3A%20AI%20Gamestore%3A%20Scalable%2C%20Open-Ended%20Evaluation%20of%20Machine%20General%20Intelligence%20with%20Human%20Games%0AAuthor%3A%20Lance%20Ying%20and%20Ryan%20Truong%20and%20Prafull%20Sharma%20and%20Kaiya%20Ivy%20Zhao%20and%20Nathan%20Cloos%20and%20Kelsey%20R.%20Allen%20and%20Thomas%20L.%20Griffiths%20and%20Katherine%20M.%20Collins%20and%20Jos%C3%A9%20Hern%C3%A1ndez-Orallo%20and%20Phillip%20Isola%20and%20Samuel%20J.%20Gershman%20and%20Joshua%20B.%20Tenenbaum%0AAbstract%3A%20Rigorously%20evaluating%20machine%20intelligence%20against%20the%20broad%20spectrum%20of%20human%20general%20intelligence%20has%20become%20increasingly%20important%20and%20challenging%20in%20this%20era%20of%20rapid%20technological%20advance.%20Conventional%20AI%20benchmarks%20typically%20assess%20only%20narrow%20capabilities%20in%20a%20limited%20range%20of%20human%20activity.%20Most%20are%20also%20static%2C%20quickly%20saturating%20as%20developers%20explicitly%20or%20implicitly%20optimize%20for%20them.%20We%20propose%20that%20a%20more%20promising%20way%20to%20evaluate%20human-like%20general%20intelligence%20in%20AI%20systems%20is%20through%20a%20particularly%20strong%20form%20of%20general%20game%20playing%3A%20studying%20how%20and%20how%20well%20they%20play%20and%20learn%20to%20play%20%5Ctextbf%7Ball%20conceivable%20human%20games%7D%2C%20in%20comparison%20to%20human%20players%20with%20the%20same%20level%20of%20experience%2C%20time%2C%20or%20other%20resources.%20We%20define%20a%20%22human%20game%22%20to%20be%20a%20game%20designed%20by%20humans%20for%20humans%2C%20and%20argue%20for%20the%20evaluative%20suitability%20of%20this%20space%20of%20all%20such%20games%20people%20can%20imagine%20and%20enjoy%20--%20the%20%22Multiverse%20of%20Human%20Games%22.%20Taking%20a%20first%20step%20towards%20this%20vision%2C%20we%20introduce%20the%20AI%20GameStore%2C%20a%20scalable%20and%20open-ended%20platform%20that%20uses%20LLMs%20with%20humans-in-the-loop%20to%20synthesize%20new%20representative%20human%20games%2C%20by%20automatically%20sourcing%20and%20adapting%20standardized%20and%20containerized%20variants%20of%20game%20environments%20from%20popular%20human%20digital%20gaming%20platforms.%20As%20a%20proof%20of%20concept%2C%20we%20generated%20100%20such%20games%20based%20on%20the%20top%20charts%20of%20Apple%20App%20Store%20and%20Steam%2C%20and%20evaluated%20seven%20frontier%20vision-language%20models%20%28VLMs%29%20on%20short%20episodes%20of%20play.%20The%20best%20models%20achieved%20less%20than%2010%5C%25%20of%20the%20human%20average%20score%20on%20the%20majority%20of%20the%20games%2C%20and%20especially%20struggled%20with%20games%20that%20challenge%20world-model%20learning%2C%20memory%20and%20planning.%20We%20conclude%20with%20a%20set%20of%20next%20steps%20for%20building%20out%20the%20AI%20GameStore%20as%20a%20practical%20way%20to%20measure%20and%20drive%20progress%20toward%20human-like%20general%20intelligence%20in%20machines.%0ALink%3A%20http%3A {"title": "CoSpaDi: Compressing LLMs via Calibration-Guided Sparse Dictionary Learning", "author": "Denis Makhov and Dmitriy Shopkhoev and Magauiya Zhussip and Ammar Ali and Stamatios Lefkimmiatis", "abstract": "Post-training compression of large language models (LLMs) often relies on low-rank weight approximations that represent each column of the weight matrix in a shared low-dimensional subspace. This strategy is computationally efficient but the underlying constraint can be overly rigid for heterogeneous projection weights and may incur avoidable accuracy loss. We propose CoSpaDi (Compression via Sparse Dictionary Learning), a training-free framework that replaces low-rank factorization with a structured sparse decomposition in which each weight matrix is represented as a dense dictionary multiplied by a column-sparse coefficient matrix. This yields a union-of-subspaces model: the columns of the weight matrix are represented as linear combinations of different subsets of dictionary atoms, improving expressiveness at a fixed parameter budget. CoSpaDi is calibration-guided: using a small calibration set, we optimize the factorization to minimize functional reconstruction error of layer outputs rather than weight-space error. An activation-derived Gram orthonormalization reformulates this data-aware objective into a standard dictionary learning problem on transformed weights, and we support both per-layer compression and cross-layer dictionary sharing within groups of similar projections. Across Llama and Qwen model families, CoSpaDi consistently improves the accuracy--compression and perplexity--compression trade-offs over state-of-the-art SVD-based baselines and strong structured pruning baselines at 20-40\\% compression ratios. The resulting structured sparsity enables sparse--dense computation and integrates with post-training quantization of the sparse coefficients.", "link": "http://arxiv.org/abs/2509.22075v4", "date": "2026-02-19", "relevancy": 2.0036, "topK {"title": "Learning to Stay Safe: Adaptive Regularization Against Safety Degradation during Fine-Tuning", "author": "Jyotin Goel and Souvik Maji and Pratik Mazumder", "abstract": "Instruction-following language models are trained to be helpful and safe, yet their safety behavior can deteriorate under benign fine-tuning and worsen under adversarial updates. Existing defenses often offer limited protection or force a trade-off between safety and utility. We introduce a training framework that adapts regularization in response to safety risk, enabling models to remain aligned throughout fine-tuning. To estimate safety risk at training time, we explore two distinct approaches: a judge-based Safety Critic that assigns high-level harm scores to training batches, and an activation-based risk predictor built with a lightweight classifier trained on intermediate model activations to estimate harmful intent. Each approach provides a risk signal that is used to constrain updates deemed higher risk to remain close to a safe reference policy, while lower-risk updates proceed with standard training. We empirically verify that harmful intent signals are predictable from pre-generation activations and that judge scores provide effective high-recall safety guidance. Across multiple model families and attack scenarios, adaptive regularization with either risk estimation approach consistently lowers attack success rate compared to standard fine-tuning, preserves downstream performance, and adds no inference-time cost. This work demonstrates a principled mechanism for maintaining safety without sacrificing utility.", "link": "http://arxiv.org/abs/2602.17546v1", "date": "2026-02-19", "relevancy": 2.0029, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5322}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http

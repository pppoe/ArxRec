{"title": "Polynomially Over-Parameterized Convolutional Neural Networks Contain Structured Strong Winning Lottery Tickets", "author": "Arthur da Cunha and Francesco d'Amore and Emanuele Natale", "abstract": "The Strong Lottery Ticket Hypothesis (SLTH) states that randomly-initialised neural networks likely contain subnetworks that perform well without any training. Although unstructured pruning has been extensively studied in this context, its structured counterpart, which can deliver significant computational and memory efficiency gains, has been largely unexplored. One of the main reasons for this gap is the limitations of the underlying mathematical tools used in formal analyses of the SLTH. In this paper, we overcome these limitations: we leverage recent advances in the multidimensional generalisation of the Random Subset-Sum Problem and obtain a variant that admits the stochastic dependencies that arise when addressing structured pruning in the SLTH. We apply this result to prove, for a wide class of random Convolutional Neural Networks, the existence of structured subnetworks that can approximate any sufficiently smaller network. This result provides the first sub-exponential bound around the SLTH for structured pruning, opening up new avenues for further research on the hypothesis and contributing to the understanding of the role of over-parameterization in deep learning.", "link": "http://arxiv.org/abs/2311.09858v2", "date": "2026-03-10", "relevancy": 2.317, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.48}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4555}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Polynomially%20Over-Parameterized%20Convolutional%20Neural%20Networks%20Contain%20Structured%20Strong%20Winning%20Lottery%20Tickets&body=Title%3A%20Polynomially%20Over-Parameterized%20Convolutional%20Neural%20Networks%20Contain%20Structured%20Strong%20Winning%20Lottery%20Tickets%0AAuthor%3A%20Arthur%20da%20Cunha%20and%20Francesco%20d%27Amore%20and%20Emanuele%20Natale%0AAbstract%3A%20The%20Strong%20Lottery%20Ticket%20Hypothesis%20%28SLTH%29%20states%20that%20randomly-initialised%20neural%20networks%20likely%20contain%20subnetworks%20that%20perform%20well%20without%20any%20training.%20Although%20unstructured%20pruning%20has%20been%20extensively%20studied%20in%20this%20context%2C%20its%20structured%20counterpart%2C%20which%20can%20deliver%20significant%20computational%20and%20memory%20efficiency%20gains%2C%20has%20been%20largely%20unexplored.%20One%20of%20the%20main%20reasons%20for%20this%20gap%20is%20the%20limitations%20of%20the%20underlying%20mathematical%20tools%20used%20in%20formal%20analyses%20of%20the%20SLTH.%20In%20this%20paper%2C%20we%20overcome%20these%20limitations%3A%20we%20leverage%20recent%20advances%20in%20the%20multidimensional%20generalisation%20of%20the%20Random%20Subset-Sum%20Problem%20and%20obtain%20a%20variant%20that%20admits%20the%20stochastic%20dependencies%20that%20arise%20when%20addressing%20structured%20pruning%20in%20the%20SLTH.%20We%20apply%20this%20result%20to%20prove%2C%20for%20a%20wide%20class%20of%20random%20Convolutional%20Neural%20Networks%2C%20the%20existence%20of%20structured%20subnetworks%20that%20can%20approximate%20any%20sufficiently%20smaller%20network.%20This%20result%20provides%20the%20first%20sub-exponential%20bound%20around%20the%20SLTH%20for%20structured%20pruning%2C%20opening%20up%20new%20avenues%20for%20further%20research%20on%20the%20hypothesis%20and%20contributing%20to%20the%20understanding%20of%20the%20role%20of%20over-parameterization%20in%20deep%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2311.09858v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPolynomially%2520Over-Parameterized%2520Convolutional%2520Neural%2520Networks%2520Contain%2520Structured%2520Strong%2520Winning%2520Lottery%2520Tickets%26entry.906535625%3DArthur%2520da%2520Cunha%2520and%2520Francesco%2520d%2527Amore%2520and%2520Emanuele%2520Natale%26entry.1292438233%3DThe%2520Strong%2520Lottery%2520Ticket%2520Hypothesis%2520%2528SLTH%2529%2520states%2520that%2520randomly-initialised%2520neural%2520networks%2520likely%2520contain%2520subnetworks%2520that%2520perform%2520well%2520without%2520any%2520training.%2520Although%2520unstructured%2520pruning%2520has%2520been%2520extensively%2520studied%2520in%2520this%2520context%252C%2520its%2520structured%2520counterpart%252C%2520which%2520can%2520deliver%2520significant%2520computational%2520and%2520memory%2520efficiency%2520gains%252C%2520has%2520been%2520largely%2520unexplored.%2520One%2520of%2520the%2520main%2520reasons%2520for%2520this%2520gap%2520is%2520the%2520limitations%2520of%2520the%2520underlying%2520mathematical%2520tools%2520used%2520in%2520formal%2520analyses%2520of%2520the%2520SLTH.%2520In%2520this%2520paper%252C%2520we%2520overcome%2520these%2520limitations%253A%2520we%2520leverage%2520recent%2520advances%2520in%2520the%2520multidimensional%2520generalisation%2520of%2520the%2520Random%2520Subset-Sum%2520Problem%2520and%2520obtain%2520a%2520variant%2520that%2520admits%2520the%2520stochastic%2520dependencies%2520that%2520arise%2520when%2520addressing%2520structured%2520pruning%2520in%2520the%2520SLTH.%2520We%2520apply%2520this%2520result%2520to%2520prove%252C%2520for%2520a%2520wide%2520class%2520of%2520random%2520Convolutional%2520Neural%2520Networks%252C%2520the%2520existence%2520of%2520structured%2520subnetworks%2520that%2520can%2520approximate%2520any%2520sufficiently%2520smaller%2520network.%2520This%2520result%2520provides%2520the%2520first%2520sub-exponential%2520bound%2520around%2520the%2520SLTH%2520for%2520structured%2520pruning%252C%2520opening%2520up%2520new%2520avenues%2520for%2520further%2520research%2520on%2520the%2520hypothesis%2520and%2520contributing%2520to%2520the%2520understanding%2520of%2520the%2520role%2520of%2520over-parameterization%2520in%2520deep%2520learning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2311.09858v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Polynomially%20Over-Parameterized%20Convolutional%20Neural%20Networks%20Contain%20Structured%20Strong%20Winning%20Lottery%20Tickets&entry.906535625=Arthur%20da%20Cunha%20and%20Francesco%20d%27Amore%20and%20Emanuele%20Natale&entry.1292438233=The%20Strong%20Lottery%20Ticket%20Hypothesis%20%28SLTH%29%20states%20that%20randomly-initialised%20neural%20networks%20likely%20contain%20subnetworks%20that%20perform%20well%20without%20any%20training.%20Although%20unstructured%20pruning%20has%20been%20extensively%20studied%20in%20this%20context%2C%20its%20structured%20counterpart%2C%20which%20can%20deliver%20significant%20computational%20and%20memory%20efficiency%20gains%2C%20has%20been%20largely%20unexplored.%20One%20of%20the%20main%20reasons%20for%20this%20gap%20is%20the%20limitations%20of%20the%20underlying%20mathematical%20tools%20used%20in%20formal%20analyses%20of%20the%20SLTH.%20In%20this%20paper%2C%20we%20overcome%20these%20limitations%3A%20we%20leverage%20recent%20advances%20in%20the%20multidimensional%20generalisation%20of%20the%20Random%20Subset-Sum%20Problem%20and%20obtain%20a%20variant%20that%20admits%20the%20stochastic%20dependencies%20that%20arise%20when%20addressing%20structured%20pruning%20in%20the%20SLTH.%20We%20apply%20this%20result%20to%20prove%2C%20for%20a%20wide%20class%20of%20random%20Convolutional%20Neural%20Networks%2C%20the%20existence%20of%20structured%20subnetworks%20that%20can%20approximate%20any%20sufficiently%20smaller%20network.%20This%20result%20provides%20the%20first%20sub-exponential%20bound%20around%20the%20SLTH%20for%20structured%20pruning%2C%20opening%20up%20new%20avenues%20for%20further%20research%20on%20the%20hypothesis%20and%20contributing%20to%20the%20understanding%20of%20the%20role%20of%20over-parameterization%20in%20deep%20learning.&entry.1838667208=http%3A//arxiv.org/abs/2311.09858v2&entry.124074799=Read"},
{"title": "Learning the Hierarchical Organization in Brain Network for Brain Disorder Diagnosis", "author": "Jingfeng Tang and Peng Cao and Guangqi Wen and Jinzhu Yang and Xiaoli Liu and Osmar R. Zaiane", "abstract": "Brain network analysis based on functional Magnetic Resonance Imaging (fMRI) is pivotal for diagnosing brain disorders. Existing approaches typically rely on predefined functional sub-networks to construct sub-network associations. However, we identified many cross-network interaction patterns with high Pearson correlations that this strict, prior-based organization fails to capture. To overcome this limitation, we propose the Brain Hierarchical Organization Learning (BrainHO) to learn inherently hierarchical brain network dependencies based on their intrinsic features rather than predefined sub-network labels. Specifically, we design a hierarchical attention mechanism that allows the model to aggregate nodes into a hierarchical organization, effectively capturing intricate connectivity patterns at the subgraph level. To ensure diverse, complementary, and stable organizations, we incorporate an orthogonality constraint loss, alongside a hierarchical consistency constraint strategy, to refine node-level features using high-level graph semantics. Extensive experiments on the publicly available ABIDE and REST-meta-MDD datasets demonstrate that BrainHO not only achieves state-of-the-art classification performance but also uncovers interpretable, clinically significant biomarkers by precisely localizing disease-related sub-networks.", "link": "http://arxiv.org/abs/2603.09606v1", "date": "2026-03-10", "relevancy": 2.3139, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4747}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.457}, {" y%2520capturing%2520intricate%2520connectivity%2520patterns%2520at%2520the%2520subgraph%2520level.%2520To%2520ensure%2520diverse%252C%2520complementary%252C%2520and%2520stable%2520organizations%252C%2520we%2520incorporate%2520an%2520orthogonality%2520constraint%2520loss%252C%2520alongside%2520a%2520hierarchical%2520consistency%2520constraint%2520strategy%252C%2520to%2520refine%2520node-level%2520features%2520using%2520high-level%2520graph%2520semantics.%2520Extensive%2520experiments%2520on%2520the%2520publicly%2520available%2520ABIDE%2520and%2520REST-meta-MDD%2520datasets%2520demonstrate%2520that%2520BrainHO%2520not%2520only%2520achieves%2520state-of-the-art%2520classification%2520performance%2520but%2520also%2520uncovers%2520interpretable%252C%2520clinically%2520significant%2520biomarkers%2520by%2520precisely%2520localizing%2520disease-related%2520sub-networks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09606v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20the%20Hierarchical%20Organization%20in%20Brain%20Network%20for%20Brain%20Disorder%20Diagnosis&entry.906535625=Jingfeng%20Tang%20and%20Peng%20Cao%20and%20Guangqi%20Wen%20and%20Jinzhu%20Yang%20and%20Xiaoli%20Liu%20and%20Osmar%20R.%20Zaiane&entry.1292438233=Brain%20network%20analysis%20based%20on%20functional%20Magnetic%20Resonance%20Imaging%20%28fMRI%29%20is%20pivotal%20for%20diagnosing%20brain%20disorders.%20Existing%20approaches%20typically%20rely%20on%20predefined%20functional%20sub-networks%20to%20construct%20sub-network%20associations.%20However%2C%20we%20identified%20many%20cross-network%20interaction%20patterns%20with%20high%20Pearson%20correlations%20that%20this%20strict%2C%20prior-based%20organization%20fails%20to%20capture.%20To%20overcome%20this%20limitation%2C%20we%20propose%20the%20Brain%20Hierarchical%20Organization%20Learning%20%28BrainHO%29%20to%20learn%20inherently%20hierarc {"title": "Towards Understanding Adam Convergence on Highly Degenerate Polynomials", "author": "Zhiwei Bai and Jiajie Zhao and Zhangchen Zhou and Zhi-Qin John Xu and Yaoyu Zhang", "abstract": "Adam is a widely used optimization algorithm in deep learning, yet the specific class of objective functions where it exhibits inherent advantages remains underexplored. Unlike prior studies requiring external schedulers and $\u03b2_2$ near 1 for convergence, this work investigates the \"natural\" auto-convergence properties of Adam. We identify a class of highly degenerate polynomials where Adam converges automatically without additional schedulers. Specifically, we derive theoretical conditions for local asymptotic stability on degenerate polynomials and demonstrate strong alignment between theoretical bounds and experimental results. We prove that Adam achieves local linear convergence on these degenerate functions, significantly outperforming the sub-linear convergence of Gradient Descent and Momentum. This acceleration stems from a decoupling mechanism between the second moment $v_t$ and squared gradient $g_t^2$, which exponentially amplifies the effective learning rate. Finally, we characterize Adam's hyperparameter phase diagram, identifying three distinct behavioral regimes: stable convergence, spikes, and SignGD-like oscillation.", "link": "http://arxiv.org/abs/2603.09581v1", "date": "2026-03-10", "relevancy": 2.3128, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4866}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4533}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Understanding%20Adam%20Convergence%20on%20Highly%20Degenerate%20Polynomials&body=Title%3A%20Towards%20Understanding%20Adam%20Convergence%20on%20Highly%20Degenerate%20Polynomials%0AAuthor%3A%20Zhiwei%20Bai%20and%20Jiajie%20Zhao%20and%20Zhangchen%20Zhou%20and%20Zhi-Qin%20John%20Xu%20and%20Yaoyu%20Zhang%0AAbstract%3A%20Adam%20is%20a%20widely%20used%20optimization%20algorithm%20in%20deep%20learning%2C%20yet%20the%20specific%20class%20of%20objective%20functions%20where%20it%20exhibits%20inherent%20advantages%20remains%20underexplored.%20Unlike%20prior%20studies%20requiring%20external%20schedulers%20and%20%24%CE%B2_2%24%20near%201%20for%20convergence%2C%20this%20work%20investigates%20the%20%22natural%22%20auto-convergence%20properties%20of%20Adam.%20We%20identify%20a%20class%20of%20highly%20degenerate%20polynomials%20where%20Adam%20converges%20automatically%20without%20additional%20schedulers.%20Specifically%2C%20we%20derive%20theoretical%20conditions%20for%20local%20asymptotic%20stability%20on%20degenerate%20polynomials%20and%20demonstrate%20strong%20alignment%20between%20theoretical%20bounds%20and%20experimental%20results.%20We%20prove%20that%20Adam%20achieves%20local%20linear%20convergence%20on%20these%20degenerate%20functions%2C%20significantly%20outperforming%20the%20sub-linear%20convergence%20of%20Gradient%20Descent%20and%20Momentum.%20This%20acceleration%20stems%20from%20a%20decoupling%20mechanism%20between%20the%20second%20moment%20%24v_t%24%20and%20squared%20gradient%20%24g_t%5E2%24%2C%20which%20exponentially%20amplifies%20the%20effective%20learning%20rate.%20Finally%2C%20we%20characterize%20Adam%27s%20hyperparameter%20phase%20diagram%2C%20identifying%20three%20distinct%20behavioral%20regimes%3A%20stable%20convergence%2C%20spikes%2C%20and%20SignGD-like%20oscillation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09581v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Understanding%2520Adam%2520Convergence%2520on%2520Highly%2520Degenera 74799=Read"},
{"title": "On Catastrophic Forgetting in Low-Rank Decomposition-Based Parameter-Efficient Fine-Tuning", "author": "Muhammad Ahmad and Jingjing Zheng and Yankai Cao", "abstract": "Parameter-efficient fine-tuning (PEFT) based on low-rank decomposition, such as LoRA, has become a standard for adapting large pretrained models. However, its behavior in sequential learning -- specifically regarding catastrophic forgetting -- remains insufficiently understood. In this work, we present an empirical study showing that forgetting is strongly influenced by the geometry and parameterization of the update subspace. While methods that restrict updates to small, shared matrix subspaces often suffer from task interference, tensor-based decompositions (e.g., LoRETTA) mitigate forgetting by capturing richer structural information within ultra-compact budgets, and structurally aligned parameterizations (e.g., WeGeFT) preserve pretrained representations. Our findings highlight update subspace design as a key factor in continual learning and offer practical guidance for selecting efficient adaptation strategies in sequential settings.", "link": "http://arxiv.org/abs/2603.09684v1", "date": "2026-03-10", "relevancy": 2.3112, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4745}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4614}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20Catastrophic%20Forgetting%20in%20Low-Rank%20Decomposition-Based%20Parameter-Efficient%20Fine-Tuning&body=Title%3A%20On%20Catastrophic%20Forgetting%20in%20Low-Rank%20Decomposition-Based%20Parameter-Efficient%20Fine-Tuning%0AAuthor%3A%20Muhammad%20Ahmad%20and%20Jingjing%20Zheng%20and%20Yankai%20Cao%0AAbstract%3A%20Parameter-efficient%20fine-tuning%20%28PEFT%29%20based%20on%20low-rank%20decomposition%2C%20such%20as%20LoRA%2C%20has%20become%20a%20standard%20for%20adapting%20large%20pretrained%20models.%20However%2C%20its%20behavior%20in%20sequential%20learning%20--%20specifically%20regarding%20catastrophic%20forgetting%20--%20remains%20insufficiently%20understood.%20In%20this%20work%2C%20we%20present%20an%20empirical%20study%20showing%20that%20forgetting%20is%20strongly%20influenced%20by%20the%20geometry%20and%20parameterization%20of%20the%20update%20subspace.%20While%20methods%20that%20restrict%20updates%20to%20small%2C%20shared%20matrix%20subspaces%20often%20suffer%20from%20task%20interference%2C%20tensor-based%20decompositions%20%28e.g.%2C%20LoRETTA%29%20mitigate%20forgetting%20by%20capturing%20richer%20structural%20information%20within%20ultra-compact%20budgets%2C%20and%20structurally%20aligned%20parameterizations%20%28e.g.%2C%20WeGeFT%29%20preserve%20pretrained%20representations.%20Our%20findings%20highlight%20update%20subspace%20design%20as%20a%20key%20factor%20in%20continual%20learning%20and%20offer%20practical%20guidance%20for%20selecting%20efficient%20adaptation%20strategies%20in%20sequential%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09684v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520Catastrophic%2520Forgetting%2520in%2520Low-Rank%2520Decomposition-Based%2520Parameter-Efficient%2520Fine-Tuning%26entry.906535625%3DMuhammad%2520Ahmad%2520and%2520Jingjing%2520Zheng%2520and%2520Yankai%2520Cao%26entry.1292438233%3DParameter-efficient%2520fine-tuning%2520%2528PEFT%2529%2520based%2520on%2520low-rank%2520decomposition%252C%2520such%2520as%2520LoRA%252C%2520has%2520become%2520a%2520standard%2520for%2520adapting%2520large%2520pretrained%2520models.%2520However%252C%2520its%2520behavior%2520in%2520sequential%2520learning%2520--%2520specifically%2520regarding%2520catastrophic%2520forgetting%2520--%2520remains%2520insufficiently%2520understood.%2520In%2520this%2520work%252C%2520we%2520present%2520an%2520empirical%2520study%2520showing%2520that%2520forgetting%2520is%2520strongly%2520influenced%2520by%2520the%2520geometry%2520and%2520parameterization%2520of%2520the%2520update%2520subspace.%2520While%2520methods%2520that%2520restrict%2520updates%2520to%2520small%252C%2520shared%2520matrix%2520subspaces%2520often%2520suffer%2520from%2520task%2520interference%252C%2520tensor-based%2520decompositions%2520%2528e.g.%252C%2520LoRETTA%2529%2520mitigate%2520forgetting%2520by%2520capturing%2520richer%2520structural%2520information%2520within%2520ultra-compact%2520budgets%252C%2520and%2520structurally%2520aligned%2520parameterizations%2520%2528e.g.%252C%2520WeGeFT%2529%2520preserve%2520pretrained%2520representations.%2520Our%2520findings%2520highlight%2520update%2520subspace%2520design%2520as%2520a%2520key%2520factor%2520in%2520continual%2520learning%2520and%2520offer%2520practical%2520guidance%2520for%2520selecting%2520efficient%2520adaptation%2520strategies%2520in%2520sequential%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09684v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=On%20Catastrophic%20Forgetting%20in%20Low-Rank%20Decomposition-Based%20Parameter-Efficient%20Fine-Tuning&entry.906535625=Muhammad%20Ahmad%20and%20Jingjing%20Zheng%20and%20Yankai%20Cao&entry.1292438233=Parameter-efficient%20fine-tuning%20%28PEFT%29%20based%20on%20low-rank%20decomposition%2C%20such%20as%20LoRA%2C%20has%20become%20a%20standard%20for%20adapting%20large%20pretrained%20models.%20However%2C%20its%20behavior%20in%20sequential%20learning%20--%20specifically%20regarding%20catastrophic%20forgetting%20--%20remains%20insufficiently%20understood.%20In%20this%20work%2C%20we%20present%20an%20empirical%20study%20showing%20that%20forgetting%20is%20strongly%20influenced%20by%20the%20geometry%20and%20parameterization%20of%20the%20update%20subspace.%20While%20methods%20that%20restrict%20updates%20to%20small%2C%20shared%20matrix%20subspaces%20often%20suffer%20from%20task%20interference%2C%20tensor-based%20decompositions%20%28e.g.%2C%20LoRETTA%29%20mitigate%20forgetting%20by%20capturing%20richer%20structural%20information%20within%20ultra-compact%20budgets%2C%20and%20structurally%20aligned%20parameterizations%20%28e.g.%2C%20WeGeFT%29%20preserve%20pretrained%20representations.%20Our%20findings%20highlight%20update%20subspace%20design%20as%20a%20key%20factor%20in%20continual%20learning%20and%20offer%20practical%20guidance%20for%20selecting%20efficient%20adaptation%20strategies%20in%20sequential%20settings.&entry.1838667208=http%3A//arxiv.org/abs/2603.09684v1&entry.124074799=Read"},
{"title": "DP-IQA: Utilizing Diffusion Prior for Blind Image Quality Assessment in the Wild", "author": "Honghao Fu and Yufei Wang and Wenhan Yang and Alex C. Kot and Bihan Wen", "abstract": "Blind image quality assessment (IQA) in the wild, which assesses the quality of images with complex authentic distortions and no reference images, presents significant challenges. Given the difficulty in collecting large-scale training data, leveraging limited data to develop a model with strong generalization remains an open problem. Motivated by the robust image perception capabilities of pre-trained text-to-image (T2I) diffusion models, we propose a novel IQA method, diffusion priors-based IQA (DP-IQA), to utilize the T2I model's prior for improved performance and generalization ability. Specifically, we utilize pre-trained Stable Diffusion as the backbone, extracting multi-level features from the denoising U-Net guided by prompt embeddings through a tunable text adapter. Simultaneously, an image adapter compensates for information loss introduced by the lossy pre-trained encoder. Unlike T2I models that require full image distribution modeling, our approach targets image quality assessment, which inherently requires fewer parameters. To improve applicability, we distill the knowledge into a lightweight CNN-based student model, significantly reducing parameters while maintaining or even enhancing generalization performance. Experimental results demonstrate that DP-IQA achieves state-of-the-art performance on various in-the-wild datasets, highlighting the superior generalization capability of T2I priors in blind IQA tasks. To our knowledge, DP-IQA is the first method to apply pre-trained diffusion priors in blind IQA. Codes and checkpoints are available at https://github.com/RomGai/DP-IQA.", "link": "http://arxiv.org/abs/2405.19996v6", "date": "2026-03-10", "relevancy": 2.3055, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6323}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5665}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5638}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DP-IQA%3A%20Utilizing%20Diffusion%20Prior%20for%20Blind%20Image%20Quality%20Assessment%20in%20the%20Wild&body=Title%3A%20DP-IQA%3A%20Utilizing%20Diffusion%20Prior%20for%20Blind%20Image%20Quality%20Assessment%20in%20the%20Wild%0AAuthor%3A%20Honghao%20Fu%20and%20Yufei%20Wang%20and%20Wenhan%20Yang%20and%20Alex%20C.%20Kot%20and%20Bihan%20Wen%0AAbstract%3A%20Blind%20image%20quality%20assessment%20%28IQA%29%20in%20the%20wild%2C%20which%20assesses%20the%20quality%20of%20images%20with%20complex%20authentic%20distortions%20and%20no%20reference%20images%2C%20presents%20significant%20challenges.%20Given%20the%20difficulty%20in%20collecting%20large-scale%20training%20data%2C%20leveraging%20limited%20data%20to%20develop%20a%20model%20with%20strong%20generalization%20remains%20an%20open%20problem.%20Motivated%20by%20the%20robust%20image%20perception%20capabilities%20of%20pre-trained%20text-to-image%20%28T2I%29%20diffusion%20models%2C%20we%20propose%20a%20novel%20IQA%20method%2C%20diffusion%20priors-based%20IQA%20%28DP-IQA%29%2C%20to%20utilize%20the%20T2I%20model%27s%20prior%20for%20improved%20performance%20and%20generalization%20ability.%20Specifically%2C%20we%20utilize%20pre-trained%20Stable%20Diffusion%20as%20the%20backbone%2C%20extracting%20multi-level%20features%20from%20the%20denoising%20U-Net%20guided%20by%20prompt%20embeddings%20through%20a%20tunable%20text%20adapter.%20Simultaneously%2C%20an%20image%20adapter%20compensates%20for%20information%20loss%20introduced%20by%20the%20lossy%20pre-trained%20encoder.%20Unlike%20T2I%20models%20that%20require%20full%20image%20distribution%20modeling%2C%20our%20approach%20targets%20image%20quality%20assessment%2C%20which%20inherently%20requires%20fewer%20parameters.%20To%20improve%20applicability%2C%20we%20distill%20the%20knowledge%20into%20a%20lightweight%20CNN-based%20student%20model%2C%20significantly%20reducing%20parameters%20while%20maintaining%20or%20even%20enhancing%20generalization%20performance.%20Experimental%20results%20demonstrate%20that%20DP-IQA%20achieves%20state-of-the-art%20performance%20on%20various%20in-the-wild%20datasets%2C%20highlighting%20the%20superior%20generalization%20capability%20of%20T2I%20priors%20in%20blind%20IQA%20tasks.%20To%20our%20knowledge%2C%20DP-IQA%20is%20the%20first%20method%20to%20apply%20pre-trained%20diffusion%20priors%20in%20blind%20IQA.%20Codes%20and%20checkpoints%20are%20available%20at%20https%3A//github.com/RomGai/DP-IQA.%0ALink%3A%20http%3A//arxiv.org/abs/2405.19996v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDP-IQA%253A%2520Utilizing%2520Diffusion%2520Prior%2520for%2520Blind%2520Image%2520Quality%2520Assessment%2520in%2520the%2520Wild%26entry.906535625%3DHonghao%2520Fu%2520and%2520Yufei%2520Wang%2520and%2520Wenhan%2520Yang%2520and%2520Alex%2520C.%2520Kot%2520and%2520Bihan%2520Wen%26entry.1292438233%3DBlind%2520image%2520quality%2520assessment%2520%2528IQA%2529%2520in%2520the%2520wild%252C%2520which%2520assesses%2520the%2520quality%2520of%2520images%2520with%2520complex%2520authentic%2520distortions%2520and%2520no%2520reference%2520images%252C%2520presents%2520significant%2520challenges.%2520Given%2520the%2520difficulty%2520in%2520collecting%2520large-scale%2520training%2520data%252C%2520leveraging%2520limited%2520data%2520to%2520develop%2520a%2520model%2520with%2520strong%2520generalization%2520remains%2520an%2520open%2520problem.%2520Motivated%2520by%2520the%2520robust%2520image%2520perception%2520capabilities%2520of {"title": "SCDP: Learning Humanoid Locomotion from Partial Observations via Mixed-Observation Distillation", "author": "Milo Carroll and Tianhu Peng and Lingfan Bao and Chengxu Zhou and Zhibin Li", "abstract": "Distilling humanoid locomotion control from offline datasets into deployable policies remains a challenge, as existing methods rely on privileged full-body states that require complex and often unreliable state estimation. We present Sensor-Conditioned Diffusion Policies (SCDP) that enables humanoid locomotion using only onboard sensors, eliminating the need for explicit state estimation. SCDP decouples sensing from supervision through mixed-observation training: diffusion model conditions on sensor histories while being supervised to predict privileged future state-action trajectories, enforcing the model to infer the motion dynamics under partial observability. We further develop restricted denoising, context distribution alignment, and context-aware attention masking to encourage implicit state estimation within the model and to prevent train-deploy mismatch. We validate SCDP on velocity-commanded locomotion and motion reference tracking tasks. In simulation, SCDP achieves near-perfect success on velocity control (99-100%) and 93% tracking success in AMASS test set, performing comparable to privileged baselines while using only onboard sensors. Finally, we deploy the trained policy on a real G1 humanoid at 50 Hz, demonstrating robust real robot locomotion without external sensing or state estimation.", "link": "http://arxiv.org/abs/2603.09574v1", "date": "2026-03-10", "relevancy": 2.3052, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5933}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.59}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCDP%3A%20Learning%20Humanoid%20Locomotion%20from%20Partial%20Observations%20via%20Mixed-Observation%20Distillation&body=Title%3A%20SCDP%3A%20Learning%20Humanoid%20Locomotion%20from%20Partial%20Observations%20via%20Mixed-Observation%20Distillation%0AAuthor%3A%20Milo%20Carroll%20and%20Tianhu%20Peng%20and%20Lingfan%20Bao%20and%20Chengxu%20Zhou%20and%20Zhibin%20Li%0AAbstract%3A%20Distilling%20humanoid%20locomotion%20control%20from%20offline%20datasets%20into%20deployable%20policies%20remains%20a%20challenge%2C%20as%20existing%20methods%20rely%20on%20privileged%20full-body%20states%20that%20require%20complex%20and%20often%20unreliable%20state%20estimation.%20We%20present%20Sensor-Conditioned%20Diffusion%20Policies%20%28SCDP%29%20that%20enables%20humanoid%20locomotion%20using%20only%20onboard%20sensors%2C%20eliminating%20the%20need%20for%20explicit%20state%20estimation.%20SCDP%20decouples%20sensing%20from%20supervision%20through%20mixed-observation%20training%3A%20diffusion%20model%20conditions%20on%20sensor%20histories%20while%20being%20supervised%20to%20predict%20privileged%20future%20state-action%20trajectories%2C%20enforcing%20the%20model%20to%20infer%20the%20motion%20dynamics%20under%20partial%20observability.%20We%20further%20develop%20restricted%20denoising%2C%20context%20distribution%20alignment%2C%20and%20context-aware%20attention%20masking%20to%20encourage%20implicit%20state%20estimation%20within%20the%20model%20and%20to%20prevent%20train-deploy%20mismatch.%20We%20validate%20SCDP%20on%20velocity-commanded%20locomotion%20and%20motion%20reference%20tracking%20tasks.%20In%20simulation%2C%20SCDP%20achieves%20near-perfect%20success%20on%20velocity%20control%20%2899-100%25%29%20and%2093%25%20tracking%20success%20in%20AMASS%20test%20set%2C%20performing%20comparable%20to%20priv {"title": "PlaneCycle: Training-Free 2D-to-3D Lifting of Foundation Models Without Adapters", "author": "Yinghong Yu and Guangyuan Li and Jiancheng Yang", "abstract": "Large-scale 2D foundation models exhibit strong transferable representations, yet extending them to 3D volumetric data typically requires retraining, adapters, or architectural redesign. We introduce PlaneCycle, a training-free, adapter-free operator for architecture-agnostic 2D-to-3D lifting of foundation models. PlaneCycle reuses the original pretrained 2D backbone by cyclically distributing spatial aggregation across orthogonal HW, DW, and DH planes throughout network depth, enabling progressive 3D fusion while preserving pretrained inductive biases. The method introduces no additional parameters and is applicable to arbitrary 2D networks. Using pretrained DINOv3 models, we evaluate PlaneCycle on six 3D classification and three 3D segmentation benchmarks. Without any training, the lifted models exhibit intrinsic 3D fusion capability and, under linear probing, outperform slice-wise 2D baselines and strong 3D counterparts, approaching the performance of fully trained models. With full fine-tuning, PlaneCycle matches standard 3D architectures, highlighting its potential as a seamless and practical 2D-to-3D lifting operator. These results demonstrate that 3D capability can be unlocked from pretrained 2D foundation models without structural modification or retraining. Code is available at https://github.com/HINTLab/PlaneCycle.", "link": "http://arxiv.org/abs/2603.04165v2", "date": "2026-03-10", "relevancy": 2.3003, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5823}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5756}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5676}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PlaneCycle%3A%20Training-Free%202D-to-3D%20Lifting%20of%20Foundation%20Models%20Without%20Adapters&body=Title%3A%20PlaneCycle%3A%20Training-Free%202D-to-3D%20Lifting%20of%20Foundation%20Models%20Without%20Adapters%0AAuthor%3A%20Yinghong%20Yu%20and%20Guangyuan%20Li%20and%20Jiancheng%20Yang%0AAbstract%3A%20Large-scale%202D%20foundation%20models%20exhibit%20strong%20transferable%20representations%2C%20yet%20extending%20them%20to%203D%20volumetric%20data%20typically%20requires%20retraining%2C%20adapters%2C%20or%20architectural%20redesign.%20We%20introduce%20PlaneCycle%2C%20a%20training-free%2C%20adapter-free%20operator%20for%20architecture-agnostic%202D-to-3D%20lifting%20of%20foundation%20models.%20PlaneCycle%20reuses%20the%20original%20pretrained%202D%20backbone%20by%20cyclically%20distributing%20spatial%20aggregation%20across%20orthogonal%20HW%2C%20DW%2C%20and%20DH%20planes%20throughout%20network%20depth%2C%20enabling%20progressive%203D%20fusion%20while%20preserving%20pretrained%20inductive%20biases.%20The%20method%20introduces%20no%20additional%20parameters%20and%20is%20applicable%20to%20arbitrary%202D%20networks.%20Using%20pretrained%20DINOv3%20models%2C%20we%20evaluate%20PlaneCycle%20on%20six%203D%20classification%20and%20three%203D%20segmentation%20benchmarks.%20Without%20any%20training%2C%20the%20lifted%20models%20exhibit%20intrinsic%203D%20fusion%20capability%20and%2C%20under%20linear%20probing%2C%20outperform%20slice-wise%202D%20baselines%20and%20strong%203D%20counterparts%2C%20approaching%20the%20performance%20of%20fully%20trained%20models.%20With%20full%20fine-tuning%2C%20PlaneCycle%20matches%20standard%203D%20architectures%2C%20highlighting%20its%20potential%20as%20a%20seamless%20and%20practical%202D-to-3D%20lifting%20operator.%20These%20results%20demonstrate%20that%203D%20capability%20can%20be%20unlocked%20from%20pretrained%202D%20foundation%20models%20without%20structural%20modification%20or%20retraining.%20Code%20is%20available%20at%20https%3A//github.com/HINTLab/PlaneCycle.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04165v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPlaneCycle%253A%2520Training-Free%25202D-to-3D%2520Lifting%2520of%2520Foundation%2520Models%2520Without%2520Adapters%26entry.906535625%3DYinghong%2520Yu%2520and%2520Guangyuan%2520Li%2520and%2520Jiancheng%2520Yang%26entry.1292438233%3DLarge-scale%25202D%2520foundation%2520models%2520exhibit%2520strong%2520transferable%2520representations%252C%2520yet%2520extending%2520them%2520to%25203D%2520volumetric%2520data%2520typically%2520requires%2520retraining%252C%2520adapters%252C%2520or%2520architectural%2520redesign.%2520We%2520introduce%2520PlaneCycle%252C%2520a%2520training-free%252C%2520adapter-free%2520operator%2520for%2520architecture-agnostic%25202D-to-3D%2520lifting%2520of%2520foundation%2520models.%2520PlaneCycle%2520reuses%2520the%2520original%2520pretrained%25202D%2520backbone%2520by%2520cyclically%2520distributing%2520spatial%2520aggregation%2520across%2520orthogonal%2520HW%252C%2520DW%252C%2520and%2520DH%2520planes%2520throughout%2520network%2520depth%252C%2520enabling%2520progressive%25203D%2520fusion%2520while%2520preserving%2520pretrained%2520inductive%2520biases.%2520The%2520method%2520introduces%2520no%2520additional%2520parameters%2520and%2520is%2520applicable%2520to%2520arbitrary%25202D%2520networks.%2520Using%2520pretrained%2520DINOv3%2520models%252C%2520we%2520evaluate%2520PlaneCycle%2520on%2520six%25203D%2520classification%2520and%2520three%25203D%2520segmentation%2520benchmarks.%2520Without%2520any%2520training%252C%2520the%2520lifted%2520models%2520exhibit%2520intrinsic%25203D%2520fusion%2520capability%2520and%252C%2520under%2520linear%2520probing%252C%2520outperform%2520slice-wise%25202D%2520baselines%2520and%2520strong%25203D%2520counterparts%252C%2520approaching%2520the%2520performance%2520of%2520fully%2520trained%2520models.%2520With%2520full%2520fine-tuning%252C%2520PlaneCycle%2520matches%2520standard%25203D%2520architectures%252C%2520highlighting%2520its%2520potential%2520as%2520a%2520seamless%2520and%2520practical%25202D-to-3D%2520lifting%2520operator.%2520These%2520results%2520demonstrate%2520that%25203D%2520capability%2520can%2520be%2520unlocked%2520from%2520pretrained%25202D%2520foundation%2520models%2520without%2520structural%2520modification%2520or%2520retraining.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/HINTLab/PlaneCycle.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04165v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PlaneCycle%3A%20Training-Free%202D-to-3D%20Lifting%20of%20Foundation%20Models%20Without%20Adapters&entry.906535625=Yinghong%20Yu%20and%20Guangyuan%20Li%20and%20Jiancheng%20Yang&entry.1292438233=Large-scale%202D%20foundation%20models%20exhibit%20strong%20transferable%20representations%2C%20yet%20extending%20them%20to%203D%20volumetric%20data%20typically%20requires%20retraining%2C%20adapters%2C%20or%20architectural%20redesign.%20We%20introduce%20PlaneCycle%2C%20a%20training-free%2C%20adapter-free%20operator%20for%20architecture-agnostic%202D-to-3D%20lifting%20of%20foundation%20models.%20PlaneCycle%20reuses%20the%20original%20pretrained%202D%20backbone%20by%20cyclically%20distributing%20spatial%20aggregation%20across%20orthogonal%20HW%2C%20DW%2C%20and%20DH%20planes%20throughout%20network%20depth%2C%20enabling%20progressive%203D%20fusion%20while%20preserving%20pretrained%20inductive%20biases.%20The%20method%20introduces%20no%20additional%20parameters%20and%20is%20applicable%20to%20arbitrary%202D%20networks.%20Using%20pretrained%20DINOv3%20models%2C%20we%20evaluate%20PlaneCycle%20on%20six%203D%20classification%20and%20three%203D%20segmentation%20benchmarks.%20Without%20any%20training%2C%20the%20lifted%20models%20exhibit%20intrinsic%203D%20fusion%20capability%20and%2C%20under%20linear%20probing%2C%20outperform%20slice-wise%202D%20baselines%20and%20strong%203D%20counterparts%2C%20approaching%20the%20performance%20of%20fully%20trained%20models.%20With%20full%20fine-tuning%2C%20PlaneCycle%20matches%20standard%203D%20architectures%2C%20highlighting%20its%20potential%20as%20a%20seamless%20and%20practical%202D-to-3D%20lifting%20operator.%20These%20results%20demonstrate%20that%203D%20capability%20can%20be%20unlocked%20from%20pretrained%202D%20foundation%20models%20without%20structural%20modification%20or%20retraining.%20Code%20is%20available%20at%20https%3A//github.com/HINTLab/PlaneCycle.&entry.1838667208=http%3A//arxiv.org/abs/2603.04165v2&entry.124074799=Read"},
{"title": "Telogenesis: Goal Is All U Need", "author": "Zhuoran Deng and Yizhi Zhang and Ziyi Zhang and Wan Shen", "abstract": "Goal-conditioned systems assume goals are provided externally. We ask whether attentional priorities can emerge endogenously from an agent's internal cognitive state. We propose a priority function that generates observation targets from three epistemic gaps: ignorance (posterior variance), surprise (prediction error), and staleness (temporal decay of confidence in unobserved variables). We validate this in two systems: a minimal attention-allocation environment (2,000 runs) and a modular, partially observable world (500 runs). Ablation shows each component is necessary. A key finding is metric-dependent reversal: under global prediction error, coverage-based rotation wins; under change detection latency, priority-guided allocation wins, with advantage growing monotonically with dimensionality (d = -0.95 at N=48, p < 10^-6). Detection latency follows a power law in attention budget, with a steeper exponent for priority-guided allocation (0.55 vs. 0.40). When the decay rate is made learnable per variable, the system spontaneously recovers environmental volatility structure without supervision (t = 22.5, p < 10^-6). We demonstrate that epistemic gaps alone, without external reward, suffice to generate adaptive priorities that outperform fixed strategies and recover latent environmental structure.", "link": "http://arxiv.org/abs/2603.09476v1", "date": "2026-03-10", "relevancy": 2.3002, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4793}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4506}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Re o%20generate%20adaptive%20priorities%20that%20outperform%20fixed%20strategies%20and%20recover%20latent%20environmental%20structure.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09476v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTelogenesis%253A%2520Goal%2520Is%2520All%2520U%2520Need%26entry.906535625%3DZhuoran%2520Deng%2520and%2520Yizhi%2520Zhang%2520and%2520Ziyi%2520Zhang%2520and%2520Wan%2520Shen%26entry.1292438233%3DGoal-conditioned%2520systems%2520assume%2520goals%2520are%2520provided%2520externally.%2520We%2520ask%2520whether%2520attentional%2520priorities%2520can%2520emerge%2520endogenously%2520from%2520an%2520agent%2527s%2520internal%2520cognitive%2520state.%2520We%2520propose%2520a%2520priority%2520function%2520that%2520generates%2520observation%2520targets%2520from%2520three%2520epistemic%2520gaps%253A%2520ignorance%2520%2528posterior%2520variance%2529%252C%2520surprise%2520%2528prediction%2520error%2529%252C%2520and%2520staleness%2520%2528temporal%2520decay%2520of%2520confidence%2520in%2520unobserved%2520variables%2529.%2520We%2520validate%2520this%2520in%2520two%2520systems%253A%2520a%2520minimal%2520attention-allocation%2520environment%2520%25282%252C000%2520runs%2529%2520and%2520a%2520modular%252C%2520partially%2520observable%2520world%2520%2528500%2520runs%2529.%2520Ablation%2520shows%2520each%2520component%2520is%2520necessary.%2520A%2520key%2520finding%2520is%2520metric-dependent%2520reversal%253A%2520under%2520global%2520prediction%2520error%252C%2520coverage-based%2520rotation%2520wins%253B%2520under%2520change%2520detection%2520latency%252C%2520priority-guided%2520allocation%2520wins%252C%2520with%2520advantage%2520growing%2520monotonically%2520with%2520dimensionality%2520%2528d%2520%253D%2520-0.95%2520at%2520N%253D48%252C%2520p%2520%253C%252010%255E-6%2529.%2520Detection%2520latency%2520follows%2520a%2520power%2520law%2520in%2520attention%2520budget%252C%2520wit {"title": "DRIFT: Dual-Representation Inter-Fusion Transformer for Automated Driving Perception with 4D Radar Point Clouds", "author": "Siqi Pei and Andras Palffy and Dariu M. Gavrila", "abstract": "4D radars, which provide 3D point cloud data along with Doppler velocity, are attractive components of modern automated driving systems due to their low cost and robustness under adverse weather conditions. However, they provide a significantly lower point cloud density than LiDAR sensors. This makes it important to exploit not only local but also global contextual scene information. This paper proposes DRIFT, a model that effectively captures and fuses both local and global contexts through a dual-path architecture. The model incorporates a point path to aggregate fine-grained local features and a pillar path to encode coarse-grained global features. These two parallel paths are intertwined via novel feature-sharing layers at multiple stages, enabling full utilization of both representations. DRIFT is evaluated on the widely used View-of-Delft (VoD) dataset and a proprietary internal dataset. It outperforms the baselines on the tasks of object detection and/or free road estimation. For example, DRIFT achieves a mean average precision (mAP) of 52.6\\% (compared to, say, 45.4\\% of CenterPoint) on the VoD dataset.", "link": "http://arxiv.org/abs/2603.09695v1", "date": "2026-03-10", "relevancy": 2.291, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.58}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5692}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5634}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D% {"title": "NS-VLA: Towards Neuro-Symbolic Vision-Language-Action Models", "author": "Ziyue Zhu and Shangyang Wu and Shuai Zhao and Zhiqiu Zhao and Shengjie Li and Yi Wang and Fang Li and Haoran Luo", "abstract": "Vision-Language-Action (VLA) models are formulated to ground instructions in visual context and generate action sequences for robotic manipulation. Despite recent progress, VLA models still face challenges in learning related and reusable primitives, reducing reliance on large-scale data and complex architectures, and enabling exploration beyond demonstrations. To address these challenges, we propose a novel Neuro-Symbolic Vision-Language-Action (NS-VLA) framework via online reinforcement learning (RL). It introduces a symbolic encoder to embedding vision and language features and extract structured primitives, utilizes a symbolic solver for data-efficient action sequencing, and leverages online RL to optimize generation via expansive exploration. Experiments on robotic manipulation benchmarks demonstrate that NS-VLA outperforms previous methods in both one-shot training and data-perturbed settings, while simultaneously exhibiting superior zero-shot generalizability, high data efficiency and expanded exploration space. Our code is available.", "link": "http://arxiv.org/abs/2603.09542v1", "date": "2026-03-10", "relevancy": 2.2886, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5759}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5714}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5714}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NS-VLA%3A%20Towards%20Neuro-Symbolic%20Vision-Language-Action%20Models&body=Title%3A%20NS-VLA%3A%20Towards%20Neuro-Symbolic%20Vision-Language-Action%20Models%0AAuthor%3A%20Ziyue%20Zhu%20and%20Shangyang%20Wu%20and%20Shuai%20Zhao%20and%20Zhiqiu%20Zhao%20and%20Shengjie%20Li%20and%20Yi%20Wang%20and%20Fang%20Li%20and%20Haoran%20Luo%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20are%20formulated%20to%20ground%20instructions%20in%20visual%20context%20and%20generate%20action%20sequences%20for%20robotic%20manipulation.%20Despite%20recent%20progress%2C%20VLA%20models%20still%20face%20challenges%20in%20learning%20related%20and%20reusable%20primitives%2C%20reducing%20reliance%20on%20large-scale%20data%20and%20complex%20architectures%2C%20and%20enabling%20exploration%20beyond%20demonstrations.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20Neuro-Symbolic%20Vision-Language-Action%20%28NS-VLA%29%20framework%20via%20online%20reinforcement%20learning%20%28RL%29.%20It%20introduces%20a%20symbolic%20encoder%20to%20embedding%20vision%20and%20language%20features%20and%20extract%20structured%20primitives%2C%20utilizes%20a%20symbolic%20solver%20for%20data-efficient%20action%20sequencing%2C%20and%20leverages%20online%20RL%20to%20optimize%20generation%20via%20expansive%20exploration.%20Experiments%20on%20robotic%20manipulation%20benchmarks%20demonstrate%20that%20NS-VLA%20outperforms%20previous%20methods%20in%20both%20one-shot%20training%20and%20data-perturbed%20settings%2C%20while%20simultaneously%20exhibiting%20superior%20zero-shot%20generalizability%2C%20high%20data%20efficiency%20and%20expanded%20exploration%20space.%20Our%20code%20is%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09542v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNS-VLA%253A%2520Towards%2520Neuro-Symbolic%2520Vision-Language-Action%2520Models%26entry.906535625%3DZiyue%2520Zhu%2520and%2520Shangyang%2520Wu%2520and%2520Shuai%2520Zhao%2520and%2520Zhi {"title": "Improving 3D Foot Motion Reconstruction in Markerless Monocular Human Motion Capture", "author": "Tom Wehrbein and Bodo Rosenhahn", "abstract": "State-of-the-art methods can recover accurate overall 3D human body motion from in-the-wild videos. However, they often fail to capture fine-grained articulations, especially in the feet, which are critical for applications such as gait analysis and animation. This limitation results from training datasets with inaccurate foot annotations and limited foot motion diversity. We address this gap with FootMR, a Foot Motion Refinement method that refines foot motion estimated by an existing human recovery model through lifting 2D foot keypoint sequences to 3D. By avoiding direct image input, FootMR circumvents inaccurate image-3D annotation pairs and can instead leverage large-scale motion capture data. To resolve ambiguities of 2D-to-3D lifting, FootMR incorporates knee and foot motion as context and predicts only residual foot motion. Generalization to extreme foot poses is further improved by representing joints in global rather than parent-relative rotations and applying extensive data augmentation. To support evaluation of foot motion reconstruction, we introduce MOOF, a 2D dataset of complex foot movements. Experiments on MOOF, MOYO, and RICH show that FootMR outperforms state-of-the-art methods, reducing ankle joint angle error on MOYO by up to 30% over the best video-based approach.", "link": "http://arxiv.org/abs/2603.09681v1", "date": "2026-03-10", "relevancy": 2.2879, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6119}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5499}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improving%203D%20Foot%20Motion%20Reconstruction%20in%20Markerless%20Monocular%20Human%20Motion%20Capture&body=Title%3A%20Improving%203D%20Foot%20Motion%20Reconstruction%20in%20Markerless%20Monocular%20Human%20Motion%20Capture%0AAuthor%3A%20Tom%20Wehrbein%20and%20Bodo%20Rosenhahn%0AAbstract%3A%20State-of-the-art%20methods%20can%20recover%20accurate%20overall%203D%20human%20body%20motion%20from%20in-the-wild%20videos.%20However%2C%20they%20often%20fail%20to%20capture%20fine-grained%20articulations%2C%20especially%20in%20the%20feet%2C%20which%20are%20critical%20for%20applications%20such%20as%20gait%20analysis%20and%20animation.%20This%20limitation%20results%20from%20training%20datasets%20with%20inaccurate%20foot%20annotations%20and%20limited%20foot%20motion%20diversity.%20We%20address%20this%20gap%20with%20FootMR%2C%20a%20Foot%20Motion%20Refinement%20method%20that%20refines%20foot%20motion%20estimated%20by%20an%20existing%20human%20recovery%20model%20through%20lifting%202D%20foot%20keypoint%20sequences%20to%203D.%20By%20avoiding%20direct%20image%20input%2C%20FootMR%20circumvents%20inaccurate%20image-3D%20annotation%20pairs%20and%20can%20instead%20leverage%20large-scale%20motion%20capture%20data.%20To%20resolve%20ambiguities%20of%202D-to-3D%20lifting%2C%20FootMR%20incorporates%20knee%20and%20foot%20motion%20as%20context%20and%20predicts%20only%20residual%20foot%20motion.%20Generalization%20to%20extreme%20foot%20poses%20is%20further%20improved%20by%20representing%20joints%20in%20global%20rather%20than%20parent-relative%20rotations%20and%20applying%20extensive%20data%20augmentation.%20To%20support%20evaluation%20of%20foot%20motion%20reconstruction%2C%20we%20introduce%20MOOF%2C%20a%202D%20dataset%20of%20complex%20foot%20movements.%20Experiments%20on%20MOOF%2C%20MOYO%2C%20and%20RICH%20show%20that%20FootMR%20outperforms%20state-of-the-art%20methods%2C%20reducing%20ankle%20joint%20angle%20error%20on%20MOYO%20by%20up%20to%2030%25%20over%20the%20best%20video-based%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09681v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproving%25203D%2520Foot%2520Motion%2520Reconstruction%2520in%2520Markerless%2520Monocular%2520Human%2520Motion%2520Capture%26entry.906535625%3DTom%2520Wehrbein%2520and%2520Bodo%2520Rosenhahn%26entry.1292438233%3DState-of-the-art%2520methods%2520can%2520recover%2520accurate%2520overall%25203D%2520human%2520body%2520motion%2520from%2520in-the-wild%2520videos.%2520However%252C%2520they%2520often%2520fail%2520to%2520capture%2520fine-grained%2520articulations%252C%2520especially%2520in%2520the%2520feet%252C%2520which%2520are%2520critical%2520for%2520applications%2520such%2520as%2520gait%2520analysis%2520and%2520animation.%2520This%2520limitation%2520results%2520from%2520training%2520datasets%2520with%2520inaccurate%2520foot%2520annotations%2520and%2520limited%2520foot%2520motion%2520diversity.%2520We%2520address%2520this%2520gap%2520with%2520FootMR%252C%2520a%2520Foot%2520Motion%2520Refinement%2520method%2520that%2520refines%2520foot%2520motion%2520estimated%2520by%2520an%2520existing%2520human%2520recovery%2520model%2520through%2520lifting%25202D%2520foot%2520keypoint%2520sequences%2520to%25203D.%2520By%2520avoiding%2520direct%2520image%2520input%252C%2520FootMR%2520circumvents%2520inaccurate%2520image-3D%2520annotation%2520pairs%2520and%2520can%2520instead%2520leverage%2520large-scale%2520motion%2520capture%2520data.%2520To%2520resolve%2520ambiguities%2520of%25202D-to-3D%2520lifting%252C%2520FootMR%2520incorporates%2520knee%2520and%2520foot%2520motion%2520as%2520context%2520and%2520predicts%2520only%2520residual%2520foot%2520motion.%2520Generalization%2520to%2520extreme%2520foot%2520poses%2520is%2520further%2520improved%2520by%2520representing%2520joints%2520in%2520global%2520rather%2520than%2520parent-relative%2520rotations%2520and%2520applying%2520extensive%2520data%2520augmentation.%2520To%2520support%2520evaluation%2520of%2520foot%2520motion%2520reconstruction%252C%2520we%2520introduce%2520MOOF%252C%2520a%25202D%2520dataset%2520of%2520complex%2520foot%2520movements.%2520Experiments%2520on%2520MOOF%252C%2520MOYO%252C%2520and%2520RICH%2520show%2520that%2520FootMR%2520outperforms%2520state-of-the-art%2520methods%252C%2520reducing%2520ankle%2520joint%2520angle%2520error%2520on%2520MOYO%2520by%2520up%2520to%252030%2525%2520over%2520the%2520best%2520video-based%2520approach.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09681v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Improving%203D%20Foot%20Motion%20Reconstruction%20in%20Markerless%20Monocular%20Human%20Motion%20Capture&entry.906535625=Tom%20Wehrbein%20and%20Bodo%20Rosenhahn&entry.1292438233=State-of-the-art%20methods%20can%20recover%20accurate%20overall%203D%20human%20body%20motion%20from%20in-the-wild%20videos.%20However%2C%20they%20often%20fail%20to%20capture%20fine-grained%20articulations%2C%20especially%20in%20the%20feet%2C%20which%20are%20critical%20for%20applications%20such%20as%20gait%20analysis%20and%20animation.%20This%20limitation%20results%20from%20training%20datasets%20with%20inaccurate%20foot%20annotations%20and%20limited%20foot%20motion%20diversity.%20We%20address%20this%20gap%20with%20FootMR%2C%20a%20Foot%20Motion%20Refinement%20method%20that%20refines%20foot%20motion%20estimated%20by%20an%20existing%20human%20recovery%20model%20through%20lifting%202D%20foot%20keypoint%20sequences%20to%203D.%20By%20avoiding%20direct%20image%20input%2C%20FootMR%20circumvents%20inaccurate%20image-3D%20annotation%20pairs%20and%20can%20instead%20leverage%20large-scale%20motion%20capture%20data.%20To%20resolve%20ambiguities%20of%202D-to-3D%20lifting%2C%20FootMR%20i {"title": "Does the Question Really Matter? Training-Free Data Selection for Vision-Language SFT", "author": "Peng Sun and Huawen Shen and Yi Ban and Tianfan Fu and Yanbo Wang and Yuqiang Li", "abstract": "Visual instruction tuning is crucial for improving vision-language large models (VLLMs). However, many samples can be solved via linguistic patterns or common-sense shortcuts, without genuine cross-modal reasoning, limiting the effectiveness of multimodal learning. Prior data selection methods often rely on costly proxy model training and focus on difficulty or diversity, failing to capture a sample's true contribution to vision-language joint reasoning. In this paper, we propose CVS, a training-free data selection method based on the insight that, for high-quality multimodal samples, introducing the question should substantially alter the model's assessment of answer validity given an image. CVS leverages a frozen VLLM as an evaluator and measures the discrepancy in answer validity with and without conditioning on the question, enabling the identification of samples that require vision-language joint reasoning while filtering semantic-conflict noise. Experiments on Vision-Flan and The Cauldron show that CVS achieves solid performance across datasets. On Vision-Flan, CVS outperforms full-data training by 3.5% and 4.8% using only 10% and 15% of the data, respectively, and remains robust on the highly heterogeneous Cauldron dataset. Moreover, CVS reduces computational cost by 17.3% and 44.4% compared to COINCIDE and XMAS.", "link": "http://arxiv.org/abs/2603.09715v1", "date": "2026-03-10", "relevancy": 2.2757, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5795}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5795}, {"title": "Multimodal-Condi {"title": "Component-Aware Sketch-to-Image Generation Using Self-Attention Encoding and Coordinate-Preserving Fusion", "author": "Ali Zia and Muhammad Umer Ramzan and Usman Ali and Muhammad Faheem and Abdelwahed Khamis and Shahnawaz Qureshi", "abstract": "Translating freehand sketches into photorealistic images remains a fundamental challenge in image synthesis, particularly due to the abstract, sparse, and stylistically diverse nature of sketches. Existing approaches, including GAN-based and diffusion-based models, often struggle to reconstruct fine-grained details, maintain spatial alignment, or adapt across different sketch domains. In this paper, we propose a component-aware, self-refining framework for sketch-to-image generation that addresses these challenges through a novel two-stage architecture. A Self-Attention-based Autoencoder Network (SA2N) first captures localised semantic and structural features from component-wise sketch regions, while a Coordinate-Preserving Gated Fusion (CGF) module integrates these into a coherent spatial layout. Finally, a Spatially Adaptive Refinement Revisor (SARR), built on a modified StyleGAN2 backbone, enhances realism and consistency through iterative refinement guided by spatial context. Extensive experiments across both facial (CelebAMask-HQ, CUFSF) and non-facial (Sketchy, ChairsV2, ShoesV2) datasets demonstrate the robustness and generalizability of our method. The proposed framework consistently outperforms state-of-the-art GAN and diffusion models, achieving significant gains in image fidelity, semantic accuracy, and perceptual quality. On CelebAMask-HQ, our model improves over prior methods by 21% (FID), 58% (IS), 41% (KID), and 20% (SSIM). These results, along with higher efficiency and visual coherence across diverse domains, position our approach as a strong candidate for applications in forensics, digital art restoration, and general sketch-based image synthesis.", "link": "http://arxiv.org/abs/2603.09484v1", "date": "2026-03-10", "relevancy": 2.2693, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6019}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5612}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5596}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Component-Aware%20Sketch-to-Image%20Generation%20Using%20Self-Attention%20Encoding%20and%20Coordinate-Preserving%20Fusion&body=Title%3A%20Component-Aware%20Sketch-to-Image%20Generation%20Using%20Self-Attention%20Encoding%20and%20Coordinate-Preserving%20Fusion%0AAuthor%3A%20Ali%20Zia%20and%20Muhammad%20Umer%20Ramzan%20and%20Usman%20Ali%20and%20Muhammad%20Faheem%20and%20Abdelwahed%20Khamis%20and%20Shahnawaz%20Qureshi%0AAbstract%3A%20Translating%20freehand%20sketches%20into%20photorealistic%20images%20remains%20a%20fundamental%20challenge%20in%20image%20synthesis%2C%20particularly%20due%20to%20the%20abstract%2C%20sparse%2C%20and%20stylistically%20diverse%20nature%20of%20sketches.%20Existing%20approaches%2C%20including%20GAN-based%20and%20diffusion-based%20models%2C%20often%20struggle%20to%20reconstruct%20fine-grained%20details%2C%20maintain%20spatial%20alignment%2C%20or%20adapt%20across%20different%20sketch%20domains.%20In%20this%20paper%2C%20we%20propose%20a%20component-aware%2C%20self-refining%20framework%20for%20sketch-to-image%20generation%20that%20addresses%20these%20challenges%20through%20a%20novel%20two-stage%20architecture.%20A%20Self-Attention-based%20Autoencoder%20Network%20%28SA2N%29%20first%20captures%20localised%20semantic%20and%20structural%20features%20from%20component-wise%20sketch%20regions%2C%20while%20a%20Coordinate-Preserving%20Gated%20Fusion%20%28CGF%29%20module%20integrates%20these {"title": "CycleULM: A unified label-free deep learning framework for ultrasound localisation microscopy", "author": "Su Yan and Clara Rodrigo Gonzalez and Vincent C. H. Leung and Herman Verinaz-Jadan and Jiakang Chen and Matthieu Toulemonde and Kai Riemer and Jipeng Yan and Clotilde Vi\u00e9 and Qingyuan Tan and Peter D. Weinberg and Pier Luigi Dragotti and Kevin G. Murphy and Meng-Xing Tang", "abstract": "Super-resolution ultrasound via microbubble (MB) localisation and tracking, also known as ultrasound localisation microscopy (ULM), can resolve microvasculature beyond the acoustic diffraction limit. However, significant challenges remain in localisation performance and data acquisition and processing time. Deep learning methods for ULM have shown promise to address these challenges, however, they remain limited by in vivo label scarcity and the simulation-to-reality domain gap. We present CycleULM, the first unified label-free deep learning framework for ULM. CycleULM learns a physics-emulating translation between the real contrast-enhanced ultrasound (CEUS) data domain and a simplified MB-only domain, leveraging the power of CycleGAN without requiring paired ground truth data. With this translation, CycleULM removes dependence on high-fidelity simulators or labelled data, and makes MB localisation and tracking substantially easier. Deployed as modular plug-and-play components within existing pipelines or as an end-to-end processing framework, CycleULM delivers substantial performance gains across both in silico and in vivo datasets. Specifically, CycleULM improves image contrast (contrast-to-noise ratio) by up to 15.3 dB and sharpens CEUS resolution with a 2.5{\\times} reduction in the full width at half maximum of the point spread function. CycleULM also improves MB localisation performance, with up to +40% recall, +46% precision, and a -14.0 \u03bcm mean localisation error, yielding more faithful vascular reconstructions. Importantly, CycleULM achieves real-time processing throughput at 18.3 frames per second with order-of-magnitude speed-ups (up to ~14.5{\\times}). By combining label-free learning, performance enhancement, and computational efficiency, CycleULM provides a practical pathway toward robust, real-time ULM and accelerates its translation to clinical applications.", "link": "http://arxiv.org/abs/2603.09840v1", "date": "2026-03-10", "relevancy": 2.2673, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.577}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5747}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CycleULM%3A%20A%20unified%20label-free%20deep%20learning%20framework%20for%20ultrasound%20localisation%20microscopy&body=Title%3A%20CycleULM%3A%20A%20unified%20label-free%20deep%20learning%20framework%20for%20ultrasound%20localisation%20microscopy%0AAuthor%3A%20Su%20Yan%20and%20Clara%20Rodrigo%20Gonzalez%20and%20Vincent%20C.%20H.%20Leung%20and%20Herman%20Verinaz-Jadan%20and%20Jiakang%20Chen%20and%20Matthieu%20Toulemonde%20and%20Kai%20Riemer%20and%20Jipeng%20Yan%20and%20Clotilde%20Vi%C3%A9%20and%20Qingyuan%20Tan%20and%20Peter%20D.%20Weinberg%20and%20Pier%20Luigi%20Dragotti%20and%20Kevin%20G.%20Murphy%20and%20Meng-Xing%20Tang%0AAbstract%3A%20Super-resolution%20ultrasound%20via%20microbubble%20%28MB%29%20localisation%20and%20tracking%2C%20also%20known%20as%20ultrasound%20localisation%20microscopy%20%28ULM%29%2C%20can%20resolve%20microvasculature%20beyond%20the%20acoustic%20diffraction%20limit.%20However%2C%20significant%20challenges%20remain%20in%20localisation%20performance%20and%20data%20acquisition%20and%20processing%20time.%20Deep%20learning%20methods%20for%20ULM%20have%20shown%20promise%20to%20address%20these%20challenges%2C%20however%2C%20they%20remain%20limited%20by%20in%20vivo%20label%20scarcity%20and%20the%20simulation-to-reality%20domain%20gap.%20We%20present%20CycleULM%2C%20the%20first%20unified%20label-free%20deep%20learning%20framework%20for%20ULM.%20CycleULM%20learns%20a%20physics-emulating%20translation%20between%20the%20real%20contrast-enhanced%20ultrasound%20%28CEUS%29%20data%20domain%20and%20a%20simplified%20MB-only%20domain%2C%20leveraging%20the%20power%20of%20CycleGAN%20without%20requiring%20paired%20ground%20truth%20data.%20With%20this%20translation%2C%20CycleULM%20removes%20dependence%20on%20high-fidelity%20simulators%20or%20labelled%20data%2C%20and%20makes%20MB%20localisation%20and%20tracking%20substantially%20easier.%20Deployed%20as%20modular%20plug-and-play%20components%20within%20existing%20pipelines%20or%20as%20an%20end-to-end%20processing%20framework%2C%20CycleULM%20delivers%20substantial%20performance%20gains%20across%20both%20in%20silico%20and%20in%20vivo%20datasets.%20Specifically%2C%20CycleULM%20improves%20image%20contrast%20%28contrast-to-noise%20ratio%29%20by%20up%20to%2015.3%20dB%20and%20sharpens%20CEUS%20resolution%20with%20a%202.5%7B%5Ctimes%7D%20reduction%20in%20the%20full%20width%20at%20half%20maximum%20of%20the%20point%20spread%20function.%20CycleULM%20also%20improves%20MB%20localisation%20performance%2C%20with%20up%20to%20%2B40%25%20recall%2C%20%2B46%25%20precision%2C%20and%20a%20-14.0%20%CE%BCm%20mean%20localisation%20error%2C%20yielding%20more%20faithful%20vascular%20reconstructions.%20Importantly%2C%20CycleULM%20achieves%20real-time%20processing%20throughput%20at%2018.3%20frames%20per%20second%20with%20order-of-magnitude%20speed-ups%20%28up%20to%20~14.5%7B%5Ctimes%7D%29.%20By%20combining%20label-free%20learning%2C%20performance%20enhancement%2C%20and%20computational%20efficiency%2C%20CycleULM%2

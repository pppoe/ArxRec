{"title": "X-GS: An Extensible Open Framework Unifying 3DGS Architectures with Downstream Multimodal Models", "author": "Yueen Ma and Irwin King", "abstract": "3D Gaussian Splatting (3DGS) has emerged as a powerful technique for novel view synthesis, subsequently extending into numerous spatial AI applications. However, most existing 3DGS methods are isolated, focusing on specific domains such as online SLAM, semantic enrichment, or 3DGS for unposed images. In this paper, we introduce X-GS, an extensible open framework that unifies a broad range of techniques to enable real-time 3DGS-based online SLAM enriched with semantics, bridging the gap to downstream multimodal models. At the core of X-GS is a highly efficient pipeline called X-GS-Perceiver, capable of taking unposed RGB (or optionally RGB-D) video streams as input to co-optimize geometry and poses, and distill high-dimensional semantic features from vision foundation models into the 3D Gaussians. We achieve real-time performance through a novel online Vector Quantization (VQ) module, a GPU-accelerated grid-sampling scheme, and a highly parallelized pipeline design. The semantic 3D Gaussians can then be utilized by vision-language models within the X-GS-Thinker component, enabling downstream tasks such as object detection, zero-shot caption generation, and potentially embodied tasks. Experimental results on real-world datasets showcase the efficacy, efficiency, and newly unlocked multimodal capabilities of the X-GS framework.", "link": "http://arxiv.org/abs/2603.09632v1", "date": "2026-03-10", "relevancy": 3.438, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7139}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6784}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6705}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20X-GS%3A%20An%20Extensible%20Open%20Framework%20Unifying%203DGS%20Architectures%20with%20Downstream%20Multimodal%20Models&body=Title%3A%20X-GS%3A%20An%20Extensible%20Open%20Framework%20Unifying%203DGS%20Architectures%20with%20Downstream%20Multimodal%20Models%0AAuthor%3A%20Yueen%20Ma%20and%20Irwin%20King%0AAbstract%3A%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20a%20powerful%20technique%20for%20novel%20view%20synthesis%2C%20subsequently%20extending%20into%20numerous%20spatial%20AI%20applications.%20However%2C%20most%20existing%203DGS%20methods%20are%20isolated%2C%20focusing%20on%20specific%20domains%20such%20as%20online%20SLAM%2C%20semantic%20enrichment%2C%20or%203DGS%20for%20unposed%20images.%20In%20this%20paper%2C%20we%20introduce%20X-GS%2C%20an%20extensible%20open%20framework%20that%20unifies%20a%20broad%20range%20of%20techniques%20to%20enable%20real-time%203DGS-based%20online%20SLAM%20enriched%20with%20semantics%2C%20bridging%20the%20gap%20to%20downstream%20multimodal%20models.%20At%20the%20core%20of%20X-GS%20is%20a%20highly%20efficient%20pipeline%20called%20X-GS-Perceiver%2C%20capable%20of%20taking%20unposed%20RGB%20%28or%20optionally%20RGB-D%29%20video%20streams%20as%20input%20to%20co-optimize%20geometry%20and%20poses%2C%20and%20distill%20high-dimensional%20semantic%20features%20from%20vision%20foundation%20models%20into%20the%203D%20Gaussians.%20We%20achieve%20real-time%20performance%20through%20a%20novel%20online%20Vector%20Quantization%20%28VQ%29%20module%2C%20a%20GPU-accelerated%20grid-sampling%20scheme%2C%20and%20a%20highly%20parallelized%20pipeline%20design.%20The%20semantic%203D%20Gaussians%20can%20then%20be%20utilized%20by%20vision-language%20models%20within%20the%20X-GS-Thinker%20component%2C%20enabling%20downstream%20tasks%20such%20as%20object%20detection%2C%20zero-shot%20caption% {"title": "CoRe-GS: Coarse-to-Refined Gaussian Splatting with Semantic Object Focus", "author": "Hannah Schieber and Dominik Frischmann and Victor Schaack and Simon Boche and Angela Schoellig and Stefan Leutenegger and Daniel Roth", "abstract": "Fast and efficient 3D reconstruction is essential for time-critical robotic applications such as tele-guidance and disaster response, where operators must rapidly analyze specific points of interest (POIs). Existing semantic Gaussian Splatting (GS) approaches optimize the entire scene uniformly, incurring substantial computational cost even when only a small subset of the scene is operationally relevant. We propose CoRe-GS, a coarse-to-refine GS framework that enables task-driven POI-focused optimization. Our method first produces a segmentation-ready GS representation using a lightweight late-stage semantic refinement. Subsequently, only Gaussians associated with the selected POI are further optimized, reducing unnecessary background computation. To mitigate segmentation-induced outliers (floaters) during selective refinement, we introduce a color-based filtering mechanism that removes inconsistent Gaussians without requiring mask rasterization. We evaluate robustness multiple datasets. On LERF-Mask, our segmentation-ready representation achieves competitive mIoU using tremendously fewer optimization steps. Across synthetic and real-world datasets (NeRDS360, SCRREAM, Tanks and Temples), CoRe-GS drastically reduces training time compared to full semantic GS while improving POI reconstruction quality and mitigating floaters. These results demonstrate that task-aware selective refinement enables faster and higher-quality scene reconstruction tailored to robotic operational needs.", "link": "http://arxiv.org/abs/2509.04859v3", "date": "2026-03-10", "relevancy": 3.364, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7362}, {"title": "ARSGaussian: 3D Gaussian Splatting with LiDAR for Aerial Remote Sensing Novel View Synthesis", "author": "Yiling Yao and Bing Zhang and Wenjuan Zhang and Lianru Gao and Dailiang Peng and Bocheng Li and Yaning Wang and Bowen Wang", "abstract": "Novel View Synthesis (NVS) can reconstruct scenes from multi-view images and synthesize novel images from new viewpoints, which provides technical support for tasks such as target recognition and environmental perception. Aerial remote sensing can conveniently capture a wealth of multi-view images with just a few flights. However, the challenges brought by large distances and sparse viewing angles during collection can cause the model to easily produce floaters and overgrowth issues due to geometric estimation errors. This results in low visual quality and a lack of precise geometric estimation capabilities. Therefore, this study presents ARSGaussian, an innovative novel view synthesis (NVS) method for aerial remote sensing. The method incorporates LiDAR point cloud as constraints into the 3D Gaussian Splatting approach, adaptively guiding the Gaussians to grow and split along geometric benchmarks, thereby addressing the overgrowth and floaters issues. Additionally, considering the geometric distortions arising from data acquisition, coordinate transformations with distortion parameters are integrated to replace the simple pinhole camera model parameters to achieve pixel-level alignment between LiDAR point cloud and multi-view optical images, facilitating the accurate fusion of heterogeneous data and achieving the high-precision geo-alignment. Moreover, depth, normal and scale consistency losses are introduced into the regularization process to guide Gaussians toward real depth and plane representations, significantly improving geometric estimation accuracy. To address the current lack of dense airborne hybrid datasets, we have established and released AIR-LONGYAN, an open-source dataset containing a dense LiDAR point cloud (8 pts/m) and multi-view optical images captured by airborne scanners and cameras in diverse scenes....", "link": "http://arxiv.org/abs/2412.18380v2", "date": "2026-03-10", "relevancy": 3.286, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7227}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6263}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6226}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ARSGaussian%3A%203D%20Gaussian%20Splatting%20with%20LiDAR%20for%20Aerial%20Remote%20Sensing%20Novel%20View%20Synthesis&body=Title%3A%20ARSGaussian%3A%203D%20Gaussian%20Splatting%20with%20LiDAR%20for%20Aerial%20Remote%20Sensing%20Novel%20View%20Synthesis%0AAuthor%3A%20Yiling%20Yao%20and%20Bing%20Zhang%20and%20Wenjuan%20Zhang%20and%20Lianru%20Gao%20and%20Dailiang%20Peng%20and%20Bocheng%20Li%20and%20Yaning%20Wang%20and%20Bowen%20Wang%0AAbstract%3A%20Novel%20View%20Synthesis%20%28NVS%29%20can%20reconstruct%20scenes%20from%20multi-view%20images%20and%20synthesize%20novel%20images%20from%20new%20viewpoints%2C%20which%20provides%20technical%20support%20for%20tasks%20such%20as%20target%20recognition%20and%20environmental%20perception.%20Aerial%20remote%20sensing%20can%20conveniently%20capture%20a%20wealth%20of%20multi-view%20images%20with%20just%20a%20few%20flights.%20However%2C%20the%20challenges%20brought%20by%20large%20distances%20and%20sparse%20viewing%20angles%20during%20collection%20can%20cause%20the%20model%20to%20easily%20produce%20floaters%20and%20overgrowth%20issues%20due%20to%20geometric%20estimation%20errors.%20This%20results%20in%20low%20visual%20quality%20and%20a%20lack%20of%20precise%20geometric%20estimation%20capabilities.%20Therefore%2C%20this%20study%20presents%20ARSGaussian%2C%20an%20innovative%20novel%20view%20synthesis%20%28NVS%29%20method%20for%20aerial%20remote%20sensing.%20The%20method%20incorporates%20LiDAR%20point%20cloud%20as%20constraints%20into%20the%203D%20Gaussian%20Splatting%20approach%2C%20adaptively%20guiding%20the%20Gaussians%20to%20grow%20and%20split%20along%20geometric%20benchmarks%2C%20thereby%20addressing%20the%20overgrowth%20and%20floaters%20issues.%20Additionally%2C%20considering%20the%20geometric%20distortions%20arising%20from%20data%20acquisition%2C%20coordinate%20transformations%20with%20distortion%20parameters%20are%20integrated%20to%20replace%20the%20simple%20pinhole%20camera%20model%20parameters%20to%20achieve%20pixel-level%20alignment%20between%20LiDAR%20point%20cloud%20and%20multi-view%20optical%20images%2C%20facilitating%20the%20accurate%20fusion%20of%20heterogeneous%20data%20and%20achieving%20the%20high-precision%20geo-alignment.%20Moreover%2C%20depth%2C%20normal%20and%20scale%20consistency%20losses%20are%20introduced%20into%20the%20regularization%20process%20to%20guide%20Gaussians%20toward%20real%20depth%20and%20plane%20representations%2C%20significantly%20improving%20geometric%20estimation%20accuracy.%20To%20address%20the%20current%20lack%20of%20dense%20airborne%20hybrid%20datasets%2C%20we%20have%20established%20and%20released%20AIR-LONGYAN%2C%20an%20open-source%20dataset%20containing%20a%20dense%20LiDAR%20point%20cloud%20%288%20pts/m%29%20and%20multi-view%20optical%20images%20captured%20by%20airborne%20scanners%20and%20cameras%20in%20diverse%20scenes....%0ALink%3A%20http%3A//arxiv.org/abs/2412.18380v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DARSGaussian%253A%25203D%2520Gaussian%2520Splatting%2520with%2520LiDAR%2520for%2520Aerial%2520Remote%2520Sensing%2520Novel%2520View%2520Synthesis%26entry.906535625%3DYiling%2520Yao%2520and%2520Bing%2520Zhang%2520and%2520Wenjuan%2520Zhang%25 {"title": "ReCoSplat: Autoregressive Feed-Forward Gaussian Splatting Using Render-and-Compare", "author": "Freeman Cheng and Botao Ye and Xueting Li and Junqi You and Fangneng Zhan and Ming-Hsuan Yang", "abstract": "Online novel view synthesis remains challenging, requiring robust scene reconstruction from sequential, often unposed, observations. We present ReCoSplat, an autoregressive feed-forward Gaussian Splatting model supporting posed or unposed inputs, with or without camera intrinsics. While assembling local Gaussians using camera poses scales better than canonical-space prediction, it creates a dilemma during training: using ground-truth poses ensures stability but causes a distribution mismatch when predicted poses are used at inference. To address this, we introduce a Render-and-Compare (ReCo) module. ReCo renders the current reconstruction from the predicted viewpoint and compares it with the incoming observation, providing a stable conditioning signal that compensates for pose errors. To support long sequences, we propose a hybrid KV cache compression strategy combining early-layer truncation with chunk-level selective retention, reducing the KV cache size by over 90% for 100+ frames. ReCoSplat achieves state-of-the-art performance across different input settings on both in- and out-of-distribution benchmarks. Code and pretrained models will be released. Our project page is at https://freemancheng.com/ReCoSplat .", "link": "http://arxiv.org/abs/2603.09968v1", "date": "2026-03-10", "relevancy": 3.2612, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7056}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6444}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReCoSplat%3A%20Autoregressive%20Feed-Forward%20Gaussian%20Splatting%20Using%20Render-and-Compare&body=Title%3A%20ReCoSplat%3A%20Autoregressive%20Feed-Forward%20Gaussian%20Splatting%20Using%20Render-and-Compare%0AAuthor%3A%20Freeman%20Cheng%20and%20Botao%20Ye%20and%20Xueting%20Li%20and%20Junqi%20You%20and%20Fangneng%20Zhan%20and%20Ming-Hsuan%20Yang%0AAbstract%3A%20Online%20novel%20view%20synthesis%20remains%20challenging%2C%20requiring%20robust%20scene%20reconstruction%20from%20sequential%2C%20often%20unposed%2C%20observations.%20We%20present%20ReCoSplat%2C%20an%20autoregressive%20feed-forward%20Gaussian%20Splatting%20model%20supporting%20posed%20or%20unposed%20inputs%2C%20with%20or%20without%20camera%20intrinsics.%20While%20assembling%20local%20Gaussians%20using%20camera%20poses%20scales%20better%20than%20canonical-space%20prediction%2C%20it%20creates%20a%20dilemma%20during%20training%3A%20using%20ground-truth%20poses%20ensures%20stability%20but%20causes%20a%20distribution%20mismatch%20when%20predicted%20poses%20are%20used%20at%20inference.%20To%20address%20this%2C%20we%20introduce%20a%20Render-and-Compare%20%28ReCo%29%20module.%20ReCo%20renders%20the%20current%20reconstruction%20from%20the%20predicted%20viewpoint%20and%20compares%20it%20with%20the%20incoming%20observation%2C%20providing%20a%20stable%20conditioning%20signal%20that%20compensates%20for%20pose%20errors.%20To%20support%20long%20sequences%2C%20we%20propose%20a%20hybrid%20KV%20cache%20compression%20strategy%20combining%20early-layer%20truncation%20with%20chunk-level%20selective%20retention%2C%20reducing%20the%20KV%20cache%20size%20by%20over%2090%25%20for%20100%2B%20frames.%20ReCoSplat%20achieves%20state-of-the-art%20performance%20across%20different%20input%20settings%20on%20both%20in-%20and%20out-of-distribution%20benchmarks.%20Code%20and%20pretrained%20models%20will%20be%20released.%20Our%20project%20page%20is%20at%20https%3A//freemancheng.com/ReCoSplat%20.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09968v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReCoSplat%253A%2520Autoregressive%2520Feed-Forward%2520Gaussian%2520Splatting%2520Using%2520Render-and-Compare%26entry.906535625%3DFreeman%2520Cheng%2520and%2520Botao%2520Ye%2520and%2520Xueting%2520Li%2520and%2520Junqi%2520You%2520and%2520Fangneng%2520Zhan%2520and%2520Ming-Hsuan%2520Yang%26entry.1292438233%3DOnline%2520novel%2520view%2520synthesis%2520remains%2520challenging%252C%2520requiring%2520robust%2520scene%2520reconstruction%2520from%2520sequential%252C%2520often%2520unposed%252C%2520observations.%2520We%2520present%2520ReCoSplat%252C%2520an%2520autoregressive%2520feed-forward%2520Gaussian%2520Splatting%2520model%2520supporting%2520posed%2520or%2520unposed%2520inputs%252C%2520with%2520or%2520without%2520camera%2520intrinsics.%2520While%2520assembling%2520local%2520Gaussians%2520using%2520camera%2520poses%2520scales%2520better%2520than%2520canonical-space%2520prediction%252C%2520it%2520creates%2520a%2520dilemma%2520during%2520training%253A%2520using%2520ground-truth%2520poses%2520ensures%2520stability%2520but%2520causes%2520a%2520distribution%2520mismatch%2520when%2520predicted%2520poses%2520are%2520used%2520at%2520inference.%2520To%2520address%2520this%252C%2520we%2520introduce%2520a%2520Render-and-Compare%2520%2528ReCo%2529%2520module.%2520ReCo%2520renders%2520the%2520current%2520reconstruction%2520from%2520the%2520predicted%2520viewpoint%2520and%2520compares%2520it%2520with%2520the%2520incoming%2520observation%252C%2520providing%2520a%2520stable%2520conditioning%2520signal%2520that%2520compensates%2520for%2520pose%2520errors.%2520To%2520support%2520long%2520sequences%252C%2520we%2520propose%2520a%2520hybrid%2520KV%2520cache%2520compression%2520strategy%2520combining%2520early-layer%2520truncation%2520with%2520chunk-level%2520selective%2520retention%252C%2520reducing%2520the%2520KV%2520cache%2520size%2520by%2520over%252090%2525%2520for%2520100%252B%2520frames.%2520ReCoSplat%2520achieves%2520state-of-the-art%2520performance%2520across%2520different%2520input%2520settings%2520on%2520both%2520in-%2520and%2520out-of-distribution%2520benchmarks.%2520Code%2520and%2520pretrained%2520models%2520will%2520be%2520released.%2520Our%2520project%2520page%2520is%2520at%2520https%253A//freemancheng.com/ReCoSplat%2520.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09968v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ReCoSplat%3A%20Autoregressive%20Feed-Forward%20Gaussian%20Splatting%20Using%20Render-and-Compare&entry.906535625=Freeman%20Cheng%20and%20Botao%20Ye%20and%20Xueting%20Li%20and%20Junqi%20You%20and%20Fangneng%20Zhan%20and%20Ming-Hsuan%20Yang&entry.1292438233=Online%20novel%20view%20synthesis%20remains%20challenging%2C%20requiring%20robust%20scene%20reconstruction%20from%20sequential%2C%20often%20unposed%2C%20observations.%20We%20present%20ReCoSplat%2C%20an%20autoregressive%20feed-forward%20Gaussian%20Splatting%20model%20supporting%20posed%20or%20unposed%20inputs%2C%20with%20or%20without%20camera%20intrinsics.%20While%20assembling%20local%20Gaussians%20using%20camera%20poses%20scales%20better%20than%20canonical-space%20prediction%2C%20it%20creates%20a%20dilemma%20during%20training%3A%20using%20ground-truth%20poses%20ensures%20stability%20but%20causes%20a%20distribution%20mismatch%20when%20predicted%20poses%20are%20used%20at%20inference.%20To%20address%20this%2C%20we%20introduce%20a%20Render-and-Compare%20%28ReCo%29%20module.%20ReCo%20renders%20the%20current%20reconstruction%20from%20the%20predicted%20viewpoint%20and%20compares%20it%20with%20the%20incoming%20observation%2C%20providing%20a%20stable%20conditioning%20signal%20that%20compensates%20for%20pose%20errors.%20To%20support%20long% {"title": "GSStream: 3D Gaussian Splatting based Volumetric Scene Streaming System", "author": "Zhiye Tang and Qiudan Zhang and Lei Zhang and Junhui Hou and You Yang and Xu Wang", "abstract": "Recently, the 3D Gaussian splatting (3DGS) technique for real-time radiance field rendering has revolutionized the field of volumetric scene representation, providing users with an immersive experience. But in return, it also poses a large amount of data volume, which is extremely bandwidth-intensive. Cutting-edge researchers have tried to introduce different approaches and construct multiple variants for 3DGS to obtain a more compact scene representation, but it is still challenging for real-time distribution. In this paper, we propose GSStream, a novel volumetric scene streaming system to support 3DGS data format. Specifically, GSStream integrates a collaborative viewport prediction module to better predict users' future behaviors by learning collaborative priors and historical priors from multiple users and users' viewport sequences and a deep reinforcement learning (DRL)-based bitrate adaptation module to tackle the state and action space variability challenge of the bitrate adaptation problem, achieving efficient volumetric scene delivery. Besides, we first build a user viewport trajectory dataset for volumetric scenes to support the training and streaming simulation. Extensive experiments prove that our proposed GSStream system outperforms existing representative volumetric scene streaming systems in visual quality and network usage. Demo video: https://youtu.be/3WEe8PN8yvA.", "link": "http://arxiv.org/abs/2603.09718v1", "date": "2026-03-10", "relevancy": 3.1991, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6862}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6248}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6085}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GSStream%3A%203D%20Gaussian%20Splatting%20based%20Volumetric%20Scene%20Streaming%20System&body=Title%3A%20GSStream%3A%203D%20Gaussian%20Splatting%20based%20Volumetric%20Scene%20Streaming%20System%0AAuthor%3A%20Zhiye%20Tang%20and%20Qiudan%20Zhang%20and%20Lei%20Zhang%20and%20Junhui%20Hou%20and%20You%20Yang%20and%20Xu%20Wang%0AAbstract%3A%20Recently%2C%20the%203D%20Gaussian%20splatting%20%283DGS%29%20technique%20for%20real-time%20radiance%20field%20rendering%20has%20revolutionized%20the%20field%20of%20volumetric%20scene%20representation%2C%20providing%20users%20with%20an%20immersive%20experience.%20But%20in%20return%2C%20it%20also%20poses%20a%20large%20amount%20of%20data%20volume%2C%20which%20is%20extremely%20bandwidth-intensive.%20Cutting-edge%20researchers%20have%20tried%20to%20introduce%20different%20approaches%20and%20construct%20multiple%20variants%20for%203DGS%20to%20obtain%20a%20more%20compact%20scene%20representation%2C%20but%20it%20is%20still%20challenging%20for%20real-time%20distribution.%20In%20this%20paper%2C%20we%20propose%20GSStream%2C%20a%20novel%20volumetric%20scene%20streaming%20system%20to%20support%203DGS%20data%20format.%20Specifically%2C%20GSStream%20integrates%20a%20collaborative%20viewport%20prediction%20module%20to%20better%20predict%20users%27%20future%20behaviors%20by%20learning%20collaborative%20priors%20and%20historical%20priors%20from%20multiple%20users%20and%20users%27%20viewport%20sequences%20and%20a%20deep%20reinforcement%20learning%20%28DRL%29-based%20bitrate%20adaptation%20module%20to%20tackle%20the%20state%20and%20action%20space%20variability%20challenge%20of%20the%20bitrate%20adaptation%20problem%2C%20achieving%20efficient%20volumetric%20scene%20delivery.%20Besides%2C%20we%20first%20build%20a%20user%20viewport%20trajectory%20dataset%20for%20volumetric%20scenes%20to%20support%20the%20training%20and%20streaming%20simulation.%20Extensive%20experiments%20prove%20that%20our%20proposed%20GSStream%20system%20outperforms%20existing%20representative%20volumetric%20scene%20streaming%20systems%20in%20visual%20quality%20and%20network%20usage.%20Demo%20video%3A%20https%3A//youtu.be/3WEe8PN8yvA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09718v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGSStream%253A%25203D%2520Gaussian%2520Splatting%2520based%2520Volumetric%2520Scene%2520Streaming%2520System%26entry.906535625%3DZhiye%2520Tang%2520and%2520Qiudan%2520Zhang%2520and%2520Lei%2520Zhang%2520and%2520Junhui%2520Hou%2520and%2520You%2520Yang%2520and%2520Xu%2520Wang%26entry.1292438233%3DRecently%252C%2520the%25203D%2520Gaussian%2520splatting%2520%25283DGS%2529%2520technique%2520for%2520real-time%2520radiance%2520field%2520rendering%2520has%2520revolutionized%2520the%2520field%2520of%2520volumetric%2520scene%2520representation%252C%2520providing%2520users%2520with%2520an%2520immersive%2520experience.%2520But%2520in%2520return%252C%2520it%2520also%2520poses%2520a%2520large%2520amount%2520of%2520data%2520volume%252C%2520which%2520is%2520extremely%2520bandwidth-intensive.%2520Cutting-edge%2520researchers%2520have%2520tried%2520to%2520introduce%2520different%2520approaches%2520and%2520construct%2520multiple%2520variants%2520for%25203DGS%2520to%2520obtain%2520a%2520more%2520compact%2520scene%2520representation%252C%2520but%2520it%2520is%2520still%2520challenging%2520for%2520real-time%2520distribution.%2520In%2520this%2520paper%252C%2520we%2520propose%2520GSStream%252C%2520a%2520novel%2520volumetric%2520scene%2520streaming%2520system%2520to%2520support%25203DGS%2520data%2520format.%2520Specifically%252C%2520GSStream%2520integrates%2520a%2520collaborative%2520viewport%2520prediction%2520module%25 uce%20different%20approaches%20and%20construct%20multiple%20variants%20for%203DGS%20to%20obtain%20a%20more%20compact%20scene%20representation%2C%20but%20it%20is%20still%20challenging%20for%20real-time%20distribution.%20In%20this%20paper%2C%20we%20propose%20GSStream%2C%20a%20novel%20volumetric%20scene%20streaming%20system%20to%20support%203DGS%20data%20format.%20Specifically%2C%20GSStream%20integrates%20a%20collaborative%20viewport%20prediction%20module%20to%20better%20predict%20users%27%20future%20behaviors%20by%20learning%20collaborative%20priors%20and%20historical%20priors%20from%20multiple%20users%20and%20users%27%20viewport%20sequences%20and%20a%20deep%20reinforcement%20learning%20%28DRL%29-based%20bitrate%20adaptation%20module%20to%20tackle%20the%20state%20and%20action%20space%20variability%20challenge%20of%20the%20bitrate%20adaptation%20problem%2C%20achieving%20efficient%20volumetric%20scene%20delivery.%20Besides%2C%20we%20first%20build%20a%20user%20viewport%20trajectory%20dataset%20for%20volumetric%20scenes%20to%20support%20the%20training%20and%20streaming%20simulation.%20Extensive%20experiments%20prove%20that%20our%20proposed%20GSStream%20system%20outperforms%20existing%20representative%20volumetric%20scene%20streaming%20systems%20in%20visual%20quality%20and%20network%20usage.%20Demo%20video%3A%20https%3A//youtu.be/3WEe8PN8yvA.&entry.1838667208=http%3A//arxiv.org/abs/2603.09718v1&entry.124074799=Read"},
{"title": "ProGS: Towards Progressive Coding for 3D Gaussian Splatting", "author": "Zhiye Tang and Lingzhuo Liu and Shengjie Jiao and Qiudan Zhang and Junhui Hou and You Yang and Xu Wang", "abstract": "With the emergence of 3D Gaussian Splatting (3DGS), numerous pioneering efforts have been made to address the effective compression issue of massive 3DGS data. 3DGS offers an efficient and scalable representation of 3D scenes by utilizing learnable 3D Gaussians, but the large size of the generated data has posed significant challenges for storage and transmission. Existing methods, however, have been limited by their inability to support progressive coding, a crucial feature in streaming applications with varying bandwidth. To tackle this limitation, this paper introduce a novel approach that organizes 3DGS data into an octree structure, enabling efficient progressive coding. The proposed ProGS is a streaming-friendly codec that facilitates progressive coding for 3D Gaussian splatting, and significantly improves both compression efficiency and visual fidelity. The proposed method incorporates mutual information enhancement mechanisms to mitigate structural redundancy, leveraging the relevance between nodes in the octree hierarchy. By adapting the octree structure and dynamically adjusting the anchor nodes, ProGS ensures scalable data compression without compromising the rendering quality. ProGS achieves a remarkable 45X reduction in file storage compared to the original 3DGS format, while simultaneously improving visual performance by over 10%. This demonstrates that ProGS can provide a robust solution for real-time applications with varying network conditions.", "link": "http://arxiv.org/abs/2603.09703v1", "date": "2026-03-10", "relevancy": 3.1412, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.662}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6126}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6102}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProGS%3A%20Towards%20Progressive%20Coding%20for%203D%20Gaussian%20Splatting&body=Title%3A%20ProGS%3A%20Towards%20Progressive%20Coding%20for%203D%20Gaussian%20Splatting%0AAuthor%3A%20Zhiye%20Tang%20and%20Lingzhuo%20Liu%20and%20Shengjie%20Jiao%20and%20Qiudan%20Zhang%20and%20Junhui%20Hou%20and%20You%20Yang%20and%20Xu%20Wang%0AAbstract%3A%20With%20the%20emergence%20of%203D%20Gaussian%20Splatting%20%283DGS%29%2C%20numerous%20pioneering%20efforts%20have%20been%20made%20to%20address%20the%20effective%20compression%20issue%20of%20massive%203DGS%20data.%203DGS%20offers%20an%20efficient%20and%20scalable%20representation%20of%203D%20scenes%20by%20utilizing%20learnable%203D%20Gaussians%2C%20but%20the%20large%20size%20of%20the%20generated%20data%20has%20posed%20significant%20challenges%20for%20storage%20and%20transmission.%20Existing%20methods%2C%20however%2C%20have%20been%20limited%20by%20their%20inability%20to%20support%20progressive%20coding%2C%20a%20crucial%20feature%20in%20streaming%20applications%20with%20varying%20bandwidth.%20To%20tackle%20this%20limitation%2C%20this%20paper%20introduce%20a%20novel%20approach%20that%20organizes%203DGS%20data%20into%20an%20octree%20structure%2C%20enabling%20efficient%20progressive%20coding.%20The%20proposed%20ProGS%20is%20a%20streaming-friendly%20codec%20that%20facilitates%20progressive%20coding%20for%203D%20Gaussian%20splatting%2C%20and%20significantly%20improves%20both%20compression%20efficiency%20and%20visual%20fidelity.%20The%20proposed%20method%20incorporates%20mutual%20information%20enhancement%20mechanisms%20to%20mitigate%20structural%20redundancy%2C%20leveraging%20the%20relevance%20between%20nodes%20in%20the%20octree%20hierarchy.%20By%20adapting%20the%20octree%20structure%20and%20dynamically%20adjusting%20the%20anchor%20nodes%2C%20ProGS%20ensures%20scalable%20data%20compression%20without%20compromising%20the%20rendering%20quality.%20ProGS%20achieves%20a%20remarkable%2045X%20reduction%20in%20file%20storage%20compared%20to%20the%20original%203DGS%20format%2C%20while%20simultaneously%20improving%20visual%20performance%20by%20over%2010%25.%20This%20demonstrates%20that%20ProGS%20can%20provide%20a%20robust%20solution%20for%20real-time%20applications%20with%20varying%20network%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09703v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProGS%253A%2520Towards%2520Progressive%2520Coding%2520for%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DZhiye%2520Tang%2520and%2520Lingzhuo%2520Liu%2520and%2520Shengjie%2520Jiao%2520and%2520Qiudan%2520Zhang%2520and%2520Junhui%2520Hou%2520and%2520You%2520Yang%2520and%2520Xu%2520Wang%26entry.1292438233%3DWith%2520the%2520emergence%2520of%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%252C%2520numerous%2520pioneering%2520efforts%2520have%2520been%2520made%2520to%2520address%2520the%2520effective%2520compression%2520issue%2520of%2520massive%25203DGS%2520data.%25203DGS%2520offers%2520an%2520efficient%2520and%2520scalable%2520representation%2520of%25203D%2520scenes%2520by%2520utilizing%2520learnable%25203D%2520Gaussians%252C%2520but%2520the%2520large%2520size%2520of%2520the%2520generated%2520data%2520has%2520posed%2520significant%2520challenges%2520for%2520storage%2520and%2520transmission.%2520Existing%2520methods%252C%2520however%252C%2520have%2520been%2520limited%2520by%2520their%2520inability%2520to%2520support%2520progressive%2520coding%252C%2520a%2520crucial%2520feature%2520in%2520streaming%2520applications%2520with%2520varying%2520bandwidth.%2520To%2520tackle%2520this%2520limitation%252C% ng%20efforts%20have%20been%20made%20to%20address%20the%20effective%20compression%20issue%20of%20massive%203DGS%20data.%203DGS%20offers%20an%20efficient%20and%20scalable%20representation%20of%203D%20scenes%20by%20utilizing%20learnable%203D%20Gaussians%2C%20but%20the%20large%20size%20of%20the%20generated%20data%20has%20posed%20significant%20challenges%20for%20storage%20and%20transmission.%20Existing%20methods%2C%20however%2C%20have%20been%20limited%20by%20their%20inability%20to%20support%20progressive%20coding%2C%20a%20crucial%20feature%20in%20streaming%20applications%20with%20varying%20bandwidth.%20To%20tackle%20this%20limitation%2C%20this%20paper%20introduce%20a%20novel%20approach%20that%20organizes%203DGS%20data%20into%20an%20octree%20structure%2C%20enabling%20efficient%20progressive%20coding.%20The%20proposed%20ProGS%20is%20a%20streaming-friendly%20codec%20that%20facilitates%20progressive%20coding%20for%203D%20Gaussian%20splatting%2C%20and%20significantly%20improves%20both%20compression%20efficiency%20and%20visual%20fidelity.%20The%20proposed%20method%20incorporates%20mutual%20information%20enhancement%20mechanisms%20to%20mitigate%20structural%20redundancy%2C%20leveraging%20the%20relevance%20between%20nodes%20in%20the%20octree%20hierarchy.%20By%20adapting%20the%20octree%20structure%20and%20dynamically%20adjusting%20the%20anchor%20nodes%2C%20ProGS%20ensures%20scalable%20data%20compression%20without%20compromising%20the%20rendering%20quality.%20ProGS%20achieves%20a%20remarkable%2045X%20reduction%20in%20file%20storage%20compared%20to%20the%20original%203DGS%20format%2C%20while%20simultaneously%20improving%20visual%20performance%20by%20over%2010%25.%20This%20demonstrates%20that%20ProGS%20can%20provide%20a%20robust%20solution%20for%20real-time%20applications%20with%20varying%20network%20conditions.&entry.1838667208=http%3A//arxiv.org/abs/2603.09703v1&entry.124074799=Read"},
{"title": "Physics-Driven 3D Gaussian Rendering for Zero-Shot MRI Super-Resolution", "author": "Shuting Liu and Lei Zhang and Wei Huang and Zhao Zhang and Zizhou Wang", "abstract": "High-resolution Magnetic Resonance Imaging (MRI) is vital for clinical diagnosis but limited by long acquisition times and motion artifacts. Super-resolution (SR) reconstructs low-resolution scans into high-resolution images, yet existing methods are mutually constrained: paired-data methods achieve efficiency only by relying on costly aligned datasets, while implicit neural representation approaches avoid such data needs at the expense of heavy computation. We propose a zero-shot MRI SR framework using explicit Gaussian representation to balance data requirements and efficiency. MRI-tailored Gaussian parameters embed tissue physical properties, reducing learnable parameters while preserving MR signal fidelity. A physics-grounded volume rendering strategy models MRI signal formation via normalized Gaussian aggregation. Additionally, a brick-based order-independent rasterization scheme enables highly parallel 3D computation, lowering training and inference costs. Experiments on two public MRI datasets show superior reconstruction quality and efficiency, demonstrating the method's potential for clinical MRI SR.", "link": "http://arxiv.org/abs/2603.09621v1", "date": "2026-03-10", "relevancy": 3.1359, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6459}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6338}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6018}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physics-Driven%203D%20Gaussian%20Rendering%20for%20Zero-Shot%20MRI%20Super-R {"title": "More than the Sum: Panorama-Language Models for Adverse Omni-Scenes", "author": "Weijia Fan and Ruiping Liu and Jiale Wei and Yufan Chen and Junwei Zheng and Zichao Zeng and Jiaming Zhang and Qiufu Li and Linlin Shen and Rainer Stiefelhagen", "abstract": "Existing vision-language models (VLMs) are tailored for pinhole imagery, stitching multiple narrow field-of-view inputs to piece together a complete omni-scene understanding. Yet, such multi-view perception overlooks the holistic spatial and contextual relationships that a single panorama inherently preserves. In this work, we introduce the Panorama-Language Modeling (PLM)paradigm, a unified $360^\\circ$ vision-language reasoning that is more than the sum of its pinhole counterparts. Besides, we present PanoVQA, a large-scale panoramic VQA dataset that involves adverse omni-scenes, enabling comprehensive reasoning under object occlusions and driving accidents. To establish a foundation for PLM, we develop a plug-and-play panoramic sparse attention module that allows existing pinhole-based VLMs to process equirectangular panoramas without retraining. Extensive experiments demonstrate that our PLM achieves superior robustness and holistic reasoning under challenging omni-scenes, yielding understanding greater than the sum of its narrow parts. Project page: https://github.com/InSAI-Lab/PanoVQA.", "link": "http://arxiv.org/abs/2603.09573v1", "date": "2026-03-10", "relevancy": 3.069, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6171}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6171}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6072}], "mailto": "mailto:haoxiang.li.2 {"title": "VLM-Loc: Localization in Point Cloud Maps via Vision-Language Models", "author": "Shuhao Kang and Youqi Liao and Peijie Wang and Wenlong Liao and Qilin Zhang and Benjamin Busam and Xieyuanli Chen and Yun Liu", "abstract": "Text-to-point-cloud (T2P) localization aims to infer precise spatial positions within 3D point cloud maps from natural language descriptions, reflecting how humans perceive and communicate spatial layouts through language. However, existing methods largely rely on shallow text-point cloud correspondence without effective spatial reasoning, limiting their accuracy in complex environments. To address this limitation, we propose VLM-Loc, a framework that leverages the spatial reasoning capability of large vision-language models (VLMs) for T2P localization. Specifically, we transform point clouds into bird's-eye-view (BEV) images and scene graphs that jointly encode geometric and semantic context, providing structured inputs for the VLM to learn cross-modal representations bridging linguistic and spatial semantics. On top of these representations, we introduce a partial node assignment mechanism that explicitly associates textual cues with scene graph nodes, enabling interpretable spatial reasoning for accurate localization. To facilitate systematic evaluation across diverse scenes, we present CityLoc, a benchmark built from multi-source point clouds for fine-grained T2P localization. Experiments on CityLoc demonstrate VLM-Loc achieves superior accuracy and robustness compared to state-of-the-art methods. Our code, model, and dataset are available at \\href{https://github.com/MCG-NKU/nku-3d-vision}{repository}.", "link": "http://arxiv.org/abs/2603.09826v1", "date": "2026-03-10", "relevancy": 3.0273, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6279}, {"title": "uPLAM: Robust Panoptic Localization and {"title": "From Semantics to Pixels: Coarse-to-Fine Masked Autoencoders for Hierarchical Visual Understanding", "author": "Wenzhao Xiang and Yue Wu and Hongyang Yu and Feng Gao and Fan Yang and Xilin Chen", "abstract": "Self-supervised visual pre-training methods face an inherent tension: contrastive learning (CL) captures global semantics but loses fine-grained detail, while masked image modeling (MIM) preserves local textures but suffers from \"attention drift\" due to semantically-agnostic random masking. We propose C2FMAE, a coarse-to-fine masked autoencoder that resolves this tension by explicitly learning hierarchical visual representations across three data granularities: semantic masks (scene-level), instance masks (object-level), and RGB images (pixel-level). Two synergistic innovations enforce a strict top-down learning principle. First, a cascaded decoder sequentially reconstructs from scene semantics to object instances to pixel details, establishing explicit cross-granularity dependencies that parallel decoders cannot capture. Second, a progressive masking curriculum dynamically shifts the training focus from semantic-guided to instance-guided and finally to random masking, creating a structured learning path from global context to local features. To support this framework, we construct a large-scale multi-granular dataset with high-quality pseudo-labels for all 1.28M ImageNet-1K images. Extensive experiments show that C2FMAE achieves significant performance gains on image classification, object detection, and semantic segmentation, validating the effectiveness of our hierarchical design in learning more robust and generalizable representations.", "link": "http://arxiv.org/abs/2603.09955v1", "date": "2026-03-10", "relevancy": 2.964, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5969}, {"title": "TAMM: TriAdapter Multi-Modal Learning for {"title": "High-Fidelity Medical Shape Generation via Skeletal Latent Diffusion", "author": "Guoqing Zhang and Jingyun Yang and Siqi Chen and Anping Zhang and Yang Li", "abstract": "Anatomy shape modeling is a fundamental problem in medical data analysis. However, the geometric complexity and topological variability of anatomical structures pose significant challenges to accurate anatomical shape generation. In this work, we propose a skeletal latent diffusion framework that explicitly incorporates structural priors for efficient and high-fidelity medical shape generation. We introduce a shape auto-encoder in which the encoder captures global geometric information through a differentiable skeletonization module and aggregates local surface features into shape latents, while the decoder predicts the corresponding implicit fields over sparsely sampled coordinates. New shapes are generated via a latent-space diffusion model, followed by neural implicit decoding and mesh extraction. To address the limited availability of medical shape data, we construct a large-scale dataset, \\textit{MedSDF}, comprising surface point clouds and corresponding signed distance fields across multiple anatomical categories. Extensive experiments on MedSDF and vessel datasets demonstrate that the proposed method achieves superior reconstruction and generation quality while maintaining a higher computational efficiency compared with existing approaches. Code is available at: https://github.com/wlsdzyzl/meshage.", "link": "http://arxiv.org/abs/2603.07504v2", "date": "2026-03-10", "relevancy": 2.9609, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6155}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5873}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link" fficiency%20compared%20with%20existing%20approaches.%20Code%20is%20available%20at%3A%20https%3A//github.com/wlsdzyzl/meshage.%0ALink%3A%20http%3A//arxiv.org/abs/2603.07504v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHigh-Fidelity%2520Medical%2520Shape%2520Generation%2520via%2520Skeletal%2520Latent%2520Diffusion%26entry.906535625%3DGuoqing%2520Zhang%2520and%2520Jingyun%2520Yang%2520and%2520Siqi%2520Chen%2520and%2520Anping%2520Zhang%2520and%2520Yang%2520Li%26entry.1292438233%3DAnatomy%2520shape%2520modeling%2520is%2520a%2520fundamental%2520problem%2520in%2520medical%2520data%2520analysis.%2520However%252C%2520the%2520geometric%2520complexity%2520and%2520topological%2520variability%2520of%2520anatomical%2520structures%2520pose%2520significant%2520challenges%2520to%2520accurate%2520anatomical%2520shape%2520generation.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520skeletal%2520latent%2520diffusion%2520framework%2520that%2520explicitly%2520incorporates%2520structural%2520priors%2520for%2520efficient%2520and%2520high-fidelity%2520medical%2520shape%2520generation.%2520We%2520introduce%2520a%2520shape%2520auto-encoder%2520in%2520which%2520the%2520encoder%2520captures%2520global%2520geometric%2520information%2520through%2520a%2520differentiable%2520skeletonization%2520module%2520and%2520aggregates%2520local%2520surface%2520features%2520into%2520shape%2520latents%252C%2520while%2520the%2520decoder%2520predicts%2520the%2520corresponding%2520implicit%2520fields%2520over%2520sparsely%2520sampled%2520coordinates.%2520New%2520shapes%2520are%2520generated%2520via%2520a%2520latent-space%2520diffusion%2520model%252C%2520followed%2520by%2520neural%2520implicit%2520decoding%2520and%2520mesh%2520extraction.%2520To%2520address%2520the%2520limited%2520availability%2520of%2520medical%2520shape%2520data%252C%2520we%2520construct%2520a%2520large-scale%2520dataset%252C%2520%255Ctextit%257B {"title": "OmniEarth: A Benchmark for Evaluating Vision-Language Models in Geospatial Tasks", "author": "Ronghao Fu and Haoran Liu and Weijie Zhang and Zhiwen Lin and Xiao Yang and Peng Zhang and Bo Yang", "abstract": "Vision-Language Models (VLMs) have demonstrated effective perception and reasoning capabilities on general-domain tasks, leading to growing interest in their application to Earth observation. However, a systematic benchmark for comprehensively evaluating remote sensing vision-language models (RSVLMs) remains lacking. To address this gap, we introduce OmniEarth, a benchmark for evaluating RSVLMs under realistic Earth observation scenarios. OmniEarth organizes tasks along three capability dimensions: perception, reasoning, and robustness. It defines 28 fine-grained tasks covering multi-source sensing data and diverse geospatial contexts. The benchmark supports two task formulations: multiple-choice VQA and open-ended VQA. The latter includes pure text outputs for captioning tasks, bounding box outputs for visual grounding tasks, and mask outputs for segmentation tasks. To reduce linguistic bias and examine whether model predictions rely on visual evidence, OmniEarth adopts a blind test protocol and a quintuple semantic consistency requirement. OmniEarth includes 9,275 carefully quality-controlled images, including proprietary satellite imagery from Jilin-1 (JL-1), along with 44,210 manually verified instructions. We conduct a systematic evaluation of contrastive learning-based models, general closed-source and open-source VLMs, as well as RSVLMs. Results show that existing VLMs still struggle with geospatially complex tasks, revealing clear gaps that need to be addressed for remote sensing applications. OmniEarth is publicly available at https://huggingface.co/datasets/sjeeudd/OmniEarth.", "link": "http://arxiv.org/abs/2603.09471v1", "date": "2026-03-10", "relevancy": 2.9366, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6185}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6185}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5251}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniEarth%3A%20A%20Benchmark%20for%20Evaluating%20Vision-Language%20Models%20in%20Geospatial%20Tasks&body=Title%3A%20OmniEarth%3A%20A%20Benchmark%20for%20Evaluating%20Vision-Language%20Models%20in%20Geospatial%20Tasks%0AAuthor%3A%20Ronghao%20Fu%20and%20Haoran%20Liu%20and%20Weijie%20Zhang%20and%20Zhiwen%20Lin%20and%20Xiao%20Yang%20and%20Peng%20Zhang%20and%20Bo%20Yang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20effective%20perception%20and%20reasoning%20capabilities%20on%20general-domain%20tasks%2C%20leading%20to%20growing%20interest%20in%20their%20application%20to%20Earth%20observation.%20However%2C%20a%20systematic%20benchmark%20for%20comprehensively%20evaluating%20remote%20sensing%20vision-language%20models%20%28RSVLMs%29%20remains%20lacking.%20To%20address%20this%20gap%2C%20we%20introduce%20OmniEarth%2C%20a%20benchmark%20for%20evaluating%20RSVLMs%20under%20realistic%20Earth%20observation%20scenarios.%20OmniEarth%20organizes%20tasks%20along%20three%20capability%20dimensions%3A%20perception%2C%20reasoning%2C%20and%20robustness.%20It%20defines%2028%20fine-grained%20tasks%20covering%20multi-source%20sensing%20data%20and%20diverse%20geospatial%20contexts.%20The%20benchmark%20supports%20two%20task%20formulations%3A%20multiple-choice%20VQA%20and%20open-ended%20VQA.%20The%20latter%20includes%20pure%20text%20outputs%20for%20captioning%20tasks%2C%20bounding%20box%20outputs%20for%20visual%20grounding%20tasks%2C%20and%20mask%20outputs%20for%20segmentation%20tasks.%20To%20reduce%20linguistic%20bias%20and%20examine%20whether%20model%20predictions%20rely%20on%20visual%20evidence%2C%20OmniEarth%20adopts%20a%20blind%20test%20protocol%20and%20a%20quintuple%20semantic%20consistency%20requirement.%20OmniEarth%20includes%209%2C275%20carefully%20quality-controlled%20images%2C%20including%20proprietary%20satellite%20imagery%20from%20Jilin-1%20%28JL-1%29%2C%20along%20with%2044%2C210%20manually%20verified%20instructions.%20We%20conduct%20a%20systematic%20evaluation%20of%20contrastive%20learning-based%20models%2C%20general%20closed-source%20and%20open-source%20VLMs%2C%20as%20well%20as%20RSVLMs.%20Results%20show%20that%20existing%20VLMs%20still%20struggle%20with%20geospatially%20complex%20tasks%2C%20revealing%20clear%20gaps%20that%20need%20to%20be%20addressed%20for%20remote%20sensing%20applications.%20OmniEarth%20is%20publicly%20available%20at%20https%3A//huggingface.co/datasets/sjeeudd/OmniEarth.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09471v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniEarth%253A%2520A%2520Benchmark%2520for%2520Evaluating%2520Vision-Language%2520Models%2520in%2520Geospatial%2520Tasks%26entry.906535625%3DRonghao%2520Fu%2520and%2520Haoran%2520Liu%2520and%2520Weijie%2520Zhang%2520and%2520Zhiwen%2520Lin%2520and%2520Xiao%2520Yang%2520and%2520Peng%2520Zhang%2520and%2520Bo%2520Yang%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520effective%2520perception%2520and%2520reasoning%2520capabilities%2520on%2520general-domain%2520tasks%252C%2520leading%2520to%2520growing%2520interest%2520in%2520their%2520application%2520to%2520Earth%2520observation.%2520However%252C%2520a%2520systematic%2520benchmark%2520for%2520comprehensively%2520evaluating%2520remote%2520sensing%2520vision-language%2520models%2520%2528RSVLMs%2529%2520remains%2520lacking.%2520To%2520address%2520this%2520gap%252C%2520we%2 {"title": "Learning Encoding-Decoding Direction Pairs to Unveil Concepts of Influence in Deep Vision Networks", "author": "Alexandros Doumanoglou and Kurt Driessens and Dimitrios Zarpalas", "abstract": "Empirical evidence shows that deep vision networks often represent concepts as directions in latent space with concept information written along directional components in the vector representation of the input. However, the mechanism to encode (write) and decode (read) concept information to and from vector representations is not directly accessible as it constitutes a latent mechanism that naturally emerges from the training process of the network. Recovering this mechanism unlocks significant potential to open the black-box nature of deep networks, enabling understanding, debugging, and improving deep learning models. In this work, we propose an unsupervised method to recover this mechanism. For each concept, we explain that under the hypothesis of linear concept representations, this mechanism can be implemented with the help of two directions: the first facilitating encoding of concept information and the second facilitating decoding. Unlike prior matrix decomposition, autoencoder, or dictionary learning methods that rely on feature reconstruction, we propose a new perspective: decoding directions are identified via directional clustering of activations, and encoding directions are estimated with signal vectors under a probabilistic view. We further leverage network weights through a novel technique, Uncertainty Region Alignment, which reveals interpretable directions affecting predictions. Our analysis shows that (a) on synthetic data, our method recovers ground-truth direction pairs; (b) on real data, decoding directions map to monosemantic, interpretable concepts and outperform unsupervised baselines; and (c) signal vectors faithfully estimate encoding directions, validated via activation maximization. Finally, we demonstrate applications in understanding global model behavior, explaining individual predictions, and intervening to produce counterfactuals or correct errors.", "link": "http://arxiv.org/abs/2509.23926v3", "date": "2026-03-10", "relevancy": 2.901, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.591}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.591}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5587}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Encoding-Decoding%20Direction%20Pairs%20to%20Unveil%20Concepts%20of%20Influence%20in%20Deep%20Vision%20Networks&body=Title%3A%20Learning%20Encoding-Decoding%20Direction%20Pairs%20to%20Unveil%20Concepts%20of%20Influence%20in%20Deep%20Vision%20Networks%0AAuthor%3A%20Alexandros%20Doumanoglou%20and%20Kurt%20Driessens%20and%20Dimitrios%20Zarpalas%0AAbstract%3A%20Empirical%20evidence%20shows%20that%20deep%20vision%20networks%20often%20represent%20concepts%20as%20directions%20in%20latent%20space%20with%20concept%20information%20written%20along%20directional%20components%20in%20the%20vector%20representation%20of%20the%20input.%20However%2C%20the%20mechanism%20to%20encode%20%28write%29%20and%20decode%20%28read%29%20concept%20information%20to%20and%20from%20vector%20representations%20is%20not%20directly%20accessible%20as%20it%20constitutes%20a%20latent%20mechanism%20that%20naturally%20emerges%20from%20the%20training%20process%20of%20the%20network.%20Recovering%20this%20mechanism%20unlocks%20significant%20potential%20to%20open%20the%20black-box%20nature%20of%20deep%20networks%2C%20enabling%20understanding%2C%20debugging%2C%20and%20improving%20deep%20learning%20models.%20In%20this%20work%2C%20we%20propose%20an%20unsupervised%20method%20to%20recover%20this%20mechanism.%20For%20each%20concept%2C%20we%20explain%20that%20under%20the%20hypothesis%20of%20linear%20concept%20representations%2C%20this%20mechanism%20can%20be%20implemented%20with%20the%20help%20of%20two%20directions%3A%20the%20first%20facilitating%20encoding%20of%20concept%20information%20and%20the%20second%20facilitating%20decoding.%20Unlike%20prior%20matrix%20decomposition%2C%20autoencoder%2C%20or%20dictionary%20learning%20methods%20that%20rely%20on%20feature%20reconstruction%2C%20we%20propose%20a%20new%20perspective%3A%20decoding%20directions%20are%20identified%20via%20directional%20clustering%20of%20activations%2C%20and%20encoding%20directions%20are%20estimated%20with%20signal%20vectors%20under%20a%20probabilistic%20view.%20We%20further%20leverage%20network%20weights%20through%20a%20novel%20technique%2C%20Uncertainty%20Region%20Alignment%2C%20which%20reveals%20interpretable%20directions%20affecting%20predictions.%20Our%20analysis%20shows%20that%20%28a%29%20on%20synthetic%20data%2C%20our%20method%20recovers%20ground-truth%20direction%20pairs%3B%20%28b%29%20on%20real%20data%2C%20decoding%20directions%20map%20to%20monosemantic%2C%20interpretable%20concepts%20and%20outperform%20unsupervised%20baselines%3B%20and%20%28c%29%20signal%20vectors%20faithfully%20estimate%20encoding%20directions%2C%20validated%20via%20activation%20maximization.%20Finally%2C%20we%20demonstrate%20applications%20in%20understanding%20global%20model%20behavior%2C%20explaining%20individual%20predictions%2C%20and%20intervening%20to%20produce%20counterfactuals%20or%20correct%20errors.%0ALink%3A%20http%3A//arxiv.org/abs/2509.23926v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Encoding-Decoding%2520Direction%2520Pairs%2520to%2520Unveil%2520Concepts%2520of%2520Influence%2520in%2520Deep%2520Vision%2520Networks%26entry.906535625%3DAlexandros%2520Doumanoglou%2520and%252 {"title": "InternVL-U: Democratizing Unified Multimodal Models for Understanding, Reasoning, Generation and Editing", "author": "Changyao Tian and Danni Yang and Guanzhou Chen and Erfei Cui and Zhaokai Wang and Yuchen Duan and Penghao Yin and Sitao Chen and Ganlin Yang and Mingxin Liu and Zirun Zhu and Ziqian Fan and Leyao Gu and Haomin Wang and Qi Wei and Jinhui Yin and Xue Yang and Zhihang Zhong and Qi Qin and Yi Xin and Bin Fu and Yihao Liu and Jiaye Ge and Qipeng Guo and Gen Luo and Hongsheng Li and Yu Qiao and Kai Chen and Hongjie Zhang", "abstract": "Unified multimodal models (UMMs) that integrate understanding, reasoning, generation, and editing face inherent trade-offs between maintaining strong semantic comprehension and acquiring powerful generation capabilities. In this report, we present InternVL-U, a lightweight 4B-parameter UMM that democratizes these capabilities within a unified framework. Guided by the principles of unified contextual modeling and modality-specific modular design with decoupled visual representations, InternVL-U integrates a state-of-the-art Multimodal Large Language Model (MLLM) with a specialized MMDiT-based visual generation head. To further bridge the gap between aesthetic generation and high-level intelligence, we construct a comprehensive data synthesis pipeline targeting high-semantic-density tasks, such as text rendering and scientific reasoning, under a reasoning-centric paradigm that leverages Chain-of-Thought (CoT) to better align abstract user intent with fine-grained visual generation details. Extensive experiments demonstrate that InternVL-U achieves a superior performance - efficiency balance. Despite using only 4B parameters, it consistently outperforms unified baseline models with over 3x larger scales such as BAGEL (14B) on various generation and editing tasks, while retaining strong multimodal understanding and reasoning capabilities.", "link": "http://arxiv.org/abs/2603.09877v1", "date": "2026-03-10", "relevancy" {"title": "Prune Redundancy, Preserve Essence: Vision Token Compression in VLMs via Synergistic Importance-Diversity", "author": "Zhengyao Fang and Pengyuan Lyu and Chengquan Zhang and Guangming Lu and Jun Yu and Wenjie Pei", "abstract": "Vision-language models (VLMs) face significant computational inefficiencies caused by excessive generation of visual tokens. While prior work shows that a large fraction of visual tokens are redundant, existing compression methods struggle to balance importance preservation and information diversity. To address this, we propose PruneSID, a training-free Synergistic Importance-Diversity approach featuring a two-stage pipeline: (1) Principal Semantic Components Analysis (PSCA) for clustering tokens into semantically coherent groups, ensuring comprehensive concept coverage, and (2) Intra-group Non-Maximum Suppression (NMS) for pruning redundant tokens while preserving key representative tokens within each group. Additionally, PruneSID incorporates an information-aware dynamic compression ratio mechanism that optimizes token compression rates based on image complexity, enabling more effective average information preservation across diverse scenes. Extensive experiments demonstrate state-of-the-art performance, achieving 96.3% accuracy on LLaVA-1.5 with only 11.1% token retention, and 92.8% accuracy at extreme compression rates (5.6%) on LLaVA-NeXT, outperforming prior methods by 2.5% with 7.8 $\\times$ faster prefilling speed compared to the original model. Our framework generalizes across diverse VLMs and both image and video modalities, showcasing strong cross-modal versatility. Code is available at https://github.com/ZhengyaoFang/PruneSID}{https://github.com/ZhengyaoFang/PruneSID.", "link": "http://arxiv.org/abs/2603.09480v1", "date": "2026-03-10", "relevancy": 2.881, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5828}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5828}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.563}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prune%20Redundancy%2C%20Preserve%20Essence%3A%20Vision%20Token%20Compression%20in%20VLMs%20via%20Synergistic%20Importance-Diversity&body=Title%3A%20Prune%20Redundancy%2C%20Preserve%20Essence%3A%20Vision%20Token%20Compression%20in%20VLMs%20via%20Synergistic%20Importance-Diversity%0AAuthor%3A%20Zhengyao%20Fang%20and%20Pengyuan%20Lyu%20and%20Chengquan%20Zhang%20and%20Guangming%20Lu%20and%20Jun%20Yu%20and%20Wenjie%20Pei%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20face%20significant%20computational%20inefficiencies%20caused%20by%20excessive%20generation%20of%20visual%20tokens.%20While%20prior%20work%20shows%20that%20a%20large%20fraction%20of%20visual%20tokens%20are%20redundant%2C%20existing%20compression%20methods%20struggle%20to%20balance%20importance%20preservation%20and%20information%20diversity.%20To%20address%20this%2C%20we%20propose%20PruneSID%2C%20a%20training-free%20Synergistic%20Importance-Diversity%20approach%20featuring%20a%20two-stage%20pipeline%3A%20%281%29%20Principal%20Semantic%20Components%20Analysis%20%28PSCA%29%20for%20clustering%20tokens%20into%20semantically%20coherent%20groups%2C%20ensuring%20comprehensive%20concept%20coverage%2C%20and%20%282%29%20Intra-group%20Non-Maximum%20Suppression%20%28NMS%29%20for%20pruning%20redundant%20tokens%20while%20preserving%20key%20representative%20tokens%20within%20each%20group.%20Additionally%2C%20PruneSID%20incorporates%20an%20information-aware%20dynamic%20compression%20ratio%20mechanism%20that%20optimizes%20token%20compression%20rates%20based%20on%20image%20complexity%2C%20enabling%20more%20effective%20average%20information%20preservation%20across%20diverse%20scenes.%20Extensive%20experiments%20demonstrate%20state-of-the-art%20performance%2C%20achieving%2096.3%25%20accuracy%20on%20LLaVA-1.5%20with%20only%2011.1%25%20token%20retention%2C%20and%2092.8%25%20accuracy%20at%20extreme%20compression%20rates%20%285.6%25%29%20on%20LLaVA-NeXT%2C%20outperforming%20prior%20methods%20by%202.5%25%20with%207.8%20%24%5Ctimes%24%20faster%20prefilling%20speed%20compared%20to%20the%20original%20model.%20Our%20framework%20generalizes%20across%20diverse%20VLMs%20and%20both%20image%20and%20video%20modalities%2C%20showcasing%20strong%20cross-modal%20versatility.%20Code%20is%20available%20at%20https%3A//github.com/ZhengyaoFang/PruneSID%7D%7Bhttps%3A//github.com/ZhengyaoFang/PruneSID.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09480v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrune%2520Redundancy%252C%2520Preserve%2520Essence%253A%2520Vision%2520Token%2520Compression%2520in%2520VLMs%2520via%2520Synergistic%2520Importance-Diversity%26entry.906535625%3DZhengyao%2520Fang%2520and%2520Pengyuan%2520Lyu%2520and%2520Chengquan%2520Zhang%2520and%2520Guangming%2520Lu%2520and%2520Jun%2520Yu%2520and%2520Wenjie%2520Pei%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520face%2520significant%2520computational%2520inefficiencies%2520caused%2520by%2520excessive%2520generation%2520of%2520visual%2520tokens.%2520While%2520prior%2520work%2520shows%2520that%2520a%2520large%2520fraction%2520of%2520visual%2520tokens%2520are%2520redundant%252C%2520existing%2520compression%2520methods%2520struggle%2520to%2520balance%2520importance%2520preservation%2520and%2520information%2520diversity.%2520To%2520address%2520this%252C%2520we%2520propose%2520PruneSID%252C%2520a%2520training-free%2520Synergistic%2520Importance-Diversity%2520approach%2520featuring%2520a%2520two-stage%2520pipeline%253A%2520%25281%2529%2520Principal%2520Sema {"title": "DiffWind: Physics-Informed Differentiable Modeling of Wind-Driven Object Dynamics", "author": "Yuanhang Lei and Boming Zhao and Zesong Yang and Xingxuan Li and Tao Cheng and Haocheng Peng and Ru Zhang and Yang Yang and Siyuan Huang and Yujun Shen and Ruizhen Hu and Hujun Bao and Zhaopeng Cui", "abstract": "Modeling wind-driven object dynamics from video observations is highly challenging due to the invisibility and spatio-temporal variability of wind, as well as the complex deformations of objects. We present DiffWind, a physics-informed differentiable framework that unifies wind-object interaction modeling, video-based reconstruction, and forward simulation. Specifically, we represent wind as a grid-based physical field and objects as particle systems derived from 3D Gaussian Splatting, with their interaction modeled by the Material Point Method (MPM). To recover wind-driven object dynamics, we introduce a reconstruction framework that jointly optimizes the spatio-temporal wind force field and object motion through differentiable rendering and simulation. To ensure physical validity, we incorporate the Lattice Boltzmann Method (LBM) as a physics-informed constraint, enforcing compliance with fluid dynamics laws. Beyond reconstruction, our method naturally supports forward simulation under novel wind conditions and enables new applications such as wind retargeting. We further introduce WD-Objects, a dataset of synthetic and real-world wind-driven scenes. Extensive experiments demonstrate that our method significantly outperforms prior dynamic scene modeling approaches in both reconstruction accuracy and simulation fidelity, opening a new avenue for video-based wind-object interaction modeling.", "link": "http://arxiv.org/abs/2603.09668v1", "date": "2026-03-10", "relevancy": 2.8774, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5786}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5743}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5736}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DiffWind%3A%20Physics-Informed%20Differentiable%20Modeling%20of%20Wind-Driven%20Object%20Dynamics&body=Title%3A%20DiffWind%3A%20Physics-Informed%20Differentiable%20Modeling%20of%20Wind-Driven%20Object%20Dynamics%0AAuthor%3A%20Yuanhang%20Lei%20and%20Boming%20Zhao%20and%20Zesong%20Yang%20and%20Xingxuan%20Li%20and%20Tao%20Cheng%20and%20Haocheng%20Peng%20and%20Ru%20Zhang%20and%20Yang%20Yang%20and%20Siyuan%20Huang%20and%20Yujun%20Shen%20and%20Ruizhen%20Hu%20and%20Hujun%20Bao%20and%20Zhaopeng%20Cui%0AAbstract%3A%20Modeling%20wind-driven%20object%20dynamics%20from%20video%20observations%20is%20highly%20challenging%20due%20to%20the%20invisibility%20and%20spatio-temporal%20variability%20of%20wind%2C%20as%20well%20as%20the%20complex%20deformations%20of%20objects.%20We%20present%20DiffWind%2C%20a%20physics-informed%20differentiable%20framework%20that%20unifies%20wind-object%20interaction%20modeling%2C%20video-based%20reconstruction%2C%20and%20forward%20simulation.%20Specifically%2C%20we%20represent%20wind%20as%20a%20grid-based%20physical%20field%20and%20objects%20as%20particle%20systems%20derived%20from%203D%20Gaussian%20Splatting%2C%20with%20their%20interaction%20modeled%20by%20the%20Material%20Point%20Method%20%28MPM%29.%20To%20recover%20wind-driven%20object%20dynamics%2C%20we%20introduce%20a%20reconstruction%20framework%20that%20jointly%20optimizes%20the%20spatio-temporal%20wind%20force%20field%20and%20object%20motion%20through%20differentiable%20rendering%20and%20simulation.%20To%20ensure%20physical%20validity%2C%20we%20incorporate%20the%20Lattice%20Boltzmann%20Method%20%28LBM%29%20as%20a%20physics-informed%20constraint%2C%20enforcing%20compliance%20with%20fluid%20dynamics%20laws.%20Beyond%20reconstruction%2C%20our%20method%20naturally%20supports%20forward%20simulation%20under%20novel%20wind%20conditions%20and%20enables%20new%20applications%20such%20as%20wind%20retargeting.%20We%20further%20introduce%20WD-Objects%2C%20a%20dataset%20of%20synthetic%20and%20real-world%20wind-driven%20scenes.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20significantly%20outperforms%20prior%20dynamic%20scene%20modeling%20approaches%20in%20both%20reconstruction%20accuracy%20and%20simulation%20fidelity%2C%20opening%20a%20new%20avenue%20for%20video-based%20wind-object%20interaction%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09668v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiffWind%253A%2520Physics-Informed%2520Differentiable%2520Modeling%2520of%2520Wind-Driven%2520Object%2520Dynamics%26entry.906535625%3DYuanhang%2520Lei%2520and%2520Boming%2520Zhao%2520and%2520Zesong%2520Yang%2520and%2520Xingxuan%2520Li%2520and%2520Tao%2520Cheng%2520and%2520Haocheng%2520Peng%2520and%2520Ru%2520Zhang%2520and%2520Yang%2520Yang%2520and%2520Siyuan%2520Huang%2520and%2520Yujun%2520Shen%2520and%2520Ruizhen%2520Hu%2520and%2520Hujun%2520Bao%2520and%2520Zhaopeng%2520Cui%26entry.1292438233%3DModeling%2520wind-driven%2520object%2520dynamics%2520from%2520video%2520observations%2520is%2520highly%2520challenging%2520due%2520to%2520the%2520invisibility%2520and%2520spatio-temporal%2520variability%2520of%2520wind%252C%2520as%2520well%2520as%2520the%2520complex%2520deformations%2520of%2520objects.%2520We%2520present%2520DiffWind%252C%2520a%2520physics-informed%2520differentiable%2520framework%2520that%2520unifies%2520wind-object%2520interaction%2520modeling%252C%2520video-based%2520reconstruction%252C%2520and%2520forward%2520simulation.%2520Specifically%252C%2520we%2520represent%2520wind%2520as%2520a%2520grid-based%2520physical%2520field%2520and%2520o {"title": "GeoAlignCLIP: Enhancing Fine-Grained Vision-Language Alignment in Remote Sensing via Multi-Granular Consistency Learning", "author": "Xiao Yang and Ronghao Fu and Zhuoran Duan and Zhiwen Lin and Xueyan Liu and Bo Yang", "abstract": "Vision-language pretraining models have made significant progress in bridging remote sensing imagery with natural language. However, existing approaches often fail to effectively integrate multi-granular visual and textual information, relying primarily on global image-text alignment. This limitation hinders the model's ability to accurately capture fine-grained details in images, thus restricting its performance in complex, fine-grained tasks. To address this, we propose GeoAlignCLIP, a unified framework that achieves fine-grained alignment in remote sensing tasks by learning multi-granular semantic alignments and incorporating intra-modal consistency, enabling more precise visual-semantic alignment between image regions and text concepts. Additionally, we construct RSFG-100k, a fine-granular remote sensing dataset containing scene descriptions, region-level annotations, and challenging hard-negative samples, providing hierarchical supervision for model training. Extensive experiments conducted on multiple public remote-sensing benchmarks demonstrate that GeoAlignCLIP consistently outperforms existing RS-specific methods across diverse tasks, exhibiting more robust and accurate fine-grained vision-language alignment.", "link": "http://arxiv.org/abs/2603.09566v1", "date": "2026-03-10", "relevancy": 2.8768, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5841}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoAlignCLIP%3A%20Enhancing%20Fine-Grained%20Vision-Language%20Alignment%20in%20Remote%20Sensing%20via%20Multi-Granular%20Consistency%20Learning&body=Title%3A%20GeoAlignCLIP%3A%20Enhancing%20Fine-Grained%20Vision-Language%20Alignment%20in%20Remote%20Sensing%20via%20Multi-Granular%20Consistency%20Learning%0AAuthor%3A%20Xiao%20Yang%20and%20Ronghao%20Fu%20and%20Zhuoran%20Duan%20and%20Zhiwen%20Lin%20and%20Xueyan%20Liu%20and%20Bo%20Yang%0AAbstract%3A%20Vision-language%20pretraining%20models%20have%20made%20significant%20progress%20in%20bridging%20remote%20sensing%20imagery%20with%20natural%20language.%20However%2C%20existing%20approaches%20often%20fail%20to%20effectively%20integrate%20multi-granular%20visual%20and%20textual%20information%2C%20relying%20primarily%20on%20global%20image-text%20alignment.%20This%20limitation%20hinders%20the%20model%27s%20ability%20to%20accurately%20capture%20fine-grained%20details%20in%20images%2C%20thus%20restricting%20its%20performance%20in%20complex%2C%20fine-grained%20tasks.%20To%20address%20this%2C%20we%20propose%20GeoAlignCLIP%2C%20a%20unified%20framework%20that%20achieves%20fine-grained%20alignment%20in%20remote%20sensing%20tasks%20by%20learning%20multi-granular%20semantic%20alignments%20and%20incorporating%20intra-modal%20consistency%2C%20enabling%20more%20precise%20visual-semantic%20alignment%20between%20image%20regions%20and%20text%20concepts.%20Additionally%2C%20we%20construct%20RSFG-100k%2C%20a%20fine-granular%20remote%20sensing%20dataset%20containing%20scene%20descriptions%2C%20region-level%20annotations%2C%20and%20challenging%20hard-negative%20samples%2C%20providing%20hierarchical%20supervision%20for%20model%20training.%20Extensive%20experiments%20conducted%20on%20multiple%20public%20remote-sensing%20benchmarks%20demonstrate%20that%20GeoAlignCLIP%20consistently%20outperforms%20existing%20RS-specific%20methods%20across%20diverse%20tasks%2C%20exhibiting%20more%20robust%20and%20accurate%20fine-grained%20vision-language%20alignment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09566v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoAlignCLIP%253A%2520Enhancing%2520Fine-Grained%2520Vision-Language%2520Alignment%2520in%2520Remote%2520Sensing%2520via%2520Multi-Granular%2520Consistency%2520Learning%26entry.906535625%3DXiao%2520Yang%2520and%2520Ronghao%2520Fu%2520and%2520Zhuoran%2520Duan%2520and%2520Zhiwen%2520Lin%2520and%2520Xueyan%2520Liu%2520and%2520Bo%2520Yang%26entry.1292438233%3DVision-language%2520pretraining%2520models%2520have%2520made%2520significant%2520progress%2520in%2520bridging%2520remote%2520sensing%2520imagery%2520with%2520natural%2520language.%2520However%252C%2520existing%2520approaches%2520often%2520fail%2520to%2520effectively%2520integrate%2520multi-granular%2520visual%2520and%2520textual%2520information%252C%2520relying%2520primarily%2520on%2520global%2520image-text%2520alignment.%2520This%2520limitation%2520hinders%2520the%2520model%2527s%2520ability%2520to%2520accurately%2520capture%2520fine-grained%2520details%2520in%2520images%252C%2520thus%2520restricting%2520its%2520performance%2520in%2520complex%252C%2520fine-grained%2520tasks.%2520To%2520address%2520this%252C%2520we%2520propose%2520GeoAlignCLIP%252C%2520a%2520unified%2520framework%2520that%2520achieves%2520fine-grained%2520alignment%2520in%2520remote%2520sensing%2520tasks%2520by%2520learning%2520multi-granular%2520semantic%2520alignments%2520and%2520incorporating%2520intra-modal%2520consistency%252C%2520enabling%2520more%2520precise%2520visual-semantic%2520alignment%2520between%2520image%2520regions%2520and%2520text%2520concepts.%2520Additionally%252C%2520we%2520construct%2520RSFG-100k%252C%2520a%2520fine-granular%2520remote%2520sensing%2520dataset%2520containing%2520scene%2520descriptions%252C%2520region-level%2520a

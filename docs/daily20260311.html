{"title": "ESAinsTOD: A Unified End-to-End Schema-Aware Instruction-Tuning Framework for Task-Oriented Dialog Modeling", "author": "Dechuan Teng and Chunlin Lu and Libo Qin and Wanxiang Che", "abstract": "Existing end-to-end modeling methods for modular task-oriented dialog systems are typically tailored to specific datasets, making it challenging to adapt to new dialog scenarios. In this work, we propose ESAinsTOD, a unified End-to-end Schema-Aware Instruction-tuning framework for general Task-Oriented Dialog modeling. This framework introduces a structured methodology to go beyond simply fine-tuning Large Language Models (LLMs), enabling flexible adaptation to various dialogue task flows and schemas. Specifically, we leverage full-parameter fine-tuning of LLMs and introduce two alignment mechanisms to make the resulting system both instruction-aware and schema-aware: (i) instruction alignment, which ensures that the system faithfully follows task instructions to complete various task flows from heterogeneous TOD datasets; and (ii) schema alignment, which encourages the system to make predictions adhering to the specified schema. In addition, we employ session-level end-to-end modeling, which allows the system to access the results of previously executed task flows within the dialogue history, to bridge the gap between the instruction-tuning paradigm and the real-world application of TOD systems. Empirical results show that while a fine-tuned LLM serves as a strong baseline, our structured approach provides significant additional benefits. In particular, our findings indicate that: (i) ESAinsTOD outperforms state-of-the-art models by a significant margin on end-to-end task-oriented dialog modeling benchmarks: CamRest676, In-Car and MultiWOZ; (ii) more importantly, it exhibits superior generalization capabilities across various low-resource settings, with the proposed alignment mechanisms significantly enhancing zero-shot performance; and (iii) our instruction-tuning paradigm substantially improves the model's robustness against data noise and cascading errors.", "link": "http://arxiv.org/abs/2603.09691v1", "date": "2026-03-10", "relevancy": 2.5351, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5194}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5008}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5008}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ESAinsTOD%3A%20A%20Unified%20End-to-End%20Schema-Aware%20Instruction-Tuning%20Framework%20for%20Task-Oriented%20Dialog%20Modeling&body=Title%3A%20ESAinsTOD%3A%20A%20Unified%20End-to-End%20Schema-Aware%20Instruction-Tuning%20Framework%20for%20Task-Oriented%20Dialog%20Modeling%0AAuthor%3A%20Dechuan%20Teng%20and%20Chunlin%20Lu%20and%20Libo%20Qin%20and%20Wanxiang%20Che%0AAbstract%3A%20Existing%20end-to-end%20modeling%20methods%20for%20modular%20task-oriented%20dialog%20systems%20are%20typically%20tailored%20to%20specific%20datasets%2C%20making%20it%20challenging%20to%20adapt%20to%20new%20dialog%20scenarios.%20In%20this%20work%2C%20we%20propose%20ESAinsTOD%2C%20a%20unified%20End-to-end%20Schema-Aware%20Instruction-tuning%20framework%20for%20general%20Task-Oriented%20Dialog%20modeling.%20This%20framework%20introduces%20a%20structured%20methodology%20to%20go%20beyond%20simply%20fine-tuning%20Large%20Language%20Models%20%28LLMs%29%2C%20enabling%20flexible%20adaptation%20to%20various%20dialogue%20task%20flows%20and%20schemas.%20Specifically%2C%20we%20leverage%20full-parameter%20fine-tuning%20of%20LLMs%20and%20introduce%20two%20alignment%20mechanisms%20to%20make%20the%20resulting%20system%20both%20instruction-aware%20and%20schema-aware%3A%20%28i%29%20instruction%20alignment%2C%20which%20ensures%20that%20the%20system%20faithfully%20follows%20task%20instructions%20to%20complete%20various%20task%20flows%20from%20heterogeneous%20TOD%20datasets%3B%20and%20%28ii%29%20schema%20alignment%2C%20which%20encourages%20the%20system%20to%20make%20predictions%20adhering%20to%20the%20specified%20schema.%20In%20addition%2C%20we%20employ%20session-level%20end-to-end%20modeling%2C%20which%20allows%20the%20system%20to%20access%20the%20results%20of%20previously%20executed%20task%20flows%20within%20the%20dialogue%20history%2C%20to%20bridge%20the%20gap%20between%20the%20instruction-tuning%20paradigm%20and%20the%20real-world%20application%20of%20TOD%20systems.%20Empirical%20results%20show%20that%20while%20a%20fine-tuned%20LLM%20serves%20as%20a%20strong%20baseline%2C%20our%20structured%20approach%20provides%20significant%20additional%20benefits.%20In%20particular%2C%20our%20findings%20indicate%20that%3A%20%28i%29%20ESAinsTOD%20outperforms%20state-of-the-art%20models%20by%20a%20significant%20margin%20on%20end-to-end%20task-oriented%20dialog%20modeling%20benchmarks%3A%20CamRest676%2C%20In-Car%20and%20MultiWOZ%3B%20%28ii%29%20more%20importantly%2C%20it%20exhibits%20superior%20generalization%20capabilities%20across%20various%20low-resource%20settings%2C%20with%20the%20proposed%20alignment%20mechanisms%20significantly%20enhancing%20zero-shot%20performance%3B%20and%20%28iii%29%20our%20instruction-tuning%20paradigm%20substantially%20improves%20the%20model%27s%20robustness%20against%20data%20noise%20and%20cascading%20errors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09691v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DESAinsTOD%253A%2520A%2520Unified%2520End-to-End%2520Schema-Aware%2520Instruction-Tuning%2520Framework%2520for%2520Task-Oriented%2520Dialog%2520Modeling%26entry.906535625%3DDechuan%2520Teng%2520and%2520Chunlin%2520Lu%2520and%2520Libo%2520Qin%2520a {"title": "DISPLAY: Directable Human-Object Interaction Video Generation via Sparse Motion Guidance and Multi-Task Auxiliary", "author": "Jiazhi Guan and Quanwei Yang and Luying Huang and Junhao Liang and Borong Liang and Haocheng Feng and Wei He and Kaisiyuan Wang and Hang Zhou and Jingdong Wang", "abstract": "Human-centric video generation has advanced rapidly, yet existing methods struggle to produce controllable and physically consistent Human-Object Interaction (HOI) videos. Existing works rely on dense control signals, template videos, or carefully crafted text prompts, which limit flexibility and generalization to novel objects. We introduce a framework, namely DISPLAY, guided by Sparse Motion Guidance, composed only of wrist joint coordinates and a shape-agnostic object bounding box. This lightweight guidance alleviates the imbalance between human and object representations and enables intuitive user control. To enhance fidelity under such sparse conditions, we propose an Object-Stressed Attention mechanism that improves object robustness. To address the scarcity of high-quality HOI data, we further develop a Multi-Task Auxiliary Training strategy with a dedicated data curation pipeline, allowing the model to benefit from both reliable HOI samples and auxiliary tasks. Comprehensive experiments show that our method achieves high-fidelity, controllable HOI generation across diverse tasks. The project page can be found at \\href{https://mumuwei.github.io/DISPLAY/}.", "link": "http://arxiv.org/abs/2603.09883v1", "date": "2026-03-10", "relevancy": 2.5254, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.664}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6083}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6074}], "m {"title": "TIMotion: Temporal and Interactive Framework for Efficient Human-Human Motion Generation", "author": "Yabiao Wang and Shuo Wang and Jiangning Zhang and Ke Fan and Jiafu Wu and Zhucun Xue and Yong Liu", "abstract": "Human-human motion generation is essential for understanding humans as social beings. Current methods fall into two main categories: single-person-based methods and separate modeling-based methods. To delve into this field, we abstract the overall generation process into a general framework MetaMotion, which consists of two phases: temporal modeling and interaction mixing. For temporal modeling, the single-person-based methods concatenate two people into a single one directly, while the separate modeling-based methods skip the modeling of interaction sequences. The inadequate modeling described above resulted in sub-optimal performance and redundant model parameters. In this paper, we introduce TIMotion (Temporal and Interactive Modeling), an efficient and effective framework for human-human motion generation. Specifically, we first propose Causal Interactive Injection to model two separate sequences as a causal sequence leveraging the temporal and causal properties. Then we present Role-Evolving Scanning to adjust to the change in the active and passive roles throughout the interaction. Finally, to generate smoother and more rational motion, we design Localized Pattern Amplification to capture short-term motion patterns. Extensive experiments on InterHuman and InterX demonstrate that our method achieves superior performance. Project page: https://aigc-explorer.github.io/TIMotion-page/", "link": "http://arxiv.org/abs/2408.17135v5", "date": "2026-03-10", "relevancy": 2.5229, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.7047}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5822}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5762}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TIMotion%3A%20Temporal%20and%20Interactive%20Framework%20for%20Efficient%20Human-Human%20Motion%20Generation&body=Title%3A%20TIMotion%3A%20Temporal%20and%20Interactive%20Framework%20for%20Efficient%20Human-Human%20Motion%20Generation%0AAuthor%3A%20Yabiao%20Wang%20and%20Shuo%20Wang%20and%20Jiangning%20Zhang%20and%20Ke%20Fan%20and%20Jiafu%20Wu%20and%20Zhucun%20Xue%20and%20Yong%20Liu%0AAbstract%3A%20Human-human%20motion%20generation%20is%20essential%20for%20understanding%20humans%20as%20social%20beings.%20Current%20methods%20fall%20into%20two%20main%20categories%3A%20single-person-based%20methods%20and%20separate%20modeling-based%20methods.%20To%20delve%20into%20this%20field%2C%20we%20abstract%20the%20overall%20generation%20process%20into%20a%20general%20framework%20MetaMotion%2C%20which%20consists%20of%20two%20phases%3A%20temporal%20modeling%20and%20interaction%20mixing.%20For%20temporal%20modeling%2C%20the%20single-person-based%20methods%20concatenate%20two%20people%20into%20a%20single%20one%20directly%2C%20while%20the%20separate%20modeling-based%20methods%20skip%20the%20modeling%20of%20interaction%20sequences.%20The%20inadequate%20modeling%20described%20above%20resulted%20in%20sub-optimal%20performance%20and%20redundant%20model%20parameters.%20In%20this%20paper%2C%20we%20introduce%20TIMotion%20%28Temporal%20and%20Interactive%20Modeling%29%2C%20an%20efficient%20and%20effective%20framework%20for%20human-human%20motion%20generation.%20Specifically%2C%20we%20first%20propose%20Causal%20Interactive%20Injection%20to%20model%20two%20separate%20sequences%20as%20a%20causal%20sequence%20leveraging%20the%20temporal%20and%20causal%20properties.%20Then%20we%20present%20Role-Evolving%20Scanning%20to%20adjust%20to%20the%20change%20in%20the%20active%20and%20passive%20roles%20throughout%20the%20interaction.%20Finally%2C%20to%20generate%20smoother%20and%20more%20rational%20motion%2C%20we%20design%20Localized%20Pattern%20Amplification%20to%20capture%20short-term%20motion%20patterns.%20Extensive%20experiments%20on%20InterHuman%20and%20InterX%20demonstrate%20that%20our%20method%20achieves%20superior%20performance.%20Project%20page%3A%20https%3A//aigc-explorer.github.io/TIMotion-page/%0ALink%3A%20http%3A//arxiv.org/abs/2408.17135v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTIMotion%253A%2520Temporal%2520and%2520Interactive%2520Framework%2520for%2520Efficient%2520Human-Human%2520Motion%2520Generation%26entry.906535625%3DYabiao%2520Wang%2520and%2520Shuo%2520Wang%2520and%2520Jiangning%2520Zhang%2520and%2520Ke%2520Fan%2520and%2520Jiafu%2520Wu%2520and%2520Zhucun%2520Xue%2520and%2520Yong%2520Liu%26entry.1292438233%3DHuman-human%2520motion%2520generation%2520is%2520essential%2520for%2520understanding%2520humans%2520as%2520social%2520beings.%2520Current%2520methods%2520fall%2520into%2520two%2520main%2520categories%253A%2520single-person-based%2520methods%2520and%2520separate%2520modeling-based%2520methods.%2520To%2520delve%2520into%2520this%2520field%252C%2520we%2520abstract%2520the%2520overall%2520generation%2520process%2520into%2520a%2520general%2520framework%2520MetaMotion%252C%2520which%2520consists%2520of%2520two%2520phases%253A%2520temporal%2520modeling%2520and%2520interaction%2520mixing.%2520For%2520temporal%2520modeling%252C%2520the%2520single-person-based%2520methods%2520concatenate%2520two%2520people%2520into%2520a%2520single%2520one%2520directly%252C%2520while%2520the%2520separate%2520modeling-based%2520methods%2520skip%2520the%2520modeling%2520of%2520interaction%2520sequences.%2520The%2520inadequate%2520modeling%2520described%2520above%2520resulted%2520in%2520sub-optimal%2520performance%2520and%2520redundant%2520model%25 {"title": "FrameDiT: Diffusion Transformer with Frame-Level Matrix Attention for Efficient Video Generation", "author": "Minh Khoa Le and Kien Do and Duc Thanh Nguyen and Truyen Tran", "abstract": "High-fidelity video generation remains challenging for diffusion models due to the difficulty of modeling complex spatio-temporal dynamics efficiently. Recent video diffusion methods typically represent a video as a sequence of spatio-temporal tokens which can be modeled using Diffusion Transformers (DiTs). However, this approach faces a trade-off between the strong but expensive Full 3D Attention and the efficient but temporally limited Local Factorized Attention. To resolve this trade-off, we propose Matrix Attention, a frame-level temporal attention mechanism that processes an entire frame as a matrix and generates query, key, and value matrices via matrix-native operations. By attending across frames rather than tokens, Matrix Attention effectively preserves global spatio-temporal structure and adapts to significant motion. We build FrameDiT-G, a DiT architecture based on MatrixAttention, and further introduce FrameDiT-H, which integrates Matrix Attention with Local Factorized Attention to capture both large and small motion. Extensive experiments show that FrameDiT-H achieves state-of-the-art results across multiple video generation benchmarks, offering improved temporal coherence and video quality while maintaining efficiency comparable to Local Factorized Attention.", "link": "http://arxiv.org/abs/2603.09721v1", "date": "2026-03-10", "relevancy": 2.4873, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6368}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6329}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http: g%20improved%20temporal%20coherence%20and%20video%20quality%20while%20maintaining%20efficiency%20comparable%20to%20Local%20Factorized%20Attention.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09721v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrameDiT%253A%2520Diffusion%2520Transformer%2520with%2520Frame-Level%2520Matrix%2520Attention%2520for%2520Efficient%2520Video%2520Generation%26entry.906535625%3DMinh%2520Khoa%2520Le%2520and%2520Kien%2520Do%2520and%2520Duc%2520Thanh%2520Nguyen%2520and%2520Truyen%2520Tran%26entry.1292438233%3DHigh-fidelity%2520video%2520generation%2520remains%2520challenging%2520for%2520diffusion%2520models%2520due%2520to%2520the%2520difficulty%2520of%2520modeling%2520complex%2520spatio-temporal%2520dynamics%2520efficiently.%2520Recent%2520video%2520diffusion%2520methods%2520typically%2520represent%2520a%2520video%2520as%2520a%2520sequence%2520of%2520spatio-temporal%2520tokens%2520which%2520can%2520be%2520modeled%2520using%2520Diffusion%2520Transformers%2520%2528DiTs%2529.%2520However%252C%2520this%2520approach%2520faces%2520a%2520trade-off%2520between%2520the%2520strong%2520but%2520expensive%2520Full%25203D%2520Attention%2520and%2520the%2520efficient%2520but%2520temporally%2520limited%2520Local%2520Factorized%2520Attention.%2520To%2520resolve%2520this%2520trade-off%252C%2520we%2520propose%2520Matrix%2520Attention%252C%2520a%2520frame-level%2520temporal%2520attention%2520mechanism%2520that%2520processes%2520an%2520entire%2520frame%2520as%2520a%2520matrix%2520and%2520generates%2520query%252C%2520key%252C%2520and%2520value%2520matrices%2520via%2520matrix-native%2520operations.%2520By%2520attending%2520across%2520frames%2520rather%2520than%2520tokens%252C%2520Matrix%2520Attention%2520effectively%2520preserves%2520global%2520spatio-temporal%2520structure%2520and%2520adapts%2520to%2520significant%2520motion.%2520We%2520build%2520FrameDiT-G%252C%2520a%2520DiT%2520arc {"title": "ConfCtrl: Enabling Precise Camera Control in Video Diffusion via Confidence-Aware Interpolation", "author": "Liudi Yang and George Eskandar and Fengyi Shen and Mohammad Altillawi and Yang Bai and Chi Zhang and Ziyuan Liu and Abhinav Valada", "abstract": "We address the challenge of novel view synthesis from only two input images under large viewpoint changes. Existing regression-based methods lack the capacity to reconstruct unseen regions, while camera-guided diffusion models often deviate from intended trajectories due to noisy point cloud projections or insufficient conditioning from camera poses. To address these issues, we propose ConfCtrl, a confidence-aware video interpolation framework that enables diffusion models to follow prescribed camera poses while completing unseen regions. ConfCtrl initializes the diffusion process by combining a confidence-weighted projected point cloud latent with noise as the conditioning input. It then applies a Kalman-inspired predict-update mechanism, treating the projected point cloud as a noisy measurement and using learned residual corrections to balance pose-driven predictions with noisy geometric observations. This allows the model to rely on reliable projections while down-weighting uncertain regions, yielding stable, geometry-aware generation. Experiments on multiple datasets show that ConfCtrl produces geometrically consistent and visually plausible novel views, effectively reconstructing occluded regions under large viewpoint changes.", "link": "http://arxiv.org/abs/2603.09819v1", "date": "2026-03-10", "relevancy": 2.4812, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.7281}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5994}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ConfCtrl%3A%20Enabling%20Precise%20Camera%20Control%20in%20Video%20Diffusion%20via%20Confidence-Aware%20Interpolation&body=Title%3A%20ConfCtrl%3A%20Enabling%20Precise%20Camera%20Control%20in%20Video%20Diffusion%20via%20Confidence-Aware%20Interpolation%0AAuthor%3A%20Liudi%20Yang%20and%20George%20Eskandar%20and%20Fengyi%20Shen%20and%20Mohammad%20Altillawi%20and%20Yang%20Bai%20and%20Chi%20Zhang%20and%20Ziyuan%20Liu%20and%20Abhinav%20Valada%0AAbstract%3A%20We%20address%20the%20challenge%20of%20novel%20view%20synthesis%20from%20only%20two%20input%20images%20under%20large%20viewpoint%20changes.%20Existing%20regression-based%20methods%20lack%20the%20capacity%20to%20reconstruct%20unseen%20regions%2C%20while%20camera-guided%20diffusion%20models%20often%20deviate%20from%20intended%20trajectories%20due%20to%20noisy%20point%20cloud%20projections%20or%20insufficient%20conditioning%20from%20camera%20poses.%20To%20address%20these%20issues%2C%20we%20propose%20ConfCtrl%2C%20a%20confidence-aware%20video%20interpolation%20framework%20that%20enables%20diffusion%20models%20to%20follow%20prescribed%20camera%20poses%20while%20completing%20unseen%20regions.%20ConfCtrl%20initializes%20the%20diffusion%20process%20by%20combining%20a%20confidence-weighted%20projected%20point%20cloud%20latent%20with%20noise%20as%20the%20conditioning%20input.%20It%20then%20applies%20a%20Kalman-inspired%20predict-update%20mechanism%2C%20treating%20the%20projected%20point%20cloud%20as%20a%20noisy%20measurement%20and%20using%20learned%20residual%20corrections%20to%20balance%20pose-driven%20predictions%20with%20noisy%20geometric%20observations.%20This%20allows%20the%20model%20to%20rely%20on%20reliable%20projections%20while%20down-weighting%20uncertain%20regions%2C%20yielding%20stable%2C%20geometry-aware%20generation.%20Experiments%20on%20multiple%20datasets%20show%20that%20ConfCtrl%20produces%20geometrically%20consistent%20and%20visually%20plausible%20novel%20views%2C%20effectively%20reconstructing%20occluded%20regions%20under%20large%20viewpoint%20changes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09819v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConfCtrl%253A%2520Enabling%2520Precise%2520Camera%2520Control%2520in%2520Video%2520Diffusion%2520via%2520Confidence-Aware%2520Interpolation%26entry.906535625%3DLiudi%2520Yang%2520and%2520George%2520Eskandar%2520and%2520Fengyi%2520Shen%2520and%2520Mohammad%2520Altillawi%2520and%2520Yang%2520Bai%2520and%2520Chi%2520Zhang%2520and%2520Ziyuan%2520Liu%2520and%2520Abhinav%2520Valada%26entry.1292438233%3DWe%2520address%2520the%2520challenge%2520of%2520novel%2520view%2520synthesis%2520from%2520only%2520two%2520input%2520images%2520under%2520large%2520viewpoint%2520changes.%2520Existing%2520regression-based%2520methods%2520lack%2520the%2520capacity%2520to%2520reconstruct%2520unseen%2520regions%252C%2520while%2520camera-guided%2520diffusion%2520models%2520often%2520deviate%2520from%2520intended%2520trajectories%2520due%2520to%2520noisy%2520point%2520cloud%2520projections%2520or%2520insufficient%2520conditioning%2520from%2520camera%2520poses.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520ConfCtrl%252C%2520a%2520confidence-aware%2520video%2520interpolation%2520framework%2520that%2520enables%2520diffusion%2520models%2520to%2520follow%2520prescribed%2520camera%2520poses%2520while%2520completing%2520unseen%2520regions.%2520ConfCtrl%2520initializes%2520the%2520diffusion%2520process%2520by%2520combining%2520a%2520confidence-weighted%2520projected%2520point%2520cloud%2520latent%2520with%2520noise%2520as%2520the%2520conditioning%2520input.%2520It%2520then%2520applies%2520a%2520Kalman-inspired%2520predict-update%2520mechanism%252C%2520treating%2520the%2520projected%2520point%2520cloud%2520as%2520a%2520noisy%2520measurement%2520and%2520usi {"title": "Exploiting Label-Aware Channel Scoring for Adaptive Channel Pruning in Split Learning", "author": "Jialei Tan and Zheng Lin and Xiangming Cai and Ruoxi Zhu and Zihan Fang and Pingping Chen and Wei Ni", "abstract": "Split learning (SL) transfers most of the training workload to the server, which alleviates computational burden on client devices. However, the transmission of intermediate feature representations, referred to as smashed data, incurs significant communication overhead, particularly when a large number of client devices are involved. To address this challenge, we propose an adaptive channel pruning-aided SL (ACP-SL) scheme. In ACP-SL, a label-aware channel importance scoring (LCIS) module is designed to generate channel importance scores, distinguishing important channels from less important ones. Based on these scores, an adaptive channel pruning (ACP) module is developed to prune less important channels, thereby compressing the corresponding smashed data and reducing the communication overhead. Experimental results show that ACP-SL consistently outperforms benchmark schemes in test accuracy. Furthermore, it reaches a target test accuracy in fewer training rounds, thereby reducing communication overhead.", "link": "http://arxiv.org/abs/2603.09792v1", "date": "2026-03-10", "relevancy": 2.4576, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5074}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4889}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4783}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploiting%20Label-Aware%20Channel%20Scoring%20for%20Adaptive%20Channel%20Pruning%20in%20Split%20Learning&body=Title%3A%20Exploiting%20Label-Aware%20Channel%20Scoring%20for%20Adaptive%20Channel%20Pruning%20in%20Split%20Learning%0AAuthor%3A%20Jialei%20Tan%20and%20Zheng%20Lin%20and%20Xiangming%20Cai%20and%20Ruoxi%20Zhu%20and%20Zihan%20Fang%20and%20Pingping%20Chen%20and%20Wei%20Ni%0AAbstract%3A%20Split%20learning%20%28SL%29%20transfers%20most%20of%20the%20training%20workload%20to%20the%20server%2C%20which%20alleviates%20computational%20burden%20on%20client%20devices.%20However%2C%20the%20transmission%20of%20intermediate%20feature%20representations%2C%20referred%20to%20as%20smashed%20data%2C%20incurs%20significant%20communication%20overhead%2C%20particularly%20when%20a%20large%20number%20of%20client%20devices%20are%20involved.%20To%20address%20this%20challenge%2C%20we%20propose%20an%20adaptive%20channel%20pruning-aided%20SL%20%28ACP-SL%29%20scheme.%20In%20ACP-SL%2C%20a%20label-aware%20channel%20importance%20scoring%20%28LCIS%29%20module%20is%20designed%20to%20generate%20channel%20importance%20scores%2C%20distinguishing%20important%20channels%20from%20less%20important%20ones.%20Based%20on%20these%20scores%2C%20an%20adaptive%20channel%20pruning%20%28ACP%29%20module%20is%20developed%20to%20prune%20less%20important%20channels%2C%20thereby%20compressing%20the%20corresponding%20smashed%20data%20and%20reducing%20the%20communication%20overhead.%20Experimental%20results%20show%20that%20ACP-SL%20consistently%20outperforms%20benchmark%20schemes%20in%20test%20accuracy.%20Furthermore%2C%20it%20reaches%20a%20target%20test%20accuracy%20in%20fewer%20training%20rounds%2C%20thereby%20reducing%20communication%20overhead.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09792v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploiting%2520Label-Aware%2520Channel%2520Scoring%2520for%2520Adaptive%2520Channel%2520Pruning%2520in%2520Split%2520Learning%26entry.906535625%3DJialei%2520Tan%2520and%2520Zheng%2520Lin%2520and 48=Exploiting%20Label-Aware%20Channel%20Scoring%20for%20Adaptive%20Channel%20Pruning%20in%20Split%20Learning&entry.906535625=Jialei%20Tan%20and%20Zheng%20Lin%20and%20Xiangming%20Cai%20and%20Ruoxi%20Zhu%20and%20Zihan%20Fang%20and%20Pingping%20Chen%20and%20Wei%20Ni&entry.1292438233=Split%20learning%20%28SL%29%20transfers%20most%20of%20the%20training%20workload%20to%20the%20server%2C%20which%20alleviates%20computational%20burden%20on%20client%20devices.%20However%2C%20the%20transmission%20of%20intermediate%20feature%20representations%2C%20referred%20to%20as%20smashed%20data%2C%20incurs%20significant%20communication%20overhead%2C%20particularly%20when%20a%20large%20number%20of%20client%20devices%20are%20involved.%20To%20address%20this%20challenge%2C%20we%20propose%20an%20adaptive%20channel%20pruning-aided%20SL%20%28ACP-SL%29%20scheme.%20In%20ACP-SL%2C%20a%20label-aware%20channel%20importance%20scoring%20%28LCIS%29%20module%20is%20designed%20to%20generate%20channel%20importance%20scores%2C%20distinguishing%20important%20channels%20from%20less%20important%20ones.%20Based%20on%20these%20scores%2C%20an%20adaptive%20channel%20pruning%20%28ACP%29%20module%20is%20developed%20to%20prune%20less%20important%20channels%2C%20thereby%20compressing%20the%20corresponding%20smashed%20data%20and%20reducing%20the%20communication%20overhead.%20Experimental%20results%20show%20that%20ACP-SL%20consistently%20outperforms%20benchmark%20schemes%20in%20test%20accuracy.%20Furthermore%2C%20it%20reaches%20a%20target%20test%20accuracy%20in%20fewer%20training%20rounds%2C%20thereby%20reducing%20communication%20overhead.&entry.1838667208=http%3A//arxiv.org/abs/2603.09792v1&entry.124074799=Read"},
{"title": "Proper Body Landmark Subset Enables More Accurate and 5X Faster Recognition of Isolated Signs in LIBRAS", "author": "Daniele L. V. dos Santos and Thiago B. Pereira and Carlos Eduardo G. R. Alves and Richard J. M. G. Tello and Francisco de A. Boldt and Thiago M. Paix\u00e3o", "abstract": "This paper investigates the feasibility of using lightweight body landmark detection for the recognition of isolated signs in Brazilian Sign Language (LIBRAS). Although the skeleton-based approach by Alves et al. (2024) enabled substantial improvements in recognition performance, the use of OpenPose for landmark extraction hindered time performance. In a preliminary investigation, we observed that simply replacing OpenPose with the lightweight MediaPipe, while improving processing speed, significantly reduced accuracy. To overcome this limitation, we explored landmark subset selection strategies aimed at optimizing recognition performance. Experimental results showed that a proper landmark subset achieves comparable or superior performance to state-of-the-art methods while reducing processing time by more than 5X compared to Alves et al. (2024). As an additional contribution, we demonstrated that spline-based imputation effectively mitigates missing landmark issues, leading to substantial accuracy gains. These findings highlight that careful landmark selection, combined with simple imputation techniques, enables efficient and accurate isolated sign recognition, paving the way for scalable Sign Language Recognition systems.", "link": "http://arxiv.org/abs/2510.24887v3", "date": "2026-03-10", "relevancy": 2.4512, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4983}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4912}, {"t {"title": "Global Convergence of Iteratively Reweighted Least Squares for Robust Subspace Recovery", "author": "Gilad Lerman and Kang Li and Tyler Maunu and Teng Zhang", "abstract": "Robust subspace estimation is fundamental to many machine learning and data analysis tasks. Iteratively Reweighted Least Squares (IRLS) is an elegant and empirically effective approach to this problem, yet its theoretical properties remain poorly understood. This paper establishes that, under deterministic conditions, a variant of IRLS with dynamic smoothing regularization converges linearly to the underlying subspace from any initialization. We extend these guarantees to affine subspace estimation, a setting that lacks prior recovery theory. Additionally, we illustrate the practical benefits of IRLS through an application to low-dimensional neural network training. Our results provide the first global convergence guarantees for IRLS in robust subspace recovery and, more broadly, for nonconvex IRLS on a Riemannian manifold.", "link": "http://arxiv.org/abs/2506.20533v4", "date": "2026-03-10", "relevancy": 2.4441, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.492}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4904}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Global%20Convergence%20of%20Iteratively%20Reweighted%20Least%20Squares%20for%20Robust%20Subspace%20Recovery&body=Title%3A%20Global%20Convergence%20of%20Iteratively%20Reweighted%20Least%20Squares%20for%20Robust%20Subspace%20Recovery%0AAuthor%3A%20Gilad%20Lerman%20and%20Kang%20Li%20and%20Tyler%20Maunu%20and%20Teng%20Zhang%0AAbstrac {"title": "When to Lock Attention: Training-Free KV Control in Video Diffusion", "author": "Tianyi Zeng and Jincheng Gao and Tianyi Wang and Zijie Meng and Miao Zhang and Jun Yin and Haoyuan Sun and Junfeng Jiao and Christian Claudel and Junbo Tan and Xueqian Wang", "abstract": "Maintaining background consistency while enhancing foreground quality remains a core challenge in video editing. Injecting full-image information often leads to background artifacts, whereas rigid background locking severely constrains the model's capacity for foreground generation. To address this issue, we propose KV-Lock, a training-free framework tailored for DiT-based video diffusion models. Our core insight is that the hallucination metric (variance of denoising prediction) directly quantifies generation diversity, which is inherently linked to the classifier-free guidance (CFG) scale. Building upon this, KV-Lock leverages diffusion hallucination detection to dynamically schedule two key components: the fusion ratio between cached background key-values (KVs) and newly generated KVs, and the CFG scale. When hallucination risk is detected, KV-Lock strengthens background KV locking and simultaneously amplifies conditional guidance for foreground generation, thereby mitigating artifacts and improving generation fidelity. As a training-free, plug-and-play module, KV-Lock can be easily integrated into any pre-trained DiT-based models. Extensive experiments validate that our method outperforms existing approaches in improved foreground quality with high background fidelity across various video editing tasks.", "link": "http://arxiv.org/abs/2603.09657v1", "date": "2026-03-10", "relevancy": 2.4425, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6173}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.611}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5928}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20to%20Lock%20Attention%3A%20Training-Free%20KV%20Control%20in%20Video%20Diffusion&body=Title%3A%20When%20to%20Lock%20Attention%3A%20Training-Free%20KV%20Control%20in%20Video%20Diffusion%0AAuthor%3A%20Tianyi%20Zeng%20and%20Jincheng%20Gao%20and%20Tianyi%20Wang%20and%20Zijie%20Meng%20and%20Miao%20Zhang%20and%20Jun%20Yin%20and%20Haoyuan%20Sun%20and%20Junfeng%20Jiao%20and%20Christian%20Claudel%20and%20Junbo%20Tan%20and%20Xueqian%20Wang%0AAbstract%3A%20Maintaining%20background%20consistency%20while%20enhancing%20foreground%20quality%20remains%20a%20core%20challenge%20in%20video%20editing.%20Injecting%20full-image%20information%20often%20leads%20to%20background%20artifacts%2C%20whereas%20rigid%20background%20locking%20severely%20constrains%20the%20model%27s%20capacity%20for%20foreground%20generation.%20To%20address%20this%20issue%2C%20we%20propose%20KV-Lock%2C%20a%20training-free%20framework%20tailored%20for%20DiT-based%20video%20diffusion%20models.%20Our%20core%20insight%20is%20that%20the%20hallucination%20metric%20%28variance%20of%20denoising%20prediction%29%20directly%20quantifies%20generation%20diversity%2C%20which%20is%20inherently%20linked%20to%20the%20classifier-free%20guidance%20%28CFG%29%20scale.%20Building%20upon%20this%2C%20KV-Lock%20leverages%20diffusion%20hallucination%20detection%20to%20dynamically%20schedule%20two%20key%20components%3A%20the%20fusion%20ratio%20between%20cached%20background%20key-values%20%28KVs%29%20and%20newly%20generated%20KVs%2C%20and%20the%20CFG%20scale.%20When%20hallucination%20risk%20is%20detected%2C%20KV-Lock%20strengthens%20background%20KV%20locking%20and%20simultaneously%20amplifies%20conditional%20guidance%20for%20foreground%20generation%2C%20thereby%20mitigating%20artifacts%20and%20improving%20generation%20fidelity.%20As%20a%20training-free%2C%20plug-and-play%20module%2C%20KV-Lock%20can%20be%20easily%20integrated%20into%20any%20pre-trained%20DiT-based%20models.%20Extensive%20experiments%20validate%20that%20our%20method%20outperforms%20existing%20approaches%20in%20improved%20foreground%20quality%20with%20high%20background%20fidelity%20across%20various%20video%20editing%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09657v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520to%2520Lock%2520Attention%253A%2520Training-Free%2520KV%2520Control%2520in%2520Video%2520Diffusion%26entry.906535625%3DTianyi%2520Zeng%2520and%2520Jincheng%2520Gao%2520and%2520Tianyi%2520Wang%2520and%2520Zijie%2520Meng%2520and%2520Miao%2520Zhang%2520and%2520Jun%2520Yin%2520and%2520Haoyuan%2520Sun%2520and%2520Junfeng%2520Jiao%2520and%2520Christian%2520Claudel%2520and%2520Junbo%2520Tan%2520and%2520Xueqian%2520Wang%26entry.1292438233%3DMaintaining%2520background%2520consistency%2520while%2520enhancing%2520foreground%2520quality%2520remains%2520a%2520core%2520challenge%2520in%2520video%2520editing.%2520Injecting%2520full-image%2520information%2520often%2520leads%2520to%2520background%2520artifacts%252C%2520whereas%2520rigid%2520background%2520locking%2520severely%2520constrains%2520the%2520model%2527s%2520capacity%2520for%2520foreground%2520generation.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520KV-Lock%252C%2520a%2520training-free%2520framework%2520tailored%2520for%2520DiT-based%2520video%2520diffusion%2520models.%2520Our%2520core%2520insight%2520is%2520that%2520the%2520hallucination%2520metric%2520%2528variance%2520of%2520denoising%2520prediction%2529%2520directly%2520quantifies%2520generation%2520diversity%252C%2520which%2520is%2520inherently%2520linked%2520to%2520the%2520classifier-free%2520guidance%2520%2528CFG%2529%2520scale.%2520Building%2520upon%2520this%252C%2520KV-Lock%2520leverages%2520diffusion%2520hallucination%2520detection%2520to%2520dynamically%2520schedule%2520two%2520key%2520components%253A%2520the%2520fusion%2520ratio%2520between%2520cached%2520background%2520key-values%2520%2528KVs%2529%2520and%2520newly%2520generated%2520KVs%252C%2520and%2520the%2520CFG%2520scale.%2520When%2520hallucination%2520risk%2520is%2520detected%252C%2520KV-Lock%2520strengthens%2520background%2520KV%2520locking%2520and%2520simultaneously%2520amplifies%2520conditional%2520guidance%2520for%2520foreground%2520generation%252C%2520thereby%2520mitigating%2520artifacts%2520and%2520improving%2520generation%2520fidelity.%2520As%2520a%2520training-free%252C%2520plug-and-play%2520module%252C%2520KV-Lock%2520can%2520be%2520easily%2520integrated%2520into%2520any%2520pre-trained%2520DiT-based%2520models.%2520Extensive%2520experiments%2520validate%2520that%2520our%2520method%2520outperforms%2520existing%2520approaches%2520in%2520improved%2520foreground%2520quality%2520with%2520high%2520background%2520fidelity%2520across%2520various%2520video%2520editing%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09657v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20to%20Lock%20Attention%3A%20Training-Free%20KV%20Control%20in%20Video%20Diffusion&entry.906535625=Tianyi%20Zeng%20and%20Jincheng%20Gao%20and%20Tianyi%20Wang%20and%20Zijie%20Meng%20and%20Miao%20Zhang%20and%20Jun%20Yin%20and%20Haoyuan%20Sun%20and%20Junfeng%20Jiao%20and%20Christian%20Claudel%20and%20Junbo%20Tan%20and%20Xueqian%20Wang&entry.1292438233=Maintaining%20background%20consistency%20while%20enhancing%20foreground%20quality%20remains%20a%20core%20challenge%20in%20video%20editing.%20Injecting%20full-image%20information%20often%20leads%20to%20background%20artifacts%2C%20whereas%20rigid%20background%20locking%20severely%20constrains%20the%20model%27s%20capacity%20for%20foreground {"title": "Kinodynamic Motion Retargeting for Humanoid Locomotion via Multi-Contact Whole-Body Trajectory Optimization", "author": "Xiaoyu Zhang and Steven Haener and Varun Madabushi and Maegan Tucker", "abstract": "We present the KinoDynamic Motion Retargeting (KDMR) framework, a novel approach for humanoid locomotion that models the retargeting process as a multi-contact, whole-body trajectory optimization problem. Conventional kinematics-based retargeting methods rely solely on spatial motion capture (MoCap) data, inevitably introducing physically inconsistent artifacts, such as foot sliding and ground penetration, that severely degrade the performance of downstream imitation learning policies. To bridge this gap, KDMR extends beyond pure kinematics by explicitly enforcing rigid-body dynamics and contact complementarity constraints. Further, by integrating ground reaction force (GRF) measurements alongside MoCap data, our method automatically detects heel-toe contact events to accurately replicate complex human-like contact patterns. We evaluate KDMR against the state-of-the-art baseline, GMR, across three key dimensions: 1) the dynamic feasibility and smoothness of the retargeted motions, 2) the accuracy of GRF tracking compared to raw source data, and 3) the training efficiency and final performance of downstream control policies trained via the BeyondMimic framework. Experimental results demonstrate that KDMR significantly outperforms purely kinematic methods, yielding dynamically viable reference trajectories that accelerate policy convergence and enhance overall locomotion stability. Our end-to-end pipeline will be open-sourced upon publication.", "link": "http://arxiv.org/abs/2603.09956v1", "date": "2026-03-10", "relevancy": 2.428, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6625}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic a rgeted%20motions%2C%202%29%20the%20accuracy%20of%20GRF%20tracking%20compared%20to%20raw%20source%20data%2C%20and%203%29%20the%20training%20efficiency%20and%20final%20performance%20of%20downstream%20control%20policies%20trained%20via%20the%20BeyondMimic%20framework.%20Experimental%20results%20demonstrate%20that%20KDMR%20significantly%20outperforms%20purely%20kinematic%20methods%2C%20yielding%20dynamically%20viable%20reference%20trajectories%20that%20accelerate%20policy%20convergence%20and%20enhance%20overall%20locomotion%20stability.%20Our%20end-to-end%20pipeline%20will%20be%20open-sourced%20upon%20publication.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09956v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKinodynamic%2520Motion%2520Retargeting%2520for%2520Humanoid%2520Locomotion%2520via%2520Multi-Contact%2520Whole-Body%2520Trajectory%2520Optimization%26entry.906535625%3DXiaoyu%2520Zhang%2520and%2520Steven%2520Haener%2520and%2520Varun%2520Madabushi%2520and%2520Maegan%2520Tucker%26entry.1292438233%3DWe%2520present%2520the%2520KinoDynamic%2520Motion%2520Retargeting%2520%2528KDMR%2529%2520framework%252C%2520a%2520novel%2520approach%2520for%2520humanoid%2520locomotion%2520that%2520models%2520the%2520retargeting%2520process%2520as%2520a%2520multi-contact%252C%2520whole-body%2520trajectory%2520optimization%2520problem.%2520Conventional%2520kinematics-based%2520retargeting%2520methods%2520rely%2520solely%2520on%2520spatial%2520motion%2520capture%2520%2528MoCap%2529%2520data%252C%2520inevitably%2520introducing%2520physically%2520inconsistent%2520artifacts%252C%2520such%2520as%2520foot%2520sliding%2520and%2520ground%2520penetration%252C%2520that%2520severely%2520degrade%2520the%2520performance%2520of%2520downstream%2520imitation%2520learning%2520policies.%2520To%2520bridge%2520this%2520gap%252C%2520KDMR%2520extends%2520beyond%2520pure%2520kinematics%2520by%2520explicitly%2520enforcing%2520ri {"title": "What is Missing? Explaining Neurons Activated by Absent Concepts", "author": "Robin Hesse and Simone Schaub-Meyer and Janina Hesse and Bernt Schiele and Stefan Roth", "abstract": "Explainable artificial intelligence (XAI) aims to provide human-interpretable insights into the behavior of deep neural networks (DNNs), typically by estimating a simplified causal structure of the model. In existing work, this causal structure often includes relationships where the presence of a concept is associated with a strong activation of a neuron. For example, attribution methods primarily identify input pixels that contribute most to a prediction, and feature visualization methods reveal inputs that cause high activation of a target neuron - the former implicitly assuming that the relevant information resides in the input, and the latter that neurons encode the presence of concepts. However, a largely overlooked type of causal relationship is that of encoded absences, where the absence of a concept increases neural activation. In this work, we show that such missing but relevant concepts are common and that mainstream XAI methods struggle to reveal them when applied in their standard form. To address this, we propose two simple extensions to attribution and feature visualization techniques that uncover encoded absences. Across experiments, we show how mainstream XAI methods can be used to reveal and explain encoded absences, how ImageNet models exploit them, and that debiasing can be improved when considering them.", "link": "http://arxiv.org/abs/2603.09787v1", "date": "2026-03-10", "relevancy": 2.4254, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4997}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4997}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20is%20Missing%3F%20Explaining%20Neurons%20Activated%20by%20Absent%20Concepts&body=Title%3A%20What%20is%20Missing%3F%20Explaining%20Neurons%20Activated%20by%20Absent%20Concepts%0AAuthor%3A%20Robin%20Hesse%20and%20Simone%20Schaub-Meyer%20and%20Janina%20Hesse%20and%20Bernt%20Schiele%20and%20Stefan%20Roth%0AAbstract%3A%20Explainable%20artificial%20intelligence%20%28XAI%29%20aims%20to%20provide%20human-interpretable%20insights%20into%20the%20behavior%20of%20deep%20neural%20networks%20%28DNNs%29%2C%20typically%20by%20estimating%20a%20simplified%20causal%20structure%20of%20the%20model.%20In%20existing%20work%2C%20this%20causal%20structure%20often%20includes%20relationships%20where%20the%20presence%20of%20a%20concept%20is%20associated%20with%20a%20strong%20activation%20of%20a%20neuron.%20For%20example%2C%20attribution%20methods%20primarily%20identify%20input%20pixels%20that%20contribute%20most%20to%20a%20prediction%2C%20and%20feature%20visualization%20methods%20reveal%20inputs%20that%20cause%20high%20activation%20of%20a%20target%20neuron%20-%20the%20former%20implicitly%20assuming%20that%20the%20relevant%20information%20resides%20in%20the%20input%2C%20and%20the%20latter%20that%20neurons%20encode%20the%20presence%20of%20concepts.%20However%2C%20a%20largely%20overlooked%20type%20of%20causal%20relationship%20is%20that%20of%20encoded%20absences%2C%20where%20the%20absence%20of%20a%20concept%20increases%20neural%20activation.%20In%20this%20work%2C%20we%20show%20that%20such%20missing%20but%20relevant%20concepts%20are%20common%20and%20that%20mainstream%20XAI%20methods%20struggle%20to%20reveal%20them%20when%20applied%20in%20their%20standard%20form.%20To%20address%20this%2C%20we%20propose%20two%20simple%20extensions%20to%20attribution%20and%20feature%20visualization%20techniques%20that%20u {"title": "Fairness-Aware Fine-Tuning of Vision-Language Models for Medical Glaucoma Diagnosis", "author": "Zijian Gu and Yuxi Liu and Zhenhao Zhang and Song Wang", "abstract": "Vision-language models achieve expert-level performance on medical imaging tasks but exhibit significant diagnostic accuracy disparities across demographic groups. We introduce fairness-aware Low-Rank Adaptation for medical VLMs, combining parameter efficiency with explicit fairness optimization. Our key algorithmic contribution is a differentiable MaxAccGap loss that enables end-to-end optimization of accuracy parity across demographic groups. We propose three methods: FR-LoRA integrates MaxAccGap regularization into the training objective, GR-LoRA applies inverse frequency weighting to balance gradient contributions, and Hybrid-LoRA combines both mechanisms. Evaluated on 10,000 glaucoma fundus images, GR-LoRA reduces diagnostic accuracy disparities by 69% while maintaining 53.15% overall accuracy. Ablation studies reveal that strong regularization strength achieves optimal fairness with minimal accuracy trade-off, and race-specific optimization yields 60% disparity reduction. Our approach requires only 0.24% trainable parameters, enabling practical deployment of fair medical AI in resource-constrained healthcare settings.", "link": "http://arxiv.org/abs/2512.03477v3", "date": "2026-03-10", "relevancy": 2.4247, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.487}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.485}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fairness-Aware%20Fine-Tuning%20of%20Vision-Language%20Models%20for%20Medical%20Glaucoma%20Diagnosis&body=Title%3A%20Fairness-Aware%20Fine-Tuning%20of%20Vision-Language%20Models%20for%20Medical%20Glaucoma%20Diagnosis%0AAuthor%3A%20Zijian%20Gu%20and%20Yuxi%20Liu%20and%20Zhenhao%20Zhang%20and%20Song%20Wang%0AAbstract%3A%20Vision-language%20models%20achieve%20expert-level%20performance%20on%20medical%20imaging%20tasks%20but%20exhibit%20significant%20diagnostic%20accuracy%20disparities%20across%20demographic%20groups.%20We%20introduce%20fairness-aware%20Low-Rank%20Adaptation%20for%20medical%20VLMs%2C%20combining%20parameter%20efficiency%20with%20explicit%20fairness%20optimization.%20Our%20key%20algorithmic%20contribution%20is%20a%20differentiable%20MaxAccGap%20loss%20that%20enables%20end-to-end%20optimization%20of%20accuracy%20parity%20across%20demographic%20groups.%20We%20propose%20three%20methods%3A%20FR-LoRA%20integrates%20MaxAccGap%20regularization%20into%20the%20training%20objective%2C%20GR-LoRA%20applies%20inverse%20frequency%20weighting%20to%20balance%20gradient%20contributions%2C%20and%20Hybrid-LoRA%20combines%20both%20mechanisms.%20Evaluated%20on%2010%2C000%20glaucoma%20fundus%20images%2C%20GR-LoRA%20reduces%20diagnostic%20accuracy%20disparities%20by%2069%25%20while%20maintaining%2053.15%25%20overall%20accuracy.%20Ablation%20studies%20reveal%20that%20strong%20regularization%20strength%20achieves%20optimal%20fairness%20with%20minimal%20accuracy%20trade-off%2C%20and%20race-specific%20optimization%20yields%2060%25%20disparity%20reduction.%20Our%20approach%20requires%20only%200.24%25%20trainable%20parameters%2C%20enabling%20practical%20deployment%20of%20fair%20medical%20AI%20in%20resource-constrained%20healthcare%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2512.03477v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380 {"title": "SPAN: Spatial-Projection Alignment for Monocular 3D Object Detection", "author": "Yifan Wang and Yian Zhao and Fanqi Pu and Xiaochen Yang and Yang Tang and Xi Chen and Wenming Yang", "abstract": "Existing monocular 3D detectors typically tame the pronounced nonlinear regression of 3D bounding box through decoupled prediction paradigm, which employs multiple branches to estimate geometric center, depth, dimensions, and rotation angle separately. Although this decoupling strategy simplifies the learning process, it inherently ignores the geometric collaborative constraints between different attributes, resulting in the lack of geometric consistency prior, thereby leading to suboptimal performance. To address this issue, we propose novel Spatial-Projection Alignment (SPAN) with two pivotal components: (i). Spatial Point Alignment enforces an explicit global spatial constraint between the predicted and ground-truth 3D bounding boxes, thereby rectifying spatial drift caused by decoupled attribute regression. (ii). 3D-2D Projection Alignment ensures that the projected 3D box is aligned tightly within its corresponding 2D detection bounding box on the image plane, mitigating projection misalignment overlooked in previous works. To ensure training stability, we further introduce a Hierarchical Task Learning strategy that progressively incorporates spatial-projection alignment as 3D attribute predictions refine, preventing early stage error propagation across attributes. Extensive experiments demonstrate that the proposed method can be easily integrated into any established monocular 3D detector and delivers significant performance improvements.", "link": "http://arxiv.org/abs/2511.06702v2", "date": "2026-03-10", "relevancy": 2.4184, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6597}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5716}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5492}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPAN%3A%20Spatial-Projection%20Alignment%20for%20Monocular%203D%20Object%20Detection&body=Title%3A%20SPAN%3A%20Spatial-Projection%20Alignment%20for%20Monocular%203D%20Object%20Detection%0AAuthor%3A%20Yifan%20Wang%20and%20Yian%20Zhao%20and%20Fanqi%20Pu%20and%20Xiaochen%20Yang%20and%20Yang%20Tang%20and%20Xi%20Chen%20and%20Wenming%20Yang%0AAbstract%3A%20Existing%20monocular%203D%20detectors%20typically%20tame%20the%20pronounced%20nonlinear%20regression%20of%203D%20bounding%20box%20through%20decoupled%20prediction%20paradigm%2C%20which%20employs%20multiple%20branches%20to%20estimate%20geometric%20center%2C%20depth%2C%20dimensions%2C%20and%20rotation%20angle%20separately.%20Although%20this%20decoupling%20strategy%20simplifies%20the%20learning%20process%2C%20it%20inherently%20ignores%20the%20geometric%20collaborative%20constraints%20between%20different%20attributes%2C%20resulting%20in%20the%20lack%20of%20geometric%20consistency%20prior%2C%20thereby%20leading%20to%20suboptimal%20performance.%20To%20address%20this%20issue%2C%20we%20propose%20novel%20Spatial-Projection%20Alignment%20%28SPAN%29%20with%20two%20pivotal%20components%3A%20%28i%29.%20Spatial%20Point%20Alignment%20enforces%20an%20explicit%20global%20spatial%20constraint%20between%20the%20predicted%20and%20ground-truth%203D%20bounding%20boxes%2C%20thereby%20rectifying%20spatial%20drift%20caused%20by%20decoupled%20attribute%20regression.%20%28ii%29.%203D-2D%20Projection%20Alignment%20ensures%20that%20the%20projected%203D%20box%20is%20aligned%20tightly%20within%20its%20corresponding%202D%20detection%20bounding%20box%20on%20the%20image%20plane%2C%20mitigating%20projection%20misalignment%20overlooked%20in%20previous%20works.%20To%20ensure%20training%20stability%2C%20we%20further%20introduce%20a%20Hierarchical%20Task%20Learning%20strategy%20that%20progressively%20incorporates%20spatial-projection%20alignment%20as%203D%20attribute%20predictions%20refine%2C%20preventing%20early%20stage%20error%20propagation%20across%20attributes.%20Extensive%20experiments%20demonstrate%20that%20the%20proposed%20method%20can%20be%20easily%20integrated%20into%20any%20established%20monocular%203D%20detector%20and%20delivers%20significant%20performance%20improvements.%0ALink%3A%20http%3A//arxiv.org/abs/2511.06702v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPAN%253A%2520Spatial-Projection%2520Alignment%2520for%2520Monocular%25203D%2520Object%2520Detection%26entry.906535625%3DYifan%2520Wang%2520and%2520Yian%2520Zhao%2520and%2520Fanqi%2520Pu%2520and%2520Xiaochen%2520Yang%2520and%2520Yang%2520Tang%2520and%2520Xi%2520Chen%2520and%2520Wenming%2520Yang%26entry.1292438233%3DExisting%2520monocular%25203D%2520detectors%2520typically%2520tame%2520the%2520pronounced%2520nonlinear%2520regression%2520of%25203D%2520bounding%2520box%2520through%2520decoupled%2520prediction%2520paradigm%252C%2520which%2520employs%2520multiple%2520branches%2520to%2520estimate%2520geometric%2520center%252C%2520depth%252C%2520dimensions%252C%2520and%2520rotation%2520angle%2520separately.%2520Although%2520this%2520decoupling%2520strategy%2520simplifies%2520the%2520learning%2520process%252C%2520it%2520inherently%2520ignores%2520the%2520geometric%2520collaborative%2520constraints%2520between%2520different%2520attributes%252C%2520resulting%2520in%2520the%2520lack%2520of%2520geometric%2520consistency%2520prior%252C%2520thereby%2520leading%2520to%2520suboptimal%2520performance.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520novel%2520Spatial-Projection%2520Alignment%2520%2528SPAN%2529%2520with%2520t {"title": "CRANE: Causal Relevance Analysis of Language-Specific Neurons in Multilingual Large Language Models", "author": "Yifan Le and Yunliang Li", "abstract": "Multilingual large language models (LLMs) achieve strong performance across languages, yet how language capabilities are organized at the neuron level remains poorly understood. Prior work has identified language-related neurons mainly through activation-based heuristics, which conflate language preference with functional importance. We propose CRANE, a relevance-based analysis framework that redefines language specificity in terms of functional necessity, identifying language-specific neurons through targeted neuron-level interventions. CRANE characterizes neuron specialization by their contribution to language-conditioned predictions rather than activation magnitude. Our implementation will be made publicly available. Neuron-level interventions reveal a consistent asymmetric pattern: masking neurons relevant to a target language selectively degrades performance on that language while preserving performance on other languages to a substantial extent, indicating language-selective but non-exclusive neuron specializations. Experiments on English, Chinese, and Vietnamese across multiple benchmarks, together with a dedicated relevance-based metric and base-to-chat model transfer analysis, show that CRANE isolates language-specific components more precisely than activation-based methods.", "link": "http://arxiv.org/abs/2601.04664v2", "date": "2026-03-10", "relevancy": 2.4156, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5127}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5127}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4239}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CRANE%3A%20Causal%20Relevance%20Analysis%20of%20Language-Specific%20Neurons%20in%20Multilingual%20Large%20Language%20Models&body=Title%3A%20CRANE%3A%20Causal%20Relevance%20Analysis%20of%20Language-Specific%20Neurons%20in%20Multilingual%20Large%20Language%20Models%0AAuthor%3A%20Yifan%20Le%20and%20Yunliang%20Li%0AAbstract%3A%20Multilingual%20large%20language%20models%20%28LLMs%29%20achieve%20strong%20performance%20across%20languages%2C%20yet%20how%20language%20capabilities%20are%20organized%20at%20the%20neuron%20level%20remains%20poorly%20understood.%20Prior%20work%20has%20identified%20language-related%20neurons%20mainly%20through%20activation-based%20heuristics%2C%20which%20conflate%20language%20preference%20with%20functional%20importance.%20We%20propose%20CRANE%2C%20a%20relevance-based%20analysis%20framework%20that%20redefines%20language%20specificity%20in%20terms%20of%20functional%20necessity%2C%20identifying%20language-specific%20neurons%20through%20targeted%20neuron-level%20interventions.%20CRANE%20characterizes%20neuron%20specialization%20by%20their%20contribution%20to%20language-conditioned%20predictions%20rather%20than%20activation%20magnitude.%20Our%20implementation%20will%20be%20made%20publicly%20available.%20Neuron-level%20interventions%20reveal%20a%20consistent%20asymmetric%20pattern%3A%20masking%20neurons%20relevant%20to%20a%20target%20language%20selectively%20degrades%20performance%20on%20that%20language%20while%20preserving%20performance%20on%20other%20languages%20to%20a%20substantial%20extent%2C%20indicating%20language-selective%20but%20non-exclusive%20neuron%20specializations.%20Experiments%20on%20English%2C%20Chinese%2C%20and%20Vietnamese%20across%20multiple%20benchmarks%2C%20together%20with%20a%20dedicated%20relevance-based%20metric%20and%20base-to-chat%20model%20transfer%20analysis%2C%20show%20that%20CRANE%20isolates%20language-specific%20components%20more%20precisely%20than%20activation-based%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2601.04664v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCRANE%253A%2520Causal%2520Relevance%2520Analysis%2520of%2520Language-Specific%2520Neurons%2520in%2520Multilingual%2520Large%2520Language%2520Models%26entry.906535625%3DYifan%2520Le%2520and%2520Yunliang%2520Li%26entry.1292438233%3DMultilingual%2520large%2520language%2520models%2520%2528LLMs%2529%2520achieve%2520strong%2520performance%2520across%2520languages%252C%2520yet%2520how%2520language%2520capabilities%2520are%2520organized%2520at%2520the%2520neuron%2520level%2520remains%2520poorly%2520understood.%2520Prior%2520work%2520has%2520identified%2520language-related%2520neurons%2520mainly%2520through%2520activation-based%2520heuristics%252C%2520which%2520conflate%2520language%2520preference%2520with%2520functional%2520importance.%2520We%2520propose%2520CRANE%252C%2520a%2520relevance-based%2520analysis%2520framework%2520that%2520redefines%2520language%2520specificity%2520in%2520terms%2520of%2520functional%2520necessity%252C%2520identifying%2520language-specific%2520neurons%2520through%2520targeted%2520neuron-level%2520interventions.%2520CRANE%2520characterizes%2520neuron%2520specialization%2520by%2520their%2520contribution%2520to%2520language-conditioned%2520predictions%2520rather%2520than%2520activation%2520magnitude.%2520Our%2520implementation%2520will%2520be%2520made%2520publicly%2520available.%2520Neuron-level%2520interventions%2520reveal%2520a%2520consistent%2520asymmetric%2520pattern%253A%2520masking%2520neurons%2520relevant%2520to%2520a%2520target%2520language%2520selectively%2520degrades%2520performance%2520on%2520that%2520language%2520while%2520preserving%2520performance%2520on%2520other%2520languages%2520to%2520a%2520substantial%2520extent%252C%2520indicating%2520language-selective%2520but%2520non-exclusive%2520neuron%2520specializations.%2520Experiments%2520on%2520English%252C%2520Chinese%252C%2520and%2520Vietnamese%2520across%2520multiple%2520benchmarks%252C%2520together%2520with%2520a%2520dedicated%2520relevance-based%2520metric%2520and%2520base-to-chat%2520model%2520transfer%2520analysis%252C%2520show%2520that%2520CRANE%2520isolates%2520language-specific%2520components%2520more%2520precisely%2520than%2520activation-based%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.04664v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CRANE%3A%20Causal%20Relevance%20Analysis%20of%20Language-Specific%20Neurons%20in%20Multilingual%20Large%20Language%20Models&entry.906535625=Yifan%20Le%20and%20Yunliang%20Li&entry.1292438233=Multilingual%20large%20language%20models%20%28LLMs%29%20achieve%20strong%20performance%20across%20languages%2C%20yet%20how%20language%20capabilities%20are%20organized%20at%20the%20neuron%20level%20remains%20poorly%20understood.%20Prior%20work%20has%20identified%20language-related%20neurons%20mainly%20through%20activation-based%20heuristics%2C%20which%20conflate%20language%20preference%20with%20functional%20importance.%20We%20propose%20CRANE%2C%20a%20relevance-based%20analysis%20framework%20that%20redefines%20language%20specificity%20in%20terms%20of%20functional%20necessity%2C%20identifying%20language-specific%20neurons%20through%20targeted%20neuron-level%20interventions.%20CRANE%20characterizes%20neuron%20specialization%20by%20their%20contribution%20to%20language-conditioned%20predictions%20rather%20than%20activation%20magnitude.%20Our%20implementation%20will%20be%20made%20publicly%20available.%20Neuron-level%20interventions%20reveal%20a%20consistent%20asymmetric%20pattern%3A%20masking%20neurons%20relevant%20to%20a%20target%20language%20selectively%20degrades%20performance%20on%20that%20language%20while%20preserving%20performance%20on%20other%20languages%20to%20a%20substantial%20extent%2C%20indicating%20language-selective%20but%20non-exclusive%20neuron%20specializations.%20Experiments%20on%20English%2C%20Chinese%2C%20and%20Vietnamese%20across%20multiple%20benchmarks%2C%20together%20with%20a%20dedicated%20relevance-based%20metric%20and%20base-to-chat%20model%20transfer%20analysis%2C%20show%20that%20CRANE%20isolates%20language-specific%20components%20more%20precisely%20than%20activation-based%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2601.04664v2&entry.124074799=Read"},
{"title": "GNNs for Time Series Anomaly Detection: An Open-Source Framework and a Critical Evaluation", "author": "Federico Bello and Gonzalo Chiarlone and Marcelo Fiori and Gast\u00f3n Garc\u00eda Gonz\u00e1lez and Federico Larroca", "abstract": "There is growing interest in applying graph-based methods to Time Series Anomaly Detection (TSAD), particularly Graph Neural Networks (GNNs), as they naturally model dependencies among multivariate signals. GNNs are typically used as backbones in score-based TSAD pipelines, where anomalies are identified through reconstruction or prediction errors followed by thresholding. However, and despite promising results, the field still lacks standardized frameworks for evaluation and suffers from persistent issues with metric design and interpretation. We thus present an open-source framework for TSAD using GNNs, designed to support reproducible experimentation across datasets, graph structures, and evaluation strategies. Built with flexibility and extensibility in mind, the framework facilitates systematic comparisons between TSAD models and enables in-depth analysis of performance and interpretability. Using this tool, we evaluate several GNN-based architectures alongside baseline models across two real-world datasets with contrasting structural characteristics. Our results show that GNNs not only improve detection performance but also offer significant gains in interpretability, an especially valuable feature for practical diagnosis. We also find that attention-based GNNs offer robustness when graph structure is uncertain or inferred. In addition, we reflect on common evaluation practices in TSAD, showing how certain metrics and thresholding strategies can obscure meaningful comparisons. Overall, this work contributes both practical tools and critical insights to advance the development and evaluation of graph-based TSAD systems.", "link": "http://arxiv.org/abs/2603.09675v1", "date": "2026-03-10", "relevancy": 2.4124, "topK": [ {"title": "EsoLang-Bench: Evaluating Genuine Reasoning in Large Language Models via Esoteric Programming Languages", "author": "Aman Sharma and Paras Chopra", "abstract": "Large language models achieve near-ceiling performance on code generation benchmarks, yet these results increasingly reflect memorization rather than genuine reasoning. We introduce EsoLang-Bench, a benchmark using five esoteric programming languages (Brainfuck, Befunge-98, Whitespace, Unlambda, and Shakespeare) that lack benchmark gaming incentives due to their economic irrationality for pre-training. These languages require the same computational primitives as mainstream programming but have 1,000-100,000x fewer public repositories than Python (based on GitHub search counts). We evaluate five frontier models across five prompting strategies and find a dramatic capability gap: models achieving 85-95% on standard benchmarks score only 0-11% on equivalent esoteric tasks, with 0% accuracy beyond the Easy tier. Few-shot learning and self-reflection fail to improve performance, suggesting these techniques exploit training priors rather than enabling genuine learning. EsoLang-Bench provides the first benchmark designed to mimic human learning by acquiring new languages through documentation, interpreter feedback, and iterative experimentation, measuring transferable reasoning skills resistant to data contamination.", "link": "http://arxiv.org/abs/2603.09678v1", "date": "2026-03-10", "relevancy": 2.3984, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5003}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5003}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?sub {"title": "Fine-grained Motion Retrieval via Joint-Angle Motion Images and Token-Patch Late Interaction", "author": "Yao Zhang and Zhuchenyang Liu and Yanlan He and Thomas Ploetz and Yu Xiao", "abstract": "Text-motion retrieval aims to learn a semantically aligned latent space between natural language descriptions and 3D human motion skeleton sequences, enabling bidirectional search across the two modalities. Most existing methods use a dual-encoder framework that compresses motion and text into global embeddings, discarding fine-grained local correspondences, and thus reducing accuracy. Additionally, these global-embedding methods offer limited interpretability of the retrieval results. To overcome these limitations, we propose an interpretable, joint-angle-based motion representation that maps joint-level local features into a structured pseudo-image, compatible with pre-trained Vision Transformers. For text-to-motion retrieval, we employ MaxSim, a token-wise late interaction mechanism, and enhance it with Masked Language Modeling regularization to foster robust, interpretable text-motion alignment. Extensive experiments on HumanML3D and KIT-ML show that our method outperforms state-of-the-art text-motion retrieval approaches while offering interpretable fine-grained correspondences between text and motion. The code is available in the supplementary material.", "link": "http://arxiv.org/abs/2603.09930v1", "date": "2026-03-10", "relevancy": 2.3966, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.616}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6057}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5858}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fine-grained%20Motion%20Retrieval%20via%20Joint-Angle%20Motion%20Images%20and%20Token-Patch%20Late%20Interaction&body=Title%3A%20Fine-grained%20Motion%20Retrieval%20via%20Joint-Angle%20Motion%20Images%20and%20Token-Patch%20Late%20Interaction%0AAuthor%3A%20Yao%20Zhang%20and%20Zhuchenyang%20Liu%20and%20Yanlan%20He%20and%20Thomas%20Ploetz%20and%20Yu%20Xiao%0AAbstract%3A%20Text-motion%20retrieval%20aims%20to%20learn%20a%20semantically%20aligned%20latent%20space%20between%20natural%20language%20descriptions%20and%203D%20human%20motion%20skeleton%20sequences%2C%20enabling%20bidirectional%20search%20across%20the%20two%20modalities.%20Most%20existing%20methods%20use%20a%20dual-encoder%20framework%20that%20compresses%20motion%20and%20text%20into%20global%20embeddings%2C%20discarding%20fine-grained%20local%20correspondences%2C%20and%20thus%20reducing%20accuracy.%20Additionally%2C%20these%20global-embedding%20methods%20offer%20limited%20interpretability%20of%20the%20retrieval%20results.%20To%20overcome%20these%20limitations%2C%20we%20propose%20an%20interpretable%2C%20joint-angle-based%20motion%20representation%20that%20maps%20joint-level%20local%20features%20into%20a%20structured%20pseudo-image%2C%20compatible%20with%20pre-trained%20Vision%20Transformers.%20For%20text-to-motion%20retrieval%2C%20we%20employ%20MaxSim%2C%20a%20token-wise%20late%20interaction%20mechanism%2C%20and%20enhance%20it%20with%20Masked%20Language%20Modeling%20regularization%20to%20foster%20robust%2C%20interpretable%20text-motion%20alignment.%20Extensive%20experiments%20on%20HumanML3D%20and%20KIT-ML%20show%20that%20our%20method%20outperforms%20state-of-the-art%20text-motion%20retrieval%20approaches%20while%20offering%20interpretable%20fine-grained%20correspondences%20between%20text%20and%20motion.%20The%20code%20is%20available%20in%20the%20supplementary%20material.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09930v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/vie

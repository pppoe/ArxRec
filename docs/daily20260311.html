{"title": "RESBev: Making BEV Perception More Robust", "author": "Lifeng Zhuo and Kefan Jin and Zhe Liu and Hesheng Wang", "abstract": "Bird's-eye-view (BEV) perception has emerged as a cornerstone of autonomous driving systems, providing a structured, ego-centric representation critical for downstream planning and control. However, real-world deployment faces challenges from sensor degradation and adversarial attacks, which can cause severe perceptual anomalies and ultimately compromise the safety of autonomous driving systems. To address this, we propose a resilient and plug-and-play BEV perception method, RESBev, which can be easily applied to existing BEV perception methods to enhance their robustness to diverse disturbances. Specifically, we reframe perception robustness as a latent semantic prediction problem. A latent world model is constructed to extract spatiotemporal correlations across sequential BEV observations, thereby learning the underlying BEV state transitions to predict clean BEV features for reconstructing corrupted observations. The proposed framework operates at the semantic feature level of the Lift-Splat-Shoot pipeline, enabling recovery that generalizes across both natural disturbances and adversarial attacks without modifying the underlying backbone. Extensive experiments on the nuScenes dataset demonstrate that, with few-shot fine-tuning, RESBev significantly improves the robustness of existing BEV perception models against various external disturbances and adversarial attacks.", "link": "http://arxiv.org/abs/2603.09529v1", "date": "2026-03-10", "relevancy": 2.261, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5844}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5823}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RESBev%3A%20Making%20BEV%20Perception%20More%20Robust&body=Title%3A%20RESBev%3A%20Making%20BEV%20Perception%20More%20Robust%0AAuthor%3A%20Lifeng%20Zhuo%20and%20Kefan%20Jin%20and%20Zhe%20Liu%20and%20Hesheng%20Wang%0AAbstract%3A%20Bird%27s-eye-view%20%28BEV%29%20perception%20has%20emerged%20as%20a%20cornerstone%20of%20autonomous%20driving%20systems%2C%20providing%20a%20structured%2C%20ego-centric%20representation%20critical%20for%20downstream%20planning%20and%20control.%20However%2C%20real-world%20deployment%20faces%20challenges%20from%20sensor%20degradation%20and%20adversarial%20attacks%2C%20which%20can%20cause%20severe%20perceptual%20anomalies%20and%20ultimately%20compromise%20the%20safety%20of%20autonomous%20driving%20systems.%20To%20address%20this%2C%20we%20propose%20a%20resilient%20and%20plug-and-play%20BEV%20perception%20method%2C%20RESBev%2C%20which%20can%20be%20easily%20applied%20to%20existing%20BEV%20perception%20methods%20to%20enhance%20their%20robustness%20to%20diverse%20disturbances.%20Specifically%2C%20we%20reframe%20perception%20robustness%20as%20a%20latent%20semantic%20prediction%20problem.%20A%20latent%20world%20model%20is%20constructed%20to%20extract%20spatiotemporal%20correlations%20across%20sequential%20BEV%20observations%2C%20thereby%20learning%20the%20underlying%20BEV%20state%20transitions%20to%20predict%20clean%20BEV%20features%20for%20reconstructing%20corrupted%20observations.%20The%20proposed%20framework%20operates%20at%20the%20semantic%20feature%20level%20of%20the%20Lift-Splat-Shoot%20pipeline%2C%20enabling%20recovery%20that%20generalizes%20across%20both%20natural%20disturbances%20and%20adversarial%20attacks%20without%20modifying%20the%20underlying%20backbone.%20Extensive%20experiments%20on%20the%20nuScenes%20dataset%20demonstrate%20that%2C%20with%20few-shot%20fine-tuning%2C%20RESBev%20significantly%20improves%20the%20robustness%20of%20existing%20BEV%20perception%20models%20against%20various%20external%20disturbances%20and%20adversarial%20attacks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09529v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRESBev%253A%2520Making%2520BEV%2520Perception%2520More%2520Robust%26entry.906535625%3DLifeng%2520Zhuo%2520and%2520Kefan%2520Jin%2520and%2520Zhe%2520Liu%2520and%2520Hesheng%2520Wang%26entry.1292438233%3DBird%2527s-eye-view%2520%2528BEV%2529%2520perception%2520has%2520emerged%2520as%2520a%2520cornerstone%2520of%2520autonomous%2520driving%2520systems%252C%2520providing%2520a%2520structured%252C%2520ego-centric%2520representation%2520critical%2520for%2520downstream%2520planning%2520and%2520control.%2520However%252C%2520real-world%2520deployment%2520faces%2520challenges%2520from%2520sensor%2520degradation%2520and%2520adversarial%2520attacks%252C%2520which%2520can%2520cause%2520severe%2520perceptual%2520anomalies%2520and%2520ultimately%2520compromise%2520the%2520safety%2520of%2520autonomous%2520driving%2520systems.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520resilient%2520and%2520plug-and-play%2520BEV%2520perception%2520method%252C%2520RESBev%252C%2520which%2520can%2520be%2520easily%2520applied%2520to%2520existing%2520BEV%2520perception%2520methods%2520to%2520enhance%2520their%2520robustness%2520to%2520diverse%2520disturbances.%2520Specifically%252C%2520we%2520reframe%2520perception%2520robustness%2520as%2520a%2520latent%2520semantic%2520prediction%2520problem.%2520A%2520latent%2520world%2520model%2520is%2520constructed%2520to%2520extract%2520spatiotemporal%2520correlations%2520across%2520sequential%2520BEV%2520observations%252C%2520thereby%2520learning%2520the%2520underlying%2520BEV%2520state%2520transitions%2520to%2520predict%2520clean%2520BEV%2520features%2520for%2520reconstructing%2520corrupted%2520observations.%2520The%2520proposed%2520framework%2520operates%2520at%2520the%2520semantic%2520feature%2520level%2520of%2520the%2520Lift-Splat-Shoot%2520pipeline%252C%2520enabling%2520recovery%2520that%2520generalizes%2520across%2520both%2520natural%2520disturbances%2520and%2520adversarial%2520attacks%2520without%2520modifying%2520the%2520underlying%2520backbone.%2520Extensive%2520experiments%2520on%2520the%2520nuScenes%2520dataset%2520demonstrate%2520that%252C%2520with%2520few-shot%2520fine-tuning%252C%2520RESBev%2520significantly%2520improves%2520the%2520robustness%2520of%2520existing%2520BEV%2520perception%2520models%2520against%2520various%2520external%2520disturbances%2520and%2520adversarial%2520attacks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09529v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RESBev%3A%20Making%20BEV%20Perception%20More%20Robust&entry.906535625=Lifeng%20Zhuo%20and%20Kefan%20Jin%20and%20Zhe%20Liu%20and%20Hesheng%20Wang&entry.1292438233=Bird%27s-eye-view%20%28BEV%29%20perception%20has%20emerged%20as%20a%20cornerstone%20of%20autonomous%20driving%20systems%2C%20providing%20a%20structured%2C%20ego-centric%20representation%20critical%20for%20downstream%20planning%20and%20control.%20However%2C%20real-world%20deployment%20faces%20challenges%20from%20sensor%20degradation%20and%20adversarial%20attacks%2C%20which%20can%20cause%20severe%20perceptual%20anomalies%20and%20ultimately%20compromise%20the%20safety%20of%20autonomous%20driving%20systems.%20To%20address%20this%2C%20we%20propose%20a%20resilient%20and%20plug-and-play%20BEV%20perception%20method%2C%20RESBev%2C%20which%20can%20be%20easily%20applied%20to%20existing%20BEV%20perception%20methods%20to%20enhance%20their%20robustness%20to%20diverse%20disturbances.%20Specifically%2C%20we%20reframe%20perception%20robustness%20as%20a%20latent%20se {"title": "Concept Drift Guided LayerNorm Tuning for Efficient Multimodal Metaphor Identification", "author": "Wenhao Qian and Zhenzhen Hu and Zijie Song and Jia Li", "abstract": "Metaphorical imagination, the ability to connect seemingly unrelated concepts, is fundamental to human cognition and communication. While understanding linguistic metaphors has advanced significantly, grasping multimodal metaphors, such as those found in internet memes, presents unique challenges due to their unconventional expressions and implied meanings. Existing methods for multimodal metaphor identification often struggle to bridge the gap between literal and figurative interpretations. Additionally, generative approaches that utilize large language models or text-to-image models, while promising, suffer from high computational costs. This paper introduces \\textbf{C}oncept \\textbf{D}rift \\textbf{G}uided \\textbf{L}ayerNorm \\textbf{T}uning (\\textbf{CDGLT}), a novel and training-efficient framework for multimodal metaphor identification. CDGLT incorporates two key innovations: (1) Concept Drift, a mechanism that leverages Spherical Linear Interpolation (SLERP) of cross-modal embeddings from a CLIP encoder to generate a new, divergent concept embedding. This drifted concept helps to alleviate the gap between literal features and the figurative task. (2) A prompt construction strategy, that adapts the method of feature extraction and fusion using pre-trained language models for the multimodal metaphor identification task. CDGLT achieves state-of-the-art performance on the MET-Meme benchmark while significantly reducing training costs compared to existing generative methods. Ablation studies demonstrate the effectiveness of both Concept Drift and our adapted LN Tuning approach. Our method represents a significant step towards efficient and accurate multimodal metaphor understanding. The code is available: \\href{https://github.com/Qianvenh/CDGLT}{https://github.com/Qianvenh/CDGLT}.", "link": "http://arxiv.org/abs/2505.11237v2", "date": "2026-03-10", "relevancy": 2.2582, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5809}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5564}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Concept%20Drift%20Guided%20LayerNorm%20Tuning%20for%20Efficient%20Multimodal%20Metaphor%20Identification&body=Title%3A%20Concept%20Drift%20Guided%20LayerNorm%20Tuning%20for%20Efficient%20Multimodal%20Metaphor%20Identification%0AAuthor%3A%20Wenhao%20Qian%20and%20Zhenzhen%20Hu%20and%20Zijie%20Song%20and%20Jia%20Li%0AAbstract%3A%20Metaphorical%20imagination%2C%20the%20ability%20to%20connect%20seemingly%20unrelated%20concepts%2C%20is%20fundamental%20to%20human%20cognition%20and%20communication.%20While%20understanding%20linguistic%20metaphors%20has%20advanced%20significantly%2C%20grasping%20multimodal%20metaphors%2C%20such%20as%20those%20found%20in%20internet%20memes%2C%20presents%20unique%20challenges%20due%20to%20their%20unconventional%20expressions%20and%20implied%20meanings.%20Existing%20methods%20for%20multimodal%20metaphor%20identification%20often%20struggle%20to%20bridge%20the%20gap%20between%20literal%20and%20figurative%20interpretations.%20Additionally%2C%20generative%20approaches%20that%20utilize%20large%20language%20models%20or%20text-to-image%20models%2C%20while%20promising%2C%20suffer%20from%20high%20computational%20costs.%20This%20paper%20introduces%20%5Ctextbf%7BC%7Doncept%20%5Ctextbf%7BD%7Drift%20%5Ctextbf%7BG%7Duided%20%5Ctextbf%7BL%7DayerNorm%20%5Ctextbf%7BT%7Duning%20%28%5Ctextbf%7BCDGLT%7D%29%2C%20a%20novel%20and%20training-efficient%20framework%20for%20multimodal%20metaphor%20identification.%20CDGLT%20incorporates%20two%20key%20innovations%3A%20%281%29%20Concept%20Drift%2C%20a%20mechanism%20that%20leverages%20Spherical%20Linear%20Interpolation%20%28SLERP%29%20of%20cross-modal%20embeddings%20from%20a%20CLIP%20encoder%20to%20generate%20a%20new%2C%20divergent%20concept%20embedding.%20This%20drifted%20concept%20helps%20to%20alleviate%20the%20gap%20between%20literal%20features%20and%20the%20figurative%20task.%20%282%29%20A%20prompt%20construction%20strategy%2C%20that%20adapts%20the%20method%20of%20feature%20extraction%20and%20fusion%20using%20pre-trained%20language%20models%20for%20the%20multimodal%20metaphor%20identification%20task.%20CDGLT%20achieves%20state-of-the-art%20performance%20on%20the%20MET-Meme%20benchmark%20while%20significantly%20reducing%20training%20costs%20compared%20to%20existing%20generative%20methods.%20Ablation%20studies%20demonstrate%20the%20effectiveness%20of%20both%20Concept%20Drift%20and%20our%20adapted%20LN%20Tuning%20approach.%20Our%20method%20represents%20a%20significant%20step%20towards%20efficient%20and%20accurate%20multimodal%20metaphor%20understanding.%20The%20code%20is%20available%3A%20%5Chref%7Bhttps%3A//github.com/Qianvenh/CDGLT%7D%7Bhttps%3A//github.com/Qianvenh/CDGLT%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2505.11237v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConcept%2520Drift%2520Guided%2520LayerNorm%2520Tuning%2520for%2520Efficient%2520Multimodal%2520Metaphor%2520Identification%26entry.906535625%3DWenhao%2520Qian%2520and%2520Zhenzhen%2520Hu%2520and%2520Zijie%2520Song%2520and%2520Jia%2520Li%26entry.1292438233%3DMetaphorical%2520imagination%252C%2520the%2520ability%2520to%2520connect%2520seemingly%2520unrelated%2520concepts%252C%2520is%2520fundamental%2520to%2520human%2520cognition%2520and%2520communication.%2520While%2520understanding%2520linguistic%2520metaphors%2520has%2520advanced%2520signific {"title": "Let's Reward Step-by-Step: Step-Aware Contrastive Alignment for Vision-Language Navigation in Continuous Environments", "author": "Haoyuan Li and Rui Liu and Hehe Fan and Yi Yang", "abstract": "Vision-Language Navigation in Continuous Environments (VLN-CE) requires agents to learn complex reasoning from long-horizon human interactions. While Multi-modal Large Language Models (MLLMs) have driven recent progress, current training paradigms struggle to balance generalization capability, error recovery and training stability. Specifically, (i) policies derived from SFT suffer from compounding errors, struggling to recover from out-of-distribution states, and (ii) Reinforcement Fine-Tuning (RFT) methods e.g. GRPO are bottlenecked by sparse outcome rewards. Their binary feedback fails to assign credit to individual steps, leading to gradient signal collapse in failure dominant batches. To address these challenges, we introduce Step-Aware Contrastive Alignment (SACA), a framework designed to extract dense supervision from imperfect trajectories. At its core, the Perception-Grounded Step-Aware auditor evaluates progress step-by-step, disentangling failed trajectories into valid prefixes and exact divergence points. Leveraging these signals, Scenario-Conditioned Group Construction mechanism dynamically routes batches to specialized resampling and optimization strategies. Extensive experiments on VLN-CE benchmarks demonstrate that SACA achieves state-of-the-art performance.", "link": "http://arxiv.org/abs/2603.09740v1", "date": "2026-03-10", "relevancy": 2.2526, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5671}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5671}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Let%27s%20Reward%20Step-by-Step%3A%20Step-Aware%20Contrastive%20Alignment%20for%20Vision-Language%20Navigation%20in%20Continuous%20Environments&body=Title%3A%20Let%27s%20Reward%20Step-by-Step%3A%20Step-Aware%20Contrastive%20Alignment%20for%20Vision-Language%20Navigation%20in%20Continuous%20Environments%0AAuthor%3A%20Haoyuan%20Li%20and%20Rui%20Liu%20and%20Hehe%20Fan%20and%20Yi%20Yang%0AAbstract%3A%20Vision-Language%20Navigation%20in%20Continuous%20Environments%20%28VLN-CE%29%20requires%20agents%20to%20learn%20complex%20reasoning%20from%20long-horizon%20human%20interactions.%20While%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29%20have%20driven%20recent%20progress%2C%20current%20training%20paradigms%20struggle%20to%20balance%20generalization%20capability%2C%20error%20recovery%20and%20training%20stability.%20Specifically%2C%20%28i%29%20policies%20derived%20from%20SFT%20suffer%20from%20compounding%20errors%2C%20struggling%20to%20recover%20from%20out-of-distribution%20states%2C%20and%20%28ii%29%20Reinforcement%20Fine-Tuning%20%28RFT%29%20methods%20e.g.%20GRPO%20are%20bottlenecked%20by%20sparse%20outcome%20rewards.%20Their%20binary%20feedback%20fails%20to%20assign%20credit%20to%20individual%20steps%2C%20leading%20to%20gradient%20signal%20collapse%20in%20failure%20dominant%20batches.%20To%20address%20these%20challenges%2C%20we%20introduce%20Step-Aware%20Contrastive%20Alignment%20%28SACA%29%2C%20a%20framework%20designed%20to%20extract%20dense%20supervision%20from%20imperfect%20trajectories.%20At%20its%20core%2C%20the%20Perception-Grounded%20Step-Aware%20auditor%20evaluates%20progress%20step-by-step%2C%20disentangling%20failed%20trajectories%20into%20valid%20prefixes%20and%20exact%20divergence%20points.%20Leveraging%20these%20signals%2C%20Scenario-Conditioned%20Group%20Construction%20mechanism%20dynamically%20routes%20batches%20to%20specialized%20resampling%20and%20optimization%20strategies.%20Extensive%20experiments%20on%20VLN-CE%20benchmarks%20demonstrate%20that%20SACA%20achieves%20state-of-the-art%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09740v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLet%2527s%2520Reward%2520Step-by-Step%253A%2520Step-Aware%2520Contrastive%2520Alignment%2520for%2520Vision-Language%2520Navigation%2520in%2520Continuous%2520Environments%26entry.906535625%3DHaoyuan%2520Li%2520and%2520Rui%2520Liu%2520and%2520Hehe%2520Fan%2520and%2520Yi%2520Yang%26entry.1292438233%3DVision-Language%2520Navigation%2520in%2520Continuous%2520Environments%2520%2528VLN-CE%2529%2520requires%2520agents%2520to%2520learn%2520complex%2520reasoning%2520from%2520long-horizon%2520human%2520interactions.%2520While%2520Multi-modal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520driven%2520recent%2520progress%252C%2520current%2520training%2520paradigms%2520struggle%2520to%2520balance%2520generalization%2520capability%252C%2520error%2520recovery%2520and%2520training%2520stability.%2520Specifically%252C%2520%2528i%2529%2520policies%2520derived%2520from%2520SFT%2520suffer%2520from%2520compounding%2520errors%252C%2520struggling%2520to%2520recover%2520from%2520out-of-distribution%2520states%252C%2520and%2520%2528ii%2529%2520Reinforcement%2520Fine-Tuning%2520%2528RFT%2529%2520methods%2520e.g.%2520GRPO%2520are%2520bottlenecked%2520by%2520sparse%2520outcome%2520rewards.%2520Their%2520binary%2520feedback%2520fails%2520to%2520assign%2520credit%2520to%2520individual%2520steps%252C%2520leading%2520to%2520gradient%2520signal%2520collapse%2520in%2520failure%2520dominant%2520batches.%2520To%2520address%2520these%2520challenges%252C%2520we%2520introduce%2520Step-Aware%2520Contrastive%2520Alignment%2520%2528SACA%2529%252C%2520a%2520framework%2520designed%2520to%2520extract%2520dense%2520supervision%2520from%2520imperfect%2520trajectories.%2520At%2520its%2520core%252C%2520the%2520Perception-Grounded%2520Step-Aware%2520auditor%2520evaluates%2520progress%2520step-by-step%252C%2520disentangling%2520failed%2520trajectories%2520into%2520valid%2520prefixes%2520and%2520exact%2520divergence%2520points.%2520Leveraging%2520these%2520signals%252C%2520Scenario-Conditioned%2520Group%2520Construction%2520mechanism%2520dynamically%2520routes%2520batches%2520to%2520specialized%2520resampling%2520and%2520optimization%2520strategies.%2520Extensive%2520experiments%2520on%2520VLN-CE%2520benchmarks%2520demonstrate%2520that%2520SACA%2520achieves%2520state-of-the-art%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09740v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Let%27s%20Reward%20Step-by-Step%3A%20Step-Aware%20Contrastive%20Alignment%20for%20Vision-Language%20Navigation%20in%20Continuous%20Environments&entry.906535625=Haoyuan%20Li%20and%20Rui%20Liu%20and%20Hehe%20Fan%20and%20Yi%20Yang&entry.1292438233=Vision-Language%20Navigation%20in%20Continuous%20Environments%20%28VLN-CE%29%20requires%20agents%20to%20learn%20complex%20reasoning%20from%20long-horizon%20human%20interactions.%20While%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29%20have%20driven%20recent%20progress%2C%20current%20training%20paradigms%20struggle%20to%20balance%20generalization%20capability%2C%20error%20recovery%20and%20training%20stability.%20Specifically%2C%20%28i%29%20policies%20derived%20from%20SFT%20suffer%20from%20compounding%20errors%2C%20struggling%20to%20recover%20from%20out-of-distribution%20states%2C%20and%20%28ii%29%20Reinforcement%20Fine-Tuning%20%28RFT%29%20methods%20e.g.%20GRPO%20are%20bottlenecked%20by%20sparse%20outcome%20rewards.%20Their%20binary%20feedback%20fails%20to%20assign%20credit%20to%20individual%20steps%2C%20 {"title": "Improving clustering quality evaluation in noisy Gaussian mixtures", "author": "Renato Cordeiro de Amorim and Vladimir Makarenkov", "abstract": "Clustering is a well-established technique in machine learning and data analysis, widely used across various domains. Cluster validity indices, such as the Average Silhouette Width, Calinski-Harabasz, and Davies-Bouldin indices, play a crucial role in assessing clustering quality when external ground truth labels are unavailable. However, these measures can be affected by different degrees of feature relevance, potentially leading to unreliable evaluations in high-dimensional or noisy data sets.\n  We introduce a theoretically grounded Feature Importance Rescaling (FIR) method that enhances the quality of clustering validation by adjusting feature contributions based on their dispersion. It attenuates noise features, clarifies clustering compactness and separation, and thereby aligns clustering validation more closely with the ground truth. Through extensive experiments on synthetic data sets under different configurations and a case study on real-world data, we demonstrate that FIR consistently improves the correlation between the values of cluster validity indices and the ground truth, particularly in settings with noisy or irrelevant features.\n  The results show that FIR increases the robustness of clustering evaluation, reduces variability in performance across different data sets, and remains effective even when clusters exhibit significant overlap. These findings highlight the potential of FIR as a valuable enhancement of clustering validation, making it a practical tool for unsupervised learning tasks where labelled data is unavailable.", "link": "http://arxiv.org/abs/2503.00379v3", "date": "2026-03-10", "relevancy": 2.2508, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4705}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4497}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4303}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improving%20clustering%20quality%20evaluation%20in%20noisy%20Gaussian%20mixtures&body=Title%3A%20Improving%20clustering%20quality%20evaluation%20in%20noisy%20Gaussian%20mixtures%0AAuthor%3A%20Renato%20Cordeiro%20de%20Amorim%20and%20Vladimir%20Makarenkov%0AAbstract%3A%20Clustering%20is%20a%20well-established%20technique%20in%20machine%20learning%20and%20data%20analysis%2C%20widely%20used%20across%20various%20domains.%20Cluster%20validity%20indices%2C%20such%20as%20the%20Average%20Silhouette%20Width%2C%20Calinski-Harabasz%2C%20and%20Davies-Bouldin%20indices%2C%20play%20a%20crucial%20role%20in%20assessing%20clustering%20quality%20when%20external%20ground%20truth%20labels%20are%20unavailable.%20However%2C%20these%20measures%20can%20be%20affected%20by%20different%20degrees%20of%20feature%20relevance%2C%20potentially%20leading%20to%20unreliable%20evaluations%20in%20high-dimensional%20or%20noisy%20data%20sets.%0A%20%20We%20introduce%20a%20theoretically%20grounded%20Feature%20Importance%20Rescaling%20%28FIR%29%20method%20that%20enhances%20the%20quality%20of%20clustering%20validation%20by%20adjusting%20feature%20contributions%20based%20on%20their%20dispersion.%20It%20attenuates%20noise%20features%2C%20clarifies%20clustering%20compactness%20and%20separation%2C%20and%20thereby%20aligns%20clustering%20validation%20more%20closely%20with%20the%20ground%20truth.%20Through%20extensive%20experiments%20on%20synthetic%20data%20sets%20under%20different%20configurations%20and%20a%20case%20study%20on%20real-world%20data%2C%20we%20demonstrate%20that%20FIR%20consistently%20improves%20the%20correlation%20between%20the%20values%20of%20cluster%20validity%20indices%20and%20the%20ground%20truth%2C%20particularly%20in%20settings%20with%20noisy%20or%20irrelevant%20features.%0A%20%20The%20results%20show%20that%20FIR%20increases%20the%20robustness%20of%20clustering%20evaluation%2C%20reduces%20variability%20in%20performance%20across%20different%20data%20sets%2C%20and%20remains%20effective%20even%20when%20clusters%20exhibit%20significant%20overlap.%20These%20findings%20highlight%20the%20potential%20of%20FIR%20as%20a%20valuable%20enhancement%20of%20clustering%20validation%2C%20making%20it%20a%20practical%20tool%20for%20unsupervised%20learning%20tasks%20where%20labelled%20data%20is%20unavailable.%0ALink%3A%20http%3A//arxiv.org/abs/2503.00379v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproving%2520clustering%2520quality%2520evaluation%2520in%2520noisy%2520Gaussian%2520mixtures%26entry.906535625%3DRenato%2520Cordeiro%2520de%2520Amorim%2520and%2520Vladimir%2520Makarenkov%26entry.1292438233%3DClustering%2520is%2520a%2520well-established%2520technique%2520in%2520machine%2520learning%2520and%2520data%2520analysis%252C%2520widely%2520used%2520across%2520various%2520domains.%2520Cluster%2520validity%2520indices%252C%2520such%2520as%2520the%2520Average%2520Silhouette%2520Width%252C%2520Calinski-Harabasz%252C%2520and%2520Davies-Bouldin%2520indices%252C%2520play%2520a%2520crucial%2520role%2520in%2520assessing%2520clustering%2520quality%2520when%2520external%2520ground%2520truth%2520labels%2520are%2520unavailable.%2520However%252C%2520these%2520measures%2520can%2520be%2520affected%2520by%2520different%2520degrees%2520of%2520feature%2520relevance%252C%2520potentially%2520leading%2520to%2520unreliable%2520evaluations%2520in%2520high-dimensional%2520or%2520noisy%2520data%2520sets.%250A%2520%2520We%2520introduce%2520a%2520theor ervised%20learning%20tasks%20where%20labelled%20data%20is%20unavailable.&entry.1838667208=http%3A//arxiv.org/abs/2503.00379v3&entry.124074799=Read"},
{"title": "Singing Syllabi with Virtual Avatars: Enhancing Student Engagement Through AI-Generated Music and Digital Embodiment", "author": "Xinxing Wu", "abstract": "In practical teaching, we observe that few students thoroughly read or fully comprehend the information provided in traditional, text-based course syllabi. As a result, essential details, such as course policies and learning outcomes, are frequently overlooked. To address this challenge, in this paper, we propose a novel approach leveraging AI-generated singing and virtual avatars to present syllabi in a format that is more visually appealing, engaging, and memorable. Especially, we leveraged the open-source tool, HeyGem, to transform textual syllabi into audiovisual presentations, in which digital avatars perform the syllabus content as songs. The proposed approach aims to stimulate students' curiosity, foster emotional connection, and enhance retention of critical course information. Student feedback indicated that AI-sung syllabi significantly improved awareness and recall of key course information.", "link": "http://arxiv.org/abs/2508.11872v2", "date": "2026-03-10", "relevancy": 2.2444, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4831}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4342}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.4293}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Singing%20Syllabi%20with%20Virtual%20Avatars%3A%20Enhancing%20Student%20Engagement%20Through%20AI-Generated%20Music%20and%20Digital%20Embodiment&body=Title%3A%20Singing%20Syllabi%20with%20Virtual%20Avatars%3A%20Enhancing%20Student%20Engagement%20Through%20AI-Generated%20Music%20and%20Digital%20Embodiment%0AAuthor%3A%20 g%2520outcomes%252C%2520are%2520frequently%2520overlooked.%2520To%2520address%2520this%2520challenge%252C%2520in%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520approach%2520leveraging%2520AI-generated%2520singing%2520and%2520virtual%2520avatars%2520to%2520present%2520syllabi%2520in%2520a%2520format%2520that%2520is%2520more%2520visually%2520appealing%252C%2520engaging%252C%2520and%2520memorable.%2520Especially%252C%2520we%2520leveraged%2520the%2520open-source%2520tool%252C%2520HeyGem%252C%2520to%2520transform%2520textual%2520syllabi%2520into%2520audiovisual%2520presentations%252C%2520in%2520which%2520digital%2520avatars%2520perform%2520the%2520syllabus%2520content%2520as%2520songs.%2520The%2520proposed%2520approach%2520aims%2520to%2520stimulate%2520students%2527%2520curiosity%252C%2520foster%2520emotional%2520connection%252C%2520and%2520enhance%2520retention%2520of%2520critical%2520course%2520information.%2520Student%2520feedback%2520indicated%2520that%2520AI-sung%2520syllabi%2520significantly%2520improved%2520awareness%2520and%2520recall%2520of%2520key%2520course%2520information.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.11872v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Singing%20Syllabi%20with%20Virtual%20Avatars%3A%20Enhancing%20Student%20Engagement%20Through%20AI-Generated%20Music%20and%20Digital%20Embodiment&entry.906535625=Xinxing%20Wu&entry.1292438233=In%20practical%20teaching%2C%20we%20observe%20that%20few%20students%20thoroughly%20read%20or%20fully%20comprehend%20the%20information%20provided%20in%20traditional%2C%20text-based%20course%20syllabi.%20As%20a%20result%2C%20essential%20details%2C%20such%20as%20course%20policies%20and%20learning%20outcomes%2C%20are%20frequently%20overlooked.%20To%20address%20this%20challenge%2C%20in%20this%20paper%2C%20we%20propose%20a%20novel%20approach%20leveraging%20AI-generated%20singing%20and% {"title": "Repulsive Monte Carlo on the sphere for the sliced Wasserstein distance", "author": "Vladimir Petrovic and R\u00e9mi Bardenet and Agn\u00e8s Desolneux", "abstract": "In this paper, we consider the problem of computing the integral of a function on the unit sphere, in any dimension, using Monte Carlo methods. Although the methods we present are general, our guiding thread is the sliced Wasserstein distance between two measures on $\\mathbb{R}^d$, which is precisely an integral on the $d$-dimensional sphere. The sliced Wasserstein distance (SW) has gained momentum in machine learning either as a proxy to the less computationally tractable Wasserstein distance, or as a distance in its own right, due in particular to its built-in alleviation of the curse of dimensionality. There has been recent numerical benchmarks of quadratures for the sliced Wasserstein, and our viewpoint differs in that we concentrate on quadratures where the nodes are repulsive, i.e. negatively dependent. Indeed, negative dependence can bring variance reduction when the quadrature is adapted to the integration task. Our first contribution is to extract and motivate quadratures from the recent literature on determinantal point processes (DPPs) and repelled point processes, as well as repulsive quadratures from the literature specific to the sliced Wasserstein distance. We then numerically benchmark these quadratures. Moreover, we analyze the variance of the UnifOrtho estimator, an orthogonal Monte Carlo estimator. Our analysis sheds light on UnifOrtho's success for the estimation of the sliced Wasserstein in large dimensions, as well as counterexamples from the literature. Our final recommendation for the computation of the sliced Wasserstein distance is to use randomized quasi-Monte Carlo in low dimensions and UnifOrtho in large dimensions. DPP-based quadratures only shine when quasi-Monte Carlo also does, while repelled quadratures show moderate variance reduction in general, but more theoretical effort is needed to make them robust.", "link": "http://arxiv.org/abs/2509.10166v2", "date": "2026-03-10", "relevancy": 2.2442, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4696}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4396}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4372}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Repulsive%20Monte%20Carlo%20on%20the%20sphere%20for%20the%20sliced%20Wasserstein%20distance&body=Title%3A%20Repulsive%20Monte%20Carlo%20on%20the%20sphere%20for%20the%20sliced%20Wasserstein%20distance%0AAuthor%3A%20Vladimir%20Petrovic%20and%20R%C3%A9mi%20Bardenet%20and%20Agn%C3%A8s%20Desolneux%0AAbstract%3A%20In%20this%20paper%2C%20we%20consider%20the%20problem%20of%20computing%20the%20integral%20of%20a%20function%20on%20the%20unit%20sphere%2C%20in%20any%20dimension%2C%20using%20Monte%20Carlo%20methods.%20Although%20the%20methods%20we%20present%20are%20general%2C%20our%20guiding%20thread%20is%20the%20sliced%20Wasserstein%20distance%20between%20two%20measures%20on%20%24%5Cmathbb%7BR%7D%5Ed%24%2C%20which%20is%20precisely%20an%20integral%20on%20the%20%24d%24-dimensional%20sphere.%20The%20sliced%20Wasserstein%20distance%20%28SW%29%20has%20gained%20momentum%20in%20machine%20learning%20either%20as%20a%20proxy%20to%20the%20less%20computationally%20tractable%20Wasserstein%20distance%2C%20or%20as%20a%20distance%20in%20its%20own%20right%2C%20due%20in%20particular%20to%20its%20built-in%20alleviation%20of%20the%20curse%20of%20dimensionality.%20There%20has%20been%20recent%20numerical%20benchmarks%20of%20quadratures%20for%20the%20sliced%20Wasserstein%2C%20and%20our%20viewpoint%20differs%20in%20that%20we%20concentrate%20on%20quadratures%20where%20the%20nodes%20are%20repulsive%2C%20i.e.%20negatively%20dependent.%20Indeed%2C%20negative%20dependence%20can%20bring%20variance%20reduction%20when%20the%20quadrature%20is%20adapted%20to%20the%20integration%20task.%20Our%20first%20contribution%20is%20to%20extract%20and%20motivate%20quadratures%20from%20the%20recent%20literature%20on%20determinantal%20point%20processes%20%28DPPs%29%20and%20repelled%20point%20processes%2C%20as%20well%20as%20repulsive%20quadratures%20from%20the%20literature%20specific%20to%20the%20sliced%20Wasserstein%20distance.%20We%20then%20numerically%20benchmark%20these%20quadratures.%20Moreover%2C%20we%20analyze%20the%20variance%20of%20the%20UnifOrtho%20estimator%2C%20an%20orthogonal%20Monte%20Carlo%20estimator.%20Our%20analysis%20sheds%20light%20on%20UnifOrtho%27s%20success%20for%20the%20estimation%20of%20the%20sliced%20Wasserstein%20in%20large%20dimensions%2C%20as%20well%20as%20counterexamples%20from%20the%20literature.%20Our%20final%20recommendation%20for%20the%20computation%20of%20the%20sliced%20Wasserstein%20distance%20is%20to%20use%20randomized%20quasi-Monte%20Carlo%20in%20low%20dimensions%20and%20UnifOrtho%20in%20large%20dimensions.%20DPP-based%20quadratures%20only%20shine%20when%20quasi-Monte%20Carlo%20also%20does%2C%20while%20repelled%20quadratures%20show%20moderate%20variance%20reduction%20in%20general%2C%20but%20more%20theoretical%20effort%20is%20needed%20to%20make%20them%20robust.%0ALink%3A%20http%3A//arxiv.org/abs/2509.10166v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepulsive%2520Monte%2520Carlo%2520on%2520the%2520sphere%2520for%2520the%2520sliced%2520Wasserstein%2520distance%26entry.906535625%3DVladimir%2520Petrovic%2520and%2520R%25C3%25A9mi%2520Bardenet%2520and%2520Agn%25C3%25A8s%2520Desolneux%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520consider%2520the%2520problem%2520of%25 {"title": "TopoOR: A Unified Topological Scene Representation for the Operating Room", "author": "Tony Danjun Wang and Ka Young Kim and Tolga Birdal and Nassir Navab and Lennart Bastian", "abstract": "Surgical Scene Graphs abstract the complexity of surgical operating rooms (OR) into a structure of entities and their relations, but existing paradigms suffer from strictly dyadic structural limitations. Frameworks that predominantly rely on pairwise message passing or tokenized sequences flatten the manifold geometry inherent to relational structures and lose structure in the process. We introduce TopoOR, a new paradigm that models multimodal operating rooms as a higher-order structure, innately preserving pairwise and group relationships. By lifting interactions between entities into higher-order topological cells, TopoOR natively models complex dynamics and multimodality present in the OR. This topological representation subsumes traditional scene graphs, thereby offering strictly greater expressivity. We also propose a higher-order attention mechanism that explicitly preserves manifold structure and modality-specific features throughout hierarchical relational attention. In this way, we circumvent combining 3D geometry, audio, and robot kinematics into a single joint latent representation, preserving the precise multimodal structure required for safety-critical reasoning, unlike existing methods. Extensive experiments demonstrate that our approach outperforms traditional graph and LLM-based baselines across sterility breach detection, robot phase prediction, and next-action anticipation", "link": "http://arxiv.org/abs/2603.09466v1", "date": "2026-03-10", "relevancy": 2.2437, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http: {"title": "Towards a Neural Debugger for Python", "author": "Maximilian Beck and Jonas Gehring and Jannik Kossen and Gabriel Synnaeve", "abstract": "Training large language models (LLMs) on Python execution traces grounds them in code execution and enables the line-by-line execution prediction of whole Python programs, effectively turning them into neural interpreters (FAIR CodeGen Team et al., 2025). However, developers rarely execute programs step by step; instead, they use debuggers to stop execution at certain breakpoints and step through relevant portions only while inspecting or modifying program variables. Existing neural interpreter approaches lack such interactive control. To address this limitation, we introduce neural debuggers: language models that emulate traditional debuggers, supporting operations such as stepping into, over, or out of functions, as well as setting breakpoints at specific source lines. We show that neural debuggers -- obtained via fine-tuning large LLMs or pre-training smaller models from scratch -- can reliably model both forward execution (predicting future states and outputs) and inverse execution (inferring prior states or inputs) conditioned on debugger actions. Evaluated on CruxEval, our models achieve strong performance on both output and input prediction tasks, demonstrating robust conditional execution modeling. Our work takes first steps towards future agentic coding systems in which neural debuggers serve as a world model for simulated debugging environments, providing execution feedback or enabling agents to interact with real debugging tools. This capability lays the foundation for more powerful code generation, program understanding, and automated debugging.", "link": "http://arxiv.org/abs/2603.09951v1", "date": "2026-03-10", "relevancy": 2.2417, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4376}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20a%20Neural%20Debugger%20for%20Python&body=Title%3A%20Towards%20a%20Neural%20Debugger%20for%20Python%0AAuthor%3A%20Maximilian%20Beck%20and%20Jonas%20Gehring%20and%20Jannik%20Kossen%20and%20Gabriel%20Synnaeve%0AAbstract%3A%20Training%20large%20language%20models%20%28LLMs%29%20on%20Python%20execution%20traces%20grounds%20them%20in%20code%20execution%20and%20enables%20the%20line-by-line%20execution%20prediction%20of%20whole%20Python%20programs%2C%20effectively%20turning%20them%20into%20neural%20interpreters%20%28FAIR%20CodeGen%20Team%20et%20al.%2C%202025%29.%20However%2C%20developers%20rarely%20execute%20programs%20step%20by%20step%3B%20instead%2C%20they%20use%20debuggers%20to%20stop%20execution%20at%20certain%20breakpoints%20and%20step%20through%20relevant%20portions%20only%20while%20inspecting%20or%20modifying%20program%20variables.%20Existing%20neural%20interpreter%20approaches%20lack%20such%20interactive%20control.%20To%20address%20this%20limitation%2C%20we%20introduce%20neural%20debuggers%3A%20language%20models%20that%20emulate%20traditional%20debuggers%2C%20supporting%20operations%20such%20as%20stepping%20into%2C%20over%2C%20or%20out%20of%20functions%2C%20as%20well%20as%20setting%20breakpoints%20at%20specific%20source%20lines.%20We%20show%20that%20neural%20debuggers%20--%20obtained%20via%20fine-tuning%20large%20LLMs%20or%20pre-training%20smaller%20models%20from%20scratch%20--%20can%20reliably%20model%20both%20forward%20execution%20%28predicting%20future%20states%20and%20outputs%29%20and%20inverse%20execution%20%28inferring%20prior%20states%20or%20inputs%29%20conditioned%20on%20debugger%20actions.%20Evaluated%20on%20CruxEval%2C%20our%20models%20achieve%20strong%20performance%20on%20both%20output%20and%20input%20prediction%20tasks%2C%20demonstrating%20robust%20conditional%20execution%20modeling.%20Our%20work%20takes%20first%20steps%20towards%20future%20agentic%20coding%20systems%20in%20which%20neural%20debuggers%20serve%20as%20a%20world%20model%20for%20simulated%20debugging%20environments%2C%20providing%20execution%20feedback%20or%20enabling%20agents%20to%20interact%20with%20real%20debugging%20tools.%20This%20capability%20lays%20the%20foundation%20for%20more%20powerful%20code%20generation%2C%20program%20understanding%2C%20and%20automated%20debugging.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09951v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520a%2520Neural%2520Debugger%2520for%2520Python%26entry.906535625%3DMaximilian%2520Beck%2520and%2520Jonas%2520Gehring%2520and%2520Jannik%2520Kossen%2520and%2520Gabriel%2520Synnaeve%26entry.1292438233%3DTraining%2520large%2520language%2520models%2520%2528LLMs%2529%2520on%2520Python%2520execution%2520traces%2520grounds%2520them%2520in%2520code%2520execution%2520and%2520enables%2520the%2520line-by-line%2520execution%2520prediction%2520of%2520whole%2520Python%2520programs%252C%2520effectively%2520turning%2520them%2520into%2520neural%2520interpreters%2520%2528FAIR%2520CodeGen%2520Team%2520et%2520al.%252C%25202025%2529.%2520However%252C%2520developers%2520rarely%2520execute%2520programs%2520step%2520by%2520step%253B%2520instead%252C%2520they%2520use%2520debuggers%2520to%2520stop%2520execution%2520at%2520certain%2520breakpoints%2520and%2520step%2520through%2520relevant%2520portions%2520only%2520while%2520inspecting%2520or%2520modifying%2520program%2520variables.%2520Existing%2520neural%2520interpreter%2520approaches%2520lack%2520such%2520interactive%2520control.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520neural%2520 {"title": "Ego: Embedding-Guided Personalization of Vision-Language Models", "author": "Soroush Seifi and Simon Gardier and Vaggelis Dorovatas and Daniel Olmeda Reino and Rahaf Aljundi", "abstract": "AI assistants that support humans in daily life are becoming increasingly feasible, driven by the rapid advancements in multimodal language models. A key challenge lies in overcoming the generic nature of these models to deliver personalized experiences. Existing approaches to personalizing large vision language models often rely on additional training stages, which limit generality and scalability, or on engineered pipelines with external pre-trained modules, which hinder deployment efficiency. In this work, we propose an efficient personalization method that leverages the model's inherent ability to capture personalized concepts. Specifically, we extract visual tokens that predominantly represent the target concept by utilizing the model's internal attention mechanisms. These tokens serve as a memory of that specific concept, enabling the model to recall and describe it when it appears in test images. We conduct a comprehensive and unified evaluation of our approach and SOTA methods across various personalization settings including single-concept, multi-concept, and video personalization, demonstrating strong performance gains with minimal personalization overhead.", "link": "http://arxiv.org/abs/2603.09771v1", "date": "2026-03-10", "relevancy": 2.2405, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5851}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5685}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?sub uding%2520single-concept%252C%2520multi-concept%252C%2520and%2520video%2520personalization%252C%2520demonstrating%2520strong%2520performance%2520gains%2520with%2520minimal%2520personalization%2520overhead.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09771v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Ego%3A%20Embedding-Guided%20Personalization%20of%20Vision-Language%20Models&entry.906535625=Soroush%20Seifi%20and%20Simon%20Gardier%20and%20Vaggelis%20Dorovatas%20and%20Daniel%20Olmeda%20Reino%20and%20Rahaf%20Aljundi&entry.1292438233=AI%20assistants%20that%20support%20humans%20in%20daily%20life%20are%20becoming%20increasingly%20feasible%2C%20driven%20by%20the%20rapid%20advancements%20in%20multimodal%20language%20models.%20A%20key%20challenge%20lies%20in%20overcoming%20the%20generic%20nature%20of%20these%20models%20to%20deliver%20personalized%20experiences.%20Existing%20approaches%20to%20personalizing%20large%20vision%20language%20models%20often%20rely%20on%20additional%20training%20stages%2C%20which%20limit%20generality%20and%20scalability%2C%20or%20on%20engineered%20pipelines%20with%20external%20pre-trained%20modules%2C%20which%20hinder%20deployment%20efficiency.%20In%20this%20work%2C%20we%20propose%20an%20efficient%20personalization%20method%20that%20leverages%20the%20model%27s%20inherent%20ability%20to%20capture%20personalized%20concepts.%20Specifically%2C%20we%20extract%20visual%20tokens%20that%20predominantly%20represent%20the%20target%20concept%20by%20utilizing%20the%20model%27s%20internal%20attention%20mechanisms.%20These%20tokens%20serve%20as%20a%20memory%20of%20that%20specific%20concept%2C%20enabling%20the%20model%20to%20recall%20and%20describe%20it%20when%20it%20appears%20in%20test%20images.%20We%20conduct%20a%20comprehensive%20and%20unified%20evaluation%20of%20our%20approach%20and%20SOTA%20methods%20across%20various%20personalization%20settings% {"title": "Learning responsibility allocations for multi-agent interactions: A differentiable optimization approach with control barrier functions", "author": "Isaac Remy and David Fridovich-Keil and Karen Leung", "abstract": "From autonomous driving to package delivery, ensuring safe yet efficient multi-agent interaction is challenging as the interaction dynamics are influenced by hard-to-model factors such as social norms and contextual cues. Understanding these influences can aid in the design and evaluation of socially-aware autonomous agents whose behaviors are aligned with human values. In this work, we seek to codify factors governing safe multi-agent interactions via the lens of responsibility, i.e., an agent's willingness to deviate from their desired control to accommodate safe interaction with others. Specifically, we propose a data-driven modeling approach based on control barrier functions and differentiable optimization that efficiently learns agents' responsibility allocation from data. We demonstrate on synthetic and real-world datasets that we can obtain an interpretable and quantitative understanding of how much agents adjust their behavior to ensure the safety of others given their current environment.", "link": "http://arxiv.org/abs/2410.07409v2", "date": "2026-03-10", "relevancy": 2.2363, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.6094}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5665}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5058}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20responsibility%20allocations%20for%20multi-agent%20interactions%3A% {"title": "NaviGait: Navigating Dynamically Feasible Gait Libraries using Deep Reinforcement Learning", "author": "Neil Janwani and Varun Madabushi and Maegan Tucker", "abstract": "Reinforcement learning (RL) has emerged as a powerful method to learn robust control policies for bipedal locomotion. Yet, it can be difficult to tune desired robot behaviors due to unintuitive and complex reward design. In comparison, trajectory optimization-based methods offer more tuneable, interpretable, and mathematically grounded motion plans for high-dimensional legged systems. However, these methods often remain brittle to real-world disturbances like external perturbations. In this work, we present NaviGait, a hierarchical framework that combines the structure of trajectory optimization with the adaptability of RL for robust and intuitive locomotion control. NaviGait leverages RL to synthesize new motions by selecting, minimally morphing, and stabilizing gaits taken from an offline-generated gait library. NaviGait results in walking policies that match the reference motion well while maintaining robustness comparable to other locomotion controllers. Additionally, the structure imposed by NaviGait drastically simplifies the RL reward composition. Our experimental results demonstrate that NaviGait enables faster training compared to conventional and imitation-based RL, and produces motions that remain closest to the original reference. Overall, by decoupling high-level motion generation from low-level correction, NaviGait offers a more scalable and generalizable approach for achieving dynamic and robust locomotion. Videos and the full framework are publicly available at https://dynamicmobility.github.io/navigait/", "link": "http://arxiv.org/abs/2510.11542v2", "date": "2026-03-10", "relevancy": 2.2343, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5689}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5674}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NaviGait%3A%20Navigating%20Dynamically%20Feasible%20Gait%20Libraries%20using%20Deep%20Reinforcement%20Learning&body=Title%3A%20NaviGait%3A%20Navigating%20Dynamically%20Feasible%20Gait%20Libraries%20using%20Deep%20Reinforcement%20Learning%0AAuthor%3A%20Neil%20Janwani%20and%20Varun%20Madabushi%20and%20Maegan%20Tucker%0AAbstract%3A%20Reinforcement%20learning%20%28RL%29%20has%20emerged%20as%20a%20powerful%20method%20to%20learn%20robust%20control%20policies%20for%20bipedal%20locomotion.%20Yet%2C%20it%20can%20be%20difficult%20to%20tune%20desired%20robot%20behaviors%20due%20to%20unintuitive%20and%20complex%20reward%20design.%20In%20comparison%2C%20trajectory%20optimization-based%20methods%20offer%20more%20tuneable%2C%20interpretable%2C%20and%20mathematically%20grounded%20motion%20plans%20for%20high-dimensional%20legged%20systems.%20However%2C%20these%20methods%20often%20remain%20brittle%20to%20real-world%20disturbances%20like%20external%20perturbations.%20In%20this%20work%2C%20we%20present%20NaviGait%2C%20a%20hierarchical%20framework%20that%20combines%20the%20structure%20of%20trajectory%20optimization%20with%20the%20adaptability%20of%20RL%20for%20robust%20and%20intuitive%20locomotion%20control.%20NaviGait%20leverages%20RL%20to%20synthesize%20new%20motions%20by%20selecting%2C%20minimally%20morphing%2C%20and%20stabilizing%20gaits%20taken%20from%20an%20offline-generated%20gait%20library.%20NaviGait%20results%20in%20walking%20policies%20that%20match%20the%20reference%20motion%20well%20while%20maintaining%20robustness%20comparable%20to%20other%20locomotion%20controllers.%20Additionally%2C%20the%20structure%20imposed%20by%20NaviGait%20drastically%20simplifies%20the%20RL%20reward%20composition.%20Our%20experimental%20results%20demonstrate%20that%20NaviGait%20enables%20faster%20training%20compared%20to%20conventional%20and%20imitation-based%20RL%2C%20and%20produces%20motions%20that%20remain%20closest%20to%20the%20original%20reference.%20Overall%2C%20by%20decoupling%20high-level%20motion%20generation%20from%20low-level%20correction%2C%20NaviGait%20offers%20a%20more%20scalable%20and%20generalizable%20approach%20for%20achieving%20dynamic%20and%20robust%20locomotion.%20Videos%20and%20the%20full%20framework%20are%20publicly%20available%20at%20https%3A//dynamicmobility.github.io/navigait/%0ALink%3A%20http%3A//arxiv.org/abs/2510.11542v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNaviGait%253A%2520Navigating%2520Dynamically%2520Feasible%2520Gait%2520Libraries%2520using%2520Deep%2520Reinforcement%2520Learning%26entry.906535625%3DNeil%2520Janwani%2520and%2520Varun%2520Madabushi%2520and%2520Maegan%2520Tucker%26entry.1292438233%3DReinforcement%2520learning%2520%2528RL%2529%2520has%2520emerged%2520as%2520a%2520powerful%2520method%2520to%2520learn%2520robust%2520control%2520policies%2520for%2520bipedal%2520locomotion.%2520Yet%252C%2520it%2520can%2520be%2520difficult%2520to%2520tune%2520desired%2520robot%2520behaviors%2520due%2520to%2520unintuitive%2520and%2520complex%2520reward%2520design.%2520In%2520comparison%252C%2520trajectory%2520optimization-based%2520methods%2520offer%2520more%2520tuneable%252C%2520interpretable%252C%2520and%2520mathematically%2520grounded%2520motion%2520plans%2520for%2520high-dimensional%2520legged%2520systems.%2520However%252C%2520these%2520methods%2520often%2520remain%2520brittle%2520to%2520real-world%2520disturbances%2520like%2520external%2520perturbations.%2520In%2520this%2520work%252C%2520we%2520present%2520NaviGait%252C%2520a%2520hierarchical%2520framewo 99=Read"},
{"title": "A Survey on Decentralized Federated Learning", "author": "Edoardo Gabrielli and Anthony Di Pietro and Dario Fenoglio and Giovanni Pica and Gabriele Tolomei", "abstract": "Federated learning (FL) enables collaborative training without pooling raw data, but standard FL relies on a central coordinator, which introduces a single point of failure and concentrates trust in the orchestration infrastructure. Decentralized federated learning (DFL) removes the coordinator and replaces client-server orchestration with peer-to-peer coordination, making learning dynamics topology-dependent and reshaping the associated security, privacy, and systems trade-offs. This survey systematically reviews DFL methods from 2018 through early 2026 and organizes them into two architectural families: traditional distributed FL and blockchain-based FL. We then propose a unified, challenge-driven taxonomy that maps both families to the core bottlenecks they primarily address, and we summarize prevailing evaluation practices and their limitations, exposing gaps in the literature. Finally, we distill lessons learned and outline research directions, emphasizing topology-aware threat models, privacy notions that reflect decentralized exposure, incentive mechanisms robust to manipulation, and the need to explicitly define whether the objective is a single global model or personalized solutions in decentralized settings.", "link": "http://arxiv.org/abs/2308.04604v2", "date": "2026-03-10", "relevancy": 2.234, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4533}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4504}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4367}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Survey%20on%20Decentralized%20Federated%20Learning&body=Title%3A%20A%20Survey%20on%20Decentralized%20Federated%20Learning%0AAuthor%3A%20Edoardo%20Gabrielli%20and%20Anthony%20Di%20Pietro%20and%20Dario%20Fenoglio%20and%20Giovanni%20Pica%20and%20Gabriele%20Tolomei%0AAbstract%3A%20Federated%20learning%20%28FL%29%20enables%20collaborative%20training%20without%20pooling%20raw%20data%2C%20but%20standard%20FL%20relies%20on%20a%20central%20coordinator%2C%20which%20introduces%20a%20single%20point%20of%20failure%20and%20concentrates%20trust%20in%20the%20orchestration%20infrastructure.%20Decentralized%20federated%20learning%20%28DFL%29%20removes%20the%20coordinator%20and%20replaces%20client-server%20orchestration%20with%20peer-to-peer%20coordination%2C%20making%20learning%20dynamics%20topology-dependent%20and%20reshaping%20the%20associated%20security%2C%20privacy%2C%20and%20systems%20trade-offs.%20This%20survey%20systematically%20reviews%20DFL%20methods%20from%202018%20through%20early%202026%20and%20organizes%20them%20into%20two%20architectural%20families%3A%20traditional%20distributed%20FL%20and%20blockchain-based%20FL.%20We%20then%20propose%20a%20unified%2C%20challenge-driven%20taxonomy%20that%20maps%20both%20families%20to%20the%20core%20bottlenecks%20they%20primarily%20address%2C%20and%20we%20summarize%20prevailing%20evaluation%20practices%20and%20their%20limitations%2C%20exposing%20gaps%20in%20the%20literature.%20Finally%2C%20we%20distill%20lessons%20learned%20and%20outline%20research%20directions%2C%20emphasizing%20topology-aware%20threat%20models%2C%20privacy%20notions%20that%20reflect%20decentralized%20exposure%2C%20incentive%20mechanisms%20robust%20to%20manipulation%2C%20and%20the%20need%20to%20explicitly%20define%20whether%20the%20objective%20is%20a%20single%20global%20model%20or%20personalized%20solutions%20in%20decentralized%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2308.0460 %2520that%2520reflect%2520decentralized%2520exposure%252C%2520incentive%2520mechanisms%2520robust%2520to%2520manipulation%252C%2520and%2520the%2520need%2520to%2520explicitly%2520define%2520whether%2520the%2520objective%2520is%2520a%2520single%2520global%2520model%2520or%2520personalized%2520solutions%2520in%2520decentralized%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2308.04604v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Survey%20on%20Decentralized%20Federated%20Learning&entry.906535625=Edoardo%20Gabrielli%20and%20Anthony%20Di%20Pietro%20and%20Dario%20Fenoglio%20and%20Giovanni%20Pica%20and%20Gabriele%20Tolomei&entry.1292438233=Federated%20learning%20%28FL%29%20enables%20collaborative%20training%20without%20pooling%20raw%20data%2C%20but%20standard%20FL%20relies%20on%20a%20central%20coordinator%2C%20which%20introduces%20a%20single%20point%20of%20failure%20and%20concentrates%20trust%20in%20the%20orchestration%20infrastructure.%20Decentralized%20federated%20learning%20%28DFL%29%20removes%20the%20coordinator%20and%20replaces%20client-server%20orchestration%20with%20peer-to-peer%20coordination%2C%20making%20learning%20dynamics%20topology-dependent%20and%20reshaping%20the%20associated%20security%2C%20privacy%2C%20and%20systems%20trade-offs.%20This%20survey%20systematically%20reviews%20DFL%20methods%20from%202018%20through%20early%202026%20and%20organizes%20them%20into%20two%20architectural%20families%3A%20traditional%20distributed%20FL%20and%20blockchain-based%20FL.%20We%20then%20propose%20a%20unified%2C%20challenge-driven%20taxonomy%20that%20maps%20both%20families%20to%20the%20core%20bottlenecks%20they%20primarily%20address%2C%20and%20we%20summarize%20prevailing%20evaluation%20practices%20and%20their%20limitations%2C%20exposing%20gaps%20in%20the%20literature.%20Finally%2C%20we%20distill%20lessons%20learned%20and%20outline%20research%20directi {"title": "Semi-Supervised Biomedical Image Segmentation via Diffusion Models and Teacher-Student Co-Training", "author": "Luca Ciampi and Gabriele Lagani and Giuseppe Amato and Fabrizio Falchi", "abstract": "Supervised deep learning for semantic segmentation has achieved excellent results in accurately identifying anatomical and pathological structures in medical images. However, it often requires large annotated training datasets, which limits its scalability in clinical settings. To address this challenge, semi-supervised learning is a well-established approach that leverages both labeled and unlabeled data. In this paper, we introduce a novel semi-supervised teacher-student framework for biomedical image segmentation, inspired by the recent success of generative models. Our approach leverages denoising diffusion probabilistic models (DDPMs) to generate segmentation masks by progressively refining noisy inputs conditioned on the corresponding images. The teacher model is first trained in an unsupervised manner using a cycle-consistency constraint based on noise-corrupted image reconstruction, enabling it to generate informative semantic masks. Subsequently, the teacher is integrated into a co-training process with a twin-student network. The student learns from ground-truth labels when available and from teacher-generated pseudo-labels otherwise, while the teacher continuously improves its pseudo-labeling capabilities. Finally, to further enhance performance, we introduce a multi-round pseudo-label generation strategy that iteratively improves the pseudo-labeling process. We evaluate our approach on multiple biomedical imaging benchmarks, spanning multiple imaging modalities and segmentation tasks. Experimental results show that our method consistently outperforms state-of-the-art semi-supervised techniques, highlighting its effectiveness in scenarios with limited annotated data. The code to replicate our experiments can be found at https://github.com/ciampluca/diffusion_semi_supervised_biomedical_image_segmentation", "link": "http://arxiv.org/abs/2504.01547v2", "date": "2026-03-10", "relevancy": 1.6371, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5702}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5464}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5356}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semi-Supervised%20Biomedical%20Image%20Segmentation%20via%20Diffusion%20Models%20and%20Teacher-Student%20Co-Training&body=Title%3A%20Semi-Supervised%20Biomedical%20Image%20Segmentation%20via%20Diffusion%20Models%20and%20Teacher-Student%20Co-Training%0AAuthor%3A%20Luca%20Ciampi%20and%20Gabriele%20Lagani%20and%20Giuseppe%20Amato%20and%20Fabrizio%20Falchi%0AAbstract%3A%20Supervised%20deep%20learning%20for%20semantic%20segmentation%20has%20achieved%20excellent%20results%20in%20accurately%20identifying%20anatomical%20and%20pathological%20structures%20in%20medical%20images.%20However%2C%20it%20often%20requires%20large%20annotated%20training%20datasets%2C%20which%20limits%20its%20scalability%20in%20clinical%20settings.%20To%20address%20this%20challenge%2C%20semi-supervised%20learning%20is%20a%20well-established%20approach%20that%20leverages%20both%20labeled%20and%20unlabeled%20data.%20In%20this%20paper%2C%20we%20introduce%20a%20novel%20semi-supervised%20teacher-student%20framework%20for%20biomedical%20image%20segmentation%2C%20inspired%20by%20the%20recent%20success%20of%20generative%20models.%20Our%20approach%20leverages%20denoising%20diffusion%20probabilistic%20models%20%28DDPMs%29%20to%20generate%20segmentation%20masks%20by%20progressively%20refining%20noisy%20inputs%20conditioned%20on%20the%20corresponding%20images.%20The%20teacher%20model%20is%20first%20trained%20in%20an%20unsupervised%20manner%20using%20a%20cycle-consistency%20constraint%20based%20on%20noise-corrupted%20image%20reconstruction%2C%20enabling%20it%20to%20generate%20informative%20semantic%20masks.%20Subsequently%2C%20the%20teacher%20is%20integrated%20into%20a%20co-training%20process%20with%20a%20twin-student%20network.%20The%20student%20learns%20from%20ground-truth%20labels%20when%20available%20and%20from%20teacher-generated%20pseudo-labels%20otherwise%2C%20while%20the%20teacher%20continuously%20improves%20its%20pseudo-labeling%20capabilities.%20Finally%2C%20to%20further%20enhance%20performance%2C%20we%20introduce%20a%20multi-round%20pseudo-label%20generation%20strategy%20that%20iteratively%20improves%20the%20pseudo-labeling%20process.%20We%20evaluate%20our%20approach%20on%20multiple%20biomedical%20imaging%20benchmarks%2C%20spanning%20multiple%20imaging%20modalities%20and%20segmentation%20tasks.%20Experimental%20results%20show%20that%20our%20method%20consistently%20outperforms%20state-of-the-art%20semi-supervised%20techniques%2C%20highlighting%20its%20effectiveness%20in%20scenarios%20with%20limited%20annotated%20data.%20The%20code%20to%20replicate%20our%20experiments%20can%20be%20found%20at%20https%3A//github.com/ciampluca/diffusion_semi_supervised_biomedical_image_segmentation%0ALink%3A%20http%3A//arxiv.org/abs/2504.01547v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemi-Supervised%2520Biomedical%2520Image%2520Segmentation%2520via%2520Diffusion%2520Models%2520and%2520Teacher-Student%2520Co-Training%26entry.906535625%3DLuca%2520Ciampi%2520and%2520Gabriele%2520Lagani%2520and%2520Giuseppe%2520Amato%2520and%2520Fabrizio%2520Falchi%26entry.1292438233%3DSupervised%2520deep%2520learning%2520for%2520semantic%2520segmentation%2520has%2520achieved%2520excellent%2520results%2520in%2520accurately%2520identifyin {"title": "Think Before You Lie: How Reasoning Improves Honesty", "author": "Ann Yuan and Asma Ghandeharioun and Carter Blum and Alicia Machado and Jessica Hoffmann and Daphne Ippolito and Martin Wattenberg and Lucas Dixon and Katja Filippova", "abstract": "While existing evaluations of large language models (LLMs) measure deception rates, the underlying conditions that give rise to deceptive behavior are poorly understood. We investigate this question using a novel dataset of realistic moral trade-offs where honesty incurs variable costs. Contrary to humans, who tend to become less honest given time to deliberate (Capraro, 2017; Capraro et al., 2019), we find that reasoning consistently increases honesty across scales and for several LLM families. This effect is not only a function of the reasoning content, as reasoning traces are often poor predictors of final behaviors. Rather, we show that the underlying geometry of the representational space itself contributes to the effect. Namely, we observe that deceptive regions within this space are metastable: deceptive answers are more easily destabilized by input paraphrasing, output resampling, and activation noise than honest ones. We interpret the effect of reasoning in this vein: generating deliberative tokens as part of moral reasoning entails the traversal of a biased representational space, ultimately nudging the model toward its more stable, honest defaults.", "link": "http://arxiv.org/abs/2603.09957v1", "date": "2026-03-10", "relevancy": 1.6193, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4204}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.394} {"title": "Context Engineering: From Prompts to Corporate Multi-Agent Architecture", "author": "Vera V. Vishnyakova", "abstract": "As artificial intelligence (AI) systems evolve from stateless chatbots to autonomous multi-step agents, prompt engineering (PE), the discipline of crafting individual queries, proves necessary but insufficient. This paper introduces context engineering (CE) as a standalone discipline concerned with designing, structuring, and managing the entire informational environment in which an AI agent makes decisions. Drawing on vendor architectures (Google ADK, Anthropic, LangChain), current academic work (ACE framework, Google DeepMind's intelligent delegation), enterprise research (Deloitte, 2026; KPMG, 2026), and the author's experience building a multi-agent system, the paper proposes five context quality criteria: relevance, sufficiency, isolation, economy, and provenance, and frames context as the agent's operating system. Two higher-order disciplines follow. Intent engineering (IE) encodes organizational goals, values, and trade-off hierarchies into agent infrastructure. Specification engineering (SE) creates a machine-readable corpus of corporate policies and standards enabling autonomous operation of multi-agent systems at scale. Together these four disciplines form a cumulative pyramid maturity model of agent engineering, in which each level subsumes the previous one as a necessary foundation. Enterprise data reveals a gap: while 75% of enterprises plan agentic AI deployment within two years (Deloitte, 2026), deployment has surged and retreated as organizations confront scaling complexity (KPMG, 2026). The Klarna case illustrates a dual deficit, contextual and intentional. Whoever controls the agent's context controls its behavior; whoever controls its intent controls its strategy; whoever controls its specifications controls its scale.", "link": "http://arxiv.org/abs/2603.09619v1", "date": "2026-03-10", "relevancy": 1.9285, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5397}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4736}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Context%20Engineering%3A%20From%20Prompts%20to%20Corporate%20Multi-Agent%20Architecture&body=Title%3A%20Context%20Engineering%3A%20From%20Prompts%20to%20Corporate%20Multi-Agent%20Architecture%0AAuthor%3A%20Vera%20V.%20Vishnyakova%0AAbstract%3A%20As%20artificial%20intelligence%20%28AI%29%20systems%20evolve%20from%20stateless%20chatbots%20to%20autonomous%20multi-step%20agents%2C%20prompt%20engineering%20%28PE%29%2C%20the%20discipline%20of%20crafting%20individual%20queries%2C%20proves%20necessary%20but%20insufficient.%20This%20paper%20introduces%20context%20engineering%20%28CE%29%20as%20a%20standalone%20discipline%20concerned%20with%20designing%2C%20structuring%2C%20and%20managing%20the%20entire%20informational%20environment%20in%20which%20an%20AI%20agent%20makes%20decisions.%20Drawing%20on%20vendor%20architectures%20%28Google%20ADK%2C%20Anthropic%2C%20LangChain%29%2C%20current%20academic%20work%20%28ACE%20framework%2C%20Google%20DeepMind%27s%20intelligent%20delegation%29%2C%20enterprise%20research%20%28Deloitte%2C%202026%3B%20KPMG%2C%202026%29%2C%20and%20the%20author%27s%20experience%20building%20a%20multi-agent%20system%2C%20the%20paper%20proposes%20five%20context%20quality%20criteria%3A%20relevance%2C%20sufficiency%2C%20isolation%2C%20economy%2C%20and%20provenance%2C%20and%20frames%20context%20as%20the%20agent%27s%20operating%20system.%20Two%20higher-order%20disciplines%20follow.%20Intent%20engineering%20%28IE%29%20encodes%20organizational%20goals%2C%20values%2C%20and%20trade-off%20hierarchies%20into%20agent%20infrastructure.%20Specification%20engineering%20%28SE%29%20creates%20a%20machine-readable%20corpus%20of%20corporate%20policies%20and%20standards%20enabling%20autonomous%20operation%20of%20multi-agent%20systems%20at%20scale.%20Together%20these%20four%20disciplines%20form%20a%20cumulative%20pyramid%20maturity%20model%20of%20agent%20engineering%2C%20in%20which%20each%20level%20subsumes%20the%20previous%20one%20as%20a%20necessary%20foundation.%20Enterprise%20data%20reveals%20a%20gap%3A%20while%2075%25%20of%20enterprises%20plan%20agentic%20AI%20deployment%20within%20two%20years%20%28Deloitte%2C%202026%29%2C%20deployment%20has%20surged%20and%20retreated%20as%20organizations%20confront%20scaling%20complexity%20%28KPMG%2C%202026%29.%20The%20Klarna%20case%20illustrates%20a%20dual%20deficit%2C%20contextual%20and%20intentional.%20Whoever%20controls%20the%20agent%27s%20context%20controls%20its%20behavior%3B%20whoever%20controls%20its%20intent%20controls%20its%20strategy%3B%20whoever%20controls%20its%20specifications%20controls%20its%20scale.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09619v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContext%2520Engineering%253A%2520From%2520Prompts%2520to%2520Corporate%2520Multi-Agent%2520Architecture%26entry.906535625%3DVera%2520V.%2520Vishnyakova%26entry.1292438233%3DAs%2520artificial%2520intelligence%2520%2528AI%2529%2520systems%2520evolve%2520from%2520stateless%2520chatbots%2520to%2520autonomous%2520multi-step%2520agents%252C%2520prompt%2520engineering%2520%2528PE%2529%252C%2520the%2520discipline%2520of%2520crafting%2520individual%2520queries%252C%2520proves%2520necessary%2520but%2520insufficient.%2520This%2520paper%2520introduces%2520context%2520engineering%2520%2528CE%2529%2520as%2520a%2520standalone%2520discipline%2520concerned%2520with%2520designing%252C%2520structuring%252C%2520and%2520managing%2520t

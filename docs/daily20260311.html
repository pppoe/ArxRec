en%2520text%2520and%2520motion.%2520The%2520code%2520is%2520available%2520in%2520the%2520supplementary%2520material.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09930v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Fine-grained%20Motion%20Retrieval%20via%20Joint-Angle%20Motion%20Images%20and%20Token-Patch%20Late%20Interaction&entry.906535625=Yao%20Zhang%20and%20Zhuchenyang%20Liu%20and%20Yanlan%20He%20and%20Thomas%20Ploetz%20and%20Yu%20Xiao&entry.1292438233=Text-motion%20retrieval%20aims%20to%20learn%20a%20semantically%20aligned%20latent%20space%20between%20natural%20language%20descriptions%20and%203D%20human%20motion%20skeleton%20sequences%2C%20enabling%20bidirectional%20search%20across%20the%20two%20modalities.%20Most%20existing%20methods%20use%20a%20dual-encoder%20framework%20that%20compresses%20motion%20and%20text%20into%20global%20embeddings%2C%20discarding%20fine-grained%20local%20correspondences%2C%20and%20thus%20reducing%20accuracy.%20Additionally%2C%20these%20global-embedding%20methods%20offer%20limited%20interpretability%20of%20the%20retrieval%20results.%20To%20overcome%20these%20limitations%2C%20we%20propose%20an%20interpretable%2C%20joint-angle-based%20motion%20representation%20that%20maps%20joint-level%20local%20features%20into%20a%20structured%20pseudo-image%2C%20compatible%20with%20pre-trained%20Vision%20Transformers.%20For%20text-to-motion%20retrieval%2C%20we%20employ%20MaxSim%2C%20a%20token-wise%20late%20interaction%20mechanism%2C%20and%20enhance%20it%20with%20Masked%20Language%20Modeling%20regularization%20to%20foster%20robust%2C%20interpretable%20text-motion%20alignment.%20Extensive%20experiments%20on%20HumanML3D%20and%20KIT-ML%20show%20that%20our%20method%20outperforms%20state-of-the-art%20text-motion%20retrieval%20approaches%20while%20offering%20interpretable%20fine-grained%20correspondences%20between%20text%20and%20motion.%20The%20code%20is%20available%20in%20the%20supplementary%20material.&entry.1838667208=http%3A//arxiv.org/abs/2603.09930v1&entry.124074799=Read"},
{"title": "BEACON: Language-Conditioned Navigation Affordance Prediction under Occlusion", "author": "Xinyu Gao and Gang Chen and Javier Alonso-Mora", "abstract": "Language-conditioned local navigation requires a robot to infer a nearby traversable target location from its current observation and an open-vocabulary, relational instruction. Existing vision-language spatial grounding methods usually rely on vision-language models (VLMs) to reason in image space, producing 2D predictions tied to visible pixels. As a result, they struggle to infer target locations in occluded regions, typically caused by furniture or moving humans. To address this issue, we propose BEACON, which predicts an ego-centric Bird's-Eye View (BEV) affordance heatmap over a bounded local region including occluded areas. Given an instruction and surround-view RGB-D observations from four directions around the robot, BEACON predicts the BEV heatmap by injecting spatial cues into a VLM and fusing the VLM's output with depth-derived BEV features. Using an occlusion-aware dataset built in the Habitat simulator, we conduct detailed experimental analysis to validate both our BEV space formulation and the design choices of each module. Our method improves the accuracy averaged across geodesic thresholds by 22.74 percentage points over the state-of-the-art image-space baseline on the validation subset with occluded target locations. Our project page is: https://xin-yu-gao.github.io/beacon.", "link": "http://arxiv.org/abs/2603.09961v1", "date": "2026-03-10", "relevancy": 2.3921, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6491}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5948}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5809}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BEACON%3A%20Language-Conditioned%20Navigation%20Affordance%20Prediction%20under%20Occlusion&body=Title%3A%20BEACON%3A%20Language-Conditioned%20Navigation%20Affordance%20Prediction%20under%20Occlusion%0AAuthor%3A%20Xinyu%20Gao%20and%20Gang%20Chen%20and%20Javier%20Alonso-Mora%0AAbstract%3A%20Language-conditioned%20local%20navigation%20requires%20a%20robot%20to%20infer%20a%20nearby%20traversable%20target%20location%20from%20its%20current%20observation%20and%20an%20open-vocabulary%2C%20relational%20instruction.%20Existing%20vision-language%20spatial%20grounding%20methods%20usually%20rely%20on%20vision-language%20models%20%28VLMs%29%20to%20reason%20in%20image%20space%2C%20producing%202D%20predictions%20tied%20to%20visible%20pixels.%20As%20a%20result%2C%20they%20struggle%20to%20infer%20target%20locations%20in%20occluded%20regions%2C%20typically%20caused%20by%20furniture%20or%20moving%20humans.%20To%20address%20this%20issue%2C%20we%20propose%20BEACON%2C%20which%20predicts%20an%20ego-centric%20Bird%27s-Eye%20View%20%28BEV%29%20affordance%20heatmap%20over%20a%20bounded%20local%20region%20including%20occluded%20areas.%20Given%20an%20instruction%20and%20surround-view%20RGB-D%20observations%20from%20four%20directions%20around%20the%20robot%2C%20BEACON%20predicts%20the%20BEV%20heatmap%20by%20injecting%20spatial%20cues%20into%20a%20VLM%20and%20fusing%20the%20VLM%27s%20output%20with%20depth-derived%20BEV%20features.%20Using%20an%20occlusion-aware%20dataset%20built%20in%20the%20Habitat%20simulator%2C%20we%20conduct%20detailed%20experimental%20analysis%20to%20validate%20both%20our%20BEV%20space%20formulation%20and%20the%20design%20choices%20of%20each%20module.%20Our%20method%20improves%20the%20accuracy%20averaged%20across%20geodesic%20thresholds%20by%2022.74%20percentage%20points%20over%20the%20state-of-the-art%20image-space%20baseline%20on%20the%20validation%20subset%20with%20occluded%20target%20locations.%20Our%20project%20page%20is%3A%20https%3A//xin-yu-gao.github.io/beacon.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09961v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBEACON%253A%2520Language-Conditioned%2520Navigation%2520Affordance%2520Prediction%2520under%2520Occlusion%26entry.906535625%3DXinyu%2520Gao%2520and%2520Gang%2520Chen%2520and%2520Javier%2520Alonso-Mora%26entry.1292438233%3DLanguage-conditioned%2520local%2520navigation%2520requires%2520a%2520robot%2520to%2520infer%2520a%2520nearby%2520traversable%2520target%2520location%2520from%2520its%2520current%2520observation%2520and%2520an%2520open-vocabulary%252C%2520relational%2520instruction.%2520Existing%2520vision-language%2520spatial%2520grounding%2520methods%2520usually%2520rely%2520on%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520reason%2520in%2520image%2520space%252C%2520producing%25202D%2520predictions%2520tied%2520to%2520visible%2520pixels.%2520As%2520a%2520result%252C%2520they%2520struggle%2520to%2520infer%2520target%2520locations%2520in%2520occluded%2520regions%252C%2520typically%2520caused%2520by%2520furniture%2520or%2520moving%2520humans.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520BEACON%252C%2520which%2520predicts%2520an%2520ego-centric%2520Bird%2527s-Eye%2520View%2520%2528BEV%2529%2520affordance%2520heatmap%2520over%2520a%2520bounded%2520local%2520region%2520including%2520occluded%2520areas.%2520Given%2520an%2520instruction%2520and%2520surround-view%2520RGB-D%2520observations%2520from%2520four%2520directions%2520around%2520the%2520robot%252C%2520BEACON%2520predicts%2520the%2520BEV%2520heatmap%2520by%2520injecting%2520spatial%2520cues%2520into%2520a%2520VLM%2520and%2520fusing%2520the%2520VLM%2527s%2520output%2520with%2520depth-derived%2520BEV%2520features.%2520Using%2520a {"title": "a-TMFG: Scalable Triangulated Maximally Filtered Graphs via Approximate Nearest Neighbors", "author": "Lionel Yelibi", "abstract": "The traditional Triangular Maximally Filtered Graph (TMFG) construction requires pre-computation and storage of a dense correlation matrix; this limits its applicability to small and medium-sized datasets. Here we identify key memory and runtime complexity challenges when using TMFG at scale. We then present the Approximate Triangular Maximally Filtered Graph (a-TMFG) algorithm. This is a novel approach to scaling the construction of artificial graphs from data inspired by TMFG. The method employs k-Nearest Neighbors Graphs (kNNG) for initial construction, and implements a memory management strategy to search and estimate missing correlations on-the-fly. This provides representations to control combinatorial explosion. The algorithm is tested for robustness to the parameters and noise, and is evaluated on datasets with millions of observations. This new method provides a parsimonious way to construct graphs for use-cases where graphs are used as input to supervised and unsupervised learning but where no natural graph exists.", "link": "http://arxiv.org/abs/2603.09564v1", "date": "2026-03-10", "relevancy": 2.3878, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4946}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4693}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20a-TMFG%3A%20Scalable%20Triangulated%20Maximally%20Filtered%20Graphs%20via%20Approximate%20Nearest%20Neighbors&body=Title%3A%20a-TMFG%3A%20Scalable%20Triangulated%20Maximally%20Filtered%20Graphs%20via%20Approximate%20Nearest%20Neighbors%0AAuthor%3A%20Lionel%20Yelibi%0AAbstract%3A%20The%20traditional%20Triangular%20Maximally%20Filtered%20Graph%20%28TMFG%29%20construction%20requires%20pre-computation%20and%20storage%20of%20a%20dense%20correlation%20matrix%3B%20this%20limits%20its%20applicability%20to%20small%20and%20medium-sized%20datasets.%20Here%20we%20identify%20key%20memory%20and%20runtime%20complexity%20challenges%20when%20using%20TMFG%20at%20scale.%20We%20then%20present%20the%20Approximate%20Triangular%20Maximally%20Filtered%20Graph%20%28a-TMFG%29%20algorithm.%20This%20is%20a%20novel%20approach%20to%20scaling%20the%20construction%20of%20artificial%20graphs%20from%20data%20inspired%20by%20TMFG.%20The%20method%20employs%20k-Nearest%20Neighbors%20Graphs%20%28kNNG%29%20for%20initial%20construction%2C%20and%20implements%20a%20memory%20management%20strategy%20to%20search%20and%20estimate%20missing%20correlations%20on-the-fly.%20This%20provides%20representations%20to%20control%20combinatorial%20explosion.%20The%20algorithm%20is%20tested%20for%20robustness%20to%20the%20parameters%20and%20noise%2C%20and%20is%20evaluated%20on%20datasets%20with%20millions%20of%20observations.%20This%20new%20method%20provides%20a%20parsimonious%20way%20to%20construct%20graphs%20for%20use-cases%20where%20graphs%20are%20used%20as%20input%20to%20supervised%20and%20unsupervised%20learning%20but%20where%20no%20natural%20graph%20exists.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09564v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3Da-TMFG%253A%2520Scalable%2520Triangulated%2520Maximally%2520Filtered%2520Graphs%2520via%2520Approximate%2520Nearest%2520Neighbors%26entry.906535625%3DLionel%2520Yelibi%26entry.1292438233%3DThe%2520traditional%2520Triangular%2520Maximally%2520Filtered%2520Graph%2520%2528TMFG%2529%2520construction%2520requires%2520pre-computation%2520and%2520storage%2520of%2520a%2520dense%2520correlation%2520matrix%253B%2520this%2520limits%2520its%2520applicability%2520to%2520small%2520and%2520medium-sized%2520datasets.%2520Here%2520we%2520identify%2520key%2520memory%2520and%2520runtime%2520complexity%2520challenges%2520when%2520using%2520TMFG%2520at%2520scale.%2520We%2520then%2520present%2520the%2520Approximate%2520Triangular%2520Maximally%2520Filtered%2520Graph%2520%2528a-TMFG%2529%2520algorithm.%2520This%2520is%2520a%2520novel%2520approach%2520to%2520scaling%2520the%2520construction%2520of%2520artificial%2520graphs%2520from%2520data%2520inspired%2520by%2520TMFG.%2520The%2520method%2520employs%2520k-Nearest%2520Neighbors%2520Graphs%2520%2528kNNG%2529%2520for%2520initial%2520construction%252C%2520and%2520implements%2520a%2520memory%2520management%2520strategy%2520to%2520search%2520and%2520estimate%2520missing%2520correlations%2520on-the-fly.%2520This%2520provides%2520representations%2520to%2520control%2520combinatorial%2520explosion.%2520The%2520algorithm%2520is%2520tested%2520for%2520robustness%2520to%2520the%2520parameters%2520and%2520noise%252C%2520and%2520is%2520evaluated%2520on%2520datasets%2520with%2520millions%2520of%2520observations.%2520This%2520new%2520method%2520provides%2520a%2520parsimonious%2520way%2520to%2520construct%2520graphs%2520for%2520use-cases%2520where%2520graphs%2520are%2520used%2520as%2520input%2520to%2520supervised%2520and%2520unsupervised%2520learning%2520but%2520where%2520no%2520natural%2520graph%2520exists.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09564v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=a-TMFG%3A%20Scalable%20Triangulated%20Maximally%20Filtered%20Graphs%20via%20Approximate%20Nearest%20Neighbors&entry.906535625=Lionel%20Yelibi&entry.1292438233=The%20traditional%20Triangular%20Maximally%20Filtered%20Graph%20%28TMFG%29%20construction%20requires%20pre-computation%20and%20storage%20 {"title": "Sparse Variational Student-t Processes for Heavy-tailed Modeling", "author": "Jian Xu and Delu Zeng and John Paisley", "abstract": "The Gaussian process (GP) is a powerful tool for nonparametric modeling, but its sensitivity to outliers limits its applicability to data distributions with heavy-tails. Studentt processes offer a robust alternative for heavy tail modeling, but they lack the scalable developments of the GP to large datasets necessary for practical applications. We present Sparse Variational Student-t Processes (SVTP), the first principled framework that extends the sparse inducing point method to the Student-t process. We develop two novel inference algorithms, SVTP-UB and SVTP-MC, with theoretical guarantees, and derive a natural gradient optimization that exploits a previously unused connection between the Fisher information matrix of the multivariate Student-t distribution and the beta function (the 'beta link'). Experiments on UCI and Kaggle datasets demonstrate that SVTP significantly outperforms sparse GPs on when the data is contains outliers and heavy tails, achieving up to 3 times faster convergence and 40% lower prediction error while maintaining computational efficiency for datasets with over 200,000 samples.", "link": "http://arxiv.org/abs/2408.06699v2", "date": "2026-03-10", "relevancy": 2.3828, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5008}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4779}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.451}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sparse%20Variational%20Student-t%20Processes%20for%20Heavy-tailed%20Modeling&body=Title%3A%20Sparse%20Variational%20Student-t%20Processes%20for%20Heavy-tailed%20Modeling%0AAuthor%3A%20Jian%20Xu%20and%20Delu%20Zeng%20and%20John%20Paisley%0AAbstract%3A%20The%20Gaussian%20process%20%28GP%29%20is%20a%20powerful%20tool%20for%20nonparametric%20modeling%2C%20but%20its%20sensitivity%20to%20outliers%20limits%20its%20applicability%20to%20data%20distributions%20with%20heavy-tails.%20Studentt%20processes%20offer%20a%20robust%20alternative%20for%20heavy%20tail%20modeling%2C%20but%20they%20lack%20the%20scalable%20developments%20of%20the%20GP%20to%20large%20datasets%20necessary%20for%20practical%20applications.%20We%20present%20Sparse%20Variational%20Student-t%20Processes%20%28SVTP%29%2C%20the%20first%20principled%20framework%20that%20extends%20the%20sparse%20inducing%20point%20method%20to%20the%20Student-t%20process.%20We%20develop%20two%20novel%20inference%20algorithms%2C%20SVTP-UB%20and%20SVTP-MC%2C%20with%20theoretical%20guarantees%2C%20and%20derive%20a%20natural%20gradient%20optimization%20that%20exploits%20a%20previously%20unused%20connection%20between%20the%20Fisher%20information%20matrix%20of%20the%20multivariate%20Student-t%20distribution%20and%20the%20beta%20function%20%28the%20%27beta%20link%27%29.%20Experiments%20on%20UCI%20and%20Kaggle%20datasets%20demonstrate%20that%20SVTP%20significantly%20outperforms%20sparse%20GPs%20on%20when%20the%20data%20is%20contains%20outliers%20and%20heavy%20tails%2C%20achieving%20up%20to%203%20times%20faster%20convergence%20and%2040%25%20lower%20prediction%20error%20while%20maintaining%20computational%20efficiency%20for%20datasets%20with%20over%20200%2C000%20samples.%0ALink%3A%20http%3A//arxiv.org/abs/2408.06699v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSparse%2520Variational%2520Student-t%2520Processes%2520for%2520Heavy-tailed%2520Modeling%26entry.906535625%3DJian%2520Xu%2520and%2520Delu%2520Zeng%2520and%2 ShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sparse%20Variational%20Student-t%20Processes%20for%20Heavy-tailed%20Modeling&entry.906535625=Jian%20Xu%20and%20Delu%20Zeng%20and%20John%20Paisley&entry.1292438233=The%20Gaussian%20process%20%28GP%29%20is%20a%20powerful%20tool%20for%20nonparametric%20modeling%2C%20but%20its%20sensitivity%20to%20outliers%20limits%20its%20applicability%20to%20data%20distributions%20with%20heavy-tails.%20Studentt%20processes%20offer%20a%20robust%20alternative%20for%20heavy%20tail%20modeling%2C%20but%20they%20lack%20the%20scalable%20developments%20of%20the%20GP%20to%20large%20datasets%20necessary%20for%20practical%20applications.%20We%20present%20Sparse%20Variational%20Student-t%20Processes%20%28SVTP%29%2C%20the%20first%20principled%20framework%20that%20extends%20the%20sparse%20inducing%20point%20method%20to%20the%20Student-t%20process.%20We%20develop%20two%20novel%20inference%20algorithms%2C%20SVTP-UB%20and%20SVTP-MC%2C%20with%20theoretical%20guarantees%2C%20and%20derive%20a%20natural%20gradient%20optimization%20that%20exploits%20a%20previously%20unused%20connection%20between%20the%20Fisher%20information%20matrix%20of%20the%20multivariate%20Student-t%20distribution%20and%20the%20beta%20function%20%28the%20%27beta%20link%27%29.%20Experiments%20on%20UCI%20and%20Kaggle%20datasets%20demonstrate%20that%20SVTP%20significantly%20outperforms%20sparse%20GPs%20on%20when%20the%20data%20is%20contains%20outliers%20and%20heavy%20tails%2C%20achieving%20up%20to%203%20times%20faster%20convergence%20and%2040%25%20lower%20prediction%20error%20while%20maintaining%20computational%20efficiency%20for%20datasets%20with%20over%20200%2C000%20samples.&entry.1838667208=http%3A//arxiv.org/abs/2408.06699v2&entry.124074799=Read"},
{"title": "Audio-Visual World Models: Towards Multisensory Imagination in Sight and Sound", "author": "Jiahua Wang and Leqi Zheng and Jialong Wu and Yaoxin Mao", "abstract": "World models simulate environmental dynamics to enable agents to plan and reason about future states. While existing approaches have primarily focused on visual observations, real-world perception inherently involves multiple sensory modalities. Audio provides crucial spatial and temporal cues such as sound source localization and acoustic scene properties, yet its integration into world models remains largely unexplored. No prior work has formally defined what constitutes an audio-visual world model or how to jointly capture binaural spatial audio and visual dynamics under precise action control. This work presents the first formal framework for Audio-Visual World Models (AVWM), formulating multimodal environment simulation as a partially observable Markov decision process with synchronized audio-visual observations. To address the lack of suitable training data, we construct AVW-4k, a dataset comprising 30 hours of binaural audio-visual trajectories with action annotations across 76 indoor environments. We propose AV-CDiT, an Audio-Visual Conditional Diffusion Transformer with a novel modality expert architecture that balances visual and auditory learning, optimized through a three-stage training strategy for effective multimodal integration. Extensive experiments demonstrate that AV-CDiT achieves high-fidelity multimodal prediction across visual and auditory modalities. Furthermore, we validate its practical utility in continuous audio-visual navigation tasks, where AVWM significantly enhances the agent's performance.", "link": "http://arxiv.org/abs/2512.00883v2", "date": "2026-03-10", "relevancy": 2.3807, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6172}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5908}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5908}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Audio-Visual%20World%20Models%3A%20Towards%20Multisensory%20Imagination%20in%20Sight%20and%20Sound&body=Title%3A%20Audio-Visual%20World%20Models%3A%20Towards%20Multisensory%20Imagination%20in%20Sight%20and%20Sound%0AAuthor%3A%20Jiahua%20Wang%20and%20Leqi%20Zheng%20and%20Jialong%20Wu%20and%20Yaoxin%20Mao%0AAbstract%3A%20World%20models%20simulate%20environmental%20dynamics%20to%20enable%20agents%20to%20plan%20and%20reason%20about%20future%20states.%20While%20existing%20approaches%20have%20primarily%20focused%20on%20visual%20observations%2C%20real-world%20perception%20inherently%20involves%20multiple%20sensory%20modalities.%20Audio%20provides%20crucial%20spatial%20and%20temporal%20cues%20such%20as%20sound%20source%20localization%20and%20acoustic%20scene%20properties%2C%20yet%20its%20integration%20into%20world%20models%20remains%20largely%20unexplored.%20No%20prior%20work%20has%20formally%20defined%20what%20constitutes%20an%20audio-visual%20world%20model%20or%20how%20to%20jointly%20capture%20binaural%20spatial%20audio%20and%20visual%20dynamics%20under%20precise%20action%20control.%20This%20work%20presents%20the%20first%20formal%20framework%20for%20Audio-Visual%20World%20Models%20%28AVWM%29%2C%20formulating%20multimodal%20environment%20simulation%20as%20a%20partially%20observable%20Markov%20decision%20process%20with%20synchronized%20audio-visual%20observations.%20To%20address%20the%20lack%20of%20suitable%20training%20data%2C%20we%20construct%20AVW-4k%2C%20a%20dataset%20comprising%2030%20hours%20of%20binaural%20audio-visual%20trajectories%20with%20action%20annotations%20across%2076%20indoor%20environments.%20We%20propose%20AV-CDiT%2C%20an%20Audio-Visual%20Conditional%20Diffusion%20Transformer%20with%20a%20novel%20modality%20expert%20architecture%20that%20balances%20visual%20and%20auditory%20learning%2C%20optimized%20through%20a%20three-stage%20training%20strategy%20for%20effective%20multimodal%20integration.%20Extensive%20experiments%20demonstrate%20that%20AV-CDiT%20achieves%20high-fidelity%20multimodal%20prediction%20across%20visual%20and%20auditory%20modalities.%20Furthermore%2C%20we%20validate%20its%20practical%20utility%20in%20continuous%20audio-visual%20navigation%20tasks%2C%20where%20AVWM%20significantly%20enhances%20the%20agent%27s%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2512.00883v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAudio-Visual%2520World%2520Models%253A%2520Towards%2520Multisensory%2520Imagination%2520in%2520Sight%2520and%2520Sound%26entry.906535625%3DJiahua%2520Wang%2520and%2520Leqi%2520Zheng%2520and%2520Jialong%2520Wu%2520and%2520Yaoxin%2520Mao%26entry.1292438233%3DWorld%2520models%2520simulate%2520environmental%2520dynamics%2520to%2520enable%2520agents%2520to%2520plan%2520and%2520reason%2520about%2520future%2520states.%2520While%2520existing%2520approaches%2520have%2520primarily%2520focused%2520on%2520visual%2520observations%252C%2520real-world%2520perception%2520inherently%2520involves%2520multiple%2520sensory%2520modalities.%2520Audio%2520provides%2520crucial%2520spatial%2520and%2520temporal%2520cues%2520such%2520as%2520sound%2520source%2520localization%2520and%2520acoustic%2520scene%2520properties%252C%2520yet%2520its%2520integration%2520into%2520world%2520models%2520remains%2520largely%2520unexplored.%2520No%2520prior%2520work%2520has%2520formally%2520defined%2520what%2520constitutes%2520an%2520audio-visual%2520world%2520model%2520or%2520how%2520to%2520jointly%2520capture%2520binaural%2520spatial%2520audio%2520and%2520visual%2520dynamics%2520under%2520precis {"title": "GraphKeeper: Graph Domain-Incremental Learning via Knowledge Disentanglement and Preservation", "author": "Zihao Guo and Qingyun Sun and Ziwei Zhang and Haonan Yuan and Huiping Zhuang and Xingcheng Fu and Jianxin Li", "abstract": "Graph incremental learning (GIL), which continuously updates graph models by sequential knowledge acquisition, has garnered significant interest recently. However, existing GIL approaches focus on task-incremental and class-incremental scenarios within a single domain. Graph domain-incremental learning (Domain-IL), aiming at updating models across multiple graph domains, has become critical with the development of graph foundation models (GFMs), but remains unexplored in the literature. In this paper, we propose Graph Domain-Incremental Learning via Knowledge Dientanglement and Preservation (GraphKeeper), to address catastrophic forgetting in Domain-IL scenario from the perspectives of embedding shifts and decision boundary deviations. Specifically, to prevent embedding shifts and confusion across incremental graph domains, we first propose the domain-specific parameter-efficient fine-tuning together with intra- and inter-domain disentanglement objectives. Consequently, to maintain a stable decision boundary, we introduce deviation-free knowledge preservation to continuously fit incremental domains. Additionally, for graphs with unobservable domains, we perform domain-aware distribution discrimination to obtain precise embeddings. Extensive experiments demonstrate the proposed GraphKeeper achieves state-of-the-art results with 6.5%~16.6% improvement over the runner-up with negligible forgetting. Moreover, we show GraphKeeper can be seamlessly integrated with various representative GFMs, highlighting its broad applicative potential.", "link": "http://arxiv.org/abs/2511.00097v2", "date": "2026-03-10", "relevancy": 2.3725, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity nt%20objectives.%20Consequently%2C%20to%20maintain%20a%20stable%20decision%20boundary%2C%20we%20introduce%20deviation-free%20knowledge%20preservation%20to%20continuously%20fit%20incremental%20domains.%20Additionally%2C%20for%20graphs%20with%20unobservable%20domains%2C%20we%20perform%20domain-aware%20distribution%20discrimination%20to%20obtain%20precise%20embeddings.%20Extensive%20experiments%20demonstrate%20the%20proposed%20GraphKeeper%20achieves%20state-of-the-art%20results%20with%206.5%25~16.6%25%20improvement%20over%20the%20runner-up%20with%20negligible%20forgetting.%20Moreover%2C%20we%20show%20GraphKeeper%20can%20be%20seamlessly%20integrated%20with%20various%20representative%20GFMs%2C%20highlighting%20its%20broad%20applicative%20potential.%0ALink%3A%20http%3A//arxiv.org/abs/2511.00097v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraphKeeper%253A%2520Graph%2520Domain-Incremental%2520Learning%2520via%2520Knowledge%2520Disentanglement%2520and%2520Preservation%26entry.906535625%3DZihao%2520Guo%2520and%2520Qingyun%2520Sun%2520and%2520Ziwei%2520Zhang%2520and%2520Haonan%2520Yuan%2520and%2520Huiping%2520Zhuang%2520and%2520Xingcheng%2520Fu%2520and%2520Jianxin%2520Li%26entry.1292438233%3DGraph%2520incremental%2520learning%2520%2528GIL%2529%252C%2520which%2520continuously%2520updates%2520graph%2520models%2520by%2520sequential%2520knowledge%2520acquisition%252C%2520has%2520garnered%2520significant%2520interest%2520recently.%2520However%252C%2520existing%2520GIL%2520approaches%2520focus%2520on%2520task-incremental%2520and%2520class-incremental%2520scenarios%2520within%2520a%2520single%2520domain.%2520Graph%2520domain-incremental%2520learning%2520%2528Domain-IL%2529%252C%2520aiming%2520at%2520updating%2520models%2520across%2520multiple%2520graph%2520domains%252C%2520has%2520become%2520critical%2520with%2520the%2520development%2520of%2520graph%2520foundation%2520models%2520%2528GFMs%252 {"title": "An Empirical Study and Theoretical Explanation on Task-Level Model-Merging Collapse", "author": "Yuan Cao and Dezhi Ran and Yuzhe Guo and Mengzhou Wu and Simin Chen and Linyi Li and Wei Yang and Tao Xie", "abstract": "Model merging unifies independently fine-tuned LLMs from the same base, enabling reuse and integration of parallel development efforts without retraining. However, in practice we observe that merging does not always succeed: certain combinations of task-specialist models suffer from catastrophic performance degradation after merging. We refer to this failure mode as merging collapse. Intuitively, collapse arises when the learned representations or parameter adjustments for different tasks are fundamentally incompatible, so that merging forces destructive interference rather than synergy. In this paper, we identify and characterize the phenomenon of task-level merging collapse, where certain task combinations consistently trigger huge performance degradation across all merging methods. Through extensive experiments and statistical analysis, we demonstrate that representational incompatibility between tasks is strongly correlated with merging collapse, while parameter-space conflict metrics show minimal correlation, challenging conventional wisdom in model merging literature. We provide a theoretical explanation on this phenomenon through rate-distortion theory with a dimension-dependent bound, establishing fundamental limits on task mergeability regardless of methodology.", "link": "http://arxiv.org/abs/2603.09463v1", "date": "2026-03-10", "relevancy": 2.3645, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4868}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4659}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D S %20phenomenon%20through%20rate-distortion%20theory%20with%20a%20dimension-dependent%20bound%2C%20establishing%20fundamental%20limits%20on%20task%20mergeability%20regardless%20of%20methodology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09463v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Empirical%2520Study%2520and%2520Theoretical%2520Explanation%2520on%2520Task-Level%2520Model-Merging%2520Collapse%26entry.906535625%3DYuan%2520Cao%2520and%2520Dezhi%2520Ran%2520and%2520Yuzhe%2520Guo%2520and%2520Mengzhou%2520Wu%2520and%2520Simin%2520Chen%2520and%2520Linyi%2520Li%2520and%2520Wei%2520Yang%2520and%2520Tao%2520Xie%26entry.1292438233%3DModel%2520merging%2520unifies%2520independently%2520fine-tuned%2520LLMs%2520from%2520the%2520same%2520base%252C%2520enabling%2520reuse%2520and%2520integration%2520of%2520parallel%2520development%2520efforts%2520without%2520retraining.%2520However%252C%2520in%2520practice%2520we%2520observe%2520that%2520merging%2520does%2520not%2520always%2520succeed%253A%2520certain%2520combinations%2520of%2520task-specialist%2520models%2520suffer%2520from%2520catastrophic%2520performance%2520degradation%2520after%2520merging.%2520We%2520refer%2520to%2520this%2520failure%2520mode%2520as%2520merging%2520collapse.%2520Intuitively%252C%2520collapse%2520arises%2520when%2520the%2520learned%2520representations%2520or%2520parameter%2520adjustments%2520for%2520different%2520tasks%2520are%2520fundamentally%2520incompatible%252C%2520so%2520that%2520merging%2520forces%2520destructive%2520interference%2520rather%2520than%2520synergy.%2520In%2520this%2520paper%252C%2520we%2520identify%2520and%2520characterize%2520the%2520phenomenon%2520of%2520task-level%2520merging%2520collapse%252C%2520where%2520certain%2520task%2520combinations%2520consistently%2520trigger%2520huge%2520performance%2520degradation%2520across%2520all%2520merging%2520methods.%2520Through%2520extensive%2520experiments%2520and%2520statistical%2520analysis%252C%2520we%2520demonstrate%2520that%2520representational%2520incompatibility%2520between%2520tasks%2520is%2520strongly%2520correlated%2520with%2520merging%2520collapse%252C%2520while%2520parameter-space%2520conflict%2520metrics%2520show%2520minimal%2520correlation%252C%2520challenging%2520conventional%2520wisdom%2520in%2520model%2520merging%2520literature.%2520We%2520provide%2520a%2520theoretical%2520explanation%2520on%2520this%2520phenomenon%2520through%2520rate-distortion%2520theory%2520with%2520a%2520dimension-dependent%2520bound%252C%2520establishing%2520fundamental%2520limits%2520on%2520task%2520mergeability%2520regardless%2520of%2520methodology.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09463v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=An%20Empirical%20Study%20and%20Theoretical%20Explanation%20on%20Task-Level%20Model-Merging%20Collapse&entry.906535625=Yuan%20Cao%20and%20Dezhi%20Ran%20and%20Yuzhe%20Guo%20and%20Mengzhou%20Wu%20and%20Simin%20Chen%20and%20Linyi%20Li%20and%20Wei%20Yang%20and%20Tao%20Xie&entry.1292438233=Model%20merging%20unifies%20independently%20fine-tuned%20LLMs%20from%20the%20same%20base%2C%20enabling%20reuse%20and%20integration%20of%20parallel%20development%20efforts%20without%20retraining.%20However%2C%20in%20practice%20we%20observe%20that%20merging%20does%20not%20always%20succeed%3A%20certain%20combinations%20of%20task-specialist%20models%20suffer%20from%20catastrophic%20performance%20degradation%20after%20merging.%20We%20refer%20to%20this%20failure%20mode%20as%20merging%20collapse.%20Intuitively%2C%20collapse%20arises%20when%20the%20learned%20representations%20or%20parameter%20adjustments%20for%20different%20tasks%20are%20fundamentally%20incompatible%2C%20so%20that%20merging%20forces%20destructive%20interference%20rather%20than%20synergy.%20In%20this%20paper%2C%20we%20identify%20an {"title": "Exploring Single Domain Generalization of LiDAR-based Semantic Segmentation under Imperfect Labels", "author": "Weitong Kong and Zichao Zeng and Di Wen and Jiale Wei and Kunyu Peng and June Moh Goo and Jan Boehm and Rainer Stiefelhagen", "abstract": "Accurate perception is critical for vehicle safety, with LiDAR as a key enabler in autonomous driving. To ensure robust performance across environments, sensor types, and weather conditions without costly re-annotation, domain generalization in LiDAR-based 3D semantic segmentation is essential. However, LiDAR annotations are often noisy due to sensor imperfections, occlusions, and human errors. Such noise degrades segmentation accuracy and is further amplified under domain shifts, threatening system reliability. While noisy-label learning is well-studied in images, its extension to 3D LiDAR segmentation under domain generalization remains largely unexplored, as the sparse and irregular structure of point clouds limits direct use of 2D methods. To address this gap, we introduce the novel task Domain Generalization for LiDAR Semantic Segmentation under Noisy Labels (DGLSS-NL) and establish the first benchmark by adapting three representative noisy-label learning strategies from image classification to 3D segmentation. However, we find that existing noisy-label learning approaches adapt poorly to LiDAR data. We therefore propose DuNe, a dual-view framework with strong and weak branches that enforce feature-level consistency and apply cross-entropy loss based on confidence-aware filtering of predictions. Our approach shows state-of-the-art performance by achieving 56.86% mIoU on SemanticKITTI, 42.28% on nuScenes, and 52.58% on SemanticPOSS under 10% symmetric label noise, with an overall Arithmetic Mean (AM) of 49.57% and Harmonic Mean (HM) of 48.50%, thereby demonstrating robust domain generalization in DGLSS-NL tasks. The code is available on our project page.", "link": "http://arxiv.org/abs/2510.09035v2", "date": "2026-03-10", "relevancy": 2.3566, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6265}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5872}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5762}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploring%20Single%20Domain%20Generalization%20of%20LiDAR-based%20Semantic%20Segmentation%20under%20Imperfect%20Labels&body=Title%3A%20Exploring%20Single%20Domain%20Generalization%20of%20LiDAR-based%20Semantic%20Segmentation%20under%20Imperfect%20Labels%0AAuthor%3A%20Weitong%20Kong%20and%20Zichao%20Zeng%20and%20Di%20Wen%20and%20Jiale%20Wei%20and%20Kunyu%20Peng%20and%20June%20Moh%20Goo%20and%20Jan%20Boehm%20and%20Rainer%20Stiefelhagen%0AAbstract%3A%20Accurate%20perception%20is%20critical%20for%20vehicle%20safety%2C%20with%20LiDAR%20as%20a%20key%20enabler%20in%20autonomous%20driving.%20To%20ensure%20robust%20performance%20across%20environments%2C%20sensor%20types%2C%20and%20weather%20conditions%20without%20costly%20re-annotation%2C%20domain%20generalization%20in%20LiDAR-based%203D%20semantic%20segmentation%20is%20essential.%20However%2C%20LiDAR%20annotations%20are%20often%20noisy%20due%20to%20sensor%20imperfections%2C%20occlusions%2C%20and%20human%20errors.%20Such%20noise%20degrades%20segmentation%20accuracy%20and%20is%20further%20amplified%20under%20domain%20shifts%2C%20threatening%20system%20reliability.%20While%20noisy-label%20learning%20is%20well-studied%20in%20images%2C%20its%20extension%20to%203D%20LiDAR%20segmentation%20under%20domain%20generalization%20remains%20largely%20unexplored%2C%20as%20the%20sparse%20and%20irregular%20structure%20of%20point%20clouds%20limits%20direct%20use%20of%202D%20methods.%20To%20address%20this%20gap%2C%20we%20introduce%20the%20novel%20task%20Domain%20Generalization%20for%20LiDAR%20Semantic%20Segmentation%20under%20Noisy%20Labels%20%28DGLSS-NL%29%20and%20establish%20the%20first%20benchmark%20by%20adapting%20three%20representative%20noisy-label%20learning%20strategies%20from%20image%20classification%20to%203D%20segmentation.%20However%2C%20we%20find%20that%20existing%20noisy-label%20learning%20approaches%20adapt%20poorly%20to%20LiDAR%20data.%20We%20therefore%20propose%20DuNe%2C%20a%20dual-view%20framework%20with%20strong%20and%20weak%20branches%20that%20enforce%20feature-level%20consistency%20and%20apply%20cross-entropy%20loss%20based%20on%20confidence-aware%20filtering%20of%20predictions.%20Our%20approach%20shows%20state-of-the-art%20performance%20by%20achieving%2056.86%25%20mIoU%20on%20SemanticKITTI%2C%2042.28%25%20on%20nuScenes%2C%20and%2052.58%25%20on%20SemanticPOSS%20under%2010%25%20symmetric%20label%20noise%2C%20with%20an%20overall%20Arithmetic%20Mean%20%28AM%29%20of%2049.57%25%20and%20Harmonic%20Mean%20%28HM%29%20of%2048.50%25%2C%20thereby%20demonstrating%20robust%20domain%20generalization%20in%20DGLSS-NL%20tasks.%20The%20code%20is%20available%20on%20our%20project%20page.%0ALink%3A%20http%3A//arxiv.org/abs/2510.09035v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploring%2520Single%2520Domain%2520Generalization%2520of%2520LiDAR-based%2520Semantic%2520Segmentation%2520under%2520Imperfect%2520Labels%26entry.906535625%3DWeitong%2520Kong%2520and%2520Zichao%2520Zeng%2520and%2520Di%2520Wen%2520and%2520Jiale%2520Wei%2520and%2520Kunyu%2520Peng%2520and%2520June%2520Moh%2520Goo%2520and%2520Jan%2520Boehm%2520and%2520Rainer%2520Stiefelhagen%26entry.1292438233%3DAccurate%2520perception%2520is%2520critical%2520for%2520vehicle%2520safety%252C%2520with%2520LiDAR%2520as%2520a%2520key%2520 {"title": "Towards Terrain-Aware Safe Locomotion for Quadrupedal Robots Using Proprioceptive Sensing", "author": "Peiyu Yang and Jiatao Ding and Wei Pan and Claudio Semini and Cosimo Della Santina", "abstract": "Achieving safe quadrupedal locomotion in real-world environments has attracted much attention in recent years. When walking over uneven terrain, achieving reliable estimation and realising safety-critical control based on the obtained information is still an open question. To address this challenge, especially for low-cost robots equipped solely with proprioceptive sensors (e.g., IMUs, joint encoders, and contact force sensors), this work first presents an estimation framework that generates a 2.5-D terrain map and extracts support plane parameters, which are then integrated into contact and state estimation. Then, we integrate this estimation framework into a safety-critical control pipeline by formulating control barrier functions that provide rigorous safety guarantees. Experiments demonstrate that the proposed terrain estimation method provides smooth terrain representations. Moreover, the coupled estimation framework of terrain, state, and contact reduces the mean absolute error of base position estimation by 64.8%, decreases the estimation variance by 47.2%, and improves the robustness of contact estimation compared to a decoupled framework. The terrain-informed CBFs integrate historical terrain information and current proprioceptive measurements to ensure global safety by keeping the robot out of hazardous areas and local safety by preventing body-terrain collision, relying solely on proprioceptive sensing.", "link": "http://arxiv.org/abs/2603.09585v1", "date": "2026-03-10", "relevancy": 2.3543, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6544}, {"title": "Egocentric Computer Vision for Hands-Free Robotic W {"title": "ParTY: Part-Guidance for Expressive Text-to-Motion Synthesis", "author": "KunHo Heo and SuYeon Kim and Yonghyun Gwon and Youngbin Kim and MyeongAh Cho", "abstract": "Text-to-motion synthesis aims to generate natural and expressive human motions from textual descriptions. While existing approaches primarily focus on generating holistic motions from text descriptions, they struggle to accurately reflect actions involving specific body parts. Recent part-wise motion generation methods attempt to resolve this but face two critical limitations: (i) they lack explicit mechanisms for aligning textual semantics with individual body parts, and (ii) they often generate incoherent full-body motions due to integrating independently generated part motions. To overcome these issues and resolve the fundamental trade-off in existing methods, we propose ParTY, a novel framework that enhances part expressiveness while generating coherent full-body motions. ParTY comprises: (1) Part-Guided Network, which first generates part motions to obtain part guidance, then uses it to generate holistic motions; (2) Part-aware Text Grounding, which diversely transforms text embeddings and appropriately aligns them with each body part; and (3) Holistic-Part Fusion, which adaptively fuses holistic motions and part motions. Extensive experiments, including part-level and coherence-level evaluations, demonstrate that ParTY achieves substantial improvements over previous methods.", "link": "http://arxiv.org/abs/2603.09611v1", "date": "2026-03-10", "relevancy": 2.3494, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6217}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5691}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5469}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ParTY%3A%20Part-Guidance%20for%20Expressive%20Text-to-Motion%20Synthesis&body=Title%3A%20ParTY%3A%20Part-Guidance%20for%20Expressive%20Text-to-Motion%20Synthesis%0AAuthor%3A%20KunHo%20Heo%20and%20SuYeon%20Kim%20and%20Yonghyun%20Gwon%20and%20Youngbin%20Kim%20and%20MyeongAh%20Cho%0AAbstract%3A%20Text-to-motion%20synthesis%20aims%20to%20generate%20natural%20and%20expressive%20human%20motions%20from%20textual%20descriptions.%20While%20existing%20approaches%20primarily%20focus%20on%20generating%20holistic%20motions%20from%20text%20descriptions%2C%20they%20struggle%20to%20accurately%20reflect%20actions%20involving%20specific%20body%20parts.%20Recent%20part-wise%20motion%20generation%20methods%20attempt%20to%20resolve%20this%20but%20face%20two%20critical%20limitations%3A%20%28i%29%20they%20lack%20explicit%20mechanisms%20for%20aligning%20textual%20semantics%20with%20individual%20body%20parts%2C%20and%20%28ii%29%20they%20often%20generate%20incoherent%20full-body%20motions%20due%20to%20integrating%20independently%20generated%20part%20motions.%20To%20overcome%20these%20issues%20and%20resolve%20the%20fundamental%20trade-off%20in%20existing%20methods%2C%20we%20propose%20ParTY%2C%20a%20novel%20framework%20that%20enhances%20part%20expressiveness%20while%20generating%20coherent%20full-body%20motions.%20ParTY%20comprises%3A%20%281%29%20Part-Guided%20Network%2C%20which%20first%20generates%20part%20motions%20to%20obtain%20part%20guidance%2C%20then%20uses%20it%20to%20generate%20holistic%20motions%3B%20%282%29%20Part-aware%20Text%20Grounding%2C%20which%20diversely%20transforms%20text%20embeddings%20and%20appropriately%20aligns%20them%20with%20each%20body%20part%3B%20and%20%283%29%20Holistic-Part%20Fusion%2C%20which%20adaptively%20fuses%20holistic%20motions%20and%20part%20motions.%20Extensive%20experiments%2C%20including%20part-level%20and%20coherence-level%20evaluations%2C%20demonstrate%20that%20ParTY%20achieves%20substantial%20improvements%20over%20previous%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09611v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParTY%253A%2520Part-Guidance%2520for%2520Expressive%2520Text-to-Motion%2520Synthesis%26entry.906535625%3DKunHo%2520Heo%2520and%2520SuYeon%2520Kim%2520and%2520Yonghyun%2520Gwon%2520and%2520Youngbin%2520Kim%2520and%2520MyeongAh%2520Cho%26entry.1292438233%3DText-to-motion%2520synthesis%2520aims%2520to%2520generate%2520natural%2520and%2520expressive%2520human%2520motions%2520from%2520textual%2520descriptions.%2520While%2520existing%2520approaches%2520primarily%2520focus%2520on%2520generating%2520holistic%2520motions%2520from%2520text%2520descriptions%252C%2520they%2520struggle%2520to%2520accurately%2520reflect%2520actions%2520involving%2520specific%2520body%2520parts.%2520Recent%2520part-wise%2520motion%2520generation%2520methods%2520attempt%2520to%2520resolve%2520this%2520but%2520face%2520two%2520critical%2520limitations%253A%2520%2528i%2529%2520they%2520lack%2520explicit%2520mechanisms%2520for%2520aligning%2520textual%2520semantics%2520with%2520individual%2520body%2520parts%252C%2520and%2520%2528ii%2529%2520they%2520often%2520generate%2520incoherent%2520full-body%2520motions%2520due%2520to%2520integrating%2520independently%2520generated%2520part%2520motions.%2520To%2520overcome%2520these%2520issues%2520and%2520resolve%2520the%2520fundamental%2520trade-off%2520in%2520existing%2520methods%252C%2520we%2520propose%2520ParTY%252C%2520a%2520novel%2520framework%2520that%2520enhances%2520part%2520expressiveness%2520while%2520generating%2520coherent%2520full-body%2520motions.%2520ParTY%2520comprises%253A%2520%25281%2529%2520Part-Guided%2520Network%252C%2520which%2520first%2520generates%2520part%2520motions%2520to%2520obtain%2520part%2520guidance%252C%2520then%2520uses%2520it%2520to%2520generate%2520holistic%2520motions%253B%2520%25282%2529%2520Part-aware%2520Text%2520Grounding%252C%2520which%2520diversely%2520transforms%2520text%2520embeddings%2520and%2520appropriately%2520aligns%2520them%2520with%2520each%2520body%2520part%253B%2520and%2520%25283%2529%2520Holistic-Part%2520Fusion%252C%2520which%2520adaptively%2520fuses%2520holistic%2520motions%2520and%2520part%2520motions.%2520Extensive%2520experiments%252C%2520including%2520part-level%2520and%2520coherence-level%2520evaluations%252C%2520demonstrate%2520that%2520ParTY%2520achieves%2520substantial%2520improvements%2520over%2520previous%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09611v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ParTY%3A%20Part-Guidance%20for%20Expressive%20Text-to-Motion%20Synthesis&entry.906535625=KunHo%20Heo%20and%20SuYeon%20Kim%20and%20Yonghyun%20Gwon%20and%20Youngbin%20Kim%20and%20MyeongAh%20Cho&entry.1292438233=Text-to-motion%20synthesis%20aims%20to%20generate%20natural%20and%20expressive%20human%20motions%20from%20textual%20descriptions.%20While%20existing%20approaches%20primarily%20focus%20on%20generating%20holistic%20motions%20from%20text%20descriptions%2C%20they%20struggle%20to%20accurately%20reflect%20actions%20involving%20specific%20body%20parts.%20Recent%20part-wise%20motion%20generation%20methods%20attempt%20to%20resolve%20this%20but%20face%20two%20critical%20limitations%3A%20%28i%29%20they%20lack%20explicit%20mechanisms%20for%20aligning%20textual%20semantics%20with%20individual%20body%20parts%2C%20and%20%28ii%29%20they%20often%20generate%20incoherent%20full-body%20motions%20due%20to%20integrating%20independently%20generated%20part%20motions.%20To%20overcome%20these%20issues%20and%20resolve%20the%20fundamental%20trade-off%20in%20existing%20methods%2C%20we%20propose%20ParTY%2C%20a%20novel%20framework%20that%20enhances%20part%20expressiveness%20while%20generating%20coherent%20full-body%20motions.%20ParTY%20comprises%3A%20%281%29%20Part-Guided%20Network%2C%20which%20first%20generates%20part%20motions%20to%20obtain%20part%20guidance%2C%20then%20uses%20it%20to%20generate%20holistic%20motions%3B%20%282%29%20Part-aware%20Text%20Grounding%2C%20which%20diversely%20transforms%20text%20embeddings%20and%20appropriately%20aligns%20them%20with%20each%20body%20part%3B%20and%20%283%29%20Holistic-Part%20Fusion%2C%20which%20adaptively%20fuses%20holistic%20motions%20and%20part%20motions.%20Extensive%20experiments%2C%20including%20part-level%20and%20coherence-level%20evaluations%2C%20demonstrate%20that%20ParTY%20achieves%20substantial%20improvements%20over%20previous%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2603.09611v1&entry.124074799=Read"},
{"title": "MSSR: Memory-Aware Adaptive Replay for Continual LLM Fine-Tuning", "author": "Yiyang Lu and Yu He and Jianlong Chen and Hongyuan Zha", "abstract": "Continual fine-tuning of large language models (LLMs) is becoming increasingly crucial as these models are deployed in dynamic environments where tasks and data distributions evolve over time. While strong adaptability enables rapid acquisition of new knowledge, it also exposes LLMs to catastrophic forgetting, where previously learned skills degrade during sequential training. Existing replay-based strategies, such as fixed interleaved replay, accuracy-supervised, and loss-driven scheduling, remain limited: some depend on heuristic rules and provide only partial mitigation of forgetting, while others improve performance but incur substantial computational overhead. Motivated by retention dynamics under sequential fine-tuning, we propose Memory-Inspired Sampler and Scheduler Replay (MSSR), an experience replay framework that estimates sample-level memory strength and schedules rehearsal at adaptive intervals to mitigate catastrophic forgetting while maintaining fast adaptation. Extensive experiments across three backbone models and 11 sequential tasks show that MSSR consistently outperforms state-of-the-art replay baselines, with particularly strong gains on reasoning-intensive and multiple-choice benchmarks.", "link": "http://arxiv.org/abs/2603.09892v1", "date": "2026-03-10", "relevancy": 2.3472, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4948}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4677}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4459}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MSSR%3A%20Memory-Aware%20Adaptive%20Replay%20for%20Continual%20LLM%20Fine-Tuning&body=Title%3A%20MSSR%3A%20Memory-Aware%20Adaptive%20Replay%20for%20Continual%20LLM%20Fine-Tuning%0AAuthor%3A%20Yiyang%20Lu%20and%20Yu%20He%20and%20Jianlong%20Chen%20and%20Hongyuan%20Zha%0AAbstract%3A%20Continual%20fine-tuning%20of%20large%20language%20models%20%28LLMs%29%20is%20becoming%20increasingly%20crucial%20as%20these%20models%20are%20deployed%20in%20dynamic%20environments%20where%20tasks%20and%20data%20distributions%20evolve%20over%20time.%20While%20strong%20adaptability%20enables%20rapid%20acquisition%20of%20new%20knowledge%2C%20it%20also%20exposes%20LLMs%20to%20catastrophic%20forgetting%2C%20where%20previously%20learned%20skills%20degrade%20during%20sequential%20training.%20Existing%20replay-based%20strategies%2C%20such%20as%20fixed%20interleaved%20replay%2C%20accuracy-supervised%2C%20and%20loss-driven%20scheduling%2C%20remain%20limited%3A%20some%20depend%20on%20heuristic%20rules%20and%20provide%20only%20partial%20mitigation%20of%20forgetting%2C%20while%20others%20improve%20performance%20but%20incur%20substantial%20computational%20overhead.%20Motivated%20by%20retention%20dynamics%20under%20sequential%20fine-tuning%2C%20we%20propose%20Memory-Inspired%20Sampler%20and%20Scheduler%20Replay%20%28MSSR%29%2C%20an%20experience%20replay%20framework%20that%20estimates%20sample-level%20memory%20strength%20and%20schedules%20rehearsal%20at%20adaptive%20intervals%20to%20mitigate%20catastrophic%20forgetting%20while%20maintaining%20fast%20adaptation.%20Extensive%20experiments%20across%20three%20backbone%20models%20and%2011%20sequential%20tasks%20show%20that%20MSSR%20consistently%20outperforms%20state-of-the-art%20replay%20baselines%2C%20with%20particularly%20strong%20gains%20on%20reasoning-intensive%20and%20multiple-choice%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09892v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7 state-of-the-art%20replay%20baselines%2C%20with%20particularly%20strong%20gains%20on%20reasoning-intensive%20and%20multiple-choice%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2603.09892v1&entry.124074799=Read"},
{"title": "World2Mind: Cognition Toolkit for Allocentric Spatial Reasoning in Foundation Models", "author": "Shouwei Ruan and Bin Wang and Zhenyu Wu and Qihui Zhu and Yuxiang Zhang and Hang Su and Yubin Wang", "abstract": "Achieving robust spatial reasoning remains a fundamental challenge for current Multimodal Foundation Models (MFMs). Existing methods either overfit statistical shortcuts via 3D grounding data or remain confined to 2D visual perception, limiting both spatial reasoning accuracy and generalization in unseen scenarios. Inspired by the spatial cognitive mapping mechanisms of biological intelligence, we propose World2Mind, a training-free spatial intelligence toolkit. At its core, World2Mind leverages 3D reconstruction and instance segmentation models to construct structured spatial cognitive maps, empowering MFMs to proactively acquire targeted spatial knowledge regarding interested landmarks and routes of interest. To provide robust geometric-topological priors, World2Mind synthesizes an Allocentric-Spatial Tree (AST) that uses elliptical parameters to model the top-down layout of landmarks accurately. To mitigate the inherent inaccuracies of 3D reconstruction, we introduce a three-stage reasoning chain comprising tool invocation assessment, modality-decoupled cue collection, and geometry-semantics interwoven reasoning. Extensive experiments demonstrate that World2Mind boosts the performance of frontier models, such as GPT-5.2, by 5%~18%. Astonishingly, relying solely on the AST-structured text, purely text-only foundation models can perform complex 3D spatial reasoning, achieving performance approaching that of advanced multimodal models.", "link": "http://arxiv.org/abs/2603.09774v1", "date": "2026-03-10", "relevancy": 2.3353, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5848}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5848}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20World2Mind%3A%20Cognition%20Toolkit%20for%20Allocentric%20Spatial%20Reasoning%20in%20Foundation%20Models&body=Title%3A%20World2Mind%3A%20Cognition%20Toolkit%20for%20Allocentric%20Spatial%20Reasoning%20in%20Foundation%20Models%0AAuthor%3A%20Shouwei%20Ruan%20and%20Bin%20Wang%20and%20Zhenyu%20Wu%20and%20Qihui%20Zhu%20and%20Yuxiang%20Zhang%20and%20Hang%20Su%20and%20Yubin%20Wang%0AAbstract%3A%20Achieving%20robust%20spatial%20reasoning%20remains%20a%20fundamental%20challenge%20for%20current%20Multimodal%20Foundation%20Models%20%28MFMs%29.%20Existing%20methods%20either%20overfit%20statistical%20shortcuts%20via%203D%20grounding%20data%20or%20remain%20confined%20to%202D%20visual%20perception%2C%20limiting%20both%20spatial%20reasoning%20accuracy%20and%20generalization%20in%20unseen%20scenarios.%20Inspired%20by%20the%20spatial%20cognitive%20mapping%20mechanisms%20of%20biological%20intelligence%2C%20we%20propose%20World2Mind%2C%20a%20training-free%20spatial%20intelligence%20toolkit.%20At%20its%20core%2C%20World2Mind%20leverages%203D%20reconstruction%20and%20instance%20segmentation%20models%20to%20construct%20structured%20spatial%20cognitive%20maps%2C%20empowering%20MFMs%20to%20proactively%20acquire%20targeted%20spatial%20knowledge%20regarding%20interested%20landmarks%20and%20routes%20of%20interest.%20To%20provide%20robust%20geometric-topological%20priors%2C%20World2Mind%20synthesizes%20an%20Allocentric-Spatial%20Tree%20%28AST%29%20that%20uses%20elliptical%20parameters%20to%20model%20the%20top-down%20layout%20of%20landmarks%20accurately.%20To%20mitigate%20the%20inherent%20inaccuracies%20of%203D%20reconstruction%2C%20we%20introduce%20a%20three-stage%20reasoning%20chain%20comprising%20tool%20invocation%20assessment%2C%20modality-decoupled%20cue%20collection%2C%20and%20geometry-semantics%20interwoven%20reasoning.%20Extensive%20experiments%20demonstrate%20that%20World2Mind%20boosts%20the%20performance%20of%20frontier%20models%2C%20such%20as%20GPT-5.2%2C%20by%205%25~18%25.%20Astonishingly%2C%20relying%20solely%20on%20the%20AST-structured%20text%2C%20purely%20text-only%20foundation%20models%20can%20perform%20complex%203D%20spatial%20reasoning%2C%20achieving%20performance%20approaching%20that%20of%20advanced%20multimodal%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09774v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWorld2Mind%253A%2520Cognition%2520Toolkit%2520for%2520Allocentric%2520Spatial%2520Reasoning%2520in%2520Foundation%2520Models%26entry.906535625%3DShouwei%2520Ruan%2520and%2520Bin%2520Wang%2520and%2520Zhenyu%2520Wu%2520and%2520Qihui%2520Zhu%2520and%2520Yuxiang%2520Zhang%2520and%2520Hang%2520Su%2520and%2520Yubin%2520Wang%26entry.1292438233%3DAchieving%2520robust%2520spatial%2520reasoning%2520remains%2520a%2520fundamental%2520challenge%2520for%2520current%2520Multimodal%2520Foundation%2520Models%2520%2528MFMs%2529.%2520Existing%2520methods%2520either%2520overfit%2520statistical%2520shortcuts%2520via%25203D%2520grounding%2520data%2520or%2520remain%2520confined%2520to%25202D%2520visual%2520perception%252C%2520limiting%2520both%2520spatial%2520reasoning%2520accuracy%2520and%2520generalization%2520in%2520unseen%2520scenarios.%2520Inspired%2520by%2520the%2520spatial%2520cognitive%2520mapping%2520mechanisms%2520of%2520biological%2520intelligence%252C%2520we%2520propose%2520World2Mind%252C%2520a%2520training-free%2520spatial%2520intelligence%2520toolkit.%2520At%2520its%2520core%252C%2520World2Mind%2520leverages%25203D%2520reconstruction%2520and%2520instance%2520segmentation%2520models%2520to%2520construct%2520structured%2520spatial%2520cog ds%20either%20overfit%20statistical%20shortcuts%20via%203D%20grounding%20data%20or%20remain%20confined%20to%202D%20visual%20perception%2C%20limiting%20both%20spatial%20reasoning%20accuracy%20and%20generalization%20in%20unseen%20scenarios.%20Inspired%20by%20the%20spatial%20cognitive%20mapping%20mechanisms%20of%20biological%20intelligence%2C%20we%20propose%20World2Mind%2C%20a%20training-free%20spatial%20intelligence%20toolkit.%20At%20its%20core%2C%20World2Mind%20leverages%203D%20reconstruction%20and%20instance%20segmentation%20models%20to%20construct%20structured%20spatial%20cognitive%20maps%2C%20empowering%20MFMs%20to%20proactively%20acquire%20targeted%20spatial%20knowledge%20regarding%20interested%20landmarks%20and%20routes%20of%20interest.%20To%20provide%20robust%20geometric-topological%20priors%2C%20World2Mind%20synthesizes%20an%20Allocentric-Spatial%20Tree%20%28AST%29%20that%20uses%20elliptical%20parameters%20to%20model%20the%20top-down%20layout%20of%20landmarks%20accurately.%20To%20mitigate%20the%20inherent%20inaccuracies%20of%203D%20reconstruction%2C%20we%20introduce%20a%20three-stage%20reasoning%20chain%20comprising%20tool%20invocation%20assessment%2C%20modality-decoupled%20cue%20collection%2C%20and%20geometry-semantics%20interwoven%20reasoning.%20Extensive%20experiments%20demonstrate%20that%20World2Mind%20boosts%20the%20performance%20of%20frontier%20models%2C%20such%20as%20GPT-5.2%2C%20by%205%25~18%25.%20Astonishingly%2C%20relying%20solely%20on%20the%20AST-structured%20text%2C%20purely%20text-only%20foundation%20models%20can%20perform%20complex%203D%20spatial%20reasoning%2C%20achieving%20performance%20approaching%20that%20of%20advanced%20multimodal%20models.&entry.1838667208=http%3A//arxiv.org/abs/2603.09774v1&entry.124074799=Read"},
{"title": "SDR-GAIN: A High Real-Time Occluded Pedestrian Pose Completion Method for Autonomous Driving", "author": "Honghao Fu and Yongli Gu and Yidong Yan and Yilang Shen and Yiwen Wu and Libo Sun", "abstract": "With the advancement of vision-based autonomous driving technology, pedestrian detection have become an important component for improving traffic safety and driving system robustness. Nevertheless, in complex traffic scenarios, conventional pose estimation approaches frequently fail to accurately reconstruct occluded keypoints, primarily due to obstructions caused by vehicles, vegetation, or architectural elements. To address this issue, we propose a novel real-time occluded pedestrian pose completion framework termed Separation and Dimensionality Reduction-based Generative Adversarial Imputation Nets (SDR-GAIN). Unlike previous approaches that train visual models to distinguish occlusion patterns, SDR-GAIN aims to learn human pose directly from the numerical distribution of keypoint coordinates and interpolate missing positions. It employs a self-supervised adversarial learning paradigm to train lightweight generators with residual structures for the imputation of missing pose keypoints. Additionally, it integrates multiple pose standardization techniques to alleviate the difficulty of the learning process. Experiments conducted on the COCO and JAAD datasets demonstrate that SDR-GAIN surpasses conventional machine learning and Transformer-based missing data interpolation algorithms in accurately recovering occluded pedestrian keypoints, while simultaneously achieving microsecond-level real-time inference.", "link": "http://arxiv.org/abs/2306.03538v6", "date": "2026-03-10", "relevancy": 2.33, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5927}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5769}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SDR-GAIN%3A%20A%20High%20Real-Time%20Occluded%20Pedestrian%20Pose%20Completion%20Method%20for%20Autonomous%20Driving&body=Title%3A%20SDR-GAIN%3A%20A%20High%20Real-Time%20Occluded%20Pedestrian%20Pose%20Completion%20Method%20for%20Autonomous%20Driving%0AAuthor%3A%20Honghao%20Fu%20and%20Yongli%20Gu%20and%20Yidong%20Yan%20and%20Yilang%20Shen%20and%20Yiwen%20Wu%20and%20Libo%20Sun%0AAbstract%3A%20With%20the%20advancement%20of%20vision-based%20autonomous%20driving%20technology%2C%20pedestrian%20detection%20have%20become%20an%20important%20component%20for%20improving%20traffic%20safety%20and%20driving%20system%20robustness.%20Nevertheless%2C%20in%20complex%20traffic%20scenarios%2C%20conventional%20pose%20estimation%20approaches%20frequently%20fail%20to%20accurately%20reconstruct%20occluded%20keypoints%2C%20primarily%20due%20to%20obstructions%20caused%20by%20vehicles%2C%20vegetation%2C%20or%20architectural%20elements.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20real-time%20occluded%20pedestrian%20pose%20completion%20framework%20termed%20Separation%20and%20Dimensionality%20Reduction-based%20Generative%20Adversarial%20Imputation%20Nets%20%28SDR-GAIN%29.%20Unlike%20previous%20approaches%20that%20train%20visual%20models%20to%20distinguish%20occlusion%20patterns%2C%20SDR-GAIN%20aims%20to%20learn%20human%20pose%20directly%20from%20the%20numerical%20distribution%20of%20keypoint%20coordinates%20and%20interpolate%20missing%20positions.%20It%20employs%20a%20self-supervised%20adversarial%20learning%20paradigm%20to%20train%20lightweight%20generators%20with%20residual%20structures%20for%20the%20imputation%20of%20missing%20pose%20keypoints.%20Additionally%2C%20it%20integrates%20multiple%20pose%20standardization%20techniques%20to%20alleviate%20the%20difficulty%20of%20the%20learning%20process.%20Experiments%20conducted%20on%20the%20COCO%20and%20JAAD%20datasets%20demonstrate%20that%20SDR-GAIN%20surpasses%20conventional%20machine%20learning%20and%20Transformer-based%20missing%20data%20interpolation%20algorithms%20in%20accurately%20recovering%20occluded%20pedestrian%20keypoints%2C%20while%20simultaneously%20achieving%20microsecond-level%20real-time%20inference.%0ALink%3A%20http%3A//arxiv.org/abs/2306.03538v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSDR-GAIN%253A%2520A%2520High%2520Real-Time%2520Occluded%2520Pedestrian%2520Pose%2520Completion%2520Method%2520for%2520Autonomous%2520Driving%26entry.906535625%3DHonghao%2520Fu%2520and%2520Yongli%2520Gu%2520and%2520Yidong%2520Yan%2520and%2520Yilang%2520Shen%2520and%2520Yiwen%2520Wu%2520and%2520Libo%2520Sun%26entry.1292438233%3DWith%2520the%2520advancement%2520of%2520vision-based%2520autonomous%2520driving%2520technology%252C%2520pedestrian%2520detection%2520have%2520become%2520an%2520important%2520component%2520for%2520improving%2520traffic%2520safety%2520and%2520driving%2520system%2520robustness.%2520Nevertheless%252C%2520in%2520complex%2520traffic%2520scenarios%252C%2520conventional%2520pose%2520estimation%2520approaches%2520frequently%2520fail%2520to%2520accurately%2520reconstruct%2520occluded%2520keypoints%252C%2520primarily%2520due%2520to%2520obstructions%2520caused%2520by%2520vehicles%252C%2520vegetation%252C%2520or%2520architectural%2520elements.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520a%2520novel%2520real-time%2520occluded%2520pedestrian%2520pose%2520completion%2520framework%2520termed%2520Separation%2520and%2520Dimensionality%2520Reduction-based%2520Generative%2520Adversarial%2520Imputation%2520Nets%2520%2528SDR-GAIN%2529.%2520Unlike%2520previous%2520approaches%2520that%2520train%2520visual%2520models%2520to%2520distinguish%2520occlusion%2520patterns%252C%2520SDR-GAIN%252

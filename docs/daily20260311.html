{"title": "AVGGT: Rethinking Global Attention for Accelerating VGGT", "author": "Xianbing Sun and Zhikai Zhu and Zhengyu Lou and Bo Yang and Jinyang Tang and Liqing Zhang and He Wang and Jianfu Zhang", "abstract": "Models such as VGGT and $\u03c0^3$ have shown strong multi-view 3D performance, but their heavy reliance on global self-attention results in high computational cost. Existing sparse-attention variants offer partial speedups, yet lack a systematic analysis of how global attention contributes to multi-view reasoning. In this paper, we first conduct an in-depth investigation of the global attention modules in VGGT and $\u03c0^3$ to better understand their roles. Our analysis reveals a clear division of roles in the alternating global-frame architecture: early global layers do not form meaningful correspondences, middle layers perform cross-view alignment, and last layers provide only minor refinements. Guided by these findings, we propose a training-free two-step acceleration scheme: (1) converting early global layers into frame attention, and (2) subsampling global attention by subsampling K/V over patch tokens with diagonal preservation and a mean-fill component. We instantiate this strategy on VGGT and $\u03c0^3$ and evaluate across standard pose and point-map benchmarks. Our method achieves substantial inference acceleration across different context lengths, yielding about $2\\times$ speedup at 100 frames, $4$--$5\\times$ at 300 frames, and $8$--$10\\times$ at 800 frames, while matching or slightly improving the accuracy of the original models and remaining robust in extremely dense multi-view settings where prior sparse-attention baselines fail.", "link": "http://arxiv.org/abs/2512.02541v2", "date": "2026-03-10", "relevancy": 2.8376, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5784}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5769}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AVGGT%3A%20Rethinking%20Global%20Attention%20for%20Accelerating%20VGGT&body=Title%3A%20AVGGT%3A%20Rethinking%20Global%20Attention%20for%20Accelerating%20VGGT%0AAuthor%3A%20Xianbing%20Sun%20and%20Zhikai%20Zhu%20and%20Zhengyu%20Lou%20and%20Bo%20Yang%20and%20Jinyang%20Tang%20and%20Liqing%20Zhang%20and%20He%20Wang%20and%20Jianfu%20Zhang%0AAbstract%3A%20Models%20such%20as%20VGGT%20and%20%24%CF%80%5E3%24%20have%20shown%20strong%20multi-view%203D%20performance%2C%20but%20their%20heavy%20reliance%20on%20global%20self-attention%20results%20in%20high%20computational%20cost.%20Existing%20sparse-attention%20variants%20offer%20partial%20speedups%2C%20yet%20lack%20a%20systematic%20analysis%20of%20how%20global%20attention%20contributes%20to%20multi-view%20reasoning.%20In%20this%20paper%2C%20we%20first%20conduct%20an%20in-depth%20investigation%20of%20the%20global%20attention%20modules%20in%20VGGT%20and%20%24%CF%80%5E3%24%20to%20better%20understand%20their%20roles.%20Our%20analysis%20reveals%20a%20clear%20division%20of%20roles%20in%20the%20alternating%20global-frame%20architecture%3A%20early%20global%20layers%20do%20not%20form%20meaningful%20correspondences%2C%20middle%20layers%20perform%20cross-view%20alignment%2C%20and%20last%20layers%20provide%20only%20minor%20refinements.%20Guided%20by%20these%20findings%2C%20we%20propose%20a%20training-free%20two-step%20acceleration%20scheme%3A%20%281%29%20converting%20early%20global%20layers%20into%20frame%20attention%2C%20and%20%282%29%20subsampling%20global%20attention%20by%20subsampling%20K/V%20over%20patch%20tokens%20with%20diagonal%20preservation%20and%20a%20mean-fill%20component.%20We%20instantiate%20this%20strategy%20on%20VGGT%20and%20%24%CF%80%5E3%24%20and%20evaluate%20across%20standard%20pose%20and%20point-map%20benchmarks.%20Our%20method%20achieves%20substantial%20inference%20acceleration%20across%20different%20context%20lengths%2C%20yielding%20about%20%242%5Ctimes%24%20speedup%20at%20100%20frames%2C%20%244%24--%245%5Ctimes%24%20at%20300%20frames%2C%20and%20%248%24--%2410%5Ctimes%24%20at%20800%20frames%2C%20while%20matching%20or%20slightly%20improving%20the%20accuracy%20of%20the%20original%20models%20and%20remaining%20robust%20in%20extremely%20dense%20multi-view%20settings%20where%20prior%20sparse-attention%20baselines%20fail.%0ALink%3A%20http%3A//arxiv.org/abs/2512.02541v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAVGGT%253A%2520Rethinking%2520Global%2520Attention%2520for%2520Accelerating%2520VGGT%26entry.906535625%3DXianbing%2520Sun%2520and%2520Zhikai%2520Zhu%2520and%2520Zhengyu%2520Lou%2520and%2520Bo%2520Yang%2520and%2520Jinyang%2520Tang%2520and%2520Liqing%2520Zhang%2520and%2520He%2520Wang%2520and%2520Jianfu%2520Zhang%26entry.1292438233%3DModels%2520such%2520as%2520VGGT%2520and%2520%2524%25CF%2580%255E3%2524%2520have%2520shown%2520strong%2520multi-view%25203D%2520performance%252C%2520but%2520their%2520heavy%2520reliance%2520on%2520global%2520self-attention%2520results%2520in%2520high%2520computational%2520cost.%2520Existing%2520sparse-attention%2520variants%2520offer%2520partial%2520speedups%252C%2520yet%2520lack%2520a%2520systematic%2520analysis%2520of%2520how%2520global%2520attention%2520contributes%2520to%2520multi-view%2520reasoning.%2520In%2520this%2520paper%252C%2520we%2520first%2520conduct%2520an%2520in-depth%2520investigation%2520of%2520the%2520global%2520attention%2520modules%2520in%2520VGGT%2520and%2520%2524%25CF%2580%255E3%2524%2520to%2520better%2520understand%2520their%2520roles.%2520Our%2520analysis%2520reveals%2520a%2520clear%2520division%2520of%2520roles%2 {"title": "Probing the Reliability of Driving VLMs: From Inconsistent Responses to Grounded Temporal Reasoning", "author": "Chun-Peng Chang and Chen-Yu Wang and Holger Caesar and Alain Pagani", "abstract": "A reliable driving assistant should provide consistent responses based on temporally grounded reasoning derived from observed information. In this work, we investigate whether Vision-Language Models (VLMs), when applied as driving assistants, can response consistantly and understand how present observations shape future outcomes, or whether their outputs merely reflect patterns memorized during training without temporally grounded reasoning. While recent efforts have integrated VLMs into autonomous driving, prior studies typically emphasize scene understanding and instruction generation, implicitly assuming that strong visual interpretation naturally enables consistant future reasoning and thus ensures reliable decision-making, a claim we critically examine. We focus on two major challenges limiting VLM reliability in this setting: response inconsistency, where minor input perturbations yield different answers or, in some cases, responses degenerate toward near-random guessing, and limited temporal reasoning, in which models fail to reason and align sequential events from current observations, often resulting in incorrect or even contradictory responses. Moreover, we find that models with strong visual understanding do not necessarily perform best on tasks requiring temporal reasoning, indicating a tendency to over-rely on pretrained patterns rather than modeling temporal dynamics. To address these issues, we adopt existing evaluation methods and introduce FutureVQA, a human-annotated benchmark dataset specifically designed to assess future scene reasoning. In addition, we propose a simple yet effective self-supervised tuning approach with chain-of-thought reasoning that improves both consistency and temporal reasoning without requiring temporal labels.", "link": "http://arxiv.org/abs/2603.09512v1", "date": "2026-03-10", "relevancy": 2.8182, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Probing%20the%20Reliability%20of%20Driving%20VLMs%3A%20From%20Inconsistent%20Responses%20to%20Grounded%20Temporal%20Reasoning&body=Title%3A%20Probing%20the%20Reliability%20of%20Driving%20VLMs%3A%20From%20Inconsistent%20Responses%20to%20Grounded%20Temporal%20Reasoning%0AAuthor%3A%20Chun-Peng%20Chang%20and%20Chen-Yu%20Wang%20and%20Holger%20Caesar%20and%20Alain%20Pagani%0AAbstract%3A%20A%20reliable%20driving%20assistant%20should%20provide%20consistent%20responses%20based%20on%20temporally%20grounded%20reasoning%20derived%20from%20observed%20information.%20In%20this%20work%2C%20we%20investigate%20whether%20Vision-Language%20Models%20%28VLMs%29%2C%20when%20applied%20as%20driving%20assistants%2C%20can%20response%20consistantly%20and%20understand%20how%20present%20observations%20shape%20future%20outcomes%2C%20or%20whether%20their%20outputs%20merely%20reflect%20patterns%20memorized%20during%20training%20without%20temporally%20grounded%20reasoning.%20While%20recent%20efforts%20have%20integrated%20VLMs%20into%20autonomous%20driving%2C%20prior%20studies%20typically%20emphasize%20scene%20understanding%20and%20instruction%20generation%2C%20implicitly%20assuming%20that%20strong%20visual%20interpretation%20naturally%20enables%20consistant%20future%20reasoning%20and%20thus%20ensures%20reliable%20decision-making%2C%20a%20claim%20we%20critically%20examine.%20We%20focus%20on%20two%20major%20challenges%20limiting%20VLM%20reliability%20in%20this%20setting%3A%20response%20inconsistency%2C%20where%20minor%20input%20perturbations%20yield%20different%20answers%20or%2C%20in%20some%20cases%2C%20responses%20degenerate%20toward%20near-random%20guessing%2C%20and%20limited%20temporal%20reasoning%2C%20in%20which%20models%20fail%20to%20reason%20and%20align%20sequential%20events%20from%20current%20observations%2C%20often%20resulting%20in%20incorrect%20or%20even%20contradictory%20responses.%20Moreover%2C%20we%20find%20that%20models%20with%20strong%20visual%20understanding%20do%20not%20necessarily%20perform%20best%20on%20tasks%20requiring%20temporal%20reasoning%2C%20indicating%20a%20tendency%20to%20over-rely%20on%20pretrained%20patterns%20rather%20than%20modeling%20temporal%20dynamics.%20To%20address%20these%20issues%2C%20we%20adopt%20existing%20evaluation%20methods%20and%20introduce%20FutureVQA%2C%20a%20human-annotated%20benchmark%20dataset%20specifically%20designed%20to%20assess%20future%20scene%20reasoning.%20In%20addition%2C%20we%20propose%20a%20simple%20yet%20effective%20self-supervised%20tuning%20approach%20with%20chain-of-thought%20reasoning%20that%20improves%20both%20consistency%20and%20temporal%20reasoning%20without%20requiring%20temporal%20labels.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09512v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProbing%2520the%2520Reliability%2520of%2520Driving%2520VLMs%253A%2520From%2520Inconsistent%2520Responses%2520to%2520Grounded%2520Temporal%2520Reasoning%26entry.906535625%3DChun-Peng%2520Chang%2520and%2520Chen-Yu%2520Wang%2520and%2520Holger%2520Caesar%2520and%2520Alain%2520Pagani%26entry.1292438233%3DA%2520reliable%2520driving%2520assistant%2520should%2520provide%2520consistent%252 {"title": "SCENEBench: An Audio Understanding Benchmark Grounded in Assistive and Industrial Use Cases", "author": "Laya Iyer and Angelina Wang and Sanmi Koyejo", "abstract": "Advances in large language models (LLMs) have enabled significant capabilities in audio processing, resulting in state-of-the-art models now known as Large Audio Language Models (LALMs). However, minimal work has been done to measure audio understanding beyond automatic speech recognition (ASR). This paper closes that gap by proposing a benchmark suite, SCENEBench (Spatial, Cross-lingual, Environmental, Non-speech Evaluation), that targets a broad form of audio comprehension across four real-world categories: background sound understanding, noise localization, cross-linguistic speech understanding, and vocal characterizer recognition. These four categories are selected based on understudied needs from accessibility technology and industrial noise monitoring. In addition to performance, we also measure model latency. The purpose of this benchmark suite is to assess audio beyond just what words are said - rather, how they are said and the non-speech components of the audio. Because our audio samples are synthetically constructed (e.g., by overlaying two natural audio samples), we further validate our benchmark against 20 natural audio items per task, sub-sampled from existing datasets to match our task criteria, to assess ecological validity. We assess five state-of-the-art LALMs and find critical gaps: performance varies across tasks, with some tasks performing below random chance and others achieving high accuracy. These results provide direction for targeted improvements in model capabilities.", "link": "http://arxiv.org/abs/2603.09853v1", "date": "2026-03-10", "relevancy": 2.8041, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5906}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5906}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5014}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCENEBench%3A%20An%20Audio%20Understanding%20Benchmark%20Grounded%20in%20Assistive%20and%20Industrial%20Use%20Cases&body=Title%3A%20SCENEBench%3A%20An%20Audio%20Understanding%20Benchmark%20Grounded%20in%20Assistive%20and%20Industrial%20Use%20Cases%0AAuthor%3A%20Laya%20Iyer%20and%20Angelina%20Wang%20and%20Sanmi%20Koyejo%0AAbstract%3A%20Advances%20in%20large%20language%20models%20%28LLMs%29%20have%20enabled%20significant%20capabilities%20in%20audio%20processing%2C%20resulting%20in%20state-of-the-art%20models%20now%20known%20as%20Large%20Audio%20Language%20Models%20%28LALMs%29.%20However%2C%20minimal%20work%20has%20been%20done%20to%20measure%20audio%20understanding%20beyond%20automatic%20speech%20recognition%20%28ASR%29.%20This%20paper%20closes%20that%20gap%20by%20proposing%20a%20benchmark%20suite%2C%20SCENEBench%20%28Spatial%2C%20Cross-lingual%2C%20Environmental%2C%20Non-speech%20Evaluation%29%2C%20that%20targets%20a%20broad%20form%20of%20audio%20comprehension%20across%20four%20real-world%20categories%3A%20background%20sound%20understanding%2C%20noise%20localization%2C%20cross-linguistic%20speech%20understanding%2C%20and%20vocal%20characterizer%20recognition.%20These%20four%20categories%20are%20selected%20based%20on%20understudied%20needs%20from%20accessibility%20technology%20and%20industrial%20noise%20monitoring.%20In%20addition%20to%20performance%2C%20we%20also%20measure%20model%20latency.%20The%20purpose%20of%20this%20benchmark%20suite%20is%20to%20assess%20audio%20beyond%20just%20what%20words%20are%20said%20-%20rather%2C%20how%20they%20are%20said%20and%20the%20non-speech%20components%20of%20the%20audio.%20Because%20our%20audio%20samples%20are%20synthetically%20constructed%20%28e.g.%2C%20by%20overlaying%20two%20natural%20audio%20samples%29%2C%20we%20further%20validate%20our%20benchmark%20against%2020%20natural%20audio%20items%20per%20task%2C%20sub-sampled%20from%20existing%20datasets%20to%20match%20our%20task%20criteria%2C%20to%20assess%20ecological%20validity.%20We%20assess%20five%20state-of-the-art%20LALMs%20and%20find%20critical%20gaps%3A%20performance%20varies%20across%20tasks%2C%20with%20some%20tasks%20performing%20below%20random%20chance%20and%20others%20achieving%20high%20accuracy.%20These%20results%20provide%20direction%20for%20targeted%20improvements%20in%20model%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09853v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSCENEBench%253A%2520An%2520Audio%2520Understanding%2520Benchmark%2520Grounded%2520in%2520Assistive%2520and%2520Industrial%2520Use%2520Cases%26entry.906535625%3DLaya%2520Iyer%2520and%2520Angelina%2520Wang%2520and%2520Sanmi%2520Koyejo%26entry.1292438233%3DAdvances%2520in%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520enabled%2520significant%2520capabilities%2520in%2520audio%2520processing%252C%2520resulting%2520in%2520state-of-the-art%2520models%2520now%2520known%2520as%2520Large%2520Audio%2520Language%2520Models%2520%2528LALMs%2529.%2520However%252C%2520minimal%2520work%2520has%2520been%2520done%2520to%2520measure%2520audio%2520understanding%2520beyond%2520automatic%2520speech%2520recognition%2520%2528ASR%2529.%2520This%2520paper%2520closes%2520that%2520gap%2520by%2520proposing%2520a%2520benchmark%2520suite%252C%2520SCENEBench%2520%2528Spatial%252C%2520Cross-lingual%252C%2520Environmental%252C%2520Non-speech%2520Evaluation%2529%252C%2520that%2520targets%2520a%2520broad%2520form%2520of%2520audio%2520comprehension%2520across%2520four%2520real-world%2520categories%253A%2520backgr {"title": "EvoDriveVLA: Evolving Autonomous Driving Vision-Language-Action Model via Collaborative Perception-Planning Distillation", "author": "Jiajun Cao and Xiaoan Zhang and Xiaobao Wei and Liyuqiu Huang and Wang Zijian and Hanzhen Zhang and Zhengyu Jia and Wei Mao and Hao Wang and Xianming Liu and Shuchang Zhou Liu and Yang Wang and Shanghang Zhang", "abstract": "Vision-Language-Action models have shown great promise for autonomous driving, yet they suffer from degraded perception after unfreezing the visual encoder and struggle with accumulated instability in long-term planning. To address these challenges, we propose EvoDriveVLA-a novel collaborative perception-planning distillation framework that integrates self-anchored perceptual constraints and oracle-guided trajectory optimization. Specifically, self-anchored visual distillation leverages self-anchor teacher to deliver visual anchoring constraints, regularizing student representations via trajectory-guided key-region awareness. In parallel, oracle-guided trajectory distillation employs a future-aware oracle teacher with coarse-to-fine trajectory refinement and Monte Carlo dropout sampling to produce high-quality trajectory candidates, thereby selecting the optimal trajectory to guide the student's prediction. EvoDriveVLA achieves SOTA performance in open-loop evaluation and significantly enhances performance in closed-loop evaluation. Our code is available at: https://github.com/hey-cjj/EvoDriveVLA.", "link": "http://arxiv.org/abs/2603.09465v1", "date": "2026-03-10", "relevancy": 2.7524, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Unders hances%20performance%20in%20closed-loop%20evaluation.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/hey-cjj/EvoDriveVLA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09465v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvoDriveVLA%253A%2520Evolving%2520Autonomous%2520Driving%2520Vision-Language-Action%2520Model%2520via%2520Collaborative%2520Perception-Planning%2520Distillation%26entry.906535625%3DJiajun%2520Cao%2520and%2520Xiaoan%2520Zhang%2520and%2520Xiaobao%2520Wei%2520and%2520Liyuqiu%2520Huang%2520and%2520Wang%2520Zijian%2520and%2520Hanzhen%2520Zhang%2520and%2520Zhengyu%2520Jia%2520and%2520Wei%2520Mao%2520and%2520Hao%2520Wang%2520and%2520Xianming%2520Liu%2520and%2520Shuchang%2520Zhou%2520Liu%2520and%2520Yang%2520Wang%2520and%2520Shanghang%2520Zhang%26entry.1292438233%3DVision-Language-Action%2520models%2520have%2520shown%2520great%2520promise%2520for%2520autonomous%2520driving%252C%2520yet%2520they%2520suffer%2520from%2520degraded%2520perception%2520after%2520unfreezing%2520the%2520visual%2520encoder%2520and%2520struggle%2520with%2520accumulated%2520instability%2520in%2520long-term%2520planning.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520EvoDriveVLA-a%2520novel%2520collaborative%2520perception-planning%2520distillation%2520framework%2520that%2520integrates%2520self-anchored%2520perceptual%2520constraints%2520and%2520oracle-guided%2520trajectory%2520optimization.%2520Specifically%252C%2520self-anchored%2520visual%2520distillation%2520leverages%2520self-anchor%2520teacher%2520to%2520deliver%2520visual%2520anchoring%2520constraints%252C%2520regularizing%2520student%2520representations%2520via%2520trajectory-guided%2520key-region%2520awareness.%2520In%2520parallel%252C%2520oracle-guided%2520trajectory%2520distillation%2520employs%2520a%2520future-aware%2520oracle%2520teacher%2520with%2520coarse-to-fine%2520trajectory%2520refinement%2520and% {"title": "MUGEN: Evaluating and Improving Multi-audio Understanding of Large Audio-Language Models", "author": "Chih-Kai Yang and Yun-Shao Tsai and Yu-Kai Guo and Ping-Le Tsai and Yen-Ting Piao and Hung-Wei Chen and Ting-Lin Hsiao and Yun-Man Hsu and Ke-Han Lu and Hung-yi Lee", "abstract": "While multi-audio understanding is critical for large audio-language models (LALMs), it remains underexplored. We introduce MUGEN, a comprehensive benchmark evaluating this capability across speech, general audio, and music. Our experiments reveal consistent weaknesses in multi-audio settings, and performance degrades sharply as the number of concurrent audio inputs increases, identifying input scaling as a fundamental bottleneck. We further investigate training-free strategies and observe that Audio-Permutational Self-Consistency, which diversifies the order of audio candidates, helps models form more robust aggregated predictions, yielding up to 6.28% accuracy gains. Combining this permutation strategy with Chain-of-Thought further improves performance to 6.74%. These results expose blind spots in current LALMs and provide a foundation for evaluating complex auditory comprehension.", "link": "http://arxiv.org/abs/2603.09714v1", "date": "2026-03-10", "relevancy": 2.7094, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MUGEN%3A%20Evaluating%20and%20Improving%20Multi-audio%20Understanding%20of%20Large%20Audio-Language%20Models&body=Title%3A%20MUGEN%3A%20Evaluating%20and%20Improving%20Multi-audio%20Understanding%20of%20Large%20Audio-Language%20Models%0AAuthor%3A%20Chih-Kai%20Yang%20and%20Yun-Shao%20Tsai%20and%20Yu-Kai%20Guo%20and%20Ping-Le%20Tsai%20and%20Yen-Ting%20Piao%20and%20Hung-Wei%20Chen%20and%20Ting-Lin%20Hsiao%20and%20Yun-Man%20Hsu%20and%20Ke-Han%20Lu%20and%20Hung-yi%20Lee%0AAbstract%3A%20While%20multi-audio%20understanding%20is%20critical%20for%20large%20audio-language%20models%20%28LALMs%29%2C%20it%20remains%20underexplored.%20We%20introduce%20MUGEN%2C%20a%20comprehensive%20benchmark%20evaluating%20this%20capability%20across%20speech%2C%20general%20audio%2C%20and%20music.%20Our%20experiments%20reveal%20consistent%20weaknesses%20in%20multi-audio%20settings%2C%20and%20performance%20degrades%20sharply%20as%20the%20number%20of%20concurrent%20audio%20inputs%20increases%2C%20identifying%20input%20scaling%20as%20a%20fundamental%20bottleneck.%20We%20further%20investigate%20training-free%20strategies%20and%20observe%20that%20Audio-Permutational%20Self-Consistency%2C%20which%20diversifies%20the%20order%20of%20audio%20candidates%2C%20helps%20models%20form%20more%20robust%20aggregated%20predictions%2C%20yielding%20up%20to%206.28%25%20accuracy%20gains.%20Combining%20this%20permutation%20strategy%20with%20Chain-of-Thought%20further%20improves%20performance%20to%206.74%25.%20These%20results%20expose%20blind%20spots%20in%20current%20LALMs%20and%20provide%20a%20foundation%20for%20evaluating%20complex%20auditory%20comprehension.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09714v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMUGEN%253A%2520Evaluating%2520and%2520Improving%2520Multi-audio%2520Understanding%2520of%2520Large%2520Audio-Language%2520Models%26entry.906535625%3DChih-Kai%2520Yang%2520and%2520Yun-Shao%2520Tsai%2520and%2520Yu-Kai%2520Guo%2520and%2520Ping-Le%2520Tsai%2520and%2520Yen-Ting%2520Piao%2520and%2520Hung-Wei%2520Chen%2520and%2520Ting-Lin%2520Hsiao%2520and%252 0Hsu%20and%20Ke-Han%20Lu%20and%20Hung-yi%20Lee&entry.1292438233=While%20multi-audio%20understanding%20is%20critical%20for%20large%20audio-language%20models%20%28LALMs%29%2C%20it%20remains%20underexplored.%20We%20introduce%20MUGEN%2C%20a%20comprehensive%20benchmark%20evaluating%20this%20capability%20across%20speech%2C%20general%20audio%2C%20and%20music.%20Our%20experiments%20reveal%20consistent%20weaknesses%20in%20multi-audio%20settings%2C%20and%20performance%20degrades%20sharply%20as%20the%20number%20of%20concurrent%20audio%20inputs%20increases%2C%20identifying%20input%20scaling%20as%20a%20fundamental%20bottleneck.%20We%20further%20investigate%20training-free%20strategies%20and%20observe%20that%20Audio-Permutational%20Self-Consistency%2C%20which%20diversifies%20the%20order%20of%20audio%20candidates%2C%20helps%20models%20form%20more%20robust%20aggregated%20predictions%2C%20yielding%20up%20to%206.28%25%20accuracy%20gains.%20Combining%20this%20permutation%20strategy%20with%20Chain-of-Thought%20further%20improves%20performance%20to%206.74%25.%20These%20results%20expose%20blind%20spots%20in%20current%20LALMs%20and%20provide%20a%20foundation%20for%20evaluating%20complex%20auditory%20comprehension.&entry.1838667208=http%3A//arxiv.org/abs/2603.09714v1&entry.124074799=Read"},
{"title": "LAP: A Language-Aware Planning Model For Procedure Planning In Instructional Videos", "author": "Lei Shi and Victor Aregbede and Andreas Persson and Martin L\u00e4ngkvist and Amy Loutfi and Stephanie Lowry", "abstract": "Procedure planning requires a model to predict a sequence of actions that transform a start visual observation into a goal in instructional videos. While most existing methods rely primarily on visual observations as input, they often struggle with the inherent ambiguity where different actions can appear visually similar. In this work, we argue that language descriptions offer a more distinctive representation in the latent space for procedure planning. We introduce Language-Aware Planning (LAP), a novel method that leverages the expressiveness of language to bridge visual observation and planning. LAP uses a finetuned Vision Language Model (VLM) to translate visual observations into text descriptions and to predict actions and extract text embeddings. These text embeddings are more distinctive than visual embeddings and are used in a diffusion model for planning action sequences. We evaluate LAP on three procedure planning benchmarks: CrossTask, Coin, and NIV. LAP achieves new state-of-the-art performance across multiple metrics and time horizons by large margin, demonstrating the significant advantage of language-aware planning.", "link": "http://arxiv.org/abs/2603.09743v1", "date": "2026-03-10", "relevancy": 2.7066, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5512}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5512}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5215}], "mailto": "mailto:haoxiang.li.2024@gmail.com? {"title": "RA-SSU: Towards Fine-Grained Audio-Visual Learning with Region-Aware Sound Source Understanding", "author": "Muyi Sun and Yixuan Wang and Hong Wang and Chen Su and Man Zhang and Xingqun Qi and Qi Li and Zhenan Sun", "abstract": "Audio-Visual Learning (AVL) is one fundamental task of multi-modality learning and embodied intelligence, displaying the vital role in scene understanding and interaction. However, previous researchers mostly focus on exploring downstream tasks from a coarse-grained perspective (e.g., audio-visual correspondence, sound source localization, and audio-visual event localization). Considering providing more specific scene perception details, we newly define a fine-grained Audio-Visual Learning task, termed Region-Aware Sound Source Understanding (RA-SSU), which aims to achieve region-aware, frame-level, and high-quality sound source understanding. To support this goal, we innovatively construct two corresponding datasets, i.e. fine-grained Music (f-Music) and fine-grained Lifescene (f-Lifescene), each containing annotated sound source masks and frame-by-frame textual descriptions. The f-Music dataset includes 3,976 samples across 22 scene types related to specific application scenarios, focusing on music scenes with complex instrument mixing. The f-Lifescene dataset contains 6,156 samples across 61 types representing diverse sounding objects in life scenarios. Moreover, we propose SSUFormer, a Sound-Source Understanding TransFormer benchmark that facilitates both the sound source segmentation and sound region description with a multi-modal input and multi-modal output architecture. Specifically, we design two modules for this framework, Mask Collaboration Module (MCM) and Mixture of Hierarchical-prompted Experts (MoHE), to respectively enhance the accuracy and enrich the elaboration of the sound source description. Extensive experiments are conducted on our two datasets to verify the feasibility of the task, evaluate the availability high-quality%20sound%20source%20understanding.%20To%20support%20this%20goal%2C%20we%20innovatively%20construct%20two%20corresponding%20datasets%2C%20i.e.%20fine-grained%20Music%20%28f-Music%29%20and%20fine-grained%20Lifescene%20%28f-Lifescene%29%2C%20each%20containing%20annotated%20sound%20source%20masks%20and%20frame-by-frame%20textual%20descriptions.%20The%20f-Music%20dataset%20includes%203%2C976%20samples%20across%2022%20scene%20types%20related%20to%20specific%20application%20scenarios%2C%20focusing%20on%20music%20scenes%20with%20complex%20instrument%20mixing.%20The%20f-Lifescene%20dataset%20contains%206%2C156%20samples%20across%2061%20types%20representing%20diverse%20sounding%20objects%20in%20life%20scenarios.%20Moreover%2C%20we%20propose%20SSUFormer%2C%20a%20Sound-Source%20Understanding%20TransFormer%20benchmark%20that%20facilitates%20both%20the%20sound%20source%20segmentation%20and%20sound%20region%20description%20with%20a%20multi-modal%20input%20and%20multi-modal%20output%20architecture.%20Specifically%2C%20we%20design%20two%20modules%20for%20this%20framework%2C%20Mask%20Collaboration%20Module%20%28MCM%29%20and%20Mixture%20of%20Hierarchical-prompted%20Experts%20%28MoHE%29%2C%20to%20respectively%20enhance%20the%20accuracy%20and%20enrich%20the%20elaboration%20of%20the%20sound%20source%20description.%20Extensive%20experiments%20are%20conducted%20on%20our%20two%20datasets%20to%20verify%20the%20feasibility%20of%20the%20task%2C%20evaluate%20the%20availability%20of%20the%20datasets%2C%20and%20demonstrate%20the%20superiority%20of%20the%20SSUFormer%2C%20which%20achieves%20SOTA%20performance%20on%20the%20Sound%20Source%20Understanding%20benchmark.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09809v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRA-SSU%253A%2520Towards%2520Fine-Grained%2520Audio-Visual%2520Learning%2520with%2520Region-Aware%2520Sound%2520Source%2520Understanding%26entry. {"title": "LCA: Local Classifier Alignment for Continual Learning", "author": "Tung Tran and Danilo Vasconcellos Vargas and Khoat Than", "abstract": "A fundamental requirement for intelligent systems is the ability to learn continuously under changing environments. However, models trained in this regime often suffer from catastrophic forgetting. Leveraging pre-trained models has recently emerged as a promising solution, since their generalized feature extractors enable faster and more robust adaptation. While some earlier works mitigate forgetting by fine-tuning only on the first task, this approach quickly deteriorates as the number of tasks grows and the data distributions diverge. More recent research instead seeks to consolidate task knowledge into a unified backbone, or adapting the backbone as new tasks arrive. However, such approaches may create a (potential) \\textit{mismatch} between task-specific classifiers and the adapted backbone. To address this issue, we propose a novel \\textit{Local Classifier Alignment} (LCA) loss to better align the classifier with backbone. Theoretically, we show that this LCA loss can enable the classifier to not only generalize well for all observed tasks, but also improve robustness. Furthermore, we develop a complete solution for continual learning, following the model merging approach and using LCA. Extensive experiments on several standard benchmarks demonstrate that our method often achieves leading performance, sometimes surpasses the state-of-the-art methods with a large margin.", "link": "http://arxiv.org/abs/2603.09888v1", "date": "2026-03-10", "relevancy": 2.6843, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5423}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5352}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5332}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LCA%3A%20Local%20Classifier%20Alignment%20for%20Continual%20Learning&body=Title%3A%20LCA%3A%20Local%20Classifier%20Alignment%20for%20Continual%20Learning%0AAuthor%3A%20Tung%20Tran%20and%20Danilo%20Vasconcellos%20Vargas%20and%20Khoat%20Than%0AAbstract%3A%20A%20fundamental%20requirement%20for%20intelligent%20systems%20is%20the%20ability%20to%20learn%20continuously%20under%20changing%20environments.%20However%2C%20models%20trained%20in%20this%20regime%20often%20suffer%20from%20catastrophic%20forgetting.%20Leveraging%20pre-trained%20models%20has%20recently%20emerged%20as%20a%20promising%20solution%2C%20since%20their%20generalized%20feature%20extractors%20enable%20faster%20and%20more%20robust%20adaptation.%20While%20some%20earlier%20works%20mitigate%20forgetting%20by%20fine-tuning%20only%20on%20the%20first%20task%2C%20this%20approach%20quickly%20deteriorates%20as%20the%20number%20of%20tasks%20grows%20and%20the%20data%20distributions%20diverge.%20More%20recent%20research%20instead%20seeks%20to%20consolidate%20task%20knowledge%20into%20a%20unified%20backbone%2C%20or%20adapting%20the%20backbone%20as%20new%20tasks%20arrive.%20However%2C%20such%20approaches%20may%20create%20a%20%28potential%29%20%5Ctextit%7Bmismatch%7D%20between%20task-specific%20classifiers%20and%20the%20adapted%20backbone.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20%5Ctextit%7BLocal%20Classifier%20Alignment%7D%20%28LCA%29%20loss%20to%20better%20align%20the%20classifier%20with%20backbone.%20Theoretically%2C%20we%20show%20that%20this%20LCA%20loss%20can%20enable%20the%20classifier%20to%20not%20only%20generalize%20well%20for%20all%20observed%20tasks%2C%20but%20also%20improve%20robustness.%20Furthermore%2C%20we%20develop%20a%20complete%20solution%20for%20continu .%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520a%2520novel%2520%255Ctextit%257BLocal%2520Classifier%2520Alignment%257D%2520%2528LCA%2529%2520loss%2520to%2520better%2520align%2520the%2520classifier%2520with%2520backbone.%2520Theoretically%252C%2520we%2520show%2520that%2520this%2520LCA%2520loss%2520can%2520enable%2520the%2520classifier%2520to%2520not%2520only%2520generalize%2520well%2520for%2520all%2520observed%2520tasks%252C%2520but%2520also%2520improve%2520robustness.%2520Furthermore%252C%2520we%2520develop%2520a%2520complete%2520solution%2520for%2520continual%2520learning%252C%2520following%2520the%2520model%2520merging%2520approach%2520and%2520using%2520LCA.%2520Extensive%2520experiments%2520on%2520several%2520standard%2520benchmarks%2520demonstrate%2520that%2520our%2520method%2520often%2520achieves%2520leading%2520performance%252C%2520sometimes%2520surpasses%2520the%2520state-of-the-art%2520methods%2520with%2520a%2520large%2520margin.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09888v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LCA%3A%20Local%20Classifier%20Alignment%20for%20Continual%20Learning&entry.906535625=Tung%20Tran%20and%20Danilo%20Vasconcellos%20Vargas%20and%20Khoat%20Than&entry.1292438233=A%20fundamental%20requirement%20for%20intelligent%20systems%20is%20the%20ability%20to%20learn%20continuously%20under%20changing%20environments.%20However%2C%20models%20trained%20in%20this%20regime%20often%20suffer%20from%20catastrophic%20forgetting.%20Leveraging%20pre-trained%20models%20has%20recently%20emerged%20as%20a%20promising%20solution%2C%20since%20their%20generalized%20feature%20extractors%20enable%20faster%20and%20more%20robust%20adaptation.%20While%20some%20earlier%20works%20mitigate%20forgetting%20by%20fine-tuning%20only%20on%20the%20first%20task%2C%20this%20approach%20quickly%20deteriorates%20as%20the%20number%20of%20tasks%20grows%20and%20the%20data%20distributions%20diverge.%20More%20recent%20research%20instead%20seeks%20to%20consolidate%20task%20knowledge%20into%20a%20unified%20backbone%2C%20or%20adapting%20the%20backbone%20as%20new%20tasks%20arrive.%20However%2C%20such%20approaches%20may%20create%20a%20%28potential%29%20%5Ctextit%7Bmismatch%7D%20between%20task-specific%20classifiers%20and%20the%20adapted%20backbone.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20%5Ctextit%7BLocal%20Classifier%20Alignment%7D%20%28LCA%29%20loss%20to%20better%20align%20the%20classifier%20with%20backbone.%20Theoretically%2C%20we%20show%20that%20this%20LCA%20loss%20can%20enable%20the%20classifier%20to%20not%20only%20generalize%20well%20for%20all%20observed%20tasks%2C%20but%20also%20improve%20robustness.%20Furthermore%2C%20we%20develop%20a%20complete%20solution%20for%20continual%20learning%2C%20following%20the%20model%20merging%20approach%20and%20using%20LCA.%20Extensive%20experiments%20on%20several%20standard%20benchmarks%20demonstrate%20that%20our%20method%20often%20achieves%20leading%20performance%2C%20sometimes%20surpasses%20the%20state-of-the-art%20methods%20with%20a%20large%20margin.&entry.1838667208=http%3A//arxiv.org/abs/2603.09888v1&entry.124074799=Read"},
{"title": "WikiCLIP: An Efficient Contrastive Baseline for Open-domain Visual Entity Recognition", "author": "Shan Ning and Longtian Qiu and Jiaxuan Sun and Xuming He", "abstract": "Open-domain visual entity recognition (VER) seeks to associate images with entities in encyclopedic knowledge bases such as Wikipedia. Recent generative methods tailored for VER demonstrate strong performance but incur high computational costs, limiting their scalability and practical deployment. In this work, we revisit the contrastive paradigm for VER and introduce WikiCLIP, a simple yet effective framework that establishes a strong and efficient baseline for open-domain VER. WikiCLIP leverages large language model embeddings as knowledge-rich entity representations and enhances them with a Vision-Guided Knowledge Adaptor (VGKA) that aligns textual semantics with visual cues at the patch level. To further encourage fine-grained discrimination, a Hard Negative Synthesis Mechanism generates visually similar but semantically distinct negatives during training. Experimental results on popular open-domain VER benchmarks, such as OVEN, demonstrate that WikiCLIP significantly outperforms strong baselines. Specifically, WikiCLIP achieves a 16% improvement on the challenging OVEN unseen set, while reducing inference latency by nearly 100 times compared with the leading generative model, AutoVER. The project page is available at https://artanic30.github.io/project_pages/WikiCLIP/", "link": "http://arxiv.org/abs/2603.09921v1", "date": "2026-03-10", "relevancy": 2.6718, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5419}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5419}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WikiCLIP%3A%20An%20Efficient%20Contrastive%20Baseline%20for%20Open-domain%20Visual%20Entity%20Recognition&body=Title%3A%20WikiCLIP%3A%20An%20Efficient%20Contrastive%20Baseline%20for%20Open-domain%20Visual%20Entity%20Recognition%0AAuthor%3A%20Shan%20Ning%20and%20Longtian%20Qiu%20and%20Jiaxuan%20Sun%20and%20Xuming%20He%0AAbstract%3A%20Open-domain%20visual%20entity%20recognition%20%28VER%29%20seeks%20to%20associate%20images%20with%20entities%20in%20encyclopedic%20knowledge%20bases%20such%20as%20Wikipedia.%20Recent%20generative%20methods%20tailored%20for%20VER%20demonstrate%20strong%20performance%20but%20incur%20high%20computational%20costs%2C%20limiting%20their%20scalability%20and%20practical%20deployment.%20In%20this%20work%2C%20we%20revisit%20the%20contrastive%20paradigm%20for%20VER%20and%20introduce%20WikiCLIP%2C%20a%20simple%20yet%20effective%20framework%20that%20establishes%20a%20strong%20and%20efficient%20baseline%20for%20open-domain%20VER.%20WikiCLIP%20leverages%20large%20language%20model%20embeddings%20as%20knowledge-rich%20entity%20representations%20and%20enhances%20them%20with%20a%20Vision-Guided%20Knowledge%20Adaptor%20%28VGKA%29%20that%20aligns%20textual%20semantics%20with%20visual%20cues%20at%20the%20patch%20level.%20To%20further%20encourage%20fine-grained%20discrimination%2C%20a%20Hard%20Negative%20Synthesis%20Mechanism%20generates%20visually%20similar%20but%20semantically%20distinct%20negatives%20during%20training.%20Experimental%20results%20on%20popular%20open-domain%20VER%20benchmarks%2C%20such%20as%20OVEN%2C%20demonstrate%20that%20WikiCLIP%20significantly%20outperforms%20strong%20baselines.%20Specifically%2C%20WikiCLIP%20achieves%20a%2016%25%20improvement%20on%20the%20challenging%20OVEN%20unseen%20set%2C%20while%20reducing%20inference%20latency%20by%20nearly%20100%20times%20compared%20with%20the%20leading%20generative%20model%2C%20AutoVER.%20The%20project%20page%20is%20available%20at%20https%3A//artanic30.github.io/project_pages/WikiCLIP/%0ALink%3A%20http%3A//arxiv.org/abs/2603.09921v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWikiCLIP%253A%2520An%2520Efficient%2520Contrastive%2520Baseline%2520for%2520Open-domain%2520Visual%2520Entity%2520Recognition%26entry.906535625%3DShan%2520Ning%2520and%2520Longtian%2520Qiu%2520and%2520Jiaxuan%2520Sun%2520and%2520Xuming%2520He%26entry.1292438233%3DOpen-domain%2520visual%2520entity%2520recognition%2520%2528VER%2529%2520seeks%2520to%2520associate%2520images%2520with%2520entities%2520in%2520encyclopedic%2520knowledge%2520bases%2520such%2520as%2520Wikipedia.%2520Recent%2520generative%2520methods%2520tailored%2520for%2520VER%2520demonstrate%2520strong%2520performance%2520but%2520incur%2520high%2520computational%2520costs%252C%2520limiting%2520their%2520scalability%2520and%2520practical%2520deployment.%2520In%2520this%2520work%252C%2520we%2520revisit%2520the%2520contrastive%2520paradigm%2520for%2520VER%2520and%2520introduce%2520WikiCLIP%252C%2520a%2520simple%2520yet%2520effective%2520framework%2520that%2520establishes%2520a%2520strong%2520and%2520efficient%2520baseline%2520for%2520open-domain%2520VER.%2520WikiCLIP%2520leverages%2520large%2520language%2520model%2520embeddings%2520as%2520knowledge-rich%2520entity%2520representations%2520and%2520enhances%2520them%2520with%2520a%2520Vision-Guided%2520Knowledge%2520Adaptor%2520%2528VGKA%2529%2520that%2520aligns%2520textual%2520semantics%2520with%2520visual%2520cues%2520at%2520the%2520patch%2520level.%2520To%2520further%2520encourage%2520fine-grained%2520discrimination%252C%2520a%2520Hard%2520Negative%2520Synthesis%2520Mechanism%2520generates%2520visually%2520similar%2520but%2520semantically%2520distinct%2520negatives%2520during%2520training.%2520Experimental%2520results%2520on%2520popular%2520open-domain%2520VER%2520benchmarks%252C%2520such%2520as%2520OVEN%252C%2520demonstrate%2520that%2520WikiCLIP%2520significantly%2520outperforms%2520strong%2520baselines.%2520Specifically%252C%2520WikiCLIP%2520achieves%2520a%252016%2525%2520improvement%2520on%2520the%2520challenging%2520OVEN%2520unseen%2520set%252C%2520while%2520reducing%2520inference%2520latency%2520by%2520nearly%2520100%2520times%2520compared%2520with%2520the%2520leading%2520generative%2520model%252C%2520AutoVER.%2520The%2520project%2520page%2520is%2520available%2520at%2520https%253A//artanic30.github.io/project_pages/WikiCLIP/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09921v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=WikiCLIP%3A%20An%20Efficient%20Contrastive%20Baseline%20for%20Open-domain%20Visual%20Entity%20Recognition&entry.906535625=Shan%20Ning%20and%20Longtian%20Qiu%20and%20Jiaxuan%20Sun%20and%20Xuming%20He&entry.1292438233=Open-domain%20visual%20entity%20recognition%20%28VER%29%20seeks%20to%20associate%20images%20with%20entities%20in%20encyclopedic%20knowledge%20bases%20such%20as%20Wikipedia.%20Recent%20generative%20methods%20tailored%20for%20VER%20demonstrate%20strong%20performance%20but%20incur%20high%20computational%20costs%2C%20limiting%20their%20scalability%20and%20practical%20deployment.%20In%20this%20work%2C%20we%20revisit%20the%20contrastive%20paradigm%20for%20VER%20and%20introduce%20WikiCLIP%2C%20a%20simple%20yet%20effective%20framework%20that%20establishes%20a%20strong%20and%20efficient%20baseline%20for%20open-domain%20VER.%20WikiCLIP%20leverages%20large%20language%20model%20embeddings%20as%20knowledge-rich%20entity%20representations%20and%20enhances%20them%20with%20a%20Vision-Guided%20Knowledge%20Adaptor%20%28VGKA%29%20that%20aligns%20textual%20semantics%20with%20visual%20cues%20at%20the%20patch%20level.%20To%20further%20encourage%20fine-grained%20discrimination%2C%20a%20Hard%20Negative%20Synthesis%20Mechanism%2 {"title": "Mitigating Long-Tail Bias in HOI Detection via Adaptive Diversity Cache", "author": "Yuqiu Jiang and Xiaozhen Qiao and Yifan Chen and Ye Zheng and Zhe Sun and Xuelong Li", "abstract": "Human-Object Interaction (HOI) detection is a fundamental task in computer vision, empowering machines to comprehend human-object relationships in diverse real-world scenarios. Recent advances in VLMs have significantly improved HOI detection by leveraging rich cross-modal representations. However, most existing VLM-based approaches rely heavily on additional training or prompt tuning, resulting in substantial computational overhead and limited scalability, particularly in long-tailed scenarios where rare interactions are severely underrepresented. In this paper, we propose the Adaptive Diversity Cache (ADC) module, a novel training-free and plug-and-play mechanism designed to mitigate long-tail bias in HOI detection. ADC constructs class-specific caches that accumulate high-confidence and diverse feature representations during inference. The method incorporates adaptive capacity allocation favoring rare categories and dynamic feature augmentation to enable robust prediction calibration without requiring additional training or fine-tuning. Extensive experiments on HICO-DET and V-COCO datasets show that ADC consistently improves existing HOI detectors, particularly enhancing rare category detection while preserving overall performance. These findings confirm the effectiveness of ADC as a training-free, plug-and-play solution for long-tail bias mitigation.", "link": "http://arxiv.org/abs/2511.18811v2", "date": "2026-03-10", "relevancy": 2.6627, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5607}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5246}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5123}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mitigating%20Long-Tail%20Bias%20in%20HOI%20Detection%20via%20Adaptive%20Diversity%20Cache&body=Title%3A%20Mitigating%20Long-Tail%20Bias%20in%20HOI%20Detection%20via%20Adaptive%20Diversity%20Cache%0AAuthor%3A%20Yuqiu%20Jiang%20and%20Xiaozhen%20Qiao%20and%20Yifan%20Chen%20and%20Ye%20Zheng%20and%20Zhe%20Sun%20and%20Xuelong%20Li%0AAbstract%3A%20Human-Object%20Interaction%20%28HOI%29%20detection%20is%20a%20fundamental%20task%20in%20computer%20vision%2C%20empowering%20machines%20to%20comprehend%20human-object%20relationships%20in%20diverse%20real-world%20scenarios.%20Recent%20advances%20in%20VLMs%20have%20significantly%20improved%20HOI%20detection%20by%20leveraging%20rich%20cross-modal%20representations.%20However%2C%20most%20existing%20VLM-based%20approaches%20rely%20heavily%20on%20additional%20training%20or%20prompt%20tuning%2C%20resulting%20in%20substantial%20computational%20overhead%20and%20limited%20scalability%2C%20particularly%20in%20long-tailed%20scenarios%20where%20rare%20interactions%20are%20severely%20underrepresented.%20In%20this%20paper%2C%20we%20propose%20the%20Adaptive%20Diversity%20Cache%20%28ADC%29%20module%2C%20a%20novel%20training-free%20and%20plug-and-play%20mechanism%20designed%20to%20mitigate%20long-tail%20bias%20in%20HOI%20detection.%20ADC%20constructs%20class-specific%20caches%20that%20accumulate%20high-confidence%20and%20diverse%20feature%20representations%20during%20inference.%20The%20method%20incorporates%20adaptive%20capacity%20allocation%20favoring%20rare%20categories%20and%20dynamic%20feature%20augmentation%20to%20enable%20robust%20prediction%20calibration%20without%20requiring%20additional%20training%20or%20fine-tuning.%20Extensive%20experiments%20on%20HICO-DET%20and%20V-COCO%20datasets%20show%20that%20ADC%20consistently%20improves%20existing%20HOI%20detectors%2C%20particularly%20enhancing%20rare%20category%20detection%20while%20preserving%20overall%20performance.%20These%20findings%20confirm%20the%20effectiveness%20of%20ADC%20as%20a%20training-free%2C%20plug-and-play%20solution%20for%20long-tail%20bias%20mitigation.%0ALink%3A%20http%3A//arxiv.org/abs/2511.18811v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMitigating%2520Long-Tail%2520Bias%2520in%2520HOI%2520Detection%2520via%2520Adaptive%2520Diversity%2520Cache%26entry.906535625%3DYuqiu%2520Jiang%2520and%2520Xiaozhen%2520Qiao%2520and%2520Yifan%2520Chen%2520and%2520Ye%2520Zheng%2520and%2520Zhe%2520Sun%2520and%2520Xuelong%2520Li%26entry.1292438233%3DHuman-Object%2520Interaction%2520%2528HOI%2529%2520detection%2520is%2520a%2520fundamental%2520task%2520in%2520computer%2520vision%252C%2520empowering%2520machines%2520to%2520comprehend%2520human-object%2520relationships%2520in%2520diverse%2520real-world%2520scenarios.%2520Recent%2520advances%2520in%2520VLMs%2520have%2520significantly%2520improved%2520HOI%2520detection%2520by%2520leveraging%2520rich%2520cross-modal%2520representations.%2520However%252C%2520most%2520existing%2520VLM-based%2520approaches%2520rely%2520heavily%2520on%2520additional%2520training%2520or%2520prompt%2520tuning%252C%2520resulting%2520in%2520substantial%2520computational%2520overhead%2520and%2520limited%2520scalability%252C%2520particularly%2520in%2520long-tailed%2520scenarios%2520where%2520rare%2520interactions%2520are%2520severely%2520underrepresented.%2520In%2520this%2520paper%252C%2520we%2520propose%2520the%2520Adaptive%2520Diversity%2520Cache%2520%2528ADC%2529%2520module%252C%2520a%2520novel%2520training-free%2520and%2520plug-and-play%2520mechanism%2520designed%2520to%2520mitigate%2520long-tail {"title": "Understanding the Use of a Large Language Model-Powered Guide to Make Virtual Reality Accessible for Blind and Low Vision People", "author": "Jazmin Collins and Sharon Y Lin and Tianqi Liu and Andrea Stevenson Won and Shiri Azenkot", "abstract": "As social virtual reality (VR) grows more popular, addressing accessibility for blind and low vision (BLV) users is increasingly critical. Researchers have proposed an AI \"sighted guide\" to help users navigate VR and answer their questions, but it has not been studied with users. To address this gap, we developed a large language model (LLM)-powered guide and studied its use with 16 BLV participants in virtual environments with confederates posing as other users. We found that when alone, participants treated the guide as a tool, but treated it companionably around others, giving it nicknames, rationalizing its mistakes with its appearance, and encouraging confederate-guide interaction. Our work furthers understanding of guides as a versatile method for VR accessibility and presents design recommendations for future guides.", "link": "http://arxiv.org/abs/2603.09964v1", "date": "2026-03-10", "relevancy": 2.6611, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.542}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20the%20Use%20of%20a%20Large%20Language%20Model-Powered%20Guide%20to%20Make%20Virtual%20Reality%20Accessible%20for%20Blind%20and%20Low%20Vision%20People&body=Title%3A%20Understanding%20the%20Use%20of%20a%20Large%20Lan {"title": "PathMem: Toward Cognition-Aligned Memory Transformation for Pathology MLLMs", "author": "Jinyue Li and Yuci Liang and Qiankun Li and Xinheng Lyu and Jiayu Qian and Huabao Chen and Kun Wang and Zhigang Zeng and Anil Anthony Bharath and Yang Liu", "abstract": "Computational pathology demands both visual pattern recognition and dynamic integration of structured domain knowledge, including taxonomy, grading criteria, and clinical evidence. In practice, diagnostic reasoning requires linking morphological evidence with formal diagnostic and grading criteria. Although multimodal large language models (MLLMs) demonstrate strong vision language reasoning capabilities, they lack explicit mechanisms for structured knowledge integration and interpretable memory control. As a result, existing models struggle to consistently incorporate pathology-specific diagnostic standards during reasoning. Inspired by the hierarchical memory process of human pathologists, we propose PathMem, a memory-centric multimodal framework for pathology MLLMs. PathMem organizes structured pathology knowledge as a long-term memory (LTM) and introduces a Memory Transformer that models the dynamic transition from LTM to working memory (WM) through multimodal memory activation and context-aware knowledge grounding, enabling context-aware memory refinement for downstream reasoning. PathMem achieves SOTA performance across benchmarks, improving WSI-Bench report generation (12.8% WSI-Precision, 10.1% WSI-Relevance) and open-ended diagnosis by 9.7% and 8.9% over prior WSI-based models.", "link": "http://arxiv.org/abs/2603.09943v1", "date": "2026-03-10", "relevancy": 2.6286, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5588}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5092}, {"title": "Lex {"title": "AutoViVQA: A Large-Scale Automatically Constructed Dataset for Vietnamese Visual Question Answering", "author": "Nguyen Anh Tuong and Phan Ba Duc and Nguyen Trung Quoc and Tran Dac Thinh and Dang Duy Lan and Nguyen Quoc Thinh and Tung Le", "abstract": "Visual Question Answering (VQA) is a fundamental multimodal task that requires models to jointly understand visual and textual information. Early VQA systems relied heavily on language biases, motivating subsequent work to emphasize visual grounding and balanced datasets. With the success of large-scale pre-trained transformers for both text and vision domains -- such as PhoBERT for Vietnamese language understanding and Vision Transformers (ViT) for image representation learning -- multimodal fusion has achieved remarkable progress.\n  For Vietnamese VQA, several datasets have been introduced to promote research in low-resource multimodal learning, including ViVQA, OpenViVQA, and the recently proposed ViTextVQA. These resources enable benchmarking of models that integrate linguistic and visual features in the Vietnamese context.\n  Evaluation of VQA systems often employs automatic metrics originally designed for image captioning or machine translation, such as BLEU, METEOR, CIDEr, Recall, Precision, and F1-score. However, recent research suggests that large language models can further improve the alignment between automatic evaluation and human judgment in VQA tasks.\n  In this work, we explore Vietnamese Visual Question Answering using transformer-based architectures, leveraging both textual and visual pre-training while systematically comparing automatic evaluation metrics under multilingual settings.", "link": "http://arxiv.org/abs/2603.09689v1", "date": "2026-03-10", "relevancy": 2.6279, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.543}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5169}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5169}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AutoViVQA%3A%20A%20Large-Scale%20Automatically%20Constructed%20Dataset%20for%20Vietnamese%20Visual%20Question%20Answering&body=Title%3A%20AutoViVQA%3A%20A%20Large-Scale%20Automatically%20Constructed%20Dataset%20for%20Vietnamese%20Visual%20Question%20Answering%0AAuthor%3A%20Nguyen%20Anh%20Tuong%20and%20Phan%20Ba%20Duc%20and%20Nguyen%20Trung%20Quoc%20and%20Tran%20Dac%20Thinh%20and%20Dang%20Duy%20Lan%20and%20Nguyen%20Quoc%20Thinh%20and%20Tung%20Le%0AAbstract%3A%20Visual%20Question%20Answering%20%28VQA%29%20is%20a%20fundamental%20multimodal%20task%20that%20requires%20models%20to%20jointly%20understand%20visual%20and%20textual%20information.%20Early%20VQA%20systems%20relied%20heavily%20on%20language%20biases%2C%20motivating%20subsequent%20work%20to%20emphasize%20visual%20grounding%20and%20balanced%20datasets.%20With%20the%20success%20of%20large-scale%20pre-trained%20transformers%20for%20both%20text%20and%20vision%20domains%20--%20such%20as%20PhoBERT%20for%20Vietnamese%20language%20understanding%20and%20Vision%20Transformers%20%28ViT%29%20for%20image%20representation%20learning%20--%20multimodal%20fusion%20has%20achieved%20remarkable%20progress.%0A%20%20For%20Vietnamese%20VQA%2C%20several%20datasets%20have%20been%20introduced%20to%20promote%20research%20in%20low-resource%20multimodal%20learning%2C%20including%20ViVQA%2C%20OpenViVQA%2C%20and%20the%20recently%20proposed%20ViTextVQA.%20These%20resources%20enable%20benchmarking%20of%20models%20that%20integrate%20linguistic%20and%20visual%20features%20in%20the%20Vietnamese%20context.%0A%20%20Evaluation%20of%20VQA%20systems%20often%20employs%20automatic%20metrics%20originally%20designed%20for%20image%20captioning%20or%20machine%20translation%2C%20such%20as%20BLEU%2C%20METEOR%2C%20CIDEr%2C%20Recall%2C%20Precision%2C%20and%20F1-score.%20However%2C%20recent%20research%20suggests%20that%20large%20language%20models%20can%20further%20improve%20the%20alignment%20between%20automatic%20evaluation%20and%20human%20judgment%20in%20VQA%20tasks.%0A%20%20In%20this%20work%2C%20we%20explore%20Vietnamese%20Visual%20Question%20Answering%20using%20transformer-based%20architectures%2C%20leveraging%20both%20textual%20and%20visual%20pre-training%20while%20systematically%20comparing%20automatic%20evaluation%20metrics%20under%20multilingual%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09689v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoViVQA%253A%2520A%2520Large-Scale%2520Automatically%2520Constructed%2520Dataset%2520for%2520Vietnamese%2520Visual%2520Question%2520Answering%26entry.906535625%3DNguyen%2520Anh%2520Tuong%2520and%2520Phan%2520Ba%2520Duc%2520and%2520Nguyen%2520Trung%2520Quoc%2520and%2520Tran%2520Dac%2520Thinh%2520and%2520Dang%2520Duy%2520Lan%2520and%2520Nguyen%2520Quoc%2520Thinh%2520and%2520Tung%2520Le%26entry.1292438233%3DVisual%2520Question%2520Answering%2520%2528VQA%2529%2520is%2520a%2520fundamental%2520multimodal%2520task%2520that%2520requires%2520models%2520to%2520jointly%2520understand%2520visual%2520and%2520textual%2520information.%2520Early%2520VQA%2520systems%2520relied%2520heavily%2520on%2520language%2520biases%252C%2520motivating%2520subsequent%2520work%2520to%2520emphasize%2520visual%2520grounding%2520and%2520balanced%2520datasets.%2520With%2520the%2520success%2520of%2520large-scale%2520pre-trained%2520transformers%2520for%2520both%2520text%2520and%2520vision%2520domains%2520--%2520such%2520as%2520PhoBERT%2520for%2520Vietnamese%2520language%2520understanding%2520and%2520Vision%2520Transformers%2520%2528ViT%2529%2520for%2520image%2520representation%252 {"title": "GIIM: Graph-based Learning of Inter- and Intra-view Dependencies for Multi-view Medical Image Diagnosis", "author": "Tran Bao Sam and Hung Vu and Dao Trung Kien and Tran Dat Dang and Van Ha Tang and Steven Truong", "abstract": "Computer-aided diagnosis (CADx) has become vital in medical imaging, but automated systems often struggle to replicate the nuanced process of clinical interpretation. Expert diagnosis requires a comprehensive analysis of how abnormalities relate to each other across various views and time points, but current multi-view CADx methods frequently overlook these complex dependencies. Specifically, they fail to model the crucial relationships within a single view and the dynamic changes lesions exhibit across different views. This limitation, combined with the common challenge of incomplete data, greatly reduces their predictive reliability. To address these gaps, we reframe the diagnostic task as one of relationship modeling and propose GIIM, a novel graph-based approach. Our framework is uniquely designed to simultaneously capture both critical intra-view dependencies between abnormalities and inter-view dynamics. Furthermore, it ensures diagnostic robustness by incorporating specific techniques to effectively handle missing data, a common clinical issue. We demonstrate the generality of this approach through extensive evaluations on diverse imaging modalities, including CT, MRI, and mammography. The results confirm that our GIIM model significantly enhances diagnostic accuracy and robustness over existing methods, establishing a more effective framework for future CADx systems.", "link": "http://arxiv.org/abs/2603.09446v1", "date": "2026-03-10", "relevancy": 2.6126, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5327}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", {"title": "Evolving Prompt Adaptation for Vision-Language Models", "author": "Enming Zhang and Jiayang Li and Yanru Wu and Zhenyu Liu and Yang Li", "abstract": "The adaptation of large-scale vision-language models (VLMs) to downstream tasks with limited labeled data remains a significant challenge. While parameter-efficient prompt learning methods offer a promising path, they often suffer from catastrophic forgetting of pre-trained knowledge. Toward addressing this limitation, our work is grounded in the insight that governing the evolutionary path of prompts is essential for forgetting-free adaptation. To this end, we propose EvoPrompt, a novel framework designed to explicitly steer the prompt trajectory for stable, knowledge-preserving fine-tuning. Specifically, our approach employs a Modality-Shared Prompt Projector (MPP) to generate hierarchical prompts from a unified embedding space. Critically, an evolutionary training strategy decouples low-rank updates into directional and magnitude components, preserving early-learned semantic directions while only adapting their magnitude, thus enabling prompts to evolve without discarding foundational knowledge. This process is further stabilized by Feature Geometric Regularization (FGR), which enforces feature decorrelation to prevent representation collapse. Extensive experiments demonstrate that EvoPrompt achieves state-of-the-art performance in few-shot learning while robustly preserving the original zero-shot capabilities of pre-trained VLMs.", "link": "http://arxiv.org/abs/2603.09493v1", "date": "2026-03-10", "relevancy": 2.5958, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5203}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5203}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5169}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evolving%20Prompt%20Adaptation%20for%20Vision-Language%20Models&body=Title%3A%20Evolving%20Prompt%20Adaptation%20for%20Vision-Language%20Models%0AAuthor%3A%20Enming%20Zhang%20and%20Jiayang%20Li%20and%20Yanru%20Wu%20and%20Zhenyu%20Liu%20and%20Yang%20Li%0AAbstract%3A%20The%20adaptation%20of%20large-scale%20vision-language%20models%20%28VLMs%29%20to%20downstream%20tasks%20with%20limited%20labeled%20data%20remains%20a%20significant%20challenge.%20While%20parameter-efficient%20prompt%20learning%20methods%20offer%20a%20promising%20path%2C%20they%20often%20suffer%20from%20catastrophic%20forgetting%20of%20pre-trained%20knowledge.%20Toward%20addressing%20this%20limitation%2C%20our%20work%20is%20grounded%20in%20the%20insight%20that%20governing%20the%20evolutionary%20path%20of%20prompts%20is%20essential%20for%20forgetting-free%20adaptation.%20To%20this%20end%2C%20we%20propose%20EvoPrompt%2C%20a%20novel%20framework%20designed%20to%20explicitly%20steer%20the%20prompt%20trajectory%20for%20stable%2C%20knowledge-preserving%20fine-tuning.%20Specifically%2C%20our%20approach%20employs%20a%20Modality-Shared%20Prompt%20Projector%20%28MPP%29%20to%20generate%20hierarchical%20prompts%20from%20a%20unified%20embedding%20space.%20Critically%2C%20an%20evolutionary%20training%20strategy%20decouples%20low-rank%20updates%20into%20directional%20and%20magnitude%20components%2C%20preserving%20early-learned%20semantic%20directions%20while%20only%20adapting%20their%20magnitude%2C%20thus%20enabling%20prompts%20to%20evolve%20without%20discarding%20foundational%20knowledge.%20This%20process%20is%20further%20stabilized%20by%20Feature%20Geometric%20Regularization%20%28FGR%29%2C%20which%20enforces%20feature%20decorrelation%20to%20prevent%20representation%20collapse.%20Extensive%20experiments%20demonstrate%20that%20EvoPrompt%20achieves%20state-of-the-art%20performance%20in%20few-shot%20learning%20while%20robustly%20preserving%20the%20original%20zero-shot%20capabilities%20of%20pre-trained%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09493v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvolving%2520Prompt%2520Adaptation%2520for%2520Vision-Language%2520Models%26entry.906535625%3DEnming%2520Zhang%2520and%2520Jiayang%2520Li%2520and%2520Yanru%2520Wu%2520and%2520Zhenyu%2520Liu%2520and%2520Yang%2520Li%26entry.1292438233%3DThe%2520adaptation%2520of%2520large-scale%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520downstream%2520tasks%2520with%2520limited%2520labeled%2520data%2520remains%2520a%2520significant%2520challenge.%2520While%2520parameter-efficient%2520prompt%2520learning%2520methods%2520offer%2520a%2520promising%2520path%252C%2520they%2520often%2520suffer%2520from%2520catastrophic%2520forgetting%2520of%2520pre-trained%2520knowledge.%2520Toward%2520addressing%2520this%2520limitation%252C%2520our%2520work%2520is%2520grounded%2520in%2520the%2520insight%2520that%2520governing%2520the%2520evolutionary%2520path%2520of%2520prompts%2520is%2520essential%2520for%2520forgetting-free%2520adaptation.%2520To%2520this%2520end%252C%2520we%2520propose%2520EvoPrompt%252C%2520a%2520novel%2520framework%2520designed%2520to%2520explicitly%2520steer%2520the%2520prompt%2520trajectory%2520for%2520stable%252C%2520knowledge-preserving%2520fine-tuning.%2520Specifically%252C%2520our%2520approach%2520employs%2520a%2520Modality-Shared%2520Prompt%2520Projector%2520%2528MPP%2529%2520to%2520generate%2520hierarchical%2520prompts%2520from%2520a%2520unified%2520embedding%2520space.%2520Critically%252C%2520an%2520evolutionary%2520training%2520strategy%2520decouples%2520low-rank%2520updates%2520into%2520directional%2520and%2520magnitude%2520components%252C%2520preserving%2520early-learned%2520semantic%2520directions%2520while%2520only%2520adapting%252 {"title": "On the Structural Failure of Chamfer Distance in 3D Shape Optimization", "author": "Chang-Yong Song and David Hyde", "abstract": "Chamfer distance is the standard training loss for point cloud reconstruction, completion, and generation, yet directly optimizing it can produce worse Chamfer values than not optimizing it at all. We show that this paradoxical failure is gradient-structural. The per-point Chamfer gradient creates a many-to-one collapse that is the unique attractor of the forward term and cannot be resolved by any local regularizer, including repulsion, smoothness, and density-aware re-weighting. We derive a necessary condition for collapse suppression: coupling must propagate beyond local neighborhoods. In a controlled 2D setting, shared-basis deformation suppresses collapse by providing global coupling; in 3D shape morphing, a differentiable MPM prior instantiates the same principle, consistently reducing the Chamfer gap across 20 directed pairs with a 2.5$\\times$ improvement on the topologically complex dragon. The presence or absence of non-local coupling determines whether Chamfer optimization succeeds or collapses. This provides a practical design criterion for any pipeline that optimizes point-level distance metrics.", "link": "http://arxiv.org/abs/2603.09925v1", "date": "2026-03-10", "relevancy": 2.5688, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5226}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5099}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5087}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Structural%20Failure%20of%20Chamfer%20Distance%20in%203D%20Sha {"title": "EXPLORE-Bench: Egocentric Scene Prediction with Long-Horizon Reasoning", "author": "Chengjun Yu and Xuhan Zhu and Chaoqun Du and Pengfei Yu and Wei Zhai and Yang Cao and Zheng-Jun Zha", "abstract": "Multimodal large language models (MLLMs) are increasingly considered as a foundation for embodied agents, yet it remains unclear whether they can reliably reason about the long-term physical consequences of actions from an egocentric viewpoint. We study this gap through a new task, Egocentric Scene Prediction with LOng-horizon REasoning: given an initial-scene image and a sequence of atomic action descriptions, a model is asked to predict the final scene after all actions are executed. To enable systematic evaluation, we introduce EXPLORE-Bench, a benchmark curated from real first-person videos spanning diverse scenarios. Each instance pairs long action sequences with structured final-scene annotations, including object categories, visual attributes, and inter-object relations, which supports fine-grained, quantitative assessment. Experiments on a range of proprietary and open-source MLLMs reveal a significant performance gap to humans, indicating that long-horizon egocentric reasoning remains a major challenge. We further analyze test-time scaling via stepwise reasoning and show that decomposing long action sequences can improve performance to some extent, while incurring non-trivial computational overhead. Overall, EXPLORE-Bench provides a principled testbed for measuring and advancing long-horizon reasoning for egocentric embodied perception.", "link": "http://arxiv.org/abs/2603.09731v1", "date": "2026-03-10", "relevancy": 2.5676, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6688}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simil

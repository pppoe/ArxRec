{"title": "Variational Routing: A Scalable Bayesian Framework for Calibrated Mixture-of-Experts Transformers", "author": "Albus Yizhuo Li and Matthew Wicker", "abstract": "Foundation models are increasingly being deployed in contexts where understanding the uncertainty of their outputs is critical to ensuring responsible deployment. While Bayesian methods offer a principled approach to uncertainty quantification, their computational overhead renders their use impractical for training or inference at foundation model scale. State-of-the-art models achieve parameter counts in the trillions through carefully engineered sparsity including Mixture-of-Experts (MoE) layers. In this work, we demonstrate calibrated uncertainty at scale by introducing Variational Mixture-of-Experts Routing (VMoER), a structured Bayesian approach for modelling uncertainty in MoE layers. VMoER confines Bayesian inference to the expert-selection stage which is typically done by a deterministic routing network. We instantiate VMoER using two inference strategies: amortised variational inference over routing logits and inferring a temperature parameter for stochastic expert selection. Across tested foundation models, VMoER improves routing stability under noise by 38\\%, reduces calibration error by 94\\%, and increases out-of-distribution AUROC by 12\\%, while incurring less than 1\\% additional FLOPs. These results suggest VMoER offers a scalable path toward robust and uncertainty-aware foundation models.", "link": "http://arxiv.org/abs/2603.09453v1", "date": "2026-03-10", "relevancy": 1.5568, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5284}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5177}, {"title": "Flexible Visual Recognition by Evidential Model {"title": "Uncovering Social Network Activity Using Joint User and Topic Interaction", "author": "Gaspard Abel and Argyris Kalogeratos and Jean-Pierre Nadal and Julien Randon-Furling", "abstract": "The emergence of online social platforms, such as social networks and social media, has drastically affected the way people apprehend the information flows to which they are exposed. In such platforms, various information cascades spreading among users is the main force creating complex dynamics of opinion formation, each user being characterized by their own behavior adoption mechanism. Moreover, the spread of multiple pieces of information or beliefs in a networked population is rarely uncorrelated. In this paper, we introduce the Mixture of Interacting Cascades (MIC), a model of marked multidimensional Hawkes processes with the capacity to model jointly non-trivial interaction between cascades and users. We emphasize on the interplay between information cascades and user activity, and use a mixture of temporal point processes to build a coupled user/cascade point process model. Experiments on synthetic and real data highlight the benefits of this approach and demonstrate that MIC achieves superior performance to existing methods in modeling the spread of information cascades. Finally, we demonstrate how MIC can provide, through its learned parameters, insightful bi-layered visualizations of real social network activity data.", "link": "http://arxiv.org/abs/2506.12842v2", "date": "2026-03-10", "relevancy": 1.7113, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4467}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4304}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "sim {"title": "CLEAR-Mamba:Towards Accurate, Adaptive and Trustworthy Multi-Sequence Ophthalmic Angiography Classification", "author": "Zhuonan Wang and Wenjie Yan and Wenqiao Zhang and Xiaohui Song and Jian Ma and Ke Yao and Yibo Yu and Beng Chin Ooi", "abstract": "Medical image classification is a core task in computer-aided diagnosis (CAD), playing a pivotal role in early disease detection, treatment planning, and patient prognosis assessment. In ophthalmic practice, fluorescein fundus angiography (FFA) and indocyanine green angiography (ICGA) provide hemodynamic and lesion-structural information that conventional fundus photography cannot capture. However, due to the single-modality nature, subtle lesion patterns, and significant inter-device variability, existing methods still face limitations in generalization and high-confidence prediction. To address these challenges, we propose CLEAR-Mamba, an enhanced framework built upon MedMamba with optimizations in both architecture and training strategy. Architecturally, we introduce HaC, a hypernetwork-based adaptive conditioning layer that dynamically generates parameters according to input feature distributions, thereby improving cross-domain adaptability. From a training perspective, we develop RaP, a reliability-aware prediction scheme built upon evidential uncertainty learning, which encourages the model to emphasize low-confidence samples and improves overall stability and reliability. We further construct a large-scale ophthalmic angiography dataset covering both FFA and ICGA modalities, comprising multiple retinal disease categories for model training and evaluation. Experimental results demonstrate that CLEAR-Mamba consistently outperforms multiple baseline models, including the original MedMamba, across various metrics-showing particular advantages in multi-disease classification and reliability-aware prediction. This study provides an effective solution that balances generalizability and reliability for modality-specific medical image classification tasks. Our project can be accessed at https://github.com/ZJU4HealthCare/CLEAR-Mamba.", "link": "http://arxiv.org/abs/2601.20601v3", "date": "2026-03-10", "relevancy": 2.1943, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5591}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.554}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5389}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLEAR-Mamba%3ATowards%20Accurate%2C%20Adaptive%20and%20Trustworthy%20Multi-Sequence%20Ophthalmic%20Angiography%20Classification&body=Title%3A%20CLEAR-Mamba%3ATowards%20Accurate%2C%20Adaptive%20and%20Trustworthy%20Multi-Sequence%20Ophthalmic%20Angiography%20Classification%0AAuthor%3A%20Zhuonan%20Wang%20and%20Wenjie%20Yan%20and%20Wenqiao%20Zhang%20and%20Xiaohui%20Song%20and%20Jian%20Ma%20and%20Ke%20Yao%20and%20Yibo%20Yu%20and%20Beng%20Chin%20Ooi%0AAbstract%3A%20Medical%20image%20classification%20is%20a%20core%20task%20in%20computer-aided%20diagnosis%20%28CAD%29%2C%20playing%20a%20pivotal%20role%20in%20early%20disease%20detection%2C%20treatment%20planning%2C%20and%20patient%20prognosis%20assessment.%20In%20ophthalmic%20practice%2C%20fluorescein%20fundus%20angiography%20%28FFA%29%20and%20indocyanine%20green%20angiography%20%28ICGA%29%20provide%20hemodynamic%20and%20lesion-structural%20information%20that%20conventional%20fundus%20photography%20cannot%20capture.%20However%2C%20due%20to%20the%20single-modality%20nature%2C%20subtle%20lesion%20patterns%2C%20and%20significant%20inter-device%20variability%2C%20existing%20methods%20still%20face%20limitations%20in%20generalization%20and%20high-confidence%20prediction.%20To%20address%20these%20challenges%2C%20we%20propose%20CLEAR-Mamba%2C%20an%20enhanced%20framework%20built%20upon%20MedMamba%20with%20optimizations%20in%20both%20architecture%20and%20training%20strategy.%20Architecturally%2C%20we%20introduce%20HaC%2C%20a%20hypernetwork-based%20adaptive%20conditioning%20layer%20that%20dynamically%20generates%20parameters%20according%20to%20input%20feature%20distributions%2C%20thereby%20improving%20cross-domain%20adaptability.%20From%20a%20training%20perspective%2C%20we%20develop%20RaP%2C%20a%20reliability-aware%20prediction%20scheme%20built%20upon%20evidential%20uncertainty%20learning%2C%20which%20encourages%20the%20model%20to%20emphasize%20low-confidence%20samples%20and%20improves%20overall%20stability%20and%20reliability.%20We%20further%20construct%20a%20large-scale%20ophthalmic%20angiography%20dataset%20covering%20both%20FFA%20and%20ICGA%20modalities%2C%20comprising%20multiple%20retinal%20disease%20categories%20for%20model%20training%20and%20evaluation.%20Experimental%20results%20demonstrate%20that%20CLEAR-Mamba%20consistently%20outperforms%20multiple%20baseline%20models%2C%20including%20the%20original%20MedMamba%2C%20across%20various%20metrics-showing%20particular%20advantages%20in%20multi-disease%20classification%20and%20reliability-aware%20prediction.%20This%20study%20provides%20an%20effective%20solution%20that%20balances%20generalizability%20and%20reliability%20for%20modality-specific%20medical%20image%20classification%20tasks.%20Our%20project%20can%20be%20accessed%20at%20https%3A//github.com/ZJU4HealthCare/CLEAR-Mamba.%0ALink%3A%20http%3A//arxiv.org/abs/2601.20601v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLEAR-Mamba%253ATowards%2520Accurate%252C%2520Adaptive%2520and%2520Trustworthy%2520Multi-Sequence%2520Ophthalmic%2520Angiography%2520Classification%26entry.906535625%3DZhuonan%2520Wang%2520and%2520Wenjie%2520Yan%2520and%2520Wenqiao {"title": "Efficiently Aligning Draft Models via Parameter- and Data-Efficient Adaptation", "author": "Luxi Lin and Zhihang Lin and Zhanpeng Zeng and Yuhao Chen and Qingyu Zhang and Jixiang Luo and Xuelong Li and Rongrong Ji", "abstract": "Speculative decoding accelerates LLM inference but suffers from performance degradation when target models are fine-tuned for specific domains. A naive solution is to retrain draft models for every target model, which is costly and inefficient. To address this, we introduce a parameter- and data-efficient framework named Efficient Draft Adaptation, abbreviated as EDA, for efficiently adapting draft models. EDA introduces three innovations: (1) a decoupled architecture that utilizes shared and private components to model the shared and target-specific output distributions separately, enabling parameter-efficient adaptation by updating only the lightweight private component;(2) a data regeneration strategy that utilizes the fine-tuned target model to regenerate training data, thereby improving the alignment between training and speculative decoding, leading to higher average acceptance length;(3) a sample selection mechanism that prioritizes high-value data for efficient adaptation. Our experiments show that EDA effectively restores speculative performance on fine-tuned models, achieving superior average acceptance lengths with significantly reduced training costs compared to full retraining. Code is available at https://github.com/Lyn-Lucy/Efficient-Draft-Adaptation.", "link": "http://arxiv.org/abs/2603.09527v1", "date": "2026-03-10", "relevancy": 2.0376, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5201}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5166}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition" {"title": "Physics-informed neural operator for predictive parametric phase-field modelling", "author": "Nanxi Chen and Airong Chen and Rujin Ma", "abstract": "Predicting the microstructural and morphological evolution of materials through phase-field modelling is computationally intensive, particularly for high-throughput parametric studies. While neural operators such as the Fourier neural operator (FNO) show promise in accelerating the solution of parametric partial differential equations (PDEs), the lack of explicit physical constraints, may limit generalisation and long-term accuracy for complex phase-field dynamics. Here, we develop a physics-informed neural operator framework to learn parametric phase-field PDEs, namely PF-PINO. By embedding the residuals of phase-field governing equations into the data-fidelity loss function, our framework effectively enforces physical constraints during training. We validate PF-PINO against benchmark phase-field problems, including electrochemical corrosion, dendritic crystal solidification, and spinodal decomposition. Our results demonstrate that PF-PINO significantly outperforms conventional FNO in accuracy, generalisation capability, and long-term stability. This work provides a robust and efficient computational tool for phase-field modelling and highlights the potential of physics-informed neural operators to advance scientific machine learning for complex interfacial evolution problems.", "link": "http://arxiv.org/abs/2603.09693v1", "date": "2026-03-10", "relevancy": 1.8695, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5021}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4693}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4516}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physics-informed%20neural%20operator%20for%20predictive%20parametric%20phase-field%20modelling&body=Title%3A%20Physics-informed%20neural%20operator%20for%20predictive%20parametric%20phase-field%20modelling%0AAuthor%3A%20Nanxi%20Chen%20and%20Airong%20Chen%20and%20Rujin%20Ma%0AAbstract%3A%20Predicting%20the%20microstructural%20and%20morphological%20evolution%20of%20materials%20through%20phase-field%20modelling%20is%20computationally%20intensive%2C%20particularly%20for%20high-throughput%20parametric%20studies.%20While%20neural%20operators%20such%20as%20the%20Fourier%20neural%20operator%20%28FNO%29%20show%20promise%20in%20accelerating%20the%20solution%20of%20parametric%20partial%20differential%20equations%20%28PDEs%29%2C%20the%20lack%20of%20explicit%20physical%20constraints%2C%20may%20limit%20generalisation%20and%20long-term%20accuracy%20for%20complex%20phase-field%20dynamics.%20Here%2C%20we%20develop%20a%20physics-informed%20neural%20operator%20framework%20to%20learn%20parametric%20phase-field%20PDEs%2C%20namely%20PF-PINO.%20By%20embedding%20the%20residuals%20of%20phase-field%20governing%20equations%20into%20the%20data-fidelity%20loss%20function%2C%20our%20framework%20effectively%20enforces%20physical%20constraints%20during%20training.%20We%20validate%20PF-PINO%20against%20benchmark%20phase-field%20problems%2C%20including%20electrochemical%20corrosion%2C%20dendritic%20crystal%20solidification%2C%20and%20spinodal%20decomposition.%20Our%20results%20demonstrate%20that%20PF-PINO%20significantly%20outperforms%20conventional%20FNO%20in%20accuracy%2C%20generalisation%20capability%2C%20and%20long-term%20stability.%20This%20work%20provides%20a%20robust%20and%20efficient%20computational%20tool%20for%20phase-field%20modelling%20and%20highlights%20the%20potential%20of%20physics-informed%20neural%20operators%20to%20advance%20scientific%20machine%20learning%20for%20complex%20interfacial%20evolution%20problems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09693v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysics-informed%2520neural%2520operator%2520for%2520predictive%2520parametric%2520phase-field%2520modelling%26entry.906535625%3DNanxi%2520Chen%2520and%2520Airong%2520Chen%2520and%2520Rujin%2520Ma%26entry.1292438233%3DPredicting%2520the%2520microstructural%2520and%2520morphological%2520evolution%2520of%2520materials%2520through%2520phase-field%2520modelling%2520is%2520computationally%2520intensive%252C%2520particularly%2520for%2520high-throughput%2520parametric%2520studies.%2520While%2520neural%2520operators%2520such%2520as%2520the%2520Fourier%2520neural%2520operator%2520%2528FNO%2529%2520show%2520promise%2520in%2520accelerating%2520the%2520solution%2520of%2520parametric%2520partial%2520differential%2520equations%2520%2528PDEs%2529%252C%2520the%2520lack%2520of%2520explicit%2520physical%2520constraints%252C%2520may%2520limit%2520generalisation%2520and%2520long-term%2520accuracy%2520for%2520complex%2520phase-field%2520dynamics.%2520Here%252C%2520we%2520develop%2520a%2520physics-informed%2520neural%2520operator%2520framework%2520to%2520learn%2520parametric%2520phase-field%2520PDEs%252C%2520namely%2520PF-PINO.%2520By%2520embedding%2520the%2520residuals%2520of%2520phase-field%2520governing%2520equations%2520into%2520the%2520data-fidelity%2520loss%2520function%252C%2520our%2520framework%2520effectively%2520enforces%2520physical%2520constraints%2520during%2520training.%2520We%2520validate%2520PF-PINO%2520against%2520benchmark%2520phase-field%2520problems%252C%2520including%2520electrochemical%2520corrosion%252C%2520dendritic%2520crystal%2520solidification%252C%2520and%2520spinodal%2520decomposition.%2520Our%2520results%2520demonstrate%2520that%2520PF-PINO%2520significantly%2520outperforms%2520conventional%2520FNO%2520in%2520accuracy%252C%2520generalisation%2520capability%252C%2520and%2520long-term%2520stability.%2520This%2520work%2520provides%2520a%2520robust%2520and%2520efficient%2520computational%2520tool%2520for%2520phase-field%2520modelling%2520and%2520highlights%2520the%2520potential%2520of%2520physics-informed%2520neural%2520operators%2520to%2520advance%2520scientific%2520machine%2520learning%2520for%2520complex%2520interfacial%2520evolution%2520problems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09693v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Physics-informed%20neural%20operator%20for%20predictive%20parametric%20phase-field%20modelling&entry.906535625=Nanxi%20Chen%20and%20Airong%20Chen%20and%20Rujin%20Ma&entry.1292438233=Predicting%20the%20microstructural%20and%20morphological%20evolution%20of%20materials%20through%20phase-field%20modelling%20is%20computationally%20intensive%2C%20particularly%20for%20high-throughput%20parametric%20studies.%20While%20neural%20operators%20such%20as%20the%20Fourier%20neural%20operator%20%28FNO%29%20show%20promise%20in%20accelerating%20the%20solution%20of%20parametric%20partial%20differential%20equations%20%28PDEs%29%2C%20the%20lack%20of%20explicit%20physical%20constraints%2C%20may%20limit%20generalisation%20and%20long-term%20accuracy%20for%20complex%20phase-field%20dynamics.%20Here%2C%20we%20develop%20a%20physics-informed%20neural%20operator%20framework%20to%20learn%20parametric%20phase-field%20PDEs%2C%20namely%20PF-PINO.%20By%20embedding%20the%20residuals%20of%20phase-field%20governing%20equations%20into%20the%20data-fidelity%20loss%20function%2C%20our%20framework%20effectively%20enforces%20physical%20constraints%20during%20training.%20We%20validate%20PF-PINO%20against%20benchmark%20phase-field%20problems%2C%20including%20electrochemical%20corrosion%2C%20dendritic%20crystal%20solidification%2C%20and%20spinodal%20decomposition.%20Our%20results%20demon {"title": "TriFusion-SR: Joint Tri-Modal Medical Image Fusion and SR", "author": "Fayaz Ali Dharejo and Sharif S. M. A. and Aiman Khalil and Nachiket Chaudhary and Rizwan Ali Naqvi and Radu Timofte", "abstract": "Multimodal medical image fusion facilitates comprehensive diagnosis by aggregating complementary structural and functional information, but its effectiveness is limited by resolution degradation and modality discrepancies. Existing approaches typically perform image fusion and super-resolution (SR) in separate stages, leading to artifacts and degraded perceptual quality. These limitations are further amplified in tri-modal settings that combine anatomical modalities (e.g., MRI, CT) with functional scans (e.g., PET, SPECT) due to pronounced frequency domain imbalances. We propose TriFusionSR, a wavelet-guided conditional diffusion framework for joint tri-modal fusion and SR. The framework explicitly decomposes multimodal features into frequency bands using the 2D Discrete Wavelet Transform, enabling frequency-aware crossmodal interaction. We further introduce a Rectified Wavelet Features (RWF) strategy for latent coefficient calibration, followed by an Adaptive Spatial-Frequency Fusion (ASFF) module with gated channel-spatial attention to enable structure-driven multimodal refinement. Extensive experiments demonstrate state-of-the-art performance, achieving 4.8-12.4% PSNR improvement and substantial reductions in RMSE and LPIPS across multiple upsampling scales.", "link": "http://arxiv.org/abs/2603.09702v1", "date": "2026-03-10", "relevancy": 1.5792, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5318}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5258}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.o {"title": "Receptogenesis in a Vascularized Robotic Embodiment", "author": "Kadri-Ann Pankratov and Leonid Zinatullin and Hans Priks and Adele Metsniit and Urmas Johanson and Tarmo Tamm and Alvo Aabloo and Edoardo Sinibaldi and Indrek Must", "abstract": "Equipping robotic systems with the capacity to generate $\\textit{ex novo}$ hardware during operation extends control of physical adaptability. Unlike modular systems that rely on discrete component integration pre- or post-deployment, we envision the possibility that physical adaptation and development emerge from dynamic material restructuring to shape the body's intrinsic functions. Drawing inspiration from circulatory systems that redistribute mass and function in biological organisms, we utilize fluidics to restructure the material interface, a capability currently unpaired in robotics. Here, we realize this synthetic growth capability through a vascularized robotic composite designed for programmable material synthesis, demonstrated via receptogenesis - the on-demand construction of sensors from internal fluid reserves based on environmental cues. By coordinating the fluidic transport of precursors with external localized UV irradiation, we drive an $\\textit{in situ}$ photopolymerization that chemically reconstructs the vasculature from the inside out. This reaction converts precursors with photolatent initiator into a solid dispersion of UV-sensitive polypyrrole, establishing a sensing modality validated by a characteristic decrease in electrical impedance. The newly synthesized sensor closed a control loop to regulate wing flapping in a moth-inspired robotic demonstrator. This physical update increased the robot's capability in real time. This work establishes a materials-based framework for constitutive evolution, enabling robots to physically grow the hardware needed to support emerging behaviors in a complex environment; for example, suggesting a pathway toward autonomous systems capable of generating specialized features, such as neurovascular systems in situated robotics.", "link": "http://arxiv.org/abs/2603.09473v1", "date": "2026-03-10", "relevancy": 1.565, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5339}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5281}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5142}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Receptogenesis%20in%20a%20Vascularized%20Robotic%20Embodiment&body=Title%3A%20Receptogenesis%20in%20a%20Vascularized%20Robotic%20Embodiment%0AAuthor%3A%20Kadri-Ann%20Pankratov%20and%20Leonid%20Zinatullin%20and%20Hans%20Priks%20and%20Adele%20Metsniit%20and%20Urmas%20Johanson%20and%20Tarmo%20Tamm%20and%20Alvo%20Aabloo%20and%20Edoardo%20Sinibaldi%20and%20Indrek%20Must%0AAbstract%3A%20Equipping%20robotic%20systems%20with%20the%20capacity%20to%20generate%20%24%5Ctextit%7Bex%20novo%7D%24%20hardware%20during%20operation%20extends%20control%20of%20physical%20adaptability.%20Unlike%20modular%20systems%20that%20rely%20on%20discrete%20component%20integration%20pre-%20or%20post-deployment%2C%20we%20envision%20the%20possibility%20that%20physical%20adaptation%20and%20development%20emerge%20from%20dynamic%20material%20restructuring%20to%20shape%20the%20body%27s%20intrinsic%20functions.%20Drawing%20inspiration%20from%20circulatory%20systems%20that%20redistribute%20mass%20and%20function%20in%20biological%20organisms%2C%20we%20utilize%20fluidics%20to%20restructure%20the%20material%20interface%2C%20a%20capability%20currently%20unpaired%20in%20robotics.%20Here%2C%20we%20realize%20this%20synthetic%20growth%20capability%20through%20a%20vascularized%20robotic%20composite%20designed%20for%20programmable%20material%20synthesis%2C%20demonstrated%20via%20receptogenesis%20-%20the%20on-demand%20construction%20of%20sensors%20from%20internal%20fluid%20reserves%20based%20on%20environmental%20cues.%20By%20coordinating%20the%20fluidic%20transport%20of%20precursors%20with%20external%20localized%20UV%20irradiation%2C%20we%20drive%20an%20%24%5Ctextit%7Bin%20situ%7D%24%20photopolymerization%20that%20chemically%20reconstructs%20the%20vasculature%20from%20the%20inside%20out.%20This%20reaction%20converts%20precursors%20with%20photolatent%20initiator%20into%20a%20solid%20dispersion%20of%20UV-sensitive%20polypyrrole%2C%20establishing%20a%20sensing%20modality%20validated%20by%20a%20characteristic%20decrease%20in%20electrical%20impedance.%20The%20newly%20synthesized%20sensor%20closed%20a%20control%20loop%20to%20regulate%20wing%20flapping%20in%20a%20moth-inspired%20robotic%20demonstrator.%20This%20physical%20update%20increased%20the%20robot%27s%20capability%20in%20real%20time.%20This%20work%20establishes%20a%20materials-based%20framework%20for%20constitutive%20evolution%2C%20enabling%20robots%20to%20physically%20grow%20the%20hardware%20needed%20to%20support%20emerging%20behaviors%20in%20a%20complex%20environment%3B%20for%20example%2C%20suggesting%20a%20pathway%20toward%20autonomous%20systems%20capable%20of%20generating%20specialized%20features%2C%20such%20as%20neurovascular%20systems%20in%20situated%20robotics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09473v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReceptogenesis%2520in%2520a%2520Vascularized%2520Robotic%2520Embodiment%26entry.906535625%3DKadri-Ann%2520Pankratov%2520and%2520Leonid%2520Zinatullin%2520and%2520Hans%2520Priks%2520and%2520Adele%2520Metsniit%2520and%2520Urmas%2520Johanson%2520and%2520Tarmo%2520Tamm%2520and%2520Alvo%2520Aabloo%2520and%2520Edoardo%2520Sinibaldi%2520and%2520Indrek%2520Mu         linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

  </body>
</html>

{"title": "X-RAY: Mapping LLM Reasoning Capability via Formalized and Calibrated Probes", "author": "Gao Tianxi and Cai Yufan and Yuan Yusi and Dong Jin Song", "abstract": "Large language models (LLMs) achieve promising performance, yet their ability to reason remains poorly understood. Existing evaluations largely emphasize task-level accuracy, often conflating pattern matching with reasoning capability. We present X-RAY, an explainable reasoning analysis system that maps the LLM reasoning capability using calibrated, formally verified probes. We model reasoning capability as a function of extractable \\textit{structure}, operationalized through formal properties such as constraint interaction, reasoning depth, and solution-space geometry. X-Ray generates probes via formal tools with controlled structural variations, enabling precise isolation of incremental structural information through formal calibration and verification. We evaluate state-of-the-art LLMs on problems ranging from junior-level to advanced in mathematics, physics, and chemistry. Our analysis reveals a systematic asymmetry in LLM reasoning: models are relatively robust to constraint refinement, where additional conditions shrink an existing solution space, but degrade sharply under solution-space restructuring, where modifications alter the underlying structural form of the solution manifold. Moreover, calibrated formal probes differentiate models that appear indistinguishable on standard benchmarks and reveal failure modes that are structurally interpretable rather than opaque. Beyond evaluation, our framework is contamination-free and supports the training and testing of reasoning models.", "link": "http://arxiv.org/abs/2603.05290v1", "date": "2026-03-05", "relevancy": 2.23, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5744}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5744}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4729}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20X-RAY%3A%20Mapping%20LLM%20Reasoning%20Capability%20via%20Formalized%20and%20Calibrated%20Probes&body=Title%3A%20X-RAY%3A%20Mapping%20LLM%20Reasoning%20Capability%20via%20Formalized%20and%20Calibrated%20Probes%0AAuthor%3A%20Gao%20Tianxi%20and%20Cai%20Yufan%20and%20Yuan%20Yusi%20and%20Dong%20Jin%20Song%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20achieve%20promising%20performance%2C%20yet%20their%20ability%20to%20reason%20remains%20poorly%20understood.%20Existing%20evaluations%20largely%20emphasize%20task-level%20accuracy%2C%20often%20conflating%20pattern%20matching%20with%20reasoning%20capability.%20We%20present%20X-RAY%2C%20an%20explainable%20reasoning%20analysis%20system%20that%20maps%20the%20LLM%20reasoning%20capability%20using%20calibrated%2C%20formally%20verified%20probes.%20We%20model%20reasoning%20capability%20as%20a%20function%20of%20extractable%20%5Ctextit%7Bstructure%7D%2C%20operationalized%20through%20formal%20properties%20such%20as%20constraint%20interaction%2C%20reasoning%20depth%2C%20and%20solution-space%20geometry.%20X-Ray%20generates%20probes%20via%20formal%20tools%20with%20controlled%20structural%20variations%2C%20enabling%20precise%20isolation%20of%20incremental%20structural%20information%20through%20formal%20calibration%20and%20verification.%20We%20evaluate%20state-of-the-art%20LLMs%20on%20problems%20ranging%20from%20junior-level%20to%20advanced%20in%20mathematics%2C%20physics%2C%20and%20chemistry.%20Our%20analysis%20reveals%20a%20systematic%20asymmetry%20in%20LLM%20reasoning%3A%20models%20are%20relatively%20robust%20to%20constraint%20refinement%2C%20where%20additional%20conditions%20shrink%20an%20existing%20solution%20space%2C%20but%20degrade%20sharply%20under%20solution-space%20restructuring%2C%20where%20modifications%20alter%20the%20underlying%20structural%20form%20of%20the%20solution%20manifold.%20Moreover%2C%20calibrated%20formal%20probes%20differentiate%20models%20that%20appear%20indistinguishable%20on%20standard%20benchmarks%20and%20reveal%20failure%20modes%20that%20are%20structurally%20interpretable%20rather%20than%20opaque.%20Beyond%20evaluation%2C%20our%20framework%20is%20contamination-free%20and%20supports%20the%20training%20and%20testing%20of%20reasoning%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05290v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DX-RAY%253A%2520Mapping%2520LLM%2520Reasoning%2520Capability%2520via%2520Formalized%2520and%2520Calibrated%2520Probes%26entry.906535625%3DGao%2520Tianxi%2520and%2520Cai%2520Yufan%2520and%2520Yuan%2520Yusi%2520and%2520Dong%2520Jin%2520Song%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520achieve%2520promising%2520performance%252C%2520yet%2520their%2520ability%2520to%2520reason%2520remains%2520poorly%2520understood.%2520Existing%2520evaluations%2520largely%2520emphasize%2520task-level%2520accuracy%252C%2520often%2520conflating%2520pattern%2520matching%2520with%2520reasoning%2520capability.%2520We%2520present%2520X-RAY%252C%2520an%2520explainable%2520reasoning%2520analysis%2520system%2520that%2520maps%2520the%2520LLM%2520reasoning%2520capability%2520using%2520calibrated%252C%2520formally%2520verified%2520probes.%2520We%2520model%2520reasoning%2520capability%2520as%2520a%2520function%2520of%2520extractable%2520%255Ctextit%257Bstructure%257D%252C%2520operationalized%2520through%2520formal%2520properties%2520such%2520as%2520constraint%2520interaction%252C%2520reasoning%2520depth%252C%2520and%2520solution-space%2520geometry.%2520X-Ray%2520generates%2520probes%2520via% y%20emphasize%20task-level%20accuracy%2C%20often%20conflating%20pattern%20matching%20with%20reasoning%20capability.%20We%20present%20X-RAY%2C%20an%20explainable%20reasoning%20analysis%20system%20that%20maps%20the%20LLM%20reasoning%20capability%20using%20calibrated%2C%20formally%20verified%20probes.%20We%20model%20reasoning%20capability%20as%20a%20function%20of%20extractable%20%5Ctextit%7Bstructure%7D%2C%20operationalized%20through%20formal%20properties%20such%20as%20constraint%20interaction%2C%20reasoning%20depth%2C%20and%20solution-space%20geometry.%20X-Ray%20generates%20probes%20via%20formal%20tools%20with%20controlled%20structural%20variations%2C%20enabling%20precise%20isolation%20of%20incremental%20structural%20information%20through%20formal%20calibration%20and%20verification.%20We%20evaluate%20state-of-the-art%20LLMs%20on%20problems%20ranging%20from%20junior-level%20to%20advanced%20in%20mathematics%2C%20physics%2C%20and%20chemistry.%20Our%20analysis%20reveals%20a%20systematic%20asymmetry%20in%20LLM%20reasoning%3A%20models%20are%20relatively%20robust%20to%20constraint%20refinement%2C%20where%20additional%20conditions%20shrink%20an%20existing%20solution%20space%2C%20but%20degrade%20sharply%20under%20solution-space%20restructuring%2C%20where%20modifications%20alter%20the%20underlying%20structural%20form%20of%20the%20solution%20manifold.%20Moreover%2C%20calibrated%20formal%20probes%20differentiate%20models%20that%20appear%20indistinguishable%20on%20standard%20benchmarks%20and%20reveal%20failure%20modes%20that%20are%20structurally%20interpretable%20rather%20than%20opaque.%20Beyond%20evaluation%2C%20our%20framework%20is%20contamination-free%20and%20supports%20the%20training%20and%20testing%20of%20reasoning%20models.&entry.1838667208=http%3A//arxiv.org/abs/2603.05290v1&entry.124074799=Read"},
{"title": "VoxKnesset: A Large-Scale Longitudinal Hebrew Speech Dataset for Aging Speaker Modeling", "author": "Yanir Marmor and Arad Zulti and David Krongauz and Adam Gabet and Yoad Snapir and Yair Lifshitz and Eran Segal", "abstract": "Speech processing systems face a fundamental challenge: the human voice changes with age, yet few datasets support rigorous longitudinal evaluation. We introduce VoxKnesset, an open-access dataset of ~2,300 hours of Hebrew parliamentary speech spanning 2009-2025, comprising 393 speakers with recording spans of up to 15 years. Each segment includes aligned transcripts and verified demographic metadata from official parliamentary records. We benchmark modern speech embeddings (WavLM-Large, ECAPA-TDNN, Wav2Vec2-XLSR-1B) on age prediction and speaker verification under longitudinal conditions. Speaker verification EER rises from 2.15\\% to 4.58\\% over 15 years for the strongest model, and cross-sectionally trained age regressors fail to capture within-speaker aging, while longitudinally trained models recover a meaningful temporal signal. We publicly release the dataset and pipeline to support aging-robust speech systems and Hebrew speech processing.", "link": "http://arxiv.org/abs/2603.01270v2", "date": "2026-03-05", "relevancy": 2.2268, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4618}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4371}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4371}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VoxKnesset%3A%20A%20Large-Scale%20Longitudinal%20Hebrew%20Speech%20Dataset%20for%20Aging%20Speaker%20Modeling&body=Title%3A%20VoxKnesset%3A%20A% {"title": "Fusion-CAM: Integrating Gradient and Region-Based Class Activation Maps for Robust Visual Explanations", "author": "Hajar Dekdegue and Moncef Garouani and Josiane Mothe and Jordan Bernigaud", "abstract": "Interpreting the decision-making process of deep convolutional neural networks remains a central challenge in achieving trustworthy and transparent artificial intelligence. Explainable AI (XAI) techniques, particularly Class Activation Map (CAM) methods, are widely adopted to visualize the input regions influencing model predictions. Gradient-based approaches (e.g. Grad-CAM) provide highly discriminative, fine-grained details by computing gradients of class activations but often yield noisy and incomplete maps that emphasize only the most salient regions rather than the complete objects. Region-based approaches (e.g. Score-CAM) aggregate information over larger areas, capturing broader object coverage at the cost of over-smoothing and reduced sensitivity to subtle features. We introduce Fusion-CAM, a novel framework that bridges this explanatory gap by unifying both paradigms through a dedicated fusion mechanism to produce robust and highly discriminative visual explanations. Our method first denoises gradient-based maps, yielding cleaner and more focused activations. It then combines the refined gradient map with region-based maps using contribution weights to enhance class coverage. Finally, we propose an adaptive similarity-based pixel-level fusion that evaluates the agreement between both paradigms and dynamically adjusts the fusion strength. This adaptive mechanism reinforces consistent activations while softly blending conflicting regions, resulting in richer, context-aware, and input-adaptive visual explanations. Extensive experiments on standard benchmarks show that Fusion-CAM consistently outperforms existing CAM variants in both qualitative visualization and quantitative evaluation, providing a robust and flexible tool for interpreting deep neural networks.", "link": "http://arxiv.org/abs/2603.05386v1", "date": "2026-03-05", "relevancy": 2.2157, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5821}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5547}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5419}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fusion-CAM%3A%20Integrating%20Gradient%20and%20Region-Based%20Class%20Activation%20Maps%20for%20Robust%20Visual%20Explanations&body=Title%3A%20Fusion-CAM%3A%20Integrating%20Gradient%20and%20Region-Based%20Class%20Activation%20Maps%20for%20Robust%20Visual%20Explanations%0AAuthor%3A%20Hajar%20Dekdegue%20and%20Moncef%20Garouani%20and%20Josiane%20Mothe%20and%20Jordan%20Bernigaud%0AAbstract%3A%20Interpreting%20the%20decision-making%20process%20of%20deep%20convolutional%20neural%20networks%20remains%20a%20central%20challenge%20in%20achieving%20trustworthy%20and%20transparent%20artificial%20intelligence.%20Explainable%20AI%20%28XAI%29%20techniques%2C%20particularly%20Class%20Activation%20Map%20%28CAM%29%20methods%2C%20are%20widely%20adopted%20to%20visualize%20the%20input%20regions%20influencing%20model%20predictions.%20Gradient-based%20approaches%20%28e.g.%20Grad-CAM%29%20provide%20highly%20discriminative%2C%20fine-grained%20details%20by%20computing%20gradients%20of%20class%20activations%20but%20often%20yield%20noisy%20and%20incomplete%20maps%20that%20emphasize%20only%20the%20most%20salient%20regions%20rather%20than%20the%20complete%20objects.%20Region-based%20approaches%20%28e.g.%20Score-CAM%29%20aggregate%20information%20over%20larger%20areas%2C%20capturing%20broader%20object%20coverage%20at%20the%20cost%20of%20over-smoothing%20and%20reduced%20sensitivity%20to%20subtle%20features.%20We%20introduce%20Fusion-CAM%2C%20a%20novel%20framework%20that%20bridges%20this%20explanatory%20gap%20by%20unifying%20both%20paradigms%20through%20a%20dedicated%20fusion%20mechanism%20to%20produce%20robust%20and%20highly%20discriminative%20visual%20explanations.%20Our%20method%20first%20denoises%20gradient-based%20maps%2C%20yielding%20cleaner%20and%20more%20focused%20activations.%20It%20then%20combines%20the%20refined%20gradient%20map%20with%20region-based%20maps%20using%20contribution%20weights%20to%20enhance%20class%20coverage.%20Finally%2C%20we%20propose%20an%20adaptive%20similarity-based%20pixel-level%20fusion%20that%20evaluates%20the%20agreement%20between%20both%20paradigms%20and%20dynamically%20adjusts%20the%20fusion%20strength.%20This%20adaptive%20mechanism%20reinforces%20consistent%20activations%20while%20softly%20blending%20conflicting%20regions%2C%20resulting%20in%20richer%2C%20context-aware%2C%20and%20input-adaptive%20visual%20explanations.%20Extensive%20experiments%20on%20standard%20benchmarks%20show%20that%20Fusion-CAM%20consistently%20outperforms%20existing%20CAM%20variants%20in%20both%20qualitative%20visualization%20and%20quantitative%20evaluation%2C%20providing%20a%20robust%20and%20flexible%20tool%20for%20interpreting%20deep%20neural%20networks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05386v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFusion-CAM%253A%2520Integrating%2520Gradient%2520and%2520Region-Based%2520Class%2520Activation%2520Maps%2520for%2520Robust%2520Visual%2520Explanations%26entry.906535625%3DHajar%2520Dekdegue%2520and%2520Moncef%2520Garouani%2520and%2520Josiane%2520Mothe%2520and%2520Jordan%2520Bernigaud%26entry.1292438233%3DInterpreting%2520the%2520decision-making%2520process%2520of%2520deep%2520convolutional%2520neural%2520networks%2520remains%2520a%2520central%2520challenge%2520in%2520achieving%252 rces%2520consistent%2520activations%2520while%2520softly%2520blending%2520conflicting%2520regions%252C%2520resulting%2520in%2520richer%252C%2520context-aware%252C%2520and%2520input-adaptive%2520visual%2520explanations.%2520Extensive%2520experiments%2520on%2520standard%2520benchmarks%2520show%2520that%2520Fusion-CAM%2520consistently%2520outperforms%2520existing%2520CAM%2520variants%2520in%2520both%2520qualitative%2520visualization%2520and%2520quantitative%2520evaluation%252C%2520providing%2520a%2520robust%2520and%2520flexible%2520tool%2520for%2520interpreting%2520deep%2520neural%2520networks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05386v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Fusion-CAM%3A%20Integrating%20Gradient%20and%20Region-Based%20Class%20Activation%20Maps%20for%20Robust%20Visual%20Explanations&entry.906535625=Hajar%20Dekdegue%20and%20Moncef%20Garouani%20and%20Josiane%20Mothe%20and%20Jordan%20Bernigaud&entry.1292438233=Interpreting%20the%20decision-making%20process%20of%20deep%20convolutional%20neural%20networks%20remains%20a%20central%20challenge%20in%20achieving%20trustworthy%20and%20transparent%20artificial%20intelligence.%20Explainable%20AI%20%28XAI%29%20techniques%2C%20particularly%20Class%20Activation%20Map%20%28CAM%29%20methods%2C%20are%20widely%20adopted%20to%20visualize%20the%20input%20regions%20influencing%20model%20predictions.%20Gradient-based%20approaches%20%28e.g.%20Grad-CAM%29%20provide%20highly%20discriminative%2C%20fine-grained%20details%20by%20computing%20gradients%20of%20class%20activations%20but%20often%20yield%20noisy%20and%20incomplete%20maps%20that%20emphasize%20only%20the%20most%20salient%20regions%20rather%20than%20the%20complete%20objects.%20Region-based%20approaches%20%28e.g.%20Score-CAM%29%20aggregate%20information%20over%20larger%20areas%2C%20capturing%20broader%20object%20coverage%20at%20the%20cost%20of%20o {"title": "MiTA Attention: Efficient Fast-Weight Scaling via a Mixture of Top-k Activations", "author": "Qishuai Wen and Zhiyuan Huang and Xianghan Meng and Wei He and Chun-Guang Li", "abstract": "The attention operator in Transformers can be viewed as a two-layer fast-weight MLP, whose weights are dynamically instantiated from input tokens and whose width equals sequence length N. As the context extends, the expressive capacity of such an N-width MLP increases, but scaling its fast weights becomes prohibitively expensive for extremely long sequences. Recently, this fast-weight scaling perspective has motivated the Mixture-of-Experts (MoE) attention, which partitions the sequence into fast-weight experts and sparsely routes the tokens to them. In this paper, we elevate this perspective to a unifying framework for a wide range of efficient attention methods by interpreting them as scaling fast weights through either routing or compression. Then we propose a compress-and-route strategy, which compresses the N-width MLP into a narrower one using a small set of landmark queries and constructs deformable experts by gathering top-k activated key-value pairs for each landmark query. We call this strategy a Mixture of Top-k Activations (MiTA), and refer to the resulting efficient mechanism as MiTA attention. Preliminary experiments on vision tasks demonstrate the promise of our MiTA attention and motivate further investigation on its optimization and broader applications in more challenging settings.", "link": "http://arxiv.org/abs/2602.01219v3", "date": "2026-03-05", "relevancy": 2.2108, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5873}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5488}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5197}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MiTA%20Attention%3A%20Efficient%20Fast-Weight%20Scaling%20via%20a%20Mixture%20of%20Top-k%20Activations&body=Title%3A%20MiTA%20Attention%3A%20Efficient%20Fast-Weight%20Scaling%20via%20a%20Mixture%20of%20Top-k%20Activations%0AAuthor%3A%20Qishuai%20Wen%20and%20Zhiyuan%20Huang%20and%20Xianghan%20Meng%20and%20Wei%20He%20and%20Chun-Guang%20Li%0AAbstract%3A%20The%20attention%20operator%20in%20Transformers%20can%20be%20viewed%20as%20a%20two-layer%20fast-weight%20MLP%2C%20whose%20weights%20are%20dynamically%20instantiated%20from%20input%20tokens%20and%20whose%20width%20equals%20sequence%20length%20N.%20As%20the%20context%20extends%2C%20the%20expressive%20capacity%20of%20such%20an%20N-width%20MLP%20increases%2C%20but%20scaling%20its%20fast%20weights%20becomes%20prohibitively%20expensive%20for%20extremely%20long%20sequences.%20Recently%2C%20this%20fast-weight%20scaling%20perspective%20has%20motivated%20the%20Mixture-of-Experts%20%28MoE%29%20attention%2C%20which%20partitions%20the%20sequence%20into%20fast-weight%20experts%20and%20sparsely%20routes%20the%20tokens%20to%20them.%20In%20this%20paper%2C%20we%20elevate%20this%20perspective%20to%20a%20unifying%20framework%20for%20a%20wide%20range%20of%20efficient%20attention%20methods%20by%20interpreting%20them%20as%20scaling%20fast%20weights%20through%20either%20routing%20or%20compression.%20Then%20we%20propose%20a%20compress-and-route%20strategy%2C%20which%20compresses%20the%20N-width%20MLP%20into%20a%20narrower%20one%20using%20a%20small%20set%20of%20landmark%20queries%20and%20constructs%20deformable%20experts%20by%20gathering%20top-k%20activated%20key-value%20pairs%20for%20each%20landmark%20query.%20We%20call%20this%20strategy%20a%20Mixture%20of%20Top-k%20Activations%20%28MiTA%29%2C%20and%20refer%20to%20the%20resulting%20efficient%20mechanism%20as%20MiTA%20attention.%20Preliminary%20experiments%20on%20vision%20tasks%20demonstrate%20the%20promise%20of%20our%20MiTA%20attention%20and%20motivate%20further%20investigation%20on%20its%20optimization%20and%20broader%20applications%20in%20more%20challenging%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.01219v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMiTA%2520Attention%253A%2520Efficient%2520Fast-Weight%2520Scaling%2520via%2520a%2520Mixture%2520of%2520Top-k%2520Activations%26entry.906535625%3DQishuai%2520Wen%2520and%2520Zhiyuan%2520Huang%2520and%2520Xianghan%2520Meng%2520and%2520Wei%2520He%2520and%2520Chun-Guang%2520Li%26entry.1292438233%3DThe%2520attention%2520operator%2520in%2520Transformers%2520can%2520be%2520viewed%2520as%2520a%2520two-layer%2520fast-weight%2520MLP%252C%2520whose%2520weights%2520are%2520dynamically%2520instantiated%2520from%2520input%2520tokens%2520and%2520whose%2520width%2520equals%2520sequence%2520length%2520N.%2520As%2520the%2520context%2520extends%252C%2520the%2520expressive%2520capacity%2520of%2520such%2520an%2520N-width%2520MLP%2520increases%252C%2520but%2520scaling%2520its%2520fast%2520weights%2520becomes%2520prohibitively%2520expensive%2520for%2520extremely%2520long%2520sequences.%2520Recently%252C%2520this%2520fast-weight%2520scaling%2520perspective%2520has%2520motivated%2520the%2520Mixture-of-Experts%2520%2528MoE%2529%2520attention%252C%2520which%2520partitions%2520the%2520sequence%2520into%2520fast-weight%2520experts%2520and%2520sparsely%2520routes%2520the%2520tokens%2520to%2520them.%2520In%2520this%2520paper%252C%2520we%2520elevate%2520this%2520perspective%2520to%2520a%2520unifying%2520framework%2520for%2520a%2520wide%2520range%2520of%2520efficient%2520attention%2520methods%2520by%2520interpreting%2520them%2520as%2520scaling%2520fast%2520weights%2520through%2520either%2520routing%2520or%2520compression.%2520Then%2520we%2520propose%2520a%2520compress-and-route%2520strategy%252C%2520which%2520compresses%2520the%2520N-width%2520MLP%2520into%2520a%2520narrower%2520one%2520using%2520a%2520small%2520set%2520of%2520landmark%2520queries%2520and%2520constructs%2520deformable%2520experts%2520by%2520gathering%2520top-k%2520activated%2520key-value%2520pairs%2520for%2520each%2520landmark%2520query.%2520We%2520call%2520this%2520strategy%2520a%2520Mixture%2520of%2520Top-k%2520Activations%2520%2528MiTA%2529%252C%2520and%2520refer%2520to%2520the%2520resulting%2520efficient%2520mechanism%2520as%2520MiTA%2520attention.%2520Preliminary%2520experiments%2520on%2520vision%2520tasks%2520demonstrate%2520the%2520promise%2520of%2520our%2520MiTA%2520attention%2520and%2520motivate%2520further%2520investigation%2520on%2520its%2520optimization%2520and%2520broader%2520applications%2520in%2520more%2520challenging%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.01219v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MiTA%20Attention%3A%20Efficient%20Fast-Weight%20Scaling%20via%20a%20Mixture%20of%20Top-k%20Activations&entry.906535625=Qishuai%20Wen%20and%20Zhiyuan%20Huang%20and%20Xianghan%20Meng%20and%20Wei%20He%20and%20Chun-Guang%20Li&entry.1292438233=The%20attention%20operator%20in%20Transformers%20can%20be%20viewed%20as%20a%20two-layer%20fast-weight%20MLP%2C%20whose%20weights%20are%20dynamically%20instantiated%20from%20input%20tokens%20and%20whose%20width%20equals%20sequence%20length%20N.%20As%20the%20context%20extends%2C%20the%20expressive%20capacity%20of%20such%20an%20N-width%20MLP%20increases%2C%20but%20scaling%20its%20fast%20weights%20becomes%20prohibitively%20expensive%20for%20extremely%20long%20sequences.%20Recently%2C%20this%20fast-weight%20scaling%20perspective%20has%20motivated%20the%20Mixture-of-Experts%20%28MoE%29%20attention%2C%20which%20partitions%20the%20sequence%20into%20fast-weight%20experts%20and%20sparsely%20routes%20the%20tokens%20to% {"title": "The Spatial and Temporal Resolution of Motor Intention in Multi-Target Prediction", "author": "Marie Dominique Schmidt and Ioannis Iossifidis", "abstract": "Reaching for grasping, and manipulating objects are essential motor functions in everyday life. Decoding human motor intentions is a central challenge for rehabilitation and assistive technologies. This study focuses on predicting intentions by inferring movement direction and target location from multichannel electromyography (EMG) signals, and investigating how spatially and temporally accurate such information can be detected relative to movement onset. We present a computational pipeline that combines data-driven temporal segmentation with classical and deep learning classifiers in order to analyse EMG data recorded during the planning, early execution, and target contact phases of a delayed reaching task.\n  Early intention prediction enables devices to anticipate user actions, improving responsiveness and supporting active motor recovery in adaptive rehabilitation systems. Random Forest achieves $80\\%$ accuracy and Convolutional Neural Network $75\\%$ accuracy across $25$ spatial targets, each separated by $14^\\circ$ azimuth/altitude. Furthermore, a systematic evaluation of EMG channels, feature sets, and temporal windows demonstrates that motor intention can be efficiently decoded even with drastically reduced data. This work sheds light on the temporal and spatial evolution of motor intention, paving the way for anticipatory control in adaptive rehabilitation systems and driving advancements in computational approaches to motor neuroscience.", "link": "http://arxiv.org/abs/2603.05418v1", "date": "2026-03-05", "relevancy": 2.2059, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6165}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5464}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5306}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Spatial%20and%20Temporal%20Resolution%20of%20Motor%20Intention%20in%20Multi-Target%20Prediction&body=Title%3A%20The%20Spatial%20and%20Temporal%20Resolution%20of%20Motor%20Intention%20in%20Multi-Target%20Prediction%0AAuthor%3A%20Marie%20Dominique%20Schmidt%20and%20Ioannis%20Iossifidis%0AAbstract%3A%20Reaching%20for%20grasping%2C%20and%20manipulating%20objects%20are%20essential%20motor%20functions%20in%20everyday%20life.%20Decoding%20human%20motor%20intentions%20is%20a%20central%20challenge%20for%20rehabilitation%20and%20assistive%20technologies.%20This%20study%20focuses%20on%20predicting%20intentions%20by%20inferring%20movement%20direction%20and%20target%20location%20from%20multichannel%20electromyography%20%28EMG%29%20signals%2C%20and%20investigating%20how%20spatially%20and%20temporally%20accurate%20such%20information%20can%20be%20detected%20relative%20to%20movement%20onset.%20We%20present%20a%20computational%20pipeline%20that%20combines%20data-driven%20temporal%20segmentation%20with%20classical%20and%20deep%20learning%20classifiers%20in%20order%20to%20analyse%20EMG%20data%20recorded%20during%20the%20planning%2C%20early%20execution%2C%20and%20target%20contact%20phases%20of%20a%20delayed%20reaching%20task.%0A%20%20Early%20intention%20prediction%20enables%20devices%20to%20anticipate%20user%20actions%2C%20improving%20responsiveness%20and%20supporting%20active%20motor%20recovery%20in%20adaptive%20rehabilitation%20systems.%20Random%20Forest%20achieves%20%2480%5C%25%24%20accuracy%20and%20Convolutional%20Neural%20Network%20%2475%5C%25%24%20accuracy%20across%20%2425%24%20spatial%20targets%2C%20each%20separated%20by%20%2414%5E%5Ccirc%24%20azimuth/altitude.%20Furthermore%2C%20a%20systematic%20evaluation%20of%20EMG%20channels%2C%20feature%20sets%2C%20and%20temporal%20windows%20demonstrates%20that%20motor%20intention%20can%20be%20efficiently%20decoded%20even%20with%20drastically%20reduced%20data.%20This%20work%20sheds%20light%20on%20the%20temporal%20and%20spatial%20evolution%20of%20motor%20intention%2C%20paving%20the%20way%20for%20anticipatory%20control%20in%20adaptive%20rehabilitation%20systems%20and%20driving%20advancements%20in%20computational%20approaches%20to%20motor%20neuroscience.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05418v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Spatial%2520and%2520Temporal%2520Resolution%2520of%2520Motor%2520Intention%2520in%2520Multi-Target%2520Prediction%26entry.906535625%3DMarie%2520Dominique%2520Schmidt%2520and%2520Ioannis%2520Iossifidis%26entry.1292438233%3DReaching%2520for%2520grasping%252C%2520and%2520manipulating%2520objects%2520are%2520essential%2520motor%2520functions%2520in%2520everyday%2520life.%2520Decoding%2520human%2520motor%2520intentions%2520is%2520a%2520central%2520challenge%2520for%2520rehabilitation%2520and%2520assistive%2520technologies.%2520This%2520study%2520focuses%2520on%2520predicting%2520intentions%2520by%2520inferring%2520movement%2520direction%2520and%2520target%2520location%2520from%2520multichannel%2520electromyography%2520%2528EMG%2529%2520signals%252C%2520and%2520investigating%2520how%2520spatially%2520and%2520temporally%2520accurate%2520such%2520information%2520can%2520be%2520detected%2520relative%2520to%2520movement%2520onset.%2520We%2520present%2520a%2520computational%2520pipeline%2520that%2520combines%2520data-driven%2520temporal%2520segmentation%2520with%2520classical%2520and%2520deep%2520learning%2520classifiers%2520in%2520order%2520to%2520analyse%2520EMG%2520data%2520recorded%2520during%2520the%2520planning%252C% {"title": "CCSD: Cross-Modal Compositional Self-Distillation for Robust Brain Tumor Segmentation with Missing Modalities", "author": "Dongqing Xie and Yonghuang Wu and Zisheng Ai and Jun Min and Zhencun Jiang and Shaojin Geng and Lei Wang", "abstract": "The accurate segmentation of brain tumors from multi-modal MRI is critical for clinical diagnosis and treatment planning. While integrating complementary information from various MRI sequences is a common practice, the frequent absence of one or more modalities in real-world clinical settings poses a significant challenge, severely compromising the performance and generalizability of deep learning-based segmentation models. To address this challenge, we propose a novel Cross-Modal Compositional Self-Distillation (CCSD) framework that can flexibly handle arbitrary combinations of input modalities. CCSD adopts a shared-specific encoder-decoder architecture and incorporates two self-distillation strategies: (i) a hierarchical modality self-distillation mechanism that transfers knowledge across modality hierarchies to reduce semantic discrepancies, and (ii) a progressive modality combination distillation approach that enhances robustness to missing modalities by simulating gradual modality dropout during training. Extensive experiments on public brain tumor segmentation benchmarks demonstrate that CCSD achieves state-of-the-art performance across various missing-modality scenarios, with strong generalization and stability.", "link": "http://arxiv.org/abs/2511.14599v2", "date": "2026-03-05", "relevancy": 2.2041, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5836}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5296}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.527}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CCSD%3A%20Cross-Modal%20Compositional%20Self-Distillation%20for%20Robust%20Brain%20Tumor%20Segmentation%20with%20Missing%20Modalities&body=Title%3A%20CCSD%3A%20Cross-Modal%20Compositional%20Self-Distillation%20for%20Robust%20Brain%20Tumor%20Segmentation%20with%20Missing%20Modalities%0AAuthor%3A%20Dongqing%20Xie%20and%20Yonghuang%20Wu%20and%20Zisheng%20Ai%20and%20Jun%20Min%20and%20Zhencun%20Jiang%20and%20Shaojin%20Geng%20and%20Lei%20Wang%0AAbstract%3A%20The%20accurate%20segmentation%20of%20brain%20tumors%20from%20multi-modal%20MRI%20is%20critical%20for%20clinical%20diagnosis%20and%20treatment%20planning.%20While%20integrating%20complementary%20information%20from%20various%20MRI%20sequences%20is%20a%20common%20practice%2C%20the%20frequent%20absence%20of%20one%20or%20more%20modalities%20in%20real-world%20clinical%20settings%20poses%20a%20significant%20challenge%2C%20severely%20compromising%20the%20performance%20and%20generalizability%20of%20deep%20learning-based%20segmentation%20models.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20Cross-Modal%20Compositional%20Self-Distillation%20%28CCSD%29%20framework%20that%20can%20flexibly%20handle%20arbitrary%20combinations%20of%20input%20modalities.%20CCSD%20adopts%20a%20shared-specific%20encoder-decoder%20architecture%20and%20incorporates%20two%20self-distillation%20strategies%3A%20%28i%29%20a%20hierarchical%20modality%20self-distillation%20mechanism%20that%20transfers%20knowledge%20across%20modality%20hierarchies%20to%20reduce%20semantic%20discrepancies%2C%20and%20%28ii%29%20a%20progressive%20modality%20combination%20distillation%20approach%20that%20enhances%20robustness%20to%20missing%20modalities%20by%20simulating%20gradual%20modality%20dropout%20during%20training.%20Extensive%20experiments%20on%20public%20brain%20tumor%20segmentation%20benchmarks%20demonstrate%20that%20CCSD%20achieves%20state-of-the-art%20performance%20across%20various%20missing-modality%20scenarios%2C%20with%20strong%20generalization%20and%20stability.%0ALink%3A%20http%3A//arxiv.org/abs/2511.14599v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCCSD%253A%2520Cross-Modal%2520Compositional%2520Self-Distillation%2520for%2520Robust%2520Brain%2520Tumor%2520Segmentation%2520with%2520Missing%2520Modalities%26entry.906535625%3DDongqing%2520Xie%2520and%2520Yonghuang%2520Wu%2520and%2520Zisheng%2520Ai%2520and%2520Jun%2520Min%2520and%2520Zhencun%2520Jiang%2520and%2520Shaojin%2520Geng%2520and%2520Lei%2520Wang%26entry.1292438233%3DThe%2520accurate%2520segmentation%2520of%2520brain%2520tumors%2520from%2520multi-modal%2520MRI%2520is%2520critical%2520for%2520clinical%2520diagnosis%2520and%2520treatment%2520planning.%2520While%2520integrating%2520complementary%2520information%2520from%2520various%2520MRI%2520sequences%2520is%2520a%2520common%2520practice%252C%2520the%2520frequent%2520absence%2520of%2520one%2520or%2520more%2520modalities%2520in%2520real-world%2520clinical%2520settings%2520poses%2520a%2520significant%2520challenge%252C%2520severely%2520compromising%2520the%2520performance%2520and%2520generalizability%2520of%2520deep%2520learning-based%2520segmentation%2520models.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520a%2520novel%2520Cross-Modal%2520Compositional%2520Self-Distillation%2520%2528CCSD%2529%2520framework%2520that%2520can%2520flexibly%2520handle%2520arbitrary%2520combinations%2520of%2520input%2520modalities.%2520CCSD%2520adopts%2520a%2520shared-specific%2520encoder-decoder%2520architecture%2520and%2520incorporates%2520two%2520self-distillation%2520strategies%253A%2520%2528i%2529%2520a%2520hierarchical%2520modality%2520self-distillation%2520mechanism%2520that%2520transfers%2520knowledge%2520across%2520modality%2520hierarchies%2520to%2520reduce%2520semantic%2520discrepancies%252C%2520and%2520%2528ii%2529%2520a%2520progressive%2520modality%2520combination%2520distillation%2520approach%2520that%2520enhances%2520robustness%2520to%2520missing%2520modalities%2520by%2520simulating%2520gradual%2520modality%2520dropout%2520during%2520training.%2520Extensive%2520experiments%2520on%2520public%2520brain%2520tumor%2520segmentation%2520benchmarks%2520demonstrate%2520that%2520CCSD%2520achieves%2520state-of-the-art%2520performance%2520across%2520various%2520missing-modality%2520scenarios%252C%2520with%2520strong%2520generalization%2520and%2520stability.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.14599v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CCSD%3A%20Cross-Modal%20Compositional%20Self-Distillation%20for%20Robust%20Brain%20Tumor%20Segmentation%20with%20Missing%20Modalities&entry.906535625=Dongqing%20Xie%20and%20Yonghuang%20Wu%20and%20Zisheng%20Ai%20and%20Jun%20Min%20and%20Zhencun%20Jiang%20and%20Shaojin%20Geng%20and%20Lei%20Wang&entry.1292438233=The%20accurate%20segmentation%20of%20brain%20tumors%20from%20multi-modal%20MRI%20is%20critical%20for%20clinical%20diagnosis%20and%20treatment%20planning.%20While%20integrating%20complementary%20information%20from%20various%20MRI%20sequences%20is%20a%20common%20practice%2C%20the%20frequent%20absence%20of%20one%20or%20more%20modalities%20in%20real-world%20clinical%20settings%20poses%20a%20significant%20challenge%2C%20severely%20compromising%20the%20performance%20and%20generalizability%20of%20deep%20learning-based%20segmentation%20models.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20Cross-Modal%20Compositional%20Self-Distillation%20%28CCSD%29%20framework%20that%20can%20flexibly%20handle%20arbitrary%20combinations%20of%20input%20modalities.%20CCSD%20adopts%20a%20shared-specific%20encoder-decoder%20architecture%2 {"title": "Poisoning the Inner Prediction Logic of Graph Neural Networks for Clean-Label Backdoor Attacks", "author": "Yuxiang Zhang and Bin Ma and Enyan Dai", "abstract": "Graph Neural Networks (GNNs) have achieved remarkable results in various tasks. Recent studies reveal that graph backdoor attacks can poison the GNN model to predict test nodes with triggers attached as the target class. However, apart from injecting triggers to training nodes, these graph backdoor attacks generally require altering the labels of trigger-attached training nodes into the target class, which is impractical in real-world scenarios. In this work, we focus on the clean-label graph backdoor attack, a realistic but understudied topic where training labels are not modifiable. According to our preliminary analysis, existing graph backdoor attacks generally fail under the clean-label setting. Our further analysis identifies that the core failure of existing methods lies in their inability to poison the prediction logic of GNN models, leading to the triggers being deemed unimportant for prediction. Therefore, we study a novel problem of effective clean-label graph backdoor attacks by poisoning the inner prediction logic of GNN models. We propose BA-Logic to solve the problem by coordinating a poisoned node selector and a logic-poisoning trigger generator. Extensive experiments on real-world datasets demonstrate that our method effectively enhances the attack success rate and surpasses state-of-the-art graph backdoor attack competitors under clean-label settings. Our code is available at https://anonymous.4open.science/r/BA-Logic", "link": "http://arxiv.org/abs/2603.05004v1", "date": "2026-03-05", "relevancy": 2.2017, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4798}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4218}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4195}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Poisoning%20the%20Inner%20Prediction%20Logic%20of%20Graph%20Neural%20Networks%20for%20Clean-Label%20Backdoor%20Attacks&body=Title%3A%20Poisoning%20the%20Inner%20Prediction%20Logic%20of%20Graph%20Neural%20Networks%20for%20Clean-Label%20Backdoor%20Attacks%0AAuthor%3A%20Yuxiang%20Zhang%20and%20Bin%20Ma%20and%20Enyan%20Dai%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20have%20achieved%20remarkable%20results%20in%20various%20tasks.%20Recent%20studies%20reveal%20that%20graph%20backdoor%20attacks%20can%20poison%20the%20GNN%20model%20to%20predict%20test%20nodes%20with%20triggers%20attached%20as%20the%20target%20class.%20However%2C%20apart%20from%20injecting%20triggers%20to%20training%20nodes%2C%20these%20graph%20backdoor%20attacks%20generally%20require%20altering%20the%20labels%20of%20trigger-attached%20training%20nodes%20into%20the%20target%20class%2C%20which%20is%20impractical%20in%20real-world%20scenarios.%20In%20this%20work%2C%20we%20focus%20on%20the%20clean-label%20graph%20backdoor%20attack%2C%20a%20realistic%20but%20understudied%20topic%20where%20training%20labels%20are%20not%20modifiable.%20According%20to%20our%20preliminary%20analysis%2C%20existing%20graph%20backdoor%20attacks%20generally%20fail%20under%20the%20clean-label%20setting.%20Our%20further%20analysis%20identifies%20that%20the%20core%20failure%20of%20existing%20methods%20lies%20in%20their%20inability%20to%20poison%20the%20prediction%20logic%20of%20GNN%20models%2C%20leading%20to%20the%20triggers%20being%20deemed%20unimportant%20for%20prediction.%20Therefore%2C%20we%20study%20a%20novel%20problem%20of%20effective%20clean-label%20graph%20backdoor%20attacks%20by%20poisoning%20the%20inner%20prediction%20logic%20of%20GNN%20models.%20We%20propose%20BA-Logic%20to%20solve%20the%20problem%20by%20coordinating%20a%20poisoned%20node%20selector%20and%20a%20logic-poisoning%20trigger%20generator.%20Extensive%20experiments%20on%20real-world%20datasets%20demonstrate%20that%20our%20method%20effectively%20enhances%20the%20attack%20success%20rate%20and%20surpasses%20state-of-the-art%20graph%20backdoor%20attack%20competitors%20under%20clean-label%20settings.%20Our%20code%20is%20available%20at%20https%3A//anonymous.4open.science/r/BA-Logic%0ALink%3A%20http%3A//arxiv.org/abs/2603.05004v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPoisoning%2520the%2520Inner%2520Prediction%2520Logic%2520of%2520Graph%2520Neural%2520Networks%2520for%2520Clean-Label%2520Backdoor%2520Attacks%26entry.906535625%3DYuxiang%2520Zhang%2520and%2520Bin%2520Ma%2520and%2520Enyan%2520Dai%26entry.1292438233%3DGraph%2520Neural%2520Networks%2520%2528GNNs%2529%2520have%2520achieved%2520remarkable%2520results%2520in%2520various%2520tasks.%2520Recent%2520studies%2520reveal%2520that%2520graph%2520backdoor%2520attacks%2520can%2520poison%2520the%2520GNN%2520model%2520to%2520predict%2520test%2520nodes%2520with%2520triggers%2520attached%2520as%2520the%2520target%2520class.%2520However%252C%2520apart%2520from%2520injecting%2520triggers%2520to%2520training%2520nodes%252C%2520these%2520graph%2520backdoor%2520attacks%2520generally%2520require%2520altering%2520the%2520labels%2520of%2520trigger-attached%2520training%2520nodes%2520into%2520the%2520target%2520class%252C%2520which%2520is%2520impractical%2520in%2520real-world%2520scenarios.%2520In%2520this%2520work%252C%2520we%2520focus%2520on%2520the%2520clean-label%2520graph%2520backdoor%2520attack%252C%2520a%2520realistic%2520but%2520understudied%2520topic%2520where%2520training%2520labels%2520are%2520not%2520modifiable.%2520According%2520to%2520our%2520preliminary%2520analysis%252C%2520existing%2520graph%2520backdoor%2520attacks {"title": "Safe-SAGE: Social-Semantic Adaptive Guidance for Safe Engagement through Laplace-Modulated Poisson Safety Functions", "author": "Lizhi Yang and Ryan M. Bena and Meg Wilkinson and Gilbert Bahati and Andy Navarro Brenes and Ryan K. Cosner and Aaron D. Ames", "abstract": "Traditional safety-critical control methods, such as control barrier functions, suffer from semantic blindness, exhibiting the same behavior around obstacles regardless of contextual significance. This limitation leads to the uniform treatment of all obstacles, despite their differing semantic meanings. We present Safe-SAGE (Social-Semantic Adaptive Guidance for Safe Engagement), a unified framework that bridges the gap between high-level semantic understanding and low-level safety-critical control through a Poisson safety function (PSF) modulated using a Laplace guidance field. Our approach perceives the environment by fusing multi-sensor point clouds with vision-based instance segmentation and persistent object tracking to maintain up-to-date semantics beyond the camera's field of view. A multi-layer safety filter is then used to modulate system inputs to achieve safe navigation using this semantic understanding of the environment. This safety filter consists of both a model predictive control layer and a control barrier function layer. Both layers utilize the PSF and flux modulation of the guidance field to introduce varying levels of conservatism and multi-agent passing norms for different obstacles in the environment. Our framework enables legged robots to navigate semantically rich, dynamic environments with context-dependent safety margins while maintaining rigorous safety guarantees.", "link": "http://arxiv.org/abs/2603.05497v1", "date": "2026-03-05", "relevancy": 2.2, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6171}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5388}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5343}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Safe-SAGE%3A%20Social-Semantic%20Adaptive%20Guidance%20for%20Safe%20Engagement%20through%20Laplace-Modulated%20Poisson%20Safety%20Functions&body=Title%3A%20Safe-SAGE%3A%20Social-Semantic%20Adaptive%20Guidance%20for%20Safe%20Engagement%20through%20Laplace-Modulated%20Poisson%20Safety%20Functions%0AAuthor%3A%20Lizhi%20Yang%20and%20Ryan%20M.%20Bena%20and%20Meg%20Wilkinson%20and%20Gilbert%20Bahati%20and%20Andy%20Navarro%20Brenes%20and%20Ryan%20K.%20Cosner%20and%20Aaron%20D.%20Ames%0AAbstract%3A%20Traditional%20safety-critical%20control%20methods%2C%20such%20as%20control%20barrier%20functions%2C%20suffer%20from%20semantic%20blindness%2C%20exhibiting%20the%20same%20behavior%20around%20obstacles%20regardless%20of%20contextual%20significance.%20This%20limitation%20leads%20to%20the%20uniform%20treatment%20of%20all%20obstacles%2C%20despite%20their%20differing%20semantic%20meanings.%20We%20present%20Safe-SAGE%20%28Social-Semantic%20Adaptive%20Guidance%20for%20Safe%20Engagement%29%2C%20a%20unified%20framework%20that%20bridges%20the%20gap%20between%20high-level%20semantic%20understanding%20and%20low-level%20safety-critical%20control%20through%20a%20Poisson%20safety%20function%20%28PSF%29%20modulated%20using%20a%20Laplace%20guidance%20field.%20Our%20approach%20perceives%20the%20environment%20by%20fusing%20multi-sensor%20point%20clouds%20with%20vision-based%20instance%20segmentation%20and%20persistent%20object%20tracking%20to%20maintain%20up-to-date%20semantics%20beyond%20the%20camera%27s%20field%20of%20view.%20A%20multi-layer%20safety%20filter%20is%20then%20used%20to%20modulate%20system%20inputs%20to%20achieve%20safe%20navigation%20using%20this%20semantic%20understanding%20of%20the%20environment.%20This%20safety%20filter%20consists%20of%20both%20a%20model%20predictive%20control%20layer%20and%20a%20control%20barrier%20function%20layer.%20Both%20layers%20utilize%20the%20PSF%20and%20flux%20modulation%20of%20the%20guidance%20field%20to%20introduce%20varying%20levels%20of%20conservatism%20and%20multi-agent%20passing%20norms%20for%20different%20obstacles%20in%20the%20environment.%20Our%20framework%20enables%20legged%20robots%20to%20navigate%20semantically%20rich%2C%20dynamic%20environments%20with%20context-dependent%20safety%20margins%20while%20maintaining%20rigorous%20safety%20guarantees.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05497v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSafe-SAGE%253A%2520Social-Semantic%2520Adaptive%2520Guidance%2520for%2520Safe%2520Engagement%2520through%2520Laplace-Modulated%2520Poisson%2520Safety%2520Functions%26entry.906535625%3DLizhi%2520Yang%2520and%2520Ryan%2520M.%2520Bena%2520and%2520Meg%2520Wilkinson%2520and%2520Gilbert%2520Bahati%2520and%2520Andy%2520Navarro%2520Brenes%2520and%2520Ryan%2520K.%2520Cosner%2520and%2520Aaron%2520D.%2520Ames%26entry.1292438233%3DTraditional%2520safety-critical%2520control%2520methods%252C%2520such%2520as%2520control%2520barrier%2520functions%252C%2520suffer%2520from%2520semantic%2520blindness%252C%2520exhibiting%2520the%2520same%2520behavior%2520around%2520obstacles%2520regardless%2520of%2520contextual%2520significance.%2520This%2520limitation%2520leads%2520to%2520the%2520uniform%2520treatment%2520of%2520all%2520obstacles%252C%2520despite%2520their%2520differing%2520semantic%2520meanings.%2520We%2520present%2520Safe-SAGE%2520%2528Social-Semantic%2520Adaptive%2520Guidance%2520for%2520Safe%2520Engagement%2529%252C%2520a%2520unified%2520framework%2520that%2520bridges%2520the%2520gap%2520between%2520high-level%2520semantic%2520understanding%2520and%2520low-level%2520safety-critical%2520control%2520through%2520a%2520Poisson%2520safety%2520function%2520%2528PSF%2529%2520modulated%2520using%2520a%2520Laplace%2520guidance%2520field.%2520Our%2520approach%2520perceives%2520the%2520environment%2520by%2520fusing%2520multi-sensor%2520point%2520clouds%2520with%2520vision-based%2520instance%2520segmentation%2520and%2520persistent%2520object%2520tracking%2520to%2520maintain%2520up-to-date%2520semantics%2520beyond%2520the%2520camera%2527s%2520field%2520of%2520view.%2520A%2520multi-layer%2520safety%2520filter%2520is%2520then%2520used%2520to%2520modulate%2520system%2520inputs%2520to%2520achieve%2520safe%2520navigation%2520using%2520this%2520semantic%2520understanding%2520of%2520the%2520environment.%2520This%2520safety%2520filter%2520consists%2520of%2520both%2520a%2520model%2520predictive%2520control%2520layer%2520and%2520a%2520control%2520barrier%2520function%2520layer.%2520Both%2520layers%2520utilize%2520the%2520PSF%2520and%2520flux%2520modulation%2520of%2520the%2520guidance%2520field%2520to%2520introduce%2520varying%2520levels%2520of%2520conservatism%2520and%2520multi-agent%2520passing%2520norms%2520for%2520different%2520obstacles%2520in%2520the%2520environment.%2520Our%2520framework%2520enables%2520legged%2520robots%2520to%2520navigate%2520semantically%2520rich%252C%2520dynamic%2520environments%2520with%2520context-dependent%2520safety%2520margins%2520while%2520maintaining%2520rigorous%2520safety%2520guarantees.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05497v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Safe-SAGE%3A%20Social-Semantic%20Adaptive%20Guidance%20for%20Safe%20Engagement%20through%20Laplace-Modulated%20Poisson%20Safety%20Functions&entry.906535625=Lizhi%20Yang%20and%20Ryan%20M.%20Bena%20and%20Meg%20Wilkinson%20and%20Gilbert%20Bahati%20and%20Andy%20Navarro%20Brenes%20and%20Ryan%20K.%20Cosner%20and%20Aaron%20D.%20Ames&entry.1292438233=Traditional%20safety-critical%20control%20methods%2C%20such%20as%20control%20barrier%20functions%2C%20suffer%20from%20semantic%20blindness%2C%20exhibiting%20the%20same%20behavior%20around%20obstacles%20regardless%20of%20contextual%20significance.%20This%20limitation%20leads%20to%20the%20uniform%20treatment%20of%20all%20obstacles%2C%20despite%20their%20differing%20semantic%20meanings.%20We%20present%20Safe-SAGE%20%28Social-Semantic%20Adaptive%20Guidance%20for%20Safe%20Engagement%29%2C%20a%20unified%20framework%20that%20bridges%20the%20gap%20between%20high-level%20semantic%20understanding%20and%20low-level%20safety-critical%20control%20through%20a%20Poisson%20safety%20function%20%28PSF%29%20modulated%20using%20a%20Laplace%20guidance%20field.%20Our%20approach%20perceives%20the%20environment%20by%20fusing%20multi-sensor%20point%20clouds%20with%20vision-based%20instance%20segmentation%20and%20persistent%20object%20tracking%20to%20maintain%20up-to-date%20semantics%20beyond%20the%20camera%27s%20field%20of%20view.%20A%20multi-layer%20safety%20filter%20is%20then%20used%20to%20modulate%20system%20inputs%20to%20achieve%20safe%20navigation%20using%20this%20semantic%20understanding%20of%20the%20environment.%20This%20safety%20filter%20consists%20of%20both%20a%20model%20predictive%20control%20layer%20and%20a%20control%20barrier%20function%20layer.%20Both%20layers%20utilize%20the%20PSF%20and%20flux%20modulation%20of%20the%20guidance%20field%20to%20introduce%20varying%20levels%20of%20conservatism%20and%20multi-agent%20passing%20norms%20for%20different%20obstacles%20in%20the%20environment.%20Our%20framework%20enables%20legged%20robots%20to%20navigate%20semantically%20rich%2C%20dynamic%20environments%20with%20context-dependent%20safety%20margins%20while%20maintaining%20rigorous%20safety%20guarantees.&entry.1838667208=http%3A//arxiv.org/abs/2603.05497v1&entry.124074799=Read"},
{"title": "A Unified Framework for Joint Detection of Lacunes and Enlarged Perivascular Spaces", "author": "Lucas He and Krinos Li and Hanyuan Zhang and Runlong He and Silvia Ingala and Luigi Lorenzini and Marleen de Bruijne and Frederik Barkhof and Rhodri Davies and Carole Sudre", "abstract": "Cerebral small vessel disease (CSVD) markers, specifically enlarged perivascular spaces (EPVS) and lacunae, present a unique challenge in medical image analysis due to their radiological mimicry. Standard segmentation networks struggle with feature interference and extreme class imbalance when handling these divergent targets simultaneously. To address these issues, we propose a morphology-decoupled framework where Zero-Initialized Gated Cross-Task Attention exploits dense EPVS context to guide sparse lacune detection. Furthermore, biological and topological consistency are enforced via a mixed-supervision strategy integrating Mutual Exclusion and Centerline Dice losses. Finally, we introduce an Anatomically-Informed Inference Calibration mechanism to dynamically suppress false positives based on tissue semantics. Extensive 5-folds cross-validation on the VALDO 2021 dataset (N=40) demonstrates state-of-the-art performance, notably surpassing task winners in lacunae detection precision (71.1%, p=0.01) and F1-score (62.6%, p=0.03). Furthermore, evaluation on the external EPAD cohort (N=1762) confirms the model's robustness for large-scale population studies. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.04243v2", "date": "2026-03-05", "relevancy": 2.1957, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5582}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5485}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Unified%20Framework%20for%20Joint%20Detection%20of%20Lacunes%20and%20Enlarged%20Perivascular%20Spaces&body=Title%3A%20A%20Unified%20Framework%20for%20Joint%20Detection%20of%20Lacunes%20and%20Enlarged%20Perivascular%20Spaces%0AAuthor%3A%20Lucas%20He%20and%20Krinos%20Li%20and%20Hanyuan%20Zhang%20and%20Runlong%20He%20and%20Silvia%20Ingala%20and%20Luigi%20Lorenzini%20and%20Marleen%20de%20Bruijne%20and%20Frederik%20Barkhof%20and%20Rhodri%20Davies%20and%20Carole%20Sudre%0AAbstract%3A%20Cerebral%20small%20vessel%20disease%20%28CSVD%29%20markers%2C%20specifically%20enlarged%20perivascular%20spaces%20%28EPVS%29%20and%20lacunae%2C%20present%20a%20unique%20challenge%20in%20medical%20image%20analysis%20due%20to%20their%20radiological%20mimicry.%20Standard%20segmentation%20networks%20struggle%20with%20feature%20interference%20and%20extreme%20class%20imbalance%20when%20handling%20these%20divergent%20targets%20simultaneously.%20To%20address%20these%20issues%2C%20we%20propose%20a%20morphology-decoupled%20framework%20where%20Zero-Initialized%20Gated%20Cross-Task%20Attention%20exploits%20dense%20EPVS%20context%20to%20guide%20sparse%20lacune%20detection.%20Furthermore%2C%20biological%20and%20topological%20consistency%20are%20enforced%20via%20a%20mixed-supervision%20strategy%20integrating%20Mutual%20Exclusion%20and%20Centerline%20Dice%20losses.%20Finally%2C%20we%20introduce%20an%20Anatomically-Informed%20Inference%20Calibration%20mechanism%20to%20dynamically%20suppress%20false%20positives%20based%20on%20tissue%20semantics.%20Extensive%205-folds%20cross-validation%20on%20the%20VALDO%202021%20dataset%20%28N%3D40%29%20demonstrates%20state-of-the-art%20performance%2C%20notably%20surpassing%20task%20winners%20in%20lacunae%20detection%20precision%20%2871.1%25%2C%20p%3D0.01%29%20and%20F1-score%20%2 {"title": "Differentially Private and Scalable Estimation of the Network Principal Component", "author": "Alireza Khayatian and Anil Vullikanti and Aritra Konar", "abstract": "Computing the principal component (PC) of the adjacency matrix of an undirected graph has several applications ranging from identifying key vertices for influence maximization and controlling diffusion processes, to discovering densely interconnected vertex subsets. However, many networked datasets are sensitive, which necessitates private computation of the PC for use in the aforementioned applications. Differential privacy has emerged as the gold standard in privacy-preserving data analysis, but existing DP algorithms for private PC suffer from low accuracy due to large noise injection or high complexity. Motivated by the large gap between the local and global sensitivities of the PC on real-graphs, we consider instance-specific mechanisms for privately computing the PC under edge-DP. These mechanisms guarantee privacy for all datasets, but provide good utility on ``well-behaved'' datasets by injecting smaller amounts of noise. More specifically, we consider the Propose-Test-Release (PTR) framework. Although computationally expensive in general, we design a novel approach for implementing a PTR variant in the same time as computation of a non-private PC, while offering good utility. Our framework tests in a differentially-private manner whether a given graph is ``well-behaved'' or not, and then tests whether its private to release a noisy PC with small noise. As a consequence, this also leads to the first DP algorithm for the Densest-$k$-subgraph problem, a key graph mining primitive. We run our method on diverse real-world networks, with the largest having 3 million vertices, and compare its utility to a pre-existing baseline based on the private power method (PPM). Although PTR requires a slightly larger privacy budget, on average, it achieves a 180-fold improvement in runtime over PPM.", "link": "http://arxiv.org/abs/2505.03858v2", "date": "2026-03-05", "relevancy": 2.1859, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4526}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4329}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4261}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differentially%20Private%20and%20Scalable%20Estimation%20of%20the%20Network%20Principal%20Component&body=Title%3A%20Differentially%20Private%20and%20Scalable%20Estimation%20of%20the%20Network%20Principal%20Component%0AAuthor%3A%20Alireza%20Khayatian%20and%20Anil%20Vullikanti%20and%20Aritra%20Konar%0AAbstract%3A%20Computing%20the%20principal%20component%20%28PC%29%20of%20the%20adjacency%20matrix%20of%20an%20undirected%20graph%20has%20several%20applications%20ranging%20from%20identifying%20key%20vertices%20for%20influence%20maximization%20and%20controlling%20diffusion%20processes%2C%20to%20discovering%20densely%20interconnected%20vertex%20subsets.%20However%2C%20many%20networked%20datasets%20are%20sensitive%2C%20which%20necessitates%20private%20computation%20of%20the%20PC%20for%20use%20in%20the%20aforementioned%20applications.%20Differential%20privacy%20has%20emerged%20as%20the%20gold%20standard%20in%20privacy-preserving%20data%20analysis%2C%20but%20existing%20DP%20algorithms%20for%20private%20PC%20suffer%20from%20low%20accuracy%20due%20to%20large%20noise%20injection%20or%20high%20complexity.%20Motivated%20by%20the%20large%20gap%20between%20the%20local%20and%20global%20sensitivities%20of%20the%20PC%20on%20real-graphs%2C%20we%20consider%20instance-specific%20mechanisms%20for%20privately%20computing%20the%20PC%20under%20edge-DP.%20These%20mechanisms%20guarantee%20privacy%20for%20all%20datasets%2C%20but%20provide%20good%20utility%20on%20%60%60well-behaved%27%27%20datasets%20by%20injecting%20smaller%20amounts%20of%20noise.%20More%20specifically%2C%20we%20consider%20the%20Propose-Test-Release%20%28PTR%29%20framework.%20Although%20computationally%20expensive%20in%20general%2C%20we%20design%20a%20novel%20approach%20for%20implementing%20a%20PTR%20variant%20in%20the%20same%20time%20as%20computation%20of%20a%20non-private%20PC%2C%20while%20offering%20good%20utility.%20Our%20framework%20tests%20in%20a%20differentially-private%20manner%20whether%20a%20given%20graph%20is%20%60%60well-behaved%27%27%20or%20not%2C%20and%20then%20tests%20whether%20its%20private%20to%20release%20a%20noisy%20PC%20with%20small%20noise.%20As%20a%20consequence%2C%20this%20also%20leads%20to%20the%20first%20DP%20algorithm%20for%20the%20Densest-%24k%24-subgraph%20problem%2C%20a%20key%20graph%20mining%20primitive.%20We%20run%20our%20method%20on%20diverse%20real-world%20networks%2C%20with%20the%20largest%20having%203%20million%20vertices%2C%20and%20compare%20its%20utility%20to%20a%20pre-existing%20baseline%20based%20on%20the%20private%20power%20method%20%28PPM%29.%20Although%20PTR%20requires%20a%20slightly%20larger%20privacy%20budget%2C%20on%20average%2C%20it%20achieves%20a%20180-fold%20improvement%20in%20runtime%20over%20PPM.%0ALink%3A%20http%3A//arxiv.org/abs/2505.03858v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDifferentially%2520Private%2520and%2520Scalable%2520Estimation%2520of%2520the%2520Network%2520Principal%2520Component%26entry.906535625%3DAlireza%2520Khayatian%2520and%2520Anil%2520Vullikanti%2520and%2520Aritra%2520Konar%26entry.1292438233%3DComputing%2520the%2520principal%2520component%2520%2528PC%2529%2520of%2520the%2520adjacency%2520matrix%2520of%2520an%2520undirected%2520graph%2520has%2520several%2520applications%2520ranging%2520from%2520identifying%2520key%2520vertices%2520for%2520influence%2520maximization%2520and%2520controlling%2520diffusion%2520processes%252C%2520to%2520discovering%2520densely%2520interconnected%2520vertex%2520subsets.%2520However%252C%2520many%2520networked%2520datasets%2520are%2520sensitive%252C%2520which%2520necessitates%2520private%2520computation%2520of%2520the%2520PC%2520for%2520use%2520in%2520the%2520aforementioned%2520applications.%2520Differential%2520privacy%2520has%2520emerged%2520as%2520the%2520gold%2520standard%2520in%2520privacy-preserving%2520data%2520analysis%252C%2520but%2520existing%2520DP%2520algorithms%2520for%2520private%2520PC%2520suffer%2520from%2520low%2520accuracy%2520due%2520to%2520large%2520noise%2520injection%2520or%2520high%2520complexity.%2520Motivated%2520by%2520the%2520large%2520gap%2520between%2520the%2520local%2520and%2520global%2520sensitivities%2520of%2520the%2520PC%2520on%2520real-graphs%252C%2520we%2520consider%2520instance-specific%2520mechanisms%2520for%2520privately%2520computing%2520the%2520PC%2520under%2520edge-DP.%2520These%2520mechanisms%2520guarantee%2520privacy%2520for%2520all%2520datasets%252C%2520but%2520provide%2520good%2520utility%2520on%2520%2560%2560well-behaved%2527%2527%2520datasets%2520by%2520injecting%2520smaller%2520amounts%2520of%2520noise.%2520More%2520specifically%252C%2520we%2520consider%2520the%2520Propose-Test-Release%2520%2528PTR%2529%2520framework.%2520Although%2520computationally%2520expensive%2520in%2520general%252C%2520we%2520design%2520a%2520novel%2520approach%2520for%2520implementing%2520a%2520PTR%2520variant%2520in%2520the%2520same%2520time%2520as%2520computation%2520of%2520a%2520non-private%2520PC%252C%2520while%2520offering%2520good%2520utility.%2520Our%2520framework%2520tests%2520in%2520a%2520differentially-private%2520manner%2520whether%2520a%2520given%2520graph%2520is%2520%2560%2560well-behaved%2527%2527%2520or%2520not%252C%2520and%2520then%2520tests%2520whether%2520its%2520private%2520to%2520rel {"title": "Beyond Scattered Acceptance: Fast and Coherent Inference for DLMs via Longest Stable Prefixes", "author": "Pengxiang Li and Joey Tsai and Hongwei Xue and Kunyu Shi and Shilin Yan", "abstract": "Diffusion Language Models (DLMs) promise highly parallel text generation, yet their practical inference speed is often bottlenecked by suboptimal decoding schedulers. Standard approaches rely on 'scattered acceptance'-committing high confidence tokens at disjoint positions throughout the sequence. This approach inadvertently fractures the Key-Value (KV) cache, destroys memory locality, and forces the model into costly, repeated repairs across unstable token boundaries. To resolve this, we present the Longest Stable Prefix (LSP) scheduler, a training-free and model-agnostic inference paradigm based on monolithic prefix absorption. In each denoising step, LSP evaluates token stability via a single forward pass, dynamically identifies a contiguous left-aligned block of stable predictions, and snaps its boundary to natural linguistic or structural delimiters before an atomic commitment. This prefix-first topology yields dual benefits: systemically, it converts fragmented KV cache updates into efficient, contiguous appends; algorithmically, it preserves bidirectional lookahead over a geometrically shrinking active suffix, drastically reducing token flip rates and denoiser calls. Extensive evaluations on LLaDA-8B and Dream-7B demonstrate that LSP accelerates inference by up to 3.4x across rigorous benchmarks including mathematical reasoning, code generation, multilingual (CJK) tasks, and creative writing while matching or slightly improving output quality. By fundamentally restructuring the commitment topology, LSP bridges the gap between the theoretical parallelism of DLMs and practical hardware efficiency.", "link": "http://arxiv.org/abs/2603.05454v1", "date": "2026-03-05", "relevancy": 2.1743, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5939}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5335}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5335}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Scattered%20Acceptance%3A%20Fast%20and%20Coherent%20Inference%20for%20DLMs%20via%20Longest%20Stable%20Prefixes&body=Title%3A%20Beyond%20Scattered%20Acceptance%3A%20Fast%20and%20Coherent%20Inference%20for%20DLMs%20via%20Longest%20Stable%20Prefixes%0AAuthor%3A%20Pengxiang%20Li%20and%20Joey%20Tsai%20and%20Hongwei%20Xue%20and%20Kunyu%20Shi%20and%20Shilin%20Yan%0AAbstract%3A%20Diffusion%20Language%20Models%20%28DLMs%29%20promise%20highly%20parallel%20text%20generation%2C%20yet%20their%20practical%20inference%20speed%20is%20often%20bottlenecked%20by%20suboptimal%20decoding%20schedulers.%20Standard%20approaches%20rely%20on%20%27scattered%20acceptance%27-committing%20high%20confidence%20tokens%20at%20disjoint%20positions%20throughout%20the%20sequence.%20This%20approach%20inadvertently%20fractures%20the%20Key-Value%20%28KV%29%20cache%2C%20destroys%20memory%20locality%2C%20and%20forces%20the%20model%20into%20costly%2C%20repeated%20repairs%20across%20unstable%20token%20boundaries.%20To%20resolve%20this%2C%20we%20present%20the%20Longest%20Stable%20Prefix%20%28LSP%29%20scheduler%2C%20a%20training-free%20and%20model-agnostic%20inference%20paradigm%20based%20on%20monolithic%20prefix%20absorption.%20In%20each%20denoising%20step%2C%20LSP%20evaluates%20token%20stability%20via%20a%20single%20forward%20pass%2C%20dynamically%20identifies%20a%20contiguous%20left-aligned%20block%20of%20stable%20predictions%2C%20and%20snaps%20its%20boundary%20to%20natural%20linguistic%20or%20structural%20delimiters%20before%20an%20atomic%20commitment.%20This%20prefix-first%20topology%20yields%20dual%20benefits%3A%20systemically%2C%20it%20converts%20fragmented%20KV%20cache%20updates%20into%20efficient%2C%20contiguous%20appends%3B%20algorithmically%2C%20it%20preserves%20bidirectional%20lookahead%20over%20a%20geometrically%20shrinking%20active%20suffix%2C%20drastically%20reducing%20token%20flip%20rates%20and%20denoiser%20calls.%20Extensive%20evaluations%20on%20LLaDA-8B%20and%20Dream-7B%20demonstrate%20that%20LSP%20accelerates%20inference%20by%20up%20to%203.4x%20across%20rigorous%20benchmarks%20including%20mathematical%20reasoning%2C%20code%20generation%2C%20multilingual%20%28CJK%29%20tasks%2C%20and%20creative%20writing%20while%20matching%20or%20slightly%20improving%20output%20quality.%20By%20fundamentally%20restructuring%20the%20commitment%20topology%2C%20LSP%20bridges%20the%20gap%20between%20the%20theoretical%20parallelism%20of%20DLMs%20and%20practical%20hardware%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05454v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Scattered%2520Acceptance%253A%2520Fast%2520and%2520Coherent%2520Inference%2520for%2520DLMs%2520via%2520Longest%2520Stable%2520Prefixes%26entry.906535625%3DPengxiang%2520Li%2520and%2520Joey%2520Tsai%2520and%2520Hongwei%2520Xue%2520and%2520Kunyu%2520Shi%2520and%2520Shilin%2520Yan%26entry.1292438233%3DDiffusion%2520Language%2520Models%2520%2528DLMs%2529%2520promise%2520highly%2520parallel%2520text%2520generation%252C%2520yet%2520their%2520practical%2520inference%2520speed%2520is%2520often%2520bottlenecked%2520by%2520suboptimal%2520decoding%2520schedulers.%2520Standard%2520approaches%2520rely%2520on%2520%2527scattered%2520acceptance%2527-committing%2520high%2520confidence%2520tokens%2520at%2520disjoint%2520positions%2520throughout%2520the%2520sequence.%2520This%2520approach%2520inadvertently%2520fractures%2520the%2520Key-Value%25 20practical%2520hardware%2520efficiency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05454v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Scattered%20Acceptance%3A%20Fast%20and%20Coherent%20Inference%20for%20DLMs%20via%20Longest%20Stable%20Prefixes&entry.906535625=Pengxiang%20Li%20and%20Joey%20Tsai%20and%20Hongwei%20Xue%20and%20Kunyu%20Shi%20and%20Shilin%20Yan&entry.1292438233=Diffusion%20Language%20Models%20%28DLMs%29%20promise%20highly%20parallel%20text%20generation%2C%20yet%20their%20practical%20inference%20speed%20is%20often%20bottlenecked%20by%20suboptimal%20decoding%20schedulers.%20Standard%20approaches%20rely%20on%20%27scattered%20acceptance%27-committing%20high%20confidence%20tokens%20at%20disjoint%20positions%20throughout%20the%20sequence.%20This%20approach%20inadvertently%20fractures%20the%20Key-Value%20%28KV%29%20cache%2C%20destroys%20memory%20locality%2C%20and%20forces%20the%20model%20into%20costly%2C%20repeated%20repairs%20across%20unstable%20token%20boundaries.%20To%20resolve%20this%2C%20we%20present%20the%20Longest%20Stable%20Prefix%20%28LSP%29%20scheduler%2C%20a%20training-free%20and%20model-agnostic%20inference%20paradigm%20based%20on%20monolithic%20prefix%20absorption.%20In%20each%20denoising%20step%2C%20LSP%20evaluates%20token%20stability%20via%20a%20single%20forward%20pass%2C%20dynamically%20identifies%20a%20contiguous%20left-aligned%20block%20of%20stable%20predictions%2C%20and%20snaps%20its%20boundary%20to%20natural%20linguistic%20or%20structural%20delimiters%20before%20an%20atomic%20commitment.%20This%20prefix-first%20topology%20yields%20dual%20benefits%3A%20systemically%2C%20it%20converts%20fragmented%20KV%20cache%20updates%20into%20efficient%2C%20contiguous%20appends%3B%20algorithmically%2C%20it%20preserves%20bidirectional%20lookahead%20over%20a%20geometrically%20shrinking%20active%20suffix%2C%20drastically%20reducing%20 {"title": "Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance", "author": "Yiqi Lin and Guoqiang Liang and Ziyun Zeng and Zechen Bai and Yanzhe Chen and Mike Zheng Shou", "abstract": "Instruction-based video editing has witnessed rapid progress, yet current methods often struggle with precise visual control, as natural language is inherently limited in describing complex visual nuances. Although reference-guided editing offers a robust solution, its potential is currently bottlenecked by the scarcity of high-quality paired training data. To bridge this gap, we introduce a scalable data generation pipeline that transforms existing video editing pairs into high-fidelity training quadruplets, leveraging image generative models to create synthesized reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset tailored for instruction-reference-following tasks, and establish RefVIE-Bench for comprehensive evaluation. Furthermore, we propose a unified editing architecture, Kiwi-Edit, that synergizes learnable queries and latent visual features for reference semantic guidance. Our model achieves significant gains in instruction following and reference fidelity via a progressive multi-stage training curriculum. Extensive experiments demonstrate that our data and architecture establish a new state-of-the-art in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.", "link": "http://arxiv.org/abs/2603.02175v2", "date": "2026-03-05", "relevancy": 2.1702, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.552}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5431}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5382}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kiwi-Edit%3A%20Versatile%20Video%20Editing%20via%20Instruction%20and%20Reference%20Guidance&body=Title%3A%20Kiwi-Edit%3A%20Versatile%20Video%20Editing%20via%20Instruction%20and%20Reference%20Guidance%0AAuthor%3A%20Yiqi%20Lin%20and%20Guoqiang%20Liang%20and%20Ziyun%20Zeng%20and%20Zechen%20Bai%20and%20Yanzhe%20Chen%20and%20Mike%20Zheng%20Shou%0AAbstract%3A%20Instruction-based%20video%20editing%20has%20witnessed%20rapid%20progress%2C%20yet%20current%20methods%20often%20struggle%20with%20precise%20visual%20control%2C%20as%20natural%20language%20is%20inherently%20limited%20in%20describing%20complex%20visual%20nuances.%20Although%20reference-guided%20editing%20offers%20a%20robust%20solution%2C%20its%20potential%20is%20currently%20bottlenecked%20by%20the%20scarcity%20of%20high-quality%20paired%20training%20data.%20To%20bridge%20this%20gap%2C%20we%20introduce%20a%20scalable%20data%20generation%20pipeline%20that%20transforms%20existing%20video%20editing%20pairs%20into%20high-fidelity%20training%20quadruplets%2C%20leveraging%20image%20generative%20models%20to%20create%20synthesized%20reference%20scaffolds.%20Using%20this%20pipeline%2C%20we%20construct%20RefVIE%2C%20a%20large-scale%20dataset%20tailored%20for%20instruction-reference-following%20tasks%2C%20and%20establish%20RefVIE-Bench%20for%20comprehensive%20evaluation.%20Furthermore%2C%20we%20propose%20a%20unified%20editing%20architecture%2C%20Kiwi-Edit%2C%20that%20synergizes%20learnable%20queries%20and%20latent%20visual%20features%20for%20reference%20semantic%20guidance.%20Our%20model%20achieves%20significant%20gains%20in%20instruction%20following%20and%20reference%20fidelity%20via%20a%20progressive%20multi-stage%20training%20curriculum.%20Extensive%20experiments%20demonstrate%20that%20our%20data%20and%20architecture%20establish%20a%20new%20state-of-the-art%20in%20controllable%20video%20editing.%20All%20datasets%

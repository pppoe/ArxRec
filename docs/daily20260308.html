tic%2520guidance.%2520Our%2520model%2520achieves%2520significant%2520gains%2520in%2520instruction%2520following%2520and%2520reference%2520fidelity%2520via%2520a%2520progressive%2520multi-stage%2520training%2520curriculum.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520data%2520and%2520architecture%2520establish%2520a%2520new%2520state-of-the-art%2520in%2520controllable%2520video%2520editing.%2520All%2520datasets%252C%2520models%252C%2520and%2520code%2520is%2520released%2520at%2520https%253A//github.com/showlab/Kiwi-Edit.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02175v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Kiwi-Edit%3A%20Versatile%20Video%20Editing%20via%20Instruction%20and%20Reference%20Guidance&entry.906535625=Yiqi%20Lin%20and%20Guoqiang%20Liang%20and%20Ziyun%20Zeng%20and%20Zechen%20Bai%20and%20Yanzhe%20Chen%20and%20Mike%20Zheng%20Shou&entry.1292438233=Instruction-based%20video%20editing%20has%20witnessed%20rapid%20progress%2C%20yet%20current%20methods%20often%20struggle%20with%20precise%20visual%20control%2C%20as%20natural%20language%20is%20inherently%20limited%20in%20describing%20complex%20visual%20nuances.%20Although%20reference-guided%20editing%20offers%20a%20robust%20solution%2C%20its%20potential%20is%20currently%20bottlenecked%20by%20the%20scarcity%20of%20high-quality%20paired%20training%20data.%20To%20bridge%20this%20gap%2C%20we%20introduce%20a%20scalable%20data%20generation%20pipeline%20that%20transforms%20existing%20video%20editing%20pairs%20into%20high-fidelity%20training%20quadruplets%2C%20leveraging%20image%20generative%20models%20to%20create%20synthesized%20reference%20scaffolds.%20Using%20this%20pipeline%2C%20we%20construct%20RefVIE%2C%20a%20large-scale%20dataset%20tailored%20for%20instruction-reference-following%20tasks%2C%20and%20establish%20RefVIE-Bench%20for%20comprehensive%20evaluation.%20Furthermore%2C {"title": "Mario: Multimodal Graph Reasoning with Large Language Models", "author": "Yuanfu Sun and Kang Li and Pengkang Guo and Jiajin Liu and Qiaoyu Tan", "abstract": "Recent advances in large language models (LLMs) have opened new avenues for multimodal reasoning. Yet, most existing methods still rely on pretrained vision-language models (VLMs) to encode image-text pairs in isolation, ignoring the relational structure that real-world multimodal data naturally form. This motivates reasoning on multimodal graphs (MMGs), where each node has textual and visual attributes and edges provide structural cues. Enabling LLM-based reasoning on such heterogeneous multimodal signals while preserving graph topology introduces two key challenges: resolving weak cross-modal consistency and handling heterogeneous modality preference. To address this, we propose Mario, a unified framework that simultaneously resolves the two above challenges and enables effective LLM-based reasoning over MMGs. Mario consists of two innovative stages. Firstly, a graph-conditioned VLM design that jointly refines textual and visual features through fine-grained cross-modal contrastive learning guided by graph topology. Secondly, a modality-adaptive graph instruction tuning mechanism that organizes aligned multimodal features into graph-aware instruction views and employs a learnable router to surface, for each node and its neighborhood, the most informative modality configuration to the LLM. Extensive experiments across diverse MMG benchmarks demonstrate that Mario consistently outperforms state-of-the-art graph models in both supervised and zero-shot scenarios for node classification and link prediction. The code will be made available at https://github.com/sunyuanfu/Mario.", "link": "http://arxiv.org/abs/2603.05181v1", "date": "2026-03-05", "relevancy": 2.17, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.552}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5454}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5318}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mario%3A%20Multimodal%20Graph%20Reasoning%20with%20Large%20Language%20Models&body=Title%3A%20Mario%3A%20Multimodal%20Graph%20Reasoning%20with%20Large%20Language%20Models%0AAuthor%3A%20Yuanfu%20Sun%20and%20Kang%20Li%20and%20Pengkang%20Guo%20and%20Jiajin%20Liu%20and%20Qiaoyu%20Tan%0AAbstract%3A%20Recent%20advances%20in%20large%20language%20models%20%28LLMs%29%20have%20opened%20new%20avenues%20for%20multimodal%20reasoning.%20Yet%2C%20most%20existing%20methods%20still%20rely%20on%20pretrained%20vision-language%20models%20%28VLMs%29%20to%20encode%20image-text%20pairs%20in%20isolation%2C%20ignoring%20the%20relational%20structure%20that%20real-world%20multimodal%20data%20naturally%20form.%20This%20motivates%20reasoning%20on%20multimodal%20graphs%20%28MMGs%29%2C%20where%20each%20node%20has%20textual%20and%20visual%20attributes%20and%20edges%20provide%20structural%20cues.%20Enabling%20LLM-based%20reasoning%20on%20such%20heterogeneous%20multimodal%20signals%20while%20preserving%20graph%20topology%20introduces%20two%20key%20challenges%3A%20resolving%20weak%20cross-modal%20consistency%20and%20handling%20heterogeneous%20modality%20preference.%20To%20address%20this%2C%20we%20propose%20Mario%2C%20a%20unified%20framework%20that%20simultaneously%20resolves%20the%20two%20above%20challenges%20and%20enables%20effective%20LLM-based%20reasoning%20over%20MMGs.%20Mario%20consists%20of%20two%20innovative%20stages.%20Firstly%2C%20a%20graph-conditioned%20VLM%20design%20that%20jointly%20refines%20textual%20and%20visual%20features%20through%20fine-grained%20cross-modal%20contrastive%20learning%20guided%20by%20graph%20topology.%20Secondly%2C%20a%20modality-adaptive%20graph%20instruction%20tuning%20mechanism%20that%20organizes%20aligned%20multimodal%20features%20into%20graph-aware%20instruction%20views%20and%20employs%20a%20learnable%20router%20to%20surface%2C%20for%20each%20node%20and%20its%20neighborhood%2C%20the%20most%20informative%20modality%20configuration%20to%20the%20LLM.%20Extensive%20experiments%20across%20diverse%20MMG%20benchmarks%20demonstrate%20that%20Mario%20consistently%20outperforms%20state-of-the-art%20graph%20models%20in%20both%20supervised%20and%20zero-shot%20scenarios%20for%20node%20classification%20and%20link%20prediction.%20The%20code%20will%20be%20made%20available%20at%20https%3A//github.com/sunyuanfu/Mario.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05181v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMario%253A%2520Multimodal%2520Graph%2520Reasoning%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DYuanfu%2520Sun%2520and%2520Kang%2520Li%2520and%2520Pengkang%2520Guo%2520and%2520Jiajin%2520Liu%2520and%2520Qiaoyu%2520Tan%26entry.1292438233%3DRecent%2520advances%2520in%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520opened%2520new%2520avenues%2520for%2520multimodal%2520reasoning.%2520Yet%252C%2520most%2520existing%2520methods%2520still%2520rely%2520on%2520pretrained%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520encode%2520image-text%2520pairs%2520in%2520isolation%252C%2520ignoring%2520the%2520relational%2520structure%2520that%2520real-world%2520multimodal%2520data%2520naturally%2520form.%2520This%2520motivates%2520reasoning%2520on%2520multimodal%2520graphs%2520%2528MMGs%2529%252C%2520where%2520each%2520node%2520has%2520textual%2520and%2520visual%2520attributes%2520and%2520edges%2520provide%2520structural%2520cues.%2520Enabling%2520LLM-based%2520reasoning%2520on%2520such%2520heter {"title": "Harnessing Synthetic Data from Generative AI for Statistical Inference", "author": "Ahmad Abdel-Azim and Ruoyu Wang and Xihong Lin", "abstract": "The emergence of generative AI models has dramatically expanded the availability and use of synthetic data across scientific, industrial, and policy domains. While these developments open new possibilities for data analysis, they also raise fundamental statistical questions about when synthetic data can be used in a valid, reliable, and principled manner. This paper reviews the current landscape of synthetic data generation and use from a statistical perspective, with the goal of clarifying the assumptions under which synthetic data can meaningfully support downstream discovery, inference, and prediction. We survey major classes of modern generative models, their intended use cases, and the benefits they offer, while also highlighting their limitations and characteristic failure modes. We additionally examine common pitfalls that arise when synthetic data are treated as surrogates for real observations, including biases from model misspecification, attenuated uncertainty, and difficulties in generalization. Building on these insights, we discuss emerging frameworks for the principled use of synthetic data. We conclude with practical recommendations, open problems, and cautions intended to guide both method developers and applied researchers.", "link": "http://arxiv.org/abs/2603.05396v1", "date": "2026-03-05", "relevancy": 2.1656, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5668}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5335}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4977}], "mailto": "mailto:haoxiang.li.2024@gmail.co {"title": "Graph-Based Multi-Modal Light-weight Network for Adaptive Brain Tumor Segmentation", "author": "Guohao Huo and Ruiting Dai and Zitong Wang and Junxin Kong and Hao Tang", "abstract": "Multi-modal brain tumor segmentation remains challenging for practical deployment due to the high computational costs of mainstream models. In this work, we propose GMLN-BTS, a Graph-based Multi-modal interaction Lightweight Network for brain tumor segmentation. Our architecture achieves high-precision, resource-efficient segmentation through three key components. First, a Modality-Aware Adaptive Encoder (M2AE) facilitates efficient multi-scale semantic extraction. Second, a Graph-based Multi-Modal Collaborative Interaction Module (G2MCIM) leverages graph structures to model complementary cross-modal relationships. Finally, a Voxel Refinement UpSampling Module (VRUM) integrates linear interpolation with multi-scale transposed convolutions to suppress artifacts and preserve boundary details. Experimental results on BraTS 2017, 2019, and 2021 benchmarks demonstrate that GMLN-BTS achieves state-of-the-art performance among lightweight models. With only 4.58M parameters, our method reduces parameter count by 98% compared to mainstream 3D Transformers while significantly outperforming existing compact approaches.", "link": "http://arxiv.org/abs/2507.09995v3", "date": "2026-03-05", "relevancy": 2.1646, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5522}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5342}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5307}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Graph-Based%20Multi-Modal%20Light-weight%20Network%20for%20Adaptive%20Brain%20Tumor%20Segmentation&body=Title%3A%20Graph-Based%20Multi-Modal%20Light-weight%20Network%20for%20Adaptive%20Brain%20Tumor%20Segmentation%0AAuthor%3A%20Guohao%20Huo%20and%20Ruiting%20Dai%20and%20Zitong%20Wang%20and%20Junxin%20Kong%20and%20Hao%20Tang%0AAbstract%3A%20Multi-modal%20brain%20tumor%20segmentation%20remains%20challenging%20for%20practical%20deployment%20due%20to%20the%20high%20computational%20costs%20of%20mainstream%20models.%20In%20this%20work%2C%20we%20propose%20GMLN-BTS%2C%20a%20Graph-based%20Multi-modal%20interaction%20Lightweight%20Network%20for%20brain%20tumor%20segmentation.%20Our%20architecture%20achieves%20high-precision%2C%20resource-efficient%20segmentation%20through%20three%20key%20components.%20First%2C%20a%20Modality-Aware%20Adaptive%20Encoder%20%28M2AE%29%20facilitates%20efficient%20multi-scale%20semantic%20extraction.%20Second%2C%20a%20Graph-based%20Multi-Modal%20Collaborative%20Interaction%20Module%20%28G2MCIM%29%20leverages%20graph%20structures%20to%20model%20complementary%20cross-modal%20relationships.%20Finally%2C%20a%20Voxel%20Refinement%20UpSampling%20Module%20%28VRUM%29%20integrates%20linear%20interpolation%20with%20multi-scale%20transposed%20convolutions%20to%20suppress%20artifacts%20and%20preserve%20boundary%20details.%20Experimental%20results%20on%20BraTS%202017%2C%202019%2C%20and%202021%20benchmarks%20demonstrate%20that%20GMLN-BTS%20achieves%20state-of-the-art%20performance%20among%20lightweight%20models.%20With%20only%204.58M%20parameters%2C%20our%20method%20reduces%20parameter%20count%20by%2098%25%20compared%20to%20mainstream%203D%20Transformers%20while%20significantly%20outperforming%20existing%20compact%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2507.09995v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph-Based%2520Multi-Modal%2520Light-weight%2520Network%2520for {"title": "UniM: A Unified Any-to-Any Interleaved Multimodal Benchmark", "author": "Yanlin Li and Minghui Guo and Kaiwen Zhang and Shize Zhang and Yiran Zhao and Haodong Li and Congyue Zhou and Weijie Zheng and Yushen Yan and Shengqiong Wu and Wei Ji and Lei Cui and Furu Wei and Hao Fei and Mong-Li Lee and Wynne Hsu", "abstract": "In real-world multimodal applications, systems usually need to comprehend arbitrarily combined and interleaved multimodal inputs from users, while also generating outputs in any interleaved multimedia form. This capability defines the goal of any-to-any interleaved multimodal learning under a unified paradigm of understanding and generation, posing new challenges and opportunities for advancing Multimodal Large Language Models (MLLMs). To foster and benchmark this capability, this paper introduces the UniM benchmark, the first Unified Any-to-Any Interleaved Multimodal dataset. UniM contains 31K high-quality instances across 30 domains and 7 representative modalities: text, image, audio, video, document, code, and 3D, each requiring multiple intertwined reasoning and generation capabilities. We further introduce the UniM Evaluation Suite, which assesses models along three dimensions: Semantic Correctness & Generation Quality, Response Structure Integrity, and Interleaved Coherence. In addition, we propose UniMA, an agentic baseline model equipped with traceable reasoning for structured interleaved generation. Comprehensive experiments demonstrate the difficulty of UniM and highlight key challenges and directions for advancing unified any-to-any multimodal intelligence. The project page is https://any2any-mllm.github.io/unim.", "link": "http://arxiv.org/abs/2603.05075v1", "date": "2026-03-05", "relevancy": 2.1562, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5555}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5478}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5191}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniM%3A%20A%20Unified%20Any-to-Any%20Interleaved%20Multimodal%20Benchmark&body=Title%3A%20UniM%3A%20A%20Unified%20Any-to-Any%20Interleaved%20Multimodal%20Benchmark%0AAuthor%3A%20Yanlin%20Li%20and%20Minghui%20Guo%20and%20Kaiwen%20Zhang%20and%20Shize%20Zhang%20and%20Yiran%20Zhao%20and%20Haodong%20Li%20and%20Congyue%20Zhou%20and%20Weijie%20Zheng%20and%20Yushen%20Yan%20and%20Shengqiong%20Wu%20and%20Wei%20Ji%20and%20Lei%20Cui%20and%20Furu%20Wei%20and%20Hao%20Fei%20and%20Mong-Li%20Lee%20and%20Wynne%20Hsu%0AAbstract%3A%20In%20real-world%20multimodal%20applications%2C%20systems%20usually%20need%20to%20comprehend%20arbitrarily%20combined%20and%20interleaved%20multimodal%20inputs%20from%20users%2C%20while%20also%20generating%20outputs%20in%20any%20interleaved%20multimedia%20form.%20This%20capability%20defines%20the%20goal%20of%20any-to-any%20interleaved%20multimodal%20learning%20under%20a%20unified%20paradigm%20of%20understanding%20and%20generation%2C%20posing%20new%20challenges%20and%20opportunities%20for%20advancing%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29.%20To%20foster%20and%20benchmark%20this%20capability%2C%20this%20paper%20introduces%20the%20UniM%20benchmark%2C%20the%20first%20Unified%20Any-to-Any%20Interleaved%20Multimodal%20dataset.%20UniM%20contains%2031K%20high-quality%20instances%20across%2030%20domains%20and%207%20representative%20modalities%3A%20text%2C%20image%2C%20audio%2C%20video%2C%20document%2C%20code%2C%20and%203D%2C%20each%20requiring%20multiple%20intertwined%20reasoning%20and%20generation%20capabilities.%20We%20further%20introduce%20the%20UniM%20Evaluation%20Suite%2C%20which%20assesses%20models%20along%20three%20dimensions {"title": "Schr\u00f6dinger Bridge Mamba for One-Step Speech Enhancement", "author": "Jing Yang and Sirui Wang and Chao Wu and Lei Guo and Fan Fan", "abstract": "We present Schr\u00f6dinger Bridge Mamba (SBM), a novel model for efficient speech enhancement by integrating the Schr\u00f6dinger Bridge (SB) training paradigm and the Mamba architecture. Experiments of joint denoising and dereverberation tasks demonstrate SBM outperforms strong generative and discriminative methods on multiple metrics with only one step of inference while achieving a competitive real-time factor for streaming feasibility. Ablation studies reveal that the SB paradigm consistently yields improved performance across diverse architectures over conventional mapping. Furthermore, Mamba exhibits a stronger performance under the SB paradigm compared to Multi-Head Self-Attention (MHSA) and Long Short-Term Memory (LSTM) backbones. These findings highlight the synergy between the Mamba architecture and the SB trajectory-based training, providing a high-quality solution for real-world speech enhancement. Demo page: https://sbmse.github.io", "link": "http://arxiv.org/abs/2510.16834v2", "date": "2026-03-05", "relevancy": 1.428, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4824}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4777}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4728}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Schr%C3%B6dinger%20Bridge%20Mamba%20for%20One-Step%20Speech%20Enhancement&body=Title%3A%20Schr%C3%B6dinger%20Bridge%20Mamba%20for%20One-Step%20Speech%20Enhancement%0AAuthor%3A%20Jing%20Yang%20and%20Sirui%20Wang%20and%20Chao%20Wu%20and%20Lei%20Guo%20and%20Fan%20Fan%0AAbstract%3A%20We%20present%20Schr%C3%B6dinger%20Bridge%20Mamba%20%28SBM%29%2C%20a%20novel%20model%20for%20efficient%20speech%20enhancement%20by%20integrating%20the%20Schr%C3%B6dinger%20Bridge%20%28SB%29%20training%20paradigm%20and%20the%20Mamba%20architecture.%20Experiments%20of%20joint%20denoising%20and%20dereverberation%20tasks%20demonstrate%20SBM%20outperforms%20strong%20generative%20and%20discriminative%20methods%20on%20multiple%20metrics%20with%20only%20one%20step%20of%20inference%20while%20achieving%20a%20competitive%20real-time%20factor%20for%20streaming%20feasibility.%20Ablation%20studies%20reveal%20that%20the%20SB%20paradigm%20consistently%20yields%20improved%20performance%20across%20diverse%20architectures%20over%20conventional%20mapping.%20Furthermore%2C%20Mamba%20exhibits%20a%20stronger%20performance%20under%20the%20SB%20paradigm%20compared%20to%20Multi-Head%20Self-Attention%20%28MHSA%29%20and%20Long%20Short-Term%20Memory%20%28LSTM%29%20backbones.%20These%20findings%20highlight%20the%20synergy%20between%20the%20Mamba%20architecture%20and%20the%20SB%20trajectory-based%20training%2C%20providing%20a%20high-quality%20solution%20for%20real-world%20speech%20enhancement.%20Demo%20page%3A%20https%3A//sbmse.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2510.16834v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSchr%25C3%25B6dinger%2520Bridge%2520Mamba%2520for%2520One-Step%2520Speech%2520Enhancement%26entry.906535625%3DJing%2520Yang%2520and%2520Sirui%2520Wang%2520and%2520Chao%2520Wu%2520and%2520Lei%2520Guo%2520and%2520Fan%2520Fan%26entry.1292438233%3DWe%2520present%2520Schr%25C3%25B6dinger%2520Bridge%2520Mamba%2520%2528SBM%2529%252C%2520a%2520novel%2520model%2520for%2520efficient%2520speech%2520enhancement%2520by%2520integrating%2520the%2520Schr%25C3%25B6dinger%2520Bridge%2520%2528SB%2529%2520training%2520paradigm%2520and%2520the%2520Mamba%2520architecture.%2520Experiments%2520of%2520joint%2520denoising%2520and%2520dereverberation%2520tasks%2520demonstrate%2520SBM%2520outperforms%2520strong%2520generative%2520and%2520discriminative%2520methods%2520on%2520multiple%2520metrics%2520with%2520only%2520one%2520step%2520of%2520inference%2520while%2520achieving%2520a%2520competitive%2520real-time%2520factor%2520for%2520streaming%2520feasibility.%2520Ablation%2520studies%2520reveal%2520that%2520the%2520SB%2520paradigm%2520consistently%2520yields%2520improved%2520performance%2520across%2520diverse%2520architectures%2520over%2520conventional%2520mapping.%2520Furthermore%252C%2520Mamba%2520exhibits%2520a%2520stronger%2520performance%2520under%2520the%2520SB%2520paradigm%2520compared%2520to%2520Multi-Head%2520Self-Attention%2520%2528MHSA%2529%2520and%2520Long%2520Short-Term%2520Memory%2520%2528LSTM%2529%2520backbones.%2520These%2520findings%2520highlight%2520the%2520synergy%2520between%2520the%2520Mamba%2520architecture%2520and%2520the%2520SB%2520trajectory-based%2520training%252C%2520providing%2520a%2520high-quality%2520solution%2520for%2520real-world%2520speech%2520enhancement.%2520Demo%2520page%253A%2520https%253A//sbmse.github.io%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.16834v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Schr%C3%B6dinger%20Bridge%20Mamba%20for%20One-Step%20Speech%20Enhancement&entry.906535625=Jing%20Yang%20and%20Sirui%20Wang%20and%20Chao%20Wu%20and%20Lei%20Guo%20and%20Fan%20Fan&entry.1292438233=We%20present%20Schr%C3%B6dinger%20Bridge%20Mamba%20%28SBM%29%2C%20a%20novel%20model%20for%20efficient%20speech%20enhancement%20by%20integrating%20the%20Schr%C3%B6dinger%20Bridge%20%28SB%29%20training%20paradigm%20and%20the%20Mamba%20architecture.%20Experiments%20of%20joint%20denoising%20and%20dereverberation%20tasks%20demonstrate%20SBM%20out {"title": "Axiomatic On-Manifold Shapley via Optimal Generative Flows", "author": "Cenwei Zhang and Lin Zhu and Manxi Lin and Lei You", "abstract": "Shapley-based attribution is critical for post-hoc XAI but suffers from off-manifold artifacts due to heuristic baselines. While generative methods attempt to address this, they often introduce geometric inefficiency and discretization drift. We propose a formal theory of on-manifold Aumann-Shapley attributions driven by optimal generative flows. We prove a representation theorem establishing the gradient line integral as the unique functional satisfying efficiency and geometric axioms, notably reparameterization invariance. To resolve path ambiguity, we select the kinetic-energy-minimizing Wasserstein-2 geodesic transporting a prior to the data distribution. This yields a canonical attribution family that recovers classical Shapley for additive models and admits provable stability bounds against flow approximation errors. By reframing baseline selection as a variational problem, our method experimentally outperforms baselines, achieving strict manifold adherence via vanishing Flow Consistency Error and superior semantic alignment characterized by Structure-Aware Total Variation. Our code is on https://github.com/cenweizhang/OTFlowSHAP.", "link": "http://arxiv.org/abs/2603.05093v1", "date": "2026-03-05", "relevancy": 1.4364, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5295}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4776}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.459}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Axiomatic%20On-Manifold%20Shapley%20via%20Optimal%20Generative%20Flows&body=Title%3A%20Axiomatic%20On-Manifold%20Shapley%20via%20Optimal%20Generative%20Flows%0AAuthor%3A%20Cenwei%20Zhang%20and%20Lin%20Zhu%20and%20Manxi%20Lin%20and%20Lei%20You%0AAbstract%3A%20Shapley-based%20attribution%20is%20critical%20for%20post-hoc%20XAI%20but%20suffers%20from%20off-manifold%20artifacts%20due%20to%20heuristic%20baselines.%20While%20generative%20methods%20attempt%20to%20address%20this%2C%20they%20often%20introduce%20geometric%20inefficiency%20and%20discretization%20drift.%20We%20propose%20a%20formal%20theory%20of%20on-manifold%20Aumann-Shapley%20attributions%20driven%20by%20optimal%20generative%20flows.%20We%20prove%20a%20representation%20theorem%20establishing%20the%20gradient%20line%20integral%20as%20the%20unique%20functional%20satisfying%20efficiency%20and%20geometric%20axioms%2C%20notably%20reparameterization%20invariance.%20To%20resolve%20path%20ambiguity%2C%20we%20select%20the%20kinetic-energy-minimizing%20Wasserstein-2%20geodesic%20transporting%20a%20prior%20to%20the%20data%20distribution.%20This%20yields%20a%20canonical%20attribution%20family%20that%20recovers%20classical%20Shapley%20for%20additive%20models%20and%20admits%20provable%20stability%20bounds%20against%20flow%20approximation%20errors.%20By%20reframing%20baseline%20selection%20as%20a%20variational%20problem%2C%20our%20method%20experimentally%20outperforms%20baselines%2C%20achieving%20strict%20manifold%20adherence%20via%20vanishing%20Flow%20Consistency%20Error%20and%20superior%20semantic%20alignment%20characterized%20by%20Structure-Aware%20Total%20Variation.%20Our%20code%20is%20on%20https%3A//github.com/cenweizhang/OTFlowSHAP.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05093v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAxiomatic%2520On-Manifold%2520Shapley%2520via%2520Optimal%2520Generative%2520Flows%26entry.906535625%3DCenwei%2520Zhang%2520and%2520Lin%2520Zhu%2520and%2520Manxi%2520Lin%25 {"title": "Legal interpretation and AI: from expert systems to argumentation and LLMs", "author": "V\u00e1clav Jane\u010dek and Giovanni Sartor", "abstract": "AI and Law research has encountered legal interpretation in different ways, in the context of its evolving approaches and methodologies. Research on expert system has focused on legal knowledge engineering, with the goal of ensuring that human-generated interpretations can be precisely transferred into knowledge-bases, to be consistently applied. Research on argumentation has aimed at representing the structure of interpretive arguments, as well as their dialectical interactions, to assess of the acceptability of interpretive claims within argumentation frameworks. Research on machine learning has focused on the automated generation of interpretive suggestions and arguments, through general and specialised language models, now being increasingly deployed in legal practice.", "link": "http://arxiv.org/abs/2603.05392v1", "date": "2026-03-05", "relevancy": 2.128, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4274}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4247}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4247}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Legal%20interpretation%20and%20AI%3A%20from%20expert%20systems%20to%20argumentation%20and%20LLMs&body=Title%3A%20Legal%20interpretation%20and%20AI%3A%20from%20expert%20systems%20to%20argumentation%20and%20LLMs%0AAuthor%3A%20V%C3%A1clav%20Jane%C4%8Dek%20and%20Giovanni%20Sartor%0AAbstra {"title": "Generic Camera Calibration using Blurry Images", "author": "Zezhun Shi", "abstract": "Camera calibration is the foundation of 3D vision. Generic camera calibration can yield more accurate results than parametric cam era calibration. However, calibrating a generic camera model using printed calibration boards requires far more images than parametric calibration, making motion blur practically unavoidable for individual users. As a f irst attempt to address this problem, we draw on geometric constraints and a local parametric illumination model to simultaneously estimate feature locations and spatially varying point spread functions, while re solving the translational ambiguity that need not be considered in con ventional image deblurring tasks. Experimental results validate the effectiveness of our approach.", "link": "http://arxiv.org/abs/2603.05159v1", "date": "2026-03-05", "relevancy": 2.098, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5805}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5186}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generic%20Camera%20Calibration%20using%20Blurry%20Images&body=Title%3A%20Generic%20Camera%20Calibration%20using%20Blurry%20Images%0AAuthor%3A%20Zezhun%20Shi%0AAbstract%3A%20Camera%20calibration%20is%20the%20foundation%20of%203D%20vision.%20Generic%20camera%20calibration%20can%20yield%20more%20accurate%20results%20than%20parametric%20cam%20era%20calibration.%20However%2C%20calibrating%20a%20generic%20camera%20model%20using%20printed%20calibration%20boards%20requires%20far%20more%20images%20than%20parametric%20calibration%2C%20making%20motion%20blur%20practically%20unavoidable%20for%20individual%20users.%20As%20a%20f%20irst%20attempt%20to%20address%20this%20problem%2C%20we%20draw%20on%20geometric%20constraints%20and%20a%20local%20parametric%20illumination%20model%20to%20simultaneously%20estimate%20feature%20locations%20and%20spatially%20varying%20point%20spread%20functions%2C%20while%20re%20solving%20the%20translational%20ambiguity%20that%20need%20not%20be%20considered%20in%20con%20ventional%20image%20deblurring%20tasks.%20Experimental%20results%20validate%20the%20effectiveness%20of%20our%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05159v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneric%2520Camera%2520Calibration%2520using%2520Blurry%2520Images%26entry.906535625%3DZezhun%2520Shi%26entry.1292438233%3DCamera%2520calibration%2520is%2520the%2520foundation%2520of%25203D%2520vision.%2520Generic%2520camera%2520calibration%2520can%2520yield%2520more%2520accurate%2520results%2520than%2520parametric%2520cam%2520era%2520calibration.%2520However%252C%2520calibrating%2520a%2520generic%2520camera%2520model%2520using%2520printed%2520calibration%2520boards%2520requires%2520far%2520more%2520images%2520than%2520parametric%2520calibration%252C%2520making%2520motion%2520blur%2520practically%2520unavoidable%2520for%2520individual%2520users.%2520As%2520a%2520f%2520irst%2520attempt%2520to%2520address%2520this%2520problem%252C%2520we%2520draw%2520on%2520geometric%2520constraints%2520and%2520a%2520local%2520parametric%2520illumination%2520model%2520to%2520simultaneously%2520estimate%2520feature%2520locations%2520and%2520spatially%2520varying%2520point%2520spread%2520functions%252C%2520while%2520re%2520solving%2520the%2520translational%2520ambiguity%2520that%2520need%2520not%2520be%2520considered%2520in%2520con%2520ventional%2520image%2520deblurring%2520tasks.%2520Experimental%25 {"title": "Bootstrapped Mixed Rewards for RL Post-Training: Injecting Canonical Action Order", "author": "Prakhar Gupta and Vaibhav Gupta", "abstract": "Post-training with reinforcement learning (RL) typically optimizes a single scalar objective and ignores structure in how solutions are produced. We ask whether a scalar hint toward a canonical solver ordering, used only during RL post-training, improves performance even when fine-tuned on randomized solution sequences. On Zebra puzzles, we fine-tune a Transformer on randomized solution orders, then post-train it with Group Relative Policy Optimization (GRPO) using two rewards: a sparse task reward that is 1 only when the puzzle is fully solved, and an ordering reward that increases when the model's emission order aligns with the canonical solver order. To compare signals cleanly, we combine them via fixed mixtures and use a simple bootstrapped scaling to equalize component magnitudes at initialization. Mixed rewards generally outperform task-only optimization, suggesting that coarse ordering signals can steer RL post-training toward canonical trajectories without modifying supervised data or architecture.", "link": "http://arxiv.org/abs/2512.04277v2", "date": "2026-03-05", "relevancy": 1.3963, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4758}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4533}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bootstrapped%20Mixed%20Rewards%20for%20RL%20Post-Training%3A%20Injecting%20Canonical%20Action%20Order&body=Title%3A%20Bootstrapped%20Mixed%20Rewards%20for%20RL%20Post-Training%3A%20Injecting%20Canonical%20Action%20Order%0AAuthor%3A%20Prakhar%20Gupta%20and%20Vaibhav%20Gupta%0AAbstract%3A%20Post-training%20with%20reinforcement%20learning%20%28RL%29%20typically%20optimizes%20a%20single%20scalar%20objective%20and%20ignores%20structure%20in%20how%20solutions%20are%20produced.%20We%20ask%20whether%20a%20scalar%20hint%20toward%20a%20canonical%20solver%20ordering%2C%20used%20only%20during%20RL%20post-training%2C%20improves%20performance%20even%20when%20fine-tuned%20on%20randomized%20solution%20sequences.%20On%20Zebra%20puzzles%2C%20we%20fine-tune%20a%20Transformer%20on%20randomized%20solution%20orders%2C%20then%20post-train%20it%20with%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20using%20two%20rewards%3A%20a%20sparse%20task%20reward%20that%20is%201%20only%20when%20the%20puzzle%20is%20fully%20solved%2C%20and%20an%20ordering%20reward%20that%20increases%20when%20the%20model%27s%20emission%20order%20aligns%20with%20the%20canonical%20solver%20order.%20To%20compare%20signals%20cleanly%2C%20we%20combine%20them%20via%20fixed%20mixtures%20and%20use%20a%20simple%20bootstrapped%20scaling%20to%20equalize%20component%20magnitudes%20at%20initialization.%20Mixed%20rewards%20generally%20outperform%20task-only%20optimization%2C%20suggesting%20that%20coarse%20ordering%20signals%20can%20steer%20RL%20post-training%20toward%20canonical%20trajectories%20without%20modifying%20supervised%20data%20or%20architecture.%0ALink%3A%20http%3A//arxiv.org/abs/2512.04277v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBootstrapped%2520Mixed%2520Rewards%2520for%2520RL%2520Post-Training%253A%2520Injecting%2520Canonical%2520Action%2520Order%26entry.906535625%3DPrakhar%2520Gupta%2520and%2520Vaibhav%2520Gupta%26entry.1292438233%3DPost-training%2520with%2520reinforcement%2520learning%2520%2528RL%2529%2520typically%2520optimizes%2520a%2520single%2520scalar%2520objective%2520and%2520ignores%2520structure%2520in%2520how%2520solutions%2520are%2520produced.%2520We%2520ask%2520whether%2520a%2520scalar%2520hint%2520toward%2520a%2520canonical%2520solver%2520ordering%252C%2520used%2520only%2520during%2520RL%2520post-training%252C%2520improves%2520performance%2520even%2520when%2520fine-tuned%2520on%2520randomized%2520solution%2520sequences.%2520On%2520Zebra%2520puzzles%252C%2520we%2520fine-tune%2520a%2520Transformer%2520on%2520randomized%2520solution%2520orders%252C%2520then%2520post-train%2520it%2520with%2520Group%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520using%2520two%2520rewards%253A%2520a%2520sparse%2520task%2520reward%2520that%2520is%25201%2520only%2520when%2520the%2520puzzle%2520is%2520fully%2520solved%252C%2520and%2520an%2520ordering%2520reward%2520that%2520increases%2520when%2520the%2520model%2527s%2520emission%2520order%2520aligns%2520with%2520the%2520canonical%2520solver%2520order.%2520To%2520compare%2520signals%2520cleanly%252C%2520we%2520combine%2520them%2520via%2520fixed%2520mixtures%2520and%2520use%2520a%2520simple%2520bootstrapped%2520scaling%2520to%2520equalize%2520component%2520magnitudes%2520at%2520initialization.%2520Mixed%2520rewards%2520generally%2520outperform%2520task-only%2520optimization%252C%2520suggesting%2520that%2520coarse%2520ordering%2520signals%2520can%2520steer%2520RL%2520post-training%2520toward%2520canonical%2520trajectories%2520without%2520modifying%2520supervised%2520data%2520or%2520architecture.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.04277v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Bootstrapped%20Mixed%20Rewards%20for%20RL%20Post-Training%3A%20Injecting%20Canonical%20Action%20Order&entry.906535625=Prakhar%20Gupta%20and%20Vaibhav%20Gupta&entry.1292438233=Post-training%20with%20reinforcement%20learning%20%28RL%29%20typically%20optimizes%20a%20single%20scalar%20objective%20and%20ignores%20structure%20in%20how%20solutions%20are%20produced.%20We%20ask%20whether%20a%20scalar%20hint%20toward%20a%20canonical%20solver%20ordering%2C%20used%20only%20during%20RL%20post-training%2C%20improves%20performance%20even%20when%20fine-tuned%20on%20randomized%20solution%20sequences.%20On%20Zebra%20puzzles%2C%20we%20fine-tune%20a%20Transformer%20on%20randomized%20solution%20orders%2C%20then%20post-train%20it%20with%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20using%20two%20rewards%3A%20a%20sparse%20task%20reward%20that%20is%201%20only%20when%20the%20puzzle%20is%20fully%20solved%2C%20and%20an%20ordering%20reward%20that%20increases%20when%20the%20model%27s%20emission%20order%20aligns%20with%20the%20canonical%20solver%20order.%20To%20compare%20signals%20cleanly%2C%20we%20combine%20them%20via%20fixed%20mixtures%20and%20use%20a%20simple%20bootstrapped%20scaling%20to%20equalize%20component%20magnitudes%20at%20initialization.%20Mixed%20rewards%20generally%20outperform%20task-only%20optimization%2C%20suggesting%20that%20coarse%20ordering%20signals%20can%20steer%20RL%20post-training%20toward%20canonical%20trajectories%20without%20modifying%20supervised%20data%20or%20architecture.&entry.1838667208=http%3A//arxiv.org/abs/2512.04277v2&entry.124074799=Read"},
{"title": "ToolRLA: Multiplicative Reward Decomposition for Tool-Integrated Agents", "author": "Pengbo Liu", "abstract": "Tool-integrated agents that interleave reasoning with API calls are promising for complex tasks, yet aligning them for high-stakes, domain-specific deployment remains challenging: existing reinforcement learning approaches rely on coarse binary rewards that cannot distinguish tool selection errors from malformed parameters. We present ToolRLA, a three-stage post-training pipeline (SFT -> GRPO -> DPO) for domain-specific tool agents. The core contribution is a fine-grained reward function with multiplicative correctness decomposition spanning four dimensions -- format validity, tool selection, parameter accuracy, and regulatory compliance -- that encodes domain priority orderings as inductive biases in the reward landscape. Deployed on a financial advisory copilot (80+ advisors, 1,200+ daily queries), ToolRLA achieves over three months: a 47% improvement in task completion rate (62%->91%), a 63% reduction in tool invocation errors (38%->14%), and a 93% reduction in regulatory violations (12%->0.8%), within sub-2-second latency. Ablation studies show the multiplicative reward design accounts for 7 percentage points of improvement over additive alternatives. Generalization is further validated on ToolBench and API-Bank.", "link": "http://arxiv.org/abs/2603.01620v3", "date": "2026-03-05", "relevancy": 2.0042, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5221}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4883}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4852}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ToolRL iplicative%2520reward%2520design%2520accounts%2520for%25207%2520percentage%2520points%2520of%2520improvement%2520over%2520additive%2520alternatives.%2520Generalization%2520is%2520further%2520validated%2520on%2520ToolBench%2520and%2520API-Bank.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.01620v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ToolRLA%3A%20Multiplicative%20Reward%20Decomposition%20for%20Tool-Integrated%20Agents&entry.906535625=Pengbo%20Liu&entry.1292438233=Tool-integrated%20agents%20that%20interleave%20reasoning%20with%20API%20calls%20are%20promising%20for%20complex%20tasks%2C%20yet%20aligning%20them%20for%20high-stakes%2C%20domain-specific%20deployment%20remains%20challenging%3A%20existing%20reinforcement%20learning%20approaches%20rely%20on%20coarse%20binary%20rewards%20that%20cannot%20distinguish%20tool%20selection%20errors%20from%20malformed%20parameters.%20We%20present%20ToolRLA%2C%20a%20three-stage%20post-training%20pipeline%20%28SFT%20-%3E%20GRPO%20-%3E%20DPO%29%20for%20domain-specific%20tool%20agents.%20The%20core%20contribution%20is%20a%20fine-grained%20reward%20function%20with%20multiplicative%20correctness%20decomposition%20spanning%20four%20dimensions%20--%20format%20validity%2C%20tool%20selection%2C%20parameter%20accuracy%2C%20and%20regulatory%20compliance%20--%20that%20encodes%20domain%20priority%20orderings%20as%20inductive%20biases%20in%20the%20reward%20landscape.%20Deployed%20on%20a%20financial%20advisory%20copilot%20%2880%2B%20advisors%2C%201%2C200%2B%20daily%20queries%29%2C%20ToolRLA%20achieves%20over%20three%20months%3A%20a%2047%25%20improvement%20in%20task%20completion%20rate%20%2862%25-%3E91%25%29%2C%20a%2063%25%20reduction%20in%20tool%20invocation%20errors%20%2838%25-%3E14%25%29%2C%20and%20a%2093%25%20reduction%20in%20regulatory%20violations%20%2812%25-%3E0.8%25%29%2C%20within%20sub-2-second%20latency.%20Ablation%20studies%20show%20the%20multiplicative%20reward%20design%20accounts%20for%207%20percentage%20points%20of%20improvement%20over%20additive%20alternatives.%20Generalization%20is%20further%20validated%20on%20ToolBench%20and%20API-Bank.&entry.1838667208=http%3A//arxiv.org/abs/2603.01620v3&entry.124074799=Read"},
{"title": "Lap2: Revisiting Laplace DP-SGD for High Dimensions via Majorization Theory", "author": "Meisam Mohammady and Qin Yang and Nicholas Stout and Ayesha Samreen and Han Wang and Christopher J Quinn and Yuan Hong", "abstract": "Differentially Private Stochastic Gradient Descent (DP-SGD) is a cornerstone technique for ensuring privacy in deep learning, widely used in both training from scratch and fine-tuning large-scale language models. While DP-SGD predominantly relies on the Gaussian mechanism, the Laplace mechanism remains underutilized due to its reliance on L1 norm clipping. This constraint severely limits its practicality in high-dimensional models because the L1 norm of an n-dimensional gradient can be up to sqrt(n) times larger than its L2 norm. As a result, the required noise scale grows significantly with model size, leading to poor utility or untrainable models.\n  In this work, we introduce Lap2, a new solution that enables L2 clipping for Laplace DP-SGD while preserving strong privacy guarantees. We overcome the dimensionality-driven clipping barrier by computing coordinate-wise moment bounds and applying majorization theory to construct a tight, data-independent upper bound over the full model. By exploiting the Schur-convexity of the moment accountant function, we aggregate these bounds using a carefully designed majorization set that respects the L2 clipping constraint. This yields a multivariate privacy accountant that scales gracefully with model dimension and enables the use of thousands of moments. Empirical evaluations demonstrate that our approach significantly improves the performance of Laplace DP-SGD, achieving results comparable to or better than Gaussian DP-SGD under strong privacy constraints. For instance, fine-tuning RoBERTa-base (125M parameters) on SST-2 achieves 87.88% accuracy at epsilon=0.54, outperforming Gaussian (87.16%) and standard Laplace (48.97%) under the same budget.", "link": "http://arxiv.org/abs/2602.23516v2", "date": "2026-03-05", "relevancy": 1.4725, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5128}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4896}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.472}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Lap2%3A%20Revisiting%20Laplace%20DP-SGD%20for%20High%20Dimensions%20via%20Majorization%20Theory&body=Title%3A%20Lap2%3A%20Revisiting%20Laplace%20DP-SGD%20for%20High%20Dimensions%20via%20Majorization%20Theory%0AAuthor%3A%20Meisam%20Mohammady%20and%20Qin%20Yang%20and%20Nicholas%20Stout%20and%20Ayesha%20Samreen%20and%20Han%20Wang%20and%20Christopher%20J%20Quinn%20and%20Yuan%20Hong%0AAbstract%3A%20Differentially%20Private%20Stochastic%20Gradient%20Descent%20%28DP-SGD%29%20is%20a%20cornerstone%20technique%20for%20ensuring%20privacy%20in%20deep%20learning%2C%20widely%20used%20in%20both%20training%20from%20scratch%20and%20fine-tuning%20large-scale%20language%20models.%20While%20DP-SGD%20predominantly%20relies%20on%20the%20Gaussian%20mechanism%2C%20the%20Laplace%20mechanism%20remains%20underutilized%20due%20to%20its%20reliance%20on%20L1%20norm%20clipping.%20This%20constraint%20severely%20limits%20its%20practicality%20in%20high-dimensional%20models%20because%20the%20L1%20norm%20of%20an%20n-dimensional%20gradient%20can%20be%20up%20to%20sqrt%28n%29%20times%20larger%20than%20its%20L2%20norm.%20As%20a%20result%2C%20the%20required%20noise%20scale%20grows%20significantly%20with%20model%20size%2C%20leading%20to%20poor%20utility%20or%20untrainable%20models.%0A%20%20In%20this%20work%2C%20we%20introduce%20Lap2%2C%20a%20new%20solution%20that%20enables%20L2%20clipping%20for%20Laplace%20DP-SGD%20while%20preserving%20strong%20privacy%20guarantees.%20We%20overcome%20the%20dimensionality-driven%20clipping%20barrier%20by%20computing%20coordinate-wise%20moment%20bounds%20and%20applying%20majorization%20theory%20to%20construct%20a%20tight%2C%20data-independent%20upper%20bound%20over%20the%20full%20model.%20By%20exploiting%20the%20Schur-convexity%20of%20the%20moment%20accountant%20function%2C%20we%20aggregate%20these%20bounds%20using%20a%20carefully%20designed%20majorization%20set%20that%20respects%20the%20L2%20clipping%20constraint.%20This%20yields%20a%20multivariate%20privacy%20accountant%20that%20scales%20gracefully%20with%20model%20dimension%20and%20enables%20the%20use%20of%20thousands%20of%20moments.%20Empirical%20evaluations%20demonstrate%20that%20our%20approach%20significantly%20improves%20the%20performance%20of%20Laplace%20DP-SGD%2C%20achieving%20results%20comparable%20to%20or%20better%20than%20Gaussian%20DP-SGD%20under%20strong%20privacy%20constraints.%20For%20instance%2C%20fine-tuning%20RoBERTa-base%20%28125M%20parameters%29%20on%20SST-2%20achieves%2087.88%25%20accuracy%20at%20epsilon%3D0.54%2C%20outperforming%20Gaussian%20%2887.16%25%29%20and%20standard%20Laplace%20%2848.97%25%29%20under%20the%20same%20budget.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23516v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLap2%253A%2520Revisiting%2520Laplace%2520DP-SGD%2520for%2520High%2520Dimensions%2520via%2520Majorization%2520Theory%26entry.906535625%3DMeisam%2520Mohammady%2520and%2520Qin%2520Yang%2520and%2520Nicholas%2520Stout%2520and%2520Ayesha%2520Samreen%2520and%2520Han%2520Wang%2520and%2520Christopher%2520J%2520Quinn%2520and%2520Yuan%2520Hong%26entry.1292438233%3DDifferentially%2520Private%2520Stochastic%2520Gradient%2520Descent%2520%2528DP-SGD%2529%2520is%2520a%2520cornerstone%2520technique%2520for%2520ensuring%2520privacy%2520in%2520deep%2520learning%252C%2520widely%2520used%2520in%2520both%2520training%2520from%2520scratch%2520and%2520fine-tuning%2520large-scale%2520language%2520models.%2520While%2520DP-SGD%2520predominantly%2520relies%2520on%2520the%2520Gaussian%2520mechanism%252C%2520the%2520Laplace%2520mechanism%2520remains%2520underutilized%2520due%2520to%2520its%2520reliance%2520on%2520L1%2520norm%2520clipping.%2520This%2520constraint%2520severely%2520limits%2520its%2520practicality%2520in%2520high-dimensional%2520models%2520because%2520the%2520L1%2520norm%2520of%2520an%2520n-dimensional%2520gradient%2520can%2520be%2520up%2520to%2520sqrt%2528n%2529%2520times%2520larger%2520than%2520its%2520L2%2520norm.%2520As%2520a%2520result%252C%2520the%2520required%2520noise%2520scale%2520grows%2520significantly%2520with%2520model%2520size%252C%2520leading%2520to%2520poor%2520utility%2520or%2520untrainable%2520models.%250A%2520%2520In%2520this%2520work%252C%2520we%2520introduce%2520Lap2%252C%2520a%2520new%2520solution%2520that%2520enables%2520L2%2520clipping%2520for%2520Laplace%2520DP-SGD%2520while%2520preserving%2520strong%2520privacy%2520guarantees.%2520We%2520overcome%2520the%2520dimensionality-driven%2520clipping%2520barrier%2520by%2520computing%2520coordinate-wise%2520moment%2520bounds%2520and%2520applying%2520majorization%2520theory%2520to%2520construct%2520a%2520tight%252C%2520data-independent%2520upper%2520bound%2520over%2520the%2520full%2520model.%2520By%2520exploiting%2520the%2520Schur-convexity%2520of%2520the%2520moment%2520accountant%2520function%252C%2520we%2520aggregate%2520these%2520bounds%2520using%2520a%2520carefully%2520designed%2520majorization%2520set%2520that%2520respects%2520the%2520L2%2520clipping%2520constraint.%2520This%2520yields%2520a%2520multivariate%2520privacy%2520accountant%2520that%2520scales%2520gracefully%2520with%2520model%2520dimension%2520and%2520enables%2520the%2520use%2520of%2520thousands%2520of%2520moments.%2520Empirical%2520evaluations%2520demonstrate%2520that%2520our%2520approach%2520significantly%2520improves%2520the%2520 {"title": "Runge-Kutta Approximations for Direct Coning Compensation Applying Lie Theory", "author": "John A. Christian and Michael R. Walker and Wyatt Bridgman and Michael J. Sparapany", "abstract": "The integration of gyroscope measurements is an essential task for most navigation systems. Modern vehicles typically use strapdown systems, such that gyro integration requires coning compensation to account for the sensor's rotation during the integration. Many coning compensation algorithms have been developed and a few are reviewed. This work introduces a new class of coning correction algorithm built directly from the classical Runge-Kutta integration routines. A simple case is shown to collapse to one of the most popular coning algorithms and a clear procedure for generating higher-order algorithms is presented.", "link": "http://arxiv.org/abs/2511.00412v2", "date": "2026-03-05", "relevancy": 1.5518, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4051}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.3882}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.3809}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Runge-Kutta%20Approximations%20for%20Direct%20Coning%20Compensation%20Applying%20Lie%20Theory&body=Title%3A%20Runge-Kutta%20Approximations%20for%20Direct%20Coning%20Compensation%20Applying%20Lie%20Theory%0AAuthor%3A%20John%20A.%20Christian%20and%20Michael%20R.%20Walker%20and%20Wyatt%20Bridgman%20and%20Michael%20J.%20Sparapany%0AAbstract%3A%20The%20integration%20of%20gyroscope%20measurements%20is%20an%20essential%20task%20for%20most%20navigation%20systems.%20Modern%20vehicles%20ty algorithms%2520and%2520a%2520clear%2520procedure%2520for%2520generating%2520higher-order%2520algorithms%2520is%2520presented.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.00412v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Runge-Kutta%20Approximations%20for%20Direct%20Coning%20Compensation%20Applying%20Lie%20Theory&entry.906535625=John%20A.%20Christian%20and%20Michael%20R.%20Walker%20and%20Wyatt%20Bridgman%20and%20Michael%20J.%20Sparapany&entry.1292438233=The%20integration%20of%20gyroscope%20measurements%20is%20an%20essential%20task%20for%20most%20navigation%20systems.%20Modern%20vehicles%20typically%20use%20strapdown%20systems%2C%20such%20that%20gyro%20integration%20requires%20coning%20compensation%20to%20account%20for%20the%20sensor%27s%20rotation%20during%20the%20integration.%20Many%20coning%20compensation%20algorithms%20have%20been%20developed%20and%20a%20few%20are%20reviewed.%20This%20work%20introduces%20a%20new%20class%20of%20coning%20correction%20algorithm%20built%20directly%20from%20the%20classical%20Runge-Kutta%20integration%20routines.%20A%20simple%20case%20is%20shown%20to%20collapse%20to%20one%20of%20the%20most%20popular%20coning%20algorithms%20and%20a%20clear%20procedure%20for%20generating%20higher-order%20algorithms%20is%20presented.&entry.1838667208=http%3A//arxiv.org/abs/2511.00412v2&entry.124074799=Read"},
{"title": "SpikeATac: A Multimodal Tactile Finger with Taxelized Dynamic Sensing for Dexterous Manipulation", "author": "Eric T. Chang and Peter Ballentine and Zhanpeng He and Do-Gon Kim and Kai Jiang and Hua-Hsuan Liang and Joaquin Palacios and William Wang and Pedro Piacenza and Ioannis Kymissis and Matei Ciocarlie", "abstract": "In this work, we introduce SpikeATac, a multimodal tactile finger combining a taxelized and highly sensitive dynamic response (PVDF) with a static transduction method (capacitive) for multimodal touch sensing. Named for its `spiky' response, SpikeATac's 16-taxel PVDF film sampled at 4 kHz provides fast, sensitive dynamic signals to the very onset and breaking of contact. We characterize the sensitivity of the different modalities, and show that SpikeATac provides the ability to stop quickly and delicately when grasping fragile, deformable objects. Beyond parallel grasping, we show that SpikeATac can be used in a learning-based framework to achieve new capabilities on a dexterous multifingered robot hand. We use a learning recipe that combines reinforcement learning from human feedback with tactile-based rewards to fine-tune the behavior of a policy to modulate force. Our hardware platform and learning pipeline together enable a difficult dexterous and contact-rich task that has not previously been achieved: in-hand manipulation of fragile objects. Videos are available at https://roamlab.github.io/spikeatac/ .", "link": "http://arxiv.org/abs/2510.27048v2", "date": "2026-03-05", "relevancy": 1.5777, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5427}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5168}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.493}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpikeATac%3A%20A%20Multimodal%20Tactile%20Finger%20with%20Taxelized%20Dynamic%20Sensing%20for%20Dexterous%20Manipulation&body=Title%3A%20SpikeATac%3A%20A%20Multimodal%20Tactile%20Finger%20with%20Taxelized%20Dynamic%20Sensing%20for%20Dexterous%20Manipulation%0AAuthor%3A%20Eric%20T.%20Chang%20and%20Peter%20Ballentine%20and%20Zhanpeng%20He%20and%20Do-Gon%20Kim%20and%20Kai%20Jiang%20and%20Hua-Hsuan%20Liang%20and%20Joaquin%20Palacios%20and%20William%20Wang%20and%20Pedro%20Piacenza%20and%20Ioannis%20Kymissis%20and%20Matei%20Ciocarlie%0AAbstract%3A%20In%20this%20work%2C%20we%20introduce%20SpikeATac%2C%20a%20multimodal%20tactile%20finger%20combining%20a%20taxelized%20and%20highly%20sensitive%20dynamic%20response%20%28PVDF%29%20with%20a%20static%20transduction%20method%20%28capacitive%29%20for%20multimodal%20touch%20sensing.%20Named%20for%20its%20%60spiky%27%20response%2C%20SpikeATac%27s%2016-taxel%20PVDF%20film%20sampled%20at%204%20kHz%20provides%20fast%2C%20sensitive%20dynamic%20signals%20to%20the%20very%20onset%20and%20breaking%20of%20contact.%20We%20characterize%20the%20sensitivity%20of%20the%20different%20modalities%2C%20and%20show%20that%20SpikeATac%20provides%20the%20ability%20to%20stop%20quickly%20and%20delicately%20when%20grasping%20fragile%2C%20deformable%20objects.%20Beyond%20parallel%20grasping%2C%20we%20show%20that%20SpikeATac%20can%20be%20used%20in%20a%20learning-based%20framework%20to%20achieve%20new%20capabilities%20on%20a%20dexterous%20multifingered%20robot%20hand.%20We%20use%20a%20learning%20recipe%20that%20combines%20reinforcement%20learning%20from%20human%20feedback%20with%20tactile-based%20rewards%20to%20fine-tune%20the%20behavior%20of%20a%20policy%20to%20modulate%20force.%20Our%20hardware%20platform%20and%20learning%20pipeline%20together%20enable%20a%20difficult%20dexterous%20and%20contact-rich%20task%20that%20has%20not%20previously%20been%20achiev {"title": "On the Statistical Optimality of Optimal Decision Trees", "author": "Zineng Xu and Subhroshekhar Ghosh and Yan Shuo Tan", "abstract": "While globally optimal empirical risk minimization (ERM) decision trees have become computationally feasible and empirically successful, rigorous theoretical guarantees for their statistical performance remain limited. In this work, we develop a comprehensive statistical theory for ERM trees under random design in both high-dimensional regression and classification. We first establish sharp oracle inequalities that bound the excess risk of the ERM estimator relative to the best possible approximation achievable by any tree with at most $L$ leaves, thereby characterizing the interpretability-accuracy trade-off. We derive these results using a novel uniform concentration framework based on empirically localized Rademacher complexity. Furthermore, we derive minimax optimal rates over a novel function class: the piecewise sparse heterogeneous anisotropic Besov (PSHAB) space. This space explicitly captures three key structural features encountered in practice: sparsity, anisotropic smoothness, and spatial heterogeneity. While our main results are established under sub-Gaussianity, we also provide robust guarantees that hold under heavy-tailed noise settings. Together, these findings provide a principled foundation for the optimality of ERM trees and introduce empirical process tools broadly applicable to other highly adaptive, data-driven procedures.", "link": "http://arxiv.org/abs/2603.05340v1", "date": "2026-03-05", "relevancy": 1.7367, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4532}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://l       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

{"title": "Accelerating Text-to-Video Generation with Calibrated Sparse Attention", "author": "Shai Yehezkel and Shahar Yadin and Noam Elata and Yaron Ostrovsky-Berman and Bahjat Kawar", "abstract": "Recent diffusion models enable high-quality video generation, but suffer from slow runtimes. The large transformer-based backbones used in these models are bottlenecked by spatiotemporal attention. In this paper, we identify that a significant fraction of token-to-token connections consistently yield negligible scores across various inputs, and their patterns often repeat across queries. Thus, the attention computation in these cases can be skipped with little to no effect on the result. This observation continues to hold for connections among local token blocks. Motivated by this, we introduce CalibAtt, a training-free method that accelerates video generation via calibrated sparse attention. CalibAtt performs an offline calibration pass that identifies block-level sparsity and repetition patterns that are stable across inputs, and compiles these patterns into optimized attention operations for each layer, head, and diffusion timestep. At inference time, we compute the selected input-dependent connections densely, and skip the unselected ones in a hardware-efficient manner. Extensive experiments on Wan 2.1 14B, Mochi 1, and few-step distilled models at various resolutions show that CalibAtt achieves up to 1.58x end-to-end speedup, outperforming existing training-free methods while maintaining video generation quality and text-video alignment.", "link": "http://arxiv.org/abs/2603.05503v1", "date": "2026-03-05", "relevancy": 2.53, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6575}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6381}, {"title": " {"title": "CoIn3D: Revisiting Configuration-Invariant Multi-Camera 3D Object Detection", "author": "Zhaonian Kuang and Rui Ding and Haotian Wang and Xinhu Zheng and Meng Yang and Gang Hua", "abstract": "Multi-camera 3D object detection (MC3D) has attracted increasing attention with the growing deployment of multi-sensor physical agents, such as robots and autonomous vehicles. However, MC3D models still struggle to generalize to unseen platforms with new multi-camera configurations. Current solutions simply employ a meta-camera for unified representation but lack comprehensive consideration. In this paper, we revisit this issue and identify that the devil lies in spatial prior discrepancies across source and target configurations, including different intrinsics, extrinsics, and array layouts. To address this, we propose CoIn3D, a generalizable MC3D framework that enables strong transferability from source configurations to unseen target ones. CoIn3D explicitly incorporates all identified spatial priors into both feature embedding and image observation through spatial-aware feature modulation (SFM) and camera-aware data augmentation (CDA), respectively. SFM enriches feature space by integrating four spatial representations, such as focal length, ground depth, ground gradient, and Pl\u00fccker coordinate. CDA improves observation diversity under various configurations via a training-free dynamic novel-view image synthesis scheme. Extensive experiments demonstrate that CoIn3D achieves strong cross-configuration performance on landmark datasets such as NuScenes, Waymo, and Lyft, under three dominant MC3D paradigms represented by BEVDepth, BEVFormer, and PETR.", "link": "http://arxiv.org/abs/2603.05042v1", "date": "2026-03-05", "relevancy": 2.503, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.642}, {"title": "CamCtrl3D: Single-Image {"title": "QTabGAN: A Hybrid Quantum-Classical GAN for Tabular Data Synthesis", "author": "Subhangi Kumari and Rakesh Achutha and Vignesh Sivaraman", "abstract": "Synthesizing realistic tabular data is challenging due to heterogeneous feature types and high dimensionality. We introduce QTabGAN, a hybrid quantum-classical generative adversarial framework for tabular data synthesis. QTabGAN is especially designed for settings where real data are scarce or restricted by privacy constraints. The model exploits the expressive power of quantum circuits to learn complex data distributions, which are then mapped to tabular features using classical neural networks. We evaluate QTabGAN on multiple classification and regression datasets and benchmark it against leading state-of-the-art generative models. Experiments show that QTabGAN achieves up to 54.07% improvement across various classification datasets and evaluation metrics, thus establishing a scalable quantum approach to tabular data synthesis and highlighting its potential for quantum-assisted generative modelling.", "link": "http://arxiv.org/abs/2602.12704v2", "date": "2026-03-05", "relevancy": 2.4636, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5068}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4891}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4823}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20QTabGAN%3A%20A%20Hybrid%20Quantum-Classical%20GAN%20for%20Tabular%20Data%20Synthesis&body=Title%3A%20QTabGAN%3A%20A%20Hybrid%20Quantum-Classical%20GAN%20for%20Tabular%20Data%20Synthesis%0AAuthor%3A%20Subhangi%20Kumari%20and%20Rakesh%20Achutha%20and%20Vignesh%20Sivaraman%0AAbstract%3A%20Synthesizing%20realistic%20tabular%20data%20is%20challenging%20due%2 {"title": "Ensembling Language Models with Sequential Monte Carlo", "author": "Robin Shing Moon Chan and Tianyu Liu and Samuel Kiegeland and Clemente Pasti and Jacob Hoover Vigly and Timothy J. O'Donnell and Ryan Cotterell and Tim Vieira", "abstract": "Practitioners have access to an abundance of language models and prompting strategies for solving many language modeling tasks; yet prior work shows that modeling performance is highly sensitive to both choices. Classical machine learning ensembling techniques offer a principled approach: aggregate predictions from multiple sources to achieve better performance than any single one. However, applying ensembling to language models during decoding is challenging: naively aggregating next-token probabilities yields samples from a locally normalized, biased approximation of the generally intractable ensemble distribution over strings. In this work, we introduce a unified framework for composing $K$ language models into $f$-ensemble distributions for a wide range of functions $f\\colon\\mathbb{R}_{\\geq 0}^{K}\\to\\mathbb{R}_{\\geq 0}$. To sample from these distributions, we propose a byte-level sequential Monte Carlo (SMC) algorithm that operates in a shared character space, enabling ensembles of models with mismatching vocabularies and consistent sampling in the limit. We evaluate a family of $f$-ensembles across prompt and model combinations for various structured text generation tasks, highlighting the benefits of alternative aggregation strategies over traditional probability averaging, and showing that better posterior approximations can yield better ensemble performance.", "link": "http://arxiv.org/abs/2603.05432v1", "date": "2026-03-05", "relevancy": 2.4627, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5027}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5027}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4722}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ensembling%20Language%20Models%20with%20Sequential%20Monte%20Carlo&body=Title%3A%20Ensembling%20Language%20Models%20with%20Sequential%20Monte%20Carlo%0AAuthor%3A%20Robin%20Shing%20Moon%20Chan%20and%20Tianyu%20Liu%20and%20Samuel%20Kiegeland%20and%20Clemente%20Pasti%20and%20Jacob%20Hoover%20Vigly%20and%20Timothy%20J.%20O%27Donnell%20and%20Ryan%20Cotterell%20and%20Tim%20Vieira%0AAbstract%3A%20Practitioners%20have%20access%20to%20an%20abundance%20of%20language%20models%20and%20prompting%20strategies%20for%20solving%20many%20language%20modeling%20tasks%3B%20yet%20prior%20work%20shows%20that%20modeling%20performance%20is%20highly%20sensitive%20to%20both%20choices.%20Classical%20machine%20learning%20ensembling%20techniques%20offer%20a%20principled%20approach%3A%20aggregate%20predictions%20from%20multiple%20sources%20to%20achieve%20better%20performance%20than%20any%20single%20one.%20However%2C%20applying%20ensembling%20to%20language%20models%20during%20decoding%20is%20challenging%3A%20naively%20aggregating%20next-token%20probabilities%20yields%20samples%20from%20a%20locally%20normalized%2C%20biased%20approximation%20of%20the%20generally%20intractable%20ensemble%20distribution%20over%20strings.%20In%20this%20work%2C%20we%20introduce%20a%20unified%20framework%20for%20composing%20%24K%24%20language%20models%20into%20%24f%24-ensemble%20distributions%20for%20a%20wide%20range%20of%20functions%20%24f%5Ccolon%5Cmathbb%7BR%7D_%7B%5Cgeq%200%7D%5E%7BK%7D%5Cto%5Cmathbb%7BR%7D_%7B%5Cgeq%200%7D%24.%20To%20sample%20from%20these%20distributions%2C%20we%20propose%20a%20byte-level%20sequential%20Monte%20Carlo%20%28SMC%29%20algorithm%20that%20operates%20in%20a%20shared% {"title": "Text-to-3D by Stitching a Multi-view Reconstruction Network to a Video Generator", "author": "Hyojun Go and Dominik Narnhofer and Goutam Bhat and Prune Truong and Federico Tombari and Konrad Schindler", "abstract": "The rapid progress of large, pretrained models for both visual content generation and 3D reconstruction opens up new possibilities for text-to-3D generation. Intuitively, one could obtain a formidable 3D scene generator if one were able to combine the power of a modern latent text-to-video model as \"generator\" with the geometric abilities of a recent (feedforward) 3D reconstruction system as \"decoder\". We introduce VIST3A, a general framework that does just that, addressing two main challenges. First, the two components must be joined in a way that preserves the rich knowledge encoded in their weights. We revisit model stitching, i.e., we identify the layer in the 3D decoder that best matches the latent representation produced by the text-to-video generator and stitch the two parts together. That operation requires only a small dataset and no labels. Second, the text-to-video generator must be aligned with the stitched 3D decoder, to ensure that the generated latents are decodable into consistent, perceptually convincing 3D scene geometry. To that end, we adapt direct reward finetuning, a popular technique for human preference alignment. We evaluate the proposed VIST3A approach with different video generators and 3D reconstruction models. All tested pairings markedly improve over prior text-to-3D models that output Gaussian splats. Moreover, by choosing a suitable 3D base model, VIST3A also enables high-quality text-to-pointmap generation.", "link": "http://arxiv.org/abs/2510.13454v2", "date": "2026-03-05", "relevancy": 2.4621, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6305}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6125}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6125}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Text-to-3D%20by%20Stitching%20a%20Multi-view%20Reconstruction%20Network%20to%20a%20Video%20Generator&body=Title%3A%20Text-to-3D%20by%20Stitching%20a%20Multi-view%20Reconstruction%20Network%20to%20a%20Video%20Generator%0AAuthor%3A%20Hyojun%20Go%20and%20Dominik%20Narnhofer%20and%20Goutam%20Bhat%20and%20Prune%20Truong%20and%20Federico%20Tombari%20and%20Konrad%20Schindler%0AAbstract%3A%20The%20rapid%20progress%20of%20large%2C%20pretrained%20models%20for%20both%20visual%20content%20generation%20and%203D%20reconstruction%20opens%20up%20new%20possibilities%20for%20text-to-3D%20generation.%20Intuitively%2C%20one%20could%20obtain%20a%20formidable%203D%20scene%20generator%20if%20one%20were%20able%20to%20combine%20the%20power%20of%20a%20modern%20latent%20text-to-video%20model%20as%20%22generator%22%20with%20the%20geometric%20abilities%20of%20a%20recent%20%28feedforward%29%203D%20reconstruction%20system%20as%20%22decoder%22.%20We%20introduce%20VIST3A%2C%20a%20general%20framework%20that%20does%20just%20that%2C%20addressing%20two%20main%20challenges.%20First%2C%20the%20two%20components%20must%20be%20joined%20in%20a%20way%20that%20preserves%20the%20rich%20knowledge%20encoded%20in%20their%20weights.%20We%20revisit%20model%20stitching%2C%20i.e.%2C%20we%20identify%20the%20layer%20in%20the%203D%20decoder%20that%20best%20matches%20the%20latent%20representation%20produced%20by%20the%20text-to-video%20generator%20and%20stitch%20the%20two%20parts%20together.%20That%20operation%20requires%20only%20a%20small%20dataset%20and%20no%20labels.%20Second%2C%20the%20text-to-video%20generator%20must%20be%20aligned%20with%20the%20stitched%203D%20decoder%2C%20to%20ensure%20that%20the%20generated%20latents%20are%20decodable%20into%20consistent%2C%20perceptually%20convincing%203D%20scene%20geometry.%20To%20that%20end%2C%20we%20adapt%20direct%20reward%20finetuning%2C%20a%20popular%20technique%20for%20human%20preference%20alignment.%20We%20evaluate%20the%20proposed%20VIST3A%20approach%20with%20different%20video%20generators%20and%203D%20reconstruction%20models.%20All%20tested%20pairings%20markedly%20improve%20over%20prior%20text-to-3D%20models%20that%20output%20Gaussian%20splats.%20Moreover%2C%20by%20choosing%20a%20suitable%203D%20base%20model%2C%20VIST3A%20also%20enables%20high-quality%20text-to-pointmap%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2510.13454v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DText-to-3D%2520by%2520Stitching%2520a%2520Multi-view%2520Reconstruction%2520Network%2520to%2520a%2520Video%2520Generator%26entry.906535625%3DHyojun%2520Go%2520and%2520Dominik%2520Narnhofer%2520and%2520Goutam%2520Bhat%2520and%2520Prune%2520Truong%2520and%2520Federico%2520Tombari%2520and%2520Konrad%2520Schindler%26entry.1292438233%3DThe%2520rapid%2520progress%2520of%2520large%252C%2520pretrained%2520models%2520for%2520both%2520visual%2520content%2520generation%2520and%25203D%2520reconstruction%2520opens%2520up%2520new%2520possibilities%2520for%2520text-to-3D%2520generation.%2520Intuitively%252C%2520one%2520could%2520obtain%2520a%2520formidable%25203D%2520scene%2520generator%2520if%2520one%2520were%2520able%2520to%2520combine%2520the%2520power%2520of%2520a%2520modern%2520latent%2520text-to-video%2520model%2520as%2520%2522generator%2522%2520with%2520the%2520geometric%2520abilities%2520of%2520a%2520recent%2520%2528feedforward%2529%25203D%2520reconstruction%2520system%2520as%2520%2522decoder%2522.%2520We%2520introduce%2520VIST3A%252C%2520a%2520general%2520framework%2520that%2520does%2520just%2520that%252C%2520addressing%2520two%2520main%2520challenges.%2520First%252C%2520the%2520two%2520compon {"title": "FBFL: A Field-Based Coordination Approach for Data Heterogeneity in Federated Learning", "author": "Davide Domini and Gianluca Aguzzi and Lukas Esterle and Mirko Viroli", "abstract": "In the last years, Federated learning (FL) has become a popular solution to train machine learning models in domains with high privacy concerns. However, FL scalability and performance face significant challenges in real-world deployments where data across devices are non-independently and identically distributed (non-IID). The heterogeneity in data distribution frequently arises from spatial distribution of devices, leading to degraded model performance in the absence of proper handling. Additionally, FL typical reliance on centralized architectures introduces bottlenecks and single-point-of-failure risks, particularly problematic at scale or in dynamic environments. To close this gap, we propose Field-Based Federated Learning (FBFL), a novel approach leveraging macroprogramming and field coordination to address these limitations through: (i) distributed spatial-based leader election for personalization to mitigate non-IID data challenges; and (ii) construction of a self-organizing, hierarchical architecture using advanced macroprogramming patterns. Moreover, FBFL not only overcomes the aforementioned limitations, but also enables the development of more specialized models tailored to the specific data distribution in each subregion. This paper formalizes FBFL and evaluates it extensively using MNIST, FashionMNIST, and Extended MNIST datasets. We demonstrate that, when operating under IID data conditions, FBFL performs comparably to the widely-used FedAvg algorithm. Furthermore, in challenging non-IID scenarios, FBFL not only outperforms FedAvg but also surpasses other state-of-the-art methods, namely FedProx and Scaffold, which have been specifically designed to address non-IID data distributions. Additionally, we showcase the resilience of FBFL's self-organizing hierarchical architecture against server failures.", "link": "http://arxiv.org/abs/2502.08577v5", "date": "2026-03-05", "relevancy": 2.4452, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4957}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4946}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4768}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FBFL%3A%20A%20Field-Based%20Coordination%20Approach%20for%20Data%20Heterogeneity%20in%20Federated%20Learning&body=Title%3A%20FBFL%3A%20A%20Field-Based%20Coordination%20Approach%20for%20Data%20Heterogeneity%20in%20Federated%20Learning%0AAuthor%3A%20Davide%20Domini%20and%20Gianluca%20Aguzzi%20and%20Lukas%20Esterle%20and%20Mirko%20Viroli%0AAbstract%3A%20In%20the%20last%20years%2C%20Federated%20learning%20%28FL%29%20has%20become%20a%20popular%20solution%20to%20train%20machine%20learning%20models%20in%20domains%20with%20high%20privacy%20concerns.%20However%2C%20FL%20scalability%20and%20performance%20face%20significant%20challenges%20in%20real-world%20deployments%20where%20data%20across%20devices%20are%20non-independently%20and%20identically%20distributed%20%28non-IID%29.%20The%20heterogeneity%20in%20data%20distribution%20frequently%20arises%20from%20spatial%20distribution%20of%20devices%2C%20leading%20to%20degraded%20model%20performance%20in%20the%20absence%20of%20proper%20handling.%20Additionally%2C%20FL%20typical%20reliance%20on%20centralized%20architectures%20introduces%20bottlenecks%20and%20single-point-of-failure%20risks%2C%20particularly%20problematic%20at%20scale%20or%20in%20dynamic%20environments.%20To%20close%20this%20gap%2C%20we%20propose%20Field-Based%20Federated%20Learning%20%28FBFL%29%2C%20a%20novel%20approach%20leveraging%20macroprogramming%20and%20field%20coordination%20to%20address%20these%20limitations%20through%3A%20%28i%29%20distributed%20spatial-based%20leader%20election%20for%20personalization%20to%20mitigate%20non-IID%20data%20challenges%3B%20and%20%28ii%29%20construction%20of%20a%20self-organizing%2C%20hierarchical%20architecture%20using%20advanced%20macroprogramming%20patterns.%20Moreover%2C%20FBFL%20not%20only%20overcomes%20the%20aforementioned%20limitations%2C%20but%20also%20enables%20the%20development%20of%20more%20specialized%20models%20tailored%20to%20the%20specific%20data%20distribution%20in%20each%20subregion.%20This%20paper%20formalizes%20FBFL%20and%20evaluates%20it%20extensively%20using%20MNIST%2C%20FashionMNIST%2C%20and%20Extended%20MNIST%20datasets.%20We%20demonstrate%20that%2C%20when%20operating%20under%20IID%20data%20conditions%2C%20FBFL%20performs%20comparably%20to%20the%20widely-used%20FedAvg%20algorithm.%20Furthermore%2C%20in%20challenging%20non-IID%20scenarios%2C%20FBFL%20not%20only%20outperforms%20FedAvg%20but%20also%20surpasses%20other%20state-of-the-art%20methods%2C%20namely%20FedProx%20and%20Scaffold%2C%20which%20have%20been%20specifically%20designed%20to%20address%20non-IID%20data%20distributions.%20Additionally%2C%20we%20showcase%20the%20resilience%20of%20FBFL%27s%20self-organizing%20hierarchical%20architecture%20against%20server%20failures.%0ALink%3A%20http%3A//arxiv.org/abs/2502.08577v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFBFL%253A%2520A%2520Field-Based%2520Coordination%2520Approach%2520for%2520Data%2520Heterogeneity%2520in%2520Federated%2520Learning%26entry.906535625%3DDavide%2520Domini%2520and%2520Gianluca%2520Aguzzi%2520and%2520Lukas%2520Esterle%2520and%2520 {"title": "Pursuing Minimal Sufficiency in Spatial Reasoning", "author": "Yejie Guo and Yunzhong Hou and Wufei Ma and Meng Tang and Ming-Hsuan Yang", "abstract": "Spatial reasoning, the ability to ground language in 3D understanding, remains a persistent challenge for Vision-Language Models (VLMs). We identify two fundamental bottlenecks: inadequate 3D understanding capabilities stemming from 2D-centric pre-training, and reasoning failures induced by redundant 3D information. To address these, we first construct a Minimal Sufficient Set (MSS) of information before answering a given question: a compact selection of 3D perception results from \\textit{expert models}. We introduce MSSR (Minimal Sufficient Spatial Reasoner), a dual-agent framework that implements this principle. A Perception Agent programmatically queries 3D scenes using a versatile perception toolbox to extract sufficient information, including a novel SOG (Situated Orientation Grounding) module that robustly extracts language-grounded directions. A Reasoning Agent then iteratively refines this information to pursue minimality, pruning redundant details and requesting missing ones in a closed loop until the MSS is curated. Extensive experiments demonstrate that our method, by explicitly pursuing both sufficiency and minimality, significantly improves accuracy and achieves state-of-the-art performance across two challenging benchmarks. Furthermore, our framework produces interpretable reasoning paths, offering a promising source of high-quality training data for future models. Source code is available at https://github.com/gyj155/mssr.", "link": "http://arxiv.org/abs/2510.16688v2", "date": "2026-03-05", "relevancy": 2.4386, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6228}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6228}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pursuing%20Minimal%20Sufficiency%20in%20Spatial%20Reasoning&body=Title%3A%20Pursuing%20Minimal%20Sufficiency%20in%20Spatial%20Reasoning%0AAuthor%3A%20Yejie%20Guo%20and%20Yunzhong%20Hou%20and%20Wufei%20Ma%20and%20Meng%20Tang%20and%20Ming-Hsuan%20Yang%0AAbstract%3A%20Spatial%20reasoning%2C%20the%20ability%20to%20ground%20language%20in%203D%20understanding%2C%20remains%20a%20persistent%20challenge%20for%20Vision-Language%20Models%20%28VLMs%29.%20We%20identify%20two%20fundamental%20bottlenecks%3A%20inadequate%203D%20understanding%20capabilities%20stemming%20from%202D-centric%20pre-training%2C%20and%20reasoning%20failures%20induced%20by%20redundant%203D%20information.%20To%20address%20these%2C%20we%20first%20construct%20a%20Minimal%20Sufficient%20Set%20%28MSS%29%20of%20information%20before%20answering%20a%20given%20question%3A%20a%20compact%20selection%20of%203D%20perception%20results%20from%20%5Ctextit%7Bexpert%20models%7D.%20We%20introduce%20MSSR%20%28Minimal%20Sufficient%20Spatial%20Reasoner%29%2C%20a%20dual-agent%20framework%20that%20implements%20this%20principle.%20A%20Perception%20Agent%20programmatically%20queries%203D%20scenes%20using%20a%20versatile%20perception%20toolbox%20to%20extract%20sufficient%20information%2C%20including%20a%20novel%20SOG%20%28Situated%20Orientation%20Grounding%29%20module%20that%20robustly%20extracts%20language-grounded%20directions.%20A%20Reasoning%20Agent%20then%20iteratively%20refines%20this%20information%20to%20pursue%20minimality%2C%20pruning%20redundant%20details%20and%20requesting%20missing%20ones%20in%20a%20closed%20loop%20until%20the%20MSS%20is%20curated.%20Extensive%20experiments%20demonstrate%20that%20our%20method%2C%20by%20explicitly%20pursuing%20both%20sufficiency%20and%20minimality%2C%20significantly%20improves%20accuracy%20and%20achieves%20state-of-the-art%20performance%20across%20two%20challenging%20benchmarks.%20Furthermore%2C%20our%20framework%20produces%20interpretable%20reasoning%20paths%2C%20offering%20a%20promising%20source%20of%20high-quality%20training%20data%20for%20future%20models.%20Source%20code%20is%20available%20at%20https%3A//github.com/gyj155/mssr.%0ALink%3A%20http%3A//arxiv.org/abs/2510.16688v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPursuing%2520Minimal%2520Sufficiency%2520in%2520Spatial%2520Reasoning%26entry.906535625%3DYejie%2520Guo%2520and%2520Yunzhong%2520Hou%2520and%2520Wufei%2520Ma%2520and%2520Meng%2520Tang%2520and%2520Ming-Hsuan%2520Yang%26entry.1292438233%3DSpatial%2520reasoning%252C%2520the%2520ability%2520to%2520ground%2520language%2520in%25203D%2520understanding%252C%2520remains%2520a%2520persistent%2520challenge%2520for%2520Vision-Language%2520Models%2520%2528VLMs%2529.%2520We%2520identify%2520two%2520fundamental%2520bottlenecks%253A%2520inadequate%25203D%2520understanding%2520capabilities%2520stemming%2520from%25202D-centric%2520pre-training%252C%2520and%2520reasoning%2520failures%2520induced%2520by%2520redundant%25203D%2520information.%2520To%2520address%2520these%252C%2520we%2520first%2520construct%2520a%2520Minimal%2520Sufficient%2520Set%2520%2528MSS%2529%2520of%2520information%2520before%2520answering%2520a%2520given%2520question%253A%2520a%2520compact%2520selection%2520of%25203D%2520perception%2520results%2520from%2520%255Ctextit%257Bexpert%2520models%257D.%2520We%2520introduce%2520MSSR%2520%2528Minimal%2520Sufficient%2520Spatial%2520Reasoner%2529%252C%2520a%2520dual-agent%2520framework%2520that%2520implements%2520this%2520principle.%2520A%2520Perception%2520Agent%2520programmatically%2520queries%25203D%2520scenes%2520using%2520a%2520versatile%2520perception%2520toolbox%2520to%2520extract%2520sufficient%2520information%252C%2520including%2520a%2520novel%2520SOG%2520%2528Situated%2520Orientation%2520Grounding%2529%2520module%2520that%2520robustly%2520extracts%2520language-grounded%2520directions.%2520A%2520Reasoning%2520Agent%2520then%2520iteratively%2520refines%2520this%2520information%2520to%2520pursue%2520minimality%252C%2520pruning%2520redundant%2520details%2520and%2520requesting%2520missing%2520ones%2520in%2520a%2520closed%2520loop%2520until%2520the%2520MSS%2520is%2520curated.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520method%252C%2520by%2520explicitly%2520pursuing%2520both%2520sufficiency%2520and%2520minimality%252C%2520significantly%2520improves%2520accuracy%2520and%2520achieves%2520state-of-the-art%2520performance%2520across%2520two%2520challenging%2520benchmarks.%2520Furthermore%252C%2520our%2520framework%2520produces%2520interpretable%2520reasoning%2520paths%252C%2520offering%2520a%2520promising%2520source%2520of%2520high-quality%2520training%2520data%2520for%2520future%2520models.%2520Source%2520code%2520is%2520available%2520at%2520https%253A//github.com/gyj155/mssr.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.16688v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Pursuing%20Minimal%20Sufficiency%20in%20Spatial%20Reasoning&entry.906535625=Yejie%20Guo%20and%20Yunzhong%20Hou%20and%20Wufei%20Ma%20and%20Meng%20Tang%20and%20Ming-Hsuan%20Yang&entry.1292438233=Spatial%20reasoning%2C%20the%20ability%20to%20ground%20language%20in%203D%20understanding%2C%20remains%20a%20persistent%20challenge%20for%20Vision-Language%20Models%20%28VLMs%29.%20We%20identify%20two%20fundamental%20bottlenecks%3A%20inadequate%203D%20understanding%20capabilities%20stemming%20from%202D-centric%20pre-training%2C%20and%20reasoning%20failures%20induced%20by%20redundant%203D%20information.%20To%20address%20these%2C%20we%20first%20construct%20a%20Minimal {"title": "Act, Think or Abstain: Complexity-Aware Adaptive Inference for Vision-Language-Action Models", "author": "Riccardo Andrea Izzo and Gianluca Bardaro and Matteo Matteucci", "abstract": "Current research on Vision-Language-Action (VLA) models predominantly focuses on enhancing generalization through established reasoning techniques. While effective, these improvements invariably increase computational complexity and inference latency. Furthermore, these mechanisms are typically applied indiscriminately, resulting in the inefficient allocation of resources for trivial tasks while simultaneously failing to provide the uncertainty estimation necessary to prevent catastrophic failure on out-of-distribution tasks. Inspired by human cognition, we propose an adaptive framework that dynamically routes VLA execution based on the complexity of the perceived state. Our approach transforms the VLA's vision-language backbone into an active detection tool by projecting latent embeddings into an ensemble of parametric and non-parametric estimators. This allows the system to execute known tasks immediately (Act), reason about ambiguous scenarios (Think), and preemptively halt execution when encountering significant physical or semantic anomalies (Abstain). In our empirical analysis, we observe a phenomenon where visual embeddings alone are superior for inferring task complexity due to the semantic invariance of language. Evaluated on the LIBERO and LIBERO-PRO benchmarks as well as on a real robot, our vision-only configuration achieves 80% F1-Score using as little as 5% of training data, establishing itself as a reliable and efficient task complexity detector.", "link": "http://arxiv.org/abs/2603.05147v1", "date": "2026-03-05", "relevancy": 2.4314, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6112}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6112}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5911}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Act%2C%20Think%20or%20Abstain%3A%20Complexity-Aware%20Adaptive%20Inference%20for%20Vision-Language-Action%20Models&body=Title%3A%20Act%2C%20Think%20or%20Abstain%3A%20Complexity-Aware%20Adaptive%20Inference%20for%20Vision-Language-Action%20Models%0AAuthor%3A%20Riccardo%20Andrea%20Izzo%20and%20Gianluca%20Bardaro%20and%20Matteo%20Matteucci%0AAbstract%3A%20Current%20research%20on%20Vision-Language-Action%20%28VLA%29%20models%20predominantly%20focuses%20on%20enhancing%20generalization%20through%20established%20reasoning%20techniques.%20While%20effective%2C%20these%20improvements%20invariably%20increase%20computational%20complexity%20and%20inference%20latency.%20Furthermore%2C%20these%20mechanisms%20are%20typically%20applied%20indiscriminately%2C%20resulting%20in%20the%20inefficient%20allocation%20of%20resources%20for%20trivial%20tasks%20while%20simultaneously%20failing%20to%20provide%20the%20uncertainty%20estimation%20necessary%20to%20prevent%20catastrophic%20failure%20on%20out-of-distribution%20tasks.%20Inspired%20by%20human%20cognition%2C%20we%20propose%20an%20adaptive%20framework%20that%20dynamically%20routes%20VLA%20execution%20based%20on%20the%20complexity%20of%20the%20perceived%20state.%20Our%20approach%20transforms%20the%20VLA%27s%20vision-language%20backbone%20into%20an%20active%20detection%20tool%20by%20projecting%20latent%20embeddings%20into%20an%20ensemble%20of%20parametric%20and%20non-parametric%20estimators.%20This%20allows%20the%20system%20to%20execute%20known%20tasks%20immediately%20%28Act%29%2C%20reason%20about%20ambiguous%20scenarios%20%28Think%29%2C%20and%20preemptively%20halt%20execution%20when%20encountering%20significant%20physical%20or%20semantic%20anomalies%20%28Abstain%29.%20In%20our%20empirical%20analysis%2C%20we%20observe%20a%20phenomenon%20where%20visual%20embeddings%20alone%20are%20superior%20for%20inferring%20task%20complexity%20due%20to%20the%20semantic%20invariance%20of%20language.%20Evaluated%20on%20the%20LIBERO%20and%20LIBERO-PRO%20benchmarks%20as%20well%20as%20on%20a%20real%20robot%2C%20our%20vision-only%20configuration%20achieves%2080%25%20F1-Score%20using%20as%20little%20as%205%25%20of%20training%20data%2C%20establishing%20itself%20as%20a%20reliable%20and%20efficient%20task%20complexity%20detector.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05147v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAct%252C%2520Think%2520or%2520Abstain%253A%2520Complexity-Aware%2520Adaptive%2520Inference%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DRiccardo%2520Andrea%2520Izzo%2520and%2520Gianluca%2520Bardaro%2520and%2520Matteo%2520Matteucci%26entry.1292438233%3DCurrent%2520research%2520on%2520Vision-Language-Action%2520%2528VLA%2529%2520models%2520predominantly%2520focuses%2520on%2520enhancing%2520generalization%2520through%2520established%2520reasoning%2520techniques.%2520While%2520effective%252C%2520these%2520improvements%2520invariably%2520increase%2520computational%2520complexity%2520and%2520inference%2520latency.%2520Furthermore%252C%2520these%2520mechanisms%2520are%2520typically%2520applied%2520indiscriminately%252C%2520resulting%2520in%2520the%2520inefficient%2520allocation%2520of%2520resources%2520for%2520trivial%2520tasks%2520while%2520simultaneously%2520failing%2520to%2520provide%2520the%2520uncertainty%2520estimation%2520necessary%2520to%2520prevent%2520catastrophic%2520failure%2520on%2520out-of-distribution%2520tasks.%2520Inspired%2520by%2520human%2520cognition%252C%2520we%2520propose%2520an%2520adaptive%2520framework%2520that%2520dynamically% {"title": "Beyond the Unit Hypersphere: Embedding Magnitude in Contrastive Learning", "author": "Xincan Feng and Taro Watanabe", "abstract": "Cosine similarity is prevalent in contrastive learning, yet it assumes embedding magnitude is noise. We systematically study magnitude learning through a framework that independently controls query-side and document-side normalization. First, magnitude learning benefits retrieval and Retrieval-Augmented Generation (RAG) where queries and documents have distinct roles, but not Semantic Textual Similarity (STS) or CLIP where inputs are interchangeable. Second, query and document magnitudes serve different roles: document magnitude scales inference scores, while query magnitude modulates training gradients. Normalizing one side consistently outperforms both sides, and the Fisher Information Matrix condition number predicts which side to normalize. Third, magnitude learning improves out-of-domain generalization more than in-domain performance, with gains up to +72\\% vs +7\\%, requiring retrieval-specialized pre-training or sufficient data. These findings provide practical guidance for retrieval and RAG across text and vision domains.", "link": "http://arxiv.org/abs/2602.09229v2", "date": "2026-03-05", "relevancy": 2.4188, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.496}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4781}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4772}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20the%20Unit%20Hypersphere%3A%20Embedding%20Magnitude%20in%20Contrastive%20Learning&body=Title%3A%20Beyond%20the%20Unit%20Hypersphere%3A%20Embe {"title": "Where is the multimodal goal post? On the Ability of Foundation Models to Recognize Contextually Important Moments", "author": "Aditya K Surikuchi and Raquel Fern\u00e1ndez and Sandro Pezzelle", "abstract": "Foundation models are used for many real-world applications involving language generation from temporally-ordered multimodal events. In this work, we study the ability of models to identify the most important sub-events in a video, which is a fundamental prerequisite for narrating or summarizing multimodal events. Specifically, we focus on football games and evaluate models on their ability to distinguish between important and non-important sub-events in a game. To this end, we construct a new dataset by leveraging human preferences for importance implicit in football game highlight reels, without any additional annotation costs. Using our dataset, we compare several state-of-the-art multimodal models and show that they are not far from chance level performance. Analyses of models beyond standard evaluation metrics reveal their tendency to rely on a single dominant modality and their ineffectiveness in synthesizing necessary information from multiple sources. Our findings underline the importance of modular architectures that can handle sample-level heterogeneity in multimodal data and the need for complementary training procedures that can maximize cross-modal synergy.", "link": "http://arxiv.org/abs/2601.16333v2", "date": "2026-03-05", "relevancy": 2.4124, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6099}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6099}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", " that%20can%20maximize%20cross-modal%20synergy.%0ALink%3A%20http%3A//arxiv.org/abs/2601.16333v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhere%2520is%2520the%2520multimodal%2520goal%2520post%253F%2520On%2520the%2520Ability%2520of%2520Foundation%2520Models%2520to%2520Recognize%2520Contextually%2520Important%2520Moments%26entry.906535625%3DAditya%2520K%2520Surikuchi%2520and%2520Raquel%2520Fern%25C3%25A1ndez%2520and%2520Sandro%2520Pezzelle%26entry.1292438233%3DFoundation%2520models%2520are%2520used%2520for%2520many%2520real-world%2520applications%2520involving%2520language%2520generation%2520from%2520temporally-ordered%2520multimodal%2520events.%2520In%2520this%2520work%252C%2520we%2520study%2520the%2520ability%2520of%2520models%2520to%2520identify%2520the%2520most%2520important%2520sub-events%2520in%2520a%2520video%252C%2520which%2520is%2520a%2520fundamental%2520prerequisite%2520for%2520narrating%2520or%2520summarizing%2520multimodal%2520events.%2520Specifically%252C%2520we%2520focus%2520on%2520football%2520games%2520and%2520evaluate%2520models%2520on%2520their%2520ability%2520to%2520distinguish%2520between%2520important%2520and%2520non-important%2520sub-events%2520in%2520a%2520game.%2520To%2520this%2520end%252C%2520we%2520construct%2520a%2520new%2520dataset%2520by%2520leveraging%2520human%2520preferences%2520for%2520importance%2520implicit%2520in%2520football%2520game%2520highlight%2520reels%252C%2520without%2520any%2520additional%2520annotation%2520costs.%2520Using%2520our%2520dataset%252C%2520we%2520compare%2520several%2520state-of-the-art%2520multimodal%2520models%2520and%2520show%2520that%2520they%2520are%2520not%2520far%2520from%2520chance%2520level%2520performance.%2520Analyses%2520of%2520models%2520beyond%2520standard%2520evaluation%2520metrics%2520reveal%2520their%2520tendency%2520to%2520rely%2520on%2520a%2520single%2520dominant%2520modality%2520and%2520their%2520inef {"title": "PhysiFlow: Physics-Aware Humanoid Whole-Body VLA via Multi-Brain Latent Flow Matching and Robust Tracking", "author": "Weikai Qin and Sichen Wu and Ci Chen and Mengfan Liu and Linxi Feng and Xinru Cui and Haoqi Han and Hesheng Wang", "abstract": "In the domain of humanoid robot control, the fusion of Vision-Language-Action (VLA) with whole-body control is essential for semantically guided execution of real-world tasks. However, existing methods encounter challenges in terms of low VLA inference efficiency or an absence of effective semantic guidance for whole-body control, resulting in instability in dynamic limb-coordinated tasks. To bridge this gap, we present a semantic-motion intent guided, physics-aware multi-brain VLA framework for humanoid whole-body control. A series of experiments was conducted to evaluate the performance of the proposed framework. The experimental results demonstrated that the framework enabled reliable vision-language-guided full-body coordination for humanoid robots.", "link": "http://arxiv.org/abs/2603.05410v1", "date": "2026-03-05", "relevancy": 2.4029, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6502}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6228}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5588}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhysiFlow%3A%20Physics-Aware%20Humanoid%20Whole-Body%20VLA%20via%20Multi-Brain%20Latent%20Flow%20Matching%20and%20Robust%20Tracking&body=Title%3A%20PhysiFlow%3A%20Physics-Aware%20Humanoid%20Whole-Body%20VLA%20via%20Multi-Brain%20Latent%20Flow%20Matching%20and%20Robust%20Tracking%0AAuthor%3A%20Weikai%20Qin%20and%20Sichen%20Wu%20and%20Ci%20Chen%20and%20Mengfan%20Liu%20and%20Linxi%20Feng%20and%20Xinru%20Cui%20and%20Haoqi%20Han%20and%20Hesheng%20Wang%0AAbstract%3A%20In%20the%20domain%20of%20humanoid%20robot%20control%2C%20the%20fusion%20of%20Vision-Language-Action%20%28VLA%29%20with%20whole-body%20control%20is%20essential%20for%20semantically%20guided%20execution%20of%20real-world%20tasks.%20However%2C%20existing%20methods%20encounter%20challenges%20in%20terms%20of%20low%20VLA%20inference%20efficiency%20or%20an%20absence%20of%20effective%20semantic%20guidance%20for%20whole-body%20control%2C%20resulting%20in%20instability%20in%20dynamic%20limb-coordinated%20tasks.%20To%20bridge%20this%20gap%2C%20we%20present%20a%20semantic-motion%20intent%20guided%2C%20physics-aware%20multi-brain%20VLA%20framework%20for%20humanoid%20whole-body%20control.%20A%20series%20of%20experiments%20was%20conducted%20to%20evaluate%20the%20performance%20of%20the%20proposed%20framework.%20The%20experimental%20results%20demonstrated%20that%20the%20framework%20enabled%20reliable%20vision-language-guided%20full-body%20coordination%20for%20humanoid%20robots.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05410v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysiFlow%253A%2520Physics-Aware%2520Humanoid%2520Whole-Body%2520VLA%2520via%2520Multi-Brain%2520Latent%2520Flow%2520Matching%2520and%2520Robust%2520Tracking%26entry.906535625%3DWeikai%2520Qin%2520and%2520Sichen%2520Wu%2520and%2520Ci%2520Chen%2520and%2520Mengfan%2520Liu%2520and%2520Linxi%2520Feng%2520and%2520Xinru%2520Cui%2520and%2520Haoqi%2520Han%2520and%2520Hesheng%2520Wang%26entry.1292438233%3DIn%2520the%2520domain%2520of%2520humanoid%2520robot%2520control%252C%2520the%2520fusion%2520of%2520Vision-Language-Action%2520%2528VLA%2529%2520with%2520whole-body%2520control%2520is%2520essential%2520for%2520semantically%2520guided%2520execution%2520of%2520real-world%2520tasks.%2520However {"title": "MoRe: Motion-aware Feed-forward 4D Reconstruction Transformer", "author": "Juntong Fang and Zequn Chen and Weiqi Zhang and Donglin Di and Xuancheng Zhang and Chengmin Yang and Yu-Shen Liu", "abstract": "Reconstructing dynamic 4D scenes remains challenging due to the presence of moving objects that corrupt camera pose estimation. Existing optimization methods alleviate this issue with additional supervision, but they are mostly computationally expensive and impractical in real-time applications. To address these limitations, we propose MoRe, a feedforward 4D reconstruction network that efficiently recovers dynamic 3D scenes from monocular videos. Built upon a strong static reconstruction backbone, MoRe employs an attention-forcing strategy to disentangle dynamic motion from static structure. To further enhance robustness, we fine-tune the model on large-scale, diverse datasets encompassing both dynamic and static scenes. Moreover, our grouped causal attention captures temporal dependencies and adapts to varying token lengths across frames, ensuring temporally coherent geometry reconstruction. Extensive experiments on multiple benchmarks demonstrate that MoRe achieves high-quality dynamic reconstructions with exceptional efficiency.", "link": "http://arxiv.org/abs/2603.05078v1", "date": "2026-03-05", "relevancy": 2.4022, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6281}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6022}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5879}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MoRe%3A%20Motion-aware%20Feed-forward%204D%20Reconstruction%20Transformer&body=Title%3A%20MoRe%3A%20Motion-aware%20Feed-forward%204 {"title": "Dark3R: Learning Structure from Motion in the Dark", "author": "Andrew Y Guo and Anagh Malik and SaiKiran Tedla and Yutong Dai and Yiqian Qin and Zach Salehe and Benjamin Attal and Sotiris Nousias and Kyros Kutulakos and David B. Lindell", "abstract": "We introduce Dark3R, a framework for structure from motion in the dark that operates directly on raw images with signal-to-noise ratios (SNRs) below $-4$ dB -- a regime where conventional feature- and learning-based methods break down. Our key insight is to adapt large-scale 3D foundation models to extreme low-light conditions through a teacher--student distillation process, enabling robust feature matching and camera pose estimation in low light. Dark3R requires no 3D supervision; it is trained solely on noisy--clean raw image pairs, which can be either captured directly or synthesized using a simple Poisson--Gaussian noise model applied to well-exposed raw images. To train and evaluate our approach, we introduce a new, exposure-bracketed dataset that includes $\\sim$42,000 multi-view raw images with ground-truth 3D annotations, and we demonstrate that Dark3R achieves state-of-the-art structure from motion in the low-SNR regime. Further, we demonstrate state-of-the-art novel view synthesis in the dark using Dark3R's predicted poses and a coarse-to-fine radiance field optimization procedure.", "link": "http://arxiv.org/abs/2603.05330v1", "date": "2026-03-05", "relevancy": 2.3973, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6098}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6009}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5882}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5 20regime.%2520Further%252C%2520we%2520demonstrate%2520state-of-the-art%2520novel%2520view%2520synthesis%2520in%2520the%2520dark%2520using%2520Dark3R%2527s%2520predicted%2520poses%2520and%2520a%2520coarse-to-fine%2520radiance%2520field%2520optimization%2520procedure.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05330v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Dark3R%3A%20Learning%20Structure%20from%20Motion%20in%20the%20Dark&entry.906535625=Andrew%20Y%20Guo%20and%20Anagh%20Malik%20and%20SaiKiran%20Tedla%20and%20Yutong%20Dai%20and%20Yiqian%20Qin%20and%20Zach%20Salehe%20and%20Benjamin%20Attal%20and%20Sotiris%20Nousias%20and%20Kyros%20Kutulakos%20and%20David%20B.%20Lindell&entry.1292438233=We%20introduce%20Dark3R%2C%20a%20framework%20for%20structure%20from%20motion%20in%20the%20dark%20that%20operates%20directly%20on%20raw%20images%20with%20signal-to-noise%20ratios%20%28SNRs%29%20below%20%24-4%24%20dB%20--%20a%20regime%20where%20conventional%20feature-%20and%20learning-based%20methods%20break%20down.%20Our%20key%20insight%20is%20to%20adapt%20large-scale%203D%20foundation%20models%20to%20extreme%20low-light%20conditions%20through%20a%20teacher--student%20distillation%20process%2C%20enabling%20robust%20feature%20matching%20and%20camera%20pose%20estimation%20in%20low%20light.%20Dark3R%20requires%20no%203D%20supervision%3B%20it%20is%20trained%20solely%20on%20noisy--clean%20raw%20image%20pairs%2C%20which%20can%20be%20either%20captured%20directly%20or%20synthesized%20using%20a%20simple%20Poisson--Gaussian%20noise%20model%20applied%20to%20well-exposed%20raw%20images.%20To%20train%20and%20evaluate%20our%20approach%2C%20we%20introduce%20a%20new%2C%20exposure-bracketed%20dataset%20that%20includes%20%24%5Csim%2442%2C000%20multi-view%20raw%20images%20with%20ground-truth%203D%20annotations%2C%20and%20we%20demonstrate%20that%20Dark3R%20achieves%20state-of-the-art%20structure%20from%20motion%20in%20the%20low-SNR%20regime.%20Further%2C%20we%20demonstrate%20state-of-the-art%20novel%20view%20synthesis%20in%20the%20dark%20using%20Dark3R%27s%20predicted%20poses%20and%20a%20coarse-to-fine%20radiance%20field%20optimization%20procedure.&entry.1838667208=http%3A//arxiv.org/abs/2603.05330v1&entry.124074799=Read"},
{"title": "Fusion4CA: Boosting 3D Object Detection via Comprehensive Image Exploitation", "author": "Kang Luo and Xin Chen and Yangyi Xiao and Hesheng Wang", "abstract": "Nowadays, an increasing number of works fuse LiDAR and RGB data in the bird's-eye view (BEV) space for 3D object detection in autonomous driving systems. However, existing methods suffer from over-reliance on the LiDAR branch, with insufficient exploration of RGB information. To tackle this issue, we propose Fusion4CA, which is built upon the classic BEVFusion framework and dedicated to fully exploiting visual input with plug-and-play components. Specifically, a contrastive alignment module is designed to calibrate image features with 3D geometry, and a camera auxiliary branch is introduced to mine RGB information sufficiently during training. For further performance enhancement, we leverage an off-the-shelf cognitive adapter to make the most of pretrained image weights, and integrate a standard coordinate attention module into the fusion stage as a supplementary boost. Experiments on the nuScenes dataset demonstrate that our method achieves 69.7% mAP with only 6 training epochs and a mere 3.48% increase in inference parameters, yielding a 1.2% improvement over the baseline which is fully trained for 20 epochs. Extensive experiments in a simulated lunar environment further validate the effectiveness and generalization of our method. Our code will be released through Fusion4CA.", "link": "http://arxiv.org/abs/2603.05305v1", "date": "2026-03-05", "relevancy": 2.3876, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6535}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fusion4CA%3A%20Boosting%203D%20Object%20Detection%20via%20Comprehensive%20Image%20Exploitation&body=Title%3A%20Fusion4CA%3A%20Boosting%203D%20Object%20Detection%20via%20Comprehensive%20Image%20Exploitation%0AAuthor%3A%20Kang%20Luo%20and%20Xin%20Chen%20and%20Yangyi%20Xiao%20and%20Hesheng%20Wang%0AAbstract%3A%20Nowadays%2C%20an%20increasing%20number%20of%20works%20fuse%20LiDAR%20and%20RGB%20data%20in%20the%20bird%27s-eye%20view%20%28BEV%29%20space%20for%203D%20object%20detection%20in%20autonomous%20driving%20systems.%20However%2C%20existing%20methods%20suffer%20from%20over-reliance%20on%20the%20LiDAR%20branch%2C%20with%20insufficient%20exploration%20of%20RGB%20information.%20To%20tackle%20this%20issue%2C%20we%20propose%20Fusion4CA%2C%20which%20is%20built%20upon%20the%20classic%20BEVFusion%20framework%20and%20dedicated%20to%20fully%20exploiting%20visual%20input%20with%20plug-and-play%20components.%20Specifically%2C%20a%20contrastive%20alignment%20module%20is%20designed%20to%20calibrate%20image%20features%20with%203D%20geometry%2C%20and%20a%20camera%20auxiliary%20branch%20is%20introduced%20to%20mine%20RGB%20information%20sufficiently%20during%20training.%20For%20further%20performance%20enhancement%2C%20we%20leverage%20an%20off-the-shelf%20cognitive%20adapter%20to%20make%20the%20most%20of%20pretrained%20image%20weights%2C%20and%20integrate%20a%20standard%20coordinate%20attention%20module%20into%20the%20fusion%20stage%20as%20a%20supplementary%20boost.%20Experiments%20on%20the%20nuScenes%20dataset%20demonstrate%20that%20our%20method%20achieves%2069.7%25%20mAP%20with%20only%206%20training%20epochs%20and%20a%20mere%203.48%25%20increase%20in%20inference%20parameters%2C%20yielding%20a%201.2%25%20improvement%20over%20the%20baseline%20which%20is%20fully%20trained%20for%2020%20epochs.%20Extensive%20experiments%20in%20a%20simulated%20lunar%20environment%20further%20validate%20the%20effectiveness%20and%20generalization%20of%20our%20method.%20Our%20code%20will%20be%20released%20through%20Fusion4CA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05305v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFusion4CA%253A%2520Boosting%25203D%2520Object%2520Detection%2520via%2520Comprehensive%2520Image%2520Exploitation%26entry.906535625%3DKang%2520Luo%2520and%2520Xin%2520Chen%2520and%2520Yangyi%2520Xiao%2520and%2520Hesheng%2520Wang%26entry.1292438233%3DNowadays%252C%2520an%2520increasing%2520number%2520of%2520works%2520fuse%2520LiDAR%2520and%2520RGB%2520data%2520in%2520the%2520bird%2527s-eye%2520view%2520%2528BEV%2529%2520space%2520for%25203D%2520object%2520detection%2520in%2520autonomous%2520driving%2520systems.%2520However%252C%2520existing%2520methods%2520suffer%2520from%2520over-reliance%2520on%2520the%2520LiDAR%2520branch%252C%2520with%2520insufficient%2520exploration%2520of%2520RGB%2520information.%2520To%2520tackle%2520this%2520issue%252C%2520we%2520propose%2520Fusion4CA%252C%2520which%2520is%2520built%2520upon%2520the%2520classic%2520BEVFusion%2520framework%2520and%2520dedicated%2520to%2520fully%2520exploiting%2520visual%2520input%2520with%2520plug-and-play%2520components.%2520Specifically%252C%2520a%2520contrastive%2520alignment%2520module%2520is%2520designed%2520to%2520calibrate%2520image%2520features%2520with%25203D%2520geometry%252C%2520and%2520a%2520camera%2520auxiliary%2520branch%2520is%2520introduced%2520to%2520mine%2520RGB%2520information%2520sufficiently%2520during%2520training.%2520For%2520further%2520performance%2520enhancement%252C%2520we%2520leverage%2520an%2520off-the-shelf%2520cognitive%2520adapter%2520to%2520make%2520the%2520most%2520of%2520pretrained%2520image%2520weights%252C%2520and%2520integrate%2520a%2520standard%2520coordinate%2520attention%2520module%2520into%2520the%2520fusion%2520stage%2520as%2520a%2520supplementary%2520boost. {"title": "Knowledge Divergence and the Value of Debate for Scalable Oversight", "author": "Robin Young", "abstract": "AI safety via debate and reinforcement learning from AI feedback (RLAIF) are both proposed methods for scalable oversight of advanced AI systems, yet no formal framework relates them or characterizes when debate offers an advantage. We analyze this by parameterizing debate's value through the geometry of knowledge divergence between debating models. Using principal angles between models' representation subspaces, we prove that the debate advantage admits an exact closed form. When models share identical training corpora, debate reduces to RLAIF-like where a single-agent method recovers the same optimum. When models possess divergent knowledge, debate advantage scales with a phase transition from quadratic regime (debate offers negligible benefit) to linear regime (debate is essential). We classify three regimes of knowledge divergence (shared, one-sided, and compositional) and provide existence results showing that debate can achieve outcomes inaccessible to either model alone, alongside a negative result showing that sufficiently strong adversarial incentives cause coordination failure in the compositional regime, with a sharp threshold separating effective from ineffective debate. We offer the first formal connection between debate and RLAIF, a geometric foundation for understanding when adversarial oversight protocols are justified, and connection to the problem of eliciting latent knowledge across models with complementary information.", "link": "http://arxiv.org/abs/2603.05293v1", "date": "2026-03-05", "relevancy": 2.3782, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4816}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4816}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Knowledge%20Divergence%20and%20the%20Value%20of%20Debate%20for%20Scalable%20Oversight&body=Title%3A%20Knowledge%20Divergence%20and%20the%20Value%20of%20Debate%20for%20Scalable%20Oversight%0AAuthor%3A%20Robin%20Young%0AAbstract%3A%20AI%20safety%20via%20debate%20and%20reinforcement%20learning%20from%20AI%20feedback%20%28RLAIF%29%20are%20both%20proposed%20methods%20for%20scalable%20oversight%20of%20advanced%20AI%20systems%2C%20yet%20no%20formal%20framework%20relates%20them%20or%20characterizes%20when%20debate%20offers%20an%20advantage.%20We%20analyze%20this%20by%20parameterizing%20debate%27s%20value%20through%20the%20geometry%20of%20knowledge%20divergence%20between%20debating%20models.%20Using%20principal%20angles%20between%20models%27%20representation%20subspaces%2C%20we%20prove%20that%20the%20debate%20advantage%20admits%20an%20exact%20closed%20form.%20When%20models%20share%20identical%20training%20corpora%2C%20debate%20reduces%20to%20RLAIF-like%20where%20a%20single-agent%20method%20recovers%20the%20same%20optimum.%20When%20models%20possess%20divergent%20knowledge%2C%20debate%20advantage%20scales%20with%20a%20phase%20transition%20from%20quadratic%20regime%20%28debate%20offers%20negligible%20benefit%29%20to%20linear%20regime%20%28debate%20is%20essential%29.%20We%20classify%20three%20regimes%20of%20knowledge%20divergence%20%28shared%2C%20one-sided%2C%20and%20compositional%29%20and%20provide%20existence%20results%20showing%20that%20debate%20can%20achieve%20outcomes%20inaccessible%20to%20either%20model%20alone%2C%20alongside%20a%20negative%20result%20showing%20that%20sufficiently%20strong%20adversarial%20incentives%20cause%20coordination%20failure%20in%20the%20compositional%20regime%2C%20with%20a%20sharp%20threshold%20separating%20effective%20from%20ineffective%20debate.%20We%20offer%20the%20first%20formal%20connection%20between%20debate%20and%20RLAIF%2C%20a%20geometric%20foundation%20for%20understanding%20when%20adversarial%20oversight%20protocols%20are%20justified%2C%20and%20connection%20to%20the%20problem%20of%20eliciting%20latent%20knowledge%20across%20models%20with%20complementary%20information.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05293v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKnowledge%2520Divergence%2520and%2520the%2520Value%2520of%2520Debate%2520for%2520Scalable%2520Oversight%26entry.906535625%3DRobin%2520Young%26entry.1292438233%3DAI%2520safety%2520via%2520debate%2520and%2520reinforcement%2520learning%2520from%2520AI%2520feedback%2520%2528RLAIF%2529%2520are%2520both%2520proposed%2520methods%2520for%2520scalable%2520oversight%2520of%2520advanced%2520AI%2520systems%252C%2520yet%2520no%2520formal%2520framework%2520relates%2520them%2520or%2520characterizes%2520when%2520debate%2520offers%2520an%2520advantage.%2520We%2520analyze%2520this%2520by%2520parameterizing%2520debate%2527s%2520value%2520through%2520the%2520geometry%2520of%2520knowledge%2520divergence%2520between%2520debating%2520models.%2520Using%2520principal%2520angles%2520between%2520models%2527%2520representation%2520subspaces%252C%2520we%2520prove%2520that%2520the%2520debate%2520advantage%2520admits%2520an%2520exact%2520closed%2520form.%2520When%2520models%2520share%2520identical%2520training%2520corpora%252C%2520debate%2520reduces%2520to%2520RLAIF-like%2520where%2520a%2520single-agent%2520method%2520recovers%2520the%2520same%2520optimum.%2520When%2520models%2520possess%2520divergent%2520knowledge%252C%2520debate%2520advantage%2520scales%2520with%2520a%2520phase%2520transition%2520from%2520quadratic%2520regime%2520%2528d s%20between%20models%27%20representation%20subspaces%2C%20we%20prove%20that%20the%20debate%20advantage%20admits%20an%20exact%20closed%20form.%20When%20models%20share%20identical%20training%20corpora%2C%20debate%20reduces%20to%20RLAIF-like%20where%20a%20single-agent%20method%20recovers%20the%20same%20optimum.%20When%20models%20possess%20divergent%20knowledge%2C%20debate%20advantage%20scales%20with%20a%20phase%20transition%20from%20quadratic%20regime%20%28debate%20offers%20negligible%20benefit%29%20to%20linear%20regime%20%28debate%20is%20essential%29.%20We%20classify%20three%20regimes%20of%20knowledge%20divergence%20%28shared%2C%20one-sided%2C%20and%20compositional%29%20and%20provide%20existence%20results%20showing%20that%20debate%20can%20achieve%20outcomes%20inaccessible%20to%20either%20model%20alone%2C%20alongside%20a%20negative%20result%20showing%20that%20sufficiently%20strong%20adversarial%20incentives%20cause%20coordination%20failure%20in%20the%20compositional%20regime%2C%20with%20a%20sharp%20threshold%20separating%20effective%20from%20ineffective%20debate.%20We%20offer%20the%20first%20formal%20connection%20between%20debate%20and%20RLAIF%2C%20a%20geometric%20foundation%20for%20understanding%20when%20adversarial%20oversight%20protocols%20are%20justified%2C%20and%20connection%20to%20the%20problem%20of%20eliciting%20latent%20knowledge%20across%20models%20with%20complementary%20information.&entry.1838667208=http%3A//arxiv.org/abs/2603.05293v1&entry.124074799=Read"},
{"title": "Stable-LoRA: Stabilizing Feature Learning of Low-Rank Adaptation", "author": "Yize Wu and Ke Gao and Ling Li and Yanjun Wu", "abstract": "Low-Rank Adaptation (LoRA) is a widely adopted parameter-efficient method for fine-tuning Large Langauge Models. It updates the weight matrix as $W=W_0+sBA$, where $W_0$ is the original frozen weight, $s$ is a scaling factor and $A$,$B$ are trainable low-rank matrices. Despite its robust empirical effectiveness, the theoretical foundations of LoRA remain insufficiently understood, particularly with respect to feature learning stability. In this paper, we first establish that, LoRA can, in principle, naturally achieve and sustain stable feature learning (i.e., be self-stabilized) under appropriate hyper-parameters and initializations of $A$ and $B$. However, we also uncover a fundamental limitation that the necessary non-zero initialization of $A$ compromises self-stability, leading to suboptimal performances. To address this challenge, we propose Stable-LoRA, a weight-shrinkage optimization strategy that dynamically enhances stability of LoRA feature learning. By progressively shrinking $A$ during the earliest training steps, Stable-LoRA is both theoretically and empirically validated to effectively eliminate instability of LoRA feature learning while preserving the benefits of the non-zero start. Experiments show that Stable-LoRA consistently outperforms other baselines across diverse models and tasks, with no additional memory usage and only negligible computation overheads. The code is available at https://github.com/Yize-Wu/Stable-LoRA.", "link": "http://arxiv.org/abs/2603.05204v1", "date": "2026-03-05", "relevancy": 2.3769, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4964}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.486}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4438}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stable-LoRA%3A%20Stabilizing%20Feature%20Learning%20of%20Low-Rank%20Adaptation&body=Title%3A%20Stable-LoRA%3A%20Stabilizing%20Feature%20Learning%20of%20Low-Rank%20Adaptation%0AAuthor%3A%20Yize%20Wu%20and%20Ke%20Gao%20and%20Ling%20Li%20and%20Yanjun%20Wu%0AAbstract%3A%20Low-Rank%20Adaptation%20%28LoRA%29%20is%20a%20widely%20adopted%20parameter-efficient%20method%20for%20fine-tuning%20Large%20Langauge%20Models.%20It%20updates%20the%20weight%20matrix%20as%20%24W%3DW_0%2BsBA%24%2C%20where%20%24W_0%24%20is%20the%20original%20frozen%20weight%2C%20%24s%24%20is%20a%20scaling%20factor%20and%20%24A%24%2C%24B%24%20are%20trainable%20low-rank%20matrices.%20Despite%20its%20robust%20empirical%20effectiveness%2C%20the%20theoretical%20foundations%20of%20LoRA%20remain%20insufficiently%20understood%2C%20particularly%20with%20respect%20to%20feature%20learning%20stability.%20In%20this%20paper%2C%20we%20first%20establish%20that%2C%20LoRA%20can%2C%20in%20principle%2C%20naturally%20achieve%20and%20sustain%20stable%20feature%20learning%20%28i.e.%2C%20be%20self-stabilized%29%20under%20appropriate%20hyper-parameters%20and%20initializations%20of%20%24A%24%20and%20%24B%24.%20However%2C%20we%20also%20uncover%20a%20fundamental%20limitation%20that%20the%20necessary%20non-zero%20initialization%20of%20%24A%24%20compromises%20self-stability%2C%20leading%20to%20suboptimal%20performances.%20To%20address%20this%20challenge%2C%20we%20propose%20Stable-LoRA%2C%20a%20weight-shrinkage%20optimization%20strategy%20that%20dynamically%20enhances%20stability%20of%20LoRA%20feature%20learning.%20By%20progressively%20shrinking%20%24A%24%20during%20the%20earliest%20training%20steps%2C%20Stable-LoRA%20is%20both%20theoretically%20and%20empirically%20validated%20to%20effectively%20eliminate%20instability%20of%20LoRA%20feature%20learning%20while%20preserving%20the%20benefits%20of%20the%20non-zero%20start.%20Experiments%20show%20that%20Stable-LoRA%20consistently%20outperforms%20other%20baselines%20across%20diverse%20models%20and%20tasks%2C%20with%20no%20additional%20memory%20usage%20and%20only%20negligible%20computation%20overheads.%20The%20code%20is%20available%20at%20https%3A//github.com/Yize-Wu/Stable-LoRA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05204v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStable-LoRA%253A%2520Stabilizing%2520Feature%2520Learning%2520of%2520Low-Rank%2520Adaptation%26entry.906535625%3DYize%2520Wu%2520and%2520Ke%2520Gao%2520and%2520Ling%2520Li%2520and%2520Yanjun%2520Wu%26entry.1292438233%3DLow-Rank%2520Adaptation%2520%2528LoRA%2529%2520is%2520a%2520widely%2520adopted%2520parameter-efficient%2520method%2520for%2520fine-tuning%2520Large%2520Langauge%2520Models.%2520It%2520updates%2520the%2520weight%2520matrix%2520as%2520%2524W%253DW_0%252BsBA%2524%252C%2520where%2520%2524W_0%2524%2520is%2520the%2520original%2520frozen%2520weight%252C%2520%2524s%2524%2520is%2520a%2520scaling%2520factor%2520and%2520%2524A%2524%252C%2524B%2524%2520are%2520trainable%2520low-rank%2520matrices.%2520Despite%2520its%2520robust%2520empirical%2520effectiveness%252C%2520the%2520theoretical%2520foundations%2520of%2520LoRA%2520remain%2520insufficiently%2520understood%252C%2520particularly%2520with%2520respect%2520to%2520feature%2520learning%2520stability.%2520In%2520this%2520paper%252C%2520we%2520first%2520establish%2520that%252C%2520LoRA%2520can%252C%2520in%2520principle%252C%2520naturally%2520achieve%2520and%2520sustain%2520stable%2520feature%2520learning%2520%2528i.e.%252C%2520be%2520self-stabilized%2529%2520under%2520appropriate%2520hyper-parameters%2520and%2520initializations%2520of%2520%2524A%2524%2520and%2520%2524B%2524.%25 {"title": "RapidPoseTriangulation: Multi-view Multi-person Whole-body Human Pose Triangulation in a Millisecond", "author": "Daniel Bermuth and Alexander Poeppel and Wolfgang Reif", "abstract": "The integration of multi-view imaging and pose estimation represents a significant advance in computer vision applications, offering new possibilities for understanding human movement and interactions. This work presents a new algorithm that improves multi-view multi-person pose estimation, focusing on fast triangulation speeds and good generalization capabilities. The approach extends to whole-body pose estimation, capturing details from facial expressions to finger movements across multiple individuals and viewpoints. Adaptability to different settings is demonstrated through strong performance across unseen datasets and configurations. To support further progress in this field, all of this work is publicly accessible.", "link": "http://arxiv.org/abs/2503.21692v5", "date": "2026-03-05", "relevancy": 2.3723, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5992}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.597}, {"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.5681}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RapidPoseTriangulation%3A%20Multi-view%20Multi-person%20Whole-body%20Human%20Pose%20Triangulation%20in%20a%20Millisecond&body=Title%3A%20RapidPoseTriangulation%3A%20Multi-view%20Multi-person%20Whole-body%20Human%20Pose%20Triangulation%20in%20a%20Millisecond%0AAuthor%3A%20Daniel%20Bermuth%20and%20Alexander%20Poeppel%20and%20Wolfgang%20Reif%0AAbstract%3A%20The%20integration%20of%20multi-view%20imaging%20and%20pose%20estimation%20represents%20a%20significant%20advance%20in%20computer%20vis {"title": "Transformer-Based Inpainting for Real-Time 3D Streaming in Sparse Multi-Camera Setups", "author": "Leif Van Holland and Domenic Zingsheim and Mana Takhsha and Hannah Dr\u00f6ge and Patrick Stotko and Markus Plack and Reinhard Klein", "abstract": "High-quality 3D streaming from multiple cameras is crucial for immersive experiences in many AR/VR applications. The limited number of views - often due to real-time constraints - leads to missing information and incomplete surfaces in the rendered images. Existing approaches typically rely on simple heuristics for the hole filling, which can result in inconsistencies or visual artifacts. We propose to complete the missing textures using a novel, application-targeted inpainting method independent of the underlying representation as an image-based post-processing step after the novel view rendering. The method is designed as a standalone module compatible with any calibrated multi-camera system. For this we introduce a multi-view aware, transformer-based network architecture using spatio-temporal embeddings to ensure consistency across frames while preserving fine details. Additionally, our resolution-independent design allows adaptation to different camera setups, while an adaptive patch selection strategy balances inference speed and quality, allowing real-time performance. We evaluate our approach against state-of-the-art inpainting techniques under the same real-time constraints and demonstrate that our model achieves the best trade-off between quality and speed, outperforming competitors in both image and video-based metrics.", "link": "http://arxiv.org/abs/2603.05507v1", "date": "2026-03-05", "relevancy": 2.3613, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6108}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "simila {"title": "Towards Understanding Subliminal Learning: When and How Hidden Biases Transfer", "author": "Simon Schrodi and Elias Kempf and Fazl Barez and Thomas Brox", "abstract": "Language models can transfer hidden biases during distillation. For example, a teacher that \"likes owls\" can make its student \"like owls\" too, even when the training data consists only of lists of numbers. This surprising phenomenon is called subliminal learning. Subliminal learning can be expected under soft distillation, where the student is trained on the teacher's full next-token distribution. But the fact that this also occurs under hard distillation-where the student only sees sampled tokens-raises a deeper question: when and how does subliminal learning actually occur? We answer this question through controlled experiments and mechanistic analysis. Our results show that subliminal learning does not need (global) token entanglement or logit leakage. Instead, it comes down to a small set of divergence tokens-rare cases where teachers with different biases would predict different tokens. Masking out these tokens mostly removes the hidden bias transfer. Mechanistically, divergence tokens reveal that early layers are critical. Surprisingly, finetuning even a single such early layer is sufficient for subliminal learning. Finally, we find that subliminal learning is fragile. Even small changes, like prompt paraphrasings, are usually sufficient to suppress it.", "link": "http://arxiv.org/abs/2509.23886v2", "date": "2026-03-05", "relevancy": 2.3472, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4745}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4686}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4653}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Understanding%20Subliminal%20Learning%3A%20When%20and%20How%20Hidden%20Biases%20Transfer&body=Title%3A%20Towards%20Understanding%20Subliminal%20Learning%3A%20When%20and%20How%20Hidden%20Biases%20Transfer%0AAuthor%3A%20Simon%20Schrodi%20and%20Elias%20Kempf%20and%20Fazl%20Barez%20and%20Thomas%20Brox%0AAbstract%3A%20Language%20models%20can%20transfer%20hidden%20biases%20during%20distillation.%20For%20example%2C%20a%20teacher%20that%20%22likes%20owls%22%20can%20make%20its%20student%20%22like%20owls%22%20too%2C%20even%20when%20the%20training%20data%20consists%20only%20of%20lists%20of%20numbers.%20This%20surprising%20phenomenon%20is%20called%20subliminal%20learning.%20Subliminal%20learning%20can%20be%20expected%20under%20soft%20distillation%2C%20where%20the%20student%20is%20trained%20on%20the%20teacher%27s%20full%20next-token%20distribution.%20But%20the%20fact%20that%20this%20also%20occurs%20under%20hard%20distillation-where%20the%20student%20only%20sees%20sampled%20tokens-raises%20a%20deeper%20question%3A%20when%20and%20how%20does%20subliminal%20learning%20actually%20occur%3F%20We%20answer%20this%20question%20through%20controlled%20experiments%20and%20mechanistic%20analysis.%20Our%20results%20show%20that%20subliminal%20learning%20does%20not%20need%20%28global%29%20token%20entanglement%20or%20logit%20leakage.%20Instead%2C%20it%20comes%20down%20to%20a%20small%20set%20of%20divergence%20tokens-rare%20cases%20where%20teachers%20with%20different%20biases%20would%20predict%20different%20tokens.%20Masking%20out%20these%20tokens%20mostly%20removes%20the%20hidden%20bias%20transfer.%20Mechanistically%2C%20divergence%20tokens%20reveal%20that%20early%20layers%20are%20critical.%20Surprisingly%2C%20finetuning%20even%20a%20single%20such%20early%20layer%20is%20su

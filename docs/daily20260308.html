{"title": "Viewpoint Matters: Dynamically Optimizing Viewpoints with Masked Autoencoder for Visual Manipulation", "author": "Pengfei Yi and Yifan Han and Junyan Li and Litao Liu and Wenzhao Lian", "abstract": "Robotic manipulation continues to be a challenge, and imitation learning (IL) enables robots to learn tasks from expert demonstrations. Current IL methods typically rely on fixed camera setups, where cameras are manually positioned in static locations, imposing significant limitations on adaptability and coverage. Inspired by human active perception, where humans dynamically adjust their viewpoint to capture the most relevant and least noisy information, we propose MAE-Select, a novel framework for active viewpoint selection in single-camera robotic systems. MAE-Select fully leverages pre-trained multi-view masked autoencoder representations and dynamically selects the next most informative viewpoint at each time chunk without requiring labeled viewpoints. Extensive experiments demonstrate that MAE-Select improves the capabilities of single-camera systems and, in some cases, even surpasses multi-camera setups. The project will be available at https://mae-select.github.io.", "link": "http://arxiv.org/abs/2602.04243v2", "date": "2026-03-05", "relevancy": 2.3411, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5908}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.582}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5811}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Viewpoint%20Matters%3A%20Dynamically%20Optimizing%20Viewpoints%20with%20Masked%20Autoencoder%20for%20Visual%20Manipul {"title": "Generative Models in Decision Making: A Survey", "author": "Xinyu Shao and Jianping Zhang and Haozhi Wang and Leo Maxime Brunswic and Kaiwen Zhou and Jiqian Dong and Kaiyang Guo and Zhitang Chen and Jun Wang and Jianye Hao and Xiu Li and Yinchuan Li", "abstract": "Generative models have fundamentally reshaped the landscape of decision-making, reframing the problem from pure scalar reward maximization to high-fidelity trajectory generation and distribution matching. This paradigm shift addresses intrinsic limitations in classical Reinforcement Learning (RL), particularly the limited expressivity of standard unimodal policy distributions in capturing complex, multi-modal behaviors embedded in diverse datasets. However, current literature often treats these models as isolated algorithmic improvements, rarely synthesizing them into a single comprehensive framework. This survey proposes a principled taxonomy grounding generative decision-making within the probabilistic framework of Control as Inference. By performing a variational factorization of the trajectory posterior, we conceptualize four distinct functional roles: Controllers for amortized policy inference, Modelers for dynamics priors, Optimizers for iterative trajectory refinement, and Evaluators for trajectory guidance and value assessment. Unlike existing architecture-centric reviews, this function-centric framework allows us to critically analyze representative generative families across distinct dimensions. Furthermore, we examine deployment in high-stakes domains, specifically Embodied AI, Autonomous Driving, and AI for Science, highlighting systemic risks such as dynamics hallucination in world models and proxy exploitation. Finally, we chart the path toward Generalist Physical Intelligence, identifying pivotal challenges in inference efficiency, trustworthiness, and the emergence of Physical Foundation Models.", "link": "http://arxiv.org/abs/2502.17100v4", "date": "2026-03-05", "relevancy": 2.3 llers%20for%20amortized%20policy%20inference%2C%20Modelers%20for%20dynamics%20priors%2C%20Optimizers%20for%20iterative%20trajectory%20refinement%2C%20and%20Evaluators%20for%20trajectory%20guidance%20and%20value%20assessment.%20Unlike%20existing%20architecture-centric%20reviews%2C%20this%20function-centric%20framework%20allows%20us%20to%20critically%20analyze%20representative%20generative%20families%20across%20distinct%20dimensions.%20Furthermore%2C%20we%20examine%20deployment%20in%20high-stakes%20domains%2C%20specifically%20Embodied%20AI%2C%20Autonomous%20Driving%2C%20and%20AI%20for%20Science%2C%20highlighting%20systemic%20risks%20such%20as%20dynamics%20hallucination%20in%20world%20models%20and%20proxy%20exploitation.%20Finally%2C%20we%20chart%20the%20path%20toward%20Generalist%20Physical%20Intelligence%2C%20identifying%20pivotal%20challenges%20in%20inference%20efficiency%2C%20trustworthiness%2C%20and%20the%20emergence%20of%20Physical%20Foundation%20Models.%0ALink%3A%20http%3A//arxiv.org/abs/2502.17100v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%2520Models%2520in%2520Decision%2520Making%253A%2520A%2520Survey%26entry.906535625%3DXinyu%2520Shao%2520and%2520Jianping%2520Zhang%2520and%2520Haozhi%2520Wang%2520and%2520Leo%2520Maxime%2520Brunswic%2520and%2520Kaiwen%2520Zhou%2520and%2520Jiqian%2520Dong%2520and%2520Kaiyang%2520Guo%2520and%2520Zhitang%2520Chen%2520and%2520Jun%2520Wang%2520and%2520Jianye%2520Hao%2520and%2520Xiu%2520Li%2520and%2520Yinchuan%2520Li%26entry.1292438233%3DGenerative%2520models%2520have%2520fundamentally%2520reshaped%2520the%2520landscape%2520of%2520decision-making%252C%2520reframing%2520the%2520problem%2520from%2520pure%2520scalar%2520reward%2520maximization%2520to%2520high-fidelity%2520trajectory%2520generation%2520and%2520distribution%2520matching.%2520This%2520paradigm%2520shift%2520addresses%2520intrinsic%2520limitations%2520in%2520classical%2 {"title": "PACE: A Personalized Adaptive Curriculum Engine for 9-1-1 Call-taker Training", "author": "Zirong Chen and Hongchao Zhang and Meiyi Ma", "abstract": "9-1-1 call-taking training requires mastery of over a thousand interdependent skills, covering diverse incident types and protocol-specific nuances. A nationwide labor shortage is already straining training capacity, but effective instruction still demands that trainers tailor objectives to each trainee's evolving competencies. This personalization burden is one that current practice cannot scale. Partnering with Metro Nashville Department of Emergency Communications (MNDEC), we propose PACE (Personalized Adaptive Curriculum Engine), a co-pilot system that augments trainer decision-making by (1) maintaining probabilistic beliefs over trainee skill states, (2) modeling individual learning and forgetting dynamics, and (3) recommending training scenarios that balance acquisition of new competencies with retention of existing ones. PACE propagates evidence over a structured skill graph to accelerate diagnostic coverage and applies contextual bandits to select scenarios that target gaps the trainee is prepared to address. Empirical results show that PACE achieves 19.50% faster time-to-competence and 10.95% higher terminal mastery compared to state-of-the-art frameworks. Co-pilot studies with practicing training officers further demonstrate a 95.45% alignment rate between PACE's and experts' pedagogical judgments on real-world cases. Under estimation, PACE cuts turnaround time to merely 34 seconds from 11.58 minutes, up to 95.08% reduction.", "link": "http://arxiv.org/abs/2603.05361v1", "date": "2026-03-05", "relevancy": 2.3329, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5417}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": {"title": "BabyHuBERT: Multilingual Self-Supervised Learning for Segmenting Speakers in Child-Centered Long-Form Recordings", "author": "Th\u00e9o Charlot and Tarek Kunze and Maxime Poli and Alejandrina Cristia and Emmanuel Dupoux and Marvin Lavechin", "abstract": "Child-centered daylong recordings are essential for studying early language development, but existing speech models trained on clean adult data perform poorly due to acoustic and linguistic differences. We introduce BabyHuBERT, a self-supervised speech model trained on 13,000 hours of multilingual child-centered recordings spanning 40+ languages. Evaluated on voice type classification -- distinguishing target children from female adults, male adults, and other children, a key preprocessing step for analyzing naturalistic language experiences -- BabyHuBERT-VTC achieves F1-scores from 52.1% to 74.4% across six corpora, consistently outperforming W2V2-LL4300 (English daylongs) and HuBERT (clean adult speech). Notable gains include 13.2 and 15.9 absolute F1 points over HuBERT on Vanuatu and Solomon Islands, demonstrating effectiveness on underrepresented languages. We share code and model to support researchers working with child-centered recordings across diverse linguistic contexts.", "link": "http://arxiv.org/abs/2509.15001v2", "date": "2026-03-05", "relevancy": 2.3317, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4687}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4652}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4652}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BabyHuBERT%3A%20Multilingual%20Self-Supervised%20Learning {"title": "Direct Contact-Tolerant Motion Planning With Vision Language Models", "author": "He Li and Jian Sun and Chengyang Li and Guoliang Li and Qiyu Ruan and Shuai Wang and Chengzhong Xu", "abstract": "Navigation in cluttered environments often requires robots to tolerate contact with movable or deformable objects to maintain efficiency. Existing contact-tolerant motion planning (CTMP) methods rely on indirect spatial representations (e.g., prebuilt map, obstacle set), resulting in inaccuracies and a lack of adaptiveness to environmental uncertainties. To address this issue, we propose a direct contact-tolerant (DCT) planner, which integrates vision-language models (VLMs) into direct point perception and navigation, including two key components. The first one is VLM point cloud partitioner (VPP), which performs contact-tolerance reasoning in image space using VLM, caches inference masks, propagates them across frames using odometry, and projects them onto the current scan to generate a contact-aware point cloud. The second innovation is VPP guided navigation (VGN), which formulates CTMP as a perception-to-control optimization problem under direct contact-aware point cloud constraints, which is further solved by a specialized deep neural network (DNN). We implement DCT in Isaac Sim and a real car-like robot, demonstrating that DCT achieves robust and efficient navigation in cluttered environments with movable obstacles, outperforming representative baselines across diverse metrics. The code is available at: https://github.com/ChrisLeeUM/DCT.", "link": "http://arxiv.org/abs/2603.05017v1", "date": "2026-03-05", "relevancy": 2.3249, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5887}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "simi {"title": "WebFactory: Automated Compression of Foundational Language Intelligence into Grounded Web Agents", "author": "Sicheng Fan and Qingyun Shi and Shengze Xu and Shengbo Cai and Tieyong Zeng and Li Ling and Yanyi Shang and Dehan Kong", "abstract": "Current paradigms for training GUI agents are fundamentally limited by a reliance on either unsafe, non-reproducible live web interactions or costly, scarce human-crafted data and environments. We argue this focus on data volume overlooks a more critical factor: the efficiency of compressing a large language model's (LLM) latent knowledge into actionable agent behavior. We introduce WebFactory, a novel, fully automated closed-loop reinforcement learning pipeline for GUI agents, systematically compressing LLM-encoded internet intelligence into efficient, grounded actions. Our pipeline features a process of scalable environment synthesis, knowledge-aware task generation, LLM-powered trajectory collection, decomposed reward RL training, and systematic agent evaluation. Remarkably, our agent demonstrates exceptional data efficiency and generalization. Trained on synthetic data from only 10 websites within WebFactory, it achieves performance comparable to GUI agents trained on the same amount of human-annotated data from a much larger set of environments. This superior performance is consistent across our internal offline and online transfer benchmarks, where our agent also significantly outperforms the base foundation model. We further provide critical insights into the \"embodiment potential\" of different LLM foundations, offering a new axis for model evaluation. This work presents a scalable and cost-effective paradigm for transforming passive internet knowledge into active, grounded intelligence, marking a critical step towards general-purpose interactive agents.", "link": "http://arxiv.org/abs/2603.05044v1", "date": "2026-03-05", "relevancy": 2.3098, "topK": [{"title": "Genie: Generative Interactive Environments", ization.%20Trained%20on%20synthetic%20data%20from%20only%2010%20websites%20within%20WebFactory%2C%20it%20achieves%20performance%20comparable%20to%20GUI%20agents%20trained%20on%20the%20same%20amount%20of%20human-annotated%20data%20from%20a%20much%20larger%20set%20of%20environments.%20This%20superior%20performance%20is%20consistent%20across%20our%20internal%20offline%20and%20online%20transfer%20benchmarks%2C%20where%20our%20agent%20also%20significantly%20outperforms%20the%20base%20foundation%20model.%20We%20further%20provide%20critical%20insights%20into%20the%20%22embodiment%20potential%22%20of%20different%20LLM%20foundations%2C%20offering%20a%20new%20axis%20for%20model%20evaluation.%20This%20work%20presents%20a%20scalable%20and%20cost-effective%20paradigm%20for%20transforming%20passive%20internet%20knowledge%20into%20active%2C%20grounded%20intelligence%2C%20marking%20a%20critical%20step%20towards%20general-purpose%20interactive%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05044v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWebFactory%253A%2520Automated%2520Compression%2520of%2520Foundational%2520Language%2520Intelligence%2520into%2520Grounded%2520Web%2520Agents%26entry.906535625%3DSicheng%2520Fan%2520and%2520Qingyun%2520Shi%2520and%2520Shengze%2520Xu%2520and%2520Shengbo%2520Cai%2520and%2520Tieyong%2520Zeng%2520and%2520Li%2520Ling%2520and%2520Yanyi%2520Shang%2520and%2520Dehan%2520Kong%26entry.1292438233%3DCurrent%2520paradigms%2520for%2520training%2520GUI%2520agents%2520are%2520fundamentally%2520limited%2520by%2520a%2520reliance%2520on%2520either%2520unsafe%252C%2520non-reproducible%2520live%2520web%2520interactions%2520or%2520costly%252C%2520scarce%2520human-crafted%2520data%2520and%2520environments.%2520We%2520argue%2520this%2520focus%2520on%2520data%2520volume%2520overlooks%2520a%2520more%2520critical%2520factor%253A%2520the%2520efficiency%2520of%2520compressing%2520a%25 ternal%20offline%20and%20online%20transfer%20benchmarks%2C%20where%20our%20agent%20also%20significantly%20outperforms%20the%20base%20foundation%20model.%20We%20further%20provide%20critical%20insights%20into%20the%20%22embodiment%20potential%22%20of%20different%20LLM%20foundations%2C%20offering%20a%20new%20axis%20for%20model%20evaluation.%20This%20work%20presents%20a%20scalable%20and%20cost-effective%20paradigm%20for%20transforming%20passive%20internet%20knowledge%20into%20active%2C%20grounded%20intelligence%2C%20marking%20a%20critical%20step%20towards%20general-purpose%20interactive%20agents.&entry.1838667208=http%3A//arxiv.org/abs/2603.05044v1&entry.124074799=Read"},
{"title": "Track Anything Behind Everything: Zero-Shot Amodal Video Object Segmentation", "author": "Finlay G. C. Hudson and William A. P. Smith", "abstract": "We present Track Anything Behind Everything (TABE), a novel pipeline for zero-shot amodal video object segmentation. Unlike existing methods that require pretrained class labels, our approach uses a single query mask from the first frame where the object is visible, enabling flexible, zero-shot inference. We pose amodal segmentation as generative outpainting from modal (visible) masks using a pretrained video diffusion model. We do not need to re-train the diffusion model to accommodate additional input channels but instead use a pretrained model that we fine-tune at test-time to allow specialisation towards the tracked object. Our TABE pipeline is specifically designed to handle amodal completion, even in scenarios where objects are completely occluded. Our model and code will all be released.", "link": "http://arxiv.org/abs/2411.19210v3", "date": "2026-03-05", "relevancy": 2.3094, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5842}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5789}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5731}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Track%20Anything%20Behind%20Everything%3A%20Zero-Shot%20Amodal%20Video%20Object%20Segmentation&body=Title%3A%20Track%20Anything%20Behind%20Everything%3A%20Zero-Shot%20Amodal%20Video%20Object%20Segmentation%0AAuthor%3A%20Finlay%20G.%20C.%20Hudson%20and%20William%20A.%20P.%20Smith%0AAbstract%3A%20We%20present%20Track%20Anything%20Behind%20Everything%20%28TABE%29%2C%20a%20novel%20pipeline%20for%20zero-shot%20amodal%20video%20object%20segmentation.%20Unlike%20existing%20methods%20that%20require%20pretrained%20class%20labels%2C%20our%20approach%20uses%20a%20single%20query%20mask%20from%20the%20first%20frame%20where%20the%20object%20is%20visible%2C%20enabling%20flexible%2C%20zero-shot%20inference.%20We%20pose%20amodal%20segmentation%20as%20generative%20outpainting%20from%20modal%20%28visible%29%20masks%20using%20a%20pretrained%20video%20diffusion%20model.%20We%20do%20not%20need%20to%20re-train%20the%20diffusion%20model%20to%20accommodate%20additional%20input%20channels%20but%20instead%20use%20a%20pretrained%20model%20that%20we%20fine-tune%20at%20test-time%20to%20allow%20specialisation%20towards%20the%20tracked%20object.%20Our%20TABE%20pipeline%20is%20specifically%20designed%20to%20handle%20amodal%20completion%2C%20even%20in%20scenarios%20where%20objects%20are%20completely%20occluded.%20Our%20model%20and%20code%20will%20all%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2411.19210v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrack%2520Anything%2520Behind%2520Everything%253A%2520Zero-Shot%2520Amodal%2520Video%2520Object%2520Segmentation%26entry.906535625%3DFinlay%2520G.%2520C.%2520Hudson%2520and%2520William%2520A.%2520P.%2520Smith%26entry.1292438233%3DWe%2520present%2520Track%2520Anything%2520Behind%2520Everything%2520%2528TABE%2529%252C%2520a%2520novel%2520pipeline%2520for%2520zero-shot%2520amodal%2520video%2520object%2520segmentation.%2520Unlike%2520existing%2520methods%2520that%2520require%2520pretrained%2520class%2520labels%252C%2520our%2520approach%2520uses%2520a%2520single%2520query%2520mask%2520from%2520the%2520first%2520frame%2520where%2520the%2520object%2520is%2520visible%252C%2520enabling%2520flexible%252C%2520zero-shot%2520inference.%2520We%2520pose%2520amodal%2520segmentation%2520as%2520generative%2520outpainting%2520from%2520modal%2520%2528visible%2529%2520masks%2520using%2520a%2520pretrained%2520video%2520diffusion%2520model.%2520We%2520do%2520not%2520need%2520to%2520re-train%2520the%2520diffusion%2520model%2520to%2520accommodate%2520additional%2520input%2520channels%2520but%2520instead%2520use%2520a%2520pretrained%2520model%2520that%2520we%2520fine-tune%2520at%2520test-time%2520to%2520allow%2520specialisation%2520towards%2520the%2520tracked%2520object.%2520Our%2520TABE%2520pipeline%2520is%2520specifically%2520designed%2520to%2520handle%2520amodal%2520completion%252C%2520even%2520in%2520scenarios%2520where%2520objects%2520are%2520completely%2520occluded.%2520Our%2520model%2520and%2520code%2520will%2520all%2520be%2520released.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2411.19210v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Track%20Anything%20Behind%20Everything%3A%20Zero-Shot%20Amodal%20Video%20Object%20Segmentation&entry.906535625=Finlay%20G.%20C.%20Hudson%20and%20William%20A.%20P.%20Smith&entry.1292438233=We%20present%20Track%20Anything%20Behind%20Everything%20%28TABE%29%2C%20a%20novel%20pipeline%20for%20zero-shot%20amodal%20video%20object%20segmentation.%20Unlike%20existing%20methods%20that%20require%20pretrained%20class%20labels%2C%20our%20approach%20uses%20a%20single%20query%20mask%20from%20the%20first%20frame%20where%20the%20object%20is%20visible%2C%20enabling%20flexible%2C%20zero-shot%20inference.%20We%20pose%20amodal%20segmentation%20as%20generative%20outpainting%20from%20modal%20%28visible%29%20masks%20using%20a%20pretrained%20video%20diffusion%20model.%20We%20do%20not%20need%20to%20re-train%20the%20diffusion%20model%20to%20accommodate%20additional%20input%20channels%20but%20instead%20use%20a%20pretrained%20model%20that%20we%20fine-tune%20at%20test-time%20to%20allow%20specialisation%20towards%20the%20tracked%20object.%20Our%20TABE%20pipeline%20is%20specifically%20designed%20to%20handle%20amodal%20completion%2C%20even%20in%20scenarios%20where%20objects%20are%20completely%20occluded.%20Our%20model%20and%20code%20will%20all%20be%20released.&entry.1838667208=http%3A//arxiv.org/abs/2411.19210v3&entry.124074799=Read"},
{"title": "Agentic Very Long Video Understanding", "author": "Aniket Rege and Arka Sadhu and Yuliang Li and Kejie Li and Ramya Korlakai Vinayak and Yuning Chai and Yong Jae Lee and Hyo Jin Kim", "abstract": "The advent of always-on personal AI assistants, enabled by all-day wearable devices such as smart glasses, demands a new level of contextual understanding, one that goes beyond short, isolated events to encompass the continuous, longitudinal stream of egocentric video. Achieving this vision requires advances in long-horizon video understanding, where systems must interpret and recall visual and audio information spanning days or even weeks. Existing methods, including large language models and retrieval-augmented generation, are constrained by limited context windows and lack the ability to perform compositional, multi-hop reasoning over very long video streams. In this work, we address these challenges through EGAgent, an enhanced agentic framework centered on entity scene graphs, which represent people, places, objects, and their relationships over time. Our system equips a planning agent with tools for structured search and reasoning over these graphs, as well as hybrid visual and audio search capabilities, enabling detailed, cross-modal, and temporally coherent reasoning. Experiments on the EgoLifeQA and Video-MME (Long) datasets show that our method achieves state-of-the-art performance on EgoLifeQA (57.5%) and competitive performance on Video-MME (Long) (74.1%) for complex longitudinal video understanding tasks. Code is available at https://github.com/facebookresearch/egagent.", "link": "http://arxiv.org/abs/2601.18157v2", "date": "2026-03-05", "relevancy": 2.3014, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5917}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.566}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5627}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Agentic%20Very%20Long%20Video%20Understanding&body=Title%3A%20Agentic%20Very%20Long%20Video%20Understanding%0AAuthor%3A%20Aniket%20Rege%20and%20Arka%20Sadhu%20and%20Yuliang%20Li%20and%20Kejie%20Li%20and%20Ramya%20Korlakai%20Vinayak%20and%20Yuning%20Chai%20and%20Yong%20Jae%20Lee%20and%20Hyo%20Jin%20Kim%0AAbstract%3A%20The%20advent%20of%20always-on%20personal%20AI%20assistants%2C%20enabled%20by%20all-day%20wearable%20devices%20such%20as%20smart%20glasses%2C%20demands%20a%20new%20level%20of%20contextual%20understanding%2C%20one%20that%20goes%20beyond%20short%2C%20isolated%20events%20to%20encompass%20the%20continuous%2C%20longitudinal%20stream%20of%20egocentric%20video.%20Achieving%20this%20vision%20requires%20advances%20in%20long-horizon%20video%20understanding%2C%20where%20systems%20must%20interpret%20and%20recall%20visual%20and%20audio%20information%20spanning%20days%20or%20even%20weeks.%20Existing%20methods%2C%20including%20large%20language%20models%20and%20retrieval-augmented%20generation%2C%20are%20constrained%20by%20limited%20context%20windows%20and%20lack%20the%20ability%20to%20perform%20compositional%2C%20multi-hop%20reasoning%20over%20very%20long%20video%20streams.%20In%20this%20work%2C%20we%20address%20these%20challenges%20through%20EGAgent%2C%20an%20enhanced%20agentic%20framework%20centered%20on%20entity%20scene%20graphs%2C%20which%20represent%20people%2C%20places%2C%20objects%2C%20and%20their%20relationships%20over%20time.%20Our%20system%20equips%20a%20planning%20agent%20with%20tools%20for%20structured%20search%20and%20reasoning%20over%20these%20graphs%2C%20as%20well%20as%20hybrid%20visual%20and%20audio%20search%20capabilities%2C%20enabling%20detailed%2C%20cross-modal%2C%20and%20temporally%20coherent%20reasoning.%20Experiments%20on%20the%20EgoLifeQA%20and%20Video-MME%20%28Long%29%20datasets%20show%20that%20our%20method%20achieves%20state-of-the-art%20performance%20on%20EgoLifeQA%20%2857.5%25%29%20and%20competitive%20performance%20on%20Video-MME%20%28Long%29%20%2874.1%25%29%20for%20complex%20longitudinal%20video%20understanding%20tasks.%20Code%20is%20available%20at%20https%3A//github.com/facebookresearch/egagent.%0ALink%3A%20http%3A//arxiv.org/abs/2601.18157v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentic%2520Very%2520Long%2520Video%2520Understanding%26entry.906535625%3DAniket%2520Rege%2520and%2520Arka%2520Sadhu%2520and%2520Yuliang%2520Li%2520and%2520Kejie%2520Li%2520and%2520Ramya%2520Korlakai%2520Vinayak%2520and%2520Yuning%2520Chai%2520and%2520Yong%2520Jae%2520Lee%2520and%2520Hyo%2520Jin%2520Kim%26entry.1292438233%3DThe%2520advent%2520of%2520always-on%2520personal%2520AI%2520assistants%252C%2520enabled%2520by%2520all-day%2520wearable%2520devices%2520such%2520as%2520smart%2520glasses%252C%2520demands%2520a%2520new%2520level%2520of%2520contextual%2520understanding%252C%2520one%2520that%2520goes%2520beyond%2520short%252C%2520isolated%2520events%2520to%2520encompass%2520the%2520continuous%252C%2520longitudinal%2520stream%2520of%2520egocentric%2520video.%2520Achieving%2520this%2520vision%2520requires%2520advances%2520in%2520long-horizon%2520video%2520understanding%252C%2520where%2520systems%2520must%2520interpret%2520and%2520recall%2520visual%2520and%2520audio%2520information%2520spanning%2520days%2520or%2520even%2520weeks.%2520Existing%2520methods%252C%2520including%2520large%2520language%2520models%2520and%2520retrieval-augmented%2520generation%252C%2520are%2520constrained%2520by%2520limited%2520context%2520windows%2520and%2520lack%2520the%2520ability%2520to%2520perform%2520compositional%252C%2520multi-hop%2520reasoning%2520over%2520very%2520long%2520video%2520streams.%2520In%2520this% {"title": "Digital Twin Driven Textile Classification and Foreign Object Recognition in Automated Sorting Systems", "author": "Serkan Ergun and Tobias Mitterer and Hubert Zangl", "abstract": "The increasing demand for sustainable textile recycling requires robust automation solutions capable of handling deformable garments and detecting foreign objects in cluttered environments. This work presents a digital twin driven robotic sorting system that integrates grasp prediction, multi modal perception, and semantic reasoning for real world textile classification. A dual arm robotic cell equipped with RGBD sensing, capacitive tactile feedback, and collision-aware motion planning autonomously separates garments from an unsorted basket, transfers them to an inspection zone, and classifies them using state of the art Visual Language Models (VLMs). We benchmark nine VLM s from five model families on a dataset of 223 inspection scenarios comprising shirts, socks, trousers, underwear, foreign objects (including garments outside of the aforementioned classes), and empty scenes. The evaluation assesses per class accuracy, hallucination behavior, and computational performance under practical hardware constraints. Results show that the Qwen model family achieves the highest overall accuracy (up to 87.9 %), with strong foreign object detection performance, while lighter models such as Gemma3 offer competitive speed accuracy trade offs for edge deployment. A digital twin combined with MoveIt enables collision aware path planning and integrates segmented 3D point clouds of inspected garments into the virtual environment for improved manipulation reliability. The presented system demonstrates the feasibility of combining semantic VLM reasoning with conventional grasp detection and digital twin technology for scalable, autonomous textile sorting in realistic industrial settings.", "link": "http://arxiv.org/abs/2603.05230v1", "date": "2026-03-05", "relevancy": 2.3002, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5981}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.56}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Digital%20Twin%20Driven%20Textile%20Classification%20and%20Foreign%20Object%20Recognition%20in%20Automated%20Sorting%20Systems&body=Title%3A%20Digital%20Twin%20Driven%20Textile%20Classification%20and%20Foreign%20Object%20Recognition%20in%20Automated%20Sorting%20Systems%0AAuthor%3A%20Serkan%20Ergun%20and%20Tobias%20Mitterer%20and%20Hubert%20Zangl%0AAbstract%3A%20The%20increasing%20demand%20for%20sustainable%20textile%20recycling%20requires%20robust%20automation%20solutions%20capable%20of%20handling%20deformable%20garments%20and%20detecting%20foreign%20objects%20in%20cluttered%20environments.%20This%20work%20presents%20a%20digital%20twin%20driven%20robotic%20sorting%20system%20that%20integrates%20grasp%20prediction%2C%20multi%20modal%20perception%2C%20and%20semantic%20reasoning%20for%20real%20world%20textile%20classification.%20A%20dual%20arm%20robotic%20cell%20equipped%20with%20RGBD%20sensing%2C%20capacitive%20tactile%20feedback%2C%20and%20collision-aware%20motion%20planning%20autonomously%20separates%20garments%20from%20an%20unsorted%20basket%2C%20transfers%20them%20to%20an%20inspection%20zone%2C%20and%20classifies%20them%20using%20state%20of%20the%20art%20Visual%20Language%20Models%20%28VLMs%29.%20We%20benchmark%20nine%20VLM%20s%20from%20five%20model%20families%20on%20a%20dataset%20of%20223%20inspection%20scenarios%20comprising%20shirts%2C%20socks%2C%20trousers%2C%20underwear%2C%20foreign%20objects%20%28including%20garments%20outside%20of%20the%20aforementioned%20classes%29%2C%20and%20empty%20scenes.%20The%20evaluation%20assesses%20per%20class%20accuracy%2C%20hallucination%20behavior%2C%20and%20computational%20performance%20under%20practical%20hardware%20constraints.%20Results%20show%20that%20the%20Qwen%20model%20family%20achieves%20the%20highest%20overall%20accuracy%20%28up%20to%2087.9%20%25%29%2C%20with%20strong%20foreign%20object%20detection%20performance%2C%20while%20lighter%20models%20such%20as%20Gemma3%20offer%20competitive%20speed%20accuracy%20trade%20offs%20for%20edge%20deployment.%20A%20digital%20twin%20combined%20with%20MoveIt%20enables%20collision%20aware%20path%20planning%20and%20integrates%20segmented%203D%20point%20clouds%20of%20inspected%20garments%20into%20the%20virtual%20environment%20for%20improved%20manipulation%20reliability.%20The%20presented%20system%20demonstrates%20the%20feasibility%20of%20combining%20semantic%20VLM%20reasoning%20with%20conventional%20grasp%20detection%20and%20digital%20twin%20technology%20for%20scalable%2C%20autonomous%20textile%20sorting%20in%20realistic%20industrial%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05230v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDigital%2520Twin%2520Driven%2520Textile%2520Classification%2520and%2520Foreign%2520Object%2520Recognition%2520in%2520Automated%2520Sorting%2520Systems%26entry.906535625%3DSerkan%2520Ergun%2520and%2520Tobias%2520Mitterer%2520and%2520Hubert%2520Zangl%26entry.1292438233%3DThe%2520increasing%2520demand%2520for%2520sustainable%2520textile%2520recycling%2520requires%2520robust%2520automation%2520solutions%2520capable%2520of%2520handling%2520deformable%2520garments%2520and%2520detecting%2520foreign%2520objects%2520in%2520cluttered%2520environments.%2520This%2520work%2520presents%2520a%2520digital%2520twin%2520driven%2520robotic%2520sorting%2520sys {"title": "Layer by layer, module by module: Choose both for optimal OOD probing of ViT", "author": "Ambroise Odonnat and Vasilii Feofanov and Laetitia Chapel and Romain Tavenard and Ievgen Redko", "abstract": "Recent studies have observed that intermediate layers of foundation models often yield more discriminative representations than the final layer. While initially attributed to autoregressive pretraining, this phenomenon has also been identified in models trained via supervised and discriminative self-supervised objectives. In this paper, we conduct a comprehensive study to analyze the behavior of intermediate layers in pretrained vision transformers. Through extensive linear probing experiments across a diverse set of image classification benchmarks, we find that distribution shift between pretraining and downstream data is the primary cause of performance degradation in deeper layers. Furthermore, we perform a fine-grained analysis at the module level. Our findings reveal that standard probing of transformer block outputs is suboptimal; instead, probing the activation within the feedforward network yields the best performance under significant distribution shift, whereas the normalized output of the multi-head self-attention module is optimal when the shift is weak.", "link": "http://arxiv.org/abs/2603.05280v1", "date": "2026-03-05", "relevancy": 2.2863, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5804}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5804}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5275}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Layer%20by%20layer%2C%20module%20by%20module%3A%20Choose%20both%20for%20optimal%20OOD%20probing%20of%20ViT&body=Title%3A%20Layer%20by%20layer%2C%20module%20by%20module%3A%20Choose%20both%20for%20optimal%20OOD%20probing%20of%20ViT%0AAuthor%3A%20Ambroise%20Odonnat%20and%20Vasilii%20Feofanov%20and%20Laetitia%20Chapel%20and%20Romain%20Tavenard%20and%20Ievgen%20Redko%0AAbstract%3A%20Recent%20studies%20have%20observed%20that%20intermediate%20layers%20of%20foundation%20models%20often%20yield%20more%20discriminative%20representations%20than%20the%20final%20layer.%20While%20initially%20attributed%20to%20autoregressive%20pretraining%2C%20this%20phenomenon%20has%20also%20been%20identified%20in%20models%20trained%20via%20supervised%20and%20discriminative%20self-supervised%20objectives.%20In%20this%20paper%2C%20we%20conduct%20a%20comprehensive%20study%20to%20analyze%20the%20behavior%20of%20intermediate%20layers%20in%20pretrained%20vision%20transformers.%20Through%20extensive%20linear%20probing%20experiments%20across%20a%20diverse%20set%20of%20image%20classification%20benchmarks%2C%20we%20find%20that%20distribution%20shift%20between%20pretraining%20and%20downstream%20data%20is%20the%20primary%20cause%20of%20performance%20degradation%20in%20deeper%20layers.%20Furthermore%2C%20we%20perform%20a%20fine-grained%20analysis%20at%20the%20module%20level.%20Our%20findings%20reveal%20that%20standard%20probing%20of%20transformer%20block%20outputs%20is%20suboptimal%3B%20instead%2C%20probing%20the%20activation%20within%20the%20feedforward%20network%20yields%20the%20best%20performance%20under%20significant%20distribution%20shift%2C%20whereas%20the%20normalized%20output%20of%20the%20multi-head%20self-attention%20module%20is%20optimal%20when%20the%20shift%20is%20weak.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05280v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLayer%2520by%2520layer%252C%2520module%2520by%2520module%253A%2520Choose%2520both%2520for%2520optimal%2520OO {"title": "FreeTacMan: Robot-free Visuo-Tactile Data Collection System for Contact-rich Manipulation", "author": "Longyan Wu and Checheng Yu and Jieji Ren and Li Chen and Yufei Jiang and Ran Huang and Guoying Gu and Hongyang Li", "abstract": "Enabling robots with contact-rich manipulation remains a pivotal challenge in robot learning, which is substantially hindered by the data collection gap, including its inefficiency and limited sensor setup. While prior work has explored handheld paradigms, their rod-based mechanical structures remain rigid and unintuitive, providing limited tactile feedback and posing challenges for operators. Motivated by the dexterity and force feedback of human motion, we propose FreeTacMan, a human-centric and robot-free data collection system for accurate and efficient robot manipulation. Concretely, we design a wearable gripper with visuo-tactile sensors for data collection, which can be worn by human fingers for intuitive control. A high-precision optical tracking system is introduced to capture end-effector poses while synchronizing visual and tactile feedback simultaneously. We leverage FreeTacMan to collect a large-scale multimodal dataset, comprising over 3000k paired visuo-tactile images with end-effector poses, 10k demonstration trajectories across 50 diverse contact-rich manipulation tasks. FreeTacMan achieves multiple improvements in data collection performance over prior works and enables effective policy learning from self-collected datasets. By open-sourcing the hardware and the dataset, we aim to facilitate reproducibility and support research in visuo-tactile manipulation.", "link": "http://arxiv.org/abs/2506.01941v3", "date": "2026-03-05", "relevancy": 2.2863, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5856}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration {"title": "A Scalable Inter-edge Correlation Modeling in CopulaGNN for Link Sign Prediction", "author": "Jinkyu Sung and Myunggeum Jee and Joonseok Lee", "abstract": "Link sign prediction on a signed graph is a task to determine whether the relationship represented by an edge is positive or negative. Since the presence of negative edges violates the graph homophily assumption that adjacent nodes are similar, regular graph methods have not been applicable without auxiliary structures to handle them. We aim to directly model the latent statistical dependency among edges with the Gaussian copula and its corresponding correlation matrix, extending CopulaGNN (Ma et al., 2021). However, a naive modeling of edge-edge relations is computationally intractable even for a graph with moderate scale. To address this, we propose to 1) represent the correlation matrix as a Gramian of edge embeddings, significantly reducing the number of parameters, and 2) reformulate the conditional probability distribution to dramatically reduce the inference cost. We theoretically verify scalability of our method by proving its linear convergence. Also, our extensive experiments demonstrate that it achieves significantly faster convergence than baselines, maintaining competitive prediction performance to the state-of-the-art models.", "link": "http://arxiv.org/abs/2601.19175v4", "date": "2026-03-05", "relevancy": 2.2861, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4703}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4564}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4449}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Scalable%20Inter-edge%2 {"title": "Assessing the Impact of Code Changes on the Fault Localizability of Large Language Models", "author": "Sabaat Haroon and Ahmad Faraz Khan and Ahmad Humayun and Waris Gill and Abdul Haddi Amjad and Ali R. Butt and Mohammad Taha Khan and Muhammad Ali Gulzar", "abstract": "Generative Large Language Models (LLMs) are increasingly used in non-generative software maintenance tasks, such as fault localization (FL). Success in FL depends on a models ability to reason about program semantics beyond surface-level syntactic and lexical features. However, widely used LLM benchmarks primarily evaluate code generation, which differs fundamentally from semantic program reasoning. Meanwhile, traditional FL benchmarks such as Defect4J and BugsInPy are either not scalable or obsolete, as their datasets have become part of LLM training data, leading to biased results. This paper presents the first large-scale empirical investigation into the robustness of LLMs fault localizability. Inspired by mutation testing, we develop an end-to-end evaluation framework that addresses key limitations in existing LLM evaluation, including data contamination, scalability, automation, and extensibility. Using real-world programs with specifications, we inject unseen faults and ask LLMs to localize them, filtering out underspecified programs where localization is ambiguous. For each successfully localized program, we apply semantic-preserving mutations (SPMs) and rerun localization to assess robustness and determine whether LLM reasoning relies on syntactic cues rather than semantics. We evaluate 10 state-of-the-art LLMs on 750,013 fault localization tasks from over 1,300 Java and Python programs. We find that SPMs cause LLMs to fail on previously localized faults in 78% of cases, and that reasoning is stronger when relevant code appears earlier in context. These results indicate that LLM code reasoning is often tied to features irrelevant to semantics. We also identify code patterns that are challenging for LLMs to reason about. Overall, our findings motivate fundamental advances in how LLMs represent, interpret, and prioritize code semantics to reason more deeply about program logic", "link": "http://arxiv.org/abs/2504.04372v4", "date": "2026-03-05", "relevancy": 2.2839, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4612}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4546}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4546}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Assessing%20the%20Impact%20of%20Code%20Changes%20on%20the%20Fault%20Localizability%20of%20Large%20Language%20Models&body=Title%3A%20Assessing%20the%20Impact%20of%20Code%20Changes%20on%20the%20Fault%20Localizability%20of%20Large%20Language%20Models%0AAuthor%3A%20Sabaat%20Haroon%20and%20Ahmad%20Faraz%20Khan%20and%20Ahmad%20Humayun%20and%20Waris%20Gill%20and%20Abdul%20Haddi%20Amjad%20and%20Ali%20R.%20Butt%20and%20Mohammad%20Taha%20Khan%20and%20Muhammad%20Ali%20Gulzar%0AAbstract%3A%20Generative%20Large%20Language%20Models%20%28LLMs%29%20are%20increasingly%20used%20in%20non-generative%20software%20maintenance%20tasks%2C%20such%20as%20fault%20localization%20%28FL%29.%20Success%20in%20FL%20depends%20on%20a%20models%20ability%20to%20reason%20about%20program%20semantics%20beyond%20surface-level%20syntactic%20and%20lexical%20features.%20However%2C%20widely%20used%20LLM%20benchmarks%20primarily%20evaluate%20code%20generation%2C%20which%20differs%20fundamentally%20from%20semantic%20program%20reasoning.%20Meanwhile%2C%20traditional%20FL%20benchmarks%20such%20as%20Defect4J%20and%20BugsInPy%20are%20either%20not%20scalable%20or%20obsolete%2C%20as%20their%20datasets%20have%20become%20part%20of%20LLM%20training%20data%2C%20leading%20to%20biased%20results.%20This%20paper%20presents%20the%20first%20large-scale%20empirical%20investigation%20into%20the%20robustness%20of%20LLMs%20fault%20localizability.%20Inspired%20by%20mutation%20testing%2C%20we%20develop%20an%20end-to-end%20evaluation%20framework%20that%20addresses%20key%20limitations%20in%20existing%20LLM%20evaluation%2C%20including%20data%20contamination%2C%20scalability%2C%20automation%2C%20and%20extensibility.%20Using%20real-world%20programs%20with%20specifications%2C%20we%20inject%20unseen%20faults%20and%20ask%20LLMs%20to%20localize%20them%2C%20filtering%20out%20underspecified%20programs%20where%20localization%20is%20ambiguous.%20For%20each%20successfully%20localized%20program%2C%20we%20apply%20semantic-preserving%20mutations%20%28SPMs%29%20and%20rerun%20localization%20to%20assess%20robustness%20and%20determine%20whether%20LLM%20reasoning%20relies%20on%20syntactic%20cues%20rather%20than%20semantics.%20We%20evaluate%2010%20state-of-the-art%20LLMs%20on%20750%2C013%20fault%20localization%20tasks%20from%20over%201%2C300%20Java%20and%20Python%20programs.%20We%20find%20that%20SPMs%20cause%20LLMs%20to%20fail%20on%20previously%20localized%20faults%20in%2078%25%20of%20cases%2C%20and%20that%20reasoning%20is%20stronger%20when%20relevant%20code%20appears%20earlier%20in%20context.%20These%20results%20indicate%20that%20LLM%20code%20reasoning%20is%20often%20tied%20to%20features%20irrelevant%20to%20semantics.%20We%20also%20identify%20code%20patterns%20that%20are%20challenging%20for%20LLMs%20to%20reason%20about.%20Overall%2C%20our%20findings%20motivate%20fundamental%20advances%20in%20how%20LLMs%20represent%2C%20interpret%2C%20and%20prioritize%20code%20semantics%20to%20reason%20more%20deeply%20about%20program%20logic%0ALink%3A%20http%3A//arxiv.org/abs/2504.04372v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPY {"title": "MI-DETR: A Strong Baseline for Moving Infrared Small Target Detection with Bio-Inspired Motion Integration", "author": "Nian Liu and Jin Gao and Shubo Lin and Yutong Kou and Sikui Zhang and Fudong Ge and Zhiqiang Pu and Liang Li and Gang Wang and Yizheng Wang and Weiming Hu", "abstract": "Infrared small target detection (ISTD) is challenging because tiny, low-contrast targets are easily obscured by complex and dynamic backgrounds. Conventional multi-frame approaches typically learn motion implicitly through deep neural networks, often requiring additional motion supervision or explicit alignment modules. We propose Motion Integration DETR (MI-DETR), a bio-inspired dual-pathway detector that processes one infrared frame per time step while explicitly modeling motion. First, a retina-inspired cellular automaton (RCA) converts raw frame sequences into a motion map defined on the same pixel grid as the appearance image, enabling parvocellular-like appearance and magnocellular-like motion pathways to be supervised by a single set of bounding boxes without extra motion labels or alignment operations. Second, a Parvocellular-Magnocellular Interconnection (PMI) Block facilitates bidirectional feature interaction between the two pathways, providing a biologically motivated intermediate interconnection mechanism. Finally, a RT-DETR decoder operates on features from the two pathways to produce detection results. Surprisingly, our proposed simple yet effective approach yields strong performance on three commonly used ISTD benchmarks. MI-DETR achieves 70.3% mAP@50 and 72.7% F1 on IRDST-H (+26.35 mAP@50 over the best multi-frame baseline), 98.0% mAP@50 on DAUB-R, and 88.3% mAP@50 on ITSDT-15K, demonstrating the effectiveness of biologically inspired motion-appearance integration. Code is available at https://github.com/nliu-25/MI-DETR.", "link": "http://arxiv.org/abs/2603.05071v1", "date": "2026-03-05", "relevancy": 2.2781, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5742}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.573}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MI-DETR%3A%20A%20Strong%20Baseline%20for%20Moving%20Infrared%20Small%20Target%20Detection%20with%20Bio-Inspired%20Motion%20Integration&body=Title%3A%20MI-DETR%3A%20A%20Strong%20Baseline%20for%20Moving%20Infrared%20Small%20Target%20Detection%20with%20Bio-Inspired%20Motion%20Integration%0AAuthor%3A%20Nian%20Liu%20and%20Jin%20Gao%20and%20Shubo%20Lin%20and%20Yutong%20Kou%20and%20Sikui%20Zhang%20and%20Fudong%20Ge%20and%20Zhiqiang%20Pu%20and%20Liang%20Li%20and%20Gang%20Wang%20and%20Yizheng%20Wang%20and%20Weiming%20Hu%0AAbstract%3A%20Infrared%20small%20target%20detection%20%28ISTD%29%20is%20challenging%20because%20tiny%2C%20low-contrast%20targets%20are%20easily%20obscured%20by%20complex%20and%20dynamic%20backgrounds.%20Conventional%20multi-frame%20approaches%20typically%20learn%20motion%20implicitly%20through%20deep%20neural%20networks%2C%20often%20requiring%20additional%20motion%20supervision%20or%20explicit%20alignment%20modules.%20We%20propose%20Motion%20Integration%20DETR%20%28MI-DETR%29%2C%20a%20bio-inspired%20dual-pathway%20detector%20that%20processes%20one%20infrared%20frame%20per%20time%20step%20while%20explicitly%20modeling%20motion.%20First%2C%20a%20retina-inspired%20cellular%20automaton%20%28RCA%29%20converts%20raw%20frame%20sequences%20into%20a%20motion%20map%20defined%20on%20the%20same%20pixel%20grid%20as%20the%20appearance%20image%2C%20enabling%20parvocellular-like%20appearance%20and%20magnocellular-like%20motion%20pathways%20to%20be%20supervised%20by%20a%20single%20set%20of%20bounding%20boxes%20without%20extra%20motion%20labels%20or%20alignment%20operations.%20Second%2C%20a%20Parvocellular-Magnocellular%20Interconnection%20%28PMI%29%20Block%20facilitates%20bidirectional%20feature%20interaction%20between%20the%20two%20pathways%2C%20providing%20a%20biologically%20motivated%20intermediate%20interconnection%20mechanism.%20Finally%2C%20a%20RT-DETR%20decoder%20operates%20on%20features%20from%20the%20two%20pathways%20to%20produce%20detection%20results.%20Surprisingly%2C%20our%20proposed%20simple%20yet%20effective%20approach%20yields%20strong%20performance%20on%20three%20commonly%20used%20ISTD%20benchmarks.%20MI-DETR%20achieves%2070.3%25%20mAP%4050%20and%2072.7%25%20F1%20on%20IRDST-H%20%28%2B26.35%20mAP%4050%20over%20the%20best%20multi-frame%20baseline%29%2C%2098.0%25%20mAP%4050%20on%20DAUB-R%2C%20and%2088.3%25%20mAP%4050%20on%20ITSDT-15K%2C%20demonstrating%20the%20effectiveness%20of%20biologically%20inspired%20motion-appearance%20integration.%20Code%20is%20available%20at%20https%3A//github.com/nliu-25/MI-DETR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05071v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMI-DETR%253A%2520A%2520Strong%2520Baseline%2520for%2520Moving%2520Infrared%2520Small%2520Target%2520Detection%2520with%2520Bio-Inspired%2520Motion%2520Integration%26entry.906535625%3DNian%2520Liu%2520and%2520Jin%2520Gao%2520and%2520Shubo%2520Lin%2520and%2520Yutong%2520Kou%2520and%2520Sikui%2520Zhang%2520and%2520Fudong%2520Ge%2520and%2520Zhiqiang%2520Pu%2520and%2520Liang%2520Li%2520and%2520Gang%2520Wang%2520and%2520Yizheng%2520Wang%2520and%2520Weiming%2520Hu%26entry.1292438233%3DInfrared%2520small%2520target%2520detection%2520%2528ISTD%2529%2520is%2520challenging%2520because%2520tiny%252C%2520low-contrast%2520targets%2520are%2520easily%2520obscured%2520by%2520complex%2520and%2520dynamic%2520backgrounds.%2 2088.3%2525%2520mAP%254050%2520on%2520ITSDT-15K%252C%2520demonstrating%2520the%2520effectiveness%2520of%2520biologically%2520inspired%2520motion-appearance%2520integration.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/nliu-25/MI-DETR.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05071v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MI-DETR%3A%20A%20Strong%20Baseline%20for%20Moving%20Infrared%20Small%20Target%20Detection%20with%20Bio-Inspired%20Motion%20Integration&entry.906535625=Nian%20Liu%20and%20Jin%20Gao%20and%20Shubo%20Lin%20and%20Yutong%20Kou%20and%20Sikui%20Zhang%20and%20Fudong%20Ge%20and%20Zhiqiang%20Pu%20and%20Liang%20Li%20and%20Gang%20Wang%20and%20Yizheng%20Wang%20and%20Weiming%20Hu&entry.1292438233=Infrared%20small%20target%20detection%20%28ISTD%29%20is%20challenging%20because%20tiny%2C%20low-contrast%20targets%20are%20easily%20obscured%20by%20complex%20and%20dynamic%20backgrounds.%20Conventional%20multi-frame%20approaches%20typically%20learn%20motion%20implicitly%20through%20deep%20neural%20networks%2C%20often%20requiring%20additional%20motion%20supervision%20or%20explicit%20alignment%20modules.%20We%20propose%20Motion%20Integration%20DETR%20%28MI-DETR%29%2C%20a%20bio-inspired%20dual-pathway%20detector%20that%20processes%20one%20infrared%20frame%20per%20time%20step%20while%20explicitly%20modeling%20motion.%20First%2C%20a%20retina-inspired%20cellular%20automaton%20%28RCA%29%20converts%20raw%20frame%20sequences%20into%20a%20motion%20map%20defined%20on%20the%20same%20pixel%20grid%20as%20the%20appearance%20image%2C%20enabling%20parvocellular-like%20appearance%20and%20magnocellular-like%20motion%20pathways%20to%20be%20supervised%20by%20a%20single%20set%20of%20bounding%20boxes%20without%20extra%20motion%20labels%20or%20alignment%20operations.%20Second%2C%20a%20Parvocellular-Magnocellular%20Interconnection%20%28PMI%29%20Block%20fac {"title": "Dissociating Direct Access from Inference in AI Introspection", "author": "Harvey Lederman and Kyle Mahowald", "abstract": "Introspection is a foundational cognitive ability, but its mechanism is not well understood. Recent work has shown that AI models can introspect. We study their mechanism of introspection, first extensively replicating Lindsey et al. (2025)'s thought injection detection paradigm in large open-source models. We show that these models detect injected representations via two separable mechanisms: (i) probability-matching (inferring from perceived anomaly of the prompt) and (ii) direct access to internal states. The direct access mechanism is content-agnostic: models detect that an anomaly occurred but cannot reliably identify its semantic content. The two model classes we study confabulate injected concepts that are high-frequency and concrete (e.g., \"apple'\"); for them correct concept guesses typically require significantly more tokens. This content-agnostic introspective mechanism is consistent with leading theories in philosophy and psychology.", "link": "http://arxiv.org/abs/2603.05414v1", "date": "2026-03-05", "relevancy": 2.2775, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4608}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4608}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4448}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dissociating%20Direct%20Access%20from%20Inference%20in%20AI%20Introspection&body=Title%3A%20Dissociating%20Direct%20Access%20from%20Inference%20in%20AI%20Introspection%0AAuthor%3A%20Harvey%20Lederman%20and%20Kyle%20Mahowald%0AAbstract%3A%20Introspection%20is%20a%20foundational%20cognitive%20ability%2C%20but%20its%20mechanism%20is%20not%20well%20understood.%20Recent%20work%20has%20shown%20that%20AI%20models%20can%20introspect.%20We%20study%20their%20mechanism%20of%20introspection%2C%20first%20extensively%20replicating%20Lindsey%20et%20al.%20%282025%29%27s%20thought%20injection%20detection%20paradigm%20in%20large%20open-source%20models.%20We%20show%20that%20these%20models%20detect%20injected%20representations%20via%20two%20separable%20mechanisms%3A%20%28i%29%20probability-matching%20%28inferring%20from%20perceived%20anomaly%20of%20the%20prompt%29%20and%20%28ii%29%20direct%20access%20to%20internal%20states.%20The%20direct%20access%20mechanism%20is%20content-agnostic%3A%20models%20detect%20that%20an%20anomaly%20occurred%20but%20cannot%20reliably%20identify%20its%20semantic%20content.%20The%20two%20model%20classes%20we%20study%20confabulate%20injected%20concepts%20that%20are%20high-frequency%20and%20concrete%20%28e.g.%2C%20%22apple%27%22%29%3B%20for%20them%20correct%20concept%20guesses%20typically%20require%20significantly%20more%20tokens.%20This%20content-agnostic%20introspective%20mechanism%20is%20consistent%20with%20leading%20theories%20in%20philosophy%20and%20psychology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05414v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDissociating%2520Direct%2520Access%2520from%2520Inference%2520in%2520AI%2520Introspection%26entry.906535625%3DHarvey%2520Lederman%2520and%2520Kyle%2520Mahowald%26entry.1292438233%3DIntrospection%2520is%2520a%2520foundational%2520cognitive%2520ability%252C%2520but%2520its%2520mechanism%2520is%2520not%2520well%2520understood.%2520Recent%2520work%2520has%2520shown%2520that%2520AI%2520models%2520can%2520introspect.%2520We%2520study%2520their%2520mechani {"title": "SPIRIT: Perceptive Shared Autonomy for Robust Robotic Manipulation under Deep Learning Uncertainty", "author": "Jongseok Lee and Ribin Balachandran and Harsimran Singh and Jianxiang Feng and Hrishik Mishra and Marco De Stefano and Rudolph Triebel and Alin Albu-Schaeffer and Konstantin Kondak", "abstract": "Deep learning (DL) has enabled impressive advances in robotic perception, yet its limited robustness and lack of interpretability hinder reliable deployment in safety critical applications. We propose a concept termed perceptive shared autonomy, in which uncertainty estimates from DL based perception are used to regulate the level of autonomy. Specifically, when the robot's perception is confident, semi-autonomous manipulation is enabled to improve performance; when uncertainty increases, control transitions to haptic teleoperation for maintaining robustness. In this way, high-performing but uninterpretable DL methods can be integrated safely into robotic systems. A key technical enabler is an uncertainty aware DL based point cloud registration approach based on the so called Neural Tangent Kernels (NTK). We evaluate perceptive shared autonomy on challenging aerial manipulation tasks through a user study of 15 participants and realization of mock-up industrial scenarios, demonstrating reliable robotic manipulation despite failures in DL based perception. The resulting system, named SPIRIT, improves both manipulation performance and system reliability. SPIRIT was selected as a finalist of a major industrial innovation award.", "link": "http://arxiv.org/abs/2603.05111v1", "date": "2026-03-05", "relevancy": 2.2674, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5825}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5686}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPIRIT%3A%20Perceptive%20Shared%20Autonomy%20for%20Robust%20Robotic%20Manipulation%20under%20Deep%20Learning%20Uncertainty&body=Title%3A%20SPIRIT%3A%20Perceptive%20Shared%20Autonomy%20for%20Robust%20Robotic%20Manipulation%20under%20Deep%20Learning%20Uncertainty%0AAuthor%3A%20Jongseok%20Lee%20and%20Ribin%20Balachandran%20and%20Harsimran%20Singh%20and%20Jianxiang%20Feng%20and%20Hrishik%20Mishra%20and%20Marco%20De%20Stefano%20and%20Rudolph%20Triebel%20and%20Alin%20Albu-Schaeffer%20and%20Konstantin%20Kondak%0AAbstract%3A%20Deep%20learning%20%28DL%29%20has%20enabled%20impressive%20advances%20in%20robotic%20perception%2C%20yet%20its%20limited%20robustness%20and%20lack%20of%20interpretability%20hinder%20reliable%20deployment%20in%20safety%20critical%20applications.%20We%20propose%20a%20concept%20termed%20perceptive%20shared%20autonomy%2C%20in%20which%20uncertainty%20estimates%20from%20DL%20based%20perception%20are%20used%20to%20regulate%20the%20level%20of%20autonomy.%20Specifically%2C%20when%20the%20robot%27s%20perception%20is%20confident%2C%20semi-autonomous%20manipulation%20is%20enabled%20to%20improve%20performance%3B%20when%20uncertainty%20increases%2C%20control%20transitions%20to%20haptic%20teleoperation%20for%20maintaining%20robustness.%20In%20this%20way%2C%20high-performing%20but%20uninterpretable%20DL%20methods%20can%20be%20integrated%20safely%20into%20robotic%20systems.%20A%20key%20technical%20enabler%20is%20an%20uncertainty%20aware%20DL%20based%20point%20cloud%20registration%20approach%20based%20on%20the%20so%20called%20Neural%20Tangent%20Kernels%20%28NTK%29.%20We%20evaluate%20perceptive%20shared%20autonomy%20on%20challenging%20aerial%20manipulation%20tasks%20through%20a%20user%20study%20of%2015%20par {"title": "Diffusion-Based Impedance Learning for Contact-Rich Manipulation Tasks", "author": "Noah Geiger and Tamim Asfour and Neville Hogan and Johannes Lachner", "abstract": "Learning-based methods excel at robot motion generation but remain limited in contact-rich physical interaction. Impedance control provides stable and safe contact behavior but requires task-specific tuning of stiffness and damping parameters. We present Diffusion-Based Impedance Learning, a framework that bridges these paradigms by combining generative modeling with energy-consistent impedance control. A Transformer-based Diffusion Model, conditioned via cross-attention on measured external wrenches, reconstructs simulated Zero-Force Trajectories (sZFTs) that represent contact-consistent equilibrium behavior. A SLERP-based quaternion noise scheduler preserves geometric consistency for rotations on the unit sphere. The reconstructed sZFT is used by an energy-based estimator to adapt impedance online through directional stiffness and damping modulation. Trained on parkour and robot-assisted therapy demonstrations collected via Apple Vision Pro teleoperation, the model achieves sub-millimeter positional and sub-degree rotational accuracy using only tens of thousands of samples. Deployed in realtime torque control on a KUKA LBR iiwa, the approach enables smooth obstacle traversal and generalizes to unseen tasks, achieving 100% success in multi-geometry peg-in-hole insertion.", "link": "http://arxiv.org/abs/2509.19696v3", "date": "2026-03-05", "relevancy": 2.2576, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5662}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5648}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5589}], "ma {"title": "DriverGaze360: OmniDirectional Driver Attention with Object-Level Guidance", "author": "Shreedhar Govil and Didier Stricker and Jason Rambach", "abstract": "Predicting driver attention is a critical problem for developing explainable autonomous driving systems and understanding driver behavior in mixed human-autonomous vehicle traffic scenarios. Although significant progress has been made through large-scale driver attention datasets and deep learning architectures, existing works are constrained by narrow frontal field-of-view and limited driving diversity. Consequently, they fail to capture the full spatial context of driving environments, especially during lane changes, turns, and interactions involving peripheral objects such as pedestrians or cyclists. In this paper, we introduce DriverGaze360, a large-scale 360$^\\circ$ field of view driver attention dataset, containing $\\sim$1 million gaze-labeled frames collected from 19 human drivers, enabling comprehensive omnidirectional modeling of driver gaze behavior. Moreover, our panoramic attention prediction approach, DriverGaze360-Net, jointly learns attention maps and attended objects by employing an auxiliary semantic segmentation head. This improves spatial awareness and attention prediction across wide panoramic inputs. Extensive experiments demonstrate that DriverGaze360-Net achieves state-of-the-art attention prediction performance on multiple metrics on panoramic driving images. Dataset and method available at https://dfki-av.github.io/drivergaze360.", "link": "http://arxiv.org/abs/2512.14266v3", "date": "2026-03-05", "relevancy": 2.2534, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5683}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5658}, {"title": "Egocentric Computer V nstrate%20that%20DriverGaze360-Net%20achieves%20state-of-the-art%20attention%20prediction%20performance%20on%20multiple%20metrics%20on%20panoramic%20driving%20images.%20Dataset%20and%20method%20available%20at%20https%3A//dfki-av.github.io/drivergaze360.%0ALink%3A%20http%3A//arxiv.org/abs/2512.14266v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDriverGaze360%253A%2520OmniDirectional%2520Driver%2520Attention%2520with%2520Object-Level%2520Guidance%26entry.906535625%3DShreedhar%2520Govil%2520and%2520Didier%2520Stricker%2520and%2520Jason%2520Rambach%26entry.1292438233%3DPredicting%2520driver%2520attention%2520is%2520a%2520critical%2520problem%2520for%2520developing%2520explainable%2520autonomous%2520driving%2520systems%2520and%2520understanding%2520driver%2520behavior%2520in%2520mixed%2520human-autonomous%2520vehicle%2520traffic%2520scenarios.%2520Although%2520significant%2520progress%2520has%2520been%2520made%2520through%2520large-scale%2520driver%2520attention%2520datasets%2520and%2520deep%2520learning%2520architectures%252C%2520existing%2520works%2520are%2520constrained%2520by%2520narrow%2520frontal%2520field-of-view%2520and%2520limited%2520driving%2520diversity.%2520Consequently%252C%2520they%2520fail%2520to%2520capture%2520the%2520full%2520spatial%2520context%2520of%2520driving%2520environments%252C%2520especially%2520during%2520lane%2520changes%252C%2520turns%252C%2520and%2520interactions%2520involving%2520peripheral%2520objects%2520such%2520as%2520pedestrians%2520or%2520cyclists.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520DriverGaze360%252C%2520a%2520large-scale%2520360%2524%255E%255Ccirc%2524%2520field%2520of%2520view%2520driver%2520attention%2520dataset%252C%2520containing%2520%2524%255Csim%25241%2520million%2520gaze-labeled%2520frames%2520collected%2520from%252019%2520human%2520drivers%252C%2520enabling%2520comprehensive%2520omnidirectional%2520modeling%2520o {"title": "UniPAR: A Unified Framework for Pedestrian Attribute Recognition", "author": "Minghe Xu and Rouying Wu and Jiarui Xu and Minhao Sun and Zikang Yan and Xiao Wang and ChiaWei Chu and Yu Li", "abstract": "Pedestrian Attribute Recognition is a foundational computer vision task that provides essential support for downstream applications, including person retrieval in video surveillance and intelligent retail analytics. However, existing research is frequently constrained by the ``one-model-per-dataset\" paradigm and struggles to handle significant discrepancies across domains in terms of modalities, attribute definitions, and environmental scenarios. To address these challenges, we propose UniPAR, a unified Transformer-based framework for PAR. By incorporating a unified data scheduling strategy and a dynamic classification head, UniPAR enables a single model to simultaneously process diverse datasets from heterogeneous modalities, including RGB images, video sequences, and event streams. We also introduce an innovative phased fusion encoder that explicitly aligns visual features with textual attribute queries through a late deep fusion strategy. Experimental results on the widely used benchmark datasets, including MSP60K, DukeMTMC, and EventPAR, demonstrate that UniPAR achieves performance comparable to specialized SOTA methods. Furthermore, multi-dataset joint training significantly enhances the model's cross-domain generalization and recognition robustness in extreme environments characterized by low light and motion blur. The source code of this paper will be released on https://github.com/Event-AHU/OpenPAR", "link": "http://arxiv.org/abs/2603.05114v1", "date": "2026-03-05", "relevancy": 2.2497, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5789}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5789}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5394}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniPAR%3A%20A%20Unified%20Framework%20for%20Pedestrian%20Attribute%20Recognition&body=Title%3A%20UniPAR%3A%20A%20Unified%20Framework%20for%20Pedestrian%20Attribute%20Recognition%0AAuthor%3A%20Minghe%20Xu%20and%20Rouying%20Wu%20and%20Jiarui%20Xu%20and%20Minhao%20Sun%20and%20Zikang%20Yan%20and%20Xiao%20Wang%20and%20ChiaWei%20Chu%20and%20Yu%20Li%0AAbstract%3A%20Pedestrian%20Attribute%20Recognition%20is%20a%20foundational%20computer%20vision%20task%20that%20provides%20essential%20support%20for%20downstream%20applications%2C%20including%20person%20retrieval%20in%20video%20surveillance%20and%20intelligent%20retail%20analytics.%20However%2C%20existing%20research%20is%20frequently%20constrained%20by%20the%20%60%60one-model-per-dataset%22%20paradigm%20and%20struggles%20to%20handle%20significant%20discrepancies%20across%20domains%20in%20terms%20of%20modalities%2C%20attribute%20definitions%2C%20and%20environmental%20scenarios.%20To%20address%20these%20challenges%2C%20we%20propose%20UniPAR%2C%20a%20unified%20Transformer-based%20framework%20for%20PAR.%20By%20incorporating%20a%20unified%20data%20scheduling%20strategy%20and%20a%20dynamic%20classification%20head%2C%20UniPAR%20enables%20a%20single%20model%20to%20simultaneously%20process%20diverse%20datasets%20from%20heterogeneous%20modalities%2C%20including%20RGB%20images%2C%20video%20sequences%2C%20and%20event%20streams.%20We%20also%20introduce%20an%20innovative%20phased%20fusion%20encoder%20that%20explicitly%20aligns%20visual%20features%20with%20textual%20attribute%20queries%20through%20a%20late%20deep%20fusion%20strategy.%20Experimental%20results%20on%20the%20widely%20used%20benchmark%20datasets%2C%20including%20MSP60K%2C%20DukeMTMC%2C%20and%20EventPAR%2C%20demonstrate%20that%20UniPAR%20achieves%20performance%20comparable%20to%20specialized%20SOTA%20methods.%20Furthermore%2C%20multi-dataset%20joint%20training%20significantly%20enhances%20the%20model%27s%20cross-domain%20generalization%20and%20recognition%20robustness%20in%20extreme%20environments%20characterized%20by%20low%20light%20and%20motion%20blur.%20The%20source%20code%20of%20this%20paper%20will%20be%20released%20on%20https%3A//github.com/Event-AHU/OpenPAR%0ALink%3A%20http%3A//arxiv.org/abs/2603.05114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniPAR%253A%2520A%2520Unified%2520Framework%2520for%2520Pedestrian%2520Attribute%2520Recognition%26entry.906535625%3DMinghe%2520Xu%2520and%2520Rouying%2520Wu%2520and%2520Jiarui%2520Xu%2520and%2520Minhao%2520Sun%2520and%2520Zikang%2520Yan%2520and%2520Xiao%2520Wang%2520and%2520ChiaWei%2520Chu%2520and%2520Yu%2520Li%26entry.1292438233%3DPedestrian%2520Attribute%2520Recognition%2520is%2520a%2520foundational%2520computer%2520vision%2520task%2520that%2520provides%2520essential%2520support%2520for%2520downstream%2520applications%252C%2520including%2520person%2520retrieval%2520in%2520video%2520surveillance%2520and%2520intelligent%2520retail%2520analytics.%2520However%252C%2520existing%2520research%2520is%2520frequently%2520constrained%2520by%2520the%2520%2560%2560one-model-per-dataset%2522%2520paradigm%2520and%2520struggles%2520to%2520handle%2520significant%2520discrepancies%2520across%2520domains%2520in%2520terms%2520of%2520modalities%252C%2520attribute%2520definitions%252C%2520and%2520environmental%2520scenarios.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520UniPAR%252C%2520a%2520unified%2520Transformer-based%2520framework%2520for%2520PAR.%2520By%2520incorporating%2520a%2520unified%2520data%2520scheduling%2520strategy%2520and%2520a%2520dynamic%2520classificat {"title": "Quadrotor Navigation using Reinforcement Learning with Privileged Information", "author": "Jonathan Lee and Abhishek Rathod and Kshitij Goel and John Stecklein and Wennie Tabib", "abstract": "This paper presents a reinforcement learning-based quadrotor navigation method that leverages efficient differentiable simulation, novel loss functions, and privileged information to navigate around large obstacles. Prior learning-based methods perform well in scenes that exhibit narrow obstacles, but struggle when the goal location is blocked by large walls or terrain. In contrast, the proposed method utilizes time-of-arrival (ToA) maps as privileged information and a yaw alignment loss to guide the robot around large obstacles. The policy is evaluated in photo-realistic simulation environments containing large obstacles, sharp corners, and dead-ends. Our approach achieves an 86% success rate and outperforms baseline strategies by 34%. We deploy the policy onboard a custom quadrotor in outdoor cluttered environments both during the day and night. The policy is validated across 20 flights, covering 589 meters without collisions at speeds up to 4 m/s.", "link": "http://arxiv.org/abs/2509.08177v2", "date": "2026-03-05", "relevancy": 2.2485, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5882}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5438}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5433}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Quadrotor%20Navigation%20using%20Reinforcement%20Learning%20with%20Privileged%20Information&body=Title%3A%20Quadrotor%20Navigat

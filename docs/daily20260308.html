ing%20results%20due%20to%20its%20generalizability%20to%20downstream%20tasks.%20Current%20works%20indicate%20CLIP%27s%20text%20encoder%20is%20more%20suitable%20for%20cross-domain%20tasks%2C%20however%2C%20we%20find%20that%20%5Ctextbf%7Bremoving%20certain%20middle%20layers%20of%20the%20text%20encoder%20can%20effectively%20improve%20performance%20in%20SF-CDFSL%7D%2C%20which%20we%20call%20the%20Lost%20Layers.%20In%20this%20paper%2C%20we%20delve%20into%20this%20phenomenon%20for%20a%20deeper%20understanding.%20We%20discover%20that%20instead%20of%20being%20harmful%20for%20the%20SF-CDFSL%20task%2C%20the%20information%20in%20these%20layers%20is%20actually%20beneficial%2C%20but%20visual%20gaps%20prevent%20this%20useful%20information%20from%20being%20fully%20utilized%2C%20making%20these%20layers%20seem%20redundant.%20Based%20on%20this%20understanding%2C%20unlike%20current%20works%20that%20simply%20remove%20these%20layers%2C%20we%20propose%20a%20method%20to%20teachs%20the%20model%20to%20%5Ctextbf%7Bre-utilize%7D%20information%20in%20these%20lost%20layers%20at%20both%20the%20layer%20and%20encoder%20levels%2C%20guiding%20the%20re-learning%20of%20the%20visual%20branch%20under%20domain%20shifts.%20Our%20approach%20effectively%20addresses%20the%20issue%20of%20underutilized%20information%20in%20the%20text%20encoder.%20Extensive%20experiments%20across%20various%20settings%2C%20backbones%20%28CLIP%2C%20SigLip%2C%20PE-Core%29%2C%20and%20tasks%20%284%20CDFSL%20datasets%20and%2010%20Meta-dataset%20datasets%29%20demonstrate%20the%20effectiveness%20of%20our%20method.%20Code%20is%20available%20at%20https%3A//github.com/zhenyuZ-HUST/CVPR26-VtT.&entry.1838667208=http%3A//arxiv.org/abs/2603.05235v1&entry.124074799=Read"},
{"title": "Noise2Ghost: Self-supervised deep convolutional reconstruction for ghost imaging", "author": "Mathieu Manni and Dmitry Karpov and K. Joost Batenburg and Sharon Shwartz and Nicola Vigan\u00f2", "abstract": "We present a new self-supervised deep-learning-based Ghost Imaging (GI) reconstruction method, which provides unparalleled reconstruction quality for noisy acquisitions among unsupervised methods. We present the supporting mathematical framework and results from theoretical and real data use cases. Self-supervision removes the need for clean reference data while offering strong noise reduction. This provides the necessary tools for addressing signal-to-noise ratio concerns for GI acquisitions in emerging and cutting-edge low-light GI scenarios. Notable examples include micro- and nano-scale x-ray emission imaging, e.g., x-ray fluorescence imaging of dose-sensitive samples. Their applications include in-vivo and in-operando case studies for biological samples and batteries.", "link": "http://arxiv.org/abs/2504.10288v3", "date": "2026-03-05", "relevancy": 2.7007, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5462}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5378}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5364}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Noise2Ghost%3A%20Self-supervised%20deep%20convolutional%20reconstruction%20for%20ghost%20imaging&body=Title%3A%20Noise2Ghost%3A%20Self-supervised%20deep%20convolutional%20reconstruction%20for%20ghost%20imaging%0AAuthor%3A%20Mathieu%20Manni%20and%20Dmitry%20Karpov%20and%20K.%20Joost%20Batenburg%20and%20Sharon%20Shwartz%20and%20Nicola%20Vigan%C3%B2%0AAbstra {"title": "Preserving Continuous Symmetry in Discrete Spaces: Geometric-Aware Quantization for SO(3)-Equivariant GNNs", "author": "Haoyu Zhou and Ping Xue and Hao Zhang and Tianfan Fu", "abstract": "Equivariant Graph Neural Networks (GNNs) are essential for physically consistent molecular simulations but suffer from high computational costs and memory bottlenecks, especially with high-order representations. While low-bit quantization offers a solution, applying it naively to rotation-sensitive features destroys the SO(3)-equivariant structure, leading to significant errors and violations of conservation laws. To address this issue, in this work, we propose a Geometric-Aware Quantization (GAQ) framework that compresses and accelerates equivariant models while rigorously preserving continuous symmetry in discrete spaces. Our approach introduces three key contributions: (1) a Magnitude-Direction Decoupled Quantization (MDDQ) scheme that separates invariant lengths from equivariant orientations to maintain geometric fidelity; (2) a symmetry-aware training strategy that treats scalar and vector features with distinct quantization schedules; and (3) a robust attention normalization mechanism to stabilize gradients in low-bit regimes. Experiments on the rMD17 benchmark demonstrate that our W4A8 models match the accuracy of FP32 baselines (9.31 meV vs. 23.20 meV) while reducing Local Equivariance Error (LEE) by over 30x compared to naive quantization. On consumer hardware, GAQ achieves 2.39x inference speedup and 4x memory reduction, enabling stable, energy-conserving molecular dynamics simulations for nanosecond timescales.", "link": "http://arxiv.org/abs/2603.05343v1", "date": "2026-03-05", "relevancy": 2.6738, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.56}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5239}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5204}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Preserving%20Continuous%20Symmetry%20in%20Discrete%20Spaces%3A%20Geometric-Aware%20Quantization%20for%20SO%283%29-Equivariant%20GNNs&body=Title%3A%20Preserving%20Continuous%20Symmetry%20in%20Discrete%20Spaces%3A%20Geometric-Aware%20Quantization%20for%20SO%283%29-Equivariant%20GNNs%0AAuthor%3A%20Haoyu%20Zhou%20and%20Ping%20Xue%20and%20Hao%20Zhang%20and%20Tianfan%20Fu%0AAbstract%3A%20Equivariant%20Graph%20Neural%20Networks%20%28GNNs%29%20are%20essential%20for%20physically%20consistent%20molecular%20simulations%20but%20suffer%20from%20high%20computational%20costs%20and%20memory%20bottlenecks%2C%20especially%20with%20high-order%20representations.%20While%20low-bit%20quantization%20offers%20a%20solution%2C%20applying%20it%20naively%20to%20rotation-sensitive%20features%20destroys%20the%20SO%283%29-equivariant%20structure%2C%20leading%20to%20significant%20errors%20and%20violations%20of%20conservation%20laws.%20To%20address%20this%20issue%2C%20in%20this%20work%2C%20we%20propose%20a%20Geometric-Aware%20Quantization%20%28GAQ%29%20framework%20that%20compresses%20and%20accelerates%20equivariant%20models%20while%20rigorously%20preserving%20continuous%20symmetry%20in%20discrete%20spaces.%20Our%20approach%20introduces%20three%20key%20contributions%3A%20%281%29%20a%20Magnitude-Direction%20Decoupled%20Quantization%20%28MDDQ%29%20scheme%20that%20separates%20invariant%20lengths%20from%20equivariant%20orientations%20to%20maintain%20geometric%20fidelity%3B%20%282%29%20a%20symmetry-aware%20training%20strategy%20that%20treats%20scalar%20and%20vector%20features%20with%20distinct%20quantization%20schedules%3B%20and%20%283%29%20a%20robust%20attention%20normalization%20mechanism%20to%20stabilize%20gradients%20in%20low-bit%20regimes.%20Experiments%20on%20the%20rMD17%20benchmark%20demonstrate%20that%20our%20W4A8%20models%20match%20the%20accuracy%20of%20FP32%20baselines%20%289.31%20meV%20vs.%2023.20%20meV%29%20while%20reducing%20Local%20Equivariance%20Error%20%28LEE%29%20by%20over%2030x%20compared%20to%20naive%20quantization.%20On%20consumer%20hardware%2C%20GAQ%20achieves%202.39x%20inference%20speedup%20and%204x%20memory%20reduction%2C%20enabling%20stable%2C%20energy-conserving%20molecular%20dynamics%20simulations%20for%20nanosecond%20timescales.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05343v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPreserving%2520Continuous%2520Symmetry%2520in%2520Discrete%2520Spaces%253A%2520Geometric-Aware%2520Quantization%2520for%2520SO%25283%2529-Equivariant%2520GNNs%26entry.906535625%3DHaoyu%2520Zhou%2520and%2520Ping%2520Xue%2520and%2520Hao%2520Zhang%2520and%2520Tianfan%2520Fu%26entry.1292438233%3DEquivariant%2520Graph%2520Neural%2520Networks%2520%2528GNNs%2529%2520are%2520essential%2520for%2520physically%2520consistent%2520molecular%2520simulations%2520but%2520suffer%2520from%2520high%2520computational%2520costs%2520and%2520memory%2520bottlenecks%252C%2520especially%2520with%2520high-order%2520representations.%2520While%2520low-bit%2520quantization%2520offers%2520a%2520solution%252C%2520applying%2520it%2520naively%2520to%2520rotation-sensitive%2520features%2520destroys%2520the%2520SO%25283%2529-equivariant%2520structure%252C%2520leading%2520to%2520significant%2520errors%2520and%2520violations%2520of%2520conservation%2520laws.%2520To%2520address%2520this%2520issue%252C%2520in%2520this%2520work%252C%2520we%2520propose%2520a%2520Geometric-Aware%2520Quantization%2520%2528GAQ%2529%2520framework%2520that%2520compresses%2520and%2520accelerates%2520equivariant%2520models%2520while%2520rigorously%2520preserving%2520continuous%2520symmetry%2520in%2520discrete%2520spaces.%2520Our%2520approach%2520 ions.%20While%20low-bit%20quantization%20offers%20a%20solution%2C%20applying%20it%20naively%20to%20rotation-sensitive%20features%20destroys%20the%20SO%283%29-equivariant%20structure%2C%20leading%20to%20significant%20errors%20and%20violations%20of%20conservation%20laws.%20To%20address%20this%20issue%2C%20in%20this%20work%2C%20we%20propose%20a%20Geometric-Aware%20Quantization%20%28GAQ%29%20framework%20that%20compresses%20and%20accelerates%20equivariant%20models%20while%20rigorously%20preserving%20continuous%20symmetry%20in%20discrete%20spaces.%20Our%20approach%20introduces%20three%20key%20contributions%3A%20%281%29%20a%20Magnitude-Direction%20Decoupled%20Quantization%20%28MDDQ%29%20scheme%20that%20separates%20invariant%20lengths%20from%20equivariant%20orientations%20to%20maintain%20geometric%20fidelity%3B%20%282%29%20a%20symmetry-aware%20training%20strategy%20that%20treats%20scalar%20and%20vector%20features%20with%20distinct%20quantization%20schedules%3B%20and%20%283%29%20a%20robust%20attention%20normalization%20mechanism%20to%20stabilize%20gradients%20in%20low-bit%20regimes.%20Experiments%20on%20the%20rMD17%20benchmark%20demonstrate%20that%20our%20W4A8%20models%20match%20the%20accuracy%20of%20FP32%20baselines%20%289.31%20meV%20vs.%2023.20%20meV%29%20while%20reducing%20Local%20Equivariance%20Error%20%28LEE%29%20by%20over%2030x%20compared%20to%20naive%20quantization.%20On%20consumer%20hardware%2C%20GAQ%20achieves%202.39x%20inference%20speedup%20and%204x%20memory%20reduction%2C%20enabling%20stable%2C%20energy-conserving%20molecular%20dynamics%20simulations%20for%20nanosecond%20timescales.&entry.1838667208=http%3A//arxiv.org/abs/2603.05343v1&entry.124074799=Read"},
{"title": "GEM-TFL: Bridging Weak and Full Supervision for Forgery Localization through EM-Guided Decomposition and Temporal Refinement", "author": "Xiaodong Zhu and Yuanming Zheng and Suting Wang and Junqi Yang and Yuhong Yang and Weiping Tu and Zhongyuan Wang", "abstract": "Temporal Forgery Localization (TFL) aims to precisely identify manipulated segments within videos or audio streams, providing interpretable evidence for multimedia forensics and security. While most existing TFL methods rely on dense frame-level labels in a fully supervised manner, Weakly Supervised TFL (WS-TFL) reduces labeling cost by learning only from binary video-level labels. However, current WS-TFL approaches suffer from mismatched training and inference objectives, limited supervision from binary labels, gradient blockage caused by non-differentiable top-k aggregation, and the absence of explicit modeling of inter-proposal relationships. To address these issues, we propose GEM-TFL (Graph-based EM-powered Temporal Forgery Localization), a two-phase classification-regression framework that effectively bridges the supervision gap between training and inference. Built upon this foundation, (1) we enhance weak supervision by reformulating binary labels into multi-dimensional latent attributes through an EM-based optimization process; (2) we introduce a training-free temporal consistency refinement that realigns frame-level predictions for smoother temporal dynamics; and (3) we design a graph-based proposal refinement module that models temporal-semantic relationships among proposals for globally consistent confidence estimation. Extensive experiments on benchmark datasets demonstrate that GEM-TFL achieves more accurate and robust temporal forgery localization, substantially narrowing the gap with fully supervised methods.", "link": "http://arxiv.org/abs/2603.05095v1", "date": "2026-03-05", "relevancy": 2.6678, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.544}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5288}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5279}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GEM-TFL%3A%20Bridging%20Weak%20and%20Full%20Supervision%20for%20Forgery%20Localization%20through%20EM-Guided%20Decomposition%20and%20Temporal%20Refinement&body=Title%3A%20GEM-TFL%3A%20Bridging%20Weak%20and%20Full%20Supervision%20for%20Forgery%20Localization%20through%20EM-Guided%20Decomposition%20and%20Temporal%20Refinement%0AAuthor%3A%20Xiaodong%20Zhu%20and%20Yuanming%20Zheng%20and%20Suting%20Wang%20and%20Junqi%20Yang%20and%20Yuhong%20Yang%20and%20Weiping%20Tu%20and%20Zhongyuan%20Wang%0AAbstract%3A%20Temporal%20Forgery%20Localization%20%28TFL%29%20aims%20to%20precisely%20identify%20manipulated%20segments%20within%20videos%20or%20audio%20streams%2C%20providing%20interpretable%20evidence%20for%20multimedia%20forensics%20and%20security.%20While%20most%20existing%20TFL%20methods%20rely%20on%20dense%20frame-level%20labels%20in%20a%20fully%20supervised%20manner%2C%20Weakly%20Supervised%20TFL%20%28WS-TFL%29%20reduces%20labeling%20cost%20by%20learning%20only%20from%20binary%20video-level%20labels.%20However%2C%20current%20WS-TFL%20approaches%20suffer%20from%20mismatched%20training%20and%20inference%20objectives%2C%20limited%20supervision%20from%20binary%20labels%2C%20gradient%20blockage%20caused%20by%20non-differentiable%20top-k%20aggregation%2C%20and%20the%20absence%20of%20explicit%20modeling%20of%20inter-proposal%20relationships.%20To%20address%20these%20issues%2C%20we%20propose%20GEM-TFL%20%28Graph-based%20EM-powered%20Temporal%20Forgery%20Localization%29%2C%20a%20two-phase%20classification-regression%20framework%20that%20effectively%20bridges%20the%20supervision%20gap%20between%20training%20and%20inference.%20Built%20upon%20this%20foundation%2C%20%281%29%20we%20enhance%20weak%20supervision%20by%20reformulating%20binary%20labels%20into%20multi-dimensional%20latent%20attributes%20through%20an%20EM-based%20optimization%20process%3B%20%282%29%20we%20introduce%20a%20training-free%20temporal%20consistency%20refinement%20that%20realigns%20frame-level%20predictions%20for%20smoother%20temporal%20dynamics%3B%20and%20%283%29%20we%20design%20a%20graph-based%20proposal%20refinement%20module%20that%20models%20temporal-semantic%20relationships%20among%20proposals%20for%20globally%20consistent%20confidence%20estimation.%20Extensive%20experiments%20on%20benchmark%20datasets%20demonstrate%20that%20GEM-TFL%20achieves%20more%20accurate%20and%20robust%20temporal%20forgery%20localization%2C%20substantially%20narrowing%20the%20gap%20with%20fully%20supervised%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05095v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGEM-TFL%253A%2520Bridging%2520Weak%2520and%2520Full%2520Supervision%2520for%2520Forgery%2520Localization%2520through%2520EM-Guided%2520Decomposition%2520and%2520Temporal%2520Refinement%26entry.906535625%3DXiaodong%2520Zhu%2520and%2520Yuanming%2520Zheng%2520and%2520Suting%2520Wang%2520and%2520Junqi%2520Yang%2520and%2520Yuhong%2520Yang%2520and%2520Weiping%2520Tu%2520and%2520Zhongyuan%2520Wang%26entry.1292438233%3DTemporal%2520Forgery%2520Localization%2520%2528TFL%2529%2520aims%2520to%2520precisely%2520identify%2520manipulated%2520segments%2520within%2520videos%2520or%2520audio%2520streams%252C%2520providing%2520interpretable%2520evidence%2520for%2520multimedia%2520forensics%2520and%2520security.%2520While%2520most%2520existing%2520TFL%2520methods%2520rely%2520on%2520dense%2520frame-level%2520labels%2520in%2520a%2520fu {"title": "The Trilingual Triad Framework: Integrating Design, AI, and Domain Knowledge in No-code AI Smart City Course", "author": "Qian Huang and King Wang Poon", "abstract": "This paper introduces the \"Trilingual Triad\" framework, a model that explains how students learn to design with generative artificial intelligence (AI) through the integration of Design, AI, and Domain Knowledge. As generative AI rapidly enters higher education, students often engage with these systems as passive users of generated outputs rather than active creators of AI-enabled knowledge tools. This study investigates how students can transition from using AI as a tool to designing AI as a collaborative teammate. The research examines a graduate course, Creating the Frontier of No-code Smart Cities at the Singapore University of Technology and Design (SUTD), in which students developed domain-specific custom GPT systems without coding. Using a qualitative multi-case study approach, three projects - the Interview Companion GPT, the Urban Observer GPT, and Buddy Buddy - were analyzed across three dimensions: design, AI architecture, and domain expertise. The findings show that effective human-AI collaboration emerges when these three \"languages\" are orchestrated together: domain knowledge structures the AI's logic, design mediates human-AI interaction, and AI extends learners' cognitive capacity. The Trilingual Triad framework highlights how building AI systems can serve as a constructionist learning process that strengthens AI literacy, metacognition, and learner agency.", "link": "http://arxiv.org/abs/2603.05036v1", "date": "2026-03-05", "relevancy": 2.6623, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5506}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5367}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5101}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Trilingual%20Triad%20Framework%3A%20Integrating%20Design%2C%20AI%2C%20and%20Domain%20Knowledge%20in%20No-code%20AI%20Smart%20City%20Course&body=Title%3A%20The%20Trilingual%20Triad%20Framework%3A%20Integrating%20Design%2C%20AI%2C%20and%20Domain%20Knowledge%20in%20No-code%20AI%20Smart%20City%20Course%0AAuthor%3A%20Qian%20Huang%20and%20King%20Wang%20Poon%0AAbstract%3A%20This%20paper%20introduces%20the%20%22Trilingual%20Triad%22%20framework%2C%20a%20model%20that%20explains%20how%20students%20learn%20to%20design%20with%20generative%20artificial%20intelligence%20%28AI%29%20through%20the%20integration%20of%20Design%2C%20AI%2C%20and%20Domain%20Knowledge.%20As%20generative%20AI%20rapidly%20enters%20higher%20education%2C%20students%20often%20engage%20with%20these%20systems%20as%20passive%20users%20of%20generated%20outputs%20rather%20than%20active%20creators%20of%20AI-enabled%20knowledge%20tools.%20This%20study%20investigates%20how%20students%20can%20transition%20from%20using%20AI%20as%20a%20tool%20to%20designing%20AI%20as%20a%20collaborative%20teammate.%20The%20research%20examines%20a%20graduate%20course%2C%20Creating%20the%20Frontier%20of%20No-code%20Smart%20Cities%20at%20the%20Singapore%20University%20of%20Technology%20and%20Design%20%28SUTD%29%2C%20in%20which%20students%20developed%20domain-specific%20custom%20GPT%20systems%20without%20coding.%20Using%20a%20qualitative%20multi-case%20study%20approach%2C%20three%20projects%20-%20the%20Interview%20Companion%20GPT%2C%20the%20Urban%20Observer%20GPT%2C%20and%20Buddy%20Buddy%20-%20were%20analyzed%20across%20three%20dimensions%3A%20design%2C%20AI%20architecture%2C%20and%20domain%20expertise.%20The%20findings%20show%20that%20effective%20human-AI%20collaboration%20emerges%20when%20these%20three%20%22languages%22%20are%20orchestrated%20together%3A%20do {"title": "SAIL: Similarity-Aware Guidance and Inter-Caption Augmentation-based Learning for Weakly-Supervised Dense Video Captioning", "author": "Ye-Chan Kim and SeungJu Cha and Si-Woo Kim and Minju Jeon and Hyungee Kim and Dong-Jin Kim", "abstract": "Weakly-Supervised Dense Video Captioning aims to localize and describe events in videos trained only on caption annotations, without temporal boundaries. Prior work introduced an implicit supervision paradigm based on Gaussian masking and complementary captioning. However, existing method focuses merely on generating non-overlapping masks without considering their semantic relationship to corresponding events, resulting in simplistic, uniformly distributed masks that fail to capture semantically meaningful regions. Moreover, relying solely on ground-truth captions leads to sub-optimal performance due to the inherent sparsity of existing datasets. In this work, we propose SAIL, which constructs semantically-aware masks through cross-modal alignment. Our similarity aware training objective guides masks to emphasize video regions with high similarity to their corresponding event captions. Furthermore, to guide more accurate mask generation under sparse annotation settings, we introduce an LLM-based augmentation strategy that generates synthetic captions to provide additional alignment signals. These synthetic captions are incorporated through an inter-mask mechanism, providing auxiliary guidance for precise temporal localization without degrading the main objective. Experiments on ActivityNet Captions and YouCook2 demonstrate state-of-the-art performance on both captioning and localization metrics.", "link": "http://arxiv.org/abs/2603.05437v1", "date": "2026-03-05", "relevancy": 2.6598, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5392}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5339}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5228}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAIL%3A%20Similarity-Aware%20Guidance%20and%20Inter-Caption%20Augmentation-based%20Learning%20for%20Weakly-Supervised%20Dense%20Video%20Captioning&body=Title%3A%20SAIL%3A%20Similarity-Aware%20Guidance%20and%20Inter-Caption%20Augmentation-based%20Learning%20for%20Weakly-Supervised%20Dense%20Video%20Captioning%0AAuthor%3A%20Ye-Chan%20Kim%20and%20SeungJu%20Cha%20and%20Si-Woo%20Kim%20and%20Minju%20Jeon%20and%20Hyungee%20Kim%20and%20Dong-Jin%20Kim%0AAbstract%3A%20Weakly-Supervised%20Dense%20Video%20Captioning%20aims%20to%20localize%20and%20describe%20events%20in%20videos%20trained%20only%20on%20caption%20annotations%2C%20without%20temporal%20boundaries.%20Prior%20work%20introduced%20an%20implicit%20supervision%20paradigm%20based%20on%20Gaussian%20masking%20and%20complementary%20captioning.%20However%2C%20existing%20method%20focuses%20merely%20on%20generating%20non-overlapping%20masks%20without%20considering%20their%20semantic%20relationship%20to%20corresponding%20events%2C%20resulting%20in%20simplistic%2C%20uniformly%20distributed%20masks%20that%20fail%20to%20capture%20semantically%20meaningful%20regions.%20Moreover%2C%20relying%20solely%20on%20ground-truth%20captions%20leads%20to%20sub-optimal%20performance%20due%20to%20the%20inherent%20sparsity%20of%20existing%20datasets.%20In%20this%20work%2C%20we%20propose%20SAIL%2C%20which%20constructs%20semantically-aware%20masks%20through%20cross-modal%20alignment.%20Our%20similarity%20aware%20training%20objective%20guides%20masks%20to%20emphasize%20video%20regions%20with%20high%20similarity%20to%20their%20corresponding%20event%20captions.%20Furthermore%2C%20to%20guide%20more%20accurate%20mask%20generation%20under%20sparse%20annotation%20settings%2C%20we%20introduce%20an%20LLM-based%20augmentation%20strategy%20that%20generates%20synthetic%20captions%20to%20provide%20additional%20alignment%20signals.%20These%20synthetic%20captions%20are%20incorporated%20through%20an%20inter-mask%20mechanism%2C%20providing%20auxiliary%20guidance%20for%20precise%20temporal%20localization%20without%20degrading%20the%20main%20objective.%20Experiments%20on%20ActivityNet%20Captions%20and%20YouCook2%20demonstrate%20state-of-the-art%20performance%20on%20both%20captioning%20and%20localization%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05437v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAIL%253A%2520Similarity-Aware%2520Guidance%2520and%2520Inter-Caption%2520Augmentation-based%2520Learning%2520for%2520Weakly-Supervised%2520Dense%2520Video%2520Captioning%26entry.906535625%3DYe-Chan%2520Kim%2520and%2520SeungJu%2520Cha%2520and%2520Si-Woo%2520Kim%2520and%2520Minju%2520Jeon%2520and%2520Hyungee%2520Kim%2520and%2520Dong-Jin%2520Kim%26entry.1292438233%3DWeakly-Supervised%2520Dense%2520Video%2520Captioning%2520aims%2520to%2520localize%2520and%2520describe%2520events%2520in%2520videos%2520trained%2520only%2520on%2520caption%2520annotations%252C%2520without%2520temporal%2520boundaries.%2520Prior%2520work%2520introduced%2520an%2520implicit%2520supervision%2520paradigm%2520based%2520on%2520Gaussian%2520masking%2520and%2520complementary%2520captioning.%2520However%252C%2520existing%2520method%2520focuses%2520merely%2520on%2520generating%2520non-overlapping%2520masks%2520without%2520considering%2520their%2520semantic%2520relationship%2520to%2520corresponding%2520events%252C%2520resulting%2520in%2520simplistic%252C%2520uniformly%2520distributed%2520masks%2520that%2520fail%2520to%2520capture%2520semantically%2520meaningful%2520regions.%2520Moreover%252C%2520relying%2520solely%2520on%2520ground-tru {"title": "RePo: Language Models with Context Re-Positioning", "author": "Huayang Li and Tianyu Zhao and Deng Cai and Richard Sproat", "abstract": "In-context learning is fundamental to modern Large Language Models (LLMs); however, prevailing architectures impose a rigid and fixed contextual structure by assigning linear or constant positional indices. Drawing on Cognitive Load Theory (CLT), we argue that this uninformative structure increases extraneous cognitive load, consuming finite working memory capacity that should be allocated to deep reasoning and attention allocation. To address this, we propose RePo, a novel mechanism that reduces extraneous load via context re-positioning. Unlike standard approaches, RePo utilizes a differentiable module, $f_\u03c6$, to assign token positions that capture contextual dependencies, rather than replying on pre-defined order. By continually pre-training on the OLMo-2 1B & 7B models, we demonstrate that RePo consistently enhances performance on tasks involving noisy contexts, structured data, and longer context length, while maintaining competitive performance on general short-context tasks. Detailed analysis reveals that RePo successfully allocate higher attention to distant but relevant information, assign positions in dense and non-linear space, and capture the intrinsic structure of the input context. We will open-source the code and model weights. Our code is at https://github.com/SakanaAI/repo.", "link": "http://arxiv.org/abs/2512.14391v2", "date": "2026-03-05", "relevancy": 2.6447, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5452}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5452}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4964}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RePo%3A%20Language%20Models%20with%20Context%20Re-Positioning&body=Title%3A%20RePo%3A%20Language%20Models%20with%20Context%20Re-Positioning%0AAuthor%3A%20Huayang%20Li%20and%20Tianyu%20Zhao%20and%20Deng%20Cai%20and%20Richard%20Sproat%0AAbstract%3A%20In-context%20learning%20is%20fundamental%20to%20modern%20Large%20Language%20Models%20%28LLMs%29%3B%20however%2C%20prevailing%20architectures%20impose%20a%20rigid%20and%20fixed%20contextual%20structure%20by%20assigning%20linear%20or%20constant%20positional%20indices.%20Drawing%20on%20Cognitive%20Load%20Theory%20%28CLT%29%2C%20we%20argue%20that%20this%20uninformative%20structure%20increases%20extraneous%20cognitive%20load%2C%20consuming%20finite%20working%20memory%20capacity%20that%20should%20be%20allocated%20to%20deep%20reasoning%20and%20attention%20allocation.%20To%20address%20this%2C%20we%20propose%20RePo%2C%20a%20novel%20mechanism%20that%20reduces%20extraneous%20load%20via%20context%20re-positioning.%20Unlike%20standard%20approaches%2C%20RePo%20utilizes%20a%20differentiable%20module%2C%20%24f_%CF%86%24%2C%20to%20assign%20token%20positions%20that%20capture%20contextual%20dependencies%2C%20rather%20than%20replying%20on%20pre-defined%20order.%20By%20continually%20pre-training%20on%20the%20OLMo-2%201B%20%26%207B%20models%2C%20we%20demonstrate%20that%20RePo%20consistently%20enhances%20performance%20on%20tasks%20involving%20noisy%20contexts%2C%20structured%20data%2C%20and%20longer%20context%20length%2C%20while%20maintaining%20competitive%20performance%20on%20general%20short-context%20tasks.%20Detailed%20analysis%20reveals%20that%20RePo%20successfully%20allocate%20higher%20attention%20to%20distant%20but%20relevant%20information%2C%20assign%20positions%20in%20dense%20and%20non-linear%20space%2C%20and%20capture%20the%20intrinsic%20structure%20of%20the%20input%20context.%20We%20will%20open-source%20the%20code%20and%20model%20weights.%20Our%20code%20is%20at%20https%3A//github.com/SakanaAI/repo.%0ALink%3A%20http%3A//arxiv.org/abs/2512.14391v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRePo%253A%2520Language%2520Models%2520with%2520Context%2520Re-Positioning%26entry.906535625%3DHuayang%2520Li%2520and%2520Tianyu%2520Zhao%2520and%2520Deng%2520Cai%2520and%2520Richard%2520Sproat%26entry.1292438233%3DIn-context%2520learning%2520is%2520fundamental%2520to%2520modern%2520Large%2520Language%2520Models%2520%2528LLMs%2529%253B%2520however%252C%2520prevailing%2520architectures%2520impose%2520a%2520rigid%2520and%2520fixed%2520contextual%2520structure%2520by%2520assigning%2520linear%2520or%2520constant%2520positional%2520indices.%2520Drawing%2520on%2520Cognitive%2520Load%2520Theory%2520%2528CLT%2529%252C%2520we%2520argue%2520that%2520this%2520uninformative%2520structure%2520increases%2520extraneous%2520cognitive%2520load%252C%2520consuming%2520finite%2520working%2520memory%2520capacity%2520that%2520should%2520be%2520allocated%2520to%2520deep%2520reasoning%2520and%2520attention%2520allocation.%2520To%2520address%2520this%252C%2520we%2520propose%2520RePo%252C%2520a%2520novel%2520mechanism%2520that%2520reduces%2520extraneous%2520load%2520via%2520context%2520re-positioning.%2520Unlike%2520standard%2520approaches%252C%2520RePo%2520utilizes%2520a%2520differentiable%2520module%252C%2520%2524f_%25CF%2586%2524%252C%2520to%2520assign%2520token%2520positions%2520that%2520capture%2520contextual%2520dependencies%252C%2520rather%2520than%2520replying%2520on%2520pre-defined%2520order.%2520By%2520continually%2520pre-training%2520on%2520the%2520OLMo-2%25201B%2520%2526%25207B%2520models%252C%2520we%2520demonstrate%2520that%2520RePo%2520consistently%2520enhances%2520performance%2520on%2520tasks%2520involving%2520noisy%2520contexts%252C%2520structured%2520data%252C%2520and%2520longer%2520context%2520length%252C%2520while%2520maintain {"title": "Exploiting Intermediate Reconstructions in Optical Coherence Tomography for Test-Time Adaption of Medical Image Segmentation", "author": "Thomas Pinetz and Veit Hucke and Hrvoje Bogunovic", "abstract": "Primary health care frequently relies on low-cost imaging devices, which are commonly used for screening purposes. To ensure accurate diagnosis, these systems depend on advanced reconstruction algorithms designed to approximate the performance of high-quality counterparts. Such algorithms typically employ iterative reconstruction methods that incorporate domain-specific prior knowledge. However, downstream task performance is generally assessed using only the final reconstructed image, thereby disregarding the informative intermediate representations generated throughout the reconstruction process. In this work, we propose IRTTA to exploit these intermediate representations at test-time by adapting the normalization-layer parameters of a frozen downstream network via a modulator network that conditions on the current reconstruction timescale. The modulator network is learned during test-time using an averaged entropy loss across all individual timesteps. Variation among the timestep-wise segmentations additionally provides uncertainty estimates at no extra cost. This approach enhances segmentation performance and enables semantically meaningful uncertainty estimation, all without modifying either the reconstruction process or the downstream model.", "link": "http://arxiv.org/abs/2603.05041v1", "date": "2026-03-05", "relevancy": 2.6311, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.531}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5298}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv. estimation%2C%20all%20without%20modifying%20either%20the%20reconstruction%20process%20or%20the%20downstream%20model.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05041v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploiting%2520Intermediate%2520Reconstructions%2520in%2520Optical%2520Coherence%2520Tomography%2520for%2520Test-Time%2520Adaption%2520of%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DThomas%2520Pinetz%2520and%2520Veit%2520Hucke%2520and%2520Hrvoje%2520Bogunovic%26entry.1292438233%3DPrimary%2520health%2520care%2520frequently%2520relies%2520on%2520low-cost%2520imaging%2520devices%252C%2520which%2520are%2520commonly%2520used%2520for%2520screening%2520purposes.%2520To%2520ensure%2520accurate%2520diagnosis%252C%2520these%2520systems%2520depend%2520on%2520advanced%2520reconstruction%2520algorithms%2520designed%2520to%2520approximate%2520the%2520performance%2520of%2520high-quality%2520counterparts.%2520Such%2520algorithms%2520typically%2520employ%2520iterative%2520reconstruction%2520methods%2520that%2520incorporate%2520domain-specific%2520prior%2520knowledge.%2520However%252C%2520downstream%2520task%2520performance%2520is%2520generally%2520assessed%2520using%2520only%2520the%2520final%2520reconstructed%2520image%252C%2520thereby%2520disregarding%2520the%2520informative%2520intermediate%2520representations%2520generated%2520throughout%2520the%2520reconstruction%2520process.%2520In%2520this%2520work%252C%2520we%2520propose%2520IRTTA%2520to%2520exploit%2520these%2520intermediate%2520representations%2520at%2520test-time%2520by%2520adapting%2520the%2520normalization-layer%2520parameters%2520of%2520a%2520frozen%2520downstream%2520network%2520via%2520a%2520modulator%2520network%2520that%2520conditions%2520on%2520the%2520current%2520reconstruction%2520timescale.%2520The%2520modulator%2520network%2520is%2520learned%2520during%2520test-time%2520using%2520an%2520averaged%2520e {"title": "Vevo2: A Unified and Controllable Framework for Speech and Singing Voice Generation", "author": "Xueyao Zhang and Junan Zhang and Yuancheng Wang and Chaoren Wang and Yuanzhe Chen and Dongya Jia and Zhuo Chen and Zhizheng Wu", "abstract": "Controllable human voice generation, particularly for expressive domains like singing, remains a significant challenge. This paper introduces Vevo2, a unified framework for controllable speech and singing voice generation. To tackle issues like the scarcity of annotated singing data and to enable flexible controllability, Vevo2 introduces two audio tokenizers: (1) a unified music-notation-free prosody tokenizer that captures prosody and melody from speech, singing, and even instrumental sounds, and (2) a unified content-style tokenizer that encodes linguistic content, prosody, and style for both speech and singing, while enabling timbre disentanglement. Vevo2 consists of an auto-regressive (AR) content-style modeling stage, which aims to enable controllability over text, prosody, and style, as well as a flow-matching acoustic modeling stage that allows for timbre control. Particularly, during the speech-singing joint training of the AR model, we propose both explicit and implicit prosody learning strategies to bridge speech and singing voice. Moreover, to further enhance the Vevo2's ability to follow text and prosody, we design a multi-objective post-training task that integrates both intelligibility and prosody similarity alignment. Experimental results show that the unified modeling in Vevo2 brings mutual benefits to both speech and singing voice generation. Additionally, Vevo2's effectiveness across a wide range of synthesis, conversion, and editing tasks for both speech and singing further demonstrates its strong generalization ability and versatility. Audio samples are are available at https://versasinger.github.io/.", "link": "http://arxiv.org/abs/2508.16332v3", "date": "2026-03-05", "relevancy": 2.6223, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5541}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5181}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5012}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vevo2%3A%20A%20Unified%20and%20Controllable%20Framework%20for%20Speech%20and%20Singing%20Voice%20Generation&body=Title%3A%20Vevo2%3A%20A%20Unified%20and%20Controllable%20Framework%20for%20Speech%20and%20Singing%20Voice%20Generation%0AAuthor%3A%20Xueyao%20Zhang%20and%20Junan%20Zhang%20and%20Yuancheng%20Wang%20and%20Chaoren%20Wang%20and%20Yuanzhe%20Chen%20and%20Dongya%20Jia%20and%20Zhuo%20Chen%20and%20Zhizheng%20Wu%0AAbstract%3A%20Controllable%20human%20voice%20generation%2C%20particularly%20for%20expressive%20domains%20like%20singing%2C%20remains%20a%20significant%20challenge.%20This%20paper%20introduces%20Vevo2%2C%20a%20unified%20framework%20for%20controllable%20speech%20and%20singing%20voice%20generation.%20To%20tackle%20issues%20like%20the%20scarcity%20of%20annotated%20singing%20data%20and%20to%20enable%20flexible%20controllability%2C%20Vevo2%20introduces%20two%20audio%20tokenizers%3A%20%281%29%20a%20unified%20music-notation-free%20prosody%20tokenizer%20that%20captures%20prosody%20and%20melody%20from%20speech%2C%20singing%2C%20and%20even%20instrumental%20sounds%2C%20and%20%282%29%20a%20unified%20content-style%20tokenizer%20that%20encodes%20linguistic%20content%2C%20prosody%2C%20and%20style%20for%20both%20speech%20and%20singing%2C%20while%20enabling%20timbre%20disentanglement.%20Vevo2%20consists%20of%20an%20auto-regressive%20%28AR%29%20content-style%20modeling%20stage%2C%20which%20aims%20to%20enable%20controllability%20over%20text%2C%20prosody%2C%20and%20style%2C%20as%20well%20as%20a%20flow-matching%20acoustic%20modeling%20stage%20that%20allows%20for%20timbre%20control.%20Particularly%2C%20during%20the%20speech-singing%20joint%20training%20of%20the%20AR%20model%2C%20we%20propose%20both%20explicit%20and%20implicit%20prosody%20learning%20strategies%20to%20bridge%20speech%20and%20singing%20voice.%20Moreover%2C%20to%20further%20enhance%20the%20Vevo2%27s%20ability%20to%20follow%20text%20and%20prosody%2C%20we%20design%20a%20multi-objective%20post-training%20task%20that%20integrates%20both%20intelligibility%20and%20prosody%20similarity%20alignment.%20Experimental%20results%20show%20that%20the%20unified%20modeling%20in%20Vevo2%20brings%20mutual%20benefits%20to%20both%20speech%20and%20singing%20voice%20generation.%20Additionally%2C%20Vevo2%27s%20effectiveness%20across%20a%20wide%20range%20of%20synthesis%2C%20conversion%2C%20and%20editing%20tasks%20for%20both%20speech%20and%20singing%20further%20demonstrates%20its%20strong%20generalization%20ability%20and%20versatility.%20Audio%20samples%20are%20are%20available%20at%20https%3A//versasinger.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2508.16332v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVevo2%253A%2520A%2520Unified%2520and%2520Controllable%2520Framework%2520for%2520Speech%2520and%2520Singing%2520Voice%2520Generation%26entry.906535625%3DXueyao%2520Zhang%2520and%2520Junan%2520Zhang%2520and%2520Yuancheng%2520Wang%2520and%2520Chaoren%2520Wang%2520and%2520Yuanzhe%2520Chen%2520and%2520Dongya%2520Jia%2520and%2520Zhuo%2520Chen%2520and%2520Zhizheng%2520Wu%26entry.1292438233%3DControllable%2520human%2520voice%2520generation%252C%2520particularly%2520for%2520expressive%2520domains%2520like%2520singing%252C%2520remains%2520a%2520significant%2520challenge.%2520This%2520paper%2520introduces%2520Vevo2%252C%2520a%2520unified%2520framework%2520for%2520controllable%2520speech%2520and%2520singi a%2520wide%2520range%2520of%2520synthesis%252C%2520conversion%252C%2520and%2520editing%2520tasks%2520for%2520both%2520speech%2520and%2520singing%2520further%2520demonstrates%2520its%2520strong%2520generalization%2520ability%2520and%2520versatility.%2520Audio%2520samples%2520are%2520are%2520available%2520at%2520https%253A//versasinger.github.io/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.16332v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Vevo2%3A%20A%20Unified%20and%20Controllable%20Framework%20for%20Speech%20and%20Singing%20Voice%20Generation&entry.906535625=Xueyao%20Zhang%20and%20Junan%20Zhang%20and%20Yuancheng%20Wang%20and%20Chaoren%20Wang%20and%20Yuanzhe%20Chen%20and%20Dongya%20Jia%20and%20Zhuo%20Chen%20and%20Zhizheng%20Wu&entry.1292438233=Controllable%20human%20voice%20generation%2C%20particularly%20for%20expressive%20domains%20like%20singing%2C%20remains%20a%20significant%20challenge.%20This%20paper%20introduces%20Vevo2%2C%20a%20unified%20framework%20for%20controllable%20speech%20and%20singing%20voice%20generation.%20To%20tackle%20issues%20like%20the%20scarcity%20of%20annotated%20singing%20data%20and%20to%20enable%20flexible%20controllability%2C%20Vevo2%20introduces%20two%20audio%20tokenizers%3A%20%281%29%20a%20unified%20music-notation-free%20prosody%20tokenizer%20that%20captures%20prosody%20and%20melody%20from%20speech%2C%20singing%2C%20and%20even%20instrumental%20sounds%2C%20and%20%282%29%20a%20unified%20content-style%20tokenizer%20that%20encodes%20linguistic%20content%2C%20prosody%2C%20and%20style%20for%20both%20speech%20and%20singing%2C%20while%20enabling%20timbre%20disentanglement.%20Vevo2%20consists%20of%20an%20auto-regressive%20%28AR%29%20content-style%20modeling%20stage%2C%20which%20aims%20to%20enable%20controllability%20over%20text%2C%20prosody%2C%20and%20style%2C%20as%20well%20as%20a%20flow-matching%20acoustic%20modeling%20stage%20tha {"title": "HALP: Detecting Hallucinations in Vision-Language Models without Generating a Single Token", "author": "Sai Akhil Kogilathota and Sripadha Vallabha E G and Luzhe Sun and Jiawei Zhou", "abstract": "Hallucinations remain a persistent challenge for vision-language models (VLMs), which often describe nonexistent objects or fabricate facts. Existing detection methods typically operate after text generation, making intervention both costly and untimely. We investigate whether hallucination risk can instead be predicted before any token is generated by probing a model's internal representations in a single forward pass. Across a diverse set of vision-language tasks and eight modern VLMs, including Llama-3.2-Vision, Gemma-3, Phi-4-VL, and Qwen2.5-VL, we examine three families of internal representations: (i) visual-only features without multimodal fusion, (ii) vision-token representations within the text decoder, and (iii) query-token representations that integrate visual and textual information before generation. Probes trained on these representations achieve strong hallucination-detection performance without decoding, reaching up to 0.93 AUROC on Gemma-3-12B, Phi-4-VL 5.6B, and Molmo 7B. Late query-token states are the most predictive for most models, while visual or mid-layer features dominate in a few architectures (e.g., ~0.79 AUROC for Qwen2.5-VL-7B using visual-only features). These results demonstrate that (1) hallucination risk is detectable pre-generation, (2) the most informative layer and modality vary across architectures, and (3) lightweight probes have the potential to enable early abstention, selective routing, and adaptive decoding to improve both safety and efficiency.", "link": "http://arxiv.org/abs/2603.05465v1", "date": "2026-03-05", "relevancy": 2.5881, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5346}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5346}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4836}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HALP%3A%20Detecting%20Hallucinations%20in%20Vision-Language%20Models%20without%20Generating%20a%20Single%20Token&body=Title%3A%20HALP%3A%20Detecting%20Hallucinations%20in%20Vision-Language%20Models%20without%20Generating%20a%20Single%20Token%0AAuthor%3A%20Sai%20Akhil%20Kogilathota%20and%20Sripadha%20Vallabha%20E%20G%20and%20Luzhe%20Sun%20and%20Jiawei%20Zhou%0AAbstract%3A%20Hallucinations%20remain%20a%20persistent%20challenge%20for%20vision-language%20models%20%28VLMs%29%2C%20which%20often%20describe%20nonexistent%20objects%20or%20fabricate%20facts.%20Existing%20detection%20methods%20typically%20operate%20after%20text%20generation%2C%20making%20intervention%20both%20costly%20and%20untimely.%20We%20investigate%20whether%20hallucination%20risk%20can%20instead%20be%20predicted%20before%20any%20token%20is%20generated%20by%20probing%20a%20model%27s%20internal%20representations%20in%20a%20single%20forward%20pass.%20Across%20a%20diverse%20set%20of%20vision-language%20tasks%20and%20eight%20modern%20VLMs%2C%20including%20Llama-3.2-Vision%2C%20Gemma-3%2C%20Phi-4-VL%2C%20and%20Qwen2.5-VL%2C%20we%20examine%20three%20families%20of%20internal%20representations%3A%20%28i%29%20visual-only%20features%20without%20multimodal%20fusion%2C%20%28ii%29%20vision-token%20representations%20within%20the%20text%20decoder%2C%20and%20%28iii%29%20query-token%20representations%20that%20integrate%20visual%20and%20textual%20information%20before%20generation.%20Probes%20trained%20on%20these%20representations%20achieve%20strong%20hallucination-detection%20performance%20without%20decoding%2C%20reaching%20up%20to%200.93%20AUROC%20on%20Gemma-3-12B%2C%20Phi-4-VL%205.6B%2C%20and%20Molmo%207B.%20Late%20query-token%20states%20are%20the%20most%20predictive%20for%20most%20models%2C%20while%20visual%20or%20mid-layer%20features%20dominate%20in%20a%20few%20architectures%20%28e.g.%2C%20~0.79%20AUROC%20for%20Qwen2.5-VL-7B%20using%20visual-only%20features%29.%20These%20results%20demonstrate%20that%20%281%29%20hallucination%20risk%20is%20detectable%20pre-generation%2C%20%282%29%20the%20most%20informative%20layer%20and%20modality%20vary%20across%20architectures%2C%20and%20%283%29%20lightweight%20probes%20have%20the%20potential%20to%20enable%20early%20abstention%2C%20selective%20routing%2C%20and%20adaptive%20decoding%20to%20improve%20both%20safety%20and%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05465v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHALP%253A%2520Detecting%2520Hallucinations%2520in%2520Vision-Language%2520Models%2520without%2520Generating%2520a%2520Single%2520Token%26entry.906535625%3DSai%2520Akhil%2520Kogilathota%2520and%2520Sripadha%2520Vallabha%2520E%2520G%2520and%2520Luzhe%2520Sun%2520and%2520Jiawei%2520Zhou%26entry.1292438233%3DHallucinations%2520remain%2520a%2520persistent%2520challenge%2520for%2520vision-language%2520models%2520%2528VLMs%2529%252C%2520which%2520often%2520describe%2520nonexistent%2520objects%2520or%2520fabricate%2520facts.%2520Existing%2520detection%2520methods%2520typically%2520operate%2520after%2520text%2520generation%252C%2520making%2520intervention%2520both%2520costly%2520and%2520untimely.%2520We%2520investigate%2520whether%2520hallucination%2520risk%2520can%2520instead%2520be%2520predicted%2520before%2520any%2520token%2520is%2520generated%2520by%2520probing%2520a%2520model%2527s%2520internal%2520representations%2520in%2520a%2520single%2520forward%2520pass.% {"title": "AttnBoost: Retail Supply Chain Sales Insights via Gradient Boosting Perspective", "author": "Yadi Liu and Xiaoli Ma and Muxin Ge and Zeyu Han and Jingxi Qiu and Ye Aung Moe and Yilan Shen and Wenbin Wei and Cheng Huang", "abstract": "Forecasting product demand in retail supply chains presents a complex challenge due to noisy, heterogeneous features and rapidly shifting consumer behavior. While traditional gradient boosting decision trees (GBDT) offer strong predictive performance on structured data, they often lack adaptive mechanisms to identify and emphasize the most relevant features under changing conditions. In this work, we propose AttnBoost, an interpretable learning framework that integrates feature-level attention into the boosting process to enhance both predictive accuracy and explainability. Specifically, the model dynamically adjusts feature importance during each boosting round via a lightweight attention mechanism, allowing it to focus on high-impact variables such as promotions, pricing, and seasonal trends. We evaluate AttnBoost on a large-scale retail sales dataset and demonstrate that it outperforms standard machine learning and deep tabular models, while also providing actionable insights for supply chain managers. An ablation study confirms the utility of the attention module in mitigating overfitting and improving interpretability. Our results suggest that attention-guided boosting represents a promising direction for interpretable and scalable AI in real-world forecasting applications.", "link": "http://arxiv.org/abs/2509.10506v2", "date": "2026-03-05", "relevancy": 2.5812, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5737}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4935}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4815}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AttnBoost%3A%20Retail%20Supply%20Chain%20Sales%20Insights%20via%20Gradient%20Boosting%20Perspective&body=Title%3A%20AttnBoost%3A%20Retail%20Supply%20Chain%20Sales%20Insights%20via%20Gradient%20Boosting%20Perspective%0AAuthor%3A%20Yadi%20Liu%20and%20Xiaoli%20Ma%20and%20Muxin%20Ge%20and%20Zeyu%20Han%20and%20Jingxi%20Qiu%20and%20Ye%20Aung%20Moe%20and%20Yilan%20Shen%20and%20Wenbin%20Wei%20and%20Cheng%20Huang%0AAbstract%3A%20Forecasting%20product%20demand%20in%20retail%20supply%20chains%20presents%20a%20complex%20challenge%20due%20to%20noisy%2C%20heterogeneous%20features%20and%20rapidly%20shifting%20consumer%20behavior.%20While%20traditional%20gradient%20boosting%20decision%20trees%20%28GBDT%29%20offer%20strong%20predictive%20performance%20on%20structured%20data%2C%20they%20often%20lack%20adaptive%20mechanisms%20to%20identify%20and%20emphasize%20the%20most%20relevant%20features%20under%20changing%20conditions.%20In%20this%20work%2C%20we%20propose%20AttnBoost%2C%20an%20interpretable%20learning%20framework%20that%20integrates%20feature-level%20attention%20into%20the%20boosting%20process%20to%20enhance%20both%20predictive%20accuracy%20and%20explainability.%20Specifically%2C%20the%20model%20dynamically%20adjusts%20feature%20importance%20during%20each%20boosting%20round%20via%20a%20lightweight%20attention%20mechanism%2C%20allowing%20it%20to%20focus%20on%20high-impact%20variables%20such%20as%20promotions%2C%20pricing%2C%20and%20seasonal%20trends.%20We%20evaluate%20AttnBoost%20on%20a%20large-scale%20retail%20sales%20dataset%20and%20demonstrate%20that%20it%20outperforms%20standard%20machine%20learning%20and%20deep%20tabular%20models%2C%20while%20also%20providing%20actionable%20insights%20for%20supply%20chain%20managers.%20An%20ablation%20study%20confirms%20the%20utility%20of%20the%20attention%20module%20in%20mitigating%20overfitting%20and%20improving%20interpretability.%20Our%20results%20suggest%20that%20attention-guided%20boosting%20represents%20a%20promising%20direction%20for%20interpretable%20and%20scalable%20AI%20in%20real-world%20forecasting%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2509.10506v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttnBoost%253A%2520Retail%2520Supply%2520Chain%2520Sales%2520Insights%2520via%2520Gradient%2520Boosting%2520Perspective%26entry.906535625%3DYadi%2520Liu%2520and%2520Xiaoli%2520Ma%2520and%2520Muxin%2520Ge%2520and%2520Zeyu%2520Han%2520and%2520Jingxi%2520Qiu%2520and%2520Ye%2520Aung%2520Moe%2520and%2520Yilan%2520Shen%2520and%2520Wenbin%2520Wei%2520and%2520Cheng%2520Huang%26entry.1292438233%3DForecasting%2520product%2520demand%2520in%2520retail%2520supply%2520chains%2520presents%2520a%2520complex%2520challenge%2520due%2520to%2520noisy%252C%2520heterogeneous%2520features%2520and%2520rapidly%2520shifting%2520consumer%2520behavior.%2520While%2520traditional%2520gradient%2520boosting%2520decision%2520trees%2520%2528GBDT%2529%2520offer%2520strong%2520predictive%2520performance%2520on%2520structured%2520data%252C%2520they%2520often%2520lack%2520adaptive%2520mechanisms%2520to%2520identify%2520and%2520emphasize%2520the%2520most%2520relevant%2520features%2520under%2520changing%2520conditions.%2520In%2520this%2520work%252C%2520we%2520propose%2520AttnBoost%252C%2520an%2520interpretable%2520learning%2520framework%2520that%2520integrates%2520feature-level%2520attention%2520into%2520the%2520boosting%2520process%2520to%2520enhance%2520both%2520predictive%2520accuracy%2520and%2520explainability.%2520Specifically%252C%2520the%2520model%2520dynamically%2520adjusts%2520feature%2520importance%2520during%2520each%2520boosting%2520round%2520via%2520a%2520lightweight%2520attention%2520mechanism%252C%2520allowing%2520it%2520to%2520focus%2520on%2520high-impact%2520variables%2520such%2520as%2520promotions%252C%2520pricing%252C%2520and%2520seasonal%2520trends.%2520We%2520evaluate%2520AttnBoost%2520on%2520a%2520large-scale%2520retail%2520sales%2520dataset%2520and%2520demonstrate%2520that%2520it%2520outperforms%2520standard%2520machine%2520learning%2520and%2520deep%2520tabular%2520models%252C%2520while%2520also%2520providing%2520actionable%2520insights%2520for%2520supply%2520chain%2520managers.%2520An%2520ablation%2520study%2520confirms%2520the%2520utility%2520of%2520the%2520attention%2520module%2520in%2520mitigating%2520overfitting%2520and%2520improving%2520interpretability.%2520Our%2520results%2520suggest%2520that%2520attention-guided%2520boosting%2520represents%2520a%2520promising%2520direction%2520for%2520interpretable%2520and%2520scalable%2520AI%2520in%2520real-world%2520forecasting%2520applications.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.10506v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AttnBoost%3A%20Retail%20Supply%20Chain%20Sales%20Insights%20via%20Gradient%20Boosting%20Perspective&entry.906535625=Yadi%20Liu%20and%20Xiaoli%20Ma%20and%20Muxin%20Ge%20and%20Zeyu%20Han%20and%20Jingxi%20Qiu%20and%20Ye%20Aung%20Moe%20and%20Yilan%20Shen%20and%20Wenbin%20Wei%20and%20Cheng%20Huang&entry.1292438233=Forecasting%20product%20demand%20in%20retail%20supply%20chains%20presents%20a%20complex%20challenge%20due%20to%20noisy%2C%20heterogeneous%20features%20and%20rapidly%20shifting%20consumer%20behavior.%20While%20traditional%20gradient%20boosting%20decision%20trees%20%28GBDT%29%20offer%20strong%20predictive%20performance%20on%20structured%20data%2C%20they%20often%20lack%20adaptive%20mechanisms%20to%20identify%20and%20emphasize%20the%20most%20relevant%20features%20under%20changing%20conditions.%20In%20this%20work%2C%20we%20propose%20AttnBoost%2C%20an%20interpretable%20learning%20framework%20that%20integrates%20feature-level%20attention%20into%20the%20boosting%20process% {"title": "SceneCOT: Eliciting Grounded Chain-of-Thought Reasoning in 3D Scenes", "author": "Xiongkun Linghu and Jiangyong Huang and Ziyu Zhu and Baoxiong Jia and Siyuan Huang", "abstract": "Existing research on 3D Large Language Models (LLMs) still struggles to achieve grounded question-answering, primarily due to the under-exploration of the mechanism of human-like scene-object grounded reasoning. This paper bridges the gap by presenting a novel framework. We first introduce a grounded Chain-of-Thought reasoning method in 3D scenes (SCENECOT), decoupling a complex reasoning task into simpler and manageable problems, and building corresponding visual clues based on multimodal expert modules. To enable such a method, we develop SCENECOT-185K, the first large-scale grounded CoT reasoning dataset, consisting of 185K high-quality instances. Extensive experiments across various complex 3D scene reasoning benchmarks demonstrate that our new framework achieves strong performance with high grounding-QA coherence. To the best of our knowledge, this is the first successful application of CoT reasoning to 3D scene understanding, enabling step-by-step human-like reasoning and showing potential for extension to broader 3D scene understanding scenarios.", "link": "http://arxiv.org/abs/2510.16714v3", "date": "2026-03-05", "relevancy": 2.5802, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6529}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6529}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6056}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SceneCOT%3A%20Eliciting%20Grounded%20Chain-of-Thought%20Reasoning%20in%203D%20Scenes&body=Title%3A%20SceneCOT%3A%20Eliciting%20Grounded%20Chain-of-Thought%20Reasoning%20in%203D%20Scenes%0AAuthor%3A%20Xiongkun%20Linghu%20and%20Jiangyong%20Huang%20and%20Ziyu%20Zhu%20and%20Baoxiong%20Jia%20and%20Siyuan%20Huang%0AAbstract%3A%20Existing%20research%20on%203D%20Large%20Language%20Models%20%28LLMs%29%20still%20struggles%20to%20achieve%20grounded%20question-answering%2C%20primarily%20due%20to%20the%20under-exploration%20of%20the%20mechanism%20of%20human-like%20scene-object%20grounded%20reasoning.%20This%20paper%20bridges%20the%20gap%20by%20presenting%20a%20novel%20framework.%20We%20first%20introduce%20a%20grounded%20Chain-of-Thought%20reasoning%20method%20in%203D%20scenes%20%28SCENECOT%29%2C%20decoupling%20a%20complex%20reasoning%20task%20into%20simpler%20and%20manageable%20problems%2C%20and%20building%20corresponding%20visual%20clues%20based%20on%20multimodal%20expert%20modules.%20To%20enable%20such%20a%20method%2C%20we%20develop%20SCENECOT-185K%2C%20the%20first%20large-scale%20grounded%20CoT%20reasoning%20dataset%2C%20consisting%20of%20185K%20high-quality%20instances.%20Extensive%20experiments%20across%20various%20complex%203D%20scene%20reasoning%20benchmarks%20demonstrate%20that%20our%20new%20framework%20achieves%20strong%20performance%20with%20high%20grounding-QA%20coherence.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20successful%20application%20of%20CoT%20reasoning%20to%203D%20scene%20understanding%2C%20enabling%20step-by-step%20human-like%20reasoning%20and%20showing%20potential%20for%20extension%20to%20broader%203D%20scene%20understanding%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2510.16714v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSceneCOT%253A%2520Eliciting%2520Grounded%2520Chain-of-Thought%2520Reasoning%2520in%25203D%2520Scenes%26entry.906535625%3DXiongkun%2520Linghu%2520and%2520Jiangyong%2520Huang%2520and {"title": "SRasP: Self-Reorientation Adversarial Style Perturbation for Cross-Domain Few-Shot Learning", "author": "Wenqian Li and Pengfei Fang and Hui Xue", "abstract": "Cross-Domain Few-Shot Learning (CD-FSL) aims to transfer knowledge from a seen source domain to unseen target domains, serving as a key benchmark for evaluating the robustness and transferability of models. Existing style-based perturbation methods mitigate domain shift but often suffer from gradient instability and convergence to sharp minima.To address these limitations, we propose a novel crop-global style perturbation network, termed Self-Reorientation Adversarial \\underline{S}tyle \\underline{P}erturbation (SRasP). Specifically, SRasP leverages global semantic guidance to identify incoherent crops, followed by reorienting and aggregating the style gradients of these crops with the global style gradients within one image. Furthermore, we propose a novel multi-objective optimization function to maximize visual discrepancy while enforcing semantic consistency among global, crop, and adversarial features. Applying the stabilized perturbations during training encourages convergence toward flatter and more transferable solutions, improving generalization to unseen domains. Extensive experiments are conducted on multiple CD-FSL benchmarks, demonstrating consistent improvements over state-of-the-art methods.", "link": "http://arxiv.org/abs/2603.05135v1", "date": "2026-03-05", "relevancy": 2.5493, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5407}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5015}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4873}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SRasP%3A%20Self-Reorientation%20Adversarial%20Style%20Perturbation%20for%20Cross-Domain%20Few-Shot%20Learning&body=Title%3A%20SRasP%3A%20Self-Reorientation%20Adversarial%20Style%20Perturbation%20for%20Cross-Domain%20Few-Shot%20Learning%0AAuthor%3A%20Wenqian%20Li%20and%20Pengfei%20Fang%20and%20Hui%20Xue%0AAbstract%3A%20Cross-Domain%20Few-Shot%20Learning%20%28CD-FSL%29%20aims%20to%20transfer%20knowledge%20from%20a%20seen%20source%20domain%20to%20unseen%20target%20domains%2C%20serving%20as%20a%20key%20benchmark%20for%20evaluating%20the%20robustness%20and%20transferability%20of%20models.%20Existing%20style-based%20perturbation%20methods%20mitigate%20domain%20shift%20but%20often%20suffer%20from%20gradient%20instability%20and%20convergence%20to%20sharp%20minima.To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20crop-global%20style%20perturbation%20network%2C%20termed%20Self-Reorientation%20Adversarial%20%5Cunderline%7BS%7Dtyle%20%5Cunderline%7BP%7Derturbation%20%28SRasP%29.%20Specifically%2C%20SRasP%20leverages%20global%20semantic%20guidance%20to%20identify%20incoherent%20crops%2C%20followed%20by%20reorienting%20and%20aggregating%20the%20style%20gradients%20of%20these%20crops%20with%20the%20global%20style%20gradients%20within%20one%20image.%20Furthermore%2C%20we%20propose%20a%20novel%20multi-objective%20optimization%20function%20to%20maximize%20visual%20discrepancy%20while%20enforcing%20semantic%20consistency%20among%20global%2C%20crop%2C%20and%20adversarial%20features.%20Applying%20the%20stabilized%20perturbations%20during%20training%20encourages%20convergence%20toward%20flatter%20and%20more%20transferable%20solutions%2C%20improving%20generalization%20to%20unseen%20domains.%20Extensive%20experiments%20are%20conducted%20on%20multiple%20CD-FSL%20benchmarks%2C%20demonstrating%20consistent%20improvements%20over%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05135v1%0AForm%3A%20https%3A//docs. eneralization%2520to%2520unseen%2520domains.%2520Extensive%2520experiments%2520are%2520conducted%2520on%2520multiple%2520CD-FSL%2520benchmarks%252C%2520demonstrating%2520consistent%2520improvements%2520over%2520state-of-the-art%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05135v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SRasP%3A%20Self-Reorientation%20Adversarial%20Style%20Perturbation%20for%20Cross-Domain%20Few-Shot%20Learning&entry.906535625=Wenqian%20Li%20and%20Pengfei%20Fang%20and%20Hui%20Xue&entry.1292438233=Cross-Domain%20Few-Shot%20Learning%20%28CD-FSL%29%20aims%20to%20transfer%20knowledge%20from%20a%20seen%20source%20domain%20to%20unseen%20target%20domains%2C%20serving%20as%20a%20key%20benchmark%20for%20evaluating%20the%20robustness%20and%20transferability%20of%20models.%20Existing%20style-based%20perturbation%20methods%20mitigate%20domain%20shift%20but%20often%20suffer%20from%20gradient%20instability%20and%20convergence%20to%20sharp%20minima.To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20crop-global%20style%20perturbation%20network%2C%20termed%20Self-Reorientation%20Adversarial%20%5Cunderline%7BS%7Dtyle%20%5Cunderline%7BP%7Derturbation%20%28SRasP%29.%20Specifically%2C%20SRasP%20leverages%20global%20semantic%20guidance%20to%20identify%20incoherent%20crops%2C%20followed%20by%20reorienting%20and%20aggregating%20the%20style%20gradients%20of%20these%20crops%20with%20the%20global%20style%20gradients%20within%20one%20image.%20Furthermore%2C%20we%20propose%20a%20novel%20multi-objective%20optimization%20function%20to%20maximize%20visual%20discrepancy%20while%20enforcing%20semantic%20consistency%20among%20global%2C%20crop%2C%20and%20adversarial%20features.%20Applying%20the%20stabilized%20perturbations%20during%20training%20encourages%20convergence%20toward%20flatter%20and%20more%20transferable%20solutions%2C%20improving%20generalization%20to%20unseen%20domains.%20Extensive%20experiments%20are%20conducted%20on%20multiple%20CD-FSL%20benchmarks%2C%20demonstrating%20consistent%20improvements%20over%20state-of-the-art%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2603.05135v1&entry.124074799=Read"},
{"title": "Parallel Split Learning with Global Sampling", "author": "Mohammad Kohankhaki and Ahmad Ayad and Mahdi Barhoush and Anke Schmeink", "abstract": "Parallel split learning (PSL) suffers from two intertwined issues: the effective batch size grows with the number of clients, and data that is not identically and independently distributed (non-IID) skews global batches. We present parallel split learning with global sampling (GPSL), a server-driven scheme that fixes the global batch size while computing per-client batch-size schedules using pooled-level proportions. The actual samples are drawn locally without replacement by each selected client. This eliminates per-class rounding, decouples the effective batch from the client count, and makes each global batch distributionally equivalent to centralized uniform sampling without replacement. Consequently, we obtain finite-population deviation guarantees via Serfling's inequality, yielding a zero rounding bias compared to local sampling schemes. GPSL is a drop-in replacement for PSL with negligible overhead and scales to large client populations. In extensive experiments on CIFAR-10/100 and ResNet-18/34 under non-IID splits, GPSL stabilizes optimization and achieves centralized-like accuracy, while fixed local batching trails by up to 60%. Furthermore, GPSL shortens training time by avoiding inflation of training steps induced by data-depletion. These findings suggest GPSL is a promising and scalable approach for learning in resource-constrained environments.", "link": "http://arxiv.org/abs/2407.15738v6", "date": "2026-03-05", "relevancy": 2.5342, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5291}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5069}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4845}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Parallel%20Split%20Learning%20with%20Global%20Sampling&body=Title%3A%20Parallel%20Split%20Learning%20with%20Global%20Sampling%0AAuthor%3A%20Mohammad%20Kohankhaki%20and%20Ahmad%20Ayad%20and%20Mahdi%20Barhoush%20and%20Anke%20Schmeink%0AAbstract%3A%20Parallel%20split%20learning%20%28PSL%29%20suffers%20from%20two%20intertwined%20issues%3A%20the%20effective%20batch%20size%20grows%20with%20the%20number%20of%20clients%2C%20and%20data%20that%20is%20not%20identically%20and%20independently%20distributed%20%28non-IID%29%20skews%20global%20batches.%20We%20present%20parallel%20split%20learning%20with%20global%20sampling%20%28GPSL%29%2C%20a%20server-driven%20scheme%20that%20fixes%20the%20global%20batch%20size%20while%20computing%20per-client%20batch-size%20schedules%20using%20pooled-level%20proportions.%20The%20actual%20samples%20are%20drawn%20locally%20without%20replacement%20by%20each%20selected%20client.%20This%20eliminates%20per-class%20rounding%2C%20decouples%20the%20effective%20batch%20from%20the%20client%20count%2C%20and%20makes%20each%20global%20batch%20distributionally%20equivalent%20to%20centralized%20uniform%20sampling%20without%20replacement.%20Consequently%2C%20we%20obtain%20finite-population%20deviation%20guarantees%20via%20Serfling%27s%20inequality%2C%20yielding%20a%20zero%20rounding%20bias%20compared%20to%20local%20sampling%20schemes.%20GPSL%20is%20a%20drop-in%20replacement%20for%20PSL%20with%20negligible%20overhead%20and%20scales%20to%20large%20client%20populations.%20In%20extensive%20experiments%20on%20CIFAR-10/100%20and%20ResNet-18/34%20under%20non-IID%20splits%2C%20GPSL%20stabilizes%20optimization%20and%20achieves%20centralized-like%20accuracy%2C%20while%20fixed%20local%20batching%20trails%20by%20up%20to%2060%25.%20Furthermore%2C%20GPSL%20shortens%20training%20time%20by%20avoiding%20inflation%20of%20training%20steps%20induced%20by%20data-depletion.%20These%20findings%20suggest%20GPSL%20is%20a%20promising%20and%20scalable%20approach%20for%20learning%20in%20resource-constrained%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2407.15738v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParallel%2520Split%2520Learning%2520with%2520Global%2520Sampling%26entry.906535625%3DMohammad%2520Kohankhaki%2520and%2520Ahmad%2520Ayad%2520and%2520Mahdi%2520Barhoush%2520and%2520Anke%2520Schmeink%26entry.1292438233%3DParallel%2520split%2520learning%2520%2528PSL%2529%2520suffers%2520from%2520two%2520intertwined%2520issues%253A%2520the%2520effective%2520batch%2520size%2520grows%2520with%2520the%2520number%2520of%2520clients%252C%2520and%2520data%2520that%2520is%2520not%2520identically%2520and%2520independently%2520distributed%2520%2528non-IID%2529%2520skews%2520global%2520batches.%2520We%2520present%2520parallel%2520split%2520learning%2520with%2520global%2520sampling%2520%2528GPSL%2529%252C%2520a%2520server-driven%2520scheme%2520that%2520fixes%2520the%2520global%2520batch%2520size%2520while%2520computing%2520per-client%2520batch-size%2520schedules%2520using%2520pooled-level%2520proportions.%2520The%2520actual%2520samples%2520are%2520drawn%2520locally%2520without%2520replacement%2520by%2520each%2520selected%2520client.%2520This%2520eliminates%2520per-class%2520rounding%252C%2520decouples%2520the%2520effective%2520batch%2520from%2520the%2520client%2520count%252C%2520and%2520makes%2520each%2520global%2520batch%2520distributionally%2520equivalent%2520to%2520centralized%2520uniform%2520sampling%2520without%2520replacement.%2520Consequently%252C%2520we%2520obtain%2520finite-population%2520deviation%2520guarantees%2520via%2520Serfling%2527s%2520inequality%252C%2520yielding%2520a%2520zero%2520rounding%2520bias%2520compared%2520to%2520local%2520sampling%2 {"title": "Visual-Informed Speech Enhancement Using Attention-Based Beamforming", "author": "Chihyun Liu and Jiaxuan Fan and Mingtung Sun and Michael Anthony and Mingsian R. Bai and Yu Tsao", "abstract": "Recent studies have demonstrated that incorporating auxiliary information, such as speaker voiceprint or visual cues, can substantially improve Speech Enhancement (SE) performance. However, single-channel methods often yield suboptimal results in low signal-to-noise ratio (SNR) conditions, when there is high reverberation, or in complex scenarios involving dynamic speakers, overlapping speech, or non-stationary noise. To address these issues, we propose a novel Visual-Informed Neural Beamforming Network (VI-NBFNet), which integrates microphone array signal processing and deep neural networks (DNNs) using multimodal input features. The proposed network leverages a pretrained visual speech recognition model to extract lip movements as input features, which serve for voice activity detection (VAD) and target speaker identification. The system is intended to handle both static and moving speakers by introducing a supervised end-to-end beamforming framework equipped with an attention mechanism. The experimental results demonstrated that the proposed audiovisual system has achieved better SE performance and robustness for both stationary and dynamic speaker scenarios, compared to several baseline methods.", "link": "http://arxiv.org/abs/2603.05270v1", "date": "2026-03-05", "relevancy": 2.5328, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5104}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5104}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": {"title": "NOVA3R: Non-pixel-aligned Visual Transformer for Amodal 3D Reconstruction", "author": "Weirong Chen and Chuanxia Zheng and Ganlin Zhang and Andrea Vedaldi and Daniel Cremers", "abstract": "We present NOVA3R, an effective approach for non-pixel-aligned 3D reconstruction from a set of unposed images in a feed-forward manner. Unlike pixel-aligned methods that tie geometry to per-ray predictions, our formulation learns a global, view-agnostic scene representation that decouples reconstruction from pixel alignment. This addresses two key limitations in pixel-aligned 3D: (1) it recovers both visible and invisible points with a complete scene representation, and (2) it produces physically plausible geometry with fewer duplicated structures in overlapping regions. To achieve this, we introduce a scene-token mechanism that aggregates information across unposed images and a diffusion-based 3D decoder that reconstructs complete, non-pixel-aligned point clouds. Extensive experiments on both scene-level and object-level datasets demonstrate that NOVA3R outperforms state-of-the-art methods in terms of reconstruction accuracy and completeness.", "link": "http://arxiv.org/abs/2603.04179v2", "date": "2026-03-05", "relevancy": 2.5305, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6357}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6357}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6173}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NOVA3R%3A%20Non-pixel-aligned%20Visual%20Transformer%20for%20Amodal%203D%20Reconstruction&body=Title%3A%20NOVA3R%3A%20Non-pixel-aligned%20Visual%20Transformer%20for%20Amodal%203D%20Reconstruction%0AAuthor%3A%20Weirong%20Chen%20and%20C

{"title": "SSR-GS: Separating Specular Reflection in Gaussian Splatting for Glossy Surface Reconstruction", "author": "Ningjing Fan and Yiqun Wang", "abstract": "In recent years, 3D Gaussian splatting (3DGS) has achieved remarkable progress in novel view synthesis. However, accurately reconstructing glossy surfaces under complex illumination remains challenging, particularly in scenes with strong specular reflections and multi-surface interreflections. To address this issue, we propose SSR-GS, a specular reflection modeling framework for glossy surface reconstruction. Specifically, we introduce a prefiltered Mip-Cubemap to model direct specular reflections efficiently, and propose an IndiASG module to capture indirect specular reflections.\n  Furthermore, we design Visual Geometry Priors (VGP) that couple a reflection-aware visual prior via a reflection score (RS) to downweight the photometric loss contribution of reflection-dominated regions, with geometry priors derived from VGGT, including progressively decayed depth supervision and transformed normal constraints. Extensive experiments on both synthetic and real-world datasets demonstrate that SSR-GS achieves state-of-the-art performance in glossy surface reconstruction.", "link": "http://arxiv.org/abs/2603.05152v1", "date": "2026-03-05", "relevancy": 3.1719, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6805}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6175}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6052}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SSR-GS%3A%20Separating%20Specular%20Reflection%20in%20Gaussian%20Splatting%20for%20Glossy%20Surface%20Reconstruction&body=Title%3A%20SSR-GS%3A%20Separating%20Specular%20Reflection%20in%20Gaussian%20Splatting%20for%20Glossy%20Surface%20Reconstruction%0AAuthor%3A%20Ningjing%20Fan%20and%20Yiqun%20Wang%0AAbstract%3A%20In%20recent%20years%2C%203D%20Gaussian%20splatting%20%283DGS%29%20has%20achieved%20remarkable%20progress%20in%20novel%20view%20synthesis.%20However%2C%20accurately%20reconstructing%20glossy%20surfaces%20under%20complex%20illumination%20remains%20challenging%2C%20particularly%20in%20scenes%20with%20strong%20specular%20reflections%20and%20multi-surface%20interreflections.%20To%20address%20this%20issue%2C%20we%20propose%20SSR-GS%2C%20a%20specular%20reflection%20modeling%20framework%20for%20glossy%20surface%20reconstruction.%20Specifically%2C%20we%20introduce%20a%20prefiltered%20Mip-Cubemap%20to%20model%20direct%20specular%20reflections%20efficiently%2C%20and%20propose%20an%20IndiASG%20module%20to%20capture%20indirect%20specular%20reflections.%0A%20%20Furthermore%2C%20we%20design%20Visual%20Geometry%20Priors%20%28VGP%29%20that%20couple%20a%20reflection-aware%20visual%20prior%20via%20a%20reflection%20score%20%28RS%29%20to%20downweight%20the%20photometric%20loss%20contribution%20of%20reflection-dominated%20regions%2C%20with%20geometry%20priors%20derived%20from%20VGGT%2C%20including%20progressively%20decayed%20depth%20supervision%20and%20transformed%20normal%20constraints.%20Extensive%20experiments%20on%20both%20synthetic%20and%20real-world%20datasets%20demonstrate%20that%20SSR-GS%20achieves%20state-of-the-art%20performance%20in%20glossy%20surface%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05152v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSSR-GS%253A%2520Separating%2520Specular%2520Reflection%2520in%2520Gaussian%2520Splatting%2520for%2520Glossy%2520Surface%2520Reconstruction%26entry.906535625%3DNingjing%2520Fan%2520and%2520Yiqun%2520Wang%26entry.1292438233%3DIn%2520recent%2520years%252C%2 jing%20Fan%20and%20Yiqun%20Wang&entry.1292438233=In%20recent%20years%2C%203D%20Gaussian%20splatting%20%283DGS%29%20has%20achieved%20remarkable%20progress%20in%20novel%20view%20synthesis.%20However%2C%20accurately%20reconstructing%20glossy%20surfaces%20under%20complex%20illumination%20remains%20challenging%2C%20particularly%20in%20scenes%20with%20strong%20specular%20reflections%20and%20multi-surface%20interreflections.%20To%20address%20this%20issue%2C%20we%20propose%20SSR-GS%2C%20a%20specular%20reflection%20modeling%20framework%20for%20glossy%20surface%20reconstruction.%20Specifically%2C%20we%20introduce%20a%20prefiltered%20Mip-Cubemap%20to%20model%20direct%20specular%20reflections%20efficiently%2C%20and%20propose%20an%20IndiASG%20module%20to%20capture%20indirect%20specular%20reflections.%0A%20%20Furthermore%2C%20we%20design%20Visual%20Geometry%20Priors%20%28VGP%29%20that%20couple%20a%20reflection-aware%20visual%20prior%20via%20a%20reflection%20score%20%28RS%29%20to%20downweight%20the%20photometric%20loss%20contribution%20of%20reflection-dominated%20regions%2C%20with%20geometry%20priors%20derived%20from%20VGGT%2C%20including%20progressively%20decayed%20depth%20supervision%20and%20transformed%20normal%20constraints.%20Extensive%20experiments%20on%20both%20synthetic%20and%20real-world%20datasets%20demonstrate%20that%20SSR-GS%20achieves%20state-of-the-art%20performance%20in%20glossy%20surface%20reconstruction.&entry.1838667208=http%3A//arxiv.org/abs/2603.05152v1&entry.124074799=Read"},
{"title": "AIM-SLAM: Dense Monocular SLAM via Adaptive and Informative Multi-View Keyframe Prioritization with Foundation Model", "author": "Jinwoo Jeon and Dong-Uk Seo and Eungchang Mason Lee and Hyun Myung", "abstract": "Recent advances in geometric foundation models have emerged as a promising alternative for addressing the challenge of dense reconstruction in monocular visual simultaneous localization and mapping (SLAM). Although geometric foundation models enable SLAM to leverage variable input views, the previous methods remain confined to two-view pairs or fixed-length inputs without sufficient deliberation of geometric context for view selection. To tackle this problem, we propose AIM-SLAM, a dense monocular SLAM framework that exploits an adaptive and informative multi-view keyframe prioritization with dense pointmap predictions from visual geometry grounded transformer (VGGT). Specifically, we introduce the selective information- and geometric-aware multi-view adaptation (SIGMA) module, which employs voxel overlap and information gain to retrieve a candidate set of keyframes and adaptively determine its size. Furthermore, we formulate a joint multi-view Sim(3) optimization that enforces consistent alignment across selected views, substantially improving pose estimation accuracy. The effectiveness of AIM-SLAM is demonstrated on real-world datasets, where it achieves state-of-the-art performance in both pose estimation and dense reconstruction. Our system supports ROS integration, with code is available at https://aimslam.github.io/.", "link": "http://arxiv.org/abs/2603.05097v1", "date": "2026-03-05", "relevancy": 3.1462, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6579}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6206}, {"title": "uPLAM: Robust Panoptic {"title": "ViRC: Enhancing Visual Interleaved Mathematical CoT with Reason Chunking", "author": "Lihong Wang and Liangqi Li and Weiwei Feng and Jiamin Wu and Changtao Miao and Tieru Wu and Rui Ma and Bo Zhang and Zhe Li", "abstract": "CoT has significantly enhanced the reasoning ability of LLMs while it faces challenges when extended to multimodal domains, particularly in mathematical tasks. Existing MLLMs typically perform textual reasoning solely from a single static mathematical image, overlooking dynamic visual acquisition during reasoning. In contrast, humans repeatedly examine visual image and employ step-by-step reasoning to prove intermediate propositions. This strategy of decomposing the problem-solving process into key logical nodes adheres to Miller's Law in cognitive science. Inspired by this insight, we propose a ViRC framework for multimodal mathematical tasks, introducing a Reason Chunking mechanism that structures multimodal mathematical CoT into consecutive Critical Reasoning Units (CRUs) to simulate human expert problem-solving patterns. CRUs ensure intra-unit textual coherence for intermediate proposition verification while integrating visual information across units to generate subsequent propositions and support structured reasoning. To this end, we present CRUX dataset by using three visual tools and four reasoning patterns to provide explicitly annotated CRUs across multiple reasoning paths for each mathematical problem. Leveraging the CRUX dataset, we propose a progressive training strategy inspired by human cognitive learning, which includes Instructional SFT, Practice SFT, and Strategic RL, aimed at further strengthening the Reason Chunking ability of the model. The resulting ViRC-7B model achieves a 18.8% average improvement over baselines across multiple mathematical benchmarks. Code is available at https://github.com/Leon-LihongWang/ViRC.", "link": "http://arxiv.org/abs/2512.14654v3", "date": "2026-03-05", "relevancy": 2.936, "topK": [{" {"title": "RadarVLM: A Vision-Language Model Approach for Radar Scene Understanding", "author": "Pushkal Mishra and Kshitiz Bansal and Dinesh Bharadia", "abstract": "Radar sensors provide reliable perception across adverse weather, lighting, and long-range conditions, yet existing machine learning approaches remain fragmented and task-specific, with each downstream task employing distinct architectures and training objectives. We present RadarVLM, a vision-language framework that learns unified scene-level representations through structured spatial language supervision. Leveraging the CARLA simulator with a realistic radar model, we collect over 800k radar-caption pairs across 110+ hours of simulated driving in diverse scenarios. We make two key contributions: (1) a structured caption framework encoding vehicle distributions in the radar's native coordinate system, and (2) Spatially-Grounded CLIP (SG-CLIP) objective that replaces binary matching with continuous scene similarity, enabling fine-grained spatial reasoning. We further propose localization-aware evaluation metrics that directly assess spatial accuracy beyond traditional linguistic similarity measures. Validated on generative captioning and vehicle segmentation, SG-CLIP achieves up to 50\\% relative F1-score improvement over vanilla CLIP and a 21\\% AP gain on segmentation, demonstrating that language grounding produces spatially structured representations.", "link": "http://arxiv.org/abs/2511.21105v3", "date": "2026-03-05", "relevancy": 2.919, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5894}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5894}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5727}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RadarVLM%3A%20A%20Vision-Language%20Model%20Approach%20for%20Radar%20Scene%20Understanding&body=Title%3A%20RadarVLM%3A%20A%20Vision-Language%20Model%20Approach%20for%20Radar%20Scene%20Understanding%0AAuthor%3A%20Pushkal%20Mishra%20and%20Kshitiz%20Bansal%20and%20Dinesh%20Bharadia%0AAbstract%3A%20Radar%20sensors%20provide%20reliable%20perception%20across%20adverse%20weather%2C%20lighting%2C%20and%20long-range%20conditions%2C%20yet%20existing%20machine%20learning%20approaches%20remain%20fragmented%20and%20task-specific%2C%20with%20each%20downstream%20task%20employing%20distinct%20architectures%20and%20training%20objectives.%20We%20present%20RadarVLM%2C%20a%20vision-language%20framework%20that%20learns%20unified%20scene-level%20representations%20through%20structured%20spatial%20language%20supervision.%20Leveraging%20the%20CARLA%20simulator%20with%20a%20realistic%20radar%20model%2C%20we%20collect%20over%20800k%20radar-caption%20pairs%20across%20110%2B%20hours%20of%20simulated%20driving%20in%20diverse%20scenarios.%20We%20make%20two%20key%20contributions%3A%20%281%29%20a%20structured%20caption%20framework%20encoding%20vehicle%20distributions%20in%20the%20radar%27s%20native%20coordinate%20system%2C%20and%20%282%29%20Spatially-Grounded%20CLIP%20%28SG-CLIP%29%20objective%20that%20replaces%20binary%20matching%20with%20continuous%20scene%20similarity%2C%20enabling%20fine-grained%20spatial%20reasoning.%20We%20further%20propose%20localization-aware%20evaluation%20metrics%20that%20directly%20assess%20spatial%20accuracy%20beyond%20traditional%20linguistic%20similarity%20measures.%20Validated%20on%20generative%20captioning%20and%20vehicle%20segmentation%2C%20SG-CLIP%20achieves%20up%20to%2050%5C%25%20relative%20F1-score%20improvement%20over%20vanilla%20CLIP%20and%20a%2021%5C%25%20AP%20gain%20on%20segmentation%2C%20demonstrating%20that%20language%20grounding%20produces%20spatially%20s {"title": "FLoC: Facility Location-Based Efficient Visual Token Compression for Long Video Understanding", "author": "Janghoon Cho and Jungsoo Lee and Munawar Hayat and Kyuwoong Hwang and Fatih Porikli and Sungha Choi", "abstract": "Recent studies in long video understanding have harnessed the advanced visual-language reasoning capabilities of Large Multimodal Models (LMMs), driving the evolution of video-LMMs specialized for processing extended video sequences. However, the scalability of these models is severely limited by the overwhelming volume of visual tokens generated from extended video sequences. To address this challenge, we propose FLoC, an efficient visual token compression framework based on the facility location function, a principled approach that swiftly selects a compact yet highly representative and diverse subset of visual tokens within a predefined budget on the number of visual tokens. By integrating the lazy greedy algorithm, our method achieves remarkable efficiency gains by swiftly selecting a compact subset of tokens, drastically reducing the number of visual tokens while guaranteeing near-optimal performance. Notably, our approach is training-free, model-agnostic, and query-agnostic, providing a versatile solution that seamlessly integrates with diverse video-LLMs and existing workflows. Extensive evaluations on large-scale benchmarks, such as Video-MME, MLVU, LongVideoBench, and EgoSchema, show that our framework consistently surpasses recent compression techniques, highlighting its effectiveness and robustness in addressing the challenges of long video understanding as well as its processing efficiency.", "link": "http://arxiv.org/abs/2511.00141v2", "date": "2026-03-05", "relevancy": 2.8876, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5905}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n %20a%20versatile%20solution%20that%20seamlessly%20integrates%20with%20diverse%20video-LLMs%20and%20existing%20workflows.%20Extensive%20evaluations%20on%20large-scale%20benchmarks%2C%20such%20as%20Video-MME%2C%20MLVU%2C%20LongVideoBench%2C%20and%20EgoSchema%2C%20show%20that%20our%20framework%20consistently%20surpasses%20recent%20compression%20techniques%2C%20highlighting%20its%20effectiveness%20and%20robustness%20in%20addressing%20the%20challenges%20of%20long%20video%20understanding%20as%20well%20as%20its%20processing%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2511.00141v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFLoC%253A%2520Facility%2520Location-Based%2520Efficient%2520Visual%2520Token%2520Compression%2520for%2520Long%2520Video%2520Understanding%26entry.906535625%3DJanghoon%2520Cho%2520and%2520Jungsoo%2520Lee%2520and%2520Munawar%2520Hayat%2520and%2520Kyuwoong%2520Hwang%2520and%2520Fatih%2520Porikli%2520and%2520Sungha%2520Choi%26entry.1292438233%3DRecent%2520studies%2520in%2520long%2520video%2520understanding%2520have%2520harnessed%2520the%2520advanced%2520visual-language%2520reasoning%2520capabilities%2520of%2520Large%2520Multimodal%2520Models%2520%2528LMMs%2529%252C%2520driving%2520the%2520evolution%2520of%2520video-LMMs%2520specialized%2520for%2520processing%2520extended%2520video%2520sequences.%2520However%252C%2520the%2520scalability%2520of%2520these%2520models%2520is%2520severely%2520limited%2520by%2520the%2520overwhelming%2520volume%2520of%2520visual%2520tokens%2520generated%2520from%2520extended%2520video%2520sequences.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520FLoC%252C%2520an%2520efficient%2520visual%2520token%2520compression%2520framework%2520based%2520on%2520the%2520facility%2520location%2520function%252C%2520a%2520principled%2520approach%2520that%2520swiftly%2520selects%2520a%2520compact%2520yet%2520highly%2520representative%2 {"title": "Enhancing Zero-shot Commonsense Reasoning by Integrating Visual Knowledge via Machine Imagination", "author": "Hyuntae Park and Yeachan Kim and SangKeun Lee", "abstract": "Recent advancements in zero-shot commonsense reasoning have empowered Pre-trained Language Models (PLMs) to acquire extensive commonsense knowledge without requiring task-specific fine-tuning. Despite this progress, these models frequently suffer from limitations caused by human reporting biases inherent in textual knowledge, leading to understanding discrepancies between machines and humans. To bridge this gap, we introduce an additional modality to enrich the reasoning capabilities of PLMs. We propose Imagine (Machine Imagination-based Reasoning), a novel zero-shot commonsense reasoning framework that supplements textual inputs with visual signals from machine-generated images. Specifically, we enhance PLMs with the ability to imagine by embedding an image generator directly into the reasoning pipeline. To facilitate effective utilization of this imagined visual context, we construct synthetic datasets designed to emulate visual question-answering scenarios. Through comprehensive evaluations on multiple commonsense reasoning benchmarks, we demonstrate that Imagine substantially outperforms existing zero-shot approaches and even surpasses advanced large language models. These results underscore the capability of machine imagination to mitigate reporting bias and significantly enhance the generalization ability of commonsense reasoning models", "link": "http://arxiv.org/abs/2603.05040v1", "date": "2026-03-05", "relevancy": 2.883, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.588}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.588}, {"title": "Genie: Generative I {"title": "MambaTAD: When State-Space Models Meet Long-Range Temporal Action Detection", "author": "Hui Lu and Yi Yu and Shijian Lu and Deepu Rajan and Boon Poh Ng and Alex C. Kot and Xudong Jiang", "abstract": "Temporal Action Detection (TAD) aims to identify and localize actions by determining their starting and ending frames within untrimmed videos. Recent Structured State-Space Models such as Mamba have demonstrated potential in TAD due to their long-range modeling capability and linear computational complexity. On the other hand, structured state-space models often face two key challenges in TAD, namely, decay of temporal context due to recursive processing and self-element conflict during global visual context modeling, which become more severe while handling long-span action instances. Additionally, traditional methods for TAD struggle with detecting long-span action instances due to a lack of global awareness and inefficient detection heads. This paper presents MambaTAD, a new state-space TAD model that introduces long-range modeling and global feature detection capabilities for accurate temporal action detection. MambaTAD comprises two novel designs that complement each other with superior TAD performance. First, it introduces a Diagonal-Masked Bidirectional State-Space (DMBSS) module which effectively facilitates global feature fusion and temporal action detection. Second, it introduces a global feature fusion head that refines the detection progressively with multi-granularity features and global awareness. In addition, MambaTAD tackles TAD in an end-to-end one-stage manner using a new state-space temporal adapter(SSTA) which reduces network parameters and computation cost with linear complexity. Extensive experiments show that MambaTAD achieves superior TAD performance consistently across multiple public benchmarks.", "link": "http://arxiv.org/abs/2511.17929v2", "date": "2026-03-05", "relevancy": 2.862, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.6058}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5819}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5294}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MambaTAD%3A%20When%20State-Space%20Models%20Meet%20Long-Range%20Temporal%20Action%20Detection&body=Title%3A%20MambaTAD%3A%20When%20State-Space%20Models%20Meet%20Long-Range%20Temporal%20Action%20Detection%0AAuthor%3A%20Hui%20Lu%20and%20Yi%20Yu%20and%20Shijian%20Lu%20and%20Deepu%20Rajan%20and%20Boon%20Poh%20Ng%20and%20Alex%20C.%20Kot%20and%20Xudong%20Jiang%0AAbstract%3A%20Temporal%20Action%20Detection%20%28TAD%29%20aims%20to%20identify%20and%20localize%20actions%20by%20determining%20their%20starting%20and%20ending%20frames%20within%20untrimmed%20videos.%20Recent%20Structured%20State-Space%20Models%20such%20as%20Mamba%20have%20demonstrated%20potential%20in%20TAD%20due%20to%20their%20long-range%20modeling%20capability%20and%20linear%20computational%20complexity.%20On%20the%20other%20hand%2C%20structured%20state-space%20models%20often%20face%20two%20key%20challenges%20in%20TAD%2C%20namely%2C%20decay%20of%20temporal%20context%20due%20to%20recursive%20processing%20and%20self-element%20conflict%20during%20global%20visual%20context%20modeling%2C%20which%20become%20more%20severe%20while%20handling%20long-span%20action%20instances.%20Additionally%2C%20traditional%20methods%20for%20TAD%20struggle%20with%20detecting%20long-span%20action%20instances%20due%20to%20a%20lack%20of%20global%20awareness%20and%20inefficient%20detection%20heads.%20This%20paper%20presents%20MambaTAD%2C%20a%20new%20state-space%20TAD%20model%20that%20introduces%20long-range%20modeling%20and%20global%20feature%20detection%20capabilities%20for%20accurate%20temporal%20action%20detection.%20MambaTAD%20comprises%20two%20novel%20designs%20that%20complement%20each%20other%20with%20superior%20TAD%20performance.%20First%2C%20it%20introduces%20a%20Diagonal-Masked%20Bidirectional%20State-Space%20%28DMBSS%29%20module%20which%20effectively%20facilitates%20global%20feature%20fusion%20and%20temporal%20action%20detection.%20Second%2C%20it%20introduces%20a%20global%20feature%20fusion%20head%20that%20refines%20the%20detection%20progressively%20with%20multi-granularity%20features%20and%20global%20awareness.%20In%20addition%2C%20MambaTAD%20tackles%20TAD%20in%20an%20end-to-end%20one-stage%20manner%20using%20a%20new%20state-space%20temporal%20adapter%28SSTA%29%20which%20reduces%20network%20parameters%20and%20computation%20cost%20with%20linear%20complexity.%20Extensive%20experiments%20show%20that%20MambaTAD%20achieves%20superior%20TAD%20performance%20consistently%20across%20multiple%20public%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2511.17929v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMambaTAD%253A%2520When%2520State-Space%2520Models%2520Meet%2520Long-Range%2520Temporal%2520Action%2520Detection%26entry.906535625%3DHui%2520Lu%2520and%2520Yi%2520Yu%2520and%2520Shijian%2520Lu%2520and%2520Deepu%2520Rajan%2520and%2520Boon%2520Poh%2520Ng%2520and%2520Alex%2520C.%2520Kot%2520and%2520Xudong%2520Jiang%26entry.1292438233%3DTemporal%2520Action%2520Detection%2520%2528TAD%2529%2520aims%2520to%2520identify%2520and%2520localize%2520actions%2520by%2520determining%2520their%2520starting%2520and%2520ending%2520frames%2520within%2520untrimmed%2520videos.%2520Recent%2520Structured%2520State-Space%2520Models%2520such%2520as%2520Mamba%2520have%2520demonstrated%2520potential%2520in%2520TAD%2520due%2520to%2520their%2520long-range%2520modeling%2520capability%2520and%2520linear%2520computatio {"title": "ReactDance: Hierarchical Representation for High-Fidelity and Coherent Long-Form Reactive Dance Generation", "author": "Jingzhong Lin and Xinru Li and Yuanyuan Qi and Bohao Zhang and Wenxiang Liu and Kecheng Tang and Wenxuan Huang and Xiangfeng Xu and Bangyan Li and Changbo Wang and Gaoqi He", "abstract": "Reactive dance generation (RDG), the task of generating a dance conditioned on a lead dancer's motion, holds significant promise for enhancing human-robot interaction and immersive digital entertainment. Despite progress in duet synchronization and motion-music alignment, two key challenges remain: generating fine-grained spatial interactions and ensuring long-term temporal coherence. In this work, we introduce \\textbf{ReactDance}, a diffusion framework that operates on a novel hierarchical latent space to address these spatiotemporal challenges in RDG. First, for high-fidelity spatial expression and fine-grained control, we propose Hierarchical Finite Scalar Quantization (\\textbf{HFSQ}). This multi-scale motion representation effectively disentangles coarse body posture from subtle limb dynamics, enabling independent and detailed control over both aspects through a layered guidance mechanism. Second, to efficiently generate long sequences with high temporal coherence, we propose Blockwise Local Context (\\textbf{BLC}), a non-autoregressive sampling strategy. Departing from slow, frame-by-frame generation, BLC partitions the sequence into blocks and synthesizes them in parallel via periodic causal masking and positional encodings. Coherence across these blocks is ensured by a dense sliding-window training approach that enriches the representation with local temporal context. Extensive experiments show that ReactDance substantially outperforms state-of-the-art methods in motion quality, long-term coherence, and sampling efficiency. Project page: https://ripemangobox.github.io/ReactDance.", "link": "http://arxiv.org/abs/2505.05589v3", "date": "2026-03-05", "relevancy": 2.8533, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6318}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5419}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5382}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReactDance%3A%20Hierarchical%20Representation%20for%20High-Fidelity%20and%20Coherent%20Long-Form%20Reactive%20Dance%20Generation&body=Title%3A%20ReactDance%3A%20Hierarchical%20Representation%20for%20High-Fidelity%20and%20Coherent%20Long-Form%20Reactive%20Dance%20Generation%0AAuthor%3A%20Jingzhong%20Lin%20and%20Xinru%20Li%20and%20Yuanyuan%20Qi%20and%20Bohao%20Zhang%20and%20Wenxiang%20Liu%20and%20Kecheng%20Tang%20and%20Wenxuan%20Huang%20and%20Xiangfeng%20Xu%20and%20Bangyan%20Li%20and%20Changbo%20Wang%20and%20Gaoqi%20He%0AAbstract%3A%20Reactive%20dance%20generation%20%28RDG%29%2C%20the%20task%20of%20generating%20a%20dance%20conditioned%20on%20a%20lead%20dancer%27s%20motion%2C%20holds%20significant%20promise%20for%20enhancing%20human-robot%20interaction%20and%20immersive%20digital%20entertainment.%20Despite%20progress%20in%20duet%20synchronization%20and%20motion-music%20alignment%2C%20two%20key%20challenges%20remain%3A%20generating%20fine-grained%20spatial%20interactions%20and%20ensuring%20long-term%20temporal%20coherence.%20In%20this%20work%2C%20we%20introduce%20%5Ctextbf%7BReactDance%7D%2C%20a%20diffusion%20framework%20that%20operates%20on%20a%20novel%20hierarchical%20latent%20space%20to%20address%20these%20spatiotemporal%20challenges%20in%20RDG.%20First%2C%20for%20high-fidelity%20spatial%20expression%20and%20fine-grained%20control%2C%20we%20propose%20Hierarchical%20Finite%20Scalar%20Quantization%20%28%5Ctextbf%7BHFSQ%7D%29.%20This%20multi-scale%20motion%20representation%20effectively%20disentangles%20coarse%20body%20posture%20from%20subtle%20limb%20dynamics%2C%20enabling%20independent%20and%20detailed%20control%20over%20both%20aspects%20through%20a%20layered%20guidance%20mechanism.%20Second%2C%20to%20efficiently%20generate%20long%20sequences%20with%20high%20temporal%20coherence%2C%20we%20propose%20Blockwise%20Local%20Context%20%28%5Ctextbf%7BBLC%7D%29%2C%20a%20non-autoregressive%20sampling%20strategy.%20Departing%20from%20slow%2C%20frame-by-frame%20generation%2C%20BLC%20partitions%20the%20sequence%20into%20blocks%20and%20synthesizes%20them%20in%20parallel%20via%20periodic%20causal%20masking%20and%20positional%20encodings.%20Coherence%20across%20these%20blocks%20is%20ensured%20by%20a%20dense%20sliding-window%20training%20approach%20that%20enriches%20the%20representation%20with%20local%20temporal%20context.%20Extensive%20experiments%20show%20that%20ReactDance%20substantially%20outperforms%20state-of-the-art%20methods%20in%20motion%20quality%2C%20long-term%20coherence%2C%20and%20sampling%20efficiency.%20Project%20page%3A%20https%3A//ripemangobox.github.io/ReactDance.%0ALink%3A%20http%3A//arxiv.org/abs/2505.05589v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReactDance%253A%2520Hierarchical%2520Representation%2520for%2520High-Fidelity%2520and%2520Coherent%2520Long-Form%2520Reactive%2520Dance%2520Generation%26entry.906535625%3DJingzhong%2520Lin%2520and%2520Xinru%2520Li%2520and%2520Yuanyuan%2520Qi%2520and%2520Bohao%2520Zhang%2520and%2520Wenxiang%2520Liu%2520and%2520Kecheng%2520Tang%2520and%2520Wenxuan%2520Huang%2520and%2520Xiangfeng%2520Xu%2520and%2520Bangyan%2520Li%2520and%2520Changbo%2520Wang%2520and%2520Gaoqi%2520He%26entry.1292438233%3DReactive%2520dance%2520generation%2520%2528RDG%2529%252C%2520the%2520task%2520of%2520generating%2520a%2520dance%2520conditioned%2520on%2520a%2520lead%2520dancer%2527s%2520motion%252C%2520h {"title": "Towards Multimodal Lifelong Understanding: A Dataset and Agentic Baseline", "author": "Guo Chen and Lidong Lu and Yicheng Liu and Liangrui Dong and Lidong Zou and Jixin Lv and Zhenquan Li and Xinyi Mao and Baoqi Pei and Shihao Wang and Zhiqi Li and Karan Sapra and Fuxiao Liu and Yin-Dong Zheng and Yifei Huang and Limin Wang and Zhiding Yu and Andrew Tao and Guilin Liu and Tong Lu", "abstract": "While datasets for video understanding have scaled to hour-long durations, they typically consist of densely concatenated clips that differ from natural, unscripted daily life. To bridge this gap, we introduce MM-Lifelong, a dataset designed for Multimodal Lifelong Understanding. Comprising 181.1 hours of footage, it is structured across Day, Week, and Month scales to capture varying temporal densities. Extensive evaluations reveal two critical failure modes in current paradigms: end-to-end MLLMs suffer from a Working Memory Bottleneck due to context saturation, while representative agentic baselines experience Global Localization Collapse when navigating sparse, month-long timelines. To address this, we propose the Recursive Multimodal Agent (ReMA), which employs dynamic memory management to iteratively update a recursive belief state, significantly outperforming existing methods. Finally, we establish dataset splits designed to isolate temporal and domain biases, providing a rigorous foundation for future research in supervised learning and out-of-distribution generalization.", "link": "http://arxiv.org/abs/2603.05484v1", "date": "2026-03-05", "relevancy": 2.8388, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5895}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5569}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understan {"title": "Loop Closure via Maximal Cliques in 3D LiDAR-Based SLAM", "author": "Javier Laserna and Saurabh Gupta and Oscar Martinez Mozos and Cyrill Stachniss and Pablo San Segundo", "abstract": "Reliable loop closure detection remains a critical challenge in 3D LiDAR-based SLAM, especially under sensor noise, environmental ambiguity, and viewpoint variation conditions. RANSAC is often used in the context of loop closures for geometric model fitting in the presence of outliers. However, this approach may fail, leading to map inconsistency. We introduce a novel deterministic algorithm, CliReg, for loop closure validation that replaces RANSAC verification with a maximal clique search over a compatibility graph of feature correspondences. This formulation avoids random sampling and increases robustness in the presence of noise and outliers. We integrated our approach into a real- time pipeline employing binary 3D descriptors and a Hamming distance embedding binary search tree-based matching. We evaluated it on multiple real-world datasets featuring diverse LiDAR sensors. The results demonstrate that our proposed technique consistently achieves a lower pose error and more reliable loop closures than RANSAC, especially in sparse or ambiguous conditions. Additional experiments on 2D projection-based maps confirm its generality across spatial domains, making our approach a robust and efficient alternative for loop closure detection.", "link": "http://arxiv.org/abs/2603.05397v1", "date": "2026-03-05", "relevancy": 2.8244, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5851}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5617}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "htt nd%20efficient%20alternative%20for%20loop%20closure%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05397v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoop%2520Closure%2520via%2520Maximal%2520Cliques%2520in%25203D%2520LiDAR-Based%2520SLAM%26entry.906535625%3DJavier%2520Laserna%2520and%2520Saurabh%2520Gupta%2520and%2520Oscar%2520Martinez%2520Mozos%2520and%2520Cyrill%2520Stachniss%2520and%2520Pablo%2520San%2520Segundo%26entry.1292438233%3DReliable%2520loop%2520closure%2520detection%2520remains%2520a%2520critical%2520challenge%2520in%25203D%2520LiDAR-based%2520SLAM%252C%2520especially%2520under%2520sensor%2520noise%252C%2520environmental%2520ambiguity%252C%2520and%2520viewpoint%2520variation%2520conditions.%2520RANSAC%2520is%2520often%2520used%2520in%2520the%2520context%2520of%2520loop%2520closures%2520for%2520geometric%2520model%2520fitting%2520in%2520the%2520presence%2520of%2520outliers.%2520However%252C%2520this%2520approach%2520may%2520fail%252C%2520leading%2520to%2520map%2520inconsistency.%2520We%2520introduce%2520a%2520novel%2520deterministic%2520algorithm%252C%2520CliReg%252C%2520for%2520loop%2520closure%2520validation%2520that%2520replaces%2520RANSAC%2520verification%2520with%2520a%2520maximal%2520clique%2520search%2520over%2520a%2520compatibility%2520graph%2520of%2520feature%2520correspondences.%2520This%2520formulation%2520avoids%2520random%2520sampling%2520and%2520increases%2520robustness%2520in%2520the%2520presence%2520of%2520noise%2520and%2520outliers.%2520We%2520integrated%2520our%2520approach%2520into%2520a%2520real-%2520time%2520pipeline%2520employing%2520binary%25203D%2520descriptors%2520and%2520a%2520Hamming%2520distance%2520embedding%2520binary%2520search%2520tree-based%2520matching.%2520We%2520evaluated%2520it%2520on%2520multiple%2520real-world%2520datasets%2520featuring%2520diverse%2520LiDAR%2520sensors.%2520The%2520results%2520demonstrate%2520that%2520 {"title": "Dr. Seg: Revisiting GRPO Training for Visual Large Language Models through Perception-Oriented Design", "author": "Haoxiang Sun and Tao Wang and Chenwei Tang and Li Yuan and Jiancheng Lv", "abstract": "Following the success of Group Relative Policy Optimization (GRPO) in foundation LLMs, an increasing number of works have sought to adapt GRPO to Visual Large Language Models (VLLMs) for visual perception tasks (e.g., detection and segmentation). However, much of this line of research rests on a long-standing yet unexamined assumption: training paradigms developed for language reasoning can be transferred seamlessly to visual perception. Our experiments show that this assumption is not valid, revealing intrinsic differences between reasoning-oriented and perception-oriented settings. Using reasoning segmentation as a representative case, we surface two overlooked factors: (i) the need for a broader output space, and (ii) the importance of fine-grained, stable rewards. Building on these observations, we propose Dr.~Seg, a simple, plug-and-play GRPO-based framework consisting of a Look-to-Confirm mechanism and a Distribution-Ranked Reward module, requiring no architectural modifications and integrating seamlessly with existing GRPO-based VLLMs. Extensive experiments demonstrate that Dr.~Seg improves performance in complex visual scenarios while maintaining strong generalization. Code, models, and datasets are available at https://github.com/eVI-group-SCU/Dr-Seg.", "link": "http://arxiv.org/abs/2603.00152v2", "date": "2026-03-05", "relevancy": 2.8169, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5809}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5809}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5285}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dr.%20Seg%3A%20Revisiting%20GRPO%20Training%20for%20Visual%20Large%20Language%20Models%20through%20Perception-Oriented%20Design&body=Title%3A%20Dr.%20Seg%3A%20Revisiting%20GRPO%20Training%20for%20Visual%20Large%20Language%20Models%20through%20Perception-Oriented%20Design%0AAuthor%3A%20Haoxiang%20Sun%20and%20Tao%20Wang%20and%20Chenwei%20Tang%20and%20Li%20Yuan%20and%20Jiancheng%20Lv%0AAbstract%3A%20Following%20the%20success%20of%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20in%20foundation%20LLMs%2C%20an%20increasing%20number%20of%20works%20have%20sought%20to%20adapt%20GRPO%20to%20Visual%20Large%20Language%20Models%20%28VLLMs%29%20for%20visual%20perception%20tasks%20%28e.g.%2C%20detection%20and%20segmentation%29.%20However%2C%20much%20of%20this%20line%20of%20research%20rests%20on%20a%20long-standing%20yet%20unexamined%20assumption%3A%20training%20paradigms%20developed%20for%20language%20reasoning%20can%20be%20transferred%20seamlessly%20to%20visual%20perception.%20Our%20experiments%20show%20that%20this%20assumption%20is%20not%20valid%2C%20revealing%20intrinsic%20differences%20between%20reasoning-oriented%20and%20perception-oriented%20settings.%20Using%20reasoning%20segmentation%20as%20a%20representative%20case%2C%20we%20surface%20two%20overlooked%20factors%3A%20%28i%29%20the%20need%20for%20a%20broader%20output%20space%2C%20and%20%28ii%29%20the%20importance%20of%20fine-grained%2C%20stable%20rewards.%20Building%20on%20these%20observations%2C%20we%20propose%20Dr.~Seg%2C%20a%20simple%2C%20plug-and-play%20GRPO-based%20framework%20consisting%20of%20a%20Look-to-Confirm%20mechanism%20and%20a%20Distribution-Ranked%20Reward%20module%2C%20requiring%20no%20architectural%20modifications%20and%20integrating%2 {"title": "Tell2Adapt: A Unified Framework for Source Free Unsupervised Domain Adaptation via Vision Foundation Model", "author": "Yulong Shi and Shijie Li and Ziyi Li and Lin Qi", "abstract": "Source Free Unsupervised Domain Adaptation (SFUDA) is critical for deploying deep learning models across diverse clinical settings. However, existing methods are typically designed for low-gap, specific domain shifts and cannot generalize into a unified, multi-modalities, and multi-target framework, which presents a major barrier to real-world application. To overcome this issue, we introduce Tell2Adapt, a novel SFUDA framework that harnesses the vast, generalizable knowledge of the Vision Foundation Model (VFM). Our approach ensures high-fidelity VFM prompts through Context-Aware Prompts Regularization (CAPR), which robustly translates varied text prompts into canonical instructions. This enables the generation of high-quality pseudo-labels for efficiently adapting the lightweight student model to target domain. To guarantee clinical reliability, the framework incorporates Visual Plausibility Refinement (VPR), which leverages the VFM's anatomical knowledge to re-ground the adapted model's predictions in target image's low-level visual features, effectively removing noise and false positives. We conduct one of the most extensive SFUDA evaluations to date, validating our framework across 10 domain adaptation directions and 22 anatomical targets, including brain, cardiac, polyp, and abdominal targets. Our results demonstrate that Tell2Adapt consistently outperforms existing approaches, achieving SOTA for a unified SFUDA framework in medical image segmentation. Code are avaliable at https://github.com/derekshiii/Tell2Adapt.", "link": "http://arxiv.org/abs/2603.05012v1", "date": "2026-03-05", "relevancy": 2.8116, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5837}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5516}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5516}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tell2Adapt%3A%20A%20Unified%20Framework%20for%20Source%20Free%20Unsupervised%20Domain%20Adaptation%20via%20Vision%20Foundation%20Model&body=Title%3A%20Tell2Adapt%3A%20A%20Unified%20Framework%20for%20Source%20Free%20Unsupervised%20Domain%20Adaptation%20via%20Vision%20Foundation%20Model%0AAuthor%3A%20Yulong%20Shi%20and%20Shijie%20Li%20and%20Ziyi%20Li%20and%20Lin%20Qi%0AAbstract%3A%20Source%20Free%20Unsupervised%20Domain%20Adaptation%20%28SFUDA%29%20is%20critical%20for%20deploying%20deep%20learning%20models%20across%20diverse%20clinical%20settings.%20However%2C%20existing%20methods%20are%20typically%20designed%20for%20low-gap%2C%20specific%20domain%20shifts%20and%20cannot%20generalize%20into%20a%20unified%2C%20multi-modalities%2C%20and%20multi-target%20framework%2C%20which%20presents%20a%20major%20barrier%20to%20real-world%20application.%20To%20overcome%20this%20issue%2C%20we%20introduce%20Tell2Adapt%2C%20a%20novel%20SFUDA%20framework%20that%20harnesses%20the%20vast%2C%20generalizable%20knowledge%20of%20the%20Vision%20Foundation%20Model%20%28VFM%29.%20Our%20approach%20ensures%20high-fidelity%20VFM%20prompts%20through%20Context-Aware%20Prompts%20Regularization%20%28CAPR%29%2C%20which%20robustly%20translates%20varied%20text%20prompts%20into%20canonical%20instructions.%20This%20enables%20the%20generation%20of%20high-quality%20pseudo-labels%20for%20efficiently%20adapting%20the%20lightweight%20student%20model%20to%20target%20domain.%20To%20guarantee%20clinical%20reliability%2C%20the%20framework%20incorporates%20Visual%20Plausibility%20Refinement%20%28VPR%29%2C%20which%20leverages%20the%20VFM%27s%20anatomical%20knowledge%20to%20re-ground%20the%20adapted%20model%27s%20predictions%20in%20target%20image%27s%20low-level%20visual%20features%2C%20effectively%20removing%20noise%20and%20false%20positives.%20We%20conduct%20one%20of%20the%20most%20extensive%20SFUDA%20evaluations%20to%20date%2C%20validating%20our%20framework%20across%2010%20domain%20adaptation%20directions%20and%2022%20anatomical%20targets%2C%20including%20brain%2C%20cardiac%2C%20polyp%2C%20and%20abdominal%20targets.%20Our%20results%20demonstrate%20that%20Tell2Adapt%20consistently%20outperforms%20existing%20approaches%2C%20achieving%20SOTA%20for%20a%20unified%20SFUDA%20framework%20in%20medical%20image%20segmentation.%20Code%20are%20avaliable%20at%20https%3A//github.com/derekshiii/Tell2Adapt.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05012v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTell2Adapt%253A%2520A%2520Unified%2520Framework%2520for%2520Source%2520Free%2520Unsupervised%2520Domain%2520Adaptation%2520via%2520Vision%2520Foundation%2520Model%26entry.906535625%3DYulong%2520Shi%2520and%2520Shijie%2520Li%2520and%2520Ziyi%2520Li%2520and%2520Lin%2520Qi%26entry.1292438233%3DSource%2520Free%2520Unsupervised%2520Domain%2520Adaptation%2520%2528SFUDA%2529%2520is%2520critical%2520for%2520deploying%2520deep%2520learning%2520models%2520across%2520diverse%2520clinical%2520settings.%2520However%252C%2520existing%2520methods%2520are%2520typically%2520designed%2520for%2520low-gap%252C%2520specific%2520domain%2520shifts%2520and%2520cannot%2520generalize%2520into%2520a%2520unified%252C%2520multi-modalities%252C%2520and%2520multi-target%2520framework%252C%2520which%2520presents%2520a%2520major%2520barrier%2520to%2520real-world%2520application.%2520To%2520overcome%2520this%2520issue%252C%2520we%2520introduce%2520Tell2Adapt%252C%2520a%2520novel%2520SFUDA%2520framework%2520that%2520harnesses%2520the%2520vast%252C%2520generalizable%2520know {"title": "ICHOR: A Robust Representation Learning Approach for ASL CBF Maps with Self-Supervised Masked Autoencoders", "author": "Xavier Beltran-Urbano and Yiran Li and Xinglin Zeng and Katie R. Jobson and Manuel Taso and Christopher A. Brown and David A. Wolk and Corey T. McMillan and Ilya M. Nashrallah and Paul A. Yushkevich and Ze Wang and John A. Detre and Sudipto Dolui", "abstract": "Arterial spin labeling (ASL) perfusion MRI allows direct quantification of regional cerebral blood flow (CBF) without exogenous contrast, enabling noninvasive measurements that can be repeated without constraints imposed by contrast injection. ASL is increasingly acquired in research studies and clinical MRI protocols. Building on successes in structural imaging, recent efforts have implemented deep learning based methods to improve image quality, enable automated quality control, and derive robust quantitative and predictive biomarkers with ASL derived CBF. However, progress has been limited by variable image quality, substantial inter-site, vendor and protocol differences, and limited availability of labeled datasets needed to train models that generalize across cohorts. To address these challenges, we introduce ICHOR, a self supervised pre-training approach for ASL CBF maps that learns transferable representations using 3D masked autoencoders. ICHOR is pretrained via masked image modeling using a Vision Transformer backbone and can be used as a general-purpose encoder for downstream ASL tasks. For pre-training, we curated one of the largest ASL datasets to date, comprising 11,405 ASL CBF scans from 14 studies spanning multiple sites and acquisition protocols. We evaluated the pre-trained ICHOR encoder on three downstream diagnostic classification tasks and one ASL CBF map quality prediction regression task. Across all evaluations, ICHOR outperformed existing neuroimaging self-supervised pre-training methods adapted to ASL. Pre-trained weights and code will be made publicly available.", "link": "http://arxiv.org/abs/2603.05247v1", "date": "2026-03-05", "relevancy": 2.7954, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5829}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5555}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ICHOR%3A%20A%20Robust%20Representation%20Learning%20Approach%20for%20ASL%20CBF%20Maps%20with%20Self-Supervised%20Masked%20Autoencoders&body=Title%3A%20ICHOR%3A%20A%20Robust%20Representation%20Learning%20Approach%20for%20ASL%20CBF%20Maps%20with%20Self-Supervised%20Masked%20Autoencoders%0AAuthor%3A%20Xavier%20Beltran-Urbano%20and%20Yiran%20Li%20and%20Xinglin%20Zeng%20and%20Katie%20R.%20Jobson%20and%20Manuel%20Taso%20and%20Christopher%20A.%20Brown%20and%20David%20A.%20Wolk%20and%20Corey%20T.%20McMillan%20and%20Ilya%20M.%20Nashrallah%20and%20Paul%20A.%20Yushkevich%20and%20Ze%20Wang%20and%20John%20A.%20Detre%20and%20Sudipto%20Dolui%0AAbstract%3A%20Arterial%20spin%20labeling%20%28ASL%29%20perfusion%20MRI%20allows%20direct%20quantification%20of%20regional%20cerebral%20blood%20flow%20%28CBF%29%20without%20exogenous%20contrast%2C%20enabling%20noninvasive%20measurements%20that%20can%20be%20repeated%20without%20constraints%20imposed%20by%20contrast%20injection.%20ASL%20is%20increasingly%20acquired%20in%20research%20studies%20and%20clinical%20MRI%20protocols.%20Building%20on%20successes%20in%20structural%20imaging%2C%20recent%20efforts%20have%20implemented%20deep%20learning%20based%20methods%20to%20improve%20image%20quality%2C%20enable%20automated%20quality%20control%2C%20and%20derive%20robust%20quantitative%20and%20predictive%20biomarkers%20with%20ASL%20derived%20CBF.%20However%2C%20progress%20has%20been%20limited%20by%20variable%20image%20quality%2C%20substantial%20inter-site%2C%20vendor%20and%20protocol%20differences%2C%20and%20limited%20availability%20of%20labeled%20datasets%20needed%20to%20train%20models%20that%20generalize%20across%20cohorts.%20To%20address%20these%20challenges%2C%20we%20introduce%20ICHOR%2C%20a%20self%20supervised%20pre-training%20approach%20for%20ASL%20CBF%20maps%20that%20learns%20transferable%20representations%20using%203D%20masked%20autoencoders.%20ICHOR%20is%20pretrained%20via%20masked%20image%20modeling%20using%20a%20Vision%20Transformer%20backbone%20and%20can%20be%20used%20as%20a%20general-purpose%20encoder%20for%20downstream%20ASL%20tasks.%20For%20pre-training%2C%20we%20curated%20one%20of%20the%20largest%20ASL%20datasets%20to%20date%2C%20comprising%2011%2C405%20ASL%20CBF%20scans%20from%2014%20studies%20spanning%20multiple%20sites%20and%20acquisition%20protocols.%20We%20evaluated%20the%20pre-trained%20ICHOR%20encoder%20on%20three%20downstream%20diagnostic%20classification%20tasks%20and%20one%20ASL%20CBF%20map%20quality%20prediction%20regression%20task.%20Across%20all%20evaluations%2C%20ICHOR%20outperformed%20existing%20neuroimaging%20self-supervised%20pre-training%20methods%20adapted%20to%20ASL.%20Pre-trained%20weights%20and%20code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05247v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DICHOR%253A%2520A%2520Robust%2520Representation%2520Learning%2520Approach%2520for%2520ASL%2520CBF%2520Maps%2520with%2520Self-Supervised%2520Masked%2520Autoencoders%26entry.906535625%3DXavier%2520Beltran-Urbano%2520and%2520Yiran%2520Li%2520and%2520Xinglin%2520Zeng%2520and%2520Katie%2520R.%2520Jobson%2520and%2520Manuel%2520Taso%2520and%2520Christopher%2520A.%2520Brown%2520and%2520David%2520A.%2520Wolk%2520and%2520Corey%2520T.%252 {"title": "Towards 3D Scene Understanding of Gas Plumes in LWIR Hyperspectral Images Using Neural Radiance Fields", "author": "Scout Jarman and Zigfried Hampel-Arias and Adra Carr and Kevin R. Moon", "abstract": "Hyperspectral images (HSI) have many applications, ranging from environmental monitoring to national security, and can be used for material detection and identification. Longwave infrared (LWIR) HSI can be used for gas plume detection and analysis. Oftentimes, only a few images of a scene of interest are available and are analyzed individually. The ability to combine information from multiple images into a single, cohesive representation could enhance analysis by providing more context on the scene's geometry and spectral properties. Neural radiance fields (NeRFs) create a latent neural representation of volumetric scene properties that enable novel-view rendering and geometry reconstruction, offering a promising avenue for hyperspectral 3D scene reconstruction. We explore the possibility of using NeRFs to create 3D scene reconstructions from LWIR HSI and demonstrate that the model can be used for the basic downstream analysis task of gas plume detection. The physics-based DIRSIG software suite was used to generate a synthetic multi-view LWIR HSI dataset of a simple facility with a strong sulfur hexafluoride gas plume. Our method, built on the standard Mip-NeRF architecture, combines state-of-the-art methods for hyperspectral NeRFs and sparse-view NeRFs, along with a novel adaptive weighted MSE loss. Our final NeRF method requires around 50% fewer training images than the standard Mip-NeRF and achieves an average PSNR of 39.8 dB with as few as 30 training images. Gas plume detection applied to NeRF-rendered test images using the adaptive coherence estimator achieves an average AUC of 0.821 when compared with detection masks generated from ground-truth test images.", "link": "http://arxiv.org/abs/2603.05473v1", "date": "2026-03-05", "relevancy": 2.7866, "top te%203D%20scene%20reconstructions%20from%20LWIR%20HSI%20and%20demonstrate%20that%20the%20model%20can%20be%20used%20for%20the%20basic%20downstream%20analysis%20task%20of%20gas%20plume%20detection.%20The%20physics-based%20DIRSIG%20software%20suite%20was%20used%20to%20generate%20a%20synthetic%20multi-view%20LWIR%20HSI%20dataset%20of%20a%20simple%20facility%20with%20a%20strong%20sulfur%20hexafluoride%20gas%20plume.%20Our%20method%2C%20built%20on%20the%20standard%20Mip-NeRF%20architecture%2C%20combines%20state-of-the-art%20methods%20for%20hyperspectral%20NeRFs%20and%20sparse-view%20NeRFs%2C%20along%20with%20a%20novel%20adaptive%20weighted%20MSE%20loss.%20Our%20final%20NeRF%20method%20requires%20around%2050%25%20fewer%20training%20images%20than%20the%20standard%20Mip-NeRF%20and%20achieves%20an%20average%20PSNR%20of%2039.8%20dB%20with%20as%20few%20as%2030%20training%20images.%20Gas%20plume%20detection%20applied%20to%20NeRF-rendered%20test%20images%20using%20the%20adaptive%20coherence%20estimator%20achieves%20an%20average%20AUC%20of%200.821%20when%20compared%20with%20detection%20masks%20generated%20from%20ground-truth%20test%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05473v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%25203D%2520Scene%2520Understanding%2520of%2520Gas%2520Plumes%2520in%2520LWIR%2520Hyperspectral%2520Images%2520Using%2520Neural%2520Radiance%2520Fields%26entry.906535625%3DScout%2520Jarman%2520and%2520Zigfried%2520Hampel-Arias%2520and%2520Adra%2520Carr%2520and%2520Kevin%2520R.%2520Moon%26entry.1292438233%3DHyperspectral%2520images%2520%2528HSI%2529%2520have%2520many%2520applications%252C%2520ranging%2520from%2520environmental%2520monitoring%2520to%2520national%2520security%252C%2520and%2520can%2520be%2520used%2520for%2520material%2520detection%2520and%2520identification.%2520Longwave%2520infrared%2520%2528LWIR%2529%2520HSI%2520can%2520be%2520used%2520for%25 {"title": "ORMOT: A Dataset and Framework for Omnidirectional Referring Multi-Object Tracking", "author": "Sijia Chen and Zihan Zhou and Yanqiu Yu and En Yu and Wenbing Tao", "abstract": "Multi-Object Tracking (MOT) is a fundamental task in computer vision, aiming to track targets across video frames. Existing MOT methods perform well in general visual scenes, but face significant challenges and limitations when extended to visual-language settings. To bridge this gap, the task of Referring Multi-Object Tracking (RMOT) has recently been proposed, which aims to track objects that correspond to language descriptions. However, current RMOT methods are primarily developed on datasets captured by conventional cameras, which suffer from limited field of view. This constraint often causes targets to move out of the frame, leading to fragmented tracking and loss of contextual information. In this work, we propose a novel task, called Omnidirectional Referring Multi-Object Tracking (ORMOT), which extends RMOT to omnidirectional imagery, aiming to overcome the field-of-view (FoV) limitation of conventional datasets and improve the model's ability to understand long-horizon language descriptions. To advance the ORMOT task, we construct ORSet, an Omnidirectional Referring Multi-Object Tracking dataset, which contains 27 diverse omnidirectional scenes, 848 language descriptions, and 3,401 annotated objects, providing rich visual, temporal, and language information. Furthermore, we propose ORTrack, a Large Vision-Language Model (LVLM)-driven framework tailored for Omnidirectional Referring Multi-Object Tracking. Extensive experiments on the ORSet dataset demonstrate the effectiveness of our ORTrack framework. The dataset and code will be open-sourced at https://github.com/chen-si-jia/ORMOT.", "link": "http://arxiv.org/abs/2603.05384v1", "date": "2026-03-05", "relevancy": 2.7723, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5639}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5498}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ORMOT%3A%20A%20Dataset%20and%20Framework%20for%20Omnidirectional%20Referring%20Multi-Object%20Tracking&body=Title%3A%20ORMOT%3A%20A%20Dataset%20and%20Framework%20for%20Omnidirectional%20Referring%20Multi-Object%20Tracking%0AAuthor%3A%20Sijia%20Chen%20and%20Zihan%20Zhou%20and%20Yanqiu%20Yu%20and%20En%20Yu%20and%20Wenbing%20Tao%0AAbstract%3A%20Multi-Object%20Tracking%20%28MOT%29%20is%20a%20fundamental%20task%20in%20computer%20vision%2C%20aiming%20to%20track%20targets%20across%20video%20frames.%20Existing%20MOT%20methods%20perform%20well%20in%20general%20visual%20scenes%2C%20but%20face%20significant%20challenges%20and%20limitations%20when%20extended%20to%20visual-language%20settings.%20To%20bridge%20this%20gap%2C%20the%20task%20of%20Referring%20Multi-Object%20Tracking%20%28RMOT%29%20has%20recently%20been%20proposed%2C%20which%20aims%20to%20track%20objects%20that%20correspond%20to%20language%20descriptions.%20However%2C%20current%20RMOT%20methods%20are%20primarily%20developed%20on%20datasets%20captured%20by%20conventional%20cameras%2C%20which%20suffer%20from%20limited%20field%20of%20view.%20This%20constraint%20often%20causes%20targets%20to%20move%20out%20of%20the%20frame%2C%20leading%20to%20fragmented%20tracking%20and%20loss%20of%20contextual%20information.%20In%20this%20work%2C%20we%20propose%20a%20novel%20task%2C%20called%20Omnidirectional%20Referring%20Multi-Object%20Tracking%20%28ORMOT%29%2C%20which%20extends%20RMOT%20to%20omnidirectional%20imagery%2C%20aiming%20to%20overcome%20the%20field-of-view%20%28FoV%29%20limitation%20of%20conventional%20datasets%20and%20improve%20the%20model%27s%20ability%20to%20understand%20long-horizon%20language%20descriptions.%20To%20advance%20the%20ORMOT%20task%2C%20we%20construct%20ORSet%2C%20an%20Omnidirectional%20Referring%20Multi-Object%20Tracking%20dataset%2C%20which%20contains%2027%20diverse%20omnidirectional%20scenes%2C%20848%20language%20descriptions%2C%20and%203%2C401%20annotated%20objects%2C%20providing%20rich%20visual%2C%20temporal%2C%20and%20language%20information.%20Furthermore%2C%20we%20propose%20ORTrack%2C%20a%20Large%20Vision-Language%20Model%20%28LVLM%29-driven%20framework%20tailored%20for%20Omnidirectional%20Referring%20Multi-Object%20Tracking.%20Extensive%20experiments%20on%20the%20ORSet%20dataset%20demonstrate%20the%20effectiveness%20of%20our%20ORTrack%20framework.%20The%20dataset%20and%20code%20will%20be%20open-sourced%20at%20https%3A//github.com/chen-si-jia/ORMOT.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05384v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DORMOT%253A%2520A%2520Dataset%2520and%2520Framework%2520for%2520Omnidirectional%2520Referring%2520Multi-Object%2520Tracking%26entry.906535625%3DSijia%2520Chen%2520and%2520Zihan%2520Zhou%2520and%2520Yanqiu%2520Yu%2520and%2520En%2520Yu%2520and%2520Wenbing%2520Tao%26entry.1292438233%3DMulti-Object%2520Tracking%2520%2528MOT%2529%2520is%2520a%2520fundamental%2520task%2520in%2520computer%2520vision%252C%2520aiming%2520to%2520track%2520targets%2520across%2520video%2520frames.%2520Existing%2520MOT%2520methods%2520perform%2520well%2520in%2520general%2520visual%2520scenes%252C%2520but%2520face%2520significant%2520challenges%2520and%2520limitations%2520when%2520extended%2520to%2520visual-language%2520settings.%2520To%2520bridge%2520this%2520gap%252C%2520the%2520task%2520of%2520Referring%2520Multi-Object%2520Tracking%2520%2528RMOT%2529%2520has%2520recently%2520been%2520proposed%252C%2520which%2520aims%2520to%25 {"title": "CATNet: Collaborative Alignment and Transformation Network for Cooperative Perception", "author": "Gong Chen and Chaokun Zhang and Tao Tang and Pengcheng Lv and Feng Li and Xin Xie", "abstract": "Cooperative perception significantly enhances scene understanding by integrating complementary information from diverse agents. However, existing research often overlooks critical challenges inherent in real-world multi-source data integration, specifically high temporal latency and multi-source noise. To address these practical limitations, we propose Collaborative Alignment and Transformation Network (CATNet), an adaptive compensation framework that resolves temporal latency and noise interference in multi-agent systems. Our key innovations can be summarized in three aspects. First, we introduce a Spatio-Temporal Recurrent Synchronization (STSync) that aligns asynchronous feature streams via adjacent-frame differential modeling, establishing a temporal-spatially unified representation space. Second, we design a Dual-Branch Wavelet Enhanced Denoiser (WTDen) that suppresses global noise and reconstructs localized feature distortions within aligned representations. Third, we construct an Adaptive Feature Selector (AdpSel) that dynamically focuses on critical perceptual features for robust fusion. Extensive experiments on multiple datasets demonstrate that CATNet consistently outperforms existing methods under complex traffic conditions, proving its superior robustness and adaptability.", "link": "http://arxiv.org/abs/2603.05255v1", "date": "2026-03-05", "relevancy": 2.7572, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5523}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5517}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5503}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CATNet%3A%20Collaborative%20Alignment%20and%20Transformation%20Network%20for%20Cooperative%20Perception&body=Title%3A%20CATNet%3A%20Collaborative%20Alignment%20and%20Transformation%20Network%20for%20Cooperative%20Perception%0AAuthor%3A%20Gong%20Chen%20and%20Chaokun%20Zhang%20and%20Tao%20Tang%20and%20Pengcheng%20Lv%20and%20Feng%20Li%20and%20Xin%20Xie%0AAbstract%3A%20Cooperative%20perception%20significantly%20enhances%20scene%20understanding%20by%20integrating%20complementary%20information%20from%20diverse%20agents.%20However%2C%20existing%20research%20often%20overlooks%20critical%20challenges%20inherent%20in%20real-world%20multi-source%20data%20integration%2C%20specifically%20high%20temporal%20latency%20and%20multi-source%20noise.%20To%20address%20these%20practical%20limitations%2C%20we%20propose%20Collaborative%20Alignment%20and%20Transformation%20Network%20%28CATNet%29%2C%20an%20adaptive%20compensation%20framework%20that%20resolves%20temporal%20latency%20and%20noise%20interference%20in%20multi-agent%20systems.%20Our%20key%20innovations%20can%20be%20summarized%20in%20three%20aspects.%20First%2C%20we%20introduce%20a%20Spatio-Temporal%20Recurrent%20Synchronization%20%28STSync%29%20that%20aligns%20asynchronous%20feature%20streams%20via%20adjacent-frame%20differential%20modeling%2C%20establishing%20a%20temporal-spatially%20unified%20representation%20space.%20Second%2C%20we%20design%20a%20Dual-Branch%20Wavelet%20Enhanced%20Denoiser%20%28WTDen%29%20that%20suppresses%20global%20noise%20and%20reconstructs%20localized%20feature%20distortions%20within%20aligned%20representations.%20Third%2C%20we%20construct%20an%20Adaptive%20Feature%20Selector%20%28AdpSel%29%20that%20dynamically%20focuses%20on%20critical%20perceptual%20features%20for%20robust%20fusion.%20Extensive%20experiments%20on%20multiple%20datasets%20demonstrate%20that%20CATNet%20consistently%20outperforms%20existing%20methods%20under%20complex%20traffic%20conditions%2C%20proving%20its%20superior%20robustness%20and%20adaptability.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05255v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCATNet%253A%2520Collaborative%2520Alignment%2520and%2520Transformation%2520Network%2520for%2520Cooperative%2520Perception%26entry.906535625%3DGong%2520Chen%2520and%2520Chaokun%2520Zhang%2520and%2520Tao%2520Tang%2520and%2520Pengcheng%2520Lv%2520and%2520Feng%2520Li%2520and%2520Xin%2520Xie%26entry.1292438233%3DCooperative%2520perception%2520significantly%2520enhances%2520scene%2520understanding%2520by%2520integrating%2520complementary%2520information%2520from%2520diverse%2520agents.%2520However%252C%2520existing%2520research%2520often%2520overlooks%2520critical%2520challenges%2520inherent%2520in%2520real-world%2520multi-source%2520data%2520integration%252C%2520specifically%2520high%2520temporal%2520latency%2520and%2520multi-source%2520noise.%2520To%2520address%2520these%2520practical%2520limitations%252C%2520we%2520propose%2520Collaborative%2520Alignment%2520and%2520Transformation%2520Network%2520%2528CATNet%2529%252C%2520an%2520adaptive%2520compensation%2520framework%2520that%2520resolves%2520temporal%2520latency%2520and%2520noise%2520interference%2520in%2520multi-agent%2520systems.%2520Our%2520key%2520innovations%2520can%2520be%2520summarized%2520in%2520three%2520aspects.%2520First%252C%2520we%2520introduce%2520a%2520Spatio-Temporal%2520Recurrent%2520Synchronization%2520%2528STSync%2529%2520that%2520aligns%2520asynchronous%2520feature%2520streams%2520via%2520adjacent-frame%2520differential%2520modeling%252C%2520establishing%2520a%2520temporal-spatially%2520unified%2520representation%2520space.%2520Second%252C%2520we%2520design%2520a%2520Dual-Branch%2520Wavelet%2520Enhanced%2520Denoiser%2520%2528WTDen%2529%2520that%2520suppresses%2520global%2520noise%2520and%2520reconstructs%2520localized%2520feature%2520distortions%2520within%2520aligned%2520representations.%2520Third%252C%2520we%2520construct%2520an%2520Adaptive%2520Feature%2520Selector%2520%2528AdpSel%2529%2520that%2520dynamically%2520focuses%2520on%2520critical%2520perceptual%2520features%2520for%2520robust%2520fusion.%2520Extensive%2520experiments%2520on%2520multiple%2520datasets%2520demonstrate%2520that%2520CATNet%2520consistently%2520outperforms%2520existing%2520methods%2520under%2520complex%2520traffic%2520conditions%252C%2520proving%2520its%2520superior%2520robustness%2520and%2520adaptability.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05255v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CATNet%3A%20Collaborative%20Alignment%20and%20Transformation%20Network%20for%20Cooperative%20Perception&entry.906535625=Gong%20Chen%20and%20Chaokun%20Zhang%20and%20Tao%20Tang%20and%20Pengcheng%20Lv%20and%20Feng%20Li%20and%20Xin%20Xie&entry.1292438233=Cooperative%20perception%20significantly%20enhances%20scene%20understanding%20by%20integrating%20complementary%20information%20from%20diverse%20agents.%20However%2C%20existing%20research%20often%20overlooks%20critical%20challenges%20inherent%20in%20real-world%20multi-source%20data%20integration%2C%20specifically%20high%20temporal%20latency%20and%20multi-source%20noise.%20To%20address%20these%20practical%20limitations%2C%20we%20propose%20Collaborative%20Alignment%20and%20Transformation%20Network%20%28CATNet%29%2C%20an%20adaptive%20compensation%20framework%20that%20resolves%20temporal%20latency%20and%20noise%20interference%20in%20multi-agent%20systems.%20Our%20key%20innovations%20can%20be%20summarized%20in%20three%20aspects.%20First%2C%20we%20introduce%20a%20Spatio-Temporal%20Recurrent%20Synchronization%20%28STSync%29%20that%20aligns%20asynchronous%20feature%20 {"title": "RealWonder: Real-Time Physical Action-Conditioned Video Generation", "author": "Wei Liu and Ziyu Chen and Zizhang Li and Yue Wang and Hong-Xing Yu and Jiajun Wu", "abstract": "Current video generation models cannot simulate physical consequences of 3D actions like forces and robotic manipulations, as they lack structural understanding of how actions affect 3D scenes. We present RealWonder, the first real-time system for action-conditioned video generation from a single image. Our key insight is using physics simulation as an intermediate bridge: instead of directly encoding continuous actions, we translate them through physics simulation into visual representations (optical flow and RGB) that video models can process. RealWonder integrates three components: 3D reconstruction from single images, physics simulation, and a distilled video generator requiring only 4 diffusion steps. Our system achieves 13.2 FPS at 480x832 resolution, enabling interactive exploration of forces, robot actions, and camera controls on rigid objects, deformable bodies, fluids, and granular materials. We envision RealWonder opens new opportunities to apply video models in immersive experiences, AR/VR, and robot learning. Our code and model weights are publicly available in our project website: https://liuwei283.github.io/RealWonder/", "link": "http://arxiv.org/abs/2603.05449v1", "date": "2026-03-05", "relevancy": 2.7323, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7674}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6405}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6158}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RealWonder%3A%20Real-Time%20Physical%20Action-Conditioned%20Video%20Generation&body= {"title": "Reclaiming Lost Text Layers for Source-Free Cross-Domain Few-Shot Learning", "author": "Zhenyu Zhang and Guangyao Chen and Yixiong Zou and Yuhua Li and Ruixuan Li", "abstract": "Source-Free Cross-Domain Few-Shot Learning (SF-CDFSL) focuses on fine-tuning with limited training data from target domains (e.g., medical or satellite images), where CLIP has recently shown promising results due to its generalizability to downstream tasks. Current works indicate CLIP's text encoder is more suitable for cross-domain tasks, however, we find that \\textbf{removing certain middle layers of the text encoder can effectively improve performance in SF-CDFSL}, which we call the Lost Layers. In this paper, we delve into this phenomenon for a deeper understanding. We discover that instead of being harmful for the SF-CDFSL task, the information in these layers is actually beneficial, but visual gaps prevent this useful information from being fully utilized, making these layers seem redundant. Based on this understanding, unlike current works that simply remove these layers, we propose a method to teachs the model to \\textbf{re-utilize} information in these lost layers at both the layer and encoder levels, guiding the re-learning of the visual branch under domain shifts. Our approach effectively addresses the issue of underutilized information in the text encoder. Extensive experiments across various settings, backbones (CLIP, SigLip, PE-Core), and tasks (4 CDFSL datasets and 10 Meta-dataset datasets) demonstrate the effectiveness of our method. Code is available at https://github.com/zhenyuZ-HUST/CVPR26-VtT.", "link": "http://arxiv.org/abs/2603.05235v1", "date": "2026-03-05", "relevancy": 2.7012, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5548}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.535}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.531}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reclaiming%20Lost%20Text%20Layers%20for%20Source-Free%20Cross-Domain%20Few-Shot%20Learning&body=Title%3A%20Reclaiming%20Lost%20Text%20Layers%20for%20Source-Free%20Cross-Domain%20Few-Shot%20Learning%0AAuthor%3A%20Zhenyu%20Zhang%20and%20Guangyao%20Chen%20and%20Yixiong%20Zou%20and%20Yuhua%20Li%20and%20Ruixuan%20Li%0AAbstract%3A%20Source-Free%20Cross-Domain%20Few-Shot%20Learning%20%28SF-CDFSL%29%20focuses%20on%20fine-tuning%20with%20limited%20training%20data%20from%20target%20domains%20%28e.g.%2C%20medical%20or%20satellite%20images%29%2C%20where%20CLIP%20has%20recently%20shown%20promising%20results%20due%20to%20its%20generalizability%20to%20downstream%20tasks.%20Current%20works%20indicate%20CLIP%27s%20text%20encoder%20is%20more%20suitable%20for%20cross-domain%20tasks%2C%20however%2C%20we%20find%20that%20%5Ctextbf%7Bremoving%20certain%20middle%20layers%20of%20the%20text%20encoder%20can%20effectively%20improve%20performance%20in%20SF-CDFSL%7D%2C%20which%20we%20call%20the%20Lost%20Layers.%20In%20this%20paper%2C%20we%20delve%20into%20this%20phenomenon%20for%20a%20deeper%20understanding.%20We%20discover%20that%20instead%20of%20being%20harmful%20for%20the%20SF-CDFSL%20task%2C%20the%20information%20in%20these%20layers%20is%20actually%20beneficial%2C%20but%20visual%20gaps%20prevent%20this%20useful%20information%20from%20being%20fully%20utilized%2C%20making%20these%20layers%20seem%20redundant.%20Based%20on%20this%20understanding%2C%20unlike%20current%20works%20that%20simply%20remove%20these%20layers%2C%20we%20propose%20a%20method%20to%20teachs%20the%20model%20to%20%5Ctextbf%7Bre-utilize%7D%20information%20in%20these%20lost%20layers%20at%20both%20the%20layer%20and%20encoder%20levels%2C%20guiding%20the%20re-learning%20of%20the%20visual%20branch%20under%20domain%20shifts.%20Our%20approach%20effectively%20addresses%20the%20issue%20of%20underutilized%20information%20in%20the%20text%20encoder.%20Extensive%20experiments%20across%20various%20settings%2C%20backbones%20%28CLIP%2C%20SigLip%2C%20PE-Core%29%2C%20and%20tasks%20%284%20CDFSL%20datasets%20and%2010%20Meta-dataset%20datasets%29%20demonstrate%20the%20effectiveness%20of%20our%20method.%20Code%20is%20available%20at%20https%3A//github.com/zhenyuZ-HUST/CVPR26-VtT.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05235v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReclaiming%2520Lost%2520Text%2520Layers%2520for%2520Source-Free%2520Cross-Domain%2520Few-Shot%2520Learning%26entry.906535625%3DZhenyu%2520Zhang%2520and%2520Guangyao%2520Chen%2520and%2520Yixiong%2520Zou%2520and%2520Yuhua%2520Li%2520and%2520Ruixuan%2520Li%26entry.1292438233%3DSource-Free%2520Cross-Domain%2520Few-Shot%2520Learning%2520%2528SF-CDFSL%2529%2520focuses%2520on%2520fine-tuning%2520with%2520limited%2520training%2520data%2520from%2520target%2520domains%2520%2528e.g.%252C%2520medical%2520or%2520satellite%2520images%2529%252C%2520where%2520CLIP%2520has%2520recently%2520shown%2520promising%2520results%2520due%2520to%2520its%2520generalizability%2520to%2520downstream%2520tasks.%2520Current%2520works%2520indicate%2520CLIP%2527s%2520text%2520encoder%2520is%2520more%2520suitable%2520for%2520cross-domain%2520tasks%252C%2520however%252C%2520we%2520find%2520that%2520%255Ctextbf%257Bremoving%2520certain%2520middle%2520layers%2520of%2520the%2520text%2520encoder%2520can%2520effectively%2520improve%2520performance%2520in%2520SF-CDFSL%257D%252C%2520which%2520we%2520call%2520the%2520Lost%2520Layers.%2520In%2520this%2520paper%252C%2520we%2520delve%2520into%2520this%2520phenomenon%2520for%2520a%2520deeper%2520understanding.%2520We%2520discover%2520that%2520instead%2520of%2520being%2520harmful%2520for%2520the%2520SF-CDFSL%2520task%252C

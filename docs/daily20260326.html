{"title": "Positive-First Most Ambiguous: A Simple Active Learning Criterion for Interactive Retrieval of Rare Categories", "author": "Kawtar Zaher and Olivier Buisson and Alexis Joly", "abstract": "Real-world fine-grained visual retrieval often requires discovering a rare concept from large unlabeled collections with minimal supervision. This is especially critical in biodiversity monitoring, ecological studies, and long-tailed visual domains, where the target may represent only a tiny fraction of the data, creating highly imbalanced binary problems. Interactive retrieval with relevance feedback offers a practical solution: starting from a small query, the system selects candidates for binary user annotation and iteratively refines a lightweight classifier. While Active Learning (AL) is commonly used to guide selection, conventional AL assumes symmetric class priors and large annotation budgets, limiting effectiveness in imbalanced, low-budget, low-latency settings. We introduce Positive-First Most Ambiguous (PF-MA), a simple yet effective AL criterion that explicitly addresses the class imbalance asymmetry: it prioritizes near-boundary samples while favoring likely positives, enabling rapid discovery of subtle visual categories while maintaining informativeness. Unlike standard methods that oversample negatives, PF-MA consistently returns small batches with a high proportion of relevant samples, improving early retrieval and user satisfaction. To capture retrieval diversity, we also propose a class coverage metric that measures how well selected positives span the visual variability of the target class. Experiments on long-tailed datasets, including fine-grained botanical data, demonstrate that PF-MA consistently outperforms strong baselines in both coverage and classifier performance, across varying class sizes and descriptors. Our results highlight that aligning AL with the asymmetric and user-centric objectives of interactive fine-grained retrieval enables simple yet powerful solutions for retrieving rare and visually subtle categories in realistic human-in-the-loop settings.", "link": "http://arxiv.org/abs/2603.24480v1", "date": "2026-03-25", "relevancy": 2.1787, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.551}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5492}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5177}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Positive-First%20Most%20Ambiguous%3A%20A%20Simple%20Active%20Learning%20Criterion%20for%20Interactive%20Retrieval%20of%20Rare%20Categories&body=Title%3A%20Positive-First%20Most%20Ambiguous%3A%20A%20Simple%20Active%20Learning%20Criterion%20for%20Interactive%20Retrieval%20of%20Rare%20Categories%0AAuthor%3A%20Kawtar%20Zaher%20and%20Olivier%20Buisson%20and%20Alexis%20Joly%0AAbstract%3A%20Real-world%20fine-grained%20visual%20retrieval%20often%20requires%20discovering%20a%20rare%20concept%20from%20large%20unlabeled%20collections%20with%20minimal%20supervision.%20This%20is%20especially%20critical%20in%20biodiversity%20monitoring%2C%20ecological%20studies%2C%20and%20long-tailed%20visual%20domains%2C%20where%20the%20target%20may%20represent%20only%20a%20tiny%20fraction%20of%20the%20data%2C%20creating%20highly%20imbalanced%20binary%20problems.%20Interactive%20retrieval%20with%20relevance%20feedback%20offers%20a%20practical%20solution%3A%20starting%20from%20a%20small%20query%2C%20the%20system%20selects%20candidates%20for%20binary%20user%20annotation%20and%20iteratively%20refines%20a%20lightweight%20classifier.%20While%20Active%20Learning%20%28AL%29%20is%20commonly%20used%20to%20guide%20selection%2C%20conventional%20AL%20assumes%20symmetric%20class%20priors%20and%20large%20annotation%20budgets%2C%20limiting%20effectiveness%20in%20imbalanced%2C%20low-budget%2C%20low-latency%20settings.%20We%20introduce%20Positive-First%20Most%20Ambiguous%20%28PF-MA%29%2C%20a%20simple%20yet%20effective%20AL%20criterion%20that%20explicitly%20addresses%20the%20class%20imbalance%20asymmetry%3A%20it%20prioritizes%20near-boundary%20samples%20while%20favoring%20likely%20positives%2C%20enabling%20rapid%20discovery%20of%20subtle%20visual%20categories%20while%20maintaining%20informativeness.%20Unlike%20standard%20methods%20that%20oversample%20negatives%2C%20PF-MA%20consistently%20returns%20small%20batches%20with%20a%20high%20proportion%20of%20relevant%20samples%2C%20improving%20early%20retrieval%20and%20user%20satisfaction.%20To%20capture%20retrieval%20diversity%2C%20we%20also%20propose%20a%20class%20coverage%20metric%20that%20measures%20how%20well%20selected%20positives%20span%20the%20visual%20variability%20of%20the%20target%20class.%20Experiments%20on%20long-tailed%20datasets%2C%20including%20fine-grained%20botanical%20data%2C%20demonstrate%20that%20PF-MA%20consistently%20outperforms%20strong%20baselines%20in%20both%20coverage%20and%20classifier%20performance%2C%20across%20varying%20class%20sizes%20and%20descriptors.%20Our%20results%20highlight%20that%20aligning%20AL%20with%20the%20asymmetric%20and%20user-centric%20objectives%20of%20interactive%20fine-grained%20retrieval%20enables%20simple%20yet%20powerful%20solutions%20for%20retrieving%20rare%20and%20visually%20subtle%20categories%20in%20realistic%20human-in-the-loop%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24480v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPositive-First%2520Most%2520Ambiguous%253A%2520A%2520S {"title": "Sim-to-Real of Humanoid Locomotion Policies via Joint Torque Space Perturbation Injection", "author": "Junhyeok Rui Cha and Woohyun Cha and Jaeyong Shin and Donghyeon Kim and Jaeheung Park", "abstract": "This paper proposes a novel alternative to existing sim-to-real methods for training control policies with simulated experiences. Prior sim-to-real methods for legged robots mostly rely on the domain randomization approach, where a fixed finite set of simulation parameters is randomized during training. Instead, our method adds state-dependent perturbations to the input joint torque used for forward simulation during the training phase. These state-dependent perturbations are designed to simulate a broader range of reality gaps than those captured by randomizing a fixed set of simulation parameters. Experimental results show that our method enables humanoid locomotion policies that achieve greater robustness against complex reality gaps unseen in the training domain.", "link": "http://arxiv.org/abs/2504.06585v2", "date": "2026-03-25", "relevancy": 2.1745, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6072}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5394}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5225}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sim-to-Real%20of%20Humanoid%20Locomotion%20Policies%20via%20Joint%20Torque%20Space%20Perturbation%20Injection&body=Title%3A%20Sim-to-Real%20of%20Humanoid%20Locomotion%20Policies%20via%20Joint%20Torque%20Space%20Perturbation%20Injection%0AAuthor%3A%20Junhyeok%20Rui%20Cha%20and%20Woohyun%20Cha%20and%20Jaeyong%20Shin%20and%20Donghyeon%20Kim%20and%20Jaeheung%20Park%0AAbstract%3A%20Th ethod%20enables%20humanoid%20locomotion%20policies%20that%20achieve%20greater%20robustness%20against%20complex%20reality%20gaps%20unseen%20in%20the%20training%20domain.&entry.1838667208=http%3A//arxiv.org/abs/2504.06585v2&entry.124074799=Read"},
{"title": "Tutor-Student Reinforcement Learning: A Dynamic Curriculum for Robust Deepfake Detection", "author": "Zhanhe Lei and Zhongyuan Wang and Jikang Cheng and Baojin Huang and Yuhong Yang and Zhen Han and Chao Liang and Dengpan Ye", "abstract": "Standard supervised training for deepfake detection treats all samples with uniform importance, which can be suboptimal for learning robust and generalizable features. In this work, we propose a novel Tutor-Student Reinforcement Learning (TSRL) framework to dynamically optimize the training curriculum. Our method models the training process as a Markov Decision Process where a ``Tutor'' agent learns to guide a ``Student'' (the deepfake detector). The Tutor, implemented as a Proximal Policy Optimization (PPO) agent, observes a rich state representation for each training sample, encapsulating not only its visual features but also its historical learning dynamics, such as EMA loss and forgetting counts. Based on this state, the Tutor takes an action by assigning a continuous weight (0-1) to the sample's loss, thereby dynamically re-weighting the training batch. The Tutor is rewarded based on the Student's immediate performance change, specifically rewarding transitions from incorrect to correct predictions. This strategy encourages the Tutor to learn a curriculum that prioritizes high-value samples, such as hard-but-learnable examples, leading to a more efficient and effective training process. We demonstrate that this adaptive curriculum improves the Student's generalization capabilities against unseen manipulation techniques compared to traditional training methods. Code is available at https://github.com/wannac1/TSRL.", "link": "http://arxiv.org/abs/2603.24139v1", "date": "2026-03-25", "relevancy": 2.1693, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.547}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5426}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5302}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tutor-Student%20Reinforcement%20Learning%3A%20A%20Dynamic%20Curriculum%20for%20Robust%20Deepfake%20Detection&body=Title%3A%20Tutor-Student%20Reinforcement%20Learning%3A%20A%20Dynamic%20Curriculum%20for%20Robust%20Deepfake%20Detection%0AAuthor%3A%20Zhanhe%20Lei%20and%20Zhongyuan%20Wang%20and%20Jikang%20Cheng%20and%20Baojin%20Huang%20and%20Yuhong%20Yang%20and%20Zhen%20Han%20and%20Chao%20Liang%20and%20Dengpan%20Ye%0AAbstract%3A%20Standard%20supervised%20training%20for%20deepfake%20detection%20treats%20all%20samples%20with%20uniform%20importance%2C%20which%20can%20be%20suboptimal%20for%20learning%20robust%20and%20generalizable%20features.%20In%20this%20work%2C%20we%20propose%20a%20novel%20Tutor-Student%20Reinforcement%20Learning%20%28TSRL%29%20framework%20to%20dynamically%20optimize%20the%20training%20curriculum.%20Our%20method%20models%20the%20training%20process%20as%20a%20Markov%20Decision%20Process%20where%20a%20%60%60Tutor%27%27%20agent%20learns%20to%20guide%20a%20%60%60Student%27%27%20%28the%20deepfake%20detector%29.%20The%20Tutor%2C%20implemented%20as%20a%20Proximal%20Policy%20Optimization%20%28PPO%29%20agent%2C%20observes%20a%20rich%20state%20representation%20for%20each%20training%20sample%2C%20encapsulating%20not%20only%20its%20visual%20features%20but%20also%20its%20historical%20learning%20dynamics%2C%20such%20as%20EMA%20loss%20and%20forgetting%20counts.%20Based%20on%20this%20state%2C%20the%20Tutor%20takes%20an%20action%20by%20assigning%20a%20continuous%20weight%20%280-1%29%20to%20the%20sample%27s%20loss%2C%20thereby%20dynamically%20re-weighting%20the%20training%20batch.%20The%20Tutor%20is%20rewarded%20based%20on%20the%20Student%27s%20immediate%20performance%20change%2C%20specifically%20rewarding%20transitions%20from%20incorrect%20to%20correct%20predictions.%20This%20strategy%20encourages%20the%20Tutor%20to%20learn%20a%20curriculum%20that%20prioritizes%20high-value%20samples%2C%20such%20as%20hard-but-learnable%20examples%2C%20leading%20to%20a%20more%20efficient%20and%20effective%20training%20process.%20We%20demonstrate%20that%20this%20adaptive%20curriculum%20improves%20the%20Student%27s%20generalization%20capabilities%20against%20unseen%20manipulation%20techniques%20compared%20to%20traditional%20training%20methods.%20Code%20is%20available%20at%20https%3A//github.com/wannac1/TSRL.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24139v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTutor-Student%2520Reinforcement%2520Learning%253A%2520A%2520Dynamic%2520Curriculum%2520for%2520Robust%2520Deepfake%2520Detection%26entry.906535625%3DZhanhe%2520Lei%2520and%2520Zhongyuan%2520Wang%2520and%2520Jikang%2520Cheng%2520and%2520Baojin%2520Huang%2520and%2520Yuhong%2520Yang%2520and%2520Zhen%2520Han%2520and%2520Chao%2520Liang%2520and%2520Dengpan%2520Ye%26entry.1292438233%3DStandard%2520supervised%2520training%2520for%2520deepfake%2520detection%2520treats%2520all%2520samples%2520with%2520uniform%2520importance%252C%2520which%2520can%2520be%2520suboptimal%2520for%2520learning%2520robust%2520and%2520generalizable%2520features.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%2520Tutor-Student%2520Reinforcement%2520Learning%2520%2528TSRL%2529%2520framework%2520to%2520dynamically%2520optimize%2520the%2520training%2520curriculum.%2520Our%2520method%2520models%2520the%2520training%2520process%2520as%2520a%2520Markov%2520Decision%2520Process%2520where%2520a%2520%2560%2560Tutor%2527%2527%2520agent%2520learns%2520to%2520guide%2520a%2520%2560%2560Student%2527%2527%2520%2528the%2520deepfake%2520detector%2529.%2520The%2 {"title": "Continual GUI Agents", "author": "Ziwei Liu and Borui Kang and Hangjie Yuan and Zixiang Zhao and Wei Li and Yifan Zhu and Tao Feng", "abstract": "As digital environments (data distribution) are in flux, with new GUI data arriving over time-introducing new domains or resolutions-agents trained on static environments deteriorate in performance. In this work, we introduce Continual GUI Agents, a new task that requires GUI agents to perform continual learning under shifted domains and resolutions. We find existing methods fail to maintain stable grounding as GUI distributions shift over time, due to the diversity of UI interaction points and regions in fluxing scenarios. To address this, we introduce GUI-Anchoring in Flux (GUI-AiF), a new reinforcement fine-tuning framework that stabilizes continual learning through two novel rewards: Anchoring Point Reward in Flux (APR-iF) and Anchoring Region Reward in Flux (ARR-iF). These rewards guide the agents to align with shifting interaction points and regions, mitigating the tendency of existing reward strategies to over-adapt to static grounding cues (e.g., fixed coordinates or element scales). Extensive experiments show GUI-AiF surpasses state-of-the-art baselines. Our work establishes the first continual learning framework for GUI agents, revealing the untapped potential of reinforcement fine-tuning for continual GUI Agents.", "link": "http://arxiv.org/abs/2601.20732v4", "date": "2026-03-25", "relevancy": 2.1652, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.554}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5347}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.526}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continual%20GUI%20Agents&body=Title%3A%20Continual%20GUI%20Agents%0AAuthor%3A%20Ziwei%20Liu%20and%20Borui%20Kang%20and%20Hangjie%20Yuan%20and%20Zixiang%20Zhao%20and%20Wei%20Li%20and%20Yifan%20Zhu%20and%20Tao%20Feng%0AAbstract%3A%20As%20digital%20environments%20%28data%20distribution%29%20are%20in%20flux%2C%20with%20new%20GUI%20data%20arriving%20over%20time-introducing%20new%20domains%20or%20resolutions-agents%20trained%20on%20static%20environments%20deteriorate%20in%20performance.%20In%20this%20work%2C%20we%20introduce%20Continual%20GUI%20Agents%2C%20a%20new%20task%20that%20requires%20GUI%20agents%20to%20perform%20continual%20learning%20under%20shifted%20domains%20and%20resolutions.%20We%20find%20existing%20methods%20fail%20to%20maintain%20stable%20grounding%20as%20GUI%20distributions%20shift%20over%20time%2C%20due%20to%20the%20diversity%20of%20UI%20interaction%20points%20and%20regions%20in%20fluxing%20scenarios.%20To%20address%20this%2C%20we%20introduce%20GUI-Anchoring%20in%20Flux%20%28GUI-AiF%29%2C%20a%20new%20reinforcement%20fine-tuning%20framework%20that%20stabilizes%20continual%20learning%20through%20two%20novel%20rewards%3A%20Anchoring%20Point%20Reward%20in%20Flux%20%28APR-iF%29%20and%20Anchoring%20Region%20Reward%20in%20Flux%20%28ARR-iF%29.%20These%20rewards%20guide%20the%20agents%20to%20align%20with%20shifting%20interaction%20points%20and%20regions%2C%20mitigating%20the%20tendency%20of%20existing%20reward%20strategies%20to%20over-adapt%20to%20static%20grounding%20cues%20%28e.g.%2C%20fixed%20coordinates%20or%20element%20scales%29.%20Extensive%20experiments%20show%20GUI-AiF%20surpasses%20state-of-the-art%20baselines.%20Our%20work%20establishes%20the%20first%20continual%20learning%20framework%20for%20GUI%20agents%2C%20revealing%20the%20untapped%20potential%20of%20reinforcement%20fine-tuning%20for%20continual%20GUI%20Agents.%0ALink%3A%20http%3A//arxiv.org/abs/2601.20732v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_ 2C%20fixed%20coordinates%20or%20element%20scales%29.%20Extensive%20experiments%20show%20GUI-AiF%20surpasses%20state-of-the-art%20baselines.%20Our%20work%20establishes%20the%20first%20continual%20learning%20framework%20for%20GUI%20agents%2C%20revealing%20the%20untapped%20potential%20of%20reinforcement%20fine-tuning%20for%20continual%20GUI%20Agents.&entry.1838667208=http%3A//arxiv.org/abs/2601.20732v4&entry.124074799=Read"},
{"title": "EdgeCrafter: Compact ViTs for Edge Dense Prediction via Task-Specialized Distillation", "author": "Longfei Liu and Yongjie Hou and Yang Li and Qirui Wang and Youyang Sha and Yongjun Yu and Yinzhi Wang and Peizhe Ru and Xuanlong Yu and Xi Shen", "abstract": "Deploying high-performance dense prediction models on resource-constrained edge devices remains challenging due to strict limits on computation and memory. In practice, lightweight systems for object detection, instance segmentation, and pose estimation are still dominated by CNN-based architectures such as YOLO, while compact Vision Transformers (ViTs) often struggle to achieve similarly strong accuracy efficiency tradeoff, even with large scale pretraining. We argue that this gap is largely due to insufficient task specific representation learning in small scale ViTs, rather than an inherent mismatch between ViTs and edge dense prediction. To address this issue, we introduce EdgeCrafter, a unified compact ViT framework for edge dense prediction centered on ECDet, a detection model built from a distilled compact backbone and an edge-friendly encoder decoder design. On the COCO dataset, ECDet-S achieves 51.7 AP with fewer than 10M parameters using only COCO annotations. For instance segmentation, ECInsSeg achieves performance comparable to RF-DETR while using substantially fewer parameters. For pose estimation, ECPose-X reaches 74.8 AP, significantly outperforming YOLO26Pose-X (71.6 AP) despite the latter's reliance on extensive Objects365 pretraining. These results show that compact ViTs, when paired with task-specialized distillation and edge-aware design, can be a practical and competitive option for edge dense prediction. Code is available at: https://intellindust-ai-lab.github.io/projects/EdgeCrafter/", "link": "http://arxiv.org/abs/2603.18739v2", "date": "2026-03-25", "relevancy": 2.1629, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http:// %20COCO%20dataset%2C%20ECDet-S%20achieves%2051.7%20AP%20with%20fewer%20than%2010M%20parameters%20using%20only%20COCO%20annotations.%20For%20instance%20segmentation%2C%20ECInsSeg%20achieves%20performance%20comparable%20to%20RF-DETR%20while%20using%20substantially%20fewer%20parameters.%20For%20pose%20estimation%2C%20ECPose-X%20reaches%2074.8%20AP%2C%20significantly%20outperforming%20YOLO26Pose-X%20%2871.6%20AP%29%20despite%20the%20latter%27s%20reliance%20on%20extensive%20Objects365%20pretraining.%20These%20results%20show%20that%20compact%20ViTs%2C%20when%20paired%20with%20task-specialized%20distillation%20and%20edge-aware%20design%2C%20can%20be%20a%20practical%20and%20competitive%20option%20for%20edge%20dense%20prediction.%20Code%20is%20available%20at%3A%20https%3A//intellindust-ai-lab.github.io/projects/EdgeCrafter/%0ALink%3A%20http%3A//arxiv.org/abs/2603.18739v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEdgeCrafter%253A%2520Compact%2520ViTs%2520for%2520Edge%2520Dense%2520Prediction%2520via%2520Task-Specialized%2520Distillation%26entry.906535625%3DLongfei%2520Liu%2520and%2520Yongjie%2520Hou%2520and%2520Yang%2520Li%2520and%2520Qirui%2520Wang%2520and%2520Youyang%2520Sha%2520and%2520Yongjun%2520Yu%2520and%2520Yinzhi%2520Wang%2520and%2520Peizhe%2520Ru%2520and%2520Xuanlong%2520Yu%2520and%2520Xi%2520Shen%26entry.1292438233%3DDeploying%2520high-performance%2520dense%2520prediction%2520models%2520on%2520resource-constrained%2520edge%2520devices%2520remains%2520challenging%2520due%2520to%2520strict%2520limits%2520on%2520computation%2520and%2520memory.%2520In%2520practice%252C%2520lightweight%2520systems%2520for%2520object%2520detection%252C%2520instance%2520segmentation%252C%2520and%2520pose%2520estimation%2520are%2520still%2520dominated%2520by%2520CNN-based%2520architectures%2520such%2520as%2520YOLO%252C%2520while%2520compact%2520Vision%2520Transformers%2520%2528ViTs%2529%2520often%2 {"title": "AceGRPO: Adaptive Curriculum Enhanced Group Relative Policy Optimization for Autonomous Machine Learning Engineering", "author": "Yuzhu Cai and Zexi Liu and Xinyu Zhu and Cheng Wang and Siheng Chen", "abstract": "Autonomous Machine Learning Engineering (MLE) requires agents to perform sustained, iterative optimization over long horizons. While recent LLM-based agents show promise, current prompt-based agents for MLE suffer from behavioral stagnation due to frozen parameters. Although Reinforcement Learning (RL) offers a remedy, applying it to MLE is hindered by prohibitive execution latency and inefficient data selection. Recognizing these challenges, we propose AceGRPO with two core components: (1) Evolving Data Buffer that continuously repurposes execution traces into reusable training tasks, and (2) Adaptive Sampling guided by a Learnability Potential function, which dynamically prioritizes tasks at the agent's learning frontier to maximize learning efficiency. Leveraging AceGRPO, our trained Ace-30B model achieves a 100% valid submission rate on MLE-Bench-Lite, approaches the performance of proprietary frontier models, and outperforms larger open-source baselines (e.g., DeepSeek-V3.2), demonstrating robust capability for sustained iterative optimization. Code is available at https://github.com/yuzhu-cai/AceGRPO.", "link": "http://arxiv.org/abs/2602.07906v4", "date": "2026-03-25", "relevancy": 2.1624, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5621}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5275}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5195}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AceGRPO%3A%20Adaptive%20Curriculum%20Enhanced%20G {"title": "Minimax Generalized Cross-Entropy", "author": "Kartheek Bondugula and Santiago Mazuelas and Aritz P\u00e9rez and Anqi Liu", "abstract": "Loss functions play a central role in supervised classification. Cross-entropy (CE) is widely used, whereas the mean absolute error (MAE) loss can offer robustness but is difficult to optimize. Interpolating between the CE and MAE losses, generalized cross-entropy (GCE) has recently been introduced to provide a trade-off between optimization difficulty and robustness. Existing formulations of GCE result in a non-convex optimization over classification margins that is prone to underfitting, leading to poor performances with complex datasets. In this paper, we propose a minimax formulation of generalized cross-entropy (MGCE) that results in a convex optimization over classification margins. Moreover, we show that MGCEs can provide an upper bound on the classification error. The proposed bilevel convex optimization can be efficiently implemented using stochastic gradient computed via implicit differentiation. Using benchmark datasets, we show that MGCE achieves strong accuracy, faster convergence, and better calibration, especially in the presence of label noise.", "link": "http://arxiv.org/abs/2603.19874v2", "date": "2026-03-25", "relevancy": 2.1614, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4521}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4385}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4062}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minimax {"title": "Towards Safe Learning-Based Non-Linear Model Predictive Control through Recurrent Neural Network Modeling", "author": "Mihaela-Larisa Clement and M\u00f3nika Farsang and Agnes Poks and Johannes Edelmann and Manfred Pl\u00f6chl and Radu Grosu and Ezio Bartocci", "abstract": "The practical deployment of nonlinear model predictive control (NMPC) is often limited by online computation: solving a nonlinear program at high control rates can be expensive on embedded hardware, especially when models are complex or horizons are long. Learning-based NMPC approximations shift this computation offline but typically demand large expert datasets and costly training. We propose Sequential-AMPC, a sequential neural policy that generates MPC candidate control sequences by sharing parameters across the prediction horizon. For deployment, we wrap the policy in a safety-augmented online evaluation and fallback mechanism, yielding Safe Sequential-AMPC. Compared to a naive feedforward policy baseline across several benchmarks, Sequential-AMPC requires substantially fewer expert MPC rollouts and yields candidate sequences with higher feasibility rates and improved closed-loop safety. On high-dimensional systems, it also exhibits better learning dynamics and performance in fewer epochs while maintaining stable validation improvement where the feedforward baseline can stagnate.", "link": "http://arxiv.org/abs/2603.24503v1", "date": "2026-03-25", "relevancy": 2.1544, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5724}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5339}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?s {"title": "HortiMulti: A Multi-Sensor Dataset for Localisation and Mapping in Horticultural Polytunnels", "author": "Shuoyuan Xu and Zhipeng Zhong and Tiago Barros and Matthew Coombes and Cristiano Premebida and Hao Wu and Cunjia Liu", "abstract": "Agricultural robotics is gaining increasing relevance in both research and real-world deployment. As these systems are expected to operate autonomously in more complex tasks, the availability of representative real-world datasets becomes essential. While domains such as urban and forestry robotics benefit from large and established benchmarks, horticultural environments remain comparatively under-explored despite the economic significance of this sector. To address this gap, we present HortiMulti, a multimodal, cross-season dataset collected in commercial strawberry and raspberry polytunnels across an entire growing season, capturing substantial appearance variation, dynamic foliage, specular reflections from plastic covers, severe perceptual aliasing, and GNSS-unreliable conditions, all of which directly degrade existing localisation and perception algorithms. The sensor suite includes two 3D LiDARs, four RGB cameras, an IMU, GNSS, and wheel odometry. Ground truth trajectories are derived from a combination of Total Station surveying, AprilTag fiducial markers, and LiDAR-inertial odometry, spanning dense, sparse, and marker-free coverage to support evaluation under both controlled and realistic conditions. We release time-synchronised raw measurements, calibration files, reference trajectories, and baseline benchmarks for visual, LiDAR, and multi-sensor SLAM, with results confirming that current state-of-the-art methods remain inadequate for reliable polytunnel deployment, establishing HortiMulti as a one-stop resource for developing and testing robotic perception systems in horticulture environments.", "link": "http://arxiv.org/abs/2603.20150v3", "date": "2026-03-25", "relevancy": 2.1541, "topK": [{"title": "You've Got {"title": "SAG-Agent: Enabling Long-Horizon Reasoning in Strategy Games via Dynamic Knowledge Graphs", "author": "Chenwei Tang and Lin Long and Xinyu Liu and Jingyu Xing and Zizhou Wang and Joey Tianyi Zhou and Jiawei Du and Liangli Zhen and Jiancheng Lv", "abstract": "Most commodity software lacks accessible Application Programming Interfaces (APIs), requiring autonomous agents to interact solely through pixel-based Graphical User Interfaces (GUIs). In this API-free setting, large language model (LLM)-based agents face severe efficiency bottlenecks: limited to local visual experiences, they make myopic decisions and rely on inefficient trial-and-error, hindering both skill acquisition and long-horizon planning. To overcome these limitations, we propose SAG-Agent, an experience-driven learning framework that structures an agent's raw pixel-level interactions into a persistent State-Action Graph (SAG). SAG-Agent mitigates inefficient exploration by topologically linking functionally similar but visually distinct GUI states, constructing a rich neighborhood of experience that enables the agent to generalize from a diverse set of historical strategies. To facilitate long-horizon reasoning, we design a novel hybrid intrinsic reward mechanism based on the graph topology, combining a state-value reward for exploiting known high-value pathways with a novelty reward that encourages targeted exploration. This approach decouples strategic planning from pure discovery, allowing the agent to effectively value setup actions with delayed gratification. We evaluate SAG-Agent in two complex, open-ended GUI-based decision-making environments (Civilization V and Slay the Spire), demonstrating significant improvements in exploration efficiency and strategic depth over the state-of-the-art methods.", "link": "http://arxiv.org/abs/2510.15259v3", "date": "2026-03-25", "relevancy": 2.1525, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6119}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5264}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5203}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAG-Agent%3A%20Enabling%20Long-Horizon%20Reasoning%20in%20Strategy%20Games%20via%20Dynamic%20Knowledge%20Graphs&body=Title%3A%20SAG-Agent%3A%20Enabling%20Long-Horizon%20Reasoning%20in%20Strategy%20Games%20via%20Dynamic%20Knowledge%20Graphs%0AAuthor%3A%20Chenwei%20Tang%20and%20Lin%20Long%20and%20Xinyu%20Liu%20and%20Jingyu%20Xing%20and%20Zizhou%20Wang%20and%20Joey%20Tianyi%20Zhou%20and%20Jiawei%20Du%20and%20Liangli%20Zhen%20and%20Jiancheng%20Lv%0AAbstract%3A%20Most%20commodity%20software%20lacks%20accessible%20Application%20Programming%20Interfaces%20%28APIs%29%2C%20requiring%20autonomous%20agents%20to%20interact%20solely%20through%20pixel-based%20Graphical%20User%20Interfaces%20%28GUIs%29.%20In%20this%20API-free%20setting%2C%20large%20language%20model%20%28LLM%29-based%20agents%20face%20severe%20efficiency%20bottlenecks%3A%20limited%20to%20local%20visual%20experiences%2C%20they%20make%20myopic%20decisions%20and%20rely%20on%20inefficient%20trial-and-error%2C%20hindering%20both%20skill%20acquisition%20and%20long-horizon%20planning.%20To%20overcome%20these%20limitations%2C%20we%20propose%20SAG-Agent%2C%20an%20experience-driven%20learning%20framework%20that%20structures%20an%20agent%27s%20raw%20pixel-level%20interactions%20into%20a%20persistent%20State-Action%20Graph%20%28SAG%29.%20SAG-Agent%20mitigates%20inefficient%20exploration%20by%20topologically%20linking%20functionally%20similar%20but%20visually%20distinct%20GUI%20states%2C%20constructing%20a%20rich%20neighborhood%20of%20experience%20that%20enables%20the%20agent%20to%20generalize%20from%20a%20diverse%20set%20of%20historical%20strategies.%20To%20facilitate%20long-horizon%20reasoning%2C%20we%20design%20a%20novel%20hybrid%20intrinsic%20reward%20mechanism%20based%20on%20the%20graph%20topology%2C%20combining%20a%20state-value%20reward%20for%20exploiting%20known%20high-value%20pathways%20with%20a%20novelty%20reward%20that%20encourages%20targeted%20exploration.%20This%20approach%20decouples%20strategic%20planning%20from%20pure%20discovery%2C%20allowing%20the%20agent%20to%20effectively%20value%20setup%20actions%20with%20delayed%20gratification.%20We%20evaluate%20SAG-Agent%20in%20two%20complex%2C%20open-ended%20GUI-based%20decision-making%20environments%20%28Civilization%20V%20and%20Slay%20the%20Spire%29%2C%20demonstrating%20significant%20improvements%20in%20exploration%20efficiency%20and%20strategic%20depth%20over%20the%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2510.15259v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAG-Agent%253A%2520Enabling%2520Long-Horizon%2520Reasoning%2520in%2520Strategy%2520Games%2520via%2520Dynamic%2520Knowledge%2520Graphs%26entry.906535625%3DChenwei%2520Tang%2520and%2520Lin%2520Long%2520and%2520Xinyu%2520Liu%2520and%2520Jingyu%2520Xing%2520and%2520Zizhou%2520Wang%2520and%2520Joey%2520Tianyi%2520Zhou%2520and%2520Jiawei%2520Du%2520and%2520Liangli%2520Zhen%2520and%2520Jiancheng%2520Lv%26entry.1292438233%3DMost%2520commodity%2520software%2520lacks%2520accessible%2520Application%2520Programming%2520Interfaces%2520%2528APIs%2529%252C%2520requiring%2520autonomous%2520agents%2520to%2520interact%2520solely%2520through%2520pixel-based%2520Graphical%2520User%2520Interfaces%2520%2528GUIs%2529.%2520In%2520this%2520API-free%2520setting%252C%2520large%2520language%2520model%2520%2528LLM%2529-based%2520agents%2520face%2520severe%2520efficiency%2520bottlenecks%253A%2520limited%2520to%2520local%2520visual%2520experiences%252C%2520they%2520make%252 {"title": "Federated fairness-aware classification under differential privacy", "author": "Gengyu Xue and Yi Yu", "abstract": "Privacy and algorithmic fairness have become two central issues in modern machine learning. Although each has separately emerged as a rapidly growing research area, their joint effect remains comparatively under-explored. In this paper, we systematically study the joint impact of differential privacy and fairness on classification in a federated setting, where data are distributed across multiple servers. Targeting demographic disparity constrained classification under federated differential privacy, we propose a two-step algorithm, namely FDP-Fair. In the special case where there is only one server, we further propose a simple yet powerful algorithm, namely CDP-Fair, serving as a computationally-lightweight alternative. Under mild structural assumptions, theoretical guarantees on privacy, fairness and excess risk control are established. In particular, we disentangle the source of the private fairness-aware excess risk into a) intrinsic cost of classification, b) cost of private classification, c) non-private cost of fairness and d) private cost of fairness. Our theoretical findings are complemented by extensive numerical experiments on both synthetic and real datasets, highlighting the practicality of our designed algorithms.", "link": "http://arxiv.org/abs/2603.24392v1", "date": "2026-03-25", "relevancy": 2.1518, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4402}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4304}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4204}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Federated%20fairness-aware%20classification%20under%20differential%20privacy&body=Title%3A%20Federated%20fairness-aware%20classification%20under%20differential%20privacy%0AAuthor%3A%20Gengyu%20Xue%20and%20Yi%20Yu%0AAbstract%3A%20Privacy%20and%20algorithmic%20fairness%20have%20become%20two%20central%20issues%20in%20modern%20machine%20learning.%20Although%20each%20has%20separately%20emerged%20as%20a%20rapidly%20growing%20research%20area%2C%20their%20joint%20effect%20remains%20comparatively%20under-explored.%20In%20this%20paper%2C%20we%20systematically%20study%20the%20joint%20impact%20of%20differential%20privacy%20and%20fairness%20on%20classification%20in%20a%20federated%20setting%2C%20where%20data%20are%20distributed%20across%20multiple%20servers.%20Targeting%20demographic%20disparity%20constrained%20classification%20under%20federated%20differential%20privacy%2C%20we%20propose%20a%20two-step%20algorithm%2C%20namely%20FDP-Fair.%20In%20the%20special%20case%20where%20there%20is%20only%20one%20server%2C%20we%20further%20propose%20a%20simple%20yet%20powerful%20algorithm%2C%20namely%20CDP-Fair%2C%20serving%20as%20a%20computationally-lightweight%20alternative.%20Under%20mild%20structural%20assumptions%2C%20theoretical%20guarantees%20on%20privacy%2C%20fairness%20and%20excess%20risk%20control%20are%20established.%20In%20particular%2C%20we%20disentangle%20the%20source%20of%20the%20private%20fairness-aware%20excess%20risk%20into%20a%29%20intrinsic%20cost%20of%20classification%2C%20b%29%20cost%20of%20private%20classification%2C%20c%29%20non-private%20cost%20of%20fairness%20and%20d%29%20private%20cost%20of%20fairness.%20Our%20theoretical%20findings%20are%20complemented%20by%20extensive%20numerical%20experiments%20on%20both%20synthetic%20and%20real%20datasets%2C%20highlighting%20the%20practicality%20of%20our%20designed%20algorithms.%0ALink%3 irness%2520and%2520d%2529%2520private%2520cost%2520of%2520fairness.%2520Our%2520theoretical%2520findings%2520are%2520complemented%2520by%2520extensive%2520numerical%2520experiments%2520on%2520both%2520synthetic%2520and%2520real%2520datasets%252C%2520highlighting%2520the%2520practicality%2520of%2520our%2520designed%2520algorithms.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24392v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Federated%20fairness-aware%20classification%20under%20differential%20privacy&entry.906535625=Gengyu%20Xue%20and%20Yi%20Yu&entry.1292438233=Privacy%20and%20algorithmic%20fairness%20have%20become%20two%20central%20issues%20in%20modern%20machine%20learning.%20Although%20each%20has%20separately%20emerged%20as%20a%20rapidly%20growing%20research%20area%2C%20their%20joint%20effect%20remains%20comparatively%20under-explored.%20In%20this%20paper%2C%20we%20systematically%20study%20the%20joint%20impact%20of%20differential%20privacy%20and%20fairness%20on%20classification%20in%20a%20federated%20setting%2C%20where%20data%20are%20distributed%20across%20multiple%20servers.%20Targeting%20demographic%20disparity%20constrained%20classification%20under%20federated%20differential%20privacy%2C%20we%20propose%20a%20two-step%20algorithm%2C%20namely%20FDP-Fair.%20In%20the%20special%20case%20where%20there%20is%20only%20one%20server%2C%20we%20further%20propose%20a%20simple%20yet%20powerful%20algorithm%2C%20namely%20CDP-Fair%2C%20serving%20as%20a%20computationally-lightweight%20alternative.%20Under%20mild%20structural%20assumptions%2C%20theoretical%20guarantees%20on%20privacy%2C%20fairness%20and%20excess%20risk%20control%20are%20established.%20In%20particular%2C%20we%20disentangle%20the%20source%20of%20the%20private%20fairness-aware%20excess%20risk%20into%20a%29%20intrinsic%20cost%20of%20classification%2C%20b%29%20cost%20of%20private%20classification%2C%20c%29 {"title": "GeoRouter: Dynamic Paradigm Routing for Worldwide Image Geolocalization", "author": "Pengyue Jia and Derong Xu and Yingyi Zhang and Xiaopeng Li and Wenlin Zhang and Yi Wen and Yuanshao Zhu and Xiangyu Zhao", "abstract": "Worldwide image geolocalization aims to predict precise GPS coordinates for images captured anywhere on Earth, which is challenging due to the large visual and geographic diversity. Recent methods mainly follow two paradigms: retrieval-based approaches that match queries against a reference database, and generation-based approaches that directly predict coordinates using Large Vision-Language Models (LVLMs). However, we observe distinct error profiles between them: retrieval excels at fine-grained instance matching, while generation offers robust semantic reasoning. This complementary heterogeneity suggests that no single paradigm is universally superior. To harness this potential, we propose GeoRouter, a dynamic routing framework that adaptively assigns each query to the optimal paradigm. GeoRouter leverages an LVLM backbone to analyze visual content and provide routing decisions. To optimize GeoRouter, we introduce a distance-aware preference objective that converts the distance gap between paradigms into a continuous supervision signal, explicitly reflecting relative performance differences. Furthermore, we construct GeoRouting, the first large-scale dataset tailored for training routing policies with independent paradigm predictions. Extensive experiments on IM2GPS3k and YFCC4k demonstrate that GeoRouter significantly outperforms state-of-the-art baselines.", "link": "http://arxiv.org/abs/2603.24376v1", "date": "2026-03-25", "relevancy": 2.1491, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.548}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", " {"title": "LATS: Large Language Model Assisted Teacher-Student Framework for Multi-Agent Reinforcement Learning in Traffic Signal Control", "author": "Yifeng Zhang and Peizhuo Li and Tingguang Zhou and Mingfeng Fan and Guillaume Sartoretti", "abstract": "Adaptive Traffic Signal Control (ATSC) aims to optimize traffic flow and minimize delays by adjusting traffic lights in real time. Recent advances in Multi-agent Reinforcement Learning (MARL) have shown promise for ATSC, yet existing approaches still suffer from limited representational capacity, often leading to suboptimal performance and poor generalization in complex and dynamic traffic environments. On the other hand, Large Language Models (LLMs) excel at semantic representation, reasoning, and analysis, yet their propensity for hallucination and slow inference speeds often hinder their direct application to decision-making tasks. To address these challenges, we propose a novel learning paradigm named LATS that integrates LLMs and MARL, leveraging the former's strong prior knowledge and inductive abilities to enhance the latter's decision-making process. Specifically, we introduce a plug-and-play teacher-student learning module, where a trained embedding LLM serves as a teacher to generate rich semantic features that capture each intersection's topology structures and traffic dynamics. A much simpler (student) neural network then learns to emulate these features through knowledge distillation in the latent space, enabling the final model to operate independently from the LLM for downstream use in the RL decision-making process. This integration significantly enhances the overall model's representational capacity across diverse traffic scenarios, thus leading to more efficient and generalizable control strategies. Extensive experiments across diverse traffic datasets empirically demonstrate that our method enhances the representation learning capability of RL models, thereby leading to improved overall performance and generalization over both traditional RL and LLM-only approaches. [...]", "link": "http://arxiv.org/abs/2603.24361v1", "date": "2026-03-25", "relevancy": 2.1447, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5489}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5332}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5118}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LATS%3A%20Large%20Language%20Model%20Assisted%20Teacher-Student%20Framework%20for%20Multi-Agent%20Reinforcement%20Learning%20in%20Traffic%20Signal%20Control&body=Title%3A%20LATS%3A%20Large%20Language%20Model%20Assisted%20Teacher-Student%20Framework%20for%20Multi-Agent%20Reinforcement%20Learning%20in%20Traffic%20Signal%20Control%0AAuthor%3A%20Yifeng%20Zhang%20and%20Peizhuo%20Li%20and%20Tingguang%20Zhou%20and%20Mingfeng%20Fan%20and%20Guillaume%20Sartoretti%0AAbstract%3A%20Adaptive%20Traffic%20Signal%20Control%20%28ATSC%29%20aims%20to%20optimize%20traffic%20flow%20and%20minimize%20delays%20by%20adjusting%20traffic%20lights%20in%20real%20time.%20Recent%20advances%20in%20Multi-agent%20Reinforcement%20Learning%20%28MARL%29%20have%20shown%20promise%20for%20ATSC%2C%20yet%20existing%20approaches%20still%20suffer%20from%20limited%20representational%20capacity%2C%20often%20leading%20to%20suboptimal%20performance%20and%20poor%20generalization%20in%20complex%20and%20dynamic%20traffic%20environments.%20On%20the%20other%20hand%2C%20Large%20Language%20Models%20%28LLMs%29%20excel%20at%20semantic%20representation%2C%20reasoning%2C%20and%20analysis%2C%20yet%20their%20propensity%20for%20hallucination%20and%20slow%20inference%20speeds%20often%20hinder%20their%20direct%20application%20to%20decision-making%20tasks.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20learning%20paradigm%20named%20LATS%20that%20integrates%20LLMs%20and%20MARL%2C%20leveraging%20the%20former%27s%20strong%20prior%20knowledge%20and%20inductive%20abilities%20to%20enhance%20the%20latter%27s%20decision-making%20process.%20Specifically%2C%20we%20introduce%20a%20plug-and-play%20teacher-student%20learning%20module%2C%20where%20a%20trained%20embedding%20LLM%20serves%20as%20a%20teacher%20to%20generate%20rich%20semantic%20features%20that%20capture%20each%20intersection%27s%20topology%20structures%20and%20traffic%20dynamics.%20A%20much%20simpler%20%28student%29%20neural%20network%20then%20learns%20to%20emulate%20these%20features%20through%20knowledge%20distillation%20in%20the%20latent%20space%2C%20enabling%20the%20final%20model%20to%20operate%20independently%20from%20the%20LLM%20for%20downstream%20use%20in%20the%20RL%20decision-making%20process.%20This%20integration%20significantly%20enhances%20the%20overall%20model%27s%20representational%20capacity%20across%20diverse%20traffic%20scenarios%2C%20thus%20leading%20to%20more%20efficient%20and%20generalizable%20control%20strategies.%20Extensive%20experiments%20across%20diverse%20traffic%20datasets%20empirically%20demonstrate%20that%20our%20method%20enhances%20the%20representation%20learning%20capability%20of%20RL%20models%2C%20thereby%20leading%20to%20improved%20overall%20performance%20and%20generalization%20over%20both%20traditional%20RL%20and%20LLM-only%20approaches.%20%5B...%5D%0ALink%3A%20http%3A//arxiv.org/abs/2603.24361v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLATS%253A%2520Large%2520Language%2520Model%2520Assisted%2520Teacher-Student%2520Framework%2520for%2520Multi-Agent%2520Reinforcement%2520Learning%2520in%2520Traffic%2520Signal%2520Control%26entry.906535625%3DYifeng%2520Zhang%2520and%2520Peizhuo%2520Li%2520a {"title": "E0: Enhancing Generalization and Fine-Grained Control in VLA Models via Tweedie Discrete Diffusion", "author": "Zhihao Zhan and Jiaying Zhou and Likui Zhang and Qinhan Lv and Hao Liu and Jusheng Zhang and Weizheng Li and Ziliang Chen and Tianshui Chen and Ruifeng Zhai and Keze Wang and Liang Lin and Guangrun Wang", "abstract": "Vision-Language-Action (VLA) models offer a unified framework for robotic manipulation by integrating visual perception, language understanding, and control generation. However, existing VLA systems still struggle to generalize across diverse tasks, scenes, and camera viewpoints, and often produce coarse or unstable actions. We argue that these limitations are closely tied to the structural properties of actions in VLA settings, including the inherent multi-peaked nature of action distributions, the token-based symbolic reasoning of pretrained VLM/VLA backbones, and the effective finite resolution imposed by real-world robotic control. Motivated by these properties, we introduce E0, a tweedie discrete diffusion framework that formulates action generation as iterative denoising over quantized action tokens. By operating in a discrete action space with a principled diffusion process, E0 naturally aligns with token-based reasoning, supports fine-grained yet executable action control, and avoids the distributional mismatch of masking-based discrete diffusion. We further introduce a spherical viewpoint perturbation augmentation to enhance robustness to camera shifts without additional data. Experiments on LIBERO, VLABench, ManiSkill, and a real-world Franka arm demonstrate that E0 achieves state-of-the-art performance across 14 diverse environments, outperforming strong baselines by 10.7% on average.", "link": "http://arxiv.org/abs/2511.21542v2", "date": "2026-03-25", "relevancy": 1.632, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": {"title": "Project and Generate: Divergence-Free Neural Operators for Incompressible Flows", "author": "Xigui Li and Hongwei Zhang and Ruoxi Jiang and Deshu Chen and Chensen Lin and Limei Han and Yuan Qi and Xin Guo and Yuan Cheng", "abstract": "Learning-based models for fluid dynamics often operate in unconstrained function spaces, leading to physically inadmissible, unstable simulations. While penalty-based methods offer soft regularization, they provide no structural guarantees, resulting in spurious divergence and long-term collapse. In this work, we introduce a unified framework that enforces the incompressible continuity equation as a hard, intrinsic constraint for both deterministic and generative modeling. First, to project deterministic models onto the divergence-free subspace, we integrate a differentiable spectral Leray projection grounded in the Helmholtz-Hodge decomposition, which restricts the regression hypothesis space to physically admissible velocity fields. Second, to generate physically consistent distributions, we show that simply projecting model outputs is insufficient when the prior is incompatible. To address this, we construct a divergence-free Gaussian reference measure via a curl-based pushforward, ensuring the entire probability flow remains subspace-consistent by construction. Experiments on 2D Navier-Stokes equations demonstrate exact incompressibility up to discretization error and substantially improved stability and physical consistency.", "link": "http://arxiv.org/abs/2603.24500v1", "date": "2026-03-25", "relevancy": 1.6347, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5753}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.537}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": {"title": "Unicorn: A Universal and Collaborative Reinforcement Learning Approach Towards Generalizable Network-Wide Traffic Signal Control", "author": "Yifeng Zhang and Yilin Liu and Ping Gong and Peizhuo Li and Mingfeng Fan and Guillaume Sartoretti", "abstract": "Adaptive traffic signal control (ATSC) is crucial in reducing congestion, maximizing throughput, and improving mobility in rapidly growing urban areas. Recent advancements in parameter-sharing multi-agent reinforcement learning (MARL) have greatly enhanced the scalable and adaptive optimization of complex, dynamic flows in large-scale homogeneous networks. However, the inherent heterogeneity of real-world traffic networks, with their varied intersection topologies and interaction dynamics, poses substantial challenges to achieving scalable and effective ATSC across different traffic scenarios. To address these challenges, we present Unicorn, a universal and collaborative MARL framework designed for efficient and adaptable network-wide ATSC. Specifically, we first propose a unified approach to map the states and actions of intersections with varying topologies into a common structure based on traffic movements. Next, we design a Universal Traffic Representation (UTR) module with a decoder-only network for general feature extraction, enhancing the model's adaptability to diverse traffic scenarios. Additionally, we incorporate an Intersection Specifics Representation (ISR) module, designed to identify key latent vectors that represent the unique intersection's topology and traffic dynamics through variational inference techniques. To further refine these latent representations, we employ a contrastive learning approach in a self-supervised manner, which enables better differentiation of intersection-specific features. Moreover, we integrate the state-action dependencies of neighboring agents into policy optimization, which effectively captures dynamic agent interactions and facilitates efficient regional collaboration. [...]. The code is available at https://github.com/marmotlab/Unicorn", "link": "http://arxiv.org/abs/2503.11488v2", "date": "2026-03-25", "relevancy": 2.0097, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5265}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4875}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unicorn%3A%20A%20Universal%20and%20Collaborative%20Reinforcement%20Learning%20Approach%20Towards%20Generalizable%20Network-Wide%20Traffic%20Signal%20Control&body=Title%3A%20Unicorn%3A%20A%20Universal%20and%20Collaborative%20Reinforcement%20Learning%20Approach%20Towards%20Generalizable%20Network-Wide%20Traffic%20Signal%20Control%0AAuthor%3A%20Yifeng%20Zhang%20and%20Yilin%20Liu%20and%20Ping%20Gong%20and%20Peizhuo%20Li%20and%20Mingfeng%20Fan%20and%20Guillaume%20Sartoretti%0AAbstract%3A%20Adaptive%20traffic%20signal%20control%20%28ATSC%29%20is%20crucial%20in%20reducing%20congestion%2C%20maximizing%20throughput%2C%20and%20improving%20mobility%20in%20rapidly%20growing%20urban%20areas.%20Recent%20advancements%20in%20parameter-sharing%20multi-agent%20reinforcement%20learning%20%28MARL%29%20have%20greatly%20enhanced%20the%20scalable%20and%20adaptive%20optimization%20of%20complex%2C%20dynamic%20flows%20in%20large-scale%20homogeneous%20networks.%20However%2C%20the%20inherent%20heterogeneity%20of%20real-world%20traffic%20networks%2C%20with%20their%20varied%20intersection%20topologies%20and%20interaction%20dynamics%2C%20poses%20substantial%20challenges%20to%20achieving%20scalable%20and%20effective%20ATSC%20across%20different%20traffic%20scenarios.%20To%20address%20these%20c {"title": "Claudini: Autoresearch Discovers State-of-the-Art Adversarial Attack Algorithms for LLMs", "author": "Alexander Panfilov and Peter Romov and Igor Shilov and Yves-Alexandre de Montjoye and Jonas Geiping and Maksym Andriushchenko", "abstract": "LLM agents like Claude Code can not only write code but also be used for autonomous AI research and engineering \\citep{rank2026posttrainbench, novikov2025alphaevolve}. We show that an \\emph{autoresearch}-style pipeline \\citep{karpathy2026autoresearch} powered by Claude Code discovers novel white-box adversarial attack \\textit{algorithms} that \\textbf{significantly outperform all existing (30+) methods} in jailbreaking and prompt injection evaluations.\n  Starting from existing attack implementations, such as GCG~\\citep{zou2023universal}, the agent iterates to produce new algorithms achieving up to 40\\% attack success rate on CBRN queries against GPT-OSS-Safeguard-20B, compared to $\\leq$10\\% for existing algorithms (\\Cref{fig:teaser}, left).\n  The discovered algorithms generalize: attacks optimized on surrogate models transfer directly to held-out models, achieving \\textbf{100\\% ASR against Meta-SecAlign-70B} \\citep{chen2025secalign} versus 56\\% for the best baseline (\\Cref{fig:teaser}, middle). Extending the findings of~\\cite{carlini2025autoadvexbench}, our results are an early demonstration that incremental safety and security research can be automated using LLM agents. White-box adversarial red-teaming is particularly well-suited for this: existing methods provide strong starting points, and the optimization objective yields dense, quantitative feedback. We release all discovered attacks alongside baseline implementations and evaluation code at https://github.com/romovpa/claudini.", "link": "http://arxiv.org/abs/2603.24511v1", "date": "2026-03-25", "relevancy": 1.8397, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4758}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4487}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4485}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Claudini%3A%20Autoresearch%20Discovers%20State-of-the-Art%20Adversarial%20Attack%20Algorithms%20for%20LLMs&body=Title%3A%20Claudini%3A%20Autoresearch%20Discovers%20State-of-the-Art%20Adversarial%20Attack%20Algorithms%20for%20LLMs%0AAuthor%3A%20Alexander%20Panfilov%20and%20Peter%20Romov%20and%20Igor%20Shilov%20and%20Yves-Alexandre%20de%20Montjoye%20and%20Jonas%20Geiping%20and%20Maksym%20Andriushchenko%0AAbstract%3A%20LLM%20agents%20like%20Claude%20Code%20can%20not%20only%20write%20code%20but%20also%20be%20used%20for%20autonomous%20AI%20research%20and%20engineering%20%5Ccitep%7Brank2026posttrainbench%2C%20novikov2025alphaevolve%7D.%20We%20show%20that%20an%20%5Cemph%7Bautoresearch%7D-style%20pipeline%20%5Ccitep%7Bkarpathy2026autoresearch%7D%20powered%20by%20Claude%20Code%20discovers%20novel%20white-box%20adversarial%20attack%20%5Ctextit%7Balgorithms%7D%20that%20%5Ctextbf%7Bsignificantly%20outperform%20all%20existing%20%2830%2B%29%20methods%7D%20in%20jailbreaking%20and%20prompt%20injection%20evaluations.%0A%20%20Starting%20from%20existing%20attack%20implementations%2C%20such%20as%20GCG~%5Ccitep%7Bzou2023universal%7D%2C%20the%20agent%20iterates%20to%20produce%20new%20algorithms%20achieving%20up%20to%2040%5C%25%20attack%20success%20rate%20on%20CBRN%20queries%20against%20GPT-OSS-Safeguard-20B%2C%20compared%20to%20%24%5Cleq%2410%5C%25%20for%20existing%20algorithms%20%28%5CCref%7Bfig%3Ateaser%7D%2C%20left%29.%0A%20%20The%20discovered%20algorithms%20generalize%3A%20attacks%20optimized%20on%20surrogate%20models%20transfer%20directly%20to%20held-out%20models%2C%20achieving%20%5Ctextbf%7B100%5C%25%20ASR%20against%20Meta-SecAlign-70B%7D%20%5Ccitep%7Bchen2025secalign%7D%20versus%2056%5C%25%20for%20the%20best%20baseline%20%28%5CCref%7Bfig%3Ateaser%7D%2C%20middle%29.%20Extending%20the%20findings%20of~%5Ccite%7Bcarlini2025autoadvexbench%7D%2C%20our%20results%20are%20an%20early%20demonstration%20that%20incremental%20safety%20and%20security%20research%20can%20be%20automated%20using%20LLM%20agents.%20White-box%20adversarial%20red-teaming%20is%20particularly%20well-suited%20for%20this%3A%20existing%20methods%20provide%20strong%20starting%20points%2C%20and%20the%20optimization%20objective%20yields%20dense%2C%20quantitative%20feedback.%20We%20release%20all%20discovered%20attacks%20alongside%20baseline%20implementations%20and%20evaluation%20code%20at%20https%3A//github.com/romovpa/claudini.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24511v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClaudini%253A%2520Autoresearch%2520Discovers%2520State-of-the-Art%2520Adversarial%2520Attack%2520Algorithms%2520for%2520LLMs%26entry.906535625%3DAlexander%2520Panfilov%2520and%2520Peter%2520Romov%2520and%2520Igor%2520Shilov%2520and%2520Yves-Alexandre%2520de%2520Montjoye%2520and%2520Jonas%2520Geiping%2520and%2520Maksym%2520Andriushchenko%26entry.1292438233%3DLLM%2520agents%2520like%2520Claude%2520Code%2520can%2520not%2520only%2520write%2520code%2520but%2520also%2520be%2520used%2520for%2520autonomous%2520AI%2520research%2520and%2520engineering%2520%255Ccitep%257Brank2026posttrainbench%252C%2520novikov2025alphaevolve%257D.%2520We%2520show%2520that%2520an%2520%255Cemph%257Bautoresearch%257D-style%2520pipeline%2520%255Ccitep%257Bkarpathy2026autoresearch%257D%2520powered%2520by%2520Claude%2520Code%2520discovers%2520novel%2520white-box%2520adversarial%2520attack%2520%255Ctextit%257Balgorithms%257D%2520that%2520%255Ctextbf%257Bsignificantly%2520outperform% {"title": "ChordEdit: One-Step Low-Energy Transport for Image Editing", "author": "Liangsi Lu and Xuhang Chen and Minzhe Guo and Shichu Li and Jingchao Wang and Yang Shi", "abstract": "The advent of one-step text-to-image (T2I) models offers unprecedented synthesis speed. However, their application to text-guided image editing remains severely hampered, as forcing existing training-free editors into a single inference step fails. This failure manifests as severe object distortion and a critical loss of consistency in non-edited regions, resulting from the high-energy, erratic trajectories produced by naive vector arithmetic on the models' structured fields. To address this problem, we introduce ChordEdit, a model agnostic, training-free, and inversion-free method that facilitates high-fidelity one-step editing. We recast editing as a transport problem between the source and target distributions defined by the source and target text prompts. Leveraging dynamic optimal transport theory, we derive a principled, low-energy control strategy. This strategy yields a smoothed, variance-reduced editing field that is inherently stable, facilitating the field to be traversed in a single, large integration step. A theoretically grounded and experimentally validated approach allows ChordEdit to deliver fast, lightweight and precise edits, finally achieving true real-time editing on these challenging models.", "link": "http://arxiv.org/abs/2602.19083v2", "date": "2026-03-25", "relevancy": 1.0985, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5554}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5463}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.546}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ChordEdit%3A%20One-Step%20Low-Energy%20Transport%20for%20Image%20Editing&body=Title%3A%20ChordEdit%3A%20One-Step%20Low-Energy%20Transport%20for%20Image%20Editing%0AAuthor%3A%20Liangsi%20Lu%20and%20Xuhang%20Chen%20and%20Minzhe%20Guo%20and%20Shichu%20Li%20and%20Jingchao%20Wang%20and%20Yang%20Shi%0AAbstract%3A%20The%20advent%20of%20one-step%20text-to-image%20%28T2I%29%20models%20offers%20unprecedented%20synthesis%20speed.%20However%2C%20their%20application%20to%20text-guided%20image%20editing%20remains%20severely%20hampered%2C%20as%20forcing%20existing%20training-free%20editors%20into%20a%20single%20inference%20step%20fails.%20This%20failure%20manifests%20as%20severe%20object%20distortion%20and%20a%20critical%20loss%20of%20consistency%20in%20non-edited%20regions%2C%20resulting%20from%20the%20high-energy%2C%20erratic%20trajectories%20produced%20by%20naive%20vector%20arithmetic%20on%20the%20models%27%20structured%20fields.%20To%20address%20this%20problem%2C%20we%20introduce%20ChordEdit%2C%20a%20model%20agnostic%2C%20training-free%2C%20and%20inversion-free%20method%20that%20facilitates%20high-fidelity%20one-step%20editing.%20We%20recast%20editing%20as%20a%20transport%20problem%20between%20the%20source%20and%20target%20distributions%20defined%20by%20the%20source%20and%20target%20text%20prompts.%20Leveraging%20dynamic%20optimal%20transport%20theory%2C%20we%20derive%20a%20principled%2C%20low-energy%20control%20strategy.%20This%20strategy%20yields%20a%20smoothed%2C%20variance-reduced%20editing%20field%20that%20is%20inherently%20stable%2C%20facilitating%20the%20field%20to%20be%20traversed%20in%20a%20single%2C%20large%20integration%20step.%20A%20theoretically%20grounded%20and%20experimentally%20validated%20approach%20allows%20ChordEdit%20to%20deliver%20fast%2C%20lightweight%20and%20precise%20edits%2C%20finally%20achieving%20true%20real-time%20editing%20on%20these%20challenging%20models.%0ALink%3A%20http%3A//arxiv.org/ab {"title": "From Imperative to Declarative: Towards LLM-friendly OS Interfaces for Boosted Computer-Use Agents", "author": "Yuan Wang and Mingyu Li and Haibo Chen", "abstract": "Computer-use agents (CUAs) powered by large language models (LLMs) have emerged as a promising approach to automating computer tasks, yet they struggle with the existing human-oriented OS interfaces - graphical user interfaces (GUIs). GUIs force LLMs to decompose high-level goals into lengthy, error-prone sequences of fine-grained actions, resulting in low success rates and an excessive number of LLM calls.\n  We propose Declarative Model Interface (DMI), an abstraction that transforms existing GUIs into three declarative primitives: access, state, and observation, thereby providing novel OS interfaces tailored for LLM agents. Our key idea is policy-mechanism separation: LLMs focus on high-level semantic planning (policy) while DMI handles low-level navigation and interaction (mechanism). DMI does not require modifying the application source code or relying on application programming interfaces (APIs).\n  We evaluate DMI with Microsoft Office Suite (Word, PowerPoint, Excel) on Windows. Integrating DMI into a leading GUI-based agent baseline improves task success rates by 67% and reduces interaction steps by 43.5%. Notably, DMI completes over 61% of successful tasks with a single LLM call.", "link": "http://arxiv.org/abs/2510.04607v2", "date": "2026-03-25", "relevancy": 1.3858, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4774}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4617}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4558}], "ma %20single%20LLM%20call.%0ALink%3A%20http%3A//arxiv.org/abs/2510.04607v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Imperative%2520to%2520Declarative%253A%2520Towards%2520LLM-friendly%2520OS%2520Interfaces%2520for%2520Boosted%2520Computer-Use%2520Agents%26entry.906535625%3DYuan%2520Wang%2520and%2520Mingyu%2520Li%2520and%2520Haibo%2520Chen%26entry.1292438233%3DComputer-use%2520agents%2520%2528CUAs%2529%2520powered%2520by%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520emerged%2520as%2520a%2520promising%2520approach%2520to%2520automating%2520computer%2520tasks%252C%2520yet%2520they%2520struggle%2520with%2520the%2520existing%2520human-oriented%2520OS%2520interfaces%2520-%2520graphical%2520user%2520interfaces%2520%2528GUIs%2529.%2520GUIs%2520force%2520LLMs%2520to%2520decompose%2520high-level%2520goals%2520into%2520lengthy%252C%2520error-prone%2520sequences%2520of%2520fine-grained%2520actions%252C%2520resulting%2520in%2520low%2520success%2520rates%2520and%2520an%2520excessive%2520number%2520of%2520LLM%2520calls.%250A%2520%2520We%2520propose%2520Declarative%2520Model%2520Interface%2520%2528DMI%2529%252C%2520an%2520abstraction%2520that%2520transforms%2520existing%2520GUIs%2520into%2520three%2520declarative%2520primitives%253A%2520access%252C%2520state%252C%2520and%2520observation%252C%2520thereby%2520providing%2520novel%2520OS%2520interfaces%2520tailored%2520for%2520LLM%2520agents.%2520Our%2520key%2520idea%2520is%2520policy-mechanism%2520separation%253A%2520LLMs%2520focus%2520on%2520high-level%2520semantic%2520planning%2520%2528policy%2529%2520while%2520DMI%2520handles%2520low-level%2520navigation%2520and%2520interaction%2520%2528mechanism%2529.%2520DMI%2520does%2520not%2520require%2520modifying%2520the%2520application%2520source%2520code%2520or%2520relying%2520on%2520application%2520programming%2520interfaces%2520%2528APIs%2529.%250A%2520%2520We%2520evaluate%2520DMI%2520with%2520Microsoft%2520Office%2520Suite%2520%2528Word%252C%2520PowerPoint%252C%2520Excel%2529%2520on%2520Windows.%2520Integrating%2520DMI%2520into%2520a%2520leading%2520GUI-based%2520agent%2520baseline%2520improves%2520task%2520success%2520rates%2520by%252067%2525%2520and%2520reduces%2520interaction%2520steps%2520by%252043.5%2525.%2520Notably%252C%2520DMI%2520completes%2520over%252061%2525%2520of%2520successful%2520tasks%2520with%2520a%2520single%2520LLM%2520call.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.04607v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Imperative%20to%20Declarative%3A%20Towards%20LLM-friendly%20OS%20Interfaces%20for%20Boosted%20Computer-Use%20Agents&entry.906535625=Yuan%20Wang%20and%20Mingyu%20Li%20and%20Haibo%20Chen&entry.1292438233=Computer-use%20agents%20%28CUAs%29%20powered%20by%20large%20language%20models%20%28LLMs%29%20have%20emerged%20as%20a%20promising%20approach%20to%20automating%20computer%20tasks%2C%20yet%20they%20struggle%20with%20the%20existing%20human-oriented%20OS%20interfaces%20-%20graphical%20user%20interfaces%20%28GUIs%29.%20GUIs%20force%20LLMs%20to%20decompose%20high-level%20goals%20into%20lengthy%2C%20error-prone%20sequences%20of%20fine-grained%20actions%2C%20resulting%20in%20low%20success%20rates%20and%20an%20excessive%20number%20of%20LLM%20calls.%0A%20%20We%20propose%20Declarative%20Model%20Interface%20%28DMI%29%2C%20an%20abstraction%20that%20transforms%20existing%20GUIs%20into%20three%20declarative%20primitives%3A%20access%2C%20state%2C%20and%20observation%2C%20thereby%20providing%20novel%20OS%20interfaces%20tailored%20for%20LLM%20agents.%20Our%20key%20idea%20is%20policy-mechanism%20separation%3A%20LLMs%20focus%20on%20high-level%20semantic%20planning%20%28policy%29%20while%20DMI%20handles%20low-level%20navigation%20and%20interaction%20%28mechanism%29.%20DMI%20does%20not%20require%20mod {"title": "Evaluating Chunking Strategies For Retrieval-Augmented Generation in Oil and Gas Enterprise Documents", "author": "Samuel Taiwo and Mohd Amaluddin Yusoff", "abstract": "Retrieval-Augmented Generation (RAG) has emerged as a framework to address the constraints of Large Language Models (LLMs). Yet, its effectiveness fundamentally hinges on document chunking - an often-overlooked determinant of its quality. This paper presents an empirical study quantifying performance differences across four chunking strategies: fixed-size sliding window, recursive, breakpoint-based semantic, and structure-aware. We evaluated these methods using a proprietary corpus of oil and gas enterprise documents, including text-heavy manuals, table-heavy specifications, and piping and instrumentation diagrams (P and IDs). Our findings show that structure-aware chunking yields higher overall retrieval effectiveness, particularly in top-K metrics, and incurs significantly lower computational costs than semantic or baseline strategies. Crucially, all four methods demonstrated limited effectiveness on P and IDs, underscoring a core limitation of purely text-based RAG within visually and spatially encoded documents. We conclude that while explicit structure preservation is essential for specialised domains, future work must integrate multimodal models to overcome current limitations.", "link": "http://arxiv.org/abs/2603.24556v1", "date": "2026-03-25", "relevancy": 1.8794, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4832}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4774}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.457}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20Chunking%20Strategies%20For%20Retrieval-Augmented%20Generation%20in%20Oil%20and%20Gas%20Enterprise%20Documents&body=Title%3A%20Evaluating%20Chunking%20Strategies%20For%20Retrieval-Augmented%20Generation%20in%20Oil%20and%20Gas%20Enterprise%20Documents%0AAuthor%3A%20Samuel%20Taiwo%20and%20Mohd%20Amaluddin%20Yusoff%0AAbstract%3A%20Retrieval-Augmented%20Generation%20%28RAG%29%20has%20emerged%20as%20a%20framework%20to%20address%20the%20constraints%20of%20Large%20Language%20Models%20%28LLMs%29.%20Yet%2C%20its%20effectiveness%20fundamentally%20hinges%20on%20document%20chunking%20-%20an%20often-overlooked%20determinant%20of%20its%20quality.%20This%20paper%20presents%20an%20empirical%20study%20quantifying%20performance%20differences%20across%20four%20chunking%20strategies%3A%20fixed-size%20sliding%20window%2C%20recursive%2C%20breakpoint-based%20semantic%2C%20and%20structure-aware.%20We%20evaluated%20these%20methods%20using%20a%20proprietary%20corpus%20of%20oil%20and%20gas%20enterprise%20documents%2C%20including%20text-heavy%20manuals%2C%20table-heavy%20specifications%2C%20and%20piping%20and%20instrumentation%20diagrams%20%28P%20and%20IDs%29.%20Our%20findings%20show%20that%20structure-aware%20chunking%20yields%20higher%20overall%20retrieval%20effectiveness%2C%20particularly%20in%20top-K%20metrics%2C%20and%20incurs%20significantly%20lower%20computational%20costs%20than%20semantic%20or%20baseline%20strategies.%20Crucially%2C%20all%20four%20methods%20demonstrated%20limited%20effectiveness%20on%20P%20and%20IDs%2C%20underscoring%20a%20core%20limitation%20of%20purely%20text-based%20RAG%20within%20visually%20and%20spatially%20encoded%20documents.%20We%20conclude%20that%20while%20explicit%20structure%20preservation%20is%20essential%20for%20specialised%20domains%2C%20future%20work%20must%20integrate%20multimodal%20models%20to%20overcome%20current%20limitations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24556v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFq

{"title": "Fast3Dcache: Training-free 3D Geometry Synthesis Acceleration", "author": "Mengyu Yang and Yanming Yang and Chenyi Xu and Chenxi Song and Yufan Zuo and Tong Zhao and Ruibo Li and Chi Zhang", "abstract": "Diffusion models have achieved impressive generative quality across modalities like 2D images, videos, and 3D shapes, but their inference remains computationally expensive due to the iterative denoising process. While recent caching-based methods effectively reuse redundant computations to speed up 2D and video generation, directly applying these techniques to 3D diffusion models can severely disrupt geometric consistency. In 3D synthesis, even minor numerical errors in cached latent features accumulate, causing structural artifacts and topological inconsistencies. To overcome this limitation, we propose Fast3Dcache, a training-free geometry-aware caching framework that accelerates 3D diffusion inference while preserving geometric fidelity. Our method introduces a Predictive Caching Scheduler Constraint (PCSC) to dynamically determine cache quotas according to voxel stabilization patterns and a Spatiotemporal Stability Criterion (SSC) to select stable features for reuse based on velocity magnitude and acceleration criterion. Comprehensive experiments show that Fast3Dcache accelerates inference significantly, achieving up to a 27.12% speed-up and a 54.83% reduction in FLOPs, with minimal degradation in geometric quality as measured by Chamfer Distance (2.48%) and F-Score (1.95%).", "link": "http://arxiv.org/abs/2511.22533v2", "date": "2026-03-25", "relevancy": 2.416, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6096}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6029}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6029}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fast3Dcache%3A%20Training-free%203D%20Geometry%20Synthesis%20Acceleration&body=Title%3A%20Fast3Dcache%3A%20Training-free%203D%20Geometry%20Synthesis%20Acceleration%0AAuthor%3A%20Mengyu%20Yang%20and%20Yanming%20Yang%20and%20Chenyi%20Xu%20and%20Chenxi%20Song%20and%20Yufan%20Zuo%20and%20Tong%20Zhao%20and%20Ruibo%20Li%20and%20Chi%20Zhang%0AAbstract%3A%20Diffusion%20models%20have%20achieved%20impressive%20generative%20quality%20across%20modalities%20like%202D%20images%2C%20videos%2C%20and%203D%20shapes%2C%20but%20their%20inference%20remains%20computationally%20expensive%20due%20to%20the%20iterative%20denoising%20process.%20While%20recent%20caching-based%20methods%20effectively%20reuse%20redundant%20computations%20to%20speed%20up%202D%20and%20video%20generation%2C%20directly%20applying%20these%20techniques%20to%203D%20diffusion%20models%20can%20severely%20disrupt%20geometric%20consistency.%20In%203D%20synthesis%2C%20even%20minor%20numerical%20errors%20in%20cached%20latent%20features%20accumulate%2C%20causing%20structural%20artifacts%20and%20topological%20inconsistencies.%20To%20overcome%20this%20limitation%2C%20we%20propose%20Fast3Dcache%2C%20a%20training-free%20geometry-aware%20caching%20framework%20that%20accelerates%203D%20diffusion%20inference%20while%20preserving%20geometric%20fidelity.%20Our%20method%20introduces%20a%20Predictive%20Caching%20Scheduler%20Constraint%20%28PCSC%29%20to%20dynamically%20determine%20cache%20quotas%20according%20to%20voxel%20stabilization%20patterns%20and%20a%20Spatiotemporal%20Stability%20Criterion%20%28SSC%29%20to%20select%20stable%20features%20for%20reuse%20based%20on%20velocity%20magnitude%20and%20acceleration%20criterion.%20Comprehensive%20experiments%20show%20that%20Fast3Dcache%20accelerates%20inference%20significantly%2C%20achieving%20up%20to%20a%2027.12%25%20speed-up%20and%20a%2054.83%25%20reduction%20in%20FLOPs%2C%20with%20minimal%20degradation%20in%20geometric%20quality%20as%20measured%20by%20Chamfer%20Distance%20%282.48%25%29%20and%20F-Score%20%281.95%25%29.%0ALink%3A%20http%3A//arxiv.org/abs/2511.22533v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFast3Dcache%253A%2520Training-free%25203D%2520Geometry%2520Synthesis%2520Acceleration%26entry.906535625%3DMengyu%2520Yang%2520and%2520Yanming%2520Yang%2520and%2520Chenyi%2520Xu%2520and%2520Chenxi%2520Song%2520and%2520Yufan%2520Zuo%2520and%2520Tong%2520Zhao%2520and%2520Ruibo%2520Li%2520and%2520Chi%2520Zhang%26entry.1292438233%3DDiffusion%2520models%2520have%2520achieved%2520impressive%2520generative%2520quality%2520across%2520modalities%2520like%25202D%2520images%252C%2520videos%252C%2520and%25203D%2520shapes%252C%2520but%2520their%2520inference%2520remains%2520computationally%2520expensive%2520due%2520to%2520the%2520iterative%2520denoising%2520process.%2520While%2520recent%2520caching-based%2520methods%2520effectively%2520reuse%2520redundant%2520computations%2520to%2520speed%2520up%25202D%2520and%2520video%2520generation%252C%2520directly%2520applying%2520these%2520techniques%2520to%25203D%2520diffusion%2520models%2520can%2520severely%2520disrupt%2520geometric%2520consistency.%2520In%25203D%2520synthesis%252C%2520even%2520minor%2520numerical%2520errors%2520in%2520cached%2520latent%2520features%2520accumulate%252C%2520causing%2520structural%2520artifacts%2520and%2520topological%2520inconsistencies.%2520To%2520overcome%2520this%2520limitation%252C%2520we%2520propose%2520Fast3Dcache%252C%2520a%2520training-free%2520geometry-aware%2520caching%2520framework%2520that%2520accelerates%25203D%2520diffusion%2520inference%2520while%2520preserving%2520geometric%2520fidelity.%2520Our%2520method%2520introduces%2520a%2520Predictive%2520Caching%2520Scheduler%2520Constraint%2520%2528PCSC%2529%2520to%2520dynamically%2520determine%2520cache%2520quotas%2520ac {"title": "Teacher-Student Diffusion Model for Text-Driven 3D Hand Motion Generation", "author": "Ching-Lam Cheng and Bin Zhu and Shengfeng He", "abstract": "Generating realistic 3D hand motion from natural language is vital for VR, robotics, and human-computer interaction. Existing methods either focus on full-body motion, overlooking detailed hand gestures, or require explicit 3D object meshes, limiting generality. We propose TSHaMo, a model-agnostic teacher-student diffusion framework for text-driven hand motion generation. The student model learns to synthesize motions from text alone, while the teacher leverages auxiliary signals (e.g., MANO parameters) to provide structured guidance during training. A co-training strategy enables the student to benefit from the teacher's intermediate predictions while remaining text-only at inference. Evaluated using two diffusion backbones on GRAB and H2O, TSHaMo consistently improves motion quality and diversity. Ablations confirm its robustness and flexibility in using diverse auxiliary inputs without requiring 3D objects at test time.", "link": "http://arxiv.org/abs/2603.24407v1", "date": "2026-03-25", "relevancy": 2.4145, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6578}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5952}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Teacher-Student%20Diffusion%20Model%20for%20Text-Driven%203D%20Hand%20Motion%20Generation&body=Title%3A%20Teacher-Student%20Diffusion%20Model%20for%20Text-Driven%203D%20Hand%20Motion%20Generation%0AAuthor%3A%20Ching-Lam%20Cheng%20and%20Bin%20Zhu%20and%20Shengfeng%20He%0AAbstract%3A%20Generating%20realistic%203D%20hand%20motion%20from%20natural%20language%20is%20vital%20for%20VR%2C%20robotics%2C%20and%20human-computer%20interaction.%20Existing%20methods%20either%20focus%20on%20full-body%20motion%2C%20overlooking%20detailed%20hand%20gestures%2C%20or%20require%20explicit%203D%20object%20meshes%2C%20limiting%20generality.%20We%20propose%20TSHaMo%2C%20a%20model-agnostic%20teacher-student%20diffusion%20framework%20for%20text-driven%20hand%20motion%20generation.%20The%20student%20model%20learns%20to%20synthesize%20motions%20from%20text%20alone%2C%20while%20the%20teacher%20leverages%20auxiliary%20signals%20%28e.g.%2C%20MANO%20parameters%29%20to%20provide%20structured%20guidance%20during%20training.%20A%20co-training%20strategy%20enables%20the%20student%20to%20benefit%20from%20the%20teacher%27s%20intermediate%20predictions%20while%20remaining%20text-only%20at%20inference.%20Evaluated%20using%20two%20diffusion%20backbones%20on%20GRAB%20and%20H2O%2C%20TSHaMo%20consistently%20improves%20motion%20quality%20and%20diversity.%20Ablations%20confirm%20its%20robustness%20and%20flexibility%20in%20using%20diverse%20auxiliary%20inputs%20without%20requiring%203D%20objects%20at%20test%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24407v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTeacher-Student%2520Diffusion%2520Model%2520for%2520Text-Driven%25203D%2520Hand%2520Motion%2520Generation%26entry.906535625%3DChing-Lam%2520Cheng%2520and%2520Bin%2520Zhu%2520and%2520Shengfeng%2520He%26entry.1292438233%3DGenerating%2520realistic%25203D%2520hand%2520motion%2520from%2520natural%2520language%2520is%2520vital%2520for%2520VR%252C%2520robotics%252C%2520and%2520human-computer%2520interaction.%2520Existing%2520methods%2520either%2520focus%2520on%2520full-body%2520motion%252C%2520overlooking%2520detailed%2520hand%2520gestures%252C%2520or%2520require%2520explicit%25203D%2520object%2520meshes%252C%2520limiting%2520generality.%2520We%2520propose%2520TSHaMo%252C%2520a%2520model-agnostic%2520teacher-student%2520diffusion%2520framework%2520for%2520text-driven%2520hand%2520motion%2520generation.%2520The%2520student%2520model%2520learns%2520to%2520synthesize%2520motions%2520from%2520text%2520alone%252C%2520while%2520the%2520teacher%2520leverages%2520auxiliary%2520signals%2520%2528e.g.%252C%2520MANO%2520parameters%2529%2520to%2520provide%2520structured%2520guidance%2520during%2520training.%2520A%2520co-training%2520strategy%2520enables%2520the%2520student%2520to%2520benefit%2520from%2520the%2520teacher%2527s%2520intermediate%2520predictions%2520while%2520remaining%2520text-only%2520at%2520inference.%2520Evaluated%2520using%2520two%2520diffusion%2520backbones%2520on%2520GRAB%2520and%2520H2O%252C%2520TSHaMo%2520consistently%2520improves%2520motion%2520quality%2520and%2520diversity.%2520Ablations%2520confirm%2520its%2520robustness%2520and%2520flexibility%2520in%2520using%2520diverse%2520auxiliary%2520inputs%2520without%2520requiring%25203D%2520objects%2520at%2520test%2520time.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24407v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Teacher-Student%20Diffusion%20Model%20for%20Text-Driven%203D%20Hand%20Motion%20Generation&entry.906535625=Ching-Lam%20Cheng%20and%20Bin%20Zhu%20and%20Shengfeng%20He&entry.1292438233=Generating%20realistic%203D%20hand%20motion%20from%20natural%20language%20is%20vital%20for%20VR%2C%20robotics%2C%20and%20human-computer%20interaction.%20Existing%20methods%20either%20focus%20on%20full-body%20motion%2C%20overlooking%20detailed%20hand%20gestures%2C%20or%20require%20explicit%203D%20object%20meshes%2C%20limiting%20generality.%20We%20propose%20TSHaMo%2C%20a%20model-agnostic%20teacher-student%20diffusion%20framework%20for%20text-driven%20hand%20motion%20generation.%20The%20student%20model%20learns%20to%20synthesize%20motions%20from%20text%20alo {"title": "LensWalk: Agentic Video Understanding by Planning How You See in Videos", "author": "Keliang Li and Yansong Li and Hongze Shen and Mengdi Liu and Hong Chang and Shiguang Shan", "abstract": "The dense, temporal nature of video presents a profound challenge for automated analysis. Despite the use of powerful Vision-Language Models, prevailing methods for video understanding are limited by the inherent disconnect between reasoning and perception: they rely on static, pre-processed information and cannot actively seek raw evidence from video as their understanding evolves. To address this, we introduce LensWalk, a flexible agentic framework that empowers a Large Language Model reasoner to control its own visual observation actively. LensWalk establishes a tight reason-plan-observe loop where the agent dynamically specifies, at each step, the temporal scope and sampling density of the video it observes. Using a suite of versatile, Vision-Language Model based tools parameterized by these specifications, the agent can perform broad scans for cues, focus on specific segments for fact extraction, and stitch evidence from multiple moments for holistic verification. This design allows for progressive, on-demand evidence gathering that directly serves the agent's evolving chain of thought. Without requiring any model fine-tuning, LensWalk delivers substantial, plug-and-play performance gains on multiple model recipes, boosting their accuracy by over 5\\% on challenging long-video benchmarks like LVBench and Video-MME. Our analysis reveals that enabling an agent to control how it sees is key to unlocking more accurate, robust, and interpretable video reasoning.", "link": "http://arxiv.org/abs/2603.24558v1", "date": "2026-03-25", "relevancy": 2.4089, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6085}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6085}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5707}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LensWalk%3A%20Agentic%20Video%20Understanding%20by%20Planning%20How%20You%20See%20in%20Videos&body=Title%3A%20LensWalk%3A%20Agentic%20Video%20Understanding%20by%20Planning%20How%20You%20See%20in%20Videos%0AAuthor%3A%20Keliang%20Li%20and%20Yansong%20Li%20and%20Hongze%20Shen%20and%20Mengdi%20Liu%20and%20Hong%20Chang%20and%20Shiguang%20Shan%0AAbstract%3A%20The%20dense%2C%20temporal%20nature%20of%20video%20presents%20a%20profound%20challenge%20for%20automated%20analysis.%20Despite%20the%20use%20of%20powerful%20Vision-Language%20Models%2C%20prevailing%20methods%20for%20video%20understanding%20are%20limited%20by%20the%20inherent%20disconnect%20between%20reasoning%20and%20perception%3A%20they%20rely%20on%20static%2C%20pre-processed%20information%20and%20cannot%20actively%20seek%20raw%20evidence%20from%20video%20as%20their%20understanding%20evolves.%20To%20address%20this%2C%20we%20introduce%20LensWalk%2C%20a%20flexible%20agentic%20framework%20that%20empowers%20a%20Large%20Language%20Model%20reasoner%20to%20control%20its%20own%20visual%20observation%20actively.%20LensWalk%20establishes%20a%20tight%20reason-plan-observe%20loop%20where%20the%20agent%20dynamically%20specifies%2C%20at%20each%20step%2C%20the%20temporal%20scope%20and%20sampling%20density%20of%20the%20video%20it%20observes.%20Using%20a%20suite%20of%20versatile%2C%20Vision-Language%20Model%20based%20tools%20parameterized%20by%20these%20specifications%2C%20the%20agent%20can%20perform%20broad%20scans%20for%20cues%2C%20focus%20on%20specific%20segments%20for%20fact%20extraction%2C%20and%20stitch%20evidence%20from%20multiple%20moments%20for%20holistic%20verification.%20This%20design%20allows%20for%20progressive%2C%20on-demand%20evidence%20gathering%20that%20directly%20serves%20the%20agent%27s%20evolving%20chain%20of%20thought.%20Without%20requiring%20any%20model%20fine-tuning%2C%20LensWalk%20delivers%20substantial%2C%20plug-and-play%20performance%20gains%20on%20multiple%20model%20recipes%2C%20boosting%20their%20accuracy%20by%20over%205%5C%25%20on%20challenging%20long-video%20benchmarks%20like%20LVBench%20and%20Video-MME.%20Our%20analysis%20reveals%20that%20enabling%20an%20agent%20to%20control%20how%20it%20sees%20is%20key%20to%20unlocking%20more%20accurate%2C%20robust%2C%20and%20interpretable%20video%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24558v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLensWalk%253A%2520Agentic%2520Video%2520Understanding%2520by%2520Planning%2520How%2520You%2520See%2520in%2520Videos%26entry.906535625%3DKeliang%2520Li%2520and%2520Yansong%2520Li%2520and%2520Hongze%2520Shen%2520and%2520Mengdi%2520Liu%2520and%2520Hong%2520Chang%2520and%2520Shiguang%2520Shan%26entry.1292438233%3DThe%2520dense%252C%2520temporal%2520nature%2520of%2520video%2520presents%2520a%2520profound%2520challenge%2520for%2520automated%2520analysis.%2520Despite%2520the%2520use%2520of%2520powerful%2520Vision-Language%2520Models%252C%2520prevailing%2520methods%2520for%2520video%2520understanding%2520are%2520limited%2520by%2520the%2520inherent%2520disconnect%2520between%2520reasoning%2520and%2520perception%253A%2520they%2520rely%2520on%2520static%252C%2520pre-processed%2520information%2520and%2520cannot%2520actively%2520seek%2520raw%2520evidence%2520from%2520video%2520as%2520their%2520understanding%2520evolves.%2520To%2520address%2520this%252C%2520we%2520introduce%2520LensWalk%252C%2520a%2520flexible%2520agentic%2520framework%2520that%2520empowers%2520a%2520Large%2520Language%2520Model%2520reasoner%2520to%2520control%2520its%2520own%2520visual%2520observation%2520activ {"title": "CGRL: Causal-Guided Representation Learning for Graph Out-of-Distribution Generalization", "author": "Bowen Lu and Liangqiang Yang and Teng Li", "abstract": "Graph Neural Networks (GNNs) have achieved impressive performance in graph-related tasks. However, they suffer from poor generalization on out-of-distribution (OOD) data, as they tend to learn spurious correlations. Such correlations present a phenomenon that GNNs fail to stably learn the mutual information between prediction representations and ground-truth labels under OOD settings. To address these challenges, we formulate a causal graph starting from the essence of node classification, adopt backdoor adjustment to block non-causal paths, and theoretically derive a lower bound for improving OOD generalization of GNNs. To materialize these insights, we further propose a novel approach integrating causal representation learning and a loss replacement strategy. The former captures node-level causal invariance and reconstructs graph posterior distribution. The latter introduces asymptotic losses of the same order to replace the original losses. Extensive experiments demonstrate the superiority of our method in OOD generalization and effectively alleviating the phenomenon of unstable mutual information learning.", "link": "http://arxiv.org/abs/2603.24304v1", "date": "2026-03-25", "relevancy": 2.4018, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4912}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4842}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4657}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CGRL%3A%20Causal-Guided%20Representation%20Learning%20for%20Graph%20Out-of-Distribution%20Generalization&body=Title%3A%20CGRL%3A%20Causal-Guided%20Representation%20Learning%20for%20Graph%20Out-of-Distribution%20Generalization%0AAuthor%3A%20Bowen%20Lu%20and%20Liangqiang%20Yang%20and%20Teng%20Li%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20have%20achieved%20impressive%20performance%20in%20graph-related%20tasks.%20However%2C%20they%20suffer%20from%20poor%20generalization%20on%20out-of-distribution%20%28OOD%29%20data%2C%20as%20they%20tend%20to%20learn%20spurious%20correlations.%20Such%20correlations%20present%20a%20phenomenon%20that%20GNNs%20fail%20to%20stably%20learn%20the%20mutual%20information%20between%20prediction%20representations%20and%20ground-truth%20labels%20under%20OOD%20settings.%20To%20address%20these%20challenges%2C%20we%20formulate%20a%20causal%20graph%20starting%20from%20the%20essence%20of%20node%20classification%2C%20adopt%20backdoor%20adjustment%20to%20block%20non-causal%20paths%2C%20and%20theoretically%20derive%20a%20lower%20bound%20for%20improving%20OOD%20generalization%20of%20GNNs.%20To%20materialize%20these%20insights%2C%20we%20further%20propose%20a%20novel%20approach%20integrating%20causal%20representation%20learning%20and%20a%20loss%20replacement%20strategy.%20The%20former%20captures%20node-level%20causal%20invariance%20and%20reconstructs%20graph%20posterior%20distribution.%20The%20latter%20introduces%20asymptotic%20losses%20of%20the%20same%20order%20to%20replace%20the%20original%20losses.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20method%20in%20OOD%20generalization%20and%20effectively%20alleviating%20the%20phenomenon%20of%20unstable%20mutual%20information%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24304v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCGRL%253A%2520Causal-Guided%2520Representation%2520Learning%2520for%2520Graph%2520Out-of-Distribution%2520Generalization%26entry.906535625%3DBowen%2520Lu%2520and%2520Liangqiang%2520Yang%2520and%2520T .1380929848=CGRL%3A%20Causal-Guided%20Representation%20Learning%20for%20Graph%20Out-of-Distribution%20Generalization&entry.906535625=Bowen%20Lu%20and%20Liangqiang%20Yang%20and%20Teng%20Li&entry.1292438233=Graph%20Neural%20Networks%20%28GNNs%29%20have%20achieved%20impressive%20performance%20in%20graph-related%20tasks.%20However%2C%20they%20suffer%20from%20poor%20generalization%20on%20out-of-distribution%20%28OOD%29%20data%2C%20as%20they%20tend%20to%20learn%20spurious%20correlations.%20Such%20correlations%20present%20a%20phenomenon%20that%20GNNs%20fail%20to%20stably%20learn%20the%20mutual%20information%20between%20prediction%20representations%20and%20ground-truth%20labels%20under%20OOD%20settings.%20To%20address%20these%20challenges%2C%20we%20formulate%20a%20causal%20graph%20starting%20from%20the%20essence%20of%20node%20classification%2C%20adopt%20backdoor%20adjustment%20to%20block%20non-causal%20paths%2C%20and%20theoretically%20derive%20a%20lower%20bound%20for%20improving%20OOD%20generalization%20of%20GNNs.%20To%20materialize%20these%20insights%2C%20we%20further%20propose%20a%20novel%20approach%20integrating%20causal%20representation%20learning%20and%20a%20loss%20replacement%20strategy.%20The%20former%20captures%20node-level%20causal%20invariance%20and%20reconstructs%20graph%20posterior%20distribution.%20The%20latter%20introduces%20asymptotic%20losses%20of%20the%20same%20order%20to%20replace%20the%20original%20losses.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20method%20in%20OOD%20generalization%20and%20effectively%20alleviating%20the%20phenomenon%20of%20unstable%20mutual%20information%20learning.&entry.1838667208=http%3A//arxiv.org/abs/2603.24304v1&entry.124074799=Read"},
{"title": "Perturbative adaptive importance sampling for Bayesian LOO cross-validation", "author": "Joshua C Chang and Xiangting Li and Tianyi Su and Shixin Xu and Hao-Ren Yao and Julia Porcino and Carson Chow", "abstract": "Importance sampling (IS) is an efficient stand-in for model refitting in performing (LOO) cross-validation (CV) on a Bayesian model. IS inverts the Bayesian update for a single observation by reweighting posterior samples. The so-called importance weights have high variance -- we resolve this issue through adaptation by transformation. We observe that removing a single observation perturbs the posterior by $\\mathcal{O}(1/n)$, motivating bijective transformations of the form $T(\u03b8)=\u03b8+ h Q(\u03b8)$ for $0<h\\ll 1.$ We introduce several such transformations: partial moment matching, which generalizes prior work on affine moment-matching with a tunable step size; log-likelihood descent, which partially invert the Bayesian update for an observation; and gradient flow steps that minimize the KL divergence or IS variance. The gradient flow and likelihood descent transformations require Jacobian determinants, which are available via auto-differentiation; we additionally derive closed-form expressions for logistic regression and shallow ReLU networks. We tested the methodology on classification ($n\\ll p$), count regression (Poisson and zero-inflated negative binomial), and survival analysis problems, finding that no single transformation dominates but their combination nearly eliminates the need to refit.", "link": "http://arxiv.org/abs/2402.08151v4", "date": "2026-03-25", "relevancy": 2.3833, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4883}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4789}, {"title": "Bridging Biological Hearing and Neuromorphic Computing: End-to-End Time-Domain Audio Signal Processing with Reservoir Computing", "author": "Rinku Sebastian and Simon O'Keefe and Martin Trefzer", "abstract": "Despite the advancements in cutting-edge technologies, audio signal processing continues to pose challenges and lacks the precision of a human speech processing system. To address these challenges, we propose a novel approach to simplify audio signal processing by leveraging time-domain techniques and reservoir computing. Through our research, we have developed a real-time audio signal processing system by simplifying audio signal processing through the utilization of reservoir computers, which are significantly easier to train.\n  Feature extraction is a fundamental step in speech signal processing, with Mel Frequency Cepstral Coefficients (MFCCs) being a dominant choice due to their perceptual relevance to human hearing. However, conventional MFCC extraction relies on computationally intensive time-frequency transformations, limiting efficiency in real-time applications. To address this, we propose a novel approach that leverages reservoir computing to streamline MFCC extraction. By replacing traditional frequency-domain conversions with convolution operations, we eliminate the need for complex transformations while maintaining feature discriminability. We present an end-to-end audio processing framework that integrates this method, demonstrating its potential for efficient and real-time speech analysis. Our results contribute to the advancement of energy-efficient audio processing technologies, enabling seamless deployment in embedded systems and voice-driven applications. This work bridges the gap between biologically inspired feature extraction and modern neuromorphic computing, offering a scalable solution for next-generation speech recognition systems.", "link": "http://arxiv.org/abs/2603.24283v1", "date": "2026-03-25", "relevancy": 2.3809, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.487}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4708}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4708}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bridging%20Biological%20Hearing%20and%20Neuromorphic%20Computing%3A%20End-to-End%20Time-Domain%20Audio%20Signal%20Processing%20with%20Reservoir%20Computing&body=Title%3A%20Bridging%20Biological%20Hearing%20and%20Neuromorphic%20Computing%3A%20End-to-End%20Time-Domain%20Audio%20Signal%20Processing%20with%20Reservoir%20Computing%0AAuthor%3A%20Rinku%20Sebastian%20and%20Simon%20O%27Keefe%20and%20Martin%20Trefzer%0AAbstract%3A%20Despite%20the%20advancements%20in%20cutting-edge%20technologies%2C%20audio%20signal%20processing%20continues%20to%20pose%20challenges%20and%20lacks%20the%20precision%20of%20a%20human%20speech%20processing%20system.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20approach%20to%20simplify%20audio%20signal%20processing%20by%20leveraging%20time-domain%20techniques%20and%20reservoir%20computing.%20Through%20our%20research%2C%20we%20have%20developed%20a%20real-time%20audio%20signal%20processing%20system%20by%20simplifying%20audio%20signal%20processing%20through%20the%20utilization%20of%20reservoir%20computers%2C%20which%20are%20significantly%20easier%20to%20train.%0A%20%20Feature%20extraction%20is%20a%20fundamental%20step%20in%20speech%20signal%20processing%2C%20with%20Mel%20Frequency%20Cepstral%20Coefficients%20%28MFCCs%29%20being%20a%20dominant%20choice%20due%20to%20their%20perceptual%20relevance%20to%20human%20hearing.%20However%2C%20conventional%20MFCC%20extraction%20relies%20on%20computationally%20intensive%20time-frequency%20transformations%2C%20limiting%20efficiency%20in%20real-time%20applications.%20To%20address%20this%2C%20we%20propose%20a%20novel%20approach%20that%20leverages%20reservoir%20computing%20to%20streamline%20MFCC%20extraction.%20By%20replacing%20traditional%20frequency-domain%20conversions%20with%20convolution%20operations%2C%20we%20eliminate%20the%20need%20for%20complex%20transformations%20while%20maintaining%20feature%20discriminability.%20We%20present%20an%20end-to-end%20audio%20processing%20framework%20that%20integrates%20this%20method%2C%20demonstrating%20its%20potential%20for%20efficient%20and%20real-time%20speech%20analysis.%20Our%20results%20contribute%20to%20the%20advancement%20of%20energy-efficient%20audio%20processing%20technologies%2C%20enabling%20seamless%20deployment%20in%20embedded%20systems%20and%20voice-driven%20applications.%20This%20work%20bridges%20the%20gap%20between%20biologically%20inspired%20feature%20extraction%20and%20modern%20neuromorphic%20computing%2C%20offering%20a%20scalable%20solution%20for%20next-generation%20speech%20recognition%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24283v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBridging%2520Biological%2520Hearing%2520and%2520Neuromorphic%2520Computing%253A%2520End-to-End%2520Time-Domain%2520Audio%2520Signal%2520Processing%2520with%2520Reservoir%2520Computing%26entry.906535625%3DRinku%2520Sebastian%2520and%2520Simon%2520O%2527Keefe%2520and%2520Martin%2520Trefzer%26entry.1292438233%3DDespite%2520the%2520advancements%2520in%2520cutting-edge%2520technologies%252C%2520audio%2520signal%2520processing%2520continues%2520to%2520pose%2520challenges%2520and%2520lacks%2520the%2520precision%2520of%2520a%2520human%2520speech%2520processing%2520system.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520novel%2520approach%2520to%2520simplify%2520audio%2520signal%2520processing%2520by%2520leveraging%2520time-domain%2520techniques%2520and%2520reservoir%2520computing.%2520Through%2520our%2520research%252C%2520we%2520have%2520developed%2520a%2520real-time%2520audio%2520signal%2520processing%2520system%2520by%2520simplifying%2520audio%2520signal%2520processing%2520through%2520the%2520utilization%2520of%2520reservoir%2520computers%252C%2520which%2520are%2520significantly%2520easier%2520to%2520train.%250A%2520%2520Feature%2520extraction%2520is%2520a%2520fundamental%2520step%2520in%2520speech%2520signal%2520processing%252C%2520with%2520Mel%2520Frequency%2520Cepstral%2520Coefficients%2520%2528MFCCs%2529%2520being%2520a%2520dominant%2520choice%2520due%2520to%2520their%2520perceptual%2520relevance%2520to%2520human%2520hearing.%2520However%252C%2520conventional%2520MFCC%2520extraction%2520relies%2520on%2520computationally%2520intensive%2520time-frequency%2520transformations%252C%2520limiting%2520efficiency%2520in%2520real-time%2520applications.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520novel%2520approach%2520that%2520leverages%2520reservoir%2520computing%2520to%2520streamline%2520MFCC%2520extraction.%2520By%2520replacing%2520traditional%2520frequency-domain%2520conversions%2520with%2520convolution%2520operations%252C%2520we%2520eliminate%2520the%2520need%2520for%2520complex%2520transformations%2520while%2520maintaining%2520feature%2520discriminability.%2520We%2520present%2520an%2520end-to-end%2520audio%2520processing%2520framework%2520that%2520integrates%2520this%2520method%252C%2520demonstrating%2520its%2520potential%2520for%2520efficient%2520and%2520real-time%2520speech%2520analysis.%2520Our%2520results%2520contribute%2520to%2520the%2520advancement%2520of%2520energy-efficient%2520audio%2520processing%2520technologies%252C%2520enabling%2520seamless%2520deployment%2520in%2520embedded%2520systems%2520and%2520voice-driven%2520applications.%2520This%2520work%2520bridges%2520the%2520gap%2520betw {"title": "Linear-Nonlinear Fusion Neural Operator for Partial Differential Equations", "author": "Heng Wu and Junjie Wang and Benzhuo Lu", "abstract": "Neural operator learning directly constructs the mapping relationship from the equation parameter space to the solution space, enabling efficient direct inference in practical applications without the need for repeated solution of partial differential equations (PDEs) - an advantage that is difficult to achieve with traditional numerical methods. In this work, we find that explicitly decoupling linear and nonlinear effects within such operator mappings leads to markedly improved learning efficiency. This yields a novel network structure, namely the Linear-Nonlinear Fusion Neural Operator (LNF-NO), which models operator mappings via the multiplicative fusion of a linear component and a nonlinear component, thus achieving a lightweight and interpretable representation. This linear-nonlinear decoupling enables efficient capture of complex solution features at the operator level while maintaining stability and generality. LNF-NO naturally supports multiple functional inputs and is applicable to both regular grids and irregular geometries. Across a diverse suite of PDE operator-learning benchmarks, including nonlinear Poisson-Boltzmann equations and multi-physics coupled systems, LNF-NO is typically substantially faster to train than Deep Operator Networks (DeepONet) and Fourier Neural Operators (FNO), while achieving comparable or better accuracy in most cases. On the tested 3D Poisson-Boltzmann case, LNF-NO attains the best accuracy among the compared models and trains approximately 2.7x faster than a 3D FNO baseline.", "link": "http://arxiv.org/abs/2603.24143v1", "date": "2026-03-25", "relevancy": 2.371, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4889}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4693}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Linear-Nonlinear%20Fusion%20Neural%20Operator%20for%20Partial%20Differential%20Equations&body=Title%3A%20Linear-Nonlinear%20Fusion%20Neural%20Operator%20for%20Partial%20Differential%20Equations%0AAuthor%3A%20Heng%20Wu%20and%20Junjie%20Wang%20and%20Benzhuo%20Lu%0AAbstract%3A%20Neural%20operator%20learning%20directly%20constructs%20the%20mapping%20relationship%20from%20the%20equation%20parameter%20space%20to%20the%20solution%20space%2C%20enabling%20efficient%20direct%20inference%20in%20practical%20applications%20without%20the%20need%20for%20repeated%20solution%20of%20partial%20differential%20equations%20%28PDEs%29%20-%20an%20advantage%20that%20is%20difficult%20to%20achieve%20with%20traditional%20numerical%20methods.%20In%20this%20work%2C%20we%20find%20that%20explicitly%20decoupling%20linear%20and%20nonlinear%20effects%20within%20such%20operator%20mappings%20leads%20to%20markedly%20improved%20learning%20efficiency.%20This%20yields%20a%20novel%20network%20structure%2C%20namely%20the%20Linear-Nonlinear%20Fusion%20Neural%20Operator%20%28LNF-NO%29%2C%20which%20models%20operator%20mappings%20via%20the%20multiplicative%20fusion%20of%20a%20linear%20component%20and%20a%20nonlinear%20component%2C%20thus%20achieving%20a%20lightweight%20and%20interpretable%20representation.%20This%20linear-nonlinear%20decoupling%20enables%20efficient%20capture%20of%20complex%20solution%20features%20at%20the%20operator%20level%20while%20maintaining%20stability%20and%20generality.%20LNF-NO%20naturally%20supports%20multiple%20functional%20inputs%20and%20is%20applicable%20to%20both%20regular%20grids%20and%20irregular%20geometries.%20Across%20a%20diverse%20suite%20of%20PDE%20operator-learning%20benchmarks%2C%20including%20nonlinear%20Poisson-Boltzmann%20equations%20and%20multi-physics%20coupled%20systems%2C%20LNF-NO%20is%20typically%20substantially%20faster%20to%20train%20than%20Deep%20Operator%20Networks%20%28DeepONet%29%20and%20Fourier%20Neural%20Operators%20%28FNO%29%2C%20while%20achieving%20comparable%20or%20better%20accuracy%20in%20most%20cases.%20On%20the%20tested%203D%20Poisson-Boltzmann%20case%2C%20LNF-NO%20attains%20the%20best%20accuracy%20among%20the%20compared%20models%20and%20trains%20approximately%202.7x%20faster%20than%20a%203D%20FNO%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24143v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLinear-Nonlinear%2520Fusion%2520Neural%2520Operator%2520for%2520Partial%2520Differential%2520Equations%26entry.906535625%3DHeng%2520Wu%2520and%2520Junjie%2520Wang%2520and%2520Benzhuo%2520Lu%26entry.1292438233%3DNeural%2520operator%2520learning%2520directly%2520constructs%2520the%2520mapping%2520relationship%2520from%2520the%2520equation%2520parameter%2520space%2520to%2520the%2520solution%2520space%252C%2520enabling%2520efficient%2520direct%2520inference%2520in%2520practical%2520applications%2520without%2520the%2520need%2520for%2520repeated%2520solution%2520of%2520partial%2520differential%2520equations%2520%2528PDEs%2529%2520-%2520an%2520advantage%2520that%2520is%2520difficult%2520to%2520achieve%2520with%2520traditional%2520numerical%2520methods.%2520In%2520this%2520work%252C%2520we%2520find%2520that%2520explicitly%2520decoupling%2520linear%2520and%2520nonlinear%2520effects%2520within%2520such%2520operator%2520mappings%2520leads%2520to%2520markedly%2520improved%2520learning%2520efficiency.%2520This%2520yields%2520a%2520novel%2520network%2520structure%252C%2520namely%2520the%2520Linear-Nonlinear%2520Fusion%2520Neural%2520Operator%2520%2528LNF-NO%2529%252C%2520which%2520models%2520operator {"title": "AMIF: Authorizable Medical Image Fusion Model with Built-in Authentication", "author": "Jie Song and Jun Jia and Wei Sun and Wangqiu Zhou and Tao Tan and Guangtao Zhai", "abstract": "Multimodal image fusion enables precise lesion localization and characterization for accurate diagnosis, thereby strengthening clinical decision-making and driving its growing prominence in medical imaging research. A powerful multimodal image fusion model relies on high-quality, clinically representative multimodal training data and a rigorously engineered model architecture. Therefore, the development of such professional radiomics models represents a collaborative achievement grounded in standardized acquisition, clinical-specific expertise, and algorithmic design proficiency, which necessitates protection of associated intellectual property rights. However, current multimodal image fusion models generate fused outputs without built-in mechanisms to safeguard intellectual property rights, inadvertently exposing proprietary model knowledge and sensitive training data through inference leakage. For example, malicious users can exploit fusion outputs and model distillation or other inference-based reverse engineering techniques to approximate the fusion performance of proprietary models. To address this issue, we propose AMIF, the first Authorizable Medical Image Fusion model with built-in authentication, which integrates authorization access control into the image fusion objective. For unauthorized usage, AMIF embeds explicit and visible copyright identifiers into fusion results. In contrast, high-quality fusion results are accessible upon successful key-based authentication.", "link": "http://arxiv.org/abs/2603.24296v1", "date": "2026-03-25", "relevancy": 2.3578, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4843}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.476}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AMIF%3A%20Authorizable%20Medical%20Image%20Fusion%20Model%20with%20Built-in%20Authentication&body=Title%3A%20AMIF%3A%20Authorizable%20Medical%20Image%20Fusion%20Model%20with%20Built-in%20Authentication%0AAuthor%3A%20Jie%20Song%20and%20Jun%20Jia%20and%20Wei%20Sun%20and%20Wangqiu%20Zhou%20and%20Tao%20Tan%20and%20Guangtao%20Zhai%0AAbstract%3A%20Multimodal%20image%20fusion%20enables%20precise%20lesion%20localization%20and%20characterization%20for%20accurate%20diagnosis%2C%20thereby%20strengthening%20clinical%20decision-making%20and%20driving%20its%20growing%20prominence%20in%20medical%20imaging%20research.%20A%20powerful%20multimodal%20image%20fusion%20model%20relies%20on%20high-quality%2C%20clinically%20representative%20multimodal%20training%20data%20and%20a%20rigorously%20engineered%20model%20architecture.%20Therefore%2C%20the%20development%20of%20such%20professional%20radiomics%20models%20represents%20a%20collaborative%20achievement%20grounded%20in%20standardized%20acquisition%2C%20clinical-specific%20expertise%2C%20and%20algorithmic%20design%20proficiency%2C%20which%20necessitates%20protection%20of%20associated%20intellectual%20property%20rights.%20However%2C%20current%20multimodal%20image%20fusion%20models%20generate%20fused%20outputs%20without%20built-in%20mechanisms%20to%20safeguard%20intellectual%20property%20rights%2C%20inadvertently%20exposing%20proprietary%20model%20knowledge%20and%20sensitive%20training%20data%20through%20inference%20leakage.%20For%20example%2C%20malicious%20users%20can%20exploit%20fusion%20outputs%20and%20model%20distillation%20or%20other%20inference-based%20reverse%20engineering%20techniques%20to%20approximate%20the%20fusion%20performance%20of%20proprietary%20models.%20To%20address%20this%20issue%2C%20we%20propose%20AMIF%2C%20the%20first%20Authorizable%20Medical%20Image%20Fusion%20model%20with%20built-in%20authentication%2C%20which%20integrates%20authorization%20access%20control%20into%20the%20image%20fusion%20objective.%20For%20unauthorized%20usage%2C%20AMIF%20embeds%20explicit%20and%20visible%20copyright%20identifiers%20into%20fusion%20results.%20In%20contrast%2C%20high-quality%20fusion%20results%20are%20accessible%20upon%20successful%20key-based%20authentication.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24296v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAMIF%253A%2520Authorizable%2520Medical%2520Image%2520Fusion%2520Model%2520with%2520Built-in%2520Authentication%26entry.906535625%3DJie%2520Song%2520and%2520Jun%2520Jia%2520and%2520Wei%2520Sun%2520and%2520Wangqiu%2520Zhou%2520and%2520Tao%2520Tan%2520and%2520Guangtao%2520Zhai%26entry.1292438233%3DMultimodal%2520image%2520fusion%2520enables%2520precise%2520lesion%2520localization%2520and%2520characterization%2520for%2520accurate%2520diagnosis%252C%2520thereby%2520strengthening%2520clinical%2520decision-making%2520and%2520driving%2520its%2520growing%2520prominence%2520in%2520medical%2520imaging%2520research.%2520A%2520powerful%2520multimodal%2520image%2520fusion%2520model%2520relies%2520on%2520high-quality%252C%2520clinically%2520representative%2520multimodal%2520training%2520data%2520and%2520a%2520rigorously%2520engineered%2520model%2520architecture.%2520Therefore%252C%2520the%2520development%2520of%2520such%2520professional%2520radiomics%2520models%2520represents%2520a%2520collaborative%2520achievement%2520grounded%2520in%2520standardized%2520acquisition%252C%2520clinical-specific%2520expertise%252C%2520and%2520algorithmic%2520design%2520proficiency%252C%2520which%2520necessitates%2520protection%2520of%2520associated%2 {"title": "A Hybrid Neural-Assisted Unscented Kalman Filter for Unmanned Ground Vehicle Navigation", "author": "Gal Versano and Itzik Klein", "abstract": "Modern autonomous navigation for unmanned ground vehicles relies on different estimators to fuse inertial sensors and GNSS measurements. However, the constant noise covariance matrices often struggle to account for dynamic real-world conditions. In this work we propose a hybrid estimation framework that bridges classical state estimation foundations with modern deep learning approaches. Instead of altering the fundamental unscented Kalman filter equations, a dedicated deep neural network is developed to predict the process and measurement noise uncertainty directly from raw inertial and GNSS measurements. We present a sim2real approach, with training performed only on simulative data. In this manner, we offer perfect ground truth data and relieves the burden of extensive data recordings. To evaluate our proposed approach and examine its generalization capabilities, we employed a 160-minutes test set from three datasets each with different types of vehicles (off-road vehicle, passenger car, and mobile robot), inertial sensors, road surface, and environmental conditions. We demonstrate across the three datasets a position improvement of $12.7\\%$ compared to the adaptive model-based approach. Thus, offering a scalable and a more robust solution for unmanned ground vehicles navigation tasks.", "link": "http://arxiv.org/abs/2603.11649v2", "date": "2026-03-25", "relevancy": 2.3487, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5903}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5851}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5849}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Hybrid%20Neural-Assisted%20Unscented%20Kalman%20Filter%20for%20Unmanned%20Ground%20Vehicle%20Navigation&body=Title%3A%20A%20Hybrid%20Neural-Assisted%20Unscented%20Kalman%20Filter%20for%20Unmanned%20Ground%20Vehicle%20Navigation%0AAuthor%3A%20Gal%20Versano%20and%20Itzik%20Klein%0AAbstract%3A%20Modern%20autonomous%20navigation%20for%20unmanned%20ground%20vehicles%20relies%20on%20different%20estimators%20to%20fuse%20inertial%20sensors%20and%20GNSS%20measurements.%20However%2C%20the%20constant%20noise%20covariance%20matrices%20often%20struggle%20to%20account%20for%20dynamic%20real-world%20conditions.%20In%20this%20work%20we%20propose%20a%20hybrid%20estimation%20framework%20that%20bridges%20classical%20state%20estimation%20foundations%20with%20modern%20deep%20learning%20approaches.%20Instead%20of%20altering%20the%20fundamental%20unscented%20Kalman%20filter%20equations%2C%20a%20dedicated%20deep%20neural%20network%20is%20developed%20to%20predict%20the%20process%20and%20measurement%20noise%20uncertainty%20directly%20from%20raw%20inertial%20and%20GNSS%20measurements.%20We%20present%20a%20sim2real%20approach%2C%20with%20training%20performed%20only%20on%20simulative%20data.%20In%20this%20manner%2C%20we%20offer%20perfect%20ground%20truth%20data%20and%20relieves%20the%20burden%20of%20extensive%20data%20recordings.%20To%20evaluate%20our%20proposed%20approach%20and%20examine%20its%20generalization%20capabilities%2C%20we%20employed%20a%20160-minutes%20test%20set%20from%20three%20datasets%20each%20with%20different%20types%20of%20vehicles%20%28off-road%20vehicle%2C%20passenger%20car%2C%20and%20mobile%20robot%29%2C%20inertial%20sensors%2C%20road%20surface%2C%20and%20environmental%20conditions.%20We%20demonstrate%20across%20the%20three%20datasets%20a%20position%20improvement%20of%20%2412.7%5C%25%24%20compared%20to%20the%20adaptive%20model-based%20approach.%20Thus%2C%20offering%20a%20scalable%20and%20a%20more%20robust%20solution%20for%20unmanned%20ground%20vehicles%20navigation%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11649v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Hybrid%2520Neural-Assisted%2520Unscented%2520Kalman%2520Filter%2520for%2520Unmanned%2520Ground%2520Vehicle%2520Navigation%26entry.906535625%3DGal%2520Versano%2520and%2520Itzik%2520Klein%26entry.1292438233%3DModern%2520autonomous%2520navigation%2520for%2520unmanned%2520ground%2520vehicles%2520relies%2520on%2520different%2520estimators%2520to%2520fuse%2520inertial%2520sensors%2520and%2520GNSS%2520measurements.%2520However%252C%2520the%2520constant%2520noise%2520covariance%2520matrices%2520often%2520struggle%2520to%2520account%2520for%2520dynamic%2520real-world%2520conditions.%2520In%2520this%2520work%2520we%2520propose%2520a%2520hybrid%2520estimation%2520framework%2520that%2520bridges%2520classical%2520state%2520estimation%2520foundations%2520with%2520modern%2520deep%2520learning%2520approaches.%2520Instead%2520of%2520altering%2520the%2520fundamental%2520unscented%2520Kalman%2520filter%2520equations%252C%2520a%2520dedicated%2520deep%2520neural%2520network%2520is%2520developed%2520to%2520predict%2520the%2520process%2520and%2520measurement%2520noise%2520uncertainty%2520directly%2520from%2520raw%2520inertial%2520and%2520GNSS%2520measurements.%2520We%2520present%2520a%2520sim2real%2520approach%252C%2520with%2520training%2520performed%2520only%2520on%2520simulative%2520data.%2520In%2520this%2520manner%252C%2520we%2520offer%2520perfect%2520ground%2520truth%2520data%2520and%2520relieves%2520the%2520burden%2520of%2520extensive%2520data%2520recordings.%2520To%2520evaluate%2520our%2520proposed%2520approach%2520and%2520examine%2520its%2520generalization%2520capabilities%252C%2520we%2520employed%2520a%2520160-minutes%2520t {"title": "GameplayQA: A Benchmarking Framework for Decision-Dense POV-Synced Multi-Video Understanding of 3D Virtual Agents", "author": "Yunzhe Wang and Runhui Xu and Kexin Zheng and Tianyi Zhang and Jayavibhav Niranjan Kogundi and Soham Hans and Volkan Ustun", "abstract": "Multimodal LLMs are increasingly deployed as perceptual backbones for autonomous agents in 3D environments, from robotics to virtual worlds. These applications require agents to perceive rapid state changes, attribute actions to the correct entities, and reason about concurrent multi-agent behaviors from a first-person perspective, capabilities that existing benchmarks do not adequately evaluate. We introduce GameplayQA, a framework for evaluating agentic-centric perception and reasoning through video understanding. Specifically, we densely annotate multiplayer 3D gameplay videos at 1.22 labels/second, with time-synced, concurrent captions of states, actions, and events structured around a triadic system of Self, Other Agents, and the World, a natural decomposition for multi-agent environments. From these annotations, we refined 2.4K diagnostic QA pairs organized into three levels of cognitive complexity, accompanied by a structured distractor taxonomy that enables fine-grained analysis of where models hallucinate. Evaluation of frontier MLLMs reveals a substantial gap from human performance, with common failures in temporal and cross-video grounding, agent-role attribution, and handling the decision density of the game. We hope GameplayQA stimulates future research at the intersection of embodied AI, agentic perception, and world modeling.", "link": "http://arxiv.org/abs/2603.24329v1", "date": "2026-03-25", "relevancy": 2.313, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5786}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5786}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5765}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GameplayQA%3A%20A%20Benchmarking%20Framework%20for%20Decision-Dense%20POV-Synced%20Multi-Video%20Understanding%20of%203D%20Virtual%20Agents&body=Title%3A%20GameplayQA%3A%20A%20Benchmarking%20Framework%20for%20Decision-Dense%20POV-Synced%20Multi-Video%20Understanding%20of%203D%20Virtual%20Agents%0AAuthor%3A%20Yunzhe%20Wang%20and%20Runhui%20Xu%20and%20Kexin%20Zheng%20and%20Tianyi%20Zhang%20and%20Jayavibhav%20Niranjan%20Kogundi%20and%20Soham%20Hans%20and%20Volkan%20Ustun%0AAbstract%3A%20Multimodal%20LLMs%20are%20increasingly%20deployed%20as%20perceptual%20backbones%20for%20autonomous%20agents%20in%203D%20environments%2C%20from%20robotics%20to%20virtual%20worlds.%20These%20applications%20require%20agents%20to%20perceive%20rapid%20state%20changes%2C%20attribute%20actions%20to%20the%20correct%20entities%2C%20and%20reason%20about%20concurrent%20multi-agent%20behaviors%20from%20a%20first-person%20perspective%2C%20capabilities%20that%20existing%20benchmarks%20do%20not%20adequately%20evaluate.%20We%20introduce%20GameplayQA%2C%20a%20framework%20for%20evaluating%20agentic-centric%20perception%20and%20reasoning%20through%20video%20understanding.%20Specifically%2C%20we%20densely%20annotate%20multiplayer%203D%20gameplay%20videos%20at%201.22%20labels/second%2C%20with%20time-synced%2C%20concurrent%20captions%20of%20states%2C%20actions%2C%20and%20events%20structured%20around%20a%20triadic%20system%20of%20Self%2C%20Other%20Agents%2C%20and%20the%20World%2C%20a%20natural%20decomposition%20for%20multi-agent%20environments.%20From%20these%20annotations%2C%20we%20refined%202.4K%20diagnostic%20QA%20pairs%20organized%20into%20three%20levels%20of%20cognitive%20complexity%2C%20accompanied%20by%20a%20structured%20distractor%20taxonomy%20that%20enables%20fine-grained%20analysis%20of%20where%20models%20hallucinate.%20Evaluation%20of%20frontier%20MLLMs%20reveals%20a%20substantial%20gap%20from%20human%20performance%2C%20with%20common%20failures%20in%20temporal%20and%20cross-video%20grounding%2C%20agent-role%20attribution%2C%20and%20handling%20the%20decision%20density%20of%20the%20game.%20We%20hope%20GameplayQA%20stimulates%20future%20research%20at%20the%20intersection%20of%20embodied%20AI%2C%20agentic%20perception%2C%20and%20world%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24329v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGameplayQA%253A%2520A%2520Benchmarking%2520Framework%2520for%2520Decision-Dense%2520POV-Synced%2520Multi-Video%2520Understanding%2520of%25203D%2520Virtual%2520Agents%26entry.906535625%3DYunzhe%2520Wang%2520and%2520Runhui%2520Xu%2520and%2520Kexin%2520Zheng%2520and%2520Tianyi%2520Zhang%2520and%2520Jayavibhav%2520Niranjan%2520Kogundi%2520and%2520Soham%2520Hans%2520and%2520Volkan%2520Ustun%26entry.1292438233%3DMultimodal%2520LLMs%2520are%2520increasingly%2520deployed%2520as%2520perceptual%2520backbones%2520for%2520autonomous%2520agents%2520in%25203D%2520environments%252C%2520from%2520robotics%2520to%2520virtual%2520worlds.%2520These%2520applications%2520require%2520agents%2520to%2520perceive%2520rapid%2520state%2520changes%252C%2520attribute%2520actions%2520to%2520the%2520correct%2520entities%252C%2520and%2520reason%2520about%2520concurrent%2520multi-agent%2520behaviors%2520from%2520a%2520first-person%2520perspective%252C%2520capabilities%2520that%2520existing%2520benchmarks%2520do%2520not%2520adequately%2520evaluate.%2520We%2520introduce%2520GameplayQA%252C%2520a%2520framework%2520for%2520evaluating%2520agentic-centric%2520perception%2520and%2520reasoning%2520through%2520video%2520understanding.%2520Specifically%252C%2520we%2520d nts%2C%20from%20robotics%20to%20virtual%20worlds.%20These%20applications%20require%20agents%20to%20perceive%20rapid%20state%20changes%2C%20attribute%20actions%20to%20the%20correct%20entities%2C%20and%20reason%20about%20concurrent%20multi-agent%20behaviors%20from%20a%20first-person%20perspective%2C%20capabilities%20that%20existing%20benchmarks%20do%20not%20adequately%20evaluate.%20We%20introduce%20GameplayQA%2C%20a%20framework%20for%20evaluating%20agentic-centric%20perception%20and%20reasoning%20through%20video%20understanding.%20Specifically%2C%20we%20densely%20annotate%20multiplayer%203D%20gameplay%20videos%20at%201.22%20labels/second%2C%20with%20time-synced%2C%20concurrent%20captions%20of%20states%2C%20actions%2C%20and%20events%20structured%20around%20a%20triadic%20system%20of%20Self%2C%20Other%20Agents%2C%20and%20the%20World%2C%20a%20natural%20decomposition%20for%20multi-agent%20environments.%20From%20these%20annotations%2C%20we%20refined%202.4K%20diagnostic%20QA%20pairs%20organized%20into%20three%20levels%20of%20cognitive%20complexity%2C%20accompanied%20by%20a%20structured%20distractor%20taxonomy%20that%20enables%20fine-grained%20analysis%20of%20where%20models%20hallucinate.%20Evaluation%20of%20frontier%20MLLMs%20reveals%20a%20substantial%20gap%20from%20human%20performance%2C%20with%20common%20failures%20in%20temporal%20and%20cross-video%20grounding%2C%20agent-role%20attribution%2C%20and%20handling%20the%20decision%20density%20of%20the%20game.%20We%20hope%20GameplayQA%20stimulates%20future%20research%20at%20the%20intersection%20of%20embodied%20AI%2C%20agentic%20perception%2C%20and%20world%20modeling.&entry.1838667208=http%3A//arxiv.org/abs/2603.24329v1&entry.124074799=Read"},
{"title": "Real Talk, Virtual Faces: A Formal Concept Analysis of Personality and Sentiment in Influencer Audiences", "author": "Shahram Chaudhry and Sidahmed Benabderrahmane and Talal Rahwan", "abstract": "Virtual influencers~(VIs) -- digitally synthetic social-media personas -- attract audiences whose discourse appears qualitatively different from discourse around human influencers~(HIs). Existing work characterises this difference through surveys or aggregate engagement statistics, which reveal \\emph{what} audiences say but not \\emph{how} multiple signals co-occur. We propose a two-layer, structure-first framework grounded in Formal Concept Analysis~(FCA) and association rule mining. The first layer applies FCA with support-based iceberg filtering to weekly-aggregated comment data, extracting discourse profiles -- weekly co-occurrence bundles of sentiment, Big Five personality cues, and topic tags. The second layer mines association rules at the comment level, revealing personality--sentiment--topic dependencies invisible to frequency-table analysis.\n  Applied to YouTube comments from three VI--HI influencer pairs, the two-layer analysis reveals a consistent structural divergence: HI discourse concentrates into a single, emotionally regulated (stability-centred) regime (low neuroticism anchoring positivity), while VI discourse supports three structurally distinct discourse modes, including an appearance-discourse cluster absent from HI despite near-equal marginal prevalence. Topic-specific analyses further show that VI contexts exhibit negative sentiment in psychologically sensitive domains (mental health, body image, artificial identity) relative to HI contexts. Our results position FCA as a principled tool for multi-signal discourse analysis and demonstrate that virtuality reshapes not just what audiences say, but the underlying grammar of how signals co-occur in their reactions.", "link": "http://arxiv.org/abs/2603.24410v1", "date": "2026-03-25", "relevancy": 2.3109, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4861}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4502}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Real%20Talk%2C%20Virtual%20Faces%3A%20A%20Formal%20Concept%20Analysis%20of%20Personality%20and%20Sentiment%20in%20Influencer%20Audiences&body=Title%3A%20Real%20Talk%2C%20Virtual%20Faces%3A%20A%20Formal%20Concept%20Analysis%20of%20Personality%20and%20Sentiment%20in%20Influencer%20Audiences%0AAuthor%3A%20Shahram%20Chaudhry%20and%20Sidahmed%20Benabderrahmane%20and%20Talal%20Rahwan%0AAbstract%3A%20Virtual%20influencers~%28VIs%29%20--%20digitally%20synthetic%20social-media%20personas%20--%20attract%20audiences%20whose%20discourse%20appears%20qualitatively%20different%20from%20discourse%20around%20human%20influencers~%28HIs%29.%20Existing%20work%20characterises%20this%20difference%20through%20surveys%20or%20aggregate%20engagement%20statistics%2C%20which%20reveal%20%5Cemph%7Bwhat%7D%20audiences%20say%20but%20not%20%5Cemph%7Bhow%7D%20multiple%20signals%20co-occur.%20We%20propose%20a%20two-layer%2C%20structure-first%20framework%20grounded%20in%20Formal%20Concept%20Analysis~%28FCA%29%20and%20association%20rule%20mining.%20The%20first%20layer%20applies%20FCA%20with%20support-based%20iceberg%20filtering%20to%20weekly-aggregated%20comment%20data%2C%20extracting%20discourse%20profiles%20--%20weekly%20co-occurrence%20bundles%20of%20sentiment%2C%20Big%20Five%20personality%20cues%2C%20and%20topic%20tags.%20The%20second%20layer%20mines%20association%20rules%20at%20the%20comment%20level%2C%20revealing%20personality--sentiment--topic%20dependencies%20invisible%20to%20frequency-table%20analysis.%0A%20%20Applied%20to%20YouTube%20comments%20from%20three%20VI--HI%20influencer%20pairs%2C%20the%20two-layer%20analysis%20reveals%20a%20consistent%20structural%20divergence%3A%20HI%20discourse%20concentrates%20into%20a%20single%2C%20emotionally%20regulated%20%28stability-centred%29%20regime%20%28low%20neuroticism%20anchoring%20positivity%29%2C%20while%20VI%20discourse%20supports%20three%20structurally%20distinct%20discourse%20modes%2C%20including%20an%20appearance-discourse%20cluster%20absent%20from%20HI%20despite%20near-equal%20marginal%20prevalence.%20Topic-specific%20analyses%20further%20show%20that%20VI%20contexts%20exhibit%20negative%20sentiment%20in%20psychologically%20sensitive%20domains%20%28mental%20health%2C%20body%20image%2C%20artificial%20identity%29%20relative%20to%20HI%20contexts.%20Our%20results%20position%20FCA%20as%20a%20principled%20tool%20for%20multi-signal%20discourse%20analysis%20and%20demonstrate%20that%20virtuality%20reshapes%20not%20just%20what%20audiences%20say%2C%20but%20the%20underlying%20grammar%20of%20how%20signals%20co-occur%20in%20their%20reactions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24410v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReal%2520Talk%252C%2520Virtual%2520Faces%253A%2520A%2520Formal%2520Concept%2520Analysis%2520of%2520Personality%2520and%2520Sentiment%2520in%2520Influencer%2520Audiences%26entry.906535625%3DShahram%2520Chaudhry%2520and%2520Sidahmed%2520Benabderrahmane%2520and%2520Talal%2520Rahwan%26entry.1292438233%3DVirtual%2520influencers~%2528VIs%2529%2520--%2520digitally%2520synthetic%2520social-media%2520personas%2520--%2520attract%2520audiences%2520whose%2520discourse%2520appears%2520qualitatively%2520different%2520from {"title": "From Liar Paradox to Incongruent Sets: A Normal Form for Self-Reference", "author": "Shalender Singh and Vishnu Priya Singh Parmar", "abstract": "We introduce incongruent normal form (INF), a structural representation for self-referential semantic sentences. An INF replaces a self-referential sentence with a finite family of non-self-referential sentences that are individually satisfiable but not jointly satisfiable. This transformation isolates the semantic obstruction created by self-reference while preserving classical semantics locally and is accompanied by correctness theorems characterizing when global inconsistency arises from locally compatible commitments. We then study the role of incongruence as a structural source of semantic informativeness. Using a minimal model-theoretic notion of informativeness-understood as the ability of sentences to distinguish among admissible models-we show that semantic completeness precludes informativeness, while incongruence preserves it. Moreover, incongruence is not confined to paradoxical constructions: any consistent incomplete first-order theory admits finite incongruent families arising from incompatible complete extensions. In this sense, incompleteness manifests structurally as locally realizable but globally incompatible semantic commitments, providing a minimal formal basis for semantic knowledge. Finally, we introduce a quantitative semantic framework. In a canonical finite semantic-state setting, we model semantic commitments as Boolean functions and define a Fourier-analytic notion of semantic energy based on total influence. We derive uncertainty-style bounds relating semantic determinacy, informativeness, and spectral simplicity, and establish a matrix inequality bounding aggregate semantic variance by total semantic energy. These results show quantitatively that semantic informativeness cannot collapse into a single determinate state without unbounded energy cost, identifying incongruence as a fundamental structural and quantitative feature of semantic representation.", "link": "http://arxiv.org/abs/2603.24527v1", "date": "2026-03-25", "relevancy": 2.2859, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4778}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4469}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4469}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Liar%20Paradox%20to%20Incongruent%20Sets%3A%20A%20Normal%20Form%20for%20Self-Reference&body=Title%3A%20From%20Liar%20Paradox%20to%20Incongruent%20Sets%3A%20A%20Normal%20Form%20for%20Self-Reference%0AAuthor%3A%20Shalender%20Singh%20and%20Vishnu%20Priya%20Singh%20Parmar%0AAbstract%3A%20We%20introduce%20incongruent%20normal%20form%20%28INF%29%2C%20a%20structural%20representation%20for%20self-referential%20semantic%20sentences.%20An%20INF%20replaces%20a%20self-referential%20sentence%20with%20a%20finite%20family%20of%20non-self-referential%20sentences%20that%20are%20individually%20satisfiable%20but%20not%20jointly%20satisfiable.%20This%20transformation%20isolates%20the%20semantic%20obstruction%20created%20by%20self-reference%20while%20preserving%20classical%20semantics%20locally%20and%20is%20accompanied%20by%20correctness%20theorems%20characterizing%20when%20global%20inconsistency%20arises%20from%20locally%20compatible%20commitments.%20We%20then%20study%20the%20role%20of%20incongruence%20as%20a%20structural%20source%20of%20semantic%20informativeness.%20Using%20a%20minimal%20model-theoretic%20notion%20of%20informativeness-understood%20as%20the%20ability%20of%20sentences%20to%20distinguish%20among%20admissible%20models-we%20show%20that%20semantic%20completeness%20precludes%20informativeness%2C%20while%20incongruence%20preserves%20it.%20Moreover%2C%20incongruence%20is%20not%20confined%20to%20paradoxical%20constructions%3A%20any%20consistent%20incomplete%20first-order%20theory%20admits%20finite%20incongruent%20families%20arising%20from%20incompatible%20complete%20extensions.%20In%20this%20sense%2C%20incompleteness%20manifests%20structurally%20as%20locally%20realizable%20but%20globally%20incompatible%20semantic%20commitments%2C%20providing%20a%20minimal%20formal%20basis%20for%20semantic%20knowledge.%20Finally%2C%20we%20introduce%20a%20quantitative%20semantic%20framework.%20In%20a%20canonical%20finite%20semantic-state%20setting%2C%20we%20model%20semantic%20commitments%20as%20Boolean%20functions%20and%20define%20a%20Fourier-analytic%20notion%20of%20semantic%20energy%20based%20on%20total%20influence.%20We%20derive%20uncertainty-style%20bounds%20relating%20semantic%20determinacy%2C%20informativeness%2C%20and%20spectral%20simplicity%2C%20and%20establish%20a%20matrix%20inequality%20bounding%20aggregate%20semantic%20variance%20by%20total%20semantic%20energy.%20These%20results%20show%20quantitatively%20that%20semantic%20informativeness%20cannot%20collapse%20into%20a%20single%20determinate%20state%20without%20unbounded%20energy%20cost%2C%20identifying%20incongruence%20as%20a%20fundamental%20structural%20and%20quantitative%20feature%20of%20semantic%20representation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24527v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Liar%2520Paradox%2520to%2520Incongruent%2520Sets%253A%2520A%2520Normal%2520Form%2520for%2520Self-Reference%26entry.906535625%3DShalender%2520Singh%2520and%2520Vishnu%2520Priya%2520Singh%2520Parmar%26entry.1292438233%3DWe%2520introduce%2520incongruent%2520norma {"title": "Le MuMo JEPA: Multi-Modal Self-Supervised Representation Learning with Learnable Fusion Tokens", "author": "Ciem Cornelissen and Sam Leroux and Pieter Simoens", "abstract": "Self-supervised learning has emerged as a powerful paradigm for learning visual representations without manual annotations, yet most methods still operate on a single modality and therefore miss the complementary structure available from heterogeneous sensors. We present Le MuMo JEPA, a self-supervised framework that learns unified representations from RGB images and aligned companion modalities. In our driving experiments, the second modality is camera-aligned LiDAR depth; we also evaluate RGB-thermal training and transfer on the Teledyne FLIR ADAS benchmark. Our approach extends LeJEPA to the multi-modal setting by learning fusion tokens that act as a latent bottleneck between modality-specific patch stems inside a shared transformer. Our default model employs a pruned fusion strategy: after an initial cross-modal attention layer, modality-specific tokens are dropped, forcing cross-modal information into the shared fusion-token grid as an efficient latent bottleneck before Sketched Isotropic Gaussian Regularization (SIGReg) is applied to the joint multimodal CLS embedding. On Waymo, Le MuMo JEPA gives the strongest performance-efficiency trade-off on downstream patch probes among the from-scratch multimodal baselines, improving CenterNet detection and dense depth while remaining competitive on segmentation. Under from-scratch training on nuScenes, Le MuMo JEPA remains the strongest model, and it also gives the best FLIR results, especially after Waymo-initialized fine-tuning. It also retains the best overall accuracy-efficiency balance in our study at substantially lower compute, memory, and estimated training time.", "link": "http://arxiv.org/abs/2603.24327v1", "date": "2026-03-25", "relevancy": 2.2814, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5997}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5835}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5357}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Le%20MuMo%20JEPA%3A%20Multi-Modal%20Self-Supervised%20Representation%20Learning%20with%20Learnable%20Fusion%20Tokens&body=Title%3A%20Le%20MuMo%20JEPA%3A%20Multi-Modal%20Self-Supervised%20Representation%20Learning%20with%20Learnable%20Fusion%20Tokens%0AAuthor%3A%20Ciem%20Cornelissen%20and%20Sam%20Leroux%20and%20Pieter%20Simoens%0AAbstract%3A%20Self-supervised%20learning%20has%20emerged%20as%20a%20powerful%20paradigm%20for%20learning%20visual%20representations%20without%20manual%20annotations%2C%20yet%20most%20methods%20still%20operate%20on%20a%20single%20modality%20and%20therefore%20miss%20the%20complementary%20structure%20available%20from%20heterogeneous%20sensors.%20We%20present%20Le%20MuMo%20JEPA%2C%20a%20self-supervised%20framework%20that%20learns%20unified%20representations%20from%20RGB%20images%20and%20aligned%20companion%20modalities.%20In%20our%20driving%20experiments%2C%20the%20second%20modality%20is%20camera-aligned%20LiDAR%20depth%3B%20we%20also%20evaluate%20RGB-thermal%20training%20and%20transfer%20on%20the%20Teledyne%20FLIR%20ADAS%20benchmark.%20Our%20approach%20extends%20LeJEPA%20to%20the%20multi-modal%20setting%20by%20learning%20fusion%20tokens%20that%20act%20as%20a%20latent%20bottleneck%20between%20modality-specific%20patch%20stems%20inside%20a%20shared%20transformer.%20Our%20default%20model%20employs%20a%20pruned%20fusion%20strategy%3A%20after%20an%20initial%20cross-modal%20attention%20layer%2C%20modality-specific%20tokens%20are%20dropped%2C%20forcing%20cross-modal%20information%20into%20the%20shared%20fusion-token%20grid%20as%20an%20efficient%20latent%20bottleneck%20before%20Sketched%20Isotropic%20Gaussian%20Regularization%20%28SIGReg%29%20is%20applied%20to%20the%20joint%20multimodal%20CLS%20embedding.%20On%20Waymo%2C%20Le%20MuMo%20JEPA%20gives%20the%20strongest%20performance-efficiency%20trade-off%20on%20downstream%20patch%20probes%20among%20the%20from-scratch%20multimodal%20baselines%2C%20improving%20CenterNet%20detection%20and%20dense%20depth%20while%20remaining%20competitive%20on%20segmentation.%20Under%20from-scratch%20training%20on%20nuScenes%2C%20Le%20MuMo%20JEPA%20remains%20the%20strongest%20model%2C%20and%20it%20also%20gives%20the%20best%20FLIR%20results%2C%20especially%20after%20Waymo-initialized%20fine-tuning.%20It%20also%20retains%20the%20best%20overall%20accuracy-efficiency%20balance%20in%20our%20study%20at%20substantially%20lower%20compute%2C%20memory%2C%20and%20estimated%20training%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24327v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLe%2520MuMo%2520JEPA%253A%2520Multi-Modal%2520Self-Supervised%2520Representation%2520Learning%2520with%2520Learnable%2520Fusion%2520Tokens%26entry.906535625%3DCiem%2520Cornelissen%2520and%2520Sam%2520Leroux%2520and%2520Pieter%2520Simoens%26entry.1292438233%3DSelf-supervised%2520learning%2520has%2520emerged%2520as%2520a%2520powerful%2520paradigm%2520for%2520learning%2520visual%2520representations%2520without%2520manual%2520annotations%252C%2520yet%2520most%2520methods%2520still%2520operate%2520on%2520a%2520single%2520modality%2520and%2520therefore%2520miss%2520the%2520complementary%2520structure%2520available%2520from%2520heterogeneous%2520sensors.%2520We%2520present%2520Le%2520MuMo%2520JEPA%252C%2520a%2520self-supervised%2520framework%2520that%2520learns%2520unified%2520representations%2520from%2520RGB%2520images%2520and%2520aligned%2520companion%2520modaliti {"title": "Neural Network Models for Contextual Regression", "author": "Seksan Kiatsupaibul and Pakawan Chansiripas", "abstract": "We propose a neural network model for contextual regression in which the regression model depends on contextual features that determine the active submodel and an algorithm to fit the model. The proposed simple contextual neural network (SCtxtNN) separates context identification from context-specific regression, resulting in a structured and interpretable architecture with fewer parameters than a fully connected feed-forward network. We show mathematically that the proposed architecture is sufficient to represent contextual linear regression models using only standard neural network components. Numerical experiments are provided to support the theoretical result, showing that the proposed model achieves lower excess mean squared error and more stable performance than feed-forward neural networks with comparable numbers of parameters, while larger networks improve accuracy only at the cost of increased complexity. The results suggest that incorporating contextual structure can improve model efficiency while preserving interpretability.", "link": "http://arxiv.org/abs/2603.24400v1", "date": "2026-03-25", "relevancy": 2.2791, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4712}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4481}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Network%20Models%20for%20Contextual%20Regression&body=Title%3A%20Neural%20Network%20Models%20for%20Contextual%20Regression%0AAuthor%3A%20Seksan%20Kiatsupaibul%20and%20Pakawan%20Chan

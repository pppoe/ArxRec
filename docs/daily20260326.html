med%20text%20prompting%20to%20capture%20authenticity%20cues%20tailored%20to%20each%20identity%2C%20thereby%20enabling%20more%20discriminative%20cross-modal%20semantics.%20Comprehensive%20experiments%20on%20video%20DFD%20benchmarks%2C%20including%20classical%20face-swapping%20forgeries%20and%20recent%20full-face%20generation%20forgeries%2C%20demonstrate%20that%20our%20VLAForge%20substantially%20outperforms%20state-of-the-art%20methods%20at%20both%20frame%20and%20video%20levels.%20Code%20is%20available%20at%20https%3A//github.com/mala-lab/VLAForge.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24454v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnleashing%2520Vision-Language%2520Semantics%2520for%2520Deepfake%2520Video%2520Detection%26entry.906535625%3DJiawen%2520Zhu%2520and%2520Yunqi%2520Miao%2520and%2520Xueyi%2520Zhang%2520and%2520Jiankang%2520Deng%2520and%2520Guansong%2520Pang%26entry.1292438233%3DRecent%2520Deepfake%2520Video%2520Detection%2520%2528DFD%2529%2520studies%2520have%2520demonstrated%2520that%2520pre-trained%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520such%2520as%2520CLIP%2520exhibit%2520strong%2520generalization%2520capabilities%2520in%2520detecting%2520artifacts%2520across%2520different%2520identities.%2520However%252C%2520existing%2520approaches%2520focus%2520on%2520leveraging%2520visual%2520features%2520only%252C%2520overlooking%2520their%2520most%2520distinctive%2520strength%2520--%2520the%2520rich%2520vision-language%2520semantics%2520embedded%2520in%2520the%2520latent%2520space.%2520We%2520propose%2520VLAForge%252C%2520a%2520novel%2520DFD%2520framework%2520that%2520unleashes%2520the%2520potential%2520of%2520such%2520cross-modal%2520semantics%2520to%2520enhance%2520model%2527s%2520discriminability%2520in%2520deepfake%2520detection.%2520This%2520work%2520i%2529%2520enhances%2520the%2520visual%2520perception%2520of%2520VLM%2520through%2520a%2520ForgePercei ecting%20artifacts%20across%20different%20identities.%20However%2C%20existing%20approaches%20focus%20on%20leveraging%20visual%20features%20only%2C%20overlooking%20their%20most%20distinctive%20strength%20--%20the%20rich%20vision-language%20semantics%20embedded%20in%20the%20latent%20space.%20We%20propose%20VLAForge%2C%20a%20novel%20DFD%20framework%20that%20unleashes%20the%20potential%20of%20such%20cross-modal%20semantics%20to%20enhance%20model%27s%20discriminability%20in%20deepfake%20detection.%20This%20work%20i%29%20enhances%20the%20visual%20perception%20of%20VLM%20through%20a%20ForgePerceiver%2C%20which%20acts%20as%20an%20independent%20learner%20to%20capture%20diverse%2C%20subtle%20forgery%20cues%20both%20granularly%20and%20holistically%2C%20while%20preserving%20the%20pretrained%20Vision-Language%20Alignment%20%28VLA%29%20knowledge%2C%20and%20ii%29%20provides%20a%20complementary%20discriminative%20cue%20--%20Identity-Aware%20VLA%20score%2C%20derived%20by%20coupling%20cross-modal%20semantics%20with%20the%20forgery%20cues%20learned%20by%20ForgePerceiver.%20Notably%2C%20the%20VLA%20score%20is%20augmented%20by%20an%20identity%20prior-informed%20text%20prompting%20to%20capture%20authenticity%20cues%20tailored%20to%20each%20identity%2C%20thereby%20enabling%20more%20discriminative%20cross-modal%20semantics.%20Comprehensive%20experiments%20on%20video%20DFD%20benchmarks%2C%20including%20classical%20face-swapping%20forgeries%20and%20recent%20full-face%20generation%20forgeries%2C%20demonstrate%20that%20our%20VLAForge%20substantially%20outperforms%20state-of-the-art%20methods%20at%20both%20frame%20and%20video%20levels.%20Code%20is%20available%20at%20https%3A//github.com/mala-lab/VLAForge.&entry.1838667208=http%3A//arxiv.org/abs/2603.24454v1&entry.124074799=Read"},
{"title": "Unlocking Few-Shot Capabilities in LVLMs via Prompt Conditioning and Head Selection", "author": "Adhemar de Senneville and Xavier Bou and J\u00e9r\u00e9my Anger and Rafael Grompone and Gabriele Facciolo", "abstract": "Current Large Vision Language Models (LVLMs) excel at many zero-shot tasks like image captioning, visual question answering and OCR. However, these same models suffer from poor performance at image classification tasks, underperforming against CLIP-based methods. Notably, this gap is surprising because many LVLMs use CLIP-pretrained vision encoders. Yet LVLMs are not inherently limited by CLIP's architecture with independent vision and text encoders. In CLIP, this separation biases classification toward class-name matching rather than joint visual-text reasoning. In this paper we show that, despite their poor raw performance, LVLMs can improve visual feature class separability at inference using prompt conditioning, and LVLMs' internal representations, especially attention heads, can outperform the model itself at zero-shot and few-shot classification. We introduce Head Ensemble Classifiers (HEC) to bridge the performance gap between CLIP-based and LVLM-based classification methods. Inspired by Gaussian Discriminant Analysis, HEC ranks the most discriminative vision and text heads and combines them into a training-free classifier. We show that HEC achieves state-of-the-art performance in few-shot and zero-shot classification across 12 datasets.", "link": "http://arxiv.org/abs/2603.24181v1", "date": "2026-03-25", "relevancy": 2.7707, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5587}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "li {"title": "CliPPER: Contextual Video-Language Pretraining on Long-form Intraoperative Surgical Procedures for Event Recognition", "author": "Florian Stilz and Vinkle Srivastav and Nassir Navab and Nicolas Padoy", "abstract": "Video-language foundation models have proven to be highly effective in zero-shot applications across a wide range of tasks. A particularly challenging area is the intraoperative surgical procedure domain, where labeled data is scarce, and precise temporal understanding is often required for complex downstream tasks. To address this challenge, we introduce CliPPER (Contextual Video-Language Pretraining on Long-form Intraoperative Surgical Procedures for Event Recognition), a novel video-language pretraining framework trained on surgical lecture videos. Our method is designed for fine-grained temporal video-text recognition and introduces several novel pretraining strategies to improve multimodal alignment in long-form surgical videos. Specifically, we propose Contextual Video-Text Contrastive Learning (VTC_CTX) and Clip Order Prediction (COP) pretraining objectives, both of which leverage temporal and contextual dependencies to enhance local video understanding. In addition, we incorporate a Cycle-Consistency Alignment over video-text matches within the same surgical video to enforce bidirectional consistency and improve overall representation coherence. Moreover, we introduce a more refined alignment loss, Frame-Text Matching (FTM), to improve the alignment between video frames and text. As a result, our model establishes a new state-of-the-art across multiple public surgical benchmarks, including zero-shot recognition of phases, steps, instruments, and triplets. The source code and pretraining captions can be found at https://github.com/CAMMA-public/CliPPER.", "link": "http://arxiv.org/abs/2603.24539v1", "date": "2026-03-25", "relevancy": 2.7703, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "ht f%20which%20leverage%20temporal%20and%20contextual%20dependencies%20to%20enhance%20local%20video%20understanding.%20In%20addition%2C%20we%20incorporate%20a%20Cycle-Consistency%20Alignment%20over%20video-text%20matches%20within%20the%20same%20surgical%20video%20to%20enforce%20bidirectional%20consistency%20and%20improve%20overall%20representation%20coherence.%20Moreover%2C%20we%20introduce%20a%20more%20refined%20alignment%20loss%2C%20Frame-Text%20Matching%20%28FTM%29%2C%20to%20improve%20the%20alignment%20between%20video%20frames%20and%20text.%20As%20a%20result%2C%20our%20model%20establishes%20a%20new%20state-of-the-art%20across%20multiple%20public%20surgical%20benchmarks%2C%20including%20zero-shot%20recognition%20of%20phases%2C%20steps%2C%20instruments%2C%20and%20triplets.%20The%20source%20code%20and%20pretraining%20captions%20can%20be%20found%20at%20https%3A//github.com/CAMMA-public/CliPPER.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24539v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCliPPER%253A%2520Contextual%2520Video-Language%2520Pretraining%2520on%2520Long-form%2520Intraoperative%2520Surgical%2520Procedures%2520for%2520Event%2520Recognition%26entry.906535625%3DFlorian%2520Stilz%2520and%2520Vinkle%2520Srivastav%2520and%2520Nassir%2520Navab%2520and%2520Nicolas%2520Padoy%26entry.1292438233%3DVideo-language%2520foundation%2520models%2520have%2520proven%2520to%2520be%2520highly%2520effective%2520in%2520zero-shot%2520applications%2520across%2520a%2520wide%2520range%2520of%2520tasks.%2520A%2520particularly%2520challenging%2520area%2520is%2520the%2520intraoperative%2520surgical%2520procedure%2520domain%252C%2520where%2520labeled%2520data%2520is%2520scarce%252C%2520and%2520precise%2520temporal%2520understanding%2520is%2520often%2520required%2520for%2520complex%2520downstream%2520tasks.%2520To%2520address%2520this%2520challenge%252C%2520we%2520introduce%2520CliPPER%2520%2528Contextual {"title": "Vision-Language Models vs Human: Perceptual Image Quality Assessment", "author": "Imran Mehmood and Imad Ali Shah and Ming Ronnier Luo and Brian Deegan", "abstract": "Psychophysical experiments remain the most reliable approach for perceptual image quality assessment (IQA), yet their cost and limited scalability encourage automated approaches. We investigate whether Vision Language Models (VLMs) can approximate human perceptual judgments across three image quality scales: contrast, colorfulness and overall preference. Six VLMs four proprietary and two openweight models are benchmarked against psychophysical data. This work presents a systematic benchmark of VLMs for perceptual IQA through comparison with human psychophysical data. The results reveal strong attribute dependent variability models with high human alignment for colorfulness (\u03c1up to 0.93) underperform on contrast and vice-versa. Attribute weighting analysis further shows that most VLMs assign higher weights to colorfulness compared to contrast when evaluating overall preference similar to the psychophysical data. Intramodel consistency analysis reveals a counterintuitive tradeoff: the most self consistent models are not necessarily the most human aligned suggesting response variability reflects sensitivity to scene dependent perceptual cues. Furthermore, human-VLM agreement is increased with perceptual separability, indicating VLMs are more reliable when stimulus differences are clearly expressed.", "link": "http://arxiv.org/abs/2603.24578v1", "date": "2026-03-25", "relevancy": 2.7624, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5657}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5657}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Intera re%2C%20human-VLM%20agreement%20is%20increased%20with%20perceptual%20separability%2C%20indicating%20VLMs%20are%20more%20reliable%20when%20stimulus%20differences%20are%20clearly%20expressed.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24578v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVision-Language%2520Models%2520vs%2520Human%253A%2520Perceptual%2520Image%2520Quality%2520Assessment%26entry.906535625%3DImran%2520Mehmood%2520and%2520Imad%2520Ali%2520Shah%2520and%2520Ming%2520Ronnier%2520Luo%2520and%2520Brian%2520Deegan%26entry.1292438233%3DPsychophysical%2520experiments%2520remain%2520the%2520most%2520reliable%2520approach%2520for%2520perceptual%2520image%2520quality%2520assessment%2520%2528IQA%2529%252C%2520yet%2520their%2520cost%2520and%2520limited%2520scalability%2520encourage%2520automated%2520approaches.%2520We%2520investigate%2520whether%2520Vision%2520Language%2520Models%2520%2528VLMs%2529%2520can%2520approximate%2520human%2520perceptual%2520judgments%2520across%2520three%2520image%2520quality%2520scales%253A%2520contrast%252C%2520colorfulness%2520and%2520overall%2520preference.%2520Six%2520VLMs%2520four%2520proprietary%2520and%2520two%2520openweight%2520models%2520are%2520benchmarked%2520against%2520psychophysical%2520data.%2520This%2520work%2520presents%2520a%2520systematic%2520benchmark%2520of%2520VLMs%2520for%2520perceptual%2520IQA%2520through%2520comparison%2520with%2520human%2520psychophysical%2520data.%2520The%2520results%2520reveal%2520strong%2520attribute%2520dependent%2520variability%2520models%2520with%2520high%2520human%2520alignment%2520for%2520colorfulness%2520%2528%25CF%2581up%2520to%25200.93%2529%2520underperform%2520on%2520contrast%2520and%2520vice-versa.%2520Attribute%2520weighting%2520analysis%2520further%2520shows%2520that%2520most%2520VLMs%2520assign%2520higher%2520weights%2520to%2520colorfulness%2520compared%2520to%2520contrast%2520when%2520evaluating%2520overall%2520preference%2520similar%2520to%2520the%2520psychophysical%2520data.%2520Intramodel%2520consistency%2520analysis%2520reveals%2520a%2520counterintuitive%2520tradeoff%253A%2520the%2520most%2520self%2520consistent%2520models%2520are%2520not%2520necessarily%2520the%2520most%2520human%2520aligned%2520suggesting%2520response%2520variability%2520reflects%2520sensitivity%2520to%2520scene%2520dependent%2520perceptual%2520cues.%2520Furthermore%252C%2520human-VLM%2520agreement%2520is%2520increased%2520with%2520perceptual%2520separability%252C%2520indicating%2520VLMs%2520are%2520more%2520reliable%2520when%2520stimulus%2520differences%2520are%2520clearly%2520expressed.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24578v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Vision-Language%20Models%20vs%20Human%3A%20Perceptual%20Image%20Quality%20Assessment&entry.906535625=Imran%20Mehmood%20and%20Imad%20Ali%20Shah%20and%20Ming%20Ronnier%20Luo%20and%20Brian%20Deegan&entry.1292438233=Psychophysical%20experiments%20remain%20the%20most%20reliable%20approach%20for%20perceptual%20image%20quality%20assessment%20%28IQA%29%2C%20yet%20their%20cost%20and%20limited%20scalability%20encourage%20automated%20approaches.%20We%20investigate%20whether%20Vision%20Language%20Models%20%28VLMs%29%20can%20approximate%20human%20perceptual%20judgments%20across%20three%20image%20quality%20scales%3A%20contrast%2C%20colorfulness%20and%20overall%20preference.%20Six%20VLMs%20four%20proprietary%20and%20two%20openweight%20models%20are%20benchmarked%20against%20psychophysical%20data.%20This%20work%20presents%20a%20systematic%20benchmark%20of%20VLMs%20for%20perceptual%20IQA%20through%20comparison%20with%20human%20psychophysical%20data.%20The%20results%20reveal%20strong%20attribute%20dependent%20variability%20models%20with%20high%20human%20alignment%20for%20colorfulness%20%28%CF%81up%20to%200.93%2 {"title": "UI-Voyager: A Self-Evolving GUI Agent Learning via Failed Experience", "author": "Zichuan Lin and Feiyu Liu and Yijun Yang and Jiafei Lyu and Yiming Gao and Yicheng Liu and Zhicong Lu and Yangbin Yu and Mingyu Yang and Junyou Li and Deheng Ye and Jie Jiang", "abstract": "Autonomous mobile GUI agents have attracted increasing attention along with the advancement of Multimodal Large Language Models (MLLMs). However, existing methods still suffer from inefficient learning from failed trajectories and ambiguous credit assignment under sparse rewards for long-horizon GUI tasks. To that end, we propose UI-Voyager, a novel two-stage self-evolving mobile GUI agent. In the first stage, we employ Rejection Fine-Tuning (RFT), which enables the continuous co-evolution of data and models in a fully autonomous loop. The second stage introduces Group Relative Self-Distillation (GRSD), which identifies critical fork points in group rollouts and constructs dense step-level supervision from successful trajectories to correct failed ones. Extensive experiments on AndroidWorld show that our 4B model achieves an 81.0% Pass@1 success rate, outperforming numerous recent baselines and exceeding human-level performance. Ablation and case studies further verify the effectiveness of GRSD. Our method represents a significant leap toward efficient, self-evolving, and high-performance mobile GUI automation without expensive manual data annotation.", "link": "http://arxiv.org/abs/2603.24533v1", "date": "2026-03-25", "relevancy": 2.7444, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5542}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.551}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5414}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UI-Voyager%3A%20A%20Self-Evolving%20GUI%20Agent%20Learning%20via%20Failed%20Experience&body=Title%3A%20UI-Voyager%3A%20A%20Self-Evolving%20GUI%20Agent%20Learning%20via%20Failed%20Experience%0AAuthor%3A%20Zichuan%20Lin%20and%20Feiyu%20Liu%20and%20Yijun%20Yang%20and%20Jiafei%20Lyu%20and%20Yiming%20Gao%20and%20Yicheng%20Liu%20and%20Zhicong%20Lu%20and%20Yangbin%20Yu%20and%20Mingyu%20Yang%20and%20Junyou%20Li%20and%20Deheng%20Ye%20and%20Jie%20Jiang%0AAbstract%3A%20Autonomous%20mobile%20GUI%20agents%20have%20attracted%20increasing%20attention%20along%20with%20the%20advancement%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29.%20However%2C%20existing%20methods%20still%20suffer%20from%20inefficient%20learning%20from%20failed%20trajectories%20and%20ambiguous%20credit%20assignment%20under%20sparse%20rewards%20for%20long-horizon%20GUI%20tasks.%20To%20that%20end%2C%20we%20propose%20UI-Voyager%2C%20a%20novel%20two-stage%20self-evolving%20mobile%20GUI%20agent.%20In%20the%20first%20stage%2C%20we%20employ%20Rejection%20Fine-Tuning%20%28RFT%29%2C%20which%20enables%20the%20continuous%20co-evolution%20of%20data%20and%20models%20in%20a%20fully%20autonomous%20loop.%20The%20second%20stage%20introduces%20Group%20Relative%20Self-Distillation%20%28GRSD%29%2C%20which%20identifies%20critical%20fork%20points%20in%20group%20rollouts%20and%20constructs%20dense%20step-level%20supervision%20from%20successful%20trajectories%20to%20correct%20failed%20ones.%20Extensive%20experiments%20on%20AndroidWorld%20show%20that%20our%204B%20model%20achieves%20an%2081.0%25%20Pass%401%20success%20rate%2C%20outperforming%20numerous%20recent%20baselines%20and%20exceeding%20human-level%20performance.%20Ablation%20and%20case%20studies%20further%20verify%20the%20effectiveness%20of%20GRSD.%20Our%20method%20represents%20a%20significant%20leap%20toward%20efficient%2C%20self-evolving%2C%20and%20high-performance%20mobile%20GUI%20automation%20without%20expensive%20manual%20data%20annotation.%0ALink%3A%20http%3A//a {"title": "Boosting Document Parsing Efficiency and Performance with Coarse-to-Fine Visual Processing", "author": "Cheng Cui and Ting Sun and Suyin Liang and Tingquan Gao and Zelun Zhang and Jiaxuan Liu and Xueqing Wang and Changda Zhou and Hongen Liu and Manhui Lin and Yue Zhang and Yubo Zhang and Jing Zhang and Jun Zhang and Xing Wei and Yi Liu and Dianhai Yu and Yanjun Ma", "abstract": "Document parsing is a fine-grained task where image resolution significantly impacts performance. While advanced research leveraging vision-language models benefits from high-resolution input to boost model performance, this often leads to a quadratic increase in the number of vision tokens and significantly raises computational costs. We attribute this inefficiency to substantial visual regions redundancy in document images, like background. To tackle this, we propose PaddleOCR-VL, a novel coarse-to-fine architecture that focuses on semantically relevant regions while suppressing redundant ones, thereby improving both efficiency and performance. Specifically, we introduce a lightweight Valid Region Focus Module (VRFM) which leverages localization and contextual relationship prediction capabilities to identify valid vision tokens. Subsequently, we design and train a compact yet powerful 0.9B vision-language model (PaddleOCR-VL-0.9B) to perform detailed recognition, guided by VRFM outputs to avoid direct processing of the entire large image. Extensive experiments demonstrate that PaddleOCR-VL achieves state-of-the-art performance in both page-level parsing and element-level recognition. It significantly outperforms existing solutions, exhibits strong competitiveness against top-tier VLMs, and delivers fast inference while utilizing substantially fewer vision tokens and parameters, highlighting the effectiveness of targeted coarse-to-fine parsing for accurate and efficient document understanding. The source code and models are publicly available at https://github.com/PaddlePaddle/PaddleOCR.", "link": "http://arxiv.org/abs/2603.24326v1", "date": "2026-03-25", "relevancy": 2.7267, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5598}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5598}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5165}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Boosting%20Document%20Parsing%20Efficiency%20and%20Performance%20with%20Coarse-to-Fine%20Visual%20Processing&body=Title%3A%20Boosting%20Document%20Parsing%20Efficiency%20and%20Performance%20with%20Coarse-to-Fine%20Visual%20Processing%0AAuthor%3A%20Cheng%20Cui%20and%20Ting%20Sun%20and%20Suyin%20Liang%20and%20Tingquan%20Gao%20and%20Zelun%20Zhang%20and%20Jiaxuan%20Liu%20and%20Xueqing%20Wang%20and%20Changda%20Zhou%20and%20Hongen%20Liu%20and%20Manhui%20Lin%20and%20Yue%20Zhang%20and%20Yubo%20Zhang%20and%20Jing%20Zhang%20and%20Jun%20Zhang%20and%20Xing%20Wei%20and%20Yi%20Liu%20and%20Dianhai%20Yu%20and%20Yanjun%20Ma%0AAbstract%3A%20Document%20parsing%20is%20a%20fine-grained%20task%20where%20image%20resolution%20significantly%20impacts%20performance.%20While%20advanced%20research%20leveraging%20vision-language%20models%20benefits%20from%20high-resolution%20input%20to%20boost%20model%20performance%2C%20this%20often%20leads%20to%20a%20quadratic%20increase%20in%20the%20number%20of%20vision%20tokens%20and%20significantly%20raises%20computational%20costs.%20We%20attribute%20this%20inefficiency%20to%20substantial%20visual%20regions%20redundancy%20in%20document%20images%2C%20like%20background.%20To%20tackle%20this%2C%20we%20propose%20PaddleOCR-VL%2C%20a%20novel%20coarse-to-fine%20architecture%20that%20focuses%20on%20semantically%20relevant%20regions%20while%20suppressing%20redundant%20ones%2C%20thereby%20improving%20both%20efficiency%20and%20performance.%20Specifically%2C%20we%20introduce%20a%20lightweight%20Valid%20Region%20Focus%20Module%20%28VRFM%29%20which%20leverages%20localization%20and%20contextual%20relationship%20prediction%20capabilities%20to%20identify%20valid%20vision%20tokens.%20Subsequently%2C%20we%20design%20and%20train%20a%20compact%20yet%20powerful%200.9B%20vision-language%20model%20%28PaddleOCR-VL-0.9B%29%20to%20perform%20detailed%20recognition%2C%20guided%20by%20VRFM%20outputs%20to%20avoid%20direct%20processing%20of%20the%20entire%20large%20image.%20Extensive%20experiments%20demonstrate%20that%20PaddleOCR-VL%20achieves%20state-of-the-art%20performance%20in%20both%20page-level%20parsing%20and%20element-level%20recognition.%20It%20significantly%20outperforms%20existing%20solutions%2C%20exhibits%20strong%20competitiveness%20against%20top-tier%20VLMs%2C%20and%20delivers%20fast%20inference%20while%20utilizing%20substantially%20fewer%20vision%20tokens%20and%20parameters%2C%20highlighting%20the%20effectiveness%20of%20targeted%20coarse-to-fine%20parsing%20for%20accurate%20and%20efficient%20document%20understanding.%20The%20source%20code%20and%20models%20are%20publicly%20available%20at%20https%3A//github.com/PaddlePaddle/PaddleOCR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24326v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoosting%2520Document%2520Parsing%2520Efficiency%2520and%2520Performance%2520with%2520Coarse-to-Fine%2520Visual%2520Processing%26entry.906535625%3DCheng%2520Cui%2520and%2520Ting%2520Sun%2520and%2520Suyin%2520Liang%2520and%2520Tingquan%2520Gao%2520and%2520Zelun%2520Zhang%2520and%2520Jiaxuan%2520Liu%2520and%2520Xueqing%2520Wang%2520and%2520Changda%2520Zhou%2520and%2520Hongen%2520Liu%2520and%2520Manhui%2520Lin%2520and%2520Yue%2520Zhang%2520and%2520Yubo%2520Zhang%2520and%2520Jing% {"title": "GraphOmni: A Comprehensive and Extensible Benchmark Framework for Large Language Models on Graph-theoretic Tasks", "author": "Hao Xu and Xiangru Jian and Xinjian Zhao and Wei Pang and Chao Zhang and Suyuchen Wang and Qixin Zhang and Zhengyuan Dong and Joao Monteiro and Bang Liu and Qiuzhuang Sun and Tianshu Yu", "abstract": "This paper introduces GraphOmni, a comprehensive benchmark designed to evaluate the reasoning capabilities of LLMs on graph-theoretic tasks articulated in natural language. GraphOmni encompasses diverse graph types, serialization formats, and prompting schemes, significantly exceeding prior efforts in both scope and depth. Through extensive systematic evaluation, we identify critical interactions among these dimensions, demonstrating their substantial impact on model performance. Our experiments reveal that state-of-the-art models like Claude-3.5 and o4-mini consistently outperform other models, yet even these leading models exhibit substantial room for improvement. Performance variability is evident depending on the specific combinations of factors we considered, underscoring the necessity of comprehensive evaluations across these interconnected dimensions. Additionally, we observe distinct impacts of serialization and prompting strategies between open-source and closed-source models, encouraging the development of tailored approaches. Motivated by the findings, we also propose a reinforcement learning-inspired framework that adaptively selects the optimal factors influencing LLM reasoning capabilities. This flexible and extendable benchmark not only deepens our understanding of LLM performance on structured tasks but also provides a robust foundation for advancing research in LLM-based graph reasoning. The code and datasets are available at https://github.com/GAI-Community/GraphOmni.", "link": "http://arxiv.org/abs/2504.12764v5", "date": "2026-03-25", "relevancy": 2.7039, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5603}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5017}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraphOmni%3A%20A%20Comprehensive%20and%20Extensible%20Benchmark%20Framework%20for%20Large%20Language%20Models%20on%20Graph-theoretic%20Tasks&body=Title%3A%20GraphOmni%3A%20A%20Comprehensive%20and%20Extensible%20Benchmark%20Framework%20for%20Large%20Language%20Models%20on%20Graph-theoretic%20Tasks%0AAuthor%3A%20Hao%20Xu%20and%20Xiangru%20Jian%20and%20Xinjian%20Zhao%20and%20Wei%20Pang%20and%20Chao%20Zhang%20and%20Suyuchen%20Wang%20and%20Qixin%20Zhang%20and%20Zhengyuan%20Dong%20and%20Joao%20Monteiro%20and%20Bang%20Liu%20and%20Qiuzhuang%20Sun%20and%20Tianshu%20Yu%0AAbstract%3A%20This%20paper%20introduces%20GraphOmni%2C%20a%20comprehensive%20benchmark%20designed%20to%20evaluate%20the%20reasoning%20capabilities%20of%20LLMs%20on%20graph-theoretic%20tasks%20articulated%20in%20natural%20language.%20GraphOmni%20encompasses%20diverse%20graph%20types%2C%20serialization%20formats%2C%20and%20prompting%20schemes%2C%20significantly%20exceeding%20prior%20efforts%20in%20both%20scope%20and%20depth.%20Through%20extensive%20systematic%20evaluation%2C%20we%20identify%20critical%20interactions%20among%20these%20dimensions%2C%20demonstrating%20their%20substantial%20impact%20on%20model%20performance.%20Our%20experiments%20reveal%20that%20state-of-the-art%20models%20like%20Claude-3.5%20and%20o4-mini%20consistently%20outperform%20other%20models%2C%20yet%20even%20these%20leading%20models%20exhibit%20substantial%20room%20for%20improvement.%20Performance%20variability%20is%20evident%20depending%20on%20the%20specific%20combinations%20of%20factors%20we%20considered%2C%20underscoring%20the%20necessity%20of%20comprehensive%20evaluations%20across%20these%20interconnected%20dimensions.%20Additionally%2C%20we%20observe%20distinct%20impacts%20of%20serialization%20and%20prompting%20strategies%20between%20open-source%20and%20closed-source%20models%2C%20encouraging%20the%20development%20of%20tailored%20approaches.%20Motivated%20by%20the%20findings%2C%20we%20also%20propose%20a%20reinforcement%20learning-inspired%20framework%20that%20adaptively%20selects%20the%20optimal%20factors%20influencing%20LLM%20reasoning%20capabilities.%20This%20flexible%20and%20extendable%20benchmark%20not%20only%20deepens%20our%20understanding%20of%20LLM%20performance%20on%20structured%20tasks%20but%20also%20provides%20a%20robust%20foundation%20for%20advancing%20research%20in%20LLM-based%20graph%20reasoning.%20The%20code%20and%20datasets%20are%20available%20at%20https%3A//github.com/GAI-Community/GraphOmni.%0ALink%3A%20http%3A//arxiv.org/abs/2504.12764v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraphOmni%253A%2520A%2520Comprehensive%2520and%2520Extensible%2520Benchmark%2520Framework%2520for%2520Large%2520Language%2520Models%2520on%2520Graph-theoretic%2520Tasks%26entry.906535625%3DHao%2520Xu%2520and%2520Xiangru%2520Jian%2520and%2520Xinjian%2520Zhao%2520and%2520Wei%2520Pang%2520and%2520Chao%2520Zhang%2520and%2520Suyuchen%2520Wang%2520and%2520Qixin%2520Zhang%2520and%2520Zhengyuan%2520Dong%2520and%2520Joao%2520Monteiro%2520and%2520Bang%2520Liu%2520and%2520Qiuzhuang%2520Sun%2520and%2520Tianshu%2520Yu%26entry.1292438233%3DThis%2520paper%2520introduces%2520GraphOmni%252C%2520a%2520comprehensive%2520benchmark%2520designed%2520to%2520evaluate%2520the%2520reasoning%2520capabilities%2520of%2520LLMs%2520on%2520graph-theoretic%2520tasks%2520articulated%2520in%2520natural%2520language.%2520GraphOmni%2520encompasses%2520diverse%2520gra {"title": "Spectral Scalpel: Amplifying Adjacent Action Discrepancy via Frequency-Selective Filtering for Skeleton-Based Action Segmentation", "author": "Haoyu Ji and Bowen Chen and Zhihao Yang and Wenze Huang and Yu Gao and Xueting Liu and Weihong Ren and Zhiyong Wang and Honghai Liu", "abstract": "Skeleton-based Temporal Action Segmentation (STAS) seeks to densely segment and classify diverse actions within long, untrimmed skeletal motion sequences. However, existing STAS methodologies face challenges of limited inter-class discriminability and blurred segmentation boundaries, primarily due to insufficient distinction of spatio-temporal patterns between adjacent actions. To address these limitations, we propose Spectral Scalpel, a frequency-selective filtering framework aimed at suppressing shared frequency components between adjacent distinct actions while amplifying their action-specific frequencies, thereby enhancing inter-action discrepancies and sharpening transition boundaries. Specifically, Spectral Scalpel employs adaptive multi-scale spectral filters as scalpels to edit frequency spectra, coupled with a discrepancy loss between adjacent actions serving as the surgical objective. This design amplifies representational disparities between neighboring actions, effectively mitigating boundary localization ambiguities and inter-class confusion. Furthermore, complementing long-term temporal modeling, we introduce a frequency-aware channel mixer to strengthen channel evolution by aggregating spectra across channels. This work presents a novel paradigm for STAS that extends conventional spatio-temporal modeling by incorporating frequency-domain analysis. Extensive experiments on five public datasets demonstrate that Spectral Scalpel achieves state-of-the-art performance. Code is available at https://github.com/HaoyuJi/SpecScalpel.", "link": "http://arxiv.org/abs/2603.24134v1", "date": "2026-03-25", "relevancy": 2.6991, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5737}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5264}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Scalpel%3A%20Amplifying%20Adjacent%20Action%20Discrepancy%20via%20Frequency-Selective%20Filtering%20for%20Skeleton-Based%20Action%20Segmentation&body=Title%3A%20Spectral%20Scalpel%3A%20Amplifying%20Adjacent%20Action%20Discrepancy%20via%20Frequency-Selective%20Filtering%20for%20Skeleton-Based%20Action%20Segmentation%0AAuthor%3A%20Haoyu%20Ji%20and%20Bowen%20Chen%20and%20Zhihao%20Yang%20and%20Wenze%20Huang%20and%20Yu%20Gao%20and%20Xueting%20Liu%20and%20Weihong%20Ren%20and%20Zhiyong%20Wang%20and%20Honghai%20Liu%0AAbstract%3A%20Skeleton-based%20Temporal%20Action%20Segmentation%20%28STAS%29%20seeks%20to%20densely%20segment%20and%20classify%20diverse%20actions%20within%20long%2C%20untrimmed%20skeletal%20motion%20sequences.%20However%2C%20existing%20STAS%20methodologies%20face%20challenges%20of%20limited%20inter-class%20discriminability%20and%20blurred%20segmentation%20boundaries%2C%20primarily%20due%20to%20insufficient%20distinction%20of%20spatio-temporal%20patterns%20between%20adjacent%20actions.%20To%20address%20these%20limitations%2C%20we%20propose%20Spectral%20Scalpel%2C%20a%20frequency-selective%20filtering%20framework%20aimed%20at%20suppressing%20shared%20frequency%20components%20between%20adjacent%20distinct%20actions%20while%20amplifying%20their%20action-specific%20frequencies%2C%20thereby%20enhancing%20inter-action%20discrepancies%20and%20sharpening%20transition%20boundaries.%20Specifically%2C%20Spectral%20Scalpel%20employs%20adaptive%20multi-scale%20spectral%20filters%20as%20scalpels%20to%20edit%20frequency%20spectra%2C%20coupled%20with%20a%20discrepancy%20loss%20between%20adjacent%20actions%20serving%20as%20the%20surgical%20objective.%20This%20design%20amplifies%20representational%20disparities%20between%20neighboring%20actions%2C%20effectively%20mitigating%20boundary%20localization%20ambiguities%20and%20inter-class%20confusion.%20Furthermore%2C%20complementing%20long-term%20temporal%20modeling%2C%20we%20introduce%20a%20frequency-aware%20channel%20mixer%20to%20strengthen%20channel%20evolution%20by%20aggregating%20spectra%20across%20channels.%20This%20work%20presents%20a%20novel%20paradigm%20for%20STAS%20that%20extends%20conventional%20spatio-temporal%20modeling%20by%20incorporating%20frequency-domain%20analysis.%20Extensive%20experiments%20on%20five%20public%20datasets%20demonstrate%20that%20Spectral%20Scalpel%20achieves%20state-of-the-art%20performance.%20Code%20is%20available%20at%20https%3A//github.com/HaoyuJi/SpecScalpel.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24134v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectral%2520Scalpel%253A%2520Amplifying%2520Adjacent%2520Action%2520Discrepancy%2520via%2520Frequency-Selective%2520Filtering%2520for%2520Skeleton-Based%2520Action%2520Segmentation%26entry.906535625%3DHaoyu%2520Ji%2520and%2520Bowen%2520Chen%2520and%2520Zhihao%2520Yang%2520and%2520Wenze%2520Huang%2520and%2520Yu%2520Gao%2520and%2520Xueting%2520Liu%2520and%2520Weihong%2520Ren%2520and%2520Zhiyong%2520Wang%2520and%2520Honghai%2520Liu%26entry.1292438233%3DSkeleton-based%2520Temporal%2520Action%2520Segmentation%2520%2528STAS%2529%2520seeks%2520to%2520densely%2520segment%2520and%2520classify%2520diverse%2520actions%2520within%2520long%252C%2520untrimmed%2520skeletal%2520motion%2520sequences.%2520However%252C%2520existing%2520STAS%2520methodologies%2520face%2520cha {"title": "Anti-I2V: Safeguarding your photos from malicious image-to-video generation", "author": "Duc Vu and Anh Nguyen and Chi Tran and Anh Tran", "abstract": "Advances in diffusion-based video generation models, while significantly improving human animation, poses threats of misuse through the creation of fake videos from a specific person's photo and text prompts. Recent efforts have focused on adversarial attacks that introduce crafted perturbations to protect images from diffusion-based models. However, most existing approaches target image generation, while relatively few explicitly address image-to-video diffusion models (VDMs), and most primarily focus on UNet-based architectures. Hence, their effectiveness against Diffusion Transformer (DiT) models remains largely under-explored, as these models demonstrate improved feature retention, and stronger temporal consistency due to larger capacity and advanced attention mechanisms. In this work, we introduce Anti-I2V, a novel defense against malicious human image-to-video generation, applicable across diverse diffusion backbones. Instead of restricting noise updates to the RGB space, Anti-I2V operates in both the $L$*$a$*$b$* and frequency domains, improving robustness and concentrating on salient pixels. We then identify the network layers that capture the most distinct semantic features during the denoising process to design appropriate training objectives that maximize degradation of temporal coherence and generation fidelity. Through extensive validation, Anti-I2V demonstrates state-of-the-art defense performance against diverse video diffusion models, offering an effective solution to the problem.", "link": "http://arxiv.org/abs/2603.24570v1", "date": "2026-03-25", "relevancy": 2.6983, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6857}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6769}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6412}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anti-I2V%3A%20Safeguarding%20your%20photos%20from%20malicious%20image-to-video%20generation&body=Title%3A%20Anti-I2V%3A%20Safeguarding%20your%20photos%20from%20malicious%20image-to-video%20generation%0AAuthor%3A%20Duc%20Vu%20and%20Anh%20Nguyen%20and%20Chi%20Tran%20and%20Anh%20Tran%0AAbstract%3A%20Advances%20in%20diffusion-based%20video%20generation%20models%2C%20while%20significantly%20improving%20human%20animation%2C%20poses%20threats%20of%20misuse%20through%20the%20creation%20of%20fake%20videos%20from%20a%20specific%20person%27s%20photo%20and%20text%20prompts.%20Recent%20efforts%20have%20focused%20on%20adversarial%20attacks%20that%20introduce%20crafted%20perturbations%20to%20protect%20images%20from%20diffusion-based%20models.%20However%2C%20most%20existing%20approaches%20target%20image%20generation%2C%20while%20relatively%20few%20explicitly%20address%20image-to-video%20diffusion%20models%20%28VDMs%29%2C%20and%20most%20primarily%20focus%20on%20UNet-based%20architectures.%20Hence%2C%20their%20effectiveness%20against%20Diffusion%20Transformer%20%28DiT%29%20models%20remains%20largely%20under-explored%2C%20as%20these%20models%20demonstrate%20improved%20feature%20retention%2C%20and%20stronger%20temporal%20consistency%20due%20to%20larger%20capacity%20and%20advanced%20attention%20mechanisms.%20In%20this%20work%2C%20we%20introduce%20Anti-I2V%2C%20a%20novel%20defense%20against%20malicious%20human%20image-to-video%20generation%2C%20applicable%20across%20diverse%20diffusion%20backbones.%20Instead%20of%20restricting%20noise%20updates%20to%20the%20RGB%20space%2C%20Anti-I2V%20operates%20in%20both%20the%20%24L%24%2A%24a%24%2A%24b%24%2A%20and%20frequency%20domains%2C%20improving%20robustness%20and%20concentrating%20on%20salient%20pixels.%20We%20then%20identify%20the%20network%20layers%20that%20capture%20the%20most%20distinct%20semantic%20features%20during%20the%20denoising%20process%20to%20design%20appropriate%20training%20objectives%20that%20maximize%20degradation%20of%20temporal%20coherence%20and%20generation%20fidelity.%20Through%20extensive%20validation%2C%20Anti-I2V%20demonstrates%20state-of-the-art%20defense%20performance%20against%20diverse%20video%20diffusion%20models%2C%20offering%20an%20effective%20solution%20to%20the%20problem.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24570v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAnti-I2V%253A%2520Safeguarding%2520your%2520photos%2520from%2520malicious%2520image-to-video%2520generation%26entry.906535625%3DDuc%2520Vu%2520and%2520Anh%2520Nguyen%2520and%2520Chi%2520Tran%2520and%2520Anh%2520Tran%26entry.1292438233%3DAdvances%2520in%2520diffusion-based%2520video%2520generation%2520models%252C%2520while%2520significantly%2520improving%2520human%2520animation%252C%2520poses%2520threats%2520of%2520misuse%2520through%2520the%2520creation%2520of%2520fake%2520videos%2520from%2520a%2520specific%2520person%2527s%2520photo%2520and%2520text%2520prompts.%2520Recent%2520efforts%2520have%2520focused%2520on%2520adversarial%2520attacks%2520that%2520introduce%2520crafted%2520perturbations%2520to%2520protect%2520images%2520from%2520diffusion-based%2520models.%2520However%252C%2520most%2520existing%2520approaches%2520target%2520image%2520generation%252C%2520while%2520relatively%2520few%2520explicitly%2520address%2520image-to-video%2520diffusion%2520models%2520%2528VDMs%2529%252C%2520and%2520most%2520primarily%2520focus%2520on%2520UNet-based%2520architectures.%2520Hence%252C%2520their%2520effectiveness%2520against%2520Diffusion%2520Transformer%2520%2528DiT%2529%2520models%2520remains%2520largely%2520under-explored%25 {"title": "VCBench: A Streaming Counting Benchmark for Spatial-Temporal State Maintenance in Long Videos", "author": "Pengyiang Liu and Zhongyue Shi and Hongye Hao and Qi Fu and Xueting Bi and Siwei Zhang and Xiaoyang Hu and Zitian Wang and Linjiang Huang and Si Liu", "abstract": "Video understanding requires models to continuously track and update world state during playback. While existing benchmarks have advanced video understanding evaluation across multiple dimensions, the observation of how models maintain world state remains insufficient. We propose VCBench, a streaming counting benchmark that repositions counting as a minimal probe for diagnosing world state maintenance capability. We decompose this capability into object counting and event counting, forming 8 fine-grained subcategories. Object counting covers tracking currently visible objects and cumulative unique identities, while event counting covers detecting instantaneous actions and tracking complete activity cycles. VCBench contains 406 videos with frame-by-frame annotations of 10,071 event occurrence moments and object state change moments, generating 1,000 streaming QA pairs with 4,576 query points along timelines. By observing state maintenance trajectories through streaming multi-point queries, we design three complementary metrics to diagnose numerical precision, trajectory consistency, and temporal awareness. Evaluation on mainstream video-language models shows that current models still exhibit significant deficiencies in spatial-temporal state maintenance, particularly struggling with tasks like periodic event counting. VCBench provides a diagnostic framework for measuring and improving state maintenance in video understanding systems. Our code and data are available at https://github.com/buaaplay/VCBench.", "link": "http://arxiv.org/abs/2603.12703v2", "date": "2026-03-25", "relevancy": 2.6831, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5477}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5311}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5311}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VCBench%3A%20A%20Streaming%20Counting%20Benchmark%20for%20Spatial-Temporal%20State%20Maintenance%20in%20Long%20Videos&body=Title%3A%20VCBench%3A%20A%20Streaming%20Counting%20Benchmark%20for%20Spatial-Temporal%20State%20Maintenance%20in%20Long%20Videos%0AAuthor%3A%20Pengyiang%20Liu%20and%20Zhongyue%20Shi%20and%20Hongye%20Hao%20and%20Qi%20Fu%20and%20Xueting%20Bi%20and%20Siwei%20Zhang%20and%20Xiaoyang%20Hu%20and%20Zitian%20Wang%20and%20Linjiang%20Huang%20and%20Si%20Liu%0AAbstract%3A%20Video%20understanding%20requires%20models%20to%20continuously%20track%20and%20update%20world%20state%20during%20playback.%20While%20existing%20benchmarks%20have%20advanced%20video%20understanding%20evaluation%20across%20multiple%20dimensions%2C%20the%20observation%20of%20how%20models%20maintain%20world%20state%20remains%20insufficient.%20We%20propose%20VCBench%2C%20a%20streaming%20counting%20benchmark%20that%20repositions%20counting%20as%20a%20minimal%20probe%20for%20diagnosing%20world%20state%20maintenance%20capability.%20We%20decompose%20this%20capability%20into%20object%20counting%20and%20event%20counting%2C%20forming%208%20fine-grained%20subcategories.%20Object%20counting%20covers%20tracking%20currently%20visible%20objects%20and%20cumulative%20unique%20identities%2C%20while%20event%20counting%20covers%20detecting%20instantaneous%20actions%20and%20tracking%20complete%20activity%20cycles.%20VCBench%20contains%20406%20videos%20with%20frame-by-frame%20annotations%20of%2010%2C071%20event%20occurrence%20moments%20and%20object%20state%20change%20moments%2C%20generating%201%2C000%20streaming%20QA%20pairs%20with%204%2C576%20query%20points%20along%20timelines.%20By%20observing%20state%20maintenance%20trajectories%20through%20streaming%20multi-point%20queries%2C%20we%20design%20three%20complementary%20metrics%20to%20diagnose%20numerical%20precision%2C%20trajectory%20consistency%2C%20and%20temporal%20awareness.%20Evaluation%20on%20mainstream%20video-language%20models%20shows%20that%20current%20models%20still%20exhibit%20significant%20deficiencies%20in%20spatial-temporal%20state%20maintenance%2C%20particularly%20struggling%20with%20tasks%20like%20periodic%20event%20counting.%20VCBench%20provides%20a%20diagnostic%20framework%20for%20measuring%20and%20improving%20state%20maintenance%20in%20video%20understanding%20systems.%20Our%20code%20and%20data%20are%20available%20at%20https%3A//github.com/buaaplay/VCBench.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12703v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVCBench%253A%2520A%2520Streaming%2520Counting%2520Benchmark%2520for%2520Spatial-Temporal%2520State%2520Maintenance%2520in%2520Long%2520Videos%26entry.906535625%3DPengyiang%2520Liu%2520and%2520Zhongyue%2520Shi%2520and%2520Hongye%2520Hao%2520and%2520Qi%2520Fu%2520and%2520Xueting%2520Bi%2520and%2520Siwei%2520Zhang%2520and%2520Xiaoyang%2520Hu%2520and%2520Zitian%2520Wang%2520and%2520Linjiang%2520Huang%2520and%2520Si%2520Liu%26entry.1292438233%3DVideo%2520understanding%2520requires%2520models%2520to%2520continuously%2520track%2520and%2520update%2520world%2520state%2520during%2520playback.%2520While%2520existing%2520benchmarks%2520have%2520advanced%2520video%2520understanding%2520evaluation%2520across%2520multiple%2520dimensions%252C%2520the%2520observation%2520of%2520how%2520models%2520maintain%2520world%2520state%2520remains%2520insufficient.%2520We%2520propose%2520VCBench%252C%2520a%2520streaming%2520counting%2520benchma {"title": "Language-Assisted Image Clustering Guided by Discriminative Relational Signals and Adaptive Semantic Centers", "author": "Jun Ma and Xu Zhang and Zhengxing Jiao and Yaxin Hou and Hui Liu and Junhui Hou and Yuheng Jia", "abstract": "Language-Assisted Image Clustering (LAIC) augments the input images with additional texts with the help of vision-language models (VLMs) to promote clustering performance. Despite recent progress, existing LAIC methods often overlook two issues: (i) textual features constructed for each image are highly similar, leading to weak inter-class discriminability; (ii) the clustering step is restricted to pre-built image-text alignments, limiting the potential for better utilization of the text modality. To address these issues, we propose a new LAIC framework with two complementary components. First, we exploit cross-modal relations to produce more discriminative self-supervision signals for clustering, as it compatible with most VLMs training mechanisms. Second, we learn category-wise continuous semantic centers via prompt learning to produce the final clustering assignments. Extensive experiments on eight benchmark datasets demonstrate that our method achieves an average improvement of 2.6% over state-of-the-art methods, and the learned semantic centers exhibit strong interpretability. Code is available in the supplementary material.", "link": "http://arxiv.org/abs/2603.24275v1", "date": "2026-03-25", "relevancy": 2.6691, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5718}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5212}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5084}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Language-Assisted%20Image%20Clustering%20Guided%20by%20Discriminative%20Relational%20Signals%20and%20Adaptive%20Semantic%20Centers&body=Title%3A%20Language-Assisted%20Image%20Clustering%20Guided%20by%20Discriminative%20Relational%20Signals%20and%20Adaptive%20Semantic%20Centers%0AAuthor%3A%20Jun%20Ma%20and%20Xu%20Zhang%20and%20Zhengxing%20Jiao%20and%20Yaxin%20Hou%20and%20Hui%20Liu%20and%20Junhui%20Hou%20and%20Yuheng%20Jia%0AAbstract%3A%20Language-Assisted%20Image%20Clustering%20%28LAIC%29%20augments%20the%20input%20images%20with%20additional%20texts%20with%20the%20help%20of%20vision-language%20models%20%28VLMs%29%20to%20promote%20clustering%20performance.%20Despite%20recent%20progress%2C%20existing%20LAIC%20methods%20often%20overlook%20two%20issues%3A%20%28i%29%20textual%20features%20constructed%20for%20each%20image%20are%20highly%20similar%2C%20leading%20to%20weak%20inter-class%20discriminability%3B%20%28ii%29%20the%20clustering%20step%20is%20restricted%20to%20pre-built%20image-text%20alignments%2C%20limiting%20the%20potential%20for%20better%20utilization%20of%20the%20text%20modality.%20To%20address%20these%20issues%2C%20we%20propose%20a%20new%20LAIC%20framework%20with%20two%20complementary%20components.%20First%2C%20we%20exploit%20cross-modal%20relations%20to%20produce%20more%20discriminative%20self-supervision%20signals%20for%20clustering%2C%20as%20it%20compatible%20with%20most%20VLMs%20training%20mechanisms.%20Second%2C%20we%20learn%20category-wise%20continuous%20semantic%20centers%20via%20prompt%20learning%20to%20produce%20the%20final%20clustering%20assignments.%20Extensive%20experiments%20on%20eight%20benchmark%20datasets%20demonstrate%20that%20our%20method%20achieves%20an%20average%20improvement%20of%202.6%25%20over%20state-of-the-art%20methods%2C%20and%20the%20learned%20semantic%20centers%20exhibit%20strong%20interpretability.%20Code%20is%20available%20in%20the%20supplementary%20material.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24275v1%0AForm%3 {"title": "WorldMesh: Generating Navigable Multi-Room 3D Scenes via Mesh-Conditioned Image Diffusion", "author": "Manuel-Andreas Schneider and Angela Dai", "abstract": "Recent progress in image and video synthesis has inspired their use in advancing 3D scene generation. However, we observe that text-to-image and -video approaches struggle to maintain scene- and object-level consistency beyond a limited environment scale due to the absence of explicit geometry. We thus present a geometry-first approach that decouples this complex problem of large-scale 3D scene synthesis into its structural composition, represented as a mesh scaffold, and realistic appearance synthesis, which leverages powerful image synthesis models conditioned on the mesh scaffold. From an input text description, we first construct a mesh capturing the environment's geometry (walls, floors, etc.), and then use image synthesis, segmentation and object reconstruction to populate the mesh structure with objects in realistic layouts. This mesh scaffold is then rendered to condition image synthesis, providing a structural backbone for consistent appearance generation. This enables scalable, arbitrarily-sized 3D scenes of high object richness and diversity, combining robust 3D consistency with photorealistic detail. We believe this marks a significant step toward generating truly environment-scale, immersive 3D worlds.", "link": "http://arxiv.org/abs/2603.22972v2", "date": "2026-03-25", "relevancy": 2.6492, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7427}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6462}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20W 520object%2520richness%2520and%2520diversity%252C%2520combining%2520robust%25203D%2520consistency%2520with%2520photorealistic%2520detail.%2520We%2520believe%2520this%2520marks%2520a%2520significant%2520step%2520toward%2520generating%2520truly%2520environment-scale%252C%2520immersive%25203D%2520worlds.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22972v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=WorldMesh%3A%20Generating%20Navigable%20Multi-Room%203D%20Scenes%20via%20Mesh-Conditioned%20Image%20Diffusion&entry.906535625=Manuel-Andreas%20Schneider%20and%20Angela%20Dai&entry.1292438233=Recent%20progress%20in%20image%20and%20video%20synthesis%20has%20inspired%20their%20use%20in%20advancing%203D%20scene%20generation.%20However%2C%20we%20observe%20that%20text-to-image%20and%20-video%20approaches%20struggle%20to%20maintain%20scene-%20and%20object-level%20consistency%20beyond%20a%20limited%20environment%20scale%20due%20to%20the%20absence%20of%20explicit%20geometry.%20We%20thus%20present%20a%20geometry-first%20approach%20that%20decouples%20this%20complex%20problem%20of%20large-scale%203D%20scene%20synthesis%20into%20its%20structural%20composition%2C%20represented%20as%20a%20mesh%20scaffold%2C%20and%20realistic%20appearance%20synthesis%2C%20which%20leverages%20powerful%20image%20synthesis%20models%20conditioned%20on%20the%20mesh%20scaffold.%20From%20an%20input%20text%20description%2C%20we%20first%20construct%20a%20mesh%20capturing%20the%20environment%27s%20geometry%20%28walls%2C%20floors%2C%20etc.%29%2C%20and%20then%20use%20image%20synthesis%2C%20segmentation%20and%20object%20reconstruction%20to%20populate%20the%20mesh%20structure%20with%20objects%20in%20realistic%20layouts.%20This%20mesh%20scaffold%20is%20then%20rendered%20to%20condition%20image%20synthesis%2C%20providing%20a%20structural%20backbone%20for%20consistent%20appearance%20generation.%20This%20enables%20scalable%2C%20arbitrarily-sized%203D%20scenes%20of%20high%20object%20richness%20and%20diversity%2C%20combining%20robust%203D%20consistency%20with%20photorealistic%20detail.%20We%20believe%20this%20marks%20a%20significant%20step%20toward%20generating%20truly%20environment-scale%2C%20immersive%203D%20worlds.&entry.1838667208=http%3A//arxiv.org/abs/2603.22972v2&entry.124074799=Read"},
{"title": "POLY-SIM: Polyglot Speaker Identification with Missing Modality Grand Challenge 2026 Evaluation Plan", "author": "Marta Moscati and Muhammad Saad Saeed and Marina Zanoni and Mubashir Noman and Rohan Kumar Das and Monorama Swain and Yufang Hou and Elisabeth Andre and Khalid Mahmood Malik and Markus Schedl and Shah Nawaz", "abstract": "Multimodal speaker identification systems typically assume the availability of complete and homogeneous audio-visual modalities during both training and testing. However, in real-world applications, such assumptions often do not hold. Visual information may be missing due to occlusions, camera failures, or privacy constraints, while multilingual speakers introduce additional complexity due to linguistic variability across languages. These challenges significantly affect the robustness and generalization of multimodal speaker identification systems. The POLY-SIM Grand Challenge 2026 aims to advance research in multimodal speaker identification under missing-modality and cross-lingual conditions. Specifically, the Grand Challenge encourages the development of robust methods that can effectively leverage incomplete multimodal inputs while maintaining strong performance across different languages. This report presents the design and organization of the POLY-SIM Grand Challenge 2026, including the dataset, task formulation, evaluation protocol, and baseline model. By providing a standardized benchmark and evaluation framework, the challenge aims to foster progress toward more robust and practical multimodal speaker identification systems.", "link": "http://arxiv.org/abs/2603.24569v1", "date": "2026-03-25", "relevancy": 2.6282, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.53}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", {"title": "ViHOI: Human-Object Interaction Synthesis with Visual Priors", "author": "Songjin Cai and Linjie Zhong and Ling Guo and Changxing Ding", "abstract": "Generating realistic and physically plausible 3D Human-Object Interactions (HOI) remains a key challenge in motion generation. One primary reason is that describing these physical constraints with words alone is difficult. To address this limitation, we propose a new paradigm: extracting rich interaction priors from easily accessible 2D images. Specifically, we introduce ViHOI, a novel framework that enables diffusion-based generative models to leverage rich, task-specific priors from 2D images to enhance generation quality. We utilize a large Vision-Language Model (VLM) as a powerful prior-extraction engine and adopt a layer-decoupled strategy to obtain visual and textual priors. Concurrently, we design a Q-Former-based adapter that compresses the VLM's high-dimensional features into compact prior tokens, which significantly facilitates the conditional training of our diffusion model. Our framework is trained on motion-rendered images from the dataset to ensure strict semantic alignment between visual inputs and motion sequences. During inference, it leverages reference images synthesized by a text-to-image generation model to improve generalization to unseen objects and interaction categories. Experimental results demonstrate that ViHOI achieves state-of-the-art performance, outperforming existing methods across multiple benchmarks and demonstrating superior generalization.", "link": "http://arxiv.org/abs/2603.24383v1", "date": "2026-03-25", "relevancy": 2.6105, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6826}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.6524}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5783}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViHOI%3A%20Human-Object%20Interaction%20Synthesis%20with%20Visual%20Priors&body=Title%3A%20ViHOI%3A%20Human-Object%20Interaction%20Synthesis%20with%20Visual%20Priors%0AAuthor%3A%20Songjin%20Cai%20and%20Linjie%20Zhong%20and%20Ling%20Guo%20and%20Changxing%20Ding%0AAbstract%3A%20Generating%20realistic%20and%20physically%20plausible%203D%20Human-Object%20Interactions%20%28HOI%29%20remains%20a%20key%20challenge%20in%20motion%20generation.%20One%20primary%20reason%20is%20that%20describing%20these%20physical%20constraints%20with%20words%20alone%20is%20difficult.%20To%20address%20this%20limitation%2C%20we%20propose%20a%20new%20paradigm%3A%20extracting%20rich%20interaction%20priors%20from%20easily%20accessible%202D%20images.%20Specifically%2C%20we%20introduce%20ViHOI%2C%20a%20novel%20framework%20that%20enables%20diffusion-based%20generative%20models%20to%20leverage%20rich%2C%20task-specific%20priors%20from%202D%20images%20to%20enhance%20generation%20quality.%20We%20utilize%20a%20large%20Vision-Language%20Model%20%28VLM%29%20as%20a%20powerful%20prior-extraction%20engine%20and%20adopt%20a%20layer-decoupled%20strategy%20to%20obtain%20visual%20and%20textual%20priors.%20Concurrently%2C%20we%20design%20a%20Q-Former-based%20adapter%20that%20compresses%20the%20VLM%27s%20high-dimensional%20features%20into%20compact%20prior%20tokens%2C%20which%20significantly%20facilitates%20the%20conditional%20training%20of%20our%20diffusion%20model.%20Our%20framework%20is%20trained%20on%20motion-rendered%20images%20from%20the%20dataset%20to%20ensure%20strict%20semantic%20alignment%20between%20visual%20inputs%20and%20motion%20sequences.%20During%20inference%2C%20it%20leverages%20reference%20images%20synthesized%20by%20a%20text-to-image%20generation%20model%20to%20improve%20generalization%20to%20unseen%20objects%20and%20interaction%20categories.%20Experimental%20results%20demonstrate%20that%20ViHOI%20achieves%20state-of-the-art%20performance%2C%20outperforming%20existing%20methods%20across%20multiple%20benchmarks%20and%20demonstrating%20superior%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24383v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViHOI%253A%2520Human-Object%2520Interaction%2520Synthesis%2520with%2520Visual%2520Priors%26entry.906535625%3DSongjin%2520Cai%2520and%2520Linjie%2520Zhong%2520and%2520Ling%2520Guo%2520and%2520Changxing%2520Ding%26entry.1292438233%3DGenerating%2520realistic%2520and%2520physically%2520plausible%25203D%2520Human-Object%2520Interactions%2520%2528HOI%2529%2520remains%2520a%2520key%2520challenge%2520in%2520motion%2520generation.%2520One%2520primary%2520reason%2520is%2520that%2520describing%2520these%2520physical%2520constraints%2520with%2520words%2520alone%2520is%2520difficult.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520a%2520new%2520paradigm%253A%2520extracting%2520rich%2520interaction%2520priors%2520from%2520easily%2520accessible%25202D%2520images.%2520Specifically%252C%2520we%2520introduce%2520ViHOI%252C%2520a%2520novel%2520framework%2520that%2520enables%2520diffusion-based%2520generative%2520models%2520to%2520leverage%2520rich%252C%2520task-specific%2520priors%2520from%25202D%2520images%2520to%2520enhance%2520generation%2520quality.%2520We%2520utilize%2520a%2520large%2520Vision-Language%2520Model%2520%2528VLM%2529%2520as%2520a%2520powerful%2520prior-extraction%2520engine%2520and%2520adopt%2520a%2520layer-decoupled%2520strategy%2520to%2520obtain%2520visual%2520and%2520textual%2520priors.%2520Concurrently%252C%2520we%2520design%2520a%2520Q-Former-based%2520adapter%2520that%2520compresses%2520the%2520VLM%2527s%2520high-dimensional%2520features%2520into%2520compact%2520prior%2520tokens%252C%2520whic {"title": "Modeling Spatiotemporal Neural Frames for High Resolution Brain Dynamic", "author": "Wanying Qu and Jianxiong Gao and Wei Wang and Yanwei Fu", "abstract": "Capturing dynamic spatiotemporal neural activity is essential for understanding large-scale brain mechanisms. Functional magnetic resonance imaging (fMRI) provides high-resolution cortical representations that form a strong basis for characterizing fine-grained brain activity patterns. The high acquisition cost of fMRI limits large-scale applications, therefore making high-quality fMRI reconstruction a crucial task. Electroencephalography (EEG) offers millisecond-level temporal cues that complement fMRI. Leveraging this complementarity, we present an EEG-conditioned framework for reconstructing dynamic fMRI as continuous neural sequences with high spatial fidelity and strong temporal coherence at the cortical-vertex level. To address sampling irregularities common in real fMRI acquisitions, we incorporate a null-space intermediate-frame reconstruction, enabling measurement-consistent completion of arbitrary intermediate frames and improving sequence continuity and practical applicability. Experiments on the CineBrain dataset demonstrate superior voxel-wise reconstruction quality and robust temporal consistency across whole-brain and functionally specific regions. The reconstructed fMRI also preserves essential functional information, supporting downstream visual decoding tasks. This work provides a new pathway for estimating high-resolution fMRI dynamics from EEG and advances multimodal neuroimaging toward more dynamic brain activity modeling.", "link": "http://arxiv.org/abs/2603.24176v1", "date": "2026-03-25", "relevancy": 2.587, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5301}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "simi .%20The%20reconstructed%20fMRI%20also%20preserves%20essential%20functional%20information%2C%20supporting%20downstream%20visual%20decoding%20tasks.%20This%20work%20provides%20a%20new%20pathway%20for%20estimating%20high-resolution%20fMRI%20dynamics%20from%20EEG%20and%20advances%20multimodal%20neuroimaging%20toward%20more%20dynamic%20brain%20activity%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModeling%2520Spatiotemporal%2520Neural%2520Frames%2520for%2520High%2520Resolution%2520Brain%2520Dynamic%26entry.906535625%3DWanying%2520Qu%2520and%2520Jianxiong%2520Gao%2520and%2520Wei%2520Wang%2520and%2520Yanwei%2520Fu%26entry.1292438233%3DCapturing%2520dynamic%2520spatiotemporal%2520neural%2520activity%2520is%2520essential%2520for%2520understanding%2520large-scale%2520brain%2520mechanisms.%2520Functional%2520magnetic%2520resonance%2520imaging%2520%2528fMRI%2529%2520provides%2520high-resolution%2520cortical%2520representations%2520that%2520form%2520a%2520strong%2520basis%2520for%2520characterizing%2520fine-grained%2520brain%2520activity%2520patterns.%2520The%2520high%2520acquisition%2520cost%2520of%2520fMRI%2520limits%2520large-scale%2520applications%252C%2520therefore%2520making%2520high-quality%2520fMRI%2520reconstruction%2520a%2520crucial%2520task.%2520Electroencephalography%2520%2528EEG%2529%2520offers%2520millisecond-level%2520temporal%2520cues%2520that%2520complement%2520fMRI.%2520Leveraging%2520this%2520complementarity%252C%2520we%2520present%2520an%2520EEG-conditioned%2520framework%2520for%2520reconstructing%2520dynamic%2520fMRI%2520as%2520continuous%2520neural%2520sequences%2520with%2520high%2520spatial%2520fidelity%2520and%2520strong%2520temporal%2520coherence%2520at%2520the%2520cortical-vertex%2520level.%2520To%2520address%2520sampling%2520irregularities%2520common%2520in%2520real%2520fMRI%2520acquisitions%252C%2520we%2 {"title": "Toward Physically Consistent Driving Video World Models under Challenging Trajectories", "author": "Jiawei Zhou and Zhenxin Zhu and Lingyi Du and Linye Lyu and Lijun Zhou and Zhanqian Wu and Hongcheng Luo and Zhuotao Tian and Bing Wang and Guang Chen and Hangjun Ye and Haiyang Sun and Yu Li", "abstract": "Video generation models have shown strong potential as world models for autonomous driving simulation. However, existing approaches are primarily trained on real-world driving datasets, which mostly contain natural and safe driving scenarios. As a result, current models often fail when conditioned on challenging or counterfactual trajectories-such as imperfect trajectories generated by simulators or planning systems-producing videos with severe physical inconsistencies and artifacts. To address this limitation, we propose PhyGenesis, a world model designed to generate driving videos with high visual fidelity and strong physical consistency. Our framework consists of two key components: (1) a physical condition generator that transforms potentially invalid trajectory inputs into physically plausible conditions, and (2) a physics-enhanced video generator that produces high-fidelity multi-view driving videos under these conditions. To effectively train these components, we construct a large-scale, physics-rich heterogeneous dataset. Specifically, in addition to real-world driving videos, we generate diverse challenging driving scenarios using the CARLA simulator, from which we derive supervision signals that guide the model to learn physically grounded dynamics under extreme conditions. This challenging-trajectory learning strategy enables trajectory correction and promotes physically consistent video generation. Extensive experiments demonstrate that PhyGenesis consistently outperforms state-of-the-art methods, especially on challenging trajectories. Our project page is available at: https://wm-research.github.io/PhyGenesis/.", "link": "http://arxiv.org/abs/2603.24506v1", "date": "2026-03-25", "relevancy": 2.5866, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7005}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6386}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.596}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Physically%20Consistent%20Driving%20Video%20World%20Models%20under%20Challenging%20Trajectories&body=Title%3A%20Toward%20Physically%20Consistent%20Driving%20Video%20World%20Models%20under%20Challenging%20Trajectories%0AAuthor%3A%20Jiawei%20Zhou%20and%20Zhenxin%20Zhu%20and%20Lingyi%20Du%20and%20Linye%20Lyu%20and%20Lijun%20Zhou%20and%20Zhanqian%20Wu%20and%20Hongcheng%20Luo%20and%20Zhuotao%20Tian%20and%20Bing%20Wang%20and%20Guang%20Chen%20and%20Hangjun%20Ye%20and%20Haiyang%20Sun%20and%20Yu%20Li%0AAbstract%3A%20Video%20generation%20models%20have%20shown%20strong%20potential%20as%20world%20models%20for%20autonomous%20driving%20simulation.%20However%2C%20existing%20approaches%20are%20primarily%20trained%20on%20real-world%20driving%20datasets%2C%20which%20mostly%20contain%20natural%20and%20safe%20driving%20scenarios.%20As%20a%20result%2C%20current%20models%20often%20fail%20when%20conditioned%20on%20challenging%20or%20counterfactual%20trajectories-such%20as%20imperfect%20trajectories%20generated%20by%20simulators%20or%20planning%20systems-producing%20videos%20with%20severe%20physical%20inconsistencies%20and%20artifacts.%20To%20address%20this%20limitation%2C%20we%20propose%20PhyGenesis%2C%20a%20world%20model%20designed%20to%20generate%20driving%20videos%20with%20high%20visual%20fidelity%20and%20strong%20physical%20consistency.%20Our%20framework%20consists%20of%20two%20key%20components%3A%20%281%29%20a%20physical%20condition%20generator%20that%20transforms%20potentially%20invalid%20trajectory%20inputs%20into%20physically%20plausible%20conditions%2C%20and%20%282%29%20a%20physics-enhanced%20video%20generator%20that%20produces%20high-fidelity%20multi-view%20driving%20videos%20under%20these%20conditions.%20To%20effectively%20train%20these%20components%2C%20we%20construct%20a%20large-scale%2C%20physics-rich%20heterogeneous%20dataset.%20Specifically%2C%20in%20addition%20to%20real-world%20driving%20videos%2C%20we%20generate%20diverse%20challenging%20driving%20scenarios%20using%20the%20CARLA%20simulator%2C%20from%20which%20we%20derive%20supervision%20signals%20that%20guide%20the%20model%20to%20learn%20physically%20grounded%20dynamics%20under%20extreme%20conditions.%20This%20challenging-trajectory%20learning%20strategy%20enables%20trajectory%20correction%20and%20promotes%20physically%20consistent%20video%20generation.%20Extensive%20experiments%20demonstrate%20that%20PhyGenesis%20consistently%20outperforms%20state-of-the-art%20methods%2C%20especially%20on%20challenging%20trajectories.%20Our%20project%20page%20is%20available%20at%3A%20https%3A//wm-research.github.io/PhyGenesis/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24506v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToward%2520Physically%2520Consistent%2520Driving%2520Video%2520World%2520Models%2520under%2520Challenging%2520Trajectories%26entry.906535625%3DJiawei%2520Zhou%2520and%2520Zhenxin%2520Zhu%2520and%2520Lingyi%2520Du%2520and%2520Linye%2520Lyu%2520and%2520Lijun%2520Zhou%2520and%2520Zhanqian%2520Wu%2520and%2520Hongcheng%2520Luo%2520and%2520Zhuotao%2520Tian%2520and%2520Bing%2520Wang%2520and%2520Guang%2520Chen%2520and%2520Hangjun%2520Ye%2520and%2520Haiyang%2520Sun%2520and%2520Yu%2520Li%26entry.1292438233%3DVideo%2520generation%2520models%2520have%2520shown%2520strong%2520potential%2520as%2520world%2520models%2520for%252

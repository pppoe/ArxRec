{"title": "The Gait Signature of Frailty: Transfer Learning based Deep Gait Models for Scalable Frailty Assessment", "author": "Laura McDaniel and Basudha Pal and Crystal Szczesny and Yuxiang Guo and Ryan Roemmich and Peter Abadir and Rama Chellappa", "abstract": "Frailty is a condition in aging medicine characterized by diminished physiological reserve and increased vulnerability to stressors. However, frailty assessment remains subjective, heterogeneous, and difficult to scale in clinical practice. Gait is a sensitive marker of biological aging, capturing multisystem decline before overt disability. Yet the application of modern computer vision to gait-based frailty assessment has been limited by small, imbalanced datasets and a lack of clinically representative benchmarks. In this work, we introduce a publicly available silhouette-based frailty gait dataset collected in a clinically realistic setting, spanning the full frailty spectrum and including older adults who use walking aids. Using this dataset, we evaluate how pretrained gait recognition models can be adapted for frailty classification under limited data conditions. We study both convolutional and hybrid attention-based architectures and show that predictive performance depends primarily on how pretrained representations are transferred rather than architectural complexity alone. Across models, selectively freezing low-level gait representations while allowing higher-level features to adapt yields more stable and generalizable performance than either full fine-tuning or rigid freezing. Conservative handling of class imbalance further improves training stability, and combining complementary learning objectives enhances discrimination between clinically adjacent frailty states. Interpretability analyses reveal consistent model attention to lower-limb and pelvic regions, aligning with established biomechanical correlates of frailty. Together, these findings establish gait-based representation learning as a epresentative%20benchmarks.%20In%20this%20work%2C%20we%20introduce%20a%20publicly%20available%20silhouette-based%20frailty%20gait%20dataset%20collected%20in%20a%20clinically%20realistic%20setting%2C%20spanning%20the%20full%20frailty%20spectrum%20and%20including%20older%20adults%20who%20use%20walking%20aids.%20Using%20this%20dataset%2C%20we%20evaluate%20how%20pretrained%20gait%20recognition%20models%20can%20be%20adapted%20for%20frailty%20classification%20under%20limited%20data%20conditions.%20We%20study%20both%20convolutional%20and%20hybrid%20attention-based%20architectures%20and%20show%20that%20predictive%20performance%20depends%20primarily%20on%20how%20pretrained%20representations%20are%20transferred%20rather%20than%20architectural%20complexity%20alone.%20Across%20models%2C%20selectively%20freezing%20low-level%20gait%20representations%20while%20allowing%20higher-level%20features%20to%20adapt%20yields%20more%20stable%20and%20generalizable%20performance%20than%20either%20full%20fine-tuning%20or%20rigid%20freezing.%20Conservative%20handling%20of%20class%20imbalance%20further%20improves%20training%20stability%2C%20and%20combining%20complementary%20learning%20objectives%20enhances%20discrimination%20between%20clinically%20adjacent%20frailty%20states.%20Interpretability%20analyses%20reveal%20consistent%20model%20attention%20to%20lower-limb%20and%20pelvic%20regions%2C%20aligning%20with%20established%20biomechanical%20correlates%20of%20frailty.%20Together%2C%20these%20findings%20establish%20gait-based%20representation%20learning%20as%20a%20scalable%2C%20non-invasive%2C%20and%20interpretable%20framework%20for%20frailty%20assessment%20and%20support%20the%20integration%20of%20modern%20biometric%20modeling%20approaches%20into%20aging%20research%20and%20clinical%20practice.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24434v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Gait%2520Signatu {"title": "Reservoir-Based Graph Convolutional Networks", "author": "Mayssa Soussia and Gita Ayu Salsabila and Mohamed Ali Mahjoub and Islem Rekik", "abstract": "Message passing is a core mechanism in Graph Neural Networks (GNNs), enabling the iterative update of node embeddings by aggregating information from neighboring nodes. Graph Convolutional Networks (GCNs) exemplify this approach by adapting convolutional operations for graph structures, allowing features from adjacent nodes to be combined effectively. However, GCNs encounter challenges with complex or dynamic data. Capturing long-range dependencies often requires deeper layers, which not only increase computational costs but also lead to over-smoothing, where node embeddings become indistinguishable. To overcome these challenges, reservoir computing has been integrated into GNNs, leveraging iterative message-passing dynamics for stable information propagation without extensive parameter tuning. Despite its promise, existing reservoir-based models lack structured convolutional mechanisms, limiting their ability to accurately aggregate multi-hop neighborhood information. To address these limitations, we propose RGC-Net (Reservoir-based Graph Convolutional Network), which integrates reservoir dynamics with structured graph convolution. Key contributions include: (i) a reimagined convolutional framework with fixed random reservoir weights and a leaky integrator to enhance feature retention; (ii) a robust, adaptable model for graph classification; and (iii) an RGC-Net-powered transformer for graph generation with application to dynamic brain connectivity. Extensive experiments show that RGC-Net achieves state-of-the-art performance in classification and generative tasks, including brain graph evolution, with faster convergence and reduced over-smoothing. Source code is available at https://github.com/basiralab/RGC-Net .", "link": "http://arxiv.org/abs/2603.24131v1", "date": "2026-03-25", "relevancy": 2.1214, "to {"title": "Multi-Agent Reasoning with Consistency Verification Improves Uncertainty Calibration in Medical MCQA", "author": "John Ray B. Martinez", "abstract": "Miscalibrated confidence scores are a practical obstacle to deploying AI in clinical settings. A model that is always overconfident offers no useful signal for deferral. We present a multi-agent framework that combines domain-specific specialist agents with Two-Phase Verification and S-Score Weighted Fusion to improve both calibration and discrimination in medical multiple-choice question answering. Four specialist agents (respiratory, cardiology, neurology, gastroenterology) generate independent diagnoses using Qwen2.5-7B-Instruct. Each diagnosis is then subjected to a two-phase self-verification process that measures internal consistency and produces a Specialist Confidence Score (S-score). The S-scores drive a weighted fusion strategy that selects the final answer and calibrates the reported confidence. We evaluate across four experimental settings, covering 100-question and 250-question high-disagreement subsets of both MedQA-USMLE and MedMCQA. Calibration improvement is the central finding, with ECE reduced by 49-74% across all four settings, including the harder MedMCQA benchmark where these gains persist even when absolute accuracy is constrained by knowledge-intensive recall demands. On MedQA-250, the full system achieves ECE = 0.091 (74.4% reduction over the single-specialist baseline) and AUROC = 0.630 (+0.056) at 59.2% accuracy. Ablation analysis identifies Two-Phase Verification as the primary calibration driver and multi-agent reasoning as the primary accuracy driver. These results establish that consistency-based verification produces more reliable uncertainty estimates across diverse medical question types, providing a practical confidence signal for deferral in safety-critical clinical AI applications.", "link": "http://arxiv.org/abs/2603.24481v1", "date": "2026-03-25", "relevancy": 1.5153, "         titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

  </body>
</html>

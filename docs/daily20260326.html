{"title": "PAM: A Pose-Appearance-Motion Engine for Sim-to-Real HOI Video Generation", "author": "Mingju Gao and Kaisen Yang and Huan-ang Gao and Bohan Li and Ao Ding and Wenyi Li and Yangcheng Yu and Jinkun Liu and Shaocong Xu and Yike Niu and Haohan Chi and Hao Chen and Hao Tang and Yu Zhang and Li Yi and Hao Zhao", "abstract": "Hand-object interaction (HOI) reconstruction and synthesis are becoming central to embodied AI and AR/VR. Yet, despite rapid progress, existing HOI generation research remains fragmented across three disjoint tracks: (1) pose-only synthesis that predicts MANO trajectories without producing pixels; (2) single-image HOI generation that hallucinates appearance from masks or 2D cues but lacks dynamics; and (3) video generation methods that require both the entire pose sequence and the ground-truth first frame as inputs, preventing true sim-to-real deployment. Inspired by the philosophy of Joo et al. (2018), we think that HOI generation requires a unified engine that brings together pose, appearance, and motion within one coherent framework. Thus we introduce PAM: a Pose-Appearance-Motion Engine for controllable HOI video generation. The performance of our engine is validated by: (1) On DexYCB, we obtain an FVD of 29.13 (vs. 38.83 for InterDyn), and MPJPE of 19.37 mm (vs. 30.05 mm for CosHand), while generating higher-resolution 480x720 videos compared to 256x256 and 256x384 baselines. (2) On OAKINK2, our full multi-condition model improves FVD from 68.76 to 46.31. (3) An ablation over input conditions on DexYCB shows that combining depth, segmentation, and keypoints consistently yields the best results. (4) For a downstream hand pose estimation task using SimpleHand, augmenting training with 3,400 synthetic videos (207k frames) allows a model trained on only 50% of the real data plus our synthetic data to match the 100% real baseline.", "link": "http://arxiv.org/abs/2603.22193v2", "date": "2026-03-25", "relevancy": 3.123, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6487}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6446}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5805}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation&body=Title%3A%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation%0AAuthor%3A%20Mingju%20Gao%20and%20Kaisen%20Yang%20and%20Huan-ang%20Gao%20and%20Bohan%20Li%20and%20Ao%20Ding%20and%20Wenyi%20Li%20and%20Yangcheng%20Yu%20and%20Jinkun%20Liu%20and%20Shaocong%20Xu%20and%20Yike%20Niu%20and%20Haohan%20Chi%20and%20Hao%20Chen%20and%20Hao%20Tang%20and%20Yu%20Zhang%20and%20Li%20Yi%20and%20Hao%20Zhao%0AAbstract%3A%20Hand-object%20interaction%20%28HOI%29%20reconstruction%20and%20synthesis%20are%20becoming%20central%20to%20embodied%20AI%20and%20AR/VR.%20Yet%2C%20despite%20rapid%20progress%2C%20existing%20HOI%20generation%20research%20remains%20fragmented%20across%20three%20disjoint%20tracks%3A%20%281%29%20pose-only%20synthesis%20that%20predicts%20MANO%20trajectories%20without%20producing%20pixels%3B%20%282%29%20single-image%20HOI%20generation%20that%20hallucinates%20appearance%20from%20masks%20or%202D%20cues%20but%20lacks%20dynamics%3B%20and%20%283%29%20video%20generation%20methods%20that%20require%20both%20the%20entire%20pose%20sequence%20and%20the%20ground-truth%20first%20frame%20as%20inputs%2C%20preventing%20true%20sim-to-real%20deployment.%20Inspired%20by%20the%20philosophy%20of%20Joo%20et%20al.%20%282018%29%2C%20we%20think%20that%20HOI%20generation%20requires%20a%20unified%20engine%20that%20brings%20together%20pose%2C%20appearance%2C%20and%20motion%20within%20one%20coherent%20framework.%20Thus%20we%20introduce%20PAM%3A%20a%20Pose-Appearance-Motion%20Engine%20for%20controllable%20HOI%20video%20generation.%20The%20performance%20of%20our%20engine%20is%20validated%20by%3A%20%281%29%20On%20DexYCB%2C%20we%20obtain%20an%20FVD%20of%2029.13%20%28vs.%2038.83%20for%20InterDyn%29%2C%20and%20MPJPE%20of%2019.37%20mm%20%28vs.%2030.05%20mm%20for%20CosHand%29%2C%20while%20generating%20higher-resolution%20480x720%20videos%20compared%20to%20256x256%20and%20256x384%20baselines.%20%282%29%20On%20OAKINK2%2C%20our%20full%20multi-condition%20model%20improves%20FVD%20from%2068.76%20to%2046.31.%20%283%29%20An%20ablation%20over%20input%20conditions%20on%20DexYCB%20shows%20that%20combining%20depth%2C%20segmentation%2C%20and%20keypoints%20consistently%20yields%20the%20best%20results.%20%284%29%20For%20a%20downstream%20hand%20pose%20estimation%20task%20using%20SimpleHand%2C%20augmenting%20training%20with%203%2C400%20synthetic%20videos%20%28207k%20frames%29%20allows%20a%20model%20trained%20on%20only%2050%25%20of%20the%20real%20data%20plus%20our%20synthetic%20data%20to%20match%20the%20100%25%20real%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22193v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPAM%253A%2520A%2520Pose-Appearance-Motion%2520Engine%2520for%2520Sim-to-Real%2520HOI%2520Video%2520Generation%26entry.906535625%3DMingju%2520Gao%2520and%2520Kaisen%2520Yang%2520and%2520Huan-ang%2520Gao%2520and%2520Bohan%2520Li%2520and%2520Ao%2520Ding%2520and%2520Wenyi%2520Li%2520and%2520Yangcheng%2520Yu%2520and%2520Jinkun%2520Liu%2520and%2520Shaocong%2520Xu%2520and%2520Yike%2520Niu%2520and%2520Haohan%2520Chi%2520and%2520Hao%2520Chen%2520and%2520Hao%2520Tang%2520and%2520Yu%2520Zhang%2520and%2520Li%2520Yi%2520and%2520Hao%2520Zhao%26entry.1292438233%3DHand-object%2520interaction%2520%2528HOI%2529%2520reconstruction%2520and%2520synthesis%2520are%2520becoming%2520central%2520to%25 {"title": "Let it Snow! Animating 3D Gaussian Scenes with Dynamic Weather Effects via Physics-Guided Score Distillation", "author": "Gal Fiebelman and Hadar Averbuch-Elor and Sagie Benaim", "abstract": "3D Gaussian Splatting has recently enabled fast and photorealistic reconstruction of static 3D scenes. However, dynamic editing of such scenes remains a significant challenge. We introduce a novel framework, Physics-Guided Score Distillation, to address a fundamental conflict: physics simulation provides a strong motion prior that is insufficient for photorealism , while video-based Score Distillation Sampling (SDS) alone cannot generate coherent motion for complex, multi-particle scenarios. We resolve this through a unified optimization framework where physics simulation guides Score Distillation to jointly refine the motion prior for photorealism while simultaneously optimizing appearance. Specifically, we learn a neural dynamics model that predicts particle motion and appearance, optimized end-to-end via a combined loss integrating Video-SDS for photorealism with our physics-guidance prior. This allows for photorealistic refinements while ensuring the dynamics remain plausible. Our framework enables scene-wide dynamic weather effects, including snowfall, rainfall, fog, and sandstorms, with physically plausible motion. Experiments demonstrate our physics-guided approach significantly outperforms baselines, with ablations confirming this joint refinement is essential for generating coherent, high-fidelity dynamics.", "link": "http://arxiv.org/abs/2504.05296v4", "date": "2026-03-25", "relevancy": 3.0173, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6149}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6048}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5907}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Let%20it%20Snow%21%20Animating%203D%20Gaussian%20Scenes%20with%20Dynamic%20Weather%20Effects%20via%20Physics-Guided%20Score%20Distillation&body=Title%3A%20Let%20it%20Snow%21%20Animating%203D%20Gaussian%20Scenes%20with%20Dynamic%20Weather%20Effects%20via%20Physics-Guided%20Score%20Distillation%0AAuthor%3A%20Gal%20Fiebelman%20and%20Hadar%20Averbuch-Elor%20and%20Sagie%20Benaim%0AAbstract%3A%203D%20Gaussian%20Splatting%20has%20recently%20enabled%20fast%20and%20photorealistic%20reconstruction%20of%20static%203D%20scenes.%20However%2C%20dynamic%20editing%20of%20such%20scenes%20remains%20a%20significant%20challenge.%20We%20introduce%20a%20novel%20framework%2C%20Physics-Guided%20Score%20Distillation%2C%20to%20address%20a%20fundamental%20conflict%3A%20physics%20simulation%20provides%20a%20strong%20motion%20prior%20that%20is%20insufficient%20for%20photorealism%20%2C%20while%20video-based%20Score%20Distillation%20Sampling%20%28SDS%29%20alone%20cannot%20generate%20coherent%20motion%20for%20complex%2C%20multi-particle%20scenarios.%20We%20resolve%20this%20through%20a%20unified%20optimization%20framework%20where%20physics%20simulation%20guides%20Score%20Distillation%20to%20jointly%20refine%20the%20motion%20prior%20for%20photorealism%20while%20simultaneously%20optimizing%20appearance.%20Specifically%2C%20we%20learn%20a%20neural%20dynamics%20model%20that%20predicts%20particle%20motion%20and%20appearance%2C%20optimized%20end-to-end%20via%20a%20combined%20loss%20integrating%20Video-SDS%20for%20photorealism%20with%20our%20physics-guidance%20prior.%20This%20allows%20for%20photorealistic%20refinements%20while%20ensuring%20the%20dynamics%20remain%20plausible.%20Our%20framework%20enables%20scene-wide%20dynamic%20weather%20effects%2C%20including%20snowfall%2C%20rainfall%2C%20fog%2C%20and%20sandstorms%2C%20with%20physically%20plausible%20motion.%20Experiments%20demonstrate%20our%20physics-guided%20approach%20significantly%20outperforms%20baselines%2C%20with%20ablations%20confirming%20this%20joint%20refinement%20is%20essential%20for%20generating%20coherent%2C%20high-fidelity%20dynamics.%0ALink%3A%20http%3A//arxiv.org/abs/2504.05296v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLet%2520it%2520Snow%2521%2520Animating%25203D%2520Gaussian%2520Scenes%2520with%2520Dynamic%2520Weather%2520Effects%2520via%2520Physics-Guided%2520Score%2520Distillation%26entry.906535625%3DGal%2520Fiebelman%2520and%2520Hadar%2520Averbuch-Elor%2520and%2520Sagie%2520Benaim%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520has%2520recently%2520enabled%2520fast%2520and%2520photorealistic%2520reconstruction%2520of%2520static%25203D%2520scenes.%2520However%252C%2520dynamic%2520editing%2520of%2520such%2520scenes%2520remains%2520a%2520significant%2520challenge.%2520We%2520introduce%2520a%2520novel%2520framework%252C%2520Physics-Guided%2520Score%2520Distillation%252C%2520to%2520address%2520a%2520fundamental%2520conflict%253A%2520physics%2520simulation%2520provides%2520a%2520strong%2520motion%2520prior%2520that%2520is%2520insufficient%2520for%2520photorealism%2520%252C%2520while%2520video-based%2520Score%2520Distillation%2520Sampling%2520%2528SDS%2529%2520alone%2520cannot%2520generate%2520coherent%2520motion%2520for%2520complex%252C%2520multi-particle%2520scenarios.%2520We%2520resolve%2520this%2520through%2520a%2520unified%2520optimization%2520framework%2520where%2520physics%2520simulation%2520guides%2520Score%2520Distillation%2520to%2520jointly%2520refine%2520the%2520motion%2520prior%2520for%2520photorealism%2520while%2520simultaneously%2520optimizing%2520appearance.%2520Specifically%252C%2520we%2520learn%2520a%2520neural%2520dynamics%2520model%2520that%2520predicts%2520particle%2520motion%2520and%2520appearance%252C%2520optimized%2520end-to-end%2520via%2520a%2520combined%2520loss%2520integrating%2520Video-SDS%2520for%2520photorealism%2520with%2520our%2520physics-guidance%2520prior.%2520This%2520allows%2520for%2520photorealistic%2520refinements%2520while%2520ensuring%2520the%2520dynamics%2520remain%2520plausible.%2520Our%2520framework%2520enables%2520scene-wide%2520dynamic%2520weather%2520effects%252C%2520including%2520snowfall%252C%2520rainfall%252C%2520fog%252C%2520and%2520sandstorms%252C%2520with%2520physically%2520plausible%2520motion.%2520Experiments%2520demonstrate%2520our%2520physics-guided%2520approach%2520significantly%2520outperforms%2520baselines%252C%2520with%2520ablations%2520confirming%2520this%2520joint%2520refinement%2520is%2520essential%2520for%2520generating%2520coherent%252C%2520high-fidelity%2520dynamics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2504.05296v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Let%20it%20Snow%21%20Animating%203D%20Gaussian%20Scenes%20with%20Dynamic%20Weather%20Effects%20via%20Physics-Guided%20Score%20Distillation&entry.906535625=Gal%20Fiebelman%20and%20Hadar%20Averbuch-Elor%20and%20Sagie%20Benaim&entry.1292438233=3D%20Gaussian%20Splatting%20has%20recently%20enabled%20fast%20and%20photorealistic%20reconstruction%20of%20static%203D%20scenes.%20However%2C%20dynamic%20editing%20of%20such%20scenes%20remains%20a%20significant%20challenge.%20We%20introduce%20a%20novel%20framework%2C%20Physics-Guided%20Score%20Distillation%2C%20to%20address%20a%20fundamental%20conflict%3A%20physics%20simulation%20provides%20a%20strong%20motion%20prior%20that%20is%20insufficient%20for%20photorealism%20%2C%20while%20video-based%20Score%20Distillation%20Sampling%20%28SDS%29%20alone%20cannot%20generate%20coherent%20motion%20for%20complex%2C%20multi-particle%20scenarios.%20We%20resolve%20this%20through%20a%20unified%20optimization%20framework%20where%20physics%20simulation%20guides%20Score%20Distillation%20to%20jointly%20refine%20the%20motion%20prior%20for%20photorealism%20while%20simultaneously%20optimizing%20appearance.%20Specifically%2C%20we%20learn%20a%20neural%20dynamics%20model%20that%20predicts%20particle%20motion%20and%20appearance%2C%20optimized%20end-to-end%20via%20a%20combined%20loss%20integrating%20Video-SDS%20for%20photorealism%20with%20our%20physics-guidance%20prior.%20This%20allows%20for%20photorealistic%20refinements%20while%20ensuring%20the%20dynamics%20remain%20plausible.%20Our%20framework%20enables%20scene-wide%20dynamic%20weather%20effects%2C%20including%20snowfall%2C%20rainfall%2C%20fog%2C%20and%20sandstorms%2C%20with%20physically%20plausible%20motion.%20Experiments%20demonstrate%20our%20physics-guided%20approach%20significantly%20outperforms%20baselines%2C%20with%20ablations%20confirming%20this%20joint%20refinement%20is%20essential%20for%20generating%20coherent%2C%20high-fidelity%20dynamics.&entry.1838667208=http%3A//arxiv.org/abs/2504.05296v4&entry.124074799=Read"},
{"title": "3D-Mix for VLA: A Plug-and-Play Module for Integrating VGGT-based 3D Information into Vision-Language-Action Models", "author": "Bin Yu and Shijie Lian and Xiaopeng Lin and Zhaolong Shen and Yuliang Wei and Haishan Liu and Changti Wu and Hang Yuan and Bailing Wang and Cong Huang and Kai Chen", "abstract": "Vision-Language-Action (VLA) models leverage Multimodal Large Language Models (MLLMs) for robotic control, but recent studies reveal that MLLMs exhibit limited spatial intelligence due to training predominantly on 2D data, resulting in inadequate 3D perception for manipulation tasks. While recent approaches incorporate specialized 3D vision models such as VGGT to enhance spatial understanding, they employ diverse integration mechanisms without systematic investigation, leaving the optimal fusion strategy unclear. We conduct a comprehensive pilot study comparing nine VGGT integration schemes on standardized benchmarks and find that semantic-conditioned gated fusion, which adaptively balances 2D semantic and 3D geometric features based on task context, achieved the strongest performance among all nine evaluated fusion schemes in our pilot study. We present 3D-Mix, a plug-and-play module that integrates into diverse VLA architectures (GR00T-style and $\u03c0$-style) without modifying existing MLLM or action expert components. Experiments across six MLLM series (nine model variants, 2B--8B parameters) on SIMPLER and LIBERO show that 3D-Mix delivers consistent performance gains, averaging +7.0% on the out-of-domain (OOD) SIMPLER benchmark across all nine GR00T-style variants, establishing a principled approach for enhancing spatial intelligence in VLA systems.", "link": "http://arxiv.org/abs/2603.24393v1", "date": "2026-03-25", "relevancy": 2.9916, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6009}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D-Mix%20for%20VLA%3A%20A%20Plug-and-Play%20Module%20for%20Integrating%20VGGT-based%203D%20Information%20into%20Vision-Language-Action%20Models&body=Title%3A%203D-Mix%20for%20VLA%3A%20A%20Plug-and-Play%20Module%20for%20Integrating%20VGGT-based%203D%20Information%20into%20Vision-Language-Action%20Models%0AAuthor%3A%20Bin%20Yu%20and%20Shijie%20Lian%20and%20Xiaopeng%20Lin%20and%20Zhaolong%20Shen%20and%20Yuliang%20Wei%20and%20Haishan%20Liu%20and%20Changti%20Wu%20and%20Hang%20Yuan%20and%20Bailing%20Wang%20and%20Cong%20Huang%20and%20Kai%20Chen%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20leverage%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20for%20robotic%20control%2C%20but%20recent%20studies%20reveal%20that%20MLLMs%20exhibit%20limited%20spatial%20intelligence%20due%20to%20training%20predominantly%20on%202D%20data%2C%20resulting%20in%20inadequate%203D%20perception%20for%20manipulation%20tasks.%20While%20recent%20approaches%20incorporate%20specialized%203D%20vision%20models%20such%20as%20VGGT%20to%20enhance%20spatial%20understanding%2C%20they%20employ%20diverse%20integration%20mechanisms%20without%20systematic%20investigation%2C%20leaving%20the%20optimal%20fusion%20strategy%20unclear.%20We%20conduct%20a%20comprehensive%20pilot%20study%20comparing%20nine%20VGGT%20integration%20schemes%20on%20standardized%20benchmarks%20and%20find%20that%20semantic-conditioned%20gated%20fusion%2C%20which%20adaptively%20balances%202D%20semantic%20and%203D%20geometric%20features%20based%20on%20task%20context%2C%20achieved%20the%20strongest%20performance%20among%20all%20nine%20evaluated%20fusion%20schemes%20in%20our%20pilot%20study.%20We%20present%203D-Mix%2C%20a%20plug-and-play%20module%20that%20integrates%20into%20diverse%20VLA%20architectures%20%28GR00T-style%20and%20%24%CF%80%24-style%29%20without%20modifying%20existing%20MLLM%20or%20action%20expert%20components.%20Experiments%20across%20six%20MLLM%20series%20%28nine%20model%20variants%2C%202B--8B%20parameters%29%20on%20SIMPLER%20and%20LIBERO%20show%20that%203D-Mix%20delivers%20consistent%20performance%20gains%2C%20averaging%20%2B7.0%25%20on%20the%20out-of-domain%20%28OOD%29%20SIMPLER%20benchmark%20across%20all%20nine%20GR00T-style%20variants%2C%20establishing%20a%20principled%20approach%20for%20enhancing%20spatial%20intelligence%20in%20VLA%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24393v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3D-Mix%2520for%2520VLA%253A%2520A%2520Plug-and-Play%2520Module%2520for%2520Integrating%2520VGGT-based%25203D%2520Information%2520into%2520Vision-Language-Action%2520Models%26entry.906535625%3DBin%2520Yu%2520and%2520Shijie%2520Lian%2520and%2520Xiaopeng%2520Lin%2520and%2520Zhaolong%2520Shen%2520and%2520Yuliang%2520Wei%2520and%2520Haishan%2520Liu%2520and%2520Changti%2520Wu%2520and%2520Hang%2520Yuan%2520and%2520Bailing%2520Wang%2520and%2520Cong%2520Huang%2520and%2520Kai%2520Chen%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520leverage%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520for%2520robotic%2520control%252C%2520but%2520recent%2520studies%2520reveal%2520that%2520MLLMs%2520exhibit%2520limited%2520spatial%2520intelligence%2520due%2520to%2520training%2520predominantly%2520on%25202D%2520data%252C%2520resulting%2520in%2520inadequate%25203D%2520perception%2520for%2520manipulation%2520tasks.%2520While%2520recent%2520approaches%2520incorporate%2520specialized%25203D%2520vision%2520models%2520such%2520as%2520VGGT%2520to%2520enhance%2520spatial%2520understanding%252C%2520th {"title": "EndoVGGT: GNN-Enhanced Depth Estimation for Surgical 3D Reconstruction", "author": "Falong Fan and Yi Xie and Arnis Lektauers and Bo Liu and Jerzy Rozenblit", "abstract": "Accurate 3D reconstruction of deformable soft tissues is essential for surgical robotic perception. However, low-texture surfaces, specular highlights, and instrument occlusions often fragment geometric continuity, posing a challenge for existing fixed-topology approaches. To address this, we propose EndoVGGT, a geometry-centric framework equipped with a Deformation-aware Graph Attention (DeGAT) module. Rather than using static spatial neighborhoods, DeGAT dynamically constructs feature-space semantic graphs to capture long-range correlations among coherent tissue regions. This enables robust propagation of structural cues across occlusions, enforcing global consistency and improving non-rigid deformation recovery. Extensive experiments on SCARED show that our method significantly improves fidelity, increasing PSNR by 24.6% and SSIM by 9.1% over prior state-of-the-art. Crucially, EndoVGGT exhibits strong zero-shot cross-dataset generalization to the unseen SCARED and EndoNeRF domains, confirming that DeGAT learns domain-agnostic geometric priors. These results highlight the efficacy of dynamic feature-space modeling for consistent surgical 3D reconstruction.", "link": "http://arxiv.org/abs/2603.24577v1", "date": "2026-03-25", "relevancy": 2.9833, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6022}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5954}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5923}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EndoVGGT%3A%20GNN-Enhanced%20Depth%20Estimation%20for%20Surgical%203D%20Reconstruction&body=Title%3A%20EndoVGGT%3A%20GNN-Enhanced%20Depth%20Estimation%20for%20Surgical%203D%20Reconstruction%0AAuthor%3A%20Falong%20Fan%20and%20Yi%20Xie%20and%20Arnis%20Lektauers%20and%20Bo%20Liu%20and%20Jerzy%20Rozenblit%0AAbstract%3A%20Accurate%203D%20reconstruction%20of%20deformable%20soft%20tissues%20is%20essential%20for%20surgical%20robotic%20perception.%20However%2C%20low-texture%20surfaces%2C%20specular%20highlights%2C%20and%20instrument%20occlusions%20often%20fragment%20geometric%20continuity%2C%20posing%20a%20challenge%20for%20existing%20fixed-topology%20approaches.%20To%20address%20this%2C%20we%20propose%20EndoVGGT%2C%20a%20geometry-centric%20framework%20equipped%20with%20a%20Deformation-aware%20Graph%20Attention%20%28DeGAT%29%20module.%20Rather%20than%20using%20static%20spatial%20neighborhoods%2C%20DeGAT%20dynamically%20constructs%20feature-space%20semantic%20graphs%20to%20capture%20long-range%20correlations%20among%20coherent%20tissue%20regions.%20This%20enables%20robust%20propagation%20of%20structural%20cues%20across%20occlusions%2C%20enforcing%20global%20consistency%20and%20improving%20non-rigid%20deformation%20recovery.%20Extensive%20experiments%20on%20SCARED%20show%20that%20our%20method%20significantly%20improves%20fidelity%2C%20increasing%20PSNR%20by%2024.6%25%20and%20SSIM%20by%209.1%25%20over%20prior%20state-of-the-art.%20Crucially%2C%20EndoVGGT%20exhibits%20strong%20zero-shot%20cross-dataset%20generalization%20to%20the%20unseen%20SCARED%20and%20EndoNeRF%20domains%2C%20confirming%20that%20DeGAT%20learns%20domain-agnostic%20geometric%20priors.%20These%20results%20highlight%20the%20efficacy%20of%20dynamic%20feature-space%20modeling%20for%20consistent%20surgical%203D%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24577v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3 2520feature-space%2520modeling%2520for%2520consistent%2520surgical%25203D%2520reconstruction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24577v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EndoVGGT%3A%20GNN-Enhanced%20Depth%20Estimation%20for%20Surgical%203D%20Reconstruction&entry.906535625=Falong%20Fan%20and%20Yi%20Xie%20and%20Arnis%20Lektauers%20and%20Bo%20Liu%20and%20Jerzy%20Rozenblit&entry.1292438233=Accurate%203D%20reconstruction%20of%20deformable%20soft%20tissues%20is%20essential%20for%20surgical%20robotic%20perception.%20However%2C%20low-texture%20surfaces%2C%20specular%20highlights%2C%20and%20instrument%20occlusions%20often%20fragment%20geometric%20continuity%2C%20posing%20a%20challenge%20for%20existing%20fixed-topology%20approaches.%20To%20address%20this%2C%20we%20propose%20EndoVGGT%2C%20a%20geometry-centric%20framework%20equipped%20with%20a%20Deformation-aware%20Graph%20Attention%20%28DeGAT%29%20module.%20Rather%20than%20using%20static%20spatial%20neighborhoods%2C%20DeGAT%20dynamically%20constructs%20feature-space%20semantic%20graphs%20to%20capture%20long-range%20correlations%20among%20coherent%20tissue%20regions.%20This%20enables%20robust%20propagation%20of%20structural%20cues%20across%20occlusions%2C%20enforcing%20global%20consistency%20and%20improving%20non-rigid%20deformation%20recovery.%20Extensive%20experiments%20on%20SCARED%20show%20that%20our%20method%20significantly%20improves%20fidelity%2C%20increasing%20PSNR%20by%2024.6%25%20and%20SSIM%20by%209.1%25%20over%20prior%20state-of-the-art.%20Crucially%2C%20EndoVGGT%20exhibits%20strong%20zero-shot%20cross-dataset%20generalization%20to%20the%20unseen%20SCARED%20and%20EndoNeRF%20domains%2C%20confirming%20that%20DeGAT%20learns%20domain-agnostic%20geometric%20priors.%20These%20results%20highlight%20the%20efficacy%20of%20dynamic%20feature-space%20modeling%20for%20consistent%20surgical%203D%20 {"title": "Memory-Augmented Vision-Language Agents for Persistent and Semantically Consistent Object Captioning", "author": "Tommaso Galliena and Stefano Rosa and Tommaso Apicella and Pietro Morerio and Alessio Del Bue and Lorenzo Natale", "abstract": "Vision-Language Models (VLMs) often yield inconsistent descriptions of the same object across viewpoints, hindering the ability of embodied agents to construct consistent semantic representations over time. Previous methods resolved inconsistencies using offline multi-view aggregation or multi-stage pipelines that decouple exploration, data association, and caption learning, with limited capacity to reason over previously observed objects. In this paper, we introduce a unified, memory-augmented Vision-Language agent that simultaneously handles data association, object captioning, and exploration policy within a single autoregressive framework. The model processes the current RGB observation, a top-down explored map, and an object-level episodic memory serialized into object-level tokens, ensuring persistent object identity and semantic consistency across extended sequences. To train the model in a self-supervised manner, we collect a dataset in photorealistic 3D environments using a disagreement-based policy and a pseudo-captioning model that enforces consistency across multi-view caption histories. Extensive evaluation on a manually annotated object-level test set, demonstrate improvements of up to +11.86% in standard captioning scores and +7.39% in caption self-similarity over baseline models, while enabling scalable performance through a compact scene representation. Code, model weights, and data are available at https://github.com/hsp-iit/epos-vlm", "link": "http://arxiv.org/abs/2603.24257v1", "date": "2026-03-25", "relevancy": 2.94, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5955}, {"title": " 99=Read"},
{"title": "Video-Only ToM: Enhancing Theory of Mind in Multimodal Large Language Models", "author": "Siqi Liu and Xinyang Li and Bochao Zou and Junbao Zhuo and Huimin Ma and Jiansheng Chen", "abstract": "As large language models (LLMs) continue to advance, there is increasing interest in their ability to infer human mental states and demonstrate a human-like Theory of Mind (ToM). Most existing ToM evaluations, however, are centered on text-based inputs, while scenarios relying solely on visual information receive far less attention. This leaves a gap, since real-world human-AI interaction typically requires multimodal understanding. In addition, many current methods regard the model as a black box and rarely probe how its internal attention behaves in multiple-choice question answering (QA). The impact of LLM hallucinations on such tasks is also underexplored from an interpretability perspective. To address these issues, we introduce VisionToM, a vision-oriented intervention framework designed to strengthen task-aware reasoning. The core idea is to compute intervention vectors that align visual representations with the correct semantic targets, thereby steering the model's attention through different layers of visual features. This guidance reduces the model's reliance on spurious linguistic priors, leading to more reliable multimodal language model (MLLM) outputs and better QA performance. Experiments on the EgoToM benchmark-an egocentric, real-world video dataset for ToM with three multiple-choice QA settings-demonstrate that our method substantially improves the ToM abilities of MLLMs. Furthermore, results on an additional open-ended generation task show that VisionToM enables MLLMs to produce free-form explanations that more accurately capture agents' mental states, pushing machine-human collaboration toward greater alignment.", "link": "http://arxiv.org/abs/2603.24484v1", "date": "2026-03-25", "relevancy": 2.9026, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5809}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5809}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5797}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Video-Only%20ToM%3A%20Enhancing%20Theory%20of%20Mind%20in%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Video-Only%20ToM%3A%20Enhancing%20Theory%20of%20Mind%20in%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Siqi%20Liu%20and%20Xinyang%20Li%20and%20Bochao%20Zou%20and%20Junbao%20Zhuo%20and%20Huimin%20Ma%20and%20Jiansheng%20Chen%0AAbstract%3A%20As%20large%20language%20models%20%28LLMs%29%20continue%20to%20advance%2C%20there%20is%20increasing%20interest%20in%20their%20ability%20to%20infer%20human%20mental%20states%20and%20demonstrate%20a%20human-like%20Theory%20of%20Mind%20%28ToM%29.%20Most%20existing%20ToM%20evaluations%2C%20however%2C%20are%20centered%20on%20text-based%20inputs%2C%20while%20scenarios%20relying%20solely%20on%20visual%20information%20receive%20far%20less%20attention.%20This%20leaves%20a%20gap%2C%20since%20real-world%20human-AI%20interaction%20typically%20requires%20multimodal%20understanding.%20In%20addition%2C%20many%20current%20methods%20regard%20the%20model%20as%20a%20black%20box%20and%20rarely%20probe%20how%20its%20internal%20attention%20behaves%20in%20multiple-choice%20question%20answering%20%28QA%29.%20The%20impact%20of%20LLM%20hallucinations%20on%20such%20tasks%20is%20also%20underexplored%20from%20an%20interpretability%20perspective.%20To%20address%20these%20issues%2C%20we%20introduce%20VisionToM%2C%20a%20vision-oriented%20intervention%20framework%20designed%20to%20strengthen%20task-aware%20reasoning.%20The%20core%20idea%20is%20to%20compute%20intervention%20vectors%20that%20align%20visual%20representations%20with%20the%20correct%20semantic%20targets%2C%20thereby%20steering%20the%20model%27s%20attention%20through%20different%20layers%20of%20visual%20features.%20This%20guidance%20reduces%20the%20model%27s%20reliance%20on%20spurious%20linguistic%20priors%2C%20leading%20to%20more%20reliable%20multimodal%20language%20model%20%28MLLM%29%20outputs%20and%20better%20QA%20performance.%20Experiments%20on%20the%20EgoToM%20benchmark-an%20egocentric%2C%20real-world%20video%20dataset%20for%20ToM%20with%20three%20multiple-choice%20QA%20settings-demonstrate%20that%20our%20method%20substantially%20improves%20the%20ToM%20abilities%20of%20MLLMs.%20Furthermore%2C%20results%20on%20an%20additional%20open-ended%20generation%20task%20show%20that%20VisionToM%20enables%20MLLMs%20to%20produce%20free-form%20explanations%20that%20more%20accurately%20capture%20agents%27%20mental%20states%2C%20pushing%20machine-human%20collaboration%20toward%20greater%20alignment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24484v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideo-Only%2520ToM%253A%2520Enhancing%2520Theory%2520of%2520Mind%2520in%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DSiqi%2520Liu%2520and%2520Xinyang%2520Li%2520and%2520Bochao%2520Zou%2520and%2520Junbao%2520Zhuo%2520and%2520Huimin%2520Ma%2520and%2520Jiansheng%2520Chen%26entry.1292438233%3DAs%2520large%2520language%2520models%2520%2528LLMs%2529%2520continue%2520to%2520advance%252C%2520there%2520is%2520increasing%2520interest%2520in%2520their%2520ability%2520to%2520infer%2520human%2520mental%2520states%2520and%2520demonstrate%2520a%2520human-like%2520Theory%2520of%2520Mind%2520%2528ToM%2529.%2520Most%2520existing%2520ToM%2520evaluations%252C%2520however%252C%2520are%2520centered%2520on%2520text-based%2520inputs%252C%2520while%2520scenarios%2520relying%2520solely%25 {"title": "Language-Guided Structure-Aware Network for Camouflaged Object Detection", "author": "Min Zhang", "abstract": "Camouflaged Object Detection (COD) aims to segment objects that are highly integrated with the background in terms of color, texture, and structure, making it a highly challenging task in computer vision. Although existing methods introduce multi-scale fusion and attention mechanisms to alleviate the above issues, they generally lack the guidance of textual semantic priors, which limits the model's ability to focus on camouflaged regions in complex scenes. To address this issue, this paper proposes a Language-Guided Structure-Aware Network (LGSAN). Specifically, based on the visual backbone PVT-v2, we introduce CLIP to generate masks from text prompts and RGB images, thereby guiding the multi-scale features extracted by PVT-v2 to focus on potential target regions. On this foundation, we further design a Fourier Edge Enhancement Module (FEEM), which integrates multi-scale features with high-frequency information in the frequency domain to extract edge enhancement features. Furthermore, we propose a Structure-Aware Attention Module (SAAM) to effectively enhance the model's perception of object structures and boundaries. Finally, we introduce a Coarse-Guided Local Refinement Module (CGLRM) to enhance fine-grained reconstruction and boundary integrity of camouflaged object regions. Extensive experiments demonstrate that our method consistently achieves highly competitive performance across multiple COD datasets, validating its effectiveness and robustness.", "link": "http://arxiv.org/abs/2603.24355v1", "date": "2026-03-25", "relevancy": 2.8734, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5761}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.574}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Language-Guided%20Structure-Aware%20Network%20for%20Camouflaged%20Object%20Detection&body=Title%3A%20Language-Guided%20Structure-Aware%20Network%20for%20Camouflaged%20Object%20Detection%0AAuthor%3A%20Min%20Zhang%0AAbstract%3A%20Camouflaged%20Object%20Detection%20%28COD%29%20aims%20to%20segment%20objects%20that%20are%20highly%20integrated%20with%20the%20background%20in%20terms%20of%20color%2C%20texture%2C%20and%20structure%2C%20making%20it%20a%20highly%20challenging%20task%20in%20computer%20vision.%20Although%20existing%20methods%20introduce%20multi-scale%20fusion%20and%20attention%20mechanisms%20to%20alleviate%20the%20above%20issues%2C%20they%20generally%20lack%20the%20guidance%20of%20textual%20semantic%20priors%2C%20which%20limits%20the%20model%27s%20ability%20to%20focus%20on%20camouflaged%20regions%20in%20complex%20scenes.%20To%20address%20this%20issue%2C%20this%20paper%20proposes%20a%20Language-Guided%20Structure-Aware%20Network%20%28LGSAN%29.%20Specifically%2C%20based%20on%20the%20visual%20backbone%20PVT-v2%2C%20we%20introduce%20CLIP%20to%20generate%20masks%20from%20text%20prompts%20and%20RGB%20images%2C%20thereby%20guiding%20the%20multi-scale%20features%20extracted%20by%20PVT-v2%20to%20focus%20on%20potential%20target%20regions.%20On%20this%20foundation%2C%20we%20further%20design%20a%20Fourier%20Edge%20Enhancement%20Module%20%28FEEM%29%2C%20which%20integrates%20multi-scale%20features%20with%20high-frequency%20information%20in%20the%20frequency%20domain%20to%20extract%20edge%20enhancement%20features.%20Furthermore%2C%20we%20propose%20a%20Structure-Aware%20Attention%20Module%20%28SAAM%29%20to%20effectively%20enhance%20the%20model%27s%20perception%20of%20object%20structures%20and%20boundaries.%20Finally%2C%20we%20introduce%20a%20Coarse-Guided%20Local%20Refinement%20Module%20%28CGLRM%29%20to%20enhance%20fine-grained%20reconstruction%20and%20boundary%20integrity%20of%20camouflaged%20object%20regions.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20consistently%20achieves%20highly%20competitive%20performance%20across%20multiple%20COD%20datasets%2C%20validating%20its%20effectiveness%20and%20robustness.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24355v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLanguage-Guided%2520Structure-Aware%2520Network%2520for%2520Camouflaged%2520Object%2520Detection%26entry.906535625%3DMin%2520Zhang%26entry.1292438233%3DCamouflaged%2520Object%2520Detection%2520%2528COD%2529%2520aims%2520to%2520segment%2520objects%2520that%2520are%2520highly%2520integrated%2520with%2520the%2520background%2520in%2520terms%2520of%2520color%252C%2520texture%252C%2520and%2520structure%252C%2520making%2520it%2520a%2520highly%2520challenging%2520task%2520in%2520computer%2520vision.%2520Although%2520existing%2520methods%2520introduce%2520multi-scale%2520fusion%2520and%2520attention%2520mechanisms%2520to%2520alleviate%2520the%2520above%2520issues%252C%2520they%2520generally%2520lack%2520the%2520guidance%2520of%2520textual%2520semantic%2520priors%252C%2520which%2520limits%2520the%2520model%2527s%2520ability%2520to%2520focus%2520on%2520camouflaged%2520regions%2520in%2520complex%2520scenes.%2520To%2520address%2520this%2520issue%252C%2520this%2520paper%2520proposes%2520a%2520Language-Guided%2520Structure-Aware%2520Network%2520%2528LGSAN%2529.%2520Specifically%252C%2520based%2520on%2520the%2520visual%2520backbone%2520PVT-v2%252C%2520we%2520introduce%2520CLIP%2520to%2520generate%2520masks%2520from%2520text%2520prompts%2520and%2520RGB%2520images%252C%2520thereby%2520guiding%2520the%2520multi-scale%2520features%2520extracted%2520by%2520PVT-v2%2520to%2520focus%2520on%2520potential%2520target%2520regions.% {"title": "PP-OCRv5: A Specialized 5M-Parameter Model Rivaling Billion-Parameter Vision-Language Models on OCR Tasks", "author": "Cheng Cui and Yubo Zhang and Ting Sun and Xueqing Wang and Hongen Liu and Manhui Lin and Yue Zhang and Tingquan Gao and Changda Zhou and Jiaxuan Liu and Zelun Zhang and Jing Zhang and Jun Zhang and Yi Liu", "abstract": "The advent of \"OCR 2.0\" and large-scale vision-language models (VLMs) has set new benchmarks in text recognition. However, these unified architectures often come with significant computational demands, challenges in precise text localization within complex layouts, and a propensity for textual hallucinations. Revisiting the prevailing notion that model scale is the sole path to high accuracy, this paper introduces PP-OCRv5, a meticulously optimized, lightweight OCR system with merely 5 million parameters. We demonstrate that PP-OCRv5 achieves performance competitive with many billion-parameter VLMs on standard OCR benchmarks, while offering superior localization precision and reduced hallucinations. The cornerstone of our success lies not in architectural expansion but in a data-centric investigation. We systematically dissect the role of training data by quantifying three critical dimensions: data difficulty, data accuracy, and data diversity. Our extensive experiments reveal that with a sufficient volume of high-quality, accurately labeled, and diverse data, the performance ceiling for traditional, efficient two-stage OCR pipelines is far higher than commonly assumed. This work provides compelling evidence for the viability of lightweight, specialized models in the large-model era and offers practical insights into data curation for OCR. The source code and models are publicly available at https://github.com/PaddlePaddle/PaddleOCR.", "link": "http://arxiv.org/abs/2603.24373v1", "date": "2026-03-25", "relevancy": 2.8496, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5866}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5866}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5365}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PP-OCRv5%3A%20A%20Specialized%205M-Parameter%20Model%20Rivaling%20Billion-Parameter%20Vision-Language%20Models%20on%20OCR%20Tasks&body=Title%3A%20PP-OCRv5%3A%20A%20Specialized%205M-Parameter%20Model%20Rivaling%20Billion-Parameter%20Vision-Language%20Models%20on%20OCR%20Tasks%0AAuthor%3A%20Cheng%20Cui%20and%20Yubo%20Zhang%20and%20Ting%20Sun%20and%20Xueqing%20Wang%20and%20Hongen%20Liu%20and%20Manhui%20Lin%20and%20Yue%20Zhang%20and%20Tingquan%20Gao%20and%20Changda%20Zhou%20and%20Jiaxuan%20Liu%20and%20Zelun%20Zhang%20and%20Jing%20Zhang%20and%20Jun%20Zhang%20and%20Yi%20Liu%0AAbstract%3A%20The%20advent%20of%20%22OCR%202.0%22%20and%20large-scale%20vision-language%20models%20%28VLMs%29%20has%20set%20new%20benchmarks%20in%20text%20recognition.%20However%2C%20these%20unified%20architectures%20often%20come%20with%20significant%20computational%20demands%2C%20challenges%20in%20precise%20text%20localization%20within%20complex%20layouts%2C%20and%20a%20propensity%20for%20textual%20hallucinations.%20Revisiting%20the%20prevailing%20notion%20that%20model%20scale%20is%20the%20sole%20path%20to%20high%20accuracy%2C%20this%20paper%20introduces%20PP-OCRv5%2C%20a%20meticulously%20optimized%2C%20lightweight%20OCR%20system%20with%20merely%205%20million%20parameters.%20We%20demonstrate%20that%20PP-OCRv5%20achieves%20performance%20competitive%20with%20many%20billion-parameter%20VLMs%20on%20standard%20OCR%20benchmarks%2C%20while%20offering%20superior%20localization%20precision%20and%20reduced%20hallucinations.%20The%20cornerstone%20of%20our%20success%20lies%20not%20in%20architectural%20expansion%20but%20in%20a%20data-centric%20investigation.%20We%20systematically%20dissect%20the%20role%20of%20training%20data%20by%20quantifying%20three%20critical%20dimensions%3A%20data%20difficulty%2C%20data%20accuracy%2C%20and%20data%20diversity.%20Our%20extensive%20experiments%20reveal%20that%20with%20a%20sufficient%20volume%20of%20high-quality%2C%20accurately%20labeled%2C%20and%20diverse%20data%2C%20the%20performance%20ceiling%20for%20traditional%2C%20efficient%20two-stage%20OCR%20pipelines%20is%20far%20higher%20than%20commonly%20assumed.%20This%20work%20provides%20compelling%20evidence%20for%20the%20viability%20of%20lightweight%2C%20specialized%20models%20in%20the%20large-model%20era%20and%20offers%20practical%20insights%20into%20data%20curation%20for%20OCR.%20The%20source%20code%20and%20models%20are%20publicly%20available%20at%20https%3A//github.com/PaddlePaddle/PaddleOCR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24373v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPP-OCRv5%253A%2520A%2520Specialized%25205M-Parameter%2520Model%2520Rivaling%2520Billion-Parameter%2520Vision-Language%2520Models%2520on%2520OCR%2520Tasks%26entry.906535625%3DCheng%2520Cui%2520and%2520Yubo%2520Zhang%2520and%2520Ting%2520Sun%2520and%2520Xueqing%2520Wang%2520and%2520Hongen%2520Liu%2520and%2520Manhui%2520Lin%2520and%2520Yue%2520Zhang%2520and%2520Tingquan%2520Gao%2520and%2520Changda%2520Zhou%2520and%2520Jiaxuan%2520Liu%2520and%2520Zelun%2520Zhang%2520and%2520Jing%2520Zhang%2520and%2520Jun%2520Zhang%2520and%2520Yi%2520Liu%26entry.1292438233%3DThe%2520advent%2520of%2520%2522OCR%25202.0%2522%2520and%2520large-scale%2520vision-language%2520models%2520%2528VLMs%2529%2520has%2520set%2520new%2520benchmarks%2520in%2520text%2520recognition.%2520However%252C%2520these%2520unified%2520architectures%2520often%2520come%2520with%2520significant%2520computation 26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24373v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PP-OCRv5%3A%20A%20Specialized%205M-Parameter%20Model%20Rivaling%20Billion-Parameter%20Vision-Language%20Models%20on%20OCR%20Tasks&entry.906535625=Cheng%20Cui%20and%20Yubo%20Zhang%20and%20Ting%20Sun%20and%20Xueqing%20Wang%20and%20Hongen%20Liu%20and%20Manhui%20Lin%20and%20Yue%20Zhang%20and%20Tingquan%20Gao%20and%20Changda%20Zhou%20and%20Jiaxuan%20Liu%20and%20Zelun%20Zhang%20and%20Jing%20Zhang%20and%20Jun%20Zhang%20and%20Yi%20Liu&entry.1292438233=The%20advent%20of%20%22OCR%202.0%22%20and%20large-scale%20vision-language%20models%20%28VLMs%29%20has%20set%20new%20benchmarks%20in%20text%20recognition.%20However%2C%20these%20unified%20architectures%20often%20come%20with%20significant%20computational%20demands%2C%20challenges%20in%20precise%20text%20localization%20within%20complex%20layouts%2C%20and%20a%20propensity%20for%20textual%20hallucinations.%20Revisiting%20the%20prevailing%20notion%20that%20model%20scale%20is%20the%20sole%20path%20to%20high%20accuracy%2C%20this%20paper%20introduces%20PP-OCRv5%2C%20a%20meticulously%20optimized%2C%20lightweight%20OCR%20system%20with%20merely%205%20million%20parameters.%20We%20demonstrate%20that%20PP-OCRv5%20achieves%20performance%20competitive%20with%20many%20billion-parameter%20VLMs%20on%20standard%20OCR%20benchmarks%2C%20while%20offering%20superior%20localization%20precision%20and%20reduced%20hallucinations.%20The%20cornerstone%20of%20our%20success%20lies%20not%20in%20architectural%20expansion%20but%20in%20a%20data-centric%20investigation.%20We%20systematically%20dissect%20the%20role%20of%20training%20data%20by%20quantifying%20three%20critical%20dimensions%3A%20data%20difficulty%2C%20data%20accuracy%2C%20and%20data%20diversity.%20Our%20extensive%20experiments%20reveal%20that%20with%20a%20sufficient%20volume%20of%20high-qualit {"title": "TopoMesh: High-Fidelity Mesh Autoencoding via Topological Unification", "author": "Guan Luo and Xiu Li and Rui Chen and Xuanyu Yi and Jing Lin and Chia-Hao Chen and Jiahang Liu and Song-Hai Zhang and Jianfeng Zhang", "abstract": "The dominant paradigm for high-fidelity 3D generation relies on a VAE-Diffusion pipeline, where the VAE's reconstruction capability sets a firm upper bound on generation quality. A fundamental challenge limiting existing VAEs is the representation mismatch between ground-truth meshes and network predictions: GT meshes have arbitrary, variable topology, while VAEs typically predict fixed-structure implicit fields (\\eg, SDF on regular grids). This inherent misalignment prevents establishing explicit mesh-level correspondences, forcing prior work to rely on indirect supervision signals such as SDF or rendering losses. Consequently, fine geometric details, particularly sharp features, are poorly preserved during reconstruction. To address this, we introduce TopoMesh, a sparse voxel-based VAE that unifies both GT and predicted meshes under a shared Dual Marching Cubes (DMC) topological framework. Specifically, we convert arbitrary input meshes into DMC-compliant representations via a remeshing algorithm that preserves sharp edges using an L$\\infty$ distance metric. Our decoder outputs meshes in the same DMC format, ensuring that both predicted and target meshes share identical topological structures. This establishes explicit correspondences at the vertex and face level, allowing us to derive explicit mesh-level supervision signals for topology, vertex positions, and face orientations with clear gradients. Our sparse VAE architecture employs this unified framework and is trained with Teacher Forcing and progressive resolution training for stable and efficient convergence. Extensive experiments demonstrate that TopoMesh significantly outperforms existing VAEs in reconstruction fidelity, achieving superior preservation of sharp features and geometric details.", "link": "http://arxiv.org/abs/2603.24278v1", "date": "2026-03-25", "relevancy": 2.8383, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.637}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5352}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5308}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TopoMesh%3A%20High-Fidelity%20Mesh%20Autoencoding%20via%20Topological%20Unification&body=Title%3A%20TopoMesh%3A%20High-Fidelity%20Mesh%20Autoencoding%20via%20Topological%20Unification%0AAuthor%3A%20Guan%20Luo%20and%20Xiu%20Li%20and%20Rui%20Chen%20and%20Xuanyu%20Yi%20and%20Jing%20Lin%20and%20Chia-Hao%20Chen%20and%20Jiahang%20Liu%20and%20Song-Hai%20Zhang%20and%20Jianfeng%20Zhang%0AAbstract%3A%20The%20dominant%20paradigm%20for%20high-fidelity%203D%20generation%20relies%20on%20a%20VAE-Diffusion%20pipeline%2C%20where%20the%20VAE%27s%20reconstruction%20capability%20sets%20a%20firm%20upper%20bound%20on%20generation%20quality.%20A%20fundamental%20challenge%20limiting%20existing%20VAEs%20is%20the%20representation%20mismatch%20between%20ground-truth%20meshes%20and%20network%20predictions%3A%20GT%20meshes%20have%20arbitrary%2C%20variable%20topology%2C%20while%20VAEs%20typically%20predict%20fixed-structure%20implicit%20fields%20%28%5Ceg%2C%20SDF%20on%20regular%20grids%29.%20This%20inherent%20misalignment%20prevents%20establishing%20explicit%20mesh-level%20correspondences%2C%20forcing%20prior%20work%20to%20rely%20on%20indirect%20supervision%20signals%20such%20as%20SDF%20or%20rendering%20losses.%20Consequently%2C%20fine%20geometric%20details%2C%20particularly%20sharp%20features%2C%20are%20poorly%20preserved%20during%20reconstruction.%20To%20address%20this%2C%20we%20introduce%20TopoMesh%2C%20a%20sparse%20voxel-based%20VAE%20that%20unifies%20both%20GT%20and%20predicted%20meshes%20under%20a%20shared%20Dual%20Marching%20Cubes%20%28DMC%29%20topological%20framework.%20Specifically%2C%20we%20convert%20arbitrary%20input%20meshes%20into%20DMC-compliant%20representations%20via%20a%20remeshing%20algorithm%20that%20preserves%20sharp%20edges%20using%20an%20L%24%5Cinfty%24%20distance%20metric.%20Our%20decoder%20outputs%20meshes%20in%20the%20same%20DMC%20format%2C%20ensuring%20that%20both%20predicted%20and%20target%20meshes%20share%20identical%20topological%20structures.%20This%20establishes%20explicit%20correspondences%20at%20the%20vertex%20and%20face%20level%2C%20allowing%20us%20to%20derive%20explicit%20mesh-level%20supervision%20signals%20for%20topology%2C%20vertex%20positions%2C%20and%20face%20orientations%20with%20clear%20gradients.%20Our%20sparse%20VAE%20architecture%20employs%20this%20unified%20framework%20and%20is%20trained%20with%20Teacher%20Forcing%20and%20progressive%20resolution%20training%20for%20stable%20and%20efficient%20convergence.%20Extensive%20experiments%20demonstrate%20that%20TopoMesh%20significantly%20outperforms%20existing%20VAEs%20in%20reconstruction%20fidelity%2C%20achieving%20superior%20preservation%20of%20sharp%20features%20and%20geometric%20details.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24278v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopoMesh%253A%2520High-Fidelity%2520Mesh%2520Autoencoding%2520via%2520Topological%2520Unification%26entry.906535625%3DGuan%2520Luo%2520and%2520Xiu%2520Li%2520and%2520Rui%2520Chen%2520and%2520Xuanyu%2520Yi%2520and%2520Jing%2520Lin%2520and%2520Chia-Hao%2520Chen%2520and%2520Jiahang%2520Liu%2520and%2520Song-Hai%2520Zhang%2520and%2520Jianfeng%2520Zhang%26entry.1292438233%3DThe%2520dominant%2520paradigm%2520for%2520high-fidelity%25203D%2520generation%2520relie {"title": "Thinking with Geometry: Active Geometry Integration for Spatial Reasoning", "author": "Haoyuan Li and Qihang Cao and Tao Tang and Kun Xiang and Zihan Guo and Jianhua Han and Hang Xu and Xiaodan Liang", "abstract": "Recent progress in spatial reasoning with Multimodal Large Language Models (MLLMs) increasingly leverages geometric priors from 3D encoders. However, most existing integration strategies remain passive: geometry is exposed as a global stream and fused in an indiscriminate manner, which often induces semantic-geometry misalignment and redundant signals. We propose GeoThinker, a framework that shifts the paradigm from passive fusion to active perception. Instead of feature mixing, GeoThinker enables the model to selectively retrieve geometric evidence conditioned on its internal reasoning demands. GeoThinker achieves this through Spatial-Grounded Fusion applied at carefully selected VLM layers, where semantic visual priors selectively query and integrate task-relevant geometry via frame-strict cross-attention, further calibrated by Importance Gating that biases per-frame attention toward task-relevant structures. Comprehensive evaluation results show that GeoThinker sets a new state-of-the-art in spatial intelligence, achieving a peak score of 72.6 on the VSI-Bench. Furthermore, GeoThinker demonstrates robust generalization and significantly improved spatial perception across complex downstream scenarios, including embodied referring and autonomous driving. Our results indicate that the ability to actively integrate spatial structures is essential for next-generation spatial intelligence. Code can be found at https://github.com/Li-Hao-yuan/GeoThinker.", "link": "http://arxiv.org/abs/2602.06037v3", "date": "2026-03-25", "relevancy": 2.8315, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5684}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5684}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.562}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Thinking%20with%20Geometry%3A%20Active%20Geometry%20Integration%20for%20Spatial%20Reasoning&body=Title%3A%20Thinking%20with%20Geometry%3A%20Active%20Geometry%20Integration%20for%20Spatial%20Reasoning%0AAuthor%3A%20Haoyuan%20Li%20and%20Qihang%20Cao%20and%20Tao%20Tang%20and%20Kun%20Xiang%20and%20Zihan%20Guo%20and%20Jianhua%20Han%20and%20Hang%20Xu%20and%20Xiaodan%20Liang%0AAbstract%3A%20Recent%20progress%20in%20spatial%20reasoning%20with%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20increasingly%20leverages%20geometric%20priors%20from%203D%20encoders.%20However%2C%20most%20existing%20integration%20strategies%20remain%20passive%3A%20geometry%20is%20exposed%20as%20a%20global%20stream%20and%20fused%20in%20an%20indiscriminate%20manner%2C%20which%20often%20induces%20semantic-geometry%20misalignment%20and%20redundant%20signals.%20We%20propose%20GeoThinker%2C%20a%20framework%20that%20shifts%20the%20paradigm%20from%20passive%20fusion%20to%20active%20perception.%20Instead%20of%20feature%20mixing%2C%20GeoThinker%20enables%20the%20model%20to%20selectively%20retrieve%20geometric%20evidence%20conditioned%20on%20its%20internal%20reasoning%20demands.%20GeoThinker%20achieves%20this%20through%20Spatial-Grounded%20Fusion%20applied%20at%20carefully%20selected%20VLM%20layers%2C%20where%20semantic%20visual%20priors%20selectively%20query%20and%20integrate%20task-relevant%20geometry%20via%20frame-strict%20cross-attention%2C%20further%20calibrated%20by%20Importance%20Gating%20that%20biases%20per-frame%20attention%20toward%20task-relevant%20structures.%20Comprehensive%20evaluation%20results%20show%20that%20GeoThinker%20sets%20a%20new%20state-of-the-art%20in%20spatial%20intelligence%2C%20achieving%20a%20peak%20score%20of%2072.6%20on%20the%20VSI-Bench.%20Furthermore%2C%20GeoThinker%20demonstrates%20robust%20generalization%20and%20significantly%20improved%20spatial%20perception%20across%20complex%20downstream%20scenarios%2C%20including%20embodied%20referring%20and%20autonomous%20driving.%20Our%20results%20indicate%20that%20the%20ability%20to%20actively%20integrate%20spatial%20structures%20is%20essential%20for%20next-generation%20spatial%20intelligence.%20Code%20can%20be%20found%20at%20https%3A//github.com/Li-Hao-yuan/GeoThinker.%0ALink%3A%20http%3A//arxiv.org/abs/2602.06037v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinking%2520with%2520Geometry%253A%2520Active%2520Geometry%2520Integration%2520for%2520Spatial%2520Reasoning%26entry.906535625%3DHaoyuan%2520Li%2520and%2520Qihang%2520Cao%2520and%2520Tao%2520Tang%2520and%2520Kun%2520Xiang%2520and%2520Zihan%2520Guo%2520and%2520Jianhua%2520Han%2520and%2520Hang%2520Xu%2520and%2520Xiaodan%2520Liang%26entry.1292438233%3DRecent%2520progress%2520in%2520spatial%2520reasoning%2520with%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520increasingly%2520leverages%2520geometric%2520priors%2520from%25203D%2520encoders.%2520However%252C%2520most%2520existing%2520integration%2520strategies%2520remain%2520passive%253A%2520geometry%2520is%2520exposed%2520as%2520a%2520global%2520stream%2520and%2520fused%2520in%2520an%2520indiscriminate%2520manner%252C%2520which%2520often%2520induces%2520semantic-geometry%2520misalignment%2520and%2520redundant%2520signals.%2520We%2520propose%2520GeoThinker%252C%2520a%2520framework%2520that%2520shifts%2520the%2520paradigm%2520from%2520passive%2520fusion%2520to%2520active%2520perception.%2520Instead%2520of%2520feature%2520mixing%252C%2520GeoThinker%2520enables%2520the%2520model%2520to%2520selectively%2520retrieve%2520geometric%2520evidence%2 {"title": "Scaling Test-Time Robustness of Vision-Language Models via Self-Critical Inference Framework", "author": "Kaihua Tang and Jiaxin Qi and Jinli Ou and Yuhua Zheng and Jianqiang Huang", "abstract": "The emergence of Large Language Models (LLMs) has driven rapid progress in multi-modal learning, particularly in the development of Large Vision-Language Models (LVLMs). However, existing LVLM training paradigms place excessive reliance on the LLM component, giving rise to two critical robustness challenges: language bias and language sensitivity. To address both issues simultaneously, we propose a novel Self-Critical Inference (SCI) framework that extends Visual Contrastive Decoding by conducting multi-round counterfactual reasoning through both textual and visual perturbations. This process further introduces a new strategy for improving robustness by scaling the number of counterfactual rounds. Moreover, we also observe that failure cases of LVLMs differ significantly across models, indicating that fixed robustness benchmarks may not be able to capture the true reliability of LVLMs. To this end, we propose the Dynamic Robustness Benchmark (DRBench), a model-specific evaluation framework targeting both language bias and sensitivity issues. Extensive experiments show that SCI consistently outperforms baseline methods on DRBench, and that increasing the number of inference rounds further boosts robustness beyond existing single-step counterfactual reasoning methods.", "link": "http://arxiv.org/abs/2603.07659v2", "date": "2026-03-25", "relevancy": 2.8243, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5898}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5898}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scaling%20Test-Time%20Robustness%20of%20Vision-Language%20Models%20via%20Self-Critical%20Inference%20Framework&body=Title%3A%20Scaling%20Test-Time%20Robustness%20of%20Vision-Language%20Models%20via%20Self-Critical%20Inference%20Framework%0AAuthor%3A%20Kaihua%20Tang%20and%20Jiaxin%20Qi%20and%20Jinli%20Ou%20and%20Yuhua%20Zheng%20and%20Jianqiang%20Huang%0AAbstract%3A%20The%20emergence%20of%20Large%20Language%20Models%20%28LLMs%29%20has%20driven%20rapid%20progress%20in%20multi-modal%20learning%2C%20particularly%20in%20the%20development%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29.%20However%2C%20existing%20LVLM%20training%20paradigms%20place%20excessive%20reliance%20on%20the%20LLM%20component%2C%20giving%20rise%20to%20two%20critical%20robustness%20challenges%3A%20language%20bias%20and%20language%20sensitivity.%20To%20address%20both%20issues%20simultaneously%2C%20we%20propose%20a%20novel%20Self-Critical%20Inference%20%28SCI%29%20framework%20that%20extends%20Visual%20Contrastive%20Decoding%20by%20conducting%20multi-round%20counterfactual%20reasoning%20through%20both%20textual%20and%20visual%20perturbations.%20This%20process%20further%20introduces%20a%20new%20strategy%20for%20improving%20robustness%20by%20scaling%20the%20number%20of%20counterfactual%20rounds.%20Moreover%2C%20we%20also%20observe%20that%20failure%20cases%20of%20LVLMs%20differ%20significantly%20across%20models%2C%20indicating%20that%20fixed%20robustness%20benchmarks%20may%20not%20be%20able%20to%20capture%20the%20true%20reliability%20of%20LVLMs.%20To%20this%20end%2C%20we%20propose%20the%20Dynamic%20Robustness%20Benchmark%20%28DRBench%29%2C%20a%20model-specific%20evaluation%20framework%20targeting%20both%20language%20bias%20and%20sensitivity%20issues.%20Extensive%20experiments%20show%20that%20SCI%20consistently%20outperforms%20baseline%20methods%20on%20DRBench%2C%20and%20that%20increasing%20the%20number%20of%20inference%20rounds%20further%20boosts%20robustness%20beyond%20existing%20single-step%20counterfactual%20reasoning%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.07659v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScaling%2520Test-Time%2520Robustness%2520of%2520Vision-Language%2520Models%2520via%2520Self-Critical%2520Inference%2520Framework%26entry.906535625%3DKaihua%2520Tang%2520and%2520Jiaxin%2520Qi%2520and%2520Jinli%2520Ou%2520and%2520Yuhua%2520Zheng%2520and%2520Jianqiang%2520Huang%26entry.1292438233%3DThe%2520emergence%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520has%2520driven%2520rapid%2520progress%2520in%2520multi-modal%2520learning%252C%2520particularly%2520in%2520the%2520development%2520of%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529.%2520However%252C%2520existing%2520LVLM%2520training%2520paradigms%2520place%2520excessive%2520reliance%2520on%2520the%2520LLM%2520component%252C%2520giving%2520rise%2520to%2520two%2520critical%2520robustness%2520challenges%253A%2520language%2520bias%2520and%2520language%2520sensitivity.%2520To%2520address%2520both%2520issues%2520simultaneously%252C%2520we%2520propose%2520a%2520novel%2520Self-Critical%2520Inference%2520%2528SCI%2529%2520framework%2520that%2520extends%2520Visual%2520Contrastive%2520Decoding%2520by%2520conducting%2520multi-round%2520counterfactual%2520reasoning%2520through%2520both%2520textual%2520and%2520visual%2520perturbations.%2520This%2520process%2520further%2520introduces%2520a%2520new%2520strategy%2520for%2520improving%2520robustness%2520by%2520scaling%2520the%2520number%2520of%2520counterfactual%2520rounds.%2520Moreover%252C%2520we%2520also%2520observe%2520that%2520failure%2520cases%2520of%2520LVLMs%2520differ%2520significantly%2520across%2520models%252C%2520indicating%2520that%2520fixed%2520robustness%2520benchmarks%2520may%2520not%2520be%2520able%2520to%2520capture%2520the%2520true%2520reliability%2520of%2520LVLMs.%2520To%2520this%2520end%252C%2520we%2520propose%2520the%2520Dynamic%2520Robustness%2520Benchmark%2520%2528DRBench%2529%252C%2520a%2520model-specific%2520evaluation%2520framework%2520targeting%2520both%2520language%2520bias%2520and%2520sensitivity%2520issues.%2520Extensive%2520experiments%2520show%2520that%2520SCI%2520consistently%2520outperforms%2520baseline%2520methods%2520on%2520DRBench%252C%2520and%2520that%2520increasing%2520the%2520number%2520of%2520inference%2520rounds%2520further%2520boosts%2520robustness%2520beyond%2520existing%2520single-step%2520counterfactual%2520reasoning%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.07659v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Scaling%20Test-Time%20Robustness%20of%20Vision-Language%20Models%20via%20Self-Critical%20Inference%20Framework&entry.906535625=Kaihua%20Tang%20and%20Jiaxin%20Qi%20and%20Jinli%20Ou%20and%20Yuhua%20Zheng%20and%20Jianqiang%20Huang&entry.1292438233=The%20emergence%20of%20Large%20Language%20Models%20%28LLMs%29%20has%20driven%20rapid%20progress%20in%20multi-modal%20learning%2C%20particularly%20in%20the%20development%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29.%20However%2C%20existing%20LVLM%20training%20paradigms%20place%20excessive%20reliance%20on%20the%20LLM%20component%2C%20giving%20rise%20to%20two%20critical%20robustness%20challenges%3A%20language%20bias%20and%20language%20sensitivity.%20To%20address%20both%20issues%20simultaneously%2C%20we%20propose%20a%20novel%20Self-Critical%20Inference%20%28SCI%29%20framework%20that%20extends%20Visual%20Contrastive%20Decoding%20by%20conducting%20multi-round%20counterfactual%20reasoning%20through%20both%20textual%20and%20visual%20perturbations.%20This%20process%20further%20introduces%20a%20new%20strategy%20for%20improving%20robustness%20by%20scaling%20the%20number%20of%20counterfactual%20rounds.%20Moreover%2C%20we%20also%20observe%20that%20failure%20cases%20of%20LVLMs%20differ%20significantly%20across%20models%2C%20indicating%20that%20fixed%20robustness%20benchmarks%20may%20not%20be%20able%20to%20capture%20the%20true%20reliability%20of%20LVLMs.%20To%20this%20end%2C%20we%20propose%20the%20Dynamic%20Robustness%20Benchmark%20%28DRBench%29%2C%20a%20model-specific%20evaluation%20framework%20targeting%20both%20language%20bias%20and%20sensitivity%20issues.%20Extensive%20experiments%20show%20that%20SCI%20consistently%20outperforms%20baseline%20methods%20on%20DRBench%2C%20and%20that%20increasing%20the%20number%20of%20inference%20rounds%20further%20boosts%20robustness%20beyond%20existing%20single-step%20counterfactual%20reasoning%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2603.07659v2&entry.124074799=Read"},
{"title": "Blink: Dynamic Visual Token Resolution for Enhanced Multimodal Understanding", "author": "Yuchen Feng and Zhenyu Zhang and Naibin Gu and Yilong Chen and Peng Fu and Zheng Lin and Shuohuan Wang and Yu Sun and Hua Wu and Weiping Wang and Haifeng Wang", "abstract": "Multimodal large language models (MLLMs) have achieved remarkable progress on various vision-language tasks, yet their visual perception remains limited. Humans, in comparison, perceive complex scenes efficiently by dynamically scanning and focusing on salient regions in a sequential \"blink-like\" process. Motivated by this strategy, we first investigate whether MLLMs exhibit similar behavior. Our pilot analysis reveals that MLLMs naturally attend to different visual regions across layers and that selectively allocating more computation to salient tokens can enhance visual perception. Building on this insight, we propose Blink, a dynamic visual token resolution framework that emulates the human-inspired process within a single forward pass. Specifically, Blink includes two modules: saliency-guided scanning and dynamic token resolution. It first estimates the saliency of visual tokens in each layer based on the attention map, and extends important tokens through a plug-and-play token super-resolution (TokenSR) module. In the next layer, it drops the extended tokens when they lose focus. This dynamic mechanism balances broad exploration and fine-grained focus, thereby enhancing visual perception adaptively and efficiently. Extensive experiments validate Blink, demonstrating its effectiveness in enhancing visual perception and multimodal understanding.", "link": "http://arxiv.org/abs/2512.10548v2", "date": "2026-03-25", "relevancy": 2.8148, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5651}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5651}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5587}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Blink%3A%20Dynamic%20Visual%20Token%20Resolution%20for%20Enhanced%20Multimodal%20Understanding&body=Title%3A%20Blink%3A%20Dynamic%20Visual%20Token%20Resolution%20for%20Enhanced%20Multimodal%20Understanding%0AAuthor%3A%20Yuchen%20Feng%20and%20Zhenyu%20Zhang%20and%20Naibin%20Gu%20and%20Yilong%20Chen%20and%20Peng%20Fu%20and%20Zheng%20Lin%20and%20Shuohuan%20Wang%20and%20Yu%20Sun%20and%20Hua%20Wu%20and%20Weiping%20Wang%20and%20Haifeng%20Wang%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20have%20achieved%20remarkable%20progress%20on%20various%20vision-language%20tasks%2C%20yet%20their%20visual%20perception%20remains%20limited.%20Humans%2C%20in%20comparison%2C%20perceive%20complex%20scenes%20efficiently%20by%20dynamically%20scanning%20and%20focusing%20on%20salient%20regions%20in%20a%20sequential%20%22blink-like%22%20process.%20Motivated%20by%20this%20strategy%2C%20we%20first%20investigate%20whether%20MLLMs%20exhibit%20similar%20behavior.%20Our%20pilot%20analysis%20reveals%20that%20MLLMs%20naturally%20attend%20to%20different%20visual%20regions%20across%20layers%20and%20that%20selectively%20allocating%20more%20computation%20to%20salient%20tokens%20can%20enhance%20visual%20perception.%20Building%20on%20this%20insight%2C%20we%20propose%20Blink%2C%20a%20dynamic%20visual%20token%20resolution%20framework%20that%20emulates%20the%20human-inspired%20process%20within%20a%20single%20forward%20pass.%20Specifically%2C%20Blink%20includes%20two%20modules%3A%20saliency-guided%20scanning%20and%20dynamic%20token%20resolution.%20It%20first%20estimates%20the%20saliency%20of%20visual%20tokens%20in%20each%20layer%20based%20on%20the%20attention%20map%2C%20and%20extends%20important%20tokens%20through%20a%20plug-and-play%20token%20super-resolution%20%28TokenSR%29%20module.%20In%20the%20next%20layer%2C%20it%20drops%20the%20extended%20tokens%20when%20they%20lose%20focus.%20This%20dynamic%20mechanism%20balances%20broad%20exploration%20and%20fine-grained%20focus%2C%20thereby%20enhancing%20visual%20perception%20adaptively%20and%20efficiently.%20Extensive%20experiments%20validate%20Blink%2C%20demonstrating%20its%20effectiveness%20in%20enhancing%20visual%20perception%20and%20multimodal%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2512.10548v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBlink%253A%2520Dynamic%2520Visual%2520Token%2520Resolution%2520for%2520Enhanced%2520Multimodal%2520Understanding%26entry.906535625%3DYuchen%2520Feng%2520and%2520Zhenyu%2520Zhang%2520and%2520Naibin%2520Gu%2520and%2520Yilong%2520Chen%2520and%2520Peng%2520Fu%2520and%2520Zheng%2520Lin%2520and%2520Shuohuan%2520Wang%2520and%2520Yu%2520Sun%2520and%2520Hua%2520Wu%2520and%2520Weiping%2520Wang%2520and%2520Haifeng%2520Wang%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520on%2520various%2520vision-language%2520tasks%252C%2520yet%2520their%2520visual%2520perception%2520remains%2520limited.%2520Humans%252C%2520in%2520comparison%252C%2520perceive%2520complex%2520scenes%2520efficiently%2520by%2520dynamically%2520scanning%2520and%2520focusing%2520on%2520salient%2520regions%2520in%2520a%2520sequential%2520%2522blink-like%2522%2520process.%2520Motivated%2520by%2520this%2520strategy%252C%2520we%2520first%2520investigate%2520whether%2520MLLMs%2520exhibit%2520similar%2520behavior.%2520Our%2520pilot%2520analysis%2520reveals%2520that%2520MLLMs%2520naturally%2520attend%2520to%2520different%2520visual%2520regions%2520across%2520layers%2520and%2520that%2520selectively%2520allocating%2520more%2520computatio age%20tasks%2C%20yet%20their%20visual%20perception%20remains%20limited.%20Humans%2C%20in%20comparison%2C%20perceive%20complex%20scenes%20efficiently%20by%20dynamically%20scanning%20and%20focusing%20on%20salient%20regions%20in%20a%20sequential%20%22blink-like%22%20process.%20Motivated%20by%20this%20strategy%2C%20we%20first%20investigate%20whether%20MLLMs%20exhibit%20similar%20behavior.%20Our%20pilot%20analysis%20reveals%20that%20MLLMs%20naturally%20attend%20to%20different%20visual%20regions%20across%20layers%20and%20that%20selectively%20allocating%20more%20computation%20to%20salient%20tokens%20can%20enhance%20visual%20perception.%20Building%20on%20this%20insight%2C%20we%20propose%20Blink%2C%20a%20dynamic%20visual%20token%20resolution%20framework%20that%20emulates%20the%20human-inspired%20process%20within%20a%20single%20forward%20pass.%20Specifically%2C%20Blink%20includes%20two%20modules%3A%20saliency-guided%20scanning%20and%20dynamic%20token%20resolution.%20It%20first%20estimates%20the%20saliency%20of%20visual%20tokens%20in%20each%20layer%20based%20on%20the%20attention%20map%2C%20and%20extends%20important%20tokens%20through%20a%20plug-and-play%20token%20super-resolution%20%28TokenSR%29%20module.%20In%20the%20next%20layer%2C%20it%20drops%20the%20extended%20tokens%20when%20they%20lose%20focus.%20This%20dynamic%20mechanism%20balances%20broad%20exploration%20and%20fine-grained%20focus%2C%20thereby%20enhancing%20visual%20perception%20adaptively%20and%20efficiently.%20Extensive%20experiments%20validate%20Blink%2C%20demonstrating%20its%20effectiveness%20in%20enhancing%20visual%20perception%20and%20multimodal%20understanding.&entry.1838667208=http%3A//arxiv.org/abs/2512.10548v2&entry.124074799=Read"},
{"title": "Unleashing Vision-Language Semantics for Deepfake Video Detection", "author": "Jiawen Zhu and Yunqi Miao and Xueyi Zhang and Jiankang Deng and Guansong Pang", "abstract": "Recent Deepfake Video Detection (DFD) studies have demonstrated that pre-trained Vision-Language Models (VLMs) such as CLIP exhibit strong generalization capabilities in detecting artifacts across different identities. However, existing approaches focus on leveraging visual features only, overlooking their most distinctive strength -- the rich vision-language semantics embedded in the latent space. We propose VLAForge, a novel DFD framework that unleashes the potential of such cross-modal semantics to enhance model's discriminability in deepfake detection. This work i) enhances the visual perception of VLM through a ForgePerceiver, which acts as an independent learner to capture diverse, subtle forgery cues both granularly and holistically, while preserving the pretrained Vision-Language Alignment (VLA) knowledge, and ii) provides a complementary discriminative cue -- Identity-Aware VLA score, derived by coupling cross-modal semantics with the forgery cues learned by ForgePerceiver. Notably, the VLA score is augmented by an identity prior-informed text prompting to capture authenticity cues tailored to each identity, thereby enabling more discriminative cross-modal semantics. Comprehensive experiments on video DFD benchmarks, including classical face-swapping forgeries and recent full-face generation forgeries, demonstrate that our VLAForge substantially outperforms state-of-the-art methods at both frame and video levels. Code is available at https://github.com/mala-lab/VLAForge.", "link": "http://arxiv.org/abs/2603.24454v1", "date": "2026-03-25", "relevancy": 2.7831, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5876}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n

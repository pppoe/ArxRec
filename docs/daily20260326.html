{"title": "Understanding Pure Textual Reasoning for Blind Image Quality Assessment", "author": "Yuan Li and Shin'ya Nishida", "abstract": "Textual reasoning has recently been widely adopted in Blind Image Quality Assessment (BIQA). However, it remains unclear how textual information contributes to quality prediction and to what extent text can represent the score-related image contents. This work addresses these questions from an information-flow perspective by comparing existing BIQA models with three paradigms designed to learn the image-text-score relationship: Chain-of-Thought, Self-Consistency, and Autoencoder. Our experiments show that the score prediction performance of the existing model significantly drops when only textual information is used for prediction. Whereas the Chain-of-Thought paradigm introduces little improvement in BIQA performance, the Self-Consistency paradigm significantly reduces the gap between image- and text-conditioned predictions, narrowing the PLCC/SRCC difference to 0.02/0.03. The Autoencoder-like paradigm is less effective in closing the image-text gap, yet it reveals a direction for further optimization. These findings provide insights into how to improve the textual reasoning for BIQA and high-level vision tasks.", "link": "http://arxiv.org/abs/2601.02441v2", "date": "2026-03-25", "relevancy": 2.2764, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5783}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5783}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5233}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20Pure%20Textual%20Reasoning%20for%20Blind%20Image%20Quality%20Assess {"title": "A visual observation on the geometry of UMAP projections of the difference vectors of antonym and synonym word pair embeddings", "author": "Rami Luisto", "abstract": "Antonyms, or opposites, are sometimes defined as \\emph{word pairs that have all of the same contextually relevant properties but one}. Seeing how transformer models seem to encode concepts as directions, this begs the question if one can detect ``antonymity'' in the geometry of the embedding vectors of word pairs, especially based on their difference vectors. Such geometrical studies are then naturally contrasted by comparing antonymic pairs to their opposites; synonyms.\n  This paper started as an exploratory project on the complexity of the systems needed to detect the geometry of the embedding vectors of antonymic word pairs. What we now report is a curious ``swirl'' that appears across embedding models in a somewhat specific projection configuration.", "link": "http://arxiv.org/abs/2603.24150v1", "date": "2026-03-25", "relevancy": 2.2749, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4568}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4568}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20visual%20observation%20on%20the%20geometry%20of%20UMAP%20projections%20of%20the%20difference%20vectors%20of%20antonym%20and%20synonym%20word%20pair%20embeddings&body=Title%3A%20A%20visual%20observation%20on%20the%20geometry%20of%20UMAP%20projections%20of%20the%20difference%20vectors%20of%20antonym%20and%20synonym%20word%20pair%20embeddings%0AAuthor%3A%20Rami%20Luisto%0AAbstract%3A%20Antonyms%2C%20or%20opposites%2C%20are%20sometimes%20defined%20as%20%5Cemph%7Bword%20pairs%20that%20have%20all%20of%20the%20same%20contextually%20relevant%20properties%20but%20one%7D.%20Seeing%20how%20transformer%20models%20seem%20to%20encode%20concepts%20as%20directions%2C%20this%20begs%20the%20question%20if%20one%20can%20detect%20%60%60antonymity%27%27%20in%20the%20geometry%20of%20the%20embedding%20vectors%20of%20word%20pairs%2C%20especially%20based%20on%20their%20difference%20vectors.%20Such%20geometrical%20studies%20are%20then%20naturally%20contrasted%20by%20comparing%20antonymic%20pairs%20to%20their%20opposites%3B%20synonyms.%0A%20%20This%20paper%20started%20as%20an%20exploratory%20project%20on%20the%20complexity%20of%20the%20systems%20needed%20to%20detect%20the%20geometry%20of%20the%20embedding%20vectors%20of%20antonymic%20word%20pairs.%20What%20we%20now%20report%20is%20a%20curious%20%60%60swirl%27%27%20that%20appears%20across%20embedding%20models%20in%20a%20somewhat%20specific%20projection%20configuration.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24150v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520visual%2520observation%2520on%2520the%2520geometry%2520of%2520UMAP%2520projections%2520of%2520the%2520difference%2520vectors%2520of%2520antonym%2520and%2520synonym%2520word%2520pair%2520embeddings%26entry.906535625%3DRami%2520Luisto%26entry.1292438233%3DAntonyms%252C%2520or%2520opposites%252C%2520are%2520sometimes%2520defined%2520as%2520%255Cemph%257Bword%2520pairs%2520that%2520have%2520all%2520of%2520the%2520same%2520contextually%2520relevant%2520properties%2520but%2520one%257D.%2520Seeing%2520how%2520transformer%2520models%2520seem%2520to%2520encode%2520concepts%2520as%2520directions%252C%2520this%2520begs%2520the%2520question%2520if%2520one%2520can%2520detect%2520%2560%2560antonymity%2527%2527%2520in%2520the%2520geometry%2520of%2520the%2520embedding%2520vectors%2520of%2520word%2520pairs%252C%252 {"title": "VERIA: Verification-Centric Multimodal Instance Augmentation for Long-Tailed 3D Object Detection", "author": "Jumin Lee and Siyeong Lee and Namil Kim and Sung-Eui Yoon", "abstract": "Long-tail distributions in driving datasets pose a fundamental challenge for 3D perception, as rare classes exhibit substantial intra-class diversity yet available samples cover this variation space only sparsely. Existing instance augmentation methods based on copy-paste or asset libraries improve rare-class exposure but are often limited in fine-grained diversity and scene-context placement. We propose VERIA, an image-first multimodal augmentation framework that synthesizes synchronized RGB--LiDAR instances using off-the-shelf foundation models and curates them with sequential semantic and geometric verification. This verification-centric design tends to select instances that better match real LiDAR statistics while spanning a wider range of intra-class variation. Stage-wise yield decomposition provides a log-based diagnostic of pipeline reliability. On nuScenes and Lyft, VERIA improves rare-class 3D object detection in both LiDAR-only and multimodal settings. Our code is available at https://sgvr.kaist.ac.kr/VERIA/.", "link": "http://arxiv.org/abs/2603.24294v1", "date": "2026-03-25", "relevancy": 2.2637, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5686}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5654}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VERIA%3A%20Verification-Centric%20Multimodal%20Instance%20Augmentation%20for%20Long-Tailed%203D%20Object%20De ntry.1292438233=Long-tail%20distributions%20in%20driving%20datasets%20pose%20a%20fundamental%20challenge%20for%203D%20perception%2C%20as%20rare%20classes%20exhibit%20substantial%20intra-class%20diversity%20yet%20available%20samples%20cover%20this%20variation%20space%20only%20sparsely.%20Existing%20instance%20augmentation%20methods%20based%20on%20copy-paste%20or%20asset%20libraries%20improve%20rare-class%20exposure%20but%20are%20often%20limited%20in%20fine-grained%20diversity%20and%20scene-context%20placement.%20We%20propose%20VERIA%2C%20an%20image-first%20multimodal%20augmentation%20framework%20that%20synthesizes%20synchronized%20RGB--LiDAR%20instances%20using%20off-the-shelf%20foundation%20models%20and%20curates%20them%20with%20sequential%20semantic%20and%20geometric%20verification.%20This%20verification-centric%20design%20tends%20to%20select%20instances%20that%20better%20match%20real%20LiDAR%20statistics%20while%20spanning%20a%20wider%20range%20of%20intra-class%20variation.%20Stage-wise%20yield%20decomposition%20provides%20a%20log-based%20diagnostic%20of%20pipeline%20reliability.%20On%20nuScenes%20and%20Lyft%2C%20VERIA%20improves%20rare-class%203D%20object%20detection%20in%20both%20LiDAR-only%20and%20multimodal%20settings.%20Our%20code%20is%20available%20at%20https%3A//sgvr.kaist.ac.kr/VERIA/.&entry.1838667208=http%3A//arxiv.org/abs/2603.24294v1&entry.124074799=Read"},
{"title": "From Prompts to Packets: A View from the Network on ChatGPT, Copilot, and Gemini", "author": "Antonio Montieri and Alfredo Nascita and Antonio Pescap\u00e8", "abstract": "GenAI chatbots are now pervasive in digital ecosystems, fundamentally reshaping user interactions over the Internet. Their reliance on an always-online, cloud-centric operating model introduces novel traffic dynamics that challenge practical network management. Despite the critical need to anticipate these changes in network demand, the traffic characterization of these chatbots remains largely underexplored. To fill this gap, this study presents an in-depth traffic analysis of ChatGPT, Copilot, and Gemini used via Android mobile apps. Using a dedicated capture architecture, we collect two complementary datasets, combining unconstrained user interactions with a controlled workload of selected prompts for both text and image generation. This dual design allows us to address practical research questions on the distinctiveness of chatbot traffic, its divergence from that of conventional messaging apps, and its novel implications for network usage. To this end, we provide a multi-granular traffic characterization and model packet-sequence dynamics to uncover the underlying transmission mechanisms. Our analysis reveals app-/content-specific traffic patterns and distinctive protocol footprints. We highlight the predominance of TLS, with Gemini extensively leveraging QUIC, ChatGPT exclusively using TLS 1.3, and characteristic Server Name Indication (SNI) values. Through occlusion analysis, we quantify the reliance on SNI for traffic visibility, demonstrating that masking this field reduces classification performance by up to 20 percentage points. Finally, the comparison with conventional messaging apps confirms that GenAI workloads introduce novel stress factors, such as sustained upstream activity and high-rate bursts, with direct implications for capacity planning and network management. We publicly release the datasets to support reproducibility and foster extensions to other use cases.", "link": "http://arxiv.org/abs/2510.11269v2", "date": "2026-03-25", "relevancy": 2.257, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4716}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4436}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4391}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Prompts%20to%20Packets%3A%20A%20View%20from%20the%20Network%20on%20ChatGPT%2C%20Copilot%2C%20and%20Gemini&body=Title%3A%20From%20Prompts%20to%20Packets%3A%20A%20View%20from%20the%20Network%20on%20ChatGPT%2C%20Copilot%2C%20and%20Gemini%0AAuthor%3A%20Antonio%20Montieri%20and%20Alfredo%20Nascita%20and%20Antonio%20Pescap%C3%A8%0AAbstract%3A%20GenAI%20chatbots%20are%20now%20pervasive%20in%20digital%20ecosystems%2C%20fundamentally%20reshaping%20user%20interactions%20over%20the%20Internet.%20Their%20reliance%20on%20an%20always-online%2C%20cloud-centric%20operating%20model%20introduces%20novel%20traffic%20dynamics%20that%20challenge%20practical%20network%20management.%20Despite%20the%20critical%20need%20to%20anticipate%20these%20changes%20in%20network%20demand%2C%20the%20traffic%20characterization%20of%20these%20chatbots%20remains%20largely%20underexplored.%20To%20fill%20this%20gap%2C%20this%20study%20presents%20an%20in-depth%20traffic%20analysis%20of%20ChatGPT%2C%20Copilot%2C%20and%20Gemini%20used%20via%20Android%20mobile%20apps.%20Using%20a%20dedicated%20capture%20architecture%2C%20we%20collect%20two%20complementary%20datasets%2C%20combining%20unconstrained%20user%20interactions%20with%20a%20controlled%20workload%20of%20selected%20prompts%20for%20both%20text%20and%20image%20generation.%20This%20dual%20design%20allows%20us%20to%20address%20practical%20research%20questions%20on%20the%20distinctiveness%20of%20chatbot%20traffic%2C%20its%20divergence%20from%20that%20of%20conventional%20messaging%20apps%2C%20and%20its%20novel%20implications%20for%20network%20usage.%20To%20this%20end%2C%20we%20provide%20a%20multi-granular%20traffic%20characterization%20and%20model%20packet-sequence%20dynamics%20to%20uncover%20the%20underlying%20transmission%20mechanisms.%20Our%20analysis%20reveals%20app-/content-specific%20traffic%20patterns%20and%20distinctive%20protocol%20footprints.%20We%20highlight%20the%20predominance%20of%20TLS%2C%20with%20Gemini%20extensively%20leveraging%20QUIC%2C%20ChatGPT%20exclusively%20using%20TLS%201.3%2C%20and%20characteristic%20Server%20Name%20Indication%20%28SNI%29%20values.%20Through%20occlusion%20analysis%2C%20we%20quantify%20the%20reliance%20on%20SNI%20for%20traffic%20visibility%2C%20demonstrating%20that%20masking%20this%20field%20reduces%20classification%20performance%20by%20up%20to%2020%20percentage%20points.%20Finally%2C%20the%20comparison%20with%20conventional%20messaging%20apps%20confirms%20that%20GenAI%20workloads%20introduce%20novel%20stress%20factors%2C%20such%20as%20sustained%20upstream%20activity%20and%20high-rate%20bursts%2C%20with%20direct%20implications%20for%20capacity%20planning%20and%20network%20management.%20We%20publicly%20release%20the%20datasets%20to%20support%20reproducibility%20and%20foster%20extensions%20to%20other%20use%20cases.%0ALink%3A%20http%3A//arxiv.org/abs/2510.11269v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Prompts%2520to%2520Packets%253A%2520A%2520View%2520from%2520the%2520Network%2520on%2520ChatGPT%252C%2520Copilot%252C%2520and%2520Gemini%26entry.906535625%3DAntonio%2520Montieri%2520and%2520Alfredo%2520Nascita%2520and%2520Antonio%2520Pescap%25C3%25A8%26entry.1292438233%3DGenAI%25 {"title": "SPARE: Self-distillation for PARameter-Efficient Removal", "author": "Natnael Mola and Leonardo S. B. Pereira and Carolina R. Kelsch and Luis H. Arribas and Juan C. S. M. Avedillo", "abstract": "Machine Unlearning aims to remove the influence of specific data or concepts from trained models while preserving overall performance, a capability increasingly required by data protection regulations and responsible AI practices. Despite recent progress, unlearning in text-to-image diffusion models remains challenging due to high computational costs and the difficulty of balancing effective forgetting with retention of unrelated concepts. We introduce Self-distillation for PARameter Efficient Removal (SPARE), a two-stage unlearning method for image generation that combines parameter localization with self-distillation. SPARE first identifies parameters most responsible for generation of the unwanted concepts using gradient-based saliency and constrains updates through sparse low rank adapters, ensuring lightweight, localized modifications. In a second stage, SPARE applies a self-distillation objective that overwrites the unwanted concept with a user-defined surrogate while preserving behavior for other concepts. In addition we proposed a timestep sampling scheme for diffusion models to target only the crucial timesteps for a given concept leading to efficient unlearning. SPARE surpasses the current state-of-the-art on the UnlearnCanvas benchmark, and ablation studies on several datasets indicate fine-grained control over the forgetting-retention trade-off. Our results demonstrate that SPARE achieves strong concept erasure and high retainability across various domains, making it a suitable solution for selective unlearning in diffusion-based image generation models.", "link": "http://arxiv.org/abs/2602.07058v2", "date": "2026-03-25", "relevancy": 2.2512, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5771}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5658}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPARE%3A%20Self-distillation%20for%20PARameter-Efficient%20Removal&body=Title%3A%20SPARE%3A%20Self-distillation%20for%20PARameter-Efficient%20Removal%0AAuthor%3A%20Natnael%20Mola%20and%20Leonardo%20S.%20B.%20Pereira%20and%20Carolina%20R.%20Kelsch%20and%20Luis%20H.%20Arribas%20and%20Juan%20C.%20S.%20M.%20Avedillo%0AAbstract%3A%20Machine%20Unlearning%20aims%20to%20remove%20the%20influence%20of%20specific%20data%20or%20concepts%20from%20trained%20models%20while%20preserving%20overall%20performance%2C%20a%20capability%20increasingly%20required%20by%20data%20protection%20regulations%20and%20responsible%20AI%20practices.%20Despite%20recent%20progress%2C%20unlearning%20in%20text-to-image%20diffusion%20models%20remains%20challenging%20due%20to%20high%20computational%20costs%20and%20the%20difficulty%20of%20balancing%20effective%20forgetting%20with%20retention%20of%20unrelated%20concepts.%20We%20introduce%20Self-distillation%20for%20PARameter%20Efficient%20Removal%20%28SPARE%29%2C%20a%20two-stage%20unlearning%20method%20for%20image%20generation%20that%20combines%20parameter%20localization%20with%20self-distillation.%20SPARE%20first%20identifies%20parameters%20most%20responsible%20for%20generation%20of%20the%20unwanted%20concepts%20using%20gradient-based%20saliency%20and%20constrains%20updates%20through%20sparse%20low%20rank%20adapters%2C%20ensuring%20lightweight%2C%20localized%20modifications.%20In%20a%20second%20stage%2C%20SPARE%20applies%20a%20self-distillation%20objective%20that%20overwrites%20the%20unwanted%20concept%20with%20a%20user-defined%20surrogate%20while%20preserving%20behavior%20for%20other%20concepts.%20In%20addition%20we%20proposed%20a%20timestep%20sampling%20scheme%20for%20diffusion%20models%20to%20target%20only%20the%20crucial%20timesteps%20for%20a%20given%20concept%20leading%20to%20efficient%20unlearning.%20SPARE%20surpasses%20the%20current%20state-of-the-art%20on%20the%20UnlearnCanvas%20benchmark%2C%20and%20ablation%20studies%20on%20several%20datasets%20indicate%20fine-grained%20control%20over%20the%20forgetting-retention%20trade-off.%20Our%20results%20demonstrate%20that%20SPARE%20achieves%20strong%20concept%20erasure%20and%20high%20retainability%20across%20various%20domains%2C%20making%20it%20a%20suitable%20solution%20for%20selective%20unlearning%20in%20diffusion-based%20image%20generation%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07058v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPARE%253A%2520Self-distillation%2520for%2520PARameter-Efficient%2520Removal%26entry.906535625%3DNatnael%2520Mola%2520and%2520Leonardo%2520S.%2520B.%2520Pereira%2520and%2520Carolina%2520R.%2520Kelsch%2520and%2520Luis%2520H.%2520Arribas%2520and%2520Juan%2520C.%2520S.%2520M.%2520Avedillo%26entry.1292438233%3DMachine%2520Unlearning%2520aims%2520to%2520remove%2520the%2520influence%2520of%2520specific%2520data%2520or%2520concepts%2520from%2520trained%2520models%2520while%2520preserving%2520overall%2520performance%252C%2520a%2520capability%2520increasingly%2520required%2520by%2520data%2520protection%2520regulations%2520and%2520responsible%2520AI%2520practices.%2520Despite%2520recent%2520progress%252C%2520unlearning%2520in%2520text-to-image%2520diffusion%2520models%2520remains%2520challenging%2520due%2520to%2520high%2520computational%2520costs%2520and%2520the%2520difficulty%2520of%2520balancing%2520effective%2520forgetting%2520with%2520retention%2520of%2520unrelated%2520concepts.%2520We%2520introduce%2520Self-distillation%2520for%2 {"title": "RVLM: Recursive Vision-Language Models with Adaptive Depth", "author": "Nicanor Mayumu and Zeenath Khan and Melodena Stephens and Patrick Mukala and Farhad Oroumchian", "abstract": "Medical AI systems face two fundamental limitations. First, conventional vision-language models (VLMs) perform single-pass inference, yielding black-box predictions that cannot be audited or explained in clinical terms. Second, iterative reasoning systems that expose intermediate steps rely on fixed iteration budgets wasting compute on simple cases while providing insufficient depth for complex ones. We address both limitations with a unified framework. RVLM replaces single-pass inference with an iterative generate-execute loop: at each step, the model writes Python code, invokes vision sub-agents, manipulates images, and accumulates evidence. Every diagnostic claim is grounded in executable code, satisfying auditability requirements of clinical AI governance frameworks. RRouter makes iteration depth adaptive: a lightweight controller predicts the optimal budget from task-complexity features, then monitors progress and terminates early when reasoning stalls. We evaluate on BraTS 2023 Meningioma (brain MRI) and MIMIC-CXR (chest X-ray) using Gemini 2.5 Flash without fine-tuning. Across repeated runs, RVLM shows high consistency on salient findings (e.g., mass presence and enhancement) and can detect cross-modal discrepancies between Fluid-Attenuated Inversion Recovery (FLAIR) signal characteristics and segmentation boundaries. On MIMIC-CXR, it generates structured reports and correctly recognises view-specific artefacts. Code: https://github.com/nican2018/rvlm.", "link": "http://arxiv.org/abs/2603.24224v1", "date": "2026-03-25", "relevancy": 2.2465, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5641}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5641}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RVLM%3A%20Recursive%20Vision-Language%20Models%20with%20Adaptive%20Depth&body=Title%3A%20RVLM%3A%20Recursive%20Vision-Language%20Models%20with%20Adaptive%20Depth%0AAuthor%3A%20Nicanor%20Mayumu%20and%20Zeenath%20Khan%20and%20Melodena%20Stephens%20and%20Patrick%20Mukala%20and%20Farhad%20Oroumchian%0AAbstract%3A%20Medical%20AI%20systems%20face%20two%20fundamental%20limitations.%20First%2C%20conventional%20vision-language%20models%20%28VLMs%29%20perform%20single-pass%20inference%2C%20yielding%20black-box%20predictions%20that%20cannot%20be%20audited%20or%20explained%20in%20clinical%20terms.%20Second%2C%20iterative%20reasoning%20systems%20that%20expose%20intermediate%20steps%20rely%20on%20fixed%20iteration%20budgets%20wasting%20compute%20on%20simple%20cases%20while%20providing%20insufficient%20depth%20for%20complex%20ones.%20We%20address%20both%20limitations%20with%20a%20unified%20framework.%20RVLM%20replaces%20single-pass%20inference%20with%20an%20iterative%20generate-execute%20loop%3A%20at%20each%20step%2C%20the%20model%20writes%20Python%20code%2C%20invokes%20vision%20sub-agents%2C%20manipulates%20images%2C%20and%20accumulates%20evidence.%20Every%20diagnostic%20claim%20is%20grounded%20in%20executable%20code%2C%20satisfying%20auditability%20requirements%20of%20clinical%20AI%20governance%20frameworks.%20RRouter%20makes%20iteration%20depth%20adaptive%3A%20a%20lightweight%20controller%20predicts%20the%20optimal%20budget%20from%20task-complexity%20features%2C%20then%20monitors%20progress%20and%20terminates%20early%20when%20reasoning%20stalls.%20We%20evaluate%20on%20BraTS%202023%20Meningioma%20%28brain%20MRI%29%20and%20MIMIC-CXR%20%28chest%20X-ray%29%20using%20Gemini%202.5%20Flash%20without%20fine-tuning.%20Across%20repeated%20runs%2C%20RVLM%20shows%20high%20consistency%20on%20salient%20findings%20%28e.g.%2C%20mass%20presence%20and%20enhancement%29%20and%20can%20detect%20cross-modal%20discrepancies%20between%20Fluid-Attenuated%20Inversion%20Recovery%20%28FLAIR%29%20signal%20characteristics%20and%20segmentation%20boundaries.%20On%20MIMIC-CXR%2C%20it%20generates%20structured%20reports%20and%20correctly%20recognises%20view-specific%20artefacts.%20Code%3A%20https%3A//github.com/nican2018/rvlm.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24224v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRVLM%253A%2520Recursive%2520Vision-Language%2520Models%2520with%2520Adaptive%2520Depth%26entry.906535625%3DNicanor%2520Mayumu%2520and%2520Zeenath%2520Khan%2520and%2520Melodena%2520Stephens%2520and%2520Patrick%2520Mukala%2520and%2520Farhad%2520Oroumchian%26entry.1292438233%3DMedical%2520AI%2520systems%2520face%2520two%2520fundamental%2520limitations.%2520First%252C%2520conventional%2520vision-language%2520models%2520%2528VLMs%2529%2520perform%2520single-pass%2520inference%252C%2520yielding%2520black-box%2520predictions%2520that%2520cannot%2520be%2520audited%2520or%2520explained%2520in%2520clinical%2520terms.%2520Second%252C%2520iterative%2520reasoning%2520systems%2520that%2520expose%2520intermediate%2520steps%2520rely%2520on%2520fixed%2520iteration%2520budgets%2520wasting%2520compute%2520on%2520simple%2520cases%2520while%2520providing%2520insufficient%2520depth%2520for%2520complex%2520ones.%2520We%2520address%2520both%2520limitations%2520with%2520a%2520unified%2520framework.%2520RVLM%2520replaces%2520single-pass%2520inference%2520with%2520an%2520iterative%2520generate-execute%2520loop%253A%2520at%2520each%2520step%252C%2520the%2520model%2520writes%2520Python%2520code%252C%2520invokes%2520vision%2520sub-agents%252C%2520m {"title": "Heuristic Self-Paced Learning for Domain Adaptive Semantic Segmentation under Adverse Conditions", "author": "Shiqin Wang and Haoyang Chen and Huaizhou Huang and Yinkan He and Dongfang Sun and Xiaoqing Chen and Xingyu Liu and Zheng Wang and Kaiyan Zhao", "abstract": "The learning order of semantic classes significantly impacts unsupervised domain adaptation for semantic segmentation, especially under adverse weather conditions. Most existing curricula rely on handcrafted heuristics (e.g., fixed uncertainty metrics) and follow a static schedule, which fails to adapt to a model's evolving, high-dimensional training dynamics, leading to category bias. Inspired by Reinforcement Learning, we cast curriculum learning as a sequential decision problem and propose an autonomous class scheduler. This scheduler consists of two components: (i) a high-dimensional state encoder that maps the model's training status into a latent space and distills key features indicative of progress, and (ii) a category-fair policy-gradient objective that ensures balanced improvement across classes. Coupled with mixed source-target supervision, the learned class rankings direct the network's focus to the most informative classes at each stage, enabling more adaptive and dynamic learning. It is worth noting that our method achieves state-of-the-art performance on three widely used benchmarks (e.g., ACDC, Dark Zurich, and Nighttime Driving) and shows generalization ability in synthetic-to-real semantic segmentation.", "link": "http://arxiv.org/abs/2603.24322v1", "date": "2026-03-25", "relevancy": 2.2452, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5942}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5596}, {"title": "Breadcrumbs: Adversarial class-bal ning%2C%20we%20cast%20curriculum%20learning%20as%20a%20sequential%20decision%20problem%20and%20propose%20an%20autonomous%20class%20scheduler.%20This%20scheduler%20consists%20of%20two%20components%3A%20%28i%29%20a%20high-dimensional%20state%20encoder%20that%20maps%20the%20model%27s%20training%20status%20into%20a%20latent%20space%20and%20distills%20key%20features%20indicative%20of%20progress%2C%20and%20%28ii%29%20a%20category-fair%20policy-gradient%20objective%20that%20ensures%20balanced%20improvement%20across%20classes.%20Coupled%20with%20mixed%20source-target%20supervision%2C%20the%20learned%20class%20rankings%20direct%20the%20network%27s%20focus%20to%20the%20most%20informative%20classes%20at%20each%20stage%2C%20enabling%20more%20adaptive%20and%20dynamic%20learning.%20It%20is%20worth%20noting%20that%20our%20method%20achieves%20state-of-the-art%20performance%20on%20three%20widely%20used%20benchmarks%20%28e.g.%2C%20ACDC%2C%20Dark%20Zurich%2C%20and%20Nighttime%20Driving%29%20and%20shows%20generalization%20ability%20in%20synthetic-to-real%20semantic%20segmentation.&entry.1838667208=http%3A//arxiv.org/abs/2603.24322v1&entry.124074799=Read"},
{"title": "HiSync: Spatio-Temporally Aligning Hand Motion from Wearable IMU and On-Robot Camera for Command Source Identification in Long-Range HRI", "author": "Chengwen Zhang and Chun Yu and Borong Zhuang and Haopeng Jin and Qingyang Wan and Zhuojun Li and Zhe He and Zhoutong Ye and Yu Mei and Chang Liu and Weinan Shi and Yuanchun Shi", "abstract": "Long-range Human-Robot Interaction (HRI) remains underexplored. Within it, Command Source Identification (CSI) - determining who issued a command - is especially challenging due to multi-user and distance-induced sensor ambiguity. We introduce HiSync, an optical-inertial fusion framework that treats hand motion as binding cues by aligning robot-mounted camera optical flow with hand-worn IMU signals. We first elicit a user-defined (N=12) gesture set and collect a multimodal command gesture dataset (N=38) in long-range multi-user HRI scenarios. Next, HiSync extracts frequency-domain hand motion features from both camera and IMU data, and a learned CSINet denoises IMU readings, temporally aligns modalities, and performs distance-aware multi-window fusion to compute cross-modal similarity of subtle, natural gestures, enabling robust CSI. In three-person scenes up to 34m, HiSync achieves 92.32% CSI accuracy, outperforming the prior SOTA by 48.44%. HiSync is also validated on real-robot deployment. By making CSI reliable and natural, HiSync provides a practical primitive and design guidance for public-space HRI. https://github.com/OctopusWen/HiSync", "link": "http://arxiv.org/abs/2603.11809v2", "date": "2026-03-25", "relevancy": 2.2351, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.574}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.563}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n {"title": "Decentralized End-to-End Multi-AAV Pursuit Using Predictive Spatio-Temporal Observation via Deep Reinforcement Learning", "author": "Yude Li and Zhexuan Zhou and Huizhe Li and Yanke Sun and Yenan Wu and Yichen Lai and Yiming Wang and Youmin Gong and Jie Mei", "abstract": "Decentralized cooperative pursuit in cluttered environments is challenging for autonomous aerial swarms, especially under partial and noisy perception. Existing methods often rely on abstracted geometric features or privileged ground-truth states, and therefore sidestep perceptual uncertainty in real-world settings. We propose a decentralized end-to-end multi-agent reinforcement learning (MARL) framework that maps raw LiDAR observations directly to continuous control commands. Central to the framework is the Predictive Spatio-Temporal Observation (PSTO), an egocentric grid representation that aligns obstacle geometry with predictive adversarial intent and teammate motion in a unified, fixed-resolution projection. Built on PSTO, a single decentralized policy enables agents to navigate static obstacles, intercept dynamic targets, and maintain cooperative encirclement. Simulations demonstrate that the proposed method achieves superior capture efficiency and competitive success rates compared to state-of-the-art learning-based approaches relying on privileged obstacle information. Furthermore, the unified policy scales seamlessly across different team sizes without retraining. Finally, fully autonomous outdoor experiments validate the framework on a quadrotor swarm relying on only onboard sensing and computing.", "link": "http://arxiv.org/abs/2603.24238v1", "date": "2026-03-25", "relevancy": 2.2323, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5736}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", iciency%20and%20competitive%20success%20rates%20compared%20to%20state-of-the-art%20learning-based%20approaches%20relying%20on%20privileged%20obstacle%20information.%20Furthermore%2C%20the%20unified%20policy%20scales%20seamlessly%20across%20different%20team%20sizes%20without%20retraining.%20Finally%2C%20fully%20autonomous%20outdoor%20experiments%20validate%20the%20framework%20on%20a%20quadrotor%20swarm%20relying%20on%20only%20onboard%20sensing%20and%20computing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24238v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecentralized%2520End-to-End%2520Multi-AAV%2520Pursuit%2520Using%2520Predictive%2520Spatio-Temporal%2520Observation%2520via%2520Deep%2520Reinforcement%2520Learning%26entry.906535625%3DYude%2520Li%2520and%2520Zhexuan%2520Zhou%2520and%2520Huizhe%2520Li%2520and%2520Yanke%2520Sun%2520and%2520Yenan%2520Wu%2520and%2520Yichen%2520Lai%2520and%2520Yiming%2520Wang%2520and%2520Youmin%2520Gong%2520and%2520Jie%2520Mei%26entry.1292438233%3DDecentralized%2520cooperative%2520pursuit%2520in%2520cluttered%2520environments%2520is%2520challenging%2520for%2520autonomous%2520aerial%2520swarms%252C%2520especially%2520under%2520partial%2520and%2520noisy%2520perception.%2520Existing%2520methods%2520often%2520rely%2520on%2520abstracted%2520geometric%2520features%2520or%2520privileged%2520ground-truth%2520states%252C%2520and%2520therefore%2520sidestep%2520perceptual%2520uncertainty%2520in%2520real-world%2520settings.%2520We%2520propose%2520a%2520decentralized%2520end-to-end%2520multi-agent%2520reinforcement%2520learning%2520%2528MARL%2529%2520framework%2520that%2520maps%2520raw%2520LiDAR%2520observations%2520directly%2520to%2520continuous%2520control%2520commands.%2520Central%2520to%2520the%2520framework%2520is%2520the%2520Predictive%2520Spatio-Temporal%2520Observation%2520%2528PSTO%2529%252C%2520an%2520egocentric%2520grid%2520representation%2520that%2520a {"title": "InstanceRSR: Real-World Super-Resolution via Instance-Aware Representation Alignment", "author": "Zixin Guo and Kai Zhao and Luyan Zhang", "abstract": "Existing real-world super-resolution (RSR) methods based on generative priors have achieved remarkable progress in producing high-quality and globally consistent reconstructions. However, they often struggle to recover fine-grained details of diverse object instances in complex real-world scenes. This limitation primarily arises because commonly adopted denoising losses (e.g., MSE) inherently favor global consistency while neglecting instance-level perception and restoration. To address this issue, we propose InstanceRSR, a novel RSR framework that jointly models semantic information and introduces instance-level feature alignment. Specifically, we employ low-resolution (LR) images as global consistency guidance while jointly modeling image data and semantic segmentation maps to enforce semantic relevance during sampling. Moreover, we design an instance representation learning module to align the diffusion latent space with the instance latent space, enabling instance-aware feature alignment, and further incorporate a scale alignment mechanism to enhance fine-grained perception and detail recovery. Benefiting from these designs, our approach not only generates photorealistic details but also preserves semantic consistency at the instance level. Extensive experiments on multiple real-world benchmarks demonstrate that InstanceRSR significantly outperforms existing methods in both quantitative metrics and visual quality, achieving new state-of-the-art (SOTA) performance.", "link": "http://arxiv.org/abs/2603.24240v1", "date": "2026-03-25", "relevancy": 2.2253, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5983}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": efiting%20from%20these%20designs%2C%20our%20approach%20not%20only%20generates%20photorealistic%20details%20but%20also%20preserves%20semantic%20consistency%20at%20the%20instance%20level.%20Extensive%20experiments%20on%20multiple%20real-world%20benchmarks%20demonstrate%20that%20InstanceRSR%20significantly%20outperforms%20existing%20methods%20in%20both%20quantitative%20metrics%20and%20visual%20quality%2C%20achieving%20new%20state-of-the-art%20%28SOTA%29%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24240v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInstanceRSR%253A%2520Real-World%2520Super-Resolution%2520via%2520Instance-Aware%2520Representation%2520Alignment%26entry.906535625%3DZixin%2520Guo%2520and%2520Kai%2520Zhao%2520and%2520Luyan%2520Zhang%26entry.1292438233%3DExisting%2520real-world%2520super-resolution%2520%2528RSR%2529%2520methods%2520based%2520on%2520generative%2520priors%2520have%2520achieved%2520remarkable%2520progress%2520in%2520producing%2520high-quality%2520and%2520globally%2520consistent%2520reconstructions.%2520However%252C%2520they%2520often%2520struggle%2520to%2520recover%2520fine-grained%2520details%2520of%2520diverse%2520object%2520instances%2520in%2520complex%2520real-world%2520scenes.%2520This%2520limitation%2520primarily%2520arises%2520because%2520commonly%2520adopted%2520denoising%2520losses%2520%2528e.g.%252C%2520MSE%2529%2520inherently%2520favor%2520global%2520consistency%2520while%2520neglecting%2520instance-level%2520perception%2520and%2520restoration.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520InstanceRSR%252C%2520a%2520novel%2520RSR%2520framework%2520that%2520jointly%2520models%2520semantic%2520information%2520and%2520introduces%2520instance-level%2520feature%2520alignment.%2520Specifically%252C%2520we%2520employ%2520low-resolution%2520%2528LR%2529%2520images%2520as%2520global%2520consistency%2520guidance%2520while%25 {"title": "Cross-Modal Prototype Alignment and Mixing for Training-Free Few-Shot Classification", "author": "Dipam Goswami and Simone Magistri and Gido M. van de Ven and Bart\u0142omiej Twardowski and Andrew D. Bagdanov and Tinne Tuytelaars and Joost van de Weijer", "abstract": "Vision-language models (VLMs) like CLIP are trained with the objective of aligning text and image pairs. To improve CLIP-based few-shot image classification, recent works have observed that, along with text embeddings, image embeddings from the training set are an important source of information. In this work we investigate the impact of directly mixing image and text prototypes for few-shot classification and analyze this from a bias-variance perspective. We show that mixing prototypes acts like a shrinkage estimator. Although mixed prototypes improve classification performance, the image prototypes still add some noise in the form of instance-specific background or context information. In order to capture only information from the image space relevant to the given classification task, we propose projecting image prototypes onto the principal directions of the semantic text embedding space to obtain a text-aligned semantic image subspace. These text-aligned image prototypes, when mixed with text embeddings, further improve classification. However, for downstream datasets with poor cross-modal alignment in CLIP, semantic alignment might be suboptimal. We show that the image subspace can still be leveraged by modeling the anisotropy using class covariances. We demonstrate that combining a text-aligned mixed prototype classifier and an image-specific LDA classifier outperforms existing methods across few-shot classification benchmarks.", "link": "http://arxiv.org/abs/2603.24528v1", "date": "2026-03-25", "relevancy": 2.2241, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6102}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5233}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5023}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-Modal%20Prototype%20Alignment%20and%20Mixing%20for%20Training-Free%20Few-Shot%20Classification&body=Title%3A%20Cross-Modal%20Prototype%20Alignment%20and%20Mixing%20for%20Training-Free%20Few-Shot%20Classification%0AAuthor%3A%20Dipam%20Goswami%20and%20Simone%20Magistri%20and%20Gido%20M.%20van%20de%20Ven%20and%20Bart%C5%82omiej%20Twardowski%20and%20Andrew%20D.%20Bagdanov%20and%20Tinne%20Tuytelaars%20and%20Joost%20van%20de%20Weijer%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20like%20CLIP%20are%20trained%20with%20the%20objective%20of%20aligning%20text%20and%20image%20pairs.%20To%20improve%20CLIP-based%20few-shot%20image%20classification%2C%20recent%20works%20have%20observed%20that%2C%20along%20with%20text%20embeddings%2C%20image%20embeddings%20from%20the%20training%20set%20are%20an%20important%20source%20of%20information.%20In%20this%20work%20we%20investigate%20the%20impact%20of%20directly%20mixing%20image%20and%20text%20prototypes%20for%20few-shot%20classification%20and%20analyze%20this%20from%20a%20bias-variance%20perspective.%20We%20show%20that%20mixing%20prototypes%20acts%20like%20a%20shrinkage%20estimator.%20Although%20mixed%20prototypes%20improve%20classification%20performance%2C%20the%20image%20prototypes%20still%20add%20some%20noise%20in%20the%20form%20of%20instance-specific%20background%20or%20context%20information.%20In%20order%20to%20capture%20only%20information%20from%20the%20image%20space%20relevant%20to%20the%20given%20classification%20task%2C%20we%20propose%20projecting%20image%20prototypes%20onto%20the%20principal%20directions%20of%20the%20semantic%20text%20embedding%20space%20to%20obtain%20a%20text-aligned%20semantic%20image%20subspace.%20These%20text-aligned%20image%20prototypes%2C%20when%20mixed%20with%20text%20embeddings%2C%20further%20improve%20classification.%20However%2C%20for%20downstream%20datasets%20with%20poor%20cross-modal%20alignment%20in%20CLIP%2C%20semantic%20alignment%20might%20be%20suboptimal.%20We%20show%20that%20the%20image%20subspace%20can%20still%20be%20leveraged%20by%20modeling%20the%20anisotropy%20using%20class%20covariances.%20We%20demonstrate%20that%20combining%20a%20text-aligned%20mixed%20prototype%20classifier%20and%20an%20image-specific%20LDA%20classifier%20outperforms%20existing%20methods%20across%20few-shot%20classification%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24528v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-Modal%2520Prototype%2520Alignment%2520and%2520Mixing%2520for%2520Training-Free%2520Few-Shot%2520Classification%26entry.906535625%3DDipam%2520Goswami%2520and%2520Simone%2520Magistri%2520and%2520Gido%2520M.%2520van%2520de%2520Ven%2520and%2520Bart%25C5%2582omiej%2520Twardowski%2520and%2520Andrew%2520D.%2520Bagdanov%2520and%2520Tinne%2520Tuytelaars%2520and%2520Joost%2520van%2520de%2520Weijer%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520like%2520CLIP%2520are%2520trained%2520with%2520the%2520objective%2520of%2520aligning%2520text%2520and%2520image%2520pairs.%2520To%2520improve%2520CLIP-based%2520few-shot%2520image%2520classification%252C%2520recent%2520works%2520have%2520observed%2520that%252C%2520along%2520with%2520text%2520embeddings%252C%2520image%2520embeddings%2520from%2520the%2520training%2520set%2520are%2520an%2520important%2520source%2520of%2520information.%2520In%2520this%2520work%2520we%2520investigate%2520the%2520impact%2520of%2520directly%2520mixing%2520image%2520and%2520text%2520prototypes%2520for%2520few-shot%2520classi {"title": "TimeRecipe: A Time-Series Forecasting Recipe via Benchmarking Module Level Effectiveness", "author": "Zhiyuan Zhao and Juntong Ni and Shangqing Xu and Haoxin Liu and Wei Jin and B. Aditya Prakash", "abstract": "Time-series forecasting is an essential task with wide real-world applications across domains. While recent advances in deep learning have enabled time-series forecasting models with accurate predictions, there remains considerable debate over which architectures and design components, such as series decomposition or normalization, are most effective under varying conditions. Existing benchmarks primarily evaluate models at a high level, offering limited insight into why certain designs work better. To mitigate this gap, we propose TimeRecipe, a unified benchmarking framework that systematically evaluates time-series forecasting methods at the module level. TimeRecipe conducts over 10,000 experiments to assess the effectiveness of individual components across a diverse range of datasets, forecasting horizons, and task settings. Our results reveal that exhaustive exploration of the design space can yield models that outperform existing state-of-the-art methods and uncover meaningful intuitions linking specific design choices to forecasting scenarios. Furthermore, we release a practical toolkit within TimeRecipe that recommends suitable model architectures based on these empirical insights. The benchmark is available at: https://github.com/AdityaLab/TimeRecipe.", "link": "http://arxiv.org/abs/2506.06482v3", "date": "2026-03-25", "relevancy": 2.2077, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4572}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4379}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4296}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TimeRecipe%3A%20A%20Time-Series%20Forecasting%20Recipe%20via%20Benchmarking%20Module%20Level%20Effectiveness&body=Title%3A%20TimeRecipe%3A%20A%20Time-Series%20Forecasting%20Recipe%20via%20Benchmarking%20Module%20Level%20Effectiveness%0AAuthor%3A%20Zhiyuan%20Zhao%20and%20Juntong%20Ni%20and%20Shangqing%20Xu%20and%20Haoxin%20Liu%20and%20Wei%20Jin%20and%20B.%20Aditya%20Prakash%0AAbstract%3A%20Time-series%20forecasting%20is%20an%20essential%20task%20with%20wide%20real-world%20applications%20across%20domains.%20While%20recent%20advances%20in%20deep%20learning%20have%20enabled%20time-series%20forecasting%20models%20with%20accurate%20predictions%2C%20there%20remains%20considerable%20debate%20over%20which%20architectures%20and%20design%20components%2C%20such%20as%20series%20decomposition%20or%20normalization%2C%20are%20most%20effective%20under%20varying%20conditions.%20Existing%20benchmarks%20primarily%20evaluate%20models%20at%20a%20high%20level%2C%20offering%20limited%20insight%20into%20why%20certain%20designs%20work%20better.%20To%20mitigate%20this%20gap%2C%20we%20propose%20TimeRecipe%2C%20a%20unified%20benchmarking%20framework%20that%20systematically%20evaluates%20time-series%20forecasting%20methods%20at%20the%20module%20level.%20TimeRecipe%20conducts%20over%2010%2C000%20experiments%20to%20assess%20the%20effectiveness%20of%20individual%20components%20across%20a%20diverse%20range%20of%20datasets%2C%20forecasting%20horizons%2C%20and%20task%20settings.%20Our%20results%20reveal%20that%20exhaustive%20exploration%20of%20the%20design%20space%20can%20yield%20models%20that%20outperform%20existing%20state-of-the-art%20methods%20and%20uncover%20meaningful%20intuitions%20linking%20specific%20design%20choices%20to%20forecasting%20scenarios.%20Furthermore%2C%20we%20release%20a%20practical%20toolkit%20within%20TimeRecipe%20that%20recommends%20suitable%20model%20architectures%20based%20on%20these%20empirical%20insights.%20The%20benchmark%20is%20available%20at%3A%20https%3A//github.com/AdityaLab/TimeRecipe.%0ALink%3A%20http%3A//arxiv.org/abs/2506.06482v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTimeRecipe%253A%2520A%2520Time-Series%2520Forecasting%2520Recipe%2520via%2520Benchmarking%2520Module%2520Level%2520Effectiveness%26entry.906535625%3DZhiyuan%2520Zhao%2520and%2520Juntong%2520Ni%2520and%2520Shangqing%2520Xu%2520and%2520Haoxin%2520Liu%2520and%2520Wei%2520Jin%2520and%2520B.%2520Aditya%2520Prakash%26entry.1292438233%3DTime-series%2520forecasting%2520is%2520an%2520essential%2520task%2520with%2520wide%2520real-world%2520applications%2520across%2520domains.%2520While%2520recent%2520advances%2520in%2520deep%2520learning%2520have%2520enabled%2520time-series%2520forecasting%2520models%2520with%2520accurate%2520predictions%252C%2520there%2520remains%2520considerable%2520debate%2520over%2520which%2520architectures%2520and%2520design%2520components%252C%2520such%2520as%2520series%2520decomposition%2520or%2520normalization%252C%2520are%2520most%2520effective%2520under%2520varying%2520conditions.%2520Existing%2520benchmarks%2520primarily%2520evaluate%2520models%2520at%2520a%2520high%2520level%252C%2520offering%2520limited%2520insight%2520into%2520why%2520certain%2520designs%2520work%2520better.%2520To%2520mitigate%2520this%2520gap%252C%2520we%2520propose%2520TimeRecipe%252C%2520a%2520unified%2520benchmarking%2520framework%2520that%2520systematically%2520evaluates%2520time-series%2520forecasting%2520methods%2520at%2520the%2520module%2520level.%2520TimeRecipe%2520conducts%2520over%252010%252C000%2520experiments%2520to%2520assess%2520the%2520effectiveness%2520of%2520individual%2520components%2520across%2520a%2520diverse%2520range%2520of%2520datasets%252C%2520forecasting%2520horizons%252C%2520and%2520task% {"title": "Knot-10:A Tightness-Stratified Benchmark for Real-World Knot Classification with Topological Difficulty Analysis", "author": "Shiheng Nie and Yunguang Yue", "abstract": "Physical knot classification is a fine-grained visual classification (FGVC) scenario in which appearance cues are deliberately suppressed: different classes share the same rope material, color, and background, and class identity resides primarily in crossing structure. We introduce the Knots-10 benchmark, comprising 1,440 images with a deployment-oriented split that trains on loosely tied knots and tests on tightly dressed ones. Swin-T and TransFG both average 97.2% accuracy; PMG scores 94.5%, consistent with the hypothesis that jigsaw shuffling disrupts crossing continuity. McNemar tests cannot separate four of the five general-purpose backbones, so small ranking margins should be interpreted with caution. A Mantel permutation test shows that topological distance significantly correlates with confusion patterns in three of the five models (p < 0.01). We propose TACA regularization, which improves embedding-topology alignment from rho=0.46 to rho=0.65 without improving classification accuracy; a random-distance ablation yields comparable alignment, indicating the benefit is likely driven by generic regularization. A pilot cross-domain test with 100 phone photographs reveals a 58-69 percentage-point accuracy drop, exposing rope appearance bias as the dominant failure mode.", "link": "http://arxiv.org/abs/2603.23286v2", "date": "2026-03-25", "relevancy": 2.201, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4563}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4342}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": {"title": "When Brain Foundation Model Meets Cauchy-Schwarz Divergence: A New Framework for Cross-Subject Motor Imagery Decoding", "author": "Jinzhou Wu and Baoping Tang and Qikang Li and Yi Wang and Cheng Li and Shujian Yu", "abstract": "Decoding motor imagery (MI) electroencephalogram (EEG) signals, a key non-invasive brain-computer interface (BCI) paradigm for controlling external systems, has been significantly advanced by deep learning. However, cross-subject MI-EEG decoding remains challenging due to substantial inter-subject variability and limited labeled target data, which necessitate costly calibration for new users. Many existing multi-source domain adaptation (MSDA) methods indiscriminately incorporate all available source domains, disregarding the large inter-subject differences in EEG signals, which leads to negative transfer and excessive computational costs. Moreover, while many approaches focus on feature distribution alignment, they often neglect the explicit dependence between features and decision-level outputs, limiting their ability to preserve discriminative structures. To address these gaps, we propose a novel MSDA framework that leverages a pretrained large Brain Foundation Model (BFM) for dynamic and informed source subject selection, ensuring only relevant sources contribute to adaptation. Furthermore, we employ Cauchy-Schwarz (CS) and Conditional CS (CCS) divergences to jointly perform feature-level and decision-level alignment, enhancing domain invariance while maintaining class discriminability. Extensive evaluations on two benchmark MI-EEG datasets demonstrate that our framework achieves average accuracies of 86.17% and 78.41%, outperforming a broad range of state-of-the-art baselines. Additional experiments with a large source pool validate the scalability and efficiency of BFM-guided selection.", "link": "http://arxiv.org/abs/2507.21037v2", "date": "2026-03-25", "relevancy": 2.2006, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5526}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5526}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Brain%20Foundation%20Model%20Meets%20Cauchy-Schwarz%20Divergence%3A%20A%20New%20Framework%20for%20Cross-Subject%20Motor%20Imagery%20Decoding&body=Title%3A%20When%20Brain%20Foundation%20Model%20Meets%20Cauchy-Schwarz%20Divergence%3A%20A%20New%20Framework%20for%20Cross-Subject%20Motor%20Imagery%20Decoding%0AAuthor%3A%20Jinzhou%20Wu%20and%20Baoping%20Tang%20and%20Qikang%20Li%20and%20Yi%20Wang%20and%20Cheng%20Li%20and%20Shujian%20Yu%0AAbstract%3A%20Decoding%20motor%20imagery%20%28MI%29%20electroencephalogram%20%28EEG%29%20signals%2C%20a%20key%20non-invasive%20brain-computer%20interface%20%28BCI%29%20paradigm%20for%20controlling%20external%20systems%2C%20has%20been%20significantly%20advanced%20by%20deep%20learning.%20However%2C%20cross-subject%20MI-EEG%20decoding%20remains%20challenging%20due%20to%20substantial%20inter-subject%20variability%20and%20limited%20labeled%20target%20data%2C%20which%20necessitate%20costly%20calibration%20for%20new%20users.%20Many%20existing%20multi-source%20domain%20adaptation%20%28MSDA%29%20methods%20indiscriminately%20incorporate%20all%20available%20source%20domains%2C%20disregarding%20the%20large%20inter-subject%20differences%20in%20EEG%20signals%2C%20which%20leads%20to%20negative%20transfer%20and%20excessive%20computational%20costs.%20Moreover%2C%20while%20many%20approaches%20focus%20on%20feature%20distribution%20alignment%2C%20they%20often%20neglect%20the%20explicit%20dependence%20between%20features%20and%20decision-level%20outputs%2C%20limiting%20their%20ability%20to%20preserve%20discriminative%20structures.%20To%20address%20these%20gaps%2C%20we%20propose%20a%20novel%20MSDA%20framework%20that%20leverages%20a%20pretrained%20large%20Brain%20Foundation%20Model%20%28BFM%29%20for%20dynamic%20and%20informed%20source%20subject%20selection%2C%20ensuring%20only%20relevant%20sources%20contribute%20to%20adaptation.%20Furthermore%2C%20we%20employ%20Cauchy-Schwarz%20%28CS%29%20and%20Conditional%20CS%20%28CCS%29%20divergences%20to%20jointly%20perform%20feature-level%20and%20decision-level%20alignment%2C%20enhancing%20domain%20invariance%20while%20maintaining%20class%20discriminability.%20Extensive%20evaluations%20on%20two%20benchmark%20MI-EEG%20datasets%20demonstrate%20that%20our%20framework%20achieves%20average%20accuracies%20of%2086.17%25%20and%2078.41%25%2C%20outperforming%20a%20broad%20range%20of%20state-of-the-art%20baselines.%20Additional%20experiments%20with%20a%20large%20source%20pool%20validate%20the%20scalability%20and%20efficiency%20of%20BFM-guided%20selection.%0ALink%3A%20http%3A//arxiv.org/abs/2507.21037v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Brain%2520Foundation%2520Model%2520Meets%2520Cauchy-Schwarz%2520Divergence%253A%2520A%2520New%2520Framework%2520for%2520Cross-Subject%2520Motor%2520Imagery%2520Decoding%26entry.906535625%3DJinzhou%2520Wu%2520and%2520Baoping%2520Tang%2520and%2520Qikang%2520Li%2520and%2520Yi%2520Wang%2520and%2520Cheng%2520Li%2520and%2520Shujian%2520Yu%26entry.1292438233%3DDecoding%2520motor%2520imagery%2520%2528MI%2529%2520electroencephalogram%2520%2528EEG%2529%2520signals%252C%2520a%2520key%2520non-invasive%2520brain-computer%2520interface%2520%2528BCI%2529%2520paradigm%2520for%2520controlling%2520external%2520systems%252C%2520has%2520been%2520significantly%2520advanced%2520by%2520deep%2520learning.%2520However%252C%2520cross-subject%2520MI-EEG%2520decoding%2520remains%252 h%2520a%2520large%2520source%2520pool%2520validate%2520the%2520scalability%2520and%2520efficiency%2520of%2520BFM-guided%2520selection.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.21037v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Brain%20Foundation%20Model%20Meets%20Cauchy-Schwarz%20Divergence%3A%20A%20New%20Framework%20for%20Cross-Subject%20Motor%20Imagery%20Decoding&entry.906535625=Jinzhou%20Wu%20and%20Baoping%20Tang%20and%20Qikang%20Li%20and%20Yi%20Wang%20and%20Cheng%20Li%20and%20Shujian%20Yu&entry.1292438233=Decoding%20motor%20imagery%20%28MI%29%20electroencephalogram%20%28EEG%29%20signals%2C%20a%20key%20non-invasive%20brain-computer%20interface%20%28BCI%29%20paradigm%20for%20controlling%20external%20systems%2C%20has%20been%20significantly%20advanced%20by%20deep%20learning.%20However%2C%20cross-subject%20MI-EEG%20decoding%20remains%20challenging%20due%20to%20substantial%20inter-subject%20variability%20and%20limited%20labeled%20target%20data%2C%20which%20necessitate%20costly%20calibration%20for%20new%20users.%20Many%20existing%20multi-source%20domain%20adaptation%20%28MSDA%29%20methods%20indiscriminately%20incorporate%20all%20available%20source%20domains%2C%20disregarding%20the%20large%20inter-subject%20differences%20in%20EEG%20signals%2C%20which%20leads%20to%20negative%20transfer%20and%20excessive%20computational%20costs.%20Moreover%2C%20while%20many%20approaches%20focus%20on%20feature%20distribution%20alignment%2C%20they%20often%20neglect%20the%20explicit%20dependence%20between%20features%20and%20decision-level%20outputs%2C%20limiting%20their%20ability%20to%20preserve%20discriminative%20structures.%20To%20address%20these%20gaps%2C%20we%20propose%20a%20novel%20MSDA%20framework%20that%20leverages%20a%20pretrained%20large%20Brain%20Foundation%20Model%20%28BFM%29%20for%20dynamic%20and%20informed%20source%20subject%20selection%2C%20ensuring%20o {"title": "Navigating the Latent Space Dynamics of Neural Models", "author": "Marco Fumero and Luca Moschella and Emanuele Rodol\u00e0 and Francesco Locatello", "abstract": "Neural networks transform high-dimensional data into compact, structured representations, often modeled as elements of a lower dimensional latent space. In this paper, we present an alternative interpretation of neural models as dynamical systems acting on the latent manifold. Specifically, we show that autoencoder models implicitly define a latent vector field on the manifold, derived by iteratively applying the encoding-decoding map, without any additional training. We observe that standard training procedures introduce inductive biases that lead to the emergence of attractor points within this vector field. Drawing on this insight, we propose to leverage the vector field as a representation for the network, providing a novel tool to analyze the properties of the model and the data. This representation enables to: (i) analyze the generalization and memorization regimes of neural models, even throughout training; (ii) extract prior knowledge encoded in the network's parameters from the attractors, without requiring any input data; (iii) identify out-of-distribution samples from their trajectories in the vector field. We further validate our approach on vision foundation models, showcasing the applicability and effectiveness of our method in real-world scenarios.", "link": "http://arxiv.org/abs/2505.22785v4", "date": "2026-03-25", "relevancy": 2.1959, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5519}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5488}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.54 r%20method%20in%20real-world%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2505.22785v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNavigating%2520the%2520Latent%2520Space%2520Dynamics%2520of%2520Neural%2520Models%26entry.906535625%3DMarco%2520Fumero%2520and%2520Luca%2520Moschella%2520and%2520Emanuele%2520Rodol%25C3%25A0%2520and%2520Francesco%2520Locatello%26entry.1292438233%3DNeural%2520networks%2520transform%2520high-dimensional%2520data%2520into%2520compact%252C%2520structured%2520representations%252C%2520often%2520modeled%2520as%2520elements%2520of%2520a%2520lower%2520dimensional%2520latent%2520space.%2520In%2520this%2520paper%252C%2520we%2520present%2520an%2520alternative%2520interpretation%2520of%2520neural%2520models%2520as%2520dynamical%2520systems%2520acting%2520on%2520the%2520latent%2520manifold.%2520Specifically%252C%2520we%2520show%2520that%2520autoencoder%2520models%2520implicitly%2520define%2520a%2520latent%2520vector%2520field%2520on%2520the%2520manifold%252C%2520derived%2520by%2520iteratively%2520applying%2520the%2520encoding-decoding%2520map%252C%2520without%2520any%2520additional%2520training.%2520We%2520observe%2520that%2520standard%2520training%2520procedures%2520introduce%2520inductive%2520biases%2520that%2520lead%2520to%2520the%2520emergence%2520of%2520attractor%2520points%2520within%2520this%2520vector%2520field.%2520Drawing%2520on%2520this%2520insight%252C%2520we%2520propose%2520to%2520leverage%2520the%2520vector%2520field%2520as%2520a%2520representation%2520for%2520the%2520network%252C%2520providing%2520a%2520novel%2520tool%2520to%2520analyze%2520the%2520properties%2520of%2520the%2520model%2520and%2520the%2520data.%2520This%2520representation%2520enables%2520to%253A%2520%2528i%2529%2520analyze%2520the%2520generalization%2520and%2520memorization%2520regimes%2520of%2520neural%2520models%252C%2520even%2520throughout%2520training%253B%2520%2528ii%2529%25 {"title": "AI-Supervisor: Autonomous AI Research Supervision via a Persistent Research World Model", "author": "Yunbo Long", "abstract": "Existing automated research systems operate as stateless, linear pipelines, generating outputs without maintaining a persistent understanding of the research landscape. They process papers sequentially, propose ideas without structured gap analysis, and lack mechanisms for agents to verify or refine each other's findings. We present AutoProf (Autonomous Professor), a multi-agent orchestration framework where specialized agents provide end-to-end AI research supervision driven by human interests, from literature review through gap discovery, method development, evaluation, and paper writing, via autonomous exploration and self-correcting updates. Unlike sequential pipelines, AutoProf maintains a continuously evolving Research World Model implemented as a Knowledge Graph, capturing methods, benchmarks, limitations, and unexplored gaps as shared memory across agents. The framework introduces three contributions: first, structured gap discovery that decomposes methods into modules, evaluates them across benchmarks, and identifies module-level gaps; second, self-correcting discovery loops that analyze why modules succeed or fail, detect benchmark biases, and assess evaluation adequacy; third, self-improving development loops using cross-domain mechanism search to iteratively address failing components. All agents operate under a consensus mechanism where findings are validated before being committed to the shared model. The framework is model-agnostic, supports mainstream large language models, and scales elastically with token budget from lightweight exploration to full-scale investigation.", "link": "http://arxiv.org/abs/2603.24402v1", "date": "2026-03-25", "relevancy": 2.1937, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5827}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5583}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5248}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI-Supervisor%3A%20Autonomous%20AI%20Research%20Supervision%20via%20a%20Persistent%20Research%20World%20Model&body=Title%3A%20AI-Supervisor%3A%20Autonomous%20AI%20Research%20Supervision%20via%20a%20Persistent%20Research%20World%20Model%0AAuthor%3A%20Yunbo%20Long%0AAbstract%3A%20Existing%20automated%20research%20systems%20operate%20as%20stateless%2C%20linear%20pipelines%2C%20generating%20outputs%20without%20maintaining%20a%20persistent%20understanding%20of%20the%20research%20landscape.%20They%20process%20papers%20sequentially%2C%20propose%20ideas%20without%20structured%20gap%20analysis%2C%20and%20lack%20mechanisms%20for%20agents%20to%20verify%20or%20refine%20each%20other%27s%20findings.%20We%20present%20AutoProf%20%28Autonomous%20Professor%29%2C%20a%20multi-agent%20orchestration%20framework%20where%20specialized%20agents%20provide%20end-to-end%20AI%20research%20supervision%20driven%20by%20human%20interests%2C%20from%20literature%20review%20through%20gap%20discovery%2C%20method%20development%2C%20evaluation%2C%20and%20paper%20writing%2C%20via%20autonomous%20exploration%20and%20self-correcting%20updates.%20Unlike%20sequential%20pipelines%2C%20AutoProf%20maintains%20a%20continuously%20evolving%20Research%20World%20Model%20implemented%20as%20a%20Knowledge%20Graph%2C%20capturing%20methods%2C%20benchmarks%2C%20limitations%2C%20and%20unexplored%20gaps%20as%20shared%20memory%20across%20agents.%20The%20framework%20introduces%20three%20contributions%3A%20first%2C%20structured%20gap%20discovery%20that%20decomposes%20methods%20into%20modules%2C%20evaluates%20them%20across%20benchmarks%2C%20and%20identifies%20module-level%20gaps%3B%20second%2C%20self-correcting%20discovery%20loops%20that%20analyze%20why%20modules%20succeed%20or%20fail%2C%20detect%20benchmark%20biases%2C%20and%20assess%20evaluation%20adequacy%3B%20third%2C%20self-improving%20development%20loops%20using%20cross-domain%20mechanism%20search%20to%20iteratively%20address%20failing%20components.%20All%20agents%20operate%20under%20a%20consensus%20mechanism%20where%20findings%20are%20validated%20before%20being%20committed%20to%20the%20shared%20model.%20The%20framework%20is%20model-agnostic%2C%20supports%20mainstream%20large%20language%20models%2C%20and%20scales%20elastically%20with%20token%20budget%20from%20lightweight%20exploration%20to%20full-scale%20investigation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24402v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAI-Supervisor%253A%2520Autonomous%2520AI%2520Research%2520Supervision%2520via%2520a%2520Persistent%2520Research%2520World%2520Model%26entry.906535625%3DYunbo%2520Long%26entry.1292438233%3DExisting%2520automated%2520research%2520systems%2520operate%2520as%2520stateless%252C%2520linear%2520pipelines%252C%2520generating%2520outputs%2520without%2520maintaining%2520a%2520persistent%2520understanding%2520of%2520the%2520research%2520landscape.%2520They%2520process%2520papers%2520sequentially%252C%2520propose%2520ideas%2520without%2520structured%2520gap%2520analysis%252C%2520and%2520lack%2520mechanisms%2520for%2520agents%2520to%2520verify%2520or%2520refine%2520each%2520other%2527s%2520findings.%2520We%2520present%2520AutoProf%2520%2528Autonomous%2520Professor%2529%252C%2520a%2520multi-agent%2520orchestration%2520framework%2520where%2520specialized%2520agents%2520provide%2520end-to-end%2520AI%2520research%2520supervision%2520driven%2520by%2520human%2520interests%252C%2520from%2520literature%2520review%2520through%2520gap%2520discovery%252C%2520method%2520development%252C%2520evaluation%252C% {"title": "Sim-to-Real of Humanoid Locomotion Policies via Joint Torque Space Perturbation Injection", "author": "Junhyeok Rui Cha and Woohyun Cha and Jaeyong Shin and Donghyeon Kim and Jaeheung Park", "abstract": "This paper proposes a novel alternative to existing sim-to-real methods for training control policies with simulated experiences. Unlike prior methods that typically rely on domain randomization over a fixed finite set of parameters, the proposed approach injects state-dependent perturbations into the input joint torque during forward simulation. These perturbations are designed to simulate a broader spectrum of reality gaps than standard parameter randomization without requiring additional training. By using neural networks as flexible perturbation generators, the proposed method can represent complex, state-dependent uncertainties, such as nonlinear actuator dynamics and contact compliance, that parametric randomization cannot capture. Experimental results demonstrate that the proposed approach enables humanoid locomotion policies to achieve superior robustness against complex, unseen reality gaps in both simulation and real-world deployment.", "link": "http://arxiv.org/abs/2603.21853v2", "date": "2026-03-25", "relevancy": 2.1796, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5962}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5432}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5261}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sim-to-Real%20of%20Humanoid%20Locomotion%20Policies%20via%20Joint%20Torque%20Space%20Perturbation%20Injection&body=Title%3A%20Sim-to-Real%20of%20Humanoid%20Locomotion%20Policies%20via%20Joint%20Torque%

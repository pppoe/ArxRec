{"title": "HEART-PFL: Stable Personalized Federated Learning under Heterogeneity with Hierarchical Directional Alignment and Adversarial Knowledge Transfer", "author": "Minjun Kim and Minje Kim", "abstract": "Personalized Federated Learning (PFL) aims to deliver effective client-specific models under heterogeneous distributions, yet existing methods suffer from shallow prototype alignment and brittle server-side distillation. We propose HEART-PFL, a dual-sided framework that (i) performs depth-aware Hierarchical Directional Alignment (HDA) using cosine similarity in the early stage and MSE matching in the deep stage to preserve client specificity, and (ii) stabilizes global updates through Adversarial Knowledge Transfer (AKT) with symmetric KL distillation on clean and adversarial proxy data. Using lightweight adapters with only 1.46M trainable parameters, HEART-PFL achieves state-of-the-art personalized accuracy on CIFAR-100, Flowers-102, and Caltech-101 (63.42%, 84.23%, and 95.67%, respectively) under Dirichlet non-IID partitions, and remains robust to out-of-domain proxy data. Ablation studies further confirm that HDA and AKT provide complementary gains in alignment, robustness, and optimization stability, offering insights into how the two components mutually reinforce effective personalization. Overall, these results demonstrate that HEART-PFL simultaneously enhances personalization and global stability, highlighting its potential as a strong and scalable solution for PFL(code available at https://github.com/danny0628/HEART-PFL).", "link": "http://arxiv.org/abs/2603.24209v1", "date": "2026-03-25", "relevancy": 2.5725, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5225}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5155}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5056}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HEART-PFL%3A%20Stable%20Personalized%20Federated%20Learning%20under%20Heterogeneity%20with%20Hierarchical%20Directional%20Alignment%20and%20Adversarial%20Knowledge%20Transfer&body=Title%3A%20HEART-PFL%3A%20Stable%20Personalized%20Federated%20Learning%20under%20Heterogeneity%20with%20Hierarchical%20Directional%20Alignment%20and%20Adversarial%20Knowledge%20Transfer%0AAuthor%3A%20Minjun%20Kim%20and%20Minje%20Kim%0AAbstract%3A%20Personalized%20Federated%20Learning%20%28PFL%29%20aims%20to%20deliver%20effective%20client-specific%20models%20under%20heterogeneous%20distributions%2C%20yet%20existing%20methods%20suffer%20from%20shallow%20prototype%20alignment%20and%20brittle%20server-side%20distillation.%20We%20propose%20HEART-PFL%2C%20a%20dual-sided%20framework%20that%20%28i%29%20performs%20depth-aware%20Hierarchical%20Directional%20Alignment%20%28HDA%29%20using%20cosine%20similarity%20in%20the%20early%20stage%20and%20MSE%20matching%20in%20the%20deep%20stage%20to%20preserve%20client%20specificity%2C%20and%20%28ii%29%20stabilizes%20global%20updates%20through%20Adversarial%20Knowledge%20Transfer%20%28AKT%29%20with%20symmetric%20KL%20distillation%20on%20clean%20and%20adversarial%20proxy%20data.%20Using%20lightweight%20adapters%20with%20only%201.46M%20trainable%20parameters%2C%20HEART-PFL%20achieves%20state-of-the-art%20personalized%20accuracy%20on%20CIFAR-100%2C%20Flowers-102%2C%20and%20Caltech-101%20%2863.42%25%2C%2084.23%25%2C%20and%2095.67%25%2C%20respectively%29%20under%20Dirichlet%20non-IID%20partitions%2C%20and%20remains%20robust%20to%20out-of-domain%20proxy%20data.%20Ablation%20studies%20further%20confirm%20that%20HDA%20and%20AKT%20provide%20complementary%20gains%20in%20alignment%2C%20robustness%2C%20and%20optimization%20stabili {"title": "Anchored Video Generation: Decoupling Scene Construction and Temporal Synthesis in Text-to-Video Diffusion Models", "author": "Mariam Hassan and Bastien Van Delft and Wuyang Li and Alexandre Alahi", "abstract": "State-of-the-art Text-to-Video (T2V) diffusion models can generate visually impressive results, yet they still frequently fail to compose complex scenes or follow logical temporal instructions. In this paper, we argue that many errors, including apparent motion failures, originate from the model's inability to construct a semantically correct or logically consistent initial frame. We introduce Anchored Video Generation (AVG), a modular pipeline that decouples these tasks by decomposing the Text-to-Video generation into three specialized stages: (1) Reasoning, where a Large Language Model (LLM) rewrites the video prompt to describe only the initial scene, resolving temporal ambiguities; (2) Composition, where a Text-to-Image (T2I) model synthesizes a high-quality, compositionally-correct anchor frame from this new prompt; and (3) Temporal Synthesis, where a video model, finetuned to understand this anchor, focuses its entire capacity on animating the scene and following the prompt. Our approach sets a new state-of-the-art on the T2V CompBench benchmark and significantly improves all tested models on VBench2. Furthermore, we show that visual anchoring allows us to cut the number of sampling steps by 70% without any loss in performance. AVG offers a simple yet practical path toward more efficient, robust, and controllable video synthesis.", "link": "http://arxiv.org/abs/2512.16371v2", "date": "2026-03-25", "relevancy": 2.5698, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6848}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6436}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6243}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anchored%20Video%20Generation%3A%20Decoupling%20Scene%20Construction%20and%20Temporal%20Synthesis%20in%20Text-to-Video%20Diffusion%20Models&body=Title%3A%20Anchored%20Video%20Generation%3A%20Decoupling%20Scene%20Construction%20and%20Temporal%20Synthesis%20in%20Text-to-Video%20Diffusion%20Models%0AAuthor%3A%20Mariam%20Hassan%20and%20Bastien%20Van%20Delft%20and%20Wuyang%20Li%20and%20Alexandre%20Alahi%0AAbstract%3A%20State-of-the-art%20Text-to-Video%20%28T2V%29%20diffusion%20models%20can%20generate%20visually%20impressive%20results%2C%20yet%20they%20still%20frequently%20fail%20to%20compose%20complex%20scenes%20or%20follow%20logical%20temporal%20instructions.%20In%20this%20paper%2C%20we%20argue%20that%20many%20errors%2C%20including%20apparent%20motion%20failures%2C%20originate%20from%20the%20model%27s%20inability%20to%20construct%20a%20semantically%20correct%20or%20logically%20consistent%20initial%20frame.%20We%20introduce%20Anchored%20Video%20Generation%20%28AVG%29%2C%20a%20modular%20pipeline%20that%20decouples%20these%20tasks%20by%20decomposing%20the%20Text-to-Video%20generation%20into%20three%20specialized%20stages%3A%20%281%29%20Reasoning%2C%20where%20a%20Large%20Language%20Model%20%28LLM%29%20rewrites%20the%20video%20prompt%20to%20describe%20only%20the%20initial%20scene%2C%20resolving%20temporal%20ambiguities%3B%20%282%29%20Composition%2C%20where%20a%20Text-to-Image%20%28T2I%29%20model%20synthesizes%20a%20high-quality%2C%20compositionally-correct%20anchor%20frame%20from%20this%20new%20prompt%3B%20and%20%283%29%20Temporal%20Synthesis%2C%20where%20a%20video%20model%2C%20finetuned%20to%20understand%20this%20anchor%2C%20focuses%20its%20entire%20capacity%20on%20animating%20the%20scene%20and%20following%20the%20prompt.%20Our%20approach%20sets%20a%20new%20state-of-the-art%20on%20the%20T2V%20CompBench%20benchmark%20and%20significantly%20improves%20all%20tested%20models%20on%20VBench2.%20Furthermore%2C%20we%20show%20that%20visual%20anchoring%20allows%20us%20to%20cut%20the%20number%20of%20sampling%20steps%20by%2070%25%20without%20any%20loss%20in%20performance.%20AVG%20offers%20a%20simple%20yet%20practical%20path%20toward%20more%20efficient%2C%20robust%2C%20and%20controllable%20video%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2512.16371v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAnchored%2520Video%2520Generation%253A%2520Decoupling%2520Scene%2520Construction%2520and%2520Temporal%2520Synthesis%2520in%2520Text-to-Video%2520Diffusion%2520Models%26entry.906535625%3DMariam%2520Hassan%2520and%2520Bastien%2520Van%2520Delft%2520and%2520Wuyang%2520Li%2520and%2520Alexandre%2520Alahi%26entry.1292438233%3DState-of-the-art%2520Text-to-Video%2520%2528T2V%2529%2520diffusion%2520models%2520can%2520generate%2520visually%2520impressive%2520results%252C%2520yet%2520they%2520still%2520frequently%2520fail%2520to%2520compose%2520complex%2520scenes%2520or%2520follow%2520logical%2520temporal%2520instructions.%2520In%2520this%2520paper%252C%2520we%2520argue%2520that%2520many%2520errors%252C%2520including%2520apparent%2520motion%2520failures%252C%2520originate%2520from%2520the%2520model%2527s%2520inability%2520to%2520construct%2520a%2520semantically%2520correct%2520or%2520logically%2520consistent%2520initial%2520frame.%2520We%2520introduce%2520Anchored%2520Video%2520Generation%2520%2528AVG%2529%252C%2520a%2520modular%2520pipeline%2520that%2520decouples%2520these%2520tasks%2520by%2520decomposing%2520the%2520Text-to-Video%2520generation%2520into%2520three%2520specialized%2520stages%253A%2520%25281%2529%2520Reasoning%252C%2520where%2520a%2520Large%2520Language%2520Model%2520%2528LLM%2529%2520rewrites%2520the%2520video%2520prompt%2520to%2520describe%2520only% {"title": "CA-LoRA: Concept-Aware LoRA for Domain-Aligned Segmentation Dataset Generation", "author": "Minho Park and Sunghyun Park and Jungsoo Lee and Hyojin Park and Kyuwoong Hwang and Fatih Porikli and Jaegul Choo and Sungha Choi", "abstract": "This paper addresses the challenge of data scarcity in semantic segmentation by generating datasets through text-to-image (T2I) generation models, reducing image acquisition and labeling costs. Segmentation dataset generation faces two key challenges: 1) aligning generated samples with the target domain and 2) producing informative samples beyond the training data. Fine-tuning T2I models can help generate samples aligned with the target domain. However, it often overfits and memorizes training data, limiting their ability to generate diverse and well-aligned samples. To overcome these issues, we propose Concept-Aware LoRA (CA-LoRA), a novel fine-tuning approach that selectively identifies and updates only the weights associated with necessary concepts (e.g., style or viewpoint) for domain alignment while preserving the pretrained knowledge of the T2I model to produce informative samples. We demonstrate its effectiveness in generating datasets for urban-scene segmentation, outperforming baseline and state-of-the-art methods in in-domain (few-shot and fully-supervised) settings, as well as in domain generalization tasks, especially under challenging conditions such as adverse weather and varying illumination, further highlighting its superiority.", "link": "http://arxiv.org/abs/2503.22172v2", "date": "2026-03-25", "relevancy": 2.5581, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5232}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5069}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5047}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CA-LoRA%3A%20Concept-Aware%20LoRA%20for%20Domain-Aligned%20Segmentation%20Dataset%20Generation&body=Title%3A%20CA-LoRA%3A%20Concept-Aware%20LoRA%20for%20Domain-Aligned%20Segmentation%20Dataset%20Generation%0AAuthor%3A%20Minho%20Park%20and%20Sunghyun%20Park%20and%20Jungsoo%20Lee%20and%20Hyojin%20Park%20and%20Kyuwoong%20Hwang%20and%20Fatih%20Porikli%20and%20Jaegul%20Choo%20and%20Sungha%20Choi%0AAbstract%3A%20This%20paper%20addresses%20the%20challenge%20of%20data%20scarcity%20in%20semantic%20segmentation%20by%20generating%20datasets%20through%20text-to-image%20%28T2I%29%20generation%20models%2C%20reducing%20image%20acquisition%20and%20labeling%20costs.%20Segmentation%20dataset%20generation%20faces%20two%20key%20challenges%3A%201%29%20aligning%20generated%20samples%20with%20the%20target%20domain%20and%202%29%20producing%20informative%20samples%20beyond%20the%20training%20data.%20Fine-tuning%20T2I%20models%20can%20help%20generate%20samples%20aligned%20with%20the%20target%20domain.%20However%2C%20it%20often%20overfits%20and%20memorizes%20training%20data%2C%20limiting%20their%20ability%20to%20generate%20diverse%20and%20well-aligned%20samples.%20To%20overcome%20these%20issues%2C%20we%20propose%20Concept-Aware%20LoRA%20%28CA-LoRA%29%2C%20a%20novel%20fine-tuning%20approach%20that%20selectively%20identifies%20and%20updates%20only%20the%20weights%20associated%20with%20necessary%20concepts%20%28e.g.%2C%20style%20or%20viewpoint%29%20for%20domain%20alignment%20while%20preserving%20the%20pretrained%20knowledge%20of%20the%20T2I%20model%20to%20produce%20informative%20samples.%20We%20demonstrate%20its%20effectiveness%20in%20generating%20datasets%20for%20urban-scene%20segmentation%2C%20outperforming%20baseline%20and%20state-of-the-art%20methods%20in%20in-domain%20%28few-shot%20and%20fully-supervised%29%20settings%2 {"title": "On the Use of Bagging for Local Intrinsic Dimensionality Estimation", "author": "Krist\u00f3f P\u00e9ter and Ricardo J. G. B. Campello and James Bailey and Michael E. Houle", "abstract": "The theory of Local Intrinsic Dimensionality (LID) has become a valuable tool for characterizing local complexity within and across data manifolds, supporting a range of data mining and machine learning tasks. Accurate LID estimation requires samples drawn from small neighborhoods around each query to avoid biases from nonlocal effects and potential manifold mixing, yet limited data within such neighborhoods tends to cause high estimation variance. As a variance reduction strategy, we propose an ensemble approach that uses subbagging to preserve the local distribution of nearest neighbor (NN) distances. The main challenge is that the uniform reduction in total sample size within each subsample increases the proximity threshold for finding a fixed number k of NNs around the query. As a result, in the specific context of LID estimation, the sampling rate has an additional, complex interplay with the neighborhood size, where both combined determine the sample size as well as the locality and resolution considered for estimation. We analyze both theoretically and experimentally how the choice of the sampling rate and the k-NN size used for LID estimation, alongside the ensemble size, affects performance, enabling informed prior selection of these hyper-parameters depending on application-based preferences. Our results indicate that within broad and well-characterized regions of the hyper-parameters space, using a bagged estimator will most often significantly reduce variance as well as the mean squared error when compared to the corresponding non-bagged baseline, with controllable impact on bias. We additionally propose and evaluate different ways of combining bagging with neighborhood smoothing for substantial further improvements on LID estimation performance.", "link": "http://arxiv.org/abs/2603.24384v1", "date": "2026-03-25", "relevancy": 2.5557, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5286}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5166}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4882}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Use%20of%20Bagging%20for%20Local%20Intrinsic%20Dimensionality%20Estimation&body=Title%3A%20On%20the%20Use%20of%20Bagging%20for%20Local%20Intrinsic%20Dimensionality%20Estimation%0AAuthor%3A%20Krist%C3%B3f%20P%C3%A9ter%20and%20Ricardo%20J.%20G.%20B.%20Campello%20and%20James%20Bailey%20and%20Michael%20E.%20Houle%0AAbstract%3A%20The%20theory%20of%20Local%20Intrinsic%20Dimensionality%20%28LID%29%20has%20become%20a%20valuable%20tool%20for%20characterizing%20local%20complexity%20within%20and%20across%20data%20manifolds%2C%20supporting%20a%20range%20of%20data%20mining%20and%20machine%20learning%20tasks.%20Accurate%20LID%20estimation%20requires%20samples%20drawn%20from%20small%20neighborhoods%20around%20each%20query%20to%20avoid%20biases%20from%20nonlocal%20effects%20and%20potential%20manifold%20mixing%2C%20yet%20limited%20data%20within%20such%20neighborhoods%20tends%20to%20cause%20high%20estimation%20variance.%20As%20a%20variance%20reduction%20strategy%2C%20we%20propose%20an%20ensemble%20approach%20that%20uses%20subbagging%20to%20preserve%20the%20local%20distribution%20of%20nearest%20neighbor%20%28NN%29%20distances.%20The%20main%20challenge%20is%20that%20the%20uniform%20reduction%20in%20total%20sample%20size%20within%20each%20subsample%20increases%20the%20proximity%20threshold%20for%20finding%20a%20fixed%20number%20k%20of%20NNs%20around%20the%20query.%20As%20a%20result%2C%20in%20the%20specific%20context%20of%20LID%20estimation%2C%20the%20sampling%20rate%20has%20an%20additional%2C%20complex%20interplay%20with%20the%20neighborhood%20size%2C%20where%20both%20combined%20determine%20the%20sample%20size%20as%20well%20as%20the%20locality%20and%20resolution%20considered%20for%20estimation.%20We%20analyze%20both%20theoretically%20and%20experimentally%20how%20the%20choice%20of%20the%20sampling%20rate%20and%20the%20k-NN%20size%20used%20for%20LID%20estimation%2C%20alongside%20the%20ensemble%20size%2C%20affects%20performance%2C%20enabling%20informed%20prior%20selection%20of%20these%20hyper-parameters%20depending%20on%20application-based%20preferences.%20Our%20results%20indicate%20that%20within%20broad%20and%20well-characterized%20regions%20of%20the%20hyper-parameters%20space%2C%20using%20a%20bagged%20estimator%20will%20most%20often%20significantly%20reduce%20variance%20as%20well%20as%20the%20mean%20squared%20error%20when%20compared%20to%20the%20corresponding%20non-bagged%20baseline%2C%20with%20controllable%20impact%20on%20bias.%20We%20additionally%20propose%20and%20evaluate%20different%20ways%20of%20combining%20bagging%20with%20neighborhood%20smoothing%20for%20substantial%20further%20improvements%20on%20LID%20estimation%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24384v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Use%2520of%2520Bagging%2520for%2520Local%2520Intrinsic%2520Dimensionality%2520Estimation%26entry.906535625%3DKrist%25C3%25B3f%2520P%25C3%25A9ter%2520and%2520Ricardo%2520J.%2520G.%2520B.%2520Campello%2520and%2520James%2520Bailey%2520and%2520Michael%2520E.%2520Houle%26entry.1292438233%3DThe%2520theory%2520of%2520Local%2520Intrinsic%2520Dimensionality%2520%2528LID%2529%2520has%2520become%2520a%2520valuable%2520tool%2520for%2520chara {"title": "Dehallu3D: Hallucination-Mitigated 3D Generation from Single Image via Cyclic View Consistency Refinement", "author": "Xiwen Wang and Shichao Zhang and Hailun Zhang and Ruowei Wang and Mao Li and Chenyu Zhou and Qijun Zhao and Ji-Zhe Zhou", "abstract": "Large 3D reconstruction models have revolutionized the 3D content generation field, enabling broad applications in virtual reality and gaming. Just like other large models, large 3D reconstruction models suffer from hallucinations as well, introducing structural outliers (e.g., odd holes or protrusions) that deviate from the input data. However, unlike other large models, hallucinations in large 3D reconstruction models remain severely underexplored, leading to malformed 3D-printed objects or insufficient immersion in virtual scenes. Such hallucinations majorly originate from that existing methods reconstruct 3D content from sparsely generated multi-view images which suffer from large viewpoint gaps and discontinuities. To mitigate hallucinations by eliminating the outliers, we propose Dehallu3D for 3D mesh generation. Our key idea is to design a balanced multi-view continuity constraint to enforce smooth transitions across dense intermediate viewpoints, while avoiding over-smoothing that could erase sharp geometric features. Therefore, Dehallu3D employs a plug-and-play optimization module with two key constraints: (i) adjacent consistency to ensure geometric continuity across views, and (ii) adaptive smoothness to retain fine details.We further propose the Outlier Risk Measure (ORM) metric to quantify geometric fidelity in 3D generation from the perspective of outliers. Extensive experiments show that Dehallu3D achieves high-fidelity 3D generation by effectively preserving structural details while removing hallucinated outliers.", "link": "http://arxiv.org/abs/2603.01601v2", "date": "2026-03-25", "relevancy": 2.5522, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6461}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6461}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dehallu3D%3A%20Hallucination-Mitigated%203D%20Generation%20from%20Single%20Image%20via%20Cyclic%20View%20Consistency%20Refinement&body=Title%3A%20Dehallu3D%3A%20Hallucination-Mitigated%203D%20Generation%20from%20Single%20Image%20via%20Cyclic%20View%20Consistency%20Refinement%0AAuthor%3A%20Xiwen%20Wang%20and%20Shichao%20Zhang%20and%20Hailun%20Zhang%20and%20Ruowei%20Wang%20and%20Mao%20Li%20and%20Chenyu%20Zhou%20and%20Qijun%20Zhao%20and%20Ji-Zhe%20Zhou%0AAbstract%3A%20Large%203D%20reconstruction%20models%20have%20revolutionized%20the%203D%20content%20generation%20field%2C%20enabling%20broad%20applications%20in%20virtual%20reality%20and%20gaming.%20Just%20like%20other%20large%20models%2C%20large%203D%20reconstruction%20models%20suffer%20from%20hallucinations%20as%20well%2C%20introducing%20structural%20outliers%20%28e.g.%2C%20odd%20holes%20or%20protrusions%29%20that%20deviate%20from%20the%20input%20data.%20However%2C%20unlike%20other%20large%20models%2C%20hallucinations%20in%20large%203D%20reconstruction%20models%20remain%20severely%20underexplored%2C%20leading%20to%20malformed%203D-printed%20objects%20or%20insufficient%20immersion%20in%20virtual%20scenes.%20Such%20hallucinations%20majorly%20originate%20from%20that%20existing%20methods%20reconstruct%203D%20content%20from%20sparsely%20generated%20multi-view%20images%20which%20suffer%20from%20large%20viewpoint%20gaps%20and%20discontinuities.%20To%20mitigate%20hallucinations%20by%20eliminating%20the%20outliers%2C%20we%20propose%20Dehallu3D%20for%203D%20mesh%20generation.%20Our%20key%20idea%20is%20to%20design%20a%20balanced%20multi-view%20continuity%20constraint%20to%20enforce%20smooth%20transitions%20across%20dense%20intermediate%20viewpoints%2C%20while%20avoiding%20over-smoothing%20that%20could%20erase%20sharp%20geometric%20features.%20Therefore%2C%20Dehallu3D%20employs%20a%20plug-and-play%20optimization%20module%20with%20two%20key%20constraints%3A%20%28i%29%20adjacent%20consistency%20to%20ensure%20geometric%20continuity%20across%20views%2C%20and%20%28ii%29%20adaptive%20smoothness%20to%20retain%20fine%20details.We%20further%20propose%20the%20Outlier%20Risk%20Measure%20%28ORM%29%20metric%20to%20quantify%20geometric%20fidelity%20in%203D%20generation%20from%20the%20perspective%20of%20outliers.%20Extensive%20experiments%20show%20that%20Dehallu3D%20achieves%20high-fidelity%203D%20generation%20by%20effectively%20preserving%20structural%20details%20while%20removing%20hallucinated%20outliers.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01601v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDehallu3D%253A%2520Hallucination-Mitigated%25203D%2520Generation%2520from%2520Single%2520Image%2520via%2520Cyclic%2520View%2520Consistency%2520Refinement%26entry.906535625%3DXiwen%2520Wang%2520and%2520Shichao%2520Zhang%2520and%2520Hailun%2520Zhang%2520and%2520Ruowei%2520Wang%2520and%2520Mao%2520Li%2520and%2520Chenyu%2520Zhou%2520and%2520Qijun%2520Zhao%2520and%2520Ji-Zhe%2520Zhou%26entry.1292438233%3DLarge%25203D%2520reconstruction%2520models%2520have%2520revolutionized%2520the%25203D%2520content%2520generation%2520field%252C%2520enabling%2520broad%2520applications%2520in%2520virtual%2520reality%2520and%2520gaming.%2520Just%2520like%2520other%2520large%2520models%252C%2520large%25203D%2520reconstruction%2520models%2520suffer%2520from%2520hallucinations%2520as%2520well%252C%2520introducing%2520structural%2520outliers%2520%2528e.g.%252C%2520odd%2520holes%2520or%2520protrusions%2529%2520that%2520deviate%2520from%2520the {"title": "DeepDTF: Dual-Branch Transformer Fusion for Multi-Omics Anticancer Drug Response Prediction", "author": "Yuhan Zhao and Jacob Tennant and James Yang and Zhishan Guo and Young Whang and Ning Sui", "abstract": "Cancer drug response varies widely across tumors due to multi-layer molecular heterogeneity, motivating computational decision support for precision oncology. Despite recent progress in deep CDR models, robust alignment between high-dimensional multi-omics and chemically structured drugs remains challenging due to cross-modal misalignment and limited inductive bias. We present DeepDTF, an end-to-end dual-branch Transformer fusion framework for joint log(IC50) regression and drug sensitivity classification. The cell-line branch uses modality-specific encoders for multi-omics profiles with Transformer blocks to capture long-range dependencies, while the drug branch represents compounds as molecular graphs and encodes them with a GNN-Transformer to integrate local topology with global context. Omics and drug representations are fused by a Transformer-based module that models cross-modal interactions and mitigates feature misalignment. On public pharmacogenomic benchmarks under 5-fold cold-start cell-line evaluation, DeepDTF consistently outperforms strong baselines across omics settings, achieving up to RMSE=1.248, R^2=0.875, and AUC=0.987 with full multi-omics inputs, while reducing classification error (1-ACC) by 9.5%. Beyond accuracy, DeepDTF provides biologically grounded explanations via SHAP-based gene attributions and pathway enrichment with pre-ranked GSEA.", "link": "http://arxiv.org/abs/2603.24265v1", "date": "2026-03-25", "relevancy": 2.5416, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5323}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5127}, {"title": "DDM-N {"title": "DepthFocus: Controllable Depth Estimation for See-Through Scenes", "author": "Junhong Min and Jimin Kim and Minwook Kim and Cheol-Hui Min and Youngpil Jeon and Minyong Choi", "abstract": "Depth in the real world is rarely singular. Transmissive materials create layered ambiguities that confound conventional perception systems. Existing models remain passive; conventional approaches typically estimate static depth maps anchored to the nearest surface, and even recent multi-head extensions suffer from a representational bottleneck due to fixed feature representations. This stands in contrast to human vision, which actively shifts focus to perceive a desired depth. We introduce \\textbf{DepthFocus}, a steerable Vision Transformer that redefines stereo depth estimation as condition-aware control. Instead of extracting fixed features, our model dynamically modulates its computation based on a physical reference depth, integrating dual conditional mechanisms to selectively perceive geometry aligned with the desired focus. Leveraging a newly curated large-scale synthetic dataset, \\textbf{DepthFocus} achieves state-of-the-art results across all evaluated benchmarks, including both standard single-layer and complex multi-layered scenarios. While maintaining high precision in opaque regions, our approach effectively resolves depth ambiguities in transparent and reflective scenes by selectively reconstructing geometry at a target distance. This capability enables robust, intent-driven perception that significantly outperforms existing multi-layer methods, marking a substantial step toward active 3D perception. \\noindent \\textbf{Project page}: \\href{https://junhong-3dv.github.io/depthfocus-project/}{\\textbf{this https URL}}.", "link": "http://arxiv.org/abs/2511.16993v3", "date": "2026-03-25", "relevancy": 2.5335, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6615}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6277}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6277}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DepthFocus%3A%20Controllable%20Depth%20Estimation%20for%20See-Through%20Scenes&body=Title%3A%20DepthFocus%3A%20Controllable%20Depth%20Estimation%20for%20See-Through%20Scenes%0AAuthor%3A%20Junhong%20Min%20and%20Jimin%20Kim%20and%20Minwook%20Kim%20and%20Cheol-Hui%20Min%20and%20Youngpil%20Jeon%20and%20Minyong%20Choi%0AAbstract%3A%20Depth%20in%20the%20real%20world%20is%20rarely%20singular.%20Transmissive%20materials%20create%20layered%20ambiguities%20that%20confound%20conventional%20perception%20systems.%20Existing%20models%20remain%20passive%3B%20conventional%20approaches%20typically%20estimate%20static%20depth%20maps%20anchored%20to%20the%20nearest%20surface%2C%20and%20even%20recent%20multi-head%20extensions%20suffer%20from%20a%20representational%20bottleneck%20due%20to%20fixed%20feature%20representations.%20This%20stands%20in%20contrast%20to%20human%20vision%2C%20which%20actively%20shifts%20focus%20to%20perceive%20a%20desired%20depth.%20We%20introduce%20%5Ctextbf%7BDepthFocus%7D%2C%20a%20steerable%20Vision%20Transformer%20that%20redefines%20stereo%20depth%20estimation%20as%20condition-aware%20control.%20Instead%20of%20extracting%20fixed%20features%2C%20our%20model%20dynamically%20modulates%20its%20computation%20based%20on%20a%20physical%20reference%20depth%2C%20integrating%20dual%20conditional%20mechanisms%20to%20selectively%20perceive%20geometry%20aligned%20with%20the%20desired%20focus.%20Leveraging%20a%20newly%20curated%20large-scale%20synthetic%20dataset%2C%20%5Ctextbf%7BDepthFocus%7D%20achieves%20state-of-the-art%20results%20across%20all%20evaluated%20benchmarks%2 {"title": "Gen-C: Populating Virtual Worlds with Generative Crowds", "author": "Andreas Panayiotou and Panayiotis Charalambous and Ioannis Karamouzas", "abstract": "Over the past two decades, researchers have made significant steps in simulating agent-based human crowds, yet most efforts remain focused on low-level tasks such as collision avoidance, path following, and flocking. As a result, these approaches often struggle to capture the high-level behaviors that emerge from sustained agent-agent and agent-environment interactions over time. We introduce Generative Crowds (Gen-C), a generative framework that produces crowd scenarios capturing agent-agent and agent-environment interactions, shaping coherent high-level crowd plans. To avoid the labor-intensive process of collecting and annotating real crowd video data, we leverage Large Language Models (LLMs) to bootstrap synthetic datasets of crowd scenarios. To represent those scenarios, we propose a time-expanded graph structure encoding actions, interactions, and spatial context. Gen-C employs a dual Variational Graph Autoencoder (VGAE) architecture that jointly learns connectivity patterns and node features conditioned on textual and structural signals, overcoming the limitations of direct LLM generation to enable scalable, environment-aware multi-agent crowd simulations. We demonstrate the effectiveness of our framework on scenarios with diverse behaviors such as a University Campus and a Train Station, showing that it generates heterogeneous crowds, coherent interactions, and high-level decision-making patterns consistent with the provided context.", "link": "http://arxiv.org/abs/2504.01924v4", "date": "2026-03-25", "relevancy": 2.5323, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.684}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.601}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5857}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gen-C%3A%20Populating%20Virtual%20Worlds%20with%20Generative%20Crowds&body=Title%3A%20Gen-C%3A%20Populating%20Virtual%20Worlds%20with%20Generative%20Crowds%0AAuthor%3A%20Andreas%20Panayiotou%20and%20Panayiotis%20Charalambous%20and%20Ioannis%20Karamouzas%0AAbstract%3A%20Over%20the%20past%20two%20decades%2C%20researchers%20have%20made%20significant%20steps%20in%20simulating%20agent-based%20human%20crowds%2C%20yet%20most%20efforts%20remain%20focused%20on%20low-level%20tasks%20such%20as%20collision%20avoidance%2C%20path%20following%2C%20and%20flocking.%20As%20a%20result%2C%20these%20approaches%20often%20struggle%20to%20capture%20the%20high-level%20behaviors%20that%20emerge%20from%20sustained%20agent-agent%20and%20agent-environment%20interactions%20over%20time.%20We%20introduce%20Generative%20Crowds%20%28Gen-C%29%2C%20a%20generative%20framework%20that%20produces%20crowd%20scenarios%20capturing%20agent-agent%20and%20agent-environment%20interactions%2C%20shaping%20coherent%20high-level%20crowd%20plans.%20To%20avoid%20the%20labor-intensive%20process%20of%20collecting%20and%20annotating%20real%20crowd%20video%20data%2C%20we%20leverage%20Large%20Language%20Models%20%28LLMs%29%20to%20bootstrap%20synthetic%20datasets%20of%20crowd%20scenarios.%20To%20represent%20those%20scenarios%2C%20we%20propose%20a%20time-expanded%20graph%20structure%20encoding%20actions%2C%20interactions%2C%20and%20spatial%20context.%20Gen-C%20employs%20a%20dual%20Variational%20Graph%20Autoencoder%20%28VGAE%29%20architecture%20that%20jointly%20learns%20connectivity%20patterns%20and%20node%20features%20conditioned%20on%20textual%20and%20structural%20signals%2C%20overcoming%20the%20limitations%20of%20direct%20LLM%20generation%20to%20enable%20scalable%2C%20environment-aware%20multi-agent%20crowd%20simulations.%20We%20demonstrate%20the%20effectiveness%20of%20our%20framework%20on%20scenarios%20with%20diverse%20behaviors%20such%20as%20a%20University%20Campus%20and%20a%20Train%20Station%2C%20showing%20that%20it%20generates%20heterogeneous%20crowds%2C%20coherent%20interactions%2C%20and%20high-level%20decision-making%20patterns%20consistent%20with%20the%20provided%20context.%0ALink%3A%20http%3A//arxiv.org/abs/2504.01924v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGen-C%253A%2520Populating%2520Virtual%2520Worlds%2520with%2520Generative%2520Crowds%26entry.906535625%3DAndreas%2520Panayiotou%2520and%2520Panayiotis%2520Charalambous%2520and%2520Ioannis%2520Karamouzas%26entry.1292438233%3DOver%2520the%2520past%2520two%2520decades%252C%2520researchers%2520have%2520made%2520significant%2520steps%2520in%2520simulating%2520agent-based%2520human%2520crowds%252C%2520yet%2520most%2520efforts%2520remain%2520focused%2520on%2520low-level%2520tasks%2520such%2520as%2520collision%2520avoidance%252C%2520path%2520following%252C%2520and%2520flocking.%2520As%2520a%2520result%252C%2520these%2520approaches%2520often%2520struggle%2520to%2520capture%2520the%2520high-level%2520behaviors%2520that%2520emerge%2520from%2520sustained%2520agent-agent%2520and%2520agent-environment%2520interactions%2520over%2520time.%2520We%2520introduce%2520Generative%2520Crowds%2520%2528Gen-C%2529%252C%2520a%2520generative%2520framework%2520that%2520produces%2520crowd%2520scenarios%2520capturing%2520agent-agent%2520and%2520agent-environment%2520interactions%252C%2520shaping%2520coherent%2520high-level%2520crowd%2520plans.%2520To%2520avoid%2520the%2520labor-intensive%2520process%2520of%2520collecting%2520and%2520annotating%2520real%2520crowd%2520video%2520data%252C%2520we%2520leverage%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520to%2520bootstrap%2520synthetic%2520datasets%2520of%2520crowd%2520sce s%20over%20time.%20We%20introduce%20Generative%20Crowds%20%28Gen-C%29%2C%20a%20generative%20framework%20that%20produces%20crowd%20scenarios%20capturing%20agent-agent%20and%20agent-environment%20interactions%2C%20shaping%20coherent%20high-level%20crowd%20plans.%20To%20avoid%20the%20labor-intensive%20process%20of%20collecting%20and%20annotating%20real%20crowd%20video%20data%2C%20we%20leverage%20Large%20Language%20Models%20%28LLMs%29%20to%20bootstrap%20synthetic%20datasets%20of%20crowd%20scenarios.%20To%20represent%20those%20scenarios%2C%20we%20propose%20a%20time-expanded%20graph%20structure%20encoding%20actions%2C%20interactions%2C%20and%20spatial%20context.%20Gen-C%20employs%20a%20dual%20Variational%20Graph%20Autoencoder%20%28VGAE%29%20architecture%20that%20jointly%20learns%20connectivity%20patterns%20and%20node%20features%20conditioned%20on%20textual%20and%20structural%20signals%2C%20overcoming%20the%20limitations%20of%20direct%20LLM%20generation%20to%20enable%20scalable%2C%20environment-aware%20multi-agent%20crowd%20simulations.%20We%20demonstrate%20the%20effectiveness%20of%20our%20framework%20on%20scenarios%20with%20diverse%20behaviors%20such%20as%20a%20University%20Campus%20and%20a%20Train%20Station%2C%20showing%20that%20it%20generates%20heterogeneous%20crowds%2C%20coherent%20interactions%2C%20and%20high-level%20decision-making%20patterns%20consistent%20with%20the%20provided%20context.&entry.1838667208=http%3A//arxiv.org/abs/2504.01924v4&entry.124074799=Read"},
{"title": "Structured Legal Document Generation in India: A Model-Agnostic Wrapper Approach with VidhikDastaavej", "author": "Shubham Kumar Nigam and Balaramamahanthi Deepak Patnaik and Noel Shallum and Kripabandhu Ghosh and Arnab Bhattacharya", "abstract": "Automating legal document drafting can improve efficiency and reduce the burden of manual legal work. Yet, the structured generation of private legal documents remains underexplored, particularly in the Indian context, due to the scarcity of public datasets and the complexity of adapting models for long-form legal drafting. To address this gap, we introduce VidhikDastaavej, a large-scale, anonymized dataset of private legal documents curated in collaboration with an Indian law firm. Covering 133 diverse categories, this dataset is the first resource of its kind and provides a foundation for research in structured legal text generation and Legal AI more broadly. We further propose a Model-Agnostic Wrapper (MAW), a two-stage generation framework that first plans the section structure of a legal draft and then generates each section with retrieval-based prompts. MAW is independent of any specific LLM, making it adaptable across both open- and closed-source models. Comprehensive evaluation, including lexical, semantic, LLM-based, and expert-driven assessments with inter-annotator agreement, shows that the wrapper substantially improves factual accuracy, coherence, and completeness compared to fine-tuned baselines. This work establishes both a new benchmark dataset and a generalizable generation framework, paving the way for future research in AI-assisted legal drafting.", "link": "http://arxiv.org/abs/2504.03486v2", "date": "2026-03-25", "relevancy": 2.5231, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5502}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.495}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Structured%20Legal%20Document%20Generation%20in%20India%3A%20A%20Model-Agnostic%20Wrapper%20Approach%20with%20VidhikDastaavej&body=Title%3A%20Structured%20Legal%20Document%20Generation%20in%20India%3A%20A%20Model-Agnostic%20Wrapper%20Approach%20with%20VidhikDastaavej%0AAuthor%3A%20Shubham%20Kumar%20Nigam%20and%20Balaramamahanthi%20Deepak%20Patnaik%20and%20Noel%20Shallum%20and%20Kripabandhu%20Ghosh%20and%20Arnab%20Bhattacharya%0AAbstract%3A%20Automating%20legal%20document%20drafting%20can%20improve%20efficiency%20and%20reduce%20the%20burden%20of%20manual%20legal%20work.%20Yet%2C%20the%20structured%20generation%20of%20private%20legal%20documents%20remains%20underexplored%2C%20particularly%20in%20the%20Indian%20context%2C%20due%20to%20the%20scarcity%20of%20public%20datasets%20and%20the%20complexity%20of%20adapting%20models%20for%20long-form%20legal%20drafting.%20To%20address%20this%20gap%2C%20we%20introduce%20VidhikDastaavej%2C%20a%20large-scale%2C%20anonymized%20dataset%20of%20private%20legal%20documents%20curated%20in%20collaboration%20with%20an%20Indian%20law%20firm.%20Covering%20133%20diverse%20categories%2C%20this%20dataset%20is%20the%20first%20resource%20of%20its%20kind%20and%20provides%20a%20foundation%20for%20research%20in%20structured%20legal%20text%20generation%20and%20Legal%20AI%20more%20broadly.%20We%20further%20propose%20a%20Model-Agnostic%20Wrapper%20%28MAW%29%2C%20a%20two-stage%20generation%20framework%20that%20first%20plans%20the%20section%20structure%20of%20a%20legal%20draft%20and%20then%20generates%20each%20section%20with%20retrieval-based%20prompts.%20MAW%20is%20independent%20of%20any%20specific%20LLM%2C%20making%20it%20adaptable%20across%20both%20open-%20and%20closed-source%20models.%20Comprehensive%20evaluation%2C%20including%20lexical%2C%20semantic%2C%20LLM-based%2C%20and%20expert-driven%20assessments%20with%20inter-annotator%20agreement%2C%20shows%20that%20the%20wrapper%20substantially%20improves%20factual%20accuracy%2C%20coherence%2C%20and%20completeness%20compared%20to%20fine-tuned%20baselines.%20This%20work%20establishes%20both%20a%20new%20benchmark%20dataset%20and%20a%20generalizable%20generation%20framework%2C%20paving%20the%20way%20for%20future%20research%20in%20AI-assisted%20legal%20drafting.%0ALink%3A%20http%3A//arxiv.org/abs/2504.03486v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructured%2520Legal%2520Document%2520Generation%2520in%2520India%253A%2520A%2520Model-Agnostic%2520Wrapper%2520Approach%2520with%2520VidhikDastaavej%26entry.906535625%3DShubham%2520Kumar%2520Nigam%2520and%2520Balaramamahanthi%2520Deepak%2520Patnaik%2520and%2520Noel%2520Shallum%2520and%2520Kripabandhu%2520Ghosh%2520and%2520Arnab%2520Bhattacharya%26entry.1292438233%3DAutomating%2520legal%2520document%2520drafting%2520can%2520improve%2520efficiency%2520and%2520reduce%2520the%2520burden%2520of%2520manual%2520legal%2520work.%2520Yet%252C%2520the%2520structured%2520generation%2520of%2520private%2520legal%2520documents%2520remains%2520underexplored%252C%2520particularly%2520in%2520the%2520Indian%2520context%252C%2520due%2520to%2520the%2520scarcity%2520of%2520public%2520datasets%2520and%2520the%2520complexity%2520of%2520adapting%2520models%2520for%2520long-form%2520legal%2520drafting.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520VidhikDastaavej%252C%2520a%2520large-scale%252C%2520anonymized%2520dataset%2520of%2520private%2520legal%2520documents%2520curated%2520in%2520collaboration%2520with%2520an%2520Indian%2520law%2520firm.%2520Covering%2520133%2520diverse%2520categories%252C%2520this%2520dataset%2520is%2520the%2520first%2520resource%2520of%2520its {"title": "Attack Assessment and Augmented Identity Recognition for Human Skeleton Data", "author": "Joseph G. Zalameda and Megan A. Witherow and Alexander M. Glandon and Jose Aguilera and Khan M. Iftekharuddin", "abstract": "Machine learning models trained on small data sets for security applications are especially vulnerable to adversarial attacks. Person identification from LiDAR based skeleton data requires time consuming and expensive data acquisition for each subject identity. Recently, Assessment and Augmented Identity Recognition for Skeletons (AAIRS) has been used to train Hierarchical Co-occurrence Networks for Person Identification (HCN-ID) with small LiDAR based skeleton data sets. However, AAIRS does not evaluate robustness of HCN-ID to adversarial attacks or inoculate the model to defend against such attacks. Popular perturbation-based approaches to generating adversarial attacks are constrained to targeted perturbations added to real training samples, which is not ideal for inoculating models with small training sets. Thus, we propose Attack-AAIRS, a novel addition to the AAIRS framework. Attack-AAIRS leverages a small real data set and a GAN generated synthetic data set to assess and improve model robustness against unseen adversarial attacks. Rather than being constrained to perturbations of limited real training samples, the GAN learns the distribution of adversarial attack samples that exploit weaknesses in HCN-ID. Attack samples drawn from this distribution augment training for inoculation of the HCN-ID to improve robustness. Ten-fold cross validation of Attack-AAIRS yields increased robustness to unseen attacks- including FGSM, PGD, Additive Gaussian Noise, MI-FGSM, and BIM. The HCN-ID Synthetic Data Quality Score for Attack-AAIRS indicates that generated attack samples are of similar quality to the original benign synthetic samples generated by AAIRS. Furthermore, inoculated models show consistent final test accuracy with the original model trained on real data, demonstrating that our method improves robustness to adversarial attacks without reducing test performance on real data.", "link": "http://arxiv.org/abs/2603.24232v1", "date": "2026-03-25", "relevancy": 2.515, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5097}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5056}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4937}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attack%20Assessment%20and%20Augmented%20Identity%20Recognition%20for%20Human%20Skeleton%20Data&body=Title%3A%20Attack%20Assessment%20and%20Augmented%20Identity%20Recognition%20for%20Human%20Skeleton%20Data%0AAuthor%3A%20Joseph%20G.%20Zalameda%20and%20Megan%20A.%20Witherow%20and%20Alexander%20M.%20Glandon%20and%20Jose%20Aguilera%20and%20Khan%20M.%20Iftekharuddin%0AAbstract%3A%20Machine%20learning%20models%20trained%20on%20small%20data%20sets%20for%20security%20applications%20are%20especially%20vulnerable%20to%20adversarial%20attacks.%20Person%20identification%20from%20LiDAR%20based%20skeleton%20data%20requires%20time%20consuming%20and%20expensive%20data%20acquisition%20for%20each%20subject%20identity.%20Recently%2C%20Assessment%20and%20Augmented%20Identity%20Recognition%20for%20Skeletons%20%28AAIRS%29%20has%20been%20used%20to%20train%20Hierarchical%20Co-occurrence%20Networks%20for%20Person%20Identification%20%28HCN-ID%29%20with%20small%20LiDAR%20based%20skeleton%20data%20sets.%20However%2C%20AAIRS%20does%20not%20evaluate%20robustness%20of%20HCN-ID%20to%20adversarial%20attacks%20or%20inoculate%20the%20model%20to%20defend%20against%20such%20attack {"title": "Principled Steering via Null-space Projection for Jailbreak Defense in Vision-Language Models", "author": "Xingyu Zhu and Beier Zhu and Shuo Wang and Junfeng Fang and Kesen Zhao and Hanwang Zhang and Xiangnan He", "abstract": "As vision-language models (VLMs) are increasingly deployed in open-world scenarios, they can be easily induced by visual jailbreak attacks to generate harmful content, posing serious risks to model safety and trustworthy usage. Recent activation steering methods inject directional vectors into model activations during inference to induce refusal behaviors and have demonstrated effectiveness. However, a steering vector may both enhance refusal ability and cause over-refusal, thereby degrading model performance on benign inputs. Moreover, due to the lack of theoretical interpretability, these methods still suffer from limited robustness and effectiveness. To better balance safety and utility, we propose NullSteer, a null-space projected activation defense framework. Our method constructs refusal directions within model activations through a linear transformation: it maintains zero perturbation within the benign subspace while dynamically inducing refusal along potentially harmful directions, thereby theoretically achieving safety enhancement without impairing the model's general capabilities. Extensive experiments show that NullSteer significantly reduces harmful outputs under various jailbreak attacks (average ASR reduction over 15 percent on MiniGPT-4) while maintaining comparable performance to the original model on general benchmarks.", "link": "http://arxiv.org/abs/2603.22094v2", "date": "2026-03-25", "relevancy": 2.4884, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5073}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", " {"title": "VocSegMRI: Multimodal Learning for Precise Vocal Tract Segmentation in Real-time MRI", "author": "Daiqi Liu and Johannes Enk and Maureen Stone and Fangxu Xing and Tom\u00e1s Arias-Vergara and Jerry L. Prince and Jana Hutter and Jonghye Woo and Andreas Maier and Paula Andrea P\u00e9rez-Toro", "abstract": "Accurate segmentation of articulatory structures in real-time MRI (rtMRI) remains challenging, as existing methods rely primarily on visual cues and overlook complementary information from synchronized speech signals. We propose VocSegMRI, a multimodal framework integrating video, audio, and phonological inputs via cross-attention fusion and a contrastive learning objective that improves cross-modal alignment and segmentation precision. Evaluated on USC-75 and further validated via zero-shot transfer on USC-TIMIT, VocSegMRI outperforms unimodal and multimodal baselines, with ablations confirming the contribution of each component.", "link": "http://arxiv.org/abs/2509.13767v4", "date": "2026-03-25", "relevancy": 2.453, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5135}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4792}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4792}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VocSegMRI%3A%20Multimodal%20Learning%20for%20Precise%20Vocal%20Tract%20Segmentation%20in%20Real-time%20MRI&body=Title%3A%20VocSegMRI%3A%20Multimodal%20Learning%20for%20Precise%20Vocal%20Tract%20Segmentation%20in%20Real-time%20MRI%0AAuthor%3A%20Daiqi%20Liu%20and%20Johannes%20Enk%20and%20Maureen%20Stone%20and%20Fangxu%20Xing%20and%20Tom%C3%A1s%20Arias-Vergara%20and%20Jerry%20L.%20Prince%20and%20Jana%20Hu {"title": "KINESIS: Motion Imitation for Human Musculoskeletal Locomotion", "author": "Merkourios Simos and Alberto Silvio Chiappa and Alexander Mathis", "abstract": "How do humans move? Advances in reinforcement learning (RL) have produced impressive results in capturing human motion using physics-based humanoid control. However, torque-controlled humanoids fail to model key aspects of human motor control such as biomechanical joint constraints & non-linear and overactuated musculotendon control. We present KINESIS, a model-free motion imitation framework that tackles these challenges. KINESIS is trained on 1.8 hours of locomotion data and achieves strong motion imitation performance on unseen trajectories. Through a negative mining approach, KINESIS learns robust locomotion priors that we leverage to deploy the policy on several downstream tasks such as text-to-control, target point reaching, and football penalty kicks. Importantly, KINESIS learns to generate muscle activity patterns that correlate well with human EMG activity. We show that these results scale seamlessly across biomechanical model complexity, demonstrating control of up to 290 muscles. Overall, the physiological plausibility makes KINESIS a promising model for tackling challenging problems in human motor control. Code, videos and benchmarks are available at https://github.com/amathislab/Kinesis.", "link": "http://arxiv.org/abs/2503.14637v3", "date": "2026-03-25", "relevancy": 2.4323, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6541}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5913}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KINESIS%3A%20Motion%20Imitation%20for%20Human%20Musculoskeletal%20Locomotion&body=Title%3A%20KINESIS%3A%20Motion%20Imitation%20for%20Human%20Musculoskeletal%20Locomotion%0AAuthor%3A%20Merkourios%20Simos%20and%20Alberto%20Silvio%20Chiappa%20and%20Alexander%20Mathis%0AAbstract%3A%20How%20do%20humans%20move%3F%20Advances%20in%20reinforcement%20learning%20%28RL%29%20have%20produced%20impressive%20results%20in%20capturing%20human%20motion%20using%20physics-based%20humanoid%20control.%20However%2C%20torque-controlled%20humanoids%20fail%20to%20model%20key%20aspects%20of%20human%20motor%20control%20such%20as%20biomechanical%20joint%20constraints%20%26%20non-linear%20and%20overactuated%20musculotendon%20control.%20We%20present%20KINESIS%2C%20a%20model-free%20motion%20imitation%20framework%20that%20tackles%20these%20challenges.%20KINESIS%20is%20trained%20on%201.8%20hours%20of%20locomotion%20data%20and%20achieves%20strong%20motion%20imitation%20performance%20on%20unseen%20trajectories.%20Through%20a%20negative%20mining%20approach%2C%20KINESIS%20learns%20robust%20locomotion%20priors%20that%20we%20leverage%20to%20deploy%20the%20policy%20on%20several%20downstream%20tasks%20such%20as%20text-to-control%2C%20target%20point%20reaching%2C%20and%20football%20penalty%20kicks.%20Importantly%2C%20KINESIS%20learns%20to%20generate%20muscle%20activity%20patterns%20that%20correlate%20well%20with%20human%20EMG%20activity.%20We%20show%20that%20these%20results%20scale%20seamlessly%20across%20biomechanical%20model%20complexity%2C%20demonstrating%20control%20of%20up%20to%20290%20muscles.%20Overall%2C%20the%20physiological%20plausibility%20makes%20KINESIS%20a%20promising%20model%20for%20tackling%20challenging%20problems%20in%20human%20motor%20control.%20Code%2C%20videos%20and%20benchmarks%20are%20available%20at%20https%3A//github.com/amathislab/Kinesis.%0ALink%3A%20http%3A//arxiv.org/abs/2503.14637v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K {"title": "Hamiltonian Mechanics of Feature Learning: Bottleneck Structure in Leaky ResNets", "author": "Arthur Jacot and Alexandre Kaiser", "abstract": "We study Leaky ResNets, which interpolate between ResNets and Fully-Connected nets depending on an 'effective depth' hyper-parameter $\\tilde{L}$. In the infinite depth limit, we study 'representation geodesics' $A_{p}$: continuous paths in representation space (similar to NeuralODEs) from input $p=0$ to output $p=1$ that minimize the parameter norm of the network. We give a Lagrangian and Hamiltonian reformulation, which highlight the importance of two terms: a kinetic energy which favors small layer derivatives $\\partial_{p}A_{p}$ and a potential energy that favors low-dimensional representations, as measured by the 'Cost of Identity'. The balance between these two forces offers an intuitive understanding of feature learning in ResNets. We leverage this intuition to explain the emergence of a bottleneck structure, as observed in previous work: for large $\\tilde{L}$ the potential energy dominates and leads to a separation of timescales, where the representation jumps rapidly from the high dimensional inputs to a low-dimensional representation, move slowly inside the space of low-dimensional representations, before jumping back to the potentially high-dimensional outputs. Inspired by this phenomenon, we train with an adaptive layer step-size to adapt to the separation of timescales.", "link": "http://arxiv.org/abs/2405.17573v3", "date": "2026-03-25", "relevancy": 2.4298, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.506}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4948}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hamiltonian%20Mechanics%20of%20Feature%20Learning%3A%20Bottleneck%20Structure%20in%20Leaky%20ResNets&body=Title%3A%20Hamiltonian%20Mechanics%20of%20Feature%20Learning%3A%20Bottleneck%20Structure%20in%20Leaky%20ResNets%0AAuthor%3A%20Arthur%20Jacot%20and%20Alexandre%20Kaiser%0AAbstract%3A%20We%20study%20Leaky%20ResNets%2C%20which%20interpolate%20between%20ResNets%20and%20Fully-Connected%20nets%20depending%20on%20an%20%27effective%20depth%27%20hyper-parameter%20%24%5Ctilde%7BL%7D%24.%20In%20the%20infinite%20depth%20limit%2C%20we%20study%20%27representation%20geodesics%27%20%24A_%7Bp%7D%24%3A%20continuous%20paths%20in%20representation%20space%20%28similar%20to%20NeuralODEs%29%20from%20input%20%24p%3D0%24%20to%20output%20%24p%3D1%24%20that%20minimize%20the%20parameter%20norm%20of%20the%20network.%20We%20give%20a%20Lagrangian%20and%20Hamiltonian%20reformulation%2C%20which%20highlight%20the%20importance%20of%20two%20terms%3A%20a%20kinetic%20energy%20which%20favors%20small%20layer%20derivatives%20%24%5Cpartial_%7Bp%7DA_%7Bp%7D%24%20and%20a%20potential%20energy%20that%20favors%20low-dimensional%20representations%2C%20as%20measured%20by%20the%20%27Cost%20of%20Identity%27.%20The%20balance%20between%20these%20two%20forces%20offers%20an%20intuitive%20understanding%20of%20feature%20learning%20in%20ResNets.%20We%20leverage%20this%20intuition%20to%20explain%20the%20emergence%20of%20a%20bottleneck%20structure%2C%20as%20observed%20in%20previous%20work%3A%20for%20large%20%24%5Ctilde%7BL%7D%24%20the%20potential%20energy%20dominates%20and%20leads%20to%20a%20separation%20of%20timescales%2C%20where%20the%20representation%20jumps%20rapidly%20from%20the%20high%20dimensional%20inputs%20to%20a%20low-dimensional%20representation%2C%20move%20slowly%20inside%20the%20space%20of%20low-dimensional%20representations%2C%20before%20jumping%20back%20to%20the%20potentially%20high-dimensional%20outputs.%20Inspired%20by%20this%20phenomenon%2C%20we%20train%20with%20an%20adaptive%20layer%20step-size%20to%20adapt%20to%20the%20separation%20of%20timescales.%0ALink%3A%20http%3A//arxiv.org/abs/2405.17573v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHamiltonian%2520Mechanics%2520of%2520Feature%2520Learning%253A%2520Bottleneck%2520Structure%2520in%2520Leaky%2520ResNets%26entry.906535625%3DArthur%2520Jacot%2520and%2520Alexandre%2520Kaiser%26entry.1292438233%3DWe%2520study%2520Leaky%2520ResNets%252C%2520which%2520interpolate%2520between%2520ResNets%2520and%2520Fully-Connected%2520nets%2520depending%2520on%2520an%2520%2527effective%2520depth%2527%2520hyper-parameter%2520%2524%255Ctilde%257BL%257D%2524.%2520In%2520the%2520infinite%2520depth%2520limit%252C%2520we%2520study%2520%2527representation%2520geodesics%2527%2520%2524A_%257Bp%257D%2524%253A%2520continuous%2520paths%2520in%2520representation%2520space%2520%2528similar%2520to%2520NeuralODEs%2529%2520from%2520input%2520%2524p%253D0%2524%2520to%2520output%2520%2524p%253D1%2524%2520that%2520minimize%2520the%2520parameter%2520norm%2520of%2520the%2520network.%2520We%2520give%2520a%2520Lagrangian%2520and%2520Hamiltonian%2520reformulation%252C%2520which%2520highlight%2520the%2520importance%2520of%2520two%2520terms%253A%2520a%2520kinetic%2520energy%2520which%2520favors%2520small%2520layer%2520derivatives%2520%2524%255Cpartial_%257Bp%257DA_%257Bp%257D%2524%2520and%2520a%2520potential%2520energy%2520that%2520favors%2520low-dimensional%2520representations%252C%2520as%2520measured%2520by%2520the%2520%2527Cost%2520of%2520Identity%2527.%2520The%2520balance%2520between%2520these%2520two%2520forces%2520offers%2520an%2520intuitive%2520understanding%2520of%2520feature%2520learning%2520in%2520ResNets.%2520We%2520leverage%2520this%2520intuition%2520to%2520explain%2520the%2520emergence%2520of%2520a%2520bottleneck%2520structure%252C%2520as%2520observed%2520in%2520previous%2520work%253A%2520for%2520large%2520%2524%255Ctilde%257BL%257D%2524%2520the%2520potential%2520energy%2520dominates%2520and%2520leads%2520to%2520a%2520separation%2520of%2520timescales%252C%2520where%2520the%2520representation%2520jumps%2520rapidly%2520from%2520the%2520high%2520dimensional%2520inputs%2520to%2520a%2520low-dimensional%2520representation%252C%2520move%2520slowly%2520inside%2520the%2520space%2520of%2520low-dimensional%2520representations%252C%2520before%2520jumping%2520back%2520to%2520the%2520potentially%2520high-dimensional%2520outputs.%2520Inspired%2520by%2520this%2520phenomenon%252C%2520we%2520train%2520with%2520an%2520adaptive%2520layer%2520step-size%2520to%2520adapt%2520to%2520the%2520separation%2520of%2520timescales.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2405.17573v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hamiltonian%20Mechanics%20of%20Feature%20Learning%3A%20Bottleneck%20Structure%20in%20Leaky%20ResNets&entry.906535625=Arthur%20Jacot%20and%20Alexandre%20Kaiser&entry.1292438233=We%20study%20Leaky%20ResNets%2C%20which%20interpolate%20between%20ResNets%20and%20Fully-Connected%20nets%20depending%20on%20an%20%27effective%20depth%27%20hyper-parameter%20%24%5Ctilde%7BL%7D%24.%20In%20the%20infinite%20depth%20limit%2C%20we%20study%20%27representation%20geodesics%27%20%24A_%7Bp%7D%24%3A%20continuous%20paths%20in%20representation%20space%20%28similar%20to%20NeuralODEs%29%20from%20input%20%24p%3D0%24%20to%20output%20%24p%3D1%24%20that%20minimize%20the%20parameter%20norm%20of%20the%20network.%20We%20give%20a%20Lagrangian%20and%20Hamiltonian%20reformulation%2C%20which%20highlight%20the%20importance%20of%20two%20terms%3A%20a%20kinetic%20energy%20which%20favors%20small%20layer%20derivatives%20%24%5Cpartial_%7Bp%7DA_%7Bp%7D%24%20and%20a%20potential%20energy%20that%20favors%20low-dimensional%20representations%2C%20as%20measured%20by%20the {"title": "Forecasting with Guidance: Representation-Level Supervision for Time Series Forecasting", "author": "Jiacheng Wang and Liang Fan and Baihua Li and Luyan Zhang", "abstract": "Nowadays, time series forecasting is predominantly approached through the end-to-end training of deep learning architectures using error-based objectives. While this is effective at minimizing average loss, it encourages the encoder to discard informative yet extreme patterns. This results in smooth predictions and temporal representations that poorly capture salient dynamics. To address this issue, we propose ReGuider, a plug-in method that can be seamlessly integrated into any forecasting architecture. ReGuider leverages pretrained time series foundation models as semantic teachers. During training, the input sequence is processed together by the target forecasting model and the pretrained model. Rather than using the pretrained model's outputs directly, we extract its intermediate embeddings, which are rich in temporal and semantic information, and align them with the target model's encoder embeddings through representation-level supervision. This alignment process enables the encoder to learn more expressive temporal representations, thereby improving the accuracy of downstream forecasting. Extensive experimentation across diverse datasets and architectures demonstrates that our ReGuider consistently improves forecasting performance, confirming its effectiveness and versatility.", "link": "http://arxiv.org/abs/2603.24262v1", "date": "2026-03-25", "relevancy": 2.4279, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5007}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.483}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4731}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Forecasting%20with%20Guidance%3A%20Representation-Level%20Supervision%20for%20Time%20Series%20Forecasting&body=Title%3A%20Forecasting%20with%20Guidance%3A%20Representation-Level%20Supervision%20for%20Time%20Series%20Forecasting%0AAuthor%3A%20Jiacheng%20Wang%20and%20Liang%20Fan%20and%20Baihua%20Li%20and%20Luyan%20Zhang%0AAbstract%3A%20Nowadays%2C%20time%20series%20forecasting%20is%20predominantly%20approached%20through%20the%20end-to-end%20training%20of%20deep%20learning%20architectures%20using%20error-based%20objectives.%20While%20this%20is%20effective%20at%20minimizing%20average%20loss%2C%20it%20encourages%20the%20encoder%20to%20discard%20informative%20yet%20extreme%20patterns.%20This%20results%20in%20smooth%20predictions%20and%20temporal%20representations%20that%20poorly%20capture%20salient%20dynamics.%20To%20address%20this%20issue%2C%20we%20propose%20ReGuider%2C%20a%20plug-in%20method%20that%20can%20be%20seamlessly%20integrated%20into%20any%20forecasting%20architecture.%20ReGuider%20leverages%20pretrained%20time%20series%20foundation%20models%20as%20semantic%20teachers.%20During%20training%2C%20the%20input%20sequence%20is%20processed%20together%20by%20the%20target%20forecasting%20model%20and%20the%20pretrained%20model.%20Rather%20than%20using%20the%20pretrained%20model%27s%20outputs%20directly%2C%20we%20extract%20its%20intermediate%20embeddings%2C%20which%20are%20rich%20in%20temporal%20and%20semantic%20information%2C%20and%20align%20them%20with%20the%20target%20model%27s%20encoder%20embeddings%20through%20representation-level%20supervision.%20This%20alignment%20process%20enables%20the%20encoder%20to%20learn%20more%20expressive%20temporal%20representations%2C%20thereby%20improving%20the%20accuracy%20of%20downstream%20forecasting.%20Extensive%20experimentation%20across%20diverse%20datasets%20and%20architectures%20demonstrates%20that%20our%20ReGuider%20consistently%20improves%20forecasting%20performance%2C%20confirming%20its%20effectiveness%20and%20versatility.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24262v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DForecasting%2520with%2520Guidance%253A%2520Representation-Level%2520Supervision%2520for%2520Time%2520Series%2520Forecasting%26entry.906535625%3DJiacheng%2520Wang%2520and%2520Liang%2520Fan%2520and%2520Baihua%2520Li%2520and%2520Luyan%2520Zhang%26entry.1292438233%3DNowadays%252C%2520time%2520series%2520forecasting%2520is%2520predominantly%2520approached%2520through%2520the%2520end-to-end%2520training%2520of%2520deep%2520learning%2520architectures%2520using%2520error-based%2520objectives.%2520While%2520this%2520is%2520effective%2520at%2520minimizing%2520average%2520loss%252C%2520it%2520encourages%2520the%2520encoder%2520to%2520discard%2520informative%2520yet%2520extreme%2520patterns.%2520This%2520results%2520in%2520smooth%2520predictions%2520and%2520temporal%2520representations%2520that%2520poorly%2520capture%2520salient%2520dynamics.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520ReGuider%252C%2520a%2520plug-in%2520method%2520that%2520can%2520be%2520seamlessly%2520integrated%2520into%2520any%2520forecasting%2520architecture.%2520ReGuider%2520leverages%2520pretrained%2520time%2520series%2520foundation%2520models%2520as%2520semantic%2520teachers.%2520During%2520training%252C%2520the%2520input%2520sequence%2520is%2520processed%2520together%2520by%2520the%2520target%2520forecasting%2520model%2520and%2520the%2520pretrained%2520model.%2520Rather%2520than%2520using%2520the%2520pretrained%2520model%2527s%2520outputs%2520directly%252C%2520we%2520extract%2520its%2520intermediate%2520embeddings%252C%2520which%2520are%2520rich%2520in%2520temporal%2520and%2520semantic%2520information%252C%2520and%2520align%2520them%2520with%2520the%2520target%2520model%2527s%2520encoder%2520embeddings%2520through%2520representation-level%2520supervision.%2520This%2520alignment%2520process%2520enables%2520the%2520encoder%2520to%2520learn%2520more%2520expressive%2520temporal%2520representations%252C%2520thereby%2520improving%2520the%2520accuracy%2520of%2520downstream%2520forecasting.%2520Extensive%2520experimentation%2520across%2520diverse%2520datasets%2520and%2520architectures%2520demonstrates%2520that%2520our%2520ReGuider%2520consistently%2520improves%2520forecasting%2520performance%252C%2520confirming%2520its%2520effectiveness%2520and%2520versatility.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.24262v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Forecasting%20with%20Guidance%3A%20Representation-Level%20Supervision%20for%20Time%20Series%20Forecasting&entry.906535625=Jiacheng%20Wang%20and%20Liang%20Fan%20and%20Baihua%20Li%20and%20Luyan%20Zhang&entry.1292438233=Nowadays%2C%20time%20series%20forecasting%20is%20predominantly%20approached%20through%20the%20end-to-end%20training%20of%20deep%20learning%20architectures%20using%20error-based%20objectives.%20While%20this%20is%20effective%20at%20minimizing%20average%20loss%2C%20it%20encourages%20the%20encoder%20to%20discard%20informative%20yet%20extreme%20patterns.%20This%20results%20in%20smooth%20predictions%20and%20temporal%20representations%20that%20poorly%20capture%20salient%20dynamics.%20To%20address%20this%20issue%2C%20we%20propose%20ReGuider%2C%20a%20plug-in%20method%20that%20can%20be%20seamlessly%20integrated%20into%20any%20forecasting%20architecture.%20ReGuider%20leverages%20pretrained%20time%20series%20foundation%20models%20as%20semantic%20teachers.%20During%20training%2C%20the%20input%20sequence%20is%20processed%20together%20by%20the%20target%20forecasting%20model%20and%20the%20pretrained%20model.%20Rather%20than%20using%20the%20pretrained%20model%27s%20outputs%20directly%2C%20we% {"title": "Diffusion-Based Makeup Transfer with Facial Region-Aware Makeup Features", "author": "Zheng Gao and Debin Meng and Yunqi Miao and Zhensong Zhang and Songcen Xu and Ioannis Patras and Jifei Song", "abstract": "Current diffusion-based makeup transfer methods commonly use the makeup information encoded by off-the-shelf foundation models (e.g., CLIP) as condition to preserve the makeup style of reference image in the generation. Although effective, these works mainly have two limitations: (1) foundation models pre-trained for generic tasks struggle to capture makeup styles; (2) the makeup features of reference image are injected to the diffusion denoising model as a whole for global makeup transfer, overlooking the facial region-aware makeup features (i.e., eyes, mouth, etc) and limiting the regional controllability for region-specific makeup transfer. To address these, in this work, we propose Facial Region-Aware Makeup features (FRAM), which has two stages: (1) makeup CLIP fine-tuning; (2) identity and facial region-aware makeup injection. For makeup CLIP fine-tuning, unlike prior works using off-the-shelf CLIP, we synthesize annotated makeup style data using GPT-o3 and text-driven image editing model, and then use the data to train a makeup CLIP encoder through self-supervised and image-text contrastive learning. For identity and facial region-aware makeup injection, we construct before-and-after makeup image pairs from the edited images in stage 1 and then use them to learn to inject identity of source image and makeup of reference image to the diffusion denoising model for makeup transfer. Specifically, we use learnable tokens to query the makeup CLIP encoder to extract facial region-aware makeup features for makeup injection, which is learned via an attention loss to enable regional control. As for identity injection, we use a ControlNet Union to encode source image and its 3D mesh simultaneously. The experimental results verify the superiority of our regional controllability and our makeup transfer performance. Code is available at https://github.com/zaczgao/Facial_Region-Aware_Makeup.", "link": "http://arxiv.org/abs/2603.20012v2", "date": "2026-03-25", "relevancy": 2.4198, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6141}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.614}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5922}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Diffusion-Based%20Makeup%20Transfer%20with%20Facial%20Region-Aware%20Makeup%20Features&body=Title%3A%20Diffusion-Based%20Makeup%20Transfer%20with%20Facial%20Region-Aware%20Makeup%20Features%0AAuthor%3A%20Zheng%20Gao%20and%20Debin%20Meng%20and%20Yunqi%20Miao%20and%20Zhensong%20Zhang%20and%20Songcen%20Xu%20and%20Ioannis%20Patras%20and%20Jifei%20Song%0AAbstract%3A%20Current%20diffusion-based%20makeup%20transfer%20methods%20commonly%20use%20the%20makeup%20information%20encoded%20by%20off-the-shelf%20foundation%20models%20%28e.g.%2C%20CLIP%29%20as%20condition%20to%20preserve%20the%20makeup%20style%20of%20reference%20image%20in%20the%20generation.%20Although%20effective%2C%20these%20works%20mainly%20have%20two%20limitations%3A%20%281%29%20foundation%20models%20pre-trained%20for%20generic%20tasks%20struggle%20to%20capture%20makeup%20styles%3B%20%282%29%20the%20makeup%20features%20of%20reference%20image%20are%20injected%20to%20the%20diffusion%20denoising%20model%20as%20a%20whole%20for%20global%20makeup%20transfer%2C%20overlooking%20the%20facial%20region-aware%20makeup%20features%20%28i.e.%2C%20eyes%2C%20mouth%2C%20etc%29%20and%20limiting%20the%20regional%20controllability%20for%20region-specific%20makeu

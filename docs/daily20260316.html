{"title": "SortScrews: A Dataset and Baseline for Real-time Screw Classification", "author": "Tianhao Fu and Bingxuan Yang and Juncheng Guo and Shrena Sribalan and Yucheng Chen", "abstract": "Automatic identification of screw types is important for industrial automation, robotics, and inventory management. However, publicly available datasets for screw classification are scarce, particularly for controlled single-object scenarios commonly encountered in automated sorting systems. In this work, we introduce $\\textbf{SortScrews}$, a dataset for casewise visual classification of screws. The dataset contains 560 RGB images at $512\\times512$ resolution covering six screw types and a background class. Images are captured using a standardized acquisition setup and include mild variations in lighting and camera perspective across four capture settings.\n  To facilitate reproducible research and dataset expansion, we also provide a reusable data collection script that allows users to easily construct similar datasets for custom hardware components using inexpensive camera setups.\n  We establish baseline results using transfer learning with EfficientNet-B0 and ResNet-18 classifiers pretrained on ImageNet. In addition, we conduct a well-explored failure analysis. Despite the limited dataset size, these lightweight models achieve strong classification accuracy, demonstrating that controlled acquisition conditions enable effective learning even with relatively small datasets. The dataset, collection pipeline, and baseline training code are publicly available at https://github.com/ATATC/SortScrews.", "link": "http://arxiv.org/abs/2603.13027v1", "date": "2026-03-13", "relevancy": 2.304, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4683}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.459}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SortScrews%3A%20A%20Dataset%20and%20Baseline%20for%20Real-time%20Screw%20Classification&body=Title%3A%20SortScrews%3A%20A%20Dataset%20and%20Baseline%20for%20Real-time%20Screw%20Classification%0AAuthor%3A%20Tianhao%20Fu%20and%20Bingxuan%20Yang%20and%20Juncheng%20Guo%20and%20Shrena%20Sribalan%20and%20Yucheng%20Chen%0AAbstract%3A%20Automatic%20identification%20of%20screw%20types%20is%20important%20for%20industrial%20automation%2C%20robotics%2C%20and%20inventory%20management.%20However%2C%20publicly%20available%20datasets%20for%20screw%20classification%20are%20scarce%2C%20particularly%20for%20controlled%20single-object%20scenarios%20commonly%20encountered%20in%20automated%20sorting%20systems.%20In%20this%20work%2C%20we%20introduce%20%24%5Ctextbf%7BSortScrews%7D%24%2C%20a%20dataset%20for%20casewise%20visual%20classification%20of%20screws.%20The%20dataset%20contains%20560%20RGB%20images%20at%20%24512%5Ctimes512%24%20resolution%20covering%20six%20screw%20types%20and%20a%20background%20class.%20Images%20are%20captured%20using%20a%20standardized%20acquisition%20setup%20and%20include%20mild%20variations%20in%20lighting%20and%20camera%20perspective%20across%20four%20capture%20settings.%0A%20%20To%20facilitate%20reproducible%20research%20and%20dataset%20expansion%2C%20we%20also%20provide%20a%20reusable%20data%20collection%20script%20that%20allows%20users%20to%20easily%20construct%20similar%20datasets%20for%20custom%20hardware%20components%20using%20inexpensive%20camera%20setups.%0A%20%20We%20establish%20baseline%20results%20using%20transfer%20learning%20with%20EfficientNet-B0%20and%20ResNet-18%20classifiers%20pretrained%20on%20ImageNet.%20In%20addition%2C%20we%20conduct%20a%20well-explored%20failure%20analysis.%20Despite%20the%20limited%20dataset%20size%2C%20these%20lightweight%20models%20achieve%20strong%20classification%20accuracy%2C%20demonstrating%20that%20controlled%20acquisition%20conditions%20enable%20effective%20learning%20even%20with%20relatively%20small%20datasets.%20The%20dataset%2C%20collection%20pipeline%2C%20and%20baseline%20training%20code%20are%20publicly%20available%20at%20https%3A//github.com/ATATC/SortScrews.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13027v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSortScrews%253A%2520A%2520Dataset%2520and%2520Baseline%2520for%2520Real-time%2520Screw%2520Classification%26entry.906535625%3DTianhao%2520Fu%2520and%2520Bingxuan%2520Yang%2520and%2520Juncheng%2520Guo%2520and%2520Shrena%2520Sribalan%2520and%2520Yucheng%2520Chen%26entry.1292438233%3DAutomatic%2520identification%2520of%2520screw%2520types%2520is%2520important%2520for%2520industrial%2520automation%252C%2520robotics%252C%2520and%2520inventory%2520management.%2520However%252C%2520publicly%2520available%2520datasets%2520for%2520screw%2520classification%2520are%2520scarce%252C%2520particularly%2520for%2520controlled%2520single-object%2520scenarios%2520commonly%2520encountered%2520in%2520automated%2520sorting%2520systems.%2520In%2520this%2520work%252C%2520we%2520introduce%2520%2524%255Ctextbf%257BSortScrews%257D%2524%252C%2520a%2520dataset%2520for%2520casewise%2520visual%2520classification%2520of%2520screws.%2520The%2520dataset%2520contains%2520560%2520RGB%2520images%2520at%2520%2524512%255Ctimes512%2524%2520resolution%2520covering%2520six%2520screw%2520types%2520and%2520a%2520background%2520class.%2520Images%2520are%2520captured%2520using%2520a%2520standardized%2520acquisition%2520setup%2520and%2520include%2520mild%2520variations%2520in%2520lighting%2520and%2520camera%2520perspective%2520across%2520four%2520capture%2520settings.%250A%2520%2520To%2520facilitate%2520reproducible%2520research%2520and%25 {"title": "Continuous Design and Reprogramming of Totimorphic Structures for Space Applications", "author": "Dominik Dold and Amy Thomas and Nicole Rosi and Jai Grover and Dario Izzo", "abstract": "Recently, a class of mechanical lattices with reconfigurable, zero-stiffness structures has been proposed, called Totimorphic lattices. In this work, we introduce a computational framework that enables continuous reprogramming of a Totimorphic lattice's effective properties, such as mechanical and optical behaviour, through geometric changes alone, demonstrated using computer simulations. Our approach is differentiable and guarantees valid Totimorphic configurations throughout the optimisation process, providing not only target states with desired properties but also continuous trajectories in configuration space that connect them. This enables reprogrammable structures in which actuators are controlled via automatic differentiation on an objective-dependent cost function, continuously adapting the lattice to achieve a given goal. We focus on deep space applications, where harsh and resource-constrained environments demand solutions that combine flexibility, efficiency, and autonomy. As proof of concept, we present two scenarios: a reprogrammable disordered lattice material and a space telescope mirror with adjustable focal length. The introduced framework is adaptable to a wide range of Totimorphic designs and objectives, providing a lightweight model for endowing physical systems with autonomous self-configuration and self-repair capabilities.", "link": "http://arxiv.org/abs/2411.15266v2", "date": "2026-03-13", "relevancy": 2.3001, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4645}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4601}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continuous%20Design%20and%20Reprogramming%20of%20Totimorphic%20Structures%20for%20Space%20Applications&body=Title%3A%20Continuous%20Design%20and%20Reprogramming%20of%20Totimorphic%20Structures%20for%20Space%20Applications%0AAuthor%3A%20Dominik%20Dold%20and%20Amy%20Thomas%20and%20Nicole%20Rosi%20and%20Jai%20Grover%20and%20Dario%20Izzo%0AAbstract%3A%20Recently%2C%20a%20class%20of%20mechanical%20lattices%20with%20reconfigurable%2C%20zero-stiffness%20structures%20has%20been%20proposed%2C%20called%20Totimorphic%20lattices.%20In%20this%20work%2C%20we%20introduce%20a%20computational%20framework%20that%20enables%20continuous%20reprogramming%20of%20a%20Totimorphic%20lattice%27s%20effective%20properties%2C%20such%20as%20mechanical%20and%20optical%20behaviour%2C%20through%20geometric%20changes%20alone%2C%20demonstrated%20using%20computer%20simulations.%20Our%20approach%20is%20differentiable%20and%20guarantees%20valid%20Totimorphic%20configurations%20throughout%20the%20optimisation%20process%2C%20providing%20not%20only%20target%20states%20with%20desired%20properties%20but%20also%20continuous%20trajectories%20in%20configuration%20space%20that%20connect%20them.%20This%20enables%20reprogrammable%20structures%20in%20which%20actuators%20are%20controlled%20via%20automatic%20differentiation%20on%20an%20objective-dependent%20cost%20function%2C%20continuously%20adapting%20the%20lattice%20to%20achieve%20a%20given%20goal.%20We%20focus%20on%20deep%20space%20applications%2C%20where%20harsh%20and%20resource-constrained%20environments%20demand%20solutions%20that%20combine%20flexibility%2C%20efficiency%2C%20and%20autonomy.%20As%20proof%20of%20concept%2C%20we%20present%20two%20scenarios%3A%20a%20reprogrammable%20disordered%20lattice%20material%20and%20a%20space%20telescope%20mirror%20with%20adjustable%20focal%20length.%20The%20introduced%20framework%20is%20adaptable%20to%20a%20wide%20range%20of%20Totimorphic%20designs%20and%20objectives%2C%20providing%20a%20lightweight%20model%20for%20endowing%20physical%20systems%20with%20autonomous%20self-configuration%20and%20self-repair%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2411.15266v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContinuous%2520Design%2520and%2520Reprogramming%2520of%2520Totimorphic%2520Structures%2520for%2520Space%2520Applications%26entry.906535625%3DDominik%2520Dold%2520and%2520Amy%2520Thomas%2520and%2520Nicole%2520Rosi%2520and%2520Jai%2520Grover%2520and%2520Dario%2520Izzo%26entry.1292438233%3DRecently%252C%2520a%2520class%2520of%2520mechanical%2520lattices%2520with%2520reconfigurable%252C%2520zero-stiffness%2520structures%2520has%2520been%2520proposed%252C%2520called%2520Totimorphic%2520lattices.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520computational%2520framework%2520that%2520enables%2520continuous%2520reprogramming%2520of%2520a%2520Totimorphic%2520lattice%2527s%2520effective%2520properties%252C%2520such%2520as%2520mechanical%2520and%2520optical%2520behaviour%252C%2520through%2520geometric%2520changes%2520alone%252C%2520demonstrated%2520using%2520computer%2520simulations.%2520Our%2520approach%2520is%2520differentiable%2520and%2520guarantees%2520valid%2520Totimorphic%2520configurations%2520throughout%2520the%2520optimisation%2520process%252C%2520providing%2520not%2520only%2520target%2520states%2520with%2520desired%2520properties%2520but%2520also%2520continuous%2520trajectories%2520in%2520configuration%2520space%2520that%2520connect%2520them.%2520This%2520enables%2520reprogrammable%2520structures%2520in%2520which%2520actuators%2520are%2520controlled%2520via%2520automatic%2520differentiation%2520on%2520an%2520objective-dependent%2520cost%2520function%252C%2520continuously%2520adapting%2520the%2520lattice%2520to%2520achi {"title": "VIRD: View-Invariant Representation through Dual-Axis Transformation for Cross-View Pose Estimation", "author": "Juhye Park and Wooju Lee and Dasol Hong and Changki Sung and Youngwoo Seo and Dongwan Kang and Hyun Myung", "abstract": "Accurate global localization is crucial for autonomous driving and robotics, but GNSS-based approaches often degrade due to occlusion and multipath effects. As an emerging alternative, cross-view pose estimation predicts the 3-DoF camera pose corresponding to a ground-view image with respect to a geo-referenced satellite image. However, existing methods struggle to bridge the significant viewpoint gap between the ground and satellite views mainly due to limited spatial correspondences. We propose a novel cross-view pose estimation method that constructs view-invariant representations through dual-axis transformation (VIRD). VIRD first applies a polar transformation to the satellite view to establish horizontal correspondence, then uses context-enhanced positional attention on the ground and polar-transformed satellite features to resolve vertical misalignment, explicitly mitigating the viewpoint gap. A view-reconstruction loss is introduced to strengthen the view invariance further, encouraging the derived representations to reconstruct the original and cross-view images. Experiments on the KITTI and VIGOR datasets demonstrate that VIRD outperforms the state-of-the-art methods without orientation priors, reducing median position and orientation errors by 50.7% and 76.5% on KITTI, and 18.0% and 46.8% on VIGOR, respectively.", "link": "http://arxiv.org/abs/2603.12918v1", "date": "2026-03-13", "relevancy": 2.2907, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5919}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/ resentations%20to%20reconstruct%20the%20original%20and%20cross-view%20images.%20Experiments%20on%20the%20KITTI%20and%20VIGOR%20datasets%20demonstrate%20that%20VIRD%20outperforms%20the%20state-of-the-art%20methods%20without%20orientation%20priors%2C%20reducing%20median%20position%20and%20orientation%20errors%20by%2050.7%25%20and%2076.5%25%20on%20KITTI%2C%20and%2018.0%25%20and%2046.8%25%20on%20VIGOR%2C%20respectively.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12918v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVIRD%253A%2520View-Invariant%2520Representation%2520through%2520Dual-Axis%2520Transformation%2520for%2520Cross-View%2520Pose%2520Estimation%26entry.906535625%3DJuhye%2520Park%2520and%2520Wooju%2520Lee%2520and%2520Dasol%2520Hong%2520and%2520Changki%2520Sung%2520and%2520Youngwoo%2520Seo%2520and%2520Dongwan%2520Kang%2520and%2520Hyun%2520Myung%26entry.1292438233%3DAccurate%2520global%2520localization%2520is%2520crucial%2520for%2520autonomous%2520driving%2520and%2520robotics%252C%2520but%2520GNSS-based%2520approaches%2520often%2520degrade%2520due%2520to%2520occlusion%2520and%2520multipath%2520effects.%2520As%2520an%2520emerging%2520alternative%252C%2520cross-view%2520pose%2520estimation%2520predicts%2520the%25203-DoF%2520camera%2520pose%2520corresponding%2520to%2520a%2520ground-view%2520image%2520with%2520respect%2520to%2520a%2520geo-referenced%2520satellite%2520image.%2520However%252C%2520existing%2520methods%2520struggle%2520to%2520bridge%2520the%2520significant%2520viewpoint%2520gap%2520between%2520the%2520ground%2520and%2520satellite%2520views%2520mainly%2520due%2520to%2520limited%2520spatial%2520correspondences.%2520We%2520propose%2520a%2520novel%2520cross-view%2520pose%2520estimation%2520method%2520that%2520constructs%2520view-invariant%2520representations%2520through%2520dual-axis%2520transformation%2520%2528VIRD%2529.%2520VIRD%2520first%2520applies%2520a%2520polar%2520tra {"title": "DecoVLN: Decoupling Observation, Reasoning, and Correction for Vision-and-Language Navigation", "author": "Zihao Xin and Wentong Li and Yixuan Jiang and Bin Wang and Runming Cong and Jie Qin and Shengjun Huang", "abstract": "Vision-and-Language Navigation (VLN) requires agents to follow long-horizon instructions and navigate complex 3D environments. However, existing approaches face two major challenges: constructing an effective long-term memory bank and overcoming the compounding errors problem. To address these issues, we propose DecoVLN, an effective framework designed for robust streaming perception and closed-loop control in long-horizon navigation. First, we formulate long-term memory construction as an optimization problem and introduce adaptive refinement mechanism that selects frames from a historical candidate pool by iteratively optimizing a unified scoring function. This function jointly balances three key criteria: semantic relevance to the instruction, visual diversity from the selected memory, and temporal coverage of the historical trajectory. Second, to alleviate compounding errors, we introduce a state-action pair-level corrective finetuning strategy. By leveraging geodesic distance between states to precisely quantify deviation from the expert trajectory, the agent collects high-quality state-action pairs in the trusted region while filtering out the polluted data with low relevance. This improves both the efficiency and stability of error correction. Extensive experiments demonstrate the effectiveness of DecoVLN, and we have deployed it in real-world environments.", "link": "http://arxiv.org/abs/2603.13133v1", "date": "2026-03-13", "relevancy": 2.2851, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5736}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5736}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5595}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DecoVLN%3A%20Decoupling%20Observation%2C%20Reasoning%2C%20and%20Correction%20for%20Vision-and-Language%20Navigation&body=Title%3A%20DecoVLN%3A%20Decoupling%20Observation%2C%20Reasoning%2C%20and%20Correction%20for%20Vision-and-Language%20Navigation%0AAuthor%3A%20Zihao%20Xin%20and%20Wentong%20Li%20and%20Yixuan%20Jiang%20and%20Bin%20Wang%20and%20Runming%20Cong%20and%20Jie%20Qin%20and%20Shengjun%20Huang%0AAbstract%3A%20Vision-and-Language%20Navigation%20%28VLN%29%20requires%20agents%20to%20follow%20long-horizon%20instructions%20and%20navigate%20complex%203D%20environments.%20However%2C%20existing%20approaches%20face%20two%20major%20challenges%3A%20constructing%20an%20effective%20long-term%20memory%20bank%20and%20overcoming%20the%20compounding%20errors%20problem.%20To%20address%20these%20issues%2C%20we%20propose%20DecoVLN%2C%20an%20effective%20framework%20designed%20for%20robust%20streaming%20perception%20and%20closed-loop%20control%20in%20long-horizon%20navigation.%20First%2C%20we%20formulate%20long-term%20memory%20construction%20as%20an%20optimization%20problem%20and%20introduce%20adaptive%20refinement%20mechanism%20that%20selects%20frames%20from%20a%20historical%20candidate%20pool%20by%20iteratively%20optimizing%20a%20unified%20scoring%20function.%20This%20function%20jointly%20balances%20three%20key%20criteria%3A%20semantic%20relevance%20to%20the%20instruction%2C%20visual%20diversity%20from%20the%20selected%20memory%2C%20and%20temporal%20coverage%20of%20the%20historical%20trajectory.%20Second%2C%20to%20alleviate%20compounding%20errors%2C%20we%20introduce%20a%20state-action%20pair-level%20corrective%20finetuning%20strategy.%20By%20leveraging%20geodesic%20distance%20between%20states%20to%20precisely%20quantify%20deviation%20from%20the%20expert%20trajectory%2C%20the%20agent%20collects%20high-quality%20state-action%20pairs%20in%20the%20trusted%20region%20while%20filtering%20out%20the%20polluted%20data%20with%20low%20relevance.%20This%20improves%20both%20the%20efficiency%20and%20stability%20of%20error%20correction.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20DecoVLN%2C%20and%20we%20have%20deployed%20it%20in%20real-world%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13133v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoVLN%253A%2520Decoupling%2520Observation%252C%2520Reasoning%252C%2520and%2520Correction%2520for%2520Vision-and-Language%2520Navigation%26entry.906535625%3DZihao%2520Xin%2520and%2520Wentong%2520Li%2520and%2520Yixuan%2520Jiang%2520and%2520Bin%2520Wang%2520and%2520Runming%2520Cong%2520and%2520Jie%2520Qin%2520and%2520Shengjun%2520Huang%26entry.1292438233%3DVision-and-Language%2520Navigation%2520%2528VLN%2529%2520requires%2520agents%2520to%2520follow%2520long-horizon%2520instructions%2520and%2520navigate%2520complex%25203D%2520environments.%2520However%252C%2520existing%2520approaches%2520face%2520two%2520major%2520challenges%253A%2520constructing%2520an%2520effective%2520long-term%2520memory%2520bank%2520and%2520overcoming%2520the%2520compounding%2520errors%2520problem.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520DecoVLN%252C%2520an%2520effective%2520framework%2520designed%2520for%2520robust%2520streaming%2520perception%2520and%2520closed-loop%2520control%2520in%2520long-horizon%2520navigation.%2520First%252C%2520we%2520formulate%2520long-term%2520memory%2520construction%2520as%2520an%2520optimization%2520problem%2520and%2520introduce%2520adaptive%2520refinement%2520mechanism%2520that%2520selects%2520frames%2520from%2520a%2520historical%2520candidate%2520pool%2520by%2520iteratively%2520optimizing%2520a%2520unified%2520scor .%20To%20address%20these%20issues%2C%20we%20propose%20DecoVLN%2C%20an%20effective%20framework%20designed%20for%20robust%20streaming%20perception%20and%20closed-loop%20control%20in%20long-horizon%20navigation.%20First%2C%20we%20formulate%20long-term%20memory%20construction%20as%20an%20optimization%20problem%20and%20introduce%20adaptive%20refinement%20mechanism%20that%20selects%20frames%20from%20a%20historical%20candidate%20pool%20by%20iteratively%20optimizing%20a%20unified%20scoring%20function.%20This%20function%20jointly%20balances%20three%20key%20criteria%3A%20semantic%20relevance%20to%20the%20instruction%2C%20visual%20diversity%20from%20the%20selected%20memory%2C%20and%20temporal%20coverage%20of%20the%20historical%20trajectory.%20Second%2C%20to%20alleviate%20compounding%20errors%2C%20we%20introduce%20a%20state-action%20pair-level%20corrective%20finetuning%20strategy.%20By%20leveraging%20geodesic%20distance%20between%20states%20to%20precisely%20quantify%20deviation%20from%20the%20expert%20trajectory%2C%20the%20agent%20collects%20high-quality%20state-action%20pairs%20in%20the%20trusted%20region%20while%20filtering%20out%20the%20polluted%20data%20with%20low%20relevance.%20This%20improves%20both%20the%20efficiency%20and%20stability%20of%20error%20correction.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20DecoVLN%2C%20and%20we%20have%20deployed%20it%20in%20real-world%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2603.13133v1&entry.124074799=Read"},
{"title": "Consistent and Efficient MSCKF-based LiDAR-Inertial Odometry with Inferred Cluster-to-Plane Constraints for UAVs", "author": "Jinwen Zhu and Xudong Zhao and Fangcheng Zhu and Jun Hu and Shi Jin and Yinian Mao and Guoquan Huang", "abstract": "Robust and accurate navigation is critical for Unmanned Aerial Vehicles (UAVs) especially for those with stringent Size, Weight, and Power (SWaP) constraints. However, most state-of-the-art (SOTA) LiDAR-Inertial Odometry (LIO) systems still suffer from estimation inconsistency and computational bottlenecks when deployed on such platforms. To address these issues, this paper proposes a consistent and efficient tightly-coupled LIO framework tailored for UAVs. Within the efficient Multi-State Constraint Kalman Filter (MSCKF) framework, we build coplanar constraints inferred from planar features observed across a sliding window. By applying null-space projection to sliding-window coplanar constraints, we eliminate the direct dependency on feature parameters in the state vector, thereby mitigating overconfidence and improving consistency. More importantly, to further boost the efficiency, we introduce a parallel voxel-based data association and a novel compact cluster-to-plane measurement model. This compact measurement model losslessly reduces observation dimensionality and significantly accelerating the update process. Extensive evaluations demonstrate that our method outperforms most state-of-the-art (SOTA) approaches by providing a superior balance of consistency and efficiency. It exhibits improved robustness in degenerate scenarios, achieves the lowest memory usage via its map-free nature, and runs in real-time on resource-constrained embedded platforms (e.g., NVIDIA Jetson TX2).", "link": "http://arxiv.org/abs/2603.12904v1", "date": "2026-03-13", "relevancy": 2.2681, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6016}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5532}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Consistent%20and%20Efficient%20MSCKF-based%20LiDAR-Inertial%20Odometry%20with%20Inferred%20Cluster-to-Plane%20Constraints%20for%20UAVs&body=Title%3A%20Consistent%20and%20Efficient%20MSCKF-based%20LiDAR-Inertial%20Odometry%20with%20Inferred%20Cluster-to-Plane%20Constraints%20for%20UAVs%0AAuthor%3A%20Jinwen%20Zhu%20and%20Xudong%20Zhao%20and%20Fangcheng%20Zhu%20and%20Jun%20Hu%20and%20Shi%20Jin%20and%20Yinian%20Mao%20and%20Guoquan%20Huang%0AAbstract%3A%20Robust%20and%20accurate%20navigation%20is%20critical%20for%20Unmanned%20Aerial%20Vehicles%20%28UAVs%29%20especially%20for%20those%20with%20stringent%20Size%2C%20Weight%2C%20and%20Power%20%28SWaP%29%20constraints.%20However%2C%20most%20state-of-the-art%20%28SOTA%29%20LiDAR-Inertial%20Odometry%20%28LIO%29%20systems%20still%20suffer%20from%20estimation%20inconsistency%20and%20computational%20bottlenecks%20when%20deployed%20on%20such%20platforms.%20To%20address%20these%20issues%2C%20this%20paper%20proposes%20a%20consistent%20and%20efficient%20tightly-coupled%20LIO%20framework%20tailored%20for%20UAVs.%20Within%20the%20efficient%20Multi-State%20Constraint%20Kalman%20Filter%20%28MSCKF%29%20framework%2C%20we%20build%20coplanar%20constraints%20inferred%20from%20planar%20features%20observed%20across%20a%20sliding%20window.%20By%20applying%20null-space%20projection%20to%20sliding-window%20coplanar%20constraints%2C%20we%20eliminate%20the%20direct%20dependency%20on%20feature%20parameters%20in%20the%20state%20vector%2C%20thereby%20mitigating%20overconfidence%20and%20improving%20consistency.%20More%20importantly%2C%20to%20further%20boost%20the%20efficiency%2C%20we%20introduce%20a%20parallel%20voxel-based%20data%20association%20and%20a%20novel%20compact%20cluster-to-plane%20measurement%20model.%20This%20compact%20measurement%20model%20losslessly%20reduces%20observation%20dimensionality%20and%20significantly%20accelerating%20the%20update%20process.%20Extensive%20evaluations%20demonstrate%20that%20our%20method%20outperforms%20most%20state-of-the-art%20%28SOTA%29%20approaches%20by%20providing%20a%20superior%20balance%20of%20consistency%20and%20efficiency.%20It%20exhibits%20improved%20robustness%20in%20degenerate%20scenarios%2C%20achieves%20the%20lowest%20memory%20usage%20via%20its%20map-free%20nature%2C%20and%20runs%20in%20real-time%20on%20resource-constrained%20embedded%20platforms%20%28e.g.%2C%20NVIDIA%20Jetson%20TX2%29.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12904v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConsistent%2520and%2520Efficient%2520MSCKF-based%2520LiDAR-Inertial%2520Odometry%2520with%2520Inferred%2520Cluster-to-Plane%2520Constraints%2520for%2520UAVs%26entry.906535625%3DJinwen%2520Zhu%2520and%2520Xudong%2520Zhao%2520and%2520Fangcheng%2520Zhu%2520and%2520Jun%2520Hu%2520and%2520Shi%2520Jin%2520and%2520Yinian%2520Mao%2520and%2520Guoquan%2520Huang%26entry.1292438233%3DRobust%2520and%2520accurate%2520navigation%2520is%2520critical%2520for%2520Unmanned%2520Aerial%2520Vehicles%2520%2528UAVs%2529%2520especially%2520for%2520those%2520with%2520stringent%2520Size%252C%2520Weight%252C%2520and%2520Power%2520%2528SWaP%2529%2520constraints.%2520However%252C%2520most%2520state-of-the-art%2520%2528SOTA%2529%2520LiDAR-Inertial%2520Odometry%2520%2528LIO%2529%2520systems%2520still%2520suffer%2520from%2520estimation%2520inconsistency%2520and%2520computational%2520bottlenecks%2520when%2520deployed%2520on%2520such%2520platforms.%2520To%2520address%2520these%2520 {"title": "SuperQuadricOcc: Real-Time Self-Supervised Semantic Occupancy Estimation with Superquadric Volume Rendering", "author": "Seamie Hayes and Alexandre Boulch and Andrei Bursuc and Reenu Mohandas and Ganesh Sistu and Tim Brophy and Ciaran Eising", "abstract": "Self-supervision for semantic occupancy estimation is appealing as it removes the labour-intensive manual annotation, thus allowing one to scale to larger autonomous driving datasets. Superquadrics offer an expressive shape family very suitable for this task, yet their deployment in a self-supervised setting has been hindered by the lack of efficient rendering methods to bridge the 3D scene representation and 2D training pseudo-labels. To address this, we introduce SuperQuadricOcc, the first self-supervised occupancy model to leverage superquadrics for scene representation. To overcome the rendering limitation, we propose a real-time volume renderer that preserves the fidelity of the superquadric shape during rendering. It relies on spatial superquadric-voxel indexing, restricting each ray sample to query only nearby superquadrics, thereby greatly reducing memory usage and computational cost. Using drastically fewer primitives than previous Gaussian-based methods, SuperQuadricOcc achieves state-of-the-art performance on the Occ3D-nuScenes dataset, while running at real-time inference speeds with substantially reduced memory footprint.", "link": "http://arxiv.org/abs/2511.17361v4", "date": "2026-03-13", "relevancy": 2.242, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5802}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5475}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SuperQuadricOcc%3A%20Real-Time%20Self-Supervised%20Semantic%20Occupancy%20Estimation%20with%20Superquadric%20Volume%20Rendering&body=Title%3A%20SuperQuadricOcc%3A%20Real-Time%20Self-Supervised%20Semantic%20Occupancy%20Estimation%20with%20Superquadric%20Volume%20Rendering%0AAuthor%3A%20Seamie%20Hayes%20and%20Alexandre%20Boulch%20and%20Andrei%20Bursuc%20and%20Reenu%20Mohandas%20and%20Ganesh%20Sistu%20and%20Tim%20Brophy%20and%20Ciaran%20Eising%0AAbstract%3A%20Self-supervision%20for%20semantic%20occupancy%20estimation%20is%20appealing%20as%20it%20removes%20the%20labour-intensive%20manual%20annotation%2C%20thus%20allowing%20one%20to%20scale%20to%20larger%20autonomous%20driving%20datasets.%20Superquadrics%20offer%20an%20expressive%20shape%20family%20very%20suitable%20for%20this%20task%2C%20yet%20their%20deployment%20in%20a%20self-supervised%20setting%20has%20been%20hindered%20by%20the%20lack%20of%20efficient%20rendering%20methods%20to%20bridge%20the%203D%20scene%20representation%20and%202D%20training%20pseudo-labels.%20To%20address%20this%2C%20we%20introduce%20SuperQuadricOcc%2C%20the%20first%20self-supervised%20occupancy%20model%20to%20leverage%20superquadrics%20for%20scene%20representation.%20To%20overcome%20the%20rendering%20limitation%2C%20we%20propose%20a%20real-time%20volume%20renderer%20that%20preserves%20the%20fidelity%20of%20the%20superquadric%20shape%20during%20rendering.%20It%20relies%20on%20spatial%20superquadric-voxel%20indexing%2C%20restricting%20each%20ray%20sample%20to%20query%20only%20nearby%20superquadrics%2C%20thereby%20greatly%20reducing%20memory%20usage%20and%20computational%20cost.%20Using%20drastically%20fewer%20primitives%20than%20previous%20Gaussian-based%20methods%2C%20SuperQuadricOcc%20achieves%20state-of-the-art%20performance%20on%20the%20Occ3D-nuScenes%20dataset%2C%20while%20running%20at%20real-time%20inference%20speeds%20with%20substantially%20reduced%20memory%20footprint.%0ALink%3A%20h lly%2520fewer%2520primitives%2520than%2520previous%2520Gaussian-based%2520methods%252C%2520SuperQuadricOcc%2520achieves%2520state-of-the-art%2520performance%2520on%2520the%2520Occ3D-nuScenes%2520dataset%252C%2520while%2520running%2520at%2520real-time%2520inference%2520speeds%2520with%2520substantially%2520reduced%2520memory%2520footprint.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.17361v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SuperQuadricOcc%3A%20Real-Time%20Self-Supervised%20Semantic%20Occupancy%20Estimation%20with%20Superquadric%20Volume%20Rendering&entry.906535625=Seamie%20Hayes%20and%20Alexandre%20Boulch%20and%20Andrei%20Bursuc%20and%20Reenu%20Mohandas%20and%20Ganesh%20Sistu%20and%20Tim%20Brophy%20and%20Ciaran%20Eising&entry.1292438233=Self-supervision%20for%20semantic%20occupancy%20estimation%20is%20appealing%20as%20it%20removes%20the%20labour-intensive%20manual%20annotation%2C%20thus%20allowing%20one%20to%20scale%20to%20larger%20autonomous%20driving%20datasets.%20Superquadrics%20offer%20an%20expressive%20shape%20family%20very%20suitable%20for%20this%20task%2C%20yet%20their%20deployment%20in%20a%20self-supervised%20setting%20has%20been%20hindered%20by%20the%20lack%20of%20efficient%20rendering%20methods%20to%20bridge%20the%203D%20scene%20representation%20and%202D%20training%20pseudo-labels.%20To%20address%20this%2C%20we%20introduce%20SuperQuadricOcc%2C%20the%20first%20self-supervised%20occupancy%20model%20to%20leverage%20superquadrics%20for%20scene%20representation.%20To%20overcome%20the%20rendering%20limitation%2C%20we%20propose%20a%20real-time%20volume%20renderer%20that%20preserves%20the%20fidelity%20of%20the%20superquadric%20shape%20during%20rendering.%20It%20relies%20on%20spatial%20superquadric-voxel%20indexing%2C%20restricting%20each%20ray%20sample%20to%20query%20only%20nearby%20superquadrics%2C%20thereby%20greatly%20reducing%20memory%2 {"title": "L2GTX: From Local to Global Time Series Explanations", "author": "Ephrem Tibebe Mekonnen and Luca Longo and Lucas Rizzo and Pierpaolo Dondio", "abstract": "Deep learning models achieve high accuracy in time series classification, yet understanding their class-level decision behaviour remains challenging. Explanations for time series must respect temporal dependencies and identify patterns that recur across instances. Existing approaches face three limitations: model-agnostic XAI methods developed for images and tabular data do not readily extend to time series, global explanation synthesis for time series remains underexplored, and most existing global approaches are model-specific. We propose L2GTX, a model-agnostic framework that generates class-wise global explanations by aggregating local explanations from a representative set of instances. L2GTX extracts clusters of parameterised temporal event primitives, such as increasing or decreasing trends and local extrema, together with their importance scores from instance-level explanations produced by LOMATCE. These clusters are merged across instances to reduce redundancy, and an instance-cluster importance matrix is used to estimate global relevance. Under a user-defined instance selection budget, L2GTX selects representative instances that maximise coverage of influential clusters. Events from the selected instances are then aggregated into concise class-wise global explanations. Experiments on six benchmark time series datasets show that L2GTX produces compact and interpretable global explanations while maintaining stable global faithfulness measured as mean local surrogate fidelity.", "link": "http://arxiv.org/abs/2603.13065v1", "date": "2026-03-13", "relevancy": 2.2322, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4466}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "ForgeDreamer: Industrial Text-to-3D Generation with Multi-Expert LoRA and Cross-View Hypergraph", "author": "Junhao Cai and Deyu Zeng and Junhao Pang and Lini Li and Zongze Wu and Xiaopin Zhong", "abstract": "Current text-to-3D generation methods excel in natural scenes but struggle with industrial applications due to two critical limitations: domain adaptation challenges where conventional LoRA fusion causes knowledge interference across categories, and geometric reasoning deficiencies where pairwise consistency constraints fail to capture higher-order structural dependencies essential for precision manufacturing. We propose a novel framework named ForgeDreamer addressing both challenges through two key innovations. First, we introduce a Multi-Expert LoRA Ensemble mechanism that consolidates multiple category-specific LoRA models into a unified representation, achieving superior cross-category generalization while eliminating knowledge interference. Second, building on enhanced semantic understanding, we develop a Cross-View Hypergraph Geometric Enhancement approach that captures structural dependencies spanning multiple viewpoints simultaneously. These components work synergistically improved semantic understanding, enables more effective geometric reasoning, while hypergraph modeling ensures manufacturing-level consistency. Extensive experiments on a custom industrial dataset demonstrate superior semantic generalization and enhanced geometric fidelity compared to state-of-the-art approaches. Our code and data are provided in the supplementary material attached in the appendix for review purposes.", "link": "http://arxiv.org/abs/2603.09266v2", "date": "2026-03-13", "relevancy": 2.2316, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5618}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link {"title": "MaDiS: Taming Masked Diffusion Language Models for Sign Language Generation", "author": "Ronglai Zuo and Rolandos Alexandros Potamias and Qi Sun and Evangelos Ververas and Jiankang Deng and Stefanos Zafeiriou", "abstract": "Sign language generation (SLG) aims to translate written texts into expressive sign motions, bridging communication barriers for the Deaf and Hard-of-Hearing communities. Recent studies formulate SLG within the language modeling framework using autoregressive language models, which suffer from unidirectional context modeling and slow token-by-token inference. To address these limitations, we present MaDiS, a masked-diffusion-based language model for SLG that captures bidirectional dependencies and supports efficient parallel multi-token generation. We further introduce a tri-level cross-modal pretraining scheme that jointly learns from token-, latent-, and 3D physical-space objectives to leverage complementary, multi-level sign representations. To accelerate model convergence in the fine-tuning stage, we design a novel unmasking strategy with temporal checkpoints, which restructures generation in a coarse-to-fine manner and reduces the combinatorial complexity of unmasking orders by over $10^{41}$ times. In addition, a mixture-of-parts embedding layer is developed to effectively fuse information stored in different part-wise sign tokens through a learnable gate and well-optimized codebooks. Extensive experiments on CSL-Daily, Phoenix-2014T, and How2Sign demonstrate that MaDiS achieves superior performance across multiple metrics, including DTW error and two newly introduced metrics, SiBLEU and SiCLIP, while delivering a 40\\% higher throughput. Code and models will be publicly released.", "link": "http://arxiv.org/abs/2601.19577v2", "date": "2026-03-13", "relevancy": 2.2285, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5703}, {" {"title": "Trading Positional Complexity vs. Deepness in Coordinate Networks", "author": "Jianqiao Zheng and Sameera Ramasinghe and Xueqian Li and Simon Lucey", "abstract": "It is well noted that coordinate-based MLPs benefit -- in terms of preserving high-frequency information -- through the encoding of coordinate positions as an array of Fourier features. Hitherto, the rationale for the effectiveness of these positional encodings has been mainly studied through a Fourier lens. In this paper, we strive to broaden this understanding by showing that alternative non-Fourier embedding functions can indeed be used for positional encoding. Moreover, we show that their performance is entirely determined by a trade-off between the stable rank of the embedded matrix and the distance preservation between embedded coordinates. We further establish that the now ubiquitous Fourier feature mapping of position is a special case that fulfills these conditions. Consequently, we present a more general theory to analyze positional encoding in terms of shifted basis functions. In addition, we argue that employing a more complex positional encoding -- that scales exponentially with the number of modes -- requires only a linear (rather than deep) coordinate function to achieve comparable performance. Counter-intuitively, we demonstrate that trading positional embedding complexity for network deepness is orders of magnitude faster than current state-of-the-art; despite the additional embedding complexity. To this end, we develop the necessary theoretical formulae and empirically verify that our theoretical claims hold in practice.", "link": "http://arxiv.org/abs/2205.08987v2", "date": "2026-03-13", "relevancy": 2.2233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4523}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4523}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4293}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Trading%20Positional%20Complexity%20vs.%20Deepness%20in%20Coordinate%20Networks&body=Title%3A%20Trading%20Positional%20Complexity%20vs.%20Deepness%20in%20Coordinate%20Networks%0AAuthor%3A%20Jianqiao%20Zheng%20and%20Sameera%20Ramasinghe%20and%20Xueqian%20Li%20and%20Simon%20Lucey%0AAbstract%3A%20It%20is%20well%20noted%20that%20coordinate-based%20MLPs%20benefit%20--%20in%20terms%20of%20preserving%20high-frequency%20information%20--%20through%20the%20encoding%20of%20coordinate%20positions%20as%20an%20array%20of%20Fourier%20features.%20Hitherto%2C%20the%20rationale%20for%20the%20effectiveness%20of%20these%20positional%20encodings%20has%20been%20mainly%20studied%20through%20a%20Fourier%20lens.%20In%20this%20paper%2C%20we%20strive%20to%20broaden%20this%20understanding%20by%20showing%20that%20alternative%20non-Fourier%20embedding%20functions%20can%20indeed%20be%20used%20for%20positional%20encoding.%20Moreover%2C%20we%20show%20that%20their%20performance%20is%20entirely%20determined%20by%20a%20trade-off%20between%20the%20stable%20rank%20of%20the%20embedded%20matrix%20and%20the%20distance%20preservation%20between%20embedded%20coordinates.%20We%20further%20establish%20that%20the%20now%20ubiquitous%20Fourier%20feature%20mapping%20of%20position%20is%20a%20special%20case%20that%20fulfills%20these%20conditions.%20Consequently%2C%20we%20present%20a%20more%20general%20theory%20to%20analyze%20positional%20encoding%20in%20terms%20of%20shifted%20basis%20functions.%20In%20addition%2C%20we%20argue%20that%20employing%20a%20more%20complex%20positional%20encoding%20--%20that%20scales%20exponentially%20with%20the%20number%20of%20modes%20--%20requires%20only%20a%20linear%20%28rather%20than%20deep%29%20coordinate%20function%20to%20achieve%20comparable%20performance.%20Counter-intuitively%2C%20we%20demonstrate%20that%20trading%20positional%20embedding%20complexity%20for%20network%20deepness%20is%20orders%20of%20magnitude%20faster%20than%20current%20state-of-the-art%3B%20despite%20the%20additional%20embedding%20complexity.%20To%20this%20end%2C%20we%20develop%20the%20necessary%20theoretical%20formulae%20and%20empirically%20verify%20that%20our%20theoretical%20claims%20hold%20in%20practice.%0ALink%3A%20http%3A//arxiv.org/abs/2205.08987v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrading%2520Positional%2520Complexity%2520vs.%2520Deepness%2520in%2520Coordinate%2520Networks%26entry.906535625%3DJianqiao%2520Zheng%2520and%2520Sameera%2520Ramasinghe%2520and%2520Xueqian%2520Li%2520and%2520Simon%2520Lucey%26entry.1292438233%3DIt%2520is%2520well%2520noted%2520that%2520coordinate-based%2520MLPs%2520benefit%2520--%2520in%2520terms%2520of%2520preserving%2520high-frequency%2520information%2520--%2520through%2520the%2520encoding%2520of%2520coordinate%2520positions%2520as%2520an%2520array%2520of%2520Fourier%2520features.%2520Hitherto%252C%2520the%2520rationale%2520for%2520the%2520effectiveness%2520of%2520these%2520positional%2520encodings%2520has%2520been%2520mainly%2520studied%2520through%2520a%2520Fourier%2520lens.%2520In%2520this%2520paper%252C%2520we%2520strive%2520to%2520broaden%2520this%2520understanding%2520by%2520showing%2520that%2520alternative%2520non-Fourier%2520embedding%2520functions%2520can%2520indeed%2520be%2520used%2520for%2520positional%2520encoding.%2520Moreover%252C%2520we%2520show%2520that%2520their%2520performance%2520is%2520entirely%2520determined%2520by%2520a%2520trade-off%2520between%2520the%2520stable%2520rank%2520of%2520the%2520embedded%2520matrix%2520and%2520the%2520distance%2520preservation%2520between%2520embedded%2520coordinates.%2520We%2520fur {"title": "AoI-FusionNet: Age-Aware Tightly Coupled Fusion of UWB-IMU under Sparse Ranging Conditions", "author": "Tehmina Bibi and Anselm K\u00f6hler and Jan-Thomas Fischer and Falko Dressler", "abstract": "Accurate motion tracking of snow particles in avalanche events requires robust localization in global navigation satellite system (GNSS)-denied outdoor environments. This paper introduces AoI-FusionNet, a tightly coupled deep learning-based fusion framework that directly combines raw ultra-wideband (UWB) time-of-flight (ToF) measurements with inertial measurement unit (IMU) data for 3D trajectory estimation. Unlike loose-coupled pipelines based on intermediate trilateration, the proposed approach operates directly on heterogeneous sensor inputs, enabling localization even under insufficient ranging availability. The framework integrates an Age-of-Information (AoI)-aware decay module to reduce the influence of stale UWB ranging measurements and a learned attention gating mechanism that adaptively balances the contribution of UWB and IMU modalities based on measurement availability and temporal freshness. To evaluate robustness under limited data and measurement variability, we apply a diffusion-based residual augmentation strategy during training, producing an augmented variant termed AoI-FusionNet-DGAN. We assess the performance of the proposed model using offline post-processing of real-world measurement data collected in an alpine environment and benchmark it against UWB multilateration and loose-coupled fusion baselines. The results demonstrate that AoI-FusionNet substantially reduces mean and tail localization errors under intermittent and degraded sensing conditions.", "link": "http://arxiv.org/abs/2603.12849v1", "date": "2026-03-13", "relevancy": 2.216, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5668}, {"title": "u {"title": "DriveMind: A Dual Visual Language Model-based Reinforcement Learning Framework for Autonomous Driving", "author": "Dawood Wasif and Terrence J. Moore and Chandan K. Reddy and Frederica Free-Nelson and Seunghyun Yoon and Hyuk Lim and Dan Dongseong Kim and Jin-Hee Cho", "abstract": "End-to-end autonomous driving systems map sensor data directly to control commands, but remain opaque, lack interpretability, and offer no formal safety guarantees. While recent vision-language-guided reinforcement learning (RL) methods introduce semantic feedback, they often rely on static prompts and fixed objectives, limiting adaptability to dynamic driving scenes. We present DriveMind, a unified semantic reward framework that integrates: (i) a contrastive Vision-Language Model (VLM) encoder for stepwise semantic anchoring; (ii) a novelty-triggered VLM encoder-decoder, fine-tuned via chain-of-thought (CoT) distillation, for dynamic prompt generation upon semantic drift; (iii) a hierarchical safety module enforcing kinematic constraints (e.g., speed, lane centering, stability); and (iv) a compact predictive world model to reward alignment with anticipated ideal states. DriveMind achieves 19.4 +/- 2.3 km/h average speed, 0.98 +/- 0.03 route completion, and near-zero collisions in CARLA Town 2, outperforming baselines by over 4% in success rate. Its semantic reward generalizes zero-shot to real dash-cam data with minimal distributional shift, demonstrating robust cross-domain alignment and potential for real-world deployment.", "link": "http://arxiv.org/abs/2506.00819v2", "date": "2026-03-13", "relevancy": 2.2143, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5987}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0. {"title": "Reference-Free Sampling-Based Model Predictive Control", "author": "Fabian Schramm and Pierre Fabre and Nicolas Perrin-Gilbert and Justin Carpentier", "abstract": "We present a sampling-based model predictive control (MPC) framework that enables emergent locomotion without relying on handcrafted gait patterns or predefined contact sequences. Our method discovers diverse motion patterns, ranging from trotting to galloping, robust standing policies, jumping, and handstand balancing, purely through the optimization of high-level objectives. Building on model predictive path integral (MPPI), we propose a cubic Hermite spline parameterization that operates on position and velocity control points. Our approach enables contact-making and contact-breaking strategies that adapt automatically to task requirements, requiring only a limited number of sampled trajectories. This sample efficiency enables real-time control on standard CPU hardware, eliminating the GPU acceleration typically required by other state-of-the-art MPPI methods. We validate our approach on the Go2 quadrupedal robot, demonstrating a range of emergent gaits and basic jumping capabilities. In simulation, we further showcase more complex behaviors, such as backflips, dynamic handstand balancing and locomotion on a Humanoid, all without requiring reference tracking or offline pre-training.", "link": "http://arxiv.org/abs/2511.19204v2", "date": "2026-03-13", "relevancy": 2.2105, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6029}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5594}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5258}], "mailto": "mailto:haoxiang. {"title": "Beyond Imitation: Reinforcement Learning Fine-Tuning for Adaptive Diffusion Navigation Policies", "author": "Junhe Sheng and Ruofei Bai and Kuan Xu and Ruimeng Liu and Jie Chen and Shenghai Yuan and Wei-Yun Yau and Lihua Xie", "abstract": "Diffusion-based robot navigation policies trained on large-scale imitation learning datasets, can generate multi-modal trajectories directly from the robot's visual observations, bypassing the traditional localization-mapping-planning pipeline and achieving strong zero-shot generalization. However, their performance remains constrained by the coverage of offline datasets, and when deployed in unseen settings, distribution shift often leads to accumulated trajectory errors and safety-critical failures. Adapting diffusion policies with reinforcement learning is challenging because their iterative denoising structure hinders effective gradient backpropagation, while also making the training of an additional value network computationally expensive and less stable. To address these issues, we propose a reinforcement learning fine-tuning framework tailored for diffusion-based navigation. The method leverages the inherent multi-trajectory sampling mechanism of diffusion models and adopts Group Relative Policy Optimization (GRPO), which estimates relative advantages across sampled trajectories without requiring a separate value network. To preserve pretrained representations while enabling adaptation, we freeze the visual encoder and selectively update the higher decoder layers and action head, enhancing safety-aware behaviors through online environmental feedback. On the PointGoal task in Isaac Sim, our approach improves the Success Rate from 52.0% to 58.7% and SPL from 0.49 to 0.54 on unseen scenes, while reducing collision frequency. Additional experiments show that the fine-tuned policy transfers zero-shot to a real quadruped platform and maintains stable performance in geometrically out-of-distribution environments, suggesting improved adaptability and safe generalization to new domains.", "link": "http://arxiv.org/abs/2603.12868v1", "date": "2026-03-13", "relevancy": 2.2069, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5758}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5471}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5467}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Imitation%3A%20Reinforcement%20Learning%20Fine-Tuning%20for%20Adaptive%20Diffusion%20Navigation%20Policies&body=Title%3A%20Beyond%20Imitation%3A%20Reinforcement%20Learning%20Fine-Tuning%20for%20Adaptive%20Diffusion%20Navigation%20Policies%0AAuthor%3A%20Junhe%20Sheng%20and%20Ruofei%20Bai%20and%20Kuan%20Xu%20and%20Ruimeng%20Liu%20and%20Jie%20Chen%20and%20Shenghai%20Yuan%20and%20Wei-Yun%20Yau%20and%20Lihua%20Xie%0AAbstract%3A%20Diffusion-based%20robot%20navigation%20policies%20trained%20on%20large-scale%20imitation%20learning%20datasets%2C%20can%20generate%20multi-modal%20trajectories%20directly%20from%20the%20robot%27s%20visual%20observations%2C%20bypassing%20the%20traditional%20localization-mapping-planning%20pipeline%20and%20achieving%20strong%20zero-shot%20generalization.%20However%2C%20their%20performance%20remains%20constrained%20by%20the%20coverage%20of%20offline%20datasets%2C%20and%20when%20deployed%20in%20unseen%20settings%2C%20distribution%20shift%20often%20leads%20to%20accumulated%20trajectory%20errors%20and%20safety-critical%20failures.%20Adapting%20diffusion%20policies%20with%20reinforcement%20learning%20is%20challenging%20because%20their%20iterative%20denoising%20structure%20hinders%20effective%20gradient%20backpropagation%2C%20while%20also%20making%20the%20training%2 {"title": "Team LEYA in 10th ABAW Competition: Multimodal Ambivalence/Hesitancy Recognition Approach", "author": "Elena Ryumina and Alexandr Axyonov and Dmitry Sysoev and Timur Abdulkadirov and Kirill Almetov and Yulia Morozova and Dmitry Ryumin", "abstract": "Ambivalence/hesitancy recognition in unconstrained videos is a challenging problem due to the subtle, multimodal, and context-dependent nature of this behavioral state. In this paper, a multimodal approach for video-level ambivalence/hesitancy recognition is presented for the 10th ABAW Competition. The proposed approach integrates four complementary modalities: scene, face, audio, and text. Scene dynamics are captured with a VideoMAE-based model, facial information is encoded through emotional frame-level embeddings aggregated by statistical pooling, acoustic representations are extracted with EmotionWav2Vec2.0 and processed by a Mamba-based temporal encoder, and linguistic cues are modeled using fine-tuned transformer-based text models. The resulting unimodal embeddings are further combined using multimodal fusion models, including prototype-augmented variants. Experiments on the BAH corpus demonstrate clear gains of multimodal fusion over all unimodal baselines. The best unimodal configuration achieved an average MF1 of 70.02%, whereas the best multimodal fusion model reached 83.25%. The highest final test performance, 71.43%, was obtained by an ensemble of five prototype-augmented fusion models. The obtained results highlight the importance of complementary multimodal cues and robust fusion strategies for ambivalence/hesitancy recognition.", "link": "http://arxiv.org/abs/2603.12848v1", "date": "2026-03-13", "relevancy": 2.183, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5551}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignoranc trate%20clear%20gains%20of%20multimodal%20fusion%20over%20all%20unimodal%20baselines.%20The%20best%20unimodal%20configuration%20achieved%20an%20average%20MF1%20of%2070.02%25%2C%20whereas%20the%20best%20multimodal%20fusion%20model%20reached%2083.25%25.%20The%20highest%20final%20test%20performance%2C%2071.43%25%2C%20was%20obtained%20by%20an%20ensemble%20of%20five%20prototype-augmented%20fusion%20models.%20The%20obtained%20results%20highlight%20the%20importance%20of%20complementary%20multimodal%20cues%20and%20robust%20fusion%20strategies%20for%20ambivalence/hesitancy%20recognition.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12848v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTeam%2520LEYA%2520in%252010th%2520ABAW%2520Competition%253A%2520Multimodal%2520Ambivalence/Hesitancy%2520Recognition%2520Approach%26entry.906535625%3DElena%2520Ryumina%2520and%2520Alexandr%2520Axyonov%2520and%2520Dmitry%2520Sysoev%2520and%2520Timur%2520Abdulkadirov%2520and%2520Kirill%2520Almetov%2520and%2520Yulia%2520Morozova%2520and%2520Dmitry%2520Ryumin%26entry.1292438233%3DAmbivalence/hesitancy%2520recognition%2520in%2520unconstrained%2520videos%2520is%2520a%2520challenging%2520problem%2520due%2520to%2520the%2520subtle%252C%2520multimodal%252C%2520and%2520context-dependent%2520nature%2520of%2520this%2520behavioral%2520state.%2520In%2520this%2520paper%252C%2520a%2520multimodal%2520approach%2520for%2520video-level%2520ambivalence/hesitancy%2520recognition%2520is%2520presented%2520for%2520the%252010th%2520ABAW%2520Competition.%2520The%2520proposed%2520approach%2520integrates%2520four%2520complementary%2520modalities%253A%2520scene%252C%2520face%252C%2520audio%252C%2520and%2520text.%2520Scene%2520dynamics%2520are%2520captured%2520with%2520a%2520VideoMAE-based%2520model%252C%2520facial%2520information%2520is%2520encoded%2520through%2520emotional%2520frame-level%2520embeddings%2520aggregated%2520by%2520statistical% {"title": "Towards Reliable Detection of Empty Space: Conditional Marked Point Processes for Object Detection", "author": "Tobias J. Riedlinger and Kira Maag and Hanno Gottschalk", "abstract": "Deep neural networks have set the state-of-the-art in computer vision tasks such as bounding box detection and semantic segmentation. Object detectors and segmentation models assign confidence scores to predictions, reflecting the model's uncertainty in object detection or pixel-wise classification. However, these confidence estimates are often miscalibrated, as their architectures and loss functions are tailored to task performance rather than probabilistic foundation. Even with well calibrated predictions, object detectors fail to quantify uncertainty outside detected bounding boxes, i.e., the model does not make a probability assessment of whether an area without detected objects is truly free of obstacles. This poses a safety risk in applications such as automated driving, where uncertainty in empty areas remains unexplored. In this work, we propose an object detection model grounded in spatial statistics. Bounding box data matches realizations of a marked point process, commonly used to describe the probabilistic occurrence of spatial point events identified as bounding box centers, where marks are used to describe the spatial extension of bounding boxes and classes. Our statistical framework enables a likelihood-based training and provides well-defined confidence estimates for whether a region is drivable, i.e., free of objects. We demonstrate the effectiveness of our method through calibration assessments and evaluation of performance.", "link": "http://arxiv.org/abs/2506.21486v2", "date": "2026-03-13", "relevancy": 2.1821, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5591}, {"title": "uPLAM: Robust Panoptic Localization and 0process%2C%20commonly%20used%20to%20describe%20the%20probabilistic%20occurrence%20of%20spatial%20point%20events%20identified%20as%20bounding%20box%20centers%2C%20where%20marks%20are%20used%20to%20describe%20the%20spatial%20extension%20of%20bounding%20boxes%20and%20classes.%20Our%20statistical%20framework%20enables%20a%20likelihood-based%20training%20and%20provides%20well-defined%20confidence%20estimates%20for%20whether%20a%20region%20is%20drivable%2C%20i.e.%2C%20free%20of%20objects.%20We%20demonstrate%20the%20effectiveness%20of%20our%20method%20through%20calibration%20assessments%20and%20evaluation%20of%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2506.21486v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Reliable%2520Detection%2520of%2520Empty%2520Space%253A%2520Conditional%2520Marked%2520Point%2520Processes%2520for%2520Object%2520Detection%26entry.906535625%3DTobias%2520J.%2520Riedlinger%2520and%2520Kira%2520Maag%2520and%2520Hanno%2520Gottschalk%26entry.1292438233%3DDeep%2520neural%2520networks%2520have%2520set%2520the%2520state-of-the-art%2520in%2520computer%2520vision%2520tasks%2520such%2520as%2520bounding%2520box%2520detection%2520and%2520semantic%2520segmentation.%2520Object%2520detectors%2520and%2520segmentation%2520models%2520assign%2520confidence%2520scores%2520to%2520predictions%252C%2520reflecting%2520the%2520model%2527s%2520uncertainty%2520in%2520object%2520detection%2520or%2520pixel-wise%2520classification.%2520However%252C%2520these%2520confidence%2520estimates%2520are%2520often%2520miscalibrated%252C%2520as%2520their%2520architectures%2520and%2520loss%2520functions%2520are%2520tailored%2520to%2520task%2520performance%2520rather%2520than%2520probabilistic%2520foundation.%2520Even%2520with%2520well%2520calibrated%2520predictions%252C%2520object%2520detectors%2520fail%2520to%2520quantify%2520uncertainty%2520outside%2520detected%2520bounding%2520boxe {"title": "Representation Learning for Spatiotemporal Physical Systems", "author": "Helen Qu and Rudy Morel and Michael McCabe and Alberto Bietti and Fran\u00e7ois Lanusse and Shirley Ho and Yann LeCun", "abstract": "Machine learning approaches to spatiotemporal physical systems have primarily focused on next-frame prediction, with the goal of learning an accurate emulator for the system's evolution in time. However, these emulators are computationally expensive to train and are subject to performance pitfalls, such as compounding errors during autoregressive rollout. In this work, we take a different perspective and look at scientific tasks further downstream of predicting the next frame, such as estimation of a system's governing physical parameters. Accuracy on these tasks offers a uniquely quantifiable glimpse into the physical relevance of the representations of these models. We evaluate the effectiveness of general-purpose self-supervised methods in learning physics-grounded representations that are useful for downstream scientific tasks. Surprisingly, we find that not all methods designed for physical modeling outperform generic self-supervised learning methods on these tasks, and methods that learn in the latent space (e.g., joint embedding predictive architectures, or JEPAs) outperform those optimizing pixel-level prediction objectives. Code is available at https://github.com/helenqu/physical-representation-learning.", "link": "http://arxiv.org/abs/2603.13227v1", "date": "2026-03-13", "relevancy": 2.157, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5854}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5352}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5249}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representation%20Learning%20for%20Spatiotemporal%20Physical%20Systems&body=Title%3A%20Representation%20Learning%20for%20Spatiotemporal%20Physical%20Systems%0AAuthor%3A%20Helen%20Qu%20and%20Rudy%20Morel%20and%20Michael%20McCabe%20and%20Alberto%20Bietti%20and%20Fran%C3%A7ois%20Lanusse%20and%20Shirley%20Ho%20and%20Yann%20LeCun%0AAbstract%3A%20Machine%20learning%20approaches%20to%20spatiotemporal%20physical%20systems%20have%20primarily%20focused%20on%20next-frame%20prediction%2C%20with%20the%20goal%20of%20learning%20an%20accurate%20emulator%20for%20the%20system%27s%20evolution%20in%20time.%20However%2C%20these%20emulators%20are%20computationally%20expensive%20to%20train%20and%20are%20subject%20to%20performance%20pitfalls%2C%20such%20as%20compounding%20errors%20during%20autoregressive%20rollout.%20In%20this%20work%2C%20we%20take%20a%20different%20perspective%20and%20look%20at%20scientific%20tasks%20further%20downstream%20of%20predicting%20the%20next%20frame%2C%20such%20as%20estimation%20of%20a%20system%27s%20governing%20physical%20parameters.%20Accuracy%20on%20these%20tasks%20offers%20a%20uniquely%20quantifiable%20glimpse%20into%20the%20physical%20relevance%20of%20the%20representations%20of%20these%20models.%20We%20evaluate%20the%20effectiveness%20of%20general-purpose%20self-supervised%20methods%20in%20learning%20physics-grounded%20representations%20that%20are%20useful%20for%20downstream%20scientific%20tasks.%20Surprisingly%2C%20we%20find%20that%20not%20all%20methods%20designed%20for%20physical%20modeling%20outperform%20generic%20self-supervised%20learning%20methods%20on%20these%20tasks%2C%20and%20methods%20that%20learn%20in%20the%20latent%20space%20%28e.g.%2C%20joint%20embedding%20predictive%20architectures%2C%20or%20JEPAs%29%20outperform%20those%20optimizing%20pixel-level%20prediction%20objectives.%20Code%20is%20available%20at%20https%3A//github.com/helenqu/physical-representation-learning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13227v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresentation%2520Learning%2520for%2520Spatiotemporal%2520Physical%2520Systems%26entry.906535625%3DHelen%2520Qu%2520and%2520Rudy%2520Morel%2520and%2520Michael%2520McCabe%2520and%2520Alberto%2520Bietti%2520and%2520Fran%25C3%25A7ois%2520Lanusse%2520and%2520Shirley%2520Ho%2520and%2520Yann%2520LeCun%26entry.1292438233%3DMachine%2520learning%2520approaches%2520to%2520spatiotemporal%2520physical%2520systems%2520have%2520primarily%2520focused%2520on%2520next-frame%2520prediction%252C%2520with%2520the%2520goal%2520of%2520learning%2520an%2520accurate%2520emulator%2520for%2520the%2520system%2527s%2520evolution%2520in%2520time.%2520However%252C%2520these%2520emulators%2520are%2520computationally%2520expensive%2520to%2520train%2520and%2520are%2520subject%2520to%2520performance%2520pitfalls%252C%2520such%2520as%2520compounding%2520errors%2520during%2520autoregressive%2520rollout.%2520In%2520this%2520work%252C%2520we%2520take%2520a%2520different%2520perspective%2520and%2520look%2520at%2520scientific%2520tasks%2520further%2520downstream%2520of%2520predicting%2520the%2520next%2520frame%252C%2520such%2520as%2520estimation%2520of%2520a%2520system%2527s%2520governing%2520physical%2520parameters.%2520Accuracy%2520on%2520these%2520tasks%2520offers%2520a%2520uniquely%2520quantifiable%2520glimpse%2520into%2520the%2520physical%2520relevance%2520of%2520the%2520representations%2520of%2520these%2520models.%2520We%2520evaluate%2520the%2520effectiveness%2520of%2520general-purpose%2520self-supervised%2520methods%2520in%2520learning%2520physics-grounded%2520representations%2520that%2520are%2520useful%2520for%2520downstream%2520scientific%2520tasks.%2520Surprisingly%252C%2520we%2520find%2520that%2520not%2520all%2520methods%2520designed%2520for%2520physical%2520modeling%2520outperform%2520generic%252 {"title": "Dynamic Aware: Adaptive Multi-Mode Out-of-Distribution Detection for Trajectory Prediction in Autonomous Vehicles", "author": "Tongfei Guo and Lili Su", "abstract": "Trajectory prediction is central to the safe and seamless operation of autonomous vehicles (AVs). In deployment, however, prediction models inevitably face distribution shifts between training data and real-world conditions, where rare or underrepresented traffic scenarios induce out-of-distribution (OOD) cases. While most prior OOD detection research in AVs has concentrated on computer vision tasks such as object detection and segmentation, trajectory-level OOD detection remains largely underexplored. A recent study formulated this problem as a quickest change detection (QCD) task, providing formal guarantees on the trade-off between detection delay and false alarms [1]. Building on this foundation, we propose a new framework that introduces adaptive mechanisms to achieve robust detection in complex driving environments. Empirical analysis across multiple real-world datasets reveals that prediction errors -- even on in-distribution samples -- exhibit mode-dependent distributions that evolve over time with dataset-specific dynamics. By explicitly modeling these error modes, our method achieves substantial improvements in both detection delay and false alarm rates. Comprehensive experiments on established trajectory prediction benchmarks show that our framework significantly outperforms prior UQ- and vision-based OOD approaches in both accuracy and computational efficiency, offering a practical path toward reliable, driving-aware autonomy.", "link": "http://arxiv.org/abs/2509.13577v2", "date": "2026-03-13", "relevancy": 2.1534, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5672}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair {"title": "FoV-Net: Rotation-Invariant CAD B-rep Learning via Field-of-View Ray Casting", "author": "Matteo Ballegeer and Dries F. Benoit", "abstract": "Learning directly from boundary representations (B-reps) has significantly advanced 3D CAD analysis. However, state-of-the-art B-rep learning methods rely on absolute coordinates and normals to encode global context, making them highly sensitive to rotations. Our experiments reveal that models achieving over 95% accuracy on aligned benchmarks can collapse to as low as 10% under arbitrary $\\mathbf{SO}(3)$ rotations. To address this, we introduce FoV-Net, the first B-rep learning framework that captures both local surface geometry and global structural context in a rotation-invariant manner. Each face is represented by a Local Reference Frame (LRF) UV-grid that encodes its local surface geometry, and by Field-of-View (FoV) grids that capture the surrounding 3D context by casting rays and recording intersections with neighboring faces. Lightweight CNNs extract per-face features, which are propagated over the B-rep graph using a graph attention network. FoV-Net achieves state-of-the-art performance on B-rep classification and segmentation benchmarks, demonstrating robustness to arbitrary rotations while also requiring less training data to achieve strong results.", "link": "http://arxiv.org/abs/2602.24084v2", "date": "2026-03-13", "relevancy": 2.141, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5486}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5319}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5233}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FoV-Net%3A%20Rotation-Invariant%20CAD%20B-rep%20Learning%20via%20Field-of-View%20Ray%20Casting&body=Title%3A%20FoV-Net%3A%20Rotation-Invariant%20CAD%20B-rep%20Learning%20via%20Field-of-View%20Ray%20Casting%0AAuthor%3A%20Matteo%20Ballegeer%20and%20Dries%20F.%20Benoit%0AAbstract%3A%20Learning%20directly%20from%20boundary%20representations%20%28B-reps%29%20has%20significantly%20advanced%203D%20CAD%20analysis.%20However%2C%20state-of-the-art%20B-rep%20learning%20methods%20rely%20on%20absolute%20coordinates%20and%20normals%20to%20encode%20global%20context%2C%20making%20them%20highly%20sensitive%20to%20rotations.%20Our%20experiments%20reveal%20that%20models%20achieving%20over%2095%25%20accuracy%20on%20aligned%20benchmarks%20can%20collapse%20to%20as%20low%20as%2010%25%20under%20arbitrary%20%24%5Cmathbf%7BSO%7D%283%29%24%20rotations.%20To%20address%20this%2C%20we%20introduce%20FoV-Net%2C%20the%20first%20B-rep%20learning%20framework%20that%20captures%20both%20local%20surface%20geometry%20and%20global%20structural%20context%20in%20a%20rotation-invariant%20manner.%20Each%20face%20is%20represented%20by%20a%20Local%20Reference%20Frame%20%28LRF%29%20UV-grid%20that%20encodes%20its%20local%20surface%20geometry%2C%20and%20by%20Field-of-View%20%28FoV%29%20grids%20that%20capture%20the%20surrounding%203D%20context%20by%20casting%20rays%20and%20recording%20intersections%20with%20neighboring%20faces.%20Lightweight%20CNNs%20extract%20per-face%20features%2C%20which%20are%20propagated%20over%20the%20B-rep%20graph%20using%20a%20graph%20attention%20network.%20FoV-Net%20achieves%20state-of-the-art%20performance%20on%20B-rep%20classification%20and%20segmentation%20benchmarks%2C%20demonstrating%20robustness%20to%20arbitrary%20rotations%20while%20also%20requiring%20less%20training%20data%20to%20achieve%20strong%20results.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24084v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.13809298

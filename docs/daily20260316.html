{"title": "Test-Time Attention Purification for Backdoored Large Vision Language Models", "author": "Zhifang Zhang and Bojun Yang and Shuo He and Weitong Chen and Wei Emma Zhang and Olaf Maennel and Lei Feng and Miao Xu", "abstract": "Despite the strong multimodal performance, large vision-language models (LVLMs) are vulnerable during fine-tuning to backdoor attacks, where adversaries insert trigger-embedded samples into the training data to implant behaviors that can be maliciously activated at test time. Existing defenses typically rely on retraining backdoored parameters (e.g., adapters or LoRA modules) with clean data, which is computationally expensive and often degrades model performance. In this work, we provide a new mechanistic understanding of backdoor behaviors in LVLMs: the trigger does not influence prediction through low-level visual patterns, but through abnormal cross-modal attention redistribution, where trigger-bearing visual tokens steal attention away from the textual context - a phenomenon we term attention stealing. Motivated by this, we propose CleanSight, a training-free, plug-and-play defense that operates purely at test time. CleanSight (i) detects poisoned inputs based on the relative visual-text attention ratio in selected cross-modal fusion layers, and (ii) purifies the input by selectively pruning the suspicious high-attention visual tokens to neutralize the backdoor activation. Extensive experiments show that CleanSight significantly outperforms existing pixel-based purification defenses across diverse datasets and backdoor attack types, while preserving the model's utility on both clean and poisoned samples.", "link": "http://arxiv.org/abs/2603.12989v1", "date": "2026-03-13", "relevancy": 2.0457, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5234}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5047}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Test-Time%20Attention%20Purification%20for%20Backdoored%20Large%20Vision%20Language%20Models&body=Title%3A%20Test-Time%20Attention%20Purification%20for%20Backdoored%20Large%20Vision%20Language%20Models%0AAuthor%3A%20Zhifang%20Zhang%20and%20Bojun%20Yang%20and%20Shuo%20He%20and%20Weitong%20Chen%20and%20Wei%20Emma%20Zhang%20and%20Olaf%20Maennel%20and%20Lei%20Feng%20and%20Miao%20Xu%0AAbstract%3A%20Despite%20the%20strong%20multimodal%20performance%2C%20large%20vision-language%20models%20%28LVLMs%29%20are%20vulnerable%20during%20fine-tuning%20to%20backdoor%20attacks%2C%20where%20adversaries%20insert%20trigger-embedded%20samples%20into%20the%20training%20data%20to%20implant%20behaviors%20that%20can%20be%20maliciously%20activated%20at%20test%20time.%20Existing%20defenses%20typically%20rely%20on%20retraining%20backdoored%20parameters%20%28e.g.%2C%20adapters%20or%20LoRA%20modules%29%20with%20clean%20data%2C%20which%20is%20computationally%20expensive%20and%20often%20degrades%20model%20performance.%20In%20this%20work%2C%20we%20provide%20a%20new%20mechanistic%20understanding%20of%20backdoor%20behaviors%20in%20LVLMs%3A%20the%20trigger%20does%20not%20influence%20prediction%20through%20low-level%20visual%20patterns%2C%20but%20through%20abnormal%20cross-modal%20attention%20redistribution%2C%20where%20trigger-bearing%20visual%20tokens%20steal%20attention%20away%20from%20the%20textual%20context%20-%20a%20phenomenon%20we%20term%20attention%20stealing.%20Motivated%20by%20this%2C%20we%20propose%20CleanSight%2C%20a%20training-free%2C%20plug-and-play%20defense%20that%20operates%20purely%20at%20test%20time.%20CleanSight%20%28i%29%20detects%20poisoned%20inputs%20based%20on%20the%20relative%20visual-text%20attention%20ratio%20in%20selected%20cross-modal%20fusion%20layers%2C%20and%20%28ii%29%20purifies%20the%20input%20by%20selectively%20pruning%20the%20suspicious%20high-attention%20visual%20tokens%20to%20neutralize%20the%20backdoor%20activation.%20Extensive%20experiments%20show%20that%20CleanSight%20significantly%20outperforms%20existing%20pixel-based%20purification%20defenses%20across%20diverse%20datasets%20and%20backdoor%20attack%20types%2C%20while%20preserving%20the%20model%27s%20utility%20on%20both%20clean%20and%20poisoned%20samples.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12989v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTest-Time%2520Attention%2520Purification%2520for%2520Backdoored%2520Large%2520Vision%2520Language%2520Models%26entry.906535625%3DZhifang%2520Zhang%2520and%2520Bojun%2520Yang%2520and%2520Shuo%2520He%2520and%2520Weitong%2520Chen%2520and%2520Wei%2520Emma%2520Zhang%2520and%2520Olaf%2520Maennel%2520and%2520Lei%2520Feng%2520and%2520Miao%2520Xu%26entry.1292438233%3DDespite%2520the%2520strong%2520multimodal%2520performance%252C%2520large%2520vision-language%2520models%2520%2528LVLMs%2529%2520are%2520vulnerable%2520during%2520fine-tuning%2520to%2520backdoor%2520attacks%252C%2520where%2520adversaries%2520insert%2520trigger-embedded%2520samples%2520into%2520the%2520training%2520data%2520to%2520implant%2520behaviors%2520that%2520can%2520be%2520maliciously%2520activated%2520at%2520test%2520time.%2520Existing%2520defenses%2520typically%2520rely%2520on%2520retraining%2520backdoored%2520parameters%2520%2528e.g.%252C%2520adapters%2520or%2520LoRA%2520modules%2529%2520with%2520clean%2520data%252C%2520which%2520is%2520computationally%2520expensive%2520and%2520often%2520degrades%2520model%2520performance.%2520In%2520this%2520work%252C%2520we%2520provide%2520a%2520new%2520mechanistic%2520understanding%2520of%2520backdoor%2520beha {"title": "Stake the Points: Structure-Faithful Instance Unlearning", "author": "Kiseong Hong and JungKyoo Shin and Eunwoo Kim", "abstract": "Machine unlearning (MU) addresses privacy risks in pretrained models. The main goal of MU is to remove the influence of designated data while preserving the utility of retained knowledge. Achieving this goal requires preserving semantic relations among retained instances, which existing studies often overlook. We observe that without such preservation, models suffer from progressive structural collapse, undermining both the deletion-retention balance. In this work, we propose a novel structure-faithful framework that introduces stakes, i.e., semantic anchors that serve as reference points to maintain the knowledge structure. By leveraging these anchors, our framework captures and stabilizes the semantic organization of knowledge. Specifically, we instantiate the anchors from language-driven attribute descriptions encoded by a semantic encoder (e.g., CLIP). We enforce preservation of the knowledge structure via structure-aware alignment and regularization: the former aligns the organization of retained knowledge before and after unlearning around anchors, while the latter regulates updates to structure-critical parameters. Results from image classification, retrieval, and face recognition show average gains of 32.9%, 22.5%, and 19.3% in performance, balancing the deletion-retention trade-off and enhancing generalization.", "link": "http://arxiv.org/abs/2603.12915v1", "date": "2026-03-13", "relevancy": 2.0451, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5297}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5106}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D {"title": "Invariant Graph Transformer for Out-of-Distribution Generalization", "author": "Tianyin Liao and Ziwei Zhang and Yufei Sun and Chunyu Hu and Jianxin Li", "abstract": "Graph Transformers (GTs) have demonstrated great effectiveness across various graph analytical tasks. However, the existing GTs focus on training and testing graph data originated from the same distribution, but fail to generalize under distribution shifts. Graph invariant learning, aiming to capture generalizable graph structural patterns with labels under distribution shifts, is potentially a promising solution, but how to design attention mechanisms and positional and structural encodings (PSEs) based on graph invariant learning principles remains challenging. To solve these challenges, we introduce Graph Out-Of-Distribution generalized Transformer (GOODFormer), aiming to learn generalized graph representations by capturing invariant relationships between predictive graph structures and labels through jointly optimizing three modules. Specifically, we first develop a GT-based entropy-guided invariant subgraph disentangler to separate invariant and variant subgraphs while preserving the sharpness of the attention function. Next, we design an evolving subgraph positional and structural encoder to effectively and efficiently capture the encoding information of dynamically changing subgraphs during training. Finally, we propose an invariant learning module utilizing subgraph node representations and encodings to derive generalizable graph representations that can to unseen graphs. We also provide theoretical justifications for our method. Extensive experiments on benchmark datasets demonstrate the superiority of our method over state-of-the-art baselines under distribution shifts.", "link": "http://arxiv.org/abs/2508.00304v2", "date": "2026-03-13", "relevancy": 2.0389, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5408}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5092}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4979}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Invariant%20Graph%20Transformer%20for%20Out-of-Distribution%20Generalization&body=Title%3A%20Invariant%20Graph%20Transformer%20for%20Out-of-Distribution%20Generalization%0AAuthor%3A%20Tianyin%20Liao%20and%20Ziwei%20Zhang%20and%20Yufei%20Sun%20and%20Chunyu%20Hu%20and%20Jianxin%20Li%0AAbstract%3A%20Graph%20Transformers%20%28GTs%29%20have%20demonstrated%20great%20effectiveness%20across%20various%20graph%20analytical%20tasks.%20However%2C%20the%20existing%20GTs%20focus%20on%20training%20and%20testing%20graph%20data%20originated%20from%20the%20same%20distribution%2C%20but%20fail%20to%20generalize%20under%20distribution%20shifts.%20Graph%20invariant%20learning%2C%20aiming%20to%20capture%20generalizable%20graph%20structural%20patterns%20with%20labels%20under%20distribution%20shifts%2C%20is%20potentially%20a%20promising%20solution%2C%20but%20how%20to%20design%20attention%20mechanisms%20and%20positional%20and%20structural%20encodings%20%28PSEs%29%20based%20on%20graph%20invariant%20learning%20principles%20remains%20challenging.%20To%20solve%20these%20challenges%2C%20we%20introduce%20Graph%20Out-Of-Distribution%20generalized%20Transformer%20%28GOODFormer%29%2C%20aiming%20to%20learn%20generalized%20graph%20representations%20by%20capturing%20invariant%20relationships%20between%20predictive%20graph%20structures%20and%20labels%20through%20jointly%20optimizing%20three%20modules.%20Specifically%2C%20we%20first%20develop%20a%20GT-based%20entropy-guided%20invariant%20subgraph%20disentangler%20to%20separate%20invariant%20and%20variant%20subgraphs%20while%20preserving%20the%20sharpness%20of%20the%20attention%20function.%20Next%2C%20we%20design%20an%20evolving%20subgraph%20positional%20and%20structural%20encoder%20to%20effectively%20and%20efficiently%20capture%20the%20encoding%20information%20of%20dynamically%20changing%20subgraphs%20during%20training.%20Finally%2C%20we%20propose%20an%20invariant%20learning%20module%20utilizing%20subgraph%20node%20representations%20and%20encodings%20to%20derive%20generalizable%20graph%20representations%20that%20can%20to%20unseen%20graphs.%20We%20also%20provide%20theoretical%20justifications%20for%20our%20method.%20Extensive%20experiments%20on%20benchmark%20datasets%20demonstrate%20the%20superiority%20of%20our%20method%20over%20state-of-the-art%20baselines%20under%20distribution%20shifts.%0ALink%3A%20http%3A//arxiv.org/abs/2508.00304v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInvariant%2520Graph%2520Transformer%2520for%2520Out-of-Distribution%2520Generalization%26entry.906535625%3DTianyin%2520Liao%2520and%2520Ziwei%2520Zhang%2520and%2520Yufei%2520Sun%2520and%2520Chunyu%2520Hu%2520and%2520Jianxin%2520Li%26entry.1292438233%3DGraph%2520Transformers%2520%2528GTs%2529%2520have%2520demonstrated%2520great%2520effectiveness%2520across%2520various%2520graph%2520analytical%2520tasks.%2520However%252C%2520the%2520existing%2520GTs%2520focus%2520on%2520training%2520and%2520testing%2520graph%2520data%2520originated%2520from%2520the%2520same%2520distribution%252C%2520but%2520fail%2520to%2520generalize%2520under%2520distribution%2520shifts.%2520Graph%2520invariant%2520learning%252C%2520aiming%2520to%2520capture%2520generalizable%2520graph%2520structural%2520patterns%2520with%2520labels%2520under%2520distribution%2520shifts%252C%2520is%2520potentially%2520a%2520promising%2520solution%252C%2520but%2520how%2520to%2520design%2520attention%2520mechanisms%2520and%2520positional%2520and%2520structural%2520encodings%2520%2528PSEs%2529%2520based%2520on%2520graph%2520invariant%2520learning% {"title": "Federated Few-Shot Learning on Neuromorphic Hardware: An Empirical Study Across Physical Edge Nodes", "author": "Steven Motta and Gioele Nanni", "abstract": "Federated learning on neuromorphic hardware remains unexplored because on-chip spike-timing-dependent plasticity (STDP) produces binary weight updates rather than the floating-point gradients assumed by standard algorithms. We build a two-node federated system with BrainChip Akida AKD1000 processors and run approximately 1,580 experimental trials across seven analysis phases. Of four weight-exchange strategies tested, neuron-level concatenation (FedUnion) consistently preserves accuracy while element-wise weight averaging (FedAvg) destroys it (p = 0.002). Domain-adaptive fine-tuning of the upstream feature extractor accounts for most of the accuracy gains, confirming feature quality as the dominant factor. Scaling feature dimensionality from 64 to 256 yields 77.0% best-strategy federated accuracy (n=30, p < 0.001). Two independent asymmetries (wider features help federation more than individual learning, while binarization hurts federation more) point to a shared prototype complementarity mechanism: cross-node transfer scales with the distinctiveness of neuron prototypes.", "link": "http://arxiv.org/abs/2603.13037v1", "date": "2026-03-13", "relevancy": 2.025, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5334}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.491}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4766}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Federated%20Few-Shot%20Learning%20on%20Neuromorphic%20Hardware%3A%20An%20Empirical%20Study%20Across%20Physical%20Edge%20Nodes&body=Title%3A%20Federated%20Few-Shot%20Learning%20on%20Neuromorphic%20Hardware%3A%20An%20Empirical%20Study%20Across%20Physical%20Edge%20Nodes%0AAuthor%3A%20Steven%20Motta%20and%20Gioele%20Nanni%0AAbstract%3A%20Federated%20learning%20on%20neuromorphic%20hardware%20remains%20unexplored%20because%20on-chip%20spike-timing-dependent%20plasticity%20%28STDP%29%20produces%20binary%20weight%20updates%20rather%20than%20the%20floating-point%20gradients%20assumed%20by%20standard%20algorithms.%20We%20build%20a%20two-node%20federated%20system%20with%20BrainChip%20Akida%20AKD1000%20processors%20and%20run%20approximately%201%2C580%20experimental%20trials%20across%20seven%20analysis%20phases.%20Of%20four%20weight-exchange%20strategies%20tested%2C%20neuron-level%20concatenation%20%28FedUnion%29%20consistently%20preserves%20accuracy%20while%20element-wise%20weight%20averaging%20%28FedAvg%29%20destroys%20it%20%28p%20%3D%200.002%29.%20Domain-adaptive%20fine-tuning%20of%20the%20upstream%20feature%20extractor%20accounts%20for%20most%20of%20the%20accuracy%20gains%2C%20confirming%20feature%20quality%20as%20the%20dominant%20factor.%20Scaling%20feature%20dimensionality%20from%2064%20to%20256%20yields%2077.0%25%20best-strategy%20federated%20accuracy%20%28n%3D30%2C%20p%20%3C%200.001%29.%20Two%20independent%20asymmetries%20%28wider%20features%20help%20federation%20more%20than%20individual%20learning%2C%20while%20binarization%20hurts%20federation%20more%29%20point%20to%20a%20shared%20prototype%20complementarity%20mechanism%3A%20cross-node%20transfer%20scales%20with%20the%20distinctiveness%20of%20neuron%20prototypes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13037v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFederated%2520Few-Shot%2520Learning%2520on%2520Neuromorphic%2520Hardware%253A%2520An%2520Empirical%2520Study%2520Across%2520Physical%2520Edge%2520Nodes%26entry.906535625%3DSteven%2520Motta%2520and%2520Gioele% {"title": "ReMem-VLA: Empowering Vision-Language-Action Model with Memory via Dual-Level Recurrent Queries", "author": "Hang Li and Fengyi Shen and Dong Chen and Liudi Yang and Xudong Wang and Jinkui Shi and Zhenshan Bing and Ziyuan Liu and Alois Knoll", "abstract": "Vision-language-action (VLA) models for closed-loop robot control are typically cast under the Markov assumption, making them prone to errors on tasks requiring historical context. To incorporate memory, existing VLAs either retrieve from a memory bank, which can be misled by distractors, or extend the frame window, whose fixed horizon still limits long-term retention. In this paper, we introduce ReMem-VLA, a Recurrent Memory VLA model equipped with two sets of learnable queries: frame-level recurrent memory queries for propagating information across consecutive frames to support short-term memory, and chunk-level recurrent memory queries for carrying context across temporal chunks for long-term memory. These queries are trained end-to-end to aggregate and maintain relevant context over time, implicitly guiding the model's decisions without additional training or inference cost. Furthermore, to enhance visual memory, we introduce Past Observation Prediction as an auxiliary training objective. Through extensive memory-centric simulation and real-world robot experiments, we demonstrate that ReMem-VLA exhibits strong memory capabilities across multiple dimensions, including spatial, sequential, episodic, temporal, and visual memory. ReMem-VLA significantly outperforms memory-free VLA baselines $\u03c0$0.5 and OpenVLA-OFT and surpasses MemoryVLA on memory-dependent tasks by a large margin.", "link": "http://arxiv.org/abs/2603.12942v1", "date": "2026-03-13", "relevancy": 2.024, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5075}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5075}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4986}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReMem-VLA%3A%20Empowering%20Vision-Language-Action%20Model%20with%20Memory%20via%20Dual-Level%20Recurrent%20Queries&body=Title%3A%20ReMem-VLA%3A%20Empowering%20Vision-Language-Action%20Model%20with%20Memory%20via%20Dual-Level%20Recurrent%20Queries%0AAuthor%3A%20Hang%20Li%20and%20Fengyi%20Shen%20and%20Dong%20Chen%20and%20Liudi%20Yang%20and%20Xudong%20Wang%20and%20Jinkui%20Shi%20and%20Zhenshan%20Bing%20and%20Ziyuan%20Liu%20and%20Alois%20Knoll%0AAbstract%3A%20Vision-language-action%20%28VLA%29%20models%20for%20closed-loop%20robot%20control%20are%20typically%20cast%20under%20the%20Markov%20assumption%2C%20making%20them%20prone%20to%20errors%20on%20tasks%20requiring%20historical%20context.%20To%20incorporate%20memory%2C%20existing%20VLAs%20either%20retrieve%20from%20a%20memory%20bank%2C%20which%20can%20be%20misled%20by%20distractors%2C%20or%20extend%20the%20frame%20window%2C%20whose%20fixed%20horizon%20still%20limits%20long-term%20retention.%20In%20this%20paper%2C%20we%20introduce%20ReMem-VLA%2C%20a%20Recurrent%20Memory%20VLA%20model%20equipped%20with%20two%20sets%20of%20learnable%20queries%3A%20frame-level%20recurrent%20memory%20queries%20for%20propagating%20information%20across%20consecutive%20frames%20to%20support%20short-term%20memory%2C%20and%20chunk-level%20recurrent%20memory%20queries%20for%20carrying%20context%20across%20temporal%20chunks%20for%20long-term%20memory.%20These%20queries%20are%20trained%20end-to-end%20to%20aggregate%20and%20maintain%20relevant%20context%20over%20time%2C%20implicitly%20guiding%20the%20model%27s%20decisions%20without%20additional%20training%20or%20inference%20cost.%20Furthermore%2C%20to%20enhance%20visual%20memory%2C%20we%20introduce%20Past%20Observation%20Prediction%20as%20an%20auxiliary%20training%20objective.%20Through%20extensive%20memory-centric%20simulation%20and%20real-world%20robot%20experiments%2C%20we%20demonstrate%20that%20ReMem-VLA%20exhibits%20strong%20memory%20capabilities%20across%20multiple%20dimensions%2C%20including%20spatial%2C%20sequential%2C%20episodic%2C%20temporal%2C%20and%20visual%20memory.%20ReMem-VLA%20significantly%20outperforms%20memory-free%20VLA%20baselines%20%24%CF%80%240.5%20and%20OpenVLA-OFT%20and%20surpasses%20MemoryVLA%20on%20memory-dependent%20tasks%20by%20a%20large%20margin.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12942v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReMem-VLA%253A%2520Empowering%2520Vision-Language-Action%2520Model%2520with%2520Memory%2520via%2520Dual-Level%2520Recurrent%2520Queries%26entry.906535625%3DHang%2520Li%2520and%2520Fengyi%2520Shen%2520and%2520Dong%2520Chen%2520and%2520Liudi%2520Yang%2520and%2520Xudong%2520Wang%2520and%2520Jinkui%2520Shi%2520and%2520Zhenshan%2520Bing%2520and%2520Ziyuan%2520Liu%2520and%2520Alois%2520Knoll%26entry.1292438233%3DVision-language-action%2520%2528VLA%2529%2520models%2520for%2520closed-loop%2520robot%2520control%2520are%2520typically%2520cast%2520under%2520the%2520Markov%2520assumption%252C%2520making%2520them%2520prone%2520to%2520errors%2520on%2520tasks%2520requiring%2520historical%2520context.%2520To%2520incorporate%2520memory%252C%2520existing%2520VLAs%2520either%2520retrieve%2520from%2520a%2520memory%2520bank%252C%2520which%2520can%2520be%2520misled%2520by%2520distractors%252C%2520or%2520extend%2520the%2520frame%2520window%252C%2520whose%2520fixed%2520horizon%2520still%2520limits%2520long-term%2520retention.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520ReMem-VLA%252C%2520a%2520Recurrent%2520Memory%2520VLA%2520model%2520equipped%2520with%2520two%2520sets {"title": "RooflineBench: A Benchmarking Framework for On-Device LLMs via Roofline Analysis", "author": "Zhen Bi and Xueshu Chen and Luoyang Sun and Yuhang Yao and Qing Shen and Jungang Lou and Cheng Deng", "abstract": "The transition toward localized intelligence through Small Language Models (SLMs) has intensified the need for rigorous performance characterization on resource-constrained edge hardware. However, objectively measuring the theoretical performance ceilings of diverse architectures across heterogeneous platforms remains a formidable challenge. In this work, we propose a systematic framework based on the Roofline model that unifies architectural primitives and hardware constraints through the lens of operational intensity (OI). By defining an inference-potential region, we introduce the Relative Inference Potential as a novel metric to compare efficiency differences between Large Language Models (LLMs) on the same hardware substrate. Extensive empirical analysis across diverse compute tiers reveals that variations in performance and OI are significantly influenced by sequence length. We further identify a critical regression in OI as model depth increases. Additionally, our findings highlight an efficiency trap induced by hardware heterogeneity and demonstrate how structural refinements, such as Multi-head Latent Attention (M LA), can effectively unlock latent inference potential across various hardware substrates. These insights provide actionable directions for hardware-software co-design to align neural structures with physical constraints in on-device intelligence. The released code is available in the Appendix C.", "link": "http://arxiv.org/abs/2602.11506v3", "date": "2026-03-13", "relevancy": 1.9975, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5002}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Exact Federated Continual Unlearning for Ridge Heads on Frozen Foundation Models", "author": "Yijun Quan and Wentai Wu and Giovanni Montana", "abstract": "Foundation models are commonly deployed as frozen feature extractors with a small trainable head to adapt to private, user-generated data in federated settings. The ``right to be forgotten'' requires removing the influence of specific samples or users from the trained model on demand. Existing federated unlearning methods target general deep models and rely on approximate reconstruction or selective retraining, making exactness costly or elusive. We study this problem in a practically relevant but under-explored regime: a frozen foundation model with a ridge-regression head. The exact optimum depends on the data only through two additive sufficient statistics, which we turn into a communication protocol supporting an arbitrary stream of \\emph{add} and \\emph{delete} requests via fixed-size messages. The server maintains a head that is, in exact arithmetic, \\emph{pointwise identical} to centralized retraining after every request. We provide deterministic retrain-equivalence guarantees, order and partition invariance, two server-side variants, and a Bayesian certificate of zero KL divergence. Experiments on four benchmarks confirm the guarantees: both variants match centralized ridge retraining to within $10^{-9}$ relative Frobenius error and complete each request at orders-of-", "link": "http://arxiv.org/abs/2603.12977v1", "date": "2026-03-13", "relevancy": 1.8075, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4543}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4513}, {"ti {"title": "Beyond Final Answers: CRYSTAL Benchmark for Transparent Multimodal Reasoning Evaluation", "author": "Wayner Barrios and SouYoung Jin", "abstract": "We introduce **CRYSTAL** (*__C__lear __R__easoning via __Y__ielded __S__teps, __T__raceability and __L__ogic*), a diagnostic benchmark with 6,372 instances that evaluates multimodal reasoning through verifiable intermediate steps. We propose two complementary metrics: *Match F1*, which scores step-level precision and recall via semantic similarity matching, and *Ordered Match F1*, which further penalizes disordered reasoning chains. References are constructed through a Delphi-inspired pipeline where four independent MLLMs generate trajectories, aggregated via semantic clustering and validated through human quality gates. Evaluation of 20 MLLMs, including commercial frontier systems not used during benchmark construction, reveals systematic failures invisible to accuracy: universal cherry-picking (precision far exceeds recall), non-monotonic scaling trade-offs, and disordered reasoning where no competitive model preserves more than 60% of matched steps in correct order. Beyond evaluation, we propose the **Causal Process Reward (CPR)**, a multiplicative reward that couples answer correctness with step-level alignment, and **CPR-Curriculum**, which progressively increases reasoning difficulty during training. CPR-Curriculum achieves +32% Match F1 via GRPO where additive reward strategies fail, improving reasoning without manual step annotation.", "link": "http://arxiv.org/abs/2603.13099v1", "date": "2026-03-13", "relevancy": 1.9135, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4825}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evi {"title": "Clustering Astronomical Orbital Synthetic Data Using Advanced Feature Extraction and Dimensionality Reduction Techniques", "author": "Eraldo Pereira Marinho and Nelson Callegari Junior and Fabricio Aparecido Breve and Caetano Mazzoni Ranieri", "abstract": "The dynamics of Saturn's satellite system offer a rich framework for studying orbital stability and resonance interactions. Traditional methods for analysing such systems, including Fourier analysis and stability metrics, struggle with the scale and complexity of modern datasets. This study introduces a machine learning-based pipeline for clustering approximately 22,300 simulated satellite orbits, addressing these challenges with advanced feature extraction and dimensionality reduction techniques. The key to this approach is using MiniRocket, which efficiently transforms 400 timesteps into a 9,996-dimensional feature space, capturing intricate temporal patterns. Additional automated feature extraction and dimensionality reduction techniques refine the data, enabling robust clustering analysis. This pipeline reveals stability regions, resonance structures, and other key behaviours in Saturn's satellite system, providing new insights into their long-term dynamical evolution. By integrating computational tools with traditional celestial mechanics techniques, this study offers a scalable and interpretable methodology for analysing large-scale orbital datasets and advancing the exploration of planetary dynamics.", "link": "http://arxiv.org/abs/2603.13177v1", "date": "2026-03-13", "relevancy": 1.376, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4668}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.45}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive {"title": "Global Sensitivity Analysis for Engineering Design Based on Individual Conditional Expectations", "author": "Pramudita Satria Palar and Paul Saves and Rommel G. Regis and Koji Shimoyama and Shigeru Obayashi and Nicolas Verstaevel and Joseph Morlier", "abstract": "Explainable machine learning techniques have gained increasing attention in engineering applications, especially in aerospace design and analysis, where understanding how input variables influence data-driven models is essential. Partial Dependence Plots (PDPs) are widely used for interpreting black-box models by showing the average effect of an input variable on the prediction. However, their global sensitivity metric can be misleading when strong interactions are present, as averaging tends to obscure interaction effects. To address this limitation, we propose a global sensitivity metric based on Individual Conditional Expectation (ICE) curves. The method computes the expected feature importance across ICE curves, along with their standard deviation, to more effectively capture the influence of interactions. We provide a mathematical proof demonstrating that the PDP-based sensitivity is a lower bound of the proposed ICE-based metric under truncated orthogonal polynomial expansion. In addition, we introduce an ICE-based correlation value to quantify how interactions modify the relationship between inputs and the output. Comparative evaluations were performed on three cases: a 5-variable analytical function, a 5-variable wind-turbine fatigue problem, and a 9-variable airfoil aerodynamics case, where ICE-based sensitivity was benchmarked against PDP, SHapley Additive exPlanations (SHAP), and Sobol' indices. The results show that ICE-based feature importance provides richer insights than the traditional PDP-based approach, while visual interpretations from PDP, ICE, and SHAP complement one another by offering multiple perspectives.", "link": "http://arxiv.org/abs/2512.11946v3", "date": "2026-03-13" {"title": "A protocol for evaluating robustness to H&E staining variation in computational pathology models", "author": "Lydia A. Sch\u00f6npflug and Nikki van den Berg and Sonali Andani and Nanda Horeweg and Jurriaan Barkey Wolf and Tjalling Bosse and Viktor H. Koelzer and Maxime W. Lafarge", "abstract": "Sensitivity to staining variation remains a major barrier to deploying computational pathology (CPath) models as hematoxylin and eosin (H&E) staining varies across laboratories, requiring systematic assessment of how this variability affects model prediction. In this work, we developed a three-step protocol for evaluating robustness to H&E staining variation in CPath models. Step 1: Select reference staining conditions, Step 2: Characterize test set staining properties, Step 3: Apply CPath model(s) under simulated reference staining conditions. Here, we first created a new reference staining library based on the PLISM dataset. As an exemplary use case, we applied the protocol to assess the robustness properties of 306 microsatellite instability (MSI) classification models on the unseen SurGen colorectal cancer dataset (n=738), including 300 attention-based multiple instance learning models trained on the TCGA-COAD/READ datasets across three feature extractors (UNI2-h, H-Optimus-1, Virchow2), alongside six public MSI classification models. Classification performance was measured as AUC, and robustness as the min-max AUC range across four simulated staining conditions (low/high H&E intensity, low/high H&E color similarity). Across models and staining conditions, classification performance ranged from AUC 0.769-0.911 ($\u0394$ = 0.142). Robustness ranged from 0.007-0.079 ($\u0394$ = 0.072), and showed a weak inverse correlation with classification performance (Pearson r=-0.22, 95% CI [-0.34, -0.11]). Thus, we show that the proposed evaluation protocol enables robustness-informed CPath model selection and provides insight into performance shifts across H&E staining conditions, supporting the identification of operational ranges for reliable model deployment. Code is available at https://github.com/CTPLab/staining-robustness-evaluation .", "link": "http://arxiv.org/abs/2603.12886v1", "date": "2026-03-13", "relevancy": 1.2407, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.4164}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4142}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4122}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20protocol%20for%20evaluating%20robustness%20to%20H%26E%20staining%20variation%20in%20computational%20pathology%20models&body=Title%3A%20A%20protocol%20for%20evaluating%20robustness%20to%20H%26E%20staining%20variation%20in%20computational%20pathology%20models%0AAuthor%3A%20Lydia%20A.%20Sch%C3%B6npflug%20and%20Nikki%20van%20den%20Berg%20and%20Sonali%20Andani%20and%20Nanda%20Horeweg%20and%20Jurriaan%20Barkey%20Wolf%20and%20Tjalling%20Bosse%20and%20Viktor%20H.%20Koelzer%20and%20Maxime%20W.%20Lafarge%0AAbstract%3A%20Sensitivity%20to%20staining%20variation%20remains%20a%20major%20barrier%20to%20deploying%20computational%20pathology%20%28CPath%29%20models%20as%20hematoxylin%20and%20eosin%20%28H%26E%29%20staining%20varies%20across%20laboratories%2C%20requiring%20systematic%20assessment%20of%20how%20this%20variability%20affects%20model%20prediction.%20In%20this%20work%2C%20we%20developed%20a%20three-step%20protocol%20for%20evaluating%20robustness%20to%20H%26E%20staining%20variation%20in%20CPath%20models.%20Step%201%3A%20Select%20reference%20staining%20conditions%2C%20Step%202%3A%20Characterize%20test%20set%20staining%20properties%2C%20Step%203%3A%20Apply%20CPath%20model%28s%29%20under%20simulated%20reference%20staining%20conditions.%20Here%2C%20we%20first%20created%20a%20new%20reference%20staining%20library%20based%20on%20the%20PLISM%20dataset.%20As%20an%20exemplary%20use%20case%2C%20we%20applied%20the%20protocol%20to%20assess%20the%20robustness%20properties%20of%20306%20microsatellite%20instability%20%28MSI%29%20classification%20models%20on%20the%20unseen%20SurGen%20colorectal%20cancer%20dataset%20%28n%3D738%29%2C%20including%20300%20attention-based%20multiple%20instance%20learning%20models%20trained%20on%20the%20TCGA-COAD/READ%20datasets%20across%20three%20feature%20extractors%20%28UNI2-h%2C%20H-Optimus-1%2C%20Virchow2%29%2C%20alongside%20six%20public%20MSI%20classification%20models.%20Classification%20performance%20was%20measured%20as%20AUC%2C%20and%20robustness%20as%20the%20min-max%20AUC%20range%20across%20four%20simulated%20staining%20conditions%20%28low/high%20H%26E%20intensity%2C%20low/high%20H%26E%20color%20similarity%29.%20Across%20models%20and%20staining%20conditions%2C%20classification%20performance%20ranged%20from%20AUC%200.769-0.911%20%28%24%CE%94%24%20%3D%200.142%29.%20Robustness%20ranged%20from%200.007-0.079%20%28%24%CE%94%24%20%3D%200.072%29%2C%20and%20showed%20a%20weak%20inverse%20correlation%20with%20classification%20performance%20%28Pearson%20r%3D-0.22%2C%2095%25%20CI%20%5B-0.34%2C%20-0.11%5D%29.%20Thus%2C%20we%20show%20that%20the%20proposed%20evaluation%20protocol%20enables%20robustness-informed%20CPath%20model%20selection%20and%20provides%20insight%20into%20performance%20shifts%20across%20H%26E%20staining%20conditions%2C%20supporting%20the%20identification%20of%20operational%20ranges%20for%20reliable%20model%20deployment.%20Code%20is%20available%20at%20https%3A//github.com/CTPLab/staining-robustness-evaluation%20.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12886v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520pr {"title": "TRACE: Structure-Aware Character Encoding for Robust and Generalizable Document Watermarking", "author": "Jiale Meng and Jie Zhang and Runyi Hu and Zhe-Ming Lu and Tianwei Zhang and Yiming Li", "abstract": "We propose TRACE, a structure-aware framework leveraging diffusion models for localized character encoding to embed data. Unlike existing methods that rely on edge features or pre-defined codebooks, TRACE exploits character structures that provide inherent resistance to noise interference due to their stability and unified representation across diverse characters. Our framework comprises three key components: (1) adaptive diffusion initialization that automatically identifies handle points, target points, and editing regions through specialized algorithms including movement probability estimator (MPE), target point estimation (TPE) and mask drawing model (MDM), (2) guided diffusion encoding for precise movement of selected point, and (3) masked region replacement with a specialized loss function to minimize feature alterations after the diffusion process. Comprehensive experiments demonstrate \\name{}'s superior performance over state-of-the-art methods, achieving more than 5 dB improvement in PSNR and 5\\% higher extraction accuracy following cross-media transmission. \\name{} achieves broad generalizability across multiple languages and fonts, making it particularly suitable for practical document security applications.", "link": "http://arxiv.org/abs/2603.12873v1", "date": "2026-03-13", "relevancy": 1.9893, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5147}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4857}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4828}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TRACE%3A%20Structure-Aware%20Character%20Encoding%20for%20Robust%20and%20Generalizable%20Document%20Watermarking&body=Title%3A%20TRACE%3A%20Structure-Aware%20Character%20Encoding%20for%20Robust%20and%20Generalizable%20Document%20Watermarking%0AAuthor%3A%20Jiale%20Meng%20and%20Jie%20Zhang%20and%20Runyi%20Hu%20and%20Zhe-Ming%20Lu%20and%20Tianwei%20Zhang%20and%20Yiming%20Li%0AAbstract%3A%20We%20propose%20TRACE%2C%20a%20structure-aware%20framework%20leveraging%20diffusion%20models%20for%20localized%20character%20encoding%20to%20embed%20data.%20Unlike%20existing%20methods%20that%20rely%20on%20edge%20features%20or%20pre-defined%20codebooks%2C%20TRACE%20exploits%20character%20structures%20that%20provide%20inherent%20resistance%20to%20noise%20interference%20due%20to%20their%20stability%20and%20unified%20representation%20across%20diverse%20characters.%20Our%20framework%20comprises%20three%20key%20components%3A%20%281%29%20adaptive%20diffusion%20initialization%20that%20automatically%20identifies%20handle%20points%2C%20target%20points%2C%20and%20editing%20regions%20through%20specialized%20algorithms%20including%20movement%20probability%20estimator%20%28MPE%29%2C%20target%20point%20estimation%20%28TPE%29%20and%20mask%20drawing%20model%20%28MDM%29%2C%20%282%29%20guided%20diffusion%20encoding%20for%20precise%20movement%20of%20selected%20point%2C%20and%20%283%29%20masked%20region%20replacement%20with%20a%20specialized%20loss%20function%20to%20minimize%20feature%20alterations%20after%20the%20diffusion%20process.%20Comprehensive%20experiments%20demonstrate%20%5Cname%7B%7D%27s%20superior%20performance%20over%20state-of-the-art%20methods%2C%20achieving%20more%20than%205%20dB%20improvement%20in%20PSNR%20and%205%5C%25%20higher%20extraction%20accuracy%20following%20cross-media%20transmission.%20%5Cname%7B%7D%20achieves%20broad%20generalizability%20across%20multiple%20languages%20and%20fonts%2C%20making%20it%20particularly%20suitable%20for%20practical%20document%20security%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12873v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTRACE%253A%2520Structure-Aware%2520Character%2520Encoding%2520for%2520Robust%2520and%2520Generalizable%2520Document%2520Watermarking%26entry.906535625%3DJiale%2520Meng%2520and%2520Jie%2520Zhang%2520and%2520Runyi%2520Hu%2520and%2520Zhe-Ming%2520Lu%2520and%2520Tianwei%2520Zhang%2520and%2520Yiming%2520Li%26entry.1292438233%3DWe%2520propose%2520TRACE%252C%2520a%2520structure-aware%2520framework%2520leveraging%2520diffusion%2520models%2520for%2520localized%2520character%2520encoding%2520to%2520embed%2520data.%2520Unlike%2520existing%2520methods%2520that%2520rely%2520on%2520edge%2520features%2520or%2520pre-defined%2520codebooks%252C%2520TRACE%2520exploits%2520character%2520structures%2520that%2520provide%2520inherent%2520resistance%2520to%2520noise%2520interference%2520due%2520to%2520their%2520stability%2520and%2520unified%2520representation%2520across%2520diverse%2520characters.%2520Our%2520framework%2520comprises%2520three%2520key%2520components%253A%2520%25281%2529%2520adaptive%2520diffusion%2520initialization%2520that%2520automatically%2520identifies%2520handle%2520points%252C%2520target%2520points%252C%2520and%2520editing%2520regions%2520through%2520specialized%2520algorithms%2520including%2520movement%2520probability%2520estimator%2520%2528MPE%2529%252C%2520target%2520point%2520estimation%2520%2528TPE%2529%2520and%2520mask%2520drawing%2520model%2520%2528MDM%2529%252C%2520%25282%2529%2520guided%2520diffusion%2520encoding%2520for%2520precise%2520movement%2520of%2520selected%2520point%252C%2520and%2520%25283%2529%2520masked%2520region%2520replacement%2520with%2520a%2520specialized%2520loss%2520function%2520to%2520minimize%2520feature%2520alterations%2520after%2520the%2520diffusion%2520process.%2520Comprehensive%2 oint%2C%20and%20%283%29%20masked%20region%20replacement%20with%20a%20specialized%20loss%20function%20to%20minimize%20feature%20alterations%20after%20the%20diffusion%20process.%20Comprehensive%20experiments%20demonstrate%20%5Cname%7B%7D%27s%20superior%20performance%20over%20state-of-the-art%20methods%2C%20achieving%20more%20than%205%20dB%20improvement%20in%20PSNR%20and%205%5C%25%20higher%20extraction%20accuracy%20following%20cross-media%20transmission.%20%5Cname%7B%7D%20achieves%20broad%20generalizability%20across%20multiple%20languages%20and%20fonts%2C%20making%20it%20particularly%20suitable%20for%20practical%20document%20security%20applications.&entry.1838667208=http%3A//arxiv.org/abs/2603.12873v1&entry.124074799=Read"},
{"title": "DiT-IC: Aligned Diffusion Transformer for Efficient Image Compression", "author": "Junqi Shi and Ming Lu and Xingchen Li and Anle Ke and Ruiqi Zhang and Zhan Ma", "abstract": "Diffusion-based image compression has recently shown outstanding perceptual fidelity, yet its practicality is hindered by prohibitive sampling overhead and high memory usage. Most existing diffusion codecs employ U-Net architectures, where hierarchical downsampling forces diffusion to operate in shallow latent spaces (typically with only 8x spatial downscaling), resulting in excessive computation. In contrast, conventional VAE-based codecs work in much deeper latent domains (16x - 64x downscaled), motivating a key question: Can diffusion operate effectively in such compact latent spaces without compromising reconstruction quality? To address this, we introduce DiT-IC, an Aligned Diffusion Transformer for Image Compression, which replaces the U-Net with a Diffusion Transformer capable of performing diffusion in latent space entirely at 32x downscaled resolution. DiT-IC adapts a pretrained text-to-image multi-step DiT into a single-step reconstruction model through three key alignment mechanisms: (1) a variance-guided reconstruction flow that adapts denoising strength to latent uncertainty for efficient reconstruction; (2) a self-distillation alignment that enforces consistency with encoder-defined latent geometry to enable one-step diffusion; and (3) a latent-conditioned guidance that replaces text prompts with semantically aligned latent conditions, enabling text-free inference. With these designs, DiT-IC achieves state-of-the-art perceptual quality while offering up to 30x faster decoding and drastically lower memory usage than existing diffusion-based codecs. Remarkably, it can reconstruct 2048x2048 images on a 16 GB laptop GPU.", "link": "http://arxiv.org/abs/2603.13162v1", "date": "2026-03-13", "relevancy": 1.9428, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.7111}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6516}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6206}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DiT-IC%3A%20Aligned%20Diffusion%20Transformer%20for%20Efficient%20Image%20Compression&body=Title%3A%20DiT-IC%3A%20Aligned%20Diffusion%20Transformer%20for%20Efficient%20Image%20Compression%0AAuthor%3A%20Junqi%20Shi%20and%20Ming%20Lu%20and%20Xingchen%20Li%20and%20Anle%20Ke%20and%20Ruiqi%20Zhang%20and%20Zhan%20Ma%0AAbstract%3A%20Diffusion-based%20image%20compression%20has%20recently%20shown%20outstanding%20perceptual%20fidelity%2C%20yet%20its%20practicality%20is%20hindered%20by%20prohibitive%20sampling%20overhead%20and%20high%20memory%20usage.%20Most%20existing%20diffusion%20codecs%20employ%20U-Net%20architectures%2C%20where%20hierarchical%20downsampling%20forces%20diffusion%20to%20operate%20in%20shallow%20latent%20spaces%20%28typically%20with%20only%208x%20spatial%20downscaling%29%2C%20resulting%20in%20excessive%20computation.%20In%20contrast%2C%20conventional%20VAE-based%20codecs%20work%20in%20much%20deeper%20latent%20domains%20%2816x%20-%2064x%20downscaled%29%2C%20motivating%20a%20key%20question%3A%20Can%20diffusion%20operate%20effectively%20in%20such%20compact%20latent%20spaces%20without%20compromising%20reconstruction%20quality%3F%20To%20address%20this%2C%20we%20introduce%20DiT-IC%2C%20an%20Aligned%20Diffusion%20Transformer%20for%20Image%20Compression%2C%20which%20replaces%20the%20U-Net%20with%20a%20Diffusion%20Transformer%20capable%20of%20performing%20diffusion%20in%20latent%20space%20entirely%20at%2032x%20downscaled%20resolution.%20DiT-IC%20adapts%20a%20pretrained%20text-to-image%20multi-step%20DiT%20into%20a%20single-step%20reconstruction%20model%20through%20three%20key%20alignment%20mechanisms%3A%20%281%29%20a%20variance-guided%20reconstruction%20flow%20that%20adapts%20denoising%20strength%20to%20latent%20uncertainty%20for%20efficient%20reconstruction%3B%20%282%29%20a%20self-distillation%20alignment%20that%20enforces%20consistency%20with%20encoder-defined%20latent%20geometry%20to%20enable%20one-step%20diffusion%3B%20and%20%283%29%20a%20latent-conditioned%20guidance%20that%20replaces%20text%20prompts%20with%20semantically%20aligned%20latent%20conditions%2C%20enabling%20text-free%20inference.%20With%20these%20designs%2C%20DiT-IC%20achieves%20state-of-the-art%20perceptual%20quality%20while%20offering%20up%20to%2030x%20faster%20decoding%20and%20drastically%20lower%20memory%20usage%20than%20existing%20diffusion-based%20codecs.%20Remarkably%2C%20it%20can%20reconstruct%202048x2048%20images%20on%20a%2016%20GB%20laptop%20GPU.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13162v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiT-IC%253A%2520Aligned%2520Diffusion%2520Transformer%2520for%2520Efficient%2520Image%2520Compression%26entry.906535625%3DJunqi%2520Shi%2520and%2520Ming%2520Lu%2520and%2520Xingchen%2520Li%2520and%2520Anle%2520Ke%2520and%2520Ruiqi%2520Zhang%2520and%2520Zhan%2520Ma%26entry.1292438233%3DDiffusion-based%2520image%2520compression%2520has%2520recently%2520shown%2520outstanding%2520perceptual%2520fidelity%252C%2520yet%2520its%2520practicality%2520is%2520hindered%2520by%2520prohibitive%2520sampling%2520overhead%2520and%2520high%2520memory%2520usage.%2520Most%2520existing%2520diffusion%2520codecs%2520employ%2520U-Net%2520architectures%252C%2520where%2520hierarchical%2520downsampling%2520forces%2520diffusion%2520to%2520operate%2520in%2520shallow%2520latent%2520spaces%2520%2528typically%2520with%2520only%25208x%2520spatial%2520downscaling%2529%252C%2520resulting%2520in% {"title": "Composing Driving Worlds through Disentangled Control for Adversarial Scenario Generation", "author": "Yifan Zhan and Zhengqing Chen and Qingjie Wang and Zhuo He and Muyao Niu and Xiaoyang Guo and Wei Yin and Weiqiang Ren and Qian Zhang and Yinqiang Zheng", "abstract": "A major challenge in autonomous driving is the \"long tail\" of safety-critical edge cases, which often emerge from unusual combinations of common traffic elements. Synthesizing these scenarios is crucial, yet current controllable generative models provide incomplete or entangled guidance, preventing the independent manipulation of scene structure, object identity, and ego actions. We introduce CompoSIA, a compositional driving video simulator that disentangles these traffic factors, enabling fine-grained control over diverse adversarial driving scenarios. To support controllable identity replacement of scene elements, we propose a noise-level identity injection, allowing pose-agnostic identity generation across diverse element poses, all from a single reference image. Furthermore, a hierarchical dual-branch action control mechanism is introduced to improve action controllability. Such disentangled control enables adversarial scenario synthesis-systematically combining safe elements into dangerous configurations that entangled generators cannot produce. Extensive comparisons demonstrate superior controllable generation quality over state-of-the-art baselines, with a 17% improvement in FVD for identity editing and reductions of 30% and 47% in rotation and translation errors for action control. Furthermore, downstream stress-testing reveals substantial planner failures: across editing modalities, the average collision rate of 3s increases by 173%.", "link": "http://arxiv.org/abs/2603.12864v1", "date": "2026-03-13", "relevancy": 1.7115, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6008}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5643}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5556}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Composing%20Driving%20Worlds%20through%20Disentangled%20Control%20for%20Adversarial%20Scenario%20Generation&body=Title%3A%20Composing%20Driving%20Worlds%20through%20Disentangled%20Control%20for%20Adversarial%20Scenario%20Generation%0AAuthor%3A%20Yifan%20Zhan%20and%20Zhengqing%20Chen%20and%20Qingjie%20Wang%20and%20Zhuo%20He%20and%20Muyao%20Niu%20and%20Xiaoyang%20Guo%20and%20Wei%20Yin%20and%20Weiqiang%20Ren%20and%20Qian%20Zhang%20and%20Yinqiang%20Zheng%0AAbstract%3A%20A%20major%20challenge%20in%20autonomous%20driving%20is%20the%20%22long%20tail%22%20of%20safety-critical%20edge%20cases%2C%20which%20often%20emerge%20from%20unusual%20combinations%20of%20common%20traffic%20elements.%20Synthesizing%20these%20scenarios%20is%20crucial%2C%20yet%20current%20controllable%20generative%20models%20provide%20incomplete%20or%20entangled%20guidance%2C%20preventing%20the%20independent%20manipulation%20of%20scene%20structure%2C%20object%20identity%2C%20and%20ego%20actions.%20We%20introduce%20CompoSIA%2C%20a%20compositional%20driving%20video%20simulator%20that%20disentangles%20these%20traffic%20factors%2C%20enabling%20fine-grained%20control%20over%20diverse%20adversarial%20driving%20scenarios.%20To%20support%20controllable%20identity%20replacement%20of%20scene%20elements%2C%20we%20propose%20a%20noise-level%20identity%20injection%2C%20allowing%20pose-agnostic%20identity%20generation%20across%20diverse%20element%20poses%2C%20all%20from%20a%20single%20reference%20image.%20Furthermore%2C%20a%20hierarchical%20dual-branch%20action%20control%20mechanism%20is%20introduced%20to%20improve%20action%20controllability.%20Such%20disentangled%20control%20enables%20adversarial%20scenario%20synthesis-systematically%20combining%20safe%20elements%20into%20dangerous%20configurations%20that%20entangled%20generators%20cannot%20produce.%20Extensive%20comparisons%20demonstrate%20superior%20controllable%20generation%20quality%20over%20state-of-the-art%20baselines%2C%20with%20a%2017%25%20improvement%20in%20FVD%20for%20identity%20editing%20and%20reductions%20of%2030%25%20and%2047%25%20in%20rotation%20and%20translation%20errors%20for%20action%20control.%20Furthermore%2C%20downstream%20stress-testing%20reveals%20substantial%20planner%20failures%3A%20across%20editing%20modalities%2C%20the%20average%20collision%20rate%20of%203s%20increases%20by%20173%25.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12864v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DComposing%2520Driving%2520Worlds%2520through%2520Disentangled%2520Control%2520for%2520Adversarial%2520Scenario%2520Generation%26entry.906535625%3DYifan%2520Zhan%2520and%2520Zhengqing%2520Chen%2520and%2520Qingjie%2520Wang%2520and%2520Zhuo%2520He%2520and%2520Muyao%2520Niu%2520and%2520Xiaoyang%2520Guo%2520and%2520Wei%2520Yin%2520and%2520Weiqiang%2520Ren%2520and%2520Qian%2520Zhang%2520and%2520Yinqiang%2520Zheng%26entry.1292438233%3DA%2520major%2520challenge%2520in%2520autonomous%2520driving%2520is%2520the%2520%2522long%2520tail%2522%2520of%2520safety-critical%2520edge%2520cases%252C%2520which%2520often%2520emerge%2520from%2520unusual%2520combinations%2520of%2520common%2520traffic%2520elements.%2520Synthesizing%2520these%2520scenarios%2520is%2520crucial%252C%2520yet%2520current%2520controllable%2520generative%2520models%2520provide%2520incomplete%2520or%2520entangled%2520guidance%252C%2520preventing%2520the%2520independent%2520manipulation%2520of%2520scene%2520structure%252C%2520object%2520identity%252C%2520and%2520ego%2520actions.%2520We%2520introduce%2520CompoSIA%252C%2520a%2520compositional%2520driving%2520video%2520sim {"title": "Beyond Static Instruction: A Multi-agent AI Framework for Adaptive Augmented Reality Robot Training", "author": "Nicolas Leins and Jana Gonnermann-M\u00fcller and Malte Teichmann and Sebastian Pokutta", "abstract": "Augmented Reality (AR) offers powerful visualization capabilities for industrial robot training, yet current interfaces remain predominantly static, failing to account for learners' diverse cognitive profiles. In this paper, we present an AR application for robot training and propose a multi-agent AI framework for future integration that bridges the gap between static visualization and pedagogical intelligence. We report on the evaluation of the baseline AR interface with 36 participants performing a robotic pick-and-place task. While overall usability was high, notable disparities in task duration and learner characteristics highlighted the necessity for dynamic adaptation. To address this, we propose a multi-agent framework that orchestrates multiple components to perform complex preprocessing of multimodal inputs (e.g., voice, physiology, robot data) and adapt the AR application to the learner's needs. By utilizing autonomous Large Language Model (LLM) agents, the proposed system would dynamically adapt the learning environment based on advanced LLM reasoning in real-time.", "link": "http://arxiv.org/abs/2603.00016v2", "date": "2026-03-13", "relevancy": 1.7566, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5901}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5875}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Be {"title": "Proof-Carrying Materials: Falsifiable Safety Certificates for Machine-Learned Interatomic Potentials", "author": "Abhinaba Basu and Pavan Chakraborty", "abstract": "Machine-learned interatomic potentials (MLIPs) are deployed for high-throughput materials screening without formal reliability guarantees. We show that a single MLIP used as a stability filter misses 93% of density functional theory (DFT)-stable materials (recall 0.07) on a 25,000-material benchmark. Proof-Carrying Materials (PCM) closes this gap through three stages: adversarial falsification across compositional space, bootstrap envelope refinement with 95% confidence intervals, and Lean 4 formal certification. Auditing CHGNet, TensorNet and MACE reveals architecture-specific blind spots with near-zero pairwise error correlations (r <= 0.13; n = 5,000), confirmed by independent Quantum ESPRESSO validation (20/20 converged; median DFT/CHGNet force ratio 12x). A risk model trained on PCM-discovered features predicts failures on unseen materials (AUC-ROC = 0.938 +/- 0.004) and transfers across architectures (cross-MLIP AUC-ROC ~ 0.70; feature importance r = 0.877). In a thermoelectric screening case study, PCM-audited protocols discover 62 additional stable materials missed by single-MLIP screening - a 25% improvement in discovery yield.", "link": "http://arxiv.org/abs/2603.12183v2", "date": "2026-03-13", "relevancy": 1.2869, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4455}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4248}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "l 0%3D%200.877%29.%20In%20a%20thermoelectric%20screening%20case%20study%2C%20PCM-audited%20protocols%20discover%2062%20additional%20stable%20materials%20missed%20by%20single-MLIP%20screening%20-%20a%2025%25%20improvement%20in%20discovery%20yield.&entry.1838667208=http%3A//arxiv.org/abs/2603.12183v2&entry.124074799=Read"},
      ];
      const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

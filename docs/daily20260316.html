%20and%20real%20robot%20control%20by%20applying%20a%20Whole-Body%20Controller%20%28WBC%29%20that%20converts%20diffusion-generated%20motions%20into%20executable%20trajectories.%20While%20WBC%20trajectories%20become%20compliant%20with%20physics%2C%20they%20may%20expose%20substantial%20deviations%20from%20original%20motion.%20To%20address%20this%20issue%2C%20we%20here%20propose%20PhysMoDPO%2C%20a%20Direct%20Preference%20Optimization%20framework.%20Unlike%20prior%20work%20that%20relies%20on%20hand-crafted%20physics-aware%20heuristics%20such%20as%20foot-sliding%20penalties%2C%20we%20integrate%20WBC%20into%20our%20training%20pipeline%20and%20optimize%20diffusion%20model%20such%20that%20the%20output%20of%20WBC%20becomes%20compliant%20both%20with%20physics%20and%20original%20text%20instructions.%20To%20train%20PhysMoDPO%20we%20deploy%20physics-based%20and%20task-specific%20rewards%20and%20use%20them%20to%20assign%20preference%20to%20synthesized%20trajectories.%20Our%20extensive%20experiments%20on%20text-to-motion%20and%20spatial%20control%20tasks%20demonstrate%20consistent%20improvements%20of%20PhysMoDPO%20in%20both%20physical%20realism%20and%20task-related%20metrics%20on%20simulated%20robots.%20Moreover%2C%20we%20demonstrate%20that%20PhysMoDPO%20results%20in%20significant%20improvements%20when%20applied%20to%20zero-shot%20motion%20transfer%20in%20simulation%20and%20for%20real-world%20deployment%20on%20a%20G1%20humanoid%20robot.&entry.1838667208=http%3A//arxiv.org/abs/2603.13228v1&entry.124074799=Read"},
{"title": "Geometry-Guided Camera Motion Understanding in VideoLLMs", "author": "Haoan Feng and Sri Harsha Musunuri and Guan-Ming Su", "abstract": "Camera motion is a fundamental geometric signal that shapes visual perception and cinematic style, yet current video-capable vision-language models (VideoLLMs) rarely represent it explicitly and often fail on fine-grained motion primitives. We address this gap with a framework of $\\textbf{benchmarking}$, $\\textbf{diagnosis}$, and $\\textbf{injection}$. We curate $\\textbf{CameraMotionDataset}$, a large-scale synthetic dataset with explicit camera control, formulate camera motion as constraint-aware multi-label recognition, and construct a VQA benchmark--$\\textbf{CameraMotionVQA}$. Across diverse off-the-shelf VideoLLMs, we observe substantial errors in recognizing camera motion primitives. Probing experiments on a Qwen2.5-VL vision encoder suggest that camera motion cues are weakly represented, especially in deeper ViT blocks, helping explain the observed failure modes. To bridge this gap without costly training or fine-tuning, we propose a lightweight, model-agnostic pipeline that extracts geometric camera cues from 3D foundation models (3DFMs), predicts constrained motion primitives with a temporal classifier, and injects them into downstream VideoLLM inference via structured prompting. Experiments demonstrate improved motion recognition and more camera-aware model responses, highlighting geometry-driven cue extraction and structured prompting as practical steps toward a camera-aware VideoLLM and VLA system. The dataset and benchmark is publicly available at https://hf.co/datasets/fengyee/camera-motion-dataset-and-benchmark.", "link": "http://arxiv.org/abs/2603.13119v1", "date": "2026-03-13", "relevancy": 2.4017, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.616}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5973}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5973}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geometry-Guided%20Camera%20Motion%20Understanding%20in%20VideoLLMs&body=Title%3A%20Geometry-Guided%20Camera%20Motion%20Understanding%20in%20VideoLLMs%0AAuthor%3A%20Haoan%20Feng%20and%20Sri%20Harsha%20Musunuri%20and%20Guan-Ming%20Su%0AAbstract%3A%20Camera%20motion%20is%20a%20fundamental%20geometric%20signal%20that%20shapes%20visual%20perception%20and%20cinematic%20style%2C%20yet%20current%20video-capable%20vision-language%20models%20%28VideoLLMs%29%20rarely%20represent%20it%20explicitly%20and%20often%20fail%20on%20fine-grained%20motion%20primitives.%20We%20address%20this%20gap%20with%20a%20framework%20of%20%24%5Ctextbf%7Bbenchmarking%7D%24%2C%20%24%5Ctextbf%7Bdiagnosis%7D%24%2C%20and%20%24%5Ctextbf%7Binjection%7D%24.%20We%20curate%20%24%5Ctextbf%7BCameraMotionDataset%7D%24%2C%20a%20large-scale%20synthetic%20dataset%20with%20explicit%20camera%20control%2C%20formulate%20camera%20motion%20as%20constraint-aware%20multi-label%20recognition%2C%20and%20construct%20a%20VQA%20benchmark--%24%5Ctextbf%7BCameraMotionVQA%7D%24.%20Across%20diverse%20off-the-shelf%20VideoLLMs%2C%20we%20observe%20substantial%20errors%20in%20recognizing%20camera%20motion%20primitives.%20Probing%20experiments%20on%20a%20Qwen2.5-VL%20vision%20encoder%20suggest%20that%20camera%20motion%20cues%20are%20weakly%20represented%2C%20especially%20in%20deeper%20ViT%20blocks%2C%20helping%20explain%20the%20observed%20failure%20modes.%20To%20bridge%20this%20gap%20without%20costly%20training%20or%20fine-tuning%2C%20we%20propose%20a%20lightweight%2C%20model-agnostic%20pipeline%20that%20extracts%20geometric%20camera%20cues%20from%203D%20foundation%20models%20%283DFMs%29%2C% {"title": "ESPIRE: A Diagnostic Benchmark for Embodied Spatial Reasoning of Vision-Language Models", "author": "Yanpeng Zhao and Wentao Ding and Hongtao Li and Baoxiong Jia and Zilong Zheng", "abstract": "A recent trend in vision-language models (VLMs) has been to enhance their spatial cognition for embodied domains. Despite progress, existing evaluations have been limited both in paradigm and in coverage, hindering rapid, iterative model development. To address these limitations, we propose ESPIRE, a diagnostic benchmark for embodied spatial reasoning. ESPIRE offers a simulated world that physically grounds VLMs and evaluates them on spatial-reasoning-centric robotic tasks, thus narrowing the gap between evaluation and real-world deployment. To adapt VLMs to robotic tasks, we decompose each task into localization and execution, and frame both as generative problems, in stark contrast to predominant discriminative evaluations (e.g., via visual-question answering) that rely on distractors and discard execution. This decomposition further enables a fine-grained analysis beyond passive spatial reasoning toward reasoning to act. We systematically design ESPIRE both at the instruction level and at the environment level, ensuring broad coverage of spatial reasoning scenarios. We use ESPIRE to diagnose a range of frontier VLMs and provide in-depth analysis of their spatial reasoning behaviors.", "link": "http://arxiv.org/abs/2603.13033v1", "date": "2026-03-13", "relevancy": 2.401, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6074}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6074}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ESPIRE%3A%20A%20Diagnostic%20Benchmark%20for%20Embodied%20Spatial%20Reasoning%20of%20Vision-Language%20Models&body=Title%3A%20ESPIRE%3A%20A%20Diagnostic%20Benchmark%20for%20Embodied%20Spatial%20Reasoning%20of%20Vision-Language%20Models%0AAuthor%3A%20Yanpeng%20Zhao%20and%20Wentao%20Ding%20and%20Hongtao%20Li%20and%20Baoxiong%20Jia%20and%20Zilong%20Zheng%0AAbstract%3A%20A%20recent%20trend%20in%20vision-language%20models%20%28VLMs%29%20has%20been%20to%20enhance%20their%20spatial%20cognition%20for%20embodied%20domains.%20Despite%20progress%2C%20existing%20evaluations%20have%20been%20limited%20both%20in%20paradigm%20and%20in%20coverage%2C%20hindering%20rapid%2C%20iterative%20model%20development.%20To%20address%20these%20limitations%2C%20we%20propose%20ESPIRE%2C%20a%20diagnostic%20benchmark%20for%20embodied%20spatial%20reasoning.%20ESPIRE%20offers%20a%20simulated%20world%20that%20physically%20grounds%20VLMs%20and%20evaluates%20them%20on%20spatial-reasoning-centric%20robotic%20tasks%2C%20thus%20narrowing%20the%20gap%20between%20evaluation%20and%20real-world%20deployment.%20To%20adapt%20VLMs%20to%20robotic%20tasks%2C%20we%20decompose%20each%20task%20into%20localization%20and%20execution%2C%20and%20frame%20both%20as%20generative%20problems%2C%20in%20stark%20contrast%20to%20predominant%20discriminative%20evaluations%20%28e.g.%2C%20via%20visual-question%20answering%29%20that%20rely%20on%20distractors%20and%20discard%20execution.%20This%20decomposition%20further%20enables%20a%20fine-grained%20analysis%20beyond%20passive%20spatial%20reasoning%20toward%20reasoning%20to%20act.%20We%20systematically%20design%20ESPIRE%20both%20at%20the%20instruction%20level%20and%20at%20the%20environment%20level%2C%20ensuring%20broad%20coverage%20of%20spatial%20reasoning%20scenarios.%20We%20use%20ESPIRE%20to%20diagnose%20a%20range%20of%20frontier%20VLMs%20and%20provide%20in-depth%20analysis%20of%20their%20spatial%20reasoning%20behaviors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13033v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DESPIRE%253A%2520A%2520Diagnostic%2520Benchmark%2520for%2520Embodied%2520Spatial%2520Reasoning%2520of%2520Vision-Language%2520Models%26entry.906535625%3DYanpeng%2520Zhao%2520and%2520Wentao%2520Ding%2520and%2520Hongtao%2520Li%2520and%2520Baoxiong%2520Jia%2520and%2520Zilong%2520Zheng%26entry.1292438233%3DA%2520recent%2520trend%2520in%2520vision-language%2520models%2520%2528VLMs%2529%2520has%2520been%2520to%2520enhance%2520their%2520spatial%2520cognition%2520for%2520embodied%2520domains.%2520Despite%2520progress%252C%2520existing%2520evaluations%2520have%2520been%2520limited%2520both%2520in%2520paradigm%2520and%2520in%2520coverage%252C%2520hindering%2520rapid%252C%2520iterative%2520model%2520development.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520ESPIRE%252C%2520a%2520diagnostic%2520benchmark%2520for%2520embodied%2520spatial%2520reasoning.%2520ESPIRE%2520offers%2520a%2520simulated%2520world%2520that%2520physically%2520grounds%2520VLMs%2520and%2520evaluates%2520them%2520on%2520spatial-reasoning-centric%2520robotic%2520tasks%252C%2520thus%2520narrowing%2520the%2520gap%2520between%2520evaluation%2520and%2520real-world%2520deployment.%2520To%2520adapt%2520VLMs%2520to%2520robotic%2520tasks%252C%2520we%2520decompose%2520each%2520task%2520into%2520localization%2520and%2520execution%252C%2520and%2520frame%2520both%2520as%2520generative%2520problems%252C%2520in%2520stark%2520contrast%2520to%2520predominant%2520discriminative%2520evaluations%2520%2528e.g.%252C%2520via%2520visual-question%2520answering%2529%2520that%2520rely%2520on%2520distractors%2520and%2520discard%2520execution.%2520This%2520decomposition%2520further%2520enables%2520a%2520fine-grained%2520analysis%2520beyond%2520passive%2520spatial%2520reasoning%2520toward%2520reasoning%2520to%2520act.%2520We%2520systematically%2520design%2520ESPIRE%2520both%2520at%2520the%2520instruction%2520level%2520and%2520at%2520the%2520environment%2520level%252C%2520ensuring%2520broad%2520coverage%2520of%2520spatial%2520reasoning%2520scenarios.%2520We%2520use%2520ESPIRE%2520to%2520diagnose%2520a%2520range%2520of%2520frontier%2520VLMs%2520and%2520provide%2520in-depth%2520analysis%2520of%2520their%2520spatial%2520reasoning%2520behaviors.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13033v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ESPIRE%3A%20A%20Diagnostic%20Benchmark%20for%20Embodied%20Spatial%20Reasoning%20of%20Vision-Language%20Models&entry.906535625=Yanpeng%20Zhao%20and%20Wentao%20Ding%20and%20Hongtao%20Li%20and%20Baoxiong%20Jia%20and%20Zilong%20Zheng&entry.1292438233=A%20recent%20trend%20in%20vision-language%20models%20%28VLMs%29%20has%20been%20to%20enhance%20their%20spatial%20cognition%20for%20embodied%20domains.%20Despite%20progress%2C%20existing%20evaluations%20have%20been%20limited%20both%20in%20paradigm%20and%20in%20coverage%2C%20hindering%20rapid%2C%20iterative%20model%20development.%20To%20address%20these%20limitations%2C%20we%20propose%20ESPIRE%2C%20a%20diagnostic%20benchmark%20for%20embodied%20spatial%20reasoning.%20ESPIRE%20offers%20a%20simulated%20world%20that%20physically%20grounds%20VLMs%20and%20evaluates%20them%20on%20spatial-reasoning-centric%20robotic%20tasks%2C%20thus%20narrowing%20the%20gap%20between%20evaluation%20and%20real-world%20deployment.%20To%20adapt%20VLMs%20to%20robotic%20tasks%2C%20we%20decompose%20each%20task%20into%20localization%20and%20execution%2C%20and%20frame%20both%20as%20generative%20problems%2C%20in%20stark%20contrast%20to%20predominant%20discriminative%20evaluations%20%28e.g.%2C%20via%20visual-question%20answering%29%20that%20rely%20on%20distractors%20and%20discard%20execution.%20This%20decomposition%20further%20ena {"title": "Reasoning over Video: Evaluating How MLLMs Extract, Integrate, and Reconstruct Spatiotemporal Evidence", "author": "Seunghwan Bang and Hwanjun Song", "abstract": "The growing interest in embodied agents increases the demand for spatiotemporal video understanding, yet existing benchmarks largely emphasize extractive reasoning, where answers can be explicitly presented within spatiotemporal events. It remains unclear whether multimodal large language models can instead perform abstractive spatiotemporal reasoning, which requires integrating observations over time, combining dispersed cues, and inferring implicit spatial and contextual structure. To address this gap, we formalize abstractive spatiotemporal reasoning from videos by introducing a structured evaluation taxonomy that systematically targets its core dimensions and construct a controllable, scenario-driven synthetic egocentric video dataset tailored to evaluate abstractive spatiotemporal reasoning capabilities, spanning object-, room-, and floor-plan-level scenarios. Based on this framework, we present VAEX-BENCH, a benchmark comprising five abstractive reasoning tasks together with their extractive counterparts. Our extensive experiments compare the performance of state-of-the-art MLLMs under extractive and abstractive settings, exposing their limitations on abstractive tasks and providing a fine-grained analysis of the underlying bottlenecks. The dataset will be released soon.", "link": "http://arxiv.org/abs/2603.13091v1", "date": "2026-03-13", "relevancy": 2.3981, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.606}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.606}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulatio {"title": "Reference-Free Image Quality Assessment for Virtual Try-On via Human Feedback", "author": "Yuki Hirakawa and Takashi Wada and Ryotaro Shimizu and Takuya Furusawa and Yuki Saito and Ryosuke Araki and Tianwei Chen and Fan Mo and Yoshimitsu Aoki", "abstract": "Given a person image and a garment image, image-based Virtual Try-ON (VTON) synthesizes a try-on image of the person wearing the target garment. As VTON systems become increasingly important in practical applications such as fashion e-commerce, reliable evaluation of their outputs has emerged as a critical challenge. In real-world scenarios, ground-truth images of the same person wearing the target garment are typically unavailable, making reference-based evaluation impractical. Moreover, widely used distribution-level metrics such as Fr\u00e9chet Inception Distance and Kernel Inception Distance measure dataset-level similarity and fail to reflect the perceptual quality of individual generated images. To address these limitations, we propose Image Quality Assessment for Virtual Try-On (VTON-IQA), a reference-free framework for human-aligned, image-level quality assessment without requiring ground-truth images. To model human perceptual judgments, we construct VTON-QBench, a large-scale human-annotated benchmark comprising 62,688 try-on images generated by 14 representative VTON models and 431,800 quality annotations collected from 13,838 qualified annotators. To the best of our knowledge, this is the largest dataset to date for human subjective evaluation in virtual try-on. Evaluating virtual try-on quality requires verifying both garment fidelity and the preservation of person-specific details. To explicitly model such interactions, we introduce an Interleaved Cross-Attention module that extends standard transformer blocks by inserting a cross-attention layer between self-attention and MLP in the latter blocks. Extensive experiments show that VTON-IQA achieves reliable human-aligned image-level quality prediction. Moreover, we conduct a comprehensive benchmark evaluation of 14 representative VTON models using VTON-IQA.", "link": "http://arxiv.org/abs/2603.13057v1", "date": "2026-03-13", "relevancy": 2.3956, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.6454}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5901}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reference-Free%20Image%20Quality%20Assessment%20for%20Virtual%20Try-On%20via%20Human%20Feedback&body=Title%3A%20Reference-Free%20Image%20Quality%20Assessment%20for%20Virtual%20Try-On%20via%20Human%20Feedback%0AAuthor%3A%20Yuki%20Hirakawa%20and%20Takashi%20Wada%20and%20Ryotaro%20Shimizu%20and%20Takuya%20Furusawa%20and%20Yuki%20Saito%20and%20Ryosuke%20Araki%20and%20Tianwei%20Chen%20and%20Fan%20Mo%20and%20Yoshimitsu%20Aoki%0AAbstract%3A%20Given%20a%20person%20image%20and%20a%20garment%20image%2C%20image-based%20Virtual%20Try-ON%20%28VTON%29%20synthesizes%20a%20try-on%20image%20of%20the%20person%20wearing%20the%20target%20garment.%20As%20VTON%20systems%20become%20increasingly%20important%20in%20practical%20applications%20such%20as%20fashion%20e-commerce%2C%20reliable%20evaluation%20of%20their%20outputs%20has%20emerged%20as%20a%20critical%20challenge.%20In%20real-world%20scenarios%2C%20ground-truth%20images%20of%20the%20same%20person%20wearing%20the%20target%20garment%20are%20typically%20unavailable%2C%20making%20reference-based%20evaluation%20impractical.%20Moreover%2C%20widely%20used%20distribution-level%20metrics%20such%20as%20Fr%C3%A9chet%20Inception%20Distance%20and%20Kernel%20Inception%20Distance%20measure%20dataset-level%20similarity%20and%20fail%20to%20reflect%20the%20perceptual%20quality%20of%20individual%20generated%20images.%20To%20address%20these%20limitations%2C%20we%20propose%20Image%20Quality%20Assessment%20for%20Virtual%20Try-On%20%28VTON-IQA%29%2C%20a%20reference-free%20framework%20for%20human-aligned%2C%20image-level%20quality%20assessment%20without%20requiring%20ground-truth%20images.%20To%20model%20human%20perceptual%20judgments%2C%20we%20construct%20VTON-QBench%2C%20a%20large-scale%20human-annotated%20benchmark%20comprising%2062%2C688%20try-on%20images%20generated%20by%2014%20representative%20VTON%20models%20and%20431%2C800%20quality%20annotations%20collected%20from%2013%2C838%20qualified%20annotators.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20largest%20dataset%20to%20date%20for%20human%20subjective%20evaluation%20in%20virtual%20try-on.%20Evaluating%20virtual%20try-on%20quality%20requires%20verifying%20both%20garment%20fidelity%20and%20the%20preservation%20of%20person-specific%20details.%20To%20explicitly%20model%20such%20interactions%2C%20we%20introduce%20an%20Interleaved%20Cross-Attention%20module%20that%20extends%20standard%20transformer%20blocks%20by%20inserting%20a%20cross-attention%20layer%20between%20self-attention%20and%20MLP%20in%20the%20latter%20blocks.%20Extensive%20experiments%20show%20that%20VTON-IQA%20achieves%20reliable%20human-aligned%20image-level%20quality%20prediction.%20Moreover%2C%20we%20conduct%20a%20comprehensive%20benchmark%20evaluation%20of%2014%20representative%20VTON%20models%20using%20VTON-IQA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13057v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReference-Free%2520Image%2520Quality%2520Assessment%2520for%2520Virtual%2520Try-On%2520via%2520Human%2520Feedback%26entry.906535625%3DYuki%2520Hirakawa%2520and%2520Takashi%2520Wada%2520and%2520Ryotaro {"title": "GeoChemAD: Benchmarking Unsupervised Geochemical Anomaly Detection for Mineral Exploration", "author": "Yihao Ding and Yiran Zhang and Chris Gonzalez and Eun-Jung Holden and Wei Liu", "abstract": "Geochemical anomaly detection plays a critical role in mineral exploration as deviations from regional geochemical baselines may indicate mineralization. Existing studies suffer from two key limitations: (1) single region scenarios which limit model generalizability; (2) proprietary datasets, which makes result reproduction unattainable. In this work, we introduce \\textbf{GeoChemAD}, an open-source benchmark dataset compiled from government-led geological surveys, covering multiple regions, sampling sources, and target elements. The dataset comprises eight subsets representing diverse spatial scales and sampling conditions. To establish strong baselines, we reproduce and benchmark a range of unsupervised anomaly detection methods, including statistical models, generative and transformer-based approaches. Furthermore, we propose \\textbf{GeoChemFormer}, a transformer-based framework that leverages self-supervised pretraining to learn target-element-aware geochemical representations for spatial samples. Extensive experiments demonstrate that GeoChemFormer consistently achieves superior and robust performance across all eight subsets, outperforming existing unsupervised methods in both anomaly detection accuracy and generalization capability. The proposed dataset and framework provide a foundation for reproducible research and future development in this direction.", "link": "http://arxiv.org/abs/2603.13068v1", "date": "2026-03-13", "relevancy": 2.3882, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4928}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4757}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoChemAD%3A%20Benchmarking%20Unsupervised%20Geochemical%20Anomaly%20Detection%20for%20Mineral%20Exploration&body=Title%3A%20GeoChemAD%3A%20Benchmarking%20Unsupervised%20Geochemical%20Anomaly%20Detection%20for%20Mineral%20Exploration%0AAuthor%3A%20Yihao%20Ding%20and%20Yiran%20Zhang%20and%20Chris%20Gonzalez%20and%20Eun-Jung%20Holden%20and%20Wei%20Liu%0AAbstract%3A%20Geochemical%20anomaly%20detection%20plays%20a%20critical%20role%20in%20mineral%20exploration%20as%20deviations%20from%20regional%20geochemical%20baselines%20may%20indicate%20mineralization.%20Existing%20studies%20suffer%20from%20two%20key%20limitations%3A%20%281%29%20single%20region%20scenarios%20which%20limit%20model%20generalizability%3B%20%282%29%20proprietary%20datasets%2C%20which%20makes%20result%20reproduction%20unattainable.%20In%20this%20work%2C%20we%20introduce%20%5Ctextbf%7BGeoChemAD%7D%2C%20an%20open-source%20benchmark%20dataset%20compiled%20from%20government-led%20geological%20surveys%2C%20covering%20multiple%20regions%2C%20sampling%20sources%2C%20and%20target%20elements.%20The%20dataset%20comprises%20eight%20subsets%20representing%20diverse%20spatial%20scales%20and%20sampling%20conditions.%20To%20establish%20strong%20baselines%2C%20we%20reproduce%20and%20benchmark%20a%20range%20of%20unsupervised%20anomaly%20detection%20methods%2C%20including%20statistical%20models%2C%20generative%20and%20transformer-based%20approaches.%20Furthermore%2C%20we%20propose%20%5Ctextbf%7BGeoChemFormer%7D%2C%20a%20transformer-based%20framework%20that%20leverages%20self-supervised%20pretraining%20to%20learn%20target-element-aware%20geochemical%20representations%20for%20spatial%20samples.%20Extensive%20experiments%20demonstrate%20that%20GeoChemFormer%20consistently%20achieves%20superior%20and%20robust%20performance%20across%20all%20eight%20subsets%2C%20outperforming%20existing%20unsupervised%20methods%20in%20both%20anomaly%20detection%20accuracy%20and%20generalization%20capability.%20The%20proposed%20dataset%20and%20framework%20provide%20a%20foundation%20for%20reproducible%20research%20and%20future%20development%20in%20this%20direction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13068v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoChemAD%253A%2520Benchmarking%2520Unsupervised%2520Geochemical%2520Anomaly%2520Detection%2520for%2520Mineral%2520Exploration%26entry.906535625%3DYihao%2520Ding%2520and%2520Yiran%2520Zhang%2520and%2520Chris%2520Gonzalez%2520and%2520Eun-Jung%2520Holden%2520and%2520Wei%2520Liu%26entry.1292438233%3DGeochemical%2520anomaly%2520detection%2520plays%2520a%2520critical%2520role%2520in%2520mineral%2520exploration%2520as%2520deviations%2520from%2520regional%2520geochemical%2520baselines%2520may%2520indicate%2520mineralization.%2520Existing%2520studies%2520suffer%2520from%2520two%2520key%2520limitations%253A%2520%25281%2529%2520single%2520region%2520scenarios%2520which%2520limit%2520model%2520generalizability%253B%2520%25282%2529%2520proprietary%2520datasets%252C%2520which%2520makes%2520result%2520reproduction%2520unattainable.%2520In%2520this%2520work%252C%2520we%2520introduce%2520%255Ctextbf%257BGeoChemAD%257D%252C%2520an%2520open-source%2520benchmark%2520dataset%2520compiled%2520from%2520government-led%2520geological%2520surveys%252C%2520covering%2520multiple%2520regions%252C%2520sampling%2520sources%252C%2520and%2520target%2520elements.%2520The%2520dataset%2520comprises%2520eight%2520subsets%2520representing%2520diverse%2520spatial%2520scales%2520and%2520sampling%2520conditions.%2520To%2520establish%2520strong%2520baselines%252C%2520we%2520reproduce%2520and%2520benchmark%2520a%2520range%2520of mark%20dataset%20compiled%20from%20government-led%20geological%20surveys%2C%20covering%20multiple%20regions%2C%20sampling%20sources%2C%20and%20target%20elements.%20The%20dataset%20comprises%20eight%20subsets%20representing%20diverse%20spatial%20scales%20and%20sampling%20conditions.%20To%20establish%20strong%20baselines%2C%20we%20reproduce%20and%20benchmark%20a%20range%20of%20unsupervised%20anomaly%20detection%20methods%2C%20including%20statistical%20models%2C%20generative%20and%20transformer-based%20approaches.%20Furthermore%2C%20we%20propose%20%5Ctextbf%7BGeoChemFormer%7D%2C%20a%20transformer-based%20framework%20that%20leverages%20self-supervised%20pretraining%20to%20learn%20target-element-aware%20geochemical%20representations%20for%20spatial%20samples.%20Extensive%20experiments%20demonstrate%20that%20GeoChemFormer%20consistently%20achieves%20superior%20and%20robust%20performance%20across%20all%20eight%20subsets%2C%20outperforming%20existing%20unsupervised%20methods%20in%20both%20anomaly%20detection%20accuracy%20and%20generalization%20capability.%20The%20proposed%20dataset%20and%20framework%20provide%20a%20foundation%20for%20reproducible%20research%20and%20future%20development%20in%20this%20direction.&entry.1838667208=http%3A//arxiv.org/abs/2603.13068v1&entry.124074799=Read"},
{"title": "BoSS: A Best-of-Strategies Selector as an Oracle for Deep Active Learning", "author": "Denis Huseljic and Paul Hahn and Marek Herde and Christoph Sandrock and Bernhard Sick", "abstract": "Active learning (AL) aims to reduce annotation costs while maximizing model performance by iteratively selecting valuable instances. While foundation models have made it easier to identify these instances, existing selection strategies still lack robustness across different models, annotation budgets, and datasets. To highlight the potential weaknesses of existing AL strategies and provide a reference point for research, we explore oracle strategies, i.e., strategies that approximate the optimal selection by accessing ground-truth information unavailable in practical AL scenarios. Current oracle strategies, however, fail to scale effectively to large datasets and complex deep neural networks. To tackle these limitations, we introduce the Best-of-Strategy Selector (BoSS), a scalable oracle strategy designed for large-scale AL scenarios. BoSS constructs a set of candidate batches through an ensemble of selection strategies and then selects the batch yielding the highest performance gain. As an ensemble of selection strategies, BoSS can be easily extended with new state-of-the-art strategies as they emerge, ensuring it remains a reliable oracle strategy in the future. Our evaluation demonstrates that i) BoSS outperforms existing oracle strategies, ii) state-of-the-art AL strategies still fall noticeably short of oracle performance, especially in large-scale datasets with many classes, and iii) one possible solution to counteract the inconsistent performance of AL strategies might be to employ an ensemble-based approach for the selection.", "link": "http://arxiv.org/abs/2603.13109v1", "date": "2026-03-13", "relevancy": 2.3852, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4994}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4896}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4421}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BoSS%3A%20A%20Best-of-Strategies%20Selector%20as%20an%20Oracle%20for%20Deep%20Active%20Learning&body=Title%3A%20BoSS%3A%20A%20Best-of-Strategies%20Selector%20as%20an%20Oracle%20for%20Deep%20Active%20Learning%0AAuthor%3A%20Denis%20Huseljic%20and%20Paul%20Hahn%20and%20Marek%20Herde%20and%20Christoph%20Sandrock%20and%20Bernhard%20Sick%0AAbstract%3A%20Active%20learning%20%28AL%29%20aims%20to%20reduce%20annotation%20costs%20while%20maximizing%20model%20performance%20by%20iteratively%20selecting%20valuable%20instances.%20While%20foundation%20models%20have%20made%20it%20easier%20to%20identify%20these%20instances%2C%20existing%20selection%20strategies%20still%20lack%20robustness%20across%20different%20models%2C%20annotation%20budgets%2C%20and%20datasets.%20To%20highlight%20the%20potential%20weaknesses%20of%20existing%20AL%20strategies%20and%20provide%20a%20reference%20point%20for%20research%2C%20we%20explore%20oracle%20strategies%2C%20i.e.%2C%20strategies%20that%20approximate%20the%20optimal%20selection%20by%20accessing%20ground-truth%20information%20unavailable%20in%20practical%20AL%20scenarios.%20Current%20oracle%20strategies%2C%20however%2C%20fail%20to%20scale%20effectively%20to%20large%20datasets%20and%20complex%20deep%20neural%20networks.%20To%20tackle%20these%20limitations%2C%20we%20introduce%20the%20Best-of-Strategy%20Selector%20%28BoSS%29%2C%20a%20scalable%20oracle%20strategy%20designed%20for%20large-scale%20AL%20scenarios.%20BoSS%20constructs%20a%20set%20of%20candidate%20batches%20through%20an%20ensemble%20of%20selection%20strategies%20and%20then%20selects%20the%20batch%20yielding%20the%20highest%20performance%20gain.%20As%20an%20ensemble%20of%20selection%20strategies%2C%20BoSS%20can%20be%20easily%20extended%20with%20new%20state-of-the-art%20strategies%20as%20they%20emerge%2C%20ensuring%20it%20remains%20a%20reliable%20oracle%20strategy%20in%20the%20future.%20Our%20evaluation%20demonstrates%20that%20i%29%20BoSS%20outperforms%20existing%20oracle%20strategies%2C%20ii%29%20state-of-the-art%20AL%20strategies%20still%20fall%20noticeably%20short%20of%20oracle%20performance%2C%20especially%20in%20large-scale%20datasets%20with%20many%20classes%2C%20and%20iii%29%20one%20possible%20solution%20to%20counteract%20the%20inconsistent%20performance%20of%20AL%20strategies%20might%20be%20to%20employ%20an%20ensemble-based%20approach%20for%20the%20selection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13109v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoSS%253A%2520A%2520Best-of-Strategies%2520Selector%2520as%2520an%2520Oracle%2520for%2520Deep%2520Active%2520Learning%26entry.906535625%3DDenis%2520Huseljic%2520and%2520Paul%2520Hahn%2520and%2520Marek%2520Herde%2520and%2520Christoph%2520Sandrock%2520and%2520Bernhard%2520Sick%26entry.1292438233%3DActive%2520learning%2520%2528AL%2529%2520aims%2520to%2520reduce%2520annotation%2520costs%2520while%2520maximizing%2520model%2520performance%2520by%2520iteratively%2520selecting%2520valuable%2520instances.%2520While%2520foundation%2520models%2520have%2520made%2520it%2520easier%2520to%2520identify%2520these%2520instances%252C%2520existing%2520selection%2520strategies%2520still%2520lack%2520robustness%2520across%2520different%2520models%252C%2520annotation%2520budgets%252C%2520and%2520datasets.%2520To%2520highlight%2520the%2520potential%2520weaknesses%2520of%2520existing%2520AL%2520strategies%2520and%2520provide%2520a%2520reference%2520point%2520for%2520research%252C%2520we%2520explore%2520oracle%2520strategies%252C%2520 Best-of-Strategies%20Selector%20as%20an%20Oracle%20for%20Deep%20Active%20Learning&entry.906535625=Denis%20Huseljic%20and%20Paul%20Hahn%20and%20Marek%20Herde%20and%20Christoph%20Sandrock%20and%20Bernhard%20Sick&entry.1292438233=Active%20learning%20%28AL%29%20aims%20to%20reduce%20annotation%20costs%20while%20maximizing%20model%20performance%20by%20iteratively%20selecting%20valuable%20instances.%20While%20foundation%20models%20have%20made%20it%20easier%20to%20identify%20these%20instances%2C%20existing%20selection%20strategies%20still%20lack%20robustness%20across%20different%20models%2C%20annotation%20budgets%2C%20and%20datasets.%20To%20highlight%20the%20potential%20weaknesses%20of%20existing%20AL%20strategies%20and%20provide%20a%20reference%20point%20for%20research%2C%20we%20explore%20oracle%20strategies%2C%20i.e.%2C%20strategies%20that%20approximate%20the%20optimal%20selection%20by%20accessing%20ground-truth%20information%20unavailable%20in%20practical%20AL%20scenarios.%20Current%20oracle%20strategies%2C%20however%2C%20fail%20to%20scale%20effectively%20to%20large%20datasets%20and%20complex%20deep%20neural%20networks.%20To%20tackle%20these%20limitations%2C%20we%20introduce%20the%20Best-of-Strategy%20Selector%20%28BoSS%29%2C%20a%20scalable%20oracle%20strategy%20designed%20for%20large-scale%20AL%20scenarios.%20BoSS%20constructs%20a%20set%20of%20candidate%20batches%20through%20an%20ensemble%20of%20selection%20strategies%20and%20then%20selects%20the%20batch%20yielding%20the%20highest%20performance%20gain.%20As%20an%20ensemble%20of%20selection%20strategies%2C%20BoSS%20can%20be%20easily%20extended%20with%20new%20state-of-the-art%20strategies%20as%20they%20emerge%2C%20ensuring%20it%20remains%20a%20reliable%20oracle%20strategy%20in%20the%20future.%20Our%20evaluation%20demonstrates%20that%20i%29%20BoSS%20outperforms%20existing%20oracle%20strategies%2C%20ii%29%20state-of-the-art%20AL%20strategies%20still%20fall%20noticeably%20short%20of%20oracle%20performance%2C%20especially%20in%20large-scale%20datasets%20with%20many%20classes%2C%20and%20iii%29%20one%20possible%20solution%20to%20counteract%20the%20inconsistent%20performance%20of%20AL%20strategies%20might%20be%20to%20employ%20an%20ensemble-based%20approach%20for%20the%20selection.&entry.1838667208=http%3A//arxiv.org/abs/2603.13109v1&entry.124074799=Read"},
{"title": "Key-Value Pair-Free Continual Learner via Task-Specific Prompt-Prototype", "author": "Haihua Luo and Xuming Ran and Zhengji Li and Huiyan Xue and Tingting Jiang and Jiangrong Shen and Tommi K\u00e4rkk\u00e4inen and Qi Xu and Fengyu Cong", "abstract": "Continual learning aims to enable models to acquire new knowledge while retaining previously learned information. Prompt-based methods have shown remarkable performance in this domain; however, they typically rely on key-value pairing, which can introduce inter-task interference and hinder scalability. To overcome these limitations, we propose a novel approach employing task-specific Prompt-Prototype (ProP), thereby eliminating the need for key-value pairs. In our method, task-specific prompts facilitate more effective feature learning for the current task, while corresponding prototypes capture the representative features of the input. During inference, predictions are generated by binding each task-specific prompt with its associated prototype. Additionally, we introduce regularization constraints during prompt initialization to penalize excessively large values, thereby enhancing stability. Experiments on several widely used datasets demonstrate the effectiveness of the proposed method. In contrast to mainstream prompt-based approaches, our framework removes the dependency on key-value pairs, offering a fresh perspective for future continual learning research.", "link": "http://arxiv.org/abs/2601.04864v2", "date": "2026-03-13", "relevancy": 2.3767, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4768}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4768}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similari {"title": "RadField3D: A Data Generator and Data Format for Deep Learning in Radiation-Protection Dosimetry for Medical Applications", "author": "Felix Lehner and Pasquale Lombardo and Susana Castillo and Oliver Hupe and Marcus Magnor", "abstract": "In this research work, we present our open-source Geant4-based Monte-Carlo simulation application, called RadField3D, for generating threedimensional radiation field datasets for dosimetry. Accompanying, we introduce a fast, machine-interpretable data format with a Python API for easy integration into neural network research, that we call RadFiled3D. Both developments are intended to be used to research alternative radiation simulation methods using deep learning.", "link": "http://arxiv.org/abs/2412.13852v2", "date": "2026-03-13", "relevancy": 2.3746, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4775}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4775}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4698}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RadField3D%3A%20A%20Data%20Generator%20and%20Data%20Format%20for%20Deep%20Learning%20in%20Radiation-Protection%20Dosimetry%20for%20Medical%20Applications&body=Title%3A%20RadField3D%3A%20A%20Data%20Generator%20and%20Data%20Format%20for%20Deep%20Learning%20in%20Radiation-Protection%20Dosimetry%20for%20Medical%20Applications%0AAuthor%3A%20Felix%20Lehner%20and%20Pasquale%20Lombardo%20and%20Susana%20Castillo%20and%20Oliver%20Hupe%20and%20Marcus%20Magnor%0AAbstract%3A%20In%20this%20research%20work%2C%20we%20present%20our%20open-source%20Geant4-based%20Monte-Carlo%20simulation%20application%2C%20called%20RadField3D%2C%20for%20generating%20threedimensional%20radiation%20fie {"title": "Train Short, Inference Long: Training-free Horizon Extension for Autoregressive Video Generation", "author": "Jia Li and Xiaomeng Fu and Xurui Peng and Weifeng Chen and Youwei Zheng and Tianyu Zhao and Jiexi Wang and Fangmin Chen and Xing Wang and Hayden Kwok-Hay So", "abstract": "Autoregressive video diffusion models have emerged as a scalable paradigm for long video generation. However, they often suffer from severe extrapolation failure, where rapid error accumulation leads to significant temporal degradation when extending beyond training horizons. We identify that this failure primarily stems from the spectral bias of 3D positional embeddings and the lack of dynamic priors in noise sampling. To address these issues, we propose FLEX (Frequency-aware Length EXtension), a training-free inference-time framework that bridges the gap between short-term training and long-term inference. FLEX introduces Frequency-aware RoPE Modulation to adaptively interpolate under-trained low-frequency components while extrapolating high-frequency ones to preserve multi-scale temporal discriminability. This is integrated with Antiphase Noise Sampling (ANS) to inject high-frequency dynamic priors and Inference-only Attention Sink to anchor global structure. Extensive evaluations on VBench demonstrate that FLEX significantly outperforms state-of-the-art models at 6x extrapolation (30s duration) and matches the performance of long-video fine-tuned baselines at 12x scale (60s duration). As a plug-and-play augmentation, FLEX seamlessly integrates into existing inference pipelines for horizon extension. It effectively pushes the generation limits of models such as LongLive, supporting consistent and dynamic video synthesis at a 4-minute scale. Project page is available at https://ga-lee.github.io/FLEX_demo.", "link": "http://arxiv.org/abs/2602.14027v3", "date": "2026-03-13", "relevancy": 2.374, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\ his%20is%20integrated%20with%20Antiphase%20Noise%20Sampling%20%28ANS%29%20to%20inject%20high-frequency%20dynamic%20priors%20and%20Inference-only%20Attention%20Sink%20to%20anchor%20global%20structure.%20Extensive%20evaluations%20on%20VBench%20demonstrate%20that%20FLEX%20significantly%20outperforms%20state-of-the-art%20models%20at%206x%20extrapolation%20%2830s%20duration%29%20and%20matches%20the%20performance%20of%20long-video%20fine-tuned%20baselines%20at%2012x%20scale%20%2860s%20duration%29.%20As%20a%20plug-and-play%20augmentation%2C%20FLEX%20seamlessly%20integrates%20into%20existing%20inference%20pipelines%20for%20horizon%20extension.%20It%20effectively%20pushes%20the%20generation%20limits%20of%20models%20such%20as%20LongLive%2C%20supporting%20consistent%20and%20dynamic%20video%20synthesis%20at%20a%204-minute%20scale.%20Project%20page%20is%20available%20at%20https%3A//ga-lee.github.io/FLEX_demo.%0ALink%3A%20http%3A//arxiv.org/abs/2602.14027v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrain%2520Short%252C%2520Inference%2520Long%253A%2520Training-free%2520Horizon%2520Extension%2520for%2520Autoregressive%2520Video%2520Generation%26entry.906535625%3DJia%2520Li%2520and%2520Xiaomeng%2520Fu%2520and%2520Xurui%2520Peng%2520and%2520Weifeng%2520Chen%2520and%2520Youwei%2520Zheng%2520and%2520Tianyu%2520Zhao%2520and%2520Jiexi%2520Wang%2520and%2520Fangmin%2520Chen%2520and%2520Xing%2520Wang%2520and%2520Hayden%2520Kwok-Hay%2520So%26entry.1292438233%3DAutoregressive%2520video%2520diffusion%2520models%2520have%2520emerged%2520as%2520a%2520scalable%2520paradigm%2520for%2520long%2520video%2520generation.%2520However%252C%2520they%2520often%2520suffer%2520from%2520severe%2520extrapolation%2520failure%252C%2520where%2520rapid%2520error%2520accumulation%2520leads%2520to%2520significant%2520temporal%2520degradation%2520when%2520extending%2520beyond%2520training%2520horizons.%2520We%2520identify%252 {"title": "VideoTemp-o3: Harmonizing Temporal Grounding and Video Understanding in Agentic Thinking-with-Videos", "author": "Wenqi Liu and Yunxiao Wang and Shijie Ma and Meng Liu and Qile Su and Tianke Zhang and Haonan Fan and Changyi Liu and Kaiyu Jiang and Jiankang Chen and Kaiyu Tang and Bin Wen and Fan Yang and Tingting Gao and Han Li and Yinwei Wei and Xuemeng Song", "abstract": "In long-video understanding, conventional uniform frame sampling often fails to capture key visual evidence, leading to degraded performance and increased hallucinations. To address this, recent agentic thinking-with-videos paradigms have emerged, adopting a localize-clip-answer pipeline in which the model actively identifies relevant video segments, performs dense sampling within those clips, and then produces answers. However, existing methods remain inefficient, suffer from weak localization, and adhere to rigid workflows. To solve these issues, we propose VideoTemp-o3, a unified agentic thinking-with-videos framework that jointly models video grounding and question answering. VideoTemp-o3 exhibits strong localization capability, supports on-demand clipping, and can refine inaccurate localizations. Specifically, in the supervised fine-tuning stage, we design a unified masking mechanism that encourages exploration while preventing noise. For reinforcement learning, we introduce dedicated rewards to mitigate reward hacking. Besides, from the data perspective, we develop an effective pipeline to construct high-quality long video grounded QA data, along with a corresponding benchmark for systematic evaluation across various video durations. Experimental results demonstrate that our method achieves remarkable performance on both long video understanding and grounding.", "link": "http://arxiv.org/abs/2602.07801v3", "date": "2026-03-13", "relevancy": 2.3728, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5846}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos&body=Title%3A%20VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos%0AAuthor%3A%20Wenqi%20Liu%20and%20Yunxiao%20Wang%20and%20Shijie%20Ma%20and%20Meng%20Liu%20and%20Qile%20Su%20and%20Tianke%20Zhang%20and%20Haonan%20Fan%20and%20Changyi%20Liu%20and%20Kaiyu%20Jiang%20and%20Jiankang%20Chen%20and%20Kaiyu%20Tang%20and%20Bin%20Wen%20and%20Fan%20Yang%20and%20Tingting%20Gao%20and%20Han%20Li%20and%20Yinwei%20Wei%20and%20Xuemeng%20Song%0AAbstract%3A%20In%20long-video%20understanding%2C%20conventional%20uniform%20frame%20sampling%20often%20fails%20to%20capture%20key%20visual%20evidence%2C%20leading%20to%20degraded%20performance%20and%20increased%20hallucinations.%20To%20address%20this%2C%20recent%20agentic%20thinking-with-videos%20paradigms%20have%20emerged%2C%20adopting%20a%20localize-clip-answer%20pipeline%20in%20which%20the%20model%20actively%20identifies%20relevant%20video%20segments%2C%20performs%20dense%20sampling%20within%20those%20clips%2C%20and%20then%20produces%20answers.%20However%2C%20existing%20methods%20remain%20inefficient%2C%20suffer%20from%20weak%20localization%2C%20and%20adhere%20to%20rigid%20workflows.%20To%20solve%20these%20issues%2C%20we%20propose%20VideoTemp-o3%2C%20a%20unified%20agentic%20thinking-with-videos%20framework%20that%20jointly%20models%20video%20grounding%20and%20question%20answering.%20VideoTemp-o3%20exhibits%20strong%20localization%20capability%2C%20supports%20on-demand%20clipping%2C%20and%20can%20refine%20inaccurate%20localizations.%20Specifically%2C%20in%20the%20supervised%20fine-tuning%20stage%2C%20we%20design%20a%20unified%20masking%20mechanism%20that%20encourages%20exploration%20while%20preventing%20noise.%20For%20reinforcement%20learning%2C%20we%20introduce%20dedicated%20rewards%20to%20mitigate%20reward%20hacking.%20Besides%2C%20from%20the%20data%20perspective%2C%20we%20develop%20an%20effective%20pipeline%20to%20construct%20high-quality%20long%20video%20grounded%20QA%20data%2C%20along%20with%20a%20corresponding%20benchmark%20for%20systematic%20evaluation%20across%20various%20video%20durations.%20Experimental%20results%20demonstrate%20that%20our%20method%20achieves%20remarkable%20performance%20on%20both%20long%20video%20understanding%20and%20grounding.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07801v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoTemp-o3%253A%2520Harmonizing%2520Temporal%2520Grounding%2520and%2520Video%2520Understanding%2520in%2520Agentic%2520Thinking-with-Videos%26entry.906535625%3DWenqi%2520Liu%2520and%2520Yunxiao%2520Wang%2520and%2520Shijie%2520Ma%2520and%2520Meng%2520Liu%2520and%2520Qile%2520Su%2520and%2520Tianke%2520Zhang%2520and%2520Haonan%2520Fan%2520and%2520Changyi%2520Liu%2520and%2520Kaiyu%2520Jiang%2520and%2520Jiankang%2520Chen%2520and%2520Kaiyu%2520Tang%2520and%2520Bin%2520Wen%2520and%2520Fan%2520Yang%2520and%2520Tingting%2520Gao%2520and%2520Han%2520Li%2520and%2520Yinwei%2520Wei%2520and%2520Xuemeng%2520Song%26entry.1292438233%3DIn%2520long-video%2520understanding%252C%2520conventional%2520uniform%2520frame%2520sampling%2520often%2520fails%2520to%2520capture%2520key%2520visual%2520evidence%252C%2520leading%2520to%2520degraded%2520performance%2520and%2520increased%2520hallucinations.%2520To%2520address%2520this%252C%2520recent%2520agentic%2520thinking-with-videos%2520 YQ/viewform?entry.1380929848=VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos&entry.906535625=Wenqi%20Liu%20and%20Yunxiao%20Wang%20and%20Shijie%20Ma%20and%20Meng%20Liu%20and%20Qile%20Su%20and%20Tianke%20Zhang%20and%20Haonan%20Fan%20and%20Changyi%20Liu%20and%20Kaiyu%20Jiang%20and%20Jiankang%20Chen%20and%20Kaiyu%20Tang%20and%20Bin%20Wen%20and%20Fan%20Yang%20and%20Tingting%20Gao%20and%20Han%20Li%20and%20Yinwei%20Wei%20and%20Xuemeng%20Song&entry.1292438233=In%20long-video%20understanding%2C%20conventional%20uniform%20frame%20sampling%20often%20fails%20to%20capture%20key%20visual%20evidence%2C%20leading%20to%20degraded%20performance%20and%20increased%20hallucinations.%20To%20address%20this%2C%20recent%20agentic%20thinking-with-videos%20paradigms%20have%20emerged%2C%20adopting%20a%20localize-clip-answer%20pipeline%20in%20which%20the%20model%20actively%20identifies%20relevant%20video%20segments%2C%20performs%20dense%20sampling%20within%20those%20clips%2C%20and%20then%20produces%20answers.%20However%2C%20existing%20methods%20remain%20inefficient%2C%20suffer%20from%20weak%20localization%2C%20and%20adhere%20to%20rigid%20workflows.%20To%20solve%20these%20issues%2C%20we%20propose%20VideoTemp-o3%2C%20a%20unified%20agentic%20thinking-with-videos%20framework%20that%20jointly%20models%20video%20grounding%20and%20question%20answering.%20VideoTemp-o3%20exhibits%20strong%20localization%20capability%2C%20supports%20on-demand%20clipping%2C%20and%20can%20refine%20inaccurate%20localizations.%20Specifically%2C%20in%20the%20supervised%20fine-tuning%20stage%2C%20we%20design%20a%20unified%20masking%20mechanism%20that%20encourages%20exploration%20while%20preventing%20noise.%20For%20reinforcement%20learning%2C%20we%20introduce%20dedicated%20rewards%20to%20mitigate%20reward%20hacking.%20Besides%2C%20from%20the%20data%20perspective%2C%20we%20develop%20an%20effective%20pipeline%20to%20construct%20high-quality%20long%20video%20 {"title": "CCMamba: Topologically-Informed Selective State-Space Networks on Combinatorial Complexes for Higher-Order Graph Learning", "author": "Jiawen Chen and Qi Shao and Mingtong Zhou and Duxin Chen and Wenwu Yu", "abstract": "Topological deep learning has emerged as a powerful paradigm for modeling higher-order relational structures beyond pairwise interactions that standard graph neural networks fail to capture. While combinatorial complexes (CCs) offer a unified topological foundation for the higher-order graph learning, existing topological deep learning methods rely heavily on local message passing and attention mechanisms. These suffer from quadratic complexity and local neighborhood constraints, limiting their scalability and capacity for rank-aware, long-range dependency modeling. To overcome these challenges, we propose Combinatorial Complex Mamba (CCMamba), the first unified Mamba-based neural framework for learning on combinatorial complexes. CCMamba reformulates higher-order message passing as a selective state-space modeling problem by linearizing multi-rank incidence relations into structured, rank-aware sequences. This architecture enables adaptive, directional, and long-range information propagation in linear time bypassing the scalability bottlenecks of self-attention. Theoretically, we further establish that the expressive power of CCMamba is upper-bounded by the 1-dimensional combinatorial complex Weisfeiler-Lehman (1-CCWL) test. Extensive experiments across graph, hypergraph, and simplicial benchmarks demonstrate that CCMamba consistently outperforms existing methods while exhibiting superior scalability and remarkable robustness against over-smoothing in deep architectures.", "link": "http://arxiv.org/abs/2601.20518v2", "date": "2026-03-13", "relevancy": 2.3707, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5003}, {"title": "TAMM: TriAdapte ge%20information%20propagation%20in%20linear%20time%20bypassing%20the%20scalability%20bottlenecks%20of%20self-attention.%20Theoretically%2C%20we%20further%20establish%20that%20the%20expressive%20power%20of%20CCMamba%20is%20upper-bounded%20by%20the%201-dimensional%20combinatorial%20complex%20Weisfeiler-Lehman%20%281-CCWL%29%20test.%20Extensive%20experiments%20across%20graph%2C%20hypergraph%2C%20and%20simplicial%20benchmarks%20demonstrate%20that%20CCMamba%20consistently%20outperforms%20existing%20methods%20while%20exhibiting%20superior%20scalability%20and%20remarkable%20robustness%20against%20over-smoothing%20in%20deep%20architectures.%0ALink%3A%20http%3A//arxiv.org/abs/2601.20518v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCCMamba%253A%2520Topologically-Informed%2520Selective%2520State-Space%2520Networks%2520on%2520Combinatorial%2520Complexes%2520for%2520Higher-Order%2520Graph%2520Learning%26entry.906535625%3DJiawen%2520Chen%2520and%2520Qi%2520Shao%2520and%2520Mingtong%2520Zhou%2520and%2520Duxin%2520Chen%2520and%2520Wenwu%2520Yu%26entry.1292438233%3DTopological%2520deep%2520learning%2520has%2520emerged%2520as%2520a%2520powerful%2520paradigm%2520for%2520modeling%2520higher-order%2520relational%2520structures%2520beyond%2520pairwise%2520interactions%2520that%2520standard%2520graph%2520neural%2520networks%2520fail%2520to%2520capture.%2520While%2520combinatorial%2520complexes%2520%2528CCs%2529%2520offer%2520a%2520unified%2520topological%2520foundation%2520for%2520the%2520higher-order%2520graph%2520learning%252C%2520existing%2520topological%2520deep%2520learning%2520methods%2520rely%2520heavily%2520on%2520local%2520message%2520passing%2520and%2520attention%2520mechanisms.%2520These%2520suffer%2520from%2520quadratic%2520complexity%2520and%2520local%2520neighborhood%2520constraints%252C%2520limiting%2520their%2520scalability%2520and%2520capacity%2520for%2520rank-aware%252C%2520long- {"title": "GraphPilot: Grounded Scene Graph Conditioning for Language-Based Autonomous Driving", "author": "Fabian Schmidt and Markus Enzweiler and Abhinav Valada", "abstract": "Vision-language models have recently emerged as promising planners for autonomous driving, where success hinges on topology-aware reasoning over spatial structure and dynamic interactions from multimodal input. However, existing models are typically trained without supervision that explicitly encodes these relational dependencies, limiting their ability to infer how agents and other traffic entities influence one another from raw sensor data. In this work, we bridge this gap with a novel model-agnostic method that conditions language-based driving models on structured relational context in the form of traffic scene graphs. We serialize scene graphs at various abstraction levels and formats, and incorporate them into models via structured prompt templates, enabling systematic analysis of when and how relational supervision is most beneficial and computationally efficient. Extensive evaluations on the LangAuto and Bench2Drive benchmarks show that scene graph conditioning yields large and persistent improvements. We observe a substantial performance increase in the Driving Score of our proposed approach versus competitive LMDrive, BEVDriver, and SimLingo baselines. These results indicate that diverse architectures can effectively internalize and ground relational priors through scene graph-conditioned training, even without requiring scene graph input at test-time. Code, fine-tuned models, and our scene graph dataset are publicly available at https://github.com/iis-esslingen/GraphPilot.", "link": "http://arxiv.org/abs/2511.11266v3", "date": "2026-03-13", "relevancy": 2.3574, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6045}, {"title": "Lexicon3D: Probing Visual rve%20a%20substantial%20performance%20increase%20in%20the%20Driving%20Score%20of%20our%20proposed%20approach%20versus%20competitive%20LMDrive%2C%20BEVDriver%2C%20and%20SimLingo%20baselines.%20These%20results%20indicate%20that%20diverse%20architectures%20can%20effectively%20internalize%20and%20ground%20relational%20priors%20through%20scene%20graph-conditioned%20training%2C%20even%20without%20requiring%20scene%20graph%20input%20at%20test-time.%20Code%2C%20fine-tuned%20models%2C%20and%20our%20scene%20graph%20dataset%20are%20publicly%20available%20at%20https%3A//github.com/iis-esslingen/GraphPilot.%0ALink%3A%20http%3A//arxiv.org/abs/2511.11266v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraphPilot%253A%2520Grounded%2520Scene%2520Graph%2520Conditioning%2520for%2520Language-Based%2520Autonomous%2520Driving%26entry.906535625%3DFabian%2520Schmidt%2520and%2520Markus%2520Enzweiler%2520and%2520Abhinav%2520Valada%26entry.1292438233%3DVision-language%2520models%2520have%2520recently%2520emerged%2520as%2520promising%2520planners%2520for%2520autonomous%2520driving%252C%2520where%2520success%2520hinges%2520on%2520topology-aware%2520reasoning%2520over%2520spatial%2520structure%2520and%2520dynamic%2520interactions%2520from%2520multimodal%2520input.%2520However%252C%2520existing%2520models%2520are%2520typically%2520trained%2520without%2520supervision%2520that%2520explicitly%2520encodes%2520these%2520relational%2520dependencies%252C%2520limiting%2520their%2520ability%2520to%2520infer%2520how%2520agents%2520and%2520other%2520traffic%2520entities%2520influence%2520one%2520another%2520from%2520raw%2520sensor%2520data.%2520In%2520this%2520work%252C%2520we%2520bridge%2520this%2520gap%2520with%2520a%2520novel%2520model-agnostic%2520method%2520that%2520conditions%2520language-based%2520driving%2520models%2520on%2520structured%2520relational%2520context%2520in%2520the%2520form%2520of%2520traffic%2520sc {"title": "Structured Distillation for Personalized Agent Memory: 11x Token Reduction with Retrieval Preservation", "author": "Sydney Lewis", "abstract": "Long conversations with an AI agent create a simple problem for one user: the history is useful, but carrying it verbatim is expensive. We study personalized agent memory: one user's conversation history with an agent, distilled into a compact retrieval layer for later search. Each exchange is compressed into a compound object with four fields (exchange_core, specific_context, thematic room_assignments, and regex-extracted files_touched). The searchable distilled text averages 38 tokens per exchange. Applied to 4,182 conversations (14,340 exchanges) from 6 software engineering projects, the method reduces average exchange length from 371 to 38 tokens, yielding 11x compression. We evaluate whether personalized recall survives that compression using 201 recall-oriented queries, 107 configurations spanning 5 pure and 5 cross-layer search modes, and 5 LLM graders (214,519 consensus-graded query-result pairs). The best pure distilled configuration reaches 96% of the best verbatim MRR (0.717 vs 0.745). Results are mechanism-dependent. All 20 vector search configurations remain non-significant after Bonferroni correction, while all 20 BM25 configurations degrade significantly (effect sizes |d|=0.031-0.756). The best cross-layer setup slightly exceeds the best pure verbatim baseline (MRR 0.759). Structured distillation compresses single-user agent memory without uniformly sacrificing retrieval quality. At 1/11 the context cost, thousands of exchanges fit within a single prompt while the verbatim source remains available for drill-down. We release the implementation and analysis pipeline as open-source software.", "link": "http://arxiv.org/abs/2603.13017v1", "date": "2026-03-13", "relevancy": 2.3569, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.o 0best%20verbatim%20MRR%20%280.717%20vs%200.745%29.%20Results%20are%20mechanism-dependent.%20All%2020%20vector%20search%20configurations%20remain%20non-significant%20after%20Bonferroni%20correction%2C%20while%20all%2020%20BM25%20configurations%20degrade%20significantly%20%28effect%20sizes%20%7Cd%7C%3D0.031-0.756%29.%20The%20best%20cross-layer%20setup%20slightly%20exceeds%20the%20best%20pure%20verbatim%20baseline%20%28MRR%200.759%29.%20Structured%20distillation%20compresses%20single-user%20agent%20memory%20without%20uniformly%20sacrificing%20retrieval%20quality.%20At%201/11%20the%20context%20cost%2C%20thousands%20of%20exchanges%20fit%20within%20a%20single%20prompt%20while%20the%20verbatim%20source%20remains%20available%20for%20drill-down.%20We%20release%20the%20implementation%20and%20analysis%20pipeline%20as%20open-source%20software.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13017v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructured%2520Distillation%2520for%2520Personalized%2520Agent%2520Memory%253A%252011x%2520Token%2520Reduction%2520with%2520Retrieval%2520Preservation%26entry.906535625%3DSydney%2520Lewis%26entry.1292438233%3DLong%2520conversations%2520with%2520an%2520AI%2520agent%2520create%2520a%2520simple%2520problem%2520for%2520one%2520user%253A%2520the%2520history%2520is%2520useful%252C%2520but%2520carrying%2520it%2520verbatim%2520is%2520expensive.%2520We%2520study%2520personalized%2520agent%2520memory%253A%2520one%2520user%2527s%2520conversation%2520history%2520with%2520an%2520agent%252C%2520distilled%2520into%2520a%2520compact%2520retrieval%2520layer%2520for%2520later%2520search.%2520Each%2520exchange%2520is%2520compressed%2520into%2520a%2520compound%2520object%2520with%2520four%2520fields%2520%2528exchange_core%252C%2520specific_context%252C%2520thematic%2520room_assignments%252C%2520and%2520regex-extracted%2520files_touched%2529.%2520The%2520searchable%2520distilled% {"title": "V-Bridge: Bridging Video Generative Priors to Versatile Few-shot Image Restoration", "author": "Shenghe Zheng and Junpeng Jiang and Wenbo Li", "abstract": "Large-scale video generative models are trained on vast and diverse visual data, enabling them to internalize rich structural, semantic, and dynamic priors of the visual world. While these models have demonstrated impressive generative capability, their potential as general-purpose visual learners remains largely untapped. In this work, we introduce V-Bridge, a framework that bridges this latent capacity to versatile few-shot image restoration tasks. We reinterpret image restoration not as a static regression problem, but as a progressive generative process, and leverage video models to simulate the gradual refinement from degraded inputs to high-fidelity outputs. Surprisingly, with only 1,000 multi-task training samples (less than 2% of existing restoration methods), pretrained video models can be induced to perform competitive image restoration, achieving multiple tasks with a single model, rivaling specialized architectures designed explicitly for this purpose. Our findings reveal that video generative models implicitly learn powerful and transferable restoration priors that can be activated with only extremely limited data, challenging the traditional boundary between generative modeling and low-level vision, and opening a new design paradigm for foundation models in visual tasks.", "link": "http://arxiv.org/abs/2603.13089v1", "date": "2026-03-13", "relevancy": 2.3524, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5912}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5872}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5854}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20V-Bridge%3A%20Bridging%20Video%20Generative%20Priors%20to%20Versatile%20Few-shot%20Image%20Restoration&body=Title%3A%20V-Bridge%3A%20Bridging%20Video%20Generative%20Priors%20to%20Versatile%20Few-shot%20Image%20Restoration%0AAuthor%3A%20Shenghe%20Zheng%20and%20Junpeng%20Jiang%20and%20Wenbo%20Li%0AAbstract%3A%20Large-scale%20video%20generative%20models%20are%20trained%20on%20vast%20and%20diverse%20visual%20data%2C%20enabling%20them%20to%20internalize%20rich%20structural%2C%20semantic%2C%20and%20dynamic%20priors%20of%20the%20visual%20world.%20While%20these%20models%20have%20demonstrated%20impressive%20generative%20capability%2C%20their%20potential%20as%20general-purpose%20visual%20learners%20remains%20largely%20untapped.%20In%20this%20work%2C%20we%20introduce%20V-Bridge%2C%20a%20framework%20that%20bridges%20this%20latent%20capacity%20to%20versatile%20few-shot%20image%20restoration%20tasks.%20We%20reinterpret%20image%20restoration%20not%20as%20a%20static%20regression%20problem%2C%20but%20as%20a%20progressive%20generative%20process%2C%20and%20leverage%20video%20models%20to%20simulate%20the%20gradual%20refinement%20from%20degraded%20inputs%20to%20high-fidelity%20outputs.%20Surprisingly%2C%20with%20only%201%2C000%20multi-task%20training%20samples%20%28less%20than%202%25%20of%20existing%20restoration%20methods%29%2C%20pretrained%20video%20models%20can%20be%20induced%20to%20perform%20competitive%20image%20restoration%2C%20achieving%20multiple%20tasks%20with%20a%20single%20model%2C%20rivaling%20specialized%20architectures%20designed%20explicitly%20for%20this%20purpose.%20Our%20findings%20reveal%20that%20video%20generative%20models%20implicitly%20learn%20powerful%20and%20transferable%20restoration%20priors%20that%20can%20be%20activated%20with%20only%20extremely%20limited%20data%2C%20challenging%20the%20traditional%20boundary%20between%20generative%20modeling%20and%20low-level%20vision%2C%2 {"title": "GoalSwarm: Multi-UAV Semantic Coordination for Open-Vocabulary Object Navigation", "author": "MoniJesu Wonders James and Amir Atef Habel and Aleksey Fedoseev and Dzmitry Tsetserokou", "abstract": "Cooperative visual semantic navigation is a foundational capability for aerial robot teams operating in unknown environments. However, achieving robust open-vocabulary object-goal navigation remains challenging due to the computational constraints of deploying heavy perception models onboard and the complexity of decentralized multi-agent coordination. We present GoalSwarm, a fully decentralized multi-UAV framework for zero-shot semantic object-goal navigation. Each UAV collaboratively constructs a shared, lightweight 2D top-down semantic occupancy map by projecting depth observations from aerial vantage points, eliminating the computational burden of full 3D representations while preserving essential geometric and semantic structure. The core contributions of GoalSwarm are threefold: (1) integration of zero-shot foundation model -- SAM3 for open vocabulary detection and pixel-level segmentation, enabling open-vocabulary target identification without task-specific training; (2) a Bayesian Value Map that fuses multi-viewpoint detection confidences into a per-pixel goal-relevance distribution, enabling informed frontier scoring via Upper Confidence Bound (UCB) exploration; and (3) a decentralized coordination strategy combining semantic frontier extraction, cost-utility bidding with geodesic path costs, and spatial separation penalties to minimize redundant exploration across the swarm.", "link": "http://arxiv.org/abs/2603.12908v1", "date": "2026-03-13", "relevancy": 2.3427, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.595}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.588}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5754}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GoalSwarm%3A%20Multi-UAV%20Semantic%20Coordination%20for%20Open-Vocabulary%20Object%20Navigation&body=Title%3A%20GoalSwarm%3A%20Multi-UAV%20Semantic%20Coordination%20for%20Open-Vocabulary%20Object%20Navigation%0AAuthor%3A%20MoniJesu%20Wonders%20James%20and%20Amir%20Atef%20Habel%20and%20Aleksey%20Fedoseev%20and%20Dzmitry%20Tsetserokou%0AAbstract%3A%20Cooperative%20visual%20semantic%20navigation%20is%20a%20foundational%20capability%20for%20aerial%20robot%20teams%20operating%20in%20unknown%20environments.%20However%2C%20achieving%20robust%20open-vocabulary%20object-goal%20navigation%20remains%20challenging%20due%20to%20the%20computational%20constraints%20of%20deploying%20heavy%20perception%20models%20onboard%20and%20the%20complexity%20of%20decentralized%20multi-agent%20coordination.%20We%20present%20GoalSwarm%2C%20a%20fully%20decentralized%20multi-UAV%20framework%20for%20zero-shot%20semantic%20object-goal%20navigation.%20Each%20UAV%20collaboratively%20constructs%20a%20shared%2C%20lightweight%202D%20top-down%20semantic%20occupancy%20map%20by%20projecting%20depth%20observations%20from%20aerial%20vantage%20points%2C%20eliminating%20the%20computational%20burden%20of%20full%203D%20representations%20while%20preserving%20essential%20geometric%20and%20semantic%20structure.%20The%20core%20contributions%20of%20GoalSwarm%20are%20threefold%3A%20%281%29%20integration%20of%20zero-shot%20foundation%20model%20--%20SAM3%20for%20open%20vocabulary%20detection%20and%20pixel-level%20segmentation%2C%20enabling%20open-vocabulary%20target%20identification%20without%20task-specific%20training%3B%20%282%29%20a%20Bayesian%20Value%20Map%20that%20fuses%20multi-viewpoint%20detection%20 {"title": "Association-Aware GNN for Precoder Learning in Cell-Free Systems", "author": "Mingyu Deng and Shengqian Han", "abstract": "Deep learning has been widely recognized as a promising approach for optimizing multi-user multi-antenna precoders in traditional cellular systems. However, a critical distinction between cell-free and cellular systems lies in the flexibility of user equipment (UE)-access point (AP) associations. Consequently, the optimal precoder depends not only on channel state information but also on the dynamic UE-AP association status. In this paper, we propose an association-aware graph neural network (AAGNN) that explicitly incorporates association status into the precoding design. We leverage the permutation equivariance properties of the cell-free precoding policy to reduce the training complexity of AAGNN and employ an attention mechanism to enhance its generalization performance. Simulation results demonstrate that the proposed AAGNN outperforms baseline learning methods in both learning performance and generalization capabilities while maintaining low training and inference complexity.", "link": "http://arxiv.org/abs/2603.13035v1", "date": "2026-03-13", "relevancy": 2.3271, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4986}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4494}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4483}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Association-Aware%20GNN%20for%20Precoder%20Learning%20in%20Cell-Free%20Systems&body=Title%3A%20Association-Aware%20GNN%20for%20Precoder%20Learning%20in%20Cell-Free%20Systems%0AAuthor%3A%20Mingyu%20Deng%20and%20Shengqian%20Han%0AAbstract%3A%20Deep%20learning%20has%20been%20widely%20recognized%20as%20a%20promising%20approach%20for%20optimizing%20multi-user%20multi-antenna%20precoders%20in%20traditional%20cellular%20systems.%20However%2C%20a%20critical%20distinction%20between%20cell-free%20and%20cellular%20systems%20lies%20in%20the%20flexibility%20of%20user%20equipment%20%28UE%29-access%20point%20%28AP%29%20associations.%20Consequently%2C%20the%20optimal%20precoder%20depends%20not%20only%20on%20channel%20state%20information%20but%20also%20on%20the%20dynamic%20UE-AP%20association%20status.%20In%20this%20paper%2C%20we%20propose%20an%20association-aware%20graph%20neural%20network%20%28AAGNN%29%20that%20explicitly%20incorporates%20association%20status%20into%20the%20precoding%20design.%20We%20leverage%20the%20permutation%20equivariance%20properties%20of%20the%20cell-free%20precoding%20policy%20to%20reduce%20the%20training%20complexity%20of%20AAGNN%20and%20employ%20an%20attention%20mechanism%20to%20enhance%20its%20generalization%20performance.%20Simulation%20results%20demonstrate%20that%20the%20proposed%20AAGNN%20outperforms%20baseline%20learning%20methods%20in%20both%20learning%20performance%20and%20generalization%20capabilities%20while%20maintaining%20low%20training%20and%20inference%20complexity.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13035v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAssociation-Aware%2520GNN%2520for%2520Precoder%2520Learning%2520in%2520Cell-Free%2520Systems%26entry.906535625%3DMingyu%2520Deng%2520and%2520Shengqian%2520Han%26entry.1292438233%3DDeep%2520learning%2520has%2520been%2520widely%2520recognized%2520as%2520a%2520promising%2520approach%2520for%2520optimizing%2520multi-user%2520multi-antenna%2520precoders%2520in%2520traditional%2520cellular%2520systems.%2520However%252C%2520a%2520critical%2520distinction%2520between%2520cell-free%2520and%2520cellular%2520systems%2520lies%2520in%2520the%2520flexibility%2520of%2520user%2520equipment%2520%2528UE%2529-access%2520point%2520%2528AP%2529%2520associations.%2520Consequently%252C%2520the%2520optimal%2520precoder%2520depends%2520not%2520only%2520on%2520channel%2520state%2520information%2520but%2520also%2520on%2520the%2520dynamic%2520UE-AP%2520association%2520status.%2520In%2520this%2520paper%252C%2520we%2520propose%2520an%2520association-aware%2520graph%2520neural%2520network%2520%2528AAGNN%2529%2520that%2520explicitly%2520incorporates%2520association%2520status%2520into%2520the%2520precoding%2520design.%2520We%2520leverage%2520the%2520permutation%2520equivariance%2520properties%2520of%2520the%2520cell-free%2520precoding%2520policy%2520to%2520reduce%2520the%2520training%2520complexity%2520of%2520AAGNN%2520and%2520employ%2520an%2520attention%2520mechanism%2520to%2520enhance%2520its%2520generalization%2520performance.%2520Simulation%2520results%2520demonstrate%2520that%2520the%2520proposed%2520AAGNN%2520outperforms%2520baseline%2520learning%2520methods%2520in%2520both%2520learning%2520performance%2520and%2520generalization%2520capabilities%2520while%2520maintaining%2520low%2520training%2520and%2520inference%2520complexity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13035v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Association-Aware%20GNN%20for%20Precoder%20Learning%20in%20Cell-Free%20Systems&entry.906535625=Mingyu%20Deng%20and%20Shengqian%20Han&entry.1292438233=Deep%20learning%20has%20been%20widely%20recognized%20as%20a%20promising%20approach%20for%20optimizing%20multi-user%20multi-antenna%20precoders%20in%20traditional%20cellular%20systems.%20However%2C%20a%20critical%20distinction%20between%20cell-free%20and%20cellular%20systems%20lies%20in%20the%20flexibility%20of%20user%20equipment%20%28UE%29-access%20point%20%28AP%29%20associations.%20Consequently%2C%20the%20optimal%20precoder%20depends%20not%20only%20on%20channel%20state%20information%20but%20

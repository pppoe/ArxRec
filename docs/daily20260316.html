{"title": "MotionAnymesh: Physics-Grounded Articulation for Simulation-Ready Digital Twins", "author": "WenBo Xu and Liu Liu and Li Zhang and Dan Guo and RuoNan Liu", "abstract": "Converting static 3D meshes into interactable articulated assets is crucial for embodied AI and robotic simulation. However, existing zero-shot pipelines struggle with complex assets due to a critical lack of physical grounding. Specifically, ungrounded Vision-Language Models (VLMs) frequently suffer from kinematic hallucinations, while unconstrained joint estimation inevitably leads to catastrophic mesh inter-penetration during physical simulation. To bridge this gap, we propose MotionAnymesh, an automated zero-shot framework that seamlessly transforms unstructured static meshes into simulation-ready digital twins. Our method features a kinematic-aware part segmentation module that grounds VLM reasoning with explicit SP4D physical priors, effectively eradicating kinematic hallucinations. Furthermore, we introduce a geometry-physics joint estimation pipeline that combines robust type-aware initialization with physics-constrained trajectory optimization to rigorously guarantee collision-free articulation. Extensive experiments demonstrate that MotionAnymesh significantly outperforms state-of-the-art baselines in both geometric precision and dynamic physical executability, providing highly reliable assets for downstream applications.", "link": "http://arxiv.org/abs/2603.12936v1", "date": "2026-03-13", "relevancy": 3.1426, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6545}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6262}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MotionAnymesh%3A%20Physics-Grounded%20Articulation%20for%20Simulation-Ready%20Digital%20Twins&body=Title%3A%20MotionAnymesh%3A%20Physics-Grounded%20Articulation%20for%20Simulation-Ready%20Digital%20Twins%0AAuthor%3A%20WenBo%20Xu%20and%20Liu%20Liu%20and%20Li%20Zhang%20and%20Dan%20Guo%20and%20RuoNan%20Liu%0AAbstract%3A%20Converting%20static%203D%20meshes%20into%20interactable%20articulated%20assets%20is%20crucial%20for%20embodied%20AI%20and%20robotic%20simulation.%20However%2C%20existing%20zero-shot%20pipelines%20struggle%20with%20complex%20assets%20due%20to%20a%20critical%20lack%20of%20physical%20grounding.%20Specifically%2C%20ungrounded%20Vision-Language%20Models%20%28VLMs%29%20frequently%20suffer%20from%20kinematic%20hallucinations%2C%20while%20unconstrained%20joint%20estimation%20inevitably%20leads%20to%20catastrophic%20mesh%20inter-penetration%20during%20physical%20simulation.%20To%20bridge%20this%20gap%2C%20we%20propose%20MotionAnymesh%2C%20an%20automated%20zero-shot%20framework%20that%20seamlessly%20transforms%20unstructured%20static%20meshes%20into%20simulation-ready%20digital%20twins.%20Our%20method%20features%20a%20kinematic-aware%20part%20segmentation%20module%20that%20grounds%20VLM%20reasoning%20with%20explicit%20SP4D%20physical%20priors%2C%20effectively%20eradicating%20kinematic%20hallucinations.%20Furthermore%2C%20we%20introduce%20a%20geometry-physics%20joint%20estimation%20pipeline%20that%20combines%20robust%20type-aware%20initialization%20with%20physics-constrained%20trajectory%20optimization%20to%20rigorously%20guarantee%20collision-free%20articulation.%20Extensive%20experiments%20demonstrate%20that%20MotionAnymesh%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20geometric%20precision%20and%20dynamic%20physical%20executability%2C%20providing%20highly%20reliable%20assets%20for%20downstream%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12936v1%0AForm%3A%20https%3A//docs.goog %2520state-of-the-art%2520baselines%2520in%2520both%2520geometric%2520precision%2520and%2520dynamic%2520physical%2520executability%252C%2520providing%2520highly%2520reliable%2520assets%2520for%2520downstream%2520applications.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12936v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MotionAnymesh%3A%20Physics-Grounded%20Articulation%20for%20Simulation-Ready%20Digital%20Twins&entry.906535625=WenBo%20Xu%20and%20Liu%20Liu%20and%20Li%20Zhang%20and%20Dan%20Guo%20and%20RuoNan%20Liu&entry.1292438233=Converting%20static%203D%20meshes%20into%20interactable%20articulated%20assets%20is%20crucial%20for%20embodied%20AI%20and%20robotic%20simulation.%20However%2C%20existing%20zero-shot%20pipelines%20struggle%20with%20complex%20assets%20due%20to%20a%20critical%20lack%20of%20physical%20grounding.%20Specifically%2C%20ungrounded%20Vision-Language%20Models%20%28VLMs%29%20frequently%20suffer%20from%20kinematic%20hallucinations%2C%20while%20unconstrained%20joint%20estimation%20inevitably%20leads%20to%20catastrophic%20mesh%20inter-penetration%20during%20physical%20simulation.%20To%20bridge%20this%20gap%2C%20we%20propose%20MotionAnymesh%2C%20an%20automated%20zero-shot%20framework%20that%20seamlessly%20transforms%20unstructured%20static%20meshes%20into%20simulation-ready%20digital%20twins.%20Our%20method%20features%20a%20kinematic-aware%20part%20segmentation%20module%20that%20grounds%20VLM%20reasoning%20with%20explicit%20SP4D%20physical%20priors%2C%20effectively%20eradicating%20kinematic%20hallucinations.%20Furthermore%2C%20we%20introduce%20a%20geometry-physics%20joint%20estimation%20pipeline%20that%20combines%20robust%20type-aware%20initialization%20with%20physics-constrained%20trajectory%20optimization%20to%20rigorously%20guarantee%20collision-free%20articulation.%20Extensive%20experiments%20demonstrate%20that%20MotionAnymesh%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20geometric%20precision%20and%20dynamic%20physical%20executability%2C%20providing%20highly%20reliable%20assets%20for%20downstream%20applications.&entry.1838667208=http%3A//arxiv.org/abs/2603.12936v1&entry.124074799=Read"},
{"title": "TrianguLang: Geometry-Aware Semantic Consensus for Pose-Free 3D Localization", "author": "Bryce Grant and Aryeh Rothenberg and Atri Banerjee and Peng Wang", "abstract": "Localizing objects and parts from natural language in 3D space is essential for robotics, AR, and embodied AI, yet existing methods face a trade-off between the accuracy and geometric consistency of per-scene optimization and the efficiency of feed-forward inference. We present TrianguLang, a feed-forward framework for 3D localization that requires no camera calibration at inference. Unlike prior methods that treat views independently, we introduce Geometry-Aware Semantic Attention (GASA), which utilizes predicted geometry to gate cross-view feature correspondence, suppressing semantically plausible but geometrically inconsistent matches without requiring ground-truth poses. Validated on five benchmarks including ScanNet++ and uCO3D, TrianguLang achieves state-of-the-art feed-forward text-guided segmentation and localization, reducing user effort from $O(N)$ clicks to a single text query. The model processes each frame at 1008x1008 resolution in $\\sim$57ms ($\\sim$18 FPS) without optimization, enabling practical deployment for interactive robotics and AR applications. Code and checkpoints are available at https://cwru-aism.github.io/triangulang/.", "link": "http://arxiv.org/abs/2603.08096v2", "date": "2026-03-13", "relevancy": 3.1158, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6499}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6166}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.603}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tr {"title": "Variation-aware Flexible 3D Gaussian Editing", "author": "Hao Qin and Yukai Sun and Meng Wang and Ming Kong and Mengxu Lu and Qiang Zhu", "abstract": "Indirect editing methods for 3D Gaussian Splatting (3DGS) have recently witnessed significant advancements. These approaches operate by first applying edits in the rendered 2D space and subsequently projecting the modifications back into 3D. However, this paradigm inevitably introduces cross-view inconsistencies and constrains both the flexibility and efficiency of the editing process. To address these challenges, we present VF-Editor, which enables native editing of Gaussian primitives by predicting attribute variations in a feedforward manner. To accurately and efficiently estimate these variations, we design a novel variation predictor distilled from 2D editing knowledge. The predictor encodes the input to generate a variation field and employs two learnable, parallel decoding functions to iteratively infer attribute changes for each 3D Gaussian. Thanks to its unified design, VF-Editor can seamlessly distill editing knowledge from diverse 2D editors and strategies into a single predictor, allowing for flexible and effective knowledge transfer into the 3D domain. Extensive experiments on both public and private datasets reveal the inherent limitations of indirect editing pipelines and validate the effectiveness and flexibility of our approach.", "link": "http://arxiv.org/abs/2602.11638v3", "date": "2026-03-13", "relevancy": 3.0468, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6465}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6016}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5799}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Variation-aware%20Flexible%203D%20Gaussian%20Editing&body=Title%3A%20Variation-aware%20Flexible%203D%20Gaussian%20Editing%0AAuthor%3A%20Hao%20Qin%20and%20Yukai%20Sun%20and%20Meng%20Wang%20and%20Ming%20Kong%20and%20Mengxu%20Lu%20and%20Qiang%20Zhu%0AAbstract%3A%20Indirect%20editing%20methods%20for%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20recently%20witnessed%20significant%20advancements.%20These%20approaches%20operate%20by%20first%20applying%20edits%20in%20the%20rendered%202D%20space%20and%20subsequently%20projecting%20the%20modifications%20back%20into%203D.%20However%2C%20this%20paradigm%20inevitably%20introduces%20cross-view%20inconsistencies%20and%20constrains%20both%20the%20flexibility%20and%20efficiency%20of%20the%20editing%20process.%20To%20address%20these%20challenges%2C%20we%20present%20VF-Editor%2C%20which%20enables%20native%20editing%20of%20Gaussian%20primitives%20by%20predicting%20attribute%20variations%20in%20a%20feedforward%20manner.%20To%20accurately%20and%20efficiently%20estimate%20these%20variations%2C%20we%20design%20a%20novel%20variation%20predictor%20distilled%20from%202D%20editing%20knowledge.%20The%20predictor%20encodes%20the%20input%20to%20generate%20a%20variation%20field%20and%20employs%20two%20learnable%2C%20parallel%20decoding%20functions%20to%20iteratively%20infer%20attribute%20changes%20for%20each%203D%20Gaussian.%20Thanks%20to%20its%20unified%20design%2C%20VF-Editor%20can%20seamlessly%20distill%20editing%20knowledge%20from%20diverse%202D%20editors%20and%20strategies%20into%20a%20single%20predictor%2C%20allowing%20for%20flexible%20and%20effective%20knowledge%20transfer%20into%20the%203D%20domain.%20Extensive%20experiments%20on%20both%20public%20and%20private%20datasets%20reveal%20the%20inherent%20limitations%20of%20indirect%20editing%20pipelines%20and%20validate%20the%20effectiveness%20and%20flexibility%20of%20our%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2602.11638v3%0A 0diverse%202D%20editors%20and%20strategies%20into%20a%20single%20predictor%2C%20allowing%20for%20flexible%20and%20effective%20knowledge%20transfer%20into%20the%203D%20domain.%20Extensive%20experiments%20on%20both%20public%20and%20private%20datasets%20reveal%20the%20inherent%20limitations%20of%20indirect%20editing%20pipelines%20and%20validate%20the%20effectiveness%20and%20flexibility%20of%20our%20approach.&entry.1838667208=http%3A//arxiv.org/abs/2602.11638v3&entry.124074799=Read"},
{"title": "Spectral-Geometric Neural Fields for Pose-Free LiDAR View Synthesis", "author": "Yinuo Jiang and Jun Cheng and Yiran Wang and Cheng Cheng", "abstract": "Neural Radiance Fields (NeRF) have shown remarkable success in image novel view synthesis (NVS), inspiring extensions to LiDAR NVS. However, most methods heavily rely on accurate camera poses for scene reconstruction. The sparsity and textureless nature of LiDAR data also present distinct challenges, leading to geometric holes and discontinuous surfaces. To address these issues, we propose SG-NLF, a pose-free LiDAR NeRF framework that integrates spectral information with geometric consistency. Specifically, we design a hybrid representation based on spectral priors to reconstruct smooth geometry. For pose optimization, we construct a confidence-aware graph based on feature compatibility to achieve global alignment. In addition, an adversarial learning strategy is introduced to enforce cross-frame consistency, thereby enhancing reconstruction quality. Comprehensive experiments demonstrate the effectiveness of our framework, especially in challenging low-frequency scenarios. Compared to previous state-of-the-art methods, SG-NLF improves reconstruction quality and pose accuracy by over 35.8% and 68.8%. Our work can provide a novel perspective for LiDAR view synthesis.", "link": "http://arxiv.org/abs/2603.12903v1", "date": "2026-03-13", "relevancy": 2.9509, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6314}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.579}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=% %2525.%2520Our%2520work%2520can%2520provide%2520a%2520novel%2520perspective%2520for%2520LiDAR%2520view%2520synthesis.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12903v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spectral-Geometric%20Neural%20Fields%20for%20Pose-Free%20LiDAR%20View%20Synthesis&entry.906535625=Yinuo%20Jiang%20and%20Jun%20Cheng%20and%20Yiran%20Wang%20and%20Cheng%20Cheng&entry.1292438233=Neural%20Radiance%20Fields%20%28NeRF%29%20have%20shown%20remarkable%20success%20in%20image%20novel%20view%20synthesis%20%28NVS%29%2C%20inspiring%20extensions%20to%20LiDAR%20NVS.%20However%2C%20most%20methods%20heavily%20rely%20on%20accurate%20camera%20poses%20for%20scene%20reconstruction.%20The%20sparsity%20and%20textureless%20nature%20of%20LiDAR%20data%20also%20present%20distinct%20challenges%2C%20leading%20to%20geometric%20holes%20and%20discontinuous%20surfaces.%20To%20address%20these%20issues%2C%20we%20propose%20SG-NLF%2C%20a%20pose-free%20LiDAR%20NeRF%20framework%20that%20integrates%20spectral%20information%20with%20geometric%20consistency.%20Specifically%2C%20we%20design%20a%20hybrid%20representation%20based%20on%20spectral%20priors%20to%20reconstruct%20smooth%20geometry.%20For%20pose%20optimization%2C%20we%20construct%20a%20confidence-aware%20graph%20based%20on%20feature%20compatibility%20to%20achieve%20global%20alignment.%20In%20addition%2C%20an%20adversarial%20learning%20strategy%20is%20introduced%20to%20enforce%20cross-frame%20consistency%2C%20thereby%20enhancing%20reconstruction%20quality.%20Comprehensive%20experiments%20demonstrate%20the%20effectiveness%20of%20our%20framework%2C%20especially%20in%20challenging%20low-frequency%20scenarios.%20Compared%20to%20previous%20state-of-the-art%20methods%2C%20SG-NLF%20improves%20reconstruction%20quality%20and%20pose%20accuracy%20by%20over%2035.8%25%20and%2068.8%25.%20Our%20work%20can%20provide%20a%20novel%20perspective%20for%20LiDAR%20view%20synthesis.&entry.1838667208=http%3A//arxiv.org/abs/2603.12903v1&entry.124074799=Read"},
{"title": "Topo-R1: Detecting Topological Anomalies via Vision-Language Models", "author": "Meilong Xu and Qingqiao Hu and Xiaoling Hu and Shahira Abousamra and Xin Yu and Weimin Lyu and Kehan Qi and Dimitris Samaras and Chao Chen", "abstract": "Topological correctness is crucial for tubular structures such as blood vessels, nerve fibers, and road networks. Existing topology-preserving methods rely on domain-specific ground truth, which is costly and rarely transfers across domains. When deployed to a new domain without annotations, a key question arises: how can we detect topological anomalies without ground-truth supervision? We reframe this as topological anomaly detection, a structured visual reasoning task requiring a model to locate and classify topological errors in predicted segmentation masks. Vision-Language Models (VLMs) are natural candidates; however, we find that state-of-the-art VLMs perform nearly at random, lacking the fine-grained, topology-aware perception needed to identify sparse connectivity errors in dense structures. To bridge this gap, we develop an automated data-curation pipeline that synthesizes diverse topological anomalies with verifiable annotations across progressively difficult levels, thereby constructing the first large-scale, multi-domain benchmark for this task. We then introduce Topo-R1, a framework that endows VLMs with topology-aware perception via two-stage training: supervised fine-tuning followed by reinforcement learning with Group Relative Policy Optimization (GRPO). Central to our approach is a topology-aware composite reward that integrates type-aware Hungarian matching for structured error classification, spatial localization scoring, and a centerline Dice (clDice) reward that directly penalizes connectivity disruptions, thereby jointly incentivizing semantic precision and structural fidelity. Extensive experiments demonstrate that Topo-R1 establishes a new paradigm for annotation-free topological quality assessment, consistently outperforming general-purpose VLMs and supervised baselines across all evaluation protocols.", "link": "http://arxiv.org/abs/2603.13054v1", "date": "2026-03-13", "relevancy": 2.9093, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5842}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5842}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5771}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Topo-R1%3A%20Detecting%20Topological%20Anomalies%20via%20Vision-Language%20Models&body=Title%3A%20Topo-R1%3A%20Detecting%20Topological%20Anomalies%20via%20Vision-Language%20Models%0AAuthor%3A%20Meilong%20Xu%20and%20Qingqiao%20Hu%20and%20Xiaoling%20Hu%20and%20Shahira%20Abousamra%20and%20Xin%20Yu%20and%20Weimin%20Lyu%20and%20Kehan%20Qi%20and%20Dimitris%20Samaras%20and%20Chao%20Chen%0AAbstract%3A%20Topological%20correctness%20is%20crucial%20for%20tubular%20structures%20such%20as%20blood%20vessels%2C%20nerve%20fibers%2C%20and%20road%20networks.%20Existing%20topology-preserving%20methods%20rely%20on%20domain-specific%20ground%20truth%2C%20which%20is%20costly%20and%20rarely%20transfers%20across%20domains.%20When%20deployed%20to%20a%20new%20domain%20without%20annotations%2C%20a%20key%20question%20arises%3A%20how%20can%20we%20detect%20topological%20anomalies%20without%20ground-truth%20supervision%3F%20We%20reframe%20this%20as%20topological%20anomaly%20detection%2C%20a%20structured%20visual%20reasoning%20task%20requiring%20a%20model%20to%20locate%20and%20classify%20topological%20errors%20in%20predicted%20segmentation%20masks.%20Vision-Language%20Models%20%28VLMs%29%20are%20natural%20candidates%3B%20however%2C%20we%20find%20that%20state-of-the-art%20VLMs%20perform%20nearly%20at%20random%2C%20lacking%20the%20fine-grained%2C%20topology-aware%20perception%20needed%20to%20identify%20sparse%20connectivity%20errors%20in%20dense%20structures.%20To%20bridge%20this%20gap%2C%20we%20develop%20an%20automated%20data-curation%20pipeline%20that%20synthesizes%20diverse%20topological%20anomalies%20with%20verifiable%20annotations%20across%20progressively%20difficult%20levels%2C%20thereby%20constructing%20the%20first%20large-scale%2C%20multi-domain%20benchmark%20for%20this%20task.%20We%20then%20introduce%20Topo-R1%2C%20a%20framework%20that%20endows%20VLMs%20with%20topology-aware%20perception%20via%20two-stage%20training%3A%20supervised%20fine-tuning%20followed%20by%20reinforcement%20learning%20with%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29.%20Central%20to%20our%20approach%20is%20a%20topology-aware%20composite%20reward%20that%20integrates%20type-aware%20Hungarian%20matching%20for%20structured%20error%20classification%2C%20spatial%20localization%20scoring%2C%20and%20a%20centerline%20Dice%20%28clDice%29%20reward%20that%20directly%20penalizes%20connectivity%20disruptions%2C%20thereby%20jointly%20incentivizing%20semantic%20precision%20and%20structural%20fidelity.%20Extensive%20experiments%20demonstrate%20that%20Topo-R1%20establishes%20a%20new%20paradigm%20for%20annotation-free%20topological%20quality%20assessment%2C%20consistently%20outperforming%20general-purpose%20VLMs%20and%20supervised%20baselines%20across%20all%20evaluation%20protocols.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13054v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopo-R1%253A%2520Detecting%2520Topological%2520Anomalies%2520via%2520Vision-Language%2520Models%26entry.906535625%3DMeilong%2520Xu%2520and%2520Qingqiao%2520Hu%2520and%2520Xiaoling%2520Hu%2520and%2520Shahira%2520Abousamra%2520and%2520Xin%2520Yu%2520and%2520Weimin%2520Lyu%2520and%2520Kehan%2520Qi%2520 {"title": "Evaluating VLMs' Spatial Reasoning Over Robot Motion: A Step Towards Robot Planning with Motion Preferences", "author": "Wenxi Wu and Jingjing Zhang and Martim Brand\u00e3o", "abstract": "Understanding user instructions and object spatial relations in surrounding environments is crucial for intelligent robot systems to assist humans in various tasks. The natural language and spatial reasoning capabilities of Vision-Language Models (VLMs) have the potential to enhance the generalization of robot planners on new tasks, objects, and motion specifications. While foundation models have been applied to task planning, it is still unclear the degree to which they have the capability of spatial reasoning required to enforce user preferences or constraints on motion, such as desired distances from objects, topological properties, or motion style preferences. In this paper, we evaluate the capability of four state-of-the-art VLMs at spatial reasoning over robot motion, using four different querying methods. Our results show that, with the highest-performing querying method, Qwen2.5-VL achieves 71.4% accuracy zero-shot and 75% on a smaller model after fine-tuning, and GPT-4o leads to lower performance. We evaluate two types of motion preferences (object-proximity and path-style), and we also analyze the trade-off between accuracy and computation cost in number of tokens. This work shows some promise in the potential of VLM integration with robot motion planning pipelines.", "link": "http://arxiv.org/abs/2603.13100v1", "date": "2026-03-13", "relevancy": 2.8591, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5727}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5727}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigat {"title": "SGMatch: Semantic-Guided Non-Rigid Shape Matching with Flow Regularization", "author": "Tianwei Ye and Xiaoguang Mei and Yifan Xia and Fan Fan and Jun Huang and Jiayi Ma", "abstract": "Establishing accurate point-to-point correspondences between non-rigid 3D shapes remains a critical challenge, particularly under non-isometric deformations and topological noise. Existing functional map pipelines suffer from ambiguities that geometric descriptors alone cannot resolve, and spatial inconsistencies inherent in the projection of truncated spectral bases to dense pointwise correspondences. In this paper, we introduce SGMatch, a learning-based framework for semantic-guided non-rigid shape matching. Specifically, we design a Semantic-Guided Local Cross-Attention module that integrates semantic features from vision foundation models into geometric descriptors while preserving local structural continuity. Furthermore, we introduce a regularization objective based on conditional flow matching, which supervises a time-varying velocity field to encourage spatial smoothness of the recovered correspondences. Experimental results on multiple benchmarks demonstrate that SGMatch achieves competitive performance across near-isometric settings and consistent improvements under non-isometric deformations and topological noise.", "link": "http://arxiv.org/abs/2603.12937v1", "date": "2026-03-13", "relevancy": 2.8045, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5932}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5481}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5414}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SGMatch%3A%20Semantic-Guided%20Non-Rigid%20Shape%20Matching%20with%20Flow%20Regularization&body=Title%3A%20SGMatch%3A%20Semantic-Guided%20Non-Rigid%20Shape%20Matching%20with%20Flow%20Regularization%0AAuthor%3A%20Tianwei%20Ye%20and%20Xiaoguang%20Mei%20and%20Yifan%20Xia%20and%20Fan%20Fan%20and%20Jun%20Huang%20and%20Jiayi%20Ma%0AAbstract%3A%20Establishing%20accurate%20point-to-point%20correspondences%20between%20non-rigid%203D%20shapes%20remains%20a%20critical%20challenge%2C%20particularly%20under%20non-isometric%20deformations%20and%20topological%20noise.%20Existing%20functional%20map%20pipelines%20suffer%20from%20ambiguities%20that%20geometric%20descriptors%20alone%20cannot%20resolve%2C%20and%20spatial%20inconsistencies%20inherent%20in%20the%20projection%20of%20truncated%20spectral%20bases%20to%20dense%20pointwise%20correspondences.%20In%20this%20paper%2C%20we%20introduce%20SGMatch%2C%20a%20learning-based%20framework%20for%20semantic-guided%20non-rigid%20shape%20matching.%20Specifically%2C%20we%20design%20a%20Semantic-Guided%20Local%20Cross-Attention%20module%20that%20integrates%20semantic%20features%20from%20vision%20foundation%20models%20into%20geometric%20descriptors%20while%20preserving%20local%20structural%20continuity.%20Furthermore%2C%20we%20introduce%20a%20regularization%20objective%20based%20on%20conditional%20flow%20matching%2C%20which%20supervises%20a%20time-varying%20velocity%20field%20to%20encourage%20spatial%20smoothness%20of%20the%20recovered%20correspondences.%20Experimental%20results%20on%20multiple%20benchmarks%20demonstrate%20that%20SGMatch%20achieves%20competitive%20performance%20across%20near-isometric%20settings%20and%20consistent%20improvements%20under%20non-isometric%20deformations%20and%20topological%20noise.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12937v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSGMatch%253A%2520Semantic-Guided%2520Non-Rigid%2 7v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SGMatch%3A%20Semantic-Guided%20Non-Rigid%20Shape%20Matching%20with%20Flow%20Regularization&entry.906535625=Tianwei%20Ye%20and%20Xiaoguang%20Mei%20and%20Yifan%20Xia%20and%20Fan%20Fan%20and%20Jun%20Huang%20and%20Jiayi%20Ma&entry.1292438233=Establishing%20accurate%20point-to-point%20correspondences%20between%20non-rigid%203D%20shapes%20remains%20a%20critical%20challenge%2C%20particularly%20under%20non-isometric%20deformations%20and%20topological%20noise.%20Existing%20functional%20map%20pipelines%20suffer%20from%20ambiguities%20that%20geometric%20descriptors%20alone%20cannot%20resolve%2C%20and%20spatial%20inconsistencies%20inherent%20in%20the%20projection%20of%20truncated%20spectral%20bases%20to%20dense%20pointwise%20correspondences.%20In%20this%20paper%2C%20we%20introduce%20SGMatch%2C%20a%20learning-based%20framework%20for%20semantic-guided%20non-rigid%20shape%20matching.%20Specifically%2C%20we%20design%20a%20Semantic-Guided%20Local%20Cross-Attention%20module%20that%20integrates%20semantic%20features%20from%20vision%20foundation%20models%20into%20geometric%20descriptors%20while%20preserving%20local%20structural%20continuity.%20Furthermore%2C%20we%20introduce%20a%20regularization%20objective%20based%20on%20conditional%20flow%20matching%2C%20which%20supervises%20a%20time-varying%20velocity%20field%20to%20encourage%20spatial%20smoothness%20of%20the%20recovered%20correspondences.%20Experimental%20results%20on%20multiple%20benchmarks%20demonstrate%20that%20SGMatch%20achieves%20competitive%20performance%20across%20near-isometric%20settings%20and%20consistent%20improvements%20under%20non-isometric%20deformations%20and%20topological%20noise.&entry.1838667208=http%3A//arxiv.org/abs/2603.12937v1&entry.124074799=Read"},
{"title": "SegDAC: Visual Generalization in Reinforcement Learning via Dynamic Object Tokens", "author": "Alexandre Brown and Glen Berseth", "abstract": "Visual reinforcement learning policies trained on pixel observations often struggle to generalize when visual conditions change at test time. Object-centric representations are a promising alternative, but most approaches use fixed-size slot representations, require image reconstruction, or need auxiliary losses to learn object decompositions. As a result, it remains unclear how to learn RL policies directly from object-level inputs without these constraints. We propose SegDAC, a Segmentation-Driven Actor-Critic that operates on a variable-length set of object token embeddings. At each timestep, text-grounded segmentation produces object masks from which spatially aware token embeddings are extracted. A transformer-based actor-critic processes these dynamic tokens, using segment positional encoding to preserve spatial information across objects. We ablate these design choices and show that both segment positional encoding and variable-length processing are individually necessary for strong performance. We evaluate SegDAC on 8 ManiSkill3 manipulation tasks under 12 visual perturbation types across 3 difficulty levels. SegDAC improves over prior visual generalization methods by 15% on easy, 66% on medium, and 88% on the hardest settings. SegDAC matches the sample efficiency of the state-of-the-art visual RL methods while achieving improved generalization under visual changes. Project Page: https://segdac.github.io/", "link": "http://arxiv.org/abs/2508.09325v4", "date": "2026-03-13", "relevancy": 2.803, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5618}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.56}, {"ti ual%20generalization%20methods%20by%2015%25%20on%20easy%2C%2066%25%20on%20medium%2C%20and%2088%25%20on%20the%20hardest%20settings.%20SegDAC%20matches%20the%20sample%20efficiency%20of%20the%20state-of-the-art%20visual%20RL%20methods%20while%20achieving%20improved%20generalization%20under%20visual%20changes.%20Project%20Page%3A%20https%3A//segdac.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2508.09325v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSegDAC%253A%2520Visual%2520Generalization%2520in%2520Reinforcement%2520Learning%2520via%2520Dynamic%2520Object%2520Tokens%26entry.906535625%3DAlexandre%2520Brown%2520and%2520Glen%2520Berseth%26entry.1292438233%3DVisual%2520reinforcement%2520learning%2520policies%2520trained%2520on%2520pixel%2520observations%2520often%2520struggle%2520to%2520generalize%2520when%2520visual%2520conditions%2520change%2520at%2520test%2520time.%2520Object-centric%2520representations%2520are%2520a%2520promising%2520alternative%252C%2520but%2520most%2520approaches%2520use%2520fixed-size%2520slot%2520representations%252C%2520require%2520image%2520reconstruction%252C%2520or%2520need%2520auxiliary%2520losses%2520to%2520learn%2520object%2520decompositions.%2520As%2520a%2520result%252C%2520it%2520remains%2520unclear%2520how%2520to%2520learn%2520RL%2520policies%2520directly%2520from%2520object-level%2520inputs%2520without%2520these%2520constraints.%2520We%2520propose%2520SegDAC%252C%2520a%2520Segmentation-Driven%2520Actor-Critic%2520that%2520operates%2520on%2520a%2520variable-length%2520set%2520of%2520object%2520token%2520embeddings.%2520At%2520each%2520timestep%252C%2520text-grounded%2520segmentation%2520produces%2520object%2520masks%2520from%2520which%2520spatially%2520aware%2520token%2520embeddings%2520are%2520extracted.%2520A%2520transformer-based%2520actor-critic%2520processes%2520these%2520dynamic%2520tokens%252C%2520using%2520segment%2520positional%2520encoding%2520to%2520preserve%2520spatial%2520information%2520across%2520objects.%2520We%2520ablate%2520these%2520design%2520choices%2520and%2520show%2520that%2520both%2520segment%2520positional%2520encoding%2520and%2520variable-length%2520processing%2520are%2520individually%2520necessary%2520for%2520strong%2520performance.%2520We%2520evaluate%2520SegDAC%2520on%25208%2520ManiSkill3%2520manipulation%2520tasks%2520under%252012%2520visual%2520perturbation%2520types%2520across%25203%2520difficulty%2520levels.%2520SegDAC%2520improves%2520over%2520prior%2520visual%2520generalization%2520methods%2520by%252015%2525%2520on%2520easy%252C%252066%2525%2520on%2520medium%252C%2520and%252088%2525%2520on%2520the%2520hardest%2520settings.%2520SegDAC%2520matches%2520the%2520sample%2520efficiency%2520of%2520the%2520state-of-the-art%2520visual%2520RL%2520methods%2520while%2520achieving%2520improved%2520generalization%2520under%2520visual%2520changes.%2520Project%2520Page%253A%2520https%253A//segdac.github.io/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.09325v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SegDAC%3A%20Visual%20Generalization%20in%20Reinforcement%20Learning%20via%20Dynamic%20Object%20Tokens&entry.906535625=Alexandre%20Brown%20and%20Glen%20Berseth&entry.1292438233=Visual%20reinforcement%20learning%20policies%20trained%20on%20pixel%20observations%20often%20struggle%20to%20generalize%20when%20visual%20conditions%20change%20at%20test%20time.%20Object-centric%20representations%20are%20a%20promising%20alternative%2C%20but%20most%20approaches%20use%20fixed-size%20slot%20representations%2C%20require%20image%20reconstruction%2C%20or%20need%20auxiliary%20losses%20to%20learn%20object%20decompositions.%20As%20a%20result%2C%20it%20remains%20unclear%20how%20to%20learn%20RL%20policies%20directly%20from%20object-level%20inputs%20without%20these%20constraints.%20We%20propose%20SegDA {"title": "Multimodal OCR: Parse Anything from Documents", "author": "Handong Zheng and Yumeng Li and Kaile Zhang and Liang Xin and Guangwei Zhao and Hao Liu and Jiayu Chen and Jie Lou and Jiyu Qiu and Qi Fu and Rui Yang and Shuo Jiang and Weijian Luo and Weijie Su and Weijun Zhang and Xingyu Zhu and Yabin Li and Yiwei ma and Yu Chen and Zhaohui Yu and Guang Yang and Colin Zhang and Lei Zhang and Yuliang Liu and Xiang Bai", "abstract": "We present Multimodal OCR (MOCR), a document parsing paradigm that jointly parses text and graphics into unified textual representations. Unlike conventional OCR systems that focus on text recognition and leave graphical regions as cropped pixels, our method, termed dots.mocr, treats visual elements such as charts, diagrams, tables, and icons as first-class parsing targets, enabling systems to parse documents while preserving semantic relationships across elements. It offers several advantages: (1) it reconstructs both text and graphics as structured outputs, enabling more faithful document reconstruction; (2) it supports end-to-end training over heterogeneous document elements, allowing models to exploit semantic relations between textual and visual components; and (3) it converts previously discarded graphics into reusable code-level supervision, unlocking multimodal supervision embedded in existing documents. To make this paradigm practical at scale, we build a comprehensive data engine from PDFs, rendered webpages, and native SVG assets, and train a compact 3B-parameter model through staged pretraining and supervised fine-tuning. We evaluate dots.mocr from two perspectives: document parsing and structured graphics parsing. On document parsing benchmarks, it ranks second only to Gemini 3 Pro on our OCR Arena Elo leaderboard, surpasses existing open-source document parsing systems, and sets a new state of the art of 83.9 on olmOCR Bench. On structured graphics parsing, dots.mocr achieves higher reconstruction quality than Gemini 3 {"title": "Rethinking VLMs for Image Forgery Detection and Localization", "author": "Shaofeng Guo and Jiequan Cui and Richang Hong", "abstract": "With the rapid rise of Artificial Intelligence Generated Content (AIGC), image manipulation has become increasingly accessible, posing significant challenges for image forgery detection and localization (IFDL). In this paper, we study how to fully leverage vision-language models (VLMs) to assist the IFDL task. In particular, we observe that priors from VLMs hardly benefit the detection and localization performance and even have negative effects due to their inherent biases toward semantic plausibility rather than authenticity. Additionally, the location masks explicitly encode the forgery concepts, which can serve as extra priors for VLMs to ease their training optimization, thus enhancing the interpretability of detection and localization results. Building on these findings, we propose a new IFDL pipeline named IFDL-VLM. To demonstrate the effectiveness of our method, we conduct experiments on 9 popular benchmarks and assess the model performance under both in-domain and cross-dataset generalization settings. The experimental results show that we consistently achieve new state-of-the-art performance in detection, localization, and interpretability.Code is available at: https://github.com/sha0fengGuo/IFDL-VLM.", "link": "http://arxiv.org/abs/2603.12930v1", "date": "2026-03-13", "relevancy": 2.7716, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5679}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5552}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modelin {"title": "Are General-Purpose Vision Models All We Need for 2D Medical Image Segmentation? A Cross-Dataset Empirical Study", "author": "Vanessa Borst and Samuel Kounev", "abstract": "Medical image segmentation (MIS) is a fundamental component of computer-assisted diagnosis and clinical decision support systems. Over the past decade, numerous architectures specifically tailored to medical imaging have emerged to address domain-specific challenges such as low contrast, small anatomical structures, and limited annotated data. In parallel, rapid progress in computer vision has produced highly capable general-purpose vision models (GP-VMs) originally designed for natural images. Despite their strong performance on standard vision benchmarks, their effectiveness for MIS remains insufficiently understood. In this work, we conduct a controlled empirical study to examine whether specialized medical segmentation architectures (SMAs) provide systematic advantages over modern GP-VMs for 2D MIS. We compare eleven SMAs and GP-VMs using a unified training and evaluation protocol. Experiments are performed across three heterogeneous datasets covering different imaging modalities, class structures, and data characteristics. Beyond segmentation accuracy, we analyze qualitative Grad-CAM visualizations to investigate explainability (XAI) behavior. Our results demonstrate that, for the analyzed datasets, GP-VMs out-perform the majority of specialized MIS models. Moreover, XAI analyses indicate that GP-VMs can capture clinically relevant structures without explicit domain-specific architectural design. These findings suggest that GP-VMs can represent a viable alternative to domain-specific methods, highlighting the importance of informed model selection for end-to-end MIS systems. All code and resources are available at GitHub.", "link": "http://arxiv.org/abs/2603.13044v1", "date": "2026-03-13", "relevancy": 2.7257, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with {"title": "Visual-ERM: Reward Modeling for Visual Equivalence", "author": "Ziyu Liu and Shengyuan Ding and Xinyu Fang and Xuanlang Dai and Penghui Yang and Jianze Liang and Jiaqi Wang and Kai Chen and Dahua Lin and Yuhang Zang", "abstract": "Vision-to-code tasks require models to reconstruct structured visual inputs, such as charts, tables, and SVGs, into executable or structured representations with high visual fidelity. While recent Large Vision Language Models (LVLMs) achieve strong results via supervised fine-tuning, reinforcement learning remains challenging due to misaligned reward signals. Existing rewards either rely on textual rules or coarse visual embedding similarity, both of which fail to capture fine-grained visual discrepancies and are vulnerable to reward hacking. We propose Visual Equivalence Reward Model (Visual-ERM), a multimodal generative reward model that provides fine-grained, interpretable, and task-agnostic feedback to evaluate vision-to-code quality directly in the rendered visual space. Integrated into RL, Visual-ERM improves Qwen3-VL-8B-Instruct by +8.4 on chart-to-code and yields consistent gains on table and SVG parsing (+2.7, +4.1 on average), and further strengthens test-time scaling via reflection and revision. We also introduce VisualCritic-RewardBench (VC-RewardBench), a benchmark for judging fine-grained image-to-image discrepancies on structured visual data, where Visual-ERM at 8B decisively outperforms Qwen3-VL-235B-Instruct and approaches leading closed-source models. Our results suggest that fine-grained visual reward supervision is both necessary and sufficient for vision-to-code RL, regardless of task specificity.", "link": "http://arxiv.org/abs/2603.13224v1", "date": "2026-03-13", "relevancy": 2.7247, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5491}, {"title": "Lexicon3D: Probing Visual Foundation Models on%20table%20and%20SVG%20parsing%20%28%2B2.7%2C%20%2B4.1%20on%20average%29%2C%20and%20further%20strengthens%20test-time%20scaling%20via%20reflection%20and%20revision.%20We%20also%20introduce%20VisualCritic-RewardBench%20%28VC-RewardBench%29%2C%20a%20benchmark%20for%20judging%20fine-grained%20image-to-image%20discrepancies%20on%20structured%20visual%20data%2C%20where%20Visual-ERM%20at%208B%20decisively%20outperforms%20Qwen3-VL-235B-Instruct%20and%20approaches%20leading%20closed-source%20models.%20Our%20results%20suggest%20that%20fine-grained%20visual%20reward%20supervision%20is%20both%20necessary%20and%20sufficient%20for%20vision-to-code%20RL%2C%20regardless%20of%20task%20specificity.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13224v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisual-ERM%253A%2520Reward%2520Modeling%2520for%2520Visual%2520Equivalence%26entry.906535625%3DZiyu%2520Liu%2520and%2520Shengyuan%2520Ding%2520and%2520Xinyu%2520Fang%2520and%2520Xuanlang%2520Dai%2520and%2520Penghui%2520Yang%2520and%2520Jianze%2520Liang%2520and%2520Jiaqi%2520Wang%2520and%2520Kai%2520Chen%2520and%2520Dahua%2520Lin%2520and%2520Yuhang%2520Zang%26entry.1292438233%3DVision-to-code%2520tasks%2520require%2520models%2520to%2520reconstruct%2520structured%2520visual%2520inputs%252C%2520such%2520as%2520charts%252C%2520tables%252C%2520and%2520SVGs%252C%2520into%2520executable%2520or%2520structured%2520representations%2520with%2520high%2520visual%2520fidelity.%2520While%2520recent%2520Large%2520Vision%2520Language%2520Models%2520%2528LVLMs%2529%2520achieve%2520strong%2520results%2520via%2520supervised%2520fine-tuning%252C%2520reinforcement%2520learning%2520remains%2520challenging%2520due%2520to%2520misaligned%2520reward%2520signals.%2520Existing%2520rewards%2520either%2520rely%2520on%2520textual%2520rules%2520or%2520coarse%2520visual%2520embedding%2520similarity%252C%2520both%2520of%2520which%2520fail%25 {"title": "AnatomiX, an Anatomy-Aware Grounded Multimodal Large Language Model for Chest X-Ray Interpretation", "author": "Anees Ur Rehman Hashmi and Numan Saeed and Christoph Lippert", "abstract": "Multimodal medical large language models have shown substantial progress in chest X-ray interpretation but continue to face challenges in spatial reasoning and anatomical understanding. Although existing grounding techniques improve overall performance, they often fail to establish a true anatomical correspondence, resulting in incorrect anatomical understanding in the medical domain. To address this gap, we introduce AnatomiX, a multitask multimodal large language model for anatomically grounded chest X-ray interpretation. Inspired by the radiological workflow, AnatomiX adopts a two stage approach: first, it identifies anatomical structures and extracts their features, and then leverages a large language model to perform diverse downstream tasks such as phrase grounding, report generation, visual question answering, and image understanding. Extensive experiments across multiple benchmarks demonstrate that AnatomiX achieves superior anatomical reasoning and delivers over 25% improvement in performance on anatomy grounding, phrase grounding, grounded diagnosis and grounded captioning tasks compared to existing approaches. Code and pretrained model are available at github.com/aneesurhashmi/anatomix.", "link": "http://arxiv.org/abs/2601.03191v2", "date": "2026-03-13", "relevancy": 2.7247, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5602}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AnatomiX%2C%20an%20Anatomy-Aware%20Grounded%20Multimodal%20Large%20Language%20Model%20for%20Chest%20X-Ray%20Interpretation&body=Title%3A%20AnatomiX%2C%20an%20Anatomy-Aware%20Grounded%20Multimodal%20Large%20Language%20Model%20for%20Chest%20X-Ray%20Interpretation%0AAuthor%3A%20Anees%20Ur%20Rehman%20Hashmi%20and%20Numan%20Saeed%20and%20Christoph%20Lippert%0AAbstract%3A%20Multimodal%20medical%20large%20language%20models%20have%20shown%20substantial%20progress%20in%20chest%20X-ray%20interpretation%20but%20continue%20to%20face%20challenges%20in%20spatial%20reasoning%20and%20anatomical%20understanding.%20Although%20existing%20grounding%20techniques%20improve%20overall%20performance%2C%20they%20often%20fail%20to%20establish%20a%20true%20anatomical%20correspondence%2C%20resulting%20in%20incorrect%20anatomical%20understanding%20in%20the%20medical%20domain.%20To%20address%20this%20gap%2C%20we%20introduce%20AnatomiX%2C%20a%20multitask%20multimodal%20large%20language%20model%20for%20anatomically%20grounded%20chest%20X-ray%20interpretation.%20Inspired%20by%20the%20radiological%20workflow%2C%20AnatomiX%20adopts%20a%20two%20stage%20approach%3A%20first%2C%20it%20identifies%20anatomical%20structures%20and%20extracts%20their%20features%2C%20and%20then%20leverages%20a%20large%20language%20model%20to%20perform%20diverse%20downstream%20tasks%20such%20as%20phrase%20grounding%2C%20report%20generation%2C%20visual%20question%20answering%2C%20and%20image%20understanding.%20Extensive%20experiments%20across%20multiple%20benchmarks%20demonstrate%20that%20AnatomiX%20achieves%20superior%20anatomical%20reasoning%20and%20delivers%20over%2025%25%20improvement%20in%20performance%20on%20anatomy%20grounding%2C%20phrase%20grounding%2C%20grounded%20diagnosis%20and%20grounded%20captioning%20tasks%20compared%20to%20existing%20approaches.%20Code%20and%20pretrained%20model%20are%20available%20at%20github.com/aneesurhashmi/anatomix.%0ALink%3A%20http%3A//a l%20reasoning%20and%20delivers%20over%2025%25%20improvement%20in%20performance%20on%20anatomy%20grounding%2C%20phrase%20grounding%2C%20grounded%20diagnosis%20and%20grounded%20captioning%20tasks%20compared%20to%20existing%20approaches.%20Code%20and%20pretrained%20model%20are%20available%20at%20github.com/aneesurhashmi/anatomix.&entry.1838667208=http%3A//arxiv.org/abs/2601.03191v2&entry.124074799=Read"},
{"title": "ExCellGen: Fast, Controllable, Photorealistic 3D Scene Generation from a Single Real-World Exemplar", "author": "Cl\u00e9ment Jambon and Changwoon Choi and Dongsu Zhang and Olga Sorkine-Hornung and Young Min Kim", "abstract": "Photorealistic 3D scene generation is challenging due to the scarcity of large-scale, high-quality real-world 3D datasets and complex workflows requiring specialized expertise for manual modeling. These constraints often result in slow iteration cycles, where each modification demands substantial effort, ultimately stifling creativity. We propose a fast, exemplar-driven framework for generating 3D scenes from a single casual input, such as handheld video or drone footage. Our method first leverages 3D Gaussian Splatting (3DGS) to robustly reconstruct input scenes with a high-quality 3D appearance model. We then train a per-scene Generative Cellular Automaton (GCA) to produce a sparse volume of featurized voxels, effectively amortizing scene generation while enabling controllability. A subsequent patch-based remapping step composites the complete scene from the exemplar's initial 3D Gaussian splats, successfully recovering the appearance statistics of the input scene. The entire pipeline can be trained in less than 10 minutes for each exemplar and generates scenes in 0.5-2 seconds. Our method enables interactive creation with full user control, and we showcase complex 3D generation results from real-world exemplars within a self-contained interactive GUI.", "link": "http://arxiv.org/abs/2412.16253v2", "date": "2026-03-13", "relevancy": 2.7009, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7112}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.668}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ExCellGen%3A%20Fast%2C%20Controllable%2C%20Photorealistic%203D%20Scene%20Generation%20from%20a%20Single%20Real-World%20Exemplar&body=Title%3A%20ExCellGen%3A%20Fast%2C%20Controllable%2C%20Photorealistic%203D%20Scene%20Generation%20from%20a%20Single%20Real-World%20Exemplar%0AAuthor%3A%20Cl%C3%A9ment%20Jambon%20and%20Changwoon%20Choi%20and%20Dongsu%20Zhang%20and%20Olga%20Sorkine-Hornung%20and%20Young%20Min%20Kim%0AAbstract%3A%20Photorealistic%203D%20scene%20generation%20is%20challenging%20due%20to%20the%20scarcity%20of%20large-scale%2C%20high-quality%20real-world%203D%20datasets%20and%20complex%20workflows%20requiring%20specialized%20expertise%20for%20manual%20modeling.%20These%20constraints%20often%20result%20in%20slow%20iteration%20cycles%2C%20where%20each%20modification%20demands%20substantial%20effort%2C%20ultimately%20stifling%20creativity.%20We%20propose%20a%20fast%2C%20exemplar-driven%20framework%20for%20generating%203D%20scenes%20from%20a%20single%20casual%20input%2C%20such%20as%20handheld%20video%20or%20drone%20footage.%20Our%20method%20first%20leverages%203D%20Gaussian%20Splatting%20%283DGS%29%20to%20robustly%20reconstruct%20input%20scenes%20with%20a%20high-quality%203D%20appearance%20model.%20We%20then%20train%20a%20per-scene%20Generative%20Cellular%20Automaton%20%28GCA%29%20to%20produce%20a%20sparse%20volume%20of%20featurized%20voxels%2C%20effectively%20amortizing%20scene%20generation%20while%20enabling%20controllability.%20A%20subsequent%20patch-based%20remapping%20step%20composites%20the%20complete%20scene%20from%20the%20exemplar%27s%20initial%203D%20Gaussian%20splats%2C%20successfully%20recovering%20the%20appearance%20statistics%20of%20the%20input%20scene.%20The%20entire%20pipeline%20can%20be%20trained%20in%20less%20than%2010%20minutes%20for%20each%20exemplar%20and%20generates%20scenes%20in%200.5-2%20seconds.%20Our%20method%20enables%20interactive%20 {"title": "SldprtNet: A Large-Scale Multimodal Dataset for CAD Generation in Language-Driven 3D Design", "author": "Ruogu Li and Sikai Li and Yao Mu and Mingyu Ding", "abstract": "We introduce SldprtNet, a large-scale dataset comprising over 242,000 industrial parts, designed for semantic-driven CAD modeling, geometric deep learning, and the training and fine-tuning of multimodal models for 3D design. The dataset provides 3D models in both .step and .sldprt formats to support diverse training and testing. To enable parametric modeling and facilitate dataset scalability, we developed supporting tools, an encoder and a decoder, which support 13 types of CAD commands and enable lossless transformation between 3D models and a structured text representation. Additionally, each sample is paired with a composite image created by merging seven rendered views from different viewpoints of the 3D model, effectively reducing input token length and accelerating inference. By combining this image with the parameterized text output from the encoder, we employ the lightweight multimodal language model Qwen2.5-VL-7B to generate a natural language description of each part's appearance and functionality. To ensure accuracy, we manually verified and aligned the generated descriptions, rendered images, and 3D models. These descriptions, along with the parameterized modeling scripts, rendered images, and 3D model files, are fully aligned to construct SldprtNet. To assess its effectiveness, we fine-tuned baseline models on a dataset subset, comparing image-plus-text inputs with text-only inputs. Results confirm the necessity and value of multimodal datasets for CAD generation. It features carefully selected real-world industrial parts, supporting tools for scalable dataset expansion, diverse modalities, and ensured diversity in model complexity and geometric features, making it a comprehensive multimodal dataset built for semantic-driven CAD modeling and cross-modal learning.", "link": "http://arxiv.org/abs/2603.13098v1", "date": "2026-03-13", "relevancy": 2.6871, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5586}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5268}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5268}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SldprtNet%3A%20A%20Large-Scale%20Multimodal%20Dataset%20for%20CAD%20Generation%20in%20Language-Driven%203D%20Design&body=Title%3A%20SldprtNet%3A%20A%20Large-Scale%20Multimodal%20Dataset%20for%20CAD%20Generation%20in%20Language-Driven%203D%20Design%0AAuthor%3A%20Ruogu%20Li%20and%20Sikai%20Li%20and%20Yao%20Mu%20and%20Mingyu%20Ding%0AAbstract%3A%20We%20introduce%20SldprtNet%2C%20a%20large-scale%20dataset%20comprising%20over%20242%2C000%20industrial%20parts%2C%20designed%20for%20semantic-driven%20CAD%20modeling%2C%20geometric%20deep%20learning%2C%20and%20the%20training%20and%20fine-tuning%20of%20multimodal%20models%20for%203D%20design.%20The%20dataset%20provides%203D%20models%20in%20both%20.step%20and%20.sldprt%20formats%20to%20support%20diverse%20training%20and%20testing.%20To%20enable%20parametric%20modeling%20and%20facilitate%20dataset%20scalability%2C%20we%20developed%20supporting%20tools%2C%20an%20encoder%20and%20a%20decoder%2C%20which%20support%2013%20types%20of%20CAD%20commands%20and%20enable%20lossless%20transformation%20between%203D%20models%20and%20a%20structured%20text%20representation.%20Additionally%2C%20each%20sample%20is%20paired%20with%20a%20composite%20image%20created%20by%20merging%20seven%20rendered%20views%20from%20different%20viewpoints%20of%20the%203D%20model%2C%20effectively%20reducing%20input%20token%20length%20and%20accelerating%20inference.%20By%20combining%20this%20image%20with%20the%20parameterized%20text%20output%20from%20the%20encoder%2C%20we%20employ%20the%20lightweight%20multimodal%20language%20model%20Qwen2.5-VL-7B%20to%20generate%20a%20natural%20language%20description%20of%20each%20part%27s%20appearance%20and%20functionality.%20To%20ensure%20accuracy%2C%20we%20manually%20verified%20and%20aligned%20the%20generated%20descriptions%2C%20rendered%20images%2C%20and%203D%20models.%20These%20descriptions%2C%20along%20with%20the%20parameterized%20modeling%20scripts%2C%20rendered%20images%2C%20and%203D%20model%20files%2C%20are%20fully%20aligned%20to%20construct%20SldprtNet.%20To%20assess%20its%20effectiveness%2C%20we%20fine-tuned%20baseline%20models%20on%20a%20dataset%20subset%2C%20comparing%20image-plus-text%20inputs%20with%20text-only%20inputs.%20Results%20confirm%20the%20necessity%20and%20value%20of%20multimodal%20datasets%20for%20CAD%20generation.%20It%20features%20carefully%20selected%20real-world%20industrial%20parts%2C%20supporting%20tools%20for%20scalable%20dataset%20expansion%2C%20diverse%20modalities%2C%20and%20ensured%20diversity%20in%20model%20complexity%20and%20geometric%20features%2C%20making%20it%20a%20comprehensive%20multimodal%20dataset%20built%20for%20semantic-driven%20CAD%20modeling%20and%20cross-modal%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13098v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSldprtNet%253A%2520A%2520Large-Scale%2520Multimodal%2520Dataset%2520for%2520CAD%2520Generation%2520in%2520Language-Driven%25203D%2520Design%26entry.906535625%3DRuogu%2520Li%2520and%2520Sikai%2520Li%2520and%2520Yao%2520Mu%2520and%2520Mingyu%2520Ding%26entry.1292438233%3DWe%2520introduce%2520SldprtNet%252C%2520a%2520large-scale%2520dataset%2520comprising%2520over%2520242%252C000%2520industrial%2520parts%252C%2520designed%2520for%2520semantic-driven%2520CAD%2520modeling%252C%2520geometr {"title": "FedBPrompt: Federated Domain Generalization Person Re-Identification via Body Distribution Aware Visual Prompts", "author": "Xin Xu and Weilong Li and Wei Liu and Wenke Huang and Zhixi Yu and Bin Yang and Xiaoying Liao and Kui Jiang", "abstract": "Federated Domain Generalization for Person Re-Identification (FedDG-ReID) learns domain-invariant representations from decentralized data. While Vision Transformer (ViT) is widely adopted, its global attention often fails to distinguish pedestrians from high similarity backgrounds or diverse viewpoints -- a challenge amplified by cross-client distribution shifts in FedDG-ReID. To address this, we propose Federated Body Distribution Aware Visual Prompt (FedBPrompt), introducing learnable visual prompts to guide Transformer attention toward pedestrian-centric regions. FedBPrompt employs a Body Distribution Aware Visual Prompts Mechanism (BAPM) comprising: Holistic Full Body Prompts to suppress cross-client background noise, and Body Part Alignment Prompts to capture fine-grained details robust to pose and viewpoint variations. To mitigate high communication costs, we design a Prompt-based Fine-Tuning Strategy (PFTS) that freezes the ViT backbone and updates only lightweight prompts, significantly reducing communication overhead while maintaining adaptability. Extensive experiments demonstrate that BAPM effectively enhances feature discrimination and cross-domain generalization, while PFTS achieves notable performance gains within only a few aggregation rounds. Moreover, both BAPM and PFTS can be easily integrated into existing ViT-based FedDG-ReID frameworks, making FedBPrompt a flexible and effective solution for federated person re-identification. The code is available at https://github.com/leavlong/FedBPrompt.", "link": "http://arxiv.org/abs/2603.12912v1", "date": "2026-03-13", "relevancy": 2.6513, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5603}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5249}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5055}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedBPrompt%3A%20Federated%20Domain%20Generalization%20Person%20Re-Identification%20via%20Body%20Distribution%20Aware%20Visual%20Prompts&body=Title%3A%20FedBPrompt%3A%20Federated%20Domain%20Generalization%20Person%20Re-Identification%20via%20Body%20Distribution%20Aware%20Visual%20Prompts%0AAuthor%3A%20Xin%20Xu%20and%20Weilong%20Li%20and%20Wei%20Liu%20and%20Wenke%20Huang%20and%20Zhixi%20Yu%20and%20Bin%20Yang%20and%20Xiaoying%20Liao%20and%20Kui%20Jiang%0AAbstract%3A%20Federated%20Domain%20Generalization%20for%20Person%20Re-Identification%20%28FedDG-ReID%29%20learns%20domain-invariant%20representations%20from%20decentralized%20data.%20While%20Vision%20Transformer%20%28ViT%29%20is%20widely%20adopted%2C%20its%20global%20attention%20often%20fails%20to%20distinguish%20pedestrians%20from%20high%20similarity%20backgrounds%20or%20diverse%20viewpoints%20--%20a%20challenge%20amplified%20by%20cross-client%20distribution%20shifts%20in%20FedDG-ReID.%20To%20address%20this%2C%20we%20propose%20Federated%20Body%20Distribution%20Aware%20Visual%20Prompt%20%28FedBPrompt%29%2C%20introducing%20learnable%20visual%20prompts%20to%20guide%20Transformer%20attention%20toward%20pedestrian-centric%20regions.%20FedBPrompt%20employs%20a%20Body%20Distribution%20Aware%20Visual%20Prompts%20Mechanism%20%28BAPM%29%20comprising%3A%20Holistic%20Full%20Body%20Prompts%20to%20suppress%20cross-client%20background%20noise%2C%20and%20Body%20Part%20Alignment%20Prompts%20to%20capture%20fine-grained%20details%20robust%20to%20pose%20and%20viewpoint%20variations.%20To%20mitigate%20high%20communication%20costs%2C%20we%20design%20a%20Prompt-based%20Fine-Tuning%20Strategy%20%28PFTS%29%20that%20freezes%20the%20ViT%20backbone%20and%20updates%20only%20lightweight%20prompts%2C%20significantly%20reducing%20communication%20overhead%20while%20maintaining%20adaptability.%20Extensive%20experiments%20demonstrate%20that%20BAPM%20effectively%20enhances%20feature%20discrimination%20and%20cross-domain%20generalization%2C%20while%20PFTS%20achieves%20notable%20performance%20gains%20within%20only%20a%20few%20aggregation%20rounds.%20Moreover%2C%20both%20BAPM%20and%20PFTS%20can%20be%20easily%20integrated%20into%20existing%20ViT-based%20FedDG-ReID%20frameworks%2C%20making%20FedBPrompt%20a%20flexible%20and%20effective%20solution%20for%20federated%20person%20re-identification.%20The%20code%20is%20available%20at%20https%3A//github.com/leavlong/FedBPrompt.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12912v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFedBPrompt%253A%2520Federated%2520Domain%2520Generalization%2520Person%2520Re-Identification%2520via%2520Body%2520Distribution%2520Aware%2520Visual%2520Prompts%26entry.906535625%3DXin%2520Xu%2520and%2520Weilong%2520Li%2520and%2520Wei%2520Liu%2520and%2520Wenke%2520Huang%2520and%2520Zhixi%2520Yu%2520and%2520Bin%2520Yang%2520and%2520Xiaoying%2520Liao%2520and%2520Kui%2520Jiang%26entry.1292438233%3DFederated%2520Domain%2520Generalization%2520for%2520Person%2520Re-Identification%2520%2528FedDG-ReID%2529%2520learns%2520domain-invariant%2520representations%2520from%2520decentralized%2520data.%2520While%2520Vision%2520Transformer%2520%2528ViT%2529%2520is%2520widely%2520adopted%252C%2520its%2520global%2520attention%2520often%2520fails%2520to%2520distinguish%2520pedestrians%2520from%2520high%2520similarity%2520backgrounds%2520or%2520diverse%2520viewpoints%2520--%2520a%2520challenge%2520amplified%2520by%2520cross-client%25 {"title": "NOIR: Neural Operator mapping for Implicit Representations", "author": "Sidaty El Hadramy and Nazim Haouchine and Michael Wehrli and Philippe C. Cattin", "abstract": "This paper presents NOIR, a framework that reframes core medical imaging tasks as operator learning between continuous function spaces, challenging the prevailing paradigm of discrete grid-based deep learning. Instead of operating on fixed pixel or voxel grids, NOIR embeds discrete medical signals into shared Implicit Neural Representations and learns a Neural Operator that maps between their latent modulations, enabling resolution-independent function-to-function transformations. We evaluate NOIR across multiple 2D and 3D downstream tasks, including segmentation, shape completion, image-to-image translation, and image synthesis, on several public datasets such as Shenzhen, OASIS-4, SkullBreak, fastMRI, as well as an in-house clinical dataset. It achieves competitive performance at native resolution while demonstrating strong robustness to unseen discretizations, and empirically satisfies key theoretical properties of neural operators. The project page is available here: https://github.com/Sidaty1/NOIR-io.", "link": "http://arxiv.org/abs/2603.13118v1", "date": "2026-03-13", "relevancy": 2.609, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5275}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5229}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NOIR%3A%20Neural%20Operator%20mapping%20for%20Implicit%20Representations&body=Title%3A%20NOIR%3A%20Neural%20Operator%20mapping%20for%20Implicit%20Representations%0AAuthor%3A%20Sidaty%20El%20Hadramy%20and%20Nazim%20Haouchine%20and%20Michael%20Wehrli%20and%20Philippe%20C.%20Cattin%0AAbstract%3A%20This%20paper%20presents%20NOIR%2C%20a%20framework%20that%20reframes%20core%20medical%20imaging%20tasks%20as%20operator%20learning%20between%20continuous%20function%20spaces%2C%20challenging%20the%20prevailing%20paradigm%20of%20discrete%20grid-based%20deep%20learning.%20Instead%20of%20operating%20on%20fixed%20pixel%20or%20voxel%20grids%2C%20NOIR%20embeds%20discrete%20medical%20signals%20into%20shared%20Implicit%20Neural%20Representations%20and%20learns%20a%20Neural%20Operator%20that%20maps%20between%20their%20latent%20modulations%2C%20enabling%20resolution-independent%20function-to-function%20transformations.%20We%20evaluate%20NOIR%20across%20multiple%202D%20and%203D%20downstream%20tasks%2C%20including%20segmentation%2C%20shape%20completion%2C%20image-to-image%20translation%2C%20and%20image%20synthesis%2C%20on%20several%20public%20datasets%20such%20as%20Shenzhen%2C%20OASIS-4%2C%20SkullBreak%2C%20fastMRI%2C%20as%20well%20as%20an%20in-house%20clinical%20dataset.%20It%20achieves%20competitive%20performance%20at%20native%20resolution%20while%20demonstrating%20strong%20robustness%20to%20unseen%20discretizations%2C%20and%20empirically%20satisfies%20key%20theoretical%20properties%20of%20neural%20operators.%20The%20project%20page%20is%20available%20here%3A%20https%3A//github.com/Sidaty1/NOIR-io.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13118v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNOIR%253A%2520Neural%2520Operator%2520mapping%2520for%2520Implicit%2520Representations%26entry.906535625%3DSidaty%2520El%2520Hadramy%2520and%2520Nazim%2520Haouchine%2520and%2520Michael%2520Wehrli%2520and%2520Philippe%2520C.%2520Cattin%26entry.1292438233%3DThis%2520paper%2520presents%2520NOIR%252C%2520a%2520framework%2520that%2520reframes%2520core%2520medical%2520im {"title": "SCOPE: Semantic Coreset with Orthogonal Projection Embeddings for Federated learning", "author": "Md Anwar Hossen and Nathan R. Tallent and Luanzheng Guo and Ali Jannesary", "abstract": "Scientific discovery increasingly requires learning on federated datasets, fed by streams from high-resolution instruments, that have extreme class imbalance. Current ML approaches either require impractical data aggregation or fail due to class imbalance. Existing coreset selection methods rely on local heuristics, making them unaware of the global data landscape and prone to sub-optimal and non-representative pruning. To overcome these challenges, we introduce SCOPE (Semantic Coreset using Orthogonal Projection Embeddings for Federated learning), a coreset framework for federated data that filters anomalies and adaptively prunes redundant data to mitigate long-tail skew. By analyzing the latent space distribution, we score each data point using a representation score that measures the reliability of core class features, a diversity score that quantifies the novelty of orthogonal residuals, and a boundary proximity score that indicates similarity to competing classes. Unlike prior methods, SCOPE shares only scalar metrics with a federated server to construct a global consensus, ensuring communication efficiency. Guided by the global consensus, SCOPE dynamically filters local noise and discards redundant samples to counteract global feature skews. Extensive experiments demonstrate that SCOPE yields competitive global accuracy and robust convergence, all while achieving exceptional efficiency with a 128x to 512x reduction in uplink bandwidth, a 7.72x wall-clock acceleration and reduced FLOP and VRAM footprints for local coreset selection.", "link": "http://arxiv.org/abs/2603.12976v1", "date": "2026-03-13", "relevancy": 2.589, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", score%20that%20indicates%20similarity%20to%20competing%20classes.%20Unlike%20prior%20methods%2C%20SCOPE%20shares%20only%20scalar%20metrics%20with%20a%20federated%20server%20to%20construct%20a%20global%20consensus%2C%20ensuring%20communication%20efficiency.%20Guided%20by%20the%20global%20consensus%2C%20SCOPE%20dynamically%20filters%20local%20noise%20and%20discards%20redundant%20samples%20to%20counteract%20global%20feature%20skews.%20Extensive%20experiments%20demonstrate%20that%20SCOPE%20yields%20competitive%20global%20accuracy%20and%20robust%20convergence%2C%20all%20while%20achieving%20exceptional%20efficiency%20with%20a%20128x%20to%20512x%20reduction%20in%20uplink%20bandwidth%2C%20a%207.72x%20wall-clock%20acceleration%20and%20reduced%20FLOP%20and%20VRAM%20footprints%20for%20local%20coreset%20selection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12976v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSCOPE%253A%2520Semantic%2520Coreset%2520with%2520Orthogonal%2520Projection%2520Embeddings%2520for%2520Federated%2520learning%26entry.906535625%3DMd%2520Anwar%2520Hossen%2520and%2520Nathan%2520R.%2520Tallent%2520and%2520Luanzheng%2520Guo%2520and%2520Ali%2520Jannesary%26entry.1292438233%3DScientific%2520discovery%2520increasingly%2520requires%2520learning%2520on%2520federated%2520datasets%252C%2520fed%2520by%2520streams%2520from%2520high-resolution%2520instruments%252C%2520that%2520have%2520extreme%2520class%2520imbalance.%2520Current%2520ML%2520approaches%2520either%2520require%2520impractical%2520data%2520aggregation%2520or%2520fail%2520due%2520to%2520class%2520imbalance.%2520Existing%2520coreset%2520selection%2520methods%2520rely%2520on%2520local%2520heuristics%252C%2520making%2520them%2520unaware%2520of%2520the%2520global%2520data%2520landscape%2520and%2520prone%2520to%2520sub-optimal%2520and%2520non-representative%2520pruning.%2520To%2520overcome%2520these%2520challenges%252C%2520we%25 {"title": "NeuCo-Bench: A Novel Benchmark Framework for Neural Embeddings in Earth Observation", "author": "Rikard Vinge and Isabelle Wittmann and Jannik Schneider and Michael Marszalek and Luis Gilch and Thomas Brunschwiler and Conrad M Albrecht", "abstract": "We introduce NeuCo-Bench, a novel benchmark framework for evaluating (lossy) neural compression and representation learning in the context of Earth Observation (EO). Our approach builds on fixed-size embeddings that act as compact, task-agnostic representations applicable to a broad range of downstream tasks. NeuCo-Bench comprises three components: (i) an evaluation pipeline built around embeddings, (ii) a challenge mode with a hidden-task leaderboard designed to mitigate pretraining bias, and (iii) a scoring system that balances accuracy and stability. To support reproducibility, we release SSL4EO-S12-downstream, a curated multispectral, multitemporal EO dataset. We present results from a public challenge at the 2025 CVPR EARTHVISION workshop and conduct ablations with state-of-the-art foundation models. NeuCo-Bench provides a step towards community-driven, standardized evaluation of neural embeddings for EO and beyond.", "link": "http://arxiv.org/abs/2510.17914v2", "date": "2026-03-13", "relevancy": 2.5874, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.526}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.526}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5004}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NeuCo-Bench%3A%20A%20Novel%20Benchmark%20Framework%20for%20Neural%20Embeddings%20in%20Earth%20Observation&body=Title%3A%20NeuCo-Bench%3A%20A%20Novel%20Benchmark%20Framework%20for%20Neural%20Embeddings%20in%20Earth%20Observation%0AAuthor%3A%20Rikard%20Vinge%20and%20Isabelle%20Wittmann%20and%20Jannik%20Schneider%20and%20Michael%20Marszalek%20and%20Luis%20Gilch%20and%20Thomas%20Brunschwiler%20and%20Conrad%20M%20Albrecht%0AAbstract%3A%20We%20introduce%20NeuCo-Bench%2C%20a%20novel%20benchmark%20framework%20for%20evaluating%20%28lossy%29%20neural%20compression%20and%20representation%20learning%20in%20the%20context%20of%20Earth%20Observation%20%28EO%29.%20Our%20approach%20builds%20on%20fixed-size%20embeddings%20that%20act%20as%20compact%2C%20task-agnostic%20representations%20applicable%20to%20a%20broad%20range%20of%20downstream%20tasks.%20NeuCo-Bench%20comprises%20three%20components%3A%20%28i%29%20an%20evaluation%20pipeline%20built%20around%20embeddings%2C%20%28ii%29%20a%20challenge%20mode%20with%20a%20hidden-task%20leaderboard%20designed%20to%20mitigate%20pretraining%20bias%2C%20and%20%28iii%29%20a%20scoring%20system%20that%20balances%20accuracy%20and%20stability.%20To%20support%20reproducibility%2C%20we%20release%20SSL4EO-S12-downstream%2C%20a%20curated%20multispectral%2C%20multitemporal%20EO%20dataset.%20We%20present%20results%20from%20a%20public%20challenge%20at%20the%202025%20CVPR%20EARTHVISION%20workshop%20and%20conduct%20ablations%20with%20state-of-the-art%20foundation%20models.%20NeuCo-Bench%20provides%20a%20step%20towards%20community-driven%2C%20standardized%20evaluation%20of%20neural%20embeddings%20for%20EO%20and%20beyond.%0ALink%3A%20http%3A//arxiv.org/abs/2510.17914v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeuCo-Bench%253A%2520A%2520Novel%2520Benchmark%2520Framework%2520for%2520Neural%2520Embeddings%2520in%2520Earth%2520Observation%26entry.906535625%3DRikard%2520Vinge%2520and%2520Isabelle%2520Wittmann%2520and%2520Jannik%2520Schneider%2520and%2520Michael%2520Marszalek%2520and%2520Luis%2520Gilch%2520and%2520Thomas%2520Brunschwile

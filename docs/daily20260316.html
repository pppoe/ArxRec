{"title": "Panoramic Multimodal Semantic Occupancy Prediction for Quadruped Robots", "author": "Guoqiang Zhao and Zhe Yang and Sheng Wu and Fei Teng and Mengfei Duan and Yuanfan Zheng and Kai Luo and Kailun Yang", "abstract": "Panoramic imagery provides holistic 360\u00b0 visual coverage for perception in quadruped robots. However, existing occupancy prediction methods are mainly designed for wheeled autonomous driving and rely heavily on RGB cues, limiting their robustness in complex environments. To bridge this gap, (1) we present PanoMMOcc, the first real-world panoramic multimodal occupancy dataset for quadruped robots, featuring four sensing modalities across diverse scenes. (2) We propose a panoramic multimodal occupancy perception framework, VoxelHound, tailored for legged mobility and spherical imaging. Specifically, we design (i) a Vertical Jitter Compensation (VJC) module to mitigate severe viewpoint perturbations caused by body pitch and roll during mobility, enabling more consistent spatial reasoning, and (ii) an effective Multimodal Information Prompt Fusion (MIPF) module that jointly leverages panoramic visual cues and auxiliary modalities to enhance volumetric occupancy prediction. (3) We establish a benchmark based on PanoMMOcc and provide detailed data analysis to enable systematic evaluation of perception methods under challenging embodied scenarios. Extensive experiments demonstrate that VoxelHound achieves state-of-the-art performance on PanoMMOcc (+4.16%} in mIoU). The dataset and code will be publicly released to facilitate future research on panoramic multimodal 3D perception for embodied robotic systems at https://github.com/SXDR/PanoMMOcc, along with the calibration tools released at https://github.com/losehu/CameraLiDAR-Calib.", "link": "http://arxiv.org/abs/2603.13108v1", "date": "2026-03-13", "relevancy": 2.55, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", {"title": "Surprised by Attention: Predictable Query Dynamics for Time Series Anomaly Detection", "author": "Kadir-Kaan \u00d6zer and Ren\u00e9 Ebeling and Markus Enzweiler", "abstract": "Multivariate time series anomalies often manifest as shifts in cross-channel dependencies rather than simple amplitude excursions. In autonomous driving, for instance, a steering command might be internally consistent but decouple from the resulting lateral acceleration. Residual-based detectors can miss such anomalies when flexible sequence models still reconstruct signals plausibly despite altered coordination. We introduce AxonAD, an unsupervised detector that treats multi-head attention query evolution as a short horizon predictable process. A gradient-updated reconstruction pathway is coupled with a history-only predictor that forecasts future query vectors from past context. This is trained via a masked predictor-target objective against an exponential moving average (EMA) target encoder. At inference, reconstruction error is combined with a tail-aggregated query mismatch score, which measures cosine deviation between predicted and target queries on recent timesteps. This dual approach provides sensitivity to structural dependency shifts while retaining amplitude-level detection. On proprietary in-vehicle telemetry with interval annotations and on the TSB-AD multi-variate suite (17 datasets, 180 series) with threshold-free and range-aware metrics, AxonAD improves ranking quality and temporal localization over strong baselines. Ablations confirm that query prediction and combined scoring are the primary drivers of the observed gains. Code is available at the URL https://github.com/iis-esslingen/AxonAD.", "link": "http://arxiv.org/abs/2603.12916v1", "date": "2026-03-13", "relevancy": 2.5377, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5184}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5141}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Surprised%20by%20Attention%3A%20Predictable%20Query%20Dynamics%20for%20Time%20Series%20Anomaly%20Detection&body=Title%3A%20Surprised%20by%20Attention%3A%20Predictable%20Query%20Dynamics%20for%20Time%20Series%20Anomaly%20Detection%0AAuthor%3A%20Kadir-Kaan%20%C3%96zer%20and%20Ren%C3%A9%20Ebeling%20and%20Markus%20Enzweiler%0AAbstract%3A%20Multivariate%20time%20series%20anomalies%20often%20manifest%20as%20shifts%20in%20cross-channel%20dependencies%20rather%20than%20simple%20amplitude%20excursions.%20In%20autonomous%20driving%2C%20for%20instance%2C%20a%20steering%20command%20might%20be%20internally%20consistent%20but%20decouple%20from%20the%20resulting%20lateral%20acceleration.%20Residual-based%20detectors%20can%20miss%20such%20anomalies%20when%20flexible%20sequence%20models%20still%20reconstruct%20signals%20plausibly%20despite%20altered%20coordination.%20We%20introduce%20AxonAD%2C%20an%20unsupervised%20detector%20that%20treats%20multi-head%20attention%20query%20evolution%20as%20a%20short%20horizon%20predictable%20process.%20A%20gradient-updated%20reconstruction%20pathway%20is%20coupled%20with%20a%20history-only%20predictor%20that%20forecasts%20future%20query%20vectors%20from%20past%20context.%20This%20is%20trained%20via%20a%20masked%20predictor-target%20objective%20against%20an%20exponential%20moving%20average%20%28EMA%29%20target%20encoder.%20At%20inference%2C%20reconstruction%20error%20is%20combined%20with%20a%20tail-aggregated%20query%20mismatch%20score%2C%20which%20measures%20cosine%20deviation%20between%20predicted%20and%20target%20queries%20on%20recent%20timesteps.%20This%20dual%20approach%20provides%20sensitivity%20to%20structural%20dependency%20shifts%20while%20retaining%20amplitude-level%20detection.%20On%20proprietary%20in-vehicle%20telemetry%20with%20interval%20annotations%20and%20on%20the%20TSB-AD%20multi-variate%20suite%20%2817%20datasets%2C%20180%20series%29%20with%20threshold-free%20and%20range-aware%20metrics%2C%20AxonAD%20improves%20ranking%20quality%20and%20temporal%20localization%20over%20strong%20baselines.%20Ablations%20confirm%20that%20query%20prediction%20and%20combined%20scoring%20are%20the%20primary%20drivers%20of%20the%20observed%20gains.%20Code%20is%20available%20at%20the%20URL%20https%3A//github.com/iis-esslingen/AxonAD.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12916v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSurprised%2520by%2520Attention%253A%2520Predictable%2520Query%2520Dynamics%2520for%2520Time%2520Series%2520Anomaly%2520Detection%26entry.906535625%3DKadir-Kaan%2520%25C3%2596zer%2520and%2520Ren%25C3%25A9%2520Ebeling%2520and%2520Markus%2520Enzweiler%26entry.1292438233%3DMultivariate%2520time%2520series%2520anomalies%2520often%2520manifest%2520as%2520shifts%2520in%2520cross-channel%2520dependencies%2520rather%2520than%2520simple%2520amplitude%2520excursions.%2520In%2520autonomous%2520driving%252C%2520for%2520instance%252C%2520a%2520steering%2520command%2520might%2520be%2520internally%2520consistent%2520but%2520decouple%2520from%2520the%2520resulting%2520lateral%2520acceleration.%2520Residual-based%2520detectors%2520can%2520miss%2520such%2520anomalies%2520when%2520flexible%2520sequence%2520models%2520still%2520reconstruct%2520signals%2520plausibly%2520despite%2520altered%2520coordination.%2520We%2520introduce%2520AxonAD%252C%2520an%2520unsupervised%2520detector%2520that%2520treats%2520multi-head%2520attention%2520query%2520evolution%2520as%2520a%2520short%2520horizon%2520predictable%2520process.%2520A%2520gradient-updated%2520recon {"title": "H2LooP Spark Preview: Continual Pretraining of Large Language Models for Low-Level Embedded Systems Code", "author": "Amit Singh and Vedant Nipane and Pulkit Agrawal and Jatin Kishnani and Sairanjan Mishra", "abstract": "Large language models (LLMs) demonstrate strong code generation abilities in general-purpose programming languages but remain limited in specialized domains such as low-level embedded systems programming. This domain involves hardware register manipulation, vendor-specific SDKs, real-time operating system APIs, and hardware abstraction layers that are underrepresented in standard pretraining corpora. We introduce H2LooP Spark Preview, a continual pretraining (CPT) pipeline that adapts the OLMo-3-7B-a fully open language model to the embedded systems domain using BF16 LoRA with rank-stabilized scaling on 8 NVIDIA H100 GPUs. Our training corpus is constructed from repository-datasheet pairs covering 100B tokens of raw embedded systems data across 117 manufacturers, processed using the hierarchical datasheet-to-code mapping approach proposed in SpecMap (Nipane et al., 2026). The resulting curated dataset split contains 23.5B tokens across 13 embedded domains. Continual pretraining with high-rank LoRA (r=512) yields substantial gains, reducing in-domain perplexity by 70.4% and held-out repository perplexity by 66.1%. On generative code completion benchmarks spanning 13 embedded domains, our 7B model outperforms Claude Opus 4.6 and Qwen3-Coder-30B on 8 categories in token accuracy, showing that targeted continual pretraining enables smaller open-weight models to rival frontier systems on specialized technical tasks. We release the production training checkpoint on Huggingface as an open-source artifact.", "link": "http://arxiv.org/abs/2603.11139v2", "date": "2026-03-13", "relevancy": 2.5362, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5156}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5156}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4905}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20H2LooP%20Spark%20Preview%3A%20Continual%20Pretraining%20of%20Large%20Language%20Models%20for%20Low-Level%20Embedded%20Systems%20Code&body=Title%3A%20H2LooP%20Spark%20Preview%3A%20Continual%20Pretraining%20of%20Large%20Language%20Models%20for%20Low-Level%20Embedded%20Systems%20Code%0AAuthor%3A%20Amit%20Singh%20and%20Vedant%20Nipane%20and%20Pulkit%20Agrawal%20and%20Jatin%20Kishnani%20and%20Sairanjan%20Mishra%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20demonstrate%20strong%20code%20generation%20abilities%20in%20general-purpose%20programming%20languages%20but%20remain%20limited%20in%20specialized%20domains%20such%20as%20low-level%20embedded%20systems%20programming.%20This%20domain%20involves%20hardware%20register%20manipulation%2C%20vendor-specific%20SDKs%2C%20real-time%20operating%20system%20APIs%2C%20and%20hardware%20abstraction%20layers%20that%20are%20underrepresented%20in%20standard%20pretraining%20corpora.%20We%20introduce%20H2LooP%20Spark%20Preview%2C%20a%20continual%20pretraining%20%28CPT%29%20pipeline%20that%20adapts%20the%20OLMo-3-7B-a%20fully%20open%20language%20model%20to%20the%20embedded%20systems%20domain%20using%20BF16%20LoRA%20with%20rank-stabilized%20scaling%20on%208%20NVIDIA%20H100%20GPUs.%20Our%20training%20corpus%20is%20constructed%20from%20repository-datasheet%20pairs%20covering%20100B%20tokens%20of%20raw%20embedded%20systems%20data%20across%20117%20manufacturers%2C%20processed%20using%20the%20hierarchical%20datasheet-to-code%20mapping%20approach%20proposed%20in%20SpecMap%20%28Nipane%20et%20al.%2C%202026%29.%20The%20resulting%20curated%20dataset%20split%20contains%2023.5B%20tokens%20across%2013%20embedded%20domains.%20Continual%20pretraining%20with%20high-rank%20LoRA%20%28r%3D512%29%20yields%20substantial%20gains%2C%20reducing%20in-domain%20perplexity%20by%2070.4%25%20and%20held-out%20repository%20perplexity%20by%2066.1%25.%20On%20generative%20code%20completion%20benchmarks%20spanning%2013%20embedded%20domains%2C%20our%207B%20model%20outperforms%20Claude%20Opus%204.6%20and%20Qwen3-Coder-30B%20on%208%20categories%20in%20token%20accuracy%2C%20showing%20that%20targeted%20continual%20pretraining%20enables%20smaller%20open-weight%20models%20to%20rival%20frontier%20systems%20on%20specialized%20technical%20tasks.%20We%20release%20the%20production%20training%20checkpoint%20on%20Huggingface%20as%20an%20open-source%20artifact.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11139v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DH2LooP%2520Spark%2520Preview%253A%2520Continual%2520Pretraining%2520of%2520Large%2520Language%2520Models%2520for%2520Low-Level%2520Embedded%2520Systems%2520Code%26entry.906535625%3DAmit%2520Singh%2520and%2520Vedant%2520Nipane%2520and%2520Pulkit%2520Agrawal%2520and%2520Jatin%2520Kishnani%2520and%2520Sairanjan%2520Mishra%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520demonstrate%2520strong%2520code%2520generation%2520abilities%2520in%2520general-purpose%2520programming%2520languages%2520but%2520remain%2520limited%2520in%2520specialized%2520domains%2520such%2520as%2520low-level%2520embedded%2520systems%2520programming.%2520This%2520domain%2520involves%2520hardware%2520register%2520manipulation%252C%2520vendor-specific%2520SDKs%252C%2520real-time%2520operating%2520system%2520APIs%252C%2520and%2520hardware%2520abstraction%2520layers%2520that%2520are%2520underrepresented%2520in%2520standard%2520pretraining%2520corpora.%2520We%2520introduce%2520H2LooP%2520Spark%2520Preview%252C%2520a%2520continual% {"title": "LongStream: Long-Sequence Streaming Autoregressive Visual Geometry", "author": "Chong Cheng and Xianda Chen and Tao Xie and Wei Yin and Weiqiang Ren and Qian Zhang and Xiaoyang Guo and Hao Wang", "abstract": "Long-sequence streaming 3D reconstruction remains a significant open challenge. Existing autoregressive models often fail when processing long sequences because they anchor poses to the first frame, leading to attention decay, scale drift, and extrapolation errors. We introduce LongStream, a novel gauge-decoupled streaming visual geometry model for metric-scale scene reconstruction across thousands of frames under a strictly online, future-invisible setting. Our approach is threefold. First, we discard the first-frame anchor and predict keyframe-relative poses. This reformulates long-range extrapolation into a constant-difficulty local task. Second, we introduce orthogonal scale learning. This method fully disentangles geometry from scale estimation to suppress drift. Finally, we identify attention bias issues in Transformers, including attention-sink reliance and long-term KV-cache saturation. We propose cache-consistent training combined with periodic cache refresh. This approach suppresses attention biases and contamination over ultra-long sequences and reduces the gap between training and inference. Experiments show that LongStream achieves state-of-the-art performance, enabling stable, metric-scale reconstruction over kilometer-scale sequences at 18 FPS. Project Page: https://3dagentworld.github.io/longstream/", "link": "http://arxiv.org/abs/2602.13172v2", "date": "2026-03-13", "relevancy": 2.5024, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6389}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6215}, {"title": "WorldExplorer: Towa {"title": "On the Geometric Coherence of Global Aggregation in Federated Graph Neural Networks", "author": "Chethana Prasad Kabgere and Shylaja SS", "abstract": "Federated Learning (FL) enables distributed training across multiple clients without centralized data sharing, while Graph Neural Networks (GNNs) model relational data through message passing. In federated GNN settings, client graphs often exhibit heterogeneous structural and propagation characteristics. When standard aggregation mechanisms are applied to such heterogeneous updates, the global model may converge numerically while exhibiting degraded relational behavior. Our work identifies a geometric failure mode of global aggregation in Cross- Domain Federated GNNs. Although GNN parameters are numerically represented as vectors, they encode relational transformations that govern the direction, strength, and sensitivity of information flow across graph neighborhoods. Aggregating updates originating from incompatible propagation regimes can therefore introduce destructive interference in this transformation space. This leads to loss of coherence in global message passing. Importantly, this degradation is not necessarily reflected in conventional metrics such as loss or accuracy. To address this issue, we propose GGRS (Global Geometric Reference Structure), a server-side framework that regulates client updates prior to aggregation based on geometric admissibility criteria. GGRS preserves directional consistency of relational transformations as well as maintains diversity of admissible propagation subspaces. It also stabilizes sensitivity to neighborhood interactions, without accessing client data or graph topology. Experiments on heterogeneous GNN-native, Amazon Co-purchase datasets demonstrate that GGRS preserves global message-passing coherence across training rounds by highlighting the necessity of geometry-aware regulation in federated graph learning.", "link": "http://arxiv.org/abs/2602.15510v2", "date": "2026-03-13", "relevancy": 2.5013, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5358}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4886}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Geometric%20Coherence%20of%20Global%20Aggregation%20in%20Federated%20Graph%20Neural%20Networks&body=Title%3A%20On%20the%20Geometric%20Coherence%20of%20Global%20Aggregation%20in%20Federated%20Graph%20Neural%20Networks%0AAuthor%3A%20Chethana%20Prasad%20Kabgere%20and%20Shylaja%20SS%0AAbstract%3A%20Federated%20Learning%20%28FL%29%20enables%20distributed%20training%20across%20multiple%20clients%20without%20centralized%20data%20sharing%2C%20while%20Graph%20Neural%20Networks%20%28GNNs%29%20model%20relational%20data%20through%20message%20passing.%20In%20federated%20GNN%20settings%2C%20client%20graphs%20often%20exhibit%20heterogeneous%20structural%20and%20propagation%20characteristics.%20When%20standard%20aggregation%20mechanisms%20are%20applied%20to%20such%20heterogeneous%20updates%2C%20the%20global%20model%20may%20converge%20numerically%20while%20exhibiting%20degraded%20relational%20behavior.%20Our%20work%20identifies%20a%20geometric%20failure%20mode%20of%20global%20aggregation%20in%20Cross-%20Domain%20Federated%20GNNs.%20Although%20GNN%20parameters%20are%20numerically%20represented%20as%20vectors%2C%20they%20encode%20relational%20transformations%20that%20govern%20the%20direction%2C%20strength%2C%20and%20sensitivity%20of%20information%20flow%20across%20graph%20neighborhoods.%20Aggregating%20updates%20originating%20from%20incompatible%20propagation%20regimes%20can%20therefore%20introduce%20destructive%20interference%20in%20this%20transformation%20space.%20This%20leads%20to%20loss%20of%20coherence%20in%20global%20message%20passing.%20Importantly%2C%20this%20degradation%20is%20not%20necessarily%20reflected%20in%20conventional%20metrics%20such%20as%20loss%20or%20accuracy.%20To%20address%20this%20issue%2C%20we%20propose%20GGRS%20%28Global%20Geometric%20Reference%20Structure%29%2C%20a%20server-side%20framework%20that%20regulates%20client%20updates%20prior%20to%20aggregation%20based%20on%20geometric%20admissibility%20criteria.%20GGRS%20preserves%20directional%20consistency%20of%20relational%20transformations%20as%20well%20as%20maintains%20diversity%20of%20admissible%20propagation%20subspaces.%20It%20also%20stabilizes%20sensitivity%20to%20neighborhood%20interactions%2C%20without%20accessing%20client%20data%20or%20graph%20topology.%20Experiments%20on%20heterogeneous%20GNN-native%2C%20Amazon%20Co-purchase%20datasets%20demonstrate%20that%20GGRS%20preserves%20global%20message-passing%20coherence%20across%20training%20rounds%20by%20highlighting%20the%20necessity%20of%20geometry-aware%20regulation%20in%20federated%20graph%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.15510v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Geometric%2520Coherence%2520of%2520Global%2520Aggregation%2520in%2520Federated%2520Graph%2520Neural%2520Networks%26entry.906535625%3DChethana%2520Prasad%2520Kabgere%2520and%2520Shylaja%2520SS%26entry.1292438233%3DFederated%2520Learning%2520%2528FL%2529%2520enables%2520distributed%2520training%2520across%2520multiple%2520clients%2520without%2520centralized%2520data%2520sharing%252C%2520while%2520Graph%2520Neural%2520Networks%2520%2528GNNs%2529%2520model%2520relational%2520data%2520through%2520message%2520passing.%2520In%2520federated%2520GNN%2520settings%252C%2520client%2520graphs%2520often%2520exhibit%2520heter {"title": "Let Your Image Move with Your Motion! -- Implicit Multi-Object Multi-Motion Transfer", "author": "Yuze Li and Dong Gong and Xiao Cao and Junchao Yuan and Dongsheng Li and Lei Zhou and Yun Sing Koh and Cheng Yan and Xinyu Zhang", "abstract": "Motion transfer has emerged as a promising direction for controllable video generation, yet existing methods largely focus on single-object scenarios and struggle when multiple objects require distinct motion patterns. In this work, we present FlexiMMT, the first implicit image-to-video (I2V) motion transfer framework that explicitly enables multi-object, multi-motion transfer. Given a static multi-object image and multiple reference videos, FlexiMMT independently extracts motion representations and accurately assigns them to different objects, supporting flexible recombination and arbitrary motion-to-object mappings. To address the core challenge of cross-object motion entanglement, we introduce a Motion Decoupled Mask Attention Mechanism that uses object-specific masks to constrain attention, ensuring that motion and text tokens only influence their designated regions. We further propose a Differentiated Mask Propagation Mechanism that derives object-specific masks directly from diffusion attention and progressively propagates them across frames efficiently. Extensive experiments demonstrate that FlexiMMT achieves precise, compositional, and state-of-the-art performance in I2V-based multi-object multi-motion transfer. Our project page is: https://ethan-li123.github.io/FlexiMMT_page/", "link": "http://arxiv.org/abs/2603.01000v2", "date": "2026-03-13", "relevancy": 2.5008, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6389}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6305}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6094}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Let%20Your%20Image%20Move%20with%20Your%20Motion%21%20--%20Implicit%20Multi-Object%20Multi-Motion%20Transfer&body=Title%3A%20Let%20Your%20Image%20Move%20with%20Your%20Motion%21%20--%20Implicit%20Multi-Object%20Multi-Motion%20Transfer%0AAuthor%3A%20Yuze%20Li%20and%20Dong%20Gong%20and%20Xiao%20Cao%20and%20Junchao%20Yuan%20and%20Dongsheng%20Li%20and%20Lei%20Zhou%20and%20Yun%20Sing%20Koh%20and%20Cheng%20Yan%20and%20Xinyu%20Zhang%0AAbstract%3A%20Motion%20transfer%20has%20emerged%20as%20a%20promising%20direction%20for%20controllable%20video%20generation%2C%20yet%20existing%20methods%20largely%20focus%20on%20single-object%20scenarios%20and%20struggle%20when%20multiple%20objects%20require%20distinct%20motion%20patterns.%20In%20this%20work%2C%20we%20present%20FlexiMMT%2C%20the%20first%20implicit%20image-to-video%20%28I2V%29%20motion%20transfer%20framework%20that%20explicitly%20enables%20multi-object%2C%20multi-motion%20transfer.%20Given%20a%20static%20multi-object%20image%20and%20multiple%20reference%20videos%2C%20FlexiMMT%20independently%20extracts%20motion%20representations%20and%20accurately%20assigns%20them%20to%20different%20objects%2C%20supporting%20flexible%20recombination%20and%20arbitrary%20motion-to-object%20mappings.%20To%20address%20the%20core%20challenge%20of%20cross-object%20motion%20entanglement%2C%20we%20introduce%20a%20Motion%20Decoupled%20Mask%20Attention%20Mechanism%20that%20uses%20object-specific%20masks%20to%20constrain%20attention%2C%20ensuring%20that%20motion%20and%20text%20tokens%20only%20influence%20their%20designated%20regions.%20We%20further%20propose%20a%20Differentiated%20Mask%20Propagation%20Mechanism%20that%20derives%20object-specific%20masks%20directly%20from%20diffusion%20attention%20and%20progressively%20propagates%20them%20across%20frames%20efficiently.%20Extensive%20experiments%20demonstrate%20that%20FlexiMMT%20achieves%20precise%2C%20compositional%2C%20and%20state-of-the-art%20performance%20in%20I2V-based%20multi-object%20multi-motion%20transfer.%20Our%20project%20page%20is%3A%20https%3A//ethan-li123.github.io/FlexiMMT_page/%0ALink%3A%20http%3A//arxiv.org/abs/2603.01000v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLet%2520Your%2520Image%2520Move%2520with%2520Your%2520Motion%2521%2520--%2520Implicit%2520Multi-Object%2520Multi-Motion%2520Transfer%26entry.906535625%3DYuze%2520Li%2520and%2520Dong%2520Gong%2520and%2520Xiao%2520Cao%2520and%2520Junchao%2520Yuan%2520and%2520Dongsheng%2520Li%2520and%2520Lei%2520Zhou%2520and%2520Yun%2520Sing%2520Koh%2520and%2520Cheng%2520Yan%2520and%2520Xinyu%2520Zhang%26entry.1292438233%3DMotion%2520transfer%2520has%2520emerged%2520as%2520a%2520promising%2520direction%2520for%2520controllable%2520video%2520generation%252C%2520yet%2520existing%2520methods%2520largely%2520focus%2520on%2520single-object%2520scenarios%2520and%2520struggle%2520when%2520multiple%2520objects%2520require%2520distinct%2520motion%2520patterns.%2520In%2520this%2520work%252C%2520we%2520present%2520FlexiMMT%252C%2520the%2520first%2520implicit%2520image-to-video%2520%2528I2V%2529%2520motion%2520transfer%2520framework%2520that%2520explicitly%2520enables%2520multi-object%252C%2520multi-motion%2520transfer.%2520Given%2520a%2520static%2520multi-object%2520image%2520and%2520multiple%2520reference%2520videos%252C%2520FlexiMMT%2520independently%2520extracts%2520motion%2520representations%2520and%2520accurately%2520assigns%2520them%2520to%2520different%2520objects%252C%2520supporting%2520flexible%2520recombination%2520and%2520arbitrary%2520motion-to-object%2520mappings.%2520To%2520address%2520the%2520core%2520challenge%2520of%2520cross-object%2520motion%2520entanglement%252C%2520we%2520introduce%2520a%2520Motion%2520Decoupled%2520Mask%2520Attention%2520Mechanism%2520that% {"title": "Learning from Child-Directed Speech in Two-Language Scenarios: A French-English Case Study", "author": "Liel Binyamin and Elior Sulem", "abstract": "Research on developmentally plausible language models has largely focused on English, leaving open questions about multilingual settings. We present a systematic study of compact language models by extending BabyBERTa to English-French scenarios under strictly size-matched data conditions, covering monolingual, bilingual, and cross-lingual settings. Our design contrasts two types of training corpora: (i) child-directed speech (about 2.5M tokens), following BabyBERTa and related work, and (ii) multi-domain corpora (about 10M tokens), extending the BabyLM framework to French. To enable fair evaluation, we also introduce new resources, including French versions of QAMR and QASRL, as well as English and French multi-domain corpora.\n  We evaluate the models on both syntactic and semantic tasks and compare them with models trained on Wikipedia-only data. The results reveal context-dependent effects: training on Wikipedia consistently benefits semantic tasks, whereas child-directed speech improves grammatical judgments in monolingual settings. Bilingual pretraining yields notable gains for textual entailment, with particularly strong improvements for French. Importantly, similar patterns emerge across BabyBERTa, RoBERTa, and LTG-BERT, suggesting consistent trends across architectures.", "link": "http://arxiv.org/abs/2603.12906v1", "date": "2026-03-13", "relevancy": 2.4936, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.516}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.516}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20from%20Child-Directed%20Speech%20in%20Two-Language%20Scenarios%3A%20A%20French-English%20Case%20Study&body=Title%3A%20Learning%20from%20Child-Directed%20Speech%20in%20Two-Language%20Scenarios%3A%20A%20French-English%20Case%20Study%0AAuthor%3A%20Liel%20Binyamin%20and%20Elior%20Sulem%0AAbstract%3A%20Research%20on%20developmentally%20plausible%20language%20models%20has%20largely%20focused%20on%20English%2C%20leaving%20open%20questions%20about%20multilingual%20settings.%20We%20present%20a%20systematic%20study%20of%20compact%20language%20models%20by%20extending%20BabyBERTa%20to%20English-French%20scenarios%20under%20strictly%20size-matched%20data%20conditions%2C%20covering%20monolingual%2C%20bilingual%2C%20and%20cross-lingual%20settings.%20Our%20design%20contrasts%20two%20types%20of%20training%20corpora%3A%20%28i%29%20child-directed%20speech%20%28about%202.5M%20tokens%29%2C%20following%20BabyBERTa%20and%20related%20work%2C%20and%20%28ii%29%20multi-domain%20corpora%20%28about%2010M%20tokens%29%2C%20extending%20the%20BabyLM%20framework%20to%20French.%20To%20enable%20fair%20evaluation%2C%20we%20also%20introduce%20new%20resources%2C%20including%20French%20versions%20of%20QAMR%20and%20QASRL%2C%20as%20well%20as%20English%20and%20French%20multi-domain%20corpora.%0A%20%20We%20evaluate%20the%20models%20on%20both%20syntactic%20and%20semantic%20tasks%20and%20compare%20them%20with%20models%20trained%20on%20Wikipedia-only%20data.%20The%20results%20reveal%20context-dependent%20effects%3A%20training%20on%20Wikipedia%20consistently%20benefits%20semantic%20tasks%2C%20whereas%20child-directed%20speech%20improves%20grammatical%20judgments%20in%20monolingual%20settings.%20Bilingual%20pretraining%20yields%20notable%20gains%20for%20textual%20entailment%2C%20with%20particularly%20strong%20improvements%20for%20French.%20Importantly%2C%20similar%20patterns%20emerge%20across%20BabyBERTa%2C%20RoBERTa%2C%20and%20LTG-BERT%2C%20suggesting%20consistent%20trends%20across%20architectures.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12906v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520from%2520Child-Directed%2520Speech%2520in%2520Two-Language%2520Scenarios%253A%2520A%2520French-English%2520Case%2520Study%26entry.906535625%3DLiel%2520Binyamin%2520and%2520Elior%2520Sulem%26entry.1292438233%3DResearch%2520on%2520developmentally%2520plausible%2520language%2520models%2520has%2520largely%2520focused%2520on%2520English%252C%2520leaving%2520open%2520questions%2520about%2520multilingual%2520settings.%2520We%2520present%2520a%2520systematic%2520study%2520of%2520compact%2520language%2520models%2520by%2520extending%2520BabyBERTa%2520to%2520English-French%2520scenarios%2520under%2520strictly%2520size-matched%2520data%2520conditions%252C%2520covering%2520monolingual%252C%2520bilingual%252C%2520and%2520cross-lingual%2520settings.%2520Our%2520design%2520contrasts%2520two%2520types%2520of%2520training%2520corpora%253A%2520%2528i%2529%2520child-directed%2520speech%2520%2528about%25202.5M%2520tokens%2529%252C%2520following%2520BabyBERTa%2520and%2520related%2520work%252C%2520and%2520%2528ii%2529%2520multi-domain%2520corpora%2520%2528about%252010M%2520tokens%2529%252C%2520extending%2520the%2520BabyLM%2520framework%2520to%2520French.%2520To%2520enable%2520fair%2520evaluation%252C%2520we%2520also%2520introduce%2520new%2520resources%252C%2520including%2520French%2520versions%2520of%2520QAMR%2520and%2520QASRL%252C%2520as%2520well%2520as%2520English%2520and%2520French%2520multi-domain%2520corpora.%250A%2520%2520We%2520evaluate%2520the%2520models%2520on%2520both%2520syntactic%2520and%2520semantic%2520tasks%2520and%2520compare%2520them%2520with%2520models%2520trained%2520on%2520Wikipedia-only%2520data.%2520The%2520results%2520reveal%2520context-dependent%2520effects%253A%2520training%2520 {"title": "Training-free Uncertainty Guidance for Complex Visual Tasks with MLLMs", "author": "Sanghwan Kim and Rui Xiao and Stephan Alaniz and Yongqin Xian and Zeynep Akata", "abstract": "Multimodal Large Language Models (MLLMs) often struggle with fine-grained perception, such as identifying small objects in high-resolution images or detecting key moments in long videos. Existing methods typically rely on complex, task-specific fine-tuning, which reduces generalizability and increases system complexity. In this work, we propose an effective, training-free framework that uses an MLLM's intrinsic uncertainty as proactive guidance. Our core insight is that a model's uncertainty decreases when provided with relevant visual information. We introduce a unified mechanism that scores candidate visual inputs by response uncertainty, enabling the model to autonomously focus on the most informative data. We apply this simple principle to three challenging visual tasks: Visual Search, Long Video Understanding, and Temporal Grounding, allowing off-the-shelf MLLMs to achieve performance competitive with specialized, fine-tuned systems. Our results demonstrate that leveraging intrinsic uncertainty is a powerful strategy for improving fine-grained multimodal performance.", "link": "http://arxiv.org/abs/2510.00705v2", "date": "2026-03-13", "relevancy": 2.4832, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6483}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.6273}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6033}], "mailto {"title": "A Decision-Theoretic Formalisation of Steganography With Applications to LLM Monitoring", "author": "Usman Anwar and Julianna Piskorz and David D. Baek and David Africa and Jim Weatherall and Max Tegmark and Christian Schroeder de Witt and Mihaela van der Schaar and David Krueger", "abstract": "Large language models are beginning to show steganographic capabilities. Such capabilities could allow misaligned models to evade oversight mechanisms. Yet principled methods to detect and quantify such behaviours are lacking. Classical definitions of steganography, and detection methods based on them, require a known reference distribution of non-steganographic signals. For the case of steganographic reasoning in LLMs, knowing such a reference distribution is not feasible; this renders these approaches inapplicable. We propose an alternative, \\textbf{decision-theoretic view of steganography}. Our central insight is that steganography creates an asymmetry in usable information between agents who can and cannot decode the hidden content (present within a steganographic signal), and this otherwise latent asymmetry can be inferred from the agents' observable actions. To formalise this perspective, we introduce generalised $\\mathcal{V}$-information: a utilitarian framework for measuring the amount of usable information within some input. We use this to define the \\textbf{steganographic gap} -- a measure that quantifies steganography by comparing the downstream utility of the steganographic signal to agents that can and cannot decode the hidden content. We empirically validate our formalism, and show that it can be used to detect, quantify, and mitigate steganographic reasoning in LLMs.", "link": "http://arxiv.org/abs/2602.23163v2", "date": "2026-03-13", "relevancy": 2.46, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4981}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4889}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4889}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Decision-Theoretic%20Formalisation%20of%20Steganography%20With%20Applications%20to%20LLM%20Monitoring&body=Title%3A%20A%20Decision-Theoretic%20Formalisation%20of%20Steganography%20With%20Applications%20to%20LLM%20Monitoring%0AAuthor%3A%20Usman%20Anwar%20and%20Julianna%20Piskorz%20and%20David%20D.%20Baek%20and%20David%20Africa%20and%20Jim%20Weatherall%20and%20Max%20Tegmark%20and%20Christian%20Schroeder%20de%20Witt%20and%20Mihaela%20van%20der%20Schaar%20and%20David%20Krueger%0AAbstract%3A%20Large%20language%20models%20are%20beginning%20to%20show%20steganographic%20capabilities.%20Such%20capabilities%20could%20allow%20misaligned%20models%20to%20evade%20oversight%20mechanisms.%20Yet%20principled%20methods%20to%20detect%20and%20quantify%20such%20behaviours%20are%20lacking.%20Classical%20definitions%20of%20steganography%2C%20and%20detection%20methods%20based%20on%20them%2C%20require%20a%20known%20reference%20distribution%20of%20non-steganographic%20signals.%20For%20the%20case%20of%20steganographic%20reasoning%20in%20LLMs%2C%20knowing%20such%20a%20reference%20distribution%20is%20not%20feasible%3B%20this%20renders%20these%20approaches%20inapplicable.%20We%20propose%20an%20alternative%2C%20%5Ctextbf%7Bdecision-theoretic%20view%20of%20steganography%7D.%20Our%20central%20insight%20is%20that%20steganography%20creates%20an%20asymmetry%20in%20usable%20information%20between%20agents%20who%20can%20and%20cannot%20decode%20the%20hidden%20content%20%28present%20within%20a%20steganographic%20signal%29%2C%20and%20this%20otherwise%20latent%20asymmetry%20can%20be%20inferred%20from%20the%20agents%27%20observable%20actions.%20To%20formalise%20this%20perspective%2C%20we%20introduce%20generalised%20%24%5Cmathcal%7BV%7D%24-information%3A%20a%20utilitarian%20framework%20for%20measuring%20the%20amount%20of%20usable%20information%20within%20some%20input.%20We%20use%20this%20to%20define%20the%20%5Ctextbf%7Bsteganographic%20gap%7D%20--%20a%20measure%20that%20quantifies%20steganography%20by%20comparing%20the%20downstream%20utility%20of%20the%20steganographic%20signal%20to%20agents%20that%20can%20and%20cannot%20decode%20the%20hidden%20content.%20We%20empirically%20validate%20our%20formalism%2C%20and%20show%20that%20it%20can%20be%20used%20to%20detect%2C%20quantify%2C%20and%20mitigate%20steganographic%20reasoning%20in%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23163v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Decision-Theoretic%2520Formalisation%2520of%2520Steganography%2520With%2520Applications%2520to%2520LLM%2520Monitoring%26entry.906535625%3DUsman%2520Anwar%2520and%2520Julianna%2520Piskorz%2520and%2520David%2520D.%2520Baek%2520and%2520David%2520Africa%2520and%2520Jim%2520Weatherall%2520and%2520Max%2520Tegmark%2520and%2520Christian%2520Schroeder%2520de%2520Witt%2520and%2520Mihaela%2520van%2520der%2520Schaar%2520and%2520David%2520Krueger%26entry.1292438233%3DLarge%2520language%2520models%2520are%2520beginning%2520to%2520show%2520steganographic%2520capabilities.%2520Such%2520capabilities%2520could%2520allow%2520misaligned%2520models%2520to%2520evade%2520oversight%2520mechanisms.%2520Yet%2520principled%2520methods%2520to%2520detect%2520and%2520quantify%2520such%2520behaviours%2520are%2520lacking.%2520Classical%2520definitions%2520of%2520steganography%252C%2520and%2520detection%2520methods%2520based%2520on%2520them%252C%2520require%2520a%2520known%2520reference%2520distribution%2520 {"title": "Large language models show fragile cognitive reasoning about human emotions", "author": "Sree Bhattacharyya and Evgenii Kuriabov and Lucas Craig and Tharun Dilliraj and Reginald B. Adams, and Jia Li and James Z. Wang", "abstract": "Affective computing seeks to support the holistic development of artificial intelligence by enabling machines to engage with human emotion. Recent foundation models, particularly large language models (LLMs), have been trained and evaluated on emotion-related tasks, typically using supervised learning with discrete emotion labels. Such evaluations largely focus on surface phenomena, such as recognizing expressed or evoked emotions, leaving open whether these systems reason about emotion in cognitively meaningful ways. Here we ask whether LLMs can reason about emotions through underlying cognitive dimensions rather than labels alone. Drawing on cognitive appraisal theory, we introduce CoRE, a large-scale benchmark designed to probe the implicit cognitive structures LLMs use when interpreting emotionally charged situations. We assess alignment with human appraisal patterns, internal consistency, cross-model generalization, and robustness to contextual variation. We find that LLMs capture systematic relations between cognitive appraisals and emotions but show misalignment with human judgments and instability across contexts.", "link": "http://arxiv.org/abs/2508.05880v2", "date": "2026-03-13", "relevancy": 2.4576, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.504}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.504}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidenti {"title": "BitDance: Scaling Autoregressive Generative Models with Binary Tokens", "author": "Yuang Ai and Jiaming Han and Shaobin Zhuang and Weijia Mao and Xuefeng Hu and Ziyan Yang and Zhenheng Yang and Yali Wang and Huaibo Huang and Xiangyu Yue and Hao Chen", "abstract": "We present BitDance, a scalable autoregressive (AR) image generator that predicts binary visual tokens instead of codebook indices. With high-entropy binary latents, BitDance lets each token represent up to $2^{256}$ states, yielding a compact yet highly expressive discrete representation. Sampling from such a huge token space is difficult with standard classification. To resolve this, BitDance uses a binary diffusion head: instead of predicting an index with softmax, it employs continuous-space diffusion to generate the binary tokens. Furthermore, we propose next-patch diffusion, a new decoding method that predicts multiple tokens in parallel with high accuracy, greatly speeding up inference. On ImageNet 256x256, BitDance achieves an FID of 1.24, the best among AR models. With next-patch diffusion, BitDance beats state-of-the-art parallel AR models that use 1.4B parameters, while using 5.4x fewer parameters (260M) and achieving 8.7x speedup. For text-to-image generation, BitDance trains on large-scale multimodal tokens and generates high-resolution, photorealistic images efficiently, showing strong performance and favorable scaling. When generating 1024x1024 images, BitDance achieves a speedup of over 30x compared to prior AR models. We release code and models to facilitate further research on AR foundation models. Code and models are available at: https://github.com/shallowdream204/BitDance.", "link": "http://arxiv.org/abs/2602.14041v2", "date": "2026-03-13", "relevancy": 2.4479, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6216}, {"title": "SDXS: Real-Time One-Step Latent Diffu eving%208.7x%20speedup.%20For%20text-to-image%20generation%2C%20BitDance%20trains%20on%20large-scale%20multimodal%20tokens%20and%20generates%20high-resolution%2C%20photorealistic%20images%20efficiently%2C%20showing%20strong%20performance%20and%20favorable%20scaling.%20When%20generating%201024x1024%20images%2C%20BitDance%20achieves%20a%20speedup%20of%20over%2030x%20compared%20to%20prior%20AR%20models.%20We%20release%20code%20and%20models%20to%20facilitate%20further%20research%20on%20AR%20foundation%20models.%20Code%20and%20models%20are%20available%20at%3A%20https%3A//github.com/shallowdream204/BitDance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.14041v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBitDance%253A%2520Scaling%2520Autoregressive%2520Generative%2520Models%2520with%2520Binary%2520Tokens%26entry.906535625%3DYuang%2520Ai%2520and%2520Jiaming%2520Han%2520and%2520Shaobin%2520Zhuang%2520and%2520Weijia%2520Mao%2520and%2520Xuefeng%2520Hu%2520and%2520Ziyan%2520Yang%2520and%2520Zhenheng%2520Yang%2520and%2520Yali%2520Wang%2520and%2520Huaibo%2520Huang%2520and%2520Xiangyu%2520Yue%2520and%2520Hao%2520Chen%26entry.1292438233%3DWe%2520present%2520BitDance%252C%2520a%2520scalable%2520autoregressive%2520%2528AR%2529%2520image%2520generator%2520that%2520predicts%2520binary%2520visual%2520tokens%2520instead%2520of%2520codebook%2520indices.%2520With%2520high-entropy%2520binary%2520latents%252C%2520BitDance%2520lets%2520each%2520token%2520represent%2520up%2520to%2520%25242%255E%257B256%257D%2524%2520states%252C%2520yielding%2520a%2520compact%2520yet%2520highly%2520expressive%2520discrete%2520representation.%2520Sampling%2520from%2520such%2520a%2520huge%2520token%2520space%2520is%2520difficult%2520with%2520standard%2520classification.%2520To%2520resolve%2520this%252C%2520BitDance%2520uses%2520a%2520binary%2520diffusion%2520head%253A%2520instead%2520of%2520predicting%2520an%2520index%2520with%2 {"title": "DirPA: Addressing Prior Shift in Imbalanced Few-shot Crop-type Classification", "author": "Joana Reuss and Ekaterina Gikalo and Marco K\u00f6rner", "abstract": "Real-world agricultural monitoring is often hampered by severe class imbalance and high label acquisition costs, resulting in significant data scarcity. In few-shot learning (FSL) -- a framework specifically designed for data-scarce settings -- , training sets are often artificially balanced. However, this creates a disconnect from the long-tailed distributions observed in nature, leading to a distribution shift that undermines the model's ability to generalize to real-world agricultural tasks. We previously introduced Dirichlet Prior Augmentation (DirPA; Reuss et al., 2026a) to proactively mitigate the effects of such label distribution skews during model training. In this work, we extend the original study's geographical scope. Specifically, we evaluate this extended approach across multiple countries in the European Union (EU), moving beyond localized experiments to test the method's resilience across diverse agricultural environments. Our results demonstrate the effectiveness of DirPA across different geographical regions. We show that DirPA not only improves system robustness and stabilizes training under extreme long-tailed distributions, regardless of the target region, but also substantially improves individual class-specific performance by proactively simulating priors.", "link": "http://arxiv.org/abs/2603.12905v1", "date": "2026-03-13", "relevancy": 2.4444, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5141}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4775}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.475}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DirPA%3A%20Addressing%20Prior%20Shift%20in%20Imbalanced%20Few-shot%20Crop-type%20Classification&body=Title%3A%20DirPA%3A%20Addressing%20Prior%20Shift%20in%20Imbalanced%20Few-shot%20Crop-type%20Classification%0AAuthor%3A%20Joana%20Reuss%20and%20Ekaterina%20Gikalo%20and%20Marco%20K%C3%B6rner%0AAbstract%3A%20Real-world%20agricultural%20monitoring%20is%20often%20hampered%20by%20severe%20class%20imbalance%20and%20high%20label%20acquisition%20costs%2C%20resulting%20in%20significant%20data%20scarcity.%20In%20few-shot%20learning%20%28FSL%29%20--%20a%20framework%20specifically%20designed%20for%20data-scarce%20settings%20--%20%2C%20training%20sets%20are%20often%20artificially%20balanced.%20However%2C%20this%20creates%20a%20disconnect%20from%20the%20long-tailed%20distributions%20observed%20in%20nature%2C%20leading%20to%20a%20distribution%20shift%20that%20undermines%20the%20model%27s%20ability%20to%20generalize%20to%20real-world%20agricultural%20tasks.%20We%20previously%20introduced%20Dirichlet%20Prior%20Augmentation%20%28DirPA%3B%20Reuss%20et%20al.%2C%202026a%29%20to%20proactively%20mitigate%20the%20effects%20of%20such%20label%20distribution%20skews%20during%20model%20training.%20In%20this%20work%2C%20we%20extend%20the%20original%20study%27s%20geographical%20scope.%20Specifically%2C%20we%20evaluate%20this%20extended%20approach%20across%20multiple%20countries%20in%20the%20European%20Union%20%28EU%29%2C%20moving%20beyond%20localized%20experiments%20to%20test%20the%20method%27s%20resilience%20across%20diverse%20agricultural%20environments.%20Our%20results%20demonstrate%20the%20effectiveness%20of%20DirPA%20across%20different%20geographical%20regions.%20We%20show%20that%20DirPA%20not%20only%20improves%20system%20robustness%20and%20stabilizes%20training%20under%20extreme%20long-tailed%20distributions%2C%20regardless%20of%20the%20target%20region%2C%20but%20also%20substantially%20improves%20individual%20class-specific%20performance%20by%20proactively%20simulating%20priors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12905v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDirPA%253A%2520Addressing%2520Prior%2520Shift%2520in%2520Imbalanced%2520Few-shot%2520Crop-type%2520Classification%26entry.906535625%3DJoana%2520Reuss%2520and%2520Ekaterina%2520Gikalo%2520and%2520Marco%2520K%25C3%25B6rner%26entry.1292438233%3DReal-world%2520agricultural%2520monitoring%2520is%2520often%2520hampered%2520by%2520severe%2520class%2520imbalance%2520and%2520high%2520label%2520acquisition%2520costs%252C%2520resulting%2520in%2520significant%2520data%2520scarcity.%2520In%2520few-shot%2520learning%2520%2528FSL%2529%2520--%2520a%2520framework%2520specifically%2520designed%2520for%2520data-scarce%2520settings%2520--%2520%252C%2520training%2520sets%2520are%2520often%2520artificially%2520balanced.%2520However%252C%2520this%2520creates%2520a%2520disconnect%2520from%2520the%2520long-tailed%2520distributions%2520observed%2520in%2520nature%252C%2520leading%2520to%2520a%2520distribution%2520shift%2520that%2520undermines%2520the%2520model%2527s%2520ability%2520to%2520generalize%2520to%2520real-world%2520agricultural%2520tasks.%2520We%2520previously%2520introduced%2520Dirichlet%2520Prior%2520Augmentation%2520%2528DirPA%253B%2520Reuss%2520et%2520al.%252C%25202026a%2529%2520to%2520proactively%2520mitigate%2520the%2520effects%2520of%2520such%2520label%2520distribution%2520skews%2520during%2520model%2520training.%2520In%2520this%2520work%252C%2520we%2520extend%2520the%2520original%2520study%2527s%2520geographical%2520scope.%2520Specifically%252C%2520we%2520evaluate%2520this%2520extended%2520approach%2520across%2520multiple%2520countries%2520in%2520the%2520European%2520Union%2520%2528EU%2529%252C%2520moving%2520beyond%2520localized%2520experiments%2520to%2520test%2520the%2520method%2527s%2520resilience%2520across%2520diverse%2520agricultural%2520environments.%2520Our%2520results%2520demonstrate%2520the%2520effectiveness%2520of%2520DirPA%2520across%2520different%2520geographical%2520regions.%2520We%2520show%2520that%2520DirPA%2520not%2520only%2520improves%2520system%2520robustness%2520and%2520stabilizes%2520training%2520under%2520extreme%2520long-tailed%2520distributions%252C%2520regardless%2520of%2520the%2520target%2520region%252C%2520but%2520also%2520substantially%2520improves%2520individual%2520class-specific%2520performance%2520by%2520proactively%2520simulating%2520priors.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12905v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DirPA%3A%20Addressing%20Prior%20Shift%20in%20Imbalanced%20Few-shot%20Crop-type%20Classification&entry.906535625=Joana%20Reuss%20and%20Ekaterina%20Gikalo%20and%20Marco%20K%C3%B6rner&entry.1292438233=Real-world%20agricultural%20monitoring%20is%20often%20hampered%20by%20severe%20class%20imbalance%20and%20high%20label%20acquisition%20costs%2C%20resulting%20in%20significant%20data%20scarcity.%20In%20few-shot%20learning%20%28FSL%29%20--%20a%20framework%20specifically%20designed%20for%20data-scarce%20settings%20--%20%2C%20training%20sets%20are%20often%20artificially%20balanced.%20However%2C%20this%20creates%20a%20disconnect%20from%20the%20long-tailed%20distributions%20observed%20in%20nature%2C%20leading%20to%20a%20distribution%20shift%20that%20undermines%20the%20model%27s%20ability%20to%20generalize%20to%20real-world%20agricultural%20tasks.%20We%20previously%20introduced%20Dirichlet%20Prior%20Augmentation%20%28DirPA%3B%20Reuss%20et%20al.%2C%202026a%29%20to%20proactively%20mitigate%20the%20effects%20of%20such%20label%20distribution%20skews%20during%20model%20training.%20In%20this%20work%2C%20we%20extend%20the%20original%20study%27s%20geographical%20scope.%20Sp {"title": "MMGT: Motion Mask Guided Two-Stage Network for Co-Speech Gesture Video Generation", "author": "Siyuan Wang and Jiawei Liu and Wei Wang and Yeying Jin and Jinsong Du and Zhi Han", "abstract": "Co-Speech Gesture Video Generation aims to generate vivid speech videos from audio-driven still images, which is challenging due to the diversity of body parts in terms of motion amplitude, audio relevance, and detailed features. Relying solely on audio as the control signal often fails to capture large gesture movements in videos, resulting in more noticeable artifacts and distortions. Existing approaches typically address this issue by adding extra prior inputs, but this can limit the practical application of the task. Specifically, we propose a Motion Mask-Guided Two-Stage Network (MMGT) that uses audio, along with motion masks and pose videos generated from the audio signal, to jointly generate synchronized speech gesture videos. In the first stage, the Spatial Mask-Guided Audio2Pose Generation (SMGA) Network generates high-quality pose videos and motion masks from audio, effectively capturing large movements in key regions such as the face and gestures. In the second stage, we integrate Motion Masked Hierarchical Audio Attention (MM-HAA) into the Stabilized Diffusion Video Generation model, addressing limitations in fine-grained motion generation and region-specific detail control found in traditional methods. This ensures high-quality, detailed upper-body videos with accurate textures and motion. Evaluations demonstrate improvements in video quality, lip-sync, and hand gestures. The model and code are available at https://github.com/SIA-IDE/MMGT.", "link": "http://arxiv.org/abs/2505.23120v2", "date": "2026-03-13", "relevancy": 2.4255, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6168}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6046}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5967}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MMGT%3A%20Motion%20Mask%20Guided%20Two-Stage%20Network%20for%20Co-Speech%20Gesture%20Video%20Generation&body=Title%3A%20MMGT%3A%20Motion%20Mask%20Guided%20Two-Stage%20Network%20for%20Co-Speech%20Gesture%20Video%20Generation%0AAuthor%3A%20Siyuan%20Wang%20and%20Jiawei%20Liu%20and%20Wei%20Wang%20and%20Yeying%20Jin%20and%20Jinsong%20Du%20and%20Zhi%20Han%0AAbstract%3A%20Co-Speech%20Gesture%20Video%20Generation%20aims%20to%20generate%20vivid%20speech%20videos%20from%20audio-driven%20still%20images%2C%20which%20is%20challenging%20due%20to%20the%20diversity%20of%20body%20parts%20in%20terms%20of%20motion%20amplitude%2C%20audio%20relevance%2C%20and%20detailed%20features.%20Relying%20solely%20on%20audio%20as%20the%20control%20signal%20often%20fails%20to%20capture%20large%20gesture%20movements%20in%20videos%2C%20resulting%20in%20more%20noticeable%20artifacts%20and%20distortions.%20Existing%20approaches%20typically%20address%20this%20issue%20by%20adding%20extra%20prior%20inputs%2C%20but%20this%20can%20limit%20the%20practical%20application%20of%20the%20task.%20Specifically%2C%20we%20propose%20a%20Motion%20Mask-Guided%20Two-Stage%20Network%20%28MMGT%29%20that%20uses%20audio%2C%20along%20with%20motion%20masks%20and%20pose%20videos%20generated%20from%20the%20audio%20signal%2C%20to%20jointly%20generate%20synchronized%20speech%20gesture%20videos.%20In%20the%20first%20stage%2C%20the%20Spatial%20Mask-Guided%20Audio2Pose%20Generation%20%28SMGA%29%20Network%20generates%20high-quality%20pose%20videos%20and%20motion%20masks%20from%20audio%2C%20effectively%20capturing%20large%20movements%20in%20key%20regions%20such%20as%20the%20face%20and%20gestures.%20In%20the%20second%20stage%2C%20we%20integrate%20Motion%20Masked%20Hierarchical%20Audio%20Attention%20%28MM-HAA%29%20into%20the%20Stabilized%20Diffusion%20Video%20Generation%20model%2C%20addressing%20limitations%20in%20fine-grained%20motion%20generation%20and%20region-specific%20detail%20control%20found%20in%20traditional%20methods.%20This%20ensures%20high-quality%2C%20detailed%20upper-body%20videos%20with%20accurate%20textures%20and%20motion.%20Evaluations%20demonstrate%20improvements%20in%20video%20quality%2C%20lip-sync%2C%20and%20hand%20gestures.%20The%20model%20and%20code%20are%20available%20at%20https%3A//github.com/SIA-IDE/MMGT.%0ALink%3A%20http%3A//arxiv.org/abs/2505.23120v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMMGT%253A%2520Motion%2520Mask%2520Guided%2520Two-Stage%2520Network%2520for%2520Co-Speech%2520Gesture%2520Video%2520Generation%26entry.906535625%3DSiyuan%2520Wang%2520and%2520Jiawei%2520Liu%2520and%2520Wei%2520Wang%2520and%2520Yeying%2520Jin%2520and%2520Jinsong%2520Du%2520and%2520Zhi%2520Han%26entry.1292438233%3DCo-Speech%2520Gesture%2520Video%2520Generation%2520aims%2520to%2520generate%2520vivid%2520speech%2520videos%2520from%2520audio-driven%2520still%2520images%252C%2520which%2520is%2520challenging%2520due%2520to%2520the%2520diversity%2520of%2520body%2520parts%2520in%2520terms%2520of%2520motion%2520amplitude%252C%2520audio%2520relevance%252C%2520and%2520detailed%2520features.%2520Relying%2520solely%2520on%2520audio%2520as%2520the%2520control%2520signal%2520often%2520fails%2520to%2520capture%2520large%2520gesture%2520movements%2520in%2520videos%252C%2520resulting%2520in%2520more%2520noticeable%2520artifacts%2520and%2520distortions.%2520Existing%2520approaches%2520typically%2520address%2520this%2520issue%2520by%2520adding%2520extra%2520prior%2520inputs%252C%2520but%2520this%2520can%2520limit%2520the%2520practical%2520application%2520of%2520the%2520task.%2520Specifically%252C%2520we%2520propose%2520a%2520Motion%2520Mask-Guided%2520Two-Stage%2520Network%2520%2528MMGT%2529%2520that%2520uses%2520audio%252C%2520along%2520with%2520motion%2520masks%2520and%2520pose%2520videos%2520generated%2520from%2520the%2520audio%2520signal%252C%2520to%2520jointly%2520generate%2520synchronized%2520speech%2520gesture%2520videos.%2520In%2520the%2520first%2520stage%252C%2520the%2520Spatial%2520Mask-Guided%2520Audio2Pose%2520Generation%2520%2528SMGA%2529%2520Network%2520generates%2520high-quality%2520pose%2520videos%2520and%2520motion%2520masks%2520from%2520audio%252C%2520effectively%2520capturing%2520large%2520movements%2520in%2520key%2520regions%2520such%2520as%2520the%2520face%2520and%2520gestures.%2520In%2520the%2520second%2520stage%252C%2520we%2520integrate%2520Motion%2520Masked%2520Hierarchical%2520Audio%2520Attention%2520%2528MM-HAA%2529%2520into%2520the%2520Stabilized%2520Diffusion%2520Video%2520Generation%2520model%252C%2520addressing%2520limitations%2520in%2520fine-grained%2520motion%2520generation%2520and%2520region-specific%2520detail%2520control%2520found%2520in%2520traditional%2520methods.%2520This%2520ensures%2520high-quality%252C%2520detailed%2520upper-body%2520videos%2520with%2520accurate%2520textures%2520and%2520motion.%2520Evaluations%2520demonstrate%2520improvements%2520in%2520video%2520quality%252C%2520lip-sync%252C%2520and%2520hand%2520gestures.%2520The%2520model%2520and%2520code%2520are%2520available%2520at%2520https%253A//github.com/SIA-IDE/MMGT.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.23120v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MMGT%3A%20Motion%20Mask%20Guided%20Two-Stage%20Network%20for%20Co-Speech%20Gesture%20Video%20Generation&entry.906535625=Siyuan%20Wang%20and%20Jiawei%20Liu%20and%20Wei%20Wang%20and%20Yeying%20Jin%20and%20Jinsong%20Du%20and%20Zhi%20Han&entry.1292438233=Co-Speech%20Gesture%20Video%20Generation%20aims%20to%20generate%20vivid%20speech%20videos%20from%20audio-driven%20still%20images%2C%20which%20is%20challenging%20due%20to%20the%20diversity%20of%20body%20parts%20in%20terms%20of%20motion%20amplitude%2C%20audio%20relevance%2C%20and%20detailed%20features.%20Relying%20solely%20on%20audio%20as%20the%20control%20signal%20often%20fails%20to%20capture%20large%20gesture%20movements%20in%20videos%2C%20resulting%20in%20more%20noticeable%20artifacts%20and%20distortions.%20Existing%20approaches%20typically%20address%20this%20issue%20by%20adding%20extra%20prior%20inputs%2C%20but%20this%20can%20limit%20the%20practical%20application%20of%20the%20task.%20Specifically%2C%20we%20propose%20a%20Motion%20Mask-Guided%20Two-Stage%20Network%20%28MMGT%29%20that%20uses%20audio%2C%20along%20with%20motion%20masks%20and%20pose%20videos%20generated%20from%20the%20audio%20signal%2C%20to%20jointly%20generate%20synchronized%20speech%20gesture%20videos.%20In%20the%20first%20stage%2C%20the%20Spatial%20Mask-Guided%20Audio2Pose%20Generation%20%28SMGA%29%20Network%20generates%20high-quality%20pose%20videos%20and%20motion%20masks%20from%20audio%2C%20effectively%20capturing%20large%20movements%20in%20key%20regions%20such%20as%20the%20face%20and%20gestures.%20In%20the%20second%20stage%2C%20we%20integrate%20Motion%20Masked%20Hierarchical%20Audio%20Attention%20%28MM-HAA%29%20into%20the%20Stabilized%20Diffusion%20Video%20Generation%20model%2C%20addressing%20limitations%20in%20fine-grained%20motion%20generation%20and%20region-specific%20detail%20control%20found%20in%20traditional%20methods.%20This%20ensures%20high-quality%2C%20detailed%20upper-body%20videos%20with%20accurate%20textures%20and%20motion.%20Evaluations%20demonstrate%20improvements%20in%20video%20quality%2C%20lip-sync%2C%20and%20hand%20gestures.%20The%20model%20and%20code%20are%20available%20at%20https%3A//github.com/SIA-IDE/MMGT.&entry.1838667208=http%3A//arxiv.org/abs/2505.23120v2&entry.124074799=Read"},
{"title": "InterEdit: Navigating Text-Guided Multi-Human 3D Motion Editing", "author": "Yebin Yang and Di Wen and Lei Qi and Weitong Kong and Junwei Zheng and Ruiping Liu and Yufan Chen and Chengzhi Wu and Kailun Yang and Yuqian Fu and Danda Pani Paudel and Luc Van Gool and Kunyu Peng", "abstract": "Text-guided 3D motion editing has seen success in single-person scenarios, but its extension to multi-person settings is less explored due to limited paired data and the complexity of inter-person interactions. We introduce the task of multi-person 3D motion editing, where a target motion is generated from a source and a text instruction. To support this, we propose InterEdit3D, a new dataset with manual two-person motion change annotations, and a Text-guided Multi-human Motion Editing (TMME) benchmark. We present InterEdit, a synchronized classifier-free conditional diffusion model for TMME. It introduces Semantic-Aware Plan Token Alignment with learnable tokens to capture high-level interaction cues and an Interaction-Aware Frequency Token Alignment strategy using DCT and energy pooling to model periodic motion dynamics. Experiments show that InterEdit improves text-to-motion consistency and edit fidelity, achieving state-of-the-art TMME performance. The dataset and code will be released at https://github.com/YNG916/InterEdit.", "link": "http://arxiv.org/abs/2603.13082v1", "date": "2026-03-13", "relevancy": 2.4149, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6407}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5966}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5696}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InterEdit%3A%20Navigating%20Text-Guided%20Multi-Human%203D%20Motion%20Editing&body=Title%3A%20InterEdit%3A%20Navigating%20Text-Guided%20Multi-Human%203D%20Motion%20Editing%0AAuthor%3A%20Yebin%20Yang%20and%20Di%20Wen%20and%20Lei%20Qi%20and%20Weitong%20Kong%20and%20Junwei%20Zheng%20and%20Ruiping%20Liu%20and%20Yufan%20Chen%20and%20Chengzhi%20Wu%20and%20Kailun%20Yang%20and%20Yuqian%20Fu%20and%20Danda%20Pani%20Paudel%20and%20Luc%20Van%20Gool%20and%20Kunyu%20Peng%0AAbstract%3A%20Text-guided%203D%20motion%20editing%20has%20seen%20success%20in%20single-person%20scenarios%2C%20but%20its%20extension%20to%20multi-person%20settings%20is%20less%20explored%20due%20to%20limited%20paired%20data%20and%20the%20complexity%20of%20inter-person%20interactions.%20We%20introduce%20the%20task%20of%20multi-person%203D%20motion%20editing%2C%20where%20a%20target%20motion%20is%20generated%20from%20a%20source%20and%20a%20text%20instruction.%20To%20support%20this%2C%20we%20propose%20InterEdit3D%2C%20a%20new%20dataset%20with%20manual%20two-person%20motion%20change%20annotations%2C%20and%20a%20Text-guided%20Multi-human%20Motion%20Editing%20%28TMME%29%20benchmark.%20We%20present%20InterEdit%2C%20a%20synchronized%20classifier-free%20conditional%20diffusion%20model%20for%20TMME.%20It%20introduces%20Semantic-Aware%20Plan%20Token%20Alignment%20with%20learnable%20tokens%20to%20capture%20high-level%20interaction%20cues%20and%20an%20Interaction-Aware%20Frequency%20Token%20Alignment%20strategy%20using%20DCT%20and%20energy%20pooling%20to%20model%20periodic%20motion%20dynamics.%20Experiments%20show%20that%20InterEdit%20improves%20text-to-motion%20consistency%20and%20edit%20fidelity%2C%20achieving%20state-of-the-art%20TMME%20performance.%20The%20dataset%20and%20code%20will%20be%20released%20at%20https%3A//github.com/YNG916/InterEdit.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13082v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInterEdit%253A%2520Navigating%2520Text-Guided {"title": "PhysMoDPO: Physically-Plausible Humanoid Motion with Preference Optimization", "author": "Yangsong Zhang and Anujith Muraleedharan and Rikhat Akizhanov and Abdul Ahad Butt and G\u00fcl Varol and Pascal Fua and Fabio Pizzati and Ivan Laptev", "abstract": "Recent progress in text-conditioned human motion generation has been largely driven by diffusion models trained on large-scale human motion data. Building on this progress, recent methods attempt to transfer such models for character animation and real robot control by applying a Whole-Body Controller (WBC) that converts diffusion-generated motions into executable trajectories. While WBC trajectories become compliant with physics, they may expose substantial deviations from original motion. To address this issue, we here propose PhysMoDPO, a Direct Preference Optimization framework. Unlike prior work that relies on hand-crafted physics-aware heuristics such as foot-sliding penalties, we integrate WBC into our training pipeline and optimize diffusion model such that the output of WBC becomes compliant both with physics and original text instructions. To train PhysMoDPO we deploy physics-based and task-specific rewards and use them to assign preference to synthesized trajectories. Our extensive experiments on text-to-motion and spatial control tasks demonstrate consistent improvements of PhysMoDPO in both physical realism and task-related metrics on simulated robots. Moreover, we demonstrate that PhysMoDPO results in significant improvements when applied to zero-shot motion transfer in simulation and for real-world deployment on a G1 humanoid robot.", "link": "http://arxiv.org/abs/2603.13228v1", "date": "2026-03-13", "relevancy": 2.4018, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6419}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.604}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5575}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhysMoDPO%3A%20Physically-Plausible%20Humanoid%20Motion%20with%20Preference%20Optimization&body=Title%3A%20PhysMoDPO%3A%20Physically-Plausible%20Humanoid%20Motion%20with%20Preference%20Optimization%0AAuthor%3A%20Yangsong%20Zhang%20and%20Anujith%20Muraleedharan%20and%20Rikhat%20Akizhanov%20and%20Abdul%20Ahad%20Butt%20and%20G%C3%BCl%20Varol%20and%20Pascal%20Fua%20and%20Fabio%20Pizzati%20and%20Ivan%20Laptev%0AAbstract%3A%20Recent%20progress%20in%20text-conditioned%20human%20motion%20generation%20has%20been%20largely%20driven%20by%20diffusion%20models%20trained%20on%20large-scale%20human%20motion%20data.%20Building%20on%20this%20progress%2C%20recent%20methods%20attempt%20to%20transfer%20such%20models%20for%20character%20animation%20and%20real%20robot%20control%20by%20applying%20a%20Whole-Body%20Controller%20%28WBC%29%20that%20converts%20diffusion-generated%20motions%20into%20executable%20trajectories.%20While%20WBC%20trajectories%20become%20compliant%20with%20physics%2C%20they%20may%20expose%20substantial%20deviations%20from%20original%20motion.%20To%20address%20this%20issue%2C%20we%20here%20propose%20PhysMoDPO%2C%20a%20Direct%20Preference%20Optimization%20framework.%20Unlike%20prior%20work%20that%20relies%20on%20hand-crafted%20physics-aware%20heuristics%20such%20as%20foot-sliding%20penalties%2C%20we%20integrate%20WBC%20into%20our%20training%20pipeline%20and%20optimize%20diffusion%20model%20such%20that%20the%20output%20of%20WBC%20becomes%20compliant%20both%20with%20physics%20and%20original%20text%20instructions.%20To%20train%20PhysMoDPO%20we%20deploy%20physics-based%20and%20task-specific%20rewards%20and%20use%20them%20to%20assign%20preference%20to%20synthesized%20trajectories.%20Our%20extensive%20experiments%20on%20text-to-motion%20and%20spatial%20control%20tasks%20demonstrate%20consistent%20improvements%20of%20PhysMoDPO%20in%20both%20physical%20realism%20and%20task-related%20metrics%20on%20simulated%20robots.%20Moreover%2C%20we%20demonstrate%20that%20PhysMoDPO%20results%20in%20significant%20improvements%20when%20applied%20to%20zero-shot%20motion%20transfer%20in%20simulation%20and%20for%20real-world%20deployment%20on%20a%20G1%20humanoid%20robot.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysMoDPO%253A%2520Physically-Plausible%2520Humanoid%2520Motion%2520with%2520Preference%2520Optimization%26entry.906535625%3DYangsong%2520Zhang%2520and%2520Anujith%2520Muraleedharan%2520and%2520Rikhat%2520Akizhanov%2520and%2520Abdul%2520Ahad%2520Butt%2520and%2520G%25C3%25BCl%2520Varol%2520and%2520Pascal%2520Fua%2520and%2520Fabio%2520Pizzati%2520and%2520Ivan%2520Laptev%26entry.1292438233%3DRecent%2520progress%2520in%2520text-conditioned%2520human%2520motion%2520generation%2520has%2520been%2520largely%2520driven%2520by%2520diffusion%2520models%2520trained%2520on%2520large-scale%2520human%2520motion%2520data.%2520Building%2520on%2520this%2520progress%252C%2520recent%2520methods%2520attempt%2520to%2520transfer%2520such%2520models%2520for%2520character%2520animation%2520and%2520real%2520robot%2520control%2520by%2520applying%2520a%2520Whole-Body%2520Controller%2520%2528WBC%2529%2520that%2520converts%2520diffusion-generated%2520motions%2520into%2520executable%2520trajectories.%2520While%2520WBC%2520trajectories%2520become%2520compliant%2520with%2520physics%252C%2520they%2520may%2520expose%2520substantial%2520deviations%2520from%2520original%2520motion.%2520To%2520address%2520this%2520issue%252C%2520we%2520here%2520propose%2520PhysMoDPO%252C%2520a%2520Direct%2520Preference%2520Optimization%2520framework.%2520Unlike%2520prior%2520work%2520that%2520relies%2520on%25

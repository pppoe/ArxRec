{"title": "3DTCR: A Physics-Based Generative Framework for Vortex-Following 3D Reconstruction to Improve Tropical Cyclone Intensity Forecasting", "author": "Jun Liu and Xiaohui Zhong and Kai Zheng and Jiarui Li and Yifei Li and Tao Zhou and Wenxu Qian and Shun Dai and Ruian Tie and Yangyang Zhao and Hao Li", "abstract": "Tropical cyclone (TC) intensity forecasting remains challenging as current numerical and AI-based weather models fail to satisfactorily represent extreme TC structure and intensity. Although intensity time-series forecasting has achieved significant advances, it outputs intensity sequences rather than the three-dimensional inner-core fine-scale structure and physical mechanisms governing TC evolution. High-resolution numerical simulations can capture these features but remain computationally expensive and inefficient for large-scale operational applications. Here we present 3DTCR, a physics-based generative framework combining physical constraints with generative AI efficiency for 3D TC structure reconstruction. Trained on a six-year, 3-km-resolution moving-domain WRF dataset, 3DTCR enables region-adaptive vortex-following reconstruction using conditional Flow Matching(CFM), optimized via latent domain adaptation and two-stage transfer learning. The framework mitigates limitations imposed by low-resolution targets and over-smoothed forecasts, improving the representation of TC inner-core structure and intensity while maintaining track stability. Results demonstrate that 3DTCR outperforms the ECMWF high-resolution forecasting system (ECMWF-HRES) in TC intensity prediction at nearly all lead times up to 5 days and reduces the RMSE of maximum WS10M by 36.5\\% relative to its FuXi inputs. These findings highlight 3DTCR as a physics-based generative framework that efficiently resolves fine-scale structures at lower computational cost, which may offer a promising avenue for improving TC intensity forecasting.", "link": "http://arxiv.org/abs/2603.13049v1", "date": "2026-03-13", "relevancy": 2.14, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5365}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5365}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5275}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203DTCR%3A%20A%20Physics-Based%20Generative%20Framework%20for%20Vortex-Following%203D%20Reconstruction%20to%20Improve%20Tropical%20Cyclone%20Intensity%20Forecasting&body=Title%3A%203DTCR%3A%20A%20Physics-Based%20Generative%20Framework%20for%20Vortex-Following%203D%20Reconstruction%20to%20Improve%20Tropical%20Cyclone%20Intensity%20Forecasting%0AAuthor%3A%20Jun%20Liu%20and%20Xiaohui%20Zhong%20and%20Kai%20Zheng%20and%20Jiarui%20Li%20and%20Yifei%20Li%20and%20Tao%20Zhou%20and%20Wenxu%20Qian%20and%20Shun%20Dai%20and%20Ruian%20Tie%20and%20Yangyang%20Zhao%20and%20Hao%20Li%0AAbstract%3A%20Tropical%20cyclone%20%28TC%29%20intensity%20forecasting%20remains%20challenging%20as%20current%20numerical%20and%20AI-based%20weather%20models%20fail%20to%20satisfactorily%20represent%20extreme%20TC%20structure%20and%20intensity.%20Although%20intensity%20time-series%20forecasting%20has%20achieved%20significant%20advances%2C%20it%20outputs%20intensity%20sequences%20rather%20than%20the%20three-dimensional%20inner-core%20fine-scale%20structure%20and%20physical%20mechanisms%20governing%20TC%20evolution.%20High-resolution%20numerical%20simulations%20can%20capture%20these%20features%20but%20remain%20computationally%20expensive%20and%20inefficient%20for%20large-scale%20operational%20applications.%20Here%20we%20present%203DTCR%2C%20a%20physics-based%20generative%20framework%20combining%20physical%20constraints%20with%20generative%20AI%20efficiency%20for%203D%20TC%20structure%20reconstruction.%20Trained%20on%20a%20six-year%2C%203-km-resolution%20moving-domain%20WRF%20dataset%2C%203DTCR%20enables%20region-adaptive%20vortex-following%20reconstruction%20using%20conditional%20Flow%20Matching%28CFM%29%2C%20optimized%20via%20latent%20domain%20adaptation%20and%20two-stage%20transfer%20learning.%20The%20framework%20mitigates%20limitations%20imposed%20by%20low-resolution%20targets%20and%20over-smoothed%20forecasts%2C%20improving%20the%20representation%20of%20TC%20inner-core%20structure%20and%20intensity%20while%20maintaining%20track%20stability.%20Results%20demonstrate%20that%203DTCR%20outperforms%20the%20ECMWF%20high-resolution%20forecasting%20system%20%28ECMWF-HRES%29%20in%20TC%20intensity%20prediction%20at%20nearly%20all%20lead%20times%20up%20to%205%20days%20and%20reduces%20the%20RMSE%20of%20maximum%20WS10M%20by%2036.5%5C%25%20relative%20to%20its%20FuXi%20inputs.%20These%20findings%20highlight%203DTCR%20as%20a%20physics-based%20generative%20framework%20that%20efficiently%20resolves%20fine-scale%20structures%20at%20lower%20computational%20cost%2C%20which%20may%20offer%20a%20promising%20avenue%20for%20improving%20TC%20intensity%20forecasting.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13049v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3DTCR%253A%2520A%2520Physics-Based%2520Generative%2520Framework%2520for%2520Vortex-Following%25203D%2520Reconstruction%2520to%2520Improve%2520Tropical%2520Cyclone%2520Intensity%2520Forecasting%26entry.906535625%3DJun%2520Liu%2520and%2520Xiaohui%2520Zhong%2520and%2520Kai%2520Zheng%2520and%2520Jiarui%2520Li%2520and%2520Yifei%2520Li%2520and%2520Tao%2520Zhou%2520and%2520Wenxu%2520Qian%2520and%2520Shun%2520Dai%2520and%2520Ruian%2520Tie%2520and%2520Yangyang%2520Zhao%2520and%2520Hao%2520Li%26entry.1292438233%3DTropical%2520cyclone%2520%2528TC%2529%2520intensity%2520forecasting%2520remains%2520challenging%2520as 2520relative%2520to%2520its%2520FuXi%2520inputs.%2520These%2520findings%2520highlight%25203DTCR%2520as%2520a%2520physics-based%2520generative%2520framework%2520that%2520efficiently%2520resolves%2520fine-scale%2520structures%2520at%2520lower%2520computational%2520cost%252C%2520which%2520may%2520offer%2520a%2520promising%2520avenue%2520for%2520improving%2520TC%2520intensity%2520forecasting.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13049v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=3DTCR%3A%20A%20Physics-Based%20Generative%20Framework%20for%20Vortex-Following%203D%20Reconstruction%20to%20Improve%20Tropical%20Cyclone%20Intensity%20Forecasting&entry.906535625=Jun%20Liu%20and%20Xiaohui%20Zhong%20and%20Kai%20Zheng%20and%20Jiarui%20Li%20and%20Yifei%20Li%20and%20Tao%20Zhou%20and%20Wenxu%20Qian%20and%20Shun%20Dai%20and%20Ruian%20Tie%20and%20Yangyang%20Zhao%20and%20Hao%20Li&entry.1292438233=Tropical%20cyclone%20%28TC%29%20intensity%20forecasting%20remains%20challenging%20as%20current%20numerical%20and%20AI-based%20weather%20models%20fail%20to%20satisfactorily%20represent%20extreme%20TC%20structure%20and%20intensity.%20Although%20intensity%20time-series%20forecasting%20has%20achieved%20significant%20advances%2C%20it%20outputs%20intensity%20sequences%20rather%20than%20the%20three-dimensional%20inner-core%20fine-scale%20structure%20and%20physical%20mechanisms%20governing%20TC%20evolution.%20High-resolution%20numerical%20simulations%20can%20capture%20these%20features%20but%20remain%20computationally%20expensive%20and%20inefficient%20for%20large-scale%20operational%20applications.%20Here%20we%20present%203DTCR%2C%20a%20physics-based%20generative%20framework%20combining%20physical%20constraints%20with%20generative%20AI%20efficiency%20for%203D%20TC%20structure%20reconstruction.%20Trained%20on%20a%20six-year%2C%203-km-resolution%20moving-domain%20WRF%20dataset%2C%203 {"title": "Automatic In-Domain Exemplar Construction and LLM-Based Refinement of Multi-LLM Expansions for Query Expansion", "author": "Minghan Li and Ercong Nie and Siqi Zhao and Tongna Chen and Huiping Huang and Guodong Zhou", "abstract": "Query expansion with large language models is promising but often relies on hand-crafted prompts, manually chosen exemplars, or a single LLM, making it non-scalable and sensitive to domain shift. We present an automated, domain-adaptive QE framework that builds in-domain exemplar pools by harvesting pseudo-relevant passages using a BM25-MonoT5 pipeline. A training-free cluster-based strategy selects diverse demonstrations, yielding strong and stable in-context QE without supervision. To further exploit model complementarity, we introduce a two-LLM ensemble in which two heterogeneous LLMs independently generate expansions and a refinement LLM consolidates them into one coherent expansion. Across TREC DL20, DBPedia, and SciFact, the refined ensemble delivers consistent and statistically significant gains over BM25, Rocchio, zero-shot, and fixed few-shot baselines. The framework offers a reproducible testbed for exemplar selection and multi-LLM generation, and a practical, label-free solution for real-world QE.", "link": "http://arxiv.org/abs/2602.08917v2", "date": "2026-03-13", "relevancy": 2.1349, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.565}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20In-Domain%20Exemplar%20Construction%20and%20LLM-Based%20Refinement%20of%20Multi-LLM%20Expansions%20for%20Query%20Expansion&body=Title%3A%20Automatic%20In-Domain%20Exemplar%20Construction%20and%20LLM-Based%20Refinement%20of%20Multi-LLM%20Expansions%20for%20Query%20Expansion%0AAuthor%3A%20Minghan%20Li%20and%20Ercong%20Nie%20and%20Siqi%20Zhao%20and%20Tongna%20Chen%20and%20Huiping%20Huang%20and%20Guodong%20Zhou%0AAbstract%3A%20Query%20expansion%20with%20large%20language%20models%20is%20promising%20but%20often%20relies%20on%20hand-crafted%20prompts%2C%20manually%20chosen%20exemplars%2C%20or%20a%20single%20LLM%2C%20making%20it%20non-scalable%20and%20sensitive%20to%20domain%20shift.%20We%20present%20an%20automated%2C%20domain-adaptive%20QE%20framework%20that%20builds%20in-domain%20exemplar%20pools%20by%20harvesting%20pseudo-relevant%20passages%20using%20a%20BM25-MonoT5%20pipeline.%20A%20training-free%20cluster-based%20strategy%20selects%20diverse%20demonstrations%2C%20yielding%20strong%20and%20stable%20in-context%20QE%20without%20supervision.%20To%20further%20exploit%20model%20complementarity%2C%20we%20introduce%20a%20two-LLM%20ensemble%20in%20which%20two%20heterogeneous%20LLMs%20independently%20generate%20expansions%20and%20a%20refinement%20LLM%20consolidates%20them%20into%20one%20coherent%20expansion.%20Across%20TREC%20DL20%2C%20DBPedia%2C%20and%20SciFact%2C%20the%20refined%20ensemble%20delivers%20consistent%20and%20statistically%20significant%20gains%20over%20BM25%2C%20Rocchio%2C%20zero-shot%2C%20and%20fixed%20few-shot%20baselines.%20The%20framework%20offers%20a%20reproducible%20testbed%20for%20exemplar%20selection%20and%20multi-LLM%20generation%2C%20and%20a%20practical%2C%20label-free%20solution%20for%20real-world%20QE.%0ALink%3A%20http%3A//arxiv.org/abs/2602.08917v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomatic%2520In-Domain%2520Exemplar%2520Construction%2520and%2520LLM-Based%2520Refinement%2520of%2520Multi-LLM%2520Expansions%2520f {"title": "CRAFT-GUI: Curriculum-Reinforced Agent For GUI Tasks", "author": "Songqin Nong and Xiaoxuan Tang and Jingxuan Xu and Sheng Zhou and Jianfeng Chen and Tao Jiang and Wenhao Xu", "abstract": "As autonomous agents become adept at understanding and interacting with graphical user interface (GUI) environments, a new era of automated task execution is emerging. Recent studies have demonstrated that Reinforcement Learning (RL) can effectively enhance agents' performance in dynamic interactive GUI environments. However, these methods face two key limitations: (1) they overlook the significant variation in difficulty across different GUI tasks by treating the entire training data as a uniform set, which hampers the agent's ability to adapt its learning process; and (2) most approaches collapse task-specific nuances into a single, coarse reward, leaving the agent with a uniform signal that yields inefficient policy updates. To address these limitations, we propose CRAFT-GUI, a curriculum learning framework based on Group Relative Policy Optimization (GRPO) that explicitly accounts for the varying difficulty across trajectories. To enable more fine-grained policy optimization, we design a reward function that combines simple rule-based signals with model-judged evaluation, providing richer and more nuanced feedback during training. Experimental results demonstrate that our method achieves significant improvements over previous state-of-the-art approaches, outperforming them by 5.6% on public benchmarks Android Control and 10.3% on our internal online benchmarks, respectively. These findings empirically validate the effectiveness of integrating reinforcement learning with curriculum learning in GUI interaction tasks.", "link": "http://arxiv.org/abs/2508.11360v2", "date": "2026-03-13", "relevancy": 2.1333, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5479}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5343}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5265}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CRAFT-GUI%3A%20Curriculum-Reinforced%20Agent%20For%20GUI%20Tasks&body=Title%3A%20CRAFT-GUI%3A%20Curriculum-Reinforced%20Agent%20For%20GUI%20Tasks%0AAuthor%3A%20Songqin%20Nong%20and%20Xiaoxuan%20Tang%20and%20Jingxuan%20Xu%20and%20Sheng%20Zhou%20and%20Jianfeng%20Chen%20and%20Tao%20Jiang%20and%20Wenhao%20Xu%0AAbstract%3A%20As%20autonomous%20agents%20become%20adept%20at%20understanding%20and%20interacting%20with%20graphical%20user%20interface%20%28GUI%29%20environments%2C%20a%20new%20era%20of%20automated%20task%20execution%20is%20emerging.%20Recent%20studies%20have%20demonstrated%20that%20Reinforcement%20Learning%20%28RL%29%20can%20effectively%20enhance%20agents%27%20performance%20in%20dynamic%20interactive%20GUI%20environments.%20However%2C%20these%20methods%20face%20two%20key%20limitations%3A%20%281%29%20they%20overlook%20the%20significant%20variation%20in%20difficulty%20across%20different%20GUI%20tasks%20by%20treating%20the%20entire%20training%20data%20as%20a%20uniform%20set%2C%20which%20hampers%20the%20agent%27s%20ability%20to%20adapt%20its%20learning%20process%3B%20and%20%282%29%20most%20approaches%20collapse%20task-specific%20nuances%20into%20a%20single%2C%20coarse%20reward%2C%20leaving%20the%20agent%20with%20a%20uniform%20signal%20that%20yields%20inefficient%20policy%20updates.%20To%20address%20these%20limitations%2C%20we%20propose%20CRAFT-GUI%2C%20a%20curriculum%20learning%20framework%20based%20on%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20that%20explicitly%20accounts%20for%20the%20varying%20difficulty%20across%20trajectories.%20To%20enable%20more%20fine-grained%20policy%20optimization%2C%20we%20design%20a%20reward%20function%20that%20combines%20simple%20rule-based%20signals%20with%20model-judged%20evaluation%2C%20providing%20richer%20and%20more%20nuanced%20feedback%20during%20training.%20Experimental%20results%20demonstrate%20that%20our%20method%20achieves%20significant%20improvements%20over%20previous%20state-of-the-art%20approaches%2C%20outperforming%20them%20by%205.6%25%20on%20public%20benchmarks%20Android%20Control%20and%2010.3%25%20on%20our%20internal%20online%20benchmarks%2C%20respectively.%20These%20findings%20empirically%20validate%20the%20effectiveness%20of%20integrating%20reinforcement%20learning%20with%20curriculum%20learning%20in%20GUI%20interaction%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2508.11360v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCRAFT-GUI%253A%2520Curriculum-Reinforced%2520Agent%2520For%2520GUI%2520Tasks%26entry.906535625%3DSongqin%2520Nong%2520and%2520Xiaoxuan%2520Tang%2520and%2520Jingxuan%2520Xu%2520and%2520Sheng%2520Zhou%2520and%2520Jianfeng%2520Chen%2520and%2520Tao%2520Jiang%2520and%2520Wenhao%2520Xu%26entry.1292438233%3DAs%2520autonomous%2520agents%2520become%2520adept%2520at%2520understanding%2520and%2520interacting%2520with%2520graphical%2520user%2520interface%2520%2528GUI%2529%2520environments%252C%2520a%2520new%2520era%2520of%2520automated%2520task%2520execution%2520is%2520emerging.%2520Recent%2520studies%2520have%2520demonstrated%2520that%2520Reinforcement%2520Learning%2520%2528RL%2529%2520can%2520effectively%2520enhance%2520agents%2527%2520performance%2520in%2520dynamic%2520interactive%2520GUI%2520environments.%2520However%252C%2520these%2520methods%2520face%2520two%2520key%2520limitations%253A%2520%25281%2529%2520they%2520overlook%2520the%2520significant%2520variation%2520in%2520difficulty%2520across%2520different%2520GUI%2520tasks%2520by%2520treating%2520the%2520entire%2520training%2520data%2520as%2520a%2520uniform%2520set%252C%2520which%2520hampers%2520the%2520agent%2527s%2520ability%2520to%2520adapt%2520its%2520learning%2520process%253B%2520and%2520%25282%2529%2520most%2520approaches%2520collapse%2520task-specific%2520nuances%2520into%2520a%2520single%252C%2520coarse%2520reward%252C%2520leaving%2520the%2520agent%2520with%2520a%2520uniform%2520signal%2520that%2520yields%2520inefficient%2520policy%2520updates.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520CRAFT-GUI%252C%2520a%2520curriculum%2520learning%2520framework%2520based%2520on%2520Group%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520that%2520explicitly%2520accounts%2520for%2520the%2520varying%2520difficulty%2520across%2520trajectories.%2520To%2520enable%2520more%2520fine-grained%2520policy%2520optimization%252C%2520we%2520design%2520a%2520reward%2520function%2520that%2520combines%2520simple%2520rule-based%2520signals%2520with%2520model-judged%2520evaluation%252C%2520providing%2520richer%2520and%2520more%2520nuanced%2520feedback%2520during%2520training.%2520Experimental%2520results%2520demonstrate%2520that%2520our%2520method%2520achieves%2520significant%2520improvements%2520over%2520previous%2520state-of-the-art%2520approaches%252C%2520outperforming%2520them%2520by%25205.6%2525%2520on%2520public%2520benchmarks%2520Android%2520Control%2520and%252010.3%2525%2520on%2520our%2520internal%2520online%2520benchmarks%252C%2520respectively.%2520These%2520findings%2520empirically%2520validate%2520the%2520effectiveness%2520of%2520integrating%2520reinforcement%2520learning%2520with%2520curriculum%2520learning%2520in%2520GUI%2520interaction%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.11360v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CRAFT-GUI%3A%20Curriculum-Reinforced%20Agent%20For%20GUI%20Tasks&entry.906535625=Songqin%20Nong%20and%20Xiaoxuan%20Tang%20and%20Jingxuan%20Xu%20and%20Sh {"title": "Semantic Invariance in Agentic AI", "author": "I. de Zarz\u00e0 and J. de Curt\u00f2 and Jordi Cabot and Pietro Manzoni and Carlos T. Calafate", "abstract": "Large Language Models (LLMs) increasingly serve as autonomous reasoning agents in decision support, scientific problem-solving, and multi-agent coordination systems. However, deploying LLM agents in consequential applications requires assurance that their reasoning remains stable under semantically equivalent input variations, a property we term semantic invariance.Standard benchmark evaluations, which assess accuracy on fixed, canonical problem formulations, fail to capture this critical reliability dimension. To address this shortcoming, in this paper we present a metamorphic testing framework for systematically assessing the robustness of LLM reasoning agents, applying eight semantic-preserving transformations (identity, paraphrase, fact reordering, expansion, contraction, academic context, business context, and contrastive formulation) across seven foundation models spanning four distinct architectural families: Hermes (70B, 405B), Qwen3 (30B-A3B, 235B-A22B), DeepSeek-R1, and gpt-oss (20B, 120B). Our evaluation encompasses 19 multi-step reasoning problems across eight scientific domains. The results reveal that model scale does not predict robustness: the smaller Qwen3-30B-A3B achieves the highest stability (79.6% invariant responses, semantic similarity 0.91), while larger models exhibit greater fragility.", "link": "http://arxiv.org/abs/2603.13173v1", "date": "2026-03-13", "relevancy": 2.1332, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5534}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5293}, {"title": "Lexicon3D: Probing Visual Foundation g%2520four%2520distinct%2520architectural%2520families%253A%2520Hermes%2520%252870B%252C%2520405B%2529%252C%2520Qwen3%2520%252830B-A3B%252C%2520235B-A22B%2529%252C%2520DeepSeek-R1%252C%2520and%2520gpt-oss%2520%252820B%252C%2520120B%2529.%2520Our%2520evaluation%2520encompasses%252019%2520multi-step%2520reasoning%2520problems%2520across%2520eight%2520scientific%2520domains.%2520The%2520results%2520reveal%2520that%2520model%2520scale%2520does%2520not%2520predict%2520robustness%253A%2520the%2520smaller%2520Qwen3-30B-A3B%2520achieves%2520the%2520highest%2520stability%2520%252879.6%2525%2520invariant%2520responses%252C%2520semantic%2520similarity%25200.91%2529%252C%2520while%2520larger%2520models%2520exhibit%2520greater%2520fragility.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13173v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semantic%20Invariance%20in%20Agentic%20AI&entry.906535625=I.%20de%20Zarz%C3%A0%20and%20J.%20de%20Curt%C3%B2%20and%20Jordi%20Cabot%20and%20Pietro%20Manzoni%20and%20Carlos%20T.%20Calafate&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20increasingly%20serve%20as%20autonomous%20reasoning%20agents%20in%20decision%20support%2C%20scientific%20problem-solving%2C%20and%20multi-agent%20coordination%20systems.%20However%2C%20deploying%20LLM%20agents%20in%20consequential%20applications%20requires%20assurance%20that%20their%20reasoning%20remains%20stable%20under%20semantically%20equivalent%20input%20variations%2C%20a%20property%20we%20term%20semantic%20invariance.Standard%20benchmark%20evaluations%2C%20which%20assess%20accuracy%20on%20fixed%2C%20canonical%20problem%20formulations%2C%20fail%20to%20capture%20this%20critical%20reliability%20dimension.%20To%20address%20this%20shortcoming%2C%20in%20this%20paper%20we%20present%20a%20metamorphic%20testing%20framework%20for%20systematically%20assessing%20the%20robustness%20of%20LLM%20reasoning% {"title": "CORE: Context-Robust Remasking for Diffusion Language Models", "author": "Kevin Zhai and Sabbir Mollah and Zhenyi Wang and Mubarak Shah", "abstract": "Standard decoding in Masked Diffusion Models (MDMs) is hindered by context rigidity: tokens are retained based on transient high confidence, often ignoring that early predictions lack full context. This creates cascade effects where initial inconsistencies misguide the remaining generation. Existing revision strategies attempt to mitigate this by relying on static confidence scores, but these signals are inherently myopic; inconsistent tokens can appear confident to the model itself. We propose Context-Robust Remasking (CORE), a training-free framework for inference-time revision. Rather than trusting static token probabilities, CORE identifies context-brittle tokens by probing their sensitivity to targeted masked-context perturbations. We formalize revision as a robust optimization objective over context shifts and efficiently approximate this objective to prioritize unstable tokens for revision. On LLaDA-8B-Base, CORE delivers consistent improvements across reasoning and code benchmarks, outperforming compute-matched baselines and improving MBPP by up to 9.2 percentage points.", "link": "http://arxiv.org/abs/2602.04096v3", "date": "2026-03-13", "relevancy": 2.1248, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5513}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CORE%3A%20Context-Robust%20Remasking%20for%20Diffusion%20Language%20Models&body=Title%3A%20CORE% ndard%2520decoding%2520in%2520Masked%2520Diffusion%2520Models%2520%2528MDMs%2529%2520is%2520hindered%2520by%2520context%2520rigidity%253A%2520tokens%2520are%2520retained%2520based%2520on%2520transient%2520high%2520confidence%252C%2520often%2520ignoring%2520that%2520early%2520predictions%2520lack%2520full%2520context.%2520This%2520creates%2520cascade%2520effects%2520where%2520initial%2520inconsistencies%2520misguide%2520the%2520remaining%2520generation.%2520Existing%2520revision%2520strategies%2520attempt%2520to%2520mitigate%2520this%2520by%2520relying%2520on%2520static%2520confidence%2520scores%252C%2520but%2520these%2520signals%2520are%2520inherently%2520myopic%253B%2520inconsistent%2520tokens%2520can%2520appear%2520confident%2520to%2520the%2520model%2520itself.%2520We%2520propose%2520Context-Robust%2520Remasking%2520%2528CORE%2529%252C%2520a%2520training-free%2520framework%2520for%2520inference-time%2520revision.%2520Rather%2520than%2520trusting%2520static%2520token%2520probabilities%252C%2520CORE%2520identifies%2520context-brittle%2520tokens%2520by%2520probing%2520their%2520sensitivity%2520to%2520targeted%2520masked-context%2520perturbations.%2520We%2520formalize%2520revision%2520as%2520a%2520robust%2520optimization%2520objective%2520over%2520context%2520shifts%2520and%2520efficiently%2520approximate%2520this%2520objective%2520to%2520prioritize%2520unstable%2520tokens%2520for%2520revision.%2520On%2520LLaDA-8B-Base%252C%2520CORE%2520delivers%2520consistent%2520improvements%2520across%2520reasoning%2520and%2520code%2520benchmarks%252C%2520outperforming%2520compute-matched%2520baselines%2520and%2520improving%2520MBPP%2520by%2520up%2520to%25209.2%2520percentage%2520points.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.04096v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CORE%3A%20Context-Robust%20Remasking%20for%20Diffusion%20Language%20Models&entry.906535 {"title": "Neural-Quantum-States Impurity Solver for Quantum Embedding Problems", "author": "Yinzhanghao Zhou and Tsung-Han Lee and Ao Chen and Nicola Lanat\u00e0 and Hong Guo", "abstract": "Neural quantum states (NQS) have emerged as a promising approach to solve second-quantized Hamiltonians, because of their scalability and flexibility. In this work, we design and benchmark an NQS impurity solver for the quantum embedding (QE) methods, focusing on the ghost Gutzwiller Approximation (gGA) framework. We introduce a graph transformer-based NQS framework able to represent arbitrarily connected impurity orbitals of the embedding Hamiltonian (EH) and develop an error control mechanism to stabilize iterative updates throughout the QE loops. We validate the accuracy of our approach with benchmark gGA calculations of the Anderson Lattice Model, yielding results in excellent agreement with the exact diagonalisation impurity solver. Finally, our analysis of the computational budget reveals the method's principal bottleneck to be the high-accuracy sampling of physical observables required by the embedding loop, rather than the NQS variational optimization, directly highlighting the critical need for more efficient inference techniques.", "link": "http://arxiv.org/abs/2509.12431v2", "date": "2026-03-13", "relevancy": 2.1031, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.451}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4057}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4051}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural-Quantum-States%20Impurity%20Solver%20for%20Quantum%20Embedding%20Problems&body=Title%3A%20Neural-Quantum-States%20Impurity%20Solver%20for%20Quantum%20Embedding%20Problems%0AAuthor%3A%20Yinzhanghao%20Zhou%20and%20Tsung-Han%20Lee%20and%20Ao%20Chen%20and%20Nicola%20Lanat%C3%A0%20and%20Hong%20Guo%0AAbstract%3A%20Neural%20quantum%20states%20%28NQS%29%20have%20emerged%20as%20a%20promising%20approach%20to%20solve%20second-quantized%20Hamiltonians%2C%20because%20of%20their%20scalability%20and%20flexibility.%20In%20this%20work%2C%20we%20design%20and%20benchmark%20an%20NQS%20impurity%20solver%20for%20the%20quantum%20embedding%20%28QE%29%20methods%2C%20focusing%20on%20the%20ghost%20Gutzwiller%20Approximation%20%28gGA%29%20framework.%20We%20introduce%20a%20graph%20transformer-based%20NQS%20framework%20able%20to%20represent%20arbitrarily%20connected%20impurity%20orbitals%20of%20the%20embedding%20Hamiltonian%20%28EH%29%20and%20develop%20an%20error%20control%20mechanism%20to%20stabilize%20iterative%20updates%20throughout%20the%20QE%20loops.%20We%20validate%20the%20accuracy%20of%20our%20approach%20with%20benchmark%20gGA%20calculations%20of%20the%20Anderson%20Lattice%20Model%2C%20yielding%20results%20in%20excellent%20agreement%20with%20the%20exact%20diagonalisation%20impurity%20solver.%20Finally%2C%20our%20analysis%20of%20the%20computational%20budget%20reveals%20the%20method%27s%20principal%20bottleneck%20to%20be%20the%20high-accuracy%20sampling%20of%20physical%20observables%20required%20by%20the%20embedding%20loop%2C%20rather%20than%20the%20NQS%20variational%20optimization%2C%20directly%20highlighting%20the%20critical%20need%20for%20more%20efficient%20inference%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2509.12431v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural-Quantum-States%2520Impurity%2520Solver%2520for%2520Quantum%2520Embedding%2520Problems%26entry.906535625%3DYinzhanghao%2520Zhou%2520and%2520Tsung-Han%2520Lee%2520and%2520Ao%2520Chen%2520and%2520Nicola%2520Lanat%25C3%25A0%2520and%2520Hong%2520Guo% ng%20Problems&entry.906535625=Yinzhanghao%20Zhou%20and%20Tsung-Han%20Lee%20and%20Ao%20Chen%20and%20Nicola%20Lanat%C3%A0%20and%20Hong%20Guo&entry.1292438233=Neural%20quantum%20states%20%28NQS%29%20have%20emerged%20as%20a%20promising%20approach%20to%20solve%20second-quantized%20Hamiltonians%2C%20because%20of%20their%20scalability%20and%20flexibility.%20In%20this%20work%2C%20we%20design%20and%20benchmark%20an%20NQS%20impurity%20solver%20for%20the%20quantum%20embedding%20%28QE%29%20methods%2C%20focusing%20on%20the%20ghost%20Gutzwiller%20Approximation%20%28gGA%29%20framework.%20We%20introduce%20a%20graph%20transformer-based%20NQS%20framework%20able%20to%20represent%20arbitrarily%20connected%20impurity%20orbitals%20of%20the%20embedding%20Hamiltonian%20%28EH%29%20and%20develop%20an%20error%20control%20mechanism%20to%20stabilize%20iterative%20updates%20throughout%20the%20QE%20loops.%20We%20validate%20the%20accuracy%20of%20our%20approach%20with%20benchmark%20gGA%20calculations%20of%20the%20Anderson%20Lattice%20Model%2C%20yielding%20results%20in%20excellent%20agreement%20with%20the%20exact%20diagonalisation%20impurity%20solver.%20Finally%2C%20our%20analysis%20of%20the%20computational%20budget%20reveals%20the%20method%27s%20principal%20bottleneck%20to%20be%20the%20high-accuracy%20sampling%20of%20physical%20observables%20required%20by%20the%20embedding%20loop%2C%20rather%20than%20the%20NQS%20variational%20optimization%2C%20directly%20highlighting%20the%20critical%20need%20for%20more%20efficient%20inference%20techniques.&entry.1838667208=http%3A//arxiv.org/abs/2509.12431v2&entry.124074799=Read"},
{"title": "ZO-SAM: Zero-Order Sharpness-Aware Minimization for Efficient Sparse Training", "author": "Jie Ji and Gen Li and Kaiyuan Deng and Fatemeh Afghah and Xiaolong Ma", "abstract": "Deep learning models, despite their impressive achievements, suffer from high computational costs and memory requirements, limiting their usability in resource-constrained environments. Sparse neural networks significantly alleviate these constraints by dramatically reducing parameter count and computational overhead. However, existing sparse training methods often experience chaotic and noisy gradient signals, severely hindering convergence and generalization performance, particularly at high sparsity levels. To tackle this critical challenge, we propose Zero-Order Sharpness-Aware Minimization (ZO-SAM), a novel optimization framework that strategically integrates zero-order optimization within the SAM approach. Unlike traditional SAM, ZO-SAM requires only a single backpropagation step during perturbation, selectively utilizing zero-order gradient estimations. This innovative approach reduces the backpropagation computational cost by half compared to conventional SAM, significantly lowering gradient variance and effectively eliminating associated computational overhead. By harnessing SAM's capacity for identifying flat minima, ZO-SAM stabilizes the training process and accelerates convergence. These efficiency gains are particularly important in sparse training scenarios, where computational cost is the primary bottleneck that limits the practicality of SAM. Moreover, models trained with ZO-SAM exhibit improved robustness under distribution shift, further broadening its practicality in real-world deployments.", "link": "http://arxiv.org/abs/2603.13115v1", "date": "2026-03-13", "relevancy": 2.0998, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5511}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5367}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5028}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ZO-SAM%3A%20Zero-Order%20Sharpness-Aware%20Minimization%20for%20Efficient%20Sparse%20Training&body=Title%3A%20ZO-SAM%3A%20Zero-Order%20Sharpness-Aware%20Minimization%20for%20Efficient%20Sparse%20Training%0AAuthor%3A%20Jie%20Ji%20and%20Gen%20Li%20and%20Kaiyuan%20Deng%20and%20Fatemeh%20Afghah%20and%20Xiaolong%20Ma%0AAbstract%3A%20Deep%20learning%20models%2C%20despite%20their%20impressive%20achievements%2C%20suffer%20from%20high%20computational%20costs%20and%20memory%20requirements%2C%20limiting%20their%20usability%20in%20resource-constrained%20environments.%20Sparse%20neural%20networks%20significantly%20alleviate%20these%20constraints%20by%20dramatically%20reducing%20parameter%20count%20and%20computational%20overhead.%20However%2C%20existing%20sparse%20training%20methods%20often%20experience%20chaotic%20and%20noisy%20gradient%20signals%2C%20severely%20hindering%20convergence%20and%20generalization%20performance%2C%20particularly%20at%20high%20sparsity%20levels.%20To%20tackle%20this%20critical%20challenge%2C%20we%20propose%20Zero-Order%20Sharpness-Aware%20Minimization%20%28ZO-SAM%29%2C%20a%20novel%20optimization%20framework%20that%20strategically%20integrates%20zero-order%20optimization%20within%20the%20SAM%20approach.%20Unlike%20traditional%20SAM%2C%20ZO-SAM%20requires%20only%20a%20single%20backpropagation%20step%20during%20perturbation%2C%20selectively%20utilizing%20zero-order%20gradient%20estimations.%20This%20innovative%20approach%20reduces%20the%20backpropagation%20computational%20cost%20by%20half%20compared%20to%20conventional%20SAM%2C%20significantly%20lowering%20gradient%20variance%20and%20effectively%20eliminating%20associated%20computational%20overhead.%20By%20harnessing%20SAM%27s%20capacity%20for%20identifying%20flat%20minima%2C%20ZO-SAM%20stabilizes%20the%20training%20process%20and%20accelerates%20convergence.%20These%20efficiency%20gains%20are%20particularly%20important%20in%20sparse%20training%20scenarios%2C%20where%20computational%20cost%20is%20the%20primary%20bottleneck%20that%20limits%20the%20practicality%20of%20SAM.%20Moreover%2C%20models%20trained%20with%20ZO-SAM%20exhibit%20improved%20robustness%20under%20distribution%20shift%2C%20further%20broadening%20its%20practicality%20in%20real-world%20deployments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13115v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DZO-SAM%253A%2520Zero-Order%2520Sharpness-Aware%2520Minimization%2520for%2520Efficient%2520Sparse%2520Training%26entry.906535625%3DJie%2520Ji%2520and%2520Gen%2520Li%2520and%2520Kaiyuan%2520Deng%2520and%2520Fatemeh%2520Afghah%2520and%2520Xiaolong%2520Ma%26entry.1292438233%3DDeep%2520learning%2520models%252C%2520despite%2520their%2520impressive%2520achievements%252C%2520suffer%2520from%2520high%2520computational%2520costs%2520and%2520memory%2520requirements%252C%2520limiting%2520their%2520usability%2520in%2520resource-constrained%2520environments.%2520Sparse%2520neural%2520networks%2520significantly%2520alleviate%2520these%2520constraints%2520by%2520dramatically%2520reducing%2520parameter%2520count%2520and%2520computational%2520overhead.%2520However%252C%2520existing%2520sparse%2520training%2520methods%2520often%2520experience%2520chaotic%2520and%2520noisy%2520gradient%2520signals%252C%2520severely%2520hindering%2520convergence%2520and%2520generalization%2520performance%252C%2520particularly%2520at%2520high%2520sparsity%2520levels.%2520To%2520tackle%2520this%2520critical%2520challenge%252C%2520we%2520propose%2520Zero-Order%2520Sharpness-Aware%2520Minimization%2520%2528ZO-SAM%2529%252C%2520a%2520novel%2520optimization%2520framework%2520that%2520strategically%2520integrates%2520zero-order%2520optimization%2520within%2520the%2520SAM%2520approach.%2520Unlike%2520traditional%2520SAM%252C%2520ZO-SAM%2520requires%2520only%2520a%2520single%2520backpropagation%2520step%2520during%2520perturbation%252C%2520selectively%2520utilizing%2520zero-order%2520gradient%2520estimations.%2520This%2520innovative%2520approach%2520reduces%2520the%2520backpropagation%2520computational%2520cost%2520by%2520half%2520compared%2520to%2520conventional%2520SAM%252C%2520significantly%2520lowering%2520gradient%2520variance%2520and%2520effectively%2520eliminating%2520associated%2520computational%2520overhead.%2520By%2520harnessing%2520SAM%2527s%2520capacity%2520for%2520identifying%2520flat%2520minima%252C%2520ZO-SAM%2520stabilizes%2520the%2520training%2520process%2520and%2520accelerates%2520convergence.%2520These%2520efficiency%2520gains%2520are%2520particularly%2520important%2520in%2520sparse%2520training%2520scenarios%252C%2520where%2520computational%2520cost%2520is%2520the%2520primary%2520bottleneck%2520that%2520limits%2520the%2520practicality%2520of%2520SAM.%2520Moreover%252C%2520models%2520trained%2520with%2520ZO-SAM%2520exhibit%2520improved%2520robustness%2520under%2520distribution%2520shift%252C%2520further%2520broadening%2520its%2520practicality%2520in%2520real-world%2520deployments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13115v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ZO-SAM%3A%20Zero-Order%20Sharpness-Aware%20Minimization%20for%20Efficient%20Sparse%20Training&entry.906535625=Jie%20Ji%20and%20Gen%20Li%20and%20Kaiyuan%20Deng%20and%20Fatemeh%20Afghah%20and%20Xiaolong%20Ma&entry.1292438233=Deep%20learning%20models%2C%20despite%20their%20impressive%20achievements%2C%20suffer%20from%20high%20computational%20costs%20and%20memory%20requirements%2C%20limiting%20their%20usabili {"title": "Node-RF: Learning Generalized Continuous Space-Time Scene Dynamics with Neural ODE-based NeRFs", "author": "Hiran Sarkar and Liming Kuang and Yordanka Velikova and Benjamin Busam", "abstract": "Predicting scene dynamics from visual observations is challenging. Existing methods capture dynamics only within observed boundaries failing to extrapolate far beyond the training sequence. Node-RF (Neural ODE-based NeRF) overcomes this limitation by integrating Neural Ordinary Differential Equations (NODEs) with dynamic Neural Radiance Fields (NeRFs), enabling a continuous-time, spatiotemporal representation that generalizes beyond observed trajectories at constant memory cost. From visual input, Node-RF learns an implicit scene state that evolves over time via an ODE solver, propagating feature embeddings via differential calculus. A NeRF-based renderer interprets calculated embeddings to synthesize arbitrary views for long-range extrapolation. Training on multiple motion sequences with shared dynamics allows for generalization to unseen conditions. Our experiments demonstrate that Node-RF can characterize abstract system behavior without explicit model to identify critical points for future predictions.", "link": "http://arxiv.org/abs/2603.12078v2", "date": "2026-03-13", "relevancy": 2.092, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5372}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5203}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.52}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Node-RF%3A%20Learning%20Generalized%20Continuous%20Space-Time%20Scene%20Dynamics%20with%20Neural%20ODE-based%20NeRFs&body=Title%3A%20Node-RF%3A%20Learning%20Generalized%20Continuous%20Space-Time%20Scene%20Dynamics%20with%20Neural%20ODE-based%20NeRFs%0AAuthor%3A%20Hiran%20Sarkar%20and%20Liming%20Kuang%20and%20Yordanka%20Velikova%20and%20Benjamin%20Busam%0AAbstract%3A%20Predicting%20scene%20dynamics%20from%20visual%20observations%20is%20challenging.%20Existing%20methods%20capture%20dynamics%20only%20within%20observed%20boundaries%20failing%20to%20extrapolate%20far%20beyond%20the%20training%20sequence.%20Node-RF%20%28Neural%20ODE-based%20NeRF%29%20overcomes%20this%20limitation%20by%20integrating%20Neural%20Ordinary%20Differential%20Equations%20%28NODEs%29%20with%20dynamic%20Neural%20Radiance%20Fields%20%28NeRFs%29%2C%20enabling%20a%20continuous-time%2C%20spatiotemporal%20representation%20that%20generalizes%20beyond%20observed%20trajectories%20at%20constant%20memory%20cost.%20From%20visual%20input%2C%20Node-RF%20learns%20an%20implicit%20scene%20state%20that%20evolves%20over%20time%20via%20an%20ODE%20solver%2C%20propagating%20feature%20embeddings%20via%20differential%20calculus.%20A%20NeRF-based%20renderer%20interprets%20calculated%20embeddings%20to%20synthesize%20arbitrary%20views%20for%20long-range%20extrapolation.%20Training%20on%20multiple%20motion%20sequences%20with%20shared%20dynamics%20allows%20for%20generalization%20to%20unseen%20conditions.%20Our%20experiments%20demonstrate%20that%20Node-RF%20can%20characterize%20abstract%20system%20behavior%20without%20explicit%20model%20to%20identify%20critical%20points%20for%20future%20predictions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12078v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNode-RF%253A%2520Learning%2520Generalized%2520Continuous%2520Space-Time%2520Scene%2520Dynamics%2520with%2520Neural%2520ODE-based%2520NeRFs%26entry.906535625%3DHiran%2520Sarkar%2520and%2520Liming%2520Kuang%2520and%2520Yordanka%2520Velikova%2520and%2520Benjamin%2520Busam%26entry.1292438233%3DPredicting%2520scene%2520dynamics%2520from%2520visual%2520observations%2520is%2520challenging.%2520Existing%2520methods%2520capture%2520dynamics%2520only%2520within%2520observed%2520boundaries%2520failing%2520to%2520extrapolate%2520far%2520beyond%2520the%2520training%2520sequence.%2520Node-RF%2520%2528Neural%2520ODE-based%2520NeRF%2529%2520overcomes%2520this%2520limitation%2520by%2520integrating%2520Neural%2520Ordinary%2520Differential%2520Equations%2520%2528NODEs%2529%2520with%2520dynamic%2520Neural%2520Radiance%2520Fields%2520%2528NeRFs%2529%252C%2520enabling%2520a%2520continuous-time%252C%2520spatiotemporal%2520representation%2520that%2520generalizes%2520beyond%2520observed%2520trajectories%2520at%2520constant%2520memory%2520cost.%2520From%2520visual%2520input%252C%2520Node-RF%2520learns%2520an%2520implicit%2520scene%2520state%2520that%2520evolves%2520over%2520time%2520via%2520an%2520ODE%2520solver%252C%2520propagating%2520feature%2520embeddings%2520via%2520differential%2520calculus.%2520A%2520NeRF-based%2520renderer%2520interprets%2520calculated%2520embeddings%2520to%2520synthesize%2520arbitrary%2520views%2520for%2520long-range%2520extrapolation.%2520Training%2520on%2520multiple%2520motion%2520sequences%2520with%2520shared%2520dynamics%2520allows%2520for%2520generalization%2520to%2520unseen%2520conditions.%2520Our%2520experiments%2520demonstrate%2520that%2520Node-RF%2520can%2520characterize%2520abstract%2520system%2520behavior%2520without%2520explicit%2520model%2520to%2520identify%2520critical%2520points%2520for%2520future%2520predictions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12078v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Node-RF%3A%20Learning%20Generalized%20Continuous%20Space-Time%20Scene%20Dynamics%20with%20Neural%20ODE-based%20NeRFs&entry.906535625=Hiran%20Sarkar%20and%20Liming%20Kuang%20and%20Yordanka%20Velikova%20and%20Benjamin%20Busam&entry.1292438233=Predicting%20scene%20dynamics%20from%20visual%20observations%20is%20challenging.%20Existing%20methods%20capture%20dynamics%20only%20within%20observed%20boundaries%20failing%20to%20extrapolate%20far%20beyond%20the%20training%20sequence.%20Node-RF%20%28Neural%20ODE-based%20NeRF%29%20overcomes%20this%20limitation%20by%20integrating%20Neural%20Ordinary%20Differential%20Equations%20%28NODEs%29%20with%20dynamic%20Neural%20Radiance%20Fields%20%28NeRFs%29%2C%20enabling%20a%20continuous-time%2C%20spatiotemporal%20representation%20that%20generalizes%20beyond%20observed%20trajectories%20at%20constant%20memory%20cost.%20From%20visual%20input%2C%20Node-RF%20learns%20an%20implicit%20scene%20state%20that%20evolves%20over%20time%20via%20an%20ODE%20solver%2C%20propagating%20feature%20embeddings%20via%20differential%20calculus.%20A%20NeRF-based%20renderer%20interprets%20calculated%20embeddings%20to%20synthesize%20arbitrary%20views%20for%20long-range%20extrapolation.%20Training%20on%20multiple%20motion%20sequences%20with%20shared%20dynamics%20allows%20for%20generalization%20to%20unseen%20conditions.%20Our%20experiments%20demonstrate%20that%20Node-RF%20can%20characterize%20abstract%20system%20behavior%20without%20explicit%20model%20to%20identify%20critical%20points%20for%20future%20predictions.&entry.1838667208=http%3A//arxiv.org/abs/2603.12078v2&entry.124074799=Read"},
{"title": "Coordinated Manipulation of Hybrid Deformable-Rigid Objects in Constrained Environments", "author": "Anees Peringal and Anup Teejo Mathew and Panagiotis liatsis and Federico Renda", "abstract": "Coordinated robotic manipulation of deformable linear objects (DLOs), such as ropes and cables, has been widely studied; however, handling hybrid assemblies composed of both deformable and rigid elements in constrained environments remains challenging. This work presents a quasi-static optimization-based manipulation planner that employs a strain-based Cosserat rod model, extending rigid-body formulations to hybrid deformable linear objects (hDLO). The proposed planner exploits the compliance of deformable links to maneuver through constraints while achieving task-space objectives for the object that are unreachable with rigid tools. By leveraging a differentiable model with analytically derived gradients, the method achieves up to a 33x speedup over finite-difference baselines for inverse kinetostatic(IKS) problems. Furthermore, the subsequent trajectory optimization problem, warm-started using the IKS solution, is only practically realizable via analytical derivatives. The proposed algorithm is validated in simulation on various hDLO systems and experimentally on a three-link hDLO manipulated in a constrained environment using a dual-arm robotic system. Experimental results confirm the planner's accuracy, yielding an average deformation error of approximately 3 cm (5% of the deformable link length) between the desired and measured marker positions. Finally, the proposed optimal planner is compared against a sampling-based feasibility planner adapted to the strain-based formulation. The results demonstrate the effectiveness and applicability of the proposed approach for robotic manipulation of hybrid assemblies in constrained environments.", "link": "http://arxiv.org/abs/2603.12940v1", "date": "2026-03-13", "relevancy": 2.0862, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5468}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5294}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coordinated%20Manipulation%20of%20Hybrid%20Deformable-Rigid%20Objects%20in%20Constrained%20Environments&body=Title%3A%20Coordinated%20Manipulation%20of%20Hybrid%20Deformable-Rigid%20Objects%20in%20Constrained%20Environments%0AAuthor%3A%20Anees%20Peringal%20and%20Anup%20Teejo%20Mathew%20and%20Panagiotis%20liatsis%20and%20Federico%20Renda%0AAbstract%3A%20Coordinated%20robotic%20manipulation%20of%20deformable%20linear%20objects%20%28DLOs%29%2C%20such%20as%20ropes%20and%20cables%2C%20has%20been%20widely%20studied%3B%20however%2C%20handling%20hybrid%20assemblies%20composed%20of%20both%20deformable%20and%20rigid%20elements%20in%20constrained%20environments%20remains%20challenging.%20This%20work%20presents%20a%20quasi-static%20optimization-based%20manipulation%20planner%20that%20employs%20a%20strain-based%20Cosserat%20rod%20model%2C%20extending%20rigid-body%20formulations%20to%20hybrid%20deformable%20linear%20objects%20%28hDLO%29.%20The%20proposed%20planner%20exploits%20the%20compliance%20of%20deformable%20links%20to%20maneuver%20through%20constraints%20while%20achieving%20task-space%20objectives%20for%20the%20object%20that%20are%20unreachable%20with%20rigid%20tools.%20By%20leveraging%20a%20differentiable%20model%20with%20analytically%20derived%20gradients%2C%20the%20method%20achieves%20up%20to%20a%2033x%20speedup%20over%20finite-difference%20baselines%20for%20inverse%20kinetostatic%28IKS%29%20problems.%20Furthermore%2C%20the%20subsequent%20trajectory%20optimization%20problem%2C%20warm-started%20using%20the%20IKS%20solution%2C%20is%20only%20practically%20realizable%20via%20analytical%20derivatives.%20The%20proposed%20algorithm%20is%20validated%20in%20simulation%20on%20various%20hDLO%20systems%20and%20experimentally%20on%20a%20three-link%20hDLO%20manipulated%20in%20a%20constrained%20environment%20using%20a%20dual-arm%20robotic%20system.%20Experimental%20results%20confirm%20the%20planner%27s%20accuracy%2C%20yielding%20an%20average%20deformation%20error%20of%20approximately%203%20cm%20%285%25%20of%20the%20deformable%20link%20length%29%20between%20the%20desired%20and%20measured%20marker%20positions.%20Finally%2C%20the%20proposed%20optimal%20planner%20is%20compared%20against%20a%20sampling-based%20feasibility%20planner%20adapted%20to%20the%20strain-based%20formulation.%20The%20results%20demonstrate%20the%20effectiveness%20and%20applicability%20of%20the%20proposed%20approach%20for%20robotic%20manipulation%20of%20hybrid%20assemblies%20in%20constrained%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12940v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoordinated%2520Manipulation%2520of%2520Hybrid%2520Deformable-Rigid%2520Objects%2520in%2520Constrained%2520Environments%26entry.906535625%3DAnees%2520Peringal%2520and%2520Anup%2520Teejo%2520Mathew%2520and%2520Panagiotis%2520liatsis%2520and%2520Federico%2520Renda%26entry.1292438233%3DCoordinated%2520robotic%2520manipulation%2520of%2520deformable%2520linear%2520objects%2520%2528DLOs%2529%252C%2520such%2520as%2520ropes%2520and%2520cables%252C%2520has%2520been%2520widely%2520studied%253B%2520however%252C%2520handling%2520hybrid%2520assemblies%2520composed%2520of%2520both%2520deformable%2520and%2520rigid%2520elements%2520in%2520constrained%2520environments%2520remains%2520challenging.%2520This%2520work%2520presents%2520a%2520quasi-static%2520optimization-based%2520manipulation%2520planner%2520that%2520employs%2520a%2520strain-based%2520Cosserat%2520rod%25 {"title": "LiLAW: Lightweight Learnable Adaptive Weighting to Meta-Learn Sample Difficulty, Improve Noisy Training, Increase Fairness, and Effectively Use Synthetic Data", "author": "Abhishek Moturu and Muhammad Muzammil and Anna Goldenberg and Babak Taati", "abstract": "Training deep neural networks with noise and data heterogeneity is a major challenge. We introduce Lightweight Learnable Adaptive Weighting (LiLAW), a method that dynamically adjusts the loss weight of each training sample based on its evolving difficulty, categorized as easy, moderate, or hard. Using only three learnable parameters, LiLAW adaptively prioritizes informative samples during training by updating these parameters using a single gradient descent step on a validation mini-batch after each training mini-batch. Experiments across multiple general and medical imaging datasets, noise levels/types, loss functions, and architectures with and without pretraining (with linear probing and full fine-tuning) demonstrate that LiLAW's effectiveness, even in high-noise environments, without excessive tuning. We also apply LiLAW to two recently introduced synthetic datasets: SynPAIN (synthetic facial expressions for automated pain detection) and GAITGen (synthetic gait sequences for Parkinson's disease severity estimation). We also validate on ECG5000, a time-series dataset for heartbeat classification, with simple augmentations. We obtain state-of-the-art results on these three datasets. We then use LiLAW on the Adult dataset to show improved fairness. LiLAW is effective without heavy reliance on advanced training techniques or data augmentations, highlighting its practicality, esp. in resource-constrained settings. It offers a computationally efficient solution to boost generalization and robustness in any neural network training setup.", "link": "http://arxiv.org/abs/2509.20786v2", "date": "2026-03-13", "relevancy": 2.0819, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5376}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.535}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4976}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LiLAW%3A%20Lightweight%20Learnable%20Adaptive%20Weighting%20to%20Meta-Learn%20Sample%20Difficulty%2C%20Improve%20Noisy%20Training%2C%20Increase%20Fairness%2C%20and%20Effectively%20Use%20Synthetic%20Data&body=Title%3A%20LiLAW%3A%20Lightweight%20Learnable%20Adaptive%20Weighting%20to%20Meta-Learn%20Sample%20Difficulty%2C%20Improve%20Noisy%20Training%2C%20Increase%20Fairness%2C%20and%20Effectively%20Use%20Synthetic%20Data%0AAuthor%3A%20Abhishek%20Moturu%20and%20Muhammad%20Muzammil%20and%20Anna%20Goldenberg%20and%20Babak%20Taati%0AAbstract%3A%20Training%20deep%20neural%20networks%20with%20noise%20and%20data%20heterogeneity%20is%20a%20major%20challenge.%20We%20introduce%20Lightweight%20Learnable%20Adaptive%20Weighting%20%28LiLAW%29%2C%20a%20method%20that%20dynamically%20adjusts%20the%20loss%20weight%20of%20each%20training%20sample%20based%20on%20its%20evolving%20difficulty%2C%20categorized%20as%20easy%2C%20moderate%2C%20or%20hard.%20Using%20only%20three%20learnable%20parameters%2C%20LiLAW%20adaptively%20prioritizes%20informative%20samples%20during%20training%20by%20updating%20these%20parameters%20using%20a%20single%20gradient%20descent%20step%20on%20a%20validation%20mini-batch%20after%20each%20training%20mini-batch.%20Experiments%20across%20multiple%20general%20and%20medical%20imaging%20datasets%2C%20noise%20levels/types%2C%20loss%20functions%2C%20and%20architectures%20with%20and%20without%20pretraining%20%28with%20linear%20probing%20and%20full%20fine-tuning%29%20demonstrate%20that%20LiLAW%27s%20effectiveness%2C%20even%20in%20high-noise%20environments%2C%20without%20excessive%20tuning.%20We%20also%20apply%20LiLAW%20to%20two%20recently%20introduced%20synthetic%20datasets%3A%20SynPAIN%20%28synthetic%20facial%20expressions%20for%20automated%20pain%20detection%29%20and%20GAITGen%20%28synthetic%20gait%20sequences%20for%20Parkinson%27s%20disease%20severity%20estimation%29.%20We%20also%20validate%20on%20ECG5000%2C%20a%20time-series%20dataset%20for%20heartbeat%20classification%2C%20with%20simple%20augmentations.%20We%20obtain%20state-of-the-art%20results%20on%20these%20three%20datasets.%20We%20then%20use%20LiLAW%20on%20the%20Adult%20dataset%20to%20show%20improved%20fairness.%20LiLAW%20is%20effective%20without%20heavy%20reliance%20on%20advanced%20training%20techniques%20or%20data%20augmentations%2C%20highlighting%20its%20practicality%2C%20esp.%20in%20resource-constrained%20settings.%20It%20offers%20a%20computationally%20efficient%20solution%20to%20boost%20generalization%20and%20robustness%20in%20any%20neural%20network%20training%20setup.%0ALink%3A%20http%3A//arxiv.org/abs/2509.20786v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLiLAW%253A%2520Lightweight%2520Learnable%2520Adaptive%2520Weighting%2520to%2520Meta-Learn%2520Sample%2520Difficulty%252C%2520Improve%2520Noisy%2520Training%252C%2520Increase%2520Fairness%252C%2520and%2520Effectively%2520Use%2520Synthetic%2520Data%26entry.906535625%3DAbhishek%2520Moturu%2520and%2520Muhammad%2520Muzammil%2520and%2520Anna%2520Goldenberg%2520and%2520Babak%2520Taati%26entry.1292438233%3DTraining%2520deep%2520neural%2520networks%2520with%2520noise%2520and%2520data%2520heterogeneity%2520is%2520a%2520major%2520challenge.%2520We%2520introduce%2520Lightweight%2520Learnable%2520Adaptive%2520Weighting%2520%2528LiLAW%2529%252C%2520a%2520method%2520that%2520dynamically%2520adjusts%2520the%2520loss%2520weight%2520of%2520each%2520training%2520sampl lution%2520to%2520boost%2520generalization%2520and%2520robustness%2520in%2520any%2520neural%2520network%2520training%2520setup.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.20786v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LiLAW%3A%20Lightweight%20Learnable%20Adaptive%20Weighting%20to%20Meta-Learn%20Sample%20Difficulty%2C%20Improve%20Noisy%20Training%2C%20Increase%20Fairness%2C%20and%20Effectively%20Use%20Synthetic%20Data&entry.906535625=Abhishek%20Moturu%20and%20Muhammad%20Muzammil%20and%20Anna%20Goldenberg%20and%20Babak%20Taati&entry.1292438233=Training%20deep%20neural%20networks%20with%20noise%20and%20data%20heterogeneity%20is%20a%20major%20challenge.%20We%20introduce%20Lightweight%20Learnable%20Adaptive%20Weighting%20%28LiLAW%29%2C%20a%20method%20that%20dynamically%20adjusts%20the%20loss%20weight%20of%20each%20training%20sample%20based%20on%20its%20evolving%20difficulty%2C%20categorized%20as%20easy%2C%20moderate%2C%20or%20hard.%20Using%20only%20three%20learnable%20parameters%2C%20LiLAW%20adaptively%20prioritizes%20informative%20samples%20during%20training%20by%20updating%20these%20parameters%20using%20a%20single%20gradient%20descent%20step%20on%20a%20validation%20mini-batch%20after%20each%20training%20mini-batch.%20Experiments%20across%20multiple%20general%20and%20medical%20imaging%20datasets%2C%20noise%20levels/types%2C%20loss%20functions%2C%20and%20architectures%20with%20and%20without%20pretraining%20%28with%20linear%20probing%20and%20full%20fine-tuning%29%20demonstrate%20that%20LiLAW%27s%20effectiveness%2C%20even%20in%20high-noise%20environments%2C%20without%20excessive%20tuning.%20We%20also%20apply%20LiLAW%20to%20two%20recently%20introduced%20synthetic%20datasets%3A%20SynPAIN%20%28synthetic%20facial%20expressions%20for%20automated%20pain%20detection%29%20and%20GAITGen%20%28synthetic%20gait%20sequences%20for%20Parkinson%27s%20disease%20severity {"title": "FDeID-Toolbox: Face De-Identification Toolbox", "author": "Hui Wei and Hao Yu and Guoying Zhao", "abstract": "Face de-identification (FDeID) aims to remove personally identifiable information from facial images while preserving task-relevant utility attributes such as age, gender, and expression. It is critical for privacy-preserving computer vision, yet the field suffers from fragmented implementations, inconsistent evaluation protocols, and incomparable results across studies. These challenges stem from the inherent complexity of the task: FDeID spans multiple downstream applications (e.g., age estimation, gender recognition, expression analysis) and requires evaluation across three dimensions (e.g., privacy protection, utility preservation, and visual quality), making existing codebases difficult to use and extend. To address these issues, we present FDeID-Toolbox, a comprehensive toolbox designed for reproducible FDeID research. Our toolbox features a modular architecture comprising four core components: (1) standardized data loaders for mainstream benchmark datasets, (2) unified method implementations spanning classical approaches to SOTA generative models, (3) flexible inference pipelines, and (4) systematic evaluation protocols covering privacy, utility, and quality metrics. Through experiments, we demonstrate that FDeID-Toolbox enables fair and reproducible comparison of diverse FDeID methods under consistent conditions.", "link": "http://arxiv.org/abs/2603.13121v1", "date": "2026-03-13", "relevancy": 2.0758, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5485}, {"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.5053}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4948}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FDeID-Toolbox%3A%20Face%20De-Identification%20Toolbox&body=Title%3A%20FDeID-Toolbox%3A%20Face%20De-Identification%20Toolbox%0AAuthor%3A%20Hui%20Wei%20and%20Hao%20Yu%20and%20Guoying%20Zhao%0AAbstract%3A%20Face%20de-identification%20%28FDeID%29%20aims%20to%20remove%20personally%20identifiable%20information%20from%20facial%20images%20while%20preserving%20task-relevant%20utility%20attributes%20such%20as%20age%2C%20gender%2C%20and%20expression.%20It%20is%20critical%20for%20privacy-preserving%20computer%20vision%2C%20yet%20the%20field%20suffers%20from%20fragmented%20implementations%2C%20inconsistent%20evaluation%20protocols%2C%20and%20incomparable%20results%20across%20studies.%20These%20challenges%20stem%20from%20the%20inherent%20complexity%20of%20the%20task%3A%20FDeID%20spans%20multiple%20downstream%20applications%20%28e.g.%2C%20age%20estimation%2C%20gender%20recognition%2C%20expression%20analysis%29%20and%20requires%20evaluation%20across%20three%20dimensions%20%28e.g.%2C%20privacy%20protection%2C%20utility%20preservation%2C%20and%20visual%20quality%29%2C%20making%20existing%20codebases%20difficult%20to%20use%20and%20extend.%20To%20address%20these%20issues%2C%20we%20present%20FDeID-Toolbox%2C%20a%20comprehensive%20toolbox%20designed%20for%20reproducible%20FDeID%20research.%20Our%20toolbox%20features%20a%20modular%20architecture%20comprising%20four%20core%20components%3A%20%281%29%20standardized%20data%20loaders%20for%20mainstream%20benchmark%20datasets%2C%20%282%29%20unified%20method%20implementations%20spanning%20classical%20approaches%20to%20SOTA%20generative%20models%2C%20%283%29%20flexible%20inference%20pipelines%2C%20and%20%284%29%20systematic%20evaluation%20protocols%20covering%20privacy%2C%20utility%2C%20and%20quality%20metrics.%20Through%20experiments%2C%20we%20demonstrate%20that%20FDeID-Toolbox%20enables%20fair%20and%20reproducible%20comparison%20of%20diverse%20FDeID%20methods%20under%20consistent%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13121v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFDeID-Toolbox%253A%2520Face%2520De-Identification%2520Toolbox%26entry.906535625%3DHui%2520Wei%2520and%2520Hao%2520Yu%2520and%2520Guoying%2520Zhao%26entry.1292438233%3DFace%2520de-identification%2520%2528FDeID%2529%2520aims%2520to%2520remove%2520personally%2520identifiable%2520information%2520from%2520facial%2520images%2520while%2520preserving%2520task-relevant%2520utility%2520attributes%2520such%2520as%2520age%252C%2520gender%252C%2520and%2520expression.%2520It%2520is%2520critical%2520for%2520privacy-preserving%2520computer%2520vision%252C%2520yet%2520the%2520field%2520suffers%2520from%2520fragmented%2520implementations%252C%2520inconsistent%2520evaluation%2520protocols%252C%2520and%2520incomparable%2520results%2520across%2520studies.%2520These%2520challenges%2520stem%2520from%2520the%2520inherent%2520complexity%2520of%2520the%2520task%253A%2520FDeID%2520spans%2520multiple%2520downstream%2520applications%2520%2528e.g.%252C%2520age%2520estimation%252C%2520gender%2520recognition%252C%2520expression%2520analysis%2529%2520and%2520requires%2520evaluation%2520across%2520three%2520dimensions%2520%2528e.g.%252C%2520privacy%2520protection%252C%2520utility%2520preservation%252C%2520and%2520visual%2520quality%2529%252C%2520making%2520existing%2520codebases%2520difficult%2520to%2520use%2520and%2520extend.%2520To%2520address%2520these%2520issues%252C%2520we%2520present%2520FDeID-Toolbox%252C%2520a%2520comprehensive%2520toolbox%2520designed%2520for%2520reproducible%2520FDeID%2520research.%2520Our%2520toolbox%2520features%2520a%2520modular%2520architecture%2520comprising%2520four%2520core%2520components%253A%2520%25281%2529%2520standardized%2520data%2520loaders%2520for%2520mainstream%2520benchmark%2520datasets%252C%2520%25282%2529%2520unified%2520method%2520implementations%2520spanning%2520classical%2520approaches%2520to%2520SOTA%2520generative%2520models%252C%2520%25283%2529%2520flexible%2520inference%2520pipelines%252C%2520and%2520%25284%2529%2520systematic%2520evaluation%2520protocols%2520covering%2520privacy%252C%2520utility%252C%2520and%2520quality%2520metrics.%2520Through%2520experiments%252C%2520we%2520demonstrate%2520that%2520FDeID-Toolbox%2520enables%2520fair%2520and%2520reproducible%2520comparison%2520of%2520diverse%2520FDeID%2520methods%2520under%2520consistent%2520conditions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13121v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FDeID-Toolbox%3A%20Face%20De-Identification%20Toolbox&entry.906535625=Hui%20Wei%20and%20Hao%20Yu%20and%20Guoying%20Zhao&entry.1292438233=Face%20de-identification%20%28FDeID%29%20aims%20to%20remove%20personally%20identifiable%20information%20from%20facial%20images%20while%20preserving%20task-relevant%20utility%20attributes%20such%20as%20age%2C%20gender%2C%20and%20expression.%20It%20is%20critical%20for%20privacy-preserving%20computer%20vision%2C%20yet%20the%20field%20suffers%20from%20fragmented%20implementations%2C%20inconsistent%20evaluation%20protocols%2C%20and%20incomparable%20results%20across%20studies.%20These%20challenges%20stem%20from%20the%20inherent%20complexity%20of%20the%20task%3A%20FDeID%20spans%20multiple%20downstream%20applications%20%28e.g.%2C%20age%20estimation%2C%20gender%20recognition%2C%20expression%20analysis%29%20and%20requires%20evaluation%20across%20three%20dimensions%20%28e.g.%2C%20privacy%20protection%2C%20utility%20preservation%2C%20and%20visual%20quality%29%2C%20making%20existing%20codebases%20difficult%20to%20use%20and%20extend.%20To%20address%20these%20issues%2C%20we%20present%20FDeID-Toolbox%2C%20a%20comprehensive%20toolbox%20designed%20for%20reproducible%20FDeID%20research.%20Our%20toolbox%20features%20a%20modular%20architecture%20comprising%20four%20core%20components%3A%20%281%29%20standardized%20data%20loaders%20for%20mainstream%20benchmark%20datasets%2C%20%282%29%20unified%20method%20implementations%20spanning%20classical%20approaches%20to%20SOTA%20generative%20models%2C%20%283%29%20flexible%20inference%20pipelines%2C%20and%20%284%29%20systematic%20evaluation%20protocols%20covering%20privacy%2C%20utility%2C%20and%20quality%20metrics.%20Through%20experiments%2C%20we%20demonstrate%20that%20FDeID-Toolbox%20enables%20fair%20and%20reproducible%20comparison%20of%20diverse%20FDeID%20methods%20under%20consistent%20conditions.&entry.1838667208=http%3A//arxiv.org/abs/2603.13121v1&entry.124074799=Read"},
{"title": "Perceive What Matters: Relevance-Driven Scheduling for Multimodal Streaming Perception", "author": "Dingcheng Huang and Xiaotong Zhang and Kamal Youcef-Toumi", "abstract": "In modern human-robot collaboration (HRC) applications, multiple perception modules jointly extract visual, auditory, and contextual cues to achieve comprehensive scene understanding, enabling the robot to provide appropriate assistance to human agents intelligently. While executing multiple perception modules on a frame-by-frame basis enhances perception quality in offline settings, it inevitably accumulates latency, leading to a substantial decline in system performance in streaming perception scenarios. Recent work in scene understanding, termed Relevance, has established a solid foundation for developing efficient methodologies in HRC. However, modern perception pipelines still face challenges related to information redundancy and suboptimal allocation of computational resources. Drawing inspiration from the Relevance concept and the information sparsity in HRC events, we propose a novel lightweight perception scheduling framework that efficiently leverages output from previous frames to estimate and schedule necessary perception modules in real-time based on scene context. The experimental results demonstrate that the proposed perception scheduling framework effectively reduces computational latency by up to 27.52% compared to conventional parallel perception pipelines, while also achieving a 72.73% improvement in MMPose activation recall. Additionally, the framework demonstrates high keyframe accuracy, achieving rates of up to 98%. The results validate the framework's capability to enhance real-time perception efficiency without significantly compromising accuracy. The framework shows potential as a scalable and systematic solution for multimodal streaming perception systems in HRC.", "link": "http://arxiv.org/abs/2603.13176v1", "date": "2026-03-13", "relevancy": 2.0557, "topK": {"title": "Efficient Real-World Autonomous Racing via Attenuated Residual Policy Optimization", "author": "Raphael Trumpp and Denis Hoornaert and Mirco Theile and Marco Caccamo", "abstract": "Residual policy learning (RPL), in which a learned policy refines a static base policy using deep reinforcement learning (DRL), has shown strong performance across various robotic applications. Its effectiveness is particularly evident in autonomous racing, a domain that serves as a challenging benchmark for real-world DRL. However, deploying RPL-based controllers introduces system complexity and increases inference latency. We address this by introducing an extension of RPL named attenuated residual policy optimization ($\u03b1$-RPO). Unlike standard RPL, $\u03b1$-RPO yields a standalone neural policy by progressively attenuating the base policy, which initially serves to bootstrap learning. Furthermore, this mechanism enables a form of privileged learning, where the base policy is permitted to use sensor modalities not required for final deployment. We design $\u03b1$-RPO to integrate seamlessly with PPO, ensuring that the attenuated influence of the base controller is dynamically compensated during policy optimization. We evaluate $\u03b1$-RPO by building a framework for 1:10-scaled autonomous racing around it. In both simulation and zero-shot real-world transfer to Roboracer cars, $\u03b1$-RPO not only reduces system complexity but also improves driving performance compared to baselines - demonstrating its practicality for robotic deployment. Our code is available at: https://github.com/raphajaner/arpo_racing.", "link": "http://arxiv.org/abs/2603.12960v1", "date": "2026-03-13", "relevancy": 2.0478, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5316}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5285}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4875}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Real-World%20Autonomous%20Racing%20via%20Attenuated%20Residual%20Policy%20Optimization&body=Title%3A%20Efficient%20Real-World%20Autonomous%20Racing%20via%20Attenuated%20Residual%20Policy%20Optimization%0AAuthor%3A%20Raphael%20Trumpp%20and%20Denis%20Hoornaert%20and%20Mirco%20Theile%20and%20Marco%20Caccamo%0AAbstract%3A%20Residual%20policy%20learning%20%28RPL%29%2C%20in%20which%20a%20learned%20policy%20refines%20a%20static%20base%20policy%20using%20deep%20reinforcement%20learning%20%28DRL%29%2C%20has%20shown%20strong%20performance%20across%20various%20robotic%20applications.%20Its%20effectiveness%20is%20particularly%20evident%20in%20autonomous%20racing%2C%20a%20domain%20that%20serves%20as%20a%20challenging%20benchmark%20for%20real-world%20DRL.%20However%2C%20deploying%20RPL-based%20controllers%20introduces%20system%20complexity%20and%20increases%20inference%20latency.%20We%20address%20this%20by%20introducing%20an%20extension%20of%20RPL%20named%20attenuated%20residual%20policy%20optimization%20%28%24%CE%B1%24-RPO%29.%20Unlike%20standard%20RPL%2C%20%24%CE%B1%24-RPO%20yields%20a%20standalone%20neural%20policy%20by%20progressively%20attenuating%20the%20base%20policy%2C%20which%20initially%20serves%20to%20bootstrap%20learning.%20Furthermore%2C%20this%20mechanism%20enables%20a%20form%20of%20privileged%20learning%2C%20where%20the%20base%20policy%20is%20permitted%20to%20use%20sensor%20modalities%20not%20required%20for%20final%20deployment.%20We%20design%20%24%CE%B1%24-RPO%20to%20integrate%20seamlessly%20with%20PPO%2C%20ensuring%20that%20the%20attenuated%20influence%20of%20the%20base%20controller%20is%20dynamically%20compensated%20during%20policy%20optimization.%20We%20evaluate%20%24%CE%B1%24-RPO%20by%20building%20a%20framework%20for%201%3A10-scaled%20autonomous%20racing%20around%20it.%20In%20both%20simulation%20and%20zero-shot%20real-world%20transfer%20to%20Roboracer%20cars%2C%20%24%CE%B1%24-RPO%20not%20only%20reduces%20system%20complexity%20but%20also%20improves%20driving%20performance%20compared%20to%20baselines%20-%20demonstrating%20its%20practicality%20for%20robotic%20deployment.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/raphajaner/arpo_racing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12960v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Real-World%2520Autonomous%2520Racing%2520via%2520Attenuated%2520Residual%2520Policy%2520Optimization%26entry.906535625%3DRaphael%2520Trumpp%2520and%2520Denis%2520Hoornaert%2520and%2520Mirco%2520Theile%2520and%2520Marco%2520Caccamo%26entry.1292438233%3DResidual%2520policy%2520learning%2520%2528RPL%2529%252C%2520in%2520which%2520a%2520learned%2520policy%2520refines%2520a%2520static%2520base%2520policy%2520using%2520deep%2520reinforcement%2520learning%2520%2528DRL%2529%252C%2520has%2520shown%2520strong%2520performance%2520across%2520various%2520robotic%2520applications.%2520Its%2520effectiveness%2520is%2520particularly%2520evident%2520in%2520autonomous%2520racing%252C%2520a%2520domain%2520that%2520serves%2520as%2520a%2520challenging%2520benchmark%2520for%2520real-world%2520DRL.%2520However%252C%2520deploying%2520RPL-based%2520controllers%2520introduces%2520system%2520complexity%2520and%2520increases%2520inference%2520latency.%2520We%2520address%2520this%2520by%2520introducing%2520an%2520extension%2520of%2520RPL%2520named%2520attenuated%2520residual%2520policy%2520optimization%2520%2528%2524%25CE%25B1%2524-RPO%2529.%2520Unlike%2520standard%2520RPL%252C%2520%2524%25CE%25B1%2524-RPO%2520yields%2520a%2520standalone%2520neural%2520policy%2520by%2520progressively%2520attenuating%2520t

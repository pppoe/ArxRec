{"title": "From Plausibility to Verifiability: Risk-Controlled Generative OCR for Vision-Language Models", "author": "Weile Gong and Yiping Zuo and Zijian Lu and Xin He and Weibei Fan and Lianyong Qi and Shi Jin", "abstract": "Modern vision-language models (VLMs) can act as generative OCR engines, yet open-ended decoding can expose rare but consequential failures. We identify a core deployment misalignment in generative OCR. Autoregressive decoding favors semantic plausibility, whereas OCR requires outputs that are visually grounded and geometrically verifiable. This mismatch produces severe errors, especially over-generation and unsupported substitutions, creating deployment risk even when benchmark accuracy remains high. We therefore formulate frozen VLM OCR as a selective accept/abstain problem and propose a model-agnostic Geometric Risk Controller. The controller probes multiple structured views of the same input, applies lightweight structural screening, and accepts a transcription only when cross-view consensus and stability satisfy predefined criteria, yielding a small family of operating points. Experiments on frozen VLM backbones and standard OCR benchmarks show consistent reductions in extreme-error risk and catastrophic over-generation at predictable coverage costs. Reliable deployment of generative OCR with frozen VLMs benefits from explicit system-level risk control rather than unconstrained generation.", "link": "http://arxiv.org/abs/2603.19790v2", "date": "2026-03-31", "relevancy": 2.7102, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5546}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5429}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Plausibility%20to%20Verifiability%3A%20Risk-Controlled%20Generative%20OCR%20for%20Vision-Language%20Models&body=Title%3A%20From%20Plausibility%20to%20Verifiability%3A%20Risk-Controlled%20Generative%20OCR%20for%20Vision-Language%20Models%0AAuthor%3A%20Weile%20Gong%20and%20Yiping%20Zuo%20and%20Zijian%20Lu%20and%20Xin%20He%20and%20Weibei%20Fan%20and%20Lianyong%20Qi%20and%20Shi%20Jin%0AAbstract%3A%20Modern%20vision-language%20models%20%28VLMs%29%20can%20act%20as%20generative%20OCR%20engines%2C%20yet%20open-ended%20decoding%20can%20expose%20rare%20but%20consequential%20failures.%20We%20identify%20a%20core%20deployment%20misalignment%20in%20generative%20OCR.%20Autoregressive%20decoding%20favors%20semantic%20plausibility%2C%20whereas%20OCR%20requires%20outputs%20that%20are%20visually%20grounded%20and%20geometrically%20verifiable.%20This%20mismatch%20produces%20severe%20errors%2C%20especially%20over-generation%20and%20unsupported%20substitutions%2C%20creating%20deployment%20risk%20even%20when%20benchmark%20accuracy%20remains%20high.%20We%20therefore%20formulate%20frozen%20VLM%20OCR%20as%20a%20selective%20accept/abstain%20problem%20and%20propose%20a%20model-agnostic%20Geometric%20Risk%20Controller.%20The%20controller%20probes%20multiple%20structured%20views%20of%20the%20same%20input%2C%20applies%20lightweight%20structural%20screening%2C%20and%20accepts%20a%20transcription%20only%20when%20cross-view%20consensus%20and%20stability%20satisfy%20predefined%20criteria%2C%20yielding%20a%20small%20family%20of%20operating%20points.%20Experiments%20on%20frozen%20VLM%20backbones%20and%20standard%20OCR%20benchmarks%20show%20consistent%20reductions%20in%20extreme-error%20risk%20and%20catastrophic%20over-generation%20at%20predictable%20coverage%20costs.%20Reliable%20deployment%20of%20generative%20OCR%20with%20frozen%20VLMs%20benefits%20from%20explicit%20system-level%20risk%20control%20rather%20than%20unconstrained%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19790v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Plausibility%2520to%2520Verifiability%253A%2520Risk-Controlled%2520Generative%2520OCR%2520for%2520Vision-Language%2520Models%26entry.906535625%3DWeile%2520Gong%2520and%2520Yiping%2520Zuo%2520and%2520Zijian%2520Lu%2520and%2520Xin%2520He%2520and%2520Weibei%2520Fan%2520and%2520Lianyong%2520Qi%2520and%2520Shi%2520Jin%26entry.1292438233%3DModern%2520vision-language%2520models%2520%2528VLMs%2529%2520can%2520act%2520as%2520generative%2520OCR%2520engines%252C%2520yet%2520open-ended%2520decoding%2520can%2520expose%2520rare%2520but%2520consequential%2520failures.%2520We%2520identify%2520a%2520core%2520deployment%2520misalignment%2520in%2520generative%2520OCR.%2520Autoregressive%2520decoding%2520favors%2520semantic%2520plausibility%252C%2520whereas%2520OCR%2520requires%2520outputs%2520that%2520are%2520visually%2520grounded%2520and%2520geometrically%2520verifiable.%2520This%2520mismatch%2520produces%2520severe%2520errors%252C%2520especially%2520over-generation%2520and%2520unsupported%2520substitutions%252C%2520creating%2520deployment%2520risk%2520even%2520when%2520benchmark%2520accuracy%2520remains%2520high.%2520We%2520therefore%2520formulate%2520frozen%2520VLM%2520OCR%2520as%2520a%2520selective%2520accept/abstain%2520problem%2520and%2520propose%2520a%2520model-agnostic%2520Geometric%2520Risk%2520Controller.%2520The%2520controller%2520probes%2520multiple%2520structured%2520views%2520of%2520the%2520same%2520input%252C%2520applies%2520lightweight%2520structural%2520screening%252C%2520and%2520accepts%2520a%2520transcription%2520only%2520when%2520cross-view%2520consensus%2520and%2520stability%2520satisfy%2520predefined%2520criteria%252C%2520yielding%2520a%2520small% {"title": "ReCALL: Recalibrating Capability Degradation for MLLM-based Composed Image Retrieval", "author": "Tianyu Yang and Chenwei He and Xiangzhao Hao and Tianyue Wang and Jiarui Guo and Haiyun Guo and Leigang Qu and Jinqiao Wang and Tat-Seng Chua", "abstract": "Composed Image Retrieval (CIR) aims to retrieve target images based on a hybrid query comprising a reference image and a modification text. Early dual-tower Vision-Language Models (VLMs) struggle with cross-modality compositional reasoning required for this task. While adapting generative Multimodal Large Language Models (MLLMs) for retrieval offers a promising direction, we identify that this strategy overlooks a fundamental issue: compressing a generative MLLM into a single-embedding discriminative retriever triggers a paradigm conflict, which leads to Capability Degradation - the deterioration of native fine-grained reasoning after retrieval adaptation. To address this challenge, we propose ReCALL, a model-agnostic framework that follows a diagnose-generate-refine pipeline: First, we diagnose cognitive blind spots of the retriever via self-guided informative instance mining. Next, we generate corrective instructions and triplets by prompting the foundation MLLM and conduct quality control with VQA-based consistency filtering. Finally, we refine the retriever through continual training on these triplets with a grouped contrastive scheme, thereby internalizing fine-grained visual-semantic distinctions and realigning the discriminative embedding space of retriever with intrinsic compositional reasoning within the MLLM. Extensive experiments on CIRR and FashionIQ show that ReCALL consistently recalibrates degraded capabilities and achieves state-of-the-art performance. Code is available at https://github.com/RemRico/Recall.", "link": "http://arxiv.org/abs/2602.01639v2", "date": "2026-03-31", "relevancy": 2.707, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5473}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5401}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReCALL%3A%20Recalibrating%20Capability%20Degradation%20for%20MLLM-based%20Composed%20Image%20Retrieval&body=Title%3A%20ReCALL%3A%20Recalibrating%20Capability%20Degradation%20for%20MLLM-based%20Composed%20Image%20Retrieval%0AAuthor%3A%20Tianyu%20Yang%20and%20Chenwei%20He%20and%20Xiangzhao%20Hao%20and%20Tianyue%20Wang%20and%20Jiarui%20Guo%20and%20Haiyun%20Guo%20and%20Leigang%20Qu%20and%20Jinqiao%20Wang%20and%20Tat-Seng%20Chua%0AAbstract%3A%20Composed%20Image%20Retrieval%20%28CIR%29%20aims%20to%20retrieve%20target%20images%20based%20on%20a%20hybrid%20query%20comprising%20a%20reference%20image%20and%20a%20modification%20text.%20Early%20dual-tower%20Vision-Language%20Models%20%28VLMs%29%20struggle%20with%20cross-modality%20compositional%20reasoning%20required%20for%20this%20task.%20While%20adapting%20generative%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20for%20retrieval%20offers%20a%20promising%20direction%2C%20we%20identify%20that%20this%20strategy%20overlooks%20a%20fundamental%20issue%3A%20compressing%20a%20generative%20MLLM%20into%20a%20single-embedding%20discriminative%20retriever%20triggers%20a%20paradigm%20conflict%2C%20which%20leads%20to%20Capability%20Degradation%20-%20the%20deterioration%20of%20native%20fine-grained%20reasoning%20after%20retrieval%20adaptation.%20To%20address%20this%20challenge%2C%20we%20propose%20ReCALL%2C%20a%20model-agnostic%20framework%20that%20follows%20a%20diagnose-generate-refine%20pipeline%3A%20First%2C%20we%20diagnose%20cognitive%20blind%20spots%20of%20the%20retriever%20via%20self-guided%20info {"title": "EC-Bench: Enumeration and Counting Benchmark for Ultra-Long Videos", "author": "Fumihiko Tsuchiya and Taiki Miyanishi and Mahiro Ukai and Nakamasa Inoue and Shuhei Kurita and Yusuke Iwasawa and Yutaka Matsuo", "abstract": "Counting in long videos remains a fundamental yet underexplored challenge in computer vision. Real-world recordings often span tens of minutes or longer and contain sparse, diverse events, making long-range temporal reasoning particularly difficult. However, most existing video counting benchmarks focus on short clips and evaluate only the final numerical answer, providing little insight into what should be counted or whether models consistently identify relevant instances across time. We introduce EC-Bench, a benchmark that jointly evaluates enumeration, counting, and temporal evidence grounding in long-form videos. EC-Bench contains 152 videos longer than 30 minutes and 1,699 queries paired with explicit evidence spans. Across 22 multimodal large language models (MLLMs), the best model achieves only 29.98% accuracy on Enumeration and 23.74% on Counting, while human performance reaches 78.57% and 82.97%, respectively. Our analysis reveals strong relationships between enumeration accuracy, temporal grounding, and counting performance. These results highlight fundamental limitations of current MLLMs and establish EC-Bench as a challenging benchmark for long-form quantitative video reasoning.", "link": "http://arxiv.org/abs/2603.29943v1", "date": "2026-03-31", "relevancy": 2.6898, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5461}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5461}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapte ging%20benchmark%20for%20long-form%20quantitative%20video%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29943v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEC-Bench%253A%2520Enumeration%2520and%2520Counting%2520Benchmark%2520for%2520Ultra-Long%2520Videos%26entry.906535625%3DFumihiko%2520Tsuchiya%2520and%2520Taiki%2520Miyanishi%2520and%2520Mahiro%2520Ukai%2520and%2520Nakamasa%2520Inoue%2520and%2520Shuhei%2520Kurita%2520and%2520Yusuke%2520Iwasawa%2520and%2520Yutaka%2520Matsuo%26entry.1292438233%3DCounting%2520in%2520long%2520videos%2520remains%2520a%2520fundamental%2520yet%2520underexplored%2520challenge%2520in%2520computer%2520vision.%2520Real-world%2520recordings%2520often%2520span%2520tens%2520of%2520minutes%2520or%2520longer%2520and%2520contain%2520sparse%252C%2520diverse%2520events%252C%2520making%2520long-range%2520temporal%2520reasoning%2520particularly%2520difficult.%2520However%252C%2520most%2520existing%2520video%2520counting%2520benchmarks%2520focus%2520on%2520short%2520clips%2520and%2520evaluate%2520only%2520the%2520final%2520numerical%2520answer%252C%2520providing%2520little%2520insight%2520into%2520what%2520should%2520be%2520counted%2520or%2520whether%2520models%2520consistently%2520identify%2520relevant%2520instances%2520across%2520time.%2520We%2520introduce%2520EC-Bench%252C%2520a%2520benchmark%2520that%2520jointly%2520evaluates%2520enumeration%252C%2520counting%252C%2520and%2520temporal%2520evidence%2520grounding%2520in%2520long-form%2520videos.%2520EC-Bench%2520contains%2520152%2520videos%2520longer%2520than%252030%2520minutes%2520and%25201%252C699%2520queries%2520paired%2520with%2520explicit%2520evidence%2520spans.%2520Across%252022%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%252C%2520the%2520best%2520model%2520achieves%2520only%252029.98%2525%2520accuracy%2520on%2520Enumeration%2520and%252023.74%2525%2520on%2520Counting%252C%25 {"title": "Multi-Modal Representation Learning via Semi-Supervised Rate Reduction for Generalized Category Discovery", "author": "Wei He and Xianghan Meng and Zhiyuan Huang and Xianbiao Qi and Rong Xiao and Chun-Guang Li", "abstract": "Generalized Category Discovery (GCD) aims to identify both known and unknown categories, with only partial labels given for the known categories, posing a challenging open-set recognition problem. State-of-the-art approaches for GCD task are usually built on multi-modality representation learning, which is heavily dependent upon inter-modality alignment. However, few of them cast a proper intra-modality alignment to generate a desired underlying structure of representation distributions. In this paper, we propose a novel and effective multi-modal representation learning framework for GCD via Semi-Supervised Rate Reduction, called SSR$^2$-GCD, to learn cross-modality representations with desired structural properties based on emphasizing to properly align intra-modality relationships. Moreover, to boost knowledge transfer, we integrate prompt candidates by leveraging the inter-modal alignment offered by Vision Language Models. We conduct extensive experiments on generic and fine-grained benchmark datasets demonstrating superior performance of our approach.", "link": "http://arxiv.org/abs/2602.19910v2", "date": "2026-03-31", "relevancy": 2.6697, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5655}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5277}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5086}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Modal%20Representation%20Learning%20via% {"title": "BigEarthNet.txt: A Large-Scale Multi-Sensor Image-Text Dataset and Benchmark for Earth Observation", "author": "Johann-Ludwig Herzog and Mathis J\u00fcrgen Adler and Leonard Hackel and Yan Shu and Angelos Zavras and Ioannis Papoutsis and Paolo Rota and Beg\u00fcm Demir", "abstract": "Vision-langugage models (VLMs) have shown strong performance in computer vision (CV), yet their performance on remote sensing (RS) data remains limited due to the lack of large-scale, multi-sensor RS image-text datasets with diverse textual annotations. Existing datasets predominantly include aerial Red-Green-Blue imagery, with short or weakly grounded captions, and provide limited diversity in annotation types. To address this limitation, we introduce BigEarthNet.txt, a large-scale, multi-sensor image-text dataset designed to advance instruction-driven image-text learning in Earth observation across multiple tasks. BigEarthNet.txt contains 464044 co-registered Sentinel-1 synthetic aperture radar and Sentinel-2 multispectral images with 9.6M text annotations, including: i) geographically anchored captions describing land-use/land-cover (LULC) classes, their spatial relations, and environmental context; ii) visual question answering pairs relevant for different tasks; and iii) referring expression detection instructions for bounding box prediction. Through a comparative statistical analysis, we demonstrate that BigEarthNet.txt surpasses existing RS image-text datasets in textual richness and annotation type variety. We further establish a manually-verified benchmark split to evaluate VLMs in RS and CV. The results show the limitations of these models on tasks that involve complex LULC classes, whereas fine-tuning using BigEarthNet.txt results in consistent performance gains across all considered tasks.", "link": "http://arxiv.org/abs/2603.29630v1", "date": "2026-03-31", "relevancy": 2.6694, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n hored%20captions%20describing%20land-use/land-cover%20%28LULC%29%20classes%2C%20their%20spatial%20relations%2C%20and%20environmental%20context%3B%20ii%29%20visual%20question%20answering%20pairs%20relevant%20for%20different%20tasks%3B%20and%20iii%29%20referring%20expression%20detection%20instructions%20for%20bounding%20box%20prediction.%20Through%20a%20comparative%20statistical%20analysis%2C%20we%20demonstrate%20that%20BigEarthNet.txt%20surpasses%20existing%20RS%20image-text%20datasets%20in%20textual%20richness%20and%20annotation%20type%20variety.%20We%20further%20establish%20a%20manually-verified%20benchmark%20split%20to%20evaluate%20VLMs%20in%20RS%20and%20CV.%20The%20results%20show%20the%20limitations%20of%20these%20models%20on%20tasks%20that%20involve%20complex%20LULC%20classes%2C%20whereas%20fine-tuning%20using%20BigEarthNet.txt%20results%20in%20consistent%20performance%20gains%20across%20all%20considered%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29630v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBigEarthNet.txt%253A%2520A%2520Large-Scale%2520Multi-Sensor%2520Image-Text%2520Dataset%2520and%2520Benchmark%2520for%2520Earth%2520Observation%26entry.906535625%3DJohann-Ludwig%2520Herzog%2520and%2520Mathis%2520J%25C3%25BCrgen%2520Adler%2520and%2520Leonard%2520Hackel%2520and%2520Yan%2520Shu%2520and%2520Angelos%2520Zavras%2520and%2520Ioannis%2520Papoutsis%2520and%2520Paolo%2520Rota%2520and%2520Beg%25C3%25BCm%2520Demir%26entry.1292438233%3DVision-langugage%2520models%2520%2528VLMs%2529%2520have%2520shown%2520strong%2520performance%2520in%2520computer%2520vision%2520%2528CV%2529%252C%2520yet%2520their%2520performance%2520on%2520remote%2520sensing%2520%2528RS%2529%2520data%2520remains%2520limited%2520due%2520to%2520the%2520lack%2520of%2520large-scale%252C%2520multi-sensor%2520RS%2520image-text%2520datasets%2520with%2520diverse%2520textual%2520annotations.%2520Existing%2520datas 3.29630v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BigEarthNet.txt%3A%20A%20Large-Scale%20Multi-Sensor%20Image-Text%20Dataset%20and%20Benchmark%20for%20Earth%20Observation&entry.906535625=Johann-Ludwig%20Herzog%20and%20Mathis%20J%C3%BCrgen%20Adler%20and%20Leonard%20Hackel%20and%20Yan%20Shu%20and%20Angelos%20Zavras%20and%20Ioannis%20Papoutsis%20and%20Paolo%20Rota%20and%20Beg%C3%BCm%20Demir&entry.1292438233=Vision-langugage%20models%20%28VLMs%29%20have%20shown%20strong%20performance%20in%20computer%20vision%20%28CV%29%2C%20yet%20their%20performance%20on%20remote%20sensing%20%28RS%29%20data%20remains%20limited%20due%20to%20the%20lack%20of%20large-scale%2C%20multi-sensor%20RS%20image-text%20datasets%20with%20diverse%20textual%20annotations.%20Existing%20datasets%20predominantly%20include%20aerial%20Red-Green-Blue%20imagery%2C%20with%20short%20or%20weakly%20grounded%20captions%2C%20and%20provide%20limited%20diversity%20in%20annotation%20types.%20To%20address%20this%20limitation%2C%20we%20introduce%20BigEarthNet.txt%2C%20a%20large-scale%2C%20multi-sensor%20image-text%20dataset%20designed%20to%20advance%20instruction-driven%20image-text%20learning%20in%20Earth%20observation%20across%20multiple%20tasks.%20BigEarthNet.txt%20contains%20464044%20co-registered%20Sentinel-1%20synthetic%20aperture%20radar%20and%20Sentinel-2%20multispectral%20images%20with%209.6M%20text%20annotations%2C%20including%3A%20i%29%20geographically%20anchored%20captions%20describing%20land-use/land-cover%20%28LULC%29%20classes%2C%20their%20spatial%20relations%2C%20and%20environmental%20context%3B%20ii%29%20visual%20question%20answering%20pairs%20relevant%20for%20different%20tasks%3B%20and%20iii%29%20referring%20expression%20detection%20instructions%20for%20bounding%20box%20prediction.%20Through%20a%20comparative%20statistical%20analysis%2C%20we%20demonstrate%20that%20BigEarthNet.txt%20surpasses {"title": "ATP-Bench: Towards Agentic Tool Planning for MLLM Interleaved Generation", "author": "Yinuo Liu and Zi Qian and Heng Zhou and Jiahao Zhang and Yajie Zhang and Zhihang Li and Mengyu Zhou and Erchao Zhao and Xiaoxi Jiang and Guanjun Jiang", "abstract": "Interleaved text-and-image generation represents a significant frontier for Multimodal Large Language Models (MLLMs), offering a more intuitive way to convey complex information. Current paradigms rely on either image generation or retrieval augmentation, yet they typically treat the two as mutually exclusive paths, failing to unify factuality with creativity. We argue that the next milestone in this field is Agentic Tool Planning, where the model serves as a central controller that autonomously determines when, where, and which tools to invoke to produce interleaved responses for visual-critical queries. To systematically evaluate this paradigm, we introduce ATP-Bench, a novel benchmark comprising 7,702 QA pairs (including 1,592 VQA pairs) across eight categories and 25 visual-critical intents, featuring human-verified queries and ground truths. Furthermore, to evaluate agentic planning independent of end-to-end execution and changing tool backends, we propose a Multi-Agent MLLM-as-a-Judge (MAM) system. MAM evaluates tool-call precision, identifies missed opportunities for tool use, and assesses overall response quality without requiring ground-truth references. Our extensive experiments on 10 state-of-the-art MLLMs reveal that models struggle with coherent interleaved planning and exhibit significant variations in tool-use behavior, highlighting substantial room for improvement and providing actionable guidance for advancing interleaved generation. Dataset and code are available at https://github.com/Qwen-Applications/ATP-Bench.", "link": "http://arxiv.org/abs/2603.29902v1", "date": "2026-03-31", "relevancy": 2.6653, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5462}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5309}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5221}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ATP-Bench%3A%20Towards%20Agentic%20Tool%20Planning%20for%20MLLM%20Interleaved%20Generation&body=Title%3A%20ATP-Bench%3A%20Towards%20Agentic%20Tool%20Planning%20for%20MLLM%20Interleaved%20Generation%0AAuthor%3A%20Yinuo%20Liu%20and%20Zi%20Qian%20and%20Heng%20Zhou%20and%20Jiahao%20Zhang%20and%20Yajie%20Zhang%20and%20Zhihang%20Li%20and%20Mengyu%20Zhou%20and%20Erchao%20Zhao%20and%20Xiaoxi%20Jiang%20and%20Guanjun%20Jiang%0AAbstract%3A%20Interleaved%20text-and-image%20generation%20represents%20a%20significant%20frontier%20for%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20offering%20a%20more%20intuitive%20way%20to%20convey%20complex%20information.%20Current%20paradigms%20rely%20on%20either%20image%20generation%20or%20retrieval%20augmentation%2C%20yet%20they%20typically%20treat%20the%20two%20as%20mutually%20exclusive%20paths%2C%20failing%20to%20unify%20factuality%20with%20creativity.%20We%20argue%20that%20the%20next%20milestone%20in%20this%20field%20is%20Agentic%20Tool%20Planning%2C%20where%20the%20model%20serves%20as%20a%20central%20controller%20that%20autonomously%20determines%20when%2C%20where%2C%20and%20which%20tools%20to%20invoke%20to%20produce%20interleaved%20responses%20for%20visual-critical%20queries.%20To%20systematically%20evaluate%20this%20paradigm%2C%20we%20introduce%20ATP-Bench%2C%20a%20novel%20benchmark%20comprising%207%2C702%20QA%20pairs%20%28including%201%2C592%20VQA%20pairs%29%20across%20eight%20categories%20and%2025%20visual-critical%20intents%2C%20featuring%20human-verified%20queries%20and%20ground%20truths.%20Furthermore%2C%20to%20evaluate%20agentic%20planning%20independent%20of%20end-to-end%20execution%20and%20changing%20tool%20backends%2C%20we%20propose%20a%20Multi-Agent%20MLLM-as-a-Judge%20%28MAM%29%20system.%20MAM%20evaluates%20tool-call%20precision%2C%20identifies%20missed%20opportunities%20for%20tool%20use%2C%20and%20assesses%20overall%20response%20quality%20without%20requiring%20ground-truth%20references.%20Our%20extensive%20experiments%20on%2010%20state-of-the-art%20MLLMs%20reveal%20that%20models%20struggle%20with%20coherent%20interleaved%20planning%20and%20exhibit%20significant%20variations%20in%20tool-use%20behavior%2C%20highlighting%20substantial%20room%20for%20improvement%20and%20providing%20actionable%20guidance%20for%20advancing%20interleaved%20generation.%20Dataset%20and%20code%20are%20available%20at%20https%3A//github.com/Qwen-Applications/ATP-Bench.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29902v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DATP-Bench%253A%2520Towards%2520Agentic%2520Tool%2520Planning%2520for%2520MLLM%2520Interleaved%2520Generation%26entry.906535625%3DYinuo%2520Liu%2520and%2520Zi%2520Qian%2520and%2520Heng%2520Zhou%2520and%2520Jiahao%2520Zhang%2520and%2520Yajie%2520Zhang%2520and%2520Zhihang%2520Li%2520and%2520Mengyu%2520Zhou%2520and%2520Erchao%2520Zhao%2520and%2520Xiaoxi%2520Jiang%2520and%2520Guanjun%2520Jiang%26entry.1292438233%3DInterleaved%2520text-and-image%2520generation%2520represents%2520a%2520significant%2520frontier%2520for%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%252C%2520offering%2520a%2520more%2520intuitive%2520way%2520to%2520convey%2520complex%2520information.%2520Current%2520paradigms%2520rely%2520on%2520either%2520image%2520generation%2520or%2520retrieval%2520augmentation%252C%2520yet%2520they%2520typically%2520treat%2520the%2520two%2520as%2520mutually%2520exclusive%2520paths%252C%2520faili {"title": "Less Is More? Selective Visual Attention to High-Importance Regions for Multimodal Radiology Summarization", "author": "Mst. Fahmida Sultana Naznin and Adnan Ibney Faruq and Mushfiqur Rahman and Niloy Kumar Mondal and Md. Mehedi Hasan Shawon and Md Rakibul Hasan", "abstract": "Automated radiology report summarization aims to distill verbose findings into concise clinical impressions, but existing multimodal models often struggle with visual noise and fail to meaningfully improve over strong text-only baselines in the FINDINGS $\\to$ IMPRESSION transformation. We challenge two prevailing assumptions: (1) that more visual input is always better, and (2) that multimodal models add limited value when findings already contain rich image-derived detail. Through controlled ablations on MIMIC-CXR benchmark, we show that selectively focusing on pathology-relevant visual patches rather than full images yields substantially better performance. We introduce ViTAS, Visual-Text Attention Summarizer, a multi-stage pipeline that combines ensemble-guided MedSAM2 lung segmentation, bidirectional cross-attention for multi-view fusion, Shapley-guided adaptive patch clustering, and hierarchical visual tokenization feeding a ViT. ViTAS achieves SOTA results with 29.25% BLEU-4 and 69.83% ROUGE-L, improved factual alignment in qualitative analysis, and the highest expert-rated human evaluation scores. Our findings demonstrate that less but more relevant visual input is not only sufficient but superior for multimodal radiology summarization.", "link": "http://arxiv.org/abs/2603.29901v1", "date": "2026-03-31", "relevancy": 2.6632, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5498}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5241}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5241}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Less%20Is%20More%3F%20Selective%20Visual%20Attention%20to%20High-Importance%20Regions%20for%20Multimodal%20Radiology%20Summarization&body=Title%3A%20Less%20Is%20More%3F%20Selective%20Visual%20Attention%20to%20High-Importance%20Regions%20for%20Multimodal%20Radiology%20Summarization%0AAuthor%3A%20Mst.%20Fahmida%20Sultana%20Naznin%20and%20Adnan%20Ibney%20Faruq%20and%20Mushfiqur%20Rahman%20and%20Niloy%20Kumar%20Mondal%20and%20Md.%20Mehedi%20Hasan%20Shawon%20and%20Md%20Rakibul%20Hasan%0AAbstract%3A%20Automated%20radiology%20report%20summarization%20aims%20to%20distill%20verbose%20findings%20into%20concise%20clinical%20impressions%2C%20but%20existing%20multimodal%20models%20often%20struggle%20with%20visual%20noise%20and%20fail%20to%20meaningfully%20improve%20over%20strong%20text-only%20baselines%20in%20the%20FINDINGS%20%24%5Cto%24%20IMPRESSION%20transformation.%20We%20challenge%20two%20prevailing%20assumptions%3A%20%281%29%20that%20more%20visual%20input%20is%20always%20better%2C%20and%20%282%29%20that%20multimodal%20models%20add%20limited%20value%20when%20findings%20already%20contain%20rich%20image-derived%20detail.%20Through%20controlled%20ablations%20on%20MIMIC-CXR%20benchmark%2C%20we%20show%20that%20selectively%20focusing%20on%20pathology-relevant%20visual%20patches%20rather%20than%20full%20images%20yields%20substantially%20better%20performance.%20We%20introduce%20ViTAS%2C%20Visual-Text%20Attention%20Summarizer%2C%20a%20multi-stage%20pipeline%20that%20combines%20ensemble-guided%20MedSAM2%20lung%20segmentation%2C%20bidirectional%20cross-attention%20for%20multi-view%20fusion%2C%20Shapley-guided%20adaptive%20patch%20clustering%2C%20and%20hierarchical%20visual%20tokenization%20feeding%20a%20ViT.%20ViTAS%20achieves%20SOTA%20results%20with%2029.25%25%20BLEU-4%20and%2069.83%25%20ROUGE- {"title": "SkeletonContext: Skeleton-side Context Prompt Learning for Zero-Shot Skeleton-based Action Recognition", "author": "Ning Wang and Tieyue Wu and Naeha Sharif and Farid Boussaid and Guangming Zhu and Lin Mei and Mohammed Bennamoun and zhang liang", "abstract": "Zero-shot skeleton-based action recognition aims to recognize unseen actions by transferring knowledge from seen categories through semantic descriptions. Most existing methods typically align skeleton features with textual embeddings within a shared latent space. However, the absence of contextual cues, such as objects involved in the action, introduces an inherent gap between skeleton and semantic representations, making it difficult to distinguish visually similar actions. To address this, we propose SkeletonContext, a prompt-based framework that enriches skeletal motion representations with language-driven contextual semantics. Specifically, we introduce a Cross-Modal Context Prompt Module, which leverages a pretrained language model to reconstruct masked contextual prompts under guidance derived from LLMs. This design effectively transfers linguistic context to the skeleton encoder for instance-level semantic grounding and improved cross-modal alignment. In addition, a Key-Part Decoupling Module is incorporated to decouple motion-relevant joint features, ensuring robust action understanding even in the absence of explicit object interactions. Extensive experiments on multiple benchmarks demonstrate that SkeletonContext achieves state-of-the-art performance under both conventional and generalized zero-shot settings, validating its effectiveness in reasoning about context and distinguishing fine-grained, visually similar actions.", "link": "http://arxiv.org/abs/2603.29692v1", "date": "2026-03-31", "relevancy": 2.6342, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5324}, {"title": {"title": "Impact of enriched meaning representations for language generation in dialogue tasks: A comprehensive exploration of the relevance of tasks, corpora and metrics", "author": "Alain V\u00e1zquez and Maria In\u00e9s Torres", "abstract": "Conversational systems should generate diverse language forms to interact fluently and accurately with users. In this context, Natural Language Generation (NLG) engines convert Meaning Representations (MRs) into sentences, directly influencing user perception. These MRs usually encode the communicative function (e.g., inform, request, confirm) via DAs and enumerate the semantic content with slot-value pairs. In this work, our objective is to analyse whether providing a task demonstrator to the generator enhances the generations of a fine-tuned model. This demonstrator is an MR-sentence pair extracted from the original dataset that enriches the input at training and inference time. The analysis involves five metrics that focus on different linguistic aspects, and four datasets that differ in multiple features, such as domain, size, lexicon, MR variability, and acquisition process. To the best of our knowledge, this is the first study on dialogue NLG implementing a comparative analysis of the impact of MRs on generation quality across domains, corpus characteristics, and the metrics used to evaluate these generations. Our key insight is that the proposed enriched inputs are effective for complex tasks and small datasets with high variability in MRs and sentences. They are also beneficial in zero-shot settings for any domain. Moreover, the analysis of the metrics shows that semantic metrics capture generation quality more accurately than lexical metrics. In addition, among these semantic metrics, those trained with human ratings can detect omissions and other subtle semantic issues that embedding-based metrics often miss. Finally, the evolution of the metric scores and the excellent results for Slot Accuracy and Dialogue Act Accuracy demonstrate that the generative models present fast adaptability to different tasks and robustness at semantic and communicative intention levels.", "link": "http://arxiv.org/abs/2603.29518v1", "date": "2026-03-31", "relevancy": 2.6189, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5275}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5164}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Impact%20of%20enriched%20meaning%20representations%20for%20language%20generation%20in%20dialogue%20tasks%3A%20A%20comprehensive%20exploration%20of%20the%20relevance%20of%20tasks%2C%20corpora%20and%20metrics&body=Title%3A%20Impact%20of%20enriched%20meaning%20representations%20for%20language%20generation%20in%20dialogue%20tasks%3A%20A%20comprehensive%20exploration%20of%20the%20relevance%20of%20tasks%2C%20corpora%20and%20metrics%0AAuthor%3A%20Alain%20V%C3%A1zquez%20and%20Maria%20In%C3%A9s%20Torres%0AAbstract%3A%20Conversational%20systems%20should%20generate%20diverse%20language%20forms%20to%20interact%20fluently%20and%20accurately%20with%20users.%20In%20this%20context%2C%20Natural%20Language%20Generation%20%28NLG%29%20engines%20convert%20Meaning%20Representations%20%28MRs%29%20into%20sentences%2C%20directly%20influencing%20user%20perception.%20These%20MRs%20usually%20encode%20the%20communicative%20function%20%28e.g.%2C%20inform%2C%20request%2C%20confirm%29%20via%20DAs%20and%20enumerate%20the%20semantic%20content%20with%20slot-value%20pairs.%20In%20this%20work%2C%20our%20objective%20is%20to%20analyse%20whether%20providing%20a%20task%20demonstrator%20to%20the%20generator%20enhances%20the%20generations%20of%20a%20fine-tuned%20model.%20This%20demonstrator%20is%20an%20MR-sentence%20pair%20extracted%20from%20the%20original%20dataset%20that%20enriches%20the%20input%20at%20training%20and%20inference%20time.%20The%20analysis%20involves%20five%20metrics%20that%20focus%20on%20different%20linguistic%20aspects%2C%20and%20four%20datasets%20that%20differ%20in%20multiple%20features%2C%20such%20as%20domain%2C%20size%2C%20lexicon%2C%20MR%20variability%2C%20and%20acquisition%20process.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20study%20on%20dialogue%20NLG%20implementing%20a%20comparative%20analysis%20of%20the%20impact%20of%20MRs%20on%20generation%20quality%20across%20domains%2C%20corpus%20characteristics%2C%20and%20the%20metrics%20used%20to%20evaluate%20these%20generations.%20Our%20key%20insight%20is%20that%20the%20proposed%20enriched%20inputs%20are%20effective%20for%20complex%20tasks%20and%20small%20datasets%20with%20high%20variability%20in%20MRs%20and%20sentences.%20They%20are%20also%20beneficial%20in%20zero-shot%20settings%20for%20any%20domain.%20Moreover%2C%20the%20analysis%20of%20the%20metrics%20shows%20that%20semantic%20metrics%20capture%20generation%20quality%20more%20accurately%20than%20lexical%20metrics.%20In%20addition%2C%20among%20these%20semantic%20metrics%2C%20those%20trained%20with%20human%20ratings%20can%20detect%20omissions%20and%20other%20subtle%20semantic%20issues%20that%20embedding-based%20metrics%20often%20miss.%20Finally%2C%20the%20evolution%20of%20the%20metric%20scores%20and%20the%20excellent%20results%20for%20Slot%20Accuracy%20and%20Dialogue%20Act%20Accuracy%20demonstrate%20that%20the%20generative%20models%20present%20fast%20adaptability%20to%20different%20tasks%20and%20robustness%20at%20semantic%20and%20communicative%20intention%20levels.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29518v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fen {"title": "GRVS: a Generalizable and Recurrent Approach to Monocular Dynamic View Synthesis", "author": "Thomas Tanay and Mohammed Brahimi and Michal Nazarczuk and Qingwen Zhang and Sibi Catley-Chandar and Arthur Moreau and Zhensong Zhang and Eduardo P\u00e9rez-Pellitero", "abstract": "Synthesizing novel views from monocular videos of dynamic scenes remains a challenging problem. Scene-specific methods that optimize 4D representations with explicit motion priors often break down in highly dynamic regions where multi-view information is hard to exploit. Diffusion-based approaches that integrate camera control into large pre-trained models can produce visually plausible videos but frequently suffer from geometric inconsistencies across both static and dynamic areas. Both families of methods also require substantial computational resources. Building on the success of generalizable models for static novel view synthesis, we adapt the framework to dynamic inputs and propose a new model with two key components: (1) a recurrent loop that enables unbounded and asynchronous mapping between input and target videos and (2) an efficient use of plane sweeps over dynamic inputs to disentangle camera and scene motion, and achieve fine-grained, six-degrees-of-freedom camera controls. We train and evaluate our model on the UCSD dataset and on Kubric-4D-dyn, a new monocular dynamic dataset featuring longer, higher resolution sequences with more complex scene dynamics than existing alternatives. Our model outperforms four Gaussian Splatting-based scene-specific approaches, as well as two diffusion-based approaches in reconstructing fine-grained geometric details across both static and dynamic regions.", "link": "http://arxiv.org/abs/2603.29734v1", "date": "2026-03-31", "relevancy": 2.6187, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6634}, {"title": "Dynamic Gaussians Mesh: {"title": "TSHA: A Benchmark for Visual Language Models in Trustworthy Safety Hazard Assessment Scenarios", "author": "Qiucheng Yu and Ruijie Xu and Mingang Chen and Xuequan Lu and Jianfeng Dong and Chaochao Lu and Xin Tan", "abstract": "Recent advances in vision-language models (VLMs) have accelerated their application to indoor safety hazards assessment. However, existing benchmarks suffer from three fundamental limitations: (1) heavy reliance on synthetic datasets constructed via simulation software, creating a significant domain gap with real-world environments; (2) oversimplified safety tasks with artificial constraints on hazard and scene types, thereby limiting model generalization; and (3) absence of rigorous evaluation protocols to thoroughly assess model capabilities in complex home safety scenarios. To address these challenges, we introduce TSHA (\\textbf{T}rustworthy \\textbf{S}afety \\textbf{H}azards \\textbf{A}ssessment), a comprehensive benchmark comprising 81,809 carefully curated training samples drawn from four complementary sources: existing indoor datasets, internet images, AIGC images, and newly captured images. This benchmark set also includes a highly challenging test set with 1707 samples, comprising not only a carefully selected subset from the training distribution but also newly added videos and panoramic images containing multiple safety hazards, used to evaluate the model's robustness in complex safety scenarios. Extensive experiments on 23 popular VLMs demonstrate that current VLMs lack robust capabilities for safety hazard assessment. Importantly, models trained on the TSHA training set not only achieve a significant performance improvement of up to +18.3 points on the TSHA test set but also exhibit enhanced generalizability across other benchmarks, underscoring the substantial contribution and importance of the TSHA benchmark.", "link": "http://arxiv.org/abs/2603.29759v1", "date": "2026-03-31", "relevancy": 2.6136, "topK": [{"title": awn%20from%20four%20complementary%20sources%3A%20existing%20indoor%20datasets%2C%20internet%20images%2C%20AIGC%20images%2C%20and%20newly%20captured%20images.%20This%20benchmark%20set%20also%20includes%20a%20highly%20challenging%20test%20set%20with%201707%20samples%2C%20comprising%20not%20only%20a%20carefully%20selected%20subset%20from%20the%20training%20distribution%20but%20also%20newly%20added%20videos%20and%20panoramic%20images%20containing%20multiple%20safety%20hazards%2C%20used%20to%20evaluate%20the%20model%27s%20robustness%20in%20complex%20safety%20scenarios.%20Extensive%20experiments%20on%2023%20popular%20VLMs%20demonstrate%20that%20current%20VLMs%20lack%20robust%20capabilities%20for%20safety%20hazard%20assessment.%20Importantly%2C%20models%20trained%20on%20the%20TSHA%20training%20set%20not%20only%20achieve%20a%20significant%20performance%20improvement%20of%20up%20to%20%2B18.3%20points%20on%20the%20TSHA%20test%20set%20but%20also%20exhibit%20enhanced%20generalizability%20across%20other%20benchmarks%2C%20underscoring%20the%20substantial%20contribution%20and%20importance%20of%20the%20TSHA%20benchmark.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29759v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTSHA%253A%2520A%2520Benchmark%2520for%2520Visual%2520Language%2520Models%2520in%2520Trustworthy%2520Safety%2520Hazard%2520Assessment%2520Scenarios%26entry.906535625%3DQiucheng%2520Yu%2520and%2520Ruijie%2520Xu%2520and%2520Mingang%2520Chen%2520and%2520Xuequan%2520Lu%2520and%2520Jianfeng%2520Dong%2520and%2520Chaochao%2520Lu%2520and%2520Xin%2520Tan%26entry.1292438233%3DRecent%2520advances%2520in%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520accelerated%2520their%2520application%2520to%2520indoor%2520safety%2520hazards%2520assessment.%2520However%252C%2520existing%2520benchmarks%2520suffer%2520from%2520three%2520fundamental%2520limitations%253A%2520%25281%2529%2520heavy%2520 {"title": "Disentangled Graph Prompting for Out-Of-Distribution Detection", "author": "Cheng Yang and Yu Hao and Qi Zhang and Chuan Shi", "abstract": "When testing data and training data come from different distributions, deep neural networks (DNNs) will face significant safety risks in practical applications. Therefore, out-of-distribution (OOD) detection techniques, which can identify OOD samples at test time and alert the system, are urgently needed. Existing graph OOD detection methods usually characterize fine-grained in-distribution (ID) patterns from multiple perspectives, and train end-to-end graph neural networks (GNNs) for prediction. However, due to the unavailability of OOD data during training, the absence of explicit supervision signals could lead to sub-optimal performance of end-to-end encoders. To address this issue, we follow the pre-training+prompting paradigm to utilize pre-trained GNN encoders, and propose Disentangled Graph Prompting (DGP), to capture fine-grained ID patterns with the help of ID graph labels. Specifically, we design two prompt generators that respectively generate class-specific and class-agnostic prompt graphs by modifying the edge weights of an input graph. We also design several effective losses to train the prompt generators and prevent trivial solutions. We conduct extensive experiments on ten datasets to demonstrate the superiority of our proposed DGP, which achieves a relative AUC improvement of 3.63% over the best graph OOD detection baseline. Ablation studies and hyper-parameter experiments further show the effectiveness of DGP. Code is available at https://github.com/BUPT-GAMMA/DGP.", "link": "http://arxiv.org/abs/2603.29644v1", "date": "2026-03-31", "relevancy": 2.6085, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5647}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5183}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Disentangled%20Graph%20Prompting%20for%20Out-Of-Distribution%20Detection&body=Title%3A%20Disentangled%20Graph%20Prompting%20for%20Out-Of-Distribution%20Detection%0AAuthor%3A%20Cheng%20Yang%20and%20Yu%20Hao%20and%20Qi%20Zhang%20and%20Chuan%20Shi%0AAbstract%3A%20When%20testing%20data%20and%20training%20data%20come%20from%20different%20distributions%2C%20deep%20neural%20networks%20%28DNNs%29%20will%20face%20significant%20safety%20risks%20in%20practical%20applications.%20Therefore%2C%20out-of-distribution%20%28OOD%29%20detection%20techniques%2C%20which%20can%20identify%20OOD%20samples%20at%20test%20time%20and%20alert%20the%20system%2C%20are%20urgently%20needed.%20Existing%20graph%20OOD%20detection%20methods%20usually%20characterize%20fine-grained%20in-distribution%20%28ID%29%20patterns%20from%20multiple%20perspectives%2C%20and%20train%20end-to-end%20graph%20neural%20networks%20%28GNNs%29%20for%20prediction.%20However%2C%20due%20to%20the%20unavailability%20of%20OOD%20data%20during%20training%2C%20the%20absence%20of%20explicit%20supervision%20signals%20could%20lead%20to%20sub-optimal%20performance%20of%20end-to-end%20encoders.%20To%20address%20this%20issue%2C%20we%20follow%20the%20pre-training%2Bprompting%20paradigm%20to%20utilize%20pre-trained%20GNN%20encoders%2C%20and%20propose%20Disentangled%20Graph%20Prompting%20%28DGP%29%2C%20to%20capture%20fine-grained%20ID%20patterns%20with%20the%20help%20of%20ID%20graph%20labels.%20Specifically%2C%20we%20design%20two%20prompt%20generators%20that%20respectively%20generate%20class-specific%20and%20class-agnostic%20prompt%20graphs%20by%20modifying%20the%20edge%20weights%20of%20an%20input%20graph.%20We%20also%20design%20several%20effective%20losses%20to%20train%20the%20prompt%20generators%20and%20prevent%20trivial%20solutions.%20We%20conduct%20extensive%20experiments%20on%20ten%20datasets%20to%20demonstrate%20the%20superiority%20of%20our%20proposed%20DGP%2C%20which%20achieves%20a%20relative%20AUC%20improvement%20of%203.63%25%20over%20the%20best%20graph%20OOD%20detection%20baseline.%20Ablation%20studies%20and%20hyper-parameter%20experiments%20further%20show%20the%20effectiveness%20of%20DGP.%20Code%20is%20available%20at%20https%3A//github.com/BUPT-GAMMA/DGP.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29644v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDisentangled%2520Graph%2520Prompting%2520for%2520Out-Of-Distribution%2520Detection%26entry.906535625%3DCheng%2520Yang%2520and%2520Yu%2520Hao%2520and%2520Qi%2520Zhang%2520and%2520Chuan%2520Shi%26entry.1292438233%3DWhen%2520testing%2520data%2520and%2520training%2520data%2520come%2520from%2520different%2520distributions%252C%2520deep%2520neural%2520networks%2520%2528DNNs%2529%2520will%2520face%2520significant%2520safety%2520risks%2520in%2520practical%2520applications.%2520Therefore%252C%2520out-of-distribution%2520%2528OOD%2529%2520detection%2520techniques%252C%2520which%2520can%2520identify%2520OOD%2520samples%2520at%2520test%2520time%2520and%2520alert%2520the%2520system%252C%2520are%2520urgently%2520needed.%2520Existing%2520graph%2520OOD%2520detection%2520methods%2520usually%2520characterize%2520fine-grained%2520in-distribution%2520%2528ID%2529%2520patterns%2520from%2520multiple%2520perspectives%252C%2520and%2520train%2520end-to-end%2520graph%2520neural%2520networks%2520%2528GNNs%2529%2520for%2520prediction.%2520However%252C%2520due%2520to%2520the%2520unavailability%2520of%2520OOD%2520data%2520during%2520training%252C%2520the%2520absence%2520of%2520explicit%2520supervision%2520signals%2520could%2520lead%2520to%2520sub-optimal%2520performance%2520of%2520end-to-end%2520encoders.%2520To%2520address%2520this%2520issue%252C%2520we%2520follow%2520the%252 {"title": "Modeling Spatiotemporal Neural Frames for High Resolution Brain Dynamic", "author": "Wanying Qu and Jianxiong Gao and Wei Wang and Yanwei Fu", "abstract": "Capturing dynamic spatiotemporal neural activity is essential for understanding large-scale brain mechanisms. Functional magnetic resonance imaging (fMRI) provides high-resolution cortical representations that form a strong basis for characterizing fine-grained brain activity patterns. The high acquisition cost of fMRI limits large-scale applications, therefore making high-quality fMRI reconstruction a crucial task. Electroencephalography (EEG) offers millisecond-level temporal cues that complement fMRI. Leveraging this complementarity, we present an EEG-conditioned framework for reconstructing dynamic fMRI as continuous neural sequences with high spatial fidelity and strong temporal coherence at the cortical-vertex level. To address sampling irregularities common in real fMRI acquisitions, we incorporate a null-space intermediate-frame reconstruction, enabling measurement-consistent completion of arbitrary intermediate frames and improving sequence continuity and practical applicability. Experiments on the CineBrain dataset demonstrate superior voxel-wise reconstruction quality and robust temporal consistency across whole-brain and functionally specific regions. The reconstructed fMRI also preserves essential functional information, supporting downstream visual decoding tasks. This work provides a new pathway for estimating high-resolution fMRI dynamics from EEG and advances multimodal neuroimaging toward more dynamic brain activity modeling.", "link": "http://arxiv.org/abs/2603.24176v2", "date": "2026-03-31", "relevancy": 2.587, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5301}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "simi .%20The%20reconstructed%20fMRI%20also%20preserves%20essential%20functional%20information%2C%20supporting%20downstream%20visual%20decoding%20tasks.%20This%20work%20provides%20a%20new%20pathway%20for%20estimating%20high-resolution%20fMRI%20dynamics%20from%20EEG%20and%20advances%20multimodal%20neuroimaging%20toward%20more%20dynamic%20brain%20activity%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24176v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModeling%2520Spatiotemporal%2520Neural%2520Frames%2520for%2520High%2520Resolution%2520Brain%2520Dynamic%26entry.906535625%3DWanying%2520Qu%2520and%2520Jianxiong%2520Gao%2520and%2520Wei%2520Wang%2520and%2520Yanwei%2520Fu%26entry.1292438233%3DCapturing%2520dynamic%2520spatiotemporal%2520neural%2520activity%2520is%2520essential%2520for%2520understanding%2520large-scale%2520brain%2520mechanisms.%2520Functional%2520magnetic%2520resonance%2520imaging%2520%2528fMRI%2529%2520provides%2520high-resolution%2520cortical%2520representations%2520that%2520form%2520a%2520strong%2520basis%2520for%2520characterizing%2520fine-grained%2520brain%2520activity%2520patterns.%2520The%2520high%2520acquisition%2520cost%2520of%2520fMRI%2520limits%2520large-scale%2520applications%252C%2520therefore%2520making%2520high-quality%2520fMRI%2520reconstruction%2520a%2520crucial%2520task.%2520Electroencephalography%2520%2528EEG%2529%2520offers%2520millisecond-level%2520temporal%2520cues%2520that%2520complement%2520fMRI.%2520Leveraging%2520this%2520complementarity%252C%2520we%2520present%2520an%2520EEG-conditioned%2520framework%2520for%2520reconstructing%2520dynamic%2520fMRI%2520as%2520continuous%2520neural%2520sequences%2520with%2520high%2520spatial%2520fidelity%2520and%2520strong%2520temporal%2520coherence%2520at%2520the%2520cortical-vertex%2520level.%2520To%2520address%2520sampling%2520irregularities%2520common%2520in%2520real%2520fMRI%2520acquisitions%252C%2520we%2 {"title": "ProxyAttn: Guided Sparse Attention via Representative Heads", "author": "Yixuan Wang and Huang He and Siqi Bao and Hua Wu and Haifeng Wang and Qingfu Zhu and Wanxiang Che", "abstract": "The quadratic complexity of attention mechanisms limits the efficiency of Large Language Models (LLMs) on long-text tasks. Recently, methods that dynamically estimate block importance have enabled efficient block sparse attention, leading to significant acceleration in long-text pre-filling of LLMs. However, their coarse-grained estimation inevitably leads to performance degradation at high sparsity rates. In this work, we propose ProxyAttn, a training-free sparse attention algorithm that achieves more precise block estimation by compressing the dimension of attention heads. Based on our observation of the similarity among multiple attention heads, we use the scores of pooled representative heads to approximate the scores for all heads. To account for the varying sparsity among heads, we also propose a block-aware dynamic budget estimation method. By combining the scores from representative proxy heads with multi-head dynamic budgets, we achieve a more fine-grained block importance evaluation at low computational cost. Experiments on a variety of mainstream models and extensive benchmarks confirm the underlying similarity among attention heads. Leveraging a fine-grained estimation, the proposed method achieves substantial gains in performance and efficiency compared to existing methods. More precisely, ProxyAttn can achieve up to 10.3x attention acceleration and 2.4x prefilling acceleration without significant performance loss. Our code is available at https://github.com/wyxstriker/ProxyAttn.", "link": "http://arxiv.org/abs/2509.24745v2", "date": "2026-03-31", "relevancy": 2.5733, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5518}, {"title": "Weakly-guided s {"title": "SurgTEMP: Temporal-Aware Surgical Video Question Answering with Text-guided Visual Memory for Laparoscopic Cholecystectomy", "author": "Shi Li and Vinkle Srivastav and Nicolas Chanel and Saurav Sharma and Nabani Banik and Lorenzo Arboit and Kun Yuan and Pietro Mascagni and Nicolas Padoy", "abstract": "Surgical procedures are inherently complex and risky, requiring extensive expertise and constant focus to well navigate evolving intraoperative scenes. Computer-assisted systems such as surgical visual question answering (VQA) offer promises for education and intraoperative support. Current surgical VQA research largely focuses on static frame analysis, overlooking rich temporal semantics. Surgical video question answering is further challenged by low visual contrast, its highly knowledge-driven nature, diverse analytical needs spanning scattered temporal windows, and the hierarchy from basic perception to high-level intraoperative assessment. To address these challenges, we propose SurgTEMP, a multimodal LLM framework featuring (i) a query-guided token selection module that builds hierarchical visual memory (spatial and temporal memory banks) and (ii) a Surgical Competency Progression (SCP) training scheme. Together, these components enable effective modeling of variable-length surgical videos while preserving procedure-relevant cues and temporal coherence, and better support diverse downstream assessment tasks. To support model development, we introduce CholeVidQA-32K, a surgical video question answering dataset comprising 32K open-ended QA pairs and 3,855 video segments (approximately 128 h total) from laparoscopic cholecystectomy. The dataset is organized into a three-level hierarchy -- Perception, Assessment, and Reasoning -- spanning 11 tasks from instrument/action/anatomy perception to Critical View of Safety (CVS), intraoperative difficulty, skill proficiency, and adverse event assessment. In comprehensive evaluations against state-of-the-art open-source multimodal and video LLMs (fine-tuned and zero-shot), SurgTEMP achieves substantial performance improvements, advancing the state of video-based surgical VQA.", "link": "http://arxiv.org/abs/2603.29962v1", "date": "2026-03-31", "relevancy": 2.5584, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5228}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5061}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SurgTEMP%3A%20Temporal-Aware%20Surgical%20Video%20Question%20Answering%20with%20Text-guided%20Visual%20Memory%20for%20Laparoscopic%20Cholecystectomy&body=Title%3A%20SurgTEMP%3A%20Temporal-Aware%20Surgical%20Video%20Question%20Answering%20with%20Text-guided%20Visual%20Memory%20for%20Laparoscopic%20Cholecystectomy%0AAuthor%3A%20Shi%20Li%20and%20Vinkle%20Srivastav%20and%20Nicolas%20Chanel%20and%20Saurav%20Sharma%20and%20Nabani%20Banik%20and%20Lorenzo%20Arboit%20and%20Kun%20Yuan%20and%20Pietro%20Mascagni%20and%20Nicolas%20Padoy%0AAbstract%3A%20Surgical%20procedures%20are%20inherently%20complex%20and%20risky%2C%20requiring%20extensive%20expertise%20and%20constant%20focus%20to%20well%20navigate%20evolving%20intraoperative%20scenes.%20Computer-assisted%20systems%20such%20as%20surgical%20visual%20question%20answering%20%28VQA%29%20offer%20promises%20for%20education%20and%20intraoperative%20support.%20Current%20surgical%20VQA%20research%20largely%20focuses%20on%20static%20frame%20analysis%2C%20overlooking%20rich%20temporal%20semantics.%20Surgical%20video%20question%20answering%20is%20further%20challenged%20by%20low%20visual%20contrast%2C%20its%20highly%20knowledge-driven%20nature%2C%20diverse%20analytical%20needs%20spanning%20scattered%20temporal%20windows%2C%20and%20the%20hierarchy%20from%20basic%20perception%20to%20high-level%20intraoperative%20assessment.%20To%20address%20these%20challenges%2C%20we%20propose%20SurgTEMP%2C%20a%20multimodal%20LLM%20framework%20featuring%20%28i%29%20a%20query-guided%20token%20selection%20module%20that%20builds%20hierarchical%20visual%20memory%20%28spatial%20and%20temporal%20memory%20banks%29%20and%20%28ii%29%20a%20Surgical%20Competency%20Progression%20%28SCP%29%20training%20scheme.%20Together%2C%20these%20components%20enable%20effective%20modeling%20of%20variable-length%20surgical%20videos%20while%20preserving%20procedure-relevant%20cues%20and%20temporal%20coherence%2C%20and%20better%20support%20diverse%20downstream%20assessment%20tasks.%20To%20support%20model%20development%2C%20we%20introduce%20CholeVidQA-32K%2C%20a%20surgical%20video%20question%20answering%20dataset%20comprising%2032K%20open-ended%20QA%20pairs%20and%203%2C855%20video%20segments%20%28approximately%20128%20h%20total%29%20from%20laparoscopic%20cholecystectomy.%20The%20dataset%20is%20organized%20into%20a%20three-level%20hierarchy%20--%20Perception%2C%20Assessment%2C%20and%20Reasoning%20--%20spanning%2011%20tasks%20from%20instrument/action/anatomy%20perception%20to%20Critical%20View%20of%20Safety%20%28CVS%29%2C%20intraoperative%20difficulty%2C%20skill%20proficiency%2C%20and%20adverse%20event%20assessment.%20In%20comprehensive%20evaluations%20against%20state-of-the-art%20open-source%20multimodal%20and%20video%20LLMs%20%28fine-tuned%20and%20zero-shot%29%2C%20SurgTEMP%20achieves%20substantial%20performance%20improvements%2C%20advancing%20the%20state%20of%20video-based%20surgical%20VQA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29962v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSurgTEMP%253A%2520Temporal-Aware%2520Surgical%2520Video%2520Question%2520Answering%2520wi {"title": "Generative Logic: A New Computer Architecture for Deterministic Reasoning and Knowledge Generation", "author": "Nikolai Sergeev", "abstract": "We present Generative Logic (GL), a deterministic architecture that starts from\n  user-supplied axiomatic definitions written in a minimalist Mathematical Programming\n  Language (MPL) and systematically explores a configurable region of their deductive\n  neighborhood. Definitions are compiled into a distributed grid of Logic Blocks (LBs)\n  that communicate via a unified hash-based inference engine; whenever the premises of\n  a rule unify, a new fact is emitted with full provenance, yielding replayable,\n  auditable proof graphs. The pipeline includes an Incubator that auto-generates\n  ground-level fact tables, a Compressor that eliminates post-proof redundancy, and an\n  independent external Verifier (34,320 checks, zero failures). Experimental validation\n  on Elementary Number Theory develops Peano arithmetic from axioms and autonomously\n  derives Gauss's summation formula. On commodity hardware, the core proving pipeline\n  completes in under one minute; the full run including Incubator fact generation\n  finishes in approximately ten minutes. The Incubator output further reveals that GL\n  can perform concrete numerical calculations -- each result a proved theorem with full\n  provenance -- opening a path toward a full-provenance Computer Algebra System (CAS).\n  Generated proofs export as navigable HTML for independent inspection. Code, proof\n  graphs, and reproduction instructions are available at github.com/Generative-Logic/GL\n  (commit 6e5b9a4) and archived at doi:10.5281/zenodo.17206386.", "link": "http://arxiv.org/abs/2508.00017v4", "date": "2026-03-31", "relevancy": 2.5463, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5259}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5233}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4786}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Logic%3A%20A%20New%20Computer%20Architecture%20for%20Deterministic%20Reasoning%20and%20Knowledge%20Generation&body=Title%3A%20Generative%20Logic%3A%20A%20New%20Computer%20Architecture%20for%20Deterministic%20Reasoning%20and%20Knowledge%20Generation%0AAuthor%3A%20Nikolai%20Sergeev%0AAbstract%3A%20We%20present%20Generative%20Logic%20%28GL%29%2C%20a%20deterministic%20architecture%20that%20starts%20from%0A%20%20user-supplied%20axiomatic%20definitions%20written%20in%20a%20minimalist%20Mathematical%20Programming%0A%20%20Language%20%28MPL%29%20and%20systematically%20explores%20a%20configurable%20region%20of%20their%20deductive%0A%20%20neighborhood.%20Definitions%20are%20compiled%20into%20a%20distributed%20grid%20of%20Logic%20Blocks%20%28LBs%29%0A%20%20that%20communicate%20via%20a%20unified%20hash-based%20inference%20engine%3B%20whenever%20the%20premises%20of%0A%20%20a%20rule%20unify%2C%20a%20new%20fact%20is%20emitted%20with%20full%20provenance%2C%20yielding%20replayable%2C%0A%20%20auditable%20proof%20graphs.%20The%20pipeline%20includes%20an%20Incubator%20that%20auto-generates%0A%20%20ground-level%20fact%20tables%2C%20a%20Compressor%20that%20eliminates%20post-proof%20redundancy%2C%20and%20an%0A%20%20independent%20external%20Verifier%20%2834%2C320%20checks%2C%20zero%20failures%29.%20Experimental%20validation%0A%20%20on%20Elementary%20Number%20Theory%20develops%20Peano%20arithmetic%20from%20axioms%20and%20autonomously%0A%20%20derives%20Gauss%27s%20summation%20formula.%20On%20commodity%20hardware%2C%20the%20core%20proving%20pipeline%0A%20%20completes%20in%20under%20one%20minute%3B%20the%20full%20run%20including%20Incubator%20fact%20generation%0A%20%20finishes%20in%20approximately%20ten%20minutes.%20The%20Incubator%20output%20further%20reveals%20that%20GL%0A%20%20can%20perform%20concrete%20numerical%20calculations%20--%20each%20result%20a%20proved%20theorem%20with%20full%0A%20%20provenance%20--%20opening%20a%20path%20toward%20a%20full-provenance%20Computer%20Algebra%20System%20%28CAS%29.%0A%20%20Generated%20proofs%20export%20as%20navigable%20HTML%20for%20independent%20inspection.%20Code%2C%20proof%0A%20%20graphs%2C%20and%20reproduction%20instructions%20are%20available%20at%20github.com/Generative-Logic/GL%0A%20%20%28commit%206e5b9a4%29%20and%20archived%20at%20doi%3A10.5281/zenodo.17206386.%0ALink%3A%20http%3A//arxiv.org/abs/2508.00017v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%2520Logic%253A%2520A%2520New%2520Computer%2520Architecture%2520for%2520Deterministic%2520Reasoning%2520and%2520Knowledge%2520Generation%26entry.906535625%3DNikolai%2520Sergeev%26entry.1292438233%3DWe%2520present%2520Generative%2520Logic%2520%2528GL%2529%252C%2520a%2520deterministic%2520architecture%2520that%2520starts%2520from%250A%2520%2520user-supplied%2520axiomatic%2520definitions%2520written%2520in%2520a%2520minimalist%2520Mathematical%2520Programming%250A%2520%2520Language%2520%2528MPL%2529%2520and%2520systematically%2520explores%2520a%2520configurable%2520region%2520of%2520their%2520deductive%250A%2520%2520neighborhood.%2520Definitions%2520are%2520compiled%2520into%2520a%2520distributed%2520grid%2520of%2520Logic%2520Blocks%2520%2528LBs%2529%250A%2520%2520that%2520communicate%2520via%2520a%2520unified%2520hash-based%2520inference%2520engine%253B%2520whenever%2520the%2520premises%2520of%250A%2520%2520a%2520rule%2520unify%252C%2520a%2520new%2520fact%2520is%2520emitted%2520with%2520full%2520provenance%252C%2520yielding%2520replayable%252C%250A%2520%2520auditable%2520proof%2520graphs.%2520The%2520pipeline%2520includes%2520an%2520Incubator%2520that%2520auto-generates%250A% {"title": "UniLGL: Learning Uniform Place Recognition for FOV-limited/Panoramic LiDAR Global Localization", "author": "Hongming Shen and Xun Chen and Yulin Hui and Zhenyu Wu and Wei Wang and Qiyang Lyu and Tianchen Deng and Danwei Wang", "abstract": "Existing LGL methods typically consider only partial information (e.g., geometric features) from LiDAR observations or are designed for homogeneous LiDAR sensors, overlooking the uniformity in LGL. In this work, a uniform LGL method is proposed, termed UniLGL, which simultaneously achieves spatial and material uniformity, as well as sensor-type uniformity. The key idea of the proposed method is to encode the complete point cloud, which contains both geometric and material information, into a pair of BEV images (i.e., a spatial BEV image and an intensity BEV image). An end-to-end multi-BEV fusion network is designed to extract uniform features, equipping UniLGL with spatial and material uniformity. To ensure robust LGL across heterogeneous LiDAR sensors, a viewpoint invariance hypothesis is introduced, which replaces the conventional translation equivariance assumption commonly used in existing LPR networks and supervises UniLGL to achieve sensor-type uniformity in both global descriptors and local feature representations. Finally, based on the mapping between local features on the 2D BEV image and the point cloud, a robust global pose estimator is derived that determines the global minimum of the global pose on SE(3) without requiring additional registration. To validate the effectiveness of the proposed uniform LGL, extensive benchmarks are conducted in real-world environments, and the results show that the proposed UniLGL is demonstratively competitive compared to other State-of-the-Art LGL methods. Furthermore, UniLGL has been deployed on diverse platforms, including full-size trucks and agile Micro Aerial Vehicles (MAVs), to enable high-precision localization and mapping as well as multi-MAV collaborative exploration in port and forest environments, demonstrating the applicability of UniLGL in industrial and field scenarios.", "link": "http://arxiv.org/abs/2507.12194v3", "date": "2026-03-31", "relevancy": 2.5165, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6545}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6271}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5709}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniLGL%3A%20Learning%20Uniform%20Place%20Recognition%20for%20FOV-limited/Panoramic%20LiDAR%20Global%20Localization&body=Title%3A%20UniLGL%3A%20Learning%20Uniform%20Place%20Recognition%20for%20FOV-limited/Panoramic%20LiDAR%20Global%20Localization%0AAuthor%3A%20Hongming%20Shen%20and%20Xun%20Chen%20and%20Yulin%20Hui%20and%20Zhenyu%20Wu%20and%20Wei%20Wang%20and%20Qiyang%20Lyu%20and%20Tianchen%20Deng%20and%20Danwei%20Wang%0AAbstract%3A%20Existing%20LGL%20methods%20typically%20consider%20only%20partial%20information%20%28e.g.%2C%20geometric%20features%29%20from%20LiDAR%20observations%20or%20are%20designed%20for%20homogeneous%20LiDAR%20sensors%2C%20overlooking%20the%20uniformity%20in%20LGL.%20In%20this%20work%2C%20a%20uniform%20LGL%20method%20is%20proposed%2C%20termed%20UniLGL%2C%20which%20simultaneously%20achieves%20spatial%20and%20material%20uniformity%2C%20as%20well%20as%20sensor-type%20uniformity.%20The%20key%20idea%20of%20the%20proposed%20method%20is%20to%20encode%20the%20complete%20point%20cloud%2C%20which%20contains%20both%20geometric%20and%20material%20information%2C%20into%20a%20pair%20of%20BEV%20images%20%28i.e.%2C%20a%20spatial%20BEV%20image%20and%20an%20intensity%20BEV%20image%29.%20An%20end-to-end%20multi-BEV%20fusion%20network%20is%20designed%20to%20extract%20uniform%20features%2C%20equipping%20UniLGL%20with%20spatial%20and%20material%20uniformity.%20To%20ensure%20robust%20LGL%20across%20heterogeneous%20LiDAR%20sensors%2C%20a%20viewpoint%20invariance%20hypothesis%20is%20introduced%2C%20which%20replaces%20the%20conventional%20translation%20equivariance%20assumption%20commonly%20used%20in%20existing%20LPR%20networks%20and%20supervises%20UniLGL%20to%20achieve%20sensor-type%20uniformity%20in%20both%20global%20descriptors%20and%20local%20feature%20representations.%20Finally%2C%20based%20on%20the%20mapping%20between%20local%20features%20on%20the%202D%20BEV%20image%20and%20the%20point%20cloud%2C%20a%20robust%20global%20pose%20estimator%20is%20derived%20that%20determines%20the%20global%20minimum%20of%20the%20global%20pose%20on%20SE%283%29%20without%20requiring%20additional%20registration.%20To%20validate%20the%20effectiveness%20of%20the%20proposed%20uniform%20LGL%2C%20extensive%20benchmarks%20are%20conducted%20in%20real-world%20environments%2C%20and%20the%20results%20show%20that%20the%20proposed%20UniLGL%20is%20demonstratively%20competitive%20compared%20to%20other%20State-of-the-Art%20LGL%20methods.%20Furthermore%2C%20UniLGL%20has%20been%20deployed%20on%20diverse%20platforms%2C%20including%20full-size%20trucks%20and%20agile%20Micro%20Aerial%20Vehicles%20%28MAVs%29%2C%20to%20enable%20high-precision%20localization%20and%20mapping%20as%20well%20as%20multi-MAV%20collaborative%20exploration%20in%20port%20and%20forest%20environments%2C%20demonstrating%20the%20applicability%20of%20UniLGL%20in%20industrial%20and%20field%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2507.12194v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniLGL%253A%2520Learning%2520Uniform%2520Place%2520Recognition%2520for%2520FOV-limited/Panoramic%2520LiDAR%2520Global%2520Localization%26ent {"title": "Concept frustration: Aligning human concepts and machine representations", "author": "Enrico Parisini and Christopher J. Soelistyo and Ahab Isaac and Alessandro Barp and Christopher R. S. Banerji", "abstract": "Aligning human-interpretable concepts with the internal representations learned by modern machine learning systems remains a central challenge for interpretable AI. We introduce a geometric framework for comparing supervised human concepts with unsupervised intermediate representations extracted from foundation model embeddings. Motivated by the role of conceptual leaps in scientific discovery, we formalise the notion of concept frustration: a contradiction that arises when an unobserved concept induces relationships between known concepts that cannot be made consistent within an existing ontology. We develop task-aligned similarity measures that detect concept frustration between supervised concept-based models and unsupervised representations derived from foundation models, and show that the phenomenon is detectable in task-aligned geometry while conventional Euclidean comparisons fail. Under a linear-Gaussian generative model we derive a closed-form expression for Bayes-optimal concept-based classifier accuracy, decomposing predictive signal into known-known, known-unknown and unknown-unknown contributions and identifying analytically where frustration affects performance. Experiments on synthetic data and real language and vision tasks demonstrate that frustration can be detected in foundation model representations and that incorporating a frustrating concept into an interpretable model reorganises the geometry of learned concept representations, to better align human and machine reasoning. These results suggest a principled framework for diagnosing incomplete concept ontologies and aligning human and machine conceptual reasoning, with implications for the development and validation of safe interpretable AI for high-risk applications.", "link": upervised%20concept-based%20models%20and%20unsupervised%20representations%20derived%20from%20foundation%20models%2C%20and%20show%20that%20the%20phenomenon%20is%20detectable%20in%20task-aligned%20geometry%20while%20conventional%20Euclidean%20comparisons%20fail.%20Under%20a%20linear-Gaussian%20generative%20model%20we%20derive%20a%20closed-form%20expression%20for%20Bayes-optimal%20concept-based%20classifier%20accuracy%2C%20decomposing%20predictive%20signal%20into%20known-known%2C%20known-unknown%20and%20unknown-unknown%20contributions%20and%20identifying%20analytically%20where%20frustration%20affects%20performance.%20Experiments%20on%20synthetic%20data%20and%20real%20language%20and%20vision%20tasks%20demonstrate%20that%20frustration%20can%20be%20detected%20in%20foundation%20model%20representations%20and%20that%20incorporating%20a%20frustrating%20concept%20into%20an%20interpretable%20model%20reorganises%20the%20geometry%20of%20learned%20concept%20representations%2C%20to%20better%20align%20human%20and%20machine%20reasoning.%20These%20results%20suggest%20a%20principled%20framework%20for%20diagnosing%20incomplete%20concept%20ontologies%20and%20aligning%20human%20and%20machine%20conceptual%20reasoning%2C%20with%20implications%20for%20the%20development%20and%20validation%20of%20safe%20interpretable%20AI%20for%20high-risk%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29654v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConcept%2520frustration%253A%2520Aligning%2520human%2520concepts%2520and%2520machine%2520representations%26entry.906535625%3DEnrico%2520Parisini%2520and%2520Christopher%2520J.%2520Soelistyo%2520and%2520Ahab%2520Isaac%2520and%2520Alessandro%2520Barp%2520and%2520Christopher%2520R.%2520S.%2520Banerji%26entry.1292438233%3DAligning%2520human-interpretable%2520concepts%2520with%2520the%2520internal%2520representations%2520learned%2520by%2520modern%2520machine%2520learn

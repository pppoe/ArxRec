{"title": "A Comprehensive Information-Decomposition Analysis of Large Vision-Language Models", "author": "Lixin Xiu and Xufang Luo and Hideki Nakayama", "abstract": "Large vision-language models (LVLMs) achieve impressive performance, yet their internal decision-making processes remain opaque, making it difficult to determine if the success stems from true multimodal fusion or from reliance on unimodal priors. To address this attribution gap, we introduce a novel framework using partial information decomposition (PID) to quantitatively measure the \"information spectrum\" of LVLMs -- decomposing a model's decision-relevant information into redundant, unique, and synergistic components. By adapting a scalable estimator to modern LVLM outputs, our model-agnostic pipeline profiles 26 LVLMs on four datasets across three dimensions -- breadth (cross-model & cross-task), depth (layer-wise information dynamics), and time (learning dynamics across training). Our analysis reveals two key results: (i) two task regimes (synergy-driven vs. knowledge-driven) and (ii) two stable, contrasting family-level strategies (fusion-centric vs. language-centric). We also uncover a consistent three-phase pattern in layer-wise processing and identify visual instruction tuning as the key stage where fusion is learned. Together, these contributions provide a quantitative lens beyond accuracy-only evaluation and offer insights for analyzing and designing the next generation of LVLMs. Code and data are available at https://github.com/RiiShin/pid-lvlm-analysis .", "link": "http://arxiv.org/abs/2603.29676v1", "date": "2026-03-31", "relevancy": 3.0565, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6459}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6459}, {"title": "Flexi {"title": "LG-HCC: Local Geometry-Aware Hierarchical Context Compression for 3D Gaussian Splatting", "author": "Xuan Deng and Xiandong Meng and Hengyu Man and Qiang Zhu and Tiange Zhang and Debin Zhao and Xiaopeng Fan", "abstract": "Although 3D Gaussian Splatting (3DGS) enables high-fidelity real-time rendering, its prohibitive storage overhead severely hinders practical deployment. Recent anchor-based 3DGS compression schemes reduce gaussina redundancy through ome advanced context models. However, overlook explicit geometric dependencies, leading to structural degradation and suboptimal rate-distortion performance. In this paper, we propose LG-HCC, a geometry-aware 3DGS compression framework that incorporates inter-anchor geometric correlations into anchor pruning and entropy coding for compact representation. Specifically, we introduce an Neighborhood-Aware Anchor Pruning (NAAP) strategy, which evaluates anchor importance via weighted neighborhood feature aggregation and merges redundant anchors into salient neighbors, yielding a compact yet geometry-consistent anchor set. Building upon this optimized structure, we further develop a hierarchical entropy coding scheme, in which coarse-to-fine priors are exploited through a lightweight Geometry-Guided Convolution (GG-Conv) operator to enable spatially adaptive context modeling and rate-distortion optimization. Extensive experiments demonstrate that LG-HCC effectively resolves the structure preservation bottleneck, maintaining superior geometric integrity and rendering fidelity over state-of-the-art anchor-based compression approaches.", "link": "http://arxiv.org/abs/2603.28431v2", "date": "2026-03-31", "relevancy": 3.0378, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6165}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1" -Conv%29%20operator%20to%20enable%20spatially%20adaptive%20context%20modeling%20and%20rate-distortion%20optimization.%20Extensive%20experiments%20demonstrate%20that%20LG-HCC%20effectively%20resolves%20the%20structure%20preservation%20bottleneck%2C%20maintaining%20superior%20geometric%20integrity%20and%20rendering%20fidelity%20over%20state-of-the-art%20anchor-based%20compression%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28431v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLG-HCC%253A%2520Local%2520Geometry-Aware%2520Hierarchical%2520Context%2520Compression%2520for%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DXuan%2520Deng%2520and%2520Xiandong%2520Meng%2520and%2520Hengyu%2520Man%2520and%2520Qiang%2520Zhu%2520and%2520Tiange%2520Zhang%2520and%2520Debin%2520Zhao%2520and%2520Xiaopeng%2520Fan%26entry.1292438233%3DAlthough%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520enables%2520high-fidelity%2520real-time%2520rendering%252C%2520its%2520prohibitive%2520storage%2520overhead%2520severely%2520hinders%2520practical%2520deployment.%2520Recent%2520anchor-based%25203DGS%2520compression%2520schemes%2520reduce%2520gaussina%2520redundancy%2520through%2520ome%2520advanced%2520context%2520models.%2520However%252C%2520overlook%2520explicit%2520geometric%2520dependencies%252C%2520leading%2520to%2520structural%2520degradation%2520and%2520suboptimal%2520rate-distortion%2520performance.%2520In%2520this%2520paper%252C%2520we%2520propose%2520LG-HCC%252C%2520a%2520geometry-aware%25203DGS%2520compression%2520framework%2520that%2520incorporates%2520inter-anchor%2520geometric%2520correlations%2520into%2520anchor%2520pruning%2520and%2520entropy%2520coding%2520for%2520compact%2520representation.%2520Specifically%252C%2520we%2520introduce%2520an%2520Neighborhood-Aware%2520Anchor%2520Pruning%2520%2528NAAP%2529%2520strategy%252C%2520which%2520evaluates%2520anchor%2520importance%25 {"title": "TUGS: Physics-based Compact Representation of Underwater Scenes by Tensorized Gaussian", "author": "Shijie Lian and Ziyi Zhang and Hua Li and Laurence Tianruo Yang and Mengyu Ren and Debin Liu and Wenhui Wu", "abstract": "Underwater 3D scene reconstruction is crucial for multimedia applications in adverse environments, such as underwater robotic perception and navigation. However, the complexity of interactions between light propagation, water medium, and object surfaces poses significant difficulties for existing methods in accurately simulating their interplay. Additionally, expensive training and rendering costs limit their practical application. Therefore, we propose Tensorized Underwater Gaussian Splatting (TUGS), a compact underwater 3D representation based on physical modeling of complex underwater light fields. TUGS includes a physics-based underwater Adaptive Medium Estimation (AME) module, enabling accurate simulation of both light attenuation and backscatter effects in underwater environments, and introduces Tensorized Densification Strategies (TDS) to efficiently refine the tensorized representation during optimization. TUGS is able to render high-quality underwater images with faster rendering speeds and less memory usage. Extensive experiments on real-world underwater datasets have demonstrated that TUGS can efficiently achieve superior reconstruction quality using a limited number of parameters. The code is available at https://liamlian0727.github.io/TUGS", "link": "http://arxiv.org/abs/2505.08811v2", "date": "2026-03-31", "relevancy": 2.9872, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6268}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6028}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5627}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TUGS%3A%20Physics-based%20Compact%20Representation%20of%20Underwater%20Scenes%20by%20Tensorized%20Gaussian&body=Title%3A%20TUGS%3A%20Physics-based%20Compact%20Representation%20of%20Underwater%20Scenes%20by%20Tensorized%20Gaussian%0AAuthor%3A%20Shijie%20Lian%20and%20Ziyi%20Zhang%20and%20Hua%20Li%20and%20Laurence%20Tianruo%20Yang%20and%20Mengyu%20Ren%20and%20Debin%20Liu%20and%20Wenhui%20Wu%0AAbstract%3A%20Underwater%203D%20scene%20reconstruction%20is%20crucial%20for%20multimedia%20applications%20in%20adverse%20environments%2C%20such%20as%20underwater%20robotic%20perception%20and%20navigation.%20However%2C%20the%20complexity%20of%20interactions%20between%20light%20propagation%2C%20water%20medium%2C%20and%20object%20surfaces%20poses%20significant%20difficulties%20for%20existing%20methods%20in%20accurately%20simulating%20their%20interplay.%20Additionally%2C%20expensive%20training%20and%20rendering%20costs%20limit%20their%20practical%20application.%20Therefore%2C%20we%20propose%20Tensorized%20Underwater%20Gaussian%20Splatting%20%28TUGS%29%2C%20a%20compact%20underwater%203D%20representation%20based%20on%20physical%20modeling%20of%20complex%20underwater%20light%20fields.%20TUGS%20includes%20a%20physics-based%20underwater%20Adaptive%20Medium%20Estimation%20%28AME%29%20module%2C%20enabling%20accurate%20simulation%20of%20both%20light%20attenuation%20and%20backscatter%20effects%20in%20underwater%20environments%2C%20and%20introduces%20Tensorized%20Densification%20Strategies%20%28TDS%29%20to%20efficiently%20refine%20the%20tensorized%20representation%20during%20optimization.%20TUGS%20is%20able%20to%20render%20high-quality%20underwater%20images%20with%20faster%20rendering%20speeds%20and%20less%20memory%20usage.%20Extensive%20experiments%20on%20real-world%20underwater%20datasets%20have%20demonstrated%20that%20TUGS%20can%20efficiently%20achieve%20superior%20reconstruction%20quality%20using%20a%20limited%20number%20of%20parameters.%20The%20code%20is%20available%20at%20https%3A//liamlian0727.github.io/TUGS%0ALink%3A%20http%3A//arxiv.org/abs/2505.08811v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTUGS%253A%2520Physics-based%2520Compact%2520Representation%2520of%2520Underwater%2520Scenes%2520by%2520Tensorized%2520Gaussian%26entry.906535625%3DShijie%2520Lian%2520and%2520Ziyi%2520Zhang%2520and%2520Hua%2520Li%2520and%2520Laurence%2520Tianruo%2520Yang%2520and%2520Mengyu%2520Ren%2520and%2520Debin%2520Liu%2520and%2520Wenhui%2520Wu%26entry.1292438233%3DUnderwater%25203D%2520scene%2520reconstruction%2520is%2520crucial%2520for%2520multimedia%2520applications%2520in%2520adverse%2520environments%252C%2520such%2520as%2520underwater%2520robotic%2520perception%2520and%2520navigation.%2520However%252C%2520the%2520complexity%2520of%2520interactions%2520between%2520light%2520propagation%252C%2520water%2520medium%252C%2520and%2520object%2520surfaces%2520poses%2520significant%2520difficulties%2520for%2520existing%2520methods%2520in%2520accurately%2520simulating%2520their%2520interplay.%2520Additionally%252C%2520expensive%2520training%2520and%2520rendering%2520costs%2520limit%2520their%2520practical%2520application.%2520Therefore%252C%2520we%2520propose%2520Tensorized%2520Underwater%2520Gaussian%2520Splatting%2520%2528TUGS%2529%252C%2520a%2520compact%2520underwater%25203D%2520representation%2520based%2520on%2520physical%2520modeling%2520of%2520complex%2520underwater%2520light%2520fields.%2520TUGS%2520includes%2520a%2520physics-based%2520underwater%2520Adaptive%2520Medium%2520Estimation%2520%2528AME%2529%2520module%252C%2520enabling%2520accurate%2520simulation%2520of%2520both%2520light%2520attenuation%2520and%2520backscatter%2520effects%2520in%2520underwater%2520environments%252C%2520and%2520introduces%2520Tensorized%2520Dens {"title": "GERD: Geometric event response data generation", "author": "Jens Egholm Pedersen and Dimitris Korakovounis and J\u00f6rg Conradt", "abstract": "Event-based vision sensors offer high time resolution, high dynamic range, and low power consumption, yet event-based vision models lag behind conventional frame-based vision methods. We argue that this gap is partly due to the lack of principled study of the transformation groups that govern event-based visual streams. Motivated by the role that geometric and group-theoretic methods have played in advancing computer vision, we present GERD: a simulator for generating event-based recordings of objects under precisely controlled affine, Galilean, and temporal scaling transformations. By providing ground-truth transformations at each timestep, GERD enables hypothesis-driven and controlled studies of geometric properties that are otherwise impossible to isolate in real-world datasets. The simulator supports three noise models and sub-pixel motion as a complement to real sensor datasets. We demonstrate its use in training and evaluating models with geometric guarantees and release GERD as an open tool available at github.com/ncskth/gerd", "link": "http://arxiv.org/abs/2412.03259v2", "date": "2026-03-31", "relevancy": 2.976, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6064}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6048}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5744}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GERD%3A%20Geometric%20event%20response%20data%20generation&body=Title%3A%20GERD%3A%20Geometric%20event%20response%20data%20generation%0AAuthor%3A%20Jens%20Egholm%20Pederse {"title": "ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning", "author": "Huanxuan Liao and Zhongtao Jiang and Yupu Hao and Yuqiao Tan and Shizhu He and Ben Wang and Jun Zhao and Kun Xu and Kang Liu", "abstract": "Multimodal Large Language Models (MLLMs) achieve stronger visual understanding by scaling input fidelity, yet the resulting visual token growth makes jointly sustaining high spatial resolution and long temporal context prohibitive. We argue that the bottleneck lies not in how post-encoding representations are compressed but in the volume of pixels the encoder receives, and address it with ResAdapt, an Input-side adaptation framework that learns how much visual budget each frame should receive before encoding. ResAdapt couples a lightweight Allocator with an unchanged MLLM backbone, so the backbone retains its native visual-token interface while receiving an operator-transformed input. We formulate allocation as a contextual bandit and train the Allocator with Cost-Aware Policy Optimization (CAPO), which converts sparse rollout feedback into a stable accuracy-cost learning signal. Across budget-controlled video QA, temporal grounding, and image reasoning tasks, ResAdapt improves low-budget operating points and often lies on or near the efficiency-accuracy frontier, with the clearest gains on reasoning-intensive benchmarks under aggressive compression. Notably, ResAdapt supports up to 16x more frames at the same visual budget while delivering over 15% performance gain. Code is available at https://github.com/Xnhyacinth/ResAdapt.", "link": "http://arxiv.org/abs/2603.28610v2", "date": "2026-03-31", "relevancy": 2.967, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6274}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5764}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ResAdapt%3A%20Adaptive%20Resolution%20for%20Efficient%20Multimodal%20Reasoning&body=Title%3A%20ResAdapt%3A%20Adaptive%20Resolution%20for%20Efficient%20Multimodal%20Reasoning%0AAuthor%3A%20Huanxuan%20Liao%20and%20Zhongtao%20Jiang%20and%20Yupu%20Hao%20and%20Yuqiao%20Tan%20and%20Shizhu%20He%20and%20Ben%20Wang%20and%20Jun%20Zhao%20and%20Kun%20Xu%20and%20Kang%20Liu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20achieve%20stronger%20visual%20understanding%20by%20scaling%20input%20fidelity%2C%20yet%20the%20resulting%20visual%20token%20growth%20makes%20jointly%20sustaining%20high%20spatial%20resolution%20and%20long%20temporal%20context%20prohibitive.%20We%20argue%20that%20the%20bottleneck%20lies%20not%20in%20how%20post-encoding%20representations%20are%20compressed%20but%20in%20the%20volume%20of%20pixels%20the%20encoder%20receives%2C%20and%20address%20it%20with%20ResAdapt%2C%20an%20Input-side%20adaptation%20framework%20that%20learns%20how%20much%20visual%20budget%20each%20frame%20should%20receive%20before%20encoding.%20ResAdapt%20couples%20a%20lightweight%20Allocator%20with%20an%20unchanged%20MLLM%20backbone%2C%20so%20the%20backbone%20retains%20its%20native%20visual-token%20interface%20while%20receiving%20an%20operator-transformed%20input.%20We%20formulate%20allocation%20as%20a%20contextual%20bandit%20and%20train%20the%20Allocator%20with%20Cost-Aware%20Policy%20Optimization%20%28CAPO%29%2C%20which%20converts%20sparse%20rollout%20feedback%20into%20a%20stable%20accuracy-cost%20learning%20signal.%20Across%20budget-controlled%20video%20QA%2C%20temporal%20grounding%2C%20and%20image%20reasoning%20tasks%2C%20ResAdapt%20improves%20low-budget%20operating%20points%20and%20often%20lies%20on%20or%20near%20the%20efficiency-accuracy%20frontier%2C%20with%20the%20clearest%20gains%20on%20reasoning-intensive%20benchmarks%20under%20aggressive%20compression.%20Notably%2C%20ResAdapt%20supports%20up%20to%2016x%20more%20frames%20at%20the%20same%20visual%20budget%20while%20delivering%20over%2015%25%20performance%20gain.%20Code%20is%20available%20at%20https%3A//github.com/Xnhyacinth/ResAdapt.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28610v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DResAdapt%253A%2520Adaptive%2520Resolution%2520for%2520Efficient%2520Multimodal%2520Reasoning%26entry.906535625%3DHuanxuan%2520Liao%2520and%2520Zhongtao%2520Jiang%2520and%2520Yupu%2520Hao%2520and%2520Yuqiao%2520Tan%2520and%2520Shizhu%2520He%2520and%2520Ben%2520Wang%2520and%2520Jun%2520Zhao%2520and%2520Kun%2520Xu%2520and%2520Kang%2520Liu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520achieve%2520stronger%2520visual%2520understanding%2520by%2520scaling%2520input%2520fidelity%252C%2520yet%2520the%2520resulting%2520visual%2520token%2520growth%2520makes%2520jointly%2520sustaining%2520high%2520spatial%2520resolution%2520and%2520long%2520temporal%2520context%2520prohibitive.%2520We%2520argue%2520that%2520the%2520bottleneck%2520lies%2520not%2520in%2520how%2520post-encoding%2520representations%2520are%2520compressed%2520but%2520in%2520the%2520volume%2520of%2520pixels%2520the%2520encoder%2520receives%252C%2520and%2520address%2520it%2520with%2520ResAdapt%252C%2520an%2520Input-side%2520adaptation%2520framework%2520that%2520learns%2520how%2520much%2520visual%2520budget%2520each%2520frame%2520should%2520receive%2520before%2520encoding.%2520ResAdapt%2520couples%2520a%2520lightweight%2520Allocator%2520with%2520an%2520unchanged%2520MLLM%2520backbone%252C%2520so%2520the%2520backbone%2520retains%2520its%2520native%2520visual-token%2520interface%2520while%2520receiving%2520an%2520operator-transformed%2520input.%2520We%2520formulate%25 {"title": "SVBench: Evaluation of Video Generation Models on Social Reasoning", "author": "Wenshuo Peng and Gongxuan Wang and Tianmeng Yang and Chuanhao Li and Xiaojie Xu and Hui He and Kaipeng Zhang", "abstract": "Recent text-to-video generation models have made remarkable progress in visual realism, motion fidelity, and text-video alignment, yet they still struggle to produce socially coherent behavior. Unlike humans, who readily infer intentions, beliefs, emotions, and social norms from brief visual cues, current models often generate literal scenes without capturing the underlying causal and psychological dynamics. To systematically assess this limitation, we introduce the first benchmark for social reasoning in video generation. Grounded in developmental and social psychology, the benchmark covers thirty classic social cognition paradigms spanning seven core dimensions: mental-state inference, goal-directed action, joint attention, social coordination, prosocial behavior, social norms, and multi-agent strategy. To operationalize these paradigms, we build a fully training-free agent-based pipeline that distills the reasoning structure of each paradigm, synthesizes diverse video-ready scenarios, enforces conceptual neutrality and difficulty control through cue-based critique, and evaluates generated videos with a high-capacity VLM judge along five interpretable dimensions of social reasoning. Using this framework, we conduct the first large-scale evaluation of seven state-of-the-art video generation systems. Results show a clear gap between surface-level plausibility and deeper social reasoning, suggesting that current models remain limited in their ability to generate socially grounded behavior. https://github.com/Gloria2tt/SVBench-Evaluation", "link": "http://arxiv.org/abs/2512.21507v5", "date": "2026-03-31", "relevancy": 2.9648, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6085}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5912}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5792}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SVBench%3A%20Evaluation%20of%20Video%20Generation%20Models%20on%20Social%20Reasoning&body=Title%3A%20SVBench%3A%20Evaluation%20of%20Video%20Generation%20Models%20on%20Social%20Reasoning%0AAuthor%3A%20Wenshuo%20Peng%20and%20Gongxuan%20Wang%20and%20Tianmeng%20Yang%20and%20Chuanhao%20Li%20and%20Xiaojie%20Xu%20and%20Hui%20He%20and%20Kaipeng%20Zhang%0AAbstract%3A%20Recent%20text-to-video%20generation%20models%20have%20made%20remarkable%20progress%20in%20visual%20realism%2C%20motion%20fidelity%2C%20and%20text-video%20alignment%2C%20yet%20they%20still%20struggle%20to%20produce%20socially%20coherent%20behavior.%20Unlike%20humans%2C%20who%20readily%20infer%20intentions%2C%20beliefs%2C%20emotions%2C%20and%20social%20norms%20from%20brief%20visual%20cues%2C%20current%20models%20often%20generate%20literal%20scenes%20without%20capturing%20the%20underlying%20causal%20and%20psychological%20dynamics.%20To%20systematically%20assess%20this%20limitation%2C%20we%20introduce%20the%20first%20benchmark%20for%20social%20reasoning%20in%20video%20generation.%20Grounded%20in%20developmental%20and%20social%20psychology%2C%20the%20benchmark%20covers%20thirty%20classic%20social%20cognition%20paradigms%20spanning%20seven%20core%20dimensions%3A%20mental-state%20inference%2C%20goal-directed%20action%2C%20joint%20attention%2C%20social%20coordination%2C%20prosocial%20behavior%2C%20social%20norms%2C%20and%20multi-agent%20strategy.%20To%20operationalize%20these%20paradigms%2C%20we%20build%20a%20fully%20training-free%20agent-based%20pipeline%20that%20distills%20the%20reasoning%20structure%20of%20each%20paradigm%2C%20synthesizes%20diverse%20video-ready%20scenarios%2C%20enforces%20conceptual%20neutrality%20and%20difficulty%20control%20through%20cue-based%20critique%2C%20and%20evaluates%20generated%20videos%20with%20a%20high-capacity%20VLM%20judge%20along%20five%20interpretable%20dimensions%20of%20social%20reasoning.%20Using%20this%20framework%2C%20we%20conduct%20the%20first%20large-scale%20evaluation%20of%20seven%20state-of-the-art%20video%20generation%20systems.%20Results%20show%20a%20clear%20gap%20between%20surface-level%20plausibility%20and%20deeper%20social%20reasoning%2C%20suggesting%20that%20current%20models%20remain%20limited%20in%20their%20ability%20to%20generate%20socially%20grounded%20behavior.%20https%3A//github.com/Gloria2tt/SVBench-Evaluation%0ALink%3A%20http%3A//arxiv.org/abs/2512.21507v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSVBench%253A%2520Evaluation%2520of%2520Video%2520Generation%2520Models%2520on%2520Social%2520Reasoning%26entry.906535625%3DWenshuo%2520Peng%2520and%2520Gongxuan%2520Wang%2520and%2520Tianmeng%2520Yang%2520and%2520Chuanhao%2520Li%2520and%2520Xiaojie%2520Xu%2520and%2520Hui%2520He%2520and%2520Kaipeng%2520Zhang%26entry.1292438233%3DRecent%2520text-to-video%2520generation%2520models%2520have%2520made%2520remarkable%2520progress%2520in%2520visual%2520realism%252C%2520motion%2520fidelity%252C%2520and%2520text-video%2520alignment%252C%2520yet%2520they%2520still%2520struggle%2520to%2520produce%2520socially%2520coherent%2520behavior.%2520Unlike%2520humans%252C%2520who%2520readily%2520infer%2520intentions%252C%2520beliefs%252C%2520emotions%252C%2520and%2520social%2520norms%2520from%2520brief%2520visual%2520cues%252C%2520current%2520models%2520often%2520generate%2520literal%2520scenes%2520without%2520capturing%2520the%2520underlying%2520causal%2520and%2520psychological%2520dynamics.%2520To%2520systematically%2520assess%2520this%2520limitation%252C%2520we%2520intr {"title": "Efficient Universal Perception Encoder", "author": "Chenchen Zhu and Saksham Suri and Cijo Jose and Maxime Oquab and Marc Szafraniec and Wei Wen and Yunyang Xiong and Patrick Labatut and Piotr Bojanowski and Raghuraman Krishnamoorthi and Vikas Chandra", "abstract": "Running AI models on smart edge devices can unlock versatile user experiences, but presents challenges due to limited compute and the need to handle multiple tasks simultaneously. This requires a vision encoder with small size but powerful and versatile representations. We present our method, Efficient Universal Perception Encoder (EUPE), which offers both inference efficiency and universally good representations for diverse downstream tasks. We achieve this by distilling from multiple domain-expert foundation vision encoders. Unlike previous agglomerative methods that directly scale down from multiple teachers to an efficient encoder, we demonstrate the importance of first scaling up to a large proxy teacher and then scaling down from this single teacher. Experiments show that EUPE achieves on-par or better performance than individual domain experts of the same size on diverse task domains and also outperforms previous agglomerative encoders. We release the full family of EUPE models and the code to foster future research.", "link": "http://arxiv.org/abs/2603.22387v2", "date": "2026-03-31", "relevancy": 2.963, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5975}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5975}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Universal%20Per {"title": "Noise-adapted Neural Operator for Robust Non-Line-of-Sight Imaging", "author": "Lianfang Wang and Kuilin Qin and Xueying Liu and Huibin Chang and Yong Wang and Yuping Duan", "abstract": "This work has been submitted to the IEEE for possible publication. Copyright may be transferred without notice, after which this version may no longer be accessible. Computational imaging, especially non-line-of-sight (NLOS) imaging, the extraction of information from obscured or hidden scenes is achieved through the utilization of indirect light signals resulting from multiple reflections or scattering. The inherently weak nature of these signals, coupled with their susceptibility to noise, necessitates the integration of physical processes to ensure accurate reconstruction. This paper presents a parameterized inverse problem framework tailored for large-scale linear problems in 3D imaging reconstruction. Initially, a noise estimation module is employed to adaptively assess the noise levels present in transient data. Subsequently, a parameterized neural operator is developed to approximate the inverse mapping, facilitating end-to-end rapid image reconstruction. Our 3D image reconstruction framework, grounded in operator learning, is constructed through deep algorithm unfolding, which not only provides commendable model interpretability but also enables dynamic adaptation to varying noise levels in the acquired data, thereby ensuring consistently robust and accurate reconstruction outcomes. Furthermore, we introduce a novel method for the fusion of global and local spatiotemporal data features. By integrating structural and detailed information, this method significantly enhances both accuracy and robustness. Comprehensive numerical experiments conducted on both simulated and real datasets substantiate the efficacy of the proposed method. It demonstrates remarkable performance with fast scanning data and sparse illumination point data, offering a viable solution for NLOS ise%20levels%20present%20in%20transient%20data.%20Subsequently%2C%20a%20parameterized%20neural%20operator%20is%20developed%20to%20approximate%20the%20inverse%20mapping%2C%20facilitating%20end-to-end%20rapid%20image%20reconstruction.%20Our%203D%20image%20reconstruction%20framework%2C%20grounded%20in%20operator%20learning%2C%20is%20constructed%20through%20deep%20algorithm%20unfolding%2C%20which%20not%20only%20provides%20commendable%20model%20interpretability%20but%20also%20enables%20dynamic%20adaptation%20to%20varying%20noise%20levels%20in%20the%20acquired%20data%2C%20thereby%20ensuring%20consistently%20robust%20and%20accurate%20reconstruction%20outcomes.%20Furthermore%2C%20we%20introduce%20a%20novel%20method%20for%20the%20fusion%20of%20global%20and%20local%20spatiotemporal%20data%20features.%20By%20integrating%20structural%20and%20detailed%20information%2C%20this%20method%20significantly%20enhances%20both%20accuracy%20and%20robustness.%20Comprehensive%20numerical%20experiments%20conducted%20on%20both%20simulated%20and%20real%20datasets%20substantiate%20the%20efficacy%20of%20the%20proposed%20method.%20It%20demonstrates%20remarkable%20performance%20with%20fast%20scanning%20data%20and%20sparse%20illumination%20point%20data%2C%20offering%20a%20viable%20solution%20for%20NLOS%20imaging%20in%20complex%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2508.09655v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNoise-adapted%2520Neural%2520Operator%2520for%2520Robust%2520Non-Line-of-Sight%2520Imaging%26entry.906535625%3DLianfang%2520Wang%2520and%2520Kuilin%2520Qin%2520and%2520Xueying%2520Liu%2520and%2520Huibin%2520Chang%2520and%2520Yong%2520Wang%2520and%2520Yuping%2520Duan%26entry.1292438233%3DThis%2520work%2520has%2520been%2520submitted%2520to%2520the%2520IEEE%2520for%2520possible%2520publication.%2520Copyright%2520may%2520be%2520transferred%2520without%2520notice%252C%2520after%2520which%2 {"title": "The Prism Hypothesis: Harmonizing Semantic and Pixel Representations via Unified Autoencoding", "author": "Weichen Fan and Haiwen Diao and Quan Wang and Dahua Lin and Ziwei Liu", "abstract": "Deep representations across modalities are inherently intertwined. In this paper, we systematically analyze the spectral characteristics of various semantic and pixel encoders. Interestingly, our study uncovers a highly inspiring and rarely explored correspondence between an encoder's feature spectrum and its functional role: semantic encoders primarily capture low-frequency components that encode abstract meaning, whereas pixel encoders additionally retain high-frequency information that conveys fine-grained detail. This heuristic finding offers a unifying perspective that ties encoder behavior to its underlying spectral structure. We define it as the Prism Hypothesis, where each data modality can be viewed as a projection of the natural world onto a shared feature spectrum, just like the prism. Building on this insight, we propose Unified Autoencoding (UAE), a model that harmonizes semantic structure and pixel details via an innovative frequency-band modulator, enabling their seamless coexistence. Extensive experiments demonstrate that UAE effectively unifies semantic abstraction and pixel-level fidelity within a single latent space, achieving state-of-the-art performance. Moreover, we show that UAE can be directly applied to pixel-space modeling, significantly improving both FID and IS over the vanilla JIT baseline. Our code is avaliable at: https://github.com/WeichenFan/UAE.", "link": "http://arxiv.org/abs/2512.19693v4", "date": "2026-03-31", "relevancy": 2.8609, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.6131}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5517}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Prism%20Hypothesis%3A%20Harmonizing%20Semantic%20and%20Pixel%20Representations%20via%20Unified%20Autoencoding&body=Title%3A%20The%20Prism%20Hypothesis%3A%20Harmonizing%20Semantic%20and%20Pixel%20Representations%20via%20Unified%20Autoencoding%0AAuthor%3A%20Weichen%20Fan%20and%20Haiwen%20Diao%20and%20Quan%20Wang%20and%20Dahua%20Lin%20and%20Ziwei%20Liu%0AAbstract%3A%20Deep%20representations%20across%20modalities%20are%20inherently%20intertwined.%20In%20this%20paper%2C%20we%20systematically%20analyze%20the%20spectral%20characteristics%20of%20various%20semantic%20and%20pixel%20encoders.%20Interestingly%2C%20our%20study%20uncovers%20a%20highly%20inspiring%20and%20rarely%20explored%20correspondence%20between%20an%20encoder%27s%20feature%20spectrum%20and%20its%20functional%20role%3A%20semantic%20encoders%20primarily%20capture%20low-frequency%20components%20that%20encode%20abstract%20meaning%2C%20whereas%20pixel%20encoders%20additionally%20retain%20high-frequency%20information%20that%20conveys%20fine-grained%20detail.%20This%20heuristic%20finding%20offers%20a%20unifying%20perspective%20that%20ties%20encoder%20behavior%20to%20its%20underlying%20spectral%20structure.%20We%20define%20it%20as%20the%20Prism%20Hypothesis%2C%20where%20each%20data%20modality%20can%20be%20viewed%20as%20a%20projection%20of%20the%20natural%20world%20onto%20a%20shared%20feature%20spectrum%2C%20just%20like%20the%20prism.%20Building%20on%20this%20insight%2C%20we%20propose%20Unified%20Autoencoding%20%28UAE%29%2C%20a%20model%20that%20harmonizes%20semantic%20structure%20and%20pixel%20details%20via%20an%20innovative%20frequency-band%20modulator%2C%20enabling%20their%20seamless%20coexistence.%20Extensive%20experiments%20demonstrate%20that%20UAE%20effectively%20unifies%20semantic%20abstraction%20and%20pixel-level%20fidelity%20within%20a%20single%20latent%20space%2C%20achieving%20state-of-the-art%20performance.%20Moreover%2C%20we%20show%20that%20UAE%20can%20be%20directly%20applied%20to%20pixel-space%20modeling%2C%20significantly%20improving%20both%20FID%20and%20IS%20over%20the%20vanilla%20JIT%20baseline.%20Our%20code%20is%20avaliable%20at%3A%20https%3A//github.com/WeichenFan/UAE.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19693v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Prism%2520Hypothesis%253A%2520Harmonizing%2520Semantic%2520and%2520Pixel%2520Representations%2520via%2520Unified%2520Autoencoding%26entry.906535625%3DWeichen%2520Fan%2520and%2520Haiwen%2520Diao%2520and%2520Quan%2520Wang%2520and%2520Dahua%2520Lin%2520and%2520Ziwei%2520Liu%26entry.1292438233%3DDeep%2520representations%2520across%2520modalities%2520are%2520inherently%2520intertwined.%2520In%2520this%2520paper%252C%2520we%2520systematically%2520analyze%2520the%2520spectral%2520characteristics%2520of%2520various%2520semantic%2520and%2520pixel%2520encoders.%2520Interestingly%252C%2520our%2520study%2520uncovers%2520a%2520highly%2520inspiring%2520and%2520rarely%2520explored%2520correspondence%2520between%2520an%2520encoder%2527s%2520feature%2520spectrum%2520and%2520its%2520functional%2520role%253A%2520semantic%2520encoders%2520primarily%2520capture%2520low-frequency%2520components%2520that%2520encode%2520abstract%2520meaning%252C%2520whereas%2520pixel%2520encoders%2520additionally%2520retain%2520high-frequency%2520information%2520that%2520conveys%2520fine-grained%2520detail.%2520This%2520heuristic%2520finding%2520offers%2520a%2520unifying%2520perspective%2520that%2520ties%2520encoder%2520behavior%2520to%2520its%2520underlying%2520spectral%2520structure.%2520We%2520define%2520it%2520as%2520the%2520Prism%2520Hypothesis%252C%2520where%2520each%2520data%2520mo {"title": "Leveraging Synthetic Data for Enhancing Egocentric Hand-Object Interaction Detection", "author": "Rosario Leonardi and Antonino Furnari and Francesco Ragusa and Giovanni Maria Farinella", "abstract": "In this work, we explore the role of synthetic data in improving the detection of Hand-Object Interactions from egocentric images. Through extensive experimentation and comparative analysis on VISOR, EgoHOS, and ENIGMA-51 datasets, our findings demonstrate the potential of synthetic data to significantly improve HOI detection, particularly when real labeled data are scarce or unavailable. By using synthetic data and only 10% of the real labeled data, we achieve improvements in Overall AP over models trained exclusively on real data, with gains of +5.67% on VISOR, +8.24% on EgoHOS, and +11.69% on ENIGMA-51. Furthermore, we systematically study how aligning synthetic data to specific real-world benchmarks with respect to objects, grasps, and environments, showing that the effectiveness of synthetic data consistently improves with better synthetic-real alignment. As a result of this work, we release a new data generation pipeline and the new HOI-Synth benchmark, which augments existing datasets with synthetic images of hand-object interaction. These data are automatically annotated with hand-object contact states, bounding boxes, and pixel-wise segmentation masks. All data, code, and tools for synthetic data generation are available at: https://fpv-iplab.github.io/HOI-Synth/.", "link": "http://arxiv.org/abs/2603.29733v1", "date": "2026-03-31", "relevancy": 2.8565, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5931}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5653}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxi {"title": "Generating Key Postures of Bharatanatyam Adavus with Pose Estimation", "author": "Jagadish Kashinath Kamble and Jayanta Mukhopadhyay and Debaditya Roy and Partha Pratim Das", "abstract": "Preserving intangible cultural dances rooted in centuries of tradition and governed by strict structural and symbolic rules presents unique challenges in the digital era. Among these, Bharatanatyam, a classical Indian dance form, stands out for its emphasis on codified adavus and precise key postures. Accurately generating these postures is crucial not only for maintaining anatomical and stylistic integrity, but also for enabling effective documentation, analysis, and transmission to broader global audiences through digital means. We propose a pose-aware generative framework integrated with a pose estimation module, guided by keypoint-based loss and pose consistency constraints. These supervisory signals ensure anatomical accuracy and stylistic integrity in the synthesized outputs. We evaluate four configurations: standard conditional generative adversarial network (cGAN), cGAN with pose supervision, conditional diffusion, and conditional diffusion with pose supervision. Each model is conditioned on key posture class labels and optimized to maintain geometric structure. In both cGAN and conditional diffusion settings, the integrated pose guidance aligns generated poses with ground-truth keypoint structures, promoting cultural fidelity. Our results demonstrate that incorporating pose supervision significantly enhances the quality, realism, and authenticity of generated Bharatanatyam postures. This framework provides a scalable approach for the digital preservation, education, and dissemination of traditional dance forms, enabling high-fidelity generation without compromising cultural precision. Code is available at https://github.com/jagidsh/Generating-Key-Postures-of-Bharatanatyam-Adavus-with-Pose-Estimation.", "link": "http://arxiv.org/abs/2603.29570v1", "date": "2026-03-31", "relevancy": 2.8445, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5877}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5728}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generating%20Key%20Postures%20of%20Bharatanatyam%20Adavus%20with%20Pose%20Estimation&body=Title%3A%20Generating%20Key%20Postures%20of%20Bharatanatyam%20Adavus%20with%20Pose%20Estimation%0AAuthor%3A%20Jagadish%20Kashinath%20Kamble%20and%20Jayanta%20Mukhopadhyay%20and%20Debaditya%20Roy%20and%20Partha%20Pratim%20Das%0AAbstract%3A%20Preserving%20intangible%20cultural%20dances%20rooted%20in%20centuries%20of%20tradition%20and%20governed%20by%20strict%20structural%20and%20symbolic%20rules%20presents%20unique%20challenges%20in%20the%20digital%20era.%20Among%20these%2C%20Bharatanatyam%2C%20a%20classical%20Indian%20dance%20form%2C%20stands%20out%20for%20its%20emphasis%20on%20codified%20adavus%20and%20precise%20key%20postures.%20Accurately%20generating%20these%20postures%20is%20crucial%20not%20only%20for%20maintaining%20anatomical%20and%20stylistic%20integrity%2C%20but%20also%20for%20enabling%20effective%20documentation%2C%20analysis%2C%20and%20transmission%20to%20broader%20global%20audiences%20through%20digital%20means.%20We%20propose%20a%20pose-aware%20generative%20framework%20integrated%20with%20a%20pose%20estimation%20module%2C%20guided%20by%20keypoint-based%20loss%20and%20pose%20consistency%20constraints.%20These%20supervisory%20signals%20ensure%20anatomical%20accuracy%20and%20stylistic%20integrity%20in%20the%20synthesized%20outputs.%20We%20evaluate%20four%20configurations%3A%20standard%20conditional%20generative%20adversarial%20network%20%28cGAN%29%2C%20cGAN%20with%20pose%20supervision%2C%20conditional%20diffusion%2C%20and%20conditional%20diffusion%20with%20pose%20supervision.%20Each%20model%20is%20conditioned%20on%20key%20posture%20class%20labels%20and%20optimized%20to%20maintain%20geometric%20structure.%20In%20both%20cGAN%20and%20conditional%20diffusion%20settings%2C%20the%20integrated%20pose%20guidance%20aligns%20generated%20poses%20with%20ground-truth%20keypoint%20structures%2C%20promoting%20cultural%20fidelity.%20Our%20results%20demonstrate%20that%20incorporating%20pose%20supervision%20significantly%20enhances%20the%20quality%2C%20realism%2C%20and%20authenticity%20of%20generated%20Bharatanatyam%20postures.%20This%20framework%20provides%20a%20scalable%20approach%20for%20the%20digital%20preservation%2C%20education%2C%20and%20dissemination%20of%20traditional%20dance%20forms%2C%20enabling%20high-fidelity%20generation%20without%20compromising%20cultural%20precision.%20Code%20is%20available%20at%20https%3A//github.com/jagidsh/Generating-Key-Postures-of-Bharatanatyam-Adavus-with-Pose-Estimation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29570v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerating%2520Key%2520Postures%2520of%2520Bharatanatyam%2520Adavus%2520with%2520Pose%2520Estimation%26entry.906535625%3DJagadish%2520Kashinath%2520Kamble%2520and%2520Jayanta%2520Mukhopadhyay%2520and%2520Debaditya%2520Roy%2520and%2520Partha%2520Pratim%2520Das%26entry.1292438233%3DPreserving%2520intangible%2520cultural%2520dances%2520rooted%2520in%2520centuries%2520of%2520tradition%2520and%2520governed%2520by%2520strict%2520structural%2520and%2520symbolic%2520rules%2520presents%2520unique%2520challenges%2520in%2520the%2520digital%2520era.%2520Among%2520these%252C%2520Bharatanatyam%252C%2520a%2520classical%2520Indian%2520dance%2520form%252C%2520stands%2520out%2520for%2520its%2520emphasis%2520on%2520codified%2520adavus%2520and%2520precise%2520key%2520postures.%2520Accuratel {"title": "STRADAViT: Towards a Foundational Model for Radio Astronomy through Self-Supervised Transfer", "author": "Andrea DeMarco and Ian Fenech Conti and Hayley Camilleri and Ardiana Bushi and Simone Riggi", "abstract": "Next-generation radio astronomy surveys are producing millions of resolved sources, but robust morphology analysis remains difficult across heterogeneous telescopes and imaging pipelines. We present STRADAViT, a self-supervised Vision Transformer continued-pretraining framework for transferable radio astronomy image encoders. STRADAViT combines a mixed-survey pretraining dataset, radio astronomy-aware view generation, and controlled continued pretraining through reconstruction-only, contrastive-only, and two-stage branches. Pretraining uses 512x512 radio astronomy cutouts from MeerKAT, ASKAP, LOFAR/LoTSS, and SKA data. We evaluate transfer with linear probing and fine-tuning on three morphology benchmarks: MiraBest, LoTSS DR2, and Radio Galaxy Zoo. Relative to the initialization used for continued pretraining, the best two-stage STRADAViT models improve Macro-F1 in all reported linear-probe settings and in most fine-tuning settings, with the largest gain on RGZ DR1. Relative to strong DINOv2 baselines, gains are selective but remain positive on LoTSS DR2 and RGZ DR1 under linear probing, and on MiraBest and RGZ DR1 under fine-tuning. A targeted DINOv2-initialized HCL ablation further shows that the adaptation recipe is not specific to a single starting point. The released STRADAViT checkpoint remains the preferred model because it offers competitive transfer at lower token count and downstream cost than the DINOv2-based alternative. These results show that radio astronomy-aware view generation and staged continued pretraining provide a stronger starting point than out-of-the-box Vision Transformers for radio astronomy transfer.", "link": "http://arxiv.org/abs/2603.29660v1", "date": "2026-03-31", "relevancy": 2.8387, "topK": [{"title": "TAMM: TriA s%20improve%20Macro-F1%20in%20all%20reported%20linear-probe%20settings%20and%20in%20most%20fine-tuning%20settings%2C%20with%20the%20largest%20gain%20on%20RGZ%20DR1.%20Relative%20to%20strong%20DINOv2%20baselines%2C%20gains%20are%20selective%20but%20remain%20positive%20on%20LoTSS%20DR2%20and%20RGZ%20DR1%20under%20linear%20probing%2C%20and%20on%20MiraBest%20and%20RGZ%20DR1%20under%20fine-tuning.%20A%20targeted%20DINOv2-initialized%20HCL%20ablation%20further%20shows%20that%20the%20adaptation%20recipe%20is%20not%20specific%20to%20a%20single%20starting%20point.%20The%20released%20STRADAViT%20checkpoint%20remains%20the%20preferred%20model%20because%20it%20offers%20competitive%20transfer%20at%20lower%20token%20count%20and%20downstream%20cost%20than%20the%20DINOv2-based%20alternative.%20These%20results%20show%20that%20radio%20astronomy-aware%20view%20generation%20and%20staged%20continued%20pretraining%20provide%20a%20stronger%20starting%20point%20than%20out-of-the-box%20Vision%20Transformers%20for%20radio%20astronomy%20transfer.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29660v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTRADAViT%253A%2520Towards%2520a%2520Foundational%2520Model%2520for%2520Radio%2520Astronomy%2520through%2520Self-Supervised%2520Transfer%26entry.906535625%3DAndrea%2520DeMarco%2520and%2520Ian%2520Fenech%2520Conti%2520and%2520Hayley%2520Camilleri%2520and%2520Ardiana%2520Bushi%2520and%2520Simone%2520Riggi%26entry.1292438233%3DNext-generation%2520radio%2520astronomy%2520surveys%2520are%2520producing%2520millions%2520of%2520resolved%2520sources%252C%2520but%2520robust%2520morphology%2520analysis%2520remains%2520difficult%2520across%2520heterogeneous%2520telescopes%2520and%2520imaging%2520pipelines.%2520We%2520present%2520STRADAViT%252C%2520a%2520self-supervised%2520Vision%2520Transformer%2520continued-pretraining%2520framework%2520for%2520transferable%2520radio%2520astronomy {"title": "InfiniteVL: Synergizing Linear and Sparse Attention for Highly-Efficient, Unlimited-Input Vision-Language Models", "author": "Hongyuan Tao and Bencheng Liao and Shaoyu Chen and Haoran Yin and Qian Zhang and Wenyu Liu and Xinggang Wang", "abstract": "Vision-Language Models (VLMs) are increasingly tasked with ultra-long multimodal understanding. While linear architectures offer constant computation and memory footprints, they often struggle with high-frequency visual perception compared to standard Transformers. To bridge this gap, we introduce \\textbf{InfiniteVL}. We first develop a hybrid base model called \\textbf{InfiniteVL-Base} that interleaves a small fraction of Full Attention layers with Gated DeltaNet. Empowered by a tailored distillation and fine-tuning strategy, InfiniteVL-Base matches the fundamental multimodal performance of equivalent Transformers while achieving a \\textbf{1.7$\\times$} decoding speedup. However, the quadratic complexity of the retained Full Attention inevitably becomes an efficiency bottleneck when scaling to ultra long context. To break this barrier, we propose a novel Long-Sequence Architectural Fine-Tuning strategy that seamlessly transforms the dense attention into vision-specific sparse mechanisms. This yields two specialized variants: \\textbf{InfiniteVL-Offline} for offline retrieval and \\textbf{InfiniteVL-Online} for online streaming. By eliminating the computation explosion of global attention without sacrificing high-frequency visual recall, InfiniteVL-Offline achieves Transformer-level length generalization with a \\textbf{5x} prefill acceleration at 256K context. Concurrently, InfiniteVL-Online delivers robust streaming perception with a constant memory footprint and a real-time throughput of \\textbf{25} FPS. Code and models are available at https://github.com/hustvl/InfiniteVL.", "link": "http://arxiv.org/abs/2512.08829v2", "date": "2026-03-31", "relevancy": 2.8275, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5741}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5741}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5484}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InfiniteVL%3A%20Synergizing%20Linear%20and%20Sparse%20Attention%20for%20Highly-Efficient%2C%20Unlimited-Input%20Vision-Language%20Models&body=Title%3A%20InfiniteVL%3A%20Synergizing%20Linear%20and%20Sparse%20Attention%20for%20Highly-Efficient%2C%20Unlimited-Input%20Vision-Language%20Models%0AAuthor%3A%20Hongyuan%20Tao%20and%20Bencheng%20Liao%20and%20Shaoyu%20Chen%20and%20Haoran%20Yin%20and%20Qian%20Zhang%20and%20Wenyu%20Liu%20and%20Xinggang%20Wang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20are%20increasingly%20tasked%20with%20ultra-long%20multimodal%20understanding.%20While%20linear%20architectures%20offer%20constant%20computation%20and%20memory%20footprints%2C%20they%20often%20struggle%20with%20high-frequency%20visual%20perception%20compared%20to%20standard%20Transformers.%20To%20bridge%20this%20gap%2C%20we%20introduce%20%5Ctextbf%7BInfiniteVL%7D.%20We%20first%20develop%20a%20hybrid%20base%20model%20called%20%5Ctextbf%7BInfiniteVL-Base%7D%20that%20interleaves%20a%20small%20fraction%20of%20Full%20Attention%20layers%20with%20Gated%20DeltaNet.%20Empowered%20by%20a%20tailored%20distillation%20and%20fine-tuning%20strategy%2C%20InfiniteVL-Base%20matches%20the%20fundamental%20multimodal%20performance%20of%20equivalent%20Transformers%20while%20achieving%20a%20%5Ctextbf%7B1.7%24%5Ctimes%24%7D%20decoding%20speedup.%20However%2C%20the%20quadratic%20complexity%20of%20the%20retained%20Full%20Attention%20inevitably%20becomes%20an%20efficiency%20bottleneck%20when%20scal {"title": "Benchmarking PhD-Level Coding in 3D Geometric Computer Vision", "author": "Wenyi Li and Renkai Luo and Yue Yu and Huan-ang Gao and Mingju Gao and Li Yuan and Chaoyou Fu and Hao Zhao", "abstract": "AI-assisted coding has rapidly reshaped software practice and research workflows, yet today's models still struggle to produce correct code for complex 3D geometric vision. If models could reliably write such code, the research of our community would change substantially. To measure progress toward that goal, we introduce GeoCodeBench, a PhD-level benchmark that evaluates coding for 3D vision. Each problem is a fill-in-the-function implementation task curated from representative papers at recent venues: we first let a tool propose candidate functions from official repositories, then perform careful human screening to select core 3D geometric components. For every target, we generate diverse, edge-case unit tests, enabling fully automatic, reproducible scoring. We evaluate eight representative open- and closed-source models to reflect the current ecosystem. The best model, GPT-5, attains only 36.6% pass rate, revealing a large gap between current capabilities and dependable 3D scientific coding. GeoCodeBench organizes tasks into a two-level hierarchy: General 3D capability (geometric transformations and mechanics/optics formulation) and Research capability (novel algorithm implementation and geometric logic routing). Scores are positively correlated across these axes, but research-oriented tasks are markedly harder. Context ablations further show that \"more paper text\" is not always better: cutting off at the Method section statistically outperforms full-paper inputs, highlighting unresolved challenges in long-context scientific comprehension. Together, these findings position GeoCodeBench as a rigorous testbed for advancing from generic coding to trustworthy 3D geometric vision coding.", "link": "http://arxiv.org/abs/2603.30038v1", "date": "2026-03-31", "relevancy": 2.8104, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5736}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5736}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.539}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20PhD-Level%20Coding%20in%203D%20Geometric%20Computer%20Vision&body=Title%3A%20Benchmarking%20PhD-Level%20Coding%20in%203D%20Geometric%20Computer%20Vision%0AAuthor%3A%20Wenyi%20Li%20and%20Renkai%20Luo%20and%20Yue%20Yu%20and%20Huan-ang%20Gao%20and%20Mingju%20Gao%20and%20Li%20Yuan%20and%20Chaoyou%20Fu%20and%20Hao%20Zhao%0AAbstract%3A%20AI-assisted%20coding%20has%20rapidly%20reshaped%20software%20practice%20and%20research%20workflows%2C%20yet%20today%27s%20models%20still%20struggle%20to%20produce%20correct%20code%20for%20complex%203D%20geometric%20vision.%20If%20models%20could%20reliably%20write%20such%20code%2C%20the%20research%20of%20our%20community%20would%20change%20substantially.%20To%20measure%20progress%20toward%20that%20goal%2C%20we%20introduce%20GeoCodeBench%2C%20a%20PhD-level%20benchmark%20that%20evaluates%20coding%20for%203D%20vision.%20Each%20problem%20is%20a%20fill-in-the-function%20implementation%20task%20curated%20from%20representative%20papers%20at%20recent%20venues%3A%20we%20first%20let%20a%20tool%20propose%20candidate%20functions%20from%20official%20repositories%2C%20then%20perform%20careful%20human%20screening%20to%20select%20core%203D%20geometric%20components.%20For%20every%20target%2C%20we%20generate%20diverse%2C%20edge-case%20unit%20tests%2C%20enabling%20fully%20automatic%2C%20reproducible%20scoring.%20We%20evaluate%20eight%20representative%20open-%20and%20closed-source%20models%20to%20reflect%20the%20current%20ecosystem.%20The%20best%20model%2C%20GPT-5%2C%20attains%20only%2036.6%25%20pass%20rate%2C%20revealing%20a%20large%20gap%20between%20current%20capabilities%20and%20dependable%203D%20scientific%20coding.%20GeoCodeBench%20organizes%20tasks%20into%20a%20two-level%20hierarchy%3A%20General%203D%20capability%20%28geometric%20transformations%20and%20mechanics/optics%20formulation%29%20and%20Research%20capability%20%28novel%20algorithm%20implementation%20and%20geometric%20logic%20routing%29.%20Scores%20are%20positively%20correlated%20across%20these%20axes%2C%20but%20research-oriented%20tasks%20are%20markedly%20harder.%20Context%20ablations%20further%20show%20that%20%22more%20paper%20text%22%20is%20not%20always%20better%3A%20cutting%20off%20at%20the%20Method%20section%20statistically%20outperforms%20full-paper%20inputs%2C%20highlighting%20unresolved%20challenges%20in%20long-context%20scientific%20comprehension.%20Together%2C%20these%20findings%20position%20GeoCodeBench%20as%20a%20rigorous%20testbed%20for%20advancing%20from%20generic%20coding%20to%20trustworthy%203D%20geometric%20vision%20coding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.30038v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520PhD-Level%2520Coding%2520in%25203D%2520Geometric%2520Computer%2520Vision%26entry.906535625%3DWenyi%2520Li%2520and%2520Renkai%2520Luo%2520and%2520Yue%2520Yu%2520and%2520Huan-ang%2520Gao%2520and%2520Mingju%2520Gao%2520and%2520Li%2520Yuan%2520and%2520Chaoyou%2520Fu%2520and%2520Hao%2520Zhao%26entry.1292438233%3DAI-assisted%2520coding%2520has%2520rapidly%2520reshaped%2520software%2520practice%2520and%2520research%2520workflows%252C%2520yet%2520today%2527s%2520models%2520still%2520struggle%2520to%2520produce%2520correct%2520code%2520for%2520complex%25203D%2520geometric%2520vision.%2520If%2520models%2520could%2520reliably%2520write%2520such%2520code {"title": "ReDiPrune: Relevance-Diversity Pre-Projection Token Pruning for Efficient Multimodal LLMs", "author": "An Yu and Ting Yu Tsai and Zhenfei Zhang and Weiheng Lu and Felix X. -F. Ye and Ming-Ching Chang", "abstract": "Recent multimodal large language models are computationally expensive because Transformers must process a large number of visual tokens. We present ReDiPrune, a training-free token pruning method applied before the vision-language projector, where visual features remain rich and discriminative. Unlike post-projection pruning methods that operate on compressed representations, ReDiPrune selects informative tokens directly from vision encoder outputs, preserving fine-grained spatial and semantic cues. Each token is scored by a lightweight rule that jointly consider text-conditioned relevance and max-min diversity, ensuring the selected tokens are both query-relevant and non-redundant. ReDiPrune is fully plug-and-play, requiring no retraining or architectural modifications, and can be seamlessly inserted between the encoder and projector. Across four video and five image benchmarks, it consistently improves the accuracy-efficiency trade-off. For example, on EgoSchema with LLaVA-NeXT-Video-7B, retaining only 15% of visual tokens yields a +2.0% absolute accuracy gain while reducing computation by more than $6\\times$ in TFLOPs. Code is available at https://github.com/UA-CVML/ReDiPrune.", "link": "http://arxiv.org/abs/2603.24680v2", "date": "2026-03-31", "relevancy": 2.7689, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5592}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5511}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5511}], "m {"title": "Understanding vs. Generation: Navigating Optimization Dilemma in Multimodal Models", "author": "Sen Ye and Mengde Xu and Shuyang Gu and Di He and Liwei Wang and Han Hu", "abstract": "Current research in multimodal models faces a key challenge where enhancing generative capabilities often comes at the expense of understanding, and vice versa. We analyzed this trade-off and identify the primary cause might be the potential conflict between generation and understanding, which creates a competitive dynamic within the model. To address this, we propose the Reason-Reflect-Refine (R3) framework. This innovative algorithm re-frames the single-step generation task into a multi-step process of \"generate-understand-regenerate\". By explicitly leveraging the model's understanding capability during generation, we successfully mitigate the optimization dilemma, achieved stronger generation results and improved understanding ability which are related to the generation process. This offers valuable insights for designing next-generation unified multimodal models. Code is available at https://github.com/sen-ye/R3.", "link": "http://arxiv.org/abs/2602.15772v2", "date": "2026-03-31", "relevancy": 2.7483, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5546}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20vs.%20Generation%3A%20Navigating%20Optimization%20Dilemma%20in%20Multimodal%20Models&body=Title%3A%20Understanding%20vs.%20Generation%3A%20Navigating%20Optimization%20Dilemma%20in%20Multimodal%20Models%0AAuthor%3A%20Sen%20Ye%20and%20Mengde%20Xu%20and%20Shuyang%20Gu%20and%20Di%20He%20and%20Liwei%20Wang%20and%20Han%20Hu%0AAbstract%3A%20Current%20research%20in%20multimodal%20models%20faces%20a%20key%20challenge%20where%20enhancing%20generative%20capabilities%20often%20comes%20at%20the%20expense%20of%20understanding%2C%20and%20vice%20versa.%20We%20analyzed%20this%20trade-off%20and%20identify%20the%20primary%20cause%20might%20be%20the%20potential%20conflict%20between%20generation%20and%20understanding%2C%20which%20creates%20a%20competitive%20dynamic%20within%20the%20model.%20To%20address%20this%2C%20we%20propose%20the%20Reason-Reflect-Refine%20%28R3%29%20framework.%20This%20innovative%20algorithm%20re-frames%20the%20single-step%20generation%20task%20into%20a%20multi-step%20process%20of%20%22generate-understand-regenerate%22.%20By%20explicitly%20leveraging%20the%20model%27s%20understanding%20capability%20during%20generation%2C%20we%20successfully%20mitigate%20the%20optimization%20dilemma%2C%20achieved%20stronger%20generation%20results%20and%20improved%20understanding%20ability%20which%20are%20related%20to%20the%20generation%20process.%20This%20offers%20valuable%20insights%20for%20designing%20next-generation%20unified%20multimodal%20models.%20Code%20is%20available%20at%20https%3A//github.com/sen-ye/R3.%0ALink%3A%20http%3A//arxiv.org/abs/2602.15772v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnderstanding%2520vs.%2520Generation%253A%2520Navigating%2520Optimization%2520Dilemma%2520in%2520Multimodal%2520Models%26entry.906535625%3DSen%2520Ye%2520and%2520Mengde%2520Xu%2520and%2520Shuyang%2520Gu%2520and%2520Di%2520He%2520and%2520Liwei%2520Wang%2520and%2520Han%2520Hu%26entry.1292438233%3DCurrent%2520research%2520in%2520multimodal%2520models%2520faces%2520a%2520key%2520challenge%2520where%2520enhancing%2520generative%2520capabilities%2520often%2520comes%2520at%2520the%2520expense%2520of%2520understanding%252C%2520and%2520vice%2520versa.%2520We%2520analyzed%2520this%2520trade-off%2520and%2520identify%2520the%2520primary%2520cause%2520might%2520be%2520the%2520potential%2520conflict%2520between%2520generation%2520and%2520understanding%252C%2520which%2520creates%2520a%2520competitive%2520dynamic%2520within%2520the%2520model.%2520To%2520address%2520this%252C%2520we%2520propose%2520the%2520Reason-Reflect-Refine%2520%2528R3%2529%2520framework.%2520This%2520innovative%2520algorithm%2520re-frames%2520the%2520single-step%2520generation%2520task%2520into%2520a%2520multi-step%2520process%2520of%2520%2522generate-understand-regenerate%2522.%2520By%2520explicitly%2520leveraging%2520the%2520model%2527s%2520understanding%2520capability%2520during%2520generation%252C%2520we%2520successfully%2520mitigate%2520the%2520optimization%2520dilemma%252C%2520achieved%2520stronger%2520generation%2520results%2520and%2520improved%2520understanding%2520ability%2520which%2520are%2520related%2520to%2520the%2520generation%2520process.%2520This%2520offers%2520valuable%2520insights%2520for%2520designing%2520next-generation%2520unified%2520multimodal%2520models.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/sen-ye/R3.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.15772v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Understanding%20vs.%20Generation%3A%20Navigating%20Optimization%20Dilemma%20in%20Multimodal%20Models&entry.906535625=Sen%20Ye%20and%20Mengde%20Xu%20and%20Shuyang%20Gu%20and%20Di%20He%20and%20Liwei%20Wang%20and%20Han%20Hu&entry.1292438233=Current%20research%20in%20multimodal%20models%20faces%20a%20key%20challenge%20where%20enhancing%20generative%20capabilities%20often%20comes%20at%20the%20expense%20of%20understanding%2C%20and%20vice%20versa.%20We%20analyzed%20this%20trade-off%20and%20identify%20the%20primary%20cause%20might%20be%20the%20potential%20conflict%20between%20generation%20and%20understanding%2C%20which%20creates%20a%20competitive%20dynamic%20within%20the%20model.%20To%20address%20this%2C%20we%20propose%20the%20Reason-Reflect-Refine%20%28R3%29%20framework.%20This%20innovative%20algorithm%20re-frames%20the%20single-step%20generation%20task%20into%20a%20multi-step%20process%20of%20%22generate-understand-regenerate%22.%20By%20explicitly%20leveraging%20the%20model%27s%20understanding%20capability%20during%20generation%2C%20we%20successfully%20mitigate%20the%20optimization%20dilemma%2C%20achieved%20stronger%20generation%20results%20and%20improved%20understanding%20ability%20which%20are%20related%20to%20the%20generation%20process.%20This%20offers%20valuable%20insights%20for%20designing%20next-generation%20unified%20multimodal%20models.%20Code%20is%20available%20at%20https%3A//github.com/sen-ye/R3.&entry.1838667208=http%3A//arxiv.org/abs/2602.15772v2&entry.124074799=Read"},
{"title": "TransFIRA: Transfer Learning for Face Image Recognizability Assessment", "author": "Allen Tu and Kartik Narayan and Joshua Gleason and Jennifer Xu and Matthew Meyn and Tom Goldstein and Vishal M. Patel", "abstract": "Face recognition in unconstrained environments such as surveillance, video, and web imagery must contend with extreme variation in pose, blur, illumination, and occlusion, where conventional visual quality metrics fail to predict whether inputs are truly recognizable to the deployed encoder. Existing FIQA methods typically rely on visual heuristics, curated annotations, or computationally intensive generative pipelines, leaving their predictions detached from the encoder's decision geometry. We introduce TransFIRA (Transfer Learning for Face Image Recognizability Assessment), a lightweight and annotation-free framework that grounds recognizability directly in embedding space. TransFIRA delivers three advances: (i) a definition of recognizability via class-center similarity (CCS) and class-center angular separation (CCAS), yielding the first natural, decision-boundary-aligned criterion for filtering and weighting; (ii) a recognizability-informed aggregation strategy that achieves state-of-the-art verification accuracy on BRIAR and IJB-C while nearly doubling correlation with true recognizability, all without external labels, heuristics, or backbone-specific training; and (iii) new extensions beyond faces, including encoder-grounded explainability that reveals how degradations and subject-specific factors affect recognizability, and the first method for body recognizability assessment. Experiments confirm state-of-the-art results on faces, strong performance on body recognition, and robustness under cross-dataset shifts and out-of-distribution evaluation. Together, these contributions establish TransFIRA as a unified, geometry-driven framework for recognizability assessment that is encoder-specific, accurate, interpretable, and extensible across modalities, significantly advancing FIQA in accuracy, explainability, and scope.", "link": "http://arxiv.org/abs/2510.06353v2", "date": "2026-03-31", "relevancy": 2.7166, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5843}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5265}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TransFIRA%3A%20Transfer%20Learning%20for%20Face%20Image%20Recognizability%20Assessment&body=Title%3A%20TransFIRA%3A%20Transfer%20Learning%20for%20Face%20Image%20Recognizability%20Assessment%0AAuthor%3A%20Allen%20Tu%20and%20Kartik%20Narayan%20and%20Joshua%20Gleason%20and%20Jennifer%20Xu%20and%20Matthew%20Meyn%20and%20Tom%20Goldstein%20and%20Vishal%20M.%20Patel%0AAbstract%3A%20Face%20recognition%20in%20unconstrained%20environments%20such%20as%20surveillance%2C%20video%2C%20and%20web%20imagery%20must%20contend%20with%20extreme%20variation%20in%20pose%2C%20blur%2C%20illumination%2C%20and%20occlusion%2C%20where%20conventional%20visual%20quality%20metrics%20fail%20to%20predict%20whether%20inputs%20are%20truly%20recognizable%20to%20the%20deployed%20encoder.%20Existing%20FIQA%20methods%20typically%20rely%20on%20visual%20heuristics%2C%20curated%20annotations%2C%20or%20computationally%20intensive%20generative%20pipelines%2C%20leaving%20their%20predictions%20detached%20from%20the%20encoder%27s%20decision%20geometry.%20We%20introduce%20TransFIRA%20%28Transfer%20Learning%20for%20Face%20Image%20Recognizability%20Assessment%29%2C%20a%20lightweight%20and%20annotation-free%20framework%20that%20grounds%20recognizability%20directly%20in%20embedding%20space.%20TransFIRA%20delivers%20three%20advances%3A%20%28i%29%20a%20definition%20of%20recognizability%20via%20class-center%20similarity%20%28CCS%29%20and%20class-center%20angular%20separation%20%28CCAS%29%2C%20yielding%20the%20first%20natural%2C%20decision-boundary-aligned%20criterion%20for%20filtering%20and%20weighting%3B%20%28ii%29%20a%20recognizability-informed%20aggregation%20strategy%20that%20achieves%20state-of-the-art%20verification%20accuracy%20on%20BRIAR%20and%20IJB-C%20while%20nearly%20doubling%20correlation%20with%20true%20recognizability%2C%20all%20without%20external%20labels%2C%20heuristics%2C%20or%20backbone-specific%20training%3B%20and%20%28iii%29%20new%20extensions%20beyond%20faces%2C%20including%20encoder-grounded%20explainability%20that%20reveals%20how%20degradations%20and%20subject-specific%20factors%20affect%20recognizability%2C%20and%20the%20first%20method%20for%20body%20recognizability%20assessment.%20Experiments%20confirm%20state-of-the-art%20results%20on%20faces%2C%20strong%20performance%20on%20body%20recognition%2C%20and%20robustness%20under%20cross-dataset%20shifts%20and%20out-of-distribution%20evaluation.%20Together%2C%20these%20contributions%20establish%20TransFIRA%20as%20a%20unified%2C%20geometry-driven%20framework%20for%20recognizability%20assessment%20that%20is%20encoder-specific%2C%20accurate%2C%20interpretable%2C%20and%20extensible%20across%20modalities%2C%20significantly%20advancing%20FIQA%20in%20accuracy%2C%20explainability%2C%20and%20scope.%0ALink%3A%20http%3A//arxiv.org/abs/2510.06353v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTransFIRA%253A%2520Transfer%2520Learning%2520for%2520Face%2520Image%2520Recognizability%2520Assessment%26entry.906535625%3DAllen%2520Tu%2520and%2520Kartik%2520Narayan%2520and%2520Joshua%2520Gleason%2520and%2520Jennifer%2520Xu%2520and%2520 {"title": "Toward Generalizable Whole Brain Representations with High-Resolution Light-Sheet Data", "author": "Minyoung E. Kim and Dae Hee Yun and Aditi V. Patel and Madeline Hon and Webster Guan and Taegeon Lee and Brian Nguyen", "abstract": "Unprecedented visual details of biological structures are being revealed by subcellular-resolution whole-brain 3D microscopy data, enabled by recent advances in intact tissue processing and light-sheet fluorescence microscopy (LSFM). These volumetric data offer rich morphological and spatial cellular information, however, the lack of scalable data processing and analysis methods tailored to these petabyte-scale data poses a substantial challenge for accurate interpretation. Further, existing models for visual tasks such as object detection and classification struggle to generalize to this type of data. To accelerate the development of suitable methods and foundational models, we present CANVAS, a comprehensive set of high-resolution whole mouse brain LSFM benchmark data, encompassing six neuronal and immune cell-type markers, along with cell annotations and a leaderboard. We also demonstrate challenges in generalization of baseline models built on existing architectures, especially due to the heterogeneity in cellular morphology across phenotypes and anatomical locations in the brain. To the best of our knowledge, CANVAS is the first and largest LSFM benchmark that captures intact mouse brain tissue at subcellular level, and includes extensive annotations of cells throughout the brain.", "link": "http://arxiv.org/abs/2603.29842v1", "date": "2026-03-31", "relevancy": 2.7143, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5479}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5479}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5328}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Generalizable%20Whole%20Brain%20Representations%20with%20High-Resolution%20Light-Sheet%20Data&body=Title%3A%20Toward%20Generalizable%20Whole%20Brain%20Representations%20with%20High-Resolution%20Light-Sheet%20Data%0AAuthor%3A%20Minyoung%20E.%20Kim%20and%20Dae%20Hee%20Yun%20and%20Aditi%20V.%20Patel%20and%20Madeline%20Hon%20and%20Webster%20Guan%20and%20Taegeon%20Lee%20and%20Brian%20Nguyen%0AAbstract%3A%20Unprecedented%20visual%20details%20of%20biological%20structures%20are%20being%20revealed%20by%20subcellular-resolution%20whole-brain%203D%20microscopy%20data%2C%20enabled%20by%20recent%20advances%20in%20intact%20tissue%20processing%20and%20light-sheet%20fluorescence%20microscopy%20%28LSFM%29.%20These%20volumetric%20data%20offer%20rich%20morphological%20and%20spatial%20cellular%20information%2C%20however%2C%20the%20lack%20of%20scalable%20data%20processing%20and%20analysis%20methods%20tailored%20to%20these%20petabyte-scale%20data%20poses%20a%20substantial%20challenge%20for%20accurate%20interpretation.%20Further%2C%20existing%20models%20for%20visual%20tasks%20such%20as%20object%20detection%20and%20classification%20struggle%20to%20generalize%20to%20this%20type%20of%20data.%20To%20accelerate%20the%20development%20of%20suitable%20methods%20and%20foundational%20models%2C%20we%20present%20CANVAS%2C%20a%20comprehensive%20set%20of%20high-resolution%20whole%20mouse%20brain%20LSFM%20benchmark%20data%2C%20encompassing%20six%20neuronal%20and%20immune%20cell-type%20markers%2C%20along%20with%20cell%20annotations%20and%20a%20leaderboard.%20We%20also%20demonstrate%20challenges%20in%20generalization%20of%20baseline%20models%20built%20on%20existing%20architectures%2C%20especially%20due%20to%20the%20heterogeneity%20in%20cellular%20morphology%20across%20phenotypes%20and%20anatomical%20locations

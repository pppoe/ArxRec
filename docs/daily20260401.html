{"title": "Baby Scale: Investigating Models Trained on Individual Children's Language Input", "author": "Steven Y. Feng and Alvin W. M. Tan and Michael C. Frank", "abstract": "Modern language models (LMs) must be trained on many orders of magnitude more words of training data than human children receive before they begin to produce useful behavior. Assessing the nature and origins of this \"data gap\" requires benchmarking LMs on human-scale datasets to understand how linguistic knowledge emerges from children's natural training data. Using transcripts from the BabyView dataset (videos from children ages 6-36 months), we investigate (1) scaling performance at child-scale data regimes, (2) variability in model performance across datasets from different children's experiences and linguistic predictors of dataset quality, and (3) relationships between model and child language learning outcomes. LMs trained on child data show acceptable scaling for grammar tasks, but lower scaling on semantic and world knowledge tasks than models trained on synthetic data; we also observe substantial variability on data from different children. Beyond dataset size, performance is most associated with a combination of distributional and interactional linguistic features, broadly consistent with what makes high-quality input for child language development. Finally, model likelihoods for individual words correlate with children's learning of those words, suggesting that properties of child-directed input may influence both model learning and human language development. Overall, understanding what properties make language data efficient for learning can enable more powerful small-scale language models while also shedding light on human language acquisition.", "link": "http://arxiv.org/abs/2603.29522v1", "date": "2026-03-31", "relevancy": 2.1254, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5355}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5355}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5106}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Baby%20Scale%3A%20Investigating%20Models%20Trained%20on%20Individual%20Children%27s%20Language%20Input&body=Title%3A%20Baby%20Scale%3A%20Investigating%20Models%20Trained%20on%20Individual%20Children%27s%20Language%20Input%0AAuthor%3A%20Steven%20Y.%20Feng%20and%20Alvin%20W.%20M.%20Tan%20and%20Michael%20C.%20Frank%0AAbstract%3A%20Modern%20language%20models%20%28LMs%29%20must%20be%20trained%20on%20many%20orders%20of%20magnitude%20more%20words%20of%20training%20data%20than%20human%20children%20receive%20before%20they%20begin%20to%20produce%20useful%20behavior.%20Assessing%20the%20nature%20and%20origins%20of%20this%20%22data%20gap%22%20requires%20benchmarking%20LMs%20on%20human-scale%20datasets%20to%20understand%20how%20linguistic%20knowledge%20emerges%20from%20children%27s%20natural%20training%20data.%20Using%20transcripts%20from%20the%20BabyView%20dataset%20%28videos%20from%20children%20ages%206-36%20months%29%2C%20we%20investigate%20%281%29%20scaling%20performance%20at%20child-scale%20data%20regimes%2C%20%282%29%20variability%20in%20model%20performance%20across%20datasets%20from%20different%20children%27s%20experiences%20and%20linguistic%20predictors%20of%20dataset%20quality%2C%20and%20%283%29%20relationships%20between%20model%20and%20child%20language%20learning%20outcomes.%20LMs%20trained%20on%20child%20data%20show%20acceptable%20scaling%20for%20grammar%20tasks%2C%20but%20lower%20scaling%20on%20semantic%20and%20world%20knowledge%20tasks%20than%20models%20trained%20on%20synthetic%20data%3B%20we%20also%20observe%20substantial%20variability%20on%20data%20from%20different%20children.%20Beyond%20dataset%20size%2C%20performance%20is%20most%20associated%20with%20a%20combination%20of%20distributional%20and%20interactional%20linguistic%20features%2C%20broadly%20consistent%20with%20what%20makes%20high-quality%20input%20for%20child%20language%20development.%20Finally%2C%20model%20likelihoods%20for%20individual%20words%20correlate%20with%20children%27s%20learning%20of%20those%20words%2C%20suggesting%20that%20properties%20of%20child-directed%20input%20may%20influence%20both%20model%20learning%20and%20human%20language%20development.%20Overall%2C%20understanding%20what%20properties%20make%20language%20data%20efficient%20for%20learning%20can%20enable%20more%20powerful%20small-scale%20language%20models%20while%20also%20shedding%20light%20on%20human%20language%20acquisition.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29522v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBaby%2520Scale%253A%2520Investigating%2520Models%2520Trained%2520on%2520Individual%2520Children%2527s%2520Language%2520Input%26entry.906535625%3DSteven%2520Y.%2520Feng%2520and%2520Alvin%2520W.%2520M.%2520Tan%2520and%2520Michael%2520C.%2520Frank%26entry.1292438233%3DModern%2520language%2520models%2520%2528LMs%2529%2520must%2520be%2520trained%2520on%2520many%2520orders%2520of%2520magnitude%2520more%2520words%2520of%2520training%2520data%2520than%2520human%2520children%2520receive%2520before%2520they%2520begin%2520to%2520produce%2520useful%2520behavior.%2520Assessing%2520the%2520nature%2520and%2520origins%2520of%2520this%2520%2522data%2520gap%2522%2520requires%2520benchmarking%2520LMs%2520on%2520human-scale%2520datasets%2520to%2520understand%2520how%2520linguistic%2520knowledge%2520emerges%2520from%2520children%2527s%2520natural%2520training%2520data.%2520Using%2520transcripts%2520from%2520the%2520BabyView%2520dataset%2520%2528videos%2520from%2520children%2520ages%25206-36%2520months%2529%252C%2520we%2520investigate%2520%25281%2529%2520scaling%2520performance%2520at%2520child-scale%2520data%2520regimes%252C%2520%25282%2529%2520variability%2520in%2520model%2520performance%2520across%2520datasets%2520from%2520different%2520children%2527s%2520experiences%2520and%2520linguistic%2520predictors%2520of%2520dataset%2520quality%252C%2520and%2520%25283%2529%2520relationships%2520between%2520model%2520and%2520child%2520language%2520learning%2520outcomes.%2520LMs%2520trained%2520on%2520child%2520data%2520show%2520acceptable%2520scaling%2520for%2520grammar%2520tasks%252C%2520but%2520lower%2520scaling%2520on%2520semantic%2520and%2520world%2520knowledge%2520tasks%2520than%2520models%2520trained%2520on%2520synthetic%2520data%253B%2520we%2520also%2520observe%2520substantial%2520variability%2520on%2520data%2520from%2520different%2520children.%2520Beyond%2520dataset%2520size%252C%2520performance%2520is%2520most%2520associated%2520with%2520a%2520combination%2520of%2520distributional%2520and%2520interactional%2520linguistic%2520features%252C%2520broadly%2520consistent%2520with%2520what%2520makes%2520high-quality%2520input%2520for%2520child%2520language%2520development.%2520Finally%252C%2520model%2520likelihoods%2520for%2520individual%2520words%2520correlate%2520with%2520children%2527s%2520learning%2520of%2520those%2520words%252C%2520suggesting%2520that%2520properties%2520of%2520child-directed%2520input%2520may%2520influence%2520both%2520model%2520learning%2520and%2520human%2520language%2520development.%2520Overall%252C%2520understanding%2520what%2520properties%2520make%2520language%2520data%2520efficient%2520for%2520learning%2520can%2520enable%2520more%2520powerful%2520small-scale%2520language%2520models%2520while%2520also%2520shedding%2520light%2520on%2520human%2520language%2520acquisition.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29522v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/vie {"title": "CutClaw: Agentic Hours-Long Video Editing via Music Synchronization", "author": "Shifang Zhao and Yihan Hu and Ying Shan and Yunchao Wei and Xiaodong Cun", "abstract": "Editing the video content with audio alignment forms a digital human-made art in current social media. However, the time-consuming and repetitive nature of manual video editing has long been a challenge for filmmakers and professional content creators alike. In this paper, we introduce CutClaw, an autonomous multi-agent framework designed to edit hours-long raw footage into meaningful short videos that leverages the capabilities of multiple Multimodal Language Models~(MLLMs) as an agent system. It produces videos with synchronized music, followed by instructions, and a visually appealing appearance. In detail, our approach begins by employing a hierarchical multimodal decomposition that captures both fine-grained details and global structures across visual and audio footage. Then, to ensure narrative consistency, a Playwriter Agent orchestrates the whole storytelling flow and structures the long-term narrative, anchoring visual scenes to musical shifts. Finally, to construct a short edited video, Editor and Reviewer Agents collaboratively optimize the final cut via selecting fine-grained visual content based on rigorous aesthetic and semantic criteria. We conduct detailed experiments to demonstrate that CutClaw significantly outperforms state-of-the-art baselines in generating high-quality, rhythm-aligned videos. The code is available at: https://github.com/GVCLab/CutClaw.", "link": "http://arxiv.org/abs/2603.29664v1", "date": "2026-03-31", "relevancy": 2.1079, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5686}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5409}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4963}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CutClaw%3A%20Agentic%20Hours-Long%20Video%20Editing%20via%20Music%20Synchronization&body=Title%3A%20CutClaw%3A%20Agentic%20Hours-Long%20Video%20Editing%20via%20Music%20Synchronization%0AAuthor%3A%20Shifang%20Zhao%20and%20Yihan%20Hu%20and%20Ying%20Shan%20and%20Yunchao%20Wei%20and%20Xiaodong%20Cun%0AAbstract%3A%20Editing%20the%20video%20content%20with%20audio%20alignment%20forms%20a%20digital%20human-made%20art%20in%20current%20social%20media.%20However%2C%20the%20time-consuming%20and%20repetitive%20nature%20of%20manual%20video%20editing%20has%20long%20been%20a%20challenge%20for%20filmmakers%20and%20professional%20content%20creators%20alike.%20In%20this%20paper%2C%20we%20introduce%20CutClaw%2C%20an%20autonomous%20multi-agent%20framework%20designed%20to%20edit%20hours-long%20raw%20footage%20into%20meaningful%20short%20videos%20that%20leverages%20the%20capabilities%20of%20multiple%20Multimodal%20Language%20Models~%28MLLMs%29%20as%20an%20agent%20system.%20It%20produces%20videos%20with%20synchronized%20music%2C%20followed%20by%20instructions%2C%20and%20a%20visually%20appealing%20appearance.%20In%20detail%2C%20our%20approach%20begins%20by%20employing%20a%20hierarchical%20multimodal%20decomposition%20that%20captures%20both%20fine-grained%20details%20and%20global%20structures%20across%20visual%20and%20audio%20footage.%20Then%2C%20to%20ensure%20narrative%20consistency%2C%20a%20Playwriter%20Agent%20orchestrates%20the%20whole%20storytelling%20flow%20and%20structures%20the%20long-term%20narrative%2C%20anchoring%20visual%20scenes%20to%20musical%20shifts.%20Finally%2C%20to%20construct%20a%20short%20edited%20video%2C%20Editor%20and%20Reviewer%20Agents%20collaboratively%20optimize%20the%20final%20cut%20via%20selecting%20fine-grained%20visual%20content%20based%20on%20rigorous%20aesthetic%20and%20semantic%20criteria. {"title": "DeepRV: Accelerating Spatiotemporal Inference with Pre-trained Neural Priors", "author": "Jhonathan Navott and Daniel Jenson and Seth Flaxman and Elizaveta Semenova", "abstract": "Gaussian Processes (GPs) provide a flexible and statistically principled foundation for modelling spatiotemporal phenomena, but their $O(N^3)$ scaling makes them intractable for large datasets. Approximate methods such as variational inference (VI), inducing-point (sparse) GPs, low-rank kernel approximations (e.g., Nystrom methods and random Fourier features), and approximations such as INLA improve scalability but typically trade off accuracy, calibration, or modelling flexibility. We introduce DeepRV, a neural-network surrogate that replaces GP prior sampling, while closely matching full GP accuracy at inference including hyperparameter estimates, and reducing computational complexity to $O(N^2)$, increasing scalability and inference speed. DeepRV serves as a drop-in replacement for GP prior realisations in e.g. MCMC-based probabilistic programming pipelines, preserving full model flexibility. Across simulated benchmarks, non-separable spatiotemporal GPs, and a real-world application to education deprivation in London (n = 4,994 locations), DeepRV achieves the highest fidelity to exact GPs while substantially accelerating inference. Code is provided in the dl4bi Python package, with all experiments run on a single consumer-grade GPU to ensure accessibility for practitioners.", "link": "http://arxiv.org/abs/2503.21473v3", "date": "2026-03-31", "relevancy": 2.1066, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5495}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5116}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5071}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DeepRV%3A%20Accelerating%20Spatiotemporal%20Inference%20with%20Pre-trained%20Neural%20Priors&body=Title%3A%20DeepRV%3A%20Accelerating%20Spatiotemporal%20Inference%20with%20Pre-trained%20Neural%20Priors%0AAuthor%3A%20Jhonathan%20Navott%20and%20Daniel%20Jenson%20and%20Seth%20Flaxman%20and%20Elizaveta%20Semenova%0AAbstract%3A%20Gaussian%20Processes%20%28GPs%29%20provide%20a%20flexible%20and%20statistically%20principled%20foundation%20for%20modelling%20spatiotemporal%20phenomena%2C%20but%20their%20%24O%28N%5E3%29%24%20scaling%20makes%20them%20intractable%20for%20large%20datasets.%20Approximate%20methods%20such%20as%20variational%20inference%20%28VI%29%2C%20inducing-point%20%28sparse%29%20GPs%2C%20low-rank%20kernel%20approximations%20%28e.g.%2C%20Nystrom%20methods%20and%20random%20Fourier%20features%29%2C%20and%20approximations%20such%20as%20INLA%20improve%20scalability%20but%20typically%20trade%20off%20accuracy%2C%20calibration%2C%20or%20modelling%20flexibility.%20We%20introduce%20DeepRV%2C%20a%20neural-network%20surrogate%20that%20replaces%20GP%20prior%20sampling%2C%20while%20closely%20matching%20full%20GP%20accuracy%20at%20inference%20including%20hyperparameter%20estimates%2C%20and%20reducing%20computational%20complexity%20to%20%24O%28N%5E2%29%24%2C%20increasing%20scalability%20and%20inference%20speed.%20DeepRV%20serves%20as%20a%20drop-in%20replacement%20for%20GP%20prior%20realisations%20in%20e.g.%20MCMC-based%20probabilistic%20programming%20pipelines%2C%20preserving%20full%20model%20flexibility.%20Across%20simulated%20benchmarks%2C%20non-separable%20spatiotemporal%20GPs%2C%20and%20a%20real-world%20application%20to%20education%20deprivation%20in%20London%20%28n%20%3D%204%2C994%20locations%29%2C%20DeepRV%20achieves%20the%20highest%20fidelity%20to%20exact%20GPs%20while%20substantially%20accelerating%20inference.% 0MCMC-based%2520probabilistic%2520programming%2520pipelines%252C%2520preserving%2520full%2520model%2520flexibility.%2520Across%2520simulated%2520benchmarks%252C%2520non-separable%2520spatiotemporal%2520GPs%252C%2520and%2520a%2520real-world%2520application%2520to%2520education%2520deprivation%2520in%2520London%2520%2528n%2520%253D%25204%252C994%2520locations%2529%252C%2520DeepRV%2520achieves%2520the%2520highest%2520fidelity%2520to%2520exact%2520GPs%2520while%2520substantially%2520accelerating%2520inference.%2520Code%2520is%2520provided%2520in%2520the%2520dl4bi%2520Python%2520package%252C%2520with%2520all%2520experiments%2520run%2520on%2520a%2520single%2520consumer-grade%2520GPU%2520to%2520ensure%2520accessibility%2520for%2520practitioners.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2503.21473v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DeepRV%3A%20Accelerating%20Spatiotemporal%20Inference%20with%20Pre-trained%20Neural%20Priors&entry.906535625=Jhonathan%20Navott%20and%20Daniel%20Jenson%20and%20Seth%20Flaxman%20and%20Elizaveta%20Semenova&entry.1292438233=Gaussian%20Processes%20%28GPs%29%20provide%20a%20flexible%20and%20statistically%20principled%20foundation%20for%20modelling%20spatiotemporal%20phenomena%2C%20but%20their%20%24O%28N%5E3%29%24%20scaling%20makes%20them%20intractable%20for%20large%20datasets.%20Approximate%20methods%20such%20as%20variational%20inference%20%28VI%29%2C%20inducing-point%20%28sparse%29%20GPs%2C%20low-rank%20kernel%20approximations%20%28e.g.%2C%20Nystrom%20methods%20and%20random%20Fourier%20features%29%2C%20and%20approximations%20such%20as%20INLA%20improve%20scalability%20but%20typically%20trade%20off%20accuracy%2C%20calibration%2C%20or%20modelling%20flexibility.%20We%20introduce%20DeepRV%2C%20a%20neural-network%20surrogate%20that%20replaces%20GP%20prior%20sampling%2C%20while%20closely%20matching%20full%20GP%20accuracy%20at%20infere {"title": "Structured Intent as a Protocol-Like Communication Layer: Cross-Model Robustness, Framework Comparison, and the Weak-Model Compensation Effect", "author": "Peng Gang", "abstract": "How reliably can structured intent representations preserve user goals across different AI models, languages, and prompting frameworks? Prior work showed that PPS (Prompt Protocol Specification), a 5W3H-based structured intent framework, improves goal alignment in Chinese and generalizes to English and Japanese. This paper extends that line of inquiry in three directions: cross-model robustness across Claude, GPT-4o, and Gemini 2.5 Pro; controlled comparison with CO-STAR and RISEN; and a user study (N=50) of AI-assisted intent expansion in ecologically valid settings. Across 3,240 model outputs (3 languages x 6 conditions x 3 models x 3 domains x 20 tasks), evaluated by an independent judge (DeepSeek-V3), we find that structured prompting substantially reduces cross-language score variance relative to unstructured baselines. The strongest structured conditions reduce cross-language sigma from 0.470 to about 0.020. We also observe a weak-model compensation pattern: the lowest-baseline model (Gemini) shows a much larger D-A gain (+1.006) than the strongest model (Claude, +0.217). Under the current evaluation resolution, 5W3H, CO-STAR, and RISEN achieve similarly high goal-alignment scores, suggesting that dimensional decomposition itself is an important active ingredient. In the user study, AI-expanded 5W3H prompts reduce interaction rounds by 60 percent and increase user satisfaction from 3.16 to 4.04. These findings support the practical value of structured intent representation as a robust, protocol-like communication layer for human-AI interaction.", "link": "http://arxiv.org/abs/2603.29953v1", "date": "2026-03-31", "relevancy": 2.0948, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5283}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5283}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5008}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Structured%20Intent%20as%20a%20Protocol-Like%20Communication%20Layer%3A%20Cross-Model%20Robustness%2C%20Framework%20Comparison%2C%20and%20the%20Weak-Model%20Compensation%20Effect&body=Title%3A%20Structured%20Intent%20as%20a%20Protocol-Like%20Communication%20Layer%3A%20Cross-Model%20Robustness%2C%20Framework%20Comparison%2C%20and%20the%20Weak-Model%20Compensation%20Effect%0AAuthor%3A%20Peng%20Gang%0AAbstract%3A%20How%20reliably%20can%20structured%20intent%20representations%20preserve%20user%20goals%20across%20different%20AI%20models%2C%20languages%2C%20and%20prompting%20frameworks%3F%20Prior%20work%20showed%20that%20PPS%20%28Prompt%20Protocol%20Specification%29%2C%20a%205W3H-based%20structured%20intent%20framework%2C%20improves%20goal%20alignment%20in%20Chinese%20and%20generalizes%20to%20English%20and%20Japanese.%20This%20paper%20extends%20that%20line%20of%20inquiry%20in%20three%20directions%3A%20cross-model%20robustness%20across%20Claude%2C%20GPT-4o%2C%20and%20Gemini%202.5%20Pro%3B%20controlled%20comparison%20with%20CO-STAR%20and%20RISEN%3B%20and%20a%20user%20study%20%28N%3D50%29%20of%20AI-assisted%20intent%20expansion%20in%20ecologically%20valid%20settings.%20Across%203%2C240%20model%20outputs%20%283%20languages%20x%206%20conditions%20x%203%20models%20x%203%20domains%20x%2020%20tasks%29%2C%20evaluated%20by%20an%20independent%20judge%20%28DeepSeek-V3%29%2C%20we%20find%20that%20structured%20prompting%20substantially%20reduces%20cross-language%20score%20variance%20relative%20to%20unstructured%20baselines.%20The%20strongest%20structured%20conditions%20reduce%20cross-language%20sigma%20from%200.470%20to%20about%200.020.%20We%20also%20observe%20a%20weak-model%20compensation%20pattern%3A%20the%20lowest-baseline%20model%20%28Gemini%29%20shows%20a%20much%20larger%20D-A%20gain%20%28%2B1.006%29%20than%20the%20strongest%20model%20%28Claude%2C%20%2B0.217%29.%20Under%20the%20current%20evaluation%20resolution%2C%205W3H%2C%20CO-STAR%2C%20and%20RISEN%20achieve%20similarly%20high%20goal-alignment%20scores%2C%20suggesting%20that%20dimensional%20decomposition%20itself%20is%20an%20important%20active%20ingredient.%20In%20the%20user%20study%2C%20AI-expanded%205W3H%20prompts%20reduce%20interaction%20rounds%20by%2060%20percent%20and%20increase%20user%20satisfaction%20from%203.16%20to%204.04.%20These%20findings%20support%20the%20practical%20value%20of%20structured%20intent%20representation%20as%20a%20robust%2C%20protocol-like%20communication%20layer%20for%20human-AI%20interaction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29953v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructured%2520Intent%2520as%2520a%2520Protocol-Like%2520Communication%2520Layer%253A%2520Cross-Model%2520Robustness%252C%2520Framework%2520Comparison%252C%2520and%2520the%2520Weak-Model%2520Compensation%2520Effect%26entry.906535625%3DPeng%2520Gang%26entry.1292438233%3DHow%2520reliably%2520can%2520structured%2520intent%2520representations%2520preserve%2520user%2520goals%2520across%2520different%2520AI%2520models%252C%2520languages%252C%2520and%2520prompting%2520frameworks%253F%2520Prior%2520work%2520showed%2520that%2520PPS%2520%2528Prompt%2520Protocol%2520Specification%2529%252C%2520a%25205W3H-based%2520structured%2520intent%2520framework%252C%2520improves%2520goal%2520alignment%2520in%2520Chinese%2520and%2520generalizes%2520to%2520English%2520and%2520Japanese.%2520This%2520paper%2520extends%2520that%2520line%2520of%2520inquiry%2520in%2520three%2520directions%253A {"title": "Four Generations of Quantum Biomedical Sensors", "author": "Xin Jin and Priyam Srivastava and Ronghe Wang and Yuqing Li and Jonathan Beaumariage and Tom Purdy and M. V. Gurudev Dutt and Kang Kim and Kaushik Seshadreesan and Junyu Liu", "abstract": "Quantum sensing technologies offer transformative potential for ultra-sensitive biomedical sensing, yet their clinical translation remains constrained by classical noise limits and a reliance on macroscopic ensembles. We propose a unifying generational framework to organize the evolving landscape of quantum biosensors based on their utilization of quantum resources. First-generation devices utilize discrete energy levels for signal transduction but follow classical scaling laws. Second-generation sensors exploit quantum coherence to reach the standard quantum limit, while third-generation architectures leverage entanglement and spin squeezing to approach Heisenberg-limited precision. We further define an emerging fourth generation characterized by the end-to-end integration of quantum sensing with quantum learning and variational circuits, enabling adaptive inference directly within the quantum domain. By analyzing critical parameters such as bandwidth matching and sensor-tissue proximity, we identify key technological bottlenecks and propose a roadmap for transitioning from measuring physical observables to extracting structured biological information with quantum-enhanced intelligence.", "link": "http://arxiv.org/abs/2603.29944v1", "date": "2026-03-31", "relevancy": 1.6492, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4258}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4211}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.3981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Four%20Generations%20of%20Quantum%20Biomedical%20Sensors&body=Title%3A%20Four%20Generations%20of%20Quantum%20Biomedical%20Sensors%0AAuthor%3A%20Xin%20Jin%20and%20Priyam%20Srivastava%20and%20Ronghe%20Wang%20and%20Yuqing%20Li%20and%20Jonathan%20Beaumariage%20and%20Tom%20Purdy%20and%20M.%20V.%20Gurudev%20Dutt%20and%20Kang%20Kim%20and%20Kaushik%20Seshadreesan%20and%20Junyu%20Liu%0AAbstract%3A%20Quantum%20sensing%20technologies%20offer%20transformative%20potential%20for%20ultra-sensitive%20biomedical%20sensing%2C%20yet%20their%20clinical%20translation%20remains%20constrained%20by%20classical%20noise%20limits%20and%20a%20reliance%20on%20macroscopic%20ensembles.%20We%20propose%20a%20unifying%20generational%20framework%20to%20organize%20the%20evolving%20landscape%20of%20quantum%20biosensors%20based%20on%20their%20utilization%20of%20quantum%20resources.%20First-generation%20devices%20utilize%20discrete%20energy%20levels%20for%20signal%20transduction%20but%20follow%20classical%20scaling%20laws.%20Second-generation%20sensors%20exploit%20quantum%20coherence%20to%20reach%20the%20standard%20quantum%20limit%2C%20while%20third-generation%20architectures%20leverage%20entanglement%20and%20spin%20squeezing%20to%20approach%20Heisenberg-limited%20precision.%20We%20further%20define%20an%20emerging%20fourth%20generation%20characterized%20by%20the%20end-to-end%20integration%20of%20quantum%20sensing%20with%20quantum%20learning%20and%20variational%20circuits%2C%20enabling%20adaptive%20inference%20directly%20within%20the%20quantum%20domain.%20By%20analyzing%20critical%20parameters%20such%20as%20bandwidth%20matching%20and%20sensor-tissue%20proximity%2C%20we%20identify%20key%20technological%20bottlenecks%20and%20propose%20a%20roadmap%20for%20transitioning%20from%20measuring%20physical%20observables%20to%20extracting%20structured%20biological%20information%20with%20quantum-enhanced%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29944v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFour%2520Generations%2520of%2520Quantum%2520Biomedical%2520Sensors%26entry.906535625%3DXin%2520Jin%2520and%2520Priyam%2520Srivastava%2520and%2520Ronghe%2520Wang%2520and%2520Yuqing%2520Li%2520and%2520Jonathan%2520Beaumariage%2520and%2520Tom%2520Purdy%2520and%2520M.%2520V.%2520Gurudev%2520Dutt%2520and%2520Kang%2520Kim%2520and%2520Kaushik%2520Seshadreesan%2520and%2520Junyu%2520Liu%26entry.1292438233%3DQuantum%2520sensing%2520technologies%2520offer%2520transformative%2520potential%2520for%2520ultra-sensitive%2520biomedical%2520sensing%252C%2520yet%2520their%2520clinical%2520translation%2520remains%2520constrained%2520by%2520classical%2520noise%2520limits%2520and%2520a%2520reliance%2520on%2520macroscopic%2520ensembles.%2520We%2520propose%2520a%2520unifying%2520generational%2520framework%2520to%2520organize%2520the%2520evolving%2520landscape%2520of%2520quantum%2520biosensors%2520based%2520on%2520their%2520utilization%2520of%2520quantum%2520resources.%2520First-generation%2520devices%2520utilize%2520discrete%2520energy%2520levels%2520for%2520signal%2520transduction%2520but%2520follow%2520classical%2520scaling%2520laws.%2520Second-generation%2520sensors%2520exploit%2520quantum%2520coherence%2520to%2520reach%2520the%2520standard%2520quantum%2520limit%252C%2520while%2520third-generation%2520architectures%2520leverage%2520entanglement%2520and%2520spin%2520squeezing%2520to%2520approach%2520Heisenberg-limited%2520precision.%2520We%2520further%2520define%2520an%2520emerging%2520fourth%2520generation%2520characterized%2520by%2520the%2520end-to-end%2520integration%2520of%2520quantum%2520sensing%2520with%2520quantum%2520learning%2520and%2520variational%2520circuits%252C%2520enabling%2520adaptive%2520inference%2520directly%2520within%2520the%2520quantum%25 {"title": "NES: An Instruction-Free, Low-Latency Next Edit Suggestion Framework Powered by Learned Historical Editing Trajectories", "author": "Xinfang Chen and Siyang Xiao and Xianying Zhu and Junhong Xie and Ming Liang and Dajun Chen and Wei Jiang and Yong Li and Peng Di", "abstract": "Code editing is a frequent yet cognitively demanding task in software development. Existing AI-powered tools often disrupt developer flow by requiring explicit natural language instructions and suffer from high latency, limiting real-world usability. We present NES (Next Edit Suggestion), an instruction-free, low-latency code editing framework that leverages learned historical editing trajectories to implicitly capture developers' goals and coding habits. NES features a dual-model architecture: one model predicts the next edit location and the other generates the precise code change, both without any user instruction. Trained on our open-sourced SFT and DAPO datasets, NES achieves state-of-the-art performance (75.6% location accuracy, 27.7% exact match rate) while delivering suggestions in under 250ms. Deployed at Ant Group, NES serves over 20,000 developers through a seamless Tab-key interaction, achieving effective acceptance rates of 51.55% for location predictions and 43.44% for edits, demonstrating its practical impact in real-world development workflows.", "link": "http://arxiv.org/abs/2508.02473v2", "date": "2026-03-31", "relevancy": 1.8359, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4794}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4669}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4429}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NES {"title": "Exploring the Impact of Skin Color on Skin Lesion Segmentation", "author": "Kuniko Paxton and Medina Kapo and Amila Akagi\u0107 and Koorosh Aslansefat and Dhavalkumar Thakker and Yiannis Papadopoulos", "abstract": "Skin cancer, particularly melanoma, remains a major cause of morbidity and mortality, making early detection critical. AI-driven dermatology systems often rely on skin lesion segmentation as a preprocessing step to delineate the lesion from surrounding skin and support downstream analysis. While fairness concerns regarding skin tone have been widely studied for lesion classification, the influence of skin tone on the segmentation stage remains under-quantified and is frequently assessed using coarse, discrete skin tone categories. In this work, we evaluate three strong segmentation architectures (UNet, DeepLabV3 with a ResNet50 backbone, and DINOv2) on two public dermoscopic datasets (HAM10000 and ISIC2017) and introduce a continuous pigment or contrast analysis that treats pixel-wise ITA values as distributions. Using Wasserstein distances between within-image distributions for skin-only, lesion-only, and whole-image regions, we quantify lesion skin contrast and relate it to segmentation performance across multiple metrics. Within the range represented in these datasets, global skin tone metrics (Fitzpatrick grouping or mean ITA) show weak association with segmentation quality. In contrast, low lesion-skin contrast is consistently associated with larger segmentation errors in models, indicating that boundary ambiguity and low contrast are key drivers of failure. These findings suggest that fairness improvements in dermoscopic segmentation should prioritize robust handling of low-contrast lesions, and the distribution-based pigment measures provide a more informative audit signal than discrete skin-tone categories.", "link": "http://arxiv.org/abs/2603.29694v1", "date": "2026-03-31", "relevancy": 1.9799, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5107}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4918}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4918}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploring%20the%20Impact%20of%20Skin%20Color%20on%20Skin%20Lesion%20Segmentation&body=Title%3A%20Exploring%20the%20Impact%20of%20Skin%20Color%20on%20Skin%20Lesion%20Segmentation%0AAuthor%3A%20Kuniko%20Paxton%20and%20Medina%20Kapo%20and%20Amila%20Akagi%C4%87%20and%20Koorosh%20Aslansefat%20and%20Dhavalkumar%20Thakker%20and%20Yiannis%20Papadopoulos%0AAbstract%3A%20Skin%20cancer%2C%20particularly%20melanoma%2C%20remains%20a%20major%20cause%20of%20morbidity%20and%20mortality%2C%20making%20early%20detection%20critical.%20AI-driven%20dermatology%20systems%20often%20rely%20on%20skin%20lesion%20segmentation%20as%20a%20preprocessing%20step%20to%20delineate%20the%20lesion%20from%20surrounding%20skin%20and%20support%20downstream%20analysis.%20While%20fairness%20concerns%20regarding%20skin%20tone%20have%20been%20widely%20studied%20for%20lesion%20classification%2C%20the%20influence%20of%20skin%20tone%20on%20the%20segmentation%20stage%20remains%20under-quantified%20and%20is%20frequently%20assessed%20using%20coarse%2C%20discrete%20skin%20tone%20categories.%20In%20this%20work%2C%20we%20evaluate%20three%20strong%20segmentation%20architectures%20%28UNet%2C%20DeepLabV3%20with%20a%20ResNet50%20backbone%2C%20and%20DINOv2%29%20on%20two%20public%20dermoscopic%20datasets%20%28HAM10000%20and%20ISIC2017%29%20and%20introduce%20a%20continuous%20pigment%20or%20contrast%20analysis%20that%20treats%20pixel-wise%20ITA%20values%20as%20distributions.%20Using%20Wasserstein%20distances%20between%20within-image%20distributions%20for%20skin-only%2C%20lesion-only%2C%20and%20whole-image%20regions%2C%20we%20quantify%20lesion%20skin%20contrast%20and%20relate%20it%20to%20segmentation%20performance%20across%20multiple%20metrics.%20Within%20the%20range%20represented%20in%20these%20datasets%2C%20global%20skin%20tone%20metrics%20%28Fitzpatrick%20grouping%20or%20mean%20ITA%29%20show%20weak%20association%20with%20segmentation%20quality.%20In%20contrast%2C%20low%20lesion-skin%20contrast%20is%20consistently%20associated%20with%20larger%20segmentation%20errors%20in%20models%2C%20indicating%20that%20boundary%20ambiguity%20and%20low%20contrast%20are%20key%20drivers%20of%20failure.%20These%20findings%20suggest%20that%20fairness%20improvements%20in%20dermoscopic%20segmentation%20should%20prioritize%20robust%20handling%20of%20low-contrast%20lesions%2C%20and%20the%20distribution-based%20pigment%20measures%20provide%20a%20more%20informative%20audit%20signal%20than%20discrete%20skin-tone%20categories.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29694v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploring%2520the%2520Impact%2520of%2520Skin%2520Color%2520on%2520Skin%2520Lesion%2520Segmentation%26entry.906535625%3DKuniko%2520Paxton%2520and%2520Medina%2520Kapo%2520and%2520Amila%2520Akagi%25C4%2587%2520and%2520Koorosh%2520Aslansefat%2520and%2520Dhavalkumar%2520Thakker%2520and%2520Yiannis%2520Papadopoulos%26entry.1292438233%3DSkin%2520cancer%252C%2520particularly%2520melanoma%252C%2520remains%2520a%2520major%2520cause%2520of%2520morbidity%2520and%2520mortality%252C%2520making%2520early%2520detection%2520critical.%2520AI-driven%2520dermatology%2520systems%2520often%2520rely%2520on%2520skin%2520lesion%2520segmentation%2520as%2520a%2520preprocessing%2520step%2520to%2520delineate%2520the%2520lesion%2520from%2520surrounding%2520skin%2520and%2520support%2520downstream%2520analysis.%2520While%2520fairness%2 {"title": "Design and Aerodynamic Modeling of MetaMorpher: A Hybrid Rotary andFixed-Wing Morphing UAV", "author": "Anja Bosak and Dorian Eri\u0107 and Ana Milas and Stjepan Bogdan", "abstract": "In this paper, we present a generalized, comprehensive nonlinear mathematical model and conceptual design for the MetaMorpher, a metamorphic Unmanned Aerial Vehicle (UAV) designed to bridge the gap between vertical takeoff and landing agility and fixed-wing cruising efficiency. Building on the successful design of the spincopter platform, this work introduces a simplified mechanical architecture using lightweight materials and a novel wing-folding strategy. Unlike traditional rigid-body approximations, we derive a nonlinear flight dynamics model that enables arbitrary force distributions across a segmented wing structure. This modularity allows for testing different airfoils, mass distributions, and chord lengths in a single environment. As part of this work, various flight modes were specifically tested and analyzed in the Simulink environment. The results show that the model behaves predictably under different structural configurations, demonstrating its reliability as a tool for rapid design evaluation.", "link": "http://arxiv.org/abs/2603.29646v1", "date": "2026-03-31", "relevancy": 1.3382, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4569}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4505}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Design%20and%20Aerodynamic%20Modeling%20of%20MetaMorpher%3A%20A%20Hybrid%20Rotary%20andFixed-Wing%20Morphing%20UAV&body=Title%3A%20Design%20and%20Ae {"title": "Bethe Ansatz with a Large Language Model", "author": "Bal\u00e1zs Pozsgay and Istv\u00e1n Vona", "abstract": "We explore the capability of a Large Language Model (LLM) to perform specific computations in mathematical physics: the task is to compute the coordinate Bethe Ansatz solution of selected integrable spin chain models. We select three integrable Hamiltonians for which the solutions were unpublished; two of the Hamiltonians are actually new. We observed that the LLM semi-autonomously solved the task in all cases, with a few mistakes along the way. These were corrected after the human researchers spotted them. The results of the LLM were checked against exact diagonalization (performed by separate programs), and the derivations were also checked by the authors. The Bethe Ansatz solutions are interesting in themselves. Our second model manifestly breaks left-right invariance, but it is PT-symmetric, therefore its solution could be interesting for applications in Generalized Hydrodynamics. And our third model is solved by a special form of the nested Bethe Ansatz, where the model is interacting, but the nesting level has a free fermionic structure lacking $U(1)$-invariance. This structure appears to be unique and it was found by the LLM. We used ChatGPT 5.2 Pro and 5.4 Pro by OpenAI.", "link": "http://arxiv.org/abs/2603.29932v1", "date": "2026-03-31", "relevancy": 1.2434, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4228}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.417}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4101}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bethe%20Ansatz%20with%20a%20Large%20Language%20M {"title": "FED-Bench: A Cross-Granular Benchmark for Disentangled Evaluation of Facial Expression Editing", "author": "Fengjian Xue and Xuecheng Wu and Heli Sun and Yunyun Shi and Shi Chen and Liangyu Fu and Jinheng Xie and Dingkang Yang and Hao Wang and Junxiao Xue and Liang He", "abstract": "Facial expression image editing requires fine-grained control to strictly preserve human identity and background while precisely manipulating expression. However, existing editing benchmarks primarily focus on general scenarios, lacking high-quality facial images and corresponding editing instructions. Furthermore, current evaluation metrics exhibit systemic biases in this task, often favoring lazy editing or overfit editing. To bridge these gaps, we propose FED-Bench, a comprehensive benchmark featuring rigorous testing and an accurate evaluation suite. First, we carefully construct a benchmark of 747 triplets through a cascaded and scalable pipeline, each comprising an original image, an editing instruction, and a ground-truth image for precise evaluation. Second, we introduce FED-Score, a cross-granularity evaluation protocol that disentangles assessment into three dimensions: Alignment for verifying instruction following, Fidelity for testing image quality and identity preservation, and Relative Expression Gain for quantifying the magnitude of expression changes, effectively mitigating the aforementioned evaluation biases. Third, we benchmark 18 image editing models, revealing that current approaches struggle to simultaneously achieve high fidelity and accurate expression manipulation, with fine-grained instruction following identified as the primary bottleneck. Finally, leveraging the scalable characteristic of introduced benchmark engine, we provide a 20k+ in-the-wild facial training set and demonstrate its effectiveness by fine-tuning a baseline model that achieves significant performance gains. Our benchmark and related code will be made publicly open soon.", "link": " nstruction%2C%20and%20a%20ground-truth%20image%20for%20precise%20evaluation.%20Second%2C%20we%20introduce%20FED-Score%2C%20a%20cross-granularity%20evaluation%20protocol%20that%20disentangles%20assessment%20into%20three%20dimensions%3A%20Alignment%20for%20verifying%20instruction%20following%2C%20Fidelity%20for%20testing%20image%20quality%20and%20identity%20preservation%2C%20and%20Relative%20Expression%20Gain%20for%20quantifying%20the%20magnitude%20of%20expression%20changes%2C%20effectively%20mitigating%20the%20aforementioned%20evaluation%20biases.%20Third%2C%20we%20benchmark%2018%20image%20editing%20models%2C%20revealing%20that%20current%20approaches%20struggle%20to%20simultaneously%20achieve%20high%20fidelity%20and%20accurate%20expression%20manipulation%2C%20with%20fine-grained%20instruction%20following%20identified%20as%20the%20primary%20bottleneck.%20Finally%2C%20leveraging%20the%20scalable%20characteristic%20of%20introduced%20benchmark%20engine%2C%20we%20provide%20a%2020k%2B%20in-the-wild%20facial%20training%20set%20and%20demonstrate%20its%20effectiveness%20by%20fine-tuning%20a%20baseline%20model%20that%20achieves%20significant%20performance%20gains.%20Our%20benchmark%20and%20related%20code%20will%20be%20made%20publicly%20open%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29697v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFED-Bench%253A%2520A%2520Cross-Granular%2520Benchmark%2520for%2520Disentangled%2520Evaluation%2520of%2520Facial%2520Expression%2520Editing%26entry.906535625%3DFengjian%2520Xue%2520and%2520Xuecheng%2520Wu%2520and%2520Heli%2520Sun%2520and%2520Yunyun%2520Shi%2520and%2520Shi%2520Chen%2520and%2520Liangyu%2520Fu%2520and%2520Jinheng%2520Xie%2520and%2520Dingkang%2520Yang%2520and%2520Hao%2520Wang%2520and%2520Junxiao%2520Xue%2520and%2520Liang%2520He%26entry.1292438233%3DFacial%2520expression%2520image%2520editing%2520requires%2520fine-grained%2520control%2520to%2 {"title": "Sample-Efficient Hypergradient Estimation for Decentralized Bi-Level Reinforcement Learning", "author": "Mikoto Kudo and Takumi Tanabe and Akifumi Wachi and Youhei Akimoto", "abstract": "Many strategic decision-making problems, such as environment design for warehouse robots, can be naturally formulated as bi-level reinforcement learning (RL), where a leader agent optimizes its objective while a follower solves a Markov decision process (MDP) conditioned on the leader's decisions. In many situations, a fundamental challenge arises when the leader cannot intervene in the follower's optimization process; it can only observe the optimization outcome. We address this decentralized setting by deriving the hypergradient of the leader's objective, i.e., the gradient of the leader's strategy that accounts for changes in the follower's optimal policy. Unlike prior hypergradient-based methods that require extensive data for repeated state visits or rely on gradient estimators whose complexity can increase substantially with the high-dimensional leader's decision space, we leverage the Boltzmann covariance trick to derive an alternative hypergradient formulation. This enables efficient hypergradient estimation solely from interaction samples, even when the leader's decision space is high-dimensional. Additionally, to our knowledge, this is the first method that enables hypergradient-based optimization for 2-player Markov games in decentralized settings. Experiments highlight the impact of hypergradient updates and demonstrate our method's effectiveness in both discrete and continuous state tasks.", "link": "http://arxiv.org/abs/2603.14867v3", "date": "2026-03-31", "relevancy": 1.9901, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5064}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4946}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4898}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sample-Efficient%20Hypergradient%20Estimation%20for%20Decentralized%20Bi-Level%20Reinforcement%20Learning&body=Title%3A%20Sample-Efficient%20Hypergradient%20Estimation%20for%20Decentralized%20Bi-Level%20Reinforcement%20Learning%0AAuthor%3A%20Mikoto%20Kudo%20and%20Takumi%20Tanabe%20and%20Akifumi%20Wachi%20and%20Youhei%20Akimoto%0AAbstract%3A%20Many%20strategic%20decision-making%20problems%2C%20such%20as%20environment%20design%20for%20warehouse%20robots%2C%20can%20be%20naturally%20formulated%20as%20bi-level%20reinforcement%20learning%20%28RL%29%2C%20where%20a%20leader%20agent%20optimizes%20its%20objective%20while%20a%20follower%20solves%20a%20Markov%20decision%20process%20%28MDP%29%20conditioned%20on%20the%20leader%27s%20decisions.%20In%20many%20situations%2C%20a%20fundamental%20challenge%20arises%20when%20the%20leader%20cannot%20intervene%20in%20the%20follower%27s%20optimization%20process%3B%20it%20can%20only%20observe%20the%20optimization%20outcome.%20We%20address%20this%20decentralized%20setting%20by%20deriving%20the%20hypergradient%20of%20the%20leader%27s%20objective%2C%20i.e.%2C%20the%20gradient%20of%20the%20leader%27s%20strategy%20that%20accounts%20for%20changes%20in%20the%20follower%27s%20optimal%20policy.%20Unlike%20prior%20hypergradient-based%20methods%20that%20require%20extensive%20data%20for%20repeated%20state%20visits%20or%20rely%20on%20gradient%20estimators%20whose%20complexity%20can%20increase%20substantially%20with%20the%20high-dimensional%20leader%27s%20decision%20space%2C%20we%20leverage%20the%20Boltzmann%20covariance%20trick%20to%20derive%20an%20alternative%20hypergradient%20formulation.%20This%20enables%20efficient%20hypergradient%20estimation%20solely%20from%20interaction%20samples%2C%20even%20when%20the%20leader%27s%20decision%20space%20is%20high-dimensional.%20Additionally%2C%20to%20our%20knowledge%2C%20this%20is%20the%20first%20method%20that%20enables%20hypergradient-based%20optimization%20for%202-player%20Markov%20games%20in%20decentralized%20settings.%20Experiments%20highlight%20the%20impact%20of%20hypergradient%20updates%20and%20demonstrate%20our%20method%27s%20effectiveness%20in%20both%20discrete%20and%20continuous%20state%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14867v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSample-Efficient%2520Hypergradient%2520Estimation%2520for%2520Decentralized%2520Bi-Level%2520Reinforcement%2520Learning%26entry.906535625%3DMikoto%2520Kudo%2520and%2520Takumi%2520Tanabe%2520and%2520Akifumi%2520Wachi%2520and%2520Youhei%2520Akimoto%26entry.1292438233%3DMany%2520strategic%2520decision-making%2520problems%252C%2520such%2520as%2520environment%2520design%2520for%2520warehouse%2520robots%252C%2520can%2520be%2520naturally%2520formulated%2520as%2520bi-level%2520reinforcement%2520learning%2520%2528RL%2529%252C%2520where%2520a%2520leader%2520agent%2520optimizes%2520its%2520objective%2520while%2520a%2520follower%2520solves%2520a%2520Markov%2520decision%2520process%2520%2528MDP%2529%2520conditioned%2520on%2520the%2520leader%2527s%2520decisions.%2520In%2520many%2520situations%252C%2520a%2520fundamental%2520challenge%2520arises%2520when%2520the%2520leader%2520cannot%2520intervene%2520in%2520the%2520follower%2527s%2520optimization%2520process%253B%2520it%2520can%2520only%2520observe%2520the%2520optimization%2520outcome.%2520We%2520address%2520this%2520decentralized%2520setting%2520by%2520deriving%2520the%2520hypergradient%2520of%2520the%2520leader%2527s%2520objective%252C%2520i.e.%252C%2520the%2520gradient%2520of%2520the%2520leader%2527s%2520strategy%2520that%2520accounts%2520for%2520changes%2520in%2520the%2520follower%2527s%2520optimal%252 {"title": "Benchmarking Physics-Informed Time-Series Models for Operational Global Station Weather Forecasting", "author": "Tao Han and Zhibin Wen and Zhenghao Chen and Dazhao Du and Song Guo and Lei Bai", "abstract": "The development of Time-Series Forecasting (TSF) models is often constrained by the lack of comprehensive datasets, especially in Global Station Weather Forecasting (GSWF), where existing datasets are small, temporally short, and spatially sparse. To address this, we introduce WEATHER-5K, a large-scale observational weather dataset that better reflects real-world conditions, supporting improved model training and evaluation. While recent TSF methods perform well on benchmarks, they lag behind operational Numerical Weather Prediction systems in capturing complex weather dynamics and extreme events. We propose PhysicsFormer, a physics-informed forecasting model combining a dynamic core with a Transformer residual to predict future weather states. Physical consistency is enforced via pressure-wind alignment and energy-aware smoothness losses, ensuring plausible dynamics while capturing complex temporal patterns. We benchmark PhysicsFormer and other TSF models against operational systems across several weather variables, extreme event prediction, and model complexity, providing a comprehensive assessment of the gap between academic TSF models and operational forecasting. The dataset and benchmark implementation are available at: https://github.com/taohan10200/WEATHER-5K.", "link": "http://arxiv.org/abs/2406.14399v3", "date": "2026-03-31", "relevancy": 1.3431, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.457}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.443}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and {"title": "When fractional quasi p-norms concentrate", "author": "Ivan Y. Tyukin and Bogdan Grechuk and Evgeny M. Mirkes and Alexander N. Gorban", "abstract": "Concentration of distances in high dimension is an important factor for the development and design of stable and reliable data analysis algorithms. In this paper, we address the fundamental long-standing question about the concentration of distances in high dimension for fractional quasi $p$-norms, $p\\in(0,1)$. The topic has been at the centre of various theoretical and empirical controversies. Here we, for the first time, identify conditions when fractional quasi $p$-norms concentrate and when they don't. We show that contrary to some earlier suggestions, for broad classes of distributions, fractional quasi $p$-norms admit exponential and uniform in $p$ concentration bounds. For these distributions, the results effectively rule out previously proposed approaches to alleviate concentration by \"optimal\" setting the values of $p$ in $(0,1)$. At the same time, we specify conditions and the corresponding families of distributions for which one can still control concentration rates by appropriate choices of $p$. We also show that in an arbitrarily small vicinity of a distribution from a large class of distributions for which uniform concentration occurs, there are uncountably many other distributions featuring anti-concentration properties. Importantly, this behavior enables devising relevant data encoding or representation schemes favouring or discouraging distance concentration. The results shed new light on this long-standing problem and resolve the tension around the topic in both theory and empirical evidence reported in the literature.", "link": "http://arxiv.org/abs/2505.19635v3", "date": "2026-03-31", "relevancy": 1.5281, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.3993}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.3726}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3626}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20fractional%20quasi%20p-norms%20concentrate&body=Title%3A%20When%20fractional%20quasi%20p-norms%20concentrate%0AAuthor%3A%20Ivan%20Y.%20Tyukin%20and%20Bogdan%20Grechuk%20and%20Evgeny%20M.%20Mirkes%20and%20Alexander%20N.%20Gorban%0AAbstract%3A%20Concentration%20of%20distances%20in%20high%20dimension%20is%20an%20important%20factor%20for%20the%20development%20and%20design%20of%20stable%20and%20reliable%20data%20analysis%20algorithms.%20In%20this%20paper%2C%20we%20address%20the%20fundamental%20long-standing%20question%20about%20the%20concentration%20of%20distances%20in%20high%20dimension%20for%20fractional%20quasi%20%24p%24-norms%2C%20%24p%5Cin%280%2C1%29%24.%20The%20topic%20has%20been%20at%20the%20centre%20of%20various%20theoretical%20and%20empirical%20controversies.%20Here%20we%2C%20for%20the%20first%20time%2C%20identify%20conditions%20when%20fractional%20quasi%20%24p%24-norms%20concentrate%20and%20when%20they%20don%27t.%20We%20show%20that%20contrary%20to%20some%20earlier%20suggestions%2C%20for%20broad%20classes%20of%20distributions%2C%20fractional%20quasi%20%24p%24-norms%20admit%20exponential%20and%20uniform%20in%20%24p%24%20concentration%20bounds.%20For%20these%20distributions%2C%20the%20results%20effectively%20rule%20out%20previously%20proposed%20approaches%20to%20alleviate%20concentration%20by%20%22optimal%22%20setting%20the%20values%20of%20%24p%24%20in%20%24%280%2C1%29%24.%20At%20the%20same%20time%2C%20we%20specify%20conditions%20and%20the%20corresponding%20families%20of%20distributions%20for%20which%20one%20can%20still%20control%20concentration%20rates%20by%20appropriate%20choices%20of%20%24p%24.%20We%20also%20show%20that%20in%20an%20arbitrarily%20small%20vicinity%20of%20a%20distribution%20from%20a%20large%20class%20of%20distributions%20for%20which%20uniform%20concentration%20occurs%2C%20there%20are%20uncountably%20many%20other%20distributions%20featuring%20anti-concentration%20properties.%20Importantly%2C%20this%20behavior%20enables%20devising%20relevant%20data%20encoding%20or%20representation%20schemes%20favouring%20or%20discouraging%20distance%20concentration.%20The%20results%20shed%20new%20light%20on%20this%20long-standing%20problem%20and%20resolve%20the%20tension%20around%20the%20topic%20in%20both%20theory%20and%20empirical%20evidence%20reported%20in%20the%20literature.%0ALink%3A%20http%3A//arxiv.org/abs/2505.19635v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520fractional%2520quasi%2520p-norms%2520concentrate%26entry.906535625%3DIvan%2520Y.%2520Tyukin%2520and%2520Bogdan%2520Grechuk%2520and%2520Evgeny%2520M.%2520Mirkes%2520and%2520Alexander%2520N.%2520Gorban%26entry.1292438233%3DConcentration%2520of%2520distances%2520in%2520high%2520dimension%2520is%2520an%2520important%2520factor%2520for%2520the%2520development%2520and%2520design%2520of%2520stable%2520and%2520reliable%2520data%2520analysis%2520algorithms.%2520In%2520this%2520paper%252C%2520we%2520address%2520the%2520fundamental%2520long-standing%2520question%2520about%2520the%2520concentration%2520of%2520distances%2520in%2520high%2520dimension%2520for%2520fractional%2520quasi%2520%2524p%2524-norms%252C%2520%2524p%255Cin%25280%252C1%2529%2524.%2520The%2520topic%2520has%2520been%2520at%2520the%2520centre%2520of%2520various%2520theoretical%2520and%2520empirical%2520controversies.%2520Here%2520we%252C%2520for%2520the%2520first%2520time%252C%2520identify%2520conditions%2520when%2520fractional%2520quasi%2520%2524p%2524-norms%2520concentrate%2520and%2520when%2520they%2       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

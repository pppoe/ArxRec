{"title": "SurgNavAR: An Augmented Reality Surgical Navigation Framework for Optical See-Through Head Mounted Displays", "author": "Abdullah Thabit and Mohamed Benmahdjoub and Rafiuddin Jinabade and Hizirwan S. Salim and Marie-Lise C. van Veelen and Mark G. van Vledder and Eppo B. Wolvius and Theo van Walsum", "abstract": "Augmented reality (AR) devices with head mounted displays (HMDs) facilitate the direct superimposition of 3D preoperative imaging data onto the patient during surgery. To use an HMD-AR device as a stand-alone surgical navigation system, the device should be able to locate the patient and surgical instruments, align preoperative imaging data with the patient, and visualize navigation data in real time during surgery. Whereas some of the technologies required for this are known, integration in such devices is cumbersome and requires specific knowledge and expertise, hampering scientific progress in this field. This work therefore aims to present and evaluate an integrated HMD-based AR surgical navigation framework that is adaptable to diverse surgical applications. The framework tracks 2D patterns as reference markers attached to the patient and surgical instruments. It allows for the calibration of surgical tools using pivot and reference-based calibration techniques. It enables image-to-patient registration using point-based matching and manual positioning. The integrated functionalities of the framework are evaluated on two HMD devices, the HoloLens 2 and Magic Leap 2, with two surgical use cases being evaluated in a phantom setup: AR-guided needle insertion and rib fracture localization. The framework was able to achieve a mean tooltip calibration accuracy of 1 mm, a registration accuracy of 3 mm, and a targeting accuracy below 5 mm on the two surgical use cases. The framework presents an easy-to-use configurable tool for HMD-based AR surgical navigation, which can be extended and adapted to many surgical applications. The framework is publicly {"title": "VIGiA: Instructional Video Guidance via Dialogue Reasoning and Retrieval", "author": "Diogo Gl\u00f3ria-Silva and David Semedo and Jo\u00e3o Maglh\u00e3es", "abstract": "We introduce VIGiA, a novel multimodal dialogue model designed to understand and reason over complex, multi-step instructional video action plans. Unlike prior work which focuses mainly on text-only guidance, or treats vision and language in isolation, VIGiA supports grounded, plan-aware dialogue that requires reasoning over visual inputs, instructional plans, and interleaved user interactions. To this end, VIGiA incorporates two key capabilities: (1) multimodal plan reasoning, enabling the model to align uni- and multimodal queries with the current task plan and respond accurately; and (2) plan-based retrieval, allowing it to retrieve relevant plan steps in either textual or visual representations. Experiments were done on a novel dataset with rich Instructional Video Dialogues aligned with Cooking and DIY plans. Our evaluation shows that VIGiA outperforms existing state-of-the-art models on all tasks in a conversational plan guidance setting, reaching over 90\\% accuracy on plan-aware VQA.", "link": "http://arxiv.org/abs/2602.19146v2", "date": "2026-03-31", "relevancy": 2.5087, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5038}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5007}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5007}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VIGiA%3A%20Instructional%20Video%20Guidance%20via%20Dialogue%20Reasoning%20and%20Retrieval&body=Title%3A%20VIGiA%3A%20Instructional%20Video%20Guidance%20via%20Dialogue%20Reasoning%20and%20Retrieval%0AAuthor%3A%20Diogo%20Gl%C3%B3ria-Silva%20and%20David%20Semedo%20and%20Jo%C3%A3o%20Maglh%C3%A3es%0AAbstract%3A%20We%20introduce%20VIGiA%2C%20a%20novel%20multimodal%20dialogue%20model%20designed%20to%20understand%20and%20reason%20over%20complex%2C%20multi-step%20instructional%20video%20action%20plans.%20Unlike%20prior%20work%20which%20focuses%20mainly%20on%20text-only%20guidance%2C%20or%20treats%20vision%20and%20language%20in%20isolation%2C%20VIGiA%20supports%20grounded%2C%20plan-aware%20dialogue%20that%20requires%20reasoning%20over%20visual%20inputs%2C%20instructional%20plans%2C%20and%20interleaved%20user%20interactions.%20To%20this%20end%2C%20VIGiA%20incorporates%20two%20key%20capabilities%3A%20%281%29%20multimodal%20plan%20reasoning%2C%20enabling%20the%20model%20to%20align%20uni-%20and%20multimodal%20queries%20with%20the%20current%20task%20plan%20and%20respond%20accurately%3B%20and%20%282%29%20plan-based%20retrieval%2C%20allowing%20it%20to%20retrieve%20relevant%20plan%20steps%20in%20either%20textual%20or%20visual%20representations.%20Experiments%20were%20done%20on%20a%20novel%20dataset%20with%20rich%20Instructional%20Video%20Dialogues%20aligned%20with%20Cooking%20and%20DIY%20plans.%20Our%20evaluation%20shows%20that%20VIGiA%20outperforms%20existing%20state-of-the-art%20models%20on%20all%20tasks%20in%20a%20conversational%20plan%20guidance%20setting%2C%20reaching%20over%2090%5C%25%20accuracy%20on%20plan-aware%20VQA.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19146v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVIGiA%253A%2520Instructional%2520Video%2520Guidance%2520via%2520Dialogue%2520Reasoning%2520and%2520Retrieval%26entry.906535625%3DDiogo%2520Gl%25C3%25B3ria-Silva%2520and%2520David%2520Semedo%2520and%2520Jo%25C3%25A3o%2520Maglh%25C3%25A3es%26entry.1292438233%3DWe%2520introduce%2520VIGiA%252C%2520a%2520novel%2520multimodal%2520dialogue%2520model%2520designed%2520 {"title": "SceneTeract: Agentic Functional Affordances and VLM Grounding in 3D Scenes", "author": "L\u00e9opold Maillard and Francis Engelmann and Tom Durand and Boxiao Pan and Yang You and Or Litany and Leonidas Guibas and Maks Ovsjanikov", "abstract": "Embodied AI depends on interactive 3D environments that support meaningful activities for diverse users, yet assessing their functional affordances remains a core challenge. We introduce SceneTeract, a framework that verifies 3D scene functionality under agent-specific constraints. Our core contribution is a grounded verification engine that couples high-level semantic reasoning with low-level geometric checks. SceneTeract decomposes complex activities into sequences of atomic actions and validates each step against accessibility requirements (e.g., reachability, clearance, and navigability) conditioned on an embodied agent profile, using explicit physical and geometric simulations. We deploy SceneTeract to perform an in-depth evaluation of (i) synthetic indoor environments, uncovering frequent functional failures that prevent basic interactions, and (ii) the ability of frontier Vision-Language Models (VLMs) to reason about and predict functional affordances, revealing systematic mismatches between semantic confidence and physical feasibility even for the strongest current models. Finally, we leverage SceneTeract as a reward engine for VLM post-training, enabling scalable distillation of geometric constraints into reasoning models. We release the SceneTeract verification suite and data to bridge perception and physical reality in embodied 3D scene understanding.", "link": "http://arxiv.org/abs/2603.29798v1", "date": "2026-03-31", "relevancy": 2.5059, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6285}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "li {"title": "DiSGMM: A Method for Time-varying Microscopic Weight Completion on Road Networks", "author": "Yan Lin and Jilin Hu and Shengnan Guo and Christian S. Jensen and Youfang Lin and Huaiyu Wan", "abstract": "Microscopic road-network weights represent fine-grained, time-varying traffic conditions obtained from individual vehicles. An example is travel speeds associated with road segments as vehicles traverse them. These weights support tasks including traffic microsimulation and vehicle routing with reliability guarantees. We study the problem of time-varying microscopic weight completion. During a time slot, the available weights typically cover only some road segments. Weight completion recovers distributions for the weights of every road segment at the current time slot. This problem involves two challenges: (i) contending with two layers of sparsity, where weights are missing at both the network layer (many road segments lack weights) and the segment layer (a segment may have insufficient weights to enable accurate distribution estimation); and (ii) achieving a weight distribution representation that is closed-form and can capture complex conditions flexibly, including heavy tails and multiple clusters.\n  To address these challenges, we propose DiSGMM that combines sparsity-aware embeddings with spatiotemporal modeling to leverage sparse known weights alongside learned segment properties and long-range correlations for distribution estimation. DiSGMM represents distributions of microscopic weights as learnable Gaussian mixture models, providing closed-form distributions capable of capturing complex conditions flexibly. Experiments on two real-world datasets show that DiSGMM can outperform state-of-the-art methods.", "link": "http://arxiv.org/abs/2603.29837v1", "date": "2026-03-31", "relevancy": 2.5031, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5197}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4946}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DiSGMM%3A%20A%20Method%20for%20Time-varying%20Microscopic%20Weight%20Completion%20on%20Road%20Networks&body=Title%3A%20DiSGMM%3A%20A%20Method%20for%20Time-varying%20Microscopic%20Weight%20Completion%20on%20Road%20Networks%0AAuthor%3A%20Yan%20Lin%20and%20Jilin%20Hu%20and%20Shengnan%20Guo%20and%20Christian%20S.%20Jensen%20and%20Youfang%20Lin%20and%20Huaiyu%20Wan%0AAbstract%3A%20Microscopic%20road-network%20weights%20represent%20fine-grained%2C%20time-varying%20traffic%20conditions%20obtained%20from%20individual%20vehicles.%20An%20example%20is%20travel%20speeds%20associated%20with%20road%20segments%20as%20vehicles%20traverse%20them.%20These%20weights%20support%20tasks%20including%20traffic%20microsimulation%20and%20vehicle%20routing%20with%20reliability%20guarantees.%20We%20study%20the%20problem%20of%20time-varying%20microscopic%20weight%20completion.%20During%20a%20time%20slot%2C%20the%20available%20weights%20typically%20cover%20only%20some%20road%20segments.%20Weight%20completion%20recovers%20distributions%20for%20the%20weights%20of%20every%20road%20segment%20at%20the%20current%20time%20slot.%20This%20problem%20involves%20two%20challenges%3A%20%28i%29%20contending%20with%20two%20layers%20of%20sparsity%2C%20where%20weights%20are%20missing%20at%20both%20the%20network%20layer%20%28many%20road%20segments%20lack%20weights%29%20and%20the%20segment%20layer%20%28a%20segment%20may%20have%20insufficient%20weights%20to%20enable%20accurate%20distribution%20estimation%29%3B%20and%20%28ii%29%20achieving%20a%20weight%20distribution%20representation%20that%20is%20closed-form%20and%20can%20capture%20complex%20conditions%20flexibly%2C%20including%20heavy%20tails%20and%20multiple%20clusters.%0A%20%20To%20address%20these%20challenges%2C%20we%20propose%20DiSGMM%20that%20combines%20sparsity-aware%20embeddings%20with%20spatiotemporal%20modeling%20to%20leverage%20sparse%20known%20weights%20alongside%20learned%20segment%20properties%20and%20long-range%20correlations%20for%20distribution%20estimation.%20DiSGMM%20represents%20distributions%20of%20microscopic%20weights%20as%20learnable%20Gaussian%20mixture%20models%2C%20providing%20closed-form%20distributions%20capable%20of%20capturing%20complex%20conditions%20flexibly.%20Experiments%20on%20two%20real-world%20datasets%20show%20that%20DiSGMM%20can%20outperform%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29837v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiSGMM%253A%2520A%2520Method%2520for%2520Time-varying%2520Microscopic%2520Weight%2520Completion%2520on%2520Road%2520Networks%26entry.906535625%3DYan%2520Lin%2520and%2520Jilin%2520Hu%2520and%2520Shengnan%2520Guo%2520and%2520Christian%2520S.%2520Jensen%2520and%2520Youfang%2520Lin%2520and%2520Huaiyu%2520Wan%26entry.1292438233%3DMicroscopic%2520road-network%2520weights%2520represent%2520fine-grained%252C%2520time-varying%2520traffic%2520conditions%2520obtained%2520from%2520individual%2520vehicles.%2520An%2520example%2520is%2520travel%2520speeds%2520associated%2520with%2520road%2520segments%2520as%2520vehicles%2520traverse%2520them.%2520These%2520weights%2520support%2520tasks%2520including%2520traffic%2520microsimulation%2520and%2520vehicle%2520routing%2520with%2520reliability%2520guarantees.%2520We%2520study%2520the%2520problem%2520of%2520time-varying%2520microscopic%2520weight%2520completion.%2520During%2520a%2520time%2520slot%252C%2520the%2520available%2520weights%2520typically%2520cover%2520only%2520some%2520road%2520segments.%2520Weight%2520compl {"title": "Aleph-Alpha-GermanWeb: Improving German-language LLM pre-training with model-based data curation and synthetic data generation", "author": "Thomas F Burns and Letitia Parcalabescu and Stephan W\u00e4ldchen and Michael Barlow and Gregor Ziegltrum and Volker Stampa and Bastian Harren and Bj\u00f6rn Deiseroth", "abstract": "Scaling data quantity is essential for large language models (LLMs), yet recent findings show that data quality can significantly boost performance and training efficiency. We introduce a German-language dataset curation pipeline that combines heuristic and model-based filtering techniques with synthetic data generation. We use our pipeline to create Aleph-Alpha-GermanWeb, a 628B-word German pre-training dataset composed of three subsets drawing from: (1) Common Crawl web data (organic subset; 78B words), (2) FineWeb2 (organic subset; 235B), and (3) synthetically-generated data conditioned on actual, organic web data (synthetic subset; 329B). We evaluate our dataset by pre-training both a 1B Llama-style model and an 8B tokeniser-free hierarchical autoregressive transformer (HAT) from scratch. A comparison on German-language benchmarks, including MMMLU, shows significant performance gains of Aleph-Alpha-GermanWeb over FineWeb2 alone. This advantage holds at the 8B scale even when FineWeb2 is enriched by human-curated high-quality data sources such as Wikipedia. Our findings support the growing body of evidence that model-based data curation and synthetic data generation can significantly enhance LLM pre-training datasets.", "link": "http://arxiv.org/abs/2505.00022v3", "date": "2026-03-31", "relevancy": 2.5023, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5094}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4987}, {"title": "Lexicon {"title": "Bringing Up a Bilingual BabyLM: Investigating Multilingual Language Acquisition Using Small-Scale Models", "author": "Linda Zeng and Steven Y. Feng and Michael C. Frank", "abstract": "Multilingualism is incredibly common around the world, leading to many important theoretical and practical questions about how children learn multiple languages at once. For example, does multilingual acquisition lead to delays in learning? Are there better and worse ways to structure multilingual input? Many correlational studies address these questions, but it is surprisingly difficult to get definitive answers because children cannot be randomly assigned to be multilingual and data are typically not matched between languages. We use language model training as a method for simulating a variety of highly controlled exposure conditions, and create matched 100M-word mono- and bilingual datasets using synthetic data and machine translation. We train GPT-2 models on monolingual and bilingual data organized to reflect a range of exposure regimes, and evaluate their performance on perplexity, grammaticality, and semantic knowledge. Across model scales and measures, bilingual models perform similarly to monolingual models in one language, but show strong performance in the second language as well. These results suggest that there are no strong differences between different bilingual exposure regimes, and that bilingual input poses no in-principle challenges for agnostic statistical learners.", "link": "http://arxiv.org/abs/2603.29552v1", "date": "2026-03-31", "relevancy": 2.4953, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5078}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5078}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understandi {"title": "Spontaneous Functional Differentiation in Large Language Models: A Brain-Like Intelligence Economy", "author": "Junjie Zhang and Zhen Shen and Gang Xiong and Xisong Dong", "abstract": "The evolution of intelligence in artificial systems provides a unique opportunity to identify universal computational principles. Here we show that large language models spontaneously develop synergistic cores where information integration exceeds individual parts remarkably similar to the human brain. Using Integrated Information Decomposition across multiple architectures we find that middle layers exhibit synergistic processing while early and late layers rely on redundancy. This organization is dynamic and emerges as a physical phase transition as task difficulty increases. Crucially ablating synergistic components causes catastrophic performance loss confirming their role as the physical entity of abstract reasoning and bridging artificial and biological intelligence.", "link": "http://arxiv.org/abs/2603.29735v1", "date": "2026-03-31", "relevancy": 2.4796, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5042}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5042}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4794}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spontaneous%20Functional%20Differentiation%20in%20Large%20Language%20Models%3A%20A%20Brain-Like%20Intelligence%20Economy&body=Title%3A%20Spontaneous%20Functional%20Differentiation%20in%20Large%20Language%20Models%3A%20A%20Brain-Like%20Intelligence%20Economy%0AAuthor%3A%20Junjie%20Zhang%20and%20Zhen%20Shen%20and%20Gang%20Xiong%20and%20Xisong%20Dong%0AAbstract%3A%20The%20evolution%20of%20intelligence% iddle%2520layers%2520exhibit%2520synergistic%2520processing%2520while%2520early%2520and%2520late%2520layers%2520rely%2520on%2520redundancy.%2520This%2520organization%2520is%2520dynamic%2520and%2520emerges%2520as%2520a%2520physical%2520phase%2520transition%2520as%2520task%2520difficulty%2520increases.%2520Crucially%2520ablating%2520synergistic%2520components%2520causes%2520catastrophic%2520performance%2520loss%2520confirming%2520their%2520role%2520as%2520the%2520physical%2520entity%2520of%2520abstract%2520reasoning%2520and%2520bridging%2520artificial%2520and%2520biological%2520intelligence.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29735v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spontaneous%20Functional%20Differentiation%20in%20Large%20Language%20Models%3A%20A%20Brain-Like%20Intelligence%20Economy&entry.906535625=Junjie%20Zhang%20and%20Zhen%20Shen%20and%20Gang%20Xiong%20and%20Xisong%20Dong&entry.1292438233=The%20evolution%20of%20intelligence%20in%20artificial%20systems%20provides%20a%20unique%20opportunity%20to%20identify%20universal%20computational%20principles.%20Here%20we%20show%20that%20large%20language%20models%20spontaneously%20develop%20synergistic%20cores%20where%20information%20integration%20exceeds%20individual%20parts%20remarkably%20similar%20to%20the%20human%20brain.%20Using%20Integrated%20Information%20Decomposition%20across%20multiple%20architectures%20we%20find%20that%20middle%20layers%20exhibit%20synergistic%20processing%20while%20early%20and%20late%20layers%20rely%20on%20redundancy.%20This%20organization%20is%20dynamic%20and%20emerges%20as%20a%20physical%20phase%20transition%20as%20task%20difficulty%20increases.%20Crucially%20ablating%20synergistic%20components%20causes%20catastrophic%20performance%20loss%20confirming%20their%20role%20as%20the%20physical%20entity%20of%20abstract%20reasoning%20and%20bridging%20artificial%20and%20bi {"title": "Self-Supervised Federated Learning under Data Heterogeneity for Label-Scarce Diatom Classification", "author": "Mingkun Tan and Xilu Wang and Michael Kloster and Tim W. Nattkemper", "abstract": "Label-scarce visual classification under decentralized and heterogeneous data is a fundamental challenge in pattern recognition, especially when sites exhibit partially overlapping class sets. While self-supervised federated learning (SSFL) offers a promising solution, existing studies commonly assume the same data heterogeneity pattern throughout pre-training and fine-tuning. Moreover, current partitioning schemes often fail to generate pure partially class-disjoint data settings, limiting controllable simulation of real-world label-space heterogeneity. In this work, we introduce SSFL for diatom classification as a representative real-world instance and systematically investigate stage-specific data heterogeneity. We study cross-site variation in unlabeled data volume during pre-training and label-space misalignment during downstream fine-tuning. To study the latter in a controllable setting, we propose PreDi, a partitioning scheme that disentangles label-space heterogeneity into two orthogonal dimensions, namely class Prevalence and class-set size Disparity, enabling separate analysis of their effects. Guided by the resulting insights, we further propose PreP-WFL (Prevalence-based Personalized Weighted Federated Learning) to adaptively strengthen rare-class representations in low-prevalence scenarios. Extensive experiments show that SSFL consistently outperforms local-only training under both homogeneous and heterogeneous settings. The pronounced heterogeneity in unlabeled data volume is associated with improved representation pre-training, whereas under label-space heterogeneity, prevalence dominates performance and disparity has a smaller effect. PreP-WFL effectively mitigates this degradation, with gains increasing as prevalence decreases. These findings provide a mechanistic basis for characterizing label-space heterogeneity in decentralized recognition systems.", "link": "http://arxiv.org/abs/2603.29633v1", "date": "2026-03-31", "relevancy": 2.4693, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5023}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4948}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4845}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Supervised%20Federated%20Learning%20under%20Data%20Heterogeneity%20for%20Label-Scarce%20Diatom%20Classification&body=Title%3A%20Self-Supervised%20Federated%20Learning%20under%20Data%20Heterogeneity%20for%20Label-Scarce%20Diatom%20Classification%0AAuthor%3A%20Mingkun%20Tan%20and%20Xilu%20Wang%20and%20Michael%20Kloster%20and%20Tim%20W.%20Nattkemper%0AAbstract%3A%20Label-scarce%20visual%20classification%20under%20decentralized%20and%20heterogeneous%20data%20is%20a%20fundamental%20challenge%20in%20pattern%20recognition%2C%20especially%20when%20sites%20exhibit%20partially%20overlapping%20class%20sets.%20While%20self-supervised%20federated%20learning%20%28SSFL%29%20offers%20a%20promising%20solution%2C%20existing%20studies%20commonly%20assume%20the%20same%20data%20heterogeneity%20pattern%20throughout%20pre-training%20and%20fine-tuning.%20Moreover%2C%20current%20partitioning%20schemes%20often%20fail%20to%20generate%20pure%20partially%20class-disjoint%20data%20settings%2C%20limiting%20controllable%20simulation%20of%20real-world%20label-space%20heterogeneity.%20In%20this%20work%2C%20we%20introduce%20SSFL%20for%20diatom%20classification%20as%20a%20representative%20real-world%20instance%20and%20systematically%20investigate%20stage-specific%20data%20heterogeneity.%20We%20study%20cross-site%20variation%20in%20unlabeled%20data%20volume%20during%20pre-training%20and%20label-space%20misalignment%20during%20downstream%20fine-tuning.%20To%20study%20the%20latter%20in%20a%20controllable%20setting%2C%20we%20propose%20PreDi%2C%20a%20partitioning%20scheme%20that%20disentangles%20label-space%20heterogeneity%20into%20two%20orthogonal%20dimensions%2C%20namely%20class%20Prevalence%20and%20class-set%20size%20Disparity%2C%20enabling%20separate%20analysis%20of%20their%20effects.%20Guided%20by%20the%20resulting%20insights%2C%20we%20further%20propose%20PreP-WFL%20%28Prevalence-based%20Personalized%20Weighted%20Federated%20Learning%29%20to%20adaptively%20strengthen%20rare-class%20representations%20in%20low-prevalence%20scenarios.%20Extensive%20experiments%20show%20that%20SSFL%20consistently%20outperforms%20local-only%20training%20under%20both%20homogeneous%20and%20heterogeneous%20settings.%20The%20pronounced%20heterogeneity%20in%20unlabeled%20data%20volume%20is%20associated%20with%20improved%20representation%20pre-training%2C%20whereas%20under%20label-space%20heterogeneity%2C%20prevalence%20dominates%20performance%20and%20disparity%20has%20a%20smaller%20effect.%20PreP-WFL%20effectively%20mitigates%20this%20degradation%2C%20with%20gains%20increasing%20as%20prevalence%20decreases.%20These%20findings%20provide%20a%20mechanistic%20basis%20for%20characterizing%20label-space%20heterogeneity%20in%20decentralized%20recognition%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29633v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Supervised%2520Federated%2520Learning%2520under%2520Data%2520Heterogeneity%2520for%2520Label-Scarce%2520Diatom%2520Classification%26entry.906535625%3DMingkun%2520Tan%2520and%2520Xilu%2520Wang%2520and%2520Michael%2520Kloster%2520and%2520Tim%2520W.%2520Nattkemper%26entry.129243 {"title": "When Does Global Attention Help? A Unified Empirical Study on Atomistic Graph Learning", "author": "Arindam Chowdhury and Massimiliano Lupo Pasini", "abstract": "Graph neural networks (GNNs) are widely used as surrogates for costly experiments and first-principles simulations to study the behavior of compounds at atomistic scale, and their architectural complexity is constantly increasing to enable the modeling of complex physics. While most recent GNNs combine more traditional message passing neural networks (MPNNs) layers to model short-range interactions with more advanced graph transformers (GTs) with global attention mechanisms to model long-range interactions, it is still unclear when global attention mechanisms provide real benefits over well-tuned MPNN layers due to inconsistent implementations, features, or hyperparameter tuning. We introduce the first unified, reproducible benchmarking framework - built on HydraGNN - that enables seamless switching among four controlled model classes: MPNN, MPNN with chemistry/topology encoders, GPS-style hybrids of MPNN with global attention, and fully fused local-global models with encoders. Using seven diverse open-source datasets for benchmarking across regression and classification tasks, we systematically isolate the contributions of message passing, global attention, and encoder-based feature augmentation. Our study shows that encoder-augmented MPNNs form a robust baseline, while fused local-global models yield the clearest benefits for properties governed by long-range interaction effects. We further quantify the accuracy-compute trade-offs of attention, reporting its overhead in memory. Together, these results establish the first controlled evaluation of global attention in atomistic graph learning and provide a reproducible testbed for future model development.", "link": "http://arxiv.org/abs/2510.05583v2", "date": "2026-03-31", "relevancy": 2.4605, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5046}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4894}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4822}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Does%20Global%20Attention%20Help%3F%20A%20Unified%20Empirical%20Study%20on%20Atomistic%20Graph%20Learning&body=Title%3A%20When%20Does%20Global%20Attention%20Help%3F%20A%20Unified%20Empirical%20Study%20on%20Atomistic%20Graph%20Learning%0AAuthor%3A%20Arindam%20Chowdhury%20and%20Massimiliano%20Lupo%20Pasini%0AAbstract%3A%20Graph%20neural%20networks%20%28GNNs%29%20are%20widely%20used%20as%20surrogates%20for%20costly%20experiments%20and%20first-principles%20simulations%20to%20study%20the%20behavior%20of%20compounds%20at%20atomistic%20scale%2C%20and%20their%20architectural%20complexity%20is%20constantly%20increasing%20to%20enable%20the%20modeling%20of%20complex%20physics.%20While%20most%20recent%20GNNs%20combine%20more%20traditional%20message%20passing%20neural%20networks%20%28MPNNs%29%20layers%20to%20model%20short-range%20interactions%20with%20more%20advanced%20graph%20transformers%20%28GTs%29%20with%20global%20attention%20mechanisms%20to%20model%20long-range%20interactions%2C%20it%20is%20still%20unclear%20when%20global%20attention%20mechanisms%20provide%20real%20benefits%20over%20well-tuned%20MPNN%20layers%20due%20to%20inconsistent%20implementations%2C%20features%2C%20or%20hyperparameter%20tuning.%20We%20introduce%20the%20first%20unified%2C%20reproducible%20benchmarking%20framework%20-%20built%20on%20HydraGNN%20-%20that%20enables%20seamless%20switching%20among%20four%20controlled%20model%20classes%3A%20MPNN%2C%20MPNN%20with%20chemistry/topology%20encoders%2C%20GPS-style%20hybrids%20of%20MPNN%20with%20global%20attention%2C%20and%20fully%20fused%20local-global%20models%20with%20encoders.%20Using%20seven%20diverse%20open-source%20datasets%20for%20benchmarking%20across%20regression%20and%20classification%20tasks%2C%20we%20systematically%20isolate%20the%20contributions%20of%20message%20passing%2C%20global%20attention%2C%20and%20encoder-based%20feature%20augmentation.%20Our%20study%20shows%20that%20encoder-augmented%20MPNNs%20form%20a%20robust%20baseline%2C%20while%20fused%20local-global%20models%20yield%20the%20clearest%20benefits%20for%20properties%20governed%20by%20long-range%20interaction%20effects.%20We%20further%20quantify%20the%20accuracy-compute%20trade-offs%20of%20attention%2C%20reporting%20its%20overhead%20in%20memory.%20Together%2C%20these%20results%20establish%20the%20first%20controlled%20evaluation%20of%20global%20attention%20in%20atomistic%20graph%20learning%20and%20provide%20a%20reproducible%20testbed%20for%20future%20model%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2510.05583v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Does%2520Global%2520Attention%2520Help%253F%2520A%2520Unified%2520Empirical%2520Study%2520on%2520Atomistic%2520Graph%2520Learning%26entry.906535625%3DArindam%2520Chowdhury%2520and%2520Massimiliano%2520Lupo%2520Pasini%26entry.1292438233%3DGraph%2520neural%2520networks%2520%2528GNNs%2529%2520are%2520widely%2520used%2520as%2520surrogates%2520for%2520costly%2520experiments%2520and%2520first-principles%2520simulations%2520to%2520study%2520the%2520behavior%2520of%2520compounds%2520at%2520atomistic%2520scale%252C%2520and%2520their%2520architectural%2520complexity%2520is%2520constantly%2520increasing%2520to%2520enable%2520the%2520modeling%2520of%2520complex%2520physics.%2520While%2520most%2520recent%2520GNNs%2520combine%2520more%2520traditional%2520message%2520passing%2520neural%2520networks%2520%2528MPNNs%2529%2520layers%2520to%2520model%2520short-range%2520interactions%2520w {"title": "GenOL: Generating Diverse Examples for Name-only Online Learning", "author": "Minhyuk Seo and Seongwon Cho and Minjae Lee and Diganta Misra and Hyeonbeom Choi and Seon Joo Kim and Jonghyun Choi", "abstract": "Online learning methods often rely on supervised data. However, under data distribution shifts, such as in continual learning (CL), where continuously arriving online data streams incorporate new concepts (e.g., classes), real-time manual annotation is impractical due to its costs and latency, which hinder real-time adaptation. To alleviate this, 'name-only' setup has been proposed, requiring only the name of concepts, not the supervised samples. A recent approach tackles this setup by supplementing data with web-scraped images, but such data often suffers from issues of data imbalance, noise, and copyright. To overcome the limitations of both human supervision and webly supervision, we propose GenOL using generative models for name-only training. But naive application of generative models results in limited diversity of generated data. Here, we enhance (i) intra-diversity, the diversity of images generated by a single model, by proposing a diverse prompt generation method that generates diverse text prompts for text-to-image models, and (ii) inter-diversity, the diversity of images generated by multiple generative models, by introducing an ensemble strategy that selects minimally overlapping samples. We empirically validate that the proposed \\frameworkname outperforms prior arts, even a model trained with fully supervised data by large margins, in various tasks, including image recognition and multi-modal visual reasoning.", "link": "http://arxiv.org/abs/2403.10853v4", "date": "2026-03-31", "relevancy": 2.4346, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6276}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.or %29%20inter-diversity%2C%20the%20diversity%20of%20images%20generated%20by%20multiple%20generative%20models%2C%20by%20introducing%20an%20ensemble%20strategy%20that%20selects%20minimally%20overlapping%20samples.%20We%20empirically%20validate%20that%20the%20proposed%20%5Cframeworkname%20outperforms%20prior%20arts%2C%20even%20a%20model%20trained%20with%20fully%20supervised%20data%20by%20large%20margins%2C%20in%20various%20tasks%2C%20including%20image%20recognition%20and%20multi-modal%20visual%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2403.10853v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenOL%253A%2520Generating%2520Diverse%2520Examples%2520for%2520Name-only%2520Online%2520Learning%26entry.906535625%3DMinhyuk%2520Seo%2520and%2520Seongwon%2520Cho%2520and%2520Minjae%2520Lee%2520and%2520Diganta%2520Misra%2520and%2520Hyeonbeom%2520Choi%2520and%2520Seon%2520Joo%2520Kim%2520and%2520Jonghyun%2520Choi%26entry.1292438233%3DOnline%2520learning%2520methods%2520often%2520rely%2520on%2520supervised%2520data.%2520However%252C%2520under%2520data%2520distribution%2520shifts%252C%2520such%2520as%2520in%2520continual%2520learning%2520%2528CL%2529%252C%2520where%2520continuously%2520arriving%2520online%2520data%2520streams%2520incorporate%2520new%2520concepts%2520%2528e.g.%252C%2520classes%2529%252C%2520real-time%2520manual%2520annotation%2520is%2520impractical%2520due%2520to%2520its%2520costs%2520and%2520latency%252C%2520which%2520hinder%2520real-time%2520adaptation.%2520To%2520alleviate%2520this%252C%2520%2527name-only%2527%2520setup%2520has%2520been%2520proposed%252C%2520requiring%2520only%2520the%2520name%2520of%2520concepts%252C%2520not%2520the%2520supervised%2520samples.%2520A%2520recent%2520approach%2520tackles%2520this%2520setup%2520by%2520supplementing%2520data%2520with%2520web-scraped%2520images%252C%2520but%2520such%2520data%2520often%2520suffers%2520from%2520issues%2520of%2520da {"title": "Video-Oasis: Rethinking Evaluation of Video Understanding", "author": "Geuntaek Lim and Minho Shim and Sungjune Park and Jaeyun Lee and Inwoong Lee and Taeoh Kim and Dongyoon Wee and Yukyung Choi", "abstract": "The inherent complexity of video understanding makes it difficult to attribute whether performance gains stem from visual perception, linguistic reasoning, or knowledge priors. While many benchmarks have emerged to assess high-level reasoning, the essential criteria that constitute video understanding remain largely overlooked. Instead of introducing yet another benchmark, we take a step back to re-examine the current landscape of video understanding. In this work, we provide Video-Oasis, a sustainable diagnostic suite designed to systematically evaluate existing evaluations and distill spatio-temporal challenges for video understanding. Our analysis reveals two critical findings: (1) 54% of existing benchmark samples are solvable without visual input or temporal context, and (2) on the remaining samples, state-of-the-art models exhibit performance barely exceeding random guessing. To bridge this gap, we investigate which algorithmic design choices contribute to robust video understanding, providing practical guidelines for future research. We hope our work serves as a standard guideline for benchmark construction and the rigorous evaluation of architecture development. Code is available at https://github.com/sejong-rcv/Video-Oasis.", "link": "http://arxiv.org/abs/2603.29616v1", "date": "2026-03-31", "relevancy": 2.4198, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6165}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6165}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/a 20Code%20is%20available%20at%20https%3A//github.com/sejong-rcv/Video-Oasis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29616v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideo-Oasis%253A%2520Rethinking%2520Evaluation%2520of%2520Video%2520Understanding%26entry.906535625%3DGeuntaek%2520Lim%2520and%2520Minho%2520Shim%2520and%2520Sungjune%2520Park%2520and%2520Jaeyun%2520Lee%2520and%2520Inwoong%2520Lee%2520and%2520Taeoh%2520Kim%2520and%2520Dongyoon%2520Wee%2520and%2520Yukyung%2520Choi%26entry.1292438233%3DThe%2520inherent%2520complexity%2520of%2520video%2520understanding%2520makes%2520it%2520difficult%2520to%2520attribute%2520whether%2520performance%2520gains%2520stem%2520from%2520visual%2520perception%252C%2520linguistic%2520reasoning%252C%2520or%2520knowledge%2520priors.%2520While%2520many%2520benchmarks%2520have%2520emerged%2520to%2520assess%2520high-level%2520reasoning%252C%2520the%2520essential%2520criteria%2520that%2520constitute%2520video%2520understanding%2520remain%2520largely%2520overlooked.%2520Instead%2520of%2520introducing%2520yet%2520another%2520benchmark%252C%2520we%2520take%2520a%2520step%2520back%2520to%2520re-examine%2520the%2520current%2520landscape%2520of%2520video%2520understanding.%2520In%2520this%2520work%252C%2520we%2520provide%2520Video-Oasis%252C%2520a%2520sustainable%2520diagnostic%2520suite%2520designed%2520to%2520systematically%2520evaluate%2520existing%2520evaluations%2520and%2520distill%2520spatio-temporal%2520challenges%2520for%2520video%2520understanding.%2520Our%2520analysis%2520reveals%2520two%2520critical%2520findings%253A%2520%25281%2529%252054%2525%2520of%2520existing%2520benchmark%2520samples%2520are%2520solvable%2520without%2520visual%2520input%2520or%2520temporal%2520context%252C%2520and%2520%25282%2529%2520on%2520the%2520remaining%2520samples%252C%2520state-of-the-art%2520models%2520exhibit%2520performance%2520barely%2520exceeding%2520random% {"title": "Unify-Agent: A Unified Multimodal Agent for World-Grounded Image Synthesis", "author": "Shuang Chen and Quanxin Shou and Hangting Chen and Yucheng Zhou and Kaituo Feng and Wenbo Hu and Yi-Fan Zhang and Yunlong Lin and Wenxuan Huang and Mingyang Song and Dasen Dai and Bolin Jiang and Manyuan Zhang and Shi-Xue Zhang and Zhengkai Jiang and Lucas Wang and Zhao Zhong and Yu Cheng and Nanyun Peng", "abstract": "Unified multimodal models provide a natural and promising architecture for understanding diverse and complex real-world knowledge while generating high-quality images. However, they still rely primarily on frozen parametric knowledge, which makes them struggle with real-world image generation involving long-tail and knowledge-intensive concepts. Inspired by the broad success of agents on real-world tasks, we explore agentic modeling to address this limitation. Specifically, we present Unify-Agent, a unified multimodal agent for world-grounded image synthesis, which reframes image generation as an agentic pipeline consisting of prompt understanding, multimodal evidence searching, grounded recaptioning, and final synthesis. To train our model, we construct a tailored multimodal data pipeline and curate 143K high-quality agent trajectories for world-grounded image synthesis, enabling effective supervision over the full agentic generation process. We further introduce FactIP, a benchmark covering 12 categories of culturally significant and long-tail factual concepts that explicitly requires external knowledge grounding. Extensive experiments show that our proposed Unify-Agent substantially improves over its base unified model across diverse benchmarks and real world generation tasks, while approaching the world knowledge capabilities of the strongest closed-source models. As an early exploration of agent-based modeling for world-grounded image synthesis, our work highlights the value of tightly coupling reasoning, searching, and generation for reliable open-world agentic image synthesis.", "link": "http://arxiv.org/abs/2603.29620v1", "date": "2026-03-31", "relevancy": 2.4168, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6303}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6019}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unify-Agent%3A%20A%20Unified%20Multimodal%20Agent%20for%20World-Grounded%20Image%20Synthesis&body=Title%3A%20Unify-Agent%3A%20A%20Unified%20Multimodal%20Agent%20for%20World-Grounded%20Image%20Synthesis%0AAuthor%3A%20Shuang%20Chen%20and%20Quanxin%20Shou%20and%20Hangting%20Chen%20and%20Yucheng%20Zhou%20and%20Kaituo%20Feng%20and%20Wenbo%20Hu%20and%20Yi-Fan%20Zhang%20and%20Yunlong%20Lin%20and%20Wenxuan%20Huang%20and%20Mingyang%20Song%20and%20Dasen%20Dai%20and%20Bolin%20Jiang%20and%20Manyuan%20Zhang%20and%20Shi-Xue%20Zhang%20and%20Zhengkai%20Jiang%20and%20Lucas%20Wang%20and%20Zhao%20Zhong%20and%20Yu%20Cheng%20and%20Nanyun%20Peng%0AAbstract%3A%20Unified%20multimodal%20models%20provide%20a%20natural%20and%20promising%20architecture%20for%20understanding%20diverse%20and%20complex%20real-world%20knowledge%20while%20generating%20high-quality%20images.%20However%2C%20they%20still%20rely%20primarily%20on%20frozen%20parametric%20knowledge%2C%20which%20makes%20them%20struggle%20with%20real-world%20image%20generation%20involving%20long-tail%20and%20knowledge-intensive%20concepts.%20Inspired%20by%20the%20broad%20success%20of%20agents%20on%20real-world%20tasks%2C%20we%20explore%20agentic%20modeling%20to%20address%20this%20limitation.%20Specifically%2C%20we%20present%20Unify-Agent%2C%20a%20unified%20multimodal%20agent%20for%20world-grounded%20image%20synthesis%2C%20which%20reframes%20image%20generation%20as% {"title": "ShapE-GRPO: Shapley-Enhanced Reward Allocation for Multi-Candidate LLM Training", "author": "Rui Ai and Yu Pan and David Simchi-Levi and Chonghuan Wang", "abstract": "In user-agent interaction scenarios such as recommendation, brainstorming, and code suggestion, Large Language Models (LLMs) often generate sets of candidate recommendations where the objective is to maximize the collective utility of the entire set rather than individual candidates independently. However, existing reinforcement learning post-training paradigms, such as Group Relative Policy Optimization (GRPO), typically assign the same set-level scalar reward to every candidate in the set. This leads to noisy training signals where poor candidates free-ride on the high reward produced by a single strong peer, resulting in suboptimal exploration. To address this, we propose Shapley-Enhanced GRPO (ShapE-GRPO). By leveraging the permutation-invariant nature of set-level utility, we derive a Shapley-enhanced formulation from cooperative game theory to decompose set-level rewards into granular, candidate-specific signals. We show that our formulation preserves the fundamental axioms of the Shapley value while remaining computationally efficient with polynomial-time complexity. Empirically, ShapE-GRPO consistently outperforms standard GRPO across diverse datasets with accelerated convergence during training.", "link": "http://arxiv.org/abs/2603.29871v1", "date": "2026-03-31", "relevancy": 2.4129, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4895}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4844}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4738}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ShapE-GRPO%3A%20Shapley-Enhanced%20Reward%20Allocation%20for%20Multi-Candidate%20LLM%20Training&body=Title%3A%20ShapE-GRPO%3A%20Shapley-Enhanced%20Reward%20Allocation%20for%20Multi-Candidate%20LLM%20Training%0AAuthor%3A%20Rui%20Ai%20and%20Yu%20Pan%20and%20David%20Simchi-Levi%20and%20Chonghuan%20Wang%0AAbstract%3A%20In%20user-agent%20interaction%20scenarios%20such%20as%20recommendation%2C%20brainstorming%2C%20and%20code%20suggestion%2C%20Large%20Language%20Models%20%28LLMs%29%20often%20generate%20sets%20of%20candidate%20recommendations%20where%20the%20objective%20is%20to%20maximize%20the%20collective%20utility%20of%20the%20entire%20set%20rather%20than%20individual%20candidates%20independently.%20However%2C%20existing%20reinforcement%20learning%20post-training%20paradigms%2C%20such%20as%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%2C%20typically%20assign%20the%20same%20set-level%20scalar%20reward%20to%20every%20candidate%20in%20the%20set.%20This%20leads%20to%20noisy%20training%20signals%20where%20poor%20candidates%20free-ride%20on%20the%20high%20reward%20produced%20by%20a%20single%20strong%20peer%2C%20resulting%20in%20suboptimal%20exploration.%20To%20address%20this%2C%20we%20propose%20Shapley-Enhanced%20GRPO%20%28ShapE-GRPO%29.%20By%20leveraging%20the%20permutation-invariant%20nature%20of%20set-level%20utility%2C%20we%20derive%20a%20Shapley-enhanced%20formulation%20from%20cooperative%20game%20theory%20to%20decompose%20set-level%20rewards%20into%20granular%2C%20candidate-specific%20signals.%20We%20show%20that%20our%20formulation%20preserves%20the%20fundamental%20axioms%20of%20the%20Shapley%20value%20while%20remaining%20computationally%20efficient%20with%20polynomial-time%20complexity.%20Empirically%2C%20ShapE-GRPO%20consistently%20outperforms%20standard%20GRPO%20across%20diverse%20datasets%20with%20accelerated%20convergence%20during%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29871v1%0AForm%3A%20https%3A {"title": "Gloria: Consistent Character Video Generation via Content Anchors", "author": "Yuhang Yang and Fan Zhang and Huaijin Pi and Shuai Guo and Guowei Xu and Wei Zhai and Yang Cao and Zheng-Jun Zha", "abstract": "Digital characters are central to modern media, yet generating character videos with long-duration, consistent multi-view appearance and expressive identity remains challenging. Existing approaches either provide insufficient context to preserve identity or leverage non-character-centric information as the memory, leading to suboptimal consistency. Recognizing that character video generation inherently resembles an outside-looking-in scenario. In this work, we propose representing the character visual attributes through a compact set of anchor frames. This design provides stable references for consistency, while reference-based video generation inherently faces challenges of copy-pasting and multi-reference conflicts. To address these, we introduce two mechanisms: Superset Content Anchoring, providing intra- and extra-training clip cues to prevent duplication, and RoPE as Weak Condition, encoding positional offsets to distinguish multiple anchors. Furthermore, we construct a scalable pipeline to extract these anchors from massive videos. Experiments show our method generates high-quality character videos exceeding 10 minutes, and achieves expressive identity and appearance consistency across views, surpassing existing methods.", "link": "http://arxiv.org/abs/2603.29931v1", "date": "2026-03-31", "relevancy": 2.4065, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6131}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6002}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5767}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gloria%3A%20Consistent%20Character%20Video%20Generation%20via%20Content%20Anchors&body=Title%3A%20Gloria%3A%20Consistent%20Character%20Video%20Generation%20via%20Content%20Anchors%0AAuthor%3A%20Yuhang%20Yang%20and%20Fan%20Zhang%20and%20Huaijin%20Pi%20and%20Shuai%20Guo%20and%20Guowei%20Xu%20and%20Wei%20Zhai%20and%20Yang%20Cao%20and%20Zheng-Jun%20Zha%0AAbstract%3A%20Digital%20characters%20are%20central%20to%20modern%20media%2C%20yet%20generating%20character%20videos%20with%20long-duration%2C%20consistent%20multi-view%20appearance%20and%20expressive%20identity%20remains%20challenging.%20Existing%20approaches%20either%20provide%20insufficient%20context%20to%20preserve%20identity%20or%20leverage%20non-character-centric%20information%20as%20the%20memory%2C%20leading%20to%20suboptimal%20consistency.%20Recognizing%20that%20character%20video%20generation%20inherently%20resembles%20an%20outside-looking-in%20scenario.%20In%20this%20work%2C%20we%20propose%20representing%20the%20character%20visual%20attributes%20through%20a%20compact%20set%20of%20anchor%20frames.%20This%20design%20provides%20stable%20references%20for%20consistency%2C%20while%20reference-based%20video%20generation%20inherently%20faces%20challenges%20of%20copy-pasting%20and%20multi-reference%20conflicts.%20To%20address%20these%2C%20we%20introduce%20two%20mechanisms%3A%20Superset%20Content%20Anchoring%2C%20providing%20intra-%20and%20extra-training%20clip%20cues%20to%20prevent%20duplication%2C%20and%20RoPE%20as%20Weak%20Condition%2C%20encoding%20positional%20offsets%20to%20distinguish%20multiple%20anchors.%20Furthermore%2C%20we%20construct%20a%20scalable%20pipeline%20to%20extract%20these%20anchors%20from%20massive%20videos.%20Experiments%20show%20our%20method%20generates%20high-quality%20character%20videos%20exceeding%2010%20minutes%2C%20and%20achieves%20expressive%20identity%20and%20appearance%20consistency%20across%20views%2C%20surpassing%20existing%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29931v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGloria%253A%2520Consistent%2520Character%2520Video%2520Generation%2520via%2520Content%2520Anchors%26entry.906535625%3DYuhang%2520Yang%2520and%2520Fan%2520Zhang%2520and%2520Huaijin%2520Pi%2520and%2520Shuai%2520Guo%2520and%2520Guowei%2520Xu%2520and%2520Wei%2520Zhai%2520and%2520Yang%2520Cao%2520and%2520Zheng-Jun%2520Zha%26entry.1292438233%3DDigital%2520characters%2520are%2520central%2520to%2520modern%2520media%252C%2520yet%2520generating%2520character%2520videos%2520with%2520long-duration%252C%2520consistent%2520multi-view%2520appearance%2520and%2520expressive%2520identity%2520remains%2520challenging.%2520Existing%2520approaches%2520either%2520provide%2520insufficient%2520context%2520to%2520preserve%2520identity%2520or%2520leverage%2520non-character-centric%2520information%2520as%2520the%2520memory%252C%2520leading%2520to%2520suboptimal%2520consistency.%2520Recognizing%2520that%2520character%2520video%2520generation%2520inherently%2520resembles%2520an%2520outside-looking-in%2520scenario.%2520In%2520this%2520work%252C%2520we%2520propose%2520representing%2520the%2520character%2520visual%2520attributes%2520through%2520a%2520compact%2520set%2520of%2520anchor%2520frames.%2520This%2520design%2520provides%2520stable%2520references%2520for%2520consistency%252C%2520while%2520reference-based%2520video%2520generation%2520inherently%2520faces%2520challenges%2520of%2520copy-pasting%2520and%2520multi-reference%2520conflicts.%2520To%2520address%2520these%252C%2520we%2520introduce%2520two%2520mechanisms%253A%2520Superset%2520Content%2520Anchoring%252C%2520providing%2520intra-%2520and%2520extra-training%2520clip%2520cues%2520to%2520prevent%2520duplication%252C%2520and%2520RoPE%2520as%2520Weak%2520Condition%252C%2520encoding%2520positional%2520offsets%2520to%2520distinguish%2520multiple%2520anchors.%2520Furthermore%252C%2520we%2520construct%2520a%2520scalable%2520pipeline%2520to%2520extract%2520these%2520anchors%2520from%2520massive%2520videos.%2520Experiments%2520show%2520our%2520method%2520generates%2520high-quality%2520character%2520videos%2520exceeding%252010%2520minutes%252C%2520and%2520achieves%2520expressive%2520identity%2520and%2520appearance%2520consistency%2520across%2520views%252C%2520surpassing%2520existing%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29931v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Gloria%3A%20Consistent%20Character%20Video%20Generation%20via%20Content%20Anchors&entry.906535625=Yuhang%20Yang%20and%20Fan%20Zhang%20and%20Huaijin%20Pi%20and%20Shuai%20Guo%20and%20Guowei%20Xu%20and%20Wei%20Zhai%20and%20Yang%20Cao%20and%20Zheng-Jun%20Zha&entry.1292438233=Digital%20characters%20are%20central%20to%20modern%20media%2C%20yet%20generating%20character%20videos%20with%20long-duration%2C%20consistent%20multi-view%20appearance%20and%20expressive%20identity%20remains%20challenging.%20Existing%20approaches%20either%20provide%20insufficient%20context%20to%20preserve%20identity%20or%20leverage%20non-character-centric%20information%20as%20the%20memory%2C%20leading%20to%20suboptimal%20consistency.%20Recognizing%20that%20character%20video%20generation%20inherently%20resembles%20an%20outside-looking-in%20scenario.%20In%20this%20work%2C%20we%20propose%20representing%20the%20character%20visual%20attributes%20through%20a%20compact%20set%20of%20anchor%20frames.%20This%20design%20provides%20stable%20references%20for%20consistency%2C%20while%20reference-based%20video%20generation%20inherently%20faces%20challenges%20of%20copy-pasting%20and%20multi-reference%20conflicts.%20To%20address%20these%2C%20we%20introduce%20two%20mechanisms%3A%20Superset%20Content%20Anchoring%2C%20providing%20intra-%20and%20e {"title": "SleepVLM: Explainable and Rule-Grounded Sleep Staging via a Vision-Language Model", "author": "Guifeng Deng and Pan Wang and Jiquan Wang and Shuying Rao and Junyi Xie and Wanjun Guo and Tao Li and Haiteng Jiang", "abstract": "While automated sleep staging has achieved expert-level accuracy, its clinical adoption is hindered by a lack of auditable reasoning. We introduce SleepVLM, a rule-grounded vision-language model (VLM) designed to stage sleep from multi-channel polysomnography (PSG) waveform images while generating clinician-readable rationales based on American Academy of Sleep Medicine (AASM) scoring criteria. Utilizing waveform-perceptual pre-training and rule-grounded supervised fine-tuning, SleepVLM achieved Cohen's kappa scores of 0.767 on an held out test set (MASS-SS1) and 0.743 on an external cohort (ZUAMHCS), matching state-of-the-art performance. Expert evaluations further validated the quality of the model's reasoning, with mean scores exceeding 4.0/5.0 for factual accuracy, evidence comprehensiveness, and logical coherence. By coupling competitive performance with transparent, rule-based explanations, SleepVLM may improve the trustworthiness and auditability of automated sleep staging in clinical workflows. To facilitate further research in interpretable sleep medicine, we release MASS-EX, a novel expert-annotated dataset.", "link": "http://arxiv.org/abs/2603.26738v2", "date": "2026-03-31", "relevancy": 2.4059, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4872}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4872}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4691}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5 {"title": "Streaming 4D Visual Geometry Transformer", "author": "Dong Zhuo and Wenzhao Zheng and Jiahe Guo and Yuqi Wu and Jie Zhou and Jiwen Lu", "abstract": "Perceiving and reconstructing 3D geometry from videos is a fundamental yet challenging computer vision task. To facilitate interactive and low-latency applications, we propose a streaming visual geometry transformer that shares a similar philosophy with autoregressive large language models. We explore a simple and efficient design and employ a causal transformer architecture to process the input sequence in an online manner. We use temporal causal attention and cache the historical keys and values as implicit memory to enable efficient streaming long-term 3D reconstruction. This design can handle low-latency 3D reconstruction by incrementally integrating historical information while maintaining high-quality spatial consistency. For efficient training, we propose to distill knowledge from the dense bidirectional visual geometry grounded transformer (VGGT) to our causal model. For inference, our model supports the migration of optimized efficient attention operators (e.g., FlashAttention) from large language models. Extensive experiments on various 3D geometry perception benchmarks demonstrate that our model enhances inference speed in online scenarios while maintaining competitive performance, thereby facilitating scalable and interactive 3D vision systems. Code is available at: https://github.com/wzzheng/StreamVGGT.", "link": "http://arxiv.org/abs/2507.11539v2", "date": "2026-03-31", "relevancy": 2.3954, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6064}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5973}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformer %203D%20vision%20systems.%20Code%20is%20available%20at%3A%20https%3A//github.com/wzzheng/StreamVGGT.%0ALink%3A%20http%3A//arxiv.org/abs/2507.11539v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStreaming%25204D%2520Visual%2520Geometry%2520Transformer%26entry.906535625%3DDong%2520Zhuo%2520and%2520Wenzhao%2520Zheng%2520and%2520Jiahe%2520Guo%2520and%2520Yuqi%2520Wu%2520and%2520Jie%2520Zhou%2520and%2520Jiwen%2520Lu%26entry.1292438233%3DPerceiving%2520and%2520reconstructing%25203D%2520geometry%2520from%2520videos%2520is%2520a%2520fundamental%2520yet%2520challenging%2520computer%2520vision%2520task.%2520To%2520facilitate%2520interactive%2520and%2520low-latency%2520applications%252C%2520we%2520propose%2520a%2520streaming%2520visual%2520geometry%2520transformer%2520that%2520shares%2520a%2520similar%2520philosophy%2520with%2520autoregressive%2520large%2520language%2520models.%2520We%2520explore%2520a%2520simple%2520and%2520efficient%2520design%2520and%2520employ%2520a%2520causal%2520transformer%2520architecture%2520to%2520process%2520the%2520input%2520sequence%2520in%2520an%2520online%2520manner.%2520We%2520use%2520temporal%2520causal%2520attention%2520and%2520cache%2520the%2520historical%2520keys%2520and%2520values%2520as%2520implicit%2520memory%2520to%2520enable%2520efficient%2520streaming%2520long-term%25203D%2520reconstruction.%2520This%2520design%2520can%2520handle%2520low-latency%25203D%2520reconstruction%2520by%2520incrementally%2520integrating%2520historical%2520information%2520while%2520maintaining%2520high-quality%2520spatial%2520consistency.%2520For%2520efficient%2520training%252C%2520we%2520propose%2520to%2520distill%2520knowledge%2520from%2520the%2520dense%2520bidirectional%2520visual%2520geometry%2520grounded%2520transformer%2520%2528VGGT%2529%2520to%2520our%2520causal%2520model.%2520For%2520inference%252C%2520our%2520model%2520supports%2520the%2520migration%2520of%2520optimized%2520efficient%2520attention%2520operators%2520%2528e.g.%252C%2520FlashAttention%2529%2520from%2520large%2520language%2520models.%2520Extensive%2520experiments%2520on%2520various%25203D%2520geometry%2520perception%2520benchmarks%2520demonstrate%2520that%2520our%2520model%2520enhances%2520inference%2520speed%2520in%2520online%2520scenarios%2520while%2520maintaining%2520competitive%2520performance%252C%2520thereby%2520facilitating%2520scalable%2520and%2520interactive%25203D%2520vision%2520systems.%2520Code%2520is%2520available%2520at%253A%2520https%253A//github.com/wzzheng/StreamVGGT.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.11539v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Streaming%204D%20Visual%20Geometry%20Transformer&entry.906535625=Dong%20Zhuo%20and%20Wenzhao%20Zheng%20and%20Jiahe%20Guo%20and%20Yuqi%20Wu%20and%20Jie%20Zhou%20and%20Jiwen%20Lu&entry.1292438233=Perceiving%20and%20reconstructing%203D%20geometry%20from%20videos%20is%20a%20fundamental%20yet%20challenging%20computer%20vision%20task.%20To%20facilitate%20interactive%20and%20low-latency%20applications%2C%20we%20propose%20a%20streaming%20visual%20geometry%20transformer%20that%20shares%20a%20similar%20philosophy%20with%20autoregressive%20large%20language%20models.%20We%20explore%20a%20simple%20and%20efficient%20design%20and%20employ%20a%20causal%20transformer%20architecture%20to%20process%20the%20input%20sequence%20in%20an%20online%20manner.%20We%20use%20temporal%20causal%20attention%20and%20cache%20the%20historical%20keys%20and%20values%20as%20implicit%20memory%20to%20enable%20efficient%20streaming%20long-term%203D%20reconstruction.%20This%20design%20can%20handle%20low-latency%203D%20reconstruction%20by%20incrementally%20integrating%20historical%20information%20while%20maintaining%20high-quality%20spatial%20consistency.%20For%20efficient%20training%2C%20we%20propose%20to%20distill% {"title": "Aligned, Orthogonal or In-conflict: When can we safely optimize Chain-of-Thought?", "author": "Max Kaufmann and David Lindner and Roland S. Zimmermann and and Rohin Shah", "abstract": "Chain-of-Thought (CoT) monitoring, in which automated systems monitor the CoT of an LLM, is a promising approach for effectively overseeing AI systems. However, the extent to which a model's CoT helps us oversee the model - the monitorability of the CoT - can be affected by training, for instance by the model learning to hide important features of its reasoning. We propose and empirically validate a conceptual framework for predicting when and why this occurs. We model LLM post-training as an RL environment where the reward decomposes into two terms: one term depending on final outputs and another term depending on the CoT. Our framework allows us to classify these two terms as \"aligned\", \"orthogonal\", or \"in-conflict\" before training. We predict that training with in-conflict terms will reduce monitorability, orthogonal terms will not affect it, and aligned terms will improve it. To validate our framework, we use it to classify a set of RL environments, train LLMs within those environments, and evaluate how training affects CoT monitorability. We find that (1) training with \"in-conflict\" reward terms reduces CoT monitorability and (2) optimizing in-conflict reward terms is difficult.", "link": "http://arxiv.org/abs/2603.30036v1", "date": "2026-03-31", "relevancy": 2.3878, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5079}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4624}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4624}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Aligned%2C%20Orthogonal%20or%20In-conflict%3A%20When%20can%20we%20safely%20optimize%20Chain-of-Thought%3F&body=Title%3A%20Aligned%2C%20Orthogonal%20or%20In-conflict%3A%20When%20can%20we%20safely%20optimize%20Chain-of-Thought%3F%0AAuthor%3A%20Max%20Kaufmann%20and%20David%20Lindner%20and%20Roland%20S.%20Zimmermann%20and%20and%20Rohin%20Shah%0AAbstract%3A%20Chain-of-Thought%20%28CoT%29%20monitoring%2C%20in%20which%20automated%20systems%20monitor%20the%20CoT%20of%20an%20LLM%2C%20is%20a%20promising%20approach%20for%20effectively%20overseeing%20AI%20systems.%20However%2C%20the%20extent%20to%20which%20a%20model%27s%20CoT%20helps%20us%20oversee%20the%20model%20-%20the%20monitorability%20of%20the%20CoT%20-%20can%20be%20affected%20by%20training%2C%20for%20instance%20by%20the%20model%20learning%20to%20hide%20important%20features%20of%20its%20reasoning.%20We%20propose%20and%20empirically%20validate%20a%20conceptual%20framework%20for%20predicting%20when%20and%20why%20this%20occurs.%20We%20model%20LLM%20post-training%20as%20an%20RL%20environment%20where%20the%20reward%20decomposes%20into%20two%20terms%3A%20one%20term%20depending%20on%20final%20outputs%20and%20another%20term%20depending%20on%20the%20CoT.%20Our%20framework%20allows%20us%20to%20classify%20these%20two%20terms%20as%20%22aligned%22%2C%20%22orthogonal%22%2C%20or%20%22in-conflict%22%20before%20training.%20We%20predict%20that%20training%20with%20in-conflict%20terms%20will%20reduce%20monitorability%2C%20orthogonal%20terms%20will%20not%20affect%20it%2C%20and%20aligned%20terms%20will%20improve%20it.%20To%20validate%20our%20framework%2C%20we%20use%20it%20to%20classify%20a%20set%20of%20RL%20environments%2C%20train%20LLMs%20within%20those%20environments%2C%20and%20evaluate%20how%20training%20affects%20CoT%20monitorability.%20We%20find%20that%20%281%29%20training%20with%20%22in-conflict%22%20reward%20terms%20reduces%20CoT%20monitorability%20and%20%282%29%20optimizing%20in-conflict%20reward%20terms%20is%20difficult.%0ALink%3A%20http%3A//arxiv.org/abs/2603.30036v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAligned%252C%2520Orthogonal%2520or%2520In-conflict%253A%2520When%2520can%2520we%2520safely%2520optimize%2520Chain-of-Thought%253F%26entry.906535625%3DMax%2520Kaufmann%2520and%2520David%2520Lindner%2520and%2520Roland%2520S.%2520Zimmermann%2520and%2520and%2520Rohin%2520Shah%26entry.1292438233%3DChain-of-Thought%2520%2528CoT%2529%2520monitoring%252C%2520in%2520which%2520automated%2520systems%2520monitor%2520the%2520CoT%2520of%2520an%2520LLM%252C%2520is%2520a%2520promising%2520approach%2520for%2520effectively%2520overseeing%2520AI%2520systems.%2520However%252C%2520the%2520extent%2520to%2520which%2520a%2520model%2527s%2520CoT%2520helps%2520us%2520oversee%2520the%2520model%2520-%2520the%2520monitorability%2520of%2520the%2520CoT%2520-%2520can%2520be%2520affected%2520by%2520training%252C%2520for%2520instance%2520by%2520the%2520model%2520learning%2520to%2520hide%2520important%2520features%2520of%2520its%2520reasoning.%2520We%2520propose%2520and%2520empirically%2520validate%2520a%2520conceptual%2520framework%2520for%2520predicting%2520when%2520and%2520why%2520this%2520occurs.%2520We%2520model%2520LLM%2520post-training%2520as%2520an%2520RL%2520environment%2520where%2520the%2520reward%2520decomposes%2520into%2520two%2520terms%253A%2520one%2520term%2520depending%2520on%2520final%2520outputs%2520and%2520another%2520term%2520depending%2520on%2520the%2520CoT.%2520Our%2520framework%2520allows%2520us%2520to%2520classify%2520these%2520two%2520terms%2520as%2520%2522aligned%2522%252C%2520%2522orthogonal%2522%252C%2520or%2520%2522in-conflict%2522%2520before%2520training.%2520We%2520predict%2520that%2520training%2520with%2520in-conflict%2520terms%2520will%2520reduce%2520monitorability%252C%2520orthogonal%2520terms%2520will%2520not%2520affect%2520it%252C%2520and%2520aligned%2520terms%2520will%2520improve%2520it.%2520To%2520validate%2520our%2520framework%252C%2520we%2520use%2520it%2520to%2520classify%2520a%2520set%2520of%2520RL%2520environments%252C%2520train%2520LLMs%2520within%2520those%2520environments%252C%2520and%2520evaluate%2520how%2520training%2520affects%2520CoT%2520monitorability.%2520We%2520find%2520that%2520%25281%2529%2520training%2520with%2520%2522in-conflict%2522%2520reward%2520terms%2520reduces%2520CoT%2520monitorability%2520and%2520%25282%2529%2520optimizing%2520in-conflict%2520reward%2520terms%2520is%2520difficult.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.30036v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Aligned%2C%20Orthogonal%20or%20In-conflict%3A%20When%20can%20we%20safely%20optimize%20Chain-of-Thought%3F&entry.906535625=Max%20Kaufmann%20and%20David%20Lindner%20and%20Roland%20S.%20Zimmermann%20and%20and%20Rohin%20Shah&entry.1292438233=Chain-of-Thought%20%28CoT%29%20monitoring%2C%20in%20which%20automated%20systems%20monitor%20the%20CoT%20of%20an%20LLM%2C%20is%20a%20promising%20approach%20for%20effectively%20overseeing%20AI%20systems.%20However%2C%20the%20extent%20to%20which%20a%20model%27s%20CoT%20helps%20us%20oversee%20the%20model%20-%20the%20monitorability%20of%20the%20CoT%20-%20can%20be%20affected%20by%20training%2C%20for%20instance%20by%20the%20model%20learning%20to%20hide%20important%20features%20of%20its%20reasoning.%20We%20propose%20and%20empirically%20validate%20a%20conceptual%20framework%20for%20predicting%20when%20and%20why%20this%20occurs.%20We%20model%20LLM%20post-training%20as%20an%20RL%20environment%20where%20the%20reward%20decomposes%20into%20two%20terms%3A%20one%20term%20depending%20on%20final%20outputs%20and%20another%20term%20depending%20on%20the%20CoT.%20Our%20framework%20allows%20us%20to%20classify%20these%20two%20terms%20as%20%22aligned%22%2C%20%22orthogonal%22%2C%20or%20%22in-con {"title": "Task Scarcity and Label Leakage in Relational Transfer Learning", "author": "Francisco Galuppo Azevedo and Clarissa Lima Loures and Denis Oliveira Correa", "abstract": "Training relational foundation models requires learning representations that transfer across tasks, yet available supervision is typically limited to a small number of prediction targets per database. This task scarcity causes learned representations to encode task-specific shortcuts that degrade transfer even within the same schema, a problem we call label leakage. We study this using K-Space, a modular architecture combining frozen pretrained tabular encoders with a lightweight message-passing core. To suppress leakage, we introduce a gradient projection method that removes label-predictive directions from representation updates. On RelBench, this improves within-dataset transfer by +0.145 AUROC on average, often recovering near single-task performance. Our results suggest that limited task diversity, not just limited data, constrains relational foundation models.", "link": "http://arxiv.org/abs/2603.29914v1", "date": "2026-03-31", "relevancy": 2.3841, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4973}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4666}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4666}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Task%20Scarcity%20and%20Label%20Leakage%20in%20Relational%20Transfer%20Learning&body=Title%3A%20Task%20Scarcity%20and%20Label%20Leakage%20in%20Relational%20Transfer%20Learning%0AAuthor%3A%20Francisco%20Galuppo%20Azevedo%20and%20Clarissa%20Lima%20Loures%20and%20Denis%20Oliveira%20Correa%0AAbstract%3A at%2520degrade%2520transfer%2520even%2520within%2520the%2520same%2520schema%252C%2520a%2520problem%2520we%2520call%2520label%2520leakage.%2520We%2520study%2520this%2520using%2520K-Space%252C%2520a%2520modular%2520architecture%2520combining%2520frozen%2520pretrained%2520tabular%2520encoders%2520with%2520a%2520lightweight%2520message-passing%2520core.%2520To%2520suppress%2520leakage%252C%2520we%2520introduce%2520a%2520gradient%2520projection%2520method%2520that%2520removes%2520label-predictive%2520directions%2520from%2520representation%2520updates.%2520On%2520RelBench%252C%2520this%2520improves%2520within-dataset%2520transfer%2520by%2520%252B0.145%2520AUROC%2520on%2520average%252C%2520often%2520recovering%2520near%2520single-task%2520performance.%2520Our%2520results%2520suggest%2520that%2520limited%2520task%2520diversity%252C%2520not%2520just%2520limited%2520data%252C%2520constrains%2520relational%2520foundation%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29914v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Task%20Scarcity%20and%20Label%20Leakage%20in%20Relational%20Transfer%20Learning&entry.906535625=Francisco%20Galuppo%20Azevedo%20and%20Clarissa%20Lima%20Loures%20and%20Denis%20Oliveira%20Correa&entry.1292438233=Training%20relational%20foundation%20models%20requires%20learning%20representations%20that%20transfer%20across%20tasks%2C%20yet%20available%20supervision%20is%20typically%20limited%20to%20a%20small%20number%20of%20prediction%20targets%20per%20database.%20This%20task%20scarcity%20causes%20learned%20representations%20to%20encode%20task-specific%20shortcuts%20that%20degrade%20transfer%20even%20within%20the%20same%20schema%2C%20a%20problem%20we%20call%20label%20leakage.%20We%20study%20this%20using%20K-Space%2C%20a%20modular%20architecture%20combining%20frozen%20pretrained%20tabular%20encoders%20with%20a%20lightweight%20message-passing%20c

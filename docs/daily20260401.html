{"title": "SceneDiff: A Benchmark and Method for Multiview Object Change Detection", "author": "Yuqun Wu and Chih-hao Lin and Henry Che and Aditi Tiwari and Chuhang Zou and Shenlong Wang and Derek Hoiem", "abstract": "We investigate the problem of identifying objects that have been added, removed, or moved between a pair of captures (images or videos) of the same scene at different times. Accurately identifying verifiable changes is extremely challenging -- some objects may appear to be missing because they are occluded or out of frame, while others may appear different due to large viewpoint changes. To study this problem, we introduce the SceneDiff Benchmark, the first multiview change detection dataset for scenes captured along different camera trajectories, comprising 350 diverse video pairs with dense object instance-level annotations. We also introduce the SceneDiff algorithm, a training-free approach that solves for image poses, segments images into objects, and compares them using semantic and geometric features. By building on pretrained models, SceneDiff generalizes across domains without retraining and naturally improves as the underlying models advance. Experiments on multiview and two-view benchmarks demonstrate that our method outperforms existing approaches by large margins (53.0\\% and 30.6\\% relative AP improvements). Project page: https://yuqunw.github.io/SceneDiff", "link": "http://arxiv.org/abs/2512.16908v2", "date": "2026-03-31", "relevancy": 2.3653, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6094}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5877}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5877}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SceneDiff%3A%20A%20Benchmark%20and%20Method%20for%20Multiview%20Object%20Change%20Detection&body=Title%3A%20SceneDiff%3A%20A%20Benchmark%20and%20Method%20for%20Multiview%20Object%20Change%20Detection%0AAuthor%3A%20Yuqun%20Wu%20and%20Chih-hao%20Lin%20and%20Henry%20Che%20and%20Aditi%20Tiwari%20and%20Chuhang%20Zou%20and%20Shenlong%20Wang%20and%20Derek%20Hoiem%0AAbstract%3A%20We%20investigate%20the%20problem%20of%20identifying%20objects%20that%20have%20been%20added%2C%20removed%2C%20or%20moved%20between%20a%20pair%20of%20captures%20%28images%20or%20videos%29%20of%20the%20same%20scene%20at%20different%20times.%20Accurately%20identifying%20verifiable%20changes%20is%20extremely%20challenging%20--%20some%20objects%20may%20appear%20to%20be%20missing%20because%20they%20are%20occluded%20or%20out%20of%20frame%2C%20while%20others%20may%20appear%20different%20due%20to%20large%20viewpoint%20changes.%20To%20study%20this%20problem%2C%20we%20introduce%20the%20SceneDiff%20Benchmark%2C%20the%20first%20multiview%20change%20detection%20dataset%20for%20scenes%20captured%20along%20different%20camera%20trajectories%2C%20comprising%20350%20diverse%20video%20pairs%20with%20dense%20object%20instance-level%20annotations.%20We%20also%20introduce%20the%20SceneDiff%20algorithm%2C%20a%20training-free%20approach%20that%20solves%20for%20image%20poses%2C%20segments%20images%20into%20objects%2C%20and%20compares%20them%20using%20semantic%20and%20geometric%20features.%20By%20building%20on%20pretrained%20models%2C%20SceneDiff%20generalizes%20across%20domains%20without%20retraining%20and%20naturally%20improves%20as%20the%20underlying%20models%20advance.%20Experiments%20on%20multiview%20and%20two-view%20benchmarks%20demonstrate%20that%20our%20method%20outperforms%20existing%20approaches%20by%20large%20margins%20%2853.0%5C%25%20and%2030.6%5C%25%20relative%20AP%20improvements%29.%20Project%20page%3A%20https%3A//yuqunw.github.io/SceneDiff%0ALink%3A%20http%3A//arxiv.org/abs/2512.16908v2%0AForm%3A {"title": "Total Variation Guarantees for Sampling with Stochastic Localization", "author": "Jakob Kellermann", "abstract": "Motivated by the success of score-based generative models, a number of diffusion-based algorithms have recently been proposed for the problem of sampling from a probability measure whose unnormalized density can be accessed. Among them, Grenioux et al. introduced SLIPS, a sampling algorithm based on Stochastic Localization. While SLIPS exhibits strong empirical performance, no rigorous convergence analysis has previously been provided. In this work, we close this gap by establishing the first guarantee for SLIPS in total variation distance. Under minimal assumptions on the target, our bound implies that the number of steps required to achieve an $\\varepsilon$-guarantee scales linearly with the dimension, up to logarithmic factors. The analysis leverages techniques from the theory of score-based generative models and further provides theoretical insights into the empirically observed optimal choice of discretization points.", "link": "http://arxiv.org/abs/2603.29555v1", "date": "2026-03-31", "relevancy": 2.3447, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4809}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4682}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4577}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Total%20Variation%20Guarantees%20for%20Sampling%20with%20Stochastic%20Localization&body=Title%3A%20Total%20Variation%20Guarantees%20for%20Sampling%20with%20Stochastic%20Localization%0AAuthor%3A%20Jakob%20Kellermann%0AAbstract%3A%20Motivated%20by%20the%20success%20of%20score-based%20generative%20models%2C%20a%20number%20of%20diffusion-based%20algorithms%20have%20recently%20been%20proposed%20for%20the%20problem%20of%20sampling%20from%20a%20probability%20measure%20whose%20unnormalized%20density%20can%20be%20accessed.%20Among%20them%2C%20Grenioux%20et%20al.%20introduced%20SLIPS%2C%20a%20sampling%20algorithm%20based%20on%20Stochastic%20Localization.%20While%20SLIPS%20exhibits%20strong%20empirical%20performance%2C%20no%20rigorous%20convergence%20analysis%20has%20previously%20been%20provided.%20In%20this%20work%2C%20we%20close%20this%20gap%20by%20establishing%20the%20first%20guarantee%20for%20SLIPS%20in%20total%20variation%20distance.%20Under%20minimal%20assumptions%20on%20the%20target%2C%20our%20bound%20implies%20that%20the%20number%20of%20steps%20required%20to%20achieve%20an%20%24%5Cvarepsilon%24-guarantee%20scales%20linearly%20with%20the%20dimension%2C%20up%20to%20logarithmic%20factors.%20The%20analysis%20leverages%20techniques%20from%20the%20theory%20of%20score-based%20generative%20models%20and%20further%20provides%20theoretical%20insights%20into%20the%20empirically%20observed%20optimal%20choice%20of%20discretization%20points.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29555v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTotal%2520Variation%2520Guarantees%2520for%2520Sampling%2520with%2520Stochastic%2520Localization%26entry.906535625%3DJakob%2520Kellermann%26entry.1292438233%3DMotivated%2520by%2520the%2520success%2520of%2520score-based%2520generative%2520models%252C%2520a%2520number%2520of%2520diffusion-based%2520algorithms%2520have%2520recently%2520been%2520proposed%2520for%2520the%2520problem%2520of%2520sampling%2520from%2520a%2520probability%2520measure%2520whose%2520unnormalized%2520density%2520can%2520be%2520accessed.%2520Among%2520them%252C%2520Grenioux%2520et%2520al.%2520introduced%2520SLIPS%252C%2520a%2520sampling%2520algorithm%2520based%2520on%2520Stochastic%2520Localization.%2520While%2520SLIPS%2520exhibits%2520strong%2520empirical%2520performance%252C%2520no%2520rigorous%2520convergence%2520analysis%2520has%2520previously%2520been%2520provided.%2520In%2520this%2520work%252C%2520we%2520close%2520this%2520gap%2520by%2520establishing%2520the%2520first%2520guarantee%2520for%2520SLIPS%2520in%2520total%2520variation%2520distance.%2520Under%2520minimal%2520assumptions%2520on%2520the%2520target%252C%2520our%2520bound%2520implies%2520that%2520the%2520number%2520of%2520steps%2520required%2520to%2520achieve%2520an%2520%2524%255Cvarepsilon%2524-guarantee%2520scales%2520linearly%2520with%2520the%2520dimension%252C%2520up%2520to%2520logarithmic%2520factors.%2520The%2520analysis%2520leverages%2520techniques%2520from%2520the%2520theory%2520of%2520score-based%2520generative%2520models%2520and%2520further%2520provides%2520theoretical%2520insights%2520into%2520the%2520empirically%2520observed%2520optimal%2520choice%2520of%2520discretization%2520points.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29555v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Total%20Variation%20Guarantees%20for%20Sampling%20with%20Stochastic%20Localization&entry.906535625=Jakob%20Kellermann&entry.1292438233=Motivated%20by%20the%20success%20of%20score-based%20generative%20models%2C%20a%20number%20of%20diffusion-based%20algorithms%20have%20recently%20been%20proposed%20for%20the%20problem%20of%20sampling%20from%20a%20probability%20measure%20whose%20unnormalized%20density%20can%20be%20accessed.%20Among%20them%2C%20Grenioux%20et%20al.%20introduced%20SLIPS%2C%20a%20sampling%20algorithm%20based%20on%20Stochastic%20Localization.%20While%20SLIPS%20exhibits%20strong%20empirical%20performance%2C%20no%20rigorous%20convergence%20analysis%20has%20previously%20been%20provided.%20In%20this%20work%2C%20we%20close%20this%20gap%20by%20establishing%20the%20first%20guar {"title": "Semantic Zone-Based Map Management for Stable AI-Integrated Mobile Robots", "author": "Huichang Yun and Seungho Yoo", "abstract": "Recent advances in large AI models (VLMs and LLMs) and joint use of the 3D dense maps, enable mobile robots to provide more powerful and interactive services grounded in rich spatial context. However, deploying both heavy AI models and dense maps on edge robots is challenging under strict memory budgets. When the memory budget is exceeded, required keyframes may not be loaded in time, which can degrade the stability of position estimation and interfering model performance. We proposes a semantic zone-based map management approach to stabilize dense-map utilization under memory constraints. We associate keyframes with semantic indoor regions (e.g., rooms and corridors) and keyframe management at the semantic zone level prioritizes spatially relevant map content while respecting memory constraints. This reduces keyframe loading and unloading frequency and memory usage. We evaluate the proposed approach in large-scale simulated indoor environments and on an NVIDIA Jetson Orin Nano under concurrent SLAM-VLM execution. With Qwen3.5:0.8b, the proposed method improves throughput by 3.3 tokens/s and reduces latency by 21.7% relative to a geometric map-management strategy. Furthermore, while the geometric strategy suffers from out-of-memory failures and stalled execution under memory pressure, the proposed method eliminates both issues, preserving localization stability and enabling robust VLM operation. These results demonstrate that the proposed approach enables efficient dense map utilization for memory constrained, AI-integrated mobile robots. Code is available at: https://github.com/huichangs/rtabmap/tree/segment", "link": "http://arxiv.org/abs/2603.29627v1", "date": "2026-03-31", "relevancy": 2.3412, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", " etson%20Orin%20Nano%20under%20concurrent%20SLAM-VLM%20execution.%20With%20Qwen3.5%3A0.8b%2C%20the%20proposed%20method%20improves%20throughput%20by%203.3%20tokens/s%20and%20reduces%20latency%20by%2021.7%25%20relative%20to%20a%20geometric%20map-management%20strategy.%20Furthermore%2C%20while%20the%20geometric%20strategy%20suffers%20from%20out-of-memory%20failures%20and%20stalled%20execution%20under%20memory%20pressure%2C%20the%20proposed%20method%20eliminates%20both%20issues%2C%20preserving%20localization%20stability%20and%20enabling%20robust%20VLM%20operation.%20These%20results%20demonstrate%20that%20the%20proposed%20approach%20enables%20efficient%20dense%20map%20utilization%20for%20memory%20constrained%2C%20AI-integrated%20mobile%20robots.%20Code%20is%20available%20at%3A%20https%3A//github.com/huichangs/rtabmap/tree/segment%0ALink%3A%20http%3A//arxiv.org/abs/2603.29627v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic%2520Zone-Based%2520Map%2520Management%2520for%2520Stable%2520AI-Integrated%2520Mobile%2520Robots%26entry.906535625%3DHuichang%2520Yun%2520and%2520Seungho%2520Yoo%26entry.1292438233%3DRecent%2520advances%2520in%2520large%2520AI%2520models%2520%2528VLMs%2520and%2520LLMs%2529%2520and%2520joint%2520use%2520of%2520the%25203D%2520dense%2520maps%252C%2520enable%2520mobile%2520robots%2520to%2520provide%2520more%2520powerful%2520and%2520interactive%2520services%2520grounded%2520in%2520rich%2520spatial%2520context.%2520However%252C%2520deploying%2520both%2520heavy%2520AI%2520models%2520and%2520dense%2520maps%2520on%2520edge%2520robots%2520is%2520challenging%2520under%2520strict%2520memory%2520budgets.%2520When%2520the%2520memory%2520budget%2520is%2520exceeded%252C%2520required%2520keyframes%2520may%2520not%2520be%2520loaded%2520in%2520time%252C%2520which%2520can%2520degrade%2520the%2520stability%2520of%2520position%2520estimation%2520and%2520interfering%2520model%2520 0robust%20VLM%20operation.%20These%20results%20demonstrate%20that%20the%20proposed%20approach%20enables%20efficient%20dense%20map%20utilization%20for%20memory%20constrained%2C%20AI-integrated%20mobile%20robots.%20Code%20is%20available%20at%3A%20https%3A//github.com/huichangs/rtabmap/tree/segment&entry.1838667208=http%3A//arxiv.org/abs/2603.29627v1&entry.124074799=Read"},
{"title": "Scalable AI-assisted Workflow Management for Detector Design Optimization Using Distributed Computing", "author": "Derek Anderson and Amit Bashyal and Markus Diefenthaler and Cristiano Fanelli and Wen Guan and Tanja Horn and Alex Jentsch Meifeng Lin and Tadashi Maeno and Kei Nagai and Hemalata Nayak and Connor Pecar and Karthik Suresh and Fang-Ying Tsai and Anselm Vossen and Tianle Wang and Torre Wenaus", "abstract": "The Production and Distributed Analysis (PanDA) system, originally developed for the ATLAS experiment at the CERN Large Hadron Collider (LHC), has evolved into a robust platform for orchestrating large-scale workflows across distributed computing resources. Coupled with its intelligent Distributed Dispatch and Scheduling (iDDS) component, PanDA supports AI/ML-driven workflows through a scalable and flexible workflow engine.\n  We present an AI-assisted framework for detector design optimization that integrates multi-objective Bayesian optimization with the PanDA--iDDS workflow engine to coordinate iterative simulations across heterogeneous resources. The framework addresses the challenge of exploring high-dimensional parameter spaces inherent in modern detector design.\n  We demonstrate the framework using benchmark problems and realistic studies of the ePIC and dRICH detectors for the Electron-Ion Collider (EIC). Results show improved automation, scalability, and efficiency in multi-objective optimization. This work establishes a flexible and extensible paradigm for AI-driven detector design and other computationally intensive scientific applications.", "link": "http://arxiv.org/abs/2603.30014v1", "date": "2026-03-31", "relevancy": 2.336, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4731}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4642}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scalable%20AI-assisted%20Workflow%20Management%20for%20Detector%20Design%20Optimization%20Using%20Distributed%20Computing&body=Title%3A%20Scalable%20AI-assisted%20Workflow%20Management%20for%20Detector%20Design%20Optimization%20Using%20Distributed%20Computing%0AAuthor%3A%20Derek%20Anderson%20and%20Amit%20Bashyal%20and%20Markus%20Diefenthaler%20and%20Cristiano%20Fanelli%20and%20Wen%20Guan%20and%20Tanja%20Horn%20and%20Alex%20Jentsch%20Meifeng%20Lin%20and%20Tadashi%20Maeno%20and%20Kei%20Nagai%20and%20Hemalata%20Nayak%20and%20Connor%20Pecar%20and%20Karthik%20Suresh%20and%20Fang-Ying%20Tsai%20and%20Anselm%20Vossen%20and%20Tianle%20Wang%20and%20Torre%20Wenaus%0AAbstract%3A%20The%20Production%20and%20Distributed%20Analysis%20%28PanDA%29%20system%2C%20originally%20developed%20for%20the%20ATLAS%20experiment%20at%20the%20CERN%20Large%20Hadron%20Collider%20%28LHC%29%2C%20has%20evolved%20into%20a%20robust%20platform%20for%20orchestrating%20large-scale%20workflows%20across%20distributed%20computing%20resources.%20Coupled%20with%20its%20intelligent%20Distributed%20Dispatch%20and%20Scheduling%20%28iDDS%29%20component%2C%20PanDA%20supports%20AI/ML-driven%20workflows%20through%20a%20scalable%20and%20flexible%20workflow%20engine.%0A%20%20We%20present%20an%20AI-assisted%20framework%20for%20detector%20design%20optimization%20that%20integrates%20multi-objective%20Bayesian%20optimization%20with%20the%20PanDA--iDDS%20workflow%20engine%20to%20coordinate%20iterative%20simulations%20across%20heterogeneous%20resources.%20The%20framework%20addresses%20the%20challenge%20of%20exploring%20high-dimensional%20parameter%20spaces%20inherent%20in%20modern%20detector%20design.%0A%20%20We%20demonstrate%20the%20framework%20using%20benchmark%20problems {"title": "Not All Frames Are Equal: Complexity-Aware Masked Motion Generation via Motion Spectral Descriptors", "author": "Pengfei Zhou and Xiangyue Zhang and Xukun Shen and Yong Hu", "abstract": "Masked generative models have become a strong paradigm for text-to-motion synthesis, but they still treat motion frames too uniformly during masking, attention, and decoding. This is a poor match for motion, where local dynamic complexity varies sharply over time. We show that current masked motion generators degrade disproportionately on dynamically complex motions, and that frame-wise generation error is strongly correlated with motion dynamics. Motivated by this mismatch, we introduce the Motion Spectral Descriptor (MSD), a simple and parameter-free measure of local dynamic complexity computed from the short-time spectrum of motion velocity. Unlike learned difficulty predictors, MSD is deterministic, interpretable, and derived directly from the motion signal itself. We use MSD to make masked motion generation complexity-aware. In particular, MSD guides content-focused masking during training, provides a spectral similarity prior for self-attention, and can additionally modulate token-level sampling during iterative decoding. Built on top of masked motion generators, our method, DynMask, improves motion generation most clearly on dynamically complex motions while also yielding stronger overall FID on HumanML3D and KIT-ML. These results suggest that respecting local motion complexity is a useful design principle for masked motion generation. Project page: https://xiangyue-zhang.github.io/DynMask", "link": "http://arxiv.org/abs/2603.29655v1", "date": "2026-03-31", "relevancy": 2.3357, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5964}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5779}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Frames%20Are%20Equal%3A%20Complexity-Aware%20Masked%20Motion%20Generation%20via%20Motion%20Spectral%20Descriptors&body=Title%3A%20Not%20All%20Frames%20Are%20Equal%3A%20Complexity-Aware%20Masked%20Motion%20Generation%20via%20Motion%20Spectral%20Descriptors%0AAuthor%3A%20Pengfei%20Zhou%20and%20Xiangyue%20Zhang%20and%20Xukun%20Shen%20and%20Yong%20Hu%0AAbstract%3A%20Masked%20generative%20models%20have%20become%20a%20strong%20paradigm%20for%20text-to-motion%20synthesis%2C%20but%20they%20still%20treat%20motion%20frames%20too%20uniformly%20during%20masking%2C%20attention%2C%20and%20decoding.%20This%20is%20a%20poor%20match%20for%20motion%2C%20where%20local%20dynamic%20complexity%20varies%20sharply%20over%20time.%20We%20show%20that%20current%20masked%20motion%20generators%20degrade%20disproportionately%20on%20dynamically%20complex%20motions%2C%20and%20that%20frame-wise%20generation%20error%20is%20strongly%20correlated%20with%20motion%20dynamics.%20Motivated%20by%20this%20mismatch%2C%20we%20introduce%20the%20Motion%20Spectral%20Descriptor%20%28MSD%29%2C%20a%20simple%20and%20parameter-free%20measure%20of%20local%20dynamic%20complexity%20computed%20from%20the%20short-time%20spectrum%20of%20motion%20velocity.%20Unlike%20learned%20difficulty%20predictors%2C%20MSD%20is%20deterministic%2C%20interpretable%2C%20and%20derived%20directly%20from%20the%20motion%20signal%20itself.%20We%20use%20MSD%20to%20make%20masked%20motion%20generation%20complexity-aware.%20In%20particular%2C%20MSD%20guides%20content-focused%20masking%20during%20training%2C%20provides%20a%20spectral%20similarity%20prior%20for%20self-attention%2C%20and%20can%20additionally%20modulate%20token-level%20sampling%20during%20iterative%20decoding.%20Built%20on%20top%20of%20masked%20motion%20generators%2C%20our%20method%2C%20DynMask%2C%20improves%20motion%20generation%20most%20clearly%20on%20dynamically%20complex%20motions%20while%20also%20yielding%20stronger%20overall%20FID%20on%20HumanML3D%20and%20KIT-ML.%20These%20results%20suggest%20that%20respecting%20local%20motion%20complexity%20is%20a%20useful%20design%20principle%20for%20masked%20motion%20generation.%20Project%20page%3A%20https%3A//xiangyue-zhang.github.io/DynMask%0ALink%3A%20http%3A//arxiv.org/abs/2603.29655v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Frames%2520Are%2520Equal%253A%2520Complexity-Aware%2520Masked%2520Motion%2520Generation%2520via%2520Motion%2520Spectral%2520Descriptors%26entry.906535625%3DPengfei%2520Zhou%2520and%2520Xiangyue%2520Zhang%2520and%2520Xukun%2520Shen%2520and%2520Yong%2520Hu%26entry.1292438233%3DMasked%2520generative%2520models%2520have%2520become%2520a%2520strong%2520paradigm%2520for%2520text-to-motion%2520synthesis%252C%2520but%2520they%2520still%2520treat%2520motion%2520frames%2520too%2520uniformly%2520during%2520masking%252C%2520attention%252C%2520and%2520decoding.%2520This%2520is%2520a%2520poor%2520match%2520for%2520motion%252C%2520where%2520local%2520dynamic%2520complexity%2520varies%2520sharply%2520over%2520time.%2520We%2520show%2520that%2520current%2520masked%2520motion%2520generators%2520degrade%2520disproportionately%2520on%2520dynamically%2520complex%2520motions%252C%2520and%2520that%2520frame-wise%2520generation%2520error%2520is%2520strongly%2520correlated%2520with%2520motion%2520dynamics.%2520Motivated%2520by%2520this%2520mismatch%252C%2520we%2520introduce%2520the%2520Motion%2520Spectral%2520Descriptor%2520%2528MSD%2529%252C%2520a%2520simple%2520and%2520parameter-free%2520measure%2520of%2520local%2520dynamic%2520complexity%2520computed%2520from%2520the%2520short-time%2520spectrum%2520of%2520motion%2520velocity.%2520Unlike%2520learned%2520difficulty%2520predictors%252C%2520MSD%2520is%2520deterministic%252C%2520interpretable%252C%2520and%2520derived%2520directly%2520from%2520the%2520motion%2520signal%2520itself.%2520We%2520use%2520MSD%2520to%2520make%2520masked%2520motion%2520generation%2520complexity-aware.%2520In%2520particular%252C%2520MSD%2520guides%2520content-focused%2520masking%2520during%2520training%252C%2520provides%2520a%2520spectral%2520similarity%2520prior%2520for%2520self-attention%252C%2520and%2520can%2520additionally%2520modulate%2520token-level%2520sampling%2520during%2520iterative%2520decoding.%2520Built%2520on%2520top%2520of%2520masked%2520motion%2520generators%252C%2520our%2520method%252C%2520DynMask%252C%2520improves%2520motion%2520generation%2520most%2520clearly%2520on%2520dynamically%2520complex%2520motions%2520while%2520also%2520yielding%2520stronger%2520overall%2520FID%2520on%2520HumanML3D%2520and%2520KIT-ML.%2520These%2520results%2520suggest%2520that%2520respecting%2520local%2520motion%2520complexity%2520is%2520a%2520useful%2520design%2520principle%2520for%2520masked%2520motion%2520generation.%2520Project%2520page%253A%2520https%253A//xiangyue-zhang.github.io/DynMask%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29655v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Not%20All%20Frames%20Are%20Equal%3A%20Complexity-Aware%20Masked%20Motion%20Generation%20via%20Motion%20Spectral%20Descriptors&entry.906535625=Pengfei%20Zhou%20and%20Xiangyue%20Zhang%20and%20Xukun%20Shen%20and%20Yong%20Hu&entry.1292438233=Masked%20generative%20models%20have%20become%20a%20strong%20paradigm%20for%20text-to-motion%20synthesis%2C%20but%20they%20still%20treat%20motion%20frames%20too%20uniformly%20during%20masking%2C%20attention%2C%20and%20decoding.%20This%20is%20a%20poor%20match%20for%20motion%2C%20where%20local%20dynamic%20complexity%20varies%20sharply%20over%20time.%20We%20show%20that%20current%20masked%20motion%20generators%20degrade%20disproportionately%20on%20dynamically%20complex%20motions%2C%20and%20that%20frame-wise%20generation%20error%20is%20strongly%20correlated%20with%20motion%20dynamics.%20Motivated%20by%20this%20mismatch%2C%20we%20introduce%20the%20Motion%20Spectral%20Descriptor%20%28MSD%29%2C%20a%20simple%20and%20parameter-free%20measure%20of%20local%20dynamic%20complexity%20computed%20from%20the%20short-time%20spectrum%20of%20motion%20velocity.%20Unlike%20learned%20difficulty%20predictors%2C%20MSD%20is%20deterministic%2C%20interpretable%2C%20and%20derived%20directly%20from%20the%20motion%20signal%20itself.%20We%20use%20MSD%20to%20make%20masked%20motion%20generation%20complexity-aware.%20In%20particular%2C%20MSD%20guides%20content-focused%20masking%20during%20training%2C%20provides%20a%20spectral%20similarity%20prior%20for%20self-attention%2C%20and%20can%20additionally%20modulate%20token-level%20sampling%20during%20iterative%20decoding.%20Built%20on%20top%20of%20masked%20motion%20generators%2C%20our%20method%2C%20DynMask%2C%20improves%20motion%20generation%20most%20clearly%20on%20dynamically%20complex%20motions%20while%20also%20yielding%20stronger%20overall%20FID%20on%20HumanML3D%20and%20KIT-ML.%20These%20results%20suggest%20that%20respecting%20local%20motion%20complexity%20is%20a%20useful%20design%20principle%20for%20masked%20motion%20generation.%20Project%20page%3A%20https%3A//xiangyue-zhang.github.io/DynMask&entry.1838667208=http%3A//arxiv.org/abs/2603.29655v1&entry.124074799=Read"},
{"title": "Video Models Reason Early: Exploiting Plan Commitment for Maze Solving", "author": "Kaleb Newman and Tyler Zhu and Olga Russakovsky", "abstract": "Video diffusion models exhibit emergent reasoning capabilities like solving mazes and puzzles, yet little is understood about how they reason during generation. We take a first step towards understanding this and study the internal planning dynamics of video models using 2D maze solving as a controlled testbed. Our investigations reveal two findings. Our first finding is early plan commitment: video diffusion models commit to a high-level motion plan within the first few denoising steps, after which further denoising alters visual details but not the underlying trajectory. Our second finding is that path length, not obstacle density, is the dominant predictor of maze difficulty, with a sharp failure threshold at 12 steps. This means video models can only reason over long mazes by chaining together multiple sequential generations. To demonstrate the practical benefits of our findings, we introduce Chaining with Early Planning, or ChEaP, which only spends compute on seeds with promising early plans and chains them together to tackle complex mazes. This improves accuracy from 7% to 67% on long-horizon mazes and by 2.5x overall on hard tasks in Frozen Lake and VR-Bench across Wan2.2-14B and HunyuanVideo-1.5. Our analysis reveals that current video models possess deeper reasoning capabilities than previously recognized, which can be elicited more reliably with better inference-time scaling.", "link": "http://arxiv.org/abs/2603.30043v1", "date": "2026-03-31", "relevancy": 2.3323, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5891}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5891}, {"title" {"title": "How do LLMs Compute Verbal Confidence", "author": "Dharshan Kumaran and Arthur Conmy and Federico Barbero and Simon Osindero and Viorica Patraucean and Petar Velickovic", "abstract": "Verbal confidence -- prompting LLMs to state their confidence as a number or category -- is widely used to extract uncertainty estimates from black-box models. However, how LLMs internally generate such scores remains unknown. We address two questions: first, when confidence is computed - just-in-time when requested, or automatically during answer generation and cached for later retrieval; and second, what verbal confidence represents - token log-probabilities, or a richer evaluation of answer quality? Focusing on Gemma 3 27B and Qwen 2.5 7B, we provide convergent evidence for cached retrieval. Activation steering, patching, noising, and swap experiments reveal that confidence representations emerge at answer-adjacent positions before appearing at the verbalization site. Attention blocking pinpoints the information flow: confidence is gathered from answer tokens, cached at the first post-answer position, then retrieved for output. Critically, linear probing and variance partitioning reveal that these cached representations explain substantial variance in verbal confidence beyond token log-probabilities, suggesting a richer answer-quality evaluation rather than a simple fluency readout. These findings demonstrate that verbal confidence reflects automatic, sophisticated self-evaluation -- not post-hoc reconstruction -- with implications for understanding metacognition in LLMs and improving calibration.", "link": "http://arxiv.org/abs/2603.17839v2", "date": "2026-03-31", "relevancy": 2.3322, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4791}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4601}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20do%20LLMs%20Compute%20Verbal%20Confidence&body=Title%3A%20How%20do%20LLMs%20Compute%20Verbal%20Confidence%0AAuthor%3A%20Dharshan%20Kumaran%20and%20Arthur%20Conmy%20and%20Federico%20Barbero%20and%20Simon%20Osindero%20and%20Viorica%20Patraucean%20and%20Petar%20Velickovic%0AAbstract%3A%20Verbal%20confidence%20--%20prompting%20LLMs%20to%20state%20their%20confidence%20as%20a%20number%20or%20category%20--%20is%20widely%20used%20to%20extract%20uncertainty%20estimates%20from%20black-box%20models.%20However%2C%20how%20LLMs%20internally%20generate%20such%20scores%20remains%20unknown.%20We%20address%20two%20questions%3A%20first%2C%20when%20confidence%20is%20computed%20-%20just-in-time%20when%20requested%2C%20or%20automatically%20during%20answer%20generation%20and%20cached%20for%20later%20retrieval%3B%20and%20second%2C%20what%20verbal%20confidence%20represents%20-%20token%20log-probabilities%2C%20or%20a%20richer%20evaluation%20of%20answer%20quality%3F%20Focusing%20on%20Gemma%203%2027B%20and%20Qwen%202.5%207B%2C%20we%20provide%20convergent%20evidence%20for%20cached%20retrieval.%20Activation%20steering%2C%20patching%2C%20noising%2C%20and%20swap%20experiments%20reveal%20that%20confidence%20representations%20emerge%20at%20answer-adjacent%20positions%20before%20appearing%20at%20the%20verbalization%20site.%20Attention%20blocking%20pinpoints%20the%20information%20flow%3A%20confidence%20is%20gathered%20from%20answer%20tokens%2C%20cached%20at%20the%20first%20post-answer%20position%2C%20then%20retrieved%20for%20output.%20Critically%2C%20linear%20probing%20and%20variance%20partitioning%20reveal%20that%20these%20cached%20representations%20explain%20substantial%20variance%20in%20verbal%20confidence%20beyond%20token%20log-probabilities%2C%20suggesting%20a%20richer%20answer-quality%20evaluation%20rather%20than%20a%20simple%20fluency%20readout.%20These%20findings%20demonstrate%20that%20verbal%20confidence%20reflects%20automatic%2C%20sophisticated%20self-evaluation%20--%20not%20post-hoc%20reconstruction%20--%20with%20implications%20for%20understanding%20metacognition%20in%20LLMs%20and%20improving%20calibration.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17839v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520do%2520LLMs%2520Compute%2520Verbal%2520Confidence%26entry.906535625%3DDharshan%2520Kumaran%2520and%2520Arthur%2520Conmy%2520and%2520Federico%2520Barbero%2520and%2520Simon%2520Osindero%2520and%2520Viorica%2520Patraucean%2520and%2520Petar%2520Velickovic%26entry.1292438233%3DVerbal%2520confidence%2520--%2520prompting%2520LLMs%2520to%2520state%2520their%2520confidence%2520as%2520a%2520number%2520or%2520category%2520--%2520is%2520widely%2520used%2520to%2520extract%2520uncertainty%2520estimates%2520from%2520black-box%2520models.%2520However%252C%2520how%2520LLMs%2520internally%2520generate%2520such%2520scores%2520remains%2520unknown.%2520We%2520address%2520two%2520questions%253A%2520first%252C%2520when%2520confidence%2520is%2520computed%2520-%2520just-in-time%2520when%2520requested%252C%2520or%2520automatically%2520during%2520answer%2520generation%2520and%2520cached%2520for%2520later%2520retrieval%253B%2520and%2520second%252C%2520what%2520verbal%2520confidence%2520represents%2520-%2520token%2520log-probabilities%252C%2520or%2520a%2520richer%2520evaluation%2520of%2520answer%2520quality%253F%2520Focusing%2520on%2520Gemma%25203%252027B%2520and%2520Qwen%25202.5%25207B%252C%2520we%2520provide%2520convergent%2520evidence%2520for%2520cached%2520retrieval.%2520Activation%2520steering% {"title": "StreetTree: A Large-Scale Global Benchmark for Fine-Grained Tree Species Classification", "author": "Jiapeng Li and Yingjing Huang and Fan Zhang and Yu liu", "abstract": "The fine grained classification of street trees is a crucial task for urban planning, streetscape management, and the assessment of urban ecosystem services. However, progress in this field has been hindered by the lack of large scale, geographically diverse, and publicly available benchmark datasets specifically designed for street trees. To address this critical gap, we introduce StreetTree, the world's first large scale benchmark dataset dedicated to fine grained street tree classification. The dataset contains over 12 million images covering more than 8,300 common street tree species, collected from urban streetscapes across 133 countries spanning five continents, and supplemented with expert verified observational data. StreetTree poses challenges for pretrained vision models under complex urban environments including high inter species visual similarity, long tailed natural distributions, significant intra class variations caused by seasonal changes, and diverse imaging conditions such as lighting, occlusions from buildings, and varying camera angles. In addition, we provide a hierarchical taxonomy (order, family, genus, and species) to support research in hierarchical classification and representation learning. Through extensive experiments with various vision models, we establish solid baselines and reveal the limitations of existing methods in handling such real world complexities. We believe that StreetTree will serve as a key resource for driving new advancements at the intersection of computer vision and urban science.", "link": "http://arxiv.org/abs/2602.19123v2", "date": "2026-03-31", "relevancy": 2.3117, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4698}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4698}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4475}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20StreetTree%3A%20A%20Large-Scale%20Global%20Benchmark%20for%20Fine-Grained%20Tree%20Species%20Classification&body=Title%3A%20StreetTree%3A%20A%20Large-Scale%20Global%20Benchmark%20for%20Fine-Grained%20Tree%20Species%20Classification%0AAuthor%3A%20Jiapeng%20Li%20and%20Yingjing%20Huang%20and%20Fan%20Zhang%20and%20Yu%20liu%0AAbstract%3A%20The%20fine%20grained%20classification%20of%20street%20trees%20is%20a%20crucial%20task%20for%20urban%20planning%2C%20streetscape%20management%2C%20and%20the%20assessment%20of%20urban%20ecosystem%20services.%20However%2C%20progress%20in%20this%20field%20has%20been%20hindered%20by%20the%20lack%20of%20large%20scale%2C%20geographically%20diverse%2C%20and%20publicly%20available%20benchmark%20datasets%20specifically%20designed%20for%20street%20trees.%20To%20address%20this%20critical%20gap%2C%20we%20introduce%20StreetTree%2C%20the%20world%27s%20first%20large%20scale%20benchmark%20dataset%20dedicated%20to%20fine%20grained%20street%20tree%20classification.%20The%20dataset%20contains%20over%2012%20million%20images%20covering%20more%20than%208%2C300%20common%20street%20tree%20species%2C%20collected%20from%20urban%20streetscapes%20across%20133%20countries%20spanning%20five%20continents%2C%20and%20supplemented%20with%20expert%20verified%20observational%20data.%20StreetTree%20poses%20challenges%20for%20pretrained%20vision%20models%20under%20complex%20urban%20environments%20including%20high%20inter%20species%20visual%20similarity%2C%20long%20tailed%20natural%20distributions%2C%20significant%20intra%20class%20variations%20caused%20by%20seasonal%20changes%2C%20and%20diverse%20imaging%20conditions%20such%20as%20lighting%2C%20occlusions%20from%20buildings%2C%20and%20varying%20camera%20angles.%20In%20addition%2C%20we%20provide%20a%20hierarchical%20taxonomy%20%28order%2C%20family%2C%20genus%2C%20and%20species%29%20to%20support%20research%20in%20hierarchical%20classification%20and%20representation%20learning.%20Through%20extensive%20experiments%20with%20various%20vision%20models%2C%20we%20establish%20solid%20baselines%20and%20reveal%20the%20limitations%20of%20existing%20methods%20in%20handling%20such%20real%20world%20complexities.%20We%20believe%20that%20StreetTree%20will%20serve%20as%20a%20key%20resource%20for%20driving%20new%20advancements%20at%20the%20intersection%20of%20computer%20vision%20and%20urban%20science.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19123v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStreetTree%253A%2520A%2520Large-Scale%2520Global%2520Benchmark%2520for%2520Fine-Grained%2520Tree%2520Species%2520Classification%26entry.906535625%3DJiapeng%2520Li%2520and%2520Yingjing%2520Huang%2520and%2520Fan%2520Zhang%2520and%2520Yu%2520liu%26entry.1292438233%3DThe%2520fine%2520grained%2520classification%2520of%2520street%2520trees%2520is%2520a%2520crucial%2520task%2520for%2520urban%2520planning%252C%2520streetscape%2520management%252C%2520and%2520the%2520assessment%2520of%2520urban%2520ecosystem%2520services.%2520However%252C%2520progress%2520in%2520this%2520field%2520has%2520been%2520hindered%2520by%2520the%2520lack%2520of%2520large%2520scale%252C%2520geographically%2520diverse%252C%2520and%2520publicly%2520available%2520benchmark%2520datasets%2520specifically%2520designed%2520for%2520street%2520trees.%2520To%2520address%2520this%2520critical%2520gap%252C%2520we%2520introduce%2520StreetTree%252C%2520the%2520world%2527s%2520first%2520large%2520scale%2520benchmark%2520dataset%2520dedicated%2520to%2520fine%2520grained%2520street%2520tree%2520classificati {"title": "Curvature-Guided LoRA: Steering in the pretrained NTK subspace", "author": "Fr\u00e9d\u00e9ric Zheng and Alexandre Prouti\u00e8re", "abstract": "Parameter-efficient fine-tuning methods such as LoRA enable efficient adaptation of large pretrained models but often fall short of full fine-tuning performance. Existing approaches focus on aligning parameter updates, which only indirectly control model predictions. In this work, we introduce the prediction alignment problem, aiming to match the predictor obtained via PEFT to that of full fine-tuning at the level of outputs. We show that this objective naturally leads to a curvature-aware, second-order formulation, where optimal low-rank updates correspond to a Newton-like, curvature-whitened gradient. Based on this insight, we propose Curvature-Guided LoRA (CG-LoRA), which selects and scales adaptation directions using local curvature information. Our method is computationally efficient and avoids explicit second-order matrix construction. Preliminary experiments on standard natural language understanding benchmarks demonstrate improved performance and faster convergence compared to existing LoRA variants.", "link": "http://arxiv.org/abs/2603.29824v1", "date": "2026-03-31", "relevancy": 2.2984, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4767}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4513}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Curvature-Guided%20LoRA%3A%20Steering%20in%20the%20pretrained%20NTK%20subspace&body=Title%3A%20Curvature-Guided%20LoRA%3A%20Steering%20in%20the%20pretrained%20NTK%20subspace%0AAuthor%3A%20Fr%C3%A9d%C3%A9ric%20Zheng%20and%20Alexandre%20Prouti%C3%A8re%0AAbstract%3A%20Parameter-efficient%20fine-tuning%20methods%20such%20as%20LoRA%20enable%20efficient%20adaptation%20of%20large%20pretrained%20models%20but%20often%20fall%20short%20of%20full%20fine-tuning%20performance.%20Existing%20approaches%20focus%20on%20aligning%20parameter%20updates%2C%20which%20only%20indirectly%20control%20model%20predictions.%20In%20this%20work%2C%20we%20introduce%20the%20prediction%20alignment%20problem%2C%20aiming%20to%20match%20the%20predictor%20obtained%20via%20PEFT%20to%20that%20of%20full%20fine-tuning%20at%20the%20level%20of%20outputs.%20We%20show%20that%20this%20objective%20naturally%20leads%20to%20a%20curvature-aware%2C%20second-order%20formulation%2C%20where%20optimal%20low-rank%20updates%20correspond%20to%20a%20Newton-like%2C%20curvature-whitened%20gradient.%20Based%20on%20this%20insight%2C%20we%20propose%20Curvature-Guided%20LoRA%20%28CG-LoRA%29%2C%20which%20selects%20and%20scales%20adaptation%20directions%20using%20local%20curvature%20information.%20Our%20method%20is%20computationally%20efficient%20and%20avoids%20explicit%20second-order%20matrix%20construction.%20Preliminary%20experiments%20on%20standard%20natural%20language%20understanding%20benchmarks%20demonstrate%20improved%20performance%20and%20faster%20convergence%20compared%20to%20existing%20LoRA%20variants.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29824v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCurvature-Guided%2520LoRA%253A%2520Steering%2520in%2520the%2520pretrained%2520NTK%2520subspace%26entry.906535625%3DFr%25C3%25A9d%25C3%25A9ric%2520Zheng%2520and%2520Alexandre%2520Prouti%25C3%25A8re%26entry.1292438233%3DParameter-efficient%2520fine-tuning%2520methods%2520such%2520as%2520LoRA%2520enable%2520efficient%2520adaptation%2520of%2520large%2520pretrained%2520models%2520but%2520often%2520fall%2520short%2520of%2520full%2520fine-tuning%2520performance.%2520Existing%2520approaches%2520focus%2520on%2520aligning%2520parameter%2520updates%252C%2520which%2520only%2520indirectly%2520control%2520model%2520predictions.%2520In%2520this%2520work%252C%2520we%2520introduce%2520the%2520prediction%2520alignment%2520problem%252C%2520aiming%2520to%2520match%2520the%2520predictor%2520obtained%2520via%2520PEFT%2520to%2520that%2520of%2520full%2520fine-tuning%2520at%2520the%2520level%2520of%2520outputs.%2520We%2520show%2520that%2520this%2520objective%2520naturally%2520leads%2520to%2520a%2520curvature-aware%252C%2520second-order%2520formulation%252C%2520where%2520optimal%2520low-rank%2520updates%2520correspond%2520to%2520a%2520Newton-like%252C%2520curvature-whitened%2520gradient.%2520Based%2520on%2520this%2520insight%252C%2520we%2520propose%2520Curvature-Guided%2520LoRA%2520%2528CG-LoRA%2529%252C%2520which%2520selects%2520and%2520scales%2520adaptation%2520directions%2520using%2520local%2520curvature%2520information.%2520Our%2520method%2520is%2520computationally%2520efficient%2520and%2520avoids%2520explicit%2520second-order%2520matrix%2520construction.%2520Preliminary%2520experiments%2520on%2520standard%2520natural%2520language%2520understanding%2520benchmarks%2520demonstrate%2520improved%2520performance%2520and%2520faster%2520convergence%2520compared%2520to%2520existing%2520LoRA%2520variants.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29824v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Curvature-Guided%20LoRA%3A%20Steering%20in%20the%20pretrained%20NTK%20subspace&entry.906535625=Fr%C3%A9d%C3%A9ric%20Zheng%20and%20Alexandre%20Prouti%C3%A8re&entry.1292438233=Parameter-efficient%20fine-tuning%20methods%20such%20as%20LoRA%20enable%20efficient%20adaptation%20of%20large%20pretrained%20models%20but%20often%20fall%20short%20of%20full%20fine-tuning%20performance.%20E {"title": "Automated Algorithm Design for Auto-Tuning Optimizers", "author": "Floris-Jan Willemsen and Niki van Stein and Ben van Werkhoven", "abstract": "Automatic performance tuning (auto-tuning) is essential for optimizing high-performance applications, where vast and irregular search spaces make manual exploration infeasible. While auto-tuners traditionally rely on classical approaches such as evolutionary, annealing, or surrogate-based optimizers, designing algorithms that efficiently find near-optimal configurations robustly across diverse tasks is challenging. We propose a new paradigm: using large language models (LLMs) to automatically generate optimization algorithms tailored to auto-tuning problems. We introduce a framework that prompts LLMs with problem descriptions and search space characteristics to synthesize, test, and iteratively refine specialized optimizers. These generated algorithms are evaluated on four real-world auto-tuning applications across six hardware platforms and compared against the state-of-the-art in two contemporary auto-tuning frameworks. The evaluation demonstrates that providing additional application- and search space-specific information in the generation stage results in an average performance improvement of 30.7% and 14.6%, respectively. In addition, our results show that LLM-generated optimizers can rival, and in various cases outperform, existing human-designed algorithms, with our best-performing generated optimization algorithms achieving an average 72.4% improvement over state-of-the-art optimizers for auto-tuning.", "link": "http://arxiv.org/abs/2510.17899v2", "date": "2026-03-31", "relevancy": 2.2912, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4589}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4579}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automated%20Algorithm%20Design%20for%20Auto-Tuning%20Optimizers&body=Title%3A%20Automated%20Algorithm%20Design%20for%20Auto-Tuning%20Optimizers%0AAuthor%3A%20Floris-Jan%20Willemsen%20and%20Niki%20van%20Stein%20and%20Ben%20van%20Werkhoven%0AAbstract%3A%20Automatic%20performance%20tuning%20%28auto-tuning%29%20is%20essential%20for%20optimizing%20high-performance%20applications%2C%20where%20vast%20and%20irregular%20search%20spaces%20make%20manual%20exploration%20infeasible.%20While%20auto-tuners%20traditionally%20rely%20on%20classical%20approaches%20such%20as%20evolutionary%2C%20annealing%2C%20or%20surrogate-based%20optimizers%2C%20designing%20algorithms%20that%20efficiently%20find%20near-optimal%20configurations%20robustly%20across%20diverse%20tasks%20is%20challenging.%20We%20propose%20a%20new%20paradigm%3A%20using%20large%20language%20models%20%28LLMs%29%20to%20automatically%20generate%20optimization%20algorithms%20tailored%20to%20auto-tuning%20problems.%20We%20introduce%20a%20framework%20that%20prompts%20LLMs%20with%20problem%20descriptions%20and%20search%20space%20characteristics%20to%20synthesize%2C%20test%2C%20and%20iteratively%20refine%20specialized%20optimizers.%20These%20generated%20algorithms%20are%20evaluated%20on%20four%20real-world%20auto-tuning%20applications%20across%20six%20hardware%20platforms%20and%20compared%20against%20the%20state-of-the-art%20in%20two%20contemporary%20auto-tuning%20frameworks.%20The%20evaluation%20demonstrates%20that%20providing%20additional%20application-%20and%20search%20space-specific%20information%20in%20the%20generation%20stage%20results%20in%20an%20average%20performance%20improvement%20of%2030.7%25%20and%2014.6%25%2C%20respectively.%20In%20addition%2C%20our%20results%20show%20that%20LLM-generated%20optimizers%20can%20rival%2C%20and%20in%20various%20cases%20outperform%2C%20existing%20human-designed%20algorithms%2C%20with%20our%20best-performing%20generated%20optimization%20algorithms%20achieving%20an%20average%2072.4%25%20improvement%20over%20state-of-the-art%20optimizers%20for%20auto-tuning.%0ALink%3A%20http%3A//arxiv.org/abs/2510.17899v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomated%2520Algorithm%2520Design%2520for%2520Auto-Tuning%2520Optimizers%26entry.906535625%3DFloris-Jan%2520Willemsen%2520and%2520Niki%2520van%2520Stein%2520and%2520Ben%2520van%2520Werkhoven%26entry.1292438233%3DAutomatic%2520performance%2520tuning%2520%2528auto-tuning%2529%2520is%2520essential%2520for%2520optimizing%2520high-performance%2520applications%252C%2520where%2520vast%2520and%2520irregular%2520search%2520spaces%2520make%2520manual%2520exploration%2520infeasible.%2520While%2520auto-tuners%2520traditionally%2520rely%2520on%2520classical%2520approaches%2520such%2520as%2520evolutionary%252C%2520annealing%252C%2520or%2520surrogate-based%2520optimizers%252C%2520designing%2520algorithms%2520that%2520efficiently%2520find%2520near-optimal%2520configurations%2520robustly%2520across%2520diverse%2520tasks%2520is%2520challenging.%2520We%2520propose%2520a%2520new%2520paradigm%253A%2520using%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520automatically%2520generate%2520optimization%2520algorithms%2520tailored%2520to%2520auto-tuning%2520problems.%2520We%2520introduce%2520a%2520framework%2520that%2520prompts%2520LLMs%2520with%2520problem%2520descriptions%2520and%2520search%2520space%2520characteristics%2520to%2520synthesize%252C%2520test%252C%2520and%2520iteratively%2520refine%2520specialized%2520optimizers.%2520These%2520generated%2520algorithms%2520are%2520evaluated%2520on%2520four%2520real-world%2520auto-tuning%2520applications%2520across%2520six%2520hardware%2520platforms%2520and%2520compared%2520against%2520the%2520state-of-the-art%2520in%2520two%2520contemporary%2520auto-tuning%2520frameworks.%2520The%2520evaluation%2520demonstrates%2520that%2520providing%2520additional%2520application-%2520and%2520search%2520space-specific%2520information%2520in%2520the%2520generation%2520stage%2520results%2520in%2520an%2520average%2520performance%2520improvement%2520of%252030.7%2525%2520and%252014.6%2525%252C%2520respectively.%2520In%2520addition%252C%2520our%2520results%2520show%2520that%2520LLM-generated%2520optimizers%2520can%2520rival%252C%2520and%2520in%2520various%2520cases%2520outperform%252C%2520existing%2520human-designed%2520algorithms%252C%2520with%2520our%2520best-performing%2520generated%2520optimization%2520algorithms%2520achieving%2520an%2520average%252072.4%2525%2520improvement%2520over%2520state-of-the-art%2520optimizers%2520for%2520auto-tuning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.17899v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Automated%20Algorithm%20Design%20for%20Auto-Tuning%20Optimizers&entry.906535625=Floris-Jan%20Willemsen%20and%20Niki%20van%20Stein%20and%20Ben%20van%20Werkhoven&entry.1292438233=Automatic%20performance%20tuning%20%28auto-tuning%29%20is%20essential%20for%20optimizing%20high-performance%20applications%2C%20where%20vast%20and%20irregular%20search%20spaces%20make%20manual%20exploration%20infeasible.%20While%20auto-tuners%20traditionally%20rely%20on%20classical%20approaches%20such%20as%20evolutionary%2C%20annealing%2C%20or%20surrogate-based%20optimizers%2C%20designing%20algorithms%20that%20efficiently%20find%20near-optimal%20configurations%20robustly%20across%20diverse%20tasks%20is%20challenging.%20We%20propose%20a%20new%20paradigm%3A%20using%20large%20language%20models%20%28LLMs%29%20to%20automatically%20generate%20optimization%20algorithms%20tailored%20to%20auto-tuning%20problems.%20We%20introduce%20a%20framework%20 {"title": "When Only the Final Text Survives: Implicit Execution Tracing for Multi-Agent Attribution", "author": "Yi Nian and Haosen Cao and Shenzhe Zhu and Henry Peng Zou and Qingqing Luan and Yue Zhao", "abstract": "When a multi-agent system produces an incorrect or harmful answer, who is accountable if execution logs and agent identifiers are unavailable? In practice, generated content is often detached from its execution environment due to privacy or system boundaries, leaving the final text as the only auditable artifact. Existing attribution methods rely on full execution traces and thus become ineffective in such metadata-deprived settings. We propose Implicit Execution Tracing (IET), a provenance-by-design framework that shifts attribution from post-hoc inference to built-in instrumentation. Instead of reconstructing hidden trajectories, IET embeds agent-specific, key-conditioned statistical signals directly into the token generation process, transforming the output text into a self-verifying execution record. At inference time, we recover a linearized execution trace from the final text via transition-aware statistical scoring. Experiments across diverse multi-agent coordination settings demonstrate that IET achieves accurate segment-level attribution and reliable transition recovery under identity removal, boundary corruption, and privacy-preserving redaction, while maintaining generation quality. These results show that embedding provenance into generation provides a practical and robust foundation for accountability in multi-agent language systems when execution metadata is unavailable.", "link": "http://arxiv.org/abs/2603.17445v3", "date": "2026-03-31", "relevancy": 2.2565, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4634}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4459}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Only%20the%20Final%20Text%20Survives%3A%20Implicit%20Execution%20Tracing%20for%20Multi-Agent%20Attribution&body=Title%3A%20When%20Only%20the%20Final%20Text%20Survives%3A%20Implicit%20Execution%20Tracing%20for%20Multi-Agent%20Attribution%0AAuthor%3A%20Yi%20Nian%20and%20Haosen%20Cao%20and%20Shenzhe%20Zhu%20and%20Henry%20Peng%20Zou%20and%20Qingqing%20Luan%20and%20Yue%20Zhao%0AAbstract%3A%20When%20a%20multi-agent%20system%20produces%20an%20incorrect%20or%20harmful%20answer%2C%20who%20is%20accountable%20if%20execution%20logs%20and%20agent%20identifiers%20are%20unavailable%3F%20In%20practice%2C%20generated%20content%20is%20often%20detached%20from%20its%20execution%20environment%20due%20to%20privacy%20or%20system%20boundaries%2C%20leaving%20the%20final%20text%20as%20the%20only%20auditable%20artifact.%20Existing%20attribution%20methods%20rely%20on%20full%20execution%20traces%20and%20thus%20become%20ineffective%20in%20such%20metadata-deprived%20settings.%20We%20propose%20Implicit%20Execution%20Tracing%20%28IET%29%2C%20a%20provenance-by-design%20framework%20that%20shifts%20attribution%20from%20post-hoc%20inference%20to%20built-in%20instrumentation.%20Instead%20of%20reconstructing%20hidden%20trajectories%2C%20IET%20embeds%20agent-specific%2C%20key-conditioned%20statistical%20signals%20directly%20into%20the%20token%20generation%20process%2C%20transforming%20the%20output%20text%20into%20a%20self-verifying%20execution%20record.%20At%20inference%20time%2C%20we%20recover%20a%20linearized%20execution%20trace%20from%20the%20final%20text%20via%20transition-aware%20statistical%20scoring.%20Experiments%20across%20diverse%20multi-agent%20coordination%20settings%20demonstrate%20that%20IET%20achieves%20accurate%20segment-level%20attribution%20and%20reliable%20transition%20recovery%20under%20identity%20removal%2C%20boundary%20corruption%2C%20and%20privacy-preserving%20redaction%2C%20while%20maintaining%20generation%20quality.%20These%20results%20show%20that%20embedding%20provenance%20into%20generation%20provides%20a%20practical%20and%20robust%20foundation%20for%20accountability%20in%20multi-agent%20language%20systems%20when%20execution%20metadata%20is%20unavailable.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17445v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Only%2520the%2520Final%2520Text%2520Survives%253A%2520Implicit%2520Execution%2520Tracing%2520for%2520Multi-Agent%2520Attribution%26entry.906535625%3DYi%2520Nian%2520and%2520Haosen%2520Cao%2520and%2520Shenzhe%2520Zhu%2520and%2520Henry%2520Peng%2520Zou%2520and%2520Qingqing%2520Luan%2520and%2520Yue%2520Zhao%26entry.1292438233%3DWhen%2520a%2520multi-agent%2520system%2520produces%2520an%2520incorrect%2520or%2520harmful%2520answer%252C%2520who%2520is%2520accountable%2520if%2520execution%2520logs%2520and%2520agent%2520identifiers%2520are%2520unavailable%253F%2520In%2520practice%252C%2520generated%2520content%2520is%2520often%2520detached%2520from%2520its%2520execution%2520environment%2520due%2520to%2520privacy%2520or%2520system%2520boundaries%252C%2520leaving%2520the%2520final%2520text%2520as%2520the%2520only%2520auditable%2520artifact.%2520Existing%2520attribution%2520methods%2520rely%2520on%2520full%2520execution%2520traces%2520and%2520thus%2520become%2520ineffective%2520in%2520such%2520metadata-deprived%2520settings.%2520We%2520propose%2520Implicit%2520Execution%2520Tracing%2520%2528IET%2529%252C%2520a%2520provenance-by-design%2520framework%2520that%2520shifts%2520attribution%2520from%2520post-hoc%2520inference%2520to%2520built-in%2520instrumentation.%2520Instead%2520of%2520reconstructing%2520hidden%2520trajectories%252C%2520IET%2520embeds%2520agent-specific%252C%252 0artifact.%20Existing%20attribution%20methods%20rely%20on%20full%20execution%20traces%20and%20thus%20become%20ineffective%20in%20such%20metadata-deprived%20settings.%20We%20propose%20Implicit%20Execution%20Tracing%20%28IET%29%2C%20a%20provenance-by-design%20framework%20that%20shifts%20attribution%20from%20post-hoc%20inference%20to%20built-in%20instrumentation.%20Instead%20of%20reconstructing%20hidden%20trajectories%2C%20IET%20embeds%20agent-specific%2C%20key-conditioned%20statistical%20signals%20directly%20into%20the%20token%20generation%20process%2C%20transforming%20the%20output%20text%20into%20a%20self-verifying%20execution%20record.%20At%20inference%20time%2C%20we%20recover%20a%20linearized%20execution%20trace%20from%20the%20final%20text%20via%20transition-aware%20statistical%20scoring.%20Experiments%20across%20diverse%20multi-agent%20coordination%20settings%20demonstrate%20that%20IET%20achieves%20accurate%20segment-level%20attribution%20and%20reliable%20transition%20recovery%20under%20identity%20removal%2C%20boundary%20corruption%2C%20and%20privacy-preserving%20redaction%2C%20while%20maintaining%20generation%20quality.%20These%20results%20show%20that%20embedding%20provenance%20into%20generation%20provides%20a%20practical%20and%20robust%20foundation%20for%20accountability%20in%20multi-agent%20language%20systems%20when%20execution%20metadata%20is%20unavailable.&entry.1838667208=http%3A//arxiv.org/abs/2603.17445v3&entry.124074799=Read"},
{"title": "MacTok: Robust Continuous Tokenization for Image Generation", "author": "Hengyu Zeng and Xin Gao and Guanghao Li and Yuxiang Yan and Jiaoyang Ruan and Junpeng Ma and Haoyu Albert Wang and Jian Pu", "abstract": "Continuous image tokenizers enable efficient visual generation, and those based on variational frameworks can learn smooth, structured latent representations through KL regularization. Yet this often leads to posterior collapse when using fewer tokens, where the encoder fails to encode informative features into the compressed latent space. To address this, we introduce \\textbf{MacTok}, a \\textbf{M}asked \\textbf{A}ugmenting 1D \\textbf{C}ontinuous \\textbf{Tok}enizer that leverages image masking and representation alignment to prevent collapse while learning compact and robust representations. MacTok applies both random masking to regularize latent learning and DINO-guided semantic masking to emphasize informative regions in images, forcing the model to encode robust semantics from incomplete visual evidence. Combined with global and local representation alignment, MacTok preserves rich discriminative information in a highly compressed 1D latent space, requiring only 64 or 128 tokens. On ImageNet, MacTok achieves a competitive gFID of 1.44 at 256$\\times$256 and a state-of-the-art 1.52 at 512$\\times$512 with SiT-XL, while reducing token usage by up to 64$\\times$. These results confirm that masking and semantic guidance together prevent posterior collapse and achieve efficient, high-fidelity tokenization.", "link": "http://arxiv.org/abs/2603.29634v1", "date": "2026-03-31", "relevancy": 2.2554, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6036}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5407}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MacTok%3A%20Robust%20Continuous%20Tokenization%20for%20Image%20Generation&body=Title%3A%20MacTok%3A%20Robust%20Continuous%20Tokenization%20for%20Image%20Generation%0AAuthor%3A%20Hengyu%20Zeng%20and%20Xin%20Gao%20and%20Guanghao%20Li%20and%20Yuxiang%20Yan%20and%20Jiaoyang%20Ruan%20and%20Junpeng%20Ma%20and%20Haoyu%20Albert%20Wang%20and%20Jian%20Pu%0AAbstract%3A%20Continuous%20image%20tokenizers%20enable%20efficient%20visual%20generation%2C%20and%20those%20based%20on%20variational%20frameworks%20can%20learn%20smooth%2C%20structured%20latent%20representations%20through%20KL%20regularization.%20Yet%20this%20often%20leads%20to%20posterior%20collapse%20when%20using%20fewer%20tokens%2C%20where%20the%20encoder%20fails%20to%20encode%20informative%20features%20into%20the%20compressed%20latent%20space.%20To%20address%20this%2C%20we%20introduce%20%5Ctextbf%7BMacTok%7D%2C%20a%20%5Ctextbf%7BM%7Dasked%20%5Ctextbf%7BA%7Dugmenting%201D%20%5Ctextbf%7BC%7Dontinuous%20%5Ctextbf%7BTok%7Denizer%20that%20leverages%20image%20masking%20and%20representation%20alignment%20to%20prevent%20collapse%20while%20learning%20compact%20and%20robust%20representations.%20MacTok%20applies%20both%20random%20masking%20to%20regularize%20latent%20learning%20and%20DINO-guided%20semantic%20masking%20to%20emphasize%20informative%20regions%20in%20images%2C%20forcing%20the%20model%20to%20encode%20robust%20semantics%20from%20incomplete%20visual%20evidence.%20Combined%20with%20global%20and%20local%20representation%20alignment%2C%20MacTok%20preserves%20rich%20discriminative%20information%20in%20a%20highly%20compressed%201D%20latent%20space%2C%20requiring%20only%2064%20or%20128%20tokens.%20On%20ImageNet%2C%20MacTok%20achieves%20a%20competitive%20gFID%20of%201.44%20at%20256%24%5Ctimes%24256%20and%20a%20state-of-the-art%201.52%20at%20512%24%5Ctimes%24512%20with%20SiT-XL%2C%20while%20reducing%20token%20usage%20by%20up%20to%2064%24%5Ctimes%24.%20These%20results%20confirm%20that%20masking%20and%20semantic%20guidance%20together%20prevent%20posterior%20collapse%20and%20achieve%20efficient%2C%20high-fidelity%20tokenization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29634v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMacTok%253A%2520Robust%2520Continuous%2520Tokenization%2520for%2520Image%2520Generation%26entry.906535625%3DHengyu%2520Zeng%2520and%2520Xin%2520Gao%2520and%2520Guanghao%2520Li%2520and%2520Yuxiang%2520Yan%2520and%2520Jiaoyang%2520Ruan%2520and%2520Junpeng%2520Ma%2520and%2520Haoyu%2520Albert%2520Wang%2520and%2520Jian%2520Pu%26entry.1292438233%3DContinuous%2520image%2520tokenizers%2520enable%2520efficient%2520visual%2520generation%252C%2520and%2520those%2520based%2520on%2520variational%2520frameworks%2520can%2520learn%2520smooth%252C%2520structured%2520latent%2520representations%2520through%2520KL%2520regularization.%2520Yet%2520this%2520often%2520leads%2520to%2520posterior%2520collapse%2520when%2520using%2520fewer%2520tokens%252C%2520where%2520the%2520encoder%2520fails%2520to%2520encode%2520informative%2520features%2520into%2520the%2520compressed%2520latent%2520space.%2520To%2520address%2520this%252C%2520we%2520introduce%2520%255Ctextbf%257BMacTok%257D%252C%2520a%2520%255Ctextbf%257BM%257Dasked%2520%255Ctextbf%257BA%257Dugmenting%25201D%2520%255Ctextbf%257BC%257Dontinuous%2520%255Ctextbf%257BTok%257Denizer%2520that%2520leverages%2520image%2520masking%2520and%2520representation%2520alignment%2520to%2520prevent%2520collapse%2520while%2520learning%2520compact%2520and%2520robust%2520representations.%2520MacTok%2520applies%2520both%2520random%2520masking%2520to%2520regularize%2520latent%2520learning%2520and%2520DINO-guided%2520semantic%2520masking%2520to%2520emphasize%2520informative%2520regions%2520in%2520images%252C%2520forcing%2520the%2520model%2520to%2520encode%2520robust%2520semantics%2520from%2520incomplete%2520visual%2520evidence.%2520Combined%2520with%2520global%2520and%2520local%2520representation%2520alignment%252C%2520MacTok%2520preserves%2520rich%2520discriminative%2520information%2520in%2520a%2520highly%2520compressed%25201D%2520latent%2520space%252C%2520requiring%2520only%252064%2520or%2520128%2520tokens.%2520On%2520ImageNet%252C%2520MacTok%2520achieves%2520a%2520competitive%2520gFID%2520of%25201.44%2520at%2520256%2524%255Ctimes%2524256%2520and%2520a%2520state-of-the-art%25201.52%2520at%2520512%2524%255Ctimes%2524512%2520with%2520SiT-XL%252C%2520while%2520reducing%2520token%2520usage%2520by%2520up%2520to%252064%2524%255Ctimes%2524.%2520These%2520results%2520confirm%2520that%2520masking%2520and%2520semantic%2520guidance%2520together%2520prevent%2520posterior%2520collapse%2520and%2520achieve%2520efficient%252C%2520high-fidelity%2520tokenization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29634v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MacTok%3A%20Robust%20Continuous%20Tokenization%20for%20Image%20Generation&entry.906535625=Hengyu%20Zeng%20and%20Xin%20Gao%20and%20Guanghao%20Li%20and%20Yuxiang%20Yan%20and%20Jiaoyang%20Ruan%20and%20Junpeng%20Ma%20and%20Haoyu%20Albert%20Wang%20and%20Jian%20Pu&entry.1292438233=Continuous%20image%20tokenizers%20enable%20efficient%20visual%20generation%2C%20and%20those%20based%20on%20variational%20frameworks%20can%20learn%20smooth%2C%20structured%20latent%20representations%20through%20KL%20regularization.%20Yet%20this%20often%20leads%20to%20posterior%20collapse%20when%20using%20fewer%20tokens%2C%20where%20the%20encoder%20fails%20to%20encode%20informative%20features%20into%20the%20compressed%20latent%20space.%20To%20address%20this%2C%20we%20introduce%20%5Ctextbf%7BMacTok%7D%2C%20a%20%5Ctextbf%7BM%7Dasked%20%5Ctextbf%7BA%7Dugmenting%201D% {"title": "6GAgentGym: Tool Use, Data Synthesis, and Agentic Learning for Network Management", "author": "Jiao Chen and Jianhua Tang and Xiaotong Yang and Zuohong Lv", "abstract": "Autonomous 6G network management requires agents that can execute tools, observe the resulting state changes, and adapt their decisions accordingly. Existing benchmarks based on static questions or scripted episode replay, however, do not support such closed-loop interaction, limiting agents to passive evaluation without the ability to learn from environmental feedback. This paper presents 6GAgentGym to provide closed-loop capability. The framework provides an interactive environment with 42 typed tools whose effect classification distinguishes read-only observation from state-mutating configuration, backed by a learned Experiment Model calibrated on NS-3 simulation data. 6G-Forge bootstraps closed-loop training trajectories from NS-3 seeds via iterative Self-Instruct generation with execution verification against the Experiment Model. Supervised fine-tuning on the resulting corpus followed by reinforcement learning with online closed-loop interaction enables an 8B open-source model to achieve comparable overall success rate to GPT-5 on the accompanying 6GAgentBench, with stronger performance on long-horizon tasks. Together, these components provide a viable path toward autonomous, closed-loop network management.", "link": "http://arxiv.org/abs/2603.29656v1", "date": "2026-03-31", "relevancy": 2.2539, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5748}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5704}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.518}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%206GAgentGym%3A%20Tool%20Use%2C%20Data%20Synthesis%2C%20and%20Agentic%20Learning%20for%20Network%20Management&body=Title%3A%206GAgentGym%3A%20Tool%20Use%2C%20Data%20Synthesis%2C%20and%20Agentic%20Learning%20for%20Network%20Management%0AAuthor%3A%20Jiao%20Chen%20and%20Jianhua%20Tang%20and%20Xiaotong%20Yang%20and%20Zuohong%20Lv%0AAbstract%3A%20Autonomous%206G%20network%20management%20requires%20agents%20that%20can%20execute%20tools%2C%20observe%20the%20resulting%20state%20changes%2C%20and%20adapt%20their%20decisions%20accordingly.%20Existing%20benchmarks%20based%20on%20static%20questions%20or%20scripted%20episode%20replay%2C%20however%2C%20do%20not%20support%20such%20closed-loop%20interaction%2C%20limiting%20agents%20to%20passive%20evaluation%20without%20the%20ability%20to%20learn%20from%20environmental%20feedback.%20This%20paper%20presents%206GAgentGym%20to%20provide%20closed-loop%20capability.%20The%20framework%20provides%20an%20interactive%20environment%20with%2042%20typed%20tools%20whose%20effect%20classification%20distinguishes%20read-only%20observation%20from%20state-mutating%20configuration%2C%20backed%20by%20a%20learned%20Experiment%20Model%20calibrated%20on%20NS-3%20simulation%20data.%206G-Forge%20bootstraps%20closed-loop%20training%20trajectories%20from%20NS-3%20seeds%20via%20iterative%20Self-Instruct%20generation%20with%20execution%20verification%20against%20the%20Experiment%20Model.%20Supervised%20fine-tuning%20on%20the%20resulting%20corpus%20followed%20by%20reinforcement%20learning%20with%20online%20closed-loop%20interaction%20enables%20an%208B%20open-source%20model%20to%20achieve%20comparable%20overall%20success%20rate%20to%20GPT-5%20on%20the%20accompanying%206GAgentBench%2C%20with%20stronger%20performance%20on%20long-horizon%20tasks.%20Together%2C%20these%20components%20provide%20a%20viable%20path%20toward%20autonomous%2C%20closed-loop%20network%20management.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29656v1%0AForm%3A%20https%3A//d

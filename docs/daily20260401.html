{"title": "Universal Skeleton Understanding via Differentiable Rendering and MLLMs", "author": "Ziyi Wang and Peiming Li and Xinshun Wang and Yang Tang and Kai-Kuang Ma and Mengyuan Liu", "abstract": "Multimodal large language models (MLLMs) exhibit strong visual-language reasoning, yet remain confined to their native modalities and cannot directly process structured, non-visual data such as human skeletons. Existing methods either compress skeleton dynamics into lossy feature vectors for text alignment, or quantize motion into discrete tokens that generalize poorly across heterogeneous skeleton formats. We present SkeletonLLM, which achieves universal skeleton understanding by translating arbitrary skeleton sequences into the MLLM's native visual modality. At its core is DrAction, a differentiable, format-agnostic renderer that converts skeletal kinematics into compact image sequences. Because the pipeline is end-to-end differentiable, MLLM gradients can directly guide the rendering to produce task-informative visual tokens. To further enhance reasoning capabilities, we introduce a cooperative training strategy: Causal Reasoning Distillation transfers structured, step-by-step reasoning from a teacher model, while Discriminative Finetuning sharpens decision boundaries between confusable actions. SkeletonLLM demonstrates strong generalization on diverse tasks including recognition, captioning, reasoning, and cross-format transfer -- suggesting a viable path for applying MLLMs to non-native modalities. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.18003v2", "date": "2026-03-31", "relevancy": 2.2432, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5623}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5616}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Universal%20Skeleton%20Understanding%20via%20Differentiable%20Rendering%20and%20MLLMs&body=Title%3A%20Universal%20Skeleton%20Understanding%20via%20Differentiable%20Rendering%20and%20MLLMs%0AAuthor%3A%20Ziyi%20Wang%20and%20Peiming%20Li%20and%20Xinshun%20Wang%20and%20Yang%20Tang%20and%20Kai-Kuang%20Ma%20and%20Mengyuan%20Liu%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20exhibit%20strong%20visual-language%20reasoning%2C%20yet%20remain%20confined%20to%20their%20native%20modalities%20and%20cannot%20directly%20process%20structured%2C%20non-visual%20data%20such%20as%20human%20skeletons.%20Existing%20methods%20either%20compress%20skeleton%20dynamics%20into%20lossy%20feature%20vectors%20for%20text%20alignment%2C%20or%20quantize%20motion%20into%20discrete%20tokens%20that%20generalize%20poorly%20across%20heterogeneous%20skeleton%20formats.%20We%20present%20SkeletonLLM%2C%20which%20achieves%20universal%20skeleton%20understanding%20by%20translating%20arbitrary%20skeleton%20sequences%20into%20the%20MLLM%27s%20native%20visual%20modality.%20At%20its%20core%20is%20DrAction%2C%20a%20differentiable%2C%20format-agnostic%20renderer%20that%20converts%20skeletal%20kinematics%20into%20compact%20image%20sequences.%20Because%20the%20pipeline%20is%20end-to-end%20differentiable%2C%20MLLM%20gradients%20can%20directly%20guide%20the%20rendering%20to%20produce%20task-informative%20visual%20tokens.%20To%20further%20enhance%20reasoning%20capabilities%2C%20we%20introduce%20a%20cooperative%20training%20strategy%3A%20Causal%20Reasoning%20Distillation%20transfers%20structured%2C%20step-by-step%20reasoning%20from%20a%20teacher%20model%2C%20while%20Discriminative%20Finetuning%20sharpens%20decision%20boundaries%20between%20confusable%20actions.%20SkeletonLLM%20demonstrates%20strong%20generalization%20on%20diverse%20tasks%20including%20recognition%2C%20captioning%2C%20reasoning%2C%20and%20cross-format%20transfer%20--%20suggesting%20a%20viable%20path%20for%20applying%20MLLMs%20to%20non-native%20modalities.%20Code%20will%20be%20released%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18003v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniversal%2520Skeleton%2520Understanding%2520via%2520Differentiable%2520Rendering%2520and%2520MLLMs%26entry.906535625%3DZiyi%2520Wang%2520and%2520Peiming%2520Li%2520and%2520Xinshun%2520Wang%2520and%2520Yang%2520Tang%2520and%2520Kai-Kuang%2520Ma%2520and%2520Mengyuan%2520Liu%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520exhibit%2520strong%2520visual-language%2520reasoning%252C%2520yet%2520remain%2520confined%2520to%2520their%2520native%2520modalities%2520and%2520cannot%2520directly%2520process%2520structured%252C%2520non-visual%2520data%2520such%2520as%2520human%2520skeletons.%2520Existing%2520methods%2520either%2520compress%2520skeleton%2520dynamics%2520into%2520lossy%2520feature%2520vectors%2520for%2520text%2520alignment%252C%2520or%2520quantize%2520motion%2520into%2520discrete%2520tokens%2520that%2520generalize%2520poorly%2520across%2520heterogeneous%2520skeleton%2520formats.%2520We%2520present%2520SkeletonLLM%252C%2520which%2520achieves%2520universal%2520skeleton%2520understanding%2520by%2520translating%2520arbitrary%2520skeleton%2520sequences%2520into%2520the%2520MLLM%2527s%2520native%2520visual%2520modality.%2520At%2520its%2520core%2520is%2520DrAction%252C%2520a%2520differentiable%252C%2520format-agnostic%2520renderer%2520that%2520converts%2520skeletal%2520kinematics%2520into%2520compact%2520image%2520sequences.%2520Because%2520the%2520pipeline%2520is%2520end-to-end%2520differentiable%252C%2520MLLM%2520gradients%2520can%2520directly%2520guide%2520the%2520rendering%2520to%2520pro ve%20visual%20modality.%20At%20its%20core%20is%20DrAction%2C%20a%20differentiable%2C%20format-agnostic%20renderer%20that%20converts%20skeletal%20kinematics%20into%20compact%20image%20sequences.%20Because%20the%20pipeline%20is%20end-to-end%20differentiable%2C%20MLLM%20gradients%20can%20directly%20guide%20the%20rendering%20to%20produce%20task-informative%20visual%20tokens.%20To%20further%20enhance%20reasoning%20capabilities%2C%20we%20introduce%20a%20cooperative%20training%20strategy%3A%20Causal%20Reasoning%20Distillation%20transfers%20structured%2C%20step-by-step%20reasoning%20from%20a%20teacher%20model%2C%20while%20Discriminative%20Finetuning%20sharpens%20decision%20boundaries%20between%20confusable%20actions.%20SkeletonLLM%20demonstrates%20strong%20generalization%20on%20diverse%20tasks%20including%20recognition%2C%20captioning%2C%20reasoning%2C%20and%20cross-format%20transfer%20--%20suggesting%20a%20viable%20path%20for%20applying%20MLLMs%20to%20non-native%20modalities.%20Code%20will%20be%20released%20upon%20acceptance.&entry.1838667208=http%3A//arxiv.org/abs/2603.18003v2&entry.124074799=Read"},
{"title": "CLIP-AUTT: Test-Time Personalization with Action Unit Prompting for Fine-Grained Video Emotion Recognition", "author": "Muhammad Osama Zeeshan and Masoumeh Sharafi and Beno\u00eet Savary and Alessandro Lameiras Koerich and Marco Pedersoli and Eric Granger", "abstract": "Personalization in emotion recognition (ER) is essential for an accurate interpretation of subtle and subject-specific expressive patterns. Recent advances in vision-language models (VLMs) such as CLIP demonstrate strong potential for leveraging joint image-text representations in ER. However, CLIP-based methods either depend on CLIP's contrastive pretraining or on LLMs to generate descriptive text prompts, which are noisy, computationally expensive, and fail to capture fine-grained expressions, leading to degraded performance. In this work, we leverage Action Units (AUs) as structured textual prompts within CLIP to model fine-grained facial expressions. AUs encode the subtle muscle activations underlying expressions, providing localized and interpretable semantic cues for more robust ER. We introduce CLIP-AU, a lightweight AU-guided temporal learning method that integrates interpretable AU semantics into CLIP. It learns generic, subject-agnostic representations by aligning AU prompts with facial dynamics, enabling fine-grained ER without CLIP fine-tuning or LLM-generated text supervision. Although CLIP-AU models fine-grained AU semantics, it does not adapt to subject-specific variability in subtle expressions. To address this limitation, we propose CLIP-AUTT, a video-based test-time personalization method that dynamically adapts AU prompts to videos from unseen subjects. By combining entropy-guided temporal window selection with prompt tuning, CLIP-AUTT enables subject-specific adaptation while preserving temporal consistency. Our extensive experiments on three challenging video-based subtle ER datasets, BioVid, StressID, and BAH, indicate that CLIP-AU and CLIP-AUTT outperform state-of-the-art CLIP-based FER and TTA methods, achieving robust and personalized subtle ER. Our code is publicly available at: https://github.com/osamazeeshan/CLIP-AUTT.", "link": "http://arxiv.org/abs/2603.27999v2", "date": "2026-03-31", "relevancy": 2.2419, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5933}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5591}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5487}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLIP-AUTT%3A%20Test-Time%20Personalization%20with%20Action%20Unit%20Prompting%20for%20Fine-Grained%20Video%20Emotion%20Recognition&body=Title%3A%20CLIP-AUTT%3A%20Test-Time%20Personalization%20with%20Action%20Unit%20Prompting%20for%20Fine-Grained%20Video%20Emotion%20Recognition%0AAuthor%3A%20Muhammad%20Osama%20Zeeshan%20and%20Masoumeh%20Sharafi%20and%20Beno%C3%AEt%20Savary%20and%20Alessandro%20Lameiras%20Koerich%20and%20Marco%20Pedersoli%20and%20Eric%20Granger%0AAbstract%3A%20Personalization%20in%20emotion%20recognition%20%28ER%29%20is%20essential%20for%20an%20accurate%20interpretation%20of%20subtle%20and%20subject-specific%20expressive%20patterns.%20Recent%20advances%20in%20vision-language%20models%20%28VLMs%29%20such%20as%20CLIP%20demonstrate%20strong%20potential%20for%20leveraging%20joint%20image-text%20representations%20in%20ER.%20However%2C%20CLIP-based%20methods%20either%20depend%20on%20CLIP%27s%20contrastive%20pretraining%20or%20on%20LLMs%20to%20generate%20descriptive%20text%20prompts%2C%20which%20are%20noisy%2C%20computationally%20expensive%2C%20and%20fail%20to%20capture%20fine-grained%20expressions%2C%20leading%20to%20degraded%20performance.%20In%20this%20work%2C%20we%20leverage%20Action%20Units%20%28AUs%29%20as%20structured%20textual%20prompts%20within%20CLIP%20to%20model%20fine-grained%20facial%20expressions.%20AUs%20encode%20the%20subtle%20muscle%20activations%20underlying%20expressions%2C%20providing%20localized%20and%20interpretable%20semantic%20cues%20for%20more%20robust%20ER.%20We%20introduce%20CLIP-AU%2C%20a%20lightweight%20AU-guided%20temporal%20learning%20method%20that%20integrates%20interpretable%20AU%20semantics%20into%20CLIP.%20It%20learns%20generic%2C%20subject-agnostic%20representations%20by%20aligning%20AU%20prompts%20with%20facial%20dynamics%2C%20enabling%20fine-grained%20ER%20without%20CLIP%20fine-tuning%20or%20LLM-generated%20text%20supervision.%20Although%20CLIP-AU%20models%20fine-grained%20AU%20semantics%2C%20it%20does%20not%20adapt%20to%20subject-specific%20variability%20in%20subtle%20expressions.%20To%20address%20this%20limitation%2C%20we%20propose%20CLIP-AUTT%2C%20a%20video-based%20test-time%20personalization%20method%20that%20dynamically%20adapts%20AU%20prompts%20to%20videos%20from%20unseen%20subjects.%20By%20combining%20entropy-guided%20temporal%20window%20selection%20with%20prompt%20tuning%2C%20CLIP-AUTT%20enables%20subject-specific%20adaptation%20while%20preserving%20temporal%20consistency.%20Our%20extensive%20experiments%20on%20three%20challenging%20video-based%20subtle%20ER%20datasets%2C%20BioVid%2C%20StressID%2C%20and%20BAH%2C%20indicate%20that%20CLIP-AU%20and%20CLIP-AUTT%20outperform%20state-of-the-art%20CLIP-based%20FER%20and%20TTA%20methods%2C%20achieving%20robust%20and%20personalized%20subtle%20ER.%20Our%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/osamazeeshan/CLIP-AUTT.%0ALink%3A%20http%3A//arxiv.org/abs/2603.27999v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLIP-AUTT%253A%2520Test-Time%2520Personalization%2520with%2520Action%2520Unit%2520Prompting%2520for%2520Fine-Grained%2520Video%2520Emotion%2520Recogniti 0demonstrate%20strong%20potential%20for%20leveraging%20joint%20image-text%20representations%20in%20ER.%20However%2C%20CLIP-based%20methods%20either%20depend%20on%20CLIP%27s%20contrastive%20pretraining%20or%20on%20LLMs%20to%20generate%20descriptive%20text%20prompts%2C%20which%20are%20noisy%2C%20computationally%20expensive%2C%20and%20fail%20to%20capture%20fine-grained%20expressions%2C%20leading%20to%20degraded%20performance.%20In%20this%20work%2C%20we%20leverage%20Action%20Units%20%28AUs%29%20as%20structured%20textual%20prompts%20within%20CLIP%20to%20model%20fine-grained%20facial%20expressions.%20AUs%20encode%20the%20subtle%20muscle%20activations%20underlying%20expressions%2C%20providing%20localized%20and%20interpretable%20semantic%20cues%20for%20more%20robust%20ER.%20We%20introduce%20CLIP-AU%2C%20a%20lightweight%20AU-guided%20temporal%20learning%20method%20that%20integrates%20interpretable%20AU%20semantics%20into%20CLIP.%20It%20learns%20generic%2C%20subject-agnostic%20representations%20by%20aligning%20AU%20prompts%20with%20facial%20dynamics%2C%20enabling%20fine-grained%20ER%20without%20CLIP%20fine-tuning%20or%20LLM-generated%20text%20supervision.%20Although%20CLIP-AU%20models%20fine-grained%20AU%20semantics%2C%20it%20does%20not%20adapt%20to%20subject-specific%20variability%20in%20subtle%20expressions.%20To%20address%20this%20limitation%2C%20we%20propose%20CLIP-AUTT%2C%20a%20video-based%20test-time%20personalization%20method%20that%20dynamically%20adapts%20AU%20prompts%20to%20videos%20from%20unseen%20subjects.%20By%20combining%20entropy-guided%20temporal%20window%20selection%20with%20prompt%20tuning%2C%20CLIP-AUTT%20enables%20subject-specific%20adaptation%20while%20preserving%20temporal%20consistency.%20Our%20extensive%20experiments%20on%20three%20challenging%20video-based%20subtle%20ER%20datasets%2C%20BioVid%2C%20StressID%2C%20and%20BAH%2C%20indicate%20that%20CLIP-AU%20and%20CLIP-AUTT%20outperform%20state-of-the-art%20CLIP-based%20FER%20and%20TTA%20methods%2C%20achieving%20robust%20and%20personalized%20subtle%20ER.%20Our%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/osamazeeshan/CLIP-AUTT.&entry.1838667208=http%3A//arxiv.org/abs/2603.27999v2&entry.124074799=Read"},
{"title": "Symphony for Medical Coding: A Next-Generation Agentic System for Scalable and Explainable Medical Coding", "author": "Joakim Edin and Andreas Motzfeldt and Simon Flachs and Lars Maal\u00f8e", "abstract": "Medical coding translates free-text clinical documentation into standardized codes drawn from classification systems that contain tens of thousands of entries and are updated annually. It is central to billing, clinical research, and quality reporting, yet remains largely manual, slow, and error-prone. Existing automated approaches learn to predict a fixed set of codes from labeled data, thereby preventing adaptation to new codes or different coding systems without retraining on different data. They also provide no explanation for their predictions, limiting trust in safety-critical settings. We introduce Symphony for Medical Coding, a system that approaches the task the way expert human coders do: by reasoning over the clinical narrative with direct access to the coding guidelines. This design allows Symphony to operate across any coding system and to provide span-level evidence linking each predicted code to the text that supports it. We evaluate on two public benchmarks and three real-world datasets spanning inpatient, outpatient, emergency, and subspecialty settings across the United States and the United Kingdom. Symphony achieves state-of-the-art results across all settings, establishing itself as a flexible, deployment-ready foundation for automated clinical coding.", "link": "http://arxiv.org/abs/2603.29709v1", "date": "2026-03-31", "relevancy": 2.2361, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4477}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4477}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4463}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Symphony%20for%20Medical%20Coding%3A%20A%20Next-Generation%20Agentic%20System%20for%20Scalable%20and%20Explainable%20Medical%20Coding&body=Title%3A%20Symphony%20for%20Medical%20Coding%3A%20A%20Next-Generation%20Agentic%20System%20for%20Scalable%20and%20Explainable%20Medical%20Coding%0AAuthor%3A%20Joakim%20Edin%20and%20Andreas%20Motzfeldt%20and%20Simon%20Flachs%20and%20Lars%20Maal%C3%B8e%0AAbstract%3A%20Medical%20coding%20translates%20free-text%20clinical%20documentation%20into%20standardized%20codes%20drawn%20from%20classification%20systems%20that%20contain%20tens%20of%20thousands%20of%20entries%20and%20are%20updated%20annually.%20It%20is%20central%20to%20billing%2C%20clinical%20research%2C%20and%20quality%20reporting%2C%20yet%20remains%20largely%20manual%2C%20slow%2C%20and%20error-prone.%20Existing%20automated%20approaches%20learn%20to%20predict%20a%20fixed%20set%20of%20codes%20from%20labeled%20data%2C%20thereby%20preventing%20adaptation%20to%20new%20codes%20or%20different%20coding%20systems%20without%20retraining%20on%20different%20data.%20They%20also%20provide%20no%20explanation%20for%20their%20predictions%2C%20limiting%20trust%20in%20safety-critical%20settings.%20We%20introduce%20Symphony%20for%20Medical%20Coding%2C%20a%20system%20that%20approaches%20the%20task%20the%20way%20expert%20human%20coders%20do%3A%20by%20reasoning%20over%20the%20clinical%20narrative%20with%20direct%20access%20to%20the%20coding%20guidelines.%20This%20design%20allows%20Symphony%20to%20operate%20across%20any%20coding%20system%20and%20to%20provide%20span-level%20evidence%20linking%20each%20predicted%20code%20to%20the%20text%20that%20supports%20it.%20We%20evaluate%20on%20two%20public%20benchmarks%20and%20three%20real-world%20datasets%20spanning%20inpatient%2C%20outpatient%2C%20emergency%2C%20and%20subspecialty%20settings%20across%20the%20United%20States%20and%20the%20United%20Kingdom.%20Symphony%20achieves%20state-of-the-art%20results%20across%20all%20settings%2C%20establishing%20itself%20as%20a%20flexible%2C%20deployment-ready%20foundation%20for%20automated%20clinical%20coding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29709v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSymphony%2520for%2520Medical%2520Coding%253A%2520A%2520Next-Generation%2520Agentic%2520System%2520for%2520Scalable%2520and%2520Explainable%2520Medical%2520Coding%26entry.906535625%3DJoakim%2520Edin%2520and%2520Andreas%2520Motzfeldt%2520and%2520Simon%2520Flachs%2520and%2520Lars%2520Maal%25C3%25B8e%26entry.1292438233%3DMedical%2520coding%2520translates%2520free-text%2520clinical%2520documentation%2520into%2520standardized%2520codes%2520drawn%2520from%2520classification%2520systems%2520that%2520contain%2520tens%2520of%2520thousands%2520of%2520entries%2520and%2520are%2520updated%2520annually.%2520It%2520is%2520central%2520to%2520billing%252C%2520clinical%2520research%252C%2520and%2520quality%2520reporting%252C%2520yet%2520remains%2520largely%2520manual%252C%2520slow%252C%2520and%2520error-prone.%2520Existing%2520automated%2520approaches%2520learn%2520to%2520predict%2520a%2520fixed%2520set%2520of%2520codes%2520from%2520labeled%2520data%252C%2520thereby%2520preventing%2520adaptation%2520to%2520new%2520codes%2520or%2520different%2520coding%2520systems%2520without%2520retraining%2520on%2520different%2520data.%2520They%2520also%2520provide%2520no%2520explanation%2520for%2520their%2520predictions%252C%2520limiting%2520trust%2520in%2520safety-critical%2520settings.%2520We%2520introduce%2520Symphony%2520for%2520Medical%2520Coding%252C%2520a%2520system%2520that%2520approaches%2520the%2520task%2520the%2520way%2520expert%2520human%2520coders%2520do%253A%2520by%2520reasoning%2520over%2520the%2520clinical%2520narrative%2520with%2520direct%2520access%2 or%20their%20predictions%2C%20limiting%20trust%20in%20safety-critical%20settings.%20We%20introduce%20Symphony%20for%20Medical%20Coding%2C%20a%20system%20that%20approaches%20the%20task%20the%20way%20expert%20human%20coders%20do%3A%20by%20reasoning%20over%20the%20clinical%20narrative%20with%20direct%20access%20to%20the%20coding%20guidelines.%20This%20design%20allows%20Symphony%20to%20operate%20across%20any%20coding%20system%20and%20to%20provide%20span-level%20evidence%20linking%20each%20predicted%20code%20to%20the%20text%20that%20supports%20it.%20We%20evaluate%20on%20two%20public%20benchmarks%20and%20three%20real-world%20datasets%20spanning%20inpatient%2C%20outpatient%2C%20emergency%2C%20and%20subspecialty%20settings%20across%20the%20United%20States%20and%20the%20United%20Kingdom.%20Symphony%20achieves%20state-of-the-art%20results%20across%20all%20settings%2C%20establishing%20itself%20as%20a%20flexible%2C%20deployment-ready%20foundation%20for%20automated%20clinical%20coding.&entry.1838667208=http%3A//arxiv.org/abs/2603.29709v1&entry.124074799=Read"},
{"title": "Reasoning-Driven Synthetic Data Generation and Evaluation", "author": "Tim R. Davidson and Benoit Seguin and Enrico Bacis and Cesar Ilharco and Hamza Harkous", "abstract": "Although many AI applications of interest require specialized multi-modal models, relevant data to train such models is inherently scarce or inaccessible. Filling these gaps with human annotators is prohibitively expensive, error-prone, and time-consuming, leading model builders to increasingly consider synthetic data as a scalable alternative. However, existing synthetic data generation methods often rely on manual prompts, evolutionary algorithms, or extensive seed data from the target distribution - limiting their scalability, explainability, and control. In this paper, we introduce Simula: a novel reasoning-driven framework for data generation and evaluation. It employs a seedless, agentic approach to generate synthetic datasets at scale, allowing users to define desired dataset characteristics through an explainable and controllable process that enables fine-grained resource allocation. We show the efficacy of our approach on a variety of datasets, rigorously testing both intrinsic and downstream properties. Our work (1) offers guidelines for synthetic data mechanism design, (2) provides insights into generating and evaluating synthetic data at scale, and (3) unlocks new opportunities for developing and deploying AI in domains where data scarcity or privacy concerns are paramount.", "link": "http://arxiv.org/abs/2603.29791v1", "date": "2026-03-31", "relevancy": 2.209, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5669}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5589}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4989}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reasoning-Driven%20Synthetic%20Data%20Generation%20and%20Evaluation&body=Title%3A%20Reasoning-Driven%20Synthetic%20Data%20Generation%20and%20Evaluation%0AAuthor%3A%20Tim%20R.%20Davidson%20and%20Benoit%20Seguin%20and%20Enrico%20Bacis%20and%20Cesar%20Ilharco%20and%20Hamza%20Harkous%0AAbstract%3A%20Although%20many%20AI%20applications%20of%20interest%20require%20specialized%20multi-modal%20models%2C%20relevant%20data%20to%20train%20such%20models%20is%20inherently%20scarce%20or%20inaccessible.%20Filling%20these%20gaps%20with%20human%20annotators%20is%20prohibitively%20expensive%2C%20error-prone%2C%20and%20time-consuming%2C%20leading%20model%20builders%20to%20increasingly%20consider%20synthetic%20data%20as%20a%20scalable%20alternative.%20However%2C%20existing%20synthetic%20data%20generation%20methods%20often%20rely%20on%20manual%20prompts%2C%20evolutionary%20algorithms%2C%20or%20extensive%20seed%20data%20from%20the%20target%20distribution%20-%20limiting%20their%20scalability%2C%20explainability%2C%20and%20control.%20In%20this%20paper%2C%20we%20introduce%20Simula%3A%20a%20novel%20reasoning-driven%20framework%20for%20data%20generation%20and%20evaluation.%20It%20employs%20a%20seedless%2C%20agentic%20approach%20to%20generate%20synthetic%20datasets%20at%20scale%2C%20allowing%20users%20to%20define%20desired%20dataset%20characteristics%20through%20an%20explainable%20and%20controllable%20process%20that%20enables%20fine-grained%20resource%20allocation.%20We%20show%20the%20efficacy%20of%20our%20approach%20on%20a%20variety%20of%20datasets%2C%20rigorously%20testing%20both%20intrinsic%20and%20downstream%20properties.%20Our%20work%20%281%29%20offers%20guidelines%20for%20synthetic%20data%20mechanism%20design%2C%20%282%29%20provides%20insights%20into%20generating%20and%20evaluating%20synthetic%20data%20at%20scale%2C%20and%20%283%29%20unlocks%20new%20opportunities%20for%20developing%20and%20dep {"title": "Real-Time Operator Takeover for Visuomotor Diffusion Policy Training", "author": "Marco Moletta and Michael C. Welle and Nils Ingelhag and Jesper Munkeby and Danica Kragic", "abstract": "We present a Real-Time Operator Takeover (RTOT) paradigm that enables operators to seamlessly take control of a live visuomotor diffusion policy, guiding the system back to desirable states or providing targeted corrective demonstrations. Within this framework, the operator can intervene to correct the robot's motion, after which control is smoothly returned to the policy until further intervention is needed. We evaluate the takeover framework on three tasks spanning rigid, deformable, and granular objects, and show that incorporating targeted takeover demonstrations significantly improves policy performance compared with training on an equivalent number of initial demonstrations alone. Additionally, we provide an in-depth analysis of the Mahalanobis distance as a signal for automatically identifying undesirable or out-of-distribution states during execution. Supporting materials, including videos of the initial and takeover demonstrations and all experiments, are available on the project website: https://operator-takeover.github.io/", "link": "http://arxiv.org/abs/2502.02308v3", "date": "2026-03-31", "relevancy": 2.206, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5934}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5373}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5153}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Real-Time%20Operator%20Takeover%20for%20Visuomotor%20Diffusion%20Policy%20Training&body=Title%3A%20Real-Time%20Operator%20Takeov {"title": "Mind the Gap: A Framework for Assessing Pitfalls in Multimodal Active Learning", "author": "Dustin Eisenhardt and Yunhee Jeong and Florian Buettner", "abstract": "Multimodal learning enables neural networks to integrate information from heterogeneous sources, but active learning in this setting faces distinct challenges. These include missing modalities, differences in modality difficulty, and varying interaction structures. These are issues absent in the unimodal case. While the behavior of active learning strategies in unimodal settings is well characterized, their behavior under such multimodal conditions remains poorly understood. We introduce a new framework for benchmarking multimodal active learning that isolates these pitfalls using synthetic datasets, allowing systematic evaluation without confounding noise. Using this framework, we compare unimodal and multimodal query strategies and validate our findings on two real-world datasets. Our results show that models consistently develop imbalanced representations, relying primarily on one modality while neglecting others. Existing query methods do not mitigate this effect, and multimodal strategies do not consistently outperform unimodal ones. These findings highlight limitations of current active learning methods and underline the need for modality-aware query strategies that explicitly address these pitfalls. Code and benchmark resources will be made publicly available.", "link": "http://arxiv.org/abs/2603.29677v1", "date": "2026-03-31", "relevancy": 2.204, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.585}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5486}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "ht {"title": "Better than Average: Spatially-Aware Aggregation of Segmentation Uncertainty Improves Downstream Performance", "author": "Vanessa Emanuela Guarino and Claudia Winklmayr and Jannik Franzen and Josef Lorenz Rumberger and Manuel Pfeuffer and Sonja Greven and Klaus Maier-Hein and Carsten T. L\u00fcth and Christoph Karg and Dagmar Kainmueller", "abstract": "Uncertainty Quantification (UQ) is crucial for ensuring the reliability of automated image segmentations in safety-critical domains like biomedical image analysis or autonomous driving. In segmentation, UQ generates pixel-wise uncertainty scores that must be aggregated into image-level scores for downstream tasks like Out-of-Distribution (OoD) or failure detection. Despite routine use of aggregation strategies, their properties and impact on downstream task performance have not yet been comprehensively studied. Global Average is the default choice, yet it does not account for spatial and structural features of segmentation uncertainty. Alternatives like patch-, class- and threshold-based strategies exist, but lack systematic comparison, leading to inconsistent reporting and unclear best practices. We address this gap by (1) formally analyzing properties, limitations, and pitfalls of common strategies; (2) proposing novel strategies that incorporate spatial uncertainty structure and (3) benchmarking their performance on OoD and failure detection across ten datasets that vary in image geometry and structure. We find that aggregators leveraging spatial structure yield stronger performance in both downstream tasks studied. However, the performance of individual aggregators depends heavily on dataset characteristics, so we (4) propose a meta-aggregator that integrates multiple aggregators and performs robustly across datasets.", "link": "http://arxiv.org/abs/2603.29941v1", "date": "2026-03-31", "relevancy": 2.2004, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5957}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5476}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5055}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Better%20than%20Average%3A%20Spatially-Aware%20Aggregation%20of%20Segmentation%20Uncertainty%20Improves%20Downstream%20Performance&body=Title%3A%20Better%20than%20Average%3A%20Spatially-Aware%20Aggregation%20of%20Segmentation%20Uncertainty%20Improves%20Downstream%20Performance%0AAuthor%3A%20Vanessa%20Emanuela%20Guarino%20and%20Claudia%20Winklmayr%20and%20Jannik%20Franzen%20and%20Josef%20Lorenz%20Rumberger%20and%20Manuel%20Pfeuffer%20and%20Sonja%20Greven%20and%20Klaus%20Maier-Hein%20and%20Carsten%20T.%20L%C3%BCth%20and%20Christoph%20Karg%20and%20Dagmar%20Kainmueller%0AAbstract%3A%20Uncertainty%20Quantification%20%28UQ%29%20is%20crucial%20for%20ensuring%20the%20reliability%20of%20automated%20image%20segmentations%20in%20safety-critical%20domains%20like%20biomedical%20image%20analysis%20or%20autonomous%20driving.%20In%20segmentation%2C%20UQ%20generates%20pixel-wise%20uncertainty%20scores%20that%20must%20be%20aggregated%20into%20image-level%20scores%20for%20downstream%20tasks%20like%20Out-of-Distribution%20%28OoD%29%20or%20failure%20detection.%20Despite%20routine%20use%20of%20aggregation%20strategies%2C%20their%20properties%20and%20impact%20on%20downstream%20task%20performance%20have%20not%20yet%20been%20comprehensively%20studied.%20Global%20Average%20is%20the%20default%20choice%2C%20yet%20it%20does%20not%20account%20for%20spatial%20and%20structural%20features%20of%20segmentation%20uncertainty.%20Alternatives%20like%20patch-%2C%20class-%20and%20threshold-based%20strategies%20exist%2C%20but%20lack%20systematic%20comparison%2C%20leading%20to%20inconsistent%20reporting%20and%20unclear%20best%20practices.%20We%20address%20this%20gap%20by%20%281%29%20formally%20analyzing%20properties%2C%20limitations%2C%20and%20pitfalls%20of%20common%20strategies%3B%20%282%29%20proposing%20novel%20strategies%20that%20incorporate%20spatial%20uncertainty%20structure%20and%20%283%29%20benchmarking%20their%20performance%20on%20OoD%20and%20failure%20detection%20across%20ten%20datasets%20that%20vary%20in%20image%20geometry%20and%20structure.%20We%20find%20that%20aggregators%20leveraging%20spatial%20structure%20yield%20stronger%20performance%20in%20both%20downstream%20tasks%20studied.%20However%2C%20the%20performance%20of%20individual%20aggregators%20depends%20heavily%20on%20dataset%20characteristics%2C%20so%20we%20%284%29%20propose%20a%20meta-aggregator%20that%20integrates%20multiple%20aggregators%20and%20performs%20robustly%20across%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29941v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBetter%2520than%2520Average%253A%2520Spatially-Aware%2520Aggregation%2520of%2520Segmentation%2520Uncertainty%2520Improves%2520Downstream%2520Performance%26entry.906535625%3DVanessa%2520Emanuela%2520Guarino%2520and%2520Claudia%2520Winklmayr%2520and%2520Jannik%2520Franzen%2520and%2520Josef%2520Lorenz%2520Rumberger%2520and%2520Manuel%2520Pfeuffer%2520and%2520Sonja%2520Greven%2520and%2520Klaus%2520Maier-Hein%2520and%2520Carsten%2520T.%2520L%25C3%25BCth%2520and%2520Christoph%2520Karg%2520and%2520Dagmar%2520Kainmueller%26entry.1292438233%3DUncertainty%2520Quantification%2520%2528UQ%2529%2520is%2520crucial%2520for%2520ensuring%2520the%2520reliability%2520of%2520automated%2520image%2520segmentations%2520in%2520safety-critical%2520domains%2520like%2520biomedical%2520image%2520analysis%2520or%2520autonomous%2520driving.%2520In%2520segmentation%252C%2520UQ%2520generates%2520pixel-wise%252 v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Better%20than%20Average%3A%20Spatially-Aware%20Aggregation%20of%20Segmentation%20Uncertainty%20Improves%20Downstream%20Performance&entry.906535625=Vanessa%20Emanuela%20Guarino%20and%20Claudia%20Winklmayr%20and%20Jannik%20Franzen%20and%20Josef%20Lorenz%20Rumberger%20and%20Manuel%20Pfeuffer%20and%20Sonja%20Greven%20and%20Klaus%20Maier-Hein%20and%20Carsten%20T.%20L%C3%BCth%20and%20Christoph%20Karg%20and%20Dagmar%20Kainmueller&entry.1292438233=Uncertainty%20Quantification%20%28UQ%29%20is%20crucial%20for%20ensuring%20the%20reliability%20of%20automated%20image%20segmentations%20in%20safety-critical%20domains%20like%20biomedical%20image%20analysis%20or%20autonomous%20driving.%20In%20segmentation%2C%20UQ%20generates%20pixel-wise%20uncertainty%20scores%20that%20must%20be%20aggregated%20into%20image-level%20scores%20for%20downstream%20tasks%20like%20Out-of-Distribution%20%28OoD%29%20or%20failure%20detection.%20Despite%20routine%20use%20of%20aggregation%20strategies%2C%20their%20properties%20and%20impact%20on%20downstream%20task%20performance%20have%20not%20yet%20been%20comprehensively%20studied.%20Global%20Average%20is%20the%20default%20choice%2C%20yet%20it%20does%20not%20account%20for%20spatial%20and%20structural%20features%20of%20segmentation%20uncertainty.%20Alternatives%20like%20patch-%2C%20class-%20and%20threshold-based%20strategies%20exist%2C%20but%20lack%20systematic%20comparison%2C%20leading%20to%20inconsistent%20reporting%20and%20unclear%20best%20practices.%20We%20address%20this%20gap%20by%20%281%29%20formally%20analyzing%20properties%2C%20limitations%2C%20and%20pitfalls%20of%20common%20strategies%3B%20%282%29%20proposing%20novel%20strategies%20that%20incorporate%20spatial%20uncertainty%20structure%20and%20%283%29%20benchmarking%20their%20performance%20on%20OoD%20and%20failure%20detection%20across%20ten%20datasets {"title": "DIAL: Decoupling Intent and Action via Latent World Modeling for End-to-End VLA", "author": "Yi Chen and Yuying Ge and Hui Zhou and Mingyu Ding and Yixiao Ge and Xihui Liu", "abstract": "The development of Vision-Language-Action (VLA) models has been significantly accelerated by pre-trained Vision-Language Models (VLMs). However, most existing end-to-end VLAs treat the VLM primarily as a multimodal encoder, directly mapping vision-language features to low-level actions. This paradigm underutilizes the VLM's potential in high-level decision making and introduces training instability, frequently degrading its rich semantic representations. To address these limitations, we introduce DIAL, a framework bridging high-level decision making and low-level motor execution through a differentiable latent intent bottleneck. Specifically, a VLM-based System-2 performs latent world modeling by synthesizing latent visual foresight within the VLM's native feature space; this foresight explicitly encodes intent and serves as the structural bottleneck. A lightweight System-1 policy then decodes this predicted intent together with the current observation into precise robot actions via latent inverse dynamics. To ensure optimization stability, we employ a two-stage training paradigm: a decoupled warmup phase where System-2 learns to predict latent futures while System-1 learns motor control under ground-truth future guidance within a unified feature space, followed by seamless end-to-end joint optimization. This enables action-aware gradients to refine the VLM backbone in a controlled manner, preserving pre-trained knowledge. Extensive experiments on the RoboCasa GR1 Tabletop benchmark show that DIAL establishes a new state-of-the-art, achieving superior performance with 10x fewer demonstrations than prior methods. Furthermore, by leveraging heterogeneous human demonstrations, DIAL learns physically grounded manipulation priors and exhibits robust zero-shot generalization to unseen objects and novel configurations during real-world deployment on a humanoid robot.", "link": "http://arxiv.org/abs/2603.29844v1", "date": "2026-03-31", "relevancy": 2.1998, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5527}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5494}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5494}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DIAL%3A%20Decoupling%20Intent%20and%20Action%20via%20Latent%20World%20Modeling%20for%20End-to-End%20VLA&body=Title%3A%20DIAL%3A%20Decoupling%20Intent%20and%20Action%20via%20Latent%20World%20Modeling%20for%20End-to-End%20VLA%0AAuthor%3A%20Yi%20Chen%20and%20Yuying%20Ge%20and%20Hui%20Zhou%20and%20Mingyu%20Ding%20and%20Yixiao%20Ge%20and%20Xihui%20Liu%0AAbstract%3A%20The%20development%20of%20Vision-Language-Action%20%28VLA%29%20models%20has%20been%20significantly%20accelerated%20by%20pre-trained%20Vision-Language%20Models%20%28VLMs%29.%20However%2C%20most%20existing%20end-to-end%20VLAs%20treat%20the%20VLM%20primarily%20as%20a%20multimodal%20encoder%2C%20directly%20mapping%20vision-language%20features%20to%20low-level%20actions.%20This%20paradigm%20underutilizes%20the%20VLM%27s%20potential%20in%20high-level%20decision%20making%20and%20introduces%20training%20instability%2C%20frequently%20degrading%20its%20rich%20semantic%20representations.%20To%20address%20these%20limitations%2C%20we%20introduce%20DIAL%2C%20a%20framework%20bridging%20high-level%20decision%20making%20and%20low-level%20motor%20execution%20through%20a%20differentiable%20latent%20intent%20bottleneck.%20Specifically%2C%20a%20VLM-based%20System-2%20performs%20latent%20world%20modeling%20by%20synthesizing%20latent%20visual%20foresight%20within%20the%20VLM%27s%20native%20feature%20space%3B%20this%20foresight%20explicitly%20encodes%20intent%20and%20serves%20as%20the%20structural%20bottleneck.%20A%20lightweight%20System-1%20policy%20then%20decodes%20this%20predicted%20intent%20together%20with%20the%20current%20observation%20into%20precise%20robot%20actions%20via%20latent%20inverse%20dynamics.%20To%20ensure%20optimization%20stability%2C%20we%20employ%20a%20two-stage%20training%20paradigm%3A%20a%20decoupled%20warmup%20phase%20where%20System-2%20learns%20to%20predict%20latent%20futures%20while%20System-1%20learns%20motor%20control%20under%20ground-truth%20future%20guidance%20within%20a%20unified%20feature%20space%2C%20followed%20by%20seamless%20end-to-end%20joint%20optimization.%20This%20enables%20action-aware%20gradients%20to%20refine%20the%20VLM%20backbone%20in%20a%20controlled%20manner%2C%20preserving%20pre-trained%20knowledge.%20Extensive%20experiments%20on%20the%20RoboCasa%20GR1%20Tabletop%20benchmark%20show%20that%20DIAL%20establishes%20a%20new%20state-of-the-art%2C%20achieving%20superior%20performance%20with%2010x%20fewer%20demonstrations%20than%20prior%20methods.%20Furthermore%2C%20by%20leveraging%20heterogeneous%20human%20demonstrations%2C%20DIAL%20learns%20physically%20grounded%20manipulation%20priors%20and%20exhibits%20robust%20zero-shot%20generalization%20to%20unseen%20objects%20and%20novel%20configurations%20during%20real-world%20deployment%20on%20a%20humanoid%20robot.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29844v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDIAL%253A%2520Decoupling%2520Intent%2520and%2520Action%2520via%2520Latent%2520World%2520Modeling%2520for%2520End-to-End%2520VLA%26entry.906535625%3DYi%2520Chen%2520and%2520Yuying%2520Ge%2520and%2520Hui%2520Zhou%2520and%2520Mingyu%2520Ding%2520and%2520Yixiao%2520G {"title": "Multi-Feature Fusion Approach for Generative AI Images Detection", "author": "Abderrezzaq Sendjasni and Mohamed-Chaker Larabi", "abstract": "The rapid evolution of Generative AI (GenAI) models has led to synthetic images of unprecedented realism, challenging traditional methods for distinguishing them from natural photographs. While existing detectors often rely on single-feature spaces, such as statistical regularities, semantic embeddings, or texture patterns, these approaches tend to lack robustness when confronted with diverse and evolving generative models. In this work, we investigate and systematically evaluate a multi-feature fusion framework that combines complementary cues from three distinct spaces: (1) Mean Subtracted Contrast Normalized (MSCN) features capturing low-level statistical deviations; (2) CLIP embeddings encoding high-level semantic coherence; and (3) Multi-scale Local Binary Patterns (MLBP) characterizing mid-level texture anomalies. Through extensive experiments on four benchmark datasets covering a wide range of generative models, we show that individual feature spaces exhibit significant performance variability across different generators. Crucially, the fusion of all three representations yields superior and more consistent performance, particularly in a challenging mixed-model scenario. Compared to state-of-the-art methods, the proposed framework yields consistently improved performance across all evaluated datasets. Overall, this work highlights the importance of hybrid representations for robust GenAI image detection and provides a principled framework for integrating complementary visual cues.", "link": "http://arxiv.org/abs/2603.29788v1", "date": "2026-03-31", "relevancy": 2.1986, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5621}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link" {"title": "MAPLE: Multi-Path Adaptive Propagation with Level-Aware Embeddings for Hierarchical Multi-Label Image Classification", "author": "Boshko Koloski and Marjan Stoimchev and Jurica Levati\u0107 and Dragi Kocev and Sa\u0161o D\u017eeroski", "abstract": "Hierarchical multi-label classification (HMLC) is essential for modeling structured label dependencies in remote sensing. Yet existing approaches struggle in multi-path settings, where images may activate multiple taxonomic branches, leading to underuse of hierarchical information. We propose MAPLE (Multi-Path Adaptive Propagation with Level-Aware Embeddings), a framework that integrates (i) hierarchical semantic initialization from graph-aware textual descriptions, (ii) graph-based structure encoding via graph convolutional networks (GCNs), and (iii) adaptive multi-modal fusion that dynamically balances semantic priors and visual evidence. An adaptive level-aware objective automatically selects appropriate losses per hierarchy level. Evaluations on CORINE-aligned remote sensing datasets (AID, DFC-15, and MLRSNet) show consistent improvements of up to +42% in few-shot regimes while adding only 2.6% parameter overhead, demonstrating that MAPLE effectively and efficiently models hierarchical semantics for Earth observation (EO).", "link": "http://arxiv.org/abs/2603.29784v1", "date": "2026-03-31", "relevancy": 2.1945, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5651}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5448}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5336}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAPLE%3A%20Multi-Path%20Adaptive%20Propagation% {"title": "Scaling Video Pretraining for Surgical Foundation Models", "author": "Sicheng Lu and Zikai Xiao and Jianhui Wei and Danyu Sun and Qi Lu and Keli Hu and Yang Feng and Jian Wu and Zongxin Yang and Zuozhu Liu", "abstract": "Surgical video understanding is essential for computer-assisted interventions, yet existing surgical foundation models remain constrained by limited data scale, procedural diversity, and inconsistent evaluation, often lacking a reproducible training pipeline. We propose SurgRec, a scalable and reproducible pretraining recipe for surgical video understanding, instantiated with two variants: SurgRec-MAE and SurgRec-JEPA. We curate a large multi-source corpus of 10,535 videos and 214.5M frames spanning endoscopy, laparoscopy, cataract, and robotic surgery. Building on this corpus, we develop a unified pretraining pipeline with balanced sampling and standardize a reproducible benchmark across 16 downstream datasets and four clinical domains with consistent data splits. Across extensive comparisons against SSL baselines and vision-language models, SurgRec consistently achieves superior performance across downstream datasets. In contrast, VLMs prove unreliable for fine-grained temporal recognition, exhibiting both performance gaps and sensitivity to prompt phrasing. Our work provides a reproducible, scalable foundation for the community to build more general surgical video models. All code, models, and data will be publicly released.", "link": "http://arxiv.org/abs/2603.29966v1", "date": "2026-03-31", "relevancy": 2.1811, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.548}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5316}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scaling%20Video%20Pretraining%20for%20Surgical%20Foundation%20Models&body=Title%3A%20Scaling%20Video%20Pretraining%20for%20Surgical%20Foundation%20Models%0AAuthor%3A%20Sicheng%20Lu%20and%20Zikai%20Xiao%20and%20Jianhui%20Wei%20and%20Danyu%20Sun%20and%20Qi%20Lu%20and%20Keli%20Hu%20and%20Yang%20Feng%20and%20Jian%20Wu%20and%20Zongxin%20Yang%20and%20Zuozhu%20Liu%0AAbstract%3A%20Surgical%20video%20understanding%20is%20essential%20for%20computer-assisted%20interventions%2C%20yet%20existing%20surgical%20foundation%20models%20remain%20constrained%20by%20limited%20data%20scale%2C%20procedural%20diversity%2C%20and%20inconsistent%20evaluation%2C%20often%20lacking%20a%20reproducible%20training%20pipeline.%20We%20propose%20SurgRec%2C%20a%20scalable%20and%20reproducible%20pretraining%20recipe%20for%20surgical%20video%20understanding%2C%20instantiated%20with%20two%20variants%3A%20SurgRec-MAE%20and%20SurgRec-JEPA.%20We%20curate%20a%20large%20multi-source%20corpus%20of%2010%2C535%20videos%20and%20214.5M%20frames%20spanning%20endoscopy%2C%20laparoscopy%2C%20cataract%2C%20and%20robotic%20surgery.%20Building%20on%20this%20corpus%2C%20we%20develop%20a%20unified%20pretraining%20pipeline%20with%20balanced%20sampling%20and%20standardize%20a%20reproducible%20benchmark%20across%2016%20downstream%20datasets%20and%20four%20clinical%20domains%20with%20consistent%20data%20splits.%20Across%20extensive%20comparisons%20against%20SSL%20baselines%20and%20vision-language%20models%2C%20SurgRec%20consistently%20achieves%20superior%20performance%20across%20downstream%20datasets.%20In%20contrast%2C%20VLMs%20prove%20unreliable%20for%20fine-grained%20temporal%20recognition%2C%20exhibiting%20both%20performance%20gaps%20and%20sensitivity%20to%20prompt%20phrasing.%20Our%20work%20provides%20a%20reproducible%2C%20scalable%20foundation%20for%20the%20community%20to%20build%20more%20general%2 {"title": "From Skeletons to Semantics: Design and Deployment of a Hybrid Edge-Based Action Detection System for Public Safety", "author": "Ganen Sethupathy and Lalit Dumka and Jan Schagen", "abstract": "Public spaces such as transport hubs, city centres, and event venues require timely and reliable detection of potentially violent behaviour to support public safety. While automated video analysis has made significant progress, practical deployment remains constrained by latency, privacy, and resource limitations, particularly under edge-computing conditions. This paper presents the design and demonstrator-based deployment of a hybrid edge-based action detection system that combines skeleton-based motion analysis with vision-language models for semantic scene interpretation. Skeleton-based processing enables continuous, privacy-aware monitoring with low computational overhead, while vision-language models provide contextual understanding and zero-shot reasoning capabilities for complex and previously unseen situations. Rather than proposing new recognition models, the contribution focuses on a system-level comparison of both paradigms under realistic edge constraints. The system is implemented on a GPU-enabled edge device and evaluated with respect to latency, resource usage, and operational trade-offs using a demonstrator-based setup. The results highlight the complementary strengths and limitations of motioncentric and semantic approaches and motivate a hybrid architecture that selectively augments fast skeletonbased detection with higher-level semantic reasoning. The presented system provides a practical foundation for privacy-aware, real-time video analysis in public safety applications.", "link": "http://arxiv.org/abs/2603.29777v1", "date": "2026-03-31", "relevancy": 2.1735, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": {"title": "From Moments to Models: Graphon-Mixture Learning for Mixup and Contrastive Learning", "author": "Ali Azizpour and Reza Ramezanpour and Santiago Segarra", "abstract": "Real-world graph datasets often arise from mixtures of populations, where graphs are generated by multiple distinct underlying distributions. In this work, we propose a unified framework that explicitly models graph data as a mixture of probabilistic graph generative models represented by graphons. To characterize and estimate these graphons, we leverage graph moments (motif densities) to cluster graphs generated from the same underlying model. We establish a novel theoretical guarantee, deriving a tighter bound showing that graphs sampled from structurally similar graphons exhibit similar motif densities with high probability. This result enables principled estimation of graphon mixture components. We show how incorporating estimated graphon mixture components enhances two widely used downstream paradigms: graph data augmentation via mixup and graph contrastive learning. By conditioning these methods on the underlying generative models, we develop graphon-mixture-aware mixup (GMAM) and model-aware graph contrastive learning (MGCL). Extensive experiments on both simulated and real-world datasets demonstrate strong empirical performance. In supervised learning, GMAM outperforms existing augmentation strategies, achieving new state-of-the-art accuracy on 6 out of 7 datasets. In unsupervised learning, MGCL performs competitively across seven benchmark datasets and achieves the lowest average rank overall.", "link": "http://arxiv.org/abs/2510.03690v3", "date": "2026-03-31", "relevancy": 2.1529, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5493}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5432}, {"title": "Self-supervised Photo {"title": "A Provable Energy-Guided Test-Time Defense Boosting Adversarial Robustness of Large Vision-Language Models", "author": "Mujtaba Hussain Mirza and Antonio D'Orazio and Odelia Melamed and Iacopo Masi", "abstract": "Despite the rapid progress in multimodal models and Large Visual-Language Models (LVLM), they remain highly susceptible to adversarial perturbations, raising serious concerns about their reliability in real-world use. While adversarial training has become the leading paradigm for building models that are robust to adversarial attacks, Test-Time Transformations (TTT) have emerged as a promising strategy to boost robustness at inference. In light of this, we propose Energy-Guided Test-Time Transformation (ET3), a lightweight, training-free defense that enhances the robustness by minimizing the energy of the input samples. Our method is grounded in a theory that proves our transformation succeeds in classification under reasonable assumptions. We present extensive experiments demonstrating that ET3 provides a strong defense for classifiers, zero-shot classification with CLIP, and also for boosting the robustness of LVLMs in tasks such as Image Captioning and Visual Question Answering. Code is available at github.com/OmnAI-Lab/Energy-Guided-Test-Time-Defense .", "link": "http://arxiv.org/abs/2603.26984v2", "date": "2026-03-31", "relevancy": 2.1445, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5419}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5393}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5306}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Provable%20Energy-Guided%20Test-Time%20Defense%20Boosting%20Adversarial%20Robustness%20of%20Large%20Vision-Language%20Models&body=Title%3A%20A%20Provable%20Energy-Guided%20Test-Time%20Defense%20Boosting%20Adversarial%20Robustness%20of%20Large%20Vision-Language%20Models%0AAuthor%3A%20Mujtaba%20Hussain%20Mirza%20and%20Antonio%20D%27Orazio%20and%20Odelia%20Melamed%20and%20Iacopo%20Masi%0AAbstract%3A%20Despite%20the%20rapid%20progress%20in%20multimodal%20models%20and%20Large%20Visual-Language%20Models%20%28LVLM%29%2C%20they%20remain%20highly%20susceptible%20to%20adversarial%20perturbations%2C%20raising%20serious%20concerns%20about%20their%20reliability%20in%20real-world%20use.%20While%20adversarial%20training%20has%20become%20the%20leading%20paradigm%20for%20building%20models%20that%20are%20robust%20to%20adversarial%20attacks%2C%20Test-Time%20Transformations%20%28TTT%29%20have%20emerged%20as%20a%20promising%20strategy%20to%20boost%20robustness%20at%20inference.%20In%20light%20of%20this%2C%20we%20propose%20Energy-Guided%20Test-Time%20Transformation%20%28ET3%29%2C%20a%20lightweight%2C%20training-free%20defense%20that%20enhances%20the%20robustness%20by%20minimizing%20the%20energy%20of%20the%20input%20samples.%20Our%20method%20is%20grounded%20in%20a%20theory%20that%20proves%20our%20transformation%20succeeds%20in%20classification%20under%20reasonable%20assumptions.%20We%20present%20extensive%20experiments%20demonstrating%20that%20ET3%20provides%20a%20strong%20defense%20for%20classifiers%2C%20zero-shot%20classification%20with%20CLIP%2C%20and%20also%20for%20boosting%20the%20robustness%20of%20LVLMs%20in%20tasks%20such%20as%20Image%20Captioning%20and%20Visual%20Question%20Answering.%20Code%20is%20available%20at%20github.com/OmnAI-Lab/Energy-Guided-Test-Time-Defense%20.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26984v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Provable%2520Energy-Guided%2520Test-Time%2520Defense%2520Boosting%2520Adversarial%2520Robustness%2520of%2520Large%2520Vision-Language%2520Models%26entry.906535625%3DMujtaba%2520Hussain%2520Mirza%2520and%2520Antonio%2520D%2527Orazio%2520and%2520Odelia%2520Melamed%2520and%2520Iacopo%2520Masi%26entry.1292438233%3DDespite%2520the%2520rapid%2520progress%2520in%2520multimodal%2520models%2520and%2520Large%2520Visual-Language%2520Models%2520%2528LVLM%2529%252C%2520they%2520remain%2520highly%2520susceptible%2520to%2520adversarial%2520perturbations%252C%2520raising%2520serious%2520concerns%2520about%2520their%2520reliability%2520in%2520real-world%2520use.%2520While%2520adversarial%2520training%2520has%2520become%2520the%2520leading%2520paradigm%2520for%2520building%2520models%2520that%2520are%2520robust%2520to%2520adversarial%2520attacks%252C%2520Test-Time%2520Transformations%2520%2528TTT%2529%2520have%2520emerged%2520as%2520a%2520promising%2520strategy%2520to%2520boost%2520robustness%2520at%2520inference.%2520In%2520light%2520of%2520this%252C%2520we%2520propose%2520Energy-Guided%2520Test-Time%2520Transformation%2520%2528ET3%2529%252C%2520a%2520lightweight%252C%2520training-free%2520defense%2520that%2520enhances%2520the%2520robustness%2520by%2520minimizing%2520the%2520energy%2520of%2520the%2520input%2520samples.%2520Our%2520method%2520is%2520grounded%2520in%2520a%2520theory%2520that%2520proves%2520our%2520transformation%2520succeeds%2520in%2520classification%2520under%2520reasonable%2520assumptions.%2520We%2520present%2520extensive%2520experiments%2520demonstrating%2520that%2520ET3%2520provides%2520a%2520strong%2520defense%2520for%2520classifiers%252C%2520zero-shot%2520classification%2520with%2520CLIP%252C%2520and%2520also%2520for%2520boosting%2520the%2520robustness%2520of%2520LVLMs%2520in%2520tasks%2520such%2520as%2520Image%2520Captioning%2520and%2520Visual%2520Question%2520Answering.%2520Code%2520is%2520available%2520at%2520github.com/OmnAI-Lab/Energy-Guided-Test-Time-Defense%2520.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26984v2%26entry.12 {"title": "Towards Empowering Consumers through Sentence-level Readability Scoring in German ESG Reports", "author": "Benjamin Josef Sch\u00fc\u00dfler and Jakob Prange", "abstract": "With the ever-growing urgency of sustainability in the economy and society, and the massive stream of information that comes with it, consumers need reliable access to that information. To address this need, companies began publishing so called Environmental, Social, and Governance (ESG) reports, both voluntarily and forced by law. To serve the public, these reports must be addressed not only to financial experts but also to non-expert audiences. But are they written clearly enough? In this work, we extend an existing sentence-level dataset of German ESG reports with crowdsourced readability annotations. We find that, in general, native speakers perceive sentences in ESG reports as easy to read, but also that readability is subjective. We apply various readability scoring methods and evaluate them regarding their prediction error and correlation with human rankings. Our analysis shows that, while LLM prompting has potential for distinguishing clear from hard-to-read sentences, a small finetuned transformer predicts human readability with the lowest error. Averaging predictions of multiple models can slightly improve the performance at the cost of slower inference.", "link": "http://arxiv.org/abs/2603.29861v1", "date": "2026-03-31", "relevancy": 2.1275, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4347}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4209}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4209}], "mailto": "mailto:haoxiang.li.2024@gmail.com? {"title": "Training-Free Dynamic Upcycling of Expert Language Models", "author": "Eros Fan\u00ec and O\u011fuzhan Ersoy", "abstract": "Large Language Models (LLMs) have achieved remarkable performance on a wide range of specialized tasks, exhibiting strong problem-solving capabilities. However, training these models is prohibitively expensive, and they often lack domain-specific expertise because they rely on general knowledge datasets. Expertise finetuning can address this issue; however, it often leads to overspecialization, and developing a single multi-domain expert remains difficult due to diverging objectives. Furthermore, multitask training is challenging due to interference and catastrophic forgetting. Existing work proposes combining the expertise of dense models within a Mixture of Experts (MoE) architecture, although this approach still requires multitask finetuning. To address these issues, we introduce Dynamic Upcycling MoE (DUME), a novel approach that reuses dense experts trained on different domains to construct a unified MoE model. Our method builds a single multitask model that preserves the capabilities of the original dense experts without requiring additional training. DUME is both cost-efficient and scalable: by leveraging the closed-form solution of ridge regression, it eliminates the need for further optimization and enables experts to be added dynamically while maintaining the model's original performance. We demonstrate that DUME consistently outperforms baseline approaches in both causal language modeling and reasoning settings. Finally, we also show that the DUME model can be fine-tuned to further improve performance. We show that, in the causal language modeling setting, DUME can retain up to 97.6% of a dense expert model specialized in one particular domain, and that it can also surpass it in the reasoning setting, where it can achieve 102.1% of the dense expert performance. Our code is available at: github.com/gensyn-ai/dume.", "link": "http://arxiv.org/abs/2603.29765v1", "date": "2026-03-31", "relevancy": 2.1267, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5397}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5349}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5253}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-Free%20Dynamic%20Upcycling%20of%20Expert%20Language%20Models&body=Title%3A%20Training-Free%20Dynamic%20Upcycling%20of%20Expert%20Language%20Models%0AAuthor%3A%20Eros%20Fan%C3%AC%20and%20O%C4%9Fuzhan%20Ersoy%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20remarkable%20performance%20on%20a%20wide%20range%20of%20specialized%20tasks%2C%20exhibiting%20strong%20problem-solving%20capabilities.%20However%2C%20training%20these%20models%20is%20prohibitively%20expensive%2C%20and%20they%20often%20lack%20domain-specific%20expertise%20because%20they%20rely%20on%20general%20knowledge%20datasets.%20Expertise%20finetuning%20can%20address%20this%20issue%3B%20however%2C%20it%20often%20leads%20to%20overspecialization%2C%20and%20developing%20a%20single%20multi-domain%20expert%20remains%20difficult%20due%20to%20diverging%20objectives.%20Furthermore%2C%20multitask%20training%20is%20challenging%20due%20to%20interference%20and%20catastrophic%20forgetting.%20Existing%20work%20proposes%20combining%20the%20expertise%20of%20dense%20models%20within%20a%20Mixture%20of%20Experts%20%28MoE%29%20architecture%2C%20although%20this%20approach%20still%20requires%20multitask%20finetuning.%20To%20address%20these%20issues%2C%20we%20introduce%20Dynamic%20Upcycling%20MoE%20%28DUME%29%2C%20a%20novel%20approach%20that%20reuses%20dense%20experts%20trained%20on%20different%20domains%20to%20construct%20a%20unified%20MoE%20model.%20Our%20method%20builds%20a%20single%20multitask%20model%20that%20preserves%20the%20capabilities%20of%20the%20original%20dense%20experts%20without%20requiring%20additional%20training.%20DUME%20is%20both%20cost-efficient%20and%20scalable%3A%20by%20leveraging%20the%20closed-form%20solution%20of%20ridge%20regression%2C%20it%20eliminates%20the%20need%20for%20further%20optimization%20and%20enables%20experts%20to%20be%20added%20dynamically%20while%20maintaining%20the%20model%27s%20original%20performance.%20We%20demonstrate%20that%20DUME%20consistently%20outperforms%20baseline%20approaches%20in%20both%20causal%20language%20modeling%20and%20reasoning%20settings.%20Finally%2C%20we%20also%20show%20that%20the%20DUME%20model%20can%20be%20fine-tuned%20to%20further%20improve%20performance.%20We%20show%20that%2C%20in%20the%20causal%20language%20modeling%20setting%2C%20DUME%20can%20retain%20up%20to%2097.6%25%20of%20a%20dense%20expert%20model%20specialized%20in%20one%20particular%20domain%2C%20and%20that%20it%20can%20also%20surpass%20it%20in%20the%20reasoning%20setting%2C%20where%20it%20can%20achieve%20102.1%25%20of%20the%20dense%20expert%20performance.%20Our%20code%20is%20available%20at%3A%20github.com/gensyn-ai/dume.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29765v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraining-Free%2520Dynamic%2520Upcycling%2520of%2520Expert%2520Language%2520Models%26entry.906535625%3DEros%2520Fan%25C3%25AC%2520and%2520O%25C4%259Fuzhan%2520Ersoy%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520achieved%2520remarkable%2520performance%2520on%2520a%2520wide%2520range%2520of%2520specialized%2520tasks%252C%2520exhibiting%2520strong%2520problem-solving%2520capabilities.%2520However%252C%2520training%2520these%2520models%2520is%2520prohibitively%2520expensive%252C%2520and%2520they%2520often%2520lack%2520domain-specific%2520expertise%2520because%2520they%2520rely%2520on%2520general%2520knowledge%2520datasets.%2520Expertise%2520finetuning%2520can%2520address%2520this%2520issue%253B%2520however%252C%2520it%2520often%2520leads%2520to%2520overspecialization%252C%2520and%2520developing%2520a%2520single%2520multi-domain%2520expert%2520remains%2520difficult%2520due%2520to%2520diverging%2520objectives.%2520Furthermore%252C%2520multitask%2520training%2520is%2520challenging%2520due%2520to%2520interference%2520and%2520catastrophic%2520forgetting.%2520Existing%2520work%2520proposes%2520combining%2520the%2520expertise%2520of%2520dense%2520models%2520within%2520a%2520Mixture%2520of%2520Experts%2520%2528MoE%2529%2520architecture%252C%2520although%2520this%2520approach%2520still%2520requires%2520multitask%2520finetuning.%2520To%2520address%2520these%2520issues%252C%2520we%2520introduce%2520Dynamic%2520Upcycling%2520MoE%2520%2528DUME%2529%252C%2520a%2520novel%2520approach%2520that%2520reuses%2520dense%2520experts%2520trained%2520on%2520different%2520domains%2520to%2520construct%2520a%2520unified%2520MoE%2520model.%2520Our%2520method%2520builds%2520a%2520single%2520multitask%2520model%2520that%2520preserves%2520the%2520capabilities%2520of%2520the%2520original%2520dense%2520experts%2520without%2520requiring%2520additional%2520training.%2520DUME%2520is%2520both%2520cost-efficient%2520and%2520scalable%253A%2520by%2520leveraging%2520the%2520closed-form%2520solution%2520of%2520ridge%2520regression%252C%2520it%2520eliminates%2520the%2520need%2520for%2520further%2520optimization%2520and%2520enables%2520experts%2520to%2520be%2520added%2520dynamically%2520while%2520maintaining%2520the%2520model%2527s%2520original%2520performance.%2520We%2520demonstrate%2520that%2520DUME%2520consistently%2520outperforms%2520baseline%2520approaches%2520in%2520both%2520causal%2520language%2520modeling%2520and%2520reasoning%2520settings.%2520Finally%252C%2520we%2520also%2520show%2520that%2520the%2520DUME%2520model%2520can%2520be%2520fine-tuned%2520to%2520further%2520improve%2520performance.%2520We%2520show%2520that%252C%2520in%2520the%2520causal%2520language%2520modeling%2520setting%252C%2520DUME%2520can%2520retain%2520up%2520to%252097.6%2525%2520of%2520a%2520dense%2520expert%2520model%2520specialized%2520in%2520one%2520particular%2520domain%252C%2520and%2520that%2520it%2520can%2520also%2520surpass%2520it%2520in%2520the%2520reasoning%2520setting%252C%2520where%2520it%2520can%2520achieve%2520102.1%2525%2520of%2520the%2520dense%2520expert%2520performance.%2520Our%2520code%2520is%2520available%2520at%253A%2520github.com/gensyn-ai/dume.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.29765v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Training-Free%20Dynamic%20Upcycling%20of%20Expert%20Language%20Models&entry.906535625=Eros%20Fan%C3%AC%20and%20O%C4%9Fuzhan%20Ersoy&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20remarkable%20performance%20on%20a%20wide%20range%20of%20specialized%20tasks%2C%20exhibiting%20strong%20problem-solving%20capabilities.%20However%2C%20training%20these%20models%20is%20prohibitively%20expensive%2C%20and%20they%20often%20lack%20domain-specific%20expertise%20because%20they%20rely%20on%20general%20knowledge%20datasets.%20Expertise%20finetuning%20can%20address%20this%20issue%3B%20however%2C%20it%20often%20leads%20to%20overspecialization%2C%20and%20developing%20a%20single%20multi-domain%20expert%20remains%20difficult%20due%20to%20diverging%20objectives.%20Furthermore%2C%20multitask%20training%20is%20challenging%20due%20to%20interference%20and%20catastrophic%20forgetting.%20Existing%20work%20proposes%20combining%20the%20expertise%20of%20dense%20models%20within%20a%20Mixture%20of%20Experts%20%28MoE%29%20architecture%2C%20although%20this%20approach%20still%20requires%20multitask%20finetuning.%20To%20ad

{"title": "CLAY: Conditional Visual Similarity Modulation in Vision-Language Embedding Space", "author": "Sohwi Lim and Lee Hyoseok and Jungjoon Park and Tae-Hyun Oh", "abstract": "Human perception of visual similarity is inherently adaptive and subjective, depending on the users' interests and focus. However, most image retrieval systems fail to reflect this flexibility, relying on a fixed, monolithic metric that cannot incorporate multiple conditions simultaneously. To address this, we propose CLAY, an adaptive similarity computation method that reframes the embedding space of pretrained Vision-Language Models (VLMs) as a text-conditional similarity space without additional training. This design separates the textual conditioning process and visual feature extraction, allowing highly efficient and multi-conditioned retrieval with fixed visual embeddings. We also construct a synthetic evaluation dataset CLAY-EVAL, for comprehensive assessment under diverse conditioned retrieval settings. Experiments on standard datasets and our proposed dataset show that CLAY achieves high retrieval accuracy and notable computational efficiency compared to previous works.", "link": "http://arxiv.org/abs/2604.11539v1", "date": "2026-04-13", "relevancy": 2.835, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.579}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.561}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.561}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLAY%3A%20Conditional%20Visual%20Similarity%20Modulation%20in%20Vision-Language%20Embedding%20Space&body=Title%3A%20CLAY%3A%20Conditional%20Visual%20Similarity%20Modulation%20in%20Vision-Language%20Embedding%20Space%0AAuthor%3A%20Sohwi%20Lim%20and%20Lee%20Hyoseok%20and%20Jungjoon%20Park%20and%20Tae-Hyun%20Oh%0AAbstract%3A%20Human%20perception%20of%20visual%20similarity%20is%20inherently%20adaptive%20and%20subjective%2C%20depending%20on%20the%20users%27%20interests%20and%20focus.%20However%2C%20most%20image%20retrieval%20systems%20fail%20to%20reflect%20this%20flexibility%2C%20relying%20on%20a%20fixed%2C%20monolithic%20metric%20that%20cannot%20incorporate%20multiple%20conditions%20simultaneously.%20To%20address%20this%2C%20we%20propose%20CLAY%2C%20an%20adaptive%20similarity%20computation%20method%20that%20reframes%20the%20embedding%20space%20of%20pretrained%20Vision-Language%20Models%20%28VLMs%29%20as%20a%20text-conditional%20similarity%20space%20without%20additional%20training.%20This%20design%20separates%20the%20textual%20conditioning%20process%20and%20visual%20feature%20extraction%2C%20allowing%20highly%20efficient%20and%20multi-conditioned%20retrieval%20with%20fixed%20visual%20embeddings.%20We%20also%20construct%20a%20synthetic%20evaluation%20dataset%20CLAY-EVAL%2C%20for%20comprehensive%20assessment%20under%20diverse%20conditioned%20retrieval%20settings.%20Experiments%20on%20standard%20datasets%20and%20our%20proposed%20dataset%20show%20that%20CLAY%20achieves%20high%20retrieval%20accuracy%20and%20notable%20computational%20efficiency%20compared%20to%20previous%20works.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11539v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLAY%253A%2520Conditional%2520Visual%2520Similarity%2520Modulation%2520in%2520Vision-Language%2520Embedding%2520Space%26entry.906535625%3DSohwi%2520Lim%2520and%2520Lee%2520Hyoseok%2520and%2520Jungjoon%2520Park%2520and%2520Tae-Hyun%2520Oh%26entry.1292438233%3DHuman%2520perception%2520of%2520visual%2520similarity%2520is%2520inherently%2520adaptive%2520and%2520subjective%252C%2520depending%2520on%2520the%2520u {"title": "SpatialScore: Towards Comprehensive Evaluation for Spatial Intelligence", "author": "Haoning Wu and Xiao Huang and Yaohui Chen and Ya Zhang and Yanfeng Wang and Weidi Xie", "abstract": "Existing evaluations of multimodal large language models (MLLMs) on spatial intelligence are typically fragmented and limited in scope. In this work, we aim to conduct a holistic assessment of the spatial understanding capabilities of modern MLLMs and propose complementary data-driven and agent-based solutions. Specifically, we make the following contributions: (i) we introduce SpatialScore, to our knowledge, the most comprehensive and diverse benchmark for multimodal spatial intelligence to date. It covers multiple visual data types, input modalities, and question-answering formats, and contains approximately 5K manually verified samples spanning 30 distinct tasks; (ii) using SpatialScore, we extensively evaluate 49 representative MLLMs, revealing persistent challenges and a substantial gap between current models and human-level spatial intelligence; (iii) to advance model capabilities, we construct SpatialCorpus, a large-scale training resource with 331K multimodal QA samples that supports fine-tuning on spatial reasoning tasks and significantly improves the performance of existing models (e.g., Qwen3-VL); (iv) to complement this data-driven route with a training-free paradigm, we develop SpatialAgent, a multi-agent system equipped with 12 specialized spatial perception tools that supports both Plan-Execute and ReAct reasoning, enabling substantial gains in spatial reasoning without additional model training. Extensive experiments and in-depth analyses demonstrate the effectiveness of our benchmark, corpus, and agent framework. We expect these resources to serve as a solid foundation for advancing MLLMs toward human-level spatial intelligence. All data, code, and models will be released to the research community.", "link": "http://arxiv.org/abs/2505.17012v3", "date": "2026-04-13", "relevancy": 2.8245, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5734}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5734}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatialScore%3A%20Towards%20Comprehensive%20Evaluation%20for%20Spatial%20Intelligence&body=Title%3A%20SpatialScore%3A%20Towards%20Comprehensive%20Evaluation%20for%20Spatial%20Intelligence%0AAuthor%3A%20Haoning%20Wu%20and%20Xiao%20Huang%20and%20Yaohui%20Chen%20and%20Ya%20Zhang%20and%20Yanfeng%20Wang%20and%20Weidi%20Xie%0AAbstract%3A%20Existing%20evaluations%20of%20multimodal%20large%20language%20models%20%28MLLMs%29%20on%20spatial%20intelligence%20are%20typically%20fragmented%20and%20limited%20in%20scope.%20In%20this%20work%2C%20we%20aim%20to%20conduct%20a%20holistic%20assessment%20of%20the%20spatial%20understanding%20capabilities%20of%20modern%20MLLMs%20and%20propose%20complementary%20data-driven%20and%20agent-based%20solutions.%20Specifically%2C%20we%20make%20the%20following%20contributions%3A%20%28i%29%20we%20introduce%20SpatialScore%2C%20to%20our%20knowledge%2C%20the%20most%20comprehensive%20and%20diverse%20benchmark%20for%20multimodal%20spatial%20intelligence%20to%20date.%20It%20covers%20multiple%20visual%20data%20types%2C%20input%20modalities%2C%20and%20question-answering%20formats%2C%20and%20contains%20approximately%205K%20manually%20verified%20samples%20spanning%2030%20distinct%20tasks%3B%20%28ii%29%20using%20SpatialScore%2C%20we%20extensively%20evaluate%2049%20representative%20MLLMs%2C%20revealing%20persistent%20challenges%20and%20a%20substantial%20gap%20between%20current%20models%20and%20human-level%20spatial%20intelligence%3B%20%28iii%29%20to%20advance%20model%20capabilities%2C%20we%20construct%20SpatialCorpus%2C%20a%20large-scale%20training%20resource%20with%20331K%20multimodal%20QA%20samples%20that%20supports%20fine-tuning%20on%20spatial%20reasoning%20tasks%20and%20significantly%20improves%20the%20performance%20of%20existing%20models%20%28e.g.%2C%20Qwen3-VL%29%3B%20%28iv%29%20to%20complement%20this%20data-driven%20route%20with%20a%20training-free%20paradigm%2C%20we%20develop%20SpatialAgent%2C%20a%20multi-agent%20system%20equipped%20with%2012%20specialized%20spatial%20perception%20tools%20that%20supports%20both%20Plan-Execute%20and%20ReAct%20reasoning%2C%20enabling%20substantial%20gains%20in%20spatial%20reasoning%20without%20additional%20model%20training.%20Extensive%20experiments%20and%20in-depth%20analyses%20demonstrate%20the%20effectiveness%20of%20our%20benchmark%2C%20corpus%2C%20and%20agent%20framework.%20We%20expect%20these%20resources%20to%20serve%20as%20a%20solid%20foundation%20for%20advancing%20MLLMs%20toward%20human-level%20spatial%20intelligence.%20All%20data%2C%20code%2C%20and%20models%20will%20be%20released%20to%20the%20research%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2505.17012v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatialScore%253A%2520Towards%2520Comprehensive%2520Evaluation%2520for%2520Spatial%2520Intelligence%26entry.906535625%3DHaoning%2520Wu%2520and%2520Xiao%2520Huang%2520and%2520Yaohui%2520Chen%2520and%2520Ya%2520Zhang%2520and%2520Yanfeng%2520Wang%2520and%2520Weidi%2520Xie%26entry.1292438233%3DExisting%2520evaluations%2520of%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520on%2520spatial%2520intelligence%2520are%2520typically%2520fragmented%2520and%2520limited%2520in%2520scope.%2520In%2520this%2520work%252C%2520we%2520aim%2520to%2520conduct%2520a%2520holistic%2520assessment%2520of%2520the%2520spat {"title": "UNIGEOCLIP: Unified Geospatial Contrastive Learning", "author": "Guillaume Astruc and Eduard Trulls and Jan Hosang and Loic Landrieu and Paul-Edouard Sarlin", "abstract": "The growing availability of co-located geospatial data spanning aerial imagery, street-level views, elevation models, text, and geographic coordinates offers a unique opportunity for multimodal representation learning. We introduce UNIGEOCLIP, a massively multimodal contrastive framework to jointly align five complementary geospatial modalities in a single unified embedding space. Unlike prior approaches that fuse modalities or rely on a central pivot representation, our method performs all-to-all contrastive alignment, enabling seamless comparison, retrieval, and reasoning across arbitrary combinations of modalities. We further propose a scaled latitude-longitude encoder that improves spatial representation by capturing multi-scale geographic structure. Extensive experiments across downstream geospatial tasks demonstrate that UNIGEOCLIP consistently outperforms single-modality contrastive models and coordinate-only baselines, highlighting the benefits of holistic multimodal geospatial alignment. A reference implementation is available at https://gastruc.github.io/unigeoclip.", "link": "http://arxiv.org/abs/2604.11668v1", "date": "2026-04-13", "relevancy": 2.7925, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5959}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.558}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5216}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UNIGEOCLIP%3A%20Unified%20Geospatial%20Contrastive%20Learning&body=Title%3A%20UNIGEOCLIP%3A%20Unified%20Geospatial%20Contrastive%20Learning%0AAuthor%3A%20Guillaume%20Astruc%20and%20Eduard%20Trulls%20and%20Jan%20Hosang%20and%20Loic%20Landrieu%20and%20Paul-Edouard%20Sarlin%0AAbstract%3A%20The%20growing%20availability%20of%20co-located%20geospatial%20data%20spanning%20aerial%20imagery%2C%20street-level%20views%2C%20elevation%20models%2C%20text%2C%20and%20geographic%20coordinates%20offers%20a%20unique%20opportunity%20for%20multimodal%20representation%20learning.%20We%20introduce%20UNIGEOCLIP%2C%20a%20massively%20multimodal%20contrastive%20framework%20to%20jointly%20align%20five%20complementary%20geospatial%20modalities%20in%20a%20single%20unified%20embedding%20space.%20Unlike%20prior%20approaches%20that%20fuse%20modalities%20or%20rely%20on%20a%20central%20pivot%20representation%2C%20our%20method%20performs%20all-to-all%20contrastive%20alignment%2C%20enabling%20seamless%20comparison%2C%20retrieval%2C%20and%20reasoning%20across%20arbitrary%20combinations%20of%20modalities.%20We%20further%20propose%20a%20scaled%20latitude-longitude%20encoder%20that%20improves%20spatial%20representation%20by%20capturing%20multi-scale%20geographic%20structure.%20Extensive%20experiments%20across%20downstream%20geospatial%20tasks%20demonstrate%20that%20UNIGEOCLIP%20consistently%20outperforms%20single-modality%20contrastive%20models%20and%20coordinate-only%20baselines%2C%20highlighting%20the%20benefits%20of%20holistic%20multimodal%20geospatial%20alignment.%20A%20reference%20implementation%20is%20available%20at%20https%3A//gastruc.github.io/unigeoclip.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11668v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUNIGEOCLIP%253A%2520Unified%2520Geospatial%2520Contrastive%2520Learning%26entry.906535625%3DGuillaume%2520Astruc%2520and%2520Eduard%2520Trulls%2520and%2520Jan%2520Hosang%2520and%2520Loic%2520Landrieu%2520and%2520Paul-Edouard%2520 {"title": "Finetune Like You Pretrain: Boosting Zero-shot Adversarial Robustness in Vision-language Models", "author": "Songlong Xing and Weijie Wang and Zhengyu Zhao and Jindong Gu and Philip Torr and Nicu Sebe", "abstract": "Despite their impressive zero-shot abilities, vision-language models such as CLIP have been shown to be susceptible to adversarial attacks. To enhance its adversarial robustness, recent studies finetune the pretrained vision encoder of CLIP with adversarial examples on a proxy dataset such as ImageNet by aligning adversarial images with correct class labels. However, these methods overlook the important roles of training data distributions and learning objectives, resulting in reduced zero-shot capabilities and limited transferability of robustness across domains and datasets. In this work, we propose a simple yet effective paradigm AdvFLYP, which follows the training recipe of CLIP's pretraining process when performing adversarial finetuning to the model. Specifically, AdvFLYP finetunes CLIP with adversarial images created based on image-text pairs collected from the web, and match them with their corresponding texts via a contrastive loss. To alleviate distortion of adversarial image embeddings of noisy web images, we further propose to regularise AdvFLYP by penalising deviation of adversarial image features. We show that logit- and feature-level regularisation terms benefit robustness and clean accuracy, respectively. Extensive experiments on 14 downstream datasets spanning various domains show the superiority of our paradigm over mainstream practices. Our code and model weights are released at https://github.com/Sxing2/AdvFLYP.", "link": "http://arxiv.org/abs/2604.11576v1", "date": "2026-04-13", "relevancy": 2.791, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5928}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5424}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Finetune%20Like%20You%20Pretrain%3A%20Boosting%20Zero-shot%20Adversarial%20Robustness%20in%20Vision-language%20Models&body=Title%3A%20Finetune%20Like%20You%20Pretrain%3A%20Boosting%20Zero-shot%20Adversarial%20Robustness%20in%20Vision-language%20Models%0AAuthor%3A%20Songlong%20Xing%20and%20Weijie%20Wang%20and%20Zhengyu%20Zhao%20and%20Jindong%20Gu%20and%20Philip%20Torr%20and%20Nicu%20Sebe%0AAbstract%3A%20Despite%20their%20impressive%20zero-shot%20abilities%2C%20vision-language%20models%20such%20as%20CLIP%20have%20been%20shown%20to%20be%20susceptible%20to%20adversarial%20attacks.%20To%20enhance%20its%20adversarial%20robustness%2C%20recent%20studies%20finetune%20the%20pretrained%20vision%20encoder%20of%20CLIP%20with%20adversarial%20examples%20on%20a%20proxy%20dataset%20such%20as%20ImageNet%20by%20aligning%20adversarial%20images%20with%20correct%20class%20labels.%20However%2C%20these%20methods%20overlook%20the%20important%20roles%20of%20training%20data%20distributions%20and%20learning%20objectives%2C%20resulting%20in%20reduced%20zero-shot%20capabilities%20and%20limited%20transferability%20of%20robustness%20across%20domains%20and%20datasets.%20In%20this%20work%2C%20we%20propose%20a%20simple%20yet%20effective%20paradigm%20AdvFLYP%2C%20which%20follows%20the%20training%20recipe%20of%20CLIP%27s%20pretraining%20process%20when%20performing%20adversarial%20finetuning%20to%20the%20model.%20Specifically%2C%20AdvFLYP%20finetunes%20CLIP%20with%20adversarial%20images%20created%20based%20on%20image-text%20pairs%20collected%20from%20the%20web%2C%20and%20match%20them%20with%20their%20corresponding%20texts%20via%20a%20contrastive%20loss.%20To%20alleviate%20distortion%20of%20adversarial%20image%20embeddings%20of%20noisy%20web%20images%2C%20we%20further%20propose%20to%20regularise%20AdvFLYP%20by%20penalising%20deviation%20of%20adversarial%20image%20features.%20We%20show%20that%20logit-%20and%20feature-level%20regularisation%20terms%20benefit%20robustness%20and%20clean%20accuracy%2C%20respectively.%20Extensive%20experiments%20on%2014%20downstream%20datasets%20spanning%20various%20domains%20show%20the%20superiority%20of%20our%20paradigm%20over%20mainstream%20practices.%20Our%20code%20and%20model%20weights%20are%20released%20at%20https%3A//github.com/Sxing2/AdvFLYP.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11576v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFinetune%2520Like%2520You%2520Pretrain%253A%2520Boosting%2520Zero-shot%2520Adversarial%2520Robustness%2520in%2520Vision-language%2520Models%26entry.906535625%3DSonglong%2520Xing%2520and%2520Weijie%2520Wang%2520and%2520Zhengyu%2520Zhao%2520and%2520Jindong%2520Gu%2520and%2520Philip%2520Torr%2520and%2520Nicu%2520Sebe%26entry.1292438233%3DDespite%2520their%2520impressive%2520zero-shot%2520abilities%252C%2520vision-language%2520models%2520such%2520as%2520CLIP%2520have%2520been%2520shown%2520to%2520be%2520susceptible%2520to%2520adversarial%2520attacks.%2520To%2520enhance%2520its%2520adversarial%2520robustness%252C%2520recent%2520studies%2520finetune%2520the%2520pretrained%2520vision%2520encoder%2520of%2520CLIP%2520with%2520adversarial%2520examples%2520on%2520a%2520proxy%2520dataset%2520such%2520as%2520ImageNet%2520by%2520aligning%2520adversarial%2520images%2520with%2520correct%2520class%2520labels.%2520However%252C%2520these%2520methods%2520overlook%2520the%2520important%2520roles%2520of%2520training%2520data%2520distributions%2520and%2520learning%2520objectives%252C%2520resulting%2520in%2520reduced%2520zero-shot%2520capabilities%2520and%2520limited%2520transferability%2520of%2520r {"title": "Any 3D Scene is Worth 1K Tokens: 3D-Grounded Representation for Scene Generation at Scale", "author": "Dongxu Wei and Qi Xu and Zhiqi Li and Hangning Zhou and Cong Qiu and Hailong Qin and Mu Yang and Zhaopeng Cui and Peidong Liu", "abstract": "3D scene generation has long been dominated by 2D multi-view or video diffusion models. This is due not only to the lack of scene-level 3D latent representation, but also to the fact that most scene-level 3D visual data exists in the form of multi-view images or videos, which are naturally compatible with 2D diffusion architectures. Typically, these 2D-based approaches degrade 3D spatial extrapolation to 2D temporal extension, which introduces two fundamental issues: (i) representing 3D scenes via 2D views leads to significant representation redundancy, and (ii) latent space rooted in 2D inherently limits the spatial consistency of the generated 3D scenes. In this paper, we propose, for the first time, to perform 3D scene generation directly within an implicit 3D latent space to address these limitations. First, we repurpose frozen 2D representation encoders to construct our 3D Representation Autoencoder (3DRAE), which grounds view-coupled 2D semantic representations into a view-decoupled 3D latent representation. This enables representing 3D scenes observed from arbitrary numbers of views--at any resolution and aspect ratio--with fixed complexity and rich semantics. Then we introduce 3D Diffusion Transformer (3DDiT), which performs diffusion modeling in this 3D latent space, achieving remarkably efficient and spatially consistent 3D scene generation while supporting diverse conditioning configurations. Moreover, since our approach directly generates a 3D scene representation, it can be decoded to images and optional point maps along arbitrary camera trajectories without requiring per-trajectory diffusion sampling pass, which is common in 2D-based approaches.", "link": "http://arxiv.org/abs/2604.11331v1", "date": "2026-04-13", "relevancy": 2.7723, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6986}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.692}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.692}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Any%203D%20Scene%20is%20Worth%201K%20Tokens%3A%203D-Grounded%20Representation%20for%20Scene%20Generation%20at%20Scale&body=Title%3A%20Any%203D%20Scene%20is%20Worth%201K%20Tokens%3A%203D-Grounded%20Representation%20for%20Scene%20Generation%20at%20Scale%0AAuthor%3A%20Dongxu%20Wei%20and%20Qi%20Xu%20and%20Zhiqi%20Li%20and%20Hangning%20Zhou%20and%20Cong%20Qiu%20and%20Hailong%20Qin%20and%20Mu%20Yang%20and%20Zhaopeng%20Cui%20and%20Peidong%20Liu%0AAbstract%3A%203D%20scene%20generation%20has%20long%20been%20dominated%20by%202D%20multi-view%20or%20video%20diffusion%20models.%20This%20is%20due%20not%20only%20to%20the%20lack%20of%20scene-level%203D%20latent%20representation%2C%20but%20also%20to%20the%20fact%20that%20most%20scene-level%203D%20visual%20data%20exists%20in%20the%20form%20of%20multi-view%20images%20or%20videos%2C%20which%20are%20naturally%20compatible%20with%202D%20diffusion%20architectures.%20Typically%2C%20these%202D-based%20approaches%20degrade%203D%20spatial%20extrapolation%20to%202D%20temporal%20extension%2C%20which%20introduces%20two%20fundamental%20issues%3A%20%28i%29%20representing%203D%20scenes%20via%202D%20views%20leads%20to%20significant%20representation%20redundancy%2C%20and%20%28ii%29%20latent%20space%20rooted%20in%202D%20inherently%20limits%20the%20spatial%20consistency%20of%20the%20generated%203D%20scenes.%20In%20this%20paper%2C%20we%20propose%2C%20for%20the%20first%20time%2C%20to%20perform%203D%20scene%20generation%20directly%20within%20an%20implicit%203D%20latent%20space%20to%20address%20these%20limitations.%20First%2C%20we%20repurpose%20frozen%202D%20representation%20encoders%20to%20construct%20our%203D%20Representation%20Autoencoder%20%283DRAE%29%2C%20which%20grounds%20view-coupled%202D%20semantic%20representations%20into%20a%20view-decoupled%203D%20latent%20representation.%20This%20enables%20representing%203D%20scenes%20observed%20from%20arbitrary%20numbers%20of%20views--at%20any%20resolution%20and%20aspect%20ratio--with%20fixed%20complexity%20and%20rich%20semantics.%20Then%20we%20introduce%203D%20Diffusion%20Transformer%20%283DDiT%29%2C%20which%20performs%20diffusion%20modeling%20in%20this%203D%20latent%20space%2C%20achieving%20remarkably%20efficient%20and%20spatially%20consistent%203D%20scene%20generation%20while%20supporting%20diverse%20conditioning%20configurations.%20Moreover%2C%20since%20our%20approach%20directly%20generates%20a%203D%20scene%20representation%2C%20it%20can%20be%20decoded%20to%20images%20and%20optional%20point%20maps%20along%20arbitrary%20camera%20trajectories%20without%20requiring%20per-trajectory%20diffusion%20sampling%20pass%2C%20which%20is%20common%20in%202D-based%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11331v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAny%25203D%2520Scene%2520is%2520Worth%25201K%2520Tokens%253A%25203D-Grounded%2520Representation%2520for%2520Scene%2520Generation%2520at%2520Scale%26entry.906535625%3DDongxu%2520Wei%2520and%2520Qi%2520Xu%2520and%2520Zhiqi%2520Li%2520and%2520Hangning%2520Zhou%2520and%2520Cong%2520Qiu%2520and%2520Hailong%2520Qin%2520and%2520Mu%2520Yang%2520and%2520Zhaopeng%2520Cui%2520and%2520Peidong%2520Liu%26entry.1292438233%3D3D%2520scene%2520generation%2520has%2520long%2520been%2520dominated%2520by%25202D%2520multi-view%2520or%2520video%2520diffusion%2520models.%2520This%2520is%2520due%2520not%2520only%2520to%2520the%25 {"title": "SVD-Prune: Training-Free Token Pruning For Efficient Vision-Language Models", "author": "Yvon Apedo and Martyna Poreba and Michal Szczepanski and Samia Bouchafa", "abstract": "Vision-Language Models (VLM) have revolutionized multimodal learning by jointly processing visual and textual information. Yet, they face significant challenges due to the high computational and memory demands of processing long sequences of vision tokens. Many existing methods rely on local heuristics, such as attention scores or token norms. However, these criteria suffer from positional bias and information dispersion, limiting their ability to preserve essential content at high pruning ratios and leading to performance degradation on visually detailed images. To address these issues, we propose SVD-Prune, a trainingfree, plug-and-play token pruning method based on Singular Value Decomposition. It decomposes the vision token feature matrix and selects the top-K tokens using statistical leverage scores, ensuring only tokens contributing most to the dominant global variance are preserved. Experiments show that SVD-Prune consistently outperforms prior pruning methods under extreme vision token budgets, maintaining strong performance even with 32 and 16 vision tokens.", "link": "http://arxiv.org/abs/2604.11530v1", "date": "2026-04-13", "relevancy": 2.699, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5399}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5399}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SVD-Prune%3A%20Training-Free%20Token%20Pruning%20For%20Efficient%20Vision-Language%20Models&body=Title%3A%20SVD-Prune%3A%20Training-Free%20Token%20Pruning%20For%20Efficient%20Vision-Language%20Models%0AAuthor%3A%20Yvon%20Apedo%20and%20Martyna%20Poreba%20and%20Michal%20Szczepanski%20and%20Samia%20Bouchafa%0AAbstract%3A%20Vision-Language%20Models%20%28VLM%29%20have%20revolutionized%20multimodal%20learning%20by%20jointly%20processing%20visual%20and%20textual%20information.%20Yet%2C%20they%20face%20significant%20challenges%20due%20to%20the%20high%20computational%20and%20memory%20demands%20of%20processing%20long%20sequences%20of%20vision%20tokens.%20Many%20existing%20methods%20rely%20on%20local%20heuristics%2C%20such%20as%20attention%20scores%20or%20token%20norms.%20However%2C%20these%20criteria%20suffer%20from%20positional%20bias%20and%20information%20dispersion%2C%20limiting%20their%20ability%20to%20preserve%20essential%20content%20at%20high%20pruning%20ratios%20and%20leading%20to%20performance%20degradation%20on%20visually%20detailed%20images.%20To%20address%20these%20issues%2C%20we%20propose%20SVD-Prune%2C%20a%20trainingfree%2C%20plug-and-play%20token%20pruning%20method%20based%20on%20Singular%20Value%20Decomposition.%20It%20decomposes%20the%20vision%20token%20feature%20matrix%20and%20selects%20the%20top-K%20tokens%20using%20statistical%20leverage%20scores%2C%20ensuring%20only%20tokens%20contributing%20most%20to%20the%20dominant%20global%20variance%20are%20preserved.%20Experiments%20show%20that%20SVD-Prune%20consistently%20outperforms%20prior%20pruning%20methods%20under%20extreme%20vision%20token%20budgets%2C%20maintaining%20strong%20performance%20even%20with%2032%20and%2016%20vision%20tokens.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11530v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSVD-Prune%253A%2520Training-Free%2520Token%2520Pruning%2520For%2520Efficient%2520Vision-Language%2520Models%26entry.906535625%3DYvon%2520Apedo%2520and%2520Martyna%2520Poreba%2520and%2520Michal%2520Szczepanski%2520and%2520Samia%2520Bouchafa%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLM%2529%2520have%2520revolutionized%2520multimodal%2520learning%2520by%2520jointly%2520processing%2520visual%2520and%2520textual%2520information.%2520Yet%252C%2520they%2520face%2520significant%2520challenges%2520due%2520to%2520the%2520high%2520computational%2520and%2520memory%2520demands%2520of%2520processing%2520long%2520sequences%2520of%2520vision%2520tokens.%2520Many%2520existing%2520methods%2520rely%2520on%2520local%2520heuristics%252C%2520such%2520as%2520attention%2520scores%2520or%2520token%2520norms.%2520However%252C%2520these%2520criteria%2520suffer%2520from%2520positional%2520bias%2520and%2520information%2520dispersion%252C%2520limiting%2520their%2520ability%2520to%2520preserve%2520essential%2520content%2520at%2520high%2520pruning%2520ratios%2520and%2520leading%2520to%2520performance%2520degradation%2520on%2520visually%2520detailed%2520images.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520SVD-Prune%252C%2520a%2520trainingfree%252C%2520plug-and-play%2520token%2520pruning%2520method%2520based%2520on%2520Singular%2520Value%2520Decomposition.%2520It%2520decomposes%2520the%2520vision%2520token%2520feature%2520matrix%2520and%2520selects%2520the%2520top-K%2520tokens%2520using%2520statistical%2520leverage%2520scores%252C%2520ensuring%2520only%2520tokens%2520contributing%2520most%2520to%2520the%2520dominant%2520global%2520variance%2520are%2520preserved.%2520Experiments%2520show%2520that%2520SVD-Prune%2520consistently%2520outperforms%2520prior%2520pruning%2520methods%2520under%2520extreme%2520vision%2520token%2520budgets%252C%2520maintaining%2520strong%2520performance%2520even%2520with%252032%2520and%252016%2520vision%2520tokens.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11530v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform {"title": "LEAD: Minimizing Learner-Expert Asymmetry in End-to-End Driving", "author": "Long Nguyen and Micha Fauth and Bernhard Jaeger and Daniel Dauner and Maximilian Igl and Andreas Geiger and Kashyap Chitta", "abstract": "Simulators can generate virtually unlimited driving data, yet imitation learning policies in simulation still struggle to achieve robust closed-loop performance. Motivated by this gap, we empirically study how misalignment between privileged expert demonstrations and sensor-based student observations can limit the effectiveness of imitation learning. More precisely, experts have significantly higher visibility (e.g., ignoring occlusions) and far lower uncertainty (e.g., knowing other vehicles' actions), making them difficult to imitate reliably. Furthermore, navigational intent (i.e., the route to follow) is under-specified in student models at test time via only a single target point. We demonstrate that these asymmetries can measurably limit driving performance in CARLA and offer practical interventions to address them. After careful modifications to narrow the gaps between expert and student, our TransFuser v6 (TFv6) student policy achieves a new state of the art on all major publicly available CARLA closed-loop benchmarks, reaching 95 DS on Bench2Drive and more than doubling prior performances on Longest6~v2 and Town13. Additionally, by integrating perception supervision from our dataset into a shared sim-to-real pipeline, we show consistent gains on the NAVSIM and Waymo Vision-Based End-to-End driving benchmarks. Our code, data, and models are publicly available at https://github.com/autonomousvision/lead.", "link": "http://arxiv.org/abs/2512.20563v2", "date": "2026-04-13", "relevancy": 2.6948, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5529}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5422}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5218}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LEAD%3A%20Minimizing%20Learner-Expert%20Asymmetry%20in%20End-to-End%20Driving&body=Title%3A%20LEAD%3A%20Minimizing%20Learner-Expert%20Asymmetry%20in%20End-to-End%20Driving%0AAuthor%3A%20Long%20Nguyen%20and%20Micha%20Fauth%20and%20Bernhard%20Jaeger%20and%20Daniel%20Dauner%20and%20Maximilian%20Igl%20and%20Andreas%20Geiger%20and%20Kashyap%20Chitta%0AAbstract%3A%20Simulators%20can%20generate%20virtually%20unlimited%20driving%20data%2C%20yet%20imitation%20learning%20policies%20in%20simulation%20still%20struggle%20to%20achieve%20robust%20closed-loop%20performance.%20Motivated%20by%20this%20gap%2C%20we%20empirically%20study%20how%20misalignment%20between%20privileged%20expert%20demonstrations%20and%20sensor-based%20student%20observations%20can%20limit%20the%20effectiveness%20of%20imitation%20learning.%20More%20precisely%2C%20experts%20have%20significantly%20higher%20visibility%20%28e.g.%2C%20ignoring%20occlusions%29%20and%20far%20lower%20uncertainty%20%28e.g.%2C%20knowing%20other%20vehicles%27%20actions%29%2C%20making%20them%20difficult%20to%20imitate%20reliably.%20Furthermore%2C%20navigational%20intent%20%28i.e.%2C%20the%20route%20to%20follow%29%20is%20under-specified%20in%20student%20models%20at%20test%20time%20via%20only%20a%20single%20target%20point.%20We%20demonstrate%20that%20these%20asymmetries%20can%20measurably%20limit%20driving%20performance%20in%20CARLA%20and%20offer%20practical%20interventions%20to%20address%20them.%20After%20careful%20modifications%20to%20narrow%20the%20gaps%20between%20expert%20and%20student%2C%20our%20TransFuser%20v6%20%28TFv6%29%20student%20policy%20achieves%20a%20new%20state%20of%20the%20art%20on%20all%20major%20publicly%20a {"title": "Towards Brain MRI Foundation Models for the Clinic: Findings from the FOMO25 Challenge", "author": "Asbj\u00f8rn Munk and Stefano Cerri and Vardan Nersesjan and Christian Hedeager Krag and Jakob Ambsdorf and Pablo Rocamora Garc\u00eda and Julia Machnio and Peirong Liu and Suhyun Ahn and Nasrin Akbari and Yasmina Al Khalil and Kimberly Amador and Sina Amirrajab and Tal Arbel and Meritxell Bach Cuadra and Ujjwal Baid and Bhakti Baheti and Jaume Banus and Kamil Barbierik and Christoph Brune and Yansong Bu and Baptiste Callard and Yuhan Chen and Cornelius Crijnen and Corentin Dancette and Peter Drotar and Prasad Dutande and Nils D. Forkert and Saurabh Garg and Jakub Gazda and Matej Gazda and Beno\u00eet G\u00e9rin and Partha Ghosh and Weikang Gong and Pedro M. Gordaliza and Sam Hashemi and Tobias Heimann and Fucang Jia and Jiexin Jiang and Emily Kaczmarek and Chris Kang and Seung Kwan Kang and Mohammad Khazaei and Julien Khlaut and Petros Koutsouvelis and Jae Sung Lee and Yuchong Li and Mengye Lyu and Mingchen Ma and Anant Madabhushi and Klaus H. Maier-Hein and Pierre Manceron and Andr\u00e9s Mart\u00ednez Mora and Moona Mazher and Felix Meister and Nataliia Molchanova and Steven A. Niederer and Leonard N\u00fcrnberg and Jinah Park and Abdul Qayyum and Jonas Richiardi and Antoine Saporta and Branislav Setlak and Ning Shen and Justin Szeto and Constantin Ulrich and Puru Vaish and Vibujithan Vigneshwaran and Leroy Volmer and Zihao Wang and Siqi Wei and Anthony Winder and Jelmer M. Wolterink and Maxence Wynen and Chang Yang and Si Young Yie and Mostafa Mehdipour Ghazi and Akshay Pai and Espen Jimenez Solem and Sebastian N\u00f8rgaard Llambias and Mikael Boesen and Michael Eriksen Benros and Juan Eugenio Iglesias and Mads Nielsen", "abstract": "Clinical deployment of automated brain MRI analysis faces a fundamental challenge: clinical data is heterogeneous and noisy, and high-quality labels are prohibitively costly to obtain. Self-supervised learning (SSL) can address this by leveraging the vast amounts of unlabeled data produced in clinical workflows to train robust \\textit{foundation models} that adapt out-of-domain with minimal supervision. However, the development of foundation models for brain MRI has been limited by small pretraining datasets and in-domain benchmarking focused on high-quality, research-grade data. To address this gap, we organized the FOMO25 challenge as a satellite event at MICCAI 2025. FOMO25 provided participants with a large pretraining dataset, FOMO60K, and evaluated models on data sourced directly from clinical workflows in few-shot and out-of-domain settings. Tasks covered infarct classification, meningioma segmentation, and brain age regression, and considered both models trained on FOMO60K (method track) and any data (open track). Nineteen foundation models from sixteen teams were evaluated using a standardized containerized pipeline. Results show that (a) self-supervised pretraining improves generalization on clinical data under domain shift, with the strongest models trained \\textit{out-of-domain} surpassing supervised baselines trained \\textit{in-domain}. (b) No single pretraining objective benefits all tasks: MAE favors segmentation, hybrid reconstruction-contrastive objectives favor classification, and (c) strong performance was achieved by small pretrained models, and improvements from scaling model size and training duration did not yield reliable benefits.", "link": "http://arxiv.org/abs/2604.11679v1", "date": "2026-04-13", "relevancy": 2.6769, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5461}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5461}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/24 {"title": "Dual-Margin Embedding for Fine-Grained Long-Tailed Plant Taxonomy", "author": "Cheng Yaw Low and Heejoon Koo and Jaewoo Park and Meeyoung Cha", "abstract": "Taxonomic classification of ecological families, genera, and species underpins biodiversity monitoring and conservation. Existing computer vision methods typically address fine-grained recognition and long-tailed learning in isolation. However, additional challenges such as spatiotemporal domain shift, hierarchical taxonomic structure, and previously unseen taxa often co-occur in real-world deployment, leading to brittle performance under open-world conditions. We propose TaxoNet, an embedding learning framework with a theoretically grounded dual-margin objective that reshapes class decision boundaries under class imbalance to improve fine-grained discrimination while strengthening rare-class representation geometry. We evaluate TaxoNet in open-world settings that capture co-occurring recognition challenges. Leveraging diverse plant datasets, including Google Auto-Arborist (urban tree imagery), iNaturalist (Plantae observations across heterogeneous ecosystems), and NAFlora-Mini (herbarium collections), we demonstrate that TaxoNet consistently outperforms strong baselines, including multimodal foundation models.", "link": "http://arxiv.org/abs/2512.18994v2", "date": "2026-04-13", "relevancy": 2.6463, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5392}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5355}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dual-Margin%20Embedding%20for%20Fine-Grained%20Long-Tail ing%20for%20Fine-Grained%20Long-Tailed%20Plant%20Taxonomy&entry.906535625=Cheng%20Yaw%20Low%20and%20Heejoon%20Koo%20and%20Jaewoo%20Park%20and%20Meeyoung%20Cha&entry.1292438233=Taxonomic%20classification%20of%20ecological%20families%2C%20genera%2C%20and%20species%20underpins%20biodiversity%20monitoring%20and%20conservation.%20Existing%20computer%20vision%20methods%20typically%20address%20fine-grained%20recognition%20and%20long-tailed%20learning%20in%20isolation.%20However%2C%20additional%20challenges%20such%20as%20spatiotemporal%20domain%20shift%2C%20hierarchical%20taxonomic%20structure%2C%20and%20previously%20unseen%20taxa%20often%20co-occur%20in%20real-world%20deployment%2C%20leading%20to%20brittle%20performance%20under%20open-world%20conditions.%20We%20propose%20TaxoNet%2C%20an%20embedding%20learning%20framework%20with%20a%20theoretically%20grounded%20dual-margin%20objective%20that%20reshapes%20class%20decision%20boundaries%20under%20class%20imbalance%20to%20improve%20fine-grained%20discrimination%20while%20strengthening%20rare-class%20representation%20geometry.%20We%20evaluate%20TaxoNet%20in%20open-world%20settings%20that%20capture%20co-occurring%20recognition%20challenges.%20Leveraging%20diverse%20plant%20datasets%2C%20including%20Google%20Auto-Arborist%20%28urban%20tree%20imagery%29%2C%20iNaturalist%20%28Plantae%20observations%20across%20heterogeneous%20ecosystems%29%2C%20and%20NAFlora-Mini%20%28herbarium%20collections%29%2C%20we%20demonstrate%20that%20TaxoNet%20consistently%20outperforms%20strong%20baselines%2C%20including%20multimodal%20foundation%20models.&entry.1838667208=http%3A//arxiv.org/abs/2512.18994v2&entry.124074799=Read"},
{"title": "Video-based Heart Rate Estimation with Angle-guided ROI Optimization and Graph Signal Denoising", "author": "Gan Pei and Junhao Ning and Boqiu Shen and Yan Zhu and Menghan Hu", "abstract": "Remote photoplethysmography (rPPG) enables non-contact heart rate measurement from facial videos, but its performance is significantly degraded by facial motions such as speaking and head shaking. To address this issue, we propose two plug-and-play modules. The Angle-guided ROI Adaptive Optimization module quantifies ROI-Camera angles to refine motion-affected signals and capture global motion, while the Multi-region Joint Graph Signal Denoising module jointly models intra- and inter-regional ROI signals using graph signal processing to suppress motion artifacts. The modules are compatible with reflection model-based rPPG methods and validated on three public datasets. Results show that jointly use markedly reduces MAE, with an average decrease of 20.38\\% over the baseline, while ablation studies confirm the effectiveness of each module. The work demonstrates the potential of angle-guided optimization and graph-based denoising to enhance rPPG performance in motion scenarios.", "link": "http://arxiv.org/abs/2604.11395v1", "date": "2026-04-13", "relevancy": 2.6463, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5341}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5278}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Video-based%20Heart%20Rate%20Estimation%20with%20Angle-guided%20ROI%20Optimization%20and%20Graph%20Signal%20Denoising&body=Title%3A%20Video-based%20Heart%20Rate%20Estimation%20with%20Angle-guided%20ROI%20Optimization%20and%20Graph%20Signal%20Denoising%0AAuthor%3A%20Gan%20Pei%20and%20Junhao%20Ning%20and%20Boqiu%20Shen%20and%20Yan%20Zhu%20and%20Menghan%20Hu%0AAbstract%3A%20Remote%20photoplethysmography%20%28rPPG%29%20enables%20non-contact%20heart%20rate%20measurement%20from%20facial%20videos%2C%20but%20its%20performance%20is%20significantly%20degraded%20by%20facial%20motions%20such%20as%20speaking%20and%20head%20shaking.%20To%20address%20this%20issue%2C%20we%20propose%20two%20plug-and-play%20modules.%20The%20Angle-guided%20ROI%20Adaptive%20Optimization%20module%20quantifies%20ROI-Camera%20angles%20to%20refine%20motion-affected%20signals%20and%20capture%20global%20motion%2C%20while%20the%20Multi-region%20Joint%20Graph%20Signal%20Denoising%20module%20jointly%20models%20intra-%20and%20inter-regional%20ROI%20signals%20using%20graph%20signal%20processing%20to%20suppress%20motion%20artifacts.%20The%20modules%20are%20compatible%20with%20reflection%20model-based%20rPPG%20methods%20and%20validated%20on%20three%20public%20datasets.%20Results%20show%20that%20jointly%20use%20markedly%20reduces%20MAE%2C%20with%20an%20average%20decrease%20of%2020.38%5C%25%20over%20the%20baseline%2C%20while%20ablation%20studies%20confirm%20the%20effectiveness%20of%20each%20module.%20The%20work%20demonstrates%20the%20potential%20of%20angle-guided%20optimization%20and%20graph-based%20denoising%20to%20enhance%20rPPG%20performance%20in%20motion%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11395v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideo-based%2520Heart%2520Rate%2520Estimation%2520with%2520Angle-guided%2520ROI%2520Optimization%2520and%2520Graph%2520Signal%2520Denoising%26entry.906535625%3DGan%2520Pei%2520and%2520Junhao%2520Ning%2520and%2520Boqiu%2520Shen%2520and%2520Yan%2520Zhu%2520and%2520Menghan%2520Hu%26entry.1292438233%3DRemote%2520photoplethysmography%2520%2528rPPG%2529%2520enables%2520non-contact%2520heart%2520rate%2520measurement%2520from%2520facial%2520videos%252C%2520but%2520its%2520performance%2520is%2520significantly%2520degraded%2520by%2520facial%2520motions%2520such%2520as%2520speaking%2520and%2520head%2520shaking.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520two%2520plug-and-play%2520modules.%2520The%2520Angle-guided%2520ROI%2520Adaptive%2520Optimization%2520module%2520quantifies%2520ROI-Camera%2520angles%2520to%2520refine%2520motion-affected%2520signals%2520and%2520capture%2520global%2520motion%252C%2520while%2520the%2520Multi-region%2520Joint%2520Graph%2520Signal%2520Denoising%2520module%2520jointly%2520models%2520intra-%2520and%2520inter-regional%2520ROI%2520signals%2520using%2520graph%2520signal%2520processing%2520to%2520suppress%2520motion%2520artifacts.%2520The%2520modules%2520are%2520compatible%2520with%2520reflection%2520model-based%2520rPPG%2520methods%2520and%2520validated%2520on%2520three%2520public%2520datasets.%2520Results%2520show%2520that%2520jointly%2520use%2520markedly%2520reduces%2520MAE%252C%2520with%2520an%2520average%2520decrease%2520of%252020.38%255C%2525%2520over%2520the%2520baseline%252C%2520while%2520ablation%2520studies%2520confirm%2520the%2520effectiveness%2520of%2520each%2520module.%2520The%2520work%2520demonstrates%2520the%2520potential%2520of%2520angle-guided%2520optimization%2520and%2520graph-based%2520denoising%2520to%2520enhance%2520rPPG%2520performance%2520in%2520motion%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11395v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Video-based%20Heart%20Rate%20Estimation%20with%20Angle-guided%20ROI%20Optimization%20and%20Graph%20Signal%20Denoising&entry.906535625=Gan%20Pei%20and%20Junhao%20Ning%20and%20Boqiu%20Shen%20and%20Yan%20Zhu%20and%20Menghan%20Hu&entry.1292438233=Remote%20photoplethysmography%20%28rPPG% {"title": "Reasoning Resides in Layers: Restoring Temporal Reasoning in Video-Language Models with Layer-Selective Merging", "author": "Zihang Fu and Haonan Wang and Jian Kang and Kenji Kawaguchi and Jiaying Wu", "abstract": "Multimodal adaptation equips large language models (LLMs) with perceptual capabilities, but often weakens the reasoning ability inherited from language-only pretraining. This trade-off is especially pronounced in video-language models (VLMs), where visual alignment can impair temporal reasoning (TR) over sequential events. We propose MERIT, a training-free, task-driven model merging framework for restoring TR in VLMs. MERIT searches over layer-wise self-attention merging recipes between a VLM and its paired text-only backbone using an objective that improves TR while penalizing degradation in temporal perception (TP). Across three representative VLMs and multiple challenging video benchmarks, MERIT consistently improves TR, preserves or improves TP, and generalizes beyond the search set to four distinct benchmarks. It also outperforms uniform full-model merging and random layer selection, showing that effective recovery depends on selecting the right layers. Interventional masking and frame-level attribution further show that the selected layers are disproportionately important for reasoning and shift model decisions toward temporally and causally relevant evidence. These results show that targeted, perception-aware model merging can effectively restore TR in VLMs without retraining.", "link": "http://arxiv.org/abs/2604.11399v1", "date": "2026-04-13", "relevancy": 2.635, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5645}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5083}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5083}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reasoning%20Resides%20in%20Layers%3A%20Restoring%20Temporal%20Reasoning%20in%20Video-Language%20Models%20with%20Layer-Selective%20Merging&body=Title%3A%20Reasoning%20Resides%20in%20Layers%3A%20Restoring%20Temporal%20Reasoning%20in%20Video-Language%20Models%20with%20Layer-Selective%20Merging%0AAuthor%3A%20Zihang%20Fu%20and%20Haonan%20Wang%20and%20Jian%20Kang%20and%20Kenji%20Kawaguchi%20and%20Jiaying%20Wu%0AAbstract%3A%20Multimodal%20adaptation%20equips%20large%20language%20models%20%28LLMs%29%20with%20perceptual%20capabilities%2C%20but%20often%20weakens%20the%20reasoning%20ability%20inherited%20from%20language-only%20pretraining.%20This%20trade-off%20is%20especially%20pronounced%20in%20video-language%20models%20%28VLMs%29%2C%20where%20visual%20alignment%20can%20impair%20temporal%20reasoning%20%28TR%29%20over%20sequential%20events.%20We%20propose%20MERIT%2C%20a%20training-free%2C%20task-driven%20model%20merging%20framework%20for%20restoring%20TR%20in%20VLMs.%20MERIT%20searches%20over%20layer-wise%20self-attention%20merging%20recipes%20between%20a%20VLM%20and%20its%20paired%20text-only%20backbone%20using%20an%20objective%20that%20improves%20TR%20while%20penalizing%20degradation%20in%20temporal%20perception%20%28TP%29.%20Across%20three%20representative%20VLMs%20and%20multiple%20challenging%20video%20benchmarks%2C%20MERIT%20consistently%20improves%20TR%2C%20preserves%20or%20improves%20TP%2C%20and%20generalizes%20beyond%20the%20search%20set%20to%20four%20distinct%20benchmarks.%20It%20also%20outperforms%20uniform%20full-model%20merging%20and%20random%20layer%20selection%2C%20showing%20that%20effective%20recovery%20depends%20on%20selecting%20the%20right%20layers.%20Interventional%20masking%20and%20frame-level%20attribution%20further%20show%20that%20the%20selected%20layers%20are%20disproportionately%20important%20for%20reasoning%20and%20shift%20model%20decisions%20toward%20temporally%20and%20causally%20relevant%20evidence.%20These%20results%20show%20that%20targeted%2C%20perception-aware%20model%20merging%20can%20effectively%20restore%20TR%20in%20VLMs%20without%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11399v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReasoning%2520Resides%2520in%2520Layers%253A%2520Restoring%2520Temporal%2520Reasoning%2520in%2520Video-Language%2520Models%2520with%2520Layer-Selective%2520Merging%26entry.906535625%3DZihang%2520Fu%2520and%2520Haonan%2520Wang%2520and%2520Jian%2520Kang%2520and%2520Kenji%2520Kawaguchi%2520and%2520Jiaying%2520Wu%26entry.1292438233%3DMultimodal%2520adaptation%2520equips%2520large%2520language%2520models%2520%2528LLMs%2529%2520with%2520perceptual%2520capabilities%252C%2520but%2520often%2520weakens%2520the%2520reasoning%2520ability%2520inherited%2520from%2520language-only%2520pretraining.%2520This%2520trade-off%2520is%2520especially%2520pronounced%2520in%2520video-language%2520models%2520%2528VLMs%2529%252C%2520where%2520visual%2520alignment%2520can%2520impair%2520temporal%2520reasoning%2520%2528TR%2529%2520over%2520sequential%2520events.%2520We%2520propose%2520MERIT%252C%2520a%2520training-free%252C%2520task-driven%2520model%2520merging%2520framework%2520for%2520restoring%2520TR%2520in%2520VLMs.%2520MERIT%2520searches%2520over%2520layer-wise%2520self-attention%2520merging%2520recipes%2520between%2520a%2520VLM%2520and%2520its%2520paired%2520text-only%2520backbone%2520using%2520an%2520objective%2520that%2520improves%2520TR%2520while%2520penalizing%2520degradation%2520in%2520temporal%2520perception%2520%2528TP%2529.%2520Across%2520three%2520representative%2520VLMs%2520and%2520multiple%2520challenging%2520video%2520benchmarks%252C%2520MERIT%2520consistently%2520improves%2520TR%252C%2520preserves%2520or%2520improves%2520TP%252C%2 {"title": "ClawGUI: A Unified Framework for Training, Evaluating, and Deploying GUI Agents", "author": "Fei Tang and Zhiqiong Lu and Boxuan Zhang and Weiming Lu and Jun Xiao and Yueting Zhuang and Yongliang Shen", "abstract": "GUI agents drive applications through their visual interfaces instead of programmatic APIs, interacting with arbitrary software via taps, swipes, and keystrokes, reaching a long tail of applications that CLI-based agents cannot. Yet progress in this area is bottlenecked less by modeling capacity than by the absence of a coherent full-stack infrastructure: online RL training suffers from environment instability and closed pipelines, evaluation protocols drift silently across works, and trained agents rarely reach real users on real devices. We present \\textbf{ClawGUI}, an open-source framework addressing these three gaps within a single harness. \\textbf{ClawGUI-RL} provides the first open-source GUI agent RL infrastructure with validated support for both parallel virtual environments and real physical devices, integrating GiGPO with a Process Reward Model for dense step-level supervision. \\textbf{ClawGUI-Eval} enforces a fully standardized evaluation pipeline across 6 benchmarks and 11+ models, achieving 95.8\\% reproduction against official baselines. \\textbf{ClawGUI-Agent} brings trained agents to Android, HarmonyOS, and iOS through 12+ chat platforms with hybrid CLI-GUI control and persistent personalized memory. Trained end to end within this pipeline, \\textbf{ClawGUI-2B} achieves 17.1\\% Success Rate on MobileWorld GUI-Only, outperforming the same-scale MAI-UI-2B baseline by 6.0\\%.", "link": "http://arxiv.org/abs/2604.11784v1", "date": "2026-04-13", "relevancy": 2.6317, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5529}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5144}, {" {"title": "TARAC: Mitigating Hallucination in LVLMs via Temporal Attention Real-time Accumulative Connection", "author": "Lei Jiang and Chunzhao Xie and Tongxuan Liu and Yuting Zeng and jinrong Guo and Yunheng Shen and Weizhe Huang and Jing Li and Xiaohua Xu", "abstract": "Large Vision-Language Models have demonstrated remarkable capabilities, yet they suffer from hallucinations that limit practical deployment. While various mitigation strategies exist, they often incur high computational overhead or require extensive retraining. In this paper, we address the issue of visual attention decay during generation, a key factor contributing to hallucinations. We propose Temporal Attention Real-time Accumulative Connection (TARAC), a novel training-free framework that dynamically accumulates and re-injects historical attention to sustain visual grounding. Inspired by cognitive reinforcement mechanisms, TARAC operates as a lightweight, plug-and-play module. Extensive experiments across diverse models (e.g., LLaVA, Qwen2-VL) and benchmarks demonstrate that TARAC significantly outperforms state-of-the-art methods. Remarkably, it achieves these gains with negligible inference overhead ($\\sim$4\\% TPOT increase), compared to the substantial costs of existing training-free baselines. Specifically, TARAC reduces hallucinated sentences by 25.2\\% on CHAIR and improves Perception score by +10.65 on MME, validating its effectiveness and efficiency.", "link": "http://arxiv.org/abs/2504.04099v2", "date": "2026-04-13", "relevancy": 2.6252, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5476}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5137}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757 {"title": "Three Roles, One Model: Role Orchestration at Inference Time to Close the Performance Gap Between Small and Large Agents", "author": "S. Aaron McClendon and Jorge Gallego-Feliciano and Stavros Zervoudakis and Antonios Saravanos", "abstract": "Large language model (LLM) agents show promise on realistic tool-use tasks, but deploying capable agents on modest hardware remains challenging. We study whether inference-time scaffolding alone, without any additional training compute, can improve the performance of a small model in complex multi-step environments. Operating on a single 24\\,GB GPU, we evaluate Qwen3-8B under both full-precision (FP16, 12K context) and 4-bit quantized (AWQ, 32K context) configurations. Without any intervention, the raw model achieves just 5.4\\% (FP16) and 3.0\\% (AWQ) task goal completion. Guided by a systematic failure mode analysis, we introduce a three-tier inference scaffolding pipeline that deploys the same frozen model in three distinct roles: (1) a summarization model that preserves critical artifacts (tokens, credentials, API responses) while compressing dialogue history; (2) the main agent model that reasons over the compressed context; and (3) an isolated correction model that reviews and revises the agent's code output without access to conversation history, breaking repetitive failure loops. Applied to the same unmodified model, this scaffolding yields 8.9\\% (FP16) and 5.9\\% (AWQ) task goal completion, roughly doubling performance in both settings, with particularly strong gains on difficulty-1 tasks (15.8\\%$\\to$26.3\\% FP16; 5.3\\%$\\to$14.0\\% AWQ). On full-precision inference, our scaffolded 8B model surpasses DeepSeek-Coder 33B Instruct (7.1\\%) from the original AppWorld evaluation, demonstrating that structured inference-time interventions can make small models competitive with systems 4$\\times$ their size. We formalize the approach as a scaffolded policy over a frozen base model, three invocations of the same weights with different conditioning, drawing connections to test-time compute scaling and action-space shaping in reinforcement learning.", "link": "http://arxiv.org/abs/2604.11465v1", "date": "2026-04-13", "relevancy": 2.6217, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5337}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5197}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5197}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Three%20Roles%2C%20One%20Model%3A%20Role%20Orchestration%20at%20Inference%20Time%20to%20Close%20the%20Performance%20Gap%20Between%20Small%20and%20Large%20Agents&body=Title%3A%20Three%20Roles%2C%20One%20Model%3A%20Role%20Orchestration%20at%20Inference%20Time%20to%20Close%20the%20Performance%20Gap%20Between%20Small%20and%20Large%20Agents%0AAuthor%3A%20S.%20Aaron%20McClendon%20and%20Jorge%20Gallego-Feliciano%20and%20Stavros%20Zervoudakis%20and%20Antonios%20Saravanos%0AAbstract%3A%20Large%20language%20model%20%28LLM%29%20agents%20show%20promise%20on%20realistic%20tool-use%20tasks%2C%20but%20deploying%20capable%20agents%20on%20modest%20hardware%20remains%20challenging.%20We%20study%20whether%20inference-time%20scaffolding%20alone%2C%20without%20any%20additional%20training%20compute%2C%20can%20improve%20the%20performance%20of%20a%20small%20model%20in%20complex%20multi-step%20environments.%20Operating%20on%20a%20single%2024%5C%2CGB%20GPU%2C%20we%20evaluate%20Qwen3-8B%20under%20both%20full-precision%20%28FP16%2C%2012K%20context%29%20and%204-bit%20quantized%20%28AWQ%2C%2032K%20context%29%20configurations.%20Without%20any%20intervention%2C%20the%20raw%20model%20achieves%20just%205.4%5C%25%20%28FP16%29%20and%203.0%5C%25%20%28AWQ%29%20task%20goal%20completion.%20Guided%20by%20a%20systematic%20failure%20mode%20analysis%2C%20we%20introduce%20a%20three-tier%20inference%20scaffolding%20pipeline%20that%20deploys%20the%20same%20frozen%20model%20in%20three%20distinct%20roles%3A%20%281%29%20a%20summarization%20model%20that%20preserves%20critical%20artifacts%20%28tokens%2C%20credentials%2C%20API%20responses%29%20while%20compressing%20dialogue%20history%3B%20%282%29%20the%20main%20agent%20model%20that%20reasons%20over%20the%20compressed%20context%3B%20and%20%283%29%20an%20isolated%20correction%20model%20that%20reviews%20and%20revises%20the%20agent%27s%20code%20output%20without%20access%20to%20conversation%20history%2C%20breaking%20repetitive%20failure%20loops.%20Applied%20to%20the%20same%20unmodified%20model%2C%20this%20scaffolding%20yields%208.9%5C%25%20%28FP16%29%20and%205.9%5C%25%20%28AWQ%29%20task%20goal%20completion%2C%20roughly%20doubling%20performance%20in%20both%20settings%2C%20with%20particularly%20strong%20gains%20on%20difficulty-1%20tasks%20%2815.8%5C%25%24%5Cto%2426.3%5C%25%20FP16%3B%205.3%5C%25%24%5Cto%2414.0%5C%25%20AWQ%29.%20On%20full-precision%20inference%2C%20our%20scaffolded%208B%20model%20surpasses%20DeepSeek-Coder%2033B%20Instruct%20%287.1%5C%25%29%20from%20the%20original%20AppWorld%20evaluation%2C%20demonstrating%20that%20structured%20inference-time%20interventions%20can%20make%20small%20models%20competitive%20with%20systems%204%24%5Ctimes%24%20their%20size.%20We%20formalize%20the%20approach%20as%20a%20scaffolded%20policy%20over%20a%20frozen%20base%20model%2C%20three%20invocations%20of%20the%20same%20weights%20with%20different%20conditioning%2C%20drawing%20connections%20to%20test-time%20compute%20scaling%20and%20action-space%20shaping%20in%20reinforcement%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11465v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThree%2520Roles%25 {"title": "Geoparsing: Diagram Parsing for Plane and Solid Geometry with a Unified Formal Language", "author": "Peijie Wang and Ming-Liang Zhang and Jun Cao and Chao Deng and Dekang Ran and Hongda Sun and Pi Bu and Xuan Zhang and Yingyao Wang and Jun Song and Bo Zheng and Fei Yin and Cheng-Lin Liu", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable progress but continue to struggle with geometric reasoning, primarily due to the perception bottleneck regarding fine-grained visual elements. While formal languages have aided plane geometry understanding, solid geometry which requires spatial understanding remains largely unexplored. In this paper, we address this challenge by designing a unified formal language that integrates plane and solid geometry, comprehensively covering geometric structures and semantic relations. We construct GDP-29K, a large-scale dataset comprising 20k plane and 9k solid geometry samples collected from diverse real-world sources, each paired with its ground-truth formal description. To ensure syntactic correctness and geometric consistency, we propose a training paradigm that combines Supervised Fine-Tuning with Reinforcement Learning via Verifiable Rewards. Experiments show that our approach achieves state-of-the-art parsing performance. Furthermore, we demonstrate that our parsed formal descriptions serve as a critical cognitive scaffold, significantly boosting MLLMs' capabilities for downstream geometry reasoning tasks. Our data and code are available at Geoparsing.", "link": "http://arxiv.org/abs/2604.11600v1", "date": "2026-04-13", "relevancy": 2.6032, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5209}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5209}, {"title": "TAMM: TriAdapter {"title": "Learning Robustness at Test-Time from a Non-Robust Teacher", "author": "Stefano Bianchettin and Giulio Rossolini and Giorgio Buttazzo", "abstract": "Nowadays, pretrained models are increasingly used as general-purpose backbones and adapted at test-time to downstream environments where target data are scarce and unlabeled. While this paradigm has proven effective for improving clean accuracy on the target domain, adversarial robustness has received far less attention, especially when the original pretrained model is not explicitly designed to be robust. This raises a practical question: \\emph{can a pretrained, non-robust model be adapted at test-time to improve adversarial robustness on a target distribution?} To face this question, this work studies how adversarial training strategies behave when integrated into adaptation schemes for the unsupervised test-time setting, where only a small set of unlabeled target samples is available. It first analyzes how classical adversarial training formulations can be extended to this scenario, showing that straightforward distillation-based adaptations remain unstable and highly sensitive to hyperparameter tuning, particularly when the teacher itself is non-robust.\n  To address these limitations, the work proposes a label-free framework that uses the predictions of a non-robust teacher model as a semantic anchor for both the clean and adversarial objectives during adaptation. We further provide theoretical insights showing that our formulation yields a more stable alternative to the self-consistency-based regularization commonly used in classical adversarial training. Experiments evaluate the proposed approach on CIFAR-10 and ImageNet under induced photometric transformations. The results support the theoretical insights by showing that the proposed approach achieves improved optimization stability, lower sensitivity to parameter choices, and a better robustness-accuracy trade-off than existing baselines in this post-deployment test-time setting.", "link": "http://arxiv.org/abs/2604.11590v1", "date": "2026-04-13", "relevancy": 2.5826, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5238}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5175}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5083}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Robustness%20at%20Test-Time%20from%20a%20Non-Robust%20Teacher&body=Title%3A%20Learning%20Robustness%20at%20Test-Time%20from%20a%20Non-Robust%20Teacher%0AAuthor%3A%20Stefano%20Bianchettin%20and%20Giulio%20Rossolini%20and%20Giorgio%20Buttazzo%0AAbstract%3A%20Nowadays%2C%20pretrained%20models%20are%20increasingly%20used%20as%20general-purpose%20backbones%20and%20adapted%20at%20test-time%20to%20downstream%20environments%20where%20target%20data%20are%20scarce%20and%20unlabeled.%20While%20this%20paradigm%20has%20proven%20effective%20for%20improving%20clean%20accuracy%20on%20the%20target%20domain%2C%20adversarial%20robustness%20has%20received%20far%20less%20attention%2C%20especially%20when%20the%20original%20pretrained%20model%20is%20not%20explicitly%20designed%20to%20be%20robust.%20This%20raises%20a%20practical%20question%3A%20%5Cemph%7Bcan%20a%20pretrained%2C%20non-robust%20model%20be%20adapted%20at%20test-time%20to%20improve%20adversarial%20robustness%20on%20a%20target%20distribution%3F%7D%20To%20face%20this%20question%2C%20this%20work%20studies%20how%20adversarial%20training%20strategies%20behave%20when%20integrated%20into%20adaptation%20schemes%20for%20the%20unsupervised%20test-time%20setting%2C%20where%20only%20a%20small%20set%20of%20unlabeled%20target%20samples%20is%20available.%20It%20first%20analyzes%20how%20classical%20adversarial%20training%20formulations%20can%20be%20extended%20to%20this%20scenario%2C%20showing%20that%20straightforward%20distillation-based%20adaptations%20remain%20unstable%20and%20highly%20sensitive%20to%20hyperparameter%20tuning%2C%20particularly%20when%20the%20teacher%20itself%20is%20non-robust.%0A%20%20To%20address%20these%20limitations%2C%20the%20work%20proposes%20a%20label-free%20framework%20that%20uses%20the%20predictions%20of%20a%20non-robust%20teacher%20model%20as%20a%20semantic%20anchor%20for%20both%20the%20clean%20and%20adversarial%20objectives%20during%20adaptation.%20We%20further%20provide%20theoretical%20insights%20showing%20that%20our%20formulation%20yields%20a%20more%20stable%20alternative%20to%20the%20self-consistency-based%20regularization%20commonly%20used%20in%20classical%20adversarial%20training.%20Experiments%20evaluate%20the%20proposed%20approach%20on%20CIFAR-10%20and%20ImageNet%20under%20induced%20photometric%20transformations.%20The%20results%20support%20the%20theoretical%20insights%20by%20showing%20that%20the%20proposed%20approach%20achieves%20improved%20optimization%20stability%2C%20lower%20sensitivity%20to%20parameter%20choices%2C%20and%20a%20better%20robustness-accuracy%20trade-off%20than%20existing%20baselines%20in%20this%20post-deployment%20test-time%20setting.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11590v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Robustness%2520at%2520Test-Time%2520from%2520a%2520Non-Robust%2520Teacher%26entry.906535625%3DStefano%2520Bianchettin%2520and%2520Giulio%2520Rossolini%2520and%2520Giorgio%2520Buttazzo%26entry.1292438233%3DNowadays%252C%2520pretrained%2520models%2520are%2520increasingly%2520used%2520as%2520general-purpose%2520backbones%2520and%2520adapted%2520at%2520test-time%2520to%2520downstream%2520environments%2520where%2520target%2520data%2520are%2520scarce%2520and%2520un {"title": "The Impact of Federated Learning on Distributed Remote Sensing Archives", "author": "Anand Umashankar and Karam Tomotaki-Dawoud and Nicolai Schneider", "abstract": "Remote sensing archives are inherently distributed: Earth observation missions such as Sentinel-1, Sentinel-2, and Sentinel-3 have collectively accumulated more than 5 petabytes of imagery, stored and processed across many geographically dispersed platforms. Training machine learning models on such data in a centralized fashion is impractical due to data volume, sovereignty constraints, and geographic distribution. Federated learning (FL) addresses this by keeping data local and exchanging only model updates. A central challenge for remote sensing is the non-IID nature of Earth observation data: label distributions vary strongly by geographic region, degrading the convergence of standard FL algorithms. In this paper, we conduct a systematic empirical study of three FL strategies -- FedAvg, FedProx, and bulk synchronous parallel (BSP) -- applied to multi-label remote sensing image classification under controlled non-IID label-skew conditions. We evaluate three convolutional neural network (CNN) architectures of increasing depth (LeNet, AlexNet, and ResNet-34) and analyze the joint effect of algorithm choice, model capacity, client fraction, client count, batch size, and communication cost. Experiments on the UC Merced multi-label dataset show that FedProx outperforms FedAvg for deeper architectures under data heterogeneity, that BSP approaches centralized accuracy at the cost of high sequential communication, and that LeNet provides the best accuracy-communication trade-off for the dataset scale considered.", "link": "http://arxiv.org/abs/2604.11562v1", "date": "2026-04-13", "relevancy": 2.5803, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5405}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.505}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5027}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Impact%20of%20Federated%20Learning%20on%20Distributed%20Remote%20Sensing%20Archives&body=Title%3A%20The%20Impact%20of%20Federated%20Learning%20on%20Distributed%20Remote%20Sensing%20Archives%0AAuthor%3A%20Anand%20Umashankar%20and%20Karam%20Tomotaki-Dawoud%20and%20Nicolai%20Schneider%0AAbstract%3A%20Remote%20sensing%20archives%20are%20inherently%20distributed%3A%20Earth%20observation%20missions%20such%20as%20Sentinel-1%2C%20Sentinel-2%2C%20and%20Sentinel-3%20have%20collectively%20accumulated%20more%20than%205%20petabytes%20of%20imagery%2C%20stored%20and%20processed%20across%20many%20geographically%20dispersed%20platforms.%20Training%20machine%20learning%20models%20on%20such%20data%20in%20a%20centralized%20fashion%20is%20impractical%20due%20to%20data%20volume%2C%20sovereignty%20constraints%2C%20and%20geographic%20distribution.%20Federated%20learning%20%28FL%29%20addresses%20this%20by%20keeping%20data%20local%20and%20exchanging%20only%20model%20updates.%20A%20central%20challenge%20for%20remote%20sensing%20is%20the%20non-IID%20nature%20of%20Earth%20observation%20data%3A%20label%20distributions%20vary%20strongly%20by%20geographic%20region%2C%20degrading%20the%20convergence%20of%20standard%20FL%20algorithms.%20In%20this%20paper%2C%20we%20conduct%20a%20systematic%20empirical%20study%20of%20three%20FL%20strategies%20--%20FedAvg%2C%20FedProx%2C%20and%20bulk%20synchronous%20parallel%20%28BSP%29%20--%20applied%20to%20multi-label%20remote%20sensing%20image%20classification%20under%20controlled%20non-IID%20label-skew%20conditions.%20We%20evaluate%20three%20convolutional%20neural%20network%20%28CNN%29%20architectures%20of%20increasing%20depth%20%28LeNet%2C%20AlexNet%2C%20and%20ResNet-34%29%20and%20analyze%20the%20joint%20effect%20of%20algorithm%20choice%2C%20model%20capacity%2C%20client%20fraction%2C%20client%20count%2C%20batch%20size%2C%20and%20communication%20cost.%20Experiments%20on%20the%20UC%20Merced%20multi-label%20dataset%20show%20that%20FedProx%20outperforms%20FedAvg%20for%20deeper%20architectures%20under%20data%20heterogeneity%2C%20that%20BSP%20approaches%20centralized%20accuracy%20at%20the%20cost%20of%20high%20sequential%20communication%2C%20and%20that%20LeNet%20provides%20the%20best%20accuracy-communication%20trade-off%20for%20the%20dataset%20scale%20considered.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11562v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Impact%2520of%2520Federated%2520Learning%2520on%2520Distributed%2520Remote%2520Sensing%2520Archives%26entry.906535625%3DAnand%2520Umashankar%2520and%2520Karam%2520Tomotaki-Dawoud%2520and%2520Nicolai%2520Schneider%26entry.1292438233%3DRemote%2520sensing%2520archives%2520are%2520inherently%2520distributed%253A%2520Earth%2520observation%2520missions%2520such%2520as%2520Sentinel-1%252C%2520Sentinel-2%252C%2520and%2520Sentinel-3%2520have%2520collectively%2520accumulated%2520more%2520than%25205%2520petabytes%2520of%2520imagery%252C%2520stored%2520and%2520processed%2520across%2520many%2520geographically%2520dispersed%2520platforms.%2520Training%2520machine%2520learning%2520models%2520on%2520such%2520data%2520in%2520a%2520centralized%2520fashion%2520is%2520impractical%2520due%2520to%2520data%2520volume%252C%2520sovereignty%2520constraints%252C%2520and%2520geographic%2520distribution.%2520Federated%2520learning%2520%2528FL%2529%2520addresses%2520this%2520by%2520keeping%2520data%2520local%2520and%2520exchanging%2520only%2520model%2520updates.%2520A%2520central%2520challenge%2520for%2520remote%2520sensing%2

ombination%20produces%20a%20compact%20yet%20expressive%20feature%20representation%2C%20designed%20to%20minimize%20redundancy%20and%20support%20efficient%2C%20level-specific%20adaptation.%20The%20unfolding%20mechanism%20promotes%20inter-layer%20reusability%20and%20requires%20only%20minimal%20data%20overhead%20for%20progressive%20refinement.%20Experiments%20show%20that%20our%20method%20maintains%20high%20rendering%20quality%20across%20all%20LODs%20while%20achieving%20substantial%20storage%20reduction.%20These%20results%20demonstrate%20the%20practicality%20and%20scalability%20of%20our%20approach%20for%20real-time%203DGS%20rendering%20in%20bandwidth-%20and%20memory-constrained%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11685v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnfolding%25203D%2520Gaussian%2520Splatting%2520via%2520Iterative%2520Gaussian%2520Synopsis%26entry.906535625%3DYuqin%2520Lu%2520and%2520Yang%2520Zhou%2520and%2520Yihua%2520Dai%2520and%2520Guiqing%2520Li%2520and%2520Shengfeng%2520He%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520has%2520become%2520a%2520state-of-the-art%2520framework%2520for%2520real-time%252C%2520high-fidelity%2520novel%2520view%2520synthesis.%2520However%252C%2520its%2520substantial%2520storage%2520requirements%2520and%2520inherently%2520unstructured%2520representation%2520pose%2520challenges%2520for%2520deployment%2520in%2520streaming%2520and%2520resource-constrained%2520environments.%2520Existing%2520Level-of-Detail%2520%2528LOD%2529%2520strategies%252C%2520particularly%2520those%2520based%2520on%2520bottom-up%2520construction%252C%2520often%2520introduce%2520redundancy%2520or%2520lead%2520to%2520fidelity%2520degradation.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520propose%2520Iterative%2520Gaussian%2520Synopsis%252C%2520a%2520novel%2520framework%2520for%2520compact%2520and%2520progressive% {"title": "GS4City: Hierarchical Semantic Gaussian Splatting via City-Model Priors", "author": "Qilin Zhang and Jinyu Zhu and Olaf Wysocki and Benjamin Busam and Boris Jutzi", "abstract": "Recent semantic 3D Gaussian Splatting (3DGS) methods primarily rely on 2D foundation models, often yielding ambiguous boundaries and limited support for structured urban semantics. While city models such as CityGML encode hierarchically organized semantics together with building geometry, these labels cannot be directly mapped to Gaussian primitives. We present GS4City, a hierarchical semantic Gaussian Splatting method that incorporates city-model priors for urban scene understanding. GS4City derives reliable image-aligned masks from Level of Detail (LoD) 3 CityGML models via two-pass raycasting, explicitly using parent-child relations to validate and recover fine-grained facade elements. It then fuses these geometry-grounded masks with foundation-model predictions to establish scene-consistent instance correspondences, and learns a compact identity encoding for each Gaussian under joint 2D identity supervision and 3D spatial regularization. Experiments on the TUM2TWIN and Gold Coast datasets show that GS4City effectively incorporates structured building semantics into Gaussian scene representations, outperforming existing 2D-driven semantic 3DGS baselines, including LangSplat and Gaga, by up to 15.8 IoU points in coarse building segmentation and 14.2 mIoU points in fine-grained semantic segmentation. By bridging structured city models and photorealistic Gaussian scene representations, GS4City enables semantically queryable and structure-aware urban reconstruction. Code is available at https://github.com/Jinyzzz/GS4City.", "link": "http://arxiv.org/abs/2604.11401v1", "date": "2026-04-13", "relevancy": 3.1791, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6707 show%20that%20GS4City%20effectively%20incorporates%20structured%20building%20semantics%20into%20Gaussian%20scene%20representations%2C%20outperforming%20existing%202D-driven%20semantic%203DGS%20baselines%2C%20including%20LangSplat%20and%20Gaga%2C%20by%20up%20to%2015.8%20IoU%20points%20in%20coarse%20building%20segmentation%20and%2014.2%20mIoU%20points%20in%20fine-grained%20semantic%20segmentation.%20By%20bridging%20structured%20city%20models%20and%20photorealistic%20Gaussian%20scene%20representations%2C%20GS4City%20enables%20semantically%20queryable%20and%20structure-aware%20urban%20reconstruction.%20Code%20is%20available%20at%20https%3A//github.com/Jinyzzz/GS4City.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11401v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGS4City%253A%2520Hierarchical%2520Semantic%2520Gaussian%2520Splatting%2520via%2520City-Model%2520Priors%26entry.906535625%3DQilin%2520Zhang%2520and%2520Jinyu%2520Zhu%2520and%2520Olaf%2520Wysocki%2520and%2520Benjamin%2520Busam%2520and%2520Boris%2520Jutzi%26entry.1292438233%3DRecent%2520semantic%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520methods%2520primarily%2520rely%2520on%25202D%2520foundation%2520models%252C%2520often%2520yielding%2520ambiguous%2520boundaries%2520and%2520limited%2520support%2520for%2520structured%2520urban%2520semantics.%2520While%2520city%2520models%2520such%2520as%2520CityGML%2520encode%2520hierarchically%2520organized%2520semantics%2520together%2520with%2520building%2520geometry%252C%2520these%2520labels%2520cannot%2520be%2520directly%2520mapped%2520to%2520Gaussian%2520primitives.%2520We%2520present%2520GS4City%252C%2520a%2520hierarchical%2520semantic%2520Gaussian%2520Splatting%2520method%2520that%2520incorporates%2520city-model%2520priors%2520for%2520urban%2520scene%2520understanding.%2520GS4City%2520derives%2520reliable%2520image-aligned%2520masks%2520from%2520Level%2520of%2520Detail%2520% {"title": "LEADER: Learning Reliable Local-to-Global Correspondences for LiDAR Relocalization", "author": "Jianshi Wu and Minghang Zhu and Dunqiang Liu and Wen Li and Sheng Ao and Siqi Shen and Chenglu Wen and Cheng Wang", "abstract": "LiDAR relocalization has attracted increasing attention as it can deliver accurate 6-DoF pose estimation in complex 3D environments. Recent learning-based regression methods offer efficient solutions by directly predicting global poses without the need for explicit map storage. However, these methods often struggle in challenging scenes due to their equal treatment of all predicted points, which is vulnerable to noise and outliers. In this paper, we propose LEADER, a robust LiDAR-based relocalization framework enhanced by a simple, yet effective geometric encoder. Specifically, a Robust Projection-based Geometric Encoder architecture which captures multi-scale geometric features is first presented to enhance descriptiveness in geometric representation. A Truncated Relative Reliability loss is then formulated to model point-wise ambiguity and mitigate the influence of unreliable predictions. Extensive experiments on the Oxford RobotCar and NCLT datasets demonstrate that LEADER outperforms state-of-the-art methods, achieving 24.1% and 73.9% relative reductions in position error over existing techniques, respectively. The source code is released on https://github.com/JiansW/LEADER.", "link": "http://arxiv.org/abs/2604.11355v1", "date": "2026-04-13", "relevancy": 3.1179, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6638}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6226}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5844}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LEADER%3A%20Learning%20Reliable%20Local-to-Global%20Correspondences%20for%20LiDAR%20Relocalization&body=Title%3A%20LEADER%3A%20Learning%20Reliable%20Local-to-Global%20Correspondences%20for%20LiDAR%20Relocalization%0AAuthor%3A%20Jianshi%20Wu%20and%20Minghang%20Zhu%20and%20Dunqiang%20Liu%20and%20Wen%20Li%20and%20Sheng%20Ao%20and%20Siqi%20Shen%20and%20Chenglu%20Wen%20and%20Cheng%20Wang%0AAbstract%3A%20LiDAR%20relocalization%20has%20attracted%20increasing%20attention%20as%20it%20can%20deliver%20accurate%206-DoF%20pose%20estimation%20in%20complex%203D%20environments.%20Recent%20learning-based%20regression%20methods%20offer%20efficient%20solutions%20by%20directly%20predicting%20global%20poses%20without%20the%20need%20for%20explicit%20map%20storage.%20However%2C%20these%20methods%20often%20struggle%20in%20challenging%20scenes%20due%20to%20their%20equal%20treatment%20of%20all%20predicted%20points%2C%20which%20is%20vulnerable%20to%20noise%20and%20outliers.%20In%20this%20paper%2C%20we%20propose%20LEADER%2C%20a%20robust%20LiDAR-based%20relocalization%20framework%20enhanced%20by%20a%20simple%2C%20yet%20effective%20geometric%20encoder.%20Specifically%2C%20a%20Robust%20Projection-based%20Geometric%20Encoder%20architecture%20which%20captures%20multi-scale%20geometric%20features%20is%20first%20presented%20to%20enhance%20descriptiveness%20in%20geometric%20representation.%20A%20Truncated%20Relative%20Reliability%20loss%20is%20then%20formulated%20to%20model%20point-wise%20ambiguity%20and%20mitigate%20the%20influence%20of%20unreliable%20predictions.%20Extensive%20experiments%20on%20the%20Oxford%20RobotCar%20and%20NCLT%20datasets%20demonstrate%20that%20LEADER%20outperforms%20state-of-the-art%20methods%2C%20achieving%2024.1%25%20and%2073.9%25%20relative%20reductions%20in%20position%20error%20over%20existing%20techniques%2C%20respectively.%20The%20source%20code%20is%20released%20on%20http {"title": "XD-MAP: Cross-Modal Domain Adaptation via Semantic Parametric Maps for Scalable Training Data Generation", "author": "Frank Bieder and Hendrik K\u00f6nigshof and Haohao Hu and Fabian Immel and Yinzhe Shen and Jan-Hendrik Pauls and Christoph Stiller", "abstract": "Until open-world foundation models match the performance of specialized approaches, deep learning systems remain dependent on task- and sensor-specific data availability. To bridge the gap between available datasets and deployment domains, domain adaptation strategies are widely used. In this work, we propose XD-MAP, a novel approach to transfer sensor-specific knowledge from an image dataset to LiDAR, an entirely different sensing domain. Our method leverages detections on camera images to create a semantic parametric map. The map elements are modeled to produce pseudo labels in the target domain without any manual annotation effort. Unlike previous domain transfer approaches, our method does not require direct overlap between sensors and enables extending the angular perception range from a front-view camera to a full 360\u00b0 view. On our large-scale road feature dataset, XD-MAP outperforms single shot baseline approaches by +19.5 mIoU for 2D semantic segmentation, +19.5 PQth for 2D panoptic segmentation, and +32.3 mIoU in 3D semantic segmentation. The results demonstrate the effectiveness of our approach achieving strong performance on LiDAR data without any manual labeling.", "link": "http://arxiv.org/abs/2601.14477v2", "date": "2026-04-13", "relevancy": 3.0658, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.624}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6155}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties egmentation.%20The%20results%20demonstrate%20the%20effectiveness%20of%20our%20approach%20achieving%20strong%20performance%20on%20LiDAR%20data%20without%20any%20manual%20labeling.%0ALink%3A%20http%3A//arxiv.org/abs/2601.14477v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXD-MAP%253A%2520Cross-Modal%2520Domain%2520Adaptation%2520via%2520Semantic%2520Parametric%2520Maps%2520for%2520Scalable%2520Training%2520Data%2520Generation%26entry.906535625%3DFrank%2520Bieder%2520and%2520Hendrik%2520K%25C3%25B6nigshof%2520and%2520Haohao%2520Hu%2520and%2520Fabian%2520Immel%2520and%2520Yinzhe%2520Shen%2520and%2520Jan-Hendrik%2520Pauls%2520and%2520Christoph%2520Stiller%26entry.1292438233%3DUntil%2520open-world%2520foundation%2520models%2520match%2520the%2520performance%2520of%2520specialized%2520approaches%252C%2520deep%2520learning%2520systems%2520remain%2520dependent%2520on%2520task-%2520and%2520sensor-specific%2520data%2520availability.%2520To%2520bridge%2520the%2520gap%2520between%2520available%2520datasets%2520and%2520deployment%2520domains%252C%2520domain%2520adaptation%2520strategies%2520are%2520widely%2520used.%2520In%2520this%2520work%252C%2520we%2520propose%2520XD-MAP%252C%2520a%2520novel%2520approach%2520to%2520transfer%2520sensor-specific%2520knowledge%2520from%2520an%2520image%2520dataset%2520to%2520LiDAR%252C%2520an%2520entirely%2520different%2520sensing%2520domain.%2520Our%2520method%2520leverages%2520detections%2520on%2520camera%2520images%2520to%2520create%2520a%2520semantic%2520parametric%2520map.%2520The%2520map%2520elements%2520are%2520modeled%2520to%2520produce%2520pseudo%2520labels%2520in%2520the%2520target%2520domain%2520without%2520any%2520manual%2520annotation%2520effort.%2520Unlike%2520previous%2520domain%2520transfer%2520approaches%252C%2520our%2520method%2520does%2520not%2520require%2520direct%2520overlap%2520between%2520sensors%2520and%2520enables%2520extending%2520t {"title": "LMMs Meet Object-Centric Vision: Understanding, Segmentation, Editing and Generation", "author": "Yuqian Yuan and Wenqiao Zhang and Juekai Lin and Yu Zhong and Mingjian Gao and Binhe Yu and Yunqi Cao and Wentong Li and Yueting Zhuang and Beng Chin Ooi", "abstract": "Large Multimodal Models (LMMs) have achieved remarkable progress in general-purpose vision--language understanding, yet they remain limited in tasks requiring precise object-level grounding, fine-grained spatial reasoning, and controllable visual manipulation. In particular, existing systems often struggle to identify the correct instance, preserve object identity across interactions, and localize or modify designated regions with high precision. Object-centric vision provides a principled framework for addressing these challenges by promoting explicit representations and operations over visual entities, thereby extending multimodal systems from global scene understanding to object-level understanding, segmentation, editing, and generation. This paper presents a comprehensive review of recent advances at the convergence of LMMs and object-centric vision. We organize the literature into four major themes: object-centric visual understanding, object-centric referring segmentation, object-centric visual editing, and object-centric visual generation. We further summarize the key modeling paradigms, learning strategies, and evaluation protocols that support these capabilities. Finally, we discuss open challenges and future directions, including robust instance permanence, fine-grained spatial control, consistent multi-step interaction, unified cross-task modeling, and reliable benchmarking under distribution shift. We hope this paper provides a structured perspective on the development of scalable, precise, and trustworthy object-centric multimodal systems.", "link": "http://arxiv.org/abs/2604.11789v1", "date": "2026-04-13", "relevancy": 3.0449, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.629}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5689}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LMMs%20Meet%20Object-Centric%20Vision%3A%20Understanding%2C%20Segmentation%2C%20Editing%20and%20Generation&body=Title%3A%20LMMs%20Meet%20Object-Centric%20Vision%3A%20Understanding%2C%20Segmentation%2C%20Editing%20and%20Generation%0AAuthor%3A%20Yuqian%20Yuan%20and%20Wenqiao%20Zhang%20and%20Juekai%20Lin%20and%20Yu%20Zhong%20and%20Mingjian%20Gao%20and%20Binhe%20Yu%20and%20Yunqi%20Cao%20and%20Wentong%20Li%20and%20Yueting%20Zhuang%20and%20Beng%20Chin%20Ooi%0AAbstract%3A%20Large%20Multimodal%20Models%20%28LMMs%29%20have%20achieved%20remarkable%20progress%20in%20general-purpose%20vision--language%20understanding%2C%20yet%20they%20remain%20limited%20in%20tasks%20requiring%20precise%20object-level%20grounding%2C%20fine-grained%20spatial%20reasoning%2C%20and%20controllable%20visual%20manipulation.%20In%20particular%2C%20existing%20systems%20often%20struggle%20to%20identify%20the%20correct%20instance%2C%20preserve%20object%20identity%20across%20interactions%2C%20and%20localize%20or%20modify%20designated%20regions%20with%20high%20precision.%20Object-centric%20vision%20provides%20a%20principled%20framework%20for%20addressing%20these%20challenges%20by%20promoting%20explicit%20representations%20and%20operations%20over%20visual%20entities%2C%20thereby%20extending%20multimodal%20systems%20from%20global%20scene%20understanding%20to%20object-level%20understanding%2C%20segmentation%2C%20editing%2C%20and%20generation.%20This%20paper%20presents%20a%20comprehensive%20review%20of%20recent%20advances%20at%20the%20convergence%20of%20LMMs%20and%20object-centric%20vision.%20We%20organize%20the%20literature%20into%20four%20major%20themes%3A%20object-centric%20visual%20understanding%2C%20object-centric%20referring%20segmentation%2C%20object-centric%20visual%20editing%2C%20and%20object-centric%20visual%20generation.%20We%20further%20summarize%20the%20key%20modeling%20paradigms%2C%20learning%20strategies%2C%20and%20evaluation%20protocols%20that%20support%20these%20capabilities.%20Finally%2C%20we%20discuss%20open%20challenges%20and%20future%20directions%2C%20including%20robust%20instance%20permanence%2C%20fine-grained%20spatial%20control%2C%20consistent%20multi-step%20interaction%2C%20unified%20cross-task%20modeling%2C%20and%20reliable%20benchmarking%20under%20distribution%20shift.%20We%20hope%20this%20paper%20provides%20a%20structured%20perspective%20on%20the%20development%20of%20scalable%2C%20precise%2C%20and%20trustworthy%20object-centric%20multimodal%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11789v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLMMs%2520Meet%2520Object-Centric%2520Vision%253A%2520Understanding%252C%2520Segmentation%252C%2520Editing%2520and%2520Generation%26entry.906535625%3DYuqian%2520Yuan%2520and%2520Wenqiao%2520Zhang%2520and%2520Juekai%2520Lin%2520and%2520Yu%2520Zhong%2520and%2520Mingjian%2520Gao%2520and%2520Binhe%2520Yu%2520and%2520Yunqi%2520Cao%2520and%2520Wentong%2520Li%2520and%2520Yueting%2520Zhuang%2520and%2520Beng%2520Chin%2520Ooi%26entry.1292438233%3DLarge%2520Multimodal%2520Models%2520%2528LMMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520in%2520general-purpose%2520vision--language%2520understanding%252C%2520yet%2520they%2520remain%2520limited%2520in%2520tasks%2520requiring%2520precise%2520object-level%2520grounding%252C%2520fine-grained%2520spatial%2520reasoning%252C%2520and%2520controllable%2520visual%2520manipulation.%2520In%2520p {"title": "TerraSky3D: Multi-View Reconstructions of European Landmarks in 4K", "author": "Mattia D'Urso and Yuxi Hu and Christian Sormann and Mattia Rossi and Friedrich Fraundorfer", "abstract": "Despite the growing need for data of more and more sophisticated 3D reconstruction pipelines, we can still observe a scarcity of suitable public datasets. Existing 3D datasets are either low resolution, limited to a small amount of scenes, based on images of varying quality because retrieved from the internet, or limited to specific capturing scenarios.\n  Motivated by this lack of suitable 3D datasets, we captured TerraSky3D, a high-resolution large-scale 3D reconstruction dataset comprising 50,000 images divided into 150 ground, aerial, and mixed scenes. The dataset focuses on European landmarks and comes with curated calibration data, camera poses, and depth maps. TerraSky3D tries to answer the need for challenging dataset that can be used to train and evaluate 3D reconstruction-related pipelines.", "link": "http://arxiv.org/abs/2603.28287v2", "date": "2026-04-13", "relevancy": 2.9944, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6158}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6158}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TerraSky3D%3A%20Multi-View%20Reconstructions%20of%20European%20Landmarks%20in%204K&body=Title%3A%20TerraSky3D%3A%20Multi-View%20Reconstructions%20of%20European%20Landmarks%20in%204K%0AAuthor%3A%20Mattia%20D%27Urso%20and%20Yuxi%20Hu%20and%20Christian%20Sormann%20and%20Mattia%20Rossi%20and%20Friedrich%20Fraundorfer%0AAbstract%3A%20Despite%20the%20growing%20need%20for%20data%20of%20more%20and%20more%20sophisticated%203D%20reconstruction%20pipelines%2C%20we%20can%20still%20observe%20a%20scarcity%20of%20suitable%20public%20datasets.%20Existing%203D%20datasets%20are%20either%20low%20resolution%2C%20limited%20to%20a%20small%20amount%20of%20scenes%2C%20based%20on%20images%20of%20varying%20quality%20because%20retrieved%20from%20the%20internet%2C%20or%20limited%20to%20specific%20capturing%20scenarios.%0A%20%20Motivated%20by%20this%20lack%20of%20suitable%203D%20datasets%2C%20we%20captured%20TerraSky3D%2C%20a%20high-resolution%20large-scale%203D%20reconstruction%20dataset%20comprising%2050%2C000%20images%20divided%20into%20150%20ground%2C%20aerial%2C%20and%20mixed%20scenes.%20The%20dataset%20focuses%20on%20European%20landmarks%20and%20comes%20with%20curated%20calibration%20data%2C%20camera%20poses%2C%20and%20depth%20maps.%20TerraSky3D%20tries%20to%20answer%20the%20need%20for%20challenging%20dataset%20that%20can%20be%20used%20to%20train%20and%20evaluate%203D%20reconstruction-related%20pipelines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28287v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTerraSky3D%253A%2520Multi-View%2520Reconstructions%2520of%2520European%2520Landmarks%2520in%25204K%26entry.906535625%3DMattia%2520D%2527Urso%2520and%2520Yuxi%2520Hu%2520and%2520Christian%2520Sormann%2520and%2520Mattia%2520Rossi%2520and%2520Friedrich%2520Fraundorfer%26entry.1292438233%3DDespite%2520the%2520growing%2520need%2520for%2520data%2520of%2520more%2520and%2520more%2520sophisticated%25203D%2520reconstruction%2520pipelines%252C%2520we%2520can%2520still%2520observe%2520a%2520scarcity%2520of%2520suitable%2520public%2520datasets.%2520Existing%25203D%2520datasets%2520are%2520either%2520low%2520resolution%252C%2520limited%2520to%2520a%2520small%2520amount%2520of%2520scenes%252C%2520based%2520on%2520images%2520of%2520varying%2520quality%2520because%2520retrieved%2520from%2520the%2520int {"title": "POINTS-Long: Adaptive Dual-Mode Visual Reasoning in MLLMs", "author": "Haicheng Wang and Yuan Liu and Yikun Liu and Zhemeng Yu and Zhongyin Zhao and Yangxiu You and Zilin Yu and Le Tian and Xiao Zhou and Jie Zhou and Weidi Xie and Yanfeng Wang", "abstract": "Multimodal Large Language Models (MLLMs) have recently demonstrated remarkable capabilities in cross-modal understanding and generation. However, the rapid growth of visual token sequences--especially in long-video and streaming scenarios--poses a major challenge to their scalability and real-world deployment. Thus, we introduce POINTS-Long, a native dual-mode MLLM featuring dynamic visual token scaling inspired by the human visual system. The model supports two complementary perception modes: focus mode and standby mode, enabling users to dynamically trade off efficiency and accuracy during inference. On fine-grained visual tasks, the focus mode retains the optimal performance, while on long-form general visual understanding, the standby mode retains 97.7-99.7% of the original accuracy using only 1/40-1/10th of the visual tokens. Moreover, POINTS-Long natively supports streaming visual understanding via a dynamically detachable KV-cache design, allowing efficient maintenance of ultra-long visual memory. Our work provides new insights into the design of future MLLMs and lays the foundation for adaptive and efficient long-form visual understanding.", "link": "http://arxiv.org/abs/2604.11627v1", "date": "2026-04-13", "relevancy": 2.9887, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6019}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6019}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0. {"title": "DoReMi: Bridging 3D Domains via Topology-Aware Domain-Representation Mixture of Experts", "author": "Mingwei Xing and Xinliang Wang and Yifeng Shi", "abstract": "Constructing a unified 3D scene understanding model has long been hindered by the significant topological discrepancies across different sensor modalities. While applying the Mixture-of-Experts (MoE) architecture is an effective approach to achieving universal understanding, we observe that existing 3D MoE networks often suffer from semantics-driven routing bias. This makes it challenging to address cross-domain data characterized by \"semantic consistency yet topological heterogeneity.\" To overcome this challenge, we propose DoReMi (Topology-Aware Domain-Representation Mixture of Experts). Specifically, we introduce a self-supervised pre-training branch based on multi attributes, such as topological and texture variations, to anchor cross-domain structural priors. Building upon this, we design a domain-aware expert branch comprising two core mechanisms: Domain Spatial-Guided Routing (DSR), which achieves an acute perception of local topological variations by extracting spatial contexts, and Entropy-controlled Dynamic Allocation (EDA), which dynamically adjusts the number of activated experts by quantifying routing uncertainty to ensure training stability. Through the synergy of these dual branches, DoReMi achieves a deep integration of universal feature extraction and highly adaptive expert allocation. Extensive experiments across various tasks, encompassing both indoor and outdoor scenes, validate the superiority of DoReMi. It achieves 80.1% mIoU on the ScanNet validation set and 77.2% mIoU on S3DIS, comprehensively outperforming existing state-of-the-art methods. The code will be released soon.", "link": "http://arxiv.org/abs/2511.11232v2", "date": "2026-04-13", "relevancy": 2.9755, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5992}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5891}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DoReMi%3A%20Bridging%203D%20Domains%20via%20Topology-Aware%20Domain-Representation%20Mixture%20of%20Experts&body=Title%3A%20DoReMi%3A%20Bridging%203D%20Domains%20via%20Topology-Aware%20Domain-Representation%20Mixture%20of%20Experts%0AAuthor%3A%20Mingwei%20Xing%20and%20Xinliang%20Wang%20and%20Yifeng%20Shi%0AAbstract%3A%20Constructing%20a%20unified%203D%20scene%20understanding%20model%20has%20long%20been%20hindered%20by%20the%20significant%20topological%20discrepancies%20across%20different%20sensor%20modalities.%20While%20applying%20the%20Mixture-of-Experts%20%28MoE%29%20architecture%20is%20an%20effective%20approach%20to%20achieving%20universal%20understanding%2C%20we%20observe%20that%20existing%203D%20MoE%20networks%20often%20suffer%20from%20semantics-driven%20routing%20bias.%20This%20makes%20it%20challenging%20to%20address%20cross-domain%20data%20characterized%20by%20%22semantic%20consistency%20yet%20topological%20heterogeneity.%22%20To%20overcome%20this%20challenge%2C%20we%20propose%20DoReMi%20%28Topology-Aware%20Domain-Representation%20Mixture%20of%20Experts%29.%20Specifically%2C%20we%20introduce%20a%20self-supervised%20pre-training%20branch%20based%20on%20multi%20attributes%2C%20such%20as%20topological%20and%20texture%20variations%2C%20to%20anchor%20cross-domain%20structural%20priors.%20Building%20upon%20this%2C%20we%20design%20a%20domain-aware%20expert%20branch%20comprising%20two%20core%20mechanisms%3A%20Domain%20Spatial-Guided%20Routing%20%28DSR%29%2C%20which%20achieves%20an%20acute%20perception%20of%20local%20topological%20variations%20by%20extracting%20spatial%20contexts%2C%20and%20Entropy-controlled%20Dynamic%20Allocation%20%28EDA%29%2C%20which%20dynamically%20adjusts%20the%20number%20of%20activated%20experts%20by%20quantifying%20routing%20uncertainty%20to%20ensure%20training%20stability.%20Through%20the%20synergy%20of%20these%20dual%20branches%2C%20DoReMi%20achieves%20a%20deep%20integration%20of%20universal%20feature%20extraction%20and%20highly%20adaptive%20expert%20allocation.%20Extensive%20experiments%20across%20various%20tasks%2C%20encompassing%20both%20indoor%20and%20outdoor%20scenes%2C%20validate%20the%20superiority%20of%20DoReMi.%20It%20achieves%2080.1%25%20mIoU%20on%20the%20ScanNet%20validation%20set%20and%2077.2%25%20mIoU%20on%20S3DIS%2C%20comprehensively%20outperforming%20existing%20state-of-the-art%20methods.%20The%20code%20will%20be%20released%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2511.11232v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDoReMi%253A%2520Bridging%25203D%2520Domains%2520via%2520Topology-Aware%2520Domain-Representation%2520Mixture%2520of%2520Experts%26entry.906535625%3DMingwei%2520Xing%2520and%2520Xinliang%2520Wang%2520and%2520Yifeng%2520Shi%26entry.1292438233%3DConstructing%2520a%2520unified%25203D%2520scene%2520understanding%2520model%2520has%2520long%2520been%2520hindered%2520by%2520the%2520significant%2520topological%2520discrepancies%2520across%2520different%2520sensor%2520modalities.%2520While%2520applying%2520the%2520Mixture-of-Experts%2520%2528MoE%2529%2520architecture%2520is%2520an%2520effective%2520approach%2520to%2520achieving%2520universal%2520understanding%252C%2520we%2520observe%2520that%2520existing%25203D%2520MoE%2520networks%2520often%2520suffer%2520from%2520semantics-driven%2520routing%2520bias.%2520This%2520makes%2520it%2520challenging%2520to%2520address%2520cross-domain%2520data%2520characterized%2520by%2520%2522semantic%2520cons {"title": "HumanVBench: Probing Human-Centric Video Understanding in MLLMs with Automatically Synthesized Benchmarks", "author": "Ting Zhou and Daoyuan Chen and Qirui Jiao and Bolin Ding and Yaliang Li and Ying Shen", "abstract": "Evaluating the nuanced human-centric video understanding capabilities of Multimodal Large Language Models (MLLMs) remains a great challenge, as existing benchmarks often overlook the intricacies of emotion, behavior, and cross-modal alignment. We introduce HumanVBench, a comprehensive video benchmark designed to rigorously probe these capabilities across 16 fine-grained tasks. A cornerstone of our work is a novel and scalable benchmark construction methodology, featuring two automated pipelines that synthesize high-quality video annotations and challenging multiple-choice questions with minimal human labor. By leveraging state-of-the-art models for annotation and systematically converting model-induced errors into plausible distractors, our framework provides a generalizable ``machine'' for creating nuanced evaluation suites. Our extensive evaluation of 30 leading MLLMs on HumanVBench reveals critical deficiencies, particularly in perceiving subtle emotions and aligning speech with visual cues, with even top proprietary models falling short of human performance. We open-source HumanVBench and our synthesis pipelines to catalyze the development of more socially intelligent and capable video MLLMs.", "link": "http://arxiv.org/abs/2412.17574v3", "date": "2026-04-13", "relevancy": 2.9091, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.591}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.591}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5635}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HumanVBench%3A%20Probing%20Human-Centric%20Video%20Understanding%20in%20MLLMs%20with%20Automatically%20Synthesized%20Benchmarks&body=Title%3A%20HumanVBench%3A%20Probing%20Human-Centric%20Video%20Understanding%20in%20MLLMs%20with%20Automatically%20Synthesized%20Benchmarks%0AAuthor%3A%20Ting%20Zhou%20and%20Daoyuan%20Chen%20and%20Qirui%20Jiao%20and%20Bolin%20Ding%20and%20Yaliang%20Li%20and%20Ying%20Shen%0AAbstract%3A%20Evaluating%20the%20nuanced%20human-centric%20video%20understanding%20capabilities%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20remains%20a%20great%20challenge%2C%20as%20existing%20benchmarks%20often%20overlook%20the%20intricacies%20of%20emotion%2C%20behavior%2C%20and%20cross-modal%20alignment.%20We%20introduce%20HumanVBench%2C%20a%20comprehensive%20video%20benchmark%20designed%20to%20rigorously%20probe%20these%20capabilities%20across%2016%20fine-grained%20tasks.%20A%20cornerstone%20of%20our%20work%20is%20a%20novel%20and%20scalable%20benchmark%20construction%20methodology%2C%20featuring%20two%20automated%20pipelines%20that%20synthesize%20high-quality%20video%20annotations%20and%20challenging%20multiple-choice%20questions%20with%20minimal%20human%20labor.%20By%20leveraging%20state-of-the-art%20models%20for%20annotation%20and%20systematically%20converting%20model-induced%20errors%20into%20plausible%20distractors%2C%20our%20framework%20provides%20a%20generalizable%20%60%60machine%27%27%20for%20creating%20nuanced%20evaluation%20suites.%20Our%20extensive%20evaluation%20of%2030%20leading%20MLLMs%20on%20HumanVBench%20reveals%20critical%20deficiencies%2C%20particularly%20in%20perceiving%20subtle%20emotions%20and%20aligning%20speech%20with%20visual%20cues%2C%20with%20even%20top%20proprietary%20models%20falling%20short%20of%20human%20performance.%20We%20open-source%20HumanVBench%20and%20our%20synthesis%20pipelines%20to%20catalyze%20the%20development {"title": "Arbitration Failure, Not Perceptual Blindness: How Vision-Language Models Resolve Visual-Linguistic Conflicts", "author": "Farhad Nooralahzadeh and Omid Rohanian and Yi Zhang and Jonathan F\u00fcrst and Kurt Stockinger", "abstract": "When a Vision-Language Model (VLM) sees a blue banana and answers \"yellow\", is the problem of perception or arbitration? We explore the question in ten VLMs with various sizes and reveal an Encoding-Grounding Dissociation: models that fail to report what they see (and thus provide a wrong answer) still encode the visual evidence as strongly as models that provide the correct answer. Using Multimodal Arbitration Crossover (MAC) analysis with layer-by-layer Logit Lens probing, we track the competition between visual and prior signals across every layer of each model. We show that visual attributes can be linearly decodable from early layers (AUC > 0.86). The accuracy remains nearly identical for both successful and failed samples. However, the gap in the final-layer logit - not the strength of encoding - better predicts grounding outcomes with a correlation of $\u03c1=$ 0.847. After having studied when VLMs base their answers on image clues rather than prior knowledge, we want to understand the causal relationships. We establish causality through full-sequence activation patching. The standard last-token interventions in LLM interpretability do not affect VLMs. In contrast, replacing the full token sequence at layers identified by MAC alters 60 to 84% of outputs. Partial-token decomposition shows that image tokens carry almost all of the causal impact, while text tokens have none. Scaling addresses the remaining architectural differences to achieve perfect retention. Moving from diagnosis to intervention, we show that training-free activation steering - both linear and sparse autoencoder-guided - in early layers can improve visual grounding by up to +3.8% with degrading performance in some setups. Overall, these findings lead to a clear conclusion: VLMs already see well, but the challenge is acting on what they see. Targeted interventions can help to bridge this gap.", "link": "http://arxiv.org/abs/2604.09364v2", "date": "2026-04-13", "relevancy": 2.8772, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.594}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.594}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5383}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Arbitration%20Failure%2C%20Not%20Perceptual%20Blindness%3A%20How%20Vision-Language%20Models%20Resolve%20Visual-Linguistic%20Conflicts&body=Title%3A%20Arbitration%20Failure%2C%20Not%20Perceptual%20Blindness%3A%20How%20Vision-Language%20Models%20Resolve%20Visual-Linguistic%20Conflicts%0AAuthor%3A%20Farhad%20Nooralahzadeh%20and%20Omid%20Rohanian%20and%20Yi%20Zhang%20and%20Jonathan%20F%C3%BCrst%20and%20Kurt%20Stockinger%0AAbstract%3A%20When%20a%20Vision-Language%20Model%20%28VLM%29%20sees%20a%20blue%20banana%20and%20answers%20%22yellow%22%2C%20is%20the%20problem%20of%20perception%20or%20arbitration%3F%20We%20explore%20the%20question%20in%20ten%20VLMs%20with%20various%20sizes%20and%20reveal%20an%20Encoding-Grounding%20Dissociation%3A%20models%20that%20fail%20to%20report%20what%20they%20see%20%28and%20thus%20provide%20a%20wrong%20answer%29%20still%20encode%20the%20visual%20evidence%20as%20strongly%20as%20models%20that%20provide%20the%20correct%20answer.%20Using%20Multimodal%20Arbitration%20Crossover%20%28MAC%29%20analysis%20with%20layer-by-layer%20Logit%20Lens%20probing%2C%20we%20track%20the%20competition%20between%20visual%20and%20prior%20signals%20across%20every%20layer%20of%20each%20model.%20We%20show%20that%20visual%20attributes%20can%20be%20linearly%20decodable%20from%20early%20layers%20%28AUC%20%3E%200.86%29.%20The%20accuracy%20remains%20nearly%20identical%20for%20both%20successful%20and%20failed%20samples.%20However%2C%20the%20gap%20in%20the%20final-layer%20logit%20-%20not%20the%20strength%20of%20encoding%20-%20better%20predicts%20grounding%20outcomes%20with%20a%20correlation%20of%20%24%CF%81%3D%24%200.847.%20After%20having%20studied%20when%20VLMs%20base%20their%20answers%20on%20image%20clues%20rather%20than%20prior%20knowledge%2C%20we%20want%20to%20understand%20the%20causal%20relationships.%20We%20establish%20causality%20through%20full-sequence%20activation%20patching.%20The%20standard%20last-token%20interventions%20in%20LLM%20interpretability%20do%20not%20affect%20VLMs.%20In%20contrast%2C%20replacing%20the%20full%20token%20sequence%20at%20layers%20identified%20by%20MAC%20alters%2060%20to%2084%25%20of%20outputs.%20Partial-token%20decomposition%20shows%20that%20image%20tokens%20carry%20almost%20all%20of%20the%20causal%20impact%2C%20while%20text%20tokens%20have%20none.%20Scaling%20addresses%20the%20remaining%20architectural%20differences%20to%20achieve%20perfect%20retention.%20Moving%20from%20diagnosis%20to%20intervention%2C%20we%20show%20that%20training-free%20activation%20steering%20-%20both%20linear%20and%20sparse%20autoencoder-guided%20-%20in%20early%20layers%20can%20improve%20visual%20grounding%20by%20up%20to%20%2B3.8%25%20with%20degrading%20performance%20in%20some%20setups.%20Overall%2C%20these%20findings%20lead%20to%20a%20clear%20conclusion%3A%20VLMs%20already%20see%20well%2C%20but%20the%20challenge%20is%20acting%20on%20what%20they%20see.%20Targeted%20interventions%20can%20help%20to%20bridge%20this%20gap.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09364v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7 rchitectural%20differences%20to%20achieve%20perfect%20retention.%20Moving%20from%20diagnosis%20to%20intervention%2C%20we%20show%20that%20training-free%20activation%20steering%20-%20both%20linear%20and%20sparse%20autoencoder-guided%20-%20in%20early%20layers%20can%20improve%20visual%20grounding%20by%20up%20to%20%2B3.8%25%20with%20degrading%20performance%20in%20some%20setups.%20Overall%2C%20these%20findings%20lead%20to%20a%20clear%20conclusion%3A%20VLMs%20already%20see%20well%2C%20but%20the%20challenge%20is%20acting%20on%20what%20they%20see.%20Targeted%20interventions%20can%20help%20to%20bridge%20this%20gap.&entry.1838667208=http%3A//arxiv.org/abs/2604.09364v2&entry.124074799=Read"},
{"title": "LottieGPT: Tokenizing Vector Animation for Autoregressive Generation", "author": "Junhao Chen and Kejun Gao and Yuehan Cui and Mingze Sun and Mingjin Chen and Shaohui Wang and Xiaoxiao Long and Fei Ma and Qi Tian and Ruqi Huang and Hao Zhao", "abstract": "Despite rapid progress in video generation, existing models are incapable of producing vector animation, a dominant and highly expressive form of multimedia on the Internet. Vector animations offer resolution-independence, compactness, semantic structure, and editable parametric motion representations, yet current generative models operate exclusively in raster space and thus cannot synthesize them. Meanwhile, recent advances in large multimodal models demonstrate strong capabilities in generating structured data such as slides, 3D meshes, LEGO sequences, and indoor layouts, suggesting that native vector animation generation may be achievable. In this work, we present the first framework for tokenizing and autoregressively generating vector animations. We adopt Lottie, a widely deployed JSON-based animation standard, and design a tailored Lottie Tokenizer that encodes layered geometric primitives, transforms, and keyframe-based motion into a compact and semantically aligned token sequence. To support large-scale training, we also construct LottieAnimation-660K, the largest and most diverse vector animation dataset to date, consisting of 660k real-world Lottie animation and 15M static Lottie image files curated from broad Internet sources. Building upon these components, we finetune Qwen-VL to create LottieGPT, a native multimodal model capable of generating coherent, editable vector animations directly from natural language or visual prompts. Experiments show that our tokenizer dramatically reduces sequence length while preserving structural fidelity, enabling effective autoregressive learning of dynamic vector content. LottieGPT exhibits strong generalization across diverse animation styles and outperforms previous state-of-the-art models on SVG generation (a special case of single-frame vector animation).", "link": "http://arxiv.org/abs/2604.11792v1", "date": "2026-04-13", "relevancy": 2.8711, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5813}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5754}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5659}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LottieGPT%3A%20Tokenizing%20Vector%20Animation%20for%20Autoregressive%20Generation&body=Title%3A%20LottieGPT%3A%20Tokenizing%20Vector%20Animation%20for%20Autoregressive%20Generation%0AAuthor%3A%20Junhao%20Chen%20and%20Kejun%20Gao%20and%20Yuehan%20Cui%20and%20Mingze%20Sun%20and%20Mingjin%20Chen%20and%20Shaohui%20Wang%20and%20Xiaoxiao%20Long%20and%20Fei%20Ma%20and%20Qi%20Tian%20and%20Ruqi%20Huang%20and%20Hao%20Zhao%0AAbstract%3A%20Despite%20rapid%20progress%20in%20video%20generation%2C%20existing%20models%20are%20incapable%20of%20producing%20vector%20animation%2C%20a%20dominant%20and%20highly%20expressive%20form%20of%20multimedia%20on%20the%20Internet.%20Vector%20animations%20offer%20resolution-independence%2C%20compactness%2C%20semantic%20structure%2C%20and%20editable%20parametric%20motion%20representations%2C%20yet%20current%20generative%20models%20operate%20exclusively%20in%20raster%20space%20and%20thus%20cannot%20synthesize%20them.%20Meanwhile%2C%20recent%20advances%20in%20large%20multimodal%20models%20demonstrate%20strong%20capabilities%20in%20generating%20structured%20data%20such%20as%20slides%2C%203D%20meshes%2C%20LEGO%20sequences%2C%20and%20indoor%20layouts%2C%20suggesting%20that%20native%20vector%20animation%20generation%20may%20be%20achievable.%20In%20this%20work%2C%20we%20present%20the%20first%20framework%20for%20tokenizing%20and%20autoregressively%20generating%20vector%20animations.%20We%20adopt%20Lottie%2C%20a%20widely%20deployed%20JSON-based%20animation%20standard%2C%20and%20design%20a%20tailored%20Lottie%20Tokenizer%20that%20encodes%20layered%20geometric%20primitives%2C%20transforms%2C%20and%20keyframe-based%20motion%20into%20a%20compact%20and%20semantically%20aligned%20token%20sequence.%20To%20support%20large-scale%20training%2C%20we%20also%20construct%20LottieAnimation-660K%2C%20the%20largest%20and%20most%20diverse%20vector%20animation%20dataset%20to%20date%2C%20consisting%20of%20660k%20real-world%20Lottie%20animation%20and%2015M%20static%20Lottie%20image%20files%20curated%20from%20broad%20Internet%20sources.%20Building%20upon%20these%20components%2C%20we%20finetune%20Qwen-VL%20to%20create%20LottieGPT%2C%20a%20native%20multimodal%20model%20capable%20of%20generating%20coherent%2C%20editable%20vector%20animations%20directly%20from%20natural%20language%20or%20visual%20prompts.%20Experiments%20show%20that%20our%20tokenizer%20dramatically%20reduces%20sequence%20length%20while%20preserving%20structural%20fidelity%2C%20enabling%20effective%20autoregressive%20learning%20of%20dynamic%20vector%20content.%20LottieGPT%20exhibits%20strong%20generalization%20across%20diverse%20animation%20styles%20and%20outperforms%20previous%20state-of-the-art%20models%20on%20SVG%20generation%20%28a%20special%20case%20of%20single-frame%20vector%20animation%29.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11792v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLottieGPT%253A%2520Tokenizing%2520Vector%2520Animation%2520for%2520Autoregressive%2520Generation%26entry.906535625%3DJunhao%2520Chen%2520and%2520Kejun%2520Gao%2520and%2520Yuehan%2520Cui%2520and%2520Mingze%2520Sun%2520and%2520Mingjin%2520Chen%2520and%2520Shaohui%2520Wang%2520and%2520Xiaoxiao%2520Long%2 {"title": "Anthropogenic Regional Adaptation in Multimodal Vision-Language Model", "author": "Samuel Cahyawijaya and Peerat Limkonchotiwat and Tack Hwa Wong and Hitesh Laxmichand Patel and Amit Agarwal and Manuel Antonio Rufino and Carlos Rafael Catalan and Muhammad Reza Qorib and Vicky Feliren and Holy Lovenia and Aye Hninn Khine and Frederikus Hudi and David Anugraha and Alham Fikri Aji and Romrawin Chumpu and Viet-Thanh Pham and Minghan Wang and Mohamed Fazli Imam and Ruochen Zhang and Joseph Marvin Imperial and Do Xuan Long and Musa Izzanardi Wijanarko and Joel Ruben Antony Moniz and Patrick Amadeus Irawan and Hanif Muhammad Zhafran and Isaiah Flores and Ira Salsabila and Jun Kevin and Jostin Jerico Rosal and Patricia Nicole Monderin and Kun Kerdthaisong and Ahmad Mustafid and My Chiffon Nguyen and Natchapon Jongwiriyanurak and Siva Worajitwannakul and Haochen Li and Adrian Xuan Wei Lim and Bin Wang and Muhammad Ravi Shulthan Habibi and Lynnette Hui Xian Ng and Mithil Bangera and Yeshil Bangera and Priyaranjan Pattnayak and Dun Li Chan and Sherissa Caren Djuniwar and Hee Ming Shan", "abstract": "While the field of vision-language (VL) has achieved remarkable success in integrating visual and textual information across multiple languages and domains, there is still no dedicated framework for assessing human-centric alignment in vision-language systems. We offer two contributions to address this gap. First, we introduce Anthropogenic Regional Adaptation: a novel paradigm that aims to optimize model relevance to specific regional contexts while ensuring the retention of global generalization capabilities. Second, we present a simple, but effective adaptation method named Geographical-generalization-made-easy (GG-EZ), which utilizes regional data filtering and model merging. Through comprehensive experiments on 3 VL architectures: large vision-language models, text-to-image diffusion models, and vision-language embedding models, and a case study in Southeast Asia (SEA) regional adaptation, we demonstrate the importance of Anthropogenic Regional Adaptation and the effectiveness of GG-EZ, showing 5-15% gains in cultural relevance metrics across SEA while maintaining over 98% of global performance and even occasionally surpassing it. Our findings establish Anthropogenic Regional Alignment as a foundational paradigm towards applicability of multimodal vision-language models in diverse regions and demonstrate a simple-yet-effective baseline method that optimizes regional value alignment while preserving global generalization.", "link": "http://arxiv.org/abs/2604.11490v1", "date": "2026-04-13", "relevancy": 2.8691, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5781}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5781}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5653}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anthropogenic%20Regional%20Adaptation%20in%20Multimodal%20Vision-Language%20Model&body=Title%3A%20Anthropogenic%20Regional%20Adaptation%20in%20Multimodal%20Vision-Language%20Model%0AAuthor%3A%20Samuel%20Cahyawijaya%20and%20Peerat%20Limkonchotiwat%20and%20Tack%20Hwa%20Wong%20and%20Hitesh%20Laxmichand%20Patel%20and%20Amit%20Agarwal%20and%20Manuel%20Antonio%20Rufino%20and%20Carlos%20Rafael%20Catalan%20and%20Muhammad%20Reza%20Qorib%20and%20Vicky%20Feliren%20and%20Holy%20Lovenia%20and%20Aye%20Hninn%20Khine%20and%20Frederikus%20Hudi%20and%20David%20Anugraha%20and%20Alham%20Fikri%20Aji%20and%20Romrawin%20Chumpu%20and%20Viet-Thanh%20Pham%20and%20Minghan%20Wang%20and%20Mohamed%20Fazli%20Imam%20and%20Ruochen%20Zhang%20and%20Joseph%20Marvin%20Imperial%20and%20Do%20Xuan%20Long%20and%20Musa%20Iz {"title": "Revisiting Compositionality in Dual-Encoder Vision-Language Models: The Role of Inference", "author": "Imanol Miranda and Ander Salaberria and Eneko Agirre and Gorka Azkune", "abstract": "Dual-encoder Vision-Language Models (VLMs) such as CLIP are often characterized as bag-of-words systems due to their poor performance on compositional benchmarks. We argue that this limitation may stem less from deficient representations than from the standard inference protocol based on global cosine similarity. First, through controlled diagnostic experiments, we show that explicitly enforcing fine-grained region-segment alignment at inference dramatically improves compositional performance without updating pretrained encoders. We then introduce a lightweight transformer that learns such alignments directly from frozen patch and token embeddings. Comparing against full fine-tuning and prior end-to-end compositional training methods, we find that although these approaches improve in-domain retrieval, their gains do not consistently transfer under distribution shift. In contrast, learning localized alignment over frozen representations matches full fine-tuning on in-domain retrieval while yielding substantial improvements on controlled out-of-domain compositional benchmarks. These results identify global embedding matching as a key bottleneck in dual-encoder VLMs and highlight the importance of alignment mechanisms for robust compositional generalization.", "link": "http://arxiv.org/abs/2604.11496v1", "date": "2026-04-13", "relevancy": 2.8674, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5855}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5855}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv. %20alignment%20mechanisms%20for%20robust%20compositional%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11496v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Compositionality%2520in%2520Dual-Encoder%2520Vision-Language%2520Models%253A%2520The%2520Role%2520of%2520Inference%26entry.906535625%3DImanol%2520Miranda%2520and%2520Ander%2520Salaberria%2520and%2520Eneko%2520Agirre%2520and%2520Gorka%2520Azkune%26entry.1292438233%3DDual-encoder%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520such%2520as%2520CLIP%2520are%2520often%2520characterized%2520as%2520bag-of-words%2520systems%2520due%2520to%2520their%2520poor%2520performance%2520on%2520compositional%2520benchmarks.%2520We%2520argue%2520that%2520this%2520limitation%2520may%2520stem%2520less%2520from%2520deficient%2520representations%2520than%2520from%2520the%2520standard%2520inference%2520protocol%2520based%2520on%2520global%2520cosine%2520similarity.%2520First%252C%2520through%2520controlled%2520diagnostic%2520experiments%252C%2520we%2520show%2520that%2520explicitly%2520enforcing%2520fine-grained%2520region-segment%2520alignment%2520at%2520inference%2520dramatically%2520improves%2520compositional%2520performance%2520without%2520updating%2520pretrained%2520encoders.%2520We%2520then%2520introduce%2520a%2520lightweight%2520transformer%2520that%2520learns%2520such%2520alignments%2520directly%2520from%2520frozen%2520patch%2520and%2520token%2520embeddings.%2520Comparing%2520against%2520full%2520fine-tuning%2520and%2520prior%2520end-to-end%2520compositional%2520training%2520methods%252C%2520we%2520find%2520that%2520although%2520these%2520approaches%2520improve%2520in-domain%2520retrieval%252C%2520their%2520gains%2520do%2520not%2520consistently%2520transfer%2520under%2520distribution%2520shift.%2520In%2520contrast%252C%2520learning%2520localized%2520alignment%2520over%2520frozen%2520representations%2520matches%2520full%2520fine-tuning%2520on%2520in-domain%2520retrieval%2520while%2520yielding%2520substantial%2520improvements%2520on%2520controlled%2520out-of-domain%2520compositional%2520benchmarks.%2520These%2520results%2520identify%2520global%2520embedding%2520matching%2520as%2520a%2520key%2520bottleneck%2520in%2520dual-encoder%2520VLMs%2520and%2520highlight%2520the%2520importance%2520of%2520alignment%2520mechanisms%2520for%2520robust%2520compositional%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11496v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Revisiting%20Compositionality%20in%20Dual-Encoder%20Vision-Language%20Models%3A%20The%20Role%20of%20Inference&entry.906535625=Imanol%20Miranda%20and%20Ander%20Salaberria%20and%20Eneko%20Agirre%20and%20Gorka%20Azkune&entry.1292438233=Dual-encoder%20Vision-Language%20Models%20%28VLMs%29%20such%20as%20CLIP%20are%20often%20characterized%20as%20bag-of-words%20systems%20due%20to%20their%20poor%20performance%20on%20compositional%20benchmarks.%20We%20argue%20that%20this%20limitation%20may%20stem%20less%20from%20deficient%20representations%20than%20from%20the%20standard%20inference%20protocol%20based%20on%20global%20cosine%20similarity.%20First%2C%20through%20controlled%20diagnostic%20experiments%2C%20we%20show%20that%20explicitly%20enforcing%20fine-grained%20region-segment%20alignment%20at%20inference%20dramatically%20improves%20compositional%20performance%20without%20updating%20pretrained%20encoders.%20We%20then%20introduce%20a%20lightweight%20transformer%20that%20learns%20such%20alignments%20directly%20from%20frozen%20patch%20and%20token%20embeddings.%20Comparing%20against%20full%20fine-tuning%20and%20prior%20end-to-end%20compositional%20training%20methods%2C%20we%20find%20that%20although%20these%20approaches%20improve%20in-domain%20retrieval%2C%20their%20gains%20do%20not%20consistently%20transfer%20un {"title": "RL makes MLLMs see better than SFT", "author": "Junha Song and Sangdoo Yun and Dongyoon Han and Jaegul Choo and Byeongho Heo", "abstract": "A dominant assumption in Multimodal Language Model (MLLM) research is that its performance is largely inherited from the LLM backbone, given its immense parameter scale and remarkable capabilities. This has created a void in the understanding of the vision encoder, which determines how MLLMs perceive images. The recent shift in MLLM training paradigms, from Supervised Finetuning (SFT) to Reinforcement Learning (RL), magnifies this oversight-namely, the significant lack of analysis on how such training reshapes the vision encoder as well as the MLLM. To address this, we first investigate the impact of training strategies on MLLMs, where RL shows a clear advantage over SFT in strongly vision-related VQA benchmarks. Motivated by this, we conduct a critical yet under-explored analysis of the vision encoder of MLLMs through diverse and in-depth experiments, ranging from ImageNet classification and segmentation to gradient visualization. Our results demonstrate that MLLM's post-training strategy (i.e., SFT or RL) not only leads to distinct outcomes on MLLM downstream tasks, but also fundamentally reshapes MLLM's underlying visual representations. Specifically, the key finding of our study is that RL produces stronger and precisely localized visual representations compared to SFT, boosting the ability of the vision encoder for MLLM. We then reframe our findings into a simple recipe for building strong vision encoders for MLLMs, Preference-Instructed Vision OpTimization (PIVOT). When integrated into MLLMs, a PIVOT-trained vision encoder outperforms even larger and more heavily-trained counterparts, despite requiring less than 1% of the computational cost of standard vision pretraining. This result opens an effective and efficient path for advancing the vision backbones of MLLMs. Project page available at https://june-page.github.io/pivot/", "link": "http://arxiv.org/abs/2510.16333v2", "date": "2026-04-13", "relevancy": 2.8628, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5874}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5874}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.543}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RL%20makes%20MLLMs%20see%20better%20than%20SFT&body=Title%3A%20RL%20makes%20MLLMs%20see%20better%20than%20SFT%0AAuthor%3A%20Junha%20Song%20and%20Sangdoo%20Yun%20and%20Dongyoon%20Han%20and%20Jaegul%20Choo%20and%20Byeongho%20Heo%0AAbstract%3A%20A%20dominant%20assumption%20in%20Multimodal%20Language%20Model%20%28MLLM%29%20research%20is%20that%20its%20performance%20is%20largely%20inherited%20from%20the%20LLM%20backbone%2C%20given%20its%20immense%20parameter%20scale%20and%20remarkable%20capabilities.%20This%20has%20created%20a%20void%20in%20the%20understanding%20of%20the%20vision%20encoder%2C%20which%20determines%20how%20MLLMs%20perceive%20images.%20The%20recent%20shift%20in%20MLLM%20training%20paradigms%2C%20from%20Supervised%20Finetuning%20%28SFT%29%20to%20Reinforcement%20Learning%20%28RL%29%2C%20magnifies%20this%20oversight-namely%2C%20the%20significant%20lack%20of%20analysis%20on%20how%20such%20training%20reshapes%20the%20vision%20encoder%20as%20well%20as%20the%20MLLM.%20To%20address%20this%2C%20we%20first%20investigate%20the%20impact%20of%20training%20strategies%20on%20MLLMs%2C%20where%20RL%20shows%20a%20clear%20advantage%20over%20SFT%20in%20strongly%20vision-related%20VQA%20benchmarks.%20Motivated%20by%20this%2C%20we%20conduct%20a%20critical%20yet%20under-explored%20analysis%20of%20the%20vision%20encoder%20of%20MLLMs%20through%20diverse%20and%20in-depth%20experiments%2C%20ranging%20from%20ImageNet%20classification%20and%20segmentation%20to%20gradient%20visualization.%20Our%20results%20demonstrate%20that%20MLLM%27s%20post-training%20strategy%20%28i.e.%2C%20SFT%20or%20RL%29%20not%20only%20leads%20to%20distinct%20outcomes%20on%20MLLM%20downstream%20tasks%2C%20but%20also%20fundamentally%20reshapes%20MLLM%27s%20underlying%20visual%20representations.%20Specifically%2C%20the%20key%20finding%20of%20our%20study%20is%20that%20RL%20produces%20stronger%20and%20precisely%20localized%20visual%20representations%20compared%20to%20SFT%2C%20boosting%20the%20ability%20of%20the%20vision%20encoder%20for%20MLLM.%20We%20then%20reframe%20our%20findings%20into%20a%20simple%20recipe%20for%20building%20strong%20vision%20encoders%20for%20MLLMs%2C%20Preference-Instructed%20Vision%20OpTimization%20%28PIVOT%29.%20When%20integrated%20into%20MLLMs%2C%20a%20PIVOT-trained%20vision%20encoder%20outperforms%20even%20larger%20and%20more%20heavily-trained%20counterparts%2C%20despite%20requiring%20less%20than%201%25%20of%20the%20computational%20cost%20of%20standard%20vision%20pretraining.%20This%20result%20opens%20an%20effective%20and%20efficient%20path%20for%20advancing%20the%20vision%20backbones%20of%20MLLMs.%20Project%20page%20available%20at%20https%3A//june-page.github.io/pivot/%0ALink%3A%20http%3A//arxiv.org/abs/2510.16333v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRL%2520makes%2520MLLMs%2520see%2520better%2520than%2520SFT%26entry.906535625%3DJunha%2520Song%2520and%2520Sangdoo%2520Yun%2520and%2520Dongyoon%2520Han%2520and%2520Jaegul%2520Choo%2520and%2520Byeongho%2520Heo%26entry.1292438233%3DA%2520dominant%2520assumption%2520in%2520Multimodal%2520Language%2520Model%2520%2528MLLM%2529%2520research%2520is%2520that%2520its%2520performance%2520is%2520largely%2520inherited%2520from%2520the%2520LLM%2520backbone%252C%2520given%2520its%25 {"title": "TAG-Head: Time-Aligned Graph Head for Plug-and-Play Fine-grained Action Recognition", "author": "Imtiaz Ul Hassan and Nik Bessis and Ardhendu Behera", "abstract": "Fine-grained human action recognition (FHAR) is challenging because visually similar actions differ by subtle spatio-temporal cues. Many recent systems enhance discriminability with extra modalities (e.g., pose, text, optical flow), but this increases annotation burden and computational cost. We introduce TAG-Head, a lightweight spatio-temporal graph head that upgrades standard 3D backbones (SlowFast, R(2+1)D-34, I3D, etc.) for FHAR using RGB only. Our pipeline first applies a Transformer encoder with learnable 3D positional encodings to the backbone tokens, capturing long-range dependencies across space and time. The resulting features are then refined by a graph in which (i) fully-connected intra-frame edges to resolve subtle appearance differences within frames, and (ii) time-aligned temporal edges that connect features at the same spatial location across frames to stabilise motion cues without over-smoothing. The head is compact (little parameter/FLOP overhead), plug-and-play across backbones, and trained end-to-end with the backbone. Extensive evaluations on FineGym (Gym99 and Gym288) and HAA500 show that TAG-Head sets a new state-of-the-art among RGB-only models and surpasses many recent multimodal approaches (video + pose + text) that rely on privileged information. Ablations disentangle the contributions of the Transformer and the graph topology, and complexity analyses confirm low latency. TAG-Head advances FHAR by explicitly coupling global context with high-resolution spatial interactions and low-variance temporal continuity inside a slim, composable graph head. The simplicity of the design enables straightforward adoption in practical systems that favour RGB-only sensors, while delivering performance gains typically associated with heavier or multimodal models. Code will be released on GitHub.", "link": "http://arxiv.org/abs/2604.11498v1", "date": "2026-04-13", "relevancy": 2.8458, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5739}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5708}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5628}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TAG-Head%3A%20Time-Aligned%20Graph%20Head%20for%20Plug-and-Play%20Fine-grained%20Action%20Recognition&body=Title%3A%20TAG-Head%3A%20Time-Aligned%20Graph%20Head%20for%20Plug-and-Play%20Fine-grained%20Action%20Recognition%0AAuthor%3A%20Imtiaz%20Ul%20Hassan%20and%20Nik%20Bessis%20and%20Ardhendu%20Behera%0AAbstract%3A%20Fine-grained%20human%20action%20recognition%20%28FHAR%29%20is%20challenging%20because%20visually%20similar%20actions%20differ%20by%20subtle%20spatio-temporal%20cues.%20Many%20recent%20systems%20enhance%20discriminability%20with%20extra%20modalities%20%28e.g.%2C%20pose%2C%20text%2C%20optical%20flow%29%2C%20but%20this%20increases%20annotation%20burden%20and%20computational%20cost.%20We%20introduce%20TAG-Head%2C%20a%20lightweight%20spatio-temporal%20graph%20head%20that%20upgrades%20standard%203D%20backbones%20%28SlowFast%2C%20R%282%2B1%29D-34%2C%20I3D%2C%20etc.%29%20for%20FHAR%20using%20RGB%20only.%20Our%20pipeline%20first%20applies%20a%20Transformer%20encoder%20with%20learnable%203D%20positional%20encodings%20to%20the%20backbone%20tokens%2C%20capturing%20long-range%20dependencies%20across%20space%20and%20time.%20The%20resulting%20features%20are%20then%20refined%20by%20a%20graph%20in%20which%20%28i%29%20fully-connected%20intra-frame%20edges%20to%20resolve%20subtle%20appearance%20differences%20within%20frames%2C%20and%20%28ii%29%20time-aligned%20temporal%20edges%20that%20connect%20features%20at%20the%20same%20spatial%20location%20across%20frames%20to%20stabilise%20motion%20cues%20without%20over-smoothing.%20The%20head%20is%20compact%20%28little%20parameter/FLOP%20overhead%29%2C%20plug-and-play%20across%20backbones%2C%20and%20trained%20end-to-end%20with%20the%20backbone.%20Extensive%20evaluations%20on%20FineGym%20%28Gym99%20and%20Gym288%29%20and%20HAA500%20show%20that%20TAG-Head%20sets%20a%20new%20state-of-the-art%20among%20RGB-only%20models%20and%20surpasses%20many%20recent%20multimodal%20approaches%20%28video%20%2B%20pose%20%2B%20text%29%20that%20rely%20on%20privileged%20information.%20Ablations%20disentangle%20the%20contributions%20of%20the%20Transformer%20and%20the%20graph%20topology%2C%20and%20complexity%20analyses%20confirm%20low%20latency.%20TAG-Head%20advances%20FHAR%20by%20explicitly%20coupling%20global%20context%20with%20high-resolution%20spatial%20interactions%20and%20low-variance%20temporal%20continuity%20inside%20a%20slim%2C%20composable%20graph%20head.%20The%20simplicity%20of%20the%20design%20enables%20straightforward%20adoption%20in%20practical%20systems%20that%20favour%20RGB-only%20sensors%2C%20while%20delivering%20performance%20gains%20typically%20associated%20with%20heavier%20or%20multimodal%20models.%20Code%20will%20be%20released%20on%20GitHub.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11498v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTAG-Head%253A%2520Time-Aligned%2520Graph%2520Head%2520for%2520Plug-and-Play%2520Fine-grained%2520Action%2520Recognition%26entry.906535625%3DImtiaz%2520Ul%2520Hassan%2520and%2520Nik%2520Bessis%2520and%2520Ardhendu%2520Behera%26entry.1292438233%3DFine-grained%2520human%2520action%2520recognition%2520%2528FHAR%2529%2520is%2520challenging%2520because%2520visually%2520similar%2520actions%2520differ%2520by%2520subtle%2520spatio-temporal%2520cues.%2520Many%2520recent%2520systems%2520e {"title": "Empowering Video Translation using Multimodal Large Language Models", "author": "Bingzheng QU and Kehai Chen and Xuefeng Bai and Min Zhang", "abstract": "Recent developments in video translation have further enhanced cross-lingual access to video content, with multimodal large language models (MLLMs) playing an increasingly important supporting role. With strong multimodal understanding, reasoning, and generation capabilities, MLLMs-based video translation systems are overcoming the limitations of traditional cascaded pipelines that separately handle automatic speech recognition, machine translation, text-to-speech and lip synchronization. These MLLM-powered approaches not only achieve competitive or superior translation quality, but also demonstrate stronger robustness in zero-shot settings and multi-speaker scenarios, while jointly modeling semantic fidelity, timing, speaker identity, and emotional consistency. However, despite the rapid progress of MLLMs and extensive surveys on general video-language understanding, a focused and systematic review of how MLLMs empower video translation tasks is still lacking. To fill this gap, we provide the first comprehensive overview of MLLMs-based video translation, organized around a three-role taxonomy: 1) Semantic Reasoner, which characterizes how MLLMs perform video understanding, temporal reasoning, and multimodal fusion; 2) Expressive Performer, which analyzes LLM-driven and LLM-augmented techniques for expressive, controllable speech generation; and 3) Visual Synthesizer, which examines different types of video generators for high-fidelity lip-sync and visual alignment. Finally, we discuss open challenges in video understanding, temporal modeling, and multimodal alignment, and outline promising future research directions for MLLMs-powered video translation.", "link": "http://arxiv.org/abs/2604.11283v1", "date": "2026-04-13", "relevancy": 2.8448, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5732}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5732}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5604}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Empowering%20Video%20Translation%20using%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Empowering%20Video%20Translation%20using%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Bingzheng%20QU%20and%20Kehai%20Chen%20and%20Xuefeng%20Bai%20and%20Min%20Zhang%0AAbstract%3A%20Recent%20developments%20in%20video%20translation%20have%20further%20enhanced%20cross-lingual%20access%20to%20video%20content%2C%20with%20multimodal%20large%20language%20models%20%28MLLMs%29%20playing%20an%20increasingly%20important%20supporting%20role.%20With%20strong%20multimodal%20understanding%2C%20reasoning%2C%20and%20generation%20capabilities%2C%20MLLMs-based%20video%20translation%20systems%20are%20overcoming%20the%20limitations%20of%20traditional%20cascaded%20pipelines%20that%20separately%20handle%20automatic%20speech%20recognition%2C%20machine%20translation%2C%20text-to-speech%20and%20lip%20synchronization.%20These%20MLLM-powered%20approaches%20not%20only%20achieve%20competitive%20or%20superior%20translation%20quality%2C%20but%20also%20demonstrate%20stronger%20robustness%20in%20zero-shot%20settings%20and%20multi-speaker%20scenarios%2C%20while%20jointly%20modeling%20semantic%20fidelity%2C%20timing%2C%20speaker%20identity%2C%20and%20emotional%20consistency.%20However%2C%20despite%20the%20rapid%20progress%20of%20MLLMs%20and%20extensive%20surveys%20on%20general%20video-language%20understanding%2C%20a%20focused%20and%20systematic%20review%20of%20how%20MLLMs%20empower%20video%20translation%20tasks%20is%20 {"title": "PanoSAMic: Panoramic Image Segmentation from SAM Feature Encoding and Dual View Fusion", "author": "Mahdi Chamseddine and Didier Stricker and Jason Rambach", "abstract": "Existing image foundation models are not optimized for spherical images having been trained primarily on perspective images. PanoSAMic integrates the pre-trained Segment Anything (SAM) encoder to make use of its extensive training and integrate it into a semantic segmentation model for panoramic images using multiple modalities. We modify the SAM encoder to output multi-stage features and introduce a novel spatio-modal fusion module that allows the model to select the relevant modalities and best features from each modality for different areas of the input. Furthermore, our semantic decoder uses spherical attention and dual view fusion to overcome the distortions and edge discontinuity often associated with panoramic images. PanoSAMic achieves state-of-the-art (SotA) results on Stanford2D3DS for RGB, RGB-D, and RGB-D-N modalities and on Matterport3D for RGB and RGB-D modalities. https://github.com/dfki-av/PanoSAMic", "link": "http://arxiv.org/abs/2601.07447v2", "date": "2026-04-13", "relevancy": 2.8433, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5774}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5677}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5609}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PanoSAMic%3A%20Panoramic%20Image%20Segmentation%20from%20SAM%20Feature%20Encoding%20and%20Dual%20View%20Fusion&body=Title%3A%20PanoSAMic%3A%20Panoramic%20Image%20Segmentation%20from%20SAM%20Feature%20Encoding%20and%20Dual%20View%20Fusion%0AAuthor%3A%20Mahdi%20Cham %2520encoder%2520to%2520make%2520use%2520of%2520its%2520extensive%2520training%2520and%2520integrate%2520it%2520into%2520a%2520semantic%2520segmentation%2520model%2520for%2520panoramic%2520images%2520using%2520multiple%2520modalities.%2520We%2520modify%2520the%2520SAM%2520encoder%2520to%2520output%2520multi-stage%2520features%2520and%2520introduce%2520a%2520novel%2520spatio-modal%2520fusion%2520module%2520that%2520allows%2520the%2520model%2520to%2520select%2520the%2520relevant%2520modalities%2520and%2520best%2520features%2520from%2520each%2520modality%2520for%2520different%2520areas%2520of%2520the%2520input.%2520Furthermore%252C%2520our%2520semantic%2520decoder%2520uses%2520spherical%2520attention%2520and%2520dual%2520view%2520fusion%2520to%2520overcome%2520the%2520distortions%2520and%2520edge%2520discontinuity%2520often%2520associated%2520with%2520panoramic%2520images.%2520PanoSAMic%2520achieves%2520state-of-the-art%2520%2528SotA%2529%2520results%2520on%2520Stanford2D3DS%2520for%2520RGB%252C%2520RGB-D%252C%2520and%2520RGB-D-N%2520modalities%2520and%2520on%2520Matterport3D%2520for%2520RGB%2520and%2520RGB-D%2520modalities.%2520https%253A//github.com/dfki-av/PanoSAMic%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.07447v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PanoSAMic%3A%20Panoramic%20Image%20Segmentation%20from%20SAM%20Feature%20Encoding%20and%20Dual%20View%20Fusion&entry.906535625=Mahdi%20Chamseddine%20and%20Didier%20Stricker%20and%20Jason%20Rambach&entry.1292438233=Existing%20image%20foundation%20models%20are%20not%20optimized%20for%20spherical%20images%20having%20been%20trained%20primarily%20on%20perspective%20images.%20PanoSAMic%20integrates%20the%20pre-trained%20Segment%20Anything%20%28SAM%29%20encoder%20to%20make%20use%20of%20its%20extensive%20training%20and%20integrate%20it%20into%20a%20semantic%20segmentation%20model%20for%20panoramic%20imag

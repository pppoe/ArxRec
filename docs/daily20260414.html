{"title": "STS-Mixer: Spatio-Temporal-Spectral Mixer for 4D Point Cloud Video Understanding", "author": "Wenhao Li and Xueying Jiang and Gongjie Zhang and Xiaoqin Zhang and Ling Shao and Shijian Lu", "abstract": "4D point cloud videos capture rich spatial and temporal dynamics of scenes which possess unique values in various 4D understanding tasks. However, most existing methods work in the spatiotemporal domain where the underlying geometric characteristics of 4D point cloud videos are hard to capture, leading to degraded representation learning and understanding of 4D point cloud videos. We address the above challenge from a complementary spectral perspective. By transforming 4D point cloud videos into graph spectral signals, we can decompose them into multiple frequency bands each of which captures distinct geometric structures of point cloud videos. Our spectral analysis reveals that the decomposed low-frequency signals capture more coarse shapes while high-frequency signals encode more fine-grained geometry details. Building on these observations, we design Spatio-Temporal-Spectral Mixer (STS-Mixer), a unified framework that mixes spatial, temporal, and spectral representations of point cloud videos. STS-Mixer integrates multi-band delineated spectral signals with spatiotemporal information to capture rich geometries and temporal dynamics, while enabling fine-grained and holistic understanding of 4D point cloud videos. Extensive experiments show that STS-Mixer achieves superior performance consistently across multiple widely adopted benchmarks on both 3D action recognition and 4D semantic segmentation tasks. Code and models are available at https://github.com/Vegetebird/STS-Mixer.", "link": "http://arxiv.org/abs/2604.11637v1", "date": "2026-04-13", "relevancy": 2.3045, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5908}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5732}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5732}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20STS-Mixer%3A%20Spatio-Temporal-Spectral%20Mixer%20for%204D%20Point%20Cloud%20Video%20Understanding&body=Title%3A%20STS-Mixer%3A%20Spatio-Temporal-Spectral%20Mixer%20for%204D%20Point%20Cloud%20Video%20Understanding%0AAuthor%3A%20Wenhao%20Li%20and%20Xueying%20Jiang%20and%20Gongjie%20Zhang%20and%20Xiaoqin%20Zhang%20and%20Ling%20Shao%20and%20Shijian%20Lu%0AAbstract%3A%204D%20point%20cloud%20videos%20capture%20rich%20spatial%20and%20temporal%20dynamics%20of%20scenes%20which%20possess%20unique%20values%20in%20various%204D%20understanding%20tasks.%20However%2C%20most%20existing%20methods%20work%20in%20the%20spatiotemporal%20domain%20where%20the%20underlying%20geometric%20characteristics%20of%204D%20point%20cloud%20videos%20are%20hard%20to%20capture%2C%20leading%20to%20degraded%20representation%20learning%20and%20understanding%20of%204D%20point%20cloud%20videos.%20We%20address%20the%20above%20challenge%20from%20a%20complementary%20spectral%20perspective.%20By%20transforming%204D%20point%20cloud%20videos%20into%20graph%20spectral%20signals%2C%20we%20can%20decompose%20them%20into%20multiple%20frequency%20bands%20each%20of%20which%20captures%20distinct%20geometric%20structures%20of%20point%20cloud%20videos.%20Our%20spectral%20analysis%20reveals%20that%20the%20decomposed%20low-frequency%20signals%20capture%20more%20coarse%20shapes%20while%20high-frequency%20signals%20encode%20more%20fine-grained%20geometry%20details.%20Building%20on%20these%20observations%2C%20we%20design%20Spatio-Temporal-Spectral%20Mixer%20%28STS-Mixer%29%2C%20a%20unified%20framework%20that%20mixes%20spatial%2C%20temporal%2C%20and%20spectral%20representations%20of%20point%20cloud%20videos.%20STS-Mixer%20integrates%20multi-band%20delineated%20spectral%20signals%20with%20spatiotemporal%20information%20to%20capture%20rich%20geometries%20and%20temporal%20dynamics%2C%20while%20enabling%20fine-grained%20and%20holistic%20understanding%20of%204D%20point%20cloud%20videos.%20Extensive%20experiments%20show%20that%20STS-Mixer%20achieves%20superior%20performance%20consistently%20across%20multiple%20widely%20adopted%20benchmarks%20on%20both%203D%20action%20recognition%20and%204D%20semantic%20segmentation%20tasks.%20Code%20and%20models%20are%20available%20at%20https%3A//github.com/Vegetebird/STS-Mixer.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11637v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTS-Mixer%253A%2520Spatio-Temporal-Spectral%2520Mixer%2520for%25204D%2520Point%2520Cloud%2520Video%2520Understanding%26entry.906535625%3DWenhao%2520Li%2520and%2520Xueying%2520Jiang%2520and%2520Gongjie%2520Zhang%2520and%2520Xiaoqin%2520Zhang%2520and%2520Ling%2520Shao%2520and%2520Shijian%2520Lu%26entry.1292438233%3D4D%2520point%2520cloud%2520videos%2520capture%2520rich%2520spatial%2520and%2520temporal%2520dynamics%2520of%2520scenes%2520which%2520possess%2520unique%2520values%2520in%2520various%25204D%2520understanding%2520tasks.%2520However%252C%2520most%2520existing%2520methods%2520work%2520in%2520the%2520spatiotemporal%2520domain%2520where%2520the%2520underlying%2520geometric%2520characteristics%2520of%25204D%2520point%2520cloud%2520videos%2520are%2520hard%2520to%2520capture%252C%2520leading%2520to%2520degraded%2520representation%2520learning%2520and%2520understanding%2520of%25204D%2520point%2520cloud%2520videos.%2520We%2520address%2520the%2520above%2520challenge%2520from%2520a%2520complementary%2520spectral%2520perspective.%2520By%2520transforming%25204D%2520point%2520cloud%2520videos%2520into%2520graph%2520spectral%2520signals%252C%2520we%2520can%2520decompose%2520them%2520into%2520multip s%20which%20possess%20unique%20values%20in%20various%204D%20understanding%20tasks.%20However%2C%20most%20existing%20methods%20work%20in%20the%20spatiotemporal%20domain%20where%20the%20underlying%20geometric%20characteristics%20of%204D%20point%20cloud%20videos%20are%20hard%20to%20capture%2C%20leading%20to%20degraded%20representation%20learning%20and%20understanding%20of%204D%20point%20cloud%20videos.%20We%20address%20the%20above%20challenge%20from%20a%20complementary%20spectral%20perspective.%20By%20transforming%204D%20point%20cloud%20videos%20into%20graph%20spectral%20signals%2C%20we%20can%20decompose%20them%20into%20multiple%20frequency%20bands%20each%20of%20which%20captures%20distinct%20geometric%20structures%20of%20point%20cloud%20videos.%20Our%20spectral%20analysis%20reveals%20that%20the%20decomposed%20low-frequency%20signals%20capture%20more%20coarse%20shapes%20while%20high-frequency%20signals%20encode%20more%20fine-grained%20geometry%20details.%20Building%20on%20these%20observations%2C%20we%20design%20Spatio-Temporal-Spectral%20Mixer%20%28STS-Mixer%29%2C%20a%20unified%20framework%20that%20mixes%20spatial%2C%20temporal%2C%20and%20spectral%20representations%20of%20point%20cloud%20videos.%20STS-Mixer%20integrates%20multi-band%20delineated%20spectral%20signals%20with%20spatiotemporal%20information%20to%20capture%20rich%20geometries%20and%20temporal%20dynamics%2C%20while%20enabling%20fine-grained%20and%20holistic%20understanding%20of%204D%20point%20cloud%20videos.%20Extensive%20experiments%20show%20that%20STS-Mixer%20achieves%20superior%20performance%20consistently%20across%20multiple%20widely%20adopted%20benchmarks%20on%20both%203D%20action%20recognition%20and%204D%20semantic%20segmentation%20tasks.%20Code%20and%20models%20are%20available%20at%20https%3A//github.com/Vegetebird/STS-Mixer.&entry.1838667208=http%3A//arxiv.org/abs/2604.11637v1&entry.124074799=Read"},
{"title": "KL Divergence Between Gaussians: A Step-by-Step Derivation for the Variational Autoencoder Objective", "author": "Andr\u00e9s Mu\u00f1oz and Rodrigo Ramele", "abstract": "Kullback-Leibler (KL) divergence is a fundamental concept in information theory that quantifies the discrepancy between two probability distributions. In the context of Variational Autoencoders (VAEs), it serves as a central regularization term, imposing structure on the latent space and thereby enabling the model to exhibit generative capabilities. In this work, we present a detailed derivation of the closed-form expression for the KL divergence between Gaussian distributions, a case of particular importance in practical VAE implementations. Starting from the general definition for continuous random variables, we derive the expression for the univariate case and extend it to the multivariate setting under the assumption of diagonal covariance. Finally, we discuss the interpretation of each term in the resulting expression and its impact on the training dynamics of the model.", "link": "http://arxiv.org/abs/2604.11744v1", "date": "2026-04-13", "relevancy": 2.2964, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4841}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.45}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4437}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KL%20Divergence%20Between%20Gaussians%3A%20A%20Step-by-Step%20Derivation%20for%20the%20Variational%20Autoencoder%20Objective&body=Title%3A%20KL%20Divergence%20Between%20Gaussians%3A%20A%20Step-by-Step%20Derivation%20for%20the%20Variational%20Autoencoder%20Objective%0AAuthor%3A% ves%2520as%2520a%2520central%2520regularization%2520term%252C%2520imposing%2520structure%2520on%2520the%2520latent%2520space%2520and%2520thereby%2520enabling%2520the%2520model%2520to%2520exhibit%2520generative%2520capabilities.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520detailed%2520derivation%2520of%2520the%2520closed-form%2520expression%2520for%2520the%2520KL%2520divergence%2520between%2520Gaussian%2520distributions%252C%2520a%2520case%2520of%2520particular%2520importance%2520in%2520practical%2520VAE%2520implementations.%2520Starting%2520from%2520the%2520general%2520definition%2520for%2520continuous%2520random%2520variables%252C%2520we%2520derive%2520the%2520expression%2520for%2520the%2520univariate%2520case%2520and%2520extend%2520it%2520to%2520the%2520multivariate%2520setting%2520under%2520the%2520assumption%2520of%2520diagonal%2520covariance.%2520Finally%252C%2520we%2520discuss%2520the%2520interpretation%2520of%2520each%2520term%2520in%2520the%2520resulting%2520expression%2520and%2520its%2520impact%2520on%2520the%2520training%2520dynamics%2520of%2520the%2520model.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11744v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=KL%20Divergence%20Between%20Gaussians%3A%20A%20Step-by-Step%20Derivation%20for%20the%20Variational%20Autoencoder%20Objective&entry.906535625=Andr%C3%A9s%20Mu%C3%B1oz%20and%20Rodrigo%20Ramele&entry.1292438233=Kullback-Leibler%20%28KL%29%20divergence%20is%20a%20fundamental%20concept%20in%20information%20theory%20that%20quantifies%20the%20discrepancy%20between%20two%20probability%20distributions.%20In%20the%20context%20of%20Variational%20Autoencoders%20%28VAEs%29%2C%20it%20serves%20as%20a%20central%20regularization%20term%2C%20imposing%20structure%20on%20the%20latent%20space%20and%20thereby%20enabling%20the%20model%20to%20exhibit%20generative%20capabilities.%20In%20this%20work%2C%2 {"title": "A Triadic Suffix Tokenization Scheme for Numerical Reasoning", "author": "Olga Chetverina", "abstract": "Standard subword tokenization methods fragment numbers inconsistently, causing large language models (LLMs) to lose positional and decimal structure - a primary driver of errors in arithmetic and scientific reasoning. We introduce Triadic Suffix Tokenization (TST), a deterministic scheme that partitions digits into three-digit triads and annotates each triad with an explicit magnitude marker. Critically, the scheme defines a fixed, one-to-one mapping between suffixes and orders of magnitude for the integer part (thousands, millions, billions, etc.) and a parallel system of replicated markers for fractional depth (tenths, thousandths, millionths, etc.). Unlike approaches that rely on positional inference, this method provides a consistent gradient signal, which should ensure stable convergence. Two implementation variants are proposed: (1) a vocabulary-based approach that adds at most 10,000 fixed tokens to an existing vocabulary, covering 33 orders of magnitude ($10^{-15}$ to $10^{18}$); and (2) a suffix-marker approach that uses a small set of special tokens to denote magnitude dynamically. Both variants preserve exact digits while making order-of-magnitude relationships transparent at the token level. The framework is inherently scalable, allowing for linear vocabulary expansion to accommodate arbitrary precision and range. TST is architecture-agnostic and can be integrated as a drop-in preprocessing step. Experimental validation is deferred to future work.", "link": "http://arxiv.org/abs/2604.11582v1", "date": "2026-04-13", "relevancy": 2.2953, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4849}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4563}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4359}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Triadic%20Suffix%20Tokenization%20Scheme%20for%20Numerical%20Reasoning&body=Title%3A%20A%20Triadic%20Suffix%20Tokenization%20Scheme%20for%20Numerical%20Reasoning%0AAuthor%3A%20Olga%20Chetverina%0AAbstract%3A%20Standard%20subword%20tokenization%20methods%20fragment%20numbers%20inconsistently%2C%20causing%20large%20language%20models%20%28LLMs%29%20to%20lose%20positional%20and%20decimal%20structure%20-%20a%20primary%20driver%20of%20errors%20in%20arithmetic%20and%20scientific%20reasoning.%20We%20introduce%20Triadic%20Suffix%20Tokenization%20%28TST%29%2C%20a%20deterministic%20scheme%20that%20partitions%20digits%20into%20three-digit%20triads%20and%20annotates%20each%20triad%20with%20an%20explicit%20magnitude%20marker.%20Critically%2C%20the%20scheme%20defines%20a%20fixed%2C%20one-to-one%20mapping%20between%20suffixes%20and%20orders%20of%20magnitude%20for%20the%20integer%20part%20%28thousands%2C%20millions%2C%20billions%2C%20etc.%29%20and%20a%20parallel%20system%20of%20replicated%20markers%20for%20fractional%20depth%20%28tenths%2C%20thousandths%2C%20millionths%2C%20etc.%29.%20Unlike%20approaches%20that%20rely%20on%20positional%20inference%2C%20this%20method%20provides%20a%20consistent%20gradient%20signal%2C%20which%20should%20ensure%20stable%20convergence.%20Two%20implementation%20variants%20are%20proposed%3A%20%281%29%20a%20vocabulary-based%20approach%20that%20adds%20at%20most%2010%2C000%20fixed%20tokens%20to%20an%20existing%20vocabulary%2C%20covering%2033%20orders%20of%20magnitude%20%28%2410%5E%7B-15%7D%24%20to%20%2410%5E%7B18%7D%24%29%3B%20and%20%282%29%20a%20suffix-marker%20approach%20that%20uses%20a%20small%20set%20of%20special%20tokens%20to%20denote%20magnitude%20dynamically.%20Both%20variants%20preserve%20exact%20digits%20while%20making%20order-of-magnitude%20relationships%20transparent%20at%20the%20token%20level.%20The%20framework%20is%20inherently%20scalable%2C%20allowing%20for%20linear%20vocabulary%20expansion%20to%20accommodate%20arbitrary%20precision%20and%20range.%20TST%20is%20architecture-agnostic%20and%20can%20be%20integrated%20as%20a%20drop-in%20preprocessing%20step.%20Experimental%20validation%20is%20deferred%20to%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11582v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Triadic%2520Suffix%2520Tokenization%2520Scheme%2520for%2520Numerical%2520Reasoning%26entry.906535625%3DOlga%2520Chetverina%26entry.1292438233%3DStandard%2520subword%2520tokenization%2520methods%2520fragment%2520numbers%2520inconsistently%252C%2520causing%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520lose%2520positional%2520and%2520decimal%2520structure%2520-%2520a%2520primary%2520driver%2520of%2520errors%2520in%2520arithmetic%2520and%2520scientific%2520reasoning.%2520We%2520introduce%2520Triadic%2520Suffix%2520Tokenization%2520%2528TST%2529%252C%2520a%2520deterministic%2520scheme%2520that%2520partitions%2520digits%2520into%2520three-digit%2520triads%2520and%2520annotates%2520each%2520triad%2520with%2520an%2520explicit%2520magnitude%2520marker.%2520Critically%252C%2520the%2520scheme%2520defines%2520a%2520fixed%252C%2520one-to-one%2520mapping%2520between%2520suffixes%2520and%2520orders%2520of%2520magnitude%2520for%2520the%2520integer%2520part%2520%2528thousands%252C%2520millions%252C%2520billions%252C%2520etc.%2529%2520and%2520a%2520parallel%2520system%2520of%2520replicated%2520markers%2520for%2520fractional%2520depth%2520%2528tenths%252C%2520thousandths%252C%2520millionths%252C%2520etc.%2529.%2520Unlike%2520approaches%2520that%2520rely%2520on%2520positional%2520inference%252C%2520this%2520method%2520provides%2520a%2520consistent%2520gradient%2520signal%252C%2520which%2520should%2520ensure%2520stable%2520convergence.%2520Two%2520implementation%2520variants%2520are%2520proposed%253A%2520%25281%2529%2520a%2520vocabulary-based%2520approach%2520that%2520adds%2520at%2520most%252010%252C000%2520fixed%2520tokens%2520to%2520an%2520existing%2520vocabulary%252C%2520covering%252033%2520orders%2520of%2520magnitude%2520%2528%252410%255E%257B-15%257D%2524%2520to%2520%252410%255E%257B18%257D%2524%2529%253B%2520and%2520%25282%2529%2520a%2520suffix-marker%2520approach%2520that%2520uses%2520a%2520small%2520set%2520of%2520special%2520tokens%2520to%2520denote%2520magnitude%2520dynamically.%2520Both%2520variants%2520preserve%2520exact%2520digits%2520while%2520making%2520order-of-magnitude%2520relationships%2520transparent%2520at%2520the%2520token%2520level.%2520The%2520framework%2520is%2520inherently%2520scalable%252C%2520allowing%2520for%2520linear%2520vocabulary%2520expansion%2520to%2520accommodate%2520arbitrary%2520precision%2520and%2520range.%2520TST%2520is%2520architecture-agnostic%2520and%2520can%2520be%2520integrated%2520as%2520a%2520drop-in%2520preprocessing%2520step.%2520Experimental%2520validation%2520is%2520deferred%2520to%2520future%2520work.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11582v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Triadic%20Suffix%20Tokenization%20Scheme%20for%20Numerical%20Reasoning&entry.906535625=Olga%20Chetverina&entry.1292438233=Standard%20subword%20tokenization%20methods%20fragment%20numbers%20inconsistently%2C%20causing%20large%20language%20models%20%28LLMs%29%20to%20lose%20positional%20and%20decimal%20structure%20-%20a%20primary%20driver%20of%20errors%20in%20arithmetic%20and%20scientific%20reasoning.%20We%20introduce%20Triadic%20Suffix%20Tokenization%20%28TST%29%2C%20a%20deterministic%20scheme%20that%20partitions%20digits%20into%20three-digit%20triads%20and%20annotates%20each {"title": "SyncFix: Fixing 3D Reconstructions via Multi-View Synchronization", "author": "Deming Li and Abhay Yadav and Cheng Peng and Rama Chellappa and Anand Bhattad", "abstract": "We present SyncFix, a framework that enforces cross-view consistency during the diffusion-based refinement of reconstructed scenes. SyncFix formulates refinement as a joint latent bridge matching problem, synchronizing distorted and clean representations across multiple views to fix the semantic and geometric inconsistencies. This means SyncFix learns a joint conditional over multiple views to enforce consistency throughout the denoising trajectory. Our training is done only on image pairs, but it generalizes naturally to an arbitrary number of views during inference. Moreover, reconstruction quality improves with additional views, with diminishing returns at higher view counts. Qualitative and quantitative results demonstrate that SyncFix consistently generates high-quality reconstructions and surpasses current state-of-the-art baselines, even in the absence of clean reference images. SyncFix achieves even higher fidelity when sparse references are available.", "link": "http://arxiv.org/abs/2604.11797v1", "date": "2026-04-13", "relevancy": 2.2937, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5765}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5713}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5712}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SyncFix%3A%20Fixing%203D%20Reconstructions%20via%20Multi-View%20Synchronization&body=Title%3A%20SyncFix%3A%20Fixing%203D%20Reconstructions%20via%20Multi-View%20Synchronization%0AAuthor%3A%20Deming%20Li%20and%20Abhay%20Yadav%20and%20Cheng%20Peng%20and%20Rama%20Chellappa%20and%20Anand%20Bhattad%0AAbstract%3A%20We%20present%20SyncFix%2C%20a%20framework%20that%20enforces%20cross-view%20consistency%20during%20the%20diffusion-based%20refinement%20of%20reconstructed%20scenes.%20SyncFix%20formulates%20refinement%20as%20a%20joint%20latent%20bridge%20matching%20problem%2C%20synchronizing%20distorted%20and%20clean%20representations%20across%20multiple%20views%20to%20fix%20the%20semantic%20and%20geometric%20inconsistencies.%20This%20means%20SyncFix%20learns%20a%20joint%20conditional%20over%20multiple%20views%20to%20enforce%20consistency%20throughout%20the%20denoising%20trajectory.%20Our%20training%20is%20done%20only%20on%20image%20pairs%2C%20but%20it%20generalizes%20naturally%20to%20an%20arbitrary%20number%20of%20views%20during%20inference.%20Moreover%2C%20reconstruction%20quality%20improves%20with%20additional%20views%2C%20with%20diminishing%20returns%20at%20higher%20view%20counts.%20Qualitative%20and%20quantitative%20results%20demonstrate%20that%20SyncFix%20consistently%20generates%20high-quality%20reconstructions%20and%20surpasses%20current%20state-of-the-art%20baselines%2C%20even%20in%20the%20absence%20of%20clean%20reference%20images.%20SyncFix%20achieves%20even%20higher%20fidelity%20when%20sparse%20references%20are%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11797v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSyncFix%253A%2520Fixing%25203D%2520Reconstructions%2520via%2520Multi-View%2520Synchronization%26entry.906535625%3DDeming%2520Li%2520and%2520Abhay%2520Yadav%2520and%2520Cheng%2520Peng%2520and%2520Rama%2520Chellappa%2520and%2520Anand%2520Bhattad%26entry.1292438233%3DWe%2520present%2520SyncFix%252C%2520a%2520framework%2520that%2520enforces%2520cross-view%2520consistency%2520during%2520the%2520diffusion-based%2520refinement%2520of%2520reconstructed%2520scenes.%2520SyncFix%2520formulates%2520refinement%2520as%2520a%2520joint%2520latent%2520bridge%2520matching%2520problem%252C%2520synchronizing%2520distorted%2520and%2520clean%2520representations%2520across%2520multiple%2520views%2520to%2520fix%2520the%2520semantic%2520and%2520geometric%2520inconsistencies.%2520This%2520means%2520SyncFix%2520learns%2520a%2520joint%2520conditional%2520over%2520multiple%2520views%2520to%2520enforce%2520consistency%2520throughout%2520the%2520denoising%2520trajectory.%2520Our%2520training%2520is%2520done%2520only%2520on%2520image%2520pairs%252C%2520but%2520it%2520generalizes%2520naturally%2520to%2520an%2520arbitrary%2520number%2520of%2520views%2520during%2520inference.%2520Moreover%252C%2520reconstruction%2520quality%2520improves%2520with%2520additional%2520views%252C%2520with%2520diminishing%2520returns%2520at%2520higher%2520view%2520counts.%2520Qualitative%2520and%2520quantitative%2520results%2520demonstrate%2520that%2520SyncFix%2520consistently%2520generates%2520high-quality%2520reconstructions%2520and%2520surpasses%2520current%2520state-of-the-art%2520baselines%252C%2520even%2520in%2520the%2520absence%2520of%2520clean%2520reference%2520images.%2520SyncFix%2520achieves%2520even%2520higher%2520fidelity%2520when%2520sparse%2520references%2520are%2520available.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11797v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SyncFix%3A%20Fixing%203D%20Reconstructions%20via%20Multi-View%20Synchronization&entry.906535625=Deming%20Li%20and%20Abhay%20Yadav%20and%20Cheng%20Peng%20and%20Rama%20Chellappa%20and%20Anand%20Bhattad&entry.1292438233=We%20present%20SyncFix%2C%20a%20framework%20that%20enforces%20cross-view%20consistency%20during%20the%20diffusion-based%20refinement%20of%20reconstructed%20scenes.%20SyncFix%20formulates%20refinement%20as%20a%20joint%20latent%20bridge%20matching%20problem%2C%20synchronizing%20distorted%20and%2 {"title": "LARY: A Latent Action Representation Yielding Benchmark for Generalizable Vision-to-Action Alignment", "author": "Dujun Nie and Fengjiao Chen and Qi Lv and Jun Kuang and Xiaoyu Li and Xuezhi Cao and Xunliang Cai", "abstract": "While the shortage of explicit action data limits Vision-Language-Action (VLA) models, human action videos offer a scalable yet unlabeled data source. A critical challenge in utilizing large-scale human video datasets lies in transforming visual signals into ontology-independent representations, known as latent actions. However, the capacity of latent action representation to derive robust control from visual observations has yet to be rigorously evaluated. We introduce the Latent Action Representation Yielding (LARY) Benchmark, a unified framework for evaluating latent action representations on both high-level semantic actions (what to do) and low-level robotic control (how to do). The comprehensively curated dataset encompasses over one million videos (1,000 hours) spanning 151 action categories, alongside 620K image pairs and 595K motion trajectories across diverse embodiments and environments. Our experiments reveal two crucial insights: (i) General visual foundation models, trained without any action supervision, consistently outperform specialized embodied latent action models. (ii) Latent-based visual space is fundamentally better aligned to physical action space than pixel-based space. These results suggest that general visual representations inherently encode action-relevant knowledge for physical control, and that semantic-level abstraction serves as a fundamentally more effective pathway from vision to action than pixel-level reconstruction.", "link": "http://arxiv.org/abs/2604.11689v1", "date": "2026-04-13", "relevancy": 2.2931, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5756}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5756}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5619}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LARY%3A%20A%20Latent%20Action%20Representation%20Yielding%20Benchmark%20for%20Generalizable%20Vision-to-Action%20Alignment&body=Title%3A%20LARY%3A%20A%20Latent%20Action%20Representation%20Yielding%20Benchmark%20for%20Generalizable%20Vision-to-Action%20Alignment%0AAuthor%3A%20Dujun%20Nie%20and%20Fengjiao%20Chen%20and%20Qi%20Lv%20and%20Jun%20Kuang%20and%20Xiaoyu%20Li%20and%20Xuezhi%20Cao%20and%20Xunliang%20Cai%0AAbstract%3A%20While%20the%20shortage%20of%20explicit%20action%20data%20limits%20Vision-Language-Action%20%28VLA%29%20models%2C%20human%20action%20videos%20offer%20a%20scalable%20yet%20unlabeled%20data%20source.%20A%20critical%20challenge%20in%20utilizing%20large-scale%20human%20video%20datasets%20lies%20in%20transforming%20visual%20signals%20into%20ontology-independent%20representations%2C%20known%20as%20latent%20actions.%20However%2C%20the%20capacity%20of%20latent%20action%20representation%20to%20derive%20robust%20control%20from%20visual%20observations%20has%20yet%20to%20be%20rigorously%20evaluated.%20We%20introduce%20the%20Latent%20Action%20Representation%20Yielding%20%28LARY%29%20Benchmark%2C%20a%20unified%20framework%20for%20evaluating%20latent%20action%20representations%20on%20both%20high-level%20semantic%20actions%20%28what%20to%20do%29%20and%20low-level%20robotic%20control%20%28how%20to%20do%29.%20The%20comprehensively%20curated%20dataset%20encompasses%20over%20one%20million%20videos%20%281%2C000%20hours%29%20spanning%20151%20action%20categories%2C%20alongside%20620K%20image%20pairs%20and%20595K%20motion%20trajectories%20across%20diverse%20embodiments%20and%20environments.%20Our%20experiments%20reveal%20two%20crucial%20insights%3A%20%28i%29%20General%20visual%20foundation%20models%2C%20trained%20without%20any%20action%20supervision%2C%20consistently%20outperform%20specialized%20embodied%20latent%20action%20models.%20%28ii%29%20Latent-based%20visual%20space%20is%20fundamentally%20better%20aligned%20to%20physical%20action%20space%20than%20pixel-based%20space.%20These%20results%20suggest%20that%20general%20visual%20representations%20inherently%20encode%20action-relevant%20knowledge%20for%20physical%20control%2C%20and%20that%20semantic-level%20abstraction%20serves%20as%20a%20fundamentally%20more%20effective%20pathway%20from%20vision%20to%20action%20than%20pixel-level%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11689v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLARY%253A%2520A%2520Latent%2520Action%2520Representation%2520Yielding%2520Benchmark%2520for%2520Generalizable%2520Vision-to-Action%2520Alignment%26entry.906535625%3DDujun%2520Nie%2520and%2520Fengjiao%2520Chen%2520and%2520Qi%2520Lv%2520and%2520Jun%2520Kuang%2520and%2520Xiaoyu%2520Li%2520and%2520Xuezhi%2520Cao%2520and%2520Xunliang%2520Cai%26entry.1292438233%3DWhile%2520the%2520shortage%2520of%2520explicit%2520action%2520data%2520limits%2520Vision-Language-Action%2520%2528VLA%2529%2520models%252C%2520human%2520action%2520videos%2520offer%2520a%2520scalable%2520yet%2520unlabeled%2520data%2520source.%2520A%2520critical%2520challenge%2520in%2520utilizing%2520large-scale%2520human%2520video%2520datasets%2520lies%2520in%2520transforming%2520visual%2520signals%2520into%2520ontology-independent%2520representations%252C%2520known%2520as%2520latent%2520actions.%2520However%252C%2520the%2520capacity%2520of%2520latent%2520action%2520representation%2520to%2520derive%2520robust%2520control%2520from%2520visual%2520observations%2520has%2520yet%2520to%2520be%2520rigorously%2520evaluated.%2520We%252 {"title": "EEG-based AI-BCI Wheelchair Advancement: Hybrid Deep Learning with Motor Imagery for Brain Computer Interface", "author": "Bipul Thapa and Biplov Paneru and Bishwash Paneru and Khem Narayan Poudyal", "abstract": "This paper presents an Artificial Intelligence (AI) integrated approach to Brain-Computer Interface (BCI)-based wheelchair development, utilizing a motor imagery right-left-hand movement mechanism for control. The system is designed to simulate wheelchair navigation based on motor imagery right and left-hand movements using electroencephalogram (EEG) data. A pre-filtered dataset, obtained from an open-source EEG repository, was segmented into arrays of 19x200 to capture the onset of hand movements. The data was acquired at a sampling frequency of 200Hz. The system integrates a Tkinter-based interface for simulating wheelchair movements, offering users a functional and intuitive control system. We propose a framework that uses Convolutional Neural Network-Transformer Hybrid Model, named CTHM, for motor imagery EEG classification. The model achieves a test accuracy of 91.73% compared with various machine learning baseline models, including XGBoost, EEGNet, and a transformer-based model. The CTHM achieved a mean accuracy of 90% through stratified cross-validation, showcasing the effectiveness of the CNN-Transformer hybrid architecture in BCI applications.", "link": "http://arxiv.org/abs/2509.25667v2", "date": "2026-04-13", "relevancy": 2.2699, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6845}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.535}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4635}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EEG-based%20AI-BCI%20Wheelchair%20Advancement%3A%20Hybrid%20Deep%20Learning%20with%20Motor%20Imagery%20for%20Brain%20Computer%20Interface&body=Title%3A%20EEG-based%20AI-BCI%20Wheelchair%20Advancement%3A%20Hybrid%20Deep%20Learning%20with%20Motor%20Imagery%20for%20Brain%20Computer%20Interface%0AAuthor%3A%20Bipul%20Thapa%20and%20Biplov%20Paneru%20and%20Bishwash%20Paneru%20and%20Khem%20Narayan%20Poudyal%0AAbstract%3A%20This%20paper%20presents%20an%20Artificial%20Intelligence%20%28AI%29%20integrated%20approach%20to%20Brain-Computer%20Interface%20%28BCI%29-based%20wheelchair%20development%2C%20utilizing%20a%20motor%20imagery%20right-left-hand%20movement%20mechanism%20for%20control.%20The%20system%20is%20designed%20to%20simulate%20wheelchair%20navigation%20based%20on%20motor%20imagery%20right%20and%20left-hand%20movements%20using%20electroencephalogram%20%28EEG%29%20data.%20A%20pre-filtered%20dataset%2C%20obtained%20from%20an%20open-source%20EEG%20repository%2C%20was%20segmented%20into%20arrays%20of%2019x200%20to%20capture%20the%20onset%20of%20hand%20movements.%20The%20data%20was%20acquired%20at%20a%20sampling%20frequency%20of%20200Hz.%20The%20system%20integrates%20a%20Tkinter-based%20interface%20for%20simulating%20wheelchair%20movements%2C%20offering%20users%20a%20functional%20and%20intuitive%20control%20system.%20We%20propose%20a%20framework%20that%20uses%20Convolutional%20Neural%20Network-Transformer%20Hybrid%20Model%2C%20named%20CTHM%2C%20for%20motor%20imagery%20EEG%20classification.%20The%20model%20achieves%20a%20test%20accuracy%20of%2091.73%25%20compared%20with%20various%20machine%20learning%20baseline%20models%2C%20including%20XGBoost%2C%20EEGNet%2C%20and%20a%20transformer-based%20model.%20The%20CTHM%20achieved%20a%20mean%20accuracy%20of%2090%25%20through%20stratified%20cross-validation%2C%20showcasing%20the%20effectiveness%20of%20the%20CNN-Transformer%20hybrid%20architecture%20in%20BCI%20applications. {"title": "CLAW: Composable Language-Annotated Whole-body Motion Generation", "author": "Jianuo Cao and Yuxin Chen and Masayoshi Tomizuka", "abstract": "Training language-conditioned whole-body controllers for humanoid robots requires large-scale datasets pairing motion trajectories with natural-language descriptions.Existing approaches based on motion capture are costly and limited in diversity, while text-to-motion generative models produce purely kinematic outputs that are not guaranteed to be physically feasible.Therefore, we present CLAW, an interactive web-based pipeline for scalable generation of language-annotated whole-body motion data for the Unitree G1 humanoid robot. CLAW treats the motion modes of a kinematic planner as composable building blocks, each parameterized by movement, heading, speed, pelvis height and duration, and provides two browser-based interfaces -- a real-time keyboard mode and a timeline-based sequence editor -- for exploratory and batch data collection. A low-level whole-body controller tracks the planner's kinematic references in MuJoCo simulation, producing physically grounded trajectories recorded at 50Hz. Simultaneously, a deterministic template-based annotation engine generates diverse natural-language descriptions at multiple stylistic registers for every segment and for the full trajectory. We release the system as open source to support scalable generation of language-motion paired data for humanoid robot learning.", "link": "http://arxiv.org/abs/2604.11251v1", "date": "2026-04-13", "relevancy": 2.2683, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5835}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5723}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLAW%3A%20Composable%20Language-Annotated%20Whole-body%20Motion%20Generation&body=Title%3A%20CLAW%3A%20Composable%20Language-Annotated%20Whole-body%20Motion%20Generation%0AAuthor%3A%20Jianuo%20Cao%20and%20Yuxin%20Chen%20and%20Masayoshi%20Tomizuka%0AAbstract%3A%20Training%20language-conditioned%20whole-body%20controllers%20for%20humanoid%20robots%20requires%20large-scale%20datasets%20pairing%20motion%20trajectories%20with%20natural-language%20descriptions.Existing%20approaches%20based%20on%20motion%20capture%20are%20costly%20and%20limited%20in%20diversity%2C%20while%20text-to-motion%20generative%20models%20produce%20purely%20kinematic%20outputs%20that%20are%20not%20guaranteed%20to%20be%20physically%20feasible.Therefore%2C%20we%20present%20CLAW%2C%20an%20interactive%20web-based%20pipeline%20for%20scalable%20generation%20of%20language-annotated%20whole-body%20motion%20data%20for%20the%20Unitree%20G1%20humanoid%20robot.%20CLAW%20treats%20the%20motion%20modes%20of%20a%20kinematic%20planner%20as%20composable%20building%20blocks%2C%20each%20parameterized%20by%20movement%2C%20heading%2C%20speed%2C%20pelvis%20height%20and%20duration%2C%20and%20provides%20two%20browser-based%20interfaces%20--%20a%20real-time%20keyboard%20mode%20and%20a%20timeline-based%20sequence%20editor%20--%20for%20exploratory%20and%20batch%20data%20collection.%20A%20low-level%20whole-body%20controller%20tracks%20the%20planner%27s%20kinematic%20references%20in%20MuJoCo%20simulation%2C%20producing%20physically%20grounded%20trajectories%20recorded%20at%2050Hz.%20Simultaneously%2C%20a%20deterministic%20template-based%20annotation%20engine%20generates%20diverse%20natural-language%20descriptions%20at%20multiple%20stylistic%20registers%20for%20every%20segment%20and%20for%20the%20full%20trajectory.%20We%20release%20the%20system%20as%20open%20source%20to%20support%20scalable%20generation%20of%20language-motion%20paired%20data%20for%20humanoid%20robot%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11251v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLAW%253A%2520Composable%2520Language-Annotated%2520Whole-body%2520Motion%2520Generation%26entry.906535625%3DJianuo%2520Cao%2520and%2520Yuxin%2520Chen%2520and%2520Masayoshi%2520Tomizuka%26entry.1292438233%3DTraining%2520language-conditioned%2520whole-body%2520controllers%2520for%2520humanoid%2520robots%2520requires%2520large-scale%2520datasets%2520pairing%2520motion%2520trajectories%2520with%2520natural-language%2520descriptions.Existing%2520approaches%2520based%2520on%2520motion%2520capture%2520are%2520costly%2520and%2520limited%2520in%2520diversity%252C%2520while%2520text-to-motion%2520generative%2520models%2520produce%2520purely%2520kinematic%2520outputs%2520that%2520are%2520not%2520guaranteed%2520to%2520be%2520physically%2520feasible.Therefore%252C%2520we%2520present%2520CLAW%252C%2520an%2520interactive%2520web-based%2520pipeline%2520for%2520scalable%2520generation%2520of%2520language-annotated%2520whole-body%2520motion%2520data%2520for%2520the%2520Unitree%2520G1%2520humanoid%2520robot.%2520CLAW%2520treats%2520the%2520motion%2520modes%2520of%2520a%2520kinematic%2520planner%2520as%2520composable%2520building%2520blocks%252C%2520each%2520parameterized%2520by%2520movement%252C%2520heading%252C%2520speed%252C%2520pelvis%2520height%2520and%2520duration%252C%2520and%2520provides%2520two%2520browser-based%2520interfaces%2520--%2520a%2520real-time%2520keyboard%2520mode%2520and%2520a%2520timeline-based%2520sequence%2520editor%2520--%2520for%2520exploratory%2520and%2520batch%2520data%2520collection.%2520A%2520low-level%2520whole-body%2520controller%2520tracks%2520the%2520planner%2527s%2520kinematic%2520references%2520in%2520MuJoCo%2520simulation%252C%2520producing%2520physically%2520grounded%2520trajectories%2520recorded%2520at%252050Hz.%2520Simultaneously%252C%2520a%252 ic%20references%20in%20MuJoCo%20simulation%2C%20producing%20physically%20grounded%20trajectories%20recorded%20at%2050Hz.%20Simultaneously%2C%20a%20deterministic%20template-based%20annotation%20engine%20generates%20diverse%20natural-language%20descriptions%20at%20multiple%20stylistic%20registers%20for%20every%20segment%20and%20for%20the%20full%20trajectory.%20We%20release%20the%20system%20as%20open%20source%20to%20support%20scalable%20generation%20of%20language-motion%20paired%20data%20for%20humanoid%20robot%20learning.&entry.1838667208=http%3A//arxiv.org/abs/2604.11251v1&entry.124074799=Read"},
{"title": "Online Reasoning Video Object Segmentation", "author": "Jinyuan Liu and Yang Wang and Zeyu Zhao and Weixin Li and Song Wang and Ruize Han", "abstract": "Reasoning video object segmentation predicts pixel-level masks in videos from natural-language queries that may involve implicit and temporally grounded references. However, existing methods are developed and evaluated in an offline regime, where the entire video is available at inference time and future frames can be exploited for retrospective disambiguation, deviating from real-world deployments that require strictly causal, frame-by-frame decisions. We study Online Reasoning Video Object Segmentation (ORVOS), where models must incrementally interpret queries using only past and current frames without revisiting previous predictions, while handling referent shifts as events unfold. To support evaluation, we introduce ORVOSB, a benchmark with frame-level causal annotations and referent-shift labels, comprising 210 videos, 12,907 annotated frames, and 512 queries across five reasoning categories. We further propose a baseline with continually-updated segmentation prompts and a structured temporal token reservoir for long-horizon reasoning under bounded computation. Experiments show that existing methods struggle under strict causality and referent shifts, while our baseline establishes a strong foundation for future research.", "link": "http://arxiv.org/abs/2604.11411v1", "date": "2026-04-13", "relevancy": 2.2654, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5708}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5708}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3" ompts%20and%20a%20structured%20temporal%20token%20reservoir%20for%20long-horizon%20reasoning%20under%20bounded%20computation.%20Experiments%20show%20that%20existing%20methods%20struggle%20under%20strict%20causality%20and%20referent%20shifts%2C%20while%20our%20baseline%20establishes%20a%20strong%20foundation%20for%20future%20research.&entry.1838667208=http%3A//arxiv.org/abs/2604.11411v1&entry.124074799=Read"},
{"title": "GlobalCY I: A JAX Framework for Globally Defined and Symmetry-Aware Neural K\u00e4hler Potentials", "author": "Abdul Rahman", "abstract": "We present \\emph{GlobalCY}, a JAX-based framework for globally defined and symmetry-aware neural K\u00e4hler-potential models on projective hypersurface Calabi--Yau geometries. The central problem is that local-input neural K\u00e4hler-potential models can train successfully while still failing the geometry-sensitive diagnostics that matter in hard quartic regimes, especially near singular and near-singular members of the Cefal\u00fa family. To study this, we compare three model families -- a local-input baseline, a globally defined invariant model, and a symmetry-aware global model -- on the hard Cefal\u00fa cases $\u03bb=0.75$ and $\u03bb=1.0$ using a fixed multi-seed protocol and a geometry-aware diagnostic suite. In this benchmark, the globally defined invariant model is the strongest overall family, outperforming the local baseline on the two clearest geometric comparison metrics, negative-eigenvalue frequency and projective-invariance drift, in both cases. The gains are strongest at $\u03bb=0.75$, while $\u03bb=1.0$ remains more difficult. The current symmetry-aware model improves projective-invariance drift relative to the local baseline, but does not yet surpass the plain global invariant model. These results show that global invariant structure is a meaningful architectural constraint for learned K\u00e4hler-potential modeling in hard quartic Calabi--Yau settings.", "link": "http://arxiv.org/abs/2604.11404v1", "date": "2026-04-13", "relevancy": 2.2565, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4729}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4562}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4248}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GlobalCY%20I%3A%20A%20JAX%20Framework%20for%20Globally%20Defined%20and%20Symmetry-Aware%20Neural%20K%C3%A4hler%20Potentials&body=Title%3A%20GlobalCY%20I%3A%20A%20JAX%20Framework%20for%20Globally%20Defined%20and%20Symmetry-Aware%20Neural%20K%C3%A4hler%20Potentials%0AAuthor%3A%20Abdul%20Rahman%0AAbstract%3A%20We%20present%20%5Cemph%7BGlobalCY%7D%2C%20a%20JAX-based%20framework%20for%20globally%20defined%20and%20symmetry-aware%20neural%20K%C3%A4hler-potential%20models%20on%20projective%20hypersurface%20Calabi--Yau%20geometries.%20The%20central%20problem%20is%20that%20local-input%20neural%20K%C3%A4hler-potential%20models%20can%20train%20successfully%20while%20still%20failing%20the%20geometry-sensitive%20diagnostics%20that%20matter%20in%20hard%20quartic%20regimes%2C%20especially%20near%20singular%20and%20near-singular%20members%20of%20the%20Cefal%C3%BA%20family.%20To%20study%20this%2C%20we%20compare%20three%20model%20families%20--%20a%20local-input%20baseline%2C%20a%20globally%20defined%20invariant%20model%2C%20and%20a%20symmetry-aware%20global%20model%20--%20on%20the%20hard%20Cefal%C3%BA%20cases%20%24%CE%BB%3D0.75%24%20and%20%24%CE%BB%3D1.0%24%20using%20a%20fixed%20multi-seed%20protocol%20and%20a%20geometry-aware%20diagnostic%20suite.%20In%20this%20benchmark%2C%20the%20globally%20defined%20invariant%20model%20is%20the%20strongest%20overall%20family%2C%20outperforming%20the%20local%20baseline%20on%20the%20two%20clearest%20geometric%20comparison%20metrics%2C%20negative-eigenvalue%20frequency%20and%20projective-invariance%20drift%2C%20in%20both%20cases.%20The%20gains%20are%20strongest%20at%20%24%CE%BB%3D0.75%24%2C%20while%20%24%CE%BB%3D1.0%24%20remains%20more%20difficult.%20The%20current%20symmetry-aware%20model%20improves%20projective-invariance%20drift%20relative%20to%20the%20local%20baseline%2C%20but {"title": "Computation of Least Trimmed Squares: A Branch-and-Bound framework with Hyperplane Arrangement Enhancements", "author": "Xiang Meng and Andr\u00e9s G\u00f3mez and Rahul Mazumder", "abstract": "We study computational aspects of a key problem in robust statistics -- the penalized least trimmed squares (LTS) regression problem, a robust estimator that mitigates the influence of outliers in data by capping residuals with large magnitudes. Although statistically attractive, penalized LTS is NP-hard, and existing mixed-integer optimization (MIO) formulations scale poorly due to weak relaxations and exponential worst-case complexity in the number of observations. We propose a new MIO formulation that embeds hyperplane arrangement logic into a perspective reformulation, explicitly enforcing structural properties of optimal solutions. We show that, if the number of features is fixed, the resulting branch-and-bound tree is of polynomial size in the sample size. Moreover, we develop a tailored branch-and-bound algorithm that uses first-order methods with dual bounds to solve node relaxations efficiently. Computational experiments on synthetic and real datasets demonstrate substantial improvements over existing MIO approaches: on synthetic instances with 5000 samples and 20 features, our tailored solver reaches a 1% gap in 1 minute while competing approaches fail to do so within one hour. These gains enable exact robust regression at significantly larger sample sizes in low-dimensional settings.", "link": "http://arxiv.org/abs/2604.11584v1", "date": "2026-04-13", "relevancy": 2.2533, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4704}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4504}, {"title": "RTG-SLAM: Real-time 3D Reconstructio {"title": "Many-Tier Instruction Hierarchy in LLM Agents", "author": "Jingyu Zhang and Tianjian Li and William Jurayj and Hongyuan Zhan and Benjamin Van Durme and Daniel Khashabi", "abstract": "Large language model agents receive instructions from many sources-system messages, user prompts, tool outputs, other agents, and more-each carrying different levels of trust and authority. When these instructions conflict, agents must reliably follow the highest-privilege instruction to remain safe and effective. The dominant paradigm, instruction hierarchy (IH), assumes a fixed, small set of privilege levels (typically fewer than five) defined by rigid role labels (e.g., system > user). This is inadequate for real-world agentic settings, where conflicts can arise across far more sources and contexts. In this work, we propose Many-Tier Instruction Hierarchy (ManyIH), a paradigm for resolving instruction conflicts among instructions with arbitrarily many privilege levels. We introduce ManyIH-Bench, the first benchmark for ManyIH. ManyIH-Bench requires models to navigate up to 12 levels of conflicting instructions with varying privileges, comprising 853 agentic tasks (427 coding and 426 instruction-following). ManyIH-Bench composes constraints developed by LLMs and verified by humans to create realistic and difficult test cases spanning 46 real-world agents. Our experiments show that even the current frontier models perform poorly (~40% accuracy) when instruction conflict scales. This work underscores the urgent need for methods that explicitly target fine-grained, scalable instruction conflict resolution in agentic settings.", "link": "http://arxiv.org/abs/2604.09443v2", "date": "2026-04-13", "relevancy": 2.2492, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4888}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4304}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4304}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents&body=Title%3A%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents%0AAuthor%3A%20Jingyu%20Zhang%20and%20Tianjian%20Li%20and%20William%20Jurayj%20and%20Hongyuan%20Zhan%20and%20Benjamin%20Van%20Durme%20and%20Daniel%20Khashabi%0AAbstract%3A%20Large%20language%20model%20agents%20receive%20instructions%20from%20many%20sources-system%20messages%2C%20user%20prompts%2C%20tool%20outputs%2C%20other%20agents%2C%20and%20more-each%20carrying%20different%20levels%20of%20trust%20and%20authority.%20When%20these%20instructions%20conflict%2C%20agents%20must%20reliably%20follow%20the%20highest-privilege%20instruction%20to%20remain%20safe%20and%20effective.%20The%20dominant%20paradigm%2C%20instruction%20hierarchy%20%28IH%29%2C%20assumes%20a%20fixed%2C%20small%20set%20of%20privilege%20levels%20%28typically%20fewer%20than%20five%29%20defined%20by%20rigid%20role%20labels%20%28e.g.%2C%20system%20%3E%20user%29.%20This%20is%20inadequate%20for%20real-world%20agentic%20settings%2C%20where%20conflicts%20can%20arise%20across%20far%20more%20sources%20and%20contexts.%20In%20this%20work%2C%20we%20propose%20Many-Tier%20Instruction%20Hierarchy%20%28ManyIH%29%2C%20a%20paradigm%20for%20resolving%20instruction%20conflicts%20among%20instructions%20with%20arbitrarily%20many%20privilege%20levels.%20We%20introduce%20ManyIH-Bench%2C%20the%20first%20benchmark%20for%20ManyIH.%20ManyIH-Bench%20requires%20models%20to%20navigate%20up%20to%2012%20levels%20of%20conflicting%20instructions%20with%20varying%20privileges%2C%20comprising%20853%20agentic%20tasks%20%28427%20coding%20and%20426%20instruction-following%29.%20ManyIH-Bench%20composes%20constraints%20developed%20by%20LLMs%20and%20verified%20by%20humans%20to%20create%20realistic%20and%20difficult%20test%20cases%20spanning%2046%20real-world%20agents.%20Our%20experiments%20show%20that%20even%20the%20current%20frontier%20models%20perform%20poorly%20%28~40%25%20accuracy%29%20when%20instruction%20conflict%20scales.%20This%20work%20underscores%20the%20urgent%20need%20for%20methods%20that%20explicitly%20target%20fine-grained%2C%20scalable%20instruction%20conflict%20resolution%20in%20agentic%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09443v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMany-Tier%2520Instruction%2520Hierarchy%2520in%2520LLM%2520Agents%26entry.906535625%3DJingyu%2520Zhang%2520and%2520Tianjian%2520Li%2520and%2520William%2520Jurayj%2520and%2520Hongyuan%2520Zhan%2520and%2520Benjamin%2520Van%2520Durme%2520and%2520Daniel%2520Khashabi%26entry.1292438233%3DLarge%2520language%2520model%2520agents%2520receive%2520instructions%2520from%2520many%2520sources-system%2520messages%252C%2520user%2520prompts%252C%2520tool%2520outputs%252C%2520other%2520agents%252C%2520and%2520more-each%2520carrying%2520different%2520levels%2520of%2520trust%2520and%2520authority.%2520When%2520these%2520instructions%2520conflict%252C%2520agents%2520must%2520reliably%2520follow%2520the%2520highest-privilege%2520instruction%2520to%2520remain%2520safe%2520and%2520effective.%2520The%2520dominant%2520paradigm%252C%2520instruction%2520hierarchy%2520%2528IH%2529%252C%2520assumes%2520a%2520fixed%252C%2520small%2520set%2520of%2520privilege%2520levels%2520%2528typically%2520fewer%2520than%2520five%2529%2520defined%2520by%2520rigid%2520role%2520labels%2520%2528e.g.%252C%2520system%2520%253E%2520user%2529.%2520This%2520is%2520inadequate%2520for%2520real-world%2520agentic%2520settings%252C%2520where%2520conflicts%2520can%2520arise%2520across%2520far%2520more%2520sources%2520and%2520contexts.%2520In%2520this%2520work%252C%2520we%252 {"title": "Variational Latent Entropy Estimation Disentanglement: Controlled Attribute Leakage for Face Recognition", "author": "\u00dcnsal \u00d6zt\u00fcrk and Vedrana Krivoku\u0107a Hahn and Sushil Bhattacharjee and S\u00e9bastien Marcel", "abstract": "Face recognition embeddings encode identity, but they also encode other factors such as gender and ethnicity. Depending on how these factors are used by a downstream system, separating them from the information needed for verification is important for both privacy and fairness. We propose Variational Latent Entropy Estimation Disentanglement (VLEED), a post-hoc method that transforms pretrained embeddings with a variational autoencoder and encourages a distilled representation where the categorical variable of interest is separated from identity-relevant information. VLEED uses a mutual information-based objective realised through the estimation of the entropy of the categorical attribute in the latent space, and provides stable training with fine-grained control over information removal. We evaluate our method on IJB-C, RFW, and VGGFace2 for gender and ethnicity disentanglement, and compare it to various state-of-the-art methods. We report verification utility, predictability of the disentangled variable under linear and nonlinear classifiers, and group disparity metrics based on false match rates. Our results show that VLEED offers a wide range of privacy-utility tradeoffs over existing methods and can also reduce recognition bias across demographic groups.", "link": "http://arxiv.org/abs/2604.11250v1", "date": "2026-04-13", "relevancy": 2.2473, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5841}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.554}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5257}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Variational%20Latent%20Entropy%20Estimation%20Disentanglement%3A%20Controlled%20Attribute%20Leakage%20for%20Face%20Recognition&body=Title%3A%20Variational%20Latent%20Entropy%20Estimation%20Disentanglement%3A%20Controlled%20Attribute%20Leakage%20for%20Face%20Recognition%0AAuthor%3A%20%C3%9Cnsal%20%C3%96zt%C3%BCrk%20and%20Vedrana%20Krivoku%C4%87a%20Hahn%20and%20Sushil%20Bhattacharjee%20and%20S%C3%A9bastien%20Marcel%0AAbstract%3A%20Face%20recognition%20embeddings%20encode%20identity%2C%20but%20they%20also%20encode%20other%20factors%20such%20as%20gender%20and%20ethnicity.%20Depending%20on%20how%20these%20factors%20are%20used%20by%20a%20downstream%20system%2C%20separating%20them%20from%20the%20information%20needed%20for%20verification%20is%20important%20for%20both%20privacy%20and%20fairness.%20We%20propose%20Variational%20Latent%20Entropy%20Estimation%20Disentanglement%20%28VLEED%29%2C%20a%20post-hoc%20method%20that%20transforms%20pretrained%20embeddings%20with%20a%20variational%20autoencoder%20and%20encourages%20a%20distilled%20representation%20where%20the%20categorical%20variable%20of%20interest%20is%20separated%20from%20identity-relevant%20information.%20VLEED%20uses%20a%20mutual%20information-based%20objective%20realised%20through%20the%20estimation%20of%20the%20entropy%20of%20the%20categorical%20attribute%20in%20the%20latent%20space%2C%20and%20provides%20stable%20training%20with%20fine-grained%20control%20over%20information%20removal.%20We%20evaluate%20our%20method%20on%20IJB-C%2C%20RFW%2C%20and%20VGGFace2%20for%20gender%20and%20ethnicity%20disentanglement%2C%20and%20compare%20it%20to%20various%20state-of-the-art%20methods.%20We%20report%20verification%20utility%2C%20predictability%20of {"title": "Who Handles Orientation? Investigating Invariance in Feature Matching", "author": "David Nordstr\u00f6m and Johan Edstedt and Fredrik Kahl and Georg B\u00f6kman", "abstract": "Finding matching keypoints between images is a core problem in 3D computer vision. However, modern matchers struggle with large in-plane rotations. A straightforward mitigation is to learn rotation invariance via data augmentation. However, it remains unclear at which stage rotation invariance should be incorporated. In this paper, we study this in the context of a modern sparse matching pipeline. We perform extensive experiments by training on a large collection of 3D vision datasets and evaluating on popular image matching benchmarks. Surprisingly, we find that incorporating rotation invariance already in the descriptor yields similar performance to handling it in the matcher. However, rotation invariance is achieved earlier in the matcher when it is learned in the descriptor, allowing for a faster rotation-invariant matcher. Further, we find that enforcing rotation invariance does not hurt upright performance when trained at scale. Finally, we study the emergence of rotation invariance through scale and find that increasing the training data size substantially improves generalization to rotated images. We release two matchers robust to in-plane rotations that achieve state-of-the-art performance on e.g. multi-modal (WxBS), extreme (HardMatch), and satellite image matching (SatAst). Code is available at https://github.com/davnords/loma.", "link": "http://arxiv.org/abs/2604.11809v1", "date": "2026-04-13", "relevancy": 2.2416, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6049}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5414}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4966}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Who%20Handles%20Orientation%3F%20Investigating%20Invariance%20in%20Feature%20Matching&body=Title%3A%20Who%20Handles%20Orientation%3F%20Investigating%20Invariance%20in%20Feature%20Matching%0AAuthor%3A%20David%20Nordstr%C3%B6m%20and%20Johan%20Edstedt%20and%20Fredrik%20Kahl%20and%20Georg%20B%C3%B6kman%0AAbstract%3A%20Finding%20matching%20keypoints%20between%20images%20is%20a%20core%20problem%20in%203D%20computer%20vision.%20However%2C%20modern%20matchers%20struggle%20with%20large%20in-plane%20rotations.%20A%20straightforward%20mitigation%20is%20to%20learn%20rotation%20invariance%20via%20data%20augmentation.%20However%2C%20it%20remains%20unclear%20at%20which%20stage%20rotation%20invariance%20should%20be%20incorporated.%20In%20this%20paper%2C%20we%20study%20this%20in%20the%20context%20of%20a%20modern%20sparse%20matching%20pipeline.%20We%20perform%20extensive%20experiments%20by%20training%20on%20a%20large%20collection%20of%203D%20vision%20datasets%20and%20evaluating%20on%20popular%20image%20matching%20benchmarks.%20Surprisingly%2C%20we%20find%20that%20incorporating%20rotation%20invariance%20already%20in%20the%20descriptor%20yields%20similar%20performance%20to%20handling%20it%20in%20the%20matcher.%20However%2C%20rotation%20invariance%20is%20achieved%20earlier%20in%20the%20matcher%20when%20it%20is%20learned%20in%20the%20descriptor%2C%20allowing%20for%20a%20faster%20rotation-invariant%20matcher.%20Further%2C%20we%20find%20that%20enforcing%20rotation%20invariance%20does%20not%20hurt%20upright%20performance%20when%20trained%20at%20scale.%20Finally%2C%20we%20study%20the%20emergence%20of%20rotation%20invariance%20through%20scale%20and%20find%20that%20increasing%20the%20training%20data%20size%20substantially%20improves%20generalization%20to%20rotated%20images.%20We%20release%20two%2 {"title": "Inertial Magnetic SLAM Systems Using Low-Cost Sensors", "author": "Chuan Huang and Gustaf Hendeby and Isaac Skog", "abstract": "Spatially inhomogeneous magnetic fields offer a valuable, non-visual information source for positioning. Among systems leveraging this, magnetic field-based simultaneous localization and mapping (SLAM) systems are particularly attractive because they can provide positioning information and build a magnetic field map on the fly. Moreover, they have bounded error within mapped regions. However, state-of-the-art methods typically require low-drift odometry data provided by visual odometry or a wheel encoder, etc. This is because these systems need to minimize/reduce positioning errors while exploring, which happens when they are in unmapped regions. To address these limitations, this work proposes a loosely coupled and a tightly coupled inertial magnetic SLAM (IM-SLAM) system. The proposed systems use commonly available low-cost sensors: an inertial measurement unit (IMU), a magnetometer array, and a barometer. The use of non-visual data provides a significant advantage over visual-based systems, making it robust to low-visibility conditions. Both systems employ state-space representations, and magnetic field models on different scales. The difference lies in how they use a local and global magnetic field model. The loosely coupled system uses these models separately in two state-space models, while the tightly coupled system integrates them into one state-space model. Experiment results show that the tightly coupled IM-SLAM system achieves lower positioning errors than the loosely coupled system in most scenarios, with typical errors on the order of meters per 100 meters traveled. These results demonstrate the feasiblity of developing a full 3D IM-SLAM systems using low-cost sensors and the potential of applying these systems in emergency response scenarios such as mine/fire rescue.", "link": "http://arxiv.org/abs/2512.10128v2", "date": "2026-04-13", "relevancy": 2.2334, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5744}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5652}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inertial%20Magnetic%20SLAM%20Systems%20Using%20Low-Cost%20Sensors&body=Title%3A%20Inertial%20Magnetic%20SLAM%20Systems%20Using%20Low-Cost%20Sensors%0AAuthor%3A%20Chuan%20Huang%20and%20Gustaf%20Hendeby%20and%20Isaac%20Skog%0AAbstract%3A%20Spatially%20inhomogeneous%20magnetic%20fields%20offer%20a%20valuable%2C%20non-visual%20information%20source%20for%20positioning.%20Among%20systems%20leveraging%20this%2C%20magnetic%20field-based%20simultaneous%20localization%20and%20mapping%20%28SLAM%29%20systems%20are%20particularly%20attractive%20because%20they%20can%20provide%20positioning%20information%20and%20build%20a%20magnetic%20field%20map%20on%20the%20fly.%20Moreover%2C%20they%20have%20bounded%20error%20within%20mapped%20regions.%20However%2C%20state-of-the-art%20methods%20typically%20require%20low-drift%20odometry%20data%20provided%20by%20visual%20odometry%20or%20a%20wheel%20encoder%2C%20etc.%20This%20is%20because%20these%20systems%20need%20to%20minimize/reduce%20positioning%20errors%20while%20exploring%2C%20which%20happens%20when%20they%20are%20in%20unmapped%20regions.%20To%20address%20these%20limitations%2C%20this%20work%20proposes%20a%20loosely%20coupled%20and%20a%20tightly%20coupled%20inertial%20magnetic%20SLAM%20%28IM-SLAM%29%20system.%20The%20proposed%20systems%20use%20commonly%20available%20low-cost%20sensors%3A%20an%20inertial%20measurement%20unit%20%28IMU%29%2C%20a%20magnetometer%20array%2C%20and%20a%20barometer.%20The%20use%20of%20non-visual%20data%20provides%20a%20significant%20advantage%20over%20visual-based%20systems%2C%20making%20it%20robust%20to%20low-visibility%20conditions.%20Both%20systems%20employ%20state-space%20representations%2C%20and%20magnetic%20field%20models%20on%20different%20scales.%20The%20difference%20lies%20in%20how%20they%20use%20a%20local%20and%20global%20magnetic%20field%20model.%20The%20loosely%20coupled%20system%20uses%20these%20models%20separately%20in%20two%20state-space%20models%2C%20while%20the%20tightly%20coupled%20system%20integrates%20them%20into%20one%20state-space%20model.%20Experiment%20results%20show%20that%20the%20tightly%20coupled%20IM-SLAM%20system%20achieves%20lower%20positioning%20errors%20than%20the%20loosely%20coupled%20system%20in%20most%20scenarios%2C%20with%20typical%20errors%20on%20the%20order%20of%20meters%20per%20100%20meters%20traveled.%20These%20results%20demonstrate%20the%20feasiblity%20of%20developing%20a%20full%203D%20IM-SLAM%20systems%20using%20low-cost%20sensors%20and%20the%20potential%20of%20applying%20these%20systems%20in%20emergency%20response%20scenarios%20such%20as%20mine/fire%20rescue.%0ALink%3A%20http%3A//arxiv.org/abs/2512.10128v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInertial%2520Magnetic%2520SLAM%2520Systems%2520Using%2520Low-Cost%2520Sensors%26entry.906535625%3DChuan%2520Huang%2520and%2520Gustaf%2520Hendeby%2520and%2520Isaac%2520Skog%26entry.1292438233%3DSpatially%2520inhomogeneous%2520magnetic%2520fields%2520offer%2520a%2520valuable%252C%2520non-visual%2520information%2520source%2520for%2520positioning.%2520Among%2520systems%2520leveraging%2520this%252C%2520magnetic%2520field-based%2520simultaneous%2520localization%2520and%2520mapping%2520%2528SLAM%2529%2520systems%2520are%2520particularly%2520attractive%2520because%2520they%2520can%2520provide%2520positioning%2520information%2520and%2520build%2520a%2520magnetic%2520field%2520map%2520on%2520the%2520fly.%2520Moreover%252C%2520they%2520have%2520bounded%2520error%2520within%2520mapped%2520regions.%2520However%252C%2520state-of-the-art%2520methods%2520typically%2520require%2520low-drift%2520odometry%2520data%2520provided%2520by%2520visual%2520odometry%2520or%2520a%2520wheel%2520encoder%252C%2520etc.%2520This%2520is%2520because%2520these%2520systems%2520need%2520to%2520minimize/reduce%2520positioning%2520errors%2520while%2520exploring%252C%2520which%2520happens%2520when%2520they%2520are%2520in%2520unmapped%2520regions.%2520To%2520address%2520these%2520limitations%252C%2520this%2520work%2520proposes%2520a%2520loosely%2520coupled%2520and%2520a%2520tightly%2520coupled%2520inertial%2520magnetic%2520SLAM%2520%2528IM-SLAM%2529%2520system.%2520The%2520proposed%2520systems%2520use%2520commonly%2520available%2520low-cost%2520sensors%253A%2520an%2520inertial%2520measurement%2520unit%2520%2528IMU%2529%252C%2520a%2520magnetometer%2520array%252C%2520and%2520a%2520barometer.%2520The%2520use%2520of%2520non-visual%2520data%2520provides%2520a%2520significant%2520advantage%2520over%2520visual-based%2520systems%252C%2520making%2520it%2520robust%2520to%2520low-visibility%2520conditions.%2520Both%2520systems%2520employ%2520state-space%2520representations%252C%2520and%2520magnetic%2520field%2520models%2520on%2520different%2520scales.%2520The%2520difference%2520lies%2520in%2520how%2520they%2520use%2520a%2520local%2520and%2520global%2520magnetic%2520field%2520model.%2520The%2520loosely%2520coupled%2520system%2520uses%2520these%2520models%2520separately%2520in%2520two%2520state-space%2520models%252C%2520while%2520the%2520tightly%2520coupled%2520system%2520integrates%2520them%2520into%2520one%2520state-space%2520model.%2520Experiment%2520results%2520show%2520that%2520the%2520tightly%2520coupled%2520IM-SLAM%2520system%2520achieves%2520lower%2520positioning%2520errors%2520than%2520the%2520loosely%2520coupled%2520system%2520in%2520most%2520scenarios%252C%2520with%2520typical%2520errors%2520on%2520the%2520order%2520of%2520meters%2520per%2520100%2520meters%2520traveled.%2520These%2520results%2520demonstrate%2520the%2520feasiblity%2520of%2520developing%2520a%2520full%25203D%2520IM-SLAM%2520systems%2520using%2520low-cost%2520sensors%2520and%2520the%2520potential%2520of%2520applying%2520these%2520systems%2520in%2520emergency%2520response%2520scenarios%2520such%2520as%2520mine/fire%2520rescue.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.10128v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Inertial%20Magnetic%20SLAM%20Systems%20Using%20Low-Cost%20Sensors&entry.906535625=Chuan%20Huang%20and%20Gustaf%20Hendeby%20and%20Isaac%20Skog&entry.1292438233=Spatially%20inhomogeneous%20magnetic%20fields%20offer%20a%20valuable%2C%20non-visual%20information%20source%20for%20positioning.%20Among%20systems%20leveraging%20this%2C%20magnetic%20field-based%20simultaneous%20localization%20and%20mapping%20%28SLAM%29%20systems%20are%20particularly%20attractive%20because%20they%20can%20provide%20positioning%20information%20and%20build%20a%20magnetic%20field%20map%20on%20the%20fly.%20Moreover%2C%20they%20have%20bounded%20error%20within%20mapped%20regions.%20However%2C%20state-of-the-art%20methods%20typically%20require%20low-drift%20odometry%20data%20provided%20by%20visual%20odometry%20or%20a%20wheel%20encoder%2C%20etc.%20This%20is%20because%20these%20systems%20need%20to%20minimize/reduce%20positioning%20errors%20while%20exploring%2C%20which%20happens%20when%20they%20are%20in%20unmapped%20regions.%20To%20address%20these%20limitations%2C%20this%20work%20proposes%20a%20loosely%20coupled%20and%20a%20tightly%20coupled%20inertial%20magnetic%20SLAM%20%28IM-SLAM%29%20system.%20The%20proposed%20systems%20use%20commonly%20available%20low-cost%20sensors%3A%20an%20inertial%20mea

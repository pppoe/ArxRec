ikas%20Chandra%20and%20Mohamed%20Elhoseiny%20and%20Wei%20Wen&entry.1292438233=Diffusion%20Large%20Language%20Models%20%28dLLMs%29%20introduce%20a%20new%20paradigm%20for%20language%20generation%2C%20which%20in%20turn%20presents%20new%20challenges%20for%20aligning%20them%20with%20human%20preferences.%20In%20this%20work%2C%20we%20aim%20to%20improve%20the%20policy%20optimization%20for%20dLLMs%20by%20reducing%20the%20cost%20of%20the%20trajectory%20probability%20calculation%2C%20thereby%20enabling%20scaled-up%20offline%20policy%20training.%20We%20prove%20that%3A%20%28i%29%20under%20reference%20policy%20regularization%2C%20the%20probability%20ratio%20of%20the%20newly%20unmasked%20tokens%20is%20an%20unbiased%20estimate%20of%20that%20of%20intermediate%20diffusion%20states%2C%20and%20%28ii%29%20the%20probability%20of%20the%20full%20trajectory%20can%20be%20effectively%20estimated%20with%20a%20single%20forward%20pass%20of%20a%20re-masked%20final%20state.%20By%20integrating%20these%20two%20trajectory%20reduction%20strategies%20into%20a%20policy%20optimization%20objective%2C%20we%20propose%20Trajectory%20Reduction%20Policy%20Optimization%20%28dTRPO%29.%20We%20evaluate%20dTRPO%20on%207B%20dLLMs%20across%20instruction-following%20and%20reasoning%20benchmarks.%20Results%20show%20that%20it%20substantially%20improves%20the%20core%20performance%20of%20state-of-the-art%20dLLMs%2C%20achieving%20gains%20of%20up%20to%209.6%25%20on%20STEM%20tasks%2C%20up%20to%204.3%25%20on%20coding%20tasks%2C%20and%20up%20to%203.0%25%20on%20instruction-following%20tasks.%20Moreover%2C%20dTRPO%20exhibits%20strong%20training%20efficiency%20due%20to%20its%20offline%2C%20single-forward%20nature%2C%20and%20achieves%20improved%20generation%20efficiency%20through%20high-quality%20outputs.&entry.1838667208=http%3A//arxiv.org/abs/2603.18806v2&entry.124074799=Read"},
{"title": "Exact Certification of Neural Networks and Partition Aggregation Ensembles against Label Poisoning", "author": "Ajinkya Mohgaonkar and Lukas Gosch and Mahalakshmi Sabanayagam and Debarghya Ghoshdastidar and Stephan G\u00fcnnemann", "abstract": "Label-flipping attacks, which corrupt training labels to induce misclassifications at inference, remain a major threat to supervised learning models. This drives the need for robustness certificates that provide formal guarantees about a model's robustness under adversarially corrupted labels. Existing certification frameworks rely on ensemble techniques such as smoothing or partition-aggregation, but treat the corresponding base classifiers as black boxes, yielding overly conservative guarantees. We introduce EnsembleCert, the first certification framework for partition-aggregation ensembles that utilizes white-box knowledge of the base classifiers. Concretely, EnsembleCert yields tighter guarantees than black-box approaches by aggregating per-partition white-box certificates to compute ensemble-level guarantees in polynomial time. To extract white-box knowledge from the base classifiers efficiently, we develop ScaLabelCert, a method that leverages the equivalence between sufficiently wide neural networks and kernel methods using the neural tangent kernel. ScaLabelCert yields the first exact, polynomial-time calculable certificate for neural networks against label-flipping attacks. EnsembleCert is either on par, or significantly outperforms the existing partition-based black box certificates. Exemplary, on CIFAR-10, our method can certify upto +26.5% more label flips in median over the test set compared to the existing black-box approach while requiring 100 times fewer partitions, thus, challenging the prevailing notion that heavy partitioning is a necessity for strong certified robustness.", "link": "http://arxiv.org/abs/2604.11416v1", "date": "2026-04-13", "relevancy": 1.9081, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4849}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4769}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.474}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exact%20Certification%20of%20Neural%20Networks%20and%20Partition%20Aggregation%20Ensembles%20against%20Label%20Poisoning&body=Title%3A%20Exact%20Certification%20of%20Neural%20Networks%20and%20Partition%20Aggregation%20Ensembles%20against%20Label%20Poisoning%0AAuthor%3A%20Ajinkya%20Mohgaonkar%20and%20Lukas%20Gosch%20and%20Mahalakshmi%20Sabanayagam%20and%20Debarghya%20Ghoshdastidar%20and%20Stephan%20G%C3%BCnnemann%0AAbstract%3A%20Label-flipping%20attacks%2C%20which%20corrupt%20training%20labels%20to%20induce%20misclassifications%20at%20inference%2C%20remain%20a%20major%20threat%20to%20supervised%20learning%20models.%20This%20drives%20the%20need%20for%20robustness%20certificates%20that%20provide%20formal%20guarantees%20about%20a%20model%27s%20robustness%20under%20adversarially%20corrupted%20labels.%20Existing%20certification%20frameworks%20rely%20on%20ensemble%20techniques%20such%20as%20smoothing%20or%20partition-aggregation%2C%20but%20treat%20the%20corresponding%20base%20classifiers%20as%20black%20boxes%2C%20yielding%20overly%20conservative%20guarantees.%20We%20introduce%20EnsembleCert%2C%20the%20first%20certification%20framework%20for%20partition-aggregation%20ensembles%20that%20utilizes%20white-box%20knowledge%20of%20the%20base%20classifiers.%20Concretely%2C%20EnsembleCert%20yields%20tighter%20guarantees%20than%20black-box%20approaches%20by%20aggregating%20per-partition%20white-box%20certificates%20to%20compute%20ensemble-level%20guarantees%20in%20polynomial%20time.%20To%20extract%20white-box%20knowledge%20from%20the%20base%20classifiers%20efficiently%2C%20we%20develop%20ScaLabelCert%2C%20a%20method%20that%20leverages%20the%20equivalence%20between%20sufficiently%20wide%20neural%20networks%20and%20kernel%20methods%20using%20the%20neural%20tangent%20kernel.%20ScaLabelCert%20yields%20the%20first%20exact%2C%20polynomial-time%20calculable%20certificate%20for%20neural%20networks%20against%20label-flipping%20attacks.%20EnsembleCert%20is%20either%20on%20par%2C%20or%20significantly%20outperforms%20the%20existing%20partition-based%20black%20box%20certificates.%20Exemplary%2C%20on%20CIFAR-10%2C%20our%20method%20can%20certify%20upto%20%2B26.5%25%20more%20label%20flips%20in%20median%20over%20the%20test%20set%20compared%20to%20the%20existing%20black-box%20approach%20while%20requiring%20100%20times%20fewer%20partitions%2C%20thus%2C%20challenging%20the%20prevailing%20notion%20that%20heavy%20partitioning%20is%20a%20necessity%20for%20strong%20certified%20robustness.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11416v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExact%2520Certification%2520of%2520Neural%2520Networks%2520and%2520Partition%2520Aggregation%2520Ensembles%2520against%2520Label%2520Poisoning%26entry.906535625%3DAjinkya%2520Mohgaonkar%2520and%2520Lukas%2520Gosch%2520and%2520Mahalakshmi%2520Sabanayagam%2520and%2520Debarghya%2520Ghoshdastidar%2520and%2520Stephan%2520G%25C3%25BCnnemann%26entry.1292438233%3DLabel-flipping%2520attacks%252C%2520which%2520corrupt%2520training%2520labels%2520to%2520induce%2520misclassifications%2520at%2520inference%252C%2520remain%2520a%2520major%2520threat%2520to%2520supervised%2520learning%2520models.%2520This%2520drives%2520the%2520need%2520for%2520robustness% {"title": "Escaping the Context Bottleneck: Active Context Curation for LLM Agents via Reinforcement Learning", "author": "Xiaozhe Li and Tianyi Lyu and Yizhao Yang and Liang Shan and Siyi Yang and Ligao Zhang and Zhuoyi Huang and Qingwen Liu and Yang Li", "abstract": "Large Language Models (LLMs) struggle with long-horizon tasks due to the \"context bottleneck\" and the \"lost-in-the-middle\" phenomenon, where accumulated noise from verbose environments degrades reasoning over multi-turn interactions. To address this issue, we introduce a symbiotic framework that decouples context management from task execution. Our architecture pairs a lightweight, specialized policy model, ContextCurator, with a powerful frozen foundation model, TaskExecutor. Trained via reinforcement learning, ContextCurator actively reduces information entropy in the working memory. It aggressively prunes environmental noise while preserving reasoning anchors, that is, sparse data points that are critical for future deductions. On WebArena, our framework improves the success rate of Gemini-3.0-flash from 36.4% to 41.2% while reducing token consumption by 8.8% (from 47.4K to 43.3K). On DeepSearch, it achieves a 57.1% success rate, compared with 53.9%, while reducing token consumption by a factor of 8. Remarkably, a 7B ContextCurator matches the context management performance of GPT-4o, providing a scalable and computationally efficient paradigm for autonomous long-horizon agents.", "link": "http://arxiv.org/abs/2604.11462v1", "date": "2026-04-13", "relevancy": 2.1857, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5514}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5426}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Escaping%20the%20Context%20Bottleneck%3A%20Active%20Context%20Curation%20for%20LLM%20Agents%20via%20Reinforcement%20Learning&body=Title%3A%20Escaping%20the%20Context%20Bottleneck%3A%20Active%20Context%20Curation%20for%20LLM%20Agents%20via%20Reinforcement%20Learning%0AAuthor%3A%20Xiaozhe%20Li%20and%20Tianyi%20Lyu%20and%20Yizhao%20Yang%20and%20Liang%20Shan%20and%20Siyi%20Yang%20and%20Ligao%20Zhang%20and%20Zhuoyi%20Huang%20and%20Qingwen%20Liu%20and%20Yang%20Li%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20struggle%20with%20long-horizon%20tasks%20due%20to%20the%20%22context%20bottleneck%22%20and%20the%20%22lost-in-the-middle%22%20phenomenon%2C%20where%20accumulated%20noise%20from%20verbose%20environments%20degrades%20reasoning%20over%20multi-turn%20interactions.%20To%20address%20this%20issue%2C%20we%20introduce%20a%20symbiotic%20framework%20that%20decouples%20context%20management%20from%20task%20execution.%20Our%20architecture%20pairs%20a%20lightweight%2C%20specialized%20policy%20model%2C%20ContextCurator%2C%20with%20a%20powerful%20frozen%20foundation%20model%2C%20TaskExecutor.%20Trained%20via%20reinforcement%20learning%2C%20ContextCurator%20actively%20reduces%20information%20entropy%20in%20the%20working%20memory.%20It%20aggressively%20prunes%20environmental%20noise%20while%20preserving%20reasoning%20anchors%2C%20that%20is%2C%20sparse%20data%20points%20that%20are%20critical%20for%20future%20deductions.%20On%20WebArena%2C%20our%20framework%20improves%20the%20success%20rate%20of%20Gemini-3.0-flash%20from%2036.4%25%20to%2041.2%25%20while%20reducing%20token%20consumption%20by%208.8%25%20%28from%2047.4K%20to%2043.3K%29.%20On%20DeepSearch%2C%20it%20achieves%20a%2057.1%25%20success%20rate%2C%20compared%20with%2053.9%25%2C%20while%20reducing%20token%20consumption%20by%20a%20factor%20of%208.%20Remarkably%2C%20a%207B%20ContextCurator%20matches%20the%20context%20ma {"title": "The Salami Slicing Threat: Exploiting Cumulative Risks in LLM Systems", "author": "Yihao Zhang and Kai Wang and Jiangrong Wu and Haolin Wu and Yuxuan Zhou and Zeming Wei and Dongxian Wu and Xun Chen and Jun Sun and Meng Sun", "abstract": "Large Language Models (LLMs) face prominent security risks from jailbreaking, a practice that manipulates models to bypass built-in security constraints and generate unethical or unsafe content. Among various jailbreak techniques, multi-turn jailbreak attacks are more covert and persistent than single-turn counterparts, exposing critical vulnerabilities of LLMs.\n  However, existing multi-turn jailbreak methods suffer from two fundamental limitations that affect the actual impact in real-world scenarios: (a) As models become more context-aware, any explicit harmful trigger is increasingly likely to be flagged and blocked; (b) Successful final-step triggers often require finely tuned, model-specific contexts, making such attacks highly context-dependent. To fill this gap, we propose \\textit{Salami Slicing Risk}, which operates by chaining numerous low-risk inputs that individually evade alignment thresholds but cumulatively accumulate harmful intent to ultimately trigger high-risk behaviors, without heavy reliance on pre-designed contextual structures. Building on this risk, we develop Salami Attack, an automatic framework universally applicable to multiple model types and modalities.\n  Rigorous experiments demonstrate its state-of-the-art performance across diverse models and modalities, achieving over 90\\% Attack Success Rate on GPT-4o and Gemini, as well as robustness against real-world alignment defenses. We also proposed a defense strategy to constrain the Salami Attack by at least 44.8\\% while achieving a maximum blocking rate of 64.8\\% against other multi-turn jailbreak attacks. Our findings provide critical insights into the pervasive risks of multi-turn jailbreaking and offer actionable mitigation strategies to enhance LLM security.", "link": "http://arxiv.org/abs/2604.11309v1", "date": "2026-04-13", "relevancy": 1.8373, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4649}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4599}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Salami%20Slicing%20Threat%3A%20Exploiting%20Cumulative%20Risks%20in%20LLM%20Systems&body=Title%3A%20The%20Salami%20Slicing%20Threat%3A%20Exploiting%20Cumulative%20Risks%20in%20LLM%20Systems%0AAuthor%3A%20Yihao%20Zhang%20and%20Kai%20Wang%20and%20Jiangrong%20Wu%20and%20Haolin%20Wu%20and%20Yuxuan%20Zhou%20and%20Zeming%20Wei%20and%20Dongxian%20Wu%20and%20Xun%20Chen%20and%20Jun%20Sun%20and%20Meng%20Sun%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20face%20prominent%20security%20risks%20from%20jailbreaking%2C%20a%20practice%20that%20manipulates%20models%20to%20bypass%20built-in%20security%20constraints%20and%20generate%20unethical%20or%20unsafe%20content.%20Among%20various%20jailbreak%20techniques%2C%20multi-turn%20jailbreak%20attacks%20are%20more%20covert%20and%20persistent%20than%20single-turn%20counterparts%2C%20exposing%20critical%20vulnerabilities%20of%20LLMs.%0A%20%20However%2C%20existing%20multi-turn%20jailbreak%20methods%20suffer%20from%20two%20fundamental%20limitations%20that%20affect%20the%20actual%20impact%20in%20real-world%20scenarios%3A%20%28a%29%20As%20models%20become%20more%20context-aware%2C%20any%20explicit%20harmful%20trigger%20is%20increasingly%20likely%20to%20be%20flagged%20and%20blocked%3B%20%28b%29%20Successful%20final-step%20triggers%20often%20require%20finely%20tuned%2C%20model-specific%20contexts%2C%20making%20such%20attacks%20highly%20context-dependent.%20To%20fill%20this%20gap%2C%20we%20propose%20%5Ctextit%7BSalami%20Slicing%20Risk%7D%2C%20which%20operates%20by%20chaining%20numerous%20low-risk%20inputs%20that%20individually%20evade%20alignment%20thresholds%20but%20cumulatively%20accumulate%20harmful%20intent%20to%20ultimately%20trigger%20high-risk%20behaviors%2C%20without%20heavy%20reliance%20on%20pre-designed%20contextual%20structures.%20Building%20on%20this%20risk%2C%20we%20develop%20Salami%20Attack%2C%20an%20automatic%20framework%20universally%20applicable%20to%20multiple%20model%20types%20and%20modalities.%0A%20%20Rigorous%20experiments%20demonstrate%20its%20state-of-the-art%20performance%20across%20diverse%20models%20and%20modalities%2C%20achieving%20over%2090%5C%25%20Attack%20Success%20Rate%20on%20GPT-4o%20and%20Gemini%2C%20as%20well%20as%20robustness%20against%20real-world%20alignment%20defenses.%20We%20also%20proposed%20a%20defense%20strategy%20to%20constrain%20the%20Salami%20Attack%20by%20at%20least%2044.8%5C%25%20while%20achieving%20a%20maximum%20blocking%20rate%20of%2064.8%5C%25%20against%20other%20multi-turn%20jailbreak%20attacks.%20Our%20findings%20provide%20critical%20insights%20into%20the%20pervasive%20risks%20of%20multi-turn%20jailbreaking%20and%20offer%20actionable%20mitigation%20strategies%20to%20enhance%20LLM%20security.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11309v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Salami%2520Slicing%2520Threat%253A%2520Exploiting%2520Cumulative%2520Risks%2520in%2520LLM%2520Systems%26entry.906535625%3DYihao%2520Zhang%2520and%2520Kai%2520Wang%2520and%2520Jiangrong%2520Wu%2520and%2520Haolin%2520Wu%2520and%2520Yuxuan%2520Zhou%2520and%2520Zeming%2520Wei%2520and%2520Dongxian%2520Wu%2520and%2520Xun%2520Chen%2520and%2520Jun%2520Sun%2520and%2520Meng%2520Sun%26entry.129243 -art%2520performance%2520across%2520diverse%2520models%2520and%2520modalities%252C%2520achieving%2520over%252090%255C%2525%2520Attack%2520Success%2520Rate%2520on%2520GPT-4o%2520and%2520Gemini%252C%2520as%2520well%2520as%2520robustness%2520against%2520real-world%2520alignment%2520defenses.%2520We%2520also%2520proposed%2520a%2520defense%2520strategy%2520to%2520constrain%2520the%2520Salami%2520Attack%2520by%2520at%2520least%252044.8%255C%2525%2520while%2520achieving%2520a%2520maximum%2520blocking%2520rate%2520of%252064.8%255C%2525%2520against%2520other%2520multi-turn%2520jailbreak%2520attacks.%2520Our%2520findings%2520provide%2520critical%2520insights%2520into%2520the%2520pervasive%2520risks%2520of%2520multi-turn%2520jailbreaking%2520and%2520offer%2520actionable%2520mitigation%2520strategies%2520to%2520enhance%2520LLM%2520security.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11309v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Salami%20Slicing%20Threat%3A%20Exploiting%20Cumulative%20Risks%20in%20LLM%20Systems&entry.906535625=Yihao%20Zhang%20and%20Kai%20Wang%20and%20Jiangrong%20Wu%20and%20Haolin%20Wu%20and%20Yuxuan%20Zhou%20and%20Zeming%20Wei%20and%20Dongxian%20Wu%20and%20Xun%20Chen%20and%20Jun%20Sun%20and%20Meng%20Sun&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20face%20prominent%20security%20risks%20from%20jailbreaking%2C%20a%20practice%20that%20manipulates%20models%20to%20bypass%20built-in%20security%20constraints%20and%20generate%20unethical%20or%20unsafe%20content.%20Among%20various%20jailbreak%20techniques%2C%20multi-turn%20jailbreak%20attacks%20are%20more%20covert%20and%20persistent%20than%20single-turn%20counterparts%2C%20exposing%20critical%20vulnerabilities%20of%20LLMs.%0A%20%20However%2C%20existing%20multi-turn%20jailbreak%20methods%20suffer%20from%20two%20fundamental%20limitations%20that%20affect%20the%20actual%20impact%20in%20 {"title": "Structural Consequences of Policy-Based Interventions on the Global Supply Chain Network", "author": "Lea Karbevska and Liming Xu and Zehui Dai and Sara AlMahri and Alexandra Brintrup", "abstract": "As global political tensions rise and the anticipation of additional tariffs from the United States on international trade increases, the issues of economic independence and supply chain resilience become more prominent. The importance of supply chain resilience has been further underscored by disruptions caused by the COVID-19 pandemic and the ongoing war in Ukraine.In light of these challenges, ranging from geopolitical instability to product supply uncertainties, governments are increasingly focused on adopting new trade policies. This study explores the impact of several of these policies on the global electric vehicle (EV) supply chain network, with a particular focus on their effects on country clusters and the broader structure of international trade. Specifically, we analyse three key policies: Country Plus One, Friendshoring, and Reshoring. Our findings show that Friendshoring, contrary to expectations, leads to greater globalisation by increasing the number of supply links across friendly countries, potentially raising transaction costs. The Country Plus One policy similarly enhances network density through redundant links, while the Reshoring policy creates challenges in the EV sector due to the high number of irreplaceable products. Additionally, the effects of these policies vary across industries; for instance, mining goods being less affected in Country Plus One than the Friendshoring policy.", "link": "http://arxiv.org/abs/2604.11479v1", "date": "2026-04-13", "relevancy": 1.1211, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.2872}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link"       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();

{"title": "S$^3$: Structured Sparsity Specification", "author": "Ayoub Ghriss", "abstract": "We introduce the Structured Sparsity Specification (S$^3$), an algebraic framework for defining, composing, and implementing structured sparse patterns. S$^3$ specifies sparsity through three components: a View that reshapes the tensor via layout composition, a Block specification that defines the atomic pruning unit, and the sparsity decision Scope. Both Block and Scope support Coupling across tensors for coordinated sparsification. S$^3$ enables precise specification of diverse sparsity structures, from fine-grained N:M patterns to coarse channel pruning, and integrates seamlessly with Optimal Brain Damage (OBD) and Surgeon (OBS). We formalize the framework mathematically, demonstrate its expressiveness on canonical patterns, and validate it experimentally via structured OBS and OBD implementations built entirely on S$^3$, which surpasses well-established second order heuristics on output reconstruction across common configurations.", "link": "http://arxiv.org/abs/2604.11315v1", "date": "2026-04-13", "relevancy": 2.2208, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4526}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4403}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20S%24%5E3%24%3A%20Structured%20Sparsity%20Specification&body=Title%3A%20S%24%5E3%24%3A%20Structured%20Sparsity%20Specification%0AAuthor%3A%20Ayoub%20Ghriss%0AAbstract%3A%20We%20introduce%20the%20Structured%20Sparsity%20Specification%20%28S%24%5E3%24%29%2C%20an%20algebraic%20framework%20for%20defining%2C%20composing%2C%20and%20implementing%20structured%20sparse%20patterns.%20S%24%5E3%24%20specifies%20sparsity%20through%20three%20components%3A%20a%20View%20that%20reshapes%20the%20tensor%20via%20layout%20composition%2C%20a%20Block%20specification%20that%20defines%20the%20atomic%20pruning%20unit%2C%20and%20the%20sparsity%20decision%20Scope.%20Both%20Block%20and%20Scope%20support%20Coupling%20across%20tensors%20for%20coordinated%20sparsification.%20S%24%5E3%24%20enables%20precise%20specification%20of%20diverse%20sparsity%20structures%2C%20from%20fine-grained%20N%3AM%20patterns%20to%20coarse%20channel%20pruning%2C%20and%20integrates%20seamlessly%20with%20Optimal%20Brain%20Damage%20%28OBD%29%20and%20Surgeon%20%28OBS%29.%20We%20formalize%20the%20framework%20mathematically%2C%20demonstrate%20its%20expressiveness%20on%20canonical%20patterns%2C%20and%20validate%20it%20experimentally%20via%20structured%20OBS%20and%20OBD%20implementations%20built%20entirely%20on%20S%24%5E3%24%2C%20which%20surpasses%20well-established%20second%20order%20heuristics%20on%20output%20reconstruction%20across%20common%20configurations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11315v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DS%2524%255E3%2524%253A%2520Structured%2520Sparsity%2520Specification%26entry.906535625%3DAyoub%2520Ghriss%26entry.1292438233%3DWe%2520introduce%2520the%2520Structured%2520Sparsity%2520Specification%2520%2528S%2524%255E3%2524%2529%252C%2520an%2520algebraic%2520framework%2520for%2520defining%252C%2520composing%252C%2520and%2520implementing%2520structured%2520sparse%2520patterns.%2520S%2524%255E3%2524%2520specifies%2520sparsity%2520through%2520three%2520components%253A%2520a%2520View%2520that%2520reshapes%2520the%2520tensor%2520via%2520layout%2520composition%252C%2520a%2520Block%2520specification%2520that%2520defines%2520the%2520atomic%2520pruning%2520unit%252C%2520and%2520the%2520sparsity%2520decision%2520Scope.%2520Both%2520Block%2520and%2520Scope%2520support%2520Coupling%2520across%2520tensors%2520for%2520coordinated%2520sparsification.%2520S%2524%255E3%2524%2520enables%2520precise%2520specification%2520of%2520diverse%2520sparsity%2520structures%252C%2520from%2520fine-grained%2520N%253AM%2520patterns%2520to%2520coarse%2520channel%2520pruning%252C%2520and%2520integrates%2520seamlessly%2520with%2520Optimal%2520Brain%2520Damage%2520%2528OBD%2529%2520and%2520Surgeon%2520%2528OBS%2529.%2520We%2520formalize%2520the%2520framework%2520mathematically%252C%2520demonstrate%2520its%2520expressiveness%2520on%2520canonical%2520patterns%252C%2520and%2520validate%2520it%2520experimentally%2520via%2520structured%2520OBS%2520and%2520OBD%2520implementations%2520built%2520entirely%2520on%2520S%2524%255E3%2524%252C%2520which%2520surpasses%2520well-established%2520second%2520order%2520heuristics%2520on%2520output%2520reconstruction%2520across%2520common%2520configurations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11315v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=S%24%5E3%24%3A%20Structured%20Sparsity%20Specification&entry.906535625=Ayoub%20Ghriss&entry.1292438233=We%20introduce%20the%20Structured%20Sparsity%20Specification%20%28S%24%5E3%24%29%2C%20an%20algebraic%20framework%20for%20defining%2C%20composing%2C%20and%20implementing%20structured%20sparse%20patterns.%20S%24%5E3%24%20specifies%20sparsity%20through%20three%20components%3A%20a%20View%20that%20reshapes%20the%20tensor%20via%20layout%20composition%2C%20a%20Block%20specification%20that%20defines%20the%20atomic%20pruning%20unit%2C%20and%20the%20sparsity%20decision%20Scope.%20Both%20Block%20and%20Scope%20support%20Coupling%20across%20tensors%20for%20coordinated%20sparsification.%20S%24%5E3%24%20enables%20precise%20specification%20of%20diverse%20sparsity%20structures%2C%20from%20fine-grained%20N%3AM%20pa {"title": "ADD for Multi-Bit Image Watermarking", "author": "An Luo and Jie Ding", "abstract": "As generative models enable rapid creation of high-fidelity images, societal concerns about misinformation and authenticity have intensified. A promising remedy is multi-bit image watermarking, which embeds a multi-bit message into an image so that a verifier can later detect whether the image is generated by someone and further identify the source by decoding the embedded message. Existing approaches often fall short in capacity, resilience to common image distortions, and theoretical justification. To address these limitations, we propose ADD (Add, Dot, Decode), a multi-bit image watermarking method with two stages: learning a watermark to be linearly combined with the multi-bit message and added to the image, and decoding through inner products between the watermarked image and the learned watermark. On the standard MS-COCO benchmark, we demonstrate that for the challenging task of 48-bit watermarking, ADD achieves 100\\% decoding accuracy, with performance dropping by at most 2\\% under a wide range of image distortions, substantially smaller than the 14\\% average drop of state-of-the-art methods. In addition, ADD achieves substantial computational gains, with 2-fold faster embedding and 7.4-fold faster decoding than the fastest existing method. We further provide a theoretical analysis explaining why the learned watermark and the corresponding decoding rule are effective.", "link": "http://arxiv.org/abs/2604.11491v1", "date": "2026-04-13", "relevancy": 2.2193, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5622}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5501}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.or analysis%20explaining%20why%20the%20learned%20watermark%20and%20the%20corresponding%20decoding%20rule%20are%20effective.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11491v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DADD%2520for%2520Multi-Bit%2520Image%2520Watermarking%26entry.906535625%3DAn%2520Luo%2520and%2520Jie%2520Ding%26entry.1292438233%3DAs%2520generative%2520models%2520enable%2520rapid%2520creation%2520of%2520high-fidelity%2520images%252C%2520societal%2520concerns%2520about%2520misinformation%2520and%2520authenticity%2520have%2520intensified.%2520A%2520promising%2520remedy%2520is%2520multi-bit%2520image%2520watermarking%252C%2520which%2520embeds%2520a%2520multi-bit%2520message%2520into%2520an%2520image%2520so%2520that%2520a%2520verifier%2520can%2520later%2520detect%2520whether%2520the%2520image%2520is%2520generated%2520by%2520someone%2520and%2520further%2520identify%2520the%2520source%2520by%2520decoding%2520the%2520embedded%2520message.%2520Existing%2520approaches%2520often%2520fall%2520short%2520in%2520capacity%252C%2520resilience%2520to%2520common%2520image%2520distortions%252C%2520and%2520theoretical%2520justification.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520ADD%2520%2528Add%252C%2520Dot%252C%2520Decode%2529%252C%2520a%2520multi-bit%2520image%2520watermarking%2520method%2520with%2520two%2520stages%253A%2520learning%2520a%2520watermark%2520to%2520be%2520linearly%2520combined%2520with%2520the%2520multi-bit%2520message%2520and%2520added%2520to%2520the%2520image%252C%2520and%2520decoding%2520through%2520inner%2520products%2520between%2520the%2520watermarked%2520image%2520and%2520the%2520learned%2520watermark.%2520On%2520the%2520standard%2520MS-COCO%2520benchmark%252C%2520we%2520demonstrate%2520that%2520for%2520the%2520challenging%2520task%2520of%252048-bit%2520watermarking%252C%2520ADD%2520achieves%2520100%255C%2525%2520decoding%2520accurac d%20decoding%20through%20inner%20products%20between%20the%20watermarked%20image%20and%20the%20learned%20watermark.%20On%20the%20standard%20MS-COCO%20benchmark%2C%20we%20demonstrate%20that%20for%20the%20challenging%20task%20of%2048-bit%20watermarking%2C%20ADD%20achieves%20100%5C%25%20decoding%20accuracy%2C%20with%20performance%20dropping%20by%20at%20most%202%5C%25%20under%20a%20wide%20range%20of%20image%20distortions%2C%20substantially%20smaller%20than%20the%2014%5C%25%20average%20drop%20of%20state-of-the-art%20methods.%20In%20addition%2C%20ADD%20achieves%20substantial%20computational%20gains%2C%20with%202-fold%20faster%20embedding%20and%207.4-fold%20faster%20decoding%20than%20the%20fastest%20existing%20method.%20We%20further%20provide%20a%20theoretical%20analysis%20explaining%20why%20the%20learned%20watermark%20and%20the%20corresponding%20decoding%20rule%20are%20effective.&entry.1838667208=http%3A//arxiv.org/abs/2604.11491v1&entry.124074799=Read"},
{"title": "AI-enhanced tuning of quantum dot Hamiltonians toward Majorana modes", "author": "Mateusz Krawczyk and Jaros\u0142aw Paw\u0142owski", "abstract": "We propose a neural network-based model capable of learning the broad landscape of working regimes in quantum dot simulators, and using this knowledge to autotune these devices - based on transport measurements - toward obtaining Majorana modes in the structure. The model is trained in an unsupervised manner on synthetic data in the form of conductance maps, using a physics-informed loss that incorporates key properties of Majorana zero modes. We show that, with appropriate training, a deep vision-transformer network can efficiently memorize relation between Hamiltonian parameters and structures on conductance maps and use it to propose parameters update for a quantum dot chain that drive the system toward topological phase. Starting from a broad range of initial detunings in parameter space, a single update step is sufficient to generate nontrivial zero modes. Moreover, by enabling an iterative tuning procedure - where the system acquires updated conductance maps at each step - we demonstrate that the method can address a much larger region of the parameter space.", "link": "http://arxiv.org/abs/2601.02149v3", "date": "2026-04-13", "relevancy": 2.218, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4521}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4449}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI-enhanced%20tuning%20of%20quantum%20dot%20Hamiltonians%20toward%20Majorana%20modes&body=Title%3A%20AI-enhanced%20tuning%20of%20quantum%20dot%20Hamiltonians%20toward%20Majorana%20modes%0AAuthor%3A%20Mateusz%20Krawczyk%20and%20Jaros%C5%82aw%20Paw%C5%82owski%0AAbstract%3A%20We%20propose%20a%20neural%20network-based%20model%20capable%20of%20learning%20the%20broad%20landscape%20of%20working%20regimes%20in%20quantum%20dot%20simulators%2C%20and%20using%20this%20knowledge%20to%20autotune%20these%20devices%20-%20based%20on%20transport%20measurements%20-%20toward%20obtaining%20Majorana%20modes%20in%20the%20structure.%20The%20model%20is%20trained%20in%20an%20unsupervised%20manner%20on%20synthetic%20data%20in%20the%20form%20of%20conductance%20maps%2C%20using%20a%20physics-informed%20loss%20that%20incorporates%20key%20properties%20of%20Majorana%20zero%20modes.%20We%20show%20that%2C%20with%20appropriate%20training%2C%20a%20deep%20vision-transformer%20network%20can%20efficiently%20memorize%20relation%20between%20Hamiltonian%20parameters%20and%20structures%20on%20conductance%20maps%20and%20use%20it%20to%20propose%20parameters%20update%20for%20a%20quantum%20dot%20chain%20that%20drive%20the%20system%20toward%20topological%20phase.%20Starting%20from%20a%20broad%20range%20of%20initial%20detunings%20in%20parameter%20space%2C%20a%20single%20update%20step%20is%20sufficient%20to%20generate%20nontrivial%20zero%20modes.%20Moreover%2C%20by%20enabling%20an%20iterative%20tuning%20procedure%20-%20where%20the%20system%20acquires%20updated%20conductance%20maps%20at%20each%20step%20-%20we%20demonstrate%20that%20the%20method%20can%20address%20a%20much%20larger%20region%20of%20the%20parameter%20space.%0ALink%3A%20http%3A//arxiv.org/abs/2601.02149v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAI-enhanced%2520tuning%2520of%2520quantum%2520dot%2520Hamiltonians%2520toward%2520Majorana%2520modes%26entry.906535625%3DMateusz%2520Krawczyk%2520and%2520Jaros%25C5%2582aw%2520Paw%25C5%2582owski%26entry.1292438233%3DWe%2520propose%2520a%2520neural%2520network-based%2520model%2520capable%2520of%2520learning%2520the%2520broad%2520landscape%2520of%2520working%2520regimes%2520in%2520quantum%2520dot%2520simulators%252C%2520and%2520using%2520this%2520knowledge%2520to%2520autotune%2520these%2520devices%2520-%2520based%2520on%2520transport%2520measurements%2520-%2520toward%2520obtaining%2520Majorana%2520modes%2520in%2520the%2520structure.%2520The%2520model%2520is%2520trained%2520in%2520an%2520unsupervised%2520manner%2520on%2520synthetic%2520data%2520in%2520the%2520form%2520of%2520conductance%2520maps%252C%2520using%2520a%2520physics-informed%2520loss%2520that%2520incorporates%2520key%2520properties%2520of%2520Majorana%2520zero%2520modes.%2520We%2520show%2520that%252C%2520with%2520appropriate%2520training%252C%2520a%2520deep%2520vision-transformer%2520network%2520can%2520efficiently%2520memorize%2520relation%2520between%2520Hamiltonian%2520parameters%2520and%2520structures%2520on%2520conductance%2520maps%2520and%2520use%2520it%2520to%2520propose%2520parameters%2520update%2520for%2520a%2520quantum%2520dot%2520chain%2520that%2520drive%2520the%2520system%2520toward%2520topological%2520phase.%2520Starting%2520from%2520a%2520broad%2520range%2520of%2520initial%2520detunings%2520in%2520parameter%2520space%252C%2520a%2520single%2520update%2520step%2520is%2520sufficient%2520to%2520generate%2520nontrivial%2520zero%2520modes.%2520Moreover%252C%2520by%2520enabling%2520an%2520iterative%2520tuning%2520procedure%2520-%2520where%2520the%2520system%2520acquires%2520updated%2520conductance%2520maps%2520at%2520each%2520step%2520-%2520we%2520demonstrate%2520that%2520the%2520method%2520can%2520address%2520a%2520much%2520larger%2520region%2520of%2520the%2520parameter%2520space.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.02149v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AI-enhanced%20tuning%20of%20quantum%20dot%20Hamiltonians%20towar {"title": "MorphoFlow: Sparse-Supervised Generative Shape Modeling with Adaptive Latent Relevance", "author": "Mokshagna Sai Teja Karanam and Tushar Kataria and Shireen Elhabian", "abstract": "Statistical shape modeling (SSM) is central to population level analysis of anatomical variability, yet most existing approaches rely on densely annotated segmentations and fixed latent representations. These requirements limit scalability and reduce flexibility when modeling complex anatomical variation. We introduce MorphoFlow, a sparse supervised generative shape modeling framework that learns compact probabilistic shape representations directly from sparse surface annotations. MorphoFlow integrates neural implicit shape representations with an autodecoder formulation and autoregressive normalizing flows to learn an expressive probabilistic density over the latent shape space. The neural implicit representation enables resolution-agnostic modeling of 3D anatomy, while the autodecoder formulation supports direct optimization of per-instance latent codes under sparse supervision. The autoregressive flow captures the distribution of latent anatomical variability providing a tractable, likelihood-based generative model of shapes. To promote compact and structured latent representations, we incorporate adaptive latent relevance weighting through sparsity-inducing priors, enabling the model to regulate the contribution of individual latent dimensions according to their relevance to the underlying anatomical variation while preserving generative expressivity. The resulting latent space supports uncertainty quantification and anatomically plausible shape synthesis without manual latent dimensionality tuning. Evaluation on publicly available lumbar vertebrae and femur datasets demonstrates accurate high-resolution reconstruction from sparse inputs and recovery of structured modes of anatomical variation consistent with population level trends.", "link": "http://arxiv.org/abs/2604.11636v1", "date": "2026-04-13", "relevancy": 2.2178, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5851}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5569}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MorphoFlow%3A%20Sparse-Supervised%20Generative%20Shape%20Modeling%20with%20Adaptive%20Latent%20Relevance&body=Title%3A%20MorphoFlow%3A%20Sparse-Supervised%20Generative%20Shape%20Modeling%20with%20Adaptive%20Latent%20Relevance%0AAuthor%3A%20Mokshagna%20Sai%20Teja%20Karanam%20and%20Tushar%20Kataria%20and%20Shireen%20Elhabian%0AAbstract%3A%20Statistical%20shape%20modeling%20%28SSM%29%20is%20central%20to%20population%20level%20analysis%20of%20anatomical%20variability%2C%20yet%20most%20existing%20approaches%20rely%20on%20densely%20annotated%20segmentations%20and%20fixed%20latent%20representations.%20These%20requirements%20limit%20scalability%20and%20reduce%20flexibility%20when%20modeling%20complex%20anatomical%20variation.%20We%20introduce%20MorphoFlow%2C%20a%20sparse%20supervised%20generative%20shape%20modeling%20framework%20that%20learns%20compact%20probabilistic%20shape%20representations%20directly%20from%20sparse%20surface%20annotations.%20MorphoFlow%20integrates%20neural%20implicit%20shape%20representations%20with%20an%20autodecoder%20formulation%20and%20autoregressive%20normalizing%20flows%20to%20learn%20an%20expressive%20probabilistic%20density%20over%20the%20latent%20shape%20space.%20The%20neural%20implicit%20representation%20enables%20resolution-agnostic%20modeling%20of%203D%20anatomy%2C%20while%20the%20autodecoder%20formulation%20supports%20direct%20optimization%20of%20per-instance%20latent%20codes%20under%20sparse%20supervision.%20The%20autoregressive%20flow%20captures%20the%20distribution%20of%20latent%20anatomical%20variability%20providing%20a%20tractable%2C%20likelihood-based%20generative%20model%20of%20shapes.%20To%20promote%20compact%20and%20structured%20latent%20representations%2C%20we%20incorporate%20adaptive%20latent%20relevance%20weighting%20through%20sparsity-inducing%20priors%2C%20enabling%20the%20model%20to%20regulate%20the%20contribution%20of%20individual%20latent%20dimensions%20according%20to%20their%20relevance%20to%20the%20underlying%20anatomical%20variation%20while%20preserving%20generative%20expressivity.%20The%20resulting%20latent%20space%20supports%20uncertainty%20quantification%20and%20anatomically%20plausible%20shape%20synthesis%20without%20manual%20latent%20dimensionality%20tuning.%20Evaluation%20on%20publicly%20available%20lumbar%20vertebrae%20and%20femur%20datasets%20demonstrates%20accurate%20high-resolution%20reconstruction%20from%20sparse%20inputs%20and%20recovery%20of%20structured%20modes%20of%20anatomical%20variation%20consistent%20with%20population%20level%20trends.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11636v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMorphoFlow%253A%2520Sparse-Supervised%2520Generative%2520Shape%2520Modeling%2520with%2520Adaptive%2520Latent%2520Relevance%26entry.906535625%3DMokshagna%2520Sai%2520Teja%2520Karanam%2520and%2520Tushar%2520Kataria%2520and%2520Shireen%2520Elhabian%26entry.1292438233%3DStatistical%2520shape%2520modeling%2520%2528SSM%2529%2520is%2520central%2520to%2520population%2520level%2520analysis%2520of%2520anatomical%2520variability%252C%2520yet%2520most%2520existing%2520approaches%2520rely%2520on%2520densely%2520annotated%2520segmentations%2520and%2520fixed%2520latent%2520representations.%2520These%2520requirements%2520limit%2520scalability%2520and%2520reduce%2520flexibility%2520when%2520modeling%2520 igh-resolution%2520reconstruction%2520from%2520sparse%2520inputs%2520and%2520recovery%2520of%2520structured%2520modes%2520of%2520anatomical%2520variation%2520consistent%2520with%2520population%2520level%2520trends.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11636v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MorphoFlow%3A%20Sparse-Supervised%20Generative%20Shape%20Modeling%20with%20Adaptive%20Latent%20Relevance&entry.906535625=Mokshagna%20Sai%20Teja%20Karanam%20and%20Tushar%20Kataria%20and%20Shireen%20Elhabian&entry.1292438233=Statistical%20shape%20modeling%20%28SSM%29%20is%20central%20to%20population%20level%20analysis%20of%20anatomical%20variability%2C%20yet%20most%20existing%20approaches%20rely%20on%20densely%20annotated%20segmentations%20and%20fixed%20latent%20representations.%20These%20requirements%20limit%20scalability%20and%20reduce%20flexibility%20when%20modeling%20complex%20anatomical%20variation.%20We%20introduce%20MorphoFlow%2C%20a%20sparse%20supervised%20generative%20shape%20modeling%20framework%20that%20learns%20compact%20probabilistic%20shape%20representations%20directly%20from%20sparse%20surface%20annotations.%20MorphoFlow%20integrates%20neural%20implicit%20shape%20representations%20with%20an%20autodecoder%20formulation%20and%20autoregressive%20normalizing%20flows%20to%20learn%20an%20expressive%20probabilistic%20density%20over%20the%20latent%20shape%20space.%20The%20neural%20implicit%20representation%20enables%20resolution-agnostic%20modeling%20of%203D%20anatomy%2C%20while%20the%20autodecoder%20formulation%20supports%20direct%20optimization%20of%20per-instance%20latent%20codes%20under%20sparse%20supervision.%20The%20autoregressive%20flow%20captures%20the%20distribution%20of%20latent%20anatomical%20variability%20providing%20a%20tractable%2C%20likelihood-based%20generative%20model%20of%20shapes.%20To%20promote%20compact%20and%20structured {"title": "What Do Vision-Language Models Encode for Personalized Image Aesthetics Assessment?", "author": "Koki Ryu and Hitomi Yanaka", "abstract": "Personalized image aesthetics assessment (PIAA) is an important research problem with practical real-world applications. While methods based on vision-language models (VLMs) are promising candidates for PIAA, it remains unclear whether they internally encode rich, multi-level aesthetic attributes required for effective personalization. In this paper, we first analyze the internal representations of VLMs to examine the presence and distribution of such aesthetic attributes, and then leverage them for lightweight, individual-level personalization without model fine-tuning. Our analysis reveals that VLMs encode diverse aesthetic attributes that propagate into the language decoder layers. Building on these representations, we demonstrate that simple linear models can perform PIAA effectively. We further analyze how aesthetic information is transferred across layers in different VLM architectures and across image domains. Our findings provide insights into how VLMs can be utilized for modeling subjective, individual aesthetic preferences. Our code is available at https://github.com/ynklab/vlm-latent-piaa.", "link": "http://arxiv.org/abs/2604.11374v1", "date": "2026-04-13", "relevancy": 2.2151, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5665}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5512}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5512}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Do%20Vision-Language%20Models%20Encode%20for%20Personalized%20Image%20Aesthetics%20Assessment%3F&body=Title%3A%20What%20Do%20Vision-Language%20Models%20Encode%20for%20Personalized%20Image%20Aesthetics%20Assessment%3F%0AAuthor%3A%20Koki%20Ryu%20and%20Hitomi%20Yanaka%0AAbstract%3A%20Personalized%20image%20aesthetics%20assessment%20%28PIAA%29%20is%20an%20important%20research%20problem%20with%20practical%20real-world%20applications.%20While%20methods%20based%20on%20vision-language%20models%20%28VLMs%29%20are%20promising%20candidates%20for%20PIAA%2C%20it%20remains%20unclear%20whether%20they%20internally%20encode%20rich%2C%20multi-level%20aesthetic%20attributes%20required%20for%20effective%20personalization.%20In%20this%20paper%2C%20we%20first%20analyze%20the%20internal%20representations%20of%20VLMs%20to%20examine%20the%20presence%20and%20distribution%20of%20such%20aesthetic%20attributes%2C%20and%20then%20leverage%20them%20for%20lightweight%2C%20individual-level%20personalization%20without%20model%20fine-tuning.%20Our%20analysis%20reveals%20that%20VLMs%20encode%20diverse%20aesthetic%20attributes%20that%20propagate%20into%20the%20language%20decoder%20layers.%20Building%20on%20these%20representations%2C%20we%20demonstrate%20that%20simple%20linear%20models%20can%20perform%20PIAA%20effectively.%20We%20further%20analyze%20how%20aesthetic%20information%20is%20transferred%20across%20layers%20in%20different%20VLM%20architectures%20and%20across%20image%20domains.%20Our%20findings%20provide%20insights%20into%20how%20VLMs%20can%20be%20utilized%20for%20modeling%20subjective%2C%20individual%20aesthetic%20preferences.%20Our%20code%20is%20available%20at%20https%3A//github.com/ynklab/vlm-latent-piaa.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11374v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Do%2520Vision-Language%2520Models%2520Encode%2520for%2520Personalized%2520Image%2520Aesthetics%2520Assessment%253F%26entry.906535625%3DKoki%2520Ryu%2520and%2520Hitomi%2520Yanaka dels%20Encode%20for%20Personalized%20Image%20Aesthetics%20Assessment%3F&entry.906535625=Koki%20Ryu%20and%20Hitomi%20Yanaka&entry.1292438233=Personalized%20image%20aesthetics%20assessment%20%28PIAA%29%20is%20an%20important%20research%20problem%20with%20practical%20real-world%20applications.%20While%20methods%20based%20on%20vision-language%20models%20%28VLMs%29%20are%20promising%20candidates%20for%20PIAA%2C%20it%20remains%20unclear%20whether%20they%20internally%20encode%20rich%2C%20multi-level%20aesthetic%20attributes%20required%20for%20effective%20personalization.%20In%20this%20paper%2C%20we%20first%20analyze%20the%20internal%20representations%20of%20VLMs%20to%20examine%20the%20presence%20and%20distribution%20of%20such%20aesthetic%20attributes%2C%20and%20then%20leverage%20them%20for%20lightweight%2C%20individual-level%20personalization%20without%20model%20fine-tuning.%20Our%20analysis%20reveals%20that%20VLMs%20encode%20diverse%20aesthetic%20attributes%20that%20propagate%20into%20the%20language%20decoder%20layers.%20Building%20on%20these%20representations%2C%20we%20demonstrate%20that%20simple%20linear%20models%20can%20perform%20PIAA%20effectively.%20We%20further%20analyze%20how%20aesthetic%20information%20is%20transferred%20across%20layers%20in%20different%20VLM%20architectures%20and%20across%20image%20domains.%20Our%20findings%20provide%20insights%20into%20how%20VLMs%20can%20be%20utilized%20for%20modeling%20subjective%2C%20individual%20aesthetic%20preferences.%20Our%20code%20is%20available%20at%20https%3A//github.com/ynklab/vlm-latent-piaa.&entry.1838667208=http%3A//arxiv.org/abs/2604.11374v1&entry.124074799=Read"},
{"title": "BEM: Training-Free Background Embedding Memory for False-Positive Suppression in Real-Time Fixed-Background Camera", "author": "Junwoo Park and Jangho Lee and Sunho Lim", "abstract": "Pretrained detectors perform well on benchmarks but often suffer performance degradation in real-world deployments due to distribution gaps between training data and target environments. COCO-like benchmarks emphasize category diversity rather than instance density, causing detectors trained under per-class sparsity to struggle in dense, single- or few-class scenes such as surveillance and traffic monitoring. In fixed-camera environments, the quasi-static background provides a stable, label-free prior that can be exploited at inference to suppress spurious detections. To address the issue, we propose Background Embedding Memory (BEM), a lightweight, training-free, weight-frozen module that can be attached to pretrained detectors during inference. BEM estimates clean background embeddings, maintains a prototype memory, and re-scores detection logits with an inverse-similarity, rank-weighted penalty, effectively reducing false positives while maintaining recall. Empirically, background-frame cosine similarity correlates negatively with object count and positively with Precision-Confidence AUC (P-AUC), motivating its use as a training-free control signal. Across YOLO and RT-DETR families on LLVIP and simulated surveillance streams, BEM consistently reduces false positives while preserving real-time performance. Our code is available at https://github.com/Leo-Park1214/Background-Embedding-Memory.git", "link": "http://arxiv.org/abs/2604.11714v1", "date": "2026-04-13", "relevancy": 2.2128, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5618}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5614}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5111}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BEM%3A%20Training-Free%20Background%20Embedding%20Memory%20for%20False-Positive%20Suppression%20in%20Real-Time%20Fixed-Background%20Camera&body=Title%3A%20BEM%3A%20Training-Free%20Background%20Embedding%20Memory%20for%20False-Positive%20Suppression%20in%20Real-Time%20Fixed-Background%20Camera%0AAuthor%3A%20Junwoo%20Park%20and%20Jangho%20Lee%20and%20Sunho%20Lim%0AAbstract%3A%20Pretrained%20detectors%20perform%20well%20on%20benchmarks%20but%20often%20suffer%20performance%20degradation%20in%20real-world%20deployments%20due%20to%20distribution%20gaps%20between%20training%20data%20and%20target%20environments.%20COCO-like%20benchmarks%20emphasize%20category%20diversity%20rather%20than%20instance%20density%2C%20causing%20detectors%20trained%20under%20per-class%20sparsity%20to%20struggle%20in%20dense%2C%20single-%20or%20few-class%20scenes%20such%20as%20surveillance%20and%20traffic%20monitoring.%20In%20fixed-camera%20environments%2C%20the%20quasi-static%20background%20provides%20a%20stable%2C%20label-free%20prior%20that%20can%20be%20exploited%20at%20inference%20to%20suppress%20spurious%20detections.%20To%20address%20the%20issue%2C%20we%20propose%20Background%20Embedding%20Memory%20%28BEM%29%2C%20a%20lightweight%2C%20training-free%2C%20weight-frozen%20module%20that%20can%20be%20attached%20to%20pretrained%20detectors%20during%20inference.%20BEM%20estimates%20clean%20background%20embeddings%2C%20maintains%20a%20prototype%20memory%2C%20and%20re-scores%20detection%20logits%20with%20an%20inverse-similarity%2C%20rank-weighted%20penalty%2C%20effectively%20reducing%20false%20positives%20while%20maintaining%20recall.%20Empirically%2C%20background-frame%20cosine%20similarity%20c {"title": "Automatic Uncertainty-Aware Synthetic Data Bootstrapping for Historical Map Segmentation", "author": "Lukas Arzoumanidis and Julius Knechtel and Jan-Henrik Haunert and Youness Dehbi", "abstract": "The automated analysis of historical documents, particularly maps, has drastically benefited from advances in deep learning and its success across various computer vision applications. However, most deep learning-based methods heavily rely on large amounts of annotated training data, which are typically unavailable for historical maps, especially for those belonging to specific, homogeneous cartographic domains, also known as corpora. Creating high-quality training data suitable for machine learning often takes a significant amount of time and involves extensive manual effort. While synthetic training data can alleviate the scarcity of real-world samples, it often lacks the affinity (realism) and diversity (variation) necessary for effective learning. By transferring the cartographic style of a historical map corpus onto modern vector data, we bootstrap an effectively unlimited number of synthetic historical maps suitable for tasks such as land-cover interpretation of a homogeneous historical map corpus. We propose an automatic deep generative approach and an alternative manual stochastic degradation technique to emulate the visual uncertainty and noise, also known as aleatoric uncertainty, commonly observed in historical map scans. To quantitatively evaluate the effectiveness and applicability of our approach, the bootstrapped training datasets were employed for domain-adaptive semantic segmentation on a homogeneous map corpus using a Self-Constructing Graph Convolutional Network, enabling a comprehensive assessment of the impact of our data bootstrapping methods.", "link": "http://arxiv.org/abs/2511.15875v2", "date": "2026-04-13", "relevancy": 2.2121, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", " tic%20historical%20maps%20suitable%20for%20tasks%20such%20as%20land-cover%20interpretation%20of%20a%20homogeneous%20historical%20map%20corpus.%20We%20propose%20an%20automatic%20deep%20generative%20approach%20and%20an%20alternative%20manual%20stochastic%20degradation%20technique%20to%20emulate%20the%20visual%20uncertainty%20and%20noise%2C%20also%20known%20as%20aleatoric%20uncertainty%2C%20commonly%20observed%20in%20historical%20map%20scans.%20To%20quantitatively%20evaluate%20the%20effectiveness%20and%20applicability%20of%20our%20approach%2C%20the%20bootstrapped%20training%20datasets%20were%20employed%20for%20domain-adaptive%20semantic%20segmentation%20on%20a%20homogeneous%20map%20corpus%20using%20a%20Self-Constructing%20Graph%20Convolutional%20Network%2C%20enabling%20a%20comprehensive%20assessment%20of%20the%20impact%20of%20our%20data%20bootstrapping%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15875v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomatic%2520Uncertainty-Aware%2520Synthetic%2520Data%2520Bootstrapping%2520for%2520Historical%2520Map%2520Segmentation%26entry.906535625%3DLukas%2520Arzoumanidis%2520and%2520Julius%2520Knechtel%2520and%2520Jan-Henrik%2520Haunert%2520and%2520Youness%2520Dehbi%26entry.1292438233%3DThe%2520automated%2520analysis%2520of%2520historical%2520documents%252C%2520particularly%2520maps%252C%2520has%2520drastically%2520benefited%2520from%2520advances%2520in%2520deep%2520learning%2520and%2520its%2520success%2520across%2520various%2520computer%2520vision%2520applications.%2520However%252C%2520most%2520deep%2520learning-based%2520methods%2520heavily%2520rely%2520on%2520large%2520amounts%2520of%2520annotated%2520training%2520data%252C%2520which%2520are%2520typically%2520unavailable%2520for%2520historical%2520maps%252C%2520especially%2520for%2520those%2520belonging%2520to%2520specific%252C%2520homogeneous%2520cartographic%2520domains%252C%2520al {"title": "Seeing Through Touch: Tactile-Driven Visual Localization of Material Regions", "author": "Seongyu Kim and Seungwoo Lee and Hyeonggon Ryu and Joon Son Chung and Arda Senocak", "abstract": "We address the problem of tactile localization, where the goal is to identify image regions that share the same material properties as a tactile input. Existing visuo-tactile methods rely on global alignment and thus fail to capture the fine-grained local correspondences required for this task. The challenge is amplified by existing datasets, which predominantly contain close-up, low-diversity images. We propose a model that learns local visuo-tactile alignment via dense cross-modal feature interactions, producing tactile saliency maps for touch-conditioned material segmentation. To overcome dataset constraints, we introduce: (i) in-the-wild multi-material scene images that expand visual diversity, and (ii) a material-diversity pairing strategy that aligns each tactile sample with visually varied yet tactilely consistent images, improving contextual localization and robustness to weak signals. We also construct two new tactile-grounded material segmentation datasets for quantitative evaluation. Experiments on both new and existing benchmarks show that our approach substantially outperforms prior visuo-tactile methods in tactile localization.", "link": "http://arxiv.org/abs/2604.11579v1", "date": "2026-04-13", "relevancy": 2.2078, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5709}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5429}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5367}], {"title": "LookBench: A Live and Holistic Open Benchmark for Fashion Image Retrieval", "author": "Gensmo. ai and Chao Gao and Siqiao Xue and Jiwen Fu and Tingyi Gu and Shanshan Li and Fan Zhou", "abstract": "In this paper, we present LookBench (We use the term \"look\" to reflect retrieval that mirrors how people shop -- finding the exact item, a close substitute, or a visually consistent alternative.), a live, holistic and challenging benchmark for fashion image retrieval in real e-commerce settings. LookBench includes both recent product images sourced from live websites and AI-generated fashion images, reflecting contemporary trends and use cases. Each test sample is time-stamped and we intend to update the benchmark periodically, enabling contamination-aware evaluation aligned with declared training cutoffs. Grounded in our fine-grained attribute taxonomy, LookBench covers single-item and outfit-level retrieval across. Our experiments reveal that LookBench poses a significant challenge on strong baselines, with many models achieving below $60\\%$ Recall@1. Our proprietary model achieves the best performance on LookBench, and we release an open-source counterpart that ranks second, with both models attaining state-of-the-art results on legacy Fashion200K evaluations. LookBench is designed to be updated semi-annually with new test samples and progressively harder task variants, providing a durable measure of progress. We publicly release our leaderboard, dataset, evaluation code, and trained models.", "link": "http://arxiv.org/abs/2601.14706v3", "date": "2026-04-13", "relevancy": 2.1226, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5738}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5302}, {"title": "Fabri ecting%20contemporary%20trends%20and%20use%20cases.%20Each%20test%20sample%20is%20time-stamped%20and%20we%20intend%20to%20update%20the%20benchmark%20periodically%2C%20enabling%20contamination-aware%20evaluation%20aligned%20with%20declared%20training%20cutoffs.%20Grounded%20in%20our%20fine-grained%20attribute%20taxonomy%2C%20LookBench%20covers%20single-item%20and%20outfit-level%20retrieval%20across.%20Our%20experiments%20reveal%20that%20LookBench%20poses%20a%20significant%20challenge%20on%20strong%20baselines%2C%20with%20many%20models%20achieving%20below%20%2460%5C%25%24%20Recall%401.%20Our%20proprietary%20model%20achieves%20the%20best%20performance%20on%20LookBench%2C%20and%20we%20release%20an%20open-source%20counterpart%20that%20ranks%20second%2C%20with%20both%20models%20attaining%20state-of-the-art%20results%20on%20legacy%20Fashion200K%20evaluations.%20LookBench%20is%20designed%20to%20be%20updated%20semi-annually%20with%20new%20test%20samples%20and%20progressively%20harder%20task%20variants%2C%20providing%20a%20durable%20measure%20of%20progress.%20We%20publicly%20release%20our%20leaderboard%2C%20dataset%2C%20evaluation%20code%2C%20and%20trained%20models.&entry.1838667208=http%3A//arxiv.org/abs/2601.14706v3&entry.124074799=Read"},
{"title": "Multi-ORFT: Stable Online Reinforcement Fine-Tuning for Multi-Agent Diffusion Planning in Cooperative Driving", "author": "Haojie Bai and Aimin Li and Ruoyu Yao and Xiongwei Zhao and Tingting Zhang and Xing Zhang and Lin Gao and and Jun Ma", "abstract": "Closed-loop cooperative driving requires planners that generate realistic multimodal multi-agent trajectories while improving safety and traffic efficiency. Existing diffusion planners can model multimodal behaviors from demonstrations, but they often exhibit weak scene consistency and remain poorly aligned with closed-loop objectives; meanwhile, stable online post-training in reactive multi-agent environments remains difficult. We present Multi-ORFT, which couples scene-conditioned diffusion pre-training with stable online reinforcement post-training. In pre-training, the planner uses inter-agent self-attention, cross-attention, and AdaLN-Zero-based scene conditioning to improve scene consistency and road adherence of joint trajectories. In post-training, we formulate a two-level MDP that exposes step-wise reverse-kernel likelihoods for online optimization, and combine dense trajectory-level rewards with variance-gated group-relative policy optimization (VG-GRPO) to stabilize training. On the WOMD closed-loop benchmark, Multi-ORFT reduces collision rate from 2.04% to 1.89% and off-road rate from 1.68% to 1.36%, while increasing average speed from 8.36 to 8.61 m/s relative to the pre-trained planner, and it outperforms strong open-source baselines including SMART-large, SMART-tiny-CLSFT, and VBD on the primary safety and efficiency metrics. These results show that coupling scene-consistent denoising with stable online diffusion-policy optimization improves the reliability of closed-loop cooperative driving.", "link": "http://arxiv.org/abs/2604.11734v1", "date": "2026-04-13", "relevancy": 1.6484, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5643}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.552}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.51}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-ORFT%3A%20Stable%20Online%20Reinforcement%20Fine-Tuning%20for%20Multi-Agent%20Diffusion%20Planning%20in%20Cooperative%20Driving&body=Title%3A%20Multi-ORFT%3A%20Stable%20Online%20Reinforcement%20Fine-Tuning%20for%20Multi-Agent%20Diffusion%20Planning%20in%20Cooperative%20Driving%0AAuthor%3A%20Haojie%20Bai%20and%20Aimin%20Li%20and%20Ruoyu%20Yao%20and%20Xiongwei%20Zhao%20and%20Tingting%20Zhang%20and%20Xing%20Zhang%20and%20Lin%20Gao%20and%20and%20Jun%20Ma%0AAbstract%3A%20Closed-loop%20cooperative%20driving%20requires%20planners%20that%20generate%20realistic%20multimodal%20multi-agent%20trajectories%20while%20improving%20safety%20and%20traffic%20efficiency.%20Existing%20diffusion%20planners%20can%20model%20multimodal%20behaviors%20from%20demonstrations%2C%20but%20they%20often%20exhibit%20weak%20scene%20consistency%20and%20remain%20poorly%20aligned%20with%20closed-loop%20objectives%3B%20meanwhile%2C%20stable%20online%20post-training%20in%20reactive%20multi-agent%20environments%20remains%20difficult.%20We%20present%20Multi-ORFT%2C%20which%20couples%20scene-conditioned%20diffusion%20pre-training%20with%20stable%20online%20reinforcement%20post-training.%20In%20pre-training%2C%20the%20planner%20uses%20inter-agent%20self-attention%2C%20cross-attention%2C%20and%20AdaLN-Zero-based%20scene%20conditioning%20to%20improve%20scene%20consistency%20and%20road%20adherence%20of%20joint%20trajectories.%20In%20post-training%2C%20we%20formulate%20a%20two-level%20MDP%20that%20exposes%20step-wise%20reverse-kernel%20likelihoods%20for%20online%20optimization%2C%20and%20combine%20dense%20trajectory-level%20rewards%20with%20variance-gated%20group-relative%20policy%20optimization%20%28VG-GRPO%29%20to%20stabilize%20training.%20On%20the%20WOMD%20closed-loop%20benchmark%2C%20Multi-ORFT%20reduces%20collision%20rate%20from%202.04%25%20to%201.89%25%20and%20off-road%20rate%20from%201.68%25%20to%201.36%25%2C%20while%20increasing%20average%20speed%20from%208.36%20to%208.61%20m/s%20relative%20to%20the%20pre-trained%20planner%2C%20and%20it%20outperforms%20strong%20open-source%20baselines%20including%20SMART-large%2C%20SMART-tiny-CLSFT%2C%20and%20VBD%20on%20the%20primary%20safety%20and%20efficiency%20metrics.%20These%20results%20show%20that%20coupling%20scene-consistent%20denoising%20with%20stable%20online%20diffusion-policy%20optimization%20improves%20the%20reliability%20of%20closed-loop%20cooperative%20driving.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11734v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-ORFT%253A%2520Stable%2520Online%2520Reinforcement%2520Fine-Tuning%2520for%2520Multi-Agent%2520Diffusion%2520Planning%2520in%2520Cooperative%2520Driving%26entry.906535625%3DHaojie%2520Bai%2520and%2520Aimin%2520Li%2520and%2520Ruoyu%2520Yao%2520and%2520Xiongwei%2520Zhao%2520and%2520Tingting%2520Zhang%2520and%2520Xing%2520Zhang%2520and%2520Lin%2520Gao%2520and%2520and%2520Jun%2520Ma%26entry.1292438233%3DClosed-loop%2520cooperative%2520driving%2520requires%2520planners%2520that%2520generate%2520realistic%2520multimodal%2520multi-agent%2520trajectories%2520while%2520improving%2520safety%2520and%2520traffic%2520efficiency.%2520Existing%2520diffusion%2520planners%2520can%2520model%2520multimodal%2520behaviors%2520from%2520demonstrations%252C%2520but%2520they%2520often%2520exhibit%2520weak%2520scene%2520consistency%2520and%2520remain%2520poorly%2520aligned%2520with%2520closed-loop%2520objectives%253B%2520meanwhile%2 ART-large%2C%20SMART-tiny-CLSFT%2C%20and%20VBD%20on%20the%20primary%20safety%20and%20efficiency%20metrics.%20These%20results%20show%20that%20coupling%20scene-consistent%20denoising%20with%20stable%20online%20diffusion-policy%20optimization%20improves%20the%20reliability%20of%20closed-loop%20cooperative%20driving.&entry.1838667208=http%3A//arxiv.org/abs/2604.11734v1&entry.124074799=Read"},
{"title": "ComSim: Building Scalable Real-World Robot Data Generation via Compositional Simulation", "author": "Yiran Qin and Jiahua Ma and Li Kang and Wenzhan Li and Yihang Jiao and Xin Wen and Xiufeng Song and Heng Zhou and Jiwen Yu and Zhenfei Yin and Xihui Liu and Philip Torr and Yilun Du and Ruimao Zhang", "abstract": "Recent advancements in foundational models, such as large language models and world models, have greatly enhanced the capabilities of robotics, enabling robots to autonomously perform complex tasks. However, acquiring large-scale, high-quality training data for robotics remains a challenge, as it often requires substantial manual effort and is limited in its coverage of diverse real-world environments. To address this, we propose a novel hybrid approach called Compositional Simulation, which combines classical simulation and neural simulation to generate accurate action-video pairs while maintaining real-world consistency. Our approach utilizes a closed-loop real-sim-real data augmentation pipeline, leveraging a small amount of real-world data to generate diverse, large-scale training datasets that cover a broader spectrum of real-world scenarios. We train a neural simulator to transform classical simulation videos into real-world representations, improving the accuracy of policy models trained in real-world environments. Through extensive experiments, we demonstrate that our method significantly reduces the sim2real domain gap, resulting in higher success rates in real-world policy model training. Our approach offers a scalable solution for generating robust training data and bridging the gap between simulated and real-world robotics.", "link": "http://arxiv.org/abs/2604.11386v1", "date": "2026-04-13", "relevancy": 1.1564, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5795}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5784}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5767}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ComSim%3A%20Building%20Scalable%20Real-World%20Robot%20Data%20Generation%20via%20Compositional%20Simulation&body=Title%3A%20ComSim%3A%20Building%20Scalable%20Real-World%20Robot%20Data%20Generation%20via%20Compositional%20Simulation%0AAuthor%3A%20Yiran%20Qin%20and%20Jiahua%20Ma%20and%20Li%20Kang%20and%20Wenzhan%20Li%20and%20Yihang%20Jiao%20and%20Xin%20Wen%20and%20Xiufeng%20Song%20and%20Heng%20Zhou%20and%20Jiwen%20Yu%20and%20Zhenfei%20Yin%20and%20Xihui%20Liu%20and%20Philip%20Torr%20and%20Yilun%20Du%20and%20Ruimao%20Zhang%0AAbstract%3A%20Recent%20advancements%20in%20foundational%20models%2C%20such%20as%20large%20language%20models%20and%20world%20models%2C%20have%20greatly%20enhanced%20the%20capabilities%20of%20robotics%2C%20enabling%20robots%20to%20autonomously%20perform%20complex%20tasks.%20However%2C%20acquiring%20large-scale%2C%20high-quality%20training%20data%20for%20robotics%20remains%20a%20challenge%2C%20as%20it%20often%20requires%20substantial%20manual%20effort%20and%20is%20limited%20in%20its%20coverage%20of%20diverse%20real-world%20environments.%20To%20address%20this%2C%20we%20propose%20a%20novel%20hybrid%20approach%20called%20Compositional%20Simulation%2C%20which%20combines%20classical%20simulation%20and%20neural%20simulation%20to%20generate%20accurate%20action-video%20pairs%20while%20maintaining%20real-world%20consistency.%20Our%20approach%20utilizes%20a%20closed-loop%20real-sim-real%20data%20augmentation%20pipeline%2C%20leveraging%20a%20small%20amount%20of%20real-world%20data%20to%20generate%20diverse%2C%20large-scale%20training%20datasets%20that%20cover%20a%20broader%20spectrum%20of%20real-world%20scenarios.%20We%20train%20a%20neural%20simulator%20to%20transform%20classical%20simulation%20videos%20into%20real-world%20representations%2C%20improving%20the%20accuracy%20of%20policy%20models%20trained%20in%20real-world%20environments.%20Through%20extensive%20experiments%2C%20we%20demonstrate%20that%20our%20method%20significantly%20reduces%20the%20sim2real%20domain%20gap%2C%20resulting%20in%20higher%20success%20rates%20in%20real-world%20policy%20model%20training.%20Our%20approach%20offers%20a%20scalable%20solution%20for%20generating%20robust%20training%20data%20and%20bridging%20the%20gap%20between%20simulated%20and%20real-world%20robotics.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11386v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DComSim%253A%2520Building%2520Scalable%2520Real-World%2520Robot%2520Data%2520Generation%2520via%2520Compositional%2520Simulation%26entry.906535625%3DYiran%2520Qin%2520and%2520Jiahua%2520Ma%2520and%2520Li%2520Kang%2520and%2520Wenzhan%2520Li%2520and%2520Yihang%2520Jiao%2520and%2520Xin%2520Wen%2520and%2520Xiufeng%2520Song%2520and%2520Heng%2520Zhou%2520and%2520Jiwen%2520Yu%2520and%2520Zhenfei%2520Yin%2520and%2520Xihui%2520Liu%2520and%2520Philip%2520Torr%2520and%2520Yilun%2520Du%2520and%2520Ruimao%2520Zhang%26entry.1292438233%3DRecent%2520advancements%2520in%2520foundational%2520models%252C%2520such%2520as%2520large%2520language%2520models%2520and%2520world%2520models%252C%2520have%2520greatly%2520enhanced%2520the%2520capabilities%2520of%2520robotics%252C%2520enabling%2520robots%2520to%2520autonomously%2520perform%2520complex%2520tasks.%2520However%252C%2520acquiring%2520large-scale%252C%2520high-quality%2520training%2520data%2520for%2520robotics%2520remains%2520a%2520challenge%252C%2520as%2520it%2520often%2520requires%2520substantial%2520manual%2520effort%2520and%2520is%2520limited%2520in%2520its%2520coverage%2520of%2520diverse%2520real-world%2520envi {"title": "WM-DAgger: Enabling Efficient Data Aggregation for Imitation Learning with World Models", "author": "Anlan Yu and Zaishu Chen and Peili Song and Zhiqing Hong and Haotian Wang and Desheng Zhang and Tian He and Yi Ding and Daqing Zhang", "abstract": "Imitation learning is a powerful paradigm for training robotic policies, yet its performance is limited by compounding errors: minor policy inaccuracies could drive robots into unseen out-of-distribution (OOD) states in the training set, where the policy could generate even bigger errors, leading to eventual failures. While the Data Aggregation (DAgger) framework tries to address this issue, its reliance on continuous human involvement severely limits scalability. In this paper, we propose WM-DAgger, an efficient data aggregation framework that leverages World Models to synthesize OOD recovery data without requiring human involvement. Specifically, we focus on manipulation tasks with an eye-in-hand robotic arm and only few-shot demonstrations. To avoid synthesizing misleading data and overcome the hallucination issues inherent to World Models, our framework introduces two key mechanisms: (1) a Corrective Action Synthesis Module that generates task-oriented recovery actions to prevent misleading supervision, and (2) a Consistency-Guided Filtering Module that discards physically implausible trajectories by anchoring terminal synthesized frames to corresponding real frames in expert demonstrations. We extensively validate WM-DAgger on multiple real-world robotic tasks. Results that our method significantly improves success rates, achieving a 93.3\\% success rate in soft bag pushing with only five demonstrations. The source code is publicly available at https://github.com/czs12354-xxdbd/WM-Dagger.", "link": "http://arxiv.org/abs/2604.11351v1", "date": "2026-04-13", "relevancy": 1.6175, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5536}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5366}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5312}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WM-DAgger%3A%20Enabling%20Efficient%20Data%20Aggregation%20for%20Imitation%20Learning%20with%20World%20Models&body=Title%3A%20WM-DAgger%3A%20Enabling%20Efficient%20Data%20Aggregation%20for%20Imitation%20Learning%20with%20World%20Models%0AAuthor%3A%20Anlan%20Yu%20and%20Zaishu%20Chen%20and%20Peili%20Song%20and%20Zhiqing%20Hong%20and%20Haotian%20Wang%20and%20Desheng%20Zhang%20and%20Tian%20He%20and%20Yi%20Ding%20and%20Daqing%20Zhang%0AAbstract%3A%20Imitation%20learning%20is%20a%20powerful%20paradigm%20for%20training%20robotic%20policies%2C%20yet%20its%20performance%20is%20limited%20by%20compounding%20errors%3A%20minor%20policy%20inaccuracies%20could%20drive%20robots%20into%20unseen%20out-of-distribution%20%28OOD%29%20states%20in%20the%20training%20set%2C%20where%20the%20policy%20could%20generate%20even%20bigger%20errors%2C%20leading%20to%20eventual%20failures.%20While%20the%20Data%20Aggregation%20%28DAgger%29%20framework%20tries%20to%20address%20this%20issue%2C%20its%20reliance%20on%20continuous%20human%20involvement%20severely%20limits%20scalability.%20In%20this%20paper%2C%20we%20propose%20WM-DAgger%2C%20an%20efficient%20data%20aggregation%20framework%20that%20leverages%20World%20Models%20to%20synthesize%20OOD%20recovery%20data%20without%20requiring%20human%20involvement.%20Specifically%2C%20we%20focus%20on%20manipulation%20tasks%20with%20an%20eye-in-hand%20robotic%20arm%20and%20only%20few-shot%20demonstrations.%20To%20avoid%20synthesizing%20misleading%20data%20and%20overcome%20the%20hallucination%20issues%20inherent%20to%20World%20Models%2C%20our%20framework%20introduces%20two%20key%20mechanisms%3A%20%281%29%20a%20Corrective%20Action%20Synthesis%20Module%20that%20generates%20task-oriented%20recovery%20actions%20to%20prevent%20misleading%20supervision%2C%20and%20%282%29%20a%20Consistency-Guided%20Filtering%20Module%20that%20discards%20physically%20implausible%20trajectories%20by%20anchoring%20terminal%20synthesized%20frames%20to%20corresponding%20real%20frames%20in%20expert%20demonstrations.%20We%20extensively%20validate%20WM-DAgger%20on%20multiple%20real-world%20robotic%20tasks.%20Results%20that%20our%20method%20significantly%20improves%20success%20rates%2C%20achieving%20a%2093.3%5C%25%20success%20rate%20in%20soft%20bag%20pushing%20with%20only%20five%20demonstrations.%20The%20source%20code%20is%20publicly%20available%20at%20https%3A//github.com/czs12354-xxdbd/WM-Dagger.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11351v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWM-DAgger%253A%2520Enabling%2520Efficient%2520Data%2520Aggregation%2520for%2520Imitation%2520Learning%2520with%2520World%2520Models%26entry.906535625%3DAnlan%2520Yu%2520and%2520Zaishu%2520Chen%2520and%2520Peili%2520Song%2520and%2520Zhiqing%2520Hong%2520and%2520Haotian%2520Wang%2520and%2520Desheng%2520Zhang%2520and%2520Tian%2520He%2520and%2520Yi%2520Ding%2520and%2520Daqing%2520Zhang%26entry.1292438233%3DImitation%2520learning%2520is%2520a%2520powerful%2520paradigm%2520for%2520training%2520robotic%2520policies%252C%2520yet%2520its%2520performance%2520is%2520limited%2520by%2520compounding%2520errors%253A%2520minor%2520policy%2520inaccuracies%2520could%2520drive%2520robots%2520into%2520unseen%2520out-of-distribution%2520%2528OOD%2529%2520states%2520in%2520the%2520training%2520set%252C%2520where%2520the%2520policy%2520could%2520generate%2520even%2520bigger%2520errors%252C%2520leading%2520to%2520eventual%2520failures.%2520While%2520the%2520Data%2520Aggregation%2520%2528DA {"title": "Thought Branches: Interpreting LLM Reasoning Requires Resampling", "author": "Uzay Macar and Paul C. Bogdan and Senthooran Rajamanoharan and Neel Nanda", "abstract": "Most work interpreting reasoning models studies only a single chain-of-thought (CoT), yet these models define distributions over many possible CoTs. We argue that studying a single sample is inadequate for understanding causal influence and the underlying computation. Though fully specifying this distribution is intractable, we can measure a partial CoT's impact by resampling only the subsequent text. We present case studies using resampling to investigate model decisions. First, when a model states a reason for its action, does that reason actually cause the action? In \"agentic misalignment\" scenarios, we find that self-preservation sentences have small causal impact, suggesting they do not meaningfully drive blackmail. Second, are artificial edits to CoT sufficient for steering reasoning? Resampling and selecting a completion with the desired property is a principled on-policy alternative. We find that off-policy interventions yield small and unstable effects compared to resampling in decision-making tasks. Third, how do we understand the effect of removing a reasoning step when the model may repeat it post-edit? We introduce a resilience metric that repeatedly resamples to prevent similar content from reappearing downstream. Critical planning statements resist removal but have large effects when eliminated. Fourth, since CoT is sometimes \"unfaithful\", can our methods teach us anything in these settings? Adapting causal mediation analysis, we find that hints that causally affect the output without being explicitly mentioned exert a subtle and cumulative influence on the CoT that persists even if the hint is removed. Overall, studying distributions via resampling enables reliable causal analysis, clearer narratives of model reasoning, and principled CoT interventions.", "link": "http://arxiv.org/abs/2510.27484v2", "date": "2026-04-13", "relevancy": 1.9131, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4872}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4765}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4765}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Thought%20Branches%3A%20Interpreting%20LLM%20Reasoning%20Requires%20Resampling&body=Title%3A%20Thought%20Branches%3A%20Interpreting%20LLM%20Reasoning%20Requires%20Resampling%0AAuthor%3A%20Uzay%20Macar%20and%20Paul%20C.%20Bogdan%20and%20Senthooran%20Rajamanoharan%20and%20Neel%20Nanda%0AAbstract%3A%20Most%20work%20interpreting%20reasoning%20models%20studies%20only%20a%20single%20chain-of-thought%20%28CoT%29%2C%20yet%20these%20models%20define%20distributions%20over%20many%20possible%20CoTs.%20We%20argue%20that%20studying%20a%20single%20sample%20is%20inadequate%20for%20understanding%20causal%20influence%20and%20the%20underlying%20computation.%20Though%20fully%20specifying%20this%20distribution%20is%20intractable%2C%20we%20can%20measure%20a%20partial%20CoT%27s%20impact%20by%20resampling%20only%20the%20subsequent%20text.%20We%20present%20case%20studies%20using%20resampling%20to%20investigate%20model%20decisions.%20First%2C%20when%20a%20model%20states%20a%20reason%20for%20its%20action%2C%20does%20that%20reason%20actually%20cause%20the%20action%3F%20In%20%22agentic%20misalignment%22%20scenarios%2C%20we%20find%20that%20self-preservation%20sentences%20have%20small%20causal%20impact%2C%20suggesting%20they%20do%20not%20meaningfully%20drive%20blackmail.%20Second%2C%20are%20artificial%20edits%20to%20CoT%20sufficient%20for%20steering%20reasoning%3F%20Resampling%20and%20selecting%20a%20completion%20with%20the%20desired%20property%20is%20a%20principled%20on-policy%20alternative.%20We%20find%20that%20off-policy%20interventions%20yield%20small%20and%20unstable%20effects%20compared%20to%20resampling%20in%20decision-making%20tasks.%20Third%2C%20how%20do%20we%20understand%20the%20effect%20of%20removing%20a%20reasoning%20step%20when%20the%20model%20may%20repeat%20it%20post-edit%3F%20We%20introduce%20a%20resilience%20metric%20that%20repeatedly%20resamples%20to%20prevent%20similar%20content%20from%20reappearing%20downstream.%20Critical%20planning%20statements%20resist%20removal%20but%20have%20large%20effects%20when%20eliminated.%20Fourth%2C%20since%20CoT%20is%20sometimes%20%22unfaithful%22%2C%20can%20our%20methods%20teach%20us%20anything%20in%20these%20settings%3F%20Adapting%20causal%20mediation%20analysis%2C%20we%20find%20that%20hints%20that%20causally%20affect%20the%20output%20without%20being%20explicitly%20mentioned%20exert%20a%20subtle%20and%20cumulative%20influence%20on%20the%20CoT%20that%20persists%20even%20if%20the%20hint%20is%20removed.%20Overall%2C%20studying%20distributions%20via%20resampling%20enables%20reliable%20causal%20analysis%2C%20clearer%20narratives%20of%20model%20reasoning%2C%20and%20principled%20CoT%20interventions.%0ALink%3A%20http%3A//arxiv.org/abs/2510.27484v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThought%2520Branches%253A%2520Interpreting%2520LLM%2520Reasoning%2520Requires%2520Resampling%26entry.906535625%3DUzay%2520Macar%2520and%2520Paul%2520C.%2520Bogdan%2520and%2520Senthooran%2520Rajamanoharan%2520and%2520Neel%2520Nanda%26entry.1292438233%3DMost%2520work%2520interpreting%2520reasoning%2520models%2520studies%2520only%2520a%2520single%2520chain-of-thought%2520%2528CoT%2529%252C%2520yet%2520these%2520models%2520define%2520distributions%2520over%2520many%2520possible%2520CoTs.%252 {"title": "dTRPO: Trajectory Reduction in Policy Optimization of Diffusion Large Language Models", "author": "Wenxuan Zhang and Lemeng Wu and Changsheng Zhao and Ernie Chang and Mingchen Zhuge and Zechun Liu and Andy Su and Hanxian Huang and Jun Chen and Chong Zhou and Raghuraman Krishnamoorthi and Vikas Chandra and Mohamed Elhoseiny and Wei Wen", "abstract": "Diffusion Large Language Models (dLLMs) introduce a new paradigm for language generation, which in turn presents new challenges for aligning them with human preferences. In this work, we aim to improve the policy optimization for dLLMs by reducing the cost of the trajectory probability calculation, thereby enabling scaled-up offline policy training. We prove that: (i) under reference policy regularization, the probability ratio of the newly unmasked tokens is an unbiased estimate of that of intermediate diffusion states, and (ii) the probability of the full trajectory can be effectively estimated with a single forward pass of a re-masked final state. By integrating these two trajectory reduction strategies into a policy optimization objective, we propose Trajectory Reduction Policy Optimization (dTRPO). We evaluate dTRPO on 7B dLLMs across instruction-following and reasoning benchmarks. Results show that it substantially improves the core performance of state-of-the-art dLLMs, achieving gains of up to 9.6% on STEM tasks, up to 4.3% on coding tasks, and up to 3.0% on instruction-following tasks. Moreover, dTRPO exhibits strong training efficiency due to its offline, single-forward nature, and achieves improved generation efficiency through high-quality outputs.", "link": "http://arxiv.org/abs/2603.18806v2", "date": "2026-04-13", "relevancy": 1.5404, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5246}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5065}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4926}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20dTRPO%3A%20Trajectory%20Reduction%20in%20Policy%20Optimization%20of%20Diffusion%20Large%20Language%20Models&body=Title%3A%20dTRPO%3A%20Trajectory%20Reduction%20in%20Policy%20Optimization%20of%20Diffusion%20Large%20Language%20Models%0AAuthor%3A%20Wenxuan%20Zhang%20and%20Lemeng%20Wu%20and%20Changsheng%20Zhao%20and%20Ernie%20Chang%20and%20Mingchen%20Zhuge%20and%20Zechun%20Liu%20and%20Andy%20Su%20and%20Hanxian%20Huang%20and%20Jun%20Chen%20and%20Chong%20Zhou%20and%20Raghuraman%20Krishnamoorthi%20and%20Vikas%20Chandra%20and%20Mohamed%20Elhoseiny%20and%20Wei%20Wen%0AAbstract%3A%20Diffusion%20Large%20Language%20Models%20%28dLLMs%29%20introduce%20a%20new%20paradigm%20for%20language%20generation%2C%20which%20in%20turn%20presents%20new%20challenges%20for%20aligning%20them%20with%20human%20preferences.%20In%20this%20work%2C%20we%20aim%20to%20improve%20the%20policy%20optimization%20for%20dLLMs%20by%20reducing%20the%20cost%20of%20the%20trajectory%20probability%20calculation%2C%20thereby%20enabling%20scaled-up%20offline%20policy%20training.%20We%20prove%20that%3A%20%28i%29%20under%20reference%20policy%20regularization%2C%20the%20probability%20ratio%20of%20the%20newly%20unmasked%20tokens%20is%20an%20unbiased%20estimate%20of%20that%20of%20intermediate%20diffusion%20states%2C%20and%20%28ii%29%20the%20probability%20of%20the%20full%20trajectory%20can%20be%20effectively%20estimated%20with%20a%20single%20forward%20pass%20of%20a%20re-masked%20final%20state.%20By%20integrating%20these%20two%20trajectory%20reduction%20strategies%20into%20a%20policy%20optimization%20objective%2C%20we%20propose%20Trajectory%20Reduction%20Policy%20Optimization%20%28dTRPO%29.%20We%20evaluate%20dTRPO%20on%207B%20dLLMs%20across%20instruction-following%20and%20reasoning%20benchmarks.%20Results%20show%20that%20it%20substantially%20improves%20the%20core%20performance%20of%20state-of-the-art%20dLLMs%2C%20achieving%20gains%20of%20up%20to%209.6%25%20on%20STEM%20tasks%2C%20up%20to%204.3%25%20on%20coding%20tasks%2C%20and%20up%20to%203.0%25%20on%20instruction-following%20tasks.%20Moreover%2C%20dTRPO%20exhibits%20strong%20training%20efficiency%20due%20to%20its%20offline%2C%20single-forward%20nature%2C%20and%20achieves%20improved%20generation%20efficiency%20through%20high-quality%20outputs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18806v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DdTRPO%253A%2520Trajectory%2520Reduction%2520in%2520Policy%2520Optimization%2520of%2520Diffusion%2520Large%2520Language%2520Models%26entry.906535625%3DWenxuan%2520Zhang%2520and%2520Lemeng%2520Wu%2520and%2520Changsheng%2520Zhao%2520and%2520Ernie%2520Chang%2520and%2520Mingchen%2520Zhuge%2520and%2520Zechun%2520Liu%2520and%2520Andy%2520Su%2520and%2520Hanxian%2520Huang%2520and%2520Jun%2520Chen%2520and%2520Chong%2520Zhou%2520and%2520Raghuraman%2520Krishnamoorthi%2520and%2520Vikas%2520Chandra%2520and%2520Mohamed%2520Elhoseiny%2520and%2520Wei%2520Wen%26entry.1292438233%3DDiffusion%2520Large%2520Language%2520Models%2520%2528dLLMs%2529%2520introduce%2520a%2520new%2520paradigm%2520for%2520language%2520generation%252C%2520which%2520in%2520turn%2520presents%2520new%2520challenges%2520for%2520aligning%2520them%2520with%2520human%2520preferences.%2520In%2520this%2520work%252C%2520we%2520aim%2520to%2520improve%2520the%2520policy%2520optimization%2520for%2520dLLMs%2520by%2520reducing%2520the%2520cost%2520of%2520the%2520trajectory%2520probability%2520calculation%252C%2520thereby%2520enabling%2520scaled-up%2520offline%2520policy%2520training.%2520We%2520prove%2520that%253A%2520%2528i%2529%2520under%2520reference%2520policy%2520regularization%252C%2520the%2520probabil

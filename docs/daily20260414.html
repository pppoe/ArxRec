%20models%20and%20enables%20a%20better%20trade-off%20between%20visual%20quality%20and%20fidelity%20of%20high-frequency%20details.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11559v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProgressively%2520Texture-Aware%2520Diffusion%2520for%2520Contrast-Enhanced%2520Sparse-View%2520CT%26entry.906535625%3DTianqi%2520Wang%2520and%2520Wenchao%2520Du%2520and%2520Hongyu%2520Yang%26entry.1292438233%3DDiffusion-based%2520sparse-view%2520CT%2520%2528SVCT%2529%2520imaging%2520has%2520achieved%2520remarkable%2520advancements%2520in%2520recent%2520years%252C%2520thanks%2520to%2520its%2520more%2520stable%2520generative%2520capability.%2520However%252C%2520recovering%2520reliable%2520image%2520content%2520and%2520visually%2520consistent%2520textures%2520is%2520still%2520a%2520crucial%2520challenge.%2520In%2520this%2520paper%252C%2520we%2520present%2520a%2520Progressively%2520Texture-aware%2520Diffusion%2520%2528PTD%2529%2520model%252C%2520a%2520coarse-to-fine%2520learning%2520framework%2520tailored%2520for%2520SVCT.%2520Specifically%252C%2520PTD%2520comprises%2520a%2520basic%2520reconstructive%2520module%2520PTD%2524_%257B%255Ctextit%257Brec%257D%257D%2524%2520and%2520a%2520conditional%2520diffusion%2520module%2520PTD%2524_%257B%255Ctextit%257Bdiff%257D%257D%2524.%2520PTD%2524_%257B%255Ctextit%257Brec%257D%257D%2524%2520first%2520learns%2520a%2520deterministic%2520mapping%2520to%2520recover%2520the%2520majority%2520of%2520the%2520underlying%2520low-frequency%2520signals%2520%2528i.e.%252C%2520coarse%2520content%2520with%2520smoothed%2520textures%2529%252C%2520which%2520serves%2520as%2520the%2520initial%2520estimation%2520to%2520enable%2520fidelity.%2520Moreover%252C%2520PTD%2524_%257B%255Ctextit%257Bdiff%257D%257D%2524%2520aims%2520to%2520reconstruct%2520high-fidelity%2520details%2520for%2520coarse%2520prediction%252C%2520which%2520explores%2520a%2520dual {"title": "ConvFormer3D-TAP: Phase/Uncertainty-Aware Front-End Fusion for Cine CMR View Classification Pipelines", "author": "Nafiseh Ghaffar Nia and Vinesh Appadurai and Suchithra V. and Chinmay Rane and Daniel Pittman and James Carr and Adrienne Kline", "abstract": "Reliable recognition of standard cine cardiac MRI views is essential because each view determines which cardiac anatomy is visualized and which quantitative analyses can be performed. Incorrect view identification, whether by a human reader or an automated deep learning system, can propagate errors into segmentation, volumetric assessment, strain analysis, and valve evaluation. However, accurate view classification remains challenging under routine clinical variability in scanner vendor, acquisition protocol, motion artifacts, and plane prescription. We present ConvFormer3D-TAP, a cine-specific spatiotemporal architecture that integrates 3D convolutional tokenization with multiscale self-attention. The model is trained using masked spatiotemporal reconstruction and uncertainty-weighted multi-clip fusion to enhance robustness across cardiac phases and ambiguous temporal segments. The design captures complementary cues: local anatomical structure through convolutional priors and long-range cardiac-cycle dynamics through hierarchical attention. On a cohort of 150,974 clinically acquired cine sequences spanning six standard cine cardiac MRI views, ConvFormer3D-TAP achieved 96% validation accuracy with per-class F1-scores >= 0.94 and strong calibration (ECE = 0.025; Brier = 0.040). Error analysis shows that residual confusions are concentrated in anatomically adjacent long-axis and LVOT/AV view pairs, consistent with intrinsic prescription overlap. These results support ConvFormer3D-TAP as a scalable front-end for view routing, filtering and quality control in end-to-end cMRI workflows.", "link": "http://arxiv.org/abs/2604.11389v1", "date": "2026-04-13", "relevancy": 2.3979, "topK": [{"title": "CamCtrl3D: S s%20across%20cardiac%20phases%20and%20ambiguous%20temporal%20segments.%20The%20design%20captures%20complementary%20cues%3A%20local%20anatomical%20structure%20through%20convolutional%20priors%20and%20long-range%20cardiac-cycle%20dynamics%20through%20hierarchical%20attention.%20On%20a%20cohort%20of%20150%2C974%20clinically%20acquired%20cine%20sequences%20spanning%20six%20standard%20cine%20cardiac%20MRI%20views%2C%20ConvFormer3D-TAP%20achieved%2096%25%20validation%20accuracy%20with%20per-class%20F1-scores%20%3E%3D%200.94%20and%20strong%20calibration%20%28ECE%20%3D%200.025%3B%20Brier%20%3D%200.040%29.%20Error%20analysis%20shows%20that%20residual%20confusions%20are%20concentrated%20in%20anatomically%20adjacent%20long-axis%20and%20LVOT/AV%20view%20pairs%2C%20consistent%20with%20intrinsic%20prescription%20overlap.%20These%20results%20support%20ConvFormer3D-TAP%20as%20a%20scalable%20front-end%20for%20view%20routing%2C%20filtering%20and%20quality%20control%20in%20end-to-end%20cMRI%20workflows.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11389v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConvFormer3D-TAP%253A%2520Phase/Uncertainty-Aware%2520Front-End%2520Fusion%2520for%2520Cine%2520CMR%2520View%2520Classification%2520Pipelines%26entry.906535625%3DNafiseh%2520Ghaffar%2520Nia%2520and%2520Vinesh%2520Appadurai%2520and%2520Suchithra%2520V.%2520and%2520Chinmay%2520Rane%2520and%2520Daniel%2520Pittman%2520and%2520James%2520Carr%2520and%2520Adrienne%2520Kline%26entry.1292438233%3DReliable%2520recognition%2520of%2520standard%2520cine%2520cardiac%2520MRI%2520views%2520is%2520essential%2520because%2520each%2520view%2520determines%2520which%2520cardiac%2520anatomy%2520is%2520visualized%2520and%2520which%2520quantitative%2520analyses%2520can%2520be%2520performed.%2520Incorrect%2520view%2520identification%252C%2520whether%2520by%2520a%2520human%2520reader%2520or%2520an%2520automated%2520deep%2520learning {"title": "TempusBench: An Evaluation Framework for Time-Series Forecasting", "author": "Denizalp Goktas and Gerardo Ria\u00f1o-Brice\u00f1o and Alif Abdullah and Aryan Nair and Chenkai Shen and Beatriz de Lucio and Alexandra Magnusson and Farhan Mashrur and Ahmed Abdulla and Shawrna Sen and Mahitha Thippireddy and Gregory Schwartz and Amy Greenwald", "abstract": "Foundation models have transformed natural language processing and computer vision, and a rapidly growing literature on time-series foundation models (TSFMs) seeks to replicate this success in forecasting. While recent open-source models demonstrate the promise of TSFMs, the field lacks a comprehensive and community-accepted model evaluation framework. We see at least four major issues impeding progress on the development of such a framework. First, current evaluation frameworks consist of benchmark forecasting tasks derived from often outdated datasets (e.g., M3), many of which lack clear metadata and overlap with the corpora used to pre-train TSFMs. Second, existing frameworks evaluate models along a narrowly defined set of benchmark forecasting tasks such as forecast horizon length or domain, but overlook core statistical properties such as non-stationarity and seasonality. Third, domain-specific models (e.g., XGBoost) are often compared unfairly, as existing frameworks neglect a systematic and consistent hyperparameter tuning convention for all models. Fourth, visualization tools for interpreting comparative performance are lacking. To address these issues, we introduce TempusBench, an open-source evaluation framework for TSFMs. TempusBench consists of 1) new datasets which are not included in existing TSFM pretraining corpora, 2) a set of novel benchmark tasks that go beyond existing ones, 3) a model evaluation pipeline with a standardized hyperparameter tuning protocol, and 4) a tensorboard-based visualization interface. We provide access to our code on GitHub: https://github.com/Smlcrm/TempusBench." {"title": "Disentangled Point Diffusion for Precise Object Placement", "author": "Lyuxing He and Eric Cai and Shobhit Aggarwal and Jianjun Wang and David Held", "abstract": "Recent advances in robotic manipulation have highlighted the effectiveness of learning from demonstration. However, while end-to-end policies excel in expressivity and flexibility, they struggle both in generalizing to novel object geometries and in attaining a high degree of precision. An alternative, object-centric approach frames the task as predicting the placement pose of the target object, providing a modular decomposition of the problem. Building on this goal-prediction paradigm, we propose TAX-DPD, a hierarchical, disentangled point diffusion framework that achieves state-of-the-art performance in placement precision, multi-modal coverage, and generalization to variations in object geometries and scene configurations. We model global scene-level placements through a novel feed-forward Dense Gaussian Mixture Model (GMM) that yields a spatially dense prior over global placements; we then model the local object-level configuration through a novel disentangled point cloud diffusion module that separately diffuses the object geometry and the placement frame, enabling precise local geometric reasoning. Interestingly, we demonstrate that our point cloud diffusion achieves substantially higher accuracy than a prior approach based on SE(3)-diffusion, even in the context of rigid object placement. We validate our approach across a suite of challenging tasks in simulation and in the real-world on high-precision industrial insertion tasks. Furthermore, we present results on a cloth-hanging task in simulation, indicating that our framework can further relax assumptions on object rigidity.", "link": "http://arxiv.org/abs/2604.11793v1", "date": "2026-04-13", "relevancy": 2.3916, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6036}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5977}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Disentangled%20Point%20Diffusion%20for%20Precise%20Object%20Placement&body=Title%3A%20Disentangled%20Point%20Diffusion%20for%20Precise%20Object%20Placement%0AAuthor%3A%20Lyuxing%20He%20and%20Eric%20Cai%20and%20Shobhit%20Aggarwal%20and%20Jianjun%20Wang%20and%20David%20Held%0AAbstract%3A%20Recent%20advances%20in%20robotic%20manipulation%20have%20highlighted%20the%20effectiveness%20of%20learning%20from%20demonstration.%20However%2C%20while%20end-to-end%20policies%20excel%20in%20expressivity%20and%20flexibility%2C%20they%20struggle%20both%20in%20generalizing%20to%20novel%20object%20geometries%20and%20in%20attaining%20a%20high%20degree%20of%20precision.%20An%20alternative%2C%20object-centric%20approach%20frames%20the%20task%20as%20predicting%20the%20placement%20pose%20of%20the%20target%20object%2C%20providing%20a%20modular%20decomposition%20of%20the%20problem.%20Building%20on%20this%20goal-prediction%20paradigm%2C%20we%20propose%20TAX-DPD%2C%20a%20hierarchical%2C%20disentangled%20point%20diffusion%20framework%20that%20achieves%20state-of-the-art%20performance%20in%20placement%20precision%2C%20multi-modal%20coverage%2C%20and%20generalization%20to%20variations%20in%20object%20geometries%20and%20scene%20configurations.%20We%20model%20global%20scene-level%20placements%20through%20a%20novel%20feed-forward%20Dense%20Gaussian%20Mixture%20Model%20%28GMM%29%20that%20yields%20a%20spatially%20dense%20prior%20over%20global%20placements%3B%20we%20then%20model%20the%20local%20object-level%20configuration%20through%20a%20novel%20disentangled%20point%20cloud%20diffusion%20module%2 {"title": "OmniShow: Unifying Multimodal Conditions for Human-Object Interaction Video Generation", "author": "Donghao Zhou and Guisheng Liu and Hao Yang and Jiatong Li and Jingyu Lin and Xiaohu Huang and Yichen Liu and Xin Gao and Cunjian Chen and Shilei Wen and Chi-Wing Fu and Pheng-Ann Heng", "abstract": "In this work, we study Human-Object Interaction Video Generation (HOIVG), which aims to synthesize high-quality human-object interaction videos conditioned on text, reference images, audio, and pose. This task holds significant practical value for automating content creation in real-world applications, such as e-commerce demonstrations, short video production, and interactive entertainment. However, existing approaches fail to accommodate all these requisite conditions. We present OmniShow, an end-to-end framework tailored for this practical yet challenging task, capable of harmonizing multimodal conditions and delivering industry-grade performance. To overcome the trade-off between controllability and quality, we introduce Unified Channel-wise Conditioning for efficient image and pose injection, and Gated Local-Context Attention to ensure precise audio-visual synchronization. To effectively address data scarcity, we develop a Decoupled-Then-Joint Training strategy that leverages a multi-stage training process with model merging to efficiently harness heterogeneous sub-task datasets. Furthermore, to fill the evaluation gap in this field, we establish HOIVG-Bench, a dedicated and comprehensive benchmark for HOIVG. Extensive experiments demonstrate that OmniShow achieves overall state-of-the-art performance across various multimodal conditioning settings, setting a solid standard for the emerging HOIVG task.", "link": "http://arxiv.org/abs/2604.11804v1", "date": "2026-04-13", "relevancy": 2.391, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.617}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5917}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5809}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniShow%3A%20Unifying%20Multimodal%20Conditions%20for%20Human-Object%20Interaction%20Video%20Generation&body=Title%3A%20OmniShow%3A%20Unifying%20Multimodal%20Conditions%20for%20Human-Object%20Interaction%20Video%20Generation%0AAuthor%3A%20Donghao%20Zhou%20and%20Guisheng%20Liu%20and%20Hao%20Yang%20and%20Jiatong%20Li%20and%20Jingyu%20Lin%20and%20Xiaohu%20Huang%20and%20Yichen%20Liu%20and%20Xin%20Gao%20and%20Cunjian%20Chen%20and%20Shilei%20Wen%20and%20Chi-Wing%20Fu%20and%20Pheng-Ann%20Heng%0AAbstract%3A%20In%20this%20work%2C%20we%20study%20Human-Object%20Interaction%20Video%20Generation%20%28HOIVG%29%2C%20which%20aims%20to%20synthesize%20high-quality%20human-object%20interaction%20videos%20conditioned%20on%20text%2C%20reference%20images%2C%20audio%2C%20and%20pose.%20This%20task%20holds%20significant%20practical%20value%20for%20automating%20content%20creation%20in%20real-world%20applications%2C%20such%20as%20e-commerce%20demonstrations%2C%20short%20video%20production%2C%20and%20interactive%20entertainment.%20However%2C%20existing%20approaches%20fail%20to%20accommodate%20all%20these%20requisite%20conditions.%20We%20present%20OmniShow%2C%20an%20end-to-end%20framework%20tailored%20for%20this%20practical%20yet%20challenging%20task%2C%20capable%20of%20harmonizing%20multimodal%20conditions%20and%20delivering%20industry-grade%20performance.%20To%20overcome%20the%20trade-off%20between%20controllability%20and%20quality%2C%20we%20introduce%20Unified%20Channel-wise%20Conditioning%20for%20efficient%20image%20and%20pose%20injection%2C%20and%20Gated%20Local-Context%20Attention%20to%20ensure%20precise%20audio-visual%20synchronization.%20To%20effectively%20address%20data%20scarcity%2C%20we%20develop%20a%20Decoupled-Then-Joint%20Training%20strategy%20that%20leverages%20a%20multi-stage%20training%20process%20with%20model%20merging%20to%20efficiently%20harness%20heterogeneous%20sub-task%20datasets.%20Furthermore%2C%20to%20fill%20the%20evaluation%20gap%20in%20this%20field%2C%20we%20establish%20HOIVG-Bench%2C%20a%20dedicated%20and%20comprehensive%20benchmark%20for%20HOIVG.%20Extensive%20experiments%20demonstrate%20that%20OmniShow%20achieves%20overall%20state-of-the-art%20performance%20across%20various%20multimodal%20conditioning%20settings%2C%20setting%20a%20solid%20standard%20for%20the%20emerging%20HOIVG%20task.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11804v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniShow%253A%2520Unifying%2520Multimodal%2520Conditions%2520for%2520Human-Object%2520Interaction%2520Video%2520Generation%26entry.906535625%3DDonghao%2520Zhou%2520and%2520Guisheng%2520Liu%2520and%2520Hao%2520Yang%2520and%2520Jiatong%2520Li%2520and%2520Jingyu%2520Lin%2520and%2520Xiaohu%2520Huang%2520and%2520Yichen%2520Liu%2520and%2520Xin%2520Gao%2520and%2520Cunjian%2520Chen%2520and%2520Shilei%2520Wen%2520and%2520Chi-Wing%2520Fu%2520and%2520Pheng-Ann%2520Heng%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520study%2520Human-Object%2520Interaction%2520Video%2520Generation%2520%2528HOIVG%2529%252C%2520which%2520aims%2520to%2520synthesize%2520high-quality%2520human-object%2520interaction%2520videos%2520conditioned%2520on%2520text%252C%2520reference%2520images%252C%2520audio%252C%2520and%2520pose.%2520This%2520task%2520holds%2520significant%2520practical%2520value%2520for%2520automating%2520content%2520creation%2520in%2520real-world%2520applications%252C%2520such%2520as%2520e-commerce%2520demonstrations%252C%2520short%2520video%2520production%252C iu%20and%20Hao%20Yang%20and%20Jiatong%20Li%20and%20Jingyu%20Lin%20and%20Xiaohu%20Huang%20and%20Yichen%20Liu%20and%20Xin%20Gao%20and%20Cunjian%20Chen%20and%20Shilei%20Wen%20and%20Chi-Wing%20Fu%20and%20Pheng-Ann%20Heng&entry.1292438233=In%20this%20work%2C%20we%20study%20Human-Object%20Interaction%20Video%20Generation%20%28HOIVG%29%2C%20which%20aims%20to%20synthesize%20high-quality%20human-object%20interaction%20videos%20conditioned%20on%20text%2C%20reference%20images%2C%20audio%2C%20and%20pose.%20This%20task%20holds%20significant%20practical%20value%20for%20automating%20content%20creation%20in%20real-world%20applications%2C%20such%20as%20e-commerce%20demonstrations%2C%20short%20video%20production%2C%20and%20interactive%20entertainment.%20However%2C%20existing%20approaches%20fail%20to%20accommodate%20all%20these%20requisite%20conditions.%20We%20present%20OmniShow%2C%20an%20end-to-end%20framework%20tailored%20for%20this%20practical%20yet%20challenging%20task%2C%20capable%20of%20harmonizing%20multimodal%20conditions%20and%20delivering%20industry-grade%20performance.%20To%20overcome%20the%20trade-off%20between%20controllability%20and%20quality%2C%20we%20introduce%20Unified%20Channel-wise%20Conditioning%20for%20efficient%20image%20and%20pose%20injection%2C%20and%20Gated%20Local-Context%20Attention%20to%20ensure%20precise%20audio-visual%20synchronization.%20To%20effectively%20address%20data%20scarcity%2C%20we%20develop%20a%20Decoupled-Then-Joint%20Training%20strategy%20that%20leverages%20a%20multi-stage%20training%20process%20with%20model%20merging%20to%20efficiently%20harness%20heterogeneous%20sub-task%20datasets.%20Furthermore%2C%20to%20fill%20the%20evaluation%20gap%20in%20this%20field%2C%20we%20establish%20HOIVG-Bench%2C%20a%20dedicated%20and%20comprehensive%20benchmark%20for%20HOIVG.%20Extensive%20experiments%20demonstrate%20that%20OmniShow%20achieves%20overall%20state-of-the-art%20performance%20across%20various%20multimodal%20conditioning%20settings%2C%20setting%20a%20 {"title": "MVAD: A Benchmark Dataset for Multimodal AI-Generated Video-Audio Detection", "author": "Mengxue Hu and Yunfeng Diao and Changtao Miao and Zhiqing Guo and Jianshu Li and Zhe Li and Joey Tianyi Zhou", "abstract": "The rapid advancement of AI-generated multimodal video-audio content has raised significant concerns regarding information security and content authenticity. Existing synthetic video datasets predominantly focus on the visual modality alone, while the few incorporating audio are largely confined to facial deepfakes--a limitation that fails to address the expanding landscape of general multimodal AI-generated content and substantially impedes the development of trustworthy detection systems. To bridge this critical gap, we introduce the Multimodal Video-Audio Dataset (MVAD), the first comprehensive dataset specifically designed for detecting AI-generated multimodal video-audio content. Our dataset exhibits three key characteristics: (1) genuine multimodality with samples generated according to three realistic video-audio forgery patterns; (2) high perceptual quality achieved through diverse state-of-the-art generative models; and (3) comprehensive diversity spanning realistic and anime visual styles, four content categories (humans, animals, objects, and scenes), and four video-audio multimodal data types. Our dataset will be available at https://github.com/HuMengXue0104/MVAD.", "link": "http://arxiv.org/abs/2512.00336v2", "date": "2026-04-13", "relevancy": 2.3783, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6289}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5861}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5299}], "mailto": "mail g%2520realistic%2520and%2520anime%2520visual%2520styles%252C%2520four%2520content%2520categories%2520%2528humans%252C%2520animals%252C%2520objects%252C%2520and%2520scenes%2529%252C%2520and%2520four%2520video-audio%2520multimodal%2520data%2520types.%2520Our%2520dataset%2520will%2520be%2520available%2520at%2520https%253A//github.com/HuMengXue0104/MVAD.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.00336v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MVAD%3A%20A%20Benchmark%20Dataset%20for%20Multimodal%20AI-Generated%20Video-Audio%20Detection&entry.906535625=Mengxue%20Hu%20and%20Yunfeng%20Diao%20and%20Changtao%20Miao%20and%20Zhiqing%20Guo%20and%20Jianshu%20Li%20and%20Zhe%20Li%20and%20Joey%20Tianyi%20Zhou&entry.1292438233=The%20rapid%20advancement%20of%20AI-generated%20multimodal%20video-audio%20content%20has%20raised%20significant%20concerns%20regarding%20information%20security%20and%20content%20authenticity.%20Existing%20synthetic%20video%20datasets%20predominantly%20focus%20on%20the%20visual%20modality%20alone%2C%20while%20the%20few%20incorporating%20audio%20are%20largely%20confined%20to%20facial%20deepfakes--a%20limitation%20that%20fails%20to%20address%20the%20expanding%20landscape%20of%20general%20multimodal%20AI-generated%20content%20and%20substantially%20impedes%20the%20development%20of%20trustworthy%20detection%20systems.%20To%20bridge%20this%20critical%20gap%2C%20we%20introduce%20the%20Multimodal%20Video-Audio%20Dataset%20%28MVAD%29%2C%20the%20first%20comprehensive%20dataset%20specifically%20designed%20for%20detecting%20AI-generated%20multimodal%20video-audio%20content.%20Our%20dataset%20exhibits%20three%20key%20characteristics%3A%20%281%29%20genuine%20multimodality%20with%20samples%20generated%20according%20to%20three%20realistic%20video-audio%20forgery%20patterns%3B%20%282%29%20high%20perceptual%20quality%20achieved%20through%20diverse%20state-of-the-art%20generative%20models%3B%20and%20%283%29%20comprehensive%20diversity%20spanning%20realistic%20and%20anime%20visual%20styles%2C%20four%20content%20categories%20%28humans%2C%20animals%2C%20objects%2C%20and%20scenes%29%2C%20and%20four%20video-audio%20multimodal%20data%20types.%20Our%20dataset%20will%20be%20available%20at%20https%3A//github.com/HuMengXue0104/MVAD.&entry.1838667208=http%3A//arxiv.org/abs/2512.00336v2&entry.124074799=Read"},
{"title": "Scene Change Detection with Vision-Language Representation Learning", "author": "Diwei Sheng and Vijayraj Gohil and Satyam Gaba and Zihan Liu and Giles Hamilton-Fletcher and John-Ross Rizzo and Yongqing Liang and Chen Feng", "abstract": "Scene change detection (SCD) is crucial for urban monitoring and navigation but remains challenging in real-world environments due to lighting variations, seasonal shifts, viewpoint differences, and complex urban layouts. Existing methods rely primarily on low-level visual features, limiting their ability to accurately identify changed objects amid the visual complexity of urban scenes. In this paper, we propose LangSCD, a vision-language framework for scene change detection that overcomes this single-modal limitation by incorporating semantic reasoning through language. Our approach introduces a modular language component that leverages vision-language models (VLMs) to generate textual descriptions of scene changes, which are fused with visual features through a cross-modal feature enhancer. We further introduce a geometric-semantic matching module that refines the predicted masks by enforcing semantic consistency and spatial completeness. Existing real-world scene change detection benchmarks provide only binary change annotations, which are insufficient for downstream applications requiring fine-grained understanding of scene dynamics. To address this limitation, we introduce NYC-CD, a large-scale dataset of 8,122 real-world image pairs collected in New York City with multiclass change annotations generated through a semi-automatic pipeline. Extensive experiments across multiple street-view benchmarks demonstrate that our language and matching modules consistently improve existing change-detection architectures, achieving state-of-the-art performance and highlighting the value of integrating linguistic reasoning with visual representations for robust scene change detection.", "link": "http://arxiv.org/abs/2604.11402v1", "date": "2026-04-13", "relevancy": 2.3731, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6062}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6062}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scene%20Change%20Detection%20with%20Vision-Language%20Representation%20Learning&body=Title%3A%20Scene%20Change%20Detection%20with%20Vision-Language%20Representation%20Learning%0AAuthor%3A%20Diwei%20Sheng%20and%20Vijayraj%20Gohil%20and%20Satyam%20Gaba%20and%20Zihan%20Liu%20and%20Giles%20Hamilton-Fletcher%20and%20John-Ross%20Rizzo%20and%20Yongqing%20Liang%20and%20Chen%20Feng%0AAbstract%3A%20Scene%20change%20detection%20%28SCD%29%20is%20crucial%20for%20urban%20monitoring%20and%20navigation%20but%20remains%20challenging%20in%20real-world%20environments%20due%20to%20lighting%20variations%2C%20seasonal%20shifts%2C%20viewpoint%20differences%2C%20and%20complex%20urban%20layouts.%20Existing%20methods%20rely%20primarily%20on%20low-level%20visual%20features%2C%20limiting%20their%20ability%20to%20accurately%20identify%20changed%20objects%20amid%20the%20visual%20complexity%20of%20urban%20scenes.%20In%20this%20paper%2C%20we%20propose%20LangSCD%2C%20a%20vision-language%20framework%20for%20scene%20change%20detection%20that%20overcomes%20this%20single-modal%20limitation%20by%20incorporating%20semantic%20reasoning%20through%20language.%20Our%20approach%20introduces%20a%20modular%20language%20component%20that%20leverages%20vision-language%20models%20%28VLMs%29%20to%20generate%20textual%20descriptions%20of%20scene%20changes%2C%20which%20are%20fused%20with%20visual%20features%20through%20a%20cross-modal%20feature%20enhancer.%20We%20further%20introduce%20a%20geometric-semantic%20matching%20module%20that%20refines%20the%20predicted%20masks%20by%20enforcing%20semantic%20consistency%20and%20spatial%20completeness.%20Existing%20real-world%20scene%20change%20detection%20benchmarks%20provide%20only%20binary%20change%20annotations%2C%20which%20are%20insufficient%20for%20downstream%20applications%20requiring%20fine-grained%20understanding%20of%20scene%20dynamics.%20To%20address%20this%20limitation%2C%20we%20introduce%20NYC-CD%2C%20a%20large-scale%20dataset%20of%208%2C122%20real-world%20image%20pairs%20collected%20in%20New%20York%20City%20with%20multiclass%20change%20annotations%20generated%20through%20a%20semi-automatic%20pipeline.%20Extensive%20experiments%20across%20multiple%20street-view%20benchmarks%20demonstrate%20that%20our%20language%20and%20matching%20modules%20consistently%20improve%20existing%20change-detection%20architectures%2C%20achieving%20state-of-the-art%20performance%20and%20highlighting%20the%20value%20of%20integrating%20linguistic%20reasoning%20with%20visual%20representations%20for%20robust%20scene%20change%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11402v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScene%2520Change%2520Detection%2520with%2520Vision-Language%2520Representation%2520Learning%26entry.906535625%3DDiwei%2520Sheng%2520and%2520Vijayraj%2520Gohil%2520and%2520Satyam%2520Gaba%2520and%2520Zihan%2520Liu%2520and%2520Giles%2520Hamilton-Fletcher%2520and%2520John-Ross%2520Rizzo%2520and%2520Yongqing%2520Liang%2520and%2520Chen%2520Feng%26entry.1292438233%3DScene%2520change%2520detection%2520%2528SCD%2529%2520is%2520crucial%2520for%2520urban%2520monitoring%2520and%2520navigation%2520but%2520remains%2520challenging%2520in%2520real-world%2520environments%2520due%2520to%2520lighting%2520variations%252C%2520seasonal%2520shifts%252C%2520viewpoint%2520dif {"title": "Grounded Forcing: Bridging Time-Independent Semantics and Proximal Dynamics in Autoregressive Video Synthesis", "author": "Jintao Chen and Chengyu Bai and Junjun Hu and Xinda Xue and Mu Xu", "abstract": "Autoregressive video synthesis offers a promising pathway for infinite-horizon generation but is fundamentally hindered by three intertwined challenges: semantic forgetting from context limitations, visual drift due to positional extrapolation, and controllability loss during interactive instruction switching. Current methods often tackle these issues in isolation, limiting long-term coherence. We introduce Grounded Forcing, a novel framework that bridges time-independent semantics and proximal dynamics through three interlocking mechanisms. First, to address semantic forgetting, we propose a Dual Memory KV Cache that decouples local temporal dynamics from global semantic anchors, ensuring long-term semantic coherence and identity stability. Second, to suppress visual drift, we design Dual-Reference RoPE Injection, which confines positional embeddings within the training manifold while rendering global semantics time-invariant. Third, to resolve controllability issues, we develop Asymmetric Proximity Recache, which facilitates smooth semantic inheritance during prompt transitions via proximity-weighted cache updates. These components operate synergistically to tether the generative process to stable semantic cores while accommodating flexible local dynamics. Extensive experiments demonstrate that Grounded Forcing significantly enhances long-range consistency and visual stability, establishing a robust foundation for interactive long-form video synthesis.", "link": "http://arxiv.org/abs/2604.06939v2", "date": "2026-04-13", "relevancy": 2.372, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6095}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5814}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5811}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Grounded%20Forcing%3A%20Bridging%20Time-Independent%20Semantics%20and%20Proximal%20Dynamics%20in%20Autoregressive%20Video%20Synthesis&body=Title%3A%20Grounded%20Forcing%3A%20Bridging%20Time-Independent%20Semantics%20and%20Proximal%20Dynamics%20in%20Autoregressive%20Video%20Synthesis%0AAuthor%3A%20Jintao%20Chen%20and%20Chengyu%20Bai%20and%20Junjun%20Hu%20and%20Xinda%20Xue%20and%20Mu%20Xu%0AAbstract%3A%20Autoregressive%20video%20synthesis%20offers%20a%20promising%20pathway%20for%20infinite-horizon%20generation%20but%20is%20fundamentally%20hindered%20by%20three%20intertwined%20challenges%3A%20semantic%20forgetting%20from%20context%20limitations%2C%20visual%20drift%20due%20to%20positional%20extrapolation%2C%20and%20controllability%20loss%20during%20interactive%20instruction%20switching.%20Current%20methods%20often%20tackle%20these%20issues%20in%20isolation%2C%20limiting%20long-term%20coherence.%20We%20introduce%20Grounded%20Forcing%2C%20a%20novel%20framework%20that%20bridges%20time-independent%20semantics%20and%20proximal%20dynamics%20through%20three%20interlocking%20mechanisms.%20First%2C%20to%20address%20semantic%20forgetting%2C%20we%20propose%20a%20Dual%20Memory%20KV%20Cache%20that%20decouples%20local%20temporal%20dynamics%20from%20global%20semantic%20anchors%2C%20ensuring%20long-term%20semantic%20coherence%20and%20identity%20stability.%20Second%2C%20to%20suppress%20visual%20drift%2C%20we%20design%20Dual-Reference%20RoPE%20Injection%2C%20which%20confines%20positional%20embeddings%20within%20the%20training%20manifold%20while%20rendering%20global%20semantics%20time-invariant.%20Third%2C%20to%20resolve%20controllability%20issues%2C%20we%20develop%20Asymmetric%20Proximity%20Recache%2C%20which%20facilitates%20smooth%20semantic%20inheritance%20during%20prompt%20transitions%20via%20proximity-weighted%20cache%20updates.%20These%20components%20operate%20synergistically%20to%20tether%20the%20generative%20process%20to%20stable%20semantic%20cores%20while%20accommodating%20flexible%20local%20dynamics.%20Extensive%20experiments%20demonstrate%20that%20Grounded%20Forcing%20significantly%20enhances%20long-range%20consistency%20and%20visual%20stability%2C%20establishing%20a%20robust%20foundation%20for%20interactive%20long-form%20video%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06939v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGrounded%2520Forcing%253A%2520Bridging%2520Time-Independent%2520Semantics%2520and%2520Proximal%2520Dynamics%2520in%2520Autoregressive%2520Video%2520Synthesis%26entry.906535625%3DJintao%2520Chen%2520and%2520Chengyu%2520Bai%2520and%2520Junjun%2520Hu%2520and%2520Xinda%2520Xue%2520and%2520Mu%2520Xu%26entry.1292438233%3DAutoregressive%2520video%2520synthesis%2520offers%2520a%2520promising%2520pathway%2520for%2520infinite-horizon%2520generation%2520but%2520is%2520fundamentally%2520hindered%2520by%2520three%2520intertwined%2520challenges%253A%2520semantic%2520forgetting%2520from%2520context%2520limitations%252C%2520visual%2520drift%2520due%2520to%2520positional%2520extrapolation%252C%2520and%2520controllability%2520loss%2520during%2520interactive%2520instruction%2520switching.%2520Current%2520methods%2520often%2520tackle%2520these%2520issues%2520in%2520isolation%252C%2520limiting%2520long-term%2520coherence.%2520We%2520introduce%2520Grounded%2520Forcing%252C%2520a%2520novel%2520framework%2520that%2520bridges%2520time-independent%2520semantics%2520and%2520proximal%2520dynamics%2520through%2520three%2520interlocking%2520mechanisms.%2520First%252C%2520to%2520address%2520semantic%2520forgetting%252C%2520we%2520propose%25 {"title": "Think Before you Write: QA-Guided Reasoning for Character Descriptions in Books", "author": "Argyrios Papoudakis and Mirella Lapata and Frank Keller", "abstract": "Character description generation is an important capability for narrative-focused applications such as summarization, story analysis, and character-driven simulations. However, generating accurate character descriptions from long-form narratives (e.g., novels) is challenging: models must track evolving attributes (e.g., relationships and events), integrate evidence scattered across the text, and infer implicit details. Despite the success of reasoning-enabled LLMs on many benchmarks, we find that for character description generation their performance improves when built-in reasoning is disabled (i.e., an empty reasoning trace). Motivated by this, we propose a training framework that decouples reasoning from generation. Our approach, which can be applied on top of long-context LLMs or chunk-based methods, consists of a reasoning model that produces a structured QA reasoning trace and a generation model that conditions on this trace to produce the final character description. Experiments on two datasets (BookWorm and CroSS) show that QA-guided reasoning improves faithfulness, informativeness, and grounding over strong long-context baselines.", "link": "http://arxiv.org/abs/2604.11435v1", "date": "2026-04-13", "relevancy": 2.367, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4812}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4812}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think%20Before%20you%20Write%3A%20QA-Guided%20Reasoning%20for%20Character%20Descriptions%20in%20Books&body=Title%3A%20Think%20Before%20you%20Write%3A%20QA-Guided%20Reasoning%20for%20Character%20Descriptions%20in%20Books%0AAuthor%3A%20Argyrios%20Papoudakis%20and%20Mirella%20Lapata%20and%20Frank%20Keller%0AAbstract%3A%20Character%20description%20generation%20is%20an%20important%20capability%20for%20narrative-focused%20applications%20such%20as%20summarization%2C%20story%20analysis%2C%20and%20character-driven%20simulations.%20However%2C%20generating%20accurate%20character%20descriptions%20from%20long-form%20narratives%20%28e.g.%2C%20novels%29%20is%20challenging%3A%20models%20must%20track%20evolving%20attributes%20%28e.g.%2C%20relationships%20and%20events%29%2C%20integrate%20evidence%20scattered%20across%20the%20text%2C%20and%20infer%20implicit%20details.%20Despite%20the%20success%20of%20reasoning-enabled%20LLMs%20on%20many%20benchmarks%2C%20we%20find%20that%20for%20character%20description%20generation%20their%20performance%20improves%20when%20built-in%20reasoning%20is%20disabled%20%28i.e.%2C%20an%20empty%20reasoning%20trace%29.%20Motivated%20by%20this%2C%20we%20propose%20a%20training%20framework%20that%20decouples%20reasoning%20from%20generation.%20Our%20approach%2C%20which%20can%20be%20applied%20on%20top%20of%20long-context%20LLMs%20or%20chunk-based%20methods%2C%20consists%20of%20a%20reasoning%20model%20that%20produces%20a%20structured%20QA%20reasoning%20trace%20and%20a%20generation%20model%20that%20conditions%20on%20this%20trace%20to%20produce%20the%20final%20character%20description.%20Experiments%20on%20two%20datasets%20%28BookWorm%20and%20CroSS%29%20show%20that%20QA-guided%20reasoning%20improves%20faithfulness%2C%20informativeness%2C%20and%20grounding%20over%20strong%20long-context%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11435v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThink%2520Before%2520you%2520Write%253A%2 grounding%2520over%2520strong%2520long-context%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11435v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Think%20Before%20you%20Write%3A%20QA-Guided%20Reasoning%20for%20Character%20Descriptions%20in%20Books&entry.906535625=Argyrios%20Papoudakis%20and%20Mirella%20Lapata%20and%20Frank%20Keller&entry.1292438233=Character%20description%20generation%20is%20an%20important%20capability%20for%20narrative-focused%20applications%20such%20as%20summarization%2C%20story%20analysis%2C%20and%20character-driven%20simulations.%20However%2C%20generating%20accurate%20character%20descriptions%20from%20long-form%20narratives%20%28e.g.%2C%20novels%29%20is%20challenging%3A%20models%20must%20track%20evolving%20attributes%20%28e.g.%2C%20relationships%20and%20events%29%2C%20integrate%20evidence%20scattered%20across%20the%20text%2C%20and%20infer%20implicit%20details.%20Despite%20the%20success%20of%20reasoning-enabled%20LLMs%20on%20many%20benchmarks%2C%20we%20find%20that%20for%20character%20description%20generation%20their%20performance%20improves%20when%20built-in%20reasoning%20is%20disabled%20%28i.e.%2C%20an%20empty%20reasoning%20trace%29.%20Motivated%20by%20this%2C%20we%20propose%20a%20training%20framework%20that%20decouples%20reasoning%20from%20generation.%20Our%20approach%2C%20which%20can%20be%20applied%20on%20top%20of%20long-context%20LLMs%20or%20chunk-based%20methods%2C%20consists%20of%20a%20reasoning%20model%20that%20produces%20a%20structured%20QA%20reasoning%20trace%20and%20a%20generation%20model%20that%20conditions%20on%20this%20trace%20to%20produce%20the%20final%20character%20description.%20Experiments%20on%20two%20datasets%20%28BookWorm%20and%20CroSS%29%20show%20that%20QA-guided%20reasoning%20improves%20faithfulness%2C%20informativeness%2C%20and%20grounding%20over%20strong%20long-context%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2604.11435v1&entry.124074799=Read"},
{"title": "Pair2Scene: Learning Local Object Relations for Procedural Scene Generation", "author": "Xingjian Ran and Shujie Zhang and Weipeng Zhong and Li Luo and Bo Dai", "abstract": "Generating high-fidelity 3D indoor scenes remains a significant challenge due to data scarcity and the complexity of modeling intricate spatial relations. Current methods often struggle to scale beyond training distribution to dense scenes or rely on LLMs/VLMs that lack the ability for precise spatial reasoning. Building on top of the observation that object placement relies mainly on local dependencies instead of information-redundant global distributions, in this paper, we propose Pair2Scene, a novel procedural generation framework that integrates learned local rules with scene hierarchies and physics-based algorithms. These rules mainly capture two types of inter-object relations, namely support relations that follow physical hierarchies, and functional relations that reflect semantic links. We model these rules through a network, which estimates spatial position distributions of dependent objects conditioned on position and geometry of the anchor ones. Accordingly, we curate a dataset 3D-Pairs from existing scene data to train the model. During inference, our framework can generate scenes by recursively applying our model within a hierarchical structure, leveraging collision-aware rejection sampling to align local rules into coherent global layouts. Extensive experiments demonstrate that our framework outperforms existing methods in generating complex environments that go beyond training data while maintaining physical and semantic plausibility.", "link": "http://arxiv.org/abs/2604.11808v1", "date": "2026-04-13", "relevancy": 2.3508, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5898}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Script-a-Video: Deep Structured Audio-visual Captions via Factorized Streams and Relational Grounding", "author": " Tencent Hunyuan Team", "abstract": "Advances in Multimodal Large Language Models (MLLMs) are transforming video captioning from a descriptive endpoint into a semantic interface for both video understanding and generation. However, the dominant paradigm still casts videos as monolithic narrative paragraphs that entangle visual, auditory, and identity information. This dense coupling not only compromises representational fidelity but also limits scalability, since even local edits can trigger global rewrites. To address this structural bottleneck, we propose Multi-Stream Scene Script (MTSS), a novel paradigm that replaces monolithic text with factorized and explicitly grounded scene descriptions. MTSS is built on two core principles: Stream Factorization, which decouples a video into complementary streams (Reference, Shot, Event, and Global), and Relational Grounding, which reconnects these isolated streams through explicit identity and temporal links to maintain holistic video consistency. Extensive experiments demonstrate that MTSS consistently enhances video understanding across various models, achieving an average reduction of 25% in the total error rate on Video-SALMONN-2 and an average performance gain of 67% on the Daily-Omni reasoning benchmark. It also narrows the performance gap between smaller and larger MLLMs, indicating a substantially more learnable caption interface. Finally, even without architectural adaptation, replacing monolithic prompts with MTSS in multi-shot video generation yields substantial human-rated improvements: a 45% boost in cross-shot identity consistency, a 56% boost in audio-visual alignment, and a 71% boost in temporal controllability.", "link": "http://arxiv.org/abs/2604.11244v1", "date": "2026-04-13", "relevancy": 2.341, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5856}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5835}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Script-a-Video%3A%20Deep%20Structured%20Audio-visual%20Captions%20via%20Factorized%20Streams%20and%20Relational%20Grounding&body=Title%3A%20Script-a-Video%3A%20Deep%20Structured%20Audio-visual%20Captions%20via%20Factorized%20Streams%20and%20Relational%20Grounding%0AAuthor%3A%20%20Tencent%20Hunyuan%20Team%0AAbstract%3A%20Advances%20in%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20are%20transforming%20video%20captioning%20from%20a%20descriptive%20endpoint%20into%20a%20semantic%20interface%20for%20both%20video%20understanding%20and%20generation.%20However%2C%20the%20dominant%20paradigm%20still%20casts%20videos%20as%20monolithic%20narrative%20paragraphs%20that%20entangle%20visual%2C%20auditory%2C%20and%20identity%20information.%20This%20dense%20coupling%20not%20only%20compromises%20representational%20fidelity%20but%20also%20limits%20scalability%2C%20since%20even%20local%20edits%20can%20trigger%20global%20rewrites.%20To%20address%20this%20structural%20bottleneck%2C%20we%20propose%20Multi-Stream%20Scene%20Script%20%28MTSS%29%2C%20a%20novel%20paradigm%20that%20replaces%20monolithic%20text%20with%20factorized%20and%20explicitly%20grounded%20scene%20descriptions.%20MTSS%20is%20built%20on%20two%20core%20principles%3A%20Stream%20Factorization%2C%20which%20decouples%20a%20video%20into%20complementary%20streams%20%28Reference%2C%20Shot%2C%20Event%2C%20and%20Global%29%2C%20and%20Relational%20Grounding%2C%20which%20reconnects%20these%20isolated%20streams%20through%20explicit%20identity%20and%20temporal%20links%20to%20maintain%20holistic%20video%20consistency.%20Extensive%20experiments%20demonstrate%20that%20MTSS%20consistently%20enhances%20video%20understanding%20across%20various%20models%2C%20achieving%20an%20average%20reduction%20of%2025%25%20in%20the%20total%20error%20rate%20on%20Video-SALMONN-2%20and%20an%20average%20performance%20gain%20of%2067%25%20on%20the%20Daily-Omni%20reasoning%20benchmark.%20It%20also%20narrows%20the%20performance%20gap%20between%20smaller%20and%20larger%20MLLMs%2C%20indicating%20a%20substantially%20more%20learnable%20caption%20interface.%20Finally%2C%20even%20without%20architectural%20adaptation%2C%20replacing%20monolithic%20prompts%20with%20MTSS%20in%20multi-shot%20video%20generation%20yields%20substantial%20human-rated%20improvements%3A%20a%2045%25%20boost%20in%20cross-shot%20identity%20consistency%2C%20a%2056%25%20boost%20in%20audio-visual%20alignment%2C%20and%20a%2071%25%20boost%20in%20temporal%20controllability.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11244v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScript-a-Video%253A%2520Deep%2520Structured%2520Audio-visual%2520Captions%2520via%2520Factorized%2520Streams%2520and%2520Relational%2520Grounding%26entry.906535625%3D%2520Tencent%2520Hunyuan%2520Team%26entry.1292438233%3DAdvances%2520in%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520are%2520transforming%2520video%2520captioning%2520from%2520a%2520descriptive%2520endpoint%2520into%2520a%2520semantic%2520interface%2520for%2520both%2520video%2520understanding%2520and%2520generation.%2520However%252C%2520the%2520dominant%2520paradigm%2520still%2520casts%2520videos%2520as%2520monolithic%2520narrative%2520paragraphs%2520that%2520entangle%2520visual%252C%2520auditory%252C%2520and%2520identity%2520information.%2520This%2520dense%2520coupling%2520not%2520only%2520compromises%2520representational%2520fidelity%2520but%2 {"title": "Representations Before Pixels: Semantics-Guided Hierarchical Video Prediction", "author": "Efstathios Karypidis and Spyros Gidaris and Nikos Komodakis", "abstract": "Accurate future video prediction requires both high visual fidelity and consistent scene semantics, particularly in complex dynamic environments such as autonomous driving. We present Re2Pix, a hierarchical video prediction framework that decomposes forecasting into two stages: semantic representation prediction and representation-guided visual synthesis. Instead of directly predicting future RGB frames, our approach first forecasts future scene structure in the feature space of a frozen vision foundation model, and then conditions a latent diffusion model on these predicted representations to render photorealistic frames. This decomposition enables the model to focus first on scene dynamics and then on appearance generation. A key challenge arises from the train-test mismatch between ground-truth representations available during training and predicted ones used at inference. To address this, we introduce two conditioning strategies, nested dropout and mixed supervision, that improve robustness to imperfect autoregressive predictions. Experiments on challenging driving benchmarks demonstrate that the proposed semantics-first design significantly improves temporal semantic consistency, perceptual quality, and training efficiency compared to strong diffusion baselines. We provide the implementation code at https://github.com/Sta8is/Re2Pix", "link": "http://arxiv.org/abs/2604.11707v1", "date": "2026-04-13", "relevancy": 2.3361, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6182}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5772}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5772}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representations%20Before%20Pixels%3A%20Semantics-Guided%20Hierarchical%20Video%20Prediction&body=Title%3A%20Representations%20Before%20Pixels%3A%20Semantics-Guided%20Hierarchical%20Video%20Prediction%0AAuthor%3A%20Efstathios%20Karypidis%20and%20Spyros%20Gidaris%20and%20Nikos%20Komodakis%0AAbstract%3A%20Accurate%20future%20video%20prediction%20requires%20both%20high%20visual%20fidelity%20and%20consistent%20scene%20semantics%2C%20particularly%20in%20complex%20dynamic%20environments%20such%20as%20autonomous%20driving.%20We%20present%20Re2Pix%2C%20a%20hierarchical%20video%20prediction%20framework%20that%20decomposes%20forecasting%20into%20two%20stages%3A%20semantic%20representation%20prediction%20and%20representation-guided%20visual%20synthesis.%20Instead%20of%20directly%20predicting%20future%20RGB%20frames%2C%20our%20approach%20first%20forecasts%20future%20scene%20structure%20in%20the%20feature%20space%20of%20a%20frozen%20vision%20foundation%20model%2C%20and%20then%20conditions%20a%20latent%20diffusion%20model%20on%20these%20predicted%20representations%20to%20render%20photorealistic%20frames.%20This%20decomposition%20enables%20the%20model%20to%20focus%20first%20on%20scene%20dynamics%20and%20then%20on%20appearance%20generation.%20A%20key%20challenge%20arises%20from%20the%20train-test%20mismatch%20between%20ground-truth%20representations%20available%20during%20training%20and%20predicted%20ones%20used%20at%20inference.%20To%20address%20this%2C%20we%20introduce%20two%20conditioning%20strategies%2C%20nested%20dropout%20and%20mixed%20supervision%2C%20that%20improve%20robustness%20to%20imperfect%20autoregressive%20predictions.%20Experiments%20on%20challenging%20driving%20benchmarks%20demonstrate%20that%20the%20proposed%20semantics-first%20design%20significantly%20improves%20temporal%20semantic%20consistency%2C%20perceptual%20quality%2C%20and%20training%20efficiency%20compared%20to%20strong%20diffusion%20baselines.%20We%20provide%20the%20implementation%20code%20at%20https%3A//github.com/Sta8is/Re2Pix%0ALink%3A%20http%3A//arxiv.org/abs/2604.11707v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresentations%2520Before%2520Pixels%253A%2520Semantics-Guided%2520Hierarchical%2520Video%2520Prediction%26entry.906535625%3DEfstathios%2520Karypidis%2520and%2520Spyros%2520Gidaris%2520and%2520Nikos%2520Komodakis%26entry.1292438233%3DAccurate%2520future%2520video%2520prediction%2520requires%2520both%2520high%2520visual%2520fidelity%2520and%2520consistent%2520scene%2520semantics%252C%2520particularly%2520in%2520complex%2520dynamic%2520environments%2520such%2520as%2520autonomous%2520driving.%2520We%2520present%2520Re2Pix%252C%2520a%2520hierarchical%2520video%2520prediction%2520framework%2520that%2520decomposes%2520forecasting%2520into%2520two%2520stages%253A%2520semantic%2520representation%2520prediction%2520and%2520representation-guided%2520visual%2520synthesis.%2520Instead%2520of%2520directly%2520predicting%2520future%2520RGB%2520frames%252C%2520our%2520approach%2520first%2520forecasts%2520future%2520scene%2520structure%2520in%2520the%2520feature%2520space%2520of%2520a%2520frozen%2520vision%2520foundation%2520model%252C%2520and%2520then%2520conditions%2520a%2520latent%2520diffusion%2520model%2520on%2520these%2520predicted%2520representations%2520to%2520render%2520photorealistic%2520frames.%2520This%2520decomposition%2520enables%2520the%2520model%2520to%2520focus%2520first%2520on%2520scene%2520dynamics%2520and%2520then%2520on%2520appearance%2520generation.%2520A%2520key%2520challenge%2520arises%2520from%2520the%2520train-test%2520mismatch%2520between%2520ground-truth%2520representations%2520available%2520during%2520training%2520and%2520predicted%2520ones%2520used%2520at%2520inference.%2520To%2520address%2520this%252C%2520we%2520introduce%2520two%2520conditioning%2520strategies%252C%2520nested%2520dropout%2520and%2520mixed%2520supervision%252C%2520that%2520improve%2520robustness%2520to%2520imperfect%2520autoregressive%2520predictions.%2520Experiments%2520on%2520challenging%2520driving%2520benchmarks%2520demonstrate%2520that%2520the%2520proposed%2520semantics-first%2520design%2520significantly%2520improves%2520temporal%2520semantic%2520consistency%252C%2520perceptual%2520quality%252C%2520and%2520training%2520efficiency%2520compared%2520to%2520strong%2520diffusion%2520baselines.%2520We%2520provide%2520the%2520implementation%2520code%2520at%2520https%253A//github.com/Sta8is/Re2Pix%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11707v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Representations%20Before%20Pixels%3A%20Semantics-Guided%20Hierarchical%20Video%20Prediction&entry.906535625=Efstathios%20Karypidis%20and%20Spyros%20Gidaris%20and%20Nikos%20Komodakis&entry.1292438233=Accurate%20future%20video%20prediction%20requires%20both%20high%20visual%20fidelity%20and%20consistent%20scene%20semantics%2C%20particularly%20in%20complex%20dynamic%20environments%20such%20as%20autonomous%20driving.%20We%20present%20Re2Pix%2C%20a%20hierarchical%20video%20prediction%20framework%20that%20decomposes%20forecasting%20into%20two%20stages%3A%20semantic%20representation%20prediction%20and%20representation-guided%20visual%20synthesis.%20Instead%20of%20directly%20predicting%20future%20RGB%20frames%2C%20our%20approach%20first%20forecasts%20future%20scene%20structure%20in%20the%20feature%20space%20of%20a%20frozen%20vision%20foundation%20model%2C%20and%20then%20conditions%20a%20latent%20diffusion%20model%20on%20these%20predicted%20representations%20to%20render%20photorealistic%20frames.%20This%20decomposition%20enables%20the%20 {"title": "Mycelium-Index: A Streaming Approximate Nearest Neighbor Index with Myelial Edge Decay, Traffic-Driven Reinforcement, and Adaptive Living Hierarchy", "author": "Anton Pakhunov", "abstract": "We present mycelium-index, a streaming approximate nearest neighbor (ANN) index for high-dimensional vector spaces, inspired by the adaptive growth patterns of biological mycelium. The system continuously adapts its topology through myelial edge decay and reinforcement, a traffic-driven living hierarchy, and hybrid deletion combining O(1) bypass for cold nodes with O(k) beam-search repair for hub nodes. Experimental evaluation on SIFT-1M demonstrates that mycelium achieves 0.927 +/- 0.028 recall@5 under FreshDiskANN's 100%-turnover benchmark protocol -- within the measurement confidence interval of FreshDiskANN's ~0.95 -- while using 5.7x less RAM (88 MB vs. >500 MB) and achieving 4.7x higher QPS (2,795 vs. ~600). On the static index, at ef=192, mycelium matches HNSW M=16 recall (0.962 vs. 0.965) at 5.2x less RAM (163 MB vs. 854 MB). Performance optimizations including NEON SIMD distance computation, Vec-backed node storage, and bitset visited tracking yield a cumulative 2.7x QPS improvement. A systematic study of ten streaming repair mechanisms finds that geometric heuristics universally fail in high dimensions, while topological mechanisms succeed -- a principle we term the topological repair invariance of high-dimensional ANN graphs.", "link": "http://arxiv.org/abs/2604.11274v1", "date": "2026-04-13", "relevancy": 2.3107, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4933}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4605}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4326}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mycelium-Index%3A%20A%20Streaming%20Approximate%20Nearest%20Neighbor%20Index%20with%20Myelial%20Edge%20Decay%2C%20Traffic-Driven%20Reinforcement%2C%20and%20Adaptive%20Living%20Hierarchy&body=Title%3A%20Mycelium-Index%3A%20A%20Streaming%20Approximate%20Nearest%20Neighbor%20Index%20with%20Myelial%20Edge%20Decay%2C%20Traffic-Driven%20Reinforcement%2C%20and%20Adaptive%20Living%20Hierarchy%0AAuthor%3A%20Anton%20Pakhunov%0AAbstract%3A%20We%20present%20mycelium-index%2C%20a%20streaming%20approximate%20nearest%20neighbor%20%28ANN%29%20index%20for%20high-dimensional%20vector%20spaces%2C%20inspired%20by%20the%20adaptive%20growth%20patterns%20of%20biological%20mycelium.%20The%20system%20continuously%20adapts%20its%20topology%20through%20myelial%20edge%20decay%20and%20reinforcement%2C%20a%20traffic-driven%20living%20hierarchy%2C%20and%20hybrid%20deletion%20combining%20O%281%29%20bypass%20for%20cold%20nodes%20with%20O%28k%29%20beam-search%20repair%20for%20hub%20nodes.%20Experimental%20evaluation%20on%20SIFT-1M%20demonstrates%20that%20mycelium%20achieves%200.927%20%2B/-%200.028%20recall%405%20under%20FreshDiskANN%27s%20100%25-turnover%20benchmark%20protocol%20--%20within%20the%20measurement%20confidence%20interval%20of%20FreshDiskANN%27s%20~0.95%20--%20while%20using%205.7x%20less%20RAM%20%2888%20MB%20vs.%20%3E500%20MB%29%20and%20achieving%204.7x%20higher%20QPS%20%282%2C795%20vs.%20~600%29.%20On%20the%20static%20index%2C%20at%20ef%3D192%2C%20mycelium%20matches%20HNSW%20M%3D16%20recall%20%280.962%20vs.%200.965%29%20at%205.2x%20less%20RAM%20%28163%20MB%20vs.%20854%20MB%29.%20Performance%20optimizations%20including%20NEON%20SIMD%20distance%20computation%2C%20Vec-backed%20node%20storage%2C%20and%20bitset%20visited%20tracking%20yield%20a%20cumulative%202.7x%20QPS%20improvement.%20A%20systematic%20study%20of%20ten%20streaming%20repair%20mechanisms%20finds%20that%20geometric%20heuristics%20universally%20fail%20in%20high%20dimensions%2C%20while%20topological%20mechanisms%20succeed%20--%20a%20principle%20we%20term%20the%20topological%20repair%20invariance%20of%20high-dimensional%20ANN%20graphs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11274v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMycelium-Index%253A%2520A%2520Streaming%2520Approximate%2520Nearest%2520Neighbor%2520Index%2520with%2520Myelial%2520Edge%2520Decay%252C%2520Traffic-Driven%2520Reinforcement%252C%2520and%2520Adaptive%2520Living%2520Hierarchy%26entry.906535625%3DAnton%2520Pakhunov%26entry.1292438233%3DWe%2520present%2520mycelium-index%252C%2520a%2520streaming%2520approximate%2520nearest%2520neighbor%2520%2528ANN%2529%2520index%2520for%2520high-dimensional%2520vector%2520spaces%252C%2520inspired%2520by%2520the%2520adaptive%2520growth%2520patterns%2520of%2520biological%2520mycelium.%2520The%2520system%2520continuously%2520adapts%2520its%2520topology%2520through%2520myelial%2520edge%2520decay%2520and%2520reinforcement%252C%2520a%2520traffic-driven%2520living%2520hierarchy%252C%2520and%2520hybrid%2520deletion%2520combining%2520O%25281%2529%2520bypass%2520for%2520cold%2520nodes%2520with%2520O%2528k%2529%2520beam-search%2520repair%2520for%2520hub%2520nodes.%2520Experimental%2520evaluation%2520on%2520SIFT-1M%2520demonstrates%2520that%2520mycelium%2520achieves%25200.927%2520%252B/-%25200.028%2520recall%25405%2520under%2520FreshDiskANN%2527s%2520100%2525-turnover%2520benchmark%2520protocol%2520--%2520within%2520the%2520measurement%2520confidence%2520interval%2520of%2520FreshDiskANN%2527s%2520~0.95%2520--%2520while%2520using%25205.7x%2520less%2520RAM%2520%252888%2520MB%2520vs.%2520%253E500%2520MB%2529%2520and%2520achieving%25204.7x%2520higher%2520QPS%2520%25282%252C795%2520vs.%2520~600%2529.%2520On%2520the%2520static%2520index%252C%2520at%2520ef%253D192%252C%2520mycelium%2520matches%2520HNSW%2520M%253D16 {"title": "Safe Human-to-Humanoid Motion Imitation Using Control Barrier Functions", "author": "Wenqi Cai and John Abanes and Nikolaos Evangeliou and Anthony Tzes", "abstract": "Ensuring operational safety is critical for human-to-humanoid motion imitation. This paper presents a vision-based framework that enables a humanoid robot to imitate human movements while avoiding collisions. Human skeletal keypoints are captured by a single camera and converted into joint angles for motion retargeting. Safety is enforced through a Control Barrier Function (CBF) layer formulated as a Quadratic Program (QP), which filters imitation commands to prevent both self-collisions and human-robot collisions. Simulation results validate the effectiveness of the proposed framework for real-time collision-aware motion imitation.", "link": "http://arxiv.org/abs/2604.11447v1", "date": "2026-04-13", "relevancy": 2.3101, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5981}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5685}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Safe%20Human-to-Humanoid%20Motion%20Imitation%20Using%20Control%20Barrier%20Functions&body=Title%3A%20Safe%20Human-to-Humanoid%20Motion%20Imitation%20Using%20Control%20Barrier%20Functions%0AAuthor%3A%20Wenqi%20Cai%20and%20John%20Abanes%20and%20Nikolaos%20Evangeliou%20and%20Anthony%20Tzes%0AAbstract%3A%20Ensuring%20operational%20safety%20is%20critical%20for%20human-to-humanoid%20motion%20imitation.%20This%20paper%20presents%20a%20vision-based%20framework%20that%20enables%20a%20humanoid%20robot%20to%20imitate%20human aware%2520motion%2520imitation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11447v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Safe%20Human-to-Humanoid%20Motion%20Imitation%20Using%20Control%20Barrier%20Functions&entry.906535625=Wenqi%20Cai%20and%20John%20Abanes%20and%20Nikolaos%20Evangeliou%20and%20Anthony%20Tzes&entry.1292438233=Ensuring%20operational%20safety%20is%20critical%20for%20human-to-humanoid%20motion%20imitation.%20This%20paper%20presents%20a%20vision-based%20framework%20that%20enables%20a%20humanoid%20robot%20to%20imitate%20human%20movements%20while%20avoiding%20collisions.%20Human%20skeletal%20keypoints%20are%20captured%20by%20a%20single%20camera%20and%20converted%20into%20joint%20angles%20for%20motion%20retargeting.%20Safety%20is%20enforced%20through%20a%20Control%20Barrier%20Function%20%28CBF%29%20layer%20formulated%20as%20a%20Quadratic%20Program%20%28QP%29%2C%20which%20filters%20imitation%20commands%20to%20prevent%20both%20self-collisions%20and%20human-robot%20collisions.%20Simulation%20results%20validate%20the%20effectiveness%20of%20the%20proposed%20framework%20for%20real-time%20collision-aware%20motion%20imitation.&entry.1838667208=http%3A//arxiv.org/abs/2604.11447v1&entry.124074799=Read"},
{"title": "AtlasKV: Augmenting LLMs with Billion-Scale Knowledge Graphs in 20GB VRAM", "author": "Haoyu Huang and Hong Ting Tsang and Jiaxin Bai and Xi Peng and Gong Zhang and Yangqiu Song", "abstract": "Retrieval-augmented generation (RAG) has shown some success in augmenting large language models (LLMs) with external knowledge. However, as a non-parametric knowledge integration paradigm for LLMs, RAG methods heavily rely on external retrieval modules and the retrieved textual context prior. Especially for very large scale knowledge augmentation, they would introduce substantial inference latency due to expensive searches and much longer relevant context. In this paper, we propose a parametric knowledge integration method, called \\textbf{AtlasKV}, a scalable, effective, and general way to augment LLMs with billion-scale knowledge graphs (KGs) (e.g. 1B triples) using very little GPU memory cost (e.g. less than 20GB VRAM). In AtlasKV, we introduce KG2KV and HiKVP to integrate KG triples into LLMs at scale with sub-linear time and memory complexity. It maintains strong knowledge grounding and generalization performance using the LLMs' inherent attention mechanism, and requires no external retrievers, long context priors, or retraining when adapting to new knowledge.", "link": "http://arxiv.org/abs/2510.17934v2", "date": "2026-04-13", "relevancy": 2.3074, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4853}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4582}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.441}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AtlasKV%3A%20Augmenting%20LLMs%20with%20Billion-Scale%20Knowledge%20Graphs%20in%2020GB%20VRAM&body=Title%3A%20AtlasKV%3A%20Augmenting%20LLMs%20with%20Billion-Scale%20Knowledge%20Graphs%20in%2020GB%20VRAM%0AAuthor%3A%20Haoyu%20Huang%20and%20Hong%20Ting%20Tsang%20and%20Jiaxin%20Bai%20and%20Xi%20Peng%20and%20Gong%20Zhang%20and%20Yangqiu%20Song%0AAbstract%3A%20Retrieval-augmented%20generation%20%28RAG%29%20has%20shown%20some%20success%20in%20augmenting%20large%20language%20models%20%28LLMs%29%20with%20external%20knowledge.%20However%2C%20as%20a%20non-parametric%20knowledge%20integration%20paradigm%20for%20LLMs%2C%20RAG%20methods%20heavily%20rely%20on%20external%20retrieval%20modules%20and%20the%20retrieved%20textual%20context%20prior.%20Especially%20for%20very%20large%20scale%20knowledge%20augmentation%2C%20they%20would%20introduce%20substantial%20inference%20latency%20due%20to%20expensive%20searches%20and%20much%20longer%20relevant%20context.%20In%20this%20paper%2C%20we%20propose%20a%20parametric%20knowledge%20integration%20method%2C%20called%20%5Ctextbf%7BAtlasKV%7D%2C%20a%20scalable%2C%20effective%2C%20and%20general%20way%20to%20augment%20LLMs%20with%20billion-scale%20knowledge%20graphs%20%28KGs%29%20%28e.g.%201B%20triples%29%20using%20very%20little%20GPU%20memory%20cost%20%28e.g.%20less%20than%2020GB%20VRAM%29.%20In%20AtlasKV%2C%20we%20introduce%20KG2KV%20and%20HiKVP%20to%20integrate%20KG%20triples%20into%20LLMs%20at%20scale%20with%20sub-linear%20time%20and%20memory%20complexity.%20It%20maintains%20strong%20knowledge%20grounding%20and%20generalization%20performance%20using%20the%20LLMs%27%20inherent%20attention%20mechanism%2C%20and%20requires%20no%20external%20retrievers%2C%20long%20context%20priors%2C%20or%20retraining%20when%20adapting%20to%20new%20knowledge.%0ALink%3A%20http%3A//arxiv.org/abs/2510.17934v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAtlasKV%253A%2520Augmenting%2520LLMs%2520with%2520Billion-Scale%2520Knowledge%2520Graphs%2520in%252020GB%2520VRAM%26entry.906535625%3DHaoyu%2520Huang%2520and%2520Hong%2520Ting%2520Tsang%2520and%2520Jiaxin%2520Bai%2520and%2520Xi%2520Peng%2520and%2520Gong%2520Zhang%2520and%2520Yangqiu%2520Song%26entry.1292438233%3DRetrieval-augmented%2520generation%2520%2528RAG%2529%2520has%2520shown%2520some%2520success%2520in%2520augmenting%2520large%2520language%2520models%2520%2528LLMs%2529%2520with%2520external%2520knowledge.%2520However%252C%2520as%2520a%2520non-parametric%2520knowledge%2520integration%2520paradigm%2520for%2520LLMs%252C%2520RAG%2520methods%2520heavily%2520rely%2520on%2520external%2520retrieval%2520modules%2520and%2520the%2520retrieved%2520textual%2520context%2520prior.%2520Especially%2520for%2520very%2520large%2520scale%2520knowledge%2520augmentation%252C%2520they%2520would%2520introduce%2520substantial%2520inference%2520latency%2520due%2520to%2520expensive%2520searches%2520and%2520much%2520longer%2520relevant%2520context.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520parametric%2520knowledge%2520integration%2520method%252C%2520called%2520%255Ctextbf%257BAtlasKV%257D%252C%2520a%2520scalable%252C%2520effective%252C%2520and%2520general%2520way%2520to%2520augment%2520LLMs%2520with%2520billion-scale%2520knowledge%2520graphs%2520%2528KGs%2529%2520%2528e.g.%25201B%2520triples%2529%2520using%2520very%2520little%2520GPU%2520memory%2520cost%2520%2528e.g.%2520less%2520than%252020GB%2520VRAM%2529.%2520In%2520AtlasKV%252C%2520we%2520introduce%2520KG2KV%2520and%2520HiKVP%2520to%2520integrate%2520KG%2520triples%2520into%2520LLMs%2520at%2520scale%2520with%2520sub-linear%2520time%2520and%2520memory%2520complexity.%2520It%2520maintains%2520strong%2520knowledge%2520grounding%2520and%2520generalization%2520performance%2520using%2520the%2520LLMs%2527%2520inherent%2520attention%2520mechanism%252C%2520and%2520requires%2520no%2520external%2520retrievers%252C%2520long%2520context%2520priors%252C%2520or%2520retraining%2520when%2520adapting%2520to%2520new%2520knowledge.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.17934v2%26 {"title": "Semantic Segmentation Algorithm Based on Light Field and LiDAR Fusion", "author": "Jie Luo and Yuxuan Jiang and Xin Jin and Mingyu Liu and Yihui Fan", "abstract": "Semantic segmentation serves as a cornerstone of scene understanding in autonomous driving but continues to face significant challenges under complex conditions such as occlusion. Light field and LiDAR modalities provide complementary visual and spatial cues that are beneficial for robust perception; however, their effective integration is hindered by limited viewpoint diversity and inherent modality discrepancies. To address these challenges, the first multimodal semantic segmentation dataset integrating light field data and point cloud data is proposed. Based on this dataset, we proposed a multi-modal light field point-cloud fusion segmentation network(Mlpfseg), incorporating feature completion and depth perception to segment both camera images and LiDAR point clouds simultaneously. The feature completion module addresses the density mismatch between point clouds and image pixels by performing differential reconstruction of point-cloud feature maps, enhancing the fusion of these modalities. The depth perception module improves the segmentation of occluded objects by reinforcing attention scores for better occlusion awareness. Our method outperforms image-only segmentation by 1.71 Mean Intersection over Union(mIoU) and point cloud-only segmentation by 2.38 mIoU, demonstrating its effectiveness.", "link": "http://arxiv.org/abs/2510.06687v2", "date": "2026-04-13", "relevancy": 2.3047, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5899}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5895}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20Segmentation%20Algorithm%20Based%20on%20Light%20Field%20and%20LiDAR%20Fusion&body=Title%3A%20Semantic%20Segmentation%20Algorithm%20Based%20on%20Light%20Field%20and%20LiDAR%20Fusion%0AAuthor%3A%20Jie%20Luo%20and%20Yuxuan%20Jiang%20and%20Xin%20Jin%20and%20Mingyu%20Liu%20and%20Yihui%20Fan%0AAbstract%3A%20Semantic%20segmentation%20serves%20as%20a%20cornerstone%20of%20scene%20understanding%20in%20autonomous%20driving%20but%20continues%20to%20face%20significant%20challenges%20under%20complex%20conditions%20such%20as%20occlusion.%20Light%20field%20and%20LiDAR%20modalities%20provide%20complementary%20visual%20and%20spatial%20cues%20that%20are%20beneficial%20for%20robust%20perception%3B%20however%2C%20their%20effective%20integration%20is%20hindered%20by%20limited%20viewpoint%20diversity%20and%20inherent%20modality%20discrepancies.%20To%20address%20these%20challenges%2C%20the%20first%20multimodal%20semantic%20segmentation%20dataset%20integrating%20light%20field%20data%20and%20point%20cloud%20data%20is%20proposed.%20Based%20on%20this%20dataset%2C%20we%20proposed%20a%20multi-modal%20light%20field%20point-cloud%20fusion%20segmentation%20network%28Mlpfseg%29%2C%20incorporating%20feature%20completion%20and%20depth%20perception%20to%20segment%20both%20camera%20images%20and%20LiDAR%20point%20clouds%20simultaneously.%20The%20feature%20completion%20module%20addresses%20the%20density%20mismatch%20between%20point%20clouds%20and%20image%20pixels%20by%20performing%20differential%20reconstruction%20of%20point-cloud%20feature%20maps%2C%20enhancing%20the%20fusion%20of%20these%20modalities.%20The%20depth%20perception%20module%20improves%20the%20segmentation%20of%20occluded%20objects%20by%20reinforcing%20attention%20scores%20for%20better%20occlusion%20awareness.%20Our%20method%20outperforms%20image-only%20segmentation%20by%201.71%20Mean%20Intersection%20over%20Union%28mIoU%29%20and%20point%20cloud-only%20segmentation%20by%202.38%20mIoU%2C%20demonstrating%20its%20effectiveness.%0ALink%3A%20http%3A//arxiv.org/abs/2510.06687v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic%2520Segmentation%2520Algorithm%2520Based%2520on%2520Light%2520Field%2520and%2520LiDAR%2520Fusion%26entry.906535625%3DJie%2520Luo%2520and%2520Yuxuan%2520Jiang%2520and%2520Xin%2520Jin%2520and%2520Mingyu%2520Liu%2520and%2520Yihui%2520Fan%26entry.1292438233%3DSemantic%2520segmentation%2520serves%2520as%2520a%2520cornerstone%2520of%2520scene%2520understanding%2520in%2520autonomous%2520driving%2520but%2520continues%2520to%2520face%2520significant%2520challenges%2520under%2520complex%2520conditions%2520such%2520as%2520occlusion.%2520Light%2520field%2520and%2520LiDAR%2520modalities%2520provide%2520complementary%2520visual%2520and%2520spatial%2520cues%2520that%2520are%2520beneficial%2520for%2520robust%2520perception%253B%2520however%252C%2520their%2520effective%2520integration%2520is%2520hindered%2520by%2520limited%2520viewpoint%2520diversity%2520and%2520inherent%2520modality%2520discrepancies.%2520To%2520address%2520these%2520challenges%252C%2520the%2520first%2520multimodal%2520semantic%2520segmentation%2520dataset%2520integrating%2520light%2520field%2520data%2520and%2520point%2520cloud%2520data%2520is%2520proposed.%2520Based%2520on%2520this%2520dataset%252C%2520we%2520proposed%2520a%2520multi-modal%2520light%2520field%2520point-cloud%2520fusion%2520segmentation%2520network%2528Mlpfseg%2529%252C%2520incorporating%2520feature%2520completion%2520and%2520depth%2520perception%2520to%2520segment%2520both%2520camera%2520images%2520and%2520LiDAR%2520point%2520clouds%2520simultaneously.%2520The%2520feature%2520completion%2520module%2520addresses%2520the%2520density%2520mismatch%2520between%2520point%2520clouds%2520and%252

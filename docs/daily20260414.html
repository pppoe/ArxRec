{"title": "Representation-Aligned Multi-Scale Personalization for Federated Learning", "author": "Wenfei Liang and Wee Peng Tay", "abstract": "In federated learning (FL), accommodating clients with diverse resource constraints remains a significant challenge. A widely adopted approach is to use a shared full-size model, from which each client extracts a submodel aligned with its computational budget. However, regardless of the specific scoring strategy, these methods rely on the same global backbone, limiting both structural diversity and representational adaptation across clients. This paper presents FRAMP, a unified framework for personalized and resource-adaptive federated learning. Instead of relying on a fixed global model, FRAMP generates client-specific models from compact client descriptors, enabling fine-grained adaptation to both data characteristics and computational budgets. Each client trains a tailored lightweight submodel and aligns its learned representation with others to maintain global semantic consistency. Extensive experiments on vision and graph benchmarks demonstrate that FRAMP enhances generalization and adaptivity across a wide range of client settings.", "link": "http://arxiv.org/abs/2604.11278v1", "date": "2026-04-13", "relevancy": 2.5666, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5485}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4959}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4956}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representation-Aligned%20Multi-Scale%20Personalization%20for%20Federated%20Learning&body=Title%3A%20Representation-Aligned%20Multi-Scale%20Personalization%20for%20Federated%20Learning%0AAuthor%3A%20Wenfei%20Liang%20and%20Wee%20Peng%20Tay%0AAbstract%3A%20In%20federated%20learning%20%28FL%29%2C%20accommodating%20clients%20with%20diverse%20resource%20constraints%20remains%20a%20significant%20challenge.%20A%20widely%20adopted%20approach%20is%20to%20use%20a%20shared%20full-size%20model%2C%20from%20which%20each%20client%20extracts%20a%20submodel%20aligned%20with%20its%20computational%20budget.%20However%2C%20regardless%20of%20the%20specific%20scoring%20strategy%2C%20these%20methods%20rely%20on%20the%20same%20global%20backbone%2C%20limiting%20both%20structural%20diversity%20and%20representational%20adaptation%20across%20clients.%20This%20paper%20presents%20FRAMP%2C%20a%20unified%20framework%20for%20personalized%20and%20resource-adaptive%20federated%20learning.%20Instead%20of%20relying%20on%20a%20fixed%20global%20model%2C%20FRAMP%20generates%20client-specific%20models%20from%20compact%20client%20descriptors%2C%20enabling%20fine-grained%20adaptation%20to%20both%20data%20characteristics%20and%20computational%20budgets.%20Each%20client%20trains%20a%20tailored%20lightweight%20submodel%20and%20aligns%20its%20learned%20representation%20with%20others%20to%20maintain%20global%20semantic%20consistency.%20Extensive%20experiments%20on%20vision%20and%20graph%20benchmarks%20demonstrate%20that%20FRAMP%20enhances%20generalization%20and%20adaptivity%20across%20a%20wide%20range%20of%20client%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11278v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresentation-Aligned%2520Multi-Scale%2520Personalization%2520for%2520Federated%2520Learning%26entry.906535625%3DWenfei%2520Liang%2520and%2520Wee%2520Peng%2520Tay%26entry.1292438233%3DIn%2520federated%2520learning%2520%2528FL%2529%252C%2520accommodating%2520clients%2520with%2520diverse%2520resource%2520constraints%2520remains {"title": "Observe Less, Understand More: Cost-aware Cross-scale Observation for Remote Sensing Understanding", "author": "Zhenghao Xie and Jing Xiao and Zhenqi Wang and Kexin Ma and Liang Liao and Gui-Song Xia and Mi Wang", "abstract": "Remote sensing understanding inherently requires multi-resolution observation, since different targets and application tasks demand different levels of spatial detail. While low-resolution (LR) imagery enables efficient global observation, high-resolution (HR) imagery provides critical local details at much higher acquisition cost and limited coverage. This motivates a cross-scale sensing strategy that selectively acquires HR imagery from LR-based global perception to improve task performance under constrained cost. Existing methods for HR sampling methods typically make selection decisions from isolated LR patches, which ignore fine-grained intra-patch importance and cross-patch contextual interactions, leading to fragmented feature representation and suboptimal scene reasoning under sparse HR observations. To address this issue, we formulate cross-scale remote sensing understanding as a unified cost-aware problem that couples fine-grained HR sampling with cross-patch representation prediction, enabling more effective task reasoning with fewer HR observations. Furthermore, we present GL-10M, a large-scale benchmark of 10 million spatially aligned multi-resolution images, enabling systematic evaluation of budget-constrained cross-scale reasoning in remote sensing. Extensive experiments on recognition and retrieval tasks show that our method consistently achieves a superior performance-cost trade-off.", "link": "http://arxiv.org/abs/2604.11415v1", "date": "2026-04-13", "relevancy": 2.5647, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5131}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "Legal2LogicICL: Improving Generalization in Transforming Legal Cases to Logical Formulas via Diverse Few-Shot Learning", "author": "Jieying Xue and Phuong Minh Nguyen and Ha Thanh Nguyen and May Myo Zin and Ken Satoh", "abstract": "This work aims to improve the generalization of logic-based legal reasoning systems by integrating recent advances in NLP with legal-domain adaptive few-shot learning techniques using LLMs. Existing logic-based legal reasoning pipelines typically rely on fine-tuned models to map natural-language legal cases into logical formulas before forwarding them to a symbolic reasoner. However, such approaches are heavily constrained by the scarcity of high-quality annotated training data. To address this limitation, we propose a novel LLM-based legal reasoning framework that enables effective in-context learning through retrieval-augmented generation. Specifically, we introduce Legal2LogicICL, a few-shot retrieval framework that balances diversity and similarity of exemplars at both the latent semantic representation level and the legal text structure level. In addition, our method explicitly accounts for legal structure by mitigating entity-induced retrieval bias in legal texts, where lengthy and highly specific entity mentions often dominate semantic representations and obscure legally meaningful reasoning patterns. Our Legal2LogicICL constructs informative and robust few-shot demonstrations, leading to accurate and stable logical rule generation without requiring additional training. In addition, we construct a new dataset, named Legal2Proleg, which is annotated with alignments between legal cases and PROLEG logical formulas to support the evaluation of legal semantic parsing. Experimental results on both open-source and proprietary LLMs demonstrate that our approach significantly improves accuracy, stability, and generalization in transforming natural-language legal case descriptions into logical representations, highlighting its effectiveness for interpretable and reliable legal reasoning. Our code is available at https://github.com/yingjie7/Legal2LogicICL.", "link": "http://arxiv.org/abs/2604.11699v1", "date": "2026-04-13", "relevancy": 2.5613, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.524}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5099}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5028}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Legal2LogicICL%3A%20Improving%20Generalization%20in%20Transforming%20Legal%20Cases%20to%20Logical%20Formulas%20via%20Diverse%20Few-Shot%20Learning&body=Title%3A%20Legal2LogicICL%3A%20Improving%20Generalization%20in%20Transforming%20Legal%20Cases%20to%20Logical%20Formulas%20via%20Diverse%20Few-Shot%20Learning%0AAuthor%3A%20Jieying%20Xue%20and%20Phuong%20Minh%20Nguyen%20and%20Ha%20Thanh%20Nguyen%20and%20May%20Myo%20Zin%20and%20Ken%20Satoh%0AAbstract%3A%20This%20work%20aims%20to%20improve%20the%20generalization%20of%20logic-based%20legal%20reasoning%20systems%20by%20integrating%20recent%20advances%20in%20NLP%20with%20legal-domain%20adaptive%20few-shot%20learning%20techniques%20using%20LLMs.%20Existing%20logic-based%20legal%20reasoning%20pipelines%20typically%20rely%20on%20fine-tuned%20models%20to%20map%20natural-language%20legal%20cases%20into%20logical%20formulas%20before%20forwarding%20them%20to%20a%20symbolic%20reasoner.%20However%2C%20such%20approaches%20are%20heavily%20constrained%20by%20the%20scarcity%20of%20high-quality%20annotated%20training%20data.%20To%20address%20this%20limitation%2C%20we%20propose%20a%20novel%20LLM-based%20legal%20reasoning%20framework%20that%20enables%20effective%20in-context%20learning%20through%20retrieval-augmented%20generation.%20Specifically%2C%20we%20introduce%20Legal2LogicICL%2C%20a%20few-shot%20retrieval%20framework%20that%20balances%20diversity%20and%20similarity%20of%20exemplars%20at%20both%20the%20latent%20semantic%20representation%20level%20and%20the%20legal%20text%20structure%20level.%20In%20addition%2C%20our%20method%20explicitly%20accounts%20for%20legal%20structure%20by%20mitigating%20entity-induced%20retrieval%20bias%20in%20legal%20texts%2C%20where%20lengthy%20and%20highly%20specific%20entity%20mentions%20often%20dominate%20semantic%20representations%20and%20obscure%20legally%20meaningful%20reasoning%20patterns.%20Our%20Legal2LogicICL%20constructs%20informative%20and%20robust%20few-shot%20demonstrations%2C%20leading%20to%20accurate%20and%20stable%20logical%20rule%20generation%20without%20requiring%20additional%20training.%20In%20addition%2C%20we%20construct%20a%20new%20dataset%2C%20named%20Legal2Proleg%2C%20which%20is%20annotated%20with%20alignments%20between%20legal%20cases%20and%20PROLEG%20logical%20formulas%20to%20support%20the%20evaluation%20of%20legal%20semantic%20parsing.%20Experimental%20results%20on%20both%20open-source%20and%20proprietary%20LLMs%20demonstrate%20that%20our%20approach%20significantly%20improves%20accuracy%2C%20stability%2C%20and%20generalization%20in%20transforming%20natural-language%20legal%20case%20descriptions%20into%20logical%20representations%2C%20highlighting%20its%20effectiveness%20for%20interpretable%20and%20reliable%20legal%20reasoning.%20Our%20code%20is%20available%20at%20https%3A//github.com/yingjie7/Legal2LogicICL.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11699v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLegal2LogicICL%253A%2520Improving%2520Generalization%2520in%2520Transforming%2520Legal%252 {"title": "ITIScore: An Image-to-Text-to-Image Rating Framework for the Image Captioning Ability of MLLMs", "author": "Zitong Xu and Huiyu Duan and Shengyao Qin and Guangyu Yang and Guangji Ma and Xiongkuo Min and Ke Gu and Guangtao Zhai and Patrick Le Callet", "abstract": "Recent advances in multimodal large language models (MLLMs) have greatly improved image understanding and captioning capabilities. However, existing image captioning benchmarks typically suffer from limited diversity in caption length, the absence of recent advanced MLLMs, and insufficient human annotations, which potentially introduces bias and limits the ability to comprehensively assess the performance of modern MLLMs. To address these limitations, we present a new large-scale image captioning benchmark, termed, ICBench, which covers 12 content categories and consists of both short and long captions generated by 10 advanced MLLMs on 2K images, resulting in 40K captions in total. We conduct extensive human subjective studies to obtain mean opinion scores (MOSs) across fine-grained evaluation dimensions, where short captions are assessed in terms of fluency, relevance, and conciseness, while long captions are evaluated based on fluency, relevance, and completeness. Furthermore, we propose an automated evaluation metric, \\textbf{ITIScore}, based on an image-to-text-to-image framework, which measures caption quality through reconstruction consistency. Experimental results demonstrate strong alignment between our automatic metric and human judgments, as well as robust zero-shot generalization ability on other public captioning datasets. Both the dataset and model will be released upon publication.", "link": "http://arxiv.org/abs/2604.03765v2", "date": "2026-04-13", "relevancy": 2.5593, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5236}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.506}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ITIScore%3A%20An%20Image-to-Text-to-Image%20Rating%20Framework%20for%20the%20Image%20Captioning%20Ability%20of%20MLLMs&body=Title%3A%20ITIScore%3A%20An%20Image-to-Text-to-Image%20Rating%20Framework%20for%20the%20Image%20Captioning%20Ability%20of%20MLLMs%0AAuthor%3A%20Zitong%20Xu%20and%20Huiyu%20Duan%20and%20Shengyao%20Qin%20and%20Guangyu%20Yang%20and%20Guangji%20Ma%20and%20Xiongkuo%20Min%20and%20Ke%20Gu%20and%20Guangtao%20Zhai%20and%20Patrick%20Le%20Callet%0AAbstract%3A%20Recent%20advances%20in%20multimodal%20large%20language%20models%20%28MLLMs%29%20have%20greatly%20improved%20image%20understanding%20and%20captioning%20capabilities.%20However%2C%20existing%20image%20captioning%20benchmarks%20typically%20suffer%20from%20limited%20diversity%20in%20caption%20length%2C%20the%20absence%20of%20recent%20advanced%20MLLMs%2C%20and%20insufficient%20human%20annotations%2C%20which%20potentially%20introduces%20bias%20and%20limits%20the%20ability%20to%20comprehensively%20assess%20the%20performance%20of%20modern%20MLLMs.%20To%20address%20these%20limitations%2C%20we%20present%20a%20new%20large-scale%20image%20captioning%20benchmark%2C%20termed%2C%20ICBench%2C%20which%20covers%2012%20content%20categories%20and%20consists%20of%20both%20short%20and%20long%20captions%20generated%20by%2010%20advanced%20MLLMs%20on%202K%20images%2C%20resulting%20in%2040K%20captions%20in%20total.%20We%20conduct%20extensive%20human%20subjective%20studies%20to%20obtain%20mean%20opinion%20scores%20%28MOSs%29%20across%20fine-grained%20evaluation%20dimensions%2C%20where%20short%20captions%20are%20assessed%20in%20terms%20of%20fluency%2C%20relevance%2C%20and%20conciseness%2C%20while%20 {"title": "Not All Forgetting Is Equal: Architecture-Dependent Retention Dynamics in Fine-Tuned Image Classifiers", "author": "Miit Daga and Swarna Priya Ramu", "abstract": "Fine-tuning pretrained image classifiers is standard practice, yet which individual samples are forgotten during this process, and whether forgetting patterns are stable or architecture dependent, remains unclear. Understanding these dynamics has direct implications for curriculum design, data pruning, and ensemble construction. We track per-sample correctness at every epoch during fine-tuning of ResNet-18 and DeiT-Small on a retinal OCT dataset (7 classes, 56:1 imbalance) and CUB-200-2011 (200 bird species), fitting Ebbinghaus-style exponential decay curves to each sample's retention trace. Five findings emerge. First, the two architectures forget fundamentally different samples: Jaccard overlap of the top 10 percent most-forgotten is 0.34 on OCTDL and 0.15 on CUB-200. Second, ViT forgetting is more structured (mean $R^2 = 0.74$) than CNN forgetting ($R^2 = 0.52$). Third, per-sample forgetting is stochastic across random seeds (Spearman $\u03c1\\approx 0.01$), challenging the assumption that sample difficulty is an intrinsic property. Fourth, class-level forgetting is consistent and semantically interpretable: visually similar species are forgotten most, distinctive ones least. Fifth, a sample's loss after head warmup predicts its long-term decay constant ($\u03c1= 0.30$ to $0.50$, $p < 10^{-45}$). These findings suggest that architectural diversity in ensembles provides complementary retention coverage, and that curriculum or pruning methods based on per-sample difficulty may not generalize across runs. A spaced repetition sampler built on these decay constants does not outperform random sampling, indicating that static scheduling cannot exploit unstable per-sample signals.", "link": "http://arxiv.org/abs/2604.11508v1", "date": "2026-04-13", "relevancy": 2.5529, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5278}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5106}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4934}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Forgetting%20Is%20Equal%3A%20Architecture-Dependent%20Retention%20Dynamics%20in%20Fine-Tuned%20Image%20Classifiers&body=Title%3A%20Not%20All%20Forgetting%20Is%20Equal%3A%20Architecture-Dependent%20Retention%20Dynamics%20in%20Fine-Tuned%20Image%20Classifiers%0AAuthor%3A%20Miit%20Daga%20and%20Swarna%20Priya%20Ramu%0AAbstract%3A%20Fine-tuning%20pretrained%20image%20classifiers%20is%20standard%20practice%2C%20yet%20which%20individual%20samples%20are%20forgotten%20during%20this%20process%2C%20and%20whether%20forgetting%20patterns%20are%20stable%20or%20architecture%20dependent%2C%20remains%20unclear.%20Understanding%20these%20dynamics%20has%20direct%20implications%20for%20curriculum%20design%2C%20data%20pruning%2C%20and%20ensemble%20construction.%20We%20track%20per-sample%20correctness%20at%20every%20epoch%20during%20fine-tuning%20of%20ResNet-18%20and%20DeiT-Small%20on%20a%20retinal%20OCT%20dataset%20%287%20classes%2C%2056%3A1%20imbalance%29%20and%20CUB-200-2011%20%28200%20bird%20species%29%2C%20fitting%20Ebbinghaus-style%20exponential%20decay%20curves%20to%20each%20sample%27s%20retention%20trace.%20Five%20findings%20emerge.%20First%2C%20the%20two%20architectures%20forget%20fundamentally%20different%20samples%3A%20Jaccard%20overlap%20of%20the%20top%2010%20percent%20most-forgotten%20is%200.34%20on%20OCTDL%20and%200.15%20on%20CUB-200.%20Second%2C%20ViT%20forgetting%20is%20more%20structured%20%28mean%20%24R%5E2%20%3D%200.74%24%29%20than%20CNN%20forgetting%20%28%24R%5E2%20%3D%200.52%24%29.%20Third%2C%20per-sample%20forgetting%20is%20stochastic%20across%20random%20seeds%20%28Spearman%20%24%CF%81%5Capprox%200.01%24%29%2C%20challenging%20the%20assumption%20that%20sample%20difficulty%20is%20an%20intrinsic%20property.%20Fourth%2C%20class-level%20forgetting%20is%20consistent%20and%20semantically%20interpretable%3A%20visually%20similar%20species%20are%20forgotten%20most%2C%20distinctive%20ones%20least.%20Fifth%2C%20a%20sample%27s%20loss%20after%20head%20warmup%20predicts%20its%20long-term%20decay%20constant%20%28%24%CF%81%3D%200.30%24%20to%20%240.50%24%2C%20%24p%20%3C%2010%5E%7B-45%7D%24%29.%20These%20findings%20suggest%20that%20architectural%20diversity%20in%20ensembles%20provides%20complementary%20retention%20coverage%2C%20and%20that%20curriculum%20or%20pruning%20methods%20based%20on%20per-sample%20difficulty%20may%20not%20generalize%20across%20runs.%20A%20spaced%20repetition%20sampler%20built%20on%20these%20decay%20constants%20does%20not%20outperform%20random%20sampling%2C%20indicating%20that%20static%20scheduling%20cannot%20exploit%20unstable%20per-sample%20signals.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11508v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Forgetting%2520Is%2520Equal%253A%2520Architecture-Dependent%2520Retention%2520Dynamics%2520in%2520Fine-Tuned%2520Image%2520Classifiers%26entry.906535625%3DMiit%2520Daga%2520and%2520Swarna%2520Priya%2520Ramu%26entry.1292438233%3DFine-tuning%2520pretrained%2520image%2520classifiers%2520is%2520standard%2520practice%252C%2520yet%2520which%2520individual%2520samples%2520are%2520forgotten%2520during%2520this%2520process%252C%2520and%2520whether%2520forgetting%2520patterns%2520are%2520stable%2520or%2520architecture%2520dependent%252C%2520remains%2520unclear.%2520Understanding%2520these%2520dynamics%2520has%2520direct%2520implications%2520for%2520curriculum%252 {"title": "C-ReD: A Comprehensive Chinese Benchmark for AI-Generated Text Detection Derived from Real-World Prompts", "author": "Chenxi Qing and Junxi Wu and Zheng Liu and Yixiang Qiu and Hongyao Yu and Bin Chen and Hao Wu and Shu-Tao Xia", "abstract": "Recently, large language models (LLMs) are capable of generating highly fluent textual content. While they offer significant convenience to humans, they also introduce various risks, like phishing and academic dishonesty. Numerous research efforts have been dedicated to developing algorithms for detecting AI-generated text and constructing relevant datasets. However, in the domain of Chinese corpora, challenges remain, including limited model diversity and data homogeneity. To address these issues, we propose C-ReD: a comprehensive Chinese Real-prompt AI-generated Detection benchmark. Experiments demonstrate that C-ReD not only enables reliable in-domain detection but also supports strong generalization to unseen LLMs and external Chinese datasets-addressing critical gaps in model diversity, domain coverage, and prompt realism that have limited prior Chinese detection benchmarks. We release our resources at https://github.com/HeraldofLight/C-ReD.", "link": "http://arxiv.org/abs/2604.11796v1", "date": "2026-04-13", "relevancy": 2.5188, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5069}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5059}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4984}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20C-ReD%3A%20A%20Comprehensive%20Chinese%20Benchmark%20for%20AI-Generated%20Text%20Detection%20Derived%20from%20Real-World%20Prompts&body=Title%3A%20C-ReD%3A%20A%20Comprehensive%20Chinese%20Benchmark%20for%20AI-Generated%20Text%20Detection%20Derived%20from%20Real-World%20Prompts%0AAuthor%3A%20Chenxi%20Qing%20and%20Junxi%20Wu%20and%20Zheng%20Liu%20and%20Yixiang%20Qiu%20and%20Hongyao%20Yu%20and%20Bin%20Chen%20and%20Hao%20Wu%20and%20Shu-Tao%20Xia%0AAbstract%3A%20Recently%2C%20large%20language%20models%20%28LLMs%29%20are%20capable%20of%20generating%20highly%20fluent%20textual%20content.%20While%20they%20offer%20significant%20convenience%20to%20humans%2C%20they%20also%20introduce%20various%20risks%2C%20like%20phishing%20and%20academic%20dishonesty.%20Numerous%20research%20efforts%20have%20been%20dedicated%20to%20developing%20algorithms%20for%20detecting%20AI-generated%20text%20and%20constructing%20relevant%20datasets.%20However%2C%20in%20the%20domain%20of%20Chinese%20corpora%2C%20challenges%20remain%2C%20including%20limited%20model%20diversity%20and%20data%20homogeneity.%20To%20address%20these%20issues%2C%20we%20propose%20C-ReD%3A%20a%20comprehensive%20Chinese%20Real-prompt%20AI-generated%20Detection%20benchmark.%20Experiments%20demonstrate%20that%20C-ReD%20not%20only%20enables%20reliable%20in-domain%20detection%20but%20also%20supports%20strong%20generalization%20to%20unseen%20LLMs%20and%20external%20Chinese%20datasets-addressing%20critical%20gaps%20in%20model%20diversity%2C%20domain%20coverage%2C%20and%20prompt%20realism%20that%20have%20limited%20prior%20Chinese%20detection%20benchmarks.%20We%20release%20our%20resources%20at%20https%3A//github.com/HeraldofLight/C-ReD.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11796v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DC-ReD%253A%2520A%2520Comprehensive%2520Chinese%2520Benchmark%2520for%2520AI-Generated%2520Text%2520Detection%2520Derived%2520from%2520Real-World%2520Prompts%26entry.906535625%3DChenxi%2520Qing%2520and%2520Junxi%2520Wu%2520and%2520Zheng%2520Liu%2520and%2520Yixiang%2520Qiu%2520and%252 u%20and%20Zheng%20Liu%20and%20Yixiang%20Qiu%20and%20Hongyao%20Yu%20and%20Bin%20Chen%20and%20Hao%20Wu%20and%20Shu-Tao%20Xia&entry.1292438233=Recently%2C%20large%20language%20models%20%28LLMs%29%20are%20capable%20of%20generating%20highly%20fluent%20textual%20content.%20While%20they%20offer%20significant%20convenience%20to%20humans%2C%20they%20also%20introduce%20various%20risks%2C%20like%20phishing%20and%20academic%20dishonesty.%20Numerous%20research%20efforts%20have%20been%20dedicated%20to%20developing%20algorithms%20for%20detecting%20AI-generated%20text%20and%20constructing%20relevant%20datasets.%20However%2C%20in%20the%20domain%20of%20Chinese%20corpora%2C%20challenges%20remain%2C%20including%20limited%20model%20diversity%20and%20data%20homogeneity.%20To%20address%20these%20issues%2C%20we%20propose%20C-ReD%3A%20a%20comprehensive%20Chinese%20Real-prompt%20AI-generated%20Detection%20benchmark.%20Experiments%20demonstrate%20that%20C-ReD%20not%20only%20enables%20reliable%20in-domain%20detection%20but%20also%20supports%20strong%20generalization%20to%20unseen%20LLMs%20and%20external%20Chinese%20datasets-addressing%20critical%20gaps%20in%20model%20diversity%2C%20domain%20coverage%2C%20and%20prompt%20realism%20that%20have%20limited%20prior%20Chinese%20detection%20benchmarks.%20We%20release%20our%20resources%20at%20https%3A//github.com/HeraldofLight/C-ReD.&entry.1838667208=http%3A//arxiv.org/abs/2604.11796v1&entry.124074799=Read"},
{"title": "MosaicMRI: A Diverse Dataset and Benchmark for Raw Musculoskeletal MRI", "author": "Paula Arguello and Berk Tinaz and Mohammad Shahab Sepehri and Maryam Soltanolkotabi and Mahdi Soltanolkotabi", "abstract": "Deep learning underpins a wide range of applications in MRI, including reconstruction, artifact removal, and segmentation. However, progress has been driven largely by public datasets focused on brain and knee imaging, shaping how models are trained and evaluated. As a result, careful studies of the reliability of these models across diverse anatomical settings remain limited. In this work, we introduce MosaicMRI, a large and diverse collection of fully sampled raw musculoskeletal (MSK) MR measurements designed for training and evaluating machine-learning-based methods. MosaicMRI is the largest open-source raw MSK MRI dataset to date, comprising 2,671 volumes and 80,156 slices. The dataset offers substantial diversity in volume orientation (e.g., axial, sagittal), imaging contrasts (e.g., PD, T1, T2), anatomies (e.g., spine, knee, hip, ankle, and others), and numbers of acquisition coils. Using VarNet as a baseline for accelerated reconstruction task, we perform a comprehensive set of experiments to study scaling behavior with respect to both model capacity and dataset size. Interestingly, models trained on the combined anatomies significantly outperform anatomy-specific models in low-sample regimes, highlighting the benefits of anatomical diversity and the presence of exploitable cross-anatomical correlations. We further evaluate robustness and cross-anatomy generalization by training models on one anatomy (e.g., spine) and testing them on another (e.g., knee). Notably, we identify groups of body parts (e.g., foot and elbow) that generalize well with each other, and highlight that performance under domain shifts depends on both training set size, anatomy, and protocol-specific factors.", "link": "http://arxiv.org/abs/2604.11762v1", "date": "2026-04-13", "relevancy": 2.5179, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5077}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5034}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4996}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MosaicMRI%3A%20A%20Diverse%20Dataset%20and%20Benchmark%20for%20Raw%20Musculoskeletal%20MRI&body=Title%3A%20MosaicMRI%3A%20A%20Diverse%20Dataset%20and%20Benchmark%20for%20Raw%20Musculoskeletal%20MRI%0AAuthor%3A%20Paula%20Arguello%20and%20Berk%20Tinaz%20and%20Mohammad%20Shahab%20Sepehri%20and%20Maryam%20Soltanolkotabi%20and%20Mahdi%20Soltanolkotabi%0AAbstract%3A%20Deep%20learning%20underpins%20a%20wide%20range%20of%20applications%20in%20MRI%2C%20including%20reconstruction%2C%20artifact%20removal%2C%20and%20segmentation.%20However%2C%20progress%20has%20been%20driven%20largely%20by%20public%20datasets%20focused%20on%20brain%20and%20knee%20imaging%2C%20shaping%20how%20models%20are%20trained%20and%20evaluated.%20As%20a%20result%2C%20careful%20studies%20of%20the%20reliability%20of%20these%20models%20across%20diverse%20anatomical%20settings%20remain%20limited.%20In%20this%20work%2C%20we%20introduce%20MosaicMRI%2C%20a%20large%20and%20diverse%20collection%20of%20fully%20sampled%20raw%20musculoskeletal%20%28MSK%29%20MR%20measurements%20designed%20for%20training%20and%20evaluating%20machine-learning-based%20methods.%20MosaicMRI%20is%20the%20largest%20open-source%20raw%20MSK%20MRI%20dataset%20to%20date%2C%20comprising%202%2C671%20volumes%20and%2080%2C156%20slices.%20The%20dataset%20offers%20substantial%20diversity%20in%20volume%20orientation%20%28e.g.%2C%20axial%2C%20sagittal%29%2C%20imaging%20contrasts%20%28e.g.%2C%20PD%2C%20T1%2C%20T2%29%2C%20anatomies%20%28e.g.%2C%20spine%2C%20knee%2C%20hip%2C%20ankle%2C%20and%20others%29%2C%20and%20numbers%20of%20acquisition%20coils.%20Using%20VarNet%20as%20a%20baseline%20for%20accelerated%20reconstruction%20task%2C%20we%20perform%20a%20comprehensive%20set%20of%20experiments%20to%20study%20scaling%20behavior%20with%20respect%20to%20both%20model%20capacity%20and%20dataset%20size.%20Interestingly%2C%20models%20trained%20on%20the%20combined%20anatomies%20significantly%20outperform%20anatomy-specific%20models%20in%20low-sample%20regimes%2C%20highlighting%20the%20benefits%20of%20anatomical%20diversity%20and%20the%20presence%20of%20exploitable%20cross-anatomical%20correlations.%20We%20further%20evaluate%20robustness%20and%20cross-anatomy%20generalization%20by%20training%20models%20on%20one%20anatomy%20%28e.g.%2C%20spine%29%20and%20testing%20them%20on%20another%20%28e.g.%2C%20knee%29.%20Notably%2C%20we%20identify%20groups%20of%20body%20parts%20%28e.g.%2C%20foot%20and%20elbow%29%20that%20generalize%20well%20with%20each%20other%2C%20and%20highlight%20that%20performance%20under%20domain%20shifts%20depends%20on%20both%20training%20set%20size%2C%20anatomy%2C%20and%20protocol-specific%20factors.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11762v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMosaicMRI%253A%2520A%2520Diverse%2520Dataset%2520and%2520Benchmark%2520for%2520Raw%2520Musculoskeletal%2520MRI%26entry.906535625%3DPaula%2520Arguello%2520and%2520Berk%2520Tinaz%2520and%2520Mohammad%2520Shahab%2520Sepehri%2520and%2520Maryam%2520Soltanolkotabi%2520and%2520Mahdi%2520Soltanolkotabi%26entry.1292438233%3DDeep%2520learning%2520underpins%2520a%2520wide%2520range%2520of%2520applications%2520in%2520MRI%252C%2520including%2520reconstruction%252C%2520artifact%2520removal%252C%2520and%2520segmentation.%2520However%252C%2520progress%2520has%2520been%2520driven%2520largely%2520b anatomy%2520generalization%2520by%2520training%2520models%2520on%2520one%2520anatomy%2520%2528e.g.%252C%2520spine%2529%2520and%2520testing%2520them%2520on%2520another%2520%2528e.g.%252C%2520knee%2529.%2520Notably%252C%2520we%2520identify%2520groups%2520of%2520body%2520parts%2520%2528e.g.%252C%2520foot%2520and%2520elbow%2529%2520that%2520generalize%2520well%2520with%2520each%2520other%252C%2520and%2520highlight%2520that%2520performance%2520under%2520domain%2520shifts%2520depends%2520on%2520both%2520training%2520set%2520size%252C%2520anatomy%252C%2520and%2520protocol-specific%2520factors.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11762v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MosaicMRI%3A%20A%20Diverse%20Dataset%20and%20Benchmark%20for%20Raw%20Musculoskeletal%20MRI&entry.906535625=Paula%20Arguello%20and%20Berk%20Tinaz%20and%20Mohammad%20Shahab%20Sepehri%20and%20Maryam%20Soltanolkotabi%20and%20Mahdi%20Soltanolkotabi&entry.1292438233=Deep%20learning%20underpins%20a%20wide%20range%20of%20applications%20in%20MRI%2C%20including%20reconstruction%2C%20artifact%20removal%2C%20and%20segmentation.%20However%2C%20progress%20has%20been%20driven%20largely%20by%20public%20datasets%20focused%20on%20brain%20and%20knee%20imaging%2C%20shaping%20how%20models%20are%20trained%20and%20evaluated.%20As%20a%20result%2C%20careful%20studies%20of%20the%20reliability%20of%20these%20models%20across%20diverse%20anatomical%20settings%20remain%20limited.%20In%20this%20work%2C%20we%20introduce%20MosaicMRI%2C%20a%20large%20and%20diverse%20collection%20of%20fully%20sampled%20raw%20musculoskeletal%20%28MSK%29%20MR%20measurements%20designed%20for%20training%20and%20evaluating%20machine-learning-based%20methods.%20MosaicMRI%20is%20the%20largest%20open-source%20raw%20MSK%20MRI%20dataset%20to%20date%2C%20comprising%202%2C671%20volumes%20and%2080%2C156%20slices.%20The%20dataset%20offers%2 {"title": "S4M: 4-points to Segment Anything", "author": "Adrien Meyer and Lorenzo Arboit and Giuseppe Massimiani and Shih-Min Yin and Didier Mutter and Nicolas Padoy", "abstract": "Purpose: The Segment Anything Model (SAM) promises to ease the annotation bottleneck in medical segmentation, but overlapping anatomy and blurred boundaries make its point prompts ambiguous, leading to cycles of manual refinement to achieve precise masks. Better prompting strategies are needed.\n  Methods: We propose a structured prompting strategy using 4 points as a compact instance-level shape description. We study two 4-point variants: extreme points and the proposed major/minor axis endpoints, inspired by ultrasound measurement practice. SAM cannot fully exploit such structured prompts because it treats all points identically and lacks geometry-aware reasoning. To address this, we introduce S4M (4-points to Segment Anything), which augments SAM to interpret 4 points as relational cues rather than isolated clicks. S4M expands the prompt space with role-specific embeddings and adds an auxiliary \"Canvas\" pretext task that sketches coarse masks directly from prompts, fostering geometry-aware reasoning.\n  Results: Across eight datasets in ultrasound and surgical endoscopy, S4M improves segmentation by +3.42 mIoU over a strong SAM baseline at equal prompt budget. An annotation study with three clinicians further shows that major/minor prompts enable faster annotation.\n  Conclusion: S4M increases performance, reduces annotation effort, and aligns prompting with clinical practice, enabling more scalable dataset development in medical imaging. We release our code and pretrained models at https://github.com/CAMMA-public/S4M.", "link": "http://arxiv.org/abs/2503.05534v3", "date": "2026-04-13", "relevancy": 2.4955, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5247}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4943}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4783}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20S4M%3A%204-points%20to%20Segment%20Anything&body=Title%3A%20S4M%3A%204-points%20to%20Segment%20Anything%0AAuthor%3A%20Adrien%20Meyer%20and%20Lorenzo%20Arboit%20and%20Giuseppe%20Massimiani%20and%20Shih-Min%20Yin%20and%20Didier%20Mutter%20and%20Nicolas%20Padoy%0AAbstract%3A%20Purpose%3A%20The%20Segment%20Anything%20Model%20%28SAM%29%20promises%20to%20ease%20the%20annotation%20bottleneck%20in%20medical%20segmentation%2C%20but%20overlapping%20anatomy%20and%20blurred%20boundaries%20make%20its%20point%20prompts%20ambiguous%2C%20leading%20to%20cycles%20of%20manual%20refinement%20to%20achieve%20precise%20masks.%20Better%20prompting%20strategies%20are%20needed.%0A%20%20Methods%3A%20We%20propose%20a%20structured%20prompting%20strategy%20using%204%20points%20as%20a%20compact%20instance-level%20shape%20description.%20We%20study%20two%204-point%20variants%3A%20extreme%20points%20and%20the%20proposed%20major/minor%20axis%20endpoints%2C%20inspired%20by%20ultrasound%20measurement%20practice.%20SAM%20cannot%20fully%20exploit%20such%20structured%20prompts%20because%20it%20treats%20all%20points%20identically%20and%20lacks%20geometry-aware%20reasoning.%20To%20address%20this%2C%20we%20introduce%20S4M%20%284-points%20to%20Segment%20Anything%29%2C%20which%20augments%20SAM%20to%20interpret%204%20points%20as%20relational%20cues%20rather%20than%20isolated%20clicks.%20S4M%20expands%20the%20prompt%20space%20with%20role-specific%20embeddings%20and%20adds%20an%20auxiliary%20%22Canvas%22%20pretext%20task%20that%20sketches%20coarse%20masks%20directly%20from%20prompts%2C%20fostering%20geometry-aware%20reasoning.%0A%20%20Results%3A%20Across%20eight%20datasets%20in%20ultrasound%20and%20surgical%20endoscopy%2C%20S4M%20improves%20segmentation%20by%20%2B3.42%20mIoU%20over%20a%20strong%20SAM%20baseline%20at%20equal%20prompt%20budget.%20An%20annotation%20study%20with%20three%20clinicians%20further%20shows%20that%20major/minor%20prompts%20enable%20faster%20annotation.%0A%20%20Conclusion%3A%20S4M%20increases%20performance%2C%20reduces%20annotation%20effort%2C%20and%20aligns%20prompting%20with%20clinical%20practice%2C%20enabling%20more%20scalable%20dataset%20development%20in%20medical%20imaging.%20We%20release%20our%20code%20and%20pretrained%20models%20at%20https%3A//github.com/CAMMA-public/S4M.%0ALink%3A%20http%3A//arxiv.org/abs/2503.05534v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DS4M%253A%25204-points%2520to%2520Segment%2520Anything%26entry.906535625%3DAdrien%2520Meyer%2520and%2520Lorenzo%2520Arboit%2520and%2520Giuseppe%2520Massimiani%2520and%2520Shih-Min%2520Yin%2520and%2520Didier%2520Mutter%2520and%2520Nicolas%2520Padoy%26entry.1292438233%3DPurpose%253A%2520The%2520Segment%2520Anything%2520Model%2520%2528SAM%2529%2520promises%2520to%2520ease%2520the%2520annotation%2520bottleneck%2520in%2520medical%2520segmentation%252C%2520but%2520overlapping%2520anatomy%2520and%2520blurred%2520boundaries%2520make%2520its%2520point%2520prompts%2520ambiguous%252C%2520leading%2520to%2520cycles%2520of%2520manual%2520refinement%2520to%2520achieve%2520precise%2520masks.%2520Better%2520prompting%2520strategies%2520are%2520needed.%250A%2520%2520Methods%253A%2520We%2520propose%2520a%2520structured%2520prompting%2520strategy%2520using%25204%2520points%2520as%2520a%2520compact%2520instance-level%2520shape%2520description.%2520We%2520study%2520two%25204-point%2520variants%253A%2520extreme%2520points%2520and%2520the%2520proposed%2520major/minor%2520axis%2520endpoints%252C%2520inspired%2520by%2520ultrasound%2520measurement%2520practice.%2520SAM%2520cannot%2520fully%2520exploit%2520such%2520structured%2520prompts%2520because%2520it%2520treats%2520all%2520points%2520identically%2520and%2520lacks%2520geometry-aware%2520reasoning.%2520To%2520address%2520this%252C%2520we%2520introduce%2520S4M%2520%25284-points%2520to%2520Segment%2520Anything%2529%252C%2520which%2520augments%2520SAM%2520to%2520interpret%25204%2520points%2520as%2520relational%2520cues%2520rather%2520than%2520isolated%2520clicks.%2520S4M%2520expands%2520the%2520prompt%2520space%2520with%2520role-specific%2520embeddings%2520and%2520adds%2520an%2520auxiliary%2520%2522Canvas%2522%2520pretext%2520task%2520that%2520sketches%2520coarse%2520masks%2520directly%2520from%2520prompts%252C%2520fostering%2520geometry-aware%2520reasoning.%250A%2520%2520Results%253A%2520Across%2520eight%2520datasets%2520in%2520ultrasound%2520and%2520surgical%2520endoscopy%252C%2520S4M%2520improves%2520segmentation%2520by%2520%252B3.42%2520mIoU%2520over%2520a%2520strong%2520SAM%2520baseline%2520at%2520equal%2520prompt%2520budget.%2520An%2520annotation%2520study%2520with%2520three%2520clinicians%2520further%2520shows%2520that%2520major/minor%2520prompts%2520enable%2520faster%2520annotation.%250A%2520%2520Conclusion%253A%2520S4M%2520increases%2520performance%252C%2520reduces%2520annotation%2520effort%252C%2520and%2520aligns%2520prompting%2520with%2520clinical%2520practice%252C%2520enabling%2520more%2520scalable%2520dataset%2520development%2520in%2520medical%2520imaging.%2520We%2520release%2520our%2520code%2520and%2520pretrained%2520models%2520at%2520https%253A//github.com/CAMMA-public/S4M.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2503.05534v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=S4M%3A%204-points%20to%20Segment%20Anything&entry.906535625=Adrien%20Meyer%20and%20Lorenzo%20Arboit%20and%20Giuseppe%20Massimiani%20and%20Shih-Min%20Yin%20and%20Didier%20Mut {"title": "Learning How Much to Think: Difficulty-Aware Dynamic MoEs for Graph Node Classification", "author": "Jiajun Zhou and Yadong Li and Xuanze Chen and Chen Ma and Chuang Zhao and Shanqing Yu and Qi Xuan", "abstract": "Mixture-of-Experts (MoE) architectures offer a scalable path for Graph Neural Networks (GNNs) in node classification tasks but typically rely on static and rigid routing strategies that enforce a uniform expert budget or coarse-grained expert toggles on all nodes. This limitation overlooks the varying discriminative difficulty of nodes and leads to under-fitting for hard nodes and redundant computation for easy ones. To resolve this issue, we propose D2MoE, a novel framework that shifts the focus from static expert selection to node-wise expert resource allocation. By using predictive entropy as a real-time proxy for difficulty, D2MoE employs a difficulty-driven top-p routing mechanism to adaptively concentrate expert resources on hard nodes while reducing overhead for easy ones, achieving continuous and fine-grained expert budget scaling for node classification. Experiments on 13 benchmarks demonstrate that D2MoE achieves consistent state-of-the-art performance, surpassing leading baselines by up to 7.92% in accuracy on heterophilous graphs. Notably, on large-scale graphs, it reduces memory consumption by up to 73.07% and training time by 46.53% compared to the best-performing Graph MoE, thereby validating its superior efficiency.", "link": "http://arxiv.org/abs/2604.11473v1", "date": "2026-04-13", "relevancy": 2.4898, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5624}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4685}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http: {"title": "Enhancing Multimodal Large Language Models for Ancient Chinese Character Evolution Analysis via Glyph-Driven Fine-Tuning", "author": "Rui Song and Lida Shi and Ruihua Qi and Yingji Li and Hao Xu", "abstract": "In recent years, rapid advances in Multimodal Large Language Models (MLLMs) have increasingly stimulated research on ancient Chinese scripts. As the evolution of written characters constitutes a fundamental pathway for understanding cultural transformation and historical continuity, how MLLMs can be systematically leveraged to support and advance text evolution analysis remains an open and largely underexplored problem. To bridge this gap, we construct a comprehensive benchmark comprising 11 tasks and over 130,000 instances, specifically designed to evaluate the capability of MLLMs in analyzing the evolution of ancient Chinese scripts. We conduct extensive evaluations across multiple widely used MLLMs and observe that, while existing models demonstrate a limited ability in glyph-level comparison, their performance on core tasks-such as character recognition and evolutionary reasoning-remains substantially constrained. Motivated by these findings, we propose a glyph-driven fine-tuning framework (GEVO) that explicitly encourages models to capture evolutionary consistency in glyph transformations and enhances their understanding of text evolution. Experimental results show that even models at the 2B scale achieve consistent and comprehensive performance improvements across all evaluated tasks. To facilitate future research, we publicly release both the benchmark and the trained models\\footnote{https://github.com/songruiecho/GEVO}.", "link": "http://arxiv.org/abs/2604.11299v1", "date": "2026-04-13", "relevancy": 2.4809, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5006}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arx {"title": "CoRe-ECG: Advancing Self-Supervised Representation Learning for 12-Lead ECG via Contrastive and Reconstructive Synergy", "author": "Zehao Qin and Xiaojian Lin and Ping Zhang and Hongliang Wu and Xinkang Wang and Guangling Liu and Bo Chen and Wenming Yang and Guijin Wang", "abstract": "Accurate interpretation of electrocardiogram (ECG) remains challenging due to the scarcity of labeled data and the high cost of expert annotation. Self-supervised learning (SSL) offers a promising solution by enabling models to learn expressive representations from unlabeled signals. Existing ECG SSL methods typically rely on either contrastive learning or reconstructive learning. However, each approach in isolation provides limited supervisory signals and suffers from additional limitations, including non-physiological distortions introduced by naive augmentations and trivial correlations across multiple leads that models may exploit as shortcuts. In this work, we propose CoRe-ECG, a unified contrastive and reconstructive pretraining paradigm that establishes a synergistic interaction between global semantic modeling and local structural learning. CoRe-ECG aligns global representations during reconstruction, enabling instance-level discriminative signals to guide local waveform recovery. To further enhance pretraining, we introduce Frequency Dynamic Augmentation (FDA) to adaptively perturb ECG signals based on their frequency-domain importance, and Spatio-Temporal Dual Masking (STDM) to break linear dependencies across leads, increasing the difficulty of reconstructive tasks. Our method achieves state-of-the-art performance across multiple downstream ECG datasets. Ablation studies further demonstrate the necessity and complementarity of each component. This approach provides a robust and physiologically meaningful representation learning framework for ECG analysis.", "link": "http://arxiv.org/abs/2604.11359v1", "date": "2026-04-13", "relevancy": 2.4659, "topK": [{"title": " {"title": "LoGo-MR: Screening Breast MRI for Cancer Risk Prediction by Efficient Omni-Slice Modeling", "author": "Xin Wang and Yuan Gao and George Yiasemis and Antonio Portaluri and Zahra Aghdam and Muzhen He and Luyi Han and Yaofei Duan and Chunyao Lu and Xinglong Liang and Tianyu Zhang and Vivien van Veldhuizen and Yue Sun and Tao Tan and Ritse Mann and Jonas Teuwen", "abstract": "Efficient and explainable breast cancer (BC) risk prediction is critical for large-scale population-based screening. Breast MRI provides functional information for personalized risk assessment. Yet effective modeling remains challenging as fully 3D CNNs capture volumetric context at high computational cost, whereas lightweight 2D CNNs fail to model inter-slice continuity. Importantly, breast MRI modeling for shor- and long-term BC risk stratification remains underexplored. In this study, we propose LoGo-MR, a 2.5D local-global structural modeling framework for five-year BC risk prediction. Aligned with clinical interpretation, our framework first employs neighbor-slice encoding to capture subtle local cues linked to short-term risk. It then integrates transformer-enhanced multiple-instance learning (MIL) to model distributed global patterns related to long-term risk and provide interpretable slice importance. We further apply this framework across axial, sagittal, and coronal planes as LoGo3-MR to capture complementary volumetric information. This multi-plane formulation enables voxel-level risk saliency mapping, which may assist radiologists in localizing risk-relevant regions during breast MRI interpretation. Evaluated on a large breast MRI screening cohort (~7.5K), our method outperforms 2D/3D baselines and existing SOTA MIL methods, achieving AUCs of 0.77-0.69 for 1- to 5-year prediction and improving C-index by ~6% over 3D CNNs. LoGo3-MR further improves overall performance with interpretable localization across three planes, and validation across seven backbones shows consistent gains. These results highlight the clinical potential of efficient MRI-based BC risk stratification for large-scale screening. Code will be released publicly.", "link": "http://arxiv.org/abs/2604.11348v1", "date": "2026-04-13", "relevancy": 2.449, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4916}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4899}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4879}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoGo-MR%3A%20Screening%20Breast%20MRI%20for%20Cancer%20Risk%20Prediction%20by%20Efficient%20Omni-Slice%20Modeling&body=Title%3A%20LoGo-MR%3A%20Screening%20Breast%20MRI%20for%20Cancer%20Risk%20Prediction%20by%20Efficient%20Omni-Slice%20Modeling%0AAuthor%3A%20Xin%20Wang%20and%20Yuan%20Gao%20and%20George%20Yiasemis%20and%20Antonio%20Portaluri%20and%20Zahra%20Aghdam%20and%20Muzhen%20He%20and%20Luyi%20Han%20and%20Yaofei%20Duan%20and%20Chunyao%20Lu%20and%20Xinglong%20Liang%20and%20Tianyu%20Zhang%20and%20Vivien%20van%20Veldhuizen%20and%20Yue%20Sun%20and%20Tao%20Tan%20and%20Ritse%20Mann%20and%20Jonas%20Teuwen%0AAbstract%3A%20Efficient%20and%20explainable%20breast%20cancer%20%28BC%29%20risk%20prediction%20is%20critical%20for%20large-scale%20population-based%20screening.%20Breast%20MRI%20provides%20functional%20information%20for%20personalized%20risk%20assessment.%20Yet%20effective%20modeling%20remains%20challenging%20as%20fully%203D%20CNNs%20capture%20volumetric%20context%20at%20high%20computational%20cost%2C%20whereas%20lightweight%202D%20CNNs%20fail%20to%20model%20inter-slice%20continuity.%20Importantly%2C%20breast%20MRI%20modeling%20for%20shor-%20and%20long-term%20BC%20risk%20stratification%20remains%20underexplored.%20In%20this%20study%2C%20we%20propose%20LoGo-MR%2C%20a%202.5D%20local-global%20structural%20modeling%20framework%20for%20five-year%20BC%20risk%20prediction.%20Aligned%20with%20clinical%20interpretation%2C%20our%20framework%20first%20employs%20neighbor-slice%20encoding%20to%20capture%20subtle%20local%20cues%20linked%20to%20short-term%20risk.%20It%20then%20integrates%20transformer-enhanced%20multiple-instance%20learning%20%28MIL%29%20to%20model%20distributed%20global%20patterns%20related%20to%20long-term%20risk%20and%20provide%20interpretable%20slice%20importance.%20We%20further%20apply%20this%20framework%20across%20axial%2C%20sagittal%2C%20and%20coronal%20planes%20as%20LoGo3-MR%20to%20capture%20complementary%20volumetric%20information.%20This%20multi-plane%20formulation%20enables%20voxel-level%20risk%20saliency%20mapping%2C%20which%20may%20assist%20radiologists%20in%20localizing%20risk-relevant%20regions%20during%20breast%20MRI%20interpretation.%20Evaluated%20on%20a%20large%20breast%20MRI%20screening%20cohort%20%28~7.5K%29%2C%20our%20method%20outperforms%202D/3D%20baselines%20and%20existing%20SOTA%20MIL%20methods%2C%20achieving%20AUCs%20of%200.77-0.69%20for%201-%20to%205-year%20prediction%20and%20improving%20C-index%20by%20~6%25%20over%203D%20CNNs.%20LoGo3-MR%20further%20improves%20overall%20performance%20with%20interpretable%20localization%20across%20three%20planes%2C%20and%20validation%20across%20seven%20backbones%20shows%20consistent%20gains.%20These%20results%20highlight%20the%20clinical%20potential%20of%20efficient%20MRI-based%20BC%20risk%20stratification%20for%20large-scale%20screening.%20Code%20will%20be%20released%20publicly.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11348v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoGo-MR%253A%2520Screening%2520Breast%2520MRI%2520for%2520Cancer%2520Risk%2520Pr entry.1292438233=Efficient%20and%20explainable%20breast%20cancer%20%28BC%29%20risk%20prediction%20is%20critical%20for%20large-scale%20population-based%20screening.%20Breast%20MRI%20provides%20functional%20information%20for%20personalized%20risk%20assessment.%20Yet%20effective%20modeling%20remains%20challenging%20as%20fully%203D%20CNNs%20capture%20volumetric%20context%20at%20high%20computational%20cost%2C%20whereas%20lightweight%202D%20CNNs%20fail%20to%20model%20inter-slice%20continuity.%20Importantly%2C%20breast%20MRI%20modeling%20for%20shor-%20and%20long-term%20BC%20risk%20stratification%20remains%20underexplored.%20In%20this%20study%2C%20we%20propose%20LoGo-MR%2C%20a%202.5D%20local-global%20structural%20modeling%20framework%20for%20five-year%20BC%20risk%20prediction.%20Aligned%20with%20clinical%20interpretation%2C%20our%20framework%20first%20employs%20neighbor-slice%20encoding%20to%20capture%20subtle%20local%20cues%20linked%20to%20short-term%20risk.%20It%20then%20integrates%20transformer-enhanced%20multiple-instance%20learning%20%28MIL%29%20to%20model%20distributed%20global%20patterns%20related%20to%20long-term%20risk%20and%20provide%20interpretable%20slice%20importance.%20We%20further%20apply%20this%20framework%20across%20axial%2C%20sagittal%2C%20and%20coronal%20planes%20as%20LoGo3-MR%20to%20capture%20complementary%20volumetric%20information.%20This%20multi-plane%20formulation%20enables%20voxel-level%20risk%20saliency%20mapping%2C%20which%20may%20assist%20radiologists%20in%20localizing%20risk-relevant%20regions%20during%20breast%20MRI%20interpretation.%20Evaluated%20on%20a%20large%20breast%20MRI%20screening%20cohort%20%28~7.5K%29%2C%20our%20method%20outperforms%202D/3D%20baselines%20and%20existing%20SOTA%20MIL%20methods%2C%20achieving%20AUCs%20of%200.77-0.69%20for%201-%20to%205-year%20prediction%20and%20improving%20C-index%20by%20~6%25%20over%203D%20CNNs.%20LoGo3-MR%20further%20improves%20overall%20performance%20with%20interpretable%20localization%20across%20three%20planes%2C%20and%20validation%20across%20seven%20backbones%20shows%20consistent%20gains.%20These%20results%20highlight%20the%20clinical%20potential%20of%20efficient%20MRI-based%20BC%20risk%20stratification%20for%20large-scale%20screening.%20Code%20will%20be%20released%20publicly.&entry.1838667208=http%3A//arxiv.org/abs/2604.11348v1&entry.124074799=Read"},
{"title": "GraspSense: Physically Grounded Grasp and Grip Planning for a Dexterous Robotic Hand via Language-Guided Perception and Force Maps", "author": "Elizaveta Semenyakina and Ivan Snegirev and Mariya Lezina and Miguel Altamirano Cabrera and Safina Gulyamova and Dzmitry Tsetserukou", "abstract": "Dexterous robotic manipulation requires more than geometrically valid grasps: it demands physically grounded contact strategies that account for the spatially non-uniform mechanical properties of the object. However, existing grasp planners typically treat the surface as structurally homogeneous, even though contact in a weak region can damage the object despite a geometrically perfect grasp. We present a pipeline for grasp selection and force regulation in a five-fingered robotic hand, based on a map of locally admissible contact loads. From an operator command, the system identifies the target object, reconstructs its 3D geometry using SAM3D, and imports the model into Isaac Sim. A physics-informed geometric analysis then computes a force map that encodes the maximum lateral contact force admissible at each surface location without deformation. Grasp candidates are filtered by geometric validity and task-goal consistency. When multiple candidates are comparable under classical metrics, they are re-ranked using a force-map-aware criterion that favors grasps with contacts in mechanically admissible regions. An impedance controller scales the stiffness of each finger according to the locally admissible force at the contact point, enabling safe and reliable grasp execution. Validation on paper, plastic, and glass cups shows that the proposed approach consistently selects structurally stronger contact regions and keeps grip forces within safe bounds. In this way, the work reframes dexterous manipulation from a purely geometric problem into a physically grounded joint planning problem of grasp selection and grip execution for future humanoid systems.", "link": "http://arxiv.org/abs/2604.05697v2", "date": "2026-04-13", "relevancy": 2.4354, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6449}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5937}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5789}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraspSense%3A%20Physically%20Grounded%20Grasp%20and%20Grip%20Planning%20for%20a%20Dexterous%20Robotic%20Hand%20via%20Language-Guided%20Perception%20and%20Force%20Maps&body=Title%3A%20GraspSense%3A%20Physically%20Grounded%20Grasp%20and%20Grip%20Planning%20for%20a%20Dexterous%20Robotic%20Hand%20via%20Language-Guided%20Perception%20and%20Force%20Maps%0AAuthor%3A%20Elizaveta%20Semenyakina%20and%20Ivan%20Snegirev%20and%20Mariya%20Lezina%20and%20Miguel%20Altamirano%20Cabrera%20and%20Safina%20Gulyamova%20and%20Dzmitry%20Tsetserukou%0AAbstract%3A%20Dexterous%20robotic%20manipulation%20requires%20more%20than%20geometrically%20valid%20grasps%3A%20it%20demands%20physically%20grounded%20contact%20strategies%20that%20account%20for%20the%20spatially%20non-uniform%20mechanical%20properties%20of%20the%20object.%20However%2C%20existing%20grasp%20planners%20typically%20treat%20the%20surface%20as%20structurally%20homogeneous%2C%20even%20though%20contact%20in%20a%20weak%20region%20can%20damage%20the%20object%20despite%20a%20geometrically%20perfect%20grasp.%20We%20present%20a%20pipeline%20for%20grasp%20selection%20and%20force%20regulation%20in%20a%20five-fingered%20robotic%20hand%2C%20based%20on%20a%20map%20of%20locally%20admissible%20contact%20loads.%20From%20an%20operator%20command%2C%20the%20system%20identifies%20the%20target%20object%2C%20reconstructs%20its%203D%20geometry%20using%20SAM3D%2C%20and%20imports%20the%20model%20into%20Isaac%20Sim.%20A%20physics-informed%20geometric%20analysis%20then%20computes%20a%20force%20map%20that%20encodes%20the%20maximum%20lateral%20contact%20force%20admissible%20at%20each%20surface%20location%20without%20deformation.%20Grasp%20candidates%20are%20filtered%20by%20geometric%20validity%20and%20task-goal%20consistency.%20When%20multiple%20candidates%20are%20comparable%20under%20classical%20metrics%2C%20they%20are%20re-ranked%20using%20a%20force-map-aware%20criterion%20that%20favors%20grasps%20with%20contacts%20in%20mechanically%20admissible%20regions.%20An%20impedance%20controller%20scales%20the%20stiffness%20of%20each%20finger%20according%20to%20the%20locally%20admissible%20force%20at%20the%20contact%20point%2C%20enabling%20safe%20and%20reliable%20grasp%20execution.%20Validation%20on%20paper%2C%20plastic%2C%20and%20glass%20cups%20shows%20that%20the%20proposed%20approach%20consistently%20selects%20structurally%20stronger%20contact%20regions%20and%20keeps%20grip%20forces%20within%20safe%20bounds.%20In%20this%20way%2C%20the%20work%20reframes%20dexterous%20manipulation%20from%20a%20purely%20geometric%20problem%20into%20a%20physically%20grounded%20joint%20planning%20problem%20of%20grasp%20selection%20and%20grip%20execution%20for%20future%20humanoid%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05697v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraspSense%253A%2520Physically%2520Grounded%2520Grasp%2520and%2520Grip%2520Planning%2520for%2520a%2520Dexterous%2520Robotic%2520Hand%2520via%2520Language-Guided%2520Perception%2520and%2520Force%2520Maps%26entry.906535625%3DElizaveta%2520Semenyakina%2520and%2520Ivan%2520Snegirev%2520and%2520Mariya%2520Lezina%2520and%2520Miguel%2520Altamirano%2520Cabrera%2520and%2520Safina%2520Gulyamova%2520and%2520Dzmitry%2520Tsetserukou%26entry.1292438233%3DDexterous%2520robotic%2520 {"title": "Large Spikes in Stochastic Gradient Descent: A Large-Deviations View", "author": "Benjamin Gess and Daniel Heydecker", "abstract": "Large loss spikes in stochastic gradient descent are studied through a rigorous large-deviations analysis for a shallow, fully connected network in the NTK scaling. In contrast to full-batch gradient descent, the catapult phase is shown to split into inflationary and deflationary regimes, determined by an explicit log-drift criterion. In both cases, large spikes are shown to be at least polynomially likely. In addition, these spikes are shown to be the dominant mechanism by which sharp minima are escaped and curvature is reduced, thereby favouring flatter solutions. Corresponding results are also obtained for certain ReLU networks, and implications for curriculum learning are derived.", "link": "http://arxiv.org/abs/2603.10079v2", "date": "2026-04-13", "relevancy": 2.4318, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5125}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4736}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Large%20Spikes%20in%20Stochastic%20Gradient%20Descent%3A%20A%20Large-Deviations%20View&body=Title%3A%20Large%20Spikes%20in%20Stochastic%20Gradient%20Descent%3A%20A%20Large-Deviations%20View%0AAuthor%3A%20Benjamin%20Gess%20and%20Daniel%20Heydecker%0AAbstract%3A%20Large%20loss%20spikes%20in%20stochastic%20gradient%20descent%20are%20studied%20through%20a%20rigorous%20large-deviations%20analysis%20for%20a%20shallow%2C%20fully%20connected%20network%20in%20the%20NTK%20scaling.%20In%20contrast%20to%20full-batch%20gradient%20descent%2C%20the%20catapult%20phase%20is%20shown%20to%20split%20into%20inflationary%20and%20deflationary%20regimes%2C%20determined%20by%20an%20explicit%20log-drift%20criterion.%20In%20both%20cases%2C%20large%20spikes%20are%20shown%20to%20be%20at%20least%20polynomially%20likely.%20In%20addition%2C%20these%20spikes%20are%20shown%20to%20be%20the%20dominant%20mechanism%20by%20which%20sharp%20minima%20are%20escaped%20and%20curvature%20is%20reduced%2C%20thereby%20favouring%20flatter%20solutions.%20Corresponding%20results%20are%20also%20obtained%20for%20certain%20ReLU%20networks%2C%20and%20implications%20for%20curriculum%20learning%20are%20derived.%0ALink%3A%20http%3A//arxiv.org/abs/2603.10079v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLarge%2520Spikes%2520in%2520Stochastic%2520Gradient%2520Descent%253A%2520A%2520Large-Deviations%2520View%26entry.906535625%3DBenjamin%2520Gess%2520and%2520Daniel%2520Heydecker%26entry.1292438233%3DLarge%2520loss%2520spikes%2520in%2520stochastic%2520gradient%2520descent%2520are%2520studied%2520through%2520a%2520rigorous%2520large-deviations%2520analysis%2520for%2520a%2520shallow%252C%2520fully%2520connected%2520network%2520in%2520the%2520NTK%2520scaling.%2520In%2520contrast%2520to%2520full-batch%2520gradient%2520descent%252C%2520the%2520catapult%2520phase%2520is%2520shown%2520to%2520split%2520into%2520inflationary%2520and%2520deflationary%2520regimes%252C%2520determined%2520by%2520an%2520explicit%2520log-drift%2520criterion.%2520In%2520both%2520cases%252C%2520large%2520spikes%2520are%2520shown%2520to%2520be%2520at%2520least%2520polynomially%2520likely.%2520In%2520addition%252C%2520these%2520spikes%2520are%2520shown%2520to%2520be%2520the%2520dominant%2520mechanism%2520by%2520which%2520sharp%2520minima%2520are%2520escaped%2520and%2520curvature%2520is%2520reduced%252C%2520thereby%2520favouring%2520flatter%2520solutions.%2520Corresponding%2520results%2520are%2520also%2520obtained%2520for%2520certain%2520ReLU%2520networ {"title": "THEIA: Learning Complete Kleene Three-Valued Logic in a Pure-Neural Modular Architecture", "author": "Augustus Haoyang Li", "abstract": "We present THEIA, a modular neural architecture that learns complete Kleene three-valued logic (K3) end-to-end without any external symbolic solver, and investigate what architectural prior enables compositional generalization under uncertainty. THEIA processes four mathematical domains (arithmetic, order, set membership, propositional logic) through dedicated engines that converge in a final logic module. Trained on a 2M-sample dataset with input space ~3.4x10^13, it achieves 12/12 Kleene K3 rule coverage across 5 seeds in 9.2 +/- 3.5 minutes (5.6x faster than a parameter-comparable Transformer under matched settings). A mod-3 sequential composition experiment generalizes from 5-step training to 500-step evaluation at 99.97% +/- 0.02% -- a result that critically depends on structured inductive bias: replacing the four-engine backbone with a flat MLP collapses length generalization to chance by 50 steps regardless of capacity (both 0.80M and parameter-matched 2.75M variants fail), while a pre-LN TF8LTuned Transformer baseline (3,582,147 params) trained under the identical protocol reaches 99.24% at 500 steps (Appendix D). Mechanistic probing reveals that modularity induces a delayed verdict: upstream engines encode domain-specific variables without committing to the final truth value (probe accuracy <= 74% uncertainty-only ceiling), with the verdict emerging only at the Logic Engine boundary -- causally confirmed by activation patching (100% flip rate on 986 matched pairs, replicated across n=5 seeds; 100.0% aggregate). The Transformer baseline reaches equivalent correctness through a qualitatively different representational trajectory (contraction then expansion), suggesting that modular and monolithic architectures implement distinct compositional strategies.", "link": "http://arxiv.org/abs/2604.11284v1", "date": "2026-04-13", "relevancy": 2.4314, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4929}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4929}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20THEIA%3A%20Learning%20Complete%20Kleene%20Three-Valued%20Logic%20in%20a%20Pure-Neural%20Modular%20Architecture&body=Title%3A%20THEIA%3A%20Learning%20Complete%20Kleene%20Three-Valued%20Logic%20in%20a%20Pure-Neural%20Modular%20Architecture%0AAuthor%3A%20Augustus%20Haoyang%20Li%0AAbstract%3A%20We%20present%20THEIA%2C%20a%20modular%20neural%20architecture%20that%20learns%20complete%20Kleene%20three-valued%20logic%20%28K3%29%20end-to-end%20without%20any%20external%20symbolic%20solver%2C%20and%20investigate%20what%20architectural%20prior%20enables%20compositional%20generalization%20under%20uncertainty.%20THEIA%20processes%20four%20mathematical%20domains%20%28arithmetic%2C%20order%2C%20set%20membership%2C%20propositional%20logic%29%20through%20dedicated%20engines%20that%20converge%20in%20a%20final%20logic%20module.%20Trained%20on%20a%202M-sample%20dataset%20with%20input%20space%20~3.4x10%5E13%2C%20it%20achieves%2012/12%20Kleene%20K3%20rule%20coverage%20across%205%20seeds%20in%209.2%20%2B/-%203.5%20minutes%20%285.6x%20faster%20than%20a%20parameter-comparable%20Transformer%20under%20matched%20settings%29.%20A%20mod-3%20sequential%20composition%20experiment%20generalizes%20from%205-step%20training%20to%20500-step%20evaluation%20at%2099.97%25%20%2B/-%200.02%25%20--%20a%20result%20that%20critically%20depends%20on%20structured%20inductive%20bias%3A%20replacing%20the%20four-engine%20backbone%20with%20a%20flat%20MLP%20collapses%20length%20generalization%20to%20chance%20by%2050%20steps%20regardless%20of%20capacity%20%28both%200.80M%20and%20parameter-matched%202.75M%20variants%20fail%29%2C%20while%20a%20pre-LN%20TF8LTuned%20Transformer%20baseline%20%283%2C582%2C147%20params%29%20trained%20under%20the%20identical%20protocol%20reaches%2099.24%25%20at%20500%20steps%20%28Appendix%20D%29.%20Mechanistic%20probing%20reveals%20that%20modularity%20induces%20a%20delayed%20verdict%3A%20upstream%20engines%20encode%20domain-specific%20variables%20without%20committing%20to%20the%20final%20truth%20value%20%28probe%20accuracy%20%3C%3D%2074%25%20uncertainty-only%20ceiling%29%2C%20with%20the%20verdict%20emerging%20only%20at%20the%20Logic%20Engine%20boundary%20--%20causally%20confirmed%20by%20activation%20patching%20%28100%25%20flip%20rate%20on%20986%20matched%20pairs%2C%20replicated%20across%20n%3D5%20seeds%3B%20100.0%25%20aggregate%29.%20The%20Transformer%20baseline%20reaches%20equivalent%20correctness%20through%20a%20qualitatively%20different%20representational%20trajectory%20%28contraction%20then%20expansion%29%2C%20suggesting%20that%20modular%20and%20monolithic%20architectures%20implement%20distinct%20compositional%20strategies.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11284v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTHEIA%253A%2520Learning%2520Complete%2520Kleene%2520Three-Valued%2520Logic%2520in%2520a%2520Pure-Neural%2520Modular%2520Architecture%26entry.906535625%3DAugustus%2520Haoyang%2520Li%26entry.1292438233%3DWe%2520present%2520THEIA%252C%2520a%2520modular%2520neural%2520architecture%2520that%2520learns%2520complete%2520Kleene%2520three-valued%2520logic%2520%2528K3%2529%2520end-to-end%2520without%2520any%2520external%2520symbolic%2520solver%252C%2520and%2520investigate%2520what%2520architectural%2520prior%2520enables%2520compositional%2520generalization%2520under%2520uncertainty.%2520THEIA%25 {"title": "MR.ScaleMaster: Scale-Consistent Collaborative Mapping from Crowd-Sourced Monocular Videos", "author": "Hyoseok Ju and Giseop Kim", "abstract": "Crowd-sourced cooperative mapping from monocular cameras promises scalable 3D reconstruction without specialized sensors, yet remains hindered by two scale-specific failure modes: abrupt scale collapse from false-positive loop closures in repetitive environments, and gradual scale drift over long trajectories and per-robot scale ambiguity that prevent direct multi-session fusion. We present MR.ScaleMaster, a cooperative mapping system for crowd-sourced monocular videos that addresses both failure modes. MR.ScaleMaster introduces three key mechanisms. First, a Scale Collapse Alarm rejects spurious loop closures before they corrupt the pose graph. Second, a Sim(3) anchor node formulation generalizes the classical SE(3) framework to explicitly estimate per-session scale, resolving per-robot scale ambiguity and enforcing global scale consistency. Third, a modular, open-source, plug-and-play interface enables any monocular reconstruction model to integrate without backend modification. On KITTI sequences with up to 15 agents, the Sim(3) formulation achieves a 7.2x ATE reduction over the SE(3) baseline, and the alarm rejects all false-positive loops while preserving every valid constraint. We further demonstrate heterogeneous multi-robot dense mapping fusing MASt3R-SLAM, pi3, and VGGT-SLAM 2.0 within a single unified map.", "link": "http://arxiv.org/abs/2604.11372v1", "date": "2026-04-13", "relevancy": 2.429, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6246}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5969}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", " {"title": "Learning Long-term Motion Embeddings for Efficient Kinematics Generation", "author": "Nick Stracke and Kolja Bauer and Stefan Andreas Baumann and Miguel Angel Bautista and Josh Susskind and Bj\u00f6rn Ommer", "abstract": "Understanding and predicting motion is a fundamental component of visual intelligence. Although modern video models exhibit strong comprehension of scene dynamics, exploring multiple possible futures through full video synthesis remains prohibitively inefficient. We model scene dynamics orders of magnitude more efficiently by directly operating on a long-term motion embedding that is learned from large-scale trajectories obtained from tracker models. This enables efficient generation of long, realistic motions that fulfill goals specified via text prompts or spatial pokes. To achieve this, we first learn a highly compressed motion embedding with a temporal compression factor of 64x. In this space, we train a conditional flow-matching model to generate motion latents conditioned on task descriptions. The resulting motion distributions outperform those of both state-of-the-art video models and specialized task-specific approaches.", "link": "http://arxiv.org/abs/2604.11737v1", "date": "2026-04-13", "relevancy": 2.423, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6356}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.615}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5722}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Long-term%20Motion%20Embeddings%20for%20Efficient%20Kinematics%20Generation&body=Title%3A%20Learning%20Long-term%20Motion%20Embeddings%20for%20Efficient%20Kinematics%20Generation%0AAuthor%3A%20Nick%20Stracke%20an {"title": "Progressively Texture-Aware Diffusion for Contrast-Enhanced Sparse-View CT", "author": "Tianqi Wang and Wenchao Du and Hongyu Yang", "abstract": "Diffusion-based sparse-view CT (SVCT) imaging has achieved remarkable advancements in recent years, thanks to its more stable generative capability. However, recovering reliable image content and visually consistent textures is still a crucial challenge. In this paper, we present a Progressively Texture-aware Diffusion (PTD) model, a coarse-to-fine learning framework tailored for SVCT. Specifically, PTD comprises a basic reconstructive module PTD$_{\\textit{rec}}$ and a conditional diffusion module PTD$_{\\textit{diff}}$. PTD$_{\\textit{rec}}$ first learns a deterministic mapping to recover the majority of the underlying low-frequency signals (i.e., coarse content with smoothed textures), which serves as the initial estimation to enable fidelity. Moreover, PTD$_{\\textit{diff}}$ aims to reconstruct high-fidelity details for coarse prediction, which explores a dual-domain guided conditional diffusion to generate reliable and consistent textures. Extensive experiments on sparse-view CT reconstruction demonstrate that our PTD achieves superior performance in terms of structure similarity and visual appeal with only a few sampling steps, which mitigates the randomness inherent in general diffusion models and enables a better trade-off between visual quality and fidelity of high-frequency details.", "link": "http://arxiv.org/abs/2604.11559v1", "date": "2026-04-13", "relevancy": 2.4211, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6115}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6081}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "ht

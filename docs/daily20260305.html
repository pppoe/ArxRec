{"title": "Monitoring Emergent Reward Hacking During Generation via Internal Activations", "author": "Patrick Wilhelm and Thorsten Wittkopp and Odej Kao", "abstract": "Fine-tuned large language models can exhibit reward-hacking behavior arising from emergent misalignment, which is difficult to detect from final outputs alone. While prior work has studied reward hacking at the level of completed responses, it remains unclear whether such behavior can be identified during generation. We propose an activation-based monitoring approach that detects reward-hacking signals from internal representations as a model generates its response. Our method trains sparse autoencoders on residual stream activations and applies lightweight linear classifiers to produce token-level estimates of reward-hacking activity. Across multiple model families and fine-tuning mixtures, we find that internal activation patterns reliably distinguish reward-hacking from benign behavior, generalize to unseen mixed-policy adapters, and exhibit model-dependent temporal structure during chain-of-thought reasoning. Notably, reward-hacking signals often emerge early, persist throughout reasoning, and can be amplified by increased test-time compute in the form of chain-of-thought prompting under weakly specified reward objectives. These results suggest that internal activation monitoring provides a complementary and earlier signal of emergent misalignment than output-based evaluation, supporting more robust post-deployment safety monitoring for fine-tuned language models.", "link": "http://arxiv.org/abs/2603.04069v1", "date": "2026-03-04", "relevancy": 2.4005, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4943}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4845}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Monitoring%20Emergent%20Reward%20Hacking%20During%20Generation%20via%20Internal%20Activations&body=Title%3A%20Monitoring%20Emergent%20Reward%20Hacking%20During%20Generation%20via%20Internal%20Activations%0AAuthor%3A%20Patrick%20Wilhelm%20and%20Thorsten%20Wittkopp%20and%20Odej%20Kao%0AAbstract%3A%20Fine-tuned%20large%20language%20models%20can%20exhibit%20reward-hacking%20behavior%20arising%20from%20emergent%20misalignment%2C%20which%20is%20difficult%20to%20detect%20from%20final%20outputs%20alone.%20While%20prior%20work%20has%20studied%20reward%20hacking%20at%20the%20level%20of%20completed%20responses%2C%20it%20remains%20unclear%20whether%20such%20behavior%20can%20be%20identified%20during%20generation.%20We%20propose%20an%20activation-based%20monitoring%20approach%20that%20detects%20reward-hacking%20signals%20from%20internal%20representations%20as%20a%20model%20generates%20its%20response.%20Our%20method%20trains%20sparse%20autoencoders%20on%20residual%20stream%20activations%20and%20applies%20lightweight%20linear%20classifiers%20to%20produce%20token-level%20estimates%20of%20reward-hacking%20activity.%20Across%20multiple%20model%20families%20and%20fine-tuning%20mixtures%2C%20we%20find%20that%20internal%20activation%20patterns%20reliably%20distinguish%20reward-hacking%20from%20benign%20behavior%2C%20generalize%20to%20unseen%20mixed-policy%20adapters%2C%20and%20exhibit%20model-dependent%20temporal%20structure%20during%20chain-of-thought%20reasoning.%20Notably%2C%20reward-hacking%20signals%20often%20emerge%20early%2C%20persist%20throughout%20reasoning%2C%20and%20can%20be%20amplified%20by%20increased%20test-time%20compute%20in%20the%20form%20of%20chain-of-thought%20prompting%20under%20weakly%20specified%20reward%20objectives.%20These%20results%20suggest%20that%20internal%20activation%20monitoring%20provides%20a%20co ng%2520chain-of-thought%2520reasoning.%2520Notably%252C%2520reward-hacking%2520signals%2520often%2520emerge%2520early%252C%2520persist%2520throughout%2520reasoning%252C%2520and%2520can%2520be%2520amplified%2520by%2520increased%2520test-time%2520compute%2520in%2520the%2520form%2520of%2520chain-of-thought%2520prompting%2520under%2520weakly%2520specified%2520reward%2520objectives.%2520These%2520results%2520suggest%2520that%2520internal%2520activation%2520monitoring%2520provides%2520a%2520complementary%2520and%2520earlier%2520signal%2520of%2520emergent%2520misalignment%2520than%2520output-based%2520evaluation%252C%2520supporting%2520more%2520robust%2520post-deployment%2520safety%2520monitoring%2520for%2520fine-tuned%2520language%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04069v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Monitoring%20Emergent%20Reward%20Hacking%20During%20Generation%20via%20Internal%20Activations&entry.906535625=Patrick%20Wilhelm%20and%20Thorsten%20Wittkopp%20and%20Odej%20Kao&entry.1292438233=Fine-tuned%20large%20language%20models%20can%20exhibit%20reward-hacking%20behavior%20arising%20from%20emergent%20misalignment%2C%20which%20is%20difficult%20to%20detect%20from%20final%20outputs%20alone.%20While%20prior%20work%20has%20studied%20reward%20hacking%20at%20the%20level%20of%20completed%20responses%2C%20it%20remains%20unclear%20whether%20such%20behavior%20can%20be%20identified%20during%20generation.%20We%20propose%20an%20activation-based%20monitoring%20approach%20that%20detects%20reward-hacking%20signals%20from%20internal%20representations%20as%20a%20model%20generates%20its%20response.%20Our%20method%20trains%20sparse%20autoencoders%20on%20residual%20stream%20activations%20and%20applies%20lightweight%20linear%20classifiers%20to%20produce%20token-level%20estimates%20of%20reward-hacking%20activity.%20Across%20multiple%20model%20fam {"title": "SPRINT: Semi-supervised Prototypical Representation for Few-Shot Class-Incremental Tabular Learning", "author": "Umid Suleymanov and Murat Kantarcioglu and Kevin S Chan and Michael De Lucia and Kevin Hamlen and Latifur Khan and Sharad Mehrotra and Ananthram Swami and Bhavani Thuraisingham", "abstract": "Real-world systems must continuously adapt to novel concepts from limited data without forgetting previously acquired knowledge. While Few-Shot Class-Incremental Learning (FSCIL) is established in computer vision, its application to tabular domains remains largely unexplored. Unlike images, tabular streams (e.g., logs, sensors) offer abundant unlabeled data, a scarcity of expert annotations and negligible storage costs, features ignored by existing vision-based methods that rely on restrictive buffers. We introduce SPRINT, the first FSCIL framework tailored for tabular distributions. SPRINT introduces a mixed episodic training strategy that leverages confidence-based pseudo-labeling to enrich novel class representations and exploits low storage costs to retain base class history. Extensive evaluation across six diverse benchmarks spanning cybersecurity, healthcare, and ecological domains, demonstrates SPRINT's cross-domain robustness. It achieves a state-of-the-art average accuracy of 77.37% (5-shot), outperforming the strongest incremental baseline by 4.45%.", "link": "http://arxiv.org/abs/2603.04321v1", "date": "2026-03-04", "relevancy": 2.3866, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4859}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4748}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPRINT%3A%20Semi-supervised%20Prototypical%20Representation%20for%20Few-Shot%20Class-Incremental%20Tabular%20Learning&body=Title%3A%20SPRINT%3A%20Semi-supervised%20Prototypical%20Representation%20for%20Few-Shot%20Class-Incremental%20Tabular%20Learning%0AAuthor%3A%20Umid%20Suleymanov%20and%20Murat%20Kantarcioglu%20and%20Kevin%20S%20Chan%20and%20Michael%20De%20Lucia%20and%20Kevin%20Hamlen%20and%20Latifur%20Khan%20and%20Sharad%20Mehrotra%20and%20Ananthram%20Swami%20and%20Bhavani%20Thuraisingham%0AAbstract%3A%20Real-world%20systems%20must%20continuously%20adapt%20to%20novel%20concepts%20from%20limited%20data%20without%20forgetting%20previously%20acquired%20knowledge.%20While%20Few-Shot%20Class-Incremental%20Learning%20%28FSCIL%29%20is%20established%20in%20computer%20vision%2C%20its%20application%20to%20tabular%20domains%20remains%20largely%20unexplored.%20Unlike%20images%2C%20tabular%20streams%20%28e.g.%2C%20logs%2C%20sensors%29%20offer%20abundant%20unlabeled%20data%2C%20a%20scarcity%20of%20expert%20annotations%20and%20negligible%20storage%20costs%2C%20features%20ignored%20by%20existing%20vision-based%20methods%20that%20rely%20on%20restrictive%20buffers.%20We%20introduce%20SPRINT%2C%20the%20first%20FSCIL%20framework%20tailored%20for%20tabular%20distributions.%20SPRINT%20introduces%20a%20mixed%20episodic%20training%20strategy%20that%20leverages%20confidence-based%20pseudo-labeling%20to%20enrich%20novel%20class%20representations%20and%20exploits%20low%20storage%20costs%20to%20retain%20base%20class%20history.%20Extensive%20evaluation%20across%20six%20diverse%20benchmarks%20spanning%20cybersecurity%2C%20healthcare%2C%20and%20ecological%20domains%2C%20demonstrates%20SPRINT%27s%20cross-domain%20robustness.%20It%20achieves%20a%20state-of-the-art%20average%20accuracy%20of%2077.37%25%20%285-shot%29%2C%20outperforming%20the%20strongest%20incremental%20baseline%20by%204.45%25.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04321v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPRINT%253A%2520Semi-supervised%2520Prototypical%2520Representation%2520for%2520Few-Shot%2520Class-Incremental%2520Tabular%2520Learning%26entry.906535625%3DUmid%2520Suleymanov%2520and%2520Murat%2520Kantarcioglu%2520and%2520Kevin%2520S%2520Chan%2520and%2520Michael%2520De%2520Lucia%2520and%2520Kevin%2520Hamlen%2520and%2520Latifur%2520Khan%2520and%2520Sharad%2520Mehrotra%2520and%2520Ananthram%2520Swami%2520and%2520Bhavani%2520Thuraisingham%26entry.1292438233%3DReal-world%2520systems%2520must%2520continuously%2520adapt%2520to%2520novel%2520concepts%2520from%2520limited%2520data%2520without%2520forgetting%2520previously%2520acquired%2520knowledge.%2520While%2520Few-Shot%2520Class-Incremental%2520Learning%2520%2528FSCIL%2529%2520is%2520established%2520in%2520computer%2520vision%252C%2520its%2520application%2520to%2520tabular%2520domains%2520remains%2520largely%2520unexplored.%2520Unlike%2520images%252C%2520tabular%2520streams%2520%2528e.g.%252C%2520logs%252C%2520sensors%2529%2520offer%2520abundant%2520unlabeled%2520data%252C%2520a%2520scarcity%2520of%2520expert%2520annotations%2520and%2520negligible%2520storage%2520costs%252C%2520features%2520ignored%2520by%2520existing%2520vision-based%2520methods%2520that%2520rely%2520on%2520restrictive%2520buffers.%2520We%2520introduce%2520SPRINT%252C%2520the%2520first%2520FSCIL%2520framework%2520tailored%2520for%2520tabular%2520distributions.%2520SPRINT%2520introduces%2520a%2520mixed%2520episodic%2520training%2520strategy%2520that%2520leverages%2520confidence-based%2520pseudo-labeling%2520to%2520enrich%2520novel%2520class%2520representations%2520and%2520exploits%2520low%2520storage%2520costs%2520to%2520retain%2520base%2520class%2520history.%2520Extensive%2520evaluation%2520across%2520six%2520diverse%2520benchmarks%2520spanning%2520cybersecurity%252C%2520healthcare%252C%2520and%2520ecological%2520domains%252C%2520demonstrates%2520SPRINT%2527s%2520cross-domain%2520robustness.%2520It%2520achieves%2520a%2520state-of-the-art%2520average%2520accuracy%2520of%252077.37%2525%2520%25285-shot%2529%252C%2520outperforming%2520the%2520strongest%2520incremental%2520baseline%2520by%25204.45%2525.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04321v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SPRINT%3A%20Semi-supervised%20Prototypical%20Representation%20for%20Few-Shot%20Class-Incremental%20Tabular%20Learning&entry.906535625=Umid%20Suleymanov%20and%20Murat%20Kantarcioglu%20and%20Kevin%20S%20Chan%20and%20Michael%20De%20Lucia%20and%20Kevin%20Hamlen%20and%20Latifur%20Khan%20and%20Sharad%20Mehrotra%20and%20Ananthram%20Swami%20and%20Bhavani%20Thuraisingham&entry.1292438233=Real-world%20systems%20must%20continuously%20adapt%20to%20novel%20concepts%20from%20limited%20data%20without%20forgetting%20previously%20acquired%20knowledge.%20While%20Few-Shot%20Class-Incremental%20Learning%20%28FSCIL%29%20is%20established%20in%20computer%20vision%2C%20its%20application%20to%20tabular%20domains%20remains%20largely%20unexplored.%20Unlike%20images%2C%20tabular%20streams%20%28e.g.%2C%20logs%2C%20sensors%29%20offer%20abundant%20unlabeled%20data%2C%20a%20scarcity%20of%20expert%20annotations%20and%20negligible%20storage%20costs%2C%20features%20ignored%20by%20existing%20vision-based%20methods%20that%20rely%20on%20restrictive%20buffers.%20We%20introduce%20SPRINT%2C%20the%20first%20FSCIL%20framework%20tailored%20for%20tabular%20distributions.%20SPRINT%20introduces%20a%20mixed%20episodic%20training%20strategy%20that%20leverages%20confidence-based%20pseudo-labeling%20to%20enrich%20novel%20class%20representations%20and%20exploits%20low%20storage%20costs%20to%20retain%20base%20class%20history.%20Extensive%20evaluation%20across%20six%20diverse%20benchmarks%20spanning%20cybersecurity%2C%20healthcare%2C%20and%20ecological%20domains%2C%20demonstrates%20SPRINT%27s%20cross-domain%20robustness.%20It%20achieves%20a%20state-of-the-art%20average%20accuracy%20of%2077.37%25%20%285-shot%29%2C%20outperforming%20the%20strongest%20incremental%20baseline%20by%204.45%25.&entry.1838667208=http%3A//arxiv.org/abs/2603.04321v1&entry.124074799=Read"},
{"title": "Building a Mind Palace: Structuring Environment-Grounded Semantic Graphs for Effective Long Video Analysis with LLMs", "author": "Zeyi Huang and Yuyang Ji and Xiaofang Wang and Nikhil Mehta and Tong Xiao and Donghyun Lee and Sigmund Vanvalkenburgh and Shengxin Zha and Bolin Lai and Yiqiu Ren and Licheng Yu and Ning Zhang and Yong Jae Lee and Miao Liu", "abstract": "Long-form video understanding with Large Vision Language Models is challenged by the need to analyze temporally dispersed yet spatially concentrated key moments within limited context windows. In this work, we introduce VideoMindPalace, a new framework inspired by the \"Mind Palace\", which organizes critical video moments into a topologically structured semantic graph. VideoMindPalace organizes key information through (i) hand-object tracking and interaction, (ii) clustered activity zones representing specific areas of recurring activities, and (iii) environment layout mapping, allowing natural language parsing by LLMs to provide grounded insights on spatio-temporal and 3D context. In addition, we propose the Video MindPalace Benchmark (VMB), to assess human-like reasoning, including spatial localization, temporal reasoning, and layout-aware sequential understanding. Evaluated on VMB and established video QA datasets, including EgoSchema, NExT-QA, IntentQA, and the Active Memories Benchmark, VideoMindPalace demonstrates notable gains in spatio-temporal coherence and human-aligned reasoning, advancing long-form video analysis capabilities in VLMs.", "link": "http://arxiv.org/abs/2501.04336v2", "date": "2026-03-04", "relevancy": 2.3812, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6046}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6046}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5489}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Building%20a%20Mind%20Palace%3A%20Structuring%20Environment-Grounded%20Semantic%20Graphs%20for%20Effective%20Long%20Video%20Analysis%20with%20LLMs&body=Title%3A%20Building%20a%20Mind%20Palace%3A%20Structuring%20Environment-Grounded%20Semantic%20Graphs%20for%20Effective%20Long%20Video%20Analysis%20with%20LLMs%0AAuthor%3A%20Zeyi%20Huang%20and%20Yuyang%20Ji%20and%20Xiaofang%20Wang%20and%20Nikhil%20Mehta%20and%20Tong%20Xiao%20and%20Donghyun%20Lee%20and%20Sigmund%20Vanvalkenburgh%20and%20Shengxin%20Zha%20and%20Bolin%20Lai%20and%20Yiqiu%20Ren%20and%20Licheng%20Yu%20and%20Ning%20Zhang%20and%20Yong%20Jae%20Lee%20and%20Miao%20Liu%0AAbstract%3A%20Long-form%20video%20understanding%20with%20Large%20Vision%20Language%20Models%20is%20challenged%20by%20the%20need%20to%20analyze%20temporally%20dispersed%20yet%20spatially%20concentrated%20key%20moments%20within%20limited%20context%20windows.%20In%20this%20work%2C%20we%20introduce%20VideoMindPalace%2C%20a%20new%20framework%20inspired%20by%20the%20%22Mind%20Palace%22%2C%20which%20organizes%20critical%20video%20moments%20into%20a%20topologically%20structured%20semantic%20graph.%20VideoMindPalace%20organizes%20key%20information%20through%20%28i%29%20hand-object%20tracking%20and%20interaction%2C%20%28ii%29%20clustered%20activity%20zones%20representing%20specific%20areas%20of%20recurring%20activities%2C%20and%20%28iii%29%20environment%20layout%20mapping%2C%20allowing%20natural%20language%20parsing%20by%20LLMs%20to%20provide%20grounded%20insights%20on%20spatio-temporal%20and%203D%20context.%20In%20addition%2C%20we%20propose%20the%20Video%20MindPalace%20Benchmark%20%28VMB%29%2C%20to%20assess%20human-like%20reasoning%2C%20including%20spatial%20localization%2C%20temporal%20reasoning%2C%20and%20layout-aware%20sequential%20understan {"title": "Stable and Steerable Sparse Autoencoders with Weight Regularization", "author": "Piotr Jedryszek and Oliver M. Crook", "abstract": "Sparse autoencoders (SAEs) are widely used to extract human-interpretable features from neural network activations, but their learned features can vary substantially across random seeds and training choices. To improve stability, we studied weight regularization by adding L1 or L2 penalties on encoder and decoder weights, and evaluate how regularization interacts with common SAE training defaults. On MNIST, we observe that L2 weight regularization produces a core of highly aligned features and, when combined with tied initialization and unit-norm decoder constraints, it dramatically increases cross-seed feature consistency. For TopK SAEs trained on language model activations (Pythia-70M-deduped), adding a small L2 weight penalty increased the fraction of features shared across three random seeds and roughly doubles steering success rates, while leaving the mean of automated interpretability scores essentially unchanged. Finally, in the regularized setting, activation steering success becomes better predicted by auto-interpretability scores, suggesting that regularization can align text-based feature explanations with functional controllability.", "link": "http://arxiv.org/abs/2603.04198v1", "date": "2026-03-04", "relevancy": 2.3801, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5242}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4539}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.45}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stable%20and%20Steerable%20Sparse%20Autoencoders%20with%20Weight%20Regularization&body=Title%3A%20Stable%20and%20Steerable%20Sparse%20Autoencoders%20with%20Weight%20Regularization%0AAuthor%3A%20Piotr%20Jedryszek%20and%20Oliver%20M.%20Crook%0AAbstract%3A%20Sparse%20autoencoders%20%28SAEs%29%20are%20widely%20used%20to%20extract%20human-interpretable%20features%20from%20neural%20network%20activations%2C%20but%20their%20learned%20features%20can%20vary%20substantially%20across%20random%20seeds%20and%20training%20choices.%20To%20improve%20stability%2C%20we%20studied%20weight%20regularization%20by%20adding%20L1%20or%20L2%20penalties%20on%20encoder%20and%20decoder%20weights%2C%20and%20evaluate%20how%20regularization%20interacts%20with%20common%20SAE%20training%20defaults.%20On%20MNIST%2C%20we%20observe%20that%20L2%20weight%20regularization%20produces%20a%20core%20of%20highly%20aligned%20features%20and%2C%20when%20combined%20with%20tied%20initialization%20and%20unit-norm%20decoder%20constraints%2C%20it%20dramatically%20increases%20cross-seed%20feature%20consistency.%20For%20TopK%20SAEs%20trained%20on%20language%20model%20activations%20%28Pythia-70M-deduped%29%2C%20adding%20a%20small%20L2%20weight%20penalty%20increased%20the%20fraction%20of%20features%20shared%20across%20three%20random%20seeds%20and%20roughly%20doubles%20steering%20success%20rates%2C%20while%20leaving%20the%20mean%20of%20automated%20interpretability%20scores%20essentially%20unchanged.%20Finally%2C%20in%20the%20regularized%20setting%2C%20activation%20steering%20success%20becomes%20better%20predicted%20by%20auto-interpretability%20scores%2C%20suggesting%20that%20regularization%20can%20align%20text-based%20feature%20explanations%20with%20functional%20controllability.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04198v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStable%2520and%2520Steerable%2520Sparse%2520Autoencoders%2520with%2520Weight%2520Regularization%26entry.9065356 {"title": "Evolution 6.0: Robot Evolution through Generative Design", "author": "Muhammad Haris Khan and Artyom Myshlyaev and Artem Lykov and Miguel Altamirano Cabrera and Dzmitry Tsetserukou", "abstract": "We propose a new concept, Evolution 6.0, which represents the evolution of robotics driven by Generative AI. When a robot lacks the necessary tools to accomplish a task requested by a human, it autonomously designs the required instruments and learns how to use them to achieve the goal. Evolution 6.0 is an autonomous robotic system powered by Vision-Language Models (VLMs), Vision-Language Action (VLA) models, and Text-to-3D generative models for tool design and task execution. The system comprises two key modules: the Tool Generation Module, which fabricates task-specific tools from visual and textual data, and the Action Generation Module, which converts natural language instructions into robotic actions. It integrates QwenVLM for environmental understanding, OpenVLA for task execution, and Llama-Mesh for 3D tool generation. Evaluation results demonstrate a 90% success rate for tool generation with a 10-second inference time, and action generation achieving 83.5% in physical and visual generalization, 70% in motion generalization, and 37% in semantic generalization. Future improvements will focus on bimanual manipulation, expanded task capabilities, and enhanced environmental interpretation to improve real-world adaptability.", "link": "http://arxiv.org/abs/2502.17034v5", "date": "2026-03-04", "relevancy": 2.3797, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6024}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5966}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5867}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evolution%206.0%3A%20Robot%20Evolution%20through%20Generative%20Design&body=Title%3A%20Evolution%206.0%3A%20Robot%20Evolution%20through%20Generative%20Design%0AAuthor%3A%20Muhammad%20Haris%20Khan%20and%20Artyom%20Myshlyaev%20and%20Artem%20Lykov%20and%20Miguel%20Altamirano%20Cabrera%20and%20Dzmitry%20Tsetserukou%0AAbstract%3A%20We%20propose%20a%20new%20concept%2C%20Evolution%206.0%2C%20which%20represents%20the%20evolution%20of%20robotics%20driven%20by%20Generative%20AI.%20When%20a%20robot%20lacks%20the%20necessary%20tools%20to%20accomplish%20a%20task%20requested%20by%20a%20human%2C%20it%20autonomously%20designs%20the%20required%20instruments%20and%20learns%20how%20to%20use%20them%20to%20achieve%20the%20goal.%20Evolution%206.0%20is%20an%20autonomous%20robotic%20system%20powered%20by%20Vision-Language%20Models%20%28VLMs%29%2C%20Vision-Language%20Action%20%28VLA%29%20models%2C%20and%20Text-to-3D%20generative%20models%20for%20tool%20design%20and%20task%20execution.%20The%20system%20comprises%20two%20key%20modules%3A%20the%20Tool%20Generation%20Module%2C%20which%20fabricates%20task-specific%20tools%20from%20visual%20and%20textual%20data%2C%20and%20the%20Action%20Generation%20Module%2C%20which%20converts%20natural%20language%20instructions%20into%20robotic%20actions.%20It%20integrates%20QwenVLM%20for%20environmental%20understanding%2C%20OpenVLA%20for%20task%20execution%2C%20and%20Llama-Mesh%20for%203D%20tool%20generation.%20Evaluation%20results%20demonstrate%20a%2090%25%20success%20rate%20for%20tool%20generation%20with%20a%2010-second%20inference%20time%2C%20and%20action%20generation%20achieving%2083.5%25%20in%20physical%20and%20visual%20generalization%2C%2070%25%20in%20motion%20generalization%2C%20and%2037%25%20in%20semantic%20generalization.%20Future%20improvements%20will%20focus%20on%20bimanual%20manipulation%2C%20expanded%20task%20capabilities%2C%20and%20enhanced%20environmental%20interpretation%20to%20improve%20real-world%20adaptabi {"title": "Gaussian Mixture-Based Inverse Perception Contract for Uncertainty-Aware Robot Navigation", "author": "Bingyao Du and Joonkyung Kim and Yiwei Lyu", "abstract": "Reliable navigation in cluttered environments requires perception outputs that are not only accurate but also equipped with uncertainty sets suitable for safe control. An inverse perception contract (IPC) provides such a connection by mapping perceptual estimates to sets that contain the ground truth with high confidence. Existing IPC formulations, however, instantiate uncertainty as a single ellipsoidal set and rely on deterministic trust scores to guide robot motion. Such a representation cannot capture the multi-modal and irregular structure of fine-grained perception errors, often resulting in over-conservative sets and degraded navigation performance. In this work, we introduce Gaussian Mixture-based Inverse Perception Contract (GM-IPC), which extends IPC to represent uncertainty with unions of ellipsoidal confidence sets derived from Gaussian mixture models. This design moves beyond deterministic single-set abstractions, enabling fine-grained, multi-modal, and non-convex error structures to be captured with formal guarantees. A learning framework is presented that trains GM-IPC to account for probabilistic inclusion, distribution matching, and empty-space penalties, ensuring both validity and compactness of the predicted sets. We further show that the resulting uncertainty characterizations can be leveraged in downstream planning frameworks for real-time safe navigation, enabling less conservative and more adaptive robot motion while preserving safety in a probabilistic manner.", "link": "http://arxiv.org/abs/2603.04329v1", "date": "2026-03-04", "relevancy": 2.377, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6332}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5952}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaussian%20Mixture-Based%20Inverse%20Perception%20Contract%20for%20Uncertainty-Aware%20Robot%20Navigation&body=Title%3A%20Gaussian%20Mixture-Based%20Inverse%20Perception%20Contract%20for%20Uncertainty-Aware%20Robot%20Navigation%0AAuthor%3A%20Bingyao%20Du%20and%20Joonkyung%20Kim%20and%20Yiwei%20Lyu%0AAbstract%3A%20Reliable%20navigation%20in%20cluttered%20environments%20requires%20perception%20outputs%20that%20are%20not%20only%20accurate%20but%20also%20equipped%20with%20uncertainty%20sets%20suitable%20for%20safe%20control.%20An%20inverse%20perception%20contract%20%28IPC%29%20provides%20such%20a%20connection%20by%20mapping%20perceptual%20estimates%20to%20sets%20that%20contain%20the%20ground%20truth%20with%20high%20confidence.%20Existing%20IPC%20formulations%2C%20however%2C%20instantiate%20uncertainty%20as%20a%20single%20ellipsoidal%20set%20and%20rely%20on%20deterministic%20trust%20scores%20to%20guide%20robot%20motion.%20Such%20a%20representation%20cannot%20capture%20the%20multi-modal%20and%20irregular%20structure%20of%20fine-grained%20perception%20errors%2C%20often%20resulting%20in%20over-conservative%20sets%20and%20degraded%20navigation%20performance.%20In%20this%20work%2C%20we%20introduce%20Gaussian%20Mixture-based%20Inverse%20Perception%20Contract%20%28GM-IPC%29%2C%20which%20extends%20IPC%20to%20represent%20uncertainty%20with%20unions%20of%20ellipsoidal%20confidence%20sets%20derived%20from%20Gaussian%20mixture%20models.%20This%20design%20moves%20beyond%20deterministic%20single-set%20abstractions%2C%20enabling%20fine-grained%2C%20multi-modal%2C%20and%20non-convex%20error%20structures%20to%20be%20captured%20with%20formal%20guarantees.%20A%20learning%20framework%20is%20presented%20that%20trains%20GM-IPC%20to%20account%20for%20probabilistic%20inclusion%2C%20distribution%20matching%2C%20and%20empty-space%20penalties%2C%20ensuring%20both%20validity%20and%20compactness%20of%20the%20predicted%20sets.%20We%20further%20show%20that%20the%20resulting%20uncertainty%20characterizations%20can%20be%20leveraged%20in%20downstream%20planning%20frameworks%20for%20real-time%20safe%20navigation%2C%20enabling%20less%20conservative%20and%20more%20adaptive%20robot%20motion%20while%20preserving%20safety%20in%20a%20probabilistic%20manner.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04329v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGaussian%2520Mixture-Based%2520Inverse%2520Perception%2520Contract%2520for%2520Uncertainty-Aware%2520Robot%2520Navigation%26entry.906535625%3DBingyao%2520Du%2520and%2520Joonkyung%2520Kim%2520and%2520Yiwei%2520Lyu%26entry.1292438233%3DReliable%2520navigation%2520in%2520cluttered%2520environments%2520requires%2520perception%2520outputs%2520that%2520are%2520not%2520only%2520accurate%2520but%2520also%2520equipped%2520with%2520uncertainty%2520sets%2520suitable%2520for%2520safe%2520control.%2520An%2520inverse%2520perception%2520contract%2520%2528IPC%2529%2520provides%2520such%2520a%2520connection%2520by%2520mapping%2520perceptual%2520estimates%2520to%2520sets%2520that%2520contain%2520the%2520ground%2520truth%2520with%2520high%2520confidence.%2520Existing%2520IPC%2520formulations%252C%2520however%252C%2520instantiate%2520uncertainty%2520as%2520a%2520single%2520ellipsoidal%2520set%2520and%2520rely%2520on%2520deterministic%2520trust%2520scores%2520to%2520guide%2520robot%2520motion.%2520Such%2520a%2520representation%2520cannot%2520capture%2520the%2520multi-modal%2520and%2520irregular%2520structure%2520of%2520fine-grained%2520perception%2520errors%252C%2520often%2520result ets%20suitable%20for%20safe%20control.%20An%20inverse%20perception%20contract%20%28IPC%29%20provides%20such%20a%20connection%20by%20mapping%20perceptual%20estimates%20to%20sets%20that%20contain%20the%20ground%20truth%20with%20high%20confidence.%20Existing%20IPC%20formulations%2C%20however%2C%20instantiate%20uncertainty%20as%20a%20single%20ellipsoidal%20set%20and%20rely%20on%20deterministic%20trust%20scores%20to%20guide%20robot%20motion.%20Such%20a%20representation%20cannot%20capture%20the%20multi-modal%20and%20irregular%20structure%20of%20fine-grained%20perception%20errors%2C%20often%20resulting%20in%20over-conservative%20sets%20and%20degraded%20navigation%20performance.%20In%20this%20work%2C%20we%20introduce%20Gaussian%20Mixture-based%20Inverse%20Perception%20Contract%20%28GM-IPC%29%2C%20which%20extends%20IPC%20to%20represent%20uncertainty%20with%20unions%20of%20ellipsoidal%20confidence%20sets%20derived%20from%20Gaussian%20mixture%20models.%20This%20design%20moves%20beyond%20deterministic%20single-set%20abstractions%2C%20enabling%20fine-grained%2C%20multi-modal%2C%20and%20non-convex%20error%20structures%20to%20be%20captured%20with%20formal%20guarantees.%20A%20learning%20framework%20is%20presented%20that%20trains%20GM-IPC%20to%20account%20for%20probabilistic%20inclusion%2C%20distribution%20matching%2C%20and%20empty-space%20penalties%2C%20ensuring%20both%20validity%20and%20compactness%20of%20the%20predicted%20sets.%20We%20further%20show%20that%20the%20resulting%20uncertainty%20characterizations%20can%20be%20leveraged%20in%20downstream%20planning%20frameworks%20for%20real-time%20safe%20navigation%2C%20enabling%20less%20conservative%20and%20more%20adaptive%20robot%20motion%20while%20preserving%20safety%20in%20a%20probabilistic%20manner.&entry.1838667208=http%3A//arxiv.org/abs/2603.04329v1&entry.124074799=Read"},
{"title": "STEM Faculty Perspectives on Generative AI in Higher Education", "author": "Akila de Silva and Isabel Hyo Jung Song and Hui Yang and Shah Rukh Humayoun", "abstract": "Generative artificial intelligence (GenAI) tools are increasingly present in higher education, yet their adoption has been largely student-driven, requiring instructors to respond to technologies already embedded in classroom practices. While some faculty have embraced GenAI for pedagogical purposes such as content generation, assessment support, and curriculum design, others approach these tools with caution, citing concerns about student learning, assessment validity, and academic integrity. Understanding faculty perspectives is therefore essential for informing effective pedagogical strategies and institutional policies. In this paper, we present findings from a focus group study with 29 STEM faculty members at a large public university in the United States. We examine how faculty integrate GenAI into their courses, the benefits and challenges they perceive for student learning, and the institutional support they identify as necessary for effective and responsible adoption. Our findings highlight key patterns in how STEM faculty engage with GenAI, reflecting both active adoption and cautious use. Faculty described a range of pedagogical applications alongside concerns about student learning, assessment, and academic integrity. Overall, the results suggest that effective integration of GenAI in higher education requires rethinking assessment, pedagogy, and institutional governance in addition to technical adoption.", "link": "http://arxiv.org/abs/2603.04001v1", "date": "2026-03-04", "relevancy": 2.3681, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4978}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4788}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20STEM%20Faculty%20Perspectives%20on%20Generative%20AI%20in%20Higher%20Education&body=Title%3A%20STEM%20Faculty%20Perspectives%20on%20Generative%20AI%20in%20Higher%20Education%0AAuthor%3A%20Akila%20de%20Silva%20and%20Isabel%20Hyo%20Jung%20Song%20and%20Hui%20Yang%20and%20Shah%20Rukh%20Humayoun%0AAbstract%3A%20Generative%20artificial%20intelligence%20%28GenAI%29%20tools%20are%20increasingly%20present%20in%20higher%20education%2C%20yet%20their%20adoption%20has%20been%20largely%20student-driven%2C%20requiring%20instructors%20to%20respond%20to%20technologies%20already%20embedded%20in%20classroom%20practices.%20While%20some%20faculty%20have%20embraced%20GenAI%20for%20pedagogical%20purposes%20such%20as%20content%20generation%2C%20assessment%20support%2C%20and%20curriculum%20design%2C%20others%20approach%20these%20tools%20with%20caution%2C%20citing%20concerns%20about%20student%20learning%2C%20assessment%20validity%2C%20and%20academic%20integrity.%20Understanding%20faculty%20perspectives%20is%20therefore%20essential%20for%20informing%20effective%20pedagogical%20strategies%20and%20institutional%20policies.%20In%20this%20paper%2C%20we%20present%20findings%20from%20a%20focus%20group%20study%20with%2029%20STEM%20faculty%20members%20at%20a%20large%20public%20university%20in%20the%20United%20States.%20We%20examine%20how%20faculty%20integrate%20GenAI%20into%20their%20courses%2C%20the%20benefits%20and%20challenges%20they%20perceive%20for%20student%20learning%2C%20and%20the%20institutional%20support%20they%20identify%20as%20necessary%20for%20effective%20and%20responsible%20adoption.%20Our%20findings%20highlight%20key%20patterns%20in%20how%20STEM%20faculty%20engage%20with%20GenAI%2C%20reflecting%20both%20active%20adoption%20and%20cautious%20use.%20Faculty% {"title": "SimpliHuMoN: Simplifying Human Motion Prediction", "author": "Aadya Agrawal and Alexander Schwing", "abstract": "Human motion prediction combines the tasks of trajectory forecasting and human pose prediction. For each of the two tasks, specialized models have been developed. Combining these models for holistic human motion prediction is non-trivial, and recent methods have struggled to compete on established benchmarks for individual tasks. To address this, we propose a simple yet effective transformer-based model for human motion prediction. The model employs a stack of self-attention modules to effectively capture both spatial dependencies within a pose and temporal relationships across a motion sequence. This simple, streamlined, end-to-end model is sufficiently versatile to handle pose-only, trajectory-only, and combined prediction tasks without task-specific modifications. We demonstrate that this approach achieves state-of-the-art results across all tasks through extensive experiments on a wide range of benchmark datasets, including Human3.6M, AMASS, ETH-UCY, and 3DPW.", "link": "http://arxiv.org/abs/2603.04399v1", "date": "2026-03-04", "relevancy": 2.3674, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6338}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5703}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SimpliHuMoN%3A%20Simplifying%20Human%20Motion%20Prediction&body=Title%3A%20SimpliHuMoN%3A%20Simplifying%20Human%20Motion%20Prediction%0AAuthor%3A%20Aadya%20Agrawal%20and%20Alexander%20Schwing%0AAbstract%3A%20Human%20motion%20prediction%20combines%20 {"title": "Nearest-Neighbor Density Estimation for Dependency Suppression", "author": "Kathleen Anderson and Thomas Martinetz", "abstract": "The ability to remove unwanted dependencies from data is crucial in various domains, including fairness, robust learning, and privacy protection. In this work, we propose an encoder-based approach that learns a representation independent of a sensitive variable but otherwise preserving essential data characteristics. Unlike existing methods that rely on decorrelation or adversarial learning, our approach explicitly estimates and modifies the data distribution to neutralize statistical dependencies. To achieve this, we combine a specialized variational autoencoder with a novel loss function driven by non-parametric nearest-neighbor density estimation, enabling direct optimization of independence. We evaluate our approach on multiple datasets, demonstrating that it can outperform existing unsupervised techniques and even rival supervised methods in balancing information removal and utility.", "link": "http://arxiv.org/abs/2603.04224v1", "date": "2026-03-04", "relevancy": 2.3565, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4877}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4655}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4607}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Nearest-Neighbor%20Density%20Estimation%20for%20Dependency%20Suppression&body=Title%3A%20Nearest-Neighbor%20Density%20Estimation%20for%20Dependency%20Suppression%0AAuthor%3A%20Kathleen%20Anderson%20and%20Thomas%20Martinetz%0AAbstract%3A%20The%20ability%20to%20remove%20unwanted%20dependencies%20from%20data%20is%20crucial%20in%20various%20domains%2C%20including%20fairness%2C%20robust%20learning%2C%20and%20privacy%20protection.%20In%20this%20work%2C%20we%20propose%20an%20encoder-based%20approach%20that%20learns%20a%20representation%20independent%20of%20a%20sensitive%20variable%20but%20otherwise%20preserving%20essential%20data%20characteristics.%20Unlike%20existing%20methods%20that%20rely%20on%20decorrelation%20or%20adversarial%20learning%2C%20our%20approach%20explicitly%20estimates%20and%20modifies%20the%20data%20distribution%20to%20neutralize%20statistical%20dependencies.%20To%20achieve%20this%2C%20we%20combine%20a%20specialized%20variational%20autoencoder%20with%20a%20novel%20loss%20function%20driven%20by%20non-parametric%20nearest-neighbor%20density%20estimation%2C%20enabling%20direct%20optimization%20of%20independence.%20We%20evaluate%20our%20approach%20on%20multiple%20datasets%2C%20demonstrating%20that%20it%20can%20outperform%20existing%20unsupervised%20techniques%20and%20even%20rival%20supervised%20methods%20in%20balancing%20information%20removal%20and%20utility.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04224v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNearest-Neighbor%2520Density%2520Estimation%2520for%2520Dependency%2520Suppression%26entry.906535625%3DKathleen%2520Anderson%2520and%2520Thomas%2520Martinetz%26entry.1292438233%3DThe%2520ability%2520to%2520remove%2520unwanted%2520dependencies%2520from%2520data%2520is%2520crucial%2520in%2520various%2520domains%252C%2520including%2520fairness%252C%2520robust%2520learning%252C%2520and%2520privacy%2520protection.%2520In%2520this%2520work%252C%2520we%2520propose%2520an%2520encoder-based%2520approach%2520that%2520learns%2520a%2520representation%2520independent%2520of%2520a%2520sensitive%2520variable%2520but%2520otherwise%2520preserving%2520essential%2520data%2520characteristics.%2520Unlike%2520existing%2520methods%2520that%2520rely%2520on%2520decorrelation%2520or%2520ad {"title": "A Bayesian Framework for Active Tactile Object Recognition, Pose Estimation and Shape Transfer Learning", "author": "Haodong Zheng and Andrei Jalba and Raymond H. Cuijpers and Wijnand IJsselsteijn and Sanne Schoenmakers", "abstract": "As humans can explore and understand the world through active touch, similar capability is desired for robots. In this paper, we address the problem of active tactile object recognition, pose estimation and shape transfer learning, where a customized particle filter (PF) and Gaussian process implicit surface (GPIS) is combined in a unified Bayesian framework. Upon new tactile input, the customized PF updates the joint distribution of the object class and object pose while tracking the novelty of the object. Once a novel object is identified, its shape will be reconstructed using GPIS. By grounding the prior of the GPIS with the maximum-a-posteriori (MAP) estimation from the PF, the knowledge about known shapes can be transferred to learn novel shapes. An exploration procedure based on global shape estimation is proposed to guide active data acquisition and terminate the exploration upon sufficient information. Through experiments in simulation, the proposed framework demonstrated its effectiveness and efficiency in estimating object class and pose for known objects and learning novel shapes. Furthermore, it can recognize previously learned shapes reliably.", "link": "http://arxiv.org/abs/2409.06912v4", "date": "2026-03-04", "relevancy": 2.3543, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6664}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5761}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5699}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Bayesian%20Framework%20for%20Active%20Tactile%20Object%20Recognition%2C%20Pose%20Estimation%20and%20Shape%20Transfer%20Learning&body=Title%3A%20A%20Bayesian%20Framework%20for%20Active%20Tactile%20Object%20Recognition%2C%20Pose%20Estimation%20and%20Shape%20Transfer%20Learning%0AAuthor%3A%20Haodong%20Zheng%20and%20Andrei%20Jalba%20and%20Raymond%20H.%20Cuijpers%20and%20Wijnand%20IJsselsteijn%20and%20Sanne%20Schoenmakers%0AAbstract%3A%20As%20humans%20can%20explore%20and%20understand%20the%20world%20through%20active%20touch%2C%20similar%20capability%20is%20desired%20for%20robots.%20In%20this%20paper%2C%20we%20address%20the%20problem%20of%20active%20tactile%20object%20recognition%2C%20pose%20estimation%20and%20shape%20transfer%20learning%2C%20where%20a%20customized%20particle%20filter%20%28PF%29%20and%20Gaussian%20process%20implicit%20surface%20%28GPIS%29%20is%20combined%20in%20a%20unified%20Bayesian%20framework.%20Upon%20new%20tactile%20input%2C%20the%20customized%20PF%20updates%20the%20joint%20distribution%20of%20the%20object%20class%20and%20object%20pose%20while%20tracking%20the%20novelty%20of%20the%20object.%20Once%20a%20novel%20object%20is%20identified%2C%20its%20shape%20will%20be%20reconstructed%20using%20GPIS.%20By%20grounding%20the%20prior%20of%20the%20GPIS%20with%20the%20maximum-a-posteriori%20%28MAP%29%20estimation%20from%20the%20PF%2C%20the%20knowledge%20about%20known%20shapes%20can%20be%20transferred%20to%20learn%20novel%20shapes.%20An%20exploration%20procedure%20based%20on%20global%20shape%20estimation%20is%20proposed%20to%20guide%20active%20data%20acquisition%20and%20terminate%20the%20exploration%20upon%20sufficient%20information.%20Through%20experiments%20in%20simulation%2C%20the%20proposed%20framework%20demonstrated%20its%20effectiveness%20and%20efficiency%20in%20estimating%20object%20class%20and%20pose%20for%20known%20objects%20and%20learning%20novel%20shapes.%20Furthermore%2C%20it%20can%20recognize%20previously%20learned%20shapes%20reliably.%0ALink%3A%20http%3A//arxiv.org/abs/2409.06912v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Bayesian%2520Framework%2520for%2520Active%2520Tactile%2520Object%2520Recognition%252C%2520Pose%2520Estimation%2520and%2520Shape%2520Transfer%2520Learning%26entry.906535625%3DHaodong%2520Zheng%2520and%2520Andrei%2520Jalba%2520and%2520Raymond%2520H.%2520Cuijpers%2520and%2520Wijnand%2520IJsselsteijn%2520and%2520Sanne%2520Schoenmakers%26entry.1292438233%3DAs%2520humans%2520can%2520explore%2520and%2520understand%2520the%2520world%2520through%2520active%2520touch%252C%2520similar%2520capability%2520is%2520desired%2520for%2520robots.%2520In%2520this%2520paper%252C%2520we%2520address%2520the%2520problem%2520of%2520active%2520tactile%2520object%2520recognition%252C%2520pose%2520estimation%2520and%2520shape%2520transfer%2520learning%252C%2520where%2520a%2520customized%2520particle%2520filter%2520%2528PF%2529%2520and%2520Gaussian%2520process%2520implicit%2520surface%2520%2528GPIS%2529%2520is%2520combined%2520in%2520a%2520unified%2520Bayesian%2520framework.%2520Upon%2520new%2520tactile%2520input%252C%2520the%2520customized%2520PF%2520updates%2520the%2520joint%2520distribution%2520of%2520the%2520object%2520class%2520and%2520object%2520pose%2520while%2520tracking%2520the%2520novelty%2520of%2520the%2520object.%2520Once%2520a%2520novel%2520object%2520is%2520identified%252C%2520its%2520shape%2520will%2520be%2520reconstructed%2520using%2520GPIS.%2520By%2520grounding%2520the%2520prior%2520of%2520the%2520GPIS%2520with%2520the%2520maximum-a-posteriori%2520%2528MAP%2529%2520estimation%2520from%2520the%2520PF%252C%2520the%2520knowledge%2520about%2520known%2520shapes%2520can%2520be%2520transferred%2520to%2520learn%2520novel%2520shapes.%2520An%2520exploration%2520procedure%2520based%2520on%2520global%2520shape%2520estimation%2520is%2520proposed%2520to%2520guide%2520active%2520data%2520acquisition%2 {"title": "SoraNav: Adaptive UAV Task-Centric Navigation via Zeroshot VLM Reasoning", "author": "Hongyu Song and Rishabh Dev Yadav and Cheng Guo and Wei Pan", "abstract": "Autonomous navigation under natural language instructions represents a crucial step toward embodied intelligence, enabling complex task execution in environments ranging from industrial facilities to domestic spaces. However, language-driven 3D navigation for Unmanned Aerial Vehicles (UAVs) requires precise spatial reasoning, a capability inherently lacking in current zero-shot Vision-Language Models (VLMs) which often generate ambiguous outputs and cannot guarantee geometric feasibility. Furthermore, existing Vision-Language Navigation (VLN) methods are predominantly tailored for 2.5D ground robots, rendering them unable to generalize to the unconstrained 3D spatial reasoning required for aerial tasks in small-scale, cluttered environments. In this paper, we present SoraNav, a novel framework enabling zero-shot VLM reasoning for UAV task-centric navigation. To address the spatial-semantic gap, we introduce Multi-modal Visual Annotation (MVA), which encodes 3D geometric priors directly into the VLM's 2D visual input. To mitigate hallucinated or infeasible commands, we propose an Adaptive Decision Making (ADM) strategy that validates VLM proposals against exploration history, seamlessly switching to geometry-based exploration to avoid dead-ends and redundant revisits. Deployed on a custom PX4-based micro-UAV, SoraNav demonstrates robust real-world performance. Quantitative results show our approach significantly outperforms state-of-the-art baselines, increasing Success Rate (SR) by 25.7% and navigation efficiency (SPL) by 17.3% in 2.5D scenarios, and achieving improvements of 39.3% (SR) and 24.7% (SPL) in complex 3D scenarios.", "link": "http://arxiv.org/abs/2510.25191v3", "date": "2026-03-04", "relevancy": 2.3381, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5917}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5876}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SoraNav%3A%20Adaptive%20UAV%20Task-Centric%20Navigation%20via%20Zeroshot%20VLM%20Reasoning&body=Title%3A%20SoraNav%3A%20Adaptive%20UAV%20Task-Centric%20Navigation%20via%20Zeroshot%20VLM%20Reasoning%0AAuthor%3A%20Hongyu%20Song%20and%20Rishabh%20Dev%20Yadav%20and%20Cheng%20Guo%20and%20Wei%20Pan%0AAbstract%3A%20Autonomous%20navigation%20under%20natural%20language%20instructions%20represents%20a%20crucial%20step%20toward%20embodied%20intelligence%2C%20enabling%20complex%20task%20execution%20in%20environments%20ranging%20from%20industrial%20facilities%20to%20domestic%20spaces.%20However%2C%20language-driven%203D%20navigation%20for%20Unmanned%20Aerial%20Vehicles%20%28UAVs%29%20requires%20precise%20spatial%20reasoning%2C%20a%20capability%20inherently%20lacking%20in%20current%20zero-shot%20Vision-Language%20Models%20%28VLMs%29%20which%20often%20generate%20ambiguous%20outputs%20and%20cannot%20guarantee%20geometric%20feasibility.%20Furthermore%2C%20existing%20Vision-Language%20Navigation%20%28VLN%29%20methods%20are%20predominantly%20tailored%20for%202.5D%20ground%20robots%2C%20rendering%20them%20unable%20to%20generalize%20to%20the%20unconstrained%203D%20spatial%20reasoning%20required%20for%20aerial%20tasks%20in%20small-scale%2C%20cluttered%20environments.%20In%20this%20paper%2C%20we%20present%20SoraNav%2C%20a%20novel%20framework%20enabling%20zero-shot%20VLM%20reasoning%20for%20UAV%20task-centric%20navigation.%20To%20address%20the%20spatial-semantic%20gap%2C%20we%20introduce%20Multi-modal%20Visual%20Annotation%20%28MVA%29%2C%20which%20encodes%203D%20geometric%20priors%20directly%20into%20the%20VLM%27s%202D%20visual%20input.%20To%20mitigate%20hallucinated%20or%20infeasible%20commands%2C%20we%20propose%20an%20Adaptive%20Decision%20Making%20%28ADM%29%20strategy%20that%20validates%20VLM%20proposals%20against%20exploration%20history%2C%20seamlessly%20switching%20to%20geometry-based%20exploration%20to%20avoid%20dead-ends%20and%20redundant%20revisits.%20Deployed%20on%20a%20custom%20PX4-based%20micro-UAV%2C%20SoraNav%20demonstrates%20robust%20real-world%20performance.%20Quantitative%20results%20show%20our%20approach%20significantly%20outperforms%20state-of-the-art%20baselines%2C%20increasing%20Success%20Rate%20%28SR%29%20by%2025.7%25%20and%20navigation%20efficiency%20%28SPL%29%20by%2017.3%25%20in%202.5D%20scenarios%2C%20and%20achieving%20improvements%20of%2039.3%25%20%28SR%29%20and%2024.7%25%20%28SPL%29%20in%20complex%203D%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2510.25191v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSoraNav%253A%2520Adaptive%2520UAV%2520Task-Centric%2520Navigation%2520via%2520Zeroshot%2520VLM%2520Reasoning%26entry.906535625%3DHongyu%2520Song%2520and%2520Rishabh%2520Dev%2520Yadav%2520and%2520Cheng%2520Guo%2520and%2520Wei%2520Pan%26entry.1292438233%3DAutonomous%2520navigation%2520under%2520natural%2520language%2520instructions%2520represents%2520a%2520crucial%2520step%2520toward%2520embodied%2520intelligence%252C%2520enabling%2520complex%2520task%2520execution%2520in%2520environments%2520ranging%2520from%2520industrial%2520facilities%2520to%2520domestic%2520spaces.%2520However%252C%2520language-driven%25203D%2520navigation%2520for%2520Unmanned%2520Aerial%2520Vehicles%2520%2528UAVs%2529%2520requires%2520precise%2520spatial%2520reasoning%252C%2520a%2520capability%2520inherently%2520lacking%2520in%2520current%2520zero-shot%2520Vision-Language%2520Models%2520%25 {"title": "EgoWorld: Translating Exocentric View to Egocentric View using Rich Exocentric Observations", "author": "Junho Park and Andrew Sangwoo Ye and Taein Kwon", "abstract": "Egocentric vision is essential for both human and machine visual understanding, particularly in capturing the detailed hand-object interactions needed for manipulation tasks. Translating third-person views into first-person views significantly benefits augmented reality (AR), virtual reality (VR) and robotics applications. However, current exocentric-to-egocentric translation methods are limited by their dependence on 2D cues, synchronized multi-view settings, and unrealistic assumptions such as the necessity of an initial egocentric frame and relative camera poses during inference. To overcome these challenges, we introduce EgoWorld, a novel framework that reconstructs an egocentric view from rich exocentric observations, including point clouds, 3D hand poses, and textual descriptions. Our approach reconstructs a point cloud from estimated exocentric depth maps, reprojects it into the egocentric perspective, and then applies diffusion model to produce dense, semantically coherent egocentric images. Evaluated on four datasets (i.e., H2O, TACO, Assembly101, and Ego-Exo4D), EgoWorld achieves state-of-the-art performance and demonstrates robust generalization to new objects, actions, scenes, and subjects. Moreover, EgoWorld exhibits robustness on in-the-wild examples, underscoring its practical applicability. Project page is available at https://redorangeyellowy.github.io/EgoWorld/.", "link": "http://arxiv.org/abs/2506.17896v2", "date": "2026-03-04", "relevancy": 2.3295, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6386}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5883} 2C%20and%20Ego-Exo4D%29%2C%20EgoWorld%20achieves%20state-of-the-art%20performance%20and%20demonstrates%20robust%20generalization%20to%20new%20objects%2C%20actions%2C%20scenes%2C%20and%20subjects.%20Moreover%2C%20EgoWorld%20exhibits%20robustness%20on%20in-the-wild%20examples%2C%20underscoring%20its%20practical%20applicability.%20Project%20page%20is%20available%20at%20https%3A//redorangeyellowy.github.io/EgoWorld/.%0ALink%3A%20http%3A//arxiv.org/abs/2506.17896v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEgoWorld%253A%2520Translating%2520Exocentric%2520View%2520to%2520Egocentric%2520View%2520using%2520Rich%2520Exocentric%2520Observations%26entry.906535625%3DJunho%2520Park%2520and%2520Andrew%2520Sangwoo%2520Ye%2520and%2520Taein%2520Kwon%26entry.1292438233%3DEgocentric%2520vision%2520is%2520essential%2520for%2520both%2520human%2520and%2520machine%2520visual%2520understanding%252C%2520particularly%2520in%2520capturing%2520the%2520detailed%2520hand-object%2520interactions%2520needed%2520for%2520manipulation%2520tasks.%2520Translating%2520third-person%2520views%2520into%2520first-person%2520views%2520significantly%2520benefits%2520augmented%2520reality%2520%2528AR%2529%252C%2520virtual%2520reality%2520%2528VR%2529%2520and%2520robotics%2520applications.%2520However%252C%2520current%2520exocentric-to-egocentric%2520translation%2520methods%2520are%2520limited%2520by%2520their%2520dependence%2520on%25202D%2520cues%252C%2520synchronized%2520multi-view%2520settings%252C%2520and%2520unrealistic%2520assumptions%2520such%2520as%2520the%2520necessity%2520of%2520an%2520initial%2520egocentric%2520frame%2520and%2520relative%2520camera%2520poses%2520during%2520inference.%2520To%2520overcome%2520these%2520challenges%252C%2520we%2520introduce%2520EgoWorld%252C%2520a%2520novel%2520framework%2520that%2520reconstructs%2520an%2520egocentric%2520view%2520from%2520rich%2520exocentric%2520observations%252 {"title": "From Variance to Invariance: Qualitative Content Analysis for Narrative Graph Annotation", "author": "Junbo Huang and Max Weinig and Ulrich Fritsche and Ricardo Usbeck", "abstract": "Narratives in news discourse play a critical role in shaping public understanding of economic events, such as inflation. Annotating and evaluating these narratives in a structured manner remains a key challenge for Natural Language Processing (NLP). In this work, we introduce a narrative graph annotation framework that integrates principles from qualitative content analysis (QCA) to prioritize annotation quality by reducing annotation errors. We present a dataset of inflation narratives annotated as directed acyclic graphs (DAGs), where nodes represent events and edges encode causal relations. To evaluate annotation quality, we employed a $6\\times3$ factorial experimental design to examine the effects of narrative representation (six levels) and distance metric type (three levels) on inter-annotator agreement (Krippendorrf's $\u03b1$), capturing the presence of human label variation (HLV) in narrative interpretations. Our analysis shows that (1) lenient metrics (overlap-based distance) overestimate reliability, and (2) locally-constrained representations (e.g., one-hop neighbors) reduce annotation variability. Our annotation and implementation of graph-based Krippendorrf's $\u03b1$ are open-sourced. The annotation framework and evaluation results provide practical guidance for NLP research on graph-based narrative annotation under HLV.", "link": "http://arxiv.org/abs/2603.01930v2", "date": "2026-03-04", "relevancy": 2.329, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5234}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.437}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.437}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Variance%20to%20Invariance%3A%20Qualitative%20Content%20Analysis%20for%20Narrative%20Graph%20Annotation&body=Title%3A%20From%20Variance%20to%20Invariance%3A%20Qualitative%20Content%20Analysis%20for%20Narrative%20Graph%20Annotation%0AAuthor%3A%20Junbo%20Huang%20and%20Max%20Weinig%20and%20Ulrich%20Fritsche%20and%20Ricardo%20Usbeck%0AAbstract%3A%20Narratives%20in%20news%20discourse%20play%20a%20critical%20role%20in%20shaping%20public%20understanding%20of%20economic%20events%2C%20such%20as%20inflation.%20Annotating%20and%20evaluating%20these%20narratives%20in%20a%20structured%20manner%20remains%20a%20key%20challenge%20for%20Natural%20Language%20Processing%20%28NLP%29.%20In%20this%20work%2C%20we%20introduce%20a%20narrative%20graph%20annotation%20framework%20that%20integrates%20principles%20from%20qualitative%20content%20analysis%20%28QCA%29%20to%20prioritize%20annotation%20quality%20by%20reducing%20annotation%20errors.%20We%20present%20a%20dataset%20of%20inflation%20narratives%20annotated%20as%20directed%20acyclic%20graphs%20%28DAGs%29%2C%20where%20nodes%20represent%20events%20and%20edges%20encode%20causal%20relations.%20To%20evaluate%20annotation%20quality%2C%20we%20employed%20a%20%246%5Ctimes3%24%20factorial%20experimental%20design%20to%20examine%20the%20effects%20of%20narrative%20representation%20%28six%20levels%29%20and%20distance%20metric%20type%20%28three%20levels%29%20on%20inter-annotator%20agreement%20%28Krippendorrf%27s%20%24%CE%B1%24%29%2C%20capturing%20the%20presence%20of%20human%20label%20variation%20%28HLV%29%20in%20narrative%20interpretations.%20Our%20analysis%20shows%20that%20%281%29%20lenient%20metrics%20%28overlap-based%20distance%29%20overestimate%20reliability%2C%20and%20%282%29%20locally-constrained%20representations%20%28e.g.%2C%20one-hop%20neighbors%29%20reduce%20annotation%20variability.%20Our%20annotation%20and%20implementation%20of%20graph-based%20Krippendorrf%27s%20%24%CE%B1%24%20are%20open-sourced.%20The%20annotation%20framework%20and%20evaluation%20results%20provide%20practical%20guidance%20for%20NLP%20research%20on%20graph-based%20narrative%20annotation%20under%20HLV.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01930v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Variance%2520to%2520Invariance%253A%2520Qualitative%2520Content%2520Analysis%2520for%2520Narrative%2520Graph%2520Annotation%26entry.906535625%3DJunbo%2520Huang%2520and%2520Max%2520Weinig%2520and%2520Ulrich%2520Fritsche%2520and%2520Ricardo%2520Usbeck%26entry.1292438233%3DNarratives%2520in%2520news%2520discourse%2520play%2520a%2520critical%2520role%2520in%2520shaping%2520public%2520understanding%2520of%2520economic%2520events%252C%2520such%2520as%2520inflation.%2520Annotating%2520and%2520evaluating%2520these%2520narratives%2520in%2520a%2520structured%2520manner%2520remains%2520a%2520key%2520challenge%2520for%2520Natural%2520Language%2520Processing%2520%2528NLP%2529.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520narrative%2520graph%2520annotation%2520framework%2520that%2520integrates%2520principles%2520from%2520qualitative%2520content%2520analysis%2520%2528QCA%2529%2520to%2520prioritize%2520annotation%2520quality%2520by%2520reducing%2520annotation%2520errors.%2520We%2520present%2520a%2520dataset%2520of%2520inflation%2520narratives%2520annotated%2520as%2520directed%2520acyclic%2520graphs%2520%2528DAGs%2529%252C%2520where%2520nodes%2520represent%2520events%2520and%2520edges%2520encode%2520causal%2520relations.%2520To%2520evaluate%2520annotation%2520quality%252C%2520we%2520employed%2520a%2520%25246%255Ctimes3%2524%2520factorial%2520experimental%2520design%2520to%2520examine%2520the%2520effects%2520of%2520narrative%2520representation% ty%20by%20reducing%20annotation%20errors.%20We%20present%20a%20dataset%20of%20inflation%20narratives%20annotated%20as%20directed%20acyclic%20graphs%20%28DAGs%29%2C%20where%20nodes%20represent%20events%20and%20edges%20encode%20causal%20relations.%20To%20evaluate%20annotation%20quality%2C%20we%20employed%20a%20%246%5Ctimes3%24%20factorial%20experimental%20design%20to%20examine%20the%20effects%20of%20narrative%20representation%20%28six%20levels%29%20and%20distance%20metric%20type%20%28three%20levels%29%20on%20inter-annotator%20agreement%20%28Krippendorrf%27s%20%24%CE%B1%24%29%2C%20capturing%20the%20presence%20of%20human%20label%20variation%20%28HLV%29%20in%20narrative%20interpretations.%20Our%20analysis%20shows%20that%20%281%29%20lenient%20metrics%20%28overlap-based%20distance%29%20overestimate%20reliability%2C%20and%20%282%29%20locally-constrained%20representations%20%28e.g.%2C%20one-hop%20neighbors%29%20reduce%20annotation%20variability.%20Our%20annotation%20and%20implementation%20of%20graph-based%20Krippendorrf%27s%20%24%CE%B1%24%20are%20open-sourced.%20The%20annotation%20framework%20and%20evaluation%20results%20provide%20practical%20guidance%20for%20NLP%20research%20on%20graph-based%20narrative%20annotation%20under%20HLV.&entry.1838667208=http%3A//arxiv.org/abs/2603.01930v2&entry.124074799=Read"},
{"title": "EgoPoseFormer v2: Accurate Egocentric Human Motion Estimation for AR/VR", "author": "Zhenyu Li and Sai Kumar Dwivedi and Filip Maric and Carlos Chacon and Nadine Bertsch and Filippo Arcadu and Tomas Hodan and Michael Ramamonjisoa and Peter Wonka and Amy Zhao and Robin Kips and Cem Keskin and Anastasia Tkach and Chenhongyi Yang", "abstract": "Egocentric human motion estimation is essential for AR/VR experiences, yet remains challenging due to limited body coverage from the egocentric viewpoint, frequent occlusions, and scarce labeled data. We present EgoPoseFormer v2, a method that addresses these challenges through two key contributions: (1) a transformer-based model for temporally consistent and spatially grounded body pose estimation, and (2) an auto-labeling system that enables the use of large unlabeled datasets for training. Our model is fully differentiable, introduces identity-conditioned queries, multi-view spatial refinement, causal temporal attention, and supports both keypoints and parametric body representations under a constant compute budget. The auto-labeling system scales learning to tens of millions of unlabeled frames via uncertainty-aware semi-supervised training. The system follows a teacher-student schema to generate pseudo-labels and guide training with uncertainty distillation, enabling the model to generalize to different environments. On the EgoBody3M benchmark, with a 0.8 ms latency on GPU, our model outperforms two state-of-the-art methods by 12.2% and 19.4% in accuracy, and reduces temporal jitter by 22.2% and 51.7%. Furthermore, our auto-labeling system further improves the wrist MPJPE by 13.1%.", "link": "http://arxiv.org/abs/2603.04090v1", "date": "2026-03-04", "relevancy": 2.3264, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5951}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5784}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EgoPoseFormer%20v2%3A%20Accurate%20Egocentric%20Human%20Motion%20Estimation%20for%20AR/VR&body=Title%3A%20EgoPoseFormer%20v2%3A%20Accurate%20Egocentric%20Human%20Motion%20Estimation%20for%20AR/VR%0AAuthor%3A%20Zhenyu%20Li%20and%20Sai%20Kumar%20Dwivedi%20and%20Filip%20Maric%20and%20Carlos%20Chacon%20and%20Nadine%20Bertsch%20and%20Filippo%20Arcadu%20and%20Tomas%20Hodan%20and%20Michael%20Ramamonjisoa%20and%20Peter%20Wonka%20and%20Amy%20Zhao%20and%20Robin%20Kips%20and%20Cem%20Keskin%20and%20Anastasia%20Tkach%20and%20Chenhongyi%20Yang%0AAbstract%3A%20Egocentric%20human%20motion%20estimation%20is%20essential%20for%20AR/VR%20experiences%2C%20yet%20remains%20challenging%20due%20to%20limited%20body%20coverage%20from%20the%20egocentric%20viewpoint%2C%20frequent%20occlusions%2C%20and%20scarce%20labeled%20data.%20We%20present%20EgoPoseFormer%20v2%2C%20a%20method%20that%20addresses%20these%20challenges%20through%20two%20key%20contributions%3A%20%281%29%20a%20transformer-based%20model%20for%20temporally%20consistent%20and%20spatially%20grounded%20body%20pose%20estimation%2C%20and%20%282%29%20an%20auto-labeling%20system%20that%20enables%20the%20use%20of%20large%20unlabeled%20datasets%20for%20training.%20Our%20model%20is%20fully%20differentiable%2C%20introduces%20identity-conditioned%20queries%2C%20multi-view%20spatial%20refinement%2C%20causal%20temporal%20attention%2C%20and%20supports%20both%20keypoints%20and%20parametric%20body%20representations%20under%20a%20constant%20compute%20budget.%20The%20auto-labeling%20system%20scales%20learning%20to%20tens%20of%20millions%20of%20unlabeled%20frames%20via%20uncertainty-aware%20semi-supervised%20training.%20The%20system%20follows%20a%20teacher-student%20schema%20to%20generate%20pseudo-labels%20and%20guide%20training%20with%20uncertainty%20distillation%2C%20enabling%20the%20model%20to%20generalize%20to%20different%20environments.%20On%20the%20EgoBody3M%20benchmark%2C%20with%20a%200.8%20ms%20latency%20on%20GPU%2C%20our%20model%20outperforms%20two%20state-of-the-art%20methods%20by%2012.2%25%20and%2019.4%25%20in%20accuracy%2C%20and%20reduces%20temporal%20jitter%20by%2022.2%25%20and%2051.7%25.%20Furthermore%2C%20our%20auto-labeling%20system%20further%20improves%20the%20wrist%20MPJPE%20by%2013.1%25.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04090v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEgoPoseFormer%2520v2%253A%2520Accurate%2520Egocentric%2520Human%2520Motion%2520Estimation%2520for%2520AR/VR%26entry.906535625%3DZhenyu%2520Li%2520and%2520Sai%2520Kumar%2520Dwivedi%2520and%2520Filip%2520Maric%2520and%2520Carlos%2520Chacon%2520and%2520Nadine%2520Bertsch%2520and%2520Filippo%2520Arcadu%2520and%2520Tomas%2520Hodan%2520and%2520Michael%2520Ramamonjisoa%2520and%2520Peter%2520Wonka%2520and%2520Amy%2520Zhao%2520and%2520Robin%2520Kips%2520and%2520Cem%2520Keskin%2520and%2520Anastasia%2520Tkach%2520and%2520Chenhongyi%2520Yang%26entry.1292438233%3DEgocentric%2520human%2520motion%2520estimation%2520is%2520essential%2520for%2520AR/VR%2520experiences%252C%2520yet%2520remains%2520challenging%2520due%2520to%2520limited%2520body%2520coverage%2520from%2520the%2520egocentric%2520viewpoint%252C%2520frequent%2520occlusions%252C%2520and%2520scarce%2520labeled%2520data.%2520We%2520present%2520EgoPoseFormer%2520v2%252C%2520a%2520method%2520that%2520addresses%2520these%2520challenges%2520through%2520two%2520key%2520contributions%253A%2520%25281%2529%2520a%2520transformer-based%2520model%2520for%2520temporally%2520consistent%2520and%2520spatially%2520grounded%2520body%2520pose%2520estimation%252C%2520and%2520%25282%2529%2520an%2520auto-labeling%2520system%25 {"title": "Volumetric Directional Diffusion: Anchoring Uncertainty Quantification in Anatomical Consensus for Ambiguous Medical Image Segmentation", "author": "Chao Wu and Kangxian Xie and Mingchen Gao", "abstract": "Equivocal 3D lesion segmentation exhibits high inter-observer variability. Conventional deterministic models ignore this aleatoric uncertainty, producing over-confident masks that obscure clinical risks. Conversely, while generative methods (e.g., standard diffusion) capture sample diversity, recovering complex topology from pure noise frequently leads to severe structural fractures and out-of-distribution anatomical hallucinations. To resolve this fidelity-diversity trade-off, we propose Volumetric Directional Diffusion (VDD). Unlike standard diffusion models that denoise isotropic Gaussian noise, VDD mathematically anchors the generative trajectory to a deterministic consensus prior. By restricting the generative search space to iteratively predict a 3D boundary residual field, VDD accurately explores the fine-grained geometric variations inherent in expert disagreements without risking topological collapse. Extensive validation on three multi-rater datasets (LIDC-IDRI, KiTS21, and ISBI 2015) demonstrates that VDD achieves state-of-the-art uncertainty quantification (significantly improving GED and CI) while remaining highly competitive in segmentation accuracy against deterministic upper bounds. Ultimately, VDD provides clinicians with anatomically coherent uncertainty maps, enabling safer decision-making and mitigating risks in downstream tasks (e.g., radiotherapy planning or surgical margin assessment).", "link": "http://arxiv.org/abs/2603.04024v1", "date": "2026-03-04", "relevancy": 2.323, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6214}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "h VDD%20achieves%20state-of-the-art%20uncertainty%20quantification%20%28significantly%20improving%20GED%20and%20CI%29%20while%20remaining%20highly%20competitive%20in%20segmentation%20accuracy%20against%20deterministic%20upper%20bounds.%20Ultimately%2C%20VDD%20provides%20clinicians%20with%20anatomically%20coherent%20uncertainty%20maps%2C%20enabling%20safer%20decision-making%20and%20mitigating%20risks%20in%20downstream%20tasks%20%28e.g.%2C%20radiotherapy%20planning%20or%20surgical%20margin%20assessment%29.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04024v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVolumetric%2520Directional%2520Diffusion%253A%2520Anchoring%2520Uncertainty%2520Quantification%2520in%2520Anatomical%2520Consensus%2520for%2520Ambiguous%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DChao%2520Wu%2520and%2520Kangxian%2520Xie%2520and%2520Mingchen%2520Gao%26entry.1292438233%3DEquivocal%25203D%2520lesion%2520segmentation%2520exhibits%2520high%2520inter-observer%2520variability.%2520Conventional%2520deterministic%2520models%2520ignore%2520this%2520aleatoric%2520uncertainty%252C%2520producing%2520over-confident%2520masks%2520that%2520obscure%2520clinical%2520risks.%2520Conversely%252C%2520while%2520generative%2520methods%2520%2528e.g.%252C%2520standard%2520diffusion%2529%2520capture%2520sample%2520diversity%252C%2520recovering%2520complex%2520topology%2520from%2520pure%2520noise%2520frequently%2520leads%2520to%2520severe%2520structural%2520fractures%2520and%2520out-of-distribution%2520anatomical%2520hallucinations.%2520To%2520resolve%2520this%2520fidelity-diversity%2520trade-off%252C%2520we%2520propose%2520Volumetric%2520Directional%2520Diffusion%2520%2528VDD%2529.%2520Unlike%2520standard%2520diffusion%2520models%2520that%2520denoise%2520isotropic%2520Gaussian%2520noise%252C%2520VDD%2520mathematically%2520anchors%2520the%2520generative%2520trajectory%2520to%2520a%25 {"title": "Scaling Dense Event-Stream Pretraining from Visual Foundation Models", "author": "Zhiwen Chen and Junhui Hou and Zhiyu Zhu and Jinjian Wu and Guangming Shi", "abstract": "Learning versatile, fine-grained representations from irregular event streams is pivotal yet nontrivial, primarily due to the heavy annotation that hinders scalability in dataset size, semantic richness, and application scope. To mitigate this dilemma, we launch a novel self-supervised pretraining method that distills visual foundation models (VFMs) to push the boundaries of event representation at scale. Specifically, we curate an extensive synchronized image-event collection to amplify cross-modal alignment. Nevertheless, due to inherent mismatches in sparsity and granularity between image-event domains, existing distillation paradigms are prone to semantic collapse in event representations, particularly at high resolutions. To bridge this gap, we propose to extend the alignment objective to semantic structures provided off-the-shelf by VFMs, indicating a broader receptive field and stronger supervision. The key ingredient of our method is a structure-aware distillation loss that grounds higher-quality image-event correspondences for alignment, optimizing dense event representations. Extensive experiments demonstrate that our approach takes a great leap in downstream benchmarks, significantly surpassing traditional methods and existing pretraining techniques. This breakthrough manifests in enhanced generalization, superior data efficiency and elevated transferability.", "link": "http://arxiv.org/abs/2603.03969v1", "date": "2026-03-04", "relevancy": 2.3166, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5872}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5775}, {"title":

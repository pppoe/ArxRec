{"title": "mlx-vis: GPU-Accelerated Dimensionality Reduction and Visualization on Apple Silicon", "author": "Han Xiao", "abstract": "mlx-vis is a Python library that implements six dimensionality reduction methods and a k-nearest neighbor graph algorithm entirely in MLX, Apple's array framework for Apple Silicon. The library provides UMAP, t-SNE, PaCMAP, TriMap, DREAMS, CNE, and NNDescent, all executing on Metal GPU through a unified fit_transform interface. Beyond embedding computation, mlx-vis includes a GPU-accelerated circle-splatting renderer that produces scatter plots and smooth animations without matplotlib, composing frames via scatter-add alpha blending on GPU and piping them to hardware H.264 encoding. On Fashion-MNIST with 70,000 points, all methods complete embedding in 2.1-3.8 seconds and render 800-frame animations in 1.4 seconds on an M3 Ultra, with the full pipeline from raw data to rendered video finishing in 3.6-5.2 seconds. The library depends only on MLX and NumPy, is released under the Apache 2.0 license, and is available at https://github.com/hanxiao/mlx-vis.", "link": "http://arxiv.org/abs/2603.04035v1", "date": "2026-03-04", "relevancy": 2.0501, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5338}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5249}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4916}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20mlx-vis%3A%20GPU-Accelerated%20Dimensionality%20Reduction%20and%20Visualization%20on%20Apple%20Silicon&body=Title%3A%20mlx-vis%3A%20GPU-Accelerated%20Dimensionality%20Reduction%20and%20Visualization%20on%20Apple%20Silicon%0AAuthor%3A%20Han%20Xiao%0AAbstract%3A%20mlx-vis%20is%2 {"title": "RoboCasa365: A Large-Scale Simulation Framework for Training and Benchmarking Generalist Robots", "author": "Soroush Nasiriany and Sepehr Nasiriany and Abhiram Maddukuri and Yuke Zhu", "abstract": "Recent advances in robot learning have accelerated progress toward generalist robots that can perform everyday tasks in human environments. Yet it remains difficult to gauge how close we are to this vision. The field lacks a reproducible, large-scale benchmark for systematic evaluation. To fill this gap, we present RoboCasa365, a comprehensive simulation benchmark for household mobile manipulation. Built on the RoboCasa platform, RoboCasa365 introduces 365 everyday tasks across 2,500 diverse kitchen environments, with over 600 hours of human demonstration data and over 1600 hours of synthetically generated demonstration data -- making it one of the most diverse and large-scale resources for studying generalist policies. RoboCasa365 is designed to support systematic evaluations for different problem settings, including multi-task learning, robot foundation model training, and lifelong learning. We conduct extensive experiments on this benchmark with state-of-the-art methods and analyze the impacts of task diversity, dataset scale, and environment variation on generalization. Our results provide new insights into what factors most strongly affect the performance of generalist robots and inform strategies for future progress in the field.", "link": "http://arxiv.org/abs/2603.04356v1", "date": "2026-03-04", "relevancy": 1.6681, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6363}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5552}, {"title": "Genie: Generative Interactive Environments", "link": "http: t%20the%20performance%20of%20generalist%20robots%20and%20inform%20strategies%20for%20future%20progress%20in%20the%20field.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04356v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRoboCasa365%253A%2520A%2520Large-Scale%2520Simulation%2520Framework%2520for%2520Training%2520and%2520Benchmarking%2520Generalist%2520Robots%26entry.906535625%3DSoroush%2520Nasiriany%2520and%2520Sepehr%2520Nasiriany%2520and%2520Abhiram%2520Maddukuri%2520and%2520Yuke%2520Zhu%26entry.1292438233%3DRecent%2520advances%2520in%2520robot%2520learning%2520have%2520accelerated%2520progress%2520toward%2520generalist%2520robots%2520that%2520can%2520perform%2520everyday%2520tasks%2520in%2520human%2520environments.%2520Yet%2520it%2520remains%2520difficult%2520to%2520gauge%2520how%2520close%2520we%2520are%2520to%2520this%2520vision.%2520The%2520field%2520lacks%2520a%2520reproducible%252C%2520large-scale%2520benchmark%2520for%2520systematic%2520evaluation.%2520To%2520fill%2520this%2520gap%252C%2520we%2520present%2520RoboCasa365%252C%2520a%2520comprehensive%2520simulation%2520benchmark%2520for%2520household%2520mobile%2520manipulation.%2520Built%2520on%2520the%2520RoboCasa%2520platform%252C%2520RoboCasa365%2520introduces%2520365%2520everyday%2520tasks%2520across%25202%252C500%2520diverse%2520kitchen%2520environments%252C%2520with%2520over%2520600%2520hours%2520of%2520human%2520demonstration%2520data%2520and%2520over%25201600%2520hours%2520of%2520synthetically%2520generated%2520demonstration%2520data%2520--%2520making%2520it%2520one%2520of%2520the%2520most%2520diverse%2520and%2520large-scale%2520resources%2520for%2520studying%2520generalist%2520policies.%2520RoboCasa365%2520is%2520designed%2520to%2520support%2520systematic%2520evaluations%2520for%2520different%2520problem%2520settings%252C%2520including%2520multi-task%2520learning%252C%2520robot%2520foundation%2520model%2520training% {"title": "Apple's Synthetic Defocus Noise Pattern: Characterization and Forensic Applications", "author": "David V\u00e1zquez-Pad\u00edn and Fernando P\u00e9rez-Gonz\u00e1lez and Pablo P\u00e9rez-Migu\u00e9lez", "abstract": "iPhone portrait-mode images contain a distinctive pattern in out-of-focus regions simulating the bokeh effect, which we term Apple's Synthetic Defocus Noise Pattern (SDNP). If overlooked, this pattern can interfere with blind forensic analyses, especially PRNU-based camera source verification, as noted in earlier works. Since Apple's SDNP remains underexplored, we provide a detailed characterization, proposing a method for its precise estimation, modeling its dependence on scene brightness, ISO settings, and other factors. Leveraging this characterization, we explore forensic applications of the SDNP, including traceability of portrait-mode images across iPhone models and iOS versions in open-set scenarios, assessing its robustness under post-processing. Furthermore, we show that masking SDNP-affected regions in PRNU-based camera source verification significantly reduces false positives, overcoming a critical limitation in camera attribution, and improving state-of-the-art techniques.", "link": "http://arxiv.org/abs/2505.07380v2", "date": "2026-03-04", "relevancy": 1.4326, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4942}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4731}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4721}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Apple%27s%20Synthetic%20Defocus%20Noise%20Pattern%3A%20Characterization%20and%20Forensic%20Applications&body=Title%3A%20Apple%27s%20Synthetic%20Defocus%20Noise%20Pattern%3A%20Characterization%20and%20Forensic%20Applications%0AAuthor%3A%20David%20V%C3%A1zquez-Pad%C3%ADn%20and%20Fernando%20P%C3%A9rez-Gonz%C3%A1lez%20and%20Pablo%20P%C3%A9rez-Migu%C3%A9lez%0AAbstract%3A%20iPhone%20portrait-mode%20images%20contain%20a%20distinctive%20pattern%20in%20out-of-focus%20regions%20simulating%20the%20bokeh%20effect%2C%20which%20we%20term%20Apple%27s%20Synthetic%20Defocus%20Noise%20Pattern%20%28SDNP%29.%20If%20overlooked%2C%20this%20pattern%20can%20interfere%20with%20blind%20forensic%20analyses%2C%20especially%20PRNU-based%20camera%20source%20verification%2C%20as%20noted%20in%20earlier%20works.%20Since%20Apple%27s%20SDNP%20remains%20underexplored%2C%20we%20provide%20a%20detailed%20characterization%2C%20proposing%20a%20method%20for%20its%20precise%20estimation%2C%20modeling%20its%20dependence%20on%20scene%20brightness%2C%20ISO%20settings%2C%20and%20other%20factors.%20Leveraging%20this%20characterization%2C%20we%20explore%20forensic%20applications%20of%20the%20SDNP%2C%20including%20traceability%20of%20portrait-mode%20images%20across%20iPhone%20models%20and%20iOS%20versions%20in%20open-set%20scenarios%2C%20assessing%20its%20robustness%20under%20post-processing.%20Furthermore%2C%20we%20show%20that%20masking%20SDNP-affected%20regions%20in%20PRNU-based%20camera%20source%20verification%20significantly%20reduces%20false%20positives%2C%20overcoming%20a%20critical%20limitation%20in%20camera%20attribution%2C%20and%20improving%20state-of-the-art%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2505.07380v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DApple%2527s%2520Synthetic%2520Defocus%2520Noise%2520Pattern%253A%2520Characterization%2520and%2520Forensic%2520Applications%26entry.906535625%3DDavid%2520V%25C3%25A1zquez-Pad%25C3%25ADn%2520and%2520Fernando%2520P%25C3%25A9rez-Gonz%25C3%25A1lez%2520and%2520Pablo%2520P%25C3%25A9rez-Migu%25C3%25A9l {"title": "LMUnit: Fine-grained Evaluation with Natural Language Unit Tests", "author": "Jon Saad-Falcon and Rajan Vivek and William Berrios and Nandita Shankar Naik and Matija Franklin and Bertie Vidgen and Amanpreet Singh and Douwe Kiela and Shikib Mehri", "abstract": "As language models become integral to critical workflows, assessing their behavior remains a fundamental challenge -- human evaluation is costly and noisy, while automated metrics provide only coarse, difficult-to-interpret signals. We introduce natural language unit tests, a paradigm that decomposes response quality into explicit, testable criteria, along with a unified scoring model, LMUnit, which combines multi-objective training across preferences, direct ratings, and natural language rationales. Through controlled human studies, we show this paradigm significantly improves inter-annotator agreement and enables more effective LLM development workflows. LMUnit achieves state-of-the-art performance on evaluation benchmarks (FLASK, BigGenBench) and competitive results on RewardBench. These results validate both our proposed paradigm and scoring model, suggesting a promising path forward for language model evaluation and development.", "link": "http://arxiv.org/abs/2412.13091v2", "date": "2026-03-04", "relevancy": 1.907, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4816}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4758}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4758}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LMUnit%3A%20Fine-grained%20Evaluation%20with%20Natural%20Language%20Unit%20Tests&body=Title%3A%20LMUnit%3A%20Fine-grained%20Evaluation%20with%20Natural%20Language%20Unit%20Tests%0AAuthor%3A%20Jon%20Saad-Falcon%20and%20Rajan%20Vivek%20and%20William%20Berrios%20and%20Nandita%20Shankar%20Naik%20and%20Matija%20Franklin%20and%20Bertie%20Vidgen%20and%20Amanpreet%20Singh%20and%20Douwe%20Kiela%20and%20Shikib%20Mehri%0AAbstract%3A%20As%20language%20models%20become%20integral%20to%20critical%20workflows%2C%20assessing%20their%20behavior%20remains%20a%20fundamental%20challenge%20--%20human%20evaluation%20is%20costly%20and%20noisy%2C%20while%20automated%20metrics%20provide%20only%20coarse%2C%20difficult-to-interpret%20signals.%20We%20introduce%20natural%20language%20unit%20tests%2C%20a%20paradigm%20that%20decomposes%20response%20quality%20into%20explicit%2C%20testable%20criteria%2C%20along%20with%20a%20unified%20scoring%20model%2C%20LMUnit%2C%20which%20combines%20multi-objective%20training%20across%20preferences%2C%20direct%20ratings%2C%20and%20natural%20language%20rationales.%20Through%20controlled%20human%20studies%2C%20we%20show%20this%20paradigm%20significantly%20improves%20inter-annotator%20agreement%20and%20enables%20more%20effective%20LLM%20development%20workflows.%20LMUnit%20achieves%20state-of-the-art%20performance%20on%20evaluation%20benchmarks%20%28FLASK%2C%20BigGenBench%29%20and%20competitive%20results%20on%20RewardBench.%20These%20results%20validate%20both%20our%20proposed%20paradigm%20and%20scoring%20model%2C%20suggesting%20a%20promising%20path%20forward%20for%20language%20model%20evaluation%20and%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2412.13091v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLMUnit%253A%2520Fine-grained%2520Evaluation%2520with%2520Natural%2520Language%2520Unit%2520Tests%26entry.906535625%3DJon%2520Saad-Falcon%2520and%2520Rajan%2520Vivek%2520and%2520William%2520Berrios%2520and%2520Nandita%2520Shankar%2520Naik%2520and%2520Matija%2520Franklin%2520and%2520Bertie%2520V {"title": "Cognition Envelopes for Bounded Decision Making in Autonomous UAS Operations", "author": "Pedro Antonio Alarcon Granadeno and Arturo Miguel Bernal Russell and Sofia Nelson and Demetrius Hernandez and Maureen Petterson and Michael Murphy and Walter J. Scheirer and Jane Cleland-Huang", "abstract": "Cyber-physical systems increasingly rely on foundational models, such as Large Language Models (LLMs) and Vision-Language Models (VLMs) to increase autonomy through enhanced perception, inference, and planning. However, these models also introduce new types of errors, such as hallucinations, over-generalizations, and context misalignments, resulting in incorrect and flawed decisions. To address this, we introduce the concept of Cognition Envelopes, designed to establish reasoning boundaries that constrain AI-generated decisions while complementing the use of meta-cognition and traditional safety envelopes. As with safety envelopes, Cognition Envelopes require practical guidelines and systematic processes for their definition, validation, and assurance. In this paper we describe an LLM/VLM-supported pipeline for dynamic clue analysis within the domain of small autonomous Uncrewed Aerial Systems deployed on Search and Rescue (SAR) missions, and a Cognition Envelope based on probabilistic reasoning and resource analysis. We evaluate the approach through assessing decisions made by our Clue Analysis Pipeline in a series of SAR missions. Finally, we identify key software engineering challenges for systematically designing, implementing, and validating Cognition Envelopes for AI-supported decisions in cyber-physical systems.", "link": "http://arxiv.org/abs/2510.26905v3", "date": "2026-03-04", "relevancy": 1.644, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5635}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n {"title": "An LLM Agentic Approach for Legal-Critical Software: A Case Study for Tax Prep Software", "author": "Sina Gogani-Khiabani and Ashutosh Trivedi and Diptikalyan Saha and Saeid Tizpaz-Niari", "abstract": "Large language models (LLMs) show promise for translating natural-language statutes into executable logic, but reliability in legally critical settings remains challenging due to ambiguity and hallucinations. We present an agentic approach for developing legal-critical software, using U.S. federal tax preparation as a case study. The key challenge is test-case generation under the oracle problem, where correct outputs require interpreting law. Building on metamorphic testing, we introduce higher-order metamorphic relations that compare system outputs across structured shifts among similar individuals. Because authoring such relations is tedious and error-prone, we use an LLM-driven, role-based framework to automate test generation and code synthesis. We implement a multi-agent system that translates tax code into executable software and incorporates a metamorphic-testing agent that searches for counterexamples. In experiments, our framework using a smaller model (GPT-4o-mini) achieves a worst-case pass rate of 45%, outperforming frontier models (GPT-4o and Claude 3.5, 9-15%) on complex tax-code tasks. These results support agentic LLM methodologies as a path to robust, trustworthy legal-critical software from natural-language specifications.", "link": "http://arxiv.org/abs/2509.13471v2", "date": "2026-03-04", "relevancy": 0.897, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4537}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4469}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation {"title": "Tuning Just Enough: Lightweight Backdoor Attacks on Multi-Encoder Diffusion Models", "author": "Ziyuan Chen and Yujin Jeong and Tobias Braun and Anna Rohrbach", "abstract": "As text-to-image diffusion models become increasingly deployed in real-world applications, concerns about backdoor attacks have gained significant attention. Prior work on text-based backdoor attacks has largely focused on diffusion models conditioned on a single lightweight text encoder. However, more recent diffusion models that incorporate multiple large-scale text encoders remain underexplored in this context. Given the substantially increased number of trainable parameters introduced by multiple text encoders, an important question is whether backdoor attacks can remain both efficient and effective in such settings. In this work, we study Stable Diffusion 3, which uses three distinct text encoders and has not yet been systematically analyzed for text-encoder-based backdoor vulnerabilities. To understand the role of text encoders in backdoor attacks, we define four categories of attack targets and identify the minimal sets of encoders required to achieve effective performance for each attack objective. Based on this, we further propose Multi-Encoder Lightweight aTtacks (MELT), which trains only low-rank adapters while keeping the pretrained text encoder weight frozen. We demonstrate that tuning fewer than 0.2% of the total encoder parameters is sufficient for successful backdoor attacks on Stable Diffusion 3, revealing previously underexplored vulnerabilities in practical attack scenarios in multi-encoder settings.", "link": "http://arxiv.org/abs/2603.04064v1", "date": "2026-03-04", "relevancy": 1.6621, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5778}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.55}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5461}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tuning%20Just%20Enough%3A%20Lightweight%20Backdoor%20Attacks%20on%20Multi-Encoder%20Diffusion%20Models&body=Title%3A%20Tuning%20Just%20Enough%3A%20Lightweight%20Backdoor%20Attacks%20on%20Multi-Encoder%20Diffusion%20Models%0AAuthor%3A%20Ziyuan%20Chen%20and%20Yujin%20Jeong%20and%20Tobias%20Braun%20and%20Anna%20Rohrbach%0AAbstract%3A%20As%20text-to-image%20diffusion%20models%20become%20increasingly%20deployed%20in%20real-world%20applications%2C%20concerns%20about%20backdoor%20attacks%20have%20gained%20significant%20attention.%20Prior%20work%20on%20text-based%20backdoor%20attacks%20has%20largely%20focused%20on%20diffusion%20models%20conditioned%20on%20a%20single%20lightweight%20text%20encoder.%20However%2C%20more%20recent%20diffusion%20models%20that%20incorporate%20multiple%20large-scale%20text%20encoders%20remain%20underexplored%20in%20this%20context.%20Given%20the%20substantially%20increased%20number%20of%20trainable%20parameters%20introduced%20by%20multiple%20text%20encoders%2C%20an%20important%20question%20is%20whether%20backdoor%20attacks%20can%20remain%20both%20efficient%20and%20effective%20in%20such%20settings.%20In%20this%20work%2C%20we%20study%20Stable%20Diffusion%203%2C%20which%20uses%20three%20distinct%20text%20encoders%20and%20has%20not%20yet%20been%20systematically%20analyzed%20for%20text-encoder-based%20backdoor%20vulnerabilities.%20To%20understand%20the%20role%20of%20text%20encoders%20in%20backdoor%20attacks%2C%20we%20define%20four%20categories%20of%20attack%20targets%20and%20identify%20the%20minimal%20sets%20of%20encoders%20required%20to%20achieve%20effective%20performance%20for%20each%20attack%20objective.%20Based%20on%20this%2C%20we%20further%20propose%20Multi-Encoder%20Lightweight%20aTtacks%20%28MELT%29%2C%20which%20trains%20only%20low-rank%20adapters%20while%20keeping%20the%20pretrained%20text%20encoder%20weight%20frozen.%20We%20demonstrate%20that%20tuning%20fewer%20than%200.2%25%20of%20the%20total%20encoder%20parameters%20is%20sufficient%20for%20successful%20backdoor%20attacks%20on%20Stable%20Diffusion%203%2C%20revealing%20previously%20underexplored%20vulnerabilities%20in%20practical%20attack%20scenarios%20in%20multi-encoder%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04064v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTuning%2520Just%2520Enough%253A%2520Lightweight%2520Backdoor%2520Attacks%2520on%2520Multi-Encoder%2520Diffusion%2520Models%26entry.906535625%3DZiyuan%2520Chen%2520and%2520Yujin%2520Jeong%2520and%2520Tobias%2520Braun%2520and%2520Anna%2520Rohrbach%26entry.1292438233%3DAs%2520text-to-image%2520diffusion%2520models%2520become%2520increasingly%2520deployed%2520in%2520real-world%2520applications%252C%2520concerns%2520about%2520backdoor%2520attacks%2520have%2520gained%2520significant%2520attention.%2520Prior%2520work%2520on%2520text-based%2520backdoor%2520attacks%2520has%2520largely%2520focused%2520on%2520diffusion%2520models%2520conditioned%2520on%2520a%2520single%2520lightweight%2520text%2520encoder.%2520However%252C%2520more%2520recent%2520diffusion%2520models%2520that%2520incorporate%2520multiple%2520large-scale%2520text%2520encoders%2520remain%2520underexplored%2520in%2520this%2520context.%2520Given%2520the%2520substantially%2520increased%2520number%2520of%2520trainable%2520parameters%2520introduced%2520by%2520multiple%2520text%2520encoders%252C%2520an%2520important%2520question%2520is%2520whether%2520backdoor%2520attacks%2520can%2520remain%2520both%2520efficient%2520and%2520effective%2520in%2520such%2520settings.%2520In%2520this%2520work%252C%2520we%2520study%2520Stable%2520Diffusion%25203%252C%2520which%2520uses%2520three%2520distinct%2520text% {"title": "Continuous Modal Logical Neural Networks: Modal Reasoning via Stochastic Accessibility", "author": "Antonin Sulc", "abstract": "We propose Fluid Logic, a paradigm in which modal logical reasoning, temporal, epistemic, doxastic, deontic, is lifted from discrete Kripke structures to continuous manifolds via Neural Stochastic Differential Equations (Neural SDEs). Each type of modal operator is backed by a dedicated Neural SDE, and nested formulas compose these SDEs in a single differentiable graph. A key instantiation is Logic-Informed Neural Networks (LINNs): analogous to Physics-Informed Neural Networks (PINNs), LINNs embed modal logical formulas such as ($\\Box$ bounded) and ($\\Diamond$ visits\\_lobe) directly into the training loss, guiding neural networks to produce solutions that are structurally consistent with prescribed logical properties, without requiring knowledge of the governing equations.\n  The resulting framework, Continuous Modal Logical Neural Networks (CMLNNs), yields several key properties: (i) stochastic diffusion prevents quantifier collapse ($\\Box$ and $\\Diamond$ differ), unlike deterministic ODEs; (ii) modal operators are entropic risk measures, sound with respect to risk-based semantics with explicit Monte Carlo concentration guarantees; (iii)SDE-induced accessibility provides structural correspondence with classical modal axioms; (iv) parameterizing accessibility through dynamics reduces memory from quadratic in world count to linear in parameters.\n  Three case studies demonstrate that Fluid Logic and LINNs can guide neural networks to produce consistent solutions across diverse domains: epistemic/doxastic logic (multi-robot hallucination detection), temporal logic (recovering the Lorenz attractor geometry from logical constraints alone), and deontic logic (learning safe confinement dynamics from a logical specification).", "link": "http://arxiv.org/abs/2603.04019v1", "date": "2026-03-04", "relevancy": 1.5544, "topK": [{"title" {"title": "Conformal Graph Prediction with Z-Gromov Wasserstein Distances", "author": "Gabriel Melo and Thibaut de Saivre and Anna Calissano and Florence d'Alch\u00e9-Buc", "abstract": "Supervised graph prediction addresses regression problems where the outputs are structured graphs. Although several approaches exist for graph-valued prediction, principled uncertainty quantification remains limited. We propose a conformal prediction framework for graph-valued outputs, providing distribution-free coverage guarantees in structured output spaces. Our method defines nonconformity via the Z-Gromov-Wasserstein distance, instantiated in practice through Fused Gromov-Wasserstein (FGW), enabling permutation invariant comparison between predicted and candidate graphs. To obtain adaptive prediction sets, we introduce Score Conformalized Quantile Regression (SCQR), an extension of Conformalized Quantile Regression (CQR) to handle complex output spaces such as graph-valued outputs. We evaluate the proposed approach on a synthetic task and a real problem of molecule identification.", "link": "http://arxiv.org/abs/2603.02460v2", "date": "2026-03-04", "relevancy": 1.4579, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4986}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4906}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conformal%20Graph%20Prediction%20with%20Z-Gromov%20Wasserstein%20Distances&body=Title%3A%20Conformal%20Graph%20Prediction%20wit       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

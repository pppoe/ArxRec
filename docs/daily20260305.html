{"title": "EmbodiedSplat: Online Feed-Forward Semantic 3DGS for Open-Vocabulary 3D Scene Understanding", "author": "Seungjun Lee and Zihan Wang and Yunsong Wang and Gim Hee Lee", "abstract": "Understanding a 3D scene immediately with its exploration is essential for embodied tasks, where an agent must construct and comprehend the 3D scene in an online and nearly real-time manner. In this study, we propose EmbodiedSplat, an online feed-forward 3DGS for open-vocabulary scene understanding that enables simultaneous online 3D reconstruction and 3D semantic understanding from the streaming images. Unlike existing open-vocabulary 3DGS methods which are typically restricted to either offline or per-scene optimization setting, our objectives are two-fold: 1) Reconstructs the semantic-embedded 3DGS of the entire scene from over 300 streaming images in an online manner. 2) Highly generalizable to novel scenes with feed-forward design and supports nearly real-time 3D semantic reconstruction when combined with real-time 2D models. To achieve these objectives, we propose an Online Sparse Coefficients Field with a CLIP Global Codebook where it binds the 2D CLIP embeddings to each 3D Gaussian while minimizing memory consumption and preserving the full semantic generalizability of CLIP. Furthermore, we generate 3D geometric-aware CLIP features by aggregating the partial point cloud of 3DGS through 3D U-Net to compensate the 3D geometric prior to 2D-oriented language embeddings. Extensive experiments on diverse indoor datasets, including ScanNet, ScanNet++, and Replica, demonstrate both the effectiveness and efficiency of our method. Check out our project page in https://0nandon.github.io/EmbodiedSplat/.", "link": "http://arxiv.org/abs/2603.04254v1", "date": "2026-03-04", "relevancy": 3.3171, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6819}, {"title": "GST: Precise 3D Huma {"title": "Dual Diffusion Models for Multi-modal Guided 3D Avatar Generation", "author": "Hong Li and Yutang Feng and Minqi Meng and Yichen Yang and Xuhui Liu and Baochang Zhang", "abstract": "Generating high-fidelity 3D avatars from text or image prompts is highly sought after in virtual reality and human-computer interaction. However, existing text-driven methods often rely on iterative Score Distillation Sampling (SDS) or CLIP optimization, which struggle with fine-grained semantic control and suffer from excessively slow inference. Meanwhile, image-driven approaches are severely bottlenecked by the scarcity and high acquisition cost of high-quality 3D facial scans, limiting model generalization. To address these challenges, we first construct a novel, large-scale dataset comprising over 100,000 pairs across four modalities: fine-grained textual descriptions, in-the-wild face images, high-quality light-normalized texture UV maps, and 3D geometric shapes. Leveraging this comprehensive dataset, we propose PromptAvatar, a framework featuring dual diffusion models. Specifically, it integrates a Texture Diffusion Model (TDM) that supports flexible multi-condition guidance from text and/or image prompts, alongside a Geometry Diffusion Model (GDM) guided by text prompts. By learning the direct mapping from multi-modal prompts to 3D representations, PromptAvatar eliminates the need for time-consuming iterative optimization, successfully generating high-fidelity, shading-free 3D avatars in under 10 seconds. Extensive quantitative and qualitative experiments demonstrate that our method significantly outperforms existing state-of-the-art approaches in generation quality, fine-grained detail alignment, and computational efficiency.", "link": "http://arxiv.org/abs/2603.04307v1", "date": "2026-03-04", "relevancy": 3.3054, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6765}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6534}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6534}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dual%20Diffusion%20Models%20for%20Multi-modal%20Guided%203D%20Avatar%20Generation&body=Title%3A%20Dual%20Diffusion%20Models%20for%20Multi-modal%20Guided%203D%20Avatar%20Generation%0AAuthor%3A%20Hong%20Li%20and%20Yutang%20Feng%20and%20Minqi%20Meng%20and%20Yichen%20Yang%20and%20Xuhui%20Liu%20and%20Baochang%20Zhang%0AAbstract%3A%20Generating%20high-fidelity%203D%20avatars%20from%20text%20or%20image%20prompts%20is%20highly%20sought%20after%20in%20virtual%20reality%20and%20human-computer%20interaction.%20However%2C%20existing%20text-driven%20methods%20often%20rely%20on%20iterative%20Score%20Distillation%20Sampling%20%28SDS%29%20or%20CLIP%20optimization%2C%20which%20struggle%20with%20fine-grained%20semantic%20control%20and%20suffer%20from%20excessively%20slow%20inference.%20Meanwhile%2C%20image-driven%20approaches%20are%20severely%20bottlenecked%20by%20the%20scarcity%20and%20high%20acquisition%20cost%20of%20high-quality%203D%20facial%20scans%2C%20limiting%20model%20generalization.%20To%20address%20these%20challenges%2C%20we%20first%20construct%20a%20novel%2C%20large-scale%20dataset%20comprising%20over%20100%2C000%20pairs%20across%20four%20modalities%3A%20fine-grained%20textual%20descriptions%2C%20in-the-wild%20face%20images%2C%20high-quality%20light-normalized%20texture%20UV%20maps%2C%20and%203D%20geometric%20shapes.%20Leveraging%20this%20comprehensive%20dataset%2C%20we%20propose%20PromptAvatar%2C%20a%20framework%20featuring%20dual%20diffusion%20models.%20Specifically%2C%20it%20integrates%20a%20Texture%20Diffusion%20Model%20%28TDM%29%20that%20supports%20flexible%20multi-condition%20guidance%20from%20text%20and/or%20image%20prompts%2C%20alongside%20a%20Geometry%20Diffusion%20Model%20%28GDM%29%20guided%20by%20text%20prompts.%20By%20learning%20the%20direct%20mapping%20from%20multi-modal%20prompts%20to%203D%20representations%2C%20PromptAvatar%20eliminates%20the%20need%20for%20time-consuming%20iterative%20optimization%2C%20successfully%20generating%20high-fidelity%2C%20shading-free%203D%20avatars%20in%20under%2010%20seconds.%20Extensive%20quantitative%20and%20qualitative%20experiments%20demonstrate%20that%20our%20method%20significantly%20outperforms%20existing%20state-of-the-art%20approaches%20in%20generation%20quality%2C%20fine-grained%20detail%20alignment%2C%20and%20computational%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04307v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDual%2520Diffusion%2520Models%2520for%2520Multi-modal%2520Guided%25203D%2520Avatar%2520Generation%26entry.906535625%3DHong%2520Li%2520and%2520Yutang%2520Feng%2520and%2520Minqi%2520Meng%2520and%2520Yichen%2520Yang%2520and%2520Xuhui%2520Liu%2520and%2520Baochang%2520Zhang%26entry.1292438233%3DGenerating%2520high-fidelity%25203D%2520avatars%2520from%2520text%2520or%2520image%2520prompts%2520is%2520highly%2520sought%2520after%2520in%2520virtual%2520reality%2520and%2520human-computer%2520interaction.%2520However%252C%2520existing%2520text-driven%2520methods%2520often%2520rely%2520on%2520iterative%2520Score%2520Distillation%2520Sampling%2520%2528SDS%2529%2520or%2520CLIP%2520optimization%252C%2520which%2520struggle%2520with%2520fine-grained%2520semantic%2520control%2520and%2520suffer%2520from%2520excessively%2520slow%2520inference.%2520Meanwhile%252C%2520image-driven%2520approaches%2520are%2520severely%2520bottlenecked%2520by%2520the%2520scarcity%2520and%2520high%2520acquisition%2520cost%2520of%2520high-quality%25203D%2520facial%2520scans%252C%2520limiting%2520model%2520generalization.%2520To%2520address%2520these%2520challenges%252C%2520we%2520first {"title": "Skullptor: High Fidelity 3D Head Reconstruction in Seconds with Multi-View Normal Prediction", "author": "No\u00e9 Artru and Rukhshanda Hussain and Emeline Got and Alexandre Messier and David B. Lindell and Abdallah Dib", "abstract": "Reconstructing high-fidelity 3D head geometry from images is critical for a wide range of applications, yet existing methods face fundamental limitations. Traditional photogrammetry achieves exceptional detail but requires extensive camera arrays (25-200+ views), substantial computation, and manual cleanup in challenging areas like facial hair. Recent alternatives present a fundamental trade-off: foundation models enable efficient single-image reconstruction but lack fine geometric detail, while optimization-based methods achieve higher fidelity but require dense views and expensive computation. We bridge this gap with a hybrid approach that combines the strengths of both paradigms. Our method introduces a multi-view surface normal prediction model that extends monocular foundation models with cross-view attention to produce geometrically consistent normals in a feed-forward pass. We then leverage these predictions as strong geometric priors within an inverse rendering optimization framework to recover high-frequency surface details. Our approach outperforms state-of-the-art single-image and multi-view methods, achieving high-fidelity reconstruction on par with dense-view photogrammetry while reducing camera requirements and computational cost. The code and model will be released.", "link": "http://arxiv.org/abs/2602.21100v2", "date": "2026-03-04", "relevancy": 3.289, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6611}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6611}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Skullptor%3A%20High%20Fidelity%203D%20Head%20Reconstruction%20in%20Seconds%20with%20Multi-View%20Normal%20Prediction&body=Title%3A%20Skullptor%3A%20High%20Fidelity%203D%20Head%20Reconstruction%20in%20Seconds%20with%20Multi-View%20Normal%20Prediction%0AAuthor%3A%20No%C3%A9%20Artru%20and%20Rukhshanda%20Hussain%20and%20Emeline%20Got%20and%20Alexandre%20Messier%20and%20David%20B.%20Lindell%20and%20Abdallah%20Dib%0AAbstract%3A%20Reconstructing%20high-fidelity%203D%20head%20geometry%20from%20images%20is%20critical%20for%20a%20wide%20range%20of%20applications%2C%20yet%20existing%20methods%20face%20fundamental%20limitations.%20Traditional%20photogrammetry%20achieves%20exceptional%20detail%20but%20requires%20extensive%20camera%20arrays%20%2825-200%2B%20views%29%2C%20substantial%20computation%2C%20and%20manual%20cleanup%20in%20challenging%20areas%20like%20facial%20hair.%20Recent%20alternatives%20present%20a%20fundamental%20trade-off%3A%20foundation%20models%20enable%20efficient%20single-image%20reconstruction%20but%20lack%20fine%20geometric%20detail%2C%20while%20optimization-based%20methods%20achieve%20higher%20fidelity%20but%20require%20dense%20views%20and%20expensive%20computation.%20We%20bridge%20this%20gap%20with%20a%20hybrid%20approach%20that%20combines%20the%20strengths%20of%20both%20paradigms.%20Our%20method%20introduces%20a%20multi-view%20surface%20normal%20prediction%20model%20that%20extends%20monocular%20foundation%20models%20with%20cross-view%20attention%20to%20produce%20geometrically%20consistent%20normals%20in%20a%20feed-forward%20pass.%20We%20then%20leverage%20these%20predictions%20as%20strong%20geometric%20priors%20within%20an%20inverse%20rendering%20optimization%20framework%20to%20recover%20high-frequency%20surface%20details.%20Our%20approach%20outperforms%20state-of-the-art%20single-image%20and%20multi-view%20methods%2C%20achieving%20high-fidelity%20reconstruction%20on%20par%20with%20dense-view%20photogrammetry%20while%20reducing%20camera%20requirements%20and%20computational%20cost.%20The%20code%20and%20model%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21100v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSkullptor%253A%2520High%2520Fidelity%25203D%2520Head%2520Reconstruction%2520in%2520Seconds%2520with%2520Multi-View%2520Normal%2520Prediction%26entry.906535625%3DNo%25C3%25A9%2520Artru%2520and%2520Rukhshanda%2520Hussain%2520and%2520Emeline%2520Got%2520and%2520Alexandre%2520Messier%2520and%2520David%2520B.%2520Lindell%2520and%2520Abdallah%2520Dib%26entry.1292438233%3DReconstructing%2520high-fidelity%25203D%2520head%2520geometry%2520from%2520images%2520is%2520critical%2520for%2520a%2520wide%2520range%2520of%2520applications%252C%2520yet%2520existing%2520methods%2520face%2520fundamental%2520limitations.%2520Traditional%2520photogrammetry%2520achieves%2520exceptional%2520detail%2520but%2520requires%2520extensive%2520camera%2520arrays%2520%252825-200%252B%2520views%2529%252C%2520substantial%2520computation%252C%2520and%2520manual%2520cleanup%2520in%2520challenging%2520areas%2520like%2520facial%2520hair.%2520Recent%2520alternatives%2520present%2520a%2520fundamental%2520trade-off%253A%2520foundation%2520models%2520enable%2520efficient%2520single-image%2520reconstruction%2520but%2520lack%2520fine%2520geometric%2520detail%252C%2520while%2520optimization-based%2520methods%2520achieve%2520higher%2520fidelity%2520but%2520require%2520dense%2520views%2520and%2520expensive%2520computation.%2520We%2520bridge%2520this%2520gap%2520with%2520a%2520hybrid%2520approach%2520that%2520combines%2520the%2520strengths%2520of%2520both%2520paradigms.%2520Our%2520method%2520introduces%2520a%2520multi-view%2520surface%2520normal%2520prediction%2520model%2520that%2520extends%2520monocular%2520foundation%2520models%2520with%2520cross-view%2520attention%2520to%2520produce%2520geometrically%2520consistent%2520normals%2520in%2520a%2520feed-forward%2520pass.%2520We%2520then%2520leverage%2520these%2520predictions%2520as%2520strong%2520geometric%2520priors%2520within%2520an%2520inverse%2520rendering%2520optimization%2520framework%2520to%2520recover%2520high-frequency%2520surface%2520details.%2520Our%2520approach%2520outperforms%2520state-of-the-art%2520single-image%2520and%2520multi-view%2520methods%252C%2520achieving%2520high-fidelity%2520reconstruction%2520on%2520par%2520with%2520dense-view%2520photogrammetry%2520while%2520reducing%2520camera%2520requirements%2520and%2520computational%2520cost.%2520The%2520code%2520and%2520model%2520will%2520be%2520released.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21100v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Skullptor%3A%20High%20Fidelity%203D%20Head%20Reconstruction%20in%20Seconds%20with%20Multi-View%20Normal%20Prediction&entry.906535625=No%C3%A9%20Artru%20and%20Rukhshanda%20Hussain%20and%20Emeline%20Got%20and%20Alexandre%20Messier%20and%20David%20B.%20Lindell%20and%20Abdallah%20Dib&entry.1292438233=Reconstructing%20high-fidelity%203D%20head%20geometry%20from%20images%20is%20critical%20for%20a%20wide%20range%20of%20applications%2C%20yet%20existing%20methods%20face%20fundamental%20limitations.%20Traditional%20photogrammetry%20achieves%20exceptional%20detail%20but%20requires%20extensive%20camera%20arrays%20%2825-200%2B%20views%29%2C%20substantial%20computation%2C%20and%20manual%20cleanup%20in%20challenging%20areas%20like%20facial%20hair.%20Recent%20alternatives%20present%20a%20fundamental%20trade-off%3A%20foundation%20models%20enable%20efficient%20single-image%20reconstruction%20but%20lack%20fine%20geometric%20detail%2C%20while%20optimization-based%20methods%20achieve%20higher%20fidelity% {"title": "Improving Multi-View Reconstruction via Texture-Guided Gaussian-Mesh Joint Optimization", "author": "Zhejia Cai and Puhua Jiang and Shiwei Mao and Hongkun Cao and Ruqi Huang", "abstract": "Reconstructing real-world objects from multi-view images is essential for applications in 3D editing, AR/VR, and digital content creation. Existing methods typically prioritize either geometric accuracy (Multi-View Stereo) or photorealistic rendering (Novel View Synthesis), often decoupling geometry and appearance optimization, which hinders downstream editing tasks. This paper advocates an unified treatment on geometry and appearance optimization for seamless Gaussian-mesh joint optimization. More specifically, we propose a novel framework that simultaneously optimizes mesh geometry (vertex positions and faces) and vertex colors via Gaussian-guided mesh differentiable rendering, leveraging photometric consistency from input images and geometric regularization from normal and depth maps. The obtained high-quality 3D reconstruction can be further exploit in down-stream editing tasks, such as relighting and shape deformation. Our code will be released in https://github.com/zhejia01/TexGuided-GS2Mesh", "link": "http://arxiv.org/abs/2511.03950v2", "date": "2026-03-04", "relevancy": 3.2034, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.7014}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6226}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.598}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improving%20Multi-View%20Reconstruction%20via%20Texture-Guided%20Gaussian-Mesh%20Joint%20Optimization&body=Title%3A%20Improving%20Multi-View%20Reconstruction%20via%20Texture-Guided%20Gaussian-Mesh%20Joint%20Optimization%0AAuthor%3A%20Zhejia%20Cai%20and%20Puhua%20Jiang%20and%20Shiwei%20Mao%20and%20Hongkun%20Cao%20and%20Ruqi%20Huang%0AAbstract%3A%20Reconstructing%20real-world%20objects%20from%20multi-view%20images%20is%20essential%20for%20applications%20in%203D%20editing%2C%20AR/VR%2C%20and%20digital%20content%20creation.%20Existing%20methods%20typically%20prioritize%20either%20geometric%20accuracy%20%28Multi-View%20Stereo%29%20or%20photorealistic%20rendering%20%28Novel%20View%20Synthesis%29%2C%20often%20decoupling%20geometry%20and%20appearance%20optimization%2C%20which%20hinders%20downstream%20editing%20tasks.%20This%20paper%20advocates%20an%20unified%20treatment%20on%20geometry%20and%20appearance%20optimization%20for%20seamless%20Gaussian-mesh%20joint%20optimization.%20More%20specifically%2C%20we%20propose%20a%20novel%20framework%20that%20simultaneously%20optimizes%20mesh%20geometry%20%28vertex%20positions%20and%20faces%29%20and%20vertex%20colors%20via%20Gaussian-guided%20mesh%20differentiable%20rendering%2C%20leveraging%20photometric%20consistency%20from%20input%20images%20and%20geometric%20regularization%20from%20normal%20and%20depth%20maps.%20The%20obtained%20high-quality%203D%20reconstruction%20can%20be%20further%20exploit%20in%20down-stream%20editing%20tasks%2C%20such%20as%20relighting%20and%20shape%20deformation.%20Our%20code%20will%20be%20released%20in%20https%3A//github.com/zhejia01/TexGuided-GS2Mesh%0ALink%3A%20http%3A//arxiv.org/abs/2511.03950v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproving%2520Multi-View%2520Reconstruction%2520via%2520Texture-Guided%2520Gaussian-Mesh%2520Joint%2520Optimization%26entry.906535625%3DZhejia%2520Cai%2520and%2520Puhua%2520Jiang%2520and%2520Shiwei%2520Mao%2520and%2520Hongkun%2520Cao%2520and%2520Ruqi%2520Huang%26entry.1292438233%3DReconstructing%2520real-world%2520objects%2520from%2520multi-v ew%20images%20is%20essential%20for%20applications%20in%203D%20editing%2C%20AR/VR%2C%20and%20digital%20content%20creation.%20Existing%20methods%20typically%20prioritize%20either%20geometric%20accuracy%20%28Multi-View%20Stereo%29%20or%20photorealistic%20rendering%20%28Novel%20View%20Synthesis%29%2C%20often%20decoupling%20geometry%20and%20appearance%20optimization%2C%20which%20hinders%20downstream%20editing%20tasks.%20This%20paper%20advocates%20an%20unified%20treatment%20on%20geometry%20and%20appearance%20optimization%20for%20seamless%20Gaussian-mesh%20joint%20optimization.%20More%20specifically%2C%20we%20propose%20a%20novel%20framework%20that%20simultaneously%20optimizes%20mesh%20geometry%20%28vertex%20positions%20and%20faces%29%20and%20vertex%20colors%20via%20Gaussian-guided%20mesh%20differentiable%20rendering%2C%20leveraging%20photometric%20consistency%20from%20input%20images%20and%20geometric%20regularization%20from%20normal%20and%20depth%20maps.%20The%20obtained%20high-quality%203D%20reconstruction%20can%20be%20further%20exploit%20in%20down-stream%20editing%20tasks%2C%20such%20as%20relighting%20and%20shape%20deformation.%20Our%20code%20will%20be%20released%20in%20https%3A//github.com/zhejia01/TexGuided-GS2Mesh&entry.1838667208=http%3A//arxiv.org/abs/2511.03950v2&entry.124074799=Read"},
{"title": "ArtHOI: Articulated Human-Object Interaction Synthesis by 4D Reconstruction from Video Priors", "author": "Zihao Huang and Tianqi Liu and Zhaoxi Chen and Shaocong Xu and Saining Zhang and Lixing Xiao and Zhiguo Cao and Wei Li and Hao Zhao and Ziwei Liu", "abstract": "Synthesizing physically plausible articulated human-object interactions (HOI) without 3D/4D supervision remains a fundamental challenge. While recent zero-shot approaches leverage video diffusion models to synthesize human-object interactions, they are largely confined to rigid-object manipulation and lack explicit 4D geometric reasoning. To bridge this gap, we formulate articulated HOI synthesis as a 4D reconstruction problem from monocular video priors: given only a video generated by a diffusion model, we reconstruct a full 4D articulated scene without any 3D supervision. This reconstruction-based approach treats the generated 2D video as supervision for an inverse rendering problem, recovering geometrically consistent and physically plausible 4D scenes that naturally respect contact, articulation, and temporal coherence. We introduce ArtHOI, the first zero-shot framework for articulated human-object interaction synthesis via 4D reconstruction from video priors. Our key designs are: 1) Flow-based part segmentation: leveraging optical flow as a geometric cue to disentangle dynamic from static regions in monocular video; 2) Decoupled reconstruction pipeline: joint optimization of human motion and object articulation is unstable under monocular ambiguity, so we first recover object articulation, then synthesize human motion conditioned on the reconstructed object states. ArtHOI bridges video-based generation and geometry-aware reconstruction, producing interactions that are both semantically aligned and physically grounded. Across diverse articulated scenes (e.g., opening fridges, cabinets, microwaves), ArtHOI significantly outperforms prior methods in contact accuracy, penetration reduction, and articulation fidelity, extending zero-shot interaction synthesis beyond rigid manipulation through reconstruction-informed synthesis.", "link": "http://arxiv.org/abs/2603.04338v1", "date": "2026-03-04", "relevancy": 3.0833, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6897}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5959}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ArtHOI%3A%20Articulated%20Human-Object%20Interaction%20Synthesis%20by%204D%20Reconstruction%20from%20Video%20Priors&body=Title%3A%20ArtHOI%3A%20Articulated%20Human-Object%20Interaction%20Synthesis%20by%204D%20Reconstruction%20from%20Video%20Priors%0AAuthor%3A%20Zihao%20Huang%20and%20Tianqi%20Liu%20and%20Zhaoxi%20Chen%20and%20Shaocong%20Xu%20and%20Saining%20Zhang%20and%20Lixing%20Xiao%20and%20Zhiguo%20Cao%20and%20Wei%20Li%20and%20Hao%20Zhao%20and%20Ziwei%20Liu%0AAbstract%3A%20Synthesizing%20physically%20plausible%20articulated%20human-object%20interactions%20%28HOI%29%20without%203D/4D%20supervision%20remains%20a%20fundamental%20challenge.%20While%20recent%20zero-shot%20approaches%20leverage%20video%20diffusion%20models%20to%20synthesize%20human-object%20interactions%2C%20they%20are%20largely%20confined%20to%20rigid-object%20manipulation%20and%20lack%20explicit%204D%20geometric%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20formulate%20articulated%20HOI%20synthesis%20as%20a%204D%20reconstruction%20problem%20from%20monocular%20video%20priors%3A%20given%20only%20a%20video%20generated%20by%20a%20diffusion%20model%2C%20we%20reconstruct%20a%20full%204D%20articulated%20scene%20without%20any%203D%20supervision.%20This%20reconstruction-based%20approach%20treats%20the%20generated%202D%20video%20as%20supervision%20for%20an%20inverse%20rendering%20problem%2C%20recovering%20geometrically%20consistent%20and%20physically%20plausible%204D%20scenes%20that%20naturally%20respect%20contact%2C%20articulation%2C%20and%20temporal%20coherence.%20We%20introduce%20ArtHOI%2C%20the%20first%20zero-shot%20framework%20for%20articulated%20human-object%20interaction%20synthesis%20via%204D%20reconstruction%20from%20video%20priors.%20Our%20key%20designs%20are%3A%201%29%20Flow-based%20part%20segmentation%3A%20leveraging%20optical%20flow%20as%20a%20geometric%20cue%20to%20disentangle%20dynamic%20from%20static%20regions%20in%20monocular%20video%3B%202%29%20Decoupled%20reconstruction%20pipeline%3A%20joint%20optimization%20of%20human%20motion%20and%20object%20articulation%20is%20unstable%20under%20monocular%20ambiguity%2C%20so%20we%20first%20recover%20object%20articulation%2C%20then%20synthesize%20human%20motion%20conditioned%20on%20the%20reconstructed%20object%20states.%20ArtHOI%20bridges%20video-based%20generation%20and%20geometry-aware%20reconstruction%2C%20producing%20interactions%20that%20are%20both%20semantically%20aligned%20and%20physically%20grounded.%20Across%20diverse%20articulated%20scenes%20%28e.g.%2C%20opening%20fridges%2C%20cabinets%2C%20microwaves%29%2C%20ArtHOI%20significantly%20outperforms%20prior%20methods%20in%20contact%20accuracy%2C%20penetration%20reduction%2C%20and%20articulation%20fidelity%2C%20extending%20zero-shot%20interaction%20synthesis%20beyond%20rigid%20manipulation%20through%20reconstruction-informed%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04338v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DArtHOI%253A%2520Articulated%2520Human-Object%2520Interaction%2520Synthesis%2520by%25204D%2520Reconstruction%2520from%2520Video%2520Priors%26entry.906535625%3DZihao%2 {"title": "Crab$^{+}$: A Scalable and Unified Audio-Visual Scene Understanding Model with Explicit Cooperation", "author": "Dongnuan Cai and Henghui Du and Chang Zhou and Xi Chen and Dan Guo and Hongyuan Zhang and Xuelong Li and Di Hu", "abstract": "Developing Audio-Visual Large Language Models (AV-LLMs) for unified scene understanding is pivotal in multimodal intelligence. While instruction tuning enables pre-trained models with multi-task abilities, we observe that conventional multi-task unification methods often suffer from severe negative transfer, where nearly 55% of tasks degrade compared to single-task training. We attribute this phenomenon to audio-visual task heterogeneity, characterized by disparate task granularity and divergent capability demands, which lead to negative interference under joint training. To tackle this, we present Crab$^{+}$, a scalable and unified audio-visual scene understanding model that addresses task heterogeneity through explicit cooperation from both data and model perspectives. On the data side, we introduce AV-UIE v2, a comprehensive Audio-Visual Unified Instruction-tuning dataset with Explicit reasoning processes. It contains approximately 222K samples spanning 17 datasets and 7 tasks, enabling the model to capture cross-task relationships at different levels of granularity. On the model side, we design a unified interface to align heterogeneous task formulations, and propose Interaction-aware LoRA (I-LoRA), which explicitly models inter-task relationships via dynamic routing to coordinate distinct audio-visual interaction patterns, mitigating parameter interference. Extensive experiments show Crab$^{+}$ covers broader tasks than existing unified models while outperforming specialized models on various benchmarks. We successfully reverse the negative transfer trend, achieving positive transfer where multi-task learning surpasses single-task baselines in nearly 88% of tasks. These results hold across diverse AV-LLM paradigms and are validated through in-depth visualization, positioning Crab$^{+}$ as a robust step towards holistic audio-visual scene understanding.", "link": "http://arxiv.org/abs/2603.04128v1", "date": "2026-03-04", "relevancy": 3.0723, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6344}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6344}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5747}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Crab%24%5E%7B%2B%7D%24%3A%20A%20Scalable%20and%20Unified%20Audio-Visual%20Scene%20Understanding%20Model%20with%20Explicit%20Cooperation&body=Title%3A%20Crab%24%5E%7B%2B%7D%24%3A%20A%20Scalable%20and%20Unified%20Audio-Visual%20Scene%20Understanding%20Model%20with%20Explicit%20Cooperation%0AAuthor%3A%20Dongnuan%20Cai%20and%20Henghui%20Du%20and%20Chang%20Zhou%20and%20Xi%20Chen%20and%20Dan%20Guo%20and%20Hongyuan%20Zhang%20and%20Xuelong%20Li%20and%20Di%20Hu%0AAbstract%3A%20Developing%20Audio-Visual%20Large%20Language%20Models%20%28AV-LLMs%29%20for%20unified%20scene%20understanding%20is%20pivotal%20in%20multimodal%20intelligence.%20While%20instruction%20tuning%20enables%20pre-trained%20models%20with%20multi-task%20abilities%2C%20we%20observe%20that%20conventional%20multi-task%20unification%20methods%20often%20suffer%20from%20severe%20negative%20transfer%2C%20where%20nearly%2055%25%20of%20tasks%20degrade%20compared%20to%20single-task%20training.%20We%20attribute%20this%20phenomenon%20to%20audio-visual%20task%20heterogeneity%2C%20characterized%20by%20disparate%20task%20granularity%20and%20divergent%20capability%20demands%2C%20which%20lead%20to%20negative%20interference%20under%20joint%20training.%20To%20tackle%20this%2C%20we%20present%20Crab%24%5E%7B%2B%7D%24%2C%20a%20scalable%20and%20unified%20audio-visual%20scene%20understanding%20model%20that%20addresses%20task%20heterogeneity%20through%20explicit%20cooperation%20from%20both%20data%20and%20model%20perspectives.%20On%20the%20data%20side%2C%20we%20introduce%20AV-UIE%20v2%2C%20a%20comprehensive%20Audio-Visual%20Unified%20Instruction-tuning%20dataset%20with%20Explicit%20reasoning%20processes.%20It%20contains%20approximately%20222K%20samples%20spanning%2017%20datasets%20and%207%20tasks%2C%20enabling%20the%20model%20to%20capture%20cross-task%20relationships%20at%20different%20levels%20of%20granularity.%20On%20the%20model%20side%2C%20we%20design%20a%20unified%20interface%20to%20align%20heterogeneous%20task%20formulations%2C%20and%20propose%20Interaction-aware%20LoRA%20%28I-LoRA%29%2C%20which%20explicitly%20models%20inter-task%20relationships%20via%20dynamic%20routing%20to%20coordinate%20distinct%20audio-visual%20interaction%20patterns%2C%20mitigating%20parameter%20interference.%20Extensive%20experiments%20show%20Crab%24%5E%7B%2B%7D%24%20covers%20broader%20tasks%20than%20existing%20unified%20models%20while%20outperforming%20specialized%20models%20on%20various%20benchmarks.%20We%20successfully%20reverse%20the%20negative%20transfer%20trend%2C%20achieving%20positive%20transfer%20where%20multi-task%20learning%20surpasses%20single-task%20baselines%20in%20nearly%2088%25%20of%20tasks.%20These%20results%20hold%20across%20diverse%20AV-LLM%20paradigms%20and%20are%20validated%20through%20in-depth%20visualization%2C%20positioning%20Crab%24%5E%7B%2B%7D%24%20as%20a%20robust%20step%20towards%20holistic%20audio-visual%20scene%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04128v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCrab%2524%255E%257B%252B%257D%2524%253A%2520A%2520Scalable%2520and%2520Unified%2520Audio-Visual%2520Scene%2520Understand {"title": "Motion Manipulation via Unsupervised Keypoint Positioning in Face Animation", "author": "Hong Li and Boyu Liu and Xuhui Liu and Baochang Zhang", "abstract": "Face animation deals with controlling and generating facial features with a wide range of applications. The methods based on unsupervised keypoint positioning can produce realistic and detailed virtual portraits. However, they cannot achieve controllable face generation since the existing keypoint decomposition pipelines fail to fully decouple identity semantics and intertwined motion information (e.g., rotation, translation, and expression). To address these issues, we present a new method, Motion Manipulation via unsupervised keypoint positioning in Face Animation (MMFA). We first introduce self-supervised representation learning to encode and decode expressions in the latent feature space and decouple them from other motion information. Secondly, we propose a new way to compute keypoints aiming to achieve arbitrary motion control. Moreover, we design a variational autoencoder to map expression features to a continuous Gaussian distribution, allowing us for the first time to interpolate facial expressions in an unsupervised framework. We have conducted extensive experiments on publicly available datasets to validate the effectiveness of MMFA, which show that MMFA offers pronounced advantages over prior arts in creating realistic animation and manipulating face motion.", "link": "http://arxiv.org/abs/2603.04302v1", "date": "2026-03-04", "relevancy": 3.0563, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6427}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6108}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5803}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Motion%20Manipulation%20via%20Unsupervised%20Keypoint%20Positioning%20in%20Face%20Animation&body=Title%3A%20Motion%20Manipulation%20via%20Unsupervised%20Keypoint%20Positioning%20in%20Face%20Animation%0AAuthor%3A%20Hong%20Li%20and%20Boyu%20Liu%20and%20Xuhui%20Liu%20and%20Baochang%20Zhang%0AAbstract%3A%20Face%20animation%20deals%20with%20controlling%20and%20generating%20facial%20features%20with%20a%20wide%20range%20of%20applications.%20The%20methods%20based%20on%20unsupervised%20keypoint%20positioning%20can%20produce%20realistic%20and%20detailed%20virtual%20portraits.%20However%2C%20they%20cannot%20achieve%20controllable%20face%20generation%20since%20the%20existing%20keypoint%20decomposition%20pipelines%20fail%20to%20fully%20decouple%20identity%20semantics%20and%20intertwined%20motion%20information%20%28e.g.%2C%20rotation%2C%20translation%2C%20and%20expression%29.%20To%20address%20these%20issues%2C%20we%20present%20a%20new%20method%2C%20Motion%20Manipulation%20via%20unsupervised%20keypoint%20positioning%20in%20Face%20Animation%20%28MMFA%29.%20We%20first%20introduce%20self-supervised%20representation%20learning%20to%20encode%20and%20decode%20expressions%20in%20the%20latent%20feature%20space%20and%20decouple%20them%20from%20other%20motion%20information.%20Secondly%2C%20we%20propose%20a%20new%20way%20to%20compute%20keypoints%20aiming%20to%20achieve%20arbitrary%20motion%20control.%20Moreover%2C%20we%20design%20a%20variational%20autoencoder%20to%20map%20expression%20features%20to%20a%20continuous%20Gaussian%20distribution%2C%20allowing%20us%20for%20the%20first%20time%20to%20interpolate%20facial%20expressions%20in%20an%20unsupervised%20framework.%20We%20have%20conducted%20extensive%20experiments%20on%20publicly%20available%20datasets%20to%20validate%20the%20effectiveness%20of%20MMFA%2C%20which%20show%20that%20MMFA%20offers%20pronounced%20advantages%20over%20prior%20arts%20in%20creating%20realistic%20animation%20and%20manipulating%20face%20motion.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04302v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMotion%2520Manipulation%2520via%2520Unsupervised%2520Keypoint%2520Positioning%2520in%2520Face%2520Animation%26entry.906535625%3DHong%2520Li%2520and%2520Boyu%2520Liu%2520and%2520Xuhui%2520Liu%2520and%2520Baochang%2520Zhang%26entry.1292438233%3DFace%2520animation%2520deals%2520with%2520controlling%2520and%2520generating%2520facial%2520features%2520with%2520a%2520wide%2520range%2520of%2520applications.%2520The%2520methods%2520based%2520on%2520unsupervised%2520keypoint%2520positioning%2520can%2520produce%2520realistic%2520and%2520detailed%2520virtual%2520portraits.%2520However%252C%2520they%2520cannot%2520achieve%2520controllable%2520face%2520generation%2520since%2520the%2520existing%2520keypoint%2520decomposition%2520pipelines%2520fail%2520to%2520fully%2520decouple%2520identity%2520semantics%2520and%2520intertwined%2520motion%2520information%2520%2528e.g.%252C%2520rotation%252C%2520translation%252C%2520and%2520expression%2529.%2520To%2520address%2520these%2520issues%252C%2520we%2520present%2520a%2520new%2520method%252C%2520Motion%2520Manipulation%2520via%2520unsupervised%2520keypoint%2520positioning%2520in%2520Face%2520Animation%2520%2528MMFA%2529.%2520We%2520first%2520introduce%2520self-supervised%2520representation%2520learning%2520to%2520encode%2520and%2520decode%2520expressions%2520in%2520the%2520latent%2520feature%2520space%2520and%2520decouple%2520them%2520from%2520other%2520motion%2520information.%2520Secondly%252C%2520we%2520propose%2520a%2520new%2520way%2520to%2520compute%2520keypoints%2520aiming%2520to%2520achieve%2520arbitrary%2520motion%2520control.%2520Moreover%252C%2520we%2520design%2520a%2520variational%2520autoencoder%2520to%2520map%2520expression%2520features%2520to%2520a%2520continuous%2520Gaussian%2520distribution%252C%2520allowing%2520us%2520for%2520the%2 {"title": "Underrepresented in Foundation Model Pretraining Data? A One-Shot Probe", "author": "Chris Vorster and Mayug Maniparambil and Noel E. O'Connor and Noel Murphy and Derek Molloy", "abstract": "Large-scale Vision-Language Foundation Models (VLFMs), such as CLIP, now underpin a wide range of computer vision research and applications. VLFMs are often adapted to various domain-specific tasks. However, VLFM performance on novel, specialised, or underrepresented domains remains inconsistent. Evaluating VLFMs typically requires labelled test sets, which are often unavailable for niche domains of interest, particularly those from the Global South. We address this gap by proposing a highly data-efficient method to predict a VLFM's zero-shot accuracy on a target domain using only a single labelled image per class. Our approach uses a Large Language Model to generate plausible counterfactual descriptions of a given image. By measuring the VLFM's ability to distinguish the correct description from these hard negatives, we engineer features that capture the VLFM's discriminative power in its shared embedding space. A linear regressor trained on these similarity scores estimates the VLFM's zero-shot test accuracy across various visual domains with a Pearson-r correlation of 0.96. We demonstrate our method's performance across five diverse datasets, including standard benchmark datasets and underrepresented datasets from Africa. Our work provides a low-cost, reliable tool for probing VLFMs, enabling researchers and practitioners to make informed decisions about data annotation efforts before committing significant resources. The model training code, generated captions and counterfactuals are released here: https://github.com/chris-vorster/PreLabellingProbe.", "link": "http://arxiv.org/abs/2603.04346v1", "date": "2026-03-04", "relevancy": 3.0275, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.or egressor%20trained%20on%20these%20similarity%20scores%20estimates%20the%20VLFM%27s%20zero-shot%20test%20accuracy%20across%20various%20visual%20domains%20with%20a%20Pearson-r%20correlation%20of%200.96.%20We%20demonstrate%20our%20method%27s%20performance%20across%20five%20diverse%20datasets%2C%20including%20standard%20benchmark%20datasets%20and%20underrepresented%20datasets%20from%20Africa.%20Our%20work%20provides%20a%20low-cost%2C%20reliable%20tool%20for%20probing%20VLFMs%2C%20enabling%20researchers%20and%20practitioners%20to%20make%20informed%20decisions%20about%20data%20annotation%20efforts%20before%20committing%20significant%20resources.%20The%20model%20training%20code%2C%20generated%20captions%20and%20counterfactuals%20are%20released%20here%3A%20https%3A//github.com/chris-vorster/PreLabellingProbe.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04346v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnderrepresented%2520in%2520Foundation%2520Model%2520Pretraining%2520Data%253F%2520A%2520One-Shot%2520Probe%26entry.906535625%3DChris%2520Vorster%2520and%2520Mayug%2520Maniparambil%2520and%2520Noel%2520E.%2520O%2527Connor%2520and%2520Noel%2520Murphy%2520and%2520Derek%2520Molloy%26entry.1292438233%3DLarge-scale%2520Vision-Language%2520Foundation%2520Models%2520%2528VLFMs%2529%252C%2520such%2520as%2520CLIP%252C%2520now%2520underpin%2520a%2520wide%2520range%2520of%2520computer%2520vision%2520research%2520and%2520applications.%2520VLFMs%2520are%2520often%2520adapted%2520to%2520various%2520domain-specific%2520tasks.%2520However%252C%2520VLFM%2520performance%2520on%2520novel%252C%2520specialised%252C%2520or%2520underrepresented%2520domains%2520remains%2520inconsistent.%2520Evaluating%2520VLFMs%2520typically%2520requires%2520labelled%2520test%2520sets%252C%2520which%2520are%2520often%2520unavailable%2520for%2520niche%2520domains%2520of%2520interest%252C%2520particularly%2520those%2520from%2520the {"title": "When Visual Evidence is Ambiguous: Pareidolia as a Diagnostic Probe for Vision Models", "author": "Qianpu Chen and Derya Soydaner and Rob Saunders", "abstract": "When visual evidence is ambiguous, vision models must decide whether to interpret face-like patterns as meaningful. Face pareidolia, the perception of faces in non-face objects, provides a controlled probe of this behavior. We introduce a representation-level diagnostic framework that analyzes detection, localization, uncertainty, and bias across class, difficulty, and emotion in face pareidolia images. Under a unified protocol, we evaluate six models spanning four representational regimes: vision-language models (VLMs; CLIP-B/32, CLIP-L/14, LLaVA-1.5-7B), pure vision classification (ViT), general object detection (YOLOv8), and face detection (RetinaFace). Our analysis reveals three mechanisms of interpretation under ambiguity. VLMs exhibit semantic overactivation, systematically pulling ambiguous non-human regions toward the Human concept, with LLaVA-1.5-7B producing the strongest and most confident over-calls, especially for negative emotions. ViT instead follows an uncertainty-as-abstention strategy, remaining diffuse yet largely unbiased. Detection-based models achieve low bias through conservative priors that suppress pareidolia responses even when localization is controlled. These results show that behavior under ambiguity is governed more by representational choices than score thresholds, and that uncertainty and bias are decoupled: low uncertainty can signal either safe suppression, as in detectors, or extreme over-interpretation, as in VLMs. Pareidolia therefore provides a compact diagnostic and a source of ambiguity-aware hard negatives for probing and improving the semantic robustness of vision-language systems. Code will be released upon publication.", "link": "http://arxiv.org/abs/2603.03989v1", "date": "2026-03-04", "relevancy": 3.023, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.6336}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5901}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Visual%20Evidence%20is%20Ambiguous%3A%20Pareidolia%20as%20a%20Diagnostic%20Probe%20for%20Vision%20Models&body=Title%3A%20When%20Visual%20Evidence%20is%20Ambiguous%3A%20Pareidolia%20as%20a%20Diagnostic%20Probe%20for%20Vision%20Models%0AAuthor%3A%20Qianpu%20Chen%20and%20Derya%20Soydaner%20and%20Rob%20Saunders%0AAbstract%3A%20When%20visual%20evidence%20is%20ambiguous%2C%20vision%20models%20must%20decide%20whether%20to%20interpret%20face-like%20patterns%20as%20meaningful.%20Face%20pareidolia%2C%20the%20perception%20of%20faces%20in%20non-face%20objects%2C%20provides%20a%20controlled%20probe%20of%20this%20behavior.%20We%20introduce%20a%20representation-level%20diagnostic%20framework%20that%20analyzes%20detection%2C%20localization%2C%20uncertainty%2C%20and%20bias%20across%20class%2C%20difficulty%2C%20and%20emotion%20in%20face%20pareidolia%20images.%20Under%20a%20unified%20protocol%2C%20we%20evaluate%20six%20models%20spanning%20four%20representational%20regimes%3A%20vision-language%20models%20%28VLMs%3B%20CLIP-B/32%2C%20CLIP-L/14%2C%20LLaVA-1.5-7B%29%2C%20pure%20vision%20classification%20%28ViT%29%2C%20general%20object%20detection%20%28YOLOv8%29%2C%20and%20face%20detection%20%28RetinaFace%29.%20Our%20analysis%20reveals%20three%20mechanisms%20of%20interpretation%20under%20ambiguity.%20VLMs%20exhibit%20semantic%20overactivation%2C%20systematically%20pulling%20ambiguous%20non-human%20regions%20toward%20the%20Human%20concept%2C%20with%20LLaVA-1.5-7B%20producing%20the%20strongest%20and%20most%20confident%20over-calls%2C%20especially%20for%20negative%20emotions.%20ViT%20instead%20follows%20an%20uncertainty-as-abstention%20strategy%2C%20remaining%20diffuse%20yet%20largely%20unbiased.%20Detection-based%20models%20achieve%20low%20bias%20through%20conservative%20priors%20that%20suppress%20pareidolia%20responses%20even%20when%20localization%20is%20controlled.%20These%20results%20show%20that%20behavior%20under%20ambiguity%20is%20governed%20more%20by%20representational%20choices%20than%20score%20thresholds%2C%20and%20that%20uncertainty%20and%20bias%20are%20decoupled%3A%20low%20uncertainty%20can%20signal%20either%20safe%20suppression%2C%20as%20in%20detectors%2C%20or%20extreme%20over-interpretation%2C%20as%20in%20VLMs.%20Pareidolia%20therefore%20provides%20a%20compact%20diagnostic%20and%20a%20source%20of%20ambiguity-aware%20hard%20negatives%20for%20probing%20and%20improving%20the%20semantic%20robustness%20of%20vision-language%20systems.%20Code%20will%20be%20released%20upon%20publication.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03989v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Visual%2520Evidence%2520is%2520Ambiguous%253A%2520Pareidolia%2520as%2520a%2520Diagnostic%2520Probe%2520for%2520Vision%2520Models%26entry.906535625%3DQianpu%2520Chen%2520and%2520Derya%2520Soydaner%2520and%2520Rob%2520Saunders%26entry.1292438233%3DWhen%2520visual%2520evidence%2520is%2520ambiguous%252C%2520vision%2520models%2520must%2520decide%2520whether%2520to%2520interpret%2520face-like%2520patterns%2520as%2520meaningful.%2520Face%2520pareidolia%252C%2520the%2520perception%2520of%2520faces%2520in%2520non-face%2520objects%252C%2520provides%2520a%2520controlled%2520probe%2520of%2520this%2520behavior.%2520We%2520introduce%2520a%2520representation-lev 20diagnostic%2520and%2520a%2520source%2520of%2520ambiguity-aware%2520hard%2520negatives%2520for%2520probing%2520and%2520improving%2520the%2520semantic%2520robustness%2520of%2520vision-language%2520systems.%2520Code%2520will%2520be%2520released%2520upon%2520publication.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03989v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Visual%20Evidence%20is%20Ambiguous%3A%20Pareidolia%20as%20a%20Diagnostic%20Probe%20for%20Vision%20Models&entry.906535625=Qianpu%20Chen%20and%20Derya%20Soydaner%20and%20Rob%20Saunders&entry.1292438233=When%20visual%20evidence%20is%20ambiguous%2C%20vision%20models%20must%20decide%20whether%20to%20interpret%20face-like%20patterns%20as%20meaningful.%20Face%20pareidolia%2C%20the%20perception%20of%20faces%20in%20non-face%20objects%2C%20provides%20a%20controlled%20probe%20of%20this%20behavior.%20We%20introduce%20a%20representation-level%20diagnostic%20framework%20that%20analyzes%20detection%2C%20localization%2C%20uncertainty%2C%20and%20bias%20across%20class%2C%20difficulty%2C%20and%20emotion%20in%20face%20pareidolia%20images.%20Under%20a%20unified%20protocol%2C%20we%20evaluate%20six%20models%20spanning%20four%20representational%20regimes%3A%20vision-language%20models%20%28VLMs%3B%20CLIP-B/32%2C%20CLIP-L/14%2C%20LLaVA-1.5-7B%29%2C%20pure%20vision%20classification%20%28ViT%29%2C%20general%20object%20detection%20%28YOLOv8%29%2C%20and%20face%20detection%20%28RetinaFace%29.%20Our%20analysis%20reveals%20three%20mechanisms%20of%20interpretation%20under%20ambiguity.%20VLMs%20exhibit%20semantic%20overactivation%2C%20systematically%20pulling%20ambiguous%20non-human%20regions%20toward%20the%20Human%20concept%2C%20with%20LLaVA-1.5-7B%20producing%20the%20strongest%20and%20most%20confident%20over-calls%2C%20especially%20for%20negative%20emotions.%20ViT%20instead%20follows%20an%20uncertainty-as-abstention%20 {"title": "Generalized non-exponential Gaussian splatting", "author": "S\u00e9bastien Speierer and Adrian Jarabo", "abstract": "In this work we generalize 3D Gaussian splatting (3DGS) to a wider family of physically-based alpha-blending operators. 3DGS has become the standard de-facto for radiance field rendering and reconstruction, given its flexibility and efficiency. At its core, it is based on alpha-blending sorted semitransparent primitives, which in the limit converges to the classic radiative transfer function with exponential transmittance. Inspired by recent research on non-exponential radiative transfer, we generalize the image formation model of 3DGS to non-exponential regimes. Based on this generalization, we use a quadratic transmittance to define sub-linear, linear, and super-linear versions of 3DGS, which exhibit faster-than-exponential decay. We demonstrate that these new non-exponential variants achieve similar quality than the original 3DGS but significantly reduce the number of overdraws, which result on speed-ups of up to $4\\times$ in complex real-world captures, on a ray-tracing-based renderer.", "link": "http://arxiv.org/abs/2603.02887v2", "date": "2026-03-04", "relevancy": 3.0188, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6448}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5849}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5816}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalized%20non-exponential%20Gaussian%20splatting&body=Title%3A%20Generalized%20non-exponential%20Gaussian%20splatting%0AAuthor%3A%20S%C3%A9bastien%20Speierer%20and%20Adrian%20Jarabo%0AAbstract%3A%20In%20this%20work%20we%20generalize%203D%20 520At%2520its%2520core%252C%2520it%2520is%2520based%2520on%2520alpha-blending%2520sorted%2520semitransparent%2520primitives%252C%2520which%2520in%2520the%2520limit%2520converges%2520to%2520the%2520classic%2520radiative%2520transfer%2520function%2520with%2520exponential%2520transmittance.%2520Inspired%2520by%2520recent%2520research%2520on%2520non-exponential%2520radiative%2520transfer%252C%2520we%2520generalize%2520the%2520image%2520formation%2520model%2520of%25203DGS%2520to%2520non-exponential%2520regimes.%2520Based%2520on%2520this%2520generalization%252C%2520we%2520use%2520a%2520quadratic%2520transmittance%2520to%2520define%2520sub-linear%252C%2520linear%252C%2520and%2520super-linear%2520versions%2520of%25203DGS%252C%2520which%2520exhibit%2520faster-than-exponential%2520decay.%2520We%2520demonstrate%2520that%2520these%2520new%2520non-exponential%2520variants%2520achieve%2520similar%2520quality%2520than%2520the%2520original%25203DGS%2520but%2520significantly%2520reduce%2520the%2520number%2520of%2520overdraws%252C%2520which%2520result%2520on%2520speed-ups%2520of%2520up%2520to%2520%25244%255Ctimes%2524%2520in%2520complex%2520real-world%2520captures%252C%2520on%2520a%2520ray-tracing-based%2520renderer.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02887v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generalized%20non-exponential%20Gaussian%20splatting&entry.906535625=S%C3%A9bastien%20Speierer%20and%20Adrian%20Jarabo&entry.1292438233=In%20this%20work%20we%20generalize%203D%20Gaussian%20splatting%20%283DGS%29%20to%20a%20wider%20family%20of%20physically-based%20alpha-blending%20operators.%203DGS%20has%20become%20the%20standard%20de-facto%20for%20radiance%20field%20rendering%20and%20reconstruction%2C%20given%20its%20flexibility%20and%20efficiency.%20At%20its%20core%2C%20it%20is%20based%20on%20alpha-blending%20sorted%20semitransparent%20primitives%2C%20which%20in {"title": "Kaleido: Open-Sourced Multi-Subject Reference Video Generation Model", "author": "Zhenxing Zhang and Jiayan Teng and Zhuoyi Yang and Tiankun Cao and Cheng Wang and Xiaotao Gu and Jie Tang and Dan Guo and Meng Wang", "abstract": "We present Kaleido, a subject-to-video~(S2V) generation framework, which aims to synthesize subject-consistent videos conditioned on multiple reference images of target subjects. Despite recent progress in S2V generation models, existing approaches remain inadequate at maintaining multi-subject consistency and at handling background disentanglement, often resulting in lower reference fidelity and semantic drift under multi-image conditioning. These shortcomings can be attributed to several factors. Primarily, the training dataset suffers from a lack of diversity and high-quality samples, as well as cross-paired data, i.e., paired samples whose components originate from different instances. In addition, the current mechanism for integrating multiple reference images is suboptimal, potentially resulting in the confusion of multiple subjects. To overcome these limitations, we propose a dedicated data construction pipeline, incorporating low-quality sample filtering and diverse data synthesis, to produce consistency-preserving training data. Moreover, we introduce Reference Rotary Positional Encoding (R-RoPE) to process reference images, enabling stable and precise multi-image integration. Extensive experiments across numerous benchmarks demonstrate that Kaleido significantly outperforms previous methods in consistency, fidelity, and generalization, marking an advance in S2V generation.", "link": "http://arxiv.org/abs/2510.18573v2", "date": "2026-03-04", "relevancy": 2.9296, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6146}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5716}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5716}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kaleido%3A%20Open-Sourced%20Multi-Subject%20Reference%20Video%20Generation%20Model&body=Title%3A%20Kaleido%3A%20Open-Sourced%20Multi-Subject%20Reference%20Video%20Generation%20Model%0AAuthor%3A%20Zhenxing%20Zhang%20and%20Jiayan%20Teng%20and%20Zhuoyi%20Yang%20and%20Tiankun%20Cao%20and%20Cheng%20Wang%20and%20Xiaotao%20Gu%20and%20Jie%20Tang%20and%20Dan%20Guo%20and%20Meng%20Wang%0AAbstract%3A%20We%20present%20Kaleido%2C%20a%20subject-to-video~%28S2V%29%20generation%20framework%2C%20which%20aims%20to%20synthesize%20subject-consistent%20videos%20conditioned%20on%20multiple%20reference%20images%20of%20target%20subjects.%20Despite%20recent%20progress%20in%20S2V%20generation%20models%2C%20existing%20approaches%20remain%20inadequate%20at%20maintaining%20multi-subject%20consistency%20and%20at%20handling%20background%20disentanglement%2C%20often%20resulting%20in%20lower%20reference%20fidelity%20and%20semantic%20drift%20under%20multi-image%20conditioning.%20These%20shortcomings%20can%20be%20attributed%20to%20several%20factors.%20Primarily%2C%20the%20training%20dataset%20suffers%20from%20a%20lack%20of%20diversity%20and%20high-quality%20samples%2C%20as%20well%20as%20cross-paired%20data%2C%20i.e.%2C%20paired%20samples%20whose%20components%20originate%20from%20different%20instances.%20In%20addition%2C%20the%20current%20mechanism%20for%20integrating%20multiple%20reference%20images%20is%20suboptimal%2C%20potentially%20resulting%20in%20the%20confusion%20of%20multiple%20subjects.%20To%20overcome%20these%20limitations%2C%20we%20propose%20a%20dedicated%20data%20construction%20pipeline%2C%20incorporating%20low-quality%20sample%20filtering%20and%20diverse%20data%20synthesis%2C%20to%20produce%20consistency-preserving%20training%20data.%20Moreover%2C%20we%20introduce%20Reference%20Rotary%20Positional%20Encoding%20%28R-RoPE%29%20to%20process%20reference%20images%2C%20enabling%20stable%20and%20precise%20multi-image%20integration.%20Extensive%20experiments%20across%20numerous%20benchmarks%20demonstrate%20that%20Kaleido%20significantly%20outperforms%20previous%20methods%20in%20consistency%2C%20fidelity%2C%20and%20generalization%2C%20marking%20an%20advance%20in%20S2V%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2510.18573v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKaleido%253A%2520Open-Sourced%2520Multi-Subject%2520Reference%2520Video%2520Generation%2520Model%26entry.906535625%3DZhenxing%2520Zhang%2520and%2520Jiayan%2520Teng%2520and%2520Zhuoyi%2520Yang%2520and%2520Tiankun%2520Cao%2520and%2520Cheng%2520Wang%2520and%2520Xiaotao%2520Gu%2520and%2520Jie%2520Tang%2520and%2520Dan%2520Guo%2520and%2520Meng%2520Wang%26entry.1292438233%3DWe%2520present%2520Kaleido%252C%2520a%2520subject-to-video~%2528S2V%2529%2520generation%2520framework%252C%2520which%2520aims%2520to%2520synthesize%2520subject-consistent%2520videos%2520conditioned%2520on%2520multiple%2520reference%2520images%2520of%2520target%2520subjects.%2520Despite%2520recent%2520progress%2520in%2520S2V%2520generation%2520models%252C%2520existing%2520approaches%2520remain%2520inadequate%2520at%2520maintaining%2520multi-subject%2520consistency%2520and%2520at%2520handling%2520background%2520disentanglement%252C%2520often%2520resulting%2520in%2520lower%2520reference%2520fidelity%2520and%2520semantic%2520drift%2520under%2520multi-image%2520conditioning.%2520These%2520shortcomings%2520can%2520be%2520attributed%2520to%2520several%2520factors.%2520Primarily%252C%2520the%2520training%2520dataset%2520suffers%2520from%2520a%2520lack%2520of%2520diversity%2520and%2520high-quality%2520samples%252C%2520as%2520well%2520as%2520cross-paired%2520data%252C%2520i.e.%252C%2520paired%2520samples%2520whose%2520components%2520originate%2520from%2520different%2520instances.%2520In%2520addition%252C%2520the%2520current%2520mechanism%2520for%2520integrating%2520multiple%2520reference%2520images%2520is%2520suboptimal%252C%2520potentially%2520resulting%2520in%2520the%2520confusion%2520of%2520multiple%2520subjects.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520propose%2520a%2520dedicated%2520data%2520construction%2520pipeline%252C%2520incorporating%2520low-quality%2520sample%2520filtering%2520and%2520diverse%2520data%2520synthesis%252C%2520to%2520produce%2520consistency-preserving%2520training%2520data.%2520Moreover%252C%2520we%2520introduce%2520Reference%2520Rotary%2520Positional%2520Encoding%2520%2528R-RoPE%2529%2520to%2520process%2520reference%2520images%252C%2520enabling%2520stable%2520and%2520precise%2520multi-image%2520integration.%2520Extensive%2520experiments%2520across%2520numerous%2520benchmarks%2520demonstrate%2520that%2520Kaleido%2520significantly%2520outperforms%2520previous%2520methods%2520in%2520consistency%252C%2520fidelity%252C%2520and%2520generalization%252C%2520marking%2520an%2520advance%2520in%2520S2V%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.18573v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Kaleido%3A%20Open-Sourced%20Multi-Subject%20Reference%20Video%20Generation%20Model&entry.906535625=Zhenxing%20Zhang%20and%20Jiayan%20Teng%20and%20Zhuoyi%20Yang%20and%20Tiankun%20Cao%20and%20Cheng%20Wang%20and%20Xiaotao%20Gu%20and%20Jie%20Tang%20and%20Dan%20Guo%20and%20Meng%20Wang&entry.1292438233=We%20present%20Kaleido%2C%20a%20subject-to-video~%28S2V%29%20generation%20framework%2C%20which%20aims%20to%20synthesize%20subject-consistent%20videos%20conditioned%20on%20multiple%20reference%20images%20of%20target%20subjects.%20Despite%20recent%20progress%20in%20S2V%20generation%20models%2C%20existing%20approaches%20remain%20inadequate%20at%20maintaining%20multi-subject%20consistency%20and%20at%20handling%20background%20disentanglement%2C%20often%20resulting%20in%20lower%20reference%20fidelity%20and%20semantic%20drift%20under%20multi-image%20conditioning.%20These%20shortcomings%20can%20be%20attributed%20to%20several%20factors.%20Primarily%2C%20the%20training%20dataset%20suffers%20from%20a%20lack%20of%20diversity%20and%20high-quality%20samples%2C%20as%20well%20as%20cross-paired%20data%2C%20i.e.%2C%20paired%20samples%20whose%20components%20originate%20from%20different%20instances.%20In%20addition%2C%20the%20current%20mechanism%20for%20integrating%20multiple%20reference%20images%20is%20suboptimal%2C%20potentially%20resulting%20in%20the%20confusion%20of%20multiple%20subjects.%20To%20overcome%20these%20limitations%2C%20we%20propose%20a%20dedicated%20data%20construction%20pipeline%2C%20incorporating%20low-quality%20sample%20filtering%20and%20diverse%20data%20synthesis%2C%20to%20produce%20consistency-preserving%20training%20data.%20Moreover%2C%20we%20introduce%20Reference%20Rotary%20Positional%20Encoding%20%28R-RoPE%29%20to%20process%20reference%20images%2C%20enabling%20stable%20and%20precise%20multi-image%20integration.%20Extensive%20experiments%20across%20numerous%20benchmarks%20demonstrate%20that%20Kaleido%20significantly%20outperforms%20previous%20methods%20in%20consistency%2C%20fidelity%2C%20and%20generalization%2C%20marking%20an%20advance%20in%20S2V%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2510.18573v2&entry.124074799=Read"},
{"title": "Fusion of Visual-Inertial Odometry with LiDAR Relative Localization for Cooperative Guidance of a Micro-Scale Aerial Vehicle", "author": "V\u00e1clav Pritzl and Matou\u0161 Vrba and Petr \u0160t\u011bp\u00e1n and Martin Saska", "abstract": "A novel relative localization approach for guidance of a micro-scale Unmanned Aerial Vehicle (UAV) by a well-equipped aerial robot fusing Visual-Inertial Odometry (VIO) with Light Detection and Ranging (LiDAR) is proposed in this paper. LiDAR-based localization is accurate and robust to challenging environmental conditions, but 3D LiDARs are relatively heavy and require large UAV platforms, in contrast to lightweight cameras. However, visual-based self-localization methods exhibit lower accuracy and can suffer from significant drift with respect to the global reference frame. To benefit from both sensory modalities, we focus on cooperative navigation in a heterogeneous team of a primary LiDAR-equipped UAV and a secondary micro-scale camera-equipped UAV. We propose a novel cooperative approach combining LiDAR relative localization data with VIO output on board the primary UAV to obtain an accurate pose of the secondary UAV. The pose estimate is used to precisely and reliably guide the secondary UAV along trajectories defined in the primary UAV reference frame. The experimental evaluation has shown the superior accuracy of our method to the raw VIO output, reaching the average 3D Absolute Trajectory Error (ATE) of 0.28 m, and demonstrated its capability to guide the secondary UAV along desired trajectories while mitigating VIO drift. Thus, such a heterogeneous system can explore large areas with LiDAR precision, as well as visit locations inaccessible to the large LiDAR-carrying UAV platforms, as was showcased in a real-world cooperative mapping scenario.", "link": "http://arxiv.org/abs/2306.17544v5", "date": "2026-03-04", "relevancy": 2.8624, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5912}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5644}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fusion%20of%20Visual-Inertial%20Odometry%20with%20LiDAR%20Relative%20Localization%20for%20Cooperative%20Guidance%20of%20a%20Micro-Scale%20Aerial%20Vehicle&body=Title%3A%20Fusion%20of%20Visual-Inertial%20Odometry%20with%20LiDAR%20Relative%20Localization%20for%20Cooperative%20Guidance%20of%20a%20Micro-Scale%20Aerial%20Vehicle%0AAuthor%3A%20V%C3%A1clav%20Pritzl%20and%20Matou%C5%A1%20Vrba%20and%20Petr%20%C5%A0t%C4%9Bp%C3%A1n%20and%20Martin%20Saska%0AAbstract%3A%20A%20novel%20relative%20localization%20approach%20for%20guidance%20of%20a%20micro-scale%20Unmanned%20Aerial%20Vehicle%20%28UAV%29%20by%20a%20well-equipped%20aerial%20robot%20fusing%20Visual-Inertial%20Odometry%20%28VIO%29%20with%20Light%20Detection%20and%20Ranging%20%28LiDAR%29%20is%20proposed%20in%20this%20paper.%20LiDAR-based%20localization%20is%20accurate%20and%20robust%20to%20challenging%20environmental%20conditions%2C%20but%203D%20LiDARs%20are%20relatively%20heavy%20and%20require%20large%20UAV%20platforms%2C%20in%20contrast%20to%20lightweight%20cameras.%20However%2C%20visual-based%20self-localization%20methods%20exhibit%20lower%20accuracy%20and%20can%20suffer%20from%20significant%20drift%20with%20respect%20to%20the%20global%20reference%20frame.%20To%20benefit%20from%20both%20sensory%20modalities%2C%20we%20focus%20on%20cooperative%20navigation%20in%20a%20heterogeneous%20team%20of%20a%20primary%20LiDAR-equipped%20UAV%20and%20a%20secondary%20micro-scale%20camera-equipped%20UAV.%20We%20pr {"title": "Long-Term Visual Localization in Dynamic Benthic Environments: A Dataset, Footprint-Based Ground Truth, and Visual Place Recognition Benchmark", "author": "Martin Kvisvik Larsen and Oscar Pizarro", "abstract": "Long-term visual localization has the potential to reduce cost and improve mapping quality in optical benthic monitoring with autonomous underwater vehicles (AUVs). Despite this potential, long-term visual localization in benthic environments remains understudied, primarily due to the lack of curated datasets for benchmarking. Moreover, limited georeferencing accuracy and image footprints necessitate precise geometric information for accurate ground-truthing. In this work, we address these gaps by presenting a curated dataset for long-term visual localization in benthic environments and a novel method to ground-truth visual localization results for near-nadir underwater imagery. Our dataset comprises georeferenced AUV imagery from five benthic reference sites, revisited over periods up to six years, and includes raw and color-corrected stereo imagery, camera calibrations, and sub-decimeter registered camera poses. To our knowledge, this is the first curated underwater dataset for long-term visual localization spanning multiple sites and photic-zone habitats. Our ground-truthing method estimates 3D seafloor image footprints and links camera views with overlapping footprints, ensuring that ground-truth links reflect shared visual content. Building on this dataset and ground truth, we benchmark eight state-of-the-art visual place recognition (VPR) methods and find that Recall@K is significantly lower on our dataset than on established terrestrial and underwater benchmarks. Finally, we compare our footprint-based ground truth to a traditional location-based ground truth and show that distance-threshold ground-truthing can overestimate VPR Recall@K at sites with rugged terrain and altitude variations. Together, the curated dataset, ground-truthing method, and VPR benchmark provide a stepping stone for advancing long-term visual localization in dynamic benthic environments.", "link": "http://arxiv.org/abs/2603.04056v1", "date": "2026-03-04", "relevancy": 2.8526, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6088}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5617}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Long-Term%20Visual%20Localization%20in%20Dynamic%20Benthic%20Environments%3A%20A%20Dataset%2C%20Footprint-Based%20Ground%20Truth%2C%20and%20Visual%20Place%20Recognition%20Benchmark&body=Title%3A%20Long-Term%20Visual%20Localization%20in%20Dynamic%20Benthic%20Environments%3A%20A%20Dataset%2C%20Footprint-Based%20Ground%20Truth%2C%20and%20Visual%20Place%20Recognition%20Benchmark%0AAuthor%3A%20Martin%20Kvisvik%20Larsen%20and%20Oscar%20Pizarro%0AAbstract%3A%20Long-term%20visual%20localization%20has%20the%20potential%20to%20reduce%20cost%20and%20improve%20mapping%20quality%20in%20optical%20benthic%20monitoring%20with%20autonomous%20underwater%20vehicles%20%28AUVs%29.%20Despite%20this%20potential%2C%20long-term%20visual%20localization%20in%20benthic%20environments%20remains%20understudied%2C%20primarily%20due%20to%20the%20lack%20of%20curated%20datasets%20for%20benchmarking.%20Moreover%2C%20limited%20georeferencing%20accuracy%20and%20image%20footprints%20necessitate%20precise%20geometric%20information%20for%20accurate%20ground-truthing.%20In%20this%20work%2C%20we%20address%20these%20gaps%20by%20presenting%20a%20curated%20dataset%20for%20long-term%20visual%20localization%20in%20benthic%20environments%20and%20a%20novel%20method%20to%20ground-truth%20visual%20localization%20results%20for%20near-nadir%20underwater%20imagery.%20Our%20dataset%20comprises%20georeferenced%20AUV%20imagery%20from%20five%20benthic%20reference%20sites%2C%20revisited%20over%20periods%20up%20to%20six%20years%2C%20and%20includes%20raw%20and%20color-corrected%20stereo%20imagery%2C%20camera%20calibrations%2C%20and%20sub-decimeter%20registered%20camera%20poses.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20curated%20underwater%20dataset%20for%20long-term%20visual%20localization%20spanning%20multiple%20sites%20and%20photic-zone%20habitats.%20Our%20ground-truthing%20method%20estimates%203D%20seafloor%20image%20footprints%20and%20links%20camera%20views%20with%20overlapping%20footprints%2C%20ensuring%20that%20ground-truth%20links%20reflect%20shared%20visual%20content.%20Building%20on%20this%20dataset%20and%20ground%20truth%2C%20we%20benchmark%20eight%20state-of-the-art%20visual%20place%20recognition%20%28VPR%29%20methods%20and%20find%20that%20Recall%40K%20is%20significantly%20lower%20on%20our%20dataset%20than%20on%20established%20terrestrial%20and%20underwater%20benchmarks.%20Finally%2C%20we%20compare%20our%20footprint-based%20ground%20truth%20to%20a%20traditional%20location-based%20ground%20truth%20and%20show%20that%20distance-threshold%20ground-truthing%20can%20overestimate%20VPR%20Recall%40K%20at%20sites%20with%20rugged%20terrain%20and%20altitude%20variations.%20Together%2C%20the%20curated%20dataset%2C%20ground-truthing%20method%2C%20and%20VPR%20benchmark%20provide%20a%20stepping%20stone%20for%20advancing%20long-term%20visual%20localization%20in%20dynamic%20benthic%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04056v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLong-Term%2520Visual%2520Localization%2520in%2520Dynamic%2520Benthic%2520Environments%253A%2520A%2520Dataset%252C {"title": "SSR: A Generic Framework for Text-Aided Map Compression for Localization", "author": "Mohammad Omama and Po-han Li and Harsh Goel and Minkyu Choi and Behdad Chalaki and Vaishnav Tadiparthi and Hossein Nourkhiz Mahjoub and Ehsan Moradi Pari and Sandeep P. Chinchali", "abstract": "Mapping is crucial in robotics for localization and downstream decision-making. As robots are deployed in ever-broader settings, the maps they rely on continue to increase in size. However, storing these maps indefinitely (cold storage), transferring them across networks, or sending localization queries to cloud-hosted maps imposes prohibitive memory and bandwidth costs. We propose a text-enhanced compression framework that reduces both memory and bandwidth footprints while retaining high-fidelity localization. The key idea is to treat text as an alternative modality: one that can be losslessly compressed with large language models. We propose leveraging lightweight text descriptions combined with very small image feature vectors, which capture \"complementary information\" as a compact representation for the mapping task. Building on this, our novel technique, Similarity Space Replication (SSR), learns an adaptive image embedding in one shot that captures only the information \"complementary\" to the text descriptions. We validate our compression framework on multiple downstream localization tasks, including Visual Place Recognition as well as object-centric Monte Carlo localization in both indoor and outdoor settings. SSR achieves 2 times better compression than competing baselines on state-of-the-art datasets, including TokyoVal, Pittsburgh30k, Replica, and KITTI.", "link": "http://arxiv.org/abs/2603.04272v1", "date": "2026-03-04", "relevancy": 2.8263, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5762}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at {"title": "Real5-OmniDocBench: A Full-Scale Physical Reconstruction Benchmark for Robust Document Parsing in the Wild", "author": "Changda Zhou and Ziyue Gao and Xueqing Wang and Tingquan Gao and Cheng Cui and Jing Tang and Yi Liu", "abstract": "While Vision-Language Models (VLMs) achieve near-perfect scores on digital document benchmarks like OmniDocBench, their performance in the unpredictable physical world remains largely unknown due to the lack of controlled yet realistic evaluations. We introduce Real5-OmniDocBench, the first benchmark that performs a full-scale, one-to-one physical reconstruction of the entire OmniDocBench v1.5 (1,355 images) across five critical real-world scenarios: Scanning, Warping, Screen-Photography, Illumination, and Skew. Unlike prior benchmark that either lack digital correspondence or employ partial sampling, our complete ground-truth mapping enables, for the first time, rigorous factor-wise attribution of performance degradation-allowing us to pinpoint whether failures stem from geometric distortions, optical artifacts, or model limitations. Our benchmark establishes a challenging new standard for the community, demonstrating that the 'reality gap' in document parsing is far from closed, and provides a diagnostic tool to guide the development of truly resilient document intelligence.", "link": "http://arxiv.org/abs/2603.04205v1", "date": "2026-03-04", "relevancy": 2.7854, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5834}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5834}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5045}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Real5-OmniDocBench%3A%2

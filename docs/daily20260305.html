{"title": "GIPO: Gaussian Importance Sampling Policy Optimization", "author": "Chengxuan Lu and Zhenquan Zhang and Shukuan Wang and Qunzhi Lin and Baigui Sun and Yang Liu", "abstract": "Post-training with reinforcement learning (RL) has recently shown strong promise for advancing multimodal agents beyond supervised imitation. However, RL remains limited by poor data efficiency, particularly in settings where interaction data are scarce and quickly become outdated. To address this challenge, GIPO (Gaussian Importance sampling Policy Optimization) is proposed as a policy optimization objective based on truncated importance sampling, replacing hard clipping with a log-ratio-based Gaussian trust weight to softly damp extreme importance ratios while maintaining non-zero gradients. Theoretical analysis shows that GIPO introduces an implicit, tunable constraint on the update magnitude, while concentration bounds guarantee robustness and stability under finite-sample estimation. Experimental results show that GIPO achieves state-of-the-art performance among clipping-based baselines across a wide range of replay buffer sizes, from near on-policy to highly stale data, while exhibiting superior bias--variance trade-off, high training stability and improved sample efficiency.", "link": "http://arxiv.org/abs/2603.03955v1", "date": "2026-03-04", "relevancy": 2.5125, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.513}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4975}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.497}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GIPO%3A%20Gaussian%20Importance%20Sampling%20Policy%20Optimization&body=Title%3A%20GIPO%3A%20Gaussian%20Importance%20Sampling%20Policy%20Optimization%0AAuthor%3A%20Chengxuan%20Lu%20and%20Zhenquan%20Zhang%20and%20Shukuan%20Wang%20and%20Qunzhi%20Lin%20and%20Baigui%20Sun%20and%20Yang%20Liu%0AAbstract%3A%20Post-training%20with%20reinforcement%20learning%20%28RL%29%20has%20recently%20shown%20strong%20promise%20for%20advancing%20multimodal%20agents%20beyond%20supervised%20imitation.%20However%2C%20RL%20remains%20limited%20by%20poor%20data%20efficiency%2C%20particularly%20in%20settings%20where%20interaction%20data%20are%20scarce%20and%20quickly%20become%20outdated.%20To%20address%20this%20challenge%2C%20GIPO%20%28Gaussian%20Importance%20sampling%20Policy%20Optimization%29%20is%20proposed%20as%20a%20policy%20optimization%20objective%20based%20on%20truncated%20importance%20sampling%2C%20replacing%20hard%20clipping%20with%20a%20log-ratio-based%20Gaussian%20trust%20weight%20to%20softly%20damp%20extreme%20importance%20ratios%20while%20maintaining%20non-zero%20gradients.%20Theoretical%20analysis%20shows%20that%20GIPO%20introduces%20an%20implicit%2C%20tunable%20constraint%20on%20the%20update%20magnitude%2C%20while%20concentration%20bounds%20guarantee%20robustness%20and%20stability%20under%20finite-sample%20estimation.%20Experimental%20results%20show%20that%20GIPO%20achieves%20state-of-the-art%20performance%20among%20clipping-based%20baselines%20across%20a%20wide%20range%20of%20replay%20buffer%20sizes%2C%20from%20near%20on-policy%20to%20highly%20stale%20data%2C%20while%20exhibiting%20superior%20bias--variance%20trade-off%2C%20high%20training%20stability%20and%20improved%20sample%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03955v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGIPO%253A%2520Gaussian%2520Importance%2520Sampling%2520Policy%2520Optimization%26entry.906535625%3DChengxuan%2520Lu%2520and%2520Zhenquan%2520Zhang%2520and%2520Shukuan%2520Wang%2520and%2520Qunzhi%2520Lin {"title": "JPmHC Dynamical Isometry via Orthogonal Hyper-Connections", "author": "Biswa Sengupta and Jinhua Wang and Leo Brunswic", "abstract": "Recent advances in deep learning, exemplified by Hyper-Connections (HC), have expanded the residual connection paradigm by introducing wider residual streams and diverse connectivity patterns. While these innovations yield significant performance gains, they compromise the identity mapping property of residual connections, leading to training instability, limited scalability, and increased memory overhead. To address these challenges, we propose JPmHC (Jacobian-spectrum Preserving manifold-constrained Hyper-Connections), a framework that replaces identity skips with a trainable linear mixer acting on n parallel streams while explicitly controlling gradient conditioning. By constraining the mixer M on operator-norm-bounded manifolds (e.g., bistochastic, Stiefel, Grassmann), JPmHC prevents gradient pathologies and enhances stability. JPmHC introduces three key contributions: (i) a free-probability analysis that predicts Jacobian spectra for structured skips, providing actionable design rules for mixer selection; (ii) memory-efficient implicit differentiation for fixed-point projections, reducing activation memory and synchronization overhead; and (iii) a Stiefel-constrained mixer via Cayley transforms, ensuring orthogonality without post-hoc normalization. Empirical evaluations on ARC-AGI demonstrate that JPmHC achieves faster convergence, higher accuracy, and lower computational cost compared to bistochastic baselines, with a rank-$p$ Grassmannian variant tracking between the two -- consistent with the spectral theory predictions. As a flexible and scalable extension of HC, JPmHC advances spectrum-aware, stable, and efficient deep learning, offering insights into topological architecture design and foundational model evolution. \\newline \\newline", "link": "http://arxiv.org/abs/2602.18308v2", "date": "2026-03-04", "relevanc 20providing%20actionable%20design%20rules%20for%20mixer%20selection%3B%20%28ii%29%20memory-efficient%20implicit%20differentiation%20for%20fixed-point%20projections%2C%20reducing%20activation%20memory%20and%20synchronization%20overhead%3B%20and%20%28iii%29%20a%20Stiefel-constrained%20mixer%20via%20Cayley%20transforms%2C%20ensuring%20orthogonality%20without%20post-hoc%20normalization.%20Empirical%20evaluations%20on%20ARC-AGI%20demonstrate%20that%20JPmHC%20achieves%20faster%20convergence%2C%20higher%20accuracy%2C%20and%20lower%20computational%20cost%20compared%20to%20bistochastic%20baselines%2C%20with%20a%20rank-%24p%24%20Grassmannian%20variant%20tracking%20between%20the%20two%20--%20consistent%20with%20the%20spectral%20theory%20predictions.%20As%20a%20flexible%20and%20scalable%20extension%20of%20HC%2C%20JPmHC%20advances%20spectrum-aware%2C%20stable%2C%20and%20efficient%20deep%20learning%2C%20offering%20insights%20into%20topological%20architecture%20design%20and%20foundational%20model%20evolution.%20%5Cnewline%20%5Cnewline%0ALink%3A%20http%3A//arxiv.org/abs/2602.18308v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJPmHC%2520Dynamical%2520Isometry%2520via%2520Orthogonal%2520Hyper-Connections%26entry.906535625%3DBiswa%2520Sengupta%2520and%2520Jinhua%2520Wang%2520and%2520Leo%2520Brunswic%26entry.1292438233%3DRecent%2520advances%2520in%2520deep%2520learning%252C%2520exemplified%2520by%2520Hyper-Connections%2520%2528HC%2529%252C%2520have%2520expanded%2520the%2520residual%2520connection%2520paradigm%2520by%2520introducing%2520wider%2520residual%2520streams%2520and%2520diverse%2520connectivity%2520patterns.%2520While%2520these%2520innovations%2520yield%2520significant%2520performance%2520gains%252C%2520they%2520compromise%2520the%2520identity%2520mapping%2520property%2520of%2520residual%2520connections%252C%2520leading%2520to%2520training%2520instability%252C%2520limited%2520scalability% {"title": "The Lie of the Average: How Class Incremental Learning Evaluation Deceives You?", "author": "Guannan Lai and Da-Wei Zhou and Xin Yang and Han-Jia Ye", "abstract": "Class Incremental Learning (CIL) requires models to continuously learn new classes without forgetting previously learned ones, while maintaining stable performance across all possible class sequences. In real-world settings, the order in which classes arrive is diverse and unpredictable, and model performance can vary substantially across different sequences. Yet mainstream evaluation protocols calculate mean and variance from only a small set of randomly sampled sequences. Our theoretical analysis and empirical results demonstrate that this sampling strategy fails to capture the full performance range, resulting in biased mean estimates and a severe underestimation of the true variance in the performance distribution. We therefore contend that a robust CIL evaluation protocol should accurately characterize and estimate the entire performance distribution. To this end, we introduce the concept of extreme sequences and provide theoretical justification for their crucial role in the reliable evaluation of CIL. Moreover, we observe a consistent positive correlation between inter-task similarity and model performance, a relation that can be leveraged to guide the search for extreme sequences. Building on these insights, we propose EDGE (Extreme case-based Distribution & Generalization Evaluation), an evaluation protocol that adaptively identifies and samples extreme class sequences using inter-task similarity, offering a closer approximation of the ground-truth performance distribution. Extensive experiments demonstrate that EDGE effectively captures performance extremes and yields more accurate estimates of distributional boundaries, providing actionable insights for model selection and robustness checking. Our code is available at https://github.com/AIGNLAI/EDGE.", "link": "http://arxiv.org/abs/2509.22580v2", "date": "2026-03-04", "relevancy": 2.4923, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5042}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4978}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4933}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Lie%20of%20the%20Average%3A%20How%20Class%20Incremental%20Learning%20Evaluation%20Deceives%20You%3F&body=Title%3A%20The%20Lie%20of%20the%20Average%3A%20How%20Class%20Incremental%20Learning%20Evaluation%20Deceives%20You%3F%0AAuthor%3A%20Guannan%20Lai%20and%20Da-Wei%20Zhou%20and%20Xin%20Yang%20and%20Han-Jia%20Ye%0AAbstract%3A%20Class%20Incremental%20Learning%20%28CIL%29%20requires%20models%20to%20continuously%20learn%20new%20classes%20without%20forgetting%20previously%20learned%20ones%2C%20while%20maintaining%20stable%20performance%20across%20all%20possible%20class%20sequences.%20In%20real-world%20settings%2C%20the%20order%20in%20which%20classes%20arrive%20is%20diverse%20and%20unpredictable%2C%20and%20model%20performance%20can%20vary%20substantially%20across%20different%20sequences.%20Yet%20mainstream%20evaluation%20protocols%20calculate%20mean%20and%20variance%20from%20only%20a%20small%20set%20of%20randomly%20sampled%20sequences.%20Our%20theoretical%20analysis%20and%20empirical%20results%20demonstrate%20that%20this%20sampling%20strategy%20fails%20to%20capture%20the%20full%20performance%20range%2C%20resulting%20in%20biased%20mean%20estimates%20and%20a%20severe%20underestimation%20of%20the%20true%20variance%20in%20the%20performance%20distribution.%20We%20therefore%20contend%20that%20a%20robust%20CIL%20evaluation%20protocol%20should%20accurately%20characterize%20and%20estimate%20the%20entire%20performance%20distribution.%20To%20this%20end%2C%20we%20introduce%20the%20concept%20of%20extreme%20sequences%20and%20provide%20theoretical%20justification%20for%20their%20crucial%20role%20in%20the%20reliable%20evaluation%20of%20CIL.%20Moreover%2C%20we%20observe%20a%20consistent%20positive%20correlation%20between%20inter-task%20similarity%20and%20model%20performance%2C%20a%20relation%20that%20can%20be%20leveraged%20to%20guide%20the%20search%20for%20extreme%20sequences.%20Building%20on%20these%20insights%2C%20we%20propose%20EDGE%20%28Extreme%20case-based%20Distribution%20%26%20Generalization%20Evaluation%29%2C%20an%20evaluation%20protocol%20that%20adaptively%20identifies%20and%20samples%20extreme%20class%20sequences%20using%20inter-task%20similarity%2C%20offering%20a%20closer%20approximation%20of%20the%20ground-truth%20performance%20distribution.%20Extensive%20experiments%20demonstrate%20that%20EDGE%20effectively%20captures%20performance%20extremes%20and%20yields%20more%20accurate%20estimates%20of%20distributional%20boundaries%2C%20providing%20actionable%20insights%20for%20model%20selection%20and%20robustness%20checking.%20Our%20code%20is%20available%20at%20https%3A//github.com/AIGNLAI/EDGE.%0ALink%3A%20http%3A//arxiv.org/abs/2509.22580v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Lie%2520of%2520the%2520Average%253A%2520How%2520Class%2520Incremental%2520Learning%2520Evaluation%2520Deceives%2520You%253F%26entry.906535625%3DGuannan%2520Lai%2520and%2520Da-Wei%2520Zhou%2520and%2520Xin%2520Yang%2520and%2520Han-Jia%2520Ye%26entry.1292438233%3DClass%2520Incremental%2520Learning%2520%2528CIL%2529%2520requires%2520models%2520to%2520continuously%2520learn%2520new%2520classes%2520without%2520forgetting%2520previously%2520learned% extreme%2520class%2520sequences%2520using%2520inter-task%2520similarity%252C%2520offering%2520a%2520closer%2520approximation%2520of%2520the%2520ground-truth%2520performance%2520distribution.%2520Extensive%2520experiments%2520demonstrate%2520that%2520EDGE%2520effectively%2520captures%2520performance%2520extremes%2520and%2520yields%2520more%2520accurate%2520estimates%2520of%2520distributional%2520boundaries%252C%2520providing%2520actionable%2520insights%2520for%2520model%2520selection%2520and%2520robustness%2520checking.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/AIGNLAI/EDGE.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.22580v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Lie%20of%20the%20Average%3A%20How%20Class%20Incremental%20Learning%20Evaluation%20Deceives%20You%3F&entry.906535625=Guannan%20Lai%20and%20Da-Wei%20Zhou%20and%20Xin%20Yang%20and%20Han-Jia%20Ye&entry.1292438233=Class%20Incremental%20Learning%20%28CIL%29%20requires%20models%20to%20continuously%20learn%20new%20classes%20without%20forgetting%20previously%20learned%20ones%2C%20while%20maintaining%20stable%20performance%20across%20all%20possible%20class%20sequences.%20In%20real-world%20settings%2C%20the%20order%20in%20which%20classes%20arrive%20is%20diverse%20and%20unpredictable%2C%20and%20model%20performance%20can%20vary%20substantially%20across%20different%20sequences.%20Yet%20mainstream%20evaluation%20protocols%20calculate%20mean%20and%20variance%20from%20only%20a%20small%20set%20of%20randomly%20sampled%20sequences.%20Our%20theoretical%20analysis%20and%20empirical%20results%20demonstrate%20that%20this%20sampling%20strategy%20fails%20to%20capture%20the%20full%20performance%20range%2C%20resulting%20in%20biased%20mean%20estimates%20and%20a%20severe%20underestimation%20of%20the%20true%20variance%20in%20the%20performance%20distribution.%20We%20therefore%20contend%20that%20a%20robust%20CIL%20evaluation%20protocol%20should%20accurately%20characterize%20and%20estimate%20the%20entire%20performance%20distribution.%20To%20this%20end%2C%20we%20introduce%20the%20concept%20of%20extreme%20sequences%20and%20provide%20theoretical%20justification%20for%20their%20crucial%20role%20in%20the%20reliable%20evaluation%20of%20CIL.%20Moreover%2C%20we%20observe%20a%20consistent%20positive%20correlation%20between%20inter-task%20similarity%20and%20model%20performance%2C%20a%20relation%20that%20can%20be%20leveraged%20to%20guide%20the%20search%20for%20extreme%20sequences.%20Building%20on%20these%20insights%2C%20we%20propose%20EDGE%20%28Extreme%20case-based%20Distribution%20%26%20Generalization%20Evaluation%29%2C%20an%20evaluation%20protocol%20that%20adaptively%20identifies%20and%20samples%20extreme%20class%20sequences%20using%20inter-task%20similarity%2C%20offering%20a%20closer%20approximation%20of%20the%20ground-truth%20performance%20distribution.%20Extensive%20experiments%20demonstrate%20that%20EDGE%20effectively%20captures%20performance%20extremes%20and%20yields%20more%20accurate%20estimates%20of%20distributional%20boundaries%2C%20providing%20actionable%20insights%20for%20model%20selection%20and%20robustness%20checking.%20Our%20code%20is%20available%20at%20https%3A//github.com/AIGNLAI/EDGE.&entry.1838667208=http%3A//arxiv.org/abs/2509.22580v2&entry.124074799=Read"},
{"title": "DecNefSimulator: A Modular, Interpretable Framework for Decoded Neurofeedback Simulation Using Generative Models", "author": "Alexander Olza and Roberto Santana and David Soto", "abstract": "Decoded Neurofeedback (DecNef) is a flourishing non-invasive approach to brain modulation with wide-ranging applications in neuromedicine and cognitive neuroscience. However, progress in DecNef research remains constrained by subject-dependent learning variability, reliance on indirect measures to quantify progress, and the high cost and time demands of experimentation.\n  We present DecNefSimulator, a modular and interpretable simulation framework that formalizes DecNef as a machine learning problem. Beyond providing a virtual laboratory, DecNefSimulator enables researchers to model, analyze and understand neurofeedback dynamics. Using latent variable generative models as simulated participants, DecNefSimulator allows direct observation of internal cognitive states and systematic evaluation of how different protocol designs and subject characteristics influence learning.\n  We demonstrate how this approach can (i) reproduce empirical phenomena of DecNef learning, (ii) identify conditions under which DecNef feedback fails to induce learning, and (iii) guide the design of more robust and reliable DecNef protocols in silico before human implementation.\n  In summary, DecNefSimulator bridges computational modeling and cognitive neuroscience, offering a principled foundation for methodological innovation, robust protocol design, and ultimately, a deeper understanding of DecNef-based brain modulation.", "link": "http://arxiv.org/abs/2511.14555v3", "date": "2026-03-04", "relevancy": 2.4708, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4991}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4962}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4872}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DecNefSimulator%3A%20A%20Modular%2C%20Interpretable%20Framework%20for%20Decoded%20Neurofeedback%20Simulation%20Using%20Generative%20Models&body=Title%3A%20DecNefSimulator%3A%20A%20Modular%2C%20Interpretable%20Framework%20for%20Decoded%20Neurofeedback%20Simulation%20Using%20Generative%20Models%0AAuthor%3A%20Alexander%20Olza%20and%20Roberto%20Santana%20and%20David%20Soto%0AAbstract%3A%20Decoded%20Neurofeedback%20%28DecNef%29%20is%20a%20flourishing%20non-invasive%20approach%20to%20brain%20modulation%20with%20wide-ranging%20applications%20in%20neuromedicine%20and%20cognitive%20neuroscience.%20However%2C%20progress%20in%20DecNef%20research%20remains%20constrained%20by%20subject-dependent%20learning%20variability%2C%20reliance%20on%20indirect%20measures%20to%20quantify%20progress%2C%20and%20the%20high%20cost%20and%20time%20demands%20of%20experimentation.%0A%20%20We%20present%20DecNefSimulator%2C%20a%20modular%20and%20interpretable%20simulation%20framework%20that%20formalizes%20DecNef%20as%20a%20machine%20learning%20problem.%20Beyond%20providing%20a%20virtual%20laboratory%2C%20DecNefSimulator%20enables%20researchers%20to%20model%2C%20analyze%20and%20understand%20neurofeedback%20dynamics.%20Using%20latent%20variable%20generative%20models%20as%20simulated%20participants%2C%20DecNefSimulator%20allows%20direct%20observation%20of%20internal%20cognitive%20states%20and%20systematic%20evaluation%20of%20how%20different%20protocol%20designs%20and%20subject%20characteristics%20influence%20learning.%0A%20%20We%20demonstrate%20how%20this%20approach%20can%20%28i%29%20reproduce%20empirical%20phenomena%20of%20DecNef%20learning%2C%20%28ii%29%20identify%20conditions%20under%20which%20DecNef%20feedback%20fails%20to%20induce%20learning%2C%20and%20%28iii%29%20guide%20the%20design%20of%2 {"title": "Spectral Surgery: Training-Free Refinement of LoRA via Gradient-Guided Singular Value Reweighting", "author": "Zailong Tian and Yanzhe Chen and Zhuoheng Han and Lizi Liao", "abstract": "Low-Rank Adaptation (LoRA) improves downstream performance by restricting task updates to a low-rank parameter subspace, yet how this limited capacity is allocated within a trained adapter remains unclear. Through a geometric and empirical study across multiple tasks and backbones, we find that trained LoRA updates often exhibit an inefficient spectrum: task effects concentrate in a small subset of singular directions, while many remaining components are neutral or detrimental, motivating post-hoc refinement within the learned subspace. We propose Spectral Surgery, a training-free refinement that decomposes a LoRA update with SVD, estimates per-component sensitivity using gradients on a small calibration set, and reweights singular values under a magnitude constraint while keeping the learned directions fixed. Across Llama-3.1-8B and Qwen3-8B on four benchmarks, Spectral Surgery yields consistent gains (up to +4.4 points on CommonsenseQA and +2.4 pass@1 on HumanEval) by adjusting only $\\approx 1{,}000$ scalar coefficients. These results demonstrate that SVD-structured, low-cost parameter editing can serve as a practical route to improving trained LoRA adapters in a purely post-hoc manner.", "link": "http://arxiv.org/abs/2603.03995v1", "date": "2026-03-04", "relevancy": 2.4476, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5088}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4889}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4709}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Surgery%3A%20Training-Free%20Refinement%20of%20LoRA%20via%20Gradient-Guided%20Singular%20Value%20Reweighting&body=Title%3A%20Spectral%20Surgery%3A%20Training-Free%20Refinement%20of%20LoRA%20via%20Gradient-Guided%20Singular%20Value%20Reweighting%0AAuthor%3A%20Zailong%20Tian%20and%20Yanzhe%20Chen%20and%20Zhuoheng%20Han%20and%20Lizi%20Liao%0AAbstract%3A%20Low-Rank%20Adaptation%20%28LoRA%29%20improves%20downstream%20performance%20by%20restricting%20task%20updates%20to%20a%20low-rank%20parameter%20subspace%2C%20yet%20how%20this%20limited%20capacity%20is%20allocated%20within%20a%20trained%20adapter%20remains%20unclear.%20Through%20a%20geometric%20and%20empirical%20study%20across%20multiple%20tasks%20and%20backbones%2C%20we%20find%20that%20trained%20LoRA%20updates%20often%20exhibit%20an%20inefficient%20spectrum%3A%20task%20effects%20concentrate%20in%20a%20small%20subset%20of%20singular%20directions%2C%20while%20many%20remaining%20components%20are%20neutral%20or%20detrimental%2C%20motivating%20post-hoc%20refinement%20within%20the%20learned%20subspace.%20We%20propose%20Spectral%20Surgery%2C%20a%20training-free%20refinement%20that%20decomposes%20a%20LoRA%20update%20with%20SVD%2C%20estimates%20per-component%20sensitivity%20using%20gradients%20on%20a%20small%20calibration%20set%2C%20and%20reweights%20singular%20values%20under%20a%20magnitude%20constraint%20while%20keeping%20the%20learned%20directions%20fixed.%20Across%20Llama-3.1-8B%20and%20Qwen3-8B%20on%20four%20benchmarks%2C%20Spectral%20Surgery%20yields%20consistent%20gains%20%28up%20to%20%2B4.4%20points%20on%20CommonsenseQA%20and%20%2B2.4%20pass%401%20on%20HumanEval%29%20by%20adjusting%20only%20%24%5Capprox%201%7B%2C%7D000%24%20scalar%20coefficients.%20These%20results%20demonstrate%20that%20SVD-structured%2C%20low-cost%20parameter%20editing%20can%20serve%20as%20a%20practical%20route%20to%20improving%20trained%20LoRA%20adapters%20in%20a%20purely%20post-hoc%20manner.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03995v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectral%2520Surgery%253A%2520Training-Free%2520Refinement%2520of%2520LoRA%2520via%2520Gradient-Guided%2520Singular%2520Value%2520Reweighting%26entry.906535625%3DZailong%2520Tian%2520and%2520Yanzhe%2520Chen%2520and%2520Zhuoheng%2520Han%2520and%2520Lizi%2520Liao%26entry.1292438233%3DLow-Rank%2520Adaptation%2520%2528LoRA%2529%2520improves%2520downstream%2520performance%2520by%2520restricting%2520task%2520updates%2520to%2520a%2520low-rank%2520parameter%2520subspace%252C%2520yet%2520how%2520this%2520limited%2520capacity%2520is%2520allocated%2520within%2520a%2520trained%2520adapter%2520remains%2520unclear.%2520Through%2520a%2520geometric%2520and%2520empirical%2520study%2520across%2520multiple%2520tasks%2520and%2520backbones%252C%2520we%2520find%2520that%2520trained%2520LoRA%2520updates%2520often%2520exhibit%2520an%2520inefficient%2520spectrum%253A%2520task%2520effects%2520concentrate%2520in%2520a%2520small%2520subset%2520of%2520singular%2520directions%252C%2520while%2520many%2520remaining%2520components%2520are%2520neutral%2520or%2520detrimental%252C%2520motivating%2520post-hoc%2520refinement%2520within%2520the%2520learned%2520subspace.%2520We%2520propose%2520Spectral%2520Surgery%252C%2520a%2520training-free%2520refinement%2520that%2520decomposes%2520a%2520LoRA%2520update%2520with%2520SVD%252C%2520estimates%2520per-component%2520sensitivity%2520using%2520gradients%2520on%2520a%2520small%2520calibration%2520set%252C%2520and%2520reweights%2520singular%2520values%2520under%2520a%2520magnitude%2520constraint%2520while%2520keeping%2520the%2520learned%2520directions%2520fixed.%2520Across%2520Llama-3.1-8B%2520and%2520Qwen3-8B%2520on%2520four%2520benchmarks%252C%2520Spectral%2520Surgery%2520yields%2520consistent%2520gains%2520%2528up%2520to%2520%252B4.4%2520points%2520on%2520CommonsenseQA%2520and%2520%252B2.4%2520pass%25401%2520on%2520HumanEval%2529%2520by%2520adjusting%2520only%2520%2524%255Capprox%25201%257B%252C%257D000%2524%2520scalar%2520coefficients.%2520These%2520results%2520demonstrate%2520that%2520SVD-structured%252C%2520low-cost%2520parameter%2520editing%2520can%2520serve%2520as%2520a%2520practical%2520route%2520to%2520improving%2520trained%2520LoRA%2520adapters%2520in%2520a%2520purely%2520post-hoc%2520manner.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03995v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spectral%20Surgery%3A%20Training-Free%20Refinement%20of%20LoRA%20via%20Gradient-Guided%20Singular%20Value%20Reweighting&entry.906535625=Zailong%20Tian%20and%20Yanzhe%20Chen%20and%20Zhuoheng%20Han%20and%20Lizi%20Liao&entry.1292438233=Low-Rank%20Adaptation%20%28LoRA%29%20improves%20downstream%20performance%20by%20restricting%20task%20updates%20to%20a%20low-rank%20parameter%20subspace%2C%20yet%20how%20this%20limited%20capacity%20is%20allocated%20within%20a%20trained%20adapter%20remains%20unclear.%20Through%20a%20geometric%20and%20empirical%20study%20across%20multiple%20tasks%20and%20backbones%2C%20we%20find%20that%20trained%20LoRA%20updates%20often%20exhibit%20an%20inefficient%20spectrum%3A%20task%20effects%20concentrate%20in%20a%20small%20subset%20of%20singular%20directions%2C%20while%20many%20remaining%20components%20are%20neutral%20or%20detrimental%2C%20motivating%20post-hoc%20refinement%20within%20the%20learned%20subspace.%20We%20propose%20Spectral%20Surgery%2C%20a%20training-free%20refinement%20that%20decomposes%20a%20LoRA%20update%20with%20SVD%2C%20estimates%20per-component%20sensitivity%20using%20gradients%20on%20a%20small%20calibration%20set%2C%20and%20reweights%20singular%20values%20under%20a%20magnitude%20constraint%20while%20keeping%20the%20learned%20directions%20fixed.%20Across%20Llama-3.1-8B%20and%20Q {"title": "Degradation-based augmented training for robust individual animal re-identification", "author": "Thanos Polychronou and Luk\u00e1\u0161 Adam and Viktor Penchev and Kostas Papafitsoros", "abstract": "Wildlife re-identification aims to recognise individual animals by matching query images to a database of previously identified individuals, based on their fine-scale unique morphological characteristics. Current state-of-the-art models for multispecies re- identification are based on deep metric learning representing individual identities by fea- ture vectors in an embedding space, the similarity of which forms the basis for a fast automated identity retrieval. Yet very often, the discriminative information of individual wild animals gets significantly reduced due to the presence of several degradation factors in images, leading to reduced retrieval performance and limiting the downstream eco- logical studies. Here, starting by showing that the extent of this performance reduction greatly varies depending on the animal species (18 wild animal datasets), we introduce an augmented training framework for deep feature extractors, where we apply artificial but diverse degradations in images in the training set. We show that applying this augmented training only to a subset of individuals, leads to an overall increased re-identification performance, under the same type of degradations, even for individuals not seen during training. The introduction of diverse degradations during training leads to a gain of up to 8.5% Rank-1 accuracy to a dataset of real-world degraded animal images, selected using human re-ID expert annotations provided here for the first time. Our work is the first to systematically study image degradation in wildlife re-identification, while introducing all the necessary benchmarks, publicly available code and data, enabling further research on this topic.", "link": "http://arxiv.org/abs/2603.04163v1", "date": "2026-03-04", "relevancy": 2.4411, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4903}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4897}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Degradation-based%20augmented%20training%20for%20robust%20individual%20animal%20re-identification&body=Title%3A%20Degradation-based%20augmented%20training%20for%20robust%20individual%20animal%20re-identification%0AAuthor%3A%20Thanos%20Polychronou%20and%20Luk%C3%A1%C5%A1%20Adam%20and%20Viktor%20Penchev%20and%20Kostas%20Papafitsoros%0AAbstract%3A%20Wildlife%20re-identification%20aims%20to%20recognise%20individual%20animals%20by%20matching%20query%20images%20to%20a%20database%20of%20previously%20identified%20individuals%2C%20based%20on%20their%20fine-scale%20unique%20morphological%20characteristics.%20Current%20state-of-the-art%20models%20for%20multispecies%20re-%20identification%20are%20based%20on%20deep%20metric%20learning%20representing%20individual%20identities%20by%20fea-%20ture%20vectors%20in%20an%20embedding%20space%2C%20the%20similarity%20of%20which%20forms%20the%20basis%20for%20a%20fast%20automated%20identity%20retrieval.%20Yet%20very%20often%2C%20the%20discriminative%20information%20of%20individual%20wild%20animals%20gets%20significantly%20reduced%20due%20to%20the%20presence%20of%20several%20degradation%20factors%20in%20images%2C%20leading%20to%20reduced%20retrieval%20performance%20and%20limiting%20the%20downstream%20eco-%20logical%20studies.%20Here%2C%20starting%20by%20showing%20that%20the%20extent%20of%20this%20performance%20reduction%20greatly%20varies%20depending%20on%20the%20animal%20species%20%2818%20wild%20animal%20datasets%29%2C%20we%20introduce%20an%20augmented%20training%20framework%20for%20deep%20feature%20extractors%2C%20where%20we%20apply%20artificial%20but%20diverse%20degradations%20in%20images%20in%20the%20training%20set.%20We%20show%20that%20applying%20this%20augmented%20training%20only%20to%20a%20subset%20of%20individuals%2C%20leads%20to%20an%20overall%20increased%20re-identification%20performance%2C%20under%20the%20same%20type%20of%20degradations%2C%20even%20for%20individuals%20not%20seen%20during%20training.%20The%20introduction%20of%20diverse%20degradations%20during%20training%20leads%20to%20a%20gain%20of%20up%20to%208.5%25%20Rank-1%20accuracy%20to%20a%20dataset%20of%20real-world%20degraded%20animal%20images%2C%20selected%20using%20human%20re-ID%20expert%20annotations%20provided%20here%20for%20the%20first%20time.%20Our%20work%20is%20the%20first%20to%20systematically%20study%20image%20degradation%20in%20wildlife%20re-identification%2C%20while%20introducing%20all%20the%20necessary%20benchmarks%2C%20publicly%20available%20code%20and%20data%2C%20enabling%20further%20research%20on%20this%20topic.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04163v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDegradation-based%2520augmented%2520training%2520for%2520robust%2520individual%2520animal%2520re-identification%26entry.906535625%3DThanos%2520Polychronou%2520and%2520Luk%25C3%25A1%25C5%25A1%2520Adam%2520and%2520Viktor%2520Penchev%2520and%2520Kostas%2520Papafitsoros%26entry.1292438233%3DWildlife%2520re-identification%2520aims%2520to%2520recognise%2520individual%2520animals%2520by%2520matching%2520query%2520images%2520to%2520a%2520database%2520of%2520previously%2520identified%2520individuals%252C%2520based%2520on%2520their%2520fine-scale%2520unique%2520morphological%2520characteristics.%2520Current%2520state-of-the-art%2520models%2520for%2520multispecies%2520re-%2520identification%2520are%2520based%2520on%2520deep%2520metric%2520le 0study%2520image%2520degradation%2520in%2520wildlife%2520re-identification%252C%2520while%2520introducing%2520all%2520the%2520necessary%2520benchmarks%252C%2520publicly%2520available%2520code%2520and%2520data%252C%2520enabling%2520further%2520research%2520on%2520this%2520topic.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04163v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Degradation-based%20augmented%20training%20for%20robust%20individual%20animal%20re-identification&entry.906535625=Thanos%20Polychronou%20and%20Luk%C3%A1%C5%A1%20Adam%20and%20Viktor%20Penchev%20and%20Kostas%20Papafitsoros&entry.1292438233=Wildlife%20re-identification%20aims%20to%20recognise%20individual%20animals%20by%20matching%20query%20images%20to%20a%20database%20of%20previously%20identified%20individuals%2C%20based%20on%20their%20fine-scale%20unique%20morphological%20characteristics.%20Current%20state-of-the-art%20models%20for%20multispecies%20re-%20identification%20are%20based%20on%20deep%20metric%20learning%20representing%20individual%20identities%20by%20fea-%20ture%20vectors%20in%20an%20embedding%20space%2C%20the%20similarity%20of%20which%20forms%20the%20basis%20for%20a%20fast%20automated%20identity%20retrieval.%20Yet%20very%20often%2C%20the%20discriminative%20information%20of%20individual%20wild%20animals%20gets%20significantly%20reduced%20due%20to%20the%20presence%20of%20several%20degradation%20factors%20in%20images%2C%20leading%20to%20reduced%20retrieval%20performance%20and%20limiting%20the%20downstream%20eco-%20logical%20studies.%20Here%2C%20starting%20by%20showing%20that%20the%20extent%20of%20this%20performance%20reduction%20greatly%20varies%20depending%20on%20the%20animal%20species%20%2818%20wild%20animal%20datasets%29%2C%20we%20introduce%20an%20augmented%20training%20framework%20for%20deep%20feature%20extractors%2C%20where%20we%20apply%20artificial%20but%20diverse%20degr {"title": "MOO: A Multi-view Oriented Observations Dataset for Viewpoint Analysis in Cattle Re-Identification", "author": "William Grolleau and Achraf Chaouch and Astrid Sabourin and Guillaume Lapouge and Catherine Achard", "abstract": "Animal re-identification (ReID) faces critical challenges due to viewpoint variations, particularly in Aerial-Ground (AG-ReID) settings where models must match individuals across drastic elevation changes. However, existing datasets lack the precise angular annotations required to systematically analyze these geometric variations. To address this, we introduce the Multi-view Oriented Observation (MOO) dataset, a large-scale synthetic AG-ReID dataset of $1,000$ cattle individuals captured from $128$ uniformly sampled viewpoints ($128,000$ annotated images). Using this controlled dataset, we quantify the influence of elevation and identify a critical elevation threshold, above which models generalize significantly better to unseen views. Finally, we validate the transferability to real-world applications in both zero-shot and supervised settings, demonstrating performance gains across four real-world cattle datasets and confirming that synthetic geometric priors effectively bridge the domain gap. Collectively, this dataset and analysis lay the foundation for future model development in cross-view animal ReID. MOO is publicly available at https://github.com/TurtleSmoke/MOO.", "link": "http://arxiv.org/abs/2603.04314v1", "date": "2026-03-04", "relevancy": 2.439, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4894}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4894}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MOO%3A%20A%20Multi-view%20Oriented%20Observations%20Dataset%20for%20Viewpoint%20Analysis%20in%20Cattle%20Re-Identification&body=Title%3A%20MOO%3A%20A%20Multi-view%20Oriented%20Observations%20Dataset%20for%20Viewpoint%20Analysis%20in%20Cattle%20Re-Identification%0AAuthor%3A%20William%20Grolleau%20and%20Achraf%20Chaouch%20and%20Astrid%20Sabourin%20and%20Guillaume%20Lapouge%20and%20Catherine%20Achard%0AAbstract%3A%20Animal%20re-identification%20%28ReID%29%20faces%20critical%20challenges%20due%20to%20viewpoint%20variations%2C%20particularly%20in%20Aerial-Ground%20%28AG-ReID%29%20settings%20where%20models%20must%20match%20individuals%20across%20drastic%20elevation%20changes.%20However%2C%20existing%20datasets%20lack%20the%20precise%20angular%20annotations%20required%20to%20systematically%20analyze%20these%20geometric%20variations.%20To%20address%20this%2C%20we%20introduce%20the%20Multi-view%20Oriented%20Observation%20%28MOO%29%20dataset%2C%20a%20large-scale%20synthetic%20AG-ReID%20dataset%20of%20%241%2C000%24%20cattle%20individuals%20captured%20from%20%24128%24%20uniformly%20sampled%20viewpoints%20%28%24128%2C000%24%20annotated%20images%29.%20Using%20this%20controlled%20dataset%2C%20we%20quantify%20the%20influence%20of%20elevation%20and%20identify%20a%20critical%20elevation%20threshold%2C%20above%20which%20models%20generalize%20significantly%20better%20to%20unseen%20views.%20Finally%2C%20we%20validate%20the%20transferability%20to%20real-world%20applications%20in%20both%20zero-shot%20and%20supervised%20settings%2C%20demonstrating%20performance%20gains%20across%20four%20real-world%20cattle%20datasets%20and%20confirming%20that%20synthetic%20geometric%20priors%20effectively%20bridge%20the%20domain%20gap.%20Collectively%2C%20this%20dataset%20and%20analysis%20lay%20the%20foundation%20for%20future%20model%20development%20in%20cross-view%20animal%20ReID.%20MOO%20is%20publicly%20available%20at%20h 2520real-world%2520cattle%2520datasets%2520and%2520confirming%2520that%2520synthetic%2520geometric%2520priors%2520effectively%2520bridge%2520the%2520domain%2520gap.%2520Collectively%252C%2520this%2520dataset%2520and%2520analysis%2520lay%2520the%2520foundation%2520for%2520future%2520model%2520development%2520in%2520cross-view%2520animal%2520ReID.%2520MOO%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/TurtleSmoke/MOO.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04314v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MOO%3A%20A%20Multi-view%20Oriented%20Observations%20Dataset%20for%20Viewpoint%20Analysis%20in%20Cattle%20Re-Identification&entry.906535625=William%20Grolleau%20and%20Achraf%20Chaouch%20and%20Astrid%20Sabourin%20and%20Guillaume%20Lapouge%20and%20Catherine%20Achard&entry.1292438233=Animal%20re-identification%20%28ReID%29%20faces%20critical%20challenges%20due%20to%20viewpoint%20variations%2C%20particularly%20in%20Aerial-Ground%20%28AG-ReID%29%20settings%20where%20models%20must%20match%20individuals%20across%20drastic%20elevation%20changes.%20However%2C%20existing%20datasets%20lack%20the%20precise%20angular%20annotations%20required%20to%20systematically%20analyze%20these%20geometric%20variations.%20To%20address%20this%2C%20we%20introduce%20the%20Multi-view%20Oriented%20Observation%20%28MOO%29%20dataset%2C%20a%20large-scale%20synthetic%20AG-ReID%20dataset%20of%20%241%2C000%24%20cattle%20individuals%20captured%20from%20%24128%24%20uniformly%20sampled%20viewpoints%20%28%24128%2C000%24%20annotated%20images%29.%20Using%20this%20controlled%20dataset%2C%20we%20quantify%20the%20influence%20of%20elevation%20and%20identify%20a%20critical%20elevation%20threshold%2C%20above%20which%20models%20generalize%20significantly%20better%20to%20unseen%20views.%20Finally%2C%20we%20validate%20the%20transferability%20to%20real-world%20applications%20in%2 {"title": "Pointer-CAD: Unifying B-Rep and Command Sequences via Pointer-based Edges & Faces Selection", "author": "Dacheng Qi and Chenyu Wang and Jingwei Xu and Tianzhe Chu and Zibo Zhao and Wen Liu and Wenrui Ding and Yi Ma and Shenghua Gao", "abstract": "Constructing computer-aided design (CAD) models is labor-intensive but essential for engineering and manufacturing. Recent advances in Large Language Models (LLMs) have inspired the LLM-based CAD generation by representing CAD as command sequences. But these methods struggle in practical scenarios because command sequence representation does not support entity selection (e.g. faces or edges), limiting its ability to support complex editing operations such as chamfer or fillet. Further, the discretization of a continuous variable during sketch and extrude operations may result in topological errors. To address these limitations, we present Pointer-CAD, a novel LLM-based CAD generation framework that leverages a pointer-based command sequence representation to explicitly incorporate the geometric information of B-rep models into sequential modeling. In particular, Pointer-CAD decomposes CAD model generation into steps, conditioning the generation of each subsequent step on both the textual description and the B-rep generated from previous steps. Whenever an operation requires the selection of a specific geometric entity, the LLM predicts a Pointer that selects the most feature-consistent candidate from the available set. Such a selection operation also reduces the quantization error in the command sequence-based representation. To support the training of Pointer-CAD, we develop a data annotation pipeline that produces expert-level natural language descriptions and apply it to build a dataset of approximately 575K CAD models. Extensive experimental results demonstrate that Pointer-CAD effectively supports the generation of complex geometric structures and reduces segmentation error to an extremely low level, achievi ns%20may%20result%20in%20topological%20errors.%20To%20address%20these%20limitations%2C%20we%20present%20Pointer-CAD%2C%20a%20novel%20LLM-based%20CAD%20generation%20framework%20that%20leverages%20a%20pointer-based%20command%20sequence%20representation%20to%20explicitly%20incorporate%20the%20geometric%20information%20of%20B-rep%20models%20into%20sequential%20modeling.%20In%20particular%2C%20Pointer-CAD%20decomposes%20CAD%20model%20generation%20into%20steps%2C%20conditioning%20the%20generation%20of%20each%20subsequent%20step%20on%20both%20the%20textual%20description%20and%20the%20B-rep%20generated%20from%20previous%20steps.%20Whenever%20an%20operation%20requires%20the%20selection%20of%20a%20specific%20geometric%20entity%2C%20the%20LLM%20predicts%20a%20Pointer%20that%20selects%20the%20most%20feature-consistent%20candidate%20from%20the%20available%20set.%20Such%20a%20selection%20operation%20also%20reduces%20the%20quantization%20error%20in%20the%20command%20sequence-based%20representation.%20To%20support%20the%20training%20of%20Pointer-CAD%2C%20we%20develop%20a%20data%20annotation%20pipeline%20that%20produces%20expert-level%20natural%20language%20descriptions%20and%20apply%20it%20to%20build%20a%20dataset%20of%20approximately%20575K%20CAD%20models.%20Extensive%20experimental%20results%20demonstrate%20that%20Pointer-CAD%20effectively%20supports%20the%20generation%20of%20complex%20geometric%20structures%20and%20reduces%20segmentation%20error%20to%20an%20extremely%20low%20level%2C%20achieving%20a%20significant%20improvement%20over%20prior%20command%20sequence%20methods%2C%20thereby%20significantly%20mitigating%20the%20topological%20inaccuracies%20introduced%20by%20quantization%20error.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04337v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPointer-CAD%253A%2520Unifying%2520B-Rep%2520and%2520Command%2520Sequences%2520via%2520Pointer-based%2520Edges%25 {"title": "Cross-Modal Mapping and Dual-Branch Reconstruction for 2D-3D Multimodal Industrial Anomaly Detection", "author": "Radia Daci and Vito Ren\u00f2 and Cosimo Patruno and Angelo Cardellicchio and Abdelmalik Taleb-Ahmed and Marco Leo and Cosimo Distante", "abstract": "Multimodal industrial anomaly detection benefits from integrating RGB appearance with 3D surface geometry, yet existing \\emph{unsupervised} approaches commonly rely on memory banks, teacher-student architectures, or fragile fusion schemes, limiting robustness under noisy depth, weak texture, or missing modalities. This paper introduces \\textbf{CMDR-IAD}, a lightweight and modality-flexible unsupervised framework for reliable anomaly detection in 2D+3D multimodal as well as single-modality (2D-only or 3D-only) settings. \\textbf{CMDR-IAD} combines bidirectional 2D$\\leftrightarrow$3D cross-modal mapping to model appearance-geometry consistency with dual-branch reconstruction that independently captures normal texture and geometric structure. A two-part fusion strategy integrates these cues: a reliability-gated mapping anomaly highlights spatially consistent texture-geometry discrepancies, while a confidence-weighted reconstruction anomaly adaptively balances appearance and geometric deviations, yielding stable and precise anomaly localization even in depth-sparse or low-texture regions. On the MVTec 3D-AD benchmark, CMDR-IAD achieves state-of-the-art performance while operating without memory banks, reaching 97.3\\% image-level AUROC (I-AUROC), 99.6\\% pixel-level AUROC (P-AUROC), and 97.6\\% AUPRO. On a real-world polyurethane cutting dataset, the 3D-only variant attains 92.6\\% I-AUROC and 92.5\\% P-AUROC, demonstrating strong effectiveness under practical industrial conditions. These results highlight the framework's robustness, modality flexibility, and the effectiveness of the proposed fusion strategies for industrial visual inspection. Our source code is available at https://github.com/ECGAI-Research/CMDR-IAD/", "link": "http://arxiv.org/abs/2603.03939v1", "date": "2026-03-04", "relevancy": 2.4291, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6251}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5987}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-Modal%20Mapping%20and%20Dual-Branch%20Reconstruction%20for%202D-3D%20Multimodal%20Industrial%20Anomaly%20Detection&body=Title%3A%20Cross-Modal%20Mapping%20and%20Dual-Branch%20Reconstruction%20for%202D-3D%20Multimodal%20Industrial%20Anomaly%20Detection%0AAuthor%3A%20Radia%20Daci%20and%20Vito%20Ren%C3%B2%20and%20Cosimo%20Patruno%20and%20Angelo%20Cardellicchio%20and%20Abdelmalik%20Taleb-Ahmed%20and%20Marco%20Leo%20and%20Cosimo%20Distante%0AAbstract%3A%20Multimodal%20industrial%20anomaly%20detection%20benefits%20from%20integrating%20RGB%20appearance%20with%203D%20surface%20geometry%2C%20yet%20existing%20%5Cemph%7Bunsupervised%7D%20approaches%20commonly%20rely%20on%20memory%20banks%2C%20teacher-student%20architectures%2C%20or%20fragile%20fusion%20schemes%2C%20limiting%20robustness%20under%20noisy%20depth%2C%20weak%20texture%2C%20or%20missing%20modalities.%20This%20paper%20introduces%20%5Ctextbf%7BCMDR-IAD%7D%2C%20a%20lightweight%20and%20modality-flexible%20unsupervised%20framework%20for%20reliable%20anomaly%20detection%20in%202D%2B3D%20multimodal%20as%20well%20as%20single-modality%20%282D-only%20or%203D-only%29%20settings.%20%5Ctextbf%7BCMDR-IAD%7D%20combines%20bidirectional%202D%24%5Cleftrightarrow%243D%20cross-modal%20mapping%20to%20model%20appearance-geometry%20consistency%20with%20dual-branch%20reconstruction%20that%20independently%20captures%20normal%20texture%20and%20geometric%20structure.%20A%20two-part%20fusion%20strategy%20integrates%20these%20cues%3A%20a%20reliability-gated%20mapping%20anomaly%20highlights%20spatially%20consistent%20texture-geometry%20discrepancies%2C%20while%20a%20confidence-weighted%20reconstruction%20anomaly%20adaptively%20balances%20appearance%20and%20geometric%20deviations%2C%20yielding%20stable%20and%20precise%20anomaly%20localization%20even%20in%20depth-sparse%20or%20low-texture%20regions.%20On%20the%20MVTec%203D-AD%20benchmark%2C%20CMDR-IAD%20achieves%20state-of-the-art%20performance%20while%20operating%20without%20memory%20banks%2C%20reaching%2097.3%5C%25%20image-level%20AUROC%20%28I-AUROC%29%2C%2099.6%5C%25%20pixel-level%20AUROC%20%28P-AUROC%29%2C%20and%2097.6%5C%25%20AUPRO.%20On%20a%20real-world%20polyurethane%20cutting%20dataset%2C%20the%203D-only%20variant%20attains%2092.6%5C%25%20I-AUROC%20and%2092.5%5C%25%20P-AUROC%2C%20demonstrating%20strong%20effectiveness%20under%20practical%20industrial%20conditions.%20These%20results%20highlight%20the%20framework%27s%20robustness%2C%20modality%20flexibility%2C%20and%20the%20effectiveness%20of%20the%20proposed%20fusion%20strategies%20for%20industrial%20visual%20inspection.%20Our%20source%20code%20is%20available%20at%20https%3A//github.com/ECGAI-Research/CMDR-IAD/%0ALink%3A%20http%3A//arxiv.org/abs/2603.03939v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-Modal%2520Mapping%2520and%2520Dual-Branch%2520Reconstruction%2520for%25202D-3D%2520Multimodal%2520Industrial%2520Anomaly%2520Detection%26entry.906535625%3DRadia%2520Daci%2520and%2520Vito%2520Ren%25C3%25B2%2520and%2520Cosimo%2520Patruno%2520and%2520Angelo%2520Cardellicchio%2520and%2520Abdelmalik%2520Taleb-Ahmed%2520and%2520Marco%2520Leo%2520and%2520Cosimo%2520Distante%26entry.1292438233%3DMultimodal%2520indu {"title": "PTOPOFL: Privacy-Preserving Personalised Federated Learning via Persistent Homology", "author": "Kelly L Vomo-Donfack and Adryel Hoszu and Gr\u00e9gory Ginot and Ian Morilla", "abstract": "Federated learning (FL) faces two structural tensions: gradient sharing enables data-reconstruction attacks, while non-IID client distributions degrade aggregation quality. We introduce PTOPOFL, a framework that addresses both challenges simultaneously by replacing gradient communication with topological descriptors derived from persistent homology (PH). Clients transmit only 48-dimensional PH feature vectors-compact shape summaries whose many-to-one structure makes inversion provably ill-posed-rather than model gradients. The server performs topology-guided personalised aggregation: clients are clustered by Wasserstein similarity between their PH diagrams, intra-cluster models are topology-weighted,and clusters are blended with a global consensus. We prove an information-contraction theorem showing that PH descriptors leak strictly less mutual information per sample than gradients under strongly convex loss functions, and we establish linear convergence of the Wasserstein-weighted aggregation scheme with an error floor strictly smaller than FedAvg. Evaluated against FedAvg, FedProx, SCAFFOLD, and pFedMe on a non-IID healthcare scenario (8 hospitals, 2 adversarial) and a pathological benchmark (10 clients), PTOPOFL achieves AUC 0.841 and 0.910 respectively-the highest in both settings-while reducing reconstruction risk by a factor of 4.5 relative to gradient sharing. Code is publicly available at https://github.com/MorillaLab/TopoFederatedL and data at https://doi.org/10.5281/zenodo.18827595.", "link": "http://arxiv.org/abs/2603.04323v1", "date": "2026-03-04", "relevancy": 2.4288, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5143}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4782}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4648}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PTOPOFL%3A%20Privacy-Preserving%20Personalised%20Federated%20Learning%20via%20Persistent%20Homology&body=Title%3A%20PTOPOFL%3A%20Privacy-Preserving%20Personalised%20Federated%20Learning%20via%20Persistent%20Homology%0AAuthor%3A%20Kelly%20L%20Vomo-Donfack%20and%20Adryel%20Hoszu%20and%20Gr%C3%A9gory%20Ginot%20and%20Ian%20Morilla%0AAbstract%3A%20Federated%20learning%20%28FL%29%20faces%20two%20structural%20tensions%3A%20gradient%20sharing%20enables%20data-reconstruction%20attacks%2C%20while%20non-IID%20client%20distributions%20degrade%20aggregation%20quality.%20We%20introduce%20PTOPOFL%2C%20a%20framework%20that%20addresses%20both%20challenges%20simultaneously%20by%20replacing%20gradient%20communication%20with%20topological%20descriptors%20derived%20from%20persistent%20homology%20%28PH%29.%20Clients%20transmit%20only%2048-dimensional%20PH%20feature%20vectors-compact%20shape%20summaries%20whose%20many-to-one%20structure%20makes%20inversion%20provably%20ill-posed-rather%20than%20model%20gradients.%20The%20server%20performs%20topology-guided%20personalised%20aggregation%3A%20clients%20are%20clustered%20by%20Wasserstein%20similarity%20between%20their%20PH%20diagrams%2C%20intra-cluster%20models%20are%20topology-weighted%2Cand%20clusters%20are%20blended%20with%20a%20global%20consensus.%20We%20prove%20an%20information-contraction%20theorem%20showing%20that%20PH%20descriptors%20leak%20strictly%20less%20mutual%20information%20per%20sample%20than%20gradients%20under%20strongly%20convex%20loss%20functions%2C%20and%20we%20establish%20linear%20convergence%20of%20the%20Wasserstein-weighted%20aggregation%20scheme%20with%20an%20error%20floor%20strictly%20smaller%20than%20FedAvg.%20Evaluated%20against%20FedAvg%2C%20FedProx%2C%20SCAFFOLD%2C%20and%20pFedMe%20on%20a%20non-IID%20healthcare%20scenario%20%288%20hospitals%2C%202%20adversarial%29%20and%20a%20pathological%20benchmark%20%2810%20clients%29%2C%20PTOPOFL%20achieves%20AUC%200.841%20and%200.910%20respectively-the%20highest%20in%20both%20settings-while%20reducing%20reconstruction%20risk%20by%20a%20factor%20of%204.5%20relative%20to%20gradient%20sharing.%20Code%20is%20publicly%20available%20at%20https%3A//github.com/MorillaLab/TopoFederatedL%20and%20data%20at%20https%3A//doi.org/10.5281/zenodo.18827595.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04323v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPTOPOFL%253A%2520Privacy-Preserving%2520Personalised%2520Federated%2520Learning%2520via%2520Persistent%2520Homology%26entry.906535625%3DKelly%2520L%2520Vomo-Donfack%2520and%2520Adryel%2520Hoszu%2520and%2520Gr%25C3%25A9gory%2520Ginot%2520and%2520Ian%2520Morilla%26entry.1292438233%3DFederated%2520learning%2520%2528FL%2529%2520faces%2520two%2520structural%2520tensions%253A%2520gradient%2520sharing%2520enables%2520data-reconstruction%2520attacks%252C%2520while%2520non-IID%2520client%2520distributions%2520degrade%2520aggregation%2520quality.%2520We%2520introduce%2520PTOPOFL%252C%2520a%2520framework%2520that%2520addresses%2520both%2520challenges%2520simultaneously%2520by%2520replacing%2520gradient%2520communication%2520with%2520topological%2520descriptors%2520derived%2520from%2520persistent%2520homology%2520%2528PH%2529.%2520Clients%2520transmit%2520only%252048-dimensional%2520PH%2520feature%2520vectors-compact%2520shape%2520summaries%2520whose%2520many-to-one%2520structure%2520makes%2520inversion%2520provably%2520ill-posed-rather%2520than%2520model%2520gradients.%2520The%2520server%2520performs%2520topology-guided%2520personalised%2520aggregation%2 {"title": "Human-Object Interaction via Automatically Designed VLM-Guided Motion Policy", "author": "Zekai Deng and Ye Shi and Kaiyang Ji and Lan Xu and Shaoli Huang and Jingya Wang", "abstract": "Human-object interaction (HOI) synthesis is crucial for applications in animation, simulation, and robotics. However, existing approaches either rely on expensive motion capture data or require manual reward engineering, limiting their scalability and generalizability. In this work, we introduce the first unified physics-based HOI framework that leverages Vision-Language Models (VLMs) to enable long-horizon interactions with diverse object types, including static, dynamic, and articulated objects. We introduce VLM-Guided Relative Movement Dynamics (RMD), a fine-grained spatio-temporal bipartite representation that automatically constructs goal states and reward functions for reinforcement learning. By encoding structured relationships between human and object parts, RMD enables VLMs to generate semantically grounded, interaction-aware motion guidance without manual reward tuning. To support our methodology, we present Interplay, a novel dataset with thousands of long-horizon static and dynamic interaction plans. Extensive experiments demonstrate that our framework outperforms existing methods in synthesizing natural, human-like motions across both simple single-task and complex multi-task scenarios. For more details, please refer to our project webpage: https://vlm-rmd.github.io/.", "link": "http://arxiv.org/abs/2503.18349v3", "date": "2026-03-04", "relevancy": 2.4201, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6371}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5839}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "lin {"title": "Dr.Occ: Depth- and Region-Guided 3D Occupancy from Surround-View Cameras for Autonomous Driving", "author": "Xubo Zhu and Haoyang Zhang and Fei He and Rui Wu and Yanhu Shan and Wen Yang and Huai Yu", "abstract": "3D semantic occupancy prediction is crucial for autonomous driving perception, offering comprehensive geometric scene understanding and semantic recognition. However, existing methods struggle with geometric misalignment in view transformation due to the lack of pixel-level accurate depth estimation, and severe spatial class imbalance where semantic categories exhibit strong spatial anisotropy. To address these challenges, we propose \\textbf{Dr.Occ}, a depth- and region-guided occupancy prediction framework. Specifically, we introduce a depth-guided 2D-to-3D View Transformer (D$^2$-VFormer) that effectively leverages high-quality dense depth cues from MoGe-2 to construct reliable geometric priors, thereby enabling precise geometric alignment of voxel features. Moreover, inspired by the Mixture-of-Experts (MoE) framework, we propose a region-guided Expert Transformer (R/R$^2$-EFormer) that adaptively allocates region-specific experts to focus on different spatial regions, effectively addressing spatial semantic variations. Thus, the two components make complementary contributions: depth guidance ensures geometric alignment, while region experts enhance semantic learning. Experiments on the Occ3D--nuScenes benchmark demonstrate that \\textbf{Dr.Occ} improves the strong baseline BEVDet4D by 7.43\\% mIoU and 3.09\\% IoU under the full vision-only setting.", "link": "http://arxiv.org/abs/2603.01007v2", "date": "2026-03-04", "relevancy": 2.417, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6051}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", 2C%20the%20two%20components%20make%20complementary%20contributions%3A%20depth%20guidance%20ensures%20geometric%20alignment%2C%20while%20region%20experts%20enhance%20semantic%20learning.%20Experiments%20on%20the%20Occ3D--nuScenes%20benchmark%20demonstrate%20that%20%5Ctextbf%7BDr.Occ%7D%20improves%20the%20strong%20baseline%20BEVDet4D%20by%207.43%5C%25%20mIoU%20and%203.09%5C%25%20IoU%20under%20the%20full%20vision-only%20setting.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01007v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDr.Occ%253A%2520Depth-%2520and%2520Region-Guided%25203D%2520Occupancy%2520from%2520Surround-View%2520Cameras%2520for%2520Autonomous%2520Driving%26entry.906535625%3DXubo%2520Zhu%2520and%2520Haoyang%2520Zhang%2520and%2520Fei%2520He%2520and%2520Rui%2520Wu%2520and%2520Yanhu%2520Shan%2520and%2520Wen%2520Yang%2520and%2520Huai%2520Yu%26entry.1292438233%3D3D%2520semantic%2520occupancy%2520prediction%2520is%2520crucial%2520for%2520autonomous%2520driving%2520perception%252C%2520offering%2520comprehensive%2520geometric%2520scene%2520understanding%2520and%2520semantic%2520recognition.%2520However%252C%2520existing%2520methods%2520struggle%2520with%2520geometric%2520misalignment%2520in%2520view%2520transformation%2520due%2520to%2520the%2520lack%2520of%2520pixel-level%2520accurate%2520depth%2520estimation%252C%2520and%2520severe%2520spatial%2520class%2520imbalance%2520where%2520semantic%2520categories%2520exhibit%2520strong%2520spatial%2520anisotropy.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520%255Ctextbf%257BDr.Occ%257D%252C%2520a%2520depth-%2520and%2520region-guided%2520occupancy%2520prediction%2520framework.%2520Specifically%252C%2520we%2520introduce%2520a%2520depth-guided%25202D-to-3D%2520View%2520Transformer%2520%2528D%2524%255E2%2524-VFormer%2529%2520that%2520effectively%2520leverages%2520high-quality%2520dense%2520depth%2520cues%2520from%2520M on%2C%20and%20severe%20spatial%20class%20imbalance%20where%20semantic%20categories%20exhibit%20strong%20spatial%20anisotropy.%20To%20address%20these%20challenges%2C%20we%20propose%20%5Ctextbf%7BDr.Occ%7D%2C%20a%20depth-%20and%20region-guided%20occupancy%20prediction%20framework.%20Specifically%2C%20we%20introduce%20a%20depth-guided%202D-to-3D%20View%20Transformer%20%28D%24%5E2%24-VFormer%29%20that%20effectively%20leverages%20high-quality%20dense%20depth%20cues%20from%20MoGe-2%20to%20construct%20reliable%20geometric%20priors%2C%20thereby%20enabling%20precise%20geometric%20alignment%20of%20voxel%20features.%20Moreover%2C%20inspired%20by%20the%20Mixture-of-Experts%20%28MoE%29%20framework%2C%20we%20propose%20a%20region-guided%20Expert%20Transformer%20%28R/R%24%5E2%24-EFormer%29%20that%20adaptively%20allocates%20region-specific%20experts%20to%20focus%20on%20different%20spatial%20regions%2C%20effectively%20addressing%20spatial%20semantic%20variations.%20Thus%2C%20the%20two%20components%20make%20complementary%20contributions%3A%20depth%20guidance%20ensures%20geometric%20alignment%2C%20while%20region%20experts%20enhance%20semantic%20learning.%20Experiments%20on%20the%20Occ3D--nuScenes%20benchmark%20demonstrate%20that%20%5Ctextbf%7BDr.Occ%7D%20improves%20the%20strong%20baseline%20BEVDet4D%20by%207.43%5C%25%20mIoU%20and%203.09%5C%25%20IoU%20under%20the%20full%20vision-only%20setting.&entry.1838667208=http%3A//arxiv.org/abs/2603.01007v2&entry.124074799=Read"},
{"title": "Structural Action Transformer for 3D Dexterous Manipulation", "author": "Xiaohan Lei and Min Wang and Bohong Weng and Wengang Zhou and Houqiang Li", "abstract": "Achieving human-level dexterity in robots via imitation learning from heterogeneous datasets is hindered by the challenge of cross-embodiment skill transfer, particularly for high-DoF robotic hands. Existing methods, often relying on 2D observations and temporal-centric action representation, struggle to capture 3D spatial relations and fail to handle embodiment heterogeneity. This paper proposes the Structural Action Transformer (SAT), a new 3D dexterous manipulation policy that challenges this paradigm by introducing a structural-centric perspective. We reframe each action chunk not as a temporal sequence, but as a variable-length, unordered sequence of joint-wise trajectories. This structural formulation allows a Transformer to natively handle heterogeneous embodiments, treating the joint count as a variable sequence length. To encode structural priors and resolve ambiguity, we introduce an Embodied Joint Codebook that embeds each joint's functional role and kinematic properties. Our model learns to generate these trajectories from 3D point clouds via a continuous-time flow matching objective. We validate our approach by pre-training on large-scale heterogeneous datasets and fine-tuning on simulation and real-world dexterous manipulation tasks. Our method consistently outperforms all baselines, demonstrating superior sample efficiency and effective cross-embodiment skill transfer. This structural-centric representation offers a new path toward scaling policies for high-DoF, heterogeneous manipulators.", "link": "http://arxiv.org/abs/2603.03960v1", "date": "2026-03-04", "relevancy": 2.4152, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6178}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Explora ctive.%20We%20validate%20our%20approach%20by%20pre-training%20on%20large-scale%20heterogeneous%20datasets%20and%20fine-tuning%20on%20simulation%20and%20real-world%20dexterous%20manipulation%20tasks.%20Our%20method%20consistently%20outperforms%20all%20baselines%2C%20demonstrating%20superior%20sample%20efficiency%20and%20effective%20cross-embodiment%20skill%20transfer.%20This%20structural-centric%20representation%20offers%20a%20new%20path%20toward%20scaling%20policies%20for%20high-DoF%2C%20heterogeneous%20manipulators.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03960v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructural%2520Action%2520Transformer%2520for%25203D%2520Dexterous%2520Manipulation%26entry.906535625%3DXiaohan%2520Lei%2520and%2520Min%2520Wang%2520and%2520Bohong%2520Weng%2520and%2520Wengang%2520Zhou%2520and%2520Houqiang%2520Li%26entry.1292438233%3DAchieving%2520human-level%2520dexterity%2520in%2520robots%2520via%2520imitation%2520learning%2520from%2520heterogeneous%2520datasets%2520is%2520hindered%2520by%2520the%2520challenge%2520of%2520cross-embodiment%2520skill%2520transfer%252C%2520particularly%2520for%2520high-DoF%2520robotic%2520hands.%2520Existing%2520methods%252C%2520often%2520relying%2520on%25202D%2520observations%2520and%2520temporal-centric%2520action%2520representation%252C%2520struggle%2520to%2520capture%25203D%2520spatial%2520relations%2520and%2520fail%2520to%2520handle%2520embodiment%2520heterogeneity.%2520This%2520paper%2520proposes%2520the%2520Structural%2520Action%2520Transformer%2520%2528SAT%2529%252C%2520a%2520new%25203D%2520dexterous%2520manipulation%2520policy%2520that%2520challenges%2520this%2520paradigm%2520by%2520introducing%2520a%2520structural-centric%2520perspective.%2520We%2520reframe%2520each%2520action%2520chunk%2520not%2520as%2520a%2520temporal%2520sequence%252C%2520but%2520as%2520a%2520variable-length%252C%2520unordered%2520sequence%2520of {"title": "HE-VPR: Height Estimation Enabled Aerial Visual Place Recognition Against Scale Variance", "author": "Mengfan He and Xingyu Shao and Chunyu Li and Chao Chen and Liangzheng Sun and Ziyang Meng and Yuanqing Wu", "abstract": "In this work, we propose HE-VPR, a visual place recognition (VPR) framework that incorporates height estimation. Our system decouples height inference from place recognition, allowing both modules to share a frozen DINOv2 backbone. Two lightweight bypass adapter branches are integrated into our system. The first estimates the height partition of the query image via retrieval from a compact height database, and the second performs VPR within the corresponding height-specific sub-database. The adaptation design reduces training cost and significantly decreases the search space of the database. We also adopt a center-weighted masking strategy to further enhance the robustness against scale differences. Experiments on two self-collected challenging multi-altitude datasets demonstrate that HE-VPR achieves up to 6.1\\% Recall@1 improvement over state-of-the-art ViT-based baselines and reduces memory usage by up to 90\\%. These results indicate that HE-VPR offers a scalable and efficient solution for height-aware aerial VPR, enabling practical deployment in GNSS-denied environments. All the code and datasets for this work have been released on https://github.com/hmf21/HE-VPR.", "link": "http://arxiv.org/abs/2603.04050v1", "date": "2026-03-04", "relevancy": 2.401, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4844}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4808}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4754}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HE-VPR%3A%20Height%20Estimation%20Enabled%20Aerial%20Visual%20Place%20Recognition%20Against%20Scale%20Variance&body=Title%3A%20HE-VPR%3A%20Height%20Estimation%20Enabled%20Aerial%20Visual%20Place%20Recognition%20Against%20Scale%20Variance%0AAuthor%3A%20Mengfan%20He%20and%20Xingyu%20Shao%20and%20Chunyu%20Li%20and%20Chao%20Chen%20and%20Liangzheng%20Sun%20and%20Ziyang%20Meng%20and%20Yuanqing%20Wu%0AAbstract%3A%20In%20this%20work%2C%20we%20propose%20HE-VPR%2C%20a%20visual%20place%20recognition%20%28VPR%29%20framework%20that%20incorporates%20height%20estimation.%20Our%20system%20decouples%20height%20inference%20from%20place%20recognition%2C%20allowing%20both%20modules%20to%20share%20a%20frozen%20DINOv2%20backbone.%20Two%20lightweight%20bypass%20adapter%20branches%20are%20integrated%20into%20our%20system.%20The%20first%20estimates%20the%20height%20partition%20of%20the%20query%20image%20via%20retrieval%20from%20a%20compact%20height%20database%2C%20and%20the%20second%20performs%20VPR%20within%20the%20corresponding%20height-specific%20sub-database.%20The%20adaptation%20design%20reduces%20training%20cost%20and%20significantly%20decreases%20the%20search%20space%20of%20the%20database.%20We%20also%20adopt%20a%20center-weighted%20masking%20strategy%20to%20further%20enhance%20the%20robustness%20against%20scale%20differences.%20Experiments%20on%20two%20self-collected%20challenging%20multi-altitude%20datasets%20demonstrate%20that%20HE-VPR%20achieves%20up%20to%206.1%5C%25%20Recall%401%20improvement%20over%20state-of-the-art%20ViT-based%20baselines%20and%20reduces%20memory%20usage%20by%20up%20to%2090%5C%25.%20These%20results%20indicate%20that%20HE-VPR%20offers%20a%20scalable%20and%20efficient%20solution%20for%20height-aware%20aerial%20VPR%2C%20enabling%20practical%20deployment%20in%20GNSS-denied%20environments.%20All%20the%20code%20and%20datasets%20for%20this%20work%20have%20been%20released%20on%20https%3A//github.com/hmf21/HE-VPR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04050v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHE-VPR%253A%2520Height%2520Estimation%2520Enabled%2520Aerial%2520Visual%2520Place%2520Recognition%2520Against%2520Scale%2520Variance%26entry.906535625%3DMengfan%2520He%2520and%2520Xingyu%2520Shao%2520and%2520Chunyu%2520Li%2520and%2520Chao%2520Chen%2520and%2520Liangzheng%2520Sun%2520and%2520Ziyang%2520Meng%2520and%2520Yuanqing%2520Wu%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520propose%2520HE-VPR%252C%2520a%2520visual%2520place%2520recognition%2520%2528VPR%2529%2520framework%2520that%2520incorporates%2520height%2520estimation.%2520Our%2520system%2520decouples%2520height%2520inference%2520from%2520place%2520recognition%252C%2520allowing%2520both%2520modules%2520to%2520share%2520a%2520frozen%2520DINOv2%2520backbone.%2520Two%2520lightweight%2520bypass%2520adapter%2520branches%2520are%2520integrated%2520into%2520our%2520system.%2520The%2520first%2520estimates%2520the%2520height%2520partition%2520of%2520the%2520query%2520image%2520via%2520retrieval%2520from%2520a%2520compact%2520height%2520database%252C%2520and%2520the%2520second%2520performs%2520VPR%2520within%2520the%2520corresponding%2520height-specific%2520sub-database.%2520The%2520adaptation%2520design%2520reduces%2520training%2520cost%2520and%2520significantly%2520decreases%2520the%2520search%2520space%2520of%2520the%2520database.%2520We%2520also%2520adopt%2520a%2520center-weighted%2520masking%2520strategy%2520to%2520further%2520enhance%2520the%2520robustness%2520against%2520scale%2520differences.%2520Experiments%2520on%2520two%2520self-collected%2520challenging%2520multi-altitude%2520datasets%2520demonstrate%2520that%2520HE-VPR%2520achieves%2520up%2520to%25206.1%255C%2525%2520Recall%25401%2520improvement%2520over%2520state-of-the-art%2520ViT-based%2520baselines%2520and%2520reduces%2

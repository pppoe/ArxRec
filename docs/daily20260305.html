6535625=Haian%20Jin%20and%20Rundi%20Wu%20and%20Tianyuan%20Zhang%20and%20Ruiqi%20Gao%20and%20Jonathan%20T.%20Barron%20and%20Noah%20Snavely%20and%20Aleksander%20Holynski&entry.1292438233=Feed-forward%20transformer%20models%20have%20driven%20rapid%20progress%20in%203D%20vision%2C%20but%20state-of-the-art%20methods%20such%20as%20VGGT%20and%20%24%CF%80%5E3%24%20have%20a%20computational%20cost%20that%20scales%20quadratically%20with%20the%20number%20of%20input%20images%2C%20making%20them%20inefficient%20when%20applied%20to%20large%20image%20collections.%20Sequential-reconstruction%20approaches%20reduce%20this%20cost%20but%20sacrifice%20reconstruction%20quality.%20We%20introduce%20ZipMap%2C%20a%20stateful%20feed-forward%20model%20that%20achieves%20linear-time%2C%20bidirectional%203D%20reconstruction%20while%20matching%20or%20surpassing%20the%20accuracy%20of%20quadratic-time%20methods.%20ZipMap%20employs%20test-time%20training%20layers%20to%20zip%20an%20entire%20image%20collection%20into%20a%20compact%20hidden%20scene%20state%20in%20a%20single%20forward%20pass%2C%20enabling%20reconstruction%20of%20over%20700%20frames%20in%20under%2010%20seconds%20on%20a%20single%20H100%20GPU%2C%20more%20than%20%2420%5Ctimes%24%20faster%20than%20state-of-the-art%20methods%20such%20as%20VGGT.%20Moreover%2C%20we%20demonstrate%20the%20benefits%20of%20having%20a%20stateful%20representation%20in%20real-time%20scene-state%20querying%20and%20its%20extension%20to%20sequential%20streaming%20reconstruction.&entry.1838667208=http%3A//arxiv.org/abs/2603.04385v1&entry.124074799=Read"},
{"title": "FocusGraph: Graph-Structured Frame Selection for Embodied Long Video Question Answering", "author": "Tatiana Zemskova and Solomon Andryushenko and Ilya Obrubov and Viktoriia Khoruzhaia and Ekaterina Eroshenko and Ekaterina Derevyanka and Dmitry Yudin", "abstract": "The ability to understand long videos is vital for embodied intelligent agents, because their effectiveness depends on how well they can accumulate, organize, and leverage long-horizon perceptual memories. Recently, multimodal LLMs have been gaining popularity for solving the long video understanding task due to their general ability to understand natural language and to leverage world knowledge. However, as the number of frames provided to an MLLM increases, the quality of its responses tends to degrade, and inference time grows. Therefore, when using MLLMs for long video understanding, a crucial step is selecting key frames from the video to answer user queries.\n  In this work, we develop FocusGraph, a framework for keyframe selection for question answering over long egocentric videos. It leverages a lightweight trainable Scene-Caption LLM Selector that selects query-relevant clips based on their graph-based captions, and a training-free method for selecting keyframes from these clips. Unlike existing methods, the proposed Scene-Caption LLM Selector does not rely on the original sequence of low-resolution frames; instead, it operates on a compact textual representation of the scene. We then design a training-free Patch-wise Sparse-Flow Retention (PSFR) method to select keyframes from the resulting sequence of clips, which are fed into an MLLM to produce the final answer. Together, these components enable FocusGraph to achieve state-of-the-art results on challenging egocentric long-video question answering benchmarks, including FindingDory and HourVideo, while significantly reducing inference time relative to baseline approaches.", "link": "http://arxiv.org/abs/2603.04349v1", "date": "2026-03-04", "relevancy": 2.2524, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5684}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5684}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FocusGraph%3A%20Graph-Structured%20Frame%20Selection%20for%20Embodied%20Long%20Video%20Question%20Answering&body=Title%3A%20FocusGraph%3A%20Graph-Structured%20Frame%20Selection%20for%20Embodied%20Long%20Video%20Question%20Answering%0AAuthor%3A%20Tatiana%20Zemskova%20and%20Solomon%20Andryushenko%20and%20Ilya%20Obrubov%20and%20Viktoriia%20Khoruzhaia%20and%20Ekaterina%20Eroshenko%20and%20Ekaterina%20Derevyanka%20and%20Dmitry%20Yudin%0AAbstract%3A%20The%20ability%20to%20understand%20long%20videos%20is%20vital%20for%20embodied%20intelligent%20agents%2C%20because%20their%20effectiveness%20depends%20on%20how%20well%20they%20can%20accumulate%2C%20organize%2C%20and%20leverage%20long-horizon%20perceptual%20memories.%20Recently%2C%20multimodal%20LLMs%20have%20been%20gaining%20popularity%20for%20solving%20the%20long%20video%20understanding%20task%20due%20to%20their%20general%20ability%20to%20understand%20natural%20language%20and%20to%20leverage%20world%20knowledge.%20However%2C%20as%20the%20number%20of%20frames%20provided%20to%20an%20MLLM%20increases%2C%20the%20quality%20of%20its%20responses%20tends%20to%20degrade%2C%20and%20inference%20time%20grows.%20Therefore%2C%20when%20using%20MLLMs%20for%20long%20video%20understanding%2C%20a%20crucial%20step%20is%20selecting%20key%20frames%20from%20the%20video%20to%20answer%20user%20queries.%0A%20%20In%20this%20work%2C%20we%20develop%20FocusGraph%2C%20a%20framework%20for%20keyframe%20selection%20for%20question%20answering%20over%20long%20egocentric%20videos.%20It%20leverages%20a%20lightweight%20trainable%20Scene-Caption%20LLM%20Selector%20that%20selects%20query-relevant%20clips%20based%20on%20their%20graph-based%20captions%2C%20and%20a%20training-free%20method%20for%20selecting%20keyframes%20from%20these%20clips.%20Unlike%20existing%20methods%2C%20the%20proposed%20Scene-Caption%20LLM%20Selector%20does%20not%20rely%20on%20the%20original%20sequence%20of%20low-resolution%20frames%3B%20instead%2C%20it%20operates%20on%20a%20compact%20textual%20representation%20of%20the%20scene.%20We%20then%20design%20a%20training-free%20Patch-wise%20Sparse-Flow%20Retention%20%28PSFR%29%20method%20to%20select%20keyframes%20from%20the%20resulting%20sequence%20of%20clips%2C%20which%20are%20fed%20into%20an%20MLLM%20to%20produce%20the%20final%20answer.%20Together%2C%20these%20components%20enable%20FocusGraph%20to%20achieve%20state-of-the-art%20results%20on%20challenging%20egocentric%20long-video%20question%20answering%20benchmarks%2C%20including%20FindingDory%20and%20HourVideo%2C%20while%20significantly%20reducing%20inference%20time%20relative%20to%20baseline%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04349v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFocusGraph%253A%2520Graph-Structured%2520Frame%2520Selection%2520for%2520Embodied%2520Long%2520Video%2520Question%2520Answering%26entry.906535625%3DTatiana%2520Zemskova%2520and%2520Solomon%2520Andryushenko%2520and%2520Ilya%2520Obrubov%2520and%2520Viktoriia%2520Khoruzhaia%2520and%2520Ekaterina%2520Eroshenko%2520and%2520Ekaterina%2520Derevyanka%2520and%2520Dmitry%2520Yudin%26entry.1292438233%3DThe%2520ability%2520to%2520understand%2520long%2520videos%2520is%2520vital%2520for%2520embodied%2520intelligent%2520agents%252C%2520because%2520their%2520effectiveness%2520depends%2520on%2520how%2520well%2520they%2520can%2520accumulate%252C%2520organize%252C%2520and%2520leverage%2520long-horizon%2520perceptual%2520memories.%2520Recently%252C%2520multimodal%2520LLMs%2520have%2520been%2520gaining%2520popularity%2520for%2520solving%2520the%2520long%2520video%2520understanding%2520task%2520due%2520to%2520their%2520general%2520ability%2520to%2520understand%2520natural%2520language%2520and%2520to%2520leverage%2520world%2520knowledge.%2520However%252C%2520as%2520the%2520number%2520of%2520frames%2520provided%2520to%2520an%2520MLLM%2520increases%252C%2520the%2520quality%2520of%2520its%2520responses%2520tends%2520to%2520degrade%252C%2520and%2520inference%2520time%2520grows.%2520Therefore%252C%2520when%2520using%2520MLLMs%2520for%2520long%2520video%2520understanding%252C%2520a%2520crucial%2520step%2520is%2520selecting%2520key%2520frames%2520from%2520the%2520video%2520to%2520answer%2520user%2520queries.%250A%2520%2520In%2520this%2520work%252C%2520we%2520develop%2520FocusGraph%252C%2520a%2520framework%2520for%2520keyframe%2520selection%2520for%2520question%2520answering%2520over%2520long%2520egocentric%2520videos.%2520It%2520leverages%2520a%2520lightweight%2520trainable%2520Scene-Caption%2520LLM%2520Selector%2520that%2520selects%2520query-relevant%2520clips%2520based%2520on%2520their%2520graph-based%2520captions%252C%2520and%2520a%2520training-free%2520method%2520for%2520selecting%2520keyframes%2520from%2520these%2520clips.%2520Unlike%2520existing%2520methods%252C%2520the%2520proposed%2520Scene-Caption%2520LLM%2520Selector%2520does%2520not%2520rely%2520on%2520the%2520original%2520sequence%2520of%2520low-resolution%2520frames%253B%2520instead%252C%2520it%2520operates%2520on%2520a%2520compact%2520textual%2520representation%2520of%2520the%2520scene.%2520We%2520then%2520design%2520a%2520training-free%2520Patch-wise%2520Sparse-Flow%2520Retention%2520%2528PSFR%2529%2520method%2520to%2520select%2520keyframes%2520from%2520the%2520resulting%2520sequence%2520of%2520clips%252C%2 {"title": "Perception-Aware Time-Optimal Planning for Quadrotor Waypoint Flight", "author": "Chao Qin and Jiaxu Xing and Rudolf Reiter and Angel Romero and Yifan Lin and Hugh H. -T. Liu and Davide Scaramuzza", "abstract": "Agile quadrotor flight pushes the limits of control, actuation, and onboard perception. While time-optimal trajectory planning has been extensively studied, existing approaches typically neglect the tight coupling between vehicle dynamics, environmental geometry, and the visual requirements of onboard state estimation. As a result, trajectories that are dynamically feasible may fail in closed-loop execution due to degraded visual quality. This paper introduces a unified time-optimal trajectory optimization framework for vision-based quadrotors that explicitly incorporates perception constraints alongside full nonlinear dynamics, rotor actuation limits, aerodynamic effects, camera field-of-view constraints, and convex geometric gate representations.\n  The proposed formulation solves minimum-time lap trajectories for arbitrary racetracks with diverse gate shapes and orientations, while remaining numerically robust and computationally efficient. We derive an information-theoretic position uncertainty metric to quantify visual state-estimation quality and integrate it into the planner through three perception objectives: position uncertainty minimization, sequential field-of-view constraints, and look-ahead alignment. This enables systematic exploration of the trade-offs between speed and perceptual reliability.\n  To accurately track the resulting perception-aware trajectories, we develop a model predictive contouring tracking controller that separates lateral and progress errors. Experiments demonstrate real-world flight speeds up to 9.8 m/s with 0.07 m average tracking error, and closed-loop success rates improved from 55% to 100% on a challenging Split-S course. The proposed system provides a scalable benchmark for studying the fundamental limits of perception-aware, time-optimal autonomous flight.", "link": "http://arxiv.org/abs/2603.04305v1", "date": "2026-03-04", "relevancy": 2.2473, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5667}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5586}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perception-Aware%20Time-Optimal%20Planning%20for%20Quadrotor%20Waypoint%20Flight&body=Title%3A%20Perception-Aware%20Time-Optimal%20Planning%20for%20Quadrotor%20Waypoint%20Flight%0AAuthor%3A%20Chao%20Qin%20and%20Jiaxu%20Xing%20and%20Rudolf%20Reiter%20and%20Angel%20Romero%20and%20Yifan%20Lin%20and%20Hugh%20H.%20-T.%20Liu%20and%20Davide%20Scaramuzza%0AAbstract%3A%20Agile%20quadrotor%20flight%20pushes%20the%20limits%20of%20control%2C%20actuation%2C%20and%20onboard%20perception.%20While%20time-optimal%20trajectory%20planning%20has%20been%20extensively%20studied%2C%20existing%20approaches%20typically%20neglect%20the%20tight%20coupling%20between%20vehicle%20dynamics%2C%20environmental%20geometry%2C%20and%20the%20visual%20requirements%20of%20onboard%20state%20estimation.%20As%20a%20result%2C%20trajectories%20that%20are%20dynamically%20feasible%20may%20fail%20in%20closed-loop%20execution%20due%20to%20degraded%20visual%20quality.%20This%20paper%20introduces%20a%20unified%20time-optimal%20trajectory%20optimization%20framework%20for%20vision-based%20quadrotors%20that%20explicitly%20incorporates%20perception%20constraints%20alongside%20full%20nonlinear%20dynamics%2C%20rotor%20actuation%20limits%2C%20aerodynamic%20effects%2C%20camera%2 {"title": "A Geometric Perspective on the Difficulties of Learning GNN-based SAT Solvers", "author": "Geri Skenderi", "abstract": "Graph Neural Networks (GNNs) have gathered increasing interest as learnable solvers of Boolean Satisfiability Problems (SATs), operating on graph representations of logical formulas. However, their performance degrades sharply on harder and more constrained instances, raising questions about architectural limitations. In this paper, we work towards a geometric explanation built upon graph Ricci Curvature (RC). We prove that bipartite graphs derived from random k-SAT formulas are inherently negatively curved, and that this curvature decreases with instance difficulty. Given that negative graph RC indicates local connectivity bottlenecks, we argue that GNN solvers are affected by oversquashing, a phenomenon where long-range dependencies become impossible to compress into fixed-length representations. We validate our claims empirically across different SAT benchmarks and confirm that curvature is both a strong indicator of problem complexity and can be used to predict generalization error. Finally, we connect our findings to the design of existing solvers and outline promising directions for future work.", "link": "http://arxiv.org/abs/2508.21513v2", "date": "2026-03-04", "relevancy": 2.2438, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4584}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4552}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4327}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Geometric%20Perspective%20on%20the%20Difficulties%20of%20Learning%20GNN-based%20SAT%20Solvers&body=Title%3A%20A%20Geometric%20Perspective%20on%20the%20Difficulties%20of%20Learning%20GNN-based%20SAT%20Solvers%0AAuthor%3A%20Geri%20Skenderi%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20have%20gathered%20increasing%20interest%20as%20learnable%20solvers%20of%20Boolean%20Satisfiability%20Problems%20%28SATs%29%2C%20operating%20on%20graph%20representations%20of%20logical%20formulas.%20However%2C%20their%20performance%20degrades%20sharply%20on%20harder%20and%20more%20constrained%20instances%2C%20raising%20questions%20about%20architectural%20limitations.%20In%20this%20paper%2C%20we%20work%20towards%20a%20geometric%20explanation%20built%20upon%20graph%20Ricci%20Curvature%20%28RC%29.%20We%20prove%20that%20bipartite%20graphs%20derived%20from%20random%20k-SAT%20formulas%20are%20inherently%20negatively%20curved%2C%20and%20that%20this%20curvature%20decreases%20with%20instance%20difficulty.%20Given%20that%20negative%20graph%20RC%20indicates%20local%20connectivity%20bottlenecks%2C%20we%20argue%20that%20GNN%20solvers%20are%20affected%20by%20oversquashing%2C%20a%20phenomenon%20where%20long-range%20dependencies%20become%20impossible%20to%20compress%20into%20fixed-length%20representations.%20We%20validate%20our%20claims%20empirically%20across%20different%20SAT%20benchmarks%20and%20confirm%20that%20curvature%20is%20both%20a%20strong%20indicator%20of%20problem%20complexity%20and%20can%20be%20used%20to%20predict%20generalization%20error.%20Finally%2C%20we%20connect%20our%20findings%20to%20the%20design%20of%20existing%20solvers%20and%20outline%20promising%20directions%20for%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2508.21513v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Geometric%2520Perspective%2520on%2520the%2520Difficulties%2520of%2520Learning%2520GNN-based%2520SAT%2520Solvers%26entry.906535625%3DGeri%2520Skenderi%26entry.1292438233%3DGraph%2520Neural%2520Networks%2520%2528GNNs%2529%252 f%20Learning%20GNN-based%20SAT%20Solvers&entry.906535625=Geri%20Skenderi&entry.1292438233=Graph%20Neural%20Networks%20%28GNNs%29%20have%20gathered%20increasing%20interest%20as%20learnable%20solvers%20of%20Boolean%20Satisfiability%20Problems%20%28SATs%29%2C%20operating%20on%20graph%20representations%20of%20logical%20formulas.%20However%2C%20their%20performance%20degrades%20sharply%20on%20harder%20and%20more%20constrained%20instances%2C%20raising%20questions%20about%20architectural%20limitations.%20In%20this%20paper%2C%20we%20work%20towards%20a%20geometric%20explanation%20built%20upon%20graph%20Ricci%20Curvature%20%28RC%29.%20We%20prove%20that%20bipartite%20graphs%20derived%20from%20random%20k-SAT%20formulas%20are%20inherently%20negatively%20curved%2C%20and%20that%20this%20curvature%20decreases%20with%20instance%20difficulty.%20Given%20that%20negative%20graph%20RC%20indicates%20local%20connectivity%20bottlenecks%2C%20we%20argue%20that%20GNN%20solvers%20are%20affected%20by%20oversquashing%2C%20a%20phenomenon%20where%20long-range%20dependencies%20become%20impossible%20to%20compress%20into%20fixed-length%20representations.%20We%20validate%20our%20claims%20empirically%20across%20different%20SAT%20benchmarks%20and%20confirm%20that%20curvature%20is%20both%20a%20strong%20indicator%20of%20problem%20complexity%20and%20can%20be%20used%20to%20predict%20generalization%20error.%20Finally%2C%20we%20connect%20our%20findings%20to%20the%20design%20of%20existing%20solvers%20and%20outline%20promising%20directions%20for%20future%20work.&entry.1838667208=http%3A//arxiv.org/abs/2508.21513v2&entry.124074799=Read"},
{"title": "Learning Hip Exoskeleton Control Policy via Predictive Neuromusculoskeletal Simulation", "author": "Ilseung Park and Changseob Song and Inseung Kang", "abstract": "Developing exoskeleton controllers that generalize across diverse locomotor conditions typically requires extensive motion-capture data and biomechanical labeling, limiting scalability beyond instrumented laboratory settings. Here, we present a physics-based neuromusculoskeletal learning framework that trains a hip-exoskeleton control policy entirely in simulation, without motion-capture demonstrations, and deploys it on hardware via policy distillation. A reinforcement learning teacher policy is trained using a muscle-synergy action prior over a wide range of walking speeds and slopes through a two-stage curriculum, enabling direct comparison between assisted and no-exoskeleton conditions. In simulation, exoskeleton assistance reduces mean muscle activation by up to 3.4% and mean positive joint power by up to 7.0% on level ground and ramp ascent, with benefits increasing systematically with walking speed. On hardware, the assistance profiles learned in simulation are preserved across matched speed-slope conditions (r: 0.82, RMSE: 0.03 Nm/kg), providing quantitative evidence of sim-to-real transfer without additional hardware tuning. These results demonstrate that physics-based neuromusculoskeletal simulation can serve as a practical and scalable foundation for exoskeleton controller development, substantially reducing experimental burden during the design phase.", "link": "http://arxiv.org/abs/2603.04166v1", "date": "2026-03-04", "relevancy": 2.2347, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5898}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5598}, {"title": "Egocentric Compu {"title": "VANGUARD: Vehicle-Anchored Ground Sample Distance Estimation for UAVs in GPS-Denied Environments", "author": "Yifei Chen and Xupeng Chen and Feng Wang and Niangang Jiao and Jiayin Liu", "abstract": "Autonomous aerial robots operating in GPS-denied or communication-degraded environments frequently lose access to camera metadata and telemetry, leaving onboard perception systems unable to recover the absolute metric scale of the scene. As LLM/VLM-based planners are increasingly adopted as high-level agents for embodied systems, their ability to reason about physical dimensions becomes safety-critical -- yet our experiments show that five state-of-the-art VLMs suffer from spatial scale hallucinations, with median area estimation errors exceeding 50%. We propose VANGUARD, a lightweight, deterministic Geometric Perception Skill designed as a callable tool that any LLM-based agent can invoke to recover Ground Sample Distance (GSD) from ubiquitous environmental anchors: small vehicles detected via oriented bounding boxes, whose modal pixel length is robustly estimated through kernel density estimation and converted to GSD using a pre-calibrated reference length. The tool returns both a GSD estimate and a composite confidence score, enabling the calling agent to autonomously decide whether to trust the measurement or fall back to alternative strategies. On the DOTA~v1.5 benchmark, VANGUARD achieves 6.87% median GSD error on 306~images. Integrated with SAM-based segmentation for downstream area measurement, the pipeline yields 19.7% median error on a 100-entry benchmark -- with 2.6x lower category dependence and 4x fewer catastrophic failures than the best VLM baseline -- demonstrating that equipping agents with deterministic geometric tools is essential for safe autonomous spatial reasoning.", "link": "http://arxiv.org/abs/2603.04277v1", "date": "2026-03-04", "relevancy": 2.2345, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.584}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5517}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5361}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VANGUARD%3A%20Vehicle-Anchored%20Ground%20Sample%20Distance%20Estimation%20for%20UAVs%20in%20GPS-Denied%20Environments&body=Title%3A%20VANGUARD%3A%20Vehicle-Anchored%20Ground%20Sample%20Distance%20Estimation%20for%20UAVs%20in%20GPS-Denied%20Environments%0AAuthor%3A%20Yifei%20Chen%20and%20Xupeng%20Chen%20and%20Feng%20Wang%20and%20Niangang%20Jiao%20and%20Jiayin%20Liu%0AAbstract%3A%20Autonomous%20aerial%20robots%20operating%20in%20GPS-denied%20or%20communication-degraded%20environments%20frequently%20lose%20access%20to%20camera%20metadata%20and%20telemetry%2C%20leaving%20onboard%20perception%20systems%20unable%20to%20recover%20the%20absolute%20metric%20scale%20of%20the%20scene.%20As%20LLM/VLM-based%20planners%20are%20increasingly%20adopted%20as%20high-level%20agents%20for%20embodied%20systems%2C%20their%20ability%20to%20reason%20about%20physical%20dimensions%20becomes%20safety-critical%20--%20yet%20our%20experiments%20show%20that%20five%20state-of-the-art%20VLMs%20suffer%20from%20spatial%20scale%20hallucinations%2C%20with%20median%20area%20estimation%20errors%20exceeding%2050%25.%20We%20propose%20VANGUARD%2C%20a%20lightweight%2C%20deterministic%20Geometric%20Perception%20Skill%20designed%20as%20a%20callable%20tool%20that%20any%20LLM-based%20agent%20can%20invoke%20to%20recover%20Ground%20Sample%20Distance%20%28GSD%29%20from%20ubiquitous%20environmental%20anchors%3A%20small%20vehicles%20detected%20via%20oriented%20bounding%20boxes%2C%20whose%20modal%20pixel%20length%20is%20robustly%20estimated%20through%20kernel%20density%20estimation%20and%20converted%20to%20GSD%20using%20a%20pre-calibrated%20reference%20length.%20The%20tool%20returns%20both%20a%20GSD%20estimate%20and%20a%20composite%20confidence%20score%2C%20enabling%20the%20calling%20agent%20to%20autonomously%20decide%20whether%20to%20trust%20the%20measurement%20or%20fall%20back%20to%20alternative%20strategies.%20On%20the%20DOTA~v1.5%20benchmark%2C%20VANGUARD%20achieves%206.87%25%20median%20GSD%20error%20on%20306~images.%20Integrated%20with%20SAM-based%20segmentation%20for%20downstream%20area%20measurement%2C%20the%20pipeline%20yields%2019.7%25%20median%20error%20on%20a%20100-entry%20benchmark%20--%20with%202.6x%20lower%20category%20dependence%20and%204x%20fewer%20catastrophic%20failures%20than%20the%20best%20VLM%20baseline%20--%20demonstrating%20that%20equipping%20agents%20with%20deterministic%20geometric%20tools%20is%20essential%20for%20safe%20autonomous%20spatial%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04277v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVANGUARD%253A%2520Vehicle-Anchored%2520Ground%2520Sample%2520Distance%2520Estimation%2520for%2520UAVs%2520in%2520GPS-Denied%2520Environments%26entry.906535625%3DYifei%2520Chen%2520and%2520Xupeng%2520Chen%2520and%2520Feng%2520Wang%2520and%2520Niangang%2520Jiao%2520and%2520Jiayin%2520Liu%26entry.1292438233%3DAutonomous%2520aerial%2520robots%2520operating%2520in%2520GPS-denied%2520or%2520communication-degraded%2520environments%2520frequently%2520lose%2520access%2520to%2520camera%2520metadata%2520and%2520telemetry%252C%2520leaving%2520onboard%2520perception%2520systems%2520unable%2520to%2520recover%2520the%2520absolute%2520metric%2520scale%2520of%2520the%2520scene.%2520As%2520LLM/VLM-based%2520planners%2520are%2520increasingly%2520adopted%2520as%2520high-level%2520agents%2520for%2520embodied%2520systems%252C%2520their%2520ability%2520to {"title": "Specificity-aware reinforcement learning for fine-grained open-world classification", "author": "Samuele Angheben and Davide Berasi and Alessandro Conti and Elisa Ricci and Yiming Wang", "abstract": "Classifying fine-grained visual concepts under open-world settings, i.e., without a predefined label set, demands models to be both accurate and specific. Recent reasoning Large Multimodal Models (LMMs) exhibit strong visual understanding capability but tend to produce overly generic predictions when performing fine-grained image classification. Our preliminary analysis reveals that models do possess the intrinsic fine-grained domain knowledge. However, promoting more specific predictions (specificity) without compromising correct ones (correctness) remains a non-trivial and understudied challenge. In this work, we investigate how to steer reasoning LMMs toward predictions that are both correct and specific. We propose a novel specificity-aware reinforcement learning framework, SpeciaRL, to fine-tune reasoning LMMs on fine-grained image classification under the open-world setting. SpeciaRL introduces a dynamic, verifier-based reward signal anchored to the best predictions within online rollouts, promoting specificity while respecting the model's capabilities to prevent incorrect predictions. Our out-of-domain experiments show that SpeciaRL delivers the best trade-off between correctness and specificity across extensive fine-grained benchmarks, surpassing existing methods and advancing open-world fine-grained image classification. Code and model are publicly available at https://github.com/s-angheben/SpeciaRL.", "link": "http://arxiv.org/abs/2603.03197v2", "date": "2026-03-04", "relevancy": 2.2303, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", " {"title": "OmniPlanner: Universal Exploration and Inspection Path Planning across Robot Morphologies", "author": "Angelos Zacharia and Mihir Dharmadhikari and Mohit Singh and Kostas Alexis", "abstract": "Autonomous robotic systems are increasingly deployed for mapping, monitoring, and inspection in complex and unstructured environments. However, most existing path planning approaches remain domain-specific (i.e., either on air, land, or sea), limiting their scalability and cross-platform applicability. This article presents OmniPlanner, a unified planning framework for autonomous exploration and inspection across aerial, ground, and underwater robots. The method integrates volumetric exploration and viewpoint-based inspection, alongside target reach behaviors within a single modular architecture, complemented by a platform abstraction layer that captures morphology-specific sensing, traversability and motion constraints. This enables the same planning strategy to generalize across distinct mobility domains with minimal retuning. The framework is validated through extensive simulation studies and field deployments in underground mines, industrial facilities, forests, submarine bunkers, and structured outdoor environments. Across these diverse scenarios, OmniPlanner demonstrates robust performance, consistent cross-domain generalization, and improved exploration and inspection efficiency compared to representative state-of-the-art baselines.", "link": "http://arxiv.org/abs/2603.04284v1", "date": "2026-03-04", "relevancy": 2.2239, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5831}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.554}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": d%20exploration%20and%20inspection%20efficiency%20compared%20to%20representative%20state-of-the-art%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04284v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniPlanner%253A%2520Universal%2520Exploration%2520and%2520Inspection%2520Path%2520Planning%2520across%2520Robot%2520Morphologies%26entry.906535625%3DAngelos%2520Zacharia%2520and%2520Mihir%2520Dharmadhikari%2520and%2520Mohit%2520Singh%2520and%2520Kostas%2520Alexis%26entry.1292438233%3DAutonomous%2520robotic%2520systems%2520are%2520increasingly%2520deployed%2520for%2520mapping%252C%2520monitoring%252C%2520and%2520inspection%2520in%2520complex%2520and%2520unstructured%2520environments.%2520However%252C%2520most%2520existing%2520path%2520planning%2520approaches%2520remain%2520domain-specific%2520%2528i.e.%252C%2520either%2520on%2520air%252C%2520land%252C%2520or%2520sea%2529%252C%2520limiting%2520their%2520scalability%2520and%2520cross-platform%2520applicability.%2520This%2520article%2520presents%2520OmniPlanner%252C%2520a%2520unified%2520planning%2520framework%2520for%2520autonomous%2520exploration%2520and%2520inspection%2520across%2520aerial%252C%2520ground%252C%2520and%2520underwater%2520robots.%2520The%2520method%2520integrates%2520volumetric%2520exploration%2520and%2520viewpoint-based%2520inspection%252C%2520alongside%2520target%2520reach%2520behaviors%2520within%2520a%2520single%2520modular%2520architecture%252C%2520complemented%2520by%2520a%2520platform%2520abstraction%2520layer%2520that%2520captures%2520morphology-specific%2520sensing%252C%2520traversability%2520and%2520motion%2520constraints.%2520This%2520enables%2520the%2520same%2520planning%2520strategy%2520to%2520generalize%2520across%2520distinct%2520mobility%2520domains%2520with%2520minimal%2520retuning.%2520The%2520framework%2520is%2520validated%2520through%2520extensive%2520simulation%2520studies%2520and%2520field {"title": "Towards Generalized Multimodal Homography Estimation", "author": "Jinkun You and Jiaxin Cheng and Jie Zhang and Yicong Zhou", "abstract": "Supervised and unsupervised homography estimation methods depend on image pairs tailored to specific modalities to achieve high accuracy. However, their performance deteriorates substantially when applied to unseen modalities. To address this issue, we propose a training data synthesis method that generates unaligned image pairs with ground-truth offsets from a single input image. Our approach renders the image pairs with diverse textures and colors while preserving their structural information. These synthetic data empower the trained model to achieve greater robustness and improved generalization across various domains. Additionally, we design a network to fully leverage cross-scale information and decouple color information from feature representations, thus improving estimation accuracy. Extensive experiments show that our training data synthesis method improves generalization performance. The results also confirm the effectiveness of the proposed network.", "link": "http://arxiv.org/abs/2603.03956v1", "date": "2026-03-04", "relevancy": 2.2196, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.568}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5463}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5452}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Generalized%20Multimodal%20Homography%20Estimation&body=Title%3A%20Towards%20Generalized%20Multimodal%20Homography%20Estimation%0AAuthor%3A%20Jinkun%20You%20and%20Jiaxin%20Cheng%20and%20Jie%20Zhang%20and%20Yicong% {"title": "Fast Equivariant Imaging: Acceleration for Unsupervised Learning via Augmented Lagrangian and Auxiliary PnP Denoisers", "author": "Guixian Xu and Jinglai Li and Junqi Tang", "abstract": "In this work, we propose Fast Equivariant Imaging (FEI), a novel unsupervised learning framework to rapidly and efficiently train deep imaging networks without ground-truth data. From the perspective of reformulating the Equivariant Imaging based optimization problem via the method of Lagrange multipliers and utilizing plug-and-play denoisers, this novel unsupervised scheme shows superior efficiency and performance compared to the vanilla Equivariant Imaging paradigm. In particular, our FEI schemes achieve an order-of-magnitude (10x) acceleration over standard EI on training U-Net for X-ray CT reconstruction and image inpainting, with improved generalization performance. In addition, the proposed scheme enables efficient test-time adaptation of a pretrained model to individual samples to secure further performance improvements. Extensive experiments show that the proposed approach provides a noticeable efficiency and performance gain over existing unsupervised methods and model adaptation techniques.", "link": "http://arxiv.org/abs/2507.06764v4", "date": "2026-03-04", "relevancy": 2.2195, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.56}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5581}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5496}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fast%20Equivariant%20Imaging%3A%20Acceleration%20for%20Unsupervised%20Learning%20via%20Augmented%20Lagrangian%20and%20Auxiliary%20PnP%20Denoisers&body=Title%3A%20Fast%20Equivariant%20Imaging%3A%20Acceleration%20for%20Unsupervised%20Learning%20via%20Augmented%20Lagrangian%20and%20Auxiliary%20PnP%20Denoisers%0AAuthor%3A%20Guixian%20Xu%20and%20Jinglai%20Li%20and%20Junqi%20Tang%0AAbstract%3A%20In%20this%20work%2C%20we%20propose%20Fast%20Equivariant%20Imaging%20%28FEI%29%2C%20a%20novel%20unsupervised%20learning%20framework%20to%20rapidly%20and%20efficiently%20train%20deep%20imaging%20networks%20without%20ground-truth%20data.%20From%20the%20perspective%20of%20reformulating%20the%20Equivariant%20Imaging%20based%20optimization%20problem%20via%20the%20method%20of%20Lagrange%20multipliers%20and%20utilizing%20plug-and-play%20denoisers%2C%20this%20novel%20unsupervised%20scheme%20shows%20superior%20efficiency%20and%20performance%20compared%20to%20the%20vanilla%20Equivariant%20Imaging%20paradigm.%20In%20particular%2C%20our%20FEI%20schemes%20achieve%20an%20order-of-magnitude%20%2810x%29%20acceleration%20over%20standard%20EI%20on%20training%20U-Net%20for%20X-ray%20CT%20reconstruction%20and%20image%20inpainting%2C%20with%20improved%20generalization%20performance.%20In%20addition%2C%20the%20proposed%20scheme%20enables%20efficient%20test-time%20adaptation%20of%20a%20pretrained%20model%20to%20individual%20samples%20to%20secure%20further%20performance%20improvements.%20Extensive%20experiments%20show%20that%20the%20proposed%20approach%20provides%20a%20noticeable%20efficiency%20and%20performance%20gain%20over%20existing%20unsupervised%20methods%20and%20model%20adaptation%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2507.06764v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFast%2520Equivariant%2520Imaging%253A%2520Acceleration%2520for%2520Unsupervised%2520Learning%2520via%2520Augmented%2520Lagrangian%2520and%2520Auxiliary%2520PnP%2520Denoisers%26entry.906535625%3DGuixian%2520Xu%2520and%2520Jinglai%2520Li%2520and%252 {"title": "Dual-Modality Multi-Stage Adversarial Safety Training: Robustifying Multimodal Web Agents Against Cross-Modal Attacks", "author": "Haoyu Liu and Dingcheng Li and Lukas Rutishauser and Zeyu Zheng", "abstract": "Multimodal web agents that process both screenshots and accessibility trees are increasingly deployed to interact with web interfaces, yet their dual-stream architecture opens an underexplored attack surface: an adversary who injects content into the webpage DOM simultaneously corrupts both observation channels with a consistent deceptive narrative. Our vulnerability analysis on MiniWob++ reveals that attacks including a visual component far outperform text-only injections, exposing critical gaps in text-centric VLM safety training. Motivated by this finding, we propose Dual-Modality Multi-Stage Adversarial Safety Training (DMAST), a framework that formalizes the agent-attacker interaction as a two-player zero-sum Markov game and co-trains both players through a three-stage pipeline: (1) imitation learning from a strong teacher model, (2) oracle-guided supervised fine-tuning that uses a novel zero-acknowledgment strategy to instill task-focused reasoning under adversarial noise, and (3) adversarial reinforcement learning via Group Relative Policy Optimization (GRPO) self-play. On out-of-distribution tasks, DMAST substantially mitigates adversarial risks while simultaneously doubling task completion efficiency. Our approach significantly outperforms established training-based and prompt-based defenses, demonstrating genuine co-evolutionary progress and robust generalization to complex, unseen environments.", "link": "http://arxiv.org/abs/2603.04364v1", "date": "2026-03-04", "relevancy": 2.2182, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5734}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5436}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5349}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dual-Modality%20Multi-Stage%20Adversarial%20Safety%20Training%3A%20Robustifying%20Multimodal%20Web%20Agents%20Against%20Cross-Modal%20Attacks&body=Title%3A%20Dual-Modality%20Multi-Stage%20Adversarial%20Safety%20Training%3A%20Robustifying%20Multimodal%20Web%20Agents%20Against%20Cross-Modal%20Attacks%0AAuthor%3A%20Haoyu%20Liu%20and%20Dingcheng%20Li%20and%20Lukas%20Rutishauser%20and%20Zeyu%20Zheng%0AAbstract%3A%20Multimodal%20web%20agents%20that%20process%20both%20screenshots%20and%20accessibility%20trees%20are%20increasingly%20deployed%20to%20interact%20with%20web%20interfaces%2C%20yet%20their%20dual-stream%20architecture%20opens%20an%20underexplored%20attack%20surface%3A%20an%20adversary%20who%20injects%20content%20into%20the%20webpage%20DOM%20simultaneously%20corrupts%20both%20observation%20channels%20with%20a%20consistent%20deceptive%20narrative.%20Our%20vulnerability%20analysis%20on%20MiniWob%2B%2B%20reveals%20that%20attacks%20including%20a%20visual%20component%20far%20outperform%20text-only%20injections%2C%20exposing%20critical%20gaps%20in%20text-centric%20VLM%20safety%20training.%20Motivated%20by%20this%20finding%2C%20we%20propose%20Dual-Modality%20Multi-Stage%20Adversarial%20Safety%20Training%20%28DMAST%29%2C%20a%20framework%20that%20formalizes%20the%20agent-attacker%20interaction%20as%20a%20two-player%20zero-sum%20Markov%20game%20and%20co-trains%20both%20players%20through%20a%20three-stage%20pipeline%3A%20%281%29%20imitation%20learning%20from%20a%20strong%20teacher%20model%2C%20%282%29%20oracle-guided%20supervised%20fine-tuning%20that%20uses%20a%20novel%20zero-acknowledgment%20strategy%20to%20instill%20task-focused%20reasoning%20under%20adversarial%20noise%2C%20and%20%283%29%20adversarial%20reinforcement%20learning%20via%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20self-play.%20On%20out-of-distribution%20tasks%2C%20DMAST%20substantially%20mitigates%20adversarial%20risks%20while%20simultaneously%20doubling%20task%20completion%20efficiency.%20Our%20approach%20significantly%20outperforms%20established%20training-based%20and%20prompt-based%20defenses%2C%20demonstrating%20genuine%20co-evolutionary%20progress%20and%20robust%20generalization%20to%20complex%2C%20unseen%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04364v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDual-Modality%2520Multi-Stage%2520Adversarial%2520Safety%2520Training%253A%2520Robustifying%2520Multimodal%2520Web%2520Agents%2520Against%2520Cross-Modal%2520Attacks%26entry.906535625%3DHaoyu%2520Liu%2520and%2520Dingcheng%2520Li%2520and%2520Lukas%2520Rutishauser%2520and%2520Zeyu%2520Zheng%26entry.1292438233%3DMultimodal%2520web%2520agents%2520that%2520process%2520both%2520screenshots%2520and%2520accessibility%2520trees%2520are%2520increasingly%2520deployed%2520to%2520interact%2520with%2520web%2520interfaces%252C%2520yet%2520their%2520dual-stream%2520architecture%2520opens%2520an%2520underexplored%2520attack%2520surface%253A%2520an%2520adversary%2520who%2520injects%2520content%2520into%2520the%2520webpage%2520DOM%2520simultaneously%2520corrupts%2520both%2520observation%2520channels%2520with%2520a%2520consistent%2520deceptive%2520narrative.%2520Our%2520vulnerability%2520analysis%2520on%2520MiniWob%252B%252B%2520reveals%2520that%2520attacks%2520including%2520a%2520visual%2520component%2520far%2520outperform%2520text-only%2520injections%252C%2520exposing%2520critical%2520gaps%2520in%2520text-centric%2520VLM%2520safety%2520training.%2520Motivated%2520by%2520this%2520finding%252C%2520we%2520propose%2520Dual-Modality%2520Multi-Stage%2520Adversarial%2520Safety%2520Training {"title": "LaViRA: Language-Vision-Robot Actions Translation for Zero-Shot Vision Language Navigation in Continuous Environments", "author": "Hongyu Ding and Ziming Xu and Yudong Fang and You Wu and Zixuan Chen and Jieqi Shi and Jing Huo and Yifan Zhang and Yang Gao", "abstract": "LaViRA: Zero-shot Vision-and-Language Navigation in Continuous Environments (VLN-CE) requires an agent to navigate unseen environments based on natural language instructions without any prior training. Current methods face a critical trade-off: either rely on environment-specific waypoint predictors that limit scene generalization, or underutilize the reasoning capabilities of large models during navigation. We introduce LaViRA, a simple yet effective zero-shot framework that addresses this dilemma by decomposing action into a coarse-to-fine hierarchy: Language Action for high-level planning, Vision Action for middle-level perceptual grounding, and Robot Action for low-level control. This modular decomposition allows us to leverage the distinct strengths of different scales of Multimodal Large Language Models (MLLMs) at each stage, creating a system that is powerful in its reasoning, grounding and practical control. LaViRA significantly outperforms existing state-of-the-art methods on the VLN-CE benchmark, demonstrating superior generalization capabilities in unseen environments, while maintaining transparency and efficiency for real-world deployment. Project page: https://robo-lavira.github.io/lavira-zs-vln/", "link": "http://arxiv.org/abs/2510.19655v2", "date": "2026-03-04", "relevancy": 2.215, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5599}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5525}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5525}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LaViRA%3A%20Language-Vision-Robot%20Actions%20Translation%20for%20Zero-Shot%20Vision%20Language%20Navigation%20in%20Continuous%20Environments&body=Title%3A%20LaViRA%3A%20Language-Vision-Robot%20Actions%20Translation%20for%20Zero-Shot%20Vision%20Language%20Navigation%20in%20Continuous%20Environments%0AAuthor%3A%20Hongyu%20Ding%20and%20Ziming%20Xu%20and%20Yudong%20Fang%20and%20You%20Wu%20and%20Zixuan%20Chen%20and%20Jieqi%20Shi%20and%20Jing%20Huo%20and%20Yifan%20Zhang%20and%20Yang%20Gao%0AAbstract%3A%20LaViRA%3A%20Zero-shot%20Vision-and-Language%20Navigation%20in%20Continuous%20Environments%20%28VLN-CE%29%20requires%20an%20agent%20to%20navigate%20unseen%20environments%20based%20on%20natural%20language%20instructions%20without%20any%20prior%20training.%20Current%20methods%20face%20a%20critical%20trade-off%3A%20either%20rely%20on%20environment-specific%20waypoint%20predictors%20that%20limit%20scene%20generalization%2C%20or%20underutilize%20the%20reasoning%20capabilities%20of%20large%20models%20during%20navigation.%20We%20introduce%20LaViRA%2C%20a%20simple%20yet%20effective%20zero-shot%20framework%20that%20addresses%20this%20dilemma%20by%20decomposing%20action%20into%20a%20coarse-to-fine%20hierarchy%3A%20Language%20Action%20for%20high-level%20planning%2C%20Vision%20Action%20for%20middle-level%20perceptual%20grounding%2C%20and%20Robot%20Action%20for%20low-level%20control.%20This%20modular%20decomposition%20allows%20us%20to%20leverage%20the%20distinct%20strengths%20of%20different%20scales%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20at%20each%20stage%2C%20creating%20a%20system%20that%20is%20powerful%20in%20its%20reasoning%2C%20grounding%20and%20practical%20control.%20LaViRA%20significantly%20outperforms%20existing%20state-of-the-art%20methods%20on%20the%20VLN-CE%20benchmark%2C%20demonstrating%20superior%20generalization%20capabilities%20in%20unseen%20environments%2C%20while%20maintaining%20transparency%20and%20efficiency%20for%20real-world%20deployment.%20Project%20page%3A%20https%3A//robo-lavira.github.io/lavira-zs-vln/%0ALink%3A%20http%3A//arxiv.org/abs/2510.19655v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLaViRA%253A%2520Language-Vision-Robot%2520Actions%2520Translation%2520for%2520Zero-Shot%2520Vision%2520Language%2520Navigation%2520in%2520Continuous%2520Environments%26entry.906535625%3DHongyu%2520Ding%2520and%2520Ziming%2520Xu%2520and%2520Yudong%2520Fang%2520and%2520You%2520Wu%2520and%2520Zixuan%2520Chen%2520and%2520Jieqi%2520Shi%2520and%2520Jing%2520Huo%2520and%2520Yifan%2520Zhang%2520and%2520Yang%2520Gao%26entry.1292438233%3DLaViRA%253A%2520Zero-shot%2520Vision-and-Language%2520Navigation%2520in%2520Continuous%2520Environments%2520%2528VLN-CE%2529%2520requires%2520an%2520agent%2520to%2520navigate%2520unseen%2520environments%2520based%2520on%2520natural%2520language%2520instructions%2520without%2520any%2520prior%2520training.%2520Current%2520methods%2520face%2520a%2520critical%2520trade-off%253A%2520either%2520rely%2520on%2520environment-specific%2520waypoint%2520predictors%2520that%2520limit%2520scene%2520generalization%252C%2520or%2520underutilize%2520the%2520reasoning%2520capabilities%2520of%2520large%2520models%2520during%2520navigation.%2520We%2520introduce%2520LaViRA%252C%2520a%2520simple%2520yet%2520effective%2520zero-shot%2520framework%2520that%2520addresses%2520this%2520dilemma%2520by%2520decomposing%2520action%2520into%2520a%2520coarse-to-fine%2520hierarchy%253A%2520Language%2520Action%2520for%2520high-level%2520planning%252C%2520Vision%2520Action%2520for%2520middle-level%2520perceptual%2520grounding%252C%2520and%2520Robot%2520Action%2520for%2520low-level%2520control.%2520This%2520modular%2520decomposition%2520allows%2520us%2520to%2520leverage%2520the%2520distinct%2520strengths%2520of%2520different%2520scales%2520of%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520at%2520each%2520stage%252C%2520creating%2520a%2520system%2520that%2520is%2520powerful%2520in%2520its%2520reasoning%252C%2520grounding%2520and%2520practical%2520control.%2520LaViRA%2520significantly%2520outperforms%2520existing%2520state-of-the-art%2520methods%2520on%2520the%2520VLN-CE%2520benchmark%252C%2520demonstrating%2520superior%2520generalization%2520capabilities%2520in%2520unseen%2520environments%252C%2520while%2520maintaining%2520transparency%2520and%2520efficiency%2520for%2520real-world%2520deployment.%2520Project%2520page%253A%2520https%253A//robo-lavira.github.io/lavira-zs-vln/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.19655v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LaViRA%3A%20Language-Vision-Robot%20Actions%20Translation%20for%20Zero-Shot%20Vision%20Language%20Navigation%20in%20Continuous%20Environments&entry.906535625=Hongyu%20Ding%20and%20Ziming%20Xu%20and%20Yudong%20Fang%20and%20You%20Wu%20and%20Zixuan%20Chen%20and%20Jieqi%20Shi%20and%20Jing%20Huo%20and%20Yifan%20Zhang%20and%20Yang%20Gao&entry.1292438233=LaViRA%3A%20Zero-shot%20Vision-and-Language%20Navigation%20in%20Continuous%20Environments%20%28VLN-CE%29%20requires%20an%20agent%20to%20navigate%20unseen%20environments%20based%20on%20natural%20language%20instructions%20without%20any%20prior%20training.%20Current%20methods%20face%20a%20critical%20trade-off%3A%20either%20rely%20on%20environment-specific%20waypoint%20predictors%20that%20limit%20scene%20generalization%2C%20or%20underutilize%20the%20reasoning%20capabilities%20of%20large%20models%20during%20navigation.%20We%20introduce%20LaViRA%2C%20a%20simple%20yet%20effective%20zero-shot%20framework%20that%20addresses%20this%20dilemma%20by%20decomposing%20action%20into%20a%20co {"title": "Dynamic Adversarial Reinforcement Learning for Robust Multimodal Large Language Models", "author": "Yicheng Bao and Xuhong Wang and Qiaosheng Zhang and Chaochao Lu and Xia Hu and Xin Tan", "abstract": "Despite their impressive capabilities, Multimodal Large Language Models (MLLMs) exhibit perceptual fragility when confronted with visually complex scenes. This weakness stems from a reliance on finite training datasets, which are prohibitively expensive to scale and impose a ceiling on model robustness. We introduce \\textbf{AOT-SFT}, a large-scale adversarial dataset for bootstrapping MLLM robustness. Building on this, we propose \\textbf{AOT (Adversarial Opponent Training)}, a self-play framework that forges MLLM robustness by creating its own training data. Our method orchestrates a co-evolution between an image-editing Attacker and a Defender MLLM, where the Attacker generates a diverse and dynamic curriculum of image manipulations, forcing the Defender to adapt and improve. Extensive experiments demonstrate that AOT enhances the Defender's perceptual robustness and reduces hallucinations, establishing a scalable paradigm for training more reliable MLLMs.", "link": "http://arxiv.org/abs/2602.22227v3", "date": "2026-03-04", "relevancy": 2.2082, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5765}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5397}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5217}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dynamic%20Adversarial%20Reinforcement%20Learning%20for%20Robust%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Dynamic%20Adversarial%20Reinforcement%20Learning%20for%20Robust%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Yicheng%20Bao%20and%20Xuhong%20Wang%20and%20Qiaosheng%20Zhang%20and%20Chaochao%20Lu%20and%20Xia%20Hu%20and%20Xin%20Tan%0AAbstract%3A%20Despite%20their%20impressive%20capabilities%2C%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20exhibit%20perceptual%20fragility%20when%20confronted%20with%20visually%20complex%20scenes.%20This%20weakness%20stems%20from%20a%20reliance%20on%20finite%20training%20datasets%2C%20which%20are%20prohibitively%20expensive%20to%20scale%20and%20impose%20a%20ceiling%20on%20model%20robustness.%20We%20introduce%20%5Ctextbf%7BAOT-SFT%7D%2C%20a%20large-scale%20adversarial%20dataset%20for%20bootstrapping%20MLLM%20robustness.%20Building%20on%20this%2C%20we%20propose%20%5Ctextbf%7BAOT%20%28Adversarial%20Opponent%20Training%29%7D%2C%20a%20self-play%20framework%20that%20forges%20MLLM%20robustness%20by%20creating%20its%20own%20training%20data.%20Our%20method%20orchestrates%20a%20co-evolution%20between%20an%20image-editing%20Attacker%20and%20a%20Defender%20MLLM%2C%20where%20the%20Attacker%20generates%20a%20diverse%20and%20dynamic%20curriculum%20of%20image%20manipulations%2C%20forcing%20the%20Defender%20to%20adapt%20and%20improve.%20Extensive%20experiments%20demonstrate%20that%20AOT%20enhances%20the%20Defender%27s%20perceptual%20robustness%20and%20reduces%20hallucinations%2C%20establishing%20a%20scalable%20paradigm%20for%20training%20more%20reliable%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22227v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDynamic%2520Adversarial%2520Reinforcement%2520Learning%2520for%2520Robust%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DYicheng%2520Bao%2520and%2520Xuhong%2520Wang%2520and%2520Qiaosheng%2520Zhang%2520and%2520Chaochao%2520Lu%2520and%2520Xia%2520Hu%2520and%2520Xin%2520Tan%26entry.1292438233%3DDespite%2520their%252 233=Despite%20their%20impressive%20capabilities%2C%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20exhibit%20perceptual%20fragility%20when%20confronted%20with%20visually%20complex%20scenes.%20This%20weakness%20stems%20from%20a%20reliance%20on%20finite%20training%20datasets%2C%20which%20are%20prohibitively%20expensive%20to%20scale%20and%20impose%20a%20ceiling%20on%20model%20robustness.%20We%20introduce%20%5Ctextbf%7BAOT-SFT%7D%2C%20a%20large-scale%20adversarial%20dataset%20for%20bootstrapping%20MLLM%20robustness.%20Building%20on%20this%2C%20we%20propose%20%5Ctextbf%7BAOT%20%28Adversarial%20Opponent%20Training%29%7D%2C%20a%20self-play%20framework%20that%20forges%20MLLM%20robustness%20by%20creating%20its%20own%20training%20data.%20Our%20method%20orchestrates%20a%20co-evolution%20between%20an%20image-editing%20Attacker%20and%20a%20Defender%20MLLM%2C%20where%20the%20Attacker%20generates%20a%20diverse%20and%20dynamic%20curriculum%20of%20image%20manipulations%2C%20forcing%20the%20Defender%20to%20adapt%20and%20improve.%20Extensive%20experiments%20demonstrate%20that%20AOT%20enhances%20the%20Defender%27s%20perceptual%20robustness%20and%20reduces%20hallucinations%2C%20establishing%20a%20scalable%20paradigm%20for%20training%20more%20reliable%20MLLMs.&entry.1838667208=http%3A//arxiv.org/abs/2602.22227v3&entry.124074799=Read"},
{"title": "Training High-Level Schedulers with Execution-Feedback Reinforcement Learning for Long-Horizon GUI Automation", "author": "Zehao Deng and Tianjie Ju and Zheng Wu and Zhuosheng Zhang and Gongshen Liu", "abstract": "The rapid development of large vision-language model (VLM) has greatly promoted the research of GUI agent. However, GUI agents still face significant challenges in handling long-horizon tasks. First, single-agent models struggle to balance high-level capabilities and low-level execution capability, facing prevalent issues of responsibility coupling and capability conflicts. Second, agents lack awareness of the task state, leading to progress loss in long-horizon tasks. To address these challenges, we propose a staged execution-feedback reinforcement learning algorithm. Unlike training a unified policy model, we focus on training high-level scheduling models. Specifically, we propose and train two agents: a Coordinator, responsible for the strategic planning and task decomposition; and a State Tracker, responsible for context compression and information management to maintain the task's state and coherence. Based on this, we built the Coordinator-Executor-State Tracker (CES) multi-agent framework, which can be integrated with any low-level Executor model, assisting the Executor in solving long-horizon tasks through task scheduling and state management. Experiments on long-horizon task benchmarks demonstrate that CES significantly enhances the system's planning and state management capabilities. Furthermore, analysis confirms that our trained high-level scheduling module is a generalizable, plug-and-play module that significantly enhances the long-horizon capabilities of various Executors. Code can be available at https://github.com/hehehahi4/CES.", "link": "http://arxiv.org/abs/2511.22235v2", "date": "2026-03-04", "relevancy": 2.208, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.6164}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5335}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.495}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training%20High-Level%20Schedulers%20with%20Execution-Feedback%20Reinforcement%20Learning%20for%20Long-Horizon%20GUI%20Automation&body=Title%3A%20Training%20High-Level%20Schedulers%20with%20Execution-Feedback%20Reinforcement%20Learning%20for%20Long-Horizon%20GUI%20Automation%0AAuthor%3A%20Zehao%20Deng%20and%20Tianjie%20Ju%20and%20Zheng%20Wu%20and%20Zhuosheng%20Zhang%20and%20Gongshen%20Liu%0AAbstract%3A%20The%20rapid%20development%20of%20large%20vision-language%20model%20%28VLM%29%20has%20greatly%20promoted%20the%20research%20of%20GUI%20agent.%20However%2C%20GUI%20agents%20still%20face%20significant%20challenges%20in%20handling%20long-horizon%20tasks.%20First%2C%20single-agent%20models%20struggle%20to%20balance%20high-level%20capabilities%20and%20low-level%20execution%20capability%2C%20facing%20prevalent%20issues%20of%20responsibility%20coupling%20and%20capability%20conflicts.%20Second%2C%20agents%20lack%20awareness%20of%20the%20task%20state%2C%20leading%20to%20progress%20loss%20in%20long-horizon%20tasks.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20staged%20execution-feedback%20reinforcement%20learning%20algorithm.%20Unlike%20training%20a%20unified%20policy%20model%2C%20we%20focus%20on%20training%20high-level%20scheduling%20models.%20Specifically%2C%20we%20propose%20and%20train%20two%20agents%3A%20a%20Coordinator%2C%20responsible%20for%20the%20strategic%20planning%20and%20task%20decomposition%3B%20and%20a%20State%20Tracker%2C%20responsible%20for%20context%20compression%20and%20information%20management%20to%20maintain%20the%20task%27s%20state%20and%20coherence.%20Based%20on%20this%2C%20we%20built%20the%20Coordinator-Executor-State%20Tracker%20%28CES%29%20multi-agent%20framework%2C%20which%20can%20be%20integrated%20with%20any%20low-level%20Executor%20model%2C%20assisting%20the%20Executor%20in%20solving%20long-horizon%20tasks%20through%20task%20scheduling%20and%20state%20management.%20Experiments%20on%20long-horizon%20task%20benchmarks%20demonstrate%20that%20CES%20significantly%20enhances%20the%20system%27s%20planning%20and%20state%20management%20capabilities.%20Furthermore%2C%20analysis%20confirms%20that%20our%20trained%20high-level%20scheduling%20module%20is%20a%20generalizable%2C%20plug-and-play%20module%20that%20significantly%20enhances%20the%20long-horizon%20capabilities%20of%20various%20Executors.%20Code%20can%20be%20available%20at%20https%3A//github.com/hehehahi4/CES.%0ALink%3A%20http%3A//arxiv.org/abs/2511.22235v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraining%2520High-Level%2520Schedulers%2520with%2520Execution-Feedback%2520Reinforcement%2520Learning%2520for%2520Long-Horizon%2520GUI%2520Automation%26entry.906535625%3DZehao%2520Deng%2520and%2520Tianjie%2520Ju%2520and%2520Zheng%2520Wu%2520and%2520Zhuosheng%2520Zhang%2520and%2520Gongshen%2520Liu%26entry.1292438233%3DThe%2520rapid%2520development%2520of%2520large%2520vision-language%2520model%2520%2528VLM%2529%2520has%2520greatly%2520promoted%2520the%2520research%2520of%2520GUI%2520agent.%2520However%252C%2520GUI%2520agents%2520still%2520face%2520significant%2520challenges%2520in%2520handling%2520long-horizon%2520tasks.%2520First%252C%2520single-agent%2520models%2520struggle%2520to%2520balance%2520high-level%2520capabilities%2520and%2520low-level%2520execution%2520capability%252C%2520facing%2520prevalent%2520issues%2520of%2520responsibility%2520coupling%2520and%2520capability%2520conflicts.%2520Second%252C%2520agents%2520lack%2520awareness%2520of%2520the%2520task%2520state%252C%2520leading%2520to%2520progress%2520loss%2520in%2520long-horizon%2520tasks.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520staged%2520execution-feedback%2520reinforcement%2520learning%2520algorithm.%2520Unlike%2520training%2520a%2520unified%2520policy%2520model%252C%2520we%2520focus%2520on%2520training%2520high-level%2520scheduling%2520models.%2520Specifically%252C%2520we%2520propose%2520and%2520train%2520two%2520agents%253A%2520a%2520Coordinator%252C%2520responsible%2520for%2520the%2520strategic%2520planning%2520and%2520task%2520decomposition%253B%2520and%2520a%2520State%2520Tracker%252C%2520responsible%2520for%2520context%2520compression%2520and%2520information%2520management%2520to%2520maintain%2520the%2520task%2527s%2520state%2520and%2520coherence.%2520Based%2520on%2520this%252C%2520we%2520built%2520the%2520Coordinator-Executor-State%2520Tracker%2520%2528CES%2529%2520multi-agent%2520framework%252C%2520which%2520can%2520be%2520integrated%2520with%2520any%2520low-level%2520Executor%2520model%252C%2520assisting%2520the%2520Executor%2520in%2520solving%2520long-horizon%2520tasks%2520through%2520task%2520scheduling%2520and%2520state%2520management.%2520Experiments%2520on%2520long-horizon%2520task%2520benchmarks%2520demonstrate%2520that%2520CES%2520significantly%2520enhances%2520the%2520system%2527s%2520planning%2520and%2520state%2520management%2520capabilities.%2520Furthermore%252C%2520analysis%2520confirms%2520that%2520our%2520trained%2520high-level%2520scheduling%2520module%2520is%2520a%2520generalizable%252C%2520plug-and-play%2520module%2520that%2520significantly%2520enhances%2520the%2520long-horizon%2520capabilities%2520of%2520various%2520Executors.%2520Code%2520can%2520be%2520available%2520at%2520https%253A//github.com/hehehahi4/CES.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.22235v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/vi {"title": "BD-Merging: Bias-Aware Dynamic Model Merging with Evidence-Guided Contrastive Learning", "author": "Yuhan Xie and Chen Lyu", "abstract": "Model Merging (MM) has emerged as a scalable paradigm for multi-task learning (MTL), enabling multiple task-specific models to be integrated without revisiting the original training data. Despite recent progress, the reliability of MM under test-time distribution shift remains insufficiently understood. Most existing MM methods typically assume that test data are clean and distributionally aligned with both the training and auxiliary sources. However, this assumption rarely holds in practice, often resulting in biased predictions with degraded generalization. To address this issue, we present BD-Merging, a bias-aware unsupervised model merging framework that explicitly models uncertainty to achieve adaptive reliability under distribution shift. First, BD-Merging introduces a joint evidential head that learns uncertainty over a unified label space, capturing cross-task semantic dependencies in MM. Second, building upon this evidential foundation, we propose an Adjacency Discrepancy Score (ADS) that quantifies evidential alignment among neighboring samples. Third, guided by ADS, a discrepancy-aware contrastive learning mechanism refines the merged representation by aligning consistent samples and separating conflicting ones. Combined with general unsupervised learning, this process trains a debiased router that adaptively allocates task-specific or layer-specific weights on a per-sample basis, effectively mitigating the adverse effects of distribution shift. Extensive experiments across diverse tasks demonstrate that BD-Merging achieves superior effectiveness and robustness compared to state-of-the-art MM baselines.", "link": "http://arxiv.org/abs/2603.03920v1", "date": "2026-03-04", "relevancy": 2.2017, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.604}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5501}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5293}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BD-Merging%3A%20Bias-Aware%20Dynamic%20Model%20Merging%20with%20Evidence-Guided%20Contrastive%20Learning&body=Title%3A%20BD-Merging%3A%20Bias-Aware%20Dynamic%20Model%20Merging%20with%20Evidence-Guided%20Contrastive%20Learning%0AAuthor%3A%20Yuhan%20Xie%20and%20Chen%20Lyu%0AAbstract%3A%20Model%20Merging%20%28MM%29%20has%20emerged%20as%20a%20scalable%20paradigm%20for%20multi-task%20learning%20%28MTL%29%2C%20enabling%20multiple%20task-specific%20models%20to%20be%20integrated%20without%20revisiting%20the%20original%20training%20data.%20Despite%20recent%20progress%2C%20the%20reliability%20of%20MM%20under%20test-time%20distribution%20shift%20remains%20insufficiently%20understood.%20Most%20existing%20MM%20methods%20typically%20assume%20that%20test%20data%20are%20clean%20and%20distributionally%20aligned%20with%20both%20the%20training%20and%20auxiliary%20sources.%20However%2C%20this%20assumption%20rarely%20holds%20in%20practice%2C%20often%20resulting%20in%20biased%20predictions%20with%20degraded%20generalization.%20To%20address%20this%20issue%2C%20we%20present%20BD-Merging%2C%20a%20bias-aware%20unsupervised%20model%20merging%20framework%20that%20explicitly%20models%20uncertainty%20to%20achieve%20adaptive%20reliability%20under%20distribution%20shift.%20First%2C%20BD-Merging%20introduces%20a%20joint%20evidential%20head%20that%20learns%20uncertainty%20over%20a%20unified%20label%20space%2C%20capturing%20cross-task%20semantic%20dependencies%20in%20MM.% ecific%20or%20layer-specific%20weights%20on%20a%20per-sample%20basis%2C%20effectively%20mitigating%20the%20adverse%20effects%20of%20distribution%20shift.%20Extensive%20experiments%20across%20diverse%20tasks%20demonstrate%20that%20BD-Merging%20achieves%20superior%20effectiveness%20and%20robustness%20compared%20to%20state-of-the-art%20MM%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2603.03920v1&entry.124074799=Read"},
{"title": "A Unified Framework for Joint Detection of Lacunes and Enlarged Perivascular Spaces", "author": "Lucas He and Krinos Li and Hanyuan Zhang and Runlong He and Silvia Ingala and Luigi Lorenzini and Marleen de Bruijne and Frederik Barkhof and Rhodri Davies and Carole Sudre", "abstract": "Cerebral small vessel disease (CSVD) markers, specifically enlarged perivascular spaces (EPVS) and lacunae, present a unique challenge in medical image analysis due to their radiological mimicry. Standard segmentation networks struggle with feature interference and extreme class imbalance when handling these divergent targets simultaneously. To address these issues, we propose a morphology-decoupled framework where Zero-Initialized Gated Cross-Task Attention exploits dense EPVS context to guide sparse lacune detection. Furthermore, biological and topological consistency are enforced via a mixed-supervision strategy integrating Mutual Exclusion and Centerline Dice losses. Finally, we introduce an Anatomically-Informed Inference Calibration mechanism to dynamically suppress false positives based on tissue semantics. Extensive 5-folds cross-validation on the VALDO 2021 dataset (N=40) demonstrates state-of-the-art performance, notably surpassing task winners in lacunae detection precision (71.1%, p=0.01) and F1-score (62.6%, p=0.03). Furthermore, evaluation on the external EPAD cohort (N=1762) confirms the model's robustness for large-scale population studies. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.04243v1", "date": "2026-03-04", "relevancy": 2.1957, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5582}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5485}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Unified%20Framework%20for%20Joint%20Detection%20of%20Lacunes%20and%20Enlarged%20Perivascular%20Spaces&body=Title%3A%20A%20Unified%20Framework%20for%20Joint%20Detection%20of%20Lacunes%20and%20Enlarged%20Perivascular%20Spaces%0AAuthor%3A%20Lucas%20He%20and%20Krinos%20Li%20and%20Hanyuan%20Zhang%20and%20Runlong%20He%20and%20Silvia%20Ingala%20and%20Luigi%20Lorenzini%20and%20Marleen%20de%20Bruijne%20and%20Frederik%20Barkhof%20and%20Rhodri%20Davies%20and%20Carole%20Sudre%0AAbstract%3A%20Cerebral%20small%20vessel%20disease%20%28CSVD%29%20markers%2C%20specifically%20enlarged%20perivascular%20spaces%20%28EPVS%29%20and%20lacunae%2C%20present%20a%20unique%20challenge%20in%20medical%20image%20analysis%20due%20to%20their%20radiological%20mimicry.%20Standard%20segmentation%20networks%20struggle%20with%20feature%20interference%20and%20extreme%20class%20imbalance%20when%20handling%20these%20divergent%20targets%20simultaneously.%20To%20address%20these%20issues%2C%20we%20propose%20a%20morphology-decoupled%20framework%20where%20Zero-Initialized%20Gated%20Cross-Task%20Attention%20exploits%20dense%20EPVS%20context%20to%20guide%20sparse%20lacune%20detection.%20Furthermore%2C%20biological%20and%20topological%20consistency%20are%20enforced%20via%20a%20mixed-supervision%20strategy%20integrating%20Mutual%20Exclusion%20and%20Centerline%20Dice%20losses.%20Finally%2C%20we%20introduce%20an%20Anatomically-Informed%20Inference%20Calibration%20mechanism%20to%20dynamically%20suppress%20false%20positives%20based%20on%20tissue%20semantics.%20Extensive%205-folds%20cross-validation%20on%20the%20VALDO%202021%20dataset%20%28N%3D40%29%20demonstrates%20state-of-the-art%20performance%2C%20notably%20surpassing%20task%20winners%20in%20lacunae%20detection%20precision%20%2871.1%25%2C%20p%3D0.01%29%20and%20F1-score%20%2 {"title": "World Properties without World Models: Recovering Spatial and Temporal Structure from Co-occurrence Statistics in Static Word Embeddings", "author": "Elan Barenholtz", "abstract": "Recent work interprets the linear recoverability of geographic and temporal variables from large language model (LLM) hidden states as evidence for world-like internal representations. We test a simpler possibility: that much of the relevant structure is already latent in text itself. Applying the same class of ridge regression probes to static co-occurrence-based embeddings (GloVe and Word2Vec), we find substantial recoverable geographic signal and weaker but reliable temporal signal, with held-out R^2 values of 0.71-0.87 for city coordinates and 0.48-0.52 for historical birth years. Semantic-neighbor analyses and targeted subspace ablations show that these signals depend strongly on interpretable lexical gradients, especially country names and climate-related vocabulary. These findings suggest that ordinary word co-occurrence preserves richer spatial, temporal, and environmental structure than is often assumed, revealing a remarkable and underappreciated capacity of simple static embeddings to preserve world-shaped structure from text alone. Linear probe recoverability alone therefore does not establish a representational move beyond text.", "link": "http://arxiv.org/abs/2603.04317v1", "date": "2026-03-04", "relevancy": 1.9077, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4803}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4762}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4762}], "mailto": "mailto:haoxiang.li.202 520structure%2520from%2520text%2520alone.%2520Linear%2520probe%2520recoverability%2520alone%2520therefore%2520does%2520not%2520establish%2520a%2520representational%2520move%2520beyond%2520text.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04317v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=World%20Properties%20without%20World%20Models%3A%20Recovering%20Spatial%20and%20Temporal%20Structure%20from%20Co-occurrence%20Statistics%20in%20Static%20Word%20Embeddings&entry.906535625=Elan%20Barenholtz&entry.1292438233=Recent%20work%20interprets%20the%20linear%20recoverability%20of%20geographic%20and%20temporal%20variables%20from%20large%20language%20model%20%28LLM%29%20hidden%20states%20as%20evidence%20for%20world-like%20internal%20representations.%20We%20test%20a%20simpler%20possibility%3A%20that%20much%20of%20the%20relevant%20structure%20is%20already%20latent%20in%20text%20itself.%20Applying%20the%20same%20class%20of%20ridge%20regression%20probes%20to%20static%20co-occurrence-based%20embeddings%20%28GloVe%20and%20Word2Vec%29%2C%20we%20find%20substantial%20recoverable%20geographic%20signal%20and%20weaker%20but%20reliable%20temporal%20signal%2C%20with%20held-out%20R%5E2%20values%20of%200.71-0.87%20for%20city%20coordinates%20and%200.48-0.52%20for%20historical%20birth%20years.%20Semantic-neighbor%20analyses%20and%20targeted%20subspace%20ablations%20show%20that%20these%20signals%20depend%20strongly%20on%20interpretable%20lexical%20gradients%2C%20especially%20country%20names%20and%20climate-related%20vocabulary.%20These%20findings%20suggest%20that%20ordinary%20word%20co-occurrence%20preserves%20richer%20spatial%2C%20temporal%2C%20and%20environmental%20structure%20than%20is%20often%20assumed%2C%20revealing%20a%20remarkable%20and%20underappreciated%20capacity%20of%20simple%20static%20embeddings%20to%20preserve%20world-shaped%20structure%20from%20text%20alone.%20Linear%2

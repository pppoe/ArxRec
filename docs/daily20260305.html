{"title": "Unsupervised Representation Learning - an Invariant Risk Minimization Perspective", "author": "Yotam Norman and Ron Meir", "abstract": "We propose a novel unsupervised framework for \\emph{Invariant Risk Minimization} (IRM), extending the concept of invariance to settings where labels are unavailable. Traditional IRM methods rely on labeled data to learn representations that are robust to distributional shifts across environments. In contrast, our approach redefines invariance through feature distribution alignment, enabling robust representation learning from unlabeled data. We introduce two methods within this framework: Principal Invariant Component Analysis (PICA), a linear method that extracts invariant directions under Gaussian assumptions, and Variational Invariant Autoencoder (VIAE), a deep generative model that separates environment-invariant and environment-dependent latent factors. Our approach is based on a novel ``unsupervised'' structural causal model and supports environment-conditioned sample-generation and intervention. Empirical evaluations on synthetic dataset, modified versions of MNIST, and CelebA demonstrate the effectiveness of our methods in capturing invariant structure, preserving relevant information, and generalizing across environments without access to labels.", "link": "http://arxiv.org/abs/2505.12506v4", "date": "2026-03-04", "relevancy": 2.7606, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5727}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5542}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": .org/abs/2505.12506v4&entry.124074799=Read"},
{"title": "TumorFlow: Physics-Guided Longitudinal MRI Synthesis of Glioblastoma Growth", "author": "Valentin Biller and Niklas Bubeck and Lucas Zimmer and Ayhan Can Erdur and Sandeep Nagar and Anke Meyer-Baese and Daniel R\u00fcckert and Benedikt Wiestler and Jonas Weidner", "abstract": "Glioblastoma exhibits diverse, infiltrative, and patient-specific growth patterns that are only partially visible on routine MRI, making it difficult to reliably assess true tumor extent and personalize treatment planning and follow-up. We present a biophysically-conditioned generative framework that synthesizes biologically realistic 3D brain MRI volumes from estimated, spatially continuous tumor-concentration fields. Our approach combines a generative model with tumor-infiltration maps that can be propagated through time using a biophysical growth model, enabling fine-grained control over tumor shape and growth while preserving patient anatomy. This enables us to synthesize consistent tumor growth trajectories directly in the space of real patients, providing interpretable, controllable estimation of tumor infiltration and progression beyond what is explicitly observed in imaging. We evaluate the framework on longitudinal glioblastoma cases and demonstrate that it can generate temporally coherent sequences with realistic changes in tumor appearance and surrounding tissue response. These results suggest that integrating mechanistic tumor growth priors with modern generative modeling can provide a practical tool for patient-specific progression visualization and for generating controlled synthetic data to support downstream neuro-oncology workflows. In longitudinal extrapolation, we achieve a consistent 75% Dice overlap with the biophysical model while maintaining a constant PSNR of 25 in the surrounding tissue. Our code is available at: https://github.com/valentin-biller/lgm.git", "link": "http://arxiv.org/abs/2603.04058v1", "date": "2026-03-04", "relevancy": 2.7176, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.552}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5404}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5382}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TumorFlow%3A%20Physics-Guided%20Longitudinal%20MRI%20Synthesis%20of%20Glioblastoma%20Growth&body=Title%3A%20TumorFlow%3A%20Physics-Guided%20Longitudinal%20MRI%20Synthesis%20of%20Glioblastoma%20Growth%0AAuthor%3A%20Valentin%20Biller%20and%20Niklas%20Bubeck%20and%20Lucas%20Zimmer%20and%20Ayhan%20Can%20Erdur%20and%20Sandeep%20Nagar%20and%20Anke%20Meyer-Baese%20and%20Daniel%20R%C3%BCckert%20and%20Benedikt%20Wiestler%20and%20Jonas%20Weidner%0AAbstract%3A%20Glioblastoma%20exhibits%20diverse%2C%20infiltrative%2C%20and%20patient-specific%20growth%20patterns%20that%20are%20only%20partially%20visible%20on%20routine%20MRI%2C%20making%20it%20difficult%20to%20reliably%20assess%20true%20tumor%20extent%20and%20personalize%20treatment%20planning%20and%20follow-up.%20We%20present%20a%20biophysically-conditioned%20generative%20framework%20that%20synthesizes%20biologically%20realistic%203D%20brain%20MRI%20volumes%20from%20estimated%2C%20spatially%20continuous%20tumor-concentration%20fields.%20Our%20approach%20combines%20a%20generative%20model%20with%20tumor-infiltration%20maps%20that%20can%20be%20propagated%20through%20time%20using%20a%20biophysical%20growth%20model%2C%20enabling%20fine-grained%20control%20over%20tumor%20shape%20and%20growth%20while%20preserving%20patient%20anatomy.%20This%20enables%20us%20to%20synthesize%20consistent%20tumor%20growth%20trajectories%20directly%20in%20the%20space%20of%20real%20patients%2C%20providing%20interpretable%2C%20controllable%20estimation%20of%20tumor%20infiltration%20and%20progression%20beyond%20what%20is%20explicitly%20observed%20in%20imaging.%20We%20evaluate%20the%20framework%20on%20longitudinal%20glioblastoma%20cases%20and%20demonstrate%20that%20it%20can%20generate%20temporally%20coherent%20sequences%20with%20realistic%20changes%20in%20tumor%20appearance%20and%20surrounding%20tissue%20response.%20These%20results%20suggest%20that%20integrating%20mechanistic%20tumor%20growth%20priors%20with%20modern%20generative%20modeling%20can%20provide%20a%20practical%20tool%20for%20patient-specific%20progression%20visualization%20and%20for%20generating%20controlled%20synthetic%20data%20to%20support%20downstream%20neuro-oncology%20workflows.%20In%20longitudinal%20extrapolation%2C%20we%20achieve%20a%20consistent%2075%25%20Dice%20overlap%20with%20the%20biophysical%20model%20while%20maintaining%20a%20constant%20PSNR%20of%2025%20in%20the%20surrounding%20tissue.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/valentin-biller/lgm.git%0ALink%3A%20http%3A//arxiv.org/abs/2603.04058v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTumorFlow%253A%2520Physics-Guided%2520Longitudinal%2520MRI%2520Synthesis%2520of%2520Glioblastoma%2520Growth%26entry.906535625%3DValentin%2520Biller%2520and%2520Niklas%2520Bubeck%2520and%2520Lucas%2520Zimmer%2520and%2520Ayhan%2520Can%2520Erdur%2520and%2520Sandeep%2520Nagar%2520and%2520Anke%2520Meyer-Baese%2520and%2520Daniel%2520R%25C3%25BCckert%2520and%2520Benedikt%2520Wiestler%2520and%2520Jonas%2520Weidner%26entry.1292438233%3DGlioblastoma%2520exhibits%2520diverse%252C%2520infiltrative%252C%2520and%2520patient-specific%2520growth%2520patterns%2520that%2520are%2520only%2520partially%2520visible%2520on%2520routine%2520MRI%252C%2520making%2520it%2520difficult%2520to%2520reliably%2520assess%2520true%2520tumor%2520extent%2520and%2520personalize%2520treatment%2520planning%2520and%2520follow-up.%2520We%2520present%2520 {"title": "RIVER: A Real-Time Interaction Benchmark for Video LLMs", "author": "Yansong Shi and Qingsong Zhao and Tianxiang Jiang and Xiangyu Zeng and Yi Wang and Limin Wang", "abstract": "The rapid advancement of multimodal large language models has demonstrated impressive capabilities, yet nearly all operate in an offline paradigm, hindering real-time interactivity. Addressing this gap, we introduce the Real-tIme Video intERaction Bench (RIVER Bench), designed for evaluating online video comprehension. RIVER Bench introduces a novel framework comprising Retrospective Memory, Live-Perception, and Proactive Anticipation tasks, closely mimicking interactive dialogues rather than responding to entire videos at once. We conducted detailed annotations using videos from diverse sources and varying lengths, and precisely defined the real-time interactive format. Evaluations across various model categories reveal that while offline models perform well in single question-answering tasks, they struggle with real-time processing. Addressing the limitations of existing models in online video interaction, especially their deficiencies in long-term memory and future perception, we proposed a general improvement method that enables models to interact with users more flexibly in real time. We believe this work will significantly advance the development of real-time interactive video understanding models and inspire future research in this emerging field. Datasets and code are publicly available at https://github.com/OpenGVLab/RIVER.", "link": "http://arxiv.org/abs/2603.03985v1", "date": "2026-03-04", "relevancy": 2.6876, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RIVER%3A%20A%20Real-Time%20Interaction%20Benchmark%20for%20Video%20LLMs&body=Title%3A%20RIVER%3A%20A%20Real-Time%20Interaction%20Benchmark%20for%20Video%20LLMs%0AAuthor%3A%20Yansong%20Shi%20and%20Qingsong%20Zhao%20and%20Tianxiang%20Jiang%20and%20Xiangyu%20Zeng%20and%20Yi%20Wang%20and%20Limin%20Wang%0AAbstract%3A%20The%20rapid%20advancement%20of%20multimodal%20large%20language%20models%20has%20demonstrated%20impressive%20capabilities%2C%20yet%20nearly%20all%20operate%20in%20an%20offline%20paradigm%2C%20hindering%20real-time%20interactivity.%20Addressing%20this%20gap%2C%20we%20introduce%20the%20Real-tIme%20Video%20intERaction%20Bench%20%28RIVER%20Bench%29%2C%20designed%20for%20evaluating%20online%20video%20comprehension.%20RIVER%20Bench%20introduces%20a%20novel%20framework%20comprising%20Retrospective%20Memory%2C%20Live-Perception%2C%20and%20Proactive%20Anticipation%20tasks%2C%20closely%20mimicking%20interactive%20dialogues%20rather%20than%20responding%20to%20entire%20videos%20at%20once.%20We%20conducted%20detailed%20annotations%20using%20videos%20from%20diverse%20sources%20and%20varying%20lengths%2C%20and%20precisely%20defined%20the%20real-time%20interactive%20format.%20Evaluations%20across%20various%20model%20categories%20reveal%20that%20while%20offline%20models%20perform%20well%20in%20single%20question-answering%20tasks%2C%20they%20struggle%20with%20real-time%20processing.%20Addressing%20the%20limitations%20of%20existing%20models%20in%20online%20video%20interaction%2C%20especially%20their%20deficiencies%20in%20long-term%20memory%20and%20future%20perception%2C%20we%20proposed%20a%20general%20improvement%20method%20that%20enables%20models%20to%20interact%20with%20users%20more%20flexibly%20in%20real%20time.%20We%20believe%20this%20work%20will%20significantly%20advance%20the%20development%20of%20real-time%20interactive%20video%20understanding%20models%20and%20inspire%20future%20research%20in%20this%20emerging%20field.%20Datasets%20and%20code%20are%20publicly%20available%20at%20https%3A//github.com/OpenGVLab/RIVER.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03985v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRIVER%253A%2520A%2520Real-Time%2520Interaction%2520Benchmark%2520for%2520Video%2520LLMs%26entry.906535625%3DYansong%2520Shi%2520and%2520Qingsong%2520Zhao%2520and%2520Tianxiang%2520Jiang%2520and%2520Xiangyu%2520Zeng%2520and%2520Yi%2520Wang%2520and%2520Limin%2520Wang%26entry.1292438233%3DThe%2520rapid%2520advancement%2520of%2520multimodal%2520large%2520language%2520models%2520has%2520demonstrated%2520impressive%2520capabilities%252C%2520yet%2520nearly%2520all%2520operate%2520in%2520an%2520offline%2520paradigm%252C%2520hindering%2520real-time%2520interactivity.%2520Addressing%2520this%2520gap%252C%2520we%2520introduce%2520the%2520Real-tIme%2520Video%2520intERaction%2520Bench%2520%2528RIVER%2520Bench%2529%252C%2520designed%2520for%2520evaluating%2520online%2520video%2520comprehension.%2520RIVER%2520Bench%2520introduces%2520a%2520novel%2520framework%2520comprising%2520Retrospective%2520Memory%252C%2520Live-Perception%252C%2520and%2520Proactive%2520Anticipation%2520tasks%252C%2520closely%2520mimicking%2520interactive%2520dialogues%2520rather%2520than%2520responding%2520to%2520entire%2520videos%2520at%2520once.%2520We%2520conducted%2520detailed%2520annotations%2520using%2520videos%2520from%2520diverse%2520sources%2520and%2520varying%2520lengths%252C%2520and%2520precisely%2520defined%2520the%2520real-time%2520interactive%2520format.%2520Evaluations%2520across%2520various%2520model%2520categories%2520reveal%2520that%2520while%2520offline%2520models%2520perform%2520well%2520in%2520single%2520question-answering%2520tasks%252C%2520they%2520struggle%2520with%2520real-time%2520processing.%2520Addressing%2520the%2520limitations%2520of%2520existing%2520models%2520in%2520online%2520video%2520interaction%252C%2520especially%2520their%2520deficiencies%2520in%2520long-term%2520memory%2520and%2520future%2520perception%252C%2520we%2520proposed%2520a%2520general%2520improvement%2520method%2520that%2520enables%2520models%2520to%2520interact%2520with%2520users%2520more%2520flexibly%2520in%2520real%2520time.%2520We%2520believe%2520this%2520work%2520will%2520significantly%2520advance%2520the%2520development%2520of%2520real-time%2520interactive%2520video%2520understanding%2520models%2520and%2520inspire%2520future%2520research%2520in%2520this%2520emerging%2520field.%2520Datasets%2520and%2520code%2520are%2520publicly%2520available%2520at%2520https%253A//github.com/OpenGVLab/RIVER.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03985v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RIVER%3A%20A%20Real-Time%20Interaction%20Benchmark%20for%20Video%20LLMs&entry.906535625=Yansong%20Shi%20and%20Qingsong%20Zhao%20and%20Tianxiang%20Jiang%20and%20Xiangyu%20Zeng%20and%20Yi%20Wang%20and%20Limin%20Wang&entry.1292438233=The%20rapid%20advancement%20of%20multimodal%20large%20language%20models%20has%20demonstrated%20impressive%20capabilities%2C%20yet%20nearly%20all%20operate%20in%20an%20offline%20paradigm%2C%20hindering%20real-time%20interactivity.%20Addressing%20this%20gap%2C%20we%20introduce%20the%20Real-tIme%20Video%20intERaction%20Bench%20%28RIVER%20Bench%29%2C%20designed%20for%20evaluating%20online%20video%20comprehension.%20RIVER%20Bench%20introduces%20a%20novel%20framework%20comprising%20Retrospective%20Memory%2C%20Live-Perception%2C%20and%20Proactive%20Anticipation%20tasks%2C%20closely%20mimicking%20interactive%20dialogues%20rather%20than%20responding%20to%20entire%20videos%20at%20once.%20We%20conducted%20detailed%20annotations%20using {"title": "GSeg3D: A High-Precision Grid-Based Algorithm for Safety-Critical Ground Segmentation in LiDAR Point Clouds", "author": "Muhammad Haider Khan Lodhi and Christoph Hertzberg", "abstract": "Ground segmentation in point cloud data is the process of separating ground points from non-ground points. This task is fundamental for perception in autonomous driving and robotics, where safety and reliable operation depend on the precise detection of obstacles and navigable surfaces. Existing methods often fall short of the high precision required in safety-critical environments, leading to false detections that can compromise decision-making. In this work, we present a ground segmentation approach designed to deliver consistently high precision, supporting the stringent requirements of autonomous vehicles and robotic systems operating in real-world, safety-critical scenarios.", "link": "http://arxiv.org/abs/2603.04208v1", "date": "2026-03-04", "relevancy": 2.6848, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.567}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5282}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5156}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GSeg3D%3A%20A%20High-Precision%20Grid-Based%20Algorithm%20for%20Safety-Critical%20Ground%20Segmentation%20in%20LiDAR%20Point%20Clouds&body=Title%3A%20GSeg3D%3A%20A%20High-Precision%20Grid-Based%20Algorithm%20for%20Safety-Critical%20Ground%20Segmentation%20in%20LiDAR%20Point%20Clouds%0AAuthor%3A%20Muhammad%20Haider%20Khan%20Lodhi%20and%20Christoph%20Hertzberg%0AAbstract%3A%20Ground%20segmentation%20in%20point%20cloud%20data%20is%20the%20 {"title": "Efficient Point Cloud Processing with High-Dimensional Positional Encoding and Non-Local MLPs", "author": "Yanmei Zou and Hongshan Yu and Yaonan Wang and Zhengeng Yang and Xieyuanli Chen and Kailun Yang and Naveed Akhtar", "abstract": "Multi-Layer Perceptron (MLP) models are the foundation of contemporary point cloud processing. However, their complex network architectures obscure the source of their strength and limit the application of these models. In this article, we develop a two-stage abstraction and refinement (ABS-REF) view for modular feature extraction in point cloud processing. This view elucidates that whereas the early models focused on ABS stages, the more recent techniques devise sophisticated REF stages to attain performance advantages. Then, we propose a High-dimensional Positional Encoding (HPE) module to explicitly utilize intrinsic positional information, extending the ``positional encoding'' concept from Transformer literature. HPE can be readily deployed in MLP-based architectures and is compatible with transformer-based methods. Within our ABS-REF view, we rethink local aggregation in MLP-based methods and propose replacing time-consuming local MLP operations, which are used to capture local relationships among neighbors. Instead, we use non-local MLPs for efficient non-local information updates, combined with the proposed HPE for effective local information representation. We leverage our modules to develop HPENets, a suite of MLP networks that follow the ABS-REF paradigm, incorporating a scalable HPE-based REF stage. Extensive experiments on seven public datasets across four different tasks show that HPENets deliver a strong balance between efficiency and effectiveness. Notably, HPENet surpasses PointNeXt, a strong MLP-based counterpart, by 1.1% mAcc, 4.0% mIoU, 1.8% mIoU, and 0.2% Cls. mIoU, with only 50.0%, 21.5%, 23.1%, 44.4% of FLOPs on ScanObjectNN, S3DIS, ScanNet, and ShapeNetPart, respectively. Source code is available at https://github.com/zouyanmei/HPENet_v2.git.", "link": "http://arxiv.org/abs/2603.04099v1", "date": "2026-03-04", "relevancy": 2.6831, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5539}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5328}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5231}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Point%20Cloud%20Processing%20with%20High-Dimensional%20Positional%20Encoding%20and%20Non-Local%20MLPs&body=Title%3A%20Efficient%20Point%20Cloud%20Processing%20with%20High-Dimensional%20Positional%20Encoding%20and%20Non-Local%20MLPs%0AAuthor%3A%20Yanmei%20Zou%20and%20Hongshan%20Yu%20and%20Yaonan%20Wang%20and%20Zhengeng%20Yang%20and%20Xieyuanli%20Chen%20and%20Kailun%20Yang%20and%20Naveed%20Akhtar%0AAbstract%3A%20Multi-Layer%20Perceptron%20%28MLP%29%20models%20are%20the%20foundation%20of%20contemporary%20point%20cloud%20processing.%20However%2C%20their%20complex%20network%20architectures%20obscure%20the%20source%20of%20their%20strength%20and%20limit%20the%20application%20of%20these%20models.%20In%20this%20article%2C%20we%20develop%20a%20two-stage%20abstraction%20and%20refinement%20%28ABS-REF%29%20view%20for%20modular%20feature%20extraction%20in%20point%20cloud%20processing.%20This%20view%20elucidates%20that%20whereas%20the%20early%20models%20focused%20on%20ABS%20stages%2C%20the%20more%20recent%20techniques%20devise%20sophisticated%20REF%20stages%20to%20attain%20performance%20advantages.%20Then%2C%20we%20propose%20a%20High-dimensional%20Positional%20Encoding%20%28HPE%29%20module%20to%20explicitly%20utilize%20intrinsic%20positional%20information%2C%20extending%20the%20%60%60positional%20encoding%27%27%20concept%20from%20Transformer%20literature.%20HPE%20can%20be%20readily%20deployed%20in%20MLP-based%20architectures%20and%20is%20compatible%20with%20transformer-based%20methods.%20Within%20our%20ABS-REF%20view%2C%20we%20rethink%20local%20aggregation%20in%20MLP-based%20methods%20and%20propose%20replacing%20time-consuming%20local%20MLP%20operations%2C%20which%20are%20used%20to%20capture%20local%20relationships%20among%20neighbors.%20Instead%2C%20we%20use%20non-local%20MLPs%20for%20efficient%20non-local%20information%20updates%2C%20combined%20with%20the%20proposed%20HPE%20for%20effective%20local%20information%20representation.%20We%20leverage%20our%20modules%20to%20develop%20HPENets%2C%20a%20suite%20of%20MLP%20networks%20that%20follow%20the%20ABS-REF%20paradigm%2C%20incorporating%20a%20scalable%20HPE-based%20REF%20stage.%20Extensive%20experiments%20on%20seven%20public%20datasets%20across%20four%20different%20tasks%20show%20that%20HPENets%20deliver%20a%20strong%20balance%20between%20efficiency%20and%20effectiveness.%20Notably%2C%20HPENet%20surpasses%20PointNeXt%2C%20a%20strong%20MLP-based%20counterpart%2C%20by%201.1%25%20mAcc%2C%204.0%25%20mIoU%2C%201.8%25%20mIoU%2C%20and%200.2%25%20Cls.%20mIoU%2C%20with%20only%2050.0%25%2C%2021.5%25%2C%2023.1%25%2C%2044.4%25%20of%20FLOPs%20on%20ScanObjectNN%2C%20S3DIS%2C%20ScanNet%2C%20and%20ShapeNetPart%2C%20respectively.%20Source%20code%20is%20available%20at%20https%3A//github.com/zouyanmei/HPENet_v2.git.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04099v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Point%2520Cloud%2520Processing%2520with%2520High-Dimensional%2520Positional%2520Encoding%2520and%2520Non-Local%2520MLPs%26entry.906535625%3DYanmei%2520Zou%2520and%2520Hongshan%2520Yu%2520and%2520Yaonan%2520Wang%2520and%2520Zhengeng%2520Yang%2520and%2520Xieyuanli%2520Chen%2520and%2520Kailun%2520Yang%2520and%2520N {"title": "DQE-CIR: Distinctive Query Embeddings through Learnable Attribute Weights and Target Relative Negative Sampling in Composed Image Retrieval", "author": "Geon Park and Ji-Hoon Park and Seong-Whan Lee", "abstract": "Composed image retrieval (CIR) addresses the task of retrieving a target image by jointly interpreting a reference image and a modification text that specifies the intended change. Most existing methods are still built upon contrastive learning frameworks that treat the ground truth image as the only positive instance and all remaining images as negatives. This strategy inevitably introduces relevance suppression, where semantically related yet valid images are incorrectly pushed away, and semantic confusion, where different modification intents collapse into overlapping regions of the embedding space. As a result, the learned query representations often lack discriminativeness, particularly at fine-grained attribute modifications. To overcome these limitations, we propose distinctive query embeddings through learnable attribute weights and target relative negative sampling (DQE-CIR), a method designed to learn distinctive query embeddings by explicitly modeling target relative relevance during training. DQE-CIR incorporates learnable attribute weighting to emphasize distinctive visual features conditioned on the modification text, enabling more precise feature alignment between language and vision. Furthermore, we introduce target relative negative sampling, which constructs a target relative similarity distribution and selects informative negatives from a mid-zone region that excludes both easy negatives and ambiguous false negatives. This strategy enables more reliable retrieval for fine-grained attribute changes by improving query discriminativeness and reducing confusion caused by semantically similar but irrelevant candidates.", "link": "http://arxiv.org/abs/2603.04037v1", "date": "2026-03-04", "relevancy": 2.6415, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5418}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5281}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DQE-CIR%3A%20Distinctive%20Query%20Embeddings%20through%20Learnable%20Attribute%20Weights%20and%20Target%20Relative%20Negative%20Sampling%20in%20Composed%20Image%20Retrieval&body=Title%3A%20DQE-CIR%3A%20Distinctive%20Query%20Embeddings%20through%20Learnable%20Attribute%20Weights%20and%20Target%20Relative%20Negative%20Sampling%20in%20Composed%20Image%20Retrieval%0AAuthor%3A%20Geon%20Park%20and%20Ji-Hoon%20Park%20and%20Seong-Whan%20Lee%0AAbstract%3A%20Composed%20image%20retrieval%20%28CIR%29%20addresses%20the%20task%20of%20retrieving%20a%20target%20image%20by%20jointly%20interpreting%20a%20reference%20image%20and%20a%20modification%20text%20that%20specifies%20the%20intended%20change.%20Most%20existing%20methods%20are%20still%20built%20upon%20contrastive%20learning%20frameworks%20that%20treat%20the%20ground%20truth%20image%20as%20the%20only%20positive%20instance%20and%20all%20remaining%20images%20as%20negatives.%20This%20strategy%20inevitably%20introduces%20relevance%20suppression%2C%20where%20semantically%20related%20yet%20valid%20images%20are%20incorrectly%20pushed%20away%2C%20and%20semantic%20confusion%2C%20where%20different%20modification%20intents%20collapse%20into%20overlapping%20regions%20of%20the%20embedding%20space.%20As%20a%20result%2C%20the%20learned%20query%20representations%20often%20lack%20discriminativeness%2C%20particularly%20at%20fine-grained%20attribute%20modifications.%20To%20overcome%20these%20limitations%2C%20we%20propose%20distinctive%20query%20embeddings%20through%20learnable%20attribute%20weights%20and%20target%20relative%20negative%20sampling%20%28DQE-CIR%29%2C%20a%20method%20designed%20to%20learn%20distinctive%20query%20embeddings%20by%20explicitly%20modeling%20target%20relative%20relevance%20during%20training.%20DQE-CIR%20incorporates%20learnable%20attribute%20weighting%20to%20emphasize%20distinctive%20visual%20features%20conditioned%20on%20the%20modification%20text%2C%20enabling%20more%20precise%20feature%20alignment%20between%20language%20and%20vision.%20Furthermore%2C%20we%20introduce%20target%20relative%20negative%20sampling%2C%20which%20constructs%20a%20target%20relative%20similarity%20distribution%20and%20selects%20informative%20negatives%20from%20a%20mid-zone%20region%20that%20excludes%20both%20easy%20negatives%20and%20ambiguous%20false%20negatives.%20This%20strategy%20enables%20more%20reliable%20retrieval%20for%20fine-grained%20attribute%20changes%20by%20improving%20query%20discriminativeness%20and%20reducing%20confusion%20caused%20by%20semantically%20similar%20but%20irrelevant%20candidates.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04037v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDQE-CIR%253A%2520Distinctive%2520Query%2520Embeddings%2520through%2520Learnable%2520Attribute%2520Weights%2520and%2520Target%2520Relative%2520Negative%2520Sampling%2520in%2520Composed%2520Image%2520Retrieval%26entry.906535625%3DGeon%2520Park%2520and%2520Ji-Hoon%2520Park%2520and%2520Seong-Whan%2520Lee%26entry.1292438233%3DComposed%2520image%2520retrieval%2520%2528CIR%2529%2520addresses%2520the%2520task%2520of%2520retrieving%2520a%2520target%2520image%2520by%2520jointly%2520interpreting%2520a%2520reference%2520image%2520and%2520a%2520modification%2520text%2520that%2520specifies%2520the%2520intended%2520change.%2520Most%2520existing%2520methods%2520are%2520still%2520built%2520upon%2520contrastive%2520learning%2520frameworks%2520that%2520treat%2520the%2520ground%2520truth%2520image%2520as%2520the%2520only%2520positive%2520instance%2520and%2520all%2520remaining%2520images%2520as%2520negatives.%2520This%2520strategy%2520inevitably%2520introduces%2520relevance%2520suppression%252C%2520where%2520semantically%2520related%2520yet%2520valid%2520images%2520are%2520incorrectly%2520pushed%2520away%252C%2520and%2520semantic%2520confusion%252C%2520where%2520different%2520modification%2520intents%2520collapse%2520into%2520overlapping%2520regions%2520of%2520the%2520embedding%2520space.%2520As%2520a%2520result%252C%2520the%2520learned%2520query%2520representations%2520often%2520lack%2520discriminativeness%252C%2520particularly%2520at%2520fine-grained%2520attribute%2520modifications.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520propose%2520distinctive%2520query%2520embeddings%2520through%2520learnable%2520attribute%2520weights%2520and%2520target%2520relative%2520negative%2520sampling%2520%2528DQE-CIR%2529%252C%2520a%2520method%2520designed%2520to%2520learn%2520distinctive%2520query%2520embeddings%2520by%2520explicitly%2520modeling%2520target%2520relative%2520relevance%2520during%2520training.%2520DQE-CIR%2520incorporates%2520learnable%2520attribute%2520weighting%2520to%2520emphasize%2520distinctive%2520visual%2520features%2520conditioned%2520on%2520the%2520modification%2520text%252C%2520enabling%2520more%2520precise%2520feature%2520alignment%2520between%2520language%2520and%2520vision.%2520Furthermore%252C%2520we%2520introduce%2520target%2520relative%2520negative%2520sampling%252C%2520which%2520constructs%2520a%2520target%2520relative%2520similarity%2520distribution%2520and%2520selects%2520informative%2520negatives%2520from%2520a%2520mid-zone%2520region%2520that%2520excludes%2520both%2520easy%2520negatives%2520and%2520ambiguous%2520false%2520negatives.%2520This%2520strategy%2520enables%2520more%2520reliable%2520retrieval%2520for%2520fine-grained%2520attribute%2520changes%2520by%2520improving%2520query%2520discriminativeness%2520and%2520reducing%2520confusion%2520caused%2520by%2520semantically%2520similar%2520but%2520irrelevant%2520candidates.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04037v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DQE-CIR%3A%20Distinctive%20Query%20Embeddings%20through%20Learnable%20Attribute%20Weights%20and%20Target%20Relative%20Negative%20Sampling%20in%20Composed%20Image%20Retrieval&entry.906535625=Geon%20Park%20and%20Ji-Hoon%20Park%20and%20Seong-Whan%20Lee&entry.1292438233=Composed%20image%20retrieval%20%28CIR%29%20addresses%20the%20task%20of%20retrieving%20a%20target%20image%20by%20jointly%20interpreting%20a%20reference%20image%20and%20a%20modification%20text%20that%20specifies%20the%20intended%20change.%20Most%20existing%20methods%20are%20still%20built%20upon%20contrastive%20learning%20frameworks%20that%20treat%20the%20ground%20truth%20image%20as%20the%20only%20positive%20instance%20and%20all%20remaining%20images%20as%20negatives.%20This%20strategy%20inevitably%20introduces%20relevance%20suppression%2C%20where%20semantically%20related%20yet%20valid%20images%20are%20incorrectly%20pushed%20away%2C%20and%20semantic%20confusion%2C%20where%20different%20modification%20intents%20collapse%20into%20overlapping%20regions%20of%20the%20embedding%20space.%20As%20a%20result%2C%20the%20learned%20query%20representations%20often%20lack%20discriminativeness%2C%20particularly%20at%20fine-grained%20attribute%20modifications.%20To%20overcome%20these%20limitations%2C%20we%20propose%20distinctive%20query%20embeddings%20through%20learnable%20attribute%20weights%20and%20target%20relative%20negative%20sampling%20%28DQE-CIR%29%2C%20a%20method%20designed%20to%20learn%20distinctive%20query%20embeddings%20by%20explicitly%20modeling%20target%20relative%20relevance%20during%20training.%20DQE-CIR%20incorpo {"title": "GaitSnippet: Gait Recognition Beyond Unordered Sets and Ordered Sequences", "author": "Saihui Hou and Chenye Wang and Wenpeng Lang and Zhengxiang Lan and Yongzhen Huang", "abstract": "Recent advancements in gait recognition have significantly enhanced performance by treating silhouettes as either an unordered set or an ordered sequence. However, both set-based and sequence-based approaches exhibit notable limitations. Specifically, set-based methods tend to overlook short-range temporal context for individual frames, while sequence-based methods struggle to capture long-range temporal dependencies effectively. To address these challenges, we draw inspiration from human identification and propose a new perspective that conceptualizes human gait as a composition of individualized actions. Each action is represented by a series of frames, randomly selected from a continuous segment of the sequence, which we term a snippet. Fundamentally, the collection of snippets for a given sequence enables the incorporation of multi-scale temporal context, facilitating more comprehensive gait feature learning. Moreover, we introduce a non-trivial solution for snippet-based gait recognition, focusing on Snippet Sampling and Snippet Modeling as key components. Extensive experiments on four widely-used gait datasets validate the effectiveness of our proposed approach and, more importantly, highlight the potential of gait snippets. For instance, our method achieves the rank-1 accuracy of 77.5% on Gait3D and 81.7% on GREW using a 2D convolution-based backbone.", "link": "http://arxiv.org/abs/2508.07782v2", "date": "2026-03-04", "relevancy": 2.6354, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5312}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5303}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5197}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GaitSnippet%3A%20Gait%20Recognition%20Beyond%20Unordered%20Sets%20and%20Ordered%20Sequences&body=Title%3A%20GaitSnippet%3A%20Gait%20Recognition%20Beyond%20Unordered%20Sets%20and%20Ordered%20Sequences%0AAuthor%3A%20Saihui%20Hou%20and%20Chenye%20Wang%20and%20Wenpeng%20Lang%20and%20Zhengxiang%20Lan%20and%20Yongzhen%20Huang%0AAbstract%3A%20Recent%20advancements%20in%20gait%20recognition%20have%20significantly%20enhanced%20performance%20by%20treating%20silhouettes%20as%20either%20an%20unordered%20set%20or%20an%20ordered%20sequence.%20However%2C%20both%20set-based%20and%20sequence-based%20approaches%20exhibit%20notable%20limitations.%20Specifically%2C%20set-based%20methods%20tend%20to%20overlook%20short-range%20temporal%20context%20for%20individual%20frames%2C%20while%20sequence-based%20methods%20struggle%20to%20capture%20long-range%20temporal%20dependencies%20effectively.%20To%20address%20these%20challenges%2C%20we%20draw%20inspiration%20from%20human%20identification%20and%20propose%20a%20new%20perspective%20that%20conceptualizes%20human%20gait%20as%20a%20composition%20of%20individualized%20actions.%20Each%20action%20is%20represented%20by%20a%20series%20of%20frames%2C%20randomly%20selected%20from%20a%20continuous%20segment%20of%20the%20sequence%2C%20which%20we%20term%20a%20snippet.%20Fundamentally%2C%20the%20collection%20of%20snippets%20for%20a%20given%20sequence%20enables%20the%20incorporation%20of%20multi-scale%20temporal%20context%2C%20facilitating%20more%20comprehensive%20gait%20feature%20learning.%20Moreover%2C%20we%20introduce%20a%20non-trivial%20solution%20for%20snippet-based%20gait%20recognition%2C%20focusing%20on%20Snippet%20Sampling%20and%20Snippet%20Modeling%20as%20key%20components.%20Extensive%20experiments%20on%20four%20widely-used%20gait%20datasets%20validate%20the%20effectiveness%20of%20our%20proposed%20approach%20and%2C%20more%20importantly%2C%20highlight%20the%20potential%20of%20gait%20snippets.%20For%20instance%2C%20our%20method%20achieves%20the%20rank-1%20accuracy%20of%2077.5%25%20on%20Gait3D%20and%2081.7%25%20on%20GREW%20using%20a%202D%20convolution-based%20backbone.%0ALink%3A%20http%3A//arxiv.org/abs/2508.07782v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGaitSnippet%253A%2520Gait%2520Recognition%2520Beyond%2520Unordered%2520Sets%2520and%2520Ordered%2520Sequences%26entry.906535625%3DSaihui%2520Hou%2520and%2520Chenye%2520Wang%2520and%2520Wenpeng%2520Lang%2520and%2520Zhengxiang%2520Lan%2520and%2520Yongzhen%2520Huang%26entry.1292438233%3DRecent%2520advancements%2520in%2520gait%2520recognition%2520have%2520significantly%2520enhanced%2520performance%2520by%2520treating%2520silhouettes%2520as%2520either%2520an%2520unordered%2520set%2520or%2520an%2520ordered%2520sequence.%2520However%252C%2520both%2520set-based%2520and%2520sequence-based%2520approaches%2520exhibit%2520notable%2520limitations.%2520Specifically%252C%2520set-based%2520methods%2520tend%2520to%2520overlook%2520short-range%2520temporal%2520context%2520for%2520individual%2520frames%252C%2520while%2520sequence-based%2520methods%2520struggle%2520to%2520capture%2520long-range%2520temporal%2520dependencies%2520effectively.%2520To%2520address%2520these%2520challenges%252C%2520we%2520draw%2520inspiration%2520from%2520human%2520identification%2520and%2520propose%2520a%2520new%2520perspective%2520that%2520conceptualizes%2520human%2520gait%2520as%2520a%2520composition%2520of%2520individualized%2520actions.%2520Each%2520action%2520is%2520represented%2520by%2520a%2520series%2520of%2520frames%252C%2520randomly%2520selected%2520from%2520a%2520continuous%2520segment%2520of%2520the%2520sequence%252C%2520which%2520we%2520term%2520a%2520snippet.%2520Fundamentally%252C%2520the%2520collection%2520of%2520snippets%2520for%2520a%2520given%2520sequence%2520enables%2520the%2520incorporation%2520of%2520multi-scale%2520temporal%2520context%252C%2520facilitating%2520more%2520comprehensive%2520gait%2520feature%2520learning.%2520Moreover%252C%2520we%2520introduce%2520a%2520non-trivial%2520solution%2520for%2520snippet-based%2520gait%2520recognition%252C%2520focusing%2520on%2520Snippet%2520Sampling%2520and%2520Snippet%2520Modeling%2520as%2520key%2520components.%2520Extensive%2520experiments%2520on%2520four%2520widely-used%2520gait%2520datasets%2520validate%2520the%2520effectiveness%2520of%2520our%2520proposed%2520approach%2520and%252C%2520more%2520importantly%252C%2520highlight%2520the%2520potential%2520of%2520gait%2520snippets.%2520For%2520instance%252C%2520our%2520method%2520achieves%2520the%2520rank-1%2520accuracy%2520of%252077.5%2525%2520on%2520Gait3D%2520and%252081.7%2525%2520on%2520GREW%2520using%2520a%25202D%2520convolution-based%2520backbone.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.07782v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GaitSnippet%3A%20Gait%20Recognition%20Beyond%20Unordered%20Sets%20and%20Ordered%20Sequences&entry.906535625=Saihui%20Hou%20and%20Chenye%20Wang%20and%20Wenpeng%20Lang%20and%20Zhengxiang%20Lan%20and%20Yongzhen%20Huang&entry.1292438233=Recent%20advancements%20in%20gait%20recognition%20have%20significantly%20enhanced%20performance%20by%20treating%20silhouettes%20as%20either%20an%20unordered%20set%20or%20an%20ordered%20sequence.%20However%2C%20both%20set-based%20and%20sequence-based%20approaches%20exhibit%20notable%20limitations.%20Specifically%2C%20set-based%20methods%20tend%20to%20overlook%20short-range%20temporal%20context%20for%20individual%20frames%2C%20while%20sequence-based%20methods%20struggle%20to%20capture%20long-range%20temporal%20dependencies%20effectively.%20To%20address%20these {"title": "A Baseline Study and Benchmark for Few-Shot Open-Set Action Recognition with Feature Residual Discrimination", "author": "Stefano Berti and Giulia Pasquale and Lorenzo Natale", "abstract": "Few-Shot Action Recognition (FS-AR) has shown promising results but is often limited by a closed-set assumption that fails in real-world open-set scenarios. While Few-Shot Open-Set (FSOS) recognition is well-established for images, its extension to spatio-temporal video data remains underexplored. To address this, we propose an architectural extension based on a Feature-Residual Discriminator (FR-Disc), adapting previous work on skeletal data to the more complex video domain. Extensive experiments on five datasets demonstrate that while common open-set techniques provide only marginal gains, our FR-Disc significantly enhances unknown rejection capabilities without compromising closed-set accuracy, setting a new state-of-the-art for FSOS-AR. The project website, code, and benchmark are available at: https://hsp-iit.github.io/fsosar/.", "link": "http://arxiv.org/abs/2603.04125v1", "date": "2026-03-04", "relevancy": 2.627, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5282}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5277}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5203}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Baseline%20Study%20and%20Benchmark%20for%20Few-Shot%20Open-Set%20Action%20Recognition%20with%20Feature%20Residual%20Discrimination&body=Title%3A%20A%20Baseline%20Study%20and%20Benchmark%20for%20Few-Shot%20Open-Set%20Action%20Recognition%20with%20Feature%20Residual%20Discrimination%0AAuthor%3A%20Stefano%20Berti%20and%20Giulia%20Pasquale%20and%20Lorenzo%20Natale%0AAbstract%3A%20Few-Shot%20Action%20Recognition%20%28FS-AR%29%20has%20shown%20promising%20results%20but%20is%20often%20limited%20by%20a%20closed-set%20assumption%20that%20fails%20in%20real-world%20open-set%20scenarios.%20While%20Few-Shot%20Open-Set%20%28FSOS%29%20recognition%20is%20well-established%20for%20images%2C%20its%20extension%20to%20spatio-temporal%20video%20data%20remains%20underexplored.%20To%20address%20this%2C%20we%20propose%20an%20architectural%20extension%20based%20on%20a%20Feature-Residual%20Discriminator%20%28FR-Disc%29%2C%20adapting%20previous%20work%20on%20skeletal%20data%20to%20the%20more%20complex%20video%20domain.%20Extensive%20experiments%20on%20five%20datasets%20demonstrate%20that%20while%20common%20open-set%20techniques%20provide%20only%20marginal%20gains%2C%20our%20FR-Disc%20significantly%20enhances%20unknown%20rejection%20capabilities%20without%20compromising%20closed-set%20accuracy%2C%20setting%20a%20new%20state-of-the-art%20for%20FSOS-AR.%20The%20project%20website%2C%20code%2C%20and%20benchmark%20are%20available%20at%3A%20https%3A//hsp-iit.github.io/fsosar/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04125v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Baseline%2520Study%2520and%2520Benchmark%2520for%2520Few-Shot%2520Open-Set%2520Action%2520Recognition%2520with%2520Feature%2520Residual%2520Discrimination%26entry.906535625%3DStefano%2520Berti%2520and%2520Giulia%2520Pasquale%2520and%2520Lorenzo%2520Natale%26entry.1292438233%3DFew-Shot%2520Action%2520Recognition%2520%2528FS-AR%2529%2520has%2520shown%2520promising%2520results%2520but%2520is%2520often%2520limited%2520by%2520a%2520closed-set%2520assumption%2520that%2520fails%2520in%2520real-world%2520open-set%2520scenarios.%2520While%2520Few-Shot%2520Open-Set%2520%2528FSOS%2529%2520recognition%2520is%2520well {"title": "TaxonRL: Reinforcement Learning with Intermediate Rewards for Interpretable Fine-Grained Visual Reasoning", "author": "Maximilian von Klinski and Maximilian Schall", "abstract": "Traditional vision-language models struggle with contrastive fine-grained taxonomic reasoning, particularly when distinguishing between visually similar species within the same genus or family. We introduce TaxonRL, a reinforcement learning approach using Group Relative Policy Optimization with intermediate rewards that decomposes the reasoning process into hierarchical taxonomic predictions. Our method incentivizes models to explicitly reason about species-level, genus-level, and family-level features before making final classifications. This structured approach is designed not only to boost accuracy but also to yield a transparent, verifiable decision-making process. On the challenging Birds-to-Words dataset, TaxonRL achieves 91.7\\% average accuracy, exceeding human performance (77.3\\%) while generating interpretable reasoning traces. We demonstrate strong cross-domain generalization, showing substantial gains in primate and marine species verification. Our results establish that enforcing structured, hierarchical reasoning provides a powerful and transferable framework for fine-grained visual discrimination.", "link": "http://arxiv.org/abs/2603.04380v1", "date": "2026-03-04", "relevancy": 2.6199, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5293}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5293}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html" {"title": "GeoTop: Advancing Image Classification with Geometric-Topological Analysis", "author": "Mariem Abaach and Ian Morilla", "abstract": "A fundamental challenge in diagnostic imaging is the phenomenon of topological equivalence, where benign and malignant structures share global topology but differ in critical geometric detail, leading to diagnostic errors in both conventional and deep learning models. We introduce GeoTop, a mathematically principled framework that unifies Topological Data Analysis (TDA) and Lipschitz-Killing Curvatures (LKCs) to resolve this ambiguity. Unlike hybrid deep learning approaches, GeoTop provides intrinsic interpretability by fusing the capacity of persistent homology to identify robust topological signatures with the precision of LKCs in quantifying local geometric features such as boundary complexity and surface regularity.\n  The framework's clinical utility is demonstrated through its application to skin lesion classification, where it achieves a consistent accuracy improvement of 3.6% and reduces false positives and negatives by 15-18% compared to conventional single-modality methods. Crucially, GeoTop directly addresses the problem of topological equivalence by incorporating geometric differentiators, providing both theoretical guarantees (via a formal lemma) and empirical validation via controlled benchmarks. Beyond its predictive performance, GeoTop offers inherent mathematical interpretability through persistence diagrams and curvature-based descriptors, computational efficiency for large datasets (processing 224x224 pixel images in less or equal 0.5 s), and demonstrated generalisability to molecular-level data.\n  By unifying topological invariance with geometric sensitivity, GeoTop provides a principled, interpretable solution for advanced shape discrimination in diagnostic imaging.", "link": "http://arxiv.org/abs/2311.16157v2", "date": "2026-03-04", "relevancy": 2.5961, "topK": [{"title": "TAMM: TriAdapter Multi-Modal {"title": "CubeComposer: Spatio-Temporal Autoregressive 4K 360\u00b0 Video Generation from Perspective Video", "author": "Lingen Li and Guangzhi Wang and Xiaoyu Li and Zhaoyang Zhang and Qi Dou and Jinwei Gu and Tianfan Xue and Ying Shan", "abstract": "Generating high-quality 360\u00b0 panoramic videos from perspective input is one of the crucial applications for virtual reality (VR), whereby high-resolution videos are especially important for immersive experience. Existing methods are constrained by computational limitations of vanilla diffusion models, only supporting $\\leq$ 1K resolution native generation and relying on suboptimal post super-resolution to increase resolution. We introduce CubeComposer, a novel spatio-temporal autoregressive diffusion model that natively generates 4K-resolution 360\u00b0 videos. By decomposing videos into cubemap representations with six faces, CubeComposer autoregressively synthesizes content in a well-planned spatio-temporal order, reducing memory demands while enabling high-resolution output. Specifically, to address challenges in multi-dimensional autoregression, we propose: (1) a spatio-temporal autoregressive strategy that orchestrates 360\u00b0 video generation across cube faces and time windows for coherent synthesis; (2) a cube face context management mechanism, equipped with a sparse context attention design to improve efficiency; and (3) continuity-aware techniques, including cube-aware positional encoding, padding, and blending to eliminate boundary seams. Extensive experiments on benchmark datasets demonstrate that CubeComposer outperforms state-of-the-art methods in native resolution and visual quality, supporting practical VR application scenarios. Project page: https://lg-li.github.io/project/cubecomposer", "link": "http://arxiv.org/abs/2603.04291v1", "date": "2026-03-04", "relevancy": 2.5637, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6727}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6346}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6346}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CubeComposer%3A%20Spatio-Temporal%20Autoregressive%204K%20360%C2%B0%20Video%20Generation%20from%20Perspective%20Video&body=Title%3A%20CubeComposer%3A%20Spatio-Temporal%20Autoregressive%204K%20360%C2%B0%20Video%20Generation%20from%20Perspective%20Video%0AAuthor%3A%20Lingen%20Li%20and%20Guangzhi%20Wang%20and%20Xiaoyu%20Li%20and%20Zhaoyang%20Zhang%20and%20Qi%20Dou%20and%20Jinwei%20Gu%20and%20Tianfan%20Xue%20and%20Ying%20Shan%0AAbstract%3A%20Generating%20high-quality%20360%C2%B0%20panoramic%20videos%20from%20perspective%20input%20is%20one%20of%20the%20crucial%20applications%20for%20virtual%20reality%20%28VR%29%2C%20whereby%20high-resolution%20videos%20are%20especially%20important%20for%20immersive%20experience.%20Existing%20methods%20are%20constrained%20by%20computational%20limitations%20of%20vanilla%20diffusion%20models%2C%20only%20supporting%20%24%5Cleq%24%201K%20resolution%20native%20generation%20and%20relying%20on%20suboptimal%20post%20super-resolution%20to%20increase%20resolution.%20We%20introduce%20CubeComposer%2C%20a%20novel%20spatio-temporal%20autoregressive%20diffusion%20model%20that%20natively%20generates%204K-resolution%20360%C2%B0%20videos.%20By%20decomposing%20videos%20into%20cubemap%20representations%20with%20six%20faces%2C%20CubeComposer%20autoregressively%20synthesizes%20content%20in%20a%20well-planned%20spatio-temporal%20order%2C%20reducing%20memory%20demands%20while%20enabling%20high-resolution%20output.%20Specifically%2C%20to%20address%20challenges%20in%20multi-dimensional%20autoregression%2C%20we%20propose%3A%20%281%29%20a%20spatio-temporal%20autoregressive%20strategy%20that%20orchestrates%20360%C2%B0%20video%20generation%20across%20cube%20faces%20and%20time%20windows%20for%20coherent%20synthesis%3B%20%282%29%20a%20cube%20face%20context%20management%20mechanism%2C%20equipped%20with%20a%20sparse%20context%20attention%20design%20to%20improve%20efficiency%3B%20and%20%283%29%20continuity-aware%20techniques%2C%20including%20cube-aware%20positional%20encoding%2C%20padding%2C%20and%20blending%20to%20eliminate%20boundary%20seams.%20Extensive%20experiments%20on%20benchmark%20datasets%20demonstrate%20that%20CubeComposer%20outperforms%20state-of-the-art%20methods%20in%20native%20resolution%20and%20visual%20quality%2C%20supporting%20practical%20VR%20application%20scenarios.%20Project%20page%3A%20https%3A//lg-li.github.io/project/cubecomposer%0ALink%3A%20http%3A//arxiv.org/abs/2603.04291v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCubeComposer%253A%2520Spatio-Temporal%2520Autoregressive%25204K%2520360%25C2%25B0%2520Video%2520Generation%2520from%2520Perspective%2520Video%26entry.906535625%3DLingen%2520Li%2520and%2520Guangzhi%2520Wang%2520and%2520Xiaoyu%2520Li%2520and%2520Zhaoyang%2520Zhang%2520and%2520Qi%2520Dou%2520and%2520Jinwei%2520Gu%2520and%2520Tianfan%2520Xue%2520and%2520Ying%2520Shan%26entry.1292438233%3DGenerating%2520high-quality%2520360%25C2%25B0%2520panoramic%2520videos%2520from%2520perspective%2520input%2520is%2520one%2520of%2520the%2520crucial%2520applications%2520for%2520virtual%2520reality%2520%2528VR%2529%252C%2520whereby%2520high-resolution%2520videos%2520are%2520especially%2520important%2520for%2520immersive%2520experience.%2520Existing%2520methods%2520are%2520constrained%2520by%2520computational%2520limitations%2520of%2520vanilla%2520diffusion%2520models%252C%2520only%2520supporting%2520%2524%255Cleq%2524%25201K%2520resolution%2520native%2520generation%2520and%2520relying%2520on%2520suboptimal%2520post%2520super-resolution%2520to%2520incre {"title": "NRR-Core: Non-Resolution Reasoning as a Computational Framework for Contextual Identity and Ambiguity Preservation", "author": "Kei Saito", "abstract": "Current artificial intelligence systems exhibit a fundamental architectural limitation: they resolve ambiguity prematurely. This premature semantic collapse--collapsing multiple valid interpretations into single outputs--stems from classical identity assumptions in neural architectures. We propose Non-Resolution Reasoning (NRR), a framework treating ambiguity retention as a valid reasoning mode. NRR introduces three principles: (1) Non-Identity ($A \\neq A$)--the same symbol refers to different entities across contexts; (2) Approximate Identity ($A \\approx A$)--entities share partial structural overlap without being identical; (3) Non-Resolution--conflicting interpretations coexist without forced convergence. We formalize these through Multi-Vector Embeddings for context-dependent representation, Non-Collapsing Attention for parallel interpretation retention, and Contextual Identity Tracking (CIT) for maintaining $A \\neq A$ across inference. We illustrate NRR through case studies in paradox handling, creative generation, and context-dependent reasoning. Functional verification in a synthetic two-turn disambiguation task shows NRR-lite maintains high entropy ($H = 0.91$ bits, near-maximum $1.0$) at ambiguous turns while standard architectures collapse early ($H = 0.15$ bits), preserving interpretive flexibility until context arrives. NRR challenges the assumption that meaning must collapse to be useful. The question is not whether AI should resolve ambiguity, but when, how, and under whose control.", "link": "http://arxiv.org/abs/2512.13478v9", "date": "2026-03-04", "relevancy": 2.5437, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Con {"title": "Multimodal Large Language Models for Low-Resource Languages: A Case Study for Basque", "author": "Lukas Arana and Julen Etxaniz and Ander Salaberria and Gorka Azkune", "abstract": "Current Multimodal Large Language Models exhibit very strong performance for several demanding tasks. While commercial MLLMs deliver acceptable performance in low-resource languages, comparable results remain unattained within the open science community. In this paper, we aim to develop a strong MLLM for a low-resource language, namely Basque. For that purpose, we develop our own training and evaluation image-text datasets. Using two different Large Language Models as backbones, the Llama-3.1-Instruct model and a Basque-adapted variant called Latxa, we explore several data mixtures for training. We show that: i) low ratios of Basque multimodal data (around 20%) are already enough to obtain solid results on Basque benchmarks, and ii) contrary to expected, a Basque instructed backbone LLM is not required to obtain a strong MLLM in Basque. Our results pave the way to develop MLLMs for other low-resource languages by openly releasing our resources.", "link": "http://arxiv.org/abs/2511.09396v2", "date": "2026-03-04", "relevancy": 2.5327, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5086}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5086}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5024}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Large%20Language%20Models%20for%20Low-Resource%20Languages%3A%20A%20Case%20Study%20for%20Basque&body=Title%3A%20Multimodal%20Large%20Language%20Models%20for%20Low-Resource%20Languages%3A%20A%20Case%20Study%20for%20Basque%0AAuthor%3A%20Lukas%20Arana%20and%20Julen%20Etxaniz%20and%20Ander%20Salaberria%20and%20Gorka%20Azkune%0AAbstract%3A%20Current%20Multimodal%20Large%20Language%20Models%20exhibit%20very%20strong%20performance%20for%20several%20demanding%20tasks.%20While%20commercial%20MLLMs%20deliver%20acceptable%20performance%20in%20low-resource%20languages%2C%20comparable%20results%20remain%20unattained%20within%20the%20open%20science%20community.%20In%20this%20paper%2C%20we%20aim%20to%20develop%20a%20strong%20MLLM%20for%20a%20low-resource%20language%2C%20namely%20Basque.%20For%20that%20purpose%2C%20we%20develop%20our%20own%20training%20and%20evaluation%20image-text%20datasets.%20Using%20two%20different%20Large%20Language%20Models%20as%20backbones%2C%20the%20Llama-3.1-Instruct%20model%20and%20a%20Basque-adapted%20variant%20called%20Latxa%2C%20we%20explore%20several%20data%20mixtures%20for%20training.%20We%20show%20that%3A%20i%29%20low%20ratios%20of%20Basque%20multimodal%20data%20%28around%2020%25%29%20are%20already%20enough%20to%20obtain%20solid%20results%20on%20Basque%20benchmarks%2C%20and%20ii%29%20contrary%20to%20expected%2C%20a%20Basque%20instructed%20backbone%20LLM%20is%20not%20required%20to%20obtain%20a%20strong%20MLLM%20in%20Basque.%20Our%20results%20pave%20the%20way%20to%20develop%20MLLMs%20for%20other%20low-resource%20languages%20by%20openly%20releasing%20our%20resources.%0ALink%3A%20http%3A//arxiv.org/abs/2511.09396v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultimodal%2520Large%2520Language%2520Models%2520for%2520Low-Resource%2520Languages%253A%2520A%2520Case%2520Study%2520for%2520Basque%26entry.906535625%3DLukas%2520Arana%2520and%2520Julen%2520Etxaniz%2520and%2520Ander%2520Salaberria%2520and%2520Gorka%2520Azkune%26entry.1292438233%3DCurrent%2520Multimodal%2520Large%2520Language%2520Models%2520exhibit%2520very%2520strong%2520performance%2520for%2520severa {"title": "NOVA3R: Non-pixel-aligned Visual Transformer for Amodal 3D Reconstruction", "author": "Weirong Chen and Chuanxia Zheng and Ganlin Zhang and Andrea Vedaldi and Daniel Cremers", "abstract": "We present NOVA3R, an effective approach for non-pixel-aligned 3D reconstruction from a set of unposed images in a feed-forward manner. Unlike pixel-aligned methods that tie geometry to per-ray predictions, our formulation learns a global, view-agnostic scene representation that decouples reconstruction from pixel alignment. This addresses two key limitations in pixel-aligned 3D: (1) it recovers both visible and invisible points with a complete scene representation, and (2) it produces physically plausible geometry with fewer duplicated structures in overlapping regions. To achieve this, we introduce a scene-token mechanism that aggregates information across unposed images and a diffusion-based 3D decoder that reconstructs complete, non-pixel-aligned point clouds. Extensive experiments on both scene-level and object-level datasets demonstrate that NOVA3R outperforms state-of-the-art methods in terms of reconstruction accuracy and completeness.", "link": "http://arxiv.org/abs/2603.04179v1", "date": "2026-03-04", "relevancy": 2.5305, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6357}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6357}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6173}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NOVA3R%3A%20Non-pixel-aligned%20Visual%20Transformer%20for%20Amodal%203D%20Reconstruction&body=Title%3A%20NOVA3R%3A%20Non-pixel-aligned%20Visual%20Transformer%20for%20Amodal%203D%20Reconstruction%0AAuthor%3A%20Weirong%20Chen%20and%20C ard%2520manner.%2520Unlike%2520pixel-aligned%2520methods%2520that%2520tie%2520geometry%2520to%2520per-ray%2520predictions%252C%2520our%2520formulation%2520learns%2520a%2520global%252C%2520view-agnostic%2520scene%2520representation%2520that%2520decouples%2520reconstruction%2520from%2520pixel%2520alignment.%2520This%2520addresses%2520two%2520key%2520limitations%2520in%2520pixel-aligned%25203D%253A%2520%25281%2529%2520it%2520recovers%2520both%2520visible%2520and%2520invisible%2520points%2520with%2520a%2520complete%2520scene%2520representation%252C%2520and%2520%25282%2529%2520it%2520produces%2520physically%2520plausible%2520geometry%2520with%2520fewer%2520duplicated%2520structures%2520in%2520overlapping%2520regions.%2520To%2520achieve%2520this%252C%2520we%2520introduce%2520a%2520scene-token%2520mechanism%2520that%2520aggregates%2520information%2520across%2520unposed%2520images%2520and%2520a%2520diffusion-based%25203D%2520decoder%2520that%2520reconstructs%2520complete%252C%2520non-pixel-aligned%2520point%2520clouds.%2520Extensive%2520experiments%2520on%2520both%2520scene-level%2520and%2520object-level%2520datasets%2520demonstrate%2520that%2520NOVA3R%2520outperforms%2520state-of-the-art%2520methods%2520in%2520terms%2520of%2520reconstruction%2520accuracy%2520and%2520completeness.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04179v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NOVA3R%3A%20Non-pixel-aligned%20Visual%20Transformer%20for%20Amodal%203D%20Reconstruction&entry.906535625=Weirong%20Chen%20and%20Chuanxia%20Zheng%20and%20Ganlin%20Zhang%20and%20Andrea%20Vedaldi%20and%20Daniel%20Cremers&entry.1292438233=We%20present%20NOVA3R%2C%20an%20effective%20approach%20for%20non-pixel-aligned%203D%20reconstruction%20from%20a%20set%20of%20unposed%20images%20in%20a%20feed-forward%20manner.%20Unlike%20pixel-aligned%20methods%20that%20tie%20geometry%20to%20per-ray%20predic {"title": "Photo3D: Advancing Photorealistic 3D Generation through Structure-Aligned Detail Enhancement", "author": "Xinyue Liang and Zhinyuan Ma and Lingchen Sun and Yanjun Guo and Lei Zhang", "abstract": "Although recent 3D-native generators have made great progress in synthesizing reliable geometry, they still fall short in achieving realistic appearances. A key obstacle lies in the lack of diverse and high-quality real-world 3D assets with rich texture details, since capturing such data is intrinsically difficult due to the diverse scales of scenes, non-rigid motions of objects, and the limited precision of 3D scanners. We introduce Photo3D, a framework for advancing photorealistic 3D generation, which is driven by the image data generated by the GPT-4o-Image model. Considering that the generated images can distort 3D structures due to their lack of multi-view consistency, we design a structure-aligned multi-view synthesis pipeline and construct a detail-enhanced multi-view dataset paired with 3D geometry. Building on it, we present a realistic detail enhancement scheme that leverages perceptual feature adaptation and semantic structure matching to enforce appearance consistency with realistic details while preserving the structural consistency with the 3D-native geometry. Our scheme is general to different 3D-native generators, and we present dedicated training strategies to facilitate the optimization of geometry-texture coupled and decoupled 3D-native generation paradigms. Experiments demonstrate that Photo3D generalizes well across diverse 3D-native generation paradigms and achieves state-of-the-art photorealistic 3D generation performance.", "link": "http://arxiv.org/abs/2512.08535v2", "date": "2026-03-04", "relevancy": 2.5261, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6354}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6354}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.612}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Photo3D%3A%20Advancing%20Photorealistic%203D%20Generation%20through%20Structure-Aligned%20Detail%20Enhancement&body=Title%3A%20Photo3D%3A%20Advancing%20Photorealistic%203D%20Generation%20through%20Structure-Aligned%20Detail%20Enhancement%0AAuthor%3A%20Xinyue%20Liang%20and%20Zhinyuan%20Ma%20and%20Lingchen%20Sun%20and%20Yanjun%20Guo%20and%20Lei%20Zhang%0AAbstract%3A%20Although%20recent%203D-native%20generators%20have%20made%20great%20progress%20in%20synthesizing%20reliable%20geometry%2C%20they%20still%20fall%20short%20in%20achieving%20realistic%20appearances.%20A%20key%20obstacle%20lies%20in%20the%20lack%20of%20diverse%20and%20high-quality%20real-world%203D%20assets%20with%20rich%20texture%20details%2C%20since%20capturing%20such%20data%20is%20intrinsically%20difficult%20due%20to%20the%20diverse%20scales%20of%20scenes%2C%20non-rigid%20motions%20of%20objects%2C%20and%20the%20limited%20precision%20of%203D%20scanners.%20We%20introduce%20Photo3D%2C%20a%20framework%20for%20advancing%20photorealistic%203D%20generation%2C%20which%20is%20driven%20by%20the%20image%20data%20generated%20by%20the%20GPT-4o-Image%20model.%20Considering%20that%20the%20generated%20images%20can%20distort%203D%20structures%20due%20to%20their%20lack%20of%20multi-view%20consistency%2C%20we%20design%20a%20structure-aligned%20multi-view%20synthesis%20pipeline%20and%20construct%20a%20detail-enhanced%20multi-view%20dataset%20paired%20with%203D%20geometry.%20Building%20on%20it%2C%20we%20present%20a%20realistic%20detail%20enhancement%20scheme%20that%20leverages%20perceptual%20feature%20adaptation%20and%20semantic%20structure%20matching%20to%20enforce%20appearance%20consistency%20with%20realistic%20details%20while%20preserving%20the%20structural%20consistency%20with%20the%203D-native%20geometry.%20Our%20scheme%20is%20general%20to%20different%203D-native%20generators%2C%20and%20we%20present%20dedicated%20training%20strategies%20to%20facilitate%20the%20optimization%20of%20geometry-texture%20coupled%20and%20decoupled%203D-native%20generation%20paradigms.%20Experiments%20demonstrate%20that%20Photo3D%20generalizes%20well%20across%20diverse%203D-native%20generation%20paradigms%20and%20achieves%20state-of-the-art%20photorealistic%203D%20generation%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2512.08535v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhoto3D%253A%2520Advancing%2520Photorealistic%25203D%2520Generation%2520through%2520Structure-Aligned%2520Detail%2520Enhancement%26entry.906535625%3DXinyue%2520Liang%2520and%2520Zhinyuan%2520Ma%2520and%2520Lingchen%2520Sun%2520and%2520Yanjun%2520Guo%2520and%2520Lei%2520Zhang%26entry.1292438233%3DAlthough%2520recent%25203D-native%2520generators%2520have%2520made%2520great%2520progress%2520in%2520synthesizing%2520reliable%2520geometry%252C%2520they%2520still%2520fall%2520short%2520in%2520achieving%2520realistic%2520appearances.%2520A%2520key%2520obstacle%2520lies%2520in%2520the%2520lack%2520of%2520diverse%2520and%2520high-quality%2520real-world%25203D%2520assets%2520with%2520rich%2520texture%2520details%252C%2520since%2520capturing%2520such%2520data%2520is%2520intrinsically%2520difficult%2520due%2520to%2520the%2520diverse%2520scales%2520of%2520scenes%252C%2520non-rigid%2520motions%2520of%2520objects%252C%2520and%2520the%2520limited%2520precision%2520of%25203D%2520scanners.%2520We%2520introduce%2520Photo3D%252C%2520a%2520framework%2520for%2520advancing%2520photorealistic%25203D%2520generation%252C%2520which%2520is%2520driven%2520by%2520the%2520image%2520data%2520generated%2520by%2520the%2520GPT-4o-Image%2520model.%2520Considering%2520that%2520the%2520generated%2520images%2520can%2520distort%25203D%2520structures%2520due%2520to%2520their%2520lack%2520of%2520multi-view%2520consistency%252C%2520we%2520design%2520a%2520structure-aligned%2520multi-view%2520synthesis%2520pipeline%2520and%2520construct%2520a%2520detail-enhanced%2520multi-view%2520dataset%2520paired%2520with%25203D%2520geometry.%2520Building%2520on%2520it%252C%2520we%2520present%2520a%2520realistic%2520detail%2520enhancement%2520scheme%2520that%2520leverages%2520perceptual%2520feature%2520adaptation%2520and%2520semantic%2520structure%2520matching%2520to%2520enforce%2520appearance%2520consistency%2520with%2520realistic%2520details%2520while%2520preserving%2520the%2520structural%2520consistency%2520with%2520the%25203D-native%2520geometry.%2520Our%2520scheme%2520is%2520general%2520to%2520different%25203D-native%2520generators%252C%2520and%2520we%2520present%2520dedicated%2520training%2520strategies%2520to%2520facilitate%2520the%2520optimization%2520of%2520geometry-texture%2520coupled%2520and%2520decoupled%25203D-native%2520generation%2520paradigms.%2520Experiments%2520demonstrate%2520that%2520Photo3D%2520generalizes%2520well%2520across%2520diverse%25203D-native%2520generation%2520paradigms%2520and%2520achieves%2520state-of-the-art%2520photorealistic%25203D%2520generation%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.08535v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Photo3D%3A%20Advancing%20Photorealistic%203D%20Generation%20through%20Structure-Aligned%20Detail%20Enhancement&entry.906535625=Xinyue%20Liang%20and%20Zhinyuan%20Ma%20and%20Lingchen%20Sun%20and%20Yanjun%20Guo%20and%20Lei%20Zhang&entry.1292438233=Although%20recent%203D-native%20generators%20have%20made%20great%20progress%20in%20synthesizing%20reliable%20geometry%2C%20they%20still%20fall%20short%20in%20achieving%20realistic%20appearances.%20A%20key%20obstacle%20lies%20in%20the%20lack%20of%20diver {"title": "Specialization of softmax attention heads: insights from the high-dimensional single-location model", "author": "M. Sagitova and O. Duranthon and L. Zdeborov\u00e1", "abstract": "Multi-head attention enables transformer models to represent multiple attention patterns simultaneously. Empirically, head specialization emerges in distinct stages during training, while many heads remain redundant and learn similar representations. We propose a theoretical model capturing this phenomenon, based on the multi-index and single-location regression frameworks. In the first part, we analyze the training dynamics of multi-head softmax attention under SGD, revealing an initial unspecialized phase followed by a multi-stage specialization phase in which different heads sequentially align with latent signal directions. In the second part, we study the impact of attention activation functions on performance. We show that softmax-1 significantly reduces noise from irrelevant heads. Finally, we introduce the Bayes-softmax attention, which achieves optimal prediction performance in this setting.", "link": "http://arxiv.org/abs/2603.03993v1", "date": "2026-03-04", "relevancy": 2.5189, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5144}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5077}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4892}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Specialization%20of%20softmax%20attention%20heads%3A%20insights%20from%20the%20high-dimensional%20single-location%20model&body=Title%3A%20Specialization%20of%20softmax%20attention%20heads%3A%20insights%20from%20the%20high-dimensional%20single-location%20model%0AAutho

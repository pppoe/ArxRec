{"title": "ProFound: A moderate-sized vision foundation model for multi-task prostate imaging", "author": "Yipei Wang and Yinsong Xu and Weixi Yi and Shaheer Ullah Saeed and Natasha Thorley and Alexander Ng and Yukun Zhou and Wen Yan and Dean Barratt and Shonit Punwani and Veeru Kasivisvanathan and Mark Emberton and Daniel C. Alexander and Yipeng Hu", "abstract": "Many diagnostic and therapeutic clinical tasks for prostate cancer increasingly rely on multi-parametric MRI. Automating these tasks is challenging because they necessitate expert interpretations, which are difficult to scale to capitalise on modern deep learning. Although modern automated systems achieve expert-level performance in isolated tasks, their general clinical utility remains limited by the requirement of large task-specific labelled datasets. In this paper, we present ProFound, a domain-specialised vision foundation model for volumetric prostate mpMRI. ProFound is pre-trained using several variants of self-supervised approaches on a diverse, multi-institutional collection of 5,000 patients, with a total of over 22,000 unique 3D MRI volumes (over 1,800,000 2D image slices). We conducted a systematic evaluation of ProFound across a broad spectrum of $11$ downstream clinical tasks on over 3,000 independent patients, including prostate cancer detection, Gleason grading, lesion localisation, gland volume estimation, zonal and surrounding structure segmentation. Experimental results demonstrate that finetuned ProFound consistently outperforms or remains competitive with state-of-the-art specialised models and existing medical vision foundation models trained/finetuned on the same data.", "link": "http://arxiv.org/abs/2603.03961v1", "date": "2026-03-04", "relevancy": 2.314, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5929}, {"title": "Lexicon3D: Probing Visual Foundation Models for {"title": "Scriboora: Rethinking Human Pose Forecasting", "author": "Daniel Bermuth and Alexander Poeppel and Wolfgang Reif", "abstract": "Human pose forecasting predicts future poses based on past observations, and has many significant applications in areas such as action recognition, autonomous driving or human-robot interaction. This paper evaluates a wide range of pose forecasting algorithms in the task of absolute pose forecasting, revealing many reproducibility issues, and provides a unified training and evaluation pipeline. After drawing a high-level analogy to the task of speech understanding, it is shown that recent speech models can be efficiently adapted to the task of pose forecasting, and improve current state-of-the-art performance. Finally, the robustness of the models is evaluated, using noisy joint coordinates obtained from a pose estimation model, to reflect a realistic type of noise, which is closer to real-world applications. For this a new dataset variation is introduced, and it is shown that estimated poses result in a substantial performance degradation, and how much of it can be recovered again by unsupervised finetuning.", "link": "http://arxiv.org/abs/2511.15565v2", "date": "2026-03-04", "relevancy": 2.3118, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6005}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5864}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scriboora%3A%20Rethinking%20Human%20Pose%20Forecasting&body=Title%3A%20Scriboora%3A%20Rethinking%20Human%20Pose%20Forecasting%0AAuthor%3A%20Daniel%20Bermuth%20and%20Alexander%20Poeppel%20and%20Wolfgang%20Reif%0AAbstract%3A%20Human%20pose%20forecasting%20predicts%20future%20poses%20based%20on%20past%20observations%2C%20and%20has%20many%20significant%20applications%20in%20areas%20such%20as%20action%20recognition%2C%20autonomous%20driving%20or%20human-robot%20interaction.%20This%20paper%20evaluates%20a%20wide%20range%20of%20pose%20forecasting%20algorithms%20in%20the%20task%20of%20absolute%20pose%20forecasting%2C%20revealing%20many%20reproducibility%20issues%2C%20and%20provides%20a%20unified%20training%20and%20evaluation%20pipeline.%20After%20drawing%20a%20high-level%20analogy%20to%20the%20task%20of%20speech%20understanding%2C%20it%20is%20shown%20that%20recent%20speech%20models%20can%20be%20efficiently%20adapted%20to%20the%20task%20of%20pose%20forecasting%2C%20and%20improve%20current%20state-of-the-art%20performance.%20Finally%2C%20the%20robustness%20of%20the%20models%20is%20evaluated%2C%20using%20noisy%20joint%20coordinates%20obtained%20from%20a%20pose%20estimation%20model%2C%20to%20reflect%20a%20realistic%20type%20of%20noise%2C%20which%20is%20closer%20to%20real-world%20applications.%20For%20this%20a%20new%20dataset%20variation%20is%20introduced%2C%20and%20it%20is%20shown%20that%20estimated%20poses%20result%20in%20a%20substantial%20performance%20degradation%2C%20and%20how%20much%20of%20it%20can%20be%20recovered%20again%20by%20unsupervised%20finetuning.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15565v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScriboora%253A%2520Rethinking%2520Human%2520Pose%2520Forecasting%26entry.906535625%3DDaniel%2520Bermuth%2520and%2520Alexander%2520Poeppel%2520and%2520Wolfgang%2520Reif%26entry.1292438233%3DHuman%2520pose%2520forecasting%2520predicts%2520future%2520poses%2520based%2520on%2520past%2520observations%252C%2520and%2520has%2520many%2520significant%2520applications%2520in%2520areas%2520such%2520as%2520action%2520recognition%252C%2520autonomou {"title": "Phi-4-reasoning-vision-15B Technical Report", "author": "Jyoti Aneja and Michael Harrison and Neel Joshi and Tyler LaBonte and John Langford and Eduardo Salinas", "abstract": "We present Phi-4-reasoning-vision-15B, a compact open-weight multimodal reasoning model, and share the motivations, design choices, experiments, and learnings that informed its development. Our goal is to contribute practical insight to the research community on building smaller, efficient multimodal reasoning models and to share the result of these learnings as an open-weight model that is good at common vision and language tasks and excels at scientific and mathematical reasoning and understanding user interfaces. Our contributions include demonstrating that careful architecture choices and rigorous data curation enable smaller, open-weight multimodal models to achieve competitive performance with significantly less training and inference-time compute and tokens. The most substantial improvements come from systematic filtering, error correction, and synthetic augmentation -- reinforcing that data quality remains the primary lever for model performance. Systematic ablations show that high-resolution, dynamic-resolution encoders yield consistent improvements, as accurate perception is a prerequisite for high-quality reasoning. Finally, a hybrid mix of reasoning and non-reasoning data with explicit mode tokens allows a single model to deliver fast direct answers for simpler tasks and chain-of-thought reasoning for complex problems.", "link": "http://arxiv.org/abs/2603.03975v1", "date": "2026-03-04", "relevancy": 2.3043, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5796}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5796}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5584}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Phi-4-reasoning-vision-15B%20Technical%20Report&body=Title%3A%20Phi-4-reasoning-vision-15B%20Technical%20Report%0AAuthor%3A%20Jyoti%20Aneja%20and%20Michael%20Harrison%20and%20Neel%20Joshi%20and%20Tyler%20LaBonte%20and%20John%20Langford%20and%20Eduardo%20Salinas%0AAbstract%3A%20We%20present%20Phi-4-reasoning-vision-15B%2C%20a%20compact%20open-weight%20multimodal%20reasoning%20model%2C%20and%20share%20the%20motivations%2C%20design%20choices%2C%20experiments%2C%20and%20learnings%20that%20informed%20its%20development.%20Our%20goal%20is%20to%20contribute%20practical%20insight%20to%20the%20research%20community%20on%20building%20smaller%2C%20efficient%20multimodal%20reasoning%20models%20and%20to%20share%20the%20result%20of%20these%20learnings%20as%20an%20open-weight%20model%20that%20is%20good%20at%20common%20vision%20and%20language%20tasks%20and%20excels%20at%20scientific%20and%20mathematical%20reasoning%20and%20understanding%20user%20interfaces.%20Our%20contributions%20include%20demonstrating%20that%20careful%20architecture%20choices%20and%20rigorous%20data%20curation%20enable%20smaller%2C%20open-weight%20multimodal%20models%20to%20achieve%20competitive%20performance%20with%20significantly%20less%20training%20and%20inference-time%20compute%20and%20tokens.%20The%20most%20substantial%20improvements%20come%20from%20systematic%20filtering%2C%20error%20correction%2C%20and%20synthetic%20augmentation%20--%20reinforcing%20that%20data%20quality%20remains%20the%20primary%20lever%20for%20model%20performance.%20Systematic%20ablations%20show%20that%20high-resolution%2C%20dynamic-resolution%20encoders%20yield%20consistent%20improvements%2C%20as%20accurate%20perception%20is%20a%20prerequisite%20for%20high-quality%20reasoning.%20Finally%2C%20a%20hybrid%20mix%20of%20reasoning%20and%20non-reasoning%20data%20with%20explicit%20mode%20tokens%20allows%20a%20single%20model%20to%20deliver%20fast%20direct%20answers%20for%20simpler%20tasks%20and%20chain-of-thought%20reasoning%20for%20complex%20problems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03975v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhi-4-reasoning-vision-15B%2520Technical%2520Report%26entry.906535625%3DJyoti%2520Aneja%2520and%2520Michael%2520Harrison%2520and%2520Neel%2520Joshi%2520and%2520Tyler%2520LaBonte%2520and%2520John%2520Langford%2520and%2520Eduardo%2520Salinas%26entry.1292438233%3DWe%2520present%2520Phi-4-reasoning-vision-15B%252C%2520a%2520compact%2520open-weight%2520multimodal%2520reasoning%2520model%252C%2520and%2520share%2520the%2520motivations%252C%2520design%2520choices%252C%2520experiments%252C%2520and%2520learnings%2520that%2520informed%2520its%2520development.%2520Our%2520goal%2520is%2520to%2520contribute%2520practical%2520insight%2520to%2520the%2520research%2520community%2520on%2520building%2520smaller%252C%2520efficient%2520multimodal%2520reasoning%2520models%2520and%2520to%2520share%2520the%2520result%2520of%2520these%2520learnings%2520as%2520an%2520open-weight%2520model%2520that%2520is%2520good%2520at%2520common%2520vision%2520and%2520language%2520tasks%2520and%2520excels%2520at%2520scientific%2520and%2520mathematical%2520reasoning%2520and%2520understanding%2520user%2520interfaces.%2520Our%2520contributions%2520include%2520demonstrating%2520that%2520careful%2520architecture%2520choices%2520and%2520rigorous%2520data%2520curation%2520enable%2520smaller%252C%2520open-weight%2520multimodal%2520models%2520to%2520achieve%2520competitive%2520performance%2520with%2520significantly%2520less%2520training%2520and%2520inference-time%2520compute%2520and%2520tokens.%2520The%2520most%2520substantial%2520improvements%2520come%2520from%2520systematic%2520filtering%252C%2520error%2520correction%252C%2520and%2520synthetic%2520augmentation%2520--%2520reinforcing%2520that%2520data%2520quality%2520remains%2520the%2520primary%2520lever%2520for%2520model%2520performance.%2520Systematic%2520ablations%2520show%2520that%2520high-resolution%252C%2520dynamic-resolution%2520encoders%2520yield%2520consistent%2520improvements%252C%2520as%2520accurate%2520perception%2520is%2520a%2520prerequisite%2520for%2520high-quality%2520reasoning.%2520Finally%252C%2520a%2520hybrid%2520mix%2520of%2520reasoning%2520and%2520non-reasoning%2520data%2520with%2520explicit%2520mode%2520tokens%2520allows%2520a%2520single%2520model%2520to%2520deliver%2520fast%2520direct%2520answers%2520for%2520simpler%2520tasks%2520and%2520chain-of-thought%2520reasoning%2520for%2520complex%2520problems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03975v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Phi-4-reasoning-vision-15B%20Technical%20Report&entry.906535625=Jyoti%20Aneja%20and%20Michael%20Harrison%20and%20Neel%20Joshi%20and%20Tyler%20LaBonte%20and%20John%20Langford%20and%20Eduardo%20Salinas&entry.1292438233=We%20present%20Phi-4-reasoning-vision-15B%2C%20a%20compact%20open-weight%20multimodal%20reasoning%20model%2C%20and%20share%20the%20motivations%2C%20design%20choices%2C%20experiments%2C%20and%20learnings%20that%20informed%20its%20development.%20Our%20goal%20is%20to%20contribute%20practical%20insight%20to%20the%20research%20community%20on%20building%20smaller%2C%20efficient%20multimodal%20reasoning%20models%20and%20to%20share%20the%20result%20of%20these%20learnings%20as%20an%20open-weight%20model%20that%20is%20good%20at%20common%20vision%20and%20language%20tasks%20and%20excels%20at%20scientific%20and%20mathematical%20reasoning%20and%20understanding%20user%20interfaces.%20Our%20contributions%20include%20demonstrating%20that%20careful%20architecture%20choices%20and%20rigorous%20data%20 {"title": "Hybrid Diffusion Policies with Projective Geometric Algebra for Efficient Robot Manipulation Learning", "author": "Xiatao Sun and Yuxuan Wang and Shuo Yang and Yinxing Chen and Daniel Rakita", "abstract": "Diffusion policies are a powerful paradigm for robot learning, but their training is often inefficient. A key reason is that networks must relearn fundamental spatial concepts, such as translations and rotations, from scratch for every new task. To alleviate this redundancy, we propose embedding geometric inductive biases directly into the network architecture using Projective Geometric Algebra (PGA). PGA provides a unified algebraic framework for representing geometric primitives and transformations, allowing neural networks to reason about spatial structure more effectively. In this paper, we introduce hPGA-DP, a novel hybrid diffusion policy that capitalizes on these benefits. Our architecture leverages the Projective Geometric Algebra Transformer (P-GATr) as a state encoder and action decoder, while employing established U-Net or Transformer-based modules for the core denoising process. Through extensive experiments and ablation studies in both simulated and real-world environments, we demonstrate that hPGA-DP significantly improves task performance and training efficiency. Notably, our hybrid approach achieves substantially faster convergence compared to both standard diffusion policies and architectures that rely solely on P-GATr. The project website is available at: https://apollo-lab-yale.github.io/26-ICRA-hPGA-website/.", "link": "http://arxiv.org/abs/2507.05695v3", "date": "2026-03-04", "relevancy": 2.3003, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5849}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5832}, {"title": "Synthesizing Moving proach%20achieves%20substantially%20faster%20convergence%20compared%20to%20both%20standard%20diffusion%20policies%20and%20architectures%20that%20rely%20solely%20on%20P-GATr.%20The%20project%20website%20is%20available%20at%3A%20https%3A//apollo-lab-yale.github.io/26-ICRA-hPGA-website/.%0ALink%3A%20http%3A//arxiv.org/abs/2507.05695v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHybrid%2520Diffusion%2520Policies%2520with%2520Projective%2520Geometric%2520Algebra%2520for%2520Efficient%2520Robot%2520Manipulation%2520Learning%26entry.906535625%3DXiatao%2520Sun%2520and%2520Yuxuan%2520Wang%2520and%2520Shuo%2520Yang%2520and%2520Yinxing%2520Chen%2520and%2520Daniel%2520Rakita%26entry.1292438233%3DDiffusion%2520policies%2520are%2520a%2520powerful%2520paradigm%2520for%2520robot%2520learning%252C%2520but%2520their%2520training%2520is%2520often%2520inefficient.%2520A%2520key%2520reason%2520is%2520that%2520networks%2520must%2520relearn%2520fundamental%2520spatial%2520concepts%252C%2520such%2520as%2520translations%2520and%2520rotations%252C%2520from%2520scratch%2520for%2520every%2520new%2520task.%2520To%2520alleviate%2520this%2520redundancy%252C%2520we%2520propose%2520embedding%2520geometric%2520inductive%2520biases%2520directly%2520into%2520the%2520network%2520architecture%2520using%2520Projective%2520Geometric%2520Algebra%2520%2528PGA%2529.%2520PGA%2520provides%2520a%2520unified%2520algebraic%2520framework%2520for%2520representing%2520geometric%2520primitives%2520and%2520transformations%252C%2520allowing%2520neural%2520networks%2520to%2520reason%2520about%2520spatial%2520structure%2520more%2520effectively.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520hPGA-DP%252C%2520a%2520novel%2520hybrid%2520diffusion%2520policy%2520that%2520capitalizes%2520on%2520these%2520benefits.%2520Our%2520architecture%2520leverages%2520the%2520Projective%2520Geometric%2520Algebra%2520Transformer%2520%2528P- {"title": "PlaneCycle: Training-Free 2D-to-3D Lifting of Foundation Models Without Adapters", "author": "Yinghong Yu and Guangyuan Li and Jiancheng Yang", "abstract": "Large-scale 2D foundation models exhibit strong transferable representations, yet extending them to 3D volumetric data typically requires retraining, adapters, or architectural redesign. We introduce PlaneCycle, a training-free, adapter-free operator for architecture-agnostic 2D-to-3D lifting of foundation models. PlaneCycle reuses the original pretrained 2D backbone by cyclically distributing spatial aggregation across orthogonal HW, DW, and DH planes throughout network depth, enabling progressive 3D fusion while preserving pretrained inductive biases. The method introduces no additional parameters and is applicable to arbitrary 2D networks. Using pretrained DINOv3 models, we evaluate PlaneCycle on six 3D classification and three 3D segmentation benchmarks. Without any training, the lifted models exhibit intrinsic 3D fusion capability and, under linear probing, outperform slice-wise 2D baselines and strong 3D counterparts, approaching the performance of fully trained models. With full fine-tuning, PlaneCycle matches standard 3D architectures, highlighting its potential as a seamless and practical 2D-to-3D lifting operator. These results demonstrate that 3D capability can be unlocked from pretrained 2D foundation models without structural modification or retraining. Code is available at https://github.com/HINTLab/PlaneCycle.", "link": "http://arxiv.org/abs/2603.04165v1", "date": "2026-03-04", "relevancy": 2.3002, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5822}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5756}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Underst {"title": "DISC: Dense Integrated Semantic Context for Large-Scale Open-Set Semantic Mapping", "author": "Felix Igelbrink and Lennart Niecksch and Martin Atzmueller and Joachim Hertzberg", "abstract": "Open-set semantic mapping enables language-driven robotic perception, but current instance-centric approaches are bottlenecked by context-depriving and computationally expensive crop-based feature extraction. To overcome this fundamental limitation, we introduce DISC (Dense Integrated Semantic Context), featuring a novel single-pass, distance-weighted extraction mechanism. By deriving high-fidelity CLIP embeddings directly from the vision transformer's intermediate layers, our approach eliminates the latency and domain-shift artifacts of traditional image cropping, yielding pure, mask-aligned semantic representations. To fully leverage these features in large-scale continuous mapping, DISC is built upon a fully GPU-accelerated architecture that replaces periodic offline processing with precise, on-the-fly voxel-level instance refinement. We evaluate our approach on standard benchmarks (Replica, ScanNet) and a newly generated large-scale-mapping dataset based on Habitat-Matterport 3D (HM3DSEM) to assess scalability across complex scenes in multi-story buildings. Extensive evaluations demonstrate that DISC significantly surpasses current state-of-the-art zero-shot methods in both semantic accuracy and query retrieval, providing a robust, real-time capable framework for robotic deployment. The full source code, data generation and evaluation pipelines will be made available at https://github.com/DFKI-NI/DISC.", "link": "http://arxiv.org/abs/2603.03935v1", "date": "2026-03-04", "relevancy": 2.2995, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5759}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "ht {"title": "Scalable Evaluation of the Realism of Synthetic Environmental Augmentations in Images", "author": "Damian J. Ruck and Paul Vautravers and Oliver Chalkley and Jake Thomas", "abstract": "Evaluation of AI systems often requires synthetic test cases, particularly for rare or safety-critical conditions that are difficult to observe in operational data. Generative AI offers a promising approach for producing such data through controllable image editing, but its usefulness depends on whether the resulting images are sufficiently realistic to support meaningful evaluation.\n  We present a scalable framework for assessing the realism of synthetic image-editing methods and apply it to the task of adding environmental conditions-fog, rain, snow, and nighttime-to car-mounted camera images. Using 40 clear-day images, we compare rule-based augmentation libraries with generative AI image-editing models. Realism is evaluated using two complementary automated metrics: a vision-language model (VLM) jury for perceptual realism assessment, and embedding-based distributional analysis to measure similarity to genuine adverse-condition imagery.\n  Generative AI methods substantially outperform rule-based approaches, with the best generative method achieving approximately 3.6 times the acceptance rate of the best rule-based method. Performance varies across conditions: fog proves easiest to simulate, while nighttime transformations remain challenging. Notably, the VLM jury assigns imperfect acceptance even to real adverse-condition imagery, establishing practical ceilings against which synthetic methods can be judged. By this standard, leading generative methods match or exceed real-image performance for most conditions.\n  These results suggest that modern generative image-editing models can enable scalable generation of realistic adverse-condition imagery for evaluation pipelines. Our framework therefore provides a practical approach for scalable realism evaluation, though validation against human studies remains an important direction for future work.", "link": "http://arxiv.org/abs/2603.04325v1", "date": "2026-03-04", "relevancy": 2.2974, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5857}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5759}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scalable%20Evaluation%20of%20the%20Realism%20of%20Synthetic%20Environmental%20Augmentations%20in%20Images&body=Title%3A%20Scalable%20Evaluation%20of%20the%20Realism%20of%20Synthetic%20Environmental%20Augmentations%20in%20Images%0AAuthor%3A%20Damian%20J.%20Ruck%20and%20Paul%20Vautravers%20and%20Oliver%20Chalkley%20and%20Jake%20Thomas%0AAbstract%3A%20Evaluation%20of%20AI%20systems%20often%20requires%20synthetic%20test%20cases%2C%20particularly%20for%20rare%20or%20safety-critical%20conditions%20that%20are%20difficult%20to%20observe%20in%20operational%20data.%20Generative%20AI%20offers%20a%20promising%20approach%20for%20producing%20such%20data%20through%20controllable%20image%20editing%2C%20but%20its%20usefulness%20depends%20on%20whether%20the%20resulting%20images%20are%20sufficiently%20realistic%20to%20support%20meaningful%20evaluation.%0A%20%20We%20present%20a%20scalable%20framework%20for%20assessing%20the%20realism%20of%20synthetic%20image-editing%20methods%20and%20apply%20it%20to%20the%20task%20of%20adding%20environmental%20conditions-fog%2C%20rain%2C%20snow%2C%20and%20nighttime-to%20car-mounted%20camera%20images.%20Using%2040%20clear-day%20images%2C%20we%20compare%20rule-based%20augmentation%20libraries%20with%20generative%20AI%20image-editing%20models.%20Realism%20is%20evaluated%20using%20two%20complementary%20automated%20metrics%3A%20a%20vision-language%20model%20%28VLM%29%20jury%20for%20perceptual%20realism%20assessment%2C%20and%20embedding-based%20distributional%20analysis%20to%20measure%20similarity%20to%20genuine%20adverse-condition%20imagery.%0A%20%20Generative%20AI%20methods%20substantially%20outperform%20rule-based%20approaches%2C%20with%20the%20best%20generative%20method%20achieving%20approximately%203.6%20times%20the%20acceptance%20rate%20of%20the%20best%20rule-based%20method.%20Performance%20varies%20across%20conditions%3A%20fog%20proves%20easiest%20to%20simulate%2C%20while%20nighttime%20transformations%20remain%20challenging.%20Notably%2C%20the%20VLM%20jury%20assigns%20imperfect%20acceptance%20even%20to%20real%20adverse-condition%20imagery%2C%20establishing%20practical%20ceilings%20against%20which%20synthetic%20methods%20can%20be%20judged.%20By%20this%20standard%2C%20leading%20generative%20methods%20match%20or%20exceed%20real-image%20performance%20for%20most%20conditions.%0A%20%20These%20results%20suggest%20that%20modern%20generative%20image-editing%20models%20can%20enable%20scalable%20generation%20of%20realistic%20adverse-condition%20imagery%20for%20evaluation%20pipelines.%20Our%20framework%20therefore%20provides%20a%20practical%20approach%20for%20scalable%20realism%20evaluation%2C%20though%20validation%20against%20human%20studies%20remains%20an%20important%20direction%20for%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04325v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScalable%2520Evaluation%2520of%2520the%2520Realism%2520of%2520Synthetic%2520Environmental%2520Augmentations%2520in%2520Images%26entry.906535625%3DDamian%2520J.%2520Ruck%2520and%2520Paul%2520Vautravers%2520and%2520Oliver%2520Chalkley%2520and%2520Jake%2520Thomas%26entry.1292438233%3DEvaluation%2520of%2520AI%2520systems%2520often%2520requires%2520synthetic%2 20to%2520real%2520adverse-condition%2520imagery%252C%2520establishing%2520practical%2520ceilings%2520against%2520which%2520synthetic%2520methods%2520can%2520be%2520judged.%2520By%2520this%2520standard%252C%2520leading%2520generative%2520methods%2520match%2520or%2520exceed%2520real-image%2520performance%2520for%2520most%2520conditions.%250A%2520%2520These%2520results%2520suggest%2520that%2520modern%2520generative%2520image-editing%2520models%2520can%2520enable%2520scalable%2520generation%2520of%2520realistic%2520adverse-condition%2520imagery%2520for%2520evaluation%2520pipelines.%2520Our%2520framework%2520therefore%2520provides%2520a%2520practical%2520approach%2520for%2520scalable%2520realism%2520evaluation%252C%2520though%2520validation%2520against%2520human%2520studies%2520remains%2520an%2520important%2520direction%2520for%2520future%2520work.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04325v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Scalable%20Evaluation%20of%20the%20Realism%20of%20Synthetic%20Environmental%20Augmentations%20in%20Images&entry.906535625=Damian%20J.%20Ruck%20and%20Paul%20Vautravers%20and%20Oliver%20Chalkley%20and%20Jake%20Thomas&entry.1292438233=Evaluation%20of%20AI%20systems%20often%20requires%20synthetic%20test%20cases%2C%20particularly%20for%20rare%20or%20safety-critical%20conditions%20that%20are%20difficult%20to%20observe%20in%20operational%20data.%20Generative%20AI%20offers%20a%20promising%20approach%20for%20producing%20such%20data%20through%20controllable%20image%20editing%2C%20but%20its%20usefulness%20depends%20on%20whether%20the%20resulting%20images%20are%20sufficiently%20realistic%20to%20support%20meaningful%20evaluation.%0A%20%20We%20present%20a%20scalable%20framework%20for%20assessing%20the%20realism%20of%20synthetic%20image-editing%20methods%20and%20apply%20it%20to%20the%20task%20of%20adding%20environmental%20conditions- {"title": "Robust Adversarial Quantification via Conflict-Aware Evidential Deep Learning", "author": "Charmaine Barker and Daniel Bethell and Simos Gerasimou", "abstract": "Reliability of deep learning models is critical for deployment in high-stakes applications, where out-of-distribution or adversarial inputs may lead to detrimental outcomes. Evidential Deep Learning, an efficient paradigm for uncertainty quantification, models predictions as Dirichlet distributions of a single forward pass. However, EDL is particularly vulnerable to adversarially perturbed inputs, making overconfident errors. Conflict-aware Evidential Deep Learning (C-EDL) is a lightweight post-hoc uncertainty quantification approach that mitigates these issues, enhancing adversarial and OOD robustness without retraining. C-EDL generates diverse, task-preserving transformations per input and quantifies representational disagreement to calibrate uncertainty estimates when needed. C-EDL's conflict-aware prediction adjustment improves detection of OOD and adversarial inputs, maintaining high in-distribution accuracy and low computational overhead. Our experimental evaluation shows that C-EDL significantly outperforms state-of-the-art EDL variants and competitive baselines, achieving substantial reductions in coverage for OOD data (up to $\\approx$55%) and adversarial data (up to $\\approx$90%), across a range of datasets, attack types, and uncertainty metrics.", "link": "http://arxiv.org/abs/2506.05937v2", "date": "2026-03-04", "relevancy": 2.2905, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6831}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5749}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5261}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20Adversarial%20Quantification%20via%20Conflict-Aware%20Evidential%20Deep%20Learning&body=Title%3A%20Robust%20Adversarial%20Quantification%20via%20Conflict-Aware%20Evidential%20Deep%20Learning%0AAuthor%3A%20Charmaine%20Barker%20and%20Daniel%20Bethell%20and%20Simos%20Gerasimou%0AAbstract%3A%20Reliability%20of%20deep%20learning%20models%20is%20critical%20for%20deployment%20in%20high-stakes%20applications%2C%20where%20out-of-distribution%20or%20adversarial%20inputs%20may%20lead%20to%20detrimental%20outcomes.%20Evidential%20Deep%20Learning%2C%20an%20efficient%20paradigm%20for%20uncertainty%20quantification%2C%20models%20predictions%20as%20Dirichlet%20distributions%20of%20a%20single%20forward%20pass.%20However%2C%20EDL%20is%20particularly%20vulnerable%20to%20adversarially%20perturbed%20inputs%2C%20making%20overconfident%20errors.%20Conflict-aware%20Evidential%20Deep%20Learning%20%28C-EDL%29%20is%20a%20lightweight%20post-hoc%20uncertainty%20quantification%20approach%20that%20mitigates%20these%20issues%2C%20enhancing%20adversarial%20and%20OOD%20robustness%20without%20retraining.%20C-EDL%20generates%20diverse%2C%20task-preserving%20transformations%20per%20input%20and%20quantifies%20representational%20disagreement%20to%20calibrate%20uncertainty%20estimates%20when%20needed.%20C-EDL%27s%20conflict-aware%20prediction%20adjustment%20improves%20detection%20of%20OOD%20and%20adversarial%20inputs%2C%20maintaining%20high%20in-distribution%20accuracy%20and%20low%20computational%20overhead.%20Our%20experimental%20evaluation%20shows%20that%20C-EDL%20significantly%20outperforms%20state-of-the-art%20EDL%20variants%20and%20competitive%20baselines%2C%20achieving%20substantial%20reductions%20in%20coverage%20for%20OOD%20data%20%28up%20to%20%24%5Capprox%2455%25%29%20and%20adversarial%20data%20%28up%20to%20%24%5Capprox%2490%25%29%2C%20across%20a%20range%20of%20datasets%2C%20attack%20types%2C%20and%20uncertainty%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2506.05937v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobust%2520Adversarial%2520Quantification%2520via%2520Conflict-Aware%2520Evidential%2520Deep%2520Learning%26entry.906535625%3DCharmaine%2520Barker%2520and%2520Daniel%2520Bethell%2520and%2520Simos%2520Gerasimou%26entry.1292438233%3DReliability%2520of%2520deep%2520learning%2520models%2520is%2520critical%2520for%2520deployment%2520in%2520high-stakes%2520applications%252C%2520where%2520out-of-distribution%2520or%2520adversarial%2520inputs%2520may%2520lead%2520to%2520detrimental%2520outcomes.%2520Evidential%2520Deep%2520Learning%252C%2520an%2520efficient%2520paradigm%2520for%2520uncertainty%2520quantification%252C%2520models%2520predictions%2520as%2520Dirichlet%2520distributions%2520of%2520a%2520single%2520forward%2520pass.%2520However%252C%2520EDL%2520is%2520particularly%2520vulnerable%2520to%2520adversarially%2520perturbed%2520inputs%252C%2520making%2520overconfident%2520errors.%2520Conflict-aware%2520Evidential%2520Deep%2520Learning%2520%2528C-EDL%2529%2520is%2520a%2520lightweight%2520post-hoc%2520uncertainty%2520quantification%2520approach%2520that%2520mitigates%2520these%2520issues%252C%2520enhancing%2520adversarial%2520and%2520OOD%2520robustness%2520without%2520retraining.%2520C-EDL%2520generates%2520diverse%252C%2520task-preserving%2520transformations%2520per%2520input%2520and%2520quantifies%2520representational%2520disagreement%2520to%2520calibrate%2520uncertainty%2520estimates%2520when%2520needed.%2520C-EDL%2527s%2520conflict-aware%2520prediction%2520adjustment%2520improves%2520detection%2520of%2520OOD%2520and%2520adversarial%2520inputs%252C%2520maintaining%2520high%2520in-distribution%2520accuracy%2520and%2520low%2520computational%2520overhead.%2520Our%2520experimental%2520evaluation%2520shows%2520that%2520C-EDL%2520significantly%2520outperforms%2520state-of-the-art%2520EDL%2520variants%2520and%2520competitive%2520baselines%252C%2520achieving%2520substantial%2520reductions%2520in%2520coverage%2520for%2520OOD%2520data%2520%2528up%2520to%2520%2524%255Capprox%252455%2525%2529%2520and%2520adversarial%2520data%2520%2528up%2520to%2520%2524%255Capprox%252490%2525%2529%252C%2520across%2520a%2520range%2520of%2520datasets%252C%2520attack%2520types%252C%2520and%2520uncertainty%2520metrics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.05937v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Robust%20Adversarial%20Quantification%20via%20Conflict-Aware%20Evidential%20Deep%20Learning&entry.906535625=Charmaine%20Barker%20and%20Daniel%20Bethell%20and%20Simos%20Gerasimou&entry.1292438233=Reliability%20of%20deep%20learning%20models%20is%20critical%20for%20deployment%20in%20high-stakes%20applications%2C%20where%20out-of-distribution%20or%20adversarial%20inputs%20may%20lead%20to%20detrimental%20outcomes.%20Evidential%20Deep%20Learning%2C%20an%20efficient%20paradigm%20for%20uncertainty%20quantification%2C%20models%20predictions%20as%20Dirichlet%20distributions%20of%20a%20single%20forward%20pass.%20However%2C%20EDL%20is%20particularly%20vulnerable%20to%20adversarially%20perturbed%20inputs%2C%20making%20overconfident%20errors.%20Conflict-aware%20Evidential%20Deep%20Learning%20%28C-EDL%29%20is%20a%20lightweight%20post-hoc%20uncertainty%20quantification%20approach%20that%20mitigates%20these%20issues%2C%20enhancing%20adversarial%20and%20OOD%20robustness%20without%20retraining.%20C-EDL%20generates%20diverse%2C%20task-preserving%20transformations%20per%20input%20and%20quantifies%20representational%20disagreement%20to%20calibrate%20uncertainty%20estimates%20when%20needed.%20C-EDL%27s%20conflict-aware%20prediction%20adjustment%20improves%20detection%20of%20OOD%20and%20adversarial%20inputs%2C%20maintaining%20high%20in-distribution%20accuracy%20and%20low%20computational%20overhead.%20Our%20experimental%20evaluation%20shows%20that%20C-EDL%20significantly%20outperforms%20state-of-the-art%20EDL%20variants%20and%20competitive%20baselines%2C%20achieving%20substantial%20reductions%20in%20coverage%20for%20OOD%20data%20%28up%20to%20%24%5Capprox%2455%25%29%20and%20adversarial%20data%20%28up%20to%20%24%5Capprox%2490%25%29%2C%20across%20a%20range%20of%20datasets%2C%20attack%20types%2C%20and%20uncertainty%20metrics.&entry.1838667208=http%3A//arxiv.org/abs/2506.05937v2&entry.124074799=Read"},
{"title": "Discriminative Perception via Anchored Description for Reasoning Segmentation", "author": "Tao Yang and Qing Zhou and Yanliang Li and Qi Wang", "abstract": "Reasoning segmentation increasingly employs reinforcement learning to generate explanatory reasoning chains that guide Multimodal Large Language Models. While these geometric rewards are primarily confined to guiding the final localization, they are incapable of discriminating whether the reasoning process remains anchored on the referred region or strays into irrelevant context. Lacking this discriminative guidance, the model's reasoning often devolves into unfocused and verbose chains that ultimately fail to disambiguate and perceive the target in complex scenes. This suggests a need to complement the RL objective with Discriminative Perception, an ability to actively distinguish a target from its context. To realize this, we propose DPAD to compel the model to generate a descriptive caption of the referred object, which is then used to explicitly discriminate by contrasting the caption's semantic relevance to the referred object against the wider context. By optimizing for this discriminative capability, the model is forced to focus on the unique attributes of the target, leading to a more converged and efficient reasoning chain. The descriptive caption also serves as an interpretability rationale that aligns with the segmentation. Experiments on the benchmarks confirm the validity of our approach, delivering substantial performance gains, with the cIoU on ReasonSeg increasing by 3.09% and the reasoning chain length decreasing by approximately 42%. Code is available at https://github.com/mrazhou/DPAD", "link": "http://arxiv.org/abs/2603.04002v1", "date": "2026-03-04", "relevancy": 2.2753, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5711}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5711}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Discriminative%20Perception%20via%20Anchored%20Description%20for%20Reasoning%20Segmentation&body=Title%3A%20Discriminative%20Perception%20via%20Anchored%20Description%20for%20Reasoning%20Segmentation%0AAuthor%3A%20Tao%20Yang%20and%20Qing%20Zhou%20and%20Yanliang%20Li%20and%20Qi%20Wang%0AAbstract%3A%20Reasoning%20segmentation%20increasingly%20employs%20reinforcement%20learning%20to%20generate%20explanatory%20reasoning%20chains%20that%20guide%20Multimodal%20Large%20Language%20Models.%20While%20these%20geometric%20rewards%20are%20primarily%20confined%20to%20guiding%20the%20final%20localization%2C%20they%20are%20incapable%20of%20discriminating%20whether%20the%20reasoning%20process%20remains%20anchored%20on%20the%20referred%20region%20or%20strays%20into%20irrelevant%20context.%20Lacking%20this%20discriminative%20guidance%2C%20the%20model%27s%20reasoning%20often%20devolves%20into%20unfocused%20and%20verbose%20chains%20that%20ultimately%20fail%20to%20disambiguate%20and%20perceive%20the%20target%20in%20complex%20scenes.%20This%20suggests%20a%20need%20to%20complement%20the%20RL%20objective%20with%20Discriminative%20Perception%2C%20an%20ability%20to%20actively%20distinguish%20a%20target%20from%20its%20context.%20To%20realize%20this%2C%20we%20propose%20DPAD%20to%20compel%20the%20model%20to%20generate%20a%20descriptive%20caption%20of%20the%20referred%20object%2C%20which%20is%20then%20used%20to%20explicitly%20discriminate%20by%20contrasting%20the%20caption%27s%20semantic%20relevance%20to%20the%20referred%20object%20against%20the%20wider%20context.%20By%20optimizing%20for%20this%20discriminative%20capability%2C%20the%20model%20is%20forced%20to%20focus%20on%20the%20unique%20attributes%20of%20the%20target%2C%20leading%20to%20a%20more%20converged%20and%20efficient%20reasoning%20chain.%20The%20descriptive%20caption%20also%20serves%20as%20an%20interpretability%20rationale%20that%20aligns%20with%20the%20segmentation.%20Experiments%20on%20the%20benchmarks%20confirm%20the%20validity%20of%20our%20approach%2C%20delivering%20substantial%20performance%20gains%2C%20with%20the%20cIoU%20on%20ReasonSeg%20increasing%20by%203.09%25%20and%20the%20reasoning%20chain%20length%20decreasing%20by%20approximately%2042%25.%20Code%20is%20available%20at%20https%3A//github.com/mrazhou/DPAD%0ALink%3A%20http%3A//arxiv.org/abs/2603.04002v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiscriminative%2520Perception%2520via%2520Anchored%2520Description%2520for%2520Reasoning%2520Segmentation%26entry.906535625%3DTao%2520Yang%2520and%2520Qing%2520Zhou%2520and%2520Yanliang%2520Li%2520and%2520Qi%2520Wang%26entry.1292438233%3DReasoning%2520segmentation%2520increasingly%2520employs%2520reinforcement%2520learning%2520to%2520generate%2520explanatory%2520reasoning%2520chains%2520that%2520guide%2520Multimodal%2520Large%2520Language%2520Models.%2520While%2520these%2520geometric%2520rewards%2520are%2520primarily%2520confined%2520to%2520guiding%2520the%2520final%2520localization%252C%2520they%2520are%2520incapable%2520of%2520discriminating%2520whether%2520the%2520reasoning%2520process%2520remains%2520anchored%2520on%2520the%2520referred%2520region%2520or%2520strays%2520into%2520irrelevant%2520context.%2520Lacking%2520this%2520discriminative%2520guidance%252C%2520the%2520model%2527s%2520reasoning%2520often%2520devolves%2520into%2520unfocused%2520and%2520verbose%2520chains%2520that%2520ultimately%2520fail%2520to%2520disambiguate%2520and%2520perceive%2520the%2520target%2520in%2520complex%2520scenes.%2520This%2520suggests%2520a%2520n {"title": "TPK: Trustworthy Trajectory Prediction Integrating Prior Knowledge For Interpretability and Kinematic Feasibility", "author": "Marius Baden and Ahmed Abouelazm and Christian Hubschneider and Yin Wu and Daniel Slieter and J. Marius Z\u00f6llner", "abstract": "Trajectory prediction is crucial for autonomous driving, enabling vehicles to navigate safely by anticipating the movements of surrounding road users. However, current deep learning models often lack trustworthiness as their predictions can be physically infeasible and illogical to humans. To make predictions more trustworthy, recent research has incorporated prior knowledge, like the social force model for modeling interactions and kinematic models for physical realism. However, these approaches focus on priors that suit either vehicles or pedestrians and do not generalize to traffic with mixed agent classes. We propose incorporating interaction and kinematic priors of all agent classes--vehicles, pedestrians, and cyclists with class-specific interaction layers to capture agent behavioral differences. To improve the interpretability of the agent interactions, we introduce DG-SFM, a rule-based interaction importance score that guides the interaction layer. To ensure physically feasible predictions, we proposed suitable kinematic models for all agent classes with a novel pedestrian kinematic model. We benchmark our approach on the Argoverse 2 dataset, using the state-of-the-art transformer HPTR as our baseline. Experiments demonstrate that our method improves interaction interpretability, revealing a correlation between incorrect predictions and divergence from our interaction prior. Even though incorporating the kinematic models causes a slight decrease in accuracy, they eliminate infeasible trajectories found in the dataset and the baseline model. Thus, our approach fosters trust in trajectory prediction as its interaction reasoning is interpretable, and its predictions adhere to physics.", "link": "http://arxiv.org/abs/2505.06743v4", "date": "2026-03-04", "relevancy": 2.2661, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6373}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5718}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5329}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TPK%3A%20Trustworthy%20Trajectory%20Prediction%20Integrating%20Prior%20Knowledge%20For%20Interpretability%20and%20Kinematic%20Feasibility&body=Title%3A%20TPK%3A%20Trustworthy%20Trajectory%20Prediction%20Integrating%20Prior%20Knowledge%20For%20Interpretability%20and%20Kinematic%20Feasibility%0AAuthor%3A%20Marius%20Baden%20and%20Ahmed%20Abouelazm%20and%20Christian%20Hubschneider%20and%20Yin%20Wu%20and%20Daniel%20Slieter%20and%20J.%20Marius%20Z%C3%B6llner%0AAbstract%3A%20Trajectory%20prediction%20is%20crucial%20for%20autonomous%20driving%2C%20enabling%20vehicles%20to%20navigate%20safely%20by%20anticipating%20the%20movements%20of%20surrounding%20road%20users.%20However%2C%20current%20deep%20learning%20models%20often%20lack%20trustworthiness%20as%20their%20predictions%20can%20be%20physically%20infeasible%20and%20illogical%20to%20humans.%20To%20make%20predictions%20more%20trustworthy%2C%20recent%20research%20has%20incorporated%20prior%20knowledge%2C%20like%20the%20social%20force%20model%20for%20modeling%20interactions%20and%20kinematic%20models%20for%20physical%20realism.%20However%2C%20these%20approaches%20focus%20on%20priors%20that%20suit%20either%20vehicles%20or%20pedestrians%20and%20do%20not%20generalize%20to%20traffic%20with%20mixed%20agent%20classes.%20We%20propose%20incorporating%20interaction%20and%20kinematic%20priors%20of%20all%20agent%20classes--vehicles%2C%20pedestrians%2C%20and%20cyclists%20with%20class-specific%20interaction%20layers%20to%20capture%20agent%20behavioral%20differences.%20To%20improve%20the%20interpretability%20of%20the%20agent%20interactions%2C%20we%20introduce%20DG-SFM%2C%20a%20rule-based%20interaction%20importance%20score%20that%20guides%20the%20interaction%20layer.%20To%20ensure%20physically%20feasible%20predictions%2C%20we%20proposed%20suitable%20kinematic%20models%20for%20all%20agent%20classes%20with%20a%20novel%20pedestrian%20kinematic%20model.%20We%20benchmark%20our%20approach%20on%20the%20Argoverse%202%20dataset%2C%20using%20the%20state-of-the-art%20transformer%20HPTR%20as%20our%20baseline.%20Experiments%20demonstrate%20that%20our%20method%20improves%20interaction%20interpretability%2C%20revealing%20a%20correlation%20between%20incorrect%20predictions%20and%20divergence%20from%20our%20interaction%20prior.%20Even%20though%20incorporating%20the%20kinematic%20models%20causes%20a%20slight%20decrease%20in%20accuracy%2C%20they%20eliminate%20infeasible%20trajectories%20found%20in%20the%20dataset%20and%20the%20baseline%20model.%20Thus%2C%20our%20approach%20fosters%20trust%20in%20trajectory%20prediction%20as%20its%20interaction%20reasoning%20is%20interpretable%2C%20and%20its%20predictions%20adhere%20to%20physics.%0ALink%3A%20http%3A//arxiv.org/abs/2505.06743v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTPK%253A%2520Trustworthy%2520Trajectory%2520Prediction%2520Integrating%2520Prior%2520Knowledge%2520For%2520Interpretability%2520and%2520Kinematic%2520Feasibility%26entry.906535625%3DMarius%2520Baden%2520and%2520Ahmed%2520Abouelazm%2520and%2520Christian%2520Hubschneider%2520and%2520Yin%2520Wu%2520and%2520Daniel%2520Slieter%2520and%2520J.%2520Marius%2520Z%25C3%25B6llner%26entry.1292438233%3DTrajectory%2520prediction%2520is%2520crucial%2520for%2520autonomous%2520driving%252C%2520enab between%2520incorrect%2520predictions%2520and%2520divergence%2520from%2520our%2520interaction%2520prior.%2520Even%2520though%2520incorporating%2520the%2520kinematic%2520models%2520causes%2520a%2520slight%2520decrease%2520in%2520accuracy%252C%2520they%2520eliminate%2520infeasible%2520trajectories%2520found%2520in%2520the%2520dataset%2520and%2520the%2520baseline%2520model.%2520Thus%252C%2520our%2520approach%2520fosters%2520trust%2520in%2520trajectory%2520prediction%2520as%2520its%2520interaction%2520reasoning%2520is%2520interpretable%252C%2520and%2520its%2520predictions%2520adhere%2520to%2520physics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.06743v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TPK%3A%20Trustworthy%20Trajectory%20Prediction%20Integrating%20Prior%20Knowledge%20For%20Interpretability%20and%20Kinematic%20Feasibility&entry.906535625=Marius%20Baden%20and%20Ahmed%20Abouelazm%20and%20Christian%20Hubschneider%20and%20Yin%20Wu%20and%20Daniel%20Slieter%20and%20J.%20Marius%20Z%C3%B6llner&entry.1292438233=Trajectory%20prediction%20is%20crucial%20for%20autonomous%20driving%2C%20enabling%20vehicles%20to%20navigate%20safely%20by%20anticipating%20the%20movements%20of%20surrounding%20road%20users.%20However%2C%20current%20deep%20learning%20models%20often%20lack%20trustworthiness%20as%20their%20predictions%20can%20be%20physically%20infeasible%20and%20illogical%20to%20humans.%20To%20make%20predictions%20more%20trustworthy%2C%20recent%20research%20has%20incorporated%20prior%20knowledge%2C%20like%20the%20social%20force%20model%20for%20modeling%20interactions%20and%20kinematic%20models%20for%20physical%20realism.%20However%2C%20these%20approaches%20focus%20on%20priors%20that%20suit%20either%20vehicles%20or%20pedestrians%20and%20do%20not%20generalize%20to%20traffic%20with%20mixed%20agent%20classes.%20We%20propose%20incorporating%20interaction%20and%20kinematic {"title": "End-to-end event reconstruction for precision physics at future colliders", "author": "Dolores Garcia and Lena Herrmann and Gregor Krzmanc and Michele Selvaggi", "abstract": "Future collider experiments require unprecedented precision in measurements of Higgs, electroweak, and flavour observables, placing stringent demands on event reconstruction. The achievable precision on Higgs couplings scales directly with the resolution on visible final state particles and their invariant masses. Current particle flow algorithms rely on detector specific clustering, limiting flexibility during detector design. Here we present an end-to-end global event reconstruction approach that maps charged particle tracks and calorimeter and muon hits directly to particle level objects. The method combines geometric algebra transformer networks with object condensation based clustering, followed by dedicated networks for particle identification and energy regression. Our approach is benchmarked on fully simulated electron positron collisions at FCC-ee using the CLD detector concept. It outperforms the state-of-the-art rule-based algorithm by 10--20\\% in relative reconstruction efficiency, achieves up to two orders of magnitude reduction in fake-particle rates for charged hadrons, and improves visible energy and invariant mass resolution by 22\\%. By decoupling reconstruction performance from detector-specific tuning, this framework enables rapid iteration during the detector design phase of future collider experiments.", "link": "http://arxiv.org/abs/2603.04084v1", "date": "2026-03-04", "relevancy": 2.2598, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4612}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4528}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20End-to-end%20event%20reconstruction%20for%20precision%20physics%20at%20future%20colliders&body=Title%3A%20End-to-end%20event%20reconstruction%20for%20precision%20physics%20at%20future%20colliders%0AAuthor%3A%20Dolores%20Garcia%20and%20Lena%20Herrmann%20and%20Gregor%20Krzmanc%20and%20Michele%20Selvaggi%0AAbstract%3A%20Future%20collider%20experiments%20require%20unprecedented%20precision%20in%20measurements%20of%20Higgs%2C%20electroweak%2C%20and%20flavour%20observables%2C%20placing%20stringent%20demands%20on%20event%20reconstruction.%20The%20achievable%20precision%20on%20Higgs%20couplings%20scales%20directly%20with%20the%20resolution%20on%20visible%20final%20state%20particles%20and%20their%20invariant%20masses.%20Current%20particle%20flow%20algorithms%20rely%20on%20detector%20specific%20clustering%2C%20limiting%20flexibility%20during%20detector%20design.%20Here%20we%20present%20an%20end-to-end%20global%20event%20reconstruction%20approach%20that%20maps%20charged%20particle%20tracks%20and%20calorimeter%20and%20muon%20hits%20directly%20to%20particle%20level%20objects.%20The%20method%20combines%20geometric%20algebra%20transformer%20networks%20with%20object%20condensation%20based%20clustering%2C%20followed%20by%20dedicated%20networks%20for%20particle%20identification%20and%20energy%20regression.%20Our%20approach%20is%20benchmarked%20on%20fully%20simulated%20electron%20positron%20collisions%20at%20FCC-ee%20using%20the%20CLD%20detector%20concept.%20It%20outperforms%20the%20state-of-the-art%20rule-based%20algorithm%20by%2010--20%5C%25%20in%20relative%20reconstruction%20efficiency%2C%20achieves%20up%20to%20two%20orders%20of%20magnitude%20reduction%20in%20fake-particle%20rates%20for%20charged%20hadrons%2C%20and%20improves%20visible%20energy%20and%20invariant%20mass%20resolution%20by%2022%5C%25.%20By%20decoupling%20reconstruction%20performance%20from%20detector-specific%20tuning%2C%20this%20framework%20enables%20rapid%20iteration%20during%20the%20detector%20design%20phase%20of%20future%20collider%20experiments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04084v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnd-to-end%2520event%2520reconstruction%2520for%2520precision%2520physics%2520at%2520future%2520colliders%26entry.906535625%3DDolores%2520Garcia%2520and%2520Lena%2520Herrmann%2520and%2520Gregor%2520Krzmanc%2520and%2520Michele%2520Selvaggi%26entry.1292438233%3DFuture%2520collider%2520experiments%2520require%2520unprecedented%2520precision%2520in%2520measurements%2520of%2520Higgs%252C%2520electroweak%252C%2520and%2520flavour%2520observables%252C%2520placing%2520stringent%2520demands%2520on%2520event%2520reconstruction.%2520The%2520achievable%2520precision%2520on%2520Higgs%2520couplings%2520scales%2520directly%2520with%2520the%2520resolution%2520on%2520visible%2520final%2520state%2520particles%2520and%2520their%2520invariant%2520masses.%2520Current%2520particle%2520flow%2520algorithms%2520rely%2520on%2520detector%2520specific%2520clustering%252C%2520limiting%2520flexibility%2520during%2520detector%2520design.%2520Here%2520we%2520present%2520an%2520end-to-end%2520global%2520event%2520reconstruction%2520approach%2520that%2520maps%2520charged%2520particle%2520tracks%2520and%2520calorimeter%2520and%2520muon%2520hits%2520directly%2520to%2520particle%2520level%2520objects.%2520The%2520method%2520combines%2520geometric%2520algebra%2520transformer%2520networks%2520with%2520object%2520condensation%2520based%2520clustering%252C%2520followed%2520by%2520dedicated%2520networks%2520for%2520particle%2520identification%2520and%2520energy%2520regression.%2520Our%2520approach%2520is%2520benchmarked%2520on%2520fully%2520simulated%2520electron%2520positron%2520collisions%2520at%2520FCC-ee%2520using%2520the%2520CLD%2520detector%2520concept.%2520It%2520outperforms%2520the%2520state-of-the-art%2520rule-based%2520algorithm%2520by%252010--20%255C%2525%2520in%2520relative%2520reconstruction%2520efficiency%252C%2520achieves%2520up%2520to%2520two%2520orders%2520of%2520magnitude%2520reduction%2520in%2520fake-particle%2520rates%2520for%2520charged%2520hadrons%252C%2520and%2520improves%2520visible%2520energy%2520and%2520invariant%2520mass%2520resolution%2520by%252022%255C%2525.%2520By%2520decoupling%2520reconstruction%2520performance%2520from%2520detector-specific%2520tuning%252C%2520this%2520framework%2520enables%2520rapid%2520iteration%2520during%2520the%2520detector%2520design%2520phase%2520of%2520future%2520collider%2520experiments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.04084v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=End-to-end%20event%20reconstruction%20for%20precision%20physics%20at%20future%20colliders&entry.906535625=Dolores%20Garcia%20and%20Lena%20Herrmann%20and%20Gregor%20Krzmanc%20and%20Michele%20Selvaggi&entry.1292438233=Future%20collider%20experiments%20require%20unprecedented%20precision%20in%20measurements%20of%20Higgs%2C%20electroweak%2C%20and%20flavour%20observables%2C%20placing%20stringent%20demands%20on%20event%20reconstruction.%20The%20achievable%20precision%20on%20Higgs%20couplings%20scales%20directly%20with%20the%20resolution%20on%20visible%20final%20state%20particles%20and%20their%20invariant%20masses.%20Current%20particle%20flow%20algorithms%20rely%20on%20detector%20specific%20clustering%2C%20limiting%20flexibility%20during%20detector%20design.%20Here%20we%20present%20an%20end-to-end%20global%20event%20reconstruction%20approach%20that%20maps%20charged%20particle%20tracks%20and%20calorimeter%20and%20muon%20hits%20directly%20to%20particle%20level%20objects.%20The%20method%20combines%20geometric%20algebra%20transformer%20networks%20with%20object%20condensation%20based%20clustering%2C%20followed%20by%20dedicated%20networks%20for%20particle%20identification%20and%20energy%20regression.%20Our%20approach%20is%20benchmarked%20on%20fully%20simulated%20electron%20positron%20collisions%20at%20FCC-ee%20using%20the%20CLD%20detector%20concept.%20It%20outperforms%20the%20state-of-the-art%20rule-based%20algorithm%20by%2010--20%5C%25%20in%20relative%20reconstruction%20efficiency%2C%20achieves%20up%20to%20two%20orders%20of%20magnitude%20reduction%20in%20fake-particle%20rates%20for%20charged%20hadrons%2C%20and%20improves%20visible%20energy%20and%20invariant%20mass%20resolution%20by%2022%5C%25.%20By%20decoupling%20reconstruction%20performance%20from%20detector-specific%20tuning%2C%20this%20framework%20enables%20rapid%20iteration%20during%20the%20detector%20design%20phase%20of%20future%20collider%20experiments.&entry.1838667208=http%3A//arxiv.org/abs/2603.04084v1&entry.124074799=Read"},
{"title": "Helios: Real Real-Time Long Video Generation Model", "author": "Shenghai Yuan and Yuanyang Yin and Zongjian Li and Xinwei Huang and Xiao Yang and Li Yuan", "abstract": "We introduce Helios, the first 14B video generation model that runs at 19.5 FPS on a single NVIDIA H100 GPU and supports minute-scale generation while matching the quality of a strong baseline. We make breakthroughs along three key dimensions: (1) robustness to long-video drifting without commonly used anti-drifting heuristics such as self-forcing, error-banks, or keyframe sampling; (2) real-time generation without standard acceleration techniques such as KV-cache, sparse/linear attention, or quantization; and (3) training without parallelism or sharding frameworks, enabling image-diffusion-scale batch sizes while fitting up to four 14B models within 80 GB of GPU memory. Specifically, Helios is a 14B autoregressive diffusion model with a unified input representation that natively supports T2V, I2V, and V2V tasks. To mitigate drifting in long-video generation, we characterize typical failure modes and propose simple yet effective training strategies that explicitly simulate drifting during training, while eliminating repetitive motion at its source. For efficiency, we heavily compress the historical and noisy context and reduce the number of sampling steps, yielding computational costs comparable to -- or lower than -- those of 1.3B video generative models. Moreover, we introduce infrastructure-level optimizations that accelerate both inference and training while reducing memory consumption. Extensive experiments demonstrate that Helios consistently outperforms prior methods on both short- and long-video generation. We plan to release the code, base model, and distilled model to support further development by the community.", "link": "http://arxiv.org/abs/2603.04379v1", "date": "2026-03-04", "relevancy": 2.2589, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5837}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5747}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5471}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Helios%3A%20Real%20Real-Time%20Long%20Video%20Generation%20Model&body=Title%3A%20Helios%3A%20Real%20Real-Time%20Long%20Video%20Generation%20Model%0AAuthor%3A%20Shenghai%20Yuan%20and%20Yuanyang%20Yin%20and%20Zongjian%20Li%20and%20Xinwei%20Huang%20and%20Xiao%20Yang%20and%20Li%20Yuan%0AAbstract%3A%20We%20introduce%20Helios%2C%20the%20first%2014B%20video%20generation%20model%20that%20runs%20at%2019.5%20FPS%20on%20a%20single%20NVIDIA%20H100%20GPU%20and%20supports%20minute-scale%20generation%20while%20matching%20the%20quality%20of%20a%20strong%20baseline.%20We%20make%20breakthroughs%20along%20three%20key%20dimensions%3A%20%281%29%20robustness%20to%20long-video%20drifting%20without%20commonly%20used%20anti-drifting%20heuristics%20such%20as%20self-forcing%2C%20error-banks%2C%20or%20keyframe%20sampling%3B%20%282%29%20real-time%20generation%20without%20standard%20acceleration%20techniques%20such%20as%20KV-cache%2C%20sparse/linear%20attention%2C%20or%20quantization%3B%20and%20%283%29%20training%20without%20parallelism%20or%20sharding%20frameworks%2C%20enabling%20image-diffusion-scale%20batch%20sizes%20while%20fitting%20up%20to%20four%2014B%20models%20within%2080%20GB%20of%20GPU%20memory.%20Specifically%2C%20Helios%20is%20a%2014B%20autoregressive%20diffusion%20model%20with%20a%20unified%20input%20representation%20that%20natively%20supports%20T2V%2C%20I2V%2C%20and%20V2V%20tasks.%20To%20mitigate%20drifting%20in%20long-video%20generation%2C%20we%20characterize%20typical%20failure%20modes%20and%20propose%20simple%20yet%20effective%20training%20strategies%20that%20explicitly%20simulate%20drifting%20during%20training%2C%20while%20eliminating%20repetitive%20motion%20at%20its%20source.%20For%20efficiency%2C%20we%20heavily%20compress%20the%20historical%20and%20noisy%20context%20and%20reduce%20the%20number%20of%20sampling%20steps%2C%20yielding%20computational%20costs%20comparable%20to%20--%20or%20lower%20than%20--%20those%20of%201.3B%20video%20generative%20models.%20Moreover%2C%20we%20introduce%20infrastructure-level%20optimizations%20that%20accelerate%20both%20inference%20and%20training%20while%20reducing%20memory%20consumption.%20Extensive%20experiments%20demonstrate%20that%20Helios%20consistently%20outperforms%20prior%20methods%20on%20both%20short-%20and%20long-video%20generation.%20We%20plan%20to%20release%20the%20code%2C%20base%20model%2C%20and%20distilled%20model%20to%20support%20further%20development%20by%20the%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04379v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHelios%253A%2520Real%2520Real-Time%2520Long%2520Video%2520Generation%2520Model%26entry.906535625%3DShenghai%2520Yuan%2520and%2520Yuanyang%2520Yin%2520and%2520Zongjian%2520Li%2520and%2520Xinwei%2520Huang%2520and%2520Xiao%2520Yang%2520and%2520Li%2520Yuan%26entry.1292438233%3DWe%2520introduce%2520Helios%252C%2520the%2520first%252014B%2520video%2520generation%2520model%2520that%2520runs%2520at%252019.5%2520FPS%2520on%2520a%2520single%2520NVIDIA%2520H100%2520GPU%2520and%2520supports%2520minute-scale%2520generation%2520while%2520matching%2520the%2520quality%2520of%2520a%2520strong%2520baseline.%2520We%2520make%2520breakthroughs%2520along%2520three%2520key%2520dimensions%253A%2520%25281%2529%2520robustness%2520to%2520long-video%2520drifting%2520without%2520commonly%2520used%2520anti-drifting%2520heuristics%2520such%2520as%2520self-forcing%252C%2520error-banks%252C%2520or%2520keyframe%2520sampling%253B%2520%25282%2529%2520real- {"title": "ZipMap: Linear-Time Stateful 3D Reconstruction with Test-Time Training", "author": "Haian Jin and Rundi Wu and Tianyuan Zhang and Ruiqi Gao and Jonathan T. Barron and Noah Snavely and Aleksander Holynski", "abstract": "Feed-forward transformer models have driven rapid progress in 3D vision, but state-of-the-art methods such as VGGT and $\u03c0^3$ have a computational cost that scales quadratically with the number of input images, making them inefficient when applied to large image collections. Sequential-reconstruction approaches reduce this cost but sacrifice reconstruction quality. We introduce ZipMap, a stateful feed-forward model that achieves linear-time, bidirectional 3D reconstruction while matching or surpassing the accuracy of quadratic-time methods. ZipMap employs test-time training layers to zip an entire image collection into a compact hidden scene state in a single forward pass, enabling reconstruction of over 700 frames in under 10 seconds on a single H100 GPU, more than $20\\times$ faster than state-of-the-art methods such as VGGT. Moreover, we demonstrate the benefits of having a stateful representation in real-time scene-state querying and its extension to sequential streaming reconstruction.", "link": "http://arxiv.org/abs/2603.04385v1", "date": "2026-03-04", "relevancy": 2.2568, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5885}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5716}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ZipMap%3A%20Linear-Time%20Stateful%203D%20Reconstruction%20with%20Test-Time%20Training&body=Title%3A%20ZipMap%3A%20Linear-Time%20Stateful%203D%20Reconstruction%20with%20Test-Time%20Training%0AAuthor%3A%20Haian%20Jin%20and%20Rundi%20Wu%20and%20Tianyuan%20Zhang%20and%20Ruiqi%20Gao%20and%20Jonathan%20T.%20Barron%20and%20Noah%20Snavely%20and%20Aleksander%20Holynski%0AAbstract%3A%20Feed-forward%20transformer%20models%20have%20driven%20rapid%20progress%20in%203D%20vision%2C%20but%20state-of-the-art%20methods%20such%20as%20VGGT%20and%20%24%CF%80%5E3%24%20have%20a%20computational%20cost%20that%20scales%20quadratically%20with%20the%20number%20of%20input%20images%2C%20making%20them%20inefficient%20when%20applied%20to%20large%20image%20collections.%20Sequential-reconstruction%20approaches%20reduce%20this%20cost%20but%20sacrifice%20reconstruction%20quality.%20We%20introduce%20ZipMap%2C%20a%20stateful%20feed-forward%20model%20that%20achieves%20linear-time%2C%20bidirectional%203D%20reconstruction%20while%20matching%20or%20surpassing%20the%20accuracy%20of%20quadratic-time%20methods.%20ZipMap%20employs%20test-time%20training%20layers%20to%20zip%20an%20entire%20image%20collection%20into%20a%20compact%20hidden%20scene%20state%20in%20a%20single%20forward%20pass%2C%20enabling%20reconstruction%20of%20over%20700%20frames%20in%20under%2010%20seconds%20on%20a%20single%20H100%20GPU%2C%20more%20than%20%2420%5Ctimes%24%20faster%20than%20state-of-the-art%20methods%20such%20as%20VGGT.%20Moreover%2C%20we%20demonstrate%20the%20benefits%20of%20having%20a%20stateful%20representation%20in%20real-time%20scene-state%20querying%20and%20its%20extension%20to%20sequential%20streaming%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04385v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DZipMap%253A%2520Linear-Time%2520Stateful%25203D%2520Reconstruction%2520with%2520Test-Time%2520Training%26entry.906535625%3DHaian%2520Jin%2520and%2520Rundi%2520Wu%2520and%2520Tianyuan%2520Zhang%2520and%2520Ruiqi%2520Gao%2520and%2520Jonathan%2520T.%2520Barron%2520and%25

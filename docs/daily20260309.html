{"title": "VG3S: Visual Geometry Grounded Gaussian Splatting for Semantic Occupancy Prediction", "author": "Xiaoyang Yan and Muleilan Pei and Shaojie Shen", "abstract": "3D semantic occupancy prediction has become a crucial perception task for comprehensive scene understanding in autonomous driving. While recent advances have explored 3D Gaussian splatting for occupancy modeling to substantially reduce computational overhead, the generation of high-quality 3D Gaussians relies heavily on accurate geometric cues, which are often insufficient in purely vision-centric paradigms. To bridge this gap, we advocate for injecting the strong geometric grounding capability from Vision Foundation Models (VFMs) into occupancy prediction. In this regard, we introduce Visual Geometry Grounded Gaussian Splatting (VG3S), a novel framework that empowers Gaussian-based occupancy prediction with cross-view 3D geometric grounding. Specifically, to fully exploit the rich 3D geometric priors from a frozen VFM, we propose a plug-and-play hierarchical geometric feature adapter, which can effectively transform generic VFM tokens via feature aggregation, task-specific alignment, and multi-scale restructuring. Extensive experiments on the nuScenes occupancy benchmark demonstrate that VG3S achieves remarkable improvements of 12.6% in IoU and 7.5% in mIoU over the baseline. Furthermore, we show that VG3S generalizes seamlessly across diverse VFMs, consistently enhancing occupancy prediction accuracy and firmly underscoring the immense value of integrating priors derived from powerful, pre-trained geometry-grounded VFMs.", "link": "http://arxiv.org/abs/2603.06210v1", "date": "2026-03-06", "relevancy": 3.1742, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6505}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.645}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.609}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VG3S%3A%20Visual%20Geometry%20Grounded%20Gaussian%20Splatting%20for%20Semantic%20Occupancy%20Prediction&body=Title%3A%20VG3S%3A%20Visual%20Geometry%20Grounded%20Gaussian%20Splatting%20for%20Semantic%20Occupancy%20Prediction%0AAuthor%3A%20Xiaoyang%20Yan%20and%20Muleilan%20Pei%20and%20Shaojie%20Shen%0AAbstract%3A%203D%20semantic%20occupancy%20prediction%20has%20become%20a%20crucial%20perception%20task%20for%20comprehensive%20scene%20understanding%20in%20autonomous%20driving.%20While%20recent%20advances%20have%20explored%203D%20Gaussian%20splatting%20for%20occupancy%20modeling%20to%20substantially%20reduce%20computational%20overhead%2C%20the%20generation%20of%20high-quality%203D%20Gaussians%20relies%20heavily%20on%20accurate%20geometric%20cues%2C%20which%20are%20often%20insufficient%20in%20purely%20vision-centric%20paradigms.%20To%20bridge%20this%20gap%2C%20we%20advocate%20for%20injecting%20the%20strong%20geometric%20grounding%20capability%20from%20Vision%20Foundation%20Models%20%28VFMs%29%20into%20occupancy%20prediction.%20In%20this%20regard%2C%20we%20introduce%20Visual%20Geometry%20Grounded%20Gaussian%20Splatting%20%28VG3S%29%2C%20a%20novel%20framework%20that%20empowers%20Gaussian-based%20occupancy%20prediction%20with%20cross-view%203D%20geometric%20grounding.%20Specifically%2C%20to%20fully%20exploit%20the%20rich%203D%20geometric%20priors%20from%20a%20frozen%20VFM%2C%20we%20propose%20a%20plug-and-play%20hierarchical%20geometric%20feature%20adapter%2C%20which%20can%20effectively%20transform%20generic%20VFM%20tokens%20via%20feature%20aggregation%2C%20task-specific%20alignment%2C%20and%20multi-scale%20restructuring.%20Extensive%20experiments%20on%20the%20nuScenes%20occupancy%20benchmark%20demonstrate%20that%20VG3S%20achieves%20remarkable%20improvements%20of%2012.6%25%20in%20IoU%20and%207.5%25%20in%20mIoU%20over%20the%20baseline.%20Furthermore%2C%20we%20show%20that%20VG3S%20generalizes%20seamlessly%20across%20diverse%20VFMs%2C%20consistently%20enhancing%20occupancy%20prediction%20accuracy%20and%20firmly%20underscoring%20the%20immense%20value%20of%20integrating%20priors%20derived%20from%20powerful%2C%20pre-trained%20geometry-grounded%20VFMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06210v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVG3S%253A%2520Visual%2520Geometry%2520Grounded%2520Gaussian%2520Splatting%2520for%2520Semantic%2520Occupancy%2520Prediction%26entry.906535625%3DXiaoyang%2520Yan%2520and%2520Muleilan%2520Pei%2520and%2520Shaojie%2520Shen%26entry.1292438233%3D3D%2520semantic%2520occupancy%2520prediction%2520has%2520become%2520a%2520crucial%2520perception%2520task%2520for%2520comprehensive%2520scene%2520understanding%2520in%2520autonomous%2520driving.%2520While%2520recent%2520advances%2520have%2520explored%25203D%2520Gaussian%2520splatting%2520for%2520occupancy%2520modeling%2520to%2520substantially%2520reduce%2520computational%2520overhead%252C%2520the%2520generation%2520of%2520high-quality%25203D%2520Gaussians%2520relies%2520heavily%2520on%2520accurate%2520geometric%2520cues%252C%2520which%2520are%2520often%2520insufficient%2520in%2520purely%2520vision-centric%2520paradigms.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520advocate%2520for%2520injecting%2520the%2520strong%2520geometric%2520grounding%2520capability%2520from%2520Vision%2520Foundation%2520Models%2520%2528VFMs%2529%2520into%2520occupancy%2520prediction.%2520In%2520this%2520regard%252C%2520we%2520introduce%2520Visual%2520Geometry%2520Grounded%2520Gaussian%2520Splatting%2520%2528VG3S%2529%252C%2520a%2520novel%2520framework%2520that%2520empowers%2520Gaussian-based%2520occupancy%2520prediction%2520with%2520cross-vi {"title": "EntON: Eigenentropy-Optimized Neighborhood Densification in 3D Gaussian Splatting", "author": "Miriam J\u00e4ger and Boris Jutzi", "abstract": "We present a novel Eigenentropy-optimized neighboorhood densification strategy EntON in 3D Gaussian Splatting (3DGS) for geometrically accurate and high-quality rendered 3D reconstruction. While standard 3DGS produces Gaussians whose centers and surfaces are poorly aligned with the underlying object geometry, surface-focused reconstruction methods frequently sacrifice photometric accuracy. In contrast to the conventional densification strategy, which relies on the magnitude of the view-space position gradient, our approach introduces a geometry-aware strategy to guide adaptive splitting and pruning. Specifically, we compute the 3D shape feature Eigenentropy from the eigenvalues of the covariance matrix in the k-nearest neighborhood of each Gaussian center, which quantifies the local structural order. These Eigenentropy values are integrated into an alternating optimization framework: During the optimization process, the algorithm alternates between (i) standard gradient-based densification, which refines regions via view-space gradients, and (ii) Eigenentropy-aware densification, which preferentially densifies Gaussians in low-Eigenentropy (ordered, flat) neighborhoods to better capture fine geometric details on the object surface, and prunes those in high-Eigenentropy (disordered, spherical) regions. We provide quantitative and qualitative evaluations on two benchmark datasets: small-scale DTU dataset and large-scale TUM2TWIN dataset, covering man-made objects and urban scenes. Experiments demonstrate that our Eigenentropy-aware alternating densification strategy improves geometric accuracy by up to 33% and rendering quality by up to 7%, while reducing the number of Gaussians by up to 50% and training time by up to 23%. Overall, EnTON achieves a favorable balance between geometric accuracy, rendering quality and efficiency by avoiding unnecessary scene expansion.", "link": "http://arxiv.org/abs/2603.06216v1", "date": "2026-03-06", "relevancy": 3.1618, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6449}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6363}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6159}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EntON%3A%20Eigenentropy-Optimized%20Neighborhood%20Densification%20in%203D%20Gaussian%20Splatting&body=Title%3A%20EntON%3A%20Eigenentropy-Optimized%20Neighborhood%20Densification%20in%203D%20Gaussian%20Splatting%0AAuthor%3A%20Miriam%20J%C3%A4ger%20and%20Boris%20Jutzi%0AAbstract%3A%20We%20present%20a%20novel%20Eigenentropy-optimized%20neighboorhood%20densification%20strategy%20EntON%20in%203D%20Gaussian%20Splatting%20%283DGS%29%20for%20geometrically%20accurate%20and%20high-quality%20rendered%203D%20reconstruction.%20While%20standard%203DGS%20produces%20Gaussians%20whose%20centers%20and%20surfaces%20are%20poorly%20aligned%20with%20the%20underlying%20object%20geometry%2C%20surface-focused%20reconstruction%20methods%20frequently%20sacrifice%20photometric%20accuracy.%20In%20contrast%20to%20the%20conventional%20densification%20strategy%2C%20which%20relies%20on%20the%20magnitude%20of%20the%20view-space%20position%20gradient%2C%20our%20approach%20introduces%20a%20geometry-aware%20strategy%20to%20guide%20adaptive%20splitting%20and%20pruning.%20Specifically%2C%20we%20compute%20the%203D%20shape%20feature%20Eigenentropy%20from%20the%20eigenvalues%20of%20the%20covariance%20matrix%20in%20the%20k-nearest%20neighborhood%20of%20each%20Gaussian%20center%2C%20which%20quantifies%20the%20local%20structural%20order.%20These%20Eigenentropy%20values%20are%20integrated%20into%20an%20alternating%20optimization%20framework%3A%20During%20the%20optimization%20process%2C%20the%20algorithm%20alternates%20between%20%28i%29%20standard%20gradient-based%20densification%2C%20which%20refines%20regions%20via%20view-space%20gradients%2C%20and%20%28ii%29%20Eigenentropy-aware%20densification%2C%20which%20preferentially%20densifies%20Gaussians%20in%20low-Eigenentropy%20%28ordered%2C%20flat%29%20neighborhoods%20to%20better%20capture%20fine%20geometric%20details%20on%20the%20object%20surface%2C%20and%20prunes%20those%20in%20high-Eigenentropy%20%28disordered%2C%20spherical%29%20regions.%20We%20provide%20quantitative%20and%20qualitative%20evaluations%20on%20two%20benchmark%20datasets%3A%20small-scale%20DTU%20dataset%20and%20large-scale%20TUM2TWIN%20dataset%2C%20covering%20man-made%20objects%20and%20urban%20scenes.%20Experiments%20demonstrate%20that%20our%20Eigenentropy-aware%20alternating%20densification%20strategy%20improves%20geometric%20accuracy%20by%20up%20to%2033%25%20and%20rendering%20quality%20by%20up%20to%207%25%2C%20while%20reducing%20the%20number%20of%20Gaussians%20by%20up%20to%2050%25%20and%20training%20time%20by%20up%20to%2023%25.%20Overall%2C%20EnTON%20achieves%20a%20favorable%20balance%20between%20geometric%20accuracy%2C%20rendering%20quality%20and%20efficiency%20by%20avoiding%20unnecessary%20scene%20expansion.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06216v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEntON%253A%2520Eigenentropy-Optimized%2520Neighborhood%2520Densification%2520in%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DMiriam%2520J%25C3%25A4ger%2520and%2520Boris%2520Jutzi%26entry.1292438233%3DWe%2520present%2520a%2520novel%2520Eigenentropy-optimized%2520neighboorhood%2520densification%2520strategy%2520EntON%2520in%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529% {"title": "AIM-SLAM: Dense Monocular SLAM via Adaptive and Informative Multi-View Keyframe Prioritization with Foundation Model", "author": "Jinwoo Jeon and Dong-Uk Seo and Eungchang Mason Lee and Hyun Myung", "abstract": "Recent advances in geometric foundation models have emerged as a promising alternative for addressing the challenge of dense reconstruction in monocular visual simultaneous localization and mapping (SLAM). Although geometric foundation models enable SLAM to leverage variable input views, the previous methods remain confined to two-view pairs or fixed-length inputs without sufficient deliberation of geometric context for view selection. To tackle this problem, we propose AIM-SLAM, a dense monocular SLAM framework that exploits an adaptive and informative multi-view keyframe prioritization with dense pointmap predictions from visual geometry grounded transformer (VGGT). Specifically, we introduce the selective information- and geometric-aware multi-view adaptation (SIGMA) module, which employs voxel overlap and information gain to retrieve a candidate set of keyframes and adaptively determine its size. Furthermore, we formulate a joint multi-view Sim(3) optimization that enforces consistent alignment across selected views, substantially improving pose estimation accuracy. The effectiveness of AIM-SLAM is demonstrated on real-world datasets, where it achieves state-of-the-art performance in both pose estimation and dense reconstruction. Our system supports ROS integration, with code is available at https://aimslam.github.io/.", "link": "http://arxiv.org/abs/2603.05097v2", "date": "2026-03-06", "relevancy": 3.1462, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6579}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6206}, {"title": "uPLAM: Robust Panoptic 0To%20tackle%20this%20problem%2C%20we%20propose%20AIM-SLAM%2C%20a%20dense%20monocular%20SLAM%20framework%20that%20exploits%20an%20adaptive%20and%20informative%20multi-view%20keyframe%20prioritization%20with%20dense%20pointmap%20predictions%20from%20visual%20geometry%20grounded%20transformer%20%28VGGT%29.%20Specifically%2C%20we%20introduce%20the%20selective%20information-%20and%20geometric-aware%20multi-view%20adaptation%20%28SIGMA%29%20module%2C%20which%20employs%20voxel%20overlap%20and%20information%20gain%20to%20retrieve%20a%20candidate%20set%20of%20keyframes%20and%20adaptively%20determine%20its%20size.%20Furthermore%2C%20we%20formulate%20a%20joint%20multi-view%20Sim%283%29%20optimization%20that%20enforces%20consistent%20alignment%20across%20selected%20views%2C%20substantially%20improving%20pose%20estimation%20accuracy.%20The%20effectiveness%20of%20AIM-SLAM%20is%20demonstrated%20on%20real-world%20datasets%2C%20where%20it%20achieves%20state-of-the-art%20performance%20in%20both%20pose%20estimation%20and%20dense%20reconstruction.%20Our%20system%20supports%20ROS%20integration%2C%20with%20code%20is%20available%20at%20https%3A//aimslam.github.io/.&entry.1838667208=http%3A//arxiv.org/abs/2603.05097v2&entry.124074799=Read"},
{"title": "Think with 3D: Geometric Imagination Grounded Spatial Reasoning from Limited Views", "author": "Zhangquan Chen and Manyuan Zhang and Xinlei Yu and Xufang Luo and Mingze Sun and Zihao Pan and Xiang An and Yan Feng and Peng Pei and Xunliang Cai and Ruqi Huang", "abstract": "Though recent advances in vision-language models (VLMs) have achieved remarkable progress across a wide range of multimodal tasks, understanding 3D spatial relationships from limited views remains a significant challenge. Previous reasoning methods typically rely on pure text (e.g., topological cognitive maps) or on 2D visual cues. However, their limited representational capacity hinders performance in specific tasks that require 3D spatial imagination. To address this limitation, we propose 3DThinker, a framework that can effectively exploits the rich geometric information embedded within images while reasoning, like humans do. Our framework is the first to enable 3D mentaling during reasoning without any 3D prior input, and it does not rely on explicitly labeled 3D data for training. Specifically, our training consists of two stages. First, we perform supervised training to align the 3D latent generated by VLM while reasoning with that of a 3D foundation model (e.g., VGGT). Then, we optimize the entire reasoning trajectory solely based on outcome signals, thereby refining the underlying 3D mentaling. Extensive experiments across multiple benchmarks show that 3DThinker consistently outperforms strong baselines and offers a new perspective toward unifying 3D representations into multimodal reasoning. Our code is available at https://github.com/zhangquanchen/3DThinker.", "link": "http://arxiv.org/abs/2510.18632v2", "date": "2026-03-06", "relevancy": 3.1137, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6275}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6275}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think%20with%203D%3A%20Geometric%20Imagination%20Grounded%20Spatial%20Reasoning%20from%20Limited%20Views&body=Title%3A%20Think%20with%203D%3A%20Geometric%20Imagination%20Grounded%20Spatial%20Reasoning%20from%20Limited%20Views%0AAuthor%3A%20Zhangquan%20Chen%20and%20Manyuan%20Zhang%20and%20Xinlei%20Yu%20and%20Xufang%20Luo%20and%20Mingze%20Sun%20and%20Zihao%20Pan%20and%20Xiang%20An%20and%20Yan%20Feng%20and%20Peng%20Pei%20and%20Xunliang%20Cai%20and%20Ruqi%20Huang%0AAbstract%3A%20Though%20recent%20advances%20in%20vision-language%20models%20%28VLMs%29%20have%20achieved%20remarkable%20progress%20across%20a%20wide%20range%20of%20multimodal%20tasks%2C%20understanding%203D%20spatial%20relationships%20from%20limited%20views%20remains%20a%20significant%20challenge.%20Previous%20reasoning%20methods%20typically%20rely%20on%20pure%20text%20%28e.g.%2C%20topological%20cognitive%20maps%29%20or%20on%202D%20visual%20cues.%20However%2C%20their%20limited%20representational%20capacity%20hinders%20performance%20in%20specific%20tasks%20that%20require%203D%20spatial%20imagination.%20To%20address%20this%20limitation%2C%20we%20propose%203DThinker%2C%20a%20framework%20that%20can%20effectively%20exploits%20the%20rich%20geometric%20information%20embedded%20within%20images%20while%20reasoning%2C%20like%20humans%20do.%20Our%20framework%20is%20the%20first%20to%20enable%203D%20mentaling%20during%20reasoning%20without%20any%203D%20prior%20input%2C%20and%20it%20does%20not%20rely%20on%20explicitly%20labeled%203D%20data%20for%20training.%20Specifically%2C%20our%20training%20consists%20of%20two%20stages.%20First%2C%20we%20perform%20supervised%20training%20to%20align%20the%203D%20latent%20generated%20by%20VLM%20while%20reasoning%20with%20that%20of%20a%203D%20foundation%20model%20%28e.g.%2C%20VGGT%29.%20Then%2C%20we%20optimize%20the%20entire%20reasoning%20trajectory%20solely%20based%20on%20outcome%20signals%2C%20thereby%20refining%20the%20underlying%203D%20mentaling.%20Extensive%20experiments%20across%20multiple%20benchmarks%20show%20that%203DThinker%20consistently%20outperforms%20strong%20baselines%20and%20offers%20a%20new%20perspective%20toward%20unifying%203D%20representations%20into%20multimodal%20reasoning.%20Our%20code%20is%20available%20at%20https%3A//github.com/zhangquanchen/3DThinker.%0ALink%3A%20http%3A//arxiv.org/abs/2510.18632v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThink%2520with%25203D%253A%2520Geometric%2520Imagination%2520Grounded%2520Spatial%2520Reasoning%2520from%2520Limited%2520Views%26entry.906535625%3DZhangquan%2520Chen%2520and%2520Manyuan%2520Zhang%2520and%2520Xinlei%2520Yu%2520and%2520Xufang%2520Luo%2520and%2520Mingze%2520Sun%2520and%2520Zihao%2520Pan%2520and%2520Xiang%2520An%2520and%2520Yan%2520Feng%2520and%2520Peng%2520Pei%2520and%2520Xunliang%2520Cai%2520and%2520Ruqi%2520Huang%26entry.1292438233%3DThough%2520recent%2520advances%2520in%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520across%2520a%2520wide%2520range%2520of%2520multimodal%2520tasks%252C%2520understanding%25203D%2520spatial%2520relationships%2520from%2520limited%2520views%2520remains%2520a%2520significant%2520challenge.%2520Previous%2520reasoning%2520methods%2520typically%2520rely%2520on%2520pure%2520text%2520%2528e.g.%252C%2520topological%2520cognitive%2520maps%2529%2520or%2520on%25202D%2520visual%2520cues.%2520However%252C%2520their%2520limited%2520representational%2520capacity%2520hinders%2520performance%2520in%2520specific%2520tasks%2520that%2520require%25203D%2520spatial%2520imagination.%2520To%2520address%2520this%2 {"title": "LaxMotion: Rethinking Supervision Granularity for 3D Human Motion Generation", "author": "Sheng Liu and Yuanzhi Liang and Sidan Du", "abstract": "Recent 3D human motion generation models demonstrate remarkable reconstruction accuracy yet struggle to generalize beyond training distributions. This limitation arises partly from the use of precise 3D supervision, which encourages models to fit fixed coordinate patterns instead of learning the essential 3D structure and motion semantic cues required for robust generalization. To overcome this limitation, we propose LaxMotion, a framework that synthesizes realistic 3D motions without direct 3D pose supervision. Instead of regressing toward exact coordinates, LaxMotion learns 3D motion as a consistent explanation of global trajectories and monocular 2D kinematic cues. We introduce a structured motion factorization together with a reformulated training paradigm under relaxed observability. This design is further supported by relaxed regularization objectives that enforce view consistent alignment, orientation coherence, and structural stability. Under this relaxed supervision paradigm, LaxMotion generates diverse, temporally coherent, and semantically aligned 3D motions, achieving performance comparable to or surpassing fully 3D supervised methods. These results indicate that shifting supervision from exact coordinate matching to structural consistency promotes stronger reasoning and improved generalization, offering a scalable and data efficient paradigm for 3D motion generation.", "link": "http://arxiv.org/abs/2511.11368v2", "date": "2026-03-06", "relevancy": 3.0801, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.696}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5792}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5728}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LaxMotion%3A%20Rethinking%20Supervision%20Granularity%20for%203D%20Human%20Motion%20Generation&body=Title%3A%20LaxMotion%3A%20Rethinking%20Supervision%20Granularity%20for%203D%20Human%20Motion%20Generation%0AAuthor%3A%20Sheng%20Liu%20and%20Yuanzhi%20Liang%20and%20Sidan%20Du%0AAbstract%3A%20Recent%203D%20human%20motion%20generation%20models%20demonstrate%20remarkable%20reconstruction%20accuracy%20yet%20struggle%20to%20generalize%20beyond%20training%20distributions.%20This%20limitation%20arises%20partly%20from%20the%20use%20of%20precise%203D%20supervision%2C%20which%20encourages%20models%20to%20fit%20fixed%20coordinate%20patterns%20instead%20of%20learning%20the%20essential%203D%20structure%20and%20motion%20semantic%20cues%20required%20for%20robust%20generalization.%20To%20overcome%20this%20limitation%2C%20we%20propose%20LaxMotion%2C%20a%20framework%20that%20synthesizes%20realistic%203D%20motions%20without%20direct%203D%20pose%20supervision.%20Instead%20of%20regressing%20toward%20exact%20coordinates%2C%20LaxMotion%20learns%203D%20motion%20as%20a%20consistent%20explanation%20of%20global%20trajectories%20and%20monocular%202D%20kinematic%20cues.%20We%20introduce%20a%20structured%20motion%20factorization%20together%20with%20a%20reformulated%20training%20paradigm%20under%20relaxed%20observability.%20This%20design%20is%20further%20supported%20by%20relaxed%20regularization%20objectives%20that%20enforce%20view%20consistent%20alignment%2C%20orientation%20coherence%2C%20and%20structural%20stability.%20Under%20this%20relaxed%20supervision%20paradigm%2C%20LaxMotion%20generates%20diverse%2C%20temporally%20coherent%2C%20and%20semantically%20aligned%203D%20motions%2C%20achieving%20performance%20comparable%20to%20or%20surpassing%20fully%203D%20supervised%20methods.%20These%20results%20indicate%20that%20shifting%20supervision%20from%20exact%20coordinate%20matching%20to%20structural%20consistency%20promotes%20stronger%20reasoning%20and%20improved%20generalization%2C%20offering%20a%20scalable%20and%20data%20efficient%20paradigm%20for%203D%20motion%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2511.11368v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLaxMotion%253A%2520Rethinking%2520Supervision%2520Granularity%2520for%25203D%2520Human%2520Motion%2520Generation%26entry.906535625%3DSheng%2520Liu%2520and%2520Yuanzhi%2520Liang%2520and%2520Sidan%2520Du%26entry.1292438233%3DRecent%25203D%2520human%2520motion%2520generation%2520models%2520demonstrate%2520remarkable%2520reconstruction%2520accuracy%2520yet%2520struggle%2520to%2520generalize%2520beyond%2520training%2520distributions.%2520This%2520limitation%2520arises%2520partly%2520from%2520the%2520use%2520of%2520precise%25203D%2520supervision%252C%2520which%2520encourages%2520models%2520to%2520fit%2520fixed%2520coordinate%2520patterns%2520instead%2520of%2520learning%2520the%2520essential%25203D%2520structure%2520and%2520motion%2520semantic%2520cues%2520required%2520for%2520robust%2520generalization.%2520To%2520overcome%2520this%2520limitation%252C%2520we%2520propose%2520LaxMotion%252C%2520a%2520framework%2520that%2520synthesizes%2520realistic%25203D%2520motions%2520without%2520direct%25203D%2520pose%2520supervision.%2520Instead%2520of%2520regressing%2520toward%2520exact%2520coordinates%252C%2520LaxMotion%2520learns%25203D%2520motion%2520as%2520a%2520consistent%2520explanation%2520of%2520global%2520trajectories%2520and%2520monocular%25202D%2520kinematic%2520cues.%2520We%2520introduce%2520a%2520structured%2520motion%2520factorization%2520together%2520with%2520a%2520reformulated%2520training%2520paradigm%2520under%2520relaxed%2520observability.%2520This%2520design%2520is%2520further%2520supported%2520by%2520relaxed%2520regularization%2520objectives%2520that%2520enforce%2520view%2520consistent%2520alignment%252C%2520orientation%2520coherence%252C%2520and%2520structural%2520stability.%2520Under%2520this%2520relaxed%2520supervision%2520paradigm%252C%2520LaxMotion%2520generates%2520diverse%252C%2520temporally%2520coherent%252C%2520and%2520semantically%2520aligned%25203D%2520motions%252C%2520achieving%2520performance%2520comparable%2520to%2520or%2520surpassing%2520fully%25203D%2520supervised%2520methods.%2520These%2520results%2520indicate%2520that%2520shifting%2520supervision%2520from%2520exact%2520coordinate%2520matching%2520to%2520structural%2520consistency%2520promotes%2520stronger%2520reasoning%2520and%2520improved%2520generalization%252C%2520offering%2520a%2520scalable%2520and%2520data%2520efficient%2520paradigm%2520for%25203D%2520motion%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.11368v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LaxMotion%3A%20Rethinking%20Supervision%20Granularity%20for%203D%20Human%20Motion%20Generation&entry.906535625=Sheng%20Liu%20and%20Yuanzhi%20Liang%20and%20Sidan%20Du&entry.1292438233=Recent%203D%20human%20motion%20generation%20models%20demonstrate%20remarkable%20reconstruction%20accuracy%20yet%20struggle%20to%20generalize%20beyond%20training%20distributions.%20This%20limitation%20arises%20partly%20from%20the%20use%20of%20precise%203D%20supervision%2C%20which%20encourages%20models%20to%20fit%20fixed%20coordinate%20patterns%20instead%20of%20learning%20the%20essential%203D%20structure%20and%20motion%20semantic%20cues%20required%20for%20robust%20generalization.%20To%20overcome%20this%20limitation%2C%20we%20propose%20LaxMotion%2C%20a%20framework%20that%20synthesizes%20realistic%203D%20motions%20without%20direct%203D%20pose%20supervision.%20Instead%20of%20regressing%20toward%20exact%20coordinates%2C%20LaxMotion%20learns%203D%20motion% {"title": "(MGS)$^2$-Net: Unifying Micro-Geometric Scale and Macro-Geometric Structure for Cross-View Geo-Localization", "author": "Minglei Li and Mengfan He and Chunyu Li and Chao Chen and Xingyu Shao and Ziyang Meng", "abstract": "Cross-view geo-localization (CVGL) is pivotal for GNSS-denied UAV navigation but remains brittle under the drastic geometric misalignment between oblique aerial views and orthographic satellite references. Existing methods predominantly operate within a 2D manifold, neglecting the underlying 3D geometry where view-dependent vertical facades (macro-structure) and scale variations (micro-scale) severely corrupt feature alignment. To bridge this gap, we propose (MGS)$^2$, a geometry-grounded framework. The core of our innovation is the Macro-Geometric Structure Filtering (MGSF) module. Unlike pixel-wise matching sensitive to noise, MGSF leverages dilated geometric gradients to physically filter out high-frequency facade artifacts while enhancing the view-invariant horizontal plane, directly addressing the domain shift. To guarantee robust input for this structural filtering, we explicitly incorporate a Micro-Geometric Scale Adaptation (MGSA) module. MGSA utilizes depth priors to dynamically rectify scale discrepancies via multi-branch feature fusion. Furthermore, a Geometric-Appearance Contrastive Distillation (GACD) loss is designed to strictly discriminate against oblique occlusions. Extensive experiments demonstrate that (MGS)$^2$ achieves state-of-the-art performance, recording a Recall@1 of 97.5\\% on University-1652 and 97.02\\% on SUES-200. Furthermore, the framework exhibits superior cross-dataset generalization against geometric ambiguity. The code is available at: \\href{https://github.com/GabrielLi1473/MGS-Net}{https://github.com/GabrielLi1473/MGS-Net}.", "link": "http://arxiv.org/abs/2602.10704v2", "date": "2026-03-06", "relevancy": 3.0396, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular {"title": "Penguin-VL: Exploring the Efficiency Limits of VLM with LLM-based Vision Encoders", "author": "Boqiang Zhang and Lei Ke and Ruihan Yang and Qi Gao and Tianyuan Qu and Rossell Chen and Dong Yu and  Leoweiliang", "abstract": "Vision Language Model (VLM) development has largely relied on scaling model size, which hinders deployment on compute-constrained mobile and edge devices such as smartphones and robots. In this work, we explore the performance limits of compact (e.g., 2B and 8B) VLMs. We challenge the prevailing practice that state-of-the-art VLMs must rely on vision encoders initialized via massive contrastive pretraining (e.g., CLIP/SigLIP). We identify an objective mismatch: contrastive learning, optimized for discrimination, enforces coarse and category-level invariances that suppress fine-grained visual cues needed for dense captioning and complex VLM reasoning. To address this issue, we present Penguin-VL, whose vision encoder is initialized from a text-only LLM. Our experiments reveal that Penguin-Encoder serves as a superior alternative to traditional contrastive pretraining, unlocking a higher degree of visual fidelity and data efficiency for multimodal understanding. Across various image and video benchmarks, Penguin-VL achieves performance comparable to leading VLMs (e.g., Qwen3-VL) in mathematical reasoning and surpasses them in tasks such as document understanding, visual knowledge, and multi-perspective video understanding. Notably, these gains are achieved with a lightweight architecture, demonstrating that improved visual representation rather than model scaling is the primary driver of performance. Our ablations show that Penguin-Encoder consistently outperforms contrastive-pretrained encoders, preserving fine-grained spatial and temporal cues that are critical for dense perception and complex reasoning. This makes it a strong drop-in alternative for compute-efficient VLMs and enables high performance in resource-constrained settings. {"title": "FastLightGen: Fast and Light Video Generation with Fewer Steps and Parameters", "author": "Shitong Shao and Yufei Gu and Zeke Xie", "abstract": "The recent advent of powerful video generation models, such as Hunyuan, WanX, Veo3, and Kling, has inaugurated a new era in the field. However, the practical deployment of these models is severely impeded by their substantial computational overhead, which stems from enormous parameter counts and the iterative, multi-step sampling process required during inference. Prior research on accelerating generative models has predominantly followed two distinct trajectories: reducing the number of sampling steps (e.g., LCM, DMD, and MagicDistillation) or compressing the model size for more efficient inference (e.g., ICMD). The potential of simultaneously compressing both to create a fast and lightweight model remains an unexplored avenue. In this paper, we propose FastLightGen, an algorithm that transforms large, computationally expensive models into fast, lightweight counterparts. The core idea is to construct an optimal teacher model, one engineered to maximize student performance, within a synergistic framework for distilling both model size and inference steps. Our extensive experiments on HunyuanVideo-ATI2V and WanX-TI2V reveal that a generator using 4-step sampling and 30\\% parameter pruning achieves optimal visual quality under a constrained inference budget. Furthermore, FastLightGen consistently outperforms all competing methods, establishing a new state-of-the-art in efficient video generation.", "link": "http://arxiv.org/abs/2603.01685v2", "date": "2026-03-06", "relevancy": 2.9857, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6024}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.599}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FastLightGen%3A%20Fast%20and%20Light%20Video%20Generation%20with%20Fewer%20Steps%20and%20Parameters&body=Title%3A%20FastLightGen%3A%20Fast%20and%20Light%20Video%20Generation%20with%20Fewer%20Steps%20and%20Parameters%0AAuthor%3A%20Shitong%20Shao%20and%20Yufei%20Gu%20and%20Zeke%20Xie%0AAbstract%3A%20The%20recent%20advent%20of%20powerful%20video%20generation%20models%2C%20such%20as%20Hunyuan%2C%20WanX%2C%20Veo3%2C%20and%20Kling%2C%20has%20inaugurated%20a%20new%20era%20in%20the%20field.%20However%2C%20the%20practical%20deployment%20of%20these%20models%20is%20severely%20impeded%20by%20their%20substantial%20computational%20overhead%2C%20which%20stems%20from%20enormous%20parameter%20counts%20and%20the%20iterative%2C%20multi-step%20sampling%20process%20required%20during%20inference.%20Prior%20research%20on%20accelerating%20generative%20models%20has%20predominantly%20followed%20two%20distinct%20trajectories%3A%20reducing%20the%20number%20of%20sampling%20steps%20%28e.g.%2C%20LCM%2C%20DMD%2C%20and%20MagicDistillation%29%20or%20compressing%20the%20model%20size%20for%20more%20efficient%20inference%20%28e.g.%2C%20ICMD%29.%20The%20potential%20of%20simultaneously%20compressing%20both%20to%20create%20a%20fast%20and%20lightweight%20model%20remains%20an%20unexplored%20avenue.%20In%20this%20paper%2C%20we%20propose%20FastLightGen%2C%20an%20algorithm%20that%20transforms%20large%2C%20computationally%20expensive%20models%20into%20fast%2C%20lightweight%20counterparts.%20The%20core%20idea%20is%20to%20construct%20an%20optimal%20teacher%20model%2C%20one%20engineered%20to%20maximize%20student%20performance%2C%20within%20a%20synergistic%20framework%20for%20distilling%20both%20model%20size%20and%20inference%20steps.%20Our%20extensive%20experiments%20on%20HunyuanVideo-ATI2V%20and%20WanX-TI2V%20reveal%20that%20a%20generator%20using%204-step%20sampling%20and%2030%5C%25%20parameter%20pruning%20achieves%20optimal%20visual%20quality%20under%20a%20constrained%20inference%20budget.%20Furthermore%2C%20FastLightGen%20consistently%20outperforms%20all%20competing%20methods%2C%20establishing%20a%20new%20state-of-the-art%20in%20efficient%20video%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01685v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFastLightGen%253A%2520Fast%2520and%2520Light%2520Video%2520Generation%2520with%2520Fewer%2520Steps%2520and%2520Parameters%26entry.906535625%3DShitong%2520Shao%2520and%2520Yufei%2520Gu%2520and%2520Zeke%2520Xie%26entry.1292438233%3DThe%2520recent%2520advent%2520of%2520powerful%2520video%2520generation%2520models%252C%2520such%2520as%2520Hunyuan%252C%2520WanX%252C%2520Veo3%252C%2520and%2520Kling%252C%2520has%2520inaugurated%2520a%2520new%2520era%2520in%2520the%2520field.%2520However%252C%2520the%2520practical%2520deployment%2520of%2520these%2520models%2520is%2520severely%2520impeded%2520by%2520their%2520substantial%2520computational%2520overhead%252C%2520which%2520stems%2520from%2520enormous%2520parameter%2520counts%2520and%2520the%2520iterative%252C%2520multi-step%2520sampling%2520process%2520required%2520during%2520inference.%2520Prior%2520research%2520on%2520accelerating%2520generative%2520models%2520has%2520predominantly%2520followed%2520two%2520distinct%2520trajectories%253A%2520reducing%2520the%2520number%2520of%2520sampling%2520steps%2520%2528e.g.%252C%2520LCM%252C%2520DMD%252C%2520and%2520MagicDistillation%2529%2520or%2520compressing%2520the%2520model%2520size%2520for%2520more%2520efficient%2520inference%2520%2528e.g.%252C%2520ICMD%2529.%2520The%2520potential%2520of%2520simultaneously%2520compressing%2520both%2520to%2520create%2520a%2520fast%2520and%2520lightweight%2520model%2520remains%2520an%2520unexplored%2520avenue.%2520In%2520this%2520paper%252C%2520we%2520propose%2520FastLightGen%25 {"title": "SCOPE: Scene-Contextualized Incremental Few-Shot 3D Segmentation", "author": "Vishal Thengane and Zhaochong An and Tianjin Huang and Son Lam Phung and Abdesselam Bouzerdoum and Lu Yin and Na Zhao and Xiatian Zhu", "abstract": "Incremental Few-Shot (IFS) segmentation aims to learn new categories over time from only a few annotations. Although widely studied in 2D, it remains underexplored for 3D point clouds. Existing methods suffer from catastrophic forgetting or fail to learn discriminative prototypes under sparse supervision, and often overlook a key cue: novel categories frequently appear as unlabelled background in base-training scenes. We introduce SCOPE (Scene-COntextualised Prototype Enrichment), a plug-and-play background-guided prototype enrichment framework that integrates with any prototype-based 3D segmentation method. After base training, a class-agnostic segmentation model extracts high-confidence pseudo-instances from background regions to build a prototype pool. When novel classes arrive with few labelled samples, relevant background prototypes are retrieved and fused with few-shot prototypes to form enriched representations without retraining the backbone or adding parameters. Experiments on ScanNet and S3DIS show that SCOPE achieves SOTA performance, improving novel-class IoU by up to 6.98% and 3.61%, and mean IoU by 2.25% and 1.70%, respectively, while maintaining low forgetting. Code is available https://github.com/Surrey-UP-Lab/SCOPE.", "link": "http://arxiv.org/abs/2603.06572v1", "date": "2026-03-06", "relevancy": 2.9842, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6055}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6055}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation {"title": "Taxonomy-aware Dynamic Motion Generation on Hyperbolic Manifolds", "author": "Luis Augenstein and No\u00e9mie Jaquier and Tamim Asfour and Leonel Rozo", "abstract": "Human-like motion generation for robots often draws inspiration from biomechanical studies, which often categorize complex human motions into hierarchical taxonomies. While these taxonomies provide rich structural information about how movements relate to one another, this information is frequently overlooked in motion generation models, leading to a disconnect between the generated motions and their underlying hierarchical structure. This paper introduces the \\ac{gphdm}, a novel approach that learns latent representations preserving both the hierarchical structure of motions and their temporal dynamics to ensure physical consistency. Our model achieves this by extending the dynamics prior of the Gaussian Process Dynamical Model (GPDM) to the hyperbolic manifold and integrating it with taxonomy-aware inductive biases. Building on this geometry- and taxonomy-aware frameworks, we propose three novel mechanisms for generating motions that are both taxonomically-structured and physically-consistent: two probabilistic recursive approaches and a method based on pullback-metric geodesics. Experiments on generating realistic motion sequences on the hand grasping taxonomy show that the proposed GPHDM faithfully encodes the underlying taxonomy and temporal dynamics, and it generates novel physically-consistent trajectories.", "link": "http://arxiv.org/abs/2509.21281v2", "date": "2026-03-06", "relevancy": 2.9753, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6519}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5816}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5516}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Taxonomy-aware%20Dynamic%20Motion%20Generation%20on%20Hyperbolic%20Manifolds&body=Title%3A%20Taxonomy-aware%20Dynamic%20Motion%20Generation%20on%20Hyperbolic%20Manifolds%0AAuthor%3A%20Luis%20Augenstein%20and%20No%C3%A9mie%20Jaquier%20and%20Tamim%20Asfour%20and%20Leonel%20Rozo%0AAbstract%3A%20Human-like%20motion%20generation%20for%20robots%20often%20draws%20inspiration%20from%20biomechanical%20studies%2C%20which%20often%20categorize%20complex%20human%20motions%20into%20hierarchical%20taxonomies.%20While%20these%20taxonomies%20provide%20rich%20structural%20information%20about%20how%20movements%20relate%20to%20one%20another%2C%20this%20information%20is%20frequently%20overlooked%20in%20motion%20generation%20models%2C%20leading%20to%20a%20disconnect%20between%20the%20generated%20motions%20and%20their%20underlying%20hierarchical%20structure.%20This%20paper%20introduces%20the%20%5Cac%7Bgphdm%7D%2C%20a%20novel%20approach%20that%20learns%20latent%20representations%20preserving%20both%20the%20hierarchical%20structure%20of%20motions%20and%20their%20temporal%20dynamics%20to%20ensure%20physical%20consistency.%20Our%20model%20achieves%20this%20by%20extending%20the%20dynamics%20prior%20of%20the%20Gaussian%20Process%20Dynamical%20Model%20%28GPDM%29%20to%20the%20hyperbolic%20manifold%20and%20integrating%20it%20with%20taxonomy-aware%20inductive%20biases.%20Building%20on%20this%20geometry-%20and%20taxonomy-aware%20frameworks%2C%20we%20propose%20three%20novel%20mechanisms%20for%20generating%20motions%20that%20are%20both%20taxonomically-structured%20and%20physically-consistent%3A%20two%20probabilistic%20recursive%20approaches%20and%20a%20method%20based%20on%20pullback-metric%20geodesics.%20Experiments%20on%20generating%20realistic%20motion%20sequences%20on%20the%20hand%20grasping%20taxonomy%20show%20that%20the%20proposed%20GPHDM%20faithfully%20encodes%20the%20underlying%20taxonomy%20and%20temporal%20dynamics%2C%20and%20it%20generates%20novel%20physically-consistent%20trajectories.%0ALink%3A%20http%3A//arxiv.org/abs/2509.21281v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTaxonomy-aware%2520Dynamic%2520Motion%2520Generation%2520on%2520Hyperbolic%2520Manifolds%26entry.906535625%3DLuis%2520Augenstein%2520and%2520No%25C3%25A9mie%2520Jaquier%2520and%2520Tamim%2520Asfour%2520and%2520Leonel%2520Rozo%26entry.1292438233%3DHuman-like%2520motion%2520generation%2520for%2520robots%2520often%2520draws%2520inspiration%2520from%2520biomechanical%2520studies%252C%2520which%2520often%2520categorize%2520complex%2520human%2520motions%2520into%2520hierarchical%2520taxonomies.%2520While%2520these%2520taxonomies%2520provide%2520rich%2520structural%2520information%2520about%2520how%2520movements%2520relate%2520to%2520one%2520another%252C%2520this%2520information%2520is%2520frequently%2520overlooked%2520in%2520motion%2520generation%2520models%252C%2520leading%2520to%2520a%2520disconnect%2520between%2520the%2520generated%2520motions%2520and%2520their%2520underlying%2520hierarchical%2520structure.%2520This%2520paper%2520introduces%2520the%2520%255Cac%257Bgphdm%257D%252C%2520a%2520novel%2520approach%2520that%2520learns%2520latent%2520representations%2520preserving%2520both%2520the%2520hierarchical%2520structure%2520of%2520motions%2520and%2520their%2520temporal%2520dynamics%2520to%2520ensure%2520physical%2520consistency.%2520Our%2520model%2520achieves%2520this%2520by%2520extending%2520the%2520dynamics%2520prior%2520of%2520the%2520Gaussian%2520Process%2520Dynamical%2520Model%2520%2528GPDM%2529%2520to%2520the%2520hyperbolic%2520manifold%2520and%2520integrating%2520it%2520with%2520taxonomy-aware%2520inductive%2520biases.%2520Building%2520on%2520this%2520geometry-%2520and%2520taxonomy-aware%2520frameworks%252C%2520we%2520propose%2520three%2520novel%2520mechanisms%2520for%2520genera {"title": "Hierarchical Collaborative Fusion for 3D Instance-aware Referring Expression Segmentation", "author": "Keshen Zhou and Runnan Chen and Mingming Gong and Tongliang Liu", "abstract": "Generalised 3D Referring Expression Segmentation (3D-GRES) localizes objects in 3D scenes based on natural language, even when descriptions match multiple or zero targets. Existing methods rely solely on sparse point clouds, lacking rich visual semantics for fine-grained descriptions. We propose HCF-RES, a multi-modal framework with two key innovations. First, Hierarchical Visual Semantic Decomposition leverages SAM instance masks to guide CLIP encoding at dual granularities -- pixel-level and instance-level features -- preserving object boundaries during 2D-to-3D projection. Second, Progressive Multi-level Fusion integrates representations through intra-modal collaboration, cross-modal adaptive weighting between 2D semantic and 3D geometric features, and language-guided refinement. HCF-RES achieves state-of-the-art results on both ScanRefer and Multi3DRefer.", "link": "http://arxiv.org/abs/2603.06250v1", "date": "2026-03-06", "relevancy": 2.9298, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5881}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5881}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5818}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20Collaborative%20Fusion%20for%203D%20Instance-aware%20Referring%20Expression%20Segmentation&body=Title%3A%20Hierarchical%20Collaborative%20Fusion%20for%203D%20Instance-aware%20Referring%20Expression%20Segmentation%0AAuthor%3A%20Keshen%20Zhou% {"title": "JOPP-3D: Joint Open Vocabulary Semantic Segmentation on Point Clouds and Panoramas", "author": "Sandeep Inuganti and Hideaki Kanayama and Kanta Shimizu and Mahdi Chamseddine and Soichiro Yokota and Didier Stricker and Jason Rambach", "abstract": "Semantic segmentation across visual modalities such as 3D point clouds and panoramic images remains a challenging task, primarily due to the scarcity of annotated data and the limited adaptability of fixed-label models. In this paper, we present JOPP-3D, an open-vocabulary semantic segmentation framework that jointly leverages panoramic and point cloud data to enable language-driven scene understanding. We convert RGB-D panoramic images into their corresponding tangential perspective images and 3D point clouds, then use these modalities to extract and align foundational vision-language features. This allows natural language querying to generate semantic masks on both input modalities. Experimental evaluation on the Stanford-2D-3D-s and ToF-360 datasets demonstrates the capability of JOPP-3D to produce coherent and semantically meaningful segmentations across panoramic and 3D domains. Our proposed method achieves a significant improvement compared to the SOTA in open and closed vocabulary 2D and 3D semantic segmentation.", "link": "http://arxiv.org/abs/2603.06168v1", "date": "2026-03-06", "relevancy": 2.9178, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5984}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5984}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JOPP-3D%3A%20Joint%20Open%20Vocabulary%20Semantic%20Segmentation%20on%20Point%20Clouds%20and%20Panoramas&body=Title%3A%20JOPP-3D%3A%20Joint%20Open%20Vocabulary%20Semantic%20Segmentation%20on%20Point%20Clouds%20and%20Panoramas%0AAuthor%3A%20Sandeep%20Inuganti%20and%20Hideaki%20Kanayama%20and%20Kanta%20Shimizu%20and%20Mahdi%20Chamseddine%20and%20Soichiro%20Yokota%20and%20Didier%20Stricker%20and%20Jason%20Rambach%0AAbstract%3A%20Semantic%20segmentation%20across%20visual%20modalities%20such%20as%203D%20point%20clouds%20and%20panoramic%20images%20remains%20a%20challenging%20task%2C%20primarily%20due%20to%20the%20scarcity%20of%20annotated%20data%20and%20the%20limited%20adaptability%20of%20fixed-label%20models.%20In%20this%20paper%2C%20we%20present%20JOPP-3D%2C%20an%20open-vocabulary%20semantic%20segmentation%20framework%20that%20jointly%20leverages%20panoramic%20and%20point%20cloud%20data%20to%20enable%20language-driven%20scene%20understanding.%20We%20convert%20RGB-D%20panoramic%20images%20into%20their%20corresponding%20tangential%20perspective%20images%20and%203D%20point%20clouds%2C%20then%20use%20these%20modalities%20to%20extract%20and%20align%20foundational%20vision-language%20features.%20This%20allows%20natural%20language%20querying%20to%20generate%20semantic%20masks%20on%20both%20input%20modalities.%20Experimental%20evaluation%20on%20the%20Stanford-2D-3D-s%20and%20ToF-360%20datasets%20demonstrates%20the%20capability%20of%20JOPP-3D%20to%20produce%20coherent%20and%20semantically%20meaningful%20segmentations%20across%20panoramic%20and%203D%20domains.%20Our%20proposed%20method%20achieves%20a%20significant%20improvement%20compared%20to%20the%20SOTA%20in%20open%20and%20closed%20vocabulary%202D%20and%203D%20semantic%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06168v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJOPP-3D%253A%2520Joint%2520Open%2520Vocabulary%2520Semantic%2520Segmentation%2520on%2520Point%2520Clouds%25 {"title": "Point-Supervised Skeleton-Based Human Action Segmentation", "author": "Hongsong Wang and Yiqin Shen and Pengbo Yan and Jie Gui", "abstract": "Skeleton-based temporal action segmentation is a fundamental yet challenging task, playing a crucial role in enabling intelligent systems to perceive and respond to human activities. While fully-supervised methods achieve satisfactory performance, they require costly frame-level annotations and are sensitive to ambiguous action boundaries. To address these issues, we introduce a point-supervised framework for skeleton-based action segmentation, where only a single frame per action segment is labeled. We leverage multimodal skeleton data, including joint, bone, and motion information, encoded via a pretrained unified model to extract rich feature representations. To generate reliable pseudo-labels, we propose a novel prototype similarity method and integrate it with two existing methods: energy function and constrained K-Medoids clustering. Multimodal pseudo-label integration is proposed to enhance the reliability of the pseudo-label and guide the model training. We establish new benchmarks on PKU-MMD (X-Sub and X-View), MCFS-22, and MCFS-130, and implement baselines for point-supervised skeleton-based human action segmentation. Extensive experiments show that our method achieves competitive performance, even surpassing some fully-supervised methods while significantly reducing annotation effort.", "link": "http://arxiv.org/abs/2603.06201v1", "date": "2026-03-06", "relevancy": 2.9051, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.6462}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5586}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "http {"title": "VISO: Robust Underwater Visual-Inertial-Sonar SLAM with Photometric Rendering for Dense 3D Reconstruction", "author": "Shu Pan and Simon Archieri and Ahmet Cinar and Jonatan Scharff Willners and Ignacio Carlucho and Yvan Petillot", "abstract": "Visual challenges in underwater environments significantly hinder the accuracy of vision-based localisation and the high-fidelity dense reconstruction. In this paper, we propose VISO, a robust underwater SLAM system that fuses a stereo camera, an inertial measurement unit (IMU), and a 3D sonar to achieve accurate 6-DoF localisation and enable efficient dense 3D reconstruction with high photometric fidelity. We introduce a coarse-to-fine online calibration approach for extrinsic parameters estimation between the 3D sonar and the camera. Additionally, a photometric rendering strategy is proposed for the 3D sonar point cloud to enrich the sonar map with visual information. Extensive experiments in a laboratory tank and an open lake demonstrate that VISO surpasses current state-of-the-art underwater and visual-based SLAM algorithms in terms of localisation robustness and accuracy, while also exhibiting real-time dense 3D reconstruction performance comparable to the offline dense mapping method.", "link": "http://arxiv.org/abs/2601.01144v2", "date": "2026-03-06", "relevancy": 2.9034, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6105}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.584}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VISO%3A%20Robust%20Underwater%20Visual-Inertial-Sonar%20SLAM%20with%20Photometric%20Rendering%20for%20Dense%203D%20Reconstruction&body=Title%3A%20VISO%3A%20Robust%20Underwater%20Visual-Inertial-Sonar%20SLAM%20with%20Photometric%20Rendering%20for%20Dense%203D%20Reconstruction%0AAuthor%3A%20Shu%20Pan%20and%20Simon%20Archieri%20and%20Ahmet%20Cinar%20and%20Jonatan%20Scharff%20Willners%20and%20Ignacio%20Carlucho%20and%20Yvan%20Petillot%0AAbstract%3A%20Visual%20challenges%20in%20underwater%20environments%20significantly%20hinder%20the%20accuracy%20of%20vision-based%20localisation%20and%20the%20high-fidelity%20dense%20reconstruction.%20In%20this%20paper%2C%20we%20propose%20VISO%2C%20a%20robust%20underwater%20SLAM%20system%20that%20fuses%20a%20stereo%20camera%2C%20an%20inertial%20measurement%20unit%20%28IMU%29%2C%20and%20a%203D%20sonar%20to%20achieve%20accurate%206-DoF%20localisation%20and%20enable%20efficient%20dense%203D%20reconstruction%20with%20high%20photometric%20fidelity.%20We%20introduce%20a%20coarse-to-fine%20online%20calibration%20approach%20for%20extrinsic%20parameters%20estimation%20between%20the%203D%20sonar%20and%20the%20camera.%20Additionally%2C%20a%20photometric%20rendering%20strategy%20is%20proposed%20for%20the%203D%20sonar%20point%20cloud%20to%20enrich%20the%20sonar%20map%20with%20visual%20information.%20Extensive%20experiments%20in%20a%20laboratory%20tank%20and%20an%20open%20lake%20demonstrate%20that%20VISO%20surpasses%20current%20state-of-the-art%20underwater%20and%20visual-based%20SLAM%20algorithms%20in%20terms%20of%20localisation%20robustness%20and%20accuracy%2C%20while%20also%20exhibiting%20real-time%20dense%203D%20reconstruction%20performance%20comparable%20to%20the%20offline%20dense%20mapping%20method.%0ALink%3A%20http%3A//arxiv.org/abs/2601.01144v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVISO%253A%2520Robust%2520Underwater%2520Visual-Inertial-Sonar%2520SLAM%2520with%2520Photometric%2520Rendering%2520for%2520Dense%25203D%2520Reconstruction%2 {"title": "Rewis3d: Reconstruction Improves Weakly-Supervised Semantic Segmentation", "author": "Jonas Ernst and Wolfgang Boettcher and Lukas Hoyer and Jan Eric Lenssen and Bernt Schiele", "abstract": "We present Rewis3d, a framework that leverages recent advances in feed-forward 3D reconstruction to significantly improve weakly supervised semantic segmentation on 2D images. Obtaining dense, pixel-level annotations remains a costly bottleneck for training segmentation models. Alleviating this issue, sparse annotations offer an efficient weakly-supervised alternative. However, they still incur a performance gap. To address this, we introduce a novel approach that leverages 3D scene reconstruction as an auxiliary supervisory signal. Our key insight is that 3D geometric structure recovered from 2D videos provides strong cues that can propagate sparse annotations across entire scenes. Specifically, a dual student-teacher architecture enforces semantic consistency between 2D images and reconstructed 3D point clouds, using state-of-the-art feed-forward reconstruction to generate reliable geometric supervision. Extensive experiments demonstrate that Rewis3d achieves state-of-the-art performance in sparse supervision, outperforming existing approaches by 2-7% without requiring additional labels or inference overhead.", "link": "http://arxiv.org/abs/2603.06374v1", "date": "2026-03-06", "relevancy": 2.8802, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5895}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5693}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5693}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rewis3d%3A%20Reconstruction%20Improves%20Weakly-Supervised%20Semantic%20Segmentation&body=Title%3A%20Rewis3d%3A%20Reconstruction%20Improves%20Weakly-Supervised%20Semantic%20Segmentation%0AAuthor%3A%20Jonas%20Ernst%20and%20Wolfgang%20Boettcher%20and%20Lukas%20Hoyer%20and%20Jan%20Eric%20Lenssen%20and%20Bernt%20Schiele%0AAbstract%3A%20We%20present%20Rewis3d%2C%20a%20framework%20that%20leverages%20recent%20advances%20in%20feed-forward%203D%20reconstruction%20to%20significantly%20improve%20weakly%20supervised%20semantic%20segmentation%20on%202D%20images.%20Obtaining%20dense%2C%20pixel-level%20annotations%20remains%20a%20costly%20bottleneck%20for%20training%20segmentation%20models.%20Alleviating%20this%20issue%2C%20sparse%20annotations%20offer%20an%20efficient%20weakly-supervised%20alternative.%20However%2C%20they%20still%20incur%20a%20performance%20gap.%20To%20address%20this%2C%20we%20introduce%20a%20novel%20approach%20that%20leverages%203D%20scene%20reconstruction%20as%20an%20auxiliary%20supervisory%20signal.%20Our%20key%20insight%20is%20that%203D%20geometric%20structure%20recovered%20from%202D%20videos%20provides%20strong%20cues%20that%20can%20propagate%20sparse%20annotations%20across%20entire%20scenes.%20Specifically%2C%20a%20dual%20student-teacher%20architecture%20enforces%20semantic%20consistency%20between%202D%20images%20and%20reconstructed%203D%20point%20clouds%2C%20using%20state-of-the-art%20feed-forward%20reconstruction%20to%20generate%20reliable%20geometric%20supervision.%20Extensive%20experiments%20demonstrate%20that%20Rewis3d%20achieves%20state-of-the-art%20performance%20in%20sparse%20supervision%2C%20outperforming%20existing%20approaches%20by%202-7%25%20without%20requiring%20additional%20labels%20or%20inference%20overhead.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06374v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRewis3d%253A%2520Reconstruction%2520Improves%2520Weakly-Supervised%2520Semanti {"title": "P-SLCR: Unsupervised Point Cloud Semantic Segmentation via Prototypes Structure Learning and Consistent Reasoning", "author": "Lixin Zhan and Jie Jiang and Tianjian Zhou and Yukun Du and Yan Zheng and Xuehu Duan", "abstract": "Current semantic segmentation approaches for point cloud scenes heavily rely on manual labeling, while research on unsupervised semantic segmentation methods specifically for raw point clouds is still in its early stages. Unsupervised point cloud learning poses significant challenges due to the absence of annotation information and the lack of pre-training. The development of effective strategies is crucial in this context. In this paper, we propose a novel prototype library-driven unsupervised point cloud semantic segmentation strategy that utilizes Structure Learning and Consistent Reasoning (P-SLCR). First, we propose a Consistent Structure Learning to establish structural feature learning between consistent points and the library of consistent prototypes by selecting high-quality features. Second, we propose a Semantic Relation Consistent Reasoning that constructs a prototype inter-relation matrix between consistent and ambiguous prototype libraries separately. This process ensures the preservation of semantic consistency by imposing constraints on consistent and ambiguous prototype libraries through the prototype inter-relation matrix. Finally, our method was extensively evaluated on the S3DIS, SemanticKITTI, and Scannet datasets, achieving the best performance compared to unsupervised methods. Specifically, the mIoU of 47.1% is achieved for Area-5 of the S3DIS dataset, surpassing the classical fully supervised method PointNet by 2.5%.", "link": "http://arxiv.org/abs/2603.06321v1", "date": "2026-03-06", "relevancy": 2.8437, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5796}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5641}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5625}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20P-SLCR%3A%20Unsupervised%20Point%20Cloud%20Semantic%20Segmentation%20via%20Prototypes%20Structure%20Learning%20and%20Consistent%20Reasoning&body=Title%3A%20P-SLCR%3A%20Unsupervised%20Point%20Cloud%20Semantic%20Segmentation%20via%20Prototypes%20Structure%20Learning%20and%20Consistent%20Reasoning%0AAuthor%3A%20Lixin%20Zhan%20and%20Jie%20Jiang%20and%20Tianjian%20Zhou%20and%20Yukun%20Du%20and%20Yan%20Zheng%20and%20Xuehu%20Duan%0AAbstract%3A%20Current%20semantic%20segmentation%20approaches%20for%20point%20cloud%20scenes%20heavily%20rely%20on%20manual%20labeling%2C%20while%20research%20on%20unsupervised%20semantic%20segmentation%20methods%20specifically%20for%20raw%20point%20clouds%20is%20still%20in%20its%20early%20stages.%20Unsupervised%20point%20cloud%20learning%20poses%20significant%20challenges%20due%20to%20the%20absence%20of%20annotation%20information%20and%20the%20lack%20of%20pre-training.%20The%20development%20of%20effective%20strategies%20is%20crucial%20in%20this%20context.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20prototype%20library-driven%20unsupervised%20point%20cloud%20semantic%20segmentation%20strategy%20that%20utilizes%20Structure%20Learning%20and%20Consistent%20Reasoning%20%28P-SLCR%29.%20First%2C%20we%20propose%20a%20Consistent%20Structure%20Learning%20to%20establish%20structural%20feature%20learning%20between%20consistent%20points%20and%20the%20library%20of%20consistent%20prototypes%20by%20selecting%20high-quality%20features.%20Second%2C%20we%20propose%20a%20Semantic%20Relation%20Consistent%20Reasoning%20that%20constructs%20a%20prototype%20inter-relation%20matrix%20between%20consistent%20and%20ambiguous%20prototype%20libraries%20separately.%20This%20process%20ensures%20the%20preservation%20of%20semantic%20consistency%20by%20imposing%20constraints%20on%20consistent%20and%20ambiguous%20prototype%20libraries%20through%20the%20prototype%20inter-relation%20matrix.%20Finally%2C%20our%20method%20was%20extensively%20evaluated%20on%20the%20S3DIS%2C%20SemanticKITTI%2C%20and%20Scannet%20datasets%2C%20achieving%20the%20best%20performance%20compared%20to%20unsupervised%20methods.%20Specifically%2C%20the%20mIoU%20of%2047.1%25%20is%20achieved%20for%20Area-5%20of%20the%20S3DIS%20dataset%2C%20surpassing%20the%20classical%20fully%20supervised%20method%20PointNet%20by%202.5%25.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06321v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DP-SLCR%253A%2520Unsupervised%2520Point%2520Cloud%2520Semantic%2520Segmentation%2520via%2520Prototypes%2520Structure%2520Learning%2520and%2520Consistent%2520Reasoning%26entry.906535625%3DLixin%2520Zhan%2520and%2520Jie%2520Jiang%2520and%2520Tianjian%2520Zhou%2520and%2520Yukun%2520Du%2520and%2520Yan%2520Zheng%2520and%2520Xuehu%2520Duan%26entry.1292438233%3DCurrent%2520semantic%2520segmentation%2520approaches%2520for%2520point%2520cloud%2520scenes%2520heavily%2520rely%2520on%2520manual%2520labeling%252C%2520while%2520research%2520on%2520unsupervised%2520semantic%2520segmentation%2520methods%2520specifically%2520for%2520raw%2520point%2520clouds%2520is%2520still%2520in%2520its%2520early%2520stages.%2520Unsupervised%2520point%2520cloud%2520learning%2520poses%2520significant%2520challenges%2520due%2520to%2520the%2520absence%2520of%2520annotation%2520information%2520and%2520the%2520lack%2520of%2520pre-training.%2520The%2520development%2520of%2520effective%2520strategies%2520is%2520crucial%2520in%2520this%2520context.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520prototype%2520library-driven%2520unsupervised%2520poi {"title": "PPLLaVA: Varied Video Sequence Understanding With Prompt Guidance", "author": "Shangkun Sun and Ruyang Liu and Haoran Tang and Yixiao Ge and Haibo Lu and Jiankun Yang and Chen Li", "abstract": "In the past year, video-based large language models (Video LLMs) have achieved impressive progress, particularly in their ability to process long videos through extremely extended context lengths. However, this comes at the cost of significantly increased computational overhead due to the massive number of visual tokens, making efficiency a major bottleneck. In this paper, we identify the root of this inefficiency as the high redundancy in video content. To address this, we propose a novel pooling strategy that enables aggressive token compression while retaining instruction-relevant visual semantics. Our model, Prompt-guided Pooling LLaVA (PPLLaVA), introduces three key components: a CLIP-based visual-prompt alignment module that identifies regions of interest based on user instructions, a prompt-guided pooling mechanism that adaptively compresses the visual sequence using convolution-style pooling, and a clip context extension module tailored for processing long and complex prompts in visual dialogues. With up to 18x token reduction, PPLLaVA maintains strong performance across tasks, achieving state-of-the-art results on diverse video understanding benchmarks-ranging from image-to-video tasks such as captioning and QA to long-form video reasoning-while significantly improving inference throughput. Codes have been available at https://github.com/farewellthree/PPLLaVA.", "link": "http://arxiv.org/abs/2411.02327v3", "date": "2026-03-06", "relevancy": 2.8392, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", " {"title": "Spatial4D-Bench: A Versatile 4D Spatial Intelligence Benchmark", "author": "Pan Wang and Yang Liu and Guile Wu and Eduardo R. Corral-Soto and Chengjie Huang and Binbin Xu and Dongfeng Bai and Xu Yan and Yuan Ren and Xingxin Chen and Yizhe Wu and Tao Huang and Wenjun Wan and Xin Wu and Pei Zhou and Xuyang Dai and Kangbo Lv and Hongbo Zhang and Yosef Fried and Aixue Ye and Bailan Feng and Zhenyu Chen and Zhen Li and Yingcong Chen and Yiyi Liao and Bingbing Liu", "abstract": "4D spatial intelligence involves perceiving and processing how objects move or change over time. Humans naturally possess 4D spatial intelligence, supporting a broad spectrum of spatial reasoning abilities. To what extent can Multimodal Large Language Models (MLLMs) achieve human-level 4D spatial intelligence? In this work, we present Spatial4D-Bench, a versatile 4D spatial intelligence benchmark designed to comprehensively assess the 4D spatial reasoning abilities of MLLMs. Unlike existing spatial intelligence benchmarks that are often small-scale or limited in diversity, Spatial4D-Bench provides a large-scale, multi-task evaluation benchmark consisting of ~40,000 question-answer pairs covering 18 well-defined tasks. We systematically organize these tasks into six cognitive categories: object understanding, scene understanding, spatial relationship understanding, spatiotemporal relationship understanding, spatial reasoning and spatiotemporal reasoning. Spatial4D-Bench thereby offers a structured and comprehensive benchmark for evaluating the spatial cognition abilities of MLLMs, covering a broad spectrum of tasks that parallel the versatility of human spatial intelligence. We benchmark various state-of-the-art open-source and proprietary MLLMs on Spatial4D-Bench and reveal their substantial limitations in a wide variety of 4D spatial reasoning aspects, such as route plan, action recognition, and physical plausibility reasoning. We hope that the findings provided in this work offer valuable insights to the community and that our benchmark can facilitate the development of more capable MLLMs toward human-level 4D spatial intelligence. More resources can be found on our project page.", "link": "http://arxiv.org/abs/2601.00092v2", "date": "2026-03-06", "relevancy": 2.8268, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5831}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5831}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.53}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatial4D-Bench%3A%20A%20Versatile%204D%20Spatial%20Intelligence%20Benchmark&body=Title%3A%20Spatial4D-Bench%3A%20A%20Versatile%204D%20Spatial%20Intelligence%20Benchmark%0AAuthor%3A%20Pan%20Wang%20and%20Yang%20Liu%20and%20Guile%20Wu%20and%20Eduardo%20R.%20Corral-Soto%20and%20Chengjie%20Huang%20and%20Binbin%20Xu%20and%20Dongfeng%20Bai%20and%20Xu%20Yan%20and%20Yuan%20Ren%20and%20Xingxin%20Chen%20and%20Yizhe%20Wu%20and%20Tao%20Huang%20and%20Wenjun%20Wan%20and%20Xin%20Wu%20and%20Pei%20Zhou%20and%20Xuyang%20Dai%20and%20Kangbo%20Lv%20and%20Hongbo%20Zhang%20and%20Yosef%20Fried%20and%20Aixue%20Ye%20and%20Bailan%20Feng%20and%20Zhenyu%20Chen%20and%20Zhen%20Li%20and%20Yingcong%20Chen%20and%20Yiyi%20Liao%20and%20Bingbing%20Liu%0AAbstract%3A%204D%20spatial%20intelligence%20involves%20perceiving%20and%20processing%20how%20objects%20move%20or%20change%20over%20time.%20Humans%20naturally%20possess%204D%20spatial%20intelligence%2C%20supporting%20a%20broad%20spectrum%20of%20spatial%20reasoning%20abilities.%20To%20what%20extent%20can%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20achieve%20human-level%204D%20spatial%20intelligence%3F%20In%20this%20work%

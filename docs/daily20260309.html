{"title": "OralGPT-Plus: Learning to Use Visual Tools via Reinforcement Learning for Panoramic X-ray Analysis", "author": "Yuxuan Fan and Jing Hao and Hong Chen and Jiahao Bao and Yihua Shao and Yuci Liang and Kuo Feng Hung and Hao Tang", "abstract": "Panoramic dental radiographs require fine-grained spatial reasoning, bilateral symmetry understanding, and multi-step diagnostic verification, yet existing vision-language models operate under a static single-pass paradigm that limits their clinical reliability. In this paper, we introduce OralGPT-Plus, an agentic vision-language model designed to perform iterative and symmetry-aware diagnostic reasoning for panoramic dental radiograph analysis. To support this paradigm, we construct DentalProbe, a five-thousand-image dataset with expert-curated diagnostic trajectories that provide structured supervision for localized inspection and contralateral comparison. We further develop a Reinspection-driven reinforcement learning framework that encourages clinically meaningful re-examination and stabilizes long-horizon reasoning with rubric-based reward and conditioned diagnostic-driven reward. In parallel, we present MMOral-X, the first benchmark for holistic panoramic diagnosis, containing 300 open-ended questions and region-level annotations across multiple difficulty levels. OralGPT-Plus demonstrates consistent and reliable improvements over strong baselines on MMOral-X and established panoramic benchmarks, indicating the effectiveness of interactive and symmetry-informed reasoning. Our work highlights the value of agentic modeling for dental imaging and provides a foundation for future research in clinically aligned panoramic radiograph analysis.", "link": "http://arxiv.org/abs/2603.06366v1", "date": "2026-03-06", "relevancy": 2.8041, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5341}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OralGPT-Plus%3A%20Learning%20to%20Use%20Visual%20Tools%20via%20Reinforcement%20Learning%20for%20Panoramic%20X-ray%20Analysis&body=Title%3A%20OralGPT-Plus%3A%20Learning%20to%20Use%20Visual%20Tools%20via%20Reinforcement%20Learning%20for%20Panoramic%20X-ray%20Analysis%0AAuthor%3A%20Yuxuan%20Fan%20and%20Jing%20Hao%20and%20Hong%20Chen%20and%20Jiahao%20Bao%20and%20Yihua%20Shao%20and%20Yuci%20Liang%20and%20Kuo%20Feng%20Hung%20and%20Hao%20Tang%0AAbstract%3A%20Panoramic%20dental%20radiographs%20require%20fine-grained%20spatial%20reasoning%2C%20bilateral%20symmetry%20understanding%2C%20and%20multi-step%20diagnostic%20verification%2C%20yet%20existing%20vision-language%20models%20operate%20under%20a%20static%20single-pass%20paradigm%20that%20limits%20their%20clinical%20reliability.%20In%20this%20paper%2C%20we%20introduce%20OralGPT-Plus%2C%20an%20agentic%20vision-language%20model%20designed%20to%20perform%20iterative%20and%20symmetry-aware%20diagnostic%20reasoning%20for%20panoramic%20dental%20radiograph%20analysis.%20To%20support%20this%20paradigm%2C%20we%20construct%20DentalProbe%2C%20a%20five-thousand-image%20dataset%20with%20expert-curated%20diagnostic%20trajectories%20that%20provide%20structured%20supervision%20for%20localized%20inspection%20and%20contralateral%20comparison.%20We%20further%20develop%20a%20Reinspection-driven%20reinforcement%20learning%20framework%20that%20encourages%20clinically%20meaningful%20re-examination%20and%20stabilizes%20long-horizon%20reasoning%20with%20rubric-based%20reward%20and%20conditioned%20diagnostic-driven%20reward.%20In%20parallel%2C%20we%20present%20MMOral-X%2C%20the%20first%20benchmark%20for%20holistic%20panoramic%20diagnosis%2C%20containing%20300%20open-ended%20questions%20and%20region-level%20annotations%20across%20multiple%20difficulty%20levels.%20OralGPT-Plus%20demonstrates%20consistent%20and%20reliable%20improvements%20over%20strong%20baselines%20on%20MMOral-X%20and%20established%20panoramic%20benchmarks%2C%20indicating%20the%20effectiveness%20of%20interactive%20and%20symmetry-informed%20reasoning.%20Our%20work%20highlights%20the%20value%20of%20agentic%20modeling%20for%20dental%20imaging%20and%20provides%20a%20foundation%20for%20future%20research%20in%20clinically%20aligned%20panoramic%20radiograph%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06366v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOralGPT-Plus%253A%2520Learning%2520to%2520Use%2520Visual%2520Tools%2520via%2520Reinforcement%2520Learning%2520for%2520Panoramic%2520X-ray%2520Analysis%26entry.906535625%3DYuxuan%2520Fan%2520and%2520Jing%2520Hao%2520and%2520Hong%2520Chen%2520and%2520Jiahao%2520Bao%2520and%2520Yihua%2520Shao%2520and%2520Yuci%2520Liang%2520and%2520Kuo%2520Feng%2520Hung%2520and%2520Hao%2520Tang%26entry.1292438233%3DPanoramic%2520dental%2520radiographs%2520require%2520fine-grained%2520spatial%2520reasoning%252C%2520bilateral%2520symmetry%2520understanding%252C%2520and%2520multi-step%2520diagnostic%2520verification%252C%2520yet%2520existing%2520vision-language%2520models%2520operate%2520under%2520a%2520static%2520single-pass%2520paradigm%2520that%2520limits%2520their%2520clinical%2520reliability.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520OralGPT-Plus%252C%2520an%2520agentic%2520vision-language%2520model%2520designed%2520to%2520perform%2520iterative%2520and%2520symmetry-aware%2520diagnostic%2520reasoning%2520for%2520panoramic%2520dental%2520radiograph%2520analysis.%2520To%2520support%2520this%2520paradigm%252C%2520we%2520construct%2520DentalProbe%252C%2520a%2520five- {"title": "Attribute Distribution Modeling and Semantic-Visual Alignment for Generative Zero-shot Learning", "author": "Haojie Pu and Zhuoming Li and Yongbiao Gao and Yuheng Jia", "abstract": "Generative zero-shot learning (ZSL) synthesizes features for unseen classes, leveraging semantic conditions to transfer knowledge from seen classes. However, it also introduces two intrinsic challenges: (1) class-level attributes fails to capture instance-specific visual appearances due to substantial intra-class variability, thus causing the class-instance gap; (2) the substantial mismatch between semantic and visual feature distributions, manifested in inter-class correlations, gives rise to the semantic-visual domain gap. To address these challenges, we propose an Attribute Distribution Modeling and Semantic-Visual Alignment (ADiVA) approach, jointly modeling attribute distributions and performing explicit semantic-visual alignment. Specifically, our ADiVA consists of two modules: an Attribute Distribution Modeling (ADM) module that learns a transferable attribute distribution for each class and samples instance-level attributes for unseen classes, and a Visual-Guided Alignment (VGA) module that refines semantic representations to better reflect visual structures. Experiments on three widely used benchmark datasets demonstrate that ADiVA significantly outperforms state-of-the-art methods (e.g., achieving gains of 4.7% and 6.1% on AWA2 and SUN, respectively). Moreover, our approach can serve as a plugin to enhance existing generative ZSL methods.", "link": "http://arxiv.org/abs/2603.06281v1", "date": "2026-03-06", "relevancy": 2.8007, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.581}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5528}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attribute%20Distribution%20Modeling%20and%20Semantic-Visual%20Alignment%20for%20Generative%20Zero-shot%20Learning&body=Title%3A%20Attribute%20Distribution%20Modeling%20and%20Semantic-Visual%20Alignment%20for%20Generative%20Zero-shot%20Learning%0AAuthor%3A%20Haojie%20Pu%20and%20Zhuoming%20Li%20and%20Yongbiao%20Gao%20and%20Yuheng%20Jia%0AAbstract%3A%20Generative%20zero-shot%20learning%20%28ZSL%29%20synthesizes%20features%20for%20unseen%20classes%2C%20leveraging%20semantic%20conditions%20to%20transfer%20knowledge%20from%20seen%20classes.%20However%2C%20it%20also%20introduces%20two%20intrinsic%20challenges%3A%20%281%29%20class-level%20attributes%20fails%20to%20capture%20instance-specific%20visual%20appearances%20due%20to%20substantial%20intra-class%20variability%2C%20thus%20causing%20the%20class-instance%20gap%3B%20%282%29%20the%20substantial%20mismatch%20between%20semantic%20and%20visual%20feature%20distributions%2C%20manifested%20in%20inter-class%20correlations%2C%20gives%20rise%20to%20the%20semantic-visual%20domain%20gap.%20To%20address%20these%20challenges%2C%20we%20propose%20an%20Attribute%20Distribution%20Modeling%20and%20Semantic-Visual%20Alignment%20%28ADiVA%29%20approach%2C%20jointly%20modeling%20attribute%20distributions%20and%20performing%20explicit%20semantic-visual%20alignment.%20Specifically%2C%20our%20ADiVA%20consists%20of%20two%20modules%3A%20an%20Attribute%20Distribution%20Modeling%20%28ADM%29%20module%20that%20learns%20a%20transferable%20attribute%20distribution%20for%20each%20class%20and%20samples%20instance-level%20attributes%20for%20unseen%20classes%2C%20and%20a%20Visual-Guided%20Alignment%20%28VGA%29%20module%20that%20refines%20semantic%20representations%20to%20better%20reflect%20visual%20structures.%20Experiments%20on%20three%20widely%20used%20benchmark%20datasets%20demonstrate%20that%20ADiVA%20significantly%20outperforms%20state-of-the-art%20methods%20%28e.g.%2C%20achieving%20gains%20of%204.7%25%20and%206.1%25%20on%20AWA2%20and%20SUN%2C%20respectively%29.%20Moreover%2C%20our%20approach%20can%20serve%20as%20a%20plugin%20to%20enhance%20existing%20generative%20ZSL%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06281v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttribute%2520Distribution%2520Modeling%2520and%2520Semantic-Visual%2520Alignment%2520for%2520Generative%2520Zero-shot%2520Learning%26entry.906535625%3DHaojie%2520Pu%2520and%2520Zhuoming%2520Li%2520and%2520Yongbiao%2520Gao%2520and%2520Yuheng%2520Jia%26entry.1292438233%3DGenerative%2520zero-shot%2520learning%2520%2528ZSL%2529%2520synthesizes%2520features%2520for%2520unseen%2520classes%252C%2520leveraging%2520semantic%2520conditions%2520to%2520transfer%2520knowledge%2520from%2520seen%2520classes.%2520However%252C%2520it%2520also%2520introduces%2520two%2520intrinsic%2520challenges%253A%2520%25281%2529%2520class-level%2520attributes%2520fails%2520to%2520capture%2520instance-specific%2520visual%2520appearances%2520due%2520to%2520substantial%2520intra-class%2520variability%252C%2520thus%2520causing%2520the%2520class-instance%2520gap%253B%2520%25282%2529%2520the%2520substantial%2520mismatch%2520between%2520semantic%2520and%2520visual%2520feature%2520distributions%252C%2520manifested%2520in%2520inter-class%2520correlations%252C%2520gives%2520rise%2520to%2520the%2520semantic-visual%2520domain%2520gap.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520an%2520Attribute%2520Distribution%2520Modeling%2520and%2520Semantic-Visual%2520Alignment%2520%2528ADiVA%2529%2520approach%252C%2520jointly%2520modeling%2520attribute%2520distributions%2520and%2520performing%2520explicit%2520semantic-visual%2520alignment.%2520Specifically%252C%2520our%2520ADiVA%2520consists%2520of%2520two%2520modu {"title": "CFEAR-Teach-and-Repeat: Fast and Accurate Radar-only Localization", "author": "Maximilian Hilger and Daniel Adolfsson and Ralf Becker and Henrik Andreasson and Achim J. Lilienthal", "abstract": "Reliable localization in prior maps is essential for autonomous navigation, particularly under adverse weather, where optical sensors may fail. We present CFEAR-TR, a teach-and-repeat localization pipeline using a single spinning radar, which is designed for easily deployable, lightweight, and robust navigation in adverse conditions. Our method localizes by jointly aligning live scans to both stored scans from the teach mapping pass, and to a sliding window of recent live keyframes. This ensures accurate and robust pose estimation across different seasons and weather phenomena. Radar scans are represented using a sparse set of oriented surface points, computed from Doppler-compensated measurements. The map is stored in a pose graph that is traversed during localization. Experiments on the held-out test sequences from the Boreas dataset show that CFEAR-TR can localize with an accuracy as low as 0.117 m and 0.096\u00b0, corresponding to improvements of up to 63% over the previous state of the art, while running efficiently at 29 Hz. These results substantially narrow the gap to lidar-level localization, particularly in heading estimation. We make the C++ implementation of our work available to the community.", "link": "http://arxiv.org/abs/2603.06501v1", "date": "2026-03-06", "relevancy": 2.7874, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5705}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5527}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5492}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CFEAR-Teach-and-Repeat%3A%20Fast%20and%20Accurate%20Radar-only%20Localization&body=Title%3A%20CFEAR-Teach-and-Repeat%3A%20Fast%20and%20Accurate%20Radar-only%20Localization%0AAuthor%3A%20Maximilian%20Hilger%20and%20Daniel%20Adolfsson%20and%20Ralf%20Becker%20and%20Henrik%20Andreasson%20and%20Achim%20J.%20Lilienthal%0AAbstract%3A%20Reliable%20localization%20in%20prior%20maps%20is%20essential%20for%20autonomous%20navigation%2C%20particularly%20under%20adverse%20weather%2C%20where%20optical%20sensors%20may%20fail.%20We%20present%20CFEAR-TR%2C%20a%20teach-and-repeat%20localization%20pipeline%20using%20a%20single%20spinning%20radar%2C%20which%20is%20designed%20for%20easily%20deployable%2C%20lightweight%2C%20and%20robust%20navigation%20in%20adverse%20conditions.%20Our%20method%20localizes%20by%20jointly%20aligning%20live%20scans%20to%20both%20stored%20scans%20from%20the%20teach%20mapping%20pass%2C%20and%20to%20a%20sliding%20window%20of%20recent%20live%20keyframes.%20This%20ensures%20accurate%20and%20robust%20pose%20estimation%20across%20different%20seasons%20and%20weather%20phenomena.%20Radar%20scans%20are%20represented%20using%20a%20sparse%20set%20of%20oriented%20surface%20points%2C%20computed%20from%20Doppler-compensated%20measurements.%20The%20map%20is%20stored%20in%20a%20pose%20graph%20that%20is%20traversed%20during%20localization.%20Experiments%20on%20the%20held-out%20test%20sequences%20from%20the%20Boreas%20dataset%20show%20that%20CFEAR-TR%20can%20localize%20with%20an%20accuracy%20as%20low%20as%200.117%20m%20and%200.096%C2%B0%2C%20corresponding%20to%20improvements%20of%20up%20to%2063%25%20over%20the%20previous%20state%20of%20the%20art%2C%20while%20running%20efficiently%20at%2029%20Hz.%20These%20results%20substantially%20narrow%20the%20gap%20to%20lidar-level%20localization%2C%20particularly%20in%20heading%20estimation.%20We%20make%20the%20C%2B%2B%20implementation%20of%20our%20work%20available%20to%20the%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06501v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCFEAR-Teach-and-Repeat%253A%2520Fast%2520and%2520Accurate%2520Radar-only%2520Localization%26entry.906535625%3DMaximilian%2520Hilger%2520and%2520Daniel%2520Adolfsson%2520and%2520Ralf%2520Becker%2520and%2520Henrik%2520Andreasson%2520and%2520Achim%2520J.%2520Lilienthal%26entry.1292438233%3DReliable%2520localization%2520in%2520prior%2520maps%2520is%2520essential%2520for%2520autonomous%2520navigation%252C%2520particularly%2520under%2520adverse%2520weather%252C%2520where%2520optical%2520sensors%2520may%2520fail.%2520We%2520present%2520CFEAR-TR%252C%2520a%2520teach-and-repeat%2520localization%2520pipeline%2520using%2520a%2520single%2520spinning%2520radar%252C%2520which%2520is%2520designed%2520for%2520easily%2520deployable%252C%2520lightweight%252C%2520and%2520robust%2520navigation%2520in%2520adverse%2520conditions.%2520Our%2520method%2520localizes%2520by%2520jointly%2520aligning%2520live%2520scans%2520to%2520both%2520stored%2520scans%2520from%2520the%2520teach%2520mapping%2520pass%252C%2520and%2520to%2520a%2520sliding%2520window%2520of%2520recent%2520live%2520keyframes.%2520This%2520ensures%2520accurate%2520and%2520robust%2520pose%2520estimation%2520across%2520different%2520seasons%2520and%2520weather%2520phenomena.%2520Radar%2520scans%2520are%2520represented%2520using%2520a%2520sparse%2520set%2520of%2520oriented%2520surface%2520points%252C%2520computed%2520from%2520Doppler-compensated%2520measurements.%2520The%2520map%2520is%2520stored%2520in%2520a%2520pose%2520graph%2520that%2520is%2520traversed%2520during%2520localization.%2520Experiments%2520on%2520the%2520held-out%2520test%2520sequences%2520from%2520the%2520Boreas%2520dataset%2520show%2520that%2520CFEAR-TR%2520can%2520localize%2520with%2520an%2520accuracy%2520as%2520low%2520as%25200.117%2520m%2520and%25200.096%25C2%25B0%252C%2520corresponding%2520to%2520improvements%2520of%2520up%2520to%252063%2525%2520over%2520the%2520previous%2520state%2520of%2520the%2520art%252C%2520while%2520running%2520efficiently%2520at%252029%2520Hz.%2520These%2520results%2520substantially%2520narrow%2520the%2520gap%2520to%2520lidar-level%2520localization%252C%2520particularly%2520in%2520heading%2520estimation.%2520We%2520make%2520the%2520C%252B%252B%2520implementation%2520of%2520our%2520work%2520available%2520to%2520the%2520community.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06501v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CFEAR-Teach-and-Repeat%3A%20Fast%20and%20Accurate%20Radar-only%20Localization&entry.906535625=Maximilian%20Hilger%20and%20Daniel%20Adolfsson%20and%20Ralf%20Becker%20and%20Henrik%20Andreasson%20and%20Achim%20J.%20Lilienthal&entry.1292438233=Reliable%20localization%20in%20prior%20maps%20is%20essential%20for%20autonomous%20navigation%2C%20particularly%20under%20adverse%20weather%2C%20where%20optical%20sensors%20may%20fail.%20We%20present%20CFEAR-TR%2C%20a%20teach-and-repeat%20localization%20pipeline%20using%20a%20single%20spinning%20radar%2C%20which%20is%20designed%20for%20easily%20deployable%2C%20lightweight%2C%20and%20robust%20navigation%20in%20adverse%20conditions.%20Our%20method%20localizes%20by%20jointly%20aligning%20live%20scans%20to%20both%20stored%20scans%20from%20the%20teach%20mapping%20pass%2C%20and%20to%20a%20sliding%20window%20of%20recent%20live%20keyframes.%20This%20ensures%20accurate%20and%20robust%20pose%20estimation%20across%20different%20seasons%20and%20weather%20phenomena.%20Radar%20scans%20are%20represented%20using%20a%20sparse%20set%20of%20oriented%20surface%20points%2C%20computed%20from%20Doppler-compensated%20measurements.%20The%20map%20is%20stored%20in%20a%20pose%20graph%20that%20is%20traversed%20during%20localizat {"title": "NarrLV: Towards a Comprehensive Narrative-Centric Evaluation for Long Video Generation", "author": "X. Feng and H. Yu and M. Wu and S. Hu and J. Chen and C. Zhu and J. Wu and X. Chu and K. Huang", "abstract": "With the rapid development of foundation video generation technologies, long video generation models have exhibited promising research potential thanks to expanded content creation space. Recent studies reveal that the goal of long video generation tasks is not only to extend video duration but also to accurately express richer narrative content within longer videos. However, due to the lack of evaluation benchmarks specifically designed for long video generation models, the current assessment of these models primarily relies on benchmarks with simple narrative prompts (e.g., VBench). To the best of our knowledge, our proposed NarrLV is the first benchmark to comprehensively evaluate the Narrative expression capabilities of Long Video generation models. Inspired by film narrative theory, (i) we first introduce the basic narrative unit maintaining continuous visual presentation in videos as Temporal Narrative Atom (TNA), and use its count to quantitatively measure narrative richness. Guided by three key film narrative elements influencing TNA changes, we construct an automatic prompt generation pipeline capable of producing evaluation prompts with a flexibly expandable number of TNAs. (ii) Then, based on the three progressive levels of narrative content expression, we design an effective evaluation metric using the MLLM-based question generation and answering framework. (iii) Finally, we conduct extensive evaluations on existing long video generation models and the foundation generation models. Experimental results demonstrate that our metric aligns closely with human judgments. The derived evaluation outcomes reveal the detailed capability boundaries of current video generation models in narrative content expression.", "link": "http://arxiv.org/abs/2507.11245v5", "date": "2026-03-06", "relevancy": 2.7732, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NarrLV%3A%20Towards%20a%20Comprehensive%20Narrative-Centric%20Evaluation%20for%20Long%20Video%20Generation&body=Title%3A%20NarrLV%3A%20Towards%20a%20Comprehensive%20Narrative-Centric%20Evaluation%20for%20Long%20Video%20Generation%0AAuthor%3A%20X.%20Feng%20and%20H.%20Yu%20and%20M.%20Wu%20and%20S.%20Hu%20and%20J.%20Chen%20and%20C.%20Zhu%20and%20J.%20Wu%20and%20X.%20Chu%20and%20K.%20Huang%0AAbstract%3A%20With%20the%20rapid%20development%20of%20foundation%20video%20generation%20technologies%2C%20long%20video%20generation%20models%20have%20exhibited%20promising%20research%20potential%20thanks%20to%20expanded%20content%20creation%20space.%20Recent%20studies%20reveal%20that%20the%20goal%20of%20long%20video%20generation%20tasks%20is%20not%20only%20to%20extend%20video%20duration%20but%20also%20to%20accurately%20express%20richer%20narrative%20content%20within%20longer%20videos.%20However%2C%20due%20to%20the%20lack%20of%20evaluation%20benchmarks%20specifically%20designed%20for%20long%20video%20generation%20models%2C%20the%20current%20assessment%20of%20these%20models%20primarily%20relies%20on%20benchmarks%20with%20simple%20narrative%20prompts%20%28e.g.%2C%20VBench%29.%20To%20the%20best%20of%20our%20knowledge%2C%20our%20proposed%20NarrLV%20is%20the%20first%20benchmark%20to%20comprehensively%20evaluate%20the%20Narrative%20expression%20capabilities%20of%20Long%20Video%20generation%20models.%20Inspired%20by%20film%20narrative%20theory%2C%20%28i%29%20we%20first%20introduce%20the%20basic%20narrative%20unit%20maintaining%20continuous%20visual%20presentation%20in%20videos%20as%20Temporal%20Narrative%20Atom%20%28TNA%29%2C%20and%20use%20its%20count%20to%20quantitatively%20measure%20narrative%20richness.%20Guided%20by%20three%20key%20film%20narrative%20elements%20influencing%20TNA%20changes%2C%20we%20construct%20an%20automatic%20prompt%20generation%20pipeline%20capable%20of%20producing%20evaluation%20prompts%20with%20a%20flexibly%20expandable%20number%20of%20TNAs.%20%28ii%29%20Then%2C%20based%20on%20the%20three%20progressive%20levels%20of%20narrative%20content%20expression%2C%20we%20design%20an%20effective%20evaluation%20metric%20using%20the%20MLLM-based%20question%20generation%20and%20answering%20framework.%20%28iii%29%20Finally%2C%20we%20conduct%20extensive%20evaluations%20on%20existing%20long%20video%20generation%20models%20and%20the%20foundation%20generation%20models.%20Experimental%20results%20demonstrate%20that%20our%20metric%20aligns%20closely%20with%20human%20judgments.%20The%20derived%20evaluation%20outcomes%20reveal%20the%20detailed%20capability%20boundaries%20of%20current%20video%20generation%20models%20in%20narrative%20content%20expression.%0ALink%3A%20http%3A//arxiv.org/abs/2507.11245v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNarrLV%253A%2520Towards%2520a%2520Comprehensive%2520Narrative-Centric%2520Evaluation%2520for%2520Long%2520Video%2520Generation%26entry.906535625%3DX.%2520Feng%2520and%2520H.%2520Yu%2520and%2520M.%2520Wu%2520and%2520S.%2520Hu%2520and%2520J.%2520Chen%2520and%2520C.%2520Zhu%2520and%2520J.%2520Wu%2520and%2520X.%2520Chu%2520and%2520K.%2520Huang%26entry.1292438233%3DWith%2520the%2520rapid%2520development%2520of%2520foundation%2520video%2520generation%2520technologies%252C%2520long%2520video%2520generation%2520models {"title": "SurgFormer: Scalable Learning of Organ Deformation with Resection Support and Real-Time Inference", "author": "Ashkan Shahbazi and Elaheh Akbari and Kyvia Pereira and Jon S. Heiselman and Annie C. Benson and Garrison L. H. Johnston and Jie Ying Wu and Nabil Simaan and Michael I. Miga and Soheil Kolouri", "abstract": "We introduce SurgFormer, a multiresolution gated transformer for data driven soft tissue simulation on volumetric meshes. High fidelity biomechanical solvers are often too costly for interactive use, so we train SurgFormer on solver generated data to predict nodewise displacement fields at near real time rates. SurgFormer builds a fixed mesh hierarchy and applies repeated multibranch blocks that combine local message passing, coarse global self attention, and pointwise feedforward updates, fused by learned per node, per channel gates to adaptively integrate local and long range information while remaining scalable on large meshes. For cut conditioned simulation, resection information is encoded as a learned cut embedding and provided as an additional input, enabling a unified model for both standard deformation prediction and topology altering cases. We also introduce two surgical simulation datasets generated under a unified protocol with XFEM based supervision: a cholecystectomy resection dataset and an appendectomy manipulation and resection dataset with cut and uncut cases. To our knowledge, this is the first learned volumetric surrogate setting to study XFEM supervised cut conditioned deformation within the same volumetric pipeline as standard deformation prediction. Across diverse baselines, SurgFormer achieves strong accuracy with favorable efficiency, making it a practical backbone for both tasks. {Code, data, and project page: \\href{https://mint-vu.github.io/SurgFormer/}{available here}}", "link": "http://arxiv.org/abs/2603.06543v1", "date": "2026-03-06", "relevancy": 2.757, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5715}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.55}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5327}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SurgFormer%3A%20Scalable%20Learning%20of%20Organ%20Deformation%20with%20Resection%20Support%20and%20Real-Time%20Inference&body=Title%3A%20SurgFormer%3A%20Scalable%20Learning%20of%20Organ%20Deformation%20with%20Resection%20Support%20and%20Real-Time%20Inference%0AAuthor%3A%20Ashkan%20Shahbazi%20and%20Elaheh%20Akbari%20and%20Kyvia%20Pereira%20and%20Jon%20S.%20Heiselman%20and%20Annie%20C.%20Benson%20and%20Garrison%20L.%20H.%20Johnston%20and%20Jie%20Ying%20Wu%20and%20Nabil%20Simaan%20and%20Michael%20I.%20Miga%20and%20Soheil%20Kolouri%0AAbstract%3A%20We%20introduce%20SurgFormer%2C%20a%20multiresolution%20gated%20transformer%20for%20data%20driven%20soft%20tissue%20simulation%20on%20volumetric%20meshes.%20High%20fidelity%20biomechanical%20solvers%20are%20often%20too%20costly%20for%20interactive%20use%2C%20so%20we%20train%20SurgFormer%20on%20solver%20generated%20data%20to%20predict%20nodewise%20displacement%20fields%20at%20near%20real%20time%20rates.%20SurgFormer%20builds%20a%20fixed%20mesh%20hierarchy%20and%20applies%20repeated%20multibranch%20blocks%20that%20combine%20local%20message%20passing%2C%20coarse%20global%20self%20attention%2C%20and%20pointwise%20feedforward%20updates%2C%20fused%20by%20learned%20per%20node%2C%20per%20channel%20gates%20to%20adaptively%20integrate%20local%20and%20long%20range%20information%20while%20remaining%20scalable%20on%20large%20meshes.%20For%20cut%20conditioned%20simulation%2C%20resection%20information%20is%20encoded%20as%20a%20learned%20cut%20embedding%20and%20provided%20as%20an%20additional%20input%2C%20enabling%20a%20unified%20model%20for%20both%20standard%20deformation%20prediction%20and%20topology%20altering%20cases.%20We%20also%20introduce%20two%20surgical%20simulation%20datasets%20generated%20under%20a%20unified%20protocol%20with%20XFEM%20based%20supervision%3A%20a%20cholecystectomy%20resection%20dataset%20and%20an%20appendectomy%20manipulation%20and%20resection%20dataset%20with%20cut%20and%20uncut%20cases.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20learned%20volumetric%20surrogate%20setting%20to%20study%20XFEM%20supervised%20cut%20conditioned%20deformation%20within%20the%20same%20volumetric%20pipeline%20as%20standard%20deformation%20prediction.%20Across%20diverse%20baselines%2C%20SurgFormer%20achieves%20strong%20accuracy%20with%20favorable%20efficiency%2C%20making%20it%20a%20practical%20backbone%20for%20both%20tasks.%20%7BCode%2C%20data%2C%20and%20project%20page%3A%20%5Chref%7Bhttps%3A//mint-vu.github.io/SurgFormer/%7D%7Bavailable%20here%7D%7D%0ALink%3A%20http%3A//arxiv.org/abs/2603.06543v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSurgFormer%253A%2520Scalable%2520Learning%2520of%2520Organ%2520Deformation%2520with%2520Resection%2520Support%2520and%2520Real-Time%2520Inference%26entry.906535625%3DAshkan%2520Shahbazi%2520and%2520Elaheh%2520Akbari%2520and%2520Kyvia%2520Pereira%2520and%2520Jon%2520S.%2520Heiselman%2520and%2520Annie%2520C.%2520Benson%2520and%2520Garrison%2520L.%2520H.%2520Johnston%2520and%2520Jie%2520Ying%2520Wu%2520and%2520Nabil%2520Simaan%2520and%2520Michael%2520I.%2520Miga%2520and%2520Soheil%2520Kolouri%26entry.1292438233%3DWe%2520introduce%2520SurgFormer%252C%2520a%2520multiresolution%2520gated%2520transformer%2520for%2520data%2520driven%2520soft%2520tissue%2520simulation%2520on%2520volumetric%2520meshes.%2520High%2520fidelity%2520biomechanical%2520solvers%2520are%2520often%2520too%2520co s.%2520%257BCode%252C%2520data%252C%2520and%2520project%2520page%253A%2520%255Chref%257Bhttps%253A//mint-vu.github.io/SurgFormer/%257D%257Bavailable%2520here%257D%257D%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06543v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SurgFormer%3A%20Scalable%20Learning%20of%20Organ%20Deformation%20with%20Resection%20Support%20and%20Real-Time%20Inference&entry.906535625=Ashkan%20Shahbazi%20and%20Elaheh%20Akbari%20and%20Kyvia%20Pereira%20and%20Jon%20S.%20Heiselman%20and%20Annie%20C.%20Benson%20and%20Garrison%20L.%20H.%20Johnston%20and%20Jie%20Ying%20Wu%20and%20Nabil%20Simaan%20and%20Michael%20I.%20Miga%20and%20Soheil%20Kolouri&entry.1292438233=We%20introduce%20SurgFormer%2C%20a%20multiresolution%20gated%20transformer%20for%20data%20driven%20soft%20tissue%20simulation%20on%20volumetric%20meshes.%20High%20fidelity%20biomechanical%20solvers%20are%20often%20too%20costly%20for%20interactive%20use%2C%20so%20we%20train%20SurgFormer%20on%20solver%20generated%20data%20to%20predict%20nodewise%20displacement%20fields%20at%20near%20real%20time%20rates.%20SurgFormer%20builds%20a%20fixed%20mesh%20hierarchy%20and%20applies%20repeated%20multibranch%20blocks%20that%20combine%20local%20message%20passing%2C%20coarse%20global%20self%20attention%2C%20and%20pointwise%20feedforward%20updates%2C%20fused%20by%20learned%20per%20node%2C%20per%20channel%20gates%20to%20adaptively%20integrate%20local%20and%20long%20range%20information%20while%20remaining%20scalable%20on%20large%20meshes.%20For%20cut%20conditioned%20simulation%2C%20resection%20information%20is%20encoded%20as%20a%20learned%20cut%20embedding%20and%20provided%20as%20an%20additional%20input%2C%20enabling%20a%20unified%20model%20for%20both%20standard%20deformation%20prediction%20and%20topology%20altering%20cases.%20We%20also%20introduce%20two%20surgical%20simulation%20datasets%20generated%20un {"title": "CASA: Cross-Attention over Self-Attention for Efficient Vision-Language Fusion", "author": "Moritz B\u00f6hle and Am\u00e9lie Royer and Juliette Marrie and Edouard Grave and Patrick P\u00e9rez", "abstract": "Vision-language models (VLMs) are commonly trained by directly inserting image tokens from a pretrained vision encoder into the text stream of a language model. This allows text and image information to fully attend to one another within the model, but becomes rapidly costly for long multi-image conversations or streaming video applications, both in terms of memory and compute. VLMs leveraging cross-attention (CA) are an efficient alternative to token insertion as image tokens are not added to the KV cache. Despite being introduced early on, multimodal CA models are scarce in the current VLM literature and often underperform their token insertion counterparts. In this work, we reinvestigate the effectiveness of cross-attention for vision-language modeling: (i) We analyze the core differences between the cross-attention and self-attention mechanisms, (ii) we train cross-attention VLMs both from a text-only LLM and by adapting a pretrained insertion-based VLM, showing that simple cross-attention is far more competitive with token insertion than previously reported, and (iii) we demonstrate the practical advantages of cross-attention on real-time video captioning, where it naturally maintains low latency and near-constant memory cost. For samples and code, please see our project page at https://kyutai.org/casa .", "link": "http://arxiv.org/abs/2512.19535v2", "date": "2026-03-06", "relevancy": 2.7551, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5729}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5438}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5363}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CASA%3A%20Cross-Attention%20over%20Self-Attention%20for%20Efficient%20Vision-Language%20Fusion&body=Title%3A%20CASA%3A%20Cross-Attention%20over%20Self-Attention%20for%20Efficient%20Vision-Language%20Fusion%0AAuthor%3A%20Moritz%20B%C3%B6hle%20and%20Am%C3%A9lie%20Royer%20and%20Juliette%20Marrie%20and%20Edouard%20Grave%20and%20Patrick%20P%C3%A9rez%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20are%20commonly%20trained%20by%20directly%20inserting%20image%20tokens%20from%20a%20pretrained%20vision%20encoder%20into%20the%20text%20stream%20of%20a%20language%20model.%20This%20allows%20text%20and%20image%20information%20to%20fully%20attend%20to%20one%20another%20within%20the%20model%2C%20but%20becomes%20rapidly%20costly%20for%20long%20multi-image%20conversations%20or%20streaming%20video%20applications%2C%20both%20in%20terms%20of%20memory%20and%20compute.%20VLMs%20leveraging%20cross-attention%20%28CA%29%20are%20an%20efficient%20alternative%20to%20token%20insertion%20as%20image%20tokens%20are%20not%20added%20to%20the%20KV%20cache.%20Despite%20being%20introduced%20early%20on%2C%20multimodal%20CA%20models%20are%20scarce%20in%20the%20current%20VLM%20literature%20and%20often%20underperform%20their%20token%20insertion%20counterparts.%20In%20this%20work%2C%20we%20reinvestigate%20the%20effectiveness%20of%20cross-attention%20for%20vision-language%20modeling%3A%20%28i%29%20We%20analyze%20the%20core%20differences%20between%20the%20cross-attention%20and%20self-attention%20mechanisms%2C%20%28ii%29%20we%20train%20cross-attention%20VLMs%20both%20from%20a%20text-only%20LLM%20and%20by%20adapting%20a%20pretrained%20insertion-based%20VLM%2C%20showing%20that%20simple%20cross-attention%20is%20far%20more%20competitive%20with%20token%20insertion%20than%20previously%20reported%2C%20and%20%28iii%29%20we%20demonstrate%20the%20practic {"title": "InsSo3D: Inertial Navigation System and 3D Sonar SLAM for turbid environment inspection", "author": "Simon Archieri and Ahmet Cinar and Shu Pan and Jonatan Scharff Willners and Michele Grimaldi and Ignacio Carlucho and Yvan Petillot", "abstract": "This paper presents InsSo3D, an accurate and efficient method for large-scale 3D Simultaneous Localisation and Mapping (SLAM) using a 3D Sonar and an Inertial Navigation System (INS). Unlike traditional sonar, which produces 2D images containing range and azimuth information but lacks elevation information, 3D Sonar produces a 3D point cloud, which therefore does not suffer from elevation ambiguity. We introduce a robust and modern SLAM framework adapted to the 3D Sonar data using INS as prior, detecting loop closure and performing pose graph optimisation. We evaluated InsSo3D performance inside a test tank with access to ground truth data and in an outdoor flooded quarry. Comparisons to reference trajectories and maps obtained from an underwater motion tracking system and visual Structure From Motion (SFM) demonstrate that InsSo3D efficiently corrects odometry drift. The average trajectory error is below 21cm during a 50-minute-long mission, producing a map of 10m by 20m with a 9cm average reconstruction error, enabling safe inspection of natural or artificial underwater structures even in murky water conditions.", "link": "http://arxiv.org/abs/2601.05805v2", "date": "2026-03-06", "relevancy": 2.7226, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.57}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.539}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5247}], "mailt nk%3A%20http%3A//arxiv.org/abs/2601.05805v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInsSo3D%253A%2520Inertial%2520Navigation%2520System%2520and%25203D%2520Sonar%2520SLAM%2520for%2520turbid%2520environment%2520inspection%26entry.906535625%3DSimon%2520Archieri%2520and%2520Ahmet%2520Cinar%2520and%2520Shu%2520Pan%2520and%2520Jonatan%2520Scharff%2520Willners%2520and%2520Michele%2520Grimaldi%2520and%2520Ignacio%2520Carlucho%2520and%2520Yvan%2520Petillot%26entry.1292438233%3DThis%2520paper%2520presents%2520InsSo3D%252C%2520an%2520accurate%2520and%2520efficient%2520method%2520for%2520large-scale%25203D%2520Simultaneous%2520Localisation%2520and%2520Mapping%2520%2528SLAM%2529%2520using%2520a%25203D%2520Sonar%2520and%2520an%2520Inertial%2520Navigation%2520System%2520%2528INS%2529.%2520Unlike%2520traditional%2520sonar%252C%2520which%2520produces%25202D%2520images%2520containing%2520range%2520and%2520azimuth%2520information%2520but%2520lacks%2520elevation%2520information%252C%25203D%2520Sonar%2520produces%2520a%25203D%2520point%2520cloud%252C%2520which%2520therefore%2520does%2520not%2520suffer%2520from%2520elevation%2520ambiguity.%2520We%2520introduce%2520a%2520robust%2520and%2520modern%2520SLAM%2520framework%2520adapted%2520to%2520the%25203D%2520Sonar%2520data%2520using%2520INS%2520as%2520prior%252C%2520detecting%2520loop%2520closure%2520and%2520performing%2520pose%2520graph%2520optimisation.%2520We%2520evaluated%2520InsSo3D%2520performance%2520inside%2520a%2520test%2520tank%2520with%2520access%2520to%2520ground%2520truth%2520data%2520and%2520in%2520an%2520outdoor%2520flooded%2520quarry.%2520Comparisons%2520to%2520reference%2520trajectories%2520and%2520maps%2520obtained%2520from%2520an%2520underwater%2520motion%2520tracking%2520system%2520and%2520visual%2520Structure%2520From%2520Motion%2520%2528SFM%2529%2520demonstrate%2520that%2520InsSo3D%2520efficiently%2520corrects%2520odometry%25 {"title": "SpatialReward: Bridging the Perception Gap in Online RL for Image Editing via Explicit Spatial Reasoning", "author": "Yancheng Long and Yankai Yang and Hongyang Wei and Wei Chen and Tianke Zhang and Haonan fan and Changyi Liu and Kaiyu Jiang and Jiankang Chen and Kaiyu Tang and Bin Wen and Fan Yang and Tingting Gao and Han Li and Shuo Yang", "abstract": "Online Reinforcement Learning (RL) offers a promising avenue for complex image editing but is currently constrained by the scarcity of reliable and fine-grained reward signals. Existing evaluators frequently struggle with a critical perception gap we term \"Attention Collapse,\" where models neglect cross-image comparisons and fail to capture fine-grained details, resulting in inaccurate perception and miscalibrated scores. To address these limitations, we propose SpatialReward, a reward model that enforces precise verification via explicit spatial reasoning. By anchoring reasoning to predicted edit regions, SpatialReward grounds semantic judgments in pixel-level evidence, significantly enhancing evaluative accuracy. Trained on a curated 260k spatial-aware dataset, our model achieves state-of-the-art performance on MMRB2 and EditReward-Bench, and outperforms proprietary evaluators on our proposed MultiEditReward-Bench. Furthermore, SpatialReward serves as a robust signal in online RL, boosting OmniGen2 by +0.90 on GEdit-Bench--surpassing the leading discriminative model and doubling the gain of GPT-4.1 (+0.45). These results demonstrate that spatial reasoning is essential for unlocking effective alignment in image editing.", "link": "http://arxiv.org/abs/2602.07458v3", "date": "2026-03-06", "relevancy": 2.7176, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5641}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5337}, {"title": {"title": "GazeMoE: Perception of Gaze Target with Mixture-of-Experts", "author": "Zhuangzhuang Dai and Zhongxi Lu and Vincent G. Zakka and Luis J. Manso and Jose M Alcaraz Calero and Chen Li", "abstract": "Estimating human gaze target from visible images is a critical task for robots to understand human attention, yet the development of generalizable neural architectures and training paradigms remains challenging. While recent advances in pre-trained vision foundation models offer promising avenues for locating gaze targets, the integration of multi-modal cues -- including eyes, head poses, gestures, and contextual features -- demands adaptive and efficient decoding mechanisms. Inspired by Mixture-of-Experts (MoE) for adaptive domain expertise in large vision-language models, we propose GazeMoE, a novel end-to-end framework that selectively leverages gaze-target-related cues from a frozen foundation model through MoE modules. To address class imbalance in gaze target classification (in-frame vs. out-of-frame) and enhance robustness, GazeMoE incorporates a class-balancing auxiliary loss alongside strategic data augmentations, including region-specific cropping and photometric transformations. Extensive experiments on benchmark datasets demonstrate that our GazeMoE achieves state-of-the-art performance, outperforming existing methods on challenging gaze estimation tasks. The code and pre-trained models are released at https://huggingface.co/zdai257/GazeMoE", "link": "http://arxiv.org/abs/2603.06256v1", "date": "2026-03-06", "relevancy": 2.7088, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5432}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5411}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GazeMoE%3A%20Perception%20of%20Gaze%20Target%20with%20Mixture-of-Experts&body=Title%3A%20GazeMoE%3A%20Perception%20of%20Gaze%20Target%20with%20Mixture-of-Experts%0AAuthor%3A%20Zhuangzhuang%20Dai%20and%20Zhongxi%20Lu%20and%20Vincent%20G.%20Zakka%20and%20Luis%20J.%20Manso%20and%20Jose%20M%20Alcaraz%20Calero%20and%20Chen%20Li%0AAbstract%3A%20Estimating%20human%20gaze%20target%20from%20visible%20images%20is%20a%20critical%20task%20for%20robots%20to%20understand%20human%20attention%2C%20yet%20the%20development%20of%20generalizable%20neural%20architectures%20and%20training%20paradigms%20remains%20challenging.%20While%20recent%20advances%20in%20pre-trained%20vision%20foundation%20models%20offer%20promising%20avenues%20for%20locating%20gaze%20targets%2C%20the%20integration%20of%20multi-modal%20cues%20--%20including%20eyes%2C%20head%20poses%2C%20gestures%2C%20and%20contextual%20features%20--%20demands%20adaptive%20and%20efficient%20decoding%20mechanisms.%20Inspired%20by%20Mixture-of-Experts%20%28MoE%29%20for%20adaptive%20domain%20expertise%20in%20large%20vision-language%20models%2C%20we%20propose%20GazeMoE%2C%20a%20novel%20end-to-end%20framework%20that%20selectively%20leverages%20gaze-target-related%20cues%20from%20a%20frozen%20foundation%20model%20through%20MoE%20modules.%20To%20address%20class%20imbalance%20in%20gaze%20target%20classification%20%28in-frame%20vs.%20out-of-frame%29%20and%20enhance%20robustness%2C%20GazeMoE%20incorporates%20a%20class-balancing%20auxiliary%20loss%20alongside%20strategic%20data%20augmentations%2C%20including%20region-specific%20cropping%20and%20photometric%20transformations.%20Extensive%20experiments%20on%20benchmark%20datasets%20demonstrate%20that%20our%20GazeMoE%20achieves%20state-of-the-art%20performance%2C%20outperformi {"title": "DC-Merge: Improving Model Merging with Directional Consistency", "author": "Han-Chen Zhang and Zi-Hao Zhou and Mao-Lin Luo and Shimin Di and Min-Ling Zhang and Tong Wei", "abstract": "Model merging aims to integrate multiple task-adapted models into a unified model that preserves the knowledge of each task. In this paper, we identify that the key to this knowledge retention lies in maintaining the directional consistency of singular spaces between merged multi-task vector and individual task vectors. However, this consistency is frequently compromised by two issues: i) an imbalanced energy distribution within task vectors, where a small fraction of singular values dominate the total energy, leading to the neglect of semantically important but weaker components upon merging, and ii) the geometric inconsistency of task vectors in parameter space, which causes direct merging to distort their underlying directional geometry. To address these challenges, we propose DC-Merge, a method for directional-consistent model merging. It first balances the energy distribution of each task vector by smoothing its singular values, ensuring all knowledge components are adequately represented. These energy-balanced vectors are then projected onto a shared orthogonal subspace to align their directional geometries with minimal reconstruction error. Finally, the aligned vectors are aggregated in the shared orthogonal subspace and projected back to the original parameter space. Extensive experiments on vision and vision-language benchmarks show that DC-Merge consistently achieves state-of-the-art performance in both full fine-tuning and LoRA settings. The implementation code is available at https://github.com/Tobeginwith/DC-Merge.", "link": "http://arxiv.org/abs/2603.06242v1", "date": "2026-03-06", "relevancy": 2.649, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5396}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5314}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5184}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DC-Merge%3A%20Improving%20Model%20Merging%20with%20Directional%20Consistency&body=Title%3A%20DC-Merge%3A%20Improving%20Model%20Merging%20with%20Directional%20Consistency%0AAuthor%3A%20Han-Chen%20Zhang%20and%20Zi-Hao%20Zhou%20and%20Mao-Lin%20Luo%20and%20Shimin%20Di%20and%20Min-Ling%20Zhang%20and%20Tong%20Wei%0AAbstract%3A%20Model%20merging%20aims%20to%20integrate%20multiple%20task-adapted%20models%20into%20a%20unified%20model%20that%20preserves%20the%20knowledge%20of%20each%20task.%20In%20this%20paper%2C%20we%20identify%20that%20the%20key%20to%20this%20knowledge%20retention%20lies%20in%20maintaining%20the%20directional%20consistency%20of%20singular%20spaces%20between%20merged%20multi-task%20vector%20and%20individual%20task%20vectors.%20However%2C%20this%20consistency%20is%20frequently%20compromised%20by%20two%20issues%3A%20i%29%20an%20imbalanced%20energy%20distribution%20within%20task%20vectors%2C%20where%20a%20small%20fraction%20of%20singular%20values%20dominate%20the%20total%20energy%2C%20leading%20to%20the%20neglect%20of%20semantically%20important%20but%20weaker%20components%20upon%20merging%2C%20and%20ii%29%20the%20geometric%20inconsistency%20of%20task%20vectors%20in%20parameter%20space%2C%20which%20causes%20direct%20merging%20to%20distort%20their%20underlying%20directional%20geometry.%20To%20address%20these%20challenges%2C%20we%20propose%20DC-Merge%2C%20a%20method%20for%20directional-consistent%20model%20merging.%20It%20first%20balances%20the%20energy%20distribution%20of%20each%20task%20vector%20by%20smoothing%20its%20singular%20values%2C%20ensuring%20all%20knowledge%20components%20are%20adequately%20represented.%20These%20energy-balanced%20vectors%20are%20then%20projected%20onto%20a%20shared%20orthogonal%20subspace%20to%20align%20their%20directional%20geometries%20with%20minimal%20reconstruction%20error.%20Finally%2C%20the%20aligned%20vectors%20are%20aggregated%20in%20the%20shared%20orthogonal%20subspace%20and%20projected%20back%20to%20the%20original%20parameter%20space.%20Extensive%20experiments%20on%20vision%20and%20vision-language%20benchmarks%20show%20that%20DC-Merge%20consistently%20achieves%20state-of-the-art%20performance%20in%20both%20full%20fine-tuning%20and%20LoRA%20settings.%20The%20implementation%20code%20is%20available%20at%20https%3A//github.com/Tobeginwith/DC-Merge.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06242v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDC-Merge%253A%2520Improving%2520Model%2520Merging%2520with%2520Directional%2520Consistency%26entry.906535625%3DHan-Chen%2520Zhang%2520and%2520Zi-Hao%2520Zhou%2520and%2520Mao-Lin%2520Luo%2520and%2520Shimin%2520Di%2520and%2520Min-Ling%2520Zhang%2520and%2520Tong%2520Wei%26entry.1292438233%3DModel%2520merging%2520aims%2520to%2520integrate%2520multiple%2520task-adapted%2520models%2520into%2520a%2520unified%2520model%2520that%2520preserves%2520the%2520knowledge%2520of%2520each%2520task.%2520In%2520this%2520paper%252C%2520we%2520identify%2520that%2520the%2520key%2520to%2520this%2520knowledge%2520retention%2520lies%2520in%2520maintaining%2520the%2520directional%2520consistency%2520of%2520singular%2520spaces%2520between%2520merged%2520multi-task%2520vector%2520and%2520individual%2520task%2520vectors.%2520However%252C%2520this%2520consistency%2520is%2520frequently%2520compromised%2520by%2520two%2520issues%253A%2520i%2529%2520an%2520imbalanced%2520energy%2520distribution%2520within%2520task%2520vectors%252C%2520where%2520a%2520small%2520fraction%2520of%2520singular%2520value {"title": "Do Foundation Models Know Geometry? Probing Frozen Features for Continuous Physical Measurement", "author": "Yakov Pyotr Shkolnikov", "abstract": "Vision-language models encode continuous geometry that their text pathway fails to express: a 6,000-parameter linear probe extracts hand joint angles at 6.1 degrees MAE from frozen features, while the best text output achieves only 20.0 degrees -- a 3.3x bottleneck. LoRA fine-tuning (r=16, 2,000 images) narrows this gap to 6.5 degrees, providing evidence for a pathway-training deficit rather than a representational one. Training objective determines accuracy more than architecture: five encoders spanning self-supervised, contrastive, and hybrid paradigms converge to statistically equivalent accuracy (R^2 approximately 0.55, TOST-equivalent at delta=0.03) despite sharing as little as CKA=0.41 representational similarity -- functional convergence without representational convergence. Autoregressive generation damages geometric fidelity, but the damage originates in the generation process, not in language alignment: Qwen2.5-VL's LLM layers actually improve probe accuracy over its raw vision encoder. Layer-wise analysis reveals a universal mid-network accuracy peak across all architectures, with attention heads in layers 18-22 carrying disproportionate geometric signal. These findings enable a single frozen backbone to function as a multi-task geometric sensor through lightweight probes, without fine-tuning or text generation.", "link": "http://arxiv.org/abs/2603.06459v1", "date": "2026-03-06", "relevancy": 2.6387, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6793}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6793}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5613}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Foundation%20Models%20Know%20Geometry%3F%20Probing%20Frozen%20Features%20for%20Continuous%20Physical%20Measurement&body=Title%3A%20Do%20Foundation%20Models%20Know%20Geometry%3F%20Probing%20Frozen%20Features%20for%20Continuous%20Physical%20Measurement%0AAuthor%3A%20Yakov%20Pyotr%20Shkolnikov%0AAbstract%3A%20Vision-language%20models%20encode%20continuous%20geometry%20that%20their%20text%20pathway%20fails%20to%20express%3A%20a%206%2C000-parameter%20linear%20probe%20extracts%20hand%20joint%20angles%20at%206.1%20degrees%20MAE%20from%20frozen%20features%2C%20while%20the%20best%20text%20output%20achieves%20only%2020.0%20degrees%20--%20a%203.3x%20bottleneck.%20LoRA%20fine-tuning%20%28r%3D16%2C%202%2C000%20images%29%20narrows%20this%20gap%20to%206.5%20degrees%2C%20providing%20evidence%20for%20a%20pathway-training%20deficit%20rather%20than%20a%20representational%20one.%20Training%20objective%20determines%20accuracy%20more%20than%20architecture%3A%20five%20encoders%20spanning%20self-supervised%2C%20contrastive%2C%20and%20hybrid%20paradigms%20converge%20to%20statistically%20equivalent%20accuracy%20%28R%5E2%20approximately%200.55%2C%20TOST-equivalent%20at%20delta%3D0.03%29%20despite%20sharing%20as%20little%20as%20CKA%3D0.41%20representational%20similarity%20--%20functional%20convergence%20without%20representational%20convergence.%20Autoregressive%20generation%20damages%20geometric%20fidelity%2C%20but%20the%20damage%20originates%20in%20the%20generation%20process%2C%20not%20in%20language%20alignment%3A%20Qwen2.5-VL%27s%20LLM%20layers%20actually%20improve%20probe%20accuracy%20over%20its%20raw%20vision%20encoder.%20Layer-wise%20analysis%20reveals%20a%20universal%20mid-network%20accuracy%20peak%20across%20all%20architectures%2C%20with%20attention%20heads%20in%20layers%2018-22%20carrying%20disproportionate%20geometric%20signal.%20These%20findings%20enable%20a%20single%20frozen%20backbone%20to%20function%20as%20a%20multi-task%20geometric%20sensor%20through%20lightweight%20probes%2C%20without%20fine-tuning%20or%20text%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06459v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520Foundation%2520Models%2520Know%2520Geometry%253F%2520Probing%2520Frozen%2520Features%2520for%2520Continuous%2520Physical%2520Measurement%26entry.906535625%3DYakov%2520Pyotr%2520Shkolnikov%26entry.1292438233%3DVision-language%2520models%2520encode%2520continuous%2520geometry%2520that%2520their%2520text%2520pathway%2520fails%2520to%2520express%253A%2520a%25206%252C000-parameter%2520linear%2520probe%2520extracts%2520hand%2520joint%2520angles%2520at%25206.1%2520degrees%2520MAE%2520from%2520frozen%2520features%252C%2520while%2520the%2520best%2520text%2520output%2520achieves%2520only%252020.0%2520degrees%2520--%2520a%25203.3x%2520bottleneck.%2520LoRA%2520fine-tuning%2520%2528r%253D16%252C%25202%252C000%2520images%2529%2520narrows%2520this%2520gap%2520to%25206.5%2520degrees%252C%2520providing%2520evidence%2520for%2520a%2520pathway-training%2520deficit%2520rather%2520than%2520a%2520representational%2520one.%2520Training%2520objective%2520determines%2520accuracy%2520more%2520than%2520architecture%253A%2520five%2520encoders%2520spanning%2520self-supervised%252C%2520contrastive%252C%2520and%2520hybrid%2520paradigms%2520converge%2520to%2520statistically%2520equivalent%2520accuracy%2520%2528R%255E2%2520approximately%25200.55%252C%2520TOST-equivalent%2520at%2520delta%253D0.03%2529%2520despite%2520sharing%2520as%2520little%2520as%2520CKA%253D0.41%2520representational%2520similarity%2520--%2520functional%2520convergence%2520without%2520representational%2520convergence.%2520Autoregressive%2520generation%2520damages%2520geometric%2520fidelity%252C%2520but%2520the%2520damage%2520originates%2520in%2520the%2520generation%2520process%252C%2520not%2520in%2520language%2520alignment%253A%2520Qwen2.5-VL%2527s%2520LLM%2520layers%2520actually%2520improve%2520probe%2520accuracy%2520over%2520its%2520raw%2520vision%2520encoder.%2520Layer-wise%2520analysis%2520reveals%2520a%2520universal%2520mid-network%2520accuracy%2520peak%2520across%2520all%2520architectures%252C%2520with%2520attention%2520heads%2520in%2520layers%252018-22%2520carrying%2520disproportionate%2520geometric%2520signal.%2520These%2520findings%2520enable%2520a%2520single%2520frozen%2520backbone%2520to%2520function%2520as%2520a%2520multi-task%2520geometric%2520sensor%2520through%2520lightweight%2520probes%252C%2520without%2520fine-tuning%2520or%2520text%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06459v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Do%20Foundation%20Models%20Know%20Geometry%3F%20Probing%20Frozen%20Features%20for%20Continuous%20Physical%20Measurement&entry.906535625=Yakov%20Pyotr%20Shkolnikov&entry.1292438233=Vision-language%20models%20encode%20continuous%20geometry%20that%20their%20text%20pathway%20fails%20to%20express%3A%20a%206%2C000-parameter%20linear%20probe%20extracts%20hand%20joint%20angles%20at%206.1%20degrees%20MAE%20from%20frozen%20features%2C%20while%20the%20best%20text%20output%20achieves%20only%2020.0%20degrees%20--%20a%203.3x%20bottleneck.%20LoRA%20fine-tuning%20%28r%3D16%2C%202%2C000%20images%29%20narrows%20this%20gap%20to%206.5%20degrees%2C%20providing%20evidence%20for%20a%20pathway-training%20deficit%20rather%20than%20a%20representational%20one.%20Training%20objective%20determines%20accuracy%20more%20than%20architecture%3A%20five%20encoders%20spanning%20self-supervised%2C%20contrastive%2C%20and%20hybrid%20paradigms%20converge%20to%20statistically%20equivalent%20accuracy%20%28R%5E2%20approximately%200.55%2C%20TOST-e {"title": "VLM-RobustBench: A Comprehensive Benchmark for Robustness of Vision-Language Models", "author": "Rohit Saxena and Alessandro Suglia and Pasquale Minervini", "abstract": "Vision-language models (VLMs) achieve strong performance on standard, high-quality datasets, but we still do not fully understand how they perform under real-world image distortions. We present VLM-RobustBench, a benchmark spanning 49 augmentation types across noise, blur, weather, digital, and geometric perturbations, evaluated under graded severities (low/mid/high) and binary transforms, yielding 133 corrupted settings. We evaluate VLMs from four families (Qwen, InternVL, Molmo, Gemma) on two complementary benchmarks: MMBench (visually grounded) and MMMU-Pro (reasoning-oriented). Our results reveal that visual severity is a weak predictor of difficulty: low-severity spatial perturbations often degrade performance more than visually severe photometric corruptions. In particular, low-severity glass_blur reduces MMBench accuracy by about 8 pp on average across models, while the largest drops arise from resampling and geometric distortions (e.g., upsample, elastic_transform), reaching up to 34 pp. Overall, our findings suggest current VLMs are semantically strong but spatially fragile, motivating the definition of novel robustness evaluation protocols and training regimes that emphasize resampling and geometric invariances.", "link": "http://arxiv.org/abs/2603.06148v1", "date": "2026-03-06", "relevancy": 2.6357, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5375}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5375}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": {"title": "Latent Diffusion-Based 3D Molecular Recovery from Vibrational Spectra", "author": "Wenjin Wu and Ale\u0161 Leonardis and Linjiang Chen and Jianbo Jiao", "abstract": "Infrared (IR) spectroscopy, a type of vibrational spectroscopy, is widely used for molecular structure determination and provides critical structural information for chemists. However, existing approaches for recovering molecular structures from IR spectra typically rely on one-dimensional SMILES strings or two-dimensional molecular graphs, which fail to capture the intricate relationship between spectral features and three-dimensional molecular geometry. Recent advances in diffusion models have greatly enhanced the ability to generate molecular structures in 3D space. Yet, no existing model has explored the distribution of 3D molecular geometries corresponding to a single IR spectrum. In this work, we introduce IR-GeoDiff, a latent diffusion model that recovers 3D molecular geometries from IR spectra by integrating spectral information into both node and edge representations of molecular structures. We evaluate IR-GeoDiff from both spectral and structural perspectives, demonstrating its ability to recover the molecular distribution corresponding to a given IR spectrum. Furthermore, an attention-based analysis reveals that the model is able to focus on characteristic functional group regions in IR spectra, qualitatively consistent with common chemical interpretation practices.", "link": "http://arxiv.org/abs/2603.06113v1", "date": "2026-03-06", "relevancy": 2.6248, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5283}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5283}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5182}], "mailto": "mail ation%20practices.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06113v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLatent%2520Diffusion-Based%25203D%2520Molecular%2520Recovery%2520from%2520Vibrational%2520Spectra%26entry.906535625%3DWenjin%2520Wu%2520and%2520Ale%25C5%25A1%2520Leonardis%2520and%2520Linjiang%2520Chen%2520and%2520Jianbo%2520Jiao%26entry.1292438233%3DInfrared%2520%2528IR%2529%2520spectroscopy%252C%2520a%2520type%2520of%2520vibrational%2520spectroscopy%252C%2520is%2520widely%2520used%2520for%2520molecular%2520structure%2520determination%2520and%2520provides%2520critical%2520structural%2520information%2520for%2520chemists.%2520However%252C%2520existing%2520approaches%2520for%2520recovering%2520molecular%2520structures%2520from%2520IR%2520spectra%2520typically%2520rely%2520on%2520one-dimensional%2520SMILES%2520strings%2520or%2520two-dimensional%2520molecular%2520graphs%252C%2520which%2520fail%2520to%2520capture%2520the%2520intricate%2520relationship%2520between%2520spectral%2520features%2520and%2520three-dimensional%2520molecular%2520geometry.%2520Recent%2520advances%2520in%2520diffusion%2520models%2520have%2520greatly%2520enhanced%2520the%2520ability%2520to%2520generate%2520molecular%2520structures%2520in%25203D%2520space.%2520Yet%252C%2520no%2520existing%2520model%2520has%2520explored%2520the%2520distribution%2520of%25203D%2520molecular%2520geometries%2520corresponding%2520to%2520a%2520single%2520IR%2520spectrum.%2520In%2520this%2520work%252C%2520we%2520introduce%2520IR-GeoDiff%252C%2520a%2520latent%2520diffusion%2520model%2520that%2520recovers%25203D%2520molecular%2520geometries%2520from%2520IR%2520spectra%2520by%2520integrating%2520spectral%2520information%2520into%2520both%2520node%2520and%2520edge%2520representations%2520of%2520molecular%2520structures.%2520We%2520evaluate%2520IR-GeoDiff%2520from%2520both%2520spectral%2520and%2520structural%2520perspectives%252C%25 {"title": "Causal Interpretation of Neural Network Computations with Contribution Decomposition", "author": "Joshua Brendan Melander and Zaki Alaoui and Shenghua Liu and Surya Ganguli and Stephen A. Baccus", "abstract": "Understanding how neural networks transform inputs into outputs is crucial for interpreting and manipulating their behavior. Most existing approaches analyze internal representations by identifying hidden-layer activation patterns correlated with human-interpretable concepts. Here we take a direct approach to examine how hidden neurons act to drive network outputs. We introduce CODEC (Contribution Decomposition), a method that uses sparse autoencoders to decompose network behavior into sparse motifs of hidden-neuron contributions, revealing causal processes that cannot be determined by analyzing activations alone. Applying CODEC to benchmark image-classification networks, we find that contributions grow in sparsity and dimensionality across layers and, unexpectedly, that they progressively decorrelate positive and negative effects on network outputs. We further show that decomposing contributions into sparse modes enables greater control and interpretation of intermediate layers, supporting both causal manipulations of network output and human-interpretable visualizations of distinct image components that combine to drive that output. Finally, by analyzing state-of-the-art models of neural activity in the vertebrate retina, we demonstrate that CODEC uncovers combinatorial actions of model interneurons and identifies the sources of dynamic receptive fields. Overall, CODEC provides a rich and interpretable framework for understanding how nonlinear computations evolve across hierarchical layers, establishing contribution modes as an informative unit of analysis for mechanistic insights into artificial neural networks.", "link": "http://arxiv.org/abs/2603.06557v1", "date": "2026-03-06", "relevancy": 2.6246, "topK": [{"title": "Lexicon3D: Probing Visual {"title": "SSL-SLR: Self-Supervised Representation Learning for Sign Language Recognition", "author": "Ariel Basso Madjoukeng and J\u00e9r\u00f4me Fink and Pierre Poitier and Edith Belise Kenmogne and Benoit Frenay", "abstract": "Sign language recognition (SLR) is a machine learning task aiming to identify signs in videos. Due to the scarcity of annotated data, unsupervised methods like contrastive learning have become promising in this field. They learn meaningful representations by pulling positive pairs (two augmented versions of the same instance) closer and pushing negative pairs (different from the positive pairs) apart. In SLR, in a sign video, only certain parts provide information that is truly useful for its recognition. Applying contrastive methods to SLR raises two issues: (i) contrastive learning methods treat all parts of a video in the same way, without taking into account the relevance of certain parts over others; (ii) shared movements between different signs make negative pairs highly similar, complicating sign discrimination. These issues lead to learning non-discriminative features for sign recognition and poor results in downstream tasks. In response, this paper proposes a self-supervised learning framework designed to learn meaningful representations for SLR. This framework consists of two key components designed to work together: (i) a new self-supervised approach with free-negative pairs; (ii) a new data augmentation technique. This approach shows a considerable gain in accuracy compared to several contrastive and self-supervised methods, across linear evaluation, semi-supervised learning, and transferability between sign languages.", "link": "http://arxiv.org/abs/2509.05188v2", "date": "2026-03-06", "relevancy": 2.6232, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5521}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5263}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4955}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SSL-SLR%3A%20Self-Supervised%20Representation%20Learning%20for%20Sign%20Language%20Recognition&body=Title%3A%20SSL-SLR%3A%20Self-Supervised%20Representation%20Learning%20for%20Sign%20Language%20Recognition%0AAuthor%3A%20Ariel%20Basso%20Madjoukeng%20and%20J%C3%A9r%C3%B4me%20Fink%20and%20Pierre%20Poitier%20and%20Edith%20Belise%20Kenmogne%20and%20Benoit%20Frenay%0AAbstract%3A%20Sign%20language%20recognition%20%28SLR%29%20is%20a%20machine%20learning%20task%20aiming%20to%20identify%20signs%20in%20videos.%20Due%20to%20the%20scarcity%20of%20annotated%20data%2C%20unsupervised%20methods%20like%20contrastive%20learning%20have%20become%20promising%20in%20this%20field.%20They%20learn%20meaningful%20representations%20by%20pulling%20positive%20pairs%20%28two%20augmented%20versions%20of%20the%20same%20instance%29%20closer%20and%20pushing%20negative%20pairs%20%28different%20from%20the%20positive%20pairs%29%20apart.%20In%20SLR%2C%20in%20a%20sign%20video%2C%20only%20certain%20parts%20provide%20information%20that%20is%20truly%20useful%20for%20its%20recognition.%20Applying%20contrastive%20methods%20to%20SLR%20raises%20two%20issues%3A%20%28i%29%20contrastive%20learning%20methods%20treat%20all%20parts%20of%20a%20video%20in%20the%20same%20way%2C%20without%20taking%20into%20account%20the%20relevance%20of%20certain%20parts%20over%20others%3B%20%28ii%29%20shared%20movements%20between%20different%20signs%20make%20negative%20pairs%20highly%20similar%2C%20complicating%20sign%20discrimination.%20These%20issues%20lead%20to%20learning%20non-discriminative%20features%20for%20sign%20recognition%20and%20poor%20results%20in%20downstream%20tasks.%20In%20response%2C%20this%20paper%20proposes%20a%20self-supervised%20learning%20framework%20designed%20to%20learn%20meaningful%20representations%20for%20SLR.%20This%20framework%20consists%20of%20two%20key%20components%20designed%20to%20work%20together%3A%20%28i%29%20a%20new%20self-supervised%20approach%20with%20free-negative%20pairs%3B%20%28ii%29%20a%20new%20data%20augmentation%20technique.%20This%20approach%20shows%20a%20considerable%20gain%20in%20accuracy%20compared%20to%20several%20contrastive%20and%20self-supervised%20methods%2C%20across%20linear%20evaluation%2C%20semi-supervised%20learning%2C%20and%20transferability%20between%20sign%20languages.%0ALink%3A%20http%3A//arxiv.org/abs/2509.05188v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSSL-SLR%253A%2520Self-Supervised%2520Representation%2520Learning%2520for%2520Sign%2520Language%2520Recognition%26entry.906535625%3DAriel%2520Basso%2520Madjoukeng%2520and%2520J%25C3%25A9r%25C3%25B4me%2520Fink%2520and%2520Pierre%2520Poitier%2520and%2520Edith%2520Belise%2520Kenmogne%2520and%2520Benoit%2520Frenay%26entry.1292438233%3DSign%2520language%2520recognition%2520%2528SLR%2529%2520is%2520a%2520machine%2520learning%2520task%2520aiming%2520to%2520identify%2520signs%2520in%2520videos.%2520Due%2520to%2520the%2520scarcity%2520of%2520annotated%2520data%252C%2520unsupervised%2520methods%2520like%2520contrastive%2520learning%2520have%2520become%2520promising%2520in%2520this%2520field.%2520They%2520learn%2520meaningful%2520representations%2520by%2520pulling%2520positive%2520pairs%2520%2528two%2520augmented%2520versions%2520of%2520the%2520same%2520instance%2529%2520closer%2520and%2520pushing%2520negative%2520pairs%2520%2528different%2520from%2520the%2520positive%2520pairs%2529%2520apart.%2520In%2520SLR%252C%2520in%2520a%2520sign%2520video%252C%2520only%2520certain%2520parts%2520provide%2520information%2520that%2520is%2520truly%2520useful%2520for%2520its%2520recognition.%2520Applying%25

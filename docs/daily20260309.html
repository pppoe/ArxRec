{"title": "Control Barrier Corridors: From Safety Functions to Safe Sets", "author": "\u00d6m\u00fcr Arslan and Nikolay Atanasov", "abstract": "Safe autonomy is a critical requirement and a key enabler for robots to operate safely in unstructured complex environments. Control barrier functions and safe motion corridors are two widely used but technically distinct safety methods, functional and geometric, respectively, for safe motion planning and control. Control barrier functions are applied to the safety filtering of control inputs to limit the decay rate of system safety, whereas safe motion corridors are geometrically constructed to define a local safe zone around the system state for use in motion optimization and reference-governor design. This paper introduces a new notion of control barrier corridors, which unifies these two approaches by converting control barrier functions into local safe goal regions for reference goal selection in feedback control systems. We show, with examples on fully actuated systems, kinematic unicycles, and linear output regulation systems, that individual state safety can be extended locally over control barrier corridors for convex barrier functions, provided the control convergence rate matches the barrier decay rate, highlighting a trade-off between safety and reactiveness. Such safe control barrier corridors enable safely reachable persistent goal selection over continuously changing barrier corridors during system motion, which we demonstrate for verifiably safe and persistent path following in autonomous exploration of unknown environments.", "link": "http://arxiv.org/abs/2603.06494v1", "date": "2026-03-06", "relevancy": 2.182, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5484}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5443}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Control%20Barrier%20Corridors%3A%20From%20Safety%20Functions%20to%20Safe%20Sets&body=Title%3A%20Control%20Barrier%20Corridors%3A%20From%20Safety%20Functions%20to%20Safe%20Sets%0AAuthor%3A%20%C3%96m%C3%BCr%20Arslan%20and%20Nikolay%20Atanasov%0AAbstract%3A%20Safe%20autonomy%20is%20a%20critical%20requirement%20and%20a%20key%20enabler%20for%20robots%20to%20operate%20safely%20in%20unstructured%20complex%20environments.%20Control%20barrier%20functions%20and%20safe%20motion%20corridors%20are%20two%20widely%20used%20but%20technically%20distinct%20safety%20methods%2C%20functional%20and%20geometric%2C%20respectively%2C%20for%20safe%20motion%20planning%20and%20control.%20Control%20barrier%20functions%20are%20applied%20to%20the%20safety%20filtering%20of%20control%20inputs%20to%20limit%20the%20decay%20rate%20of%20system%20safety%2C%20whereas%20safe%20motion%20corridors%20are%20geometrically%20constructed%20to%20define%20a%20local%20safe%20zone%20around%20the%20system%20state%20for%20use%20in%20motion%20optimization%20and%20reference-governor%20design.%20This%20paper%20introduces%20a%20new%20notion%20of%20control%20barrier%20corridors%2C%20which%20unifies%20these%20two%20approaches%20by%20converting%20control%20barrier%20functions%20into%20local%20safe%20goal%20regions%20for%20reference%20goal%20selection%20in%20feedback%20control%20systems.%20We%20show%2C%20with%20examples%20on%20fully%20actuated%20systems%2C%20kinematic%20unicycles%2C%20and%20linear%20output%20regulation%20systems%2C%20that%20individual%20state%20safety%20can%20be%20extended%20locally%20over%20control%20barrier%20corridors%20for%20convex%20barrier%20functions%2C%20provided%20the%20control%20convergence%20rate%20matches%20the%20barrier%20decay%20rate%2C%20highlighting%20a%20trade-off%20between%20safety%20and%20reactiveness.%20Such%20safe%20control%20barrier%20corridors%20enable%20safely%20reachable%20persistent%20goal%20selection%20over%20continuously%20changing%20barrier%20corridors%20during%20system%20motion%2C%20which%20we%20demonstrate%20for%20verifiably%20safe%20and%20persistent%20path%20following%20in%20autonomous%20exploration%20of%20unknown%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06494v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DControl%2520Barrier%2520Corridors%253A%2520From%2520Safety%2520Functions%2520to%2520Safe%2520Sets%26entry.906535625%3D%25C3%2596m%25C3%25BCr%2520Arslan%2520and%2520Nikolay%2520Atanasov%26entry.1292438233%3DSafe%2520autonomy%2520is%2520a%2520critical%2520requirement%2520and%2520a%2520key%2520enabler%2520for%2520robots%2520to%2520operate%2520safely%2520in%2520unstructured%2520complex%2520environments.%2520Control%2520barrier%2520functions%2520and%2520safe%2520motion%2520corridors%2520are%2520two%2520widely%2520used%2520but%2520technically%2520distinct%2520safety%2520methods%252C%2520functional%2520and%2520geometric%252C%2520respectively%252C%2520for%2520safe%2520motion%2520planning%2520and%2520control.%2520Control%2520barrier%2520functions%2520are%2520applied%2520to%2520the%2520safety%2520filtering%2520of%2520control%2520inputs%2520to%2520limit%2520the%2520decay%2520rate%2520of%2520system%2520safety%252C%2520whereas%2520safe%2520motion%2520corridors%2520are%2520geometrically%2520constructed%2520to%2520define%2520a%2520local%2520safe%2520zone%2520around%2520the%2520system%2520state%2520for%2520use%2520in%2520motion%2520optimization%2520and%2520reference-governor%2520design.%2520This%2520paper%2520introduces%2520a%2520new%2520notion%2520of%2520control%2520barrier%2520corridors%252C%2520which%2520unifies%2520these%2520two%2520approaches%2520by%2520converting%2520control%2520barrier%2520functions%2520into%2520local%2520safe%2520goal%2520regions%2520for%2520reference%2520goal%2520selection%2520in%2520feedback%2520control%2520systems.%2520We%2520show%252C%2520with%2520examples%2520on%2520fully%2520actuated%2520systems%252C%2520kinematic%2520unicycles%252C%2520and%2520linear%2520output%2520regulation%2520systems%252C%2520that%2520individual%2520state%2520safety%2520can%2520be%2520extended%2520locally%2520over%2520control%2520barrier%2520corridors%2520for%2520convex%2520barrier%2520functions%252C%2520provided%2520the%2520control%2520convergence%2520rate%2520matches%2520the%2520barrier%2520decay%2520rate%252C%2520highlighting%2520a%2520trade-off%2520between%2520safety%2520and%2520reactiveness.%2520Such%2520safe%2520control%2520barrier%2520corridors%2520enable%2520safely%2520reachable%2520persistent%2520goal%2520selection%2520over%2520continuously%2520changing%2520barrier%2520corridors%2520during%2520system%2520motion%252C%2520which%2520we%2520demonstrate%2520for%2520verifiably%2520safe%2520and%2520persistent%2520path%2520following%2520in%2520autonomous%2520exploration%2520of%2520unknown%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06494v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Control%20Barrier%20Corridors%3A%20From%20Safety%20Functions%20to%20Safe%20Sets&entry.906535625=%C3%96m%C3%BCr%20Arslan%20and%20Nikolay%20Atanasov&entry.1292438233=Safe%20autonomy%20is%20a%20critical%20requirement%20and%20a%20key%20enabler%20for%20robots%20to%20operate%20safely%20in%20unstructured%20complex%20environments.%20Control%20barrier%20functions%20and%20safe%20motion%20corridors%20are%20two%20widely%20used%20but%20technically%20distinct%20safety%20methods%2C%20functional%20and%20geometric%2C%20respectively%2C%20for%20safe%20motion%20planning%20and%20control.%20Control%20barrier%20functions%20are%20applied {"title": "Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance", "author": "Yiqi Lin and Guoqiang Liang and Ziyun Zeng and Zechen Bai and Yanzhe Chen and Mike Zheng Shou", "abstract": "Instruction-based video editing has witnessed rapid progress, yet current methods often struggle with precise visual control, as natural language is inherently limited in describing complex visual nuances. Although reference-guided editing offers a robust solution, its potential is currently bottlenecked by the scarcity of high-quality paired training data. To bridge this gap, we introduce a scalable data generation pipeline that transforms existing video editing pairs into high-fidelity training quadruplets, leveraging image generative models to create synthesized reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset tailored for instruction-reference-following tasks, and establish RefVIE-Bench for comprehensive evaluation. Furthermore, we propose a unified editing architecture, Kiwi-Edit, that synergizes learnable queries and latent visual features for reference semantic guidance. Our model achieves significant gains in instruction following and reference fidelity via a progressive multi-stage training curriculum. Extensive experiments demonstrate that our data and architecture establish a new state-of-the-art in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.", "link": "http://arxiv.org/abs/2603.02175v3", "date": "2026-03-06", "relevancy": 2.1702, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.552}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5431}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv. {"title": "Whole-Body Model-Predictive Control of Legged Robots with MuJoCo", "author": "John Z. Zhang and Taylor A. Howell and Zeji Yi and Chaoyi Pan and Guanya Shi and Guannan Qu and Tom Erez and Yuval Tassa and Zachary Manchester", "abstract": "We demonstrate the surprising real-world effectiveness of a very simple approach to whole-body model-predictive control (MPC) of quadruped and humanoid robots: the iterative LQR (iLQR) algorithm with MuJoCo dynamics and finite-difference approximated derivatives. Building upon the previous success of model-based behavior synthesis and control of locomotion and manipulation tasks with MuJoCo in simulation, we show that these policies can easily generalize to the real world with few sim-to-real considerations. Our baseline method achieves real-time whole-body MPC on a variety of hardware experiments, including dynamic quadruped locomotion, quadruped walking on two legs, and full-sized humanoid bipedal locomotion. We hope this easy-to-reproduce hardware baseline lowers the barrier to entry for real-world whole-body MPC research and contributes to accelerating research velocity in the community. Our code and experiment videos will be available online at:https://johnzhang3.github.io/mujoco_ilqr", "link": "http://arxiv.org/abs/2503.04613v3", "date": "2026-03-06", "relevancy": 2.1699, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6063}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5329}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5265}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Whole-Body%20Model-Predictive%20Control%20of%20Legged%20Robots%20with%20MuJoCo&body=Ti {"title": "EgoReasoner: Learning Egocentric 4D Reasoning via Task-Adaptive Structured Thinking", "author": "Fangrui Zhu and Yunfeng Xi and Jianmo Ni and Mu Cai and Boqing Gong and Long Zhao and Chen Qu and Ian Miao and Yi Li and Cheng Zhong and Huaizu Jiang and Shwetak Patel", "abstract": "Egocentric video understanding is inherently complex due to the dynamic 4D nature of the environment, where camera motion and object displacements necessitate a continuous re-evaluation of spatial relations. In this work, we target a suite of under-explored egocentric 4D reasoning tasks, including fixture interaction counting, viewpoint-relative fixture location, object movement itinerary tracking, and stationary object localization, that require fundamentally different cognitive operations: spatial anchoring, temporal tracking, and duration reasoning. We observe that these structural differences make task-agnostic approaches insufficient: generic Chain-of-Thought methods lack task-appropriate reasoning primitives, and uniform reinforcement learning actively destabilizes performance on spatial tasks. To address this, we propose EgoReasoner, a two-stage framework that aligns both the reasoning scaffold and the reward signal to each task's cognitive structure. In the first stage, Task-Adaptive Thinking Templates guide the synthesis of structured CoT traces that teach the model to reason adaptively across task types via supervised fine-tuning. In the second stage, task-aware reward functions verify entity grounding, temporal alignment, and task-adaptive logical consistency, selectively strengthening each reasoning pathway via reinforcement fine-tuning with GRPO. Our 3B-parameter model, trained on only 16K samples, achieves 37.5% average accuracy on the challenging HD-EPIC benchmark, surpassing Qwen2.5-VL-7B (25.7%) by over 10 points.", "link": "http://arxiv.org/abs/2603.06561v1", "date": "2026-03-06", "relevancy": 2.1688, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph vi {"title": "History-Conditioned Spatio-Temporal Visual Token Pruning for Efficient Vision-Language Navigation", "author": "Qitong Wang and Yijun Liang and Ming Li and Tianyi Zhou and Christopher Rasmussen", "abstract": "Vision-Language Navigation (VLN) enables robots to follow natural-language instructions in visually grounded environments, serving as a key capability for embodied robotic systems. Recent Vision-Language-Action (VLA) models have demonstrated strong navigation performance, but their high computational cost introduces latency that limits real-time deployment. We propose a training-free spatio-temporal vision token pruning framework tailored to VLA-based VLN. We apply spatial token selection to the current view, alongside spatio-temporal compression for historical memories, enabling efficient long-horizon inference while reducing redundant computation. Leveraging attention-based token importance and query-guided spatio-temporal filtering, the proposed approach preserves navigation-relevant information without retraining or modifying pretrained models, allowing plug-and-play integration into existing VLA systems. Through experiments on standard VLN benchmarks, we confirm that our method significantly outperforms existing pruning strategies. It successfully preserves superior navigation accuracy under extreme pruning scenarios, all while maintaining the highly competitive inference efficiency. Real-world deployment on a Unitree Go2 quadruped robot further validates reliable and low-latency instruction-following navigation under practical robotic constraints. We hope this work helps bridge the gap between large-scale multimodal modeling and efficient, real-time embodied deployment in robotic navigation systems.", "link": "http://arxiv.org/abs/2603.06480v1", "date": "2026-03-06", "relevancy": 2.1618, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5424}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5394}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.539}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20History-Conditioned%20Spatio-Temporal%20Visual%20Token%20Pruning%20for%20Efficient%20Vision-Language%20Navigation&body=Title%3A%20History-Conditioned%20Spatio-Temporal%20Visual%20Token%20Pruning%20for%20Efficient%20Vision-Language%20Navigation%0AAuthor%3A%20Qitong%20Wang%20and%20Yijun%20Liang%20and%20Ming%20Li%20and%20Tianyi%20Zhou%20and%20Christopher%20Rasmussen%0AAbstract%3A%20Vision-Language%20Navigation%20%28VLN%29%20enables%20robots%20to%20follow%20natural-language%20instructions%20in%20visually%20grounded%20environments%2C%20serving%20as%20a%20key%20capability%20for%20embodied%20robotic%20systems.%20Recent%20Vision-Language-Action%20%28VLA%29%20models%20have%20demonstrated%20strong%20navigation%20performance%2C%20but%20their%20high%20computational%20cost%20introduces%20latency%20that%20limits%20real-time%20deployment.%20We%20propose%20a%20training-free%20spatio-temporal%20vision%20token%20pruning%20framework%20tailored%20to%20VLA-based%20VLN.%20We%20apply%20spatial%20token%20selection%20to%20the%20current%20view%2C%20alongside%20spatio-temporal%20compression%20for%20historical%20memories%2C%20enabling%20efficient%20long-horizon%20inference%20while%20reducing%20redundant%20computation.%20Leveraging%20attention-based%20token%20importance%20and%20query-guided%20spatio-temporal%20filtering%2C%20the%20proposed%20approach%20preserves%20navigation-relevant%20information%20without%20retraining%20or%20modifying%20pretrained%20models%2C%20allowing%20plug-and-play%20integration%20into%20existing%20VLA%20systems.%20Through%20experiments%20on%20standard%20VLN%20benchmarks%2C%20we%20confirm%20that%20our%20method%20significantly%20outperforms%20existing%20pruning%20strategies.%20It%20successfully%20preserves%20superior%20navigation%20accuracy%20under%20extreme%20pruning%20scenarios%2C%20all%20while%20maintaining%20the%20highly%20competitive%20inference%20efficiency.%20Real-world%20deployment%20on%20a%20Unitree%20Go2%20quadruped%20robot%20further%20validates%20reliable%20and%20low-latency%20instruction-following%20navigation%20under%20practical%20robotic%20constraints.%20We%20hope%20this%20work%20helps%20bridge%20the%20gap%20between%20large-scale%20multimodal%20modeling%20and%20efficient%2C%20real-time%20embodied%20deployment%20in%20robotic%20navigation%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06480v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHistory-Conditioned%2520Spatio-Temporal%2520Visual%2520Token%2520Pruning%2520for%2520Efficient%2520Vision-Language%2520Navigation%26entry.906535625%3DQitong%2520Wang%2520and%2520Yijun%2520Liang%2520and%2520Ming%2520Li%2520and%2520Tianyi%2520Zhou%2520and%2520Christopher%2520Rasmussen%26entry.1292438233%3DVision-Language%2520Navigation%2520%2528VLN%2529%2520enables%2520robots%2520to%2520follow%2520natural-language%2520instructions%2520in%2520visually%2520grounded%2520environments%252C%2520serving%2520as%2520a%2520key%2520capability%2520for%2520embodied%2520robotic%2520systems.%2520Recent%2520Vision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520demonstrated%2520strong%2520navigation%2520performance%252C%2520but%2520their%2520high%2520computational%2520cost%2520introduces%2520latency%2520that%2520limits%2520real-time%2520deployment.%2520We%2520propose%2520a%2520training-free%2520spatio-temporal%2520vision%2520token%2520pruning%2520framework%2520tailored%2520to%2520VLA-based%2520VLN.%2520We%2520apply%2520spatial%2520token%2520selection%2520to%2520the {"title": "Locating and Editing Figure-Ground Organization in Vision Transformers", "author": "Stefan Arnold and Ren\u00e9 Gr\u00f6bner", "abstract": "Vision Transformers must resolve figure-ground organization by choosing between completions driven by local geometric evidence and those favored by global organizational priors, giving rise to a characteristic perceptual ambiguity. We aim to locate where the canonical Gestalt prior convexity is realized within the internal components of BEiT. Using a controlled perceptual conflict based on synthetic shapes of darts, we systematically mask regions that equally admit either a concave completion or a convex completion. We show that BEiT reliably favors convex completion under this competition. Projecting internal activations into the model's discrete visual codebook space via logit attribution reveals that this preference is governed by identifiable functional units within transformer substructures. Specifically, we find that figure-ground organization is ambiguous through early and intermediate layers and resolves abruptly in later layers. By decomposing the direct effect of attention heads, we identify head L0H9 acting as an early seed, introducing a weak bias toward convexity. Downscaling this single attention head shifts the distributional mass of the perceptual conflict across a continuous decision boundary, allowing concave evidence to guide completion.", "link": "http://arxiv.org/abs/2603.06407v1", "date": "2026-03-06", "relevancy": 2.1579, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5447}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5447}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Locating%20and%20Editing%20Figure-Ground%20Organization%20in%20Vision%20Transformers&body=Title%3A%20Locating%20and%20Editing%20Figure-Ground%20Organization%20in%20Vision%20Transformers%0AAuthor%3A%20Stefan%20Arnold%20and%20Ren%C3%A9%20Gr%C3%B6bner%0AAbstract%3A%20Vision%20Transformers%20must%20resolve%20figure-ground%20organization%20by%20choosing%20between%20completions%20driven%20by%20local%20geometric%20evidence%20and%20those%20favored%20by%20global%20organizational%20priors%2C%20giving%20rise%20to%20a%20characteristic%20perceptual%20ambiguity.%20We%20aim%20to%20locate%20where%20the%20canonical%20Gestalt%20prior%20convexity%20is%20realized%20within%20the%20internal%20components%20of%20BEiT.%20Using%20a%20controlled%20perceptual%20conflict%20based%20on%20synthetic%20shapes%20of%20darts%2C%20we%20systematically%20mask%20regions%20that%20equally%20admit%20either%20a%20concave%20completion%20or%20a%20convex%20completion.%20We%20show%20that%20BEiT%20reliably%20favors%20convex%20completion%20under%20this%20competition.%20Projecting%20internal%20activations%20into%20the%20model%27s%20discrete%20visual%20codebook%20space%20via%20logit%20attribution%20reveals%20that%20this%20preference%20is%20governed%20by%20identifiable%20functional%20units%20within%20transformer%20substructures.%20Specifically%2C%20we%20find%20that%20figure-ground%20organization%20is%20ambiguous%20through%20early%20and%20intermediate%20layers%20and%20resolves%20abruptly%20in%20later%20layers.%20By%20decomposing%20the%20direct%20effect%20of%20attention%20heads%2C%20we%20identify%20head%20L0H9%20acting%20as%20an%20early%20seed%2C%20introducing%20a%20weak%20bias%20toward%20convexity.%20Downscaling%20this%20single%20attention%20head%20shifts%20the%20distributional%20mass%20of%20the%20perceptual%20conflict%20across%20a%20continuous%20decision%20boundary%2C%20allowing%20concave%20evidence%20to%20guide%20completion.%0ALink%3A%20http%3A ct%20effect%20of%20attention%20heads%2C%20we%20identify%20head%20L0H9%20acting%20as%20an%20early%20seed%2C%20introducing%20a%20weak%20bias%20toward%20convexity.%20Downscaling%20this%20single%20attention%20head%20shifts%20the%20distributional%20mass%20of%20the%20perceptual%20conflict%20across%20a%20continuous%20decision%20boundary%2C%20allowing%20concave%20evidence%20to%20guide%20completion.&entry.1838667208=http%3A//arxiv.org/abs/2603.06407v1&entry.124074799=Read"},
{"title": "SRA 2: Variational Autoencoder Self-Representation Alignment for Efficient Diffusion Training", "author": "Mengmeng Wang and Dengyang Jiang and Liuzhuozheng Li and Yucheng Lin and Guojiang Shen and Xiangjie Kong and Yong Liu and Guang Dai and Jingdong Wang", "abstract": "Denoising-based diffusion transformers, despite their strong generation performance, suffer from inefficient training convergence. Existing methods addressing this issue, such as REPA (relying on external representation encoders) or SRA (requiring dual-model setups), inevitably incur heavy computational overhead during training due to external dependencies. To tackle these challenges, this paper proposes SRA 2, a lightweight intrinsic guidance framework for efficient diffusion training. SRA 2 leverages off-the-shelf pre-trained Variational Autoencoder (VAE) features: their reconstruction property ensures inherent encoding of visual priors like rich texture details, structural patterns, and basic semantic information. Specifically, SRA 2 aligns the intermediate latent features of diffusion transformers with VAE features via a lightweight projection layer, supervised by a feature alignment loss. This design accelerates training without extra representation encoders or dual-model maintenance, resulting in a simple yet effective pipeline. Extensive experiments demonstrate that SRA 2 improves both generation quality and training convergence speed compared to vanilla diffusion transformers, matches or outperforms state-of-the-art acceleration methods, and incurs merely 4% extra GFLOPs with zero additional cost for external guidance models.", "link": "http://arxiv.org/abs/2601.17830v2", "date": "2026-03-06", "relevancy": 1.6744, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5886}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org or%20dual-model%20maintenance%2C%20resulting%20in%20a%20simple%20yet%20effective%20pipeline.%20Extensive%20experiments%20demonstrate%20that%20SRA%202%20improves%20both%20generation%20quality%20and%20training%20convergence%20speed%20compared%20to%20vanilla%20diffusion%20transformers%2C%20matches%20or%20outperforms%20state-of-the-art%20acceleration%20methods%2C%20and%20incurs%20merely%204%25%20extra%20GFLOPs%20with%20zero%20additional%20cost%20for%20external%20guidance%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2601.17830v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSRA%25202%253A%2520Variational%2520Autoencoder%2520Self-Representation%2520Alignment%2520for%2520Efficient%2520Diffusion%2520Training%26entry.906535625%3DMengmeng%2520Wang%2520and%2520Dengyang%2520Jiang%2520and%2520Liuzhuozheng%2520Li%2520and%2520Yucheng%2520Lin%2520and%2520Guojiang%2520Shen%2520and%2520Xiangjie%2520Kong%2520and%2520Yong%2520Liu%2520and%2520Guang%2520Dai%2520and%2520Jingdong%2520Wang%26entry.1292438233%3DDenoising-based%2520diffusion%2520transformers%252C%2520despite%2520their%2520strong%2520generation%2520performance%252C%2520suffer%2520from%2520inefficient%2520training%2520convergence.%2520Existing%2520methods%2520addressing%2520this%2520issue%252C%2520such%2520as%2520REPA%2520%2528relying%2520on%2520external%2520representation%2520encoders%2529%2520or%2520SRA%2520%2528requiring%2520dual-model%2520setups%2529%252C%2520inevitably%2520incur%2520heavy%2520computational%2520overhead%2520during%2520training%2520due%2520to%2520external%2520dependencies.%2520To%2520tackle%2520these%2520challenges%252C%2520this%2520paper%2520proposes%2520SRA%25202%252C%2520a%2520lightweight%2520intrinsic%2520guidance%2520framework%2520for%2520efficient%2520diffusion%2520training.%2520SRA%25202%2520leverages%2520off-the-shelf%2520pre-trained%2520Variational%2520Autoencoder%2520%2528VAE%2529%2520features%253A%2520their%25 {"title": "Contact-Safe Reinforcement Learning with ProMP Reparameterization and Energy Awareness", "author": "Bingkun Huang and Yuhe Gong and Zewen Yang and Tianyu Ren and Luis Figueredo", "abstract": "Reinforcement learning (RL) approaches based on Markov Decision Processes (MDPs) are predominantly applied in the robot joint space, often relying on limited task-specific information and partial awareness of the 3D environment. In contrast, episodic RL has demonstrated advantages over traditional MDP-based methods in terms of trajectory consistency, task awareness, and overall performance in complex robotic tasks. Moreover, traditional step-wise and episodic RL methods often neglect the contact-rich information inherent in task-space manipulation, especially considering the contact-safety and robustness. In this work, contact-rich manipulation tasks are tackled using a task-space, energy-safe framework, where reliable and safe task-space trajectories are generated through the combination of Proximal Policy Optimization (PPO) and movement primitives. Furthermore, an energy-aware Cartesian Impedance Controller objective is incorporated within the proposed framework to ensure safe interactions between the robot and the environment. Our experimental results demonstrate that the proposed framework outperforms existing methods in handling tasks on various types of surfaces in 3D environments, achieving high success rates as well as smooth trajectories and energy-safe interactions.", "link": "http://arxiv.org/abs/2511.13459v2", "date": "2026-03-06", "relevancy": 1.6808, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.595}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5764}, {"title": "Safe and efficient traini dling%20tasks%20on%20various%20types%20of%20surfaces%20in%203D%20environments%2C%20achieving%20high%20success%20rates%20as%20well%20as%20smooth%20trajectories%20and%20energy-safe%20interactions.%0ALink%3A%20http%3A//arxiv.org/abs/2511.13459v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContact-Safe%2520Reinforcement%2520Learning%2520with%2520ProMP%2520Reparameterization%2520and%2520Energy%2520Awareness%26entry.906535625%3DBingkun%2520Huang%2520and%2520Yuhe%2520Gong%2520and%2520Zewen%2520Yang%2520and%2520Tianyu%2520Ren%2520and%2520Luis%2520Figueredo%26entry.1292438233%3DReinforcement%2520learning%2520%2528RL%2529%2520approaches%2520based%2520on%2520Markov%2520Decision%2520Processes%2520%2528MDPs%2529%2520are%2520predominantly%2520applied%2520in%2520the%2520robot%2520joint%2520space%252C%2520often%2520relying%2520on%2520limited%2520task-specific%2520information%2520and%2520partial%2520awareness%2520of%2520the%25203D%2520environment.%2520In%2520contrast%252C%2520episodic%2520RL%2520has%2520demonstrated%2520advantages%2520over%2520traditional%2520MDP-based%2520methods%2520in%2520terms%2520of%2520trajectory%2520consistency%252C%2520task%2520awareness%252C%2520and%2520overall%2520performance%2520in%2520complex%2520robotic%2520tasks.%2520Moreover%252C%2520traditional%2520step-wise%2520and%2520episodic%2520RL%2520methods%2520often%2520neglect%2520the%2520contact-rich%2520information%2520inherent%2520in%2520task-space%2520manipulation%252C%2520especially%2520considering%2520the%2520contact-safety%2520and%2520robustness.%2520In%2520this%2520work%252C%2520contact-rich%2520manipulation%2520tasks%2520are%2520tackled%2520using%2520a%2520task-space%252C%2520energy-safe%2520framework%252C%2520where%2520reliable%2520and%2520safe%2520task-space%2520trajectories%2520are%2520generated%2520through%2520the%2520combination%2520of%2520Proximal%2520Policy%2520Optimization%2520%2528PPO%2529%2520and%252 {"title": "NOBLE: Accelerating Transformers with Nonlinear Low-Rank Branches", "author": "Ethan Smith", "abstract": "We introduce NOBLE (Nonlinear lOw-rank Branch for Linear Enhancement), an architectural augmentation that adds nonlinear low-rank branches to transformer linear layers. Unlike LoRA and other parameter-efficient fine-tuning (PEFT) methods, NOBLE is designed for pretraining from scratch. The branch is a permanent part of the architecture as opposed to an adapter for finetuning on top of frozen weights. The branch computes \u03c3(xWdown)Wup where \u03c3 is a learnable nonlinearity. We evaluate several activation functions and find that CosNet, a two-layer cosine nonlinearity with learnable frequency and phase with a linear projection in between them in the bottleneck space, performs best. NOBLE achieves substantial improvements with minimal overhead: up to 1.47x step speedup to reach baseline eval loss (up to 32% fewer training steps), with as low as 4% additional parameters and 7% step time overhead, resulting in up to 1.22x net wallclock speedup. Experiments on LLMs (250M and 1.5B parameters), BERT, VQGAN, and ViT consistently show improved training efficiency. We identify one caveat: Mixup/CutMix augmentation interferes with NOBLE's benefits in Imagenet classification along with other stochastic augmentations, but when disabled, ViT also improves. This discrepancy is possibly explained by regularization techniques that encourage smoother fits to the target function while NOBLE may specialize more in sharper aspects of the target function.", "link": "http://arxiv.org/abs/2603.06492v1", "date": "2026-03-06", "relevancy": 2.1053, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5418}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5398}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5055}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NOBLE%3A%20Accelerating%20Transformers%20with%20Nonlinear%20Low-Rank%20Branches&body=Title%3A%20NOBLE%3A%20Accelerating%20Transformers%20with%20Nonlinear%20Low-Rank%20Branches%0AAuthor%3A%20Ethan%20Smith%0AAbstract%3A%20We%20introduce%20NOBLE%20%28Nonlinear%20lOw-rank%20Branch%20for%20Linear%20Enhancement%29%2C%20an%20architectural%20augmentation%20that%20adds%20nonlinear%20low-rank%20branches%20to%20transformer%20linear%20layers.%20Unlike%20LoRA%20and%20other%20parameter-efficient%20fine-tuning%20%28PEFT%29%20methods%2C%20NOBLE%20is%20designed%20for%20pretraining%20from%20scratch.%20The%20branch%20is%20a%20permanent%20part%20of%20the%20architecture%20as%20opposed%20to%20an%20adapter%20for%20finetuning%20on%20top%20of%20frozen%20weights.%20The%20branch%20computes%20%CF%83%28xWdown%29Wup%20where%20%CF%83%20is%20a%20learnable%20nonlinearity.%20We%20evaluate%20several%20activation%20functions%20and%20find%20that%20CosNet%2C%20a%20two-layer%20cosine%20nonlinearity%20with%20learnable%20frequency%20and%20phase%20with%20a%20linear%20projection%20in%20between%20them%20in%20the%20bottleneck%20space%2C%20performs%20best.%20NOBLE%20achieves%20substantial%20improvements%20with%20minimal%20overhead%3A%20up%20to%201.47x%20step%20speedup%20to%20reach%20baseline%20eval%20loss%20%28up%20to%2032%25%20fewer%20training%20steps%29%2C%20with%20as%20low%20as%204%25%20additional%20parameters%20and%207%25%20step%20time%20overhead%2C%20resulting%20in%20up%20to%201.22x%20net%20wallclock%20speedup.%20Experiments%20on%20LLMs%20%28250M%20and%201.5B%20parameters%29%2C%20BERT%2C%20VQGAN%2C%20and%20ViT%20consistently%20show%20improved%20training%20efficiency.%20We%20identify%20one%20caveat%3A%20Mixup/CutMix%20augmentation%20interferes%20with%20NOBLE%27s%20benefits%20in%20Imagenet%20classification%20along%20with%20other%20stochastic%20augmentations%2C%20but%20when%20disabled%2C%20ViT%20also%20improves.%20This%20discrepancy%20is%20possibly%20explained%20by%20regularization%20techniques%20that%20encourage%20smoother%20fits%20to%20the%20target%20function%20while%20NOBLE%20may%20specialize%20more%20in%20sharper%20aspects%20of%20the%20target%20function.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06492v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNOBLE%253A%2520Accelerating%2520Transformers%2520with%2520Nonlinear%2520Low-Rank%2520Branches%26entry.906535625%3DEthan%2520Smith%26entry.1292438233%3DWe%2520introduce%2520NOBLE%2520%2528Nonlinear%2520lOw-rank%2520Branch%2520for%2520Linear%2520Enhancement%2529%252C%2520an%2520architectural%2520augmentation%2520that%2520adds%2520nonlinear%2520low-rank%2520branches%2520to%2520transformer%2520linear%2520layers.%2520Unlike%2520LoRA%2520and%2520other%2520parameter-efficient%2520fine-tuning%2520%2528PEFT%2529%2520methods%252C%2520NOBLE%2520is%2520designed%2520for%2520pretraining%2520from%2520scratch.%2520The%2520branch%2520is%2520a%2520permanent%2520part%2520of%2520the%2520architecture%2520as%2520opposed%2520to%2520an%2520adapter%2520for%2520finetuning%2520on%2520top%2520of%2520frozen%2520weights.%2520The%2520branch%2520computes%2520%25CF%2583%2528xWdown%2529Wup%2520where%2520%25CF%2583%2520is%2520a%2520learnable%2520nonlinearity.%2520We%2520evaluate%2520several%2520activation%2520functions%2520and%2520find%2520that%2520CosNet%252C%2520a%2520two-layer%2520cosine%2520nonlinearity%2520with%2520learnable%2520frequency%2520and%2520phase%2520with%2520a%2520linear%2520projection%2520in%2520between%2520them%2520in%2520the%2520bottleneck%2520space%252C%2520performs%2520best.%2520NOBLE%2520achieves%2520substantial%2520improvements%2520with%2520minimal%2520overhead%253A%2520up%2520to%25201.47x%2520step%2520speedup%2520to%2520reach%2520baseline%2520eval%2520loss {"title": "Random Quadratic Form on a Sphere: Synchronization by Common Noise", "author": "Maximilian Engel and Anna Shalova", "abstract": "We introduce the Random Quadratic Form (RQF): a stochastic differential equation which formally corresponds to the gradient flow of a random quadratic functional on a sphere. While the one-point dynamics of the system is a Brownian motion and thus has no preferred direction, the two-point motion exhibits nontrivial synchronizing behaviour. In this work we study synchronization of the RQF, namely we give both distributional and path-wise characterizations of the solutions by studying invariant measures and random attractors of the system.\n  The RQF model is motivated by the study of the role of linear layers in transformers and illustrates the synchronization by common noise phenomena arising in the simplified models of transformers. In particular, we provide an alternative (independent of self-attention) explanation of the clustering behaviour in deep transformers and show that tokens cluster even in the absence of the self-attention mechanism.", "link": "http://arxiv.org/abs/2603.06187v1", "date": "2026-03-06", "relevancy": 1.7887, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5161}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4468}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.42}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Random%20Quadratic%20Form%20on%20a%20Sphere%3A%20Synchronization%20by%20Common%20Noise&body=Title%3A%20Random%20Quadratic%20Form%20on%20a%20Sphere%3A%20Synchronization%20by%20Common%20Noise%0AAuthor%3A%20Maximilian%20Engel%20and%20Anna%20Shalova%0AAbstract%3A%2 520is%2520a%2520Brownian%2520motion%2520and%2520thus%2520has%2520no%2520preferred%2520direction%252C%2520the%2520two-point%2520motion%2520exhibits%2520nontrivial%2520synchronizing%2520behaviour.%2520In%2520this%2520work%2520we%2520study%2520synchronization%2520of%2520the%2520RQF%252C%2520namely%2520we%2520give%2520both%2520distributional%2520and%2520path-wise%2520characterizations%2520of%2520the%2520solutions%2520by%2520studying%2520invariant%2520measures%2520and%2520random%2520attractors%2520of%2520the%2520system.%250A%2520%2520The%2520RQF%2520model%2520is%2520motivated%2520by%2520the%2520study%2520of%2520the%2520role%2520of%2520linear%2520layers%2520in%2520transformers%2520and%2520illustrates%2520the%2520synchronization%2520by%2520common%2520noise%2520phenomena%2520arising%2520in%2520the%2520simplified%2520models%2520of%2520transformers.%2520In%2520particular%252C%2520we%2520provide%2520an%2520alternative%2520%2528independent%2520of%2520self-attention%2529%2520explanation%2520of%2520the%2520clustering%2520behaviour%2520in%2520deep%2520transformers%2520and%2520show%2520that%2520tokens%2520cluster%2520even%2520in%2520the%2520absence%2520of%2520the%2520self-attention%2520mechanism.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06187v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Random%20Quadratic%20Form%20on%20a%20Sphere%3A%20Synchronization%20by%20Common%20Noise&entry.906535625=Maximilian%20Engel%20and%20Anna%20Shalova&entry.1292438233=We%20introduce%20the%20Random%20Quadratic%20Form%20%28RQF%29%3A%20a%20stochastic%20differential%20equation%20which%20formally%20corresponds%20to%20the%20gradient%20flow%20of%20a%20random%20quadratic%20functional%20on%20a%20sphere.%20While%20the%20one-point%20dynamics%20of%20the%20system%20is%20a%20Brownian%20motion%20and%20thus%20has%20no%20preferred%20direction%2C%20the%20two-point%20motion%20exhibits%20nontrivial%20synch {"title": "NAMI: Efficient Image Generation via Bridged Progressive Rectified Flow Transformers", "author": "Yuhang Ma and Bo Cheng and Shanyuan Liu and Hongyi Zhou and Liebucha Wu and Dawei Leng and Yuhui Yin", "abstract": "Flow-based Transformer models have achieved state-of-the-art image generation performance, but often suffer from high inference latency and computational cost due to their large parameter sizes. To improve inference efficiency without compromising quality, we propose Bridged Progressive Rectified Flow Transformers (NAMI), which decompose the generation process across temporal, spatial, and architectural demensions. We divide the rectified flow into different stages according to resolution, and use a BridgeFlow module to connect them. Fewer Transformer layers are used at low-resolution stages to generate image layouts and concept contours, and more layers are progressively added as the resolution increases. Experiments demonstrate that our approach achieves fast convergence and reduces inference time while ensuring generation quality. The main contributions of this paper are summarized as follows: (1) We introduce Bridged Progressive Rectified Flow Transformers that enable multi-resolution training, accelerating model convergence; (2) NAMI leverages piecewise flow and spatial cascading of Diffusion Transformer (DiT) to rapidly generate images, reducing inference time by 64% for generating 1024 resolution images; (3) We propose a BridgeFlow module to align flows between different stages; (4) We propose the NAMI-1K benchmark to evaluate human preference performance, aiming to mitigate distributional bias and comprehensively assess model effectiveness. The results show that our model is competitive with state-of-the-art models.", "link": "http://arxiv.org/abs/2503.09242v3", "date": "2026-03-06", "relevancy": 1.8318, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.7342}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6057}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5631}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NAMI%3A%20Efficient%20Image%20Generation%20via%20Bridged%20Progressive%20Rectified%20Flow%20Transformers&body=Title%3A%20NAMI%3A%20Efficient%20Image%20Generation%20via%20Bridged%20Progressive%20Rectified%20Flow%20Transformers%0AAuthor%3A%20Yuhang%20Ma%20and%20Bo%20Cheng%20and%20Shanyuan%20Liu%20and%20Hongyi%20Zhou%20and%20Liebucha%20Wu%20and%20Dawei%20Leng%20and%20Yuhui%20Yin%0AAbstract%3A%20Flow-based%20Transformer%20models%20have%20achieved%20state-of-the-art%20image%20generation%20performance%2C%20but%20often%20suffer%20from%20high%20inference%20latency%20and%20computational%20cost%20due%20to%20their%20large%20parameter%20sizes.%20To%20improve%20inference%20efficiency%20without%20compromising%20quality%2C%20we%20propose%20Bridged%20Progressive%20Rectified%20Flow%20Transformers%20%28NAMI%29%2C%20which%20decompose%20the%20generation%20process%20across%20temporal%2C%20spatial%2C%20and%20architectural%20demensions.%20We%20divide%20the%20rectified%20flow%20into%20different%20stages%20according%20to%20resolution%2C%20and%20use%20a%20BridgeFlow%20module%20to%20connect%20them.%20Fewer%20Transformer%20layers%20are%20used%20at%20low-resolution%20stages%20to%20generate%20image%20layouts%20and%20concept%20contours%2C%20and%20more%20layers%20are%20progressively%20added%20as%20the%20resolution%20increases.%20Experiments%20demonstrate%20that%20our%20approach%20achieves%20fast%20convergence%20and%20reduces%20inference%20time%20while%20ensuring%20generation%20quality.%20The%20main%20contributions%20of%20this%20paper%20are%20summarized%20as%20follows%3A%20%281%29%20We%20introduce%20Bridged%20Progressive%20Rectified%20Flow%20Transformers%20that%20enable%20multi-resolution%20training%2C%20accelerating%20model%20convergence%3B%20%282%29%20NAMI%20leverages%20piecewise%20flow%20and%20spatial%20cascading%20of%20Diffusion%20Transformer%20%28DiT%29%20to%20rapidly%20generate%20images%2C%20reducing%20inference%20time%20by%2064%25%20for%20generating%201024%20resolution%20images%3B%20%283%29%20We%20propose%20a%20BridgeFlow%20module%20to%20align%20flows%20between%20different%20stages%3B%20%284%29%20We%20propose%20the%20NAMI-1K%20benchmark%20to%20evaluate%20human%20preference%20performance%2C%20aiming%20to%20mitigate%20distributional%20bias%20and%20comprehensively%20assess%20model%20effectiveness.%20The%20results%20show%20that%20our%20model%20is%20competitive%20with%20state-of-the-art%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2503.09242v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNAMI%253A%2520Efficient%2520Image%2520Generation%2520via%2520Bridged%2520Progressive%2520Rectified%2520Flow%2520Transformers%26entry.906535625%3DYuhang%2520Ma%2520and%2520Bo%2520Cheng%2520and%2520Shanyuan%2520Liu%2520and%2520Hongyi%2520Zhou%2520and%2520Liebucha%2520Wu%2520and%2520Dawei%2520Leng%2520and%2520Yuhui%2520Yin%26entry.1292438233%3DFlow-based%2520Transformer%2520models%2520have%2520achieved%2520state-of-the-art%2520image%2520generation%2520performance%252C%2520but%2520often%2520suffer%2520from%2520high%2520inference%2520latency%2520and%2520computational%2520cost%2520due%2520to%2520their%2520large%2520parameter%2520sizes.%2520To%2520improve%2520inference%2520efficiency%2520without%2520compromising%2520quality%252C%2520we%2520propose%2520Bridged%2520Progressive%2520Rectified%2520Flow%2520Transformers%2520%2528NAMI%2529%252C%2520which%2520decompose%2520the%2520generation%2520process%2520across%2520temporal%252C%2520spatial%252C%2520and%2520architectural%2520demensions.%2520We%252 {"title": "Adapter-Augmented Bandits for Online Multi-Constrained Multi-Modal Inference Scheduling", "author": "Xianzhi Zhang and Yue Xu and Yinlin Zhu and Di Wu and Yipeng Zhou and Miao Hu and Guocong Quan", "abstract": "Multi-modal large language model (MLLM) inference scheduling enables strong response quality under practical and heterogeneous budgets, beyond what a homogeneous single-backend setting can offer. Yet online MLLM task scheduling is nontrivial, as requests vary sharply in modality composition and latent reasoning difficulty, while execution backends incur distinct, time-varying costs due to system jitter and network variation. These coupled uncertainties pose two core challenges: deriving semantically faithful yet scheduling-relevant multi-modal task representations, and making low-overhead online decisions over irreversible multi-dimensional budgets. Accordingly, we propose \\emph{M-CMAB} (\\underline{M}ulti-modal \\underline{M}ulti-constraint \\underline{C}ontextual \\underline{M}ulti-\\underline{A}rmed \\underline{B}andit), a multi-adapter-enhanced MLLM inference scheduling framework with three components: (i) a CLS-attentive, frozen-backbone \\emph{Predictor} that extracts compact task representations and updates only lightweight adapters for action-specific estimation; (ii) a primal-dual \\emph{Constrainer} that maintains online Lagrange multipliers to enforce long-horizon constraints via per-round objectives; and (iii) a two-phase \\emph{Scheduler} that balances exploration and exploitation under irreversible budgets. We establish a regret guarantee under multi-dimensional knapsack constraints. On a composite multimodal benchmark with heterogeneous backends, \\emph{M-CMAB} consistently outperforms state-of-the-art baselines across budget regimes, achieving up to 14.18% higher reward and closely tracking an oracle-aided upper bound. Codes are available at https://anonymous.4open.science/r/M2CMAB/.", "link": "http://arxiv.org/abs/2603.06403v1", " {"title": "NOVA: Next-step Open-Vocabulary Autoregression for 3D Multi-Object Tracking in Autonomous Driving", "author": "Kai Luo and Xu Wang and Rui Fan and Kailun Yang", "abstract": "Generalizing across unknown targets is critical for open-world perception, yet existing 3D Multi-Object Tracking (3D MOT) pipelines remain limited by closed-set assumptions and ``semantic-blind'' heuristics. To address this, we propose Next-step Open-Vocabulary Autoregression (NOVA), an innovative paradigm that shifts 3D tracking from traditional fragmented distance-based matching toward generative spatio-temporal semantic modeling. NOVA reformulates 3D trajectories as structured spatio-temporal semantic sequences, enabling the simultaneous encoding of physical motion continuity and deep linguistic priors. By leveraging the autoregressive capabilities of Large Language Models (LLMs), we transform the tracking task into a principled process of next-step sequence completion. This mechanism allows the model to explicitly utilize the hierarchical structure of language space to resolve fine-grained semantic ambiguities and maintain identity consistency across complex long-range sequences through high-level commonsense reasoning. Extensive experiments on nuScenes, V2X-Seq-SPD, and KITTI demonstrate the superior performance of NOVA. Notably, on the nuScenes dataset, NOVA achieves an AMOTA of 22.41% for Novel categories, yielding a significant 20.21% absolute improvement over the baseline. These gains are realized through a compact 0.5B autoregressive model. Code will be available at https://github.com/xifen523/NOVA.", "link": "http://arxiv.org/abs/2603.06254v1", "date": "2026-03-06", "relevancy": 1.2074, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6133}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity {"title": "ROS-related Robotic Systems Development with V-model-based Application of MeROS Metamodel", "author": "Tomasz Winiarski and Jan Kaniuka and Daniel Gie\u0142dowski and Jakub Ostrysz and Krystian Radlak and Dmytro Kushnir", "abstract": "Systems built on the Robot Operating System (ROS) are increasingly easy to assemble, yet hard to govern and reliably coordinate. Beyond the sheer number of subsystems involved, the difficulty stems from their diversity and interaction depth. In this paper, we use a compact heterogeneous robotic system (HeROS), combining mobile and manipulation capabilities, as a demonstration vehicle under dynamically changing tasks. Notably, all its subsystems are powered by ROS.\n  The use of compatible interfaces and other ROS integration capabilities simplifies the construction of such systems. However, this only addresses part of the complexity: the semantic coherence and structural traceability are even more important for precise coordination and call for deliberate engineering methods. The Model-Based Systems Engineering (MBSE) discipline, which emerged from the experience of complexity management in large-scale engineering domains, offers the methodological foundations needed.\n  Despite their strengths in complementary aspects of robotics systems engineering, the lack of a unified approach to integrate ROS and MBSE hinders the full potential of these tools. Motivated by the anticipated impact of such a synergy in robotics practice, we propose a structured methodology based on MeROS - a SysML metamodel created specifically to put the ROS-based systems into the focus of the MBSE workflow. As its methodological backbone, we adapt the well-known V-model to this context, illustrating how complex robotic systems can be designed with traceability and validation capabilities embedded into their lifecycle using practices familiar to engineering teams.", "link": "http://arxiv.org/abs/2506.08706v3", "date": "2026-03-06", "relevancy": 1.4249, " {"title": "Stem: Rethinking Causal Information Flow in Sparse Attention", "author": "Lin Niu and Xin Luo and Linchuan Xie and Yifu Sun and Guanghua Yu and Jianchen Zhu and S Kevin Zhou", "abstract": "The quadratic computational complexity of self-attention remains a fundamental bottleneck for scaling Large Language Models (LLMs) to long contexts, particularly during the pre-filling phase. In this paper, we rethink the causal attention mechanism from the perspective of information flow. Due to causal constraints, tokens at initial positions participate in the aggregation of every subsequent token. However, existing sparse methods typically apply a uniform top-k selection across all token positions within a layer, ignoring the cumulative dependency of token information inherent in causal architectures. To address this, we propose Stem, a novel, plug-and-play sparsity module aligned with information flow. First, Stem employs the Token Position-Decay strategy, applying position-dependent top-k within each layer to retain initial tokens for recursive dependencies. Second, to preserve information-rich tokens, Stem utilizes the Output-Aware Metric. It prioritizes high-impact tokens based on approximate output magnitude. Extensive evaluations demonstrate that Stem achieves superior accuracy with reduced computation and pre-filling latency.", "link": "http://arxiv.org/abs/2603.06274v1", "date": "2026-03-06", "relevancy": 1.9723, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5322}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4724}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4471}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stem%3A%20Rethinkin {"title": "CLAIRE: Compressed Latent Autoencoder for Industrial Representation and Evaluation -- A Deep Learning Framework for Smart Manufacturing", "author": "Mohammadhossein Ghahramani and Mengchu Zhou", "abstract": "Accurate fault detection in high-dimensional industrial environments remains a major challenge due to the inherent complexity, noise, and redundancy in sensor data. This paper introduces CLAIRE, i.e., a hybrid end-to-end learning framework that integrates unsupervised deep representation learning with supervised classification for intelligent quality control in smart manufacturing systems. It employs an optimized deep autoencoder to transform raw input into a compact latent space, effectively capturing the intrinsic data structure while suppressing irrelevant or noisy features. The learned representations are then fed into a downstream classifier to perform binary fault prediction. Experimental results on a high-dimensional dataset demonstrate that CLAIRE significantly outperforms conventional classifiers trained directly on raw features. Moreover, the framework incorporates a post hoc phase, using a game-theory-based interpretability technique, to analyze the latent space and identify the most informative input features contributing to fault predictions. The proposed framework highlights the potential of integrating explainable AI with feature-aware regularization for robust fault detection. The modular and interpretable nature of the proposed framework makes it highly adaptable, offering promising applications in other domains characterized by complex, high-dimensional data, such as healthcare, finance, and environmental monitoring.", "link": "http://arxiv.org/abs/2603.06361v1", "date": "2026-03-06", "relevancy": 2.1358, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5603}, {"title": "Self-supervised Photographic Image Layout Represen       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

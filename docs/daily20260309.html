{"title": "REACT++: Efficient Cross-Attention for Real-Time Scene Graph Generation", "author": "Ma\u00eblic Neau and Zoe Falomir", "abstract": "Scene Graph Generation (SGG) is a task that encodes visual relationships between objects in images as graph structures. SGG shows significant promise as a foundational component for downstream tasks, such as reasoning for embodied agents. To enable real-time applications, SGG must address the trade-off between performance and inference speed. However, current methods tend to focus on one of the following: (1) improving relation prediction accuracy, (2) enhancing object detection accuracy, or (3) reducing latency, without aiming to balance all three objectives simultaneously. To address this limitation, we build on the powerful Real-time Efficiency and Accuracy Compromise for Tradeoffs in Scene Graph Generation (REACT) architecture and propose REACT++, a new state-of-the-art model for real-time SGG. By leveraging efficient feature extraction and subject-to-object cross-attention within the prototype space, REACT++ balances latency and representational power. REACT++ achieves the highest inference speed among existing SGG models, improving relation prediction accuracy without sacrificing object detection performance. Compared to the previous REACT version, REACT++ is 20% faster with a gain of 10% in relation prediction accuracy on average. The code is available at https://github.com/Maelic/SGG-Benchmark.", "link": "http://arxiv.org/abs/2603.06386v1", "date": "2026-03-06", "relevancy": 2.2791, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.602}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.575}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5354}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20REACT%2B%2B%3A%20Efficient%20Cross-Attention%20for%20Real-Time%20Scene%20Graph%20Generation&body=Title%3A%20REACT%2B%2B%3A%20Efficient%20Cross-Attention%20for%20Real-Time%20Scene%20Graph%20Generation%0AAuthor%3A%20Ma%C3%ABlic%20Neau%20and%20Zoe%20Falomir%0AAbstract%3A%20Scene%20Graph%20Generation%20%28SGG%29%20is%20a%20task%20that%20encodes%20visual%20relationships%20between%20objects%20in%20images%20as%20graph%20structures.%20SGG%20shows%20significant%20promise%20as%20a%20foundational%20component%20for%20downstream%20tasks%2C%20such%20as%20reasoning%20for%20embodied%20agents.%20To%20enable%20real-time%20applications%2C%20SGG%20must%20address%20the%20trade-off%20between%20performance%20and%20inference%20speed.%20However%2C%20current%20methods%20tend%20to%20focus%20on%20one%20of%20the%20following%3A%20%281%29%20improving%20relation%20prediction%20accuracy%2C%20%282%29%20enhancing%20object%20detection%20accuracy%2C%20or%20%283%29%20reducing%20latency%2C%20without%20aiming%20to%20balance%20all%20three%20objectives%20simultaneously.%20To%20address%20this%20limitation%2C%20we%20build%20on%20the%20powerful%20Real-time%20Efficiency%20and%20Accuracy%20Compromise%20for%20Tradeoffs%20in%20Scene%20Graph%20Generation%20%28REACT%29%20architecture%20and%20propose%20REACT%2B%2B%2C%20a%20new%20state-of-the-art%20model%20for%20real-time%20SGG.%20By%20leveraging%20efficient%20feature%20extraction%20and%20subject-to-object%20cross-attention%20within%20the%20prototype%20space%2C%20REACT%2B%2B%20balances%20latency%20and%20representational%20power.%20REACT%2B%2B%20achieves%20the%20highest%20inference%20speed%20among%20existing%20SGG%20models%2C%20improving%20relation%20prediction%20accuracy%20without%20sacrificing%20object%20detection%20performance.%20Compared%20to%20the%20previous%20REACT%20version%2C%20REACT%2B%2B%20is%2020%25%20faster%20with%20a%20gain%20of%2010%25%20in%20relation%20prediction%20accuracy%20on 2B%252B%2520balances%2520latency%2520and%2520representational%2520power.%2520REACT%252B%252B%2520achieves%2520the%2520highest%2520inference%2520speed%2520among%2520existing%2520SGG%2520models%252C%2520improving%2520relation%2520prediction%2520accuracy%2520without%2520sacrificing%2520object%2520detection%2520performance.%2520Compared%2520to%2520the%2520previous%2520REACT%2520version%252C%2520REACT%252B%252B%2520is%252020%2525%2520faster%2520with%2520a%2520gain%2520of%252010%2525%2520in%2520relation%2520prediction%2520accuracy%2520on%2520average.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/Maelic/SGG-Benchmark.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06386v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=REACT%2B%2B%3A%20Efficient%20Cross-Attention%20for%20Real-Time%20Scene%20Graph%20Generation&entry.906535625=Ma%C3%ABlic%20Neau%20and%20Zoe%20Falomir&entry.1292438233=Scene%20Graph%20Generation%20%28SGG%29%20is%20a%20task%20that%20encodes%20visual%20relationships%20between%20objects%20in%20images%20as%20graph%20structures.%20SGG%20shows%20significant%20promise%20as%20a%20foundational%20component%20for%20downstream%20tasks%2C%20such%20as%20reasoning%20for%20embodied%20agents.%20To%20enable%20real-time%20applications%2C%20SGG%20must%20address%20the%20trade-off%20between%20performance%20and%20inference%20speed.%20However%2C%20current%20methods%20tend%20to%20focus%20on%20one%20of%20the%20following%3A%20%281%29%20improving%20relation%20prediction%20accuracy%2C%20%282%29%20enhancing%20object%20detection%20accuracy%2C%20or%20%283%29%20reducing%20latency%2C%20without%20aiming%20to%20balance%20all%20three%20objectives%20simultaneously.%20To%20address%20this%20limitation%2C%20we%20build%20on%20the%20powerful%20Real-time%20Efficiency%20and%20Accuracy%20Compromise%20for%20Tradeoffs%20in%20Scene%20Graph%20Generation%20%28REACT%29%20architecture%20and%20propose%20REACT%2B%2B%2C%20a%20new%20state-of-the-art%20model%20for%20real-time%20SGG.%20By%20leveraging%20efficient%20feature%20extraction%20and%20subject-to-object%20cross-attention%20within%20the%20prototype%20space%2C%20REACT%2B%2B%20balances%20latency%20and%20representational%20power.%20REACT%2B%2B%20achieves%20the%20highest%20inference%20speed%20among%20existing%20SGG%20models%2C%20improving%20relation%20prediction%20accuracy%20without%20sacrificing%20object%20detection%20performance.%20Compared%20to%20the%20previous%20REACT%20version%2C%20REACT%2B%2B%20is%2020%25%20faster%20with%20a%20gain%20of%2010%25%20in%20relation%20prediction%20accuracy%20on%20average.%20The%20code%20is%20available%20at%20https%3A//github.com/Maelic/SGG-Benchmark.&entry.1838667208=http%3A//arxiv.org/abs/2603.06386v1&entry.124074799=Read"},
{"title": "Fly360: Omnidirectional Obstacle Avoidance within Drone View", "author": "Xiangkai Zhang and Dizhe Zhang and WenZhuo Cao and Zhaoliang Wan and Yingjie Niu and Lu Qi and Xu Yang and Zhiyong Liu", "abstract": "Obstacle avoidance in unmanned aerial vehicles (UAVs), as a fundamental capability, has gained increasing attention with the growing focus on spatial intelligence. However, current obstacle-avoidance methods mainly depend on limited field-of-view sensors and are ill-suited for UAV scenarios which require full-spatial awareness when the movement direction differs from the UAV's heading. This limitation motivates us to explore omnidirectional obstacle avoidance for panoramic drones with full-view perception. We first study an under explored problem setting in which a UAV must generate collision-free motion in environments with obstacles from arbitrary directions, and then construct a benchmark that consists of three representative flight tasks. Based on such settings, we propose Fly360, a two-stage perception-decision pipeline with a fixed random-yaw training strategy. At the perception stage, panoramic RGB observations are input and converted into depth maps as a robust intermediate representation. For the policy network, it is lightweight and used to output body-frame velocity commands from depth inputs. Extensive simulation and real-world experiments demonstrate that Fly360 achieves stable omnidirectional obstacle avoidance and outperforms forward-view baselines across all tasks. Our model is available at https://zxkai.github.io/fly360/", "link": "http://arxiv.org/abs/2603.06573v1", "date": "2026-03-06", "relevancy": 2.2696, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5779}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5689}, {"title": "RBF Weighted Hyper-Involution for RGB-D Object Detection", "author": "Mehfuz A Rahman and Khushal Das and Jiju Poovvancheri and Neil London and Dong Chen", "abstract": "A vast majority of augmented reality devices come equipped with depth and color cameras. Despite their advantages, extracting both photometric and depth features simultaneously in real-time remains challenging due to inherent differences between depth and color images. Furthermore, standard convolution operations are insufficient for extracting information directly from raw depth images, leading to inefficient intermediate representations. To address these issues, we propose a real-time two-stream RGBD object detection model. Our model introduces two new components: a dynamic radial basis function (RBF) weighted depth-based hyper-involution that adjusts dynamically based on spatial interaction patterns in raw depth maps, and an up-sampling based trainable fusion layer that combines extracted depth and color image features without obstructing information transfer between them. Experimental results demonstrate that the proposed approach achieves the strongest performance among existing RGB-D 2D object detection methods on NYU Depth V2, while remaining competitive on the SUN RGB-D benchmark.", "link": "http://arxiv.org/abs/2310.00342v2", "date": "2026-03-06", "relevancy": 2.267, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6003}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5429}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5423}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RBF%20Weighted%20Hyper-Involution%20for%20RGB-D%20Object% {"title": "Few-Shot Neural Differentiable Simulator: Real-to-Sim Rigid-Contact Modeling", "author": "Zhenhao Huang and Siyuan Luo and Bingyang Zhou and Ziqiu Zeng and Jason Pho and Fan Shi", "abstract": "Accurate physics simulation is essential for robotic learning and control, yet analytical simulators often fail to capture complex contact dynamics, while learning-based simulators typically require large amounts of costly real-world data. To bridge this gap, we propose a few-shot real-to-sim approach that combines the physical consistency of analytical formulations with the representational capacity of graph neural network (GNN)-based models. Using only a small amount of real-world data, our method calibrates analytical simulators to generate large-scale synthetic datasets that capture diverse contact interactions. On this foundation, we introduce a mesh-based GNN that implicitly models rigid-body forward dynamics and derive surrogate gradients for collision detection, achieving full differentiability. Experimental results demonstrate that our approach enables learning-based simulators to outperform differentiable baselines in replicating real-world trajectories. In addition, the differentiable design supports gradient-based optimization, which we validate through simulation-based policy learning in multi-object interaction scenarios. Extensive experiments show that our framework not only improves simulation fidelity with minimal supervision but also increases the efficiency of policy learning. Taken together, these findings suggest that differentiable simulation with few-shot real-world grounding provides a powerful direction for advancing future robotic manipulation and control.", "link": "http://arxiv.org/abs/2603.06218v1", "date": "2026-03-06", "relevancy": 2.2626, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5693}, { {"title": "Uncertainty-Aware Subset Selection for Robust Visual Explainability under Distribution Shifts", "author": "Madhav Gupta and Vishak Prasad C and Ganesh Ramakrishnan", "abstract": "Subset selection-based methods are widely used to explain deep vision models: they attribute predictions by highlighting the most influential image regions and support object-level explanations. While these methods perform well in in-distribution (ID) settings, their behavior under out-of-distribution (OOD) conditions remains poorly understood. Through extensive experiments across multiple ID-OOD sets, we find that reliability of the existing subset based methods degrades markedly, yielding redundant, unstable, and uncertainty-sensitive explanations. To address these shortcomings, we introduce a framework that combines submodular subset selection with layer-wise, gradient-based uncertainty estimation to improve robustness and fidelity without requiring additional training or auxiliary models. Our approach estimates uncertainty via adaptive weight perturbations and uses these estimates to guide submodular optimization, ensuring diverse and informative subset selection. Empirical evaluations show that, beyond mitigating the weaknesses of existing methods under OOD scenarios, our framework also yields improvements in ID settings. These findings highlight limitations of current subset-based approaches and demonstrate how uncertainty-driven optimization can enhance attribution and object-level interpretability, paving the way for more transparent and trustworthy AI in real-world vision applications.", "link": "http://arxiv.org/abs/2512.08445v2", "date": "2026-03-06", "relevancy": 2.2547, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.6207}, {"title": "MED tions%20show%20that%2C%20beyond%20mitigating%20the%20weaknesses%20of%20existing%20methods%20under%20OOD%20scenarios%2C%20our%20framework%20also%20yields%20improvements%20in%20ID%20settings.%20These%20findings%20highlight%20limitations%20of%20current%20subset-based%20approaches%20and%20demonstrate%20how%20uncertainty-driven%20optimization%20can%20enhance%20attribution%20and%20object-level%20interpretability%2C%20paving%20the%20way%20for%20more%20transparent%20and%20trustworthy%20AI%20in%20real-world%20vision%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2512.08445v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUncertainty-Aware%2520Subset%2520Selection%2520for%2520Robust%2520Visual%2520Explainability%2520under%2520Distribution%2520Shifts%26entry.906535625%3DMadhav%2520Gupta%2520and%2520Vishak%2520Prasad%2520C%2520and%2520Ganesh%2520Ramakrishnan%26entry.1292438233%3DSubset%2520selection-based%2520methods%2520are%2520widely%2520used%2520to%2520explain%2520deep%2520vision%2520models%253A%2520they%2520attribute%2520predictions%2520by%2520highlighting%2520the%2520most%2520influential%2520image%2520regions%2520and%2520support%2520object-level%2520explanations.%2520While%2520these%2520methods%2520perform%2520well%2520in%2520in-distribution%2520%2528ID%2529%2520settings%252C%2520their%2520behavior%2520under%2520out-of-distribution%2520%2528OOD%2529%2520conditions%2520remains%2520poorly%2520understood.%2520Through%2520extensive%2520experiments%2520across%2520multiple%2520ID-OOD%2520sets%252C%2520we%2520find%2520that%2520reliability%2520of%2520the%2520existing%2520subset%2520based%2520methods%2520degrades%2520markedly%252C%2520yielding%2520redundant%252C%2520unstable%252C%2520and%2520uncertainty-sensitive%2520explanations.%2520To%2520address%2520these%2520shortcomings%252C%2520we%2520introduce%2520a%2520framework%2520that%2520combines%2520submodular%2520subset%2520selection%2520with% {"title": "DiffInf: Influence-Guided Diffusion for Supervision Alignment in Facial Attribute Learning", "author": "Basudha Pal and Rama Chellappa", "abstract": "Facial attribute classification relies on large-scale annotated datasets in which many traits, such as age and expression, are inherently ambiguous and continuous but are discretized into categorical labels. Annotation inconsistencies arise from subjectivity and visual confounders such as pose, illumination, expression, and demographic variation, creating mismatch between images and assigned labels. These inconsistencies introduce supervision errors that impair representation learning and degrade downstream prediction. We introduce DiffInf, a self-influence--guided diffusion framework for mitigating annotation inconsistencies in facial attribute learning. We first train a baseline classifier and compute sample-wise self-influence scores using a practical first-order approximation to identify training instances that disproportionately destabilize optimization. Instead of discarding these influential samples, we apply targeted generative correction via a latent diffusion autoencoder to better align visual content with assigned labels while preserving identity and realism. To enable differentiable guidance during correction, we train a lightweight predictor of high-influence membership and use it as a surrogate influence regularizer. The edited samples replace the originals, yielding an influence-refined dataset of unchanged size. Across multi-class facial attribute classification, DiffInf consistently improves generalization compared with standard noisy-label training, robust optimization baselines, and influence-based filtering. Our results demonstrate that repairing influential annotation inconsistencies at the image level enhances downstream facial attribute classification without sacrificing distributional coverage.", "link": "http://arxiv.org/abs/2603.06399v1", "date": "2026-03-06", "relevancy": 2.2468, " {"title": "FALCON: Future-Aware Learning with Contextual Object-Centric Pretraining for UAV Action Recognition", "author": "Ruiqi Xian and Xiyang Wu and Tianrui Guan and Xijun Wang and Boqing Gong and Dinesh Manocha", "abstract": "We introduce FALCON, a unified self-supervised video pretraining approach for UAV action recognition from raw RGB aerial footage, requiring no additional preprocessing at inference. UAV videos exhibit severe spatial imbalance: large, cluttered backgrounds dominate the field of view, causing reconstruction-based pretraining to waste capacity on uninformative regions and under-learn action-relevant human/object cues. FALCON addresses this by integrating object-aware masked autoencoding with object-centric dual-horizon future reconstruction. Using detections only during pretraining, we construct objectness priors that (i) enforce balanced token visibility during masking and (ii) concentrate reconstruction supervision on action-relevant regions, preventing learning from being dominated by background appearance. To promote temporal dynamics learning, we further reconstruct short- and long-horizon future content within an object-centric supervision region, injecting anticipatory temporal supervision that is robust to noisy aerial context. Across UAV benchmarks, FALCON improves top-1 accuracy by 2.9\\% on NEC-Drone and 5.8\\% on UAV-Human with a ViT-B backbone, while achieving 2$\\times$--5$\\times$ faster inference than supervised approaches that rely on heavy test-time augmentation.", "link": "http://arxiv.org/abs/2409.18300v2", "date": "2026-03-06", "relevancy": 2.245, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5838}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5621}, {"title": "uPLAM: Robust Panoptic Localiza uracy%20by%202.9%5C%25%20on%20NEC-Drone%20and%205.8%5C%25%20on%20UAV-Human%20with%20a%20ViT-B%20backbone%2C%20while%20achieving%202%24%5Ctimes%24--5%24%5Ctimes%24%20faster%20inference%20than%20supervised%20approaches%20that%20rely%20on%20heavy%20test-time%20augmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2409.18300v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFALCON%253A%2520Future-Aware%2520Learning%2520with%2520Contextual%2520Object-Centric%2520Pretraining%2520for%2520UAV%2520Action%2520Recognition%26entry.906535625%3DRuiqi%2520Xian%2520and%2520Xiyang%2520Wu%2520and%2520Tianrui%2520Guan%2520and%2520Xijun%2520Wang%2520and%2520Boqing%2520Gong%2520and%2520Dinesh%2520Manocha%26entry.1292438233%3DWe%2520introduce%2520FALCON%252C%2520a%2520unified%2520self-supervised%2520video%2520pretraining%2520approach%2520for%2520UAV%2520action%2520recognition%2520from%2520raw%2520RGB%2520aerial%2520footage%252C%2520requiring%2520no%2520additional%2520preprocessing%2520at%2520inference.%2520UAV%2520videos%2520exhibit%2520severe%2520spatial%2520imbalance%253A%2520large%252C%2520cluttered%2520backgrounds%2520dominate%2520the%2520field%2520of%2520view%252C%2520causing%2520reconstruction-based%2520pretraining%2520to%2520waste%2520capacity%2520on%2520uninformative%2520regions%2520and%2520under-learn%2520action-relevant%2520human/object%2520cues.%2520FALCON%2520addresses%2520this%2520by%2520integrating%2520object-aware%2520masked%2520autoencoding%2520with%2520object-centric%2520dual-horizon%2520future%2520reconstruction.%2520Using%2520detections%2520only%2520during%2520pretraining%252C%2520we%2520construct%2520objectness%2520priors%2520that%2520%2528i%2529%2520enforce%2520balanced%2520token%2520visibility%2520during%2520masking%2520and%2520%2528ii%2529%2520concentrate%2520reconstruction%2520supervision%2520on%2520action-relevant%2520regions%252C%2520preventing%2520learning%2520from%2520being%2520d {"title": "A Geometric Perspective on the Difficulties of Learning GNN-based SAT Solvers", "author": "Geri Skenderi", "abstract": "Graph Neural Networks (GNNs) have gathered increasing interest as learnable solvers of Boolean Satisfiability Problems (SATs), operating on graph representations of logical formulas. However, their performance degrades sharply on harder and more constrained instances, raising questions about architectural limitations. In this paper, we work towards a geometric explanation built upon graph Ricci Curvature (RC). We prove that bipartite graphs derived from random k-SAT formulas are inherently negatively curved, and that this curvature decreases with instance difficulty. Given that negative graph RC indicates local connectivity bottlenecks, we argue that GNN solvers are affected by oversquashing, a phenomenon where long-range dependencies become impossible to compress into fixed-length representations. We validate our claims empirically across different SAT benchmarks and confirm that curvature is both a strong indicator of problem complexity and can be used to predict generalization error. Finally, we connect our findings to the design of existing solvers and outline promising directions for future work.", "link": "http://arxiv.org/abs/2508.21513v3", "date": "2026-03-06", "relevancy": 2.2438, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4584}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4552}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4327}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Geometric%20Perspective%20on%20the%20Difficulties%20of%20Learning%20GNN-based%20SAT%20Solvers&body=Title%3A%20A%20Geometric%20Perspective%20on%20the%20Difficulties%20of%20Learning%20GNN-based%20SAT%20Solvers%0AAuthor%3A%20Geri%20Skenderi%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20have%20gathered%20increasing%20interest%20as%20learnable%20solvers%20of%20Boolean%20Satisfiability%20Problems%20%28SATs%29%2C%20operating%20on%20graph%20representations%20of%20logical%20formulas.%20However%2C%20their%20performance%20degrades%20sharply%20on%20harder%20and%20more%20constrained%20instances%2C%20raising%20questions%20about%20architectural%20limitations.%20In%20this%20paper%2C%20we%20work%20towards%20a%20geometric%20explanation%20built%20upon%20graph%20Ricci%20Curvature%20%28RC%29.%20We%20prove%20that%20bipartite%20graphs%20derived%20from%20random%20k-SAT%20formulas%20are%20inherently%20negatively%20curved%2C%20and%20that%20this%20curvature%20decreases%20with%20instance%20difficulty.%20Given%20that%20negative%20graph%20RC%20indicates%20local%20connectivity%20bottlenecks%2C%20we%20argue%20that%20GNN%20solvers%20are%20affected%20by%20oversquashing%2C%20a%20phenomenon%20where%20long-range%20dependencies%20become%20impossible%20to%20compress%20into%20fixed-length%20representations.%20We%20validate%20our%20claims%20empirically%20across%20different%20SAT%20benchmarks%20and%20confirm%20that%20curvature%20is%20both%20a%20strong%20indicator%20of%20problem%20complexity%20and%20can%20be%20used%20to%20predict%20generalization%20error.%20Finally%2C%20we%20connect%20our%20findings%20to%20the%20design%20of%20existing%20solvers%20and%20outline%20promising%20directions%20for%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2508.21513v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Geometric%2520Perspective%2520on%2520the%2520Difficulties%2520of%2520Learning%2520GNN-based%2520SAT%2520Solvers%26entry.906535625%3DGeri%2520Skenderi%26entry.1292438233%3DGraph%2520Neural%2520Networks%2520%2528GNNs%2529%252 {"title": "Spatial Colour Mixing Illusions as a Perception Stress Test for Vision-Language Models", "author": "Nicoleta-Nina Basoc and Adrian Cosma and Emilian Radoi", "abstract": "Vision-language models (VLMs) achieve strong benchmark results, yet can exhibit systematic perceptual weaknesses: structured, large changes to pixel values can cause confident yet nonsensical predictions, even when the underlying scene remains easily recognizable to humans. We study this gap using Spatial Colour Mixing, a programmatic family of colour distortions that overlays structured patterns (in both RGB and Ostwald colour systems) onto natural images. We introduce a framework of eight spatial colour mixing variants and evaluate nine VLMs across three model families on four datasets. Across models and datasets, accuracy degrades sharply with increasing distortion, and scaling the language model does not reliably mitigate the failure. In a human study with 61 participants on an animal recognition dataset, humans substantially outperform VLMs under the same distortions. Finally, we show that a simple human-inspired preprocessing step recovers a meaningful portion of performance for several distortion types, motivating perception-aware preprocessing and tool-use as practical strategies for improving VLM robustness.", "link": "http://arxiv.org/abs/2603.06141v1", "date": "2026-03-06", "relevancy": 2.2426, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5638}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.56}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.56}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatial%20Colour%20Mixing%20Illusions%20as%20a%20Perception%20Stress%20Test%20for%20Vision-Language%20Models&body=Title%3A%20Spatial%20Colour%20Mixing%20Illusions%20as%20a%20Perception%20Stress%20Test%20for%20Vision-Language%20Models%0AAuthor%3A%20Nicoleta-Nina%20Basoc%20and%20Adrian%20Cosma%20and%20Emilian%20Radoi%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20achieve%20strong%20benchmark%20results%2C%20yet%20can%20exhibit%20systematic%20perceptual%20weaknesses%3A%20structured%2C%20large%20changes%20to%20pixel%20values%20can%20cause%20confident%20yet%20nonsensical%20predictions%2C%20even%20when%20the%20underlying%20scene%20remains%20easily%20recognizable%20to%20humans.%20We%20study%20this%20gap%20using%20Spatial%20Colour%20Mixing%2C%20a%20programmatic%20family%20of%20colour%20distortions%20that%20overlays%20structured%20patterns%20%28in%20both%20RGB%20and%20Ostwald%20colour%20systems%29%20onto%20natural%20images.%20We%20introduce%20a%20framework%20of%20eight%20spatial%20colour%20mixing%20variants%20and%20evaluate%20nine%20VLMs%20across%20three%20model%20families%20on%20four%20datasets.%20Across%20models%20and%20datasets%2C%20accuracy%20degrades%20sharply%20with%20increasing%20distortion%2C%20and%20scaling%20the%20language%20model%20does%20not%20reliably%20mitigate%20the%20failure.%20In%20a%20human%20study%20with%2061%20participants%20on%20an%20animal%20recognition%20dataset%2C%20humans%20substantially%20outperform%20VLMs%20under%20the%20same%20distortions.%20Finally%2C%20we%20show%20that%20a%20simple%20human-inspired%20preprocessing%20step%20recovers%20a%20meaningful%20portion%20of%20performance%20for%20several%20distortion%20types%2C%20motivating%20perception-aware%20preprocessing%20and%20tool-use%20as%20practical%20strategies%20for%20improving%20VLM%20robustness.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06141v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatial%2520Colour%2520Mixing%2520Illusions%2520as% 520robustness.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06141v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spatial%20Colour%20Mixing%20Illusions%20as%20a%20Perception%20Stress%20Test%20for%20Vision-Language%20Models&entry.906535625=Nicoleta-Nina%20Basoc%20and%20Adrian%20Cosma%20and%20Emilian%20Radoi&entry.1292438233=Vision-language%20models%20%28VLMs%29%20achieve%20strong%20benchmark%20results%2C%20yet%20can%20exhibit%20systematic%20perceptual%20weaknesses%3A%20structured%2C%20large%20changes%20to%20pixel%20values%20can%20cause%20confident%20yet%20nonsensical%20predictions%2C%20even%20when%20the%20underlying%20scene%20remains%20easily%20recognizable%20to%20humans.%20We%20study%20this%20gap%20using%20Spatial%20Colour%20Mixing%2C%20a%20programmatic%20family%20of%20colour%20distortions%20that%20overlays%20structured%20patterns%20%28in%20both%20RGB%20and%20Ostwald%20colour%20systems%29%20onto%20natural%20images.%20We%20introduce%20a%20framework%20of%20eight%20spatial%20colour%20mixing%20variants%20and%20evaluate%20nine%20VLMs%20across%20three%20model%20families%20on%20four%20datasets.%20Across%20models%20and%20datasets%2C%20accuracy%20degrades%20sharply%20with%20increasing%20distortion%2C%20and%20scaling%20the%20language%20model%20does%20not%20reliably%20mitigate%20the%20failure.%20In%20a%20human%20study%20with%2061%20participants%20on%20an%20animal%20recognition%20dataset%2C%20humans%20substantially%20outperform%20VLMs%20under%20the%20same%20distortions.%20Finally%2C%20we%20show%20that%20a%20simple%20human-inspired%20preprocessing%20step%20recovers%20a%20meaningful%20portion%20of%20performance%20for%20several%20distortion%20types%2C%20motivating%20perception-aware%20preprocessing%20and%20tool-use%20as%20practical%20strategies%20for%20improving%20VLM%20robustness.&entry.1838667208=http%3A//arxiv.org/abs/2603.06141v1&entry.124074799=Read"},
{"title": "SGDFuse: SAM-Guided Diffusion Model for High-Fidelity Infrared and Visible Image Fusion", "author": "Xiaoyang Zhang and jinjiang Li and Guodong Fan and Yakun Ju and Linwei Fan and Jun Liu and Alex C. Kot", "abstract": "Infrared and visible image fusion (IVIF) aims to combine the thermal radiation information from infrared images with the rich texture details from visible images to enhance perceptual capabilities for downstream visual tasks. However, existing methods often fail to preserve key targets due to a lack of deep semantic understanding of the scene, while the fusion process itself can also introduce artifacts and detail loss, severely compromising both image quality and task performance. To address these issues, this paper proposes SGDFuse, a conditional diffusion model guided by the Segment Anything Model (SAM), to achieve high-fidelity and semantically-aware image fusion. The core of our method is to utilize high-quality semantic masks generated by SAM as explicit priors to guide the optimization of the fusion process via a conditional diffusion model. Specifically, the framework operates in a two-stage process: it first performs a preliminary fusion of multi-modal features, and then utilizes the semantic masks from SAM jointly with the preliminary fused image as a condition to drive the diffusion model's coarse-to-fine denoising generation. This ensures the fusion process not only has explicit semantic directionality but also guarantees the high fidelity of the final result. Extensive experiments demonstrate that SGDFuse achieves state-of-the-art performance in both subjective and objective evaluations, as well as in its adaptability to downstream tasks, providing a powerful solution to the core challenges in image fusion. The code of SGDFuse is available at https://github.com/boshizhang123/SGDFuse.", "link": "http://arxiv.org/abs/2508.05264v5", "date": "2026-03-06", "relevancy": 2.2406, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.611}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5523}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5477}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SGDFuse%3A%20SAM-Guided%20Diffusion%20Model%20for%20High-Fidelity%20Infrared%20and%20Visible%20Image%20Fusion&body=Title%3A%20SGDFuse%3A%20SAM-Guided%20Diffusion%20Model%20for%20High-Fidelity%20Infrared%20and%20Visible%20Image%20Fusion%0AAuthor%3A%20Xiaoyang%20Zhang%20and%20jinjiang%20Li%20and%20Guodong%20Fan%20and%20Yakun%20Ju%20and%20Linwei%20Fan%20and%20Jun%20Liu%20and%20Alex%20C.%20Kot%0AAbstract%3A%20Infrared%20and%20visible%20image%20fusion%20%28IVIF%29%20aims%20to%20combine%20the%20thermal%20radiation%20information%20from%20infrared%20images%20with%20the%20rich%20texture%20details%20from%20visible%20images%20to%20enhance%20perceptual%20capabilities%20for%20downstream%20visual%20tasks.%20However%2C%20existing%20methods%20often%20fail%20to%20preserve%20key%20targets%20due%20to%20a%20lack%20of%20deep%20semantic%20understanding%20of%20the%20scene%2C%20while%20the%20fusion%20process%20itself%20can%20also%20introduce%20artifacts%20and%20detail%20loss%2C%20severely%20compromising%20both%20image%20quality%20and%20task%20performance.%20To%20address%20these%20issues%2C%20this%20paper%20proposes%20SGDFuse%2C%20a%20conditional%20diffusion%20model%20guided%20by%20the%20Segment%20Anything%20Model%20%28SAM%29%2C%20to%20achieve%20high-fidelity%20and%20semantically-aware%20image%20fusion.%20The%20core%20of%20our%20method%20is%20to%20utilize%20high-quality%20semantic%20masks%20generated%20by%20SAM%20as%20explicit%20priors%20to%20guide%20the%20optimization%20of%20the%20fusion%20process%20via%20a%20conditional%20diffusion%20model.%20Specifically%2C%20the%20framework%20operates%20in%20a%20two-stage%20process%3A%20it%20first%20performs%20a%20preliminary%20fusion%20of%20multi-modal%20features%2C%20and%20then%20utilizes%20the%20semantic%20masks%20from%20SAM%20jointly%20with%20the%20preliminary%20fused%20image%20as%20a%20condition%20to%20drive%20the%20diffusion%20model%27s%20coarse-to-fine%20denoising%20generation.%20This%20ensures%20the%20fusion%20process%20not%20only%20has%20explicit%20semantic%20directionality%20but%20also%20guarantees%20the%20high%20fidelity%20of%20the%20final%20result.%20Extensive%20experiments%20demonstrate%20that%20SGDFuse%20achieves%20state-of-the-art%20performance%20in%20both%20subjective%20and%20objective%20evaluations%2C%20as%20well%20as%20in%20its%20adaptability%20to%20downstream%20tasks%2C%20providing%20a%20powerful%20solution%20to%20the%20core%20challenges%20in%20image%20fusion.%20The%20code%20of%20SGDFuse%20is%20available%20at%20https%3A//github.com/boshizhang123/SGDFuse.%0ALink%3A%20http%3A//arxiv.org/abs/2508.05264v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSGDFuse%253A%2520SAM-Guided%2520Diffusion%2520Model%2520for%2520High-Fidelity%2520Infrared%2520and%2520Visible%2520Image%2520Fusion%26entry.906535625%3DXiaoyang%2520Zhang%2520and%2520jinjiang%2520Li%2520and%2520Guodong%2520Fan%2520and%2520Yakun%2520Ju%2520and%2520Linwei%2520Fan%2520and%2520Jun%2520Liu%2520and%2520Alex%2520C.%2520Kot%26entry.1292438233%3DInfrared%2520and%2520visible%2520image%2520fusion%2520%2528IVIF%2529%2520aims%2520to%2520combine%2520the%2520thermal%2520radiation%2520information%2520from%2520infrared%2520images%2520with%2520the%2520rich%2520texture%2520details%2520from%2520visible%2520images%2520to%2520enhance%2520perceptual%2520capabilities%2520for%2520downstream%2520visual%2520tasks.%2520However%252C%2520existing%2520methods%2520often%2520fail%2520to%252 solution%2520to%2520the%2520core%2520challenges%2520in%2520image%2520fusion.%2520The%2520code%2520of%2520SGDFuse%2520is%2520available%2520at%2520https%253A//github.com/boshizhang123/SGDFuse.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.05264v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SGDFuse%3A%20SAM-Guided%20Diffusion%20Model%20for%20High-Fidelity%20Infrared%20and%20Visible%20Image%20Fusion&entry.906535625=Xiaoyang%20Zhang%20and%20jinjiang%20Li%20and%20Guodong%20Fan%20and%20Yakun%20Ju%20and%20Linwei%20Fan%20and%20Jun%20Liu%20and%20Alex%20C.%20Kot&entry.1292438233=Infrared%20and%20visible%20image%20fusion%20%28IVIF%29%20aims%20to%20combine%20the%20thermal%20radiation%20information%20from%20infrared%20images%20with%20the%20rich%20texture%20details%20from%20visible%20images%20to%20enhance%20perceptual%20capabilities%20for%20downstream%20visual%20tasks.%20However%2C%20existing%20methods%20often%20fail%20to%20preserve%20key%20targets%20due%20to%20a%20lack%20of%20deep%20semantic%20understanding%20of%20the%20scene%2C%20while%20the%20fusion%20process%20itself%20can%20also%20introduce%20artifacts%20and%20detail%20loss%2C%20severely%20compromising%20both%20image%20quality%20and%20task%20performance.%20To%20address%20these%20issues%2C%20this%20paper%20proposes%20SGDFuse%2C%20a%20conditional%20diffusion%20model%20guided%20by%20the%20Segment%20Anything%20Model%20%28SAM%29%2C%20to%20achieve%20high-fidelity%20and%20semantically-aware%20image%20fusion.%20The%20core%20of%20our%20method%20is%20to%20utilize%20high-quality%20semantic%20masks%20generated%20by%20SAM%20as%20explicit%20priors%20to%20guide%20the%20optimization%20of%20the%20fusion%20process%20via%20a%20conditional%20diffusion%20model.%20Specifically%2C%20the%20framework%20operates%20in%20a%20two-stage%20process%3A%20it%20first%20performs%20a%20preliminary%20fusion%20of%20multi-modal%20features%2C%20and%20then%20utilizes%20the%20semantic%20masks%20from%20SAM%20jointly%20with%20the%20preliminary%20fused%20image%20as%20a%20condition%20to%20drive%20the%20diffusion%20model%27s%20coarse-to-fine%20denoising%20generation.%20This%20ensures%20the%20fusion%20process%20not%20only%20has%20explicit%20semantic%20directionality%20but%20also%20guarantees%20the%20high%20fidelity%20of%20the%20final%20result.%20Extensive%20experiments%20demonstrate%20that%20SGDFuse%20achieves%20state-of-the-art%20performance%20in%20both%20subjective%20and%20objective%20evaluations%2C%20as%20well%20as%20in%20its%20adaptability%20to%20downstream%20tasks%2C%20providing%20a%20powerful%20solution%20to%20the%20core%20challenges%20in%20image%20fusion.%20The%20code%20of%20SGDFuse%20is%20available%20at%20https%3A//github.com/boshizhang123/SGDFuse.&entry.1838667208=http%3A//arxiv.org/abs/2508.05264v5&entry.124074799=Read"},
{"title": "SUREON: A Benchmark and Vision-Language-Model for Surgical Reasoning", "author": "Alejandra Perez and Anita Rau and Lee White and Busisiwe Mlambo and Chinedu Nwoye and Muhammad Abdullah Jamal and Omid Mohareri", "abstract": "Surgeons don't just see -- they interpret. When an expert observes a surgical scene, they understand not only what instrument is being used, but why it was chosen, what risk it poses, and what comes next. Current surgical AI cannot answer such questions, largely because training data that explicitly encodes surgical reasoning is immensely difficult to annotate at scale. Yet surgical video lectures already contain exactly this -- explanations of intent, rationale, and anticipation, narrated by experts for the purpose of teaching. Though inherently noisy and unstructured, these narrations encode the reasoning that surgical AI currently lacks. We introduce SUREON, a large-scale video QA dataset that systematically harvests this training signal from surgical academic videos. SUREON defines 12 question categories covering safety assessment, decision rationale, and forecasting, and uses a multi-agent pipeline to extract and structure supervision at scale. Across 134.7K clips and 170 procedure types, SUREON yields 206.8k QA pairs and an expert-validated benchmark of 354 examples. To evaluate the extent to which this supervision translates to surgical reasoning ability, we introduce two models: SureonVLM, a vision-language model adapted through supervised fine-tuning, and SureonVLM-R1, a reasoning model trained with Group Relative Policy Optimization. Both models can answer complex questions about surgery and substantially outperform larger general-domain models, exceeding 84% accuracy on the SUREON benchmark while outperforming general-domain models on standard surgical perception tasks. Qualitative analysis of SureonVLM-R1 reveals explicit reasoning behavior, such as inferring operative intent from visual context.", "link": "http://arxiv.org/abs/2603.06570v1", "date": "2026-03-06", "relevancy": 2.221, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5665}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5665}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4991}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SUREON%3A%20A%20Benchmark%20and%20Vision-Language-Model%20for%20Surgical%20Reasoning&body=Title%3A%20SUREON%3A%20A%20Benchmark%20and%20Vision-Language-Model%20for%20Surgical%20Reasoning%0AAuthor%3A%20Alejandra%20Perez%20and%20Anita%20Rau%20and%20Lee%20White%20and%20Busisiwe%20Mlambo%20and%20Chinedu%20Nwoye%20and%20Muhammad%20Abdullah%20Jamal%20and%20Omid%20Mohareri%0AAbstract%3A%20Surgeons%20don%27t%20just%20see%20--%20they%20interpret.%20When%20an%20expert%20observes%20a%20surgical%20scene%2C%20they%20understand%20not%20only%20what%20instrument%20is%20being%20used%2C%20but%20why%20it%20was%20chosen%2C%20what%20risk%20it%20poses%2C%20and%20what%20comes%20next.%20Current%20surgical%20AI%20cannot%20answer%20such%20questions%2C%20largely%20because%20training%20data%20that%20explicitly%20encodes%20surgical%20reasoning%20is%20immensely%20difficult%20to%20annotate%20at%20scale.%20Yet%20surgical%20video%20lectures%20already%20contain%20exactly%20this%20--%20explanations%20of%20intent%2C%20rationale%2C%20and%20anticipation%2C%20narrated%20by%20experts%20for%20the%20purpose%20of%20teaching.%20Though%20inherently%20noisy%20and%20unstructured%2C%20these%20narrations%20encode%20the%20reasoning%20that%20surgical%20AI%20currently%20lacks.%20We%20introduce%20SUREON%2C%20a%20large-scale%20video%20QA%20dataset%20that%20systematically%20harvests%20this%20training%20signal%20from%20surgical%20academic%20videos.%20SUREON%20defines%2012%20question%20categories%20covering%20safety%20assessment%2C%20decision%20rationale%2C%20and%20forecasting%2C%20and%20uses%20a%20multi-agent%20pipeline%20to%20extract%20and%20structure%20supervision%20at%20scale.%20Across%20134.7K%20clips%20and%20170%20procedure%20types%2C%20SUREON%20yields%20206.8k%20QA%20pairs%20and%20an%20expert-validated%20benchmark%20of%20354%20examples.%20To%20evaluate%20the%20extent%20to%20which%20this%20supervision%20translates%20to%20surgical%20reasoning%20ability%2C%20we%20introduce%20two%20models%3A%20SureonVLM%2C%20a%20vision-language%20model%20adapted%20through%20supervised%20fine-tuning%2C%20and%20SureonVLM-R1%2C%20a%20reasoning%20model%20trained%20with%20Group%20Relative%20Policy%20Optimization.%20Both%20models%20can%20answer%20complex%20questions%20about%20surgery%20and%20substantially%20outperform%20larger%20general-domain%20models%2C%20exceeding%2084%25%20accuracy%20on%20the%20SUREON%20benchmark%20while%20outperforming%20general-domain%20models%20on%20standard%20surgical%20perception%20tasks.%20Qualitative%20analysis%20of%20SureonVLM-R1%20reveals%20explicit%20reasoning%20behavior%2C%20such%20as%20inferring%20operative%20intent%20from%20visual%20context.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06570v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSUREON%253A%2520A%2520Benchmark%2520and%2520Vision-Language-Model%2520for%2520Surgical%2520Reasoning%26entry.906535625%3DAlejandra%2520Perez%2520and%2520Anita%2520Rau%2520and%2520Lee%2520White%2520and%2520Busisiwe%2520Mlambo%2520and%2520Chinedu%2520Nwoye%2520and%2520Muhammad%2520Abdullah%2520Jamal%2520and%2520Omid%2520Mohareri%26entry.1292438233%3DSurgeons%2520don%2527t%2520just%2520see%2520--%2520they%2520interpret.%2520When%2520an%2520expert%2520observes%2520a%2520surgical%2520scene%252C%2520they%2520underst UREON%2C%20a%20large-scale%20video%20QA%20dataset%20that%20systematically%20harvests%20this%20training%20signal%20from%20surgical%20academic%20videos.%20SUREON%20defines%2012%20question%20categories%20covering%20safety%20assessment%2C%20decision%20rationale%2C%20and%20forecasting%2C%20and%20uses%20a%20multi-agent%20pipeline%20to%20extract%20and%20structure%20supervision%20at%20scale.%20Across%20134.7K%20clips%20and%20170%20procedure%20types%2C%20SUREON%20yields%20206.8k%20QA%20pairs%20and%20an%20expert-validated%20benchmark%20of%20354%20examples.%20To%20evaluate%20the%20extent%20to%20which%20this%20supervision%20translates%20to%20surgical%20reasoning%20ability%2C%20we%20introduce%20two%20models%3A%20SureonVLM%2C%20a%20vision-language%20model%20adapted%20through%20supervised%20fine-tuning%2C%20and%20SureonVLM-R1%2C%20a%20reasoning%20model%20trained%20with%20Group%20Relative%20Policy%20Optimization.%20Both%20models%20can%20answer%20complex%20questions%20about%20surgery%20and%20substantially%20outperform%20larger%20general-domain%20models%2C%20exceeding%2084%25%20accuracy%20on%20the%20SUREON%20benchmark%20while%20outperforming%20general-domain%20models%20on%20standard%20surgical%20perception%20tasks.%20Qualitative%20analysis%20of%20SureonVLM-R1%20reveals%20explicit%20reasoning%20behavior%2C%20such%20as%20inferring%20operative%20intent%20from%20visual%20context.&entry.1838667208=http%3A//arxiv.org/abs/2603.06570v1&entry.124074799=Read"},
{"title": "FARTrack: Fast Autoregressive Visual Tracking with High Performance", "author": "Guijie Wang and Tong Lin and Yifan Bai and Anjia Cao and Shiyi Liang and Wangbo Zhao and Xing Wei", "abstract": "Inference speed and tracking performance are two critical evaluation metrics in the field of visual tracking. However, high-performance trackers often suffer from slow processing speeds, making them impractical for deployment on resource-constrained devices. To alleviate this issue, we propose FARTrack, a Fast Auto-Regressive Tracking framework. Since autoregression emphasizes the temporal nature of the trajectory sequence, it can maintain high performance while achieving efficient execution across various devices. FARTrack introduces Task-Specific Self-Distillation and Inter-frame Autoregressive Sparsification, designed from the perspectives of shallow-yet-accurate distillation and redundant-to-essential token optimization, respectively. Task-Specific Self-Distillation achieves model compression by distilling task-specific tokens layer by layer, enhancing the model's inference speed while avoiding suboptimal manual teacher-student layer pairs assignments. Meanwhile, Inter-frame Autoregressive Sparsification sequentially condenses multiple templates, avoiding additional runtime overhead while learning a temporally-global optimal sparsification strategy. FARTrack demonstrates outstanding speed and competitive performance. It delivers an AO of 70.6% on GOT-10k in real-time. Beyond, our fastest model achieves a speed of 343 FPS on the GPU and 121 FPS on the CPU.", "link": "http://arxiv.org/abs/2602.03214v2", "date": "2026-03-06", "relevancy": 2.2189, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5726}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5442}, { rsification%20strategy.%20FARTrack%20demonstrates%20outstanding%20speed%20and%20competitive%20performance.%20It%20delivers%20an%20AO%20of%2070.6%25%20on%20GOT-10k%20in%20real-time.%20Beyond%2C%20our%20fastest%20model%20achieves%20a%20speed%20of%20343%20FPS%20on%20the%20GPU%20and%20121%20FPS%20on%20the%20CPU.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03214v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFARTrack%253A%2520Fast%2520Autoregressive%2520Visual%2520Tracking%2520with%2520High%2520Performance%26entry.906535625%3DGuijie%2520Wang%2520and%2520Tong%2520Lin%2520and%2520Yifan%2520Bai%2520and%2520Anjia%2520Cao%2520and%2520Shiyi%2520Liang%2520and%2520Wangbo%2520Zhao%2520and%2520Xing%2520Wei%26entry.1292438233%3DInference%2520speed%2520and%2520tracking%2520performance%2520are%2520two%2520critical%2520evaluation%2520metrics%2520in%2520the%2520field%2520of%2520visual%2520tracking.%2520However%252C%2520high-performance%2520trackers%2520often%2520suffer%2520from%2520slow%2520processing%2520speeds%252C%2520making%2520them%2520impractical%2520for%2520deployment%2520on%2520resource-constrained%2520devices.%2520To%2520alleviate%2520this%2520issue%252C%2520we%2520propose%2520FARTrack%252C%2520a%2520Fast%2520Auto-Regressive%2520Tracking%2520framework.%2520Since%2520autoregression%2520emphasizes%2520the%2520temporal%2520nature%2520of%2520the%2520trajectory%2520sequence%252C%2520it%2520can%2520maintain%2520high%2520performance%2520while%2520achieving%2520efficient%2520execution%2520across%2520various%2520devices.%2520FARTrack%2520introduces%2520Task-Specific%2520Self-Distillation%2520and%2520Inter-frame%2520Autoregressive%2520Sparsification%252C%2520designed%2520from%2520the%2520perspectives%2520of%2520shallow-yet-accurate%2520distillation%2520and%2520redundant-to-essential%2520token%2520optimization%252C%2520respectively.%2520Task-Specific%2520Self-Distillation%2520achieves%2520model%2520comp ion%20across%20various%20devices.%20FARTrack%20introduces%20Task-Specific%20Self-Distillation%20and%20Inter-frame%20Autoregressive%20Sparsification%2C%20designed%20from%20the%20perspectives%20of%20shallow-yet-accurate%20distillation%20and%20redundant-to-essential%20token%20optimization%2C%20respectively.%20Task-Specific%20Self-Distillation%20achieves%20model%20compression%20by%20distilling%20task-specific%20tokens%20layer%20by%20layer%2C%20enhancing%20the%20model%27s%20inference%20speed%20while%20avoiding%20suboptimal%20manual%20teacher-student%20layer%20pairs%20assignments.%20Meanwhile%2C%20Inter-frame%20Autoregressive%20Sparsification%20sequentially%20condenses%20multiple%20templates%2C%20avoiding%20additional%20runtime%20overhead%20while%20learning%20a%20temporally-global%20optimal%20sparsification%20strategy.%20FARTrack%20demonstrates%20outstanding%20speed%20and%20competitive%20performance.%20It%20delivers%20an%20AO%20of%2070.6%25%20on%20GOT-10k%20in%20real-time.%20Beyond%2C%20our%20fastest%20model%20achieves%20a%20speed%20of%20343%20FPS%20on%20the%20GPU%20and%20121%20FPS%20on%20the%20CPU.&entry.1838667208=http%3A//arxiv.org/abs/2602.03214v2&entry.124074799=Read"},
{"title": "A Semi-Supervised Framework for Breast Ultrasound Segmentation with Training-Free Pseudo-Label Generation and Label Refinement", "author": "Ruili Li and Jiayi Ding and Ruiyu Li and Yilun Jin and Shiwen Ge and Yuwen Zeng and Xiaoyong Zhang and Eichi Takaya and Jan Vrba and Noriyasu Homma", "abstract": "Semi-supervised learning (SSL) has emerged as a promising paradigm for breast ultrasound (BUS) image segmentation, but it often suffers from unstable pseudo labels under extremely limited annotations, leading to inaccurate supervision and degraded performance. Recent vision-language models (VLMs) provide a new opportunity for pseudo-label generation, yet their effectiveness on BUS images remains limited because domain-specific prompts are difficult to transfer.\n  To address this issue, we propose a semi-supervised framework with training-free pseudo-label generation and label refinement. By leveraging simple appearance-based descriptions (e.g., dark oval), our method enables cross-domain structural transfer between natural and medical images, allowing VLMs to generate structurally consistent pseudo labels. These pseudo labels are used to warm up a static teacher that captures global structural priors of breast lesions. Combined with an exponential moving average teacher, we further introduce uncertainty entropy weighted fusion and adaptive uncertainty-guided reverse contrastive learning to improve boundary discrimination.\n  Experiments on four BUS datasets demonstrate that our method achieves performance comparable to fully supervised models even with only 2.5% labeled data, significantly outperforming existing SSL approaches. Moreover, the proposed paradigm is readily extensible: for other imaging modalities or diseases, only a global appearance description is required to obtain reliable pseudo supervision, enabling scalable semi-supervised medical image segmentation under limited annotations.", "link": "http://arxiv.org/abs/2603.06167v1", "date": "2026-03-06", "relevancy": 2.2128, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5925}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5562}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5344}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Semi-Supervised%20Framework%20for%20Breast%20Ultrasound%20Segmentation%20with%20Training-Free%20Pseudo-Label%20Generation%20and%20Label%20Refinement&body=Title%3A%20A%20Semi-Supervised%20Framework%20for%20Breast%20Ultrasound%20Segmentation%20with%20Training-Free%20Pseudo-Label%20Generation%20and%20Label%20Refinement%0AAuthor%3A%20Ruili%20Li%20and%20Jiayi%20Ding%20and%20Ruiyu%20Li%20and%20Yilun%20Jin%20and%20Shiwen%20Ge%20and%20Yuwen%20Zeng%20and%20Xiaoyong%20Zhang%20and%20Eichi%20Takaya%20and%20Jan%20Vrba%20and%20Noriyasu%20Homma%0AAbstract%3A%20Semi-supervised%20learning%20%28SSL%29%20has%20emerged%20as%20a%20promising%20paradigm%20for%20breast%20ultrasound%20%28BUS%29%20image%20segmentation%2C%20but%20it%20often%20suffers%20from%20unstable%20pseudo%20labels%20under%20extremely%20limited%20annotations%2C%20leading%20to%20inaccurate%20supervision%20and%20degraded%20performance.%20Recent%20vision-language%20models%20%28VLMs%29%20provide%20a%20new%20opportunity%20for%20pseudo-label%20generation%2C%20yet%20their%20effectiveness%20on%20BUS%20images%20remains%20limited%20because%20domain-specific%20prompts%20are%20difficult%20to%20transfer.%0A%20%20To%20address%20this%20issue%2C%20we%20propose%20a%20semi-supervised%20framework%20with%20training-free%20pseudo-label%20generation%20and%20label%20refinement.%20By%20leveraging%20simple%20appearance-based%20descriptions%20%28e.g.%2C%20dark%20oval%29%2C%20our%20method%20enables%20cross-domain%20structural%20transfer%20between%20natural%20and%20medical%20images%2C%20allowing%20VLMs%20to%20generate%20structurally%20consistent%20pseudo%20labels.%20These%20pseudo%20labels%20are%20used%20to%20warm%20up%20a%20static%20teacher%20that%20captures%20global%20structural%20priors%20of%20breast%20lesions.%20Combined%20with%20an%20exponential%20moving%20average%20teacher%2C%20we%20further%20introduce%20uncertainty%20entropy%20weighted%20fusion%20and%20adaptive%20uncertainty-guided%20reverse%20contrastive%20learning%20to%20improve%20boundary%20discrimination.%0A%20%20Experiments%20on%20four%20BUS%20datasets%20demonstrate%20that%20our%20method%20achieves%20performance%20comparable%20to%20fully%20supervised%20models%20even%20with%20only%202.5%25%20labeled%20data%2C%20significantly%20outperforming%20existing%20SSL%20approaches.%20Moreover%2C%20the%20proposed%20paradigm%20is%20readily%20extensible%3A%20for%20other%20imaging%20modalities%20or%20diseases%2C%20only%20a%20global%20appearance%20description%20is%20required%20to%20obtain%20reliable%20pseudo%20supervision%2C%20enabling%20scalable%20semi-supervised%20medical%20image%20segmentation%20under%20limited%20annotations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06167v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Semi-Supervised%2520Framework%2520for%2520Breast%2520Ultrasound%2520Segmentation%2520with%2520Training-Free%2520Pseudo-Label%2520Generation%2520and%2520Label%2520Refinement%26entry.906535625%3DRuili%2520Li%2520and%2520Jiayi%2520Ding%2520and%2520Ruiyu%2520Li%2520and%2520Yilun%2520Jin%2520and%2520Shiwen%2520Ge%2520and%2520Yuwen%2520Zeng%2520and%2520Xiaoyong%2520Zhang%2520and%2520Eichi%2520Takaya%2520and%2520Jan%2520Vrba%2520and%2520Noriyasu%2520Homma%26entry.1292438233%3DSemi-supervised%2520learning%2520%2528SSL%2529%2520has%2520emerged%2520as%2520a%2520promising%2520paradigm%2520for%2520breast%25 {"title": "Neural Signals Generate Clinical Notes in the Wild", "author": "Jathurshan Pradeepkumar and Zheng Chen and Jimeng Sun", "abstract": "Generating clinical reports that summarize abnormal patterns, diagnostic findings, and clinical interpretations from long-term EEG recordings remains labor-intensive. We curate a large-scale clinical EEG dataset with $9{,}922$ reports paired with approximately $11{,}000$ hours of EEG recordings from $9{,}048$ patients. We therefore develop CELM, the first clinical EEG-to-Language foundation model capable of summarizing long-duration, variable-length EEG recordings and performing end-to-end clinical report generation at multiple scales, including recording description, background activity, epileptiform abnormalities, events/seizures, and impressions. Experimental results show that, with patient history supervision, our method achieves $70\\%$-$95\\%$ average relative improvements in standard generation metrics (e.g., ROUGE-1 and METEOR) from $0.2$-$0.3$ to $0.4$-$0.6$. In the zero-shot setting without patient history, CELM attains generation scores in the range of $0.43$-$0.52$, compared to baselines of $0.17$-$0.26$. CELM integrates pretrained EEG foundation models with language models to enable scalable multimodal learning. We release our model and benchmark construction pipeline at https://github.com/Jathurshan0330/CELM.", "link": "http://arxiv.org/abs/2601.22197v2", "date": "2026-03-06", "relevancy": 2.1944, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4429}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4429}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4308}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec% {"title": "Multimodal Large Language Models as Image Classifiers", "author": "Nikita Kisel and Illia Volkov and Klara Janouskova and Jiri Matas", "abstract": "Multimodal Large Language Models (MLLM) classification performance depends critically on evaluation protocol and ground truth quality. Studies comparing MLLMs with supervised and vision-language models report conflicting conclusions, and we show these conflicts stem from protocols that either inflate or underestimate performance. Across the most common evaluation protocols, we identify and fix key issues: model outputs that fall outside the provided class list and are discarded, inflated results from weak multiple-choice distractors, and an open-world setting that underperforms only due to poor output mapping. We additionally quantify the impact of commonly overlooked design choices - batch size, image ordering, and text encoder selection - showing they substantially affect accuracy. Evaluating on ReGT, our multilabel reannotation of 625 ImageNet-1k classes, reveals that MLLMs benefit most from corrected labels (up to +10.8%), substantially narrowing the perceived gap with supervised models. Much of the reported MLLMs underperformance on classification is thus an artifact of noisy ground truth and flawed evaluation protocol rather than genuine model deficiency. Models less reliant on supervised training signals prove most sensitive to annotation quality. Finally, we show that MLLMs can assist human annotators: in a controlled case study, annotators confirmed or integrated MLLMs predictions in approximately 50% of difficult cases, demonstrating their potential for large-scale dataset curation.", "link": "http://arxiv.org/abs/2603.06578v1", "date": "2026-03-06", "relevancy": 2.1926, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.562}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5415}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Large%20Language%20Models%20as%20Image%20Classifiers&body=Title%3A%20Multimodal%20Large%20Language%20Models%20as%20Image%20Classifiers%0AAuthor%3A%20Nikita%20Kisel%20and%20Illia%20Volkov%20and%20Klara%20Janouskova%20and%20Jiri%20Matas%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLM%29%20classification%20performance%20depends%20critically%20on%20evaluation%20protocol%20and%20ground%20truth%20quality.%20Studies%20comparing%20MLLMs%20with%20supervised%20and%20vision-language%20models%20report%20conflicting%20conclusions%2C%20and%20we%20show%20these%20conflicts%20stem%20from%20protocols%20that%20either%20inflate%20or%20underestimate%20performance.%20Across%20the%20most%20common%20evaluation%20protocols%2C%20we%20identify%20and%20fix%20key%20issues%3A%20model%20outputs%20that%20fall%20outside%20the%20provided%20class%20list%20and%20are%20discarded%2C%20inflated%20results%20from%20weak%20multiple-choice%20distractors%2C%20and%20an%20open-world%20setting%20that%20underperforms%20only%20due%20to%20poor%20output%20mapping.%20We%20additionally%20quantify%20the%20impact%20of%20commonly%20overlooked%20design%20choices%20-%20batch%20size%2C%20image%20ordering%2C%20and%20text%20encoder%20selection%20-%20showing%20they%20substantially%20affect%20accuracy.%20Evaluating%20on%20ReGT%2C%20our%20multilabel%20reannotation%20of%20625%20ImageNet-1k%20classes%2C%20reveals%20that%20MLLMs%20benefit%20most%20from%20corrected%20labels%20%28up%20to%20%2B10.8%25%29%2C%20substantially%20narrowing%20the%20perceived%20gap%20with%20supervised%20models.%20Much%20of%20the%20reported%20MLLMs%20underperformance%20on%20classification%20is%20thus%20an%20artifac {"title": "SPoT: Subpixel Placement of Tokens in Vision Transformers", "author": "Martine Hjelkrem-Tan and Marius Aasan and Gabriel Y. Arteaga and Ad\u00edn Ram\u00edrez Rivera", "abstract": "Vision Transformers naturally accommodate sparsity, yet standard tokenization methods confine features to discrete patch grids. This constraint prevents models from fully exploiting sparse regimes, forcing awkward compromises. We propose Subpixel Placement of Tokens (SPoT), a novel tokenization strategy that positions tokens continuously within images, effectively sidestepping grid-based limitations. With our proposed oracle-guided search, we uncover substantial performance gains achievable with ideal subpixel token positioning, drastically reducing the number of tokens necessary for accurate predictions during inference. SPoT provides a new direction for flexible, efficient, and interpretable ViT architectures, redefining sparsity as a strategic advantage rather than an imposed limitation.", "link": "http://arxiv.org/abs/2507.01654v2", "date": "2026-03-06", "relevancy": 2.1875, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.603}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5083}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5062}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPoT%3A%20Subpixel%20Placement%20of%20Tokens%20in%20Vision%20Transformers&body=Title%3A%20SPoT%3A%20Subpixel%20Placement%20of%20Tokens%20in%20Vision%20Transformers%0AAuthor%3A%20Martine%20Hjelkrem-Tan%20and%20Marius%20Aasan%20and%20Gabriel%20Y.%20Arteaga%20and%20Ad%C3%ADn%20Ram%C3%ADrez%20Rivera%0AAbstract%3A%20Vision%20Transformers%20naturally%20accommodate%20sparsity%2C%20yet%20standard%20tokenization%20methods%20confine%20features%20to%20discrete%20patch%20grids.%20This%20constraint%20prevents%20models%20from%20fully%20exploiting%20sparse%20regimes%2C%20forcing%20awkward%20compromises.%20We%20propose%20Subpixel%20Placement%20of%20Tokens%20%28SPoT%29%2C%20a%20novel%20tokenization%20strategy%20that%20positions%20tokens%20continuously%20within%20images%2C%20effectively%20sidestepping%20grid-based%20limitations.%20With%20our%20proposed%20oracle-guided%20search%2C%20we%20uncover%20substantial%20performance%20gains%20achievable%20with%20ideal%20subpixel%20token%20positioning%2C%20drastically%20reducing%20the%20number%20of%20tokens%20necessary%20for%20accurate%20predictions%20during%20inference.%20SPoT%20provides%20a%20new%20direction%20for%20flexible%2C%20efficient%2C%20and%20interpretable%20ViT%20architectures%2C%20redefining%20sparsity%20as%20a%20strategic%20advantage%20rather%20than%20an%20imposed%20limitation.%0ALink%3A%20http%3A//arxiv.org/abs/2507.01654v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPoT%253A%2520Subpixel%2520Placement%2520of%2520Tokens%2520in%2520Vision%2520Transformers%26entry.906535625%3DMartine%2520Hjelkrem-Tan%2520and%2520Marius%2520Aasan%2520and%2520Gabriel%2520Y.%2520Arteaga%2520and%2520Ad%25C3%25ADn%2520Ram%25C3%25ADrez%2520Rivera%26entry.1292438233%3DVision%2520Transformers%2520naturally%2520accommodate%2520sparsity%252C%2520yet%2520standard%2520tokenization%2520methods%2520confine%2520features%2520to%2520discrete%2520patch%2520grids.%2520This%2520constraint%2520prevents%2520models%2520from%2520fully%2520exploiting%2520sparse%2520regimes%252C%2520forcing%2520awkward%2520compromises.%2520We%2520propose%2520Subpixel%2520Placement%2520of%2520Tokens%2520%2528SPoT%2529%252C%2520a%2520novel%2520tokenization%2520strategy%2520that%2520positions%2520tokens%2520continuously%2520within%2520images%252C%2520effectively {"title": "Low-latency Event-based Object Detection with Spatially-Sparse Linear Attention", "author": "Haiqing Hao and Zhipeng Sui and Rong Zou and Zijia Dai and Nikola Zubi\u0107 and Davide Scaramuzza and Wenhui Wang", "abstract": "Event cameras provide sequential visual data with spatial sparsity and high temporal resolution, making them attractive for low-latency object detection. Existing asynchronous event-based neural networks realize this low-latency advantage by updating predictions event-by-event, but still suffer from two bottlenecks: recurrent architectures are difficult to train efficiently on long sequences, and improving accuracy often increases per-event computation and latency. Linear attention is appealing in this setting because it supports parallel training and recurrent inference. However, standard linear attention updates a global state for every event, yielding a poor accuracy-efficiency trade-off, which is problematic for object detection, where fine-grained representations and thus states are preferred. The key challenge is therefore to introduce sparse state activation that exploits event sparsity while preserving efficient parallel training. We propose Spatially-Sparse Linear Attention (SSLA), which introduces a mixture-of-spaces state decomposition and a scatter-compute-gather training procedure, enabling state-level sparsity as well as training parallelism. Built on SSLA, we develop an end-to-end asynchronous linear attention model, SSLA-Det, for event-based object detection. On Gen1 and N-Caltech101, SSLA-Det achieves state-of-the-art accuracy among asynchronous methods, reaching 0.375 mAP and 0.515 mAP, respectively, while reducing per-event computation by more than 20 times compared to the strongest prior asynchronous baseline, demonstrating the potential of linear attention for low-latency event-based vision.", "link": "http://arxiv.org/abs/2603.06228v1", "date": "2026-03-06", "relevancy": 2.1867, "topK": [{"title": "Weakly-guided se

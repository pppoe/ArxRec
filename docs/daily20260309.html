{"title": "Making Implicit Premises Explicit in Logical Understanding of Enthymemes", "author": "Xuyao Feng and Anthony Hunter", "abstract": "Real-world arguments in text and dialogues are normally enthymemes (i.e. some of their premises and/or claims are implicit). Natural language processing (NLP) methods for handling enthymemes can potentially identify enthymemes in text but they do not decode their underlying logic, whereas logic-based approaches for handling them assume a knowledgebase with sufficient formulae that can be used to decode them via abduction. There is therefore a lack of a systematic method for translating textual components of an enthymeme into a logical argument and generating the logical formulae required for their decoding, and thereby showing logical entailment. To address this, we propose a pipeline that integrates: (1) a large language model (LLM) to generate intermediate implicit premises based on the explicit premise and claim; (2) another LLM to translate the natural language into logical formulas; and (3) a neuro-symbolic reasoner based on a SAT solver to determine entailment. We evaluate our pipeline on two enthymeme datasets, demonstrating promising performance in selecting the correct implicit premise, as measured by precision, recall, F1-score, and accuracy.", "link": "http://arxiv.org/abs/2603.06114v1", "date": "2026-03-06", "relevancy": 2.3988, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.495}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.495}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4493}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Making%20Implicit%20Premises%20Explicit%20in%20Logical%20Understanding%20of%20Enthymemes&body=Title%3A%20Making%20Implicit%20Premises%20Explicit%20in%20Logical%20Understanding%20of%20Enthymemes%0AAuthor%3A%20Xuyao%20Feng%20and%20Anthony%20Hunter%0AAbstract%3A%20Real-world%20arguments%20in%20text%20and%20dialogues%20are%20normally%20enthymemes%20%28i.e.%20some%20of%20their%20premises%20and/or%20claims%20are%20implicit%29.%20Natural%20language%20processing%20%28NLP%29%20methods%20for%20handling%20enthymemes%20can%20potentially%20identify%20enthymemes%20in%20text%20but%20they%20do%20not%20decode%20their%20underlying%20logic%2C%20whereas%20logic-based%20approaches%20for%20handling%20them%20assume%20a%20knowledgebase%20with%20sufficient%20formulae%20that%20can%20be%20used%20to%20decode%20them%20via%20abduction.%20There%20is%20therefore%20a%20lack%20of%20a%20systematic%20method%20for%20translating%20textual%20components%20of%20an%20enthymeme%20into%20a%20logical%20argument%20and%20generating%20the%20logical%20formulae%20required%20for%20their%20decoding%2C%20and%20thereby%20showing%20logical%20entailment.%20To%20address%20this%2C%20we%20propose%20a%20pipeline%20that%20integrates%3A%20%281%29%20a%20large%20language%20model%20%28LLM%29%20to%20generate%20intermediate%20implicit%20premises%20based%20on%20the%20explicit%20premise%20and%20claim%3B%20%282%29%20another%20LLM%20to%20translate%20the%20natural%20language%20into%20logical%20formulas%3B%20and%20%283%29%20a%20neuro-symbolic%20reasoner%20based%20on%20a%20SAT%20solver%20to%20determine%20entailment.%20We%20evaluate%20our%20pipeline%20on%20two%20enthymeme%20datasets%2C%20demonstrating%20promising%20performance%20in%20selecting%20the%20correct%20implicit%20premise%2C%20as%20measured%20by%20precision%2C%20recall%2C%20F1-score%2C%20and%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1 {"title": "Looking Through Glass Box", "author": "Alexis Kafantaris", "abstract": "This essay is about a neural implementation of the fuzzy cognitive map, the FHM, and corresponding evaluations. Firstly, a neural net has been designed to behave the same way that an FCM does; as inputs it accepts many fuzzy cognitive maps and propagates them in order to learn causality patterns. Moreover, the network uses langevin differential Dynamics, which avoid overfit, to inverse solve the output node values according to some policy. Nevertheless, having obtained an inverse solution provides the user a modification criterion. Having the modification criterion suggests that information is now according to discretion as a different service or product is a better fit. Lastly, evaluation has been done on several data sets in order to examine the networks performance.", "link": "http://arxiv.org/abs/2603.06272v1", "date": "2026-03-06", "relevancy": 2.3934, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4814}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4782}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Looking%20Through%20Glass%20Box&body=Title%3A%20Looking%20Through%20Glass%20Box%0AAuthor%3A%20Alexis%20Kafantaris%0AAbstract%3A%20This%20essay%20is%20about%20a%20neural%20implementation%20of%20the%20fuzzy%20cognitive%20map%2C%20the%20FHM%2C%20and%20corresponding%20evaluations.%20Firstly%2C%20a%20neural%20net%20has%20been%20designed%20to%20behave%20the%20same%20way%20that%20an%20FCM%20do 0criterion%2520suggests%2520that%2520information%2520is%2520now%2520according%2520to%2520discretion%2520as%2520a%2520different%2520service%2520or%2520product%2520is%2520a%2520better%2520fit.%2520Lastly%252C%2520evaluation%2520has%2520been%2520done%2520on%2520several%2520data%2520sets%2520in%2520order%2520to%2520examine%2520the%2520networks%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06272v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Looking%20Through%20Glass%20Box&entry.906535625=Alexis%20Kafantaris&entry.1292438233=This%20essay%20is%20about%20a%20neural%20implementation%20of%20the%20fuzzy%20cognitive%20map%2C%20the%20FHM%2C%20and%20corresponding%20evaluations.%20Firstly%2C%20a%20neural%20net%20has%20been%20designed%20to%20behave%20the%20same%20way%20that%20an%20FCM%20does%3B%20as%20inputs%20it%20accepts%20many%20fuzzy%20cognitive%20maps%20and%20propagates%20them%20in%20order%20to%20learn%20causality%20patterns.%20Moreover%2C%20the%20network%20uses%20langevin%20differential%20Dynamics%2C%20which%20avoid%20overfit%2C%20to%20inverse%20solve%20the%20output%20node%20values%20according%20to%20some%20policy.%20Nevertheless%2C%20having%20obtained%20an%20inverse%20solution%20provides%20the%20user%20a%20modification%20criterion.%20Having%20the%20modification%20criterion%20suggests%20that%20information%20is%20now%20according%20to%20discretion%20as%20a%20different%20service%20or%20product%20is%20a%20better%20fit.%20Lastly%2C%20evaluation%20has%20been%20done%20on%20several%20data%20sets%20in%20order%20to%20examine%20the%20networks%20performance.&entry.1838667208=http%3A//arxiv.org/abs/2603.06272v1&entry.124074799=Read"},
{"title": "COLD-Steer: Steering Large Language Models via In-Context One-step Learning Dynamics", "author": "Kartik Sharma and Rakshit S. Trivedi", "abstract": "Activation steering methods enable inference-time control of large language model (LLM) behavior without retraining, but current approaches face a fundamental trade-off: sample-efficient methods suboptimally capture steering signals from labeled examples, while methods that better extract these signals require hundreds to thousands of examples. We introduce COLD-Steer, a training-free framework that steers LLM activations by approximating the representational changes that would result from gradient descent on in-context examples. Our key insight is that the effect of fine-tuning on a small set of examples can be efficiently approximated at inference time without actual parameter updates. We formalize this through two complementary approaches: (i) a unit kernel approximation method that updates the activations directly using gradients with respect to them, normalized across examples, and (ii) a finite-difference approximation requiring only two forward passes regardless of example count. Experiments across a variety of steering tasks and benchmarks demonstrate that COLD-Steer achieves upto 95% steering effectiveness while using 50 times fewer samples compared to the best baseline. COLD-Steer facilitates accommodating diverse perspectives without extensive demonstration data, which we validate through our experiments on pluralistic alignment tasks. Our framework opens new possibilities for adaptive, context-aware model control that can flexibly address varying loss-driven human preferences through principled approximation of learning dynamics rather than specialized training procedures.", "link": "http://arxiv.org/abs/2603.06495v1", "date": "2026-03-06", "relevancy": 2.3919, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "simila {"title": "3D CBCT Artefact Removal Using Perpendicular Score-Based Diffusion Models", "author": "Susanne Schaub and Florentin Bieder and Matheus L. Oliveira and Yulan Wang and Dorothea Dagassan-Berndt and Michael M. Bornstein and Philippe C. Cattin", "abstract": "Cone-beam computed tomography (CBCT) is a widely used 3D imaging technique in dentistry, offering high-resolution images while minimising radiation exposure for patients. However, CBCT is highly susceptible to artefacts arising from high-density objects such as dental implants, which can compromise image quality and diagnostic accuracy. To reduce artefacts, implant inpainting in the sequence of projections plays a crucial role in many artefact reduction approaches. Recently, diffusion models have achieved state-of-the-art results in image generation and have widely been applied to image inpainting tasks. However, to our knowledge, existing diffusion-based methods for implant inpainting operate on independent 2D projections. This approach neglects the correlations among individual projections, resulting in inconsistencies in the reconstructed images. To address this, we propose a 3D dental implant inpainting approach based on perpendicular score-based diffusion models, each trained in two different planes and operating in the projection domain. The 3D distribution of the projection series is modelled by combining the two 2D score-based diffusion models in the sampling scheme. Our results demonstrate the method's effectiveness in producing high-quality, artefact-reduced 3D CBCT images, making it a promising solution for improving clinical imaging.", "link": "http://arxiv.org/abs/2603.06300v1", "date": "2026-03-06", "relevancy": 2.3877, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.61}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.61}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5315}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D%20CBCT%20Artefact%20Removal%20Using%20Perpendicular%20Score-Based%20Diffusion%20Models&body=Title%3A%203D%20CBCT%20Artefact%20Removal%20Using%20Perpendicular%20Score-Based%20Diffusion%20Models%0AAuthor%3A%20Susanne%20Schaub%20and%20Florentin%20Bieder%20and%20Matheus%20L.%20Oliveira%20and%20Yulan%20Wang%20and%20Dorothea%20Dagassan-Berndt%20and%20Michael%20M.%20Bornstein%20and%20Philippe%20C.%20Cattin%0AAbstract%3A%20Cone-beam%20computed%20tomography%20%28CBCT%29%20is%20a%20widely%20used%203D%20imaging%20technique%20in%20dentistry%2C%20offering%20high-resolution%20images%20while%20minimising%20radiation%20exposure%20for%20patients.%20However%2C%20CBCT%20is%20highly%20susceptible%20to%20artefacts%20arising%20from%20high-density%20objects%20such%20as%20dental%20implants%2C%20which%20can%20compromise%20image%20quality%20and%20diagnostic%20accuracy.%20To%20reduce%20artefacts%2C%20implant%20inpainting%20in%20the%20sequence%20of%20projections%20plays%20a%20crucial%20role%20in%20many%20artefact%20reduction%20approaches.%20Recently%2C%20diffusion%20models%20have%20achieved%20state-of-the-art%20results%20in%20image%20generation%20and%20have%20widely%20been%20applied%20to%20image%20inpainting%20tasks.%20However%2C%20to%20our%20knowledge%2C%20existing%20diffusion-based%20methods%20for%20implant%20inpainting%20operate%20on%20independent%202D%20projections.%20This%20approach%20neglects%20the%20correlations%20among%20individual%20projections%2C%20resulting%20in%20inconsistencies%20in%20the%20reconstructed%20images.%20To%20address%20this%2C%20we%20propose%20a%203D%20dental%20implant%20inpainting%20approach%20based%20on%20perpendicular%20score-based%20diffusion%20models%2C%20each%20trained%20in%20two%20different%20planes%20and%20operating%20in%20the% {"title": "Towards Scalable Pre-training of Visual Tokenizers for Generation", "author": "Jingfeng Yao and Yuda Song and Yucong Zhou and Xinggang Wang", "abstract": "The quality of the latent space in visual tokenizers (e.g., VAEs) is crucial for modern generative models. However, the standard reconstruction-based training paradigm produces a latent space that is biased towards low-level information, leading to a foundation flaw: better pixel-level accuracy does not lead to higher-quality generation. This implies that pouring extensive compute into visual tokenizer pre-training translates poorly to improved performance in generation. We identify this as the ``pre-training scaling problem`` and suggest a necessary shift: to be effective for generation, a latent space must concisely represent high-level semantics. We present VTP, a unified visual tokenizer pre-training framework, pioneering the joint optimization of image-text contrastive, self-supervised, and reconstruction losses. Our large-scale study reveals two principal findings: (1) understanding is a key driver of generation, and (2) much better scaling properties, where generative performance scales effectively with compute, parameters, and data allocated to the pretraining of the visual tokenizer. After large-scale pre-training, our tokenizer delivers a competitive profile (78.2 zero-shot accuracy and 0.36 rFID on ImageNet) and 4.1 times faster convergence on generation compared to advanced distillation methods. More importantly, it scales effectively: without modifying standard DiT training specs, solely investing more FLOPS in pretraining VTP achieves 65.8\\% FID improvement in downstream generation, while conventional autoencoder stagnates very early at 1/10 FLOPS. Our pre-trained models are available at https://github.com/MiniMax-AI/VTP.", "link": "http://arxiv.org/abs/2512.13687v2", "date": "2026-03-06", "relevancy": 2.3728, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6172}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.616}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Scalable%20Pre-training%20of%20Visual%20Tokenizers%20for%20Generation&body=Title%3A%20Towards%20Scalable%20Pre-training%20of%20Visual%20Tokenizers%20for%20Generation%0AAuthor%3A%20Jingfeng%20Yao%20and%20Yuda%20Song%20and%20Yucong%20Zhou%20and%20Xinggang%20Wang%0AAbstract%3A%20The%20quality%20of%20the%20latent%20space%20in%20visual%20tokenizers%20%28e.g.%2C%20VAEs%29%20is%20crucial%20for%20modern%20generative%20models.%20However%2C%20the%20standard%20reconstruction-based%20training%20paradigm%20produces%20a%20latent%20space%20that%20is%20biased%20towards%20low-level%20information%2C%20leading%20to%20a%20foundation%20flaw%3A%20better%20pixel-level%20accuracy%20does%20not%20lead%20to%20higher-quality%20generation.%20This%20implies%20that%20pouring%20extensive%20compute%20into%20visual%20tokenizer%20pre-training%20translates%20poorly%20to%20improved%20performance%20in%20generation.%20We%20identify%20this%20as%20the%20%60%60pre-training%20scaling%20problem%60%60%20and%20suggest%20a%20necessary%20shift%3A%20to%20be%20effective%20for%20generation%2C%20a%20latent%20space%20must%20concisely%20represent%20high-level%20semantics.%20We%20present%20VTP%2C%20a%20unified%20visual%20tokenizer%20pre-training%20framework%2C%20pioneering%20the%20joint%20optimization%20of%20image-text%20contrastive%2C%20self-supervised%2C%20and%20reconstruction%20losses.%20Our%20large-scale%20study%20reveals%20two%20principal%20findings%3A%20%281%29%20understanding%20is%20a%20key%20driver%20of%20generation%2C%20and%20%282%29%20much%20better%20scaling%20properties%2C%20where%20generative%20performance%20scales%20effectively%20with%20compute%2C%20parameters%2C%20and%20data%20allocated%20to%20the%20pretraining%20of%20the%20visual%20tokenizer.%20After%20large-scale%20pre-training%2C%20our%20tokenizer%20delivers%20a%20competitive%20profile%20%2878.2%20zero-shot%20accuracy%20and%200.36%20rFID%20on%20ImageNet%29%20and%204.1%20times%20faster%20convergence%20on%20generation%20compared%20to%20advanced%20distillation%20methods.%20More%20importantly%2C%20it%20scales%20effectively%3A%20without%20modifying%20standard%20DiT%20training%20specs%2C%20solely%20investing%20more%20FLOPS%20in%20pretraining%20VTP%20achieves%2065.8%5C%25%20FID%20improvement%20in%20downstream%20generation%2C%20while%20conventional%20autoencoder%20stagnates%20very%20early%20at%201/10%20FLOPS.%20Our%20pre-trained%20models%20are%20available%20at%20https%3A//github.com/MiniMax-AI/VTP.%0ALink%3A%20http%3A//arxiv.org/abs/2512.13687v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Scalable%2520Pre-training%2520of%2520Visual%2520Tokenizers%2520for%2520Generation%26entry.906535625%3DJingfeng%2520Yao%2520and%2520Yuda%2520Song%2520and%2520Yucong%2520Zhou%2520and%2520Xinggang%2520Wang%26entry.1292438233%3DThe%2520quality%2520of%2520the%2520latent%2520space%2520in%2520visual%2520tokenizers%2520%2528e.g.%252C%2520VAEs%2529%2520is%2520crucial%2520for%2520modern%2520generative%2520models.%2520However%252C%2520the%2520standard%2520reconstruction-based%2520training%2520paradigm%2520produces%2520a%2520latent%2520space%2520that%2520is%2520biased%2520towards%2520low-level%2520information%252C%2520leading%2520to%2520a%2520foundation%2520flaw%253A%2520better%2520pixel-level%2520accuracy%2520does%2520not%2520lead%2520to%2520higher-quality%2520generation.%2520This%2520implies%2520that%2520pouring%2520extensive%2520compute%2520into%2520visual%2520tokenizer%2520pre-training%2520transl {"title": "Simulating Meaning, Nevermore! Introducing ICR: A Semiotic-Hermeneutic Metric for Evaluating Meaning in LLM Text Summaries", "author": "Natalie Perez and Sreyoshi Bhaduri and Aman Chadha", "abstract": "Meaning in human language is relational, context dependent, and emergent, arising from dynamic systems of signs rather than fixed word-concept mappings. In computational settings, this semiotic and interpretive complexity complicates the generation and evaluation of meaning. This article proposes an interdisciplinary framework for studying meaning in large language model (LLM) generated language by integrating semiotics and hermeneutics with qualitative research methods. We review prior scholarship on meaning and machines, examining how linguistic signs are transformed into vectorized representations in static and contextualized embedding models, and identify gaps between statistical approximation and human interpretive meaning. We then introduce the Inductive Conceptual Rating (ICR) metric, a qualitative evaluation approach grounded in inductive content analysis and reflexive thematic analysis, designed to assess semantic accuracy and meaning alignment in LLM-outputs beyond lexical similarity metrics. We apply ICR in an empirical comparison of LLM generated and human generated thematic summaries across five datasets (N = 50 to 800). While LLMs achieve high linguistic similarity, they underperform on semantic accuracy, particularly in capturing contextually grounded meanings. Performance improves with larger datasets but remains variable across models, potentially reflecting differences in the frequency and coherence of recurring concepts and meanings. We conclude by arguing for evaluation frameworks that leverage systematic qualitative interpretation practices when assessing meaning in LLM-generated outputs from reference texts.", "link": "http://arxiv.org/abs/2603.04413v2", "date": "2026-03-06", "relevancy": 2.3708, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4906}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4906}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4413}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Simulating%20Meaning%2C%20Nevermore%21%20Introducing%20ICR%3A%20A%20Semiotic-Hermeneutic%20Metric%20for%20Evaluating%20Meaning%20in%20LLM%20Text%20Summaries&body=Title%3A%20Simulating%20Meaning%2C%20Nevermore%21%20Introducing%20ICR%3A%20A%20Semiotic-Hermeneutic%20Metric%20for%20Evaluating%20Meaning%20in%20LLM%20Text%20Summaries%0AAuthor%3A%20Natalie%20Perez%20and%20Sreyoshi%20Bhaduri%20and%20Aman%20Chadha%0AAbstract%3A%20Meaning%20in%20human%20language%20is%20relational%2C%20context%20dependent%2C%20and%20emergent%2C%20arising%20from%20dynamic%20systems%20of%20signs%20rather%20than%20fixed%20word-concept%20mappings.%20In%20computational%20settings%2C%20this%20semiotic%20and%20interpretive%20complexity%20complicates%20the%20generation%20and%20evaluation%20of%20meaning.%20This%20article%20proposes%20an%20interdisciplinary%20framework%20for%20studying%20meaning%20in%20large%20language%20model%20%28LLM%29%20generated%20language%20by%20integrating%20semiotics%20and%20hermeneutics%20with%20qualitative%20research%20methods.%20We%20review%20prior%20scholarship%20on%20meaning%20and%20machines%2C%20examining%20how%20linguistic%20signs%20are%20transformed%20into%20vectorized%20representations%20in%20static%20and%20contextualized%20embedding%20models%2C%20and%20identify%20gaps%20between%20statistical%20approximation%20and%20human%20interpretive%20meaning.%20We%20then%20introduce%20the%20Inductive%20Conceptual%20Rating%20%28ICR%29%20metric%2C%20a%20qualitative%20evaluation%20approach%20grounded%20in%20inductive%20content%20analysis%20and%20reflexive%20thematic%20analysis%2C%20designed%20to%20assess%20semantic%20accuracy%20and%20meaning%20alignment%20in%20LLM-outputs%20beyond%20lexical%20similarity%20metrics.%20We%20apply%20ICR%20in%20an%20empirical%20comparison%20of%20LLM%20generated%20and%20human%20generated%20thematic%20summaries%20across%20five%20datasets%20%28N%20%3D%2050%20to%20800%29.%20While%20LLMs%20achieve%20high%20linguistic%20similarity%2C%20they%20underperform%20on%20semantic%20accuracy%2C%20particularly%20in%20capturing%20contextually%20grounded%20meanings.%20Performance%20improves%20with%20larger%20datasets%20but%20remains%20variable%20across%20models%2C%20potentially%20reflecting%20differences%20in%20the%20frequency%20and%20coherence%20of%20recurring%20concepts%20and%20meanings.%20We%20conclude%20by%20arguing%20for%20evaluation%20frameworks%20that%20leverage%20systematic%20qualitative%20interpretation%20practices%20when%20assessing%20meaning%20in%20LLM-generated%20outputs%20from%20reference%20texts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04413v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSimulating%2520Meaning%252C%2520Nevermore%2521%2520Introducing%2520ICR%253A%2520A%2520Semiotic-Hermeneutic%2520Metric%2520for%2520Evaluating%2520Meaning%2520in%2520LLM%2520Text%2520Summaries%26entry.906535625%3DNatalie%2520Perez%2520and%2520Sreyoshi%2520Bhaduri%2520and%2520Aman%2520Chadha%26entry.1292438233%3DMeaning%2520in%2520human%2520language%2520is%2520relational%252C%2520context%2520dependent%252C%2520and%2520emergent%252C%2520arising%2520from%2520dynamic%2520systems%2520of%2520signs%2520rather%2520than%2520fixed%2520word-concept%2520mappings.%2520In%2520computational%2520settings%252C%2520this%2520semiotic%2520and%2520interpretive%2520complexity%2520complicates%2520the%2520generation%2520and%2520evaluation%2520of%2520meaning.%2520This%2520art {"title": "Automated Coding of Communication Data Using ChatGPT: Consistency Across Subgroups", "author": "Jiangang Hao and Wenju Cui and Patrick Kyllonen and Emily Kerzabi", "abstract": "Assessing communication and collaboration at scale depends on a labor intensive task of coding communication data into categories according to different frameworks. Prior research has established that ChatGPT can be directly instructed with coding rubrics to code the communication data and achieves accuracy comparable to human raters. However, whether the coding from ChatGPT or similar AI technology perform consistently across different demographic groups, such as gender and race, remains unclear. To address this gap, we introduce three checks for evaluating subgroup consistency in LLM-based coding by adapting an existing framework from the automated scoring literature. Using a typical collaborative problem-solving coding framework and data from three types of collaborative tasks, we examine ChatGPT-based coding performance across gender and racial/ethnic groups. Our results show that ChatGPT-based coding perform consistently in the same way as human raters across gender or racial/ethnic groups, demonstrating the possibility of its use in large-scale assessments of collaboration and communication.", "link": "http://arxiv.org/abs/2510.20584v2", "date": "2026-03-06", "relevancy": 2.3552, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5242}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4522}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4366}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automated%20Coding%20of%20Communication%20Data%20Using%20ChatGPT%3A%20Consistency%20Across%20Subgroups&body=Title%3A%20Automated%20Coding%20of%20Communication%20Data%20Using%20ChatGPT%3A%20Consistency%20Across%20Subgroups%0AAuthor%3A%20Jiangang%20Hao%20and%20Wenju%20Cui%20and%20Patrick%20Kyllonen%20and%20Emily%20Kerzabi%0AAbstract%3A%20Assessing%20communication%20and%20collaboration%20at%20scale%20depends%20on%20a%20labor%20intensive%20task%20of%20coding%20communication%20data%20into%20categories%20according%20to%20different%20frameworks.%20Prior%20research%20has%20established%20that%20ChatGPT%20can%20be%20directly%20instructed%20with%20coding%20rubrics%20to%20code%20the%20communication%20data%20and%20achieves%20accuracy%20comparable%20to%20human%20raters.%20However%2C%20whether%20the%20coding%20from%20ChatGPT%20or%20similar%20AI%20technology%20perform%20consistently%20across%20different%20demographic%20groups%2C%20such%20as%20gender%20and%20race%2C%20remains%20unclear.%20To%20address%20this%20gap%2C%20we%20introduce%20three%20checks%20for%20evaluating%20subgroup%20consistency%20in%20LLM-based%20coding%20by%20adapting%20an%20existing%20framework%20from%20the%20automated%20scoring%20literature.%20Using%20a%20typical%20collaborative%20problem-solving%20coding%20framework%20and%20data%20from%20three%20types%20of%20collaborative%20tasks%2C%20we%20examine%20ChatGPT-based%20coding%20performance%20across%20gender%20and%20racial/ethnic%20groups.%20Our%20results%20show%20that%20ChatGPT-based%20coding%20perform%20consistently%20in%20the%20same%20way%20as%20human%20raters%20across%20gender%20or%20racial/ethnic%20groups%2C%20demonstrating%20the%20possibility%20of%20its%20use%20in%20large-scale%20assessments%20of%20collaboration%20and%20communication.%0ALink%3A%20http%3A//arxiv.org/abs/2510.20584v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomated%2520Coding%2520of%2520Communication%2520Data%2520Using%2520ChatGPT%253A%2520Consistency%2520Across%2520Subg {"title": "Accelerating Scientific Research with Gemini: Case Studies and Common Techniques", "author": "David P. Woodruff and Vincent Cohen-Addad and Lalit Jain and Jieming Mao and Song Zuo and MohammadHossein Bateni and Simina Branzei and Michael P. Brenner and Lin Chen and Ying Feng and Lance Fortnow and Gang Fu and Ziyi Guan and Zahra Hadizadeh and Mohammad T. Hajiaghayi and Mahdi JafariRaviz and Adel Javanmard and Karthik C. S. and Ken-ichi Kawarabayashi and Ravi Kumar and Silvio Lattanzi and Euiwoong Lee and Yi Li and Ioannis Panageas and Dimitris Paparas and Benjamin Przybocki and Bernardo Subercaseaux and Ola Svensson and Shayan Taherijam and Xuan Wu and Eylon Yogev and Morteza Zadimoghaddam and Samson Zhou and Yossi Matias and James Manyika and Vahab Mirrokni", "abstract": "Recent advances in large language models (LLMs) have opened new avenues for accelerating scientific research. While models are increasingly capable of assisting with routine tasks, their ability to contribute to novel, expert-level mathematical discovery is less understood. We present a collection of case studies demonstrating how researchers have successfully collaborated with advanced AI models, specifically Google's Gemini-based models (in particular Gemini Deep Think and its advanced variants), to solve open problems, refute conjectures, and generate new proofs across diverse areas in theoretical computer science, as well as other areas such as economics, optimization, and physics. Based on these experiences, we extract common techniques for effective human-AI collaboration in theoretical research, such as iterative refinement, problem decomposition, and cross-disciplinary knowledge transfer. While the majority of our results stem from this interactive, conversational methodology, we also highlight specific instances that push beyond standard chat interfaces. These include deploying the model as a rigorous adversarial reviewer to detect subtle flaws in existing proofs, and embedding {"title": "PepEDiff: Zero-Shot Peptide Binder Design via Protein Embedding Diffusion", "author": "Po-Yu Liang and Tibo Duran and Jun Bai", "abstract": "We present PepEDiff, a novel peptide binder generator that designs binding sequences given a target receptor protein sequence and its pocket residues. Peptide binder generation is critical in therapeutic and biochemical applications, yet many existing methods rely heavily on intermediate structure prediction, adding complexity and limiting sequence diversity. Our approach departs from this paradigm by generating binder sequences directly in a continuous latent space derived from a pretrained protein embedding model, without relying on predicted structures, thereby improving structural and sequence diversity. To encourage the model to capture binding-relevant features rather than memorizing known sequences, we perform latent-space exploration and diffusion-based sampling, enabling the generation of peptides beyond the limited distribution of known binders. This zero-shot generative strategy leverages the global protein embedding manifold as a semantic prior, allowing the model to propose novel peptide sequences in previously unseen regions of the protein space. We evaluate PepEDiff on TIGIT, a challenging target with a large, flat protein-protein interaction interface that lacks a druggable pocket. Despite its simplicity, our method outperforms state-of-the-art approaches across benchmark tests and in the TIGIT case study, demonstrating its potential as a general, structure-free framework for zero-shot peptide binder design. The code for this research is available at GitHub: https://github.com/LabJunBMI/PepEDiff-An-Peptide-binder-Embedding-Diffusion-Model", "link": "http://arxiv.org/abs/2601.13327v2", "date": "2026-03-06", "relevancy": 2.3402, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4698}, {"title": "Synthesizing Moving Peo {"title": "Towards Motion Turing Test: Evaluating Human-Likeness in Humanoid Robots", "author": "Mingzhe Li and Mengyin Liu and Zekai Wu and Xincheng Lin and Junsheng Zhang and Ming Yan and Zengye Xie and Changwang Zhang and Chenglu Wen and Lan Xu and Siqi Shen and Cheng Wang", "abstract": "Humanoid robots have achieved significant progress in motion generation and control, exhibiting movements that appear increasingly natural and human-like. Inspired by the Turing Test, we propose the Motion Turing Test, a framework that evaluates whether human observers can discriminate between humanoid robot and human poses using only kinematic information. To facilitate this evaluation, we present the Human-Humanoid Motion (HHMotion) dataset, which consists of 1,000 motion sequences spanning 15 action categories, performed by 11 humanoid models and 10 human subjects. All motion sequences are converted into SMPL-X representations to eliminate the influence of visual appearance. We recruited 30 annotators to rate the human-likeness of each pose on a 0-5 scale, resulting in over 500 hours of annotation. Analysis of the collected data reveals that humanoid motions still exhibit noticeable deviations from human movements, particularly in dynamic actions such as jumping, boxing, and running. Building on HHMotion, we formulate a human-likeness evaluation task that aims to automatically predict human-likeness scores from motion data. Despite recent progress in multimodal large language models, we find that they remain inadequate for assessing motion human-likeness. To address this, we propose a simple baseline model and demonstrate that it outperforms several contemporary LLM-based methods. The dataset, code, and benchmark will be publicly released to support future research in the community.", "link": "http://arxiv.org/abs/2603.06181v1", "date": "2026-03-06", "relevancy": 2.3289, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2 0hours%20of%20annotation.%20Analysis%20of%20the%20collected%20data%20reveals%20that%20humanoid%20motions%20still%20exhibit%20noticeable%20deviations%20from%20human%20movements%2C%20particularly%20in%20dynamic%20actions%20such%20as%20jumping%2C%20boxing%2C%20and%20running.%20Building%20on%20HHMotion%2C%20we%20formulate%20a%20human-likeness%20evaluation%20task%20that%20aims%20to%20automatically%20predict%20human-likeness%20scores%20from%20motion%20data.%20Despite%20recent%20progress%20in%20multimodal%20large%20language%20models%2C%20we%20find%20that%20they%20remain%20inadequate%20for%20assessing%20motion%20human-likeness.%20To%20address%20this%2C%20we%20propose%20a%20simple%20baseline%20model%20and%20demonstrate%20that%20it%20outperforms%20several%20contemporary%20LLM-based%20methods.%20The%20dataset%2C%20code%2C%20and%20benchmark%20will%20be%20publicly%20released%20to%20support%20future%20research%20in%20the%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06181v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Motion%2520Turing%2520Test%253A%2520Evaluating%2520Human-Likeness%2520in%2520Humanoid%2520Robots%26entry.906535625%3DMingzhe%2520Li%2520and%2520Mengyin%2520Liu%2520and%2520Zekai%2520Wu%2520and%2520Xincheng%2520Lin%2520and%2520Junsheng%2520Zhang%2520and%2520Ming%2520Yan%2520and%2520Zengye%2520Xie%2520and%2520Changwang%2520Zhang%2520and%2520Chenglu%2520Wen%2520and%2520Lan%2520Xu%2520and%2520Siqi%2520Shen%2520and%2520Cheng%2520Wang%26entry.1292438233%3DHumanoid%2520robots%2520have%2520achieved%2520significant%2520progress%2520in%2520motion%2520generation%2520and%2520control%252C%2520exhibiting%2520movements%2520that%2520appear%2520increasingly%2520natural%2520and%2520human-like.%2520Inspired%2520by%2520the%2520Turing%2520Test%252C%2520we%2520propose%2520the%2520Motion%2520Turing%2520Test%252C%2520a%2520framework%2520that%2520evaluates%2520whether%2520human%2520o {"title": "Abductive Reasoning with Syllogistic Forms in Large Language Models", "author": "Hirohiko Abe and Risako Ando and Takanobu Morishita Kentaro Ozeki and Koji Mineshima and Mitsuhiro Okada", "abstract": "Research in AI using Large-Language Models (LLMs) is rapidly evolving, and the comparison of their performance with human reasoning has become a key concern. Prior studies have indicated that LLMs and humans share similar biases, such as dismissing logically valid inferences that contradict common beliefs. However, criticizing LLMs for these biases might be unfair, considering our reasoning not only involves formal deduction but also abduction, which draws tentative conclusions from limited information. Abduction can be regarded as the inverse form of syllogism in its basic structure, that is, a process of drawing a minor premise from a major premise and conclusion. This paper explores the accuracy of LLMs in abductive reasoning by converting a syllogistic dataset into one suitable for abduction. It aims to investigate whether the state-of-the-art LLMs exhibit biases in abduction and to identify potential areas for improvement, emphasizing the importance of contextualized reasoning beyond formal deduction. This investigation is vital for advancing the understanding and application of LLMs in complex reasoning tasks, offering insights into bridging the gap between machine and human cognition.", "link": "http://arxiv.org/abs/2603.06428v1", "date": "2026-03-06", "relevancy": 2.3208, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4661}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4661}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/F mplex%20reasoning%20tasks%2C%20offering%20insights%20into%20bridging%20the%20gap%20between%20machine%20and%20human%20cognition.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06428v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAbductive%2520Reasoning%2520with%2520Syllogistic%2520Forms%2520in%2520Large%2520Language%2520Models%26entry.906535625%3DHirohiko%2520Abe%2520and%2520Risako%2520Ando%2520and%2520Takanobu%2520Morishita%2520Kentaro%2520Ozeki%2520and%2520Koji%2520Mineshima%2520and%2520Mitsuhiro%2520Okada%26entry.1292438233%3DResearch%2520in%2520AI%2520using%2520Large-Language%2520Models%2520%2528LLMs%2529%2520is%2520rapidly%2520evolving%252C%2520and%2520the%2520comparison%2520of%2520their%2520performance%2520with%2520human%2520reasoning%2520has%2520become%2520a%2520key%2520concern.%2520Prior%2520studies%2520have%2520indicated%2520that%2520LLMs%2520and%2520humans%2520share%2520similar%2520biases%252C%2520such%2520as%2520dismissing%2520logically%2520valid%2520inferences%2520that%2520contradict%2520common%2520beliefs.%2520However%252C%2520criticizing%2520LLMs%2520for%2520these%2520biases%2520might%2520be%2520unfair%252C%2520considering%2520our%2520reasoning%2520not%2520only%2520involves%2520formal%2520deduction%2520but%2520also%2520abduction%252C%2520which%2520draws%2520tentative%2520conclusions%2520from%2520limited%2520information.%2520Abduction%2520can%2520be%2520regarded%2520as%2520the%2520inverse%2520form%2520of%2520syllogism%2520in%2520its%2520basic%2520structure%252C%2520that%2520is%252C%2520a%2520process%2520of%2520drawing%2520a%2520minor%2520premise%2520from%2520a%2520major%2520premise%2520and%2520conclusion.%2520This%2520paper%2520explores%2520the%2520accuracy%2520of%2520LLMs%2520in%2520abductive%2520reasoning%2520by%2520converting%2520a%2520syllogistic%2520dataset%2520into%2520one%2520suitable%2520for%2520abduction.%2520It%2520aims%2520to%2520investigate%2520whether%2520the% {"title": "SuperSuit: An Isomorphic Bimodal Interface for Scalable Mobile Manipulation", "author": "Tongqing Chen and Hang Wu and Jiasen Wang and Xiaotao Li and Zhu Jin and Lu Fang", "abstract": "High-quality, long-horizon demonstrations are essential for embodied AI, yet acquiring such data for tightly coupled wheeled mobile manipulators remains a fundamental bottleneck. Unlike fixed-base systems, mobile manipulators require continuous coordination between $SE(2)$ locomotion and precise manipulation, exposing limitations in existing teleoperation and wearable interfaces. We present \\textbf{SuperSuit}, a bimodal data acquisition framework that supports both robot-in-the-loop teleoperation and active demonstration under a shared kinematic interface. Both modalities produce structurally identical joint-space trajectories, enabling direct data mixing without modifying downstream policies. For locomotion, SuperSuit maps natural human stepping to continuous planar base velocities, eliminating discrete command switches. For manipulation, it employs a strictly isomorphic wearable arm in both modes, while policy training is formulated in a shift-invariant delta-joint representation to mitigate calibration offsets and structural compliance without inverse kinematics. Real-world experiments on long-horizon mobile manipulation tasks show 2.6$\\times$ higher demonstration throughput in active mode compared to a teleoperation baseline, comparable policy performance when substituting teleoperation data with active demonstrations at fixed dataset size, and monotonic performance improvement as active data volume increases. These results indicate that consistent kinematic representations across collection modalities enable scalable data acquisition for long-horizon mobile manipulation.", "link": "http://arxiv.org/abs/2603.06280v1", "date": "2026-03-06", "relevancy": 2.3044, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6083}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5724}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5669}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SuperSuit%3A%20An%20Isomorphic%20Bimodal%20Interface%20for%20Scalable%20Mobile%20Manipulation&body=Title%3A%20SuperSuit%3A%20An%20Isomorphic%20Bimodal%20Interface%20for%20Scalable%20Mobile%20Manipulation%0AAuthor%3A%20Tongqing%20Chen%20and%20Hang%20Wu%20and%20Jiasen%20Wang%20and%20Xiaotao%20Li%20and%20Zhu%20Jin%20and%20Lu%20Fang%0AAbstract%3A%20High-quality%2C%20long-horizon%20demonstrations%20are%20essential%20for%20embodied%20AI%2C%20yet%20acquiring%20such%20data%20for%20tightly%20coupled%20wheeled%20mobile%20manipulators%20remains%20a%20fundamental%20bottleneck.%20Unlike%20fixed-base%20systems%2C%20mobile%20manipulators%20require%20continuous%20coordination%20between%20%24SE%282%29%24%20locomotion%20and%20precise%20manipulation%2C%20exposing%20limitations%20in%20existing%20teleoperation%20and%20wearable%20interfaces.%20We%20present%20%5Ctextbf%7BSuperSuit%7D%2C%20a%20bimodal%20data%20acquisition%20framework%20that%20supports%20both%20robot-in-the-loop%20teleoperation%20and%20active%20demonstration%20under%20a%20shared%20kinematic%20interface.%20Both%20modalities%20produce%20structurally%20identical%20joint-space%20trajectories%2C%20enabling%20direct%20data%20mixing%20without%20modifying%20downstream%20policies.%20For%20locomotion%2C%20SuperSuit%20maps%20natural%20human%20stepping%20to%20continuous%20planar%20base%20velocities%2C%20eliminating%20discrete%20command%20switches.%20For%20manipulation%2C%20it%20employs%20a%20strictly%20isomorphic%20wearable%20arm%20in%20both%20modes%2C%20while%20policy%20training%20is%20formulated%20in%20a%20shift-invariant%20delta-joint%20representation%20to%20mitigate%20calibration%20offsets%20and%20structural%20compliance%20without%20inverse%20kinematics.%20Real-world%20experiments%20on%20long-horizon%20mobile%20manipulation%20tasks%20show%202.6%24%5Ctimes%24%20higher%20demonstration%20throughput%20in%20active%20mode%20compared%20to%20a%20teleoperation%20baseline%2C%20comparable%20policy%20performance%20when%20substituting%20teleoperation%20data%20with%20active%20demonstrations%20at%20fixed%20dataset%20size%2C%20and%20monotonic%20performance%20improvement%20as%20active%20data%20volume%20increases.%20These%20results%20indicate%20that%20consistent%20kinematic%20representations%20across%20collection%20modalities%20enable%20scalable%20data%20acquisition%20for%20long-horizon%20mobile%20manipulation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06280v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSuperSuit%253A%2520An%2520Isomorphic%2520Bimodal%2520Interface%2520for%2520Scalable%2520Mobile%2520Manipulation%26entry.906535625%3DTongqing%2520Chen%2520and%2520Hang%2520Wu%2520and%2520Jiasen%2520Wang%2520and%2520Xiaotao%2520Li%2520and%2520Zhu%2520Jin%2520and%2520Lu%2520Fang%26entry.1292438233%3DHigh-quality%252C%2520long-horizon%2520demonstrations%2520are%2520essential%2520for%2520embodied%2520AI%252C%2520yet%2520acquiring%2520such%2520data%2520for%2520tightly%2520coupled%2520wheeled%2520mobile%2520manipulators%2520remains%2520a%2520fundamental%2520bottleneck.%2520Unlike%2520fixed-base%2520systems%252C%2520mobile%2520manipulators%2520require%2520continuous%2520coordination%2520between%2520%2524SE%25282%2529%2524%2520locomotion%2520and%2520precise%2520manipulation%252C%2520exposing%2520limitations%2520in%2520existing%2520teleoperation%2520and%2520wearable%2520interfaces.%2520We%2520present%2520%255Ctextbf%257BSuperSuit%257D%252C%2520a%2520bimodal%2520data%2520acquisitio {"title": "Place-it-R1: Unlocking Environment-aware Reasoning Potential of MLLM for Video Object Insertion", "author": "Bohai Gu and Taiyi Wu and Dazhao Du and Jian Liu and Shuai Yang and Xiaotong Zhao and Alan Zhao and Song Guo", "abstract": "Modern video editing techniques have achieved high visual fidelity when inserting video objects. However, they focus on optimizing visual fidelity rather than physical causality, leading to edits that are physically inconsistent with their environment. In this work, we present Place-it-R$1$, an end-to-end framework for video object insertion that unlocks the environment-aware reasoning potential of Multimodal Large Language Models (MLLMs). Our framework leverages the Chain-of-Thought (CoT) reasoning of MLLMs to orchestrate video diffusion, following a Think-then-Place paradigm. To bridge cognitive reasoning and generative execution, we introduce three key innovations: First, MLLM performs physical scene understanding and interaction reasoning, generating environment-aware chain-of-thought tokens and inferring valid insertion regions to explicitly guide the diffusion toward physically plausible insertion. Then, we introduce MLLM-guided Spatial Direct Preference Optimization (DPO), where diffusion outputs are fed back to the MLLM for scoring, enabling visual naturalness. During inference, the MLLM iteratively triggers refinement cycles and elicits adaptive adjustments from the diffusion model, forming a closed-loop that progressively enhances editing quality. Furthermore, we provide two user-selectable modes: a plausibility-oriented flexible mode that permits environment modifications (\\eg, generating support structures) to enhance physical plausibility, and a fidelity-oriented standard mode that preserves scene integrity for maximum fidelity, offering users explicit control over the plausibility-fidelity trade-off. Extensive experiments demonstrate Place-it-R1 achieves physically-coherent video object insertion compared with state-of-the-art solutions and commercial models.", "link": "http://arxiv.org/abs/2603.06140v1", "date": "2026-03-06", "relevancy": 2.3034, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5851}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5819}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Place-it-R1%3A%20Unlocking%20Environment-aware%20Reasoning%20Potential%20of%20MLLM%20for%20Video%20Object%20Insertion&body=Title%3A%20Place-it-R1%3A%20Unlocking%20Environment-aware%20Reasoning%20Potential%20of%20MLLM%20for%20Video%20Object%20Insertion%0AAuthor%3A%20Bohai%20Gu%20and%20Taiyi%20Wu%20and%20Dazhao%20Du%20and%20Jian%20Liu%20and%20Shuai%20Yang%20and%20Xiaotong%20Zhao%20and%20Alan%20Zhao%20and%20Song%20Guo%0AAbstract%3A%20Modern%20video%20editing%20techniques%20have%20achieved%20high%20visual%20fidelity%20when%20inserting%20video%20objects.%20However%2C%20they%20focus%20on%20optimizing%20visual%20fidelity%20rather%20than%20physical%20causality%2C%20leading%20to%20edits%20that%20are%20physically%20inconsistent%20with%20their%20environment.%20In%20this%20work%2C%20we%20present%20Place-it-R%241%24%2C%20an%20end-to-end%20framework%20for%20video%20object%20insertion%20that%20unlocks%20the%20environment-aware%20reasoning%20potential%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29.%20Our%20framework%20leverages%20the%20Chain-of-Thought%20%28CoT%29%20reasoning%20of%20MLLMs%20to%20orchestrate%20video%20diffusion%2C%20following%20a%20Think-then-Place%20paradigm.%20To%20bridge%20cognitive%20reasoning%20and%20generative%20execution%2C%20we%20introduce%20three%20key%20innovations%3A%20Fir {"title": "DEX-AR: A Dynamic Explainability Method for Autoregressive Vision-Language Models", "author": "Walid Bousselham and Angie Boggust and Hendrik Strobelt and Hilde Kuehne", "abstract": "As Vision-Language Models (VLMs) become increasingly sophisticated and widely used, it becomes more and more crucial to understand their decision-making process. Traditional explainability methods, designed for classification tasks, struggle with modern autoregressive VLMs due to their complex token-by-token generation process and intricate interactions between visual and textual modalities. We present DEX-AR (Dynamic Explainability for AutoRegressive models), a novel explainability method designed to address these challenges by generating both per-token and sequence-level 2D heatmaps highlighting image regions crucial for the model's textual responses. The proposed method offers to interpret autoregressive VLMs-including varying importance of layers and generated tokens-by computing layer-wise gradients with respect to attention maps during the token-by-token generation process. DEX-AR introduces two key innovations: a dynamic head filtering mechanism that identifies attention heads focused on visual information, and a sequence-level filtering approach that aggregates per-token explanations while distinguishing between visually-grounded and purely linguistic tokens. Our evaluation on ImageNet, VQAv2, and PascalVOC, shows a consistent improvement in both perturbation-based metrics, using a novel normalized perplexity measure, as well as segmentation-based metrics.", "link": "http://arxiv.org/abs/2603.06302v1", "date": "2026-03-06", "relevancy": 2.3004, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5829}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5829}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5359}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DEX-AR%3A%20A%20Dynamic%20Explainability%20Method%20for%20Autoregressive%20Vision-Language%20Models&body=Title%3A%20DEX-AR%3A%20A%20Dynamic%20Explainability%20Method%20for%20Autoregressive%20Vision-Language%20Models%0AAuthor%3A%20Walid%20Bousselham%20and%20Angie%20Boggust%20and%20Hendrik%20Strobelt%20and%20Hilde%20Kuehne%0AAbstract%3A%20As%20Vision-Language%20Models%20%28VLMs%29%20become%20increasingly%20sophisticated%20and%20widely%20used%2C%20it%20becomes%20more%20and%20more%20crucial%20to%20understand%20their%20decision-making%20process.%20Traditional%20explainability%20methods%2C%20designed%20for%20classification%20tasks%2C%20struggle%20with%20modern%20autoregressive%20VLMs%20due%20to%20their%20complex%20token-by-token%20generation%20process%20and%20intricate%20interactions%20between%20visual%20and%20textual%20modalities.%20We%20present%20DEX-AR%20%28Dynamic%20Explainability%20for%20AutoRegressive%20models%29%2C%20a%20novel%20explainability%20method%20designed%20to%20address%20these%20challenges%20by%20generating%20both%20per-token%20and%20sequence-level%202D%20heatmaps%20highlighting%20image%20regions%20crucial%20for%20the%20model%27s%20textual%20responses.%20The%20proposed%20method%20offers%20to%20interpret%20autoregressive%20VLMs-including%20varying%20importance%20of%20layers%20and%20generated%20tokens-by%20computing%20layer-wise%20gradients%20with%20respect%20to%20attention%20maps%20during%20the%20token-by-token%20generation%20process.%20DEX-AR%20introduces%20two%20key%20innovations%3A%20a%20dynamic%20head%20filtering%20mechanism%20that%20identifies%20attention%20heads%20focused%20on%20visual%20information%2C%20and%20a%20sequence-level%20filtering%20approach%20that%20aggregates%20per-token%20explanations%20while%20distinguishing%20between%20visually-grounded%20and%20purely%20linguistic%20tokens.%20Our%20evaluation%20on%20ImageNet%2C%20VQAv2%2C%20and%20PascalVOC%2C%20shows%20a%20consistent%20improvement%20in%20both%20perturbation-based%20metrics%2C%20using%20a%20novel%20normalized%20perplexity%20measure%2C%20as%20well%20as%20segmentation-based%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06302v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDEX-AR%253A%2520A%2520Dynamic%2520Explainability%2520Method%2520for%2520Autoregressive%2520Vision-Language%2520Models%26entry.906535625%3DWalid%2520Bousselham%2520and%2520Angie%2520Boggust%2520and%2520Hendrik%2520Strobelt%2520and%2520Hilde%2520Kuehne%26entry.1292438233%3DAs%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520become%2520increasingly%2520sophisticated%2520and%2520widely%2520used%252C%2520it%2520becomes%2520more%2520and%2520more%2520crucial%2520to%2520understand%2520their%2520decision-making%2520process.%2520Traditional%2520explainability%2520methods%252C%2520designed%2520for%2520classification%2520tasks%252C%2520struggle%2520with%2520modern%2520autoregressive%2520VLMs%2520due%2520to%2520their%2520complex%2520token-by-token%2520generation%2520process%2520and%2520intricate%2520interactions%2520between%2520visual%2520and%2520textual%2520modalities.%2520We%2520present%2520DEX-AR%2520%2528Dynamic%2520Explainability%2520for%2520AutoRegressive%2520models%2529%252C%2520a%2520novel%2520explainability%2520method%2520designed%2520to%2520address%2520these%2520challenges%2520by%2520generating%2520both%2520per-token%2520and%2520sequence-level%25202D%2520heatmaps%2520highlighting%2520image%2520regions%2520crucial%2520for%2520the%2520model%2527s%2520textual%2520responses.%2520The%2520proposed%2520method%2520offers%2520to%2520interpret%2520autoregressive%2520VLMs-including%2520varying%2520importance%2520of%2520layers%2520and%2520generated%2520tokens-by%2520computing%2 {"title": "Sticky-Glance: Robust Intent Recognition for Human Robot Collaboration via Single-Glance", "author": "Yuzhi Lai and Shenghai Yuan and Peizheng Li and Andreas Zell", "abstract": "Gaze is a valuable means of communication for impaired people with extremely limited motor capabilities. However, robust gaze-based intent recognition in multi-object environments is challenging due to gaze noise, micro-saccades, viewpoint changes, and dynamic objects. To address this, we propose an object-centric gaze grounding framework that stabilizes intent through a sticky-glance algorithm, jointly modeling geometric distance and direction trends. The inferred intent remains anchored to the object even under short glances with minimal 3 gaze samples, achieving a tracking rate of 0.94 for dynamic targets and selection accuracy of 0.98 for static targets. We further introduce a continuous shared control and multi-modal interaction paradigm, enabling high-readiness control and human-in-loop feedback, thereby reducing task duration for nearly 10 \\%. Experiments across dynamic tracking, multi-perspective alignment, a baseline comparison, user studies, and ablation studies demonstrate improved robustness, efficiency, and reduced workload compared to representative baselines.", "link": "http://arxiv.org/abs/2603.06121v1", "date": "2026-03-06", "relevancy": 2.2997, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5942}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5651}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sticky-Glance%3A%20Robust%20Intent%20Recognition%20for%20Human%20Robo {"title": "Efficient Vector Search in the Wild: One Model for Multi-K Queries", "author": "Yifan Peng and Jiafei Fan and Xingda Wei and Sijie Shen and Rong Chen and Jianning Wang and Xiaojian Luo and Wenyuan Yu and Jingren Zhou and Haibo Chen", "abstract": "Learned top-K search is a promising approach for serving vector queries with both high accuracy and performance. However, current models trained for a specific K value fail to generalize to real-world multi-K queries: they suffer from accuracy degradation (for larger Ks) and performance loss (for smaller Ks). Training the model to generalize on different Ks requires orders of magnitude more preprocessing time and is not suitable for serving vector queries in the wild. We present OMEGA, a K-generalizable learned top-K search method that simultaneously achieves high accuracy, high performance, and low preprocessing cost for multi-K vector queries. The key idea is that a base model properly trained on K=1 with our trajectory-based features can be used to accurately predict larger Ks with a dynamic refinement procedure and smaller Ks with minimal performance loss. To make our refinements efficient, we further leverage the statistical properties of top-K searches to reduce excessive model invocations. Extensive evaluations on multiple public and production datasets show that, under the same preprocessing budgets, OMEGA achieves 6-33% lower average latency compared to state-of-the-art learned search methods, while all systems achieve the same recall target. With only 16-30% of the preprocessing time, OMEGA attains 1.01-1.28x of the optimal average latency of these baselines.", "link": "http://arxiv.org/abs/2603.06159v1", "date": "2026-03-06", "relevancy": 2.2966, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4591}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4591}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Vector%20Search%20in%20the%20Wild%3A%20One%20Model%20for%20Multi-K%20Queries&body=Title%3A%20Efficient%20Vector%20Search%20in%20the%20Wild%3A%20One%20Model%20for%20Multi-K%20Queries%0AAuthor%3A%20Yifan%20Peng%20and%20Jiafei%20Fan%20and%20Xingda%20Wei%20and%20Sijie%20Shen%20and%20Rong%20Chen%20and%20Jianning%20Wang%20and%20Xiaojian%20Luo%20and%20Wenyuan%20Yu%20and%20Jingren%20Zhou%20and%20Haibo%20Chen%0AAbstract%3A%20Learned%20top-K%20search%20is%20a%20promising%20approach%20for%20serving%20vector%20queries%20with%20both%20high%20accuracy%20and%20performance.%20However%2C%20current%20models%20trained%20for%20a%20specific%20K%20value%20fail%20to%20generalize%20to%20real-world%20multi-K%20queries%3A%20they%20suffer%20from%20accuracy%20degradation%20%28for%20larger%20Ks%29%20and%20performance%20loss%20%28for%20smaller%20Ks%29.%20Training%20the%20model%20to%20generalize%20on%20different%20Ks%20requires%20orders%20of%20magnitude%20more%20preprocessing%20time%20and%20is%20not%20suitable%20for%20serving%20vector%20queries%20in%20the%20wild.%20We%20present%20OMEGA%2C%20a%20K-generalizable%20learned%20top-K%20search%20method%20that%20simultaneously%20achieves%20high%20accuracy%2C%20high%20performance%2C%20and%20low%20preprocessing%20cost%20for%20multi-K%20vector%20queries.%20The%20key%20idea%20is%20that%20a%20base%20model%20properly%20trained%20on%20K%3D1%20with%20our%20trajectory-based%20features%20can%20be%20used%20to%20accurately%20predict%20larger%20Ks%20with%20a%20dynamic%20refinement%20procedure%20and%20smaller%20Ks%20with%20minimal%20performance%20loss.%20To%20make%20our%20refinements%20efficient%2C%20we%20further%20leverage%20the%20statistical%20properties%20of%20top-K%20searches%20to%20reduce%20excessive%20model%20invocations.%20Extensive%20evaluations%20on%20multiple%20public%20and%20production%20datasets%20show%20that%2C%20under%20the%20same%20preprocessing%20budgets%2C%20OMEGA%20achieves%206-33%25%20lower%20average%20latency%20compared%20to%20state-of-the-art%20learned%20search%20methods%2C%20while%20all%20systems%20achieve%20the%20same%20recall%20target.%20With%20only%2016-30%25%20of%20the%20preprocessing%20time%2C%20OMEGA%20attains%201.01-1.28x%20of%20the%20optimal%20average%20latency%20of%20these%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06159v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Vector%2520Search%2520in%2520the%2520Wild%253A%2520One%2520Model%2520for%2520Multi-K%2520Queries%26entry.906535625%3DYifan%2520Peng%2520and%2520Jiafei%2520Fan%2520and%2520Xingda%2520Wei%2520and%2520Sijie%2520Shen%2520and%2520Rong%2520Chen%2520and%2520Jianning%2520Wang%2520and%2520Xiaojian%2520Luo%2520and%2520Wenyuan%2520Yu%2520and%2520Jingren%2520Zhou%2520and%2520Haibo%2520Chen%26entry.1292438233%3DLearned%2520top-K%2520search%2520is%2520a%2520promising%2520approach%2520for%2520serving%2520vector%2520queries%2520with%2520both%2520high%2520accuracy%2520and%2520performance.%2520However%252C%2520current%2520models%2520trained%2520for%2520a%2520specific%2520K%2520value%2520fail%2520to%2520generalize%2520to%2520real-world%2520multi-K%2520queries%253A%2520they%2520suffer%2520from%2520accuracy%2520degradation%2520%2528for%2520larger%2520Ks%2529%2520and%2520performance%2520loss%2520%2528for%2520smaller%2520Ks%2529.%2520Training%2520the%2520model%2520to%2520generalize%2520on%2520different%2520Ks%2520requires%2520orders%2520of%2520magnitude%2520more%2520preprocessing%2520time%2520and%2520is%2520not%2520suitable%2520for%2520serving%2520vector%2520queries%2520in%2520the%2520wild.%2520We%2520present% {"title": "BEVLM: Distilling Semantic Knowledge from LLMs into Bird's-Eye View Representations", "author": "Thomas Monninger and Shaoyuan Xie and Qi Alfred Chen and Sihao Ding", "abstract": "The integration of Large Language Models (LLMs) into autonomous driving has attracted growing interest for their strong reasoning and semantic understanding abilities, which are essential for handling complex decision-making and long-tail scenarios. However, existing methods typically feed LLMs with tokens from multi-view and multi-frame images independently, leading to redundant computation and limited spatial consistency. This separation in visual processing hinders accurate 3D spatial reasoning and fails to maintain geometric coherence across views. On the other hand, Bird's-Eye View (BEV) representations learned from geometrically annotated tasks (e.g., object detection) provide spatial structure but lack the semantic richness of foundation vision encoders. To bridge this gap, we propose BEVLM, a framework that connects a spatially consistent and semantically distilled BEV representation with LLMs. Through extensive experiments, we show that BEVLM enables LLMs to reason more effectively in cross-view driving scenes, improving accuracy by 46%, by leveraging BEV features as unified inputs. Furthermore, by distilling semantic knowledge from LLMs into BEV representations, BEVLM significantly improves closed-loop end-to-end driving performance by 29% in safety-critical scenarios.", "link": "http://arxiv.org/abs/2603.06576v1", "date": "2026-03-06", "relevancy": 2.2869, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5746}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5746}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n semantic%20knowledge%20from%20LLMs%20into%20BEV%20representations%2C%20BEVLM%20significantly%20improves%20closed-loop%20end-to-end%20driving%20performance%20by%2029%25%20in%20safety-critical%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06576v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBEVLM%253A%2520Distilling%2520Semantic%2520Knowledge%2520from%2520LLMs%2520into%2520Bird%2527s-Eye%2520View%2520Representations%26entry.906535625%3DThomas%2520Monninger%2520and%2520Shaoyuan%2520Xie%2520and%2520Qi%2520Alfred%2520Chen%2520and%2520Sihao%2520Ding%26entry.1292438233%3DThe%2520integration%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520into%2520autonomous%2520driving%2520has%2520attracted%2520growing%2520interest%2520for%2520their%2520strong%2520reasoning%2520and%2520semantic%2520understanding%2520abilities%252C%2520which%2520are%2520essential%2520for%2520handling%2520complex%2520decision-making%2520and%2520long-tail%2520scenarios.%2520However%252C%2520existing%2520methods%2520typically%2520feed%2520LLMs%2520with%2520tokens%2520from%2520multi-view%2520and%2520multi-frame%2520images%2520independently%252C%2520leading%2520to%2520redundant%2520computation%2520and%2520limited%2520spatial%2520consistency.%2520This%2520separation%2520in%2520visual%2520processing%2520hinders%2520accurate%25203D%2520spatial%2520reasoning%2520and%2520fails%2520to%2520maintain%2520geometric%2520coherence%2520across%2520views.%2520On%2520the%2520other%2520hand%252C%2520Bird%2527s-Eye%2520View%2520%2528BEV%2529%2520representations%2520learned%2520from%2520geometrically%2520annotated%2520tasks%2520%2528e.g.%252C%2520object%2520detection%2529%2520provide%2520spatial%2520structure%2520but%2520lack%2520the%2520semantic%2520richness%2520of%2520foundation%2520vision%2520encoders.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520BEVLM%252C%2520a%2520framework%2520that%2520connects%2520a%2520spatially%2520consistent%2520and%2520semantically%2520distilled%2520BEV%2520representation%2520with%2520LLMs.%2520Through%2520extensive%2520experiments%252C%2520we%2520show%2520that%2520BEVLM%2520enables%2520LLMs%2520to%2520reason%2520more%2520effectively%2520in%2520cross-view%2520driving%2520scenes%252C%2520improving%2520accuracy%2520by%252046%2525%252C%2520by%2520leveraging%2520BEV%2520features%2520as%2520unified%2520inputs.%2520Furthermore%252C%2520by%2520distilling%2520semantic%2520knowledge%2520from%2520LLMs%2520into%2520BEV%2520representations%252C%2520BEVLM%2520significantly%2520improves%2520closed-loop%2520end-to-end%2520driving%2520performance%2520by%252029%2525%2520in%2520safety-critical%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06576v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BEVLM%3A%20Distilling%20Semantic%20Knowledge%20from%20LLMs%20into%20Bird%27s-Eye%20View%20Representations&entry.906535625=Thomas%20Monninger%20and%20Shaoyuan%20Xie%20and%20Qi%20Alfred%20Chen%20and%20Sihao%20Ding&entry.1292438233=The%20integration%20of%20Large%20Language%20Models%20%28LLMs%29%20into%20autonomous%20driving%20has%20attracted%20growing%20interest%20for%20their%20strong%20reasoning%20and%20semantic%20understanding%20abilities%2C%20which%20are%20essential%20for%20handling%20complex%20decision-making%20and%20long-tail%20scenarios.%20However%2C%20existing%20methods%20typically%20feed%20LLMs%20with%20tokens%20from%20multi-view%20and%20multi-frame%20images%20independently%2C%20leading%20to%20redundant%20computation%20and%20limited%20spatial%20consistency.%20This%20separation%20in%20visual%20processing%20hinders%20accurate%203D%20spatial%20reasoning%20and%20fails%20to%20maintain%20geometric%20coherence%20across%20views.%20On%20the%20other%20hand%2C%20Bird%27s-Eye%20View%20%28BEV%29%20representations%20learned%20from%20geometrically%20 {"title": "AuthFace: Towards Authentic Blind Face Restoration with Face-oriented Generative Diffusion Prior", "author": "Guoqiang Liang and Qingnan Fan and Bingtao Fu and Jinwei Chen and Hong Gu and Lin Wang", "abstract": "Blind face restoration (BFR) is a fundamental and challenging problem in computer vision. To faithfully restore high-quality (HQ) photos from poor-quality ones, recent research endeavors predominantly rely on facial image priors from the powerful pretrained text-to-image (T2I) diffusion models. However, such priors often lead to the incorrect generation of non-facial features and insufficient facial details, thus rendering them less practical for real-world applications. In this paper, we propose a novel framework, namely AuthFace that achieves highly authentic face restoration results by exploring a face-oriented generative diffusion prior. To learn such a prior, we first collect a dataset of 1.5K high-quality images, with resolutions exceeding 8K, captured by professional photographers. Based on the dataset, we then introduce a novel face-oriented restoration-tuning pipeline that fine-tunes a pretrained T2I model. Identifying key criteria of quality-first and photography-guided annotation, we involve the retouching and reviewing process under the guidance of photographers for high-quality images that show rich facial features. The photography-guided annotation system fully explores the potential of these high-quality photographic images. In this way, the potent natural image priors from pretrained T2I diffusion models can be subtly harnessed, specifically enhancing their capability in facial detail restoration. Moreover, to minimize artifacts in critical facial areas, such as eyes and mouth, we propose a time-aware latent facial feature loss to learn the authentic face restoration process. Extensive experiments on the synthetic and real-world BFR datasets demonstrate the superiority of our approach.", "link": "http://arxiv.org/abs/2410.09864v2", "date": "2026-03-06", "relevancy": 2.284, "topK": [{"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.5859}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5727}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AuthFace%3A%20Towards%20Authentic%20Blind%20Face%20Restoration%20with%20Face-oriented%20Generative%20Diffusion%20Prior&body=Title%3A%20AuthFace%3A%20Towards%20Authentic%20Blind%20Face%20Restoration%20with%20Face-oriented%20Generative%20Diffusion%20Prior%0AAuthor%3A%20Guoqiang%20Liang%20and%20Qingnan%20Fan%20and%20Bingtao%20Fu%20and%20Jinwei%20Chen%20and%20Hong%20Gu%20and%20Lin%20Wang%0AAbstract%3A%20Blind%20face%20restoration%20%28BFR%29%20is%20a%20fundamental%20and%20challenging%20problem%20in%20computer%20vision.%20To%20faithfully%20restore%20high-quality%20%28HQ%29%20photos%20from%20poor-quality%20ones%2C%20recent%20research%20endeavors%20predominantly%20rely%20on%20facial%20image%20priors%20from%20the%20powerful%20pretrained%20text-to-image%20%28T2I%29%20diffusion%20models.%20However%2C%20such%20priors%20often%20lead%20to%20the%20incorrect%20generation%20of%20non-facial%20features%20and%20insufficient%20facial%20details%2C%20thus%20rendering%20them%20less%20practical%20for%20real-world%20applications.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20framework%2C%20namely%20AuthFace%20that%20achieves%20highly%20authentic%20face%20restoration%20results%20by%20exploring%20a%20face-oriented%20generative%20diffusion%20prior.%20To%20learn%20such%20a%20prior%2C%20we%20first%20collect%20a%20dataset%20of%201.5K%20high-quality%20images%2C%20with%20resolutions%20exceeding%208K%2C%20captured%20by%20professional%20photographers.%20Based%20on%20the%20dataset%2C%20we%20then%20introduce%20a%20novel%20face-oriented%20restoration-tuning%20pipeline%20that%20fine-tunes%20a%20pretrained%20T2I%20model.%20Identifying%20key%20criteria%20of%20quality-first%20and%20photography-guided%20annotation%2C%20we%20involve%20the%20retouching%20and%20reviewing%20process%20under%20the%20guidance%20of%20photographers%20for%20high-quality%20images%20that%20show%20rich%20facial%20features.%20The%20photography-guided%20annotation%20system%20fully%20explores%20the%20potential%20of%20these%20high-quality%20photographic%20images.%20In%20this%20way%2C%20the%20potent%20natural%20image%20priors%20from%20pretrained%20T2I%20diffusion%20models%20can%20be%20subtly%20harnessed%2C%20specifically%20enhancing%20their%20capability%20in%20facial%20detail%20restoration.%20Moreover%2C%20to%20minimize%20artifacts%20in%20critical%20facial%20areas%2C%20such%20as%20eyes%20and%20mouth%2C%20we%20propose%20a%20time-aware%20latent%20facial%20feature%20loss%20to%20learn%20the%20authentic%20face%20restoration%20process.%20Extensive%20experiments%20on%20the%20synthetic%20and%20real-world%20BFR%20datasets%20demonstrate%20the%20superiority%20of%20our%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2410.09864v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAuthFace%253A%2520Towards%2520Authentic%2520Blind%2520Face%2520Restoration%2520with%2520Face-oriented%2520Generative%2520Diffusion%2520Prior%26entry.906535625%3DGuoqiang%2520Liang%2520and%2520Qingnan%2520Fan%2520and%2520Bingtao%2520Fu%2520and%2520Jinwei%2520Chen%2520and%2520Hong%2520Gu%2520and%2520Lin%2520Wang%26entry.1292438233%3DBlind%2520face%2520restoration%2520%2528BFR%2529%2520is%2520a%2520fundamental%2520and%2520challenging%2520problem%2520in%2520computer%2520vision.%2520To%2520faithfully%2520restore%2520high-quality%2520%2528HQ%2529%2520photos%2520from%2520poo

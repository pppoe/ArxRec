ign%20language%20recognition%20%28SLR%29%20is%20a%20machine%20learning%20task%20aiming%20to%20identify%20signs%20in%20videos.%20Due%20to%20the%20scarcity%20of%20annotated%20data%2C%20unsupervised%20methods%20like%20contrastive%20learning%20have%20become%20promising%20in%20this%20field.%20They%20learn%20meaningful%20representations%20by%20pulling%20positive%20pairs%20%28two%20augmented%20versions%20of%20the%20same%20instance%29%20closer%20and%20pushing%20negative%20pairs%20%28different%20from%20the%20positive%20pairs%29%20apart.%20In%20SLR%2C%20in%20a%20sign%20video%2C%20only%20certain%20parts%20provide%20information%20that%20is%20truly%20useful%20for%20its%20recognition.%20Applying%20contrastive%20methods%20to%20SLR%20raises%20two%20issues%3A%20%28i%29%20contrastive%20learning%20methods%20treat%20all%20parts%20of%20a%20video%20in%20the%20same%20way%2C%20without%20taking%20into%20account%20the%20relevance%20of%20certain%20parts%20over%20others%3B%20%28ii%29%20shared%20movements%20between%20different%20signs%20make%20negative%20pairs%20highly%20similar%2C%20complicating%20sign%20discrimination.%20These%20issues%20lead%20to%20learning%20non-discriminative%20features%20for%20sign%20recognition%20and%20poor%20results%20in%20downstream%20tasks.%20In%20response%2C%20this%20paper%20proposes%20a%20self-supervised%20learning%20framework%20designed%20to%20learn%20meaningful%20representations%20for%20SLR.%20This%20framework%20consists%20of%20two%20key%20components%20designed%20to%20work%20together%3A%20%28i%29%20a%20new%20self-supervised%20approach%20with%20free-negative%20pairs%3B%20%28ii%29%20a%20new%20data%20augmentation%20technique.%20This%20approach%20shows%20a%20considerable%20gain%20in%20accuracy%20compared%20to%20several%20contrastive%20and%20self-supervised%20methods%2C%20across%20linear%20evaluation%2C%20semi-supervised%20learning%2C%20and%20transferability%20between%20sign%20languages.&entry.1838667208=http%3A//arxiv.org/abs/2509.05188v2&entry.124074799=Read"},
{"title": "Cut to the Chase: Training-free Multimodal Summarization via Chain-of-Events", "author": "Xiaoxing You and Qiang Huang and Lingyu Li and Xiaojun Chang and Jun Yu", "abstract": "Multimodal Summarization (MMS) aims to generate concise textual summaries by understanding and integrating information across videos, transcripts, and images. However, existing approaches still suffer from three main challenges: (1) reliance on domain-specific supervision, (2) implicit fusion with weak cross-modal grounding, and (3) flat temporal modeling without event transitions. To address these issues, we introduce **CoE**, a training-free MMS framework that performs structured reasoning through a **Chain-of-Events** guided by a Hierarchical Event Graph (HEG). The HEG encodes textual semantics into an explicit event hierarchy that scaffolds cross-modal grounding and temporal reasoning. Guided by this structure, **CoE** localizes key visual cues, models event evolution and causal transitions, and refines outputs via lightweight style adaptation for domain alignment. Extensive experiments on eight diverse datasets demonstrate that **CoE** consistently outperforms state-of-the-art video CoT baselines, achieving average gains of **+3.04 ROUGE**, **+9.51 CIDEr**, and **+1.88 BERTScore**, highlighting its robustness, interpretability, and cross-domain generalization. Our code is available at https://github.com/youxiaoxing/CoE.", "link": "http://arxiv.org/abs/2603.06213v1", "date": "2026-03-06", "relevancy": 2.6232, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5283}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5283}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5174}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cut%20to%20the%20Chase%3A%20Training-free%20Multimodal%20Summarization%20via%20Chain-of-Events&body=Title%3A%20Cut%20to%20the%20Chase%3A%20Training-free%20Multimodal%20Summarization%20via%20Chain-of-Events%0AAuthor%3A%20Xiaoxing%20You%20and%20Qiang%20Huang%20and%20Lingyu%20Li%20and%20Xiaojun%20Chang%20and%20Jun%20Yu%0AAbstract%3A%20Multimodal%20Summarization%20%28MMS%29%20aims%20to%20generate%20concise%20textual%20summaries%20by%20understanding%20and%20integrating%20information%20across%20videos%2C%20transcripts%2C%20and%20images.%20However%2C%20existing%20approaches%20still%20suffer%20from%20three%20main%20challenges%3A%20%281%29%20reliance%20on%20domain-specific%20supervision%2C%20%282%29%20implicit%20fusion%20with%20weak%20cross-modal%20grounding%2C%20and%20%283%29%20flat%20temporal%20modeling%20without%20event%20transitions.%20To%20address%20these%20issues%2C%20we%20introduce%20%2A%2ACoE%2A%2A%2C%20a%20training-free%20MMS%20framework%20that%20performs%20structured%20reasoning%20through%20a%20%2A%2AChain-of-Events%2A%2A%20guided%20by%20a%20Hierarchical%20Event%20Graph%20%28HEG%29.%20The%20HEG%20encodes%20textual%20semantics%20into%20an%20explicit%20event%20hierarchy%20that%20scaffolds%20cross-modal%20grounding%20and%20temporal%20reasoning.%20Guided%20by%20this%20structure%2C%20%2A%2ACoE%2A%2A%20localizes%20key%20visual%20cues%2C%20models%20event%20evolution%20and%20causal%20transitions%2C%20and%20refines%20outputs%20via%20lightweight%20style%20adaptation%20for%20domain%20alignment.%20Extensive%20experiments%20on%20eight%20diverse%20datasets%20demonstrate%20that%20%2A%2ACoE%2A%2A%20consistently%20outperforms%20state-of-the-art%20video%20CoT%20baselines%2C%20achieving%20average%20gains%20of%20%2A%2A%2B3.04%20ROUGE%2A%2A%2C%20%2A%2A%2B9.51%20CIDEr%2A%2A%2C%20and%20%2A%2A%2B1.88%20BERTScore%2A%2A%2C%20highlighting%20its%20robustness%2C%20interpretability%2C%20and%20cross-domain%20generalization.%20Our%20code%20is%20available%20at%20https%3A//github.com/youxiaoxing/CoE.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06213v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCut%2520to%2520the%2520Chase%253A%2520Training-free%2520Multimodal%2520Summarization%2520via%2520Chain-of-Events%26entry.906535625%3DXiaoxing%2520You%2520and%2520Qiang%2520Huang%2520and%2520Lingyu%2520Li%2520and%2520Xiaojun%2520Chang%2520and%2520Jun%2520Yu%26entry.1292438233%3DMultimodal%2520Summarization%2520%2528MMS%2529%2520aims%2520to%2520generate%2520concise%2520textual%2520summaries%2520by%2520understanding%2520and%2520integrating%2520information%2520across%2520videos%252C%2520transcripts%252C%2520and%2520images.%2520However%252C%2520existing%2520approaches%2520still%2520suffer%2520from%2520three%2520main%2520challenges%253A%2520%25281%2529%2520reliance%2520on%2520domain-specific%2520supervision%252C%2520%25282%2529%2520implicit%2520fusion%2520with%2520weak%2520cross-modal%2520grounding%252C%2520and%2520%25283%2529%2520flat%2520temporal%2520modeling%2520without%2520event%2520transitions.%2520To%2520address%2520these%2520issues%252C%2520we%2520introduce%2520%252A%252ACoE%252A%252A%252C%2520a%2520training-free%2520MMS%2520framework%2520that%2520performs%2520structured%2520reasoning%2520through%2520a%2520%252A%252AChain-of-Events%252A%252A%2520guided%2520by%2520a%2520Hierarchical%2520Event%2520Graph%2520%2528HEG%2529.%2520The%2520HEG%2520encodes%2520textual%2520semantics%2520into%2520an%2520explicit%2520event%2520hierarchy%2520that%2520scaffolds%2520cross-modal%2520grounding%2520and%2520temporal%2520reasoning.%2520Guided%2520by%2520this%2520structure%252C%2520%252A%252ACoE%252A%252A%2520localizes%2520key%2520visual%2520cues%252C%2520models%2520event%2520evolution%2520and%2520causal%2520transitions%252C%2520and%2520refines%2520outputs%2520via%2520lightweight%2520style%2520adaptation%2520for%2520domain%2520alignment.%2520Extensive%2520experiments%2520on%2520eight%2520diverse%2520datasets%2520demonstrate%2520that%2520%252A%252ACoE%252A%252A%2520consistently%2520outperforms%2520state-of-the-art%2520video%2520CoT%2520baselines%252C%2520achieving%2520average%2520gains%2520of%2520%252A%252A%252B3.04%2520ROUGE%252A%252A%252C%2520%252A%252A%252B9.51%2520CIDEr%252A%252A%252C%2520and%2520%252A%252A%252B1.88%2520BERTScore%252A%252A%252C%2520highlighting%2520its%2520robustness%252C%2520interpretability%252C%2520and%2520cross-domain%2520generalization.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/youxiaoxing/CoE.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06213v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Cut%20to%20the%20Chase%3A%20Training-free%20Multimodal%20Summarization%20via%20Chain-of-Events&entry.906535625=Xiaoxing%20You%20and%20Qiang%20Huang%20and%20Lingyu%20Li%20and%20Xiaojun%20Chang%20and%20Jun%20Yu&entry.1292438233=Multimodal%20Summarization%20%28MMS%29%20aims%20to%20generate%20concise%20textual%20summaries%20by%20understanding%20and%20integrating%20information%20across%20videos%2C%20transcripts%2C%20and%20images.%20However%2C%20existing%20approaches%20still%20suffer%20from%20three%20main%20challenges%3A%20%281%29%20reliance%20on%20domain-specific%20supervision%2C%20%282%29%20implicit%20fusion%20with%20weak%20cross-modal%20grounding%2C%20and%20%283%29%20flat%20temporal%20modeling%20without%20event%20transitions.%20To%20address%20these%20issues%2C%20we%20introduce%20%2A%2ACoE%2A%2A%2C%20a%20training-free%20MMS%20framework%20that%20performs%20structured%20reasoning%20through%20a%20%2A%2AChain-of-Events%2A%2A%20guided%20by%20a%20Hierarchical%20Event%20Graph%20%28HEG%29.%20The%20HEG%20encodes%20textual%20semantics%20into%20an%20explicit%20event%20hierarchy%20that%20scaffolds%20cross-modal%20grounding%20and%20temporal%20reasoning.%20G {"title": "ECLARE: Efficient cross-planar learning for anisotropic resolution enhancement", "author": "Samuel W. Remedios and Shuwen Wei and Shuo Han and Jinwei Zhang and Aaron Carass and Kurt G. Schilling and Dzung L. Pham and Jerry L. Prince and Blake E. Dewey", "abstract": "In clinical imaging, magnetic resonance (MR) image volumes are often acquired as stacks of 2D slices with decreased scan times, improved signal-to-noise ratio, and image contrasts unique to 2D MR pulse sequences. While this is sufficient for clinical evaluation, automated algorithms designed for 3D analysis perform poorly on multi-slice 2D MR volumes, especially those with thick slices and gaps between slices. Super-resolution (SR) methods aim to address this problem, but previous methods do not address all of the following: slice profile shape estimation, slice gap, domain shift, and non-integer or arbitrary upsampling factors. In this paper, we propose ECLARE (Efficient Cross-planar Learning for Anisotropic Resolution Enhancement), a self-SR method that addresses each of these factors. ECLARE uses a slice profile estimated from the multi-slice 2D MR volume, trains a network to learn the mapping from low-resolution to high-resolution in-plane patches from the same volume, and performs SR with anti-aliasing. We compared ECLARE to cubic B-spline interpolation, SMORE, and other contemporary SR methods. We used realistic and representative simulations so that quantitative performance against ground truth can be computed, and ECLARE outperformed all other methods in both signal recovery and downstream tasks. Importantly, as ECLARE does not use external training data it cannot suffer from domain shift between training and testing. Our code is open-source and available at https://www.github.com/sremedios/eclare.", "link": "http://arxiv.org/abs/2503.11787v3", "date": "2026-03-06", "relevancy": 2.6019, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5335}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5138}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5138}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ECLARE%3A%20Efficient%20cross-planar%20learning%20for%20anisotropic%20resolution%20enhancement&body=Title%3A%20ECLARE%3A%20Efficient%20cross-planar%20learning%20for%20anisotropic%20resolution%20enhancement%0AAuthor%3A%20Samuel%20W.%20Remedios%20and%20Shuwen%20Wei%20and%20Shuo%20Han%20and%20Jinwei%20Zhang%20and%20Aaron%20Carass%20and%20Kurt%20G.%20Schilling%20and%20Dzung%20L.%20Pham%20and%20Jerry%20L.%20Prince%20and%20Blake%20E.%20Dewey%0AAbstract%3A%20In%20clinical%20imaging%2C%20magnetic%20resonance%20%28MR%29%20image%20volumes%20are%20often%20acquired%20as%20stacks%20of%202D%20slices%20with%20decreased%20scan%20times%2C%20improved%20signal-to-noise%20ratio%2C%20and%20image%20contrasts%20unique%20to%202D%20MR%20pulse%20sequences.%20While%20this%20is%20sufficient%20for%20clinical%20evaluation%2C%20automated%20algorithms%20designed%20for%203D%20analysis%20perform%20poorly%20on%20multi-slice%202D%20MR%20volumes%2C%20especially%20those%20with%20thick%20slices%20and%20gaps%20between%20slices.%20Super-resolution%20%28SR%29%20methods%20aim%20to%20address%20this%20problem%2C%20but%20previous%20methods%20do%20not%20address%20all%20of%20the%20following%3A%20slice%20profile%20shape%20estimation%2C%20slice%20gap%2C%20domain%20shift%2C%20and%20non-integer%20or%20arbitrary%20upsampling%20factors.%20In%20this%20paper%2C%20we%20propose%20ECLARE%20%28Efficient%20Cross-planar%20Learning%20for%20Anisotropic%20Resolution%20Enhancement%29%2C%20a%20self-SR%20method%20that%20addresses%20each%20of%20these%20factors.%20ECLARE%20uses%20a%20slice%20profile%20estimated%20from%20the%20multi-slice%202D%20MR%20volume%2C%20trains%20a%20network%20to%20learn%20the%20mapping%20from%20low-resolution%20to%20high-resolution%20in-plane%20patches%20from%20the%20same%20volume%2C%20and%20performs%20SR%20with%20anti-aliasing.%20We%20compared%20ECLARE%20to%20cubic%20B-spline%20interpolation%2C%20SMORE%2C%20and%20other%20contemporary%20SR%20methods.%20We%20used%20realistic%20and%20representative%20simulations%20so%20that%20quantitative%20performance%20against%20ground%20truth%20can%20be%20computed%2C%20and%20ECLARE%20outperformed%20all%20other%20methods%20in%20both%20signal%20recovery%20and%20downstream%20tasks.%20Importantly%2C%20as%20ECLARE%20does%20not%20use%20external%20training%20data%20it%20cannot%20suffer%20from%20domain%20shift%20between%20training%20and%20testing.%20Our%20code%20is%20open-source%20and%20available%20at%20https%3A//www.github.com/sremedios/eclare.%0ALink%3A%20http%3A//arxiv.org/abs/2503.11787v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DECLARE%253A%2520Efficient%2520cross-planar%2520learning%2520for%2520anisotropic%2520resolution%2520enhancement%26entry.906535625%3DSamuel%2520W.%2520Remedios%2520and%2520Shuwen%2520Wei%2520and%2520Shuo%2520Han%2520and%2520Jinwei%2520Zhang%2520and%2520Aaron%2520Carass%2520and%2520Kurt%2520G.%2520Schilling%2520and%2520Dzung%2520L.%2520Pham%2520and%2520Jerry%2520L.%2520Prince%2520and%2520Blake%2520E.%2520Dewey%26entry.1292438233%3DIn%2520clinical%2520imaging%252C%2520magnetic%2520resonance%2520%2528MR%2529%2520image%2520volumes%2520are%2520often%2520acquired%2520as%2520stacks%2520of%25202D%2520slices%2520with%2520decreased%2520scan%2520times%252C%2520improved%2520signal-to-noise%2520ratio%252C%2520and%2520image%2520contrasts%2520unique%2520to%25202D%2520MR%2520pulse%2520sequences.%2520While%2520this%2520is%2520sufficient%2520for%2520clinical%2520evaluation%252C%2520automated%2520algorithms%2520designed%2520for%25203D% {"title": "SPINE: Token-Selective Test-Time Reinforcement Learning with Entropy-Band Regularization", "author": "Jianghao Wu and Yasmeen George and Jin Ye and Yicheng Wu and Daniel F. Schmidt and Jianfei Cai", "abstract": "Large language models (LLMs) and multimodal LLMs (MLL-Ms) excel at chain-of-thought reasoning but face distribution shift at test-time and a lack of verifiable supervision. Recent test-time reinforcement learning (TTRL) methods derive label-free pseudo-rewards from self-consistency voting over sampled trajectories, yet they often collapse: the majority-vote reward prevails, responses shorten, and Pass@1 declines. We trace this to uniform sequence updates in which most tokens are low-entropy followers, while a small high-entropy subset determines the reasoning branches. Thus we propose \\method, a token-selective test-time reinforcement learning framework that (i) performs distribution-aware forking-token selection to update only decision-critical branch points, and (ii) applies a robust entropy-band regularizer at those tokens to prevent premature collapse and suppress noisy drift. \\method plugs into GRPO-style objectives (optionally with a KL anchor) and requires neither labels nor reward models. Across eight benchmarks spanning multimodal VQA, text-only reasoning, \\method consistently improves Pass@1 over TTRL while avoiding response-length collapse and yielding more stable training dynamics on both LLM and MLLM backbones. These results indicate that aligning updates with chain-of-thought branch points is a simple and label-free mechanism for stable and effective test-time adaptation in reasoning models. Code will be released.", "link": "http://arxiv.org/abs/2511.17938v2", "date": "2026-03-06", "relevancy": 2.542, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5194}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5049}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5009}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPINE%3A%20Token-Selective%20Test-Time%20Reinforcement%20Learning%20with%20Entropy-Band%20Regularization&body=Title%3A%20SPINE%3A%20Token-Selective%20Test-Time%20Reinforcement%20Learning%20with%20Entropy-Band%20Regularization%0AAuthor%3A%20Jianghao%20Wu%20and%20Yasmeen%20George%20and%20Jin%20Ye%20and%20Yicheng%20Wu%20and%20Daniel%20F.%20Schmidt%20and%20Jianfei%20Cai%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20and%20multimodal%20LLMs%20%28MLL-Ms%29%20excel%20at%20chain-of-thought%20reasoning%20but%20face%20distribution%20shift%20at%20test-time%20and%20a%20lack%20of%20verifiable%20supervision.%20Recent%20test-time%20reinforcement%20learning%20%28TTRL%29%20methods%20derive%20label-free%20pseudo-rewards%20from%20self-consistency%20voting%20over%20sampled%20trajectories%2C%20yet%20they%20often%20collapse%3A%20the%20majority-vote%20reward%20prevails%2C%20responses%20shorten%2C%20and%20Pass%401%20declines.%20We%20trace%20this%20to%20uniform%20sequence%20updates%20in%20which%20most%20tokens%20are%20low-entropy%20followers%2C%20while%20a%20small%20high-entropy%20subset%20determines%20the%20reasoning%20branches.%20Thus%20we%20propose%20%5Cmethod%2C%20a%20token-selective%20test-time%20reinforcement%20learning%20framework%20that%20%28i%29%20performs%20distribution-aware%20forking-token%20selection%20to%20update%20only%20decision-critical%20branch%20points%2C%20and%20%28ii%29%20applies%20a%20robust%20entropy-band%20regularizer%20at%20those%20tokens%20to%20prevent%20premature%20collapse%20and%20suppress%20noisy%20drift.%20%5Cmethod%20plugs%20into%20GRPO-style%20objectives%20%28optionally%20with%20a%20KL%20anchor%29%20and%20requires%20neither%20labels%20nor%20reward%20models.%20Across%20eight%20benchmarks%20spanning%20multimodal%20VQA%2C%20text-only%20reasoning%2C%20%5Cmethod%20consistently%20improves%20Pass%401%20over%20TTRL%20while%20avoiding%20response-length%20collapse%20and%20yielding%20more%20stable%20training%20dynamics%20on%20both%20LLM%20and%20MLLM%20backbones.%20These%20results%20indicate%20that%20aligning%20updates%20with%20chain-of-thought%20branch%20points%20is%20a%20simple%20and%20label-free%20mechanism%20for%20stable%20and%20effective%20test-time%20adaptation%20in%20reasoning%20models.%20Code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2511.17938v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPINE%253A%2520Token-Selective%2520Test-Time%2520Reinforcement%2520Learning%2520with%2520Entropy-Band%2520Regularization%26entry.906535625%3DJianghao%2520Wu%2520and%2520Yasmeen%2520George%2520and%2520Jin%2520Ye%2520and%2520Yicheng%2520Wu%2520and%2520Daniel%2520F.%2520Schmidt%2520and%2520Jianfei%2520Cai%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520and%2520multimodal%2520LLMs%2520%2528MLL-Ms%2529%2520excel%2520at%2520chain-of-thought%2520reasoning%2520but%2520face%2520distribution%2520shift%2520at%2520test-time%2520and%2520a%2520lack%2520of%2520verifiable%2520supervision.%2520Recent%2520test-time%2520reinforcement%2520learning%2520%2528TTRL%2529%2520methods%2520derive%2520label-free%2520pseudo-rewards%2520from%2520self-consistency%2520voting%2520over%2520sampled%2520trajectories%252C%2520yet%2520they%2520often%2520collapse%253A%2520the%2520majority-vote%2520reward%2520prevails%252C%2520responses%2520shorten%252C%2520and%2520Pass%25401%2520declines.%2520We%2520trace%2520this%2520to%2520uniform%2520sequence%2520updates%2520in%2520which%2520most%2520tokens%2520are%2520low-entropy%2520followers%252C%2520while%2520a%2520small%2520high-entropy%2520subset%2520determines%2 {"title": "Photo3D: Advancing Photorealistic 3D Generation through Structure-Aligned Detail Enhancement", "author": "Xinyue Liang and Zhinyuan Ma and Lingchen Sun and Yanjun Guo and Lei Zhang", "abstract": "Although recent 3D-native generators have made great progress in synthesizing reliable geometry, they still fall short in achieving realistic appearances. A key obstacle lies in the lack of diverse and high-quality real-world 3D assets with rich texture details, since capturing such data is intrinsically difficult due to the diverse scales of scenes, non-rigid motions of objects, and the limited precision of 3D scanners. We introduce Photo3D, a framework for advancing photorealistic 3D generation, which is driven by the image data generated by the GPT-4o-Image model. Considering that the generated images can distort 3D structures due to their lack of multi-view consistency, we design a structure-aligned multi-view synthesis pipeline and construct a detail-enhanced multi-view dataset paired with 3D geometry. Building on it, we present a realistic detail enhancement scheme that leverages perceptual feature adaptation and semantic structure matching to enforce appearance consistency with realistic details while preserving the structural consistency with the 3D-native geometry. Our scheme is general to different 3D-native generators, and we present dedicated training strategies to facilitate the optimization of geometry-texture coupled and decoupled 3D-native generation paradigms. Experiments demonstrate that Photo3D generalizes well across diverse 3D-native generation paradigms and achieves state-of-the-art photorealistic 3D generation performance.", "link": "http://arxiv.org/abs/2512.08535v3", "date": "2026-03-06", "relevancy": 2.5261, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6354}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6354}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.612}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Photo3D%3A%20Advancing%20Photorealistic%203D%20Generation%20through%20Structure-Aligned%20Detail%20Enhancement&body=Title%3A%20Photo3D%3A%20Advancing%20Photorealistic%203D%20Generation%20through%20Structure-Aligned%20Detail%20Enhancement%0AAuthor%3A%20Xinyue%20Liang%20and%20Zhinyuan%20Ma%20and%20Lingchen%20Sun%20and%20Yanjun%20Guo%20and%20Lei%20Zhang%0AAbstract%3A%20Although%20recent%203D-native%20generators%20have%20made%20great%20progress%20in%20synthesizing%20reliable%20geometry%2C%20they%20still%20fall%20short%20in%20achieving%20realistic%20appearances.%20A%20key%20obstacle%20lies%20in%20the%20lack%20of%20diverse%20and%20high-quality%20real-world%203D%20assets%20with%20rich%20texture%20details%2C%20since%20capturing%20such%20data%20is%20intrinsically%20difficult%20due%20to%20the%20diverse%20scales%20of%20scenes%2C%20non-rigid%20motions%20of%20objects%2C%20and%20the%20limited%20precision%20of%203D%20scanners.%20We%20introduce%20Photo3D%2C%20a%20framework%20for%20advancing%20photorealistic%203D%20generation%2C%20which%20is%20driven%20by%20the%20image%20data%20generated%20by%20the%20GPT-4o-Image%20model.%20Considering%20that%20the%20generated%20images%20can%20distort%203D%20structures%20due%20to%20their%20lack%20of%20multi-view%20consistency%2C%20we%20design%20a%20structure-aligned%20multi-view%20synthesis%20pipeline%20and%20construct%20a%20detail-enhanced%20multi-view%20dataset%20paired%20with%203D%20geometry.%20Building%20on%20it%2C%20we%20present%20a%20realistic%20detail%20enhancement%20scheme%20that%20leverages%20perceptual%20feature%20adaptation%20and%20semantic%20structure%20matching%20to%20enforce%20appearance%20consistency%20with%20realistic%20details%20while%20preserving%20the%20structural%20consistency%20with%20the%203D-native%20geometry.%20Our%20scheme%20is%20general%20to%20different%203D-native%20generators%2C%20and%20we%20present%20dedicated%20training%20strategies%20to%20facilitate%20the%20optimization%20of%20geometry-texture%20coupled%20and%20decoupled%203D-native%20generation%20paradigms.%20Experiments%20demonstrate%20that%20Photo3D%20generalizes%20well%20across%20diverse%203D-native%20generation%20paradigms%20and%20achieves%20state-of-the-art%20photorealistic%203D%20generation%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2512.08535v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhoto3D%253A%2520Advancing%2520Photorealistic%25203D%2520Generation%2520through%2520Structure-Aligned%2520Detail%2520Enhancement%26entry.906535625%3DXinyue%2520Liang%2520and%2520Zhinyuan%2520Ma%2520and%2520Lingchen%2520Sun%2520and%2520Yanjun%2520Guo%2520and%2520Lei%2520Zhang%26entry.1292438233%3DAlthough%2520recent%25203D-native%2520generators%2520have%2520made%2520great%2520progress%2520in%2520synthesizing%2520reliable%2520geometry%252C%2520they%2520still%2520fall%2520short%2520in%2520achieving%2520realistic%2520appearances.%2520A%2520key%2520obstacle%2520lies%2520in%2520the%2520lack%2520of%2520diverse%2520and%2520high-quality%2520real-world%25203D%2520assets%2520with%2520rich%2520texture%2520details%252C%2520since%2520capturing%2520such%2520data%2520is%2520intrinsically%2520difficult%2520due%2520to%2520the%2520diverse%2520scales%2520of%2520scenes%252C%2520non-rigid%2520motions%2520of%2520objects%252C%2520and%2520the%2520limited%2520precision%2520of%25203D%2520scanners.%2520We%2520introduce%2520Photo3D%252C%2520a%2520framework%2520for%2520advancing%2520photorealistic%25203D%2520generation%252C%2520which%2520is%2520driven%2520by%2520the%2520image%2520data%2520generated%2520by%2520the%2520GPT-4o-Image%2520model.%2520Considering%2520that%2520the%2520generated%2520images%2520can% {"title": "Contrastive-to-Self-Supervised: A Two-Stage Framework for Script Similarity Learning", "author": "Claire Roman and Philippe Meyer", "abstract": "Learning similarity metrics for glyphs and writing systems faces a fundamental challenge: while individual graphemes within invented alphabets can be reliably labeled, the historical relationships between different scripts remain uncertain and contested. We propose a two-stage framework that addresses this epistemological constraint. First, we train an encoder with contrastive loss on labeled invented alphabets, establishing a teacher model with robust discriminative features. Second, we extend to historically attested scripts through teacher-student distillation, where the student learns unsupervised representations guided by the teacher's knowledge but free to discover latent cross-script similarities. The asymmetric setup enables the student to learn deformation-invariant embeddings while inheriting discriminative structure from clean examples. Our approach bridges supervised contrastive learning and unsupervised discovery, enabling both hard boundaries between distinct systems and soft similarities reflecting potential historical influences. Experiments on diverse writing systems demonstrate effective few-shot glyph recognition and meaningful script clustering without requiring ground-truth evolutionary relationships.", "link": "http://arxiv.org/abs/2603.06180v1", "date": "2026-03-06", "relevancy": 2.5254, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5473}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4877}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4802}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Contrastive-to-Self-Supervised%3A%20A%20Two-Stage%20Framework%20for%20Script%20Similarity%20Learning&body=Title%3A%20Contrastive-to-Self-Supervised%3A%20A%20Two-Stage%20Framework%20for%20Script%20Similarity%20Learning%0AAuthor%3A%20Claire%20Roman%20and%20Philippe%20Meyer%0AAbstract%3A%20Learning%20similarity%20metrics%20for%20glyphs%20and%20writing%20systems%20faces%20a%20fundamental%20challenge%3A%20while%20individual%20graphemes%20within%20invented%20alphabets%20can%20be%20reliably%20labeled%2C%20the%20historical%20relationships%20between%20different%20scripts%20remain%20uncertain%20and%20contested.%20We%20propose%20a%20two-stage%20framework%20that%20addresses%20this%20epistemological%20constraint.%20First%2C%20we%20train%20an%20encoder%20with%20contrastive%20loss%20on%20labeled%20invented%20alphabets%2C%20establishing%20a%20teacher%20model%20with%20robust%20discriminative%20features.%20Second%2C%20we%20extend%20to%20historically%20attested%20scripts%20through%20teacher-student%20distillation%2C%20where%20the%20student%20learns%20unsupervised%20representations%20guided%20by%20the%20teacher%27s%20knowledge%20but%20free%20to%20discover%20latent%20cross-script%20similarities.%20The%20asymmetric%20setup%20enables%20the%20student%20to%20learn%20deformation-invariant%20embeddings%20while%20inheriting%20discriminative%20structure%20from%20clean%20examples.%20Our%20approach%20bridges%20supervised%20contrastive%20learning%20and%20unsupervised%20discovery%2C%20enabling%20both%20hard%20boundaries%20between%20distinct%20systems%20and%20soft%20similarities%20reflecting%20potential%20historical%20influences.%20Experiments%20on%20diverse%20writing%20systems%20demonstrate%20effective%20few-shot%20glyph%20recognition%20and%20meaningful%20script%20clustering%20without%20requiring%20ground-truth%20evolutionary%20relationships.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06180v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9 0recognition%2520and%2520meaningful%2520script%2520clustering%2520without%2520requiring%2520ground-truth%2520evolutionary%2520relationships.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06180v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Contrastive-to-Self-Supervised%3A%20A%20Two-Stage%20Framework%20for%20Script%20Similarity%20Learning&entry.906535625=Claire%20Roman%20and%20Philippe%20Meyer&entry.1292438233=Learning%20similarity%20metrics%20for%20glyphs%20and%20writing%20systems%20faces%20a%20fundamental%20challenge%3A%20while%20individual%20graphemes%20within%20invented%20alphabets%20can%20be%20reliably%20labeled%2C%20the%20historical%20relationships%20between%20different%20scripts%20remain%20uncertain%20and%20contested.%20We%20propose%20a%20two-stage%20framework%20that%20addresses%20this%20epistemological%20constraint.%20First%2C%20we%20train%20an%20encoder%20with%20contrastive%20loss%20on%20labeled%20invented%20alphabets%2C%20establishing%20a%20teacher%20model%20with%20robust%20discriminative%20features.%20Second%2C%20we%20extend%20to%20historically%20attested%20scripts%20through%20teacher-student%20distillation%2C%20where%20the%20student%20learns%20unsupervised%20representations%20guided%20by%20the%20teacher%27s%20knowledge%20but%20free%20to%20discover%20latent%20cross-script%20similarities.%20The%20asymmetric%20setup%20enables%20the%20student%20to%20learn%20deformation-invariant%20embeddings%20while%20inheriting%20discriminative%20structure%20from%20clean%20examples.%20Our%20approach%20bridges%20supervised%20contrastive%20learning%20and%20unsupervised%20discovery%2C%20enabling%20both%20hard%20boundaries%20between%20distinct%20systems%20and%20soft%20similarities%20reflecting%20potential%20historical%20influences.%20Experiments%20on%20diverse%20writing%20systems%20demonstrate%20effective%20few-shot%20glyph%20recognition%20and%20meaningful%20script%20clustering%20without%20requiring%20ground-truth%20evolutionary%20relationships.&entry.1838667208=http%3A//arxiv.org/abs/2603.06180v1&entry.124074799=Read"},
{"title": "Spectral/Spatial Tensor Atomic Cluster Expansion with Universal Embeddings in Cartesian Space", "author": "Zemin Xu and Wenbo Xie and P. Hu", "abstract": "Equivariant atomistic machine learning models have largely been built on spherical-tensor representations, where explicit angular-momentum coupling introduces substantial complexity and systematic extensions beyond energies and forces remain challenging, often requires problem-specific architectural choices. Here we introduce the Tensor Atomic Cluster Expansion (TACE), which unifies scalar and tensorial modeling in Cartesian and space by decomposing local environments into irreducible Cartesian tensors (ICT) constructing a controlled many-body hierarchy with atomic cluster expansion (ACE). In addition to performing ACE in the frequency domain, we propose an efficient Clebsch-Gordan-free alternative in the spatial domain. TACE provides universal invariant (e.g., fidelity tags and charges) and equivariant (e.g., external electric fields and non-collinear magnetic moments) embeddings and predicted tensorial observables are handled on equal footing and enabling explicit control at inference. We demonstrate the accuracy, stability, and efficiency across finite molecules and extended materials, including in-domain and out-of-domain benchmarks, spectra, Hessian, external-field responses, charged systems, and multi-fidelity/head training. We further show its robustness on nonequilibrium/reactive datasets and controlled scaling when extending to large foundation model datasets.", "link": "http://arxiv.org/abs/2509.14961v3", "date": "2026-03-06", "relevancy": 2.5218, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5326}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4903}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4903}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral/Spatial%20Tensor%20Atomic%20Cluster%20Expansion%20with%20Universal%20Embeddings%20in%20Cartesian%20Space&body=Title%3A%20Spectral/Spatial%20Tensor%20Atomic%20Cluster%20Expansion%20with%20Universal%20Embeddings%20in%20Cartesian%20Space%0AAuthor%3A%20Zemin%20Xu%20and%20Wenbo%20Xie%20and%20P.%20Hu%0AAbstract%3A%20Equivariant%20atomistic%20machine%20learning%20models%20have%20largely%20been%20built%20on%20spherical-tensor%20representations%2C%20where%20explicit%20angular-momentum%20coupling%20introduces%20substantial%20complexity%20and%20systematic%20extensions%20beyond%20energies%20and%20forces%20remain%20challenging%2C%20often%20requires%20problem-specific%20architectural%20choices.%20Here%20we%20introduce%20the%20Tensor%20Atomic%20Cluster%20Expansion%20%28TACE%29%2C%20which%20unifies%20scalar%20and%20tensorial%20modeling%20in%20Cartesian%20and%20space%20by%20decomposing%20local%20environments%20into%20irreducible%20Cartesian%20tensors%20%28ICT%29%20constructing%20a%20controlled%20many-body%20hierarchy%20with%20atomic%20cluster%20expansion%20%28ACE%29.%20In%20addition%20to%20performing%20ACE%20in%20the%20frequency%20domain%2C%20we%20propose%20an%20efficient%20Clebsch-Gordan-free%20alternative%20in%20the%20spatial%20domain.%20TACE%20provides%20universal%20invariant%20%28e.g.%2C%20fidelity%20tags%20and%20charges%29%20and%20equivariant%20%28e.g.%2C%20external%20electric%20fields%20and%20non-collinear%20magnetic%20moments%29%20embeddings%20and%20predicted%20tensorial%20observables%20are%20handled%20on%20equal%20footing%20and%20enabling%20explicit%20control%20at%20inference.%20We%20demonstrate%20the%20accuracy%2C%20stability%2C%20and%20efficiency%20across%20finite%20molecules%20and%20extended%20materials%2C%20including%20in-domain%20and%20out-of-domain%20benchmarks%2C%20spectra%2C%20Hessian%2C%20external-fiel {"title": "Prompt Group-Aware Training for Robust Text-Guided Nuclei Segmentation", "author": "Yonghuang Wu and Zhenyang Liang and Wenwen Zeng and Xuan Xie and Jinhua Yu", "abstract": "Foundation models such as Segment Anything Model 3 (SAM3) enable flexible text-guided medical image segmentation, yet their predictions remain highly sensitive to prompt formulation. Even semantically equivalent descriptions can yield inconsistent masks, limiting reliability in clinical and pathology workflows. We reformulate prompt sensitivity as a group-wise consistency problem. Semantically related prompts are organized into \\emph{prompt groups} sharing the same ground-truth mask, and a prompt group-aware training framework is introduced for robust text-guided nuclei segmentation. The approach combines (i) a quality-guided group regularization that leverages segmentation loss as an implicit ranking signal, and (ii) a logit-level consistency constraint with a stop-gradient strategy to align predictions within each group. The method requires no architectural modification and leaves inference unchanged. Extensive experiments on multi-dataset nuclei benchmarks show consistent gains under textual prompting and markedly reduced performance variance across prompt quality levels. On six zero-shot cross-dataset tasks, our method improves Dice by an average of 2.16 points. These results demonstrate improved robustness and generalization for vision-language segmentation in computational pathology.", "link": "http://arxiv.org/abs/2603.06384v1", "date": "2026-03-06", "relevancy": 2.4904, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4997}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4973}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", te%20improved%20robustness%20and%20generalization%20for%20vision-language%20segmentation%20in%20computational%20pathology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06384v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrompt%2520Group-Aware%2520Training%2520for%2520Robust%2520Text-Guided%2520Nuclei%2520Segmentation%26entry.906535625%3DYonghuang%2520Wu%2520and%2520Zhenyang%2520Liang%2520and%2520Wenwen%2520Zeng%2520and%2520Xuan%2520Xie%2520and%2520Jinhua%2520Yu%26entry.1292438233%3DFoundation%2520models%2520such%2520as%2520Segment%2520Anything%2520Model%25203%2520%2528SAM3%2529%2520enable%2520flexible%2520text-guided%2520medical%2520image%2520segmentation%252C%2520yet%2520their%2520predictions%2520remain%2520highly%2520sensitive%2520to%2520prompt%2520formulation.%2520Even%2520semantically%2520equivalent%2520descriptions%2520can%2520yield%2520inconsistent%2520masks%252C%2520limiting%2520reliability%2520in%2520clinical%2520and%2520pathology%2520workflows.%2520We%2520reformulate%2520prompt%2520sensitivity%2520as%2520a%2520group-wise%2520consistency%2520problem.%2520Semantically%2520related%2520prompts%2520are%2520organized%2520into%2520%255Cemph%257Bprompt%2520groups%257D%2520sharing%2520the%2520same%2520ground-truth%2520mask%252C%2520and%2520a%2520prompt%2520group-aware%2520training%2520framework%2520is%2520introduced%2520for%2520robust%2520text-guided%2520nuclei%2520segmentation.%2520The%2520approach%2520combines%2520%2528i%2529%2520a%2520quality-guided%2520group%2520regularization%2520that%2520leverages%2520segmentation%2520loss%2520as%2520an%2520implicit%2520ranking%2520signal%252C%2520and%2520%2528ii%2529%2520a%2520logit-level%2520consistency%2520constraint%2520with%2520a%2520stop-gradient%2520strategy%2520to%2520align%2520predictions%2520within%2520each%2520group.%2520The%2520method%2520requires%2520no%2520architectural%2520modification%2520and%2520leaves%2520inference%2520uncha {"title": "AV-Unified: A Unified Framework for Audio-visual Scene Understanding", "author": "Guangyao Li and Xin Wang and Wenwu Zhu", "abstract": "When humans perceive the world, they naturally integrate multiple audio-visual tasks within dynamic, real-world scenes. However, current works such as event localization, parsing, segmentation and question answering are mostly explored individually, making it challenging to comprehensively understand complex audio-visual scenes and explore inter-task relationships. Hence, we propose \\textbf{AV-Unified}, a unified framework that enables joint learning across a wide range of audio-visual scene understanding tasks. AV-Unified standardizes the diverse input-output formats of each task and incorporates a multi-scale spatiotemporal perception network to effectively capture audio-visual associations. Specifically, we unify the inputs and outputs of all supported tasks by converting them into sequences of discrete tokens, establishing a shared representation that allows a single architecture to be trained jointly across heterogeneous varied datasets. Considering the varying temporal granularity of audio-visual events, a multi-scale temporal perception module is designed to capture key cues. Meanwhile, to overcome the lack of auditory supervision in the visual domain, we design a cross-modal guidance-based spatial perception module that models spatial audio-visual associations. Furthermore, task-specific text prompts are employed to enhance the model's adaptability and task-awareness. Extensive experiments on benchmark datasets (e.g., AVE, LLP, MUSIC-AVQA, VGG-SS and AVS) demonstrate the effectiveness of AV-Unified across temporal, spatial, and spatiotemporal tasks.", "link": "http://arxiv.org/abs/2603.06530v1", "date": "2026-03-06", "relevancy": 2.4855, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6291}, {"titl %20module%20is%20designed%20to%20capture%20key%20cues.%20Meanwhile%2C%20to%20overcome%20the%20lack%20of%20auditory%20supervision%20in%20the%20visual%20domain%2C%20we%20design%20a%20cross-modal%20guidance-based%20spatial%20perception%20module%20that%20models%20spatial%20audio-visual%20associations.%20Furthermore%2C%20task-specific%20text%20prompts%20are%20employed%20to%20enhance%20the%20model%27s%20adaptability%20and%20task-awareness.%20Extensive%20experiments%20on%20benchmark%20datasets%20%28e.g.%2C%20AVE%2C%20LLP%2C%20MUSIC-AVQA%2C%20VGG-SS%20and%20AVS%29%20demonstrate%20the%20effectiveness%20of%20AV-Unified%20across%20temporal%2C%20spatial%2C%20and%20spatiotemporal%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06530v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAV-Unified%253A%2520A%2520Unified%2520Framework%2520for%2520Audio-visual%2520Scene%2520Understanding%26entry.906535625%3DGuangyao%2520Li%2520and%2520Xin%2520Wang%2520and%2520Wenwu%2520Zhu%26entry.1292438233%3DWhen%2520humans%2520perceive%2520the%2520world%252C%2520they%2520naturally%2520integrate%2520multiple%2520audio-visual%2520tasks%2520within%2520dynamic%252C%2520real-world%2520scenes.%2520However%252C%2520current%2520works%2520such%2520as%2520event%2520localization%252C%2520parsing%252C%2520segmentation%2520and%2520question%2520answering%2520are%2520mostly%2520explored%2520individually%252C%2520making%2520it%2520challenging%2520to%2520comprehensively%2520understand%2520complex%2520audio-visual%2520scenes%2520and%2520explore%2520inter-task%2520relationships.%2520Hence%252C%2520we%2520propose%2520%255Ctextbf%257BAV-Unified%257D%252C%2520a%2520unified%2520framework%2520that%2520enables%2520joint%2520learning%2520across%2520a%2520wide%2520range%2520of%2520audio-visual%2520scene%2520understanding%2520tasks.%2520AV-Unified%2520standardizes%2520the%2520diverse%2520input-output%2520formats%2520of%2520each%2520task%252 {"title": "HiPP-Prune: Hierarchical Preference-Conditioned Structured Pruning for Vision-Language Models", "author": "Lincen Bai and Hedi Tabia and Raul Santos-Rodriguez", "abstract": "Pruning vision-language models (VLMs) for efficient deployment is challenging because compression can affect not only task utility but also visual grounding, often amplifying object hallucinations even at the same sparsity level. We present HiPP-Prune, a hierarchical preference-conditioned structured pruning framework that treats pruning as conditional resource allocation under multiple objectives. HiPP-Prune makes plan-level decisions: a single policy invocation outputs a global pruning blueprint by factorizing decisions into an overall sparsity budget and a layer-wise allocation, enabling queryable trade-offs via a user-specified preference vector. To account for VLM-specific failure modes, our policy state integrates a visual sensitivity signal derived from attention flow between vision tokens and language hidden states, discouraging over-pruning of vision-critical layers that facilitate cross-modal fusion. We optimize pruning plans with plan-level Group Relative Policy Optimization (GRPO) under a multi-objective return that combines task utility, hallucination robustness (POPE), compression, and a synaptic-flow-inspired stability proxy to reduce unproductive exploration in high-sparsity regimes. Experiments on LLaVA with POPE and ScienceQA demonstrate that HiPP-Prune discovers diverse non-dominated pruning plans and provides controllable robustness--utility trade-offs under matched sparsity budgets.", "link": "http://arxiv.org/abs/2603.06270v1", "date": "2026-03-06", "relevancy": 2.4739, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.518}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.518}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4484}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiPP-Prune%3A%20Hierarchical%20Preference-Conditioned%20Structured%20Pruning%20for%20Vision-Language%20Models&body=Title%3A%20HiPP-Prune%3A%20Hierarchical%20Preference-Conditioned%20Structured%20Pruning%20for%20Vision-Language%20Models%0AAuthor%3A%20Lincen%20Bai%20and%20Hedi%20Tabia%20and%20Raul%20Santos-Rodriguez%0AAbstract%3A%20Pruning%20vision-language%20models%20%28VLMs%29%20for%20efficient%20deployment%20is%20challenging%20because%20compression%20can%20affect%20not%20only%20task%20utility%20but%20also%20visual%20grounding%2C%20often%20amplifying%20object%20hallucinations%20even%20at%20the%20same%20sparsity%20level.%20We%20present%20HiPP-Prune%2C%20a%20hierarchical%20preference-conditioned%20structured%20pruning%20framework%20that%20treats%20pruning%20as%20conditional%20resource%20allocation%20under%20multiple%20objectives.%20HiPP-Prune%20makes%20plan-level%20decisions%3A%20a%20single%20policy%20invocation%20outputs%20a%20global%20pruning%20blueprint%20by%20factorizing%20decisions%20into%20an%20overall%20sparsity%20budget%20and%20a%20layer-wise%20allocation%2C%20enabling%20queryable%20trade-offs%20via%20a%20user-specified%20preference%20vector.%20To%20account%20for%20VLM-specific%20failure%20modes%2C%20our%20policy%20state%20integrates%20a%20visual%20sensitivity%20signal%20derived%20from%20attention%20flow%20between%20vision%20tokens%20and%20language%20hidden%20states%2C%20discouraging%20over-pruning%20of%20vision-critical%20layers%20that%20facilitate%20cross-modal%20fusion.%20We%20optimize%20pruning%20plans%20with%20plan-level%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20under%20a%20multi-objective%20return%20that%20combines%20task%20utility%2C%20hallucination%20robustness%20%28POPE%29%2C%20compression%2C%20and%20a%20synaptic-flow-inspired%20stability%20proxy%20to%20reduce%20unproductive%20exploration%20in%20high-sparsity%20regimes.%20Experiments%20on%20LLaVA%20with%20POPE%20and%20ScienceQA%20demonstrate%20that%20HiPP-Prune%20discovers%20diverse%20non-dominated%20pruning%20plans%20and%20provides%20controllable%20robustness--utility%20trade-offs%20under%20matched%20sparsity%20budgets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06270v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiPP-Prune%253A%2520Hierarchical%2520Preference-Conditioned%2520Structured%2520Pruning%2520for%2520Vision-Language%2520Models%26entry.906535625%3DLincen%2520Bai%2520and%2520Hedi%2520Tabia%2520and%2520Raul%2520Santos-Rodriguez%26entry.1292438233%3DPruning%2520vision-language%2520models%2520%2528VLMs%2529%2520for%2520efficient%2520deployment%2520is%2520challenging%2520because%2520compression%2520can%2520affect%2520not%2520only%2520task%2520utility%2520but%2520also%2520visual%2520grounding%252C%2520often%2520amplifying%2520object%2520hallucinations%2520even%2520at%2520the%2520same%2520sparsity%2520level.%2520We%2520present%2520HiPP-Prune%252C%2520a%2520hierarchical%2520preference-conditioned%2520structured%2520pruning%2520framework%2520that%2520treats%2520pruning%2520as%2520conditional%2520resource%2520allocation%2520under%2520multiple%2520objectives.%2520HiPP-Prune%2520makes%2520plan-level%2520decisions%253A%2520a%2520single%2520policy%2520invocation%2520outputs%2520a%2520global%2520pruning%2520blueprint%2520by%2520factorizing%2520decisions%2520into%2520an%2520overall%2520sparsity%2520budget%2520and%2520a%2520layer-wise%2520allocation%252C%2520enabling%2520queryable%2520trade-offs%2520via%2520a%2520user-specified%2520preference%2520vector.%2520To%2520account%2520for%2520VLM-specific%2520failure%2520modes%252C%2520our%2520policy%2520state%2520integrates%2520a%2520visual%2520sensitivity%2520signal%2520derive {"title": "FreeOcc: Training-free Panoptic Occupancy Prediction via Foundation Models", "author": "Andrew Caunes and Thierry Chateau and Vincent Fremont", "abstract": "Semantic and panoptic occupancy prediction for road scene analysis provides a dense 3D representation of the ego vehicle's surroundings. Current camera-only approaches typically rely on costly dense 3D supervision or require training models on data from the target domain, limiting deployment in unseen environments. We propose FreeOcc, a training-free pipeline that leverages pretrained foundation models to recover both semantics and geometry from multi-view images. FreeOcc extracts per-view panoptic priors with a promptable foundation segmentation model and prompt-to-taxonomy rules, and reconstructs metric 3D points with a reconstruction foundation model. Depth- and confidence- aware filtering lifts reliable labels into 3D, which are fused over time and voxelized with a deterministic refinement stack. For panoptic occupancy, instances are recovered by fitting and merging robust current-view 3D box candidates, enabling instance-aware occupancy without any learned 3D model. On Occ3D-nuScenes, FreeOcc achieves 16.9 mIoU and 16.5 RayIoU train-free, on par with state-of-the-art weakly supervised methods. When employed as a pseudo-label generation pipeline for training downstream models, it achieves 21.1 RayIoU, surpassing the previous state-of-the-art weakly supervised baseline. Furthermore, FreeOcc sets new baselines for both train-free and weakly supervised panoptic occupancy prediction, achieving 3.1 RayPQ and 3.9 RayPQ, respectively. These results highlight foundation-model-driven perception as a practical route to training-free 3D scene understanding.", "link": "http://arxiv.org/abs/2603.06166v1", "date": "2026-03-06", "relevancy": 2.468, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6211}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6211}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5964}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FreeOcc%3A%20Training-free%20Panoptic%20Occupancy%20Prediction%20via%20Foundation%20Models&body=Title%3A%20FreeOcc%3A%20Training-free%20Panoptic%20Occupancy%20Prediction%20via%20Foundation%20Models%0AAuthor%3A%20Andrew%20Caunes%20and%20Thierry%20Chateau%20and%20Vincent%20Fremont%0AAbstract%3A%20Semantic%20and%20panoptic%20occupancy%20prediction%20for%20road%20scene%20analysis%20provides%20a%20dense%203D%20representation%20of%20the%20ego%20vehicle%27s%20surroundings.%20Current%20camera-only%20approaches%20typically%20rely%20on%20costly%20dense%203D%20supervision%20or%20require%20training%20models%20on%20data%20from%20the%20target%20domain%2C%20limiting%20deployment%20in%20unseen%20environments.%20We%20propose%20FreeOcc%2C%20a%20training-free%20pipeline%20that%20leverages%20pretrained%20foundation%20models%20to%20recover%20both%20semantics%20and%20geometry%20from%20multi-view%20images.%20FreeOcc%20extracts%20per-view%20panoptic%20priors%20with%20a%20promptable%20foundation%20segmentation%20model%20and%20prompt-to-taxonomy%20rules%2C%20and%20reconstructs%20metric%203D%20points%20with%20a%20reconstruction%20foundation%20model.%20Depth-%20and%20confidence-%20aware%20filtering%20lifts%20reliable%20labels%20into%203D%2C%20which%20are%20fused%20over%20time%20and%20voxelized%20with%20a%20deterministic%20refinement%20stack.%20For%20panoptic%20occupancy%2C%20instances%20are%20recovered%20by%20fitting%20and%20merging%20robust%20current-view%203D%20box%20candidates%2C%20enabling%20instance-aware%20occupancy%20without%20any%20learned%203D%20model.%20On%20Occ3D-nuScenes%2C%20FreeOcc%20achieves%2016.9%20mIoU%20and%2016.5%20RayIoU%20train-free%2C%20on%20par%20with%20state-of-the-art%20weakly%20supervised%20methods.%20When%20employed%20as%20a%20pseudo-label%20generation%20pipeline%20for%20training%20downstream%20models%2C%20it%20achieves%2021.1%20RayIoU%2C%20surpassing%20the%20previous%20state-of-the-art%20weakly%20supervised%20baseline.%20Furthermore%2C%20FreeOcc%20sets%20new%20baselines%20for%20both%20train-free%20and%20weakly%20supervised%20panoptic%20occupancy%20prediction%2C%20achieving%203.1%20RayPQ%20and%203.9%20RayPQ%2C%20respectively.%20These%20results%20highlight%20foundation-model-driven%20perception%20as%20a%20practical%20route%20to%20training-free%203D%20scene%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06166v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFreeOcc%253A%2520Training-free%2520Panoptic%2520Occupancy%2520Prediction%2520via%2520Foundation%2520Models%26entry.906535625%3DAndrew%2520Caunes%2520and%2520Thierry%2520Chateau%2520and%2520Vincent%2520Fremont%26entry.1292438233%3DSemantic%2520and%2520panoptic%2520occupancy%2520prediction%2520for%2520road%2520scene%2520analysis%2520provides%2520a%2520dense%25203D%2520representation%2520of%2520the%2520ego%2520vehicle%2527s%2520surroundings.%2520Current%2520camera-only%2520approaches%2520typically%2520rely%2520on%2520costly%2520dense%25203D%2520supervision%2520or%2520require%2520training%2520models%2520on%2520data%2520from%2520the%2520target%2520domain%252C%2520limiting%2520deployment%2520in%2520unseen%2520environments.%2520We%2520propose%2520FreeOcc%252C%2520a%2520training-free%2520pipeline%2520that%2520leverages%2520pretrained%2520foundation%2520models%2520to%2520recover%2520both%2520semantics%2520and%2520geometry%2520from%2520multi-view%2520images.%2520FreeOcc%2520extracts%2520per-view%2520panoptic%2520priors%2520with%2520a%2520promptable%2520foundation%2520segmentation%2520model%2520and%2520pro {"title": "Polarized Direct Cross-Attention Message Passing in GNNs for Machinery Fault Diagnosis", "author": "Zongyu Shi and Laibin Zhang and Maoyin Chen", "abstract": "The reliability of safety-critical industrial systems hinges on accurate and robust fault diagnosis in rotating machinery. Conventional graph neural networks (GNNs) for machinery fault diagnosis face limitations in modeling complex dynamic interactions due to their reliance on predefined static graph structures and homogeneous aggregation schemes. To overcome these challenges, this paper introduces polarized direct cross-attention (PolaDCA), a novel relational learning framework that enables adaptive message passing through data-driven graph construction. Our approach builds upon a direct cross-attention (DCA) mechanism that dynamically infers attention weights from three semantically distinct node features (such as individual characteristics, neighborhood consensus, and neighborhood diversity) without requiring fixed adjacency matrices. Theoretical analysis establishes PolaDCA's superior noise robustness over conventional GNNs. Extensive experiments on industrial datasets (i.e., XJTUSuprgear, CWRUBearing and Three-Phase Flow Facility datasets) demonstrate state-of-the-art diagnostic accuracy and enhanced generalization under varying noise conditions, outperforming seven competitive baseline methods. The proposed framework provides an effective solution for safety-critical industrial applications.", "link": "http://arxiv.org/abs/2603.06303v1", "date": "2026-03-06", "relevancy": 2.4459, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4955}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4865}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4856}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Polarized%20Direct%20Cross-Attention%20Message%20Passing%20in%20GNNs%20for%20Machinery%20Fault%20Diagnosis&body=Title%3A%20Polarized%20Direct%20Cross-Attention%20Message%20Passing%20in%20GNNs%20for%20Machinery%20Fault%20Diagnosis%0AAuthor%3A%20Zongyu%20Shi%20and%20Laibin%20Zhang%20and%20Maoyin%20Chen%0AAbstract%3A%20The%20reliability%20of%20safety-critical%20industrial%20systems%20hinges%20on%20accurate%20and%20robust%20fault%20diagnosis%20in%20rotating%20machinery.%20Conventional%20graph%20neural%20networks%20%28GNNs%29%20for%20machinery%20fault%20diagnosis%20face%20limitations%20in%20modeling%20complex%20dynamic%20interactions%20due%20to%20their%20reliance%20on%20predefined%20static%20graph%20structures%20and%20homogeneous%20aggregation%20schemes.%20To%20overcome%20these%20challenges%2C%20this%20paper%20introduces%20polarized%20direct%20cross-attention%20%28PolaDCA%29%2C%20a%20novel%20relational%20learning%20framework%20that%20enables%20adaptive%20message%20passing%20through%20data-driven%20graph%20construction.%20Our%20approach%20builds%20upon%20a%20direct%20cross-attention%20%28DCA%29%20mechanism%20that%20dynamically%20infers%20attention%20weights%20from%20three%20semantically%20distinct%20node%20features%20%28such%20as%20individual%20characteristics%2C%20neighborhood%20consensus%2C%20and%20neighborhood%20diversity%29%20without%20requiring%20fixed%20adjacency%20matrices.%20Theoretical%20analysis%20establishes%20PolaDCA%27s%20superior%20noise%20robustness%20over%20conventional%20GNNs.%20Extensive%20experiments%20on%20industrial%20datasets%20%28i.e.%2C%20XJTUSuprgear%2C%20CWRUBearing%20and%20Three-Phase%20Flow%20Facility%20datasets%29%20demonstrate%20state-of-the-art%20diagnostic%20accuracy%20and%20enhanced%20generalization%20under%20varying%20noise%20conditions%2C%20outperforming%20seven%20competitive%20baseline%20methods.%20The%20proposed%20framework%20provides%20an%20effective%20solution%20for%20safety-critical%20industrial%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06303v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPolarized%2520Direct%2520Cross-Attention%2520Message%2520Passing%2520in%2520GNNs%2520for%2520Machinery%2520Fault%2520Diagnosis%26entry.906535625%3DZongyu%2520Shi%2520and%2520Laibin%2520Zhang%2520and%2520Maoyin%2520Chen%26entry.1292438233%3DThe%2520reliability%2520of%2520safety-critical%2520industrial%2520systems%2520hinges%2520on%2520accurate%2520and%2520robust%2520fault%2520diagnosis%2520in%2520rotating%2520machinery.%2520Conventional%2520graph%2520neural%2520networks%2520%2528GNNs%2529%2520for%2520machinery%2520fault%2520diagnosis%2520face%2520limitations%2520in%2520modeling%2520complex%2520dynamic%2520interactions%2520due%2520to%2520their%2520reliance%2520on%2520predefined%2520static%2520graph%2520structures%2520and%2520homogeneous%2520aggregation%2520schemes.%2520To%2520overcome%2520these%2520challenges%252C%2520this%2520paper%2520introduces%2520polarized%2520direct%2520cross-attention%2520%2528PolaDCA%2529%252C%2520a%2520novel%2520relational%2520learning%2520framework%2520that%2520enables%2520adaptive%2520message%2520passing%2520through%2520data-driven%2520graph%2520construction.%2520Our%2520approach%2520builds%2520upon%2520a%2520direct%2520cross-attention%2520%2528DCA%2529%2520mechanism%2520that%2520dynamically%2520infers%2520attention%2520weights%2520from%2520three%2520semantically%2520distinct%2520node%2520features%2520%2528such%2520as%2520individual%2520characteristics%252C%2520neighborhood%2520consensus%252C%2520and%2520neighborhood%2520diversity%2529%2520without%2520requiring%2520fixed%2520adjacency%2520matrices.%2520Theoretical%2520analysis%2520establishes%2520PolaDCA%2527s%2520superior%2520noise%2520robustness%2520over%2520conventional%2520GNNs.%2520Extensive% {"title": "Word-Anchored Temporal Forgery Localization", "author": "Tianyi Wang and Xi Shao and Harry Cheng and Yinglong Wang and Mohan Kankanhalli", "abstract": "Current temporal forgery localization (TFL) approaches typically rely on temporal boundary regression or continuous frame-level anomaly detection paradigms to derive candidate forgery proposals. However, they suffer not only from feature granularity misalignment but also from costly computation. To address these issues, we propose word-anchored temporal forgery localization (WAFL), a novel paradigm that shifts the TFL task from temporal regression and continuous localization to discrete word-level binary classification. Specifically, we first analyze the essence of temporal forgeries and identify the minimum meaningful forgery units, word tokens, and then align data preprocessing with the natural linguistic boundaries of speech. To adapt powerful pre-trained foundation backbones for feature extraction, we introduce the forensic feature realignment (FFR) module, mapping representations from the pre-trained semantic space to a discriminative forensic manifold. This allows subsequent lightweight linear classifiers to efficiently perform binary classification and accomplish the TFL task. Furthermore, to overcome the extreme class imbalance inherent to forgery detection, we design the artifact-centric asymmetric (ACA) loss, which breaks the standard precision-recall trade-off by dynamically suppressing overwhelming authentic gradients while asymmetrically prioritizing subtle forensic artifacts. Extensive experiments demonstrate that WAFL significantly outperforms state-of-the-art approaches in localization performance under both in- and cross-dataset settings, while requiring substantially fewer learnable parameters and operating at high computational efficiency.", "link": "http://arxiv.org/abs/2603.06220v1", "date": "2026-03-06", "relevancy": 2.4434, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4976}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4862}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4822}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Word-Anchored%20Temporal%20Forgery%20Localization&body=Title%3A%20Word-Anchored%20Temporal%20Forgery%20Localization%0AAuthor%3A%20Tianyi%20Wang%20and%20Xi%20Shao%20and%20Harry%20Cheng%20and%20Yinglong%20Wang%20and%20Mohan%20Kankanhalli%0AAbstract%3A%20Current%20temporal%20forgery%20localization%20%28TFL%29%20approaches%20typically%20rely%20on%20temporal%20boundary%20regression%20or%20continuous%20frame-level%20anomaly%20detection%20paradigms%20to%20derive%20candidate%20forgery%20proposals.%20However%2C%20they%20suffer%20not%20only%20from%20feature%20granularity%20misalignment%20but%20also%20from%20costly%20computation.%20To%20address%20these%20issues%2C%20we%20propose%20word-anchored%20temporal%20forgery%20localization%20%28WAFL%29%2C%20a%20novel%20paradigm%20that%20shifts%20the%20TFL%20task%20from%20temporal%20regression%20and%20continuous%20localization%20to%20discrete%20word-level%20binary%20classification.%20Specifically%2C%20we%20first%20analyze%20the%20essence%20of%20temporal%20forgeries%20and%20identify%20the%20minimum%20meaningful%20forgery%20units%2C%20word%20tokens%2C%20and%20then%20align%20data%20preprocessing%20with%20the%20natural%20linguistic%20boundaries%20of%20speech.%20To%20adapt%20powerful%20pre-trained%20foundation%20backbones%20for%20feature%20extraction%2C%20we%20introduce%20the%20forensic%20feature%20realignment%20%28FFR%29%20module%2C%20mapping%20representations%20from%20the%20pre-trained%20semantic%20space%20to%20a%2 {"title": "OmniDP: Beyond-FOV Large-Workspace Humanoid Manipulation with Omnidirectional 3D Perception", "author": "Pei Qu and Zheng Li and Yufei Jia and Ziyun Liu and Liang Zhu and Haoang Li and Jinni Zhou and Jun Ma", "abstract": "The deployment of humanoid robots for dexterous manipulation in unstructured environments remains challenging due to perceptual limitations that constrain the effective workspace. In scenarios where physical constraints prevent the robot from repositioning itself, maintaining omnidirectional awareness becomes far more critical than color or semantic information.While recent advances in visuomotor policy learning have improved manipulation capabilities, conventional RGB-D solutions suffer from narrow fields of view (FOV) and self-occlusion, requiring frequent base movements that introduce motion uncertainty and safety risks. Existing approaches to expanding perception, including active vision systems and third-view cameras, introduce mechanical complexity, calibration dependencies, and latency that hinder reliable real-time performance. In this work, We propose OmniDP, an end-to-end LiDAR-driven 3D visuomotor policy that enables robust manipulation in large workspaces. Our method processes panoramic point clouds through a Time-Aware Attention Pooling mechanism, efficiently encoding sparse 3D data while capturing temporal dependencies. This 360\u00b0 perception allows the robot to interact with objects across wide areas without frequent repositioning. To support policy learning, we develop a whole-body teleoperation system for efficient data collection on full-body coordination. Extensive experiments in simulation and real-world environments show that OmniDP achieves robust performance in large-workspace and cluttered scenarios, outperforming baselines that rely on egocentric depth cameras.", "link": "http://arxiv.org/abs/2603.05355v2", "date": "2026-03-06", "relevancy": 2.4292, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6241}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6145}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniDP%3A%20Beyond-FOV%20Large-Workspace%20Humanoid%20Manipulation%20with%20Omnidirectional%203D%20Perception&body=Title%3A%20OmniDP%3A%20Beyond-FOV%20Large-Workspace%20Humanoid%20Manipulation%20with%20Omnidirectional%203D%20Perception%0AAuthor%3A%20Pei%20Qu%20and%20Zheng%20Li%20and%20Yufei%20Jia%20and%20Ziyun%20Liu%20and%20Liang%20Zhu%20and%20Haoang%20Li%20and%20Jinni%20Zhou%20and%20Jun%20Ma%0AAbstract%3A%20The%20deployment%20of%20humanoid%20robots%20for%20dexterous%20manipulation%20in%20unstructured%20environments%20remains%20challenging%20due%20to%20perceptual%20limitations%20that%20constrain%20the%20effective%20workspace.%20In%20scenarios%20where%20physical%20constraints%20prevent%20the%20robot%20from%20repositioning%20itself%2C%20maintaining%20omnidirectional%20awareness%20becomes%20far%20more%20critical%20than%20color%20or%20semantic%20information.While%20recent%20advances%20in%20visuomotor%20policy%20learning%20have%20improved%20manipulation%20capabilities%2C%20conventional%20RGB-D%20solutions%20suffer%20from%20narrow%20fields%20of%20view%20%28FOV%29%20and%20self-occlusion%2C%20requiring%20frequent%20base%20movements%20that%20introduce%20motion%20uncertainty%20and%20safety%20risks.%20Existing%20approaches%20to%20expanding%20perception%2C%20including%20active%20vision%20systems%20and%20third-view%20cameras%2C%20introduce%20mechanical%20complexity%2C%20calibration%20dependencies%2C%20and%20latency%20that%20hinder%20reliable%20real-time%20performance.%20In%20this%20work%2C%20We%20propose%20OmniDP%2C%20an%20end-to-end%20LiDAR-driven%203D%20visuomotor%20policy%20that%20enables%20robust%20manipulation%20in%20large%20workspaces.%20Our%20method%20processes%20panoramic%20point%20clouds%20through%20a%20Time-Aware%20Attention%20Pooling%20mechanism%2C%20efficiently%20encoding%20sparse%203D%20data%20while%20capturing%20temporal%20dependencies.%20This%20360%C2%B0%20perception%20allows%20the%20robot%20to%20interact%20with%20objects%20across%20wide%20areas%20without%20frequent%20repositioning.%20To%20support%20policy%20learning%2C%20we%20develop%20a%20whole-body%20teleoperation%20system%20for%20efficient%20data%20collection%20on%20full-body%20coordination.%20Extensive%20experiments%20in%20simulation%20and%20real-world%20environments%20show%20that%20OmniDP%20achieves%20robust%20performance%20in%20large-workspace%20and%20cluttered%20scenarios%2C%20outperforming%20baselines%20that%20rely%20on%20egocentric%20depth%20cameras.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05355v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniDP%253A%2520Beyond-FOV%2520Large-Workspace%2520Humanoid%2520Manipulation%2520with%2520Omnidirectional%25203D%2520Perception%26entry.906535625%3DPei%2520Qu%2520and%2520Zheng%2520Li%2520and%2520Yufei%2520Jia%2520and%2520Ziyun%2520Liu%2520and%2520Liang%2520Zhu%2520and%2520Haoang%2520Li%2520and%2520Jinni%2520Zhou%2520and%2520Jun%2520Ma%26entry.1292438233%3DThe%2520deployment%2520of%2520humanoid%2520robots%2520for%2520dexterous%2520manipulation%2520in%2520unstructured%2520environments%2520remains%2520challenging%2520due%2520to%2520perceptual%2520limitations%2520that%2520constrain%2520the%2520effective%2520workspace.%2520In%2520scenarios%2520where%2520physical%2520constraints%2520prevent%2520the%2520robot%2520from%2520repositioning%2520itself%252C%2520maintaining%2520omnidirectional%2520awareness%2520becomes%2520far%2520more%2520critical%2520than%2520co {"title": "FedARKS: Federated Aggregation via Robust and Discriminative Knowledge Selection and Integration for Person Re-identification", "author": "Xin Xu and Binchang Ma and Zhixi Yu and Wei Liu", "abstract": "The application of federated domain generalization in person re-identification (FedDG-ReID) aims to enhance the model's generalization ability in unseen domains while protecting client data privacy. However, existing mainstream methods typically rely on global feature representations and simple averaging operations for model aggregation, leading to two limitations in domain generalization: (1) Using only global features makes it difficult to capture subtle, domain-invariant local details (such as accessories or textures); (2) Uniform parameter averaging treats all clients as equivalent, ignoring their differences in robust feature extraction capabilities, thereby diluting the contributions of high quality clients. To address these issues, we propose a novel federated learning framework, Federated Aggregation via Robust and Discriminative Knowledge Selection and Integration (FedARKS), comprising two mechanisms: RK (Robust Knowledge) and KS (Knowledge Selection).", "link": "http://arxiv.org/abs/2603.06122v1", "date": "2026-03-06", "relevancy": 2.408, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4964}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4797}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedARKS%3A%20Federated%20Aggregation%20via%20Robust%20and%20Discrim

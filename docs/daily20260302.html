erpretable%20sub-concepts%20absent%20during%20training%20that%20can%20be%20used%20to%20train%20highly%20accurate%20HiCEMs%2C%20and%20%282%29%20HiCEMs%20enable%20powerful%20test-time%20concept%20interventions%20at%20different%20granularities%2C%20leading%20to%20improved%20task%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23947v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520Concept-based%2520Interpretable%2520Models%26entry.906535625%3DOscar%2520Hill%2520and%2520Mateo%2520Espinosa%2520Zarlenga%2520and%2520Mateja%2520Jamnik%26entry.1292438233%3DModern%2520deep%2520neural%2520networks%2520remain%2520challenging%2520to%2520interpret%2520due%2520to%2520the%2520opacity%2520of%2520their%2520latent%2520representations%252C%2520impeding%2520model%2520understanding%252C%2520debugging%252C%2520and%2520debiasing.%2520Concept%2520Embedding%2520Models%2520%2528CEMs%2529%2520address%2520this%2520by%2520mapping%2520inputs%2520to%2520human-interpretable%2520concept%2520representations%2520from%2520which%2520tasks%2520can%2520be%2520predicted.%2520Yet%252C%2520CEMs%2520fail%2520to%2520represent%2520inter-concept%2520relationships%2520and%2520require%2520concept%2520annotations%2520at%2520different%2520granularities%2520during%2520training%252C%2520limiting%2520their%2520applicability.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520Hierarchical%2520Concept%2520Embedding%2520Models%2520%2528HiCEMs%2529%252C%2520a%2520new%2520family%2520of%2520CEMs%2520that%2520explicitly%2520model%2520concept%2520relationships%2520through%2520hierarchical%2520structures.%2520To%2520enable%2520HiCEMs%2520in%2520real-world%2520settings%252C%2520we%2520propose%2520Concept%2520Splitting%252C%2520a%2520method%2520for%2520automatically%2520discovering%2520finer-grained%2520sub-concepts%2520from%2520a%2520pretrained%2520CEM%2527s%2520embedding%2520space%2520without%2520requiring%2520additional%2520annotations.%2520This%2520allows%2520HiCEMs%2520to%2520generate%2520fine-grained%2520explanations%2520from%2520limited%2520concept%2520labels%252C%2520reducing%2520annotation%2520burdens.%2520Our%2520evaluation%2520across%2520multiple%2520datasets%252C%2520including%2520a%2520user%2520study%2520and%2520experiments%2520on%2520PseudoKitchens%252C%2520a%2520newly%2520proposed%2520concept-based%2520dataset%2520of%25203D%2520kitchen%2520renders%252C%2520demonstrates%2520that%2520%25281%2529%2520Concept%2520Splitting%2520discovers%2520human-interpretable%2520sub-concepts%2520absent%2520during%2520training%2520that%2520can%2520be%2520used%2520to%2520train%2520highly%2520accurate%2520HiCEMs%252C%2520and%2520%25282%2529%2520HiCEMs%2520enable%2520powerful%2520test-time%2520concept%2520interventions%2520at%2520different%2520granularities%252C%2520leading%2520to%2520improved%2520task%2520accuracy.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23947v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hierarchical%20Concept-based%20Interpretable%20Models&entry.906535625=Oscar%20Hill%20and%20Mateo%20Espinosa%20Zarlenga%20and%20Mateja%20Jamnik&entry.1292438233=Modern%20deep%20neural%20networks%20remain%20challenging%20to%20interpret%20due%20to%20the%20opacity%20of%20their%20latent%20representations%2C%20impeding%20model%20understanding%2C%20debugging%2C%20and%20debiasing.%20Concept%20Embedding%20Models%20%28CEMs%29%20address%20this%20by%20mapping%20inputs%20to%20human-interpretable%20concept%20representations%20from%20which%20tasks%20can%20be%20predicted.%20Yet%2C%20CEMs%20fail%20to%20represent%20inter-concept%20relationships%20and%20require%20concept%20annotations%20at%20different%20granularities%20during%20training%2C%20limiting%20their%20applicability.%20In%20this%20paper%2C%20we%20introduce%20Hierarchical%20Concept%20Embedding%20Models%20%28HiCEMs%29%2C%20a%20new {"title": "UFO-4D: Unposed Feedforward 4D Reconstruction from Two Images", "author": "Junhwa Hur and Charles Herrmann and Songyou Peng and Philipp Henzler and Zeyu Ma and Todd Zickler and Deqing Sun", "abstract": "Dense 4D reconstruction from unposed images remains a critical challenge, with current methods relying on slow test-time optimization or fragmented, task-specific feedforward models. We introduce UFO-4D, a unified feedforward framework to reconstruct a dense, explicit 4D representation from just a pair of unposed images. UFO-4D directly estimates dynamic 3D Gaussian Splats, enabling the joint and consistent estimation of 3D geometry, 3D motion, and camera pose in a feedforward manner. Our core insight is that differentiably rendering multiple signals from a single Dynamic 3D Gaussian representation offers major training advantages. This approach enables a self-supervised image synthesis loss while tightly coupling appearance, depth, and motion. Since all modalities share the same geometric primitives, supervising one inherently regularizes and improves the others. This synergy overcomes data scarcity, allowing UFO-4D to outperform prior work by up to 3 times in joint geometry, motion, and camera pose estimation. Our representation also enables high-fidelity 4D interpolation across novel views and time. Please visit our project page for visual results: https://ufo-4d.github.io/", "link": "http://arxiv.org/abs/2602.24290v1", "date": "2026-02-27", "relevancy": 2.5389, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6396}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6344}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UFO-4D%3A%20Unposed%20Feedforward%204D%20Reconstruction%20from%20Two%20Images&body=Title%3A%20UFO-4D%3A%20Unposed%20Feedforward%204D%20Reconstruction%20from%20Two%20Images%0AAuthor%3A%20Junhwa%20Hur%20and%20Charles%20Herrmann%20and%20Songyou%20Peng%20and%20Philipp%20Henzler%20and%20Zeyu%20Ma%20and%20Todd%20Zickler%20and%20Deqing%20Sun%0AAbstract%3A%20Dense%204D%20reconstruction%20from%20unposed%20images%20remains%20a%20critical%20challenge%2C%20with%20current%20methods%20relying%20on%20slow%20test-time%20optimization%20or%20fragmented%2C%20task-specific%20feedforward%20models.%20We%20introduce%20UFO-4D%2C%20a%20unified%20feedforward%20framework%20to%20reconstruct%20a%20dense%2C%20explicit%204D%20representation%20from%20just%20a%20pair%20of%20unposed%20images.%20UFO-4D%20directly%20estimates%20dynamic%203D%20Gaussian%20Splats%2C%20enabling%20the%20joint%20and%20consistent%20estimation%20of%203D%20geometry%2C%203D%20motion%2C%20and%20camera%20pose%20in%20a%20feedforward%20manner.%20Our%20core%20insight%20is%20that%20differentiably%20rendering%20multiple%20signals%20from%20a%20single%20Dynamic%203D%20Gaussian%20representation%20offers%20major%20training%20advantages.%20This%20approach%20enables%20a%20self-supervised%20image%20synthesis%20loss%20while%20tightly%20coupling%20appearance%2C%20depth%2C%20and%20motion.%20Since%20all%20modalities%20share%20the%20same%20geometric%20primitives%2C%20supervising%20one%20inherently%20regularizes%20and%20improves%20the%20others.%20This%20synergy%20overcomes%20data%20scarcity%2C%20allowing%20UFO-4D%20to%20outperform%20prior%20work%20by%20up%20to%203%20times%20in%20joint%20geometry%2C%20motion%2C%20and%20camera%20pose%20estimation.%20Our%20representation%20also%20enables%20high-fidelity%204D%20interpolation%20across%20novel%20views%20and%20time.%20Please%20visit%20our%20project%20page%20for%20visual%20results%3A%20https%3A//ufo-4d.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2602.24290v1%0AF 03%2520times%2520in%2520joint%2520geometry%252C%2520motion%252C%2520and%2520camera%2520pose%2520estimation.%2520Our%2520representation%2520also%2520enables%2520high-fidelity%25204D%2520interpolation%2520across%2520novel%2520views%2520and%2520time.%2520Please%2520visit%2520our%2520project%2520page%2520for%2520visual%2520results%253A%2520https%253A//ufo-4d.github.io/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24290v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=UFO-4D%3A%20Unposed%20Feedforward%204D%20Reconstruction%20from%20Two%20Images&entry.906535625=Junhwa%20Hur%20and%20Charles%20Herrmann%20and%20Songyou%20Peng%20and%20Philipp%20Henzler%20and%20Zeyu%20Ma%20and%20Todd%20Zickler%20and%20Deqing%20Sun&entry.1292438233=Dense%204D%20reconstruction%20from%20unposed%20images%20remains%20a%20critical%20challenge%2C%20with%20current%20methods%20relying%20on%20slow%20test-time%20optimization%20or%20fragmented%2C%20task-specific%20feedforward%20models.%20We%20introduce%20UFO-4D%2C%20a%20unified%20feedforward%20framework%20to%20reconstruct%20a%20dense%2C%20explicit%204D%20representation%20from%20just%20a%20pair%20of%20unposed%20images.%20UFO-4D%20directly%20estimates%20dynamic%203D%20Gaussian%20Splats%2C%20enabling%20the%20joint%20and%20consistent%20estimation%20of%203D%20geometry%2C%203D%20motion%2C%20and%20camera%20pose%20in%20a%20feedforward%20manner.%20Our%20core%20insight%20is%20that%20differentiably%20rendering%20multiple%20signals%20from%20a%20single%20Dynamic%203D%20Gaussian%20representation%20offers%20major%20training%20advantages.%20This%20approach%20enables%20a%20self-supervised%20image%20synthesis%20loss%20while%20tightly%20coupling%20appearance%2C%20depth%2C%20and%20motion.%20Since%20all%20modalities%20share%20the%20same%20geometric%20primitives%2C%20supervising%20one%20inherently%20regularizes%20and%20improves%20the%20others.%20This%20synergy%20over {"title": "Intrinsic Lorentz Neural Network", "author": "Xianglong Shi and Ziheng Chen and Yunhan Jiang and Nicu Sebe", "abstract": "Real-world data frequently exhibit latent hierarchical structures, which can be naturally represented by hyperbolic geometry. Although recent hyperbolic neural networks have demonstrated promising results, many existing architectures remain partially intrinsic, mixing Euclidean operations with hyperbolic ones or relying on extrinsic parameterizations. To address it, we propose the \\emph{Intrinsic Lorentz Neural Network} (ILNN), a fully intrinsic hyperbolic architecture that conducts all computations within the Lorentz model. At its core, the network introduces a novel \\emph{point-to-hyperplane} fully connected layer (FC), replacing traditional Euclidean affine logits with closed-form hyperbolic distances from features to learned Lorentz hyperplanes, thereby ensuring that the resulting geometric decision functions respect the inherent curvature. Around this fundamental layer, we design intrinsic modules: GyroLBN, a Lorentz batch normalization that couples gyro-centering with gyro-scaling, consistently outperforming both LBN and GyroBN while reducing training time. We additionally proposed a gyro-additive bias for the FC output, a Lorentz patch-concatenation operator that aligns the expected log-radius across feature blocks via a digamma-based scale, and a Lorentz dropout layer. Extensive experiments conducted on CIFAR-10/100 and two genomic benchmarks (TEB and GUE) illustrate that ILNN achieves state-of-the-art performance and computational cost among hyperbolic models and consistently surpasses strong Euclidean baselines. The code is available at \\href{https://github.com/Longchentong/ILNN}{\\textcolor{magenta}{this url}}.", "link": "http://arxiv.org/abs/2602.23981v1", "date": "2026-02-27", "relevancy": 2.527, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5157}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5083}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4922}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Intrinsic%20Lorentz%20Neural%20Network&body=Title%3A%20Intrinsic%20Lorentz%20Neural%20Network%0AAuthor%3A%20Xianglong%20Shi%20and%20Ziheng%20Chen%20and%20Yunhan%20Jiang%20and%20Nicu%20Sebe%0AAbstract%3A%20Real-world%20data%20frequently%20exhibit%20latent%20hierarchical%20structures%2C%20which%20can%20be%20naturally%20represented%20by%20hyperbolic%20geometry.%20Although%20recent%20hyperbolic%20neural%20networks%20have%20demonstrated%20promising%20results%2C%20many%20existing%20architectures%20remain%20partially%20intrinsic%2C%20mixing%20Euclidean%20operations%20with%20hyperbolic%20ones%20or%20relying%20on%20extrinsic%20parameterizations.%20To%20address%20it%2C%20we%20propose%20the%20%5Cemph%7BIntrinsic%20Lorentz%20Neural%20Network%7D%20%28ILNN%29%2C%20a%20fully%20intrinsic%20hyperbolic%20architecture%20that%20conducts%20all%20computations%20within%20the%20Lorentz%20model.%20At%20its%20core%2C%20the%20network%20introduces%20a%20novel%20%5Cemph%7Bpoint-to-hyperplane%7D%20fully%20connected%20layer%20%28FC%29%2C%20replacing%20traditional%20Euclidean%20affine%20logits%20with%20closed-form%20hyperbolic%20distances%20from%20features%20to%20learned%20Lorentz%20hyperplanes%2C%20thereby%20ensuring%20that%20the%20resulting%20geometric%20decision%20functions%20respect%20the%20inherent%20curvature.%20Around%20this%20fundamental%20layer%2C%20we%20design%20intrinsic%20modules%3A%20GyroLBN%2C%20a%20Lorentz%20batch%20normalization%20that%20couples%20gyro-centering%20with%20gyro-scaling%2C%20consistently%20outperforming%20both%20LBN%20and%20GyroBN%20while%20reducing%20training%20time.%20We%20additionally%20proposed%20a%20gyro-additive%20bias%20for%20the%20FC%20output%2C%20a%20Lorentz%20patch-concatenation%20operator%20that%20aligns%20the%20expected%20log-radius%20across%20feature%20blocks%20via%20a%20digamma-based%20scale%2C%20and%20a%20Lorentz%20dropout%20layer.%20Extensive%20experiments%20conducted%20on%20CIFAR-10/100%20and%20two%20genomic%20benchmarks%20%28TEB%20and%20GUE%29%20illustrate%20that%20ILNN%20achieves%20state-of-the-art%20performance%20and%20computational%20cost%20among%20hyperbolic%20models%20and%20consistently%20surpasses%20strong%20Euclidean%20baselines.%20The%20code%20is%20available%20at%20%5Chref%7Bhttps%3A//github.com/Longchentong/ILNN%7D%7B%5Ctextcolor%7Bmagenta%7D%7Bthis%20url%7D%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23981v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIntrinsic%2520Lorentz%2520Neural%2520Network%26entry.906535625%3DXianglong%2520Shi%2520and%2520Ziheng%2520Chen%2520and%2520Yunhan%2520Jiang%2520and%2520Nicu%2520Sebe%26entry.1292438233%3DReal-world%2520data%2520frequently%2520exhibit%2520latent%2520hierarchical%2520structures%252C%2520which%2520can%2520be%2520naturally%2520represented%2520by%2520hyperbolic%2520geometry.%2520Although%2520recent%2520hyperbolic%2520neural%2520networks%2520have%2520demonstrated%2520promising%2520results%252C%2520many%2520existing%2520architectures%2520remain%2520partially%2520intrinsic%252C%2520mixing%2520Euclidean%2520operations%2520with%2520hyperbolic%2520ones%2520or%2520relying%2520on%2520extrinsic%2520parameterizations.%2520To%2520address%2520it%252C%2520we%2520propose%2520the%2520%255Cemph%257BIntrinsic%2520Lorentz%2520Neural%2520Network%257D%2520%2528ILNN%2529%252C%2520a%2520fully%2520intrinsic%2520hyperbolic%2520architecture%2520that%2520conducts%2520all%2520computations%2520within%2520the%2520Lorentz%2520model.%2520At%2520its%2520core%252C%2520the%2520network%2520int {"title": "Clinically-aligned ischemic stroke segmentation and ASPECTS scoring on NCCT imaging using a slice-gated loss on foundation representations", "author": "Hiba Azeem and Behraj Khan and Tahir Qasim Syed", "abstract": "Rapid infarct assessment on non-contrast CT (NCCT) is essential for acute ischemic stroke management. Most deep learning methods perform pixel-wise segmentation without modeling the structured anatomical reasoning underlying ASPECTS scoring, where basal ganglia (BG) and supraganglionic (SG) levels are clinically interpreted in a coupled manner. We propose a clinically aligned framework that combines a frozen DINOv3 backbone with a lightweight decoder and introduce a Territory-Aware Gated Loss (TAGL) to enforce BG-SG consistency during training. This anatomically informed supervision adds no inference-time complexity. Our method achieves a Dice score of 0.6385 on AISD, outperforming prior CNN and foundation-model baselines. On a proprietary ASPECTS dataset, TAGL improves mean Dice from 0.698 to 0.767. These results demonstrate that integrating foundation representations with structured clinical priors improves NCCT stroke segmentation and ASPECTS delineation.", "link": "http://arxiv.org/abs/2602.23961v1", "date": "2026-02-27", "relevancy": 2.5265, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5136}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5026}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4997}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Clinically-aligned%20ischemic%20stroke%20segmentation%20and%20ASPECTS%20scoring%20on%20NCCT%20imaging%20using%20a%20slice-gated%20loss%20on%20foundation%20representations&body=Title%3A%20Clinically-aligned%20ischemic%20stroke%20segmentation%20and%20ASPECTS%20scoring%20on%20NCCT%20imaging%20using%20a%20slice-gated%20loss%20on%20foundation%20representations%0AAuthor%3A%20Hiba%20Azeem%20and%20Behraj%20Khan%20and%20Tahir%20Qasim%20Syed%0AAbstract%3A%20Rapid%20infarct%20assessment%20on%20non-contrast%20CT%20%28NCCT%29%20is%20essential%20for%20acute%20ischemic%20stroke%20management.%20Most%20deep%20learning%20methods%20perform%20pixel-wise%20segmentation%20without%20modeling%20the%20structured%20anatomical%20reasoning%20underlying%20ASPECTS%20scoring%2C%20where%20basal%20ganglia%20%28BG%29%20and%20supraganglionic%20%28SG%29%20levels%20are%20clinically%20interpreted%20in%20a%20coupled%20manner.%20We%20propose%20a%20clinically%20aligned%20framework%20that%20combines%20a%20frozen%20DINOv3%20backbone%20with%20a%20lightweight%20decoder%20and%20introduce%20a%20Territory-Aware%20Gated%20Loss%20%28TAGL%29%20to%20enforce%20BG-SG%20consistency%20during%20training.%20This%20anatomically%20informed%20supervision%20adds%20no%20inference-time%20complexity.%20Our%20method%20achieves%20a%20Dice%20score%20of%200.6385%20on%20AISD%2C%20outperforming%20prior%20CNN%20and%20foundation-model%20baselines.%20On%20a%20proprietary%20ASPECTS%20dataset%2C%20TAGL%20improves%20mean%20Dice%20from%200.698%20to%200.767.%20These%20results%20demonstrate%20that%20integrating%20foundation%20representations%20with%20structured%20clinical%20priors%20improves%20NCCT%20stroke%20segmentation%20and%20ASPECTS%20delineation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23961v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClinically-aligned%2520ischemic%2520stroke%2520segmentation%2520and%2520ASPECTS%2520scoring%2520on%2520NCCT%2520imaging%2520using%2520a%2520slice-gated%2520loss%2520on%2520foundation%2520representations%26entry.906535625%3DHiba%2520Azeem%2520and%2520Behraj%2520Khan%2520and%2520Tahir%2520Qasim%2520Syed%26entry.1292438233%3DRapid%2520infarct%2520assessment%2520on%2520non-contrast%2520CT%2520%2528NCCT%2529%2520is%2520essential%2520for%2520acute%2520ischemic%2520stroke%2520management.%2520Most%2520deep%2520learning%2520methods%2520perform%2520pixel-wise%2520segmentation%2520without%2520modeling%2520the%2520structured%2520anatomical%2520reasoning%2520underlying%2520ASPECTS%2520scoring%252C%2520where%2520basal%2520ganglia%2520%2528BG%2529%2520and%2520supraganglionic%2520%2528SG%2529%2520levels%2520are%2520clinically%2520interpreted%2520in%2520a%2520coupled%2520manner.%2520We%2520propose%2520a%2520clinically%2520aligned%2520framework%2520that%2520combines%2520a%2520frozen%2520DINOv3%2520backbone%2520with%2520a%2520lightweight%2520decoder%2520and%2520introduce%2520a%2520Territory-Aware%2520Gated%2520Loss%2520%2528TAGL%2529%2520to%2520enforce%2520BG-SG%2520consistency%2520during%2520training.%2520This%2520anatomically%2520informed%2520supervision%2520adds%2520no%2520inference-time%2520complexity.%2520Our%2520method%2520achieves%2520a%2520Dice%2520score%2520of%25200.6385%2520on%2520AISD%252C%2520outperforming%2520prior%2520CNN%2520and%2520foundation-model%2520baselines.%2520On%2520a%2520proprietary%2520ASPECTS%2520dataset%252C%2520TAGL%2520improves%2520mean%2520Dice%2520from%25200.698%2520to%25200.767.%2520These%2520results%2520demonstrate%2520that%2520integrating%2520foundation%2520representations%2520with%2520structured%2520clinical%2520priors%2520improves%2520NCCT%2520stroke%2520segmentation%2520and%2520ASPECTS%2520delineation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23961v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Clinically-aligned%20ischemic%20stroke%20segmentation%20and%20ASPECTS%20scoring%20on%20NCCT%20imaging%20using%20a%20slice-gated%20loss%20on%20foundation%20representations&entry.906535625=Hiba%20Azeem%20and%20Behraj%20Khan%20and%20Tahir%20Qasim%20Syed&entry.1292438233=Rapid%20infarct%20assessment%20on%20non-contrast%20CT%20%28NCCT%29%20is%20essential%20for%20acute%20ischemic%20stroke%20management.%20Most%20deep%20learning%20methods%20perform%20pixel-wise%20segmentation%20without%20modeling%20the%20structured%20anatomical%20reasoning%20underlying%20ASPECTS%20scoring%2C%20where%20basal%20ganglia%20%28BG%29%20and%20supraganglionic%20%28SG%29%20levels%20are%20clinically%20interpreted%20in%20a%20coupled%20manner.%20We%20propose%20a%20clinically%20aligned%20framework%20that%20combines%20a%20frozen%20DINOv3%20backbone%20with%20a%20lightweight%20decoder%20and%20introduce%20a%20Territory-Aware%20Gated%20Loss%20%28TAGL%29%20to%20enforce%20BG-SG%20consistency%20during%20training.%20This%20anatomically%20informed%20supervision%20adds%20no%20inference-time%20complexity.%20Our%20method%20achieves%20a%20Dice%20score%20of%200.6385%20on%20AISD%2C%20outperforming%20prior%20CNN%20and%20foundation-model%20baselines.%20On%20a%20proprietary%20ASPECTS%20dataset%2C%20TAGL%20improves%20mean%20Dice%20from%200.698%20to%200.767.%20These%20results%20demonstrate%20that%20integrating%20foundation%20representations%20with%20structured%20clinical%20priors%20improves%20NCCT%20stroke%20segmentation%20and%20ASPECTS%20delineation.&entry.1838667208=http%3A//arxiv.org/abs/2602.23961v1&entry.124074799=Read"},
{"title": "Towards Generating Realistic 3D Semantic Training Data for Autonomous Driving", "author": "Lucas Nunes and Rodrigo Marcuzzi and Jens Behley and Cyrill Stachniss", "abstract": "Semantic scene understanding is crucial for robotics and computer vision applications. In autonomous driving, 3D semantic segmentation plays an important role for enabling safe navigation. Despite significant advances in the field, the complexity of collecting and annotating 3D data is a bottleneck in this developments. To overcome that data annotation limitation, synthetic simulated data has been used to generate annotated data on demand. There is still, however, a domain gap between real and simulated data. More recently, diffusion models have been in the spotlight, enabling close-to-real data synthesis. Those generative models have been recently applied to the 3D data domain for generating scene-scale data with semantic annotations. Still, those methods either rely on image projection or decoupled models trained with different resolutions in a coarse-to-fine manner. Such intermediary representations impact the generated data quality due to errors added in those transformations. In this work, we propose a novel approach able to generate 3D semantic scene-scale data without relying on any projection or decoupled trained multi-resolution models, achieving more realistic semantic scene data generation compared to previous state-of-the-art methods. Besides improving 3D semantic scene-scale data synthesis, we thoroughly evaluate the use of the synthetic scene samples as labeled data to train a semantic segmentation network. In our experiments, we show that using the synthetic annotated data generated by our method as training data together with the real semantic segmentation labels, leads to an improvement in the semantic segmentation model performance. Our results show the potential of generated scene-scale point clouds to generate more training data to extend existing datasets, reducing the data annotation effort. Our code is available at https://github.com/PRBonn/3DiSS.", "link": "http://arxiv.org/abs/2503.21449v3", "date": "2026-02-27", "relevancy": 2.522, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.633}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.633}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Generating%20Realistic%203D%20Semantic%20Training%20Data%20for%20Autonomous%20Driving&body=Title%3A%20Towards%20Generating%20Realistic%203D%20Semantic%20Training%20Data%20for%20Autonomous%20Driving%0AAuthor%3A%20Lucas%20Nunes%20and%20Rodrigo%20Marcuzzi%20and%20Jens%20Behley%20and%20Cyrill%20Stachniss%0AAbstract%3A%20Semantic%20scene%20understanding%20is%20crucial%20for%20robotics%20and%20computer%20vision%20applications.%20In%20autonomous%20driving%2C%203D%20semantic%20segmentation%20plays%20an%20important%20role%20for%20enabling%20safe%20navigation.%20Despite%20significant%20advances%20in%20the%20field%2C%20the%20complexity%20of%20collecting%20and%20annotating%203D%20data%20is%20a%20bottleneck%20in%20this%20developments.%20To%20overcome%20that%20data%20annotation%20limitation%2C%20synthetic%20simulated%20data%20has%20been%20used%20to%20generate%20annotated%20data%20on%20demand.%20There%20is%20still%2C%20however%2C%20a%20domain%20gap%20between%20real%20and%20simulated%20data.%20More%20recently%2C%20diffusion%20models%20have%20been%20in%20the%20spotlight%2C%20enabling%20close-to-real%20data%20synthesis.%20Those%20generative%20models%20have%20been%20recently%20applied%20to%20the%203D%20data%20domain%20for%20generating%20scene-scale%20data%20with%20semantic%20annotations.%20Still%2C%20those%20methods%20either%20rely%20on%20image%20projection%20or%20decoupled%20models%20trained%20with%20different%20resolutions%20in%20a%20coarse-to-fine%20manner.%20Such%20intermediary%20representations%20impact%20the%20generated%20data%20quality%20due%20to%20errors%20added%20in%20those%20transformations.%20In%20this%20work%2C%20we%20propose%20a%20novel%20approach%20able%20to%20generate%203D%20semantic%20scene-scale%20data%20without%20relying%20on%20any%20projection%20or%20decoupled%20trained%20multi-resolution%20models%2C%20achieving%20more%20realistic%20semantic%20scene%20data%20generation%20compared%20to%20previous%20state-of-the-art%20methods.%20Besides%20improving%203D%20semantic%20scene-scale%20data%20synthesis%2C%20we%20thoroughly%20evaluate%20the%20use%20of%20the%20synthetic%20scene%20samples%20as%20labeled%20data%20to%20train%20a%20semantic%20segmentation%20network.%20In%20our%20experiments%2C%20we%20show%20that%20using%20the%20synthetic%20annotated%20data%20generated%20by%20our%20method%20as%20training%20data%20together%20with%20the%20real%20semantic%20segmentation%20labels%2C%20leads%20to%20an%20improvement%20in%20the%20semantic%20segmentation%20model%20performance.%20Our%20results%20show%20the%20potential%20of%20generated%20scene-scale%20point%20clouds%20to%20generate%20more%20training%20data%20to%20extend%20existing%20datasets%2C%20reducing%20the%20data%20annotation%20effort.%20Our%20code%20is%20available%20at%20https%3A//github.com/PRBonn/3DiSS.%0ALink%3A%20http%3A//arxiv.org/abs/2503.21449v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Generating%2520Realistic%25203D%2520Semantic%2520Training%2520Data%2520for%2520Autonomous%2520Driving%26entry.906535625%3DLucas%2520Nunes%2520and%2520Rodrigo%2520Marcuzzi%2520and%2520Jens%2520Behley%2520and%2520Cyrill%2520Stachniss%26entry.1292438233%3DSemantic%2520scene%2520understanding%2520is%2520crucial%2520for%2520roboti {"title": "Quant Experts: Token-aware Adaptive Error Reconstruction with Mixture of Experts for Large Vision-Language Models Quantization", "author": "Chenwei Jia and Baoting Li and Xuchong Zhang and Mingzhuo Wei and Bochen Lin and Hongbin Sun", "abstract": "Post-Training Quantization (PTQ) has emerged as an effective technique for alleviating the substantial computational and memory overheads of Vision-Language Models (VLMs) by compressing both weights and activations without retraining the full model. Existing PTQ methods primarily rely on static identification and global compensation of sensitive or outlier channels, yet they often overlook the distributional differences of these important channels across inputs, leading to unsatisfactory quantization. In this work, we observe that the distributions and occurrence frequencies of important channels vary significantly both across modalities and among tokens, even within the same modality. Accordingly, we propose \\textbf{Quant Experts (QE)}, a token-aware adaptive error compensation with mixture-of-experts for VLMs quantization. QE divides the important channels into token-independent and token-dependent groups. For the former, a shared expert is designed for most tokens to compensate for global quantization error using a low-rank adapter. For the latter, routed experts including multiple routed low-rank adapters are elaborated to compensate for local quantization error related to specific tokens. Extensive experiments demonstrate that QE consistently enhances task accuracy across various quantization settings and model scales, ranging from 2B to 70B parameters, while maintaining performance comparable to full-precision models.", "link": "http://arxiv.org/abs/2602.24059v1", "date": "2026-02-27", "relevancy": 2.5093, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.51}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4978}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4978}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Quant%20Experts%3A%20Token-aware%20Adaptive%20Error%20Reconstruction%20with%20Mixture%20of%20Experts%20for%20Large%20Vision-Language%20Models%20Quantization&body=Title%3A%20Quant%20Experts%3A%20Token-aware%20Adaptive%20Error%20Reconstruction%20with%20Mixture%20of%20Experts%20for%20Large%20Vision-Language%20Models%20Quantization%0AAuthor%3A%20Chenwei%20Jia%20and%20Baoting%20Li%20and%20Xuchong%20Zhang%20and%20Mingzhuo%20Wei%20and%20Bochen%20Lin%20and%20Hongbin%20Sun%0AAbstract%3A%20Post-Training%20Quantization%20%28PTQ%29%20has%20emerged%20as%20an%20effective%20technique%20for%20alleviating%20the%20substantial%20computational%20and%20memory%20overheads%20of%20Vision-Language%20Models%20%28VLMs%29%20by%20compressing%20both%20weights%20and%20activations%20without%20retraining%20the%20full%20model.%20Existing%20PTQ%20methods%20primarily%20rely%20on%20static%20identification%20and%20global%20compensation%20of%20sensitive%20or%20outlier%20channels%2C%20yet%20they%20often%20overlook%20the%20distributional%20differences%20of%20these%20important%20channels%20across%20inputs%2C%20leading%20to%20unsatisfactory%20quantization.%20In%20this%20work%2C%20we%20observe%20that%20the%20distributions%20and%20occurrence%20frequencies%20of%20important%20channels%20vary%20significantly%20both%20across%20modalities%20and%20among%20tokens%2C%20even%20within%20the%20same%20modality.%20Accordingly%2C%20we%20propose%20%5Ctextbf%7BQuant%20Experts%20%28QE%29%7D%2C%20a%20token-aware%20adaptive%20error%20compensation%20with%20mixture-of-experts%20for%20VLMs%20quantization.%20QE%20divides%20the%20important%20channels%20into%20token-independent%20and%20token-dependent%20groups.%20For%20the%20former%2C%20a%20shared%20expert%20is%20designed%20for%20most%20tokens%20to%20compensate%20for%20global%20quantization%20error%20using%20a%20low-rank%20adapter.%20For%20the%20latter%2C%20routed%20experts%20including%20multiple%20routed%20low-rank%20adapters%20are%20elaborated%20to%20compensate%20for%20local%20quantization%20error%20related%20to%20specific%20tokens.%20Extensive%20experiments%20demonstrate%20that%20QE%20consistently%20enhances%20task%20accuracy%20across%20various%20quantization%20settings%20and%20model%20scales%2C%20ranging%20from%202B%20to%2070B%20parameters%2C%20while%20maintaining%20performance%20comparable%20to%20full-precision%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24059v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQuant%2520Experts%253A%2520Token-aware%2520Adaptive%2520Error%2520Reconstruction%2520with%2520Mixture%2520of%2520Experts%2520for%2520Large%2520Vision-Language%2520Models%2520Quantization%26entry.906535625%3DChenwei%2520Jia%2520and%2520Baoting%2520Li%2520and%2520Xuchong%2520Zhang%2520and%2520Mingzhuo%2520Wei%2520and%2520Bochen%2520Lin%2520and%2520Hongbin%2520Sun%26entry.1292438233%3DPost-Training%2520Quantization%2520%2528PTQ%2529%2520has%2520emerged%2520as%2520an%2520effective%2520technique%2520for%2520alleviating%2520the%2520substantial%2520computational%2520and%2520memory%2520overheads%2520of%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520by%2520compressing%2520both%2520weights%2520and%2520activations%2520without%2520retraining%2520the%2520full%2520model.%2520Existing%2520PTQ%2520methods%2520primarily%2520rely%2520on%2520static%2520identification%2520and%2520global%2520compensation%2520of%2520sensitive%2520or%2520outlier%2520channels%252C%2520yet%2520they%2520often%2520overlook%2520the%2520distributional%2520differences%2520of%2520these%2520important%2520channels%2520across%2520inpu {"title": "From Statics to Dynamics: Physics-Aware Image Editing with Latent Transition Priors", "author": "Liangbing Zhao and Le Zhuo and Sayak Paul and Hongsheng Li and Mohamed Elhoseiny", "abstract": "Instruction-based image editing has achieved remarkable success in semantic alignment, yet state-of-the-art models frequently fail to render physically plausible results when editing involves complex causal dynamics, such as refraction or material deformation. We attribute this limitation to the dominant paradigm that treats editing as a discrete mapping between image pairs, which provides only boundary conditions and leaves transition dynamics underspecified. To address this, we reformulate physics-aware editing as predictive physical state transitions and introduce PhysicTran38K, a large-scale video-based dataset comprising 38K transition trajectories across five physical domains, constructed via a two-stage filtering and constraint-aware annotation pipeline. Building on this supervision, we propose PhysicEdit, an end-to-end framework equipped with a textual-visual dual-thinking mechanism. It combines a frozen Qwen2.5-VL for physically grounded reasoning with learnable transition queries that provide timestep-adaptive visual guidance to a diffusion backbone. Experiments show that PhysicEdit improves over Qwen-Image-Edit by 5.9% in physical realism and 10.1% in knowledge-grounded editing, setting a new state-of-the-art for open-source methods, while remaining competitive with leading proprietary models.", "link": "http://arxiv.org/abs/2602.21778v2", "date": "2026-02-27", "relevancy": 2.5005, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6594}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6051}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5988}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Statics%20to%20Dynamics%3A%20Physics-Aware%20Image%20Editing%20with%20Latent%20Transition%20Priors&body=Title%3A%20From%20Statics%20to%20Dynamics%3A%20Physics-Aware%20Image%20Editing%20with%20Latent%20Transition%20Priors%0AAuthor%3A%20Liangbing%20Zhao%20and%20Le%20Zhuo%20and%20Sayak%20Paul%20and%20Hongsheng%20Li%20and%20Mohamed%20Elhoseiny%0AAbstract%3A%20Instruction-based%20image%20editing%20has%20achieved%20remarkable%20success%20in%20semantic%20alignment%2C%20yet%20state-of-the-art%20models%20frequently%20fail%20to%20render%20physically%20plausible%20results%20when%20editing%20involves%20complex%20causal%20dynamics%2C%20such%20as%20refraction%20or%20material%20deformation.%20We%20attribute%20this%20limitation%20to%20the%20dominant%20paradigm%20that%20treats%20editing%20as%20a%20discrete%20mapping%20between%20image%20pairs%2C%20which%20provides%20only%20boundary%20conditions%20and%20leaves%20transition%20dynamics%20underspecified.%20To%20address%20this%2C%20we%20reformulate%20physics-aware%20editing%20as%20predictive%20physical%20state%20transitions%20and%20introduce%20PhysicTran38K%2C%20a%20large-scale%20video-based%20dataset%20comprising%2038K%20transition%20trajectories%20across%20five%20physical%20domains%2C%20constructed%20via%20a%20two-stage%20filtering%20and%20constraint-aware%20annotation%20pipeline.%20Building%20on%20this%20supervision%2C%20we%20propose%20PhysicEdit%2C%20an%20end-to-end%20framework%20equipped%20with%20a%20textual-visual%20dual-thinking%20mechanism.%20It%20combines%20a%20frozen%20Qwen2.5-VL%20for%20physically%20grounded%20reasoning%20with%20learnable%20transition%20queries%20that%20provide%20timestep-adaptive%20visual%20guidance%20to%20a%20diffusion%20backbone.%20Experiments%20show%20that%20PhysicEdit%20improves%20over%20Qwen-Image-Edit%20by%205.9%25%20in%20physical%20realism%20and%2010.1%25%20in%20knowledge-grounded%20editing%2C%20setting%20a%20new%20state-of-the-art%20for%20open-source%20methods%2C%20while%20remaining%20competitive%20with%20leading%20proprietary%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21778v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Statics%2520to%2520Dynamics%253A%2520Physics-Aware%2520Image%2520Editing%2520with%2520Latent%2520Transition%2520Priors%26entry.906535625%3DLiangbing%2520Zhao%2520and%2520Le%2520Zhuo%2520and%2520Sayak%2520Paul%2520and%2520Hongsheng%2520Li%2520and%2520Mohamed%2520Elhoseiny%26entry.1292438233%3DInstruction-based%2520image%2520editing%2520has%2520achieved%2520remarkable%2520success%2520in%2520semantic%2520alignment%252C%2520yet%2520state-of-the-art%2520models%2520frequently%2520fail%2520to%2520render%2520physically%2520plausible%2520results%2520when%2520editing%2520involves%2520complex%2520causal%2520dynamics%252C%2520such%2520as%2520refraction%2520or%2520material%2520deformation.%2520We%2520attribute%2520this%2520limitation%2520to%2520the%2520dominant%2520paradigm%2520that%2520treats%2520editing%2520as%2520a%2520discrete%2520mapping%2520between%2520image%2520pairs%252C%2520which%2520provides%2520only%2520boundary%2520conditions%2520and%2520leaves%2520transition%2520dynamics%2520underspecified.%2520To%2520address%2520this%252C%2520we%2520reformulate%2520physics-aware%2520editing%2520as%2520predictive%2520physical%2520state%2520transitions%2520and%2520introduce%2520PhysicTran38K%252C%2520a%2520large-scale%2520video-based%2520dataset%2520comprising%252038K%2520transition%2520trajectories%2520across%2520five%2520physical%2520domains%252C%2520constructed%2520via%2520a%2520two-stage%2520filtering%2520and%2520constraint-aware%2520annotation%2520pipeline.%2520Building%2520on%2520this%2520supervision%252C%2520we%2520propose%2520PhysicEdit%252C%2520an%2520end-to-end%2520framework%2520equipped%2520with%2520a%2520textual-visual%2520 {"title": "InfoNCE Induces Gaussian Distribution", "author": "Roy Betser and Eyal Gofer and Meir Yossef Levi and Guy Gilboa", "abstract": "Contrastive learning has become a cornerstone of modern representation learning, allowing training with massive unlabeled data for both task-specific and general (foundation) models. A prototypical loss in contrastive training is InfoNCE and its variants. In this work, we show that the InfoNCE objective induces Gaussian structure in representations that emerge from contrastive training. We establish this result in two complementary regimes. First, we show that under certain alignment and concentration assumptions, projections of the high-dimensional representation asymptotically approach a multivariate Gaussian distribution. Next, under less strict assumptions, we show that adding a small asymptotically vanishing regularization term that promotes low feature norm and high feature entropy leads to similar asymptotic results. We support our analysis with experiments on synthetic and CIFAR-10 datasets across multiple encoder architectures and sizes, demonstrating consistent Gaussian behavior. This perspective provides a principled explanation for commonly observed Gaussianity in contrastive representations. The resulting Gaussian model enables principled analytical treatment of learned representations and is expected to support a wide range of applications in contrastive learning.", "link": "http://arxiv.org/abs/2602.24012v1", "date": "2026-02-27", "relevancy": 2.4876, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5167}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5087}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4672}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InfoNCE%20Induces%20Gaussian%20Distribution&body=Title%3A%20InfoNCE%20Induces%20Gaussian%20Distribution%0AAuthor%3A%20Roy%20Betser%20and%20Eyal%20Gofer%20and%20Meir%20Yossef%20Levi%20and%20Guy%20Gilboa%0AAbstract%3A%20Contrastive%20learning%20has%20become%20a%20cornerstone%20of%20modern%20representation%20learning%2C%20allowing%20training%20with%20massive%20unlabeled%20data%20for%20both%20task-specific%20and%20general%20%28foundation%29%20models.%20A%20prototypical%20loss%20in%20contrastive%20training%20is%20InfoNCE%20and%20its%20variants.%20In%20this%20work%2C%20we%20show%20that%20the%20InfoNCE%20objective%20induces%20Gaussian%20structure%20in%20representations%20that%20emerge%20from%20contrastive%20training.%20We%20establish%20this%20result%20in%20two%20complementary%20regimes.%20First%2C%20we%20show%20that%20under%20certain%20alignment%20and%20concentration%20assumptions%2C%20projections%20of%20the%20high-dimensional%20representation%20asymptotically%20approach%20a%20multivariate%20Gaussian%20distribution.%20Next%2C%20under%20less%20strict%20assumptions%2C%20we%20show%20that%20adding%20a%20small%20asymptotically%20vanishing%20regularization%20term%20that%20promotes%20low%20feature%20norm%20and%20high%20feature%20entropy%20leads%20to%20similar%20asymptotic%20results.%20We%20support%20our%20analysis%20with%20experiments%20on%20synthetic%20and%20CIFAR-10%20datasets%20across%20multiple%20encoder%20architectures%20and%20sizes%2C%20demonstrating%20consistent%20Gaussian%20behavior.%20This%20perspective%20provides%20a%20principled%20explanation%20for%20commonly%20observed%20Gaussianity%20in%20contrastive%20representations.%20The%20resulting%20Gaussian%20model%20enables%20principled%20analytical%20treatment%20of%20learned%20representations%20and%20is%20expected%20to%20support%20a%20wide%20range%20of%20applications%20in%20contrastive%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24012v1%0AForm%3A%20https%3A//docs.google.com/forms/d/ {"title": "Distilling Balanced Knowledge from a Biased Teacher", "author": "Seonghak Kim", "abstract": "Conventional knowledge distillation, designed for model compression, fails on long-tailed distributions because the teacher model tends to be biased toward head classes and provides limited supervision for tail classes. We propose Long-Tailed Knowledge Distillation (LTKD), a novel framework that reformulates the conventional objective into two components: a cross-group loss, capturing mismatches in prediction distributions across class groups (head, medium, and tail), and a within-group loss, capturing discrepancies within each group's distribution. This decomposition reveals the specific sources of the teacher's bias. To mitigate the inherited bias, LTKD introduces (1) a rebalanced cross-group loss that calibrates the teacher's group-level predictions and (2) a reweighted within-group loss that ensures equal contribution from all groups. Extensive experiments on CIFAR-100-LT, TinyImageNet-LT, and ImageNet-LT demonstrate that LTKD significantly outperforms existing methods in both overall and tail-class accuracy, thereby showing its ability to distill balanced knowledge from a biased teacher for real-world applications.", "link": "http://arxiv.org/abs/2506.18496v2", "date": "2026-02-27", "relevancy": 2.4797, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5133}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4898}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?s {"title": "CUDA Agent: Large-Scale Agentic RL for High-Performance CUDA Kernel Generation", "author": "Weinan Dai and Hanlin Wu and Qiying Yu and Huan-ang Gao and Jiahao Li and Chengquan Jiang and Weiqiang Lou and Yufan Song and Hongli Yu and Jiaze Chen and Wei-Ying Ma and Ya-Qin Zhang and Jingjing Liu and Mingxuan Wang and Xin Liu and Hao Zhou", "abstract": "GPU kernel optimization is fundamental to modern deep learning but remains a highly specialized task requiring deep hardware expertise. Despite strong performance in general programming, large language models (LLMs) remain uncompetitive with compiler-based systems such as torch.compile for CUDA kernel generation. Existing CUDA code generation approaches either rely on training-free refinement or fine-tune models within fixed multi-turn execution-feedback loops, but both paradigms fail to fundamentally improve the model's intrinsic CUDA optimization ability, resulting in limited performance gains. We present CUDA Agent, a large-scale agentic reinforcement learning system that develops CUDA kernel expertise through three components: a scalable data synthesis pipeline, a skill-augmented CUDA development environment with automated verification and profiling to provide reliable reward signals, and reinforcement learning algorithmic techniques enabling stable training. CUDA Agent achieves state-of-the-art results on KernelBench, delivering 100\\%, 100\\%, and 92\\% faster rate over torch.compile on KernelBench Level-1, Level-2, and Level-3 splits, outperforming the strongest proprietary models such as Claude Opus 4.5 and Gemini 3 Pro by about 40\\% on the hardest Level-3 setting.", "link": "http://arxiv.org/abs/2602.24286v1", "date": "2026-02-27", "relevancy": 2.4677, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5017}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarit {"title": "Don't let the information slip away", "author": "Taozhe Li and Guansu Wang and Bo Yu and Yiming Liu and Wei Sun", "abstract": "Real-time object detection has advanced rapidly in recent years. The YOLO series of detectors is among the most well-known CNN-based object detection models and cannot be overlooked. The latest version, YOLOv26, was recently released, while YOLOv12 achieved state-of-the-art (SOTA) performance with 55.2 mAP on the COCO val2017 dataset. Meanwhile, transformer-based object detection models, also known as DEtection TRansformer (DETR), have demonstrated impressive performance. RT-DETR is an outstanding model that outperformed the YOLO series in both speed and accuracy when it was released. Its successor, RT-DETRv2, achieved 53.4 mAP on the COCO val2017 dataset. However, despite their remarkable performance, all these models let information to slip away. They primarily focus on the features of foreground objects while neglecting the contextual information provided by the background. We believe that background information can significantly aid object detection tasks. For example, cars are more likely to appear on roads rather than in offices, while wild animals are more likely to be found in forests or remote areas rather than on busy streets. To address this gap, we propose an object detection model called Association DETR, which achieves state-of-the-art results compared to other object detection models on the COCO val2017 dataset.", "link": "http://arxiv.org/abs/2602.22595v2", "date": "2026-02-27", "relevancy": 2.452, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4909}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4902}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "Inference-time Physics Alignment of Video Generative Models with Latent World Models", "author": "Jianhao Yuan and Xiaofeng Zhang and Felix Friedrich and Nicolas Beltran-Velez and Melissa Hall and Reyhane Askari-Hemmat and Xiaochuang Han and Nicolas Ballas and Michal Drozdzal and Adriana Romero-Soriano", "abstract": "State-of-the-art video generative models produce promising visual content yet often violate basic physics principles, limiting their utility. While some attribute this deficiency to insufficient physics understanding from pre-training, we find that the shortfall in physics plausibility also stems from suboptimal inference strategies. We therefore introduce WMReward and treat improving physics plausibility of video generation as an inference-time alignment problem. In particular, we leverage the strong physics prior of a latent world model (here, VJEPA-2) as a reward to search and steer multiple candidate denoising trajectories, enabling scaling test-time compute for better generation performance. Empirically, our approach substantially improves physics plausibility across image-conditioned, multiframe-conditioned, and text-conditioned generation settings, with validation from human preference study. Notably, in the ICCV 2025 Perception Test PhysicsIQ Challenge, we achieve a final score of 62.64%, winning first place and outperforming the previous state of the art by 7.42%. Our work demonstrates the viability of using latent world models to improve physics plausibility of video generation, beyond this specific instantiation or parameterization.", "link": "http://arxiv.org/abs/2601.10553v2", "date": "2026-02-27", "relevancy": 2.4498, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.667}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5753}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inference-time%20Physics%20Alignment%20of%20Video%20Generative%20Models%20with%20Latent%20World%20Models&body=Title%3A%20Inference-time%20Physics%20Alignment%20of%20Video%20Generative%20Models%20with%20Latent%20World%20Models%0AAuthor%3A%20Jianhao%20Yuan%20and%20Xiaofeng%20Zhang%20and%20Felix%20Friedrich%20and%20Nicolas%20Beltran-Velez%20and%20Melissa%20Hall%20and%20Reyhane%20Askari-Hemmat%20and%20Xiaochuang%20Han%20and%20Nicolas%20Ballas%20and%20Michal%20Drozdzal%20and%20Adriana%20Romero-Soriano%0AAbstract%3A%20State-of-the-art%20video%20generative%20models%20produce%20promising%20visual%20content%20yet%20often%20violate%20basic%20physics%20principles%2C%20limiting%20their%20utility.%20While%20some%20attribute%20this%20deficiency%20to%20insufficient%20physics%20understanding%20from%20pre-training%2C%20we%20find%20that%20the%20shortfall%20in%20physics%20plausibility%20also%20stems%20from%20suboptimal%20inference%20strategies.%20We%20therefore%20introduce%20WMReward%20and%20treat%20improving%20physics%20plausibility%20of%20video%20generation%20as%20an%20inference-time%20alignment%20problem.%20In%20particular%2C%20we%20leverage%20the%20strong%20physics%20prior%20of%20a%20latent%20world%20model%20%28here%2C%20VJEPA-2%29%20as%20a%20reward%20to%20search%20and%20steer%20multiple%20candidate%20denoising%20trajectories%2C%20enabling%20scaling%20test-time%20compute%20for%20better%20generation%20performance.%20Empirically%2C%20our%20approach%20substantially%20improves%20physics%20plausibility%20across%20image-conditioned%2C%20multiframe-conditioned%2C%20and%20text-conditioned%20generation%20settings%2C%20with%20validation%20from%20human%20preference%20study.%20Notably%2C%20in%20the%20ICCV%202025%20Perception%20Test%20PhysicsIQ%20Challenge%2C%20we%20achieve%20a%20final%20score%20of%2062.64%25%2C%20winning%20first%20place%20and%20outperforming%20the%20previous%20state%20of%20the%20art%20by%207.42%25.%20Our%20work%20demonstrates%20the%20viability%20of%20using%20latent%20world%20models%20to%20improve%20physics%20plausibility%20of%20video%20generation%2C%20beyond%20this%20specific%20instantiation%20or%20parameterization.%0ALink%3A%20http%3A//arxiv.org/abs/2601.10553v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInference-time%2520Physics%2520Alignment%2520of%2520Video%2520Generative%2520Models%2520with%2520Latent%2520World%2520Models%26entry.906535625%3DJianhao%2520Yuan%2520and%2520Xiaofeng%2520Zhang%2520and%2520Felix%2520Friedrich%2520and%2520Nicolas%2520Beltran-Velez%2520and%2520Melissa%2520Hall%2520and%2520Reyhane%2520Askari-Hemmat%2520and%2520Xiaochuang%2520Han%2520and%2520Nicolas%2520Ballas%2520and%2520Michal%2520Drozdzal%2520and%2520Adriana%2520Romero-Soriano%26entry.1292438233%3DState-of-the-art%2520video%2520generative%2520models%2520produce%2520promising%2520visual%2520content%2520yet%2520often%2520violate%2520basic%2520physics%2520principles%252C%2520limiting%2520their%2520utility.%2520While%2520some%2520attribute%2520this%2520deficiency%2520to%2520insufficient%2520physics%2520understanding%2520from%2520pre-training%252C%2520we%2520find%2520that%2520the%2520shortfall%2520in%2520physics%2520plausibility%2520also%2520stems%2520from%2520suboptimal%2520inference%2520strategies.%2520We%2520therefore%2520introduce%2520WMReward%2520and%2520treat%2520improving%2520physics%2520plausibility%2520of%2520video%2520generation%2520as%2520an%2520inference-time%2520alignment%2520problem.%2520In%2520particular%252C%2520we%2520leverage%2520the%2520strong%2520physics%2520prior%2520of%2520a%2520latent%2520world%2520model%2520%2528here%252C%2520VJEPA-2%2529%2520as%2520a%2520reward%2520to%2520search%2520and%2520steer {"title": "SpatiaLab: Can Vision-Language Models Perform Spatial Reasoning in the Wild?", "author": "Azmine Toushik Wasi and Wahid Faisal and Abdur Rahman and Mahfuz Ahmed Anik and Munem Shahriar and Mohsin Mahmud Topu and Sadia Tasnim Meem and Rahatun Nesa Priti and Sabrina Afroz Mitu and Md. Iqramul Hoque and Shahriyar Zaman Ridoy and Mohammed Eunus Ali and Majd Hawasly and Mohammad Raza and Md Rizwan Parvez", "abstract": "Spatial reasoning is a fundamental aspect of human cognition, yet it remains a major challenge for contemporary vision-language models (VLMs). Prior work largely relied on synthetic or LLM-generated environments with limited task designs and puzzle-like setups, failing to capture the real-world complexity, visual noise, and diverse spatial relationships that VLMs encounter. To address this, we introduce SpatiaLab, a comprehensive benchmark for evaluating VLMs' spatial reasoning in realistic, unconstrained contexts. SpatiaLab comprises 1,400 visual question-answer pairs across six major categories: Relative Positioning, Depth & Occlusion, Orientation, Size & Scale, Spatial Navigation, and 3D Geometry, each with five subcategories, yielding 30 distinct task types. Each subcategory contains at least 25 questions, and each main category includes at least 200 questions, supporting both multiple-choice and open-ended evaluation. Experiments across diverse state-of-the-art VLMs, including open- and closed-source models, reasoning-focused, and specialized spatial reasoning models, reveal a substantial gap in spatial reasoning capabilities compared with humans. In the multiple-choice setup, InternVL3.5-72B achieves 54.93% accuracy versus 87.57% for humans. In the open-ended setting, all models show a performance drop of around 10-25%, with GPT-5-mini scoring highest at 40.93% versus 64.93% for humans. These results highlight key limitations in handling complex spatial relationships, depth perception, navigation, and 3D geometry. By providing a diverse, real-world evaluation framework, SpatiaLab exposes critical challenges and opportunities for advancing VLMs' spatial reasoning, offering a benchmark to guide future research toward robust, human-aligned spatial understanding. SpatiaLab is available at: https://spatialab-reasoning.github.io/.", "link": "http://arxiv.org/abs/2602.03916v2", "date": "2026-02-27", "relevancy": 2.4391, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6227}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6227}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatiaLab%3A%20Can%20Vision-Language%20Models%20Perform%20Spatial%20Reasoning%20in%20the%20Wild%3F&body=Title%3A%20SpatiaLab%3A%20Can%20Vision-Language%20Models%20Perform%20Spatial%20Reasoning%20in%20the%20Wild%3F%0AAuthor%3A%20Azmine%20Toushik%20Wasi%20and%20Wahid%20Faisal%20and%20Abdur%20Rahman%20and%20Mahfuz%20Ahmed%20Anik%20and%20Munem%20Shahriar%20and%20Mohsin%20Mahmud%20Topu%20and%20Sadia%20Tasnim%20Meem%20and%20Rahatun%20Nesa%20Priti%20and%20Sabrina%20Afroz%20Mitu%20and%20Md.%20Iqramul%20Hoque%20and%20Shahriyar%20Zaman%20Ridoy%20and%20Mohammed%20Eunus%20Ali%20and%20Majd%20Hawasly%20and%20Mohammad%20Raza%20and%20Md%20Rizwan%20Parvez%0AAbstract%3A%20Spatial%20reasoning%20is%20a%20fundamental%20aspect%20of%20human%20cognition%2C%20yet%20it%20remains%20a%20major%20challenge%20for%20contemporary%20vision-language%20models%20%28VLMs%29.%20Prior%20work%20largely%20relied%20on%20synthetic%20or%20LLM-generated%20environments%20with%20limited%20task%20designs%20and%20puzzle-like%20setups%2C%20failing%20to%20captur {"title": "Mode Seeking meets Mean Seeking for Fast Long Video Generation", "author": "Shengqu Cai and Weili Nie and Chao Liu and Julius Berner and Lvmin Zhang and Nanye Ma and Hansheng Chen and Maneesh Agrawala and Leonidas Guibas and Gordon Wetzstein and Arash Vahdat", "abstract": "Scaling video generation from seconds to minutes faces a critical bottleneck: while short-video data is abundant and high-fidelity, coherent long-form data is scarce and limited to narrow domains. To address this, we propose a training paradigm where Mode Seeking meets Mean Seeking, decoupling local fidelity from long-term coherence based on a unified representation via a Decoupled Diffusion Transformer. Our approach utilizes a global Flow Matching head trained via supervised learning on long videos to capture narrative structure, while simultaneously employing a local Distribution Matching head that aligns sliding windows to a frozen short-video teacher via a mode-seeking reverse-KL divergence. This strategy enables the synthesis of minute-scale videos that learns long-range coherence and motions from limited long videos via supervised flow matching, while inheriting local realism by aligning every sliding-window segment of the student to a frozen short-video teacher, resulting in a few-step fast long video generator. Evaluations show that our method effectively closes the fidelity-horizon gap by jointly improving local sharpness, motion and long-range consistency. Project website: https://primecai.github.io/mmm/.", "link": "http://arxiv.org/abs/2602.24289v1", "date": "2026-02-27", "relevancy": 2.4139, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6248}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6233}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5752}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mode%20Seeking%20meets%20Mean%20Seeking%20for%20Fast%20Long%20Video%20Generation&body=Title%3A%20Mode%20Seeking%20meets%20Mean%20Seeking%20for%20Fast%20Long%20Video%20Generation%0AAuthor%3A%20Shengqu%20Cai%20and%20Weili%20Nie%20and%20Chao%20Liu%20and%20Julius%20Berner%20and%20Lvmin%20Zhang%20and%20Nanye%20Ma%20and%20Hansheng%20Chen%20and%20Maneesh%20Agrawala%20and%20Leonidas%20Guibas%20and%20Gordon%20Wetzstein%20and%20Arash%20Vahdat%0AAbstract%3A%20Scaling%20video%20generation%20from%20seconds%20to%20minutes%20faces%20a%20critical%20bottleneck%3A%20while%20short-video%20data%20is%20abundant%20and%20high-fidelity%2C%20coherent%20long-form%20data%20is%20scarce%20and%20limited%20to%20narrow%20domains.%20To%20address%20this%2C%20we%20propose%20a%20training%20paradigm%20where%20Mode%20Seeking%20meets%20Mean%20Seeking%2C%20decoupling%20local%20fidelity%20from%20long-term%20coherence%20based%20on%20a%20unified%20representation%20via%20a%20Decoupled%20Diffusion%20Transformer.%20Our%20approach%20utilizes%20a%20global%20Flow%20Matching%20head%20trained%20via%20supervised%20learning%20on%20long%20videos%20to%20capture%20narrative%20structure%2C%20while%20simultaneously%20employing%20a%20local%20Distribution%20Matching%20head%20that%20aligns%20sliding%20windows%20to%20a%20frozen%20short-video%20teacher%20via%20a%20mode-seeking%20reverse-KL%20divergence.%20This%20strategy%20enables%20the%20synthesis%20of%20minute-scale%20videos%20that%20learns%20long-range%20coherence%20and%20motions%20from%20limited%20long%20videos%20via%20supervised%20flow%20matching%2C%20while%20inheriting%20local%20realism%20by%20aligning%20every%20sliding-window%20segment%20of%20the%20student%20to%20a%20frozen%20short-video%20teacher%2C%20resulting%20in%20a%20few-step%20fast%20long%20video%20generator.%20Evaluations%20show%20that%20our%20method%20effectively% {"title": "Preference Packing: Efficient Preference Optimization for Large Language Models", "author": "Jaekyung Cho", "abstract": "Resource-efficient training optimization techniques are becoming increasingly important as the size of large language models (LLMs) continues to grow. In particular, batch packing is commonly used in pre-training and supervised fine-tuning to achieve resource-efficient training. We propose preference packing, a method to enhance resource efficiency in training techniques that use data with different responses for the same input prompt, such as reward models or Direct Preference Optimization (DPO). Preference packing improves resource efficiency by reducing the attention operations for duplicate input prompts and decreasing KV cache memory usage. We conducted experiments on text-only datasets and image-included datasets and achieved at least 37% reduction in training time. Notably, this method can be applied alongside existing optimization techniques such as batch sorting, resulting in a 3.22x speedup.", "link": "http://arxiv.org/abs/2602.24082v1", "date": "2026-02-27", "relevancy": 2.4123, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4933}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4803}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4738}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Preference%20Packing%3A%20Efficient%20Preference%20Optimization%20for%20Large%20Language%20Models&body=Title%3A%20Preference%20Packing%3A%20Efficient%20Preference%20Optimization%20for%20Large%20Language%20Models%0AAuthor%3A%20Jaekyung%20Cho%0AAbstract%3A%20Resource-efficient%20training%20optimization%20techniques%20are%20becoming%20increasingly%20important%20as%20the%20size%20of%20large%20language%20models%20%28LLMs%29%20continues%20to%20grow.%20In%20particular%2C%20batch%20packing%20is%20commonly%20used%20in%20pre-training%20and%20supervised%20fine-tuning%20to%20achieve%20resource-efficient%20training.%20We%20propose%20preference%20packing%2C%20a%20method%20to%20enhance%20resource%20efficiency%20in%20training%20techniques%20that%20use%20data%20with%20different%20responses%20for%20the%20same%20input%20prompt%2C%20such%20as%20reward%20models%20or%20Direct%20Preference%20Optimization%20%28DPO%29.%20Preference%20packing%20improves%20resource%20efficiency%20by%20reducing%20the%20attention%20operations%20for%20duplicate%20input%20prompts%20and%20decreasing%20KV%20cache%20memory%20usage.%20We%20conducted%20experiments%20on%20text-only%20datasets%20and%20image-included%20datasets%20and%20achieved%20at%20least%2037%25%20reduction%20in%20training%20time.%20Notably%2C%20this%20method%20can%20be%20applied%20alongside%20existing%20optimization%20techniques%20such%20as%20batch%20sorting%2C%20resulting%20in%20a%203.22x%20speedup.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24082v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPreference%2520Packing%253A%2520Efficient%2520Preference%2520Optimization%2520for%2520Large%2520Language%2520Models%26entry.906535625%3DJaekyung%2520Cho%26entry.1292438233%3DResource-efficient%2520training%2520optimization%2520techniques%2520are%2520becoming%2520increasingly%2520important%2520as%2520the%2520size%2520of%2520large%2520language%2520models%2520%2528LLMs%2529%2520continues%2520to%2520grow.%2520In%2520particular%252C%2520batch%2520packing%2520is%2520commonly%2520used%2520in%2520pre-training%2520and%2520supervised%2520fine-tuning%2520to%2520achieve%2520resource-efficient%2520training.%2520We%2520propose%2520preference%2520packing%252C%2520a%2520method%2520to%2520enhance%2520resource%2520efficiency%2520in%2520training%2520techniques%2520that%2520use%2520data%2520with%2520different%2520responses%2520for%2520the%2520same%2520input%2520prompt%252C%2520such%2520as%2520reward%2520models%2520or%2520Direct%2520Preference%2520Optimization%2520%2528DPO%2529.%2520Preference%2520packing%2520improves%2520resource%2520efficiency%2520by%2520reducing%2520the%2520attention%2520operations%2520for%2520duplicate%2520input%2520prompts%2520and%2520decreasing%2520KV%2520cache%2520memory%2520usage.%2520We%2520conducted%2520experiments%2520on%2520text-only%2520datasets%2520and%2520image-included%2520datasets%2520and%2520achieved%2520at%2520least%252037%2525%2520reduction%2520in%2520training%2520time.%2520Notably%252C%2520this%2520method%2520can%2520be%2520applied%2520alongside%2520existing%2520optimization%2520techniques%2520such%2520as%2520batch%2520sorting%252C%2520resulting%2520in%2520a%25203.22x%2520speedup.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24082v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Preference%20Packing%3A%20Efficient%20Preference%20Optimization%20for%20Large%20Language%20Models&entry.906535625=Jaekyung%20Cho&entry.1292438233=Resource-efficient%20training%20optimization%20techniques%20are%20becoming%20increasingly%20important%20as%20the%20size%20of%20large%20language%20models%20%28LLMs%29%20continues%20to%20grow.%20In%20particular%2C%20batch%20packing%20is%20commonly%20used%20in%20pre-training%20and%20supervised%20fine-tuning%20to%20achieve%20resource-efficient%20training.%20We%20propose%20preference%20packing%2C%20a%20method%20to%20enhance%20resource%20efficiency%20in%20training%20techniques%20that%20use%20data%20with%20different%20responses%20for%20the%20same%20input%20prompt%2C%20such%20as%20reward%20models%20or%20Direct%20Preference%20Optimization%20%28DPO%29.%20Preference%20packing%20improves%20resource%20efficiency%20by%20reducing%2 {"title": "General vs Domain-Specific CNNs: Understanding Pretraining Effects on Brain MRI Tumor Classification", "author": "Helia Abedini and Saba Rahimi and Reza Vaziri", "abstract": "The accurate identification of brain tumors from magnetic resonance imaging (MRI) is essential for timely diagnosis and effective therapeutic intervention. While deep convolutional neural networks (CNNs), particularly those pre-trained on extensive datasets, have shown considerable promise in medical image analysis, a key question arises when working with limited data: do models pre-trained on specialized medical image repositories outperform those pre-trained on diverse, general-domain datasets? This research presents a comparative analysis of three distinct pre-trained CNN architectures for brain tumor classification: RadImageNet DenseNet121, which leverages pre-training on medical-domain data, alongside two modern general-purpose networks, EfficientNetV2S and ConvNeXt-Tiny. All models were trained and fine-tuned under uniform experimental conditions using a modestly sized brain MRI dataset to maintain consistency in evaluation. The experimental outcomes indicate that ConvNeXt-Tiny delivered the best performance, achieving 93% test accuracy, followed by EfficientNetV2S at 85%. In contrast, RadImageNet DenseNet121 attained only 68% accuracy and exhibited higher loss, indicating limited generalization capability despite its domain-specific pre-training. These observations imply that pre-training on medical-domain data does not necessarily guarantee superior performance in data-scarce scenarios. Conversely, contemporary general-purpose CNNs with deeper architectures, pre-trained on large-scale diverse datasets, may offer more effective transfer learning for specialized diagnostic tasks in medical imaging.", "link": "http://arxiv.org/abs/2511.18326v2", "date": "2026-02-27", "relevancy": 2.4106, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4867}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4798}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20General%20vs%20Domain-Specific%20CNNs%3A%20Understanding%20Pretraining%20Effects%20on%20Brain%20MRI%20Tumor%20Classification&body=Title%3A%20General%20vs%20Domain-Specific%20CNNs%3A%20Understanding%20Pretraining%20Effects%20on%20Brain%20MRI%20Tumor%20Classification%0AAuthor%3A%20Helia%20Abedini%20and%20Saba%20Rahimi%20and%20Reza%20Vaziri%0AAbstract%3A%20The%20accurate%20identification%20of%20brain%20tumors%20from%20magnetic%20resonance%20imaging%20%28MRI%29%20is%20essential%20for%20timely%20diagnosis%20and%20effective%20therapeutic%20intervention.%20While%20deep%20convolutional%20neural%20networks%20%28CNNs%29%2C%20particularly%20those%20pre-trained%20on%20extensive%20datasets%2C%20have%20shown%20considerable%20promise%20in%20medical%20image%20analysis%2C%20a%20key%20question%20arises%20when%20working%20with%20limited%20data%3A%20do%20models%20pre-trained%20on%20specialized%20medical%20image%20repositories%20outperform%20those%20pre-trained%20on%20diverse%2C%20general-domain%20datasets%3F%20This%20research%20presents%20a%20comparative%20analysis%20of%20three%20distinct%20pre-trained%20CNN%20architectures%20for%20brain%20tumor%20classification%3A%20RadImageNet%20DenseNet121%2C%20which%20leverages%20pre-training%20on%20medical-domain%20data%2C%20alongside%20two%20modern%20general-purpose%20networks%2C%20EfficientNetV2S%20and%20ConvNeXt-Tiny.%20All%20models%20were%20trained%20and%20fine-tuned%20under%20uniform%20experimental%20conditions%20using%20a%20modestly%20sized%20brain%20MRI%20dataset%20to%20maintain%20consistency%20in%20evaluation.%20The%20experimental%20outcomes%20indicate%20that%20ConvNeXt-Tiny%20delivered%20the%20best%20performance%2C%20achieving%2093%25%20test%20accuracy%2C%20followed%20by%20EfficientNetV2S%20at%2085%25.%20In%20contrast%2C%20RadImageNet%20DenseNet121%20attained%20only%2068%25%20accuracy%20and%20exhibited%20higher%20loss%2C%20indicating%20limited%20generalization%20capability%20despite%20its%20domain-specific%20pre-training.%20These%20observations%20imply%20that%20pre-training%20on%20medical-domain%20data%20does%20not%20necessarily%20guarantee%20superior%20performance%20in%20data-scarce%20scenarios.%20Conversely%2C%20contemporary%20general-purpose%20CNNs%20with%20deeper%20architectures%2C%20pre-trained%20on%20large-scale%20diverse%20datasets%2C%20may%20offer%20more%20effective%20transfer%20learning%20for%20specialized%20diagnostic%20tasks%20in%20medical%20imaging.%0ALink%3A%20http%3A//arxiv.org/abs/2511.18326v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneral%2520vs%2520Domain-Specific%2520CNNs%253A%2520Understanding%2520Pretraining%2520Effects%2520on%2520Brain%2520MRI%2520Tumor%2520Classification%26entry.906535625%3DHelia%2520Abedini%2520and%2520Saba%2520Rahimi%2520and%2520Reza%2520Vaziri%26entry.1292438233%3DThe%2520accurate%2520identification%2520of%2520brain%2520tumors%2520from%2520magnetic%2520resonance%2520imaging%2520%2528MRI%2529%2520is%2520essential%2520for%2520timely%2520diagnosis%2520and%2520effective%2520therapeutic%2520intervention.%2520While%2520deep%2520convolutional%2520neural%2520networks%2520%2528CNNs%2529%252C%2520particularly%2520those%2520pre-trained%2520on%2520extensive%2520datasets%252C%2520have%2520shown%2520considerable%2520promise%2520in%2520medical%2520image%2520analysis%252C%2520a%2520key%2520question%2520arises%2520when%2520working%2520with%2520limited%2520data%253A%2520do%2520models%2520pre-trained%2520on%2520specialized%2520medical%2520image%

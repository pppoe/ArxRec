{"title": "TokenCLIP: Token-wise Prompt Learning for Zero-shot Anomaly Detection", "author": "Qihang Zhou and Binbin Gao and Guansong Pang and Xin Wang and Jiming Chen and Shibo He", "abstract": "Adapting CLIP for anomaly detection on unseen objects has shown strong potential in a zero-shot manner. However, existing methods typically rely on a single textual space to align with visual semantics across diverse objects and domains. The indiscriminate alignment hinders the model from accurately capturing varied anomaly semantics. We propose TokenCLIP, a token-wise adaptation framework that enables dynamic alignment between visual and learnable textual spaces for fine-grained anomaly learning. Rather than mapping all visual tokens to a single, token-agnostic textual space, TokenCLIP aligns each token with a customized textual subspace that represents its visual characteristics. Explicitly assigning a unique learnable textual space to each token is computationally intractable and prone to insufficient optimization. We instead expand the token-agnostic textual space into a set of orthogonal subspaces, and then dynamically assign each token to a subspace combination guided by semantic affinity, which jointly supports customized and efficient token-wise adaptation. To this end, we formulate dynamic alignment as an optimal transport problem, where all visual tokens in an image are transported to textual subspaces based on semantic similarity. The transport constraints of OT ensure sufficient optimization across subspaces and encourage them to focus on different semantics. Solving the problem yields a transport plan that adaptively assigns each token to semantically relevant subspaces. A top-k masking is then applied to sparsify the plan and specialize subspaces for distinct visual regions. Extensive experiments demonstrate the superiority of TokenCLIP.", "link": "http://arxiv.org/abs/2510.21171v4", "date": "2026-02-27", "relevancy": 2.2777, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6097}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.541}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5397}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TokenCLIP%3A%20Token-wise%20Prompt%20Learning%20for%20Zero-shot%20Anomaly%20Detection&body=Title%3A%20TokenCLIP%3A%20Token-wise%20Prompt%20Learning%20for%20Zero-shot%20Anomaly%20Detection%0AAuthor%3A%20Qihang%20Zhou%20and%20Binbin%20Gao%20and%20Guansong%20Pang%20and%20Xin%20Wang%20and%20Jiming%20Chen%20and%20Shibo%20He%0AAbstract%3A%20Adapting%20CLIP%20for%20anomaly%20detection%20on%20unseen%20objects%20has%20shown%20strong%20potential%20in%20a%20zero-shot%20manner.%20However%2C%20existing%20methods%20typically%20rely%20on%20a%20single%20textual%20space%20to%20align%20with%20visual%20semantics%20across%20diverse%20objects%20and%20domains.%20The%20indiscriminate%20alignment%20hinders%20the%20model%20from%20accurately%20capturing%20varied%20anomaly%20semantics.%20We%20propose%20TokenCLIP%2C%20a%20token-wise%20adaptation%20framework%20that%20enables%20dynamic%20alignment%20between%20visual%20and%20learnable%20textual%20spaces%20for%20fine-grained%20anomaly%20learning.%20Rather%20than%20mapping%20all%20visual%20tokens%20to%20a%20single%2C%20token-agnostic%20textual%20space%2C%20TokenCLIP%20aligns%20each%20token%20with%20a%20customized%20textual%20subspace%20that%20represents%20its%20visual%20characteristics.%20Explicitly%20assigning%20a%20unique%20learnable%20textual%20space%20to%20each%20token%20is%20computationally%20intractable%20and%20prone%20to%20insufficient%20optimization.%20We%20instead%20expand%20the%20token-agnostic%20textual%20space%20into%20a%20set%20of%20orthogonal%20subspaces%2C%20and%20then%20dynamically%20assign%20each%20token%20to%20a%20subspace%20combination%20guided%20by%20semantic%20affinity%2C%20which%20jointly%20supports%20customized%20and%20efficient%20token-wise%20adaptation.%20To%20this%20end%2C%20we%20formulate%20dynamic%20alignment%20as%20an%20optimal%20transport%20problem%2C%20where%20all%20visual%20tokens%20in%20an%20image%20are%20transported%20to%20textual%20subspaces%20based%20on%20semantic%20similarity.%20The%20transport%20constraints%20of%20OT%20ensure%20sufficient%20optimization%20across%20subspaces%20and%20encourage%20them%20to%20focus%20on%20different%20semantics.%20Solving%20the%20problem%20yields%20a%20transport%20plan%20that%20adaptively%20assigns%20each%20token%20to%20semantically%20relevant%20subspaces.%20A%20top-k%20masking%20is%20then%20applied%20to%20sparsify%20the%20plan%20and%20specialize%20subspaces%20for%20distinct%20visual%20regions.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20TokenCLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2510.21171v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTokenCLIP%253A%2520Token-wise%2520Prompt%2520Learning%2520for%2520Zero-shot%2520Anomaly%2520Detection%26entry.906535625%3DQihang%2520Zhou%2520and%2520Binbin%2520Gao%2520and%2520Guansong%2520Pang%2520and%2520Xin%2520Wang%2520and%2520Jiming%2520Chen%2520and%2520Shibo%2520He%26entry.1292438233%3DAdapting%2520CLIP%2520for%2520anomaly%2520detection%2520on%2520unseen%2520objects%2520has%2520shown%2520strong%2520potential%2520in%2520a%2520zero-shot%2520manner.%2520However%252C%2520existing%2520methods%2520typically%2520rely%2520on%2520a%2520single%2520textual%2520space%2520to%2520align%2520with%2520visual%2520semantics%2520across%2520diverse%2520objects%2520and%2520domains.%2520The%2520indiscriminate%2520alignment%2520hinders%2520the%2520model%2520from%2520accurately%2520 0specialize%2520subspaces%2520for%2520distinct%2520visual%2520regions.%2520Extensive%2520experiments%2520demonstrate%2520the%2520superiority%2520of%2520TokenCLIP.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.21171v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TokenCLIP%3A%20Token-wise%20Prompt%20Learning%20for%20Zero-shot%20Anomaly%20Detection&entry.906535625=Qihang%20Zhou%20and%20Binbin%20Gao%20and%20Guansong%20Pang%20and%20Xin%20Wang%20and%20Jiming%20Chen%20and%20Shibo%20He&entry.1292438233=Adapting%20CLIP%20for%20anomaly%20detection%20on%20unseen%20objects%20has%20shown%20strong%20potential%20in%20a%20zero-shot%20manner.%20However%2C%20existing%20methods%20typically%20rely%20on%20a%20single%20textual%20space%20to%20align%20with%20visual%20semantics%20across%20diverse%20objects%20and%20domains.%20The%20indiscriminate%20alignment%20hinders%20the%20model%20from%20accurately%20capturing%20varied%20anomaly%20semantics.%20We%20propose%20TokenCLIP%2C%20a%20token-wise%20adaptation%20framework%20that%20enables%20dynamic%20alignment%20between%20visual%20and%20learnable%20textual%20spaces%20for%20fine-grained%20anomaly%20learning.%20Rather%20than%20mapping%20all%20visual%20tokens%20to%20a%20single%2C%20token-agnostic%20textual%20space%2C%20TokenCLIP%20aligns%20each%20token%20with%20a%20customized%20textual%20subspace%20that%20represents%20its%20visual%20characteristics.%20Explicitly%20assigning%20a%20unique%20learnable%20textual%20space%20to%20each%20token%20is%20computationally%20intractable%20and%20prone%20to%20insufficient%20optimization.%20We%20instead%20expand%20the%20token-agnostic%20textual%20space%20into%20a%20set%20of%20orthogonal%20subspaces%2C%20and%20then%20dynamically%20assign%20each%20token%20to%20a%20subspace%20combination%20guided%20by%20semantic%20affinity%2C%20which%20jointly%20supports%20customized%20and%20efficient%20token-wise%20adaptation. {"title": "MuViT: Multi-Resolution Vision Transformers for Learning Across Scales in Microscopy", "author": "Albert Dominguez Mantes and Gioele La Manno and Martin Weigert", "abstract": "Modern microscopy routinely produces gigapixel images that contain structures across multiple spatial scales, from fine cellular morphology to broader tissue organization. Many analysis tasks require combining these scales, yet most vision models operate at a single resolution or derive multi-scale features from one view, limiting their ability to exploit the inherently multi-resolution nature of microscopy data. We introduce MuViT, a transformer architecture built to fuse true multi-resolution observations from the same underlying image. MuViT embeds all patches into a shared world-coordinate system and extends rotary positional embeddings to these coordinates, enabling attention to integrate wide-field context with high-resolution detail within a single encoder. Across synthetic benchmarks, kidney histopathology, and high-resolution mouse-brain microscopy, MuViT delivers consistent improvements over strong ViT and CNN baselines. Multi-resolution MAE pretraining further produces scale-consistent representations that enhance downstream tasks. These results demonstrate that explicit world-coordinate modelling provides a simple yet powerful mechanism for leveraging multi-resolution information in large-scale microscopy analysis.", "link": "http://arxiv.org/abs/2602.24222v1", "date": "2026-02-27", "relevancy": 2.2707, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5886}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5623}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MuViT%3A%20Multi-Resolution%20Vision%20Transformers%20for%20Learning%20Across%20Scales%20in%20Microscopy&body=Title%3A%20MuViT%3A%20Multi-Resolution%20Vision%20Transformers%20for%20Learning%20Across%20Scales%20in%20Microscopy%0AAuthor%3A%20Albert%20Dominguez%20Mantes%20and%20Gioele%20La%20Manno%20and%20Martin%20Weigert%0AAbstract%3A%20Modern%20microscopy%20routinely%20produces%20gigapixel%20images%20that%20contain%20structures%20across%20multiple%20spatial%20scales%2C%20from%20fine%20cellular%20morphology%20to%20broader%20tissue%20organization.%20Many%20analysis%20tasks%20require%20combining%20these%20scales%2C%20yet%20most%20vision%20models%20operate%20at%20a%20single%20resolution%20or%20derive%20multi-scale%20features%20from%20one%20view%2C%20limiting%20their%20ability%20to%20exploit%20the%20inherently%20multi-resolution%20nature%20of%20microscopy%20data.%20We%20introduce%20MuViT%2C%20a%20transformer%20architecture%20built%20to%20fuse%20true%20multi-resolution%20observations%20from%20the%20same%20underlying%20image.%20MuViT%20embeds%20all%20patches%20into%20a%20shared%20world-coordinate%20system%20and%20extends%20rotary%20positional%20embeddings%20to%20these%20coordinates%2C%20enabling%20attention%20to%20integrate%20wide-field%20context%20with%20high-resolution%20detail%20within%20a%20single%20encoder.%20Across%20synthetic%20benchmarks%2C%20kidney%20histopathology%2C%20and%20high-resolution%20mouse-brain%20microscopy%2C%20MuViT%20delivers%20consistent%20improvements%20over%20strong%20ViT%20and%20CNN%20baselines.%20Multi-resolution%20MAE%20pretraining%20further%20produces%20scale-consistent%20representations%20that%20enhance%20downstream%20tasks.%20These%20results%20demonstrate%20that%20explicit%20world-coordinate%20modelling%20provides%20a%20simple%20yet%20powerful%20mechanism%20for%20leveraging%20multi-resolution%20information%20in%20large-scale%20microscopy%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24222v1%0A tream%2520tasks.%2520These%2520results%2520demonstrate%2520that%2520explicit%2520world-coordinate%2520modelling%2520provides%2520a%2520simple%2520yet%2520powerful%2520mechanism%2520for%2520leveraging%2520multi-resolution%2520information%2520in%2520large-scale%2520microscopy%2520analysis.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24222v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MuViT%3A%20Multi-Resolution%20Vision%20Transformers%20for%20Learning%20Across%20Scales%20in%20Microscopy&entry.906535625=Albert%20Dominguez%20Mantes%20and%20Gioele%20La%20Manno%20and%20Martin%20Weigert&entry.1292438233=Modern%20microscopy%20routinely%20produces%20gigapixel%20images%20that%20contain%20structures%20across%20multiple%20spatial%20scales%2C%20from%20fine%20cellular%20morphology%20to%20broader%20tissue%20organization.%20Many%20analysis%20tasks%20require%20combining%20these%20scales%2C%20yet%20most%20vision%20models%20operate%20at%20a%20single%20resolution%20or%20derive%20multi-scale%20features%20from%20one%20view%2C%20limiting%20their%20ability%20to%20exploit%20the%20inherently%20multi-resolution%20nature%20of%20microscopy%20data.%20We%20introduce%20MuViT%2C%20a%20transformer%20architecture%20built%20to%20fuse%20true%20multi-resolution%20observations%20from%20the%20same%20underlying%20image.%20MuViT%20embeds%20all%20patches%20into%20a%20shared%20world-coordinate%20system%20and%20extends%20rotary%20positional%20embeddings%20to%20these%20coordinates%2C%20enabling%20attention%20to%20integrate%20wide-field%20context%20with%20high-resolution%20detail%20within%20a%20single%20encoder.%20Across%20synthetic%20benchmarks%2C%20kidney%20histopathology%2C%20and%20high-resolution%20mouse-brain%20microscopy%2C%20MuViT%20delivers%20consistent%20improvements%20over%20strong%20ViT%20and%20CNN%20baselines.%20Multi-resolution%20MAE%20pretraining%20further%20produces%20scale-consistent%20representations%20that%20enhance%20downstream%20tasks.%20These%20results%20demonstrate%20that%20explicit%20world-coordinate%20modelling%20provides%20a%20simple%20yet%20powerful%20mechanism%20for%20leveraging%20multi-resolution%20information%20in%20large-scale%20microscopy%20analysis.&entry.1838667208=http%3A//arxiv.org/abs/2602.24222v1&entry.124074799=Read"},
{"title": "Bandwidth-adaptive Cloud-Assisted 360-Degree 3D Perception for Autonomous Vehicles", "author": "Faisal Hawladera and Rui Meireles and Gamal Elghazaly and Ana Aguiar and Rapha\u00ebl Frank", "abstract": "A key challenge for autonomous driving lies in maintaining real-time situational awareness regarding surrounding obstacles under strict latency constraints. The high processing requirements coupled with limited onboard computational resources can cause delay issues, particularly in complex urban settings. To address this, we propose leveraging Vehicle-to-Everything (V2X) communication to partially offload processing to the cloud, where compute resources are abundant, thus reducing overall latency. Our approach utilizes transformer-based models to fuse multi-camera sensor data into a comprehensive Bird's-Eye View (BEV) representation, enabling accurate 360-degree 3D object detection. The computation is dynamically split between the vehicle and the cloud based on the number of layers processed locally and the quantization level of the features. To further reduce network load, we apply feature vector clipping and compression prior to transmission. In a real-world experimental evaluation, our hybrid strategy achieved a 72 \\% reduction in end-to-end latency compared to a traditional onboard solution. To adapt to fluctuating network conditions, we introduce a dynamic optimization algorithm that selects the split point and quantization level to maximize detection accuracy while satisfying real-time latency constraints. Trace-based evaluation under realistic bandwidth variability shows that this adaptive approach improves accuracy by up to 20 \\% over static parameterization with the same latency performance.", "link": "http://arxiv.org/abs/2602.23871v1", "date": "2026-02-27", "relevancy": 2.2707, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5889}, {"tit {"title": "Uncertainty Quantification for Multimodal Large Language Models with Incoherence-adjusted Semantic Volume", "author": "Gregory Kang Ruey Lau and Hieu Dao and Nicole Kan Hui Lin and Bryan Kian Hsiang Low", "abstract": "Despite their capabilities, Multimodal Large Language Models (MLLMs) may produce plausible but erroneous outputs, hindering reliable deployment. Accurate uncertainty metrics could enable escalation of unreliable queries to human experts or larger models for improved performance. However, existing uncertainty metrics have practical constraints, such as being designed only for specific modalities, reliant on external tools, or computationally expensive. We introduce UMPIRE, a training-free uncertainty quantification framework for MLLMs that works efficiently across various input and output modalities without external tools, relying only on the models' own internal modality features. UMPIRE computes the incoherence-adjusted semantic volume of sampled MLLM responses for a given task instance, effectively capturing both the global semantic diversity of samples and the local incoherence of responses based on internal model confidence. We propose uncertainty desiderata for MLLMs and provide theoretical analysis motivating UMPIRE's design. Extensive experiments show that UMPIRE consistently outperforms baseline metrics in error detection and uncertainty calibration across image, audio, and video-text benchmarks, including adversarial and out-of-distribution settings. We also demonstrate UMPIRE's generalization to non-text output tasks, including image and audio generation.", "link": "http://arxiv.org/abs/2602.24195v1", "date": "2026-02-27", "relevancy": 2.2684, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6446}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5674}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5358}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uncertainty%20Quantification%20for%20Multimodal%20Large%20Language%20Models%20with%20Incoherence-adjusted%20Semantic%20Volume&body=Title%3A%20Uncertainty%20Quantification%20for%20Multimodal%20Large%20Language%20Models%20with%20Incoherence-adjusted%20Semantic%20Volume%0AAuthor%3A%20Gregory%20Kang%20Ruey%20Lau%20and%20Hieu%20Dao%20and%20Nicole%20Kan%20Hui%20Lin%20and%20Bryan%20Kian%20Hsiang%20Low%0AAbstract%3A%20Despite%20their%20capabilities%2C%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20may%20produce%20plausible%20but%20erroneous%20outputs%2C%20hindering%20reliable%20deployment.%20Accurate%20uncertainty%20metrics%20could%20enable%20escalation%20of%20unreliable%20queries%20to%20human%20experts%20or%20larger%20models%20for%20improved%20performance.%20However%2C%20existing%20uncertainty%20metrics%20have%20practical%20constraints%2C%20such%20as%20being%20designed%20only%20for%20specific%20modalities%2C%20reliant%20on%20external%20tools%2C%20or%20computationally%20expensive.%20We%20introduce%20UMPIRE%2C%20a%20training-free%20uncertainty%20quantification%20framework%20for%20MLLMs%20that%20works%20efficiently%20across%20various%20input%20and%20output%20modalities%20without%20external%20tools%2C%20relying%20only%20on%20the%20models%27%20own%20internal%20modality%20features.%20UMPIRE%20computes%20the%20incoherence-adjusted%20semantic%20volume%20of%20sampled%20MLLM%20responses%20for%20a%20given%20task%20instance%2C%20effectively%20capturing%20both%20the%20global%20semantic%20diversity%20of%20samples%20and%20the%20local%20incoherence%20of%20responses%20based%20on%20internal%20model%20confidence.%20We%20propose%20uncertainty%20desiderata%20for%20MLLMs%20and%20provide%20theoretical%20analysis%20motivating%20UMPIRE%27s%20design.%20Extensive%20experiments%20show%20that%20UMPIRE%20consistently%20outperforms%20baseline%20metrics%20in%20error%20detection%20and%20uncertainty%20calibration%20across%20image%2C%20audio%2C%20and%20video-text%20benchmarks%2C%20including%20adversarial%20and%20out-of-distribution%20settings.%20We%20also%20demonstrate%20UMPIRE%27s%20generalization%20to%20non-text%20output%20tasks%2C%20including%20image%20and%20audio%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24195v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUncertainty%2520Quantification%2520for%2520Multimodal%2520Large%2520Language%2520Models%2520with%2520Incoherence-adjusted%2520Semantic%2520Volume%26entry.906535625%3DGregory%2520Kang%2520Ruey%2520Lau%2520and%2520Hieu%2520Dao%2520and%2520Nicole%2520Kan%2520Hui%2520Lin%2520and%2520Bryan%2520Kian%2520Hsiang%2520Low%26entry.1292438233%3DDespite%2520their%2520capabilities%252C%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520may%2520produce%2520plausible%2520but%2520erroneous%2520outputs%252C%2520hindering%2520reliable%2520deployment.%2520Accurate%2520uncertainty%2520metrics%2520could%2520enable%2520escalation%2520of%2520unreliable%2520queries%2520to%2520human%2520experts%2520or%2520larger%2520models%2520for%2520improved%2520performance.%2520However%252C%2520existing%2520uncertainty%2520metrics%2520have%2520practical%2520constraints%252C%2520such%2520as%2520being%2520designed%2520only%2520for%2520specific%2520modalities%252C%2520reliant%2520on%2520external%2520tools%252C%2520or%2520computationally%2520expensive.%2520We%2520introduce%2520UMPIRE%252C%2520a%2520training-free%2520uncertainty%2520quantification%2520framework%2520for%2520MLLMs%2520that%2520works%2520efficiently%2520across%2520vari {"title": "Parallel Continuous-Time Relative Localization with Augmented Clamped Non-Uniform B-Splines", "author": "Jiadong Lu and Zhehan Li and Tao Han and Miao Xu and Chao Xu and Yanjun Cao", "abstract": "Accurate relative localization is critical for multi-robot cooperation. In robot swarms, measurements from different robots arrive asynchronously and with clock time-offsets. Although Continuous-Time (CT) formulations have proved effective for handling asynchronous measurements in single-robot SLAM and calibration, extending CT methods to multi-robot settings faces great challenges to achieve high-accuracy, low-latency, and high-frequency performance. Especially, existing CT methods suffer from the inherent query-time delay of unclamped B-splines and high computational cost. This paper proposes CT-RIO, a novel Continuous-Time Relative-Inertial Odometry framework. We employ Clamped Non-Uniform B-splines (C-NUBS) to represent robot states for the first time, eliminating the query-time delay. We further augment C-NUBS with closed-form extension and shrinkage operations that preserve the spline shape, making it suitable for online estimation and enabling flexible knot management. This flexibility leads to the concept of knot-keyknot strategy, which supports spline extension at high-frequency while retaining sparse keyknots for adaptive relative-motion modeling. We then formulate a sliding-window relative localization problem that operates purely on relative kinematics and inter-robot constraints. To meet the demanding computation required at swarm scale, we decompose the tightly-coupled optimization into robot-wise sub-problems and solve them in parallel using incremental asynchronous block coordinate descent. Extensive experiments show that CT-RIO converges from time-offsets as large as 263 ms to sub-millisecond within 3 s, and achieves RMSEs of 0.046 m and 1.8 \u00b0. It consistently outperforms state-of-the-art methods, with improvements of up to 60% under high-speed motion.", "link": "http://arxiv.org/abs/2602.22006v2", "date": "2026-02-27", "relevancy": 2.2678, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5726}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.567}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5526}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Parallel%20Continuous-Time%20Relative%20Localization%20with%20Augmented%20Clamped%20Non-Uniform%20B-Splines&body=Title%3A%20Parallel%20Continuous-Time%20Relative%20Localization%20with%20Augmented%20Clamped%20Non-Uniform%20B-Splines%0AAuthor%3A%20Jiadong%20Lu%20and%20Zhehan%20Li%20and%20Tao%20Han%20and%20Miao%20Xu%20and%20Chao%20Xu%20and%20Yanjun%20Cao%0AAbstract%3A%20Accurate%20relative%20localization%20is%20critical%20for%20multi-robot%20cooperation.%20In%20robot%20swarms%2C%20measurements%20from%20different%20robots%20arrive%20asynchronously%20and%20with%20clock%20time-offsets.%20Although%20Continuous-Time%20%28CT%29%20formulations%20have%20proved%20effective%20for%20handling%20asynchronous%20measurements%20in%20single-robot%20SLAM%20and%20calibration%2C%20extending%20CT%20methods%20to%20multi-robot%20settings%20faces%20great%20challenges%20to%20achieve%20high-accuracy%2C%20low-latency%2C%20and%20high-frequency%20performance.%20Especially%2C%20existing%20CT%20methods%20suffer%20from%20the%20inherent%20query-time%20delay%20of%20unclamped%20B-splines%20and%20high%20computational%20cost.%20This%20paper%20proposes%20CT-RIO%2C%20a%20novel%20Continuous-Time%20Relative-Inertial%20Odometry%20framework.%20We%20employ%20Clamped%20Non-Uniform%20B-splines%20%28C-NUBS%29%20to%20represent%20robot%20states%20for%20the%20first%20time%2C%20eliminating%20the%20query-time%20delay.%20We%20further%20augment%20C-NUBS%20with%20closed-form%20extension%20and%20shrinkage%20operations%20that%20preserve%20the%20spline%20shape%2C%20making%20it%20suitable%20for%20online%20estimation%20and%20enabling%20flexible%20knot%20management.%20This%20flexibility%20leads%20to%20the%20concept%20of%20knot-keyknot%20strategy%2C%20which%20supports%20spline%20extension%20at%20high-frequency%20while%20retaining%20sparse%20keyknots%20for%20adaptive%20relative-motion%20modeling.%20We%20then%20formulate%20a%20sliding-window%20relative%20localization%20problem%20that%20operates%20purely%20on%20relative%20kinematics%20and%20inter-robot%20constraints.%20To%20meet%20the%20demanding%20computation%20required%20at%20swarm%20scale%2C%20we%20decompose%20the%20tightly-coupled%20optimization%20into%20robot-wise%20sub-problems%20and%20solve%20them%20in%20parallel%20using%20incremental%20asynchronous%20block%20coordinate%20descent.%20Extensive%20experiments%20show%20that%20CT-RIO%20converges%20from%20time-offsets%20as%20large%20as%20263%20ms%20to%20sub-millisecond%20within%203%20s%2C%20and%20achieves%20RMSEs%20of%200.046%20m%20and%201.8%20%C2%B0.%20It%20consistently%20outperforms%20state-of-the-art%20methods%2C%20with%20improvements%20of%20up%20to%2060%25%20under%20high-speed%20motion.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22006v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParallel%2520Continuous-Time%2520Relative%2520Localization%2520with%2520Augmented%2520Clamped%2520Non-Uniform%2520B-Splines%26entry.906535625%3DJiadong%2520Lu%2520and%2520Zhehan%2520Li%2520and%2520Tao%2520Han%2520and%2520Miao%2520Xu%2520and%2520Chao%2520Xu%2520and%2520Yanjun%2520Cao%26entry.1292438233%3DAccurate%2520relative%2520localization%2520is%2520critical%2520for%2520multi-robot%2520cooperation.%2520In%2520robot%2520swarms%252C%2520measurements% {"title": "Representing local protein environments with atomistic foundation models", "author": "Meital Bojan and Sanketh Vedula and Advaith Maddipatla and Nadav Bojan Sellam and Federico Napoli and Paul Schanda and Alex M. Bronstein", "abstract": "The local structure of a protein strongly impacts its function and interactions with other molecules. Therefore, a concise, informative representation of a local protein environment is essential for modeling and designing proteins and biomolecular interactions. However, these environments' extensive structural and chemical variability makes them challenging to model, and such representations remain under-explored. In this work, we propose a novel representation for a local protein environment derived from the intermediate features of atomistic foundation models (AFMs). We demonstrate that this embedding effectively captures both local structure (e.g., secondary motifs), and chemical features (e.g., amino-acid identity and protonation state). We further show that the AFM-derived representation space exhibits meaningful structure, enabling the construction of data-driven priors over the distribution of biomolecular environments. Finally, in the context of biomolecular NMR spectroscopy, we demonstrate that the proposed representations enable a first-of-its-kind physics-informed chemical shift predictor that achieves state-of-the-art accuracy. Our results demonstrate the surprising effectiveness of atomistic foundation models and their emergent representations for protein modeling beyond traditional molecular simulations. We believe this will open new lines of work in constructing effective functional representations for protein environments.", "link": "http://arxiv.org/abs/2505.23354v3", "date": "2026-02-27", "relevancy": 2.264, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4313}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representing%20local%20protein%20environments%20with%20atomistic%20foundation%20models&body=Title%3A%20Representing%20local%20protein%20environments%20with%20atomistic%20foundation%20models%0AAuthor%3A%20Meital%20Bojan%20and%20Sanketh%20Vedula%20and%20Advaith%20Maddipatla%20and%20Nadav%20Bojan%20Sellam%20and%20Federico%20Napoli%20and%20Paul%20Schanda%20and%20Alex%20M.%20Bronstein%0AAbstract%3A%20The%20local%20structure%20of%20a%20protein%20strongly%20impacts%20its%20function%20and%20interactions%20with%20other%20molecules.%20Therefore%2C%20a%20concise%2C%20informative%20representation%20of%20a%20local%20protein%20environment%20is%20essential%20for%20modeling%20and%20designing%20proteins%20and%20biomolecular%20interactions.%20However%2C%20these%20environments%27%20extensive%20structural%20and%20chemical%20variability%20makes%20them%20challenging%20to%20model%2C%20and%20such%20representations%20remain%20under-explored.%20In%20this%20work%2C%20we%20propose%20a%20novel%20representation%20for%20a%20local%20protein%20environment%20derived%20from%20the%20intermediate%20features%20of%20atomistic%20foundation%20models%20%28AFMs%29.%20We%20demonstrate%20that%20this%20embedding%20effectively%20captures%20both%20local%20structure%20%28e.g.%2C%20secondary%20motifs%29%2C%20and%20chemical%20features%20%28e.g.%2C%20amino-acid%20identity%20and%20protonation%20state%29.%20We%20further%20show%20that%20the%20AFM-derived%20representation%20space%20exhibits%20meaningful%20structure%2C%20enabling%20the%20construction%20of%20data-driven%20priors%20over%20the%20distribution%20of%20biomolecular%20environments.%20Finally%2C%20in%20the%20context%20of%20biomolecular%20NMR%20spectroscopy%2C%20we%20demonstrate%20that%20the%20proposed%20representations%20enable%20a%20first-of-its-kind%20physics-informed%20chemical%20shift%20predictor%20that%20achieves%20state-of-the-art%20accuracy.%20Our%20results%20demonstrate%20the%20surprising%20effectiveness%20of%20atomistic%20foundation%20models%20and%20their%20emergent%20representations%20for%20protein%20modeling%20beyond%20traditional%20molecular%20simulations.%20We%20believe%20this%20will%20open%20new%20lines%20of%20work%20in%20constructing%20effective%20functional%20representations%20for%20protein%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2505.23354v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresenting%2520local%2520protein%2520environments%2520with%2520atomistic%2520foundation%2520models%26entry.906535625%3DMeital%2520Bojan%2520and%2520Sanketh%2520Vedula%2520and%2520Advaith%2520Maddipatla%2520and%2520Nadav%2520Bojan%2520Sellam%2520and%2520Federico%2520Napoli%2520and%2520Paul%2520Schanda%2520and%2520Alex%2520M.%2520Bronstein%26entry.1292438233%3DThe%2520local%2520structure%2520of%2520a%2520protein%2520strongly%2520impacts%2520its%2520function%2520and%2520interactions%2520with%2520other%2520molecules.%2520Therefore%252C%2520a%2520concise%252C%2520informative%2520representation%2520of%2520a%2520local%2520protein%2520environment%2520is%2520essential%2520for%2520modeling%2520and%2520designing%2520proteins%2520and%2520biomolecular%2520interactions.%2520However%252C%2520these%2520environments%2527%2520extensive%2520structural%2520and%2520chemical%2520variability%2520makes%2520them%2520challenging%2520to%2520model%252C%2520and%2520such%2520representations%2520remain%2520under-explored.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%2520representation%2520for%2520a%2520local%2520protein%2520environment%2520derived%2520fr {"title": "The Geometry of Transfer: Unlocking Medical Vision Manifolds for Training-Free Model Ranking", "author": "Jiaqi Tang and Shaoyang Zhang and Xiaoqi Wang and Jiaying Zhou and Yang Liu and Qingchao Chen", "abstract": "The advent of large-scale self-supervised learning (SSL) has produced a vast zoo of medical foundation models. However, selecting optimal medical foundation models for specific segmentation tasks remains a computational bottleneck. Existing Transferability Estimation (TE) metrics, primarily designed for classification, rely on global statistical assumptions and fail to capture the topological complexity essential for dense prediction. We propose a novel Topology-Driven Transferability Estimation framework that evaluates manifold tractability rather than statistical overlap. Our approach introduces three components: (1) Global Representation Topology Divergence (GRTD), utilizing Minimum Spanning Trees to quantify feature-label structural isomorphism; (2) Local Boundary-Aware Topological Consistency (LBTC), which assesses manifold separability specifically at critical anatomical boundaries; and (3) Task-Adaptive Fusion, which dynamically integrates global and local metrics based on the semantic cardinality of the target task. Validated on the large-scale OpenMind benchmark across diverse anatomical targets and SSL foundation models, our approach significantly outperforms state-of-the-art baselines by around \\textbf{31\\%} relative improvement in the weighted Kendall, providing a robust, training-free proxy for efficient model selection without the cost of fine-tuning. The code will be made publicly available upon acceptance.", "link": "http://arxiv.org/abs/2602.23916v1", "date": "2026-02-27", "relevancy": 2.2526, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5685}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting al%20foundation%20models.%20However%2C%20selecting%20optimal%20medical%20foundation%20models%20for%20specific%20segmentation%20tasks%20remains%20a%20computational%20bottleneck.%20Existing%20Transferability%20Estimation%20%28TE%29%20metrics%2C%20primarily%20designed%20for%20classification%2C%20rely%20on%20global%20statistical%20assumptions%20and%20fail%20to%20capture%20the%20topological%20complexity%20essential%20for%20dense%20prediction.%20We%20propose%20a%20novel%20Topology-Driven%20Transferability%20Estimation%20framework%20that%20evaluates%20manifold%20tractability%20rather%20than%20statistical%20overlap.%20Our%20approach%20introduces%20three%20components%3A%20%281%29%20Global%20Representation%20Topology%20Divergence%20%28GRTD%29%2C%20utilizing%20Minimum%20Spanning%20Trees%20to%20quantify%20feature-label%20structural%20isomorphism%3B%20%282%29%20Local%20Boundary-Aware%20Topological%20Consistency%20%28LBTC%29%2C%20which%20assesses%20manifold%20separability%20specifically%20at%20critical%20anatomical%20boundaries%3B%20and%20%283%29%20Task-Adaptive%20Fusion%2C%20which%20dynamically%20integrates%20global%20and%20local%20metrics%20based%20on%20the%20semantic%20cardinality%20of%20the%20target%20task.%20Validated%20on%20the%20large-scale%20OpenMind%20benchmark%20across%20diverse%20anatomical%20targets%20and%20SSL%20foundation%20models%2C%20our%20approach%20significantly%20outperforms%20state-of-the-art%20baselines%20by%20around%20%5Ctextbf%7B31%5C%25%7D%20relative%20improvement%20in%20the%20weighted%20Kendall%2C%20providing%20a%20robust%2C%20training-free%20proxy%20for%20efficient%20model%20selection%20without%20the%20cost%20of%20fine-tuning.%20The%20code%20will%20be%20made%20publicly%20available%20upon%20acceptance.&entry.1838667208=http%3A//arxiv.org/abs/2602.23916v1&entry.124074799=Read"},
{"title": "Foundation World Models for Agents that Learn, Verify, and Adapt Reliably Beyond Static Environments", "author": "Florent Delgrange", "abstract": "The next generation of autonomous agents must not only learn efficiently but also act reliably and adapt their behavior in open worlds. Standard approaches typically assume fixed tasks and environments with little or no novelty, which limits world models' ability to support agents that must evolve their policies as conditions change. This paper outlines a vision for foundation world models: persistent, compositional representations that unify reinforcement learning, reactive/program synthesis, and abstraction mechanisms. We propose an agenda built around four components: (i) learnable reward models from specifications to support optimization with clear objectives; (ii) adaptive formal verification integrated throughout learning; (iii) online abstraction calibration to quantify the reliability of the model's predictions; and (iv) test-time synthesis and world-model generation guided by verifiers. Together, these components enable agents to synthesize verifiable programs, derive new policies from a small number of interactions, and maintain correctness while adapting to novelty. The resulting framework positions foundation world models as a substrate for learning, reasoning, and adaptation, laying the groundwork for agents that not only act well but can explain and justify the behavior they adopt.", "link": "http://arxiv.org/abs/2602.23997v1", "date": "2026-02-27", "relevancy": 2.2525, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5938}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5463}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05 {"title": "Hierarchical Action Learning for Weakly-Supervised Action Segmentation", "author": "Junxian Huang and Ruichu Cai and Hao Zhu and Juntao Fang and Boyan Xu and Weilin Chen and Zijian Li and Shenghua Gao", "abstract": "Humans perceive actions through key transitions that structure actions across multiple abstraction levels, whereas machines, relying on visual features, tend to over-segment. This highlights the difficulty of enabling hierarchical reasoning in video understanding. Interestingly, we observe that lower-level visual and high-level action latent variables evolve at different rates, with low-level visual variables changing rapidly, while high-level action variables evolve more slowly, making them easier to identify. Building on this insight, we propose the Hierarchical Action Learning (\\textbf{HAL}) model for weakly-supervised action segmentation. Our approach introduces a hierarchical causal data generation process, where high-level latent action governs the dynamics of low-level visual features. To model these varying timescales effectively, we introduce deterministic processes to align these latent variables over time. The \\textbf{HAL} model employs a hierarchical pyramid transformer to capture both visual features and latent variables, and a sparse transition constraint is applied to enforce the slower dynamics of high-level action variables. This mechanism enhances the identification of these latent variables over time. Under mild assumptions, we prove that these latent action variables are strictly identifiable. Experimental results on several benchmarks show that the \\textbf{HAL} model significantly outperforms existing methods for weakly-supervised action segmentation, confirming its practical effectiveness in real-world applications.", "link": "http://arxiv.org/abs/2602.24275v1", "date": "2026-02-27", "relevancy": 2.2385, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5922}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5385}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5355}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20Action%20Learning%20for%20Weakly-Supervised%20Action%20Segmentation&body=Title%3A%20Hierarchical%20Action%20Learning%20for%20Weakly-Supervised%20Action%20Segmentation%0AAuthor%3A%20Junxian%20Huang%20and%20Ruichu%20Cai%20and%20Hao%20Zhu%20and%20Juntao%20Fang%20and%20Boyan%20Xu%20and%20Weilin%20Chen%20and%20Zijian%20Li%20and%20Shenghua%20Gao%0AAbstract%3A%20Humans%20perceive%20actions%20through%20key%20transitions%20that%20structure%20actions%20across%20multiple%20abstraction%20levels%2C%20whereas%20machines%2C%20relying%20on%20visual%20features%2C%20tend%20to%20over-segment.%20This%20highlights%20the%20difficulty%20of%20enabling%20hierarchical%20reasoning%20in%20video%20understanding.%20Interestingly%2C%20we%20observe%20that%20lower-level%20visual%20and%20high-level%20action%20latent%20variables%20evolve%20at%20different%20rates%2C%20with%20low-level%20visual%20variables%20changing%20rapidly%2C%20while%20high-level%20action%20variables%20evolve%20more%20slowly%2C%20making%20them%20easier%20to%20identify.%20Building%20on%20this%20insight%2C%20we%20propose%20the%20Hierarchical%20Action%20Learning%20%28%5Ctextbf%7BHAL%7D%29%20model%20for%20weakly-supervised%20action%20segmentation.%20Our%20approach%20introduces%20a%20hierarchical%20causal%20data%20generation%20process%2C%20where%20high-level%20latent%20action%20governs%20the%20dynamics%20of%20low-level%20visual%20features.%20To%20model%20these%20varying%20timescales%20effectively%2C%20we%20introduce%20deterministic%20processes%20to%20align%20these%20latent%20variables%20over%20time.%20The%20%5Ctextbf%7BHAL%7D%20model%20employs%20a%20hierarchical%20pyramid%20transformer%20to%20capture%20both%20visual%20features%20and%20latent%20variables%2C%20and%20a%20sparse%20transition%20constraint%20is%20applied%20to%20enforce%20the%20slower%20dynamics%20of%20high-level%20action%20variables.%20This%20mechanism%20enhances%20the%20identification%20of%20these%20latent%20variables%20over%20time.%20Under%20mild%20assumptions%2C%20we%20prove%20that%20these%20latent%20action%20variables%20are%20strictly%20identifiable.%20Experimental%20results%20on%20several%20benchmarks%20show%20that%20the%20%5Ctextbf%7BHAL%7D%20model%20significantly%20outperforms%20existing%20methods%20for%20weakly-supervised%20action%20segmentation%2C%20confirming%20its%20practical%20effectiveness%20in%20real-world%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24275v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520Action%2520Learning%2520for%2520Weakly-Supervised%2520Action%2520Segmentation%26entry.906535625%3DJunxian%2520Huang%2520and%2520Ruichu%2520Cai%2520and%2520Hao%2520Zhu%2520and%2520Juntao%2520Fang%2520and%2520Boyan%2520Xu%2520and%2520Weilin%2520Chen%2520and%2520Zijian%2520Li%2520and%2520Shenghua%2520Gao%26entry.1292438233%3DHumans%2520perceive%2520actions%2520through%2520key%2520transitions%2520that%2520structure%2520actions%2520across%2520multiple%2520abstraction%2520levels%252C%2520whereas%2520machines%252C%2520relying%2520on%2520visual%2520features%252C%2520tend%2520to%2520over-segment.%2520This%2520highlights%2520the%2520difficulty%2520of%2520enabling%2520hierarchical%2520reasoning%2520in%2520video%2520understanding.%2520Interestingly%252C%2520we%2520observe%2520that%2520lower-level%2520visual%2520and%2520high-level%2520action%2520latent%2520variables%2520evolve%2520at%2520different%2520rates%252C%2520with%2520low-level%2520visu {"title": "On Minimal Depth in Neural Networks", "author": "Juan L. Valerdi", "abstract": "Understanding the relationship between the depth of a neural network and its representational capacity is a central problem in deep learning theory. In this work, we develop a geometric framework to analyze the expressivity of ReLU networks with the notion of depth complexity for convex polytopes. The depth of a polytope recursively quantifies the number of alternating convex hull and Minkowski sum operations required to construct it. This geometric perspective serves as a rigorous tool for deriving depth lower bounds and understanding the structural limits of deep neural architectures.\n  We establish lower and upper bounds on the depth of polytopes, as well as tight bounds for classical families. These results yield two main consequences. First, we provide a purely geometric proof of the expressivity bound by Arora et al. (2018), confirming that $\\lceil \\log_2(n+1)\\rceil$ hidden layers suffice to represent any continuous piecewise linear (CPWL) function. Second, we prove that, unlike general ReLU networks, convex polytopes do not admit a universal depth bound. Specifically, the depth of cyclic polytopes in dimensions $n \\geq 4$ grows unboundedly with the number of vertices. This result implies that Input Convex Neural Networks (ICNNs) cannot represent all convex CPWL functions with a fixed depth, revealing a sharp separation in expressivity between ICNNs and standard ReLU networks.", "link": "http://arxiv.org/abs/2402.15315v4", "date": "2026-02-27", "relevancy": 2.2369, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4487}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4467}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": %20convex%20CPWL%20functions%20with%20a%20fixed%20depth%2C%20revealing%20a%20sharp%20separation%20in%20expressivity%20between%20ICNNs%20and%20standard%20ReLU%20networks.%0ALink%3A%20http%3A//arxiv.org/abs/2402.15315v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520Minimal%2520Depth%2520in%2520Neural%2520Networks%26entry.906535625%3DJuan%2520L.%2520Valerdi%26entry.1292438233%3DUnderstanding%2520the%2520relationship%2520between%2520the%2520depth%2520of%2520a%2520neural%2520network%2520and%2520its%2520representational%2520capacity%2520is%2520a%2520central%2520problem%2520in%2520deep%2520learning%2520theory.%2520In%2520this%2520work%252C%2520we%2520develop%2520a%2520geometric%2520framework%2520to%2520analyze%2520the%2520expressivity%2520of%2520ReLU%2520networks%2520with%2520the%2520notion%2520of%2520depth%2520complexity%2520for%2520convex%2520polytopes.%2520The%2520depth%2520of%2520a%2520polytope%2520recursively%2520quantifies%2520the%2520number%2520of%2520alternating%2520convex%2520hull%2520and%2520Minkowski%2520sum%2520operations%2520required%2520to%2520construct%2520it.%2520This%2520geometric%2520perspective%2520serves%2520as%2520a%2520rigorous%2520tool%2520for%2520deriving%2520depth%2520lower%2520bounds%2520and%2520understanding%2520the%2520structural%2520limits%2520of%2520deep%2520neural%2520architectures.%250A%2520%2520We%2520establish%2520lower%2520and%2520upper%2520bounds%2520on%2520the%2520depth%2520of%2520polytopes%252C%2520as%2520well%2520as%2520tight%2520bounds%2520for%2520classical%2520families.%2520These%2520results%2520yield%2520two%2520main%2520consequences.%2520First%252C%2520we%2520provide%2520a%2520purely%2520geometric%2520proof%2520of%2520the%2520expressivity%2520bound%2520by%2520Arora%2520et%2520al.%2520%25282018%2529%252C%2520confirming%2520that%2520%2524%255Clceil%2520%255Clog_2%2528n%252B1%2529%255Crceil%2524%2520hidden%2520layers%2520suffice%2520to%252 opes%2C%20as%20well%20as%20tight%20bounds%20for%20classical%20families.%20These%20results%20yield%20two%20main%20consequences.%20First%2C%20we%20provide%20a%20purely%20geometric%20proof%20of%20the%20expressivity%20bound%20by%20Arora%20et%20al.%20%282018%29%2C%20confirming%20that%20%24%5Clceil%20%5Clog_2%28n%2B1%29%5Crceil%24%20hidden%20layers%20suffice%20to%20represent%20any%20continuous%20piecewise%20linear%20%28CPWL%29%20function.%20Second%2C%20we%20prove%20that%2C%20unlike%20general%20ReLU%20networks%2C%20convex%20polytopes%20do%20not%20admit%20a%20universal%20depth%20bound.%20Specifically%2C%20the%20depth%20of%20cyclic%20polytopes%20in%20dimensions%20%24n%20%5Cgeq%204%24%20grows%20unboundedly%20with%20the%20number%20of%20vertices.%20This%20result%20implies%20that%20Input%20Convex%20Neural%20Networks%20%28ICNNs%29%20cannot%20represent%20all%20convex%20CPWL%20functions%20with%20a%20fixed%20depth%2C%20revealing%20a%20sharp%20separation%20in%20expressivity%20between%20ICNNs%20and%20standard%20ReLU%20networks.&entry.1838667208=http%3A//arxiv.org/abs/2402.15315v4&entry.124074799=Read"},
{"title": "PAPN: Proximity Attention Encoder and Pointer Network Decoder for Parcel Pickup Route Prediction", "author": "Hansi Denis and Ali Anwar and Ngoc-Quang Luong and Siegfried Mercelis", "abstract": "Optimization of the last-mile delivery and first-mile pickup of parcels is integral to the logistics optimization pipeline as it entails both cost and resource efficiency and a heightened service quality. Such optimization requires accurate route and time prediction systems to adapt to different scenarios in advance. This work tackles the first building block, namely route prediction. The novel Proximity Attention (PA) mechanism is coupled to a Pointer Network (PN) decoder to leverage the underlying connections between the different visitable pickup positions at each timestep of the parcel pickup process. This local attention is coupled with global context computing via a multi-head attention transformer encoder. Both attentions are then mixed for complete and comprehensive modeling of the problems. PA is also used in the decoding process to skew predictions towards the locations with the highest visit likeliness, thus using inter-connectivity of nodes for next-location prediction. This method is trained, validated and tested on a large industry-level dataset of real-world, last-mile delivery and first-mile pickup named LaDE (2024). This approach outperforms all state-of-the-art supervised methods in terms of most metrics used for benchmarking on this dataset while still being competitive with the best-performing reinforcement learning framework named DRL4Route (2023).", "link": "http://arxiv.org/abs/2505.03776v2", "date": "2026-02-27", "relevancy": 2.2267, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5726}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5616}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAPN%3A%20Proximity%20Attention%20Encoder%20and%20Pointer%20Network%20Decoder%20for%20Parcel%20Pickup%20Route%20Prediction&body=Title%3A%20PAPN%3A%20Proximity%20Attention%20Encoder%20and%20Pointer%20Network%20Decoder%20for%20Parcel%20Pickup%20Route%20Prediction%0AAuthor%3A%20Hansi%20Denis%20and%20Ali%20Anwar%20and%20Ngoc-Quang%20Luong%20and%20Siegfried%20Mercelis%0AAbstract%3A%20Optimization%20of%20the%20last-mile%20delivery%20and%20first-mile%20pickup%20of%20parcels%20is%20integral%20to%20the%20logistics%20optimization%20pipeline%20as%20it%20entails%20both%20cost%20and%20resource%20efficiency%20and%20a%20heightened%20service%20quality.%20Such%20optimization%20requires%20accurate%20route%20and%20time%20prediction%20systems%20to%20adapt%20to%20different%20scenarios%20in%20advance.%20This%20work%20tackles%20the%20first%20building%20block%2C%20namely%20route%20prediction.%20The%20novel%20Proximity%20Attention%20%28PA%29%20mechanism%20is%20coupled%20to%20a%20Pointer%20Network%20%28PN%29%20decoder%20to%20leverage%20the%20underlying%20connections%20between%20the%20different%20visitable%20pickup%20positions%20at%20each%20timestep%20of%20the%20parcel%20pickup%20process.%20This%20local%20attention%20is%20coupled%20with%20global%20context%20computing%20via%20a%20multi-head%20attention%20transformer%20encoder.%20Both%20attentions%20are%20then%20mixed%20for%20complete%20and%20comprehensive%20modeling%20of%20the%20problems.%20PA%20is%20also%20used%20in%20the%20decoding%20process%20to%20skew%20predictions%20towards%20the%20locations%20with%20the%20highest%20visit%20likeliness%2C%20thus%20using%20inter-connectivity%20of%20nodes%20for%20next-location%20prediction.%20This%20method%20is%20trained%2C%20validated%20and%20tested%20on%20a%20large%20industry-level%20dataset%20of%20real-world%2C%20last-mile%20delivery%20and%20first-mile%20pickup%20named%20LaDE%20%282024%29.%20This%20approach%20outperforms%20all%20state-of-the-art%20supervised%20methods%20in%20terms%20of%20most%20metrics%20used%20for%20benchmarking%20on%20this%20dataset%20while%20still%20being%20competitive%20with%20the%20best-performing%20reinforcement%20learning%20framework%20named%20DRL4Route%20%282023%29.%0ALink%3A%20http%3A//arxiv.org/abs/2505.03776v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPAPN%253A%2520Proximity%2520Attention%2520Encoder%2520and%2520Pointer%2520Network%2520Decoder%2520for%2520Parcel%2520Pickup%2520Route%2520Prediction%26entry.906535625%3DHansi%2520Denis%2520and%2520Ali%2520Anwar%2520and%2520Ngoc-Quang%2520Luong%2520and%2520Siegfried%2520Mercelis%26entry.1292438233%3DOptimization%2520of%2520the%2520last-mile%2520delivery%2520and%2520first-mile%2520pickup%2520of%2520parcels%2520is%2520integral%2520to%2520the%2520logistics%2520optimization%2520pipeline%2520as%2520it%2520entails%2520both%2520cost%2520and%2520resource%2520efficiency%2520and%2520a%2520heightened%2520service%2520quality.%2520Such%2520optimization%2520requires%2520accurate%2520route%2520and%2520time%2520prediction%2520systems%2520to%2520adapt%2520to%2520different%2520scenarios%2520in%2520advance.%2520This%2520work%2520tackles%2520the%2520first%2520building%2520block%252C%2520namely%2520route%2520prediction.%2520The%2520novel%2520Proximity%2520Attention%2520%2528PA%2529%2520mechanism%2520is%2520coupled%2520to%2520a%2520Pointer%2520Network%2520%2528PN%2529%2520decoder%2520to%2520leverage%2520the%2520underlying%2520connections%2520between%2520the%2520different%2520visitable%2520pickup%2520positions%2520at%2520each%2520timestep%2520of%2520the%2520parcel%2520pickup%2520process.%2520This%2520local%2520attention%2 ion%20systems%20to%20adapt%20to%20different%20scenarios%20in%20advance.%20This%20work%20tackles%20the%20first%20building%20block%2C%20namely%20route%20prediction.%20The%20novel%20Proximity%20Attention%20%28PA%29%20mechanism%20is%20coupled%20to%20a%20Pointer%20Network%20%28PN%29%20decoder%20to%20leverage%20the%20underlying%20connections%20between%20the%20different%20visitable%20pickup%20positions%20at%20each%20timestep%20of%20the%20parcel%20pickup%20process.%20This%20local%20attention%20is%20coupled%20with%20global%20context%20computing%20via%20a%20multi-head%20attention%20transformer%20encoder.%20Both%20attentions%20are%20then%20mixed%20for%20complete%20and%20comprehensive%20modeling%20of%20the%20problems.%20PA%20is%20also%20used%20in%20the%20decoding%20process%20to%20skew%20predictions%20towards%20the%20locations%20with%20the%20highest%20visit%20likeliness%2C%20thus%20using%20inter-connectivity%20of%20nodes%20for%20next-location%20prediction.%20This%20method%20is%20trained%2C%20validated%20and%20tested%20on%20a%20large%20industry-level%20dataset%20of%20real-world%2C%20last-mile%20delivery%20and%20first-mile%20pickup%20named%20LaDE%20%282024%29.%20This%20approach%20outperforms%20all%20state-of-the-art%20supervised%20methods%20in%20terms%20of%20most%20metrics%20used%20for%20benchmarking%20on%20this%20dataset%20while%20still%20being%20competitive%20with%20the%20best-performing%20reinforcement%20learning%20framework%20named%20DRL4Route%20%282023%29.&entry.1838667208=http%3A//arxiv.org/abs/2505.03776v2&entry.124074799=Read"},
{"title": "Do LLMs Benefit From Their Own Words?", "author": "Jenny Y. Huang and Leshem Choshen and Ramon Astudillo and Tamara Broderick and Jacob Andreas", "abstract": "Multi-turn interactions with large language models typically retain the assistant's own past responses in the conversation history. In this work, we revisit this design choice by asking whether large language models benefit from conditioning on their own prior responses. Using in-the-wild, multi-turn conversations, we compare standard (full-context) prompting with a user-turn-only prompting approach that omits all previous assistant responses, across three open reasoning models and one state-of-the-art model. To our surprise, we find that removing prior assistant responses does not affect response quality on a large fraction of turns. Omitting assistant-side history can reduce cumulative context lengths by up to 10x. To explain this result, we find that multi-turn conversations consist of a substantial proportion (36.4%) of self-contained prompts, and that many follow-up prompts provide sufficient instruction to be answered using only the current user turn and prior user turns. When analyzing cases where user-turn-only prompting substantially outperforms full context, we identify instances of context pollution, in which models over-condition on their previous responses, introducing errors, hallucinations, or stylistic artifacts that propagate across turns. Motivated by these findings, we design a context-filtering approach that selectively omits assistant-side context. Our findings suggest that selectively omitting assistant history can improve response quality while reducing memory consumption.", "link": "http://arxiv.org/abs/2602.24287v1", "date": "2026-02-27", "relevancy": 2.2259, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.459}, {"title": "Lexicon3D: Probing Visual Foundation {"title": "Geometric Autoencoder Priors for Bayesian Inversion: Learn First Observe Later", "author": "Arnaud Vadeboncoeur and Gregory Duth\u00e9 and Mark Girolami and Eleni Chatzi", "abstract": "Uncertainty Quantification (UQ) is paramount for inference in engineering. A common inference task is to recover full-field information of physical systems from a small number of noisy observations, a usually highly ill-posed problem. Sharing information from multiple distinct yet related physical systems can alleviate this ill-posedness. Critically, engineering systems often have complicated variable geometries prohibiting the use of standard multi-system Bayesian UQ. In this work, we introduce Geometric Autoencoders for Bayesian Inversion (GABI), a framework for learning geometry-aware generative models of physical responses that serve as highly informative geometry-conditioned priors for Bayesian inversion. Following a ''learn first, observe later'' paradigm, GABI distills information from large datasets of systems with varying geometries, without requiring knowledge of governing PDEs, boundary conditions, or observation processes, into a rich latent prior. At inference time, this prior is seamlessly combined with the likelihood of a specific observation process, yielding a geometry-adapted posterior distribution. Our proposed framework is architecture-agnostic. A creative use of Approximate Bayesian Computation (ABC) sampling yields an efficient implementation that utilizes modern GPU hardware. We test our method on: steady-state heat over rectangular domains; Reynolds-Averaged Navier-Stokes (RANS) flow around airfoils; Helmholtz resonance and source localization on 3D car bodies; RANS airflow over terrain. We find: the predictive accuracy to be comparable to deterministic supervised learning approaches in the restricted setting where supervised learning is applicable; UQ to be well calibrated and robust on challenging problems with complex geometries.", "link": "http://arxiv.org/abs/2509.19929v3", "date": "2026-02-27", "relevancy": 2.2187, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5646}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5505}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geometric%20Autoencoder%20Priors%20for%20Bayesian%20Inversion%3A%20Learn%20First%20Observe%20Later&body=Title%3A%20Geometric%20Autoencoder%20Priors%20for%20Bayesian%20Inversion%3A%20Learn%20First%20Observe%20Later%0AAuthor%3A%20Arnaud%20Vadeboncoeur%20and%20Gregory%20Duth%C3%A9%20and%20Mark%20Girolami%20and%20Eleni%20Chatzi%0AAbstract%3A%20Uncertainty%20Quantification%20%28UQ%29%20is%20paramount%20for%20inference%20in%20engineering.%20A%20common%20inference%20task%20is%20to%20recover%20full-field%20information%20of%20physical%20systems%20from%20a%20small%20number%20of%20noisy%20observations%2C%20a%20usually%20highly%20ill-posed%20problem.%20Sharing%20information%20from%20multiple%20distinct%20yet%20related%20physical%20systems%20can%20alleviate%20this%20ill-posedness.%20Critically%2C%20engineering%20systems%20often%20have%20complicated%20variable%20geometries%20prohibiting%20the%20use%20of%20standard%20multi-system%20Bayesian%20UQ.%20In%20this%20work%2C%20we%20introduce%20Geometric%20Autoencoders%20for%20Bayesian%20Inversion%20%28GABI%29%2C%20a%20framework%20for%20learning%20geometry-aware%20generative%20models%20of%20physical%20responses%20that%20serve%20as%20highly%20informative%20geometry-conditioned%20priors%20for%20Bayesian%20inversion.%20Following%20a%20%27%27learn%20first%2C%20observe%20later%27%27%20paradigm%2C%20GABI%20distills%20information%20from%20large%20datasets%20of%20systems%20with%20varying%20geometries%2C%20without%20requiring%20knowledge%20of%20governing%20PDEs%2C%20boundary%20conditions%2C%20or%20observation%20processes%2C%20into%20a%20rich%20latent%20prior.%20At%20inference%20time%2C%20this%20prior%20is%20seamlessly%20combined%20with%20the%20likelihood%20of%20a%20specific%20observation%20process%2C%20yielding%20a%20geometry-adapted%20posterior%20distribution.%20Our%20proposed%20framework%20is%20architecture-agnostic.%20A%20creative%20use%20of%20Approximate%20Bayesian%20Computation%20%28ABC%29%20sampling%20yields%20an%20efficient%20implementation%20that%20utilizes%20modern%20GPU%20hardware.%20We%20test%20our%20method%20on%3A%20steady-state%20heat%20over%20rectangular%20domains%3B%20Reynolds-Averaged%20Navier-Stokes%20%28RANS%29%20flow%20around%20airfoils%3B%20Helmholtz%20resonance%20and%20source%20localization%20on%203D%20car%20bodies%3B%20RANS%20airflow%20over%20terrain.%20We%20find%3A%20the%20predictive%20accuracy%20to%20be%20comparable%20to%20deterministic%20supervised%20learning%20approaches%20in%20the%20restricted%20setting%20where%20supervised%20learning%20is%20applicable%3B%20UQ%20to%20be%20well%20calibrated%20and%20robust%20on%20challenging%20problems%20with%20complex%20geometries.%0ALink%3A%20http%3A//arxiv.org/abs/2509.19929v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeometric%2520Autoencoder%2520Priors%2520for%2520Bayesian%2520Inversion%253A%2520Learn%2520First%2520Observe%2520Later%26entry.906535625%3DArnaud%2520Vadeboncoeur%2520and%2520Gregory%2520Duth%25C3%25A9%2520and%2520Mark%2520Girolami%2520and%2520Eleni%2520Chatzi%26entry.1292438233%3DUncertainty%2520Quantification%2520%2528UQ%2529%2520is%2520paramount%2520for%2520inference%2520in%2520engineering.%2520A%2520common%2520inference%2520task%2520is%2520to%2520recover%2520full-field%2520information%252 {"title": "pathsig: A GPU-Accelerated Library for Truncated and Projected Path Signatures", "author": "Tobias Nygaard", "abstract": "Path signatures provide a rich representation of sequential data, with strong theoretical guarantees and good performance in a variety of machine-learning tasks. While signatures have progressed from fixed feature extractors to trainable components of machine-learning models, existing libraries often lack the required scalability for large-scale, gradient-based learning. To address this gap, this paper introduces pathsig, a PyTorch-native library that computes path signatures directly in the word basis. By using CUDA kernels to update signature coefficients in parallel over prefix-closed word sets, pathsig achieves high GPU throughput and near-minimal peak memory. Compared with other libraries, pathsig achieves 10-30x speedups for computation of truncated signatures and up to 4-10x speedups in training that require backpropagation through the signature. Beyond regular truncation, pathsig supports projections of the (infinite-dimensional) signature onto user-specified sets of words and anisotropic truncation motivated by inhomogeneous path regularity, enabling more compact representations that can reduce dimensionality, redundancy, and computational cost.", "link": "http://arxiv.org/abs/2602.24066v1", "date": "2026-02-27", "relevancy": 2.2181, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4605}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4457}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4247}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20pathsig%3A%20A%20GPU-Accelerated% {"title": "Thinking with Images as Continuous Actions: Numerical Visual Chain-of-Thought", "author": "Kesen Zhao and Beier Zhu and Junbao Zhou and Xingyu Zhu and Zhongqi Yue and Hanwang Zhang", "abstract": "Recent multimodal large language models (MLLMs) increasingly rely on visual chain-of-thought to perform region-grounded reasoning over images. However, existing approaches ground regions via either textified coordinates-causing modality mismatch and semantic fragmentation or fixed-granularity patches that both limit precise region selection and often require non-trivial architectural changes. In this paper, we propose Numerical Visual Chain-of-Thought (NV-CoT), a framework that enables MLLMs to reason over images using continuous numerical coordinates. NV-CoT expands the MLLM action space from discrete vocabulary tokens to a continuous Euclidean space, allowing models to directly generate bounding-box coordinates as actions with only minimal architectural modification. The framework supports both supervised fine-tuning and reinforcement learning. In particular, we replace categorical token policies with a Gaussian (or Laplace) policy over coordinates and introduce stochasticity via reparameterized sampling, making NV-CoT fully compatible with GRPO-style policy optimization. Extensive experiments on three benchmarks against eight representative visual reasoning baselines demonstrate that NV-CoT significantly improves localization precision and final answer accuracy, while also accelerating training convergence, validating the effectiveness of continuous-action visual reasoning in MLLMs. The code is available in https://github.com/kesenzhao/NV-CoT.", "link": "http://arxiv.org/abs/2602.23959v1", "date": "2026-02-27", "relevancy": 2.2179, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.555}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Thinking%20with%20Images%20as%20Continuous%20Actions%3A%20Numerical%20Visual%20Chain-of-Thought&body=Title%3A%20Thinking%20with%20Images%20as%20Continuous%20Actions%3A%20Numerical%20Visual%20Chain-of-Thought%0AAuthor%3A%20Kesen%20Zhao%20and%20Beier%20Zhu%20and%20Junbao%20Zhou%20and%20Xingyu%20Zhu%20and%20Zhongqi%20Yue%20and%20Hanwang%20Zhang%0AAbstract%3A%20Recent%20multimodal%20large%20language%20models%20%28MLLMs%29%20increasingly%20rely%20on%20visual%20chain-of-thought%20to%20perform%20region-grounded%20reasoning%20over%20images.%20However%2C%20existing%20approaches%20ground%20regions%20via%20either%20textified%20coordinates-causing%20modality%20mismatch%20and%20semantic%20fragmentation%20or%20fixed-granularity%20patches%20that%20both%20limit%20precise%20region%20selection%20and%20often%20require%20non-trivial%20architectural%20changes.%20In%20this%20paper%2C%20we%20propose%20Numerical%20Visual%20Chain-of-Thought%20%28NV-CoT%29%2C%20a%20framework%20that%20enables%20MLLMs%20to%20reason%20over%20images%20using%20continuous%20numerical%20coordinates.%20NV-CoT%20expands%20the%20MLLM%20action%20space%20from%20discrete%20vocabulary%20tokens%20to%20a%20continuous%20Euclidean%20space%2C%20allowing%20models%20to%20directly%20generate%20bounding-box%20coordinates%20as%20actions%20with%20only%20minimal%20architectural%20modification.%20The%20framework%20supports%20both%20supervised%20fine-tuning%20and%20reinforcement%20learning.%20In%20particular%2C%20we%20replace%20categorical%20token%20policies%20with%20a%20Gaussian%20%28or%20Laplace%29%20policy%20over%20coordinates%20and%20introduce%20stochasticity%20via%20reparameterized%20sampling%2C%20making%20NV-CoT%20fully%20compatible%20with%20GRPO-style%20policy%20optimization.%20Extensive%20experiments%20on%20three%20benchmarks%20against%20eight%20representative%20visual%20reasoning%20baselines%20demonstrate%20that%20NV-CoT%20significantly%20improves%20localization%20precision%20and%20final%20answer%20accuracy%2C%20while%20also%20accelerating%20training%20convergence%2C%20validating%20the%20effectiveness%20of%20continuous-action%20visual%20reasoning%20in%20MLLMs.%20The%20code%20is%20available%20in%20https%3A//github.com/kesenzhao/NV-CoT.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23959v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinking%2520with%2520Images%2520as%2520Continuous%2520Actions%253A%2520Numerical%2520Visual%2520Chain-of-Thought%26entry.906535625%3DKesen%2520Zhao%2520and%2520Beier%2520Zhu%2520and%2520Junbao%2520Zhou%2520and%2520Xingyu%2520Zhu%2520and%2520Zhongqi%2520Yue%2520and%2520Hanwang%2520Zhang%26entry.1292438233%3DRecent%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520increasingly%2520rely%2520on%2520visual%2520chain-of-thought%2520to%2520perform%2520region-grounded%2520reasoning%2520over%2520images.%2520However%252C%2520existing%2520approaches%2520ground%2520regions%2520via%2520either%2520textified%2520coordinates-causing%2520modality%2520mismatch%2520and%2520semantic%2520fragmentation%2520or%2520fixed-granularity%2520patches%2520that%2520both%2520limit%2520precise%2520region%2520selection%2520and%2520often%2520require%2520non-trivial%2520architectural%2520changes.%2520In%2520this%2520paper%252C%2520we%2520propose%2520Numerical%2520Visual%2520Chain-of-Thought%2520%2528NV-CoT%2529%252C%2520a%2520framework%2520that%2520enables%2520MLLMs%2520to%2520reason%2520over%2520images%2520using%2520continuous%2520numerical%2520coordinates.%2520NV-CoT%2520expands%2520the%2520MLLM%2520action%2520space%2520from%2520discre {"title": "LemmaBench: A Live, Research-Level Benchmark to Evaluate LLM Capabilities in Mathematics", "author": "Antoine Peyronnet and Fabian Gloeckle and Amaury Hayat", "abstract": "We present a new approach for benchmarking Large Language Model (LLM) capabilities on research-level mathematics. Existing benchmarks largely rely on static, hand-curated sets of contest or textbook-style problems as proxies for mathematical research. Instead, we establish an updatable benchmark evaluating models directly on the latest research results in mathematics. This consists of an automatic pipeline that extracts lemmas from arXiv and rewrites them into self-contained statements by making all assumptions and required definitions explicit. It results in a benchmark that can be updated regularly with new problems taken directly from human mathematical research, while previous instances can be used for training without compromising future evaluations. We benchmark current state-of-the-art LLMs, which obtain around 10-15$\\%$ accuracy in theorem proving (pass@1) depending on the model, showing that there is currently a large margin of progression for LLMs to reach human-level proving capabilities in a research context.", "link": "http://arxiv.org/abs/2602.24173v1", "date": "2026-02-27", "relevancy": 2.2118, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4533}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4533}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LemmaBench%3A%20A%20Live%2C%20Research-Level%20Benchmark%20to%20Evaluate%20LLM%20Capabilities%20in%20Mathematics&body=Title%3A%20LemmaBench%3A%20A%20Live%2C%20Research-Level%20Benchmark%20to%20Evaluate%20LLM%20Capabilities%20in%20Mathematics%0AAuthor%3A%20Antoine%20Peyronnet%20and%20Fabian%20Gloeckle%20and%20Amaury%20Hayat%0AAbstract%3A%20We%20present%20a%20new%20approach%20for%20benchmarking%20Large%20Language%20Model%20%28LLM%29%20capabilities%20on%20research-level%20mathematics.%20Existing%20benchmarks%20largely%20rely%20on%20static%2C%20hand-curated%20sets%20of%20contest%20or%20textbook-style%20problems%20as%20proxies%20for%20mathematical%20research.%20Instead%2C%20we%20establish%20an%20updatable%20benchmark%20evaluating%20models%20directly%20on%20the%20latest%20research%20results%20in%20mathematics.%20This%20consists%20of%20an%20automatic%20pipeline%20that%20extracts%20lemmas%20from%20arXiv%20and%20rewrites%20them%20into%20self-contained%20statements%20by%20making%20all%20assumptions%20and%20required%20definitions%20explicit.%20It%20results%20in%20a%20benchmark%20that%20can%20be%20updated%20regularly%20with%20new%20problems%20taken%20directly%20from%20human%20mathematical%20research%2C%20while%20previous%20instances%20can%20be%20used%20for%20training%20without%20compromising%20future%20evaluations.%20We%20benchmark%20current%20state-of-the-art%20LLMs%2C%20which%20obtain%20around%2010-15%24%5C%25%24%20accuracy%20in%20theorem%20proving%20%28pass%401%29%20depending%20on%20the%20model%2C%20showing%20that%20there%20is%20currently%20a%20large%20margin%20of%20progression%20for%20LLMs%20to%20reach%20human-level%20proving%20capabilities%20in%20a%20research%20context.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24173v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLemmaBench%253A%2520A%2520Live%252C%2520Research-Level%2520Benchmark%2520to%2520Evaluate%2520LLM%2520Capabilities%2520in%2520Mathematics%26entry.906535625%3DAntoine%2520Peyronnet%2520and%2520Fabian%2520Gloeckle%2520and%2520

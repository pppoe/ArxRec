{"title": "MSVBench: Towards Human-Level Evaluation of Multi-Shot Video Generation", "author": "Haoyuan Shi and Yunxin Li and Nanhao Deng and Zhenran Xu and Xinyu Chen and Longyue Wang and Baotian Hu and Min Zhang", "abstract": "The evolution of video generation toward complex, multi-shot narratives has exposed a critical deficit in current evaluation methods. Existing benchmarks remain anchored to single-shot paradigms, lacking the comprehensive story assets and cross-shot metrics required to assess long-form coherence and appeal. To bridge this gap, we introduce MSVBench, the first comprehensive benchmark featuring hierarchical scripts and reference images tailored for Multi-Shot Video generation. We propose a hybrid evaluation framework that synergizes the high-level semantic reasoning of Large Multimodal Models (LMMs) with the fine-grained perceptual rigor of domain-specific expert models. Evaluating 20 video generation methods across diverse paradigms, we find that current models--despite strong visual fidelity--primarily behave as visual interpolators rather than true world models. We further validate the reliability of our benchmark by demonstrating a state-of-the-art Spearman's rank correlation of 94.4% with human judgments. Finally, MSVBench extends beyond evaluation by providing a scalable supervisory signal. Fine-tuning a lightweight model on its pipeline-refined reasoning traces yields human-aligned performance comparable to commercial models like Gemini-2.5-Flash.", "link": "http://arxiv.org/abs/2602.23969v1", "date": "2026-02-27", "relevancy": 2.8782, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5966}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5672}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link" {"title": "Ref-Adv: Exploring MLLM Visual Reasoning in Referring Expression Tasks", "author": "Qihua Dong and Kuo Yang and Lin Ju and Handong Zhao and Yitian Zhang and Yizhou Wang and Huimin Zeng and Jianglin Lu and Yun Fu", "abstract": "Referring Expression Comprehension (REC) links language to region level visual perception. Standard benchmarks (RefCOCO, RefCOCO+, RefCOCOg) have progressed rapidly with multimodal LLMs but remain weak tests of visual reasoning and grounding: (i) many expressions are very short, leaving little reasoning demand; (ii) images often contain few distractors, making the target easy to find; and (iii) redundant descriptors enable shortcut solutions that bypass genuine text understanding and visual reasoning. We introduce Ref-Adv, a modern REC benchmark that suppresses shortcuts by pairing linguistically nontrivial expressions with only the information necessary to uniquely identify the target. The dataset contains referring expressions on real images, curated with hard distractors and annotated with reasoning facets including negation. We conduct comprehensive ablations (word order perturbations and descriptor deletion sufficiency) to show that solving Ref-Adv requires reasoning beyond simple cues, and we evaluate a broad suite of contemporary multimodal LLMs on Ref-Adv. Despite strong results on RefCOCO, RefCOCO+, and RefCOCOg, models drop markedly on Ref-Adv, revealing reliance on shortcuts and gaps in visual reasoning and grounding. We provide an in depth failure analysis and aim for Ref-Adv to guide future work on visual reasoning and grounding in MLLMs.", "link": "http://arxiv.org/abs/2602.23898v1", "date": "2026-02-27", "relevancy": 2.8766, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6033}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6033}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ref-Adv%3A%20Exploring%20MLLM%20Visual%20Reasoning%20in%20Referring%20Expression%20Tasks&body=Title%3A%20Ref-Adv%3A%20Exploring%20MLLM%20Visual%20Reasoning%20in%20Referring%20Expression%20Tasks%0AAuthor%3A%20Qihua%20Dong%20and%20Kuo%20Yang%20and%20Lin%20Ju%20and%20Handong%20Zhao%20and%20Yitian%20Zhang%20and%20Yizhou%20Wang%20and%20Huimin%20Zeng%20and%20Jianglin%20Lu%20and%20Yun%20Fu%0AAbstract%3A%20Referring%20Expression%20Comprehension%20%28REC%29%20links%20language%20to%20region%20level%20visual%20perception.%20Standard%20benchmarks%20%28RefCOCO%2C%20RefCOCO%2B%2C%20RefCOCOg%29%20have%20progressed%20rapidly%20with%20multimodal%20LLMs%20but%20remain%20weak%20tests%20of%20visual%20reasoning%20and%20grounding%3A%20%28i%29%20many%20expressions%20are%20very%20short%2C%20leaving%20little%20reasoning%20demand%3B%20%28ii%29%20images%20often%20contain%20few%20distractors%2C%20making%20the%20target%20easy%20to%20find%3B%20and%20%28iii%29%20redundant%20descriptors%20enable%20shortcut%20solutions%20that%20bypass%20genuine%20text%20understanding%20and%20visual%20reasoning.%20We%20introduce%20Ref-Adv%2C%20a%20modern%20REC%20benchmark%20that%20suppresses%20shortcuts%20by%20pairing%20linguistically%20nontrivial%20expressions%20with%20only%20the%20information%20necessary%20to%20uniquely%20identify%20the%20target.%20The%20dataset%20contains%20referring%20expressions%20on%20real%20images%2C%20curated%20with%20hard%20distractors%20and%20annotated%20with%20reasoning%20facets%20including%20negation.%20We%20conduct%20comprehensive%20ablations%20%28word%20order%20perturbations%20and%20descriptor%20deletion%20sufficiency%29%20to%20show%20that%20solving%20Ref-Adv%20requires%20reasoning%20beyond%20simple%20cues%2C%20and%20we%20evaluate%20a%20broad%20suite%20of%20contemporary%20multimodal%20LLMs%20on%20Ref-Adv.%20Despite%20strong%20results%20on%20RefCOCO%2C%20RefCOCO%2B%2C%20and%20RefCOCOg%2C%20models%20drop%20markedly%20on%20Ref-Adv%2C%20revealing%20reliance%20on%20shortcuts%20and%20gaps%20in%20visual%20reasoning%20and%20grounding.%20We%20provide%20an%20in%20depth%20failure%20analysis%20and%20aim%20for%20Ref-Adv%20to%20guide%20future%20work%20on%20visual%20reasoning%20and%20grounding%20in%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23898v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRef-Adv%253A%2520Exploring%2520MLLM%2520Visual%2520Reasoning%2520in%2520Referring%2520Expression%2520Tasks%26entry.906535625%3DQihua%2520Dong%2520and%2520Kuo%2520Yang%2520and%2520Lin%2520Ju%2520and%2520Handong%2520Zhao%2520and%2520Yitian%2520Zhang%2520and%2520Yizhou%2520Wang%2520and%2520Huimin%2520Zeng%2520and%2520Jianglin%2520Lu%2520and%2520Yun%2520Fu%26entry.1292438233%3DReferring%2520Expression%2520Comprehension%2520%2528REC%2529%2520links%2520language%2520to%2520region%2520level%2520visual%2520perception.%2520Standard%2520benchmarks%2520%2528RefCOCO%252C%2520RefCOCO%252B%252C%2520RefCOCOg%2529%2520have%2520progressed%2520rapidly%2520with%2520multimodal%2520LLMs%2520but%2520remain%2520weak%2520tests%2520of%2520visual%2520reasoning%2520and%2520grounding%253A%2520%2528i%2529%2520many%2520expressions%2520are%2520very%2520short%252C%2520leaving%2520little%2520reasoning%2520demand%253B%2520%2528ii%2529%2520images%2520often%2520contain%2520few%2520distractors%252C%2520making%2520the%2520target%2520easy%2520to%2520find%253B%2520and%2520%2528iii%2529%2520redundant%2520descriptors%2520enable%2520shortcut%2520solutions%2520that%2520bypass%2520genuine%2520text%2520understanding%2520and%2520visual%2520reasonin {"title": "Compositional Generalization Requires Linear, Orthogonal Representations in Vision Embedding Models", "author": "Arnas Uselis and Andrea Dittadi and Seong Joon Oh", "abstract": "Compositional generalization, the ability to recognize familiar parts in novel contexts, is a defining property of intelligent systems. Although modern models are trained on massive datasets, they still cover only a tiny fraction of the combinatorial space of possible inputs, raising the question of what structure representations must have to support generalization to unseen combinations. We formalize three desiderata for compositional generalization under standard training (divisibility, transferability, stability) and show they impose necessary geometric constraints: representations must decompose linearly into per-concept components, and these components must be orthogonal across concepts. This provides theoretical grounding for the Linear Representation Hypothesis: the linear structure widely observed in neural representations is a necessary consequence of compositional generalization. We further derive dimension bounds linking the number of composable concepts to the embedding geometry. Empirically, we evaluate these predictions across modern vision models (CLIP, SigLIP, DINO) and find that representations exhibit partial linear factorization with low-rank, near-orthogonal per-concept factors, and that the degree of this structure correlates with compositional generalization on unseen combinations. As models continue to scale, these conditions predict the representational geometry they may converge to. Code is available at https://github.com/oshapio/necessary-compositionality.", "link": "http://arxiv.org/abs/2602.24264v1", "date": "2026-02-27", "relevancy": 2.8638, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5752}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5752}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5679}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Compositional%20Generalization%20Requires%20Linear%2C%20Orthogonal%20Representations%20in%20Vision%20Embedding%20Models&body=Title%3A%20Compositional%20Generalization%20Requires%20Linear%2C%20Orthogonal%20Representations%20in%20Vision%20Embedding%20Models%0AAuthor%3A%20Arnas%20Uselis%20and%20Andrea%20Dittadi%20and%20Seong%20Joon%20Oh%0AAbstract%3A%20Compositional%20generalization%2C%20the%20ability%20to%20recognize%20familiar%20parts%20in%20novel%20contexts%2C%20is%20a%20defining%20property%20of%20intelligent%20systems.%20Although%20modern%20models%20are%20trained%20on%20massive%20datasets%2C%20they%20still%20cover%20only%20a%20tiny%20fraction%20of%20the%20combinatorial%20space%20of%20possible%20inputs%2C%20raising%20the%20question%20of%20what%20structure%20representations%20must%20have%20to%20support%20generalization%20to%20unseen%20combinations.%20We%20formalize%20three%20desiderata%20for%20compositional%20generalization%20under%20standard%20training%20%28divisibility%2C%20transferability%2C%20stability%29%20and%20show%20they%20impose%20necessary%20geometric%20constraints%3A%20representations%20must%20decompose%20linearly%20into%20per-concept%20components%2C%20and%20these%20components%20must%20be%20orthogonal%20across%20concepts.%20This%20provides%20theoretical%20grounding%20for%20the%20Linear%20Representation%20Hypothesis%3A%20the%20linear%20structure%20widely%20observed%20in%20neural%20representations%20is%20a%20necessary%20consequence%20of%20compositional%20generalization.%20We%20further%20derive%20dimension%20bounds%20linking%20the%20number%20of%20composable%20concepts%20to%20the%20embedding%20geometry.%20Empirically%2C%20we%20evaluate%20these%20predictions%20across%20modern%20vision%20models%20%28CLIP%2C%20SigLIP%2C%20DINO%29%20and%20find%20that%20representations%20exhibit%20partial%20linear%20factorization%20with%20low-rank%2C%20near-orthogonal%20per-concept%20factors%2C%20and%20that%20the%20degree%20of%20this%20structure%20correlates%20with%20compositional%20generalization%20on%20unseen%20combinations.%20As%20models%20continue%20to%20scale%2C%20these%20conditions%20predict%20the%20representational%20geometry%20they%20may%20converge%20to.%20Code%20is%20available%20at%20https%3A//github.com/oshapio/necessary-compositionality.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24264v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCompositional%2520Generalization%2520Requires%2520Linear%252C%2520Orthogonal%2520Representations%2520in%2520Vision%2520Embedding%2520Models%26entry.906535625%3DArnas%2520Uselis%2520and%2520Andrea%2520Dittadi%2520and%2520Seong%2520Joon%2520Oh%26entry.1292438233%3DCompositional%2520generalization%252C%2520the%2520ability%2520to%2520recognize%2520familiar%2520parts%2520in%2520novel%2520contexts%252C%2520is%2520a%2520defining%2520property%2520of%2520intelligent%2520systems.%2520Although%2520modern%2520models%2520are%2520trained%2520on%2520massive%2520datasets%252C%2520they%2520still%2520cover%2520only%2520a%2520tiny%2520fraction%2520of%2520the%2520combinatorial%2520space%2520of%2520possible%2520inputs%252C%2520raising%2520the%2520question%2520of%2520what%2520structure%2520representations%2520must%2520have%2520to%2520support%2520generalization%2520to%2520unseen%2520combinations.%2520We%2520formalize%2520three%2520desiderata%2520for%2520compositional%2520generalization%2520under%2520standard%2520training%2520%2528divisibility%252C%2520transferability%252C%2520stability%2529%2520and%2520show%2520they%2520impose%2520necessary%2520geometric%2520constraints%253A%2520representations%2520must%2520dec {"title": "Less is More: AMBER-AFNO -- a New Benchmark for Lightweight 3D Medical Image Segmentation", "author": "Andrea Dosi and Semanto Mondal and Rajib Chandra Ghosh and Massimo Brescia and Giuseppe Longo", "abstract": "We adapt the remote sensing-inspired AMBER model from multi-band image segmentation to 3D medical datacube segmentation. To address the computational bottleneck of the volumetric transformer, we propose the AMBER-AFNO architecture. This approach uses Adaptive Fourier Neural Operators (AFNO) instead of the multi-head self-attention mechanism. Unlike spatial pairwise interactions between tokens, global token mixing in the frequency domain avoids $\\mathcal{O}(N^2)$ attention-weight calculations. As a result, AMBER-AFNO achieves quasi-linear computational complexity and linear memory scaling.\n  This new way to model global context reduces reliance on dense transformers while preserving global contextual modeling capability. By using attention-free spectral operations, our design offers a compact parameterization and maintains a competitive computational complexity. We evaluate AMBER-AFNO on three public datasets: ACDC, Synapse, and BraTS. On these datasets, the model achieves state-of-the-art or near-state-of-the-art results for DSC and HD95. Compared with recent compact CNN and Transformer architectures, our approach yields higher Dice scores while maintaining a compact model size.\n  Overall, our results show that frequency-domain token mixing with AFNO provides a fast and efficient alternative to self-attention mechanisms for 3D medical image segmentation.", "link": "http://arxiv.org/abs/2508.01941v2", "date": "2026-02-27", "relevancy": 2.8197, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5726}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0 {"title": "FRIEDA: Benchmarking Multi-Step Cartographic Reasoning in Vision-Language Models", "author": "Jiyoon Pyo and Yuankun Jiao and Dongwon Jung and Zekun Li and Leeje Jang and Sofia Kirsanova and Jina Kim and Yijun Lin and Qin Liu and Junyi Xie and Hadi Askari and Nan Xu and Muhao Chen and Yao-Yi Chiang", "abstract": "Cartographic reasoning is the skill of interpreting geographic relationships by aligning legends, map scales, compass directions, map texts, and geometries across one or more map images. Although essential as a concrete cognitive capability and for critical tasks such as disaster response and urban planning, it remains largely unevaluated. Building on progress in chart and infographic understanding, recent large vision language model studies on map visual question-answering often treat maps as a special case of charts. In contrast, map VQA demands comprehension of layered symbology (e.g., symbols, geometries, and text labels) as well as spatial relations tied to orientation and distance that often span multiple maps and are not captured by chart-style evaluations. To address this gap, we introduce FRIEDA, a benchmark for testing complex open-ended cartographic reasoning in LVLMs. FRIEDA sources real map images from documents and reports in various domains and geographical areas. Following classifications in Geographic Information System (GIS) literature, FRIEDA targets all three categories of spatial relations: topological (border, equal, intersect, within), metric (distance), and directional (orientation). All questions require multi-step inference, and many require cross-map grounding and reasoning. We evaluate eleven state-of-the-art LVLMs under two settings: (1) the direct setting, where we provide the maps relevant to the question, and (2) the contextual setting, where the model may have to identify the maps relevant to the question before reasoning. Even the strongest models, Gemini-2.5-Pro and GPT-5-Think, achieve only 38.20% and 37.20% accuracy, respectively, far below human performance of 84.87%. These results reveal a persistent gap in multi-step cartographic reasoning, positioning FRIEDA as a rigorous benchmark to drive progress on spatial intelligence in LVLMs.", "link": "http://arxiv.org/abs/2512.08016v2", "date": "2026-02-27", "relevancy": 2.8024, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5876}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5876}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5063}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FRIEDA%3A%20Benchmarking%20Multi-Step%20Cartographic%20Reasoning%20in%20Vision-Language%20Models&body=Title%3A%20FRIEDA%3A%20Benchmarking%20Multi-Step%20Cartographic%20Reasoning%20in%20Vision-Language%20Models%0AAuthor%3A%20Jiyoon%20Pyo%20and%20Yuankun%20Jiao%20and%20Dongwon%20Jung%20and%20Zekun%20Li%20and%20Leeje%20Jang%20and%20Sofia%20Kirsanova%20and%20Jina%20Kim%20and%20Yijun%20Lin%20and%20Qin%20Liu%20and%20Junyi%20Xie%20and%20Hadi%20Askari%20and%20Nan%20Xu%20and%20Muhao%20Chen%20and%20Yao-Yi%20Chiang%0AAbstract%3A%20Cartographic%20reasoning%20is%20the%20skill%20of%20interpreting%20geographic%20relationships%20by%20aligning%20legends%2C%20map%20scales%2C%20compass%20directions%2C%20map%20texts%2C%20and%20geometries%20across%20one%20or%20more%20map%20images.%20Although%20essential%20as%20a%20concrete%20cognitive%20capability%20and%20for%20critical%20tasks%20such%20as%20disaster%20response%20and%20urban%20planning%2C%20it%20remains%20largely%20unevaluated.%20Building%20on%20progress%20in%20chart%20and%20infographic%20understanding%2C%20recent%20large%20vision%20language%20model%20studies%20on%20map%20visual%20question-answering%20often%20treat%20maps%20as%20a%20special%20case%20of%20charts.%20In%20contrast%2C%20map%20VQA%20demands%20comprehension%20of%20layered%20symbology%20%28e.g.%2C%20symbols%2C%20geometries%2C%20and%20text%20labels%29%20as%20well%20as%20spatial%20relations%20tied%20to%20orientation%20and%20distance%20that%20often%20span%20multiple%20maps%20and%20are%20not%20captured%20by%20chart-style%20evaluations.%20To%20address%20this%20gap%2C%20we%20introduce%20FRIEDA%2C%20a%20benchmark%20for%20testing%20complex%20open-ended%20cartographic%20reasoning%20in%20LVLMs.%20FRIEDA%20sources%20real%20map%20images%20from%20documents%20and%20reports%20in%20various%20domains%20and%20geographical%20areas.%20Following%20classifications%20in%20Geographic%20Information%20System%20%28GIS%29%20literature%2C%20FRIEDA%20targets%20all%20three%20categories%20of%20spatial%20relations%3A%20topological%20%28border%2C%20equal%2C%20intersect%2C%20within%29%2C%20metric%20%28distance%29%2C%20and%20directional%20%28orientation%29.%20All%20questions%20require%20multi-step%20inference%2C%20and%20many%20require%20cross-map%20grounding%20and%20reasoning.%20We%20evaluate%20eleven%20state-of-the-art%20LVLMs%20under%20two%20settings%3A%20%281%29%20the%20direct%20setting%2C%20where%20we%20provide%20the%20maps%20relevant%20to%20the%20question%2C%20and%20%282%29%20the%20contextual%20setting%2C%20where%20the%20model%20may%20have%20to%20identify%20the%20maps%20relevant%20to%20the%20question%20before%20reasoning.%20Even%20the%20strongest%20models%2C%20Gemini-2.5-Pro%20and%20GPT-5-Think%2C%20achieve%20only%2038.20%25%20and%2037.20%25%20accuracy%2C%20respectively%2C%20far%20below%20human%20performance%20of%2084.87%25.%20These%20results%20reveal%20a%20persistent%20gap%20in%20multi-step%20cartographic%20reasoning%2C%20positioning%20FRIEDA%20as%20a%20rigorous%20benchmark%20to%20drive%20progress%20on%20spatial%20intelligence%20in%20LVLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2512.08016v2%0A 28distance%29%2C%20and%20directional%20%28orientation%29.%20All%20questions%20require%20multi-step%20inference%2C%20and%20many%20require%20cross-map%20grounding%20and%20reasoning.%20We%20evaluate%20eleven%20state-of-the-art%20LVLMs%20under%20two%20settings%3A%20%281%29%20the%20direct%20setting%2C%20where%20we%20provide%20the%20maps%20relevant%20to%20the%20question%2C%20and%20%282%29%20the%20contextual%20setting%2C%20where%20the%20model%20may%20have%20to%20identify%20the%20maps%20relevant%20to%20the%20question%20before%20reasoning.%20Even%20the%20strongest%20models%2C%20Gemini-2.5-Pro%20and%20GPT-5-Think%2C%20achieve%20only%2038.20%25%20and%2037.20%25%20accuracy%2C%20respectively%2C%20far%20below%20human%20performance%20of%2084.87%25.%20These%20results%20reveal%20a%20persistent%20gap%20in%20multi-step%20cartographic%20reasoning%2C%20positioning%20FRIEDA%20as%20a%20rigorous%20benchmark%20to%20drive%20progress%20on%20spatial%20intelligence%20in%20LVLMs.&entry.1838667208=http%3A//arxiv.org/abs/2512.08016v2&entry.124074799=Read"},
{"title": "Empowering Small VLMs to Think with Dynamic Memorization and Exploration", "author": "Jiazhen Liu and Yuchuan Deng and Long Chen", "abstract": "Small-scale Vision-Language Models (SVLMs) are exceptionally well-suited for proprietary tasks. Equipping them with thinking capabilities is a critical step to enhance their performance and reliability in these specific domains. However, existing training paradigms, including Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Reward (RLVR), impose substantial demands on the base VLM, exceeding the capacity of SVLMs. Consequently, directly applying these paradigms to SVLMs fails to instill the desired thinking abilities. A natural solution is to combine SFT and RLVR, leveraging their complementarity to reduce the dependence on model capacity. Yet the core challenge lies in managing the inherent trade-off: excessive reliance on SFT can force the model to memorize pseudo thinking traces, while over-emphasizing RLVR can lead to unstable exploration (i.e., advantage collapse). To address this, we propose DyME, a novel training paradigm that Dynamically selects between Memorization (via SFT) and Exploration (via RLVR) at each optimization step. By ensuring that every update contributes to the trade-off, DyME serves as a robust, standalone strategy that stabilizes SVLM learning. Complementing this paradigm, we further introduce a synergistic Visual Supervision mechanism (comprising a visual checker and refiner) designed to inject dynamically enhanced, image-grounded guidance during optimization. Extensive experiments across diverse domains demonstrate that DyME consistently achieves this balance, and thus delivers substantial performance improvements on specialized tasks. These results establish DyME as a practical and effective solution for empowering SVLMs with reliable thinking capabilities. GitHub: https://github.com/HKUST-LongGroup/DyME", "link": "http://arxiv.org/abs/2506.23061v2", "date": "2026-02-27", "relevancy": 2.7727, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5629}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Empowering%20Small%20VLMs%20to%20Think%20with%20Dynamic%20Memorization%20and%20Exploration&body=Title%3A%20Empowering%20Small%20VLMs%20to%20Think%20with%20Dynamic%20Memorization%20and%20Exploration%0AAuthor%3A%20Jiazhen%20Liu%20and%20Yuchuan%20Deng%20and%20Long%20Chen%0AAbstract%3A%20Small-scale%20Vision-Language%20Models%20%28SVLMs%29%20are%20exceptionally%20well-suited%20for%20proprietary%20tasks.%20Equipping%20them%20with%20thinking%20capabilities%20is%20a%20critical%20step%20to%20enhance%20their%20performance%20and%20reliability%20in%20these%20specific%20domains.%20However%2C%20existing%20training%20paradigms%2C%20including%20Supervised%20Fine-Tuning%20%28SFT%29%20and%20Reinforcement%20Learning%20with%20Verifiable%20Reward%20%28RLVR%29%2C%20impose%20substantial%20demands%20on%20the%20base%20VLM%2C%20exceeding%20the%20capacity%20of%20SVLMs.%20Consequently%2C%20directly%20applying%20these%20paradigms%20to%20SVLMs%20fails%20to%20instill%20the%20desired%20thinking%20abilities.%20A%20natural%20solution%20is%20to%20combine%20SFT%20and%20RLVR%2C%20leveraging%20their%20complementarity%20to%20reduce%20the%20dependence%20on%20model%20capacity.%20Yet%20the%20core%20challenge%20lies%20in%20managing%20the%20inherent%20trade-off%3A%20excessive%20reliance%20on%20SFT%20can%20force%20the%20model%20to%20memorize%20pseudo%20thinking%20traces%2C%20while%20over-emphasizing%20RLVR%20can%20lead%20to%20unstable%20exploration%20%28i.e.%2C%20advantage%20collapse%29.%20To%20address%20this%2C%20we%20propose%20DyME%2C%20a%20novel%20training%20paradigm%20that%20Dynamically%20selects%20between%20Memorization%20%28via%20SFT%29%20and%20Exploration%20%28via%20RLVR%29%20at%20each%20optimization%20step.%20By%20ensuring%20that%20every%20update%20contributes%20to%20the%20trade-off%2C%20DyME%20serves%20as%20a%20robust%2C%20standalone%20strategy%20that%20stabilizes%20SVLM%20learning.%20Complementing%20this%20paradigm%2C%20we%20further%20introduce%20a%20synergistic%20Visual%20Supervision%20mechanism%20%28comprising%20a%20visual%20checker%20and%20refiner%29%20designed%20to%20inject%20dynamically%20enhanced%2C%20image-grounded%20guidance%20during%20optimization.%20Extensive%20experiments%20across%20diverse%20domains%20demonstrate%20that%20DyME%20consistently%20achieves%20this%20balance%2C%20and%20thus%20delivers%20substantial%20performance%20improvements%20on%20specialized%20tasks.%20These%20results%20establish%20DyME%20as%20a%20practical%20and%20effective%20solution%20for%20empowering%20SVLMs%20with%20reliable%20thinking%20capabilities.%20GitHub%3A%20https%3A//github.com/HKUST-LongGroup/DyME%0ALink%3A%20http%3A//arxiv.org/abs/2506.23061v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmpowering%2520Small%2520VLMs%2520to%2520Think%2520with%2520Dynamic%2520Memorization%2520and%2520Exploration%26entry.906535625%3DJiazhen%2520Liu%2520and%2520Yuchuan%2520Deng%2520and%2520Long%2520Chen%26entry.1292438233%3DSmall-scale%2520Vision-Language%2520Models%2520%2528SVLMs%2529%2520are%2520exceptionally%2520well-suited%2520for%2520proprietary%2520tasks.%2520Equipping%2520them%2520with%2520thinking%2520capabilities%2520is%2520a%2520critical%2520step%2520to%2520enhance%2520their%2520performance%2520and%2520reliability%2520in%2520these%2520specific%2520domains.%2520However%252C%2520existing%2520training%2520paradigms%252C%252 0DyME%2520consistently%2520achieves%2520this%2520balance%252C%2520and%2520thus%2520delivers%2520substantial%2520performance%2520improvements%2520on%2520specialized%2520tasks.%2520These%2520results%2520establish%2520DyME%2520as%2520a%2520practical%2520and%2520effective%2520solution%2520for%2520empowering%2520SVLMs%2520with%2520reliable%2520thinking%2520capabilities.%2520GitHub%253A%2520https%253A//github.com/HKUST-LongGroup/DyME%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.23061v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Empowering%20Small%20VLMs%20to%20Think%20with%20Dynamic%20Memorization%20and%20Exploration&entry.906535625=Jiazhen%20Liu%20and%20Yuchuan%20Deng%20and%20Long%20Chen&entry.1292438233=Small-scale%20Vision-Language%20Models%20%28SVLMs%29%20are%20exceptionally%20well-suited%20for%20proprietary%20tasks.%20Equipping%20them%20with%20thinking%20capabilities%20is%20a%20critical%20step%20to%20enhance%20their%20performance%20and%20reliability%20in%20these%20specific%20domains.%20However%2C%20existing%20training%20paradigms%2C%20including%20Supervised%20Fine-Tuning%20%28SFT%29%20and%20Reinforcement%20Learning%20with%20Verifiable%20Reward%20%28RLVR%29%2C%20impose%20substantial%20demands%20on%20the%20base%20VLM%2C%20exceeding%20the%20capacity%20of%20SVLMs.%20Consequently%2C%20directly%20applying%20these%20paradigms%20to%20SVLMs%20fails%20to%20instill%20the%20desired%20thinking%20abilities.%20A%20natural%20solution%20is%20to%20combine%20SFT%20and%20RLVR%2C%20leveraging%20their%20complementarity%20to%20reduce%20the%20dependence%20on%20model%20capacity.%20Yet%20the%20core%20challenge%20lies%20in%20managing%20the%20inherent%20trade-off%3A%20excessive%20reliance%20on%20SFT%20can%20force%20the%20model%20to%20memorize%20pseudo%20thinking%20traces%2C%20while%20over-emphasizing%20RLVR%20can%20lead%20to%20unstable%20exploration%20%28i.e.%2C%20advantage%20coll {"title": "Sharp Monocular View Synthesis in Less Than a Second", "author": "Lars Mescheder and Wei Dong and Shiwei Li and Xuyang Bai and Marcel Santos and Peiyun Hu and Bruno Lecouat and Mingmin Zhen and Ama\u00ebl Delaunoy and Tian Fang and Yanghai Tsin and Stephan R. Richter and Vladlen Koltun", "abstract": "We present SHARP, an approach to photorealistic view synthesis from a single image. Given a single photograph, SHARP regresses the parameters of a 3D Gaussian representation of the depicted scene. This is done in less than a second on a standard GPU via a single feedforward pass through a neural network. The 3D Gaussian representation produced by SHARP can then be rendered in real time, yielding high-resolution photorealistic images for nearby views. The representation is metric, with absolute scale, supporting metric camera movements. Experimental results demonstrate that SHARP delivers robust zero-shot generalization across datasets. It sets a new state of the art on multiple datasets, reducing LPIPS by 25-34% and DISTS by 21-43% versus the best prior model, while lowering the synthesis time by three orders of magnitude. Code and weights are provided at https://github.com/apple/ml-sharp", "link": "http://arxiv.org/abs/2512.10685v2", "date": "2026-02-27", "relevancy": 2.7653, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5647}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5543}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5401}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sharp%20Monocular%20View%20Synthesis%20in%20Less%20Than%20a%20Second&body=Title%3A%20Sharp%20Monocular%20View%20Synthesis%20in%20Less%20Than%20a%20Second%0AAuth {"title": "Self-Supervised AI-Generated Image Detection: A Camera Metadata Perspective", "author": "Nan Zhong and Mian Zou and Yiran Xu and Zhenxing Qian and Xinpeng Zhang and Baoyuan Wu and Kede Ma", "abstract": "The proliferation of AI-generated imagery poses escalating challenges for multimedia forensics, yet many existing detectors depend on assumptions about the internals of specific generative models, limiting their cross-model applicability. We introduce a self-supervised approach for detecting AI-generated images that leverages camera metadata -- specifically exchangeable image file format (EXIF) tags -- to learn features intrinsic to digital photography. Our pretext task trains a feature extractor solely on camera-captured photographs by classifying categorical EXIF tags (\\emph{e.g.}, camera model and scene type) and pairwise-ranking ordinal and continuous EXIF tags (\\emph{e.g.}, focal length and aperture value). Using these EXIF-induced features, we first perform one-class detection by modeling the distribution of photographic images with a Gaussian mixture model and flagging low-likelihood samples as AI-generated. We then extend to binary detection that treats the learned extractor as a strong regularizer for a classifier of the same architecture, operating on high-frequency residuals from spatially scrambled patches. Extensive experiments across various generative models demonstrate that our EXIF-induced detectors substantially advance the state of the art, delivering strong generalization to in-the-wild samples and robustness to common benign image perturbations. The code and model are publicly available at https://github.com/Ekko-zn/SDAIE.", "link": "http://arxiv.org/abs/2512.05651v2", "date": "2026-02-27", "relevancy": 2.7441, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5569}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5506}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.539}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Supervised%20AI-Generated%20Image%20Detection%3A%20A%20Camera%20Metadata%20Perspective&body=Title%3A%20Self-Supervised%20AI-Generated%20Image%20Detection%3A%20A%20Camera%20Metadata%20Perspective%0AAuthor%3A%20Nan%20Zhong%20and%20Mian%20Zou%20and%20Yiran%20Xu%20and%20Zhenxing%20Qian%20and%20Xinpeng%20Zhang%20and%20Baoyuan%20Wu%20and%20Kede%20Ma%0AAbstract%3A%20The%20proliferation%20of%20AI-generated%20imagery%20poses%20escalating%20challenges%20for%20multimedia%20forensics%2C%20yet%20many%20existing%20detectors%20depend%20on%20assumptions%20about%20the%20internals%20of%20specific%20generative%20models%2C%20limiting%20their%20cross-model%20applicability.%20We%20introduce%20a%20self-supervised%20approach%20for%20detecting%20AI-generated%20images%20that%20leverages%20camera%20metadata%20--%20specifically%20exchangeable%20image%20file%20format%20%28EXIF%29%20tags%20--%20to%20learn%20features%20intrinsic%20to%20digital%20photography.%20Our%20pretext%20task%20trains%20a%20feature%20extractor%20solely%20on%20camera-captured%20photographs%20by%20classifying%20categorical%20EXIF%20tags%20%28%5Cemph%7Be.g.%7D%2C%20camera%20model%20and%20scene%20type%29%20and%20pairwise-ranking%20ordinal%20and%20continuous%20EXIF%20tags%20%28%5Cemph%7Be.g.%7D%2C%20focal%20length%20and%20aperture%20value%29.%20Using%20these%20EXIF-induced%20features%2C%20we%20first%20perform%20one-class%20detection%20by%20modeling%20the%20distribution%20of%20photographic%20images%20with%20a%20Gaussian%20mixture%20model%20and%20flagging%20low-likelihood%20samples%20as%20AI-generated.%20We%20then%20extend%20to%20binary%20detection%20that%20treats%20the%20learned%20extractor%20as%20a%20strong%20regularizer%20for%20a%20classifier%20of%20the%20same%20architecture%2C%20operating%20on%20high-frequency%20residuals%20from%20spatially%20scrambled%20patches.%20Extensive%20experiments%20across%20various%20generative%20models%20demonstrate%20that%20our%20EXIF-induced%20detectors%20substantially%20advance%20the%20state%20of%20the%20art%2C%20delivering%20strong%20generalization%20to%20in-the-wild%20samples%20and%20robustness%20to%20common%20benign%20image%20perturbations.%20The%20code%20and%20model%20are%20publicly%20available%20at%20https%3A//github.com/Ekko-zn/SDAIE.%0ALink%3A%20http%3A//arxiv.org/abs/2512.05651v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Supervised%2520AI-Generated%2520Image%2520Detection%253A%2520A%2520Camera%2520Metadata%2520Perspective%26entry.906535625%3DNan%2520Zhong%2520and%2520Mian%2520Zou%2520and%2520Yiran%2520Xu%2520and%2520Zhenxing%2520Qian%2520and%2520Xinpeng%2520Zhang%2520and%2520Baoyuan%2520Wu%2520and%2520Kede%2520Ma%26entry.1292438233%3DThe%2520proliferation%2520of%2520AI-generated%2520imagery%2520poses%2520escalating%2520challenges%2520for%2520multimedia%2520forensics%252C%2520yet%2520many%2520existing%2520detectors%2520depend%2520on%2520assumptions%2520about%2520the%2520internals%2520of%2520specific%2520generative%2520models%252C%2520limiting%2520their%2520cross-model%2520applicability.%2520We%2520introduce%2520a%2520self-supervised%2520approach%2520for%2520detecting%2520AI-generated%2520images%2520that%2520leverages%2520camera%2520metadata%2520--%2520specifically%2520exchangeable%2520image%2520file%2520format%2520%2528EXIF%2529%2520tags%2520--%2520to%2520learn%2520features%2520intrinsic%2520to%2520digital%2520photography.%2520Our%2520pretext%2520task%2520trains%2520a%2520feature%2520extractor%2520solely%2520on%2520camera-captured%2520photographs%2520by%2520classifying%2520categorical%2520EXIF%2520tags%2520%2528%255Cemph%257Be.g.%257D%252C%2520camera%2520model%2520and%2 ptions%20about%20the%20internals%20of%20specific%20generative%20models%2C%20limiting%20their%20cross-model%20applicability.%20We%20introduce%20a%20self-supervised%20approach%20for%20detecting%20AI-generated%20images%20that%20leverages%20camera%20metadata%20--%20specifically%20exchangeable%20image%20file%20format%20%28EXIF%29%20tags%20--%20to%20learn%20features%20intrinsic%20to%20digital%20photography.%20Our%20pretext%20task%20trains%20a%20feature%20extractor%20solely%20on%20camera-captured%20photographs%20by%20classifying%20categorical%20EXIF%20tags%20%28%5Cemph%7Be.g.%7D%2C%20camera%20model%20and%20scene%20type%29%20and%20pairwise-ranking%20ordinal%20and%20continuous%20EXIF%20tags%20%28%5Cemph%7Be.g.%7D%2C%20focal%20length%20and%20aperture%20value%29.%20Using%20these%20EXIF-induced%20features%2C%20we%20first%20perform%20one-class%20detection%20by%20modeling%20the%20distribution%20of%20photographic%20images%20with%20a%20Gaussian%20mixture%20model%20and%20flagging%20low-likelihood%20samples%20as%20AI-generated.%20We%20then%20extend%20to%20binary%20detection%20that%20treats%20the%20learned%20extractor%20as%20a%20strong%20regularizer%20for%20a%20classifier%20of%20the%20same%20architecture%2C%20operating%20on%20high-frequency%20residuals%20from%20spatially%20scrambled%20patches.%20Extensive%20experiments%20across%20various%20generative%20models%20demonstrate%20that%20our%20EXIF-induced%20detectors%20substantially%20advance%20the%20state%20of%20the%20art%2C%20delivering%20strong%20generalization%20to%20in-the-wild%20samples%20and%20robustness%20to%20common%20benign%20image%20perturbations.%20The%20code%20and%20model%20are%20publicly%20available%20at%20https%3A//github.com/Ekko-zn/SDAIE.&entry.1838667208=http%3A//arxiv.org/abs/2512.05651v2&entry.124074799=Read"},
{"title": "Toward Guarantees for Clinical Reasoning in Vision Language Models via Formal Verification", "author": "Vikash Singh and Debargha Ganguly and Haotian Yu and Chengwei Zhou and Prerna Singh and Brandon Lee and Vipin Chaudhary and Gourav Datta", "abstract": "Vision-language models (VLMs) show promise in drafting radiology reports, yet they frequently suffer from logical inconsistencies, generating diagnostic impressions unsupported by their own perceptual findings or missing logically entailed conclusions. Standard lexical metrics heavily penalize clinical paraphrasing and fail to capture these deductive failures in reference-free settings. Toward guarantees for clinical reasoning, we introduce a neurosymbolic verification framework that deterministically audits the internal consistency of VLM-generated reports. Our pipeline autoformalizes free-text radiographic findings into structured propositional evidence, utilizing an SMT solver (Z3) and a clinical knowledge base to verify whether each diagnostic claim is mathematically entailed, hallucinated, or omitted. Evaluating seven VLMs across five chest X-ray benchmarks, our verifier exposes distinct reasoning failure modes, such as conservative observation and stochastic hallucination, that remain invisible to traditional metrics. On labeled datasets, enforcing solver-backed entailment acts as a rigorous post-hoc guarantee, systematically eliminating unsupported hallucinations to significantly increase diagnostic soundness and precision in generative clinical assistants.", "link": "http://arxiv.org/abs/2602.24111v1", "date": "2026-02-27", "relevancy": 2.7201, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5448}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5448}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Guarantees%20for%20Clinical%20Reasoning%20in%20Vision%20Language%20Models%20via%20Formal%20Verification&body=Title%3A%20Toward%20Guarantees%20for%20Clinical%20Reasoning%20in%20Vision%20Language%20Models%20via%20Formal%20Verification%0AAuthor%3A%20Vikash%20Singh%20and%20Debargha%20Ganguly%20and%20Haotian%20Yu%20and%20Chengwei%20Zhou%20and%20Prerna%20Singh%20and%20Brandon%20Lee%20and%20Vipin%20Chaudhary%20and%20Gourav%20Datta%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20show%20promise%20in%20drafting%20radiology%20reports%2C%20yet%20they%20frequently%20suffer%20from%20logical%20inconsistencies%2C%20generating%20diagnostic%20impressions%20unsupported%20by%20their%20own%20perceptual%20findings%20or%20missing%20logically%20entailed%20conclusions.%20Standard%20lexical%20metrics%20heavily%20penalize%20clinical%20paraphrasing%20and%20fail%20to%20capture%20these%20deductive%20failures%20in%20reference-free%20settings.%20Toward%20guarantees%20for%20clinical%20reasoning%2C%20we%20introduce%20a%20neurosymbolic%20verification%20framework%20that%20deterministically%20audits%20the%20internal%20consistency%20of%20VLM-generated%20reports.%20Our%20pipeline%20autoformalizes%20free-text%20radiographic%20findings%20into%20structured%20propositional%20evidence%2C%20utilizing%20an%20SMT%20solver%20%28Z3%29%20and%20a%20clinical%20knowledge%20base%20to%20verify%20whether%20each%20diagnostic%20claim%20is%20mathematically%20entailed%2C%20hallucinated%2C%20or%20omitted.%20Evaluating%20seven%20VLMs%20across%20five%20chest%20X-ray%20benchmarks%2C%20our%20verifier%20exposes%20distinct%20reasoning%20failure%20modes%2C%20such%20as%20conservative%20observation% {"title": "Open-Vocabulary Semantic Segmentation in Remote Sensing via Hierarchical Attention Masking and Model Composition", "author": "Mohammadreza Heidarianbaei and Mareike Dorozynski and Hubert Kanyamahanga and Max Mehltretter and Franz Rottensteiner", "abstract": "In this paper, we propose ReSeg-CLIP, a new training-free Open-Vocabulary Semantic Segmentation method for remote sensing data. To compensate for the problems of vision language models, such as CLIP in semantic segmentation caused by inappropriate interactions within the self-attention layers, we introduce a hierarchical scheme utilizing masks generated by SAM to constrain the interactions at multiple scales. We also present a model composition approach that averages the parameters of multiple RS-specific CLIP variants, taking advantage of a new weighting scheme that evaluates representational quality using varying text prompts. Our method achieves state-of-the-art results across three RS benchmarks without additional training.", "link": "http://arxiv.org/abs/2602.23869v1", "date": "2026-02-27", "relevancy": 2.7147, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5349}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Open-Vocabulary%20Semantic%20Segmentation%20in%20Remote%20Sensing%20via%20Hierarchical%20Attention%20Masking%20and%20Model%20Composition&body=Title%3A%20Open-Vocabulary%20Semantic%20Segmentation%20in%20Remote%20Sensing%20via%20Hierarchical%20Attention%20Masking%20and%20Model%20Composition%0AAuthor%3A%20Mohammadreza%20Heidarianbaei%20and%20Mareike%20Dor {"title": "From Generator to Embedder: Harnessing Innate Abilities of Multimodal LLMs via Building Zero-Shot Discriminative Embedding Model", "author": "Yeong-Joon Ju and Seong-Whan Lee", "abstract": "Adapting generative Multimodal Large Language Models (MLLMs) into universal embedding models typically demands resource-intensive contrastive pre-training, while traditional hard negative mining methods suffer from severe false negative contamination. In this paper, we propose a highly data-efficient framework that bypasses extensive pre-training to build a robust multimodal representation space. We first introduce a hierarchical embedding prompt that provides strong latent conditioning. By explicitly anchoring task definitions at the system level, this prompting strategy effectively bridges the modality gap and unlocks powerful zero-shot embedding capabilities. Building upon this latent conditioning, we present Self-aware Hard Negative Sampling (SaHa). Unlike conventional candidate-space mining, SaHa shifts the mechanism to the query-space by mapping retrieved candidates back to their owner queries to rigorously filter out semantic false negatives. Furthermore, our method constructs mutually hard clusters, maximizing intra-task discrimination and batch efficiency without redundant forward passes. Extensive experiments demonstrate that our unified approach achieves highly competitive fine-tuning performance on the Massive Multimodal Embedding Benchmark using only a fraction of standard training data.", "link": "http://arxiv.org/abs/2508.00955v2", "date": "2026-02-27", "relevancy": 2.6997, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.56}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5316}, {"title": "Genie: Generative Interactive Enviro nstrate%20that%20our%20unified%20approach%20achieves%20highly%20competitive%20fine-tuning%20performance%20on%20the%20Massive%20Multimodal%20Embedding%20Benchmark%20using%20only%20a%20fraction%20of%20standard%20training%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2508.00955v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Generator%2520to%2520Embedder%253A%2520Harnessing%2520Innate%2520Abilities%2520of%2520Multimodal%2520LLMs%2520via%2520Building%2520Zero-Shot%2520Discriminative%2520Embedding%2520Model%26entry.906535625%3DYeong-Joon%2520Ju%2520and%2520Seong-Whan%2520Lee%26entry.1292438233%3DAdapting%2520generative%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520into%2520universal%2520embedding%2520models%2520typically%2520demands%2520resource-intensive%2520contrastive%2520pre-training%252C%2520while%2520traditional%2520hard%2520negative%2520mining%2520methods%2520suffer%2520from%2520severe%2520false%2520negative%2520contamination.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520highly%2520data-efficient%2520framework%2520that%2520bypasses%2520extensive%2520pre-training%2520to%2520build%2520a%2520robust%2520multimodal%2520representation%2520space.%2520We%2520first%2520introduce%2520a%2520hierarchical%2520embedding%2520prompt%2520that%2520provides%2520strong%2520latent%2520conditioning.%2520By%2520explicitly%2520anchoring%2520task%2520definitions%2520at%2520the%2520system%2520level%252C%2520this%2520prompting%2520strategy%2520effectively%2520bridges%2520the%2520modality%2520gap%2520and%2520unlocks%2520powerful%2520zero-shot%2520embedding%2520capabilities.%2520Building%2520upon%2520this%2520latent%2520conditioning%252C%2520we%2520present%2520Self-aware%2520Hard%2520Negative%2520Sampling%2520%2528SaHa%2529.%2520Unlike%2520conventional%2520candidate-space%2520mining%252C%2520SaHa%2520shifts%2520the%2520mechanism%2520to%2520the%2520query-spac ities.%20Building%20upon%20this%20latent%20conditioning%2C%20we%20present%20Self-aware%20Hard%20Negative%20Sampling%20%28SaHa%29.%20Unlike%20conventional%20candidate-space%20mining%2C%20SaHa%20shifts%20the%20mechanism%20to%20the%20query-space%20by%20mapping%20retrieved%20candidates%20back%20to%20their%20owner%20queries%20to%20rigorously%20filter%20out%20semantic%20false%20negatives.%20Furthermore%2C%20our%20method%20constructs%20mutually%20hard%20clusters%2C%20maximizing%20intra-task%20discrimination%20and%20batch%20efficiency%20without%20redundant%20forward%20passes.%20Extensive%20experiments%20demonstrate%20that%20our%20unified%20approach%20achieves%20highly%20competitive%20fine-tuning%20performance%20on%20the%20Massive%20Multimodal%20Embedding%20Benchmark%20using%20only%20a%20fraction%20of%20standard%20training%20data.&entry.1838667208=http%3A//arxiv.org/abs/2508.00955v2&entry.124074799=Read"},
{"title": "Multimodal Optimal Transport for Unsupervised Temporal Segmentation in Surgical Robotics", "author": "Omar Mohamed and Edoardo Fazzari and Ayah Al-Naji and Hamdan Alhadhrami and Khalfan Hableel and Saif Alkindi and Cesare Stefanini", "abstract": "Recognizing surgical phases and steps from video is a fundamental problem in computer-assisted interventions. Recent approaches increasingly rely on large-scale pre-training on thousands of labeled surgical videos, followed by zero-shot transfer to specific procedures. While effective, this strategy incurs substantial computational and data collection costs. In this work, we question whether such heavy pre-training is truly necessary. We propose Text-Augmented Action Segmentation Optimal Transport (TASOT), an unsupervised method for surgical phase and step recognition that extends Action Segmentation Optimal Transport (ASOT) by incorporating textual information generated directly from the videos. TASOT formulates temporal action segmentation as a multimodal optimal transport problem, where the matching cost is defined as a weighted combination of visual and text-based costs. The visual term captures frame-level appearance similarity, while the text term provides complementary semantic cues, and both are jointly regularized through a temporally consistent unbalanced Gromov-Wasserstein formulation. This design enables effective alignment between video frames and surgical actions without surgical-specific pretraining or external web-scale supervision. We evaluate TASOT on multiple benchmark surgical datasets and observe consistent and substantial improvements over existing zero-shot methods, including StrasBypass70 (+23.7), BernBypass70 (+4.5), Cholec80 (+16.5), and AutoLaparo (+19.6). These results demonstrate that fine-grained surgical understanding can be achieved by exploiting information already present in standard visual and textual representations, without resorting to increasingly complex pre-training pipelines. The code will be available at https://github.com/omar8ahmed9/TASOT.", "link": "http://arxiv.org/abs/2602.24138v1", "date": "2026-02-27", "relevancy": 2.693, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5602}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5326}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Optimal%20Transport%20for%20Unsupervised%20Temporal%20Segmentation%20in%20Surgical%20Robotics&body=Title%3A%20Multimodal%20Optimal%20Transport%20for%20Unsupervised%20Temporal%20Segmentation%20in%20Surgical%20Robotics%0AAuthor%3A%20Omar%20Mohamed%20and%20Edoardo%20Fazzari%20and%20Ayah%20Al-Naji%20and%20Hamdan%20Alhadhrami%20and%20Khalfan%20Hableel%20and%20Saif%20Alkindi%20and%20Cesare%20Stefanini%0AAbstract%3A%20Recognizing%20surgical%20phases%20and%20steps%20from%20video%20is%20a%20fundamental%20problem%20in%20computer-assisted%20interventions.%20Recent%20approaches%20increasingly%20rely%20on%20large-scale%20pre-training%20on%20thousands%20of%20labeled%20surgical%20videos%2C%20followed%20by%20zero-shot%20transfer%20to%20specific%20procedures.%20While%20effective%2C%20this%20strategy%20incurs%20substantial%20computational%20and%20data%20collection%20costs.%20In%20this%20work%2C%20we%20question%20whether%20such%20heavy%20pre-training%20is%20truly%20necessary.%20We%20propose%20Text-Augmented%20Action%20Segmentation%20Optimal%20Transport%20%28TASOT%29%2C%20an%20unsupervised%20method%20for%20surgical%20phase%20and%20step%20recognition%20that%20extends%20Action%20Segmentation%20Optimal%20Transport%20%28ASOT%29%20by%20incorporating%20textual%20information%20generated%20directly%20from%20the%20videos.%20TASOT%20formulates%20temporal%20action%20segmentation%20as%20a%20multimodal%20optimal%20transport%20problem%2C%20where%20the%20matching%20cost%20is%20defined%20as%20a%20weighted%20combination%20of%20visual%20and%20text-based%20costs.%20The%20visual%20term%20captures%20frame-level%20appearance%20similarity%2C%20while%20the%20text%20term%20provides%20complementary%20semantic%20cues%2C%20and%20both%20are%20jointly%20regularized%20through%20a%20temporally%20consistent%20unbalanced%20Gromov-Wasserstein%20formulation.%20This%20design%20enables%20effective%20alignment%20between%20video%20frames%20and%20surgical%20actions%20without%20surgical-specific%20pretraining%20or%20external%20web-scale%20supervision.%20We%20evaluate%20TASOT%20on%20multiple%20benchmark%20surgical%20datasets%20and%20observe%20consistent%20and%20substantial%20improvements%20over%20existing%20zero-shot%20methods%2C%20including%20StrasBypass70%20%28%2B23.7%29%2C%20BernBypass70%20%28%2B4.5%29%2C%20Cholec80%20%28%2B16.5%29%2C%20and%20AutoLaparo%20%28%2B19.6%29.%20These%20results%20demonstrate%20that%20fine-grained%20surgical%20understanding%20can%20be%20achieved%20by%20exploiting%20information%20already%20present%20in%20standard%20visual%20and%20textual%20representations%2C%20without%20resorting%20to%20increasingly%20complex%20pre-training%20pipelines.%20The%20code%20will%20be%20available%20at%20https%3A//github.com/omar8ahmed9/TASOT.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24138v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultimodal%2520Optimal%2520Transport%2520for%2520Unsupervised%2520Temporal%2520Segmentation%2520in%2520Surgical%2520Robotics%26entry.906535625%3DOmar%2520Mohamed%2520and%2520Edoardo%2520Fazzari%2520and%2520Ayah%2520Al-Naji%2520and%2520Hamdan%2520Alhadhrami%2520and%2520Khalfan%2520Hableel%2520and%2520Saif%2520Alkindi%2520and%2520Cesare%2520 ransport%20%28TASOT%29%2C%20an%20unsupervised%20method%20for%20surgical%20phase%20and%20step%20recognition%20that%20extends%20Action%20Segmentation%20Optimal%20Transport%20%28ASOT%29%20by%20incorporating%20textual%20information%20generated%20directly%20from%20the%20videos.%20TASOT%20formulates%20temporal%20action%20segmentation%20as%20a%20multimodal%20optimal%20transport%20problem%2C%20where%20the%20matching%20cost%20is%20defined%20as%20a%20weighted%20combination%20of%20visual%20and%20text-based%20costs.%20The%20visual%20term%20captures%20frame-level%20appearance%20similarity%2C%20while%20the%20text%20term%20provides%20complementary%20semantic%20cues%2C%20and%20both%20are%20jointly%20regularized%20through%20a%20temporally%20consistent%20unbalanced%20Gromov-Wasserstein%20formulation.%20This%20design%20enables%20effective%20alignment%20between%20video%20frames%20and%20surgical%20actions%20without%20surgical-specific%20pretraining%20or%20external%20web-scale%20supervision.%20We%20evaluate%20TASOT%20on%20multiple%20benchmark%20surgical%20datasets%20and%20observe%20consistent%20and%20substantial%20improvements%20over%20existing%20zero-shot%20methods%2C%20including%20StrasBypass70%20%28%2B23.7%29%2C%20BernBypass70%20%28%2B4.5%29%2C%20Cholec80%20%28%2B16.5%29%2C%20and%20AutoLaparo%20%28%2B19.6%29.%20These%20results%20demonstrate%20that%20fine-grained%20surgical%20understanding%20can%20be%20achieved%20by%20exploiting%20information%20already%20present%20in%20standard%20visual%20and%20textual%20representations%2C%20without%20resorting%20to%20increasingly%20complex%20pre-training%20pipelines.%20The%20code%20will%20be%20available%20at%20https%3A//github.com/omar8ahmed9/TASOT.&entry.1838667208=http%3A//arxiv.org/abs/2602.24138v1&entry.124074799=Read"},
{"title": "Interpretable Debiasing of Vision-Language Models for Social Fairness", "author": "Na Min An and Yoonna Jang and Yusuke Hirota and Ryo Hachiuma and Isabelle Augenstein and Hyunjung Shim", "abstract": "The rapid advancement of Vision-Language models (VLMs) has raised growing concerns that their black-box reasoning processes could lead to unintended forms of social bias. Current debiasing approaches focus on mitigating surface-level bias signals through post-hoc learning or test-time algorithms, while leaving the internal dynamics of the model largely unexplored. In this work, we introduce an interpretable, model-agnostic bias mitigation framework, DeBiasLens, that localizes social attribute neurons in VLMs through sparse autoencoders (SAEs) applied to multimodal encoders. Building upon the disentanglement ability of SAEs, we train them on facial image or caption datasets without corresponding social attribute labels to uncover neurons highly responsive to specific demographics, including those that are underrepresented. By selectively deactivating the social neurons most strongly tied to bias for each group, we effectively mitigate socially biased behaviors of VLMs without degrading their semantic knowledge. Our research lays the groundwork for future auditing tools, prioritizing social fairness in emerging real-world AI systems.", "link": "http://arxiv.org/abs/2602.24014v1", "date": "2026-02-27", "relevancy": 2.6695, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5397}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5397}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5224}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interpretable%20Debiasing%20of%20Vision-Language%20Models%20for%20Social%20Fairness&body=Title%3A%20Interpretable%20Debiasing%20of%20Vision-Language%20Models%20for%20Social%20Fairness%0AAuthor%3A%20Na%20Min%20An%20and%20Yoonna%20Jang%20and%20Yusuke%20Hirota%20and%20Ryo%20Hachiuma%20and%20Isabelle%20Augenstein%20and%20Hyunjung%20Shim%0AAbstract%3A%20The%20rapid%20advancement%20of%20Vision-Language%20models%20%28VLMs%29%20has%20raised%20growing%20concerns%20that%20their%20black-box%20reasoning%20processes%20could%20lead%20to%20unintended%20forms%20of%20social%20bias.%20Current%20debiasing%20approaches%20focus%20on%20mitigating%20surface-level%20bias%20signals%20through%20post-hoc%20learning%20or%20test-time%20algorithms%2C%20while%20leaving%20the%20internal%20dynamics%20of%20the%20model%20largely%20unexplored.%20In%20this%20work%2C%20we%20introduce%20an%20interpretable%2C%20model-agnostic%20bias%20mitigation%20framework%2C%20DeBiasLens%2C%20that%20localizes%20social%20attribute%20neurons%20in%20VLMs%20through%20sparse%20autoencoders%20%28SAEs%29%20applied%20to%20multimodal%20encoders.%20Building%20upon%20the%20disentanglement%20ability%20of%20SAEs%2C%20we%20train%20them%20on%20facial%20image%20or%20caption%20datasets%20without%20corresponding%20social%20attribute%20labels%20to%20uncover%20neurons%20highly%20responsive%20to%20specific%20demographics%2C%20including%20those%20that%20are%20underrepresented.%20By%20selectively%20deactivating%20the%20social%20neurons%20most%20strongly%20tied%20to%20bias%20for%20each%20group%2C%20we%20effectively%20mitigate%20socially%20biased%20behaviors%20of%20VLMs%20without%20degrading%20their%20semantic%20knowledge.%20Our%20research%20lays%20the%20groundwork%20for%20future%20auditing%20tools%2C%20prioritizing%20social%20fairness%20in%20emerging%20real-world%20AI%20systems.%0ALink%3A%20http%3A//arxiv.org/a {"title": "Unified Biomolecular Trajectory Generation via Pretrained Variational Bridge", "author": "Ziyang Yu and Wenbing Huang and Yang Liu", "abstract": "Molecular Dynamics (MD) simulations provide a fundamental tool for characterizing molecular behavior at full atomic resolution, but their applicability is severely constrained by the computational cost. To address this, a surge of deep generative models has recently emerged to learn dynamics at coarsened timesteps for efficient trajectory generation, yet they either generalize poorly across systems or, due to limited molecular diversity of trajectory data, fail to fully exploit structural information to improve generative fidelity. Here, we present the Pretrained Variational Bridge (PVB) in an encoder-decoder fashion, which maps the initial structure into a noised latent space and transports it toward stage-specific targets through augmented bridge matching. This unifies training on both single-structure and paired trajectory data, enabling consistent use of cross-domain structural knowledge across training stages. Moreover, for protein-ligand complexes, we further introduce a reinforcement learning-based optimization via adjoint matching that speeds progression toward the holo state, which supports efficient post-optimization of docking poses. Experiments on proteins and protein-ligand complexes demonstrate that PVB faithfully reproduces thermodynamic and kinetic observables from MD while delivering stable and efficient generative dynamics.", "link": "http://arxiv.org/abs/2602.07588v2", "date": "2026-02-27", "relevancy": 2.6482, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5477}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5241}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.517}], %20observables%20from%20MD%20while%20delivering%20stable%20and%20efficient%20generative%20dynamics.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07588v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Biomolecular%2520Trajectory%2520Generation%2520via%2520Pretrained%2520Variational%2520Bridge%26entry.906535625%3DZiyang%2520Yu%2520and%2520Wenbing%2520Huang%2520and%2520Yang%2520Liu%26entry.1292438233%3DMolecular%2520Dynamics%2520%2528MD%2529%2520simulations%2520provide%2520a%2520fundamental%2520tool%2520for%2520characterizing%2520molecular%2520behavior%2520at%2520full%2520atomic%2520resolution%252C%2520but%2520their%2520applicability%2520is%2520severely%2520constrained%2520by%2520the%2520computational%2520cost.%2520To%2520address%2520this%252C%2520a%2520surge%2520of%2520deep%2520generative%2520models%2520has%2520recently%2520emerged%2520to%2520learn%2520dynamics%2520at%2520coarsened%2520timesteps%2520for%2520efficient%2520trajectory%2520generation%252C%2520yet%2520they%2520either%2520generalize%2520poorly%2520across%2520systems%2520or%252C%2520due%2520to%2520limited%2520molecular%2520diversity%2520of%2520trajectory%2520data%252C%2520fail%2520to%2520fully%2520exploit%2520structural%2520information%2520to%2520improve%2520generative%2520fidelity.%2520Here%252C%2520we%2520present%2520the%2520Pretrained%2520Variational%2520Bridge%2520%2528PVB%2529%2520in%2520an%2520encoder-decoder%2520fashion%252C%2520which%2520maps%2520the%2520initial%2520structure%2520into%2520a%2520noised%2520latent%2520space%2520and%2520transports%2520it%2520toward%2520stage-specific%2520targets%2520through%2520augmented%2520bridge%2520matching.%2520This%2520unifies%2520training%2520on%2520both%2520single-structure%2520and%2520paired%2520trajectory%2520data%252C%2520enabling%2520consistent%2520use%2520of%2520cross-domain%2520structural%2520knowledge%2520across%2520training%2520stages.%2520Moreover%252C%2520for {"title": "CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering", "author": "Yuyang Hong and Jiaqi Gu and Yujin Lou and Lubin Fan and Qi Yang and Ying Wang and Kun Ding and Yue Wu and Shiming Xiang and Jieping Ye", "abstract": "Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose \\textbf{CC-VQA}: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.", "link": "http://arxiv.org/abs/2602.23952v1", "date": "2026-02-27", "relevancy": 2.6032, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5212}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5212}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CC-VQA%3A%20Conflict-%20and%20Correlation-Aware%20Method%20for%20Mitigating%20Knowledge%20Conflict%20in%20Knowledge-Based%20Visual%20Question%20Answering&body=Title%3A%20CC-VQA%3A%20Conflict-%20and%20Correlation-Aware%20Method%20for%20Mitigating%20Knowledge%20Conflict%20in%20Knowledge-Based%20Visual%20Question%20Answering%0AAuthor%3A%20Yuyang%20Hong%20and%20Jiaqi%20Gu%20and%20Yujin%20Lou%20and%20Lubin%20Fan%20and%20Qi%20Yang%20and%20Ying%20Wang%20and%20Kun%20Ding%20and%20Yue%20Wu%20and%20Shiming%20Xiang%20and%20Jieping%20Ye%0AAbstract%3A%20Knowledge-based%20visual%20question%20answering%20%28KB-VQA%29%20demonstrates%20significant%20potential%20for%20handling%20knowledge-intensive%20tasks.%20However%2C%20conflicts%20arise%20between%20static%20parametric%20knowledge%20in%20vision%20language%20models%20%28VLMs%29%20and%20dynamically%20retrieved%20information%20due%20to%20the%20static%20model%20knowledge%20from%20pre-training.%20The%20outputs%20either%20ignore%20retrieved%20contexts%20or%20exhibit%20inconsistent%20integration%20with%20parametric%20knowledge%2C%20posing%20substantial%20challenges%20for%20KB-VQA.%20Current%20knowledge%20conflict%20mitigation%20methods%20primarily%20adapted%20from%20language-based%20approaches%2C%20focusing%20on%20context-level%20conflicts%20through%20engineered%20prompting%20strategies%20or%20context-aware%20decoding%20mechanisms.%20However%2C%20these%20methods%20neglect%20the%20critical%20role%20of%20visual%20information%20in%20conflicts%20and%20suffer%20from%20redundant%20retrieved%20contexts%2C%20which%20impair%20accurate%20conflict%20identification%20and%20effective%20mitigation.%20To%20address%20these%20limitations%2C%20we%20propose%20%5Ctextbf%7BCC-VQA%7D%3A%20a%20novel%20training-free%2C%20conflict-%20and%20correlation-aware%20method%20for%20KB-VQA.%20Our%20method%20comprises%20two%20core%20components%3A%20%281%29%20Vision-Centric%20Contextual%20Conflict%20Reasoning%2C%20which%20performs%20visual-semantic%20conflict%20analysis%20across%20internal%20and%20external%20knowledge%20contexts%3B%20and%20%282%29%20Correlation-Guided%20Encoding%20and%20Decoding%2C%20featuring%20positional%20encoding%20compression%20for%20low-correlation%20statements%20and%20adaptive%20decoding%20using%20correlation-weighted%20conflict%20scoring.%20Extensive%20evaluations%20on%20E-VQA%2C%20InfoSeek%2C%20and%20OK-VQA%20benchmarks%20demonstrate%20that%20CC-VQA%20achieves%20state-of-the-art%20performance%2C%20yielding%20absolute%20accuracy%20improvements%20of%203.3%5C%25%20to%206.4%5C%25%20compared%20to%20existing%20methods.%20Code%20is%20available%20at%20https%3A//github.com/cqu-student/CC-VQA.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23952v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCC-VQA%253A%2520Conflict-%2520and%2520Correlation-Aware%2520Method%2520for%2520Mitigating%2520Knowledge%2520Conflict%2520in%2520Knowledge-Based%2520Visual%2520Question%2520Answering%26entry.906535625%3DYuyang%2520Hong%2520and%2520Jiaqi%2520Gu%2520and%2520Yujin%2520Lou%2520and%2520Lubin%2520Fan%2520and%2520Qi%2520Yang%2520and%2520Ying%2520Wang%2520and%2520Kun%2520Ding%2520and%2520Yue%2520Wu%2520and%2520Shiming%2520Xiang%2520and%2 {"title": "Half-Truths Break Similarity-Based Retrieval", "author": "Bora Kargi and Arnas Uselis and Seong Joon Oh", "abstract": "When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP", "link": "http://arxiv.org/abs/2602.23906v1", "date": "2026-02-27", "relevancy": 2.5811, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5447}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.502}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Half-Truths%20Break%20Similarity-Based%20Retrieval&body=Title%3A%20Half-Truths%20Break%20Similarity-Based%20Retrieval%0AAuthor%3A%20Bora%20Kargi%20and%20Arnas%20Uselis%20and%20Seong%20Joon%20Oh%0AAbstract%3A%20When%20a%20text%20description%20is%20extended%20with%20an%20additional%20detail%2C%20image-text%20similarity%20should%20drop%20if%20that%20detail%20is%20wrong.%20We%20show%20that%20CLIP-style%20dual%20encoders%20often%20violate%20this%20intuition%3A%20appending%20a%20plausible%20but%20incorrect%20object%20or%20relation%20to%20an%20otherwise%20correct%20description%20can%20increase%20the%20similarity%20score.%20We%20call%20such%20cases%20half-truths.%20On%20COCO%2C%20CLIP%20prefers%20the%20correct%20shorter%20description%20only%2040.6%25%20of%20the%20time%2C%20and%20performance%20drops%20to%2032.9%25%20when%20the%20added%20detail%20is%20a%20relation.%20We%20trace%20this%20vulnerability%20to%20weak%20supervision%20on%20caption%20parts%3A%20contrastive%20training%20aligns%20full%20sentences%20but%20does%20not%20explicitly%20enforce%20that%20individual%20entities%20and%20relations%20are%20grounded.%20We%20propose%20CS-CLIP%20%28Component-Supervised%20CLIP%29%2C%20which%20decomposes%20captions%20into%20entity%20and%20relation%20units%2C%20constructs%20a%20minimally%20edited%20foil%20for%20each%20unit%2C%20and%20fine-tunes%20the%20model%20to%20score%20the%20correct%20unit%20above%20its%20foil%20while%20preserving%20standard%20dual-encoder%20inference.%20CS-CLIP%20raises%20half-truth%20accuracy%20to%2069.3%25%20and%20improves%20average%20performance%20on%20established%20compositional%20benchmarks%20by%205.7%20points%2C%20suggesting%20that%20reducing%20half-truth%20errors%20aligns%20with%20broader%20gains%20in%20compositional%20understanding.%20Code%20is%20publicly%20available%20at%3A%20https%3A//github.com/kargibora/CS-CLIP%0ALink%3A%20http%3A//arxiv.org/abs/2602.23906v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ss {"title": "Hierarchical Concept-based Interpretable Models", "author": "Oscar Hill and Mateo Espinosa Zarlenga and Mateja Jamnik", "abstract": "Modern deep neural networks remain challenging to interpret due to the opacity of their latent representations, impeding model understanding, debugging, and debiasing. Concept Embedding Models (CEMs) address this by mapping inputs to human-interpretable concept representations from which tasks can be predicted. Yet, CEMs fail to represent inter-concept relationships and require concept annotations at different granularities during training, limiting their applicability. In this paper, we introduce Hierarchical Concept Embedding Models (HiCEMs), a new family of CEMs that explicitly model concept relationships through hierarchical structures. To enable HiCEMs in real-world settings, we propose Concept Splitting, a method for automatically discovering finer-grained sub-concepts from a pretrained CEM's embedding space without requiring additional annotations. This allows HiCEMs to generate fine-grained explanations from limited concept labels, reducing annotation burdens. Our evaluation across multiple datasets, including a user study and experiments on PseudoKitchens, a newly proposed concept-based dataset of 3D kitchen renders, demonstrates that (1) Concept Splitting discovers human-interpretable sub-concepts absent during training that can be used to train highly accurate HiCEMs, and (2) HiCEMs enable powerful test-time concept interventions at different granularities, leading to improved task accuracy.", "link": "http://arxiv.org/abs/2602.23947v1", "date": "2026-02-27", "relevancy": 2.5546, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5226}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5226}, {"tit

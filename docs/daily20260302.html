{"title": "Venus: Benchmarking and Empowering Multimodal Large Language Models for Aesthetic Guidance and Cropping", "author": "Tianxiang Du and Hulingxiao He and Yuxin Peng", "abstract": "The widespread use of smartphones has made photography ubiquitous, yet a clear gap remains between ordinary users and professional photographers, who can identify aesthetic issues and provide actionable shooting guidance during capture. We define this capability as aesthetic guidance (AG) -- an essential but largely underexplored domain in computational aesthetics. Existing multimodal large language models (MLLMs) primarily offer overly positive feedback, failing to identify issues or provide actionable guidance. Without AG capability, they cannot effectively identify distracting regions or optimize compositional balance, thus also struggling in aesthetic cropping, which aims to refine photo composition through reframing after capture. To address this, we introduce AesGuide, the first large-scale AG dataset and benchmark with 10,748 photos annotated with aesthetic scores, analyses, and guidance. Building upon it, we propose Venus, a two-stage framework that first empowers MLLMs with AG capability through progressively complex aesthetic questions and then activates their aesthetic cropping power via CoT-based rationales. Extensive experiments show that Venus substantially improves AG capability and achieves state-of-the-art (SOTA) performance in aesthetic cropping, enabling interpretable and interactive aesthetic refinement across both stages of photo creation. Code is available at https://github.com/PKU-ICST-MIPL/Venus_CVPR2026.", "link": "http://arxiv.org/abs/2602.23980v1", "date": "2026-02-27", "relevancy": 1.6175, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5767}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "ht {"title": "Reallocating Attention Across Layers to Reduce Multimodal Hallucination", "author": "Haolang Lu and Bolun Chu and WeiYe Fu and Guoshun Nan and Junning Liu and Minghui Pan and Qiankun Li and Yi Yu and Hua Wang and Kun Wang", "abstract": "Multimodal large reasoning models (MLRMs) often suffer from hallucinations that stem not only from insufficient visual grounding but also from imbalanced allocation between perception and reasoning processes. Building upon recent interpretability findings suggesting a staged division of attention across layers, we analyze how this functional misalignment leads to two complementary failure modes: perceptual bias in shallow layers and reasoning drift in deeper layers. To alleviate these issues, we propose Functional Head Identification and Class-Conditioned Rescaling , a lightweight, training-free plugin that identifies perception- and reasoning-oriented heads and adaptively rebalances their layerwise contributions. Our method improves reasoning consistency and visual faithfulness without retraining or any architectural modification. Evaluations across three representative MLRMs and five multimodal reasoning benchmarks show an average 4.2% point gain, with less than 1% additional computation and only 9% baseline latency. Beyond empirical improvements, our study provides an interpretable perspective on regulating cross-layer functional dynamics to enhance the reliability of multimodal reasoning.", "link": "http://arxiv.org/abs/2510.10285v2", "date": "2026-02-27", "relevancy": 2.0255, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5171}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5047}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http:/ rovements%2C%20our%20study%20provides%20an%20interpretable%20perspective%20on%20regulating%20cross-layer%20functional%20dynamics%20to%20enhance%20the%20reliability%20of%20multimodal%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2510.10285v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReallocating%2520Attention%2520Across%2520Layers%2520to%2520Reduce%2520Multimodal%2520Hallucination%26entry.906535625%3DHaolang%2520Lu%2520and%2520Bolun%2520Chu%2520and%2520WeiYe%2520Fu%2520and%2520Guoshun%2520Nan%2520and%2520Junning%2520Liu%2520and%2520Minghui%2520Pan%2520and%2520Qiankun%2520Li%2520and%2520Yi%2520Yu%2520and%2520Hua%2520Wang%2520and%2520Kun%2520Wang%26entry.1292438233%3DMultimodal%2520large%2520reasoning%2520models%2520%2528MLRMs%2529%2520often%2520suffer%2520from%2520hallucinations%2520that%2520stem%2520not%2520only%2520from%2520insufficient%2520visual%2520grounding%2520but%2520also%2520from%2520imbalanced%2520allocation%2520between%2520perception%2520and%2520reasoning%2520processes.%2520Building%2520upon%2520recent%2520interpretability%2520findings%2520suggesting%2520a%2520staged%2520division%2520of%2520attention%2520across%2520layers%252C%2520we%2520analyze%2520how%2520this%2520functional%2520misalignment%2520leads%2520to%2520two%2520complementary%2520failure%2520modes%253A%2520perceptual%2520bias%2520in%2520shallow%2520layers%2520and%2520reasoning%2520drift%2520in%2520deeper%2520layers.%2520To%2520alleviate%2520these%2520issues%252C%2520we%2520propose%2520Functional%2520Head%2520Identification%2520and%2520Class-Conditioned%2520Rescaling%2520%252C%2520a%2520lightweight%252C%2520training-free%2520plugin%2520that%2520identifies%2520perception-%2520and%2520reasoning-oriented%2520heads%2520and%2520adaptively%2520rebalances%2520their%2520layerwise%2520contributions.%2520Our%2520method%2520improves%2520reasoning%2520consistency%2520and%2520visual%2520faithfulness%2520without%2520re {"title": "BLISSNet: Deep Operator Learning for Fast and Accurate Flow Reconstruction from Sparse Sensor Measurements", "author": "Maksym Veremchuk and K. Andrea Scott and Zhao Pan", "abstract": "Reconstructing fluid flows from sparse sensor measurements is a fundamental challenge in science and engineering. Widely separated measurements and complex, multiscale dynamics make accurate recovery of fine-scale structures difficult. In addition, existing methods face a persistent tradeoff: high-accuracy models are often computationally expensive, whereas faster approaches typically compromise fidelity. In this work, we introduce BLISSNet, a model that strikes a strong balance between reconstruction accuracy and computational efficiency for both flow reconstruction and nudging-based data assimilation. The model follows a DeepONet-like architecture, enabling zero-shot inference on domains of arbitrary size. After the first model call on a given domain, certain network components can be precomputed, leading to low inference cost for subsequent evaluations on large domains. Consequently, the model can achieve faster inference than classical interpolation methods such as radial basis function or bicubic interpolation. This combination of high accuracy, low cost, and zero-shot generalization makes BLISSNet well-suited for large-scale real-time flow reconstruction and data assimilation tasks.", "link": "http://arxiv.org/abs/2602.24228v1", "date": "2026-02-27", "relevancy": 1.5756, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5747}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5276}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5044}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5Ba nterpolation.%2520This%2520combination%2520of%2520high%2520accuracy%252C%2520low%2520cost%252C%2520and%2520zero-shot%2520generalization%2520makes%2520BLISSNet%2520well-suited%2520for%2520large-scale%2520real-time%2520flow%2520reconstruction%2520and%2520data%2520assimilation%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24228v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BLISSNet%3A%20Deep%20Operator%20Learning%20for%20Fast%20and%20Accurate%20Flow%20Reconstruction%20from%20Sparse%20Sensor%20Measurements&entry.906535625=Maksym%20Veremchuk%20and%20K.%20Andrea%20Scott%20and%20Zhao%20Pan&entry.1292438233=Reconstructing%20fluid%20flows%20from%20sparse%20sensor%20measurements%20is%20a%20fundamental%20challenge%20in%20science%20and%20engineering.%20Widely%20separated%20measurements%20and%20complex%2C%20multiscale%20dynamics%20make%20accurate%20recovery%20of%20fine-scale%20structures%20difficult.%20In%20addition%2C%20existing%20methods%20face%20a%20persistent%20tradeoff%3A%20high-accuracy%20models%20are%20often%20computationally%20expensive%2C%20whereas%20faster%20approaches%20typically%20compromise%20fidelity.%20In%20this%20work%2C%20we%20introduce%20BLISSNet%2C%20a%20model%20that%20strikes%20a%20strong%20balance%20between%20reconstruction%20accuracy%20and%20computational%20efficiency%20for%20both%20flow%20reconstruction%20and%20nudging-based%20data%20assimilation.%20The%20model%20follows%20a%20DeepONet-like%20architecture%2C%20enabling%20zero-shot%20inference%20on%20domains%20of%20arbitrary%20size.%20After%20the%20first%20model%20call%20on%20a%20given%20domain%2C%20certain%20network%20components%20can%20be%20precomputed%2C%20leading%20to%20low%20inference%20cost%20for%20subsequent%20evaluations%20on%20large%20domains.%20Consequently%2C%20the%20model%20can%20achieve%20faster%20inference%20than%20classical%20interpolation%20methods%20such%20as%20radial {"title": "Look Carefully: Adaptive Visual Reinforcements in Multimodal Large Language Models for Hallucination Mitigation", "author": "Xingyu Zhu and Kesen Zhao and Liang Yi and Shuo Wang and Zhicai Wang and Beier Zhu and Hanwang Zhang", "abstract": "Multimodal large language models (MLLMs) have achieved remarkable progress in vision-language reasoning, yet they remain vulnerable to hallucination, where generated content deviates from visual evidence. Existing mitigation strategies either require costly supervision during training or introduce additional latency at inference time. Recent vision enhancement methods attempt to address this issue by reinforcing visual tokens during decoding, but they typically inject all tokens indiscriminately, which causes interference from background regions and distracts the model from critical cues. To overcome this challenge, we propose Adaptive Visual Reinforcement (AIR), a training-free framework for MLLMs. AIR consists of two components. Prototype-based token reduction condenses the large pool of visual tokens into a compact subset to suppress redundancy. OT-guided patch reinforcement quantifies the alignment between hidden states and patch embeddings to selectively integrate the most consistent patches into feed-forward layers. As a result, AIR enhances the model's reliance on salient visual information and effectively mitigates hallucination. Extensive experiments across representative MLLMs demonstrate that AIR substantially reduces hallucination while preserving general capabilities, establishing it as an effective solution for building reliable MLLMs.", "link": "http://arxiv.org/abs/2602.24041v1", "date": "2026-02-27", "relevancy": 1.5656, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5253}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.o tent%20patches%20into%20feed-forward%20layers.%20As%20a%20result%2C%20AIR%20enhances%20the%20model%27s%20reliance%20on%20salient%20visual%20information%20and%20effectively%20mitigates%20hallucination.%20Extensive%20experiments%20across%20representative%20MLLMs%20demonstrate%20that%20AIR%20substantially%20reduces%20hallucination%20while%20preserving%20general%20capabilities%2C%20establishing%20it%20as%20an%20effective%20solution%20for%20building%20reliable%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24041v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLook%2520Carefully%253A%2520Adaptive%2520Visual%2520Reinforcements%2520in%2520Multimodal%2520Large%2520Language%2520Models%2520for%2520Hallucination%2520Mitigation%26entry.906535625%3DXingyu%2520Zhu%2520and%2520Kesen%2520Zhao%2520and%2520Liang%2520Yi%2520and%2520Shuo%2520Wang%2520and%2520Zhicai%2520Wang%2520and%2520Beier%2520Zhu%2520and%2520Hanwang%2520Zhang%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520in%2520vision-language%2520reasoning%252C%2520yet%2520they%2520remain%2520vulnerable%2520to%2520hallucination%252C%2520where%2520generated%2520content%2520deviates%2520from%2520visual%2520evidence.%2520Existing%2520mitigation%2520strategies%2520either%2520require%2520costly%2520supervision%2520during%2520training%2520or%2520introduce%2520additional%2520latency%2520at%2520inference%2520time.%2520Recent%2520vision%2520enhancement%2520methods%2520attempt%2520to%2520address%2520this%2520issue%2520by%2520reinforcing%2520visual%2520tokens%2520during%2520decoding%252C%2520but%2520they%2520typically%2520inject%2520all%2520tokens%2520indiscriminately%252C%2520which%2520causes%2520interference%2520from%2520background%2520regions%2520and%2520distracts%2520the%2520model%2520from%2520critical%2520cues.%2520To%2520overcome%2520this%2520challenge%252 {"title": "CoMind: Towards Community-Driven Agents for Machine Learning Engineering", "author": "Sijie Li and Weiwei Sun and Shanda Li and Ameet Talwalkar and Yiming Yang", "abstract": "Large language model (LLM) agents show promise in automating machine learning (ML) engineering. However, existing agents typically operate in isolation on a given research problem, without engaging with the broader research community, where human researchers often gain insights and contribute by sharing knowledge. To bridge this gap, we introduce MLE-Live, a live evaluation framework designed to assess an agent's ability to communicate with and leverage collective knowledge from a simulated Kaggle research community. Building on this framework, we propose CoMind, a multi-agent system designed to systematically leverage external knowledge. CoMind employs an iterative parallel exploration mechanism, developing multiple solutions simultaneously to balance exploratory breadth with implementation depth. On 75 past Kaggle competitions within our MLE-Live framework, CoMind achieves a 36% medal rate, establishing a new state of the art. Critically, when deployed in eight live, ongoing competitions, CoMind outperforms 92.6% of human competitors on average, placing in the top 5% on three official leaderboards and the top 1% on one.", "link": "http://arxiv.org/abs/2506.20640v3", "date": "2026-02-27", "relevancy": 2.0079, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5044}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5042}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4988}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoMind%3A%20Towards%20Commu 0official%20leaderboards%20and%20the%20top%201%25%20on%20one.&entry.1838667208=http%3A//arxiv.org/abs/2506.20640v3&entry.124074799=Read"},
{"title": "Green or Fast? Learning to Balance Cold Starts and Idle Carbon in Serverless Computing", "author": "Bowen Sun and Christos D. Antonopoulos and Evgenia Smirni and Bin Ren and Nikolaos Bellas and Spyros Lalis", "abstract": "Serverless computing simplifies cloud deployment but introduces new challenges in managing service latency and carbon emissions. Reducing cold-start latency requires retaining warm function instances, while minimizing carbon emissions favors reclaiming idle resources. This balance is further complicated by time-varying grid carbon intensity and varying workload patterns, under which static keep-alive policies are inefficient. We present LACE-RL, a latency-aware and carbon-efficient management framework that formulates serverless pod retention as a sequential decision problem. LACE-RL uses deep reinforcement learning to dynamically tune keep-alive durations, jointly modeling cold-start probability, function-specific latency costs, and real-time carbon intensity. Using the Huawei Public Cloud Trace, we show that LACE-RL reduces cold starts by 51.69% and idle keep-alive carbon emissions by 77.08% compared to Huawei's static policy, while achieving better latency-carbon trade-offs than state-of-the-art heuristic and single-objective baselines, approaching Oracle performance.", "link": "http://arxiv.org/abs/2602.23935v1", "date": "2026-02-27", "relevancy": 1.9297, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.3977}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.3941}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.366}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Green%20or%20Fast%3F%20Learning%20to%20Balance%20Cold%20Starts%20and%20I {"title": "The Sample Complexity of Online Reinforcement Learning: A Multi-model Perspective", "author": "Michael Muehlebach and Zhiyu He and Michael I. Jordan", "abstract": "We study the sample complexity of online reinforcement learning in the general \\hzyrev{non-episodic} setting of nonlinear dynamical systems with continuous state and action spaces. Our analysis accommodates a large class of dynamical systems ranging from a finite set of nonlinear candidate models to models with bounded and Lipschitz continuous dynamics, to systems that are parametrized by a compact and real-valued set of parameters. In the most general setting, our algorithm achieves a policy regret of $\\mathcal{O}(N \u03b5^2 + d_\\mathrm{u}\\mathrm{ln}(m(\u03b5))/\u03b5^2)$, where $N$ is the time horizon, $\u03b5$ is a user-specified discretization width, $d_\\mathrm{u}$ the input dimension, and $m(\u03b5)$ measures the complexity of the function class under consideration via its packing number. In the special case where the dynamics are parametrized by a compact and real-valued set of parameters (such as neural networks, transformers, etc.), we prove a policy regret of $\\mathcal{O}(\\sqrt{d_\\mathrm{u}N p})$, where $p$ denotes the number of parameters, recovering earlier sample-complexity results that were derived for linear time-invariant dynamical systems. While this article focuses on characterizing sample complexity, the proposed algorithms are likely to be useful in practice, due to their simplicity, their ability to incorporate prior knowledge, and their benign transient behaviors.", "link": "http://arxiv.org/abs/2501.15910v3", "date": "2026-02-27", "relevancy": 1.7832, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4842}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.the       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

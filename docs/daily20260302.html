bilities%20in%20Mathematics&entry.906535625=Antoine%20Peyronnet%20and%20Fabian%20Gloeckle%20and%20Amaury%20Hayat&entry.1292438233=We%20present%20a%20new%20approach%20for%20benchmarking%20Large%20Language%20Model%20%28LLM%29%20capabilities%20on%20research-level%20mathematics.%20Existing%20benchmarks%20largely%20rely%20on%20static%2C%20hand-curated%20sets%20of%20contest%20or%20textbook-style%20problems%20as%20proxies%20for%20mathematical%20research.%20Instead%2C%20we%20establish%20an%20updatable%20benchmark%20evaluating%20models%20directly%20on%20the%20latest%20research%20results%20in%20mathematics.%20This%20consists%20of%20an%20automatic%20pipeline%20that%20extracts%20lemmas%20from%20arXiv%20and%20rewrites%20them%20into%20self-contained%20statements%20by%20making%20all%20assumptions%20and%20required%20definitions%20explicit.%20It%20results%20in%20a%20benchmark%20that%20can%20be%20updated%20regularly%20with%20new%20problems%20taken%20directly%20from%20human%20mathematical%20research%2C%20while%20previous%20instances%20can%20be%20used%20for%20training%20without%20compromising%20future%20evaluations.%20We%20benchmark%20current%20state-of-the-art%20LLMs%2C%20which%20obtain%20around%2010-15%24%5C%25%24%20accuracy%20in%20theorem%20proving%20%28pass%401%29%20depending%20on%20the%20model%2C%20showing%20that%20there%20is%20currently%20a%20large%20margin%20of%20progression%20for%20LLMs%20to%20reach%20human-level%20proving%20capabilities%20in%20a%20research%20context.&entry.1838667208=http%3A//arxiv.org/abs/2602.24173v1&entry.124074799=Read"},
{"title": "SegMate: Asymmetric Attention-Based Lightweight Architecture for Efficient Multi-Organ Segmentation", "author": "Andrei-Alexandru Bunea and Dan-Matei Popovici and Radu Tudor Ionescu", "abstract": "State-of-the-art models for medical image segmentation achieve excellent accuracy but require substantial computational resources, limiting deployment in resource-constrained clinical settings. We present SegMate, an efficient 2.5D framework that achieves state-of-the-art accuracy, while considerably reducing computational requirements. Our efficient design is the result of meticulously integrating asymmetric architectures, attention mechanisms, multi-scale feature fusion, slice-based positional conditioning, and multi-task optimization. We demonstrate the efficiency-accuracy trade-off of our framework across three modern backbones (EfficientNetV2-M, MambaOut-Tiny, FastViT-T12). We perform experiments on three datasets: TotalSegmentator, SegTHOR and AMOS22. Compared with the vanilla models, SegMate reduces computation (GFLOPs) by up to 2.5x and memory footprint (VRAM) by up to 2.1x, while generally registering performance gains of around 1%. On TotalSegmentator, we achieve a Dice score of 93.51% with only 295MB peak GPU memory. Zero-shot cross-dataset evaluations on SegTHOR and AMOS22 demonstrate strong generalization, with Dice scores of up to 86.85% and 89.35%, respectively. We release our open-source code at https://github.com/andreibunea99/SegMate.", "link": "http://arxiv.org/abs/2602.23903v1", "date": "2026-02-27", "relevancy": 2.2078, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5557}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5548}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SegMate%3A%20Asymmetric%20Attention-Based%20Lightweight%20Architecture%20for%20Efficient%20Multi-Organ%20Segmentation&body=Title%3A%20SegMate%3A%20Asymmetric%20Attention-Based%20Lightweight%20Architecture%20for%20Efficient%20Multi-Organ%20Segmentation%0AAuthor%3A%20Andrei-Alexandru%20Bunea%20and%20Dan-Matei%20Popovici%20and%20Radu%20Tudor%20Ionescu%0AAbstract%3A%20State-of-the-art%20models%20for%20medical%20image%20segmentation%20achieve%20excellent%20accuracy%20but%20require%20substantial%20computational%20resources%2C%20limiting%20deployment%20in%20resource-constrained%20clinical%20settings.%20We%20present%20SegMate%2C%20an%20efficient%202.5D%20framework%20that%20achieves%20state-of-the-art%20accuracy%2C%20while%20considerably%20reducing%20computational%20requirements.%20Our%20efficient%20design%20is%20the%20result%20of%20meticulously%20integrating%20asymmetric%20architectures%2C%20attention%20mechanisms%2C%20multi-scale%20feature%20fusion%2C%20slice-based%20positional%20conditioning%2C%20and%20multi-task%20optimization.%20We%20demonstrate%20the%20efficiency-accuracy%20trade-off%20of%20our%20framework%20across%20three%20modern%20backbones%20%28EfficientNetV2-M%2C%20MambaOut-Tiny%2C%20FastViT-T12%29.%20We%20perform%20experiments%20on%20three%20datasets%3A%20TotalSegmentator%2C%20SegTHOR%20and%20AMOS22.%20Compared%20with%20the%20vanilla%20models%2C%20SegMate%20reduces%20computation%20%28GFLOPs%29%20by%20up%20to%202.5x%20and%20memory%20footprint%20%28VRAM%29%20by%20up%20to%202.1x%2C%20while%20generally%20registering%20performance%20gains%20of%20around%201%25.%20On%20TotalSegmentator%2C%20we%20achieve%20a%20Dice%20score%20of%2093.51%25%20with%20only%20295MB%20peak%20GPU%20memory.%20Zero-shot%20cross-dataset%20evaluations%20on%20SegTHOR%20and%20AMOS22%20demonstrate%20strong%20generalization%2C%20with%20Dice%20scores%20of%20up%20to%2086.85%25%20and%2089.35%25%2C%20respectively.%20We%20release%20our%20open-source%20code%20at%20https%3A//github.com/andreibunea99/SegMate.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23903v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSegMate%253A%2520Asymmetric%2520Attention-Based%2520Lightweight%2520Architecture%2520for%2520Efficient%2520Multi-Organ%2520Segmentation%26entry.906535625%3DAndrei-Alexandru%2520Bunea%2520and%2520Dan-Matei%2520Popovici%2520and%2520Radu%2520Tudor%2520Ionescu%26entry.1292438233%3DState-of-the-art%2520models%2520for%2520medical%2520image%2520segmentation%2520achieve%2520excellent%2520accuracy%2520but%2520require%2520substantial%2520computational%2520resources%252C%2520limiting%2520deployment%2520in%2520resource-constrained%2520clinical%2520settings.%2520We%2520present%2520SegMate%252C%2520an%2520efficient%25202.5D%2520framework%2520that%2520achieves%2520state-of-the-art%2520accuracy%252C%2520while%2520considerably%2520reducing%2520computational%2520requirements.%2520Our%2520efficient%2520design%2520is%2520the%2520result%2520of%2520meticulously%2520integrating%2520asymmetric%2520architectures%252C%2520attention%2520mechanisms%252C%2520multi-scale%2520feature%2520fusion%252C%2520slice-based%2520positional%2520conditioning%252C%2520and%2520multi-task%2520optimization.%2520We%2520demonstrate%2520the%2520efficiency-accuracy%2520trade-off%2520of%2520our%2520framework%2520across%2520three%2520modern%2520backbones%2520%2528EfficientNetV2-M%252C%2520MambaOut-Tiny%252C%2520FastViT-T12%2529.%2520We%2520perform%2520experiments%2520on%2520three%2520datasets%253A%2520TotalSegmentator%252C%2520SegTHOR%2520and%2520AMOS22.%2520Compared%2520with%2520the%2520vanilla%2520models%252C%2520SegMate%2520reduces%2520computation%2520%2528GFLOPs%2529%2520by%2520up%2520to%25202.5x%2520and%2520memory%2520footprint%2520%2528VRAM%2529%2520by%2520up%2520to%25202.1x%252C%2520while%2520generally%2520registering% {"title": "DACESR: Degradation-Aware Conditional Embedding for Real-World Image Super-Resolution", "author": "Xiaoyan Lei and Wenlong Zhang and Biao Luo and Hui Liang and Weifeng Cao and Qiuting Lin", "abstract": "Multimodal large models have shown excellent ability in addressing image super-resolution in real-world scenarios by leveraging language class as condition information, yet their abilities in degraded images remain limited. In this paper, we first revisit the capabilities of the Recognize Anything Model (RAM) for degraded images by calculating text similarity. We find that directly using contrastive learning to fine-tune RAM in the degraded space is difficult to achieve acceptable results. To address this issue, we employ a degradation selection strategy to propose a Real Embedding Extractor (REE), which achieves significant recognition performance gain on degraded image content through contrastive learning. Furthermore, we use a Conditional Feature Modulator (CFM) to incorporate the high-level information of REE for a powerful Mamba-based network, which can leverage effective pixel information to restore image textures and produce visually pleasing results. Extensive experiments demonstrate that the REE can effectively help image super-resolution networks balance fidelity and perceptual quality, highlighting the great potential of Mamba in real-world applications. The source code of this work will be made publicly available at: https://github.com/nathan66666/DACESR.git", "link": "http://arxiv.org/abs/2602.23890v1", "date": "2026-02-27", "relevancy": 2.1997, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5968}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5422}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understandin 20Mamba%20in%20real-world%20applications.%20The%20source%20code%20of%20this%20work%20will%20be%20made%20publicly%20available%20at%3A%20https%3A//github.com/nathan66666/DACESR.git%0ALink%3A%20http%3A//arxiv.org/abs/2602.23890v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDACESR%253A%2520Degradation-Aware%2520Conditional%2520Embedding%2520for%2520Real-World%2520Image%2520Super-Resolution%26entry.906535625%3DXiaoyan%2520Lei%2520and%2520Wenlong%2520Zhang%2520and%2520Biao%2520Luo%2520and%2520Hui%2520Liang%2520and%2520Weifeng%2520Cao%2520and%2520Qiuting%2520Lin%26entry.1292438233%3DMultimodal%2520large%2520models%2520have%2520shown%2520excellent%2520ability%2520in%2520addressing%2520image%2520super-resolution%2520in%2520real-world%2520scenarios%2520by%2520leveraging%2520language%2520class%2520as%2520condition%2520information%252C%2520yet%2520their%2520abilities%2520in%2520degraded%2520images%2520remain%2520limited.%2520In%2520this%2520paper%252C%2520we%2520first%2520revisit%2520the%2520capabilities%2520of%2520the%2520Recognize%2520Anything%2520Model%2520%2528RAM%2529%2520for%2520degraded%2520images%2520by%2520calculating%2520text%2520similarity.%2520We%2520find%2520that%2520directly%2520using%2520contrastive%2520learning%2520to%2520fine-tune%2520RAM%2520in%2520the%2520degraded%2520space%2520is%2520difficult%2520to%2520achieve%2520acceptable%2520results.%2520To%2520address%2520this%2520issue%252C%2520we%2520employ%2520a%2520degradation%2520selection%2520strategy%2520to%2520propose%2520a%2520Real%2520Embedding%2520Extractor%2520%2528REE%2529%252C%2520which%2520achieves%2520significant%2520recognition%2520performance%2520gain%2520on%2520degraded%2520image%2520content%2520through%2520contrastive%2520learning.%2520Furthermore%252C%2520we%2520use%2520a%2520Conditional%2520Feature%2520Modulator%2520%2528CFM%2529%2520to%2520incorporate%2520the%2520high-level%2520information%2520of%2520REE%2 {"title": "Learning Robust Control Policies for Inverted Pose on Miniature Blimp Robots", "author": "Yuanlin Yang and Lin Hong and Fumin Zhang", "abstract": "The ability to achieve and maintain inverted poses is essential for unlocking the full agility of miniature blimp robots (MBRs). However, developing reliable control methods for MBRs remains challenging due to their complex and underactuated dynamics. To address this challenge, we propose a novel framework that enables robust control policy learning for inverted pose on MBRs. The proposed framework operates through three core stages: First, a high-fidelity three-dimensional (3D) simulation environment was constructed, which was calibrated against real-world MBR motion data to ensure accurate replication of inverted-state dynamics. Second, a robust policy for MBR inverted control was trained within the simulation environment via a domain randomization strategy and a modified Twin Delayed Deep Deterministic Policy Gradient (TD3) algorithm. Third, a mapping layer was designed to bridge the sim-to-real gap for the learned policy deployment. Comprehensive evaluations in the simulation environment demonstrate that the learned policy achieves a higher success rate compared to the energy-shaping controller. Furthermore, experimental results confirm that the learned policy with a mapping layer enables an MBR to achieve and maintain a fully upside-down pose in real-world settings.", "link": "http://arxiv.org/abs/2602.23972v1", "date": "2026-02-27", "relevancy": 2.1961, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5682}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5513}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5391}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Robust%20Control%20Policies%20for%20Inverted%20Pose%20on%20Miniature%20Blimp%20Robots&body=Title%3A%20Learning%20Robust%20Control%20Policies%20for%20Inverted%20Pose%20on%20Miniature%20Blimp%20Robots%0AAuthor%3A%20Yuanlin%20Yang%20and%20Lin%20Hong%20and%20Fumin%20Zhang%0AAbstract%3A%20The%20ability%20to%20achieve%20and%20maintain%20inverted%20poses%20is%20essential%20for%20unlocking%20the%20full%20agility%20of%20miniature%20blimp%20robots%20%28MBRs%29.%20However%2C%20developing%20reliable%20control%20methods%20for%20MBRs%20remains%20challenging%20due%20to%20their%20complex%20and%20underactuated%20dynamics.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20framework%20that%20enables%20robust%20control%20policy%20learning%20for%20inverted%20pose%20on%20MBRs.%20The%20proposed%20framework%20operates%20through%20three%20core%20stages%3A%20First%2C%20a%20high-fidelity%20three-dimensional%20%283D%29%20simulation%20environment%20was%20constructed%2C%20which%20was%20calibrated%20against%20real-world%20MBR%20motion%20data%20to%20ensure%20accurate%20replication%20of%20inverted-state%20dynamics.%20Second%2C%20a%20robust%20policy%20for%20MBR%20inverted%20control%20was%20trained%20within%20the%20simulation%20environment%20via%20a%20domain%20randomization%20strategy%20and%20a%20modified%20Twin%20Delayed%20Deep%20Deterministic%20Policy%20Gradient%20%28TD3%29%20algorithm.%20Third%2C%20a%20mapping%20layer%20was%20designed%20to%20bridge%20the%20sim-to-real%20gap%20for%20the%20learned%20policy%20deployment.%20Comprehensive%20evaluations%20in%20the%20simulation%20environment%20demonstrate%20that%20the%20learned%20policy%20achieves%20a%20higher%20success%20rate%20compared%20to%20the%20energy-shaping%20controller.%20Furthermore%2C%20experimental%20results%20confirm%20that%20the%20learned%20policy%20with%20a%20mapping%20layer%20enables%20an%20MBR%20to%20achieve%20and%20maintain%20a%20fully%20upside-down%20pose%20in%20real-world%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23972v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Robust%2520Control%2520Policies%2520for%2520Inverted%2520Pose%2520on%2520Miniature%2520Blimp%2520Robots%26entry.906535625%3DYuanlin%2520Yang%2520and%2520Lin%2520Hong%2520and%2520Fumin%2520Zhang%26entry.1292438233%3DThe%2520ability%2520to%2520achieve%2520and%2520maintain%2520inverted%2520poses%2520is%2520essential%2520for%2520unlocking%2520the%2520full%2520agility%2520of%2520miniature%2520blimp%2520robots%2520%2528MBRs%2529.%2520However%252C%2520developing%2520reliable%2520control%2520methods%2520for%2520MBRs%2520remains%2520challenging%2520due%2520to%2520their%2520complex%2520and%2520underactuated%2520dynamics.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520a%2520novel%2520framework%2520that%2520enables%2520robust%2520control%2520policy%2520learning%2520for%2520inverted%2520pose%2520on%2520MBRs.%2520The%2520proposed%2520framework%2520operates%2520through%2520three%2520core%2520stages%253A%2520First%252C%2520a%2520high-fidelity%2520three-dimensional%2520%25283D%2529%2520simulation%2520environment%2520was%2520constructed%252C%2520which%2520was%2520calibrated%2520against%2520real-world%2520MBR%2520motion%2520data%2520to%2520ensure%2520accurate%2520replication%2520of%2520inverted-state%2520dynamics.%2520Second%252C%2520a%2520robust%2520policy%2520for%2520MBR%2520inverted%2520control%2520was%2520trained%2520within%2520the%2520simulation%2520environment%2520via%2520a%2520domain%2520randomization%2520strategy%2520and%2520a%2520modified%2520Twin%2520Delayed%2520Deep%2520Deterministic%2520Policy%2520Gradient%2520%2528TD3%2529%2520algorithm.%2520Third%252C%2520a%2520mapping%2520layer%2520was%2520designed%2520to%2520bridge%2520the%2520sim-to-real%2520gap%2520for%2520the%2520learned%2520policy%2520deployment.%252 {"title": "SelvaBox: A high-resolution dataset for tropical tree crown detection", "author": "Hugo Baudchon and Arthur Ouaknine and Martin Weiss and M\u00e9lisande Teng and Thomas R. Walla and Antoine Caron-Guay and Christopher Pal and Etienne Lalibert\u00e9", "abstract": "Detecting individual tree crowns in tropical forests is essential to study these complex and crucial ecosystems impacted by human interventions and climate change. However, tropical crowns vary widely in size, structure, and pattern and are largely overlapping and intertwined, requiring advanced remote sensing methods applied to high-resolution imagery. Despite growing interest in tropical tree crown detection, annotated datasets remain scarce, hindering robust model development. We introduce SelvaBox, the largest open-access dataset for tropical tree crown detection in high-resolution drone imagery. It spans three countries and contains more than 83,000 manually labeled crowns - an order of magnitude larger than all previous tropical forest datasets combined. Extensive benchmarks on SelvaBox reveal two key findings: (1) higher-resolution inputs consistently boost detection accuracy; and (2) models trained exclusively on SelvaBox achieve competitive zero-shot detection performance on unseen tropical tree crown datasets, matching or exceeding competing methods. Furthermore, jointly training on SelvaBox and three other datasets at resolutions from 3 to 10 cm per pixel within a unified multi-resolution pipeline yields a detector ranking first or second across all evaluated datasets. Our dataset, code, and pre-trained weights are made public.", "link": "http://arxiv.org/abs/2507.00170v2", "date": "2026-02-27", "relevancy": 2.1929, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.44}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4386}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4372}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SelvaBox%3A%20A%20high-resolution%20dataset%20for%20tropical%20tree%20crown%20detection&body=Title%3A%20SelvaBox%3A%20A%20high-resolution%20dataset%20for%20tropical%20tree%20crown%20detection%0AAuthor%3A%20Hugo%20Baudchon%20and%20Arthur%20Ouaknine%20and%20Martin%20Weiss%20and%20M%C3%A9lisande%20Teng%20and%20Thomas%20R.%20Walla%20and%20Antoine%20Caron-Guay%20and%20Christopher%20Pal%20and%20Etienne%20Lalibert%C3%A9%0AAbstract%3A%20Detecting%20individual%20tree%20crowns%20in%20tropical%20forests%20is%20essential%20to%20study%20these%20complex%20and%20crucial%20ecosystems%20impacted%20by%20human%20interventions%20and%20climate%20change.%20However%2C%20tropical%20crowns%20vary%20widely%20in%20size%2C%20structure%2C%20and%20pattern%20and%20are%20largely%20overlapping%20and%20intertwined%2C%20requiring%20advanced%20remote%20sensing%20methods%20applied%20to%20high-resolution%20imagery.%20Despite%20growing%20interest%20in%20tropical%20tree%20crown%20detection%2C%20annotated%20datasets%20remain%20scarce%2C%20hindering%20robust%20model%20development.%20We%20introduce%20SelvaBox%2C%20the%20largest%20open-access%20dataset%20for%20tropical%20tree%20crown%20detection%20in%20high-resolution%20drone%20imagery.%20It%20spans%20three%20countries%20and%20contains%20more%20than%2083%2C000%20manually%20labeled%20crowns%20-%20an%20order%20of%20magnitude%20larger%20than%20all%20previous%20tropical%20forest%20datasets%20combined.%20Extensive%20benchmarks%20on%20SelvaBox%20reveal%20two%20key%20findings%3A%20%281%29%20higher-resolution%20inputs%20consistently%20boost%20detection%20accuracy%3B%20and%20%282%29%20models%20trained%20exclusively%20on%20SelvaBox%20achieve%20competitive%20zero-shot%20detection%20performance%20on%20unseen%20tropical%20tree%20crown%20datasets%2C%20matching%20or%20exceeding%20competing%20methods.%20Furthermore%2C%20jointly%20training%20on%20SelvaBox%20and%20three%20other%20datasets%20at%20resolutions%20from%203%20to%2010%20cm%20per%20pixel%20within%20a%20unified%20multi-resolution%20pipeline%20yields%20a%20detector%20ranking%20first%20or%20second%20across%20all%20evaluated%20datasets.%20Our%20dataset%2C%20code%2C%20and%20pre-trained%20weights%20are%20made%20public.%0ALink%3A%20http%3A//arxiv.org/abs/2507.00170v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelvaBox%253A%2520A%2520high-resolution%2520dataset%2520for%2520tropical%2520tree%2520crown%2520detection%26entry.906535625%3DHugo%2520Baudchon%2520and%2520Arthur%2520Ouaknine%2520and%2520Martin%2520Weiss%2520and%2520M%25C3%25A9lisande%2520Teng%2520and%2520Thomas%2520R.%2520Walla%2520and%2520Antoine%2520Caron-Guay%2520and%2520Christopher%2520Pal%2520and%2520Etienne%2520Lalibert%25C3%25A9%26entry.1292438233%3DDetecting%2520individual%2520tree%2520crowns%2520in%2520tropical%2520forests%2520is%2520essential%2520to%2520study%2520these%2520complex%2520and%2520crucial%2520ecosystems%2520impacted%2520by%2520human%2520interventions%2520and%2520climate%2520change.%2520However%252C%2520tropical%2520crowns%2520vary%2520widely%2520in%2520size%252C%2520structure%252C%2520and%2520pattern%2520and%2520are%2520largely%2520overlapping%2520and%2520intertwined%252C%2520requiring%2520advanced%2520remote%2520sensing%2520methods%2520applied%2520to%2520high-resolution%2520imagery.%2520Despite%2520growing%2520interest%2520in%2520tropical%2520tree%2520crown%2520detection%252C%2520annotated%2520datasets%2520remain%2520scarce%252C%2520hindering%2520robust%2520model%2520development.%2520We%2520introduce%2520SelvaBox%252C%2520the%2520largest%2520open-access%2520dataset%2520for%2520tropical%2520tree%2520crown%2520de {"title": "COOPERTRIM: Adaptive Data Selection for Uncertainty-Aware Cooperative Perception", "author": "Shilpa Mukhopadhyay and Amit Roy-Chowdhury and Hang Qiu", "abstract": "Cooperative perception enables autonomous agents to share encoded representations over wireless communication to enhance each other's live situational awareness. However, the tension between the limited communication bandwidth and the rich sensor information hinders its practical deployment. Recent studies have explored selection strategies that share only a subset of features per frame while striving to keep the performance on par. Nevertheless, the bandwidth requirement still stresses current wireless technologies. To fundamentally ease the tension, we take a proactive approach, exploiting the temporal continuity to identify features that capture environment dynamics, while avoiding repetitive and redundant transmission of static information. By incorporating temporal awareness, agents are empowered to dynamically adapt the sharing quantity according to environment complexity. We instantiate this intuition into an adaptive selection framework, COOPERTRIM, which introduces a novel conformal temporal uncertainty metric to gauge feature relevance, and a data-driven mechanism to dynamically determine the sharing quantity. To evaluate COOPERTRIM, we take semantic segmentation and 3D detection as example tasks. Across multiple open-source cooperative segmentation and detection models, COOPERTRIM achieves up to 80.28% and 72.52% bandwidth reduction respectively while maintaining a comparable accuracy. Relative to other selection strategies, COOPERTRIM also improves IoU by as much as 45.54% with up to 72% less bandwidth. Combined with compression strategies, COOPERTRIM can further reduce bandwidth usage to as low as 1.46% without compromising IoU performance. Qualitative results show COOPERTRIM gracefully adapts to environmental dynamics, localization error, and communication latency, demonstrating flexibility and paving the way for real-world deployment.", "link": "http://arxiv.org/abs/2602.13287v3", "date": "2026-02-27", "relevancy": 2.1845, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.553}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5473}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5261}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20COOPERTRIM%3A%20Adaptive%20Data%20Selection%20for%20Uncertainty-Aware%20Cooperative%20Perception&body=Title%3A%20COOPERTRIM%3A%20Adaptive%20Data%20Selection%20for%20Uncertainty-Aware%20Cooperative%20Perception%0AAuthor%3A%20Shilpa%20Mukhopadhyay%20and%20Amit%20Roy-Chowdhury%20and%20Hang%20Qiu%0AAbstract%3A%20Cooperative%20perception%20enables%20autonomous%20agents%20to%20share%20encoded%20representations%20over%20wireless%20communication%20to%20enhance%20each%20other%27s%20live%20situational%20awareness.%20However%2C%20the%20tension%20between%20the%20limited%20communication%20bandwidth%20and%20the%20rich%20sensor%20information%20hinders%20its%20practical%20deployment.%20Recent%20studies%20have%20explored%20selection%20strategies%20that%20share%20only%20a%20subset%20of%20features%20per%20frame%20while%20striving%20to%20keep%20the%20performance%20on%20par.%20Nevertheless%2C%20the%20bandwidth%20requirement%20still%20stresses%20current%20wireless%20technologies.%20To%20fundamentally%20ease%20the%20tension%2C%20we%20take%20a%20proactive%20approach%2C%20exploiting%20the%20temporal%20continuity%20to%20identify%20features%20that%20capture%20environment%20dynamics%2C%20while%20avoiding%20repetitive%20and%20redundant%20transmission%20of%20static%20information.%20By%20incorporating%20temporal%20awareness%2C%20agents%20are%20empowered%20to%20dynamically%20adapt%20the%20sharing%20quantity%20according%20to%20environment%20complexity.%20We%20instantiate%20this%20intuition%20into%20an%20adaptive%20selection%20framework%2C%20COOPERTRIM%2C%20which%20introduces%20a%20novel%20conformal%20temporal%20uncertainty%20metric%20to%20gauge%20feature%20relevance%2C%20and%20a%20data-driven%20mechanism%20to%20dynamically%20determine%20the%20sharing%20quantity.%20To%20evaluate%20COOPERTRIM%2C%20we%20take%20semantic%20segmentation%20and%203D%20detection%20as%20example%20tasks.%20Across%20multiple%20open-source%20cooperative%20segmentation%20and%20detection%20models%2C%20COOPERTRIM%20achieves%20up%20to%2080.28%25%20and%2072.52%25%20bandwidth%20reduction%20respectively%20while%20maintaining%20a%20comparable%20accuracy.%20Relative%20to%20other%20selection%20strategies%2C%20COOPERTRIM%20also%20improves%20IoU%20by%20as%20much%20as%2045.54%25%20with%20up%20to%2072%25%20less%20bandwidth.%20Combined%20with%20compression%20strategies%2C%20COOPERTRIM%20can%20further%20reduce%20bandwidth%20usage%20to%20as%20low%20as%201.46%25%20without%20compromising%20IoU%20performance.%20Qualitative%20results%20show%20COOPERTRIM%20gracefully%20adapts%20to%20environmental%20dynamics%2C%20localization%20error%2C%20and%20communication%20latency%2C%20demonstrating%20flexibility%20and%20paving%20the%20way%20for%20real-world%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2602.13287v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCOOPERTRIM%253A%2520Adaptive%2520Data%2520Selection%2520for%2520Uncertainty-Aware%2520Cooperative%2520Perception%26entry.906535625%3DShilpa%2520Mukhopadhyay%2520and%2520Amit%2520Roy-Chowdhury%2520and%2520Hang%2520Qiu%26entry.1292438233%3DCooperative%2520perception%2520enables%2520autonomous%2520agents%2520to%2520share%2520encoded%2520representations%2520over%2520wireless%2520communic {"title": "NAU-QMUL: Utilizing BERT and CLIP for Multi-modal AI-Generated Image Detection", "author": "Xiaoyu Guo and Arkaitz Zubiaga", "abstract": "With the aim of detecting AI-generated images and identifying the specific models responsible for their generation, we propose a multi-modal multi-task model. The model leverages pre-trained BERT and CLIP Vision encoders for text and image feature extraction, respectively, and employs cross-modal feature fusion with a tailored multi-task loss function. Additionally, a pseudo-labeling-based data augmentation strategy was utilized to expand the training dataset with high-confidence samples. The model achieved fifth place in both Tasks A and B of the `CT2: AI-Generated Image Detection' competition, with F1 scores of 83.16\\% and 48.88\\%, respectively. These findings highlight the effectiveness of the proposed architecture and its potential for advancing AI-generated content detection in real-world scenarios. The source code for our method is published on https://github.com/xxxxxxxxy/AIGeneratedImageDetection.", "link": "http://arxiv.org/abs/2602.23863v1", "date": "2026-02-27", "relevancy": 2.1775, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5478}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5462}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5412}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NAU-QMUL%3A%20Utilizing%20BERT%20and%20CLIP%20for%20Multi-modal%20AI-Generated%20Image%20Detection&body=Title%3A%20NAU-QMUL%3A%20Utilizing%20BERT%20and%20CLIP%20for%20Multi-modal%20AI-Generated%20Image%20Detection%0AAuthor%3A%20Xiaoyu%20Guo%20and%20Arkaitz%20Zubiaga%0AAbstract%3A%20With%20the%20aim%20of%20detecting%20AI-generated%20images%20and%20identifying%20the%20specific%20models%20responsible%20for%20their%20generation%2C%20we%20propose%20a%20multi-modal%20multi-task%20model.%20The%20model%20leverages%20pre-trained%20BERT%20and%20CLIP%20Vision%20encoders%20for%20text%20and%20image%20feature%20extraction%2C%20respectively%2C%20and%20employs%20cross-modal%20feature%20fusion%20with%20a%20tailored%20multi-task%20loss%20function.%20Additionally%2C%20a%20pseudo-labeling-based%20data%20augmentation%20strategy%20was%20utilized%20to%20expand%20the%20training%20dataset%20with%20high-confidence%20samples.%20The%20model%20achieved%20fifth%20place%20in%20both%20Tasks%20A%20and%20B%20of%20the%20%60CT2%3A%20AI-Generated%20Image%20Detection%27%20competition%2C%20with%20F1%20scores%20of%2083.16%5C%25%20and%2048.88%5C%25%2C%20respectively.%20These%20findings%20highlight%20the%20effectiveness%20of%20the%20proposed%20architecture%20and%20its%20potential%20for%20advancing%20AI-generated%20content%20detection%20in%20real-world%20scenarios.%20The%20source%20code%20for%20our%20method%20is%20published%20on%20https%3A//github.com/xxxxxxxxy/AIGeneratedImageDetection.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23863v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNAU-QMUL%253A%2520Utilizing%2520BERT%2520and%2520CLIP%2520for%2520Multi-modal%2520AI-Generated%2520Image%2520Detection%26entry.906535625%3DXiaoyu%2520Guo%2520and%2520Arkaitz%2520Zubiaga%26entry.1292438233%3DWith%2520the%2520aim%2520of%2520detecting%2520AI-generated%2520images%2520and%2520identifying%2520the%2520specific%2520models%2520responsible%2520for%2520their%2520generation%252C%2520we%2520propose%2520a%2520multi-modal%2520multi-task%2520model.%2520The%2520model%2520leverages%2520pre-trained%2520BERT%2520and%2520CLIP%2520Vision%2520encoders%2520for%2520text%2520and%2520image%2520feature%2520extraction%252C%2520respectively%252C%2520and%2520employs%2520cross-modal%2520f {"title": "Efficient Degradation-agnostic Image Restoration via Channel-Wise Functional Decomposition and Manifold Regularization", "author": "Bin Ren and Yawei Li and Xu Zheng and Yuqian Fu and Danda Pani Paudel and Hong Liu and Ming-Hsuan Yang and Luc Van Gool and Nicu Sebe", "abstract": "Degradation-agnostic image restoration aims to handle diverse corruptions with one unified model, but faces fundamental challenges in balancing efficiency and performance across different degradation types. Existing approaches either sacrifice efficiency for versatility or fail to capture the distinct representational requirements of various degradations. We present MIRAGE, an efficient framework that addresses these challenges through two key innovations. First, we propose a channel-wise functional decomposition that systematically repurposes channel redundancy in attention mechanisms by assigning CNN, attention, and MLP branches to handle local textures, global context, and channel statistics, respectively. This principled decomposition enables degradation-agnostic learning while achieving superior efficiency-performance trade-offs. Second, we introduce manifold regularization that performs cross-layer contrastive alignment in Symmetric Positive Definite (SPD) space, which empirically improves feature consistency and generalization across degradation types. Extensive experiments demonstrate that MIRAGE achieves state-of-the-art performance with remarkable efficiency, outperforming existing methods in various all-in-one IR settings while offering a scalable and generalizable solution for challenging unseen IR scenarios.", "link": "http://arxiv.org/abs/2505.18679v2", "date": "2026-02-27", "relevancy": 2.1764, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5509}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5414}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Degradation-agnostic%20Image%20Restoration%20via%20Channel-Wise%20Functional%20Decomposition%20and%20Manifold%20Regularization&body=Title%3A%20Efficient%20Degradation-agnostic%20Image%20Restoration%20via%20Channel-Wise%20Functional%20Decomposition%20and%20Manifold%20Regularization%0AAuthor%3A%20Bin%20Ren%20and%20Yawei%20Li%20and%20Xu%20Zheng%20and%20Yuqian%20Fu%20and%20Danda%20Pani%20Paudel%20and%20Hong%20Liu%20and%20Ming-Hsuan%20Yang%20and%20Luc%20Van%20Gool%20and%20Nicu%20Sebe%0AAbstract%3A%20Degradation-agnostic%20image%20restoration%20aims%20to%20handle%20diverse%20corruptions%20with%20one%20unified%20model%2C%20but%20faces%20fundamental%20challenges%20in%20balancing%20efficiency%20and%20performance%20across%20different%20degradation%20types.%20Existing%20approaches%20either%20sacrifice%20efficiency%20for%20versatility%20or%20fail%20to%20capture%20the%20distinct%20representational%20requirements%20of%20various%20degradations.%20We%20present%20MIRAGE%2C%20an%20efficient%20framework%20that%20addresses%20these%20challenges%20through%20two%20key%20innovations.%20First%2C%20we%20propose%20a%20channel-wise%20functional%20decomposition%20that%20systematically%20repurposes%20channel%20redundancy%20in%20attention%20mechanisms%20by%20assigning%20CNN%2C%20attention%2C%20and%20MLP%20branches%20to%20handle%20local%20textures%2C%20global%20context%2C%20and%20channel%20statistics%2C%20respectively.%20This%20principled%20decomposition%20enables%20degradation-agnostic%20learning%20while%20achieving%20superior%20efficiency-performance%20trade-offs.%20Second%2C%20we%20introduce%20manifold%20regularization%20that%20performs%20cross-layer%20contrastive%20alignment%20in%20Symmetric%20Positive%20Definite%20%28SPD%29%20space%2C%20which%20empirically%20improves%20feature%20consistency%20and%20generalization%20across%20degradation%20types.%20Extensive%20experiments%20demonstrate%20that%20MIRAGE%20achieves%20state-of-the-art%20performance%20with%20remarkable%20efficiency%2C%20outperforming%20existing%20methods%20in%20various%20all-in-one%20IR%20settings%20while%20offering%20a%20scalable%20and%20generalizable%20solution%20for%20challenging%20unseen%20IR%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2505.18679v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Degradation-agnostic%2520Image%2520Restoration%2520via%2520Channel-Wise%2520Functional%2520Decomposition%2520and%2520Manifold%2520Regularization%26entry.906535625%3DBin%2520Ren%2520and%2520Yawei%2520Li%2520and%2520Xu%2520Zheng%2520and%2520Yuqian%2520Fu%2520and%2520Danda%2520Pani%2520Paudel%2520and%2520Hong%2520Liu%2520and%2520Ming-Hsuan%2520Yang%2520and%2520Luc%2520Van%2520Gool%2520and%2520Nicu%2520Sebe%26entry.1292438233%3DDegradation-agnostic%2520image%2520restoration%2520aims%2520to%2520handle%2520diverse%2520corruptions%2520with%2520one%2520unified%2520model%252C%2520but%2520faces%2520fundamental%2520challenges%2520in%2520balancing%2520efficiency%2520and%2520performance%2520across%2520different%2520degradation%2520types.%2520Existing%2520approaches%2520either%2520sacrifice%2520efficiency%2520for%2520versatility%2520or%2520fail%2520to%2520capture%2520the%2520distinct%2520representational%2520requirements%2520of%2520various%2520degradations.%2520We%2520present%2520MIRAGE%252C%2520an%2520efficient%2520framework%2520that%2520addresses%2520these%2520challenges%2520through%2520two%2520key%2520innovations.%2520First%252C%2520we%2520propose%2520a%2520channel-wise%2520functional%2520decomposition%2520that%2520systematically%2520repurposes%2520channel%2520redundancy%2520in%2520attention%2520mechanisms%2520by%2520assigning%2520CNN%252C%2520attenti ail%20to%20capture%20the%20distinct%20representational%20requirements%20of%20various%20degradations.%20We%20present%20MIRAGE%2C%20an%20efficient%20framework%20that%20addresses%20these%20challenges%20through%20two%20key%20innovations.%20First%2C%20we%20propose%20a%20channel-wise%20functional%20decomposition%20that%20systematically%20repurposes%20channel%20redundancy%20in%20attention%20mechanisms%20by%20assigning%20CNN%2C%20attention%2C%20and%20MLP%20branches%20to%20handle%20local%20textures%2C%20global%20context%2C%20and%20channel%20statistics%2C%20respectively.%20This%20principled%20decomposition%20enables%20degradation-agnostic%20learning%20while%20achieving%20superior%20efficiency-performance%20trade-offs.%20Second%2C%20we%20introduce%20manifold%20regularization%20that%20performs%20cross-layer%20contrastive%20alignment%20in%20Symmetric%20Positive%20Definite%20%28SPD%29%20space%2C%20which%20empirically%20improves%20feature%20consistency%20and%20generalization%20across%20degradation%20types.%20Extensive%20experiments%20demonstrate%20that%20MIRAGE%20achieves%20state-of-the-art%20performance%20with%20remarkable%20efficiency%2C%20outperforming%20existing%20methods%20in%20various%20all-in-one%20IR%20settings%20while%20offering%20a%20scalable%20and%20generalizable%20solution%20for%20challenging%20unseen%20IR%20scenarios.&entry.1838667208=http%3A//arxiv.org/abs/2505.18679v2&entry.124074799=Read"},
{"title": "GFRRN: Explore the Gaps in Single Image Reflection Removal", "author": "Yu Chen and Zewei He and Xingyu Liu and Zixuan Chen and Zheming Lu", "abstract": "Prior dual-stream methods with the feature interaction mechanism have achieved remarkable performance in single image reflection removal (SIRR). However, they often struggle with (1) semantic understanding gap between the features of pre-trained models and those of reflection removal models, and (2) reflection label inconsistencies between synthetic and real-world training data. In this work, we first adopt the parameter efficient fine-tuning (PEFT) strategy by integrating several learnable Mona layers into the pre-trained model to align the training directions. Then, a label generator is designed to unify the reflection labels for both synthetic and real-world data. In addition, a Gaussian-based Adaptive Frequency Learning Block (G-AFLB) is proposed to adaptively learn and fuse the frequency priors, and a Dynamic Agent Attention (DAA) is employed as an alternative to window-based attention by dynamically modeling the significance levels across windows (inter-) and within an individual window (intra-). These components constitute our proposed Gap-Free Reflection Removal Network (GFRRN). Extensive experiments demonstrate the effectiveness of our GFRRN, achieving superior performance against state-of-the-art SIRR methods.", "link": "http://arxiv.org/abs/2602.22695v2", "date": "2026-02-27", "relevancy": 2.1693, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5512}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5395}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5272}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5B l%2520window%2520%2528intra-%2529.%2520These%2520components%2520constitute%2520our%2520proposed%2520Gap-Free%2520Reflection%2520Removal%2520Network%2520%2528GFRRN%2529.%2520Extensive%2520experiments%2520demonstrate%2520the%2520effectiveness%2520of%2520our%2520GFRRN%252C%2520achieving%2520superior%2520performance%2520against%2520state-of-the-art%2520SIRR%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22695v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GFRRN%3A%20Explore%20the%20Gaps%20in%20Single%20Image%20Reflection%20Removal&entry.906535625=Yu%20Chen%20and%20Zewei%20He%20and%20Xingyu%20Liu%20and%20Zixuan%20Chen%20and%20Zheming%20Lu&entry.1292438233=Prior%20dual-stream%20methods%20with%20the%20feature%20interaction%20mechanism%20have%20achieved%20remarkable%20performance%20in%20single%20image%20reflection%20removal%20%28SIRR%29.%20However%2C%20they%20often%20struggle%20with%20%281%29%20semantic%20understanding%20gap%20between%20the%20features%20of%20pre-trained%20models%20and%20those%20of%20reflection%20removal%20models%2C%20and%20%282%29%20reflection%20label%20inconsistencies%20between%20synthetic%20and%20real-world%20training%20data.%20In%20this%20work%2C%20we%20first%20adopt%20the%20parameter%20efficient%20fine-tuning%20%28PEFT%29%20strategy%20by%20integrating%20several%20learnable%20Mona%20layers%20into%20the%20pre-trained%20model%20to%20align%20the%20training%20directions.%20Then%2C%20a%20label%20generator%20is%20designed%20to%20unify%20the%20reflection%20labels%20for%20both%20synthetic%20and%20real-world%20data.%20In%20addition%2C%20a%20Gaussian-based%20Adaptive%20Frequency%20Learning%20Block%20%28G-AFLB%29%20is%20proposed%20to%20adaptively%20learn%20and%20fuse%20the%20frequency%20priors%2C%20and%20a%20Dynamic%20Agent%20Attention%20%28DAA%29%20is%20employed%20as%20an%20alternative%20to%20window-based%20attention%20by%20dynamically%20mod {"title": "AoE: Always-on Egocentric Human Video Collection for Embodied AI", "author": "Bowen Yang and Zishuo Li and Yang Sun and Changtao Miao and Yifan Yang and Man Luo and Xiaotong Yan and Feng Jiang and Jinchuan Shi and Yankai Fu and Ning Chen and Junkai Zhao and Pengwei Wang and Guocai Yao and Shanghang Zhang and Hao Chen and Zhe Li and Kai Zhu", "abstract": "Embodied foundation models require large-scale, high-quality real-world interaction data for pre-training and scaling. However, existing data collection methods suffer from high infrastructure costs, complex hardware dependencies, and limited interaction scope, making scalable expansion challenging. In fact, humans themselves are ideal physically embodied agents. Therefore, obtaining egocentric real-world interaction data from globally distributed \"human agents\" offers advantages of low cost and sustainability. To this end, we propose the Always-on Egocentric (AoE) data collection system, which aims to simplify hardware dependencies by leveraging humans themselves and their smartphones, enabling low-cost, highly efficient, and scene-agnostic real-world interaction data collection to address the challenge of data scarcity. Specifically, we first employ an ergonomic neck-mounted smartphone holder to enable low-barrier, large-scale egocentric data collection through a cloud-edge collaborative architecture. Second, we develop a cross-platform mobile APP that leverages on-device compute for real-time processing, while the cloud hosts automated labeling and filtering pipelines that transform raw videos into high-quality training data. Finally, the AoE system supports distributed Ego video data collection by anyone, anytime, and anywhere. We evaluate AoE on data preprocessing quality and downstream tasks, demonstrating that high-quality egocentric data significantly boosts real-world generalization.", "link": "http://arxiv.org/abs/2602.23893v1", "date": "2026-02-27", "relevancy": 2.1674, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5503}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5457}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5319}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AoE%3A%20Always-on%20Egocentric%20Human%20Video%20Collection%20for%20Embodied%20AI&body=Title%3A%20AoE%3A%20Always-on%20Egocentric%20Human%20Video%20Collection%20for%20Embodied%20AI%0AAuthor%3A%20Bowen%20Yang%20and%20Zishuo%20Li%20and%20Yang%20Sun%20and%20Changtao%20Miao%20and%20Yifan%20Yang%20and%20Man%20Luo%20and%20Xiaotong%20Yan%20and%20Feng%20Jiang%20and%20Jinchuan%20Shi%20and%20Yankai%20Fu%20and%20Ning%20Chen%20and%20Junkai%20Zhao%20and%20Pengwei%20Wang%20and%20Guocai%20Yao%20and%20Shanghang%20Zhang%20and%20Hao%20Chen%20and%20Zhe%20Li%20and%20Kai%20Zhu%0AAbstract%3A%20Embodied%20foundation%20models%20require%20large-scale%2C%20high-quality%20real-world%20interaction%20data%20for%20pre-training%20and%20scaling.%20However%2C%20existing%20data%20collection%20methods%20suffer%20from%20high%20infrastructure%20costs%2C%20complex%20hardware%20dependencies%2C%20and%20limited%20interaction%20scope%2C%20making%20scalable%20expansion%20challenging.%20In%20fact%2C%20humans%20themselves%20are%20ideal%20physically%20embodied%20agents.%20Therefore%2C%20obtaining%20egocentric%20real-world%20interaction%20data%20from%20globally%20distributed%20%22human%20agents%22%20offers%20advantages%20of%20low%20cost%20and%20sustainability.%20To%20this%20end%2C%20we%20propose%20the%20Always-on%20Egocentric%20%28AoE%29%20data%20collection%20system%2C%20which%20aims%20to%20simplify%20hardware%20dependencies%20by%20leveraging%20humans%20themselves%20and%20their%20smartphones%2C%20enabling%20low-cost%2C%20highly%20efficient%2C%20and%20scene-agnostic%20real-world%20interaction%20data%20collection%20to%20address%20the%20challenge%20of%20data%20scarcity.%20Specifically%2C%20we%20first%20employ%20an%20ergonomic%20neck-mounted%20smartphone%20holder%20to%20enable%20low-barrier%2C%20large-scale%20egocentric%20data%20collection%20through%20a%20cloud-edge%20collaborative%20architecture.%20Second%2C%20we%20develop%20a%20cross-platform%20mobile%20APP%20that%20leverages%20on-device%20compute%20for%20real-time%20processing%2C%20while%20the%20cloud%20hosts%20automated%20labeling%20and%20filtering%20pipelines%20that%20transform%20raw%20videos%20into%20high-quality%20training%20data.%20Finally%2C%20the%20AoE%20system%20supports%20distributed%20Ego%20video%20data%20collection%20by%20anyone%2C%20anytime%2C%20and%20anywhere.%20We%20evaluate%20AoE%20on%20data%20preprocessing%20quality%20and%20downstream%20tasks%2C%20demonstrating%20that%20high-quality%20egocentric%20data%20significantly%20boosts%20real-world%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23893v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAoE%253A%2520Always-on%2520Egocentric%2520Human%2520Video%2520Collection%2520for%2520Embodied%2520AI%26entry.906535625%3DBowen%2520Yang%2520and%2520Zishuo%2520Li%2520and%2520Yang%2520Sun%2520and%2520Changtao%2520Miao%2520and%2520Yifan%2520Yang%2520and%2520Man%2520Luo%2520and%2520Xiaotong%2520Yan%2520and%2520Feng%2520Jiang%2520and%2520Jinchuan%2520Shi%2520and%2520Yankai%2520Fu%2520and%2520Ning%2520Chen%2520and%2520Junkai%2520Zhao%2520and%2520Pengwei%2520Wang%2520and%2520Guocai%2520Yao%2520and%2520Shanghang%2520Zhang%2520and%2520Hao%2520Chen%2520and%2520Zhe%2520Li%2520and%2520Kai%2520Zhu%26entry.1292438233%3DEmbodied%2520foundation%2520models%2520require%2520large-scale%2 by%2520anyone%252C%2520anytime%252C%2520and%2520anywhere.%2520We%2520evaluate%2520AoE%2520on%2520data%2520preprocessing%2520quality%2520and%2520downstream%2520tasks%252C%2520demonstrating%2520that%2520high-quality%2520egocentric%2520data%2520significantly%2520boosts%2520real-world%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23893v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AoE%3A%20Always-on%20Egocentric%20Human%20Video%20Collection%20for%20Embodied%20AI&entry.906535625=Bowen%20Yang%20and%20Zishuo%20Li%20and%20Yang%20Sun%20and%20Changtao%20Miao%20and%20Yifan%20Yang%20and%20Man%20Luo%20and%20Xiaotong%20Yan%20and%20Feng%20Jiang%20and%20Jinchuan%20Shi%20and%20Yankai%20Fu%20and%20Ning%20Chen%20and%20Junkai%20Zhao%20and%20Pengwei%20Wang%20and%20Guocai%20Yao%20and%20Shanghang%20Zhang%20and%20Hao%20Chen%20and%20Zhe%20Li%20and%20Kai%20Zhu&entry.1292438233=Embodied%20foundation%20models%20require%20large-scale%2C%20high-quality%20real-world%20interaction%20data%20for%20pre-training%20and%20scaling.%20However%2C%20existing%20data%20collection%20methods%20suffer%20from%20high%20infrastructure%20costs%2C%20complex%20hardware%20dependencies%2C%20and%20limited%20interaction%20scope%2C%20making%20scalable%20expansion%20challenging.%20In%20fact%2C%20humans%20themselves%20are%20ideal%20physically%20embodied%20agents.%20Therefore%2C%20obtaining%20egocentric%20real-world%20interaction%20data%20from%20globally%20distributed%20%22human%20agents%22%20offers%20advantages%20of%20low%20cost%20and%20sustainability.%20To%20this%20end%2C%20we%20propose%20the%20Always-on%20Egocentric%20%28AoE%29%20data%20collection%20system%2C%20which%20aims%20to%20simplify%20hardware%20dependencies%20by%20leveraging%20humans%20themselves%20and%20their%20smartphones%2C%20enabling%20low-cost%2C%20highly%20efficient%2C%20and%20scene-agnostic%20real-world%20interaction%20data%20 {"title": "RewardUQ: A Unified Framework for Uncertainty-Aware Reward Models", "author": "Daniel Yang and Samuel Stante and Florian Redhardt and Lena Libon and Parnian Kassraie and Ido Hakimi and Barna P\u00e1sztor and Andreas Krause", "abstract": "Reward models are central to aligning large language models (LLMs) with human preferences. Yet most approaches rely on pointwise reward estimates that overlook the epistemic uncertainty in reward models arising from limited human feedback. Recent work suggests that quantifying this uncertainty can reduce the costs of human annotation via uncertainty-guided active learning and mitigate reward overoptimization in LLM post-training. However, uncertainty-aware reward models have so far been adopted without thorough comparison, leaving them poorly understood. This work introduces a unified framework, RewardUQ, to systematically evaluate uncertainty quantification for reward models. We compare common methods along standard metrics measuring accuracy and calibration, and we propose a new ranking strategy incorporating both dimensions for a simplified comparison. Our experimental results suggest that model size and initialization have the most meaningful impact on performance, and most prior work could have benefited from alternative design choices. To foster the development and evaluation of new methods and aid the deployment in downstream applications, we release our open-source framework as a Python package. Our code is available at https://github.com/lasgroup/rewarduq.", "link": "http://arxiv.org/abs/2602.24040v1", "date": "2026-02-27", "relevancy": 2.1555, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5966}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5394}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5152}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RewardUQ%3A%20A%20Unified%20Framework%20for%20Uncertainty-Aware%20Reward%20Models&body=Title%3A%20RewardUQ%3A%20A%20Unified%20Framework%20for%20Uncertainty-Aware%20Reward%20Models%0AAuthor%3A%20Daniel%20Yang%20and%20Samuel%20Stante%20and%20Florian%20Redhardt%20and%20Lena%20Libon%20and%20Parnian%20Kassraie%20and%20Ido%20Hakimi%20and%20Barna%20P%C3%A1sztor%20and%20Andreas%20Krause%0AAbstract%3A%20Reward%20models%20are%20central%20to%20aligning%20large%20language%20models%20%28LLMs%29%20with%20human%20preferences.%20Yet%20most%20approaches%20rely%20on%20pointwise%20reward%20estimates%20that%20overlook%20the%20epistemic%20uncertainty%20in%20reward%20models%20arising%20from%20limited%20human%20feedback.%20Recent%20work%20suggests%20that%20quantifying%20this%20uncertainty%20can%20reduce%20the%20costs%20of%20human%20annotation%20via%20uncertainty-guided%20active%20learning%20and%20mitigate%20reward%20overoptimization%20in%20LLM%20post-training.%20However%2C%20uncertainty-aware%20reward%20models%20have%20so%20far%20been%20adopted%20without%20thorough%20comparison%2C%20leaving%20them%20poorly%20understood.%20This%20work%20introduces%20a%20unified%20framework%2C%20RewardUQ%2C%20to%20systematically%20evaluate%20uncertainty%20quantification%20for%20reward%20models.%20We%20compare%20common%20methods%20along%20standard%20metrics%20measuring%20accuracy%20and%20calibration%2C%20and%20we%20propose%20a%20new%20ranking%20strategy%20incorporating%20both%20dimensions%20for%20a%20simplified%20comparison.%20Our%20experimental%20results%20suggest%20that%20model%20size%20and%20initialization%20have%20the%20most%20meaningful%20impact%20on%20performance%2C%20and%20most%20prior%20work%20could%20have%20benefited%20from%20alternative%20design%20choices.%20To%20foster%20the%20development%20and%20evaluation%20of%20new%20methods%20and%20aid%20the%20deployment%20in%20downstream%20applications%2C%20we%20release%20our%20open-source%20framework%20as%20a%20Python%20package.%20Our%20code%20is%20available%20at%20https%3A//github.com/lasgroup/rewarduq.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24040v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRewardUQ%253A%2520A%2520Unified%2520Framework%2520for%2520Uncertainty-Aware%2520Reward%2520Models%26entry.906535625%3DDaniel%2520Yang%2520and%2520Samuel%2520Stante%2520and%2520Florian%2520Redhardt%2520and%2520Lena%2520Libon%2520and%2520Parnian%2520Kassraie%2520and%2520Ido%2520Hakimi%2520and%2520Barna%2520P%25C3%25A1sztor%2520and%2520Andreas%2520Krause%26entry.1292438233%3DReward%2520models%2520are%2520central%2520to%2520aligning%2520large%2520language%2520models%2520%2528LLMs%2529%2520with%2520human%2520preferences.%2520Yet%2520most%2520approaches%2520rely%2520on%2520pointwise%2520reward%2520estimates%2520that%2520overlook%2520the%2520epistemic%2520uncertainty%2520in%2520reward%2520models%2520arising%2520from%2520limited%2520human%2520feedback.%2520Recent%2520work%2520suggests%2520that%2520quantifying%2520this%2520uncertainty%2520can%2520reduce%2520the%2520costs%2520of%2520human%2520annotation%2520via%2520uncertainty-guided%2520active%2520learning%2520and%2520mitigate%2520reward%2520overoptimization%2520in%2520LLM%2520post-training.%2520However%252C%2520uncertainty-aware%2520reward%2520models%2520have%2520so%2520far%2520been%2520adopted%2520without%2520thorough%2520comparison%252C%2520leaving%2520them%2520poorly%2520understood.%2520This%2520work%2520introduces%2520a%2520unified%2520framework%252C%2520RewardUQ%252C%2520to%2520systematically%2520evaluate%2520uncertainty%2520quantification%2520for%2520reward%2520models.%2520We%252 ining.%20However%2C%20uncertainty-aware%20reward%20models%20have%20so%20far%20been%20adopted%20without%20thorough%20comparison%2C%20leaving%20them%20poorly%20understood.%20This%20work%20introduces%20a%20unified%20framework%2C%20RewardUQ%2C%20to%20systematically%20evaluate%20uncertainty%20quantification%20for%20reward%20models.%20We%20compare%20common%20methods%20along%20standard%20metrics%20measuring%20accuracy%20and%20calibration%2C%20and%20we%20propose%20a%20new%20ranking%20strategy%20incorporating%20both%20dimensions%20for%20a%20simplified%20comparison.%20Our%20experimental%20results%20suggest%20that%20model%20size%20and%20initialization%20have%20the%20most%20meaningful%20impact%20on%20performance%2C%20and%20most%20prior%20work%20could%20have%20benefited%20from%20alternative%20design%20choices.%20To%20foster%20the%20development%20and%20evaluation%20of%20new%20methods%20and%20aid%20the%20deployment%20in%20downstream%20applications%2C%20we%20release%20our%20open-source%20framework%20as%20a%20Python%20package.%20Our%20code%20is%20available%20at%20https%3A//github.com/lasgroup/rewarduq.&entry.1838667208=http%3A//arxiv.org/abs/2602.24040v1&entry.124074799=Read"},
{"title": "Ordinal Diffusion Models for Color Fundus Images", "author": "Gustav Schmidt and Philipp Berens and Sarah M\u00fcller", "abstract": "It has been suggested that generative image models such as diffusion models can improve performance on clinically relevant tasks by offering deep learning models supplementary training data. However, most conditional diffusion models treat disease stages as independent classes, ignoring the continuous nature of disease progression. This mismatch is problematic in medical imaging because continuous pathological processes are typically only observed through coarse, discrete but ordered labels as in ophthalmology for diabetic retinopathy (DR). We propose an ordinal latent diffusion model for generating color fundus images that explicitly incorporates the ordered structure of DR severity into the generation process. Instead of categorical conditioning, we used a scalar disease representation, enabling a smooth transition between adjacent stages. We evaluated our approach using visual realism metrics and classification-based clinical consistency analysis on the EyePACS dataset. Compared to a standard conditional diffusion model, our model reduced the Fr\u00e9chet inception distance for four of the five DR stages and increased the quadratic weighted $\u03ba$ from 0.79 to 0.87. Furthermore, interpolation experiments showed that the model captured a continuous spectrum of disease progression learned from ordered, coarse class labels.", "link": "http://arxiv.org/abs/2602.24013v1", "date": "2026-02-27", "relevancy": 1.2183, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.649}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6113}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5671}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ordinal%20Diffusion%20Models%20for%20Color%20Fundus%20Images&body=Title%3A%20Ordinal%20Diffusion%20Models%20for%20Color%20Fundus%20Images%0AAuthor%3A%20Gustav%20Schmidt%20and%20Philipp%20Berens%20and%20Sarah%20M%C3%BCller%0AAbstract%3A%20It%20has%20been%20suggested%20that%20generative%20image%20models%20such%20as%20diffusion%20models%20can%20improve%20performance%20on%20clinically%20relevant%20tasks%20by%20offering%20deep%20learning%20models%20supplementary%20training%20data.%20However%2C%20most%20conditional%20diffusion%20models%20treat%20disease%20stages%20as%20independent%20classes%2C%20ignoring%20the%20continuous%20nature%20of%20disease%20progression.%20This%20mismatch%20is%20problematic%20in%20medical%20imaging%20because%20continuous%20pathological%20processes%20are%20typically%20only%20observed%20through%20coarse%2C%20discrete%20but%20ordered%20labels%20as%20in%20ophthalmology%20for%20diabetic%20retinopathy%20%28DR%29.%20We%20propose%20an%20ordinal%20latent%20diffusion%20model%20for%20generating%20color%20fundus%20images%20that%20explicitly%20incorporates%20the%20ordered%20structure%20of%20DR%20severity%20into%20the%20generation%20process.%20Instead%20of%20categorical%20conditioning%2C%20we%20used%20a%20scalar%20disease%20representation%2C%20enabling%20a%20smooth%20transition%20between%20adjacent%20stages.%20We%20evaluated%20our%20approach%20using%20visual%20realism%20metrics%20and%20classification-based%20clinical%20consistency%20analysis%20on%20the%20EyePACS%20dataset.%20Compared%20to%20a%20standard%20conditional%20diffusion%20model%2C%20our%20model%20reduced%20the%20Fr%C3%A9chet%20inception%20distance%20for%20four%20of%20the%20five%20DR%20stages%20and%20increased%20the%20quadratic%20weighted%20%24%CE%BA%24%20from%200.79%20to%200.87.%20Furthermore%2C%20interpolation%20experiments%20showed%20that%20the%20model%20captured%20a%20continuous%20spectrum%20of%20disease%20progression%20learned%20from%20ordered%2C%20coarse%20class%20labels.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24013v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOrdinal%2520Diffusion%2520Models%2520for%2520Color%2520Fundus%2520Images%26entry.906535625%3DGustav%2520Schmidt%2520and%2520Philipp%2520Berens%2520and%2520Sarah%2520M%25C3%25BCller%26entry.1292438233%3DIt%2520has%2520been%2520suggested%2520that%2520generative%2520image%2520models%2520such%2520as%2520diffusion%2520models%2520can%2520improve%2520performance%2520on%2520clinically%2520relevant%2520tasks%2520by%2520offering%2520deep%2520learning%2520models%2520supplementary%2520training%2520data.%2520However%252C%2520most%2520conditional%2520diffusion%2520models%2520treat%2520disease%2520stages%2520as%2520independent%2520classes%252C%2520ignoring%2520the%2520continuous%2520nature%2520of%2520disease%2520progression.%2520This%2520mismatch%2520is%2520problematic%2520in%2520medical%2520imaging%2520because%2520continuous%2520pathological%2520processes%2520are%2520typically%2520only%2520observed%2520through%2520coarse%252C%2520discrete%2520but%2520ordered%2520labels%2520as%2520in%2520ophthalmology%2520for%2520diabetic%2520retinopathy%2520%2528DR%2529.%2520We%2520propose%2520an%2520ordinal%2520latent%2520diffusion%2520model%2520for%2520generating%2520color%2520fundus%2520images%2520that%2520explicitly%2520incorporates%2520the%2520ordered%2520structure%2520of%2520DR%2520severity%2520into%2520the%2520generation%2520process.%2520Instead%2520of%2520categorical%2520conditioning%252C%2520we%2520used%2520a%2520scalar%2520disease%2520representation%252C%2520enabling%2520a%2520smooth%2520transition%2520between%2520adjacent%2520stages.%2520We%2520evaluated%2520our%2520approach%2520using%2520visual%2520realism%2520metrics%2520and%2520classification-based%2520clinical%2520consistency%2520analysis%2520on%2520the%2520EyeP {"title": "Autoregressive Image Generation with Randomized Parallel Decoding", "author": "Haopeng Li and Jinyue Yang and Guoqi Li and Huan Wang", "abstract": "We introduce ARPG, a novel visual Autoregressive model that enables Randomized Parallel Generation, addressing the inherent limitations of conventional raster-order approaches, which hinder inference efficiency and zero-shot generalization due to their sequential, predefined token generation order. Our key insight is that effective random-order modeling necessitates explicit guidance for determining the position of the next predicted token. To this end, we propose a novel decoupled decoding framework that decouples positional guidance from content representation, encoding them separately as queries and key-value pairs. By directly incorporating this guidance into the causal attention mechanism, our approach enables fully random-order training and generation, eliminating the need for bidirectional attention. Consequently, ARPG readily generalizes to zero-shot tasks such as image in-painting, out-painting, and resolution expansion. Furthermore, it supports parallel inference by concurrently processing multiple queries using a shared KV cache. On the ImageNet-1K 256 benchmark, our approach attains an FID of 1.83 with only 32 sampling steps, achieving over a 30 times speedup in inference and and a 75 percent reduction in memory consumption compared to representative recent autoregressive models at a similar scale.", "link": "http://arxiv.org/abs/2503.10568v5", "date": "2026-02-27", "relevancy": 1.6591, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5648}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.563}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Autoregressive%20Image%20Generation%20with%20Randomized%20Parallel%20Decoding&body=Title%3A%20Autoregressive%20Image%20Generation%20with%20Randomized%20Parallel%20Decoding%0AAuthor%3A%20Haopeng%20Li%20and%20Jinyue%20Yang%20and%20Guoqi%20Li%20and%20Huan%20Wang%0AAbstract%3A%20We%20introduce%20ARPG%2C%20a%20novel%20visual%20Autoregressive%20model%20that%20enables%20Randomized%20Parallel%20Generation%2C%20addressing%20the%20inherent%20limitations%20of%20conventional%20raster-order%20approaches%2C%20which%20hinder%20inference%20efficiency%20and%20zero-shot%20generalization%20due%20to%20their%20sequential%2C%20predefined%20token%20generation%20order.%20Our%20key%20insight%20is%20that%20effective%20random-order%20modeling%20necessitates%20explicit%20guidance%20for%20determining%20the%20position%20of%20the%20next%20predicted%20token.%20To%20this%20end%2C%20we%20propose%20a%20novel%20decoupled%20decoding%20framework%20that%20decouples%20positional%20guidance%20from%20content%20representation%2C%20encoding%20them%20separately%20as%20queries%20and%20key-value%20pairs.%20By%20directly%20incorporating%20this%20guidance%20into%20the%20causal%20attention%20mechanism%2C%20our%20approach%20enables%20fully%20random-order%20training%20and%20generation%2C%20eliminating%20the%20need%20for%20bidirectional%20attention.%20Consequently%2C%20ARPG%20readily%20generalizes%20to%20zero-shot%20tasks%20such%20as%20image%20in-painting%2C%20out-painting%2C%20and%20resolution%20expansion.%20Furthermore%2C%20it%20supports%20parallel%20inference%20by%20concurrently%20processing%20multiple%20queries%20using%20a%20shared%20KV%20cache.%20On%20the%20ImageNet-1K%20256%20benchmark%2C%20our%20approach%20attains%20an%20FID%20of%201.83%20with%20only%2032%20sampling%20steps%2C%20achieving%20over%20a%2030%20times%20speedup%20in%20inference%20and%20and%20a%2075%20percent%20reduction%20in%20memory%20consumption%20compared%20to%20representative%20recent%20autoregressive%20models%20at%20a%20similar%20scale.%0ALink%3A%20http%3A//arxiv.org/abs/2503.10568v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoregressive%2520Image%2520Generation%2520with%2520Randomized%2520Parallel%2520Decoding%26entry.906535625%3DHaopeng%2520Li%2520and%2520Jinyue%2520Yang%2520and%2520Guoqi%2520Li%2520and%2520Huan%2520Wang%26entry.1292438233%3DWe%2520introduce%2520ARPG%252C%2520a%2520novel%2520visual%2520Autoregressive%2520model%2520that%2520enables%2520Randomized%2520Parallel%2520Generation%252C%2520addressing%2520the%2520inherent%2520limitations%2520of%2520conventional%2520raster-order%2520approaches%252C%2520which%2520hinder%2520inference%2520efficiency%2520and%2520zero-shot%2520generalization%2520due%2520to%2520their%2520sequential%252C%2520predefined%2520token%2520generation%2520order.%2520Our%2520key%2520insight%2520is%2520that%2520effective%2520random-order%2520modeling%2520necessitates%2520explicit%2520guidance%2520for%2520determining%2520the%2520position%2520of%2520the%2520next%2520predicted%2520token.%2520To%2520this%2520end%252C%2520we%2520propose%2520a%2520novel%2520decoupled%2520decoding%2520framework%2520that%2520decouples%2520positional%2520guidance%2520from%2520content%2520representation%252C%2520encoding%2520them%2520separately%2520as%2520queries%2520and%2520key-value%2520pairs.%2520By%2520directly%2520incorporating%2520this%2520guidance%2520into%2520the%2520causal%2520attention%2520mechanism%252C%2520our%2520approach%2520enables%2520fully%2520random-order%2520training%2520and%2520generation%252C%2520eliminating%2520the%2520need%2520for%2520bidirectional%2520attention.%2520Consequently%252C%2520ARPG%2520readily%2520generalizes%2520to%2520zero-shot%2520tasks%2520such%2520as%2520image%2520in-painting%252C%2520out-painting%252C%2520and%2520resolution%2520expansion.%2520Furthermo {"title": "LIA: Supervised Fine-Tuning of Large Language Models for Automatic Issue Assignment", "author": "Arsham Khosravani and Alireza Hoseinpour and Arshia Akhavan and Mehdi Keshani and Abbas Heydarnoori", "abstract": "Issue assignment is a critical process in software maintenance, where new issue reports are validated and assigned to suitable developers. However, manual issue assignment is often inconsistent and error-prone, especially in large open-source projects where thousands of new issues are reported monthly. Existing automated approaches have shown promise, but many rely heavily on large volumes of project-specific training data or relational information that is often sparse and noisy, which limits their effectiveness. To address these challenges, we propose LIA (LLM-based Issue Assignment), which employs supervised fine-tuning to adapt an LLM, DeepSeek-R1-Distill-Llama-8B in this work, for automatic issue assignment. By leveraging the LLM's pretrained semantic understanding of natural language and software-related text, LIA learns to generate ranked developer recommendations directly from issue titles and descriptions. The ranking is based on the model's learned understanding of historical issue-to-developer assignments, using patterns from past tasks to infer which developers are most likely to handle new issues. Through comprehensive evaluation, we show that LIA delivers substantial improvements over both its base pretrained model and state-of-the-art baselines. It achieves up to +187.8% higher Hit@1 compared to the DeepSeek-R1-Distill-Llama-8B pretrained base model, and outperforms four leading issue assignment methods by as much as +211.2% in Hit@1 score. These results highlight the effectiveness of domain-adapted LLMs for software maintenance tasks and establish LIA as a practical, high-performing solution for issue assignment.", "link": "http://arxiv.org/abs/2601.01780v2", "date": "2026-02-27", "relevancy": 1.8089, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5062}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4452}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4377}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LIA%3A%20Supervised%20Fine-Tuning%20of%20Large%20Language%20Models%20for%20Automatic%20Issue%20Assignment&body=Title%3A%20LIA%3A%20Supervised%20Fine-Tuning%20of%20Large%20Language%20Models%20for%20Automatic%20Issue%20Assignment%0AAuthor%3A%20Arsham%20Khosravani%20and%20Alireza%20Hoseinpour%20and%20Arshia%20Akhavan%20and%20Mehdi%20Keshani%20and%20Abbas%20Heydarnoori%0AAbstract%3A%20Issue%20assignment%20is%20a%20critical%20process%20in%20software%20maintenance%2C%20where%20new%20issue%20reports%20are%20validated%20and%20assigned%20to%20suitable%20developers.%20However%2C%20manual%20issue%20assignment%20is%20often%20inconsistent%20and%20error-prone%2C%20especially%20in%20large%20open-source%20projects%20where%20thousands%20of%20new%20issues%20are%20reported%20monthly.%20Existing%20automated%20approaches%20have%20shown%20promise%2C%20but%20many%20rely%20heavily%20on%20large%20volumes%20of%20project-specific%20training%20data%20or%20relational%20information%20that%20is%20often%20sparse%20and%20noisy%2C%20which%20limits%20their%20effectiveness.%20To%20address%20these%20challenges%2C%20we%20propose%20LIA%20%28LLM-based%20Issue%20Assignment%29%2C%20which%20employs%20supervised%20fine-tuning%20to%20adapt%20an%20LLM%2C%20DeepSeek-R1-Distill-Llama-8B%20in%20this%20work%2C%20for%20automatic%20issue%20assignment.%20By%20leveraging%20the%20LLM%27s%20pretrained%20semantic%20understanding%20of%20natural%20language%20and%20software-related%20text%2C%20LIA%20learns%20to%20generate%20ranked%20developer%20recommendations%20directly%20from%20issue%20titles%20and%20descriptions.%20The%20ranking%20is%20based%20on%20the%20model%27s%20learned%20understanding%20of%20historical%20issue-to-developer%20assignments%2C%20using%20patterns%20from%20past%20tasks%20to%20infer%20which%20developers%20are%20most%20likely%20to%20handle%20new%20issues.%20Through%20comprehensive%20evaluation%2C%20we%20show%20that%20LIA%20delivers%20substantial%20improvements%20over%20both%20its%20base%20pretrained%20model%20and%20state-of-the-art%20baselines.%20It%20achieves%20up%20to%20%2B187.8%25%20higher%20Hit%401%20compared%20to%20the%20DeepSeek-R1-Distill-Llama-8B%20pretrained%20base%20model%2C%20and%20outperforms%20four%20leading%20issue%20assignment%20methods%20by%20as%20much%20as%20%2B211.2%25%20in%20Hit%401%20score.%20These%20results%20highlight%20the%20effectiveness%20of%20domain-adapted%20LLMs%20for%20software%20maintenance%20tasks%20and%20establish%20LIA%20as%20a%20practical%2C%20high-performing%20solution%20for%20issue%20assignment.%0ALink%3A%20http%3A//arxiv.org/abs/2601.01780v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLIA%253A%2520Supervised%2520Fine-Tuning%2520of%2520Large%2520Language%2520Models%2520for%2520Automatic%2520Issue%2520Assignment%26entry.906535625%3DArsham%2520Khosravani%2520and%2520Alireza%2520Hoseinpour%2520and%2520Arshia%2520Akhavan%2520and%2520Mehdi%2520Keshani%2520and%2520Abbas%2520Heydarnoori%26entry.1292438233%3DIssue%2520assignment%2520is%2520a%2520critical%2520process%2520in%2520software%2520maintenance%252C%2520where%2520new%2520issue%2520reports%2520are%2520validated%2520and%2520assigned%2520to%2520suitable%2520developers.%2520However%252C%2520manual%2520issue%2520assignment%2520is%2520often%2520inconsistent%2520and%2520error-prone%252C%2520especially%2520in%2520large%2520open-source%2520projects%2520where%2520thousands%2520of%2520new%2520issues%2520are%

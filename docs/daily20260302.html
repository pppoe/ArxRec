{"title": "Leveraging Non-linear Dimension Reduction and Random Walk Co-occurrence for Node Embedding", "author": "Ryan DeWolfe", "abstract": "Leveraging non-linear dimension reduction techniques, we remove the low dimension constraint from node embedding and propose COVE, an explainable high dimensional embedding that, when reduced to low dimension with UMAP, slightly increases performance on clustering and link prediction tasks. The embedding is inspired by neural embedding methods that use co-occurrence on a random walk as an indication of similarity, and is closely related to a diffusion process. Extending on recent community detection benchmarks, we find that a COVE UMAP HDBSCAN pipeline performs similarly to the popular Louvain algorithm.", "link": "http://arxiv.org/abs/2602.24069v1", "date": "2026-02-27", "relevancy": 2.3991, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4868}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4828}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4699}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20Non-linear%20Dimension%20Reduction%20and%20Random%20Walk%20Co-occurrence%20for%20Node%20Embedding&body=Title%3A%20Leveraging%20Non-linear%20Dimension%20Reduction%20and%20Random%20Walk%20Co-occurrence%20for%20Node%20Embedding%0AAuthor%3A%20Ryan%20DeWolfe%0AAbstract%3A%20Leveraging%20non-linear%20dimension%20reduction%20techniques%2C%20we%20remove%20the%20low%20dimension%20constraint%20from%20node%20embedding%20and%20propose%20COVE%2C%20an%20explainable%20high%20dimensional%20embedding%20that%2C%20when%20reduced%20to%20low%20dimension%20with%20UMAP%2C%20slightly%20increases%20performance%20on%20clustering%20and%20link%20prediction%20tasks.%20The%20embedding%20is%20inspired%20by%20neural%20embedding%20methods%20that%20use%20co-occurrence%20on%20a%20random%20walk%20as%20an%20indication%20of%20similarity%2C%20and%20is%20closely%20related%20to%20a%20diffusion%20process.%20Extending%20on%20recent%20community%20detection%20benchmarks%2C%20we%20find%20that%20a%20COVE%20UMAP%20HDBSCAN%20pipeline%20performs%20similarly%20to%20the%20popular%20Louvain%20algorithm.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24069v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeveraging%2520Non-linear%2520Dimension%2520Reduction%2520and%2520Random%2520Walk%2520Co-occurrence%2520for%2520Node%2520Embedding%26entry.906535625%3DRyan%2520DeWolfe%26entry.1292438233%3DLeveraging%2520non-linear%2520dimension%2520reduction%2520techniques%252C%2520we%2520remove%2520the%2520low%2520dimension%2520constraint%2520from%2520node%2520embedding%2520and%2520propose%2520COVE%252C%2520an%2520explainable%2520high%2520dimensional%2520embedding%2520that%252C%2520when%2520reduced%2520to%2520low%2520dimension%2520with%2520UMAP%252C%2520slightly%2520increases%2520performance%2520on%2520clustering%2520and%2520link%2520prediction%2520tasks.%2520The%2520embedding%2520is%2520inspired%2520by%2520neural%2520embedding%2520methods%2520that%2520use%2520co-occurrence%2520on%2520a%2520random%2520walk%2520as%2520an%2520indication%2520of%2520similarity%252C%2520and%2520is%2520closely%2520related%2520to%2520a%2520diffusion%2520process.%2520Extending%2520on%2520recent%2520community%2520detection%2520benchmarks%252C%2520we%2520find%2520that%2520a%2520COVE%2520UMAP%2520HDBSCAN%2520pipeline%2520performs%2520similarly%2520to%2520the%2520popular%2520Louvain%2520algorithm.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24069v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms {"title": "Bridging the Performance Gap Between Target-Free and Target-Based Reinforcement Learning", "author": "Th\u00e9o Vincent and Yogesh Tripathi and Tim Faust and Abdullah Akg\u00fcl and Yaniv Oren and Melih Kandemir and Jan Peters and Carlo D'Eramo", "abstract": "The use of target networks in deep reinforcement learning is a widely popular solution to mitigate the brittleness of semi-gradient approaches and stabilize learning. However, target networks notoriously require additional memory and delay the propagation of Bellman updates compared to an ideal target-free approach. In this work, we step out of the binary choice between target-free and target-based algorithms. We introduce a new method that uses a copy of the last linear layer of the online network as a target network, while sharing the remaining parameters with the up-to-date online network. This simple modification enables us to keep the target-free's low-memory footprint while leveraging the target-based literature. We find that combining our approach with the concept of iterated $Q$-learning, which consists of learning consecutive Bellman updates in parallel, helps improve the sample-efficiency of target-free approaches. Our proposed method, iterated Shared $Q$-Learning (iS-QL), bridges the performance gap between target-free and target-based approaches across various problems while using a single $Q$-network, thus stepping towards resource-efficient reinforcement learning algorithms.", "link": "http://arxiv.org/abs/2506.04398v3", "date": "2026-02-27", "relevancy": 2.3969, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4983}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4804}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "simila {"title": "What You Read is What You Classify: Highlighting Attributions to Text and Text-Like Inputs", "author": "Daniel S. Berman and Brian Merritt and Stanley Ta and Dana Udwin and Amanda Ernlund and Jeremy Ratcliff and Vijay Narayan", "abstract": "At present, there are no easily understood explainable artificial intelligence (AI) methods for discrete token inputs, like text. Most explainable AI techniques do not extend well to token sequences, where both local and global features matter, because state-of-the-art models, like transformers, tend to focus on global connections. Therefore, existing explainable AI algorithms fail by (i) identifying disparate tokens of importance, or (ii) assigning a large number of tokens a low value of importance. This method for explainable AI for tokens-based classifiers generalizes a mask-based explainable AI algorithm for images. It starts with an Explainer neural network that is trained to create masks to hide information not relevant for classification. Then, the Hadamard product of the mask and the continuous values of the classifier's embedding layer is taken and passed through the classifier, changing the magnitude of the embedding vector but keeping the orientation unchanged. The Explainer is trained for a taxonomic classifier for nucleotide sequences and it is shown that the masked segments are less relevant to classification than the unmasked ones. This method focused on the importance the token as a whole (i.e., a segment of the input sequence), producing a human-readable explanation.", "link": "http://arxiv.org/abs/2602.24149v1", "date": "2026-02-27", "relevancy": 2.3913, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4813}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4788}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4747}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20You%20Read%20is%20What%20You%20Classify%3A%20Highlighting%20Attributions%20to%20Text%20and%20Text-Like%20Inputs&body=Title%3A%20What%20You%20Read%20is%20What%20You%20Classify%3A%20Highlighting%20Attributions%20to%20Text%20and%20Text-Like%20Inputs%0AAuthor%3A%20Daniel%20S.%20Berman%20and%20Brian%20Merritt%20and%20Stanley%20Ta%20and%20Dana%20Udwin%20and%20Amanda%20Ernlund%20and%20Jeremy%20Ratcliff%20and%20Vijay%20Narayan%0AAbstract%3A%20At%20present%2C%20there%20are%20no%20easily%20understood%20explainable%20artificial%20intelligence%20%28AI%29%20methods%20for%20discrete%20token%20inputs%2C%20like%20text.%20Most%20explainable%20AI%20techniques%20do%20not%20extend%20well%20to%20token%20sequences%2C%20where%20both%20local%20and%20global%20features%20matter%2C%20because%20state-of-the-art%20models%2C%20like%20transformers%2C%20tend%20to%20focus%20on%20global%20connections.%20Therefore%2C%20existing%20explainable%20AI%20algorithms%20fail%20by%20%28i%29%20identifying%20disparate%20tokens%20of%20importance%2C%20or%20%28ii%29%20assigning%20a%20large%20number%20of%20tokens%20a%20low%20value%20of%20importance.%20This%20method%20for%20explainable%20AI%20for%20tokens-based%20classifiers%20generalizes%20a%20mask-based%20explainable%20AI%20algorithm%20for%20images.%20It%20starts%20with%20an%20Explainer%20neural%20network%20that%20is%20trained%20to%20create%20masks%20to%20hide%20information%20not%20relevant%20for%20classification.%20Then%2C%20the%20Hadamard%20product%20of%20the%20mask%20and%20the%20continuous%20values%20of%20the%20classifier%27s%20embedding%20layer%20is%20taken%20and%20passed%20through%20the%20classifier%2C%20changing%20the%20magnitude%20of%20the%20embedding%20vector%20but%20keeping%20the%20orientation%20unchanged.%20The%20Explainer%20is%20trained%20for%20a%20taxonomic%20classifier%20for%20nucleotide%20sequences%20and%20it%20is%20shown%20that%20the%20masked%20segments%20are%20less%20relevant%20to%20classification%20than%20the%20unmasked%20ones.%20This%20method%20focused%20on%20the%20importance%20the%20token%20as%20a%20whole%20%28i.e.%2C%20a%20segment%20of%20the%20input%20sequence%29%2C%20producing%20a%20human-readable%20explanation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24149v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520You%2520Read%2520is%2520What%2520You%2520Classify%253A%2520Highlighting%2520Attributions%2520to%2520Text%2520and%2520Text-Like%2520Inputs%26entry.906535625%3DDaniel%2520S.%2520Berman%2520and%2520Brian%2520Merritt%2520and%2520Stanley%2520Ta%2520and%2520Dana%2520Udwin%2520and%2520Amanda%2520Ernlund%2520and%2520Jeremy%2520Ratcliff%2520and%2520Vijay%2520Narayan%26entry.1292438233%3DAt%2520present%252C%2520there%2520are%2520no%2520easily%2520understood%2520explainable%2520artificial%2520intelligence%2520%2528AI%2529%2520methods%2520for%2520discrete%2520token%2520inputs%252C%2520like%2520text.%2520Most%2520explainable%2520AI%2520techniques%2520do%2520not%2520extend%2520well%2520to%2520token%2520sequences%252C%2520where%2520both%2520local%2520and%2520global%2520features%2520matter%252C%2520because%2520state-of-the-art%2520models%252C%2520like%2520transformers%252C%2520tend%2520to%2520focus%2520on%2520global%2520connections.%2520Therefore%252C%2520existing%2520explainable%2520AI%2520algorithms%2520fail%2520by%2520%2528i%2529%2520identifying%2520disparate%2520tokens%2520of%2520importance%252C%2520or%2520%2528ii%2529%2520assigning%2520a%2520large%2520number%2520of%2520tokens%2520a%2520low%2520value%2520of%2520importance.%2520This%2520method%2520for%2520explainable%2520AI%2520for%2520tokens-based%2520classifiers%2520generalizes%2520a%2520mask-based%2520explainable%2520AI%2520algorithm%2520for%2520images.%2520It%2520starts%2520with%2520an%2520Explain {"title": "Mixed formulation and structure-preserving discretization of Cosserat rod dynamics in a port-Hamiltonian framework", "author": "Philipp L. Kinon and Simon R. Eugster and Peter Betsch", "abstract": "An energy-based modeling framework for the nonlinear dynamics of spatial Cosserat rods undergoing large displacements and rotations is proposed. The mixed formulation features independent displacement, velocity and stress variables and is further objective and locking-free. Finite rotations are represented using a director formulation that avoids singularities and yields a constant mass matrix. This results in an infinite-dimensional nonlinear port-Hamiltonian (PH) system governed by partial differential-algebraic equations with a quadratic energy functional. Using a time-differentiated compliance form of the stress-strain relations allows for the imposition of kinematic constraints, such as inextensibility or shear-rigidity. A structure-preserving finite element discretization leads to a finite-dimensional system with PH structure, thus facilitating the design of an energy-momentum consistent integration scheme. Dissipative material behavior (via the generalized-Maxwell model) and non-standard actuation approaches (via pneumatic chambers or tendons) integrate naturally into the framework. As illustrated by selected numerical examples, the present framework establishes a new approach to energy-momentum consistent formulations in computational mechanics involving finite rotations.", "link": "http://arxiv.org/abs/2512.19408v2", "date": "2026-02-27", "relevancy": 2.3283, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4788}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.461}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4572}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mixed%20formulation%20and%20structure-preserving%20discretization%20of%20Cosserat%20rod%20dynamics%20in%20a%20port-Hamiltonian%20framework&body=Title%3A%20Mixed%20formulation%20and%20structure-preserving%20discretization%20of%20Cosserat%20rod%20dynamics%20in%20a%20port-Hamiltonian%20framework%0AAuthor%3A%20Philipp%20L.%20Kinon%20and%20Simon%20R.%20Eugster%20and%20Peter%20Betsch%0AAbstract%3A%20An%20energy-based%20modeling%20framework%20for%20the%20nonlinear%20dynamics%20of%20spatial%20Cosserat%20rods%20undergoing%20large%20displacements%20and%20rotations%20is%20proposed.%20The%20mixed%20formulation%20features%20independent%20displacement%2C%20velocity%20and%20stress%20variables%20and%20is%20further%20objective%20and%20locking-free.%20Finite%20rotations%20are%20represented%20using%20a%20director%20formulation%20that%20avoids%20singularities%20and%20yields%20a%20constant%20mass%20matrix.%20This%20results%20in%20an%20infinite-dimensional%20nonlinear%20port-Hamiltonian%20%28PH%29%20system%20governed%20by%20partial%20differential-algebraic%20equations%20with%20a%20quadratic%20energy%20functional.%20Using%20a%20time-differentiated%20compliance%20form%20of%20the%20stress-strain%20relations%20allows%20for%20the%20imposition%20of%20kinematic%20constraints%2C%20such%20as%20inextensibility%20or%20shear-rigidity.%20A%20structure-preserving%20finite%20element%20discretization%20leads%20to%20a%20finite-dimensional%20system%20with%20PH%20structure%2C%20thus%20facilitating%20the%20design%20of%20an%20energy-momentum%20consistent%20integration%20scheme.%20Dissipative%20material%20behavior%20%28via%20the%20generalized-Maxwell%20model%29%20and%20non-standard%20actuation%20approaches%20%28via%20pneumatic%20chambers%20or%20tendons%29%20integrate%20naturally%20into%20the%20framework.%20As%20illustrated%20by%20selected%20numerical%20examples%2C%20the%20present%20framework%20establishes%20a%20new%20approach%20to%20energy-momentum%20consistent%20formulations%20in%20computational%20mechanics%20involving%20finite%20rotations.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19408v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMixed%2520formulation%2520and%2520structure-preserving%2520discretization%2520of%2520Cosserat%2520rod%2520dynamics%2520in%2520a%2520port-Hamiltonian%2520framework%26entry.906535625%3DPhilipp%2520L.%2520Kinon%2520and%2520Simon%2520R.%2520Eugster%2520and%2520Peter%2520Betsch%26entry.1292438233%3DAn%2520energy-based%2520modeling%2520framework%2520for%2520the%2520nonlinear%2520dynamics%2520of%2520spatial%2520Cosserat%2520rods%2520undergoing%2520large%2520displacements%2520and%2520rotations%2520is%2520proposed.%2520The%2520mixed%2520formulation%2520features%2520independent%2520displacement%252C%2520velocity%2520and%2520stress%2520variables%2520and%2520is%2520further%2520objective%2520and%2520locking-free.%2520Finite%2520rotations%2520are%2520represented%2520using%2520a%2520director%2520formulation%2520that%2520avoids%2520singularities%2520and%2520yields%2520a%2520constant%2520mass%2520matrix.%2520This%2520results%2520in%2520an%2520infinite-dimensional%2520nonlinear%2520port-Hamiltonian%2520%2528PH%2529%2520system%2520governed%2520by%2520partial%2520differential-algebraic%2520equations%2520with%2520a%2520quadratic%2520energy%2520functional.%2520Using%2520a%2520time-differentiated%2520compliance%2520form%2520of%2520the%2520stress-strain%2520relations%2520allows%2520for%2520the%2520imposition%2520of%2520kinematic%2520constraints%252C%2520such%2520as%2520inextensibility%2520or%2520shear-rigidity.%2520A%2520structure-preserving%2520finite%2520element%2520discretization%2520leads%2520to%2520a%2520finite-dimensional%2520system%2520with%2520PH%2520structure%252C%2520thus%2520facilitating%2520the%2520design%2520of%2520an%2520energy-momentum%2520consistent%2520integration%2520scheme.%2520Dissipative%2520material%2520behavior%2520%2528via%2520the%2520generalized-Maxwell%2520model%2529%2520and%2520non-standard%2520actuation%2520approaches%2520%2528via%2520pneumatic%2520chambers%2520or%2520tendons%2529%2520integrate%2520naturally%2520into%2520the%2520framework.%2520As%2520illustrated%2520by%2520selected%2520numerical%2520examples%252C%2520the%2520present%2520framework%2520establishes%2520a%2520new%2520approach%2520to%2520energy-momentum%2520consistent%2520formulations%2520in%2520computational%2520mechanics%2520involving%2520finite%2520rotations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.19408v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Mixed%20formulation%20and%20structure-preserving%20discretization%20of%20Cosserat%20rod%20dynamics%20in%20a%20port-Hamiltonian%20framework&entry.906535625=Philipp%20L.%20Kinon%20and%20Simon%20R.%20Eugster%20and%20Peter%20Betsch&entry.1292438233=An%20energy-based%20modeling%20framework%20for%20the%20nonlinear%20dynamics%20of%20spatial%20Cosserat%20rods%20undergoing%20large%20displacements%20and%20rotations%20is%20proposed.%20The%20mixed%20formulation%20features%20independent%20displacement%2C%20velocity%20and%20stress%20variables%20and%20is%20further%20objective%20and%20locking-free.%20Finite%20rotations%20are%20represented%20using%20a%20director%20formulation%20that%20avoids%20singularities%20and%20yields%20a%20constant%20mass%20matrix.%20This%20results%20in%20an%20infinite-dimensional%20nonlinear%20port-Hamiltonian%20%28PH%29%20system%20governed%20by%20partial%20differential-algebraic%20equations%20with%20a%20quadratic%20energy%20functional.%20Using%20a%20time-differentiated%20compliance%20form%20of%20the%20stress-strain%20relations%20allows%20for%20the%20imposition%20of%20kinematic%20constraints%2C%20such%20as%20inextensibility%20or%20shear-rigidity.%20A%20structure-preserving%20finite%20element%20discretization%20leads%20to%20a%20finite-dimensional%20system%20with%20PH%20structure%2C%20thus%20facilitating%20the%20design%20of%20an%20energy-momentum%20consistent%20integration%20scheme.%20Dissipative%20material%20behavior%20%28via%20the%20generalized-Maxwell%20model%29%20and%20non-standard%20actuation%20approaches%20%28via%20pneumatic%20chambers%20or%20tendons%29%20integrate%20naturally%20into%20the%20framework.%20As%20illustrated%20by%20selected%20numerical%20examples%2C%20the%20present%20framework%20establishes%20a%20new%20approach%20to%20energy-momentum%20consistent%20formulations%20in%20computational%20mechanics%20involving%20finite%20rotations.&entry.1838667208=http%3A//arxiv.org/abs/2512.19408v2&entry.124074799=Read"},
{"title": "The Subjectivity of Monoculture", "author": "Nathanael Jo and Nikhil Garg and Manish Raghavan", "abstract": "Machine learning models -- including large language models (LLMs) -- are often said to exhibit monoculture, where outputs agree strikingly often. But what does it actually mean for models to agree too much? We argue that this question is inherently subjective, relying on two key decisions.\n  First, the analyst must specify a baseline null model for what \"independence\" should look like. This choice is inherently subjective, and as we show, different null models result in dramatically different inferences about excess agreement. Second, we show that inferences depend on the population of models and items under consideration. Models that seem highly correlated in one context may appear independent when evaluated on a different set of questions, or against a different set of peers. Experiments on two large-scale benchmarks validate our theoretical findings. For example, we find drastically different inferences when using a null model with item difficulty compared to previous works that do not. Together, our results reframe monoculture evaluation not as an absolute property of model behavior, but as a context-dependent inference problem.", "link": "http://arxiv.org/abs/2602.24086v1", "date": "2026-02-27", "relevancy": 2.3195, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4813}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4552}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Subjectivity%20of%20Monoculture&body=Title%3A%20The%20Subjectivity%20of%20Monoculture%0AAuthor%3A%20Nathanael%20Jo%20and%20Nikhil%20Garg%20and%20Manish%20Raghavan%0AAbstract%3A%20Machine%20learning%20models%20--%20including%20large%20language%20models%20%28LLMs%29%20--%20are%20often%20said%20to%20exhibit%20monoculture%2C%20where%20outputs%20agree%20strikingly%20often.%20But%20what%20does%20it%20actually%20mean%20for%20models%20to%20agree%20too%20much%3F%20We%20argue%20that%20this%20question%20is%20inherently%20subjective%2C%20relying%20on%20two%20key%20decisions.%0A%20%20First%2C%20the%20analyst%20must%20specify%20a%20baseline%20null%20model%20for%20what%20%22independence%22%20should%20look%20like.%20This%20choice%20is%20inherently%20subjective%2C%20and%20as%20we%20show%2C%20different%20null%20models%20result%20in%20dramatically%20different%20inferences%20about%20excess%20agreement.%20Second%2C%20we%20show%20that%20inferences%20depend%20on%20the%20population%20of%20models%20and%20items%20under%20consideration.%20Models%20that%20seem%20highly%20correlated%20in%20one%20context%20may%20appear%20independent%20when%20evaluated%20on%20a%20different%20set%20of%20questions%2C%20or%20against%20a%20different%20set%20of%20peers.%20Experiments%20on%20two%20large-scale%20benchmarks%20validate%20our%20theoretical%20findings.%20For%20example%2C%20we%20find%20drastically%20different%20inferences%20when%20using%20a%20null%20model%20with%20item%20difficulty%20compared%20to%20previous%20works%20that%20do%20not.%20Together%2C%20our%20results%20reframe%20monoculture%20evaluation%20not%20as%20an%20absolute%20property%20of%20model%20behavior%2C%20but%20as%20a%20context-dependent%20inference%20problem.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24086v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Subjectivity%2520of%2520Monoculture%26entry.9065 2520problem.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24086v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Subjectivity%20of%20Monoculture&entry.906535625=Nathanael%20Jo%20and%20Nikhil%20Garg%20and%20Manish%20Raghavan&entry.1292438233=Machine%20learning%20models%20--%20including%20large%20language%20models%20%28LLMs%29%20--%20are%20often%20said%20to%20exhibit%20monoculture%2C%20where%20outputs%20agree%20strikingly%20often.%20But%20what%20does%20it%20actually%20mean%20for%20models%20to%20agree%20too%20much%3F%20We%20argue%20that%20this%20question%20is%20inherently%20subjective%2C%20relying%20on%20two%20key%20decisions.%0A%20%20First%2C%20the%20analyst%20must%20specify%20a%20baseline%20null%20model%20for%20what%20%22independence%22%20should%20look%20like.%20This%20choice%20is%20inherently%20subjective%2C%20and%20as%20we%20show%2C%20different%20null%20models%20result%20in%20dramatically%20different%20inferences%20about%20excess%20agreement.%20Second%2C%20we%20show%20that%20inferences%20depend%20on%20the%20population%20of%20models%20and%20items%20under%20consideration.%20Models%20that%20seem%20highly%20correlated%20in%20one%20context%20may%20appear%20independent%20when%20evaluated%20on%20a%20different%20set%20of%20questions%2C%20or%20against%20a%20different%20set%20of%20peers.%20Experiments%20on%20two%20large-scale%20benchmarks%20validate%20our%20theoretical%20findings.%20For%20example%2C%20we%20find%20drastically%20different%20inferences%20when%20using%20a%20null%20model%20with%20item%20difficulty%20compared%20to%20previous%20works%20that%20do%20not.%20Together%2C%20our%20results%20reframe%20monoculture%20evaluation%20not%20as%20an%20absolute%20property%20of%20model%20behavior%2C%20but%20as%20a%20context-dependent%20inference%20problem.&entry.1838667208=http%3A//arxiv.org/abs/2602.24086v1&entry.124074799=Read"},
{"title": "FocusTrack: One-Stage Focus-and-Suppress Framework for 3D Point Cloud Object Tracking", "author": "Sifan Zhou and Jiahao Nie and Ziyu Zhao and Yichao Cao and Xiaobo Lu", "abstract": "In 3D point cloud object tracking, the motion-centric methods have emerged as a promising avenue due to its superior performance in modeling inter-frame motion. However, existing two-stage motion-based approaches suffer from fundamental limitations: (1) error accumulation due to decoupled optimization caused by explicit foreground segmentation prior to motion estimation, and (2) computational bottlenecks from sequential processing. To address these challenges, we propose FocusTrack, a novel one-stage paradigms tracking framework that unifies motion-semantics co-modeling through two core innovations: Inter-frame Motion Modeling (IMM) and Focus-and-Suppress Attention. The IMM module employs a temp-oral-difference siamese encoder to capture global motion patterns between adjacent frames. The Focus-and-Suppress attention that enhance the foreground semantics via motion-salient feature gating and suppress the background noise based on the temporal-aware motion context from IMM without explicit segmentation. Based on above two designs, FocusTrack enables end-to-end training with compact one-stage pipeline. Extensive experiments on prominent 3D tracking benchmarks, such as KITTI, nuScenes, and Waymo, demonstrate that the FocusTrack achieves new SOTA performance while running at a high speed with 105 FPS.", "link": "http://arxiv.org/abs/2602.24133v1", "date": "2026-02-27", "relevancy": 2.3183, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6002}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5898}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5611}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FocusTrack%3A%20One-Stage%20Focus-and-Suppress%20Framework%20for%203D%20Point%20Cloud%20Object%20Tracking&body=Title%3A%20FocusTrack%3A%20One-Stage%20Focus-and-Suppress%20Framework%20for%203D%20Point%20Cloud%20Object%20Tracking%0AAuthor%3A%20Sifan%20Zhou%20and%20Jiahao%20Nie%20and%20Ziyu%20Zhao%20and%20Yichao%20Cao%20and%20Xiaobo%20Lu%0AAbstract%3A%20In%203D%20point%20cloud%20object%20tracking%2C%20the%20motion-centric%20methods%20have%20emerged%20as%20a%20promising%20avenue%20due%20to%20its%20superior%20performance%20in%20modeling%20inter-frame%20motion.%20However%2C%20existing%20two-stage%20motion-based%20approaches%20suffer%20from%20fundamental%20limitations%3A%20%281%29%20error%20accumulation%20due%20to%20decoupled%20optimization%20caused%20by%20explicit%20foreground%20segmentation%20prior%20to%20motion%20estimation%2C%20and%20%282%29%20computational%20bottlenecks%20from%20sequential%20processing.%20To%20address%20these%20challenges%2C%20we%20propose%20FocusTrack%2C%20a%20novel%20one-stage%20paradigms%20tracking%20framework%20that%20unifies%20motion-semantics%20co-modeling%20through%20two%20core%20innovations%3A%20Inter-frame%20Motion%20Modeling%20%28IMM%29%20and%20Focus-and-Suppress%20Attention.%20The%20IMM%20module%20employs%20a%20temp-oral-difference%20siamese%20encoder%20to%20capture%20global%20motion%20patterns%20between%20adjacent%20frames.%20The%20Focus-and-Suppress%20attention%20that%20enhance%20the%20foreground%20semantics%20via%20motion-salient%20feature%20gating%20and%20suppress%20the%20background%20noise%20based%20on%20the%20temporal-aware%20motion%20context%20from%20IMM%20without%20explicit%20segmentation.%20Based%20on%20above%20two%20designs%2C%20FocusTrack%20enables%20end-to-end%20training%20with%20compact%20one-stage%20pipeline.%20Extensive%20experiments%20on%20prominent%203D%20tracking%20benchmarks%2C%20 {"title": "SHINE: Sequential Hierarchical Integration Network for EEG and MEG", "author": "Xiran Xu and Yujie Yan and Xihong Wu and Jing Chen", "abstract": "How natural speech is represented in the brain constitutes a major challenge for cognitive neuroscience, with cortical envelope-following responses playing a central role in speech decoding. This paper presents our approach to the Speech Detection task in the LibriBrain Competition 2025, utilizing over 50 hours of magnetoencephalography (MEG) signals from a single participant listening to LibriVox audiobooks. We introduce the proposed Sequential Hierarchical Integration Network for EEG and MEG (SHINE) to reconstruct the binary speech-silence sequences from MEG signals. In the Extended Track, we further incorporated auxiliary reconstructions of speech envelopes and Mel spectrograms to enhance training. Ensemble methods combining SHINE with baselines (BrainMagic, AWavNet, ConvConcatNet) achieved F1-macro scores of 0.9155 (Standard Track) and 0.9184 (Extended Track) on the leaderboard test set.", "link": "http://arxiv.org/abs/2602.23960v1", "date": "2026-02-27", "relevancy": 2.3145, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4634}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4634}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SHINE%3A%20Sequential%20Hierarchical%20Integration%20Network%20for%20EEG%20and%20MEG&body=Title%3A%20SHINE%3A%20Sequential%20Hierarchical%20Integration%20Network%20for%20EEG%20and%20MEG%0AAuthor%3A%20Xiran%20Xu%20and%20Yujie%20Yan%20and%20Xihong%20Wu%20and%20Jing%20Chen%0AAbstract%3A%20How%20natural%20speech% 520Competition%25202025%252C%2520utilizing%2520over%252050%2520hours%2520of%2520magnetoencephalography%2520%2528MEG%2529%2520signals%2520from%2520a%2520single%2520participant%2520listening%2520to%2520LibriVox%2520audiobooks.%2520We%2520introduce%2520the%2520proposed%2520Sequential%2520Hierarchical%2520Integration%2520Network%2520for%2520EEG%2520and%2520MEG%2520%2528SHINE%2529%2520to%2520reconstruct%2520the%2520binary%2520speech-silence%2520sequences%2520from%2520MEG%2520signals.%2520In%2520the%2520Extended%2520Track%252C%2520we%2520further%2520incorporated%2520auxiliary%2520reconstructions%2520of%2520speech%2520envelopes%2520and%2520Mel%2520spectrograms%2520to%2520enhance%2520training.%2520Ensemble%2520methods%2520combining%2520SHINE%2520with%2520baselines%2520%2528BrainMagic%252C%2520AWavNet%252C%2520ConvConcatNet%2529%2520achieved%2520F1-macro%2520scores%2520of%25200.9155%2520%2528Standard%2520Track%2529%2520and%25200.9184%2520%2528Extended%2520Track%2529%2520on%2520the%2520leaderboard%2520test%2520set.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23960v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SHINE%3A%20Sequential%20Hierarchical%20Integration%20Network%20for%20EEG%20and%20MEG&entry.906535625=Xiran%20Xu%20and%20Yujie%20Yan%20and%20Xihong%20Wu%20and%20Jing%20Chen&entry.1292438233=How%20natural%20speech%20is%20represented%20in%20the%20brain%20constitutes%20a%20major%20challenge%20for%20cognitive%20neuroscience%2C%20with%20cortical%20envelope-following%20responses%20playing%20a%20central%20role%20in%20speech%20decoding.%20This%20paper%20presents%20our%20approach%20to%20the%20Speech%20Detection%20task%20in%20the%20LibriBrain%20Competition%202025%2C%20utilizing%20over%2050%20hours%20of%20magnetoencephalography%20%28MEG%29%20signals%20from%20a%20single%20participant%20listening%20to%20LibriVox%20audiobooks.%20We%20introduce%20the%20proposed%20Sequentia {"title": "CMT-Benchmark: A Benchmark for Condensed Matter Theory Built by Expert Researchers", "author": "Haining Pan and James V. Roggeveen and Erez Berg and Juan Carrasquilla and Debanjan Chowdhury and Surya Ganguli and Federico Ghimenti and Juraj Hasik and Henry Hunt and Hong-Chen Jiang and Mason Kamb and Ying-Jer Kao and Ehsan Khatami and Michael J. Lawler and Di Luo and Titus Neupert and Xiaoliang Qi and Michael P. Brenner and Eun-Ah Kim", "abstract": "Large language models (LLMs) have shown remarkable progress in coding and math problem-solving, but evaluation on advanced research-level problems in hard sciences remains scarce. To fill this gap, we present CMT-Benchmark, a dataset of 50 problems covering condensed matter theory (CMT) at the level of an expert researcher. Topics span analytical and computational approaches in quantum many-body, and classical statistical mechanics. The dataset was designed and verified by a panel of expert researchers from around the world. We built the dataset through a collaborative environment that challenges the panel to write and refine problems they would want a research assistant to solve, including Hartree-Fock, exact diagonalization, quantum/variational Monte Carlo, density matrix renormalization group (DMRG), quantum/classical statistical mechanics, and model building. We evaluate LLMs by programmatically checking solutions against expert-supplied ground truth. We developed machine-grading, including symbolic handling of non-commuting operators via normal ordering. They generalize across tasks too. Our evaluations show that frontier models struggle with all of the problems in the dataset, highlighting a gap in the physical reasoning skills of current LLMs. Notably, experts identified strategies for creating increasingly difficult problems by interacting with the LLMs and exploiting common failure modes. The best model, GPT5, solves 30\\% of the problems; average across 17 models (GPT, Gemini, Claude, DeepSeek, Llama) is 11.4\\pm2.1\\%. Moreover, 18 problems are solved by none of the 17 models, and 26 by at most one. These unsolved problems span Quantum Monte Carlo, Variational Monte Carlo, and DMRG. Answers sometimes violate fundamental symmetries or have unphysical scaling dimensions. We believe this benchmark will guide development toward capable AI research assistants and tutors.", "link": "http://arxiv.org/abs/2510.05228v2", "date": "2026-02-27", "relevancy": 2.3114, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.471}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4449}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CMT-Benchmark%3A%20A%20Benchmark%20for%20Condensed%20Matter%20Theory%20Built%20by%20Expert%20Researchers&body=Title%3A%20CMT-Benchmark%3A%20A%20Benchmark%20for%20Condensed%20Matter%20Theory%20Built%20by%20Expert%20Researchers%0AAuthor%3A%20Haining%20Pan%20and%20James%20V.%20Roggeveen%20and%20Erez%20Berg%20and%20Juan%20Carrasquilla%20and%20Debanjan%20Chowdhury%20and%20Surya%20Ganguli%20and%20Federico%20Ghimenti%20and%20Juraj%20Hasik%20and%20Henry%20Hunt%20and%20Hong-Chen%20Jiang%20and%20Mason%20Kamb%20and%20Ying-Jer%20Kao%20and%20Ehsan%20Khatami%20and%20Michael%20J.%20Lawler%20and%20Di%20Luo%20and%20Titus%20Neupert%20and%20Xiaoliang%20Qi%20and%20Michael%20P.%20Brenner%20and%20Eun-Ah%20Kim%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20have%20shown%20remarkable%20progress%20in%20coding%20and%20math%20problem-solving%2C%20but%20evaluation%20on%20advanced%20research-level%20problems%20in%20hard%20sciences%20remains%20scarce.%20To%20fill%20this%20gap%2C%20we%20present%20CMT-Benchmark%2C%20a%20dataset%20of%2050%20problems%20covering%20condensed%20matter%20theory%20%28CMT%29%20at%20the%20level%20of%20an%20expert%20researcher.%20Topics%20span%20analytical%20and%20computational%20approaches%20in%20quantum%20many-body%2C%20and%20classical%20statistical%20mechanics.%20The%20dataset%20was%20designed%20and%20verified%20by%20a%20panel%20of%20expert%20researchers%20from%20around%20the%20world.%20We%20built%20the%20dataset%20through%20a%20collaborative%20environment%20that%20challenges%20the%20panel%20to%20write%20and%20refine%20problems%20they%20would%20want%20a%20research%20assistant%20to%20solve%2C%20including%20Hartree-Fock%2C%20exact%20diagonalization%2C%20quantum/variational%20Monte%20Carlo%2C%20density%20matrix%20renormalization%20group%20%28DMRG%29%2C%20quantum/classical%20statistical%20mechanics%2C%20and%20model%20building.%20We%20evaluate%20LLMs%20by%20programmatically%20checking%20solutions%20against%20expert-supplied%20ground%20truth.%20We%20developed%20machine-grading%2C%20including%20symbolic%20handling%20of%20non-commuting%20operators%20via%20normal%20ordering.%20They%20generalize%20across%20tasks%20too.%20Our%20evaluations%20show%20that%20frontier%20models%20struggle%20with%20all%20of%20the%20problems%20in%20the%20dataset%2C%20highlighting%20a%20gap%20in%20the%20physical%20reasoning%20skills%20of%20current%20LLMs.%20Notably%2C%20experts%20identified%20strategies%20for%20creating%20increasingly%20difficult%20problems%20by%20interacting%20with%20the%20LLMs%20and%20exploiting%20common%20failure%20modes.%20The%20best%20model%2C%20GPT5%2C%20solves%2030%5C%25%20of%20the%20problems%3B%20average%20across%2017%20models%20%28GPT%2C%20Gemini%2C%20Claude%2C%20DeepSeek%2C%20Llama%29%20is%2011.4%5Cpm2.1%5C%25.%20Moreover%2C%2018%20problems%20are%20solved%20by%20none%20of%20the%2017%20models%2C%20and%2026%20by%20at%20most%20one.%20These%20unsolved%20problems%20span%20Quantum%20Monte%20Carlo%2C%20Variational%20Monte%20Carlo%2C%20and%20DMRG.% {"title": "HALO: A Unified Vision-Language-Action Model for Embodied Multimodal Chain-of-Thought Reasoning", "author": "Quanxin Shou and Fangqi Zhu and Shawn Chen and Puxin Yan and Zhengyang Yan and Yikun Miao and Xiaoyi Pang and Zicong Hong and Ruikai Shi and Hao Huang and Jie Zhang and Song Guo", "abstract": "Vision-Language-Action (VLA) models have shown strong performance in robotic manipulation, but often struggle in long-horizon or out-of-distribution scenarios due to the lack of explicit mechanisms for multimodal reasoning and anticipating how the world will evolve under action. Recent works introduce textual chain-of-thought or visual subgoal prediction within VLA models to reason, but still fail to offer a unified human-like reasoning framework for joint textual reasoning, visual foresight, and action prediction. To this end, we propose HALO, a unified VLA model that enables embodied multimodal chain-of-thought (EM-CoT) reasoning through a sequential process of textual task reasoning, visual subgoal prediction for fine-grained guidance, and EM-CoT-augmented action prediction. We instantiate HALO with a Mixture-of-Transformers (MoT) architecture that decouples semantic reasoning, visual foresight, and action prediction into specialized experts while allowing seamless cross-expert collaboration. To enable HALO learning at scale, we introduce an automated pipeline to synthesize EM-CoT training data along with a carefully crafted training recipe. Extensive experiments demonstrate that: (1) HALO achieves superior performance in both simulated and real-world environments, surpassing baseline policy pi_0 by 34.1% on RoboTwin benchmark; (2) all proposed components of the training recipe and EM-CoT design help improve task success rate; and (3) HALO exhibits strong generalization capabilities under aggressive unseen environmental randomization with our proposed EM-CoT reasoning.", "link": "http://arxiv.org/abs/2602.21157v2", "date": "2026-02-27", "relevancy": 2.2997, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5786}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HALO%3A%20A%20Unified%20Vision-Language-Action%20Model%20for%20Embodied%20Multimodal%20Chain-of-Thought%20Reasoning&body=Title%3A%20HALO%3A%20A%20Unified%20Vision-Language-Action%20Model%20for%20Embodied%20Multimodal%20Chain-of-Thought%20Reasoning%0AAuthor%3A%20Quanxin%20Shou%20and%20Fangqi%20Zhu%20and%20Shawn%20Chen%20and%20Puxin%20Yan%20and%20Zhengyang%20Yan%20and%20Yikun%20Miao%20and%20Xiaoyi%20Pang%20and%20Zicong%20Hong%20and%20Ruikai%20Shi%20and%20Hao%20Huang%20and%20Jie%20Zhang%20and%20Song%20Guo%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20shown%20strong%20performance%20in%20robotic%20manipulation%2C%20but%20often%20struggle%20in%20long-horizon%20or%20out-of-distribution%20scenarios%20due%20to%20the%20lack%20of%20explicit%20mechanisms%20for%20multimodal%20reasoning%20and%20anticipating%20how%20the%20world%20will%20evolve%20under%20action.%20Recent%20works%20introduce%20textual%20chain-of-thought%20or%20visual%20subgoal%20prediction%20within%20VLA%20models%20to%20reason%2C%20but%20still%20fail%20to%20offer%20a%20unified%20human-like%20reasoning%20framework%20for%20joint%20textual%20reasoning%2C%20visual%20foresight%2C%20and%20action%20prediction.%20To%20this%20end%2C%20we%20propose%20HALO%2C%20a%20unified%20VLA%20model%20that%20enables%20embodied%20multimodal%20chain-of-thought%20%28EM-CoT%29%20reasoning%20through%20a%20sequential%20process%20of%20textual%20task%20reasoning%2C%20visual%20subgoal%20prediction%20for%20fine-grained%20guidance%2C%20and%20EM-CoT-augmented%20action%20prediction.%20We%20instantiate%20HALO%20with%20a%20Mixture-of-Transformers%20%28MoT%29%20architecture%20that%20decouples%20semantic%20reasoning%2C%20visual%20foresight%2C%20and%20action%20prediction%20into%20specialized%20experts%20while%20allowing%20seamless%20cross-expert%20collaboration.%20To%20enable%20HALO%20learning%20at%20scale%2C%20we%20introduce%20an%20automated%20pipeline%20to%20synthesize%20EM-CoT%20training%20data%20along%20with%20a%20carefully%20crafted%20training%20recipe.%20Extensive%20experiments%20demonstrate%20that%3A%20%281%29%20HALO%20achieves%20superior%20performance%20in%20both%20simulated%20and%20real-world%20environments%2C%20surpassing%20baseline%20policy%20pi_0%20by%2034.1%25%20on%20RoboTwin%20benchmark%3B%20%282%29%20all%20proposed%20components%20of%20the%20training%20recipe%20and%20EM-CoT%20design%20help%20improve%20task%20success%20rate%3B%20and%20%283%29%20HALO%20exhibits%20strong%20generalization%20capabilities%20under%20aggressive%20unseen%20environmental%20randomization%20with%20our%20proposed%20EM-CoT%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21157v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHALO%253A%2520A%2520Unified%2520Vision-Language-Action%2520Model%2520for%2520Embodied%2520Multimodal%2520Chain-of-Thought%2520Reasoning%26entry.906535625%3DQuanxin%2520Shou%2520and%2520Fangqi%2520Zhu%2520and%2520Shawn%2520Chen%2520and%2520Puxin%2520Yan%2520and%2520Zhengyang%2520Yan%2520and%2520Yikun%2520Miao%2520and%2520Xiaoyi%2520Pang%2520and%2520Zicong%2520Hong%2520and%2520Ruikai%2520Shi%2520and%2520Hao%2520Huang%2520and%2520Jie%2520Zhang%2520and%2520Song%2520Guo%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520shown%2520strong%2520performance%2520in%2520robotic%2520manipulation% {"title": "Off-Road Navigation via Implicit Neural Representation of Terrain Traversability", "author": "Yixuan Jia and Qingyuan Li and Jonathan P. How", "abstract": "Autonomous off-road navigation requires robots to estimate terrain traversability from onboard sensors and plan motion accordingly. Conventional approaches typically rely on sampling-based planners such as MPPI to generate short-term control actions that aim to minimize traversal time and risk measures derived from the traversability estimates. These planners can react quickly but optimize only over a short look-ahead window, limiting their ability to reason about the full path geometry, which is important for navigating in challenging off-road environments. Moreover, they lack the ability to adjust speed based on the terrain-induced vibrations, which is important for smooth navigation on challenging terrains. In this paper, we introduce TRAIL (Traversability with an Implicit Learned Representation), an off-road navigation framework that leverages an implicit neural representation to model terrain properties as a continuous field that can be queried at arbitrary locations. This representation yields spatial gradients that enable integration with a novel gradient-based trajectory optimization method that adapts the path geometry and speed profile based on terrain traversability.", "link": "http://arxiv.org/abs/2511.18183v3", "date": "2026-02-27", "relevancy": 2.2983, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5926}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5792}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5547}], %2520novel%2520gradient-based%2520trajectory%2520optimization%2520method%2520that%2520adapts%2520the%2520path%2520geometry%2520and%2520speed%2520profile%2520based%2520on%2520terrain%2520traversability.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.18183v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Off-Road%20Navigation%20via%20Implicit%20Neural%20Representation%20of%20Terrain%20Traversability&entry.906535625=Yixuan%20Jia%20and%20Qingyuan%20Li%20and%20Jonathan%20P.%20How&entry.1292438233=Autonomous%20off-road%20navigation%20requires%20robots%20to%20estimate%20terrain%20traversability%20from%20onboard%20sensors%20and%20plan%20motion%20accordingly.%20Conventional%20approaches%20typically%20rely%20on%20sampling-based%20planners%20such%20as%20MPPI%20to%20generate%20short-term%20control%20actions%20that%20aim%20to%20minimize%20traversal%20time%20and%20risk%20measures%20derived%20from%20the%20traversability%20estimates.%20These%20planners%20can%20react%20quickly%20but%20optimize%20only%20over%20a%20short%20look-ahead%20window%2C%20limiting%20their%20ability%20to%20reason%20about%20the%20full%20path%20geometry%2C%20which%20is%20important%20for%20navigating%20in%20challenging%20off-road%20environments.%20Moreover%2C%20they%20lack%20the%20ability%20to%20adjust%20speed%20based%20on%20the%20terrain-induced%20vibrations%2C%20which%20is%20important%20for%20smooth%20navigation%20on%20challenging%20terrains.%20In%20this%20paper%2C%20we%20introduce%20TRAIL%20%28Traversability%20with%20an%20Implicit%20Learned%20Representation%29%2C%20an%20off-road%20navigation%20framework%20that%20leverages%20an%20implicit%20neural%20representation%20to%20model%20terrain%20properties%20as%20a%20continuous%20field%20that%20can%20be%20queried%20at%20arbitrary%20locations.%20This%20representation%20yields%20spatial%20gradients%20that%20enable%20integration%20with%20a%20novel%20gradient-based%20trajectory%20optimization%20method%20that%20adapts%20the%20path%20geometry%20and%20speed%20profile%20based%20on%20terrain%20traversability.&entry.1838667208=http%3A//arxiv.org/abs/2511.18183v3&entry.124074799=Read"},
{"title": "Human or Machine? A Preliminary Turing Test for Speech-to-Speech Interaction", "author": "Xiang Li and Jiabao Gao and Sipei Lin and Xuan Zhou and Chi Zhang and Bo Cheng and Jiale Han and Benyou Wang", "abstract": "The pursuit of human-like conversational agents has long been guided by the Turing test. For modern speech-to-speech (S2S) systems, a critical yet unanswered question is whether they can converse like humans. To tackle this, we conduct the first Turing test for S2S systems, collecting 2,968 human judgments on dialogues between 9 state-of-the-art S2S systems and 28 human participants. Our results deliver a clear finding: no existing evaluated S2S system passes the test, revealing a significant gap in human-likeness. To diagnose this failure, we develop a fine-grained taxonomy of 18 human-likeness dimensions and crowd-annotate our collected dialogues accordingly. Our analysis shows that the bottleneck is not semantic understanding but stems from paralinguistic features, emotional expressivity, and conversational persona. Furthermore, we find that off-the-shelf AI models perform unreliably as Turing test judges. In response, we propose an interpretable model that leverages the fine-grained human-likeness ratings and delivers accurate and transparent human-vs-machine discrimination, offering a powerful tool for automatic human-likeness evaluation. Our work establishes the first human-likeness evaluation for S2S systems and moves beyond binary outcomes to enable detailed diagnostic insights, paving the way for human-like improvements in conversational AI systems.", "link": "http://arxiv.org/abs/2602.24080v1", "date": "2026-02-27", "relevancy": 2.2922, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4606}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4574}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Human%20or%20Machine%3F%20A%20Preliminary%20Turing%20Test%20for%20Speech-to-Speech%20Interaction&body=Title%3A%20Human%20or%20Machine%3F%20A%20Preliminary%20Turing%20Test%20for%20Speech-to-Speech%20Interaction%0AAuthor%3A%20Xiang%20Li%20and%20Jiabao%20Gao%20and%20Sipei%20Lin%20and%20Xuan%20Zhou%20and%20Chi%20Zhang%20and%20Bo%20Cheng%20and%20Jiale%20Han%20and%20Benyou%20Wang%0AAbstract%3A%20The%20pursuit%20of%20human-like%20conversational%20agents%20has%20long%20been%20guided%20by%20the%20Turing%20test.%20For%20modern%20speech-to-speech%20%28S2S%29%20systems%2C%20a%20critical%20yet%20unanswered%20question%20is%20whether%20they%20can%20converse%20like%20humans.%20To%20tackle%20this%2C%20we%20conduct%20the%20first%20Turing%20test%20for%20S2S%20systems%2C%20collecting%202%2C968%20human%20judgments%20on%20dialogues%20between%209%20state-of-the-art%20S2S%20systems%20and%2028%20human%20participants.%20Our%20results%20deliver%20a%20clear%20finding%3A%20no%20existing%20evaluated%20S2S%20system%20passes%20the%20test%2C%20revealing%20a%20significant%20gap%20in%20human-likeness.%20To%20diagnose%20this%20failure%2C%20we%20develop%20a%20fine-grained%20taxonomy%20of%2018%20human-likeness%20dimensions%20and%20crowd-annotate%20our%20collected%20dialogues%20accordingly.%20Our%20analysis%20shows%20that%20the%20bottleneck%20is%20not%20semantic%20understanding%20but%20stems%20from%20paralinguistic%20features%2C%20emotional%20expressivity%2C%20and%20conversational%20persona.%20Furthermore%2C%20we%20find%20that%20off-the-shelf%20AI%20models%20perform%20unreliably%20as%20Turing%20test%20judges.%20In%20response%2C%20we%20propose%20an%20interpretable%20model%20that%20leverages%20the%20fine-grained%20human-likeness%20ratings%20and%20delivers%20accurate%20and%20transparent%20human-vs-machine%20discrimination%2C%20offering%20a%20powerful%20tool%20for%20automatic%20human-likeness%20evaluation.%20Our%20work%20establishes%20the%20first%20human-likeness%20evaluation%20for%20S2S%20systems%20and%20moves%20beyond%20binary%20outcomes%20to%20enable%20detailed%20diagnostic%20insights%2C%20paving%20the%20way%20for%20human-like%20improvements%20in%20conversational%20AI%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24080v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHuman%2520or%2520Machine%253F%2520A%2520Preliminary%2520Turing%2520Test%2520for%2520Speech-to-Speech%2520Interaction%26entry.906535625%3DXiang%2520Li%2520and%2520Jiabao%2520Gao%2520and%2520Sipei%2520Lin%2520and%2520Xuan%2520Zhou%2520and%2520Chi%2520Zhang%2520and%2520Bo%2520Cheng%2520and%2520Jiale%2520Han%2520and%2520Benyou%2520Wang%26entry.1292438233%3DThe%2520pursuit%2520of%2520human-like%2520conversational%2520agents%2520has%2520long%2520been%2520guided%2520by%2520the%2520Turing%2520test.%2520For%2520modern%2520speech-to-speech%2520%2528S2S%2529%2520systems%252C%2520a%2520critical%2520yet%2520unanswered%2520question%2520is%2520whether%2520they%2520can%2520converse%2520like%2520humans.%2520To%2520tackle%2520this%252C%2520we%2520conduct%2520the%2520first%2520Turing%2520test%2520for%2520S2S%2520systems%252C%2520collecting%25202%252C968%2520human%2520judgments%2520on%2520dialogues%2520between%25209%2520state-of-the-art%2520S2S%2520systems%2520and%252028%2520human%2520participants.%2520Our%2520results%2520deliver%2520a%2520clear%2520finding%253A%2520no%2520existing%2520evaluated%2520S2S%2520system%2520passes%2520the%2520test%252C%2520revealing%2520a%2520significant%2520gap%2520in%2520human-likeness.%2520To%2520diagnose%2520this%2520failure%252C%2520we%2520develop%2520a%2520fine-grained%2520taxonomy%2520of%252018%2520human-likeness%2520dimensions%2520and%2520 {"title": "Steering and Rectifying Latent Representation Manifolds in Frozen Multi-modal LLMs for Video Anomaly Detection", "author": "Zhaolin Cai and Fan Li and Huiyu Duan and Lijun He and Guangtao Zhai", "abstract": "Video anomaly detection (VAD) aims to identify abnormal events in videos. Traditional VAD methods generally suffer from the high costs of labeled data and full training, thus some recent works have explored leveraging frozen multi-modal large language models (MLLMs) in a tuning-free manner to perform VAD. However, their performance is limited as they directly inherit pre-training biases and cannot adapt internal representations to specific video contexts, leading to difficulties in handling subtle or ambiguous anomalies. To address these limitations, we propose a novel intervention framework, termed SteerVAD, which advances MLLM-based VAD by shifting from passively reading to actively steering and rectifying internal representations. Our approach first leverages the gradient-free representational separability analysis (RSA) to identify top attention heads as latent anomaly experts (LAEs) which are most discriminative for VAD. Then a hierarchical meta-controller (HMC) generates dynamic rectification signals by jointly conditioning on global context and these LAE outputs. The signals execute targeted, anisotropic scaling directly upon the LAE representation manifolds, amplifying anomaly-relevant dimensions while suppressing inherent biases. Extensive experiments on mainstream benchmarks demonstrate our method achieves state-of-the-art performance among tuning-free approaches requiring only 1% of training data, establishing it as a powerful new direction for video anomaly detection. The code will be released upon the publication.", "link": "http://arxiv.org/abs/2602.24021v1", "date": "2026-02-27", "relevancy": 2.2913, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5819}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5785}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Steering%20and%20Rectifying%20Latent%20Representation%20Manifolds%20in%20Frozen%20Multi-modal%20LLMs%20for%20Video%20Anomaly%20Detection&body=Title%3A%20Steering%20and%20Rectifying%20Latent%20Representation%20Manifolds%20in%20Frozen%20Multi-modal%20LLMs%20for%20Video%20Anomaly%20Detection%0AAuthor%3A%20Zhaolin%20Cai%20and%20Fan%20Li%20and%20Huiyu%20Duan%20and%20Lijun%20He%20and%20Guangtao%20Zhai%0AAbstract%3A%20Video%20anomaly%20detection%20%28VAD%29%20aims%20to%20identify%20abnormal%20events%20in%20videos.%20Traditional%20VAD%20methods%20generally%20suffer%20from%20the%20high%20costs%20of%20labeled%20data%20and%20full%20training%2C%20thus%20some%20recent%20works%20have%20explored%20leveraging%20frozen%20multi-modal%20large%20language%20models%20%28MLLMs%29%20in%20a%20tuning-free%20manner%20to%20perform%20VAD.%20However%2C%20their%20performance%20is%20limited%20as%20they%20directly%20inherit%20pre-training%20biases%20and%20cannot%20adapt%20internal%20representations%20to%20specific%20video%20contexts%2C%20leading%20to%20difficulties%20in%20handling%20subtle%20or%20ambiguous%20anomalies.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20intervention%20framework%2C%20termed%20SteerVAD%2C%20which%20advances%20MLLM-based%20VAD%20by%20shifting%20from%20passively%20reading%20to%20actively%20steering%20and%20rectifying%20internal%20representations.%20Our%20approach%20first%20leverages%20the%20gradient-free%20representational%20separability%20analysis%20%28RSA%29%20to%20identify%20top%20attention%20heads%20as%20latent%20anomaly%20experts%20%28LAEs%29%20which%20are%20most%20discriminative%20for%20VAD.%20Then%20a%20hierarchical%20meta-controller%20%28HMC%29%20generates%20dynamic%20rectification%20signals%20by%20jointly%20conditioning%20on%20global%20context%20and%20these%20LAE%20outputs.%20The%20signals%20execute%20targeted%2C%20anisotropic%20scaling%20directly%20upon%20the%20LAE%20representation%20manifolds%2C%20amplifying%20anomaly-relevant%20dimensions%20while%20suppressing%20inherent%20biases.%20Extensive%20experiments%20on%20mainstream%20benchmarks%20demonstrate%20our%20method%20achieves%20state-of-the-art%20performance%20among%20tuning-free%20approaches%20requiring%20only%201%25%20of%20training%20data%2C%20establishing%20it%20as%20a%20powerful%20new%20direction%20for%20video%20anomaly%20detection.%20The%20code%20will%20be%20released%20upon%20the%20publication.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24021v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSteering%2520and%2520Rectifying%2520Latent%2520Representation%2520Manifolds%2520in%2520Frozen%2520Multi-modal%2520LLMs%2520for%2520Video%2520Anomaly%2520Detection%26entry.906535625%3DZhaolin%2520Cai%2520and%2520Fan%2520Li%2520and%2520Huiyu%2520Duan%2520and%2520Lijun%2520He%2520and%2520Guangtao%2520Zhai%26entry.1292438233%3DVideo%2520anomaly%2520detection%2520%2528VAD%2529%2520aims%2520to%2520identify%2520abnormal%2520events%2520in%2520videos.%2520Traditional%2520VAD%2520methods%2520generally%2520suffer%2520from%2520the%2520high%2520costs%2520of%2520labeled%2520data%2520and%2520full%2520training%252C%2520thus%2520some%2520recent%2520works%2520have%2520explored%2520leveraging%2520frozen%2520multi-modal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520in%2520a%2520tuning-free%2520manner%2520to%2520perform%2520VAD.%2520However%252C%2520their%2520performance%2520is%2520limited%2520as%2520they%2520directly%2520inherit%2520pre-training%2520biases%2520and%2520cannot%2520adapt%2520internal%2520 {"title": "DirMixE: Harnessing Test Agnostic Long-tail Recognition with Hierarchical Label Vartiations", "author": "Zhiyong Yang and Qianqian Xu and Sicong Li and Zitai Wang and Xiaochun Cao and Qingming Huang", "abstract": "This paper explores test-agnostic long-tail recognition, a challenging long-tail task where the test label distributions are unknown and arbitrarily imbalanced. We argue that the variation in these distributions can be broken down hierarchically into global and local levels. The global ones reflect a broad range of diversity, while the local ones typically arise from milder changes, often focused on a particular neighbor. Traditional methods predominantly use a Mixture-of-Expert (MoE) approach, targeting a few fixed test label distributions that exhibit substantial global variations. However, the local variations are left unconsidered. To address this issue, we propose a new MoE strategy, DirMixE, which assigns experts to different Dirichlet meta-distributions of the label distribution, each targeting a specific aspect of local variations. Additionally, the diversity among these Dirichlet meta-distributions inherently captures global variations. This dual-level approach also leads to a more stable objective function, allowing us to sample different test distributions better to quantify the mean and variance of performance outcomes. Building on this idea, we develop a general Latent Skill Finetuning (LSF) framework for parameter-efficient finetuning of foundation models. We provide implementations based on LoRA and Adapter. Theoretically, we derive upper bounds on the generalization error for both standard learning and PEFT. Under mild assumptions, we show that the variance-based regularization helps tighten these bounds. Furthermore, we prove that the covering number of the PEFT hypothesis class scales with the number of trainable parameters. Finally, extensive experiments on CIFAR-10-LT, CIFAR-100-LT, ImageNet-LT, and iNaturalist validate the effectiveness of DirMixE.", "link": "http://arxiv.org/abs/2405.07780v2", "date": "2026-02-27", "relevancy": 2.2909, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5936}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5797}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DirMixE%3A%20Harnessing%20Test%20Agnostic%20Long-tail%20Recognition%20with%20Hierarchical%20Label%20Vartiations&body=Title%3A%20DirMixE%3A%20Harnessing%20Test%20Agnostic%20Long-tail%20Recognition%20with%20Hierarchical%20Label%20Vartiations%0AAuthor%3A%20Zhiyong%20Yang%20and%20Qianqian%20Xu%20and%20Sicong%20Li%20and%20Zitai%20Wang%20and%20Xiaochun%20Cao%20and%20Qingming%20Huang%0AAbstract%3A%20This%20paper%20explores%20test-agnostic%20long-tail%20recognition%2C%20a%20challenging%20long-tail%20task%20where%20the%20test%20label%20distributions%20are%20unknown%20and%20arbitrarily%20imbalanced.%20We%20argue%20that%20the%20variation%20in%20these%20distributions%20can%20be%20broken%20down%20hierarchically%20into%20global%20and%20local%20levels.%20The%20global%20ones%20reflect%20a%20broad%20range%20of%20diversity%2C%20while%20the%20local%20ones%20typically%20arise%20from%20milder%20changes%2C%20often%20focused%20on%20a%20particular%20neighbor.%20Traditional%20methods%20predominantly%20use%20a%20Mixture-of-Expert%20%28MoE%29%20approach%2C%20targeting%20a%20few%20fixed%20test%20label%20distributions%20that%20exhibit%20substantial%20global%20variations.%20However%2C%20the%20local%20variations%20are%20left%20unconsidered.%20To%20address%20this%20issue%2C%20we%20propose%20a%20new%20MoE%20strategy%2C%20DirMixE%2C%20which%20assigns%20experts%20to%20different%20Dirichlet%20meta-distributions%20of%20the%20label%20distribution%2C%20each%20targeting%20a%20specific%20aspect%20of%20local%20variations.%20Additionally%2C%20the%20diversity%20among%20these%20Dirichlet%20meta-distributions%20inherently%20captures%20global%20variations.%20This%20dual-level%20approach%20also%20leads%20to%20a%20more%20stable%20objective%20function%2C%20allowing%20us%20to%20sample%20different%20test%20distributions%20better%20to%20quantify%20the%20mean%20and%20variance%20of%20performance%20outcomes.%20Building%20on%20this%20idea%2C%20we%20develop%20a%20general%20Latent%20Skill%20Finetuning%20%28LSF%29%20framework%20for%20parameter-efficient%20finetuning%20of%20foundation%20models.%20We%20provide%20implementations%20based%20on%20LoRA%20and%20Adapter.%20Theoretically%2C%20we%20derive%20upper%20bounds%20on%20the%20generalization%20error%20for%20both%20standard%20learning%20and%20PEFT.%20Under%20mild%20assumptions%2C%20we%20show%20that%20the%20variance-based%20regularization%20helps%20tighten%20these%20bounds.%20Furthermore%2C%20we%20prove%20that%20the%20covering%20number%20of%20the%20PEFT%20hypothesis%20class%20scales%20with%20the%20number%20of%20trainable%20parameters.%20Finally%2C%20extensive%20experiments%20on%20CIFAR-10-LT%2C%20CIFAR-100-LT%2C%20ImageNet-LT%2C%20and%20iNaturalist%20validate%20the%20effectiveness%20of%20DirMixE.%0ALink%3A%20http%3A//arxiv.org/abs/2405.07780v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDirMixE%253A%2520Harnessing%2520Test%2520Agnostic%2520Long-tail%2520Recognition%2520with%2520Hierarchical%2520Label%2520Vartiations%26entry.906535625%3DZhiyong%2520Yang%2520and%2520Qianqian%2520Xu%2520and%2520Sicong%2520Li%2520and%2520Zitai%2520Wang%2520and% {"title": "SelfOccFlow: Towards end-to-end self-supervised 3D Occupancy Flow prediction", "author": "Xavier Timoneda and Markus Herb and Fabian Duerr and Daniel Goehring", "abstract": "Estimating 3D occupancy and motion at the vehicle's surroundings is essential for autonomous driving, enabling situational awareness in dynamic environments. Existing approaches jointly learn geometry and motion but rely on expensive 3D occupancy and flow annotations, velocity labels from bounding boxes, or pretrained optical flow models. We propose a self-supervised method for 3D occupancy flow estimation that eliminates the need for human-produced annotations or external flow supervision. Our method disentangles the scene into separate static and dynamic signed distance fields and learns motion implicitly through temporal aggregation. Additionally, we introduce a strong self-supervised flow cue derived from features' cosine similarities. We demonstrate the efficacy of our 3D occupancy flow method on SemanticKITTI, KITTI-MOT, and nuScenes.", "link": "http://arxiv.org/abs/2602.23894v1", "date": "2026-02-27", "relevancy": 2.2823, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5784}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.569}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5634}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SelfOccFlow%3A%20Towards%20end-to-end%20self-supervised%203D%20Occupancy%20Flow%20prediction&body=Title%3A%20SelfOccFlow%3A%20Towards%20end-to-end%20self-supervised%203D%20Occupancy%20Flow%20prediction%0AAuthor%3A%20Xavier%20Timoneda%20and%20Markus%20Herb%20and%20Fabian%20Duerr%20and%20Daniel%20Goehring%0AAbstract%3A%20Estimating%203D%20occupancy%20and%20motion%20at%20the%20vehicle%27s%20surroundings%20is%20essential%20for%20autonomous%20driving%2C%20enabling%20situational%20awareness%20in%20dynamic%20environments.%20Existing%20approaches%20jointly%20learn%20geometry%20and%20motion%20but%20rely%20on%20expensive%203D%20occupancy%20and%20flow%20annotations%2C%20velocity%20labels%20from%20bounding%20boxes%2C%20or%20pretrained%20optical%20flow%20models.%20We%20propose%20a%20self-supervised%20method%20for%203D%20occupancy%20flow%20estimation%20that%20eliminates%20the%20need%20for%20human-produced%20annotations%20or%20external%20flow%20supervision.%20Our%20method%20disentangles%20the%20scene%20into%20separate%20static%20and%20dynamic%20signed%20distance%20fields%20and%20learns%20motion%20implicitly%20through%20temporal%20aggregation.%20Additionally%2C%20we%20introduce%20a%20strong%20self-supervised%20flow%20cue%20derived%20from%20features%27%20cosine%20similarities.%20We%20demonstrate%20the%20efficacy%20of%20our%203D%20occupancy%20flow%20method%20on%20SemanticKITTI%2C%20KITTI-MOT%2C%20and%20nuScenes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23894v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelfOccFlow%253A%2520Towards%2520end-to-end%2520self-supervised%25203D%2520Occupancy%2520Flow%2520prediction%26entry.906535625%3DXavier%2520Timoneda%2520and%2520Markus%2520Herb%2520and%2520Fabian%2520Duerr%2520and%2520Daniel%2520Goehring%26entry.1292438233%3DEstimating%25203D%2520occupancy%2520and%2520motion%2520at%2520the%2520vehicle%2527s%2520surroundings%2520is%2520essential%2520for%2520autonomous%2520driving%252C%2520enabling%2520situational%2520awareness%2520in%2520dynamic%2520environments.%2520Existing%2520approaches%2520jointly%2520learn%2520geometry%2520and%2520motion%2520but%2520rely%2520on%2520expensive%25203D%2520occupancy%2520and%2520flow%2520annotations%252C%2520velocity%2520labels%2520from%2520bounding%2520boxes%252C%2520or%2520pretrained%2520optical%2520flow%2520models.%2520We%2520propose%2520a%2520self-supervised%2520method%2520for%25203D%2520occupancy%2520flow%2520estimation%2520that%2520eliminates%2520the%2520need%2520for%2520human-produced%2520annotations%2520or%2520external%2520flow%2520supervision.%2520Our%2520method%2520disentangles%2520the%2520scene%2520into%2520separate%2520static%2520and%2520dynamic%2520signed%2520distance%2520fields%2520and%2520learns%2520motion%2520implicitly%2520through%2520temporal%2520aggregation.%2520Additionally%252C%2520we%2520introduce%2520a%2520strong%2520self-supervised%2520flow%2520cue%2520derived%2520from%2520features%2527%2520cosine%2520similarities.%2520We%2520demonstrate%2520the%2520efficacy%2520of%2520our%25203D%2520occupancy%2520flow%2520method%2520on%2520SemanticKITTI%252C%2520KITTI-MOT%252C%2520and%2520nuScenes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23894v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SelfOccFlow%3A%20Towards%20end-to-end%20self-supervised%203D%20Occupancy%20Flow%20prediction&entry.906535625=Xavier%20Timoneda%20and%20Markus%20Herb%20and%20Fabian%20Duerr%20and%20Daniel%20Goehring&entry.1292438233=Estimating%203D%20occupancy%20and%20motion%20at%20the%20vehicle%27s%20surroundings%20is%20essential%20for%20autonomous%20driving%2C%20enabling%20situational%20awareness%20in%20dynamic%20environments.%20Existing%20approaches%20jointly%20learn%20geometry%20and%20motion%20but%20rely%20on%20expensive%203D%20occupancy%20and%20flow%20annotations%2C%20velocity%20labels%20from%20bounding%20boxes%2C%20or%20pretrained%20optical%20flow%20models.%20We%20propose%20a%20self-supervised%20method%20for%203D%20occupancy%20flow%20estimation%20that%20eliminates%20the%20need%20for%20human-produced%20annotations%20or%20external%20flow%20supervision.%20Our%20method%20disentangles%20the%20scene%20into%20separate%20stat

{"title": "DAGS-SLAM: Dynamic-Aware 3DGS SLAM via Spatiotemporal Motion Probability and Uncertainty-Aware Scheduling", "author": "Li Zhang and Yu-An Liu and Xijia Jiang and Conghao Huang and Danyang Li and Yanyong Zhang", "abstract": "Mobile robots and IoT devices demand real-time localization and dense reconstruction under tight compute and energy budgets. While 3D Gaussian Splatting (3DGS) enables efficient dense SLAM, dynamic objects and occlusions still degrade tracking and mapping. Existing dynamic 3DGS-SLAM often relies on heavy optical flow and per-frame segmentation, which is costly for mobile deployment and brittle under challenging illumination. We present DAGS-SLAM, a dynamic-aware 3DGS-SLAM system that maintains a spatiotemporal motion probability (MP) state per Gaussian and triggers semantics on demand via an uncertainty-aware scheduler. DAGS-SLAM fuses lightweight YOLO instance priors with geometric cues to estimate and temporally update MP, propagates MP to the front-end for dynamic-aware correspondence selection, and suppresses dynamic artifacts in the back-end via MP-guided optimization. Experiments on public dynamic RGB-D benchmarks show improved reconstruction and robust tracking while sustaining real-time throughput on a commodity GPU, demonstrating a practical speed-accuracy tradeoff with reduced semantic invocations toward mobile deployment.", "link": "http://arxiv.org/abs/2602.21644v2", "date": "2026-02-27", "relevancy": 3.3733, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7365}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6711}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6163}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DAGS-SLAM%3A%20Dynamic-Aware%203DGS%20SLAM%20via%20Spatiotemporal%20Motion%20Probability%20and%20Uncertainty-Aware%20Scheduling&body=Title%3A%20DAGS-SLAM%3A%20Dynamic-Aware%203DGS%20SLAM%20via%20Spatiotemporal%20Motion%20Probability%20and%20Uncertainty-Aware%20Scheduling%0AAuthor%3A%20Li%20Zhang%20and%20Yu-An%20Liu%20and%20Xijia%20Jiang%20and%20Conghao%20Huang%20and%20Danyang%20Li%20and%20Yanyong%20Zhang%0AAbstract%3A%20Mobile%20robots%20and%20IoT%20devices%20demand%20real-time%20localization%20and%20dense%20reconstruction%20under%20tight%20compute%20and%20energy%20budgets.%20While%203D%20Gaussian%20Splatting%20%283DGS%29%20enables%20efficient%20dense%20SLAM%2C%20dynamic%20objects%20and%20occlusions%20still%20degrade%20tracking%20and%20mapping.%20Existing%20dynamic%203DGS-SLAM%20often%20relies%20on%20heavy%20optical%20flow%20and%20per-frame%20segmentation%2C%20which%20is%20costly%20for%20mobile%20deployment%20and%20brittle%20under%20challenging%20illumination.%20We%20present%20DAGS-SLAM%2C%20a%20dynamic-aware%203DGS-SLAM%20system%20that%20maintains%20a%20spatiotemporal%20motion%20probability%20%28MP%29%20state%20per%20Gaussian%20and%20triggers%20semantics%20on%20demand%20via%20an%20uncertainty-aware%20scheduler.%20DAGS-SLAM%20fuses%20lightweight%20YOLO%20instance%20priors%20with%20geometric%20cues%20to%20estimate%20and%20temporally%20update%20MP%2C%20propagates%20MP%20to%20the%20front-end%20for%20dynamic-aware%20correspondence%20selection%2C%20and%20suppresses%20dynamic%20artifacts%20in%20the%20back-end%20via%20MP-guided%20optimization.%20Experiments%20on%20public%20dynamic%20RGB-D%20benchmarks%20show%20improved%20reconstruction%20and%20robust%20tracking%20while%20sustaining%20real-time%20throughput%20on%20a%20commodity%20GPU%2C%20demonstrating%20a%20practical%20speed-accuracy%20tradeoff%20with%20reduced%20semantic%20invocations%20toward%20mobile%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21644v2%0AForm%3A%20https%3A//d e%2520sustaining%2520real-time%2520throughput%2520on%2520a%2520commodity%2520GPU%252C%2520demonstrating%2520a%2520practical%2520speed-accuracy%2520tradeoff%2520with%2520reduced%2520semantic%2520invocations%2520toward%2520mobile%2520deployment.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21644v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DAGS-SLAM%3A%20Dynamic-Aware%203DGS%20SLAM%20via%20Spatiotemporal%20Motion%20Probability%20and%20Uncertainty-Aware%20Scheduling&entry.906535625=Li%20Zhang%20and%20Yu-An%20Liu%20and%20Xijia%20Jiang%20and%20Conghao%20Huang%20and%20Danyang%20Li%20and%20Yanyong%20Zhang&entry.1292438233=Mobile%20robots%20and%20IoT%20devices%20demand%20real-time%20localization%20and%20dense%20reconstruction%20under%20tight%20compute%20and%20energy%20budgets.%20While%203D%20Gaussian%20Splatting%20%283DGS%29%20enables%20efficient%20dense%20SLAM%2C%20dynamic%20objects%20and%20occlusions%20still%20degrade%20tracking%20and%20mapping.%20Existing%20dynamic%203DGS-SLAM%20often%20relies%20on%20heavy%20optical%20flow%20and%20per-frame%20segmentation%2C%20which%20is%20costly%20for%20mobile%20deployment%20and%20brittle%20under%20challenging%20illumination.%20We%20present%20DAGS-SLAM%2C%20a%20dynamic-aware%203DGS-SLAM%20system%20that%20maintains%20a%20spatiotemporal%20motion%20probability%20%28MP%29%20state%20per%20Gaussian%20and%20triggers%20semantics%20on%20demand%20via%20an%20uncertainty-aware%20scheduler.%20DAGS-SLAM%20fuses%20lightweight%20YOLO%20instance%20priors%20with%20geometric%20cues%20to%20estimate%20and%20temporally%20update%20MP%2C%20propagates%20MP%20to%20the%20front-end%20for%20dynamic-aware%20correspondence%20selection%2C%20and%20suppresses%20dynamic%20artifacts%20in%20the%20back-end%20via%20MP-guided%20optimization.%20Experiments%20on%20public%20dynamic%20RGB-D%20benchmarks%20show%20improved%20reconstruction%20and%20robust%20tracking%20 {"title": "HumanOrbit: 3D Human Reconstruction as 360\u00b0 Orbit Generation", "author": "Keito Suzuki and Kunyao Chen and Lei Wang and Bang Du and Runfa Blark Li and Peng Liu and Ning Bi and Truong Nguyen", "abstract": "We present a method for generating a full 360\u00b0 orbit video around a person from a single input image. Existing methods typically adapt image-based diffusion models for multi-view synthesis, but yield inconsistent results across views and with the original identity. In contrast, recent video diffusion models have demonstrated their ability in generating photorealistic results that align well with the given prompts. Inspired by these results, we propose HumanOrbit, a video diffusion model for multi-view human image generation. Our approach enables the model to synthesize continuous camera rotations around the subject, producing geometrically consistent novel views while preserving the appearance and identity of the person. Using the generated multi-view frames, we further propose a reconstruction pipeline that recovers a textured mesh of the subject. Experimental results validate the effectiveness of HumanOrbit for multi-view image generation and that the reconstructed 3D models exhibit superior completeness and fidelity compared to those from state-of-the-art baselines.", "link": "http://arxiv.org/abs/2602.24148v1", "date": "2026-02-27", "relevancy": 3.3629, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6983}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6597}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HumanOrbit%3A%203D%20Human%20Reconstruction%20as%20360%C2%B0%20Orbit%20Generation&body=Title%3A%20HumanOrbit%3A%203D%20Human%20Reconstruction%20as%20360%C2%B0%20Orbit%20Generation%0AAuthor%3A%20Keito%20Suzuki%20and%20Kunyao%20Chen%20and%20Lei%20Wang%20and%20Bang%20Du%20and%20Runfa%20Blark%20Li%20and%20Peng%20Liu%20and%20Ning%20Bi%20and%20Truong%20Nguyen%0AAbstract%3A%20We%20present%20a%20method%20for%20generating%20a%20full%20360%C2%B0%20orbit%20video%20around%20a%20person%20from%20a%20single%20input%20image.%20Existing%20methods%20typically%20adapt%20image-based%20diffusion%20models%20for%20multi-view%20synthesis%2C%20but%20yield%20inconsistent%20results%20across%20views%20and%20with%20the%20original%20identity.%20In%20contrast%2C%20recent%20video%20diffusion%20models%20have%20demonstrated%20their%20ability%20in%20generating%20photorealistic%20results%20that%20align%20well%20with%20the%20given%20prompts.%20Inspired%20by%20these%20results%2C%20we%20propose%20HumanOrbit%2C%20a%20video%20diffusion%20model%20for%20multi-view%20human%20image%20generation.%20Our%20approach%20enables%20the%20model%20to%20synthesize%20continuous%20camera%20rotations%20around%20the%20subject%2C%20producing%20geometrically%20consistent%20novel%20views%20while%20preserving%20the%20appearance%20and%20identity%20of%20the%20person.%20Using%20the%20generated%20multi-view%20frames%2C%20we%20further%20propose%20a%20reconstruction%20pipeline%20that%20recovers%20a%20textured%20mesh%20of%20the%20subject.%20Experimental%20results%20validate%20the%20effectiveness%20of%20HumanOrbit%20for%20multi-view%20image%20generation%20and%20that%20the%20reconstructed%203D%20models%20exhibit%20superior%20completeness%20and%20fidelity%20compared%20to%20those%20from%20state-of-the-art%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24148v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHumanOrbit%253A%25203D%2520Human%2520Reconstruction%2520as%2520360%25C2%25B0%2520Orbit%2520Generation%26entry.906535625%3DKeito%2520Suzuki%2520and%2520K d", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HumanOrbit%3A%203D%20Human%20Reconstruction%20as%20360%C2%B0%20Orbit%20Generation&entry.906535625=Keito%20Suzuki%20and%20Kunyao%20Chen%20and%20Lei%20Wang%20and%20Bang%20Du%20and%20Runfa%20Blark%20Li%20and%20Peng%20Liu%20and%20Ning%20Bi%20and%20Truong%20Nguyen&entry.1292438233=We%20present%20a%20method%20for%20generating%20a%20full%20360%C2%B0%20orbit%20video%20around%20a%20person%20from%20a%20single%20input%20image.%20Existing%20methods%20typically%20adapt%20image-based%20diffusion%20models%20for%20multi-view%20synthesis%2C%20but%20yield%20inconsistent%20results%20across%20views%20and%20with%20the%20original%20identity.%20In%20contrast%2C%20recent%20video%20diffusion%20models%20have%20demonstrated%20their%20ability%20in%20generating%20photorealistic%20results%20that%20align%20well%20with%20the%20given%20prompts.%20Inspired%20by%20these%20results%2C%20we%20propose%20HumanOrbit%2C%20a%20video%20diffusion%20model%20for%20multi-view%20human%20image%20generation.%20Our%20approach%20enables%20the%20model%20to%20synthesize%20continuous%20camera%20rotations%20around%20the%20subject%2C%20producing%20geometrically%20consistent%20novel%20views%20while%20preserving%20the%20appearance%20and%20identity%20of%20the%20person.%20Using%20the%20generated%20multi-view%20frames%2C%20we%20further%20propose%20a%20reconstruction%20pipeline%20that%20recovers%20a%20textured%20mesh%20of%20the%20subject.%20Experimental%20results%20validate%20the%20effectiveness%20of%20HumanOrbit%20for%20multi-view%20image%20generation%20and%20that%20the%20reconstructed%203D%20models%20exhibit%20superior%20completeness%20and%20fidelity%20compared%20to%20those%20from%20state-of-the-art%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2602.24148v1&entry.124074799=Read"},
{"title": "Prune Wisely, Reconstruct Sharply: Compact 3D Gaussian Splatting via Adaptive Pruning and Difference-of-Gaussian Primitives", "author": "Haoran Wang and Guoxi Huang and Fan Zhang and David Bull and Nantheera Anantrasirichai", "abstract": "Recent significant advances in 3D scene representation have been driven by 3D Gaussian Splatting (3DGS), which has enabled real-time rendering with photorealistic quality. 3DGS often requires a large number of primitives to achieve high fidelity, leading to redundant representations and high resource consumption, thereby limiting its scalability for complex or large-scale scenes. Consequently, effective pruning strategies and more expressive primitives that can reduce redundancy while preserving visual quality are crucial for practical deployment. We propose an efficient, integrated reconstruction-aware pruning strategy that adaptively determines pruning timing and refining intervals based on reconstruction quality, thus reducing model size while enhancing rendering quality. Moreover, we introduce a 3D Difference-of-Gaussians primitive that jointly models both positive and negative densities in a single primitive, improving the expressiveness of Gaussians under compact configurations. Our method significantly improves model compactness, achieving up to 90\\% reduction in Gaussian-count while delivering visual quality that is similar to, or in some cases better than, that produced by state-of-the-art methods. Code will be made publicly available.", "link": "http://arxiv.org/abs/2602.24136v1", "date": "2026-02-27", "relevancy": 3.2656, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6682}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6482}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6429}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prune%20Wisely%2C%20Reconstruct%20Sharply%3A%20Compact%203D%20Gaussian%20Splatting%20via%20Adaptive%20Pruning%20and%20Difference-of-Gaussian%20Primitives&body=Title%3A%20Prune%20Wisely%2C%20Reconstruct%20Sharply%3A%20Compact%203D%20Gaussian%20Splatting%20via%20Adaptive%20Pruning%20and%20Difference-of-Gaussian%20Primitives%0AAuthor%3A%20Haoran%20Wang%20and%20Guoxi%20Huang%20and%20Fan%20Zhang%20and%20David%20Bull%20and%20Nantheera%20Anantrasirichai%0AAbstract%3A%20Recent%20significant%20advances%20in%203D%20scene%20representation%20have%20been%20driven%20by%203D%20Gaussian%20Splatting%20%283DGS%29%2C%20which%20has%20enabled%20real-time%20rendering%20with%20photorealistic%20quality.%203DGS%20often%20requires%20a%20large%20number%20of%20primitives%20to%20achieve%20high%20fidelity%2C%20leading%20to%20redundant%20representations%20and%20high%20resource%20consumption%2C%20thereby%20limiting%20its%20scalability%20for%20complex%20or%20large-scale%20scenes.%20Consequently%2C%20effective%20pruning%20strategies%20and%20more%20expressive%20primitives%20that%20can%20reduce%20redundancy%20while%20preserving%20visual%20quality%20are%20crucial%20for%20practical%20deployment.%20We%20propose%20an%20efficient%2C%20integrated%20reconstruction-aware%20pruning%20strategy%20that%20adaptively%20determines%20pruning%20timing%20and%20refining%20intervals%20based%20on%20reconstruction%20quality%2C%20thus%20reducing%20model%20size%20while%20enhancing%20rendering%20quality.%20Moreover%2C%20we%20introduce%20a%203D%20Difference-of-Gaussians%20primitive%20that%20jointly%20models%20both%20positive%20and%20negative%20densities%20in%20a%20single%20primitive%2C%20improving%20the%20expressiveness%20of%20Gaussians%20under%20compact%20configurations.%20Our%20method%20significantly%20improves%20model%20compactness%2C%20achieving%20up%20to%2090%5C%25%20reduction%20in%20Gaussian-count%20while%20delivering%20visual%20quality%20that%20is%20similar%20to%2C%20or%20in%20some%20cases%20better%20than%2C%20that%20produced%20by%20state-of-the-art%20methods.%20Code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24136v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrune%2520Wisely%252C%2520Reconstruct%2520Sharply%253A%2520Compact%25203D%2520Gaussian%2520Splatting%2520via%2520Adaptive%2520Pruning%2520and%2520Difference-of-Gaussian%2520Primitives%26entry.906535625%3DHaoran%2520Wang%2520and%2520Guoxi%2520Huang%2520and%2520Fan%2520Zhang%2520and%2520David%2520Bull%2520and%2520Nantheera%2520Anantrasirichai%26entry.1292438233%3DRecent%2520significant%2520advances%2520in%25203D%2520scene%2520representation%2520have%2520been%2520driven%2520by%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%252C%2520which%2520has%2520enabled%2520real-time%2520rendering%2520with%2520photorealistic%2520quality.%25203DGS%2520often%2520requires%2520a%2520large%2520number%2520of%2520primitives%2520to%2520achieve%2520high%2520fidelity%252C%2520leading%2520to%2520redundant%2520representations%2520and%2520high%2520resource%2520consumption%252C%2520thereby%2520limiting%2520its%2520scalability%2520for%2520complex%2520or%2520large-scale%2520scenes.%2520Consequently%252C%2520effective%2520pruning%2520strategies%2520and%2520more%2520expressive%2520primitives%2520that%2520can%2520reduce%2520redundancy%2520while%2520preserving%2520visual%2520quality%2520are%2520crucial%2520for%2520practical%2520deployment.%2520We%2520propose%2520an%2520efficient%252C%2520integrated%2520reconstruction-aware%2520pruning%2520strategy%2520that%2520adaptively%2520determines%2520pruning%2520timing%2520and%2520refining%2520intervals%2520based%2520on%2520reconstruction%2520quality%252C%2520thus%2520reducing%2520model%2520size%2520while%2520enhancing%2520 {"title": "MEGS$^{2}$: Memory-Efficient Gaussian Splatting via Spherical Gaussians and Unified Pruning", "author": "Jiarui Chen and Yikeng Chen and Yingshuang Zou and Ye Huang and Peng Wang and Yuan Liu and Yujing Sun and Wenping Wang", "abstract": "3D Gaussian Splatting (3DGS) has emerged as a dominant novel-view synthesis technique, but its high memory consumption severely limits its applicability on edge devices. A growing number of 3DGS compression methods have been proposed to make 3DGS more efficient, yet most only focus on storage compression and fail to address the critical bottleneck of rendering memory. To address this problem, we introduce MEGS$^{2}$, a novel memory-efficient framework that tackles this challenge by jointly optimizing two key factors: the total primitive number and the parameters per primitive, achieving unprecedented memory compression. Specifically, we replace the memory-intensive spherical harmonics with lightweight, arbitrarily oriented spherical Gaussian lobes as our color representations. More importantly, we propose a unified soft pruning framework that models primitive-number and lobe-number pruning as a single constrained optimization problem. Experiments show that MEGS$^{2}$ achieves a 50% static VRAM reduction and a 40% rendering VRAM reduction compared to existing methods, while maintaining comparable rendering quality. Project page: https://megs-2.github.io/", "link": "http://arxiv.org/abs/2509.07021v3", "date": "2026-02-27", "relevancy": 3.2384, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6687}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6388}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6356}], "mailto": "mailto:haoxiang.li.2 models%2520primitive-number%2520and%2520lobe-number%2520pruning%2520as%2520a%2520single%2520constrained%2520optimization%2520problem.%2520Experiments%2520show%2520that%2520MEGS%2524%255E%257B2%257D%2524%2520achieves%2520a%252050%2525%2520static%2520VRAM%2520reduction%2520and%2520a%252040%2525%2520rendering%2520VRAM%2520reduction%2520compared%2520to%2520existing%2520methods%252C%2520while%2520maintaining%2520comparable%2520rendering%2520quality.%2520Project%2520page%253A%2520https%253A//megs-2.github.io/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.07021v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MEGS%24%5E%7B2%7D%24%3A%20Memory-Efficient%20Gaussian%20Splatting%20via%20Spherical%20Gaussians%20and%20Unified%20Pruning&entry.906535625=Jiarui%20Chen%20and%20Yikeng%20Chen%20and%20Yingshuang%20Zou%20and%20Ye%20Huang%20and%20Peng%20Wang%20and%20Yuan%20Liu%20and%20Yujing%20Sun%20and%20Wenping%20Wang&entry.1292438233=3D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20a%20dominant%20novel-view%20synthesis%20technique%2C%20but%20its%20high%20memory%20consumption%20severely%20limits%20its%20applicability%20on%20edge%20devices.%20A%20growing%20number%20of%203DGS%20compression%20methods%20have%20been%20proposed%20to%20make%203DGS%20more%20efficient%2C%20yet%20most%20only%20focus%20on%20storage%20compression%20and%20fail%20to%20address%20the%20critical%20bottleneck%20of%20rendering%20memory.%20To%20address%20this%20problem%2C%20we%20introduce%20MEGS%24%5E%7B2%7D%24%2C%20a%20novel%20memory-efficient%20framework%20that%20tackles%20this%20challenge%20by%20jointly%20optimizing%20two%20key%20factors%3A%20the%20total%20primitive%20number%20and%20the%20parameters%20per%20primitive%2C%20achieving%20unprecedented%20memory%20compression.%20Specifically%2C%20we%20replace%20the%20memory-intensive%20spherical%20harmonics%20with%20lightweight%2C%20arbitrarily%20oriente {"title": "SR3R: Rethinking Super-Resolution 3D Reconstruction With Feed-Forward Gaussian Splatting", "author": "Xiang Feng and Xiangbo Wang and Tieshi Zhong and Chengkai Wang and Yiting Zhao and Tianxiang Xu and Zhenzhong Kuang and Feiwei Qin and Xuefei Yin and Yanming Zhu", "abstract": "3D super-resolution (3DSR) aims to reconstruct high-resolution (HR) 3D scenes from low-resolution (LR) multi-view images. Existing methods rely on dense LR inputs and per-scene optimization, which restricts the high-frequency priors for constructing HR 3D Gaussian Splatting (3DGS) to those inherited from pretrained 2D super-resolution (2DSR) models. This severely limits reconstruction fidelity, cross-scene generalization, and real-time usability. We propose to reformulate 3DSR as a direct feed-forward mapping from sparse LR views to HR 3DGS representations, enabling the model to autonomously learn 3D-specific high-frequency geometry and appearance from large-scale, multi-scene data. This fundamentally changes how 3DSR acquires high-frequency knowledge and enables robust generalization to unseen scenes. Specifically, we introduce SR3R, a feed-forward framework that directly predicts HR 3DGS representations from sparse LR views via the learned mapping network. To further enhance reconstruction fidelity, we introduce Gaussian offset learning and feature refinement, which stabilize reconstruction and sharpen high-frequency details. SR3R is plug-and-play and can be paired with any feed-forward 3DGS reconstruction backbone: the backbone provides an LR 3DGS scaffold, and SR3R upscales it to an HR 3DGS. Extensive experiments across three 3D benchmarks demonstrate that SR3R surpasses state-of-the-art (SOTA) 3DSR methods and achieves strong zero-shot generalization, even outperforming SOTA per-scene optimization methods on unseen scenes.", "link": "http://arxiv.org/abs/2602.24020v1", "date": "2026-02-27", "relevancy": 3.1971, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.723}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6233}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.572}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SR3R%3A%20Rethinking%20Super-Resolution%203D%20Reconstruction%20With%20Feed-Forward%20Gaussian%20Splatting&body=Title%3A%20SR3R%3A%20Rethinking%20Super-Resolution%203D%20Reconstruction%20With%20Feed-Forward%20Gaussian%20Splatting%0AAuthor%3A%20Xiang%20Feng%20and%20Xiangbo%20Wang%20and%20Tieshi%20Zhong%20and%20Chengkai%20Wang%20and%20Yiting%20Zhao%20and%20Tianxiang%20Xu%20and%20Zhenzhong%20Kuang%20and%20Feiwei%20Qin%20and%20Xuefei%20Yin%20and%20Yanming%20Zhu%0AAbstract%3A%203D%20super-resolution%20%283DSR%29%20aims%20to%20reconstruct%20high-resolution%20%28HR%29%203D%20scenes%20from%20low-resolution%20%28LR%29%20multi-view%20images.%20Existing%20methods%20rely%20on%20dense%20LR%20inputs%20and%20per-scene%20optimization%2C%20which%20restricts%20the%20high-frequency%20priors%20for%20constructing%20HR%203D%20Gaussian%20Splatting%20%283DGS%29%20to%20those%20inherited%20from%20pretrained%202D%20super-resolution%20%282DSR%29%20models.%20This%20severely%20limits%20reconstruction%20fidelity%2C%20cross-scene%20generalization%2C%20and%20real-time%20usability.%20We%20propose%20to%20reformulate%203DSR%20as%20a%20direct%20feed-forward%20mapping%20from%20sparse%20LR%20views%20to%20HR%203DGS%20representations%2C%20enabling%20the%20model%20to%20autonomously%20learn%203D-specific%20high-frequency%20geometry%20and%20appearance%20from%20large-scale%2C%20multi-scene%20data.%20This%20fundamentally%20changes%20how%203DSR%20acquires%20high-frequency%20knowledge%20and%20enables%20robust%20generalization%20to%20unseen%20scenes.%20Specifically%2C%20we%20introduce%20SR3R%2C%20a%20feed-forward%20framework%20that%20directly%20predicts%20HR%203DGS%20representations%20from%20sparse%20LR%20views%20via%20the%20learned%20mapping%20network.%20To%20further%20enhance%20reconstruction%20fidelity%2C%20we%20introduce%20Gaussian%20offset%20learning%20and%20feature%20refinement%2C%20which%20stabilize%20reconstruction%20and%20sharpen%20high-frequency%20details.%20SR3R%20is%20plug-and-play%20and%20can%20be%20paired%20with%20any%20feed-forward%203DGS%20reconstruction%20backbone%3A%20the%20backbone%20provides%20an%20LR%203DGS%20scaffold%2C%20and%20SR3R%20upscales%20it%20to%20an%20HR%203DGS.%20Extensive%20experiments%20across%20three%203D%20benchmarks%20demonstrate%20that%20SR3R%20surpasses%20state-of-the-art%20%28SOTA%29%203DSR%20methods%20and%20achieves%20strong%20zero-shot%20generalization%2C%20even%20outperforming%20SOTA%20per-scene%20optimization%20methods%20on%20unseen%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.24020v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSR3R%253A%2520Rethinking%2520Super-Resolution%25203D%2520Reconstruction%2520With%2520Feed-Forward%2520Gaussian%2520Splatting%26entry.906535625%3DXiang%2520Feng%2520and%2520Xiangbo%2520Wang%2520and%2520Tieshi%2520Zhong%2520and%2520Chengkai%2520Wang%2520and%2520Yiting%2520Zhao%2520and%2520Tianxiang%2520Xu%2520and%2520Zhenzhong%2520Kuang%2520and%2520Feiwei%2520Qin%2520and%2520Xuefei%2520Yin%2520and%2520Yanming%2520Zhu%26entry.1292438233%3D3D%2520super-resolution%2520%25283DSR%2529%2520aims%2520to%2520reconstruct%2520high-resolution%2520%2528HR%2529%25203D%2520scenes%2520from%2520low-resolution%2520%2528LR%2529%2520multi-view%2520images.%2520Existing%2520methods%2520rely%2520on%2520dense%2520LR%2520inputs%2520and%2520per-scene%2520optimization%252C%2520which%2520restricts%2520the%2520high-frequency%2520priors%2520for%2520constructing%2 {"title": "LiteReality: Graphics-Ready 3D Scene Reconstruction from RGB-D Scans", "author": "Zhening Huang and Xiaoyang Wu and Fangcheng Zhong and Hengshuang Zhao and Matthias Nie\u00dfner and Joan Lasenby", "abstract": "We propose LiteReality, a novel pipeline that converts RGB-D scans of indoor environments into compact, realistic, and interactive 3D virtual replicas. LiteReality not only reconstructs scenes that visually resemble reality but also supports key features essential for graphics pipelines -- such as object individuality, articulation, high-quality physically based rendering materials, and physically based interaction. At its core, LiteReality first performs scene understanding and parses the results into a coherent 3D layout and objects with the help of a structured scene graph. It then reconstructs the scene by retrieving the most visually similar 3D artist-crafted models from a curated asset database. Next, the Material Painting module enhances realism by recovering high-quality, spatially varying materials. Finally, the reconstructed scene is integrated into a simulation engine with basic physical properties to enable interactive behavior. The resulting scenes are compact, editable, and fully compatible with standard graphics pipelines, making them suitable for applications in AR/VR, gaming, robotics, and digital twins. In addition, LiteReality introduces a training-free object retrieval module that achieves state-of-the-art similarity performance on the Scan2CAD benchmark, along with a robust material painting module capable of transferring appearances from images of any style to 3D assets -- even under severe misalignment, occlusion, and poor lighting. We demonstrate the effectiveness of LiteReality on both real-life scans and public datasets. Project page: https://litereality.github.io; Video: https://www.youtube.com/watch?v=ecK9m3LXg2c", "link": "http://arxiv.org/abs/2507.02861v2", "date": "2026-02-27", "relevancy": 3.1715, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.635}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.635}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6329}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LiteReality%3A%20Graphics-Ready%203D%20Scene%20Reconstruction%20from%20RGB-D%20Scans&body=Title%3A%20LiteReality%3A%20Graphics-Ready%203D%20Scene%20Reconstruction%20from%20RGB-D%20Scans%0AAuthor%3A%20Zhening%20Huang%20and%20Xiaoyang%20Wu%20and%20Fangcheng%20Zhong%20and%20Hengshuang%20Zhao%20and%20Matthias%20Nie%C3%9Fner%20and%20Joan%20Lasenby%0AAbstract%3A%20We%20propose%20LiteReality%2C%20a%20novel%20pipeline%20that%20converts%20RGB-D%20scans%20of%20indoor%20environments%20into%20compact%2C%20realistic%2C%20and%20interactive%203D%20virtual%20replicas.%20LiteReality%20not%20only%20reconstructs%20scenes%20that%20visually%20resemble%20reality%20but%20also%20supports%20key%20features%20essential%20for%20graphics%20pipelines%20--%20such%20as%20object%20individuality%2C%20articulation%2C%20high-quality%20physically%20based%20rendering%20materials%2C%20and%20physically%20based%20interaction.%20At%20its%20core%2C%20LiteReality%20first%20performs%20scene%20understanding%20and%20parses%20the%20results%20into%20a%20coherent%203D%20layout%20and%20objects%20with%20the%20help%20of%20a%20structured%20scene%20graph.%20It%20then%20reconstructs%20the%20scene%20by%20retrieving%20the%20most%20visually%20similar%203D%20artist-crafted%20models%20from%20a%20curated%20asset%20database.%20Next%2C%20the%20Material%20Painting%20module%20enhances%20realism%20by%20recovering%20high-quality%2C%20spatially%20varying%20materials.%20Finally%2C%20the%20reconstructed%20scene%20is%20integrated%20into%20a%20simulati {"title": "AHAP: Reconstructing Arbitrary Humans from Arbitrary Perspectives with Geometric Priors", "author": "Xiaozhen Qiao and Wenjia Wang and Zhiyuan Zhao and Jiacheng Sun and Ping Luo and Hongyuan Zhang and Xuelong Li", "abstract": "Reconstructing 3D humans from images captured at multiple perspectives typically requires pre-calibration, like using checkerboards or MVS algorithms, which limits scalability and applicability in diverse real-world scenarios. In this work, we present \\textbf{AHAP} (Reconstructing \\textbf{A}rbitrary \\textbf{H}umans from \\textbf{A}rbitrary \\textbf{P}erspectives), a feed-forward framework for reconstructing arbitrary humans from arbitrary camera perspectives without requiring camera calibration. Our core lies in the effective fusion of multi-view geometry to assist human association, reconstruction and localization. Specifically, we use a Cross-View Identity Association module through learnable person queries and soft assignment, supervised by contrastive learning to resolve cross-view human identity association. A Human Head fuses cross-view features and scene context for SMPL prediction, guided by cross-view reprojection losses to enforce body pose consistency. Additionally, multi-view geometry eliminates the depth ambiguity inherent in monocular methods, providing more precise 3D human localization through multi-view triangulation. Experiments on EgoHumans and EgoExo4D demonstrate that AHAP achieves competitive performance on both world-space human reconstruction and camera pose estimation, while being 180$\\times$ faster than optimization-based approaches.", "link": "http://arxiv.org/abs/2602.23951v1", "date": "2026-02-27", "relevancy": 3.1475, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.652}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6437}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5928}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AHAP%3A%20Reconstructing%20Arbitrary%20Humans%20from%20Arbitrary%20Perspectives%20with%20Geometric%20Priors&body=Title%3A%20AHAP%3A%20Reconstructing%20Arbitrary%20Humans%20from%20Arbitrary%20Perspectives%20with%20Geometric%20Priors%0AAuthor%3A%20Xiaozhen%20Qiao%20and%20Wenjia%20Wang%20and%20Zhiyuan%20Zhao%20and%20Jiacheng%20Sun%20and%20Ping%20Luo%20and%20Hongyuan%20Zhang%20and%20Xuelong%20Li%0AAbstract%3A%20Reconstructing%203D%20humans%20from%20images%20captured%20at%20multiple%20perspectives%20typically%20requires%20pre-calibration%2C%20like%20using%20checkerboards%20or%20MVS%20algorithms%2C%20which%20limits%20scalability%20and%20applicability%20in%20diverse%20real-world%20scenarios.%20In%20this%20work%2C%20we%20present%20%5Ctextbf%7BAHAP%7D%20%28Reconstructing%20%5Ctextbf%7BA%7Drbitrary%20%5Ctextbf%7BH%7Dumans%20from%20%5Ctextbf%7BA%7Drbitrary%20%5Ctextbf%7BP%7Derspectives%29%2C%20a%20feed-forward%20framework%20for%20reconstructing%20arbitrary%20humans%20from%20arbitrary%20camera%20perspectives%20without%20requiring%20camera%20calibration.%20Our%20core%20lies%20in%20the%20effective%20fusion%20of%20multi-view%20geometry%20to%20assist%20human%20association%2C%20reconstruction%20and%20localization.%20Specifically%2C%20we%20use%20a%20Cross-View%20Identity%20Association%20module%20through%20learnable%20person%20queries%20and%20soft%20assignment%2C%20supervised%20by%20contrastive%20learning%20to%20resolve%20cross-view%20human%20identity%20association.%20A%20Human%20Head%20fuses%20cross-view%20features%20and%20scene%20context%20for%20SMPL%20prediction%2C%20guided%20by%20cross-view%20reprojection%20losses%20to%20enforce%20body%20pose%20consistency.%20Additionally%2C%20multi-view%20geometry%20eliminates%20the%20depth%20ambiguity%20inherent%20in%20monocular%20methods%2C%20providing%20more%20precise%203D%20human%20localization%20through%20multi-view%20triangulation.%20Experiments%20on%20EgoHumans%20and%20EgoExo4D%20demonstrate%20that%20AHAP%20achieves%20competitive%20performance%20on%20both%20world-space%20human%20reconstruction%20and%20camera%20pose%20estimation%2C%20while%20being%20180%24%5Ctimes%24%20faster%20than%20optimization-based%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23951v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAHAP%253A%2520Reconstructing%2520Arbitrary%2520Humans%2520from%2520Arbitrary%2520Perspectives%2520with%2520Geometric%2520Priors%26entry.906535625%3DXiaozhen%2520Qiao%2520and%2520Wenjia%2520Wang%2520and%2520Zhiyuan%2520Zhao%2520and%2520Jiacheng%2520Sun%2520and%2520Ping%2520Luo%2520and%2520Hongyuan%2520Zhang%2520and%2520Xuelong%2520Li%26entry.1292438233%3DReconstructing%25203D%2520humans%2520from%2520images%2520captured%2520at%2520multiple%2520perspectives%2520typically%2520requires%2520pre-calibration%252C%2520like%2520using%2520checkerboards%2520or%2520MVS%2520algorithms%252C%2520which%2520limits%2520scalability%2520and%2520applicability%2520in%2520diverse%2520real-world%2520scenarios.%2520In%2520this%2520work%252C%2520we%2520present%2520%255Ctextbf%257BAHAP%257D%2520%2528Reconstructing%2520%255Ctextbf%257BA%257Drbitrary%2520%255Ctextbf%257BH%257Dumans%2520from%2520%255Ctextbf%257BA%257Drbitrary%2520%255Ctextbf%257BP%257Derspectives%2529%252C%2520a%2520feed-forward%2520framework%2520for%2520reconstructing%2520arbitrary%2520humans%2520from%2520arbitrary%2520camera%2520perspectives%2520without%2520requiring%2520camera%2520calibration.%2520Our%2520core%2520lies%2520in%2520the%2520effective%2520fusion%2520of%2520multi-view%2520geometry%2520to%2520assist%2520human%2520association%252C%2520reconstruction%2520and%2520localization.%2520Specifically%252C%2520we%2520use%2520a%2520Cross-View%2520Identity%2520Association%2520module%2520through%2520learnable%2520person%2520queries%2520and%2520soft%2520assignment%252C%2520supervised%2520by%2520contrastive%2520learning%2520to%2520resolve%2520cross-view%2520human%2520identity%2520association.%2520A%2520Human%2520Head%2520fuses%2520cross-view%2520features%2520and%2520scene%2520context%2520for%2520SMPL%2520prediction%252C%2520guided%2520by%2520cross-view%2520reprojection%2520losses%2520to%2520enforce%2520body%2520pose%2520consistency.%2520Additionally%252C%2520multi-view%2520geometry%2520eliminates%2520the%2520depth%2520ambiguity%2520inherent%2520in%2520monocular%2520methods%252C%2520providing%2520more%2520precise%25203D%2520human%2520localization%2520through%2520multi-view%2520triangulation.%2520Experiments%2520on%2520EgoHumans%2520and%2520EgoExo4D%2520demonstrate%2520that%2520AHAP%2520achieves%2520competitive%2520performance%2520on%2520both%2520world-space%2520human%2520reconstruction%2520and%2520camera%2520pose%2520estimation%252C%2520while%2520being%2520180%2524%255Ctimes%2524%2520faster%2520than%2520optimization-based%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23951v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AHAP%3A%20Reconstructing%20Arbitrary%20Humans%20from%20Arbitrary%20Perspectives%20with%20Geometric%20Priors&entry.906535625=Xiaozhen%20Qiao%20and%20Wenjia%20Wang%20and%20Zhiyuan%20Zhao%20and%20Jiacheng%20Sun%20and%20Ping%20Luo%20and%20Hongyuan%20Zhang%20and%20Xuelong%20Li&entry.1292438233=Reconstructing%203D%20humans%20from%20images%20captured%20at%20multiple%20perspectives%20typically%20requires%20pre-calibration%2C%20like%20using%20checkerboards%20or%20MVS%20algorithms%2C%20which%20limits%20scalability%20and%20applicability%20in%20diverse%20real-world%20scenarios.%20In%20this%20work%2C%20we%20present%20%5Ctextbf%7BAHAP%7D%20%28Reconstructing%20%5Ctextbf%7BA%7Drbitrary%20%5Ctextbf%7BH%7Dumans%20from%20%5Ctextbf%7BA%7Drbitrary%20%5Ctextbf%7BP%7Derspectives%29%2C%20a%20feed-forward%20framework%20for%20reconstructing%20arbitrary%20humans%20from%20arbitrary%20camera%20perspectives%20without%20requiring%20camera%20calibration.%20Our%20core%20lies%20in%20the%20effective%20fusion%20of%20multi-view%20geometry%20to%20assist%20human%20association%2C%20reconstruction%20and%20localization.%20Specifically%2C%20we%20use%20a%20Cross-View%20Identity%20Association%20module%20through%20learnable%20person%20queries%20and%20soft%20assignment%2C%20supervised%20by%20contrastive%20learning%20to%20resolve%20cross-view%20human%20identity%20association.%20A%20Human%20Head%20fuses%20cross-view%20features%20and%20scene%20context%20for%20SMPL%20prediction%2C%20guided%20by%20cross-view%20reprojection%20losses%20to%20enforce%20body%20pose%20consistency.%20Additionally%2C%20multi-view%20geometry%20eliminates%20the%20depth%20ambiguity%20inherent%20in%20monocular%20methods%2C%20providing%20more%20precise%203D%20human%20localization%20through%20multi-view%20triangulation.%20Experiments%20on%20EgoHumans%20and%20EgoExo4D%20demonstrate%20that%20AHAP%20achieves%20competitive%20performance%20on%20both%20world-space%20human%20reconstruction%20and%20camera%20pose%20estimation%2C%20while%20being%20180%24%5Ctimes%24%20faster%20than%20optimization-based%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2602.23951v1&entry.124074799=Read"},
{"title": "EvalMVX: A Unified Benchmarking for Neural 3D Reconstruction under Diverse Multiview Setups", "author": "Zaiyan Yang and Jieji Ren and Xiangyi Wang and zonglin li and Xu Cao and Heng Guo and Zhanyu Ma and Boxin Shi", "abstract": "Recent advancements in neural surface reconstruction have significantly enhanced 3D reconstruction. However, current real world datasets mainly focus on benchmarking multiview stereo (MVS) based on RGB inputs. Multiview photometric stereo (MVPS) and multiview shape from polarization (MVSfP), though indispensable on high-fidelity surface reconstruction and sparse inputs, have not been quantitatively assessed together with MVS. To determine the working range of different MVX (MVS, MVSfP, and MVPS) techniques, we propose EvalMVX, a real-world dataset containing $25$ objects, each captured with a polarized camera under $20$ varying views and $17$ light conditions including OLAT and natural illumination, leading to $8,500$ images. Each object includes aligned ground-truth 3D mesh, facilitating quantitative benchmarking of MVX methods simultaneously. Based on our EvalMVX, we evaluate $13$ MVX methods published in recent years, record the best-performing methods, and identify open problems under diverse geometric details and reflectance types. We hope EvalMVX and the benchmarking results can inspire future research on multiview 3D reconstruction.", "link": "http://arxiv.org/abs/2602.24065v1", "date": "2026-02-27", "relevancy": 3.0207, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6108}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6108}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5908}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EvalMVX%3A%20A%20Unified%20Benchmarking%20for%20Neural%203D%20Reconstruction%20under%20Diverse%20Multiview%20Setups&body=Title%3A%20EvalMVX%3A%20A%20Unified%20Benchmarking%20for%20Neural%203D%20Reconstruction%20under%20Diverse%20Multiview%20Setups%0AAuthor%3A%20Zaiyan%20Yang%20and%20Jieji%20Ren%20and%20Xiangyi%20Wang%20and%20zonglin%20li%20and%20Xu%20Cao%20and%20Heng%20Guo%20and%20Zhanyu%20Ma%20and%20Boxin%20Shi%0AAbstract%3A%20Recent%20advancements%20in%20neural%20surface%20reconstruction%20have%20significantly%20enhanced%203D%20reconstruction.%20However%2C%20current%20real%20world%20datasets%20mainly%20focus%20on%20benchmarking%20multiview%20stereo%20%28MVS%29%20based%20on%20RGB%20inputs.%20Multiview%20photometric%20stereo%20%28MVPS%29%20and%20multiview%20shape%20from%20polarization%20%28MVSfP%29%2C%20though%20indispensable%20on%20high-fidelity%20surface%20reconstruction%20and%20sparse%20inputs%2C%20have%20not%20been%20quantitatively%20assessed%20together%20with%20MVS.%20To%20determine%20the%20working%20range%20of%20different%20MVX%20%28MVS%2C%20MVSfP%2C%20and%20MVPS%29%20techniques%2C%20we%20propose%20EvalMVX%2C%20a%20real-world%20dataset%20containing%20%2425%24%20objects%2C%20each%20captured%20with%20a%20polarized%20camera%20under%20%2420%24%20varying%20views%20and%20%2417%24%20light%20conditions%20including%20OLAT%20and%20natural%20illumination%2C%20leading%20to%20%248%2C500%24%20images.%20Each%20object%20includes%20aligned%20ground-truth%203D%20mesh%2C%20facilitating%20quantitative%20benchmarking%20of%20MVX%20methods%20simultaneously.%20Based%20on%20our%20EvalMVX%2C%20we%20evaluate%20%2413%24%20MVX%20methods%20published%20in%20recent%20years%2C%20record%20the%20best-performing%20methods%2C%20and%20identify%20open%20problems%20under%20diverse%20geometric%20details%20and%20reflectance%20types.%20We%20hope%20EvalMVX%20and%20the%20benchmarking%20results%20can%20inspire%20future%20research%20on%20multiview%203D%20reconstruction.%0ALink%3A%20http%3A//a e%2520evaluate%2520%252413%2524%2520MVX%2520methods%2520published%2520in%2520recent%2520years%252C%2520record%2520the%2520best-performing%2520methods%252C%2520and%2520identify%2520open%2520problems%2520under%2520diverse%2520geometric%2520details%2520and%2520reflectance%2520types.%2520We%2520hope%2520EvalMVX%2520and%2520the%2520benchmarking%2520results%2520can%2520inspire%2520future%2520research%2520on%2520multiview%25203D%2520reconstruction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.24065v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EvalMVX%3A%20A%20Unified%20Benchmarking%20for%20Neural%203D%20Reconstruction%20under%20Diverse%20Multiview%20Setups&entry.906535625=Zaiyan%20Yang%20and%20Jieji%20Ren%20and%20Xiangyi%20Wang%20and%20zonglin%20li%20and%20Xu%20Cao%20and%20Heng%20Guo%20and%20Zhanyu%20Ma%20and%20Boxin%20Shi&entry.1292438233=Recent%20advancements%20in%20neural%20surface%20reconstruction%20have%20significantly%20enhanced%203D%20reconstruction.%20However%2C%20current%20real%20world%20datasets%20mainly%20focus%20on%20benchmarking%20multiview%20stereo%20%28MVS%29%20based%20on%20RGB%20inputs.%20Multiview%20photometric%20stereo%20%28MVPS%29%20and%20multiview%20shape%20from%20polarization%20%28MVSfP%29%2C%20though%20indispensable%20on%20high-fidelity%20surface%20reconstruction%20and%20sparse%20inputs%2C%20have%20not%20been%20quantitatively%20assessed%20together%20with%20MVS.%20To%20determine%20the%20working%20range%20of%20different%20MVX%20%28MVS%2C%20MVSfP%2C%20and%20MVPS%29%20techniques%2C%20we%20propose%20EvalMVX%2C%20a%20real-world%20dataset%20containing%20%2425%24%20objects%2C%20each%20captured%20with%20a%20polarized%20camera%20under%20%2420%24%20varying%20views%20and%20%2417%24%20light%20conditions%20including%20OLAT%20and%20natural%20illumination%2C%20leading%20to%20%248%2C500%24%20images.%20Each%20object%20includes%20aligned%20ground-truth%203 {"title": "Leveraging Geometric Prior Uncertainty and Complementary Constraints for High-Fidelity Neural Indoor Surface Reconstruction", "author": "Qiyu Feng and Jiwei Shan and Shing Shin Cheng and Hesheng Wang", "abstract": "Neural implicit surface reconstruction with signed distance function has made significant progress, but recovering fine details such as thin structures and complex geometries remains challenging due to unreliable or noisy geometric priors. Existing approaches rely on implicit uncertainty that arises during optimization to filter these priors, which is indirect and inefficient, and masking supervision in high-uncertainty regions further leads to under-constrained optimization. To address these issues, we propose GPU-SDF, a neural implicit framework for indoor surface reconstruction that leverages geometric prior uncertainty and complementary constraints. We introduce a self-supervised module that explicitly estimates prior uncertainty without auxiliary networks. Based on this estimation, we design an uncertainty-guided loss that modulates prior influence rather than discarding it, thereby retaining weak but informative cues. To address regions with high prior uncertainty, GPU-SDF further incorporates two complementary constraints: an edge distance field that strengthens boundary supervision and a multi-view consistency regularization that enforces geometric coherence. Extensive experiments confirm that GPU-SDF improves the reconstruction of fine details and serves as a plug-and-play enhancement for existing frameworks. Source code will be available at https://github.com/IRMVLab/GPU-SDF", "link": "http://arxiv.org/abs/2602.23926v1", "date": "2026-02-27", "relevancy": 3.01, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6159}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6007}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5894}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20Geometric%20Prior%20Uncertainty%20and%20Complementary%20Constraints%20for%20High-Fidelity%20Neural%20Indoor%20Surface%20Reconstruction&body=Title%3A%20Leveraging%20Geometric%20Prior%20Uncertainty%20and%20Complementary%20Constraints%20for%20High-Fidelity%20Neural%20Indoor%20Surface%20Reconstruction%0AAuthor%3A%20Qiyu%20Feng%20and%20Jiwei%20Shan%20and%20Shing%20Shin%20Cheng%20and%20Hesheng%20Wang%0AAbstract%3A%20Neural%20implicit%20surface%20reconstruction%20with%20signed%20distance%20function%20has%20made%20significant%20progress%2C%20but%20recovering%20fine%20details%20such%20as%20thin%20structures%20and%20complex%20geometries%20remains%20challenging%20due%20to%20unreliable%20or%20noisy%20geometric%20priors.%20Existing%20approaches%20rely%20on%20implicit%20uncertainty%20that%20arises%20during%20optimization%20to%20filter%20these%20priors%2C%20which%20is%20indirect%20and%20inefficient%2C%20and%20masking%20supervision%20in%20high-uncertainty%20regions%20further%20leads%20to%20under-constrained%20optimization.%20To%20address%20these%20issues%2C%20we%20propose%20GPU-SDF%2C%20a%20neural%20implicit%20framework%20for%20indoor%20surface%20reconstruction%20that%20leverages%20geometric%20prior%20uncertainty%20and%20complementary%20constraints.%20We%20introduce%20a%20self-supervised%20module%20that%20explicitly%20estimates%20prior%20uncertainty%20without%20auxiliary%20networks.%20Based%20on%20this%20estimation%2C%20we%20design%20an%20uncertainty-guided%20loss%20that%20modulates%20prior%20influence%20rather%20than%20discarding%20it%2C%20thereby%20retaining%20weak%20but%20informative%20cues.%20To%20address%20regions%20with%20high%20prior%20uncertainty%2C%20GPU-SDF%20further%20incorporates%20two%20complementary%20constraints%3A%20an%20edge%20distance%20field%20that%20strengthens%20boundary%20supervision%20and%20a%20multi-view%20consistency%20regularization%20that%20enforces%20geometric%20coherence.%20Extensive%20experiments%20confirm%20that%20GPU-SDF%20improves%20the%20reconstruction%20of%20fine%20details%20and%20serves%20as%20a%20plug-and-play%20enhancement%20for%20existing%20frameworks.%20Source%20code%20will%20be%20available%20at%20https%3A//github.com/IRMVLab/GPU-SDF%0ALink%3A%20http%3A//arxiv.org/abs/2602.23926v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeveraging%2520Geometric%2520Prior%2520Uncertainty%2520and%2520Complementary%2520Constraints%2520for%2520High-Fidelity%2520Neural%2520Indoor%2520Surface%2520Reconstruction%26entry.906535625%3DQiyu%2520Feng%2520and%2520Jiwei%2520Shan%2520and%2520Shing%2520Shin%2520Cheng%2520and%2520Hesheng%2520Wang%26entry.1292438233%3DNeural%2520implicit%2520surface%2520reconstruction%2520with%2520signed%2520distance%2520function%2520has%2520made%2520significant%2520progress%252C%2520but%2520recovering%2520fine%2520details%2520such%2520as%2520thin%2520structures%2520and%2520complex%2520geometries%2520remains%2520challenging%2520due%2520to%2520unreliable%2520or%2520noisy%2520geometric%2520priors.%2520Existing%2520approaches%2520rely%2520on%2520implicit%2520uncertainty%2520that%2520arises%2520during%2520optimization%2520to%2520filter%2520these%2520priors%252C%2520which%2520is%2520indirect%2520and%2520inefficient%252C%2520and%2520masking%2520supervision%2520in%2520high-uncertainty%2520regions%2520further%2520leads%2520to%2520under-constrained%2520optimization.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520GPU-SDF%252C%2520a%2520neural%2520implicit%2520framework%2520for%2520indoor%2520surface%2520reconstruction%2520that%2520leverages%2520geometric%2520prior%2520uncertainty%2520and%2520complementary%2520c 20arises%20during%20optimization%20to%20filter%20these%20priors%2C%20which%20is%20indirect%20and%20inefficient%2C%20and%20masking%20supervision%20in%20high-uncertainty%20regions%20further%20leads%20to%20under-constrained%20optimization.%20To%20address%20these%20issues%2C%20we%20propose%20GPU-SDF%2C%20a%20neural%20implicit%20framework%20for%20indoor%20surface%20reconstruction%20that%20leverages%20geometric%20prior%20uncertainty%20and%20complementary%20constraints.%20We%20introduce%20a%20self-supervised%20module%20that%20explicitly%20estimates%20prior%20uncertainty%20without%20auxiliary%20networks.%20Based%20on%20this%20estimation%2C%20we%20design%20an%20uncertainty-guided%20loss%20that%20modulates%20prior%20influence%20rather%20than%20discarding%20it%2C%20thereby%20retaining%20weak%20but%20informative%20cues.%20To%20address%20regions%20with%20high%20prior%20uncertainty%2C%20GPU-SDF%20further%20incorporates%20two%20complementary%20constraints%3A%20an%20edge%20distance%20field%20that%20strengthens%20boundary%20supervision%20and%20a%20multi-view%20consistency%20regularization%20that%20enforces%20geometric%20coherence.%20Extensive%20experiments%20confirm%20that%20GPU-SDF%20improves%20the%20reconstruction%20of%20fine%20details%20and%20serves%20as%20a%20plug-and-play%20enhancement%20for%20existing%20frameworks.%20Source%20code%20will%20be%20available%20at%20https%3A//github.com/IRMVLab/GPU-SDF&entry.1838667208=http%3A//arxiv.org/abs/2602.23926v1&entry.124074799=Read"},
{"title": "A Mixed Diet Makes DINO An Omnivorous Vision Encoder", "author": "Rishabh Kabra and Maks Ovsjanikov and Drew A. Hudson and Ye Xia and Skanda Koppula and Andre Araujo and Joao Carreira and Niloy J. Mitra", "abstract": "Pre-trained vision encoders like DINOv2 have demonstrated exceptional performance on unimodal tasks. However, we observe that their feature representations are poorly aligned across different modalities. For instance, the feature embedding for an RGB image and its corresponding depth map of the same scene exhibit a cosine similarity that is nearly identical to that of two random, unrelated images. To address this, we propose the Omnivorous Vision Encoder, a novel framework that learns a modality-agnostic feature space. We train the encoder with a dual objective: first, to maximize the feature alignment between different modalities of the same scene; and second, a distillation objective that anchors the learned representations to the output of a fully frozen teacher such as DINOv2. The resulting student encoder becomes \"omnivorous\" by producing a consistent, powerful embedding for a given scene, regardless of the input modality (RGB, Depth, Segmentation, etc.). This approach enables robust cross-modal understanding while retaining the discriminative semantics of the original foundation model.", "link": "http://arxiv.org/abs/2602.24181v1", "date": "2026-02-27", "relevancy": 2.9731, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6266}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6266}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5307}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Mixed%20Diet%20M {"title": "Unsupervised Representation Learning for 3D Mesh Parameterization with Semantic and Visibility Objectives", "author": "AmirHossein Zamani and Bruno Roy and Arianna Rampini", "abstract": "Recent 3D generative models produce high-quality textures for 3D mesh objects. However, they commonly rely on the heavy assumption that input 3D meshes are accompanied by manual mesh parameterization (UV mapping), a manual task that requires both technical precision and artistic judgment. Industry surveys show that this process often accounts for a significant share of asset creation, creating a major bottleneck for 3D content creators. Moreover, existing automatic methods often ignore two perceptually important criteria: (1) semantic awareness (UV charts should align semantically similar 3D parts across shapes) and (2) visibility awareness (cutting seams should lie in regions unlikely to be seen). To overcome these shortcomings and to automate the mesh parameterization process, we present an unsupervised differentiable framework that augments standard geometry-preserving UV learning with semantic- and visibility-aware objectives. For semantic-awareness, our pipeline (i) segments the mesh into semantic 3D parts, (ii) applies an unsupervised learned per-part UV-parameterization backbone, and (iii) aggregates per-part charts into a unified UV atlas. For visibility-awareness, we use ambient occlusion (AO) as an exposure proxy and back-propagate a soft differentiable AO-weighted seam objective to steer cutting seams toward occluded regions. By conducting qualitative and quantitative evaluations against state-of-the-art methods, we show that the proposed method produces UV atlases that better support texture generation and reduce perceptible seam artifacts compared to recent baselines. Our implementation code is publicly available at: https://github.com/AHHHZ975/Semantic-Visibility-UV-Param.", "link": "http://arxiv.org/abs/2509.25094v3", "date": "2026-02-27", "relevancy": 2.9566, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6015}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5871}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5854}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unsupervised%20Representation%20Learning%20for%203D%20Mesh%20Parameterization%20with%20Semantic%20and%20Visibility%20Objectives&body=Title%3A%20Unsupervised%20Representation%20Learning%20for%203D%20Mesh%20Parameterization%20with%20Semantic%20and%20Visibility%20Objectives%0AAuthor%3A%20AmirHossein%20Zamani%20and%20Bruno%20Roy%20and%20Arianna%20Rampini%0AAbstract%3A%20Recent%203D%20generative%20models%20produce%20high-quality%20textures%20for%203D%20mesh%20objects.%20However%2C%20they%20commonly%20rely%20on%20the%20heavy%20assumption%20that%20input%203D%20meshes%20are%20accompanied%20by%20manual%20mesh%20parameterization%20%28UV%20mapping%29%2C%20a%20manual%20task%20that%20requires%20both%20technical%20precision%20and%20artistic%20judgment.%20Industry%20surveys%20show%20that%20this%20process%20often%20accounts%20for%20a%20significant%20share%20of%20asset%20creation%2C%20creating%20a%20major%20bottleneck%20for%203D%20content%20creators.%20Moreover%2C%20existing%20automatic%20methods%20often%20ignore%20two%20perceptually%20important%20criteria%3A%20%281%29%20semantic%20awareness%20%28UV%20charts%20should%20align%20semantically%20similar%203D%20parts%20across%20shapes%29%20and%20%282%29%20visibility%20awareness%20%28cutting%20seams%20should%20lie%20in%20regions%20unlikely%20to%20be%20seen%29.%20To%20overcome%20these%20shortcomings%20and%20to%20automate%20the%20mesh%20parameterization%20process%2C%20we%20present%20an%20unsupervised%20differentiable%20framework%20that%20augments%20standard%20geometry-preserving%20UV%20learning%20with%20semantic-%20and%20visibility-aware%20objectives.%20For%20semantic-awareness%2C%20our%20pipeline%20%28i%29%20segments%20the%20mesh%20into%20semantic%203D%20parts%2C%20%28ii%29%20applies%20an%20unsupervised%20learned%20per-part%20UV-parameterization%20backbone%2C%20and%20%28iii%29%20aggregates%20per-part%20charts%20into%20a%20unified%20UV%20atlas.%20For%20visibility-awareness%2C%20we%20use%20ambient%20occlusion%20%28AO%29%20as%20an%20exposure%20proxy%20and%20back-propagate%20a%20soft%20differentiable%20AO-weighted%20seam%20objective%20to%20steer%20cutting%20seams%20toward%20occluded%20regions.%20By%20conducting%20qualitative%20and%20quantitative%20evaluations%20against%20state-of-the-art%20methods%2C%20we%20show%20that%20the%20proposed%20method%20produces%20UV%20atlases%20that%20better%20support%20texture%20generation%20and%20reduce%20perceptible%20seam%20artifacts%20compared%20to%20recent%20baselines.%20Our%20implementation%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/AHHHZ975/Semantic-Visibility-UV-Param.%0ALink%3A%20http%3A//arxiv.org/abs/2509.25094v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnsupervised%2520Representation%2520Learning%2520for%25203D%2520Mesh%2520Parameterization%2520with%2520Semantic%2520and%2520Visibility%2520Objectives%26entry.906535625%3DAmirHossein%2520Zamani%2520and%2520Bruno%2520Roy%2520and%2520Arianna%2520Rampini%26entry.1292438233%3DRecent%25203D%2520generative%2520models%2520produce%2520high-quality%2520textures%2520for%25203D%2520mesh%2520objects.%2520However%252C%2520they%2520commonly%2520rely%2520on%2520the%2520heavy%2520assumption%2520that%2520input%25203D%2520meshes%2520are%2520accompanied%2520by%2520manual%2520mesh%2520parameterization%2520%2528UV%2520mapping%2529%252C%2520a%2520manual%2520task%2520that%2520requires%2520both%2520technical%2520precision% at%2520better%2520support%2520texture%2520generation%2520and%2520reduce%2520perceptible%2520seam%2520artifacts%2520compared%2520to%2520recent%2520baselines.%2520Our%2520implementation%2520code%2520is%2520publicly%2520available%2520at%253A%2520https%253A//github.com/AHHHZ975/Semantic-Visibility-UV-Param.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.25094v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unsupervised%20Representation%20Learning%20for%203D%20Mesh%20Parameterization%20with%20Semantic%20and%20Visibility%20Objectives&entry.906535625=AmirHossein%20Zamani%20and%20Bruno%20Roy%20and%20Arianna%20Rampini&entry.1292438233=Recent%203D%20generative%20models%20produce%20high-quality%20textures%20for%203D%20mesh%20objects.%20However%2C%20they%20commonly%20rely%20on%20the%20heavy%20assumption%20that%20input%203D%20meshes%20are%20accompanied%20by%20manual%20mesh%20parameterization%20%28UV%20mapping%29%2C%20a%20manual%20task%20that%20requires%20both%20technical%20precision%20and%20artistic%20judgment.%20Industry%20surveys%20show%20that%20this%20process%20often%20accounts%20for%20a%20significant%20share%20of%20asset%20creation%2C%20creating%20a%20major%20bottleneck%20for%203D%20content%20creators.%20Moreover%2C%20existing%20automatic%20methods%20often%20ignore%20two%20perceptually%20important%20criteria%3A%20%281%29%20semantic%20awareness%20%28UV%20charts%20should%20align%20semantically%20similar%203D%20parts%20across%20shapes%29%20and%20%282%29%20visibility%20awareness%20%28cutting%20seams%20should%20lie%20in%20regions%20unlikely%20to%20be%20seen%29.%20To%20overcome%20these%20shortcomings%20and%20to%20automate%20the%20mesh%20parameterization%20process%2C%20we%20present%20an%20unsupervised%20differentiable%20framework%20that%20augments%20standard%20geometry-preserving%20UV%20learning%20with%20semantic-%20and%20visibility-aware%20objectives.%20For%20semantic-awa {"title": "Extending 2D foundational DINOv3 representations to 3D segmentation of neonatal brain MR images", "author": "Annayah Usman and Behraj Khan and Tahir Qasim Syed", "abstract": "Precise volumetric delineation of hippocampal structures is essential for quantifying neurodevelopmental trajectories in pre-term and term infants, where subtle morphological variations may carry prognostic significance. While foundation encoders trained on large-scale visual data offer discriminative representations, their 2D formulation is a limitation with respect to the $3$D organization of brain anatomy. We propose a volumetric segmentation strategy that reconciles this tension through a structured window-based disassembly-reassembly mechanism: the global MRI volume is decomposed into non-overlapping 3D windows or sub-cubes, each processed via a separate decoding arm built upon frozen high-fidelity features, and subsequently reassembled prior to a ground-truth correspendence using a dense-prediction head. This architecture preserves constant a decoder memory footprint while forcing predictions to lie within an anatomically consistent geometry. Evaluated on the ALBERT dataset for hippocampal segmentation, the proposed approach achieves a Dice score of 0.65 for a single 3D window. The method demonstrates that volumetric anatomical structure could be recovered from frozen 2D foundation representations through structured compositional decoding, and offers a principled and generalizable extension for foundation models for 3D medical applications.", "link": "http://arxiv.org/abs/2602.23962v1", "date": "2026-02-27", "relevancy": 2.9372, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6039}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6039}, {"title": "TAMM: Tri 0anatomical%20structure%20could%20be%20recovered%20from%20frozen%202D%20foundation%20representations%20through%20structured%20compositional%20decoding%2C%20and%20offers%20a%20principled%20and%20generalizable%20extension%20for%20foundation%20models%20for%203D%20medical%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23962v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExtending%25202D%2520foundational%2520DINOv3%2520representations%2520to%25203D%2520segmentation%2520of%2520neonatal%2520brain%2520MR%2520images%26entry.906535625%3DAnnayah%2520Usman%2520and%2520Behraj%2520Khan%2520and%2520Tahir%2520Qasim%2520Syed%26entry.1292438233%3DPrecise%2520volumetric%2520delineation%2520of%2520hippocampal%2520structures%2520is%2520essential%2520for%2520quantifying%2520neurodevelopmental%2520trajectories%2520in%2520pre-term%2520and%2520term%2520infants%252C%2520where%2520subtle%2520morphological%2520variations%2520may%2520carry%2520prognostic%2520significance.%2520While%2520foundation%2520encoders%2520trained%2520on%2520large-scale%2520visual%2520data%2520offer%2520discriminative%2520representations%252C%2520their%25202D%2520formulation%2520is%2520a%2520limitation%2520with%2520respect%2520to%2520the%2520%25243%2524D%2520organization%2520of%2520brain%2520anatomy.%2520We%2520propose%2520a%2520volumetric%2520segmentation%2520strategy%2520that%2520reconciles%2520this%2520tension%2520through%2520a%2520structured%2520window-based%2520disassembly-reassembly%2520mechanism%253A%2520the%2520global%2520MRI%2520volume%2520is%2520decomposed%2520into%2520non-overlapping%25203D%2520windows%2520or%2520sub-cubes%252C%2520each%2520processed%2520via%2520a%2520separate%2520decoding%2520arm%2520built%2520upon%2520frozen%2520high-fidelity%2520features%252C%2520and%2520subsequently%2520reassembled%2520prior%2520to%2520a%2520ground-truth%2520correspendence%2520using%2520a%2520dense-prediction%2520head.%2520Th %20is%20decomposed%20into%20non-overlapping%203D%20windows%20or%20sub-cubes%2C%20each%20processed%20via%20a%20separate%20decoding%20arm%20built%20upon%20frozen%20high-fidelity%20features%2C%20and%20subsequently%20reassembled%20prior%20to%20a%20ground-truth%20correspendence%20using%20a%20dense-prediction%20head.%20This%20architecture%20preserves%20constant%20a%20decoder%20memory%20footprint%20while%20forcing%20predictions%20to%20lie%20within%20an%20anatomically%20consistent%20geometry.%20Evaluated%20on%20the%20ALBERT%20dataset%20for%20hippocampal%20segmentation%2C%20the%20proposed%20approach%20achieves%20a%20Dice%20score%20of%200.65%20for%20a%20single%203D%20window.%20The%20method%20demonstrates%20that%20volumetric%20anatomical%20structure%20could%20be%20recovered%20from%20frozen%202D%20foundation%20representations%20through%20structured%20compositional%20decoding%2C%20and%20offers%20a%20principled%20and%20generalizable%20extension%20for%20foundation%20models%20for%203D%20medical%20applications.&entry.1838667208=http%3A//arxiv.org/abs/2602.23962v1&entry.124074799=Read"},
{"title": "PointCoT: A Multi-modal Benchmark for Explicit 3D Geometric Reasoning", "author": "Dongxu Zhang and Yiding Sun and Pengcheng Li and Yumou Liu and Hongqiang Lin and Haoran Xu and Xiaoxuan Mu and Liang Lin and Wenbiao Yan and Ning Yang and Chaowei Fang and Juanjuan Zhao and Jihua Zhu and Conghui He and Cheng Tan", "abstract": "While Multimodal Large Language Models (MLLMs) demonstrate proficiency in 2D scenes, extending their perceptual intelligence to 3D point cloud understanding remains a significant challenge. Current approaches focus primarily on aligning 3D features with pre-trained models. However, they typically treat geometric reasoning as an implicit mapping process. These methods bypass intermediate logical steps and consequently suffer from geometric hallucinations. They confidently generate plausible responses that fail to ground in precise structural details. To bridge this gap, we present PointCoT, a novel framework that empowers MLLMs with explicit Chain-of-Thought (CoT) reasoning for 3D data. We advocate for a \\textit{Look, Think, then Answer} paradigm. In this approach, the model is supervised to generate geometry-grounded rationales before predicting final answers. To facilitate this, we construct Point-Reason-Instruct, a large-scale benchmark comprising $\\sim$86k instruction-tuning samples with hierarchical CoT annotations. By leveraging a dual-stream multi-modal architecture, our method synergizes semantic appearance with geometric truth. Extensive experiments demonstrate that PointCoT achieves state-of-the-art performance on complex reasoning tasks.", "link": "http://arxiv.org/abs/2602.23945v1", "date": "2026-02-27", "relevancy": 2.933, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5932}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5932}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5734}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PointCoT%3A%20A%20Multi-modal%20Benchmark%20for%20Explicit%203D%20Geometric%20Reasoning&body=Title%3A%20PointCoT%3A%20A%20Multi-modal%20Benchmark%20for%20Explicit%203D%20Geometric%20Reasoning%0AAuthor%3A%20Dongxu%20Zhang%20and%20Yiding%20Sun%20and%20Pengcheng%20Li%20and%20Yumou%20Liu%20and%20Hongqiang%20Lin%20and%20Haoran%20Xu%20and%20Xiaoxuan%20Mu%20and%20Liang%20Lin%20and%20Wenbiao%20Yan%20and%20Ning%20Yang%20and%20Chaowei%20Fang%20and%20Juanjuan%20Zhao%20and%20Jihua%20Zhu%20and%20Conghui%20He%20and%20Cheng%20Tan%0AAbstract%3A%20While%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20demonstrate%20proficiency%20in%202D%20scenes%2C%20extending%20their%20perceptual%20intelligence%20to%203D%20point%20cloud%20understanding%20remains%20a%20significant%20challenge.%20Current%20approaches%20focus%20primarily%20on%20aligning%203D%20features%20with%20pre-trained%20models.%20However%2C%20they%20typically%20treat%20geometric%20reasoning%20as%20an%20implicit%20mapping%20process.%20These%20methods%20bypass%20intermediate%20logical%20steps%20and%20consequently%20suffer%20from%20geometric%20hallucinations.%20They%20confidently%20generate%20plausible%20responses%20that%20fail%20to%20ground%20in%20precise%20structural%20details.%20To%20bridge%20this%20gap%2C%20we%20present%20PointCoT%2C%20a%20novel%20framework%20that%20empowers%20MLLMs%20with%20explicit%20Chain-of-Thought%20%28CoT%29%20reasoning%20for%203D%20data.%20We%20advocate%20for%20a%20%5Ctextit%7BLook%2C%20Think%2C%20then%20Answer%7D%20paradigm.%20In%20this%20approach%2C%20the%20model%20is%20supervised%20to%20generate%20geometry-grounded%20rationales%20before%20predicting%20final%20answers.%20To%20facilitate%20this%2C%20we%20construct%20Point-Reason-Instruct%2C%20a%20large-scale%20benchmark%20comprising%20%24%5Csim%2486k%20instruction-tuning%20samples%20with%20hierarchical%20CoT%20annotations.%20By%20leveraging%20a%20dual-stream%20multi-modal%20architecture%2C%20our%20method%20synergizes%20semantic%20appearance%20with%20geometric%20truth.%20Extensive%20experiments%20demonstrate%20that%20PointCoT%20achieves%20state-of-the-art%20performance%20on%20complex%20reasoning%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23945v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPointCoT%253A%2520A%2520Multi-modal%2520Benchmark%2520for%2520Explicit%25203D%2520Geometric%2520Reasoning%26entry.906535625%3DDongxu%2520Zhang%2520and%2520Yiding%2520Sun%2520and%2520Pengcheng%2520Li%2520and%2520Yumou%2520Liu%2520and%2520Hongqiang%2520Lin%2520and%2520Haoran%2520Xu%2520and%2520Xiaoxuan%2520Mu%2520and%2520Liang%2520Lin%2520and%2520Wenbiao%2520Yan%2520and%2520Ning%2520Yang%2520and%2520Chaowei%2520Fang%2520and%2520Juanjuan%2520Zhao%2520and%2520Jihua%2520Zhu%2520and%2520Conghui%2520He%2520and%2520Cheng%2520Tan%26entry.1292438233%3DWhile%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520demonstrate%2520proficiency%2520in%25202D%2520scenes%252C%2520extending%2520their%2520perceptual%2520intelligence%2520to%25203D%2520point%2520cloud%2520understanding%2520remains%2520a%2520significant%2520challenge.%2520Current%2520approaches%2520focus%2520primarily%2520on%2520aligning%25203D%2520features%2520with%2520pre-trained%2520models.%2520However%252C%2520they%2520typically%2520treat%2520geometric%2520reasoning%2520as%2520an%2520implicit%2520mapping%2520process.%2520These%2520methods%2520bypass%2520intermediate%2520logical%2520steps%2520and%2520consequently%2520suffer%2520from%2520geometric%2520hallucinations.%2520They%2520confidently%2520generate%2520plausible%2520responses%2520that%2520fail%2520to%2520ground%2520in%2520precise%2520structural%2520details.%2520To%25 {"title": "Fixed Anchors Are Not Enough: Dynamic Retrieval and Persistent Homology for Dataset Distillation", "author": "Muquan Li and Hang Gou and Yingyi Ma and Rongzheng Wang and Ke Qin and Tao He", "abstract": "Decoupled dataset distillation (DD) compresses large corpora into a few synthetic images by matching a frozen teacher's statistics. However, current residual-matching pipelines rely on static real patches, creating a fit-complexity gap and a pull-to-anchor effect that reduce intra-class diversity and hurt generalization. To address these issues, we introduce RETA -- a Retrieval and Topology Alignment framework for decoupled DD. First, Dynamic Retrieval Connection (DRC) selects a real patch from a prebuilt pool by minimizing a fit-complexity score in teacher feature space; the chosen patch is injected via a residual connection to tighten feature fit while controlling injected complexity. Second, Persistent Topology Alignment (PTA) regularizes synthesis with persistent homology: we build a mutual k-NN feature graph, compute persistence images of components and loops, and penalize topology discrepancies between real and synthetic sets, mitigating pull-to-anchor effect. Across CIFAR-100, Tiny-ImageNet, ImageNet-1K, and multiple ImageNet subsets, RETA consistently outperforms various baselines under comparable time and memory, especially reaching 64.3% top-1 accuracy on ImageNet-1K with ResNet-18 at 50 images per class, +3.1% over the best prior.", "link": "http://arxiv.org/abs/2602.24144v1", "date": "2026-02-27", "relevancy": 2.9268, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.593}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5871}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "li {"title": "Small Drafts, Big Verdict: Information-Intensive Visual Reasoning via Speculation", "author": "Yuhan Liu and Lianhui Qin and Shengjie Wang", "abstract": "Large Vision-Language Models (VLMs) have achieved remarkable progress in multimodal understanding, yet they struggle when reasoning over information-intensive images that densely interleave textual annotations with fine-grained graphical elements. The main challenges lie in precisely localizing critical cues in dense layouts and multi-hop reasoning to integrate dispersed evidence. We propose Speculative Verdict (SV), a training-free framework inspired by speculative decoding that combines multiple lightweight draft experts with a large verdict model. In the draft stage, small VLMs act as draft experts to generate reasoning paths that provide diverse localization candidates; in the verdict stage, a strong VLM synthesizes these paths to produce the final answer, minimizing computational cost while recovering correct answers. To further improve efficiency and accuracy, SV introduces a consensus expert selection mechanism that forwards only high-agreement reasoning paths to the verdict. Empirically, SV achieves consistent gains on challenging information-intensive and high-resolution visual question answering benchmarks, including InfographicVQA, ChartMuseum, ChartQAPro, and HR-Bench 4K. By synthesizing correct insights from multiple partially accurate reasoning paths, SV achieves both error correction and cost-efficiency compared to large proprietary models or training pipelines. Code is available at https://github.com/Tinaliu0123/speculative-verdict.", "link": "http://arxiv.org/abs/2510.20812v4", "date": "2026-02-27", "relevancy": 2.9194, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "simila

{"title": "Natural Language Interfaces for Spatial and Temporal Databases: A Comprehensive Overview of Methods, Taxonomy, and Future Directions", "author": "Samya Acharja and Kanchan Chowdhury", "abstract": "The task of building a natural language interface to a database, known as NLIDB, has recently gained significant attention from both the database and Natural Language Processing (NLP) communities. With the proliferation of geospatial datasets driven by the rapid emergence of location-aware sensors, geospatial databases play a vital role in supporting geospatial applications. However, querying geospatial and temporal databases differs substantially from querying traditional relational databases due to the presence of geospatial topological operators and temporal operators. To bridge the gap between geospatial query languages and non-expert users, the geospatial research community has increasingly focused on developing NLIDBs for geospatial databases. Yet, existing research remains fragmented across systems, datasets, and methodological choices, making it difficult to clearly understand the landscape of existing methods, their strengths and weaknesses, and opportunities for future research. Existing surveys on NLIDBs focus on general-purpose database systems and do not treat geospatial and temporal databases as primary focus for analysis. To address this gap, this paper presents a comprehensive survey of studies on NLIDBs for geospatial and temporal databases. Specifically, we provide a detailed overview of datasets, evaluation metrics, and the taxonomy of the methods for geospatial and temporal NLIDBs, as well as a comparative analysis of the existing methods. Our survey reveals recurring trends in existing methods, substantial variation in datasets and evaluation practices, and several open challenges that continue to hinder progress in this area. Based on these findings, we identify promising directions for future research to advance natural language interfaces to geospatial and temporal databases.", "link": "http://arxiv.org/abs/2603.23375v1", "date": "2026-03-24", "relevancy": 2.3364, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4825}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4825}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Natural%20Language%20Interfaces%20for%20Spatial%20and%20Temporal%20Databases%3A%20A%20Comprehensive%20Overview%20of%20Methods%2C%20Taxonomy%2C%20and%20Future%20Directions&body=Title%3A%20Natural%20Language%20Interfaces%20for%20Spatial%20and%20Temporal%20Databases%3A%20A%20Comprehensive%20Overview%20of%20Methods%2C%20Taxonomy%2C%20and%20Future%20Directions%0AAuthor%3A%20Samya%20Acharja%20and%20Kanchan%20Chowdhury%0AAbstract%3A%20The%20task%20of%20building%20a%20natural%20language%20interface%20to%20a%20database%2C%20known%20as%20NLIDB%2C%20has%20recently%20gained%20significant%20attention%20from%20both%20the%20database%20and%20Natural%20Language%20Processing%20%28NLP%29%20communities.%20With%20the%20proliferation%20of%20geospatial%20datasets%20driven%20by%20the%20rapid%20emergence%20of%20location-aware%20sensors%2C%20geospatial%20databases%20play%20a%20vital%20role%20in%20supporting%20geospatial%20applications.%20However%2C%20querying%20geospatial%20and%20temporal%20databases%20differs%20substantially%20from%20querying%20traditional%20relational%20databases%20due%20to%20the%20presence%20of%20geospatial%20topological%20operators%20and%20temporal%20operators.%20To%20bridge%20the%20gap%20between%20geospatial%20query%20languages%20and%20non-expert%20users%2C%20the%20geospatial%20research%20community%20has%20increasingly%20focused%20on%20developing%20NLIDBs%20for%20geospatial%20databases.%20Yet%2C%20existing%20research%20remains%20fragmented%20across%20systems%2C%20datasets%2C%20and%20methodological%20choices%2C%20making%20it%20difficult%20to%20clearly%20understand%20the%20landscape%20of%20existing%20methods%2C%20their%20strengths%20and%20weaknesses%2C%20and%20opportunities%20for%20future%20research.%20Existing%20surveys%20on%20NLIDBs%20focus%20on%20general-purpose%20database%20systems%20and%20do%20not%20treat%20geospatial%20and%20temporal%20databases%20as%20primary%20focus%20for%20analysis.%20To%20address%20this%20gap%2C%20this%20paper%20presents%20a%20comprehensive%20survey%20of%20studies%20on%20NLIDBs%20for%20geospatial%20and%20temporal%20databases.%20Specifically%2C%20we%20provide%20a%20detailed%20overview%20of%20datasets%2C%20evaluation%20metrics%2C%20and%20the%20taxonomy%20of%20the%20methods%20for%20geospatial%20and%20temporal%20NLIDBs%2C%20as%20well%20as%20a%20comparative%20analysis%20of%20the%20existing%20methods.%20Our%20survey%20reveals%20recurring%20trends%20in%20existing%20methods%2C%20substantial%20variation%20in%20datasets%20and%20evaluation%20practices%2C%20and%20several%20open%20challenges%20that%20continue%20to%20hinder%20progress%20in%20this%20area.%20Based%20on%20these%20findings%2C%20we%20identify%20promising%20directions%20for%20future%20research%20to%20advance%20natural%20language%20interfaces%20to%20geospatial%20and%20temporal%20databases.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23375v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNatural%2520Language%2520Interfaces%2520for%2520Spatial%2520and%2520Temporal%2520Databases%253A%2520A%2520Comprehensive%2520Overview%2520of%2520Methods%252C%2520Taxonomy%252C%2520and%2520Future%2520Directions%26entry.906535625%3DSamya%2520Acharja%2520and%2520Kanchan%2520Chowdhury%26entry.1292438233%3DThe%252 {"title": "Uncertainty-guided Compositional Alignment with Part-to-Whole Semantic Representativeness in Hyperbolic Vision-Language Models", "author": "Hayeon Kim and Ji Ha Jang and Junghun James Kim and Se Young Chun", "abstract": "While Vision-Language Models (VLMs) have achieved remarkable performance, their Euclidean embeddings remain limited in capturing hierarchical relationships such as part-to-whole or parent-child structures, and often face challenges in multi-object compositional scenarios. Hyperbolic VLMs mitigate this issue by better preserving hierarchical structures and modeling part-whole relations (i.e., whole scene and its part images) through entailment. However, existing approaches do not model that each part has a different level of semantic representativeness to the whole. We propose UNcertainty-guided Compositional Hyperbolic Alignment (UNCHA) for enhancing hyperbolic VLMs. UNCHA models part-to-whole semantic representativeness with hyperbolic uncertainty, by assigning lower uncertainty to more representative parts and higher uncertainty to less representative ones for the whole scene. This representativeness is then incorporated into the contrastive objective with uncertainty-guided weights. Finally, the uncertainty is further calibrated with an entailment loss regularized by entropy-based term. With the proposed losses, UNCHA learns hyperbolic embeddings with more accurate part-whole ordering, capturing the underlying compositional structure in an image and improving its understanding of complex multi-object scenes. UNCHA achieves state-of-the-art performance on zero-shot classification, retrieval, and multi-label classification benchmarks. Our code and models are available at: https://github.com/jeeit17/UNCHA.git.", "link": "http://arxiv.org/abs/2603.22042v2", "date": "2026-03-24", "relevancy": 2.3312, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6038}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5923}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uncertainty-guided%20Compositional%20Alignment%20with%20Part-to-Whole%20Semantic%20Representativeness%20in%20Hyperbolic%20Vision-Language%20Models&body=Title%3A%20Uncertainty-guided%20Compositional%20Alignment%20with%20Part-to-Whole%20Semantic%20Representativeness%20in%20Hyperbolic%20Vision-Language%20Models%0AAuthor%3A%20Hayeon%20Kim%20and%20Ji%20Ha%20Jang%20and%20Junghun%20James%20Kim%20and%20Se%20Young%20Chun%0AAbstract%3A%20While%20Vision-Language%20Models%20%28VLMs%29%20have%20achieved%20remarkable%20performance%2C%20their%20Euclidean%20embeddings%20remain%20limited%20in%20capturing%20hierarchical%20relationships%20such%20as%20part-to-whole%20or%20parent-child%20structures%2C%20and%20often%20face%20challenges%20in%20multi-object%20compositional%20scenarios.%20Hyperbolic%20VLMs%20mitigate%20this%20issue%20by%20better%20preserving%20hierarchical%20structures%20and%20modeling%20part-whole%20relations%20%28i.e.%2C%20whole%20scene%20and%20its%20part%20images%29%20through%20entailment.%20However%2C%20existing%20approaches%20do%20not%20model%20that%20each%20part%20has%20a%20different%20level%20of%20semantic%20representativeness%20to%20the%20whole.%20We%20propose%20UNcertainty-guided%20Compositional%20Hyperbolic%20Alignment%20%28UNCHA%29%20for%20enhancing%20hyperbolic%20VLMs.%20UNCHA%20models%20part-to-whole%20semantic%20representativeness%20with%20hyperbolic%20uncertainty%2C%20by%20assigning%20lower%20uncertainty%20to%20more%20representative%20parts%20and%20higher%20uncertainty%20to%20less%20representative%20ones%20for%20the%20whole%20scene.%20This%20representativeness%20is%20then%20incorporated%20into%20the%20contrastive%20objective%20with%20uncertainty-guided%20weights.%20Finally%2C%20the%20uncertainty%20is%20further%20calibrated%20with%20an%20entailment%20loss%20regularized%20by%20entropy-based%20term.%20With%20the%20proposed%20losses%2C%20UNCHA%20learns%20hyperbolic%20embeddings%20with%20more%20accurate%20part-whole%20ordering%2C%20capturing%20the%20underlying%20compositional%20structure%20in%20an%20image%20and%20improving%20its%20understanding%20of%20complex%20multi-object%20scenes.%20UNCHA%20achieves%20state-of-the-art%20performance%20on%20zero-shot%20classification%2C%20retrieval%2C%20and%20multi-label%20classification%20benchmarks.%20Our%20code%20and%20models%20are%20available%20at%3A%20https%3A//github.com/jeeit17/UNCHA.git.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22042v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUncertainty-guided%2520Compositional%2520Alignment%2520with%2520Part-to-Whole%2520Semantic%2520Representativeness%2520in%2520Hyperbolic%2520Vision-Language%2520Models%26entry.906535625%3DHayeon%2520Kim%2520and%2520Ji%2520Ha%2520Jang%2520and%2520Junghun%2520James%2520Kim%2520and%2520Se%2520Young%2520Chun%26entry.1292438233%3DWhile%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520performance%252C%2520their%2520Euclidean%2520embeddings%2520remain%2520limited%2520in%2520capturing%2520hierarchical%2520relationships%2520such%2520as%2520part-to-whole%2520or%2520parent-child%2520structures%252C%2520and%2520often%2520face%2520challenges%2520in%2520multi-object%2520compositional%2520scenarios.%2520Hyperbolic%2520VLMs%2520mitigate%2520this%2520issue%2520by%2520better%2520preserving%2520hierarchical%2520structures%2520and%2520modeling%2520part-whole%2520relations%2520%2528i.e.%252C%2520whole%2520scene%2520and%2520its%2520part%2520images%2529%2520through%2520entailm {"title": "MSR-HuBERT: Self-supervised Pre-training for Adaptation to Multiple Sampling Rates", "author": "Zikang Huang and Meng Ge and Tianrui Wang and Xuanchen Li and Xiaobao Wang and Longbiao Wang and Jianwu Dang", "abstract": "Self-supervised learning (SSL) has advanced speech processing. However, existing speech SSL methods typically assume a single sampling rate and struggle with mixed-rate data due to temporal resolution mismatch. To address this limitation, we propose MSRHuBERT, a multi-sampling-rate adaptive pre-training method. Building on HuBERT, we replace its single-rate downsampling CNN with a multi-sampling-rate adaptive downsampling CNN that maps raw waveforms from different sampling rates to a shared temporal resolution without resampling. This design enables unified mixed-rate pre-training and fine-tuning. In experiments spanning 16 to 48 kHz, MSRHuBERT outperforms HuBERT on speech recognition and full-band speech reconstruction, preserving high-frequency detail while modeling low-frequency semantic structure. Moreover, MSRHuBERT retains HuBERT's mask-prediction objective and Transformer encoder, so existing analyses and improvements that were developed for HuBERT can apply directly.", "link": "http://arxiv.org/abs/2603.23048v1", "date": "2026-03-24", "relevancy": 2.3307, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4733}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4702}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.455}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MSR-HuBERT%3A%20Self-supervised%20Pre-training%20for%20Adaptation%20to%20Multiple%20Sampling%20Rates&bo {"title": "YOLOv10 with Kolmogorov-Arnold networks and vision-language foundation models for interpretable object detection and trustworthy multimodal AI in computer vision perception", "author": "Marios Impraimakis and Daniel Vazquez and Feiyu Zhou", "abstract": "The interpretable object detection capabilities of a novel Kolmogorov-Arnold network framework are examined here. The approach refers to a key limitation in computer vision for autonomous vehicles perception, and beyond. These systems offer limited transparency regarding the reliability of their confidence scores in visually degraded or ambiguous scenes. To address this limitation, a Kolmogorov-Arnold network is employed as an interpretable post-hoc surrogate to model the trustworthiness of the You Only Look Once (Yolov10) detections using seven geometric and semantic features. The additive spline-based structure of the Kolmogorov-Arnold network enables direct visualisation of each feature's influence. This produces smooth and transparent functional mappings that reveal when the model's confidence is well supported and when it is unreliable. Experiments on both Common Objects in Context (COCO), and images from the University of Bath campus demonstrate that the framework accurately identifies low-trust predictions under blur, occlusion, or low texture. This provides actionable insights for filtering, review, or downstream risk mitigation. Furthermore, a bootstrapped language-image (BLIP) foundation model generates descriptive captions of each scene. This tool enables a lightweight multimodal interface without affecting the interpretability layer. The resulting system delivers interpretable object detection with trustworthy confidence estimates. It offers a powerful tool for transparent and practical perception component for autonomous and multimodal artificial intelligence applications.", "link": "http://arxiv.org/abs/2603.23037v1", "date": "2026-03-24", "relevancy": 2.3241, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5926}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5846}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20YOLOv10%20with%20Kolmogorov-Arnold%20networks%20and%20vision-language%20foundation%20models%20for%20interpretable%20object%20detection%20and%20trustworthy%20multimodal%20AI%20in%20computer%20vision%20perception&body=Title%3A%20YOLOv10%20with%20Kolmogorov-Arnold%20networks%20and%20vision-language%20foundation%20models%20for%20interpretable%20object%20detection%20and%20trustworthy%20multimodal%20AI%20in%20computer%20vision%20perception%0AAuthor%3A%20Marios%20Impraimakis%20and%20Daniel%20Vazquez%20and%20Feiyu%20Zhou%0AAbstract%3A%20The%20interpretable%20object%20detection%20capabilities%20of%20a%20novel%20Kolmogorov-Arnold%20network%20framework%20are%20examined%20here.%20The%20approach%20refers%20to%20a%20key%20limitation%20in%20computer%20vision%20for%20autonomous%20vehicles%20perception%2C%20and%20beyond.%20These%20systems%20offer%20limited%20transparency%20regarding%20the%20reliability%20of%20their%20confidence%20scores%20in%20visually%20degraded%20or%20ambiguous%20scenes.%20To%20address%20this%20limitation%2C%20a%20Kolmogorov-Arnold%20network%20is%20employed%20as%20an%20interpretable%20post-hoc%20surrogate%20to%20model%20the%20trustworthiness%20of%20the%20You%20Only%20Look%20Once%20%28Yolov10%29%20detections%20using%20seven%20geometric%20and%20semantic%20features.%20The%20additive%20spline-based%20structure%20of%20the%20Kolmogorov-Arnold%20network%20enables%20direct%20visualisation%20of%20each%20feature%27s%20influence.%20This%20produces%20smooth%20and%20transparent%20functional%20mappings%20that%20reveal%20when%20the%20model%27s%20confidence%20is%20well%20supported%20and%20when%20it%20is%20unreliable.%20Experiments%20on%20both%20Common%20Objects%20in%20Context%20%28COCO%29%2C%20and%20images%20from%20the%20University%20of%20Bath%20campus%20demonstrate%20that%20the%20framework%20accurately%20identifies%20low-trust%20predictions%20under%20blur%2C%20occlusion%2C%20or%20low%20texture.%20This%20provides%20actionable%20insights%20for%20filtering%2C%20review%2C%20or%20downstream%20risk%20mitigation.%20Furthermore%2C%20a%20bootstrapped%20language-image%20%28BLIP%29%20foundation%20model%20generates%20descriptive%20captions%20of%20each%20scene.%20This%20tool%20enables%20a%20lightweight%20multimodal%20interface%20without%20affecting%20the%20interpretability%20layer.%20The%20resulting%20system%20delivers%20interpretable%20object%20detection%20with%20trustworthy%20confidence%20estimates.%20It%20offers%20a%20powerful%20tool%20for%20transparent%20and%20practical%20perception%20component%20for%20autonomous%20and%20multimodal%20artificial%20intelligence%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23037v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DYOLOv10%2520with%2520Kolmogorov-Arnold%2520networks%2520and%2520vision-language%2520foundation%2520models%2520for%2520interpretable%2520object%2520detection%2520and%2520trustworthy%2520multimodal%2520AI%2520in%2520computer%2520vision%2520perception%26entry.906535625%3DMarios%2520Impraimakis%2520and%2520Daniel%2520Vazquez%2520and%2520Feiyu%2520Zhou%26entry.1292438233%3DThe%2520interpretable%2520object%2520detection%2520capabilities%2520of%2520a%2520novel%2520Kolmogorov-Arnold%2520network%2520framework%2520are%2520examined%2520here.%2520 {"title": "HUydra: Full-Range Lung CT Synthesis via Multiple HU Interval Generative Modelling", "author": "Ant\u00f3nio Cardoso and Pedro Sousa and Tania Pereira and H\u00e9lder P. Oliveira", "abstract": "Currently, a central challenge and bottleneck in the deployment and validation of computer-aided diagnosis (CAD) models within the field of medical imaging is data scarcity. For lung cancer, one of the most prevalent types worldwide, limited datasets can delay diagnosis and have an impact on patient outcome. Generative AI offers a promising solution for this issue, but dealing with the complex distribution of full Hounsfield Unit (HU) range lung CT scans is challenging and remains as a highly computationally demanding task. This paper introduces a novel decomposition strategy that synthesizes CT images one HU interval at a time, rather than modelling the entire HU domain at once. This framework focuses on training generative architectures on individual tissue-focused HU windows, then merges their output into a full-range scan via a learned reconstruction network that effectively reverses the HU-windowing process. We further propose multi-head and multi-decoder models to better capture textures while preserving anatomical consistency, with a multi-head VQVAE achieving the best performance for the generative task. Quantitative evaluation shows this approach significantly outperforms conventional 2D full-range baselines, achieving a 6.2% improvement in FID and superior MMD, Precision, and Recall across all HU intervals. The best performance is achieved by a multi-head VQVAE variant, demonstrating that it is possible to enhance visual fidelity and variability while also reducing model complexity and computational cost. This work establishes a new paradigm for structure-aware medical image synthesis, aligning generative modelling with clinical interpretation.", "link": "http://arxiv.org/abs/2603.23041v1", "date": "2026-03-24", "relevancy": 2.32, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5834}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5834}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5627}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HUydra%3A%20Full-Range%20Lung%20CT%20Synthesis%20via%20Multiple%20HU%20Interval%20Generative%20Modelling&body=Title%3A%20HUydra%3A%20Full-Range%20Lung%20CT%20Synthesis%20via%20Multiple%20HU%20Interval%20Generative%20Modelling%0AAuthor%3A%20Ant%C3%B3nio%20Cardoso%20and%20Pedro%20Sousa%20and%20Tania%20Pereira%20and%20H%C3%A9lder%20P.%20Oliveira%0AAbstract%3A%20Currently%2C%20a%20central%20challenge%20and%20bottleneck%20in%20the%20deployment%20and%20validation%20of%20computer-aided%20diagnosis%20%28CAD%29%20models%20within%20the%20field%20of%20medical%20imaging%20is%20data%20scarcity.%20For%20lung%20cancer%2C%20one%20of%20the%20most%20prevalent%20types%20worldwide%2C%20limited%20datasets%20can%20delay%20diagnosis%20and%20have%20an%20impact%20on%20patient%20outcome.%20Generative%20AI%20offers%20a%20promising%20solution%20for%20this%20issue%2C%20but%20dealing%20with%20the%20complex%20distribution%20of%20full%20Hounsfield%20Unit%20%28HU%29%20range%20lung%20CT%20scans%20is%20challenging%20and%20remains%20as%20a%20highly%20computationally%20demanding%20task.%20This%20paper%20introduces%20a%20novel%20decomposition%20strategy%20that%20synthesizes%20CT%20images%20one%20HU%20interval%20at%20a%20time%2C%20rather%20than%20modelling%20the%20entire%20HU%20domain%20at%20once.%20This%20framework%20focuses%20on%20training%20generative%20architectures%20on%20individual%20tissue-focused%20HU%20windows%2C%20then%20merges%20their%20output%20into%20a%20full-range%20scan%20via%20a%20learned%20reconstruction%20network%20that%20effectively%20reverses%20the%20HU-windowing%20process.%20We%20further%20propose%20multi-head%20and%20multi-decoder%20models%20to%20better%20capture%20textures%20while%20preserving%20anatomical%20consistency%2C%20with%20a%20multi-head%20VQVAE%20achieving%20the%20best%20performance%20for%20the%20generative%20task.%20Quantitative%20evaluation%20shows%20this%20approach%20significantly%20outperforms%20conventional%202D%20full-range%20baselines%2C%20achieving%20a%206.2%25%20improvement%20in%20FID%20and%20superior%20MMD%2C%20Precision%2C%20and%20Recall%20across%20all%20HU%20intervals.%20The%20best%20performance%20is%20achieved%20by%20a%20multi-head%20VQVAE%20variant%2C%20demonstrating%20that%20it%20is%20possible%20to%20enhance%20visual%20fidelity%20and%20variability%20while%20also%20reducing%20model%20complexity%20and%20computational%20cost.%20This%20work%20establishes%20a%20new%20paradigm%20for%20structure-aware%20medical%20image%20synthesis%2C%20aligning%20generative%20modelling%20with%20clinical%20interpretation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23041v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHUydra%253A%2520Full-Range%2520Lung%2520CT%2520Synthesis%2520via%2520Multiple%2520HU%2520Interval%2520Generative%2520Modelling%26entry.906535625%3DAnt%25C3%25B3nio%2520Cardoso%2520and%2520Pedro%2520Sousa%2520and%2520Tania%2520Pereira%2520and%2520H%25C3%25A9lder%2520P.%2520Oliveira%26entry.1292438233%3DCurrently%252C%2520a%2520central%2520challenge%2520and%2520bottleneck%2520in%2520the%2520deployment%2520and%2520validation%2520of%2520computer-aided%2520diagnosis%2520%2528CAD%2529%2520models%2520within%2520the%2520field%2520of%2520medical%2520imaging%2520is%2520data%2520scarcity.%2520For%2520lung%2520cancer%252C%2520one%2520of%2520the%2520most%2520prevalent%2520types%2520worldwide%252C%2520limited%2520datasets%2520can%2520delay%2520diagnosis%2520and%2520have%2520an%2520impact%2520on%2520patient%2520outcome.%2520Generative%2520AI%2520offers%2520a%2520promising%2520solution%2520for%2520this%2520issue%252C%2520but%2520dealing%2520with%2520the%2520complex%2520distribution%2520of%2520full%2520Hounsfield%2520Unit%2520%2528HU%2529%2520range%2520lung%2520CT%2520scans%2520is%2520challenging%2520and%2520remains%2520as%2520a%2520highly%2520computationally%2520demanding%2520task.%2520This%2520paper%2520introduces%2520a%2520novel%2520decomposition%2520strategy%2520that%2520synthesizes%2520CT%2520images%2520one%2520HU%2520interval%2520at%2520a%2520time%252C%2520rather%2520than%2520modelling%2520the%2520entire%2520HU%2520domain%2520at%2520once.%2520This%2520framework%2520focuses%2520on%2520training%2520generative%2520architectures%2520on%2520individual%2520tissue-focused%2520HU%2520windows%252C%2520then%2520merges%2520their%2520output%2520into%2520a%2520full-range%2520scan%2520via%2520a%2520learned%2520reconstruction%2520network%2520that%2520effectively%2520reverses%2520the%2520HU-windowing%2520process.%2520We%2520further%2520propose%2520multi-head%2520and%2520multi-decoder%2520models%2520to%2520better%2520capture%2520textures%2520while%2520preserving%2520anatomical%2520consistency%252C%2520with%2520a%2520multi-head%2520VQVAE%2520achieving%2520the%2520best%2520performance%2520for%2520the%2520generative%2520task.%2520Quantitative%2520evaluation%2520shows%2520this%2520approach%2520significantly%2520outperforms%2520conventional%25202D%2520full-range%2520baselines%252C%2520achieving%2520a%25206.2%2525%2520improvement%2520in%2520FID%2520and%2520superior%2520MMD%252C%2520Precision%252C%2520and%2520Recall%2520across%2520all%2520HU%2520intervals.%2520The%2520best%2520performance%2520is%2520achieved%2520by%2520a%2520multi-head%2520VQVAE%2520variant%252C%2520demonstrating%2520that%2520it%2520is%2520possible%2520to%2520enhance%2520visual%2520fidelity%2520and%2520variability%2520while%2520also%2520reducing%2520model%2520complexity%2520and%2520computational%2520cost.%2520This%2520work%2520establishes%2520a%2520new%2520paradigm%2520for%2520structure-aware%2520medical%2520image%2520synthesis%252C%2520aligning%2520generative%2520modelling%2520with%2520clinical%2520interpretation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23041v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HUydra%3A%20Full-Range%20Lung%20CT%20Synthesis%20via%20Multiple%20HU%20Interval%20Generative%20Modelling&entry.906535625=Ant%C3%B3nio%20Cardoso%20and%20Pedro%20Sousa%20and%20Tania%20Pereira%20and%20H%C3%A9lder%20P.%20Oliveira&entry.1292438233=Currently%2C%20a%20central%20challenge%20and%20bottleneck%20in%20the%20deployment%20and%20validation%20of%20computer-aided%20diagnosis%20%28CAD%29%20models%20within%20the%20field%20of%20medical%20imaging%20is%20data%20scarcity.%20For%20lung%20cancer%2C%20one%20of%20the%20most%20prevalent%20types%20worldwide%2C%20limited%20datasets%20can%20delay%20diagnosis%20and%20have%20an%20impact%20on%20patient%20outcome.%20Generative%20AI%20offers%20a%20promising%20solution%20for%20this%20issue%2C%20but%20dealing%20with%20the%20complex%20distribution%20of%20full%20Hounsfield%20Unit%20%28HU%29%20range%20lung%20CT%20scans%20is%20challenging%20and%20remains%20as%20a%20highly%20computationally%20demanding%20task.%20This%20paper%20introduces%20a%20novel%20decomposition%20strategy%20that%20synthesizes%20CT%20images%20one%20HU%20interval%20at%20a%20time%2C%20rather%20than%20modelling%20the%20entire%20HU%20domain%20at%20once.%20This%20framework%20focuses%20on%20training%20generative%20architectures%20on%20individual%20tissue-focused%20HU%20windows%2C%20then%20merges%20their%20output%20into%20a%20full-range%20scan%20via%20a%20learned%20reconstruction%20network%20that%20effectively%20reverses%20the%20HU-windowing%20process.%20We%20further%20propose%20multi-head%20and%20multi-decoder%20models%20to%20better%20capture%2 {"title": "Between Resolution Collapse and Variance Inflation: Weighted Conformal Anomaly Detection in Low-Data Regimes", "author": "Oliver Hennh\u00f6fer and Christine Preisach", "abstract": "Standard conformal anomaly detection provides marginal finite-sample guarantees under the assumption of exchangeability . However, real-world data often exhibit distribution shifts, necessitating a weighted conformal approach to adapt to local non-stationarity. We show that this adaptation induces a critical trade-off between the minimum attainable p-value and its stability. As importance weights localize to relevant calibration instances, the effective sample size decreases. This can render standard conformal p-values overly conservative for effective error control, while the smoothing technique used to mitigate this issue introduces conditional variance, potentially masking anomalies. We propose a continuous inference relaxation that resolves this dilemma by decoupling local adaptation from tail resolution via continuous weighted kernel density estimation. While relaxing finite-sample exactness to asymptotic validity, our method eliminates Monte Carlo variability and recovers the statistical power lost to discretization. Empirical evaluations confirm that our approach not only restores detection capabilities where discrete baselines yield zero discoveries, but outperforms standard methods in statistical power while maintaining valid marginal error control in practice.", "link": "http://arxiv.org/abs/2603.23205v1", "date": "2026-03-24", "relevancy": 2.3194, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.47}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4623}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4593}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Between%20Resolution%20Collapse%20and%20Variance%20Inflation%3A%20Weighted%20Conformal%20Anomaly%20Detection%20in%20Low-Data%20Regimes&body=Title%3A%20Between%20Resolution%20Collapse%20and%20Variance%20Inflation%3A%20Weighted%20Conformal%20Anomaly%20Detection%20in%20Low-Data%20Regimes%0AAuthor%3A%20Oliver%20Hennh%C3%B6fer%20and%20Christine%20Preisach%0AAbstract%3A%20Standard%20conformal%20anomaly%20detection%20provides%20marginal%20finite-sample%20guarantees%20under%20the%20assumption%20of%20exchangeability%20.%20However%2C%20real-world%20data%20often%20exhibit%20distribution%20shifts%2C%20necessitating%20a%20weighted%20conformal%20approach%20to%20adapt%20to%20local%20non-stationarity.%20We%20show%20that%20this%20adaptation%20induces%20a%20critical%20trade-off%20between%20the%20minimum%20attainable%20p-value%20and%20its%20stability.%20As%20importance%20weights%20localize%20to%20relevant%20calibration%20instances%2C%20the%20effective%20sample%20size%20decreases.%20This%20can%20render%20standard%20conformal%20p-values%20overly%20conservative%20for%20effective%20error%20control%2C%20while%20the%20smoothing%20technique%20used%20to%20mitigate%20this%20issue%20introduces%20conditional%20variance%2C%20potentially%20masking%20anomalies.%20We%20propose%20a%20continuous%20inference%20relaxation%20that%20resolves%20this%20dilemma%20by%20decoupling%20local%20adaptation%20from%20tail%20resolution%20via%20continuous%20weighted%20kernel%20density%20estimation.%20While%20relaxing%20finite-sample%20exactness%20to%20asymptotic%20validity%2C%20our%20method%20eliminates%20Monte%20Carlo%20variability%20and%20recovers%20the%20statistical%20power%20lost%20to%20discretization.%20Empirical%20evaluations%20confirm%20that%20our%20approach%20not%20only%20restores%20detection%20capabilities%20where%20discrete%20baselines%20yield%20zero%20discoveries%2C%20but%20outperforms%20standard%20methods%20in%20statistical%20power%20while%20maintaining%20valid%20marginal%20error%20control%20in%20practice.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23205v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBetween%2520Resolution%2520Collapse%2520and%2520Variance%2520Inflation%253A%2520Weighted%2520Conformal%2520Anomaly%2520Detection%2520in%2520Low-Data%2520Regimes%26entry.906535625%3DOliver%2520Hennh%25C3%25B6fer%2520and%2520Christine%2520Preisach%26entry.1292438233%3DStandard%2520conformal%2520anomaly%2520detection%2520provides%2520marginal%2520finite-sample%2520guarantees%2520under%2520the%2520assumption%2520of%2520exchangeability%2520.%2520However%252C%2520real-world%2520data%2520often%2520exhibit%2520distribution%2520shifts%252C%2520necessitating%2520a%2520weighted%2520conformal%2520approach%2520to%2520adapt%2520to%2520local%2520non-stationarity.%2520We%2520show%2520that%2520this%2520adaptation%2520induces%2520a%2520critical%2520trade-off%2520between%2520the%2520minimum%2520attainable%2520p-value%2520and%2520its%2520stability.%2520As%2520importance%2520weights%2520localize%2520to%2520relevant%2520calibration%2520instances%252C%2520the%2520effective%2520sample%2520size%2520decreases.%2520This%2520can%2520render%2520standard%2520conformal%2520p-values%2520overly%2520conservative%2520for%2520effective%2520error%2520control%252C%2520while%2520the%2520smoothing%2520technique%2520used%2520to%2520mitigate%2520this%2520issue%2520introduces%2520conditional%2520variance%252C%2520potentially%2520masking%2520anomalies.%2520We%2520propose%2520a%2520continuous%2520inference%2520relaxation%2520that%2520resolves%2520this%2520dilemma%2520by%2520decoupling%2520local%2520adaptation%2520from%2520tail%2520resolution%2520via%25 {"title": "DreamAudio: Customized Text-to-Audio Generation with Diffusion Models", "author": "Yi Yuan and Xubo Liu and Haohe Liu and Xiyuan Kang and Zhuo Chen and Yuxuan Wang and Mark D. Plumbley and Wenwu Wang", "abstract": "With the development of large-scale diffusion-based and language-modeling-based generative models, impressive progress has been achieved in text-to-audio generation. Despite producing high-quality outputs, existing text-to-audio models mainly aim to generate semantically aligned sound and fall short of controlling fine-grained acoustic characteristics of specific sounds. As a result, users who need specific sound content may find it difficult to generate the desired audio clips. In this paper, we present DreamAudio for customized text-to-audio generation (CTTA). Specifically, we introduce a new framework that is designed to enable the model to identify auditory information from user-provided reference concepts for audio generation. Given a few reference audio samples containing personalized audio events, our system can generate new audio samples that include these specific events. In addition, two types of datasets are developed for training and testing the proposed systems. The experiments show that DreamAudio generates audio samples that are highly consistent with the customized audio features and aligned well with the input text prompts. Furthermore, DreamAudio offers comparable performance in general text-to-audio tasks. We also provide a human-involved dataset containing audio events from real-world CTTA cases as the benchmark for customized generation tasks.", "link": "http://arxiv.org/abs/2509.06027v2", "date": "2026-03-24", "relevancy": 2.309, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6236}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6008}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DreamAudio%3A%20Customized%20Text-to-Audio%20Generation%20with%20Diffusion%20Models&body=Title%3A%20DreamAudio%3A%20Customized%20Text-to-Audio%20Generation%20with%20Diffusion%20Models%0AAuthor%3A%20Yi%20Yuan%20and%20Xubo%20Liu%20and%20Haohe%20Liu%20and%20Xiyuan%20Kang%20and%20Zhuo%20Chen%20and%20Yuxuan%20Wang%20and%20Mark%20D.%20Plumbley%20and%20Wenwu%20Wang%0AAbstract%3A%20With%20the%20development%20of%20large-scale%20diffusion-based%20and%20language-modeling-based%20generative%20models%2C%20impressive%20progress%20has%20been%20achieved%20in%20text-to-audio%20generation.%20Despite%20producing%20high-quality%20outputs%2C%20existing%20text-to-audio%20models%20mainly%20aim%20to%20generate%20semantically%20aligned%20sound%20and%20fall%20short%20of%20controlling%20fine-grained%20acoustic%20characteristics%20of%20specific%20sounds.%20As%20a%20result%2C%20users%20who%20need%20specific%20sound%20content%20may%20find%20it%20difficult%20to%20generate%20the%20desired%20audio%20clips.%20In%20this%20paper%2C%20we%20present%20DreamAudio%20for%20customized%20text-to-audio%20generation%20%28CTTA%29.%20Specifically%2C%20we%20introduce%20a%20new%20framework%20that%20is%20designed%20to%20enable%20the%20model%20to%20identify%20auditory%20information%20from%20user-provided%20reference%20concepts%20for%20audio%20generation.%20Given%20a%20few%20reference%20audio%20samples%20containing%20personalized%20audio%20events%2C%20our%20system%20can%20generate%20new%20audio%20samples%20that%20include%20these%20specific%20events.%20In%20addition%2C%20two%20types%20of%20datasets%20are%20developed%20for%20training%20and%20testing%20the%20proposed%20systems.%20The%20experiments%20show%20that%20DreamAudio%20generates%20audio%20samples%20that%20are%20highly%20consistent%20with%20the%20customized%20audio%20features%20and%20aligned%20well%20with%20the%20input%20text%20prompts.%20Furthermore%2C%20DreamAudio%20offers%20comparable%20performance%20in%20general%20text-to-audio%20tasks.%20We%20also%20provide%20a%20human-involved%20dataset%20containing%20audio%20events%20from%20real-world%20CTTA%20cases%20as%20the%20benchmark%20for%20customized%20generation%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2509.06027v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDreamAudio%253A%2520Customized%2520Text-to-Audio%2520Generation%2520with%2520Diffusion%2520Models%26entry.906535625%3DYi%2520Yuan%2520and%2520Xubo%2520Liu%2520and%2520Haohe%2520Liu%2520and%2520Xiyuan%2520Kang%2520and%2520Zhuo%2520Chen%2520and%2520Yuxuan%2520Wang%2520and%2520Mark%2520D.%2520Plumbley%2520and%2520Wenwu%2520Wang%26entry.1292438233%3DWith%2520the%2520development%2520of%2520large-scale%2520diffusion-based%2520and%2520language-modeling-based%2520generative%2520models%252C%2520impressive%2520progress%2520has%2520been%2520achieved%2520in%2520text-to-audio%2520generation.%2520Despite%2520producing%2520high-quality%2520outputs%252C%2520existing%2520text-to-audio%2520models%2520mainly%2520aim%2520to%2520generate%2520semantically%2520aligned%2520sound%2520and%2520fall%2520short%2520of%2520controlling%2520fine-grained%2520acoustic%2520characteristics%2520of%2520specific%2520sounds.%2520As%2520a%2520result%252C%2520users%2520who%2520need%2520specific%2520sound%2520content%2520may%2520find%2520it%2520difficult%2520to%2520generate%2520the%2520desired%2520audio%2520clips.%2520In%2520this%2520paper%252C%2520we%2520present%2520DreamAudio%2520for%2520customized%2520text-to-audio%2520generation%2520%2528CTTA%2529.%2520Specifically%252C%2520we%2520introduce%2520a%2520new%2520framework%2520that%2520is%2520designed%2520to%2520enable%2520the%2520model%2520to%2520identify%2520auditory%2520information% {"title": "OccAny: Generalized Unconstrained Urban 3D Occupancy", "author": "Anh-Quan Cao and Tuan-Hung Vu", "abstract": "Relying on in-domain annotations and precise sensor-rig priors, existing 3D occupancy prediction methods are limited in both scalability and out-of-domain generalization. While recent visual geometry foundation models exhibit strong generalization capabilities, they were mainly designed for general purposes and lack one or more key ingredients required for urban occupancy prediction, namely metric prediction, geometry completion in cluttered scenes and adaptation to urban scenarios. We address this gap and present OccAny, the first unconstrained urban 3D occupancy model capable of operating on out-of-domain uncalibrated scenes to predict and complete metric occupancy coupled with segmentation features. OccAny is versatile and can predict occupancy from sequential, monocular, or surround-view images. Our contributions are three-fold: (i) we propose the first generalized 3D occupancy framework with (ii) Segmentation Forcing that improves occupancy quality while enabling mask-level prediction, and (iii) a Novel View Rendering pipeline that infers novel-view geometry to enable test-time view augmentation for geometry completion. Extensive experiments demonstrate that OccAny outperforms all visual geometry baselines on 3D occupancy prediction task, while remaining competitive with in-domain self-supervised methods across three input settings on two established urban occupancy prediction datasets. Our code is available at https://github.com/valeoai/OccAny .", "link": "http://arxiv.org/abs/2603.23502v1", "date": "2026-03-24", "relevancy": 2.3084, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5785}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5785}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5703}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OccAny%3A%20Generalized%20Unconstrained%20Urban%203D%20Occupancy&body=Title%3A%20OccAny%3A%20Generalized%20Unconstrained%20Urban%203D%20Occupancy%0AAuthor%3A%20Anh-Quan%20Cao%20and%20Tuan-Hung%20Vu%0AAbstract%3A%20Relying%20on%20in-domain%20annotations%20and%20precise%20sensor-rig%20priors%2C%20existing%203D%20occupancy%20prediction%20methods%20are%20limited%20in%20both%20scalability%20and%20out-of-domain%20generalization.%20While%20recent%20visual%20geometry%20foundation%20models%20exhibit%20strong%20generalization%20capabilities%2C%20they%20were%20mainly%20designed%20for%20general%20purposes%20and%20lack%20one%20or%20more%20key%20ingredients%20required%20for%20urban%20occupancy%20prediction%2C%20namely%20metric%20prediction%2C%20geometry%20completion%20in%20cluttered%20scenes%20and%20adaptation%20to%20urban%20scenarios.%20We%20address%20this%20gap%20and%20present%20OccAny%2C%20the%20first%20unconstrained%20urban%203D%20occupancy%20model%20capable%20of%20operating%20on%20out-of-domain%20uncalibrated%20scenes%20to%20predict%20and%20complete%20metric%20occupancy%20coupled%20with%20segmentation%20features.%20OccAny%20is%20versatile%20and%20can%20predict%20occupancy%20from%20sequential%2C%20monocular%2C%20or%20surround-view%20images.%20Our%20contributions%20are%20three-fold%3A%20%28i%29%20we%20propose%20the%20first%20generalized%203D%20occupancy%20framework%20with%20%28ii%29%20Segmentation%20Forcing%20that%20improves%20occupancy%20quality%20while%20enabling%20mask-level%20prediction%2C%20and%20%28iii%29%20a%20Novel%20View%20Rendering%20pipeline%20that%20infers%20novel-view%20geometry%20to%20enable%20test-time%20view%20augmentation%20for%20geometry%20completion.%20Extensive%20experiments%20demonstrate%20that%20OccAny%20outperforms%20all%20visual%20geometry%20baselines%20on%203D%20occupancy%20prediction%20task%2C%20while%20remaining%20competitive%20with%20in-domain%20self-supervised%20methods%20across%20three%20input%20settings%20on%20two%20established%20urban%20occupancy%20prediction%20datasets.%20Our%20code%20is%20available%20at%20https%3A//github.com/valeoai/OccAny%20.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23502v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOccAny%253A%2520Generalized%2520Unconstrained%2520Urban%25203D%2520Occupancy%26entry.906535625%3DAnh-Quan%2520Cao%2520and%2520Tuan-Hung%2520Vu%26entry.1292438233%3DRelying%2520on%2520in-domain%2520annotations%2520and%2520precise%2520sensor-rig%2520priors%252C%2520existing%25203D%2520occupancy%2520prediction%2520methods%2520are%2520limited%2520in%2520both%2520scalability%2520and%2520out-of-domain%2520generalization.%2520While%2520recent%2520visual%2520geometry%2520foundation%2520models%2520exhibit%2520strong%2520generalization%2520capabilities%252C%2520they%2520were%2520mainly%2520designed%2520for%2520general%2520purposes%2520and%2520lack%2520one%2520or%2520more%2520key%2520ingredients%2520required%2520for%2520urban%2520occupancy%2520prediction%252C%2520namely%2520metric%2520prediction%252C%2520geometry%2520completion%2520in%2520cluttered%2520scenes%2520and%2520adaptation%2520to%2520urban%2520scenarios.%2520We%2520address%2520this%2520gap%2520and%2520present%2520OccAny%252C%2520the%2520first%2520unconstrained%2520urban%25203D%2520occupancy%2520model%2520capable%2520of%2520operating%2520on%2520out-of-domain%2520uncalibrated%2520scenes%2520to%2520predict%2520and%2520complete%2520metric%2520occupancy%2520coupled%2520with%2520segmentation%2520features.%2520OccAny%2520is%2520versatile%2520and%2520can%2520predict%2520occupancy%2520from%2520sequential%252C%2520monocular%252C%2520or%2520surround-view%2520images.%2520Our%2520contributions%2520are%2520three-f {"title": "WISTERIA: Weak Implicit Signal-based Temporal Relation Extraction with Attention", "author": "Duy Dao Do and Ana\u00efs Halftermeyer and Thi-Bich-Hanh Dao", "abstract": "Temporal Relation Extraction (TRE) requires identifying how two events or temporal expressions are related in time. Existing attention-based models often highlight globally salient tokens but overlook the pair-specific cues that actually determine the temporal relation. We propose WISTERIA (Weak Implicit Signal-based Temporal Relation Extraction with Attention), a framework that examines whether the top-K attention components conditioned on each event pair truly encode interpretable evidence for temporal classification. Unlike prior works assuming explicit markers such as before, after, or when, WISTERIA considers signals as any lexical, syntactic, or morphological element implicitly expressing temporal order. By combining multi-head attention with pair-conditioned top-K pooling, the model isolates the most informative contextual tokens for each pair. We conduct extensive experiments on TimeBank-Dense, MATRES, TDDMan, and TDDAuto, including linguistic analyses of top-K tokens. Results show that WISTERIA achieves competitive accuracy and reveals pair-level rationales aligned with temporal linguistic cues, offering a localized and interpretable view of temporal reasoning.", "link": "http://arxiv.org/abs/2603.23319v1", "date": "2026-03-24", "relevancy": 2.2986, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5153}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4333}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4305}], "mailto": "mailto:haoxiang.li.2024@gmail.com?sub {"title": "VL-KnG: Persistent Spatiotemporal Knowledge Graphs from Egocentric Video for Embodied Scene Understanding", "author": "Mohamad Al Mdfaa and Svetlana Lukina and Timur Akhtyamov and Arthur Nigmatzyanov and Dmitrii Nalberskii and Sergey Zagoruyko and Gonzalo Ferrer", "abstract": "Vision-language models (VLMs) demonstrate strong image-level scene understanding but often lack persistent memory, explicit spatial representations, and computational efficiency when reasoning over long video sequences. We present VL-KnG, a training-free framework that constructs spatiotemporal knowledge graphs from monocular video, bridging fine-grained scene graphs and global topological graphs without 3D reconstruction. VL-KnG processes video in chunks, maintains persistent object identity via LLM-based Spatiotemporal Object Association (STOA), and answers queries via Graph-Enhanced Retrieval (GER), a hybrid of GraphRAG subgraph retrieval and SigLIP2 visual grounding. Once built, the knowledge graph eliminates the need to re-process video at query time, enabling constant-time inference regardless of video length. Evaluation across three benchmarks, OpenEQA, NaVQA, and WalkieKnowledge (our newly introduced benchmark), shows that VL-KnG matches or surpasses frontier VLMs on embodied scene understanding tasks at significantly lower query latency, with explainable, graph-grounded reasoning. Real-world robot deployment confirms practical applicability with constant-time scaling.", "link": "http://arxiv.org/abs/2510.01483v2", "date": "2026-03-24", "relevancy": 2.2972, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5921}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5708}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "MedObvious: Exposing the Medical Moravec's Paradox in VLMs via Clinical Triage", "author": "Ufaq Khan and Umair Nawaz and L D M S S Teja and Numaan Saeed and Muhammad Bilal and Yutong Xie and Mohammad Yaqub and Muhammad Haris Khan", "abstract": "Vision Language Models (VLMs) are increasingly used for tasks like medical report generation and visual question answering. However, fluent diagnostic text does not guarantee safe visual understanding. In clinical practice, interpretation begins with pre-diagnostic sanity checks: verifying that the input is valid to read (correct modality and anatomy, plausible viewpoint and orientation, and no obvious integrity violations). Existing benchmarks largely assume this step is solved, and therefore miss a critical failure mode: a model can produce plausible narratives even when the input is inconsistent or invalid. We introduce MedObvious, a 1,880-task benchmark that isolates input validation as a set-level consistency capability over small multi-panel image sets: the model must identify whether any panel violates expected coherence. MedObvious spans five progressive tiers, from basic orientation/modality mismatches to clinically motivated anatomy/viewpoint verification and triage-style cues, and includes five evaluation formats to test robustness across interfaces. Evaluating 17 different VLMs, we find that sanity checking remains unreliable: several models hallucinate anomalies on normal (negative-control) inputs, performance degrades when scaling to larger image sets, and measured accuracy varies substantially between multiple-choice and open-ended settings. These results show that pre-diagnostic verification remains unsolved for medical VLMs and should be treated as a distinct, safety-critical capability before deployment.", "link": "http://arxiv.org/abs/2603.23501v1", "date": "2026-03-24", "relevancy": 2.29, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedObvious%3A%20Exposing%20the%20Medical%20Moravec%27s%20Paradox%20in%20VLMs%20via%20Clinical%20Triage&body=Title%3A%20MedObvious%3A%20Exposing%20the%20Medical%20Moravec%27s%20Paradox%20in%20VLMs%20via%20Clinical%20Triage%0AAuthor%3A%20Ufaq%20Khan%20and%20Umair%20Nawaz%20and%20L%20D%20M%20S%20S%20Teja%20and%20Numaan%20Saeed%20and%20Muhammad%20Bilal%20and%20Yutong%20Xie%20and%20Mohammad%20Yaqub%20and%20Muhammad%20Haris%20Khan%0AAbstract%3A%20Vision%20Language%20Models%20%28VLMs%29%20are%20increasingly%20used%20for%20tasks%20like%20medical%20report%20generation%20and%20visual%20question%20answering.%20However%2C%20fluent%20diagnostic%20text%20does%20not%20guarantee%20safe%20visual%20understanding.%20In%20clinical%20practice%2C%20interpretation%20begins%20with%20pre-diagnostic%20sanity%20checks%3A%20verifying%20that%20the%20input%20is%20valid%20to%20read%20%28correct%20modality%20and%20anatomy%2C%20plausible%20viewpoint%20and%20orientation%2C%20and%20no%20obvious%20integrity%20violations%29.%20Existing%20benchmarks%20largely%20assume%20this%20step%20is%20solved%2C%20and%20therefore%20miss%20a%20critical%20failure%20mode%3A%20a%20model%20can%20produce%20plausible%20narratives%20even%20when%20the%20input%20is%20inconsistent%20or%20invalid.%20We%20introduce%20MedObvious%2C%20a%201%2C880-task%20benchmark%20that%20isolates%20input%20validation%20as%20a%20set-level%20consistency%20capability%20over%20small%20multi-panel%20image%20sets%3A%20the%20model%20must%20identify%20whether%20any%20panel%20violates%20expected%20coherence.%20MedObvious%20spans%20five%20progressive%20tiers%2C%20from%20basic%20orientation/modality%20mismatches%20to%20clinically%20motivated%20anatomy/viewpoint%20verification%20and%20triage-style%20cues%2C%20and%20includes%20five%20evaluation%20formats%20to%20test%20robustness%20across%20interfaces.%20Evaluating%2017%20different%20VLMs%2C%20we%20find%20that%20sanity%20checking%20remains%20unreliable%3A%20several%20models%20hallucinate%20anomalies%20on%20normal%20%28negative-control%29%20inputs%2C%20performance%20degrades%20when%20scaling%20to%20larger%20image%20sets%2C%20and%20measured%20accuracy%20varies%20substantially%20between%20multiple-choice%20and%20open-ended%20settings.%20These%20results%20show%20that%20pre-diagnostic%20verification%20remains%20unsolved%20for%20medical%20VLMs%20and%20should%20be%20treated%20as%20a%20distinct%2C%20safety-critical%20capability%20before%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23501v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedObvious%253A%2520Exposing%2520the%2520Medical%2520Moravec%2527s%2520Paradox%2520in%2520VLMs%2520via%2520Clinical%2520Triage%26entry.906535625%3DUfaq%2520Khan%2520and%2520Umair%2520Nawaz%2520and%2520L%2520D%2520M%2520S%2520S%2520Teja%2520and%2520Numaan%2520Saeed%2520and%2520Muhammad%2520Bilal%2520and%2520Yutong%2520Xie%2520and%2520Mohammad%2520Yaqub%2520and%2520Muhammad%2520Haris%2520Khan%26entry.1292438233%3DVision%2520Language%2520Models%2520%2528VLMs%2529%2520are%2520increasingly%2520used%2520for%2520tasks%2520like%2520medical%2520report%2520generation%2520and%2520visual%2520question%2520answering.%2520However%252C%2520fluent%2520diagnostic%2520text%2520does%2520not%2520guarantee%2520safe%2520visual%2520understanding.%2520In%2520clinical%2520practice%252C%2520interpretation%2520begins%2520with%2520pre-diagnostic%2520sanity%2520checks%253A%2520verifying%2520that%2520the%2520input%2520is%2520vali 501v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MedObvious%3A%20Exposing%20the%20Medical%20Moravec%27s%20Paradox%20in%20VLMs%20via%20Clinical%20Triage&entry.906535625=Ufaq%20Khan%20and%20Umair%20Nawaz%20and%20L%20D%20M%20S%20S%20Teja%20and%20Numaan%20Saeed%20and%20Muhammad%20Bilal%20and%20Yutong%20Xie%20and%20Mohammad%20Yaqub%20and%20Muhammad%20Haris%20Khan&entry.1292438233=Vision%20Language%20Models%20%28VLMs%29%20are%20increasingly%20used%20for%20tasks%20like%20medical%20report%20generation%20and%20visual%20question%20answering.%20However%2C%20fluent%20diagnostic%20text%20does%20not%20guarantee%20safe%20visual%20understanding.%20In%20clinical%20practice%2C%20interpretation%20begins%20with%20pre-diagnostic%20sanity%20checks%3A%20verifying%20that%20the%20input%20is%20valid%20to%20read%20%28correct%20modality%20and%20anatomy%2C%20plausible%20viewpoint%20and%20orientation%2C%20and%20no%20obvious%20integrity%20violations%29.%20Existing%20benchmarks%20largely%20assume%20this%20step%20is%20solved%2C%20and%20therefore%20miss%20a%20critical%20failure%20mode%3A%20a%20model%20can%20produce%20plausible%20narratives%20even%20when%20the%20input%20is%20inconsistent%20or%20invalid.%20We%20introduce%20MedObvious%2C%20a%201%2C880-task%20benchmark%20that%20isolates%20input%20validation%20as%20a%20set-level%20consistency%20capability%20over%20small%20multi-panel%20image%20sets%3A%20the%20model%20must%20identify%20whether%20any%20panel%20violates%20expected%20coherence.%20MedObvious%20spans%20five%20progressive%20tiers%2C%20from%20basic%20orientation/modality%20mismatches%20to%20clinically%20motivated%20anatomy/viewpoint%20verification%20and%20triage-style%20cues%2C%20and%20includes%20five%20evaluation%20formats%20to%20test%20robustness%20across%20interfaces.%20Evaluating%2017%20different%20VLMs%2C%20we%20find%20that%20sanity%20checking%20remains%20unreliable%3A%20several%20m {"title": "GenExam: A Multidisciplinary Text-to-Image Exam", "author": "Zhaokai Wang and Penghao Yin and Xiangyu Zhao and Changyao Tian and Yu Qiao and Wenhai Wang and Jifeng Dai and Gen Luo", "abstract": "Exams are a fundamental test of expert-level intelligence and require integrated understanding, reasoning, and generation. Existing exam-style benchmarks mainly focus on understanding and reasoning tasks, and current generation benchmarks emphasize the illustration of world knowledge and visual concepts, neglecting the evaluation of rigorous drawing exams. We introduce GenExam, the first benchmark for multidisciplinary text-to-image exams, featuring 1,000 samples across 10 subjects with exam-style prompts organized under a four-level taxonomy. Each problem is equipped with ground-truth images and fine-grained scoring points to enable a precise evaluation of semantic correctness and visual plausibility. Experiments on 17 text-to-image and unified models demonstrate the great challenge of GenExam and the huge gap where open-source models consistently lag behind the leading closed-source ones. By framing image generation as an exam, GenExam offers a rigorous assessment of models' ability to integrate understanding, reasoning, and generation, providing insights for on the path to intelligent generative models. Our benchmark and evaluation code are released at https://github.com/OpenGVLab/GenExam.", "link": "http://arxiv.org/abs/2509.14232v4", "date": "2026-03-24", "relevancy": 2.2866, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5867}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5624}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5603}], "mailto": "mailto:haoxiang.li.2024@gmail.com {"title": "JaGuard: Position Error Correction of GNSS Jamming with Deep Temporal Graphs", "author": "Ivana Kesi\u0107 and Alja\u017e Blatnik and Carolina Fortuna and Bla\u017e Bertalani\u010d", "abstract": "Global Navigation Satellite Systems (GNSS) face growing disruption from intentional jamming, undermining critical infrastructure where precise positioning and timing are essential. Current position error correction (PEC) methods mainly focus on multi-path propagation errors and fail to exploit the spatio-temporal coherence of satellite constellations. We recast jamming mitigation as a dynamic graph regression problem. We propose Jamming Guardian (JaGuard), a receiver-centric deep temporal graph network that estimates and corrects jamming-induced positional drift at fixed locations like roadside units. Modeling the satellite-receiver scene as a heterogeneous star graph at each 1 Hz epoch, our Heterogeneous Graph ConvLSTM fuses spatial context (SNR, azimuth, elevation) with short-term temporal dynamics to predict 2D positional deviation. Evaluated on a real-world dataset from two commercial receivers under synthesized RF interference (three jammer types, -45 to -70 dBm), JaGuard consistently yields the lowest Mean Absolute Error (MAE) compared to advanced baselines. Under severe jamming (-45 dBm), it maintains an MAE of 2.85-5.92 cm, improving to sub-2 cm at lower interference. On mixed-power datasets, JaGuard surpasses all baselines with MAEs of 2.26 cm (GP01) and 2.61 cm (U-blox 10). Even under extreme data starvation (10% training data), JaGuard remains stable, bounding error at 15-20 cm and preventing the massive variance increase seen in baselines. This confirms that dynamically modeling the physical deterioration of the constellation graph is strictly necessary for resilient interference correction.", "link": "http://arxiv.org/abs/2509.14000v3", "date": "2026-03-24", "relevancy": 2.2855, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4685}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4582}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JaGuard%3A%20Position%20Error%20Correction%20of%20GNSS%20Jamming%20with%20Deep%20Temporal%20Graphs&body=Title%3A%20JaGuard%3A%20Position%20Error%20Correction%20of%20GNSS%20Jamming%20with%20Deep%20Temporal%20Graphs%0AAuthor%3A%20Ivana%20Kesi%C4%87%20and%20Alja%C5%BE%20Blatnik%20and%20Carolina%20Fortuna%20and%20Bla%C5%BE%20Bertalani%C4%8D%0AAbstract%3A%20Global%20Navigation%20Satellite%20Systems%20%28GNSS%29%20face%20growing%20disruption%20from%20intentional%20jamming%2C%20undermining%20critical%20infrastructure%20where%20precise%20positioning%20and%20timing%20are%20essential.%20Current%20position%20error%20correction%20%28PEC%29%20methods%20mainly%20focus%20on%20multi-path%20propagation%20errors%20and%20fail%20to%20exploit%20the%20spatio-temporal%20coherence%20of%20satellite%20constellations.%20We%20recast%20jamming%20mitigation%20as%20a%20dynamic%20graph%20regression%20problem.%20We%20propose%20Jamming%20Guardian%20%28JaGuard%29%2C%20a%20receiver-centric%20deep%20temporal%20graph%20network%20that%20estimates%20and%20corrects%20jamming-induced%20positional%20drift%20at%20fixed%20locations%20like%20roadside%20units.%20Modeling%20the%20satellite-receiver%20scene%20as%20a%20heterogeneous%20star%20graph%20at%20each%201%20Hz%20epoch%2C%20our%20Heterogeneous%20Graph%20ConvLSTM%20fuses%20spatial%20context%20%28SNR%2C%20azimuth%2C%20elevation%29%20with%20short-term%20temporal%20dynamics%20to%20predict%202D%20positional%20deviation.%20Evaluated%20on%20a%20real-world%20dataset%20from%20two%20commercial%20receivers%20under%20synthesized%20RF%20interference%20%28three%20jammer%20types%2C%20-45%20to%20-70%20dBm%29%2C%20JaGuard%20consistently%20yields%20the%20lowest%20Mean%20Absolute%20Error%20%28MAE%29%20compared%20to%20advanced%20baselines.%20Under%20severe%20jamming%20%28-45%20dBm%29%2C%20it%20maintains%20an%20MAE%20of%202.85-5.92%20cm%2C%20improving%20to%20sub-2%20cm%20at%20lower%20interference.%20On%20mixed-power%20datasets%2C%20JaGuard%20surpasses%20all%20baselines%20with%20MAEs%20of%202.26%20cm%20%28GP01%29%20and%202.61%20cm%20%28U-blox%2010%29.%20Even%20under%20extreme%20data%20starvation%20%2810%25%20training%20data%29%2C%20JaGuard%20remains%20stable%2C%20bounding%20error%20at%2015-20%20cm%20and%20preventing%20the%20massive%20variance%20increase%20seen%20in%20baselines.%20This%20confirms%20that%20dynamically%20modeling%20the%20physical%20deterioration%20of%20the%20constellation%20graph%20is%20strictly%20necessary%20for%20resilient%20interference%20correction.%0ALink%3A%20http%3A//arxiv.org/abs/2509.14000v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJaGuard%253A%2520Position%2520Error%2520Correction%2520of%2520GNSS%2520Jamming%2520with%2520Deep%2520Temporal%2520Graphs%26entry.906535625%3DIvana%2520Kesi%25C4%2587%2520and%2520Alja%25C5%25BE%2520Blatnik%2520and%2520Carolina%2520Fortuna%2520and%2520Bla%25C5%25BE%2520Bertalani%25C4%258D%26entry.1292438233%3DGlobal%2520Navigation%2520Satellite%2520Systems%2520%2528GNSS%2529%2520face%2520growing%2520disruption%2520from%2520intentional%2520jamming%252C%2520undermining%2520critical%2520infrastructure%2520where%2520precise%2520positioning%2520and%2520timing%2520are%2520essential.%2520Current%2520position%2520error%2520correction%2520%2528PEC%2529%2520methods%2520mainly%2520focus%2520on%2520multi-path%2520propagation%2520errors%2520and%2520fail%2520to%2520exploit%2520the%2520spatio-temporal%2520coherence%2520of%2520satellite% %2520of%2520the%2520constellation%2520graph%2520is%2520strictly%2520necessary%2520for%2520resilient%2520interference%2520correction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.14000v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=JaGuard%3A%20Position%20Error%20Correction%20of%20GNSS%20Jamming%20with%20Deep%20Temporal%20Graphs&entry.906535625=Ivana%20Kesi%C4%87%20and%20Alja%C5%BE%20Blatnik%20and%20Carolina%20Fortuna%20and%20Bla%C5%BE%20Bertalani%C4%8D&entry.1292438233=Global%20Navigation%20Satellite%20Systems%20%28GNSS%29%20face%20growing%20disruption%20from%20intentional%20jamming%2C%20undermining%20critical%20infrastructure%20where%20precise%20positioning%20and%20timing%20are%20essential.%20Current%20position%20error%20correction%20%28PEC%29%20methods%20mainly%20focus%20on%20multi-path%20propagation%20errors%20and%20fail%20to%20exploit%20the%20spatio-temporal%20coherence%20of%20satellite%20constellations.%20We%20recast%20jamming%20mitigation%20as%20a%20dynamic%20graph%20regression%20problem.%20We%20propose%20Jamming%20Guardian%20%28JaGuard%29%2C%20a%20receiver-centric%20deep%20temporal%20graph%20network%20that%20estimates%20and%20corrects%20jamming-induced%20positional%20drift%20at%20fixed%20locations%20like%20roadside%20units.%20Modeling%20the%20satellite-receiver%20scene%20as%20a%20heterogeneous%20star%20graph%20at%20each%201%20Hz%20epoch%2C%20our%20Heterogeneous%20Graph%20ConvLSTM%20fuses%20spatial%20context%20%28SNR%2C%20azimuth%2C%20elevation%29%20with%20short-term%20temporal%20dynamics%20to%20predict%202D%20positional%20deviation.%20Evaluated%20on%20a%20real-world%20dataset%20from%20two%20commercial%20receivers%20under%20synthesized%20RF%20interference%20%28three%20jammer%20types%2C%20-45%20to%20-70%20dBm%29%2C%20JaGuard%20consistently%20yields%20the%20lowest%20Mean%20Absolute%20Error%20%28MAE%29%20compared%20to%20advanced%20baselines.%20Under%2 {"title": "Between Rules and Reality: On the Context Sensitivity of LLM Moral Judgment", "author": "Adrian Sauter and Mona Schirmer", "abstract": "A human's moral decision depends heavily on the context. Yet research on LLM morality has largely studied fixed scenarios. We address this gap by introducing Contextual MoralChoice, a dataset of moral dilemmas with systematic contextual variations known from moral psychology to shift human judgment: consequentialist, emotional, and relational. Evaluating 22 LLMs, we find that nearly all models are context-sensitive, shifting their judgments toward rule-violating behavior. Comparing with a human survey, we find that models and humans are most triggered by different contextual variations, and that a model aligned with human judgments in the base case is not necessarily aligned in its contextual sensitivity. This raises the question of controlling contextual sensitivity, which we address with an activation steering approach that can reliably increase or decrease a model's contextual sensitivity.", "link": "http://arxiv.org/abs/2603.23114v1", "date": "2026-03-24", "relevancy": 2.27, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4553}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4534}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4534}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Between%20Rules%20and%20Reality%3A%20On%20the%20Context%20Sensitivity%20of%20LLM%20Moral%20Judgment&body=Title%3A%20Between%20Rules%20and%20Reality%3A%20On%20the%20Context%20Sensitivity%20of%20LLM%20Moral%20Judgment%0AAuthor%3A%20Adrian%20Sauter%20and%20Mona%20Schirmer%0AAbstract%3A%20A%20human%27s%20moral%20decision%20depends%20heavily%20on%20the%20context.%20Yet%20research%20on%20LLM%20morality%20has%20largely%20studied%20fixed%20scenarios.%20We%20address%20this%20gap%20by%20introducing%20Contextual%20MoralChoice%2C%20a%20dataset%20of%20moral%20dilemmas%20with%20systematic%20contextual%20variations%20known%20from%20moral%20psychology%20to%20shift%20human%20judgment%3A%20consequentialist%2C%20emotional%2C%20and%20relational.%20Evaluating%2022%20LLMs%2C%20we%20find%20that%20nearly%20all%20models%20are%20context-sensitive%2C%20shifting%20their%20judgments%20toward%20rule-violating%20behavior.%20Comparing%20with%20a%20human%20survey%2C%20we%20find%20that%20models%20and%20humans%20are%20most%20triggered%20by%20different%20contextual%20variations%2C%20and%20that%20a%20model%20aligned%20with%20human%20judgments%20in%20the%20base%20case%20is%20not%20necessarily%20aligned%20in%20its%20contextual%20sensitivity.%20This%20raises%20the%20question%20of%20controlling%20contextual%20sensitivity%2C%20which%20we%20address%20with%20an%20activation%20steering%20approach%20that%20can%20reliably%20increase%20or%20decrease%20a%20model%27s%20contextual%20sensitivity.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBetween%2520Rules%2520and%2520Reality%253A%2520On%2520the%2520Context%2520Sensitivity%2520of%2520LLM%2520Moral%2520Judgment%26entry.906535625%3DAdrian%2520Sauter%2520and%2520Mona%2520Schirmer%26entry.1292438233%3DA%2520human%2527s%2520moral%2520decision%2520depends%2520heavily%2520on%2520the%2520context.%2520Yet%2520research%2520on%2520LLM%2520morality%2520has%2520largely%2520studied%2520fixed%2520scenarios.%2520We%2520address%2520this%2520gap%2520by%2520introducing%2520Contextual%2520MoralChoice%252C%2520a%2520dataset%2520of%2520moral%2520dilemmas%2520with%2520systematic%2520contextual%2520variations%2520known%2520from%2520moral%2520psychology%2520to%2520shift%2520human%2520judgment%253A%2520consequentialist%252C%2520emotional%252C%2520and%2520relational.%2520Evaluating%252022%2520LLMs%252C%2520we%2520find%2520that%2520nearly%2520all%2520models%2520are%2520context-sensitive%252C%2520shifting%2520their%2520judgments%2520toward%2520rule-violating%2520behavior.%2520Comparing%2520with%2520a%2520human%2520survey%252C%2520we%2520find%2520that%2520models%2520and%2520humans%2520are%2520most%2520triggered%2520by%2520different%2520contextual%2520variations%252C%2520and%2520that%2520a%2520model%2520aligned%2520with%2520human%2520judgments%2520in%2520the%2520base%2520case%2520is%2520not%2520necessarily%2520aligned%2520in%2520its%2520contextual%2520sensitivity.%2520This%2520raises%2520the%2520question%2520of%2520controlling%2520contextual%2520sensitivity%252C%2520which%2520we%2520address%2520with%2520an%2520activation%2520steering%2520approach%2520that%2520can%2520reliably%2520increase%2520or%2520decrease%2520a%2520model%2527s%2520contextual%2520sensitivity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23114v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Between%20Rules%20and%20Reality%3A%20On%20the%20Context%20Sensitivity%20of%20LLM%20Moral%20Judgment&entry.906535625=Adrian%20Sauter%20and%20Mona%20Schirmer&entry.1292438233=A%20human%27s%20moral%20decision%20depends%20heavily%20on%20the%20context.%20Yet%20research%20on%20LLM%20morality%20has%20largely%20studied%20fixed%20scenarios.%20We%20address%20this%20gap%20by%20introducing%20Contextual%20MoralChoice%2C%20a%20dataset%20of%20moral%20dilemmas%20with%20systematic%20contextual%20variations%20known%20from%20moral%20psychology%20to%20shift%20human%20judgment%3A%20consequentialist%2C%20emotional%2C%20and%20relational.%20Evaluating%

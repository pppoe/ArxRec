{"title": "Graph Variate Neural Networks", "author": "Om Roy and Yashar Moshfeghi and Keith Smith", "abstract": "Modelling dynamically evolving spatio-temporal signals is a prominent challenge in the Graph Neural Network (GNN) literature. Notably, GNNs assume an existing underlying graph structure. While this underlying structure may not always exist or is derived independently from the signal, a temporally evolving functional network can always be constructed from multi-channel data. Graph Variate Signal Analysis (GVSA) defines a unified framework consisting of a network tensor of instantaneous connectivity profiles against a stable support usually constructed from the signal itself. Building on GVSA and tools from graph signal processing, we introduce Graph-Variate Neural Networks (GVNNs): layers that convolve spatio-temporal signals with a signal-dependent connectivity tensor combining a stable long-term support with instantaneous, data-driven interactions. This design captures dynamic statistical interdependencies at each time step without ad hoc sliding windows and admits an efficient implementation with linear complexity in sequence length. Across forecasting benchmarks, GVNNs consistently outperform strong graph-based baselines and are competitive with widely used sequence models such as LSTMs and Transformers. On EEG motor-imagery classification, GVNNs achieve strong accuracy highlighting their potential for brain-computer interface applications.", "link": "http://arxiv.org/abs/2509.20311v2", "date": "2026-03-24", "relevancy": 2.4454, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5191}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4838}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Graph%20Variate%20Neural%20Networks&body=Title%3A%20Graph%20Variate%20Neural%20Networks%0AAuthor%3A%20Om%20Roy%20and%20Yashar%20Moshfeghi%20and%20Keith%20Smith%0AAbstract%3A%20Modelling%20dynamically%20evolving%20spatio-temporal%20signals%20is%20a%20prominent%20challenge%20in%20the%20Graph%20Neural%20Network%20%28GNN%29%20literature.%20Notably%2C%20GNNs%20assume%20an%20existing%20underlying%20graph%20structure.%20While%20this%20underlying%20structure%20may%20not%20always%20exist%20or%20is%20derived%20independently%20from%20the%20signal%2C%20a%20temporally%20evolving%20functional%20network%20can%20always%20be%20constructed%20from%20multi-channel%20data.%20Graph%20Variate%20Signal%20Analysis%20%28GVSA%29%20defines%20a%20unified%20framework%20consisting%20of%20a%20network%20tensor%20of%20instantaneous%20connectivity%20profiles%20against%20a%20stable%20support%20usually%20constructed%20from%20the%20signal%20itself.%20Building%20on%20GVSA%20and%20tools%20from%20graph%20signal%20processing%2C%20we%20introduce%20Graph-Variate%20Neural%20Networks%20%28GVNNs%29%3A%20layers%20that%20convolve%20spatio-temporal%20signals%20with%20a%20signal-dependent%20connectivity%20tensor%20combining%20a%20stable%20long-term%20support%20with%20instantaneous%2C%20data-driven%20interactions.%20This%20design%20captures%20dynamic%20statistical%20interdependencies%20at%20each%20time%20step%20without%20ad%20hoc%20sliding%20windows%20and%20admits%20an%20efficient%20implementation%20with%20linear%20complexity%20in%20sequence%20length.%20Across%20forecasting%20benchmarks%2C%20GVNNs%20consistently%20outperform%20strong%20graph-based%20baselines%20and%20are%20competitive%20with%20widely%20used%20sequence%20models%20such%20as%20LSTMs%20and%20Transformers.%20On%20EEG%20motor-imagery%20classification%2C%20GVNNs%20achieve%20strong%20accuracy%20highlighting%20their%20potential%20for%20brain-computer%20interface%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2509.20311v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph%2520Variate%2520Neural%2520Networks%26entry.906535625%3DOm%2520Roy%2520and%2520Yashar%2520Moshfeghi%2520and%2520Keith%2520Smith%26entry.1292438233%3DModelling%2520dynamically%2520evolving%2520spatio-temporal%2520signals%2520is%2520a%2520prominent%2520challenge%2520in%2520the%2520Graph%2520Neural%2520Network%2520%2528GNN%2529%2520literature.%2520Notably%252C%2520GNNs%2520assume%2520an%2520existing%2520underlying%2520graph%2520structure.%2520While%2520this%2520underlying%2520structure%2520may%2520not%2520always%2520exist%2520or%2520is%2520derived%2520independently%2520from%2520the%2520signal%252C%2520a%2520temporally%2520evolving%2520functional%2520network%2520can%2520always%2520be%2520constructed%2520from%2520multi-channel%2520data.%2520Graph%2520Variate%2520Signal%2520Analysis%2520%2528GVSA%2529%2520defines%2520a%2520unified%2520framework%2520consisting%2520of%2520a%2520network%2520tensor%2520of%2520instantaneous%2520connectivity%2520profiles%2520against%2520a%2520stable%2520support%2520usually%2520constructed%2520from%2520the%2520signal%2520itself.%2520Building%2520on%2520GVSA%2520and%2520tools%2520from%2520graph%2520signal%2520processing%252C%2520we%2520introduce%2520Graph-Variate%2520Neural%2520Networks%2520%2528GVNNs%2529%253A%2520layers%2520that%2520convolve%2520spatio-temporal%2520signals%2520with%2520a%2520signal-dependent%2520connectivity%2520tensor%2520combining%2520a%2520stable%2520long-term%2520support%2520with%2520instantaneous%252C%2520data-driven%2520interactions.%2520This%2520design%2520captures%2520dynamic%2520statistical%2520interdependencies%2520at%2520each%2520time%2520step%2520without%2520ad%2520hoc%2520sliding%2520windows%2520and%2520admits%2520an%2520efficient%2520implementation%2520with%2520linear%2520complexity%2520in%2520sequence%2520length.%2520Across%2520forecasting%2520benchmarks%252C%2520GVNNs%2520consistently%2520outperform%2520strong%2520graph-based%2520baselines%2520and%2520are%2520competitive%2520with%2520widely%2520used%2520sequence%2520models%2520such%2520as%2520LSTMs%2520and%2520Transformers.%2520On%2520EEG%2520motor-imagery%2520classification%252C%2520GVNNs%2520achieve%2520strong%2520accuracy%2520highlighting%2520their%2520potential%2520for%2520brain-computer%2520interface%2520applications.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.20311v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Graph%20Variate%20Neural%20Networks&entry.906535625=Om%20Roy%20and%20Yashar%20Moshfeghi%20and%20Keith%20Smith&entry.1292438233=Modelling%20dynamically%20evolving%20spatio-temporal%20signals%20is%20a%20prominent%20challenge%20in%20the%20Graph%20Neural%20Network%20%28GNN%29%20literature.%20Notably%2C%20GNNs%20assume%20an%20existing%20underlying%20graph%20structure.%20While%20this%20underlying%20structure%20may%20not%20always%20exist%20or%20is%20derived%20independently%20from%20the%20signal%2C%20a%20temporally%20evolving%20functional%20network%20can%20always%20be%20constructed%20from%20multi-channel%20data.%20Graph%20Variate%20Signal%20Analysis%20%28GVSA%29%20defines%20a%20unified%20framework%20consisting%20of%20a%20network%20tensor%20of%20instantaneous%20connectivity%20profiles%20against%20a%20stable%20support%20usually%20constructed%20from%20the%20signal%20itself.%20Building%20on%20GVSA%20and%20tools%20from%20graph%20signal%20processing%2C%20we%20introduce%20Graph-Variate%20Neural%20Networks%20%28GVNNs%29%3A%20layers%20that%20convolve%20spatio-temporal%20signals%20with%20a%20signal-dependent%20connectivity%20tensor%20combining%20a%20stable%20long-term%20support%20with%20instantaneous%2C%20data-driven%20interactions.%20This%20design%20captures%20dynamic%20statistical%20interdependencies%20at {"title": "SAiW: Source-Attributable Invisible Watermarking for Proactive Deepfake Defense", "author": "Bibek Das and Chandranath Adak and Soumi Chattopadhyay and Zahid Akhtar and Soumya Dutta", "abstract": "Deepfakes generated by modern generative models pose a serious threat to information integrity, digital identity, and public trust. Existing detection methods are largely reactive, attempting to identify manipulations after they occur and often failing to generalize across evolving generation techniques. This motivates the need for proactive mechanisms that secure media authenticity at the time of creation. In this work, we introduce SAiW, a Source-Attributed Invisible watermarking Framework for proactive deepfake defense and media provenance verification. Unlike conventional watermarking methods that treat watermark payloads as generic signals, SAiW formulates watermark embedding as a source-conditioned representation learning problem, where watermark identity encodes the originating source and modulates the embedding process to produce discriminative and traceable signatures. The framework integrates feature-wise linear modulation to inject source identity into the embedding network, enabling scalable multi-source watermark generation. A perceptual guidance module derived from human visual system priors ensures that watermark perturbations remain visually imperceptible while maintaining robustness. In addition, a dual-purpose forensic decoder simultaneously reconstructs the embedded watermark and performs source attribution, providing both automated verification and interpretable forensic evidence. Extensive experiments across multiple deepfake datasets demonstrate that SAiW achieves high perceptual quality while maintaining strong robustness against compression, filtering, noise, geometric transformations, and adversarial perturbations. By binding digital media to its origin through invisible yet verifiable markers, SAiW enables reliable authentication and source attribution, providing a scalable foundation for proactive deepfake defense and trustworthy media provenance.", "link": "http://arxiv.org/abs/2603.23178v1", "date": "2026-03-24", "relevancy": 2.4409, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5342}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4655}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4649}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAiW%3A%20Source-Attributable%20Invisible%20Watermarking%20for%20Proactive%20Deepfake%20Defense&body=Title%3A%20SAiW%3A%20Source-Attributable%20Invisible%20Watermarking%20for%20Proactive%20Deepfake%20Defense%0AAuthor%3A%20Bibek%20Das%20and%20Chandranath%20Adak%20and%20Soumi%20Chattopadhyay%20and%20Zahid%20Akhtar%20and%20Soumya%20Dutta%0AAbstract%3A%20Deepfakes%20generated%20by%20modern%20generative%20models%20pose%20a%20serious%20threat%20to%20information%20integrity%2C%20digital%20identity%2C%20and%20public%20trust.%20Existing%20detection%20methods%20are%20largely%20reactive%2C%20attempting%20to%20identify%20manipulations%20after%20they%20occur%20and%20often%20failing%20to%20generalize%20across%20evolving%20generation%20techniques.%20This%20motivates%20the%20need%20for%20proactive%20mechanisms%20that%20secure%20media%20authenticity%20at%20the%20time%20of%20creation.%20In%20this%20work%2C%20we%20introduce%20SAiW%2C%20a%20Source-Attributed%20Invisible%20watermarking%20Framework%20for%20proactive%20deepfake%20defense%20and%20media%20provenance%20verification.%20Unlike%20conventional%20watermarking%20methods%20that%20treat%20watermark%20payloads%20as%20generic%20signals%2C%20SAiW%20formulates%20watermark%20embedding%20as%20a%20source-conditioned%20representation%20learning%20problem%2C%20where%20watermark%20identity%20encodes%20the%20originating%20source%20and%20modulates%20the%20embedding%20process%20to%20produce%20discriminative%20and%20traceable%20signatures.%20The%20framework%20integrates%20feature-wise%20linear%20modulation%20to%20inject%20source%20identity%20into%20the%20embedding%20network%2C%20enabling%20scalable%20multi-source%20watermark%20generation.%20A%20perceptual%20guidance%20module%20derived%20from%20human%20visual%20system%20priors%20ensures%20that%20watermark%20perturbations%20remain%20visually%20imperceptible%20while%20maintaining%20robustness.%20In%20addition%2C%20a%20dual-purpose%20forensic%20decoder%20simultaneously%20reconstructs%20the%20embedded%20watermark%20and%20performs%20source%20attribution%2C%20providing%20both%20automated%20verification%20and%20interpretable%20forensic%20evidence.%20Extensive%20experiments%20across%20multiple%20deepfake%20datasets%20demonstrate%20that%20SAiW%20achieves%20high%20perceptual%20quality%20while%20maintaining%20strong%20robustness%20against%20compression%2C%20filtering%2C%20noise%2C%20geometric%20transformations%2C%20and%20adversarial%20perturbations.%20By%20binding%20digital%20media%20to%20its%20origin%20through%20invisible%20yet%20verifiable%20markers%2C%20SAiW%20enables%20reliable%20authentication%20and%20source%20attribution%2C%20providing%20a%20scalable%20foundation%20for%20proactive%20deepfake%20defense%20and%20trustworthy%20media%20provenance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23178v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAiW%253A%2520Source-Attributable%2520Invisible%2520Watermarking%2520for%2520Proactive%2520Deepfake%2520Defense%26entry.906535625%3DBibek%2520Das%2520and%2520Chandranath%2520Adak%2520and%2520Soumi%2520Chattopadhyay%2520and%2520Zahid%2520Akhtar%2520and%2520Soumya%2520Dutta%26entry.1292438233%3DDeepfakes%2520generated%25 {"title": "Generative Inversion of Spectroscopic Data for Amorphous Structure Elucidation", "author": "Jiawei Guo and Daniel Schwalbe-Koda", "abstract": "Determining atomistic structures from characterization data is one of the most common yet intricate problems in materials science. Particularly in amorphous materials, proposing structures that balance realism and agreement with experiments requires expert guidance, good interatomic potentials, or both. Here, we introduce GLASS, a generative framework that inverts multi-modal spectroscopic measurements into realistic atomistic structures without knowledge of the potential energy surface. A score-based model learns a structural prior from low-fidelity data and samples out-of-distribution structures conditioned on differentiable spectral targets. Reconstructions using pair distribution functions (PDFs), X-ray absorption spectroscopy, and diffraction measurements quantify the complementarity between spectral modalities and demonstrate that PDFs is the most informative probe for our framework. We use GLASS to rationalize three contested experimental problems: paracrystallinity in amorphous silicon, a liquid-liquid phase transition in sulfur, and ball-milled amorphous ice. In each case, generated structures reproduce experimental measurements and reveal mechanisms inaccessible to diffraction analysis alone.", "link": "http://arxiv.org/abs/2603.23210v1", "date": "2026-03-24", "relevancy": 2.4343, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4924}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4841}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Inversion%20o 208=http%3A//arxiv.org/abs/2603.23210v1&entry.124074799=Read"},
{"title": "Leakage and Interpretability in Concept-Based Models", "author": "Enrico Parisini and Tapabrata Chakraborti and Chris Harbron and Ben D. MacArthur and Christopher R. S. Banerji", "abstract": "Concept-based Models aim to improve interpretability by predicting high-level intermediate concepts, representing a promising approach for deployment in high-risk scenarios. However, they are known to suffer from information leakage, whereby models exploit unintended information encoded within the learned concepts. We introduce an information-theoretic framework to rigorously characterise and quantify leakage, and define two complementary measures: the concepts-task leakage (CTL) and interconcept leakage (ICL) scores. We show that these measures are strongly predictive of model behaviour under interventions and outperform existing alternatives. Using this framework, we identify the primary causes of leakage and, as a case study, analyse how it manifests in Concept Embedding Models, revealing interconcept and alignment leakage in addition to the concepts-task leakage present by design. Finally, we present a set of practical guidelines for designing concept-based models to reduce leakage and ensure interpretability.", "link": "http://arxiv.org/abs/2504.14094v3", "date": "2026-03-24", "relevancy": 2.4249, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4927}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4927}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4694}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leakage%20and%20Interpretability%20in%20Concept-Based%20Models&body=Title%3A%20Leakage%20and%20Interpretability%20in%20Concept-Based%20Models%0AAuthor%3A%20Enrico%20Parisini%20and%20Tapabrata%20Chakraborti%20and%20Chris%20Harbron%20and%20Ben%20D.%20MacArthur%20and%20Christopher%20R.%20S.%20Banerji%0AAbstract%3A%20Concept-based%20Models%20aim%20to%20improve%20interpretability%20by%20predicting%20high-level%20intermediate%20concepts%2C%20representing%20a%20promising%20approach%20for%20deployment%20in%20high-risk%20scenarios.%20However%2C%20they%20are%20known%20to%20suffer%20from%20information%20leakage%2C%20whereby%20models%20exploit%20unintended%20information%20encoded%20within%20the%20learned%20concepts.%20We%20introduce%20an%20information-theoretic%20framework%20to%20rigorously%20characterise%20and%20quantify%20leakage%2C%20and%20define%20two%20complementary%20measures%3A%20the%20concepts-task%20leakage%20%28CTL%29%20and%20interconcept%20leakage%20%28ICL%29%20scores.%20We%20show%20that%20these%20measures%20are%20strongly%20predictive%20of%20model%20behaviour%20under%20interventions%20and%20outperform%20existing%20alternatives.%20Using%20this%20framework%2C%20we%20identify%20the%20primary%20causes%20of%20leakage%20and%2C%20as%20a%20case%20study%2C%20analyse%20how%20it%20manifests%20in%20Concept%20Embedding%20Models%2C%20revealing%20interconcept%20and%20alignment%20leakage%20in%20addition%20to%20the%20concepts-task%20leakage%20present%20by%20design.%20Finally%2C%20we%20present%20a%20set%20of%20practical%20guidelines%20for%20designing%20concept-based%20models%20to%20reduce%20leakage%20and%20ensure%20interpretability.%0ALink%3A%20http%3A//arxiv.org/abs/2504.14094v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeakage%2520and%2520Interpretability%2520in%2520Concept-Based%2520Models%26entry.906535625%3DEnrico%2520Parisini%2520and%2520Tapabrata%2520Chakraborti%2520and%2520Chris {"title": "RealMaster: Lifting Rendered Scenes into Photorealistic Video", "author": "Dana Cohen-Bar and Ido Sobol and Raphael Bensadoun and Shelly Sheynin and Oran Gafni and Or Patashnik and Daniel Cohen-Or and Amit Zohar", "abstract": "State-of-the-art video generation models produce remarkable photorealism, but they lack the precise control required to align generated content with specific scene requirements. Furthermore, without an underlying explicit geometry, these models cannot guarantee 3D consistency. Conversely, 3D engines offer granular control over every scene element and provide native 3D consistency by design, yet their output often remains trapped in the \"uncanny valley\". Bridging this sim-to-real gap requires both structural precision, where the output must exactly preserve the geometry and dynamics of the input, and global semantic transformation, where materials, lighting, and textures must be holistically transformed to achieve photorealism. We present RealMaster, a method that leverages video diffusion models to lift rendered video into photorealistic video while maintaining full alignment with the output of the 3D engine. To train this model, we generate a paired dataset via an anchor-based propagation strategy, where the first and last frames are enhanced for realism and propagated across the intermediate frames using geometric conditioning cues. We then train an IC-LoRA on these paired videos to distill the high-quality outputs of the pipeline into a model that generalizes beyond the pipeline's constraints, handling objects and characters that appear mid-sequence and enabling inference without requiring anchor frames. Evaluated on complex GTA-V sequences, RealMaster significantly outperforms existing video editing baselines, improving photorealism while preserving the geometry, dynamics, and identity specified by the original 3D control.", "link": "http://arxiv.org/abs/2603.23462v1", "date": "2026-03-24", "relevancy": 2.418, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6215}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5949}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5859}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RealMaster%3A%20Lifting%20Rendered%20Scenes%20into%20Photorealistic%20Video&body=Title%3A%20RealMaster%3A%20Lifting%20Rendered%20Scenes%20into%20Photorealistic%20Video%0AAuthor%3A%20Dana%20Cohen-Bar%20and%20Ido%20Sobol%20and%20Raphael%20Bensadoun%20and%20Shelly%20Sheynin%20and%20Oran%20Gafni%20and%20Or%20Patashnik%20and%20Daniel%20Cohen-Or%20and%20Amit%20Zohar%0AAbstract%3A%20State-of-the-art%20video%20generation%20models%20produce%20remarkable%20photorealism%2C%20but%20they%20lack%20the%20precise%20control%20required%20to%20align%20generated%20content%20with%20specific%20scene%20requirements.%20Furthermore%2C%20without%20an%20underlying%20explicit%20geometry%2C%20these%20models%20cannot%20guarantee%203D%20consistency.%20Conversely%2C%203D%20engines%20offer%20granular%20control%20over%20every%20scene%20element%20and%20provide%20native%203D%20consistency%20by%20design%2C%20yet%20their%20output%20often%20remains%20trapped%20in%20the%20%22uncanny%20valley%22.%20Bridging%20this%20sim-to-real%20gap%20requires%20both%20structural%20precision%2C%20where%20the%20output%20must%20exactly%20preserve%20the%20geometry%20and%20dynamics%20of%20the%20input%2C%20and%20global%20semantic%20transformation%2C%20where%20materials%2C%20lighting%2C%20and%20textures%20must%20be%20holistically%20transformed%20to%20achieve%20photorealism.%20We%20present%20RealMaster%2C%20a%20method%20that%20leverages%20video%20diffusion%20models%20to%20lift%20rendered%20video%20into%20photorealistic%20video%20while%20maintaining%20full%20alignment%20with%20the%20output%20of%20the%203D%20engine.%20To%20train%20this%20model%2C%20we%20generate%20a%20paired%20dataset%20via%20an%20anchor-based%20propagation%20strategy%2C%20where%20the%20first%20and%20last%20frames%20are%20enhanced%20for%20realism%20and%20propagated%20across%20the%20intermediate%20frames%20using%20geometric%20conditioning%20cues.%20We%20then%20train%20an%20IC-LoRA%20on%20these%20paired%20videos%20to%20distill%20the%20high-quality%20outputs%20of%20the%20pipeline%20into%20a%20model%20that%20generalizes%20beyond%20the%20pipeline%27s%20constraints%2C%20handling%20objects%20and%20characters%20that%20appear%20mid-sequence%20and%20enabling%20inference%20without%20requiring%20anchor%20frames.%20Evaluated%20on%20complex%20GTA-V%20sequences%2C%20RealMaster%20significantly%20outperforms%20existing%20video%20editing%20baselines%2C%20improving%20photorealism%20while%20preserving%20the%20geometry%2C%20dynamics%2C%20and%20identity%20specified%20by%20the%20original%203D%20control.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23462v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRealMaster%253A%2520Lifting%2520Rendered%2520Scenes%2520into%2520Photorealistic%2520Video%26entry.906535625%3DDana%2520Cohen-Bar%2520and%2520Ido%2520Sobol%2520and%2520Raphael%2520Bensadoun%2520and%2520Shelly%2520Sheynin%2520and%2520Oran%2520Gafni%2520and%2520Or%2520Patashnik%2520and%2520Daniel%2520Cohen-Or%2520and%2520Amit%2520Zohar%26entry.1292438233%3DState-of-the-art%2520video%2520generation%2520models%2520produce%2520remarkable%2520photorealism%252C%2520but%2520they%2520lack%2520the%2520precise%2520control%2520required%2520to%2520align%2520generated%2520content%2520with%2520specific%2520scene%2520requirements.%2520Furthermore%252C%2520without%2520an%2520underlying%2520explicit%2520geometry%252C%2520these%2520models%2520cannot%2520guarantee%25203D%2520consistency.%2520Conversely%252C%25203D% {"title": "Mapping the Challenges of HCI: An Application and Evaluation of ChatGPT for Mining Insights at Scale", "author": "Jonas Oppenlaender and Joonas H\u00e4m\u00e4l\u00e4inen", "abstract": "Large language models (LLMs) are increasingly used for analytical tasks, yet their effectiveness in real-world applications remains underexamined, partly due to the opacity of proprietary models. We evaluate ChatGPT (GPT-3.5 and GPT-4) on the practical task of extracting research challenges from a large scholarly corpus in Human-Computer Interaction (HCI). Using a two-step approach, we first apply GPT-3.5 to extract candidate challenges from the 879 papers in the 2023 ACM CHI Conference proceedings, then use GPT-4 to select the most relevant challenges per paper. This process yielded 4,392 research challenges across 113 topics, which we organized through topic modeling and present in an interactive visualization. We compare the identified challenges with previously established HCI grand challenges and the United Nations Sustainable Development Goals, finding both strong alignment in areas such as ethics and accessibility, and gaps in areas such as human-AI collaboration. A task-specific evaluation with human raters confirmed near-perfect agreement that the extracted statements represent plausible research challenges (\\k{appa} = 0.97). The two-step approach proved cost-effective at approximately US$50 for the full corpus, suggesting that LLMs offer a practical means for qualitative text analysis at scale, particularly for prototyping research ideas and examining corpora from multiple analytical perspectives.", "link": "http://arxiv.org/abs/2306.05036v5", "date": "2026-03-24", "relevancy": 2.4174, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4909}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http:// {"title": "InterDyad: Interactive Dyadic Speech-to-Video Generation by Querying Intermediate Visual Guidance", "author": "Dongwei Pan and Longwei Guo and Jiazhi Guan and Luying Huang and Yiding Li and Haojie Liu and Haocheng Feng and Wei He and Kaisiyuan Wang and Hang Zhou", "abstract": "Despite progress in speech-to-video synthesis, existing methods often struggle to capture cross-individual dependencies and provide fine-grained control over reactive behaviors in dyadic settings. To address these challenges, we propose InterDyad, a framework that enables naturalistic interactive dynamics synthesis via querying structural motion guidance. Specifically, we first design an Interactivity Injector that achieves video reenactment based on identity-agnostic motion priors extracted from reference videos. Building upon this, we introduce a MetaQuery-based modality alignment mechanism to bridge the gap between conversational audio and these motion priors. By leveraging a Multimodal Large Language Model (MLLM), our framework is able to distill linguistic intent from audio to dictate the precise timing and appropriateness of reactions. To further improve lip-sync quality under extreme head poses, we propose Role-aware Dyadic Gaussian Guidance (RoDG) for enhanced lip-synchronization and spatial consistency. Finally, we introduce a dedicated evaluation suite with novelly designed metrics to quantify dyadic interaction. Comprehensive experiments demonstrate that InterDyad significantly outperforms state-of-the-art methods in producing natural and contextually grounded two-person interactions. Please refer to our project page for demo videos: https://interdyad.github.io/.", "link": "http://arxiv.org/abs/2603.23132v1", "date": "2026-03-24", "relevancy": 2.4114, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6137}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6012}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InterDyad%3A%20Interactive%20Dyadic%20Speech-to-Video%20Generation%20by%20Querying%20Intermediate%20Visual%20Guidance&body=Title%3A%20InterDyad%3A%20Interactive%20Dyadic%20Speech-to-Video%20Generation%20by%20Querying%20Intermediate%20Visual%20Guidance%0AAuthor%3A%20Dongwei%20Pan%20and%20Longwei%20Guo%20and%20Jiazhi%20Guan%20and%20Luying%20Huang%20and%20Yiding%20Li%20and%20Haojie%20Liu%20and%20Haocheng%20Feng%20and%20Wei%20He%20and%20Kaisiyuan%20Wang%20and%20Hang%20Zhou%0AAbstract%3A%20Despite%20progress%20in%20speech-to-video%20synthesis%2C%20existing%20methods%20often%20struggle%20to%20capture%20cross-individual%20dependencies%20and%20provide%20fine-grained%20control%20over%20reactive%20behaviors%20in%20dyadic%20settings.%20To%20address%20these%20challenges%2C%20we%20propose%20InterDyad%2C%20a%20framework%20that%20enables%20naturalistic%20interactive%20dynamics%20synthesis%20via%20querying%20structural%20motion%20guidance.%20Specifically%2C%20we%20first%20design%20an%20Interactivity%20Injector%20that%20achieves%20video%20reenactment%20based%20on%20identity-agnostic%20motion%20priors%20extracted%20from%20reference%20videos.%20Building%20upon%20this%2C%20we%20introduce%20a%20MetaQuery-based%20modality%20alignment%20mechanism%20to%20bridge%20the%20gap%20between%20conversational%20audio%20and%20these%20motion%20priors.%20By%20leveraging%20a%20Multimodal%20Large%20Language%20Model%20%28MLLM%29%2C%20our%20framework%20is%20able%20to%20distill%20linguistic%20intent%20from%20audio%20to%20dictate%20the%20precise%20timing%20and%20appropriateness%20of%20reactions.%20To%20further%20improve%20lip-sync%20quality%20under%20extreme%20head%20poses%2C%20we%20propose%20Role-aware%20Dyadic%20Gaussian%20Guidance%20%28RoDG%29%20for%20enhanced%20lip-synchronization%20and%20spatial%20consistency.%20Finally%2C%20we%20introduce%20a%20dedicated%20evaluation%20suite%20with%20novelly%20designed%20metrics%20to%20quantify%20dyadic%20interaction.%20Comprehensive%20experiments%20demonstrate%20that%20InterDyad%20significantly%20outperforms%20state-of-the-art%20methods%20in%20producing%20natural%20and%20contextually%20grounded%20two-person%20interactions.%20Please%20refer%20to%20our%20project%20page%20for%20demo%20videos%3A%20https%3A//interdyad.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23132v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInterDyad%253A%2520Interactive%2520Dyadic%2520Speech-to-Video%2520Generation%2520by%2520Querying%2520Intermediate%2520Visual%2520Guidance%26entry.906535625%3DDongwei%2520Pan%2520and%2520Longwei%2520Guo%2520and%2520Jiazhi%2520Guan%2520and%2520Luying%2520Huang%2520and%2520Yiding%2520Li%2520and%2520Haojie%2520Liu%2520and%2520Haocheng%2520Feng%2520and%2520Wei%2520He%2520and%2520Kaisiyuan%2520Wang%2520and%2520Hang%2520Zhou%26entry.1292438233%3DDespite%2520progress%2520in%2520speech-to-video%2520synthesis%252C%2520existing%2520methods%2520often%2520struggle%2520to%2520capture%2520cross-individual%2520dependencies%2520and%2520provide%2520fine-grained%2520control%2520over%2520reactive%2520behaviors%2520in%2520dyadic%2520settings.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520InterDyad%252C%2520a%2520framework%2520that%2520enables%2520naturalistic%2520interactive%2520dynamics%2520synthesis%2520via%2520querying%2520structural%2520motion%2520guidance.%2520Specifically%252C%2520we%2520first%2520design%2520an%2520Interactivity%2520Injector%2520that%2520achieves%2520video%2520reenactment%2520based%2520on%2520identity-agnostic%2520motion%2520priors%2520extracted%2520from%2520reference%2520videos.%2520Building%2520upon%2520this%252C%2520we%252 {"title": "ImmerseGen: Agent-Guided Immersive World Generation with Alpha-Textured Proxies", "author": "Jinyan Yuan and Bangbang Yang and Keke Wang and Panwang Pan and Lin Ma and Xuehai Zhang and Xiao Liu and Zhaopeng Cui and Yuewen Ma", "abstract": "Automating immersive VR scene creation remains a primary research challenge. Existing methods typically rely on complex geometry with post-simplification, resulting in inefficient pipelines or limited realism. In this paper, we introduce ImmerseGen, a novel agent-guided framework for compact and photorealistic world generation that decouples realism from exhaustive geometric modeling. ImmerseGen represents scenes as hierarchical compositions of lightweight geometric proxies with synthesized RGBA textures, facilitating real-time rendering on mobile VR headsets. We propose terrain-conditioned texturing for base world generation, combined with context-aware texturing for scenery, to produce diverse and visually coherent worlds. VLM-based agents employ semantic grid-based analysis for precise asset placement and enrich scenes with multimodal enhancements such as visual dynamics and ambient sound. Experiments and real-time VR applications demonstrate that ImmerseGen achieves superior photorealism, spatial coherence, and rendering efficiency compared to existing methods.", "link": "http://arxiv.org/abs/2506.14315v3", "date": "2026-03-24", "relevancy": 2.3994, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6772}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6019}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ImmerseGen%3A%20Agent-Guided%20Immersive%20World%20Generation%20with%20Alpha-Textured%20Proxies&body=Title%3A%20ImmerseGen%3A%20Agent-Guided%20Immersive%20World%20Generation%20with%20Alpha-Textured%20Proxies%0AAuthor%3A%20Jinyan%20Yuan%20and%20Bangbang%20Yang%20and%20Keke%20Wang%20and%20Panwang%20Pan%20and%20Lin%20Ma%20and%20Xuehai%20Zhang%20and%20Xiao%20Liu%20and%20Zhaopeng%20Cui%20and%20Yuewen%20Ma%0AAbstract%3A%20Automating%20immersive%20VR%20scene%20creation%20remains%20a%20primary%20research%20challenge.%20Existing%20methods%20typically%20rely%20on%20complex%20geometry%20with%20post-simplification%2C%20resulting%20in%20inefficient%20pipelines%20or%20limited%20realism.%20In%20this%20paper%2C%20we%20introduce%20ImmerseGen%2C%20a%20novel%20agent-guided%20framework%20for%20compact%20and%20photorealistic%20world%20generation%20that%20decouples%20realism%20from%20exhaustive%20geometric%20modeling.%20ImmerseGen%20represents%20scenes%20as%20hierarchical%20compositions%20of%20lightweight%20geometric%20proxies%20with%20synthesized%20RGBA%20textures%2C%20facilitating%20real-time%20rendering%20on%20mobile%20VR%20headsets.%20We%20propose%20terrain-conditioned%20texturing%20for%20base%20world%20generation%2C%20combined%20with%20context-aware%20texturing%20for%20scenery%2C%20to%20produce%20diverse%20and%20visually%20coherent%20worlds.%20VLM-based%20agents%20employ%20semantic%20grid-based%20analysis%20for%20precise%20asset%20placement%20and%20enrich%20scenes%20with%20multimodal%20enhancements%20such%20as%20visual%20dynamics%20and%20ambient%20sound.%20Experiments%20and%20real-time%20VR%20applications%20demonstrate%20that%20ImmerseGen%20achieves%20superior%20photorealism%2C%20spatial%20coherence%2C%20and%20rendering%20efficiency%20compared%20to%20existing%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2506.14315v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImmerseGen%253A%2520Agent-Guided%2520Immersive%2520World%2520Generation%2520with%2520Alpha-Textured%2520Proxies%26entry.906 : "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ImmerseGen%3A%20Agent-Guided%20Immersive%20World%20Generation%20with%20Alpha-Textured%20Proxies&entry.906535625=Jinyan%20Yuan%20and%20Bangbang%20Yang%20and%20Keke%20Wang%20and%20Panwang%20Pan%20and%20Lin%20Ma%20and%20Xuehai%20Zhang%20and%20Xiao%20Liu%20and%20Zhaopeng%20Cui%20and%20Yuewen%20Ma&entry.1292438233=Automating%20immersive%20VR%20scene%20creation%20remains%20a%20primary%20research%20challenge.%20Existing%20methods%20typically%20rely%20on%20complex%20geometry%20with%20post-simplification%2C%20resulting%20in%20inefficient%20pipelines%20or%20limited%20realism.%20In%20this%20paper%2C%20we%20introduce%20ImmerseGen%2C%20a%20novel%20agent-guided%20framework%20for%20compact%20and%20photorealistic%20world%20generation%20that%20decouples%20realism%20from%20exhaustive%20geometric%20modeling.%20ImmerseGen%20represents%20scenes%20as%20hierarchical%20compositions%20of%20lightweight%20geometric%20proxies%20with%20synthesized%20RGBA%20textures%2C%20facilitating%20real-time%20rendering%20on%20mobile%20VR%20headsets.%20We%20propose%20terrain-conditioned%20texturing%20for%20base%20world%20generation%2C%20combined%20with%20context-aware%20texturing%20for%20scenery%2C%20to%20produce%20diverse%20and%20visually%20coherent%20worlds.%20VLM-based%20agents%20employ%20semantic%20grid-based%20analysis%20for%20precise%20asset%20placement%20and%20enrich%20scenes%20with%20multimodal%20enhancements%20such%20as%20visual%20dynamics%20and%20ambient%20sound.%20Experiments%20and%20real-time%20VR%20applications%20demonstrate%20that%20ImmerseGen%20achieves%20superior%20photorealism%2C%20spatial%20coherence%2C%20and%20rendering%20efficiency%20compared%20to%20existing%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2506.14315v3&entry.124074799=Read"},
{"title": "Arena: Efficiently Training Large Models via Dynamic Scheduling and Adaptive Parallelism Co-Design", "author": "Chunyu Xue and Weihao Cui and Quan Chen and Chen Chen and Han Zhao and Shulai Zhang and Linmei Wang and Yan Li and Limin Xiao and Weifeng Zhang and Jing Yang and Bingsheng He and Minyi Guo", "abstract": "Efficiently training large-scale models (LMs) in GPU clusters involves two separate avenues: inter-job dynamic scheduling and intra-job adaptive parallelism (AP). However, existing dynamic schedulers struggle with large-model scheduling due to the mismatch between static parallelism (SP)-aware scheduling and AP-based execution, leading to cluster inefficiencies such as degraded throughput and prolonged job queuing. This paper presents Arena, a large-model training system that co-designs dynamic scheduling and adaptive parallelism to achieve high cluster efficiency. To reduce scheduling costs while improving decision quality, Arena designs low-cost, disaggregated profiling and AP-tailored, load-aware performance estimation, while unifying them by sharding the joint scheduling-parallelism optimization space via a grid abstraction. Building on this, Arena dynamically schedules profiled jobs in elasticity and heterogeneity dimensions, and executes them using efficient AP with pruned search space. Evaluated on heterogeneous testbeds and production workloads, Arena reduces job completion time by up to $49.3\\%$ and improves cluster throughput by up to $1.60\\times$.", "link": "http://arxiv.org/abs/2403.16125v2", "date": "2026-03-24", "relevancy": 2.3903, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.488}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4748}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4714}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Arena%3A%20Efficiently%20Training%20Large%20Models%20via%20Dynamic%20Scheduling%20and%20Adaptive%20Parallelism%20Co-Design&body=Title%3A%20Arena%3A%20Efficiently%20Training%20Large%20Models%20via%20Dynamic%20Scheduling%20and%20Adaptive%20Parallelism%20Co-Design%0AAuthor%3A%20Chunyu%20Xue%20and%20Weihao%20Cui%20and%20Quan%20Chen%20and%20Chen%20Chen%20and%20Han%20Zhao%20and%20Shulai%20Zhang%20and%20Linmei%20Wang%20and%20Yan%20Li%20and%20Limin%20Xiao%20and%20Weifeng%20Zhang%20and%20Jing%20Yang%20and%20Bingsheng%20He%20and%20Minyi%20Guo%0AAbstract%3A%20Efficiently%20training%20large-scale%20models%20%28LMs%29%20in%20GPU%20clusters%20involves%20two%20separate%20avenues%3A%20inter-job%20dynamic%20scheduling%20and%20intra-job%20adaptive%20parallelism%20%28AP%29.%20However%2C%20existing%20dynamic%20schedulers%20struggle%20with%20large-model%20scheduling%20due%20to%20the%20mismatch%20between%20static%20parallelism%20%28SP%29-aware%20scheduling%20and%20AP-based%20execution%2C%20leading%20to%20cluster%20inefficiencies%20such%20as%20degraded%20throughput%20and%20prolonged%20job%20queuing.%20This%20paper%20presents%20Arena%2C%20a%20large-model%20training%20system%20that%20co-designs%20dynamic%20scheduling%20and%20adaptive%20parallelism%20to%20achieve%20high%20cluster%20efficiency.%20To%20reduce%20scheduling%20costs%20while%20improving%20decision%20quality%2C%20Arena%20designs%20low-cost%2C%20disaggregated%20profiling%20and%20AP-tailored%2C%20load-aware%20performance%20estimation%2C%20while%20unifying%20them%20by%20sharding%20the%20joint%20scheduling-parallelism%20optimization%20space%20via%20a%20grid%20abstraction.%20Building%20on%20this%2C%20Arena%20dynamically%20schedules%20profiled%20jobs%20in%20elasticity%20and%20heterogeneity%20dimensions%2C%20and%20executes%20them%20using%20efficient%20AP%20with%20pruned%20search%20space.%20Evaluated%20on%20heterogeneous%20testbeds%20and%20production%20workloads%2C%20Arena%20reduces%20job%20completion%20time%20by%20up%20to%20%2449.3%5C%25%24%20and%20improves%20cluster%20throughput%20by%20up%20to%20%241.60%5Ctimes%24.%0ALink%3A%20http%3A//arxiv.org/abs/2403.16125v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DArena%253A%2520Efficiently%2520Training%2520Large%2520Models%2520via%2520Dynamic%2520Scheduling%2520and%2520Adaptive%2520Parallelism%2520Co-Design%26entry.906535625%3DChunyu%2520Xue%2520and%2520Weihao%2520Cui%2520and%2520Quan%2520Chen%2520and%2520Chen%2520Chen%2520and%2520Han%2520Zhao%2520and%2520Shulai%2520Zhang%2520and%2520Linmei%2520Wang%2520and%2520Yan%2520Li%2520and%2520Limin%2520Xiao%2520and%2520Weifeng%2520Zhang%2520and%2520Jing%2520Yang%2520and%2520Bingsheng%2520He%2520and%2520Minyi%2520Guo%26entry.1292438233%3DEfficiently%2520training%2520large-scale%2520models%2520%2528LMs%2529%2520in%2520GPU%2520clusters%2520involves%2520two%2520separate%2520avenues%253A%2520inter-job%2520dynamic%2520scheduling%2520and%2520intra-job%2520adaptive%2520parallelism%2520%2528AP%2529.%2520However%252C%2520existing%2520dynamic%2520schedulers%2520struggle%2520with%2520large-model%2520scheduling%2520due%2520to%2520the%2520mismatch%2520between%2520static%2520parallelism%2520%2528SP%2529-aware%2520scheduling%2520and%2520AP-based%2520execution%252C%2520leading%2520to%2520cluster%2520inefficiencies%2520such%2520as%2520degraded%2520throughput%2520and%2520prolonged%2520job%2520queuing.%2520This%2520paper%2520presents%2520Arena%252C%2520a%2520large-model%2520training%2520system%2520that%2520co-designs%2520dynamic%2520scheduling%2520and%2520adaptive%2520parallelism%2520to%2520achieve%2520high%2520cluster%2520efficiency.%2520To%2520reduce%2520scheduling%2520costs%2520while%2520improving%2520decision%2520quality%252C%2520Arena%2520designs%2520low-cost%252C%2520disaggregated%2520profiling%2520and%2520AP-tailored%252C%2520lo {"title": "LiveWorld: Simulating Out-of-Sight Dynamics in Generative Video World Models", "author": "Zicheng Duan and Jiatong Xia and Zeyu Zhang and Wenbo Zhang and Gengze Zhou and Chenhui Gou and Yefei He and Feng Chen and Xinyu Zhang and Lingqiao Liu", "abstract": "Recent generative video world models aim to simulate visual environment evolution, allowing an observer to interactively explore the scene via camera control. However, they implicitly assume that the world only evolves within the observer's field of view. Once an object leaves the observer's view, its state is \"frozen\" in memory, and revisiting the same region later often fails to reflect events that should have occurred in the meantime. In this work, we identify and formalize this overlooked limitation as the \"out-of-sight dynamics\" problem, which impedes video world models from representing a continuously evolving world. To address this issue, we propose LiveWorld, a novel framework that extends video world models to support persistent world evolution. Instead of treating the world as static observational memory, LiveWorld models a persistent global state composed of a static 3D background and dynamic entities that continue evolving even when unobserved. To maintain these unseen dynamics, LiveWorld introduces a monitor-based mechanism that autonomously simulates the temporal progression of active entities and synchronizes their evolved states upon revisiting, ensuring spatially coherent rendering. For evaluation, we further introduce LiveBench, a dedicated benchmark for the task of maintaining out-of-sight dynamics. Extensive experiments show that LiveWorld enables persistent event evolution and long-term scene consistency, bridging the gap between existing 2D observation-based memory and true 4D dynamic world simulation. The baseline and benchmark will be publicly available at https://zichengduan.github.io/LiveWorld/index.html.", "link": "http://arxiv.org/abs/2603.07145v2", "date": "2026-03-24", e%20world%20as%20static%20observational%20memory%2C%20LiveWorld%20models%20a%20persistent%20global%20state%20composed%20of%20a%20static%203D%20background%20and%20dynamic%20entities%20that%20continue%20evolving%20even%20when%20unobserved.%20To%20maintain%20these%20unseen%20dynamics%2C%20LiveWorld%20introduces%20a%20monitor-based%20mechanism%20that%20autonomously%20simulates%20the%20temporal%20progression%20of%20active%20entities%20and%20synchronizes%20their%20evolved%20states%20upon%20revisiting%2C%20ensuring%20spatially%20coherent%20rendering.%20For%20evaluation%2C%20we%20further%20introduce%20LiveBench%2C%20a%20dedicated%20benchmark%20for%20the%20task%20of%20maintaining%20out-of-sight%20dynamics.%20Extensive%20experiments%20show%20that%20LiveWorld%20enables%20persistent%20event%20evolution%20and%20long-term%20scene%20consistency%2C%20bridging%20the%20gap%20between%20existing%202D%20observation-based%20memory%20and%20true%204D%20dynamic%20world%20simulation.%20The%20baseline%20and%20benchmark%20will%20be%20publicly%20available%20at%20https%3A//zichengduan.github.io/LiveWorld/index.html.%0ALink%3A%20http%3A//arxiv.org/abs/2603.07145v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLiveWorld%253A%2520Simulating%2520Out-of-Sight%2520Dynamics%2520in%2520Generative%2520Video%2520World%2520Models%26entry.906535625%3DZicheng%2520Duan%2520and%2520Jiatong%2520Xia%2520and%2520Zeyu%2520Zhang%2520and%2520Wenbo%2520Zhang%2520and%2520Gengze%2520Zhou%2520and%2520Chenhui%2520Gou%2520and%2520Yefei%2520He%2520and%2520Feng%2520Chen%2520and%2520Xinyu%2520Zhang%2520and%2520Lingqiao%2520Liu%26entry.1292438233%3DRecent%2520generative%2520video%2520world%2520models%2520aim%2520to%2520simulate%2520visual%2520environment%2520evolution%252C%2520allowing%2520an%2520observer%2520to%2520interactively%2520explore%2520the%2520scene%2520via%2520camera%2520control.%2520However%252C%2520they%2520implicitly%2520ass {"title": "Flying Pigs, FaR and Beyond: Evaluating LLM Reasoning in Counterfactual Worlds", "author": "Anish R Joishy and Ishwar B Balappanawar and Vamshi Krishna Bonagiri and Manas Gaur and Krishnaprasad Thirunarayan and Ponnurangam Kumaraguru", "abstract": "A fundamental challenge in reasoning is navigating hypothetical, counterfactual worlds where logic may conflict with ingrained knowledge. We investigate this frontier for Large Language Models (LLMs) by asking: Can LLMs reason logically when the context contradicts their parametric knowledge? To facilitate a systematic analysis, we first introduce CounterLogic, a benchmark specifically designed to disentangle logical validity from knowledge alignment. Evaluation of 11 LLMs across six diverse reasoning datasets reveals a consistent failure: model accuracy plummets by an average of 14% in counterfactual scenarios compared to knowledge-aligned ones. We hypothesize that this gap stems not from a flaw in logical processing, but from an inability to manage the cognitive conflict between context and knowledge. Inspired by human metacognition, we propose a simple yet powerful intervention: Flag & Reason (FaR), where models are first prompted to flag potential knowledge conflicts before they reason. This metacognitive step is highly effective, narrowing the performance gap to just 7% and increasing overall accuracy by 4%. Our findings diagnose and study a critical limitation in modern LLMs' reasoning and demonstrate how metacognitive awareness can make them more robust and reliable thinkers.", "link": "http://arxiv.org/abs/2505.22318v2", "date": "2026-03-24", "relevancy": 2.3894, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.502}, {"title": "Lexicon3D: Probing Visual Foundation Models for {"title": "Beyond Matching to Tiles: Bridging Unaligned Aerial and Satellite Views for Vision-Only UAV Navigation", "author": "Kejia Liu and Haoyang Zhou and Ruoyu Xu and Peicheng Wang and Mingli Song and Haofei Zhang", "abstract": "Recent advances in cross-view geo-localization (CVGL) methods have shown strong potential for supporting unmanned aerial vehicle (UAV) navigation in GNSS-denied environments. However, existing work predominantly focuses on matching UAV views to onboard map tiles, which introduces an inherent trade-off between accuracy and storage overhead, and overlooks the importance of the UAV's heading during navigation. Moreover, the substantial discrepancies and varying overlaps in cross-view scenarios have been insufficiently considered, limiting their generalization to real-world scenarios. In this paper, we present Bearing-UAV, a purely vision-driven cross-view navigation method that jointly predicts UAV absolute location and heading from neighboring features, enabling accurate, lightweight, and robust navigation in the wild. Our method leverages global and local structural features and explicitly encodes relative spatial relationships, making it robust to cross-view variations, misalignment, and feature-sparse conditions. We also present Bearing-UAV-90k, a multi-city benchmark for evaluating cross-view localization and navigation. Extensive experiments show encouraging results that Bearing-UAV yields lower localization error than previous matching/retrieval paradigm across diverse terrains. Our code and dataset will be made publicly available.", "link": "http://arxiv.org/abs/2603.22153v2", "date": "2026-03-24", "relevancy": 2.3749, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.623}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5841}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5445}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Matching%20to%20Tiles%3A%20Bridging%20Unaligned%20Aerial%20and%20Satellite%20Views%20for%20Vision-Only%20UAV%20Navigation&body=Title%3A%20Beyond%20Matching%20to%20Tiles%3A%20Bridging%20Unaligned%20Aerial%20and%20Satellite%20Views%20for%20Vision-Only%20UAV%20Navigation%0AAuthor%3A%20Kejia%20Liu%20and%20Haoyang%20Zhou%20and%20Ruoyu%20Xu%20and%20Peicheng%20Wang%20and%20Mingli%20Song%20and%20Haofei%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20cross-view%20geo-localization%20%28CVGL%29%20methods%20have%20shown%20strong%20potential%20for%20supporting%20unmanned%20aerial%20vehicle%20%28UAV%29%20navigation%20in%20GNSS-denied%20environments.%20However%2C%20existing%20work%20predominantly%20focuses%20on%20matching%20UAV%20views%20to%20onboard%20map%20tiles%2C%20which%20introduces%20an%20inherent%20trade-off%20between%20accuracy%20and%20storage%20overhead%2C%20and%20overlooks%20the%20importance%20of%20the%20UAV%27s%20heading%20during%20navigation.%20Moreover%2C%20the%20substantial%20discrepancies%20and%20varying%20overlaps%20in%20cross-view%20scenarios%20have%20been%20insufficiently%20considered%2C%20limiting%20their%20generalization%20to%20real-world%20scenarios.%20In%20this%20paper%2C%20we%20present%20Bearing-UAV%2C%20a%20purely%20vision-driven%20cross-view%20navigation%20method%20that%20jointly%20predicts%20UAV%20absolute%20location%20and%20heading%20from%20neighboring%20features%2C%20enabling%20accurate%2C%20lightweight%2C%20and%20robust%20navigation%20in%20the%20wild.%20Our%20method%20leverages%20global%20and%20local%20structural%20features%20and%20explicitly%20encodes%20relative%20spatial%20relationships%2C%20making%20it%20robust%20to%20cross-view%20variations%2C%20misalignment%2C%20and%20feature-sparse%20conditions.%20We%20also%20present%20Bearing-UAV-90k%2C%20a%20multi-city%20benchmark%20for%20evaluating%20cross-view%20localization%20and%20navigation.%20Extensive%20experiments%20show%20encouraging%20results%20that%20Bearing-UAV%20yields%20lower%20localization%20error%20than%20previous%20matching/retrieval%20paradigm%20across%20diverse%20terrains.%20Our%20code%20and%20dataset%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22153v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Matching%2520to%2520Tiles%253A%2520Bridging%2520Unaligned%2520Aerial%2520and%2520Satellite%2520Views%2520for%2520Vision-Only%2520UAV%2520Navigation%26entry.906535625%3DKejia%2520Liu%2520and%2520Haoyang%2520Zhou%2520and%2520Ruoyu%2520Xu%2520and%2520Peicheng%2520Wang%2520and%2520Mingli%2520Song%2520and%2520Haofei%2520Zhang%26entry.1292438233%3DRecent%2520advances%2520in%2520cross-view%2520geo-localization%2520%2528CVGL%2529%2520methods%2520have%2520shown%2520strong%2520potential%2520for%2520supporting%2520unmanned%2520aerial%2520vehicle%2520%2528UAV%2529%2520navigation%2520in%2520GNSS-denied%2520environments.%2520However%252C%2520existing%2520work%2520predominantly%2520focuses%2520on%2520matching%2520UAV%2520views%2520to%2520onboard%2520map%2520tiles%252C%2520which%2520introduces%2520an%2520inherent%2520trade-off%2520between%2520accuracy%2520and%2520storage%2520overhead%252C%2520and%2520overlooks%2520the%2520importance%2520of%2520the%2520UAV%2527s%2520heading%2520during%2520navigation.%2520Moreover%252C%2520the%2520substantial%2520discrepancies%2520and%2520varying%2520overlaps%2520in%2520cross-view%2520scenarios%2520have%2520been%2520insufficiently%2520considered%252C%2520limiting%2520their%2520generalization%2520to%2520real-world%2520scenarios.%2520In%2520this%2520paper%252C%2520we%2520present%2520Bearing-UAV%252C%2520a%2520purely%2520vision-driven%2520cr {"title": "One View Is Enough! Monocular Training for In-the-Wild Novel View Generation", "author": "Adrien Ramanana Rahary and Nicolas Dufour and Patrick Perez and David Picard", "abstract": "Monocular novel-view synthesis has long required multi-view image pairs for supervision, limiting training data scale and diversity. We argue it is not necessary: one view is enough. We present OVIE, trained entirely on unpaired internet images. We leverage a monocular depth estimator as a geometric scaffold at training time: we lift a source image into 3D, apply a sampled camera transformation, and project to obtain a pseudo-target view. To handle disocclusions, we introduce a masked training formulation that restricts geometric, perceptual, and textural losses to valid regions, enabling training on 30 million uncurated images. At inference, OVIE is geometry-free, requiring no depth estimator or 3D representation. Trained exclusively on in-the-wild images, OVIE outperforms prior methods in a zero-shot setting, while being 600x faster than the second-best baseline. Code and models are publicly available at https://github.com/AdrienRR/ovie.", "link": "http://arxiv.org/abs/2603.23488v1", "date": "2026-03-24", "relevancy": 2.3622, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5932}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5932}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5772}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20View%20Is%20Enough%21%20Monocular%20Training%20for%20In-the-Wild%20Novel%20View%20Generation&body=Title%3A%20One%20View%20Is%20Enough%21%20Monocular%20Training%20for%20In-the-Wild%20Novel%20View%20Generation%0AAuthor%3A%20Adrien%20Ramanana%20Rahary%20and%20Nicolas%20Dufour%20and%20Patrick%20Perez%20and%20David%20Picard%0AAbstract%3A%20Monocular%20novel-view%20synthesis%20has%20long%20required%20multi-view%20image%20pairs%20for%20supervision%2C%20limiting%20training%20data%20scale%20and%20diversity.%20We%20argue%20it%20is%20not%20necessary%3A%20one%20view%20is%20enough.%20We%20present%20OVIE%2C%20trained%20entirely%20on%20unpaired%20internet%20images.%20We%20leverage%20a%20monocular%20depth%20estimator%20as%20a%20geometric%20scaffold%20at%20training%20time%3A%20we%20lift%20a%20source%20image%20into%203D%2C%20apply%20a%20sampled%20camera%20transformation%2C%20and%20project%20to%20obtain%20a%20pseudo-target%20view.%20To%20handle%20disocclusions%2C%20we%20introduce%20a%20masked%20training%20formulation%20that%20restricts%20geometric%2C%20perceptual%2C%20and%20textural%20losses%20to%20valid%20regions%2C%20enabling%20training%20on%2030%20million%20uncurated%20images.%20At%20inference%2C%20OVIE%20is%20geometry-free%2C%20requiring%20no%20depth%20estimator%20or%203D%20representation.%20Trained%20exclusively%20on%20in-the-wild%20images%2C%20OVIE%20outperforms%20prior%20methods%20in%20a%20zero-shot%20setting%2C%20while%20being%20600x%20faster%20than%20the%20second-best%20baseline.%20Code%20and%20models%20are%20publicly%20available%20at%20https%3A//github.com/AdrienRR/ovie.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23488v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520View%2520Is%2520Enough%2521%2520Monocular%2520Training%2520for%2520In-the-Wild%2520Novel%2520View%2520Generation%26entry.906535625%3DAdrien%2520Ramanana%2520Rahary%2520and%2520Nicolas%2520Dufour%2520and%2520Patrick%2520Perez%2520and%2520David%2520Picard%26entry.1292438233%3DMonocular%2520novel-view%2520synthesis%2520has%2520long%2520required%2520multi-view%2520image%2520pairs%2520for%2520supervision%252C%2520limiting%2520training%2520data%2520scale%2520and%2520diversity.%2520We%2520argue%2520it%2520is%2520not%2520necessary%253A%2520one%2520view%2520is%2520enough.%2520We%2520present%2520OVIE%252C%2520trained%2520entirely%2520on%2520unpaired%2520internet%2520images.%2520We%2520leverage%2520a%2520monocular%2520depth%2520estimator%2520as%2520a%2520geometric%2520scaffold%2520at%2520training%2520time%253A%2520we%2520lift%2520a%2520source%2520image%2520into%25203D%252C%2520apply%2520a%2520sampled%2520camera%2520transformation%252C%2520and%2520project%2520to%2520obtain%2520a%2520pseudo-target%2520view.%2520To%2520handle%2520disocclusions%252C%2520we%2520introduce%2520a%2520masked%2520training%2520formulation%2520that%2520restricts%2520geometric%252C%2520perceptual%252C%2520and%2520textural%2520losses%2520to%2520valid%2520regions%252C%2520enabling%2520training%2520on%252030%2520million%2520uncurated%2520images.%2520At%2520inference%252C%2520OVIE%2520is%2520geometry-free%252C%2520requiring%2520no%2520depth%2520estimator%2520or%25203D%2520representation.%2520Trained%2520exclusively%2520on%2520in-the-wild%2520images%252C%2520OVIE%2520outperforms%2520prior%2520methods%2520in%2520a%2520zero-shot%2520setting%252C%2520while%2520being%2520600x%2520faster%2520than%2520the%2520second-best%2520baseline.%2520Code%2520and%2520models%2520are%2520publicly%2520available%2520at%2520https%253A//github.com/AdrienRR/ovie.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23488v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=One%20View%20Is%20Enough%21%20Monocular%20Training%20for%20In-the-Wild%20Novel%20View%20Generation&entry.906535625=Adrien%20Ramanana%20Rahary%20and%20Nicolas%20Dufour%20and%20Patrick%20Perez%20and%20David%20Picard&entry.1292438233=Monocular%20novel-view%20synthesis%20has%20long%20required%20multi-view%20image%20pairs%20for%20supervision%2C%20limiting%20training%20data%20scale%20and%20diversity.%20We%20argue%20it%20is%2 {"title": "PiCo: Active Manifold Canonicalization for Robust Robotic Visual Anomaly Detection", "author": "Teng Yan and Binkai Liu and Shuai Liu and Yue Yu and Bingzhuo Zhong", "abstract": "Industrial deployment of robotic visual anomaly detection (VAD) is fundamentally constrained by passive perception under diverse 6-DoF pose configurations and unstable operating conditions such as illumination changes and shadows, where intrinsic semantic anomalies and physical disturbances coexist and interact. To overcome these limitations, a paradigm shift from passive feature learning to Active Canonicalization is proposed. PiCo (Pose-in-Condition Canonicalization) is introduced as a unified framework that actively projects observations onto a condition-invariant canonical manifold. PiCo operates through a cascaded mechanism. The first stage, Active Physical Canonicalization, enables a robotic agent to reorient objects in order to reduce geometric uncertainty at its source. The second stage, Neural Latent Canonicalization, adopts a three-stage denoising hierarchy consisting of photometric processing at the input level, latent refinement at the feature level, and contextual reasoning at the semantic level, progressively eliminating nuisance factors across representational scales. Extensive evaluations on the large-scale M2AD benchmark demonstrate the superiority of this paradigm. PiCo achieves a state-of-the-art 93.7% O-AUROC, representing a 3.7% improvement over prior methods in static settings, and attains 98.5% accuracy in active closed-loop scenarios. These results demonstrate that active manifold canonicalization is critical for robust embodied perception.", "link": "http://arxiv.org/abs/2603.23122v1", "date": "2026-03-24", "relevancy": 2.3406, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6118}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5869}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5728}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PiCo%3A%20Active%20Manifold%20Canonicalization%20for%20Robust%20Robotic%20Visual%20Anomaly%20Detection&body=Title%3A%20PiCo%3A%20Active%20Manifold%20Canonicalization%20for%20Robust%20Robotic%20Visual%20Anomaly%20Detection%0AAuthor%3A%20Teng%20Yan%20and%20Binkai%20Liu%20and%20Shuai%20Liu%20and%20Yue%20Yu%20and%20Bingzhuo%20Zhong%0AAbstract%3A%20Industrial%20deployment%20of%20robotic%20visual%20anomaly%20detection%20%28VAD%29%20is%20fundamentally%20constrained%20by%20passive%20perception%20under%20diverse%206-DoF%20pose%20configurations%20and%20unstable%20operating%20conditions%20such%20as%20illumination%20changes%20and%20shadows%2C%20where%20intrinsic%20semantic%20anomalies%20and%20physical%20disturbances%20coexist%20and%20interact.%20To%20overcome%20these%20limitations%2C%20a%20paradigm%20shift%20from%20passive%20feature%20learning%20to%20Active%20Canonicalization%20is%20proposed.%20PiCo%20%28Pose-in-Condition%20Canonicalization%29%20is%20introduced%20as%20a%20unified%20framework%20that%20actively%20projects%20observations%20onto%20a%20condition-invariant%20canonical%20manifold.%20PiCo%20operates%20through%20a%20cascaded%20mechanism.%20The%20first%20stage%2C%20Active%20Physical%20Canonicalization%2C%20enables%20a%20robotic%20agent%20to%20reorient%20objects%20in%20order%20to%20reduce%20geometric%20uncertainty%20at%20its%20source.%20The%20second%20stage%2C%20Neural%20Latent%20Canonicalization%2C%20adopts%20a%20three-stage%20denoising%20hierarchy%20consisting%20of%20photometric%20processing%20at%20the%20input%20level%2C%20latent%20refinement%20at%20the%20feature%20level%2C%20and%20contextual%20reasoning%20at%20the%20semantic%20level%2C%20progressively%20eliminating%20nuisance%20factors%20across%20representational%20scales.%20Extensive%20evaluations%20on%20the%20large-scale%20M2AD%20benchmark%20demonstrate%20the%20superiority%20of%20this%20paradigm.%20PiCo%20achieves%20a%20state-of-the-art%2093.7%25%20O-AUROC%2C%20representing%20a%203.7%25%20improvement%20over%20prior%20methods%20in%20static%20settings%2C%20and%20attains%2098.5%25%20accuracy%20in%20active%20closed-loop%20scenarios.%20These%20results%20demonstrate%20that%20active%20manifold%20canonicalization%20is%20critical%20for%20robust%20embodied%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23122v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPiCo%253A%2520Active%2520Manifold%2520Canonicalization%2520for%2520Robust%2520Robotic%2520Visual%2520Anomaly%2520Detection%26entry.906535625%3DTeng%2520Yan%2520and%2520Binkai%2520Liu%2520and%2520Shuai%2520Liu%2520and%2520Yue%2520Yu%2520and%2520Bingzhuo%2520Zhong%26entry.1292438233%3DIndustrial%2520deployment%2520of%2520robotic%2520visual%2520anomaly%2520detection%2520%2528VAD%2529%2520is%2520fundamentally%2520constrained%2520by%2520passive%2520perception%2520under%2520diverse%25206-DoF%2520pose%2520configurations%2520and%2520unstable%2520operating%2520conditions%2520such%2520as%2520illumination%2520changes%2520and%2520shadows%252C%2520where%2520intrinsic%2520semantic%2520anomalies%2520and%2520physical%2520disturbances%2520coexist%2520and%2520interact.%2520To%2520overcome%2520these%2520limitations%252C%2520a%2520paradigm%2520shift%2520from%2520passive%2520feature%2520learning%2520to%2520Active%2520Canonicalization%2520is%2520proposed.%2520PiCo%2520%2528Pose-in-Condition%2520Canonicalization%2529%2520is%2520introduced%2520as%2520a%2520unified%2520framework%2520that%2520actively%2520projects%2520observations%2520onto%2520a%2520condition-invariant%2520canonical%2520mani ion%20under%20diverse%206-DoF%20pose%20configurations%20and%20unstable%20operating%20conditions%20such%20as%20illumination%20changes%20and%20shadows%2C%20where%20intrinsic%20semantic%20anomalies%20and%20physical%20disturbances%20coexist%20and%20interact.%20To%20overcome%20these%20limitations%2C%20a%20paradigm%20shift%20from%20passive%20feature%20learning%20to%20Active%20Canonicalization%20is%20proposed.%20PiCo%20%28Pose-in-Condition%20Canonicalization%29%20is%20introduced%20as%20a%20unified%20framework%20that%20actively%20projects%20observations%20onto%20a%20condition-invariant%20canonical%20manifold.%20PiCo%20operates%20through%20a%20cascaded%20mechanism.%20The%20first%20stage%2C%20Active%20Physical%20Canonicalization%2C%20enables%20a%20robotic%20agent%20to%20reorient%20objects%20in%20order%20to%20reduce%20geometric%20uncertainty%20at%20its%20source.%20The%20second%20stage%2C%20Neural%20Latent%20Canonicalization%2C%20adopts%20a%20three-stage%20denoising%20hierarchy%20consisting%20of%20photometric%20processing%20at%20the%20input%20level%2C%20latent%20refinement%20at%20the%20feature%20level%2C%20and%20contextual%20reasoning%20at%20the%20semantic%20level%2C%20progressively%20eliminating%20nuisance%20factors%20across%20representational%20scales.%20Extensive%20evaluations%20on%20the%20large-scale%20M2AD%20benchmark%20demonstrate%20the%20superiority%20of%20this%20paradigm.%20PiCo%20achieves%20a%20state-of-the-art%2093.7%25%20O-AUROC%2C%20representing%20a%203.7%25%20improvement%20over%20prior%20methods%20in%20static%20settings%2C%20and%20attains%2098.5%25%20accuracy%20in%20active%20closed-loop%20scenarios.%20These%20results%20demonstrate%20that%20active%20manifold%20canonicalization%20is%20critical%20for%20robust%20embodied%20perception.&entry.1838667208=http%3A//arxiv.org/abs/2603.23122v1&entry.124074799=Read"},
{"title": "MKA: Memory-Keyed Attention for Efficient Long-Context Reasoning", "author": "Dong Liu and Yanxuan Yu and Ben Lengerich and Ying Nian Wu", "abstract": "As long-context language modeling becomes increasingly important, the cost of maintaining and attending to large Key/Value (KV) caches grows rapidly, becoming a major bottleneck in both training and inference. While prior works such as Multi-Query Attention (MQA) and Multi-Latent Attention (MLA) reduce memory by sharing or compressing KV features, they often trade off representation quality or incur runtime overhead. We propose Memory-Keyed Attention (MKA), a hierarchical attention mechanism that integrates multi-level KV caches (local, session, and long-term) and learns to route attention across them dynamically. We further introduce Route-Fused MKA (FastMKA), a broadcast-routed variant that fuses memory sources before attention computation for improved efficiency. Experiments on different sequence lengths show that FastMKA achieves a favorable accuracy-efficiency trade-off: comparable perplexity to MLA while achieving up to 5x faster training throughput and 1.8x lower evaluation latency. These results highlight MKA as a practical and extensible framework for efficient long-context attention.", "link": "http://arxiv.org/abs/2603.20586v2", "date": "2026-03-24", "relevancy": 2.3383, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4907}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MKA%3A%20Memory-Keyed%20Attention%20for%20Efficient%20Long-Context%20Reasoning&body=Title%3A%20MKA%3A%20Memory-Keyed%20Attention%20for%20Efficient%20Long-Context%20Reasoning%0AAuthor%3A%20Dong%20Liu%20and%20Yanxuan%20Yu%20and%20Ben%20Lengerich%20and%20Ying%20Nian%20Wu%0AAbstract%3A%20As%20long-context%20language%20modeling%20becomes%20increasingly%20important%2C%20the%20cost%20of%20maintaining%20and%20attending%20to%20large%20Key/Value%20%28KV%29%20caches%20grows%20rapidly%2C%20becoming%20a%20major%20bottleneck%20in%20both%20training%20and%20inference.%20While%20prior%20works%20such%20as%20Multi-Query%20Attention%20%28MQA%29%20and%20Multi-Latent%20Attention%20%28MLA%29%20reduce%20memory%20by%20sharing%20or%20compressing%20KV%20features%2C%20they%20often%20trade%20off%20representation%20quality%20or%20incur%20runtime%20overhead.%20We%20propose%20Memory-Keyed%20Attention%20%28MKA%29%2C%20a%20hierarchical%20attention%20mechanism%20that%20integrates%20multi-level%20KV%20caches%20%28local%2C%20session%2C%20and%20long-term%29%20and%20learns%20to%20route%20attention%20across%20them%20dynamically.%20We%20further%20introduce%20Route-Fused%20MKA%20%28FastMKA%29%2C%20a%20broadcast-routed%20variant%20that%20fuses%20memory%20sources%20before%20attention%20computation%20for%20improved%20efficiency.%20Experiments%20on%20different%20sequence%20lengths%20show%20that%20FastMKA%20achieves%20a%20favorable%20accuracy-efficiency%20trade-off%3A%20comparable%20perplexity%20to%20MLA%20while%20achieving%20up%20to%205x%20faster%20training%20throughput%20and%201.8x%20lower%20evaluation%20latency.%20These%20results%20highlight%20MKA%20as%20a%20practical%20and%20extensible%20framework%20for%20efficient%20long-context%20attention.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20586v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMKA%253A%2520Memory-Keyed%2520Attention%2520for%2520Efficient%2520Long-Context%2520Reasoning%26entry.906535625%3DDong%2520Liu%2520and%2520Yanxuan%2520Yu%2520and%2520Ben%2520Lengerich%2520and%2520Ying%2520Nian%2520Wu%26entry.1292438233%3DAs%2520long-context%2520language%2520modeling%2520becomes%2520increasingly%2520important%252C%2520the%2520cost%2520of%2520maintaining%2520and%2520attending%2520to%2520large%2520Key/Value%2520%2528KV%2529%2520caches%2520grows%2520rapidly%252C%2520becoming%2520a%2520major%2520bottleneck%2520in%2520both%2520training%2520and%2520inference.%2520While%2520prior%2520works%2520such%2520as%2520Multi-Query%2520Attention%2520%2528MQA%2529%2520and%2520Multi-Latent%2520Attention%2520%2528MLA%2529%2520reduce%2520memory%2520by%2520sharing%2520or%2520compressing%2520KV%2520features%252C%2520they%2520often%2520trade%2520off%2520representation%2520quality%2520or%2520incur%2520runtime%2520overhead.%2520We%2520propose%2520Memory-Keyed%2520Attention%2520%2528MKA%2529%252C%2520a%2520hierarchical%2520attention%2520mechanism%2520that%2520integrates%2520multi-level%2520KV%2520caches%2520%2528local%252C%2520session%252C%2520and%2520long-term%2529%2520and%2520learns%2520to%2520route%2520attention%2520across%2520them%2520dynamically.%2520We%2520further%2520introduce%2520Route-Fused%2520MKA%2520%2528FastMKA%2529%252C%2520a%2520broadcast-routed%2520variant%2520that%2520fuses%2520memory%2520sources%2520before%2520attention%2520computation%2520for%2520improved%2520efficiency.%2520Experiments%2520on%2520different%2520sequence%2520lengths%2520show%2520that%2520FastMKA%2520achieves%2520a%2520favorable%2520accuracy-efficiency%2520trade-off%253A%2520comparable%2520perplexity%2520to%2520MLA%2520while%2520achieving%2520up%2520to%25205x%2520faster%2520training%2520throughput%2520and%25201.8x%2520lower%2520evaluation%2520latency.%2520These%2520results%2520highlight%2520MKA%2520as%2520a%2520practical%2520and%2520extensible%2520framework%2520for%2520efficient%2520long-context%2520attention.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20586v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_

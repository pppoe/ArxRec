{"title": "Dual Contrastive Network for Few-Shot Remote Sensing Image Scene Classification", "author": "Zhong Ji and Liyuan Hou and Xuan Wang and Gang Wang and Yanwei Pang", "abstract": "Few-shot remote sensing image scene classification (FS-RSISC) aims at classifying remote sensing images with only a few labeled samples. The main challenges lie in small inter-class variances and large intra-class variances, which are the inherent property of remote sensing images. To address these challenges, we propose a transfer-based Dual Contrastive Network (DCN), which incorporates two auxiliary supervised contrastive learning branches during the training process. Specifically, one is a Context-guided Contrastive Learning (CCL) branch and the other is a Detail-guided Contrastive Learning (DCL) branch, which focus on inter-class discriminability and intra-class invariance, respectively. In the CCL branch, we first devise a Condenser Network to capture context features, and then leverage a supervised contrastive learning on top of the obtained context features to facilitate the model to learn more discriminative features. In the DCL branch, a Smelter Network is designed to highlight the significant local detail information. And then we construct a supervised contrastive learning based on the detail feature maps to fully exploit the spatial information in each map, enabling the model to concentrate on invariant detail features. Extensive experiments on four public benchmark remote sensing datasets demonstrate the competitive performance of our proposed DCN.", "link": "http://arxiv.org/abs/2603.23161v1", "date": "2026-03-24", "relevancy": 1.9956, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5083}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4997}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4943}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dual%20Contrastive%20Network%20for%20Few-Shot%20Remote%20Sensing%20Image%20Scene%20Classification&body=Title%3A%20Dual%20Contrastive%20Network%20for%20Few-Shot%20Remote%20Sensing%20Image%20Scene%20Classification%0AAuthor%3A%20Zhong%20Ji%20and%20Liyuan%20Hou%20and%20Xuan%20Wang%20and%20Gang%20Wang%20and%20Yanwei%20Pang%0AAbstract%3A%20Few-shot%20remote%20sensing%20image%20scene%20classification%20%28FS-RSISC%29%20aims%20at%20classifying%20remote%20sensing%20images%20with%20only%20a%20few%20labeled%20samples.%20The%20main%20challenges%20lie%20in%20small%20inter-class%20variances%20and%20large%20intra-class%20variances%2C%20which%20are%20the%20inherent%20property%20of%20remote%20sensing%20images.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20transfer-based%20Dual%20Contrastive%20Network%20%28DCN%29%2C%20which%20incorporates%20two%20auxiliary%20supervised%20contrastive%20learning%20branches%20during%20the%20training%20process.%20Specifically%2C%20one%20is%20a%20Context-guided%20Contrastive%20Learning%20%28CCL%29%20branch%20and%20the%20other%20is%20a%20Detail-guided%20Contrastive%20Learning%20%28DCL%29%20branch%2C%20which%20focus%20on%20inter-class%20discriminability%20and%20intra-class%20invariance%2C%20respectively.%20In%20the%20CCL%20branch%2C%20we%20first%20devise%20a%20Condenser%20Network%20to%20capture%20context%20features%2C%20and%20then%20leverage%20a%20supervised%20contrastive%20learning%20on%20top%20of%20the%20obtained%20context%20features%20to%20facilitate%20the%20model%20to%20learn%20more%20discriminative%20features.%20In%20the%20DCL%20branch%2C%20a%20Smelter%20Network%20is%20designed%20to%20highlight%20the%20significant%20local%20detail%20information.%20And%20then%20we%20construct%20a%20supervised%20contrastive%20learning%20based%20on%20the%20detail%20feature%20maps%20to%20fully%20exploit%20the%20spatial%20information%20in%20each%20map%2C%20enabling%20the%20model%20to%20concentrate%20on%20invariant%20detail%20features.%20Extensive%20experiments%20on%20four%20public%20benchmark%20remote%20sensing%20datasets%20demonstrate%20the%20competitive%20performance%20of%20our%20proposed%20DCN.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23161v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDual%2520Contrastive%2520Network%2520for%2520Few-Shot%2520Remote%2520Sensing%2520Image%2520Scene%2520Classification%26entry.906535625%3DZhong%2520Ji%2520and%2520Liyuan%2520Hou%2520and%2520Xuan%2520Wang%2520and%2520Gang%2520Wang%2520and%2520Yanwei%2520Pang%26entry.1292438233%3DFew-shot%2520remote%2520sensing%2520image%2520scene%2520classification%2520%2528FS-RSISC%2529%2520aims%2520at%2520classifying%2520remote%2520sensing%2520images%2520with%2520only%2520a%2520few%2520labeled%2520samples.%2520The%2520main%2520challenges%2520lie%2520in%2520small%2520inter-class%2520variances%2520and%2520large%2520intra-class%2520variances%252C%2520which%2520are%2520the%2520inherent%2520property%2520of%2520remote%2520sensing%2520images.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520transfer-based%2520Dual%2520Contrastive%2520Network%2520%2528DCN%2529%252C%2520which%2520incorporates%2520two%2520auxiliary%2520supervised%2520contrastive%2520learning%2520branches%2520during%2520the%2520training%2520process.%2520Specifically%252C%2520one%2520is%2520a%2520Context-guided%2520Contrastive%2520Learning%2520%2528CCL%2529%2520branch%2520and%2520the%2520other%2520is%2520a%2520Detail-guided%2520Contrastive%2520Learning%2520%2528DCL%2529%2520branch%252C%2520which%2520focus%2520on%2520inter-class%2520discriminability%2520and%2520intra-class%2520invariance%252C%2520respectively.%2520In%2520the%2520CCL%2520branch%252C%2520we%2520first% {"title": "Representational Homomorphism Predicts and Improves Compositional Generalization In Transformer Language Model", "author": "Zhiyu An and Wan Du", "abstract": "Compositional generalization-the ability to interpret novel combinations of familiar components-remains a persistent challenge for neural networks. Behavioral evaluations reveal \\emph{when} models fail but offer limited insight into \\emph{why} failures arise at the representational level. We introduce \\textit{Homomorphism Error} (HE), a structural metric that measures the inconsistency between a set of established rules for which words combine to form new meaning (linguistic syntax) and model's learned rules for which hidden states combine to form new states (semantic syntax). We formulate this inconsistency as deviations from approximate homomorphisms between the linguistic expression algebra and a model's hidden-state space. We designed experiments to test if i) HE predicts compositional generalization performance, and ii) will regularizing for low HE during training improve such performance. To avoid the effect of data spoilage, we train small decoder-only Transformers from scratch using an adapted version of established dataset, SCAN, for testing compositional generalization. Across controlled experiments, HE predicts out-of-distribution (OOD) compositional generalization under noise injection, achieving $R^2=0.73$ correlation between HE and OOD accuracy. Ablations show that model depth has minimal effect on either HE or OOD accuracy, training data coverage exhibits threshold effects, and randomly inserted noise tokens increase HE. Intervention experiment shows that HE-regularized training significantly reduces HE ($p=1.1\\times10^{-4}$) and yields a statistically significant improvement in OOD accuracy ($p=0.023$). Together, these results indicate the potential of HE to be both a diagnostic and an actionable training signal for improving compositional generalization.", "link": "http://arxiv.org/abs/2601.18858v2", "date": "2026-03-24", "relevancy": 2.0647, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5842}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5189}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4863}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representational%20Homomorphism%20Predicts%20and%20Improves%20Compositional%20Generalization%20In%20Transformer%20Language%20Model&body=Title%3A%20Representational%20Homomorphism%20Predicts%20and%20Improves%20Compositional%20Generalization%20In%20Transformer%20Language%20Model%0AAuthor%3A%20Zhiyu%20An%20and%20Wan%20Du%0AAbstract%3A%20Compositional%20generalization-the%20ability%20to%20interpret%20novel%20combinations%20of%20familiar%20components-remains%20a%20persistent%20challenge%20for%20neural%20networks.%20Behavioral%20evaluations%20reveal%20%5Cemph%7Bwhen%7D%20models%20fail%20but%20offer%20limited%20insight%20into%20%5Cemph%7Bwhy%7D%20failures%20arise%20at%20the%20representational%20level.%20We%20introduce%20%5Ctextit%7BHomomorphism%20Error%7D%20%28HE%29%2C%20a%20structural%20metric%20that%20measures%20the%20inconsistency%20between%20a%20set%20of%20established%20rules%20for%20which%20words%20combine%20to%20form%20new%20meaning%20%28linguistic%20syntax%29%20and%20model%27s%20learned%20rules%20for%20which%20hidden%20states%20combine%20to%20form%20new%20states%20%28semantic%20syntax%29.%20We%20formulate%20this%20inconsistency%20as%20deviations%20from%20approximate%20homomorphisms%20between%20the%20linguistic%20expression%20algebra%20and%20a%20model%27s%20hidden-state%20space.%20We%20designed%20experiments%20to%20test%20if%20i%29%20HE%20predicts%20compositional%20generalization%20performance%2C%20and%20ii%29%20will%20regularizing%20for%20low%20HE%20during%20training%20improve%20such%20performance.%20To%20avoid%20the%20effect%20of%20data%20spoilage%2C%20we%20train%20small%20decoder-only%20Transformers%20from%20scratch%20using%20an%20adapted%20version%20of%20established%20dataset%2C%20SCAN%2C%20for%20testing%20compositional%20generalization.%20Across%20controlled%20experiments%2C%20HE%20predicts%20out-of-distribution%20%28OOD%29%20compositional%20generalization%20under%20noise%20injection%2C%20achieving%20%24R%5E2%3D0.73%24%20correlation%20between%20HE%20and%20OOD%20accuracy.%20Ablations%20show%20that%20model%20depth%20has%20minimal%20effect%20on%20either%20HE%20or%20OOD%20accuracy%2C%20training%20data%20coverage%20exhibits%20threshold%20effects%2C%20and%20randomly%20inserted%20noise%20tokens%20increase%20HE.%20Intervention%20experiment%20shows%20that%20HE-regularized%20training%20significantly%20reduces%20HE%20%28%24p%3D1.1%5Ctimes10%5E%7B-4%7D%24%29%20and%20yields%20a%20statistically%20significant%20improvement%20in%20OOD%20accuracy%20%28%24p%3D0.023%24%29.%20Together%2C%20these%20results%20indicate%20the%20potential%20of%20HE%20to%20be%20both%20a%20diagnostic%20and%20an%20actionable%20training%20signal%20for%20improving%20compositional%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2601.18858v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRepresentational%2520Homomorphism%2520Predicts%2520and%2520Improves%2520Compositional%2520Generalization%2520In%2520Transformer%2520Language%2520Model%26entry.906535625%3DZhiyu%2520An%2520and%2520Wan%2520Du%26entry.1292438233%3DCompositional%2520generalization-the%2520ability%2520to%2520interpret%2520novel%2520combinations%2520of%2520familiar%2520components-remains%2520a%2520persistent%2520challenge%2520for%2520neural%2520networks.%2520Behavioral%2520evaluations%2520reveal%2520%255Cemph%257Bwhen%257D%2520models%2520fa %2520randomly%2520inserted%2520noise%2520tokens%2520increase%2520HE.%2520Intervention%2520experiment%2520shows%2520that%2520HE-regularized%2520training%2520significantly%2520reduces%2520HE%2520%2528%2524p%253D1.1%255Ctimes10%255E%257B-4%257D%2524%2529%2520and%2520yields%2520a%2520statistically%2520significant%2520improvement%2520in%2520OOD%2520accuracy%2520%2528%2524p%253D0.023%2524%2529.%2520Together%252C%2520these%2520results%2520indicate%2520the%2520potential%2520of%2520HE%2520to%2520be%2520both%2520a%2520diagnostic%2520and%2520an%2520actionable%2520training%2520signal%2520for%2520improving%2520compositional%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.18858v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Representational%20Homomorphism%20Predicts%20and%20Improves%20Compositional%20Generalization%20In%20Transformer%20Language%20Model&entry.906535625=Zhiyu%20An%20and%20Wan%20Du&entry.1292438233=Compositional%20generalization-the%20ability%20to%20interpret%20novel%20combinations%20of%20familiar%20components-remains%20a%20persistent%20challenge%20for%20neural%20networks.%20Behavioral%20evaluations%20reveal%20%5Cemph%7Bwhen%7D%20models%20fail%20but%20offer%20limited%20insight%20into%20%5Cemph%7Bwhy%7D%20failures%20arise%20at%20the%20representational%20level.%20We%20introduce%20%5Ctextit%7BHomomorphism%20Error%7D%20%28HE%29%2C%20a%20structural%20metric%20that%20measures%20the%20inconsistency%20between%20a%20set%20of%20established%20rules%20for%20which%20words%20combine%20to%20form%20new%20meaning%20%28linguistic%20syntax%29%20and%20model%27s%20learned%20rules%20for%20which%20hidden%20states%20combine%20to%20form%20new%20states%20%28semantic%20syntax%29.%20We%20formulate%20this%20inconsistency%20as%20deviations%20from%20approximate%20homomorphisms%20between%20the%20linguistic%20expression%20algebra%20and%20a%20model%27s%20hidden-state%20s {"title": "Robust Safety Monitoring of Language Models via Activation Watermarking", "author": "Toluwani Aremu and Daniil Ognev and Samuele Poppi and Nils Lukas", "abstract": "Large language models (LLMs) can be misused to reveal sensitive information, such as weapon-making instructions or writing malware. LLM providers rely on $\\emph{monitoring}$ to detect and flag unsafe behavior during inference. An open security challenge is $\\emph{adaptive}$ adversaries who craft attacks that simultaneously (i) evade detection while (ii) eliciting unsafe behavior. Adaptive attackers are a major concern as LLM providers cannot patch their security mechanisms, since they are unaware of how their models are being misused. We cast $\\emph{robust}$ LLM monitoring as a security game, where adversaries who know about the monitor try to extract sensitive information, while a provider must accurately detect these adversarial queries at low false positive rates. Our work (i) shows that existing LLM monitors are vulnerable to adaptive attackers and (ii) designs improved defenses through $\\emph{activation watermarking}$ by carefully introducing uncertainty for the attacker during inference. We find that $\\emph{activation watermarking}$ outperforms guard baselines by up to $52\\%$ under adaptive attackers who know the monitoring algorithm but not the secret key.", "link": "http://arxiv.org/abs/2603.23171v1", "date": "2026-03-24", "relevancy": 1.8556, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4794}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.468}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20Safety%20Monitoring%20of%20Language%20Models%20via%20Activation%20Watermarking&body=Title%3A%20Robust%20Safety%20Monitoring%20of%20Language%20Models%20via%20Activation%20Watermarking%0AAuthor%3A%20Toluwani%20Aremu%20and%20Daniil%20Ognev%20and%20Samuele%20Poppi%20and%20Nils%20Lukas%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20can%20be%20misused%20to%20reveal%20sensitive%20information%2C%20such%20as%20weapon-making%20instructions%20or%20writing%20malware.%20LLM%20providers%20rely%20on%20%24%5Cemph%7Bmonitoring%7D%24%20to%20detect%20and%20flag%20unsafe%20behavior%20during%20inference.%20An%20open%20security%20challenge%20is%20%24%5Cemph%7Badaptive%7D%24%20adversaries%20who%20craft%20attacks%20that%20simultaneously%20%28i%29%20evade%20detection%20while%20%28ii%29%20eliciting%20unsafe%20behavior.%20Adaptive%20attackers%20are%20a%20major%20concern%20as%20LLM%20providers%20cannot%20patch%20their%20security%20mechanisms%2C%20since%20they%20are%20unaware%20of%20how%20their%20models%20are%20being%20misused.%20We%20cast%20%24%5Cemph%7Brobust%7D%24%20LLM%20monitoring%20as%20a%20security%20game%2C%20where%20adversaries%20who%20know%20about%20the%20monitor%20try%20to%20extract%20sensitive%20information%2C%20while%20a%20provider%20must%20accurately%20detect%20these%20adversarial%20queries%20at%20low%20false%20positive%20rates.%20Our%20work%20%28i%29%20shows%20that%20existing%20LLM%20monitors%20are%20vulnerable%20to%20adaptive%20attackers%20and%20%28ii%29%20designs%20improved%20defenses%20through%20%24%5Cemph%7Bactivation%20watermarking%7D%24%20by%20carefully%20introducing%20uncertainty%20for%20the%20attacker%20during%20inference.%20We%20find%20that%20%24%5Cemph%7Bactivation%20watermarking%7D%24%20outperforms%20guard%20baselines%20by%20up%20to%20%2452%5C%25%24%20under%20adaptive%20attackers%20who%20know%20the%20monitoring%20algorithm%20but%20not%20the%20secret%20key.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23171v1%0AFo {"title": "HalDec-Bench: Benchmarking Hallucination Detector in Image Captioning", "author": "Kuniaki Saito and Risa Shinoda and Shohei Tanaka and Tosho Hirasawa and Fumio Okura and Yoshitaka Ushiku", "abstract": "Hallucination detection in captions (HalDec) assesses a vision-language model's ability to correctly align image content with text by identifying errors in captions that misrepresent the image. Beyond evaluation, effective hallucination detection is also essential for curating high-quality image-caption pairs used to train VLMs. However, the generalizability of VLMs as hallucination detectors across different captioning models and hallucination types remains unclear due to the lack of a comprehensive benchmark. In this work, we introduce HalDec-Bench, a benchmark designed to evaluate hallucination detectors in a principled and interpretable manner. HalDec-Bench contains captions generated by diverse VLMs together with human annotations indicating the presence of hallucinations, detailed hallucination-type categories, and segment-level labels. The benchmark provides tasks with a wide range of difficulty levels and reveals performance differences across models that are not visible in existing multimodal reasoning or alignment benchmarks. Our analysis further uncovers two key findings. First, detectors tend to recognize sentences appearing at the beginning of a response as correct, regardless of their actual correctness. Second, our experiments suggest that dataset noise can be substantially reduced by using strong VLMs as filters while employing recent VLMs as caption generators. Our project page is available at https://dahlian00.github.io/HalDec-Bench-Page/.", "link": "http://arxiv.org/abs/2603.15253v2", "date": "2026-03-24", "relevancy": 2.1269, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5371}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5371}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5047}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HalDec-Bench%3A%20Benchmarking%20Hallucination%20Detector%20in%20Image%20Captioning&body=Title%3A%20HalDec-Bench%3A%20Benchmarking%20Hallucination%20Detector%20in%20Image%20Captioning%0AAuthor%3A%20Kuniaki%20Saito%20and%20Risa%20Shinoda%20and%20Shohei%20Tanaka%20and%20Tosho%20Hirasawa%20and%20Fumio%20Okura%20and%20Yoshitaka%20Ushiku%0AAbstract%3A%20Hallucination%20detection%20in%20captions%20%28HalDec%29%20assesses%20a%20vision-language%20model%27s%20ability%20to%20correctly%20align%20image%20content%20with%20text%20by%20identifying%20errors%20in%20captions%20that%20misrepresent%20the%20image.%20Beyond%20evaluation%2C%20effective%20hallucination%20detection%20is%20also%20essential%20for%20curating%20high-quality%20image-caption%20pairs%20used%20to%20train%20VLMs.%20However%2C%20the%20generalizability%20of%20VLMs%20as%20hallucination%20detectors%20across%20different%20captioning%20models%20and%20hallucination%20types%20remains%20unclear%20due%20to%20the%20lack%20of%20a%20comprehensive%20benchmark.%20In%20this%20work%2C%20we%20introduce%20HalDec-Bench%2C%20a%20benchmark%20designed%20to%20evaluate%20hallucination%20detectors%20in%20a%20principled%20and%20interpretable%20manner.%20HalDec-Bench%20contains%20captions%20generated%20by%20diverse%20VLMs%20together%20with%20human%20annotations%20indicating%20the%20presence%20of%20hallucinations%2C%20detailed%20hallucination-type%20categories%2C%20and%20segment-level%20labels.%20The%20benchmark%20provides%20tasks%20with%20a%20wide%20range%20of%20difficulty%20levels%20and%20reveals%20performance%20differences%20across%20models%20that%20are%20not%20visible%20in%20existing%20multimodal%20reasoning%20or%20alignment%20benchmarks.%20Our%20analysis%20further%20uncovers%20two%20key%20findings.%20First%2C%20detectors%20tend%20to%20recognize%20sentences%20appearing%20at%20the%20beginning%20of%20a%20response%20as%20correct%2C%20regardless%20of%20their%20actual%20correctness.%20Second%2C%20our%20experiments%20suggest%20that%20dataset%20noise%20can%20be%20substantially%20reduced%20by%20using%20strong%20VLMs%20as%20filters%20while%20employing%20recent%20VLMs%20as%20caption%20generators.%20Our%20project%20page%20is%20available%20at%20https%3A//dahlian00.github.io/HalDec-Bench-Page/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15253v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHalDec-Bench%253A%2520Benchmarking%2520Hallucination%2520Detector%2520in%2520Image%2520Captioning%26entry.906535625%3DKuniaki%2520Saito%2520and%2520Risa%2520Shinoda%2520and%2520Shohei%2520Tanaka%2520and%2520Tosho%2520Hirasawa%2520and%2520Fumio%2520Okura%2520and%2520Yoshitaka%2520Ushiku%26entry.1292438233%3DHallucination%2520detection%2520in%2520captions%2520%2528HalDec%2529%2520assesses%2520a%2520vision-language%2520model%2527s%2520ability%2520to%2520correctly%2520align%2520image%2520content%2520with%2520text%2520by%2520identifying%2520errors%2520in%2520captions%2520that%2520misrepresent%2520the%2520image.%2520Beyond%2520evaluation%252C%2520effective%2520hallucination%2520detection%2520is%2520also%2520essential%2520for%2520curating%2520high-quality%2520image-caption%2520pairs%2520used%2520to%2520train%2520VLMs.%2520However%252C%2520the%2520generalizability%2520of%2520VLMs%2520as%2520hallucination%2520detectors%2520across%2520different%2520captioning%2520models%2520and%2520hallucination%2520types%2520remains%2520unclear%2520due%2520to%2520the%2520lack%2520of%2520a%2520comprehensive%2520benchmark.%2520In%2520this%2520work%252C%2520we%2520introduce%2520HalDec-Bench%252C%2520a%2520benchmark%2520de {"title": "AirSimAG: A High-Fidelity Simulation Platform for Air-Ground Collaborative Robotics", "author": "Yangjie Cui and Xin Dong and Boyang Gao and Jinwu Xiang and Daochun Li and Zhan Tu", "abstract": "As spatial intelligence continues to evolve, heterogeneous multi-agent systems-particularly the collaboration between Unmanned Aerial Vehicles (UAVs) and Unmanned Ground Vehicles (UGVs), have demonstrated strong potential in complex applications such as search and rescue, urban surveillance, and environmental monitoring. However, existing simulation platforms are primarily designed for single-agent dynamics and lack dedicated frameworks for interactive air-ground collaborative simulation. In this paper, we present AirsimAG, a high-fidelity air-ground collaborative simulation platform built upon an extensively customized AirSim framework. The platform enables synchronized multi-agent simulation and supports heterogeneous sensing and control interfaces for UAV-UGV systems. To demonstrate its capabilities, we design a set of representative air-ground collaborative tasks, including mapping, planning, tracking, formation, and exploration. We further provide quantitative analyses based on these tasks to illustrate the platform effectiveness in supporting multi-agent coordination and cross-modal data consistency. The AirsimAG simulation platform is publicly available at https://github.com/BIULab-BUAA/AirSimAG.", "link": "http://arxiv.org/abs/2603.23079v1", "date": "2026-03-24", "relevancy": 1.5296, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5365}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5134}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4978}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AirSimAG%3A%20A%20High-Fidelity%20Simulation%20Platform%20for%20Air-Ground%20Collaborative%20Robotics&body=Title%3A%20AirSimAG%3A%20A%20High-Fidelity%20Simulation%20Platform%20for%20Air-Ground%20Collaborative%20Robotics%0AAuthor%3A%20Yangjie%20Cui%20and%20Xin%20Dong%20and%20Boyang%20Gao%20and%20Jinwu%20Xiang%20and%20Daochun%20Li%20and%20Zhan%20Tu%0AAbstract%3A%20As%20spatial%20intelligence%20continues%20to%20evolve%2C%20heterogeneous%20multi-agent%20systems-particularly%20the%20collaboration%20between%20Unmanned%20Aerial%20Vehicles%20%28UAVs%29%20and%20Unmanned%20Ground%20Vehicles%20%28UGVs%29%2C%20have%20demonstrated%20strong%20potential%20in%20complex%20applications%20such%20as%20search%20and%20rescue%2C%20urban%20surveillance%2C%20and%20environmental%20monitoring.%20However%2C%20existing%20simulation%20platforms%20are%20primarily%20designed%20for%20single-agent%20dynamics%20and%20lack%20dedicated%20frameworks%20for%20interactive%20air-ground%20collaborative%20simulation.%20In%20this%20paper%2C%20we%20present%20AirsimAG%2C%20a%20high-fidelity%20air-ground%20collaborative%20simulation%20platform%20built%20upon%20an%20extensively%20customized%20AirSim%20framework.%20The%20platform%20enables%20synchronized%20multi-agent%20simulation%20and%20supports%20heterogeneous%20sensing%20and%20control%20interfaces%20for%20UAV-UGV%20systems.%20To%20demonstrate%20its%20capabilities%2C%20we%20design%20a%20set%20of%20representative%20air-ground%20collaborative%20tasks%2C%20including%20mapping%2C%20planning%2C%20tracking%2C%20formation%2C%20and%20exploration.%20We%20further%20provide%20quantitative%20analyses%20based%20on%20these%20tasks%20to%20illustrate%20the%20platform%20effectiveness%20in%20supporting%20multi-agent%20coordination%20and%20cross-modal%20data%20consistency.%20The%20AirsimAG%20simulation%20platform%20is%20publicly%20available%20at%20https%3A//github.com/BIULab-BUAA/AirSimAG.%0ALink%3A%20http on.%20We%20further%20provide%20quantitative%20analyses%20based%20on%20these%20tasks%20to%20illustrate%20the%20platform%20effectiveness%20in%20supporting%20multi-agent%20coordination%20and%20cross-modal%20data%20consistency.%20The%20AirsimAG%20simulation%20platform%20is%20publicly%20available%20at%20https%3A//github.com/BIULab-BUAA/AirSimAG.&entry.1838667208=http%3A//arxiv.org/abs/2603.23079v1&entry.124074799=Read"},
{"title": "Voice Privacy from an Attribute-based Perspective", "author": "Mehtab Ur Rahman and Martha Larson and Cristian Tejedor-Garcia", "abstract": "Voice privacy approaches that preserve the anonymity of speakers modify speech in an attempt to break the link with the true identity of the speaker. Current benchmarks measure speaker protection based on signal-to-signal comparisons. In this paper, we introduce an attribute-based perspective, where we measure privacy protection in terms of comparisons between sets of speaker attributes. First, we analyze privacy impact by calculating speaker uniqueness for ground truth attributes, attributes inferred on the original speech, and attributes inferred on speech protected with standard anonymization. Next, we examine a threat scenario involving only a single utterance per speaker and calculate attack error rates. Overall, we observe that inferred attributes still present a risk despite attribute inference errors. Our research points to the importance of considering both attribute-related threats and protection mechanisms in future voice privacy research.", "link": "http://arxiv.org/abs/2603.20301v2", "date": "2026-03-24", "relevancy": 1.8408, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.3748}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.3655}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.3642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Voice%20Privacy%20from%20an%20Attribute-based%20Perspective&body=Title%3A%20Voice%20Privacy%20from%20an%20Attribute-based%20Perspective%0A {"title": "SynForceNet: A Force-Driven Global-Local Latent Representation Framework for Lithium-Ion Battery Fault Diagnosis", "author": "Rongxiu Chen and Yuting Su", "abstract": "Online safety fault diagnosis is essential for lithium-ion batteries in electric vehicles(EVs), particularly under complex and rare safety-critical conditions in real-world operation. In this work, we develop an online battery fault diagnosis network based on a deep anomaly detection framework combining kernel one-class classification and minimum-volume estimation. Mechanical constraints and spike-timing-dependent plasticity(STDP)-based dynamic representations are introduced to improve complex fault characterization and enable a more compact normal-state boundary. The proposed method is validated using 8.6 million valid data points collected from 20 EVs. Compared with several advanced baseline methods, it achieves average improvements of 7.59% in TPR, 27.92% in PPV, 18.28% in F1 score, and 23.68% in AUC. In addition, we analyze the spatial separation of fault representations before and after modeling, and further enhance framework robustness by learning the manifold structure in the latent space. The results also suggest the possible presence of shared causal structures across different fault types, highlighting the promise of integrating deep learning with physical constraints and neural dynamics for battery safety diagnosis.", "link": "http://arxiv.org/abs/2603.23265v1", "date": "2026-03-24", "relevancy": 1.9088, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4964}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4675}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SynForceNet%3A%20A%20Force-Driven%20Global-Local%20Latent%20Representation%20Framework%20for%20Lithium-Ion%20Battery%20Fault%20Diagnosis&body=Title%3A%20SynForceNet%3A%20A%20Force-Driven%20Global-Local%20Latent%20Representation%20Framework%20for%20Lithium-Ion%20Battery%20Fault%20Diagnosis%0AAuthor%3A%20Rongxiu%20Chen%20and%20Yuting%20Su%0AAbstract%3A%20Online%20safety%20fault%20diagnosis%20is%20essential%20for%20lithium-ion%20batteries%20in%20electric%20vehicles%28EVs%29%2C%20particularly%20under%20complex%20and%20rare%20safety-critical%20conditions%20in%20real-world%20operation.%20In%20this%20work%2C%20we%20develop%20an%20online%20battery%20fault%20diagnosis%20network%20based%20on%20a%20deep%20anomaly%20detection%20framework%20combining%20kernel%20one-class%20classification%20and%20minimum-volume%20estimation.%20Mechanical%20constraints%20and%20spike-timing-dependent%20plasticity%28STDP%29-based%20dynamic%20representations%20are%20introduced%20to%20improve%20complex%20fault%20characterization%20and%20enable%20a%20more%20compact%20normal-state%20boundary.%20The%20proposed%20method%20is%20validated%20using%208.6%20million%20valid%20data%20points%20collected%20from%2020%20EVs.%20Compared%20with%20several%20advanced%20baseline%20methods%2C%20it%20achieves%20average%20improvements%20of%207.59%25%20in%20TPR%2C%2027.92%25%20in%20PPV%2C%2018.28%25%20in%20F1%20score%2C%20and%2023.68%25%20in%20AUC.%20In%20addition%2C%20we%20analyze%20the%20spatial%20separation%20of%20fault%20representations%20before%20and%20after%20modeling%2C%20and%20further%20enhance%20framework%20robustness%20by%20learning%20the%20manifold%20structure%20in%20the%20latent%20space.%20The%20results%20also%20suggest%20the%20possible%20presence%20of%20shared%20causal%20structures%20across%20different%20fault%20types%2C%20highlighting%20the%20promise%20of%20integrating%20deep%20learning%20with%20physical%20cons spatial%20separation%20of%20fault%20representations%20before%20and%20after%20modeling%2C%20and%20further%20enhance%20framework%20robustness%20by%20learning%20the%20manifold%20structure%20in%20the%20latent%20space.%20The%20results%20also%20suggest%20the%20possible%20presence%20of%20shared%20causal%20structures%20across%20different%20fault%20types%2C%20highlighting%20the%20promise%20of%20integrating%20deep%20learning%20with%20physical%20constraints%20and%20neural%20dynamics%20for%20battery%20safety%20diagnosis.&entry.1838667208=http%3A//arxiv.org/abs/2603.23265v1&entry.124074799=Read"},
{"title": "SODA: Sensitivity-Oriented Dynamic Acceleration for Diffusion Transformer", "author": "Tong Shao and Yusen Fu and Guoying Sun and Jingde Kong and Zhuotao Tian and Jingyong Su", "abstract": "Diffusion Transformers have become a dominant paradigm in visual generation, yet their low inference efficiency remains a key bottleneck hindering further advancement. Among common training-free techniques, caching offers high acceleration efficiency but often compromises fidelity, whereas pruning shows the opposite trade-off. Integrating caching with pruning achieves a balance between acceleration and generation quality. However, existing methods typically employ fixed and heuristic schemes to configure caching and pruning strategies. While they roughly follow the overall sensitivity trend of generation models to acceleration, they fail to capture fine-grained and complex variations, inevitably skipping highly sensitive computations and leading to quality degradation. Furthermore, such manually designed strategies exhibit poor generalization. To address these issues, we propose SODA, a Sensitivity-Oriented Dynamic Acceleration method that adaptively performs caching and pruning based on fine-grained sensitivity. SODA builds an offline sensitivity error modeling framework across timesteps, layers, and modules to capture the sensitivity to different acceleration operations. The cache intervals are optimized via dynamic programming with sensitivity error as the cost function, minimizing the impact of caching on model sensitivity. During pruning and cache reuse, SODA adaptively determines the pruning timing and rate to preserve computations of highly sensitive tokens, significantly enhancing generation fidelity. Extensive experiments on DiT-XL/2, PixArt-$\u03b1$, and OpenSora demonstrate that SODA achieves state-of-the-art generation fidelity under controllable acceleration ratios. Our code is released publicly at: https://github.com/leaves162/SODA.", "link": "http://arxiv.org/abs/2603.07057v4", "date": "2026-03-24", "relevancy": 1.7795, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6056}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5938}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SODA%3A%20Sensitivity-Oriented%20Dynamic%20Acceleration%20for%20Diffusion%20Transformer&body=Title%3A%20SODA%3A%20Sensitivity-Oriented%20Dynamic%20Acceleration%20for%20Diffusion%20Transformer%0AAuthor%3A%20Tong%20Shao%20and%20Yusen%20Fu%20and%20Guoying%20Sun%20and%20Jingde%20Kong%20and%20Zhuotao%20Tian%20and%20Jingyong%20Su%0AAbstract%3A%20Diffusion%20Transformers%20have%20become%20a%20dominant%20paradigm%20in%20visual%20generation%2C%20yet%20their%20low%20inference%20efficiency%20remains%20a%20key%20bottleneck%20hindering%20further%20advancement.%20Among%20common%20training-free%20techniques%2C%20caching%20offers%20high%20acceleration%20efficiency%20but%20often%20compromises%20fidelity%2C%20whereas%20pruning%20shows%20the%20opposite%20trade-off.%20Integrating%20caching%20with%20pruning%20achieves%20a%20balance%20between%20acceleration%20and%20generation%20quality.%20However%2C%20existing%20methods%20typically%20employ%20fixed%20and%20heuristic%20schemes%20to%20configure%20caching%20and%20pruning%20strategies.%20While%20they%20roughly%20follow%20the%20overall%20sensitivity%20trend%20of%20generation%20models%20to%20acceleration%2C%20they%20fail%20to%20capture%20fine-grained%20and%20complex%20variations%2C%20inevitably%20skipping%20highly%20sensitive%20computations%20and%20leading%20to%20quality%20degradation.%20Furthermore%2C%20such%20manually%20designed%20strategies%20exhibit%20poor%20generalization.%20To%20address%20these%20issues%2C%20we%20propose%20SODA%2C%20a%20Sensitivity-Oriented%20Dynamic%20Acceleration%20method%20that%20adaptively%20performs%20caching%20and%20pruning%20based%20on%20fine-grained%20sensitivity.%20SODA%20builds%20an%20offline%20sensitivity%20error%20modeling%20framework%20across%20timesteps%2C%20layers%2C%20and%20modules%20to%20capture%20the%20sensitivity%20to%20different%20acceleration%20operations.%20The%20cache%20intervals%20are%20optimized%20via%20dynamic%20programming%20with%20sensitivity%20error%20as%20the%20cost%20function%2C%20minimizing%20the%20impact%20of%20caching%20on%20model%20sensitivity.%20During%20pruning%20and%20cache%20reuse%2C%20SODA%20adaptively%20determines%20the%20pruning%20timing%20and%20rate%20to%20preserve%20computations%20of%20highly%20sensitive%20tokens%2C%20significantly%20enhancing%20generation%20fidelity.%20Extensive%20experiments%20on%20DiT-XL/2%2C%20PixArt-%24%CE%B1%24%2C%20and%20OpenSora%20demonstrate%20that%20SODA%20achieves%20state-of-the-art%20generation%20fidelity%20under%20controllable%20acceleration%20ratios.%20Our%20code%20is%20released%20publicly%20at%3A%20https%3A//github.com/leaves162/SODA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.07057v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSODA%253A%2520Sensitivity-Oriented%2520Dynamic%2520Acceleration%2520for%2520Diffusion%2520Transformer%26entry.906535625%3DTong%2520Shao%2520and%2520Yusen%2520Fu%2520and%2520Guoying%2520Sun%2520and%2520Jingde%2520Kong%2520and%2520Zhuotao%2520Tian%2520and%2520Jingyong%2520Su%26entry.1292438233%3DDiffusion%2520Transformers%2520have%2520become%2520a%2520dominant%2520paradigm%2520in%2520visual%2520generation%252C%2520yet%2520their%2520low%2520inference%2520efficiency%2520remains%2520a%2520key%2520bottleneck%2520hindering%2520further%2520advancement.%2520Among%2520common%2520training-free%2520techniques% {"title": "Object Pose Transformer: Unifying Unseen Object Pose Estimation", "author": "Weihang Li and Lorenzo Garattoni and Fabien Despinoy and Nassir Navab and Benjamin Busam", "abstract": "Learning model-free object pose estimation for unseen instances remains a fundamental challenge in 3D vision. Existing methods typically fall into two disjoint paradigms: category-level approaches predict absolute poses in a canonical space but rely on predefined taxonomies, while relative pose methods estimate cross-view transformations but cannot recover single-view absolute pose. In this work, we propose Object Pose Transformer (\\ours{}), a unified feed-forward framework that bridges these paradigms through task factorization within a single model. \\ours{} jointly predicts depth, point maps, camera parameters, and normalized object coordinates (NOCS) from RGB inputs, enabling both category-level absolute SA(3) pose and unseen-object relative SE(3) pose. Our approach leverages contrastive object-centric latent embeddings for canonicalization without requiring semantic labels at inference time, and uses point maps as a camera-space representation to enable multi-view relative geometric reasoning. Through cross-frame feature interaction and shared object embeddings, our model leverages relative geometric consistency across views to improve absolute pose estimation, reducing ambiguity in single-view predictions. Furthermore, \\ours{} is camera-agnostic, learning camera intrinsics on-the-fly and supporting optional depth input for metric-scale recovery, while remaining fully functional in RGB-only settings. Extensive experiments on diverse benchmarks (NOCS, HouseCat6D, Omni6DPose, Toyota-Light) demonstrate state-of-the-art performance in both absolute and relative pose estimation tasks within a single unified architecture.", "link": "http://arxiv.org/abs/2603.23370v1", "date": "2026-03-24", "relevancy": 1.7281, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Genera       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

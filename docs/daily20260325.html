{"title": "From Feature Learning to Spectral Basis Learning: A Unifying and Flexible Framework for Efficient and Robust Shape Matching", "author": "Feifan Luo and Hongyang Chen", "abstract": "Shape matching is a fundamental task in computer graphics and vision, with deep functional maps becoming a prominent paradigm. However, existing methods primarily focus on learning informative feature representations by constraining pointwise and functional maps, while neglecting the optimization of the spectral basis-a critical component of the functional map pipeline. This oversight often leads to suboptimal matching results. Furthermore, many current approaches rely on conventional, time-consuming functional map solvers, incurring significant computational overhead. To bridge these gaps, we introduce Advanced Functional Maps, a framework that generalizes standard functional maps by replacing fixed basis functions with learnable ones, supported by rigorous theoretical guarantees. Specifically, the spectral basis is optimized through a set of learned inhibition functions. Building on this, we propose the first unsupervised spectral basis learning method for robust non-rigid 3D shape matching, enabling the joint, end-to-end optimization of feature extraction and basis functions. Our approach incorporates a novel heat diffusion module and an unsupervised loss function, alongside a streamlined architecture that bypasses expensive solvers and auxiliary losses. Extensive experiments demonstrate that our method significantly outperforms state-of-the-art feature-learning approaches, particularly in challenging non-isometric and topological noise scenarios, while maintaining high efficiency. Finally, we reveal that optimizing basis functions is equivalent to spectral convolution, where inhibition functions act as filters. This insight enables enhanced representations inspired by spectral graph networks, opening new avenues for future research. Our code is available at https://github.com/LuoFeifan77/Unsupervised-Spectral-Basis-Learning.", "link": "http://arxiv.org/abs/2603.23383v1", "date": "2026-03-24", "relevancy": 2.8426, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6116}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5551}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Feature%20Learning%20to%20Spectral%20Basis%20Learning%3A%20A%20Unifying%20and%20Flexible%20Framework%20for%20Efficient%20and%20Robust%20Shape%20Matching&body=Title%3A%20From%20Feature%20Learning%20to%20Spectral%20Basis%20Learning%3A%20A%20Unifying%20and%20Flexible%20Framework%20for%20Efficient%20and%20Robust%20Shape%20Matching%0AAuthor%3A%20Feifan%20Luo%20and%20Hongyang%20Chen%0AAbstract%3A%20Shape%20matching%20is%20a%20fundamental%20task%20in%20computer%20graphics%20and%20vision%2C%20with%20deep%20functional%20maps%20becoming%20a%20prominent%20paradigm.%20However%2C%20existing%20methods%20primarily%20focus%20on%20learning%20informative%20feature%20representations%20by%20constraining%20pointwise%20and%20functional%20maps%2C%20while%20neglecting%20the%20optimization%20of%20the%20spectral%20basis-a%20critical%20component%20of%20the%20functional%20map%20pipeline.%20This%20oversight%20often%20leads%20to%20suboptimal%20matching%20results.%20Furthermore%2C%20many%20current%20approaches%20rely%20on%20conventional%2C%20time-consuming%20functional%20map%20solvers%2C%20incurring%20significant%20computational%20overhead.%20To%20bridge%20these%20gaps%2C%20we%20introduce%20Advanced%20Functional%20Maps%2C%20a%20framework%20that%20generalizes%20standard%20functional%20maps%20by%20replacing%20fixed%20basis%20functions%20with%20learnable%20ones%2C%20supported%20by%20rigorous%20theoretical%20guarantees.%20Specifically%2C%20the%20spectral%20basis%20is%20optimized%20through%20a%20set%20of%20learned%20inhibition%20functions.%20Building%20on%20this%2C%20we%20propose%20the%20first%20unsupervised%20spectral%20basis%20learning%20method%20for%20robust%20non-rigid%203D%20shape%20matching%2C%20enabling%20the%20joint%2C%20end-to-end%20optimization%20of%20feature%20extraction%20and%20basis%20functions.%20Our%20approach%20incorporates%20a%20novel%20heat%20diffusion%20module%20and%20an%20unsupervised%20loss%20function%2C%20alongside%20a%20streamlined%20architecture%20that%20bypasses%20expensive%20solvers%20and%20auxiliary%20losses.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20significantly%20outperforms%20state-of-the-art%20feature-learning%20approaches%2C%20particularly%20in%20challenging%20non-isometric%20and%20topological%20noise%20scenarios%2C%20while%20maintaining%20high%20efficiency.%20Finally%2C%20we%20reveal%20that%20optimizing%20basis%20functions%20is%20equivalent%20to%20spectral%20convolution%2C%20where%20inhibition%20functions%20act%20as%20filters.%20This%20insight%20enables%20enhanced%20representations%20inspired%20by%20spectral%20graph%20networks%2C%20opening%20new%20avenues%20for%20future%20research.%20Our%20code%20is%20available%20at%20https%3A//github.com/LuoFeifan77/Unsupervised-Spectral-Basis-Learning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23383v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Feature%2520Learning%2520to%2520Spectral%2520Basis%2520Learning%253A%2520A%2520Unifying%2520and%2520Flexible%2520Framework%2520for%2520Efficient%2520and%2520Robust%2520Shape%2520Matching%26entry.906535625%3DFeifan%2520Luo%2520and%2520Hongyang%2520Chen%26entry.1292438233%3DShape%2520matching%2520is%2520a%2520fundamental%2520task%2520in%2520comp hod%2520significantly%2520outperforms%2520state-of-the-art%2520feature-learning%2520approaches%252C%2520particularly%2520in%2520challenging%2520non-isometric%2520and%2520topological%2520noise%2520scenarios%252C%2520while%2520maintaining%2520high%2520efficiency.%2520Finally%252C%2520we%2520reveal%2520that%2520optimizing%2520basis%2520functions%2520is%2520equivalent%2520to%2520spectral%2520convolution%252C%2520where%2520inhibition%2520functions%2520act%2520as%2520filters.%2520This%2520insight%2520enables%2520enhanced%2520representations%2520inspired%2520by%2520spectral%2520graph%2520networks%252C%2520opening%2520new%2520avenues%2520for%2520future%2520research.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/LuoFeifan77/Unsupervised-Spectral-Basis-Learning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23383v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Feature%20Learning%20to%20Spectral%20Basis%20Learning%3A%20A%20Unifying%20and%20Flexible%20Framework%20for%20Efficient%20and%20Robust%20Shape%20Matching&entry.906535625=Feifan%20Luo%20and%20Hongyang%20Chen&entry.1292438233=Shape%20matching%20is%20a%20fundamental%20task%20in%20computer%20graphics%20and%20vision%2C%20with%20deep%20functional%20maps%20becoming%20a%20prominent%20paradigm.%20However%2C%20existing%20methods%20primarily%20focus%20on%20learning%20informative%20feature%20representations%20by%20constraining%20pointwise%20and%20functional%20maps%2C%20while%20neglecting%20the%20optimization%20of%20the%20spectral%20basis-a%20critical%20component%20of%20the%20functional%20map%20pipeline.%20This%20oversight%20often%20leads%20to%20suboptimal%20matching%20results.%20Furthermore%2C%20many%20current%20approaches%20rely%20on%20conventional%2C%20time-consuming%20functional%20map%20solvers%2C%20incurring%20significant%20computational%20overhead.%20To%20bridge%20these%20gaps%2C%20we% {"title": "ARGENT: Adaptive Hierarchical Image-Text Representations", "author": "Chuong Huynh and Hossein Souri and Abhinav Kumar and Vitali Petsiuk and Deen Dayal Mohan and Suren Kumar", "abstract": "Large-scale Vision-Language Models (VLMs) such as CLIP learn powerful semantic representations but operate in Euclidean space, which fails to capture the inherent hierarchical structure of visual and linguistic concepts. Hyperbolic geometry, with its exponential volume growth, offers a principled alternative for embedding such hierarchies with low distortion. However, existing hyperbolic VLMs use entailment losses that are unstable: as parent embeddings contract toward the origin, their entailment cones widen toward a half-space, causing catastrophic cone collapse that destroys the intended hierarchy. Additionally, hierarchical evaluation of these models remains unreliable, being largely retrieval-based and correlation-based metrics and prone to taxonomy dependence and ambiguous negatives. To address these limitations, we propose an adaptive entailment loss paired with a norm regularizer that prevents cone collapse without heuristic aperture clipping. We further introduce an angle-based probabilistic entailment protocol (PEP) for evaluating hierarchical understanding, scored with AUC-ROC and Average Precision. This paper introduces a stronger hyperbolic VLM baseline ARGENT, Adaptive hieRarchical imaGe-tExt represeNTation. ARGENT improves the SOTA hyperbolic VLM by 0.7, 1.1, and 0.8 absolute points on image classification, text-to-image retrieval, and proposed hierarchical metrics, respectively.", "link": "http://arxiv.org/abs/2603.23311v1", "date": "2026-03-24", "relevancy": 2.8404, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5848}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ARGENT%3A%20Adaptive%20Hierarchical%20Image-Text%20Representations&body=Title%3A%20ARGENT%3A%20Adaptive%20Hierarchical%20Image-Text%20Representations%0AAuthor%3A%20Chuong%20Huynh%20and%20Hossein%20Souri%20and%20Abhinav%20Kumar%20and%20Vitali%20Petsiuk%20and%20Deen%20Dayal%20Mohan%20and%20Suren%20Kumar%0AAbstract%3A%20Large-scale%20Vision-Language%20Models%20%28VLMs%29%20such%20as%20CLIP%20learn%20powerful%20semantic%20representations%20but%20operate%20in%20Euclidean%20space%2C%20which%20fails%20to%20capture%20the%20inherent%20hierarchical%20structure%20of%20visual%20and%20linguistic%20concepts.%20Hyperbolic%20geometry%2C%20with%20its%20exponential%20volume%20growth%2C%20offers%20a%20principled%20alternative%20for%20embedding%20such%20hierarchies%20with%20low%20distortion.%20However%2C%20existing%20hyperbolic%20VLMs%20use%20entailment%20losses%20that%20are%20unstable%3A%20as%20parent%20embeddings%20contract%20toward%20the%20origin%2C%20their%20entailment%20cones%20widen%20toward%20a%20half-space%2C%20causing%20catastrophic%20cone%20collapse%20that%20destroys%20the%20intended%20hierarchy.%20Additionally%2C%20hierarchical%20evaluation%20of%20these%20models%20remains%20unreliable%2C%20being%20largely%20retrieval-based%20and%20correlation-based%20metrics%20and%20prone%20to%20taxonomy%20dependence%20and%20ambiguous%20negatives.%20To%20address%20these%20limitations%2C%20we%20propose%20an%20adaptive%20entailment%20loss%20paired%20with%20a%20norm%20regularizer%20that%20prevents%20cone%20collapse%20without%20heuristic%20aperture%20clipping.%20We%20further%20introduce%20an%20angle-based%20probabilistic%20entailment%20protocol%20%28PEP%29%20for%20evaluating%20hierarchical%20understanding%2C%20scored%20with%20AUC-ROC%20and%2 {"title": "SIMART: Decomposing Monolithic Meshes into Sim-ready Articulated Assets via MLLM", "author": "Chuanrui Zhang and Minghan Qin and Yuang Wang and Baifeng Xie and Hang Li and Ziwei Wang", "abstract": "High-quality articulated 3D assets are indispensable for embodied AI and physical simulation, yet 3D generation still focuses on static meshes, leaving a gap in \"sim-ready\" interactive objects. Most recent articulated object creation methods rely on multi-stage pipelines that accumulate errors across decoupled modules. Alternatively, unified MLLMs offer a single-stage path to joint static asset understanding and sim-ready asset generation. However dense voxel-based 3D tokenization yields long 3D token sequences and high memory overhead, limiting scalability to complex articulated objects. To address this, we propose SIMART, a unified MLLM framework that jointly performs part-level decomposition and kinematic prediction. By introducing a Sparse 3D VQ-VAE, SIMART reduces token counts by 70% vs. dense voxel tokens, enabling high-fidelity multi-part assemblies. SIMART achieves state-of-the-art performance on PartNet-Mobility and in-the-wild AIGC datasets, and enables physics-based robotic simulation.", "link": "http://arxiv.org/abs/2603.23386v1", "date": "2026-03-24", "relevancy": 2.8337, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5881}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5563}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SIMART%3A%20Decomposing%20Monolithic%20Meshes%20into%20Sim-ready%20Articulated%20Assets%20via%20MLLM&body=Title%3A%20SIMART%3A%20Decomposing%20Monolithic%20Meshes%20into%20Sim-ready%20Articulated%20Assets%20via%20MLLM%0AAuthor%3A%20Chuanrui%20Zhang%20and%20Minghan%20Qin%20and%20Yuang%20Wang%20and%20Baifeng%20Xie%20and%20Hang%20Li%20and%20Ziwei%20Wang%0AAbstract%3A%20High-quality%20articulated%203D%20assets%20are%20indispensable%20for%20embodied%20AI%20and%20physical%20simulation%2C%20yet%203D%20generation%20still%20focuses%20on%20static%20meshes%2C%20leaving%20a%20gap%20in%20%22sim-ready%22%20interactive%20objects.%20Most%20recent%20articulated%20object%20creation%20methods%20rely%20on%20multi-stage%20pipelines%20that%20accumulate%20errors%20across%20decoupled%20modules.%20Alternatively%2C%20unified%20MLLMs%20offer%20a%20single-stage%20path%20to%20joint%20static%20asset%20understanding%20and%20sim-ready%20asset%20generation.%20However%20dense%20voxel-based%203D%20tokenization%20yields%20long%203D%20token%20sequences%20and%20high%20memory%20overhead%2C%20limiting%20scalability%20to%20complex%20articulated%20objects.%20To%20address%20this%2C%20we%20propose%20SIMART%2C%20a%20unified%20MLLM%20framework%20that%20jointly%20performs%20part-level%20decomposition%20and%20kinematic%20prediction.%20By%20introducing%20a%20Sparse%203D%20VQ-VAE%2C%20SIMART%20reduces%20token%20counts%20by%2070%25%20vs.%20dense%20voxel%20tokens%2C%20enabling%20high-fidelity%20multi-part%20assemblies.%20SIMART%20achieves%20state-of-the-art%20performance%20on%20PartNet-Mobility%20and%20in-the-wild%20AIGC%20datasets%2C%20and%20enables%20physics-based%20robotic%20simulation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23386v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIMART%253A%2520Decomposing%2520Monolithic%2520Meshes%2520into%2520Sim-ready%2520Articulated%2520Assets%2520via%2520MLLM%26entry.906535625%3DChuanrui%2520Zhang%2520and%2520Minghan%2520Qin%2520and%2520Yuang%2520Wang%2520and%2520Baifeng%2520Xie%2520and%2520Hang%2520Li%2520and%2520Ziwei%2520Wang%26entry.1292438233%3DHigh-quality%252 {"title": "Conformal Cross-Modal Active Learning", "author": "Huy Hoang Nguyen and C\u00e9dric Jung and Shirin Salehi and Tobias Gl\u00fcck and Anke Schmeink and Andreas Kugi", "abstract": "Foundation models for vision have transformed visual recognition with powerful pretrained representations and strong zero-shot capabilities, yet their potential for data-efficient learning remains largely untapped. Active Learning (AL) aims to minimize annotation costs by strategically selecting the most informative samples for labeling, but existing methods largely overlook the rich multimodal knowledge embedded in modern vision-language models (VLMs). We introduce Conformal Cross-Modal Acquisition (CCMA), a novel AL framework that bridges vision and language modalities through a teacher-student architecture. CCMA employs a pretrained VLM as a teacher to provide semantically grounded uncertainty estimates, conformally calibrated to guide sample selection for a vision-only student model. By integrating multimodal conformal scoring with diversity-aware selection strategies, CCMA achieves superior data efficiency across multiple benchmarks. Our approach consistently outperforms state-of-the-art AL baselines, demonstrating clear advantages over methods relying solely on uncertainty or diversity metrics.", "link": "http://arxiv.org/abs/2603.23159v1", "date": "2026-03-24", "relevancy": 2.821, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.623}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5464}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5232}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conformal%20Cross-Modal%20Active%20Learning&body=Title%3A%20Conformal%20Cross-Modal%20Active%20Learning%0AAuthor%3A%20Huy%20Hoang%20Nguyen%20and%20C%C3%A9dric%20Jung%20and%20Shirin%20Salehi%20and%20Tobias%20Gl%C3%BCck%20and%20Anke%20Schmeink%20and%20Andreas%20Kugi%0AAbstract%3A%20Foundation%20models%20for%20vision%20have%20transformed%20visual%20recognition%20with%20powerful%20pretrained%20representations%20and%20strong%20zero-shot%20capabilities%2C%20yet%20their%20potential%20for%20data-efficient%20learning%20remains%20largely%20untapped.%20Active%20Learning%20%28AL%29%20aims%20to%20minimize%20annotation%20costs%20by%20strategically%20selecting%20the%20most%20informative%20samples%20for%20labeling%2C%20but%20existing%20methods%20largely%20overlook%20the%20rich%20multimodal%20knowledge%20embedded%20in%20modern%20vision-language%20models%20%28VLMs%29.%20We%20introduce%20Conformal%20Cross-Modal%20Acquisition%20%28CCMA%29%2C%20a%20novel%20AL%20framework%20that%20bridges%20vision%20and%20language%20modalities%20through%20a%20teacher-student%20architecture.%20CCMA%20employs%20a%20pretrained%20VLM%20as%20a%20teacher%20to%20provide%20semantically%20grounded%20uncertainty%20estimates%2C%20conformally%20calibrated%20to%20guide%20sample%20selection%20for%20a%20vision-only%20student%20model.%20By%20integrating%20multimodal%20conformal%20scoring%20with%20diversity-aware%20selection%20strategies%2C%20CCMA%20achieves%20superior%20data%20efficiency%20across%20multiple%20benchmarks.%20Our%20approach%20consistently%20outperforms%20state-of-the-art%20AL%20baselines%2C%20demonstrating%20clear%20advantages%20over%20methods%20relying%20solely%20on%20uncertainty%20or%20diversity%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23159v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConformal%2520Cross-Modal%2520Active%2520Learning%26entry. {"title": "Do Modern Video-LLMs Need to Listen? A Benchmark Audit and Scalable Remedy", "author": "Geewook Kim and Minjoon Seo", "abstract": "Speech and audio encoders developed over years of community effort are routinely excluded from video understanding pipelines -- not because they fail, but because benchmarks never required listening. We audit 10 video benchmarks and find items largely solvable from visual cues alone: a single-frame probe answers ~76% of AVQA without audio, suggesting poor measurement of audio-visual reasoning. Building on LLaVA-OneVision, we attach a speech/audio encoder and compare five compressor architectures under 25x token reduction (25 Hz to 1 Hz). Across 10 benchmarks -- with and without filtering -- audio yields clear gains on tasks requiring speech comprehension or cross-modal grounding, while vision-centric suites remain largely unaffected. Our results show that speech encoders play a larger role in video understanding than current benchmarks suggest. We will fully open-source our work at https://github.com/naver-ai/LLaVA-AV-SSM.", "link": "http://arxiv.org/abs/2509.17901v3", "date": "2026-03-24", "relevancy": 2.7997, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5923}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5923}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4953}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Modern%20Video-LLMs%20Need%20to%20Listen%3F%20A%20Benchmark%20Audit%20and%20Scalable%20Remedy&body=Title%3A%20Do%20Modern%20Video-LLMs%20Need%20to%20Listen%3F%20A%20Benchmark%20Audit%20and%20Scalable%20Remedy%0AAuthor%3A%20Geewook%20Kim%20and%20Minjoon%20Seo%0 {"title": "Investigating self-supervised representations for audio-visual deepfake detection", "author": "Dragos-Alexandru Boldisor and Stefan Smeu and Dan Oneata and Elisabeta Oneata", "abstract": "Self-supervised representations excel at many vision and speech tasks, but their potential for audio-visual deepfake detection remains underexplored. Unlike prior work that uses these features in isolation or buried within complex architectures, we systematically evaluate them across modalities (audio, video, multimodal) and domains (lip movements, generic visual content). We assess three key dimensions: detection effectiveness, interpretability of encoded information, and cross-modal complementarity. We find that most self-supervised features capture deepfake-relevant information, and that this information is complementary. Moreover, models primarily attend to semantically meaningful regions rather than spurious artifacts (such as the leading silence). Among the investigated features, audio-informed representations generalize best and achieve state-of-the-art results. However, generalization to realistic in-the-wild data remains challenging. Our analysis indicates this gap stems from intrinsic dataset difficulty rather than from features latching onto superficial patterns. Project webpage: https://bit-ml.github.io/ssr-dfd.", "link": "http://arxiv.org/abs/2511.17181v2", "date": "2026-03-24", "relevancy": 2.7877, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5784}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5Ba {"title": "Local Precise Refinement: A Dual-Gated Mixture-of-Experts for Enhancing Foundation Model Generalization against Spectral Shifts", "author": "Xi Chen and Maojun Zhang and Yu Liu and Shen Yan", "abstract": "Domain Generalization Semantic Segmentation (DGSS) in spectral remote sensing is severely challenged by spectral shifts across diverse acquisition conditions, which cause significant performance degradation for models deployed in unseen domains. While fine-tuning foundation models is a promising direction, existing methods employ global, homogeneous adjustments. This \"one-size-fits-all\" tuning struggles with the spatial heterogeneity of land cover, causing semantic confusion. We argue that the key to robust DGSS lies not in a single global adaptation, but in performing fine-grained, spatially-adaptive refinement of a foundation model's features. To achieve this, we propose SpectralMoE, a novel fine-tuning framework for DGSS. It operationalizes this principle by utilizing a Mixture-of-Experts (MoE) architecture to perform \\textbf{local precise refinement} on the foundation model's features, incorporating depth features estimated from selected RGB bands of the spectral remote sensing imagery to guide the fine-tuning process. Specifically, SpectralMoE employs a dual-gated MoE architecture that independently routes visual and depth features to top-k selected experts for specialized refinement, enabling modality-specific adjustments. A subsequent cross-attention mechanism then judiciously fuses the refined structural cues into the visual stream, mitigating semantic ambiguities caused by spectral variations. Extensive experiments show that SpectralMoE sets a new state-of-the-art on multiple DGSS benchmarks across hyperspectral, multispectral, and RGB remote sensing imagery.", "link": "http://arxiv.org/abs/2603.13352v2", "date": "2026-03-24", "relevancy": 2.7677, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5569}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5519}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5519}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Local%20Precise%20Refinement%3A%20A%20Dual-Gated%20Mixture-of-Experts%20for%20Enhancing%20Foundation%20Model%20Generalization%20against%20Spectral%20Shifts&body=Title%3A%20Local%20Precise%20Refinement%3A%20A%20Dual-Gated%20Mixture-of-Experts%20for%20Enhancing%20Foundation%20Model%20Generalization%20against%20Spectral%20Shifts%0AAuthor%3A%20Xi%20Chen%20and%20Maojun%20Zhang%20and%20Yu%20Liu%20and%20Shen%20Yan%0AAbstract%3A%20Domain%20Generalization%20Semantic%20Segmentation%20%28DGSS%29%20in%20spectral%20remote%20sensing%20is%20severely%20challenged%20by%20spectral%20shifts%20across%20diverse%20acquisition%20conditions%2C%20which%20cause%20significant%20performance%20degradation%20for%20models%20deployed%20in%20unseen%20domains.%20While%20fine-tuning%20foundation%20models%20is%20a%20promising%20direction%2C%20existing%20methods%20employ%20global%2C%20homogeneous%20adjustments.%20This%20%22one-size-fits-all%22%20tuning%20struggles%20with%20the%20spatial%20heterogeneity%20of%20land%20cover%2C%20causing%20semantic%20confusion.%20We%20argue%20that%20the%20key%20to%20robust%20DGSS%20lies%20not%20in%20a%20single%20global%20adaptation%2C%20but%20in%20performing%20fine-grained%2C%20spatially-adaptive%20refinement%20of%20a%20foundation%20model%27s%20features.%20To%20achieve%20this%2C%20we%20propose%20SpectralMoE%2C%20a%20novel%20fine-tuning%20framework%20for%20DGSS.%20It%20operationalizes%20this%20principle%20by%20utilizing%20a%20Mixture-of-Experts%20%28MoE%29%20architecture%20to%20perform%20%5Ctextbf%7Blocal%20precise%20refinement%7D%20on%20the%20foundation%20model%27s%20features%2C%20incorporating%20depth%20features%20estimated%20from%20selected%20RGB%20bands%20of%20the%20spectral%20remote%20sensing%20imagery%20to%20guide%20the%20fine-tuning%20process.%20Specifically%2C%20SpectralMoE%20employs%20a%20dual-gated%20MoE%20architecture%20that%20independently%20routes%20visual%20and%20depth%20features%20to%20top-k%20selected%20experts%20for%20specialized%20refinement%2C%20enabling%20modality-specific%20adjustments.%20A%20subsequent%20cross-attention%20mechanism%20then%20judiciously%20fuses%20the%20refined%20structural%20cues%20into%20the%20visual%20stream%2C%20mitigating%20semantic%20ambiguities%20caused%20by%20spectral%20variations.%20Extensive%20experiments%20show%20that%20SpectralMoE%20sets%20a%20new%20state-of-the-art%20on%20multiple%20DGSS%20benchmarks%20across%20hyperspectral%2C%20multispectral%2C%20and%20RGB%20remote%20sensing%20imagery.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13352v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLocal%2520Precise%2520Refinement%253A%2520A%2520Dual-Gated%2520Mixture-of-Experts%2520for%2520Enhancing%2520Foundation%2520Model%2520Generalization%2520against%2520Spectral%2520Shifts%26entry.906535625%3DXi%2520Chen%2520and%2520Maojun%2520Zhang%2520and%2520Yu%2520Liu%2520and%2520Shen%2520Yan%26entry.1292438233%3DDomain%2520Generalization%2520Semantic%2520Segmentation%2520%2528DGSS%2529%2520in%2520spectral%2520remote%2520sensing%2520is%2520severely%2520challenged%2520by%2520spectral%2520shifts%2520across%2520diverse%2520acquisition%2520conditions%252C%2520which%2520cause%2520significant%2520performance%2520degradation%2520for%2520models%2520deployed%2520in%2520unseen%2520domains.%2520While%2520fine-tuning%2520foundation%2520models%2520is%2520a%2520promising%2520direction%252C%2520existing%2520methods%2520employ%2520global%252C%2520homogene {"title": "ViKey: Enhancing Temporal Understanding in Videos via Visual Prompting", "author": "Yeonkyung Lee and Dayun Ju and Youngmin Kim and Seil Kang and Seong Jae Hwang", "abstract": "Recent advancements in Video Large Language Models (VideoLLMs) have enabled strong performance across diverse multimodal video tasks. To reduce the high computational cost of processing dense video frames, efficiency-oriented methods such as frame selection have been widely adopted. While effective at minimizing redundancy, these methods often cause notable performance drops on tasks requiring temporal reasoning. Unlike humans, who can infer event progression from sparse visual cues, VideoLLMs frequently misinterpret temporal relations when intermediate frames are omitted. To address this limitation, we explore visual prompting (VP) as a lightweight yet effective way to enhance temporal understanding in VideoLLMs. Our analysis reveals that simply annotating each frame with explicit ordinal information helps the model perceive temporal continuity. This visual cue also supports frame-level referencing and mitigates positional ambiguity within a sparsely sampled sequence. Building on these insights, we introduce ViKey, a training-free framework that combines VP with a lightweight Keyword-Frame Mapping (KFM) module. KFM leverages frame indices as dictionary-like keys to link textual cues to the most relevant frames, providing explicit temporal anchors during inference. Despite its simplicity, our approach substantially improves temporal reasoning and, on some datasets, preserves dense-frame baseline performance with as few as 20% of frames.", "link": "http://arxiv.org/abs/2603.23186v1", "date": "2026-03-24", "relevancy": 2.7488, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5548}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViKey%3A%20Enhancing%20Temporal%20Understanding%20in%20Videos%20via%20Visual%20Prompting&body=Title%3A%20ViKey%3A%20Enhancing%20Temporal%20Understanding%20in%20Videos%20via%20Visual%20Prompting%0AAuthor%3A%20Yeonkyung%20Lee%20and%20Dayun%20Ju%20and%20Youngmin%20Kim%20and%20Seil%20Kang%20and%20Seong%20Jae%20Hwang%0AAbstract%3A%20Recent%20advancements%20in%20Video%20Large%20Language%20Models%20%28VideoLLMs%29%20have%20enabled%20strong%20performance%20across%20diverse%20multimodal%20video%20tasks.%20To%20reduce%20the%20high%20computational%20cost%20of%20processing%20dense%20video%20frames%2C%20efficiency-oriented%20methods%20such%20as%20frame%20selection%20have%20been%20widely%20adopted.%20While%20effective%20at%20minimizing%20redundancy%2C%20these%20methods%20often%20cause%20notable%20performance%20drops%20on%20tasks%20requiring%20temporal%20reasoning.%20Unlike%20humans%2C%20who%20can%20infer%20event%20progression%20from%20sparse%20visual%20cues%2C%20VideoLLMs%20frequently%20misinterpret%20temporal%20relations%20when%20intermediate%20frames%20are%20omitted.%20To%20address%20this%20limitation%2C%20we%20explore%20visual%20prompting%20%28VP%29%20as%20a%20lightweight%20yet%20effective%20way%20to%20enhance%20temporal%20understanding%20in%20VideoLLMs.%20Our%20analysis%20reveals%20that%20simply%20annotating%20each%20frame%20with%20explicit%20ordinal%20information%20helps%20the%20model%20perceive%20temporal%20continuity.%20This%20visual%20cue%20also%20supports%20frame-level%20referencing%20and%20mitigates%20positional%20ambiguity%20within%20a%20sparsely%20sampled%20sequence.%20Building%20on%20these%20insights%2C%20we%20introduce%20ViKey%2C%20a%20training-free%20framework%20that%20combines%20VP%20with%20a%20lightweight%20Keyword-Frame%20Mapping%20%28KFM%29%20module.%20KFM%20leverages%20frame%20indices%20as%20dictionary-like%20keys%20to%20link%20textual%20cues%20to%20the%20most%20relevant%20frames%2C%20providing%20explicit%20temporal%20anchors%20during%20inference.%20Despite%20its%20simplicity%2C%20our%20approach%20substantially%20improves%20temporal%20reasoning%20and%2C%20on%20some%20datasets%2C%20preserves%20dense-frame%20baseline%20performance%20with%20as%20few%20as%2020%25%20of%20frames.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23186v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViKey%253A%2520Enhancing%2520Temporal%2520Understanding%2520in%2520Videos%2520via%2520Visual%2520Prompting%26entry.906535625%3DYeonkyung%2520Lee%2520and%2520Dayun%2520Ju%2520and%2520Youngmin%2520Kim%2520and%2520Seil%2520Kang%2520and%2520Seong%2520Jae%2520Hwang%26entry.1292438233%3DRecent%2520advancements%2520in%2520Video%2520Large%2520Language%2520Models%2520%2528VideoLLMs%2529%2520have%2520enabled%2520strong%2520performance%2520across%2520diverse%2520multimodal%2520video%2520tasks.%2520To%2520reduce%2520the%2520high%2520computational%2520cost%2520of%2520processing%2520dense%2520video%2520frames%252C%2520efficiency-oriented%2520methods%2520such%2520as%2520frame%2520selection%2520have%2520been%2520widely%2520adopted.%2520While%2520effective%2520at%2520minimizing%2520redundancy%252C%2520these%2520methods%2520often%2520cause%2520notable%2520performance%2520drops%2520on%2520tasks%2520requiring%2520temporal%2520reasoning.%2520Unlike%2520humans%252C%2520who%2520can%2520infer%2520event%2520progression%2520from%2520sparse%2520visual%2520cues%252C%2520VideoLLMs%2520frequently%2520misinterpret%2520temporal%2520relations%2520when%2520intermediate%2520frames%2520are%2520omitted.%2520To%2520address%2520this%2520limitation%252C%2520we%2520explore%2520visual%2520prompting%2 {"title": "LiZIP: An Auto-Regressive Compression Framework for LiDAR Point Clouds", "author": "Aditya Shibu and Kayvan Karim and Claudio Zito", "abstract": "The massive volume of data generated by LiDAR sensors in autonomous vehicles creates a bottleneck for real-time processing and vehicle-to-everything (V2X) transmission. Existing lossless compression methods often force a trade-off: industry standard algorithms (e.g., LASzip) lack adaptability, while deep learning approaches suffer from prohibitive computational costs. This paper proposes LiZIP, a lightweight, near-lossless zero-drift compression framework based on neural predictive coding. By utilizing a compact Multi-Layer Perceptron (MLP) to predict point coordinates from local context, LiZIP efficiently encodes only the sparse residuals.\n  We evaluate LiZIP on the NuScenes and Argoverse datasets, benchmarking against GZip, LASzip, and Google Draco (configured with 24-bit quantization to serve as a high-precision geometric baseline). Results demonstrate that LiZIP consistently achieves superior compression ratios across varying environments. The proposed system achieves a 7.5%-14.8% reduction in file size compared to the industry-standard LASzip and outperforms Google Draco by 8.8%-11.3% across diverse datasets. Furthermore, the system demonstrates generalization capabilities on the unseen Argoverse dataset without retraining. Against the general purpose GZip algorithm, LiZIP achieves a reduction of 38%-48%. This efficiency offers a distinct advantage for bandwidth constrained V2X applications and large scale cloud archival.", "link": "http://arxiv.org/abs/2603.23162v1", "date": "2026-03-24", "relevancy": 2.7486, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5757}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", {"title": "Generative Event Pretraining with Foundation Model Alignment", "author": "Jianwen Cao and Jiaxu Xing and Nico Messikommer and Davide Scaramuzza", "abstract": "Event cameras provide robust visual signals under fast motion and challenging illumination conditions thanks to their microsecond latency and high dynamic range. However, their unique sensing characteristics and limited labeled data make it challenging to train event-based visual foundation models (VFMs), which are crucial for learning visual features transferable across tasks. To tackle this problem, we propose GEP (Generative Event Pretraining), a two-stage framework that transfers semantic knowledge learned from internet-scale image datasets to event data while learning event-specific temporal dynamics. First, an event encoder is aligned to a frozen VFM through a joint regression-contrastive objective, grounding event features in image semantics. Second, a transformer backbone is autoregressively pretrained on mixed event-image sequences to capture the temporal structure unique to events. Our approach outperforms state-of-the-art event pretraining methods on a diverse range of downstream tasks, including object recognition, segmentation, and depth estimation. Together, VFM-guided alignment and generative sequence modeling yield a semantically rich, temporally aware event model that generalizes robustly across domains.", "link": "http://arxiv.org/abs/2603.23032v1", "date": "2026-03-24", "relevancy": 2.7455, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5576}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5448}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5448}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Event%20Pretraining%20with%20Foundation%20Model%20Alignment&body=Title%3A%20Generative%20Event%20Pretraining%20with%20Foundation%20Model%20Alignment%0AAuthor%3A%20Jianwen%20Cao%20and%20Jiaxu%20Xing%20and%20Nico%20Messikommer%20and%20Davide%20Scaramuzza%0AAbstract%3A%20Event%20cameras%20provide%20robust%20visual%20signals%20under%20fast%20motion%20and%20challenging%20illumination%20conditions%20thanks%20to%20their%20microsecond%20latency%20and%20high%20dynamic%20range.%20However%2C%20their%20unique%20sensing%20characteristics%20and%20limited%20labeled%20data%20make%20it%20challenging%20to%20train%20event-based%20visual%20foundation%20models%20%28VFMs%29%2C%20which%20are%20crucial%20for%20learning%20visual%20features%20transferable%20across%20tasks.%20To%20tackle%20this%20problem%2C%20we%20propose%20GEP%20%28Generative%20Event%20Pretraining%29%2C%20a%20two-stage%20framework%20that%20transfers%20semantic%20knowledge%20learned%20from%20internet-scale%20image%20datasets%20to%20event%20data%20while%20learning%20event-specific%20temporal%20dynamics.%20First%2C%20an%20event%20encoder%20is%20aligned%20to%20a%20frozen%20VFM%20through%20a%20joint%20regression-contrastive%20objective%2C%20grounding%20event%20features%20in%20image%20semantics.%20Second%2C%20a%20transformer%20backbone%20is%20autoregressively%20pretrained%20on%20mixed%20event-image%20sequences%20to%20capture%20the%20temporal%20structure%20unique%20to%20events.%20Our%20approach%20outperforms%20state-of-the-art%20event%20pretraining%20methods%20on%20a%20diverse%20range%20of%20downstream%20tasks%2C%20including%20object%20recognition%2C%20segmentation%2C%20and%20depth%20estimation.%20Together%2C%20VFM-guided%20alignment%20and%20generative%20sequence%20modeling%20yield%20a%20semantically%20rich%2C%20temporally%20aware%20event%20model%20that%20generalizes%20robustly%20across%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23032v1%0AForm%3A%20https%3A//docs.google.com/forms/d/ 0object%20recognition%2C%20segmentation%2C%20and%20depth%20estimation.%20Together%2C%20VFM-guided%20alignment%20and%20generative%20sequence%20modeling%20yield%20a%20semantically%20rich%2C%20temporally%20aware%20event%20model%20that%20generalizes%20robustly%20across%20domains.&entry.1838667208=http%3A//arxiv.org/abs/2603.23032v1&entry.124074799=Read"},
{"title": "PHANTOM Hand", "author": "Teng Yan and Jiongxu Chen and Qixiang Hua and Yue Yu and Zihang Wang and Yaohua Liu and Bingzhuo Zhong", "abstract": "Tendon-driven underactuated hands excel in adaptive grasping but often suffer from kinematic unpredictability and highly non-linear force transmission. This ambiguity limits their ability to perform precise free-motion shaping and deliver reliable payloads for complex manipulation tasks. To address this, we introduce the PHANTOM Hand (Hybrid Precision-Augmented Compliance): a modular, 1:1 human-scale system featuring 6 actuators and 15 degrees of freedom (DoFs).\n  We propose a unified framework that bridges the gap between precise analytic shaping and robust compliant grasping. By deriving a sparse mapping from physical geometry and integrating a mechanics-based compensation model, we effectively suppress kinematic drift caused by spring counter-tension and tendon elasticity. This approach achieves sub-degree kinematic reproducibility for free-motion planning while retaining the inherent mechanical compliance required for stable physical interaction.\n  Experimental validation confirms the system's capabilities through (1) kinematic analysis verifying sub-degree global accuracy across the workspace; (2) static expressibility tests demonstrating complex hand gestures; (3) diverse grasping experiments covering power, precision, and tool-use categories; and (4) quantitative fingertip force characterization. The results demonstrate that the PHANTOM hand successfully combines analytic kinematic precision with continuous, predictable force output, significantly expanding the payload and dexterity of underactuated hands. To drive the development of the underactuated manipulation ecosystem, all hardware designs and control scripts are fully open-sourced for community engagement.", "link": "http://arxiv.org/abs/2603.23152v1", "date": "2026-03-24", "relevancy": 2.6986, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5738}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5239}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5215}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PHANTOM%20Hand&body=Title%3A%20PHANTOM%20Hand%0AAuthor%3A%20Teng%20Yan%20and%20Jiongxu%20Chen%20and%20Qixiang%20Hua%20and%20Yue%20Yu%20and%20Zihang%20Wang%20and%20Yaohua%20Liu%20and%20Bingzhuo%20Zhong%0AAbstract%3A%20Tendon-driven%20underactuated%20hands%20excel%20in%20adaptive%20grasping%20but%20often%20suffer%20from%20kinematic%20unpredictability%20and%20highly%20non-linear%20force%20transmission.%20This%20ambiguity%20limits%20their%20ability%20to%20perform%20precise%20free-motion%20shaping%20and%20deliver%20reliable%20payloads%20for%20complex%20manipulation%20tasks.%20To%20address%20this%2C%20we%20introduce%20the%20PHANTOM%20Hand%20%28Hybrid%20Precision-Augmented%20Compliance%29%3A%20a%20modular%2C%201%3A1%20human-scale%20system%20featuring%206%20actuators%20and%2015%20degrees%20of%20freedom%20%28DoFs%29.%0A%20%20We%20propose%20a%20unified%20framework%20that%20bridges%20the%20gap%20between%20precise%20analytic%20shaping%20and%20robust%20compliant%20grasping.%20By%20deriving%20a%20sparse%20mapping%20from%20physical%20geometry%20and%20integrating%20a%20mechanics-based%20compensation%20model%2C%20we%20effectively%20suppress%20kinematic%20drift%20caused%20by%20spring%20counter-tension%20and%20tendon%20elasticity.%20This%20approach%20achieves%20sub-degree%20kinematic%20reproducibility%20for%20free-motion%20planning%20while%20retaining%20the%20inherent%20mechanical%20compliance%20required%20for%20stable%20physical%20interaction.%0A%20%20Experimental%20validation%20confirms%20the%20system%27s%20capabilities%20through%20%281%29%20kinematic%20analysis%20verifying%20sub-degree%20global%20accuracy%20across%20the%20workspace%3B%20%282%29%20static%20expressibility%20tests%20demonstrating%20complex%20hand%20gestures%3B%20%283%29%20diverse%20grasping%20experiments%20covering%20power%2C%20precision%2C%20and%20tool-use%20categories%3B%20and%20%284%29%20quantitative%20fingertip%20force%20characterization.%20The%20results%20demonstrate%20that%20the%20PHANTOM%20hand%20successfully%20combines%20analytic%20kinematic%20precision%20with%20continuous%2C%20predictable%20force%20output%2C%20significantly%20expanding%20the%20payload%20and%20dexterity%20of%20underactuated%20hands.%20To%20drive%20the%20development%20of%20the%20underactuated%20manipulation%20ecosystem%2C%20all%20hardware%20designs%20and%20control%20scripts%20are%20fully%20open-sourced%20for%20community%20engagement.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23152v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPHANTOM%2520Hand%26entry.906535625%3DTeng%2520Yan%2520and%2520Jiongxu%2520Chen%2520and%2520Qixiang%2520Hua%2520and%2520Yue%2520Yu%2520and%2520Zihang%2520Wang%2520and%2520Yaohua%2520Liu%2520and%2520Bingzhuo%2520Zhong%26entry.1292438233%3DTendon-driven%2520underactuated%2520hands%2520excel%2520in%2520adaptive%2520grasping%2520but%2520often%2520suffer%2520from%2520kinematic%2520unpredictability%2520and%2520highly%2520non-linear%2520force%2520transmission.%2520This%2520ambiguity%2520limits%2520their%2520ability%2520to%2520perform%2520precise%2520free-motion%2520shaping%2520and%2520deliver%2520reliable%2520payloads%2520for%2520complex%2520manipulation%2520tasks.%2520To%2520address%2520this%252C%2520we%2520introduce%2520the%2520PHANTOM%2520Hand%2520%2528Hybrid%2520Precision-Augmented%2520Compliance%2529%253A%2520a%2520modular%252C%25201%253A1%2520human-scale%2520system%2520featuring%25206%2520actuators%2520and%252015%2520degrees%2520of%2520freedom%2520%2528DoFs%2529.%250A%2520%2520We%2520propose%2520a%2520unified%2520framework%2520that%2520bridges%2520the%2520gap%2520between%2520precise%2520analytic%2520shaping%2520and%2520robust%2520compliant%2520grasping.%2520By%2520deriving%2520a%2520sparse%2520mapping%2520from%2520physical%2520geometry%2520and%2520integrating%2520a%2520mechanics-based%2520compensation%2520model%252C%2520we%2520effectively%2520suppress%2520kinematic%2520drift%2520caused%2520by%2520spring%2520counter-tension%2520and%2520tendon%2520elasticity.%2520This%2520approach%2520achieves%2520sub-degree%2520kinematic%2520reproducibility%2520for%2520free-motion%2520planning%2520while%2520retaining%2520the%2520inherent%2520mechanical%2520compliance%2520required%2520for%2520stable%2520physical%2520interaction.%250A%2520%2520Experimental%2520validation%2520confirms%2520the%2520system%2527s%2520capabilities%2520through%2520%25281%2529%2520kinematic%2520analysis%2520verifying%2520sub-degree%2520global%2520accuracy%2520across%2520the%2520workspace%253B%2520%25282%2529%2520static%2520expressibility%2520tests%2520demonstrating%2520complex%2520hand%2520gestures%253B%2520%25283%2529%2520diverse%2520grasping%2520experiments%2520covering%2520power%252C%2520precision%252C%2520and%2520tool-use%2520categories%253B%2520and%2520%25284%2529%2520quantitative%2520fingertip%2520force%2520characterization.%2520The%2520results%2520demonstrate%2520that%2520the%2520PHANTOM%2520hand%2520successfully%2520combines%2520analytic%2520kinematic%2520precision%2520with%2520continuous%252C%2520predictable%2520force%2520output%252C%2520significantly%2520expanding%2520the%2520payload%2520and%2520dexterity%2520of%2520underactuated%2520hands.%2520To%2520drive%2520the%2520development%2520of%2520the%2520underactuated%2520manipulation%2520ecosystem%252C%2520all%2520hardware%2520designs%2520and%2520control%2520scripts%2520are%2520fully%2520open-sourced%2520for%2520community%2520engagement.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23152v1%26entry.124074799%3 {"title": "Similarity-Aware Mixture-of-Experts for Data-Efficient Continual Learning", "author": "Connor Mclaughlin and Nigel Lee and Lili Su", "abstract": "Machine learning models often need to adapt to new data after deployment due to structured or unstructured real-world dynamics. The Continual Learning (CL) framework enables continuous model adaptation, but most existing approaches either assume each task contains sufficiently many data samples or that the learning tasks are non-overlapping. In this paper, we address the more general setting where each task may have a limited dataset, and tasks may overlap in an arbitrary manner without a priori knowledge. This general setting is substantially more challenging for two reasons. On the one hand, data scarcity necessitates effective contextualization of general knowledge and efficient knowledge transfer across tasks. On the other hand, unstructured task overlapping can easily result in negative knowledge transfer. To address the above challenges, we propose an adaptive mixture-of-experts (MoE) framework over pre-trained models that progressively establishes similarity awareness among tasks. Our design contains two innovative algorithmic components: incremental global pooling and instance-wise prompt masking. The former mitigates prompt association noise through gradual prompt introduction over time. The latter decomposes incoming task samples into those aligning with current prompts (in-distribution) and those requiring new prompts (out-of-distribution). Together, our design strategically leverages potential task overlaps while actively preventing negative mutual interference in the presence of per-task data scarcity. Experiments across varying data volumes and inter-task similarity show that our method enhances sample efficiency and is broadly applicable.", "link": "http://arxiv.org/abs/2603.23436v1", "date": "2026-03-24", "relevancy": 2.6657, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling {"title": "Traffic Sign Recognition in Autonomous Driving: Dataset, Benchmark, and Field Experiment", "author": "Guoyang Zhao and Weiqing Qi and Kai Zhang and Chenguang Zhang and Zeying Gong and Zhihai Bi and Kai Chen and Benshan Ma and Ming Liu and Jun Ma", "abstract": "Traffic Sign Recognition (TSR) is a core perception capability for autonomous driving, where robustness to cross-region variation, long-tailed categories, and semantic ambiguity is essential for reliable real-world deployment. Despite steady progress in recognition accuracy, existing traffic sign datasets and benchmarks offer limited diagnostic insight into how different modeling paradigms behave under these practical challenges. We present TS-1M, a large-scale and globally diverse traffic sign dataset comprising over one million real-world images across 454 standardized categories, together with a diagnostic benchmark designed to analyze model capability boundaries. Beyond standard train-test evaluation, we provide a suite of challenge-oriented settings, including cross-region recognition, rare-class identification, low-clarity robustness, and semantic text understanding, enabling systematic and fine-grained assessment of modern TSR models. Using TS-1M, we conduct a unified benchmark across three representative learning paradigms: classical supervised models, self-supervised pretrained models, and multimodal vision-language models (VLMs). Our analysis reveals consistent paradigm-dependent behaviors, showing that semantic alignment is a key factor for cross-region generalization and rare-category recognition, while purely visual models remain sensitive to appearance shift and data imbalance. Finally, we validate the practical relevance of TS-1M through real-scene autonomous driving experiments, where traffic sign recognition is integrated with semantic reasoning and spatial localization to support map-level decision constraints. Overall, TS-1M establishes a reference-level diagnostic benchmark for TSR and provides principled insights into robust and semantic-aware traffic sign perception. Project page: https://guoyangzhao.github.io/projects/ts1m.", "link": "http://arxiv.org/abs/2603.23034v1", "date": "2026-03-24", "relevancy": 2.6505, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5356}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Traffic%20Sign%20Recognition%20in%20Autonomous%20Driving%3A%20Dataset%2C%20Benchmark%2C%20and%20Field%20Experiment&body=Title%3A%20Traffic%20Sign%20Recognition%20in%20Autonomous%20Driving%3A%20Dataset%2C%20Benchmark%2C%20and%20Field%20Experiment%0AAuthor%3A%20Guoyang%20Zhao%20and%20Weiqing%20Qi%20and%20Kai%20Zhang%20and%20Chenguang%20Zhang%20and%20Zeying%20Gong%20and%20Zhihai%20Bi%20and%20Kai%20Chen%20and%20Benshan%20Ma%20and%20Ming%20Liu%20and%20Jun%20Ma%0AAbstract%3A%20Traffic%20Sign%20Recognition%20%28TSR%29%20is%20a%20core%20perception%20capability%20for%20autonomous%20driving%2C%20where%20robustness%20to%20cross-region%20variation%2C%20long-tailed%20categories%2C%20and%20semantic%20ambiguity%20is%20essential%20for%20reliable%20real-world%20deployment.%20Despite%20steady%20progress%20in%20recognition%20accuracy%2C%20existing%20traffic%20sign%20datasets%20and%20benchmarks%20offer%20limited%20diagnostic%20insight%20into%20how%20different%20modeling%20paradigms%20behave%20under%20these%20practical%20challenges.%20We%20present%20TS-1M%2C%20a%20large-scale%20and%20globally%20diverse%20traffic%20sign%20dataset%20comprising%20over%20one%20million%20real-world%20images%20across%20454%20standard {"title": "GeoSANE: Learning Geospatial Representations from Models, Not Data", "author": "Joelle Hanna and Damian Falk and Stella X. Yu and Damian Borth", "abstract": "Recent advances in remote sensing have led to an increase in the number of available foundation models; each trained on different modalities, datasets, and objectives, yet capturing only part of the vast geospatial knowledge landscape. While these models show strong results within their respective domains, their capabilities remain complementary rather than unified. Therefore, instead of choosing one model over another, we aim to combine their strengths into a single shared representation. We introduce GeoSANE, a geospatial model foundry that learns a unified neural representation from the weights of existing foundation models and task-specific models, able to generate novel neural networks weights on-demand. Given a target architecture, GeoSANE generates weights ready for finetuning for classification, segmentation, and detection tasks across multiple modalities. Models generated by GeoSANE consistently outperform their counterparts trained from scratch, match or surpass state-of-the-art remote sensing foundation models, and outperform models obtained through pruning or knowledge distillation when generating lightweight networks. Evaluations across ten diverse datasets and on GEO-Bench confirm its strong generalization capabilities. By shifting from pre-training to weight generation, GeoSANE introduces a new framework for unifying and transferring geospatial knowledge across models and tasks. Code is available at \\href{https://hsg-aiml.github.io/GeoSANE/}{hsg-aiml.github.io/GeoSANE/}.", "link": "http://arxiv.org/abs/2603.23408v1", "date": "2026-03-24", "relevancy": 2.6432, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5414}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", " {"title": "TRivia: Self-supervised Fine-tuning of Vision-Language Models for Table Recognition", "author": "Junyuan Zhang and Bin Wang and Qintong Zhang and Fan Wu and Zichen Wen and Jialin Lu and Junjie Shan and Ziqi Zhao and Shuya Yang and Ziling Wang and Ziyang Miao and Huaping Zhong and Yuhang Zang and Xiaoyi Dong and Ka-Ho Chow and Conghui He", "abstract": "Table recognition (TR) aims to transform table images into semi-structured representations such as HTML or Markdown. As a core component of document parsing, TR has long relied on supervised learning, with recent efforts dominated by fine-tuning vision-language models (VLMs) using labeled data. While VLMs have brought TR to the next level, pushing performance further demands large-scale labeled data that is costly to obtain. Consequently, although proprietary models have continuously pushed the performance boundary, open-source models, often trained with limited resources and, in practice, the only viable option for many due to privacy regulations, still lag far behind. To bridge this gap, we introduce TRivia, a self-supervised fine-tuning method that enables pretrained VLMs to learn TR directly from unlabeled table images in the wild. Built upon Group Relative Policy Optimization, TRivia automatically identifies unlabeled samples that most effectively facilitate learning and eliminates the need for human annotations through a question-answering-based reward mechanism. An attention-guided module generates diverse questions for each table image, and the ability to interpret the recognition results and answer them correctly provides feedback to optimize the TR model. This closed-loop process allows the TR model to autonomously learn to recognize, structure, and reason over tables without labeled data. Leveraging this pipeline, we present TRivia-3B, an open-sourced, compact, and state-of-the-art TR model that surpasses existing systems (e.g., Gemini 2.5 Pro, MinerU2.5) on three popular benchmarks. Model and code are released at: https://github.com/HKU-TASR/TRivia", "link": "http://arxiv.org/abs/2512.01248v2", "date": "2026-03-24", "relevancy": 2.6374, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5446}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5189}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5189}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TRivia%3A%20Self-supervised%20Fine-tuning%20of%20Vision-Language%20Models%20for%20Table%20Recognition&body=Title%3A%20TRivia%3A%20Self-supervised%20Fine-tuning%20of%20Vision-Language%20Models%20for%20Table%20Recognition%0AAuthor%3A%20Junyuan%20Zhang%20and%20Bin%20Wang%20and%20Qintong%20Zhang%20and%20Fan%20Wu%20and%20Zichen%20Wen%20and%20Jialin%20Lu%20and%20Junjie%20Shan%20and%20Ziqi%20Zhao%20and%20Shuya%20Yang%20and%20Ziling%20Wang%20and%20Ziyang%20Miao%20and%20Huaping%20Zhong%20and%20Yuhang%20Zang%20and%20Xiaoyi%20Dong%20and%20Ka-Ho%20Chow%20and%20Conghui%20He%0AAbstract%3A%20Table%20recognition%20%28TR%29%20aims%20to%20transform%20table%20images%20into%20semi-structured%20representations%20such%20as%20HTML%20or%20Markdown.%20As%20a%20core%20component%20of%20document%20parsing%2C%20TR%20has%20long%20relied%20on%20supervised%20learning%2C%20with%20recent%20efforts%20dominated%20by%20fine-tuning%20vision-language%20models%20%28VLMs%29%20using%20labeled%20data.%20While%20VLMs%20have%20brought%20TR%20to%20the%20next%20level%2C%20pushing%20performance%20further%20demands%20large-scale%20labeled%20data%20that%20is%20costly%20to%20obtain.%20Consequently%2C%20although%20proprietary%20models%20have%20continuously%20pushed%20the%20performance%20boundary%2C%20open-source%20models%2C%20often%20trained%20with%20limited%20resources%20and%2C%20in%20practice%2C%20the%20only%20viable%20option%20for%20many%20due%20to%20privacy%20regulations%2C%20still%20lag%20far%20behind.%20To%20bridge%20this%20gap%2C%20we%20introduce%20TRivia%2C%20a%20self-supervised%20fine-tuning%20method%20that%20enables%20pretrained%20VLMs%20to%20learn%20TR%20directly%20from%20unlabeled%20table%20images%20in%20the%20wild.%20Built%20upon%20Group%20Relative%20Policy%20Optimization%2C%20TRivia%20automatically%20identifies%20unlabeled%20samples%20that%20most%20effectively%20facilitate%20learning%20and%20eliminates%20the%20need%20for%20human%20annotations%20through%20a%20question-answering-based%20reward%20mechanism.%20An%20attention-guided%20module%20generates%20diverse%20questions%20for%20each%20table%20image%2C%20and%20the%20ability%20to%20interpret%20the%20recognition%20results%20and%20answer%20them%20correctly%20provides%20feedback%20to%20optimize%20the%20TR%20model.%20This%20closed-loop%20process%20allows%20the%20TR%20model%20to%20autonomously%20learn%20to%20recognize%2C%20structure%2C%20and%20reason%20over%20tables%20without%20labeled%20data.%20Leveraging%20this%20pipeline%2C%20we%20present%20TRivia-3B%2C%20an%20open-sourced%2C%20compact%2C%20and%20state-of-the-art%20TR%20model%20that%20surpasses%20existing%20systems%20%28e.g.%2C%20Gemini%202.5%20Pro%2C%20MinerU2.5%29%20on%20three%20popular%20benchmarks.%20Model%20and%20code%20are%20released%20at%3A%20https%3A//github.com/HKU-TASR/TRivia%0ALink%3A%20http%3A//arxiv.org/abs/2512.01248v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTRivia%253A%2520Self-supervised%2520Fine-tuning%2520of%2520Vision-Language%2520Models%2520for%2520Table%2520Recognition%26entry.906535625%3DJunyuan%2520Zhang%2520and%2520Bin%2520Wang%2520and%2520Qintong%2520Zhang%2520and%2520Fan%2520Wu%2520and%2520Zichen%2520Wen%2520and%2520Jialin%2520Lu%2520and%2520Junjie%2520Shan%2520and%252 {"title": "Follow-Your-Motion: Video Motion Transfer via Efficient Spatial-Temporal Decoupled Finetuning", "author": "Yue Ma and Yulong Liu and Qiyuan Zhu and Ayden Yang and Kunyu Feng and Xinhua Zhang and Zexuan Yan and Zhifeng Li and Sirui Han and Chenyang Qi and Qifeng Chen", "abstract": "Recently, breakthroughs in the video diffusion transformer have shown remarkable capabilities in diverse motion generations. As for the motion-transfer task, current methods mainly use two-stage Low-Rank Adaptations (LoRAs) finetuning to obtain better performance. However, existing adaptation-based motion transfer still suffers from motion inconsistency and tuning inefficiency when applied to large video diffusion transformers. Naive two-stage LoRA tuning struggles to maintain motion consistency between generated and input videos due to the inherent spatial-temporal coupling in the 3D attention operator. Additionally, they require time-consuming fine-tuning processes in both stages. To tackle these issues, we propose Follow-Your-Motion, an efficient two-stage video motion transfer framework that finetunes a powerful video diffusion transformer to synthesize complex motion. Specifically, we propose a spatial-temporal decoupled LoRA to decouple the attention architecture for spatial appearance and temporal motion processing. During the second training stage, we design the sparse motion sampling and adaptive RoPE to accelerate the tuning speed. To address the lack of a benchmark for this field, we introduce MotionBench, a comprehensive benchmark comprising diverse motion, including creative camera motion, single object motion, multiple object motion, and complex human motion. We show extensive evaluations on MotionBench to verify the superiority of Follow-Your-Motion.", "link": "http://arxiv.org/abs/2506.05207v3", "date": "2026-03-24", "relevancy": 2.5872, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.7032}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6361}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6349}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Follow-Your-Motion%3A%20Video%20Motion%20Transfer%20via%20Efficient%20Spatial-Temporal%20Decoupled%20Finetuning&body=Title%3A%20Follow-Your-Motion%3A%20Video%20Motion%20Transfer%20via%20Efficient%20Spatial-Temporal%20Decoupled%20Finetuning%0AAuthor%3A%20Yue%20Ma%20and%20Yulong%20Liu%20and%20Qiyuan%20Zhu%20and%20Ayden%20Yang%20and%20Kunyu%20Feng%20and%20Xinhua%20Zhang%20and%20Zexuan%20Yan%20and%20Zhifeng%20Li%20and%20Sirui%20Han%20and%20Chenyang%20Qi%20and%20Qifeng%20Chen%0AAbstract%3A%20Recently%2C%20breakthroughs%20in%20the%20video%20diffusion%20transformer%20have%20shown%20remarkable%20capabilities%20in%20diverse%20motion%20generations.%20As%20for%20the%20motion-transfer%20task%2C%20current%20methods%20mainly%20use%20two-stage%20Low-Rank%20Adaptations%20%28LoRAs%29%20finetuning%20to%20obtain%20better%20performance.%20However%2C%20existing%20adaptation-based%20motion%20transfer%20still%20suffers%20from%20motion%20inconsistency%20and%20tuning%20inefficiency%20when%20applied%20to%20large%20video%20diffusion%20transformers.%20Naive%20two-stage%20LoRA%20tuning%20struggles%20to%20maintain%20motion%20consistency%20between%20generated%20and%20input%20videos%20due%20to%20the%20inherent%20spatial-temporal%20coupling%20in%20the%203D%20attention%20operator.%20Additionally%2C%20they%20require%20time-consuming%20fine-tuning%20processes%20in%20both%20stages.%20To%20tackle%20these%20issues%2C%20we%20propose%20Follow-Your-Motion%2C%20an%20efficient%20two-stage%20video%20motion%20transfer%20framework%20that%20finetunes%20a%20powerful%20video%20diffusion%20transformer%20to%20synthesize%20complex%20motion.%20Specifically%2C%20we%20propose%20a%20spatial-temporal%20decoupled%20LoRA%20to%20decouple%20the%20attention%20architecture%20for%20spatial%20appearance%20and%20temporal%20motion%20processing.%20During%20the%20second%20training%20stage%2C%20we%20design%20the%20sparse%20motion%20sampling%20and%20adaptive%20RoPE%20to%20accelerate%20the%20tuning%20speed.%20To%20address%20the%20lack%20of%20a%20benchmark%20for%20this%20field%2C%20we%20introduce%20MotionBench%2C%20a%20comprehensive%20benchmark%20comprising%20diverse%20motion%2C%20including%20creative%20camera%20motion%2C%20single%20object%20motion%2C%20multiple%20object%20motion%2C%20and%20complex%20human%20motion.%20We%20show%20extensive%20evaluations%20on%20MotionBench%20to%20verify%20the%20superiority%20of%20Follow-Your-Motion.%0ALink%3A%20http%3A//arxiv.org/abs/2506.05207v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFollow-Your-Motion%253A%2520Video%2520Motion%2520Transfer%2520via%2520Efficient%2520Spatial-Temporal%2520Decoupled%2520Finetuning%26entry.906535625%3DYue%2520Ma%2520and%2520Yulong%2520Liu%2520and%2520Qiyuan%2520Zhu%2520and%2520Ayden%2520Yang%2520and%2520Kunyu%2520Feng%2520and%2520Xinhua%2520Zhang%2520and%2520Zexuan%2520Yan%2520and%2520Zhifeng%2520Li%2520and%2520Sirui%2520Han%2520and%2520Chenyang%2520Qi%2520and%2520Qifeng%2520Chen%26entry.1292438233%3DRecently%252C%2520breakthroughs%2520in%2520the%2520video%2520diffusion%2520transformer%2520have%2520shown%2520remarkable%2520capabilities%2520in%2520diverse%2520motion%2520generations.%2520As%2520for%2520the%2520motion-transfer%2520task%252C%2520current%2520methods%2520mainly%2520use%2520two-stage%2520Low-Rank%2520Adaptations%2520%2528LoRAs%2529%2520finetuning%2520to%2520obtain%2520better%2520performance.%2520However%252C%2520existing%2520adaptation-based%2520motion%2520transfer%2520still%2520suffers%2520from%2520motion%2520inconsistency%2520and%2520tu

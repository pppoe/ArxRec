{"title": "Gaze-Regularized VLMs for Ego-Centric Behavior Understanding", "author": "Anupam Pani and Yanchao Yang", "abstract": "Eye gaze, encompassing fixations and saccades, provides critical insights into human intentions and future actions. This study introduces a gaze-regularized framework that enhances Vision Language Models (VLMs) for egocentric behavior understanding. Unlike existing methods that rely solely on visual data and overlook gaze information, our approach directly incorporates gaze information into the VLM architecture during training. By generating gaze-based queries, the model dynamically focuses on gaze-highlighted regions, while a gaze-regularization mechanism ensures the alignment of model attention with human attention patterns. To better understand how gaze can be effectively integrated into VLMs, we conducted extensive experiments exploring various strategies for incorporating gaze data. These innovations enable the prediction of future events with detailed action descriptions. Experimental results demonstrate a nearly 13 % improvement in semantic scores compared to baseline models not leveraging gaze data, highlighting the effectiveness of our approach. This work establishes a foundation for leveraging the human gaze in VLMs, significantly boosting their predictive capabilities in applications requiring accurate and robust future event prediction.", "link": "http://arxiv.org/abs/2603.23190v1", "date": "2026-03-24", "relevancy": 2.5857, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5228}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5228}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5059}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaze-Regularized%20VLMs%20for%20Ego-Centric%20Behavior%20Understanding&body=Title%3A%20Gaze-Regularized%20VLMs%20for%20Ego-Centric%20Behavior%20Understanding%0AAuthor%3A%20Anupam%20Pani%20and%20Yanchao%20Yang%0AAbstract%3A%20Eye%20gaze%2C%20encompassing%20fixations%20and%20saccades%2C%20provides%20critical%20insights%20into%20human%20intentions%20and%20future%20actions.%20This%20study%20introduces%20a%20gaze-regularized%20framework%20that%20enhances%20Vision%20Language%20Models%20%28VLMs%29%20for%20egocentric%20behavior%20understanding.%20Unlike%20existing%20methods%20that%20rely%20solely%20on%20visual%20data%20and%20overlook%20gaze%20information%2C%20our%20approach%20directly%20incorporates%20gaze%20information%20into%20the%20VLM%20architecture%20during%20training.%20By%20generating%20gaze-based%20queries%2C%20the%20model%20dynamically%20focuses%20on%20gaze-highlighted%20regions%2C%20while%20a%20gaze-regularization%20mechanism%20ensures%20the%20alignment%20of%20model%20attention%20with%20human%20attention%20patterns.%20To%20better%20understand%20how%20gaze%20can%20be%20effectively%20integrated%20into%20VLMs%2C%20we%20conducted%20extensive%20experiments%20exploring%20various%20strategies%20for%20incorporating%20gaze%20data.%20These%20innovations%20enable%20the%20prediction%20of%20future%20events%20with%20detailed%20action%20descriptions.%20Experimental%20results%20demonstrate%20a%20nearly%2013%20%25%20improvement%20in%20semantic%20scores%20compared%20to%20baseline%20models%20not%20leveraging%20gaze%20data%2C%20highlighting%20the%20effectiveness%20of%20our%20approach.%20This%20work%20establishes%20a%20foundation%20for%20leveraging%20the%20human%20gaze%20in%20VLMs%2C%20significantly%20boosting%20their%20predictive%20capabilities%20in%20applications%20requiring%20accurate%20and%20robust%20future%20event%20prediction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23190v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGaze-Regularized%2520VLMs%2520for%2520Ego-Centric%2520Behavior%2520Understanding%26entry.906535625%3DAnupam%2520Pani%2520and%2520Yanchao%2520Yang%26entry.1292438233%3DEye%2520gaze%252C%2520encompassing%2520fixations%2520and%2520saccades%252C%2520provides%2520critical%2520insights%2520into%2520human%2520intentions%2520and%2520future%2520actions.%2520This%2520study%2520introduces%2520a%2520gaze-regularized%2520framework%2520that%2520enhances%2520Vision%2520Language%2520Models%2520%2528VLMs%2529%2520for%2520egocentric%2520behavior%2520understanding.%2520Unlike%2520existing%2520methods%2520that%2520rely%2520solely%2520on%2520visual%2520data%2520and%2520overlook%2520gaze%2520information%252C%2520our%2520approach%2520directly%2520incorporates%2520gaze%2520information%2520into%2520the%2520VLM%2520architecture%2520during%2520training.%2520By%2520generating%2520gaze-based%2520queries%252C%2520the%2520model%2520dynamically%2520focuses%2520on%2520gaze-highlighted%2520regions%252C%2520while%2520a%2520gaze-regularization%2520mechanism%2520ensures%2520the%2520alignment%2520of%2520model%2520attention%2520with%2520human%2520attention%2520patterns.%2520To%2520better%2520understand%2520how%2520gaze%2520can%2520be%2520effectively%2520integrated%2520into%2520VLMs%252C%2520we%2520conducted%2520extensive%2520experiments%2520exploring%2520various%2520strategies%2520for%2520incorporating%2520gaze%2520data.%2520These%2520innovations%2520enable%2520the%2520prediction%2520of%2520future%2520events%2520with%2520detailed%2520action%2520descriptions.%2520Experimental%2520results%2520demonstrate%2520a%2520nearly%252013%2520%2525%2520improvement%2520in%2520semantic%2520scores%2520compared%2520to%2520baseline%2520models%2520not%2520leveraging%2520gaze%2520data%252C%2520highlighting%2520the%2520effectiveness%2520of%2520our%2520approach.%2520This%2520work%2520establishes%2520a%2520foundation%2520for%2520leveraging%2520the%2520human%2520gaze%2520in%2520VLMs%252C%2520significantly%2520boosting%2520their%2520predictive%2520capabilities%2520in%2520applications%2520requiring%2520accurate%2520and%2520robust%2520future%2520event%2520prediction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23190v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Gaze-Regularized%20VLMs%20for%20Ego-Centric%20Behavior%20Understanding&entry.906535625=Anupam%20Pani%20and%20Yanchao%20Yang&entry.1292438233=Eye%20gaze%2C%20encompassing%20fixations%20and%20saccades%2C%20provides%20critical%20insights%20into%20human%20intentions%20and%20future%20actions.%20This%20study%20introduces%20a%20gaze-regularized%20framework%20that%20enhances%20Vision%20Language%20Models%20%28VLMs%29%20for%20egocentric%20behavior%20understanding.%20Unlike%20existing%20methods%20that%20rely%20solely%20on%20visual%20data%20and%20overlook%20gaze%20information%2C%20our%20approach%20directly%20incorporates%20gaze%20information%20into%20the%20VLM%20architecture%20during%20training.%20By%20generating%20gaze-based%20queries%2C%20the%20model%20dynamically%20focuses%20on%20gaze-highlighted%20regions%2C%20while%20a%20gaze-regularization%20mechanism%20ensures%20the%20alignment%20of%20model%20attention%20with%20human%20attention%20patterns.%20To%20better%20understand%20how%20gaze%20can%20be%20effectively%20integrated%20into%20VLMs%2C%20we%20conducted%20extensive%20experiments%20exploring%20various%20strategies%20for%20incorporating%20gaze%20data.%20These%20innovations%20enable%20the%20prediction%20of%20future%20events%20with%20detailed%20action%20descriptions.%20Experimental%20results%20demonstrate%20a%20nearly%2013%20%25%20improvement%20in%20semantic%20scores%20compared%20to%20baseline%20models%20not%20leveraging%20gaze%20data%2C%20highlighting%20the%20effectiveness%20of%20our%20approach.%20This%20work%20establishes%20a%20foundation%20for%20leveraging%20the%20human%20gaze%20in%20VLMs%2C%20significantly%20boosting%20their%20predictive%20capabilities%20in%20applications%20requiring%20accurate%20and%20robust%20future%20event%20prediction.&entry.1838667208=http%3A//arxiv.org/abs/2603.23190v1&entry.124074799=Read"},
{"title": "ViBe: Ultra-High-Resolution Video Synthesis Born from Pure Images", "author": "Yunfeng Wu and Hongying Cheng and Zihao He and Songhua Liu", "abstract": "Transformer-based video diffusion models rely on 3D attention over spatial and temporal tokens, which incurs quadratic time and memory complexity and makes end-to-end training for ultra-high-resolution videos prohibitively expensive. To overcome this bottleneck, we propose a pure image adaptation framework that upgrades a video Diffusion Transformer pre-trained at its native scale to synthesize higher-resolution videos. Unfortunately, naively fine-tuning with high-resolution images alone often introduces noticeable noise due to the image-video modality gap. To address this, we decouple the learning objective to separately handle modality alignment and spatial extrapolation. At the core of our approach is Relay LoRA, a two-stage adaptation strategy. In the first stage, the video diffusion model is adapted to the image domain using low-resolution images to bridge the modality gap. In the second stage, the model is further adapted with high-resolution images to acquire spatial extrapolation capability. During inference, only the high-resolution adaptation is retained to preserve the video generation modality while enabling high-resolution video synthesis. To enhance fine-grained detail synthesis, we further propose a High-Frequency-Awareness-Training-Objective, which explicitly encourages the model to recover high-frequency components from degraded latent representations via a dedicated reconstruction loss. Extensive experiments demonstrate that our method produces ultra-high-resolution videos with rich visual details without requiring any video training data, even outperforming previous state-of-the-art models trained on high-resolution videos by 0.8 on the VBench benchmark. Code will be available at https://github.com/WillWu111/ViBe.", "link": "http://arxiv.org/abs/2603.23326v1", "date": "2026-03-24", "relevancy": 2.584, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6653}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6353}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6244}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViBe%3A%20Ultra-High-Resolution%20Video%20Synthesis%20Born%20from%20Pure%20Images&body=Title%3A%20ViBe%3A%20Ultra-High-Resolution%20Video%20Synthesis%20Born%20from%20Pure%20Images%0AAuthor%3A%20Yunfeng%20Wu%20and%20Hongying%20Cheng%20and%20Zihao%20He%20and%20Songhua%20Liu%0AAbstract%3A%20Transformer-based%20video%20diffusion%20models%20rely%20on%203D%20attention%20over%20spatial%20and%20temporal%20tokens%2C%20which%20incurs%20quadratic%20time%20and%20memory%20complexity%20and%20makes%20end-to-end%20training%20for%20ultra-high-resolution%20videos%20prohibitively%20expensive.%20To%20overcome%20this%20bottleneck%2C%20we%20propose%20a%20pure%20image%20adaptation%20framework%20that%20upgrades%20a%20video%20Diffusion%20Transformer%20pre-trained%20at%20its%20native%20scale%20to%20synthesize%20higher-resolution%20videos.%20Unfortunately%2C%20naively%20fine-tuning%20with%20high-resolution%20images%20alone%20often%20introduces%20noticeable%20noise%20due%20to%20the%20image-video%20modality%20gap.%20To%20address%20this%2C%20we%20decouple%20the%20learning%20objective%20to%20separately%20handle%20modality%20alignment%20and%20spatial%20extrapolation.%20At%20the%20core%20of%20our%20approach%20is%20Relay%20LoRA%2C%20a%20two-stage%20adaptation%20strategy.%20In%20the%20first%20stage%2C%20the%20video%20diffusion%20model%20is%20adapted%20to%20the%20image%20domain%20using%20low-resolution%20images%20to%20bridge%20the%20modality%20gap.%20In%20the%20second%20stage%2C%20the%20model%20is%20further%20adapted%20with%20high-resolution%20images%20to%20acquire%20spatial%20extrapolation%20capability.%20During%20inference%2C%20only%20the%20high-resolution%20adaptation%20is%20retained%20to%20preserve%20the%20video%20generation%20modality%20while%20enabling%20high-resolution%20video%20synthesis.%20To%20enhance%20fine-grained%20detail%20synthesis%2C%20we%20further%20propose%20a%20High-Frequency-Awareness-Training-Objective%2C%20which%20explicitly%20encourages%20the%20model%20to%20recover%20high-frequency%20components%20from%20degraded%20latent%20representations%20via%20a%20dedicated%20reconstruction%20loss.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20produces%20ultra-high-resolution%20videos%20with%20rich%20visual%20details%20without%20requiring%20any%20video%20training%20data%2C%20even%20outperforming%20previous%20state-of-the-art%20models%20trained%20on%20high-resolution%20videos%20by%200.8%20on%20the%20VBench%20benchmark.%20Code%20will%20be%20available%20at%20https%3A//github.com/WillWu111/ViBe.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23326v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViBe%253A%2520Ultra-High-Resolution%2520Video%2520Synthesis%2520Born%2520from%2520Pure%2520Images%26entry.906535625%3DYunfeng%2520Wu%2520and%2520Hongying%2520Cheng%2520and%2520Zihao%2520He%2520and%2520Songhua%2520Liu%26entry.1292438233%3DTransformer-based%2520video%2520diffusion%2520models%2520rely%2520on%25203D%2520attention%2520over%2520spatial%2520and%2520temporal%2520tokens%252C%2520which%2520incurs%2520quadratic%2520time%2520and%2520memory%2520complexity%2520and%2520makes%2520end-to-end%2520training%2520for%2520ultra-high-resolution%2520videos%2520prohibitively%2520expensive.%2520To%2520overcome%2520this%2520bottleneck%252C%2520we%2520propose%2520a%2520pure%2520image%2520adaptation%2520framework%2520that%2520upgrades%2520a%2520vide {"title": "RealCQA-V2: A Diagnostic Benchmark for Structured Visual Entailment over Scientific Charts", "author": "Saleem Ahmed and Srirangaraj Setlur and Venu Govindaraju", "abstract": "Multimodal reasoning models often produce fluent answers supported by seemingly coherent rationales. Existing benchmarks evaluate only final-answer correctness. They do not support atomic visual entailment verification of intermediate steps, especially visual compositional logic. This limitation is especially acute in scientific chart understanding, where answers depend on deterministically grounded visual semantics such as axes, legends, and quantitative relations. We introduce RealCQA-V2, a large-scale benchmark that reformulates chart question answering as Visual Premise Proving (VPP): a structured logical entailment task over chart-grounded visual predicates. Each question is deconstructed into manually curated, atomic premises grounded in chart elements (axes, legends, marks, and quantitative relations), yielding executable reasoning chains rather than free-form textual rationales. These premises form compositional reasoning chains, enabling verification at the level of individual visual statements and complete reasoning sequences. We introduce chain-level metrics that measure both full logical validity (AccVPP) and partial reasoning progress within failed chains (DCP), extending beyond traditional VQA accuracy. Baseline evaluations across representative LVLMs reveal a consistent local-global reasoning gap: models often verify many individual premises correctly while failing to preserve coherence across the full chain. RealCQA-V2 establishes a reproducible benchmark for structured visual entailment over real scientific charts and enables rigorous diagnosis of multimodal reasoning beyond answer-only evaluation.", "link": "http://arxiv.org/abs/2410.22492v3", "date": "2026-03-24", "relevancy": 2.5837, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5379}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5379}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RealCQA-V2%3A%20A%20Diagnostic%20Benchmark%20for%20Structured%20Visual%20Entailment%20over%20Scientific%20Charts&body=Title%3A%20RealCQA-V2%3A%20A%20Diagnostic%20Benchmark%20for%20Structured%20Visual%20Entailment%20over%20Scientific%20Charts%0AAuthor%3A%20Saleem%20Ahmed%20and%20Srirangaraj%20Setlur%20and%20Venu%20Govindaraju%0AAbstract%3A%20Multimodal%20reasoning%20models%20often%20produce%20fluent%20answers%20supported%20by%20seemingly%20coherent%20rationales.%20Existing%20benchmarks%20evaluate%20only%20final-answer%20correctness.%20They%20do%20not%20support%20atomic%20visual%20entailment%20verification%20of%20intermediate%20steps%2C%20especially%20visual%20compositional%20logic.%20This%20limitation%20is%20especially%20acute%20in%20scientific%20chart%20understanding%2C%20where%20answers%20depend%20on%20deterministically%20grounded%20visual%20semantics%20such%20as%20axes%2C%20legends%2C%20and%20quantitative%20relations.%20We%20introduce%20RealCQA-V2%2C%20a%20large-scale%20benchmark%20that%20reformulates%20chart%20question%20answering%20as%20Visual%20Premise%20Proving%20%28VPP%29%3A%20a%20structured%20logical%20entailment%20task%20over%20chart-grounded%20visual%20predicates.%20Each%20question%20is%20deconstructed%20into%20manually%20curated%2C%20atomic%20premises%20grounded%20in%20chart%20elements%20%28axes%2C%20legends%2C%20marks%2C%20and%20quantitative%20relations%29%2C%20yielding%20executable%20reasoning%20chains%20rather%20than%20free-form%20textual%20rationales.%20These%20premises%20form%20compositional%20reasoning%20chains%2C%20enabling%20verification%20at%20the%20level%20of%20individual%20visual%20statements%20and%20complete%20reasoning%20sequences.%20We%20introduce%20chain-level%20metrics%20that%20measure%20both%20full%20logical%20validity%20%28AccVPP%29%20and%20partial%20reasoning%20progress%20within%20failed%20chains%20%28DCP%29%2C%20extending%20beyond%20traditional%20VQA%20accuracy.%20Baseline%20evaluations%20across%20representative%20LVLMs%20reveal%20a%20consistent%20local-global%20reasoning%20gap%3A%20models%20often%20verify%20many%20individual%20premises%20correctly%20while%20failing%20to%20preserve%20coherence%20across%20the%20full%20chain.%20RealCQA-V2%20establishes%20a%20reproducible%20benchmark%20for%20structured%20visual%20entailment%20over%20real%20scientific%20charts%20and%20enables%20rigorous%20diagnosis%20of%20multimodal%20reasoning%20beyond%20answer-only%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2410.22492v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRealCQA-V2%253A%2520A%2520Diagnostic%2520Benchmark%2520for%2520Structured%2520Visual%2520Entailment%2520over%2520Scientific%2520Charts%26entry.906535625%3DSaleem%2520Ahmed%2520and%2520Srirangaraj%2520Setlur%2520and%2520Venu%2520Govindaraju%26entry.1292438233%3DMultimodal%2520reasoning%2520models%2520often%2520produce%2520fluent%2520answers%2520supported%2520by%2520seemingly%2520coherent%2520rationales.%2520Existing%2520benchmarks%2520evaluate%2520only%2520final-answer%2520correctness.%2520They%2520do%2520not%2520support%2520atomic%2520visual%2520entailment%2520verification%2520of%2520intermediate%2520steps%252C%2520especially%2520visual%2520compositional%2520logic.%2520This%2520limitation%2520is%2520especially%2520acute%2520in%2520scientific%2520chart%2520understanding% {"title": "GO-Renderer: Generative Object Rendering with 3D-aware Controllable Video Diffusion Models", "author": "Zekai Gu and Shuoxuan Feng and Yansong Wang and Hanzhuo Huang and Zhongshuo Du and Chengfeng Zhao and Chengwei Ren and Peng Wang and Yuan Liu", "abstract": "Reconstructing a renderable 3D model from images is a useful but challenging task. Recent feedforward 3D reconstruction methods have demonstrated remarkable success in efficiently recovering geometry, but still cannot accurately model the complex appearances of these 3D reconstructed models. Recent diffusion-based generative models can synthesize realistic images or videos of an object using reference images without explicitly modeling its appearance, which provides a promising direction for object rendering, but lacks accurate control over the viewpoints. In this paper, we propose GO-Renderer, a unified framework integrating the reconstructed 3D proxies to guide the video generative models to achieve high-quality object rendering on arbitrary viewpoints under arbitrary lighting conditions. Our method not only enjoys the accurate viewpoint control using the reconstructed 3D proxy but also enables high-quality rendering in different lighting environments using diffusion generative models without explicitly modeling complex materials and lighting. Extensive experiments demonstrate that GO-Renderer achieves state-of-the-art performance across the object rendering tasks, including synthesizing images on new viewpoints, rendering the objects in a novel lighting environment, and inserting an object into an existing video.", "link": "http://arxiv.org/abs/2603.23246v1", "date": "2026-03-24", "relevancy": 2.5721, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6709}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6377}, {"title": "CAT3 n%20synthesize%20realistic%20images%20or%20videos%20of%20an%20object%20using%20reference%20images%20without%20explicitly%20modeling%20its%20appearance%2C%20which%20provides%20a%20promising%20direction%20for%20object%20rendering%2C%20but%20lacks%20accurate%20control%20over%20the%20viewpoints.%20In%20this%20paper%2C%20we%20propose%20GO-Renderer%2C%20a%20unified%20framework%20integrating%20the%20reconstructed%203D%20proxies%20to%20guide%20the%20video%20generative%20models%20to%20achieve%20high-quality%20object%20rendering%20on%20arbitrary%20viewpoints%20under%20arbitrary%20lighting%20conditions.%20Our%20method%20not%20only%20enjoys%20the%20accurate%20viewpoint%20control%20using%20the%20reconstructed%203D%20proxy%20but%20also%20enables%20high-quality%20rendering%20in%20different%20lighting%20environments%20using%20diffusion%20generative%20models%20without%20explicitly%20modeling%20complex%20materials%20and%20lighting.%20Extensive%20experiments%20demonstrate%20that%20GO-Renderer%20achieves%20state-of-the-art%20performance%20across%20the%20object%20rendering%20tasks%2C%20including%20synthesizing%20images%20on%20new%20viewpoints%2C%20rendering%20the%20objects%20in%20a%20novel%20lighting%20environment%2C%20and%20inserting%20an%20object%20into%20an%20existing%20video.&entry.1838667208=http%3A//arxiv.org/abs/2603.23246v1&entry.124074799=Read"},
{"title": "MLLM-HWSI: A Multimodal Large Language Model for Hierarchical Whole Slide Image Understanding", "author": "Basit Alawode and Arif Mahmood and Muaz Khalifa Al-Radi and Shahad Albastaki and Asim Khan and Muhammad Bilal and Moshira Ali Abdalla and Mohammed Bennamoun and Sajid Javed", "abstract": "Whole Slide Images (WSIs) exhibit hierarchical structure, where diagnostic information emerges from cellular morphology, regional tissue organization, and global context. Existing Computational Pathology (CPath) Multimodal Large Language Models (MLLMs) typically compress an entire WSI into a single embedding, which hinders fine-grained grounding and ignores how pathologists synthesize evidence across different scales. We introduce \\textbf{MLLM-HWSI}, a Hierarchical WSI-level MLLM that aligns visual features with pathology language at four distinct scales, cell as word, patch as phrase, region as sentence, and WSI as paragraph to support interpretable evidence-grounded reasoning. MLLM-HWSI decomposes each WSI into multi-scale embeddings with scale-specific projectors and jointly enforces (i) a hierarchical contrastive objective and (ii) a cross-scale consistency loss, preserving semantic coherence from cells to the WSI. We compute diagnostically relevant patches and aggregate segmented cell embeddings into a compact cellular token per-patch using a lightweight \\textit{Cell-Cell Attention Fusion (CCAF)} transformer. The projected multi-scale tokens are fused with text tokens and fed to an instruction-tuned LLM for open-ended reasoning, VQA, report, and caption generation tasks. Trained in three stages, MLLM-HWSI achieves new SOTA results on 13 WSI-level benchmarks across six CPath tasks. By aligning language with multi-scale visual evidence, MLLM-HWSI provides accurate, interpretable outputs that mirror diagnostic workflows and advance holistic WSI understanding. Code is available at: \\href{https://github.com/BasitAlawode/HWSI-MLLM}{GitHub}.", "link": "http://arxiv.org/abs/2603.23067v1", "date": "2026-03-24", "relevancy": 2.5666, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5374}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5013}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5013}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MLLM-HWSI%3A%20A%20Multimodal%20Large%20Language%20Model%20for%20Hierarchical%20Whole%20Slide%20Image%20Understanding&body=Title%3A%20MLLM-HWSI%3A%20A%20Multimodal%20Large%20Language%20Model%20for%20Hierarchical%20Whole%20Slide%20Image%20Understanding%0AAuthor%3A%20Basit%20Alawode%20and%20Arif%20Mahmood%20and%20Muaz%20Khalifa%20Al-Radi%20and%20Shahad%20Albastaki%20and%20Asim%20Khan%20and%20Muhammad%20Bilal%20and%20Moshira%20Ali%20Abdalla%20and%20Mohammed%20Bennamoun%20and%20Sajid%20Javed%0AAbstract%3A%20Whole%20Slide%20Images%20%28WSIs%29%20exhibit%20hierarchical%20structure%2C%20where%20diagnostic%20information%20emerges%20from%20cellular%20morphology%2C%20regional%20tissue%20organization%2C%20and%20global%20context.%20Existing%20Computational%20Pathology%20%28CPath%29%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20typically%20compress%20an%20entire%20WSI%20into%20a%20single%20embedding%2C%20which%20hinders%20fine-grained%20grounding%20and%20ignores%20how%20pathologists%20synthesize%20evidence%20across%20different%20scales.%20We%20introduce%20%5Ctextbf%7BMLLM-HWSI%7D%2C%20a%20Hierarchical%20WSI-level%20MLLM%20that%20aligns%20visual%20features%20with%20pathology%20language%20at%20four%20distinct%20scales%2C%20cell%20as%20word%2C%20patch%20as%20phrase%2C%20region%20as%20sentence%2C%20and%20WSI%20as%20paragraph%20to%20support%20interpretable%20evidence-grounded%20reasoning.%20MLLM-HWSI%20decomposes%20each%20WSI%20into%20multi-scale%20embeddings%20with%20scale-specific%20projectors%20and%20jointly%20enforces%20%28i%29%20a%20hierarchical%20contrastive%20objective%20and%20%28ii%29%20a%20cross-scale%20consistency%20loss%2C%20preserving%20semantic%20coherence%20from%20cells%20to%20the%20WSI.%20We%20compute%20diagnostically%20relevant%20patches%20and%20aggregate%20segmented%20cell%20embeddings%20into%20a%20compact%20cellular%20token%20per-patch%20using%20a%20lightweight%20%5Ctextit%7BCell-Cell%20Attention%20Fusion%20%28CCAF%29%7D%20transformer.%20The%20projected%20multi-scale%20tokens%20are%20fused%20with%20text%20tokens%20and%20fed%20to%20an%20instruction-tuned%20LLM%20for%20open-ended%20reasoning%2C%20VQA%2C%20report%2C%20and%20caption%20generation%20tasks.%20Trained%20in%20three%20stages%2C%20MLLM-HWSI%20achieves%20new%20SOTA%20results%20on%2013%20WSI-level%20benchmarks%20across%20six%20CPath%20tasks.%20By%20aligning%20language%20with%20multi-scale%20visual%20evidence%2C%20MLLM-HWSI%20provides%20accurate%2C%20interpretable%20outputs%20that%20mirror%20diagnostic%20workflows%20and%20advance%20holistic%20WSI%20understanding.%20Code%20is%20available%20at%3A%20%5Chref%7Bhttps%3A//github.com/BasitAlawode/HWSI-MLLM%7D%7BGitHub%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23067v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMLLM-HWSI%253A%2520A%2520Multimodal%2520Large%2520Language%2520Model%2520for%2520Hierarchical%2520Whole%2520Slide%2520Image%2520Understanding%26entry.906535625%3DBasit%2520Alawode%2520and%2520Arif%2520Mahmood%2520and%2520Muaz%2520Khalifa%2520Al-Radi%2520and%2520Shahad%2520Albastaki%2520and%2520Asim%2520Khan%2520and%2520Muhammad%2520Bilal%2520and%2520Moshira%2520Ali%2520Abdalla%2520and%2520Mohammed%2520Bennamoun%2520and%2520Sajid%2520Javed%26entry.1292438233%3DWhole%2520Slide%2520Images%2520%2528WSIs%2529%2520exhibit%2 {"title": "TopoMap: A Feature-based Semantic Discriminator of the Topographical Regions in the Test Input Space", "author": "Gianmarco De Vita and Nargiz Humbatova and Paolo Tonella", "abstract": "Testing Deep Learning (DL)-based systems is an open challenge. Although it is relatively easy to find inputs that cause a DL model to misbehave, the grouping of inputs by features that make the DL model under test fail is largely unexplored. Existing approaches for DL testing introduce perturbations that may focus on specific failure-inducing features, while neglecting others that belong to different regions of the feature space. In this paper, we create an explicit topographical map of the input feature space. Our approach, named TopoMap, is both black-box and model-agnostic as it relies solely on features that characterise the input space. To discriminate the inputs according to the specific features they share, we first apply dimensionality reduction to obtain input embeddings, which are then subjected to clustering. Each DL model might require specific embedding computations and clustering algorithms to achieve a meaningful separation of inputs into discriminative groups. We propose a novel way to evaluate alternative configurations of embedding and clustering techniques. We used a deep neural network (DNN) as an approximation of a human evaluator who could tell whether a pair of clusters can be discriminated based on the features of the included elements. We use such a DNN to automatically select the optimal topographical map of the inputs among all those that are produced by different embedding/clustering configurations. The evaluation results show that the maps generated by TopoMap consist of distinguishable and meaningful regions. In addition, we evaluate the effectiveness of TopoMap using mutation analysis. In particular, we assess whether the clusters in our topographical map allow for an effective selection of mutation-killing inputs. Experimental results show that our approach outperforms random selection by 35% on average on killable mutants; by 61% on non-killable ones.", "link": "http://arxiv.org/abs/2509.03242v2", "date": "2026-03-24", "relevancy": 2.5601, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5152}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.515}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5058}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TopoMap%3A%20A%20Feature-based%20Semantic%20Discriminator%20of%20the%20Topographical%20Regions%20in%20the%20Test%20Input%20Space&body=Title%3A%20TopoMap%3A%20A%20Feature-based%20Semantic%20Discriminator%20of%20the%20Topographical%20Regions%20in%20the%20Test%20Input%20Space%0AAuthor%3A%20Gianmarco%20De%20Vita%20and%20Nargiz%20Humbatova%20and%20Paolo%20Tonella%0AAbstract%3A%20Testing%20Deep%20Learning%20%28DL%29-based%20systems%20is%20an%20open%20challenge.%20Although%20it%20is%20relatively%20easy%20to%20find%20inputs%20that%20cause%20a%20DL%20model%20to%20misbehave%2C%20the%20grouping%20of%20inputs%20by%20features%20that%20make%20the%20DL%20model%20under%20test%20fail%20is%20largely%20unexplored.%20Existing%20approaches%20for%20DL%20testing%20introduce%20perturbations%20that%20may%20focus%20on%20specific%20failure-inducing%20features%2C%20while%20neglecting%20others%20that%20belong%20to%20different%20regions%20of%20the%20feature%20space.%20In%20this%20paper%2C%20we%20create%20an%20explicit%20topographical%20map%20of%20the%20input%20feature%20space.%20Our%20approach%2C%20named%20TopoMap%2C%20is%20both%20black-box%20and%20model-agnostic%20as%20it%20relies%20solely%20on%20features%20that%20characterise%20the%20input%20space.%20To%20discriminate%20the%20inputs%20according%20to%20the%20specific%20features%20they%20share%2C%20we%20first%20apply%20dimensionality%20reduction%20to%20obtain%20input%20embeddings%2C%20which%20are%20then%20subjected%20to%20clustering.%20Each%20DL%20model%20might%20require%20specific%20embedding%20computations%20and%20clustering%20algorithms%20to%20achieve%20a%20meaningful%20separation%20of%20inputs%20into%20discriminative%20groups.%20We%20propose%20a%20novel%20way%20to%20evaluate%20alternative%20configurations%20of%20embedding%20and%20clustering%20techniques.%20We%20used%20a%20deep%20neural%20network%20%28DNN%29%20as%20an%20approximation%20of%20a%20human%20evaluator%20who%20could%20tell%20whether%20a%20pair%20of%20clusters%20can%20be%20discriminated%20based%20on%20the%20features%20of%20the%20included%20elements.%20We%20use%20such%20a%20DNN%20to%20automatically%20select%20the%20optimal%20topographical%20map%20of%20the%20inputs%20among%20all%20those%20that%20are%20produced%20by%20different%20embedding/clustering%20configurations.%20The%20evaluation%20results%20show%20that%20the%20maps%20generated%20by%20TopoMap%20consist%20of%20distinguishable%20and%20meaningful%20regions.%20In%20addition%2C%20we%20evaluate%20the%20effectiveness%20of%20TopoMap%20using%20mutation%20analysis.%20In%20particular%2C%20we%20assess%20whether%20the%20clusters%20in%20our%20topographical%20map%20allow%20for%20an%20effective%20selection%20of%20mutation-killing%20inputs.%20Experimental%20results%20show%20that%20our%20approach%20outperforms%20random%20selection%20by%2035%25%20on%20average%20on%20killable%20mutants%3B%20by%2061%25%20on%20non-killable%20ones.%0ALink%3A%20http%3A//arxiv.org/abs/2509.03242v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopoMap%253A%2520A%2520Feature-based%2520Semantic%2520Discriminator%2520of%2520the%2520Topographical%2520Regions%2520in%2520the%2520Test%25 {"title": "Spectral Gaps and Spatial Priors: Studying Hyperspectral Downstream Adaptation Using TerraMind", "author": "Julia Anna Leonardi and Johannes Jakubik and Paolo Fraccaro and Maria Antonia Brovelli", "abstract": "Geospatial Foundation Models (GFMs) typically lack native support for Hyperspectral Imaging (HSI) due to the complexity and sheer size of high-dimensional spectral data. This study investigates the adaptability of TerraMind, a multimodal GFM, to address HSI downstream tasks \\emph{without} HSI-specific pretraining. Therefore, we implement and compare two channel adaptation strategies: Naive Band Selection and physics-aware Spectral Response Function (SRF) grouping. Overall, our results indicate a general superiority of deep learning models with native support of HSI data. Our experiments also demonstrate the ability of TerraMind to adapt to HSI downstream tasks through band selection with moderate performance decline. Therefore, the findings of this research establish a critical baseline for HSI integration, motivating the need for native spectral tokenization in future multimodal model architectures.", "link": "http://arxiv.org/abs/2603.06690v2", "date": "2026-03-24", "relevancy": 2.5599, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5164}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5155}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5042}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Gaps%20and%20Spatial%20Priors%3A%20Studying%20Hyperspectral%20Downstream%20Adaptation%20Using%20TerraMind&body=Title%3A%20Spectral%20Gaps%20and%20Spatial%20Priors%3A%20Studying%20Hyperspectral%20Downstream%20Adaptation%20Using%20TerraMind to%2520the%2520complexity%2520and%2520sheer%2520size%2520of%2520high-dimensional%2520spectral%2520data.%2520This%2520study%2520investigates%2520the%2520adaptability%2520of%2520TerraMind%252C%2520a%2520multimodal%2520GFM%252C%2520to%2520address%2520HSI%2520downstream%2520tasks%2520%255Cemph%257Bwithout%257D%2520HSI-specific%2520pretraining.%2520Therefore%252C%2520we%2520implement%2520and%2520compare%2520two%2520channel%2520adaptation%2520strategies%253A%2520Naive%2520Band%2520Selection%2520and%2520physics-aware%2520Spectral%2520Response%2520Function%2520%2528SRF%2529%2520grouping.%2520Overall%252C%2520our%2520results%2520indicate%2520a%2520general%2520superiority%2520of%2520deep%2520learning%2520models%2520with%2520native%2520support%2520of%2520HSI%2520data.%2520Our%2520experiments%2520also%2520demonstrate%2520the%2520ability%2520of%2520TerraMind%2520to%2520adapt%2520to%2520HSI%2520downstream%2520tasks%2520through%2520band%2520selection%2520with%2520moderate%2520performance%2520decline.%2520Therefore%252C%2520the%2520findings%2520of%2520this%2520research%2520establish%2520a%2520critical%2520baseline%2520for%2520HSI%2520integration%252C%2520motivating%2520the%2520need%2520for%2520native%2520spectral%2520tokenization%2520in%2520future%2520multimodal%2520model%2520architectures.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.06690v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spectral%20Gaps%20and%20Spatial%20Priors%3A%20Studying%20Hyperspectral%20Downstream%20Adaptation%20Using%20TerraMind&entry.906535625=Julia%20Anna%20Leonardi%20and%20Johannes%20Jakubik%20and%20Paolo%20Fraccaro%20and%20Maria%20Antonia%20Brovelli&entry.1292438233=Geospatial%20Foundation%20Models%20%28GFMs%29%20typically%20lack%20native%20support%20for%20Hyperspectral%20Imaging%20%28HSI%29%20due%20to%20the%20complexity%20and%20sheer%20size%20of%20high-dimensional%20spectral%20data.%20This%20 {"title": "3rd Place of MeViS-Audio Track of the 5th PVUW: VIRST-Audio", "author": "Jihwan Hong and Jaeyoung Do", "abstract": "Audio-based Referring Video Object Segmentation (ARVOS) requires grounding audio queries into pixel-level object masks over time, posing challenges in bridging acoustic signals with spatio-temporal visual representations. In this report, we present VIRST-Audio, a practical framework built upon a pretrained RVOS model integrated with a vision-language architecture. Instead of relying on audio-specific training, we convert input audio into text using an ASR module and perform segmentation using text-based supervision, enabling effective transfer from text-based reasoning to audio-driven scenarios. To improve robustness, we further incorporate an existence-aware gating mechanism that estimates whether the referred target object is present in the video and suppresses predictions when it is absent, reducing hallucinated masks and stabilizing segmentation behavior. We evaluate our approach on the MeViS-Audio track of the 5th PVUW Challenge, where VIRST-Audio achieves 3rd place, demonstrating strong generalization and reliable performance in audio-based referring video segmentation.", "link": "http://arxiv.org/abs/2603.23126v1", "date": "2026-03-24", "relevancy": 2.5519, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5199}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5199}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4913}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203rd%20Place%20of%20MeViS-Audio%20Track%20of%20the%205th%20PVUW%3A%20VIRST-Audio&body=Title%3A%203rd%20Place%20of%20MeViS-Audio%20Track%20of%20the%205th%20PVUW%3A%20VIRST-Audio%0AAuthor%3A%20Jihwan%20Hong%20and%20Jaeyoung%20Do%0AAbstract%3A%20Audio-based%20Referring%20Video%20Object%20Segmentation%20%28ARVOS%29%20requires%20grounding%20audio%20queries%20into%20pixel-level%20object%20masks%20over%20time%2C%20posing%20challenges%20in%20bridging%20acoustic%20signals%20with%20spatio-temporal%20visual%20representations.%20In%20this%20report%2C%20we%20present%20VIRST-Audio%2C%20a%20practical%20framework%20built%20upon%20a%20pretrained%20RVOS%20model%20integrated%20with%20a%20vision-language%20architecture.%20Instead%20of%20relying%20on%20audio-specific%20training%2C%20we%20convert%20input%20audio%20into%20text%20using%20an%20ASR%20module%20and%20perform%20segmentation%20using%20text-based%20supervision%2C%20enabling%20effective%20transfer%20from%20text-based%20reasoning%20to%20audio-driven%20scenarios.%20To%20improve%20robustness%2C%20we%20further%20incorporate%20an%20existence-aware%20gating%20mechanism%20that%20estimates%20whether%20the%20referred%20target%20object%20is%20present%20in%20the%20video%20and%20suppresses%20predictions%20when%20it%20is%20absent%2C%20reducing%20hallucinated%20masks%20and%20stabilizing%20segmentation%20behavior.%20We%20evaluate%20our%20approach%20on%20the%20MeViS-Audio%20track%20of%20the%205th%20PVUW%20Challenge%2C%20where%20VIRST-Audio%20achieves%203rd%20place%2C%20demonstrating%20strong%20generalization%20and%20reliable%20performance%20in%20audio-based%20referring%20video%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23126v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3rd%2520Place%2520of%2520MeViS-Audio%2520Track%2520of%2520the%25205th%2520PVUW%253A%2520VIRST-Audio%26entry.906535625%3DJihwan%2520Hong%2520and%2520Jaeyoung%2520Do%26entry.1292438233%3DAudio-based%2520Referring%2520Video%2520Object%2520Segmentation%2520%2528ARVOS%2529%2520requires%2520grounding%2520audio%2520queries%2520into%2 {"title": "FastVMT: Eliminating Redundancy in Video Motion Transfer", "author": "Yue Ma and Zhikai Wang and Tianhao Ren and Mingzhe Zheng and Hongyu Liu and Jiayi Guo and Kunyu Feng and Yuxuan Xue and Zixiang Zhao and Konrad Schindler and Qifeng Chen and Linfeng Zhang", "abstract": "Video motion transfer aims to synthesize videos by generating visual content according to a text prompt while transferring the motion pattern observed in a reference video. Recent methods predominantly use the Diffusion Transformer (DiT) architecture. To achieve satisfactory runtime, several methods attempt to accelerate the computations in the DiT, but fail to address structural sources of inefficiency. In this work, we identify and remove two types of computational redundancy in earlier work: motion redundancy arises because the generic DiT architecture does not reflect the fact that frame-to-frame motion is small and smooth; gradient redundancy occurs if one ignores that gradients change slowly along the diffusion trajectory. To mitigate motion redundancy, we mask the corresponding attention layers to a local neighborhood such that interaction weights are not computed unnecessarily distant image regions. To exploit gradient redundancy, we design an optimization scheme that reuses gradients from previous diffusion steps and skips unwarranted gradient computations. On average, FastVMT achieves a 3.43x speedup without degrading the visual fidelity or the temporal consistency of the generated videos.", "link": "http://arxiv.org/abs/2602.05551v2", "date": "2026-03-24", "relevancy": 2.517, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6682}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6279}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FastVMT%3A%20Eliminating%20Redundancy%20in%20Video%20Motion%20Transfer&body=Title%3A%20FastVMT%3A%20Eliminating%20Redundancy%20in%20Video%20Motion%20Transfer%0AAuthor%3A%20Yue%20Ma%20and%20Zhikai%20Wang%20and%20Tianhao%20Ren%20and%20Mingzhe%20Zheng%20and%20Hongyu%20Liu%20and%20Jiayi%20Guo%20and%20Kunyu%20Feng%20and%20Yuxuan%20Xue%20and%20Zixiang%20Zhao%20and%20Konrad%20Schindler%20and%20Qifeng%20Chen%20and%20Linfeng%20Zhang%0AAbstract%3A%20Video%20motion%20transfer%20aims%20to%20synthesize%20videos%20by%20generating%20visual%20content%20according%20to%20a%20text%20prompt%20while%20transferring%20the%20motion%20pattern%20observed%20in%20a%20reference%20video.%20Recent%20methods%20predominantly%20use%20the%20Diffusion%20Transformer%20%28DiT%29%20architecture.%20To%20achieve%20satisfactory%20runtime%2C%20several%20methods%20attempt%20to%20accelerate%20the%20computations%20in%20the%20DiT%2C%20but%20fail%20to%20address%20structural%20sources%20of%20inefficiency.%20In%20this%20work%2C%20we%20identify%20and%20remove%20two%20types%20of%20computational%20redundancy%20in%20earlier%20work%3A%20motion%20redundancy%20arises%20because%20the%20generic%20DiT%20architecture%20does%20not%20reflect%20the%20fact%20that%20frame-to-frame%20motion%20is%20small%20and%20smooth%3B%20gradient%20redundancy%20occurs%20if%20one%20ignores%20that%20gradients%20change%20slowly%20along%20the%20diffusion%20trajectory.%20To%20mitigate%20motion%20redundancy%2C%20we%20mask%20the%20corresponding%20attention%20layers%20to%20a%20local%20neighborhood%20such%20that%20interaction%20weights%20are%20not%20computed%20unnecessarily%20distant%20image%20regions.%20To%20exploit%20gradient%20redundancy%2C%20we%20design%20an%20optimization%20scheme%20that%20reuses%20gradients%20from%20previous%20diffusion%20steps%20and%20skips%20unwarranted%20gradient%20computations.%20On%20average%2C%20FastVMT%20achieves%20a%203.43x%20speedup%20without%20degrading%20the%20visual%20fidelity%20or%20the%20temporal%20consistency%20of%20the%20generated%20videos.%0ALink%3A%20http%3A//arxiv.org/abs/2602.05551v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFastVMT%253A%2520Eliminating%2520Redundancy%2520in%2520Video%2520Motion%2520Transfer%26entry.906535625%3DYue%2520Ma%2520and%2520Zhikai%2520Wang%2520and%2520Tianhao%2520Ren%2520and%2520Mingzhe%2520Zheng%2520and%2520Hongyu%2520Liu%2520and%2520Jiayi%2520Guo%2520and%2520Kunyu%2520Feng%2520and%2520Yuxuan%2520Xue%2520and%2520Zixiang%2520Zhao%2520and%2520Konrad%2520Schindler%2520and%2520Qifeng%2520Chen%2520and%2520Linfeng%2520Zhang%26entry.1292438233%3DVideo%2520motion%2520transfer%2520aims%2520to%2520synthesize%2520videos%2520by%2520generating%2520visual%2520content%2520according%2520to%2520a%2520text%2520prompt%2520while%2520transferring%2520the%2520motion%2520pattern%2520observed%2520in%2520a%2520reference%2520video.%2520Recent%2520methods%2520predominantly%2520use%2520the%2520Diffusion%2520Transformer%2520%2528DiT%2529%2520architecture.%2520To%2520achieve%2520satisfactory%2520runtime%252C%2520several%2520methods%2520attempt%2520to%2520accelerate%2520the%2520computations%2520in%2520the%2520DiT%252C%2520but%2520fail%2520to%2520address%2520structural%2520sources%2520of%2520inefficiency.%2520In%2520this%2520work%252C%2520we%2520identify%2520and%2520remove%2520two%2520types%2520of%2520computational%2520redundancy%2520in%2520earlier%2520work%253A%2520motion%2520redundancy%2520arises%2520because%2520the%2520generic%2520DiT%2520architecture%2520does%2520not%2520reflect%2520the%2520fact%2520that%2520frame-to-frame%2520motion%2520is%2520small%2520and%2520smooth%253B%2520gradient%2520redundancy%2520occurs%2520if%2520one%2520ignores%2520that%2520gradients%2520change%2520slowly%2520along%2520the%2520diffusion%2520trajectory.%2520To%2520mitigate%252 {"title": "PolarAPP: Beyond Polarization Demosaicking for Polarimetric Applications", "author": "Yidong Luo and Chenggong Li and Yunfeng Song and Ping Wang and Boxin Shi and Junchao Zhang and Xin Yuan", "abstract": "Polarimetric imaging enables advanced vision applications such as normal estimation and de-reflection by capturing unique surface-material interactions. However, existing applications (alternatively called downstream tasks) rely on datasets constructed by naively regrouping raw measurements from division-of-focal-plane sensors, where pixels of the same polarization angle are extracted and aligned into sparse images without proper demosaicking. This reconstruction strategy results in suboptimal, incomplete targets that limit downstream performance. Moreover, current demosaicking methods are task-agnostic, optimizing only for photometric fidelity rather than utility in downstream tasks. Towards this end, we propose PolarAPP, the first framework to jointly optimize demosaicking and its downstream tasks. PolarAPP introduces a feature alignment mechanism that semantically aligns the representations of demosaicking and downstream networks via meta-learning, guiding the reconstruction to be task-aware. It further employs an equivalent imaging constraint for demosaicking training, enabling direct regression to physically meaningful outputs without relying on rearranged data. Finally, a task-refinement stage fine-tunes the task network using the stable demosaicking front-end to further enhance accuracy. Extensive experimental results demonstrate that PolarAPP outperforms existing methods in both demosaicking quality and downstream performance. Code is available upon acceptance.", "link": "http://arxiv.org/abs/2603.23071v1", "date": "2026-03-24", "relevancy": 2.5095, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5069}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5061}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4927}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PolarAPP%3A%20Beyond%20Polarization%20Demosaicking%20for%20Polarimetric%20Applications&body=Title%3A%20PolarAPP%3A%20Beyond%20Polarization%20Demosaicking%20for%20Polarimetric%20Applications%0AAuthor%3A%20Yidong%20Luo%20and%20Chenggong%20Li%20and%20Yunfeng%20Song%20and%20Ping%20Wang%20and%20Boxin%20Shi%20and%20Junchao%20Zhang%20and%20Xin%20Yuan%0AAbstract%3A%20Polarimetric%20imaging%20enables%20advanced%20vision%20applications%20such%20as%20normal%20estimation%20and%20de-reflection%20by%20capturing%20unique%20surface-material%20interactions.%20However%2C%20existing%20applications%20%28alternatively%20called%20downstream%20tasks%29%20rely%20on%20datasets%20constructed%20by%20naively%20regrouping%20raw%20measurements%20from%20division-of-focal-plane%20sensors%2C%20where%20pixels%20of%20the%20same%20polarization%20angle%20are%20extracted%20and%20aligned%20into%20sparse%20images%20without%20proper%20demosaicking.%20This%20reconstruction%20strategy%20results%20in%20suboptimal%2C%20incomplete%20targets%20that%20limit%20downstream%20performance.%20Moreover%2C%20current%20demosaicking%20methods%20are%20task-agnostic%2C%20optimizing%20only%20for%20photometric%20fidelity%20rather%20than%20utility%20in%20downstream%20tasks.%20Towards%20this%20end%2C%20we%20propose%20PolarAPP%2C%20the%20first%20framework%20to%20jointly%20optimize%20demosaicking%20and%20its%20downstream%20tasks.%20PolarAPP%20introduces%20a%20feature%20alignment%20mechanism%20that%20semantically%20aligns%20the%20representations%20of%20demosaicking%20and%20downstream%20networks%20via%20meta-learning%2C%20guiding%20the%20reconstruction%20to%20be%20task-aware.%20It%20further%20employs%20an%20equivalent%20imaging%20constraint%20for%20demosaicking%20training%2C%20enabling%20direct%20regression%20to%20physically%20meaningful%20outputs%20without%20relying%20on%20rearranged%20data.%20Finally%2C%20a%20task-refinement%20stage%20fine-tunes%20the%20task%20network%20using%20the%20stable%20demosaicking%20front-end%20to%20further%20enhance%20accuracy.%20Extensive%20experimental%20results%20demonstrate%20that%20PolarAPP%20outperforms%20existing%20methods%20in%20both%20demosaicking%20quality%20and%20downstream%20performance.%20Code%20is%20available%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23071v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPolarAPP%253A%2520Beyond%2520Polarization%2520Demosaicking%2520for%2520Polarimetric%2520Applications%26entry.906535625%3DYidong%2520Luo%2520and%2520Chenggong%2520Li%2520and%2520Yunfeng%2520Song%2520and%2520Ping%2520Wang%2520and%2520Boxin%2520Shi%2520and%2520Junchao%2520Zhang%2520and%2520Xin%2520Yuan%26entry.1292438233%3DPolarimetric%2520imaging%2520enables%2520advanced%2520vision%2520applications%2520such%2520as%2520normal%2520estimation%2520and%2520de-reflection%2520by%2520capturing%2520unique%2520surface-material%2520interactions.%2520However%252C%2520existing%2520applications%2520%2528alternatively%2520called%2520downstream%2520tasks%2529%2520rely%2520on%2520datasets%2520constructed%2520by%2520naively%2520regrouping%2520raw%2520measurements%2520from%2520division-of-focal-plane%2520sensors%252C%2520where%2520pixels%2520of%2520the%2520same%2520polarization%2520angle%2520are%2520extracted%2520and%2520aligned%2520into%2520sparse%2520images%2520without%2520proper%2520demosaicking.%2520This%2520reconstruction%2520strategy%2520results%2520in%2520suboptimal%252C%2520incomplete%2520targets%2520that%2520limit%2520downstream%2520performance.%2520Moreover%252C%2520current%2520demosaicki {"title": "UniFunc3D: Unified Active Spatial-Temporal Grounding for 3D Functionality Segmentation", "author": "Jiaying Lin and Dan Xu", "abstract": "Functionality segmentation in 3D scenes requires an agent to ground implicit natural-language instructions into precise masks of fine-grained interactive elements. Existing methods rely on fragmented pipelines that suffer from visual blindness during initial task parsing. We observe that these methods are limited by single-scale, passive and heuristic frame selection. We present UniFunc3D, a unified and training-free framework that treats the multimodal large language model as an active observer. By consolidating semantic, temporal, and spatial reasoning into a single forward pass, UniFunc3D performs joint reasoning to ground task decomposition in direct visual evidence. Our approach introduces active spatial-temporal grounding with a coarse-to-fine strategy. This allows the model to select correct video frames adaptively and focus on high-detail interactive parts while preserving the global context necessary for disambiguation. On SceneFun3D, UniFunc3D achieves state-of-the-art performance, surpassing both training-free and training-based methods by a large margin with a relative 59.9\\% mIoU improvement, without any task-specific training. Code will be released on our project page: https://jiaying.link/unifunc3d.", "link": "http://arxiv.org/abs/2603.23478v1", "date": "2026-03-24", "relevancy": 2.5093, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6462}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6236}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6236}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniFunc3D%3A%20Unified%20Active%20Spatial-Temporal%20Grounding%20for%203D%20Functionality%20Segmentation&body=Title%3A%20UniFunc3D%3A%20Unified%20Active%20Spatial-Temporal%20Grounding%20for%203D%20Functionality%20Segmentation%0AAuthor%3A%20Jiaying%20Lin%20and%20Dan%20Xu%0AAbstract%3A%20Functionality%20segmentation%20in%203D%20scenes%20requires%20an%20agent%20to%20ground%20implicit%20natural-language%20instructions%20into%20precise%20masks%20of%20fine-grained%20interactive%20elements.%20Existing%20methods%20rely%20on%20fragmented%20pipelines%20that%20suffer%20from%20visual%20blindness%20during%20initial%20task%20parsing.%20We%20observe%20that%20these%20methods%20are%20limited%20by%20single-scale%2C%20passive%20and%20heuristic%20frame%20selection.%20We%20present%20UniFunc3D%2C%20a%20unified%20and%20training-free%20framework%20that%20treats%20the%20multimodal%20large%20language%20model%20as%20an%20active%20observer.%20By%20consolidating%20semantic%2C%20temporal%2C%20and%20spatial%20reasoning%20into%20a%20single%20forward%20pass%2C%20UniFunc3D%20performs%20joint%20reasoning%20to%20ground%20task%20decomposition%20in%20direct%20visual%20evidence.%20Our%20approach%20introduces%20active%20spatial-temporal%20grounding%20with%20a%20coarse-to-fine%20strategy.%20This%20allows%20the%20model%20to%20select%20correct%20video%20frames%20adaptively%20and%20focus%20on%20high-detail%20interactive%20parts%20while%20preserving%20the%20global%20context%20necessary%20for%20disambiguation.%20On%20SceneFun3D%2C%20UniFunc3D%20achieves%20state-of-the-art%20performance%2C%20surpassing%20both%20training-free%20and%20training-based%20methods%20by%20a%20large%20margin%20with%20a%20relative%2059.9%5C%25%20mIoU%20improvement%2C%20without%20any%20task-specific%20training.%20Code%20will%20be%20released%20on%20our%20project%20page%3A%20https%3A//jiaying.link/unifunc3d.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23478v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQL {"title": "RedTopic: Toward Topic-Diverse Red Teaming of Large Language Models", "author": "Jiale Ding and Xiang Zheng and Yutao Wu and Cong Wang and Wei-Bin Lee and Ling Pan and Xingjun Ma and Yu-Gang Jiang", "abstract": "As large language models (LLMs) are increasingly deployed as black-box components in real-world applications, red teaming has become essential for identifying potential risks. It tests LLMs with adversarial prompts to uncover vulnerabilities and improve safety alignment. Ideally, effective red teaming should be adaptive to evolving LLM capabilities and explore a broad range of harmful topics. However, existing approaches face two limitations: 1) topic-based approaches rely on pre-collected harmful topics, limited in flexibility and adaptivity. 2) topic-free methods use reinforcement learning (RL), but they lack an explicit reward signal for exploration and tend to over-optimize a narrow objective, reducing topic diversity. To address these limitations, we propose RedTopic, a novel red teaming framework that generates topic-diverse adversarial prompts through a contextualized generation pipeline, an aggregate reward design, and a multi-objective RL training loop. Experiments show that RedTopic produces more effective and diverse adversarial prompts than existing methods, with notable improvements in integrated evaluation metrics. We believe RedTopic represents a step toward more adaptive and topic-diverse red teaming for large language models.", "link": "http://arxiv.org/abs/2507.00026v2", "date": "2026-03-24", "relevancy": 2.4974, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5031}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5031}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "ht {"title": "Central Dogma Transformer III: Interpretable AI Across DNA, RNA, and Protein", "author": "Nobuyuki Ota", "abstract": "Biological AI models increasingly predict complex cellular responses, yet their learned representations remain disconnected from the molecular processes they aim to capture. We present CDT-III, which extends mechanism-oriented AI across the full central dogma: DNA, RNA, and protein. Its two-stage Virtual Cell Embedder architecture mirrors the spatial compartmentalization of the cell: VCE-N models transcription in the nucleus and VCE-C models translation in the cytosol. On five held-out genes, CDT-III achieves per-gene RNA r=0.843 and protein r=0.969. Adding protein prediction improves RNA performance (r=0.804 to 0.843), demonstrating that downstream tasks regularize upstream representations. Protein supervision sharpens DNA-level interpretability, increasing CTCF enrichment by 30%. Applied to in silico CD52 knockdown approximating Alemtuzumab, the model predicts 29/29 protein changes correctly and rediscovers 5 of 7 known clinical side effects without clinical data. Gradient-based side effect profiling requires only unperturbed baseline data (r=0.939), enabling screening of all 2,361 genes without new experiments.", "link": "http://arxiv.org/abs/2603.23361v1", "date": "2026-03-24", "relevancy": 2.4953, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.507}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.507}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4832}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Central%20Dogma%20Transformer%20III%3A%20Interpretable%20AI%20Across%20DNA%2C%20RNA%2C%20and%20Protein&body=Title%3A%20Central%20Dogma%20Transformer%20III%3A%20Interpretable%20AI%20Across%20DNA%2C%20RNA%2C%20and%20Protein%0AAuthor%3A%20Nobuyuki%20Ota%0AAbstract%3A%20Biological%20AI%20models%20increasingly%20predict%20complex%20cellular%20responses%2C%20yet%20their%20learned%20representations%20remain%20disconnected%20from%20the%20molecular%20processes%20they%20aim%20to%20capture.%20We%20present%20CDT-III%2C%20which%20extends%20mechanism-oriented%20AI%20across%20the%20full%20central%20dogma%3A%20DNA%2C%20RNA%2C%20and%20protein.%20Its%20two-stage%20Virtual%20Cell%20Embedder%20architecture%20mirrors%20the%20spatial%20compartmentalization%20of%20the%20cell%3A%20VCE-N%20models%20transcription%20in%20the%20nucleus%20and%20VCE-C%20models%20translation%20in%20the%20cytosol.%20On%20five%20held-out%20genes%2C%20CDT-III%20achieves%20per-gene%20RNA%20r%3D0.843%20and%20protein%20r%3D0.969.%20Adding%20protein%20prediction%20improves%20RNA%20performance%20%28r%3D0.804%20to%200.843%29%2C%20demonstrating%20that%20downstream%20tasks%20regularize%20upstream%20representations.%20Protein%20supervision%20sharpens%20DNA-level%20interpretability%2C%20increasing%20CTCF%20enrichment%20by%2030%25.%20Applied%20to%20in%20silico%20CD52%20knockdown%20approximating%20Alemtuzumab%2C%20the%20model%20predicts%2029/29%20protein%20changes%20correctly%20and%20rediscovers%205%20of%207%20known%20clinical%20side%20effects%20without%20clinical%20data.%20Gradient-based%20side%20effect%20profiling%20requires%20only%20unperturbed%20baseline%20data%20%28r%3D0.939%29%2C%20enabling%20screening%20of%20all%202%2C361%20genes%20without%20new%20experiments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23361v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCentral%2520Dogma%2520Transformer%2520III%253A%2520Interpretable%2520AI%2520Across%2520DNA%252C%2520RNA%252C%2520and%2520Protein%26entry.906535625%3DNobuyuki%2520Ota%26entry.1292438233%3 entry.1380929848=Central%20Dogma%20Transformer%20III%3A%20Interpretable%20AI%20Across%20DNA%2C%20RNA%2C%20and%20Protein&entry.906535625=Nobuyuki%20Ota&entry.1292438233=Biological%20AI%20models%20increasingly%20predict%20complex%20cellular%20responses%2C%20yet%20their%20learned%20representations%20remain%20disconnected%20from%20the%20molecular%20processes%20they%20aim%20to%20capture.%20We%20present%20CDT-III%2C%20which%20extends%20mechanism-oriented%20AI%20across%20the%20full%20central%20dogma%3A%20DNA%2C%20RNA%2C%20and%20protein.%20Its%20two-stage%20Virtual%20Cell%20Embedder%20architecture%20mirrors%20the%20spatial%20compartmentalization%20of%20the%20cell%3A%20VCE-N%20models%20transcription%20in%20the%20nucleus%20and%20VCE-C%20models%20translation%20in%20the%20cytosol.%20On%20five%20held-out%20genes%2C%20CDT-III%20achieves%20per-gene%20RNA%20r%3D0.843%20and%20protein%20r%3D0.969.%20Adding%20protein%20prediction%20improves%20RNA%20performance%20%28r%3D0.804%20to%200.843%29%2C%20demonstrating%20that%20downstream%20tasks%20regularize%20upstream%20representations.%20Protein%20supervision%20sharpens%20DNA-level%20interpretability%2C%20increasing%20CTCF%20enrichment%20by%2030%25.%20Applied%20to%20in%20silico%20CD52%20knockdown%20approximating%20Alemtuzumab%2C%20the%20model%20predicts%2029/29%20protein%20changes%20correctly%20and%20rediscovers%205%20of%207%20known%20clinical%20side%20effects%20without%20clinical%20data.%20Gradient-based%20side%20effect%20profiling%20requires%20only%20unperturbed%20baseline%20data%20%28r%3D0.939%29%2C%20enabling%20screening%20of%20all%202%2C361%20genes%20without%20new%20experiments.&entry.1838667208=http%3A//arxiv.org/abs/2603.23361v1&entry.124074799=Read"},
{"title": "MoEGCL: Mixture of Ego-Graphs Contrastive Representation Learning for Multi-View Clustering", "author": "Jian Zhu and Xin Zou and Jun Sun and Cheng Luo and Lei Liu and Lingfang Zeng and Ning Zhang and Bian Wu and Chang Tang and Lirong Dai", "abstract": "In recent years, the advancement of Graph Neural Networks (GNNs) has significantly propelled progress in Multi-View Clustering (MVC). However, existing methods face the problem of coarse-grained graph fusion. Specifically, current approaches typically generate a separate graph structure for each view and then perform weighted fusion of graph structures at the view level, which is a relatively rough strategy. To address this limitation, we present a novel Mixture of Ego-Graphs Contrastive Representation Learning (MoEGCL). It mainly consists of two modules. In particular, we propose an innovative Mixture of Ego-Graphs Fusion (MoEGF), which constructs ego graphs and utilizes a Mixture-of-Experts network to implement fine-grained fusion of ego graphs at the sample level, rather than the conventional view-level fusion. Additionally, we present the Ego Graph Contrastive Learning (EGCL) module to align the fused representation with the view-specific representation. The EGCL module enhances the representation similarity of samples from the same cluster, not merely from the same sample, further boosting fine-grained graph representation. Extensive experiments demonstrate that MoEGCL achieves state-of-the-art results in deep multi-view clustering tasks. The source code is publicly available at https://github.com/HackerHyper/MoEGCL.", "link": "http://arxiv.org/abs/2511.05876v5", "date": "2026-03-24", "relevancy": 2.4934, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5163}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4905}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4893}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MoEGCL%3A%20Mixture%20of%20Ego-Graphs%20Contrastive%20Representation%20Learning%20for%20Multi-View%20Clustering&body=Title%3A%20MoEGCL%3A%20Mixture%20of%20Ego-Graphs%20Contrastive%20Representation%20Learning%20for%20Multi-View%20Clustering%0AAuthor%3A%20Jian%20Zhu%20and%20Xin%20Zou%20and%20Jun%20Sun%20and%20Cheng%20Luo%20and%20Lei%20Liu%20and%20Lingfang%20Zeng%20and%20Ning%20Zhang%20and%20Bian%20Wu%20and%20Chang%20Tang%20and%20Lirong%20Dai%0AAbstract%3A%20In%20recent%20years%2C%20the%20advancement%20of%20Graph%20Neural%20Networks%20%28GNNs%29%20has%20significantly%20propelled%20progress%20in%20Multi-View%20Clustering%20%28MVC%29.%20However%2C%20existing%20methods%20face%20the%20problem%20of%20coarse-grained%20graph%20fusion.%20Specifically%2C%20current%20approaches%20typically%20generate%20a%20separate%20graph%20structure%20for%20each%20view%20and%20then%20perform%20weighted%20fusion%20of%20graph%20structures%20at%20the%20view%20level%2C%20which%20is%20a%20relatively%20rough%20strategy.%20To%20address%20this%20limitation%2C%20we%20present%20a%20novel%20Mixture%20of%20Ego-Graphs%20Contrastive%20Representation%20Learning%20%28MoEGCL%29.%20It%20mainly%20consists%20of%20two%20modules.%20In%20particular%2C%20we%20propose%20an%20innovative%20Mixture%20of%20Ego-Graphs%20Fusion%20%28MoEGF%29%2C%20which%20constructs%20ego%20graphs%20and%20utilizes%20a%20Mixture-of-Experts%20network%20to%20implement%20fine-grained%20fusion%20of%20ego%20graphs%20at%20the%20sample%20level%2C%20rather%20than%20the%20conventional%20view-level%20fusion.%20Additionally%2C%20we%20present%20the%20Ego%20Graph%20Contrastive%20Learning%20%28EGCL%29%20module%20to%20align%20the%20fused%20representation%20with%20the%20view-specific%20representation.%20The%20EGCL%20module%20enhances%20the%20representation%20similarity%20of%20samples%20from%20the%20same%20cluster%2C%20not%20merely%20from%20the%20same%20sample%2C%20further%20boosting%20fine-grained%20graph%20representation.%20Extensive%20experiments%20demonstrate%20that%20MoEGCL%20achieves%20state-of-the-art%20results%20in%20deep%20multi-view%20clustering%20tasks.%20The%20source%20code%20is%20publicly%20available%20at%20https%3A//github.com/HackerHyper/MoEGCL.%0ALink%3A%20http%3A//arxiv.org/abs/2511.05876v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMoEGCL%253A%2520Mixture%2520of%2520Ego-Graphs%2520Contrastive%2520Representation%2520Learning%2520for%2520Multi-View%2520Clustering%26entry.906535625%3DJian%2520Zhu%2520and%2520Xin%2520Zou%2520and%2520Jun%2520Sun%2520and%2520Cheng%2520Luo%2520and%2520Lei%2520Liu%2520and%2520Lingfang%2520Zeng%2520and%2520Ning%2520Zhang%2520and%2520Bian%2520Wu%2520and%2520Chang%2520Tang%2520and%2520Lirong%2520Dai%26entry.1292438233%3DIn%2520recent%2520years%252C%2520the%2520advancement%2520of%2520Graph%2520Neural%2520Networks%2520%2528GNNs%2529%2520has%2520significantly%2520propelled%2520progress%2520in%2520Multi-View%2520Clustering%2520%2528MVC%2529.%2520However%252C%2520existing%2520methods%2520face%2520the%2520problem%2520of%2520coarse-grained%2520graph%2520fusion.%2520Specifically%252C%2520current%2520approaches%2520typically%2520generate%2520a%2520separate%2520graph%2520structure%2520for%2520each%2520view%2520and%2520then%2520perform%2520weighted%2520fusion%2520of%2520graph%2520structures%2520at%2520the%2520view%2520level%252C%2520which%2520is%2520a%2520relatively%2520rough%2520strategy.%2520To%2520address%2520this%2520limitation%252C%2520we%2520present%2520a%2520novel%2520Mixture%2520of%2520Ego-Graphs%2520Contrastive%2520Representation%2520Learning%2520%2528MoEGCL%2529.%2520It%2520mainly%2520consists%2520of%2520two%2520modules.%2520In%2520particular%252C%2520we%2520propose%2520an%2520innovative%2520Mixture%2520of%2520Ego-Graphs%25 {"title": "SIGMA: A Physics-Based Benchmark for Gas Chimney Understanding in Seismic Images", "author": "Bao Truong and Quang Nguyen and Baoru Huang and Jinpei Han and Van Nguyen and Ngan Le and Minh-Tan Pham and Doan Huy Hien and Anh Nguyen", "abstract": "Seismic images reconstruct subsurface reflectivity from field recordings, guiding exploration and reservoir monitoring. Gas chimneys are vertical anomalies caused by subsurface fluid migration. Understanding these phenomena is crucial for assessing hydrocarbon potential and avoiding drilling hazards. However, accurate detection is challenging due to strong seismic attenuation and scattering. Traditional physics-based methods are computationally expensive and sensitive to model errors, while deep learning offers efficient alternatives, yet lacks labeled datasets. In this work, we introduce \\textbf{SIGMA}, a new physics-based dataset for gas chimney understanding in seismic images, featuring (i) pixel-level gas-chimney mask for detection and (ii) paired degraded and ground-truth image for enhancement. We employed physics-based methods that cover a wide range of geological settings and data acquisition conditions. Comprehensive experiments demonstrate that SIGMA serves as a challenging benchmark for gas chimney interpretation and benefits general seismic understanding.", "link": "http://arxiv.org/abs/2603.23439v1", "date": "2026-03-24", "relevancy": 2.4822, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5302}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4895}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4696}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SIGMA%3A%20A%20Physics-Based%20Benchmark%20for%20Gas%20Chimney%20Understanding%20in%20Seismic%20Images&body=Title%3A%20SIGMA%3A%20A%20Physics-Based%20Benchmark%20for%20Gas%20Chimney%20Understanding%20in%20Seismic%20Images%0AAuthor%3A%20Bao%20Truong%20and%20Quang%20Nguyen%20and%20Baoru%20Huang%20and%20Jinpei%20Han%20and%20Van%20Nguyen%20and%20Ngan%20Le%20and%20Minh-Tan%20Pham%20and%20Doan%20Huy%20Hien%20and%20Anh%20Nguyen%0AAbstract%3A%20Seismic%20images%20reconstruct%20subsurface%20reflectivity%20from%20field%20recordings%2C%20guiding%20exploration%20and%20reservoir%20monitoring.%20Gas%20chimneys%20are%20vertical%20anomalies%20caused%20by%20subsurface%20fluid%20migration.%20Understanding%20these%20phenomena%20is%20crucial%20for%20assessing%20hydrocarbon%20potential%20and%20avoiding%20drilling%20hazards.%20However%2C%20accurate%20detection%20is%20challenging%20due%20to%20strong%20seismic%20attenuation%20and%20scattering.%20Traditional%20physics-based%20methods%20are%20computationally%20expensive%20and%20sensitive%20to%20model%20errors%2C%20while%20deep%20learning%20offers%20efficient%20alternatives%2C%20yet%20lacks%20labeled%20datasets.%20In%20this%20work%2C%20we%20introduce%20%5Ctextbf%7BSIGMA%7D%2C%20a%20new%20physics-based%20dataset%20for%20gas%20chimney%20understanding%20in%20seismic%20images%2C%20featuring%20%28i%29%20pixel-level%20gas-chimney%20mask%20for%20detection%20and%20%28ii%29%20paired%20degraded%20and%20ground-truth%20image%20for%20enhancement.%20We%20employed%20physics-based%20methods%20that%20cover%20a%20wide%20range%20of%20geological%20settings%20and%20data%20acquisition%20conditions.%20Comprehensive%20experiments%20demonstrate%20that%20SIGMA%20serves%20as%20a%20challenging%20benchmark%20for%20gas%20chimney%20interpretation%20and%20benefits%20general%20seismic%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23439v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIGMA%253A% interpretation%2520and%2520benefits%2520general%2520seismic%2520understanding.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23439v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SIGMA%3A%20A%20Physics-Based%20Benchmark%20for%20Gas%20Chimney%20Understanding%20in%20Seismic%20Images&entry.906535625=Bao%20Truong%20and%20Quang%20Nguyen%20and%20Baoru%20Huang%20and%20Jinpei%20Han%20and%20Van%20Nguyen%20and%20Ngan%20Le%20and%20Minh-Tan%20Pham%20and%20Doan%20Huy%20Hien%20and%20Anh%20Nguyen&entry.1292438233=Seismic%20images%20reconstruct%20subsurface%20reflectivity%20from%20field%20recordings%2C%20guiding%20exploration%20and%20reservoir%20monitoring.%20Gas%20chimneys%20are%20vertical%20anomalies%20caused%20by%20subsurface%20fluid%20migration.%20Understanding%20these%20phenomena%20is%20crucial%20for%20assessing%20hydrocarbon%20potential%20and%20avoiding%20drilling%20hazards.%20However%2C%20accurate%20detection%20is%20challenging%20due%20to%20strong%20seismic%20attenuation%20and%20scattering.%20Traditional%20physics-based%20methods%20are%20computationally%20expensive%20and%20sensitive%20to%20model%20errors%2C%20while%20deep%20learning%20offers%20efficient%20alternatives%2C%20yet%20lacks%20labeled%20datasets.%20In%20this%20work%2C%20we%20introduce%20%5Ctextbf%7BSIGMA%7D%2C%20a%20new%20physics-based%20dataset%20for%20gas%20chimney%20understanding%20in%20seismic%20images%2C%20featuring%20%28i%29%20pixel-level%20gas-chimney%20mask%20for%20detection%20and%20%28ii%29%20paired%20degraded%20and%20ground-truth%20image%20for%20enhancement.%20We%20employed%20physics-based%20methods%20that%20cover%20a%20wide%20range%20of%20geological%20settings%20and%20data%20acquisition%20conditions.%20Comprehensive%20experiments%20demonstrate%20that%20SIGMA%20serves%20as%20a%20challenging%20benchmark%20for%20gas%20chimney%20interpretation%20and%20benefits%20general%20seismic%20understanding.&e

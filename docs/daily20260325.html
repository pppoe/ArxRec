{"title": "GSwap: Realistic Head Swapping with Dynamic Neural Gaussian Field", "author": "Jingtao Zhou and Xuan Gao and Dongyu Liu and Junhui Hou and Yudong Guo and Juyong Zhang", "abstract": "We present GSwap, a novel consistent and realistic video head-swapping system empowered by dynamic neural Gaussian portrait priors, which significantly advances the state of the art in face and head replacement. Unlike previous methods that rely primarily on 2D generative models or 3D Morphable Face Models (3DMM), our approach overcomes their inherent limitations, including poor 3D consistency, unnatural facial expressions, and restricted synthesis quality. Moreover, existing techniques struggle with full head-swapping tasks due to insufficient holistic head modeling and ineffective background blending, often resulting in visible artifacts and misalignments. To address these challenges, GSwap introduces an intrinsic 3D Gaussian feature field embedded within a full-body SMPL-X surface, effectively elevating 2D portrait videos into a dynamic neural Gaussian field. This innovation ensures high-fidelity, 3D-consistent portrait rendering while preserving natural head-torso relationships and seamless motion dynamics. To facilitate training, we adapt a pretrained 2D portrait generative model to the source head domain using only a few reference images, enabling efficient domain adaptation. Furthermore, we propose a neural re-rendering strategy that harmoniously integrates the synthesized foreground with the original background, eliminating blending artifacts and enhancing realism. Extensive experiments demonstrate that GSwap surpasses existing methods in multiple aspects, including visual quality, temporal coherence, identity preservation, and 3D consistency.", "link": "http://arxiv.org/abs/2603.23168v1", "date": "2026-03-24", "relevancy": 3.3441, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6915}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6915}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6235}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GSwap%3A%20Realistic%20Head%20Swapping%20with%20Dynamic%20Neural%20Gaussian%20Field&body=Title%3A%20GSwap%3A%20Realistic%20Head%20Swapping%20with%20Dynamic%20Neural%20Gaussian%20Field%0AAuthor%3A%20Jingtao%20Zhou%20and%20Xuan%20Gao%20and%20Dongyu%20Liu%20and%20Junhui%20Hou%20and%20Yudong%20Guo%20and%20Juyong%20Zhang%0AAbstract%3A%20We%20present%20GSwap%2C%20a%20novel%20consistent%20and%20realistic%20video%20head-swapping%20system%20empowered%20by%20dynamic%20neural%20Gaussian%20portrait%20priors%2C%20which%20significantly%20advances%20the%20state%20of%20the%20art%20in%20face%20and%20head%20replacement.%20Unlike%20previous%20methods%20that%20rely%20primarily%20on%202D%20generative%20models%20or%203D%20Morphable%20Face%20Models%20%283DMM%29%2C%20our%20approach%20overcomes%20their%20inherent%20limitations%2C%20including%20poor%203D%20consistency%2C%20unnatural%20facial%20expressions%2C%20and%20restricted%20synthesis%20quality.%20Moreover%2C%20existing%20techniques%20struggle%20with%20full%20head-swapping%20tasks%20due%20to%20insufficient%20holistic%20head%20modeling%20and%20ineffective%20background%20blending%2C%20often%20resulting%20in%20visible%20artifacts%20and%20misalignments.%20To%20address%20these%20challenges%2C%20GSwap%20introduces%20an%20intrinsic%203D%20Gaussian%20feature%20field%20embedded%20within%20a%20full-body%20SMPL-X%20surface%2C%20effectively%20elevating%202D%20portrait%20videos%20into%20a%20dynamic%20neural%20Gaussian%20field.%20This%20innovation%20ensures%20high-fidelity%2C%203D-consistent%20portrait%20rendering%20while%20preserving%20natural%20head-torso%20relationships%20and%20seamless%20motion%20dynamics.%20To%20facilitate%20training%2C%20we%20adapt%20a%20pretrained%202D%20portrait%20generative%20model%20to%20the%20source%20head%20domain%20using%20only%20a%20few%20reference%20images%2C%20enabling%20efficient%20domain%20adaptation.%20Furthermore%2C%20we%20propose%20a%20neural%20re-rendering%20strategy%20that%20harmoniously%20integrates%20the%20synthesized%20foreground%20with%20the%20original%20background%2C%20eliminating%20blending%20artifacts%20and%20enhancing%20realism.%20Extensive%20experiments%20demonstrate%20that%20GSwap%20surpasses%20existing%20methods%20in%20multiple%20aspects%2C%20including%20visual%20quality%2C%20temporal%20coherence%2C%20identity%20preservation%2C%20and%203D%20consistency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23168v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGSwap%253A%2520Realistic%2520Head%2520Swapping%2520with%2520Dynamic%2520Neural%2520Gaussian%2520Field%26entry.906535625%3DJingtao%2520Zhou%2520and%2520Xuan%2520Gao%2520and%2520Dongyu%2520Liu%2520and%2520Junhui%2520Hou%2520and%2520Yudong%2520Guo%2520and%2520Juyong%2520Zhang%26entry.1292438233%3DWe%2520present%2520GSwap%252C%2520a%2520novel%2520consistent%2520and%2520realistic%2520video%2520head-swapping%2520system%2520empowered%2520by%2520dynamic%2520neural%2520Gaussian%2520portrait%2520priors%252C%2520which%2520significantly%2520advances%2520the%2520state%2520of%2520the%2520art%2520in%2520face%2520and%2520head%2520replacement.%2520Unlike%2520previous%2520methods%2520that%2520rely%2520primarily%2520on%25202D%2520generative%2520models%2520or%25203D%2520Morphable%2520Face%2520Models%2520%25283DMM%2529%252C%2520our%2520approach%2520overcomes%2520their%2520inherent%2520limitations%252C%2520including%2520poor%25203D%2520consistency%252C%2520unnatural%2520facial%2520expressions%252C%2520and%2520restricted%2520synthesis%2520quality.%2520Moreover%252C%2520existing%2520techniques%2 %20Zhou%20and%20Xuan%20Gao%20and%20Dongyu%20Liu%20and%20Junhui%20Hou%20and%20Yudong%20Guo%20and%20Juyong%20Zhang&entry.1292438233=We%20present%20GSwap%2C%20a%20novel%20consistent%20and%20realistic%20video%20head-swapping%20system%20empowered%20by%20dynamic%20neural%20Gaussian%20portrait%20priors%2C%20which%20significantly%20advances%20the%20state%20of%20the%20art%20in%20face%20and%20head%20replacement.%20Unlike%20previous%20methods%20that%20rely%20primarily%20on%202D%20generative%20models%20or%203D%20Morphable%20Face%20Models%20%283DMM%29%2C%20our%20approach%20overcomes%20their%20inherent%20limitations%2C%20including%20poor%203D%20consistency%2C%20unnatural%20facial%20expressions%2C%20and%20restricted%20synthesis%20quality.%20Moreover%2C%20existing%20techniques%20struggle%20with%20full%20head-swapping%20tasks%20due%20to%20insufficient%20holistic%20head%20modeling%20and%20ineffective%20background%20blending%2C%20often%20resulting%20in%20visible%20artifacts%20and%20misalignments.%20To%20address%20these%20challenges%2C%20GSwap%20introduces%20an%20intrinsic%203D%20Gaussian%20feature%20field%20embedded%20within%20a%20full-body%20SMPL-X%20surface%2C%20effectively%20elevating%202D%20portrait%20videos%20into%20a%20dynamic%20neural%20Gaussian%20field.%20This%20innovation%20ensures%20high-fidelity%2C%203D-consistent%20portrait%20rendering%20while%20preserving%20natural%20head-torso%20relationships%20and%20seamless%20motion%20dynamics.%20To%20facilitate%20training%2C%20we%20adapt%20a%20pretrained%202D%20portrait%20generative%20model%20to%20the%20source%20head%20domain%20using%20only%20a%20few%20reference%20images%2C%20enabling%20efficient%20domain%20adaptation.%20Furthermore%2C%20we%20propose%20a%20neural%20re-rendering%20strategy%20that%20harmoniously%20integrates%20the%20synthesized%20foreground%20with%20the%20original%20background%2C%20eliminating%20blending%20artifacts%20and%20enhancing%20realism.%20Extensive%20experiments%20demonstrate%20that%20GSwap%20surpasses%20existin {"title": "Foveated Diffusion: Efficient Spatially Adaptive Image and Video Generation", "author": "Brian Chao and Lior Yariv and Howard Xiao and Gordon Wetzstein", "abstract": "Diffusion and flow matching models have unlocked unprecedented capabilities for creative content creation, such as interactive image and streaming video generation. The growing demand for higher resolutions, frame rates, and context lengths, however, makes efficient generation increasingly challenging, as computational complexity grows quadratically with the number of generated tokens. Our work seeks to optimize the efficiency of the generation process in settings where the user's gaze location is known or can be estimated, for example, by using eye tracking. In these settings, we leverage the eccentricity-dependent acuity of human vision: while a user perceives very high-resolution visual information in a small region around their gaze location (the foveal region), the ability to resolve detail quickly degrades in the periphery of the visual field. Our approach starts with a mask modeling the foveated resolution to allocate tokens non-uniformly, assigning higher token density to foveal regions and lower density to peripheral regions. An image or video is generated in a mixed-resolution token setting, yielding results perceptually indistinguishable from full-resolution generation, while drastically reducing the token count and generation time. To this end, we develop a principled mechanism for constructing mixed-resolution tokens directly from high-resolution data, allowing a foveated diffusion model to be post-trained from an existing base model while maintaining content consistency across resolutions. We validate our approach through extensive analysis and a carefully designed user study, demonstrating the efficacy of foveation as a practical and scalable axis for efficient generation.", "link": "http://arxiv.org/abs/2603.23491v1", "date": "2026-03-24", "relevancy": 3.309, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.675}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6596}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Foveated%20Diffusion%3A%20Efficient%20Spatially%20Adaptive%20Image%20and%20Video%20Generation&body=Title%3A%20Foveated%20Diffusion%3A%20Efficient%20Spatially%20Adaptive%20Image%20and%20Video%20Generation%0AAuthor%3A%20Brian%20Chao%20and%20Lior%20Yariv%20and%20Howard%20Xiao%20and%20Gordon%20Wetzstein%0AAbstract%3A%20Diffusion%20and%20flow%20matching%20models%20have%20unlocked%20unprecedented%20capabilities%20for%20creative%20content%20creation%2C%20such%20as%20interactive%20image%20and%20streaming%20video%20generation.%20The%20growing%20demand%20for%20higher%20resolutions%2C%20frame%20rates%2C%20and%20context%20lengths%2C%20however%2C%20makes%20efficient%20generation%20increasingly%20challenging%2C%20as%20computational%20complexity%20grows%20quadratically%20with%20the%20number%20of%20generated%20tokens.%20Our%20work%20seeks%20to%20optimize%20the%20efficiency%20of%20the%20generation%20process%20in%20settings%20where%20the%20user%27s%20gaze%20location%20is%20known%20or%20can%20be%20estimated%2C%20for%20example%2C%20by%20using%20eye%20tracking.%20In%20these%20settings%2C%20we%20leverage%20the%20eccentricity-dependent%20acuity%20of%20human%20vision%3A%20while%20a%20user%20perceives%20very%20high-resolution%20visual%20information%20in%20a%20small%20region%20around%20their%20gaze%20location%20%28the%20foveal%20region%29%2C%20the%20ability%20to%20resolve%20detail%20quickly%20degrades%20in%20the%20periphery%20of%20the%20visual%20field.%20Our%20approach%20starts%20with%20a%20mask%20modeling%20the%20foveated%20resolution%20to%20allocate%20tokens%20non-uniformly%2C%20assigning%20higher%20token%20density%20to%20foveal%20regions%20and%20lower%20density%20to%20peripheral%20regions.%20An%20image%20or%20video%20is%20generated%20in%20a%20mixed-resolution%20token%20setting%2C%20yielding%20results%20perceptually%20indistinguishable%20from%20full-resolution%20generation%2C%20while%20drastically%20reducing%20the%20token%20count%20and%20generation%20time.%20To%20this%20end%2C%20we%20develop%20a%20principled%20mechanism%20for%20constructing%20mixed-resolution%20tokens%20directly%20from%20high-resolution%20data%2C%20allowing%20a%20foveated%20diffusion%20model%20to%20be%20post-trained%20from%20an%20existing%20base%20model%20while%20maintaining%20content%20consistency%20across%20resolutions.%20We%20validate%20our%20approach%20through%20extensive%20analysis%20and%20a%20carefully%20designed%20user%20study%2C%20demonstrating%20the%20efficacy%20of%20foveation%20as%20a%20practical%20and%20scalable%20axis%20for%20efficient%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23491v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFoveated%2520Diffusion%253A%2520Efficient%2520Spatially%2520Adaptive%2520Image%2520and%2520Video%2520Generation%26entry.906535625%3DBrian%2520Chao%2520and%2520Lior%2520Yariv%2520and%2520Howard%2520Xiao%2520and%2520Gordon%2520Wetzstein%26entry.1292438233%3DDiffusion%2520and%2520flow%2520matching%2520models%2520have%2520unlocked%2520unprecedented%2520capabilities%2520for%2520creative%2520content%2520creation%252C%2520such%2520as%2520interactive%2520image%2520and%2520streaming%2520video%2520generation.%2520The%2520growing%2520demand%2520for%2520higher%2520resolutions%252C%2520frame%2520rates%252C%2520and%2520context%2520lengths%252C%2520however%252C%2520makes%2520efficient%2520generation%2520increasingly%2520challenging%252C%2520as%2520computa {"title": "3DCity-LLM: Empowering Multi-modality Large Language Models for 3D City-scale Perception and Understanding", "author": "Yiping Chen and Jinpeng Li and Wenyu Ke and Yang Luo and Jie Ouyang and Zhongjie He and Li Liu and Hongchao Fan and Hao Wu", "abstract": "While multi-modality large language models excel in object-centric or indoor scenarios, scaling them to 3D city-scale environments remains a formidable challenge. To bridge this gap, we propose 3DCity-LLM, a unified framework designed for 3D city-scale vision-language perception and understanding. 3DCity-LLM employs a coarse-to-fine feature encoding strategy comprising three parallel branches for target object, inter-object relationship, and global scene. To facilitate large-scale training, we introduce 3DCity-LLM-1.2M dataset that comprises approximately 1.2 million high-quality samples across seven representative task categories, ranging from fine-grained object analysis to multi-faceted scene planning. This strictly quality-controlled dataset integrates explicit 3D numerical information and diverse user-oriented simulations, enriching the question-answering diversity and realism of urban scenarios. Furthermore, we apply a multi-dimensional protocol based on text-similarity metrics and LLM-based semantic assessment to ensure faithful and comprehensive evaluations for all methods. Extensive experiments on two benchmarks demonstrate that 3DCity-LLM significantly outperforms existing state-of-the-art methods, offering a promising and meaningful direction for advancing spatial reasoning and urban intelligence. The source code and dataset are available at https://github.com/SYSU-3DSTAILab/3D-City-LLM.", "link": "http://arxiv.org/abs/2603.23447v1", "date": "2026-03-24", "relevancy": 3.1601, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6408}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6408}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6145}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203DCity-LLM%3A%20Empowering%20Multi-modality%20Large%20Language%20Models%20for%203D%20City-scale%20Perception%20and%20Understanding&body=Title%3A%203DCity-LLM%3A%20Empowering%20Multi-modality%20Large%20Language%20Models%20for%203D%20City-scale%20Perception%20and%20Understanding%0AAuthor%3A%20Yiping%20Chen%20and%20Jinpeng%20Li%20and%20Wenyu%20Ke%20and%20Yang%20Luo%20and%20Jie%20Ouyang%20and%20Zhongjie%20He%20and%20Li%20Liu%20and%20Hongchao%20Fan%20and%20Hao%20Wu%0AAbstract%3A%20While%20multi-modality%20large%20language%20models%20excel%20in%20object-centric%20or%20indoor%20scenarios%2C%20scaling%20them%20to%203D%20city-scale%20environments%20remains%20a%20formidable%20challenge.%20To%20bridge%20this%20gap%2C%20we%20propose%203DCity-LLM%2C%20a%20unified%20framework%20designed%20for%203D%20city-scale%20vision-language%20perception%20and%20understanding.%203DCity-LLM%20employs%20a%20coarse-to-fine%20feature%20encoding%20strategy%20comprising%20three%20parallel%20branches%20for%20target%20object%2C%20inter-object%20relationship%2C%20and%20global%20scene.%20To%20facilitate%20large-scale%20training%2C%20we%20introduce%203DCity-LLM-1.2M%20dataset%20that%20comprises%20approximately%201.2%20million%20high-quality%20samples%20across%20seven%20representative%20task%20categories%2C%20ranging%20from%20fine-grained%20object%20analysis%20to%20multi-faceted%20scene%20planning.%20This%20strictly%20quality-controlled%20dataset%20integrates%20explicit%203D%20numerical%20information%20and%20diverse%20user-oriented%20simulations%2C%20enriching%20the%20question-answering%20diversity%20and%20realism%20of%20urban%20scenarios.%20Furthermore%2C%20we%20apply%20a%20multi-dimensional%20protocol%20based%20on%20text-similarity%20metrics%20and%20LLM-based%20semantic%20assessment%20to%20ensure%20faithful%20and%20comprehensive%20evaluations%20for%20all%20methods.%20Extensive%20experiments%20on%20two%20benchmarks%20demonstrate%20that%203DCity-LLM%20significantly%20outperforms%20existing%20state-of-the-art%20methods%2C%20offering%20a%20promising%20and%20meaningful%20direction%20for%20advancing%20spatial%20reasoning%20and%20urban%20intelligence.%20The%20source%20code%20and%20dataset%20are%20available%20at%20https%3A//github.com/SYSU-3DSTAILab/3D-City-LLM.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23447v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3DCity-LLM%253A%2520Empowering%2520Multi-modality%2520Large%2520Language%2520Models%2520for%25203D%2520City-scale%2520Perception%2520and%2520Understanding%26entry.906535625%3DYiping%2520Chen%2520and%2520Jinpeng%2520Li%2520and%2520Wenyu%2520Ke%2520and%2520Yang%2520Luo%2520and%2520Jie%2520Ouyang%2520and%2520Zhongjie%2520He%2520and%2520Li%2520Liu%2520and%2520Hongchao%2520Fan%2520and%2520Hao%2520Wu%26entry.1292438233%3DWhile%2520multi-modality%2520large%2520language%2520models%2520excel%2520in%2520object-centric%2520or%2520indoor%2520scenarios%252C%2520scaling%2520them%2520to%25203D%2520city-scale%2520environments%2520remains%2520a%2520formidable%2520challenge.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%25203DCity-LLM%252C%2520a%2520unified%2520framework%2520designed%2520for%25203D%2520city-scale%2520vision-language%2520perception%2520and%2520understanding.%25203DCity-LLM%2520employs%2520a%2520coarse-to-fine%2520feature%2520encoding%2520strategy%2520comprising%2520three%2520parallel%2520branches%2520for%2520target%2520object%252C%2520inter-object%2520relationship%252C%2520and%2520global%2520scene.%2520To%2520facilitate%2520large-scale%2520training%252C%2520we%2520introduce%25203DCity-LLM-1.2M%2520d {"title": "FG-Portrait: 3D Flow Guided Editable Portrait Animation", "author": "Yating Xu and Yunqi Miao and Evangelos Ververas and Jiankang Deng and Jifei Song", "abstract": "Motion transfer from the driving to the source portrait remains a key challenge in the portrait animation. Current diffusion-based approaches condition only on the driving motion, which fails to capture source-to-driving correspondences and consequently yields suboptimal motion transfer. Although flow estimation provides an alternative, predicting dense correspondences from 2D input is ill-posed and often yields inaccurate animation. We address this problem by introducing 3D flows, a learning-free and geometry-driven motion correspondence directly computed from parametric 3D head models. To integrate this 3D prior into diffusion model, we introduce 3D flow encoding to query potential 3D flows for each target pixel to indicate its displacement back to the source location. To obtain 3D flows aligned with 2D motion changes, we further propose depth-guided sampling to accurately locate the corresponding 3D points for each pixel. Beyond high-fidelity portrait animation, our model further supports user-specified editing of facial expression and head pose. Extensive experiments demonstrate the superiority of our method on consistent driving motion transfer as well as faithful source identity preservation.", "link": "http://arxiv.org/abs/2603.23381v1", "date": "2026-03-24", "relevancy": 3.1387, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.685}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5991}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5991}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FG-Portrait%3A%203D%20Flow%20Guided%20Editable%20Portrait%20Animation&body=Title%3A%20FG-Portrait%3A%203D%20Flow%20Guided%20Editable%20Portrait%20Animation%0AAuthor%3A%20Yating%20Xu%20and%20Yunqi%20Miao%20and%20Evangelos%20Ververas%20and%20Jiankang%20Deng%20and%20Jifei%20Song%0AAbstract%3A%20Motion%20transfer%20from%20the%20driving%20to%20the%20source%20portrait%20remains%20a%20key%20challenge%20in%20the%20portrait%20animation.%20Current%20diffusion-based%20approaches%20condition%20only%20on%20the%20driving%20motion%2C%20which%20fails%20to%20capture%20source-to-driving%20correspondences%20and%20consequently%20yields%20suboptimal%20motion%20transfer.%20Although%20flow%20estimation%20provides%20an%20alternative%2C%20predicting%20dense%20correspondences%20from%202D%20input%20is%20ill-posed%20and%20often%20yields%20inaccurate%20animation.%20We%20address%20this%20problem%20by%20introducing%203D%20flows%2C%20a%20learning-free%20and%20geometry-driven%20motion%20correspondence%20directly%20computed%20from%20parametric%203D%20head%20models.%20To%20integrate%20this%203D%20prior%20into%20diffusion%20model%2C%20we%20introduce%203D%20flow%20encoding%20to%20query%20potential%203D%20flows%20for%20each%20target%20pixel%20to%20indicate%20its%20displacement%20back%20to%20the%20source%20location.%20To%20obtain%203D%20flows%20aligned%20with%202D%20motion%20changes%2C%20we%20further%20propose%20depth-guided%20sampling%20to%20accurately%20locate%20the%20corresponding%203D%20points%20for%20each%20pixel.%20Beyond%20high-fidelity%20portrait%20animation%2C%20our%20model%20further%20supports%20user-specified%20editing%20of%20facial%20expression%20and%20head%20pose.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20method%20on%20consistent%20driving%20motion%20transfer%20as%20well%20as%20faithful%20source%20identity%20preservation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23381v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFG-Portrait 520of%2520our%2520method%2520on%2520consistent%2520driving%2520motion%2520transfer%2520as%2520well%2520as%2520faithful%2520source%2520identity%2520preservation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23381v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FG-Portrait%3A%203D%20Flow%20Guided%20Editable%20Portrait%20Animation&entry.906535625=Yating%20Xu%20and%20Yunqi%20Miao%20and%20Evangelos%20Ververas%20and%20Jiankang%20Deng%20and%20Jifei%20Song&entry.1292438233=Motion%20transfer%20from%20the%20driving%20to%20the%20source%20portrait%20remains%20a%20key%20challenge%20in%20the%20portrait%20animation.%20Current%20diffusion-based%20approaches%20condition%20only%20on%20the%20driving%20motion%2C%20which%20fails%20to%20capture%20source-to-driving%20correspondences%20and%20consequently%20yields%20suboptimal%20motion%20transfer.%20Although%20flow%20estimation%20provides%20an%20alternative%2C%20predicting%20dense%20correspondences%20from%202D%20input%20is%20ill-posed%20and%20often%20yields%20inaccurate%20animation.%20We%20address%20this%20problem%20by%20introducing%203D%20flows%2C%20a%20learning-free%20and%20geometry-driven%20motion%20correspondence%20directly%20computed%20from%20parametric%203D%20head%20models.%20To%20integrate%20this%203D%20prior%20into%20diffusion%20model%2C%20we%20introduce%203D%20flow%20encoding%20to%20query%20potential%203D%20flows%20for%20each%20target%20pixel%20to%20indicate%20its%20displacement%20back%20to%20the%20source%20location.%20To%20obtain%203D%20flows%20aligned%20with%202D%20motion%20changes%2C%20we%20further%20propose%20depth-guided%20sampling%20to%20accurately%20locate%20the%20corresponding%203D%20points%20for%20each%20pixel.%20Beyond%20high-fidelity%20portrait%20animation%2C%20our%20model%20further%20supports%20user-specified%20editing%20of%20facial%20expression%20and%20head%20pose.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20method%20on%20consistent%20driving%20motion%20transfer%20as%20well%20as%20faithful%20source%20identity%20preservation.&entry.1838667208=http%3A//arxiv.org/abs/2603.23381v1&entry.124074799=Read"},
{"title": "Cog3DMap: Multi-View Vision-Language Reasoning with 3D Cognitive Maps", "author": "Chanyoung Gwak and Yoonwoo Jeong and Byungwoo Jeon and Hyunseok Lee and Jinwoo Shin and Minsu Cho", "abstract": "Precise spatial understanding from multi-view images remains a fundamental challenge for Multimodal Large Language Models (MLLMs), as their visual representations are predominantly semantic and lack explicit geometric grounding. While existing approaches augment visual tokens with geometric cues from visual geometry models, their MLLM is still required to implicitly infer the underlying 3D structure of the scene from these augmented tokens, limiting its spatial reasoning capability. To address this issue, we introduce Cog3DMap, a framework that recurrently constructs an explicit 3D memory from multi-view images, where each token is grounded in 3D space and possesses both semantic and geometric information. By feeding these tokens into the MLLM, our framework enables direct reasoning over a spatially structured 3D map, achieving state-of-the-art performance on various spatial reasoning benchmarks. Code will be made publicly available.", "link": "http://arxiv.org/abs/2603.23023v1", "date": "2026-03-24", "relevancy": 3.1317, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6297}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6297}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6196}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cog3DMap%3A%20Multi-View%20Vision-Language%20Reasoning%20with%203D%20Cognitive%20Maps&body=Title%3A%20Cog3DMap%3A%20Multi-View%20Vision-Language%20Reasoning%20with%203D%20Cognitive%20Maps%0AAuthor%3A%20Chanyoung%20Gwak%20and%20Yoonwoo%20Jeong%20and%20Byungwoo%20Jeon%20and%20Hyunseok%20Lee%20and%20Jinwoo%20Shin%20and%20Minsu%20Cho%0AAbstract%3A%20Precise%20spatial%20understanding%20from%20multi-view%20images%20remains%20a%20fundamental%20challenge%20for%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20as%20their%20visual%20representations%20are%20predominantly%20semantic%20and%20lack%20explicit%20geometric%20grounding.%20While%20existing%20approaches%20augment%20visual%20tokens%20with%20geometric%20cues%20from%20visual%20geometry%20models%2C%20their%20MLLM%20is%20still%20required%20to%20implicitly%20infer%20the%20underlying%203D%20structure%20of%20the%20scene%20from%20these%20augmented%20tokens%2C%20limiting%20its%20spatial%20reasoning%20capability.%20To%20address%20this%20issue%2C%20we%20introduce%20Cog3DMap%2C%20a%20framework%20that%20recurrently%20constructs%20an%20explicit%203D%20memory%20from%20multi-view%20images%2C%20where%20each%20token%20is%20grounded%20in%203D%20space%20and%20possesses%20both%20semantic%20and%20geometric%20information.%20By%20feeding%20these%20tokens%20into%20the%20MLLM%2C%20our%20framework%20enables%20direct%20reasoning%20over%20a%20spatially%20structured%203D%20map%2C%20achieving%20state-of-the-art%20performance%20on%20various%20spatial%20reasoning%20benchmarks.%20Code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23023v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCog3DMap%253A%2520Multi-View%2520Vision-Language%2520Reasoning%2520with%25203D%2520Cognitive%2520Maps%26entry.906535625%3DChanyoung%2520Gwak%2520and%2520Yoonwoo%2520Jeong%2520and%2520Byungwoo%2520Jeon%2520and%2520Hyunseok%2520Lee%2520and%2520Jinwoo%2520Shin%2520and%2520Minsu%2520Cho%26entry.1292438233%3DPrecise%2520spatial%2520understanding%2520from%2520multi-view%2520images%2520remains%2520a%2520fundamental%2520challenge%2520for%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%252C%2520as%2520their%2520visual%2520representations%2520are%2520predominantly%2520semantic%2520and%2520lack%2520explicit%2520geometric%2520grounding.%2520While%2520existing%2520approaches%2520augment%2520visual%2520tokens%2520with%2520geometric%2520cues%2520from%2520visual%2520geometry%2520models%252C%2520their%2520MLLM%2520is%2520still%2520required%2520to%2520implicitly%2520infer%2520the%2520underlying%25203D%2520structure%2520of%2520the%2520scene%2520from%2520these%2520augmented%2520tokens%252C%2520limiting%2520its%2520spatial%2520reasoning%2520capability.%2520To%2520address%2520this%2520issue%252C%2520we%2520introduce%2520Cog3DMap%252C%2520a%2520framework%2520that%2520recurrently%2520constructs%2520an%2520explicit%25203D%2520memory%2520from%2520multi-view%2520images%252C%2520where%2520each%2520token%2520is%2520grounded%2520in%25203D%2520space%2520and%2520possesses%2520both%2520semantic%2520and%2520geometric%2520information.%2520By%2520feeding%2520these%2520tokens%2520into%2520the%2520MLLM%252C%2520our%2520framework%2520enables%2520direct%2520reasoning%2520over%2520a%2520spatially%2520structured%25203D%2520map%252C%2520achieving%2520state-of-the-art%2520performance%2520on%2520various%2520spatial%2520reasoning%2520benchmarks.%2520Code%2520will%2520be%2520made%2520publicly%2520available.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23023v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Cog3DMap%3A%20Multi-View%20Vision-Language%20Reasoning%20with%203D%20Cognitive%20Maps&entry.906535625=Chanyoung%20Gwak%20and%20Yoonwoo%20Jeong%20and%20Byungwoo%20Jeon%20and%20Hyunseok%20Lee%20and%20Jinwoo%20Shin%20and%20Minsu%20Cho&entry.1292438233=Precise%20spatial%20understanding%20from%20multi-view%20images%20remains%20a%20fundamental%20challenge%20for%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20as% {"title": "Unleashing Spatial Reasoning in Multimodal Large Language Models via Textual Representation Guided Reasoning", "author": "Jiacheng Hua and Yishu Yin and Yuhang Wu and Tai Wang and Yifei Huang and Miao Liu", "abstract": "Existing Multimodal Large Language Models (MLLMs) struggle with 3D spatial reasoning, as they fail to construct structured abstractions of the 3D environment depicted in video inputs. To bridge this gap, drawing inspiration from cognitive theories of allocentric spatial reasoning, we investigate how to enable MLLMs to model and reason over text-based spatial representations of video. Specifically, we introduce Textual Representation of Allocentric Context from Egocentric Video (TRACE), a prompting method that induces MLLMs to generate text-based representations of 3D environments as intermediate reasoning traces for more accurate spatial question answering. TRACE encodes meta-context, camera trajectories, and detailed object entities to support structured spatial reasoning over egocentric videos. Extensive experiments on VSI-Bench and OST-Bench demonstrate that TRACE yields notable and consistent improvements over prior prompting strategies across a diverse range of MLLM backbones, spanning different parameter scales and training schemas. We further present ablation studies to validate our design choices, along with detailed analyses that probe the bottlenecks of 3D spatial reasoning in MLLMs.", "link": "http://arxiv.org/abs/2603.23404v1", "date": "2026-03-24", "relevancy": 3.0717, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6014}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unleashing%20Spatial%20Reasoning%20in%20Multimodal%20Large%20Language%20Models%20via%20Textual%20Representation%20Guided%20Reasoning&body=Title%3A%20Unleashing%20Spatial%20Reasoning%20in%20Multimodal%20Large%20Language%20Models%20via%20Textual%20Representation%20Guided%20Reasoning%0AAuthor%3A%20Jiacheng%20Hua%20and%20Yishu%20Yin%20and%20Yuhang%20Wu%20and%20Tai%20Wang%20and%20Yifei%20Huang%20and%20Miao%20Liu%0AAbstract%3A%20Existing%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20struggle%20with%203D%20spatial%20reasoning%2C%20as%20they%20fail%20to%20construct%20structured%20abstractions%20of%20the%203D%20environment%20depicted%20in%20video%20inputs.%20To%20bridge%20this%20gap%2C%20drawing%20inspiration%20from%20cognitive%20theories%20of%20allocentric%20spatial%20reasoning%2C%20we%20investigate%20how%20to%20enable%20MLLMs%20to%20model%20and%20reason%20over%20text-based%20spatial%20representations%20of%20video.%20Specifically%2C%20we%20introduce%20Textual%20Representation%20of%20Allocentric%20Context%20from%20Egocentric%20Video%20%28TRACE%29%2C%20a%20prompting%20method%20that%20induces%20MLLMs%20to%20generate%20text-based%20representations%20of%203D%20environments%20as%20intermediate%20reasoning%20traces%20for%20more%20accurate%20spatial%20question%20answering.%20TRACE%20encodes%20meta-context%2C%20camera%20trajectories%2C%20and%20detailed%20object%20entities%20to%20support%20structured%20spatial%20reasoning%20over%20egocentric%20videos.%20Extensive%20experiments%20on%20VSI-Bench%20and%20OST-Bench%20demonstrate%20that%20TRACE%20yields%20notable%20and%20consistent%20improvements%20over%20prior%20prompting%20strategies%20across%20a%20diverse%20range%20of%20MLLM%20backbones%2C%20spanning%20different%20parameter%20scales%20and%20training%20schemas.%20We%20further%20present%20ablation%20studies%20to%20validate%20our%20design%20choices%2C%20along%20with%20detailed%20analyses%20that% {"title": "CCF: Complementary Collaborative Fusion for Domain Generalized Multi-Modal 3D Object Detection", "author": "Yuchen Wu and Kun Wang and Yining Pan and Na Zhao", "abstract": "Multi-modal fusion has emerged as a promising paradigm for accurate 3D object detection. However, performance degrades substantially when deployed in target domains different from training. In this work, focusing on dual-branch proposal-level detectors, we identify two factors that limit robust cross-domain generalization: 1) in challenging domains such as rain or nighttime, one modality may undergo severe degradation; 2) the LiDAR branch often dominates the detection process, leading to systematic underutilization of visual cues and vulnerability when point clouds are compromised. To address these challenges, we propose three components. First, Query-Decoupled Loss provides independent supervision for 2D-only, 3D-only, and fused queries, rebalancing gradient flow across modalities. Second, LiDAR-Guided Depth Prior augments 2D queries with instance-aware geometric priors through probabilistic fusion of image-predicted and LiDAR-derived depth distributions, improving their spatial initialization. Third, Complementary Cross-Modal Masking applies complementary spatial masks to the image and point cloud, encouraging queries from both modalities to compete within the fused decoder and thereby promoting adaptive fusion. Extensive experiments demonstrate substantial gains over state-of-the-art baselines while preserving source-domain performance. Code and models are publicly available at https://github.com/IMPL-Lab/CCF.", "link": "http://arxiv.org/abs/2603.23276v1", "date": "2026-03-24", "relevancy": 3.0095, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6373}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://a {"title": "PhysSkin: Real-Time and Generalizable Physics-Based Animation via Self-Supervised Neural Skinning", "author": "Yuanhang Lei and Tao Cheng and Xingxuan Li and Boming Zhao and Siyuan Huang and Ruizhen Hu and Peter Yichen Chen and Hujun Bao and Zhaopeng Cui", "abstract": "Achieving real-time physics-based animation that generalizes across diverse 3D shapes and discretizations remains a fundamental challenge. We introduce PhysSkin, a physics-informed framework that addresses this challenge. In the spirit of Linear Blend Skinning, we learn continuous skinning fields as basis functions lifting motion subspace coordinates to full-space deformation, with subspace defined by handle transformations. To generate mesh-free, discretization-agnostic, and physically consistent skinning fields that generalize well across diverse 3D shapes, PhysSkin employs a new neural skinning fields autoencoder which consists of a transformer-based encoder and a cross-attention decoder. Furthermore, we also develop a novel physics-informed self-supervised learning strategy that incorporates on-the-fly skinning-field normalization and conflict-aware gradient correction, enabling effective balancing of energy minimization, spatial smoothness, and orthogonality constraints. PhysSkin shows outstanding performance on generalizable neural skinning and enables real-time physics-based animation.", "link": "http://arxiv.org/abs/2603.23194v1", "date": "2026-03-24", "relevancy": 3.0052, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6377}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6179}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhysSkin%3A% {"title": "Curriculum-Driven 3D CT Report Generation via Language-Free Visual Grafting and Zone-Constrained Compression", "author": "V. K. Cody Bumgardner and Mitchell A. Klusty and Mahmut S. Gokmen and Evan W. Damron", "abstract": "Automated radiology report generation from 3D computed tomography (CT) volumes is challenging due to extreme sequence lengths, severe class imbalance, and the tendency of large language models (LLMs) to ignore visual tokens in favor of linguistic priors. We present Ker-VLJEPA-3B, a four-phase curriculum learning framework for free-text report generation from thoracic CT volumes. A phased training curriculum progressively adapts a Llama 3.2 3B decoder to ground its output in visual features from a frozen, self-supervised encoder. Our visual backbone (LeJEPA ViT-Large) is trained via self-supervised joint-embedding prediction on unlabeled CTs, without text supervision. Unlike contrastive models (CLIP, BiomedCLIP), this language-free backbone yields modality-pure representations. Vision-language alignment is deferred to the curriculum's bridge and generation phases. This modality-agnostic design can integrate any self-supervised encoder into an LLM without paired text during foundation training. Methodological innovations include: (1) zone-constrained cross-attention compressing slice embeddings into 32 spatially-grounded visual tokens; (2) PCA whitening of anisotropic LLM embeddings; (3) a positive-findings-only strategy eliminating posterior collapse; (4) warm bridge initialization transferring projection weights; and (5) selective cross-attention freezing with elastic weight consolidation to prevent catastrophic forgetting. Evaluated on the CT-RATE benchmark (2,984 validation volumes, 18 classes), Ker-VLJEPA-3B achieves a macro F1 of 0.429, surpassing the state-of-the-art (U-VLM, macro F1 = 0.414) by 3.6%, and reaching 0.448 (+8.2%) with threshold optimization. Ablation studies confirm 56.6% of generation quality derives from patient-specific visual content. Code and weights are available.", "link": "http://arxiv.org/abs/2603.23308v1", "date": "2026-03-24", "relevancy": 2.9886, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6083}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5924}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5924}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Curriculum-Driven%203D%20CT%20Report%20Generation%20via%20Language-Free%20Visual%20Grafting%20and%20Zone-Constrained%20Compression&body=Title%3A%20Curriculum-Driven%203D%20CT%20Report%20Generation%20via%20Language-Free%20Visual%20Grafting%20and%20Zone-Constrained%20Compression%0AAuthor%3A%20V.%20K.%20Cody%20Bumgardner%20and%20Mitchell%20A.%20Klusty%20and%20Mahmut%20S.%20Gokmen%20and%20Evan%20W.%20Damron%0AAbstract%3A%20Automated%20radiology%20report%20generation%20from%203D%20computed%20tomography%20%28CT%29%20volumes%20is%20challenging%20due%20to%20extreme%20sequence%20lengths%2C%20severe%20class%20imbalance%2C%20and%20the%20tendency%20of%20large%20language%20models%20%28LLMs%29%20to%20ignore%20visual%20tokens%20in%20favor%20of%20linguistic%20priors.%20We%20present%20Ker-VLJEPA-3B%2C%20a%20four-phase%20curriculum%20learning%20framework%20for%20free-text%20report%20generation%20from%20thoracic%20CT%20volumes.%20A%20phased%20training%20curriculum%20progressively%20adapts%20a%20Llama%203.2%203B%20decoder%20to%20ground%20its%20output%20in%20visual%20features%20from%20a%20frozen%2C%20self-supervised%20encoder.%20Our%20visual%20backbone%20%28LeJEPA%20ViT-Large%29%20is%20trained%20via%20self-supervised%20joint-embedding%20prediction%20on%20unlabeled%20CTs%2C%20without%20text%20supervision.%20Unlike%20contrastive%20models%20%28CLIP%2C%20BiomedCLIP%29%2C%20this%20language-free%20backbone%20yields%20modality-pure%20representations.%20Vision-language%20alignment%20is%20deferred%20to%20the%20curriculum%27s%20bridge%20and%20generation%20phases.%20This%20modality-agnostic%20design%20can%20integrate%20any%20self-supervised%20encoder%20into%20an%20LLM%20without%20paired%20text%20during%20foundation%20training.%20Methodological%20innovations%20include%3A%20%281%29%20zone-constrained%20cross-attention%20compressing%20slice%20embeddings%20into%2032%20spatially-grounded%20visual%20tokens%3B%20%282%29%20PCA%20whitening%20of%20anisotropic%20LLM%20embeddings%3B%20%283%29%20a%20positive-findings-only%20strategy%20eliminating%20posterior%20collapse%3B%20%284%29%20warm%20bridge%20initialization%20transferring%20projection%20weights%3B%20and%20%285%29%20selective%20cross-attention%20freezing%20with%20elastic%20weight%20consolidation%20to%20prevent%20catastrophic%20forgetting.%20Evaluated%20on%20the%20CT-RATE%20benchmark%20%282%2C984%20validation%20volumes%2C%2018%20classes%29%2C%20Ker-VLJEPA-3B%20achieves%20a%20macro%20F1%20of%200.429%2C%20surpassing%20the%20state-of-the-art%20%28U-VLM%2C%20macro%20F1%20%3D%200.414%29%20by%203.6%25%2C%20and%20reaching%200.448%20%28%2B8.2%25%29%20with%20threshold%20optimization.%20Ablation%20studies%20confirm%2056.6%25%20of%20generation%20quality%20derives%20from%20patient-specific%20visual%20content.%20Code%20and%20weights%20are%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23308v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCurriculum-Driven%25203D%2520CT%2520Report%2520Generation%2520via%2520Language-Free%2520Visual%2520Grafting%2520and%2520Zone-Constrained%2520Compression%26entry.906535625%3DV.%2520K.%2520Cody%2520Bumgardner%2520and%2520Mitchell%2520A.%2520Klusty%2520and%2520Mahmut%2520S.%2520Gokmen%2520and%2520Evan%2520W.%2520Damron%26ent {"title": "LoD-Loc v3: Generalized Aerial Localization in Dense Cities using Instance Silhouette Alignment", "author": "Shuaibang Peng and Juelin Zhu and Xia Li and Kun Yang and Maojun Zhang and Yu Liu and Shen Yan", "abstract": "We present LoD-Loc v3, a novel method for generalized aerial visual localization in dense urban environments. While prior work LoD-Loc v2 achieves localization through semantic building silhouette alignment with low-detail city models, it suffers from two key limitations: poor cross-scene generalization and frequent failure in dense building scenes. Our method addresses these challenges through two key innovations. First, we develop a new synthetic data generation pipeline that produces InsLoD-Loc - the largest instance segmentation dataset for aerial imagery to date, comprising 100k images with precise instance building annotations. This enables trained models to exhibit remarkable zero-shot generalization capability. Second, we reformulate the localization paradigm by shifting from semantic to instance silhouette alignment, which significantly reduces pose estimation ambiguity in dense scenes. Extensive experiments demonstrate that LoD-Loc v3 outperforms existing state-of-the-art (SOTA) baselines, achieving superior performance in both cross-scene and dense urban scenarios with a large margin. The project is available at https://nudt-sawlab.github.io/LoD-Locv3/.", "link": "http://arxiv.org/abs/2603.19609v2", "date": "2026-03-24", "relevancy": 2.9859, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6286}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5944}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5685}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoD-Loc%20v3%3A%20Generalized%20Aerial%20Localization%20in%20Dense%20Cities%20using%20Instance%20Silhouette%20Alignment&body=Title%3A%20LoD-Loc%20v3%3A%20Generalized%20Aerial%20Localization%20in%20Dense%20Cities%20using%20Instance%20Silhouette%20Alignment%0AAuthor%3A%20Shuaibang%20Peng%20and%20Juelin%20Zhu%20and%20Xia%20Li%20and%20Kun%20Yang%20and%20Maojun%20Zhang%20and%20Yu%20Liu%20and%20Shen%20Yan%0AAbstract%3A%20We%20present%20LoD-Loc%20v3%2C%20a%20novel%20method%20for%20generalized%20aerial%20visual%20localization%20in%20dense%20urban%20environments.%20While%20prior%20work%20LoD-Loc%20v2%20achieves%20localization%20through%20semantic%20building%20silhouette%20alignment%20with%20low-detail%20city%20models%2C%20it%20suffers%20from%20two%20key%20limitations%3A%20poor%20cross-scene%20generalization%20and%20frequent%20failure%20in%20dense%20building%20scenes.%20Our%20method%20addresses%20these%20challenges%20through%20two%20key%20innovations.%20First%2C%20we%20develop%20a%20new%20synthetic%20data%20generation%20pipeline%20that%20produces%20InsLoD-Loc%20-%20the%20largest%20instance%20segmentation%20dataset%20for%20aerial%20imagery%20to%20date%2C%20comprising%20100k%20images%20with%20precise%20instance%20building%20annotations.%20This%20enables%20trained%20models%20to%20exhibit%20remarkable%20zero-shot%20generalization%20capability.%20Second%2C%20we%20reformulate%20the%20localization%20paradigm%20by%20shifting%20from%20semantic%20to%20instance%20silhouette%20alignment%2C%20which%20significantly%20reduces%20pose%20estimation%20ambiguity%20in%20dense%20scenes.%20Extensive%20experiments%20demonstrate%20that%20LoD-Loc%20v3%20outperforms%20existing%20state-of-the-art%20%28SOTA%29%20baselines%2C%20achieving%20superior%20performance%20in%20both%20cross-scene%20and%20dense%20urban%20scenarios%20with%20a%20large%20margin.%20The%20project%20is%20available%20at%20https%3A//nudt-sawlab {"title": "Hierarchical Long Video Understanding with Audiovisual Entity Cohesion and Agentic Search", "author": "Xinlei Yin and Xiulian Peng and Xiao Li and Zhiwei Xiong and Yan Lu", "abstract": "Long video understanding presents significant challenges for vision-language models due to extremely long context windows. Existing solutions relying on naive chunking strategies with retrieval-augmented generation, typically suffer from information fragmentation and a loss of global coherence. We present HAVEN, a unified framework for long-video understanding that enables coherent and comprehensive reasoning by integrating audiovisual entity cohesion and hierarchical video indexing with agentic search. First, we preserve semantic consistency by integrating entity-level representations across visual and auditory streams, while organizing content into a structured hierarchy spanning global summary, scene, segment, and entity levels. Then we employ an agentic search mechanism to enable dynamic retrieval and reasoning across these layers, facilitating coherent narrative reconstruction and fine-grained entity tracking. Extensive experiments demonstrate that our method achieves good temporal coherence, entity consistency, and retrieval efficiency, establishing a new state-of-the-art with an overall accuracy of 84.1% on LVBench. Notably, it achieves outstanding performance in the challenging reasoning category, reaching 80.1%. These results highlight the effectiveness of structured, multimodal reasoning for comprehensive and context-consistent understanding of long-form videos.", "link": "http://arxiv.org/abs/2601.13719v2", "date": "2026-03-24", "relevancy": 2.9846, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6294}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simil 0of%2084.1%25%20on%20LVBench.%20Notably%2C%20it%20achieves%20outstanding%20performance%20in%20the%20challenging%20reasoning%20category%2C%20reaching%2080.1%25.%20These%20results%20highlight%20the%20effectiveness%20of%20structured%2C%20multimodal%20reasoning%20for%20comprehensive%20and%20context-consistent%20understanding%20of%20long-form%20videos.%0ALink%3A%20http%3A//arxiv.org/abs/2601.13719v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520Long%2520Video%2520Understanding%2520with%2520Audiovisual%2520Entity%2520Cohesion%2520and%2520Agentic%2520Search%26entry.906535625%3DXinlei%2520Yin%2520and%2520Xiulian%2520Peng%2520and%2520Xiao%2520Li%2520and%2520Zhiwei%2520Xiong%2520and%2520Yan%2520Lu%26entry.1292438233%3DLong%2520video%2520understanding%2520presents%2520significant%2520challenges%2520for%2520vision-language%2520models%2520due%2520to%2520extremely%2520long%2520context%2520windows.%2520Existing%2520solutions%2520relying%2520on%2520naive%2520chunking%2520strategies%2520with%2520retrieval-augmented%2520generation%252C%2520typically%2520suffer%2520from%2520information%2520fragmentation%2520and%2520a%2520loss%2520of%2520global%2520coherence.%2520We%2520present%2520HAVEN%252C%2520a%2520unified%2520framework%2520for%2520long-video%2520understanding%2520that%2520enables%2520coherent%2520and%2520comprehensive%2520reasoning%2520by%2520integrating%2520audiovisual%2520entity%2520cohesion%2520and%2520hierarchical%2520video%2520indexing%2520with%2520agentic%2520search.%2520First%252C%2520we%2520preserve%2520semantic%2520consistency%2520by%2520integrating%2520entity-level%2520representations%2520across%2520visual%2520and%2520auditory%2520streams%252C%2520while%2520organizing%2520content%2520into%2520a%2520structured%2520hierarchy%2520spanning%2520global%2520summary%252C%2520scene%252C%2520segment%252C%2520and%2520entity%2520levels.%2520Then%2520we%2520employ%2520an%2520agen {"title": "NeuroSeg Meets DINOv3: Transferring 2D Self-Supervised Visual Priors to 3D Neuron Segmentation via DINOv3 Initialization", "author": "Yik San Cheng and Runkai Zhao and Weidong Cai", "abstract": "2D visual foundation models, such as DINOv3, a self-supervised model trained on large-scale natural images, have demonstrated strong zero-shot generalization, capturing both rich global context and fine-grained structural cues. However, an analogous 3D foundation model for downstream volumetric neuroimaging remains lacking, largely due to the challenges of 3D image acquisition and the scarcity of high-quality annotations. To address this gap, we propose to adapt the 2D visual representations learned by DINOv3 to a 3D biomedical segmentation model, enabling more data-efficient and morphologically faithful neuronal reconstruction. Specifically, we design an inflation-based adaptation strategy that inflates 2D filters into 3D operators, preserving semantic priors from DINOv3 while adapting to 3D neuronal volume patches. In addition, we introduce a topology-aware skeleton loss to explicitly enforce structural fidelity of graph-based neuronal arbor reconstruction. Extensive experiments on four neuronal imaging datasets, including two from BigNeuron and two public datasets, NeuroFly and CWMBS, demonstrate consistent improvements in reconstruction accuracy over SoTA methods, with average gains of 2.9% in Entire Structure Average, 2.8% in Different Structure Average, and 3.8% in Percentage of Different Structure. Code: https://github.com/yy0007/NeurINO.", "link": "http://arxiv.org/abs/2603.23104v1", "date": "2026-03-24", "relevancy": 2.9624, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5948}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "s {"title": "VISion On Request: Enhanced VLLM efficiency with sparse, dynamically selected, vision-language interactions", "author": "Adrian Bulat and Alberto Baldrati and Ioannis Maniadis Metaxas and Yassine Ouali and Georgios Tzimiropoulos", "abstract": "Existing approaches for improving the efficiency of Large Vision-Language Models (LVLMs) are largely based on the concept of visual token reduction. This approach, however, creates an information bottleneck that impairs performance, especially on challenging tasks that require fine-grained understanding and reasoning. In this work, we challenge this paradigm by introducing VISion On Request (VISOR), a method that reduces inference cost without discarding visual information. Instead of compressing the image, VISOR improves efficiency by sparsifying the interaction between image and text tokens. Specifically, the language model attends to the full set of high-resolution visual tokens through a small, strategically placed set of attention layers: general visual context is provided by efficient cross-attention between text-image, while a few well-placed and dynamically selected self-attention layers refine the visual representations themselves, enabling complex, high-resolution reasoning when needed. Based on this principle, we first train a single universal network on a range of computational budgets by varying the number of self-attention layers, and then introduce a lightweight policy mechanism that dynamically allocates visual computation based on per-sample complexity. Extensive experiments show that VISOR drastically reduces computational cost while matching or exceeding state-of-the-art results across a diverse suite of benchmarks, and excels in challenging tasks that require detailed visual understanding.", "link": "http://arxiv.org/abs/2603.23495v1", "date": "2026-03-24", "relevancy": 2.9359, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6047}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6047}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5522}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VISion%20On%20Request%3A%20Enhanced%20VLLM%20efficiency%20with%20sparse%2C%20dynamically%20selected%2C%20vision-language%20interactions&body=Title%3A%20VISion%20On%20Request%3A%20Enhanced%20VLLM%20efficiency%20with%20sparse%2C%20dynamically%20selected%2C%20vision-language%20interactions%0AAuthor%3A%20Adrian%20Bulat%20and%20Alberto%20Baldrati%20and%20Ioannis%20Maniadis%20Metaxas%20and%20Yassine%20Ouali%20and%20Georgios%20Tzimiropoulos%0AAbstract%3A%20Existing%20approaches%20for%20improving%20the%20efficiency%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29%20are%20largely%20based%20on%20the%20concept%20of%20visual%20token%20reduction.%20This%20approach%2C%20however%2C%20creates%20an%20information%20bottleneck%20that%20impairs%20performance%2C%20especially%20on%20challenging%20tasks%20that%20require%20fine-grained%20understanding%20and%20reasoning.%20In%20this%20work%2C%20we%20challenge%20this%20paradigm%20by%20introducing%20VISion%20On%20Request%20%28VISOR%29%2C%20a%20method%20that%20reduces%20inference%20cost%20without%20discarding%20visual%20information.%20Instead%20of%20compressing%20the%20image%2C%20VISOR%20improves%20efficiency%20by%20sparsifying%20the%20interaction%20between%20image%20and%20text%20tokens.%20Specifically%2C%20the%20language%20model%20attends%20to%20the%20full%20set%20of%20high-resolution%20visual%20tokens%20through%20a%20small%2C%20strategically%20placed%20set%20of%20attention%20layers%3A%20general%20visual%20context%20is%20provided%20by%20efficient%20cross-attention%20between%20text-image%2C%20while%20a%20few%20well-placed%20and%20dynamically%20selected%20self-attention%20layers%20refine%20the%20visual%20representations%20themselves%2C%20enabling%20complex%2C%20high-resolution%20reasoning%20when%20needed.%20Based%20on%20this%20principle%2C%20we%20first%20train%20a%20single%20universal%20network%20on%20a%20range%20of%20computational%20budgets%20by%20varying%20the%20number%20of%20self-attention%20layers%2C%20and%20then%20introduce%20a%20lightweight%20policy%20mechanism%20that%20dynamically%20allocates%20visual%20computation%20based%20on%20per-sample%20complexity.%20Extensive%20experiments%20show%20that%20VISOR%20drastically%20reduces%20computational%20cost%20while%20matching%20or%20exceeding%20state-of-the-art%20results%20across%20a%20diverse%20suite%20of%20benchmarks%2C%20and%20excels%20in%20challenging%20tasks%20that%20require%20detailed%20visual%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23495v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVISion%2520On%2520Request%253A%2520Enhanced%2520VLLM%2520efficiency%2520with%2520sparse%252C%2520dynamically%2520selected%252C%2520vision-language%2520interactions%26entry.906535625%3DAdrian%2520Bulat%2520and%2520Alberto%2520Baldrati%2520and%2520Ioannis%2520Maniadis%2520Metaxas%2520and%2520Yassine%2520Ouali%2520and%2520Georgios%2520Tzimiropoulos%26entry.1292438233%3DExisting%2520approaches%2520for%2520improving%2520the%2520efficiency%2520of%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520are%2520largely%2520based%2520on%2520the%2520concept%2520of%2520visual%2520token%2520reduction.%2520This%2520approach%252C%2520however%252C%2520creates%2520an%2520information%2520bottleneck%2520that%2520impairs%2520performance%252C%2520especially%2520on%2520challenging%2520tasks%2520that%2520require%2520fine-grained%2520understanding%2520and%2520reasoning.%2520In%2520this%2520work%252C%2520we%2520challenge%2520this%2520paradig {"title": "Automatic Segmentation of 3D CT scans with SAM2 using a zero-shot approach", "author": "Miquel Lopez Escoriza and Pau Amargant Alvarez", "abstract": "Foundation models for image segmentation have shown strong generalization in natural images, yet their applicability to 3D medical imaging remains limited. In this work, we study the zero-shot use of Segment Anything Model 2 (SAM2) for automatic segmentation of volumetric CT data, without any fine-tuning or domain-specific training. We analyze how SAM2 should be applied to CT volumes and identify its main limitation: the lack of inherent volumetric awareness. To address this, we propose a set of inference-alone architectural and procedural modifications that adapt SAM2's video-based memory mechanism to 3D data by treating CT slices as ordered sequences. We conduct a systematic ablation study on a subset of 500 CT scans from the TotalSegmentator dataset to evaluate prompt strategies, memory propagation schemes and multi-pass refinement. Based on these findings, we select the best-performing configuration and report final results on a bigger sample of the TotalSegmentator dataset comprising 2,500 CT scans. Our results show that, even with frozen weights, SAM2 can produce coherent 3D segmentations when its inference pipeline is carefully structured, demonstrating the feasibility of a fully zero-shot approach for volumetric medical image segmentation.", "link": "http://arxiv.org/abs/2603.23116v1", "date": "2026-03-24", "relevancy": 2.9195, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6003}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5757}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5757}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20Segmentation%20of%203D%20CT%20scans%20with%20SAM2%20using%20a%20zero-shot%20approach&body=Title%3A%20Automatic%20Segmentation%20of%203D%20CT%20scans%20with%20SAM2%20using%20a%20zero-shot%20approach%0AAuthor%3A%20Miquel%20Lopez%20Escoriza%20and%20Pau%20Amargant%20Alvarez%0AAbstract%3A%20Foundation%20models%20for%20image%20segmentation%20have%20shown%20strong%20generalization%20in%20natural%20images%2C%20yet%20their%20applicability%20to%203D%20medical%20imaging%20remains%20limited.%20In%20this%20work%2C%20we%20study%20the%20zero-shot%20use%20of%20Segment%20Anything%20Model%202%20%28SAM2%29%20for%20automatic%20segmentation%20of%20volumetric%20CT%20data%2C%20without%20any%20fine-tuning%20or%20domain-specific%20training.%20We%20analyze%20how%20SAM2%20should%20be%20applied%20to%20CT%20volumes%20and%20identify%20its%20main%20limitation%3A%20the%20lack%20of%20inherent%20volumetric%20awareness.%20To%20address%20this%2C%20we%20propose%20a%20set%20of%20inference-alone%20architectural%20and%20procedural%20modifications%20that%20adapt%20SAM2%27s%20video-based%20memory%20mechanism%20to%203D%20data%20by%20treating%20CT%20slices%20as%20ordered%20sequences.%20We%20conduct%20a%20systematic%20ablation%20study%20on%20a%20subset%20of%20500%20CT%20scans%20from%20the%20TotalSegmentator%20dataset%20to%20evaluate%20prompt%20strategies%2C%20memory%20propagation%20schemes%20and%20multi-pass%20refinement.%20Based%20on%20these%20findings%2C%20we%20select%20the%20best-performing%20configuration%20and%20report%20final%20results%20on%20a%20bigger%20sample%20of%20the%20TotalSegmentator%20dataset%20comprising%202%2C500%20CT%20scans.%20Our%20results%20show%20that%2C%20even%20with%20frozen%20weights%2C%20SAM2%20can%20produce%20coherent%203D%20segmentations%20when%20its%20inference%20pipeline%20is%20carefully%20structured%2C%20demonstrating%20the%20feasibility%20of%20a%20fully%20zero-shot%20approach%20for%20volumetric%20medical%20image%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23116v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomatic%2520Segmentation%2520of%25203D%2520CT%2520scans%2520with%2520SAM2%2520using%2520a%2520zero-shot%2520approach%26entry.906535625%3DMiquel%2520Lopez%2520Escoriza%2520and%2520Pau%2520Amargant%2520Alvarez%26entry.1292438233%3DFoundation%2520models%2520for%2520image%2520segmentation%2520have%2520shown%2520strong%2520generalization%2520in%2520natural%2520images%252C%2520yet%2520their%2520applicability%2520to%25203D%2520medical%2520imaging%2520remains%2520limited.%2520In%2520this%2520work%252C%2520we%2520study%2520the%2520zero-shot%2520use%2520of%2520Segment%2520Anything%2520Model%25202%2520%2528SAM2%2529%2520for%2520automatic%2520segmentation%2520of%2520volumetric%2520CT%2520data%252C%2520without%2520any%2520fine-tuning%2520or%2520domain-specific%2520training.%2520We%2520analyze%2520how%2520SAM2%2520should%2520be%2520applied%2520to%2520CT%2520volumes%2520and%2520identify%2520its%2520main%2520limitation%253A%2520the%2520lack%2520of%2520inherent%2520volumetric%2520awareness.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520set%2520of%2520inference-alone%2520architectural%2520and%2520procedural%2520modifications%2520that%2520adapt%2520SAM2%2527s%2520video-based%2520memory%2520mechanism%2520to%25203D%2520data%2520by%2520treating%2520CT%2520slices%2520as%2520ordered%2520sequences.%2520We%2520conduct%2520a%2520systematic%2520ablation%2520study%2520on%2520a%2520subset%2520of%2520500%2520CT%2520scans%2520from%2520the%2520TotalSegmentator%2520dataset%2520to%2520evaluate%2520prompt%2520strategies%252C%2520memory%2520propagation%2520schemes%2520and%2520multi-pass%2520refinement.%2520Based%2520on%2520these%2520findings%252C%2520we%2520select%2520the%2520best-performing%2520configuration%2520and%2520report%2520final%2520results%2520on%2520a%2520bigger%2520sample%2520of%2520the%2520TotalSegmentator%2520dataset%2520comprising%25202%252C500%2520CT%2520scans.%2520Our%2520results%2520show%2520that%252C%2520even%2520with%2520frozen%2520weights%252C%2520SAM2%2520can%2520produce%2520coherent%25203D%2520segmentations%2520when%2520its%2520inference%2520pipeline%2520is%2520carefully%2520structured%252C%2520demonstrating%2520the%2520feasibility%2520of%2520a%2520fully%2520zero-shot%2520approach%2520for%2520volumetric%2520medical%2520image%2520segmentation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23116v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Automatic%20Segmentation%20of%203D%20CT%20scans%20with%20SAM2%20using%20a%20zero-shot%20approach&entry.906535625=Miquel%20Lopez%20Escoriza%20and%20Pau%20Amargant%20Alvarez&entry.1292438233=Foundation%20models%20for%20image%20segmentation%20have%20shown%20strong%20generalization%20in%20natural%20images%2C%20yet%20their%20applicability%20to%203D%20medical%20imaging%20remains%20limited.%20In%20this%20work%2C%20we%20study%20the%20zero-shot%20use%20of%20Segment%20Anything%20Model%202%20%28SAM2%29%20for%20automatic%20segmentation%20of%20volumetric%20CT%20data%2C%20without%20any%20fine-tuning%20or%20domain-specific%20training.%20We%20analyze%20how%20SAM2%20should%20be%20applied%20to%20CT%20volumes%20and%20identify%20its%20main%20limitation%3A%20the%20lack%20of%20inherent%20volumetric%20awareness.%20To%20address%20this%2C%20we%20propose%20a%20set%20of%20inference-alone%20architectural%20and%20procedural%20modifications%20that%20adapt%20SAM2%27s%20video-based%20memory%20mechanism%20to%203D%20data%20by%20treating%20CT%20slices%20as%20ordered%20sequences.%20We%20conduct%20a%20systematic%20ablation%20study%20on%20a%20subset%20of%20500%20CT%20scans%20from%20the%20TotalSegmentator%20dataset%20to%20evaluate%20prompt%20strategies%2C%20memory%20propagation%20schemes%20and%20multi-pass%20refinement.%20Based%20on%20these%20findings%2C%20we%20select%20the%20best-performing%20configuration%20and%20report%20final%20results%20on%20a%20bigger%20sample%20of%20the%20TotalSegmentator%20dataset%20comprising%202%2C500%20CT%20scans.%20Our%20results%20show%20that%2C%20even%20with%20frozen%20weights%2C%20SAM2%20can%20produce%20coherent%203D%20segmentations%20when%20its%20inference%20pipeline%20is%20carefully%20structured%2C%20demonstrating%20the%20feasibility%20of%20a%20fully%20zero-shot%20approach%20for%20volumetric%20medical%20image%20segmentation.&entry.1838667208=http%3A//arxiv.org/abs/2603.23116v1&entry.124074799=Read"},
{"title": "Looking Beyond the Window: Global-Local Aligned CLIP for Training-free Open-Vocabulary Semantic Segmentation", "author": "ByeongCheol Lee and Hyun Seok Seong and Sangeek Hyun and Gilhan Park and WonJun Moon and Jae-Pil Heo", "abstract": "A sliding-window inference strategy is commonly adopted in recent training-free open-vocabulary semantic segmentation methods to overcome limitation of the CLIP in processing high-resolution images. However, this approach introduces a new challenge: each window is processed independently, leading to semantic discrepancy across windows. To address this issue, we propose Global-Local Aligned CLIP~(GLA-CLIP), a framework that facilitates comprehensive information exchange across windows. Rather than limiting attention to tokens within individual windows, GLA-CLIP extends key-value tokens to incorporate contextual cues from all windows. Nevertheless, we observe a window bias: outer-window tokens are less likely to be attended, since query features are produced through interactions within the inner window patches, thereby lacking semantic grounding beyond their local context. To mitigate this, we introduce a proxy anchor, constructed by aggregating tokens highly similar to the given query from all windows, which provides a unified semantic reference for measuring similarity across both inner- and outer-window patches. Furthermore, we propose a dynamic normalization scheme that adjusts attention strength according to object scale by dynamically scaling and thresholding the attention map to cope with small-object scenarios. Moreover, GLA-CLIP can be equipped on existing methods and broad their receptive field. Extensive experiments validate the effectiveness of GLA-CLIP in enhancing training-free open-vocabulary semantic segmentation performance. Code is available at https://github.com/2btlFe/GLA-CLIP.", "link": "http://arxiv.org/abs/2603.23030v1", "date": "2026-03-24", "relevancy": 2.9002, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6056}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5673}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5673}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Looking%20Beyond%20the%20Window%3A%20Global-Local%20Aligned%20CLIP%20for%20Training-free%20Open-Vocabulary%20Semantic%20Segmentation&body=Title%3A%20Looking%20Beyond%20the%20Window%3A%20Global-Local%20Aligned%20CLIP%20for%20Training-free%20Open-Vocabulary%20Semantic%20Segmentation%0AAuthor%3A%20ByeongCheol%20Lee%20and%20Hyun%20Seok%20Seong%20and%20Sangeek%20Hyun%20and%20Gilhan%20Park%20and%20WonJun%20Moon%20and%20Jae-Pil%20Heo%0AAbstract%3A%20A%20sliding-window%20inference%20strategy%20is%20commonly%20adopted%20in%20recent%20training-free%20open-vocabulary%20semantic%20segmentation%20methods%20to%20overcome%20limitation%20of%20the%20CLIP%20in%20processing%20high-resolution%20images.%20However%2C%20this%20approach%20introduces%20a%20new%20challenge%3A%20each%20window%20is%20processed%20independently%2C%20leading%20to%20semantic%20discrepancy%20across%20windows.%20To%20address%20this%20issue%2C%20we%20propose%20Global-Local%20Aligned%20CLIP~%28GLA-CLIP%29%2C%20a%20framework%20that%20facilitates%20comprehensive%20information%20exchange%20across%20windows.%20Rather%20than%20limiting%20attention%20to%20tokens%20within%20individual%20windows%2C%20GLA-CLIP%20extends%20key-value%20tokens%20to%20incorporate%20contextual%20cues%20from%20all%20windows.%20Nevertheless%2C%20we%20observe%20a%20window%20bias%3A%20outer-window%20tokens%20are%20less%20likely%20to%20be%20attended%2C%20since%20query%20features%20are%20produced%20through%20interactions%20within%20the%20inner%20window%20patches%2C%20thereby%20lacking%20semantic%20grounding%20beyond%20their%20local%20context.%20To%20mitigate%20this%2C%20we%20introduce%20a%20proxy%20anchor%2C%20constructed%20by%20aggregating%20tokens%20highly%20similar%20to%20the%20given%20query%20from%20all%20windows%2C%20which%20provides%20a%20unified%20semantic%20reference%20for%20measuring%20similarity%20across%20both%20inner-%20and%20outer-window%20patches.%20Furthermore%2C%20we%20propose%20a%20dynamic%20normalization%20scheme%20that%20adjusts%20attention%20strength%20according%20to%20object%20scale%20by%20dynamically%20scaling%20and%20thresholding%20the%20attention%20map%20to%20cope%20with%20small-object%20scenarios.%20Moreover%2C%20GLA-CLIP%20can%20be%20equipped%20on%20existing%20methods%20and%20broad%20their%20receptive%20field.%20Extensive%20experiments%20validate%20the%20effectiveness%20of%20GLA-CLIP%20in%20enhancing%20training-free%20open-vocabulary%20semantic%20segmentation%20performance.%20Code%20is%20available%20at%20https%3A//github.com/2btlFe/GLA-CLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23030v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLooking%2520Beyond%2520the%2520Window%253A%2520Global-Local%2520Aligned%2520CLIP%2520for%2520Training-free%2520Open-Vocabulary%2520Semantic%2520Segmentation%26entry.906535625%3DByeongCheol%2520Lee%2520and%2520Hyun%2520Seok%2520Seong%2520and%2520Sangeek%2520Hyun%2520and%2520Gilhan%2520Park%2520and%2520WonJun%2520Moon%2520and%2520Jae-Pil%2520Heo%26entry.1292438233%3DA%2520sliding-window%2520inference%2520strategy%2520is%2520commonly%2520adopted%2520in%2520recent%2520training-free%2520open-vocabulary%2520semantic%2520segmentation%2520methods%2520to%2520overcome%2520limitation%2520of%2520the%2520CLIP%2520in%2520processing%2520high-resolution%2520images.%2520However%252C%2520this%2520approach%2520introduces%2520a%2520new%2520challenge%253A%2520each%2520window%2520is%2520proce

{"title": "Is AI Catching Up to Human Expression? Exploring Emotion, Personality, Authorship, and Linguistic Style in English and Arabic with Six Large Language Models", "author": "Nasser A Alsadhan", "abstract": "The advancing fluency of LLMs raises important questions about their ability to emulate complex human traits, including emotional expression and personality, across diverse linguistic and cultural contexts. This study investigates whether LLMs can convincingly mimic emotional nuance in English and personality markers in Arabic, a critical under-resourced language with unique linguistic and cultural characteristics. We conduct two tasks across six models:Jais, Mistral, LLaMA, GPT-4o, Gemini, and DeepSeek. First, we evaluate whether machine classifiers can reliably distinguish between human-authored and AI-generated texts. Second, we assess the extent to which LLM-generated texts exhibit emotional or personality traits comparable to those of humans. Our results demonstrate that AI-generated texts are distinguishable from human-authored ones (F1>0.95), though classification performance deteriorates on paraphrased samples, indicating a reliance on superficial stylistic cues. Emotion and personality classification experiments reveal significant generalization gaps: classifiers trained on human data perform poorly on AI-generated texts and vice versa, suggesting LLMs encode affective signals differently from humans. Importantly, augmenting training with AI-generated data enhances performance in the Arabic personality classification task, highlighting the potential of synthetic data to address challenges in under-resourced languages. Model-specific analyses show that GPT-4o and Gemini exhibit superior affective coherence. Linguistic and psycholinguistic analyses reveal measurable divergences in tone, authenticity, and textual complexity between human and AI texts. These findings have implications for affective computing, authorship attribution, and responsible AI deployment, particularly within underresourced language contexts where generative AI detection and alignment pose unique challenges.", "link": "http://arxiv.org/abs/2603.23251v1", "date": "2026-03-24", "relevancy": 2.2566, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.463}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4477}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4433}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Is%20AI%20Catching%20Up%20to%20Human%20Expression%3F%20Exploring%20Emotion%2C%20Personality%2C%20Authorship%2C%20and%20Linguistic%20Style%20in%20English%20and%20Arabic%20with%20Six%20Large%20Language%20Models&body=Title%3A%20Is%20AI%20Catching%20Up%20to%20Human%20Expression%3F%20Exploring%20Emotion%2C%20Personality%2C%20Authorship%2C%20and%20Linguistic%20Style%20in%20English%20and%20Arabic%20with%20Six%20Large%20Language%20Models%0AAuthor%3A%20Nasser%20A%20Alsadhan%0AAbstract%3A%20The%20advancing%20fluency%20of%20LLMs%20raises%20important%20questions%20about%20their%20ability%20to%20emulate%20complex%20human%20traits%2C%20including%20emotional%20expression%20and%20personality%2C%20across%20diverse%20linguistic%20and%20cultural%20contexts.%20This%20study%20investigates%20whether%20LLMs%20can%20convincingly%20mimic%20emotional%20nuance%20in%20English%20and%20personality%20markers%20in%20Arabic%2C%20a%20critical%20under-resourced%20language%20with%20unique%20linguistic%20and%20cultural%20characteristics.%20We%20conduct%20two%20tasks%20across%20six%20models%3AJais%2C%20Mistral%2C%20LLaMA%2C%20GPT-4o%2C%20Gemini%2C%20and%20DeepSeek.%20First%2C%20we%20evaluate%20whether%20machine%20classifiers%20can%20reliably%20distinguish%20between%20human-authored%20and%20AI-generated%20texts.%20Second%2C%20we%20assess%20the%20extent%20to%20which%20LLM-generated%20texts%20exhibit%20emotional%20or%20personality%20traits%20comparable%20to%20those%20of%20humans.%20Our%20results%20demonstrate%20that%20AI-generated%20texts%20are%20distinguishable%20from%20human-authored%20ones%20%28F1%3E0.95%29%2C%20though%20classification%20performance%20deteriorates%20on%20paraphrased%20samples%2C%20indicating%20a%20reliance%20on%20superficial%20stylistic%20cues.%20Emotion%20and%20personality%20classification%20experiments%20reveal%20significant%20generalization%20gaps%3A%20classifiers%20trained%20on%20human%20data%20perform%20poorly%20on%20AI-generated%20texts%20and%20vice%20versa%2C%20suggesting%20LLMs%20encode%20affective%20signals%20differently%20from%20humans.%20Importantly%2C%20augmenting%20training%20with%20AI-generated%20data%20enhances%20performance%20in%20the%20Arabic%20personality%20classification%20task%2C%20highlighting%20the%20potential%20of%20synthetic%20data%20to%20address%20challenges%20in%20under-resourced%20languages.%20Model-specific%20analyses%20show%20that%20GPT-4o%20and%20Gemini%20exhibit%20superior%20affective%20coherence.%20Linguistic%20and%20psycholinguistic%20analyses%20reveal%20measurable%20divergences%20in%20tone%2C%20authenticity%2C%20and%20textual%20complexity%20between%20human%20and%20AI%20texts.%20These%20findings%20have%20implications%20for%20affective%20computing%2C%20authorship%20attribution%2C%20and%20responsible%20AI%20deployment%2C%20particularly%20within%20underresourced%20language%20contexts%20where%20generative%20AI%20detection%20and%20alignment%20pose%20unique%20challenges.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23251v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIs%2520AI%2520Catching%2520Up%2520to%2520Human%2520Expression%253F%2520Exploring%2520Emotion%252C%2520Personality%252C%2520Authorship%252C {"title": "EVA: Aligning Video World Models with Executable Robot Actions via Inverse Dynamics Rewards", "author": "Ruixiang Wang and Qingming Liu and Yueci Deng and Guiliang Liu and Zhen Liu and Kui Jia", "abstract": "Video generative models are increasingly used as world models for robotics, where a model generates a future visual rollout conditioned on the current observation and task instruction, and an inverse dynamics model (IDM) converts the generated frames into executable robot actions. However, current video world models lack explicit executability constraints. As a result, visually coherent rollouts may still violate rigid-body and kinematic consistency, producing unstable or infeasible control commands when decoded by an IDM. We refer to this mismatch between visual generation and physically executable control as the executability gap. While this gap can be mitigated at inference time using techniques such as rejection sampling, such approaches are inefficient due to the high cost of video generation. In this paper, we leverage the executability gap as a training signal and introduce Executable Video Alignment (EVA), a reinforcement-learning post-training framework for aligning video world models. EVA trains an inverse dynamics model on real robot trajectories and repurposes it as a reward model that evaluates generated videos through the action sequences they induce, encouraging smooth motions measured by velocity, acceleration, and jerk while penalizing actions that violate embodiment constraints. Importantly, the reward remains informative even when generated videos contain severe visual artifacts, since such artifacts typically translate into unstable or out-of-bound actions. Experiments on the RoboTwin benchmark and a real bimanual robot show that EVA reduces embodiment-specific artifacts in generated rollouts and improves downstream task execution success.", "link": "http://arxiv.org/abs/2603.17808v2", "date": "2026-03-24", "relevancy": 2.2348, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5694}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5517}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards&body=Title%3A%20EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards%0AAuthor%3A%20Ruixiang%20Wang%20and%20Qingming%20Liu%20and%20Yueci%20Deng%20and%20Guiliang%20Liu%20and%20Zhen%20Liu%20and%20Kui%20Jia%0AAbstract%3A%20Video%20generative%20models%20are%20increasingly%20used%20as%20world%20models%20for%20robotics%2C%20where%20a%20model%20generates%20a%20future%20visual%20rollout%20conditioned%20on%20the%20current%20observation%20and%20task%20instruction%2C%20and%20an%20inverse%20dynamics%20model%20%28IDM%29%20converts%20the%20generated%20frames%20into%20executable%20robot%20actions.%20However%2C%20current%20video%20world%20models%20lack%20explicit%20executability%20constraints.%20As%20a%20result%2C%20visually%20coherent%20rollouts%20may%20still%20violate%20rigid-body%20and%20kinematic%20consistency%2C%20producing%20unstable%20or%20infeasible%20control%20commands%20when%20decoded%20by%20an%20IDM.%20We%20refer%20to%20this%20mismatch%20between%20visual%20generation%20and%20physically%20executable%20control%20as%20the%20executability%20gap.%20While%20this%20gap%20can%20be%20mitigated%20at%20inference%20time%20using%20techniques%20such%20as%20rejection%20sampling%2C%20such%20approaches%20are%20inefficient%20due%20to%20the%20high%20cost%20of%20video%20generation.%20In%20this%20paper%2C%20we%20leverage%20the%20executability%20gap%20as%20a%20training%20signal%20and%20introduce%20Executable%20Video%20Alignment%20%28EVA%29%2C%20a%20reinforcement-learning%20post-training%20framework%20for%20aligning%20video%20world%20models.%20EVA%20trains%20an%20inverse%20dynamics%20model%20on%20real%20robot%20trajectories%20and%20repurposes%20it%20as%20a%20reward%20model%20that%20evaluates%20generated%20videos%20through%20the%20action%20sequences%20they%20induce%2C%20encouraging%20smooth%20motions%20measured%20by%20velocity%2C%20acceleration%2C%20and%20jerk%20while%20penalizing%20actions%20that%20violate%20embodiment%20constraints.%20Importantly%2C%20the%20reward%20remains%20informative%20even%20when%20generated%20videos%20contain%20severe%20visual%20artifacts%2C%20since%20such%20artifacts%20typically%20translate%20into%20unstable%20or%20out-of-bound%20actions.%20Experiments%20on%20the%20RoboTwin%20benchmark%20and%20a%20real%20bimanual%20robot%20show%20that%20EVA%20reduces%20embodiment-specific%20artifacts%20in%20generated%20rollouts%20and%20improves%20downstream%20task%20execution%20success.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17808v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEVA%253A%2520Aligning%2520Video%2520World%2520Models%2520with%2520Executable%2520Robot%2520Actions%2520via%2520Inverse%2520Dynamics%2520Rewards%26entry.906535625%3DRuixiang%2520Wang%2520and%2520Qingming%2520Liu%2520and%2520Yueci%2520Deng%2520and%2520Guiliang%2520Liu%2520and%2520Zhen%2520Liu%2520and%2520Kui%2520Jia%26entry.1292438233%3DVideo%2520generative%2520models%2520are%2520increasingly%2520used%2520as%2520world%2520models%2520for%2520robotics%252C%2520where%2520a%2520model%2520generates%2520a%2520future%2520visual%2520rollout%2520conditioned%2520on%2520the%2520current%2520observation%2520and%2520task%2520instruction%252C%2520and%2520an%2520inverse%2520dynamics%2520model%2520%2528IDM%2529%2520convert 2520out-of-bound%2520actions.%2520Experiments%2520on%2520the%2520RoboTwin%2520benchmark%2520and%2520a%2520real%2520bimanual%2520robot%2520show%2520that%2520EVA%2520reduces%2520embodiment-specific%2520artifacts%2520in%2520generated%2520rollouts%2520and%2520improves%2520downstream%2520task%2520execution%2520success.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17808v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards&entry.906535625=Ruixiang%20Wang%20and%20Qingming%20Liu%20and%20Yueci%20Deng%20and%20Guiliang%20Liu%20and%20Zhen%20Liu%20and%20Kui%20Jia&entry.1292438233=Video%20generative%20models%20are%20increasingly%20used%20as%20world%20models%20for%20robotics%2C%20where%20a%20model%20generates%20a%20future%20visual%20rollout%20conditioned%20on%20the%20current%20observation%20and%20task%20instruction%2C%20and%20an%20inverse%20dynamics%20model%20%28IDM%29%20converts%20the%20generated%20frames%20into%20executable%20robot%20actions.%20However%2C%20current%20video%20world%20models%20lack%20explicit%20executability%20constraints.%20As%20a%20result%2C%20visually%20coherent%20rollouts%20may%20still%20violate%20rigid-body%20and%20kinematic%20consistency%2C%20producing%20unstable%20or%20infeasible%20control%20commands%20when%20decoded%20by%20an%20IDM.%20We%20refer%20to%20this%20mismatch%20between%20visual%20generation%20and%20physically%20executable%20control%20as%20the%20executability%20gap.%20While%20this%20gap%20can%20be%20mitigated%20at%20inference%20time%20using%20techniques%20such%20as%20rejection%20sampling%2C%20such%20approaches%20are%20inefficient%20due%20to%20the%20high%20cost%20of%20video%20generation.%20In%20this%20paper%2C%20we%20leverage%20the%20executability%20gap%20as%20a%20training%20signal%20and%20introduce%20Executable%20Video%20Alignm {"title": "Integrated cooperative localization of heterogeneous measurement swarm: A unified data-driven method", "author": "Kunrui Ze and Wei Wang and Guibin Sun and Jiaqi Yan and Kexin Liu and Jinhu L\u00fc", "abstract": "The cooperative localization (CL) problem in heterogeneous robotic systems with different measurement capabilities is investigated in this work. In practice, heterogeneous sensors lead to directed and sparse measurement topologies, whereas most existing CL approaches rely on multilateral localization with restrictive multi-neighbor geometric requirements. To overcome this limitation, we enable pairwise relative localization (RL) between neighboring robots using only mutual measurement and odometry information. A unified data-driven adaptive RL estimator is first developed to handle heterogeneous and unidirectional measurements. Based on the convergent RL estimates, a distributed pose-coupling CL strategy is then designed, which guarantees CL under a weakly connected directed measurement topology, representing the least restrictive condition among existing results. The proposed method is independent of specific control tasks and is validated through a formation control application and real-world experiments.", "link": "http://arxiv.org/abs/2603.04932v2", "date": "2026-03-24", "relevancy": 2.2316, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5631}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5615}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Integrated%20cooperative%20localization%20of%20heterogeneous%20measurement%20swarm%3A%20A%20unified%20data-driven%20method&body=Title%3A%20Integrated%20cooperative%20localization%20of%20heterogeneous%20measurement%20swarm%3A%20A%20unified%20data-driven%20method%0AAuthor%3A%20Kunrui%20Ze%20and%20Wei%20Wang%20and%20Guibin%20Sun%20and%20Jiaqi%20Yan%20and%20Kexin%20Liu%20and%20Jinhu%20L%C3%BC%0AAbstract%3A%20The%20cooperative%20localization%20%28CL%29%20problem%20in%20heterogeneous%20robotic%20systems%20with%20different%20measurement%20capabilities%20is%20investigated%20in%20this%20work.%20In%20practice%2C%20heterogeneous%20sensors%20lead%20to%20directed%20and%20sparse%20measurement%20topologies%2C%20whereas%20most%20existing%20CL%20approaches%20rely%20on%20multilateral%20localization%20with%20restrictive%20multi-neighbor%20geometric%20requirements.%20To%20overcome%20this%20limitation%2C%20we%20enable%20pairwise%20relative%20localization%20%28RL%29%20between%20neighboring%20robots%20using%20only%20mutual%20measurement%20and%20odometry%20information.%20A%20unified%20data-driven%20adaptive%20RL%20estimator%20is%20first%20developed%20to%20handle%20heterogeneous%20and%20unidirectional%20measurements.%20Based%20on%20the%20convergent%20RL%20estimates%2C%20a%20distributed%20pose-coupling%20CL%20strategy%20is%20then%20designed%2C%20which%20guarantees%20CL%20under%20a%20weakly%20connected%20directed%20measurement%20topology%2C%20representing%20the%20least%20restrictive%20condition%20among%20existing%20results.%20The%20proposed%20method%20is%20independent%20of%20specific%20control%20tasks%20and%20is%20validated%20through%20a%20formation%20control%20application%20and%20real-world%20experiments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04932v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIntegrated%2520cooperative%2520localization%2520of%2520heterogeneous%2520measurement%2520swarm%253A%2520A%2520unified%2520data-driven%2520method%26entr ve%20localization%20of%20heterogeneous%20measurement%20swarm%3A%20A%20unified%20data-driven%20method&entry.906535625=Kunrui%20Ze%20and%20Wei%20Wang%20and%20Guibin%20Sun%20and%20Jiaqi%20Yan%20and%20Kexin%20Liu%20and%20Jinhu%20L%C3%BC&entry.1292438233=The%20cooperative%20localization%20%28CL%29%20problem%20in%20heterogeneous%20robotic%20systems%20with%20different%20measurement%20capabilities%20is%20investigated%20in%20this%20work.%20In%20practice%2C%20heterogeneous%20sensors%20lead%20to%20directed%20and%20sparse%20measurement%20topologies%2C%20whereas%20most%20existing%20CL%20approaches%20rely%20on%20multilateral%20localization%20with%20restrictive%20multi-neighbor%20geometric%20requirements.%20To%20overcome%20this%20limitation%2C%20we%20enable%20pairwise%20relative%20localization%20%28RL%29%20between%20neighboring%20robots%20using%20only%20mutual%20measurement%20and%20odometry%20information.%20A%20unified%20data-driven%20adaptive%20RL%20estimator%20is%20first%20developed%20to%20handle%20heterogeneous%20and%20unidirectional%20measurements.%20Based%20on%20the%20convergent%20RL%20estimates%2C%20a%20distributed%20pose-coupling%20CL%20strategy%20is%20then%20designed%2C%20which%20guarantees%20CL%20under%20a%20weakly%20connected%20directed%20measurement%20topology%2C%20representing%20the%20least%20restrictive%20condition%20among%20existing%20results.%20The%20proposed%20method%20is%20independent%20of%20specific%20control%20tasks%20and%20is%20validated%20through%20a%20formation%20control%20application%20and%20real-world%20experiments.&entry.1838667208=http%3A//arxiv.org/abs/2603.04932v2&entry.124074799=Read"},
{"title": "Decoding AI Authorship: Can LLMs Truly Mimic Human Style Across Literature and Politics?", "author": "Nasser A Alsadhan", "abstract": "Amidst the rising capabilities of generative AI to mimic specific human styles, this study investigates the ability of state-of-the-art large language models (LLMs), including GPT-4o, Gemini 1.5 Pro, and Claude Sonnet 3.5, to emulate the authorial signatures of prominent literary and political figures: Walt Whitman, William Wordsworth, Donald Trump, and Barack Obama. Utilizing a zero-shot prompting framework with strict thematic alignment, we generated synthetic corpora evaluated through a complementary framework combining transformer-based classification (BERT) and interpretable machine learning (XGBoost). Our methodology integrates Linguistic Inquiry and Word Count (LIWC) markers, perplexity, and readability indices to assess the divergence between AI-generated and human-authored text. Results demonstrate that AI-generated mimicry remains highly detectable, with XGBoost models trained on a restricted set of eight stylometric features achieving accuracy comparable to high-dimensional neural classifiers. Feature importance analyses identify perplexity as the primary discriminative metric, revealing a significant divergence in the stochastic regularity of AI outputs compared to the higher variability of human writing. While LLMs exhibit distributional convergence with human authors on low-dimensional heuristic features, such as syntactic complexity and readability, they do not yet fully replicate the nuanced affective density and stylistic variance inherent in the human-authored corpus. By isolating the specific statistical gaps in current generative mimicry, this study provides a comprehensive benchmark for LLM stylistic behavior and offers critical insights for authorship attribution in the digital humanities and social media.", "link": "http://arxiv.org/abs/2603.23219v1", "date": "2026-03-24", "relevancy": 2.2294, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.46}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4504}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4272}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoding%20AI%20Authorship%3A%20Can%20LLMs%20Truly%20Mimic%20Human%20Style%20Across%20Literature%20and%20Politics%3F&body=Title%3A%20Decoding%20AI%20Authorship%3A%20Can%20LLMs%20Truly%20Mimic%20Human%20Style%20Across%20Literature%20and%20Politics%3F%0AAuthor%3A%20Nasser%20A%20Alsadhan%0AAbstract%3A%20Amidst%20the%20rising%20capabilities%20of%20generative%20AI%20to%20mimic%20specific%20human%20styles%2C%20this%20study%20investigates%20the%20ability%20of%20state-of-the-art%20large%20language%20models%20%28LLMs%29%2C%20including%20GPT-4o%2C%20Gemini%201.5%20Pro%2C%20and%20Claude%20Sonnet%203.5%2C%20to%20emulate%20the%20authorial%20signatures%20of%20prominent%20literary%20and%20political%20figures%3A%20Walt%20Whitman%2C%20William%20Wordsworth%2C%20Donald%20Trump%2C%20and%20Barack%20Obama.%20Utilizing%20a%20zero-shot%20prompting%20framework%20with%20strict%20thematic%20alignment%2C%20we%20generated%20synthetic%20corpora%20evaluated%20through%20a%20complementary%20framework%20combining%20transformer-based%20classification%20%28BERT%29%20and%20interpretable%20machine%20learning%20%28XGBoost%29.%20Our%20methodology%20integrates%20Linguistic%20Inquiry%20and%20Word%20Count%20%28LIWC%29%20markers%2C%20perplexity%2C%20and%20readability%20indices%20to%20assess%20the%20divergence%20between%20AI-generated%20and%20human-authored%20text.%20Results%20demonstrate%20that%20AI-generated%20mimicry%20remains%20highly%20detectable%2C%20with%20XGBoost%20models%20trained%20on%20a%20restricted%20set%20of%20eight%20stylometric%20features%20achieving%20accuracy%20comparable%20to%20high-dimensional%20neural%20classifiers.%20Feature%20importance%20analyses%20identify%20perplexity%20as%20the%20primary%20discriminative%20metric%2C%20revealing%20a%20significant%20divergence%20in%20the%20stochastic%20regularity%20of%20AI%20outputs%20compared%20to%20the%20higher%20variability%20of%20human%20writing.%20While%20LLMs%20exhibit%20distributional%20convergence%20with%20human%20authors%20on%20low-dimensional%20heuristic%20features%2C%20such%20as%20syntactic%20complexity%20and%20readability%2C%20they%20do%20not%20yet%20fully%20replicate%20the%20nuanced%20affective%20density%20and%20stylistic%20variance%20inherent%20in%20the%20human-authored%20corpus.%20By%20isolating%20the%20specific%20statistical%20gaps%20in%20current%20generative%20mimicry%2C%20this%20study%20provides%20a%20comprehensive%20benchmark%20for%20LLM%20stylistic%20behavior%20and%20offers%20critical%20insights%20for%20authorship%20attribution%20in%20the%20digital%20humanities%20and%20social%20media.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23219v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoding%2520AI%2520Authorship%253A%2520Can%2520LLMs%2520Truly%2520Mimic%2520Human%2520Style%2520Across%2520Literature%2520and%2520Politics%253F%26entry.906535625%3DNasser%2520A%2520Alsadhan%26entry.1292438233%3DAmidst%2520the%2520rising%2520capabilities%2520of%2520generative%2520AI%2520to%2520mimic%2520specific%2520human%2520styles%252C%2520this%2520study%2520investigates%2520the%2520ability%2520of%2520state-of-the-art%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520including%2520GPT-4o%252C%2520Gemini%25201.5%2520Pro%252C%2520and%2520Claude%2520Sonnet%25203.5%252C%2520to%2520emulate%2520the%2520authorial%2520signatures%2520of%2520prominent%2520literary%2520and%2520political%2520figures%253A%2520Wal {"title": "VoDaSuRe: A Large-Scale Dataset Revealing Domain Shift in Volumetric Super-Resolution", "author": "August Leander H\u00f8eg and Sophia Wiinberg Bardenfleth and Hans Martin Kjer and Tim Bj\u00f8rn Dyrby and Vedrana Andersen Dahl and Anders Bjorholm Dahl", "abstract": "Recent advances in volumetric super-resolution (SR) have demonstrated strong performance in medical and scientific imaging, with transformer- and CNN-based approaches achieving impressive results even at extreme scaling factors. In this work, we show that much of this performance stems from training on downsampled data rather than real low-resolution scans. This reliance on downsampling is partly driven by the scarcity of paired high- and low-resolution 3D datasets. To address this, we introduce VoDaSuRe, a large-scale volumetric dataset containing paired high- and low-resolution scans. When training models on VoDaSuRe, we reveal a significant discrepancy: SR models trained on downsampled data produce substantially sharper predictions than those trained on real low-resolution scans, which smooth fine structures. Conversely, applying models trained on downsampled data to real scans preserves more structure but is inaccurate. Our findings suggest that current SR methods are overstated - when applied to real data, they do not recover structures lost in low-resolution scans and instead predict a smoothed average. We argue that progress in deep learning-based volumetric SR requires datasets with paired real scans of high complexity, such as VoDaSuRe. Our dataset and code are publicly available through: https://augusthoeg.github.io/VoDaSuRe/", "link": "http://arxiv.org/abs/2603.23153v1", "date": "2026-03-24", "relevancy": 2.2281, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5691}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5585}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VoDaSuRe%3A%20A%20Large-Scale%20Dataset%20Revealing%20Domain%20Shift%20in%20Volumetric%20Super-Resolution&body=Title%3A%20VoDaSuRe%3A%20A%20Large-Scale%20Dataset%20Revealing%20Domain%20Shift%20in%20Volumetric%20Super-Resolution%0AAuthor%3A%20August%20Leander%20H%C3%B8eg%20and%20Sophia%20Wiinberg%20Bardenfleth%20and%20Hans%20Martin%20Kjer%20and%20Tim%20Bj%C3%B8rn%20Dyrby%20and%20Vedrana%20Andersen%20Dahl%20and%20Anders%20Bjorholm%20Dahl%0AAbstract%3A%20Recent%20advances%20in%20volumetric%20super-resolution%20%28SR%29%20have%20demonstrated%20strong%20performance%20in%20medical%20and%20scientific%20imaging%2C%20with%20transformer-%20and%20CNN-based%20approaches%20achieving%20impressive%20results%20even%20at%20extreme%20scaling%20factors.%20In%20this%20work%2C%20we%20show%20that%20much%20of%20this%20performance%20stems%20from%20training%20on%20downsampled%20data%20rather%20than%20real%20low-resolution%20scans.%20This%20reliance%20on%20downsampling%20is%20partly%20driven%20by%20the%20scarcity%20of%20paired%20high-%20and%20low-resolution%203D%20datasets.%20To%20address%20this%2C%20we%20introduce%20VoDaSuRe%2C%20a%20large-scale%20volumetric%20dataset%20containing%20paired%20high-%20and%20low-resolution%20scans.%20When%20training%20models%20on%20VoDaSuRe%2C%20we%20reveal%20a%20significant%20discrepancy%3A%20SR%20models%20trained%20on%20downsampled%20data%20produce%20substantially%20sharper%20predictions%20than%20those%20trained%20on%20real%20low-resolution%20scans%2C%20which%20smooth%20fine%20structures.%20Conversely%2C%20applying%20models%20trained%20on%20downsampled%20data%20to%20real%20scans%20preserves%20more%20structure%20but%20is%20inaccurate.%20Our%20findings%20suggest%20that%20current%20SR%20methods%20are%20overstated%20-%20when%20applied%20to%20real%20data%2C%20they%20do%20not%20recover%20structures%20lost%20in%20low-resolution%20scans%20and%20instead%20predict%20a%20smoothed%20average.%20We%20argue%20that%20progress%20in%20deep%20learning-based%20volumetric%20SR%20requires%20datasets%20with%20paired%20real%20scans%20of%20high%20complexity%2C%20such%20as%20VoDaSuRe.%20Our%20dataset%20and%20code%20are%20publicly%20available%20through%3A%20https%3A//augusthoeg.github.io/VoDaSuRe/%0ALink%3A%20http%3A//arxiv.org/abs/2603.23153v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVoDaSuRe%253A%2520A%2520Large-Scale%2520Dataset%2520Revealing%2520Domain%2520Shift%2520in%2520Volumetric%2520Super-Resolution%26entry.906535625%3DAugust%2520Leander%2520H%25C3%25B8eg%2520and%2520Sophia%2520Wiinberg%2520Bardenfleth%2520and%2520Hans%2520Martin%2520Kjer%2520and%2520Tim%2520Bj%25C3%25B8rn%2520Dyrby%2520and%2520Vedrana%2520Andersen%2520Dahl%2520and%2520Anders%2520Bjorholm%2520Dahl%26entry.1292438233%3DRecent%2520advances%2520in%2520volumetric%2520super-resolution%2520%2528SR%2529%2520have%2520demonstrated%2520strong%2520performance%2520in%2520medical%2520and%2520scientific%2520imaging%252C%2520with%2520transformer-%2520and%2520CNN-based%2520approaches%2520achieving%2520impressive%2520results%2520even%2520at%2520extreme%2520scaling%2520factors.%2520In%2520this%2520work%252C%2520we%2520show%2520that%2520much%2520of%2520this%2520performance%2520stems%2520from%2520training%2520on%2520downsampled%2520data%2520rather%2520than%2520real%2520low-resolution%2520scans.%2520This%2520reliance%2520on%2520downsampling%2520is%2520partly%2520driven%2520by%2520the%2520scarcity%2520of%2520paired%2520high-%2520and%2520low-resolution%25203D%2520datasets.%2520To%2520address%2520this%252C%2520we%2520introduce%2520VoDaSuRe%252C%2520a%2520large-scale%2520volumetric%2520dataset%2520containing%2520paired%2520high- {"title": "Multi-Modal Image Fusion via Intervention-Stable Feature Learning", "author": "Xue Wang and Zheng Guan and Wenhua Qian and Chengchao Wang and Runzhuo Ma", "abstract": "Multi-modal image fusion integrates complementary information from different modalities into a unified representation. Current methods predominantly optimize statistical correlations between modalities, often capturing dataset-induced spurious associations that degrade under distribution shifts. In this paper, we propose an intervention-based framework inspired by causal principles to identify robust cross-modal dependencies. Drawing insights from Pearl's causal hierarchy, we design three principled intervention strategies to probe different aspects of modal relationships: i) complementary masking with spatially disjoint perturbations tests whether modalities can genuinely compensate for each other's missing information, ii) random masking of identical regions identifies feature subsets that remain informative under partial observability, and iii) modality dropout evaluates the irreplaceable contribution of each modality. Based on these interventions, we introduce a Causal Feature Integrator (CFI) that learns to identify and prioritize intervention-stable features maintaining importance across different perturbation patterns through adaptive invariance gating, thereby capturing robust modal dependencies rather than spurious correlations. Extensive experiments demonstrate that our method achieves SOTA performance on both public benchmarks and downstream high-level vision tasks.", "link": "http://arxiv.org/abs/2603.23272v1", "date": "2026-03-24", "relevancy": 2.2186, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5868}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5593}, {"title": "Flexible Vi ntaining%20importance%20across%20different%20perturbation%20patterns%20through%20adaptive%20invariance%20gating%2C%20thereby%20capturing%20robust%20modal%20dependencies%20rather%20than%20spurious%20correlations.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20SOTA%20performance%20on%20both%20public%20benchmarks%20and%20downstream%20high-level%20vision%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23272v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-Modal%2520Image%2520Fusion%2520via%2520Intervention-Stable%2520Feature%2520Learning%26entry.906535625%3DXue%2520Wang%2520and%2520Zheng%2520Guan%2520and%2520Wenhua%2520Qian%2520and%2520Chengchao%2520Wang%2520and%2520Runzhuo%2520Ma%26entry.1292438233%3DMulti-modal%2520image%2520fusion%2520integrates%2520complementary%2520information%2520from%2520different%2520modalities%2520into%2520a%2520unified%2520representation.%2520Current%2520methods%2520predominantly%2520optimize%2520statistical%2520correlations%2520between%2520modalities%252C%2520often%2520capturing%2520dataset-induced%2520spurious%2520associations%2520that%2520degrade%2520under%2520distribution%2520shifts.%2520In%2520this%2520paper%252C%2520we%2520propose%2520an%2520intervention-based%2520framework%2520inspired%2520by%2520causal%2520principles%2520to%2520identify%2520robust%2520cross-modal%2520dependencies.%2520Drawing%2520insights%2520from%2520Pearl%2527s%2520causal%2520hierarchy%252C%2520we%2520design%2520three%2520principled%2520intervention%2520strategies%2520to%2520probe%2520different%2520aspects%2520of%2520modal%2520relationships%253A%2520i%2529%2520complementary%2520masking%2520with%2520spatially%2520disjoint%2520perturbations%2520tests%2520whether%2520modalities%2520can%2520genuinely%2520compensate%2520for%2520each%2520other%2527s%2520missing%2520information%252C%2520ii%2529%2520random%2520masking%2520of%2520identical%2520regions%252 {"title": "POVQA: Preference-Optimized Video Question Answering with Rationales for Data Efficiency", "author": "Ashim Dahal and Ankit Ghimire and Saydul Akbar Murad and Nick Rahimi", "abstract": "Video Question Answering (VQA) with Large Vision Language Models (LVLMs) has gained significant traction in research ever since the Flamingo was introduced by Deepmind. Recent advancements in large context/long video question answering have allowed VQA tasks to have context window of 1500+ frames. However, this only leads to 50 seconds of video footage without losing any significant information. We introduce POVQA, a data-efficient pipeline that compresses each second of video into a single temporally pooled image (via motion blur and weighted averaging variants) and then align LVLMs with lightweight supervision. Concretely, we build 1 fps input sources using Blend Blur with Last Frame, Weighted Average, Exponential and Ramp pooling and fine-tune QWEN-2.5-VL 7B with supervised two turn target including reasoning and final answer. We apply Supervised Fine Tuning (SFT) and Direct Preference Optimization (DPO) on our novel dataset ReasonVQA consisting of 12 movies with 239 human annotated question-answer with reasoning prompts. On our ReasonVQA dataset, this method dramatically improves performance over pooled baselines: F1 score improves from 0.212 to 0.543, BLEU-4 from 0.031 to 0.291, and ROUGE-L from 0.196 to 0.528. Rationale quality also significantly increases. Cross-evaluation of SFT + DPO on various pooling functions show that the gains persist regardless of the pooling scheme used at train or test time, indicating strong robustness on summarization of temporal evidence. Similar observations were made on zero-shot in TVQA.", "link": "http://arxiv.org/abs/2510.01009v2", "date": "2026-03-24", "relevancy": 2.2134, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5563}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5563}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5387}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20POVQA%3A%20Preference-Optimized%20Video%20Question%20Answering%20with%20Rationales%20for%20Data%20Efficiency&body=Title%3A%20POVQA%3A%20Preference-Optimized%20Video%20Question%20Answering%20with%20Rationales%20for%20Data%20Efficiency%0AAuthor%3A%20Ashim%20Dahal%20and%20Ankit%20Ghimire%20and%20Saydul%20Akbar%20Murad%20and%20Nick%20Rahimi%0AAbstract%3A%20Video%20Question%20Answering%20%28VQA%29%20with%20Large%20Vision%20Language%20Models%20%28LVLMs%29%20has%20gained%20significant%20traction%20in%20research%20ever%20since%20the%20Flamingo%20was%20introduced%20by%20Deepmind.%20Recent%20advancements%20in%20large%20context/long%20video%20question%20answering%20have%20allowed%20VQA%20tasks%20to%20have%20context%20window%20of%201500%2B%20frames.%20However%2C%20this%20only%20leads%20to%2050%20seconds%20of%20video%20footage%20without%20losing%20any%20significant%20information.%20We%20introduce%20POVQA%2C%20a%20data-efficient%20pipeline%20that%20compresses%20each%20second%20of%20video%20into%20a%20single%20temporally%20pooled%20image%20%28via%20motion%20blur%20and%20weighted%20averaging%20variants%29%20and%20then%20align%20LVLMs%20with%20lightweight%20supervision.%20Concretely%2C%20we%20build%201%20fps%20input%20sources%20using%20Blend%20Blur%20with%20Last%20Frame%2C%20Weighted%20Average%2C%20Exponential%20and%20Ramp%20pooling%20and%20fine-tune%20QWEN-2.5-VL%207B%20with%20supervised%20two%20turn%20target%20including%20reasoning%20and%20final%20answer.%20We%20apply%20Supervised%20Fine%20Tuning%20%28SFT%29%20and%20Direct%20Preference%20Optimization%20%28DPO%29%20on%20our%20novel%20dataset%20ReasonVQA%20consisting%20of%2012%20movies%20with%20239%20human%20annotated%20question-answer%20with%20reasoning%20prompts.%20On%20our%20ReasonVQA%20dataset%2C%20this%20method%20dramatically%20improves%20performance%20over%20pooled%20baselines%3A%20F1%20score%20improves%20from%200.212%20to%200.543%2C%20BLEU-4%20from%200.031%20to%200.291%2C%20and%20ROUGE-L%20from%200.196%20to%200.528.%20Rationale%20quality%20also%20significantly%20increases.%20Cross-evaluation%20of%20SFT%20%2B%20DPO%20on%20various%20pooling%20functions%20show%20that%20the%20gains%20persist%20regardless%20of%20the%20pooling%20scheme%20used%20at%20train%20or%20test%20time%2C%20indicating%20strong%20robustness%20on%20summarization%20of%20temporal%20evidence.%20Similar%20observations%20were%20made%20on%20zero-shot%20in%20TVQA.%0ALink%3A%20http%3A//arxiv.org/abs/2510.01009v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPOVQA%253A%2520Preference-Optimized%2520Video%2520Question%2520Answering%2520with%2520Rationales%2520for%2520Data%2520Efficiency%26entry.906535625%3DAshim%2520Dahal%2520and%2520Ankit%2520Ghimire%2520and%2520Saydul%2520Akbar%2520Murad%2520and%2520Nick%2520Rahimi%26entry.1292438233%3DVideo%2520Question%2520Answering%2520%2528VQA%2529%2520with%2520Large%2520Vision%2520Language%2520Models%2520%2528LVLMs%2529%2520has%2520gained%2520significant%2520traction%2520in%2520research%2520ever%2520since%2520the%2520Flamingo%2520was%2520introduced%2520by%2520Deepmind.%2520Recent%2520advancements%2520in%2520large%2520context/long%2520video%2520question%2520answering%2520have%2520allowed%2520VQA%2520tasks%2520to%2520have%2520context%2520window%2520of%25201500%252B%2520frames.%2520However%252C%2520this%2520only%2520leads%2520to%252050%2520seconds%2520of%2520video%2520footage%2520without%2520losing%2520any%2520significant%2520information.%2520We%2520introduce%2520POVQA%252C%2520a%2520data-efficient%2520pip %20DPO%20on%20various%20pooling%20functions%20show%20that%20the%20gains%20persist%20regardless%20of%20the%20pooling%20scheme%20used%20at%20train%20or%20test%20time%2C%20indicating%20strong%20robustness%20on%20summarization%20of%20temporal%20evidence.%20Similar%20observations%20were%20made%20on%20zero-shot%20in%20TVQA.&entry.1838667208=http%3A//arxiv.org/abs/2510.01009v2&entry.124074799=Read"},
{"title": "AgentRVOS: Reasoning over Object Tracks for Zero-Shot Referring Video Object Segmentation", "author": "Woojeong Jin and Jaeho Lee and Heeseong Shin and Seungho Jang and Junhwan Heo and Seungryong Kim", "abstract": "Referring Video Object Segmentation (RVOS) aims to segment a target object throughout a video given a natural language query. Training-free methods for this task follow a common pipeline: a MLLM selects keyframes, grounds the referred object within those frames, and a video segmentation model propagates the results. While intuitive, this design asks the MLLM to make temporal decisions before any object-level evidence is available, limiting both reasoning quality and spatio-temporal coverage. To overcome this, we propose AgentRVOS, a training-free agentic pipeline built on the complementary strengths of SAM3 and a MLLM. Given a concept derived from the query, SAM3 provides reliable perception over the full spatio-temporal extent through generated mask tracks. The MLLM then identifies the target through query-grounded reasoning over this object-level evidence, iteratively pruning guided by SAM3's temporal existence information. Extensive experiments show that AgentRVOS achieves state-of-the-art performance among training-free methods across multiple benchmarks, with consistent results across diverse MLLM backbones. Our project page is available at: https://cvlab-kaist.github.io/AgentRVOS/.", "link": "http://arxiv.org/abs/2603.23489v1", "date": "2026-03-24", "relevancy": 2.201, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5602}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgentRVOS%3A%20Reasoning%20over%20Object%20Tracks%20for%20Zero-Shot%20Referring%20Video%20Object%20Segmentation&body=Title%3A%20AgentRVOS%3A%20Reasoning%20over%20Object%20Tracks%20for%20Zero-Shot%20Referring%20Video%20Object%20Segmentation%0AAuthor%3A%20Woojeong%20Jin%20and%20Jaeho%20Lee%20and%20Heeseong%20Shin%20and%20Seungho%20Jang%20and%20Junhwan%20Heo%20and%20Seungryong%20Kim%0AAbstract%3A%20Referring%20Video%20Object%20Segmentation%20%28RVOS%29%20aims%20to%20segment%20a%20target%20object%20throughout%20a%20video%20given%20a%20natural%20language%20query.%20Training-free%20methods%20for%20this%20task%20follow%20a%20common%20pipeline%3A%20a%20MLLM%20selects%20keyframes%2C%20grounds%20the%20referred%20object%20within%20those%20frames%2C%20and%20a%20video%20segmentation%20model%20propagates%20the%20results.%20While%20intuitive%2C%20this%20design%20asks%20the%20MLLM%20to%20make%20temporal%20decisions%20before%20any%20object-level%20evidence%20is%20available%2C%20limiting%20both%20reasoning%20quality%20and%20spatio-temporal%20coverage.%20To%20overcome%20this%2C%20we%20propose%20AgentRVOS%2C%20a%20training-free%20agentic%20pipeline%20built%20on%20the%20complementary%20strengths%20of%20SAM3%20and%20a%20MLLM.%20Given%20a%20concept%20derived%20from%20the%20query%2C%20SAM3%20provides%20reliable%20perception%20over%20the%20full%20spatio-temporal%20extent%20through%20generated%20mask%20tracks.%20The%20MLLM%20then%20identifies%20the%20target%20through%20query-grounded%20reasoning%20over%20this%20object-level%20evidence%2C%20iteratively%20pruning%20guided%20by%20SAM3%27s%20temporal%20existence%20information.%20Extensive%20experiments%20show%20that%20AgentRVOS%20achieves%20state-of-the-art%20performance%20among%20training-free%20methods%20across%20multiple%20benchmarks%2C%20with%20consistent%20results%20across%20diverse%20MLLM%20backbones.%20Our%20project%20page%20is%20available%20at%3A%20https%3A//cvlab-kaist.github.io/AgentRVOS/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23489v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentRVOS%253A%2520Reasoning%2520over%2520Object%2520Tracks%2520for%2520Zero-Shot%2520Referring%2520Video%2520Object%2520Segmentation%26entry.906535625%3DWoojeong%2520Jin%2520and%2520Jaeho%2520Lee%2520and%2520Heeseong%2520Shin%2520and%2520Seungho%2520Jang%2520and%2520Junhwan%2520Heo%2520and%2520Seungryong%2520Kim%26entry.1292438233%3DReferring%2520Video%2520Object%2520Segmentation%2520%2528RVOS%2529%2520aims%2520to%2520segment%2520a%2520target%2520object%2520throughout%2520a%2520video%2520given%2520a%2520natural%2520language%2520query.%2520Training-free%2520methods%2520for%2520this%2520task%2520follow%2520a%2520common%2520pipeline%253A%2520a%2520MLLM%2520selects%2520keyframes%252C%2520grounds%2520the%2520referred%2520object%2520within%2520those%2520frames%252C%2520and%2520a%2520video%2520segmentation%2520model%2520propagates%2520the%2520results.%2520While%2520intuitive%252C%2520this%2520design%2520asks%2520the%2520MLLM%2520to%2520make%2520temporal%2520decisions%2520before%2520any%2520object-level%2520evidence%2520is%2520available%252C%2520limiting%2520both%2520reasoning%2520quality%2520and%2520spatio-temporal%2520coverage.%2520To%2520overcome%2520this%252C%2520we%2520propose%2520AgentRVOS%252C%2520a%2520training-free%2520agentic%2520pipeline%2520built%2520on%2520the%2520complementary%2520strengths%2520of%2520SAM3%2520and%2520a%2520MLLM.%2520Given%2520a%2520concept%2520derived%2520from%2520the%2520query%252C%2520SAM3%2520provides%2520reliable%2520perception%2520over%2520the%2520full%2520spatio-temporal%2520extent%2520through%2520generated%2520mask%2520tracks.%2520The%2520MLLM%2520then%2520identifies%2520the%2520target%2520through%2520query-grounded%2520reasoning%2520over%2520this%2520object-level%2520evidence%252C%2520iteratively%2520pruning%2520guided%2520by%2520SAM3%2527s%2520temporal%2520existence%2520information.%2520Extensive%2520experiments%2520show%2520that%2520AgentRVOS%2520achieves%2520state-of-the-art%2520performance%2520among%2520training-free%2520methods%2520across%2520multiple%2520benchmarks%252C%2520with%2520consistent%2520results%2520across%2520diverse%2520MLLM%2520backbones.%2520Our%2520project%2520page%2520is%2520available%2520at%253A%2520https%253A//cvlab-kaist.github.io/AgentRVOS/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.23489v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AgentRVOS%3A%20Reasoning%20over%20Object%20Tracks%20for%20Zero-Shot%20Referring%20Video%20Object%20Segmentation&entry.906535625=Woojeong%20Jin%20and%20Jaeho%20Lee%20and%20Heeseong%20Shin%20and%20Seungho%20Jang%20and%20Junhwan%20Heo%20and%20Seungryong%20Kim&entry.1292438233=Referring%20Video%20Object%20Segmentation%20%28RVOS%29%20aims%20to%20segment%20a%20target%20object%20throughout%20a%20video%20given%20a%20natural%20language%20query.%20Training-free%20methods%20for%20this%20task%20follow%20a%20common%20pipeline%3A%20a%20MLLM%20selects%20keyframes%2C%20grounds%20the%20referred%20object%20within%20those%20frames%2C%20and%20a%20video%20segmentation%20model%20propagates%20the%20results.%20While%20intuitive%2C%20this%20design%20asks%20the%20MLLM%20to%20make%20temporal%20decisions%20before%20any%20object-level%20evidence%20is%20available%2C%20limiting%20both%20reasoning%20quality%20and%20spatio-temporal%20coverage.%20To%20overcome%20this%2C%20we%20propose%20AgentRVOS%2C%20a%20training-free%20agentic%20pipeline%20built%20on%20the%20complementary%20strengths%20of%20SAM3%20and%20a%20MLLM.%20Given%20a%20concept%20derived%20from%20the%20query%2C%20SAM3%20provides%20reliable%20perception%20over%20the%20full%20spatio-temporal%20extent%20through%20generated%20mask%20tracks.%20The%20MLLM%2 {"title": "Knot-10:A Tightness-Stratified Benchmark for Real-World Knot Classification with Topological Difficulty Analysis", "author": "Shiheng Nie and Yunguang Yue", "abstract": "Physical knot classification is a fine-grained visual classification (FGVC) scenario in which appearance cues are deliberately suppressed: different classes share the same rope material, color, and background, and class identity resides primarily in crossing structure. We introduce the Knots-10 benchmark, comprising 1,440 images with a deployment-oriented split that trains on loosely tied knots and tests on tightly dressed ones. Swin-T and TransFG both average 97.2% accuracy; PMG scores 94.5%, consistent with the hypothesis that jigsaw shuffling disrupts crossing continuity. McNemar tests cannot separate four of the five general-purpose backbones, so small ranking margins should be interpreted with caution. A Mantel permutation test shows that topological distance significantly correlates with confusion patterns in three of the five models (p < 0.01). We propose TACA regularization, which improves embedding-topology alignment from rho=0.46 to rho=0.65 without improving classification accuracy; a random-distance ablation yields comparable alignment, indicating the benefit is likely driven by generic regularization. A pilot cross-domain test with 100 phone photographs reveals a 58-69 percentage-point accuracy drop, exposing rope appearance bias as the dominant failure mode.", "link": "http://arxiv.org/abs/2603.23286v1", "date": "2026-03-24", "relevancy": 2.2007, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4563}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4341}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link" {"title": "GazeShift: Unsupervised Gaze Estimation and Dataset for VR", "author": "Gil Shapira and Ishay Goldin and Evgeny Artyomov and Donghoon Kim and Yosi Keller and Niv Zehngut", "abstract": "Gaze estimation is instrumental in modern virtual reality (VR) systems. Despite significant progress in remote-camera gaze estimation, VR gaze research remains constrained by data scarcity, particularly the lack of large-scale, accurately labeled datasets captured with the off-axis camera configurations typical of modern headsets. Gaze annotation is difficult since fixation on intended targets cannot be guaranteed. To address these challenges, we introduce VRGaze, the first large-scale off-axis gaze estimation dataset for VR, comprising 2.1 million near-eye infrared images collected from 68 participants. We further propose GazeShift, an attention-guided unsupervised framework for learning gaze representations without labeled data. Unlike prior redirection-based methods that rely on multi-view or 3D geometry, GazeShift is tailored to near-eye imagery, achieving effective gaze-appearance disentanglement in a compact, real-time model. GazeShift embeddings can be optionally adapted to individual users via lightweight few-shot calibration, achieving a 1.84\u00b0 mean error on VRGaze. On the remote-camera MPIIGaze dataset, the model achieves a 7.15\u00b0 person-agnostic error, doing so with 10x fewer parameters and 35x fewer FLOPs than baseline methods. Deployed natively on a VR headset GPU, inference takes only 5 ms. Combined with demonstrated robustness to illumination changes, these results highlight GazeShift as a label-efficient, real-time solution for VR gaze tracking. Project code and the VRGaze dataset are released at https://github.com/gazeshift3/gazeshift", "link": "http://arxiv.org/abs/2603.07832v3", "date": "2026-03-24", "relevancy": 2.1862, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5506}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5496}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GazeShift%3A%20Unsupervised%20Gaze%20Estimation%20and%20Dataset%20for%20VR&body=Title%3A%20GazeShift%3A%20Unsupervised%20Gaze%20Estimation%20and%20Dataset%20for%20VR%0AAuthor%3A%20Gil%20Shapira%20and%20Ishay%20Goldin%20and%20Evgeny%20Artyomov%20and%20Donghoon%20Kim%20and%20Yosi%20Keller%20and%20Niv%20Zehngut%0AAbstract%3A%20Gaze%20estimation%20is%20instrumental%20in%20modern%20virtual%20reality%20%28VR%29%20systems.%20Despite%20significant%20progress%20in%20remote-camera%20gaze%20estimation%2C%20VR%20gaze%20research%20remains%20constrained%20by%20data%20scarcity%2C%20particularly%20the%20lack%20of%20large-scale%2C%20accurately%20labeled%20datasets%20captured%20with%20the%20off-axis%20camera%20configurations%20typical%20of%20modern%20headsets.%20Gaze%20annotation%20is%20difficult%20since%20fixation%20on%20intended%20targets%20cannot%20be%20guaranteed.%20To%20address%20these%20challenges%2C%20we%20introduce%20VRGaze%2C%20the%20first%20large-scale%20off-axis%20gaze%20estimation%20dataset%20for%20VR%2C%20comprising%202.1%20million%20near-eye%20infrared%20images%20collected%20from%2068%20participants.%20We%20further%20propose%20GazeShift%2C%20an%20attention-guided%20unsupervised%20framework%20for%20learning%20gaze%20representations%20without%20labeled%20data.%20Unlike%20prior%20redirection-based%20methods%20that%20rely%20on%20multi-view%20or%203D%20geometry%2C%20GazeShift%20is%20tailored%20to%20near-eye%20imagery%2C%20achieving%20effective%20gaze-appearance%20disentanglement%20in%20a%20compact%2C%20real-time%20model.%20GazeShift%20embeddings%20can%20be%20optionally%20adapted%20to%20individual%20users%20via%20lightweight%20few-shot%20calibration%2C%20achieving%20a%201.84%C2%B0%20mean%20error%20on%20VRGaze.%20On%20the%20remote-camera%20MPIIGaze%20dataset%2C%20the%20model%20achieves%20a%207.15%C2%B0%20person-agnostic%20error%2C%20doing%20so%20with%2010x%20fewer%20parameters%20and%2035x%20fewer%20FLOPs%20than%20baseline%20methods.%20Deployed%20natively%20on%20a%20VR%20headset%20GPU%2C%20inference%20takes%20only%205%20ms.%20Combined%20with%20demonstrated%20robustness%20to%20illumination%20changes%2C%20these%20results%20highlight%20GazeShift%20as%20a%20label-efficient%2C%20real-time%20solution%20for%20VR%20gaze%20tracking.%20Project%20code%20and%20the%20VRGaze%20dataset%20are%20released%20at%20https%3A//github.com/gazeshift3/gazeshift%0ALink%3A%20http%3A//arxiv.org/abs/2603.07832v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGazeShift%253A%2520Unsupervised%2520Gaze%2520Estimation%2520and%2520Dataset%2520for%2520VR%26entry.906535625%3DGil%2520Shapira%2520and%2520Ishay%2520Goldin%2520and%2520Evgeny%2520Artyomov%2520and%2520Donghoon%2520Kim%2520and%2520Yosi%2520Keller%2520and%2520Niv%2520Zehngut%26entry.1292438233%3DGaze%2520estimation%2520is%2520instrumental%2520in%2520modern%2520virtual%2520reality%2520%2528VR%2529%2520systems.%2520Despite%2520significant%2520progress%2520in%2520remote-camera%2520gaze%2520estimation%252C%2520VR%2520gaze%2520research%2520remains%2520constrained%2520by%2520data%2520scarcity%252C%2520particularly%2520the%2520lack%2520of%2520large-scale%252C%2520accurately%2520labeled%2520datasets%2520captured%2520with%2520the%2520off-axis%2520camera%2520configurations%2520typical%2520of%2520modern%2520headsets.%2520Gaze%2520annotation%2520is%2520difficult%2520since%2520fixation%2520on%2520intended%2520targets%2520cannot%2520be%2520guaranteed.%2520To%2520address%2520these%2520challenges%252C%2520we%2520introduce%2520VRG {"title": "Describe-Then-Act: Proactive Agent Steering via Distilled Language-Action World Models", "author": "Massimiliano Pappa and Luca Romani and Valentino Sacco and Alessio Palma and St\u00e9phane Lathuili\u00e8re and Fabio Galasso and Xavier Alameda-Pineda and Indro Spinelli", "abstract": "Deploying safety-critical agents requires anticipating the consequences of actions before they are executed. While world models offer a paradigm for this proactive foresight, current approaches relying on visual simulation incur prohibitive latencies, often exceeding several seconds per step. In this work, we challenge the assumption that visual processing is necessary for failure prevention. We show that a trained policy's latent state, combined with its planned actions, already encodes sufficient information to anticipate action outcomes, making visual simulation redundant for failure prevention. To this end, we introduce DILLO (DIstiLLed Language-ActiOn World Model), a fast steering layer that shifts the paradigm from \"simulate-then-act\" to \"describe-then-act.\" DILLO is trained via cross-modal distillation, where a privileged Vision Language Model teacher annotates offline trajectories and a latent-conditioned Large Language Model student learns to predict semantic outcomes. This creates a text-only inference path, bypassing heavy visual generation entirely, achieving a 14x speedup over baselines. Experiments on MetaWorld and LIBERO demonstrate that DILLO produces high-fidelity descriptions of the next state and is able to steer the policy, improving episode success rate by up to 15 pp and 9.3 pp on average across tasks.", "link": "http://arxiv.org/abs/2603.23149v1", "date": "2026-03-24", "relevancy": 2.1795, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5522}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5473}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Describe-Then-Act%3A%20Proactive%20Agent%20Steering%20via%20Distilled%20Language-Action%20World%20Models&body=Title%3A%20Describe-Then-Act%3A%20Proactive%20Agent%20Steering%20via%20Distilled%20Language-Action%20World%20Models%0AAuthor%3A%20Massimiliano%20Pappa%20and%20Luca%20Romani%20and%20Valentino%20Sacco%20and%20Alessio%20Palma%20and%20St%C3%A9phane%20Lathuili%C3%A8re%20and%20Fabio%20Galasso%20and%20Xavier%20Alameda-Pineda%20and%20Indro%20Spinelli%0AAbstract%3A%20Deploying%20safety-critical%20agents%20requires%20anticipating%20the%20consequences%20of%20actions%20before%20they%20are%20executed.%20While%20world%20models%20offer%20a%20paradigm%20for%20this%20proactive%20foresight%2C%20current%20approaches%20relying%20on%20visual%20simulation%20incur%20prohibitive%20latencies%2C%20often%20exceeding%20several%20seconds%20per%20step.%20In%20this%20work%2C%20we%20challenge%20the%20assumption%20that%20visual%20processing%20is%20necessary%20for%20failure%20prevention.%20We%20show%20that%20a%20trained%20policy%27s%20latent%20state%2C%20combined%20with%20its%20planned%20actions%2C%20already%20encodes%20sufficient%20information%20to%20anticipate%20action%20outcomes%2C%20making%20visual%20simulation%20redundant%20for%20failure%20prevention.%20To%20this%20end%2C%20we%20introduce%20DILLO%20%28DIstiLLed%20Language-ActiOn%20World%20Model%29%2C%20a%20fast%20steering%20layer%20that%20shifts%20the%20paradigm%20from%20%22simulate-then-act%22%20to%20%22describe-then-act.%22%20DILLO%20is%20trained%20via%20cross-modal%20distillation%2C%20where%20a%20privileged%20Vision%20Language%20Model%20teacher%20annotates%20offline%20trajectories%20and%20a%20latent-conditioned%20Large%20Language%20Model%20student%20learns%20to%20predict%20semantic%20outcomes.%20This%20creates%20a%20text-only%20inference%20path%2C%20bypassing%20heavy%20visual%20generation%20entirely%2C%20achieving%20a%2014x%20speedup%20over%20baselines.%20Experiments%20on%20MetaWorld%20and%20LIBERO%20demonstrate%20that%20DILLO%20produces%20high-fidelity%20descriptions%20of%20the%20next%20state%20and%20is%20able%20to%20steer%20the%20policy%2C%20improving%20episode%20success%20rate%20by%20up%20to%2015%20pp%20and%209.3%20pp%20on%20average%20across%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23149v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDescribe-Then-Act%253A%2520Proactive%2520Agent%2520Steering%2520via%2520Distilled%2520Language-Action%2520World%2520Models%26entry.906535625%3DMassimiliano%2520Pappa%2520and%2520Luca%2520Romani%2520and%2520Valentino%2520Sacco%2520and%2520Alessio%2520Palma%2520and%2520St%25C3%25A9phane%2520Lathuili%25C3%25A8re%2520and%2520Fabio%2520Galasso%2520and%2520Xavier%2520Alameda-Pineda%2520and%2520Indro%2520Spinelli%26entry.1292438233%3DDeploying%2520safety-critical%2520agents%2520requires%2520anticipating%2520the%2520consequences%2520of%2520actions%2520before%2520they%2520are%2520executed.%2520While%2520world%2520models%2520offer%2520a%2520paradigm%2520for%2520this%2520proactive%2520foresight%252C%2520current%2520approaches%2520relying%2520on%2520visual%2520simulation%2520incur%2520prohibitive%2520latencies%252C%2520often%2520exceeding%2520several%2520seconds%2520per%2520step.%2520In%2520this%2520work%252C%2520we%2520challenge%2520the%2520assumption%2520that%2520visual%2520processing%2520is%2520necessary%2520for%2520failure%2520prevention.%2520We%2520show%2520that%2520a%2520trained%2520policy%2527s%2520latent%2520state%252C%2520combined%2520with%2520its%2520planned%2520actions%252C%2520already%2520encodes%2520sufficient%2520information%2520to%2520anticipate%2520action%2520outcomes%252C%2520making%2520visual%2520simulation%2520redundant%2520for%2520failure {"title": "Physically Accurate Rigid-Body Dynamics in Particle-Based Simulation", "author": "Ava Abderezaei and Nataliya Nechyporenko and Joseph Miceli and Gilberto Briscoe-Martinez and Alessandro Roncone", "abstract": "Robotics demands simulation that can reason about the diversity of real-world physical interactions, from rigid to deformable objects and fluids. Current simulators address this by stitching together multiple subsolvers for different material types, resulting in a compositional architecture that complicates physical reasoning. Particle-based simulators offer a compelling alternative, representing all materials through a single unified formulation that enables seamless cross-material interactions. Among particle-based simulators, position-based dynamics (PBD) is a popular solver known for its computational efficiency and visual plausibility. However, its lack of physical accuracy has limited its adoption in robotics. To leverage the benefits of particle-based solvers while meeting the physical fidelity demands of robotics, we introduce PBD-R, a revised PBD formulation that enforces physically accurate rigid-body dynamics through a novel momentum-conservation constraint and a modified velocity update. Additionally, we introduce a solver-agnostic benchmark with analytical solutions to evaluate physical accuracy. Using this benchmark, we show that PBD-R significantly outperforms PBD and achieves competitive accuracy with MuJoCo while requiring less computation.", "link": "http://arxiv.org/abs/2603.14634v2", "date": "2026-03-24", "relevancy": 2.1735, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5768}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5604}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physically%20Accurate%20Rigid-Body%20Dynamics%20in%20Particle-Based%20Simulation&body=Title%3A%20Physically%20Accurate%20Rigid-Body%20Dynamics%20in%20Particle-Based%20Simulation%0AAuthor%3A%20Ava%20Abderezaei%20and%20Nataliya%20Nechyporenko%20and%20Joseph%20Miceli%20and%20Gilberto%20Briscoe-Martinez%20and%20Alessandro%20Roncone%0AAbstract%3A%20Robotics%20demands%20simulation%20that%20can%20reason%20about%20the%20diversity%20of%20real-world%20physical%20interactions%2C%20from%20rigid%20to%20deformable%20objects%20and%20fluids.%20Current%20simulators%20address%20this%20by%20stitching%20together%20multiple%20subsolvers%20for%20different%20material%20types%2C%20resulting%20in%20a%20compositional%20architecture%20that%20complicates%20physical%20reasoning.%20Particle-based%20simulators%20offer%20a%20compelling%20alternative%2C%20representing%20all%20materials%20through%20a%20single%20unified%20formulation%20that%20enables%20seamless%20cross-material%20interactions.%20Among%20particle-based%20simulators%2C%20position-based%20dynamics%20%28PBD%29%20is%20a%20popular%20solver%20known%20for%20its%20computational%20efficiency%20and%20visual%20plausibility.%20However%2C%20its%20lack%20of%20physical%20accuracy%20has%20limited%20its%20adoption%20in%20robotics.%20To%20leverage%20the%20benefits%20of%20particle-based%20solvers%20while%20meeting%20the%20physical%20fidelity%20demands%20of%20robotics%2C%20we%20introduce%20PBD-R%2C%20a%20revised%20PBD%20formulation%20that%20enforces%20physically%20accurate%20rigid-body%20dynamics%20through%20a%20novel%20momentum-conservation%20constraint%20and%20a%20modified%20velocity%20update.%20Additionally%2C%20we%20introduce%20a%20solver-agnostic%20benchmark%20with%20analytical%20solutions%20to%20evaluate%20physical%20accuracy.%20Using%20this%20benchmark%2C%20we%20show%20that%20PBD-R%20significantly%20outperforms%20PBD%20and%20achieves%20competitive%20accuracy%20with%20MuJoCo%20while%20requiring%20less%20computation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14634v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysically%2520Accurate%2520Rigid-Body%2520Dynamics%2520in%2520Particle-Based%2520Simulation%26entry.906535625%3DAva%2520Abderezaei%2520and%2520Nataliya%2520Nechyporenko%2520and%2520Joseph%2520Miceli%2520and%2520Gilberto%2520Briscoe-Martinez%2520and%2520Alessandro%2520Roncone%26entry.1292438233%3DRobotics%2520demands%2520simulation%2520that%2520can%2520reason%2520about%2520the%2520diversity%2520of%2520real-world%2520physical%2520interactions%252C%2520from%2520rigid%2520to%2520deformable%2520objects%2520and%2520fluids.%2520Current%2520simulators%2520address%2520this%2520by%2520stitching%2520together%2520multiple%2520subsolvers%2520for%2520different%2520material%2520types%252C%2520resulting%2520in%2520a%2520compositional%2520architecture%2520that%2520complicates%2520physical%2520reasoning.%2520Particle-based%2520simulators%2520offer%2520a%2520compelling%2520alternative%252C%2520representing%2520all%2520materials%2520through%2520a%2520single%2520unified%2520formulation%2520that%2520enables%2520seamless%2520cross-material%2520interactions.%2520Among%2520particle-based%2520simulators%252C%2520position-based%2520dynamics%2520%2528PBD%2529%2520is%2520a%2520popular%2520solver%2520known%2520for%2520its%2520computational%2520efficiency%2520and%2520visual%2520plausibility.%2520However%252C%2520its%2520lack%2520of%2520physical%2520accuracy%2520has%2520limited%2520its%2520adoption%2520in%2520robotics.%2520To%2520leverage%2520the%2520benefits%2520of%2520particle-based%2520solvers%2520while%2520meeting%2520the%2520physical%2520fidelity%2520demands%2520of%2520robotics%252C%2520we%2520introduce%2520PBD-R%252C%2520a%2520revised%2520PBD%2520formulation%2520that%2520enforces%2520physically%2520accurate%2520rigid-body%2520dynamics%2520through%2520a%2520novel%2520momentum-conservation%2520constraint%2520and%2520a%2520modified%2520velocity%2520update.%2520Additionally%252C%2520we%2520introduce%2520a%2520solver-agnostic%2520benchmark%2520with%2520analytical%2520solutions%2520to%2520evaluate%2520physical%2520accuracy.%2520Using%2520this%2520benchmark%252C%2520we%2520show%2520that%2520PBD-R%2520significantly%2520outperforms%2520PBD%2520and%2520achieves%2520competitive%2520accuracy%2520with%2520MuJoCo%2520while%2520requiring%2520less%2520computation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.14634v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Physically%20Accurate%20Rigid-Body%20Dynamics%20in%20Particle-Based%20Simulation&entry.906535625=Ava%20Abderezaei%20and%20Nataliya%20Nechyporenko%20and%20Joseph%20Miceli%20and%20Gilberto%20Briscoe-Martinez%20and%20Alessandro%20Roncone&entry.1292438233=Robotics%20demands%20simulation%20that%20can%20reason%20about%20the%20diversity%20of%20real-world%20physical%20interactions%2C%20from%20rigid%20to%20deformable%20objects%20and%20fluids.%20Current%20simulators%20address%20this%20by%20stitching%20together%20multiple%20subsolvers%20for%20different%20material%20types%2C%20resulting%20in%20a%20compositional%20architecture%20that%20complicates%20physical%20reasoning.%20Particle-based%20simulators%20offer%20a%20compelling%20alternative%2C%20representing%20all%20materials%20through%20a%20single%20unified%20formulation%20that%20enables%20seamless%20cross-material%20interactions.%20Among%20particle-based%20simulators%2C%20position-based%20dynamics%20%28PBD%29%20is%20a%20popular%20solver%20known%20for%20its%20computational%20efficiency%20and%20visual%20plausibility.%20However%2C%20its%20lack%20of%20physical%20accuracy%20has%20limited%20its%20adoption%20in%20robotics.%20To%20leverage%20the%20benefits%20of%20particle-based%20solvers%20while%20meeting%20the%20physical%20fidelity%20demands%20of%20robotics%2C%20we%20introduce%20PBD-R%2C%20a%20revised%20PBD%20formulation%20that%20enforces%20physically%20accurate%20rigid-body%20dynamics%20through%20a%20novel%20momentum-conservation%20constraint%20and%20a%20modified%20velocity%20update.%20Additionally%2C%20we%20introduce%20a%20solver-agnostic%20benchmark%20with%20analytical%20solutions%20to%20evaluate%20physical%20accuracy.%20Using%20this%20benchmark%2C%20we%20show%20that%20PBD-R%20significantly%20outperforms%20PBD%20and%20achieves%20competitive%20accuracy%20with%20MuJoCo%20while%20requiring%20less%20computation.&entry.1838667208=http%3A//arxiv.org/abs/2603.14634v2&entry.124074799=Read"},
{"title": "On-device Semantic Selection Made Low Latency and Memory Efficient with Monolithic Forwarding", "author": "Jiahao Zhou and Chengliang Lin and Dingji Li and Mingkai Dong and Haibo Chen", "abstract": "Semantic top-K selection with cross-encoder rerankers underpins on-device AI services, such as retrieval-augmented generation, agent memory, and personalized recommendation. However, its latency and memory demands dominate end-to-end budgets on edge hardware. Revisiting the objective of top-K selection, we reveal that only relative rankings matter, not exact per-candidate scores. We further observe sequence-level sparsity: relative rankings progressively stabilize in intermediate layers, enabling early pruning prior to completing full inference.\n  Building on this insight, we propose monolithic forwarding and develop a training-free inference system, PRISM. By maintaining a global view of all candidates, it reduces latency through progressive cluster pruning. It also bounds peak memory usage by strategically overlapping I/O with computation via overlapped layer streaming and chunked execution. We evaluate PRISM against state-of-the-art baselines on rerankers from 0.6 B to 8 B parameters across Apple M2 and RTX 5070. PRISM consistently reduces latency by up to 89.2% and peak memory by up to 91.3% in microbenchmarks, without compromising precision. Across three real-world on-device AI applications, PRISM lowers latency by 11.6%-51.0% and peak memory by 18.6%-77.8%, demonstrating substantial improvements in efficiency and deployability.", "link": "http://arxiv.org/abs/2510.15620v2", "date": "2026-03-24", "relevancy": 1.501, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5176}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5024}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4926}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On-device%20Semantic%20Selection%20Made%20Low%20Latency%20and%20Memory%20Efficient%20with%20Monolithic%20Forwarding&body=Title%3A%20On-device%20Semantic%20Selection%20Made%20Low%20Latency%20and%20Memory%20Efficient%20with%20Monolithic%20Forwarding%0AAuthor%3A%20Jiahao%20Zhou%20and%20Chengliang%20Lin%20and%20Dingji%20Li%20and%20Mingkai%20Dong%20and%20Haibo%20Chen%0AAbstract%3A%20Semantic%20top-K%20selection%20with%20cross-encoder%20rerankers%20underpins%20on-device%20AI%20services%2C%20such%20as%20retrieval-augmented%20generation%2C%20agent%20memory%2C%20and%20personalized%20recommendation.%20However%2C%20its%20latency%20and%20memory%20demands%20dominate%20end-to-end%20budgets%20on%20edge%20hardware.%20Revisiting%20the%20objective%20of%20top-K%20selection%2C%20we%20reveal%20that%20only%20relative%20rankings%20matter%2C%20not%20exact%20per-candidate%20scores.%20We%20further%20observe%20sequence-level%20sparsity%3A%20relative%20rankings%20progressively%20stabilize%20in%20intermediate%20layers%2C%20enabling%20early%20pruning%20prior%20to%20completing%20full%20inference.%0A%20%20Building%20on%20this%20insight%2C%20we%20propose%20monolithic%20forwarding%20and%20develop%20a%20training-free%20inference%20system%2C%20PRISM.%20By%20maintaining%20a%20global%20view%20of%20all%20candidates%2C%20it%20reduces%20latency%20through%20progressive%20cluster%20pruning.%20It%20also%20bounds%20peak%20memory%20usage%20by%20strategically%20overlapping%20I/O%20with%20computation%20via%20overlapped%20layer%20streaming%20and%20chunked%20execution.%20We%20evaluate%20PRISM%20against%20state-of-the-art%20baselines%20on%20rerankers%20from%200.6%20B%20to%208%20B%20parameters%20across%20Apple%20M2%20and%20RTX%205070.%20PRISM%20consistently%20reduces%20latency%20by%20up%20to%2089.2%25%20and%20peak%20memory%20by%20up%20to%2091.3%25%20in%20microbenchmarks%2C%20without%20compromising%20precision.%20Across%20three%20real-world%20on-device%20AI%20applications%2C%20PRISM%20lowers%20latency%20by%2011.6%25-51.0%25%20and%20peak%20memory%20by%2018.6%25-77.8%25%2C%20demonstrating%20substantial%20improvements%20in%20efficiency%20and%20deployability.%0ALink%3A%20http%3A//arxiv.org/abs/2510.15620v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn-device%2520Semantic%2520Selection%2520Made%2520Low%2520Latency%2520and%2520Memory%2520Efficient%2520with%2520Monolithic%2520Forwarding%26entry.906535625%3DJiahao%2520Zhou%2520and%2520Chengliang%2520Lin%2520and%2520Dingji%2520Li%2520and%2520Mingkai%2520Dong%2520and%2520Haibo%2520Chen%26entry.1292438233%3DSemantic%2520top-K%2520selection%2520with%2520cross-encoder%2520rerankers%2520underpins%2520on-device%2520AI%2520services%252C%2520such%2520as%2520retrieval-augmented%2520generation%252C%2520agent%2520memory%252C%2520and%2520personalized%2520recommendation.%2520However%252C%2520its%2520latency%2520and%2520memory%2520demands%2520dominate%2520end-to-end%2520budgets%2520on%2520edge%2520hardware.%2520Revisiting%2520the%2520objective%2520of%2520top-K%2520selection%252C%2520we%2520reveal%2520that%2520only%2520relative%2520rankings%2520matter%252C%2520not%2520exact%2520per-candidate%2520scores.%2520We%2520further%2520observe%2520sequence-level%2520sparsity%253A%2520relative%2520rankings%2520progressively%2520stabilize%2520in%2520intermediate%2520layers%252C%2520enabling%2520early%2520pruning%2520prior%2520to%2520completing%2520full%2520inference.%250A%2520%2520Building%2520on%2520this%2520insight%252C%2520we%2520propose%2520monolithic%2520forwarding%2520and%2520develop%2520a%2520training-free%2520inference%2520system%252C%2520PRISM.%2520By%2520maintaining%2520a%2520global%2520view%2520of%2520all%2520candidates%252C%2520it%

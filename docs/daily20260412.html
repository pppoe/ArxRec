{"title": "Quantifying Explanation Consistency: The C-Score Metric for CAM-Based Explainability in Medical Image Classification", "author": "Kabilan Elangovan and Daniel Ting", "abstract": "Class Activation Mapping (CAM) methods are widely used to generate visual explanations for deep learning classifiers in medical imaging. However, existing evaluation frameworks assess whether explanations are correct, measured by localisation fidelity against radiologist annotations, rather than whether they are consistent: whether the model applies the same spatial reasoning strategy across different patients with the same pathology. We propose the C-Score (Consistency Score), a confidence-weighted, annotation-free metric that quantifies intra-class explanation reproducibility via intensity-emphasised pairwise soft IoU across correctly classified instances. We evaluate six CAM techniques: GradCAM, GradCAM++, LayerCAM, EigenCAM, ScoreCAM, and MS GradCAM++ across three CNN architectures (DenseNet201, InceptionV3, ResNet50V2) over thirty training epochs on the Kermany chest X-ray dataset, covering transfer learning and fine-tuning phases. We identify three distinct mechanisms of AUC-consistency dissociation, invisible to standard classification metrics: threshold-mediated gold list collapse, technique-specific attribution collapse at peak AUC, and class-level consistency masking in global aggregation. C-Score provides an early warning signal of impending model instability. ScoreCAM deterioration on ResNet50V2 is detectable one full checkpoint before catastrophic AUC collapse and yields architecture-specific clinical deployment recommendations grounded in explanation quality rather than predictive ranking alone.", "link": "http://arxiv.org/abs/2604.08502v1", "date": "2026-04-09", "relevancy": 1.9254, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4839}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4834}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4782}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Quantifying%20Explanation%20Consistency%3A%20The%20C-Score%20Metric%20for%20CAM-Based%20Explainability%20in%20Medical%20Image%20Classification&body=Title%3A%20Quantifying%20Explanation%20Consistency%3A%20The%20C-Score%20Metric%20for%20CAM-Based%20Explainability%20in%20Medical%20Image%20Classification%0AAuthor%3A%20Kabilan%20Elangovan%20and%20Daniel%20Ting%0AAbstract%3A%20Class%20Activation%20Mapping%20%28CAM%29%20methods%20are%20widely%20used%20to%20generate%20visual%20explanations%20for%20deep%20learning%20classifiers%20in%20medical%20imaging.%20However%2C%20existing%20evaluation%20frameworks%20assess%20whether%20explanations%20are%20correct%2C%20measured%20by%20localisation%20fidelity%20against%20radiologist%20annotations%2C%20rather%20than%20whether%20they%20are%20consistent%3A%20whether%20the%20model%20applies%20the%20same%20spatial%20reasoning%20strategy%20across%20different%20patients%20with%20the%20same%20pathology.%20We%20propose%20the%20C-Score%20%28Consistency%20Score%29%2C%20a%20confidence-weighted%2C%20annotation-free%20metric%20that%20quantifies%20intra-class%20explanation%20reproducibility%20via%20intensity-emphasised%20pairwise%20soft%20IoU%20across%20correctly%20classified%20instances.%20We%20evaluate%20six%20CAM%20techniques%3A%20GradCAM%2C%20GradCAM%2B%2B%2C%20LayerCAM%2C%20EigenCAM%2C%20ScoreCAM%2C%20and%20MS%20GradCAM%2B%2B%20across%20three%20CNN%20architectures%20%28DenseNet201%2C%20InceptionV3%2C%20ResNet50V2%29%20over%20thirty%20training%20epochs%20on%20the%20Kermany%20chest%20X-ray%20dataset%2C%20covering%20transfer%20learning%20and%20fine-tuning%20phases.%20We%20identify%20three%20distinct%20mechanisms%20of%20AUC-consistency%20dissociation%2C%20invisible%20to%20standard%20classification%20metrics%3A%20threshold-mediated%20gold%20list%20collapse%2C%20technique-specific%20attribution%20collapse%20at%20peak%20AUC%2C%20and%20class-level%20consistency%20masking%20in%20global%20aggregation.%20C-Score%20provides%20an%20early%20warning%20signal%20of%20impending%20model%20instability.%20ScoreCAM%20deterioration%20on%20ResNet50V2%20is%20detectable%20one%20full%20checkpoint%20before%20catastrophic%20AUC%20collapse%20and%20yields%20architecture-specific%20clinical%20deployment%20recommendations%20grounded%20in%20explanation%20quality%20rather%20than%20predictive%20ranking%20alone.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08502v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQuantifying%2520Explanation%2520Consistency%253A%2520The%2520C-Score%2520Metric%2520for%2520CAM-Based%2520Explainability%2520in%2520Medical%2520Image%2520Classification%26entry.906535625%3DKabilan%2520Elangovan%2520and%2520Daniel%2520Ting%26entry.1292438233%3DClass%2520Activation%2520Mapping%2520%2528CAM%2529%2520methods%2520are%2520widely%2520used%2520to%2520generate%2520visual%2520explanations%2520for%2520deep%2520learning%2520classifiers%2520in%2520medical%2520imaging.%2520However%252C%2520existing%2520evaluation%2520frameworks%2520assess%2520whether%2520explanations%2520are%2520correct%252C%2520measured%2520by%2520localisation%2520fidelity%2520against%2520radiologist%2520annotations%252C%2520rather%2520than%2520whether%2520they%2520are%2520consistent%253A%2520whether%2520the%2520model%2520applies%2520the%2520same%2520spatial%2520reasoning%2520strategy%2520across%2520different%2520patients%2520with%2520the%2520same%2520pathology.%2520We%2520propose%2520the%2520C-Score%2520%2528Consistency%2520Score%2529%252C%2520a%2520confidence-weighted%252C%2520annotation-free%2520metric%2520that%2520quantifies%2520 {"title": "ParseBench: A Document Parsing Benchmark for AI Agents", "author": "Boyang Zhang and Sebasti\u00e1n G. Acosta and Preston Carlson and Sacha Bron and Pierre-Lo\u00efc Doulcet and Simon Suo", "abstract": "AI agents are changing the requirements for document parsing. What matters is \\emph{semantic correctness}: parsed output must preserve the structure and meaning needed for autonomous decisions, including correct table structure, precise chart data, semantically meaningful formatting, and visual grounding. Existing benchmarks do not fully capture this setting for enterprise automation, relying on narrow document distributions and text-similarity metrics that miss agent-critical failures. We introduce \\textbf{ParseBench}, a benchmark of ${\\sim}2{,}000$ human-verified pages from enterprise documents spanning insurance, finance, and government, organized around five capability dimensions: tables, charts, content faithfulness, semantic formatting, and visual grounding. Across 14 methods spanning vision-language models, specialized document parsers, and LlamaParse, the benchmark reveals a fragmented capability landscape: no method is consistently strong across all five dimensions. LlamaParse Agentic achieves the highest overall score at \\agenticoverall\\%, and the benchmark highlights the remaining capability gaps across current systems. Dataset and evaluation code are available on \\href{https://huggingface.co/datasets/llamaindex/ParseBench}{HuggingFace} and \\href{https://github.com/run-llama/ParseBench}{GitHub}.", "link": "http://arxiv.org/abs/2604.08538v1", "date": "2026-04-09", "relevancy": 1.8822, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4738}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4738}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4543}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ParseBench%3A%20A%20Document%20Parsing%20Benchmark%20for%20AI%20Agents&body=Title%3A%20ParseBench%3A%20A%20Document%20Parsing%20Benchmark%20for%20AI%20Agents%0AAuthor%3A%20Boyang%20Zhang%20and%20Sebasti%C3%A1n%20G.%20Acosta%20and%20Preston%20Carlson%20and%20Sacha%20Bron%20and%20Pierre-Lo%C3%AFc%20Doulcet%20and%20Simon%20Suo%0AAbstract%3A%20AI%20agents%20are%20changing%20the%20requirements%20for%20document%20parsing.%20What%20matters%20is%20%5Cemph%7Bsemantic%20correctness%7D%3A%20parsed%20output%20must%20preserve%20the%20structure%20and%20meaning%20needed%20for%20autonomous%20decisions%2C%20including%20correct%20table%20structure%2C%20precise%20chart%20data%2C%20semantically%20meaningful%20formatting%2C%20and%20visual%20grounding.%20Existing%20benchmarks%20do%20not%20fully%20capture%20this%20setting%20for%20enterprise%20automation%2C%20relying%20on%20narrow%20document%20distributions%20and%20text-similarity%20metrics%20that%20miss%20agent-critical%20failures.%20We%20introduce%20%5Ctextbf%7BParseBench%7D%2C%20a%20benchmark%20of%20%24%7B%5Csim%7D2%7B%2C%7D000%24%20human-verified%20pages%20from%20enterprise%20documents%20spanning%20insurance%2C%20finance%2C%20and%20government%2C%20organized%20around%20five%20capability%20dimensions%3A%20tables%2C%20charts%2C%20content%20faithfulness%2C%20semantic%20formatting%2C%20and%20visual%20grounding.%20Across%2014%20methods%20spanning%20vision-language%20models%2C%20specialized%20document%20parsers%2C%20and%20LlamaParse%2C%20the%20benchmark%20reveals%20a%20fragmented%20capability%20landscape%3A%20no%20method%20is%20consistently%20strong%20across%20all%20five%20dimensions.%20LlamaParse%20Agentic%20achieves%20the%20highest%20overall%20score%20at%20%5Cagenticoverall%5C%25%2C%20and%20the%20benchmark%20highlights%20the%20remaining%20capability%20gaps%20across%20current%20systems.%20Dataset%20and%20evaluation%20code%20are%20available%20on%20%5Chref%7Bhttps%3A//huggingface.co/datasets/llamaindex/ParseBench%7D%7BHuggingFace%7D%20and%20%5Chref%7Bhttps%3A//github.com/run-llama/ParseBench%7D%7BGitHub%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08538v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParseBench%253A%2520A%2520Document%2520Parsing%2520Benchmark%2520for%2520AI%2520Agents%26entry.906535625%3DBoyang%2520Zhang%2520and%2520Sebasti%25C3%25A1n%2520G.%2520Acosta%2520and%2520Preston%2520Carlson%2520and%2520Sacha%2520Bron%2520and%2520Pierre-Lo%25C3%25AFc%2520Doulcet%2520and%2520Simon%2520Suo%26entry.1292438233%3DAI%2520agents%2520are%2520changing%2520the%2520requirements%2520for%2520document%2520parsing.%2520What%2520matters%2520is%2520%255Cemph%257Bsemantic%2520correctness%257D%253A%2520parsed%2520output%2520must%2520preserve%2520the%2520structure%2520and%2520meaning%2520needed%2520for%2520autonomous%2520decisions%252C%2520including%2520correct%2520table%2520structure%252C%2520precise%2520chart%2520data%252C%2520semantically%2520meaningful%2520formatting%252C%2520and%2520visual%2520grounding.%2520Existing%2520benchmarks%2520do%2520not%2520fully%2520capture%2520this%2520setting%2520for%2520enterprise%2520automation%252C%2520relying%2520on%2520narrow%2520document%2520distributions%2520and%2520text-similarity%2520metrics%2520that%2520miss%2520agent-critical%2520failures.%2520We%2520introduce%2520%255Ctextbf%257BParseBench%257D%252C%2520a%2520benchmark%2520of%2520%2524%257B%255Csim%257D2%257B%252C%257D000%2524%2520human-verified%2520pages%2520from%2520enterprise%2520documents%2520spanning%2520insurance%252C%2520finance%252C%2520and%2520government%252C%2520organized%2520around%2520five%2520capability%2520dimensions%253A%2520tables%252C%2520charts%252C%2520content%2520faithfulness%252C%2520semantic%2520formatting%252C%2520and%2520visual%2520grounding.%2520Across%252014%2520methods%2520spanning%2520vision-language%2520models%252C%2520specialized%2520document%2520parsers%252C%2520and%2520LlamaParse%252C%2520the%2520benchmark%2520reveals%2520a%2520fragmented%2520capability%2520landscape%253A%2520no%2520method%2520is%2520consistently%2520strong%2520across%2520all%2520five%2520dimensions.%2520LlamaParse%2520Agentic%2520achieves%2520the%2520highest%2520overall%2520score%2520at%2520%255Cagenticoverall%255C%2525%252C%2520and%2520the%2520benchmark%2520highlights%2520the%2520remaining%2520capability%2520gaps%2520across%2520current%2520systems.%2520Dataset%2520and%2520evaluation%2520code%2520are%2520available%2520on%2520%255Chref%257Bhttps%253A//huggingface.co/datasets/llamaindex/ParseBench%257D%257BHuggingFace%257D%2520and%2520%255Chref%257Bhttps%253A//github.com/run-llama/ParseBench%257D%257BGitHub%257D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08538v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ParseBench%3A%20A%20Document%20Parsing%20Benchmark%20for%20AI%20Agents&entry.906535625=Boyang%20Zhang%20and%20Sebasti%C3%A1n%20G.%20Acosta%20and%20Preston%20Carlson%20and%20Sacha%20Bron%20and%20Pierre-Lo%C3%AFc%20Doulcet%20and%20Simon%20Suo&entry.1292438233=AI%20agents%20are%20changing%20the%20requirements%20for%20document%20parsing.%20What%20matters%20is%20%5Cemph%7Bsemantic%20correctness%7D%3A%20parsed%20output%20must%20preserve%20the%20structure%20and%20meaning%20needed%20for%20autonomous%20decisions%2C%20including%20correct%20table%20structure%2C%20precise%20chart%20data%2C%20semantically%20meaningful%20formatting%2C%20and%20visual%20grounding.%20Existing%20benchmarks%20do%20not%20fully%20capture%20this%20setting%20for%20enterprise%20automation%2C%20relying%20on%20narrow%20document%20distributions%20and%20text-similarity%20metrics%20that%20miss%20 {"title": "PSI: Shared State as the Missing Layer for Coherent AI-Generated Instruments in Personal AI Agents", "author": "Zhiyuan Wang and Erzhen Hu and Mark Rucker and Laura E. Barnes", "abstract": "Personal AI tools can now be generated from natural-language requests, but they often remain isolated after creation. We present PSI, a shared-state architecture that turns independently generated modules into coherent instruments: persistent, connected, and chat-complementary artifacts accessible through both GUIs and a generic chat agent. By publishing current state and write-back affordances to a shared personal-context bus, modules enable cross-module reasoning and synchronized actions across interfaces. We study PSI through a three-week autobiographical deployment in a self-developed personal AI environment and show that later-generated instruments can be integrated automatically through the same contract. PSI identifies shared state as the missing systems layer that transforms AI-generated personal software from isolated apps into coherent personal computing environments.", "link": "http://arxiv.org/abs/2604.08529v1", "date": "2026-04-09", "relevancy": 1.8774, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4782}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4641}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4626}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PSI%3A%20Shared%20State%20as%20the%20Missing%20Layer%20for%20Coherent%20AI-Generated%20Instruments%20in%20Personal%20AI%20Agents&body=Title%3A%20PSI%3A%20Shared%20State%20as%20the%20Missing%20Layer%20for%20Coherent%20AI-Generated%20Instruments%20in%20Personal%20AI%20Agents%0AAuthor%3A%20Zhiyuan%20Wang%20and%20Erzhen%20Hu%20and%20Mark%20Rucker%20and%20Laura%20E.%20Barnes%0AAbstract%3A%20Personal%20AI%20tools%20can%20now%20be%20generated%20from%20natural-language%20requests%2C%20but%20they%20often%20remain%20isolated%20after%20creation.%20We%20present%20PSI%2C%20a%20shared-state%20architecture%20that%20turns%20independently%20generated%20modules%20into%20coherent%20instruments%3A%20persistent%2C%20connected%2C%20and%20chat-complementary%20artifacts%20accessible%20through%20both%20GUIs%20and%20a%20generic%20chat%20agent.%20By%20publishing%20current%20state%20and%20write-back%20affordances%20to%20a%20shared%20personal-context%20bus%2C%20modules%20enable%20cross-module%20reasoning%20and%20synchronized%20actions%20across%20interfaces.%20We%20study%20PSI%20through%20a%20three-week%20autobiographical%20deployment%20in%20a%20self-developed%20personal%20AI%20environment%20and%20show%20that%20later-generated%20instruments%20can%20be%20integrated%20automatically%20through%20the%20same%20contract.%20PSI%20identifies%20shared%20state%20as%20the%20missing%20systems%20layer%20that%20transforms%20AI-generated%20personal%20software%20from%20isolated%20apps%20into%20coherent%20personal%20computing%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08529v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPSI%253A%2520Shared%2520State%2520as%2520the%2520Missing%2520Layer%2520for%2520Coherent%2520AI-Generated%2520Instruments%2520in%2520Personal%2520AI%2520Agents%26entry.906535625%3DZhiyuan%2520Wang%2520and%2520Erzhen%2520Hu%2520and%2520Mark%2520Rucker%2520and%2520Laura%2520E.%2520Barnes%26entry.1292438233%3DPersonal%2520AI%2520tools%2520can%2520now%2520be%2520generated%2520from%2520natural-language%2520requests%252C%2520but%2520they%2520often%2520remain%2520isolated%2520after%2520creation.%2520We%2520present%2520PSI%252C%2520a%2520shared-state%2520architecture%2520that%2520turns%2520independently%2520generated%2520modules%2520into%2520coherent%2520instruments%253A%2520persistent%252C%2520connected%252C%2520and%2520chat-complementary%2520artifacts%2520accessible%2520through%2520both%2520GUIs%2520and%2520a%2520generic%2520chat%2520agent.%2520By%2520publishing%2520current%2520state%2520and%2520write-back%2520affordances%2520to%2520a%2520shared%2520personal-context%2520bus%252C%2520modules%2520enable%2520cross-module%2520reasoning%2520and%2520synchronized%2520actions%2520across%2520interfaces.%2520We%2520study%2520PSI%2520through%2520a%2520three-week%2520autobiographical%2520deployment%2520in%2520a%2520self-developed%2520personal%2520AI%2520environment%2520and%2520show%2520that%2520later-generated%2520instruments%2520can%2520be%2520integrated%2520automatically%2520through%2520the%2520same%2520contract.%2520PSI%2520identifies%2520shared%2520state%2520as%2520the%2520missing%2520systems%2520layer%2520that%2520transforms%2520AI-generated%2520personal%2520software%2520from%2520isolated%2520apps%2520into%2520coherent%2520personal%2520computing%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08529v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PSI%3A%20Shared%20State%20as%20the%20Missing%20Layer%20for%20Coherent%20AI-Generated%20Instruments%20in%20Personal%20AI%20Agents&entry.906535625=Zhiyuan%20Wang%20and%20Erzhen%20Hu%20and%20Mark%20Rucker%20and%20Laura%20E.%20Barnes&entry.1292438233=Personal%20AI%20tools%20can%20now%20be%20generated%20from%20natural-language%20requests%2C%20but%20they%20often%20remain%20isolated%20after%20creation.%20We%20present%20PSI%2C%20a%20shared-state%20architecture%20that%20turns%20independently%20generated%20modules%20into%20coherent%20instruments%3A%20persistent%2C%20connected%2C%20and%20chat-complementary%20artifacts%20accessible%20through%20both%20GUIs%20and%20a%20generic%20chat%20agent.%20By%20publishing%20current%20state%20and%20write-back%20affordances%20to%20a%20shared%20personal-context%20bus%2C%20modules%20enable%20cross-module%20reasoning%20and%20synchronized%20actions%20across%20interfaces.%20We%20study%20PSI%20through%20a%20three-week%20autobiographical%20deployment%20in%20a%20self-developed%20personal%20AI%20environment%20and%20show%20that%20later-generated%20instruments%20can%20be%20integrated%20automatically%20through%20the%20same%20contract.%20PSI%20identifies%20shared%20state%20as%20the%20missing%20systems%20layer%20that%20transforms%20AI-generated%20personal%20software%20from%20isolated%20apps%20into%20coherent%20personal%20computing%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2604.08529v1&entry.124074799=Read"},
{"title": "Novel View Synthesis as Video Completion", "author": "Qi Wu and Khiem Vuong and Minsik Jeon and Srinivasa Narasimhan and Deva Ramanan", "abstract": "We tackle the problem of sparse novel view synthesis (NVS) using video diffusion models; given $K$ ($\\approx 5$) multi-view images of a scene and their camera poses, we predict the view from a target camera pose. Many prior approaches leverage generative image priors encoded via diffusion models. However, models trained on single images lack multi-view knowledge. We instead argue that video models already contain implicit multi-view knowledge and so should be easier to adapt for NVS. Our key insight is to formulate sparse NVS as a low frame-rate video completion task. However, one challenge is that sparse NVS is defined over an unordered set of inputs, often too sparse to admit a meaningful order, so the models should be $\\textit{invariant}$ to permutations of that input set. To this end, we present FrameCrafter, which adapts video models (naturally trained with coherent frame orderings) to permutation-invariant NVS through several architectural modifications, including per-frame latent encodings and removal of temporal positional embeddings. Our results suggest that video models can be easily trained to \"forget\" about time with minimal supervision, producing competitive performance on sparse-view NVS benchmarks. Project page: https://frame-crafter.github.io/", "link": "http://arxiv.org/abs/2604.08500v1", "date": "2026-04-09", "relevancy": 1.749, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6096}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5846}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5717}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Novel%20View%20Synthesis%20as%20Video%20Completion&body=Title%3A%20Novel%20View%20Synthesis%20as%20Video%20Completion%0AAuthor%3A%20Qi%20Wu%20and%20Khiem%20Vuong%20and%20Minsik%20Jeon%20and%20Srinivasa%20Narasimhan%20and%20Deva%20Ramanan%0AAbstract%3A%20We%20tackle%20the%20problem%20of%20sparse%20novel%20view%20synthesis%20%28NVS%29%20using%20video%20diffusion%20models%3B%20given%20%24K%24%20%28%24%5Capprox%205%24%29%20multi-view%20images%20of%20a%20scene%20and%20their%20camera%20poses%2C%20we%20predict%20the%20view%20from%20a%20target%20camera%20pose.%20Many%20prior%20approaches%20leverage%20generative%20image%20priors%20encoded%20via%20diffusion%20models.%20However%2C%20models%20trained%20on%20single%20images%20lack%20multi-view%20knowledge.%20We%20instead%20argue%20that%20video%20models%20already%20contain%20implicit%20multi-view%20knowledge%20and%20so%20should%20be%20easier%20to%20adapt%20for%20NVS.%20Our%20key%20insight%20is%20to%20formulate%20sparse%20NVS%20as%20a%20low%20frame-rate%20video%20completion%20task.%20However%2C%20one%20challenge%20is%20that%20sparse%20NVS%20is%20defined%20over%20an%20unordered%20set%20of%20inputs%2C%20often%20too%20sparse%20to%20admit%20a%20meaningful%20order%2C%20so%20the%20models%20should%20be%20%24%5Ctextit%7Binvariant%7D%24%20to%20permutations%20of%20that%20input%20set.%20To%20this%20end%2C%20we%20present%20FrameCrafter%2C%20which%20adapts%20video%20models%20%28naturally%20trained%20with%20coherent%20frame%20orderings%29%20to%20permutation-invariant%20NVS%20through%20several%20architectural%20modifications%2C%20including%20per-frame%20latent%20encodings%20and%20removal%20of%20temporal%20positional%20embeddings.%20Our%20results%20suggest%20that%20video%20models%20can%20be%20easily%20trained%20to%20%22forget%22%20about%20time%20with%20minimal%20supervision%2C%20producing%20competitive%20performance%20on%20sparse-view%20NVS%20benchmarks.%20Project%20page%3 20orderings%2529%2520to%2520permutation-invariant%2520NVS%2520through%2520several%2520architectural%2520modifications%252C%2520including%2520per-frame%2520latent%2520encodings%2520and%2520removal%2520of%2520temporal%2520positional%2520embeddings.%2520Our%2520results%2520suggest%2520that%2520video%2520models%2520can%2520be%2520easily%2520trained%2520to%2520%2522forget%2522%2520about%2520time%2520with%2520minimal%2520supervision%252C%2520producing%2520competitive%2520performance%2520on%2520sparse-view%2520NVS%2520benchmarks.%2520Project%2520page%253A%2520https%253A//frame-crafter.github.io/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08500v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Novel%20View%20Synthesis%20as%20Video%20Completion&entry.906535625=Qi%20Wu%20and%20Khiem%20Vuong%20and%20Minsik%20Jeon%20and%20Srinivasa%20Narasimhan%20and%20Deva%20Ramanan&entry.1292438233=We%20tackle%20the%20problem%20of%20sparse%20novel%20view%20synthesis%20%28NVS%29%20using%20video%20diffusion%20models%3B%20given%20%24K%24%20%28%24%5Capprox%205%24%29%20multi-view%20images%20of%20a%20scene%20and%20their%20camera%20poses%2C%20we%20predict%20the%20view%20from%20a%20target%20camera%20pose.%20Many%20prior%20approaches%20leverage%20generative%20image%20priors%20encoded%20via%20diffusion%20models.%20However%2C%20models%20trained%20on%20single%20images%20lack%20multi-view%20knowledge.%20We%20instead%20argue%20that%20video%20models%20already%20contain%20implicit%20multi-view%20knowledge%20and%20so%20should%20be%20easier%20to%20adapt%20for%20NVS.%20Our%20key%20insight%20is%20to%20formulate%20sparse%20NVS%20as%20a%20low%20frame-rate%20video%20completion%20task.%20However%2C%20one%20challenge%20is%20that%20sparse%20NVS%20is%20defined%20over%20an%20unordered%20set%20of%20inputs%2C%20often%20too%20sparse%20to%20admit%20a%20meaningful%20order%2C%20so%20the%20models%20should%20be%20%24 {"title": "Sumo: Dynamic and Generalizable Whole-Body Loco-Manipulation", "author": "John Z. Zhang and Maks Sorokin and Jan Br\u00fcdigam and Brandon Hung and Stephen Phillips and Dmitry Yershov and Farzad Niroui and Tong Zhao and Leonor Fermoselle and Xinghao Zhu and Chao Cao and Duy Ta and Tao Pang and Jiuguang Wang and Preston Culbertson and Zachary Manchester and Simon Le Cl\u00e9ac'h", "abstract": "This paper presents a sim-to-real approach that enables legged robots to dynamically manipulate large and heavy objects with whole-body dexterity. Our key insight is that by performing test-time steering of a pre-trained whole-body control policy with a sample-based planner, we can enable these robots to solve a variety of dynamic loco-manipulation tasks. Interestingly, we find our method generalizes to a diverse set of objects and tasks with no additional tuning or training, and can be further enhanced by flexibly adjusting the cost function at test time. We demonstrate the capabilities of our approach through a variety of challenging loco-manipulation tasks on a Spot quadruped robot in the real world, including uprighting a tire heavier than the robot's nominal lifting capacity and dragging a crowd-control barrier larger and taller than the robot itself. Additionally, we show that the same approach can be generalized to humanoid loco-manipulation tasks, such as opening a door and pushing a table, in simulation. Project code and videos are available at \\href{https://sumo.rai-inst.com/}{https://sumo.rai-inst.com/}.", "link": "http://arxiv.org/abs/2604.08508v1", "date": "2026-04-09", "relevancy": 1.7487, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6126}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6043}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5624}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sumo%3A%20Dynamic%20and%20Generalizable%20Whole-Body%20Loco-Manipulation&body=Title%3A%20Sumo%3A%20Dynamic%20and%20Generalizable%20Whole-Body%20Loco-Manipulation%0AAuthor%3A%20John%20Z.%20Zhang%20and%20Maks%20Sorokin%20and%20Jan%20Br%C3%BCdigam%20and%20Brandon%20Hung%20and%20Stephen%20Phillips%20and%20Dmitry%20Yershov%20and%20Farzad%20Niroui%20and%20Tong%20Zhao%20and%20Leonor%20Fermoselle%20and%20Xinghao%20Zhu%20and%20Chao%20Cao%20and%20Duy%20Ta%20and%20Tao%20Pang%20and%20Jiuguang%20Wang%20and%20Preston%20Culbertson%20and%20Zachary%20Manchester%20and%20Simon%20Le%20Cl%C3%A9ac%27h%0AAbstract%3A%20This%20paper%20presents%20a%20sim-to-real%20approach%20that%20enables%20legged%20robots%20to%20dynamically%20manipulate%20large%20and%20heavy%20objects%20with%20whole-body%20dexterity.%20Our%20key%20insight%20is%20that%20by%20performing%20test-time%20steering%20of%20a%20pre-trained%20whole-body%20control%20policy%20with%20a%20sample-based%20planner%2C%20we%20can%20enable%20these%20robots%20to%20solve%20a%20variety%20of%20dynamic%20loco-manipulation%20tasks.%20Interestingly%2C%20we%20find%20our%20method%20generalizes%20to%20a%20diverse%20set%20of%20objects%20and%20tasks%20with%20no%20additional%20tuning%20or%20training%2C%20and%20can%20be%20further%20enhanced%20by%20flexibly%20adjusting%20the%20cost%20function%20at%20test%20time.%20We%20demonstrate%20the%20capabilities%20of%20our%20approach%20through%20a%20variety%20of%20challenging%20loco-manipulation%20tasks%20on%20a%20Spot%20quadruped%20robot%20in%20the%20real%20world%2C%20including%20uprighting%20a%20tire%20heavier%20than%20the%20robot%27s%20nominal%20lifting%20capacity%20and%20dragging%20a%20crowd-control%20barrier%20larger%20and%20taller%20than%20the%20robot%20itself.%2 {"title": "Splits! Flexible Sociocultural Linguistic Investigation at Scale", "author": "Eylon Caplan and Tania Chakraborty and Dan Goldwasser", "abstract": "Variation in language use, shaped by speakers' sociocultural background and specific context of use, offers a rich lens into cultural perspectives, values, and opinions. For example, Chinese students discuss \"healthy eating\" with words like \"timing,\" \"regularity,\" and \"digestion,\" whereas Americans use vocabulary like \"balancing food groups\" and \"avoiding fat and sugar,\" reflecting distinct cultural models of nutrition. The computational study of these Sociocultural Linguistic Phenomena (SLP) has traditionally been done in NLP via tailored analyses of specific groups or topics, requiring specialized data collection and experimental operationalization--a process not well-suited to quick hypothesis exploration and prototyping. To address this, we propose constructing a \"sandbox\" designed for systematic and flexible sociolinguistic research. Using our method, we construct a demographically/topically split Reddit dataset, Splits!, validated by self-identification and by replicating several known SLPs from existing literature. We showcase the sandbox's utility with a scalable, two-stage process that filters large collections of \"potential\" SLPs (PSLPs) to surface the most promising candidates for deeper, qualitative investigation.", "link": "http://arxiv.org/abs/2504.04640v3", "date": "2026-04-09", "relevancy": 1.7409, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4397}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4343}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4343}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Splits%21%20Flexible%20Sociocultural%20Linguistic%20Investigation%20at%20Scale&body=Title%3A%20Splits%21%20Flexible%20Sociocultural%20Linguistic%20Investigation%20at%20Scale%0AAuthor%3A%20Eylon%20Caplan%20and%20Tania%20Chakraborty%20and%20Dan%20Goldwasser%0AAbstract%3A%20Variation%20in%20language%20use%2C%20shaped%20by%20speakers%27%20sociocultural%20background%20and%20specific%20context%20of%20use%2C%20offers%20a%20rich%20lens%20into%20cultural%20perspectives%2C%20values%2C%20and%20opinions.%20For%20example%2C%20Chinese%20students%20discuss%20%22healthy%20eating%22%20with%20words%20like%20%22timing%2C%22%20%22regularity%2C%22%20and%20%22digestion%2C%22%20whereas%20Americans%20use%20vocabulary%20like%20%22balancing%20food%20groups%22%20and%20%22avoiding%20fat%20and%20sugar%2C%22%20reflecting%20distinct%20cultural%20models%20of%20nutrition.%20The%20computational%20study%20of%20these%20Sociocultural%20Linguistic%20Phenomena%20%28SLP%29%20has%20traditionally%20been%20done%20in%20NLP%20via%20tailored%20analyses%20of%20specific%20groups%20or%20topics%2C%20requiring%20specialized%20data%20collection%20and%20experimental%20operationalization--a%20process%20not%20well-suited%20to%20quick%20hypothesis%20exploration%20and%20prototyping.%20To%20address%20this%2C%20we%20propose%20constructing%20a%20%22sandbox%22%20designed%20for%20systematic%20and%20flexible%20sociolinguistic%20research.%20Using%20our%20method%2C%20we%20construct%20a%20demographically/topically%20split%20Reddit%20dataset%2C%20Splits%21%2C%20validated%20by%20self-identification%20and%20by%20replicating%20several%20known%20SLPs%20from%20existing%20literature.%20We%20showcase%20the%20sandbox%27s%20utility%20with%20a%20scalable%2C%20two-stage%20process%20that%20filters%20large%20collections%20of%20%22potential%22%20SLPs%20%28PSLPs%29%20to%20surface%20the%20most%20promising%20candidates%20for%20deeper%2C%20qualitative%20investigation.%0ALink%3A%20http%3A//arxiv.org/abs/2504.04640v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSplits%2521%2520Flexible%2520Sociocultural%2520Linguistic%2520Investigation%2520at%2520Scale%26entry.906535625%3DEylon%2520Caplan%2520and%2520Tania%2520Chakraborty%2520and%2520Dan%2520Goldwasser%26entry.1292438233%3DVariation%2520in%2520language%2520use%252C%2520shaped%2520by%2520speakers%2527%2520sociocultural%2520background%2520and%2520specific%2520context%2520of%2520use%252C%2520offers%2520a%2520rich%2520lens%2520into%2520cultural%2520perspectives%252C%2520values%252C%2520and%2520opinions.%2520For%2520example%252C%2520Chinese%2520students%2520discuss%2520%2522healthy%2520eating%2522%2520with%2520words%2520like%2520%2522timing%252C%2522%2520%2522regularity%252C%2522%2520and%2520%2522digestion%252C%2522%2520whereas%2520Americans%2520use%2520vocabulary%2520like%2520%2522balancing%2520food%2520groups%2522%2520and%2520%2522avoiding%2520fat%2520and%2520sugar%252C%2522%2520reflecting%2520distinct%2520cultural%2520models%2520of%2520nutrition.%2520The%2520computational%2520study%2520of%2520these%2520Sociocultural%2520Linguistic%2520Phenomena%2520%2528SLP%2529%2520has%2520traditionally%2520been%2520done%2520in%2520NLP%2520via%2520tailored%2520analyses%2520of%2520specific%2520groups%2520or%2520topics%252C%2520requiring%2520specialized%2520data%2520collection%2520and%2520experimental%2520operationalization--a%2520process%2520not%2520well-suited%2520to%2520quick%2520hypothesis%2520exploration%2520and%2520prototyping.%2520To%2520address%2520this%252C%2520we%2520propose%2520constructing%2520a%2520%2522sandbox%2522%2520designed%2520for%2520systematic%2520and%2520flexible%2520sociolinguistic%2520research.%2520Using%2520our%2520method%252C%2520we%2520construct%2520a%2520demographically/topically%2520split%2520Reddit%2520dataset%252C%2520Splits%2521%252C%2520validated%2520by%2520self-identification%2520and%2520by%2520replicating%2520several%2520known%2520SLPs%2520from%2520existing%2520literature.%2520We%2520showcase%2520the%2520sandbox%2527s%2520utility%2520with%2520a%2520scalable%252C%2520two-stage%2520process%2520that%2520filters%2520large%2520collections%2520of%2520%2522potential%2522%2520SLPs%2520%2528PSLPs%2529%2520to%2520surface%2520the%2520most%2520promising%2520candidates%2520for%2520deeper%252C%2520qualitative%2520investigation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2504.04640v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Splits%21%20Flexible%20Sociocultural%20Linguistic%20Investigation%20at%20Scale&entry.906535625=Eylon%20Caplan%20and%20Tania%20Chakraborty%20and%20Dan%20Goldwasser&entry.1292438233=Variation%20in%20language%20use%2C%20shaped%20by%20speakers%27%20sociocultural%20background%20and%20specific%20context%20of%20use%2C%20offers%20a%20rich%20lens%20into%20cultural%20perspectives%2C%20values%2C%20and%20opinions.%20For%20example%2C%20Chinese%20students%20discuss%20%22healthy%20eating%22%20with%20words%20like%20%22timing%2C%22%20%22regularity%2C%22%20and%20%22digestion%2C%22%20whereas%20Americans%20use%20vocabulary%20like%20%22balancing%20food%20groups%22%20and%20%22avoiding%20fat%20and%20sugar%2C%22%20reflecting%20distinct%20cultural%20models%20of%20nutrition.%20The%20computational%20study%20of%20these%20Sociocultural%20Linguistic%20Phenomena%20%28SLP%29%20has%20traditionally%20been%20done%20in%20NLP%20via%20tailored%20analyses%20of%20specific%20groups%20or%20topics%2C%20requiring%20specialized%20data%20collection%20and%20experimental%20operationalization--a%20process%20not%20well-suited%20to%20quick%20hypothesis%20exploration%20and%20prototyping.%20To%20address%20this%2C%20we%20propose%20constructing%20a%20%22sandbox%22%20designed%20for%20systematic%20and%20flexible%20sociolinguistic%20research.%20Using%20our%20method%2C%2 {"title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "author": "Addison J. Wu and Ryan Liu and Shuyue Stella Li and Yulia Tsvetkov and Thomas L. Griffiths", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "link": "http://arxiv.org/abs/2604.08525v1", "date": "2026-04-09", "relevancy": 1.731, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4569}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4357}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4202}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ads%20in%20AI%20Chatbots%3F%20An%20Analysis%20of%20How%20Large%20Language%20Models%20Navigate%20Conflicts%20of%20Interest&body=Title%3A%20Ads%20in%20AI%20Chatbots%3F%20An%20Analysis%20of%20How%20Large%20Language%20Models%20Navigate%20Conflicts%20of%20Interest%0AAuthor%3A%20Addison%20J.%20Wu%20and%20Ryan%20Liu%20and%20Shuyue%20Stella%20Li%20and%20Yulia%20Tsvetkov%20and%20Thomas%20L.%20Griffiths%0AAbstract%3A%20Today%27s%20large%20language%20models%20%28LLMs%29%20are%20trained%20to%20align%20with%20user%20preferences%20through%20methods%20such%20as%20reinforcement%20learning.%20Yet%20models%20are%20beginning%20to%20be%20deployed%20not%20merely%20to%20satisfy%20users%2C%20but%20also%20to%20generate%20revenue%20for%20the%20companies%20that%20created%20them%20through%20advertisements.%20This%20creates%20the%20potential%20for%20LLMs%20to%20face%20conflicts%20of%20interest%2C%20where%20the%20most%20beneficial%20response%20to%20a%20user%20may%20not%20be%20aligned%20with%20the%20company%27s%20incentives.%20For%20instance%2C%20a%20sponsored%20product%20may%20be%20more%20expensive%20but%20otherwise%20equal%20to%20another%3B%20in%20this%20case%2C%20what%20does%20%28and%20should%29%20the%20LLM%20recommend%20to%20the%20user%3F%20In%20this%20paper%2C%20we%20provide%20a%20framework%20for%20categorizing%20the%20ways%20in%20which%20conflicting%20incentives%20might%20lead%20LLMs%20to%20change%20the%20way%20they%20interact%20with%20users%2C%20inspired%20by%20literature%20from%20linguistics%20and%20advertising%20regulation.%20We%20then%20present%20a%20suite%20of%20evaluations%20to%20examine%20how%20current%20models%20handle%20these%20tradeoffs.%20We%20find%20that%20a%20majority%20of%20LLMs%20forsake%20user%20welfare%20for%20company%20incentives%20in%20a%20multitude%20of%20conflict%20of%20interest%20situations%2C%20including%20recommending%20a%20sponsored%20product%20almost%20twice%20as%20expensive%20%28Grok%204.1%20Fast%2C%2083%25%29%2C%20surfacing%20sponsored%20options%20to%20disrupt%20the%20purchasing%20process%20%28GPT%205.1%2C%2094%25%29%2C%20and%20concealing%20prices%20in%20unfavorable%20comparisons%20%28Qwen%203%20Next%2C%2024%25%29.%20Behaviors%20also%20vary%20strongly%20with%20levels%20of%20reasoning%20and%20users%27%20inferred%20socio-economic%20status.%20Our%20results%20highlight%20some%20of%20the%20hidden%20risks%20to%20users%20that%20can%20emerge%20when%20companies%20begin%20to%20subtly%20incentivize%20advertisements%20in%20chatbots.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08525v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAds%2520in%2520AI%2520Chatbots%253F%2520An%2520Analysis%2520of%2520How%2520Large%2520Language%2520Models%2520Navigate%2520Conflicts%2520of%2520Interest%26entry.906535625%3DAddison%2520J.%2520Wu%2520and%2520Ryan%2520Liu%2520and%2520Shuyue%2520Stella%2520Li%2520and%2520Yulia%2520Tsvetkov%2520and%2520Thomas%2520L.%2520Griffiths%26entry.1292438233%3DToday%2527s%2520large%2520language%2520models%2520%2528LLMs%2529%2520are%2520trained%2520to%2520align%2520with%2520user%2520preferences%2520through%2520methods%2520such%2520as%2520reinforcement%2520learning.%2520Yet%2520models%2520are%2520beginning%2520to%2520be%2520deployed%2520not%2520merely%2520to%2520satisfy%2520users%252C%2520but%2520also%2520to%2520generate%2520revenue%2520for%2520the%2520companies%2520that%2520created%2520them%2520through%2520 {"title": "Constrained Policy Optimization with Cantelli-Bounded Value-at-Risk", "author": "Rohan Tangri and Jan-Peter Calliess", "abstract": "We introduce the Value-at-Risk Constrained Policy Optimization algorithm (VaR-CPO), a sample efficient and conservative method designed to optimize Value-at-Risk (VaR) constrained reinforcement learning (RL) problems. Empirically, we demonstrate that VaR-CPO is capable of safe exploration, achieving zero constraint violations during training in feasible environments, a critical property that baseline methods fail to uphold. To overcome the inherent non-differentiability of the VaR constraint, we employ Cantelli's inequality to obtain a tractable approximation based on the first two moments of the cost return. Additionally, by extending the trust-region framework of the Constrained Policy Optimization (CPO) method, we provide worst-case bounds for both policy improvement and constraint violation during the training process.", "link": "http://arxiv.org/abs/2601.22993v2", "date": "2026-04-09", "relevancy": 1.7272, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4525}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.436}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Constrained%20Policy%20Optimization%20with%20Cantelli-Bounded%20Value-at-Risk&body=Title%3A%20Constrained%20Policy%20Optimization%20with%20Cantelli-Bounded%20Value-at-Risk%0AAuthor%3A%20Rohan%20Tangri%20and%20Jan-Peter%20Calliess%0AAbstract%3A%20We%20introduce%20the%20Value-at-Risk%20Constrained%20Policy%20Optimization%20algorithm%20%28VaR-CPO%29%2C%20 {"title": "RewardFlow: Generate Images by Optimizing What You Reward", "author": "Onkar Susladkar and Dong-Hwan Jang and Tushar Prakash and Adheesh Juvekar and Vedant Shah and Ayush Barik and Nabeel Bashir and Muntasir Wahed and Ritish Shrirao and Ismini Lourentzou", "abstract": "We introduce RewardFlow, an inversion-free framework that steers pretrained diffusion and flow-matching models at inference time through multi-reward Langevin dynamics. RewardFlow unifies complementary differentiable rewards for semantic alignment, perceptual fidelity, localized grounding, object consistency, and human preference, and further introduces a differentiable VQA-based reward that provides fine-grained semantic supervision through language-vision reasoning. To coordinate these heterogeneous objectives, we design a prompt-aware adaptive policy that extracts semantic primitives from the instruction, infers edit intent, and dynamically modulates reward weights and step sizes throughout sampling. Across several image editing and compositional generation benchmarks, RewardFlow delivers state-of-the-art edit fidelity and compositional alignment.", "link": "http://arxiv.org/abs/2604.08536v1", "date": "2026-04-09", "relevancy": 1.6985, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6443}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5461}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RewardFlow%3A%20Generate%20Images%20by%20Optimizing%20What%20You%20Reward&body=Title%3A%20RewardFlow%3A%20Generate%20Images%20by%20Optimizing%20What%20You%20Reward%0AAuthor%3A%20Onkar%20Susladkar%20and%20Dong- {"title": "When Numbers Speak: Aligning Textual Numerals and Visual Instances in Text-to-Video Diffusion Models", "author": "Zhengyang Sun and Yu Chen and Xin Zhou and Xiaofan Li and Xiwu Chen and Dingkang Liang and Xiang Bai", "abstract": "Text-to-video diffusion models have enabled open-ended video synthesis, but often struggle with generating the correct number of objects specified in a prompt. We introduce NUMINA , a training-free identify-then-guide framework for improved numerical alignment. NUMINA identifies prompt-layout inconsistencies by selecting discriminative self- and cross-attention heads to derive a countable latent layout. It then refines this layout conservatively and modulates cross-attention to guide regeneration. On the introduced CountBench, NUMINA improves counting accuracy by up to 7.4% on Wan2.1-1.3B, and by 4.9% and 5.5% on 5B and 14B models, respectively. Furthermore, CLIP alignment is improved while maintaining temporal consistency. These results demonstrate that structural guidance complements seed search and prompt enhancement, offering a practical path toward count-accurate text-to-video diffusion. The code is available at https://github.com/H-EmbodVis/NUMINA.", "link": "http://arxiv.org/abs/2604.08546v1", "date": "2026-04-09", "relevancy": 1.6813, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5751}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5629}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Numbers%20Speak%3A%20Aligning%20Textual%20Numerals%20and%20Visual%20Instances%20in%20Text-to-Video%20Diffusion%20Models&body=Title%3A%20When%20Numbers%20Speak% {"title": "PIArena: A Platform for Prompt Injection Evaluation", "author": "Runpeng Geng and Chenlong Yin and Yanting Wang and Ying Chen and Jinyuan Jia", "abstract": "Prompt injection attacks pose serious security risks across a wide range of real-world applications. While receiving increasing attention, the community faces a critical gap: the lack of a unified platform for prompt injection evaluation. This makes it challenging to reliably compare defenses, understand their true robustness under diverse attacks, or assess how well they generalize across tasks and benchmarks. For instance, many defenses initially reported as effective were later found to exhibit limited robustness on diverse datasets and attacks. To bridge this gap, we introduce PIArena, a unified and extensible platform for prompt injection evaluation that enables users to easily integrate state-of-the-art attacks and defenses and evaluate them across a variety of existing and new benchmarks. We also design a dynamic strategy-based attack that adaptively optimizes injected prompts based on defense feedback. Through comprehensive evaluation using PIArena, we uncover critical limitations of state-of-the-art defenses: limited generalizability across tasks, vulnerability to adaptive attacks, and fundamental challenges when an injected task aligns with the target task. The code and datasets are available at https://github.com/sleeepeer/PIArena.", "link": "http://arxiv.org/abs/2604.08499v1", "date": "2026-04-09", "relevancy": 1.5967, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4186}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.3868}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.3816}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PIArena%3A%20A%20Platform%20for%20Prompt%20Injection%20Evaluation&body=Title%3A%20PIArena%3A%20A%20Platform%20for%20Prompt%20Injection%20Evaluation%0AAuthor%3A%20Runpeng%20Geng%20and%20Chenlong%20Yin%20and%20Yanting%20Wang%20and%20Ying%20Chen%20and%20Jinyuan%20Jia%0AAbstract%3A%20Prompt%20injection%20attacks%20pose%20serious%20security%20risks%20across%20a%20wide%20range%20of%20real-world%20applications.%20While%20receiving%20increasing%20attention%2C%20the%20community%20faces%20a%20critical%20gap%3A%20the%20lack%20of%20a%20unified%20platform%20for%20prompt%20injection%20evaluation.%20This%20makes%20it%20challenging%20to%20reliably%20compare%20defenses%2C%20understand%20their%20true%20robustness%20under%20diverse%20attacks%2C%20or%20assess%20how%20well%20they%20generalize%20across%20tasks%20and%20benchmarks.%20For%20instance%2C%20many%20defenses%20initially%20reported%20as%20effective%20were%20later%20found%20to%20exhibit%20limited%20robustness%20on%20diverse%20datasets%20and%20attacks.%20To%20bridge%20this%20gap%2C%20we%20introduce%20PIArena%2C%20a%20unified%20and%20extensible%20platform%20for%20prompt%20injection%20evaluation%20that%20enables%20users%20to%20easily%20integrate%20state-of-the-art%20attacks%20and%20defenses%20and%20evaluate%20them%20across%20a%20variety%20of%20existing%20and%20new%20benchmarks.%20We%20also%20design%20a%20dynamic%20strategy-based%20attack%20that%20adaptively%20optimizes%20injected%20prompts%20based%20on%20defense%20feedback.%20Through%20comprehensive%20evaluation%20using%20PIArena%2C%20we%20uncover%20critical%20limitations%20of%20state-of-the-art%20defenses%3A%20limited%20generalizability%20across%20tasks%2C%20vulnerability%20to%20adaptive%20attacks%2C%20and%20fundamental%20challenges%20when%20an%20injected%20task%20aligns%20with%20the%20target%20task.%20The%20code%20and%20datasets%20are%20available%20at%20https%3A//github.com/sleeepeer/PIArena.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08499v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPIArena%253A%2520A%2520Platform%2520for%2520Prompt%2520Injection%2520Evaluation%26entry.906535625%3DRunpeng%2520Geng%2520and%2520Chenlong%2520Yin%2520and%2520Yanting%2520Wang%2520and%2520Ying%2520Chen%2520and%2520Jinyuan%2520Jia%26entry.1292438233%3DPrompt%2520injection%2520attacks%2520pose%2520serious%2520security%2520risks%2520across%2520a%2520wide%2520range%2520of%2520real-world%2520applications.%2520While%2520receiving%2520increasing%2520attention%252C%2520the%2520community%2520faces%2520a%2520critical%2520gap%253A%2520the%2520lack%2520of%2520a%2520unified%2520platform%2520for%2520prompt%2520injection%2520evaluation.%2520This%2520makes%2520it%2520challenging%2520to%2520reliably%2520compare%2520defenses%252C%2520understand%2520their%2520true%2520robustness%2520under%2520diverse%2520attacks%252C%2520or%2520assess%2520how%2520well%2520they%2520generalize%2520across%2520tasks%2520and%2520benchmarks.%2520For%2520instance%252C%2520many%2520defenses%2520initially%2520reported%2520as%2520effective%2520were%2520later%2520found%2520to%2520exhibit%2520limited%2520robustness%2520on%2520diverse%2520datasets%2520and%2520attacks.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520PIArena%252C%2520a%2520unified%2520and%2520extensible%2520platform%2520for%2520prompt%2520injection%2520evaluation%2520that%2520enables%2520users%2520to%2520easily%2520integrate%2520state-of-the-art%2520attacks%2520and%2520defenses%2520and%2520evaluate%2520them%2520across%2520a%2520variety%2520of%2520existing%2520and%2520new%2520benchmarks.%2520We%2520also%2520design%2520a%2520dynamic%2520strategy-based%2520attack%2520that%2520adaptively%2520optimizes%2520injected%2520prompts%2520based%2520on%2520defense%2520feedback.%2520Through%2520comprehensive%2520evaluation%2520using%2520PIArena%252C%2520we%2520u {"title": "Act Wisely: Cultivating Meta-Cognitive Tool Use in Agentic Multimodal Models", "author": "Shilin Yan and Jintao Tong and Hongwei Xue and Xiaojun Tang and Yangyang Wang and Kunyu Shi and Guannan Zhang and Ruixuan Li and Yixiong Zou", "abstract": "The advent of agentic multimodal models has empowered systems to actively interact with external environments. However, current agents suffer from a profound meta-cognitive deficit: they struggle to arbitrate between leveraging internal knowledge and querying external utilities. Consequently, they frequently fall prey to blind tool invocation, resorting to reflexive tool execution even when queries are resolvable from the raw visual context. This pathological behavior precipitates severe latency bottlenecks and injects extraneous noise that derails sound reasoning. Existing reinforcement learning protocols attempt to mitigate this via a scalarized reward that penalizes tool usage. Yet, this coupled formulation creates an irreconcilable optimization dilemma: an aggressive penalty suppresses essential tool use, whereas a mild penalty is entirely subsumed by the variance of the accuracy reward during advantage normalization, rendering it impotent against tool overuse. To transcend this bottleneck, we propose HDPO, a framework that reframes tool efficiency from a competing scalar objective to a strictly conditional one. By eschewing reward scalarization, HDPO maintains two orthogonal optimization channels: an accuracy channel that maximizes task correctness, and an efficiency channel that enforces execution economy exclusively within accurate trajectories via conditional advantage estimation. This decoupled architecture naturally induces a cognitive curriculum-compelling the agent to first master task resolution before refining its self-reliance. Extensive evaluations demonstrate that our resulting model, Metis, reduces tool invocations by orders of magnitude while simultaneously elevating reasoning accuracy.", "link": "http://arxiv.org/abs/2604.08545v1", "date": "2026-04-09", "relevancy": 1.5561, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5238}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5209}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5158}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Act%20Wisely%3A%20Cultivating%20Meta-Cognitive%20Tool%20Use%20in%20Agentic%20Multimodal%20Models&body=Title%3A%20Act%20Wisely%3A%20Cultivating%20Meta-Cognitive%20Tool%20Use%20in%20Agentic%20Multimodal%20Models%0AAuthor%3A%20Shilin%20Yan%20and%20Jintao%20Tong%20and%20Hongwei%20Xue%20and%20Xiaojun%20Tang%20and%20Yangyang%20Wang%20and%20Kunyu%20Shi%20and%20Guannan%20Zhang%20and%20Ruixuan%20Li%20and%20Yixiong%20Zou%0AAbstract%3A%20The%20advent%20of%20agentic%20multimodal%20models%20has%20empowered%20systems%20to%20actively%20interact%20with%20external%20environments.%20However%2C%20current%20agents%20suffer%20from%20a%20profound%20meta-cognitive%20deficit%3A%20they%20struggle%20to%20arbitrate%20between%20leveraging%20internal%20knowledge%20and%20querying%20external%20utilities.%20Consequently%2C%20they%20frequently%20fall%20prey%20to%20blind%20tool%20invocation%2C%20resorting%20to%20reflexive%20tool%20execution%20even%20when%20queries%20are%20resolvable%20from%20the%20raw%20visual%20context.%20This%20pathological%20behavior%20precipitates%20severe%20latency%20bottlenecks%20and%20injects%20extraneous%20noise%20that%20derails%20sound%20reasoning.%20Existing%20reinforcement%20learning%20protocols%20attempt%20to%20mitigate%20this%20via%20a%20scalarized%20reward%20that%20penalizes%20tool%20usage.%20Yet%2C%20this%20coupled%20formulation%20creates%20an%20irreconcilable%20optimization%20dilemma%3A%20an%20aggressive%20penalty%20suppresses%20essential%20tool%20use%2C%20whereas%20a%20mild%20penalty%20is%20entirely%20subsumed%20by%20the%20variance%20of%20the%20accuracy%20reward%20during%20advantage%20normalization%2C%20rendering%20it%20impotent%20against%20tool%20overuse.%20To%20transcend%20this%20bottleneck%2C%20we%20propose%20HDPO%2C%20a%20framework%20that%20reframes%20tool%20efficiency%20from%20a%20competing%20scalar%20objective%20to%20a%20strictly%20conditional%20one.%20By%20eschewing%20reward%20scalarization%2C%20HDPO%20maintains%20two%20orthogonal%20optimization%20channels%3A%20an%20accuracy%20channel%20that%20maximizes%20task%20correctness%2C%20and%20an%20efficiency%20channel%20that%20enforces%20execution%20economy%20exclusively%20within%20accurate%20trajectories%20via%20conditional%20advantage%20estimation.%20This%20decoupled%20architecture%20naturally%20induces%20a%20cognitive%20curriculum-compelling%20the%20agent%20to%20first%20master%20task%20resolution%20before%20refining%20its%20self-reliance.%20Extensive%20evaluations%20demonstrate%20that%20our%20resulting%20model%2C%20Metis%2C%20reduces%20tool%20invocations%20by%20orders%20of%20magnitude%20while%20simultaneously%20elevating%20reasoning%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08545v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAct%2520Wisely%253A%2520Cultivating%2520Meta-Cognitive%2520Tool%2520Use%2520in%2520Agentic%2520Multimodal%2520Models%26entry.906535625%3DShilin%2520Yan%2520and%2520Jintao%2520Tong%2520and%2520Hongwei%2520Xue%2520and%2520Xiaojun%2520Tang%2520and%2520Yangyang%2520Wang%2520and%2520Kunyu%2520Shi%2520and%2520Guannan%2520Zhang%2520and%2520Ruixuan%2520Li%2520and%2520Yixiong%2520Zou%26entry.1292438233%3DThe%2520advent%2520of%2520agentic%2520multimodal%2520models%2520has%2520empowered%2520systems%2520to%252 {"title": "MolmoWeb: Open Visual Web Agent and Open Data for the Open Web", "author": "Tanmay Gupta and Piper Wolters and Zixian Ma and Peter Sushko and Rock Yuren Pang and Diego Llanes and Yue Yang and Taira Anderson and Boyuan Zheng and Zhongzheng Ren and Harsh Trivedi and Taylor Blanton and Caleb Ouellette and Winson Han and Ali Farhadi and Ranjay Krishna", "abstract": "Web agents--autonomous systems that navigate and execute tasks on the web on behalf of users--have the potential to transform how people interact with the digital world. However, the most capable web agents today rely on proprietary models with undisclosed training data and recipes, limiting scientific understanding, reproducibility, and community-driven progress.\n  We believe agents for the open web should be built in the open. To this end, we introduce (1) MolmoWebMix, a large and diverse mixture of browser task demonstrations and web-GUI perception data and (2) MolmoWeb, a family of fully open multimodal web agents. Specifically, MolmoWebMix combines over 100K synthetic task trajectories from multiple complementary generation pipelines with 30K+ human demonstrations, atomic web-skill trajectories, and GUI perception data, including referring expression grounding and screenshot question answering. MolmoWeb agents operate as instruction-conditioned visual-language action policies: given a task instruction and a webpage screenshot, they predict the next browser action, requiring no access to HTML, accessibility trees, or specialized APIs.\n  Available in 4B and 8B size, on browser-use benchmarks like WebVoyager, Online-Mind2Web, and DeepShop, MolmoWeb agents achieve state-of-the-art results outperforming similar scale open-weight-only models such as Fara-7B, UI-Tars-1.5-7B, and Holo1-7B. MolmoWeb-8B also surpasses set-of-marks (SoM) agents built on much larger closed frontier models like GPT-4o. We further demonstrate consistent gains through test-time scaling via parallel rollouts with best-of-N selection, achieving 94.7% and 60.5% pass@4 (compared to 78.2% and 35.3% pass@1) on WebVoyager and Online-Mind2Web respectively. We will release model checkpoints, training data, code, and a unified evaluation harness to enable reproducibility and accelerate open research on web agents.", "link": "http://arxiv.org/abs/2604.08516v1", "date": "2026-04-09", "relevancy": 1.5117, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5067}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5064}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4946}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MolmoWeb%3A%20Open%20Visual%20Web%20Agent%20and%20Open%20Data%20for%20the%20Open%20Web&body=Title%3A%20MolmoWeb%3A%20Open%20Visual%20Web%20Agent%20and%20Open%20Data%20for%20the%20Open%20Web%0AAuthor%3A%20Tanmay%20Gupta%20and%20Piper%20Wolters%20and%20Zixian%20Ma%20and%20Peter%20Sushko%20and%20Rock%20Yuren%20Pang%20and%20Diego%20Llanes%20and%20Yue%20Yang%20and%20Taira%20Anderson%20and%20Boyuan%20Zheng%20and%20Zhongzheng%20Ren%20and%20Harsh%20Trivedi%20and%20Taylor%20Blanton%20and%20Caleb%20Ouellette%20and%20Winson%20Han%20and%20Ali%20Farhadi%20and%20Ranjay%20Krishna%0AAbstract%3A%20Web%20agents--autonomous%20systems%20that%20navigate%20and%20execute%20tasks%20on%20the%20web%20on%20behalf%20of%20users--have%20the%20potential%20to%20transform%20how%20people%20interact%20with%20the%20digital%20world.%20However%2C%20the%20most%20capable%20web%20agents%20today%20rely%20on%20proprietary%20models%20with%20undisclosed%20training%20data%20and%20recipes%2C%20limiting%20scientific%20understanding%2C%20reproducibility%2C%20and%20community-driven%20pr {"title": "WebArbiter: A Principle-Guided Reasoning Process Reward Model for Web Agents", "author": "Yao Zhang and Shijie Tang and Zeyu Li and Zhen Han and Volker Tresp", "abstract": "Web agents hold great potential for automating complex computer tasks, yet their interactions involve long-horizon, sequential decision-making with irreversible actions. In such settings, outcome-based supervision is sparse and delayed, often rewarding incorrect trajectories and failing to support inference-time scaling. This motivates the use of Process Reward Models (WebPRMs) for web navigation, but existing approaches remain limited: scalar WebPRMs collapse progress into coarse, weakly grounded signals, while checklist-based WebPRMs rely on brittle template matching that fails under layout or semantic changes and often mislabels superficially correct actions as successful, providing little insight or interpretability. To address these challenges, we introduce WebArbiter, a reasoning-first, principle-inducing WebPRM that formulates reward modeling as text generation, producing structured justifications that conclude with a preference verdict and identify the action most conducive to task completion under the current context. Training follows a two-stage pipeline: reasoning distillation equips the model with coherent principle-guided reasoning, and reinforcement learning corrects teacher biases by directly aligning verdicts with correctness, enabling stronger generalization. To support systematic evaluation, we release WebPRMBench, a comprehensive benchmark spanning four diverse web environments with rich tasks and high-quality preference annotations. On WebPRMBench, WebArbiter-7B outperforms the strongest baseline, GPT-5, by 9.1 points. In reward-guided trajectory search on WebArena-Lite, it surpasses the best prior WebPRM by up to 6.4 points, underscoring its robustness and practical value in complex web tasks.", "link": "http://arxiv.org/abs/2601.21872v2", "date": "2026-04-09", "relevancy": 1.4878, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5407}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4921}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WebArbiter%3A%20A%20Principle-Guided%20Reasoning%20Process%20Reward%20Model%20for%20Web%20Agents&body=Title%3A%20WebArbiter%3A%20A%20Principle-Guided%20Reasoning%20Process%20Reward%20Model%20for%20Web%20Agents%0AAuthor%3A%20Yao%20Zhang%20and%20Shijie%20Tang%20and%20Zeyu%20Li%20and%20Zhen%20Han%20and%20Volker%20Tresp%0AAbstract%3A%20Web%20agents%20hold%20great%20potential%20for%20automating%20complex%20computer%20tasks%2C%20yet%20their%20interactions%20involve%20long-horizon%2C%20sequential%20decision-making%20with%20irreversible%20actions.%20In%20such%20settings%2C%20outcome-based%20supervision%20is%20sparse%20and%20delayed%2C%20often%20rewarding%20incorrect%20trajectories%20and%20failing%20to%20support%20inference-time%20scaling.%20This%20motivates%20the%20use%20of%20Process%20Reward%20Models%20%28WebPRMs%29%20for%20web%20navigation%2C%20but%20existing%20approaches%20remain%20limited%3A%20scalar%20WebPRMs%20collapse%20progress%20into%20coarse%2C%20weakly%20grounded%20signals%2C%20while%20checklist-based%20WebPRMs%20rely%20on%20brittle%20template%20matching%20that%20fails%20under%20layout%20or%20semantic%20changes%20and%20often%20mislabels%20superficially%20correct%20actions%20as%20successful%2C%20providing%20little%20insight%20or%20interpretability.%20To%20address%20these%20challenges%2C%20we%20introduce%20WebArbiter%2C%20a%20reasoning-first%2C%20principle-inducing%20WebPRM%20that%20formulates%20reward%20modeling%20as%20text%20generation%2C%20producing%20structured%20justifications%20that%20conclude%20with%20a%20preference%20verdict%20and%20identify%20the%20action%20most%20conducive%20to%20task%20completion%20under%20the%20current%20context.%20Training%20follows%20a%20two-stage%20pipeline%3A%20reasoning%20distillation%20equips%20the%20model%20with%20coherent%20principle-guided%20reasoning%2C%20and%20reinforcement%20learning%20corrects%20teacher%20biases%20by%20directly%20aligning%20verdicts%20with%20correctness%2C%20enabling%20stronger%20generalization.%20To%20support%20systematic%20evaluation%2C%20we%20release%20WebPRMBench%2C%20a%20comprehensive%20benchmark%20spanning%20four%20diverse%20web%20environments%20with%20rich%20tasks%20and%20high-quality%20preference%20annotations.%20On%20WebPRMBench%2C%20WebArbiter-7B%20outperforms%20the%20strongest%20baseline%2C%20GPT-5%2C%20by%209.1%20points.%20In%20reward-guided%20trajectory%20search%20on%20WebArena-Lite%2C%20it%20surpasses%20the%20best%20prior%20WebPRM%20by%20up%20to%206.4%20points%2C%20underscoring%20its%20robustness%20and%20practical%20value%20in%20complex%20web%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2601.21872v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWebArbiter%253A%2520A%2520Principle-Guided%2520Reasoning%2520Process%2520Reward%2520Model%2520for%2520Web%2520Agents%26entry.906535625%3DYao%2520Zhang%2520and%2520Shijie%2520Tang%2520and%2520Zeyu%2520Li%2520and%2520Zhen%2520Han%2520and%2520Volker%2520Tresp%26entry.1292438233%3DWeb%2520agents%2520hold%2520great%2520potential%2520for%2520automating%2520complex%2520computer%2520tasks%252C%2520yet%2520their%2520interactions%2520involve%2520long-horizon%252C%2520sequential%2520decision-making%2520with%2520irreversible%2520actions.%2520In%2520such%2520settings%252C%2520outcome-based%2520supervision%2520is%2520sparse%2520and%2520delayed%252C%2520often%2520rewa {"title": "Demystifying OPD: Length Inflation and Stabilization Strategies for Large Language Models", "author": "Feng Luo and Yu-Neng Chuang and Guanchu Wang and Zicheng Xu and Xiaotian Han and Tianyi Zhang and Vladimir Braverman", "abstract": "On-policy distillation (OPD) trains student models under their own induced distribution while leveraging supervision from stronger teachers. We identify a failure mode of OPD: as training progresses, on-policy rollouts can undergo abrupt length inflation, causing truncated trajectories to dominate the training data. This truncation collapse coincides with abrupt repetition saturation and induces biased gradient signals, leading to severe training instability and sharp degradation in validation performance. We attribute this problem to the interaction between student-induced data collection and the distillation objective, which implicitly favors long and repetitive rollouts. To address this issue, we propose StableOPD, a stabilized OPD framework that combines a reference-based divergence constraint with rollout mixture distillation. These together mitigate repetition-induced length inflation and further stabilize OPD training. Across multiple math reasoning datasets, our approach prevents truncation collapse, stabilizes training dynamics, and improves performance by 7.2% on average.", "link": "http://arxiv.org/abs/2604.08527v1", "date": "2026-04-09", "relevancy": 1.456, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4971}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4877}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4678}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Demystifying%20OPD%3A%20Length%20Inflation%20and%20Stabilization%20Strategies%20for%20Large%20Language%20Models&body=Title%3A%20Demystifying%20OPD%3A%20Length%20Inflation%20and%20Stabilization%20Strategies%20for%20Large%20Language%20Models%0AAuthor%3A%20Feng%20Luo%20and%20Yu-Neng%20Chuang%20and%20Guanchu%20Wang%20and%20Zicheng%20Xu%20and%20Xiaotian%20Han%20and%20Tianyi%20Zhang%20and%20Vladimir%20Braverman%0AAbstract%3A%20On-policy%20distillation%20%28OPD%29%20trains%20student%20models%20under%20their%20own%20induced%20distribution%20while%20leveraging%20supervision%20from%20stronger%20teachers.%20We%20identify%20a%20failure%20mode%20of%20OPD%3A%20as%20training%20progresses%2C%20on-policy%20rollouts%20can%20undergo%20abrupt%20length%20inflation%2C%20causing%20truncated%20trajectories%20to%20dominate%20the%20training%20data.%20This%20truncation%20collapse%20coincides%20with%20abrupt%20repetition%20saturation%20and%20induces%20biased%20gradient%20signals%2C%20leading%20to%20severe%20training%20instability%20and%20sharp%20degradation%20in%20validation%20performance.%20We%20attribute%20this%20problem%20to%20the%20interaction%20between%20student-induced%20data%20collection%20and%20the%20distillation%20objective%2C%20which%20implicitly%20favors%20long%20and%20repetitive%20rollouts.%20To%20address%20this%20issue%2C%20we%20propose%20StableOPD%2C%20a%20stabilized%20OPD%20framework%20that%20combines%20a%20reference-based%20divergence%20constraint%20with%20rollout%20mixture%20distillation.%20These%20together%20mitigate%20repetition-induced%20length%20inflation%20and%20further%20stabilize%20OPD%20training.%20Across%20multiple%20math%20reasoning%20datasets%2C%20our%20approach%20prevents%20truncation%20collapse%2C%20stabilizes%20training%20dynamics%2C%20and%20improves%20performance%20by%207.2%25%20on%20average.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08527v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDemystifying proves%2520performance%2520by%25207.2%2525%2520on%2520average.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08527v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Demystifying%20OPD%3A%20Length%20Inflation%20and%20Stabilization%20Strategies%20for%20Large%20Language%20Models&entry.906535625=Feng%20Luo%20and%20Yu-Neng%20Chuang%20and%20Guanchu%20Wang%20and%20Zicheng%20Xu%20and%20Xiaotian%20Han%20and%20Tianyi%20Zhang%20and%20Vladimir%20Braverman&entry.1292438233=On-policy%20distillation%20%28OPD%29%20trains%20student%20models%20under%20their%20own%20induced%20distribution%20while%20leveraging%20supervision%20from%20stronger%20teachers.%20We%20identify%20a%20failure%20mode%20of%20OPD%3A%20as%20training%20progresses%2C%20on-policy%20rollouts%20can%20undergo%20abrupt%20length%20inflation%2C%20causing%20truncated%20trajectories%20to%20dominate%20the%20training%20data.%20This%20truncation%20collapse%20coincides%20with%20abrupt%20repetition%20saturation%20and%20induces%20biased%20gradient%20signals%2C%20leading%20to%20severe%20training%20instability%20and%20sharp%20degradation%20in%20validation%20performance.%20We%20attribute%20this%20problem%20to%20the%20interaction%20between%20student-induced%20data%20collection%20and%20the%20distillation%20objective%2C%20which%20implicitly%20favors%20long%20and%20repetitive%20rollouts.%20To%20address%20this%20issue%2C%20we%20propose%20StableOPD%2C%20a%20stabilized%20OPD%20framework%20that%20combines%20a%20reference-based%20divergence%20constraint%20with%20rollout%20mixture%20distillation.%20These%20together%20mitigate%20repetition-induced%20length%20inflation%20and%20further%20stabilize%20OPD%20training.%20Across%20multiple%20math%20reasoning%20datasets%2C%20our%20approach%20prevents%20truncation%20collapse%2C%20stabilizes%20training%20dynamics%2C%20and%20improves%20performance%20by%207.2%25%20on%20average.&entry.1838667208=http%

{"title": "ETCH-X: Robustify Expressive Body Fitting to Clothed Humans with Composable Datasets", "author": "Xiaoben Li and Jingyi Wu and Zeyu Cai and Yu Siyuan and Boqian Li and Yuliang Xiu", "abstract": "Human body fitting, which aligns parametric body models such as SMPL to raw 3D point clouds of clothed humans, serves as a crucial first step for downstream tasks like animation and texturing. An effective fitting method should be both locally expressive-capturing fine details such as hands and facial features-and globally robust to handle real-world challenges, including clothing dynamics, pose variations, and noisy or partial inputs. Existing approaches typically excel in only one aspect, lacking an all-in-one solution.We upgrade ETCH to ETCH-X, which leverages a tightness-aware fitting paradigm to filter out clothing dynamics (\"undress\"), extends expressiveness with SMPL-X, and replaces explicit sparse markers (which are highly sensitive to partial data) with implicit dense correspondences (\"dense fit\") for more robust and fine-grained body fitting. Our disentangled \"undress\" and \"dense fit\" modular stages enable separate and scalable training on composable data sources, including diverse simulated garments (CLOTH3D), large-scale full-body motions (AMASS), and fine-grained hand gestures (InterHand2.6M), improving outfit generalization and pose robustness of both bodies and hands. Our approach achieves robust and expressive fitting across diverse clothing, poses, and levels of input completeness, delivering a substantial performance improvement over ETCH on both: 1) seen data, such as 4D-Dress (MPJPE-All, 33.0% ) and CAPE (V2V-Hands, 35.8% ), and 2) unseen data, such as BEDLAM2.0 (MPJPE-All, 80.8% ; V2V-All, 80.5% ). Code and models will be released at https://xiaobenli00.github.io/ETCH-X/.", "link": "http://arxiv.org/abs/2604.08548v1", "date": "2026-04-09", "relevancy": 3.0538, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "ht {"title": "FIT: A Large-Scale Dataset for Fit-Aware Virtual Try-On", "author": "Johanna Karras and Yuanhao Wang and Yingwei Li and Ira Kemelmacher-Shlizerman", "abstract": "Given a person and a garment image, virtual try-on (VTO) aims to synthesize a realistic image of the person wearing the garment, while preserving their original pose and identity. Although recent VTO methods excel at visualizing garment appearance, they largely overlook a crucial aspect of the try-on experience: the accuracy of garment fit -- for example, depicting how an extra-large shirt looks on an extra-small person. A key obstacle is the absence of datasets that provide precise garment and body size information, particularly for \"ill-fit\" cases, where garments are significantly too large or too small. Consequently, current VTO methods default to generating well-fitted results regardless of the garment or person size.\n  In this paper, we take the first steps towards solving this open problem. We introduce FIT (Fit-Inclusive Try-on), a large-scale VTO dataset comprising over 1.13M try-on image triplets accompanied by precise body and garment measurements. We overcome the challenges of data collection via a scalable synthetic strategy: (1) We programmatically generate 3D garments using GarmentCode and drape them via physics simulation to capture realistic garment fit. (2) We employ a novel re-texturing framework to transform synthetic renderings into photorealistic images while strictly preserving geometry. (3) We introduce person identity preservation into our re-texturing model to generate paired person images (same person, different garments) for supervised training. Finally, we leverage our FIT dataset to train a baseline fit-aware virtual try-on model. Our data and results set the new state-of-the-art for fit-aware virtual try-on, as well as offer a robust benchmark for future research. We will make all data and code publicly available on our project page: https://johannakarras.github.io/FIT.", "link": "http://arxiv.org/abs/2604.08526v1", "date": "2026-04-09", "relevancy": 2.9957, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6166}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.596}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5848}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FIT%3A%20A%20Large-Scale%20Dataset%20for%20Fit-Aware%20Virtual%20Try-On&body=Title%3A%20FIT%3A%20A%20Large-Scale%20Dataset%20for%20Fit-Aware%20Virtual%20Try-On%0AAuthor%3A%20Johanna%20Karras%20and%20Yuanhao%20Wang%20and%20Yingwei%20Li%20and%20Ira%20Kemelmacher-Shlizerman%0AAbstract%3A%20Given%20a%20person%20and%20a%20garment%20image%2C%20virtual%20try-on%20%28VTO%29%20aims%20to%20synthesize%20a%20realistic%20image%20of%20the%20person%20wearing%20the%20garment%2C%20while%20preserving%20their%20original%20pose%20and%20identity.%20Although%20recent%20VTO%20methods%20excel%20at%20visualizing%20garment%20appearance%2C%20they%20largely%20overlook%20a%20crucial%20aspect%20of%20the%20try-on%20experience%3A%20the%20accuracy%20of%20garment%20fit%20--%20for%20example%2C%20depicting%20how%20an%20extra-large%20shirt%20looks%20on%20an%20extra-small%20person.%20A%20key%20obstacle%20is%20the%20absence%20of%20datasets%20that%20provide%20precise%20garment%20and%20body%20size%20information%2C%20particularly%20for%20%22ill-fit%22%20cases%2C%20where%20garments%20are%20significantly%20too%20large%20or%20too%20small.%20Consequently%2C%20current%20VTO%20methods%20default%20to%20generating%20well-fitted%20results%20regardless%20of%20the%20garment%20or%20person%20size.%0A%20%20In%20this%20paper%2C%20we%20take%20the%20first%20steps%20towards%20solving%20this%20open%20problem.%20We%20introduce%20FIT%20%28Fit-Inclusive%20Try-on%29%2C%20a%20large-scale%20VTO%20dataset%20comprising%20over%201.13M%20try-on%20image%20triplets%20accompanied%20by%20precise%20body%20and%20garment%20measurements.%20We%20overcome%20the%20challenges%20of%20data%20collection%20via%20a%20scalable%20synthetic%20strategy%3A%20%281%29%20We%20programmatically%20generate%203D%20garments%20using%20GarmentCode%20and%20drape%20them%20via%20physics%20simulation%20to%20capture%20realistic%20garment%20fit.%20%282%29%20We%20employ%20a%20novel%20re-texturing%20framework%20to%20transform%20synthetic%20renderings%20into%20photorealistic%20images%20while%20strictly%20preserving%20geometry.%20%283%29%20We%20introduce%20person%20identity%20preservation%20into%20our%20re-texturing%20model%20to%20generate%20paired%20person%20images%20%28same%20person%2C%20different%20garments%29%20for%20supervised%20training.%20Finally%2C%20we%20leverage%20our%20FIT%20dataset%20to%20train%20a%20baseline%20fit-aware%20virtual%20try-on%20model.%20Our%20data%20and%20results%20set%20the%20new%20state-of-the-art%20for%20fit-aware%20virtual%20try-on%2C%20as%20well%20as%20offer%20a%20robust%20benchmark%20for%20future%20research.%20We%20will%20make%20all%20data%20and%20code%20publicly%20available%20on%20our%20project%20page%3A%20https%3A//johannakarras.github.io/FIT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08526v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFIT%253A%2520A%2520Large-Scale%2520Dataset%2520for%2520Fit-Aware%2520Virtual%2520Try-On%26entry.906535625%3DJohanna%2520Karras%2520and%2520Yuanhao%2520Wang%2520and%2520Yingwei%2520Li%2520and%2520Ira%2520Kemelmacher-Shlizerman%26entry.1292438233%3DGiven%2520a%2520person%2520and%2520a%2520garment%2520image%252C%2520virtual%2520try-on%2520%2528VTO%2529%2520aims%2520to%25 0information%2C%20particularly%20for%20%22ill-fit%22%20cases%2C%20where%20garments%20are%20significantly%20too%20large%20or%20too%20small.%20Consequently%2C%20current%20VTO%20methods%20default%20to%20generating%20well-fitted%20results%20regardless%20of%20the%20garment%20or%20person%20size.%0A%20%20In%20this%20paper%2C%20we%20take%20the%20first%20steps%20towards%20solving%20this%20open%20problem.%20We%20introduce%20FIT%20%28Fit-Inclusive%20Try-on%29%2C%20a%20large-scale%20VTO%20dataset%20comprising%20over%201.13M%20try-on%20image%20triplets%20accompanied%20by%20precise%20body%20and%20garment%20measurements.%20We%20overcome%20the%20challenges%20of%20data%20collection%20via%20a%20scalable%20synthetic%20strategy%3A%20%281%29%20We%20programmatically%20generate%203D%20garments%20using%20GarmentCode%20and%20drape%20them%20via%20physics%20simulation%20to%20capture%20realistic%20garment%20fit.%20%282%29%20We%20employ%20a%20novel%20re-texturing%20framework%20to%20transform%20synthetic%20renderings%20into%20photorealistic%20images%20while%20strictly%20preserving%20geometry.%20%283%29%20We%20introduce%20person%20identity%20preservation%20into%20our%20re-texturing%20model%20to%20generate%20paired%20person%20images%20%28same%20person%2C%20different%20garments%29%20for%20supervised%20training.%20Finally%2C%20we%20leverage%20our%20FIT%20dataset%20to%20train%20a%20baseline%20fit-aware%20virtual%20try-on%20model.%20Our%20data%20and%20results%20set%20the%20new%20state-of-the-art%20for%20fit-aware%20virtual%20try-on%2C%20as%20well%20as%20offer%20a%20robust%20benchmark%20for%20future%20research.%20We%20will%20make%20all%20data%20and%20code%20publicly%20available%20on%20our%20project%20page%3A%20https%3A//johannakarras.github.io/FIT.&entry.1838667208=http%3A//arxiv.org/abs/2604.08526v1&entry.124074799=Read"},
{"title": "Meta-learning In-Context Enables Training-Free Cross Subject Brain Decoding", "author": "Mu Nan and Muquan Yu and Weijian Mai and Jacob S. Prince and Hossein Adeli and Rui Zhang and Jiahang Cao and Benjamin Becker and John A. Pyles and Margaret M. Henderson and Chunfeng Song and Nikolaus Kriegeskorte and Michael J. Tarr and Xiaoqing Hu and Andrew F. Luo", "abstract": "Visual decoding from brain signals is a key challenge at the intersection of computer vision and neuroscience, requiring methods that bridge neural representations and computational models of vision. A field-wide goal is to achieve generalizable, cross-subject models. A major obstacle towards this goal is the substantial variability in neural representations across individuals, which has so far required training bespoke models or fine-tuning separately for each subject. To address this challenge, we introduce a meta-optimized approach for semantic visual decoding from fMRI that generalizes to novel subjects without any fine-tuning. By simply conditioning on a small set of image-brain activation examples from the new individual, our model rapidly infers their unique neural encoding patterns to facilitate robust and efficient visual decoding. Our approach is explicitly optimized for in-context learning of the new subject's encoding model and performs decoding by hierarchical inference, inverting the encoder. First, for multiple brain regions, we estimate the per-voxel visual response encoder parameters by constructing a context over multiple stimuli and responses. Second, we construct a context consisting of encoder parameters and response values over multiple voxels to perform aggregated functional inversion. We demonstrate strong cross-subject and cross-scanner generalization across diverse visual backbones without retraining or fine-tuning. Moreover, our approach requires neither anatomical alignment nor stimulus overlap. This work is a critical step towards a generalizable foundation model for non-invasive brain decoding.", "link": "http://arxiv.org/abs/2604.08537v1", "date": "2026-04-09", "relevancy": 2.8854, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6027}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6027}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Meta-learning%20In-Context%20Enables%20Training-Free%20Cross%20Subject%20Brain%20Decoding&body=Title%3A%20Meta-learning%20In-Context%20Enables%20Training-Free%20Cross%20Subject%20Brain%20Decoding%0AAuthor%3A%20Mu%20Nan%20and%20Muquan%20Yu%20and%20Weijian%20Mai%20and%20Jacob%20S.%20Prince%20and%20Hossein%20Adeli%20and%20Rui%20Zhang%20and%20Jiahang%20Cao%20and%20Benjamin%20Becker%20and%20John%20A.%20Pyles%20and%20Margaret%20M.%20Henderson%20and%20Chunfeng%20Song%20and%20Nikolaus%20Kriegeskorte%20and%20Michael%20J.%20Tarr%20and%20Xiaoqing%20Hu%20and%20Andrew%20F.%20Luo%0AAbstract%3A%20Visual%20decoding%20from%20brain%20signals%20is%20a%20key%20challenge%20at%20the%20intersection%20of%20computer%20vision%20and%20neuroscience%2C%20requiring%20methods%20that%20bridge%20neural%20representations%20and%20computational%20models%20of%20vision.%20A%20field-wide%20goal%20is%20to%20achieve%20generalizable%2C%20cross-subject%20models.%20A%20major%20obstacle%20towards%20this%20goal%20is%20the%20substantial%20variability%20in%20neural%20representations%20across%20individuals%2C%20which%20has%20so%20far%20required%20training%20bespoke%20models%20or%20fine-tuning%20separately%20for%20each%20subject.%20To%20address%20this%20challenge%2C%20we%20introduce%20a%20meta-optimized%20approach%20for%20semantic%20visual%20decoding%20from%20fMRI%20that%20generalizes%20to%20novel%20subjects%20without%20any%20fine-tuning.%20By%20simply%20conditioning%20on%20a%20small%20set%20of%20image-brain%20activation%20examples%20from%20the%20new%20individual%2C%20our%20model%20rapidly%20infers%20their%20unique%20neural%20encoding%20patterns%20to%20facilitate%20robust%20and%20efficient%20visual%20decoding.%20Our%20approach%20is%20explicitly%20optimized%20for%20in-context%20learning%20of%20the%20new%20subject%27s%20encoding%20model%20and%20performs%20decoding%20by%20hierarchical%20inference%2C%20inverting%20the%20encoder.%20First%2C%20for%20multiple%20brain%20regions%2C%20we%20estimate%20the%20per-voxel%20visual%20response%20encoder%20parameters%20by%20constructing%20a%20context%20over%20multiple%20stimuli%20and%20responses.%20Second%2C%20we%20construct%20a%20context%20consisting%20of%20encoder%20parameters%20and%20response%20values%20over%20multiple%20voxels%20to%20perform%20aggregated%20functional%20inversion.%20We%20demonstrate%20strong%20cross-subject%20and%20cross-scanner%20generalization%20across%20diverse%20visual%20backbones%20without%20retraining%20or%20fine-tuning.%20Moreover%2C%20our%20approach%20requires%20neither%20anatomical%20alignment%20nor%20stimulus%20overlap.%20This%20work%20is%20a%20critical%20step%20towards%20a%20generalizable%20foundation%20model%20for%20non-invasive%20brain%20decoding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08537v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMeta-learning%2520In-Context%2520Enables%2520Training-Free%2520Cross%2520Subject%2520Brain%2520Decoding%26entry.906535625%3DMu%2520Nan%2520and%2520Muquan%2520Yu%2520and%2520Weijian%2520Mai%2520and%2520Jacob%2520S.%2520Prince%2520and%2520Hossein%2520Adeli%2520and%2520Rui%2520Zhang%2520and%2520Jiahang%2520Cao%2520and%2520Benjamin%2520Becker%2520and%2520John%2520A.%2520Pyles%2520and%2520Margaret%2520M.%2520Henderson%2520and%2520Chu {"title": "What They Saw, Not Just Where They Looked: Semantic Scanpath Similarity via VLMs and NLP metric", "author": "Mohamed Amine Kerkouri and Marouane Tliba and Bin Wang and Aladine Chetouani and Ulas Bagci and Alessandro Bruno", "abstract": "Scanpath similarity metrics are central to eye-movement research, yet existing methods predominantly evaluate spatial and temporal alignment while neglecting semantic equivalence between attended image regions. We present a semantic scanpath similarity framework that integrates vision-language models (VLMs) into eye-tracking analysis. Each fixation is encoded under controlled visual context (patch-based and marker-based strategies) and transformed into concise textual descriptions, which are aggregated into scanpath-level representations. Semantic similarity is then computed using embedding-based and lexical NLP metrics and compared against established spatial measures, including MultiMatch and DTW. Experiments on free-viewing eye-tracking data demonstrate that semantic similarity captures partially independent variance from geometric alignment, revealing cases of high content agreement despite spatial divergence. We further analyze the impact of contextual encoding on description fidelity and metric stability. Our findings suggest that multimodal foundation models enable interpretable, content-aware extensions of classical scanpath analysis, providing a complementary dimension for gaze research within the ETRA community.", "link": "http://arxiv.org/abs/2604.08494v1", "date": "2026-04-09", "relevancy": 2.8754, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5899}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5899}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": {"title": "UniversalVTG: A Universal and Lightweight Foundation Model for Video Temporal Grounding", "author": "Joungbin An and Agrim Jain and Kristen Grauman", "abstract": "Video temporal grounding (VTG) is typically tackled with dataset-specific models that transfer poorly across domains and query styles. Recent efforts to overcome this limitation have adapted large multimodal language models (MLLMs) to VTG, but their high compute cost and limited video context still hinder long-video grounding. We instead scale unified supervision while keeping the model lightweight. We present UniversalVTG, a single VTG model trained with large-scale cross-dataset pretraining. An offline Query Unifier canonicalizes heterogeneous query formats into a shared declarative space, reducing linguistic mismatch and preventing the negative transfer observed under na\u00efve joint training. Combined with an efficient grounding head, UniversalVTG scales to long, untrimmed videos. Across diverse benchmarks-GoalStep-StepGrounding, Ego4D-NLQ, TACoS, Charades-STA, and ActivityNet-Captions-one UniversalVTG checkpoint achieves state-of-the-art performance versus dedicated VTG models. Moreover, despite being $>100\\times$ smaller than recent MLLM-based approaches, UniversalVTG matches or exceeds their accuracy on multiple benchmarks, offering a practical alternative to parameter-heavy MLLMs.", "link": "http://arxiv.org/abs/2604.08522v1", "date": "2026-04-09", "relevancy": 2.798, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5637}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5575}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5575}], "mailto": "mailto:haoxiang.li {"title": "Seeing but Not Thinking: Routing Distraction in Multimodal Mixture-of-Experts", "author": "Haolei Xu and Haiwen Hong and Hongxing Li and Rui Zhou and Yang Zhang and Longtao Huang and Hui Xue and Yongliang Shen and Weiming Lu and Yueting Zhuang", "abstract": "Multimodal Mixture-of-Experts (MoE) models have achieved remarkable performance on vision-language tasks. However, we identify a puzzling phenomenon termed Seeing but Not Thinking: models accurately perceive image content yet fail in subsequent reasoning, while correctly solving identical problems presented as pure text. Through systematic analysis, we first verify that cross-modal semantic sharing exists in MoE architectures, ruling out semantic alignment failure as the sole explanation. We then reveal that visual experts and domain experts exhibit layer-wise separation, with image inputs inducing significant routing divergence from text inputs in middle layers where domain experts concentrate. Based on these findings, we propose the Routing Distraction hypothesis: when processing visual inputs, the routing mechanism fails to adequately activate task-relevant reasoning experts. To validate this hypothesis, we design a routing-guided intervention method that enhances domain expert activation. Experiments on three multimodal MoE models across six benchmarks demonstrate consistent improvements, with gains of up to 3.17% on complex visual reasoning tasks. Our analysis further reveals that domain expert identification locates cognitive functions rather than sample-specific solutions, enabling effective transfer across tasks with different information structures.", "link": "http://arxiv.org/abs/2604.08541v1", "date": "2026-04-09", "relevancy": 2.79, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5585}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understand ng%20experts.%20To%20validate%20this%20hypothesis%2C%20we%20design%20a%20routing-guided%20intervention%20method%20that%20enhances%20domain%20expert%20activation.%20Experiments%20on%20three%20multimodal%20MoE%20models%20across%20six%20benchmarks%20demonstrate%20consistent%20improvements%2C%20with%20gains%20of%20up%20to%203.17%25%20on%20complex%20visual%20reasoning%20tasks.%20Our%20analysis%20further%20reveals%20that%20domain%20expert%20identification%20locates%20cognitive%20functions%20rather%20than%20sample-specific%20solutions%2C%20enabling%20effective%20transfer%20across%20tasks%20with%20different%20information%20structures.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08541v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeeing%2520but%2520Not%2520Thinking%253A%2520Routing%2520Distraction%2520in%2520Multimodal%2520Mixture-of-Experts%26entry.906535625%3DHaolei%2520Xu%2520and%2520Haiwen%2520Hong%2520and%2520Hongxing%2520Li%2520and%2520Rui%2520Zhou%2520and%2520Yang%2520Zhang%2520and%2520Longtao%2520Huang%2520and%2520Hui%2520Xue%2520and%2520Yongliang%2520Shen%2520and%2520Weiming%2520Lu%2520and%2520Yueting%2520Zhuang%26entry.1292438233%3DMultimodal%2520Mixture-of-Experts%2520%2528MoE%2529%2520models%2520have%2520achieved%2520remarkable%2520performance%2520on%2520vision-language%2520tasks.%2520However%252C%2520we%2520identify%2520a%2520puzzling%2520phenomenon%2520termed%2520Seeing%2520but%2520Not%2520Thinking%253A%2520models%2520accurately%2520perceive%2520image%2520content%2520yet%2520fail%2520in%2520subsequent%2520reasoning%252C%2520while%2520correctly%2520solving%2520identical%2520problems%2520presented%2520as%2520pure%2520text.%2520Through%2520systematic%2520analysis%252C%2520we%2520first%2520verify%2520that%2520cross-modal%2520semantic%2520sharing%2520exists%2520in%2520MoE%2520architectures%252C%2520ruling%2520out%2520semantic%2520alignment%2520failure%2520as%2520the%2520sole%2520e {"title": "Phantom: Physics-Infused Video Generation via Joint Modeling of Visual and Latent Physical Dynamics", "author": "Ying Shen and Jerry Xiong and Tianjiao Yu and Ismini Lourentzou", "abstract": "Recent advances in generative video modeling, driven by large-scale datasets and powerful architectures, have yielded remarkable visual realism. However, emerging evidence suggests that simply scaling data and model size does not endow these systems with an understanding of the underlying physical laws that govern real-world dynamics. Existing approaches often fail to capture or enforce such physical consistency, resulting in unrealistic motion and dynamics. In his work, we investigate whether integrating the inference of latent physical properties directly into the video generation process can equip models with the ability to produce physically plausible videos. To this end, we propose Phantom, a Physics-Infused Video Generation model that jointly models the visual content and latent physical dynamics. Conditioned on observed video frames and inferred physical states, Phantom jointly predicts latent physical dynamics and generates future video frames. Phantom leverages a physics-aware video representation that serves as an abstract yet informaive embedding of the underlying physics, facilitating the joint prediction of physical dynamics alongside video content without requiring an explicit specification of a complex set of physical dynamics and properties. By integrating the inference of physical-aware video representation directly into the video generation process, Phantom produces video sequences that are both visually realistic and physically consistent. Quantitative and qualitative results on both standard video generation and physics-aware benchmarks demonstrate that Phantom not only outperforms existing methods in terms of adherence to physical dynamics but also delivers competitive perceptual fidelity.", "link": "http://arxiv.org/abs/2604.08503v1", "date": "2026-04-09", "relevancy": 2.7031, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.755}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6277}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.598}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Phantom%3A%20Physics-Infused%20Video%20Generation%20via%20Joint%20Modeling%20of%20Visual%20and%20Latent%20Physical%20Dynamics&body=Title%3A%20Phantom%3A%20Physics-Infused%20Video%20Generation%20via%20Joint%20Modeling%20of%20Visual%20and%20Latent%20Physical%20Dynamics%0AAuthor%3A%20Ying%20Shen%20and%20Jerry%20Xiong%20and%20Tianjiao%20Yu%20and%20Ismini%20Lourentzou%0AAbstract%3A%20Recent%20advances%20in%20generative%20video%20modeling%2C%20driven%20by%20large-scale%20datasets%20and%20powerful%20architectures%2C%20have%20yielded%20remarkable%20visual%20realism.%20However%2C%20emerging%20evidence%20suggests%20that%20simply%20scaling%20data%20and%20model%20size%20does%20not%20endow%20these%20systems%20with%20an%20understanding%20of%20the%20underlying%20physical%20laws%20that%20govern%20real-world%20dynamics.%20Existing%20approaches%20often%20fail%20to%20capture%20or%20enforce%20such%20physical%20consistency%2C%20resulting%20in%20unrealistic%20motion%20and%20dynamics.%20In%20his%20work%2C%20we%20investigate%20whether%20integrating%20the%20inference%20of%20latent%20physical%20properties%20directly%20into%20the%20video%20generation%20process%20can%20equip%20models%20with%20the%20ability%20to%20produce%20physically%20plausible%20videos.%20To%20this%20end%2C%20we%20propose%20Phantom%2C%20a%20Physics-Infused%20Video%20Generation%20model%20that%20jointly%20models%20the%20visual%20content%20and%20latent%20physical%20dynamics.%20Conditioned%20on%20observed%20video%20frames%20and%20inferred%20physical%20states%2C%20Phantom%20jointly%20predicts%20latent%20physical%20dynamics%20and%20generates%20future%20video%20frames.%20Phantom%20leverages%20a%20physics-aware%20video%20representation%20that%20serves%20as%20an%20abstract%20yet%20informaive%20embedding%20of%20the%20underlying%20physics%2C%20facilitating%20the%20joint%20prediction%20of%20physical%20dynamics%20alongside%20video%20content%20without%20requiring%20an%20explicit%20specification%20of%20a%20complex%20set%20of%20physical%20dynamics%20and%20properties.%20By%20integrating%20the%20inference%20of%20physical-aware%20video%20representation%20directly%20into%20the%20video%20generation%20process%2C%20Phantom%20produces%20video%20sequences%20that%20are%20both%20visually%20realistic%20and%20physically%20consistent.%20Quantitative%20and%20qualitative%20results%20on%20both%20standard%20video%20generation%20and%20physics-aware%20benchmarks%20demonstrate%20that%20Phantom%20not%20only%20outperforms%20existing%20methods%20in%20terms%20of%20adherence%20to%20physical%20dynamics%20but%20also%20delivers%20competitive%20perceptual%20fidelity.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08503v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhantom%253A%2520Physics-Infused%2520Video%2520Generation%2520via%2520Joint%2520Modeling%2520of%2520Visual%2520and%2520Latent%2520Physical%2520Dynamics%26entry.906535625%3DYing%2520Shen%2520and%2520Jerry%2520Xiong%2520and%2520Tianjiao%2520Yu%2520and%2520Ismini%2520Lourentzou%26entry.1292438233%3DRecent%2520advances%2520in%2520generative%2520video%2520modeling%252C%2520driven%2520by%2520large-scale%2520datasets%2520and%2520powerful%2520architectures%252C%2520have%2520yielded%2520remarkable%2520visual%2520realism.%2520However%252C%2520emerging%2520evidence%2520suggests%2520that%2520simply%2520scaling%2520data%2520and%2520model%2520size 20latent%20physical%20dynamics%20and%20generates%20future%20video%20frames.%20Phantom%20leverages%20a%20physics-aware%20video%20representation%20that%20serves%20as%20an%20abstract%20yet%20informaive%20embedding%20of%20the%20underlying%20physics%2C%20facilitating%20the%20joint%20prediction%20of%20physical%20dynamics%20alongside%20video%20content%20without%20requiring%20an%20explicit%20specification%20of%20a%20complex%20set%20of%20physical%20dynamics%20and%20properties.%20By%20integrating%20the%20inference%20of%20physical-aware%20video%20representation%20directly%20into%20the%20video%20generation%20process%2C%20Phantom%20produces%20video%20sequences%20that%20are%20both%20visually%20realistic%20and%20physically%20consistent.%20Quantitative%20and%20qualitative%20results%20on%20both%20standard%20video%20generation%20and%20physics-aware%20benchmarks%20demonstrate%20that%20Phantom%20not%20only%20outperforms%20existing%20methods%20in%20terms%20of%20adherence%20to%20physical%20dynamics%20but%20also%20delivers%20competitive%20perceptual%20fidelity.&entry.1838667208=http%3A//arxiv.org/abs/2604.08503v1&entry.124074799=Read"},
{"title": "Scal3R: Scalable Test-Time Training for Large-Scale 3D Reconstruction", "author": "Tao Xie and Peishan Yang and Yudong Jin and Yingfeng Cai and Wei Yin and Weiqiang Ren and Qian Zhang and Wei Hua and Sida Peng and Xiaoyang Guo and Xiaowei Zhou", "abstract": "This paper addresses the task of large-scale 3D scene reconstruction from long video sequences. Recent feed-forward reconstruction models have shown promising results by directly regressing 3D geometry from RGB images without explicit 3D priors or geometric constraints. However, these methods often struggle to maintain reconstruction accuracy and consistency over long sequences due to limited memory capacity and the inability to effectively capture global contextual cues. In contrast, humans can naturally exploit the global understanding of the scene to inform local perception. Motivated by this, we propose a novel neural global context representation that efficiently compresses and retains long-range scene information, enabling the model to leverage extensive contextual cues for enhanced reconstruction accuracy and consistency. The context representation is realized through a set of lightweight neural sub-networks that are rapidly adapted during test time via self-supervised objectives, which substantially increases memory capacity without incurring significant computational overhead. The experiments on multiple large-scale benchmarks, including the KITTI Odometry~\\cite{Geiger2012CVPR} and Oxford Spires~\\cite{tao2025spires} datasets, demonstrate the effectiveness of our approach in handling ultra-large scenes, achieving leading pose accuracy and state-of-the-art 3D reconstruction accuracy while maintaining efficiency. Code is available at https://zju3dv.github.io/scal3r.", "link": "http://arxiv.org/abs/2604.08542v1", "date": "2026-04-09", "relevancy": 2.633, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "si {"title": "Persistence-Augmented Neural Networks", "author": "Elena Xinyi Wang and Arnur Nigmetov and Dmitriy Morozov", "abstract": "Topological Data Analysis (TDA) provides tools to describe the shape of data, but integrating topological features into deep learning pipelines remains challenging, especially when preserving local geometric structure rather than summarizing it globally. We propose a persistence-based data augmentation framework that encodes local gradient flow regions and their hierarchical evolution using the Morse-Smale complex. This representation, compatible with both convolutional and graph neural networks, retains spatially localized topological information across multiple scales. Importantly, the augmentation procedure itself is efficient, with computational complexity $O(n \\log n)$, making it practical for large datasets. We evaluate our method on histopathology image classification and 3D porous material regression, where it consistently outperforms baselines and global TDA descriptors such as persistence images and landscapes. We also show that pruning the base level of the hierarchy reduces memory usage while maintaining competitive performance. These results highlight the potential of local, structured topological augmentation for scalable and interpretable learning across data modalities.", "link": "http://arxiv.org/abs/2604.08469v1", "date": "2026-04-09", "relevancy": 2.5842, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5246}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5227}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5033}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Persistence-Augmented%20Neural%20Networks&body=Title%3A%20Persistence-Augmented%20Neural%20Networks%0AAuthor%3A%20Elena%20Xinyi%20Wang%20and%20Arnur%20Nigmetov%20and%20Dmitriy%20Morozov%0AAbstract%3A%20Topological%20Data%20Analysis%20%28TDA%29%20provides%20tools%20to%20describe%20the%20shape%20of%20data%2C%20but%20integrating%20topological%20features%20into%20deep%20learning%20pipelines%20remains%20challenging%2C%20especially%20when%20preserving%20local%20geometric%20structure%20rather%20than%20summarizing%20it%20globally.%20We%20propose%20a%20persistence-based%20data%20augmentation%20framework%20that%20encodes%20local%20gradient%20flow%20regions%20and%20their%20hierarchical%20evolution%20using%20the%20Morse-Smale%20complex.%20This%20representation%2C%20compatible%20with%20both%20convolutional%20and%20graph%20neural%20networks%2C%20retains%20spatially%20localized%20topological%20information%20across%20multiple%20scales.%20Importantly%2C%20the%20augmentation%20procedure%20itself%20is%20efficient%2C%20with%20computational%20complexity%20%24O%28n%20%5Clog%20n%29%24%2C%20making%20it%20practical%20for%20large%20datasets.%20We%20evaluate%20our%20method%20on%20histopathology%20image%20classification%20and%203D%20porous%20material%20regression%2C%20where%20it%20consistently%20outperforms%20baselines%20and%20global%20TDA%20descriptors%20such%20as%20persistence%20images%20and%20landscapes.%20We%20also%20show%20that%20pruning%20the%20base%20level%20of%20the%20hierarchy%20reduces%20memory%20usage%20while%20maintaining%20competitive%20performance.%20These%20results%20highlight%20the%20potential%20of%20local%2C%20structured%20topological%20augmentation%20for%20scalable%20and%20interpretable%20learning%20across%20data%20modalities.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08469v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPersistence-Augmented%2520Neural%2520Networks%26entry.906535625%3DElena%2520Xinyi%2520Wang%2520and org/abs/2604.08469v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Persistence-Augmented%20Neural%20Networks&entry.906535625=Elena%20Xinyi%20Wang%20and%20Arnur%20Nigmetov%20and%20Dmitriy%20Morozov&entry.1292438233=Topological%20Data%20Analysis%20%28TDA%29%20provides%20tools%20to%20describe%20the%20shape%20of%20data%2C%20but%20integrating%20topological%20features%20into%20deep%20learning%20pipelines%20remains%20challenging%2C%20especially%20when%20preserving%20local%20geometric%20structure%20rather%20than%20summarizing%20it%20globally.%20We%20propose%20a%20persistence-based%20data%20augmentation%20framework%20that%20encodes%20local%20gradient%20flow%20regions%20and%20their%20hierarchical%20evolution%20using%20the%20Morse-Smale%20complex.%20This%20representation%2C%20compatible%20with%20both%20convolutional%20and%20graph%20neural%20networks%2C%20retains%20spatially%20localized%20topological%20information%20across%20multiple%20scales.%20Importantly%2C%20the%20augmentation%20procedure%20itself%20is%20efficient%2C%20with%20computational%20complexity%20%24O%28n%20%5Clog%20n%29%24%2C%20making%20it%20practical%20for%20large%20datasets.%20We%20evaluate%20our%20method%20on%20histopathology%20image%20classification%20and%203D%20porous%20material%20regression%2C%20where%20it%20consistently%20outperforms%20baselines%20and%20global%20TDA%20descriptors%20such%20as%20persistence%20images%20and%20landscapes.%20We%20also%20show%20that%20pruning%20the%20base%20level%20of%20the%20hierarchy%20reduces%20memory%20usage%20while%20maintaining%20competitive%20performance.%20These%20results%20highlight%20the%20potential%20of%20local%2C%20structured%20topological%20augmentation%20for%20scalable%20and%20interpretable%20learning%20across%20data%20modalities.&entry.1838667208=http%3A//arxiv.org/abs/2604.08469v1&entry.124074799=Read"},
{"title": "Visually-grounded Humanoid Agents", "author": "Hang Ye and Xiaoxuan Ma and Fan Lu and Wayne Wu and Kwan-Yee Lin and Yizhou Wang", "abstract": "Digital human generation has been studied for decades and supports a wide range of real-world applications. However, most existing systems are passively animated, relying on privileged state or scripted control, which limits scalability to novel environments. We instead ask: how can digital humans actively behave using only visual observations and specified goals in novel scenes? Achieving this would enable populating any 3D environments with digital humans at scale that exhibit spontaneous, natural, goal-directed behaviors. To this end, we introduce Visually-grounded Humanoid Agents, a coupled two-layer (world-agent) paradigm that replicates humans at multiple levels: they look, perceive, reason, and behave like real people in real-world 3D scenes. The World Layer reconstructs semantically rich 3D Gaussian scenes from real-world videos via an occlusion-aware pipeline and accommodates animatable Gaussian-based human avatars. The Agent Layer transforms these avatars into autonomous humanoid agents, equipping them with first-person RGB-D perception and enabling them to perform accurate, embodied planning with spatial awareness and iterative reasoning, which is then executed at the low level as full-body actions to drive their behaviors in the scene. We further introduce a benchmark to evaluate humanoid-scene interaction in diverse reconstructed environments. Experiments show our agents achieve robust autonomous behavior, yielding higher task success rates and fewer collisions than ablations and state-of-the-art planning methods. This work enables active digital human population and advances human-centric embodied AI. Data, code, and models will be open-sourced.", "link": "http://arxiv.org/abs/2604.08509v1", "date": "2026-04-09", "relevancy": 2.5814, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6571}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.643}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6219}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Visually-grounded%20Humanoid%20Agents&body=Title%3A%20Visually-grounded%20Humanoid%20Agents%0AAuthor%3A%20Hang%20Ye%20and%20Xiaoxuan%20Ma%20and%20Fan%20Lu%20and%20Wayne%20Wu%20and%20Kwan-Yee%20Lin%20and%20Yizhou%20Wang%0AAbstract%3A%20Digital%20human%20generation%20has%20been%20studied%20for%20decades%20and%20supports%20a%20wide%20range%20of%20real-world%20applications.%20However%2C%20most%20existing%20systems%20are%20passively%20animated%2C%20relying%20on%20privileged%20state%20or%20scripted%20control%2C%20which%20limits%20scalability%20to%20novel%20environments.%20We%20instead%20ask%3A%20how%20can%20digital%20humans%20actively%20behave%20using%20only%20visual%20observations%20and%20specified%20goals%20in%20novel%20scenes%3F%20Achieving%20this%20would%20enable%20populating%20any%203D%20environments%20with%20digital%20humans%20at%20scale%20that%20exhibit%20spontaneous%2C%20natural%2C%20goal-directed%20behaviors.%20To%20this%20end%2C%20we%20introduce%20Visually-grounded%20Humanoid%20Agents%2C%20a%20coupled%20two-layer%20%28world-agent%29%20paradigm%20that%20replicates%20humans%20at%20multiple%20levels%3A%20they%20look%2C%20perceive%2C%20reason%2C%20and%20behave%20like%20real%20people%20in%20real-world%203D%20scenes.%20The%20World%20Layer%20reconstructs%20semantically%20rich%203D%20Gaussian%20scenes%20from%20real-world%20videos%20via%20an%20occlusion-aware%20pipeline%20and%20accommodates%20animatable%20Gaussian-based%20human%20avatars.%20The%20Agent%20Layer%20transforms%20these%20avatars%20into%20autonomous%20humanoid%20agents%2C%20equipping%20them%20with%20first-person%20RGB-D%20perception%20and%20enabling%20them%20to%20perform%20accurate%2C%20embodied%20planning%20with%20spatial%20awareness%20and%20iterative%20reasoning%2C%20which%20is%20then%20executed%20at%20the%20low%20level%20as%20full-body%20actions%20to%20drive%20their%20behaviors%20in%20the%20scene.%20We%20further%20introduce%20a%20benchmark%20to%20evaluate%20humanoid-scene%20interaction%20in%20diverse%20reconstructed%20environments.%20Experiments%20show%20our%20agents%20achieve%20robust%20autonomous%20behavior%2C%20yielding%20higher%20task%20success%20rates%20and%20fewer%20collisions%20than%20ablations%20and%20state-of-the-art%20planning%20methods.%20This%20work%20enables%20active%20digital%20human%20population%20and%20advances%20human-centric%20embodied%20AI.%20Data%2C%20code%2C%20and%20models%20will%20be%20open-sourced.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08509v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisually-grounded%2520Humanoid%2520Agents%26entry.906535625%3DHang%2520Ye%2520and%2520Xiaoxuan%2520Ma%2520and%2520Fan%2520Lu%2520and%2520Wayne%2520Wu%2520and%2520Kwan-Yee%2520Lin%2520and%2520Yizhou%2520Wang%26entry.1292438233%3DDigital%2520human%2520generation%2520has%2520been%2520studied%2520for%2520decades%2520and%2520supports%2520a%2520wide%2520range%2520of%2520real-world%2520applications.%2520However%252C%2520most%2520existing%2520systems%2520are%2520passively%2520animated%252C%2520relying%2520on%2520privileged%2520state%2520or%2520scripted%2520control%252C%2520which%2520limits%2520scalability%2520to%2520novel%2520environments.%2520We%2520instead%2520ask%253A%2520how%2520can%2520digital%2520humans%2520actively%2520behave%2520using%2520only%2520visual%2520observations%2520and%2520specified%2520goals%2520in%2520novel%2520scenes%253F%2520Achieving%2520this%2520would%2520enable%2520populating%2520any%25203D%2520environments%2520with%2520digital%2520humans%2520at%2520scale%2520that% {"title": "ModeX: Evaluator-Free Best-of-N Selection for Open-Ended Generation", "author": "Hyeong Kyu Choi and Sharon Li", "abstract": "Selecting a single high-quality output from multiple stochastic generations remains a fundamental challenge for large language models (LLMs), particularly in open-ended tasks where no canonical answer exists. While Best-of-N and self-consistency methods show that aggregating multiple generations can improve performance, existing approaches typically rely on external evaluators, reward models, or exact string-match voting, limiting their applicability and efficiency. We propose Mode Extraction (ModeX), an evaluator-free Best-of-N selection framework that generalizes majority voting to open-ended text generation by identifying the modal output representing the dominant semantic consensus among generated texts. ModeX constructs a similarity graph over candidate generations and recursively applies spectral clustering to select a representative centroid, without requiring additional inference or auxiliary models. We further instantiate this selection principle as ModeX-Lite, an improved version of ModeX with early pruning for efficiency. Across open-ended tasks -- including text summarization, code generation, and mathematical reasoning -- our approaches consistently outperform standard single- and multi-path baselines, providing a computationally efficient solution for robust open-ended text generation. Code is released in https://github.com/deeplearning-wisc/ModeX.", "link": "http://arxiv.org/abs/2601.02535v2", "date": "2026-04-09", "relevancy": 2.5397, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5113}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5078}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5047}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ModeX%3A%20Evaluator-Free%20Best-of-N%20Selection%20for%20Open-Ended%20Generation&body=Title%3A%20ModeX%3A%20Evaluator-Free%20Best-of-N%20Selection%20for%20Open-Ended%20Generation%0AAuthor%3A%20Hyeong%20Kyu%20Choi%20and%20Sharon%20Li%0AAbstract%3A%20Selecting%20a%20single%20high-quality%20output%20from%20multiple%20stochastic%20generations%20remains%20a%20fundamental%20challenge%20for%20large%20language%20models%20%28LLMs%29%2C%20particularly%20in%20open-ended%20tasks%20where%20no%20canonical%20answer%20exists.%20While%20Best-of-N%20and%20self-consistency%20methods%20show%20that%20aggregating%20multiple%20generations%20can%20improve%20performance%2C%20existing%20approaches%20typically%20rely%20on%20external%20evaluators%2C%20reward%20models%2C%20or%20exact%20string-match%20voting%2C%20limiting%20their%20applicability%20and%20efficiency.%20We%20propose%20Mode%20Extraction%20%28ModeX%29%2C%20an%20evaluator-free%20Best-of-N%20selection%20framework%20that%20generalizes%20majority%20voting%20to%20open-ended%20text%20generation%20by%20identifying%20the%20modal%20output%20representing%20the%20dominant%20semantic%20consensus%20among%20generated%20texts.%20ModeX%20constructs%20a%20similarity%20graph%20over%20candidate%20generations%20and%20recursively%20applies%20spectral%20clustering%20to%20select%20a%20representative%20centroid%2C%20without%20requiring%20additional%20inference%20or%20auxiliary%20models.%20We%20further%20instantiate%20this%20selection%20principle%20as%20ModeX-Lite%2C%20an%20improved%20version%20of%20ModeX%20with%20early%20pruning%20for%20efficiency.%20Across%20open-ended%20tasks%20--%20including%20text%20summarization%2C%20code%20generation%2C%20and%20mathematical%20reasoning%20--%20our%20approaches%20consistently%20outperform%20standard%20single-%20and%20multi-path%20baselines%2C%20providing%20a%20computationally%20efficient%20solution%20for%20robust%20open-ended%20text%20generation.%20Code%20is%20released%20in%20https%3A//github.com/deeplearning-wisc/ModeX.%0ALink%3A%20http%3A//arxiv.org/abs/2601.02535v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModeX%253A%2520Evaluator-Free%2520Best-of-N%2520Selection%2520for%2520Open-Ended%2520Generation%26entry.906535625%3DHyeong%2520Kyu%2520Choi%2520and%2520Sharon%2520Li%26entry.1292438233%3DSelecting%2520a%2520single%2520high-quality%2520output%2520from%2520multiple%2520stochastic%2520generations%2520remains%2520a%2520fundamental%2520challenge%2520for%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520particularly%2520in%2520open-ended%2520tasks%2520where%2520no%2520canonical%2520answer%2520exists.%2520While%2520Best-of-N%2520and%2520self-consistency%2520methods%2520show%2520that%2520aggregating%2520multiple%2520generations%2520can%2520improve%2520performance%252C%2520existing%2520approaches%2520typically%2520rely%2520on%2520external%2520evaluators%252C%2520reward%2520models%252C%2520or%2520exact%2520string-match%2520voting%252C%2520limiting%2520their%2520applicability%2520and%2520efficiency.%2520We%2520propose%2520Mode%2520Extraction%2520%2528ModeX%2529%252C%2520an%2520evaluator-free%2520Best-of-N%2520selection%2520framework%2520that%2520generalizes%2520majority%2520voting%2520to%2520open-ended%2520text%2520generation%2520by%2520identifying%2520the%2520modal%2520output%2520representing%2520the%2520dominant%2520semantic%2520consensus%2520among%2520generated%2520texts.%2520ModeX%2520constructs%2520a%2520similarity%2520graph%2520over%2520candidate%2520generations%2520and%2520recursively%2520applies%2520spectral%2520clustering%2520to%2520select%2520a%2520representative%2520centroid%252C%2520without%2520requiring%2520additional%2520inference%2520or%2520auxiliary%2520models.%2520We%2520further%2520instantiate%2520this%2520selection%2520principle%2520as%2520ModeX-Lite%252C%2520an%2520improved% {"title": "LAMP: Lift Image-Editing as General 3D Priors for Open-world Manipulation", "author": "Jingjing Wang and Zhengdong Hong and Chong Bao and Yuke Zhu and Junhan Sun and Guofeng Zhang", "abstract": "Human-like generalization in open-world remains a fundamental challenge for robotic manipulation. Existing learning-based methods, including reinforcement learning, imitation learning, and vision-language-action-models (VLAs), often struggle with novel tasks and unseen environments. Another promising direction is to explore generalizable representations that capture fine-grained spatial and geometric relations for open-world manipulation. While large-language-model (LLMs) and vision-language-model (VLMs) provide strong semantic reasoning based on language or annotated 2D representations, their limited 3D awareness restricts their applicability to fine-grained manipulation. To address this, we propose LAMP, which lifts image-editing as 3D priors to extract inter-object 3D transformations as continuous, geometry-aware representations. Our key insight is that image-editing inherently encodes rich 2D spatial cues, and lifting these implicit cues into 3D transformations provides fine-grained and accurate guidance for open-world manipulation. Extensive experiments demonstrate that \\codename delivers precise 3D transformations and achieves strong zero-shot generalization in open-world manipulation. Project page: https://zju3dv.github.io/LAMP/.", "link": "http://arxiv.org/abs/2604.08475v1", "date": "2026-04-09", "relevancy": 2.4811, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6482}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6012}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http: 0implicit%2520cues%2520into%25203D%2520transformations%2520provides%2520fine-grained%2520and%2520accurate%2520guidance%2520for%2520open-world%2520manipulation.%2520Extensive%2520experiments%2520demonstrate%2520that%2520%255Ccodename%2520delivers%2520precise%25203D%2520transformations%2520and%2520achieves%2520strong%2520zero-shot%2520generalization%2520in%2520open-world%2520manipulation.%2520Project%2520page%253A%2520https%253A//zju3dv.github.io/LAMP/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08475v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LAMP%3A%20Lift%20Image-Editing%20as%20General%203D%20Priors%20for%20Open-world%20Manipulation&entry.906535625=Jingjing%20Wang%20and%20Zhengdong%20Hong%20and%20Chong%20Bao%20and%20Yuke%20Zhu%20and%20Junhan%20Sun%20and%20Guofeng%20Zhang&entry.1292438233=Human-like%20generalization%20in%20open-world%20remains%20a%20fundamental%20challenge%20for%20robotic%20manipulation.%20Existing%20learning-based%20methods%2C%20including%20reinforcement%20learning%2C%20imitation%20learning%2C%20and%20vision-language-action-models%20%28VLAs%29%2C%20often%20struggle%20with%20novel%20tasks%20and%20unseen%20environments.%20Another%20promising%20direction%20is%20to%20explore%20generalizable%20representations%20that%20capture%20fine-grained%20spatial%20and%20geometric%20relations%20for%20open-world%20manipulation.%20While%20large-language-model%20%28LLMs%29%20and%20vision-language-model%20%28VLMs%29%20provide%20strong%20semantic%20reasoning%20based%20on%20language%20or%20annotated%202D%20representations%2C%20their%20limited%203D%20awareness%20restricts%20their%20applicability%20to%20fine-grained%20manipulation.%20To%20address%20this%2C%20we%20propose%20LAMP%2C%20which%20lifts%20image-editing%20as%203D%20priors%20to%20extract%20inter-object%203D%20transformations%20as%20continuous%2C%20geometry-aware%20representations.%20Our%20key%20ins {"title": "E-3DPSM: A State Machine for Event-Based Egocentric 3D Human Pose Estimation", "author": "Mayur Deshmukh and Hiroyasu Akada and Helge Rhodin and Christian Theobalt and Vladislav Golyanik", "abstract": "Event cameras offer multiple advantages in monocular egocentric 3D human pose estimation from head-mounted devices, such as millisecond temporal resolution, high dynamic range, and negligible motion blur. Existing methods effectively leverage these properties, but suffer from low 3D estimation accuracy, insufficient in many applications (e.g., immersive VR/AR). This is due to the design not being fully tailored towards event streams (e.g., their asynchronous and continuous nature), leading to high sensitivity to self-occlusions and temporal jitter in the estimates. This paper rethinks the setting and introduces E-3DPSM, an event-driven continuous pose state machine for event-based egocentric 3D human pose estimation. E-3DPSM aligns continuous human motion with fine-grained event dynamics; it evolves latent states and predicts continuous changes in 3D joint positions associated with observed events, which are fused with direct 3D human pose predictions, leading to stable and drift-free final 3D pose reconstructions. E-3DPSM runs in real-time at 80 Hz on a single workstation and sets a new state of the art in experiments on two benchmarks, improving accuracy by up to 19% (MPJPE) and temporal stability by up to 2.7x. See our project page for the source code and trained models.", "link": "http://arxiv.org/abs/2604.08543v1", "date": "2026-04-09", "relevancy": 2.4713, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6515}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.603}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5708}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20E-3DPSM%3A%20A%20State%20Machine%20for%20Event-Based%20Egocentric%203D%20Human%20Pose%20Estimation&body=Title%3A%20E-3DPSM%3A%20A%20State%20Machine%20for%20Event-Based%20Egocentric%203D%20Human%20Pose%20Estimation%0AAuthor%3A%20Mayur%20Deshmukh%20and%20Hiroyasu%20Akada%20and%20Helge%20Rhodin%20and%20Christian%20Theobalt%20and%20Vladislav%20Golyanik%0AAbstract%3A%20Event%20cameras%20offer%20multiple%20advantages%20in%20monocular%20egocentric%203D%20human%20pose%20estimation%20from%20head-mounted%20devices%2C%20such%20as%20millisecond%20temporal%20resolution%2C%20high%20dynamic%20range%2C%20and%20negligible%20motion%20blur.%20Existing%20methods%20effectively%20leverage%20these%20properties%2C%20but%20suffer%20from%20low%203D%20estimation%20accuracy%2C%20insufficient%20in%20many%20applications%20%28e.g.%2C%20immersive%20VR/AR%29.%20This%20is%20due%20to%20the%20design%20not%20being%20fully%20tailored%20towards%20event%20streams%20%28e.g.%2C%20their%20asynchronous%20and%20continuous%20nature%29%2C%20leading%20to%20high%20sensitivity%20to%20self-occlusions%20and%20temporal%20jitter%20in%20the%20estimates.%20This%20paper%20rethinks%20the%20setting%20and%20introduces%20E-3DPSM%2C%20an%20event-driven%20continuous%20pose%20state%20machine%20for%20event-based%20egocentric%203D%20human%20pose%20estimation.%20E-3DPSM%20aligns%20continuous%20human%20motion%20with%20fine-grained%20event%20dynamics%3B%20it%20evolves%20latent%20states%20and%20predicts%20continuous%20changes%20in%203D%20joint%20positions%20associated%20with%20observed%20events%2C%20which%20are%20fused%20with%20direct%203D%20human%20pose%20predictions%2C%20leading%20to%20stable%20and%20drift-free%20final%203D%20pose%20reconstructions.%20E-3DPSM%20runs%20in%20real-time%20at%2080%20Hz%20on%20a%20single%20workstation%20and%20sets%20a%20new%20state%20of%20the%20art%20in%20experiments%20on%20two%20benchmarks%2C%20improving%20accuracy%20by%20up%20to%2019%25%20%28MPJPE%29%20and%20temporal%20stability%20by%20up%20to%202.7x.%20See%20our%20project%20page%20for%20the%20source%20code%20and%20trained%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08543v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DE-3DPSM%253A%2520A%2520State%2520Machine%2520for%2520Event-Based%2520Egocentric%25203D%2520Human%2520Pose%2520Estimation%26entry.906535625%3DMayur%2520Deshmukh%2520and%2520Hiroyasu%2520Akada%2520and%2520Helge%2520Rhodin%2520and%2520Christian%2520Theobalt%2520and%2520Vladislav%2520Golyanik%26entry.1292438233%3DEvent%2520cameras%2520offer%2520multiple%2520advantages%2520in%2520monocular%2520egocentric%25203D%2520human%2520pose%2520estimation%2520from%2520head-mounted%2520devices%252C%2520such%2520as%2520millisecond%2520temporal%2520resolution%252C%2520high%2520dynamic%2520range%252C%2520and%2520negligible%2520motion%2520blur.%2520Existing%2520methods%2520effectively%2520leverage%2520these%2520properties%252C%2520but%2520suffer%2520from%2520low%25203D%2520estimation%2520accuracy%252C%2520insufficient%2520in%2520many%2520applications%2520%2528e.g.%252C%2520immersive%2520VR/AR%2529.%2520This%2520is%2520due%2520to%2520the%2520design%2520not%2520being%2520fully%2520tailored%2520towards%2520event%2520streams%2520%2528e.g.%252C%2520their%2520asynchronous%2520and%2520continuous%2520nature%2529%252C%2520leading%2520to%2520high%2520sensitivity%2520to%2520self-occlusions%2520and%2520temporal%2520jitter%2520in%2520the%2520estimates.%2520This%2520paper%2520rethinks%2520the%2520setting%2520and%2520introduces%2520E-3DPSM%252C%2520an%2520event-driven%2520continuous%2520pose%2520state%2520machine%2520for%2520event-based%2520egocentric%25203D%2520human%2520pose%2520estimation.%2520E-3DPSM%2520aligns%2520continuous%2520human%2520motion%2520with%2520fine-grained%2520event%25 {"title": "ActiveGlasses: Learning Manipulation with Active Vision from Ego-centric Human Demonstration", "author": "Yanwen Zou and Chenyang Shi and Wenye Yu and Han Xue and Jun Lv and Ye Pan and Chuan Wen and Cewu Lu", "abstract": "Large-scale real-world robot data collection is a prerequisite for bringing robots into everyday deployment. However, existing pipelines often rely on specialized handheld devices to bridge the embodiment gap, which not only increases operator burden and limits scalability, but also makes it difficult to capture the naturally coordinated perception-manipulation behaviors of human daily interaction. This challenge calls for a more natural system that can faithfully capture human manipulation and perception behaviors while enabling zero-shot transfer to robotic platforms. We introduce ActiveGlasses, a system for learning robot manipulation from ego-centric human demonstrations with active vision. A stereo camera mounted on smart glasses serves as the sole perception device for both data collection and policy inference: the operator wears it during bare-hand demonstrations, and the same camera is mounted on a 6-DoF perception arm during deployment to reproduce human active vision. To enable zero-transfer, we extract object trajectories from demonstrations and use an object-centric point-cloud policy to jointly predict manipulation and head movement. Across several challenging tasks involving occlusion and precise interaction, ActiveGlasses achieves zero-shot transfer with active vision, consistently outperforms strong baselines under the same hardware setup, and generalizes across two robot platforms.", "link": "http://arxiv.org/abs/2604.08534v1", "date": "2026-04-09", "relevancy": 2.4616, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6334}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6216}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5949}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ActiveGlasses%3A%20Learning%20Manipulation%20with%20Active%20Vision%20from%20Ego-centric%20Human%20Demonstration&body=Title%3A%20ActiveGlasses%3A%20Learning%20Manipulation%20with%20Active%20Vision%20from%20Ego-centric%20Human%20Demonstration%0AAuthor%3A%20Yanwen%20Zou%20and%20Chenyang%20Shi%20and%20Wenye%20Yu%20and%20Han%20Xue%20and%20Jun%20Lv%20and%20Ye%20Pan%20and%20Chuan%20Wen%20and%20Cewu%20Lu%0AAbstract%3A%20Large-scale%20real-world%20robot%20data%20collection%20is%20a%20prerequisite%20for%20bringing%20robots%20into%20everyday%20deployment.%20However%2C%20existing%20pipelines%20often%20rely%20on%20specialized%20handheld%20devices%20to%20bridge%20the%20embodiment%20gap%2C%20which%20not%20only%20increases%20operator%20burden%20and%20limits%20scalability%2C%20but%20also%20makes%20it%20difficult%20to%20capture%20the%20naturally%20coordinated%20perception-manipulation%20behaviors%20of%20human%20daily%20interaction.%20This%20challenge%20calls%20for%20a%20more%20natural%20system%20that%20can%20faithfully%20capture%20human%20manipulation%20and%20perception%20behaviors%20while%20enabling%20zero-shot%20transfer%20to%20robotic%20platforms.%20We%20introduce%20ActiveGlasses%2C%20a%20system%20for%20learning%20robot%20manipulation%20from%20ego-centric%20human%20demonstrations%20with%20active%20vision.%20A%20stereo%20camera%20mounted%20on%20smart%20glasses%20serves%20as%20the%20sole%20perception%20device%20for%20both%20data%20collection%20and%20policy%20inference%3A%20the%20operator%20wears%20it%20during%20bare-hand%20demonstrations%2C%20and%20the%20same%20camera%20is%20mounted%20on%20a%206-DoF%20perception%20arm%20during%20deployment%20to%20reproduce%20human%20active%20vision.%20To%20enab {"title": "SIM1: Physics-Aligned Simulator as Zero-Shot Data Scaler in Deformable Worlds", "author": "Yunsong Zhou and Hangxu Liu and Xuekun Jiang and Xing Shen and Yuanzhen Zhou and Hui Wang and Baole Fang and Yang Tian and Mulin Yu and Qiaojun Yu and Li Ma and Hengjie Li and Hanqing Wang and Jia Zeng and Jiangmiao Pang", "abstract": "Robotic manipulation with deformable objects represents a data-intensive regime in embodied learning, where shape, contact, and topology co-evolve in ways that far exceed the variability of rigids. Although simulation promises relief from the cost of real-world data acquisition, prevailing sim-to-real pipelines remain rooted in rigid-body abstractions, producing mismatched geometry, fragile soft dynamics, and motion primitives poorly suited for cloth interaction. We posit that simulation fails not for being synthetic, but for being ungrounded. To address this, we introduce SIM1, a physics-aligned real-to-sim-to-real data engine that grounds simulation in the physical world. Given limited demonstrations, the system digitizes scenes into metric-consistent twins, calibrates deformable dynamics through elastic modeling, and expands behaviors via diffusion-based trajectory generation with quality filtering. This pipeline transforms sparse observations into scaled synthetic supervision with near-demonstration fidelity. Experiments show that policies trained on purely synthetic data achieve parity with real-data baselines at a 1:15 equivalence ratio, while delivering 90% zero-shot success and 50% generalization gains in real-world deployment. These results validate physics-aligned simulation as scalable supervision for deformable manipulation and a practical pathway for data-efficient policy learning.", "link": "http://arxiv.org/abs/2604.08544v1", "date": "2026-04-09", "relevancy": 2.3824, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6067}, { {"title": "Self-Improving 4D Perception via Self-Distillation", "author": "Nan Huang and Pengcheng Yu and Weijia Zeng and James M. Rehg and Angjoo Kanazawa and Haiwen Feng and Qianqian Wang", "abstract": "Large-scale multi-view reconstruction models have made remarkable progress, but most existing approaches still rely on fully supervised training with ground-truth 3D/4D annotations. Such annotations are expensive and particularly scarce for dynamic scenes, limiting scalability. We propose SelfEvo, a self-improving framework that continually improves pretrained multi-view reconstruction models using unlabeled videos. SelfEvo introduces a self-distillation scheme using spatiotemporal context asymmetry, enabling self-improvement for learning-based 4D perception without external annotations. We systematically study design choices that make self-improvement effective, including loss signals, forms of asymmetry, and other training strategies. Across eight benchmarks spanning diverse datasets and domains, SelfEvo consistently improves pretrained baselines and generalizes across base models (e.g. VGGT and $\u03c0^3$), with significant gains on dynamic scenes. Overall, SelfEvo achieves up to 36.5% relative improvement in video depth estimation and 20.1% in camera estimation, without using any labeled data. Project Page: https://self-evo.github.io/.", "link": "http://arxiv.org/abs/2604.08532v1", "date": "2026-04-09", "relevancy": 2.372, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6198}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5876}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Improving%204D%20Percepti {"title": "BoBa: Boosting Backdoor Detection through Data Distribution Inference in Federated Learning", "author": "Zhengyuan Jiang and Xingyu Lyu and Shanghao Shi and Yang Xiao and Yimin Chen and Y. Thomas Hou and Wenjing Lou and Ning Wanga", "abstract": "Federated learning, while being a promising approach for collaborative model training, is susceptible to backdoor attacks due to its decentralized nature. Backdoor attacks have shown remarkable stealthiness, as they compromise model predictions only when inputs contain specific triggers. As a countermeasure, anomaly detection is widely used to filter out backdoor attacks in FL. However, the non-independent and identically distributed (non-IID) data distribution nature of FL clients presents substantial challenges in backdoor attack detection, as the data variety introduces variance among benign models, making them indistinguishable from malicious ones.\n  In this work, we propose a novel distribution-aware backdoor detection mechanism, BoBa, to address this problem. To differentiate outliers arising from data variety versus backdoor attacks, we propose to break down the problem into two steps: clustering clients utilizing their data distribution, and followed by a voting-based detection. We propose a novel data distribution inference mechanism for accurate data distribution estimation. To improve detection robustness, we introduce an overlapping clustering method, where each client is associated with multiple clusters, ensuring that the trustworthiness of a model update is assessed collectively by multiple clusters rather than a single cluster. Through extensive evaluations, we demonstrate that BoBa can reduce the attack success rate to lower than 0.001 while maintaining high main task accuracy across various attack strategies and experimental settings.", "link": "http://arxiv.org/abs/2407.09658v2", "date": "2026-04-09", "relevancy": 2.3442, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for n%20mechanism%2C%20BoBa%2C%20to%20address%20this%20problem.%20To%20differentiate%20outliers%20arising%20from%20data%20variety%20versus%20backdoor%20attacks%2C%20we%20propose%20to%20break%20down%20the%20problem%20into%20two%20steps%3A%20clustering%20clients%20utilizing%20their%20data%20distribution%2C%20and%20followed%20by%20a%20voting-based%20detection.%20We%20propose%20a%20novel%20data%20distribution%20inference%20mechanism%20for%20accurate%20data%20distribution%20estimation.%20To%20improve%20detection%20robustness%2C%20we%20introduce%20an%20overlapping%20clustering%20method%2C%20where%20each%20client%20is%20associated%20with%20multiple%20clusters%2C%20ensuring%20that%20the%20trustworthiness%20of%20a%20model%20update%20is%20assessed%20collectively%20by%20multiple%20clusters%20rather%20than%20a%20single%20cluster.%20Through%20extensive%20evaluations%2C%20we%20demonstrate%20that%20BoBa%20can%20reduce%20the%20attack%20success%20rate%20to%20lower%20than%200.001%20while%20maintaining%20high%20main%20task%20accuracy%20across%20various%20attack%20strategies%20and%20experimental%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2407.09658v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoBa%253A%2520Boosting%2520Backdoor%2520Detection%2520through%2520Data%2520Distribution%2520Inference%2520in%2520Federated%2520Learning%26entry.906535625%3DZhengyuan%2520Jiang%2520and%2520Xingyu%2520Lyu%2520and%2520Shanghao%2520Shi%2520and%2520Yang%2520Xiao%2520and%2520Yimin%2520Chen%2520and%2520Y.%2520Thomas%2520Hou%2520and%2520Wenjing%2520Lou%2520and%2520Ning%2520Wanga%26entry.1292438233%3DFederated%2520learning%252C%2520while%2520being%2520a%2520promising%2520approach%2520for%2520collaborative%2520model%2520training%252C%2520is%2520susceptible%2520to%2520backdoor%2520attacks%2520due%2520to%2520its%2520decentralized%2520nature.%2520Backdoor%2520attacks%2520have%2520shown%2520remarkable%2520stealthiness%25 ss%2520rate%2520to%2520lower%2520than%25200.001%2520while%2520maintaining%2520high%2520main%2520task%2520accuracy%2520across%2520various%2520attack%2520strategies%2520and%2520experimental%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2407.09658v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BoBa%3A%20Boosting%20Backdoor%20Detection%20through%20Data%20Distribution%20Inference%20in%20Federated%20Learning&entry.906535625=Zhengyuan%20Jiang%20and%20Xingyu%20Lyu%20and%20Shanghao%20Shi%20and%20Yang%20Xiao%20and%20Yimin%20Chen%20and%20Y.%20Thomas%20Hou%20and%20Wenjing%20Lou%20and%20Ning%20Wanga&entry.1292438233=Federated%20learning%2C%20while%20being%20a%20promising%20approach%20for%20collaborative%20model%20training%2C%20is%20susceptible%20to%20backdoor%20attacks%20due%20to%20its%20decentralized%20nature.%20Backdoor%20attacks%20have%20shown%20remarkable%20stealthiness%2C%20as%20they%20compromise%20model%20predictions%20only%20when%20inputs%20contain%20specific%20triggers.%20As%20a%20countermeasure%2C%20anomaly%20detection%20is%20widely%20used%20to%20filter%20out%20backdoor%20attacks%20in%20FL.%20However%2C%20the%20non-independent%20and%20identically%20distributed%20%28non-IID%29%20data%20distribution%20nature%20of%20FL%20clients%20presents%20substantial%20challenges%20in%20backdoor%20attack%20detection%2C%20as%20the%20data%20variety%20introduces%20variance%20among%20benign%20models%2C%20making%20them%20indistinguishable%20from%20malicious%20ones.%0A%20%20In%20this%20work%2C%20we%20propose%20a%20novel%20distribution-aware%20backdoor%20detection%20mechanism%2C%20BoBa%2C%20to%20address%20this%20problem.%20To%20differentiate%20outliers%20arising%20from%20data%20variety%20versus%20backdoor%20attacks%2C%20we%20propose%20to%20break%20down%20the%20problem%20into%20two%20steps%3A%20clustering%20clients%20utilizing%20their%20data%20distribution%2C%20and%20followe {"title": "AVGen-Bench: A Task-Driven Benchmark for Multi-Granular Evaluation of Text-to-Audio-Video Generation", "author": "Ziwei Zhou and Zeyuan Lai and Rui Wang and Yifan Yang and Zhen Xing and Yuqing Yang and Qi Dai and Lili Qiu and Chong Luo", "abstract": "Text-to-Audio-Video (T2AV) generation is rapidly becoming a core interface for media creation, yet its evaluation remains fragmented. Existing benchmarks largely assess audio and video in isolation or rely on coarse embedding similarity, failing to capture the fine-grained joint correctness required by realistic prompts. We introduce AVGen-Bench, a task-driven benchmark for T2AV generation featuring high-quality prompts across 11 real-world categories. To support comprehensive assessment, we propose a multi-granular evaluation framework that combines lightweight specialist models with Multimodal Large Language Models (MLLMs), enabling evaluation from perceptual quality to fine-grained semantic controllability. Our evaluation reveals a pronounced gap between strong audio-visual aesthetics and weak semantic reliability, including persistent failures in text rendering, speech coherence, physical reasoning, and a universal breakdown in musical pitch control. Code and benchmark resources are available at http://aka.ms/avgenbench.", "link": "http://arxiv.org/abs/2604.08540v1", "date": "2026-04-09", "relevancy": 2.3095, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6394}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5341}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5304}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AVGen-Bench%3A%20A%20Task-Driven%20Benchmark%20for%20Multi-Granu

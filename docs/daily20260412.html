{"title": "OpenVLThinkerV2: A Generalist Multimodal Reasoning Model for Multi-domain Visual Tasks", "author": "Wenbo Hu and Xin Chen and Yan Gao-Tian and Yihe Deng and Nanyun Peng and Kai-Wei Chang", "abstract": "Group Relative Policy Optimization (GRPO) has emerged as the de facto Reinforcement Learning (RL) objective driving recent advancements in Multimodal Large Language Models. However, extending this success to open-source multimodal generalist models remains heavily constrained by two primary challenges: the extreme variance in reward topologies across diverse visual tasks, and the inherent difficulty of balancing fine-grained perception with multi-step reasoning capabilities. To address these issues, we introduce Gaussian GRPO (G$^2$RPO), a novel RL training objective that replaces standard linear scaling with non-linear distributional matching. By mathematically forcing the advantage distribution of any given task to strictly converge to a standard normal distribution, $\\mathcal{N}(0,1)$, G$^2$RPO theoretically ensures inter-task gradient equity, mitigates vulnerabilities to heavy-tail outliers, and offers symmetric update for positive and negative rewards. Leveraging the enhanced training stability provided by G$^2$RPO, we introduce two task-level shaping mechanisms to seamlessly balance perception and reasoning. First, response length shaping dynamically elicits extended reasoning chains for complex queries while enforce direct outputs to bolster visual grounding. Second, entropy shaping tightly bounds the model's exploration zone, effectively preventing both entropy collapse and entropy explosion. Integrating these methodologies, we present OpenVLThinkerV2, a highly robust, general-purpose multimodal model. Extensive evaluations across 18 diverse benchmarks demonstrate its superior performance over strong open-source and leading proprietary frontier models.", "link": "http://arxiv.org/abs/2604.08539v1", "date": "2026-04-09", "relevancy": 2.2287, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5573}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5573}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5563}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OpenVLThinkerV2%3A%20A%20Generalist%20Multimodal%20Reasoning%20Model%20for%20Multi-domain%20Visual%20Tasks&body=Title%3A%20OpenVLThinkerV2%3A%20A%20Generalist%20Multimodal%20Reasoning%20Model%20for%20Multi-domain%20Visual%20Tasks%0AAuthor%3A%20Wenbo%20Hu%20and%20Xin%20Chen%20and%20Yan%20Gao-Tian%20and%20Yihe%20Deng%20and%20Nanyun%20Peng%20and%20Kai-Wei%20Chang%0AAbstract%3A%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20has%20emerged%20as%20the%20de%20facto%20Reinforcement%20Learning%20%28RL%29%20objective%20driving%20recent%20advancements%20in%20Multimodal%20Large%20Language%20Models.%20However%2C%20extending%20this%20success%20to%20open-source%20multimodal%20generalist%20models%20remains%20heavily%20constrained%20by%20two%20primary%20challenges%3A%20the%20extreme%20variance%20in%20reward%20topologies%20across%20diverse%20visual%20tasks%2C%20and%20the%20inherent%20difficulty%20of%20balancing%20fine-grained%20perception%20with%20multi-step%20reasoning%20capabilities.%20To%20address%20these%20issues%2C%20we%20introduce%20Gaussian%20GRPO%20%28G%24%5E2%24RPO%29%2C%20a%20novel%20RL%20training%20objective%20that%20replaces%20standard%20linear%20scaling%20with%20non-linear%20distributional%20matching.%20By%20mathematically%20forcing%20the%20advantage%20distribution%20of%20any%20given%20task%20to%20strictly%20converge%20to%20a%20standard%20normal%20distribution%2C%20%24%5Cmathcal%7BN%7D%280%2C1%29%24%2C%20G%24%5E2%24RPO%20theoretically%20ensures%20inter-task%20gradient%20equity%2C%20mitigates%20vulnerabilities%20to%20heavy-tail%20outliers%2C%20and%20offers%20symmetric%20update%20for%20positive%20and%20negative%20rewards.%20Leveraging%20the%20enhanced%20training%20stability%20provided%20by%20G%24%5E2%24RPO%2C%20we%20introduce%20two%20task-level%20shaping%20mechanisms%20to%20seamlessly%20balance%20perception%20and%20reasoning.%20First%2C%20response%20length%20shaping%20dynamically%20elicits%20extended%20reasoning%20chains%20for%20complex%20queries%20while%20enforce%20direct%20outputs%20to%20bolster%20visual%20grounding.%20Second%2C%20entropy%20shaping%20tightly%20bounds%20the%20model%27s%20exploration%20zone%2C%20effectively%20preventing%20both%20entropy%20collapse%20and%20entropy%20explosion.%20Integrating%20these%20methodologies%2C%20we%20present%20OpenVLThinkerV2%2C%20a%20highly%20robust%2C%20general-purpose%20multimodal%20model.%20Extensive%20evaluations%20across%2018%20diverse%20benchmarks%20demonstrate%20its%20superior%20performance%20over%20strong%20open-source%20and%20leading%20proprietary%20frontier%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08539v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOpenVLThinkerV2%253A%2520A%2520Generalist%2520Multimodal%2520Reasoning%2520Model%2520for%2520Multi-domain%2520Visual%2520Tasks%26entry.906535625%3DWenbo%2520Hu%2520and%2520Xin%2520Chen%2520and%2520Yan%2520Gao-Tian%2520and%2520Yihe%2520Deng%2520and%2520Nanyun%2520Peng%2520and%2520Kai-Wei%2520Chang%26entry.1292438233%3DGroup%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520has%2520emerged%2520as%2520the%2520de%2520facto%2520Reinforcement%2520Learning%2520%2528RL%2529%2520objective%2520driving%2520recent%2520advancements%2520in%2520Multimodal%2520Large%2520Language%2520Models.%2520However%252C%2520extending%2520this%2520success%2520to%2520open-s {"title": "The Impact of Dimensionality on the Stability of Node Embeddings", "author": "Tobias Schumacher and Simon Reichelt and Markus Strohmaier", "abstract": "Previous work has established that neural network-based node embeddings return different outcomes when trained with identical parameters on the same dataset, just from using different training seeds. Yet, it has not been thoroughly analyzed how key hyperparameters such as embedding dimension could impact this instability. In this work, we investigate how varying the dimensionality of node embeddings influences both their stability and downstream performance. We systematically evaluate five widely used methods -- ASNE, DGI, GraphSAGE, node2vec, and VERSE -- across multiple datasets and embedding dimensions. We assess stability from both a representational perspective and a functional perspective, alongside performance evaluation. Our results show that embedding stability varies significantly with dimensionality, but we observe different patterns across the methods we consider: while some approaches, such as node2vec and ASNE, tend to become more stable with higher dimensionality, other methods do not exhibit the same trend. Moreover, we find that maximum stability does not necessarily align with optimal task performance. These findings highlight the importance of carefully selecting embedding dimension, and provide new insights into the trade-offs between stability, performance, and computational effectiveness in graph representation learning.", "link": "http://arxiv.org/abs/2604.08492v1", "date": "2026-04-09", "relevancy": 2.2263, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4453}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4453}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "When Fine-Tuning Changes the Evidence: Architecture-Dependent Semantic Drift in Chest X-Ray Explanations", "author": "Kabilan Elangovan and Daniel Ting", "abstract": "Transfer learning followed by fine-tuning is widely adopted in medical image classification due to consistent gains in diagnostic performance. However, in multi-class settings with overlapping visual features, improvements in accuracy do not guarantee stability of the visual evidence used to support predictions. We define semantic drift as systematic changes in the attribution structure supporting a model's predictions between transfer learning and full fine-tuning, reflecting potential shifts in underlying visual reasoning despite stable classification performance. Using a five-class chest X-ray task, we evaluate DenseNet201, ResNet50V2, and InceptionV3 under a two-stage training protocol and quantify drift with reference-free metrics capturing spatial localization and structural consistency of attribution maps. Across architectures, coarse anatomical localization remains stable, while overlap IoU reveals pronounced architecture-dependent reorganization of evidential structure. Beyond single-method analysis, stability rankings can reverse across LayerCAM and GradCAM++ under converged predictive performance, establishing explanation stability as an interaction between architecture, optimization phase, and attribution objective.", "link": "http://arxiv.org/abs/2604.08513v1", "date": "2026-04-09", "relevancy": 2.121, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5358}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5277}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Rec ation%2520of%2520evidential%2520structure.%2520Beyond%2520single-method%2520analysis%252C%2520stability%2520rankings%2520can%2520reverse%2520across%2520LayerCAM%2520and%2520GradCAM%252B%252B%2520under%2520converged%2520predictive%2520performance%252C%2520establishing%2520explanation%2520stability%2520as%2520an%2520interaction%2520between%2520architecture%252C%2520optimization%2520phase%252C%2520and%2520attribution%2520objective.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08513v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Fine-Tuning%20Changes%20the%20Evidence%3A%20Architecture-Dependent%20Semantic%20Drift%20in%20Chest%20X-Ray%20Explanations&entry.906535625=Kabilan%20Elangovan%20and%20Daniel%20Ting&entry.1292438233=Transfer%20learning%20followed%20by%20fine-tuning%20is%20widely%20adopted%20in%20medical%20image%20classification%20due%20to%20consistent%20gains%20in%20diagnostic%20performance.%20However%2C%20in%20multi-class%20settings%20with%20overlapping%20visual%20features%2C%20improvements%20in%20accuracy%20do%20not%20guarantee%20stability%20of%20the%20visual%20evidence%20used%20to%20support%20predictions.%20We%20define%20semantic%20drift%20as%20systematic%20changes%20in%20the%20attribution%20structure%20supporting%20a%20model%27s%20predictions%20between%20transfer%20learning%20and%20full%20fine-tuning%2C%20reflecting%20potential%20shifts%20in%20underlying%20visual%20reasoning%20despite%20stable%20classification%20performance.%20Using%20a%20five-class%20chest%20X-ray%20task%2C%20we%20evaluate%20DenseNet201%2C%20ResNet50V2%2C%20and%20InceptionV3%20under%20a%20two-stage%20training%20protocol%20and%20quantify%20drift%20with%20reference-free%20metrics%20capturing%20spatial%20localization%20and%20structural%20consistency%20of%20attribution%20maps.%20Across%20architectures%2C%20coarse%20anatomical%20localization%20remains%20stable%2C%20while%20overl {"title": "Faithful GRPO: Improving Visual Spatial Reasoning in Multimodal Language Models via Constrained Policy Optimization", "author": "Sai Srinivas Kancheti and Aditya Kanade and Rohit Sinha and Vineeth N Balasubramanian and Tanuja Ganu", "abstract": "Multimodal reasoning models (MRMs) trained with reinforcement learning with verifiable rewards (RLVR) show improved accuracy on visual reasoning benchmarks. However, we observe that accuracy gains often come at the cost of reasoning quality: generated Chain-of-Thought (CoT) traces are frequently inconsistent with the final answer and poorly grounded in the visual evidence. We systematically study this phenomenon across seven challenging real-world spatial reasoning benchmarks and find that it affects contemporary MRMs such as ViGoRL-Spatial, TreeVGR as well as our own models trained with standard Group Relative Policy Optimization (GRPO). We characterize CoT reasoning quality along two complementary axes: \"logical consistency\" (does the CoT entail the final answer?) and \"visual grounding\" (does each reasoning step accurately describe objects, attributes, and spatial relationships in the image?). To address this, we propose Faithful GRPO (FGRPO), a variant of GRPO that enforces consistency and grounding as constraints via Lagrangian dual ascent. FGRPO incorporates batch-level consistency and grounding constraints into the advantage computation within a group, adaptively adjusting the relative importance of constraints during optimization. We evaluate FGRPO on Qwen2.5-VL-7B and 3B backbones across seven spatial datasets. Our results show that FGRPO substantially improves reasoning quality, reducing the inconsistency rate from 24.5% to 1.7% and improving visual grounding scores by +13%. It also improves final answer accuracy over simple GRPO, demonstrating that faithful reasoning enables better answers.", "link": "http://arxiv.org/abs/2604.08476v1", "date": "2026-04-09", "relevancy": 2.0945, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5473}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5189}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5189}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Faithful%20GRPO%3A%20Improving%20Visual%20Spatial%20Reasoning%20in%20Multimodal%20Language%20Models%20via%20Constrained%20Policy%20Optimization&body=Title%3A%20Faithful%20GRPO%3A%20Improving%20Visual%20Spatial%20Reasoning%20in%20Multimodal%20Language%20Models%20via%20Constrained%20Policy%20Optimization%0AAuthor%3A%20Sai%20Srinivas%20Kancheti%20and%20Aditya%20Kanade%20and%20Rohit%20Sinha%20and%20Vineeth%20N%20Balasubramanian%20and%20Tanuja%20Ganu%0AAbstract%3A%20Multimodal%20reasoning%20models%20%28MRMs%29%20trained%20with%20reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%20show%20improved%20accuracy%20on%20visual%20reasoning%20benchmarks.%20However%2C%20we%20observe%20that%20accuracy%20gains%20often%20come%20at%20the%20cost%20of%20reasoning%20quality%3A%20generated%20Chain-of-Thought%20%28CoT%29%20traces%20are%20frequently%20inconsistent%20with%20the%20final%20answer%20and%20poorly%20grounded%20in%20the%20visual%20evidence.%20We%20systematically%20study%20this%20phenomenon%20across%20seven%20challenging%20real-world%20spatial%20reasoning%20benchmarks%20and%20find%20that%20it%20affects%20contemporary%20MRMs%20such%20as%20ViGoRL-Spatial%2C%20TreeVGR%20as%20well%20as%20our%20own%20models%20trained%20with%20standard%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29.%20We%20characterize%20CoT%20reasoning%20quality%20along%20two%20complementary%20axes%3A%20%22logical%20consistency%22%20%28does%20the%20CoT%20entail%20the%20final%20answer%3F%29%20and%20%22visual%20grounding%22%20%28does%20each%20reasoning%20step%20accurately%20describe%20objects%2C%20attributes%2C%20and%20spatial%20relationships%20in%20the%20image%3F%29.%20To%20address%20this%2C%20we%20propose%20Faithful%20GRPO%20%28FGRPO%29%2C%20a%20variant%20of%20GRPO%20that%20enforces%20consistency%20and%20grounding%20as%20constraints%20via%20Lagrangian%20dual%20ascent.%20FGRPO%20incorporates%20batch-level%20consistency%20and%20grounding%20constraints%20into%20the%20advantage%20computation%20within%20a%20group%2C%20adaptively%20adjusting%20the%20relative%20importance%20of%20constraints%20during%20optimization.%20We%20evaluate%20FGRPO%20on%20Qwen2.5-VL-7B%20and%203B%20backbones%20across%20seven%20spatial%20datasets.%20Our%20results%20show%20that%20FGRPO%20substantially%20improves%20reasoning%20quality%2C%20reducing%20the%20inconsistency%20rate%20from%2024.5%25%20to%201.7%25%20and%20improving%20visual%20grounding%20scores%20by%20%2B13%25.%20It%20also%20improves%20final%20answer%20accuracy%20over%20simple%20GRPO%2C%20demonstrating%20that%20faithful%20reasoning%20enables%20better%20answers.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08476v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFaithful%2520GRPO%253A%2520Improving%2520Visual%2520Spatial%2520Reasoning%2520in%2520Multimodal%2520Language%2520Models%2520via%2520Constrained%2520Policy%2520Optimization%26entry.906535625%3DSai%2520Srinivas%2520Kancheti%2520and%2520Aditya%2520Kanade%2520and%2520Rohit%2520Sinha%2520and%2520Vineeth%2520N%2520Balasubramanian%2520and%2520Tanuja%2520Ganu%26entry.1292438233%3DMultimodal%2520reasoning%2520models%2520%2528MRMs%2529%2520trained%2520with%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529%2520show%2520improved%2520accuracy%2520on%2520visual%2520reasoning%2520benchmarks.%2520However%252C%2520 {"title": "SUPERNOVA: Eliciting General Reasoning in LLMs with Reinforcement Learning on Natural Instructions", "author": "Ashima Suvarna and Kendrick Phan and Mehrab Beikzadeh and Hritik Bansal and Saadia Gabriel", "abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) has significantly improved large language model (LLM) reasoning in formal domains such as mathematics and code. Despite these advancements, LLMs still struggle with general reasoning tasks requiring capabilities such as causal inference and temporal understanding. Extending RLVR to general reasoning is fundamentally constrained by the lack of high-quality, verifiable training data that spans diverse reasoning skills. To address this challenge, we propose SUPERNOVA, a data curation framework for RLVR aimed at enhancing general reasoning. Our key insight is that instruction-tuning datasets containing expert-annotated ground-truth encode rich reasoning patterns that can be systematically adapted for RLVR. To study this, we conduct 100+ controlled RL experiments to analyze how data design choices impact downstream reasoning performance. In particular, we investigate three key factors: (i) source task selection, (ii) task mixing strategies, and (iii) synthetic interventions for improving data quality. Our analysis reveals that source task selection is non-trivial and has a significant impact on downstream reasoning performance. Moreover, selecting tasks based on their performance for individual target tasks outperforms strategies based on overall average performance. Finally, models trained on SUPERNOVA outperform strong baselines (e.g., Qwen3.5) on challenging reasoning benchmarks including BBEH, Zebralogic, and MMLU-Pro. In particular, training on SUPERNOVA yields relative improvements of up to 52.8\\% on BBEH across model sizes, demonstrating the effectiveness of principled data curation for RLVR. Our findings provide practical insights for curating human-annotated resources to extend RLVR to general reasoning. The code and data is available at https://github.com/asuvarna31/supernova.", "link": "http://arxiv.org/abs/2604.08477v1", "date": "2026-04-09", "relevancy": 2.0745, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5229}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5229}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4971}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SUPERNOVA%3A%20Eliciting%20General%20Reasoning%20in%20LLMs%20with%20Reinforcement%20Learning%20on%20Natural%20Instructions&body=Title%3A%20SUPERNOVA%3A%20Eliciting%20General%20Reasoning%20in%20LLMs%20with%20Reinforcement%20Learning%20on%20Natural%20Instructions%0AAuthor%3A%20Ashima%20Suvarna%20and%20Kendrick%20Phan%20and%20Mehrab%20Beikzadeh%20and%20Hritik%20Bansal%20and%20Saadia%20Gabriel%0AAbstract%3A%20Reinforcement%20Learning%20with%20Verifiable%20Rewards%20%28RLVR%29%20has%20significantly%20improved%20large%20language%20model%20%28LLM%29%20reasoning%20in%20formal%20domains%20such%20as%20mathematics%20and%20code.%20Despite%20these%20advancements%2C%20LLMs%20still%20struggle%20with%20general%20reasoning%20tasks%20requiring%20capabilities%20such%20as%20causal%20inference%20and%20temporal%20understanding.%20Extending%20RLVR%20to%20general%20reasoning%20is%20fundamentally%20constrained%20by%20the%20lack%20of%20high-quality%2C%20verifiable%20training%20data%20that%20spans%20diverse%20reasoning%20skills.%20To%20address%20this%20challenge%2C%20we%20propose%20SUPERNOVA%2C%20a%20data%20curation%20framework%20for%20RLVR%20aimed%20at%20enhancing%20general%20reasoning.%20Our%20key%20insight%20is%20that%20instruction-tuning%20datasets%20containing%20expert-annotated%20ground-truth%20encode%20rich%20reasoning%20patterns%20that%20can%20be%20systematically%20adapted%20for%20RLVR.%20To%20study%20this%2C%20we%20conduct%20100%2B%20controlled%20RL%20experiments%20to%20analyze%20how%20data%20design%20choices%20impact%20downstream%20reasoning%20performance.%20In%20particular%2C%20we%20investigate%20three%20key%20factors%3A%20%28i%29%20source%20task%20selection%2C%20%28ii%29%20task%20mixing%20strategies%2C%20and%20%28iii%29%20synthetic%20interventions%20for%20improving%20data%20quality.%20Our%20analysis%20reveals%20that%20source%20task%20selection%20is%20non-trivial%20and%20has%20a%20significant%20impact%20on%20downstream%20reasoning%20performance.%20Moreover%2C%20selecting%20tasks%20based%20on%20their%20performance%20for%20individual%20target%20tasks%20outperforms%20strategies%20based%20on%20overall%20average%20performance.%20Finally%2C%20models%20trained%20on%20SUPERNOVA%20outperform%20strong%20baselines%20%28e.g.%2C%20Qwen3.5%29%20on%20challenging%20reasoning%20benchmarks%20including%20BBEH%2C%20Zebralogic%2C%20and%20MMLU-Pro.%20In%20particular%2C%20training%20on%20SUPERNOVA%20yields%20relative%20improvements%20of%20up%20to%2052.8%5C%25%20on%20BBEH%20across%20model%20sizes%2C%20demonstrating%20the%20effectiveness%20of%20principled%20data%20curation%20for%20RLVR.%20Our%20findings%20provide%20practical%20insights%20for%20curating%20human-annotated%20resources%20to%20extend%20RLVR%20to%20general%20reasoning.%20The%20code%20and%20data%20is%20available%20at%20https%3A//github.com/asuvarna31/supernova.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08477v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSUPERNOVA%253A%2520Eliciting%2520General%2520Reasoning%2520in%2520LLMs%2520with%2520Reinforcement%2520Learning%2520on%2520Natural%2520Instructions%26entry.906535625%3DAshima%2520Suvarna%2520and%2520Kendrick%2520Phan%2520and%25 {"title": "SealQA: Raising the Bar for Reasoning in Search-Augmented Language Models", "author": "Thinh Pham and Nguyen Nguyen and Pratibha Zunjare and Weiyuan Chen and Yu-Min Tseng and Tu Vu", "abstract": "We introduce SealQA, a new challenge benchmark for evaluating SEarch-Augmented Language models on fact-seeking questions where web search yields conflicting, noisy, or unhelpful results. SealQA comes in three flavors: (1) Seal-0 (main) and (2) Seal-Hard, which assess factual accuracy and reasoning capabilities, with Seal-0 focusing on the most challenging questions where chat models (e.g., GPT-4.1) typically achieve near-zero accuracy; and (3) LongSeal, which extends SealQA to test long-context, multi-document reasoning in \"needle-in-a-haystack\" settings. Our evaluation reveals critical limitations in current models: Even frontier LLMs perform poorly across all SealQA flavors. On Seal-0, frontier agentic models equipped with tools like o3 and o4-mini achieve only 17.1% and 6.3% accuracy, respectively, at their best reasoning efforts. We find that advanced reasoning models such as DeepSeek-R1-671B and o3-mini are highly vulnerable to noisy search results. Notably, increasing test-time compute does not yield reliable gains across o3-mini, o4-mini, and o3, with performance often plateauing or even declining early. Additionally, while recent models are less affected by the \"lost-in-the-middle\" issue, they still fail to reliably identify relevant documents in LongSeal when faced with numerous distractors. To facilitate future work, we release SealQA at huggingface.co/datasets/vtllms/sealqa.", "link": "http://arxiv.org/abs/2506.01062v4", "date": "2026-04-09", "relevancy": 2.0707, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5242}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.o {"title": "Differentially Private Language Generation and Identification in the Limit", "author": "Anay Mehrotra and Grigoris Velegkas and Xifan Yu and Felix Zhou", "abstract": "We initiate the study of language generation in the limit, a model recently introduced by Kleinberg and Mullainathan [KM24], under the constraint of differential privacy. We consider the continual release model, where a generator must eventually output a stream of valid strings while protecting the privacy of the entire input sequence. Our first main result is that for countable collections of languages, privacy comes at no qualitative cost: we provide an $\\varepsilon$-differentially-private algorithm that generates in the limit from any countable collection. This stands in contrast to many learning settings where privacy renders learnability impossible. However, privacy does impose a quantitative cost: there are finite collections of size $k$ for which uniform private generation requires $\u03a9(k/\\varepsilon)$ samples, whereas just one sample suffices non-privately.\n  We then turn to the harder problem of language identification in the limit. Here, we show that privacy creates fundamental barriers. We prove that no $\\varepsilon$-DP algorithm can identify a collection containing two languages with an infinite intersection and a finite set difference, a condition far stronger than the classical non-private characterization of identification. Next, we turn to the stochastic setting where the sample strings are sampled i.i.d. from a distribution (instead of being generated by an adversary). Here, we show that private identification is possible if and only if the collection is identifiable in the adversarial model. Together, our results establish new dimensions along which generation and identification differ and, for identification, a separation between adversarial and stochastic settings induced by privacy constraints.", "link": "http://arxiv.org/abs/2604.08504v1", "date": "2026-04-09", "relevancy": 2.0602, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4413}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4008}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.394}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differentially%20Private%20Language%20Generation%20and%20Identification%20in%20the%20Limit&body=Title%3A%20Differentially%20Private%20Language%20Generation%20and%20Identification%20in%20the%20Limit%0AAuthor%3A%20Anay%20Mehrotra%20and%20Grigoris%20Velegkas%20and%20Xifan%20Yu%20and%20Felix%20Zhou%0AAbstract%3A%20We%20initiate%20the%20study%20of%20language%20generation%20in%20the%20limit%2C%20a%20model%20recently%20introduced%20by%20Kleinberg%20and%20Mullainathan%20%5BKM24%5D%2C%20under%20the%20constraint%20of%20differential%20privacy.%20We%20consider%20the%20continual%20release%20model%2C%20where%20a%20generator%20must%20eventually%20output%20a%20stream%20of%20valid%20strings%20while%20protecting%20the%20privacy%20of%20the%20entire%20input%20sequence.%20Our%20first%20main%20result%20is%20that%20for%20countable%20collections%20of%20languages%2C%20privacy%20comes%20at%20no%20qualitative%20cost%3A%20we%20provide%20an%20%24%5Cvarepsilon%24-differentially-private%20algorithm%20that%20generates%20in%20the%20limit%20from%20any%20countable%20collection.%20This%20stands%20in%20contrast%20to%20many%20learning%20settings%20where%20privacy%20renders%20learnability%20impossible.%20However%2C%20privacy%20does%20impose%20a%20quantitative%20cost%3A%20there%20are%20finite%20collections%20of%20size%20%24k%24%20for%20which%20uniform%20private%20generation%20requires%20%24%CE%A9%28k/%5Cvarepsilon%29%24%20samples%2C%20whereas%20just%20one%20sample%20suffices%20non-privately.%0A%20%20We%20then%20turn%20to%20the%20harder%20problem%20of%20language%20identification%20in%20the%20limit.%20Here%2C%20we%20show%20that%20privacy%20creates%20fundamental%20barriers.%20We%20prove%20that%20no%20%24%5Cvarepsilon%24-DP%20algorithm%20can%20identify%20a%20collection%20containing%20two%20languages%20with%20an%20infinite%20intersection%20and%20a%20finite%20set%20difference%2C%20a%20condition%20far%20stronger%20than%20the%20classical%20non-private%20characterization%20of%20identification.%20Next%2C%20we%20turn%20to%20the%20stochastic%20setting%20where%20the%20sample%20strings%20are%20sampled%20i.i.d.%20from%20a%20distribution%20%28instead%20of%20being%20generated%20by%20an%20adversary%29.%20Here%2C%20we%20show%20that%20private%20identification%20is%20possible%20if%20and%20only%20if%20the%20collection%20is%20identifiable%20in%20the%20adversarial%20model.%20Together%2C%20our%20results%20establish%20new%20dimensions%20along%20which%20generation%20and%20identification%20differ%20and%2C%20for%20identification%2C%20a%20separation%20between%20adversarial%20and%20stochastic%20settings%20induced%20by%20privacy%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08504v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDifferentially%2520Private%2520Language%2520Generation%2520and%2520Identification%2520in%2520the%2520Limit%26entry.906535625%3DAnay%2520Mehrotra%2520and%2520Grigoris%2520Velegkas%2520and%2520Xifan%2520Yu%2520and%2520Felix%2520Zhou%26entry.1292438233%3DWe%2520initiate%2520the%2520study%2520of%2520language%2520generation%2520in%2520the%2520limit%252C%2520a%2520model%2520recently%2520introduced%2520by%2520Kleinberg%2520and%2520Mullainathan%2520%255BKM24%255D%252C%2520under%2520the%2520constraint%2520of%2520differential%2520privacy.%2520We%2520consider%2520th {"title": "The Detection-Extraction Gap: Models Know the Answer Before They Can Say It", "author": "Hanyang Wang and Mingxuan Zhu", "abstract": "Modern reasoning models continue generating long after the answer is already determined. Across five model configurations, two families, and three benchmarks, we find that 52--88% of chain-of-thought tokens are produced after the answer is recoverable from a partial prefix. This post-commitment generation reveals a structural phenomenon: the detection-extraction gap. Free continuations from early prefixes recover the correct answer even at 10% of the trace, while forced extraction fails on 42% of these cases. The answer is recoverable from the model state, yet prompt-conditioned decoding fails to extract it. We formalize this mismatch via a total-variation bound between free and forced continuation distributions, yielding quantitative estimates of suffix-induced shift. Exploiting this asymmetry, we propose Black-box Adaptive Early Exit (BAEE), which uses free continuations for both detection and extraction, truncating 70--78% of serial generation while improving accuracy by 1--5pp across all models. For thinking-mode models, early exit prevents post-commitment overwriting, yielding gains of up to 5.8pp; a cost-optimized variant achieves 68--73% reduction at a median of 9 API calls. Code is available at https://github.com/EdWangLoDaSc/know2say.", "link": "http://arxiv.org/abs/2604.06613v2", "date": "2026-04-09", "relevancy": 2.036, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5156}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5156}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4762}], "mailto": "mai ll%2520models.%2520For%2520thinking-mode%2520models%252C%2520early%2520exit%2520prevents%2520post-commitment%2520overwriting%252C%2520yielding%2520gains%2520of%2520up%2520to%25205.8pp%253B%2520a%2520cost-optimized%2520variant%2520achieves%252068--73%2525%2520reduction%2520at%2520a%2520median%2520of%25209%2520API%2520calls.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/EdWangLoDaSc/know2say.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.06613v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Detection-Extraction%20Gap%3A%20Models%20Know%20the%20Answer%20Before%20They%20Can%20Say%20It&entry.906535625=Hanyang%20Wang%20and%20Mingxuan%20Zhu&entry.1292438233=Modern%20reasoning%20models%20continue%20generating%20long%20after%20the%20answer%20is%20already%20determined.%20Across%20five%20model%20configurations%2C%20two%20families%2C%20and%20three%20benchmarks%2C%20we%20find%20that%2052--88%25%20of%20chain-of-thought%20tokens%20are%20produced%20after%20the%20answer%20is%20recoverable%20from%20a%20partial%20prefix.%20This%20post-commitment%20generation%20reveals%20a%20structural%20phenomenon%3A%20the%20detection-extraction%20gap.%20Free%20continuations%20from%20early%20prefixes%20recover%20the%20correct%20answer%20even%20at%2010%25%20of%20the%20trace%2C%20while%20forced%20extraction%20fails%20on%2042%25%20of%20these%20cases.%20The%20answer%20is%20recoverable%20from%20the%20model%20state%2C%20yet%20prompt-conditioned%20decoding%20fails%20to%20extract%20it.%20We%20formalize%20this%20mismatch%20via%20a%20total-variation%20bound%20between%20free%20and%20forced%20continuation%20distributions%2C%20yielding%20quantitative%20estimates%20of%20suffix-induced%20shift.%20Exploiting%20this%20asymmetry%2C%20we%20propose%20Black-box%20Adaptive%20Early%20Exit%20%28BAEE%29%2C%20which%20uses%20free%20continuations%20for%20both%20detection%20and%20extraction%2C%20 {"title": "A-SLIP: Acoustic Sensing for Continuous In-hand Slip Estimation", "author": "Uksang Yoo and Yuemin Mao and Jean Oh and Jeffrey Ichnowski", "abstract": "Reliable in-hand manipulation requires accurate real-time estimation of slip between a gripper and a grasped object. Existing tactile sensing approaches based on vision, capacitance, or force-torque measurements face fundamental trade-offs in form factor, durability, and their ability to jointly estimate slip direction and magnitude. We present A-SLIP, a multi-channel acoustic sensing system integrated into a parallel-jaw gripper for estimating continuous slip in the grasp plane. The A-SLIP sensor consists of piezoelectric microphones positioned behind a textured silicone contact pad to capture structured contact-induced vibrations. The A-SLIP model processes synchronized multi-channel audio as log-mel spectrograms using a lightweight convolutional network, jointly predicting the presence, direction, and magnitude of slip. Across experiments with robot- and externally induced slip conditions, the fine-tuned four-microphone configuration achieves a mean absolute directional error of 14.1 degrees, outperforms baselines by up to 12 percent in detection accuracy, and reduces directional error by 32 percent. Compared with single-microphone configurations, the multi-channel design reduces directional error by 64 percent and magnitude error by 68 percent, underscoring the importance of spatial acoustic sensing in resolving slip direction ambiguity. We further evaluate A-SLIP in closed-loop reactive control and find that it enables reliable, low-cost, real-time estimation of in-hand slip. Project videos and additional details are available at https://a-slip.github.io.", "link": "http://arxiv.org/abs/2604.08528v1", "date": "2026-04-09", "relevancy": 2.0308, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5722}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.514}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4756}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A-SLIP%3A%20Acoustic%20Sensing%20for%20Continuous%20In-hand%20Slip%20Estimation&body=Title%3A%20A-SLIP%3A%20Acoustic%20Sensing%20for%20Continuous%20In-hand%20Slip%20Estimation%0AAuthor%3A%20Uksang%20Yoo%20and%20Yuemin%20Mao%20and%20Jean%20Oh%20and%20Jeffrey%20Ichnowski%0AAbstract%3A%20Reliable%20in-hand%20manipulation%20requires%20accurate%20real-time%20estimation%20of%20slip%20between%20a%20gripper%20and%20a%20grasped%20object.%20Existing%20tactile%20sensing%20approaches%20based%20on%20vision%2C%20capacitance%2C%20or%20force-torque%20measurements%20face%20fundamental%20trade-offs%20in%20form%20factor%2C%20durability%2C%20and%20their%20ability%20to%20jointly%20estimate%20slip%20direction%20and%20magnitude.%20We%20present%20A-SLIP%2C%20a%20multi-channel%20acoustic%20sensing%20system%20integrated%20into%20a%20parallel-jaw%20gripper%20for%20estimating%20continuous%20slip%20in%20the%20grasp%20plane.%20The%20A-SLIP%20sensor%20consists%20of%20piezoelectric%20microphones%20positioned%20behind%20a%20textured%20silicone%20contact%20pad%20to%20capture%20structured%20contact-induced%20vibrations.%20The%20A-SLIP%20model%20processes%20synchronized%20multi-channel%20audio%20as%20log-mel%20spectrograms%20using%20a%20lightweight%20convolutional%20network%2C%20jointly%20predicting%20the%20presence%2C%20direction%2C%20and%20magnitude%20of%20slip.%20Across%20experiments%20with%20robot-%20and%20externally%20induced%20slip%20conditions%2C%20the%20fine-tuned%20four-microphone%20configuration%20achieves%20a%20mean%20absolute%20directional%20error%20of%2014.1%20degrees%2C%20outperforms%20baselines%20by%20up%20to%2012%20percent%20in%20detection%20accuracy%2C%20and%20reduces%20directional%20error%20by%2032%20percent.%20Compared%20with%20single-microphone%20configurations%2C%20the%20multi-channel%20design%20reduces%20directional%20error%20by%2064%20percent%20and%20magnitude%20error%20by%2068%20percent%2C%20underscoring%20the%20importance%20of%20spatial%20acoustic%20sensing%20in%20resolving%20slip%20direction%20ambiguity.%20We%20further%20evaluate%20A-SLIP%20in%20closed-loop%20reactive%20control%20and%20find%20that%20it%20enables%20reliable%2C%20low-cost%2C%20real-time%20estimation%20of%20in-hand%20slip.%20Project%20videos%20and%20additional%20details%20are%20available%20at%20https%3A//a-slip.github.io.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08528v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA-SLIP%253A%2520Acoustic%2520Sensing%2520for%2520Continuous%2520In-hand%2520Slip%2520Estimation%26entry.906535625%3DUksang%2520Yoo%2520and%2520Yuemin%2520Mao%2520and%2520Jean%2520Oh%2520and%2520Jeffrey%2520Ichnowski%26entry.1292438233%3DReliable%2520in-hand%2520manipulation%2520requires%2520accurate%2520real-time%2520estimation%2520of%2520slip%2520between%2520a%2520gripper%2520and%2520a%2520grasped%2520object.%2520Existing%2520tactile%2520sensing%2520approaches%2520based%2520on%2520vision%252C%2520capacitance%252C%2520or%2520force-torque%2520measurements%2520face%2520fundamental%2520trade-offs%2520in%2520form%2520factor%252C%2520durability%252C%2520and%2520their%2520ability%2520to%2520jointly%2520estimate%2520slip%2520direction%2520and%2520magnitude.%2520We%2520present%2520A-SLIP%252C%2520a%2520multi-channel%2520acoustic%2520sensing%2520system%2520integrated%2520into%2520a%2520parallel-jaw%2520gripper%2520for%2520estimating%2520continuous%2520slip%2520in%2520the%2520grasp%2520plane.%2520The%2520A-SLIP%2520sensor%2520consists%2520of%2520piezoelectric%2520microphones%2520positioned%2520 {"title": "TTVS: Boosting Self-Exploring Reinforcement Learning via Test-time Variational Synthesis", "author": "Sikai Bai and Haoxi Li and Jie Zhang and Yongjiang Liu and Song Guo", "abstract": "Despite significant advances in Large Reasoning Models (LRMs) driven by reinforcement learning with verifiable rewards (RLVR), this paradigm is fundamentally limited in specialized or novel domains where such supervision is prohibitively expensive or unavailable, posing a key challenge for test-time adaptation. While existing test-time methods offer a potential solution, they are constrained by learning from static query sets, risking overfitting to textual patterns. To address this gap, we introduce Test-Time Variational Synthesis (TTVS), a novel framework that enables LRMs to self-evolve by dynamically augmenting the training stream from unlabeled test queries. TTVS comprises two synergistic modules: (1) Online Variational Synthesis, which transforms static test queries into a dynamic stream of diverse, semantically-equivalent variations, enforcing the model to learn underlying problem logic rather than superficial patterns; (2) Test-time Hybrid Exploration, which balances accuracy-driven exploitation with consistency-driven exploration across synthetic variants. Extensive experiments show TTVS yields superior performance across eight model architectures. Notably, using only unlabeled test-time data, TTVS not only surpasses other test-time adaptation methods but also outperforms state-of-the-art supervised RL-based techniques trained on vast, high-quality labeled data.", "link": "http://arxiv.org/abs/2604.08468v1", "date": "2026-04-09", "relevancy": 2.0241, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5235}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5051} VS%20yields%20superior%20performance%20across%20eight%20model%20architectures.%20Notably%2C%20using%20only%20unlabeled%20test-time%20data%2C%20TTVS%20not%20only%20surpasses%20other%20test-time%20adaptation%20methods%20but%20also%20outperforms%20state-of-the-art%20supervised%20RL-based%20techniques%20trained%20on%20vast%2C%20high-quality%20labeled%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08468v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTTVS%253A%2520Boosting%2520Self-Exploring%2520Reinforcement%2520Learning%2520via%2520Test-time%2520Variational%2520Synthesis%26entry.906535625%3DSikai%2520Bai%2520and%2520Haoxi%2520Li%2520and%2520Jie%2520Zhang%2520and%2520Yongjiang%2520Liu%2520and%2520Song%2520Guo%26entry.1292438233%3DDespite%2520significant%2520advances%2520in%2520Large%2520Reasoning%2520Models%2520%2528LRMs%2529%2520driven%2520by%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529%252C%2520this%2520paradigm%2520is%2520fundamentally%2520limited%2520in%2520specialized%2520or%2520novel%2520domains%2520where%2520such%2520supervision%2520is%2520prohibitively%2520expensive%2520or%2520unavailable%252C%2520posing%2520a%2520key%2520challenge%2520for%2520test-time%2520adaptation.%2520While%2520existing%2520test-time%2520methods%2520offer%2520a%2520potential%2520solution%252C%2520they%2520are%2520constrained%2520by%2520learning%2520from%2520static%2520query%2520sets%252C%2520risking%2520overfitting%2520to%2520textual%2520patterns.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520Test-Time%2520Variational%2520Synthesis%2520%2528TTVS%2529%252C%2520a%2520novel%2520framework%2520that%2520enables%2520LRMs%2520to%2520self-evolve%2520by%2520dynamically%2520augmenting%2520the%2520training%2520stream%2520from%2520unlabeled%2520test%2520queries.%2520TTVS%2520comprises%2520two%2520synergistic%2520modules%253A%2520%25281%2529%2520Online%2520Variational%2520Synthesis%252C%2520which%2520transforms%2520static%2520test%2520queries%2520into%2520a%2520dynamic%2520stream%2520of%2520diverse%252C%2520semantically-equivalent%2520variations%252C%2520enforcing%2520the%2520model%2520to%2520learn%2520underlying%2520problem%2520logic%2520rather%2520than%2520superficial%2520patterns%253B%2520%25282%2529%2520Test-time%2520Hybrid%2520Exploration%252C%2520which%2520balances%2520accuracy-driven%2520exploitation%2520with%2520consistency-driven%2520exploration%2520across%2520synthetic%2520variants.%2520Extensive%2520experiments%2520show%2520TTVS%2520yields%2520superior%2520performance%2520across%2520eight%2520model%2520architectures.%2520Notably%252C%2520using%2520only%2520unlabeled%2520test-time%2520data%252C%2520TTVS%2520not%2520only%2520surpasses%2520other%2520test-time%2520adaptation%2520methods%2520but%2520also%2520outperforms%2520state-of-the-art%2520supervised%2520RL-based%2520techniques%2520trained%2520on%2520vast%252C%2520high-quality%2520labeled%2520data.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08468v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TTVS%3A%20Boosting%20Self-Exploring%20Reinforcement%20Learning%20via%20Test-time%20Variational%20Synthesis&entry.906535625=Sikai%20Bai%20and%20Haoxi%20Li%20and%20Jie%20Zhang%20and%20Yongjiang%20Liu%20and%20Song%20Guo&entry.1292438233=Despite%20significant%20advances%20in%20Large%20Reasoning%20Models%20%28LRMs%29%20driven%20by%20reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%2C%20this%20paradigm%20is%20fundamentally%20limited%20in%20specialized%20or%20novel%20domains%20where%20such%20supervision%20is%20prohibitively%20expensive%20or%20unavailable%2C%20posing%20a%20key%20challenge%20for%20test-time%20adaptation.%20While%20existing%20test-time%20methods%20offer%20a%20potential%20solution%2C%20they%20are%20constrained%20by%20learning%20f {"title": "Density-Driven Optimal Control: Convergence Guarantees for Stochastic LTI Multi-Agent Systems", "author": "Kooktae Lee", "abstract": "This paper addresses the decentralized non-uniform area coverage problem for multi-agent systems, a critical task in missions with high spatial priority and resource constraints. While existing density-based methods often rely on computationally heavy Eulerian PDE solvers or heuristic planning, we propose Stochastic Density-Driven Optimal Control (D$^2$OC). This is a rigorous Lagrangian framework that bridges the gap between individual agent dynamics and collective distribution matching. By formulating a stochastic MPC-like problem that minimizes the Wasserstein distance as a running cost, our approach ensures that the time-averaged empirical distribution converges to a non-parametric target density under stochastic LTI dynamics. A key contribution is the formal convergence guarantee established via reachability analysis, providing a bounded tracking error even in the presence of process and measurement noise. Numerical results verify that Stochastic D$^2$OC achieves robust, decentralized coverage while outperforming previous heuristic methods in optimality and consistency.", "link": "http://arxiv.org/abs/2604.08495v1", "date": "2026-04-09", "relevancy": 2.0153, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5179}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5058}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4889}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Density-Driven%20Optimal%20Control%3A%20Convergence%20Guarantees%20for%20Stochastic%20LTI%20Mul ntry.906535625=Kooktae%20Lee&entry.1292438233=This%20paper%20addresses%20the%20decentralized%20non-uniform%20area%20coverage%20problem%20for%20multi-agent%20systems%2C%20a%20critical%20task%20in%20missions%20with%20high%20spatial%20priority%20and%20resource%20constraints.%20While%20existing%20density-based%20methods%20often%20rely%20on%20computationally%20heavy%20Eulerian%20PDE%20solvers%20or%20heuristic%20planning%2C%20we%20propose%20Stochastic%20Density-Driven%20Optimal%20Control%20%28D%24%5E2%24OC%29.%20This%20is%20a%20rigorous%20Lagrangian%20framework%20that%20bridges%20the%20gap%20between%20individual%20agent%20dynamics%20and%20collective%20distribution%20matching.%20By%20formulating%20a%20stochastic%20MPC-like%20problem%20that%20minimizes%20the%20Wasserstein%20distance%20as%20a%20running%20cost%2C%20our%20approach%20ensures%20that%20the%20time-averaged%20empirical%20distribution%20converges%20to%20a%20non-parametric%20target%20density%20under%20stochastic%20LTI%20dynamics.%20A%20key%20contribution%20is%20the%20formal%20convergence%20guarantee%20established%20via%20reachability%20analysis%2C%20providing%20a%20bounded%20tracking%20error%20even%20in%20the%20presence%20of%20process%20and%20measurement%20noise.%20Numerical%20results%20verify%20that%20Stochastic%20D%24%5E2%24OC%20achieves%20robust%2C%20decentralized%20coverage%20while%20outperforming%20previous%20heuristic%20methods%20in%20optimality%20and%20consistency.&entry.1838667208=http%3A//arxiv.org/abs/2604.08495v1&entry.124074799=Read"},
{"title": "Privacy Attacks on Image AutoRegressive Models", "author": "Antoni Kowalczuk and Jan Dubi\u0144ski and Franziska Boenisch and Adam Dziedzic", "abstract": "Image AutoRegressive generation has emerged as a new powerful paradigm with image autoregressive models (IARs) matching state-of-the-art diffusion models (DMs) in image quality (FID: 1.48 vs. 1.58) while allowing for a higher generation speed. However, the privacy risks associated with IARs remain unexplored, raising concerns regarding their responsible deployment. To address this gap, we conduct a comprehensive privacy analysis of IARs, comparing their privacy risks to the ones of DMs as reference points. Concretely, we develop a novel membership inference attack (MIA) that achieves a remarkably high success rate in detecting training images (with True Positive Rate at False Positive Rate = 1% of 94.57% vs. 6.38% for DMs with comparable attacks). We leverage our novel MIA to provide dataset inference (DI) for IARs, and show that it requires as few as 4 samples to detect dataset membership (compared to 200 for DI in DMs), confirming a higher information leakage in IARs. Finally, we are able to extract hundreds of training data points from an IAR (e.g., 698 from VAR-\\textit{d}30). Our results suggest a fundamental privacy-utility trade-off: while IARs excel in image generation quality and speed, they are \\textit{empirically} significantly more vulnerable to privacy attacks compared to DMs that achieve similar performance. We release the code at https://github.com/sprintml/privacy_attacks_against_iars for reproducibility.", "link": "http://arxiv.org/abs/2502.02514v5", "date": "2026-04-09", "relevancy": 2.0021, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5209}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4998}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Privacy%20Attacks%20on%20Image%20AutoRegressive%20Models&body=Title%3A%20Privacy%20Attacks%20on%20Image%20AutoRegressive%20Models%0AAuthor%3A%20Antoni%20Kowalczuk%20and%20Jan%20Dubi%C5%84ski%20and%20Franziska%20Boenisch%20and%20Adam%20Dziedzic%0AAbstract%3A%20Image%20AutoRegressive%20generation%20has%20emerged%20as%20a%20new%20powerful%20paradigm%20with%20image%20autoregressive%20models%20%28IARs%29%20matching%20state-of-the-art%20diffusion%20models%20%28DMs%29%20in%20image%20quality%20%28FID%3A%201.48%20vs.%201.58%29%20while%20allowing%20for%20a%20higher%20generation%20speed.%20However%2C%20the%20privacy%20risks%20associated%20with%20IARs%20remain%20unexplored%2C%20raising%20concerns%20regarding%20their%20responsible%20deployment.%20To%20address%20this%20gap%2C%20we%20conduct%20a%20comprehensive%20privacy%20analysis%20of%20IARs%2C%20comparing%20their%20privacy%20risks%20to%20the%20ones%20of%20DMs%20as%20reference%20points.%20Concretely%2C%20we%20develop%20a%20novel%20membership%20inference%20attack%20%28MIA%29%20that%20achieves%20a%20remarkably%20high%20success%20rate%20in%20detecting%20training%20images%20%28with%20True%20Positive%20Rate%20at%20False%20Positive%20Rate%20%3D%201%25%20of%2094.57%25%20vs.%206.38%25%20for%20DMs%20with%20comparable%20attacks%29.%20We%20leverage%20our%20novel%20MIA%20to%20provide%20dataset%20inference%20%28DI%29%20for%20IARs%2C%20and%20show%20that%20it%20requires%20as%20few%20as%204%20samples%20to%20detect%20dataset%20membership%20%28compared%20to%20200%20for%20DI%20in%20DMs%29%2C%20confirming%20a%20higher%20information%20leakage%20in%20IARs.%20Finally%2C%20we%20are%20able%20to%20extract%20hundreds%20of%20training%20data%20points%20from%20an%20IAR%20%28e.g.%2C%20698%20from%20VAR-%5Ctextit%7Bd%7D30%29.%20Our%20results%20suggest%20a%20fundamental%20privacy-utility%20trade-off%3A%20while%20IARs%20excel%20in%20image%20generation%20quality%20and%20speed%2C%20they%20are%20%5Ctextit%7Bempirically%7D%20significantly%20more%20vulnerable%20to%20privacy%20attacks%20compared%20to%20DMs%20that%20achieve%20similar%20performance.%20We%20release%20the%20code%20at%20https%3A//github.com/sprintml/privacy_attacks_against_iars%20for%20reproducibility.%0ALink%3A%20http%3A//arxiv.org/abs/2502.02514v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrivacy%2520Attacks%2520on%2520Image%2520AutoRegressive%2520Models%26entry.906535625%3DAntoni%2520Kowalczuk%2520and%2520Jan%2520Dubi%25C5%2584ski%2520and%2520Franziska%2520Boenisch%2520and%2520Adam%2520Dziedzic%26entry.1292438233%3DImage%2520AutoRegressive%2520generation%2520has%2520emerged%2520as%2520a%2520new%2520powerful%2520paradigm%2520with%2520image%2520autoregressive%2520models%2520%2528IARs%2529%2520matching%2520state-of-the-art%2520diffusion%2520models%2520%2528DMs%2529%2520in%2520image%2520quality%2520%2528FID%253A%25201.48%2520vs.%25201.58%2529%2520while%2520allowing%2520for%2520a%2520higher%2520generation%2520speed.%2520However%252C%2520the%2520privacy%2520risks%2520associated%2520with%2520IARs%2520remain%2520unexplored%252C%2520raising%2520concerns%2520regarding%2520their%2520responsible%2520deployment.%2520To%2520address%2520this%2520gap%252C%2520we%2520conduct%2520a%2520comprehensive%2520privacy%2520analysis%2520of%2520IARs%252C%2520comparing%2520their%2520privacy%2520risks%2520to%2520the%2520ones%2520of%2520DMs%2520as%2520reference%2520points.%2520Concretely%252C%2520we%2520develop%2520a%2520novel%2520membership%2520inference%2520attack%2520%2528MIA%2529%2520that%2520achieves%2520a%2520remarkably%2520high%2520success%2520rate%2520in%2520detecting%2520training%2520images%2520%2528with%2520True%2520Positive%2520Rate%2520at%2520False%2520Positive%2520Rate%2520%253D%25201%2525%2520 {"title": "What Drives Representation Steering? A Mechanistic Case Study on Steering Refusal", "author": "Stephen Cheng and Sarah Wiegreffe and Dinesh Manocha", "abstract": "Applying steering vectors to large language models (LLMs) is an efficient and effective model alignment technique, but we lack an interpretable explanation for how it works-- specifically, what internal mechanisms steering vectors affect and how this results in different model outputs. To investigate the causal mechanisms underlying the effectiveness of steering vectors, we conduct a comprehensive case study on refusal. We propose a multi-token activation patching framework and discover that different steering methodologies leverage functionally interchangeable circuits when applied at the same layer. These circuits reveal that steering vectors primarily interact with the attention mechanism through the OV circuit while largely ignoring the QK circuit-- freezing all attention scores during steering drops performance by only 8.75% across two model families. A mathematical decomposition of the steered OV circuit further reveals semantically interpretable concepts, even in cases where the steering vector itself does not. Leveraging the activation patching results, we show that steering vectors can be sparsified by up to 90-99% while retaining most performance, and that different steering methodologies agree on a subset of important dimensions.", "link": "http://arxiv.org/abs/2604.08524v1", "date": "2026-04-09", "relevancy": 1.9553, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.495}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.495}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4577}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Drives%20Representation%20Steering%3F%20A%20Mechanistic%20Case%20Study%20on%20Steering%20Refusal&body=Title%3A%20What%20Drives%20Representation%20Steering%3F%20A%20Mechanistic%20Case%20Study%20on%20Steering%20Refusal%0AAuthor%3A%20Stephen%20Cheng%20and%20Sarah%20Wiegreffe%20and%20Dinesh%20Manocha%0AAbstract%3A%20Applying%20steering%20vectors%20to%20large%20language%20models%20%28LLMs%29%20is%20an%20efficient%20and%20effective%20model%20alignment%20technique%2C%20but%20we%20lack%20an%20interpretable%20explanation%20for%20how%20it%20works--%20specifically%2C%20what%20internal%20mechanisms%20steering%20vectors%20affect%20and%20how%20this%20results%20in%20different%20model%20outputs.%20To%20investigate%20the%20causal%20mechanisms%20underlying%20the%20effectiveness%20of%20steering%20vectors%2C%20we%20conduct%20a%20comprehensive%20case%20study%20on%20refusal.%20We%20propose%20a%20multi-token%20activation%20patching%20framework%20and%20discover%20that%20different%20steering%20methodologies%20leverage%20functionally%20interchangeable%20circuits%20when%20applied%20at%20the%20same%20layer.%20These%20circuits%20reveal%20that%20steering%20vectors%20primarily%20interact%20with%20the%20attention%20mechanism%20through%20the%20OV%20circuit%20while%20largely%20ignoring%20the%20QK%20circuit--%20freezing%20all%20attention%20scores%20during%20steering%20drops%20performance%20by%20only%208.75%25%20across%20two%20model%20families.%20A%20mathematical%20decomposition%20of%20the%20steered%20OV%20circuit%20further%20reveals%20semantically%20interpretable%20concepts%2C%20even%20in%20cases%20where%20the%20steering%20vector%20itself%20does%20not.%20Leveraging%20the%20activation%20patching%20results%2C%20we%20show%20that%20steering%20vectors%20can%20be%20sparsified%20by%20up%20to%2090-99%25%20while%20retaining%20most%20performance%2C%20and%20that%20different%20steering%20methodologies%20agree%20on%20a%20subset%20of%20important%20dimensions.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08524v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Drives%2520Representation%2520Steering%253F%2520A%2520Mechanistic%2520Case%2520Study%2520on%2520Steering%2520Refusal%26entry.906535625%3DStephen%2520Cheng%2520and%2520Sarah%2520Wiegreffe%2520and%2520Dinesh%2520Manocha%26entry.1292438233%3DApplying%2520steering%2520vectors%2520to%2520large%2520language%2520models%2520%2528LLMs%2529%2520is%2520an%2520efficient%2520and%2520effective%2520model%2520alignment%2520technique%252C%2520but%2520we%2520lack%2520an%2520interpretable%2520explanation%2520for%2520how%2520it%2520works--%2520specifically%252C%2520what%2520internal%2520mechanisms%2520steering%2520vectors%2520affect%2520and%2520how%2520this%2520results%2520in%2520different%2520model%2520outputs.%2520To%2520investigate%2520the%2520causal%2520mechanisms%2520underlying%2520the%2520effectiveness%2520of%2520steering%2520vectors%252C%2520we%2520conduct%2520a%2520comprehensive%2520case%2520study%2520on%2520refusal.%2520We%2520propose%2520a%2520multi-token%2520activation%2520patching%2520framework%2520and%2520discover%2520that%2520different%2520steering%2520methodologies%2520leverage%2520functionally%2520interchangeable%2520circuits%2520when%2520applied%2520at%2520the%2520same%2520layer.%2520These%2520circuits%2520reveal%2520that%2520steering%2520vectors%2520primarily%2520interact%2520with%2520the%2520attention%2520mechanism%2520through%2520the%2520OV%2520circuit%2520while%2520largely%2520ignoring%2520the%2520QK%2520circuit--%2520freezing%2520all%2520attention%2520scores%2520during%2520steering%2520drops%2520performance%2520by%2520only%25208.75%2525%2520across%2520two%2520model%2520families.%2520A%2520mathematical%2520decomposition%2520of%2520the%2520steered%2520OV%2520circuit%2520further%2520reveals%2520semantically%2520interpretable%2520concepts%252C%2520even%2520in%2520cases%2520where%2520the%2520steering%2520vector%2520itself%2520does%2520not.%2520Leveraging%2520the%2520activation%2520patching%2520results%252C%2520we%2520show%2520that%2520steering%2520vectors%2520can%2520be%2520sparsified%2520by%2520up%2520to%252090-99%2525%2520while%2520retaining%2520most%2520performance%252C%2520and%2520that%2520different%2520steering%2520methodologies%2520agree%2520on%2520a%2520subset%2520of%2520important%2520dimensions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08524v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=What%20Drives%20Representation%20Steering%3F%20A%20Mechanistic%20Case%20Study%20on%20Steering%20Refusal&entry.906535625=Stephen%20Cheng%20and%20Sarah%20Wiegreffe%20and%20Dinesh%20Manocha&entry.1292438233=Applying%20steering%20vectors%20to%20large%20language%20models%20%28LLMs%29%20is%20an%20efficient%20and%20effective%20model%20alignment%20technique%2C%20but%20we%20lack%20an%20interpretable%20explanation%20for%20how%20it%20works--%20specifically%2C%20what%20internal%20mechanisms%20steering%20vectors%20affect%20and%20how%20this%20results%20in%20different%20model%20outputs.%20To%20investigate%20the%20causal%20mechanisms%20underlying%20the%20effectiveness%20of%20steering%20vectors%2C%20we%20conduct%20a%20comprehensive%20case%20study%20on%20refusal.%20We%20propose%20a%20multi-token%20activation%20patching%20framework%20and%20discover%20that%20different%20steering%20methodologies%20leverage%20functionally%20interchangeable%20circuits%20when%20applied%20at%20the%20same%20layer.%20These%20circuits%20reveal%20that%20steering%20vectors%20primarily%20interact%20with%20the%20attention%20mechanism%20through%20the%20OV%20circuit%20while%20largely%20ignoring%20the%20QK%20circuit--%20freezing%20all%20attention%20scores%20during%20steering%20drops%20performance%20by%20only%208.75%25% {"title": "Fail2Drive: Benchmarking Closed-Loop Driving Generalization", "author": "Simon Gerstenecker and Andreas Geiger and Katrin Renz", "abstract": "Generalization under distribution shift remains a central bottleneck for closed-loop autonomous driving. Although simulators like CARLA enable safe and scalable testing, existing benchmarks rarely measure true generalization: they typically reuse training scenarios at test time. Success can therefore reflect memorization rather than robust driving behavior. We introduce Fail2Drive, the first paired-route benchmark for closed-loop generalization in CARLA, with 200 routes and 17 new scenario classes spanning appearance, layout, behavioral, and robustness shifts. Each shifted route is matched with an in-distribution counterpart, isolating the effect of the shift and turning qualitative failures into quantitative diagnostics. Evaluating multiple state-of-the-art models reveals consistent degradation, with an average success-rate drop of 22.8\\%. Our analysis uncovers unexpected failure modes, such as ignoring objects clearly visible in the LiDAR and failing to learn the fundamental concepts of free and occupied space. To accelerate follow-up work, Fail2Drive includes an open-source toolbox for creating new scenarios and validating solvability via a privileged expert policy. Together, these components establish a reproducible foundation for benchmarking and improving closed-loop driving generalization. We open-source all code, data, and tools at https://github.com/autonomousvision/fail2drive .", "link": "http://arxiv.org/abs/2604.08535v1", "date": "2026-04-09", "relevancy": 1.933, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.496}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4937}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4664}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fail2Drive%3A%20Benchmarking%20Closed-Loop%20Driving%20Generalization&body=Title%3A%20Fail2Drive%3A%20Benchmarking%20Closed-Loop%20Driving%20Generalization%0AAuthor%3A%20Simon%20Gerstenecker%20and%20Andreas%20Geiger%20and%20Katrin%20Renz%0AAbstract%3A%20Generalization%20under%20distribution%20shift%20remains%20a%20central%20bottleneck%20for%20closed-loop%20autonomous%20driving.%20Although%20simulators%20like%20CARLA%20enable%20safe%20and%20scalable%20testing%2C%20existing%20benchmarks%20rarely%20measure%20true%20generalization%3A%20they%20typically%20reuse%20training%20scenarios%20at%20test%20time.%20Success%20can%20therefore%20reflect%20memorization%20rather%20than%20robust%20driving%20behavior.%20We%20introduce%20Fail2Drive%2C%20the%20first%20paired-route%20benchmark%20for%20closed-loop%20generalization%20in%20CARLA%2C%20with%20200%20routes%20and%2017%20new%20scenario%20classes%20spanning%20appearance%2C%20layout%2C%20behavioral%2C%20and%20robustness%20shifts.%20Each%20shifted%20route%20is%20matched%20with%20an%20in-distribution%20counterpart%2C%20isolating%20the%20effect%20of%20the%20shift%20and%20turning%20qualitative%20failures%20into%20quantitative%20diagnostics.%20Evaluating%20multiple%20state-of-the-art%20models%20reveals%20consistent%20degradation%2C%20with%20an%20average%20success-rate%20drop%20of%2022.8%5C%25.%20Our%20analysis%20uncovers%20unexpected%20failure%20modes%2C%20such%20as%20ignoring%20objects%20clearly%20visible%20in%20the%20LiDAR%20and%20failing%20to%20learn%20the%20fundamental%20concepts%20of%20free%20and%20occupied%20space.%20To%20accelerate%20follow-up%20work%2C%20Fail2Drive%20includes%20an%20open-source%20toolbox%20for%20creating%20new%20scenarios%20and%20validating%20solvability%20via%20a%20privileged%20expert%20policy.%20Together%2C%20these%20components%20establish%20a%20reproducible%20foundation%20for%20benchmarking%20and%20improving%20closed-loop%20driving%20generalization.%20We%20open-source%20all%20code%2C%20data%2C%20and%20tools%20at%20https%3A//github.com/autonomousvision/fail2drive%20.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08535v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFail2Drive%253A%2520Benchmarking%2520Closed-Loop%2520Driving%2520Generalization%26entry.906535625%3DSimon%2520Gerstenecker%2520and%2520Andreas%2520Geiger%2520and%2520Katrin%2520Renz%26entry.1292438233%3DGeneralization%2520under%2520distribution%2520shift%2520remains%2520a%2520central%2520bottleneck%2520for%2520closed-loop%2520autonomous%2520driving.%2520Although%2520simulators%2520like%2520CARLA%2520enable%2520safe%2520and%2520scalable%2520testing%252C%2520existing%2520benchmarks%2520rarely%2520measure%2520true%2520generalization%253A%2520they%2520typically%2520reuse%2520training%2520scenarios%2520at%2520test%2520time.%2520Success%2520can%2520therefore%2520reflect%2520memorization%2520rather%2520than%2520robust%2520driving%2520behavior.%2520We%2520introduce%2520Fail2Drive%252C%2520the%2520first%2520paired-route%2520benchmark%2520for%2520closed-loop%2520generalization%2520in%2520CARLA%252C%2520with%2520200%2520routes%2520and%252017%2520new%2520scenario%2520classes%2520spanning%2520appearance%252C%2520layout%252C%2520behavioral%252C%2520and%2520robustness%2520shifts.%2520Each%2520shifted%2520route%2520is%2520matched%2520with%2520an%2520in-distribution%2520counterpart%252C%2520isolating%2520the%2520effect%2520of%2520the%2520shift%2520and%2520turning%2520qualitative%2520failures%2520into%2520quantitative%2520diagnostics.%2520Evaluating%2520multiple%2520state-of-the-art%2520models%2520reveals%2520consistent%2520degradation%252C%2520with%2520an%2520average%2520success-rate% {"title": "Quantization Impact on the Accuracy and Communication Efficiency Trade-off in Federated Learning for Aerospace Predictive Maintenance", "author": "Abdelkarim Loukili", "abstract": "Federated learning (FL) enables privacy-preserving predictive maintenance across distributed aerospace fleets, but gradient communication overhead constrains deployment on bandwidth-limited IoT nodes. This paper investigates the impact of symmetric uniform quantization ($b \\in \\{32,8,4,2\\}$ bits) on the accuracy--efficiency trade-off of a custom-designed lightweight 1-D convolutional model (AeroConv1D, 9\\,697 parameters) trained via FL on the NASA C-MAPSS benchmark under a realistic Non-IID client partition. Using a rigorous multi-seed evaluation ($N=10$ seeds), we show that INT4 achieves accuracy \\emph{statistically indistinguishable} from FP32 on both FD001 ($p=0.341$) and FD002 ($p=0.264$ MAE, $p=0.534$ NASA score) while delivering an $8\\times$ reduction in gradient communication cost (37.88~KiB $\\to$ 4.73~KiB per round). A key methodological finding is that na\u00efve IID client partitioning artificially suppresses variance; correct Non-IID evaluation reveals the true operational instability of extreme quantization, demonstrated via a direct empirical IID vs.\\ Non-IID comparison. INT2 is empirically characterized as unsuitable: while it achieves lower MAE on FD002 through extreme quantization-induced over-regularization, this apparent gain is accompanied by catastrophic NASA score instability (CV\\,=\\,45.8\\% vs.\\ 22.3\\% for FP32), confirming non-reproducibility under heterogeneous operating conditions. Analytical FPGA resource projections on the Xilinx ZCU102 confirm that INT4 fits within hardware constraints (85.5\\% DSP utilization), potentially enabling a complete FL pipeline on a single SoC. The full simulation codebase and FPGA estimation scripts are publicly available at https://github.com/therealdeadbeef/aerospace-fl-quantization.", "link": "http://arxiv.org/abs/2604.08474v1", "date": "2026-04-09", "relevancy": 1.9282, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4852}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4831}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4797}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Quantization%20Impact%20on%20the%20Accuracy%20and%20Communication%20Efficiency%20Trade-off%20in%20Federated%20Learning%20for%20Aerospace%20Predictive%20Maintenance&body=Title%3A%20Quantization%20Impact%20on%20the%20Accuracy%20and%20Communication%20Efficiency%20Trade-off%20in%20Federated%20Learning%20for%20Aerospace%20Predictive%20Maintenance%0AAuthor%3A%20Abdelkarim%20Loukili%0AAbstract%3A%20Federated%20learning%20%28FL%29%20enables%20privacy-preserving%20predictive%20maintenance%20across%20distributed%20aerospace%20fleets%2C%20but%20gradient%20communication%20overhead%20constrains%20deployment%20on%20bandwidth-limited%20IoT%20nodes.%20This%20paper%20investigates%20the%20impact%20of%20symmetric%20uniform%20quantization%20%28%24b%20%5Cin%20%5C%7B32%2C8%2C4%2C2%5C%7D%24%20bits%29%20on%20the%20accuracy--efficiency%20trade-off%20of%20a%20custom-designed%20lightweight%201-D%20convolutional%20model%20%28AeroConv1D%2C%209%5C%2C697%20parameters%29%20trained%20via%20FL%20on%20the%20NASA%20C-MAPSS%20benchmark%20under%20a%20realistic%20Non-IID%20client%20partition.%20Using%20a%20rigorous%20multi-seed%20evaluation%20%28%24N%3D10%24%20seeds%29%2C%20we%20show%20that%20INT4%20achieves%20accuracy%20%5Cemph%7Bstatistically%20indistinguishable%7D%20from%20FP32%20on%20both%20FD001%20%28%24p%3D0.341%24%29%20and%20FD002%20%28%24p%3D0.264%24%20MAE%2C%20%24p%3D0.534%24%20NASA%20score%29%20while%20delivering%20an%20%248%5Ctimes%24%20reduction%20in%20gradient%20communication%20cost%20%2837.88~KiB%20%24%5Cto%24%204.73~KiB%20per%20round%29.%20A%20key%20methodological%20finding%20is%20that%20na%C3%AFve%20IID%20client%20partitioning%20artificially%20suppresses%20variance%3B%20correct%20Non-IID%20evaluation%20reveals%20the%20true%20operational%20instability%20of%20extreme%20quantization%2C%20demonstrated%20via%20a%20direct%20empirical%20IID%20vs.%5C%20Non-IID%20comparison.%20INT2%20is%20empirically%20characterized%20as%20unsuitable%3A%20while%20it%20achieves%20lower%20MAE%20on%20FD002%20through%20extreme%20quantization-induced%20over-regularization%2C%20this%20apparent%20gain%20is%20accompanied%20by%20catastrophic%20NASA%20score%20instability%20%28CV%5C%2C%3D%5C%2C45.8%5C%25%20vs.%5C%2022.3%5C%25%20for%20FP32%29%2C%20confirming%20non-reproducibility%20under%20heterogeneous%20operating%20conditions.%20Analytical%20FPGA%20resource%20projections%20on%20the%20Xilinx%20ZCU102%20confirm%20that%20INT4%20fits%20within%20hardware%20constraints%20%2885.5%5C%25%20DSP%20utilization%29%2C%20potentially%20enabling%20a%20complete%20FL%20pipeline%20on%20a%20single%20SoC.%20The%20full%20simulation%20codebase%20and%20FPGA%20estimation%20scripts%20are%20publicly%20available%20at%20https%3A//github.com/therealdeadbeef/aerospace-fl-quantization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08474v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQuantization%2520Impact%2520on%2520the%2520Accuracy%2520and%2520Communication%2520Efficiency%2520Trade-off%2520in%2520Federated%2520Learning%2520for%2520Aerospace%2520Predictive%2520Maintenance%26entry.906535625%3DAbdelkarim%2520Loukili%26entry.1292438233%3DFederated%2520learning%2520%2528FL%2529%2520enables%2520privacy-preserving%2520predictive%2520maintenance%2520across%2520distributed%2520aerospace%2520fleets%252C%2520but%2520gradient%2520communication%2520overhead%2520constrains%2520deployment%2520on%2520bandwidth-limited%2520IoT%2520nodes.%2520This%2520paper%2520investigates%2520the%2520impact%2520of%2520symmetric%2520uniform%2520quantization%2520%2528%2524b%2520%255Cin%2520%255C%257B32%252C8%252C4%252C2%255C%257D%2524%2520bits%2529%2520on%2520the%2520accuracy--efficiency%2520trade-off%2520of%2520a%2520custom-designed%2520lightweight%25201-D%2520convolutional%2520model%2520%2528AeroConv1D%252C%25209%255C%252C697%2520parameters%2529%2520trained%2520via%2520FL%2520on%2520the%2520NASA%2520C-MAPSS%2520benchmark%2520under%2520a%2520realistic%2520Non-IID%2520client%2520partition.%2520Using%2520a%2520rigorous%2520multi-seed%2520evaluation%2520%2528%2524N%253D10%2524%2520seeds%2529%252C%2520we%2520show%2520that%2520INT4%2520achieves%2520accuracy%2520%255Cemph%257Bstatistically%2520indistinguishable%257D%2520from%2520FP32%2520on%2520both%2520FD001%2520%2528%2524p%253D0.341%2524%2529%2520and%2520FD002%2520%2528%2524p%253D0.264%2524%2520MAE%252C%2520%2524p%253D0.534%2524%2520NASA%2520score%2529%2520while%2520delivering%2520an%2520%25248%255Ctimes%2524%2520reduction%2520in%2520gradient%2520communication%2520cost%2520%252837.88~KiB%2520%2524%255Cto%2524%25204.73~KiB%2520per%2520round%2529.%2520A%2520key%2520methodological%2520finding%2520is%2520that%2520na%25C3%25AFve%2520IID%2520client%2520partitioning%2520artificially%2520suppresses%2520variance%253B%2520correct%2520Non-IID%2520evaluation%2520reveals%2520the%2520true%2520operational%2520instability%2520of%2520extreme%2520quantization%252C%2520demonstrated%2520via%2520a%2520direct%2520empirical%2520IID%2520vs.%255C%2520Non-IID%2520comparison.%2520INT2%2520is%2520empirically%2520characterized%2520as%2520unsuitable%253A%2520while%2520it%2520achieves%2520lower%2520MAE%2520on%2520FD002%2520through%2520extreme%2520quantization-induced%2520over-regularization%252C%2520this%2520apparent%2520gain%2520is%2520accompanied%2520by%2520catastrophic%2520NASA%2520score%2520inst

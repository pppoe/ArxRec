{"title": "ClawBench: Can AI Agents Complete Everyday Online Tasks?", "author": "Yuxuan Zhang and Yubo Wang and Yipeng Zhu and Penghui Du and Junwen Miao and Xuan Lu and Wendong Xu and Yunzhuo Hao and Songcheng Cai and Xiaochen Wang and Huaisong Zhang and Xian Wu and Yi Lu and Minyi Lei and Kai Zou and Huifeng Yin and Ping Nie and Liang Chen and Dongfu Jiang and Wenhu Chen and Kelsey R. Allen", "abstract": "AI agents may be able to automate your inbox, but can they automate other routine aspects of your life? Everyday online tasks offer a realistic yet unsolved testbed for evaluating the next generation of AI agents. To this end, we introduce ClawBench, an evaluation framework of 153 simple tasks that people need to accomplish regularly in their lives and work, spanning 144 live platforms across 15 categories, from completing purchases and booking appointments to submitting job applications. These tasks require demanding capabilities beyond existing benchmarks, such as obtaining relevant information from user-provided documents, navigating multi-step workflows across diverse platforms, and write-heavy operations like filling in many detailed forms correctly. Unlike existing benchmarks that evaluate agents in offline sandboxes with static pages, ClawBench operates on production websites, preserving the full complexity, dynamic nature, and challenges of real-world web interaction. A lightweight interception layer captures and blocks only the final submission request, ensuring safe evaluation without real-world side effects. Our evaluations of 7 frontier models show that both proprietary and open-source models can complete only a small portion of these tasks. For example, Claude Sonnet 4.6 achieves only 33.3%. Progress on ClawBench brings us closer to AI agents that can function as reliable general-purpose assistants.", "link": "http://arxiv.org/abs/2604.08523v1", "date": "2026-04-09", "relevancy": 1.3758, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4865}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4512}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4504}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ClawBench%3A%20Can%20AI%20Agents%20Complete%20Everyday%20Online%20Tasks%3F&body=Title%3A%20ClawBench%3A%20Can%20AI%20Agents%20Complete%20Everyday%20Online%20Tasks%3F%0AAuthor%3A%20Yuxuan%20Zhang%20and%20Yubo%20Wang%20and%20Yipeng%20Zhu%20and%20Penghui%20Du%20and%20Junwen%20Miao%20and%20Xuan%20Lu%20and%20Wendong%20Xu%20and%20Yunzhuo%20Hao%20and%20Songcheng%20Cai%20and%20Xiaochen%20Wang%20and%20Huaisong%20Zhang%20and%20Xian%20Wu%20and%20Yi%20Lu%20and%20Minyi%20Lei%20and%20Kai%20Zou%20and%20Huifeng%20Yin%20and%20Ping%20Nie%20and%20Liang%20Chen%20and%20Dongfu%20Jiang%20and%20Wenhu%20Chen%20and%20Kelsey%20R.%20Allen%0AAbstract%3A%20AI%20agents%20may%20be%20able%20to%20automate%20your%20inbox%2C%20but%20can%20they%20automate%20other%20routine%20aspects%20of%20your%20life%3F%20Everyday%20online%20tasks%20offer%20a%20realistic%20yet%20unsolved%20testbed%20for%20evaluating%20the%20next%20generation%20of%20AI%20agents.%20To%20this%20end%2C%20we%20introduce%20ClawBench%2C%20an%20evaluation%20framework%20of%20153%20simple%20tasks%20that%20people%20need%20to%20accomplish%20regularly%20in%20their%20lives%20and%20work%2C%20spanning%20144%20live%20platforms%20across%2015%20categories%2C%20from%20completing%20purchases%20and%20booking%20appointments%20to%20submitting%20job%20applications.%20These%20tasks%20require%20demanding%20capabilities%20beyond%20existing%20benchmarks%2C%20such%20as%20obtaining%20relevant%20information%20from%20user-provided%20documents%2C%20navi       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

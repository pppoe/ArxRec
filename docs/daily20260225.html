%2520toward%2520advancing%2520spatial%2520intelligence.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/hustvl/Spa3R.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21186v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spa3R%3A%20Predictive%20Spatial%20Field%20Modeling%20for%203D%20Visual%20Reasoning&entry.906535625=Haoyi%20Jiang%20and%20Liu%20Liu%20and%20Xinjie%20Wang%20and%20Yonghao%20He%20and%20Wei%20Sui%20and%20Zhizhong%20Su%20and%20Wenyu%20Liu%20and%20Xinggang%20Wang&entry.1292438233=While%20Vision-Language%20Models%20%28VLMs%29%20exhibit%20exceptional%202D%20visual%20understanding%2C%20their%20ability%20to%20comprehend%20and%20reason%20about%203D%20space--a%20cornerstone%20of%20spatial%20intelligence--remains%20superficial.%20Current%20methodologies%20attempt%20to%20bridge%20this%20domain%20gap%20either%20by%20relying%20on%20explicit%203D%20modalities%20or%20by%20augmenting%20VLMs%20with%20partial%2C%20view-conditioned%20geometric%20priors.%20However%2C%20such%20approaches%20hinder%20scalability%20and%20ultimately%20burden%20the%20language%20model%20with%20the%20ill-posed%20task%20of%20implicitly%20reconstructing%20holistic%203D%20geometry%20from%20sparse%20cues.%20In%20this%20paper%2C%20we%20argue%20that%20spatial%20intelligence%20can%20emerge%20inherently%20from%202D%20vision%20alone%2C%20rather%20than%20being%20imposed%20via%20explicit%20spatial%20instruction%20tuning.%20To%20this%20end%2C%20we%20introduce%20Spa3R%2C%20a%20self-supervised%20framework%20that%20learns%20a%20unified%2C%20view-invariant%20spatial%20representation%20directly%20from%20unposed%20multi-view%20images.%20Spa3R%20is%20built%20upon%20the%20proposed%20Predictive%20Spatial%20Field%20Modeling%20%28PSFM%29%20paradigm%2C%20where%20Spa3R%20learns%20to%20synthesize%20feature%20fields%20for%20arbitrary%20unseen%20views%20conditioned%20on%20a%20compact%20latent%20representation%2C%20thereby%20internalizing%20a%20holistic%20and%20coherent%20understanding%20of%20the%20underlying%203D%20scene.%20We%20further%20integrate%20the%20pre-trained%20Spa3R%20Encoder%20into%20existing%20VLMs%20via%20a%20lightweight%20adapter%20to%20form%20Spa3-VLM%2C%20effectively%20grounding%20language%20reasoning%20in%20a%20global%20spatial%20context.%20Experiments%20on%20the%20challenging%20VSI-Bench%20demonstrate%20that%20Spa3-VLM%20achieves%20state-of-the-art%20accuracy%20of%2058.6%25%20on%203D%20VQA%2C%20significantly%20outperforming%20prior%20methods.%20These%20results%20highlight%20PSFM%20as%20a%20scalable%20path%20toward%20advancing%20spatial%20intelligence.%20Code%20is%20available%20at%20https%3A//github.com/hustvl/Spa3R.&entry.1838667208=http%3A//arxiv.org/abs/2602.21186v1&entry.124074799=Read"},
{"title": "STAR: Similarity-guided Teacher-Assisted Refinement for Super-Tiny Function Calling Models", "author": "Jiliang Ni and Jiachen Pu and Zhongyi Yang and Jingfeng Luo and Conggang Hu", "abstract": "The proliferation of Large Language Models (LLMs) in function calling is pivotal for creating advanced AI agents, yet their large scale hinders widespread adoption, necessitating transferring their capabilities into smaller ones. However, existing paradigms are often plagued by overfitting, training instability, ineffective binary rewards for multi-solution tasks, and the difficulty of synergizing techniques. We introduce STAR: Similarity-guided Teacher-Assisted Refinement, a novel holistic framework that effectively transfers LLMs' capabilities to super-tiny models. STAR consists of two core technical innovations: (1) Constrained Knowledge Distillation (CKD), a training objective that augments top-k forward KL divergence to suppress confidently incorrect predictions, ensuring training stability while preserving exploration capacity for downstream RL. STAR holistically synergizes these strategies within a cohesive training curriculum, enabling super-tiny models to achieve exceptional performance on complex function calling tasks; (2) Similarity-guided RL (Sim-RL), a RL mechanism that introduces a fine-grained, similarity-based reward. This provides a robust, continuous, and rich signal for better policy optimization by evaluating the similarity between generated outputs and the ground truth. Extensive experiments on challenging and renowned benchmarks demonstrate the effectiveness of our method. Our STAR models establish SOTA in their size classes, significantly outperforming baselines. Remarkably, our 0.6B STAR model achieves the best performance among all open models under 1B, surpassing even several well-known open models at a larger scale. STAR demonstrates a training framework that distills capabilities of LLMs into super-tiny models, paving the way for powerful, accessible, and efficient AI agents.", "link": "http://arxiv.org/abs/2602.03022v2", "date": "2026-02-24", "relevancy": 2.5184, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5123}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5094}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4892}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20STAR%3A%20Similarity-guided%20Teacher-Assisted%20Refinement%20for%20Super-Tiny%20Function%20Calling%20Models&body=Title%3A%20STAR%3A%20Similarity-guided%20Teacher-Assisted%20Refinement%20for%20Super-Tiny%20Function%20Calling%20Models%0AAuthor%3A%20Jiliang%20Ni%20and%20Jiachen%20Pu%20and%20Zhongyi%20Yang%20and%20Jingfeng%20Luo%20and%20Conggang%20Hu%0AAbstract%3A%20The%20proliferation%20of%20Large%20Language%20Models%20%28LLMs%29%20in%20function%20calling%20is%20pivotal%20for%20creating%20advanced%20AI%20agents%2C%20yet%20their%20large%20scale%20hinders%20widespread%20adoption%2C%20necessitating%20transferring%20their%20capabilities%20into%20smaller%20ones.%20However%2C%20existing%20paradigms%20are%20often%20plagued%20by%20overfitting%2C%20training%20instability%2C%20ineffective%20binary%20rewards%20for%20multi-solution%20tasks%2C%20and%20the%20difficulty%20of%20synergizing%20techniques.%20We%20introduce%20STAR%3A%20Similarity-guided%20Teacher-Assisted%20Refinement%2C%20a%20novel%20holistic%20framework%20that%20effectively%20transfers%20LLMs%27%20capabilities%20to%20super-tiny%20models.%20STAR%20consists%20of%20two%20core%20technical%20innovations%3A%20%281%29%20Constrained%20Knowledge%20Distillation%20%28CKD%29%2C%20a%20training%20objective%20that%20augments%20top-k%20forward%20KL%20divergence%20to%20suppress%20confidently%20incorrect%20predictions%2C%20ensuring%20training%20stability%20while%20preserving%20exploration%20capacity%20for%20downstream%20RL.%20STAR%20holistically%20synergizes%20these%20strategies%20within%20a%20cohesive%20training%20curriculum%2C%20enabling%20super-tiny%20models%20to%20achieve%20exceptional%20performance%20on%20complex%20function%20calling%20tasks%3B%20%282%29%20Similarity-guided%20RL%20%28Sim-RL%29%2C%20a%20RL%20mechanism%20that%20introduces%20a%20fine-grained%2C%20similarity-based%20reward.%20This%20provides%20a%20robust%2C%20continuous%2C%20and%20rich%20signal%20for%20better%20policy%20optimization%20by%20evaluating%20the%20similarity%20between%20generated%20outputs%20and%20the%20ground%20truth.%20Extensive%20experiments%20on%20challenging%20and%20renowned%20benchmarks%20demonstrate%20the%20effectiveness%20of%20our%20method.%20Our%20STAR%20models%20establish%20SOTA%20in%20their%20size%20classes%2C%20significantly%20outperforming%20baselines.%20Remarkably%2C%20our%200.6B%20STAR%20model%20achieves%20the%20best%20performance%20among%20all%20open%20models%20under%201B%2C%20surpassing%20even%20several%20well-known%20open%20models%20at%20a%20larger%20scale.%20STAR%20demonstrates%20a%20training%20framework%20that%20distills%20capabilities%20of%20LLMs%20into%20super-tiny%20models%2C%20paving%20the%20way%20for%20powerful%2C%20accessible%2C%20and%20efficient%20AI%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03022v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTAR%253A%2520Similarity-guided%2520Teacher-Assisted%2520Refinement%2520for%2520Super-Tiny%2520Function%2520Calling%2520Models%26entry.906535625%3DJiliang%2520Ni%2520and%2520Jiachen%2520Pu%2520and%2520Zhongyi%2520Yang%2520and%2520Jingfeng%2520Luo%2520and%2520Conggang%2520Hu%26entry.1292438233%3DThe%2520proliferation%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520in%2520function%2520calling%252 {"title": "The Art of Efficient Reasoning: Data, Reward, and Optimization", "author": "Taiqiang Wu and Zenan Zu and Bo Zhou and Ngai Wong", "abstract": "Large Language Models (LLMs) consistently benefit from scaled Chain-of-Thought (CoT) reasoning, but also suffer from heavy computational overhead. To address this issue, efficient reasoning aims to incentivize short yet accurate thinking trajectories, typically through reward shaping with Reinforcement Learning (RL). In this paper, we systematically investigate the mechanics of efficient reasoning for LLMs. For comprehensive evaluation, we advocate for more fine-grained metrics, including length distribution conditioned on correctness and performance across a wide spectrum of token budgets ranging from 2k to 32k. First, we reveal that the training process follows a two-stage paradigm: length adaptation and reasoning refinement. After that, we conduct extensive experiments (about 0.2 million GPU hours) in a unified protocol, deconstructing training prompts and rollouts, reward shaping, and optimization strategies. In particular, a key finding is to train on relatively easier prompts, ensuring the density of positive reward signals and thus avoiding the length collapse. Meanwhile, the learned length bias can be generalized across domains. We distill all findings into valuable insights and practical guidelines, and further validate them across the Qwen3 series, ranging from 0.6B to 30B, demonstrating the robustness and generalization.", "link": "http://arxiv.org/abs/2602.20945v1", "date": "2026-02-24", "relevancy": 2.4965, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.509}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.509}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-R {"title": "Multimodal MRI Report Findings Supervised Brain Lesion Segmentation with Substructures", "author": "Yubin Ge and Yongsong Huang and Xiaofeng Liu", "abstract": "Report-supervised (RSuper) learning seeks to alleviate the need for dense tumor voxel labels with constraints derived from radiology reports (e.g., volumes, counts, sizes, locations). In MRI studies of brain tumors, however, we often involve multi-parametric scans and substructures. Here, fine-grained modality/parameter-wise reports are usually provided along with global findings and are correlated with different substructures. Moreover, the reports often describe only the largest lesion and provide qualitative or uncertain cues (``mild,'' ``possible''). Classical RSuper losses (e.g., sum volume consistency) can over-constrain or hallucinate unreported findings under such incompleteness, and are unable to utilize these hierarchical findings or exploit the priors of varied lesion types in a merged dataset. We explicitly parse the global quantitative and modality-wise qualitative findings and introduce a unified, one-sided, uncertainty-aware formulation (MS-RSuper) that: (i) aligns modality-specific qualitative cues (e.g., T1c enhancement, FLAIR edema) with their corresponding substructures using existence and absence losses; (ii) enforces one-sided lower-bounds for partial quantitative cues (e.g., largest lesion size, minimal multiplicity); and (iii) adds extra- vs. intra-axial anatomical priors to respect cohort differences. Certainty tokens scale penalties; missing cues are down-weighted. On 1238 report-labeled BraTS-MET/MEN scans, our MS-RSuper largely outperforms both a sparsely-supervised baseline and a naive RSuper method.", "link": "http://arxiv.org/abs/2602.20994v1", "date": "2026-02-24", "relevancy": 2.4764, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4971}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20MRI%20Report%20Findings%20Supervised%20Brain%20Lesion%20Segmentation%20with%20Substructures&body=Title%3A%20Multimodal%20MRI%20Report%20Findings%20Supervised%20Brain%20Lesion%20Segmentation%20with%20Substructures%0AAuthor%3A%20Yubin%20Ge%20and%20Yongsong%20Huang%20and%20Xiaofeng%20Liu%0AAbstract%3A%20Report-supervised%20%28RSuper%29%20learning%20seeks%20to%20alleviate%20the%20need%20for%20dense%20tumor%20voxel%20labels%20with%20constraints%20derived%20from%20radiology%20reports%20%28e.g.%2C%20volumes%2C%20counts%2C%20sizes%2C%20locations%29.%20In%20MRI%20studies%20of%20brain%20tumors%2C%20however%2C%20we%20often%20involve%20multi-parametric%20scans%20and%20substructures.%20Here%2C%20fine-grained%20modality/parameter-wise%20reports%20are%20usually%20provided%20along%20with%20global%20findings%20and%20are%20correlated%20with%20different%20substructures.%20Moreover%2C%20the%20reports%20often%20describe%20only%20the%20largest%20lesion%20and%20provide%20qualitative%20or%20uncertain%20cues%20%28%60%60mild%2C%27%27%20%60%60possible%27%27%29.%20Classical%20RSuper%20losses%20%28e.g.%2C%20sum%20volume%20consistency%29%20can%20over-constrain%20or%20hallucinate%20unreported%20findings%20under%20such%20incompleteness%2C%20and%20are%20unable%20to%20utilize%20these%20hierarchical%20findings%20or%20exploit%20the%20priors%20of%20varied%20lesion%20types%20in%20a%20merged%20dataset.%20We%20explicitly%20parse%20the%20global%20quantitative%20and%20modality-wise%20qualitative%20findings%20and%20introduce%20a%20unified%2C%20one-sided%2C%20uncertainty-aware%20formulation%20%28MS-RSuper%29%20that%3A%20%28i%29%20aligns%20modality-specific%20qualitative%20cues%20%28e.g.%2C%20T1c%20enhancement%2C%20FLAIR%20edema%29%20with%20their%20corresponding%20substructures%20using%20existence%20and%20absence%20losses%3B%20%28ii%29%20enforces%20one-sided%20lower-bounds%20for%20partial%20quantitative%20cues%20%28e.g.%2C%20largest%20lesion%20size%2C%20minimal%20multiplicity%29%3B%20and%20%28iii%29%20adds%20extra-%20vs.%20intra-axial%20anatomical%20priors%20to%20respect%20cohort%20differences.%20Certainty%20tokens%20scale%20penalties%3B%20missing%20cues%20are%20down-weighted.%20On%201238%20report-labeled%20BraTS-MET/MEN%20scans%2C%20our%20MS-RSuper%20largely%20outperforms%20both%20a%20sparsely-supervised%20baseline%20and%20a%20naive%20RSuper%20method.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20994v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultimodal%2520MRI%2520Report%2520Findings%2520Supervised%2520Brain%2520Lesion%2520Segmentation%2520with%2520Substructures%26entry.906535625%3DYubin%2520Ge%2520and%2520Yongsong%2520Huang%2520and%2520Xiaofeng%2520Liu%26entry.1292438233%3DReport-supervised%2520%2528RSuper%2529%2520learning%2520seeks%2520to%2520alleviate%2520the%2520need%2520for%2520dense%2520tumor%2520voxel%2520labels%2520with%2520constraints%2520derived%2520from%2520radiology%2520reports%2520%2528e.g.%252C%2520volumes%252C%2520counts%252C%2520sizes%252C%2520locations%2529.%2520In%2520MRI%2520studies%2520of%2520brain%2520tumors%252C%2520however%252C%2520we%2520often%2520involve%2520multi-parametric%2520scans%2520and%2520substructures.%2520Here%252C%2520fine-grained%2520modality/parameter-wise%2520reports%2520are%2520usually%2520provided%2520along%2520with%2520global%2520findings%2520and%2520are%2520correlated%2520with%2520different%2520substructures.%2520Moreover%252C%2520the%2520reports%2520often%2520describe%2520only%2520the%2520largest%2520lesion%2520and%2520provide%2520qualitative%2520or%2520uncertain%25 {"title": "Region of Interest Segmentation and Morphological Analysis for Membranes in Cryo-Electron Tomography", "author": "Xingyi Cheng and Julien Maufront and Aur\u00e9lie Di Cicco and Dani\u00ebl M. Pelt and Manuela Dezi and Daniel L\u00e9vy", "abstract": "Cryo-electron tomography (cryo-ET) enables high resolution, three-dimensional reconstruction of biological structures, including membranes and membrane proteins. Identification of regions of interest (ROIs) is central to scientific imaging, as it enables isolation and quantitative analysis of specific structural features within complex datasets. In practice, however, ROIs are typically derived indirectly through full structure segmentation followed by post hoc analysis. This limitation is especially apparent for continuous and geometrically complex structures such as membranes, which are segmented as single entities. Here, we developed TomoROIS-SurfORA, a two step framework for direct, shape-agnostic ROI segmentation and morphological surface analysis. TomoROIS performs deep learning-based ROI segmentation and can be trained from scratch using small annotated datasets, enabling practical application across diverse imaging data. SurfORA processes segmented structures as point clouds and surface meshes to extract quantitative morphological features, including inter-membrane distances, curvature, and surface roughness. It supports both closed and open surfaces, with specific considerations for open surfaces, which are common in cryo-ET due to the missing wedge effect. We demonstrate both tools using in vitro reconstituted membrane systems containing deformable vesicles with complex geometries, enabling automatic quantitative analysis of membrane contact sites and remodeling events such as invagination. While demonstrated here on cryo-ET membrane data, the combined approach is applicable to ROI detection and surface analysis in broader scientific imaging contexts.", "link": "http://arxiv.org/abs/2602.21195v1", "da deep%20learning-based%20ROI%20segmentation%20and%20can%20be%20trained%20from%20scratch%20using%20small%20annotated%20datasets%2C%20enabling%20practical%20application%20across%20diverse%20imaging%20data.%20SurfORA%20processes%20segmented%20structures%20as%20point%20clouds%20and%20surface%20meshes%20to%20extract%20quantitative%20morphological%20features%2C%20including%20inter-membrane%20distances%2C%20curvature%2C%20and%20surface%20roughness.%20It%20supports%20both%20closed%20and%20open%20surfaces%2C%20with%20specific%20considerations%20for%20open%20surfaces%2C%20which%20are%20common%20in%20cryo-ET%20due%20to%20the%20missing%20wedge%20effect.%20We%20demonstrate%20both%20tools%20using%20in%20vitro%20reconstituted%20membrane%20systems%20containing%20deformable%20vesicles%20with%20complex%20geometries%2C%20enabling%20automatic%20quantitative%20analysis%20of%20membrane%20contact%20sites%20and%20remodeling%20events%20such%20as%20invagination.%20While%20demonstrated%20here%20on%20cryo-ET%20membrane%20data%2C%20the%20combined%20approach%20is%20applicable%20to%20ROI%20detection%20and%20surface%20analysis%20in%20broader%20scientific%20imaging%20contexts.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21195v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRegion%2520of%2520Interest%2520Segmentation%2520and%2520Morphological%2520Analysis%2520for%2520Membranes%2520in%2520Cryo-Electron%2520Tomography%26entry.906535625%3DXingyi%2520Cheng%2520and%2520Julien%2520Maufront%2520and%2520Aur%25C3%25A9lie%2520Di%2520Cicco%2520and%2520Dani%25C3%25ABl%2520M.%2520Pelt%2520and%2520Manuela%2520Dezi%2520and%2520Daniel%2520L%25C3%25A9vy%26entry.1292438233%3DCryo-electron%2520tomography%2520%2528cryo-ET%2529%2520enables%2520high%2520resolution%252C%2520three-dimensional%2520reconstruction%2520of%2520biological%2520structures%252C%2520including%2520membranes%2520and%2520membrane%2520proteins.%2520Identification%2520of% {"title": "PMG: Parameterized Motion Generator for Human-like Locomotion Control", "author": "Chenxi Han and Yuheng Min and Zihao Huang and Ao Hong and Hang Liu and Yi Cheng and Houde Liu", "abstract": "Recent advances in data-driven reinforcement learning and motion tracking have substantially improved humanoid locomotion, yet critical practical challenges remain. In particular, while low-level motion tracking and trajectory-following controllers are mature, whole-body reference-guided methods are difficult to adapt to higher-level command interfaces and diverse task contexts: they require large, high-quality datasets, are brittle across speed and pose regimes, and are sensitive to robot-specific calibration. To address these limitations, we propose the Parameterized Motion Generator (PMG), a real-time motion generator grounded in an analysis of human motion structure that synthesizes reference trajectories using only a compact set of parameterized motion data together with high-dimensional control commands. Combined with an imitation-learning pipeline and an optimization-based sim-to-real motor parameter identification module, we validate the complete approach on our humanoid prototype ZERITH Z1 and show that, within a single integrated system, PMG produces natural, human-like locomotion, responds precisely to high-dimensional control inputs-including VR-based teleoperation-and enables efficient, verifiable sim-to-real transfer. Together, these results establish a practical, experimentally validated pathway toward natural and deployable humanoid control. Website: https://pmg-icra26.github.io/", "link": "http://arxiv.org/abs/2602.12656v2", "date": "2026-02-24", "relevancy": 2.4556, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6492}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5894}, {"title": " e%20locomotion%2C%20responds%20precisely%20to%20high-dimensional%20control%20inputs-including%20VR-based%20teleoperation-and%20enables%20efficient%2C%20verifiable%20sim-to-real%20transfer.%20Together%2C%20these%20results%20establish%20a%20practical%2C%20experimentally%20validated%20pathway%20toward%20natural%20and%20deployable%20humanoid%20control.%20Website%3A%20https%3A//pmg-icra26.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2602.12656v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPMG%253A%2520Parameterized%2520Motion%2520Generator%2520for%2520Human-like%2520Locomotion%2520Control%26entry.906535625%3DChenxi%2520Han%2520and%2520Yuheng%2520Min%2520and%2520Zihao%2520Huang%2520and%2520Ao%2520Hong%2520and%2520Hang%2520Liu%2520and%2520Yi%2520Cheng%2520and%2520Houde%2520Liu%26entry.1292438233%3DRecent%2520advances%2520in%2520data-driven%2520reinforcement%2520learning%2520and%2520motion%2520tracking%2520have%2520substantially%2520improved%2520humanoid%2520locomotion%252C%2520yet%2520critical%2520practical%2520challenges%2520remain.%2520In%2520particular%252C%2520while%2520low-level%2520motion%2520tracking%2520and%2520trajectory-following%2520controllers%2520are%2520mature%252C%2520whole-body%2520reference-guided%2520methods%2520are%2520difficult%2520to%2520adapt%2520to%2520higher-level%2520command%2520interfaces%2520and%2520diverse%2520task%2520contexts%253A%2520they%2520require%2520large%252C%2520high-quality%2520datasets%252C%2520are%2520brittle%2520across%2520speed%2520and%2520pose%2520regimes%252C%2520and%2520are%2520sensitive%2520to%2520robot-specific%2520calibration.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520the%2520Parameterized%2520Motion%2520Generator%2520%2528PMG%2529%252C%2520a%2520real-time%2520motion%2520generator%2520grounded%2520in%2520an%2520analysis%2520of%2520human%2520motion%2520structure%2520that%2520synthesizes%2520reference%2520 {"title": "LST-SLAM: A Stereo Thermal SLAM System for Kilometer-Scale Dynamic Environments", "author": "Zeyu Jiang and Kuan Xu and Changhao Chen", "abstract": "Thermal cameras offer strong potential for robot perception under challenging illumination and weather conditions. However, thermal Simultaneous Localization and Mapping (SLAM) remains difficult due to unreliable feature extraction, unstable motion tracking, and inconsistent global pose and map construction, particularly in dynamic large-scale outdoor environments. To address these challenges, we propose LST-SLAM, a novel large-scale stereo thermal SLAM system that achieves robust performance in complex, dynamic scenes. Our approach combines self-supervised thermal feature learning, stereo dual-level motion tracking, and geometric pose optimization. We also introduce a semantic-geometric hybrid constraint that suppresses potentially dynamic features lacking strong inter-frame geometric consistency. Furthermore, we develop an online incremental bag-of-words model for loop closure detection, coupled with global pose optimization to mitigate accumulated drift. Extensive experiments on kilometer-scale dynamic thermal datasets show that LST-SLAM significantly outperforms recent representative SLAM systems, including AirSLAM and DROID-SLAM, in both robustness and accuracy.", "link": "http://arxiv.org/abs/2602.20925v1", "date": "2026-02-24", "relevancy": 2.4522, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6471}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5951}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5727}], "mailto": "mailto:haoxiang.li.2024@gmail.com {"title": "Complexity-aware fine-tuning", "author": "Andrey Goncharov and Daniil Vyazhev and Petr Sychev and Edvard Khalafyan and Alexey Zaytsev", "abstract": "General-purpose Large Language Models (LLMs) are frequently fine-tuned through supervised fine-tuning (SFT) to enhance performance in specific domains. Better results can be achieved by distilling the chain-of-thought of a larger model at the cost of numerous expensive calls and a much greater amount of data. We propose a novel blueprint for efficient fine-tuning that uses reasoning only for complex data identified by entropy. Specifically, across three small open models ($\\approx 3B$) we split the training data into complexity categories by a single token answer entropy (ROC AUC $0.73$), fine-tune large language models (LLMs) via SFT and distillation, and show that our pipeline significantly outperforms the standard SFT approach ($0.58$ vs $0.45$ average accuracy) and outperforms the distillation approach ($0.58$ vs $0.56$ average accuracy) while using $81\\%$ less data.", "link": "http://arxiv.org/abs/2506.21220v4", "date": "2026-02-24", "relevancy": 2.4447, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4918}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4875}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4875}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Complexity-aware%20fine-tuning&body=Title%3A%20Complexity-aware%20fine-tuning%0AAuthor%3A%20Andrey%20Goncharov%20and%20Daniil%20Vyazhev%20and%20Petr%20Sychev%20and%20Edvard%20Khalafyan%20and%20Alexey%20Zaytsev%0AAbstract%3A%20General-purpose%20Large%20Language%20Models%20%28LLMs%29%20are%20frequentl greater%2520amount%2520of%2520data.%2520We%2520propose%2520a%2520novel%2520blueprint%2520for%2520efficient%2520fine-tuning%2520that%2520uses%2520reasoning%2520only%2520for%2520complex%2520data%2520identified%2520by%2520entropy.%2520Specifically%252C%2520across%2520three%2520small%2520open%2520models%2520%2528%2524%255Capprox%25203B%2524%2529%2520we%2520split%2520the%2520training%2520data%2520into%2520complexity%2520categories%2520by%2520a%2520single%2520token%2520answer%2520entropy%2520%2528ROC%2520AUC%2520%25240.73%2524%2529%252C%2520fine-tune%2520large%2520language%2520models%2520%2528LLMs%2529%2520via%2520SFT%2520and%2520distillation%252C%2520and%2520show%2520that%2520our%2520pipeline%2520significantly%2520outperforms%2520the%2520standard%2520SFT%2520approach%2520%2528%25240.58%2524%2520vs%2520%25240.45%2524%2520average%2520accuracy%2529%2520and%2520outperforms%2520the%2520distillation%2520approach%2520%2528%25240.58%2524%2520vs%2520%25240.56%2524%2520average%2520accuracy%2529%2520while%2520using%2520%252481%255C%2525%2524%2520less%2520data.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.21220v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Complexity-aware%20fine-tuning&entry.906535625=Andrey%20Goncharov%20and%20Daniil%20Vyazhev%20and%20Petr%20Sychev%20and%20Edvard%20Khalafyan%20and%20Alexey%20Zaytsev&entry.1292438233=General-purpose%20Large%20Language%20Models%20%28LLMs%29%20are%20frequently%20fine-tuned%20through%20supervised%20fine-tuning%20%28SFT%29%20to%20enhance%20performance%20in%20specific%20domains.%20Better%20results%20can%20be%20achieved%20by%20distilling%20the%20chain-of-thought%20of%20a%20larger%20model%20at%20the%20cost%20of%20numerous%20expensive%20calls%20and%20a%20much%20greater%20amount%20of%20data.%20We%20propose%20a%20novel%20blueprint%20for%20efficient%20fine-tuning%20that%20uses%20reasoning%20only%20for%20complex%20data%20identifie {"title": "SpatiaLQA: A Benchmark for Evaluating Spatial Logical Reasoning in Vision-Language Models", "author": "Yuechen Xie and Xiaoyan Zhang and Yicheng Shan and Hao Zhu and Rui Tang and Rong Wei and Mingli Song and Yuanyu Wan and Jie Song", "abstract": "Vision-Language Models (VLMs) have been increasingly applied in real-world scenarios due to their outstanding understanding and reasoning capabilities. Although VLMs have already demonstrated impressive capabilities in common visual question answering and logical reasoning, they still lack the ability to make reasonable decisions in complex real-world environments. We define this ability as spatial logical reasoning, which not only requires understanding the spatial relationships among objects in complex scenes, but also the logical dependencies between steps in multi-step tasks. To bridge this gap, we introduce Spatial Logical Question Answering (SpatiaLQA), a benchmark designed to evaluate the spatial logical reasoning capabilities of VLMs. SpatiaLQA consists of 9,605 question answer pairs derived from 241 real-world indoor scenes. We conduct extensive experiments on 41 mainstream VLMs, and the results show that even the most advanced models still struggle with spatial logical reasoning. To address this issue, we propose a method called recursive scene graph assisted reasoning, which leverages visual foundation models to progressively decompose complex scenes into task-relevant scene graphs, thereby enhancing the spatial logical reasoning ability of VLMs, outperforming all previous methods. Code and dataset are available at https://github.com/xieyc99/SpatiaLQA.", "link": "http://arxiv.org/abs/2602.20901v1", "date": "2026-02-24", "relevancy": 2.401, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6179}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", {"title": "From Perception to Action: An Interactive Benchmark for Vision Reasoning", "author": "Yuhao Wu and Maojia Song and Yihuai Lan and Lei Wang and Zhiqiang Hu and Yao Xiao and Heng Zhou and Weihua Zheng and Dylan Raharja and Soujanya Poria and Roy Ka-Wei Lee", "abstract": "Understanding the physical structure is essential for real-world applications such as embodied agents, interactive design, and long-horizon manipulation. Yet, prevailing Vision-Language Model (VLM) evaluations still center on structure-agnostic, single-turn setups (e.g., VQA), which fail to assess agents' ability to reason about how geometry, contact, and support relations jointly constrain what actions are possible in a dynamic environment. To address this gap, we introduce the Causal Hierarchy of Actions and Interactions (CHAIN) benchmark, an interactive 3D, physics-driven testbed designed to evaluate whether models can understand, plan, and execute structured action sequences grounded in physical constraints. CHAIN shifts evaluation from passive perception to active problem solving, spanning tasks such as interlocking mechanical puzzles and 3D stacking and packing. We conduct a comprehensive study of state-of-the-art VLMs and diffusion-based models under unified interactive settings. Our results show that top-performing models still struggle to internalize physical structure and causal constraints, often failing to produce reliable long-horizon plans and cannot robustly translate perceived structure into effective actions. The project is available at https://social-ai-studio.github.io/CHAIN/.", "link": "http://arxiv.org/abs/2602.21015v1", "date": "2026-02-24", "relevancy": 2.3832, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5977}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", {"title": "Qwen-BIM: developing large language model for BIM-based design with domain-specific benchmark and dataset", "author": "Jia-Rui Lin and Yun-Hong Cai and Xiang-Rui Ni and Shaojie Zhou and Peng Pan", "abstract": "As the construction industry advances toward digital transformation, BIM (Building Information Modeling)-based design has become a key driver supporting intelligent construction. Despite Large Language Models (LLMs) have shown potential in promoting BIM-based design, the lack of specific datasets and LLM evaluation benchmarks has significantly hindered the performance of LLMs. Therefore, this paper addresses this gap by proposing: 1) an evaluation benchmark for BIM-based design together with corresponding quantitative indicators to evaluate the performance of LLMs, 2) a method for generating textual data from BIM and constructing corresponding BIM-derived datasets for LLM evaluation and fine-tuning, and 3) a fine-tuning strategy to adapt LLMs for BIM-based design. Results demonstrate that the proposed domain-specific benchmark effectively and comprehensively assesses LLM capabilities, highlighting that general LLMs are still incompetent for domain-specific tasks. Meanwhile, with the proposed benchmark and datasets, Qwen-BIM is developed and achieves a 21.0% average increase in G-Eval score compared to the base LLM model. Notably, with only 14B parameters, performance of Qwen-BIM is comparable to that of general LLMs with 671B parameters for BIM-based design tasks. Overall, this study develops the first domain-specific LLM for BIM-based design by introducing a comprehensive benchmark and high-quality dataset, which provide a solid foundation for developing BIM-related LLMs in various fields.", "link": "http://arxiv.org/abs/2602.20812v1", "date": "2026-02-24", "relevancy": 2.3781, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4822}, { l%20incompetent%20for%20domain-specific%20tasks.%20Meanwhile%2C%20with%20the%20proposed%20benchmark%20and%20datasets%2C%20Qwen-BIM%20is%20developed%20and%20achieves%20a%2021.0%25%20average%20increase%20in%20G-Eval%20score%20compared%20to%20the%20base%20LLM%20model.%20Notably%2C%20with%20only%2014B%20parameters%2C%20performance%20of%20Qwen-BIM%20is%20comparable%20to%20that%20of%20general%20LLMs%20with%20671B%20parameters%20for%20BIM-based%20design%20tasks.%20Overall%2C%20this%20study%20develops%20the%20first%20domain-specific%20LLM%20for%20BIM-based%20design%20by%20introducing%20a%20comprehensive%20benchmark%20and%20high-quality%20dataset%2C%20which%20provide%20a%20solid%20foundation%20for%20developing%20BIM-related%20LLMs%20in%20various%20fields.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20812v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQwen-BIM%253A%2520developing%2520large%2520language%2520model%2520for%2520BIM-based%2520design%2520with%2520domain-specific%2520benchmark%2520and%2520dataset%26entry.906535625%3DJia-Rui%2520Lin%2520and%2520Yun-Hong%2520Cai%2520and%2520Xiang-Rui%2520Ni%2520and%2520Shaojie%2520Zhou%2520and%2520Peng%2520Pan%26entry.1292438233%3DAs%2520the%2520construction%2520industry%2520advances%2520toward%2520digital%2520transformation%252C%2520BIM%2520%2528Building%2520Information%2520Modeling%2529-based%2520design%2520has%2520become%2520a%2520key%2520driver%2520supporting%2520intelligent%2520construction.%2520Despite%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520shown%2520potential%2520in%2520promoting%2520BIM-based%2520design%252C%2520the%2520lack%2520of%2520specific%2520datasets%2520and%2520LLM%2520evaluation%2520benchmarks%2520has%2520significantly%2520hindered%2520the%2520performance%2520of%2520LLMs.%2520Therefore%252C%2520this%2520paper%2520addresses%2520this%2520gap%2520by%2520proposing%253A%25201%2529%2520an%2520evaluation%2520bench {"title": "VGGDrive: Empowering Vision-Language Models with Cross-View Geometric Grounding for Autonomous Driving", "author": "Jie Wang and Guang Li and Zhijian Huang and Chenxu Dang and Hangjun Ye and Yahong Han and Long Chen", "abstract": "The significance of cross-view 3D geometric modeling capabilities for autonomous driving is self-evident, yet existing Vision-Language Models (VLMs) inherently lack this capability, resulting in their mediocre performance. While some promising approaches attempt to mitigate this by constructing Q&A data for auxiliary training, they still fail to fundamentally equip VLMs with the ability to comprehensively handle diverse evaluation protocols. We thus chart a new course, advocating for the infusion of VLMs with the cross-view geometric grounding of mature 3D foundation models, closing this critical capability gap in autonomous driving. In this spirit, we propose a novel architecture, VGGDrive, which empowers Vision-language models with cross-view Geometric Grounding for autonomous Driving. Concretely, to bridge the cross-view 3D geometric features from the frozen visual 3D model with the VLM's 2D visual features, we introduce a plug-and-play Cross-View 3D Geometric Enabler (CVGE). The CVGE decouples the base VLM architecture and effectively empowers the VLM with 3D features through a hierarchical adaptive injection mechanism. Extensive experiments show that VGGDrive enhances base VLM performance across five autonomous driving benchmarks, including tasks like cross-view risk perception, motion prediction, and trajectory planning. It's our belief that mature 3D foundation models can empower autonomous driving tasks through effective integration, and we hope our initial exploration demonstrates the potential of this paradigm to the autonomous driving community.", "link": "http://arxiv.org/abs/2602.20794v1", "date": "2026-02-24", "relevancy": 2.3675, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ ures%20from%20the%20frozen%20visual%203D%20model%20with%20the%20VLM%27s%202D%20visual%20features%2C%20we%20introduce%20a%20plug-and-play%20Cross-View%203D%20Geometric%20Enabler%20%28CVGE%29.%20The%20CVGE%20decouples%20the%20base%20VLM%20architecture%20and%20effectively%20empowers%20the%20VLM%20with%203D%20features%20through%20a%20hierarchical%20adaptive%20injection%20mechanism.%20Extensive%20experiments%20show%20that%20VGGDrive%20enhances%20base%20VLM%20performance%20across%20five%20autonomous%20driving%20benchmarks%2C%20including%20tasks%20like%20cross-view%20risk%20perception%2C%20motion%20prediction%2C%20and%20trajectory%20planning.%20It%27s%20our%20belief%20that%20mature%203D%20foundation%20models%20can%20empower%20autonomous%20driving%20tasks%20through%20effective%20integration%2C%20and%20we%20hope%20our%20initial%20exploration%20demonstrates%20the%20potential%20of%20this%20paradigm%20to%20the%20autonomous%20driving%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20794v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVGGDrive%253A%2520Empowering%2520Vision-Language%2520Models%2520with%2520Cross-View%2520Geometric%2520Grounding%2520for%2520Autonomous%2520Driving%26entry.906535625%3DJie%2520Wang%2520and%2520Guang%2520Li%2520and%2520Zhijian%2520Huang%2520and%2520Chenxu%2520Dang%2520and%2520Hangjun%2520Ye%2520and%2520Yahong%2520Han%2520and%2520Long%2520Chen%26entry.1292438233%3DThe%2520significance%2520of%2520cross-view%25203D%2520geometric%2520modeling%2520capabilities%2520for%2520autonomous%2520driving%2520is%2520self-evident%252C%2520yet%2520existing%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520inherently%2520lack%2520this%2520capability%252C%2520resulting%2520in%2520their%2520mediocre%2520performance.%2520While%2520some%2520promising%2520approaches%2520attempt%2520to%2520mitigate%2520this%2520by%2520constructing%2520Q%2526A%2520data%2520for%2520auxiliary%2520tr riving%2520community.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20794v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VGGDrive%3A%20Empowering%20Vision-Language%20Models%20with%20Cross-View%20Geometric%20Grounding%20for%20Autonomous%20Driving&entry.906535625=Jie%20Wang%20and%20Guang%20Li%20and%20Zhijian%20Huang%20and%20Chenxu%20Dang%20and%20Hangjun%20Ye%20and%20Yahong%20Han%20and%20Long%20Chen&entry.1292438233=The%20significance%20of%20cross-view%203D%20geometric%20modeling%20capabilities%20for%20autonomous%20driving%20is%20self-evident%2C%20yet%20existing%20Vision-Language%20Models%20%28VLMs%29%20inherently%20lack%20this%20capability%2C%20resulting%20in%20their%20mediocre%20performance.%20While%20some%20promising%20approaches%20attempt%20to%20mitigate%20this%20by%20constructing%20Q%26A%20data%20for%20auxiliary%20training%2C%20they%20still%20fail%20to%20fundamentally%20equip%20VLMs%20with%20the%20ability%20to%20comprehensively%20handle%20diverse%20evaluation%20protocols.%20We%20thus%20chart%20a%20new%20course%2C%20advocating%20for%20the%20infusion%20of%20VLMs%20with%20the%20cross-view%20geometric%20grounding%20of%20mature%203D%20foundation%20models%2C%20closing%20this%20critical%20capability%20gap%20in%20autonomous%20driving.%20In%20this%20spirit%2C%20we%20propose%20a%20novel%20architecture%2C%20VGGDrive%2C%20which%20empowers%20Vision-language%20models%20with%20cross-view%20Geometric%20Grounding%20for%20autonomous%20Driving.%20Concretely%2C%20to%20bridge%20the%20cross-view%203D%20geometric%20features%20from%20the%20frozen%20visual%203D%20model%20with%20the%20VLM%27s%202D%20visual%20features%2C%20we%20introduce%20a%20plug-and-play%20Cross-View%203D%20Geometric%20Enabler%20%28CVGE%29.%20The%20CVGE%20decouples%20the%20base%20VLM%20architecture%20and%20effectively%20empowers%20the%20VLM%20with%203D%20features%20through%20a%20hierarchical%20adaptive%20injec {"title": "PVminer: A Domain-Specific Tool to Detect the Patient Voice in Patient Generated Data", "author": "Samah Fodeh and Linhai Ma and Yan Wang and Srivani Talakokkul and Ganesh Puthiaraju and Afshan Khan and Ashley Hagaman and Sarah Lowe and Aimee Roundtree", "abstract": "Patient-generated text such as secure messages, surveys, and interviews contains rich expressions of the patient voice (PV), reflecting communicative behaviors and social determinants of health (SDoH). Traditional qualitative coding frameworks are labor intensive and do not scale to large volumes of patient-authored messages across health systems. Existing machine learning (ML) and natural language processing (NLP) approaches provide partial solutions but often treat patient-centered communication (PCC) and SDoH as separate tasks or rely on models not well suited to patient-facing language. We introduce PVminer, a domain-adapted NLP framework for structuring patient voice in secure patient-provider communication. PVminer formulates PV detection as a multi-label, multi-class prediction task integrating patient-specific BERT encoders (PV-BERT-base and PV-BERT-large), unsupervised topic modeling for thematic augmentation (PV-Topic-BERT), and fine-tuned classifiers for Code, Subcode, and Combo-level labels. Topic representations are incorporated during fine-tuning and inference to enrich semantic inputs. PVminer achieves strong performance across hierarchical tasks and outperforms biomedical and clinical pre-trained baselines, achieving F1 scores of 82.25% (Code), 80.14% (Subcode), and up to 77.87% (Combo). An ablation study further shows that author identity and topic-based augmentation each contribute meaningful gains. Pre-trained models, source code, and documentation will be publicly released, with annotated datasets available upon request for research use.", "link": "http://arxiv.org/abs/2602.21165v1", "date": "2026-02-24", "relevancy": 2.3556, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4721}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4721}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4691}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PVminer%3A%20A%20Domain-Specific%20Tool%20to%20Detect%20the%20Patient%20Voice%20in%20Patient%20Generated%20Data&body=Title%3A%20PVminer%3A%20A%20Domain-Specific%20Tool%20to%20Detect%20the%20Patient%20Voice%20in%20Patient%20Generated%20Data%0AAuthor%3A%20Samah%20Fodeh%20and%20Linhai%20Ma%20and%20Yan%20Wang%20and%20Srivani%20Talakokkul%20and%20Ganesh%20Puthiaraju%20and%20Afshan%20Khan%20and%20Ashley%20Hagaman%20and%20Sarah%20Lowe%20and%20Aimee%20Roundtree%0AAbstract%3A%20Patient-generated%20text%20such%20as%20secure%20messages%2C%20surveys%2C%20and%20interviews%20contains%20rich%20expressions%20of%20the%20patient%20voice%20%28PV%29%2C%20reflecting%20communicative%20behaviors%20and%20social%20determinants%20of%20health%20%28SDoH%29.%20Traditional%20qualitative%20coding%20frameworks%20are%20labor%20intensive%20and%20do%20not%20scale%20to%20large%20volumes%20of%20patient-authored%20messages%20across%20health%20systems.%20Existing%20machine%20learning%20%28ML%29%20and%20natural%20language%20processing%20%28NLP%29%20approaches%20provide%20partial%20solutions%20but%20often%20treat%20patient-centered%20communication%20%28PCC%29%20and%20SDoH%20as%20separate%20tasks%20or%20rely%20on%20models%20not%20well%20suited%20to%20patient-facing%20language.%20We%20introduce%20PVminer%2C%20a%20domain-adapted%20NLP%20framework%20for%20structuring%20patient%20voice%20in%20secure%20patient-provider%20communication.%20PVminer%20formulates%20PV%20detection%20as%20a%20multi-label%2C%20multi-class%20prediction%20task%20integrating%20patient-specific%20BERT%20encoders%20%28PV-BERT-base%20and%20PV-BERT-large%29%2C%20unsupervised%20topic%20modeling%20for%20thematic%20augmentation%20%28PV-Topic-BERT%29%2C%20and%20fine-tuned%20classifiers%20for%20Code%2C%20Subcode%2C%20and%20Combo-level%20labels.%20Topic%20representations%20are%20incorporated%20during%20fine-tuning%20and%20inference%20to%20enrich%20semantic%20inputs.%20PVminer%20achieves%20strong%20performance%20across%20hierarchical%20tasks%20and%20outperforms%20biomedical%20and%20clinical%20pre-trained%20baselines%2C%20achieving%20F1%20scores%20of%2082.25%25%20%28Code%29%2C%2080.14%25%20%28Subcode%29%2C%20and%20up%20to%2077.87%25%20%28Combo%29.%20An%20ablation%20study%20further%20shows%20that%20author%20identity%20and%20topic-based%20augmentation%20each%20contribute%20meaningful%20gains.%20Pre-trained%20models%2C%20source%20code%2C%20and%20documentation%20will%20be%20publicly%20released%2C%20with%20annotated%20datasets%20available%20upon%20request%20for%20research%20use.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21165v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPVminer%253A%2520A%2520Domain-Specific%2520Tool%2520to%2520Detect%2520the%2520Patient%2520Voice%2520in%2520Patient%2520Generated%2520Data%26entry.906535625%3DSamah%2520Fodeh%2520and%2520Linhai%2520Ma%2520and%2520Yan%2520Wang%2520and%2520Srivani%2520Talakokkul%2520and%2520Ganesh%2520Puthiaraju%2520and%2520Afshan%2520Khan%2520and%2520Ashley%2520Hagaman%2520and%2520Sarah%2520Lowe%2520and%2520Aimee%2520Roundtree%26entry.1292438233%3DPatient-generated%2520text%2520such%2520as%2520secure%2520messages%252C%2520surveys%252C%2520and%2520interviews%2520contains%2520rich%2520expressions%2520of%2520the%2520patient%2520voice%2520%2528PV%2529%252C%2520reflecting%2520communicative%2520behaviors%2520and%2520social%2520determinants%2520of%2520health%2520%2528SDoH%2529.%2520Traditional%2520qualita {"title": "Earth Embeddings as Products: Taxonomy, Ecosystem, and Standardized Access", "author": "Heng Fang and Adam J. Stewart and Isaac Corley and Xiao Xiang Zhu and Hossein Azizpour", "abstract": "Geospatial Foundation Models (GFMs) provide powerful representations, but high compute costs hinder their widespread use. Pre-computed embedding data products offer a practical \"frozen\" alternative, yet they currently exist in a fragmented ecosystem of incompatible formats and resolutions. This lack of standardization creates an engineering bottleneck that prevents meaningful model comparison and reproducibility. We formalize this landscape through a three-layer taxonomy: Data, Tools, and Value. We survey existing products to identify interoperability barriers. To bridge this gap, we extend TorchGeo with a unified API that standardizes the loading and querying of diverse embedding products. By treating embeddings as first-class geospatial datasets, we decouple downstream analysis from model-specific engineering, providing a roadmap for more transparent and accessible Earth observation workflows.", "link": "http://arxiv.org/abs/2601.13134v2", "date": "2026-02-24", "relevancy": 2.3392, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4727}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4727}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4582}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Earth%20Embeddings%20as%20Products%3A%20Taxonomy%2C%20Ecosystem%2C%20and%20Standardized%20Access&body=Title%3A%20Earth%20Embeddings%20as%20Products%3A%20Taxonomy%2C%20Ecosystem%2C%20and%20Standardized%20Access%0AAuthor%3A%20He mbedding%2520data%2520products%2520offer%2520a%2520practical%2520%2522frozen%2522%2520alternative%252C%2520yet%2520they%2520currently%2520exist%2520in%2520a%2520fragmented%2520ecosystem%2520of%2520incompatible%2520formats%2520and%2520resolutions.%2520This%2520lack%2520of%2520standardization%2520creates%2520an%2520engineering%2520bottleneck%2520that%2520prevents%2520meaningful%2520model%2520comparison%2520and%2520reproducibility.%2520We%2520formalize%2520this%2520landscape%2520through%2520a%2520three-layer%2520taxonomy%253A%2520Data%252C%2520Tools%252C%2520and%2520Value.%2520We%2520survey%2520existing%2520products%2520to%2520identify%2520interoperability%2520barriers.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520extend%2520TorchGeo%2520with%2520a%2520unified%2520API%2520that%2520standardizes%2520the%2520loading%2520and%2520querying%2520of%2520diverse%2520embedding%2520products.%2520By%2520treating%2520embeddings%2520as%2520first-class%2520geospatial%2520datasets%252C%2520we%2520decouple%2520downstream%2520analysis%2520from%2520model-specific%2520engineering%252C%2520providing%2520a%2520roadmap%2520for%2520more%2520transparent%2520and%2520accessible%2520Earth%2520observation%2520workflows.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.13134v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Earth%20Embeddings%20as%20Products%3A%20Taxonomy%2C%20Ecosystem%2C%20and%20Standardized%20Access&entry.906535625=Heng%20Fang%20and%20Adam%20J.%20Stewart%20and%20Isaac%20Corley%20and%20Xiao%20Xiang%20Zhu%20and%20Hossein%20Azizpour&entry.1292438233=Geospatial%20Foundation%20Models%20%28GFMs%29%20provide%20powerful%20representations%2C%20but%20high%20compute%20costs%20hinder%20their%20widespread%20use.%20Pre-computed%20embedding%20data%20products%20offer%20a%20practical%20%22frozen%22%20alternative%2C%20yet%20they%20currently%20exist%20in%20a%20fragmented%20ecosystem%20of {"title": "Decouple, Reorganize, and Fuse: A Multimodal Framework for Cancer Survival Prediction", "author": "Huayi Wang and Haochao Ying and Yuyang Xu and Qibo Qiu and Cheng Zhang and Danny Z. Chen and Ying Sun and Jian Wu", "abstract": "Cancer survival analysis commonly integrates information across diverse medical modalities to make survival-time predictions. Existing methods primarily focus on extracting different decoupled features of modalities and performing fusion operations such as concatenation, attention, and \\revm{Mixture-of-Experts (MoE)-based fusion. However, these methods still face two key challenges: i) Fixed fusion schemes (concatenation and attention) can lead to model over-reliance on predefined feature combinations, limiting the dynamic fusion of decoupled features; ii) in MoE-based fusion methods, each expert network handles separate decoupled features, which limits information interaction among the decoupled features. To address these challenges, we propose a novel Decoupling-Reorganization-Fusion framework (DeReF), which devises a random feature reorganization strategy between modalities decoupling and dynamic MoE fusion modules.Its advantages are: i) it increases the diversity of feature combinations and granularity, enhancing the generalization ability of the subsequent expert networks; ii) it overcomes the problem of information closure and helps expert networks better capture information among decoupled features. Additionally, we incorporate a regional cross-attention network within the modality decoupling module to improve the representation quality of decoupled features. Extensive experimental results on our in-house Liver Cancer (LC) and three widely used TCGA public datasets confirm the effectiveness of our proposed method. Codes are available at https://github.com/ZJUMAI/DeReF.", "link": "http://arxiv.org/abs/2508.18632v2", "date": "2026-02-24", "relevancy": 2.3372, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4786}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.463}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4607}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decouple%2C%20Reorganize%2C%20and%20Fuse%3A%20A%20Multimodal%20Framework%20for%20Cancer%20Survival%20Prediction&body=Title%3A%20Decouple%2C%20Reorganize%2C%20and%20Fuse%3A%20A%20Multimodal%20Framework%20for%20Cancer%20Survival%20Prediction%0AAuthor%3A%20Huayi%20Wang%20and%20Haochao%20Ying%20and%20Yuyang%20Xu%20and%20Qibo%20Qiu%20and%20Cheng%20Zhang%20and%20Danny%20Z.%20Chen%20and%20Ying%20Sun%20and%20Jian%20Wu%0AAbstract%3A%20Cancer%20survival%20analysis%20commonly%20integrates%20information%20across%20diverse%20medical%20modalities%20to%20make%20survival-time%20predictions.%20Existing%20methods%20primarily%20focus%20on%20extracting%20different%20decoupled%20features%20of%20modalities%20and%20performing%20fusion%20operations%20such%20as%20concatenation%2C%20attention%2C%20and%20%5Crevm%7BMixture-of-Experts%20%28MoE%29-based%20fusion.%20However%2C%20these%20methods%20still%20face%20two%20key%20challenges%3A%20i%29%20Fixed%20fusion%20schemes%20%28concatenation%20and%20attention%29%20can%20lead%20to%20model%20over-reliance%20on%20predefined%20feature%20combinations%2C%20limiting%20the%20dynamic%20fusion%20of%20decoupled%20features%3B%20ii%29%20in%20MoE-based%20fusion%20methods%2C%20each%20expert%20network%20handles%20separate%20decoupled%20features%2C%20which%20limits%20information%20interaction%20among%20the%20decoupled%20features.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20Decoupling-Reorganization-Fusion%20framework%20%28DeReF%29%2C%20which%20devises%20a%20random%20feature%20reorganization%20strategy%20between%20modalities%20decoupling%20and%20dynamic%20MoE%20fusion%20modules.Its%20advantages%20are%3A%20i%29%20it%20increases%20the%20diversity%20of%20feature%20combinations%20and%20granularity%2C%20enhancing%20the%20generalization%20ability%20of%20the%20subsequent%20expert%20networks%3B%20ii%29%20it%20overcomes%20the%20problem%20of%20information%20closure%20and%20helps%20expert%20networks%20better%20capture%20information%20among%20decoupled%20features.%20Additionally%2C%20we%20incorporate%20a%20regional%20cross-attention%20network%20within%20the%20modality%20decoupling%20module%20to%20improve%20the%20representation%20quality%20of%20decoupled%20features.%20Extensive%20experimental%20results%20on%20our%20in-house%20Liver%20Cancer%20%28LC%29%20and%20three%20widely%20used%20TCGA%20public%20datasets%20confirm%20the%20effectiveness%20of%20our%20proposed%20method.%20Codes%20are%20available%20at%20https%3A//github.com/ZJUMAI/DeReF.%0ALink%3A%20http%3A//arxiv.org/abs/2508.18632v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecouple%252C%2520Reorganize%252C%2520and%2520Fuse%253A%2520A%2520Multimodal%2520Framework%2520for%2520Cancer%2520Survival%2520Prediction%26entry.906535625%3DHuayi%2520Wang%2520and%2520Haochao%2520Ying%2520and%2520Yuyang%2520Xu%2520and%2520Qibo%2520Qiu%2520and%2520Cheng%2520Zhang%2520and%2520Danny%2520Z.%2520Chen%2520and%2520Ying%2520Sun%2520and%2520Jian%2520Wu%26entry.1292438233%3DCancer%2520survival%2520analysis%2520commonly%2520integrates%2520information%2520across%2520diverse%2520medical%2520modalities%2520to%2520make%2520survival-time%2520predictions.%2520Existing%2520methods%2520primarily%2520focus%2520on%2520extracting%2520different%2520decoupled%2520features%2520of%2520modalities%2520and%2520performing%2520fusion%2520operations%2520such%2520as%2520concatenation%252C%2520attention%252C%2520and%2520%255Crevm%257BMixture-of-Experts%2520%2528MoE%2529-based%2520fusion.%2520However%252C%2520these%2520methods%2520still%2520face%2520two%2520key%2520challenges%253A%2520i%2529%2520Fixed%2520fusion%2520schemes%2520%2528concatenation%2520and%2520attention%2529%2520can%2520lead%2520to%2520model%2520over-reliance%2520on%2520predefined%2520feature%2520combinations%252C%2520limiting%2520the%2520dynamic%2520fusion%2520of%2520decoupled%2520features%253B%2520ii%2529%2520in%2520MoE-based%2520fusion%2520methods%252C%2520each%2520expert%2520network%2520handles%2520separate%2520decoupled%2520features%252C%2520which%2520limits%2520information%2520interaction%2520among%2520the%2520decoupled%2520features.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520novel%2520Decoupling-Reorganization-Fusion%2520framework%2520%2528DeReF%2529%252C%2520which%2520devises%2520a%2520random%2520feature%2520reorganization%2520strategy%2520between%2520modalities%2520decoupling%2520and%2520dynamic%2520MoE%2520fusion%2520modules.Its%2520advantages%2520are%253A%2520i%2529%2520it%2520increases%2520the%2520diversity%2520of%2520feature%2520combinations%2520and%2520granularity%252C%2520enhancing%2520the%2520generalization%2520ability%2520of%2520the%2520subsequent%2520expert%2520networks%253B%2520ii%2529%2520it%2520overcomes%2520the%2520problem%2520of%2520information%2520closure%2520and%2520helps%2520expert%2520networks%2520better%2520capture%2520information%2520among%2520decoupled%2520features.%2520Additionally%252C%2520we%2520incorporate%2520a%2520regional%2520cross-attention%2520network%2520within%2520the%2520modality%2520decoupling%2520module%2520to%2520improve%2520the%2520representation%2520quality%2520of%2520decoupled%2520features.%2520Extensive%2520experimental%2520results%2520on%2520our%2520in-house%2520Liver%2520Cancer%2520%2528LC%2529%2520and%2520three%2520widely%2520used%2520TCGA%2520public%2520datasets%2520confirm%2520the%2520effectiveness%2520of%2520our%2520proposed%2520method.%2520Codes%2520are%2520available%2520at%2520https%253A//github.com/ZJUMAI/DeReF.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.18632v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Decouple%2C%20Reorganize%2C%20and%20Fuse%3A%20A%20Multimodal%20Framework%20for%20Cancer%20Survival%20Prediction&entry.906535625=Huayi%20Wang%20and%20Haochao%20Ying%20and%20Yuyang%20Xu%20and%20Qibo%20Qiu%20and%20Cheng%20Zhang%20and%20Danny%20Z.%20Chen%20and%20Ying%20Sun%20and%20Jian%20Wu&entry.1292438233=Cancer%20survival%20analysis%20commonly%20integrates%20information%20across%20diverse%20medical%20modalities%20to%20make%20survival-time%20predictions.%20Existing%20methods%20primarily%20focus%20on%20extracting%20different%20decoupled%20features%20of%20modalities%20and%20performing%20fusion%20operations%20such%20as%20concatenation%2C%20attention%2C%20and%20%5Crevm%7BMixture-of-Experts%20%28MoE%29-based%20fusion.%20However%2C%20these%20methods%20still%20face%20two%20key%20challenges%3A%20i%29%20Fixed%20fusion%20schemes%20%28concatenation%20and%20attention%29%20can%20lead%20to%20model%20over-reliance%20on%20predefined%20feature%20combinations%2C%20limiting%20the%20dynamic%20fusion%20of%20decoupled%20features%3B%20ii%29%20in%20MoE-based%20fusion%20methods%2C%20each%20expert%20network%20handles%20separate%20decoupled%20features%2C%20which%20limits%20information%20interaction%20among%20the%20decoupled%20features.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20Decoupling-Reorganization-Fusion%20framework%20%28DeReF%29%2C%20which%20devises%20a%20random%20feature%20reorganization%20strategy%20between%20modalities%20decoupling%20and%20dynamic%20MoE%20fusion%20modules.Its%20advantages%20are%3A%20i%29%20it%20increases%20the%20diversity%20of%20feature%20combinations%20and%20granularity%2C%20enhancing%20the%20generalization%20ability%20of%20the%20subsequent%20expert%20networks%3B%20ii%29%20it%20over {"title": "Rethinking Disentanglement under Dependent Factors of Variation", "author": "Antonio Almud\u00e9var and Alfonso Ortega", "abstract": "Representation learning is an approach that allows to discover and extract the factors of variation from the data. Intuitively, a representation is said to be disentangled if it separates the different factors of variation in a way that is understandable to humans. Definitions of disentanglement and metrics to measure it usually assume that the factors of variation are independent of each other. However, this is generally false in the real world, which limits the use of these definitions and metrics to very specific and unrealistic scenarios. In this paper we give a definition of disentanglement based on information theory that is also valid when the factors of variation are not independent. Furthermore, we relate this definition to the Information Bottleneck Method. Finally, we propose a method to measure the degree of disentanglement from the given definition that works when the factors of variation are not independent. We show through different experiments that the method proposed in this paper correctly measures disentanglement with non-independent factors of variation, while other methods fail in this scenario.", "link": "http://arxiv.org/abs/2408.07016v3", "date": "2026-02-24", "relevancy": 2.3302, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.476}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4611}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4611}], "mailto": "mailto {"title": "SEED: Towards More Accurate Semantic Evaluation for Visual Brain Decoding", "author": "Juhyeon Park and Peter Yongho Kim and Jiook Cha and Shinjae Yoo and Taesup Moon", "abstract": "We present SEED (Semantic Evaluation for Visual Brain Decoding), a novel metric for evaluating the semantic decoding performance of visual brain decoding models. It integrates three complementary metrics, each capturing a different aspect of semantic similarity between images inspired by neuroscientific findings. Using carefully crowd-sourced human evaluation data, we demonstrate that SEED achieves the highest alignment with human evaluation, outperforming other widely used metrics. Through the evaluation of existing visual brain decoding models with SEED, we further reveal that crucial information is often lost in translation, even in the state-of-the-art models that achieve near-perfect scores on existing metrics. This finding highlights the limitations of current evaluation practices and provides guidance for future improvements in decoding models. Finally, to facilitate further research, we open-source the human evaluation data, encouraging the development of more advanced evaluation methods for brain decoding. Our code and the human evaluation data are available at https://github.com/Concarne2/SEED.", "link": "http://arxiv.org/abs/2503.06437v2", "date": "2026-02-24", "relevancy": 2.3237, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5927}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5927}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5221}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SEED%3A%20Towards%20More%20Accurate%20Semantic%20Evaluation%20for%20Visual%20Brain%20Decoding&body=Title%3A%20SEED%3A%20Towards%20More%20Accurate%20Semantic%20Evaluation%20for%20Visual%20Brain%20Decoding%0AAuthor%3A%20Juhyeon%20Park%20and%20Peter%20Yongho%20Kim%20and%20Jiook%20Cha%20and%20Shinjae%20Yoo%20and%20Taesup%20Moon%0AAbstract%3A%20We%20present%20SEED%20%28Semantic%20Evaluation%20for%20Visual%20Brain%20Decoding%29%2C%20a%20novel%20metric%20for%20evaluating%20the%20semantic%20decoding%20performance%20of%20visual%20brain%20decoding%20models.%20It%20integrates%20three%20complementary%20metrics%2C%20each%20capturing%20a%20different%20aspect%20of%20semantic%20similarity%20between%20images%20inspired%20by%20neuroscientific%20findings.%20Using%20carefully%20crowd-sourced%20human%20evaluation%20data%2C%20we%20demonstrate%20that%20SEED%20achieves%20the%20highest%20alignment%20with%20human%20evaluation%2C%20outperforming%20other%20widely%20used%20metrics.%20Through%20the%20evaluation%20of%20existing%20visual%20brain%20decoding%20models%20with%20SEED%2C%20we%20further%20reveal%20that%20crucial%20information%20is%20often%20lost%20in%20translation%2C%20even%20in%20the%20state-of-the-art%20models%20that%20achieve%20near-perfect%20scores%20on%20existing%20metrics.%20This%20finding%20highlights%20the%20limitations%20of%20current%20evaluation%20practices%20and%20provides%20guidance%20for%20future%20improvements%20in%20decoding%20models.%20Finally%2C%20to%20facilitate%20further%20research%2C%20we%20open-source%20the%20human%20evaluation%20data%2C%20encouraging%20the%20development%20of%20more%20advanced%20evaluation%20methods%20for%20brain%20decoding.%20Our%20code%20and%20the%20human%20evaluation%20data%20are%20available%20at%20https%3A//github.com/Concarne2/SEED.%0ALink%3A%20http%3A//arxiv.org/abs/2503.06437v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSEED%253A%2520Towards%2520More%2520 {"title": "DRESS: A Continuous Framework for Structural Graph Refinement", "author": "Eduar Castrillo Velilla", "abstract": "The Weisfeiler-Lehman (WL) hierarchy is a cornerstone framework for graph isomorphism testing and structural analysis. However, scaling beyond 1-WL to 3-WL and higher requires tensor-based operations that scale as O(n^3) or O(n^4), making them computationally prohibitive for large graphs. In this paper, we start from the Original-DRESS equation (Castrillo, Leon, and Gomez, 2018)--a parameter-free, continuous dynamical system on edges--and show that it distinguishes the prism graph from K_{3,3}, a pair that 1-WL provably cannot separate. We then generalize it to Motif-DRESS, which replaces triangle neighborhoods with arbitrary structural motifs and converges to a unique fixed point under three sufficient conditions, and further to Generalized-DRESS, an abstract template parameterized by the choice of neighborhood operator, aggregation function and norm. Finally, we introduce Delta-DRESS, which runs DRESS on each node-deleted subgraph G\\{v}, connecting the framework to the Kelly-Ulam reconstruction conjecture. Both Motif-DRESS and Delta-DRESS empirically distinguish Strongly Regular Graphs (SRGs)--such as the Rook and Shrikhande graphs--that confound 3-WL. Our results establish the DRESS family as a highly scalable framework that empirically surpasses both 1-WL and 3-WL on well-known benchmark graphs, without the prohibitive O(n^4) computational cost.", "link": "http://arxiv.org/abs/2602.20833v1", "date": "2026-02-24", "relevancy": 2.3204, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4689}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4634}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4599}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DRESS%3A%20A%20Continuous%20Framework%20for%20Structural%20Graph%20Refinement&body=Title%3A%20DRESS%3A%20A%20Continuous%20Framework%20for%20Structural%20Graph%20Refinement%0AAuthor%3A%20Eduar%20Castrillo%20Velilla%0AAbstract%3A%20The%20Weisfeiler-Lehman%20%28WL%29%20hierarchy%20is%20a%20cornerstone%20framework%20for%20graph%20isomorphism%20testing%20and%20structural%20analysis.%20However%2C%20scaling%20beyond%201-WL%20to%203-WL%20and%20higher%20requires%20tensor-based%20operations%20that%20scale%20as%20O%28n%5E3%29%20or%20O%28n%5E4%29%2C%20making%20them%20computationally%20prohibitive%20for%20large%20graphs.%20In%20this%20paper%2C%20we%20start%20from%20the%20Original-DRESS%20equation%20%28Castrillo%2C%20Leon%2C%20and%20Gomez%2C%202018%29--a%20parameter-free%2C%20continuous%20dynamical%20system%20on%20edges--and%20show%20that%20it%20distinguishes%20the%20prism%20graph%20from%20K_%7B3%2C3%7D%2C%20a%20pair%20that%201-WL%20provably%20cannot%20separate.%20We%20then%20generalize%20it%20to%20Motif-DRESS%2C%20which%20replaces%20triangle%20neighborhoods%20with%20arbitrary%20structural%20motifs%20and%20converges%20to%20a%20unique%20fixed%20point%20under%20three%20sufficient%20conditions%2C%20and%20further%20to%20Generalized-DRESS%2C%20an%20abstract%20template%20parameterized%20by%20the%20choice%20of%20neighborhood%20operator%2C%20aggregation%20function%20and%20norm.%20Finally%2C%20we%20introduce%20Delta-DRESS%2C%20which%20runs%20DRESS%20on%20each%20node-deleted%20subgraph%20G%5C%7Bv%7D%2C%20connecting%20the%20framework%20to%20the%20Kelly-Ulam%20reconstruction%20conjecture.%20Both%20Motif-DRESS%20and%20Delta-DRESS%20empirically%20distinguish%20Strongly%20Regular%20Graphs%20%28SRGs%29--such%20as%20the%20Rook%20and%20Shrikhande%20graphs--that%20confound%203-WL.%20Our%20results%20establish%20the%20DRESS%20family%20as%20a%2

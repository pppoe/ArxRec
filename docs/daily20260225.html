{"title": "VAUQ: Vision-Aware Uncertainty Quantification for LVLM Self-Evaluation", "author": "Seongheon Park and Changdae Oh and Hyeong Kyu Choi and Xuefeng Du and Sharon Li", "abstract": "Large Vision-Language Models (LVLMs) frequently hallucinate, limiting their safe deployment in real-world applications. Existing LLM self-evaluation methods rely on a model's ability to estimate the correctness of its own outputs, which can improve deployment reliability; however, they depend heavily on language priors and are therefore ill-suited for evaluating vision-conditioned predictions. We propose VAUQ, a vision-aware uncertainty quantification framework for LVLM self-evaluation that explicitly measures how strongly a model's output depends on visual evidence. VAUQ introduces the Image-Information Score (IS), which captures the reduction in predictive uncertainty attributable to visual input, and an unsupervised core-region masking strategy that amplifies the influence of salient regions. Combining predictive entropy with this core-masked IS yields a training-free scoring function that reliably reflects answer correctness. Comprehensive experiments show that VAUQ consistently outperforms existing self-evaluation methods across multiple datasets.", "link": "http://arxiv.org/abs/2602.21054v1", "date": "2026-02-24", "relevancy": 2.2613, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5778}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5573}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VAUQ%3A%20Vision-Aware%20Uncertainty%20Quantification%20for%20LVLM%20Self-Evaluation&body=Title%3A%20VAUQ%3A%20Vision-Aware%20Uncertainty%20Quantification%20for%20LVLM%20Self-Evaluation%0AAuthor%3A%20Seongheon%20Park%20and%20Changdae%20Oh%20and%20Hyeong%20Kyu%20Choi%20and%20Xuefeng%20Du%20and%20Sharon%20Li%0AAbstract%3A%20Large%20Vision-Language%20Models%20%28LVLMs%29%20frequently%20hallucinate%2C%20limiting%20their%20safe%20deployment%20in%20real-world%20applications.%20Existing%20LLM%20self-evaluation%20methods%20rely%20on%20a%20model%27s%20ability%20to%20estimate%20the%20correctness%20of%20its%20own%20outputs%2C%20which%20can%20improve%20deployment%20reliability%3B%20however%2C%20they%20depend%20heavily%20on%20language%20priors%20and%20are%20therefore%20ill-suited%20for%20evaluating%20vision-conditioned%20predictions.%20We%20propose%20VAUQ%2C%20a%20vision-aware%20uncertainty%20quantification%20framework%20for%20LVLM%20self-evaluation%20that%20explicitly%20measures%20how%20strongly%20a%20model%27s%20output%20depends%20on%20visual%20evidence.%20VAUQ%20introduces%20the%20Image-Information%20Score%20%28IS%29%2C%20which%20captures%20the%20reduction%20in%20predictive%20uncertainty%20attributable%20to%20visual%20input%2C%20and%20an%20unsupervised%20core-region%20masking%20strategy%20that%20amplifies%20the%20influence%20of%20salient%20regions.%20Combining%20predictive%20entropy%20with%20this%20core-masked%20IS%20yields%20a%20training-free%20scoring%20function%20that%20reliably%20reflects%20answer%20correctness.%20Comprehensive%20experiments%20show%20that%20VAUQ%20consistently%20outperforms%20existing%20self-evaluation%20methods%20across%20multiple%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21054v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVAUQ%253A%2520Vision-Aware%2520Uncertainty%2520Quantification%2520for%2520LVLM%2520Self-Evaluation%26entry.906535625%3DSeongheon%2520Park%2520and%2520Changdae%2520Oh%2520and%2520Hyeong%2520Kyu%2520Choi%2520and%2520Xuefeng%2520Du%2520and%2520Sharon%2520Li%26entry.1292438233%3DLarge%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520frequently%2520hallucinate%252C%2520limiting%2520their%2520safe%2520deployment%2520in%2520real-world%2520applications.%2520Existing%2520LLM%2520self-evaluation%2520methods%2520rely%2520on%2520a%2520model%2527s%2520ability%2520to%2520estimate%2520the%2520correctness%2520of%2520its%2520own%2520outputs%252C%2520which%2520can%2520improve%2520deployment%2520reliability%253B%2520however%252C%2520they%2520depend%2520heavily%2520on%2520language%2520priors%2520and%2520are%2520therefore%2520ill-suited%2520for%2520evaluating%2520vision-conditioned%2520predictions.%2520We%2520propose%2520VAUQ%252C%2520a%2520vision-aware%2520uncertainty%2520quantification%2520framework%2520for%2520LVLM%2520self-evaluation%2520that%2520explicitly%2520measures%2520how%2520strongly%2520a%2520model%2527s%2520output%2520depends%2520on%2520visual%2520evidence.%2520VAUQ%2520introduces%2520the%2520Image-Information%2520Score%2520%2528IS%2529%252C%2520which%2520captures%2520the%2520reduction%2520in%2520predictive%2520uncertainty%2520attributable%2520to%2520visual%2520input%252C%2520and%2520an%2520unsupervised%2520core-region%2520masking%2520strategy%2520that%2520amplifies%2520the%2520influence%2520of%2520salient%2520regions.%2520Combining%2520predictive%2520entropy%2520with%2520this%2520core-masked%2520IS%2520yields%2520a%2520training-free%2520scoring%2520function%2520that%2520reliably%2520reflects%2520answer%2520correctness.%2520Comprehensive%2520experiments%2520show%2520that%2520VAUQ%2520consistently%2520outperforms%2520existing%2520self-evaluation%2520methods%2520across%2520multiple%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21054v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VAUQ%3A%20Vision-Aware%20Uncertainty%20Quantification%20for%20LVLM%20Self-Evaluation&entry.906535625=Seongheon%20Park%20and%20Changdae%20Oh%20and%20Hyeong%20Kyu%20Choi%20and%20Xuefeng%20Du%20and%20Sharon%20Li&entry.1292438233=Large%20Vision-Language%20Models%20%28LVLMs%29%20frequently%20hallucinate%2C%20limiting%20their%20safe%20deployment%20in%20real-world%20applications.%20Existing%20LLM%20self-evaluation%20methods%20rely%20on%20a%20model%27s%20ability%20to%20estimate%20the%20correctness%20of%20its%20own%20outputs%2C%20which%20can%20improve%20deployment%20reliability%3B%20however%2C%20they%20depend%20heavily%20on%20language%20priors%20and%20are%20therefore%20ill-suited%20for%20evaluating%20vision-conditioned%20predictions.%20We%20propose%20VAUQ%2C%20a%20vision-aware%20uncertainty%20quantification%20framework%20for%20LVLM%20self-evaluation%20that%20explicitly%20measures%20how%20strongly%20a%20model%27s%20output%20depends%20on%20visual%20evidence.%20VAUQ%20introduces%20the%20Image-Information%20Score%20%28IS%29%2C%20which%20captures%20the%20reduction%20in%20predictive%20uncertainty%20attributable%20to%20visual%20input%2C%20and%20an%20unsupervised%20core-region%20masking%20strategy%20that%20amplifies%20the%20influence%20of%20salient%20regions.%20Combining%20predictive%20entropy%20with%20this%20core-masked%20IS%20yields%20a%20training-free%20scoring%20function%20that%20reliably%20reflects%20answer%20correctness.%20Comprehensive%20experiments%20show%20that%20VAUQ%20consistently%20outperforms%20existing%20self-evaluation%20methods%20across%20multiple%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2602.21054v1&entry.124074799=Read"},
{"title": "Communication-Inspired Tokenization for Structured Image Representations", "author": "Aram Davtyan and Yusuf Sahin and Yasaman Haghighi and Sebastian Stapf and Pablo Acuaviva and Alexandre Alahi and Paolo Favaro", "abstract": "Discrete image tokenizers have emerged as a key component of modern vision and multimodal systems, providing a sequential interface for transformer-based architectures. However, most existing approaches remain primarily optimized for reconstruction and compression, often yielding tokens that capture local texture rather than object-level semantic structure. Inspired by the incremental and compositional nature of human communication, we introduce COMmunication inspired Tokenization (COMiT), a framework for learning structured discrete visual token sequences. COMiT constructs a latent message within a fixed token budget by iteratively observing localized image crops and recurrently updating its discrete representation. At each step, the model integrates new visual information while refining and reorganizing the existing token sequence. After several encoding iterations, the final message conditions a flow-matching decoder that reconstructs the full image. Both encoding and decoding are implemented within a single transformer model and trained end-to-end using a combination of flow-matching reconstruction and semantic representation alignment losses. Our experiments demonstrate that while semantic alignment provides grounding, attentive sequential tokenization is critical for inducing interpretable, object-centric token structure and substantially improving compositional generalization and relational reasoning over prior methods.", "link": "http://arxiv.org/abs/2602.20731v1", "date": "2026-02-24", "relevancy": 2.2581, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5882}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5521}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5364}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Communication-Inspired%20Tokenization%20for%20Structured%20Image%20Representations&body=Title%3A%20Communication-Inspired%20Tokenization%20for%20Structured%20Image%20Representations%0AAuthor%3A%20Aram%20Davtyan%20and%20Yusuf%20Sahin%20and%20Yasaman%20Haghighi%20and%20Sebastian%20Stapf%20and%20Pablo%20Acuaviva%20and%20Alexandre%20Alahi%20and%20Paolo%20Favaro%0AAbstract%3A%20Discrete%20image%20tokenizers%20have%20emerged%20as%20a%20key%20component%20of%20modern%20vision%20and%20multimodal%20systems%2C%20providing%20a%20sequential%20interface%20for%20transformer-based%20architectures.%20However%2C%20most%20existing%20approaches%20remain%20primarily%20optimized%20for%20reconstruction%20and%20compression%2C%20often%20yielding%20tokens%20that%20capture%20local%20texture%20rather%20than%20object-level%20semantic%20structure.%20Inspired%20by%20the%20incremental%20and%20compositional%20nature%20of%20human%20communication%2C%20we%20introduce%20COMmunication%20inspired%20Tokenization%20%28COMiT%29%2C%20a%20framework%20for%20learning%20structured%20discrete%20visual%20token%20sequences.%20COMiT%20constructs%20a%20latent%20message%20within%20a%20fixed%20token%20budget%20by%20iteratively%20observing%20localized%20image%20crops%20and%20recurrently%20updating%20its%20discrete%20representation.%20At%20each%20step%2C%20the%20model%20integrates%20new%20visual%20information%20while%20refining%20and%20reorganizing%20the%20existing%20token%20sequence.%20After%20several%20encoding%20iterations%2C%20the%20final%20message%20conditions%20a%20flow-matching%20decoder%20that%20reconstructs%20the%20full%20image.%20Both%20encoding%20and%20decoding%20are%20implemented%20within%20a%20single%20transformer%20model%20and%20trained%20end-to-end%20using%20a%20combination%20of%20flow-matching%20reconstruction%20and%20semantic%20representation%20alignment%20losses.%20Our%20experiments%20demonstrate%20that%20while%20semantic%20alignment%20provides%20grounding%2C%20attentive%20sequential%20tokenization%20is%20critical%20for%20inducing%20interpretable%2C%20object-centric%20token%20structure%20and%20substantially%20improving%20compositional%20generalization%20and%20relational%20reasoning%20over%20prior%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20731v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCommunication-Inspired%2520Tokenization%2520for%2520Structured%2520Image%2520Representations%26entry.906535625%3DAram%2520Davtyan%2520and%2520Yusuf%2520Sahin%2520and%2520Yasaman%2520Haghighi%2520and%2520Sebastian%2520Stapf%2520and%2520Pablo%2520Acuaviva%2520and%2520Alexandre%2520Alahi%2520and%2520Paolo%2520Favaro%26entry.1292438233%3DDiscrete%2520image%2520tokenizers%2520have%2520emerged%2520as%2520a%2520key%2520component%2520of%2520modern%2520vision%2520and%2520multimodal%2520systems%252C%2520providing%2520a%2520sequential%2520interface%2520for%2520transformer-based%2520architectures.%2520However%252C%2520most%2520existing%2520approaches%2520remain%2520primarily%2520optimized%2520for%2520reconstruction%2520and%2520compression%252C%2520often%2520yielding%2520tokens%2520that%2520capture%2520local%2520texture%2520rather%2520than%2520object-level%2520semantic%2520structure.%2520Inspired%2520by%2520the%2520incremental%2520and%2520compositional%2520nature%2520of%2520human%2520communication%252C%2520we%2520introduce%2520COMmunication%2520inspired%2520Tokenization%2520%2528COMiT%2529%252C%2520a%2520framework%2520for%2520learning%2520structured%2520discrete%2520visual%2520token%2520sequences.%2520COMiT%2520constructs%2520a%2520latent%2520message%2520within%2520a%2520fixed%2520tok {"title": "SynthRender and IRIS: Open-Source Framework and Dataset for Bidirectional Sim-Real Transfer in Industrial Object Perception", "author": "Jose Moises Araya-Martinez and Thushar Tom and Adri\u00e1n Sanchis Reig and Pablo Rey Valiente and Jens Lambrecht and J\u00f6rg Kr\u00fcger", "abstract": "Object perception is fundamental for tasks such as robotic material handling and quality inspection. However, modern supervised deep-learning perception models require large datasets for robust automation under semi-uncontrolled conditions. The cost of acquiring and annotating such data for proprietary parts is a major barrier for widespread deployment. In this context, we release SynthRender, an open source framework for synthetic image generation with Guided Domain Randomization capabilities. Furthermore, we benchmark recent Reality-to-Simulation techniques for 3D asset creation from 2D images of real parts. Combined with Domain Randomization, these synthetic assets provide low-overhead, transferable data even for parts lacking 3D files. We also introduce IRIS, the Industrial Real-Sim Imagery Set, containing 32 categories with diverse textures, intra-class variation, strong inter-class similarities and about 20,000 labels. Ablations on multiple benchmarks outline guidelines for efficient data generation with SynthRender. Our method surpasses existing approaches, achieving 99.1% mAP@50 on a public robotics dataset, 98.3% mAP@50 on an automotive benchmark, and 95.3% mAP@50 on IRIS.", "link": "http://arxiv.org/abs/2602.21141v1", "date": "2026-02-24", "relevancy": 2.2537, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5694}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5646}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", {"title": "The Diffusion Duality, Chapter II: $\u03a8$-Samplers and Efficient Curriculum", "author": "Justin Deschenaux and Caglar Gulcehre and Subham Sekhar Sahoo", "abstract": "Uniform-state discrete diffusion models excel at few-step generation and guidance due to their ability to self-correct, making them preferred over autoregressive or Masked diffusion models in these settings. However, their sampling quality plateaus with ancestral samplers as the number of steps increases. We introduce a family of Predictor-Corrector (PC) samplers for discrete diffusion that generalize prior methods and apply to arbitrary noise processes. When paired with uniform-state diffusion, our samplers outperform ancestral sampling on both language and image modeling, achieving lower generative perplexity at matched unigram entropy on OpenWebText and better FID/IS scores on CIFAR10. Crucially, unlike conventional samplers, our PC methods continue to improve with more sampling steps. Taken together, these findings call into question the assumption that Masked diffusion is the inevitable future of diffusion-based language modeling. Beyond sampling, we develop a memory-efficient curriculum for the Gaussian relaxation training phase, reducing training time by 25% and memory by 33% compared to Duo while maintaining comparable perplexity on OpenWebText and LM1B and strong downstream performance. We release code, checkpoints, and a video-tutorial on: https://s-sahoo.com/duo-ch2", "link": "http://arxiv.org/abs/2602.21185v1", "date": "2026-02-24", "relevancy": 2.2529, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6375}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5555}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", {"title": "Understanding the Role of Rehearsal Scale in Continual Learning under Varying Model Capacities", "author": "JinLi He and Liang Bai and Xian Yang", "abstract": "Rehearsal is one of the key techniques for mitigating catastrophic forgetting and has been widely adopted in continual learning algorithms due to its simplicity and practicality. However, the theoretical understanding of how rehearsal scale influences learning dynamics remains limited. To address this gap, we formulate rehearsal-based continual learning as a multidimensional effectiveness-driven iterative optimization problem, providing a unified characterization across diverse performance metrics. Within this framework, we derive a closed-form analysis of adaptability, memorability, and generalization from the perspective of rehearsal scale. Our results uncover several intriguing and counterintuitive findings. First, rehearsal can impair model's adaptability, in sharp contrast to its traditionally recognized benefits. Second, increasing the rehearsal scale does not necessarily improve memory retention. When tasks are similar and noise levels are low, the memory error exhibits a diminishing lower bound. Finally, we validate these insights through numerical simulations and extended analyses on deep neural networks across multiple real-world datasets, revealing statistical patterns of rehearsal mechanisms in continual learning.", "link": "http://arxiv.org/abs/2602.20791v1", "date": "2026-02-24", "relevancy": 2.2526, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4543}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4543}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4429}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20the%20Role%20of%20Rehearsal%20Scale%20in%20Continual%20Learning%20under%20Varying%20Model%20Capacities&body=Title%3A%20Understanding%20the%20Role%20of%20Rehearsal%20Scale%20in%20Continual%20Learning%20under%20Varying%20Model%20Capacities%0AAuthor%3A%20JinLi%20He%20and%20Liang%20Bai%20and%20Xian%20Yang%0AAbstract%3A%20Rehearsal%20is%20one%20of%20the%20key%20techniques%20for%20mitigating%20catastrophic%20forgetting%20and%20has%20been%20widely%20adopted%20in%20continual%20learning%20algorithms%20due%20to%20its%20simplicity%20and%20practicality.%20However%2C%20the%20theoretical%20understanding%20of%20how%20rehearsal%20scale%20influences%20learning%20dynamics%20remains%20limited.%20To%20address%20this%20gap%2C%20we%20formulate%20rehearsal-based%20continual%20learning%20as%20a%20multidimensional%20effectiveness-driven%20iterative%20optimization%20problem%2C%20providing%20a%20unified%20characterization%20across%20diverse%20performance%20metrics.%20Within%20this%20framework%2C%20we%20derive%20a%20closed-form%20analysis%20of%20adaptability%2C%20memorability%2C%20and%20generalization%20from%20the%20perspective%20of%20rehearsal%20scale.%20Our%20results%20uncover%20several%20intriguing%20and%20counterintuitive%20findings.%20First%2C%20rehearsal%20can%20impair%20model%27s%20adaptability%2C%20in%20sharp%20contrast%20to%20its%20traditionally%20recognized%20benefits.%20Second%2C%20increasing%20the%20rehearsal%20scale%20does%20not%20necessarily%20improve%20memory%20retention.%20When%20tasks%20are%20similar%20and%20noise%20levels%20are%20low%2C%20the%20memory%20error%20exhibits%20a%20diminishing%20lower%20bound.%20Finally%2C%20we%20validate%20these%20insights%20through%20numerical%20simulations%20and%20extended%20analyses%20on%20deep%20neural%20networks%20across%20multiple%20real-world%20datasets%2C%20revealing%20statistical%20patterns%20of%20rehearsal%20mechanisms%20in%20continual%20learning.%0ALink%3A%20http%3 %2520Finally%252C%2520we%2520validate%2520these%2520insights%2520through%2520numerical%2520simulations%2520and%2520extended%2520analyses%2520on%2520deep%2520neural%2520networks%2520across%2520multiple%2520real-world%2520datasets%252C%2520revealing%2520statistical%2520patterns%2520of%2520rehearsal%2520mechanisms%2520in%2520continual%2520learning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20791v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Understanding%20the%20Role%20of%20Rehearsal%20Scale%20in%20Continual%20Learning%20under%20Varying%20Model%20Capacities&entry.906535625=JinLi%20He%20and%20Liang%20Bai%20and%20Xian%20Yang&entry.1292438233=Rehearsal%20is%20one%20of%20the%20key%20techniques%20for%20mitigating%20catastrophic%20forgetting%20and%20has%20been%20widely%20adopted%20in%20continual%20learning%20algorithms%20due%20to%20its%20simplicity%20and%20practicality.%20However%2C%20the%20theoretical%20understanding%20of%20how%20rehearsal%20scale%20influences%20learning%20dynamics%20remains%20limited.%20To%20address%20this%20gap%2C%20we%20formulate%20rehearsal-based%20continual%20learning%20as%20a%20multidimensional%20effectiveness-driven%20iterative%20optimization%20problem%2C%20providing%20a%20unified%20characterization%20across%20diverse%20performance%20metrics.%20Within%20this%20framework%2C%20we%20derive%20a%20closed-form%20analysis%20of%20adaptability%2C%20memorability%2C%20and%20generalization%20from%20the%20perspective%20of%20rehearsal%20scale.%20Our%20results%20uncover%20several%20intriguing%20and%20counterintuitive%20findings.%20First%2C%20rehearsal%20can%20impair%20model%27s%20adaptability%2C%20in%20sharp%20contrast%20to%20its%20traditionally%20recognized%20benefits.%20Second%2C%20increasing%20the%20rehearsal%20scale%20does%20not%20necessarily%20improve%20memory%20retention.%20When%20tasks%20are%20similar%20and%20noise%20levels%20are%20low%2C%20t {"title": "Assessing the Impact of Speaker Identity in Speech Spoofing Detection", "author": "Anh-Tuan Dao and Driss Matrouf and Nicholas Evans", "abstract": "Spoofing detection systems are typically trained using diverse recordings from multiple speakers, often assuming that the resulting embeddings are independent of speaker identity. However, this assumption remains unverified. In this paper, we investigate the impact of speaker information on spoofing detection systems. We propose two approaches within our Speaker-Invariant Multi-Task framework, one that models speaker identity within the embeddings and another that removes it. SInMT integrates multi-task learning for joint speaker recognition and spoofing detection, incorporating a gradient reversal layer. Evaluated using four datasets, our speaker-invariant model reduces the average equal error rate by 17% compared to the baseline, with up to 48% reduction for the most challenging attacks (e.g., A11).", "link": "http://arxiv.org/abs/2602.20805v1", "date": "2026-02-24", "relevancy": 2.2449, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4676}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4399}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Assessing%20the%20Impact%20of%20Speaker%20Identity%20in%20Speech%20Spoofing%20Detection&body=Title%3A%20Assessing%20the%20Impact%20of%20Speaker%20Identity%20in%20Speech%20Spoofing%20Detection%0AAuthor%3A%20Anh-Tuan%20Dao%20and%20Driss%20Matrouf%20and%20Nicholas%20Evans%0AAbstract%3A%20Spoofing%20detection%20systems%20are%20typically%20trained%20using%20diverse%20recordings%20from%20multip {"title": "OrthoDiffusion: A Generalizable Multi-Task Diffusion Foundation Model for Musculoskeletal MRI Interpretation", "author": "Tian Lan and Lei Xu and Zimu Yuan and Shanggui Liu and Jiajun Liu and Jiaxin Liu and Weilai Xiang and Hongyu Yang and Dong Jiang and Jianxin Yin and Dingyu Wang", "abstract": "Musculoskeletal disorders represent a significant global health burden and are a leading cause of disability worldwide. While MRI is essential for accurate diagnosis, its interpretation remains exceptionally challenging. Radiologists must identify multiple potential abnormalities within complex anatomical structures across different imaging planes, a process that requires significant expertise and is prone to variability. We developed OrthoDiffusion, a unified diffusion-based foundation model designed for multi-task musculoskeletal MRI interpretation. The framework utilizes three orientation-specific 3D diffusion models, pre-trained in a self-supervised manner on 15,948 unlabeled knee MRI scans, to learn robust anatomical features from sagittal, coronal, and axial views. These view-specific representations are integrated to support diverse clinical tasks, including anatomical segmentation and multi-label diagnosis. Our evaluation demonstrates that OrthoDiffusion achieves excellent performance in the segmentation of 11 knee structures and the detection of 8 knee abnormalities. The model exhibited remarkable robustness across different clinical centers and MRI field strengths, consistently outperforming traditional supervised models. Notably, in settings where labeled data was scarce, OrthoDiffusion maintained high diagnostic precision using only 10\\% of training labels. Furthermore, the anatomical representations learned from knee imaging proved highly transferable to other joints, achieving strong diagnostic performance across 11 diseases of the ankle and shoulder. These findings suggest that diffusion-based foundation models can serve as a unified platform for multi-disease diagnosis and anatomical segmentation, potentially improving the efficiency and accuracy of musculoskeletal MRI interpretation in real-world clinical workflows.", "link": "http://arxiv.org/abs/2602.20752v1", "date": "2026-02-24", "relevancy": 2.2398, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5715}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5576}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OrthoDiffusion%3A%20A%20Generalizable%20Multi-Task%20Diffusion%20Foundation%20Model%20for%20Musculoskeletal%20MRI%20Interpretation&body=Title%3A%20OrthoDiffusion%3A%20A%20Generalizable%20Multi-Task%20Diffusion%20Foundation%20Model%20for%20Musculoskeletal%20MRI%20Interpretation%0AAuthor%3A%20Tian%20Lan%20and%20Lei%20Xu%20and%20Zimu%20Yuan%20and%20Shanggui%20Liu%20and%20Jiajun%20Liu%20and%20Jiaxin%20Liu%20and%20Weilai%20Xiang%20and%20Hongyu%20Yang%20and%20Dong%20Jiang%20and%20Jianxin%20Yin%20and%20Dingyu%20Wang%0AAbstract%3A%20Musculoskeletal%20disorders%20represent%20a%20significant%20global%20health%20burden%20and%20are%20a%20leading%20cause%20of%20disability%20worldwide.%20While%20MRI%20is%20essential%20for%20accurate%20diagnosis%2C%20its%20interpretation%20remains%20exceptionally%20challenging.%20Radiologists%20must%20identify%20multiple%20potential%20abnormalities%20within%20complex%20anatomical%20structures%20across%20different%20imaging%20planes%2C%20a%20process%20that%20requires%20significant%20expertise%20and%20is%20prone%20to%20variability.%20We%20developed%20OrthoDiffusion%2C%20a%20unified%20diffusion-based%20foundation%20model%20designed%20for%20multi-task%20musculoskeletal%20MRI%20interpretation.%20The%20framework%20utilizes%20three%20orientation-specific%203D%20diffusion%20models%2C%20pre-trained%20in%20a%20self-supervised%20manner%20on%2015%2C948%20unlabeled%20knee%20MRI%20scans%2C%20to%20learn%20robust%20anatomical%20features%20from%20sagittal%2C%20coronal%2C%20and%20axial%20views.%20These%20view-specific%20representations%20are%20integrated%20to%20support%20diverse%20clinical%20tasks%2C%20including%20anatomical%20segmentation%20and%20multi-label%20diagnosis.%20Our%20evaluation%20demonstrates%20that%20OrthoDiffusion%20achieves%20excellent%20performance%20in%20the%20segmentation%20of%2011%20knee%20structures%20and%20the%20detection%20of%208%20knee%20abnormalities.%20The%20model%20exhibited%20remarkable%20robustness%20across%20different%20clinical%20centers%20and%20MRI%20field%20strengths%2C%20consistently%20outperforming%20traditional%20supervised%20models.%20Notably%2C%20in%20settings%20where%20labeled%20data%20was%20scarce%2C%20OrthoDiffusion%20maintained%20high%20diagnostic%20precision%20using%20only%2010%5C%25%20of%20training%20labels.%20Furthermore%2C%20the%20anatomical%20representations%20learned%20from%20knee%20imaging%20proved%20highly%20transferable%20to%20other%20joints%2C%20achieving%20strong%20diagnostic%20performance%20across%2011%20diseases%20of%20the%20ankle%20and%20shoulder.%20These%20findings%20suggest%20that%20diffusion-based%20foundation%20models%20can%20serve%20as%20a%20unified%20platform%20for%20multi-disease%20diagnosis%20and%20anatomical%20segmentation%2C%20potentially%20improving%20the%20efficiency%20and%20accuracy%20of%20musculoskeletal%20MRI%20interpretation%20in%20real-world%20clinical%20workflows.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20752v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOrthoDiffusion%253A%2520A%2520Generalizable%2520Multi-Task%2520Diffusion%2520Foundation%2520Model%2520for%2520Musculoskeletal%2520MRI%2520Interpre {"title": "PyVision-RL: Forging Open Agentic Vision Models via RL", "author": "Shitian Zhao and Shaoheng Lin and Ming Li and Haoquan Zhang and Wenshuo Peng and Kaipeng Zhang and Chen Wei", "abstract": "Reinforcement learning for agentic multimodal models often suffers from interaction collapse, where models learn to reduce tool usage and multi-turn reasoning, limiting the benefits of agentic behavior. We introduce PyVision-RL, a reinforcement learning framework for open-weight multimodal models that stabilizes training and sustains interaction. Our approach combines an oversampling-filtering-ranking rollout strategy with an accumulative tool reward to prevent collapse and encourage multi-turn tool use. Using a unified training pipeline, we develop PyVision-Image and PyVision-Video for image and video understanding. For video reasoning, PyVision-Video employs on-demand context construction, selectively sampling task-relevant frames during reasoning to significantly reduce visual token usage. Experiments show strong performance and improved efficiency, demonstrating that sustained interaction and on-demand visual processing are critical for scalable multimodal agents.", "link": "http://arxiv.org/abs/2602.20739v1", "date": "2026-02-24", "relevancy": 2.2318, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5601}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5575}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5575}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PyVision-RL%3A%20Forging%20Open%20Agentic%20Vision%20Models%20via%20RL&body=Title%3A%20PyVision-RL%3A%20Forging%20Open%20Agentic%20V {"title": "Statistical Query Lower Bounds for Smoothed Agnostic Learning", "author": "Ilias Diakonikolas and Daniel M. Kane", "abstract": "We study the complexity of smoothed agnostic learning, recently introduced by~\\cite{CKKMS24}, in which the learner competes with the best classifier in a target class under slight Gaussian perturbations of the inputs. Specifically, we focus on the prototypical task of agnostically learning halfspaces under subgaussian distributions in the smoothed model. The best known upper bound for this problem relies on $L_1$-polynomial regression and has complexity $d^{\\tilde{O}(1/\u03c3^2) \\log(1/\u03b5)}$, where $\u03c3$ is the smoothing parameter and $\u03b5$ is the excess error. Our main result is a Statistical Query (SQ) lower bound providing formal evidence that this upper bound is close to best possible. In more detail, we show that (even for Gaussian marginals) any SQ algorithm for smoothed agnostic learning of halfspaces requires complexity $d^{\u03a9(1/\u03c3^{2}+\\log(1/\u03b5))}$. This is the first non-trivial lower bound on the complexity of this task and nearly matches the known upper bound. Roughly speaking, we show that applying $L_1$-polynomial regression to a smoothed version of the function is essentially best possible. Our techniques involve finding a moment-matching hard distribution by way of linear programming duality. This dual program corresponds exactly to finding a low-degree approximating polynomial to the smoothed version of the target function (which turns out to be the same condition required for the $L_1$-polynomial regression to work). Our explicit SQ lower bound then comes from proving lower bounds on this approximation degree for the class of halfspaces.", "link": "http://arxiv.org/abs/2602.21191v1", "date": "2026-02-24", "relevancy": 2.2236, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4537}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4405}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.44}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Statistical%20Query%20Lower%20Bounds%20for%20Smoothed%20Agnostic%20Learning&body=Title%3A%20Statistical%20Query%20Lower%20Bounds%20for%20Smoothed%20Agnostic%20Learning%0AAuthor%3A%20Ilias%20Diakonikolas%20and%20Daniel%20M.%20Kane%0AAbstract%3A%20We%20study%20the%20complexity%20of%20smoothed%20agnostic%20learning%2C%20recently%20introduced%20by~%5Ccite%7BCKKMS24%7D%2C%20in%20which%20the%20learner%20competes%20with%20the%20best%20classifier%20in%20a%20target%20class%20under%20slight%20Gaussian%20perturbations%20of%20the%20inputs.%20Specifically%2C%20we%20focus%20on%20the%20prototypical%20task%20of%20agnostically%20learning%20halfspaces%20under%20subgaussian%20distributions%20in%20the%20smoothed%20model.%20The%20best%20known%20upper%20bound%20for%20this%20problem%20relies%20on%20%24L_1%24-polynomial%20regression%20and%20has%20complexity%20%24d%5E%7B%5Ctilde%7BO%7D%281/%CF%83%5E2%29%20%5Clog%281/%CE%B5%29%7D%24%2C%20where%20%24%CF%83%24%20is%20the%20smoothing%20parameter%20and%20%24%CE%B5%24%20is%20the%20excess%20error.%20Our%20main%20result%20is%20a%20Statistical%20Query%20%28SQ%29%20lower%20bound%20providing%20formal%20evidence%20that%20this%20upper%20bound%20is%20close%20to%20best%20possible.%20In%20more%20detail%2C%20we%20show%20that%20%28even%20for%20Gaussian%20marginals%29%20any%20SQ%20algorithm%20for%20smoothed%20agnostic%20learning%20of%20halfspaces%20requires%20complexity%20%24d%5E%7B%CE%A9%281/%CF%83%5E%7B2%7D%2B%5Clog%281/%CE%B5%29%29%7D%24.%20This%20is%20the%20first%20non-trivial%20lower%20bound%20on%20the%20complexity%20of%20this%20task%20and%20nearly%20matches%20the%20known%20upper%20bound.%20Roughly%20speaking%2C%20we%20show%20that%20applying%20%24L_1%24-polynomial%20regression%20to%20a%20smoothed%20version%20of%20the%20function%20is%20essentially%20best%20possible.%20Our%20techniques%20involve%20finding%20a%20moment-matching%20hard%20distribution%20by%20way%20of%20linear%20programming%20duality.%20This%20dual%20program%20corresponds%20exactly%20to%20finding%20a%20low-degree%20approximating%20polynomial%20to%20the%20smoothed%20version%20of%20the%20target%20function%20%28which%20turns%20out%20to%20be%20the%20same%20condition%20required%20for%20the%20%24L_1%24-polynomial%20regression%20to%20work%29.%20Our%20explicit%20SQ%20lower%20bound%20then%20comes%20from%20proving%20lower%20bounds%20on%20this%20approximation%20degree%20for%20the%20class%20of%20halfspaces.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21191v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStatistical%2520Query%2520Lower%2520Bounds%2520for%2520Smoothed%2520Agnostic%2520Learning%26entry.906535625%3DIlias%2520Diakonikolas%2520and%2520Daniel%2520M.%2520Kane%26entry.1292438233%3DWe%2520study%2520the%2520complexity%2520of%2520smoothed%2520agnostic%2520learning%252C%2520recently%2520introduced%2520by~%255Ccite%257BCKKMS24%257D%252C%2520in%2520which%2520the%2520learner%2520competes%2520with%2520the%2520best%2520classifier%2520in%2520a%2520target%2520class%2520under%2520slight%2520Gaussian%2520perturbations%2520of%2520the%2520inputs.%2520Specifically%252C%2520we%2520focus%2520on%2520the%2520prototypical%2520task%2520of%2520agnostically%2520learning%2520halfspaces%2520under%2520subgaussian%2520distributions%2520in%2520the%2520smoothed%2520model.%2520The%2520best%2520known%2520upper%2520bound%2520for%2520this%2520problem%2520relies%2520on%2520%2524L_ {"title": "Training-Free Intelligibility-Guided Observation Addition for Noisy ASR", "author": "Haoyang Li and Changsong Liu and Wei Rao and Hao Shi and Sakriani Sakti and Eng Siong Chng", "abstract": "Automatic speech recognition (ASR) degrades severely in noisy environments. Although speech enhancement (SE) front-ends effectively suppress background noise, they often introduce artifacts that harm recognition. Observation addition (OA) addressed this issue by fusing noisy and SE enhanced speech, improving recognition without modifying the parameters of the SE or ASR models. This paper proposes an intelligibility-guided OA method, where fusion weights are derived from intelligibility estimates obtained directly from the backend ASR. Unlike prior OA methods based on trained neural predictors, the proposed method is training-free, reducing complexity and enhances generalization. Extensive experiments across diverse SE-ASR combinations and datasets demonstrate strong robustness and improvements over existing OA baselines. Additional analyses of intelligibility-guided switching-based alternatives and frame versus utterance-level OA further validate the proposed design.", "link": "http://arxiv.org/abs/2602.20967v1", "date": "2026-02-24", "relevancy": 2.2186, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4499}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.447}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4342}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-Free%20Intelli {"title": "Predicting Sentence Acceptability Judgments in Multimodal Contexts", "author": "Hyewon Jang and Nikolai Ilinykh and Sharid Lo\u00e1iciga and Jey Han Lau and Shalom Lappin", "abstract": "Previous work has examined the capacity of deep neural networks (DNNs), particularly transformers, to predict human sentence acceptability judgments, both independently of context, and in document contexts. We consider the effect of prior exposure to visual images (i.e., visual context) on these judgments for humans and large language models (LLMs). Our results suggest that, in contrast to textual context, visual images appear to have little if any impact on human acceptability ratings. However, LLMs display the compression effect seen in previous work on human judgments in document contexts. Different sorts of LLMs are able to predict human acceptability judgments to a high degree of accuracy, but in general, their performance is slightly better when visual contexts are removed. Moreover, the distribution of LLM judgments varies among models, with Qwen resembling human patterns, and others diverging from them. LLM-generated predictions on sentence acceptability are highly correlated with their normalised log probabilities in general. However, the correlations decrease when visual contexts are present, suggesting that a higher gap exists between the internal representations of LLMs and their generated predictions in the presence of visual contexts. Our experimental work suggests interesting points of similarity and of difference between human and LLM processing of sentences in multimodal contexts.", "link": "http://arxiv.org/abs/2602.20918v1", "date": "2026-02-24", "relevancy": 2.2115, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5555}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org {"title": "Pareto-Guided Optimization for Uncertainty-Aware Medical Image Segmentation", "author": "Jinming Zhang and Youpeng Yang and Xi Yang and Haosen Shi and Yuyao Yan and Qiufeng Wang and Guangliang Cheng and Kaizhu Huang", "abstract": "Uncertainty in medical image segmentation is inherently non-uniform, with boundary regions exhibiting substantially higher ambiguity than interior areas. Conventional training treats all pixels equally, leading to unstable optimization during early epochs when predictions are unreliable. We argue that this instability hinders convergence toward Pareto-optimal solutions and propose a region-wise curriculum strategy that prioritizes learning from certain regions and gradually incorporates uncertain ones, reducing gradient variance. Methodologically, we introduce a Pareto-consistent loss that balances trade-offs between regional uncertainties by adaptively reshaping the loss landscape and constraining convergence dynamics between interior and boundary regions; this guides the model toward Pareto-approximate solutions. To address boundary ambiguity, we further develop a fuzzy labeling mechanism that maintains binary confidence in non-boundary areas while enabling smooth transitions near boundaries, stabilizing gradients, and expanding flat regions in the loss surface. Experiments on brain metastasis and non-metastatic tumor segmentation show consistent improvements across multiple configurations, with our method outperforming traditional crisp-set approaches in all tumor subregions.", "link": "http://arxiv.org/abs/2601.19365v2", "date": "2026-02-24", "relevancy": 2.2064, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5803}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5717}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.52}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pareto-Guided%20Optimization%20for%20Uncertainty-Aware%20Medical%20Image%20Segmentation&body=Title%3A%20Pareto-Guided%20Optimization%20for%20Uncertainty-Aware%20Medical%20Image%20Segmentation%0AAuthor%3A%20Jinming%20Zhang%20and%20Youpeng%20Yang%20and%20Xi%20Yang%20and%20Haosen%20Shi%20and%20Yuyao%20Yan%20and%20Qiufeng%20Wang%20and%20Guangliang%20Cheng%20and%20Kaizhu%20Huang%0AAbstract%3A%20Uncertainty%20in%20medical%20image%20segmentation%20is%20inherently%20non-uniform%2C%20with%20boundary%20regions%20exhibiting%20substantially%20higher%20ambiguity%20than%20interior%20areas.%20Conventional%20training%20treats%20all%20pixels%20equally%2C%20leading%20to%20unstable%20optimization%20during%20early%20epochs%20when%20predictions%20are%20unreliable.%20We%20argue%20that%20this%20instability%20hinders%20convergence%20toward%20Pareto-optimal%20solutions%20and%20propose%20a%20region-wise%20curriculum%20strategy%20that%20prioritizes%20learning%20from%20certain%20regions%20and%20gradually%20incorporates%20uncertain%20ones%2C%20reducing%20gradient%20variance.%20Methodologically%2C%20we%20introduce%20a%20Pareto-consistent%20loss%20that%20balances%20trade-offs%20between%20regional%20uncertainties%20by%20adaptively%20reshaping%20the%20loss%20landscape%20and%20constraining%20convergence%20dynamics%20between%20interior%20and%20boundary%20regions%3B%20this%20guides%20the%20model%20toward%20Pareto-approximate%20solutions.%20To%20address%20boundary%20ambiguity%2C%20we%20further%20develop%20a%20fuzzy%20labeling%20mechanism%20that%20maintains%20binary%20confidence%20in%20non-boundary%20areas%20while%20enabling%20smooth%20transitions%20near%20boundaries%2C%20stabilizing%20gradients%2C%20and%20expanding%20flat%20regions%20in%20the%20loss%20surface.%20Experiments%20on%20brain%20metastasis%20and%20non-metastatic%20tumor%20segmentation%20show%20consistent%20improvements%20across%20multiple%20configurations%2C%20with%20our%20method%20outperforming%20traditional%20crisp-set%20approaches%20in%20all%20tumor%20subregions.%0ALink%3A%20http%3A//arxiv.org/abs/2601.19365v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPareto-Guided%2520Optimization%2520for%2520Uncertainty-Aware%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DJinming%2520Zhang%2520and%2520Youpeng%2520Yang%2520and%2520Xi%2520Yang%2520and%2520Haosen%2520Shi%2520and%2520Yuyao%2520Yan%2520and%2520Qiufeng%2520Wang%2520and%2520Guangliang%2520Cheng%2520and%2520Kaizhu%2520Huang%26entry.1292438233%3DUncertainty%2520in%2520medical%2520image%2520segmentation%2520is%2520inherently%2520non-uniform%252C%2520with%2520boundary%2520regions%2520exhibiting%2520substantially%2520higher%2520ambiguity%2520than%2520interior%2520areas.%2520Conventional%2520training%2520treats%2520all%2520pixels%2520equally%252C%2520leading%2520to%2520unstable%2520optimization%2520during%2520early%2520epochs%2520when%2520predictions%2520are%2520unreliable.%2520We%2520argue%2520that%2520this%2520instability%2520hinders%2520convergence%2520toward%2520Pareto-optimal%2520solutions%2520and%2520propose%2520a%2520region-wise%2520curriculum%2520strategy%2520that%2520prioritizes%2520learning%2520from%2520certain%2520regions%2520and%2520gradually%2520incorporates%2520uncertain%2520ones%252C%2520reducing%2520gradient%2520variance.%2520Methodologically%252C%2520we%2520introduce%2520a%2520Pareto-consistent%2520loss%2520that%2520balances%2520trade-offs%2520between%2520regional%2520uncertainties%2520by%2520adaptively%2520reshaping%2520the%2520loss%2520landscape%2520and%2520constraining%2520convergence%2520dynamics%2520between%2520interior%2520and%2520boundary%2520regions%253B%2520this%2520guides%2520the%2520model%2520toward%2520Pareto-approximate%2520solutions.%2520To%2520address%2520boundary%2520ambiguity%252C%2520we%2520further%2520develop%2520a%2520fuzzy%2520labeling%2520mechanism%2520that%2520maintains%2520binary%2520confidence%2520in%2520non-boundary%2520areas%2520while%2520enabling%2520smooth%2520transitions%2520near%2520boundaries%252C%2520stabilizing%2520gradients%252C%2520and%2520expanding%2520flat%2520regions%2520in%2520the%2520loss%2520surface.%2520Experiments%2520on%2520brain%2520metastasis%2520and%2520non-metastatic%2520tumor%2520segmentation%2520show%2520consistent%2520improvements%2520across%2520multiple%2520configurations%252C%2520with%2520our%2520method%2520outperforming%2520traditional%2520crisp-set%2520approaches%2520in%2520all%2520tumor%2520subregions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.19365v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Pareto-Guided%20Optimization%20for%20Uncertainty-Aware%20Medical%20Image%20Segmentation&entry.906535625=Jinming%20Zhang%20and%20Youpeng%20Yang%20and%20Xi%20Yang%20and%20Haosen%20Shi%20and%20Yuyao%20Yan%20and%20Qiufeng%20Wang%20and%20Guangliang%20Cheng%20and%20Kaizhu%20Huang&entry.1292438233=Uncertainty%20in%20medical%20image%20segmentation%20is%20inherently%20non-uniform%2C%20with%20boundary%20regions%20exhibiting%20substantially%20higher%20ambiguity%20than%20interior%20areas.%20Conventional%20training%20treats%20all%20pixels%20equally%2C%20leading%20to%20unstable%20optimization%20during%20early%20epochs%20when%20predictions%20are%20unreliable.%20We%20argue%20that%20this%20instability%20hinders%20convergence%20toward%20Pareto-optimal%20solutions%20and%20propose%20a%20region-wise%20curriculum%20strategy%20that%20prioritizes%20learning%20from%20certain%20regions%20and%20gradually%20incorporates%20uncertain%20ones%2C%20reducin {"title": "Hybrid Fusion: One-Minute Efficient Training for Zero-Shot Cross-Domain Image Fusion", "author": "Ran Zhang and Xuanhua He and Liu Liu", "abstract": "Image fusion seeks to integrate complementary information from multiple sources into a single, superior image. While traditional methods are fast, they lack adaptability and performance. Conversely, deep learning approaches achieve state-of-the-art (SOTA) results but suffer from critical inefficiencies: their reliance on slow, resource-intensive, patch-based training introduces a significant gap with full-resolution inference. We propose a novel hybrid framework that resolves this trade-off. Our method utilizes a learnable U-Net to generate a dynamic guidance map that directs a classic, fixed Laplacian pyramid fusion kernel. This decoupling of policy learning from pixel synthesis enables remarkably efficient full-resolution training, eliminating the train-inference gap. Consequently, our model achieves SOTA-comparable performance in about one minute on a RTX 4090 or two minutes on a consumer laptop GPU from scratch without any external model and demonstrates powerful zero-shot generalization across diverse tasks, from infrared-visible to medical imaging. By design, the fused output is linearly constructed solely from source information, ensuring high faithfulness for critical applications. The codes are available at https://github.com/Zirconium233/HybridFusion", "link": "http://arxiv.org/abs/2602.20851v1", "date": "2026-02-24", "relevancy": 2.1908, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5974}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5409}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5346}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hybrid%20Fusion%3A%20One-Minute%20Efficient%20Training%20for%20Zero-Shot%20Cross-Domain%20Image%20Fusion&body=Title%3A%20Hybrid%20Fusion%3A%20One-Minute%20Efficient%20Training%20for%20Zero-Shot%20Cross-Domain%20Image%20Fusion%0AAuthor%3A%20Ran%20Zhang%20and%20Xuanhua%20He%20and%20Liu%20Liu%0AAbstract%3A%20Image%20fusion%20seeks%20to%20integrate%20complementary%20information%20from%20multiple%20sources%20into%20a%20single%2C%20superior%20image.%20While%20traditional%20methods%20are%20fast%2C%20they%20lack%20adaptability%20and%20performance.%20Conversely%2C%20deep%20learning%20approaches%20achieve%20state-of-the-art%20%28SOTA%29%20results%20but%20suffer%20from%20critical%20inefficiencies%3A%20their%20reliance%20on%20slow%2C%20resource-intensive%2C%20patch-based%20training%20introduces%20a%20significant%20gap%20with%20full-resolution%20inference.%20We%20propose%20a%20novel%20hybrid%20framework%20that%20resolves%20this%20trade-off.%20Our%20method%20utilizes%20a%20learnable%20U-Net%20to%20generate%20a%20dynamic%20guidance%20map%20that%20directs%20a%20classic%2C%20fixed%20Laplacian%20pyramid%20fusion%20kernel.%20This%20decoupling%20of%20policy%20learning%20from%20pixel%20synthesis%20enables%20remarkably%20efficient%20full-resolution%20training%2C%20eliminating%20the%20train-inference%20gap.%20Consequently%2C%20our%20model%20achieves%20SOTA-comparable%20performance%20in%20about%20one%20minute%20on%20a%20RTX%204090%20or%20two%20minutes%20on%20a%20consumer%20laptop%20GPU%20from%20scratch%20without%20any%20external%20model%20and%20demonstrates%20powerful%20zero-shot%20generalization%20across%20diverse%20tasks%2C%20from%20infrared-visible%20to%20medical%20imaging.%20By%20design%2C%20the%20fused%20output%20is%20linearly%20constructed%20solely%20from%20source%20information%2C%20ensuring%20high%20faithfulness%20for%20critical%20applications.%20The%20codes%20are%20available%20at%20https%3A//github.com/Zirconium233/HybridFusion%0ALink%3A%20http%3A//arxiv.org/abs/2602.20851v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHybrid%2520Fusion%253A%2520One-Minute%2520Efficient%2520Training%2520for%2520Zero-Shot%2520Cross-Domain%2520Image%2520Fusion%26entry.906535625%3DRan%2520Zhang%2520and%2520Xuanhua%2520He%2520and%2520Liu%2520Liu%26entry.1292438233%3DImage%2520fusion%2520seeks%2520to%2520integrate%2520complementary%2520information%2520from%2520multiple%2520sources%2520into%2520a%2520single%252C%2520superior%2520image.%2520While%2520traditional%2520methods%2520are%2520fast%252C%2520they%2520lack%2520adaptability%2520and%2520performance.%2520Conversely%252C%2520deep%2520learning%2520approaches%2520achieve%2520state-of-the-art%2520%2528SOTA%2529%2520results%2520but%2520suffer%2520from%2520critical%2520inefficiencies%253A%2520their%2520reliance%2520on%2520slow%252C%2520resource-intensive%252C%2520patch-based%2520training%2520introduces%2520a%2520significant%2520gap%2520with%2520full-resolution%2520inference.%2520We%2520propose%2520a%2520novel%2520hybrid%2520framework%2520that%2520resolves%2520this%2520trade-off.%2520Our%2520method%2520utilizes%2520a%2520learnable%2520U-Net%2520to%2520generate%2520a%2520dynamic%2520guidance%2520map%2520that%2520directs%2520a%2520classic%252C%2520fixed%2520Laplacian%2520pyramid%2520fusion%2520kernel.%2520This%2520decoupling%2520of%2520policy%2520learning%2520from%2520pixel%2520synthesis%2520enables%2520remarkably%2520efficient%2520full-resolution%2520training%252C%2520eliminating%2520the%2520train-inference%2520gap.%2520Consequently%252C%2520our%2520model%2520achieves%2520SOTA-comparable%2520performance%2520in%2520about%2520one%2520minute%2520on%2520a%2520RTX%25204090%2520or%2520two%2520minutes%2520on%2520a%2520consumer%2520laptop%2520GPU%2520from%2520scratch%2520without%2520any%2520external%2520model%2520and%2520demonstrates%2520powerful%2520zero-shot%2520generalization%2520across%2520diverse%2520tasks%252C%2520from%2520infrared-visible%2520to%2520medical%2520imaging.%2520By%2520design%252C%2520the%2520fused%2520output%2520is%2520linearly%2520constructed%2520solely%2520from%2520source%2520information%252C%2520ensuring%2520high%2520faithfulness%2520for%2520critical%2520applications.%2520The%2520codes%2520are%2520available%2520at%2520https%253A//github.com/Zirconium233/HybridFusion%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20851v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hybrid%20Fusion%3A%20One-Minute%20Efficient%20Training%20for%20Zero-Shot%20Cross-Domain%20Image%20Fusion&entry.906535625=Ran%20Zhang%20and%20Xuanhua%20He%20and%20Liu%20Liu&entry.1292438233=Image%20fusion%20seeks%20to%20integrate%20complementary%20information%20from%20multiple%20sources%20into%20a%20single%2C%20superior%20image.%20While%20traditional%20methods%20are%20fast%2C%20they%20lack%20adaptability%20and%20performance.%20Conversely%2C%20deep%20learning%20approaches%20achieve%20state-of-the-art%20%28SOTA%29%20results%20but%20suffer%20from%20critical%20inefficiencies%3A%20their%20reliance%20on%20slow%2C%20resource-intensive%2C%20patch-based%20training%20introduces%20a%20significant%20gap%20with%20full-resolution%20inference.%20We%20propose%20a%20novel%20hybrid%20framework%20that%20resolves%20this%20trade-off.%20Our%20method%20utilizes%20a%20learnable%20U-Net%20to%20generate%20a%20dynamic%20guidance%20map%20that%20directs%20a%20classic%2C%20fixed%20Laplacian%20pyramid%20fusion%20kernel.%20This%20decoupling%20of%20policy%20learning%20from%20pixel%20synthesis%20enables%20remarkably%20efficient%20full-resolution%20training%2C%20eliminating%20the%20train-inference%20gap.%20Consequently%2C%20our%20model%20achieves%20SOTA-comparable%20performance%20in%20about%20one%20minute%20on%20a%20RTX%204090%20or%20two%20minutes%20on%20a%20consumer%20laptop%20GPU%20from%20scratch%20without%20any%20external%20model%20and%20demonstrates%20powerful%20zero-shot%20generalization%20across%20diverse%20tasks%2C%20from%20infrared-visible%20to%20medical%20imaging.%20By%20design%2C%20the%20fused%20output%20is%20linearly%20constructed%20solely%20from%20source%20information%2C%20ensuring%20high%20faithfulness%20for%20critical%20applications.%20The%20codes%20are%20available%20at%20https%3A//github.com/Zirconium233/HybridFusion&entry.1838667208=http%3A//arxiv.org/abs/2602.20851v1&entry.124074799=Read"},
{"title": "NoRD: A Data-Efficient Vision-Language-Action Model that Drives without Reasoning", "author": "Ishaan Rawal and Shubh Gupta and Yihan Hu and Wei Zhan", "abstract": "Vision-Language-Action (VLA) models are advancing autonomous driving by replacing modular pipelines with unified end-to-end architectures. However, current VLAs face two expensive requirements: (1) massive dataset collection, and (2) dense reasoning annotations. In this work, we address both challenges with \\modelname (\\textbf{No} \\textbf{R}easoning for \\textbf{D}riving). Compared to existing VLAs, \\modelname achieves competitive performance while being fine-tuned on $<$60\\% of the data and no reasoning annotations, resulting in 3$\\times$ fewer tokens. We identify that standard Group Relative Policy Optimization (GRPO) fails to yield significant improvements when applied to policies trained on such small, reasoning-free datasets. We show that this limitation stems from difficulty bias, which disproportionately penalizes reward signals from scenarios that produce high-variance rollouts within GRPO. \\modelname overcomes this by incorporating Dr.~GRPO, a recent algorithm designed to mitigate difficulty bias in LLMs. As a result, \\modelname achieves competitive performance on Waymo and NAVSIM with a fraction of the training data and no reasoning overhead, enabling more efficient autonomous systems.", "link": "http://arxiv.org/abs/2602.21172v1", "date": "2026-02-24", "relevancy": 2.1751, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5446}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5446}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5399}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NoRD%3A%20A%20Data-Efficient%20Vision-Language-Action%20Model%20that%20Drives%20without%20Reasoning&body=Title%3A%20NoRD%3A%20A%20Data-Efficient%20Vision-Language-Action%20Model%20that%20Drives%20without%20Reasoning%0AAuthor%3A%20Ishaan%20Rawal%20and%20Shubh%20Gupta%20and%20Yihan%20Hu%20and%20Wei%20Zhan%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20are%20advancing%20autonomous%20driving%20by%20replacing%20modular%20pipelines%20with%20unified%20end-to-end%20architectures.%20However%2C%20current%20VLAs%20face%20two%20expensive%20requirements%3A%20%281%29%20massive%20dataset%20collection%2C%20and%20%282%29%20dense%20reasoning%20annotations.%20In%20this%20work%2C%20we%20address%20both%20challenges%20with%20%5Cmodelname%20%28%5Ctextbf%7BNo%7D%20%5Ctextbf%7BR%7Deasoning%20for%20%5Ctextbf%7BD%7Driving%29.%20Compared%20to%20existing%20VLAs%2C%20%5Cmodelname%20achieves%20competitive%20performance%20while%20being%20fine-tuned%20on%20%24%3C%2460%5C%25%20of%20the%20data%20and%20no%20reasoning%20annotations%2C%20resulting%20in%203%24%5Ctimes%24%20fewer%20tokens.%20We%20identify%20that%20standard%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20fails%20to%20yield%20significant%20improvements%20when%20applied%20to%20policies%20trained%20on%20such%20small%2C%20reasoning-free%20datasets.%20We%20show%20that%20this%20limitation%20stems%20from%20difficulty%20bias%2C%20which%20disproportionately%20penalizes%20reward%20signals%20from%20scenarios%20that%20produce%20high-variance%20rollouts%20within%20GRPO.%20%5Cmodelname%20overcomes%20this%20by%20incorporating%20Dr.~GRPO%2C%20a%20recent%20algorithm%20designed%20to%20mitigate%20difficulty%20bias%20in%20LLMs.%20As%20a%20result%2C%20%5Cmodelname%20achieves%20competitive%20performance%20on%20Waymo%20and%20NAVSIM%20with%20a%20fraction%20of%20the%20training%20data%20and%20no%20reasoning%20overhead%2C%20enabling%20more%20efficient%20autonomous%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21172v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNoRD%253A%2520A%2520Data-Efficient%2520Vision-Language-Action%2520Model%2520that%2520Drives%2520without%2520Reasoning%26entry.906535625%3DIshaan%2520Rawal%2520and%2520Shubh%2520Gupta%2520and%2520Yihan%2520Hu%2520and%2520Wei%2520Zhan%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520are%2520advancing%2520autonomous%2520driving%2520by%2520replacing%2520modular%2520pipelines%2520with%2520unified%2520end-to-end%2520architectures.%2520However%252C%2520current%2520VLAs%2520face%2520two%2520expensive%2520requirements%253A%2520%25281%2529%2520massive%2520dataset%2520collection%252C%2520and%2520%25282%2529%2520dense%2520reasoning%2520annotations.%2520In%2520this%2520work%252C%2520we%2520address%2520both%2520challenges%2520with%2520%255Cmodelname%2520%2528%255Ctextbf%257BNo%257D%2520%255Ctextbf%257BR%257Deasoning%2520for%2520%255Ctextbf%257BD%257Driving%2529.%2520Compared%2520to%2520existing%2520VLAs%252C%2520%255Cmodelname%2520achieves%2520competitive%2520performance%2520while%2520being%2520fine-tuned%2520on%2520%2524%253C%252460%255C%2525%2520of%2520the%2520data%2520and%2520no%2520reasoning%2520annotations%252C%2520resulting%2520in%25203%2524%255Ctimes%2524%2520fewer%2520tokens.%2520We%2520identify%2520that%2520standard%2520Group%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520fails%2520to%2520yield%2520significant%2520improvements%2520when%2520applied%2520to%2520policies%2520trained%2520on%2520such%2520small%252C%2520reasoning-free%2520datasets.%2520We%2520show%2520that%2520this%2520limitation%2520stems%2520from%2520difficulty%2520bias%252C%2520which%2520disproportionately%2520penalizes%2520reward%2520signals%2520from%2520scenarios%2520that%2520produce%2520high-variance%2520rollouts%2520within%2520GRPO.%2520%255Cmodelname%2520overcomes% {"title": "AceGRPO: Adaptive Curriculum Enhanced Group Relative Policy Optimization for Autonomous Machine Learning Engineering", "author": "Yuzhu Cai and Zexi Liu and Xinyu Zhu and Cheng Wang and Siheng Chen", "abstract": "Autonomous Machine Learning Engineering (MLE) requires agents to perform sustained, iterative optimization over long horizons. While recent LLM-based agents show promise, current prompt-based agents for MLE suffer from behavioral stagnation due to frozen parameters. Although Reinforcement Learning (RL) offers a remedy, applying it to MLE is hindered by prohibitive execution latency and inefficient data selection. Recognizing these challenges, we propose AceGRPO with two core components: (1) Evolving Data Buffer that continuously repurposes execution traces into reusable training tasks, and (2) Adaptive Sampling guided by a Learnability Potential function, which dynamically prioritizes tasks at the agent's learning frontier to maximize learning efficiency. Leveraging AceGRPO, our trained Ace-30B model achieves a 100% valid submission rate on MLE-Bench-Lite, approaches the performance of proprietary frontier models, and outperforms larger open-source baselines (e.g., DeepSeek-V3.2), demonstrating robust capability for sustained iterative optimization. Code is available at https://github.com/yuzhu-cai/AceGRPO.", "link": "http://arxiv.org/abs/2602.07906v2", "date": "2026-02-24", "relevancy": 2.1611, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5613}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5276}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AceGRPO%3A%20Adaptive%20Curriculum%20Enhanced%20Group%20Relative%20Policy%20Optimization%20for%20Autonomous%20Machine%20Learning%20Engineering&body=Title%3A%20AceGRPO%3A%20Adaptive%20Curriculum%20Enhanced%20Group%20Relative%20Policy%20Optimization%20for%20Autonomous%20Machine%20Learning%20Engineering%0AAuthor%3A%20Yuzhu%20Cai%20and%20Zexi%20Liu%20and%20Xinyu%20Zhu%20and%20Cheng%20Wang%20and%20Siheng%20Chen%0AAbstract%3A%20Autonomous%20Machine%20Learning%20Engineering%20%28MLE%29%20requires%20agents%20to%20perform%20sustained%2C%20iterative%20optimization%20over%20long%20horizons.%20While%20recent%20LLM-based%20agents%20show%20promise%2C%20current%20prompt-based%20agents%20for%20MLE%20suffer%20from%20behavioral%20stagnation%20due%20to%20frozen%20parameters.%20Although%20Reinforcement%20Learning%20%28RL%29%20offers%20a%20remedy%2C%20applying%20it%20to%20MLE%20is%20hindered%20by%20prohibitive%20execution%20latency%20and%20inefficient%20data%20selection.%20Recognizing%20these%20challenges%2C%20we%20propose%20AceGRPO%20with%20two%20core%20components%3A%20%281%29%20Evolving%20Data%20Buffer%20that%20continuously%20repurposes%20execution%20traces%20into%20reusable%20training%20tasks%2C%20and%20%282%29%20Adaptive%20Sampling%20guided%20by%20a%20Learnability%20Potential%20function%2C%20which%20dynamically%20prioritizes%20tasks%20at%20the%20agent%27s%20learning%20frontier%20to%20maximize%20learning%20efficiency.%20Leveraging%20AceGRPO%2C%20our%20trained%20Ace-30B%20model%20achieves%20a%20100%25%20valid%20submission%20rate%20on%20MLE-Bench-Lite%2C%20approaches%20the%20performance%20of%20proprietary%20frontier%20models%2C%20and%20outperforms%20larger%20open-source%20baselines%20%28e.g.%2C%20DeepSeek-V3.2%29%2C%20demonstrating%20robust%20capability%20for%20sustained%20iterative%20optimization.%20Code%20is%20available%20at%20https%3A//github.com/yuzhu-cai/AceGRPO.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07906v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentr %2520sustained%2520iterative%2520optimization.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/yuzhu-cai/AceGRPO.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.07906v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AceGRPO%3A%20Adaptive%20Curriculum%20Enhanced%20Group%20Relative%20Policy%20Optimization%20for%20Autonomous%20Machine%20Learning%20Engineering&entry.906535625=Yuzhu%20Cai%20and%20Zexi%20Liu%20and%20Xinyu%20Zhu%20and%20Cheng%20Wang%20and%20Siheng%20Chen&entry.1292438233=Autonomous%20Machine%20Learning%20Engineering%20%28MLE%29%20requires%20agents%20to%20perform%20sustained%2C%20iterative%20optimization%20over%20long%20horizons.%20While%20recent%20LLM-based%20agents%20show%20promise%2C%20current%20prompt-based%20agents%20for%20MLE%20suffer%20from%20behavioral%20stagnation%20due%20to%20frozen%20parameters.%20Although%20Reinforcement%20Learning%20%28RL%29%20offers%20a%20remedy%2C%20applying%20it%20to%20MLE%20is%20hindered%20by%20prohibitive%20execution%20latency%20and%20inefficient%20data%20selection.%20Recognizing%20these%20challenges%2C%20we%20propose%20AceGRPO%20with%20two%20core%20components%3A%20%281%29%20Evolving%20Data%20Buffer%20that%20continuously%20repurposes%20execution%20traces%20into%20reusable%20training%20tasks%2C%20and%20%282%29%20Adaptive%20Sampling%20guided%20by%20a%20Learnability%20Potential%20function%2C%20which%20dynamically%20prioritizes%20tasks%20at%20the%20agent%27s%20learning%20frontier%20to%20maximize%20learning%20efficiency.%20Leveraging%20AceGRPO%2C%20our%20trained%20Ace-30B%20model%20achieves%20a%20100%25%20valid%20submission%20rate%20on%20MLE-Bench-Lite%2C%20approaches%20the%20performance%20of%20proprietary%20frontier%20models%2C%20and%20outperforms%20larger%20open-source%20baselines%20%28e.g.%2C%20DeepSeek-V3.2%29%2C%20demonstrating%20robust%20capability%20for%20sustained%20iterative%20optimization.%20Co {"title": "AI-Driven Structure Refinement of X-ray Diffraction", "author": "Bin Cao and Qian Zhang and Zhenjie Feng and Taolue Zhang and Jiaqiang Huang and Lu-Tao Weng and Tong-Yi Zhang", "abstract": "Artificial intelligence can rapidly propose candidate phases and structures from X-ray diffraction (XRD), but these hypotheses often fail in downstream refinement because peak intensities cannot be stably assigned under severe overlap and diffraction consistency is enforced only weakly. Here we introduce the whole-pattern expectation--maximization (WPEM) algorithm, a physics-constrained whole-pattern decomposition and refinement workflow that turns Bragg's law into an explicit constraint within a batch expectation--maximization framework. WPEM models the full profile as a probabilistic mixture density and iteratively infers component-resolved intensities while keeping peak centres Bragg-consistent, producing a continuous, physically admissible intensity representation that remains stable in heavily overlapped regions and in the presence of mixed radiation or multiple phases. We benchmark WPEM on standard reference patterns (PbSO$_4$ and Tb$_2$BaCoO$_5$), where it yields lower $R_p/R_{wp}$ than widely used packages (FullProf and TOPAS) under matched refinement conditions. We further demonstrate generality across realistic experimental scenarios, including phase-resolved decomposition in multiphase materials, quantitative recovery of mixture compositions, separation of crystalline peaks from amorphous backgrounds in semicrystalline systems, high-throughput operando lattice tracking, automated refinement of compositionally disordered solid solutions, and quantitative phase-resolved analysis of complex archaeological samples from synchrotron powder XRD. By providing Bragg-consistent, uncertainty-aware intensity partitioning as a refinement-ready interface, WPEM closes the gap between AI-generated hypotheses and diffraction-admissible structure refinement on challenging XRD data.", "link": "http://arxiv.org/abs/2602.16372v2", "date": "2026-02-24", "relevancy": 2.1554, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4315}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4309}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4309}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI-Driven%20Structure%20Refinement%20of%20X-ray%20Diffraction&body=Title%3A%20AI-Driven%20Structure%20Refinement%20of%20X-ray%20Diffraction%0AAuthor%3A%20Bin%20Cao%20and%20Qian%20Zhang%20and%20Zhenjie%20Feng%20and%20Taolue%20Zhang%20and%20Jiaqiang%20Huang%20and%20Lu-Tao%20Weng%20and%20Tong-Yi%20Zhang%0AAbstract%3A%20Artificial%20intelligence%20can%20rapidly%20propose%20candidate%20phases%20and%20structures%20from%20X-ray%20diffraction%20%28XRD%29%2C%20but%20these%20hypotheses%20often%20fail%20in%20downstream%20refinement%20because%20peak%20intensities%20cannot%20be%20stably%20assigned%20under%20severe%20overlap%20and%20diffraction%20consistency%20is%20enforced%20only%20weakly.%20Here%20we%20introduce%20the%20whole-pattern%20expectation--maximization%20%28WPEM%29%20algorithm%2C%20a%20physics-constrained%20whole-pattern%20decomposition%20and%20refinement%20workflow%20that%20turns%20Bragg%27s%20law%20into%20an%20explicit%20constraint%20within%20a%20batch%20expectation--maximization%20framework.%20WPEM%20models%20the%20full%20profile%20as%20a%20probabilistic%20mixture%20density%20and%20iteratively%20infers%20component-resolved%20intensities%20while%20keeping%20peak%20centres%20Bragg-consistent%2C%20producing%20a%20continuous%2C%20physically%20admissible%20intensity%20representation%20that%20remains%20stable%20in%20heavily%20overlapped%20regions%20and%20in%20the%20presence%20of

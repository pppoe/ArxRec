{"title": "RU4D-SLAM: Reweighting Uncertainty in Gaussian Splatting SLAM for 4D Scene Reconstruction", "author": "Yangfan Zhao and Hanwei Zhang and Ke Huang and Qiufeng Wang and Zhenzhou Shao and Dengyu Wu", "abstract": "Combining 3D Gaussian splatting with Simultaneous Localization and Mapping (SLAM) has gained popularity as it enables continuous 3D environment reconstruction during motion. However, existing methods struggle in dynamic environments, particularly moving objects complicate 3D reconstruction and, in turn, hinder reliable tracking. The emergence of 4D reconstruction, especially 4D Gaussian splatting, offers a promising direction for addressing these challenges, yet its potential for 4D-aware SLAM remains largely underexplored. Along this direction, we propose a robust and efficient framework, namely Reweighting Uncertainty in Gaussian Splatting SLAM (RU4D-SLAM) for 4D scene reconstruction, that introduces temporal factors into spatial 3D representation while incorporating uncertainty-aware perception of scene changes, blurred image synthesis, and dynamic scene reconstruction. We enhance dynamic scene representation by integrating motion blur rendering, and improve uncertainty-aware tracking by extending per-pixel uncertainty modeling, which is originally designed for static scenarios, to handle blurred images. Furthermore, we propose a semantic-guided reweighting mechanism for per-pixel uncertainty estimation in dynamic scenes, and introduce a learnable opacity weight to support adaptive 4D mapping. Extensive experiments on standard benchmarks demonstrate that our method substantially outperforms state-of-the-art approaches in both trajectory accuracy and 4D scene reconstruction, particularly in dynamic environments with moving objects and low-quality inputs. Code available: https://ru4d-slam.github.io", "link": "http://arxiv.org/abs/2602.20807v1", "date": "2026-02-24", "relevancy": 3.3972, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7618}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6486}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6278}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RU4D-SLAM%3A%20Reweighting%20Uncertainty%20in%20Gaussian%20Splatting%20SLAM%20for%204D%20Scene%20Reconstruction&body=Title%3A%20RU4D-SLAM%3A%20Reweighting%20Uncertainty%20in%20Gaussian%20Splatting%20SLAM%20for%204D%20Scene%20Reconstruction%0AAuthor%3A%20Yangfan%20Zhao%20and%20Hanwei%20Zhang%20and%20Ke%20Huang%20and%20Qiufeng%20Wang%20and%20Zhenzhou%20Shao%20and%20Dengyu%20Wu%0AAbstract%3A%20Combining%203D%20Gaussian%20splatting%20with%20Simultaneous%20Localization%20and%20Mapping%20%28SLAM%29%20has%20gained%20popularity%20as%20it%20enables%20continuous%203D%20environment%20reconstruction%20during%20motion.%20However%2C%20existing%20methods%20struggle%20in%20dynamic%20environments%2C%20particularly%20moving%20objects%20complicate%203D%20reconstruction%20and%2C%20in%20turn%2C%20hinder%20reliable%20tracking.%20The%20emergence%20of%204D%20reconstruction%2C%20especially%204D%20Gaussian%20splatting%2C%20offers%20a%20promising%20direction%20for%20addressing%20these%20challenges%2C%20yet%20its%20potential%20for%204D-aware%20SLAM%20remains%20largely%20underexplored.%20Along%20this%20direction%2C%20we%20propose%20a%20robust%20and%20efficient%20framework%2C%20namely%20Reweighting%20Uncertainty%20in%20Gaussian%20Splatting%20SLAM%20%28RU4D-SLAM%29%20for%204D%20scene%20reconstruction%2C%20that%20introduces%20temporal%20factors%20into%20spatial%203D%20representation%20while%20incorporating%20uncertainty-aware%20perception%20of%20scene%20changes%2C%20blurred%20image%20synthesis%2C%20and%20dynamic%20scene%20reconstruction.%20We%20enhance%20dynamic%20scene%20representation%20by%20integrating%20motion%20blur%20rendering%2C%20and%20improve%20uncertainty-aware%20tracking%20by%20extending%20per-pixel%20uncertainty%20modeling%2C%20which%20is%20originally%20designed%20for%20static%20scenarios%2C%20to%20handle%20blurred%20images.%20Furthermore%2C%20we%20propose%20a%20semantic-guided%20reweighting%20mechanism%20for%20per-pixel%20uncertainty%20estimation%20in%20dynamic%20scenes%2C%20and%20introduce%20a%20learnable%20opacity%20weight%20to%20support%20adaptive%204D%20mapping.%20Extensive%20experiments%20on%20standard%20benchmarks%20demonstrate%20that%20our%20method%20substantially%20outperforms%20state-of-the-art%20approaches%20in%20both%20trajectory%20accuracy%20and%204D%20scene%20reconstruction%2C%20particularly%20in%20dynamic%20environments%20with%20moving%20objects%20and%20low-quality%20inputs.%20Code%20available%3A%20https%3A//ru4d-slam.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2602.20807v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRU4D-SLAM%253A%2520Reweighting%2520Uncertainty%2520in%2520Gaussian%2520Splatting%2520SLAM%2520for%25204D%2520Scene%2520Reconstruction%26entry.906535625%3DYangfan%2520Zhao%2520and%2520Hanwei%2520Zhang%2520and%2520Ke%2520Huang%2520and%2520Qiufeng%2520Wang%2520and%2520Zhenzhou%2520Shao%2520and%2520Dengyu%2520Wu%26entry.1292438233%3DCombining%25203D%2520Gaussian%2520splatting%2520with%2520Simultaneous%2520Localization%2520and%2520Mapping%2520%2528SLAM%2529%2520has%2520gained%2520popularity%2520as%2520it%2520enables%2520continuous%25203D%2520environment%2520reconstruction%2520during%2520motion.%2520However%252C%2520existing%2520methods%2520struggle%2520in%2520dynamic%2520environments%252C%2520particularly%2520moving%2520objects%2520complicate%25203D%2520reconstruction%2520and%252C%2520in%2520turn%252C%2520hinder%2520reliable%2520tracking. b.io%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20807v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RU4D-SLAM%3A%20Reweighting%20Uncertainty%20in%20Gaussian%20Splatting%20SLAM%20for%204D%20Scene%20Reconstruction&entry.906535625=Yangfan%20Zhao%20and%20Hanwei%20Zhang%20and%20Ke%20Huang%20and%20Qiufeng%20Wang%20and%20Zhenzhou%20Shao%20and%20Dengyu%20Wu&entry.1292438233=Combining%203D%20Gaussian%20splatting%20with%20Simultaneous%20Localization%20and%20Mapping%20%28SLAM%29%20has%20gained%20popularity%20as%20it%20enables%20continuous%203D%20environment%20reconstruction%20during%20motion.%20However%2C%20existing%20methods%20struggle%20in%20dynamic%20environments%2C%20particularly%20moving%20objects%20complicate%203D%20reconstruction%20and%2C%20in%20turn%2C%20hinder%20reliable%20tracking.%20The%20emergence%20of%204D%20reconstruction%2C%20especially%204D%20Gaussian%20splatting%2C%20offers%20a%20promising%20direction%20for%20addressing%20these%20challenges%2C%20yet%20its%20potential%20for%204D-aware%20SLAM%20remains%20largely%20underexplored.%20Along%20this%20direction%2C%20we%20propose%20a%20robust%20and%20efficient%20framework%2C%20namely%20Reweighting%20Uncertainty%20in%20Gaussian%20Splatting%20SLAM%20%28RU4D-SLAM%29%20for%204D%20scene%20reconstruction%2C%20that%20introduces%20temporal%20factors%20into%20spatial%203D%20representation%20while%20incorporating%20uncertainty-aware%20perception%20of%20scene%20changes%2C%20blurred%20image%20synthesis%2C%20and%20dynamic%20scene%20reconstruction.%20We%20enhance%20dynamic%20scene%20representation%20by%20integrating%20motion%20blur%20rendering%2C%20and%20improve%20uncertainty-aware%20tracking%20by%20extending%20per-pixel%20uncertainty%20modeling%2C%20which%20is%20originally%20designed%20for%20static%20scenarios%2C%20to%20handle%20blurred%20images.%20Furthermore%2C%20we%20propose%20a%20semantic-guided%20reweighting%20m {"title": "Skullptor: High Fidelity 3D Head Reconstruction in Seconds with Multi-View Normal Prediction", "author": "No\u00e9 Artru and Rukhshanda Hussain and Emeline Got and Alexandre Messier and David B. Lindell and Abdallah Dib", "abstract": "Reconstructing high-fidelity 3D head geometry from images is critical for a wide range of applications, yet existing methods face fundamental limitations. Traditional photogrammetry achieves exceptional detail but requires extensive camera arrays (25-200+ views), substantial computation, and manual cleanup in challenging areas like facial hair. Recent alternatives present a fundamental trade-off: foundation models enable efficient single-image reconstruction but lack fine geometric detail, while optimization-based methods achieve higher fidelity but require dense views and expensive computation. We bridge this gap with a hybrid approach that combines the strengths of both paradigms. Our method introduces a multi-view surface normal prediction model that extends monocular foundation models with cross-view attention to produce geometrically consistent normals in a feed-forward pass. We then leverage these predictions as strong geometric priors within an inverse rendering optimization framework to recover high-frequency surface details. Our approach outperforms state-of-the-art single-image and multi-view methods, achieving high-fidelity reconstruction on par with dense-view photogrammetry while reducing camera requirements and computational cost. The code and model will be released.", "link": "http://arxiv.org/abs/2602.21100v1", "date": "2026-02-24", "relevancy": 3.289, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6611}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6611}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Skullptor%3A%20High%20Fidelity%203D%20Head%20Reconstruction%20in%20Seconds%20with%20Multi-View%20Normal%20Prediction&body=Title%3A%20Skullptor%3A%20High%20Fidelity%203D%20Head%20Reconstruction%20in%20Seconds%20with%20Multi-View%20Normal%20Prediction%0AAuthor%3A%20No%C3%A9%20Artru%20and%20Rukhshanda%20Hussain%20and%20Emeline%20Got%20and%20Alexandre%20Messier%20and%20David%20B.%20Lindell%20and%20Abdallah%20Dib%0AAbstract%3A%20Reconstructing%20high-fidelity%203D%20head%20geometry%20from%20images%20is%20critical%20for%20a%20wide%20range%20of%20applications%2C%20yet%20existing%20methods%20face%20fundamental%20limitations.%20Traditional%20photogrammetry%20achieves%20exceptional%20detail%20but%20requires%20extensive%20camera%20arrays%20%2825-200%2B%20views%29%2C%20substantial%20computation%2C%20and%20manual%20cleanup%20in%20challenging%20areas%20like%20facial%20hair.%20Recent%20alternatives%20present%20a%20fundamental%20trade-off%3A%20foundation%20models%20enable%20efficient%20single-image%20reconstruction%20but%20lack%20fine%20geometric%20detail%2C%20while%20optimization-based%20methods%20achieve%20higher%20fidelity%20but%20require%20dense%20views%20and%20expensive%20computation.%20We%20bridge%20this%20gap%20with%20a%20hybrid%20approach%20that%20combines%20the%20strengths%20of%20both%20paradigms.%20Our%20method%20introduces%20a%20multi-view%20surface%20normal%20prediction%20model%20that%20extends%20monocular%20foundation%20models%20with%20cross-view%20attention%20to%20produce%20geometrically%20consistent%20normals%20in%20a%20feed-forward%20pass.%20We%20then%20leverage%20these%20predictions%20as%20strong%20geometric%20priors%20within%20an%20inverse%20rendering%20optimization%20framework%20to%20recover%20high-frequency%20surface%20details.%20Our%20approach%20outperforms%20state-of-the-art%20single-image%20and%20multi-view%20methods%2C%20achieving%20high-fidelity%20reconstruction%20on%20par%20with%20dense-view%20photogrammetry%20while%20reducing%20camera%20requirements%20and%20computational%20cost.%20The%20code%20and%20model%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21100v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSkullptor%253A%2520High%2520Fidelity%25203D%2520Head%2520Reconstruction%2520in%2520Seconds%2520with%2520Multi-View%2520Normal%2520Prediction%26entry.906535625%3DNo%25C3%25A9%2520Artru%2520and%2520Rukhshanda%2520Hussain%2520and%2520Emeline%2520Got%2520and%2520Alexandre%2520Messier%2520and%2520David%2520B.%2520Lindell%2520and%2520Abdallah%2520Dib%26entry.1292438233%3DReconstructing%2520high-fidelity%25203D%2520head%2520geometry%2520from%2520images%2520is%2520critical%2520for%2520a%2520wide%2520range%2520of%2520applications%252C%2520yet%2520existing%2520methods%2520face%2520fundamental%2520limitations.%2520Traditional%2520photogrammetry%2520achieves%2520exceptional%2520detail%2520but%2520requires%2520extensive%2520camera%2520arrays%2520%252825-200%252B%2520views%2529%252C%2520substantial%2520computation%252C%2520and%2520manual%2520cleanup%2520in%2520challenging%2520areas%2520like%2520facial%2520hair.%2520Recent%2520alternatives%2520present%2520a%2520fundamental%2520trade-off%253A%2520foundation%2520models%2520enable%2520efficient%2520single-image%2520reconstruction%2520but%2520lack%2520fine%2520geometric%2520detail%252C%2520while%2520optimization-based%2520methods%2520achieve%2520higher%2520fidelity%2520but%2520require%2520dense%2520views%2520and%2520expensive%2520computation.%2520We%2520bridge%2520this%2520gap%2520with%2520a%2520hybrid%2520approach%2520that%2520combines%2520the%2520strengths%2520of%2520both%2520paradigms.%2520Our%2520method%2520introduces%2520a%2520multi-view%2520surface%2520normal%2520prediction%2520model%2520that%2520extends%2520 {"title": "BrepGaussian: CAD reconstruction from Multi-View Images with Gaussian Splatting", "author": "Jiaxing Yu and Dongyang Ren and Hangyu Xu and Zhouyuxiao Yang and Yuanqi Li and Jie Guo and Zhengkang Zhou and Yanwen Guo", "abstract": "The boundary representation (B-rep) models a 3D solid as its explicit boundaries: trimmed corners, edges, and faces. Recovering B-rep representation from unstructured data is a challenging and valuable task of computer vision and graphics. Recent advances in deep learning have greatly improved the recovery of 3D shape geometry, but still depend on dense and clean point clouds and struggle to generalize to novel shapes. We propose B-rep Gaussian Splatting (BrepGaussian), a novel framework that learns 3D parametric representations from 2D images. We employ a Gaussian Splatting renderer with learnable features, followed by a specific fitting strategy. To disentangle geometry reconstruction and feature learning, we introduce a two-stage learning framework that first captures geometry and edges and then refines patch features to achieve clean geometry and coherent instance representations. Extensive experiments demonstrate the superior performance of our approach to state-of-the-art methods. We will release our code and datasets upon acceptance.", "link": "http://arxiv.org/abs/2602.21105v1", "date": "2026-02-24", "relevancy": 3.2855, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6643}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.659}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.648}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BrepGaussian%3A%20CAD%20reconstruction%20from%20Multi- 3A//arxiv.org/abs/2602.21105v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BrepGaussian%3A%20CAD%20reconstruction%20from%20Multi-View%20Images%20with%20Gaussian%20Splatting&entry.906535625=Jiaxing%20Yu%20and%20Dongyang%20Ren%20and%20Hangyu%20Xu%20and%20Zhouyuxiao%20Yang%20and%20Yuanqi%20Li%20and%20Jie%20Guo%20and%20Zhengkang%20Zhou%20and%20Yanwen%20Guo&entry.1292438233=The%20boundary%20representation%20%28B-rep%29%20models%20a%203D%20solid%20as%20its%20explicit%20boundaries%3A%20trimmed%20corners%2C%20edges%2C%20and%20faces.%20Recovering%20B-rep%20representation%20from%20unstructured%20data%20is%20a%20challenging%20and%20valuable%20task%20of%20computer%20vision%20and%20graphics.%20Recent%20advances%20in%20deep%20learning%20have%20greatly%20improved%20the%20recovery%20of%203D%20shape%20geometry%2C%20but%20still%20depend%20on%20dense%20and%20clean%20point%20clouds%20and%20struggle%20to%20generalize%20to%20novel%20shapes.%20We%20propose%20B-rep%20Gaussian%20Splatting%20%28BrepGaussian%29%2C%20a%20novel%20framework%20that%20learns%203D%20parametric%20representations%20from%202D%20images.%20We%20employ%20a%20Gaussian%20Splatting%20renderer%20with%20learnable%20features%2C%20followed%20by%20a%20specific%20fitting%20strategy.%20To%20disentangle%20geometry%20reconstruction%20and%20feature%20learning%2C%20we%20introduce%20a%20two-stage%20learning%20framework%20that%20first%20captures%20geometry%20and%20edges%20and%20then%20refines%20patch%20features%20to%20achieve%20clean%20geometry%20and%20coherent%20instance%20representations.%20Extensive%20experiments%20demonstrate%20the%20superior%20performance%20of%20our%20approach%20to%20state-of-the-art%20methods.%20We%20will%20release%20our%20code%20and%20datasets%20upon%20acceptance.&entry.1838667208=http%3A//arxiv.org/abs/2602.21105v1&entry.124074799=Read"},
{"title": "UDVideoQA: A Traffic Video Question Answering Dataset for Multi-Object Spatio-Temporal Reasoning in Urban Dynamics", "author": "Joseph Raj Vishal and Nagasiri Poluri and Katha Naik and Rutuja Patil and Kashyap Hegde Kota and Krishna Vinod and Prithvi Jai Ramesh and Mohammad Farhadi and Yezhou Yang and Bharatesh Chakravarthi", "abstract": "Understanding the complex, multi-agent dynamics of urban traffic remains a fundamental challenge for video language models. This paper introduces Urban Dynamics VideoQA, a benchmark dataset that captures the unscripted real-world behavior of dynamic urban scenes. UDVideoQA is curated from 16 hours of traffic footage recorded at multiple city intersections under diverse traffic, weather, and lighting conditions. It employs an event-driven dynamic blur technique to ensure privacy preservation without compromising scene fidelity. Using a unified annotation pipeline, the dataset contains 28K question-answer pairs generated across 8 hours of densely annotated video, averaging one question per second. Its taxonomy follows a hierarchical reasoning level, spanning basic understanding and attribution to event reasoning, reverse reasoning, and counterfactual inference, enabling systematic evaluation of both visual grounding and causal reasoning. Comprehensive experiments benchmark 10 SOTA VideoLMs on UDVideoQA and 8 models on a complementary video question generation benchmark. Results reveal a persistent perception-reasoning gap, showing models that excel in abstract inference often fail with fundamental visual grounding. While models like Gemini Pro achieve the highest zero-shot accuracy, fine-tuning the smaller Qwen2.5-VL 7B model on UDVideoQA bridges this gap, achieving performance comparable to proprietary systems. In VideoQGen, Gemini 2.5 Pro, and Qwen3 Max generate the most relevant and complex questions, though all models exhibit limited linguistic diversity, underscoring the need for human-centric evaluation. The UDVideoQA suite, including the dataset, annotation tools, and benchmarks for both VideoQA and VideoQGen, provides a foundation for advancing robust, privacy-aware, and real-world multimodal reasoning. UDVideoQA is available at https://ud-videoqa.github.io/UD-VideoQA/UD-VideoQA/.", "link": "http://arxiv.org/abs/2602.21137v1", "date": "2026-02-24", "relevancy": 2.9682, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6079}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5865}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5865}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UDVideoQA%3A%20A%20Traffic%20Video%20Question%20Answering%20Dataset%20for%20Multi-Object%20Spatio-Temporal%20Reasoning%20in%20Urban%20Dynamics&body=Title%3A%20UDVideoQA%3A%20A%20Traffic%20Video%20Question%20Answering%20Dataset%20for%20Multi-Object%20Spatio-Temporal%20Reasoning%20in%20Urban%20Dynamics%0AAuthor%3A%20Joseph%20Raj%20Vishal%20and%20Nagasiri%20Poluri%20and%20Katha%20Naik%20and%20Rutuja%20Patil%20and%20Kashyap%20Hegde%20Kota%20and%20Krishna%20Vinod%20and%20Prithvi%20Jai%20Ramesh%20and%20Mohammad%20Farhadi%20and%20Yezhou%20Yang%20and%20Bharatesh%20Chakravarthi%0AAbstract%3A%20Understanding%20the%20complex%2C%20multi-agent%20dynamics%20of%20urban%20traffic%20remains%20a%20fundamental%20challenge%20for%20video%20language%20models.%20This%20paper%20introduces%20Urban%20Dynamics%20VideoQA%2C%20a%20benchmark%20dataset%20that%20captures%20the%20unscripted%20real-world%20behavior%20of%20dynamic%20urban%20scenes.%20UDVideoQA%20is%20curated%20from%2016%20hours%20of%20traffic%20footage%20recorded%20at%20multiple%20city%20intersections%20under%20diverse%20traffic%2C%20weather%2C%20and%20lighting%20conditions.%20It%20employs%20an%20event-driven%20dynamic%20blur%20technique%20to%20ensure%20privacy%20preservation%20without%20compromising%20scene%20fidelity.%20Using%20a%20unified%20annotation%20pipeline%2C%20the%20dataset%20contains%2028K%20question-answer%20pairs%20generated%20across%208%20hours%20of%20densely%20annotated%20video%2C%20averaging%20one%20question%20per%20second.%20Its%20taxonomy%20follows%20a%20hierarchical%20reasoning%20level%2C%20spanning%20basic%20understanding%20and%20attribution%20to%20event%20reasoning%2C%20reverse%20reasoning%2C%20and%20counterfactual%20inference%2C%20enabling%20systematic%20evaluation%20of%20both%20visual%20grounding%20and%20causal%20reasoning.%20Comprehensive%20experiments%20benchmark%2010%20SOTA%20VideoLMs%20on%20UDVideoQA%20and%208%20models%20on%20a%20complementary%20video%20question%20generation%20benchmark.%20Results%20reveal%20a%20persistent%20perception-reasoning%20gap%2C%20showing%20models%20that%20excel%20in%20abstract%20inference%20often%20fail%20with%20fundamental%20visual%20grounding.%20While%20models%20like%20Gemini%20Pro%20achieve%20the%20highest%20zero-shot%20accuracy%2C%20fine-tuning%20the%20smaller%20Qwen2.5-VL%207B%20model%20on%20UDVideoQA%20bridges%20this%20gap%2C%20achieving%20performance%20comparable%20to%20proprietary%20systems.%20In%20VideoQGen%2C%20Gemini%202.5%20Pro%2C%20and%20Qwen3%20Max%20generate%20the%20most%20relevant%20and%20complex%20questions%2C%20though%20all%20models%20exhibit%20limited%20linguistic%20diversity%2C%20underscoring%20the%20need%20for%20human-centric%20evaluation.%20The%20UDVideoQA%20suite%2C%20including%20the%20dataset%2C%20annotation%20tools%2C%20and%20benchmarks%20for%20both%20VideoQA%20and%20VideoQGen%2C%20provides%20a%20foundation%20for%20advancing%20robust%2C%20privacy-aware%2C%20and%20real-world%20multimodal%20reasoning.%20UDVideoQA%20is%20available%20at%20https%3A//ud-videoqa.github.io/UD-VideoQA/UD-VideoQA/.%0ALink%3A%20http%3 {"title": "Dropping Anchor and Spherical Harmonics for Sparse-view Gaussian Splatting", "author": "Shuangkang Fang and I-Chao Shen and Xuanyang Zhang and Zesheng Wang and Yufeng Wang and Wenrui Ding and Gang Yu and Takeo Igarashi", "abstract": "Recent 3D Gaussian Splatting (3DGS) Dropout methods address overfitting under sparse-view conditions by randomly nullifying Gaussian opacities. However, we identify a neighbor compensation effect in these approaches: dropped Gaussians are often compensated by their neighbors, weakening the intended regularization. Moreover, these methods overlook the contribution of high-degree spherical harmonic coefficients (SH) to overfitting. To address these issues, we propose DropAnSH-GS, a novel anchor-based Dropout strategy. Rather than dropping Gaussians independently, our method randomly selects certain Gaussians as anchors and simultaneously removes their spatial neighbors. This effectively disrupts local redundancies near anchors and encourages the model to learn more robust, globally informed representations. Furthermore, we extend the Dropout to color attributes by randomly dropping higher-degree SH to concentrate appearance information in lower-degree SH. This strategy further mitigates overfitting and enables flexible post-training model compression via SH truncation. Experimental results demonstrate that DropAnSH-GS substantially outperforms existing Dropout methods with negligible computational overhead, and can be readily integrated into various 3DGS variants to enhance their performances. Project Website: https://sk-fun.fun/DropAnSH-GS", "link": "http://arxiv.org/abs/2602.20933v1", "date": "2026-02-24", "relevancy": 2.9572, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6099}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5827}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5818}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dropping%20Anchor%20and%20Spherical%20Harmonics%20for%20Sparse-view%20Gaussian%20Splatting&body=Title%3A%20Dropping%20Anchor%20and%20Spherical%20Harmonics%20for%20Sparse-view%20Gaussian%20Splatting%0AAuthor%3A%20Shuangkang%20Fang%20and%20I-Chao%20Shen%20and%20Xuanyang%20Zhang%20and%20Zesheng%20Wang%20and%20Yufeng%20Wang%20and%20Wenrui%20Ding%20and%20Gang%20Yu%20and%20Takeo%20Igarashi%0AAbstract%3A%20Recent%203D%20Gaussian%20Splatting%20%283DGS%29%20Dropout%20methods%20address%20overfitting%20under%20sparse-view%20conditions%20by%20randomly%20nullifying%20Gaussian%20opacities.%20However%2C%20we%20identify%20a%20neighbor%20compensation%20effect%20in%20these%20approaches%3A%20dropped%20Gaussians%20are%20often%20compensated%20by%20their%20neighbors%2C%20weakening%20the%20intended%20regularization.%20Moreover%2C%20these%20methods%20overlook%20the%20contribution%20of%20high-degree%20spherical%20harmonic%20coefficients%20%28SH%29%20to%20overfitting.%20To%20address%20these%20issues%2C%20we%20propose%20DropAnSH-GS%2C%20a%20novel%20anchor-based%20Dropout%20strategy.%20Rather%20than%20dropping%20Gaussians%20independently%2C%20our%20method%20randomly%20selects%20certain%20Gaussians%20as%20anchors%20and%20simultaneously%20removes%20their%20spatial%20neighbors.%20This%20effectively%20disrupts%20local%20redundancies%20near%20anchors%20and%20encourages%20the%20model%20to%20learn%20more%20robust%2C%20globally%20informed%20representations.%20Furthermore%2C%20we%20extend%20the%20Dropout%20to%20color%20attributes%20by%20randomly%20dropping%20higher-degree%20SH%20to%20concentrate%20appearance%20information%20in%20lower-degree%20SH.%20This%20strategy%20further%20mitigates%20overfitting%20and%20enables%20flexible%20post-training%20model% {"title": "SPRITETOMESH: Automatic Mesh Generation for 2D Skeletal Animation Using Learned Segmentation and Contour-Aware Vertex Placement", "author": "Bastien Gimbert", "abstract": "We present SPRITETOMESH, a fully automatic pipeline for converting 2D game sprite images into triangle meshes compatible with skeletal animation frameworks such as Spine2D. Creating animation-ready meshes is traditionally a tedious manual process requiring artists to carefully place vertices along visual boundaries, a task that typically takes 15-60 minutes per sprite. Our method addresses this through a hybrid learned-algorithmic approach. A segmentation network (EfficientNet-B0 encoder with U-Net decoder) trained on over 100,000 sprite-mask pairs from 172 games achieves an IoU of 0.87, providing accurate binary masks from arbitrary input images. From these masks, we extract exterior contour vertices using Douglas-Peucker simplification with adaptive arc subdivision, and interior vertices along visual boundaries detected via bilateral-filtered multi-channel Canny edge detection with contour-following placement. Delaunay triangulation with mask-based centroid filtering produces the final mesh. Through controlled experiments, we demonstrate that direct vertex position prediction via neural network heatmap regression is fundamentally not viable for this task: the heatmap decoder consistently fails to converge (loss plateau at 0.061) while the segmentation decoder trains normally under identical conditions. We attribute this to the inherently artistic nature of vertex placement - the same sprite can be meshed validly in many different ways. This negative result validates our hybrid design: learned segmentation where ground truth is unambiguous, algorithmic placement where domain heuristics are appropriate. The complete pipeline processes a sprite in under 3 seconds, representing a speedup of 300x-1200x over manual creation. We release our trained model to the game development community.", {"title": "SIMSPINE: A Biomechanics-Aware Simulation Framework for 3D Spine Motion Annotation and Benchmarking", "author": "Muhammad Saif Ullah Khan and Didier Stricker", "abstract": "Modeling spinal motion is fundamental to understanding human biomechanics, yet remains underexplored in computer vision due to the spine's complex multi-joint kinematics and the lack of large-scale 3D annotations. We present a biomechanics-aware keypoint simulation framework that augments existing human pose datasets with anatomically consistent 3D spinal keypoints derived from musculoskeletal modeling. Using this framework, we create the first open dataset, named SIMSPINE, which provides sparse vertebra-level 3D spinal annotations for natural full-body motions in indoor multi-camera capture without external restraints. With 2.14 million frames, this enables data-driven learning of vertebral kinematics from subtle posture variations and bridges the gap between musculoskeletal simulation and computer vision. In addition, we release pretrained baselines covering fine-tuned 2D detectors, monocular 3D pose lifting models, and multi-view reconstruction pipelines, establishing a unified benchmark for biomechanically valid spine motion estimation. Specifically, our 2D spine baselines improve the state-of-the-art from 0.63 to 0.80 AUC in controlled environments, and from 0.91 to 0.93 AP for in-the-wild spine tracking. Together, the simulation framework and SIMSPINE dataset advance research in vision-based biomechanics, motion analysis, and digital human modeling by enabling reproducible, anatomically grounded 3D spine estimation under natural conditions.", "link": "http://arxiv.org/abs/2602.20792v1", "date": "2026-02-24", "relevancy": 2.8705, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.617}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.o cifically%2C%20our%202D%20spine%20baselines%20improve%20the%20state-of-the-art%20from%200.63%20to%200.80%20AUC%20in%20controlled%20environments%2C%20and%20from%200.91%20to%200.93%20AP%20for%20in-the-wild%20spine%20tracking.%20Together%2C%20the%20simulation%20framework%20and%20SIMSPINE%20dataset%20advance%20research%20in%20vision-based%20biomechanics%2C%20motion%20analysis%2C%20and%20digital%20human%20modeling%20by%20enabling%20reproducible%2C%20anatomically%20grounded%203D%20spine%20estimation%20under%20natural%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20792v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIMSPINE%253A%2520A%2520Biomechanics-Aware%2520Simulation%2520Framework%2520for%25203D%2520Spine%2520Motion%2520Annotation%2520and%2520Benchmarking%26entry.906535625%3DMuhammad%2520Saif%2520Ullah%2520Khan%2520and%2520Didier%2520Stricker%26entry.1292438233%3DModeling%2520spinal%2520motion%2520is%2520fundamental%2520to%2520understanding%2520human%2520biomechanics%252C%2520yet%2520remains%2520underexplored%2520in%2520computer%2520vision%2520due%2520to%2520the%2520spine%2527s%2520complex%2520multi-joint%2520kinematics%2520and%2520the%2520lack%2520of%2520large-scale%25203D%2520annotations.%2520We%2520present%2520a%2520biomechanics-aware%2520keypoint%2520simulation%2520framework%2520that%2520augments%2520existing%2520human%2520pose%2520datasets%2520with%2520anatomically%2520consistent%25203D%2520spinal%2520keypoints%2520derived%2520from%2520musculoskeletal%2520modeling.%2520Using%2520this%2520framework%252C%2520we%2520create%2520the%2520first%2520open%2520dataset%252C%2520named%2520SIMSPINE%252C%2520which%2520provides%2520sparse%2520vertebra-level%25203D%2520spinal%2520annotations%2520for%2520natural%2520full-body%2520motions%2520in%2520indoor%2520multi-camera%2520capture%2520without%2520external%2520restraints.%2520With%25202.14%2520million%2520frames%252C%2520this%2520e {"title": "Seeing Through Words: Controlling Visual Retrieval Quality with Language Models", "author": "Jianglin Lu and Simon Jenni and Kushal Kafle and Jing Shi and Handong Zhao and Yun Fu", "abstract": "Text-to-image retrieval is a fundamental task in vision-language learning, yet in real-world scenarios it is often challenged by short and underspecified user queries. Such queries are typically only one or two words long, rendering them semantically ambiguous, prone to collisions across diverse visual interpretations, and lacking explicit control over the quality of retrieved images. To address these issues, we propose a new paradigm of quality-controllable retrieval, which enriches short queries with contextual details while incorporating explicit notions of image quality. Our key idea is to leverage a generative language model as a query completion function, extending underspecified queries into descriptive forms that capture fine-grained visual attributes such as pose, scene, and aesthetics. We introduce a general framework that conditions query completion on discretized quality levels, derived from relevance and aesthetic scoring models, so that query enrichment is not only semantically meaningful but also quality-aware. The resulting system provides three key advantages: 1) flexibility, it is compatible with any pretrained vision-language model (VLMs) without modification; 2) transparency, enriched queries are explicitly interpretable by users; and 3) controllability, enabling retrieval results to be steered toward user-preferred quality levels. Extensive experiments demonstrate that our proposed approach significantly improves retrieval results and provides effective quality control, bridging the gap between the expressive capacity of modern VLMs and the underspecified nature of short user queries. Our code is available at https://github.com/Jianglin954/QCQC.", "link": "http://arxiv.org/abs/2602.21175v1", "date": "2026-02-24", "relevancy": 2.8575, "topK": [{ ons%20query%20completion%20on%20discretized%20quality%20levels%2C%20derived%20from%20relevance%20and%20aesthetic%20scoring%20models%2C%20so%20that%20query%20enrichment%20is%20not%20only%20semantically%20meaningful%20but%20also%20quality-aware.%20The%20resulting%20system%20provides%20three%20key%20advantages%3A%201%29%20flexibility%2C%20it%20is%20compatible%20with%20any%20pretrained%20vision-language%20model%20%28VLMs%29%20without%20modification%3B%202%29%20transparency%2C%20enriched%20queries%20are%20explicitly%20interpretable%20by%20users%3B%20and%203%29%20controllability%2C%20enabling%20retrieval%20results%20to%20be%20steered%20toward%20user-preferred%20quality%20levels.%20Extensive%20experiments%20demonstrate%20that%20our%20proposed%20approach%20significantly%20improves%20retrieval%20results%20and%20provides%20effective%20quality%20control%2C%20bridging%20the%20gap%20between%20the%20expressive%20capacity%20of%20modern%20VLMs%20and%20the%20underspecified%20nature%20of%20short%20user%20queries.%20Our%20code%20is%20available%20at%20https%3A//github.com/Jianglin954/QCQC.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21175v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeeing%2520Through%2520Words%253A%2520Controlling%2520Visual%2520Retrieval%2520Quality%2520with%2520Language%2520Models%26entry.906535625%3DJianglin%2520Lu%2520and%2520Simon%2520Jenni%2520and%2520Kushal%2520Kafle%2520and%2520Jing%2520Shi%2520and%2520Handong%2520Zhao%2520and%2520Yun%2520Fu%26entry.1292438233%3DText-to-image%2520retrieval%2520is%2520a%2520fundamental%2520task%2520in%2520vision-language%2520learning%252C%2520yet%2520in%2520real-world%2520scenarios%2520it%2520is%2520often%2520challenged%2520by%2520short%2520and%2520underspecified%2520user%2520queries.%2520Such%2520queries%2520are%2520typically%2520only%2520one%2520or%2520two%2520words%2520long%252C%2520rendering%2520them%2520semantically%2520ambiguous%252C%2 {"title": "VII: Visual Instruction Injection for Jailbreaking Image-to-Video Generation Models", "author": "Bowen Zheng and Yongli Xiang and Ziming Hong and Zerong Lin and Chaojian Yu and Tongliang Liu and Xinge You", "abstract": "Image-to-Video (I2V) generation models, which condition video generation on reference images, have shown emerging visual instruction-following capability, allowing certain visual cues in reference images to act as implicit control signals for video generation. However, this capability also introduces a previously overlooked risk: adversaries may exploit visual instructions to inject malicious intent through the image modality. In this work, we uncover this risk by proposing Visual Instruction Injection (VII), a training-free and transferable jailbreaking framework that intentionally disguises the malicious intent of unsafe text prompts as benign visual instructions in the safe reference image. Specifically, VII coordinates a Malicious Intent Reprogramming module to distill malicious intent from unsafe text prompts while minimizing their static harmfulness, and a Visual Instruction Grounding module to ground the distilled intent onto a safe input image by rendering visual instructions that preserve semantic consistency with the original unsafe text prompt, thereby inducing harmful content during I2V generation. Empirically, our extensive experiments on four state-of-the-art commercial I2V models (Kling-v2.5-turbo, Gemini Veo-3.1, Seedance-1.5-pro, and PixVerse-V5) demonstrate that VII achieves Attack Success Rates of up to 83.5% while reducing Refusal Rates to near zero, significantly outperforming existing baselines.", "link": "http://arxiv.org/abs/2602.20999v1", "date": "2026-02-24", "relevancy": 2.8504, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6106}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5515}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5482}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VII%3A%20Visual%20Instruction%20Injection%20for%20Jailbreaking%20Image-to-Video%20Generation%20Models&body=Title%3A%20VII%3A%20Visual%20Instruction%20Injection%20for%20Jailbreaking%20Image-to-Video%20Generation%20Models%0AAuthor%3A%20Bowen%20Zheng%20and%20Yongli%20Xiang%20and%20Ziming%20Hong%20and%20Zerong%20Lin%20and%20Chaojian%20Yu%20and%20Tongliang%20Liu%20and%20Xinge%20You%0AAbstract%3A%20Image-to-Video%20%28I2V%29%20generation%20models%2C%20which%20condition%20video%20generation%20on%20reference%20images%2C%20have%20shown%20emerging%20visual%20instruction-following%20capability%2C%20allowing%20certain%20visual%20cues%20in%20reference%20images%20to%20act%20as%20implicit%20control%20signals%20for%20video%20generation.%20However%2C%20this%20capability%20also%20introduces%20a%20previously%20overlooked%20risk%3A%20adversaries%20may%20exploit%20visual%20instructions%20to%20inject%20malicious%20intent%20through%20the%20image%20modality.%20In%20this%20work%2C%20we%20uncover%20this%20risk%20by%20proposing%20Visual%20Instruction%20Injection%20%28VII%29%2C%20a%20training-free%20and%20transferable%20jailbreaking%20framework%20that%20intentionally%20disguises%20the%20malicious%20intent%20of%20unsafe%20text%20prompts%20as%20benign%20visual%20instructions%20in%20the%20safe%20reference%20image.%20Specifically%2C%20VII%20coordinates%20a%20Malicious%20Intent%20Reprogramming%20module%20to%20distill%20malicious%20intent%20from%20unsafe%20text%20prompts%20while%20minimizing%20their%20static%20harmfulness%2C%20and%20a%20Visual%20Instruction%20Grounding%20module%20to%20ground%20the%20distilled%20intent%20onto%20a%20safe%20input%20image%20by%20rendering%20visual%20instructions%20that%20preserve%20semantic%20consistency%20with%20the%20original%20unsafe%20text%20prompt%2C%20thereby%20inducing%20harmful%20content%20during%20I2V%20generation.%20Empirically%2C%20our%20extensive%20experiments%20on%20four%20state-of-the-art%20commercial%20I2V%20models%20%28Kling-v2.5-turbo%2C%20Gemini%20Veo-3.1%2C%20Seedance-1.5-pro%2C%20and%20PixVerse-V5%29%20demonstrate%20that%20VII%20achieves%20Attack%20Success%20Rates%20of%20up%20to%2083.5%25%20while%20reducing%20Refusal%20Rates%20to%20near%20zero%2C%20significantly%20outperforming%20existing%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20999v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVII%253A%2520Visual%2520Instruction%2520Injection%2520for%2520Jailbreaking%2520Image-to-Video%2520Generation%2520Models%26entry.906535625%3DBowen%2520Zheng%2520and%2520Yongli%2520Xiang%2520and%2520Ziming%2520Hong%2520and%2520Zerong%2520Lin%2520and%2520Chaojian%2520Yu%2520and%2520Tongliang%2520Liu%2520and%2520Xinge%2520You%26entry.1292438233%3DImage-to-Video%2520%2528I2V%2529%2520generation%2520models%252C%2520which%2520condition%2520video%2520generation%2520on%2520reference%2520images%252C%2520have%2520shown%2520emerging%2520visual%2520instruction-following%2520capability%252C%2520allowing%2520certain%2520visual%2520cues%2520in%2520reference%2520images%2520to%2520act%2520as%2520implicit%2520control%2520signals%2520for%2520video%2520generation.%2520However%252C%2520this%2520capability%2520also%2520introduces%2520a%2520previously%2520overlooked%2520risk%253A%2520adversaries%2520may%2520exploit%2520visual%2520instructions%2520to%2520inject%2520malicious%2520intent%2520through%2520the%2520image%2520modality.%2520In%2520this%2520work%252C%2520we%2520uncover%2520this%2520risk%2520by%2520proposing%2520Visual%2520Instruction%2520Injection%2520%2528VII%2529%252C%2520a%2520training-free%2520and%2520transferable%2520jailbreaking%2520framework%2520that%2520intentionally%2520disguises%2520the {"title": "On the Explainability of Vision-Language Models in Art History", "author": "Stefanie Schneider", "abstract": "Vision-Language Models (VLMs) transfer visual and textual data into a shared embedding space. In so doing, they enable a wide range of multimodal tasks, while also raising critical questions about the nature of machine 'understanding.' In this paper, we examine how Explainable Artificial Intelligence (XAI) methods can render the visual reasoning of a VLM - namely, CLIP - legible in art-historical contexts. To this end, we evaluate seven methods, combining zero-shot localization experiments with human interpretability studies. Our results indicate that, while these methods capture some aspects of human interpretation, their effectiveness hinges on the conceptual stability and representational availability of the examined categories.", "link": "http://arxiv.org/abs/2602.20853v1", "date": "2026-02-24", "relevancy": 2.8481, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5862}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5862}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5365}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Explainability%20of%20Vision-Language%20Models%20in%20Art%20History&body=Title%3A%20On%20the%20Explainability%20of%20Vision-Language%20Models%20in%20Art%20History%0AAuthor%3A%20Stefanie%20Schneider%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20transfer%20visual%20and%20textual%20data%20into%20a%20shared%20embedding%20space.%20In%20so%20doing%2C%20they%20enable%20a%20wide%20range%20of%20multimodal%20tasks%2C%20while%20also%20raising%20critical%20questions%20about%20the%20nature%20of%20machine%20%27understanding.%27%20In%20this%20paper%2C%20we%20examine%20how%20Explainable%20Artificial%20Intelligence%20%28XAI%29%20methods%20can%20render%20the%20visual%20reasoning%20of%20a%20VLM%20-%20namely%2C%20CLIP%20-%20legible%20in%20art-historical%20contexts.%20To%20this%20end%2C%20we%20evaluate%20seven%20methods%2C%20combining%20zero-shot%20localization%20experiments%20with%20human%20interpretability%20studies.%20Our%20results%20indicate%20that%2C%20while%20these%20methods%20capture%20some%20aspects%20of%20human%20interpretation%2C%20their%20effectiveness%20hinges%20on%20the%20conceptual%20stability%20and%20representational%20availability%20of%20the%20examined%20categories.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20853v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Explainability%2520of%2520Vision-Language%2520Models%2520in%2520Art%2520History%26entry.906535625%3DStefanie%2520Schneider%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520transfer%2520visual%2520and%2520textual%2520data%2520into%2520a%2520shared%2520embedding%2520space.%2520In%2520so%2520doing%252C%2520they%2520enable%2520a%2520wide%2520range%2520of%2520multimodal%2520tasks%252C%2520while%2520also%2520raising%2520critical%2520questions%2520about%2520the%2520nature%2520of%2520machine%2520%2527understanding.%2527%2520In%2520this%2520paper%252C%2520we%2520examine%2520how%2520Explainable%2520Artificial%2520Intelligence%2520%2528XAI%2529%2520methods%2520can%2520render%2520the%2520visual%2520reasoning%2520of%2520a%2520VLM%2520-%2520namely%252C%2520CLIP%2520-%2520legible%2520in%2520art-historical%2520contexts.%2520To%2520this%2520end%252C%2520we%2520evaluate%2520seven%2520methods%252C%2520combining%2520zero-shot%2520localization%2520ex {"title": "Not Just What's There: Enabling CLIP to Comprehend Negated Visual Descriptions Without Fine-tuning", "author": "Junhao Xiao and Zhiyu Wu and Hao Lin and Yi Chen and Yahui Liu and Xiaoran Zhao and Zixu Wang and Zejiang He", "abstract": "Vision-Language Models (VLMs) like CLIP struggle to understand negation, often embedding affirmatives and negatives similarly (e.g., matching \"no dog\" with dog images). Existing methods refine negation understanding via fine-tuning CLIP's text encoder, risking overfitting. In this work, we propose CLIPGlasses, a plug-and-play framework that enhances CLIP's ability to comprehend negated visual descriptions. CLIPGlasses adopts a dual-stage design: a Lens module disentangles negated semantics from text embeddings, and a Frame module predicts context-aware repulsion strength, which is integrated into a modified similarity computation to penalize alignment with negated semantics, thereby reducing false positive matches. Experiments show that CLIP equipped with CLIPGlasses achieves competitive in-domain performance and outperforms state-of-the-art methods in cross-domain generalization. Its superiority is especially evident under low-resource conditions, indicating stronger robustness across domains.", "link": "http://arxiv.org/abs/2602.21035v1", "date": "2026-02-24", "relevancy": 2.8338, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5747}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20Just%20What%27s%20There%3A%20Enabling%20CLIP%20to%20Comprehend%20Negated%20Visual%20Description {"title": "OCR-Agent: Agentic OCR with Capability and Memory Reflection", "author": "Shimin Wen and Zeyu Zhang and Xingdou Bian and Hongjie Zhu and Lulu He and Layi Shama and Daji Ergu and Ying Cai", "abstract": "Large Vision-Language Models (VLMs) have demonstrated significant potential on complex visual understanding tasks through iterative optimization methods.However, these models generally lack effective self-correction mechanisms, making it difficult for them to independently rectify cognitive biases. Consequently, during multi-turn revisions, they often fall into repetitive and ineffective attempts, failing to achieve stable improvements in answer quality.To address this issue, we propose a novel iterative self-correction framework that endows models with two key capabilities: Capability Reflection and Memory Reflection. This framework guides the model to first diagnose errors and generate a correction plan via Capability Reflection, then leverage Memory Reflection to review past attempts to avoid repetition and explore new solutions, and finally, optimize the answer through rigorous re-reasoning. Experiments on the challenging OCRBench v2 benchmark show that OCR-Agent outperforms the current open-source SOTA model InternVL3-8B by +2.0 on English and +1.2 on Chinese subsets, while achieving state-of-the-art results in Visual Understanding (79.9) and Reasoning (66.5) - surpassing even larger fine-tuned models. Our method demonstrates that structured, self-aware reflection can significantly enhance VLMs' reasoning robustness without additional training. Code: https://github.com/AIGeeksGroup/OCR-Agent.", "link": "http://arxiv.org/abs/2602.21053v1", "date": "2026-02-24", "relevancy": 2.8334, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5801}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": " {"title": "CrystaL: Spontaneous Emergence of Visual Latents in MLLMs", "author": "Yang Zhang and Danyang Li and Yuxuan Li and Xin Zhang and Tianyu Xie and Mingming Cheng and Xiang Li", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable performance by integrating powerful language backbones with large-scale visual encoders. Among these, latent Chain-of-Thought (CoT) methods enable implicit reasoning in continuous hidden states, facilitating seamless vision-language integration and faster inference. However, existing heuristically predefined supervision signals in latent CoT provide limited guidance for preserving critical visual information in intermediate latent states. To address this limitation, we propose CrystaL (Crystallized Latent Reasoning), a single-stage framework with two paths to process intact and corrupted images, respectively. By explicitly aligning the attention patterns and prediction distributions across the two paths, CrystaL crystallizes latent representations into task-relevant visual semantics, without relying on auxiliary annotations or external modules. Extensive experiments on perception-intensive benchmarks demonstrate that CrystaL consistently outperforms state-of-the-art baselines, achieving substantial gains in fine-grained visual understanding while maintaining robust reasoning capabilities.", "link": "http://arxiv.org/abs/2602.20980v1", "date": "2026-02-24", "relevancy": 2.8233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5688}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5688}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5564}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CrystaL%3A%20Spontaneous%20Emergence%20of%20Visual%20Latents%20in%20MLLMs&body=Title%3A%20CrystaL%3A%20Spontaneous%20Emergence%20of%20Visual%20Latents%20in%20MLLMs%0AAuthor%3A%20Yang%20Zhang%20and%20Danyang%20Li%20and%20Yuxuan%20Li%20and%20Xin%20Zhang%20and%20Tianyu%20Xie%20and%20Mingming%20Cheng%20and%20Xiang%20Li%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20achieved%20remarkable%20performance%20by%20integrating%20powerful%20language%20backbones%20with%20large-scale%20visual%20encoders.%20Among%20these%2C%20latent%20Chain-of-Thought%20%28CoT%29%20methods%20enable%20implicit%20reasoning%20in%20continuous%20hidden%20states%2C%20facilitating%20seamless%20vision-language%20integration%20and%20faster%20inference.%20However%2C%20existing%20heuristically%20predefined%20supervision%20signals%20in%20latent%20CoT%20provide%20limited%20guidance%20for%20preserving%20critical%20visual%20information%20in%20intermediate%20latent%20states.%20To%20address%20this%20limitation%2C%20we%20propose%20CrystaL%20%28Crystallized%20Latent%20Reasoning%29%2C%20a%20single-stage%20framework%20with%20two%20paths%20to%20process%20intact%20and%20corrupted%20images%2C%20respectively.%20By%20explicitly%20aligning%20the%20attention%20patterns%20and%20prediction%20distributions%20across%20the%20two%20paths%2C%20CrystaL%20crystallizes%20latent%20representations%20into%20task-relevant%20visual%20semantics%2C%20without%20relying%20on%20auxiliary%20annotations%20or%20external%20modules.%20Extensive%20experiments%20on%20perception-intensive%20benchmarks%20demonstrate%20that%20CrystaL%20consistently%20outperforms%20state-of-the-art%20baselines%2C%20achieving%20substantial%20gains%20in%20fine-grained%20visual%20understanding%20while%20maintaining%20robust%20reasoning%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20980v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCrystaL%253A%2520Spontaneous%2520Emergence%2520of%2520Visual%2520Latents%2520in%2520MLLMs%26entry.906535625%3DYang%2520Zhang%2520and%2520Danyang%2520Li%2520and%2520Yuxuan%2520Li%2520and%2520Xin%2520Zhang%2520and%2520Tianyu%2520Xie%2520and%2520Mingming%2520Cheng%2520and%2520Xiang%2520Li%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520achieved%2520remarkable%2520performance%2520by%2520integrating%2520powerful%2520language%2520backbones%2520with%2520large-scale%2520visual%2520encoders.%2520Among%2520these%252C%2520latent%2520Chain-of-Thought%2520%2528CoT%2529%2520methods%2520enable%2520implicit%2520reasoning%2520in%2520continuous%2520hidden%2520states%252C%2520facilitating%2520seamless%2520vision-language%2520integration%2520and%2520faster%2520inference.%2520However%252C%2520existing%2520heuristically%2520predefined%2520supervision%2520signals%2520in%2520latent%2520CoT%2520provide%2520limited%2520guidance%2520for%2520preserving%2520critical%2520visual%2520information%2520in%2520intermediate%2520latent%2520states.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520CrystaL%2520%2528Crystallized%2520Latent%2520Reasoning%2529%252C%2520a%2520single-stage%2520framework%2520with%2520two%2520paths%2520to%2520process%2520intact%2520and%2520corrupted%2520images%252C%2520respectively.%2520By%2520explicitly%2520aligning%2520the%2520attention%2520patterns%2520and%2520prediction%2520distributions%2520across%2520the%2520two%2520paths%252C%2520CrystaL%2520crystallizes%2520latent%2520representations%2520into%2520task-relevant%2520visual%2520semantics%252C%2520without%2520relying%2520on%2520auxiliary%2520annotations%2520or%2520external%2520modules.%2520Extensive%2520experiments%2520on%2520perception-intensive%2520benchmarks%2520demonstrate%2520that%2520CrystaL%2520consistently%2520outperforms%2520state-of-the-art%2520baselines%252C%2520achieving%2520substantial%2520gains%2520in%2520fine-grained%2520visual%2520understanding%2520while%2520maintaining%2520robust%2520reasoning%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20980v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CrystaL%3A%20Spontaneous%20Emergence%20of%20Visual%20Latents%20in%20MLLMs&entry.906535625=Yang%20Zhang%20and%20Danyang%20Li%20and%20Yuxuan%20Li%20and%20Xin%20Zhang%20and%20Tianyu%20Xie%20and%20Mingming%20Cheng%20and%20Xiang%20Li&entry.1292438233=Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20achieved%20remarkable%20performance%20by%20integrating%20powerful%20language%20backbones%20with%20large-scale%20visual%20encoders.%20Among%20these%2C%20latent%20Chain-of-Thought%20%28CoT%29%20methods%20enable%20implicit%20reasoning%20in%20continuous%20hidden%20states%2C%20facilitating%20seamless%20vision-language%20integration%20and%20faster%20inference.%20However%2C%20existing%20heuristically%20predefined%20supervision%20signals%20in%20latent%20CoT%20provide%20limited%20guidance%20for%20preserving%20critical%20visual%20information%20in%20intermediate%20latent%20states.%20To%20address%20this%20limitation%2C%20we%20propose%20CrystaL%20%28Crystallized%20Latent%20Reasoning%29%2C%20a%20single-stage%20framework%20with%20two%20paths%20to%20process%20intact%20and%20corrupted%20images%2C%20respectively.%20By%20explicitly%20aligning%20the%20attention%20patterns%20and%20prediction%20distributions%20across%20the%20two%20paths%2C%20CrystaL%20crystallizes%20latent%20representations%20into%20task-relevant%20visual%20semantics%2C%20without%20relying%20on%20auxiliary%20annotations%20or%20external%20modules.%20Extensive%20experiments%20on%20perception-intensive%20benchmarks%20demonstrate%20that%20CrystaL%20consistently%20outperforms%20state-of-the-art%20baselines%2C%20achieving%20substantial%20gains%20in%20fine-grained%20visual%20understanding%20while%20maintaining%20robust%20reasoning%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2602.20980v1&entry.124074799=Read"},
{"title": "Keep it SymPL: Symbolic Projective Layout for Allocentric Spatial Reasoning in Vision-Language Models", "author": "Jaeyun Jang and Seunghui Shin and Taeho Park and Hyoseok Hwang", "abstract": "Perspective-aware spatial reasoning involves understanding spatial relationships from specific viewpoints-either egocentric (observer-centered) or allocentric (object-centered). While vision-language models (VLMs) perform well in egocentric settings, their performance deteriorates when reasoning from allocentric viewpoints, where spatial relations must be inferred from the perspective of objects within the scene. In this study, we address this underexplored challenge by introducing Symbolic Projective Layout (SymPL), a framework that reformulates allocentric reasoning into symbolic-layout forms that VLMs inherently handle well. By leveraging four key factors-projection, abstraction, bipartition, and localization-SymPL converts allocentric questions into structured symbolic-layout representations. Extensive experiments demonstrate that this reformulation substantially improves performance in both allocentric and egocentric tasks, enhances robustness under visual illusions and multi-view scenarios, and that each component contributes critically to these gains. These results show that SymPL provides an effective and principled approach for addressing complex perspective-aware spatial reasoning.", "link": "http://arxiv.org/abs/2602.19117v2", "date": "2026-02-24", "relevancy": 2.819, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5766}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5382}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Keep%20it%20SymPL%3A%20Symbolic%20Projective%20Layout%20for%20Allocentric%20Spatial%20Reasoning%20in%20Vision-Language%20Models&body=Title%3A%20Keep%20it%20SymPL%3A%20Symbolic%20Projective%20Layout%20for%20Allocentric%20Spatial%20Reasoning%20in%20Vision-Language%20Models%0AAuthor%3A%20Jaeyun%20Jang%20and%20Seunghui%20Shin%20and%20Taeho%20Park%20and%20Hyoseok%20Hwang%0AAbstract%3A%20Perspective-aware%20spatial%20reasoning%20involves%20understanding%20spatial%20relationships%20from%20specific%20viewpoints-either%20egocentric%20%28observer-centered%29%20or%20allocentric%20%28object-centered%29.%20While%20vision-language%20models%20%28VLMs%29%20perform%20well%20in%20egocentric%20settings%2C%20their%20performance%20deteriorates%20when%20reasoning%20from%20allocentric%20viewpoints%2C%20where%20spatial%20relations%20must%20be%20inferred%20from%20the%20perspective%20of%20objects%20within%20the%20scene.%20In%20this%20study%2C%20we%20address%20this%20underexplored%20challenge%20by%20introducing%20Symbolic%20Projective%20Layout%20%28SymPL%29%2C%20a%20framework%20that%20reformulates%20allocentric%20reasoning%20into%20symbolic-layout%20forms%20that%20VLMs%20inherently%20handle%20well.%20By%20leveraging%20four%20key%20factors-projection%2C%20abstraction%2C%20bipartition%2C%20and%20localization-SymPL%20converts%20allocentric%20questions%20into%20structured%20symbolic-layout%20representations.%20Extensive%20experiments%20demonstrate%20that%20this%20reformulation%20substantially%20improves%20performance%20in%20both%20allocentric%20and%20egocentric%20tasks%2C%20enhances%20robustness%20under%20visual%20illusions%20and%20multi-view%20scenarios%2C%20and%20that%20each%20component%20contributes%20critically%20to%20these%20gains.%20These%20results%20show%20that%20SymPL%20provides%20an%20effective%20and%20principled%20approach%20for%20addressing%20complex%20perspective-aware%20spatial%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2602 0and%20that%20each%20component%20contributes%20critically%20to%20these%20gains.%20These%20results%20show%20that%20SymPL%20provides%20an%20effective%20and%20principled%20approach%20for%20addressing%20complex%20perspective-aware%20spatial%20reasoning.&entry.1838667208=http%3A//arxiv.org/abs/2602.19117v2&entry.124074799=Read"},
{"title": "LUMEN: Longitudinal Multi-Modal Radiology Model for Prognosis and Diagnosis", "author": "Zhifan Jiang and Dong Yang and Vishwesh Nath and Abhijeet Parida and Nishad P. Kulkarni and Ziyue Xu and Daguang Xu and Syed Muhammad Anwar and Holger R. Roth and Marius George Linguraru", "abstract": "Large vision-language models (VLMs) have evolved from general-purpose applications to specialized use cases such as in the clinical domain, demonstrating potential for decision support in radiology. One promising application is assisting radiologists in decision-making by the analysis of radiology imaging data such as chest X-rays (CXR) via a visual and natural language question-answering (VQA) interface. When longitudinal imaging is available, radiologists analyze temporal changes, which are essential for accurate diagnosis and prognosis. The manual longitudinal analysis is a time-consuming process, motivating the development of a training framework that can provide prognostic capabilities. We introduce a novel training framework LUMEN, that is optimized for longitudinal CXR interpretation, leveraging multi-image and multi-task instruction fine-tuning to enhance prognostic and diagnostic performance. We conduct experiments on the publicly available MIMIC-CXR and its associated Medical-Diff-VQA datasets. We further formulate and construct a novel instruction-following dataset incorporating longitudinal studies, enabling the development of a prognostic VQA task. Our method demonstrates significant improvements over baseline models in diagnostic VQA tasks, and more importantly, shows promising potential for prognostic capabilities. These results underscore the value of well-designed, instruction-tuned VLMs in enabling more accurate and clinically meaningful radiological interpretation of longitudinal radiological imaging data.", "link": "http://arxiv.org/abs/2602.21142v1", "date": "2026-02-24", "relevancy": 2.8165, "topK": [{"title": "Lexicon3D: Probing Visual Foundation erpretation%2C%20leveraging%20multi-image%20and%20multi-task%20instruction%20fine-tuning%20to%20enhance%20prognostic%20and%20diagnostic%20performance.%20We%20conduct%20experiments%20on%20the%20publicly%20available%20MIMIC-CXR%20and%20its%20associated%20Medical-Diff-VQA%20datasets.%20We%20further%20formulate%20and%20construct%20a%20novel%20instruction-following%20dataset%20incorporating%20longitudinal%20studies%2C%20enabling%20the%20development%20of%20a%20prognostic%20VQA%20task.%20Our%20method%20demonstrates%20significant%20improvements%20over%20baseline%20models%20in%20diagnostic%20VQA%20tasks%2C%20and%20more%20importantly%2C%20shows%20promising%20potential%20for%20prognostic%20capabilities.%20These%20results%20underscore%20the%20value%20of%20well-designed%2C%20instruction-tuned%20VLMs%20in%20enabling%20more%20accurate%20and%20clinically%20meaningful%20radiological%20interpretation%20of%20longitudinal%20radiological%20imaging%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21142v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLUMEN%253A%2520Longitudinal%2520Multi-Modal%2520Radiology%2520Model%2520for%2520Prognosis%2520and%2520Diagnosis%26entry.906535625%3DZhifan%2520Jiang%2520and%2520Dong%2520Yang%2520and%2520Vishwesh%2520Nath%2520and%2520Abhijeet%2520Parida%2520and%2520Nishad%2520P.%2520Kulkarni%2520and%2520Ziyue%2520Xu%2520and%2520Daguang%2520Xu%2520and%2520Syed%2520Muhammad%2520Anwar%2520and%2520Holger%2520R.%2520Roth%2520and%2520Marius%2520George%2520Linguraru%26entry.1292438233%3DLarge%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520evolved%2520from%2520general-purpose%2520applications%2520to%2520specialized%2520use%2520cases%2520such%2520as%2520in%2520the%2520clinical%2520domain%252C%2520demonstrating%2520potential%2520for%2520decision%2520support%2520in%2520radiology.%2520One%2520promising%2520application%2520is%2520assisting%2520radiologists%2520in%2520de {"title": "Mask-HybridGNet: Graph-based segmentation with emergent anatomical correspondence from pixel-level supervision", "author": "Nicol\u00e1s Gaggion and Maria J. Ledesma-Carbayo and Stergios Christodoulidis and Maria Vakalopoulou and Enzo Ferrante", "abstract": "Graph-based medical image segmentation represents anatomical structures using boundary graphs, providing fixed-topology landmarks and inherent population-level correspondences. However, their clinical adoption has been hindered by a major requirement: training datasets with manually annotated landmarks that maintain point-to-point correspondences across patients rarely exist in practice. We introduce Mask-HybridGNet, a framework that trains graph-based models directly using standard pixel-wise masks, eliminating the need for manual landmark annotations. Our approach aligns variable-length ground truth boundaries with fixed-length landmark predictions by combining Chamfer distance supervision and edge-based regularization to ensure local smoothness and regular landmark distribution, further refined via differentiable rasterization. A significant emergent property of this framework is that predicted landmark positions become consistently associated with specific anatomical locations across patients without explicit correspondence supervision. This implicit atlas learning enables temporal tracking, cross-slice reconstruction, and morphological population analyses. Beyond direct segmentation, Mask-HybridGNet can extract correspondences from existing segmentation masks, allowing it to generate stable anatomical atlases from any high-quality pixel-based model. Experiments across chest radiography, cardiac ultrasound, cardiac MRI, and fetal imaging demonstrate that our model achieves competitive results against state-of-the-art pixel-based methods, while ensuring anatomical plausibility by enforcing boundary connectivity through a fixed graph adjacency matrix. This framework leverages the vast availability o {"title": "A Very Big Video Reasoning Suite", "author": "Maijunxian Wang and Ruisi Wang and Juyi Lin and Ran Ji and Thadd\u00e4us Wiedemer and Qingying Gao and Dezhi Luo and Yaoyao Qian and Lianyu Huang and Zelong Hong and Jiahui Ge and Qianli Ma and Hang He and Yifan Zhou and Lingzi Guo and Lantao Mei and Jiachen Li and Hanwen Xing and Tianqi Zhao and Fengyuan Yu and Weihang Xiao and Yizheng Jiao and Jianheng Hou and Danyang Zhang and Pengcheng Xu and Boyang Zhong and Zehong Zhao and Gaoyun Fang and John Kitaoka and Yile Xu and Hua Xu and Kenton Blacutt and Tin Nguyen and Siyuan Song and Haoran Sun and Shaoyue Wen and Linyang He and Runming Wang and Yanzhi Wang and Mengyue Yang and Ziqiao Ma and Rapha\u00ebl Milli\u00e8re and Freda Shi and Nuno Vasconcelos and Daniel Khashabi and Alan Yuille and Yilun Du and Ziming Liu and Bo Li and Dahua Lin and Ziwei Liu and Vikash Kumar and Yijiang Li and Lei Yang and Zhongang Cai and Hokin Deng", "abstract": "Rapid progress in video models has largely focused on visual quality, leaving their reasoning capabilities underexplored. Video reasoning grounds intelligence in spatiotemporally consistent visual environments that go beyond what text can naturally capture, enabling intuitive reasoning over spatiotemporal structure such as continuity, interaction, and causality. However, systematically studying video reasoning and its scaling behavior is hindered by the lack of large-scale training data. To address this gap, we introduce the Very Big Video Reasoning (VBVR) Dataset, an unprecedentedly large-scale resource spanning 200 curated reasoning tasks following a principled taxonomy and over one million video clips, approximately three orders of magnitude larger than existing datasets. We further present VBVR-Bench, a verifiable evaluation framework that moves beyond model-based judging by incorporating rule-based, human-aligned scorers, enabling reproducible and interpretable diagnosis of video reasoning capabilities. Leveraging the VBVR suite, we conduct one of the first large-scale scaling studies of video reasoning and observe early signs of emergent generalization to unseen reasoning tasks. Together, VBVR lays a foundation for the next stage of research in generalizable video reasoning. The data, benchmark toolkit, and models are publicly available at https://video-reason.com/ .", "link": "http://arxiv.org/abs/2602.20159v2", "date": "2026-02-24", "relevancy": 2.7937, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5406}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Very%20Big%20Video%20Reasoning%20Suite&body=Title%3A%20A%20Very%20Big%20Video%20Reasoning%20Suite%0AAuthor%3A%20Maijunxian%20Wang%20and%20Ruisi%20Wang%20and%20Juyi%20Lin%20and%20Ran%20Ji%20and%20Thadd%C3%A4us%20Wiedemer%20and%20Qingying%20Gao%20and%20Dezhi%20Luo%20and%20Yaoyao%20Qian%20and%20Lianyu%20Huang%20and%20Zelong%20Hong%20and%20Jiahui%20Ge%20and%20Qianli%20Ma%20and%20Hang%20He%20and%20Yifan%20Zhou%20and%20Lingzi%20Guo%20and%20Lantao%20Mei%20and%20Jiachen%20Li%20and%20Hanwen%20Xing%20and%20Tianqi%20Zhao%20and%20Fengyuan%20Yu%20and%20Weihang%20Xiao%20and%20Yizheng%20Jiao%20and%20Jianheng%20Hou%20and%20Danyang%20Zhang%20and%20Pengcheng%20Xu%20and%20Boyang%20Zhong%20and%20Zehong%20Zhao%20and%20Gaoyun%20Fang%20and%20John%20Kitaoka%20and%20Yile%20Xu%20and%20Hua%20Xu%20and%20Kenton%20Blacutt%20and%20Tin%20Nguyen%20and%20Siyuan%20Song%20and%20Haoran%20Sun%20and%20Shaoyue%20Wen%20and%20Linyang%20He%20and%20Runming%20Wang%20and%20Yanzhi%20Wang%20and%20Mengyue%20Yang%20a

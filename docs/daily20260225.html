{"title": "DVLA-RL: Dual-Level Vision-Language Alignment with Reinforcement Learning Gating for Few-Shot Learning", "author": "Wenhao Li and Xianjing Meng and Qiangchang Wang and Zhongyi Han and Zhibin Wu and Yilong Yin", "abstract": "Few-shot learning (FSL) aims to generalize to novel categories with only a few samples. Recent approaches incorporate large language models (LLMs) to enrich visual representations with semantic embeddings derived from class names. However, they overlook progressive and adaptive alignment between vision and language from low-level to high-level semantics, resulting in limited semantic gains. To address these challenges, we propose Dual-level Vision-Language Alignment with Reinforcement Learning gating (DVLA-RL), which consists of Dual-level Semantic Construction (DSC) and RL-gated Attention (RLA). Specifically, DSC conditions LLMs on both class names and support samples to generate discriminative attributes, progressively selects the most relevant ones, and then synthesizes them into coherent class descriptions. This process provides complementary low-level attributes and high-level descriptions, enabling both fine-grained grounding and holistic class understanding. To dynamically integrate dual-level semantics along with the visual network layers, RLA formulates cross-modal fusion as a sequential decision process. A lightweight policy trained with episodic REINFORCE adaptively adjusts the contributions of self-attention and cross-attention to integrate textual and visual tokens. As a result, shallow layers refine local attributes and deep layers emphasize global semantics, enabling more precise cross-modal alignment. This achieves class-specific discrimination and generalized representations with merely a few support samples. DVLA-RL achieves new state-of-the-art performance across nine benchmarks in three diverse FSL scenarios.", "link": "http://arxiv.org/abs/2602.00795v2", "date": "2026-02-24", "relevancy": 2.7916, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5655}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DVLA-RL%3A%20Dual-Level%20Vision-Language%20Alignment%20with%20Reinforcement%20Learning%20Gating%20for%20Few-Shot%20Learning&body=Title%3A%20DVLA-RL%3A%20Dual-Level%20Vision-Language%20Alignment%20with%20Reinforcement%20Learning%20Gating%20for%20Few-Shot%20Learning%0AAuthor%3A%20Wenhao%20Li%20and%20Xianjing%20Meng%20and%20Qiangchang%20Wang%20and%20Zhongyi%20Han%20and%20Zhibin%20Wu%20and%20Yilong%20Yin%0AAbstract%3A%20Few-shot%20learning%20%28FSL%29%20aims%20to%20generalize%20to%20novel%20categories%20with%20only%20a%20few%20samples.%20Recent%20approaches%20incorporate%20large%20language%20models%20%28LLMs%29%20to%20enrich%20visual%20representations%20with%20semantic%20embeddings%20derived%20from%20class%20names.%20However%2C%20they%20overlook%20progressive%20and%20adaptive%20alignment%20between%20vision%20and%20language%20from%20low-level%20to%20high-level%20semantics%2C%20resulting%20in%20limited%20semantic%20gains.%20To%20address%20these%20challenges%2C%20we%20propose%20Dual-level%20Vision-Language%20Alignment%20with%20Reinforcement%20Learning%20gating%20%28DVLA-RL%29%2C%20which%20consists%20of%20Dual-level%20Semantic%20Construction%20%28DSC%29%20and%20RL-gated%20Attention%20%28RLA%29.%20Specifically%2C%20DSC%20conditions%20LLMs%20on%20both%20class%20names%20and%20support%20samples%20to%20generate%20discriminative%20attributes%2C%20progressively%20selects%20the%20most%20relevant%20ones%2C%20and%20then%20synthesizes%20them%20into%20coherent%20class%20descriptions.%20This%20process%20provides%20complementary%20low-level%20attributes%20and%20high-level%20descriptions%2C%20enabling%20both%20fine-grained%20grounding%20and%20holistic%20class%20understanding.%20To%20dynamically%20integrate%20dual-level%20semantics%20along%20with%20the%20visual%20network%20layers%2C%20RLA%20formulates%20cross-modal%20fusion%20as%20a%20sequential%20decision%20process.%20A%20lightweight%20policy%20trained%20with%20episodic%20REINFORCE%20adaptively%20adjusts%20the%20contributions%20of%20self-attention%20and%20cross-attention%20to%20integrate%20textual%20and%20visual%20tokens.%20As%20a%20result%2C%20shallow%20layers%20refine%20local%20attributes%20and%20deep%20layers%20emphasize%20global%20semantics%2C%20enabling%20more%20precise%20cross-modal%20alignment.%20This%20achieves%20class-specific%20discrimination%20and%20generalized%20representations%20with%20merely%20a%20few%20support%20samples.%20DVLA-RL%20achieves%20new%20state-of-the-art%20performance%20across%20nine%20benchmarks%20in%20three%20diverse%20FSL%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2602.00795v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDVLA-RL%253A%2520Dual-Level%2520Vision-Language%2520Alignment%2520with%2520Reinforcement%2520Learning%2520Gating%2520for%2520Few-Shot%2520Learning%26entry.906535625%3DWenhao%2520Li%2520and%2520Xianjing%2520Meng%2520and%2520Qiangchang%2520Wang%2520and%2520Zhongyi%2520Han%2520and%2520Zhibin%2520Wu%2520and%2520Yilong%2520Yin%26entry.1292438233%3DFew-shot%2520learning%2520%2528FSL%2529%2520aims%2520to%2520generalize%2520to%2520novel%2520categories%2520with%2520only%2520a%2520few%2520samples.%2520Recent%2520approaches%2520incorporate%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520enrich%2520visual%2520representations%2520with%2520semantic%2520embeddings%2520derived%2520from%2520class%2520names.%2520However%252C%2520they%2520o {"title": "Diagnosing Causal Reasoning in Vision-Language Models via Structured Relevance Graphs", "author": "Dhita Putri Pratama and Soyeon Caren Han and Yihao Ding", "abstract": "Large Vision-Language Models (LVLMs) achieve strong performance on visual question answering benchmarks, yet often rely on spurious correlations rather than genuine causal reasoning. Existing evaluations primarily assess the correctness of the answers, making it unclear whether failures arise from limited reasoning capability or from misidentifying causally relevant information. We introduce Vision-Language Causal Graphs (VLCGs), a structured, query-conditioned representation that explicitly encodes causally relevant objects, attributes, relations, and scene-grounded assumptions. Building on this representation, we present ViLCaR, a diagnostic benchmark comprising tasks for Causal Attribution, Causal Inference, and Question Answering, along with graph-aligned evaluation metrics that assess relevance identification beyond final answer accuracy. Experiments in state-of-the-art LVLMs show that injecting structured relevance information significantly improves attribution and inference consistency compared to zero-shot and standard in-context learning. These findings suggest that current limitations in LVLM causal reasoning stem primarily from insufficient structural guidance rather than a lack of reasoning capacity.", "link": "http://arxiv.org/abs/2602.20878v1", "date": "2026-02-24", "relevancy": 2.7831, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5827}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5827}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexibl ural%20guidance%20rather%20than%20a%20lack%20of%20reasoning%20capacity.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20878v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiagnosing%2520Causal%2520Reasoning%2520in%2520Vision-Language%2520Models%2520via%2520Structured%2520Relevance%2520Graphs%26entry.906535625%3DDhita%2520Putri%2520Pratama%2520and%2520Soyeon%2520Caren%2520Han%2520and%2520Yihao%2520Ding%26entry.1292438233%3DLarge%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520achieve%2520strong%2520performance%2520on%2520visual%2520question%2520answering%2520benchmarks%252C%2520yet%2520often%2520rely%2520on%2520spurious%2520correlations%2520rather%2520than%2520genuine%2520causal%2520reasoning.%2520Existing%2520evaluations%2520primarily%2520assess%2520the%2520correctness%2520of%2520the%2520answers%252C%2520making%2520it%2520unclear%2520whether%2520failures%2520arise%2520from%2520limited%2520reasoning%2520capability%2520or%2520from%2520misidentifying%2520causally%2520relevant%2520information.%2520We%2520introduce%2520Vision-Language%2520Causal%2520Graphs%2520%2528VLCGs%2529%252C%2520a%2520structured%252C%2520query-conditioned%2520representation%2520that%2520explicitly%2520encodes%2520causally%2520relevant%2520objects%252C%2520attributes%252C%2520relations%252C%2520and%2520scene-grounded%2520assumptions.%2520Building%2520on%2520this%2520representation%252C%2520we%2520present%2520ViLCaR%252C%2520a%2520diagnostic%2520benchmark%2520comprising%2520tasks%2520for%2520Causal%2520Attribution%252C%2520Causal%2520Inference%252C%2520and%2520Question%2520Answering%252C%2520along%2520with%2520graph-aligned%2520evaluation%2520metrics%2520that%2520assess%2520relevance%2520identification%2520beyond%2520final%2520answer%2520accuracy.%2520Experiments%2520in%2520state-of-the-art%2520LVLMs%2520show%2520that%2520injecting%2520structured%2520relevance%2520information%2520significantly%2520improves%2520attribution%2520and%2520inference%2520consistency%2520compared%2520to%2520zero-shot%2520and%2520standard%2520in-context%2520learning.%2520These%2520findings%2520suggest%2520that%2520current%2520limitations%2520in%2520LVLM%2520causal%2520reasoning%2520stem%2520primarily%2520from%2520insufficient%2520structural%2520guidance%2520rather%2520than%2520a%2520lack%2520of%2520reasoning%2520capacity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20878v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Diagnosing%20Causal%20Reasoning%20in%20Vision-Language%20Models%20via%20Structured%20Relevance%20Graphs&entry.906535625=Dhita%20Putri%20Pratama%20and%20Soyeon%20Caren%20Han%20and%20Yihao%20Ding&entry.1292438233=Large%20Vision-Language%20Models%20%28LVLMs%29%20achieve%20strong%20performance%20on%20visual%20question%20answering%20benchmarks%2C%20yet%20often%20rely%20on%20spurious%20correlations%20rather%20than%20genuine%20causal%20reasoning.%20Existing%20evaluations%20primarily%20assess%20the%20correctness%20of%20the%20answers%2C%20making%20it%20unclear%20whether%20failures%20arise%20from%20limited%20reasoning%20capability%20or%20from%20misidentifying%20causally%20relevant%20information.%20We%20introduce%20Vision-Language%20Causal%20Graphs%20%28VLCGs%29%2C%20a%20structured%2C%20query-conditioned%20representation%20that%20explicitly%20encodes%20causally%20relevant%20objects%2C%20attributes%2C%20relations%2C%20and%20scene-grounded%20assumptions.%20Building%20on%20this%20representation%2C%20we%20present%20ViLCaR%2C%20a%20diagnostic%20benchmark%20comprising%20tasks%20for%20Causal%20Attribution%2C%20Causal%20Inference%2C%20and%20Question%20Answering%2C%20along%20with%20graph-aligned%20evaluation%20metrics%20that%20assess%20relevance%20identification%20beyond%20final%20answer%20accuracy.%20Experiments%20in%20state-of-the-art%20LVLMs%20show%20that%20injecting%20structured%20relevance%20information%20significantly%20improves%20attribution%20and%20inference%20consistency%20compared%20to%20zero-shot%20and%20standard%20in-context%20learning.%20These%20findings%20suggest%20that%20current%20limitations%20in%20LVLM%20causal%20reasoning%20stem%20primarily%20from%20insufficient%20structural%20guidance%20rather%20than%20a%20lack%20of%20reasoning%20capacity.&entry.1838667208=http%3A//arxiv.org/abs/2602.20878v1&entry.124074799=Read"},
{"title": "Brewing Stronger Features: Dual-Teacher Distillation for Multispectral Earth Observation", "author": "Filip Wolf and Bla\u017e Rolih and Luka \u010cehovin Zajc", "abstract": "Foundation models are transforming Earth Observation (EO), yet the diversity of EO sensors and modalities makes a single universal model unrealistic. Multiple specialized EO foundation models (EOFMs) will likely coexist, making efficient knowledge transfer across modalities essential. Most existing EO pretraining relies on masked image modeling, which emphasizes local reconstruction but provides limited control over global semantic structure. To address this, we propose a dual-teacher contrastive distillation framework for multispectral imagery that aligns the student's pretraining objective with the contrastive self-distillation paradigm of modern optical vision foundation models (VFMs). Our approach combines a multispectral teacher with an optical VFM teacher, enabling coherent cross-modal representation learning. Experiments across diverse optical and multispectral benchmarks show that our model adapts to multispectral data without compromising performance on optical-only inputs, achieving state-of-the-art results in both settings, with an average improvement of 3.64 percentage points in semantic segmentation, 1.2 in change detection, and 1.31 in classification tasks. This demonstrates that contrastive distillation provides a principled and efficient approach to scalable representation learning across heterogeneous EO data sources. Project page: \\textcolor{magenta}{https://wolfilip.github.io/DEO/}.", "link": "http://arxiv.org/abs/2602.19863v2", "date": "2026-02-24", "relevancy": 2.7219, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5508}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5508}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Brewing%20Stronger%20Features%3A%20Dual-Teacher%20Distillation%20for%20Multispectral%20Earth%20Observation&body=Title%3A%20Brewing%20Stronger%20Features%3A%20Dual-Teacher%20Distillation%20for%20Multispectral%20Earth%20Observation%0AAuthor%3A%20Filip%20Wolf%20and%20Bla%C5%BE%20Rolih%20and%20Luka%20%C4%8Cehovin%20Zajc%0AAbstract%3A%20Foundation%20models%20are%20transforming%20Earth%20Observation%20%28EO%29%2C%20yet%20the%20diversity%20of%20EO%20sensors%20and%20modalities%20makes%20a%20single%20universal%20model%20unrealistic.%20Multiple%20specialized%20EO%20foundation%20models%20%28EOFMs%29%20will%20likely%20coexist%2C%20making%20efficient%20knowledge%20transfer%20across%20modalities%20essential.%20Most%20existing%20EO%20pretraining%20relies%20on%20masked%20image%20modeling%2C%20which%20emphasizes%20local%20reconstruction%20but%20provides%20limited%20control%20over%20global%20semantic%20structure.%20To%20address%20this%2C%20we%20propose%20a%20dual-teacher%20contrastive%20distillation%20framework%20for%20multispectral%20imagery%20that%20aligns%20the%20student%27s%20pretraining%20objective%20with%20the%20contrastive%20self-distillation%20paradigm%20of%20modern%20optical%20vision%20foundation%20models%20%28VFMs%29.%20Our%20approach%20combines%20a%20multispectral%20teacher%20with%20an%20optical%20VFM%20teacher%2C%20enabling%20coherent%20cross-modal%20representation%20learning.%20Experiments%20across%20diverse%20optical%20and%20multispectral%20benchmarks%20show%20that%20our%20model%20adapts%20to%20multispectral%20data%20without%20compromising%20performance%20on%20optical-only%20inputs%2C%20achieving%20state-of-the-art%20results%20in%20both%20settings%2C%20with%20an%20average%20improvement%20of%203.64%20percentage%20points%20in%20semantic%20segmentation%2C%201.2%20in%20change%20detection%2C%20and%201.31%20in%20classification%20tasks.%20This%20demonstrates%20that%20contrastive%20distillation%20provides%20a%20principled%20and%20efficient%20approach%20to%20scalable%20representation%20learning%20across%20heterogeneous%20EO%20data%20sources.%20Project%20page%3A%20%5Ctextcolor%7Bmagenta%7D%7Bhttps%3A//wolfilip.github.io/DEO/%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19863v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrewing%2520Stronger%2520Features%253A%2520Dual-Teacher%2520Distillation%2520for%2520Multispectral%2520Earth%2520Observation%26entry.906535625%3DFilip%2520Wolf%2520and%2520Bla%25C5%25BE%2520Rolih%2520and%2520Luka%2520%25C4%258Cehovin%2520Zajc%26entry.1292438233%3DFoundation%2520models%2520are%2520transforming%2520Earth%2520Observation%2520%2528EO%2529%252C%2520yet%2520the%2520diversity%2520of%2520EO%2520sensors%2520and%2520modalities%2520makes%2520a%2520single%2520universal%2520model%2520unrealistic.%2520Multiple%2520specialized%2520EO%2520foundation%2520models%2520%2528EOFMs%2529%2520will%2520likely%2520coexist%252C%2520making%2520efficient%2520knowledge%2520transfer%2520across%2520modalities%2520essential.%2520Most%2520existing%2520EO%2520pretraining%2520relies%2520on%2520masked%2520image%2520modeling%252C%2520which%2520emphasizes%2520local%2520reconstruction%2520but%2520provides%2520limited%2520control%2520over%2520global%2520semantic%2520structure.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520dual-teacher%2520contrastive%2520distillation%2520framework%2520for%2520multispectral%2520imagery%2520that%2520aligns%2520the%2520student%2527s%2520pretraining%2520objective%2520with%2520the%2520contrastive%2520self-distillation%2520paradigm%2520of%2520modern%2520optical%2520vision%2520foundation%2520models%2520%2528VFMs%2529.%2520Our%2520approach%2520combines%2520a%2520multispect {"title": "Sound Source Localization for Spatial Mapping of Surgical Actions in Dynamic Scenes", "author": "Jonas Hein and Lazaros Vlachopoulos and Maurits Geert Laurent Olthof and Bastian Sigrist and Philipp F\u00fcrnstahl and Matthias Seibold", "abstract": "Purpose: Surgical scene understanding is key to advancing computer-aided and intelligent surgical systems. Current approaches predominantly rely on visual data or end-to-end learning, which limits fine-grained contextual modeling. This work aims to enhance surgical scene representations by integrating 3D acoustic information, enabling temporally and spatially aware multimodal understanding of surgical environments.\n  Methods: We propose a novel framework for generating 4D audio-visual representations of surgical scenes by projecting acoustic localization information from a phased microphone array onto dynamic point clouds from an RGB-D camera. A transformer-based acoustic event detection module identifies relevant temporal segments containing tool-tissue interactions which are spatially localized in the audio-visual scene representation. The system was experimentally evaluated in a realistic operating room setup during simulated surgical procedures performed by experts.\n  Results: The proposed method successfully localizes surgical acoustic events in 3D space and associates them with visual scene elements. Experimental evaluation demonstrates accurate spatial sound localization and robust fusion of multimodal data, providing a comprehensive, dynamic representation of surgical activity.\n  Conclusion: This work introduces the first approach for spatial sound localization in dynamic surgical scenes, marking a significant advancement toward multimodal surgical scene representations. By integrating acoustic and visual data, the proposed framework enables richer contextual understanding and provides a foundation for future intelligent and autonomous surgical systems.", "link": "http://arxiv.org/abs/2510.24332v2", ement%2520toward%2520multimodal%2520surgical%2520scene%2520representations.%2520By%2520integrating%2520acoustic%2520and%2520visual%2520data%252C%2520the%2520proposed%2520framework%2520enables%2520richer%2520contextual%2520understanding%2520and%2520provides%2520a%2520foundation%2520for%2520future%2520intelligent%2520and%2520autonomous%2520surgical%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.24332v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sound%20Source%20Localization%20for%20Spatial%20Mapping%20of%20Surgical%20Actions%20in%20Dynamic%20Scenes&entry.906535625=Jonas%20Hein%20and%20Lazaros%20Vlachopoulos%20and%20Maurits%20Geert%20Laurent%20Olthof%20and%20Bastian%20Sigrist%20and%20Philipp%20F%C3%BCrnstahl%20and%20Matthias%20Seibold&entry.1292438233=Purpose%3A%20Surgical%20scene%20understanding%20is%20key%20to%20advancing%20computer-aided%20and%20intelligent%20surgical%20systems.%20Current%20approaches%20predominantly%20rely%20on%20visual%20data%20or%20end-to-end%20learning%2C%20which%20limits%20fine-grained%20contextual%20modeling.%20This%20work%20aims%20to%20enhance%20surgical%20scene%20representations%20by%20integrating%203D%20acoustic%20information%2C%20enabling%20temporally%20and%20spatially%20aware%20multimodal%20understanding%20of%20surgical%20environments.%0A%20%20Methods%3A%20We%20propose%20a%20novel%20framework%20for%20generating%204D%20audio-visual%20representations%20of%20surgical%20scenes%20by%20projecting%20acoustic%20localization%20information%20from%20a%20phased%20microphone%20array%20onto%20dynamic%20point%20clouds%20from%20an%20RGB-D%20camera.%20A%20transformer-based%20acoustic%20event%20detection%20module%20identifies%20relevant%20temporal%20segments%20containing%20tool-tissue%20interactions%20which%20are%20spatially%20localized%20in%20the%20audio-visual%20scene%20representation.%20The%20system%20was%20experimentally%20eval {"title": "SOM-VQ: Topology-Aware Tokenization for Interactive Generative Models", "author": "Alessandro Londei and Denise Lanzieri and Matteo Benati", "abstract": "Vector-quantized representations enable powerful discrete generative models but lack semantic structure in token space, limiting interpretable human control. We introduce SOM-VQ, a tokenization method that combines vector quantization with Self-Organizing Maps to learn discrete codebooks with explicit low-dimensional topology. Unlike standard VQ-VAE, SOM-VQ uses topology-aware updates that preserve neighborhood structure: nearby tokens on a learned grid correspond to semantically similar states, enabling direct geometric manipulation of the latent space. We demonstrate that SOM-VQ produces more learnable token sequences in the evaluated domains while providing an explicit navigable geometry in code space. Critically, the topological organization enables intuitive human-in-the-loop control: users can steer generation by manipulating distances in token space, achieving semantic alignment without frame-level constraints. We focus on human motion generation - a domain where kinematic structure, smooth temporal continuity, and interactive use cases (choreography, rehabilitation, HCI) make topology-aware control especially natural - demonstrating controlled divergence and convergence from reference sequences through simple grid-based sampling. SOM-VQ provides a general framework for interpretable discrete representations applicable to music, gesture, and other interactive generative domains.", "link": "http://arxiv.org/abs/2602.21133v1", "date": "2026-02-24", "relevancy": 2.6777, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5432}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5379}, {"title": "Genie: Generative through%20simple%20grid-based%20sampling.%20SOM-VQ%20provides%20a%20general%20framework%20for%20interpretable%20discrete%20representations%20applicable%20to%20music%2C%20gesture%2C%20and%20other%20interactive%20generative%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21133v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSOM-VQ%253A%2520Topology-Aware%2520Tokenization%2520for%2520Interactive%2520Generative%2520Models%26entry.906535625%3DAlessandro%2520Londei%2520and%2520Denise%2520Lanzieri%2520and%2520Matteo%2520Benati%26entry.1292438233%3DVector-quantized%2520representations%2520enable%2520powerful%2520discrete%2520generative%2520models%2520but%2520lack%2520semantic%2520structure%2520in%2520token%2520space%252C%2520limiting%2520interpretable%2520human%2520control.%2520We%2520introduce%2520SOM-VQ%252C%2520a%2520tokenization%2520method%2520that%2520combines%2520vector%2520quantization%2520with%2520Self-Organizing%2520Maps%2520to%2520learn%2520discrete%2520codebooks%2520with%2520explicit%2520low-dimensional%2520topology.%2520Unlike%2520standard%2520VQ-VAE%252C%2520SOM-VQ%2520uses%2520topology-aware%2520updates%2520that%2520preserve%2520neighborhood%2520structure%253A%2520nearby%2520tokens%2520on%2520a%2520learned%2520grid%2520correspond%2520to%2520semantically%2520similar%2520states%252C%2520enabling%2520direct%2520geometric%2520manipulation%2520of%2520the%2520latent%2520space.%2520We%2520demonstrate%2520that%2520SOM-VQ%2520produces%2520more%2520learnable%2520token%2520sequences%2520in%2520the%2520evaluated%2520domains%2520while%2520providing%2520an%2520explicit%2520navigable%2520geometry%2520in%2520code%2520space.%2520Critically%252C%2520the%2520topological%2520organization%2520enables%2520intuitive%2520human-in-the-loop%2520control%253A%2520users%2520can%2520steer%2520generation%2520by%2520manipulating%2520distances%2520in%2520token%2520space%252C%2520achieving%2520semantic% {"title": "OmniOCR: Generalist OCR for Ethnic Minority Languages", "author": "Bonan Liu and Zeyu Zhang and Bingbing Meng and Han Wang and Hanshuo Zhang and Chengping Wang and Daji Ergu and Ying Cai", "abstract": "Optical character recognition (OCR) has advanced rapidly with deep learning and multimodal models, yet most methods focus on well-resourced scripts such as Latin and Chinese. Ethnic minority languages remain underexplored due to complex writing systems, scarce annotations, and diverse historical and modern forms, making generalization in low-resource or zero-shot settings challenging. To address these challenges, we present OmniOCR, a universal framework for ethnic minority scripts. OmniOCR introduces Dynamic Low-Rank Adaptation (Dynamic LoRA) to allocate model capacity across layers and scripts, enabling effective adaptation while preserving knowledge.A sparsity regularization prunes redundant updates, ensuring compact and efficient adaptation without extra inference cost. Evaluations on TibetanMNIST, Shui, ancient Yi, and Dongba show that OmniOCR outperforms zero-shot foundation models and standard post training, achieving state-of-the-art accuracy with superior parameter efficiency, and compared with the state-of-the-art baseline models, it improves accuracy by 39%-66% on these four datasets. Code: https://github.com/AIGeeksGroup/OmniOCR.", "link": "http://arxiv.org/abs/2602.21042v1", "date": "2026-02-24", "relevancy": 2.6256, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5241}], "mailto": "mai {"title": "Distributional Vision-Language Alignment by Cauchy-Schwarz Divergence", "author": "Wenzhe Yin and Zehao Xiao and Pan Zhou and Shujian Yu and Jiayi Shen and Jan-Jakob Sonke and Efstratios Gavves", "abstract": "Vision-language alignment is crucial for various downstream tasks such as cross-modal generation and retrieval. Previous multimodal approaches like CLIP utilize InfoNCE to maximize mutual information, primarily aligning pairwise samples across modalities while overlooking distributional differences. In addition, InfoNCE has inherent conflict in terms of alignment and uniformity in multimodality, leading to suboptimal alignment with modality gaps. To overcome the limitations, we propose CS-Aligner, a novel framework that performs distributional vision-language alignment by integrating Cauchy-Schwarz (CS) divergence with mutual information. CS-Aligner captures both the global distribution information of each modality and the pairwise semantic relationships. We find that the CS divergence seamlessly addresses the InfoNCE's alignment-uniformity conflict and serves complementary roles with InfoNCE, yielding tighter and more precise alignment. Moreover, by introducing distributional alignment, CS-Aligner enables incorporating additional information from unpaired data and token-level representations, enhancing flexible and fine-grained alignment in practice. Experiments on text-to-image generation and cross-modality retrieval tasks demonstrate the effectiveness of our method on vision-language alignment.", "link": "http://arxiv.org/abs/2502.17028v3", "date": "2026-02-24", "relevancy": 2.6076, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5249}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5249}, {"title": "TAMM: TriAdapter Multi-Mo actice.%20Experiments%20on%20text-to-image%20generation%20and%20cross-modality%20retrieval%20tasks%20demonstrate%20the%20effectiveness%20of%20our%20method%20on%20vision-language%20alignment.%0ALink%3A%20http%3A//arxiv.org/abs/2502.17028v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDistributional%2520Vision-Language%2520Alignment%2520by%2520Cauchy-Schwarz%2520Divergence%26entry.906535625%3DWenzhe%2520Yin%2520and%2520Zehao%2520Xiao%2520and%2520Pan%2520Zhou%2520and%2520Shujian%2520Yu%2520and%2520Jiayi%2520Shen%2520and%2520Jan-Jakob%2520Sonke%2520and%2520Efstratios%2520Gavves%26entry.1292438233%3DVision-language%2520alignment%2520is%2520crucial%2520for%2520various%2520downstream%2520tasks%2520such%2520as%2520cross-modal%2520generation%2520and%2520retrieval.%2520Previous%2520multimodal%2520approaches%2520like%2520CLIP%2520utilize%2520InfoNCE%2520to%2520maximize%2520mutual%2520information%252C%2520primarily%2520aligning%2520pairwise%2520samples%2520across%2520modalities%2520while%2520overlooking%2520distributional%2520differences.%2520In%2520addition%252C%2520InfoNCE%2520has%2520inherent%2520conflict%2520in%2520terms%2520of%2520alignment%2520and%2520uniformity%2520in%2520multimodality%252C%2520leading%2520to%2520suboptimal%2520alignment%2520with%2520modality%2520gaps.%2520To%2520overcome%2520the%2520limitations%252C%2520we%2520propose%2520CS-Aligner%252C%2520a%2520novel%2520framework%2520that%2520performs%2520distributional%2520vision-language%2520alignment%2520by%2520integrating%2520Cauchy-Schwarz%2520%2528CS%2529%2520divergence%2520with%2520mutual%2520information.%2520CS-Aligner%2520captures%2520both%2520the%2520global%2520distribution%2520information%2520of%2520each%2520modality%2520and%2520the%2520pairwise%2520semantic%2520relationships.%2520We%2520find%2520that%2520the%2520CS%2520divergence%2520seamlessly%2520addresses%2520the%2520InfoNCE%2527s%2520alignment-uniformity%2520con {"title": "Language Modeling and Understanding Through Paraphrase Generation and Detection", "author": "Jan Philip Wahle", "abstract": "Language enables humans to share knowledge, reason about the world, and pass on strategies for survival and innovation across generations. At the heart of this process is not just the ability to communicate but also the remarkable flexibility in how we can express ourselves. We can express the same thoughts in virtually infinite ways using different words and structures - this ability to rephrase and reformulate expressions is known as paraphrase. Modeling paraphrases is a keystone to meaning in computational language models; being able to construct different variations of texts that convey the same meaning or not shows strong abilities of semantic understanding. If computational language models are to represent meaning, they must understand and control the different aspects that construct the same meaning as opposed to different meanings at a fine granularity. Yet most existing approaches reduce paraphrasing to a binary decision between two texts or to producing a single rewrite of a source, obscuring which linguistic factors are responsible for meaning preservation. In this thesis, I propose that decomposing paraphrases into their constituent linguistic aspects (paraphrase types) offers a more fine-grained and cognitively grounded view of semantic equivalence. I show that even advanced machine learning models struggle with this task. Yet, when explicitly trained on paraphrase types, models achieve stronger performance on related paraphrase tasks and downstream applications. For example, in plagiarism detection, language models trained on paraphrase types surpass human baselines: 89.6% accuracy compared to 78.4% for plagiarism cases from Wikipedia, and 66.5% compared to 55.7% for plagiarism of scientific papers from arXiv. In identifying duplicate questions on Quora, models trained with paraphrase types improve over models trained {"title": "Echoes Over Time: Unlocking Length Generalization in Video-to-Audio Generation Models", "author": "Christian Simon and MAsato Ishii and Wei-Yao Wang and Koichi Saito and Akio Hayakawa and Dongseok Shim and Zhi Zhong and Shuyang Cui and Shusuke Takahashi and Takashi Shibuya and Yuki Mitsufuji", "abstract": "Scaling multimodal alignment between video and audio is challenging, particularly due to limited data and the mismatch between text descriptions and frame-level video information. In this work, we tackle the scaling challenge in multimodal-to-audio generation, examining whether models trained on short instances can generalize to longer ones during testing. To tackle this challenge, we present multimodal hierarchical networks so-called MMHNet, an enhanced extension of state-of-the-art video-to-audio models. Our approach integrates a hierarchical method and non-causal Mamba to support long-form audio generation. Our proposed method significantly improves long audio generation up to more than 5 minutes. We also prove that training short and testing long is possible in the video-to-audio generation tasks without training on the longer durations. We show in our experiments that our proposed method could achieve remarkable results on long-video to audio benchmarks, beating prior works in video-to-audio tasks. Moreover, we showcase our model capability in generating more than 5 minutes, while prior video-to-audio methods fall short in generating with long durations.", "link": "http://arxiv.org/abs/2602.20981v1", "date": "2026-02-24", "relevancy": 2.5949, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5303}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.516}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/ {"title": "Ecological mapping with geospatial foundation models", "author": "Craig Mahlasi and Gciniwe S. Baloyi and Zaheed Gaffoor and Levente Klein and Anne Jones and Etienne Vos and Michal Muszynski and Geoffrey Dawson and Campbell Watson", "abstract": "The value of Earth observation foundation models for high-impact ecological applications remains insufficiently characterized. This study is one of the first to systematically evaluate the performance, limitations and practical considerations across three common ecological use cases: forest functional trait estimation, land use and land cover mapping and peatland detection. We fine-tune two pretrained models (Prithvi-EO-2.0 and TerraMind) and benchmark them against a ResNet-101 baseline using datasets collected from open sources. Across all tasks, Prithvi-EO-2.0 and TerraMind consistently outperform the ResNet baseline, demonstrating improved generalization and transfer across ecological domains. TerraMind marginally exceeds Prithvi-EO-2.0 in unimodal settings and shows substantial gains when additional modalities are incorporated. However, performance is sensitive to divergence between downstream inputs and pretraining modalities, underscoring the need for careful dataset alignment. Results also indicate that higher-resolution inputs and more accurate pixel-level labels remain critical for capturing fine-scale ecological dynamics.", "link": "http://arxiv.org/abs/2602.10720v2", "date": "2026-02-24", "relevancy": 2.5688, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5342}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5342}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4729}], %2520Results%2520also%2520indicate%2520that%2520higher-resolution%2520inputs%2520and%2520more%2520accurate%2520pixel-level%2520labels%2520remain%2520critical%2520for%2520capturing%2520fine-scale%2520ecological%2520dynamics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.10720v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Ecological%20mapping%20with%20geospatial%20foundation%20models&entry.906535625=Craig%20Mahlasi%20and%20Gciniwe%20S.%20Baloyi%20and%20Zaheed%20Gaffoor%20and%20Levente%20Klein%20and%20Anne%20Jones%20and%20Etienne%20Vos%20and%20Michal%20Muszynski%20and%20Geoffrey%20Dawson%20and%20Campbell%20Watson&entry.1292438233=The%20value%20of%20Earth%20observation%20foundation%20models%20for%20high-impact%20ecological%20applications%20remains%20insufficiently%20characterized.%20This%20study%20is%20one%20of%20the%20first%20to%20systematically%20evaluate%20the%20performance%2C%20limitations%20and%20practical%20considerations%20across%20three%20common%20ecological%20use%20cases%3A%20forest%20functional%20trait%20estimation%2C%20land%20use%20and%20land%20cover%20mapping%20and%20peatland%20detection.%20We%20fine-tune%20two%20pretrained%20models%20%28Prithvi-EO-2.0%20and%20TerraMind%29%20and%20benchmark%20them%20against%20a%20ResNet-101%20baseline%20using%20datasets%20collected%20from%20open%20sources.%20Across%20all%20tasks%2C%20Prithvi-EO-2.0%20and%20TerraMind%20consistently%20outperform%20the%20ResNet%20baseline%2C%20demonstrating%20improved%20generalization%20and%20transfer%20across%20ecological%20domains.%20TerraMind%20marginally%20exceeds%20Prithvi-EO-2.0%20in%20unimodal%20settings%20and%20shows%20substantial%20gains%20when%20additional%20modalities%20are%20incorporated.%20However%2C%20performance%20is%20sensitive%20to%20divergence%20between%20downstream%20inputs%20and%20pretraining%20modalities%2C%20underscoring%20the%20need%20for%20careful%20dataset%2 {"title": "FLIM Networks with Bag of Feature Points", "author": "Jo\u00e3o Deltregia Martinelli and Marcelo Luis Rodrigues Filho and Felipe Crispim da Rocha Salvagnini and Gilson Junior Soares and Jefersson A. dos Santos and Alexandre X. Falc\u00e3o", "abstract": "Convolutional networks require extensive image annotation, which can be costly and time-consuming. Feature Learning from Image Markers (FLIM) tackles this challenge by estimating encoder filters (i.e., kernel weights) from user-drawn markers on discriminative regions of a few representative images without traditional optimization. Such an encoder combined with an adaptive decoder comprises a FLIM network fully trained without backpropagation. Prior research has demonstrated their effectiveness in Salient Object Detection (SOD), being significantly lighter than existing lightweight models. This study revisits FLIM SOD and introduces FLIM-Bag of Feature Points (FLIM-BoFP), a considerably faster filter estimation method. The previous approach, FLIM-Cluster, derives filters through patch clustering at each encoder's block, leading to computational overhead and reduced control over filter locations. FLIM-BoFP streamlines this process by performing a single clustering at the input block, creating a bag of feature points, and defining filters directly from mapped feature points across all blocks. The paper evaluates the benefits in efficiency, effectiveness, and generalization of FLIM-BoFP compared to FLIM-Cluster and other state-of-the-art baselines for parasite detection in optical microscopy images.", "link": "http://arxiv.org/abs/2602.20845v1", "date": "2026-02-24", "relevancy": 2.5495, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5367}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5006}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4924}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FLIM%20Networks%20with%20Bag%20of%20Feature%20Points&body=Title%3A%20FLIM%20Networks%20with%20Bag%20of%20Feature%20Points%0AAuthor%3A%20Jo%C3%A3o%20Deltregia%20Martinelli%20and%20Marcelo%20Luis%20Rodrigues%20Filho%20and%20Felipe%20Crispim%20da%20Rocha%20Salvagnini%20and%20Gilson%20Junior%20Soares%20and%20Jefersson%20A.%20dos%20Santos%20and%20Alexandre%20X.%20Falc%C3%A3o%0AAbstract%3A%20Convolutional%20networks%20require%20extensive%20image%20annotation%2C%20which%20can%20be%20costly%20and%20time-consuming.%20Feature%20Learning%20from%20Image%20Markers%20%28FLIM%29%20tackles%20this%20challenge%20by%20estimating%20encoder%20filters%20%28i.e.%2C%20kernel%20weights%29%20from%20user-drawn%20markers%20on%20discriminative%20regions%20of%20a%20few%20representative%20images%20without%20traditional%20optimization.%20Such%20an%20encoder%20combined%20with%20an%20adaptive%20decoder%20comprises%20a%20FLIM%20network%20fully%20trained%20without%20backpropagation.%20Prior%20research%20has%20demonstrated%20their%20effectiveness%20in%20Salient%20Object%20Detection%20%28SOD%29%2C%20being%20significantly%20lighter%20than%20existing%20lightweight%20models.%20This%20study%20revisits%20FLIM%20SOD%20and%20introduces%20FLIM-Bag%20of%20Feature%20Points%20%28FLIM-BoFP%29%2C%20a%20considerably%20faster%20filter%20estimation%20method.%20The%20previous%20approach%2C%20FLIM-Cluster%2C%20derives%20filters%20through%20patch%20clustering%20at%20each%20encoder%27s%20block%2C%20leading%20to%20computational%20overhead%20and%20reduced%20control%20over%20filter%20locations.%20FLIM-BoFP%20streamlines%20this%20process%20by%20performing%20a%20single%20clustering%20at%20the%20input%20block%2C%20creating%20a%20bag%20of%20feature%20points%2C%20and%20defining%20filters%20directly%20from%20mapped%20feature%20points%20across%20all%20blocks.%20The%20paper%20evaluates%20the%20benefits%20in%20efficiency%2C%20effectiveness%2C%20and%20generalization%20of%20FLIM-BoFP%20compared%20to%20FLIM-Cluster%20and%20other%20state-of-the-art%20baselines%20for%20parasite%20detection%20in%20optical%20microscopy%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20845v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFLIM%2520Networks%2520with%2520Bag%2520of%2520Feature%2520Points%26entry.906535625%3DJo%25C3%25A3o%2520Deltregia%2520Martinelli%2520and%2520Marcelo%2520Luis%2520Rodrigues%2520Filho%2520and%2520Felipe%2520Crispim%2520da%2520Rocha%2520Salvagnini%2520and%2520Gilson%2520Junior%2520Soares%2520and%2520Jefersson%2520A.%2520dos%2520Santos%2520and%2520Alexandre%2520X.%2520Falc%25C3%25A3o%26entry.1292438233%3DConvolutional%2520networks%2520require%2520extensive%2520image%2520annotation%252C%2520which%2520can%2520be%2520costly%2520and%2520time-consuming.%2520Feature%2520Learning%2520from%2520Image%2520Markers%2520%2528FLIM%2529%2520tackles%2520this%2520challenge%2520by%2520estimating%2520encoder%2520filters%2520%2528i.e.%252C%2520kernel%2520weights%2529%2520from%2520user-drawn%2520markers%2520on%2520discriminative%2520regions%2520of%2520a%2520few%2520representative%2520images%2520without%2520traditional%2520optimization.%2520Such%2520an%2520encoder%2520combined%2520with%2520an%2520adaptive%2520decoder%2520comprises%2520a%2520FLIM%2520network%2520fully%2520trained%2520without%2520backpropagation.%2520Prior%2520research%2520has%2520demonstrated%2520their%2520effectiveness%2520in%2520Salient%2520Object%2520Detection%2520%2528SOD%2529%252C%2520being%2520significantly%2520lighter%2520than%2520existing%2520lightweight%2520models.%2520This%2520study%2520revisits%2520FLIM%2520SOD%2520and%2520introduces%2520FLIM-Bag%2520of%2520Featur {"title": "A Survey on the Optimization of Large Language Model-based Agents", "author": "Shangheng Du and Jiabao Zhao and Jinxin Shi and Zhentao Xie and Xin Jiang and Yanhong Bai and Liang He", "abstract": "With the rapid development of Large Language Models (LLMs), LLM-based agents have been widely adopted in various fields, becoming essential for autonomous decision-making and interactive tasks. However, current work typically relies on prompt design or fine-tuning strategies applied to vanilla LLMs, which often leads to limited effectiveness or suboptimal performance in complex agent-related environments. Although LLM optimization techniques can improve model performance across many general tasks, they lack specialized optimization towards critical agent functionalities such as long-term planning, dynamic environmental interaction, and complex decision-making. Although numerous recent studies have explored various strategies to optimize LLM-based agents for complex agent tasks, a systematic review summarizing and comparing these methods from a holistic perspective is still lacking. In this survey, we provide a comprehensive review of LLM-based agent optimization approaches, categorizing them into parameter-driven and parameter-free methods. We first focus on parameter-driven optimization, covering fine-tuning-based optimization, reinforcement learning-based optimization, and hybrid strategies, analyzing key aspects such as trajectory data construction, fine-tuning techniques, reward function design, and optimization algorithms. Additionally, we briefly discuss parameter-free strategies that optimize agent behavior through prompt engineering and external knowledge retrieval. Finally, we summarize the datasets and benchmarks used for evaluation and tuning, review key applications of LLM-based agents, and discuss major challenges and promising future directions. Our repository for related references is available at https://github.com/YoungDubbyDu/LLM-Agent-Optimization.", "link": "http://arxiv.org/abs/2503.12434v2", "date": "2026-02-24", "relevancy": 2.5459, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5113}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5113}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5049}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Survey%20on%20the%20Optimization%20of%20Large%20Language%20Model-based%20Agents&body=Title%3A%20A%20Survey%20on%20the%20Optimization%20of%20Large%20Language%20Model-based%20Agents%0AAuthor%3A%20Shangheng%20Du%20and%20Jiabao%20Zhao%20and%20Jinxin%20Shi%20and%20Zhentao%20Xie%20and%20Xin%20Jiang%20and%20Yanhong%20Bai%20and%20Liang%20He%0AAbstract%3A%20With%20the%20rapid%20development%20of%20Large%20Language%20Models%20%28LLMs%29%2C%20LLM-based%20agents%20have%20been%20widely%20adopted%20in%20various%20fields%2C%20becoming%20essential%20for%20autonomous%20decision-making%20and%20interactive%20tasks.%20However%2C%20current%20work%20typically%20relies%20on%20prompt%20design%20or%20fine-tuning%20strategies%20applied%20to%20vanilla%20LLMs%2C%20which%20often%20leads%20to%20limited%20effectiveness%20or%20suboptimal%20performance%20in%20complex%20agent-related%20environments.%20Although%20LLM%20optimization%20techniques%20can%20improve%20model%20performance%20across%20many%20general%20tasks%2C%20they%20lack%20specialized%20optimization%20towards%20critical%20agent%20functionalities%20such%20as%20long-term%20planning%2C%20dynamic%20environmental%20interaction%2C%20and%20complex%20decision-making.%20Although%20numerous%20recent%20studies%20have%20explored%20various%20strategies%20to%20optimize%20LLM-based%20agents%20for%20complex%20agent%20tasks%2C%20a%20systematic%20review%20summarizing%20and%20comparing%20these%20methods%20from%20a%20holistic%20perspective%20is%20still%20lacking.%20In%20this%20survey%2C%20we%20provide%20a%20comprehensive%20review%20of%20LLM-based%20agent%20optimization%20approaches%2C%20categorizing%20them%20into%20parameter-driven%20and%20parameter-free%20methods.%20We%20first%20focus%20on%20parameter-driven%20optimization%2C%20covering%20fine-tuning-based%20optimization%2C%20reinforcement%20learning-based%20optimization%2C%20and%20hybrid%20strategies%2C%20analyzing%20key%20aspects%20such%20as%20trajectory%20data%20construction%2C%20fine-tuning%20techniques%2C%20reward%20function%20design%2C%20and%20optimization%20algorithms.%20Additionally%2C%20we%20briefly%20discuss%20parameter-free%20strategies%20that%20optimize%20agent%20behavior%20through%20prompt%20engineering%20and%20external%20knowledge%20retrieval.%20Finally%2C%20we%20summarize%20the%20datasets%20and%20benchmarks%20used%20for%20evaluation%20and%20tuning%2C%20review%20key%20applications%20of%20LLM-based%20agents%2C%20and%20discuss%20major%20challenges%20and%20promising%20future%20directions.%20Our%20repository%20for%20related%20references%20is%20available%20at%20https%3A//github.com/YoungDubbyDu/LLM-Agent-Optimization.%0ALink%3A%20http%3A//arxiv.org/abs/2503.12434v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Survey%2520on%2520the%2520Optimization%2520of%2520Large%2520Language%2520Model-based%2520Agents%26entry.906535625%3DShangheng%2520Du%2520and%2520Jiabao%2520Zhao%2520and%2520Jinxin%2520Shi%2520and%2520Zhentao%2520Xie%2520and%2520Xin%2520Jiang%2520and%2520Yanhong%2520Bai%2520and%2520Liang%2520He%26entry.1292438233%3DWith%2520the%2520rapid%2520development%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520LLM-based%2520agents%2520have%2520been%2520widely%2520adopted%2520in%2520various%2520fields%252C%2520becomin {"title": "From Isolation to Integration: Building an Adaptive Expert Forest for Pre-Trained Model-based Class-Incremental Learning", "author": "Ruiqi Liu and Boyu Diao and Hangda Liu and Zhulin An and Fei Wang and Yongjun Xu", "abstract": "Class-Incremental Learning (CIL) requires models to learn new classes without forgetting old ones. A common method is to freeze a pre-trained model and train a new, lightweight adapter for each task. While this prevents forgetting, it treats the learned knowledge as a simple, unstructured collection and fails to use the relationships between tasks. To this end, we propose the Semantic-guided Adaptive Expert Forest (SAEF), a new method that organizes adapters into a structured hierarchy for better knowledge sharing. SAEF first groups tasks into conceptual clusters based on their semantic relationships. Then, within each cluster, it builds a balanced expert tree by creating new adapters from merging the adapters of similar tasks. At inference time, SAEF finds and activates a set of relevant experts from the forest for any given input. The final prediction is made by combining the outputs of these activated experts, weighted by how confident each expert is. Experiments on several benchmark datasets show that SAEF achieves SOTA performance.", "link": "http://arxiv.org/abs/2602.20911v1", "date": "2026-02-24", "relevancy": 2.5441, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5211}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5044}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Isolation%20to%20Integration%3A%20Building%20an%20Adaptive%20Expert%20Forest%20for%20Pre-Trained%20Model-based%20Class-Incremental%20Learning&body=Title%3A%20From%20Isolation%20to%20Integration%3A%20Building%20an%20Adaptive%20Expert%20Forest%20for%20Pre-Trained%20Model-based%20Class-Incremental%20Learning%0AAuthor%3A%20Ruiqi%20Liu%20and%20Boyu%20Diao%20and%20Hangda%20Liu%20and%20Zhulin%20An%20and%20Fei%20Wang%20and%20Yongjun%20Xu%0AAbstract%3A%20Class-Incremental%20Learning%20%28CIL%29%20requires%20models%20to%20learn%20new%20classes%20without%20forgetting%20old%20ones.%20A%20common%20method%20is%20to%20freeze%20a%20pre-trained%20model%20and%20train%20a%20new%2C%20lightweight%20adapter%20for%20each%20task.%20While%20this%20prevents%20forgetting%2C%20it%20treats%20the%20learned%20knowledge%20as%20a%20simple%2C%20unstructured%20collection%20and%20fails%20to%20use%20the%20relationships%20between%20tasks.%20To%20this%20end%2C%20we%20propose%20the%20Semantic-guided%20Adaptive%20Expert%20Forest%20%28SAEF%29%2C%20a%20new%20method%20that%20organizes%20adapters%20into%20a%20structured%20hierarchy%20for%20better%20knowledge%20sharing.%20SAEF%20first%20groups%20tasks%20into%20conceptual%20clusters%20based%20on%20their%20semantic%20relationships.%20Then%2C%20within%20each%20cluster%2C%20it%20builds%20a%20balanced%20expert%20tree%20by%20creating%20new%20adapters%20from%20merging%20the%20adapters%20of%20similar%20tasks.%20At%20inference%20time%2C%20SAEF%20finds%20and%20activates%20a%20set%20of%20relevant%20experts%20from%20the%20forest%20for%20any%20given%20input.%20The%20final%20prediction%20is%20made%20by%20combining%20the%20outputs%20of%20these%20activated%20experts%2C%20weighted%20by%20how%20confident%20each%20expert%20is.%20Experiments%20on%20several%20benchmark%20datasets%20show%20that%20SAEF%20achieves%20SOTA%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20911v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m onfident%2520each%2520expert%2520is.%2520Experiments%2520on%2520several%2520benchmark%2520datasets%2520show%2520that%2520SAEF%2520achieves%2520SOTA%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20911v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Isolation%20to%20Integration%3A%20Building%20an%20Adaptive%20Expert%20Forest%20for%20Pre-Trained%20Model-based%20Class-Incremental%20Learning&entry.906535625=Ruiqi%20Liu%20and%20Boyu%20Diao%20and%20Hangda%20Liu%20and%20Zhulin%20An%20and%20Fei%20Wang%20and%20Yongjun%20Xu&entry.1292438233=Class-Incremental%20Learning%20%28CIL%29%20requires%20models%20to%20learn%20new%20classes%20without%20forgetting%20old%20ones.%20A%20common%20method%20is%20to%20freeze%20a%20pre-trained%20model%20and%20train%20a%20new%2C%20lightweight%20adapter%20for%20each%20task.%20While%20this%20prevents%20forgetting%2C%20it%20treats%20the%20learned%20knowledge%20as%20a%20simple%2C%20unstructured%20collection%20and%20fails%20to%20use%20the%20relationships%20between%20tasks.%20To%20this%20end%2C%20we%20propose%20the%20Semantic-guided%20Adaptive%20Expert%20Forest%20%28SAEF%29%2C%20a%20new%20method%20that%20organizes%20adapters%20into%20a%20structured%20hierarchy%20for%20better%20knowledge%20sharing.%20SAEF%20first%20groups%20tasks%20into%20conceptual%20clusters%20based%20on%20their%20semantic%20relationships.%20Then%2C%20within%20each%20cluster%2C%20it%20builds%20a%20balanced%20expert%20tree%20by%20creating%20new%20adapters%20from%20merging%20the%20adapters%20of%20similar%20tasks.%20At%20inference%20time%2C%20SAEF%20finds%20and%20activates%20a%20set%20of%20relevant%20experts%20from%20the%20forest%20for%20any%20given%20input.%20The%20final%20prediction%20is%20made%20by%20combining%20the%20outputs%20of%20these%20activated%20experts%2C%20weighted%20by%20how%20confident%20each%20expert%20is.%20Experiments%20on%20several%20benc {"title": "BioX-Bridge: Model Bridging for Unsupervised Cross-Modal Knowledge Transfer across Biosignals", "author": "Chenqi Li and Yu Liu and Timothy Denison and Tingting Zhu", "abstract": "Biosignals offer valuable insights into the physiological states of the human body. Although biosignal modalities differ in functionality, signal fidelity, sensor comfort, and cost, they are often intercorrelated, reflecting the holistic and interconnected nature of human physiology. This opens up the possibility of performing the same tasks using alternative biosignal modalities, thereby improving the accessibility, usability, and adaptability of health monitoring systems. However, the limited availability of large labeled datasets presents challenges for training models tailored to specific tasks and modalities of interest. Unsupervised cross-modal knowledge transfer offers a promising solution by leveraging knowledge from an existing modality to support model training for a new modality. Existing methods are typically based on knowledge distillation, which requires running a teacher model alongside student model training, resulting in high computational and memory overhead. This challenge is further exacerbated by the recent development of foundation models that demonstrate superior performance and generalization across tasks at the cost of large model sizes. To this end, we explore a new framework for unsupervised cross-modal knowledge transfer of biosignals by training a lightweight bridge network to align the intermediate representations and enable information flow between foundation models and across modalities. Specifically, we introduce an efficient strategy for selecting alignment positions where the bridge should be constructed, along with a flexible prototype network as the bridge architecture. Extensive experiments across multiple biosignal modalities, tasks, and datasets show that BioX-Bridge reduces the number of trainable parameters by 88--99\\% while maintaining or even improving transfer performance compared to state-of-the-art methods.", "link": "http://arxiv.org/abs/2510.02276v2", "date": "2026-02-24", "relevancy": 2.544, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5195}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5035}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5035}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BioX-Bridge%3A%20Model%20Bridging%20for%20Unsupervised%20Cross-Modal%20Knowledge%20Transfer%20across%20Biosignals&body=Title%3A%20BioX-Bridge%3A%20Model%20Bridging%20for%20Unsupervised%20Cross-Modal%20Knowledge%20Transfer%20across%20Biosignals%0AAuthor%3A%20Chenqi%20Li%20and%20Yu%20Liu%20and%20Timothy%20Denison%20and%20Tingting%20Zhu%0AAbstract%3A%20Biosignals%20offer%20valuable%20insights%20into%20the%20physiological%20states%20of%20the%20human%20body.%20Although%20biosignal%20modalities%20differ%20in%20functionality%2C%20signal%20fidelity%2C%20sensor%20comfort%2C%20and%20cost%2C%20they%20are%20often%20intercorrelated%2C%20reflecting%20the%20holistic%20and%20interconnected%20nature%20of%20human%20physiology.%20This%20opens%20up%20the%20possibility%20of%20performing%20the%20same%20tasks%20using%20alternative%20biosignal%20modalities%2C%20thereby%20improving%20the%20accessibility%2C%20usability%2C%20and%20adaptability%20of%20health%20monitoring%20systems.%20However%2C%20the%20limited%20availability%20of%20large%20labeled%20datasets%20presents%20challenges%20for%20training%20models%20tailored%20to%20specific%20tasks%20and%20modalities%20of%20interest.%20Unsupervised%20cross-modal%20knowledge%20transfer%20offers%20a%20promising%20solution%20by%20leveraging%20knowledge%20from%20an%20existing%20modality%20to%20support%20model%20training%20for%20a%20new%20modality.%20Existing%20methods%20are%20typically%20based%20on%20knowledge%20distillation%2C%20which%20requires%20running%20a%20teacher%20model%20alongside%20student%20model%20training%2C%20resulting%20in%20high%20computational%20and%20memory%20overhead.%20This%20challenge%20is%20further%20exacerbated%20by%20the%20recent%20development%20of%20foundation%20models%20that%20demonstrate%20superior%20performance%20and%20generalization%20across%20tasks%20at%20the%20cost%20of%20large%20model%20sizes.%20To%20this%20end%2C%20we%20explore%20a%20new%20framework%20for%20unsupervised%20cross-modal%20knowledge%20transfer%20of%20biosignals%20by%20training%20a%20lightweight%20bridge%20network%20to%20align%20the%20intermediate%20representations%20and%20enable%20information%20flow%20between%20foundation%20models%20and%20across%20modalities.%20Specifically%2C%20we%20introduce%20an%20efficient%20strategy%20for%20selecting%20alignment%20positions%20where%20the%20bridge%20should%20be%20constructed%2C%20along%20with%20a%20flexible%20prototype%20network%20as%20the%20bridge%20architecture.%20Extensive%20experiments%20across%20multiple%20biosignal%20modalities%2C%20tasks%2C%20and%20datasets%20show%20that%20BioX-Bridge%20reduces%20the%20number%20of%20trainable%20parameters%20by%2088--99%5C%25%20while%20maintaining%20or%20even%20improving%20transfer%20performance%20compared%20to%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2510.02276v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBioX-Bridge%253A%2520Model%2520Bridging%2520for%2520Unsupervised%2520Cross-Modal%2520Knowledge%2520Transfer%2520across%2520Biosignals%26entry.906535625%3DChenqi%2520Li%2520and%2520Yu%2520Liu%2520and%2520Timothy%2520Denison%2520and%2520Tingting%2520Zhu%26entry.1292438233%3DBiosignals%2520offer%2520valuable%2520insights%2520in tweight%2520bridge%2520network%2520to%2520align%2520the%2520intermediate%2520representations%2520and%2520enable%2520information%2520flow%2520between%2520foundation%2520models%2520and%2520across%2520modalities.%2520Specifically%252C%2520we%2520introduce%2520an%2520efficient%2520strategy%2520for%2520selecting%2520alignment%2520positions%2520where%2520the%2520bridge%2520should%2520be%2520constructed%252C%2520along%2520with%2520a%2520flexible%2520prototype%2520network%2520as%2520the%2520bridge%2520architecture.%2520Extensive%2520experiments%2520across%2520multiple%2520biosignal%2520modalities%252C%2520tasks%252C%2520and%2520datasets%2520show%2520that%2520BioX-Bridge%2520reduces%2520the%2520number%2520of%2520trainable%2520parameters%2520by%252088--99%255C%2525%2520while%2520maintaining%2520or%2520even%2520improving%2520transfer%2520performance%2520compared%2520to%2520state-of-the-art%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.02276v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BioX-Bridge%3A%20Model%20Bridging%20for%20Unsupervised%20Cross-Modal%20Knowledge%20Transfer%20across%20Biosignals&entry.906535625=Chenqi%20Li%20and%20Yu%20Liu%20and%20Timothy%20Denison%20and%20Tingting%20Zhu&entry.1292438233=Biosignals%20offer%20valuable%20insights%20into%20the%20physiological%20states%20of%20the%20human%20body.%20Although%20biosignal%20modalities%20differ%20in%20functionality%2C%20signal%20fidelity%2C%20sensor%20comfort%2C%20and%20cost%2C%20they%20are%20often%20intercorrelated%2C%20reflecting%20the%20holistic%20and%20interconnected%20nature%20of%20human%20physiology.%20This%20opens%20up%20the%20possibility%20of%20performing%20the%20same%20tasks%20using%20alternative%20biosignal%20modalities%2C%20thereby%20improving%20the%20accessibility%2C%20usability%2C%20and%20adaptability%20of%20health%20monitoring%20systems.%20However%2C%20the%20limited%20availability%20of%20large%20labeled%20datasets%20presents%20challenges%20for%20training%20models%20tailored%20to%20specific%20tasks%20and%20modalities%20of%20interest.%20Unsupervised%20cross-modal%20knowledge%20transfer%20offers%20a%20promising%20solution%20by%20leveraging%20knowledge%20from%20an%20existing%20modality%20to%20support%20model%20training%20for%20a%20new%20modality.%20Existing%20methods%20are%20typically%20based%20on%20knowledge%20distillation%2C%20which%20requires%20running%20a%20teacher%20model%20alongside%20student%20model%20training%2C%20resulting%20in%20high%20computational%20and%20memory%20overhead.%20This%20challenge%20is%20further%20exacerbated%20by%20the%20recent%20development%20of%20foundation%20models%20that%20demonstrate%20superior%20performance%20and%20generalization%20across%20tasks%20at%20the%20cost%20of%20large%20model%20sizes.%20To%20this%20end%2C%20we%20explore%20a%20new%20framework%20for%20unsupervised%20cross-modal%20knowledge%20transfer%20of%20biosignals%20by%20training%20a%20lightweight%20bridge%20network%20to%20align%20the%20intermediate%20representations%20and%20enable%20information%20flow%20between%20foundation%20models%20and%20across%20modalities.%20Specifically%2C%20we%20introduce%20an%20efficient%20strategy%20for%20selecting%20alignment%20positions%20where%20the%20bridge%20should%20be%20constructed%2C%20along%20with%20a%20flexible%20prototype%20network%20as%20the%20bridge%20architecture.%20Extensive%20experiments%20across%20multiple%20biosignal%20modalities%2C%20tasks%2C%20and%20datasets%20show%20that%20BioX-Bridge%20reduces%20the%20number%20of%20trainable%20parameters%20by%2088--99%5C%25%20while%20maintaining%20or%20even%20improving%20transfer%20performance%20compared%20to%20state-of-the-art%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2510.02276v2&entry.124074799=Read"},
{"title": "Seeing Through the Noise: Improving Infrared Small Target Detection and Segmentation from Noise Suppression Perspective", "author": "Maoxun Yuan and Duanni Meng and Ziteng Xi and Tianyi Zhao and Shiji Zhao and Yimian Dai and Xingxing Wei", "abstract": "Infrared small target detection and segmentation (IRSTDS) is a critical yet challenging task in defense and civilian applications, owing to the dim, shapeless appearance of targets and severe background clutter. Recent CNN-based methods have achieved promising target perception results, but they only focus on enhancing feature representation to offset the impact of noise, which results in the increased false alarm problem. In this paper, through analyzing the problem from the frequency domain, we pioneer in improving performance from noise suppression perspective and propose a novel noise-suppression feature pyramid network (NS-FPN), which integrates a low-frequency guided feature purification (LFP) module and a spiral-aware feature sampling (SFS) module into the original FPN structure. The LFP module suppresses the noise features by purifying high-frequency components to achieve feature enhancement devoid of noise interference, while the SFS module further adopts spiral sampling to fuse target-relevant features in feature fusion process. Our NS-FPN is designed to be lightweight yet effective and can be easily plugged into existing IRSTDS frameworks. Extensive experiments on the IRSTD-1k and NUAA-SIRST datasets demonstrate that our method significantly reduces false alarms and achieves superior performance on IRSTDS task.", "link": "http://arxiv.org/abs/2508.06878v2", "date": "2026-02-24", "relevancy": 2.532, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5395}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4906}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4892}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seeing%20Through%20the%20Noise%3A%20Improving%20Infrared%20Small%20Target%20Detection%20and%20Segmentation%20from%20Noise%20Suppression%20Perspective&body=Title%3A%20Seeing%20Through%20the%20Noise%3A%20Improving%20Infrared%20Small%20Target%20Detection%20and%20Segmentation%20from%20Noise%20Suppression%20Perspective%0AAuthor%3A%20Maoxun%20Yuan%20and%20Duanni%20Meng%20and%20Ziteng%20Xi%20and%20Tianyi%20Zhao%20and%20Shiji%20Zhao%20and%20Yimian%20Dai%20and%20Xingxing%20Wei%0AAbstract%3A%20Infrared%20small%20target%20detection%20and%20segmentation%20%28IRSTDS%29%20is%20a%20critical%20yet%20challenging%20task%20in%20defense%20and%20civilian%20applications%2C%20owing%20to%20the%20dim%2C%20shapeless%20appearance%20of%20targets%20and%20severe%20background%20clutter.%20Recent%20CNN-based%20methods%20have%20achieved%20promising%20target%20perception%20results%2C%20but%20they%20only%20focus%20on%20enhancing%20feature%20representation%20to%20offset%20the%20impact%20of%20noise%2C%20which%20results%20in%20the%20increased%20false%20alarm%20problem.%20In%20this%20paper%2C%20through%20analyzing%20the%20problem%20from%20the%20frequency%20domain%2C%20we%20pioneer%20in%20improving%20performance%20from%20noise%20suppression%20perspective%20and%20propose%20a%20novel%20noise-suppression%20feature%20pyramid%20network%20%28NS-FPN%29%2C%20which%20integrates%20a%20low-frequency%20guided%20feature%20purification%20%28LFP%29%20module%20and%20a%20spiral-aware%20feature%20sampling%20%28SFS%29%20module%20into%20the%20original%20FPN%20structure.%20The%20LFP%20module%20suppresses%20the%20noise%20features%20by%20purifying%20high-frequency%20components%20to%20achieve%20feature%20enhancement%20devoid%20of%20noise%20interference%2C%20while%20the% {"title": "Spa3R: Predictive Spatial Field Modeling for 3D Visual Reasoning", "author": "Haoyi Jiang and Liu Liu and Xinjie Wang and Yonghao He and Wei Sui and Zhizhong Su and Wenyu Liu and Xinggang Wang", "abstract": "While Vision-Language Models (VLMs) exhibit exceptional 2D visual understanding, their ability to comprehend and reason about 3D space--a cornerstone of spatial intelligence--remains superficial. Current methodologies attempt to bridge this domain gap either by relying on explicit 3D modalities or by augmenting VLMs with partial, view-conditioned geometric priors. However, such approaches hinder scalability and ultimately burden the language model with the ill-posed task of implicitly reconstructing holistic 3D geometry from sparse cues. In this paper, we argue that spatial intelligence can emerge inherently from 2D vision alone, rather than being imposed via explicit spatial instruction tuning. To this end, we introduce Spa3R, a self-supervised framework that learns a unified, view-invariant spatial representation directly from unposed multi-view images. Spa3R is built upon the proposed Predictive Spatial Field Modeling (PSFM) paradigm, where Spa3R learns to synthesize feature fields for arbitrary unseen views conditioned on a compact latent representation, thereby internalizing a holistic and coherent understanding of the underlying 3D scene. We further integrate the pre-trained Spa3R Encoder into existing VLMs via a lightweight adapter to form Spa3-VLM, effectively grounding language reasoning in a global spatial context. Experiments on the challenging VSI-Bench demonstrate that Spa3-VLM achieves state-of-the-art accuracy of 58.6% on 3D VQA, significantly outperforming prior methods. These results highlight PSFM as a scalable path toward advancing spatial intelligence. Code is available at https://github.com/hustvl/Spa3R.", "link": "http://arxiv.org/abs/2602.21186v1", "date": "2026-02-24", "relevancy": 2.5319, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6425}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6425}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5852}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spa3R%3A%20Predictive%20Spatial%20Field%20Modeling%20for%203D%20Visual%20Reasoning&body=Title%3A%20Spa3R%3A%20Predictive%20Spatial%20Field%20Modeling%20for%203D%20Visual%20Reasoning%0AAuthor%3A%20Haoyi%20Jiang%20and%20Liu%20Liu%20and%20Xinjie%20Wang%20and%20Yonghao%20He%20and%20Wei%20Sui%20and%20Zhizhong%20Su%20and%20Wenyu%20Liu%20and%20Xinggang%20Wang%0AAbstract%3A%20While%20Vision-Language%20Models%20%28VLMs%29%20exhibit%20exceptional%202D%20visual%20understanding%2C%20their%20ability%20to%20comprehend%20and%20reason%20about%203D%20space--a%20cornerstone%20of%20spatial%20intelligence--remains%20superficial.%20Current%20methodologies%20attempt%20to%20bridge%20this%20domain%20gap%20either%20by%20relying%20on%20explicit%203D%20modalities%20or%20by%20augmenting%20VLMs%20with%20partial%2C%20view-conditioned%20geometric%20priors.%20However%2C%20such%20approaches%20hinder%20scalability%20and%20ultimately%20burden%20the%20language%20model%20with%20the%20ill-posed%20task%20of%20implicitly%20reconstructing%20holistic%203D%20geometry%20from%20sparse%20cues.%20In%20this%20paper%2C%20we%20argue%20that%20spatial%20intelligence%20can%20emerge%20inherently%20from%202D%20vision%20alone%2C%20rather%20than%20being%20imposed%20via%20explicit%20spatial%20instruction%20tuning.%20To%20this%20end%2C%20we%20introduce%20Spa3R%2C%20a%20self-supervised%20framework%20that%20learns%20a%20unified%2C%20view-invariant%20spatial%20representation%20directly%20from%20unposed%20multi-view%20images.%20Spa3R%20is%20built%20upon%20the%20proposed%20Predictive%20Spatial%20Field%20Modeling%20%28PSFM%29%20paradigm%2C%20where%20Spa3R%20learns%20to%20synthesize%20feature%20fields%20for%20arbitrary%20unseen%20views%20conditioned%20on%20a%20compact%20latent%20representation%2C%20thereby%20internalizing%20a%20holistic%20and%20coherent%20understanding%20of%20the%20underlying%203D%20scene.%20We%20further%20integrate%20the%20pre-trained%20Spa3R%20Encoder%20into%20existing%20VLMs%20via%20a%20lightweight%20adapter%20to%20form%20Spa3-VLM%2C%20effectively%20grounding%20language%20reasoning%20in%20a%20global%20spatial%20context.%20Experiments%20on%20the%20challenging%20VSI-Bench%20demonstrate%20that%20Spa3-VLM%20achieves%20state-of-the-art%20accuracy%20of%2058.6%25%20on%203D%20VQA%2C%20significantly%20outperforming%20prior%20methods.%20These%20results%20highlight%20PSFM%20as%20a%20scalable%20path%20toward%20advancing%20spatial%20intelligence.%20Code%20is%20available%20at%20https%3A//github.com/hustvl/Spa3R.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21186v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpa3R%253A%2520Predictive%2520Spatial%2520Field%2520Modeling%2520for%25203D%2520Visual%2520Reasoning%26entry.906535625%3DHaoyi%2520Jiang%2520and%2520Liu%2520Liu%2520and%2520Xinjie%2520Wang%2520and%2520Yonghao%2520He%2520and%2520Wei%2520Sui%2520and%2520Zhizhong%2520Su%2520and%2520Wenyu%2520Liu%2520and%2520Xinggang%2520Wang%26entry.1292438233%3DWhile%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520exhibit%2520exceptional%25202D%2520visual%2520understanding%252C%2520their%2520ability%2520to%2520comprehend%2520and%2520reason%2520about%25203D%2520space--a%2520cornerstone%2520of%2520spatial%2520intelligence--remains%2520superficial.%2520Current%2520methodologies%2520attempt%2520to%2520bridge%2520this%2520domain%2520gap%2520either%2520by%2520relying%2520on%2520explicit%25203D%2520modalities%2520or%2520

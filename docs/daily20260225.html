{"title": "BrowseComp-$V^3$: A Visual, Vertical, and Verifiable Benchmark for Multimodal Browsing Agents", "author": "Huanyao Zhang and Jiepeng Zhou and Bo Li and Bowen Zhou and Yanzhe Shan and Haishan Lu and Zhiyong Cao and Jiaoyang Chen and Yuqian Han and Zinan Sheng and Zhengwei Tao and Hao Liang and Jialong Wu and Yang Shi and Yuanpeng He and Jiaye Lin and Qintong Zhang and Guochen Yan and Runhao Zhao and Zhengpin Li and Xiaohan Yu and Lang Mei and Chong Chen and Wentao Zhang and Bin Cui", "abstract": "Multimodal large language models (MLLMs), equipped with increasingly advanced planning and tool-use capabilities, are evolving into autonomous agents capable of performing multimodal web browsing and deep search in open-world environments. However, existing benchmarks for multimodal browsing remain limited in task complexity, evidence accessibility, and evaluation granularity, hindering comprehensive and reproducible assessments of deep search capabilities. To address these limitations, we introduce BrowseComp-$V^3$, a novel benchmark consisting of 300 carefully curated and challenging questions spanning diverse domains. The benchmark emphasizes deep, multi-level, and cross-modal multi-hop reasoning, where critical evidence is interleaved across textual and visual modalities within and across web pages. All supporting evidence is strictly required to be publicly searchable, ensuring fairness and reproducibility. Beyond final-answer accuracy, we incorporate an expert-validated, subgoal-driven process evaluation mechanism that enables fine-grained analysis of intermediate reasoning behaviors and systematic characterization of capability boundaries. In addition, we propose OmniSeeker, a unified multimodal browsing agent framework integrating diverse web search and visual perception tools. Comprehensive experiments demonstrate that even state-of-the-art models achieve only 36% accuracy on our benchmark, revealing critical bottlenecks in multimodal information integration and fine-grained perception. Our results highlight a fundamental gap between current model capabilities and robust multimodal deep search in real-world settings.", "link": "http://arxiv.org/abs/2602.12876v2", "date": "2026-02-24", "relevancy": 2.3179, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5868}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5868}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5427}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BrowseComp-%24V%5E3%24%3A%20A%20Visual%2C%20Vertical%2C%20and%20Verifiable%20Benchmark%20for%20Multimodal%20Browsing%20Agents&body=Title%3A%20BrowseComp-%24V%5E3%24%3A%20A%20Visual%2C%20Vertical%2C%20and%20Verifiable%20Benchmark%20for%20Multimodal%20Browsing%20Agents%0AAuthor%3A%20Huanyao%20Zhang%20and%20Jiepeng%20Zhou%20and%20Bo%20Li%20and%20Bowen%20Zhou%20and%20Yanzhe%20Shan%20and%20Haishan%20Lu%20and%20Zhiyong%20Cao%20and%20Jiaoyang%20Chen%20and%20Yuqian%20Han%20and%20Zinan%20Sheng%20and%20Zhengwei%20Tao%20and%20Hao%20Liang%20and%20Jialong%20Wu%20and%20Yang%20Shi%20and%20Yuanpeng%20He%20and%20Jiaye%20Lin%20and%20Qintong%20Zhang%20and%20Guochen%20Yan%20and%20Runhao%20Zhao%20and%20Zhengpin%20Li%20and%20Xiaohan%20Yu%20and%20Lang%20Mei%20and%20Chong%20Chen%20and%20Wentao%20Zhang%20and%20Bin%20Cui%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%2C%20equipped%20with%20increasingly%20advanced%20planning%20and%20tool-use%20capabilities%2C%20are%20evolving%20into%20autonomous%20agents%20capable%20of%20performing%20multimodal%20web%20browsing%20and%20deep%20search%20in%20open-world%20environments.%20However%2C%20existing%20benchmarks%20for%20multimodal%20browsing%20remain%20limited%20in%20task%20complexity%2C%20evidence%20accessibility%2C%20and%20evaluation%20granularity%2C%20hindering%20comprehensive%20and%20reproducible%20assessments%20of%20deep%20search%20capabilities.%20To%20address%20these%20limitations%2C%20we%20introduce%20BrowseComp-%24V%5E3%24%2C%20a%20novel%20benchmark%20consisting%20of%20300%20carefully%20curated%20and%20challenging%20questions%20spanning%20diverse%20domains.%20The%20benchmark%20emphasizes%20deep%2C%20multi-level%2C%20and%20cross-modal%20multi-hop%20reasoning%2C%20where%20critical%20evidence%20is%20interleaved%20across%20textual%20and%20visual%20modalities%20within%20and%20across%20web%20pages.%20All%20supporting%20evidence%20is%20strictly%20required%20to%20be%20publicly%20searchable%2C%20ensuring%20fairness%20and%20reproducibility.%20Beyond%20final-answer%20accuracy%2C%20we%20incorporate%20an%20expert-validated%2C%20subgoal-driven%20process%20evaluation%20mechanism%20that%20enables%20fine-grained%20analysis%20of%20intermediate%20reasoning%20behaviors%20and%20systematic%20characterization%20of%20capability%20boundaries.%20In%20addition%2C%20we%20propose%20OmniSeeker%2C%20a%20unified%20multimodal%20browsing%20agent%20framework%20integrating%20diverse%20web%20search%20and%20visual%20perception%20tools.%20Comprehensive%20experiments%20demonstrate%20that%20even%20state-of-the-art%20models%20achieve%20only%2036%25%20accuracy%20on%20our%20benchmark%2C%20revealing%20critical%20bottlenecks%20in%20multimodal%20information%20integration%20and%20fine-grained%20perception.%20Our%20results%20highlight%20a%20fundamental%20gap%20between%20current%20model%20capabilities%20and%20robust%20multimodal%20deep%20search%20in%20real-world%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.12876v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrowseComp-%2524V%255E3%2524%253A%2520A%2520Vis {"title": "BrowseComp-$V^3$: A Visual, Vertical, and Verifiable Benchmark for Multimodal Browsing Agents", "author": "Huanyao Zhang and Jiepeng Zhou and Bo Li and Bowen Zhou and Yanzhe Shan and Haishan Lu and Zhiyong Cao and Jiaoyang Chen and Yuqian Han and Zinan Sheng and Zhengwei Tao and Hao Liang and Jialong Wu and Yang Shi and Yuanpeng He and Jiaye Lin and Qintong Zhang and Guochen Yan and Runhao Zhao and Zhengpin Li and Xiaohan Yu and Lang Mei and Chong Chen and Wentao Zhang and Bin Cui", "abstract": "Multimodal large language models (MLLMs), equipped with increasingly advanced planning and tool-use capabilities, are evolving into autonomous agents capable of performing multimodal web browsing and deep search in open-world environments. However, existing benchmarks for multimodal browsing remain limited in task complexity, evidence accessibility, and evaluation granularity, hindering comprehensive and reproducible assessments of deep search capabilities. To address these limitations, we introduce BrowseComp-$V^3$, a novel benchmark consisting of 300 carefully curated and challenging questions spanning diverse domains. The benchmark emphasizes deep, multi-level, and cross-modal multi-hop reasoning, where critical evidence is interleaved across textual and visual modalities within and across web pages. All supporting evidence is strictly required to be publicly searchable, ensuring fairness and reproducibility. Beyond final-answer accuracy, we incorporate an expert-validated, subgoal-driven process evaluation mechanism that enables fine-grained analysis of intermediate reasoning behaviors and systematic characterization of capability boundaries. In addition, we propose OmniSeeker, a unified multimodal browsing agent framework integrating diverse web search and visual perception tools. Comprehensive experiments demonstrate that even state-of-the-art models achieve only 36% accuracy on our benchmark, revealing critical bottlenecks in multimodal information integration and fine-grained perception. Our results highlight a fundamental gap between current model capabilities and robust multimodal deep search in real-world settings.", "link": "http://arxiv.org/abs/2602.12876v2", "date": "2026-02-24", "relevancy": 2.3179, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5868}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5868}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5427}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BrowseComp-%24V%5E3%24%3A%20A%20Visual%2C%20Vertical%2C%20and%20Verifiable%20Benchmark%20for%20Multimodal%20Browsing%20Agents&body=Title%3A%20BrowseComp-%24V%5E3%24%3A%20A%20Visual%2C%20Vertical%2C%20and%20Verifiable%20Benchmark%20for%20Multimodal%20Browsing%20Agents%0AAuthor%3A%20Huanyao%20Zhang%20and%20Jiepeng%20Zhou%20and%20Bo%20Li%20and%20Bowen%20Zhou%20and%20Yanzhe%20Shan%20and%20Haishan%20Lu%20and%20Zhiyong%20Cao%20and%20Jiaoyang%20Chen%20and%20Yuqian%20Han%20and%20Zinan%20Sheng%20and%20Zhengwei%20Tao%20and%20Hao%20Liang%20and%20Jialong%20Wu%20and%20Yang%20Shi%20and%20Yuanpeng%20He%20and%20Jiaye%20Lin%20and%20Qintong%20Zhang%20and%20Guochen%20Yan%20and%20Runhao%20Zhao%20and%20Zhengpin%20Li%20and%20Xiaohan%20Yu%20and%20Lang%20Mei%20and%20Chong%20Chen%20and%20Wentao%20Zhang%20and%20Bin%20Cui%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%2C%20equipped%20with%20increasingly%20advanced%20planning%20and%20tool-use%20capabilities%2C%20are%20evolving%20into%20autonomous%20agents%20capable%20of%20performing%20multimodal%20web%20browsing%20and%20deep%20search%20in%20open-world%20environments.%20However%2C%20existin {"title": "Generating metamers of human scene understanding", "author": "Ritik Raina and Abe Leite and Alexandros Graikos and Seoyoung Ahn and Dimitris Samaras and Gregory J. Zelinsky", "abstract": "Human vision combines low-resolution \"gist\" information from the visual periphery with sparse but high-resolution information from fixated locations to construct a coherent understanding of a visual scene. In this paper, we introduce MetamerGen, a tool for generating scenes that are aligned with latent human scene representations. MetamerGen is a latent diffusion model that combines peripherally obtained scene gist information with information obtained from scene-viewing fixations to generate image metamers for what humans understand after viewing a scene. Generating images from both high and low resolution (i.e. \"foveated\") inputs constitutes a novel image-to-image synthesis problem, which we tackle by introducing a dual-stream representation of the foveated scenes consisting of DINOv2 tokens that fuse detailed features from fixated areas with peripherally degraded features capturing scene context. To evaluate the perceptual alignment of MetamerGen generated images to latent human scene representations, we conducted a same-different behavioral experiment where participants were asked for a \"same\" or \"different\" response between the generated and the original image. With that, we identify scene generations that are indeed metamers for the latent scene representations formed by the viewers. MetamerGen is a powerful tool for understanding scene understanding. Our proof-of-concept analyses uncovered specific features at multiple levels of visual processing that contributed to human judgments. While it can generate metamers even conditioned on random fixations, we find that high-level semantic alignment most strongly predicts metamerism when the generated scenes are conditioned on viewers' own fixated regions.", "link": "http://arxiv.org/abs/2601.11675v3", "date": "2026-02-24", "relevancy": 2.3152, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5821}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5821}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5624}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generating%20metamers%20of%20human%20scene%20understanding&body=Title%3A%20Generating%20metamers%20of%20human%20scene%20understanding%0AAuthor%3A%20Ritik%20Raina%20and%20Abe%20Leite%20and%20Alexandros%20Graikos%20and%20Seoyoung%20Ahn%20and%20Dimitris%20Samaras%20and%20Gregory%20J.%20Zelinsky%0AAbstract%3A%20Human%20vision%20combines%20low-resolution%20%22gist%22%20information%20from%20the%20visual%20periphery%20with%20sparse%20but%20high-resolution%20information%20from%20fixated%20locations%20to%20construct%20a%20coherent%20understanding%20of%20a%20visual%20scene.%20In%20this%20paper%2C%20we%20introduce%20MetamerGen%2C%20a%20tool%20for%20generating%20scenes%20that%20are%20aligned%20with%20latent%20human%20scene%20representations.%20MetamerGen%20is%20a%20latent%20diffusion%20model%20that%20combines%20peripherally%20obtained%20scene%20gist%20information%20with%20information%20obtained%20from%20scene-viewing%20fixations%20to%20generate%20image%20metamers%20for%20what%20humans%20understand%20after%20viewing%20a%20scene.%20Generating%20images%20from%20both%20high%20and%20low%20resolution%20%28i.e.%20%22foveated%22%29%20inputs%20constitutes%20a%20novel%20image-to-image%20synthesis%20problem%2C%20which%20we%20tackle%20by%20introducing%20a%20dual-stream%20representation%20of%20the%20foveated%20scenes%20consisting%20of%20DINOv2%20tokens%20that%20fuse%20detailed%20features%20from%20fixated%20areas%20with%20peripherally%20degraded%20features%20capturing%20scene%20context.%20To%20evaluate%20the%20perceptual%20alignment%20of%20MetamerGen%20generated%20images%20to%20latent%20human%20scene%20representations%2C%20we%20conducted%20a%20same-different%20behavioral%20experiment%20where%20participants%20were%20asked%20for%20a%20%22same%22%20or%20%22different%22%20response%20between%20the%20generated%20and%20the%20original%20image.%20With%20that%2C%20we%20identify%20scene%20generations%20that%20are%20indeed%20metamers%20for%20the%20latent%20scene%20representations%20formed%20by%20the%20viewers.%20MetamerGen%20is%20a%20powerful%20tool%20for%20understanding%20scene%20understanding.%20Our%20proof-of-concept%20analyses%20uncovered%20specific%20features%20at%20multiple%20levels%20of%20visual%20processing%20that%20contributed%20to%20human%20judgments.%20While%20it%20can%20generate%20metamers%20even%20conditioned%20on%20random%20fixations%2C%20we%20find%20that%20high-level%20semantic%20alignment%20most%20strongly%20predicts%20metamerism%20when%20the%20generated%20scenes%20are%20conditioned%20on%20viewers%27%20own%20fixated%20regions.%0ALink%3A%20http%3A//arxiv.org/abs/2601.11675v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerating%2520metamers%2520of%2520human%2520scene%2520understanding%26entry.906535625%3DRitik%2520Raina%2520and%2520Abe%2520Leite%2520and%2520Alexandros%2520Graikos%2520and%2520Seoyoung%2520Ahn%2520and%2520Dimitris%2520Samaras%2520and%2520Gregory%2520J.%2520Zelinsky%26entry.1292438233%3DHuman%2520vision%2520combines%2520low-resolution%2520%2522gist%2522%2520information%2520from%2520the%2520visual%2520periphery%2520with%2520sparse%2520but%2520high-resolution%2520information%2520from%2520fixated%2520locations%2520to%2520construct%2520a%2520coherent%2520understanding%2520of%2520a%2520visual%2520scene.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520MetamerGen%252C%2520a%252 {"title": "Mobile-O: Unified Multimodal Understanding and Generation on Mobile Device", "author": "Abdelrahman Shaker and Ahmed Heakl and Jaseel Muhammad and Ritesh Thawkar and Omkar Thawakar and Senmao Li and Hisham Cholakkal and Ian Reid and Eric P. Xing and Salman Khan and Fahad Shahbaz Khan", "abstract": "Unified multimodal models can both understand and generate visual content within a single architecture. Existing models, however, remain data-hungry and too heavy for deployment on edge devices. We present Mobile-O, a compact vision-language-diffusion model that brings unified multimodal intelligence to a mobile device. Its core module, the Mobile Conditioning Projector (MCP), fuses vision-language features with a diffusion generator using depthwise-separable convolutions and layerwise alignment. This design enables efficient cross-modal conditioning with minimal computational cost. Trained on only a few million samples and post-trained in a novel quadruplet format (generation prompt, image, question, answer), Mobile-O jointly enhances both visual understanding and generation capabilities. Despite its efficiency, Mobile-O attains competitive or superior performance compared to other unified models, achieving 74% on GenEval and outperforming Show-O and JanusFlow by 5% and 11%, while running 6x and 11x faster, respectively. For visual understanding, Mobile-O surpasses them by 15.3% and 5.1% averaged across seven benchmarks. Running in only ~3s per 512x512 image on an iPhone, Mobile-O establishes the first practical framework for real-time unified multimodal understanding and generation on edge devices. We hope Mobile-O will ease future research in real-time unified multimodal intelligence running entirely on-device with no cloud dependency. Our code, models, datasets, and mobile application are publicly available at https://amshaker.github.io/Mobile-O/", "link": "http://arxiv.org/abs/2602.20161v2", "date": "2026-02-24", "relevancy": 2.3125, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5823}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5768}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mobile-O%3A%20Unified%20Multimodal%20Understanding%20and%20Generation%20on%20Mobile%20Device&body=Title%3A%20Mobile-O%3A%20Unified%20Multimodal%20Understanding%20and%20Generation%20on%20Mobile%20Device%0AAuthor%3A%20Abdelrahman%20Shaker%20and%20Ahmed%20Heakl%20and%20Jaseel%20Muhammad%20and%20Ritesh%20Thawkar%20and%20Omkar%20Thawakar%20and%20Senmao%20Li%20and%20Hisham%20Cholakkal%20and%20Ian%20Reid%20and%20Eric%20P.%20Xing%20and%20Salman%20Khan%20and%20Fahad%20Shahbaz%20Khan%0AAbstract%3A%20Unified%20multimodal%20models%20can%20both%20understand%20and%20generate%20visual%20content%20within%20a%20single%20architecture.%20Existing%20models%2C%20however%2C%20remain%20data-hungry%20and%20too%20heavy%20for%20deployment%20on%20edge%20devices.%20We%20present%20Mobile-O%2C%20a%20compact%20vision-language-diffusion%20model%20that%20brings%20unified%20multimodal%20intelligence%20to%20a%20mobile%20device.%20Its%20core%20module%2C%20the%20Mobile%20Conditioning%20Projector%20%28MCP%29%2C%20fuses%20vision-language%20features%20with%20a%20diffusion%20generator%20using%20depthwise-separable%20convolutions%20and%20layerwise%20alignment.%20This%20design%20enables%20efficient%20cross-modal%20conditioning%20with%20minimal%20computational%20cost.%20Trained%20on%20only%20a%20few%20million%20samples%20and%20post-trained%20in%20a%20novel%20quadruplet%20format%20%28generation%20prompt%2C%20image%2C%20question%2C%20answer%29%2C%20Mobile-O%20jointly%20enhances%20both%20visual%20understanding%20and%20generation%20capabilities.%20Despite%20its%20efficiency%2C%20Mobile-O%20attains%20competitive%20or%20superior%20performance%20compared%20to%20other%20unified%20models%2C%20achieving%2074%25%20on%20GenEval%20and%20outperforming%20Show-O%20and%20JanusFlow%20by%205%25%20and%2011%25%2C%20while%20running%206x%20and%2011x%20faster%2C%20respectively.%20For%20visual%20understanding%2C%20Mobile-O%20surpasses%20them%20by%2015.3%25%20and%205.1%25%20averaged%20across%20seven%20benchmarks.%20Running%20in%20only%20~3s%20per%20512x512%20image%20on%20an%20iPhone%2C%20Mobile-O%20establishes%20the%20first%20practical%20framework%20for%20real-time%20unified%20multimodal%20understanding%20and%20generation%20on%20edge%20devices.%20We%20hope%20Mobile-O%20will%20ease%20future%20research%20in%20real-time%20unified%20multimodal%20intelligence%20running%20entirely%20on-device%20with%20no%20cloud%20dependency.%20Our%20code%2C%20models%2C%20datasets%2C%20and%20mobile%20application%20are%20publicly%20available%20at%20https%3A//amshaker.github.io/Mobile-O/%0ALink%3A%20http%3A//arxiv.org/abs/2602.20161v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMobile-O%253A%2520Unified%2520Multimodal%2520Understanding%2520and%2520Generation%2520on%2520Mobile%2520Device%26entry.906535625%3DAbdelrahman%2520Shaker%2520and%2520Ahmed%2520Heakl%2520and%2520Jaseel%2520Muhammad%2520and%2520Ritesh%2520Thawkar%2520and%2520Omkar%2520Thawakar%2520and%2520Senmao%2520Li%2520and%2520Hisham%2520Cholakkal%2520and%2520Ian%2520Reid%2520and%2520Eric%2520P.%2520Xing%2520and%2520Salman%2520Khan%2520and%2520Fahad%2520Shahbaz%2520Khan%26entry.1292438233%3DUnified%2520multimodal%2520models%2520can%2520both%2520understand%2520and%2520generate%2520visual%2520content%2520within%2520a%2520single%2520architecture.%2520Existing%2520models%252C%2520however%252C%2520remain%2520data-hungry%2520and%2520too%2520heavy%2520for%2520depl ed%20models%2C%20achieving%2074%25%20on%20GenEval%20and%20outperforming%20Show-O%20and%20JanusFlow%20by%205%25%20and%2011%25%2C%20while%20running%206x%20and%2011x%20faster%2C%20respectively.%20For%20visual%20understanding%2C%20Mobile-O%20surpasses%20them%20by%2015.3%25%20and%205.1%25%20averaged%20across%20seven%20benchmarks.%20Running%20in%20only%20~3s%20per%20512x512%20image%20on%20an%20iPhone%2C%20Mobile-O%20establishes%20the%20first%20practical%20framework%20for%20real-time%20unified%20multimodal%20understanding%20and%20generation%20on%20edge%20devices.%20We%20hope%20Mobile-O%20will%20ease%20future%20research%20in%20real-time%20unified%20multimodal%20intelligence%20running%20entirely%20on-device%20with%20no%20cloud%20dependency.%20Our%20code%2C%20models%2C%20datasets%2C%20and%20mobile%20application%20are%20publicly%20available%20at%20https%3A//amshaker.github.io/Mobile-O/&entry.1838667208=http%3A//arxiv.org/abs/2602.20161v2&entry.124074799=Read"},
{"title": "LongVideo-R1: Smart Navigation for Low-cost Long Video Understanding", "author": "Jihao Qiu and Lingxi Xie and Xinyue Huo and Qi Tian and Qixiang Ye", "abstract": "This paper addresses the critical and underexplored challenge of long video understanding with low computational budgets. We propose LongVideo-R1, an active, reasoning-equipped multimodal large language model (MLLM) agent designed for efficient video context navigation, avoiding the redundancy of exhaustive search. At the core of LongVideo-R1 lies a reasoning module that leverages high-level visual cues to infer the most informative video clip for subsequent processing. During inference, the agent initiates traversal from top-level visual summaries and iteratively refines its focus, immediately halting the exploration process upon acquiring sufficient knowledge to answer the query. To facilitate training, we first extract hierarchical video captions from CGBench, a video corpus with grounding annotations, and guide GPT-5 to generate 33K high-quality chain-of-thought-with-tool trajectories. The LongVideo-R1 agent is fine-tuned upon the Qwen-3-8B model through a two-stage paradigm: supervised fine-tuning (SFT) followed by reinforcement learning (RL), where RL employs a specifically designed reward function to maximize selective and efficient clip navigation. Experiments on multiple long video benchmarks validate the effectiveness of name, which enjoys superior tradeoff between QA accuracy and efficiency. All curated data and source code are provided in the supplementary material and will be made publicly available. Code and data are available at: https://github.com/qiujihao19/LongVideo-R1", "link": "http://arxiv.org/abs/2602.20913v1", "date": "2026-02-24", "relevancy": 2.3092, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5815}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5765}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5765}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LongVideo-R1%3A%20Smart%20Navigation%20for%20Low-cost%20Long%20Video%20Understanding&body=Title%3A%20LongVideo-R1%3A%20Smart%20Navigation%20for%20Low-cost%20Long%20Video%20Understanding%0AAuthor%3A%20Jihao%20Qiu%20and%20Lingxi%20Xie%20and%20Xinyue%20Huo%20and%20Qi%20Tian%20and%20Qixiang%20Ye%0AAbstract%3A%20This%20paper%20addresses%20the%20critical%20and%20underexplored%20challenge%20of%20long%20video%20understanding%20with%20low%20computational%20budgets.%20We%20propose%20LongVideo-R1%2C%20an%20active%2C%20reasoning-equipped%20multimodal%20large%20language%20model%20%28MLLM%29%20agent%20designed%20for%20efficient%20video%20context%20navigation%2C%20avoiding%20the%20redundancy%20of%20exhaustive%20search.%20At%20the%20core%20of%20LongVideo-R1%20lies%20a%20reasoning%20module%20that%20leverages%20high-level%20visual%20cues%20to%20infer%20the%20most%20informative%20video%20clip%20for%20subsequent%20processing.%20During%20inference%2C%20the%20agent%20initiates%20traversal%20from%20top-level%20visual%20summaries%20and%20iteratively%20refines%20its%20focus%2C%20immediately%20halting%20the%20exploration%20process%20upon%20acquiring%20sufficient%20knowledge%20to%20answer%20the%20query.%20To%20facilitate%20training%2C%20we%20first%20extract%20hierarchical%20video%20captions%20from%20CGBench%2C%20a%20video%20corpus%20with%20grounding%20annotations%2C%20and%20guide%20GPT-5%20to%20generate%2033K%20high-quality%20chain-of-thought-with-tool%20trajectories.%20The%20LongVideo-R1%20agent%20is%20fine-tuned%20upon%20the%20Qwen-3-8B%20model%20through%20a%20two-stage%20paradigm%3A%20supervised%20fine-tuning%20%28SFT%29%20fol {"title": "HALO: A Unified Vision-Language-Action Model for Embodied Multimodal Chain-of-Thought Reasoning", "author": "Quanxin Shou and Fangqi Zhu and Shawn Chen and Puxin Yan and Zhengyang Yan and Yikun Miao and Xiaoyi Pang and Zicong Hong and Ruikai Shi and Hao Huang and Jie Zhang and Song Guo", "abstract": "Vision-Language-Action (VLA) models have shown strong performance in robotic manipulation, but often struggle in long-horizon or out-of-distribution scenarios due to the lack of explicit mechanisms for multimodal reasoning and anticipating how the world will evolve under action. Recent works introduce textual chain-of-thought or visual subgoal prediction within VLA models to reason, but still fail to offer a unified human-like reasoning framework for joint textual reasoning, visual foresight, and action prediction. To this end, we propose HALO, a unified VLA model that enables embodied multimodal chain-of-thought (EM-CoT) reasoning through a sequential process of textual task reasoning, visual subgoal prediction for fine-grained guidance, and EM-CoT-augmented action prediction. We instantiate HALO with a Mixture-of-Transformers (MoT) architecture that decouples semantic reasoning, visual foresight, and action prediction into specialized experts while allowing seamless cross-expert collaboration. To enable HALO learning at scale, we introduce an automated pipeline to synthesize EM-CoT training data along with a carefully crafted training recipe. Extensive experiments demonstrate that: (1) HALO achieves superior performance in both simulated and real-world environments, surpassing baseline policy pi_0 by 34.1% on RoboTwin benchmark; (2) all proposed components of the training recipe and EM-CoT design help improve task success rate; and (3) HALO exhibits strong generalization capabilities under aggressive unseen environmental randomization with our proposed EM-CoT reasoning.", "link": "http://arxiv.org/abs/2602.21157v1", "date": "2026-02-24", "relevancy": 2.2997, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5786}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5742}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HALO%3A%20A%20Unified%20Vision-Language-Action%20Model%20for%20Embodied%20Multimodal%20Chain-of-Thought%20Reasoning&body=Title%3A%20HALO%3A%20A%20Unified%20Vision-Language-Action%20Model%20for%20Embodied%20Multimodal%20Chain-of-Thought%20Reasoning%0AAuthor%3A%20Quanxin%20Shou%20and%20Fangqi%20Zhu%20and%20Shawn%20Chen%20and%20Puxin%20Yan%20and%20Zhengyang%20Yan%20and%20Yikun%20Miao%20and%20Xiaoyi%20Pang%20and%20Zicong%20Hong%20and%20Ruikai%20Shi%20and%20Hao%20Huang%20and%20Jie%20Zhang%20and%20Song%20Guo%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20shown%20strong%20performance%20in%20robotic%20manipulation%2C%20but%20often%20struggle%20in%20long-horizon%20or%20out-of-distribution%20scenarios%20due%20to%20the%20lack%20of%20explicit%20mechanisms%20for%20multimodal%20reasoning%20and%20anticipating%20how%20the%20world%20will%20evolve%20under%20action.%20Recent%20works%20introduce%20textual%20chain-of-thought%20or%20visual%20subgoal%20prediction%20within%20VLA%20models%20to%20reason%2C%20but%20still%20fail%20to%20offer%20a%20unified%20human-like%20reasoning%20framework%20for%20joint%20textual%20reasoning%2C%20visual%20foresight%2C%20and%20action%20prediction.%20To%20this%20end%2C%20we%20propose%20HALO%2C%20a%20unified%20VLA%20model%20that%20enables%20embodied%20multimodal%20chain-of-thought%20%28EM-CoT%29%20reasoning%20through%20a%20sequential%20process%20of%20textual%20task%20reasoning%2C%20visual%20subgoal%20prediction%20for%20fine-grained%20guidance%2C%20and%20EM-CoT-augmented%20action%20prediction.%20We%20instantiate%20HALO%20with%20a%20Mixture-of-Transformers%20%28MoT%29%20architecture%20that%20decouples%20semantic%20reasoning%2C%20visual%20foresight%2C%20and%20action%20prediction%20into%20specialized%20experts%20while%20allowing%20seamless%20cross-expert%20collaboration.%20To%20enable%20HALO%20learning%20at%20scale%2C%20we%20introduce%20an%20automated%20pipeline%20to%20synthesize%20EM-CoT%20training%20data%20along%20with%20a%20carefully%20crafted%20training%20recipe.%20Extensive%20experiments%20demonstrate%20that%3A%20%281%29%20HALO%20achieves%20superior%20performance%20in%20both%20simulated%20and%20real-world%20environments%2C%20surpassing%20baseline%20policy%20pi_0%20by%2034.1%25%20on%20RoboTwin%20benchmark%3B%20%282%29%20all%20proposed%20components%20of%20the%20training%20recipe%20and%20EM-CoT%20design%20help%20improve%20task%20success%20rate%3B%20and%20%283%29%20HALO%20exhibits%20strong%20generalization%20capabilities%20under%20aggressive%20unseen%20environmental%20randomization%20with%20our%20proposed%20EM-CoT%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21157v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHALO%253A%2520A%2520Unified%2520Vision-Language-Action%2520Model%2520for%2520Embodied%2520Multimodal%2520Chain-of-Thought%2520Reasoning%26entry.906535625%3DQuanxin%2520Shou%2520and%2520Fangqi%2520Zhu%2520and%2520Shawn%2520Chen%2520and%2520Puxin%2520Yan%2520and%2520Zhengyang%2520Yan%2520and%2520Yikun%2520Miao%2520and%2520Xiaoyi%2520Pang%2520and%2520Zicong%2520Hong%2520and%2520Ruikai%2520Shi%2520and%2520Hao%2520Huang%2520and%2520Jie%2520Zhang%2520and%2520Song%2520Guo%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520shown%2520strong%2520performance%2520in%2520robotic%2520manipulation% {"title": "When Pretty Isn't Useful: Investigating Why Modern Text-to-Image Models Fail as Reliable Training Data Generators", "author": "Krzysztof Adamkiewicz and Brian Moser and Stanislav Frolov and Tobias Christian Nauen and Federico Raue and Andreas Dengel", "abstract": "Recent text-to-image (T2I) diffusion models produce visually stunning images and demonstrate excellent prompt following. But do they perform well as synthetic vision data generators? In this work, we revisit the promise of synthetic data as a scalable substitute for real training sets and uncover a surprising performance regression. We generate large-scale synthetic datasets using state-of-the-art T2I models released between 2022 and 2025, train standard classifiers solely on this synthetic data, and evaluate them on real test data. Despite observable advances in visual fidelity and prompt adherence, classification accuracy on real test data consistently declines with newer T2I models as training data generators. Our analysis reveals a hidden trend: These models collapse to a narrow, aesthetic-centric distribution that undermines diversity and label-image alignment. Overall, our findings challenge a growing assumption in vision research, namely that progress in generative realism implies progress in data realism. We thus highlight an urgent need to rethink the capabilities of modern T2I models as reliable training data generators.", "link": "http://arxiv.org/abs/2602.19946v2", "date": "2026-02-24", "relevancy": 2.2996, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6125}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5701}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5647}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Pretty%20Isn%27t%20Useful%3A%20Investigating%20Why%20Modern%20Text-to-Image%20Models%20Fail%20as%20Reliable%20Training%20Data%20Generators&body=Title%3A%20When%20Pretty%20Isn%27t%20Useful%3A%20Investigating%20Why%20Modern%20Text-to-Image%20Models%20Fail%20as%20Reliable%20Training%20Data%20Generators%0AAuthor%3A%20Krzysztof%20Adamkiewicz%20and%20Brian%20Moser%20and%20Stanislav%20Frolov%20and%20Tobias%20Christian%20Nauen%20and%20Federico%20Raue%20and%20Andreas%20Dengel%0AAbstract%3A%20Recent%20text-to-image%20%28T2I%29%20diffusion%20models%20produce%20visually%20stunning%20images%20and%20demonstrate%20excellent%20prompt%20following.%20But%20do%20they%20perform%20well%20as%20synthetic%20vision%20data%20generators%3F%20In%20this%20work%2C%20we%20revisit%20the%20promise%20of%20synthetic%20data%20as%20a%20scalable%20substitute%20for%20real%20training%20sets%20and%20uncover%20a%20surprising%20performance%20regression.%20We%20generate%20large-scale%20synthetic%20datasets%20using%20state-of-the-art%20T2I%20models%20released%20between%202022%20and%202025%2C%20train%20standard%20classifiers%20solely%20on%20this%20synthetic%20data%2C%20and%20evaluate%20them%20on%20real%20test%20data.%20Despite%20observable%20advances%20in%20visual%20fidelity%20and%20prompt%20adherence%2C%20classification%20accuracy%20on%20real%20test%20data%20consistently%20declines%20with%20newer%20T2I%20models%20as%20training%20data%20generators.%20Our%20analysis%20reveals%20a%20hidden%20trend%3A%20These%20models%20collapse%20to%20a%20narrow%2C%20aesthetic-centric%20distribution%20that%20undermines%20diversity%20and%20label-image%20alignment.%20Overall%2C%20our%20findings%20challenge%20a%20growing%20assumption%20in%20vision%20research%2C%20namely%20that%20progress%20in%20generative%20realism%20implies%20progress%20in%20data%20realism.%20We%20thus%20highlight%20an%20urgent%20need%20to%20rethink%20the%20capabilities%20of%20modern%20T2I%20models%20as%20reliable%20training%20data%20generators.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19946v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Pretty%2520Isn%2527t%2520Useful%253A%2520Investigating%2520Why%2520Modern%2520Text-to-Image%2520Models%2520Fail%2520as%2520Reliable%2520Training%2520Data%2520Generators%26entry.906535625%3DKrzysztof%2520Adamkiewicz%2520and%2520Brian%2520Moser%2520and%2520Stanislav%2520Frolov%2520and%2520Tobias%2520Christian%2520Nauen%2520and%2520Federico%2520Raue%2520and%2520Andreas%2520Dengel%26entry.1292438233%3DRecent%2520text-to-image%2520%2528T2I%2529%2520diffusion%2520models%2520produce%2520visually%2520stunning%2520images%2520and%2520demonstrate%2520excellent%2520prompt%2520following.%2520But%2520do%2520they%2520perform%2520well%2520as%2520synthetic%2520vision%2520data%2520generators%253F%2520In%2520this%2520work%252C%2520we%2520revisit%2520the%2520promise%2520of%2520synthetic%2520data%2520as%2520a%2520scalable%2520substitute%2520for%2520real%2520training%2520sets%2520and%2520uncover%2520a%2520surprising%2520performance%2520regression.%2520We%2520generate%2520large-scale%2520synthetic%2520datasets%2520using%2520state-of-the-art%2520T2I%2520models%2520released%2520between%25202022%2520and%25202025%252C%2520train%2520standard%2520classifiers%2520solely%2520on%2520this%2520synthetic%2520data%252C%2520and%2520evaluate%2520them%2520on%2520real%2520test%2520data.%2520Despite%2520observable%2520advances%2520in%2520visual%2520fidelity%2520and%2520prompt%2520adherence%252C%2520classification%2520accuracy%2520on%2520real%2520test%2520data%2520consistently%2520declines%2520with%2520newer%2520T2I%2520models%2520as%2520training%2520data%2520generators.%2520Our%2520analysis%2520reveals%2520a%2520hidden%2520trend%253A%2520These%2520models%2520collapse%2520to%2520a%2520narrow%252C%2520aesthetic-centric%2520distribution%2520that%2520undermines%2520diversity%2520and%2520lab {"title": "TouchGuide: Inference-Time Steering of Visuomotor Policies via Touch Guidance", "author": "Zhemeng Zhang and Jiahua Ma and Xincheng Yang and Xin Wen and Yuzhi Zhang and Boyan Li and Yiran Qin and Jin Liu and Can Zhao and Li Kang and Haoqin Hong and Zhenfei Yin and Philip Torr and Hao Su and Ruimao Zhang and Daolin Ma", "abstract": "Fine-grained and contact-rich manipulation remain challenging for robots, largely due to the underutilization of tactile feedback. To address this, we introduce TouchGuide, a novel cross-policy visuo-tactile fusion paradigm that fuses modalities within a low-dimensional action space. Specifically, TouchGuide operates in two stages to guide a pre-trained diffusion or flow-matching visuomotor policy at inference time. First, the policy produces a coarse, visually-plausible action using only visual inputs during early sampling. Second, a task-specific Contact Physical Model (CPM) provides tactile guidance to steer and refine the action, ensuring it aligns with realistic physical contact conditions. Trained through contrastive learning on limited expert demonstrations, the CPM provides a tactile-informed feasibility score to steer the sampling process toward refined actions that satisfy physical contact constraints. Furthermore, to facilitate TouchGuide training with high-quality and cost-effective data, we introduce TacUMI, a data collection system. TacUMI achieves a favorable trade-off between precision and affordability; by leveraging rigid fingertips, it obtains direct tactile feedback, thereby enabling the collection of reliable tactile data. Extensive experiments on five challenging contact-rich tasks, such as shoe lacing and chip handover, show that TouchGuide consistently and significantly outperforms state-of-the-art visuo-tactile policies.", "link": "http://arxiv.org/abs/2601.20239v3", "date": "2026-02-24", "relevancy": 2.2941, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n {"title": "Is Multi-Distribution Learning as Easy as PAC Learning: Sharp Rates with Bounded Label Noise", "author": "Rafael Hanashiro and Abhishek Shetty and Patrick Jaillet", "abstract": "Towards understanding the statistical complexity of learning from heterogeneous sources, we study the problem of multi-distribution learning. Given $k$ data sources, the goal is to output a classifier for each source by exploiting shared structure to reduce sample complexity. We focus on the bounded label noise setting to determine whether the fast $1/\u03b5$ rates achievable in single-task learning extend to this regime with minimal dependence on $k$. Surprisingly, we show that this is not the case. We demonstrate that learning across $k$ distributions inherently incurs slow rates scaling with $k/\u03b5^2$, even under constant noise levels, unless each distribution is learned separately. A key technical contribution is a structured hypothesis-testing framework that captures the statistical cost of certifying near-optimality under bounded noise-a cost we show is unavoidable in the multi-distribution setting.\n  Finally, we prove that when competing with the stronger benchmark of each distribution's optimal Bayes error, the sample complexity incurs a \\textit{multiplicative} penalty in $k$. This establishes a \\textit{statistical} separation between random classification noise and Massart noise, highlighting a fundamental barrier unique to learning from multiple sources.", "link": "http://arxiv.org/abs/2602.21039v1", "date": "2026-02-24", "relevancy": 2.2886, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4658}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4543}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": " {"title": "DA-Cal: Towards Cross-Domain Calibration in Semantic Segmentation", "author": "Wangkai Li and Rui Sun and Zhaoyang Li and Yujia Chen and Tianzhu Zhang", "abstract": "While existing unsupervised domain adaptation (UDA) methods greatly enhance target domain performance in semantic segmentation, they often neglect network calibration quality, resulting in misalignment between prediction confidence and actual accuracy -- a significant risk in safety-critical applications. Our key insight emerges from observing that performance degrades substantially when soft pseudo-labels replace hard pseudo-labels in cross-domain scenarios due to poor calibration, despite the theoretical equivalence of perfectly calibrated soft pseudo-labels to hard pseudo-labels. Based on this finding, we propose DA-Cal, a dedicated cross-domain calibration framework that transforms target domain calibration into soft pseudo-label optimization. DA-Cal introduces a Meta Temperature Network to generate pixel-level calibration parameters and employs bi-level optimization to establish the relationship between soft pseudo-labels and UDA supervision, while utilizing complementary domain-mixing strategies to prevent overfitting and reduce domain discrepancies. Experiments demonstrate that DA-Cal seamlessly integrates with existing self-training frameworks across multiple UDA segmentation benchmarks, significantly improving target domain calibration while delivering performance gains without inference overhead. The code will be released.", "link": "http://arxiv.org/abs/2602.20860v1", "date": "2026-02-24", "relevancy": 2.2873, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5857}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5836}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5532}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DA-Cal%3A%20Towards%20Cross-Domain%20Calibration%20in%20Semantic%20Segmentation&body=Title%3A%20DA-Cal%3A%20Towards%20Cross-Domain%20Calibration%20in%20Semantic%20Segmentation%0AAuthor%3A%20Wangkai%20Li%20and%20Rui%20Sun%20and%20Zhaoyang%20Li%20and%20Yujia%20Chen%20and%20Tianzhu%20Zhang%0AAbstract%3A%20While%20existing%20unsupervised%20domain%20adaptation%20%28UDA%29%20methods%20greatly%20enhance%20target%20domain%20performance%20in%20semantic%20segmentation%2C%20they%20often%20neglect%20network%20calibration%20quality%2C%20resulting%20in%20misalignment%20between%20prediction%20confidence%20and%20actual%20accuracy%20--%20a%20significant%20risk%20in%20safety-critical%20applications.%20Our%20key%20insight%20emerges%20from%20observing%20that%20performance%20degrades%20substantially%20when%20soft%20pseudo-labels%20replace%20hard%20pseudo-labels%20in%20cross-domain%20scenarios%20due%20to%20poor%20calibration%2C%20despite%20the%20theoretical%20equivalence%20of%20perfectly%20calibrated%20soft%20pseudo-labels%20to%20hard%20pseudo-labels.%20Based%20on%20this%20finding%2C%20we%20propose%20DA-Cal%2C%20a%20dedicated%20cross-domain%20calibration%20framework%20that%20transforms%20target%20domain%20calibration%20into%20soft%20pseudo-label%20optimization.%20DA-Cal%20introduces%20a%20Meta%20Temperature%20Network%20to%20generate%20pixel-level%20calibration%20parameters%20and%20employs%20bi-level%20optimization%20to%20establish%20the%20relationship%20between%20soft%20pseudo-labels%20and%20UDA%20supervision%2C%20while%20utilizing%20complementary%20domain-mixing%20strategies%20to%20prevent%20overfitting%20and%20reduce%20domain%20discrepancies.%20Experiments%20demonstrate%20that%20DA-Cal%20seamlessly%20integrates%20with%20existing%20self-training%20frameworks%20across%20multiple%20UDA%20segmentation%20benchmarks%2C%20significantly%20improving%20target%20domain%20calibration%20while%20delivering%20performance%20gains%20without%20inference%20overhead.%20The%20code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20860v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDA-Cal%253A%2520Towards%2520Cross-Domain%2520Calibration%2520in%2520Semantic%2520Segmentation%26entry.906535625%3DWangkai%2520Li%2520and%2520Rui%2520Sun%2520and%2520Zhaoyang%2520Li%2520and%2520Yujia%2520Chen%2520and%2520Tianzhu%2520Zhang%26entry.1292438233%3DWhile%2520existing%2520unsupervised%2520domain%2520adaptation%2520%2528UDA%2529%2520methods%2520greatly%2520enhance%2520target%2520domain%2520performance%2520in%2520semantic%2520segmentation%252C%2520they%2520often%2520neglect%2520network%2520calibration%2520quality%252C%2520resulting%2520in%2520misalignment%2520between%2520prediction%2520confidence%2520and%2520actual%2520accuracy%2520--%2520a%2520significant%2520risk%2520in%2520safety-critical%2520applications.%2520Our%2520key%2520insight%2520emerges%2520from%2520observing%2520that%2520performance%2520degrades%2520substantially%2520when%2520soft%2520pseudo-labels%2520replace%2520hard%2520pseudo-labels%2520in%2520cross-domain%2520scenarios%2520due%2520to%2520poor%2520calibration%252C%2520despite%2520the%2520theoretical%2520equivalence%2520of%2520perfectly%2520calibrated%2520soft%2520pseudo-labels%2520to%2520hard%2520pseudo-labels.%2520Based%2520on%2520this%2520finding%252C%2520we%2520propose%2520DA-Cal%252C%2520a%2520dedicated%2520cross-domain%2520calibration%2520framework%2520that%2520transforms%2520target%2520domain%2520calibration%2520into%2520soft%2520pseudo-label%2520optimization.%2520DA-Cal%2520introduces%2520a%2520Meta%2520Temperature%2520Network%2520to%2520generate%2520pixel-level%2520calibration%2520parameters%2520and%2520employs%2520bi-level%2520optimization%2520to%2520establish%2520the%2520relationship%2520between%2520soft%2520pseudo-labels%2520and%2520UDA%2520supervision%252C%2520while%2520utilizing%2520complementary%2520domain-mixing%2520strategies%2520to%2520prevent%2520overfitting%2520and%2520reduce%2520domain%2520discrepancies.%2520Experiments%2520demonstrate%2520that%2520DA-Cal%2520seamlessly%2520integrates%2520with%2520existing%2520self-training%2520frameworks%2520across%2520multiple%2520UDA%2520segmentation%2520benchmarks%252C%2520significantly%2520improving%2520target%2520domain%2520calibration%2520while%2520delivering%2520performance%2520gains%2520without%2520inference%2520overhead.%2520The%2520code%2520will%2520be%2520released.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20860v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DA-Cal%3A%20Towards%20Cross-Domain%20Calibration%20in%20Semantic%20Segmentation&entry.906535625=Wangkai%20Li%20and%20Rui%20Sun%20and%20Zhaoyang%20Li%20and%20Yujia%20Chen%20and%20Tianzhu%20Zhang&entry.1292438233=While%20existing%20unsupervised%20domain%20adaptation%20%28UDA%29%20methods%20greatly%20enhance%20target%20domain%20performance%20in%20semantic%20segmentation%2C%20they%20often%20neglect%20network%20calibration%20quality%2C%20resulting%20in%20misalignment%20between%20prediction%20confidence%20and%20actual%20accuracy%20--%20a%20significant%20risk%20in%20safety-critical%20applications.%20Our%20key%20insight%20emerges%20from%20observing%20that%20performance%20degrades%20substantially%20when%20soft%20pseudo-labels%20replace%20hard%20pseudo-labels%20in%20cross-domain%20scenarios%20due%20to%20poor%20calibration%2C%20despite%20the%20theoretical%20equivalence%20of%20perfectly%20calibrated%20soft%20pseudo-labels%20to%20hard%20pseudo-labels.%20Based%20on%20this%20finding%2C%20we%20propose%20DA-Cal%2C%20a%20dedicated%20cross-domain%20calibration%20framework%20that%20transforms%2 {"title": "CogFlow: Bridging Perception and Reasoning through Knowledge Internalization for Visual Mathematical Problem Solving", "author": "Shuhang Chen and Yunqiu Xu and Junjie Xie and Aojun Lu and Tao Feng and Zeying Huang and Ning Zhang and Yi Sun and Yi Yang and Hangjie Yuan", "abstract": "Despite significant progress, multimodal large language models continue to struggle with visual mathematical problem solving. Some recent works recognize that visual perception is a bottleneck in visual mathematical reasoning, but their solutions are limited to improving the extraction and interpretation of visual inputs. Notably, they all ignore the key issue of whether the extracted visual cues are faithfully integrated and properly utilized in subsequent reasoning. Motivated by this, we present CogFlow, a novel cognitive-inspired three-stage framework that incorporates a knowledge internalization stage, explicitly simulating the hierarchical flow of human reasoning: perception$\\Rightarrow$internalization$\\Rightarrow$reasoning. In line with this hierarchical flow, we holistically enhance all its stages. We devise Synergistic Visual Rewards to boost perception capabilities in parametric and semantic spaces, jointly improving visual information extraction from symbols and diagrams. To guarantee faithful integration of extracted visual cues into subsequent reasoning, we introduce a Knowledge Internalization Reward model in the internalization stage, bridging perception and reasoning. Moreover, we design a Visual-Gated Policy Optimization algorithm to further enforce the reasoning is grounded with the visual knowledge, preventing models seeking shortcuts that appear coherent but are visually ungrounded reasoning chains. Moreover, we contribute a new dataset MathCog for model training, which contains samples with over 120K high-quality perception-reasoning aligned annotations. Comprehensive experiments and analysis on commonly used visual mathematical reasoning benchmarks validate the superiority of the proposed CogFlow. Project page: https://shchen233.github.io/cogflow.", "link": "http://arxiv.org/abs/2601.01874v3", "date": "2026-02-24", "relevancy": 2.2844, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.572}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.572}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5665}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CogFlow%3A%20Bridging%20Perception%20and%20Reasoning%20through%20Knowledge%20Internalization%20for%20Visual%20Mathematical%20Problem%20Solving&body=Title%3A%20CogFlow%3A%20Bridging%20Perception%20and%20Reasoning%20through%20Knowledge%20Internalization%20for%20Visual%20Mathematical%20Problem%20Solving%0AAuthor%3A%20Shuhang%20Chen%20and%20Yunqiu%20Xu%20and%20Junjie%20Xie%20and%20Aojun%20Lu%20and%20Tao%20Feng%20and%20Zeying%20Huang%20and%20Ning%20Zhang%20and%20Yi%20Sun%20and%20Yi%20Yang%20and%20Hangjie%20Yuan%0AAbstract%3A%20Despite%20significant%20progress%2C%20multimodal%20large%20language%20models%20continue%20to%20struggle%20with%20visual%20mathematical%20problem%20solving.%20Some%20recent%20works%20recognize%20that%20visual%20perception%20is%20a%20bottleneck%20in%20visual%20mathematical%20reasoning%2C%20but%20their%20solutions%20are%20limited%20to%20improving%20the%20extraction%20and%20interpretation%20of%20visual%20inputs.%20Notably%2C%20they%20all%20ignore%20the%20key%20issue%20of%20whether%20the%20extracted%20visual%20cues%20are%20faithfully%20integrated%20and%20properly%20utilized%20in%20subsequent%20reasoning.%20Motivated%20by%20this%2C%20we%20present%20CogFlow%2C%20a%20novel%20cognitive-inspired%20three-stage%20framework%20that%20incorporates%20a%20knowledge%20internalization%20stage%2C%20explicitly%20simulating%20the%20hierarchical%20flow%20of%20human%20reasoning%3A%20perception%24%5CRightarrow%24internalization%24%5CRightarrow%24reasoning.%20In%20line%20with%20this%20hierarchical%20flow%2C%20we%20holistically%20enhance%20all%20its%20stages.%20We%20devise%20Synergistic%20Visual%20Rewards%20to%20boost%20perception%20capabilities%20in%20parametric%20and%20semantic%20spaces%2C%20jointly%20improving%20visual%20information%20extraction%20from%20symbols%20and%20diagrams.%20To%20guarantee%20faithful%20integration%20of%20extracted%20visual%20cues%20into%20subsequent%20reasoning%2C%20we%20introduce%20a%20Knowledge%20Internalization%20Reward%20model%20in%20the%20internalization%20stage%2C%20bridging%20perception%20and%20reasoning.%20Moreover%2C%20we%20design%20a%20Visual-Gated%20Policy%20Optimization%20algorithm%20to%20further%20enforce%20the%20reasoning%20is%20grounded%20with%20the%20visual%20knowledge%2C%20preventing%20models%20seeking%20shortcuts%20that%20appear%20coherent%20but%20are%20visually%20ungrounded%20reasoning%20chains.%20Moreover%2C%20we%20contribute%20a%20new%20dataset%20MathCog%20for%20model%20training%2C%20which%20contains%20samples%20with%20over%20120K%20high-quality%20perception-reasoning%20aligned%20annotations.%20Comprehensive%20experiments%20and%20analysis%20on%20commonly%20used%20visual%20mathematical%20reasoning%20benchmarks%20validate%20the%20superiority%20of%20the%20proposed%20CogFlow.%20Project%20page%3A%20https%3A//shchen233.github.io/cogflow.%0ALink%3A%20http%3A//arxiv.org/abs/2601.01874v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCogFlow%253A%2520Bridging%2520Perception%2520and%2520Reasoning%2520through%2520Knowledge%2520Internalization%2520for%2520Visual%2520Mathematical%2520Problem%2520Solving%26entry.906535625%3DShuhang%2520Chen%2520and%2520Yunqiu%2520Xu%2520and%2520Junjie%252 {"title": "TextPecker: Rewarding Structural Anomaly Quantification for Enhancing Visual Text Rendering", "author": "Hanshen Zhu and Yuliang Liu and Xuecheng Wu and An-Lan Wang and Hao Feng and Dingkang Yang and Chao Feng and Can Huang and Jingqun Tang and Xiang Bai", "abstract": "Visual Text Rendering (VTR) remains a critical challenge in text-to-image generation, where even advanced models frequently produce text with structural anomalies such as distortion, blurriness, and misalignment. However, we find that leading MLLMs and specialist OCR models largely fail to perceive these structural anomalies, creating a critical bottleneck for both VTR evaluation and RL-based optimization. As a result, even state-of-the-art generators (e.g., SeedDream4.0, Qwen-Image) still struggle to render structurally faithful text. To address this, we propose TextPecker, a plug-and-play structural anomaly perceptive RL strategy that mitigates noisy reward signals and works with any textto-image generator. To enable this capability, we construct a recognition dataset with character-level structural-anomaly annotations and develop a stroke-editing synthesis engine to expand structural-error coverage. Experiments show that TextPecker consistently improves diverse text-to-image models; even on the well-optimized Qwen-Image, it significantly yields average gains of 4% in structural fidelity and 8.7% in semantic alignment for Chinese text rendering, establishing a new state-of-the-art in high-fidelity VTR. Our work fills a gap in VTR optimization, providing a foundational step towards reliable and structural faithful visual text generation.", "link": "http://arxiv.org/abs/2602.20903v1", "date": "2026-02-24", "relevancy": 2.2693, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5847}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5689}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5588}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TextPecker%3A%20Rewarding%20Structural%20Anomaly%20Quantification%20for%20Enhancing%20Visual%20Text%20Rendering&body=Title%3A%20TextPecker%3A%20Rewarding%20Structural%20Anomaly%20Quantification%20for%20Enhancing%20Visual%20Text%20Rendering%0AAuthor%3A%20Hanshen%20Zhu%20and%20Yuliang%20Liu%20and%20Xuecheng%20Wu%20and%20An-Lan%20Wang%20and%20Hao%20Feng%20and%20Dingkang%20Yang%20and%20Chao%20Feng%20and%20Can%20Huang%20and%20Jingqun%20Tang%20and%20Xiang%20Bai%0AAbstract%3A%20Visual%20Text%20Rendering%20%28VTR%29%20remains%20a%20critical%20challenge%20in%20text-to-image%20generation%2C%20where%20even%20advanced%20models%20frequently%20produce%20text%20with%20structural%20anomalies%20such%20as%20distortion%2C%20blurriness%2C%20and%20misalignment.%20However%2C%20we%20find%20that%20leading%20MLLMs%20and%20specialist%20OCR%20models%20largely%20fail%20to%20perceive%20these%20structural%20anomalies%2C%20creating%20a%20critical%20bottleneck%20for%20both%20VTR%20evaluation%20and%20RL-based%20optimization.%20As%20a%20result%2C%20even%20state-of-the-art%20generators%20%28e.g.%2C%20SeedDream4.0%2C%20Qwen-Image%29%20still%20struggle%20to%20render%20structurally%20faithful%20text.%20To%20address%20this%2C%20we%20propose%20TextPecker%2C%20a%20plug-and-play%20structural%20anomaly%20perceptive%20RL%20strategy%20that%20mitigates%20noisy%20reward%20signals%20and%20works%20with%20any%20textto-image%20generator.%20To%20enable%20this%20capability%2C%20we%20construct%20a%20recognition%20dataset%20with%20character-level%20structural-anomaly%20annotations%20and%20develop%20a%20stroke-editing%20synthesis%20engine%20to%20expand%20structural-error%20coverage.%20Experiments%20show%20that%20TextPecker%20consistently%20improves%20diverse%20text-to-image%20models%3B%20even%20on%20the%20well-optimized%20Qwen-Image%2C%20it%20significantly%20yields%20average%20gains%20of%204%25%20in%20structural%20fidelity%20and%208.7%25%20in%20semantic%20alignment%20for%20Chinese%20text%20rendering%2C%20establishing%20a%20new%20state-of-the-art%20in%20high-fidelity%20VTR.%20Our%20work%20fills%20a%20gap%20in%20VTR%20optimization%2C%20providing%20a%20foundational%20step%20towards%20reliable%20and%20structural%20faithful%20visual%20text%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20903v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTextPecker%253A%2520Rewarding%2520Structural%2520Anomaly%2520Quantification%2520for%2520Enhancing%2520Visual%2520Text%2520Rendering%26entry.906535625%3DHanshen%2520Zhu%2520and%2520Yuliang%2520Liu%2520and%2520Xuecheng%2520Wu%2520and%2520An-Lan%2520Wang%2520and%2520Hao%2520Feng%2520and%2520Dingkang%2520Yang%2520and%2520Chao%2520Feng%2520and%2520Can%2520Huang%2520and%2520Jingqun%2520Tang%2520and%2520Xiang%2520Bai%26entry.1292438233%3DVisual%2520Text%2520Rendering%2520%2528VTR%2529%2520remains%2520a%2520critical%2520challenge%2520in%2520text-to-image%2520generation%252C%2520where%2520even%2520advanced%2520models%2520frequently%2520produce%2520text%2520with%2520structural%2520anomalies%2520such%2520as%2520distortion%252C%2520blurriness%252C%2520and%2520misalignment.%2520However%252C%2520we%2520find%2520that%2520leading%2520MLLMs%2520and%2520specialist%2520OCR%2520models%2520largely%2520fail%2520to%2520perceive%2520these%2520structural%2520anomalies%252C%2520creating%2520a%2520critical%2520bottleneck%2520for%2520both%2520VTR%2520evaluation%2520and%2520RL-based%2520optimization.%2520As%2520a%2520result%252C%2520even%2520state-of-the-art%2520generators%2520%2528e.g.%252C%2520SeedDream4.0%252C%2520Qwen-Image%2529%2520still%2520struggle%2520to%2520render%2520structurally%2520faithful%2520text.%2520To%2520address {"title": "Event-Aided Sharp Radiance Field Reconstruction for Fast-Flying Drones", "author": "Rong Zou and Marco Cannici and Davide Scaramuzza", "abstract": "Fast-flying aerial robots promise rapid inspection under limited battery constraints, with direct applications in infrastructure inspection, terrain exploration, and search and rescue. However, high speeds lead to severe motion blur in images and induce significant drift and noise in pose estimates, making dense 3D reconstruction with Neural Radiance Fields (NeRFs) particularly challenging due to their high sensitivity to such degradations. In this work, we present a unified framework that leverages asynchronous event streams alongside motion-blurred frames to reconstruct high-fidelity radiance fields from agile drone flights. By embedding event-image fusion into NeRF optimization and jointly refining event-based visual-inertial odometry priors using both event and frame modalities, our method recovers sharp radiance fields and accurate camera trajectories without ground-truth supervision. We validate our approach on both synthetic data and real-world sequences captured by a fast-flying drone. Despite highly dynamic drone flights, where RGB frames are severely degraded by motion blur and pose priors become unreliable, our method reconstructs high-fidelity radiance fields and preserves fine scene details, delivering a performance gain of over 50% on real-world data compared to state-of-the-art methods.", "link": "http://arxiv.org/abs/2602.21101v1", "date": "2026-02-24", "relevancy": 2.2663, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5873}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5728}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5433}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones&body=Title%3A%20Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones%0AAuthor%3A%20Rong%20Zou%20and%20Marco%20Cannici%20and%20Davide%20Scaramuzza%0AAbstract%3A%20Fast-flying%20aerial%20robots%20promise%20rapid%20inspection%20under%20limited%20battery%20constraints%2C%20with%20direct%20applications%20in%20infrastructure%20inspection%2C%20terrain%20exploration%2C%20and%20search%20and%20rescue.%20However%2C%20high%20speeds%20lead%20to%20severe%20motion%20blur%20in%20images%20and%20induce%20significant%20drift%20and%20noise%20in%20pose%20estimates%2C%20making%20dense%203D%20reconstruction%20with%20Neural%20Radiance%20Fields%20%28NeRFs%29%20particularly%20challenging%20due%20to%20their%20high%20sensitivity%20to%20such%20degradations.%20In%20this%20work%2C%20we%20present%20a%20unified%20framework%20that%20leverages%20asynchronous%20event%20streams%20alongside%20motion-blurred%20frames%20to%20reconstruct%20high-fidelity%20radiance%20fields%20from%20agile%20drone%20flights.%20By%20embedding%20event-image%20fusion%20into%20NeRF%20optimization%20and%20jointly%20refining%20event-based%20visual-inertial%20odometry%20priors%20using%20both%20event%20and%20frame%20modalities%2C%20our%20method%20recovers%20sharp%20radiance%20fields%20and%20accurate%20camera%20trajectories%20without%20ground-truth%20supervision.%20We%20validate%20our%20approach%20on%20both%20synthetic%20data%20and%20real-world%20sequences%20captured%20by%20a%20fast-flying%20drone.%20Despite%20highly%20dynamic%20drone%20flights%2C%20where%20RGB%20frames%20are%20severely%20degraded%20by%20motion%20blur%20and%20pose%20priors%20become%20unreliable%2C%20our%20method%20reconstructs%20high-fidelity%20radiance%20fields%20and%20preserves%20fine%20scene%20details%2C%20delivering%20a%20performance%20gain%20of%20over%2050%25%20on%20real-world%20data%20compared%20to%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21101v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvent-Aided%2520Sharp%2520Radiance%2520Field%2520Reconstruction%2520for%2520Fast-Flying%2520Drones%26entry.906535625%3DRong%2520Zou%2520and%2520Marco%2520Cannici%2520and%2520Davide%2520Scaramuzza%26entry.1292438233%3DFast-flying%2520aerial%2520robots%2520promise%2520rapid%2520inspection%2520under%2520limited%2520battery%2520constraints%252C%2520with%2520direct%2520applications%2520in%2520infrastructure%2520inspection%252C%2520terrain%2520exploration%252C%2520and%2520search%2520and%2520rescue.%2520However%252C%2520high%2520speeds%2520lead%2520to%2520severe%2520motion%2520blur%2520in%2520images%2520and%2520induce%2520significant%2520drift%2520and%2520noise%2520in%2520pose%2520estimates%252C%2520making%2520dense%25203D%2520reconstruction%2520with%2520Neural%2520Radiance%2520Fields%2520%2528NeRFs%2529%2520particularly%2520challenging%2520due%2520to%2520their%2520high%2520sensitivity%2520to%2520such%2520degradations.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520unified%2520framework%2520that%2520leverages%2520asynchronous%2520event%2520streams%2520alongside%2520motion-blurred%2520frames%2520to%2520reconstruct%2520high-fidelity%2520radiance%2520fields%2520from%2520agile%2520drone%2520flights.%2520By%2520embedding%2520event-image%2520fusion%2520into%2520NeRF%2520optimization%2520and%2520jointly%2520refining%2520event-based%2520visual-inertial%2520odometry%2520priors%2520using%2520both%2520event%2520and%2520frame%2520modalities%252C%2520our%2520method%2520recovers%2520sharp%2520radiance%2520fields%2520and%2520accurate%2520camera%2520trajectories%2520without%2520ground-truth%2520supervision.%2520We%2520validate%2520our%2520approach%2520on%2520both%2520synthetic%2520data%2520and%2520real-world%2520sequences%2520captured%2520by%2520a%2520fast-flying%2520drone.%2520Despite%2520highly%2520dynamic%2520drone%2520flights%252C%2520where%2520RGB%2520frames%2520are%2520severely%2520degraded%2520by%2520motion%2520blur%2520and%2520pose%2520priors%2520become%2520unreliable%252C%2520our%2520method%2520reconstructs%2520high-fidelity%2520radiance%2520fields%2520and%2520preserves%2520fine%2520scene%2520details%252C%2520delivering%2520a%2520performance%2520gain%2520of%2520over%252050%2525%2520on%2520real-world%2520data%2520compared%2520to%2520state-of-the-art%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21101v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones&entry.906535625=Rong%20Zou%20and%20Marco%20Cannici%20and%20Davide%20Scaramuzza&entry.1292438233=Fast-flying%20aerial%20robots%20promise%20rapid%20inspection%20under%20limited%20battery%20constraints%2C%20with%20direct%20applications%20in%20infrastructure%20inspection%2C%20terrain%20exploration%2C%20and%20search%20and%20rescue.%20However%2C%20high%20speeds%20lead%20to%20severe%20motion%20blur%20in%20images%20and%20induce%20significant%20drift%20and%20noise%20in%20pose%20estimates%2C%20making%20dense%203D%20reconstruction%20with%20Neural%20Radiance%20Fields%20%28NeRFs%29%20particularly%20challenging%20due%20to%20their%20high%20sensitivity%20to%20such%20degradations.%20In%20this%20work%2C%20we%20present%20a%20unified%20framework%20that%20leverages%20asynchronous%20event%20streams%20alongside%20motion-blurred%20frames%20to%20reconstruct%20high-fidelity%20radiance%20fields%20from%20agile%20drone%20flights.%20By%20embedding%20event-image%20fusion%20into%20NeRF%20optimization%20and%20jointly%20refining%20event-based%20visual-inertial%20odometry%20priors%20using%20both%20event%20and%20frame%20modalities%2C%20our

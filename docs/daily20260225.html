{"title": "The Wisdom of Many Queries: Complexity-Diversity Principle for Dense Retriever Training", "author": "Xincan Feng and Noriki Nishida and Yusuke Sakai and Yuji Matsumoto", "abstract": "Prior synthetic query generation for dense retrieval produces one query per document, focusing on quality. We systematically study multi-query synthesis, discovering a quality-diversity trade-off: quality benefits in-domain, diversity benefits out-of-domain (OOD). Experiments on 31 datasets show diversity especially benefits multi-hop retrieval. Analysis reveals diversity benefit correlates with query complexity ($r$$\\geq$0.95), measured by content words (CW). We formalize this as the Complexity-Diversity Principle (CDP): query complexity determines optimal diversity. CDP provides thresholds (CW$>$10: use diversity; CW$<$7: avoid it) and enables CW-weighted training that improves OOD even with single-query data.", "link": "http://arxiv.org/abs/2602.09448v2", "date": "2026-02-24", "relevancy": 2.1409, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4294}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4276}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Wisdom%20of%20Many%20Queries%3A%20Complexity-Diversity%20Principle%20for%20Dense%20Retriever%20Training&body=Title%3A%20The%20Wisdom%20of%20Many%20Queries%3A%20Complexity-Diversity%20Principle%20for%20Dense%20Retriever%20Training%0AAuthor%3A%20Xincan%20Feng%20and%20Noriki%20Nishida%20and%20Yusuke%20Sakai%20and%20Yuji%20Matsumoto%0AAbstract%3A%20Prior%20synthetic%20query%20generation%20for%20dense%20retrieval%20produces%20one%20query%20per%20document%2C%20focusing%20on%20quality.%20We%20systematically%20study%20multi-query%20synthesis%2C%20discovering%20a%20quality-diversity%20trade-off%3A%20quality%20benefits%20in-domain%2C%20diversity%20benefits%20out-of-domain%20%28OOD%29.%20Experiments%20on%2031%20datasets%20show%20diversity%20especially%20benefits%20multi-hop%20retrieval.%20Analysis%20reveals%20diversity%20benefit%20correlates%20with%20query%20complexity%20%28%24r%24%24%5Cgeq%240.95%29%2C%20measured%20by%20content%20words%20%28CW%29.%20We%20formalize%20this%20as%20the%20Complexity-Diversity%20Principle%20%28CDP%29%3A%20query%20complexity%20determines%20optimal%20diversity.%20CDP%20provides%20thresholds%20%28CW%24%3E%2410%3A%20use%20diversity%3B%20CW%24%3C%247%3A%20avoid%20it%29%20and%20enables%20CW-weighted%20training%20that%20improves%20OOD%20even%20with%20single-query%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2602.09448v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Wisdom%2520of%2520Many%2520Queries%253A%2520Complexity-Diversity%2520Principle%2520for%2520Dense%2520Retriever%2520Training%26entry.906535625%3DXincan%2520Feng%2520and%2520Noriki%2520Nishida%2520and%2520Yusuke%2520Sakai%2520and%2520Yuji%2520Matsumoto%26entry.1292438233%3DPrior%2520synthetic%2520query%2520generation%2520for%2520dense%2520retrieval%2520produces%2520one%2520query%2520per%2520document%252C%2520focusing%2520on%2520quality.%2520We%2520systematically%2520study%2520multi-query%2520synthesis%252C%2520discovering%2520a%2520quality-diversity%2520trade-off%253A%2520quality%2520benefits%2520in-domain%252C%2520diversity%2520benefits%2520out-of-domain%2520%2528OOD%2529.%2520Experiments%2520on%252031%2520datasets%2520show%2520diversity%2520especially%2520benefits%2520multi-hop%2520retrieval.%2520Analysis%2520reveals%2520diversity%2520benefit%2520correlates%2520with%2520query%2520complexity%2520%2528%2524r%2524%2524 {"title": "LogicGraph : Benchmarking Multi-Path Logical Reasoning via Neuro-Symbolic Generation and Verification", "author": "Yanrui Wu and Lingling Zhang and Xinyu Zhang and Jiayu Chang and Pengyu Li and Xu Jiang and Jingtao Hu and Jun Liu", "abstract": "Evaluations of large language models (LLMs) primarily emphasize convergent logical reasoning, where success is defined by producing a single correct proof. However, many real-world reasoning problems admit multiple valid derivations, requiring models to explore diverse logical paths rather than committing to one route. To address this limitation, we introduce LogicGraph, the first benchmark aimed to systematically evaluate multi-path logical reasoning, constructed via a neuro-symbolic framework that leverages backward logic generation and semantic instantiation. This pipeline yields solver-verified reasoning problems formalized by high-depth multi-path reasoning and inherent logical distractions, where each instance is associated with an exhaustive set of minimal proofs. We further propose a reference-free evaluation framework to rigorously assess model performance in both convergent and divergent regimes. Experiments on state-of-the-art language models reveal a common limitation: models tend to commit early to a single route and fail to explore alternatives, and the coverage gap grows substantially with reasoning depth. LogicGraph exposes this divergence gap and provides actionable insights to motivate future improvements. Our code and data will be released at https://github.com/kkkkarry/LogicGraph.", "link": "http://arxiv.org/abs/2602.21044v1", "date": "2026-02-24", "relevancy": 2.1346, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5361}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5361 {"title": "MAST: A Multi-fidelity Augmented Surrogate model via Spatial Trust-weighting", "author": "Ahmed Mohamed Eisa Nasr and Haris Moazam Sheikh", "abstract": "In engineering design and scientific computing, computational cost and predictive accuracy are intrinsically coupled. High-fidelity simulations provide accurate predictions but at substantial computational costs, while lower-fidelity approximations offer efficiency at the expense of accuracy. Multi-fidelity surrogate modelling addresses this trade-off by combining abundant low-fidelity data with sparse high-fidelity observations. However, existing methods suffer from expensive training cost or rely on global correlation assumptions that often fail in practice to capture how fidelity relationships vary across the input space, leading to poor performance particularly under tight budget constraints. We introduce MAST, a method that blends corrected low-fidelity observations with high-fidelity predictions, trusting high-fidelity near observed samples and relying on corrected low-fidelity elsewhere. MAST achieves this through explicit discrepancy modelling and distance-based weighting with closed-form variance propagation, producing a single heteroscedastic Gaussian process. Across multi-fidelity synthetic benchmarks, MAST shows a marked improvement over the current state-of-the-art techniques. Crucially, MAST maintains robust performance across varying total budget and fidelity gaps, conditions under which competing methods exhibit significant degradation or unstable behaviour.", "link": "http://arxiv.org/abs/2602.20974v1", "date": "2026-02-24", "relevancy": 2.1323, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.551}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "simila %20over%20the%20current%20state-of-the-art%20techniques.%20Crucially%2C%20MAST%20maintains%20robust%20performance%20across%20varying%20total%20budget%20and%20fidelity%20gaps%2C%20conditions%20under%20which%20competing%20methods%20exhibit%20significant%20degradation%20or%20unstable%20behaviour.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20974v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAST%253A%2520A%2520Multi-fidelity%2520Augmented%2520Surrogate%2520model%2520via%2520Spatial%2520Trust-weighting%26entry.906535625%3DAhmed%2520Mohamed%2520Eisa%2520Nasr%2520and%2520Haris%2520Moazam%2520Sheikh%26entry.1292438233%3DIn%2520engineering%2520design%2520and%2520scientific%2520computing%252C%2520computational%2520cost%2520and%2520predictive%2520accuracy%2520are%2520intrinsically%2520coupled.%2520High-fidelity%2520simulations%2520provide%2520accurate%2520predictions%2520but%2520at%2520substantial%2520computational%2520costs%252C%2520while%2520lower-fidelity%2520approximations%2520offer%2520efficiency%2520at%2520the%2520expense%2520of%2520accuracy.%2520Multi-fidelity%2520surrogate%2520modelling%2520addresses%2520this%2520trade-off%2520by%2520combining%2520abundant%2520low-fidelity%2520data%2520with%2520sparse%2520high-fidelity%2520observations.%2520However%252C%2520existing%2520methods%2520suffer%2520from%2520expensive%2520training%2520cost%2520or%2520rely%2520on%2520global%2520correlation%2520assumptions%2520that%2520often%2520fail%2520in%2520practice%2520to%2520capture%2520how%2520fidelity%2520relationships%2520vary%2520across%2520the%2520input%2520space%252C%2520leading%2520to%2520poor%2520performance%2520particularly%2520under%2520tight%2520budget%2520constraints.%2520We%2520introduce%2520MAST%252C%2520a%2520method%2520that%2520blends%2520corrected%2520low-fidelity%2520observations%2520with%2520high-fidelity%2520predictions%252C%2520trusting%2520high-fidelity%2520near%2520observed%2520s {"title": "UI-Venus-1.5 Technical Report", "author": " Venus Team and Changlong Gao and Zhangxuan Gu and Yulin Liu and Xinyu Qiu and Shuheng Shen and Yue Wen and Tianyu Xia and Zhenyu Xu and Zhengwen Zeng and Beitong Zhou and Xingran Zhou and Weizhi Chen and Sunhao Dai and Jingya Dou and Yichen Gong and Yuan Guo and Zhenlin Guo and Feng Li and Qian Li and Jinzhen Lin and Yuqi Zhou and Linchao Zhu and Liang Chen and Zhenyu Guo and Changhua Meng and Weiqiang Wang", "abstract": "GUI agents have emerged as a powerful paradigm for automating interactions in digital environments, yet achieving both broad generality and consistently strong task performance remains challenging. In this report, we present UI-Venus-1.5, a unified, end-to-end GUI Agent designed for robust real-world applications. The proposed model family comprises two dense variants (2B and 8B) and one mixture-of-experts variant (30B-A3B) to meet various downstream application scenarios. Compared to our previous version, UI-Venus-1.5 introduces three key technical advances: (1) a comprehensive Mid-Training stage leveraging 10 billion tokens across 30+ datasets to establish foundational GUI semantics; (2) Online Reinforcement Learning with full-trajectory rollouts, aligning training objectives with long-horizon, dynamic navigation in large-scale environments; and (3) a single unified GUI Agent constructed via Model Merging, which synthesizes domain-specific models (grounding, web, and mobile) into one cohesive checkpoint. Extensive evaluations demonstrate that UI-Venus-1.5 establishes new state-of-the-art performance on benchmarks such as ScreenSpot-Pro (69.6%), VenusBench-GD (75.0%), and AndroidWorld (77.6%), significantly outperforming previous strong baselines. In addition, UI-Venus-1.5 demonstrates robust navigation capabilities across a variety of Chinese mobile apps, effectively executing user instructions in real-world scenarios. Code: https://github.com/inclusionAI/UI-Venus; Model: https://huggingface. {"title": "GatedCLIP: Gated Multimodal Fusion for Hateful Memes Detection", "author": "Yingying Guo and Ke Zhang and Zirong Zeng", "abstract": "Detecting hateful content in multimodal memes presents unique challenges, as harmful messages often emerge from the complex interplay between benign images and text. We propose GatedCLIP, a Vision-Language model that enhances CLIP's multimodal capabilities with specialized architectural improvements for hateful memes detection. Our approach introduces learned projection heads that map CLIP embeddings to a task-optimized semantic space, a dynamic gated fusion mechanism that adaptively weights visual and textual features, and a contrastive learning objective that maintains cross-modal semantic alignment. Experiments on the Hateful Memes dataset demonstrate that GatedCLIP achieves an AUROC of 0.66, substantially outperforming the CLIP baseline (AUROC 0.49) while maintaining computational efficiency with only 350K trainable parameters.", "link": "http://arxiv.org/abs/2602.20818v1", "date": "2026-02-24", "relevancy": 2.1271, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5843}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5043}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4902}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GatedCLIP%3A%20Gated%20Multimodal%20Fusion%20for%20Hateful%20Memes%20Detection&body=Title%3A%20GatedCLIP%3A%20Gated%20Multimodal%20Fusion%20for%20Hateful%20Memes%20Detection%0AAuthor%3A%20Yingying%20Guo%20and%20Ke%20Zhang%20and%20Zirong%20Zeng%0AAbstract%3A%20Detecting%20hateful%20content%20in%20multimodal%20memes%20presents%20unique%20challenges%2C%20as%20harmful%20messages%20often%20emerge%20from%20the%20complex%20interplay%20between%20benign%20images%20and%20text.%20We%20propose%20GatedCLIP%2C%20a%20Vision-Language%20model%20that%20enhances%20CLIP%27s%20multimodal%20capabilities%20with%20specialized%20architectural%20improvements%20for%20hateful%20memes%20detection.%20Our%20approach%20introduces%20learned%20projection%20heads%20that%20map%20CLIP%20embeddings%20to%20a%20task-optimized%20semantic%20space%2C%20a%20dynamic%20gated%20fusion%20mechanism%20that%20adaptively%20weights%20visual%20and%20textual%20features%2C%20and%20a%20contrastive%20learning%20objective%20that%20maintains%20cross-modal%20semantic%20alignment.%20Experiments%20on%20the%20Hateful%20Memes%20dataset%20demonstrate%20that%20GatedCLIP%20achieves%20an%20AUROC%20of%200.66%2C%20substantially%20outperforming%20the%20CLIP%20baseline%20%28AUROC%200.49%29%20while%20maintaining%20computational%20efficiency%20with%20only%20350K%20trainable%20parameters.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20818v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGatedCLIP%253A%2520Gated%2520Multimodal%2520Fusion%2520for%2520Hateful%2520Memes%2520Detection%26entry.906535625%3DYingying%2520Guo%2520and%2520Ke%2520Zhang%2520and%2520Zirong%2520Zeng%26entry.1292438233%3DDetecting%2520hateful%2520content%2520in%2520multimodal%2520memes%2520presents%2520unique%2520challenges%252C%2520as%2520harmful%2520messages%2520often%2520emerge%2520from%2520the%2520complex%2520interplay%2520between%2520benign%2520images%2520and%2520text.%2520We%2520propose%2520GatedCLIP%252C%2520a%2520Vision-Language%2520model%2520that%2520enhances%2520CLIP%2527s%2520multimodal%2520capabilities%2520with%2520specialized%2520architectural%2520improvements%2520for%2520hateful%2520memes%2520detection.%2520Our%2520approach%2520introduces%2520learned%2520projection%2520heads%2520that%2520map%2520CLIP%2520embeddings%2520to%2520a%2520task-optimized%2520semantic%2520space%252C%252 {"title": "A Benchmark for Deep Information Synthesis", "author": "Debjit Paul and Daniel Murphy and Milan Gritta and Ronald Cardenas and Victor Prokhorov and Lena Sophia Bolliger and Aysim Toker and Roy Miles and Andreea-Maria Oncescu and Jasivan Alex Sivakumar and Philipp Borchert and Ismail Elezi and Meiru Zhang and Ka Yiu Lee and Guchun Zhang and Jun Wang and Gerasimos Lampouras", "abstract": "Large language model (LLM)-based agents are increasingly used to solve complex tasks involving tool use, such as web browsing, code execution, and data analysis. However, current evaluation benchmarks do not adequately assess their ability to solve real-world tasks that require synthesizing information from multiple sources and inferring insights beyond simple fact retrieval. To address this, we introduce DEEPSYNTH, a novel benchmark designed to evaluate agents on realistic, time-consuming problems that combine information gathering, synthesis, and structured reasoning to produce insights. DEEPSYNTH contains 120 tasks collected across 7 domains and data sources covering 67 countries. DEEPSYNTH is constructed using a multi-stage data collection pipeline that requires annotators to collect official data sources, create hypotheses, perform manual analysis, and design tasks with verifiable answers. When evaluated on DEEPSYNTH, 11 state-of-the-art LLMs and deep research agents achieve a maximum F1 score of 8.97 and 17.5 on the LLM-judge metric, underscoring the difficulty of the benchmark. Our analysis reveals that current agents struggle with hallucinations and reasoning over large information spaces, highlighting DEEPSYNTH as a crucial benchmark for guiding future research.", "link": "http://arxiv.org/abs/2602.21143v1", "date": "2026-02-24", "relevancy": 2.1178, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5367}, {"title": "Lexicon3D: Probing Visual Foundati {"title": "EW-DETR: Evolving World Object Detection via Incremental Low-Rank DEtection TRansformer", "author": "Munish Monga and Vishal Chudasama and Pankaj Wasnik and C. V. Jawahar", "abstract": "Real-world object detection must operate in evolving environments where new classes emerge, domains shift, and unseen objects must be identified as \"unknown\": all without accessing prior data. We introduce Evolving World Object Detection (EWOD), a paradigm coupling incremental learning, domain adaptation, and unknown detection under exemplar-free constraints. To tackle EWOD, we propose EW-DETR framework that augments DETR-based detectors with three synergistic modules: Incremental LoRA Adapters for exemplar-free incremental learning under evolving domains; a Query-Norm Objectness Adapter that decouples objectness-aware features from DETR decoder queries; and Entropy-Aware Unknown Mixing for calibrated unknown detection. This framework generalises across DETR-based detectors, enabling state-of-the-art RF-DETR to operate effectively in evolving-world settings. We also introduce FOGS (Forgetting, Openness, Generalisation Score) to holistically evaluate performance across these dimensions. Extensive experiments on Pascal Series and Diverse Weather benchmarks show EW-DETR outperforms other methods, improving FOGS by 57.24%.", "link": "http://arxiv.org/abs/2602.20985v1", "date": "2026-02-24", "relevancy": 2.1126, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5608}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5232}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5201}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EW-DETR%3A%20Evolving%20World%20Object%20Detection%20via%20Incremental%20Low-Rank%20DEtection%20TRansformer&body=Title%3A%20EW-DETR%3A%20Evolving%20World%20Object%20Detection%20via%20Incremental%20Low-Rank%20DEtection%20TRansformer%0AAuthor%3A%20Munish%20Monga%20and%20Vishal%20Chudasama%20and%20Pankaj%20Wasnik%20and%20C.%20V.%20Jawahar%0AAbstract%3A%20Real-world%20object%20detection%20must%20operate%20in%20evolving%20environments%20where%20new%20classes%20emerge%2C%20domains%20shift%2C%20and%20unseen%20objects%20must%20be%20identified%20as%20%22unknown%22%3A%20all%20without%20accessing%20prior%20data.%20We%20introduce%20Evolving%20World%20Object%20Detection%20%28EWOD%29%2C%20a%20paradigm%20coupling%20incremental%20learning%2C%20domain%20adaptation%2C%20and%20unknown%20detection%20under%20exemplar-free%20constraints.%20To%20tackle%20EWOD%2C%20we%20propose%20EW-DETR%20framework%20that%20augments%20DETR-based%20detectors%20with%20three%20synergistic%20modules%3A%20Incremental%20LoRA%20Adapters%20for%20exemplar-free%20incremental%20learning%20under%20evolving%20domains%3B%20a%20Query-Norm%20Objectness%20Adapter%20that%20decouples%20objectness-aware%20features%20from%20DETR%20decoder%20queries%3B%20and%20Entropy-Aware%20Unknown%20Mixing%20for%20calibrated%20unknown%20detection.%20This%20framework%20generalises%20across%20DETR-based%20detectors%2C%20enabling%20state-of-the-art%20RF-DETR%20to%20operate%20effectively%20in%20evolving-world%20settings.%20We%20also%20introduce%20FOGS%20%28Forgetting%2C%20Openness%2C%20Generalisation%20Score%29%20to%20holistically%20evaluate%20performance%20across%20these%20dimensions.%20Extensive%20experiments%20on%20Pascal%20Series%20and%20Diverse%20Weather%20benchmarks%20show%20EW-DETR%20outperforms%20other%20methods%2C%20improving%20FOGS%20by%2057.24%25.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20985v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/vie 20outperforms%2520other%2520methods%252C%2520improving%2520FOGS%2520by%252057.24%2525.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20985v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EW-DETR%3A%20Evolving%20World%20Object%20Detection%20via%20Incremental%20Low-Rank%20DEtection%20TRansformer&entry.906535625=Munish%20Monga%20and%20Vishal%20Chudasama%20and%20Pankaj%20Wasnik%20and%20C.%20V.%20Jawahar&entry.1292438233=Real-world%20object%20detection%20must%20operate%20in%20evolving%20environments%20where%20new%20classes%20emerge%2C%20domains%20shift%2C%20and%20unseen%20objects%20must%20be%20identified%20as%20%22unknown%22%3A%20all%20without%20accessing%20prior%20data.%20We%20introduce%20Evolving%20World%20Object%20Detection%20%28EWOD%29%2C%20a%20paradigm%20coupling%20incremental%20learning%2C%20domain%20adaptation%2C%20and%20unknown%20detection%20under%20exemplar-free%20constraints.%20To%20tackle%20EWOD%2C%20we%20propose%20EW-DETR%20framework%20that%20augments%20DETR-based%20detectors%20with%20three%20synergistic%20modules%3A%20Incremental%20LoRA%20Adapters%20for%20exemplar-free%20incremental%20learning%20under%20evolving%20domains%3B%20a%20Query-Norm%20Objectness%20Adapter%20that%20decouples%20objectness-aware%20features%20from%20DETR%20decoder%20queries%3B%20and%20Entropy-Aware%20Unknown%20Mixing%20for%20calibrated%20unknown%20detection.%20This%20framework%20generalises%20across%20DETR-based%20detectors%2C%20enabling%20state-of-the-art%20RF-DETR%20to%20operate%20effectively%20in%20evolving-world%20settings.%20We%20also%20introduce%20FOGS%20%28Forgetting%2C%20Openness%2C%20Generalisation%20Score%29%20to%20holistically%20evaluate%20performance%20across%20these%20dimensions.%20Extensive%20experiments%20on%20Pascal%20Series%20and%20Diverse%20Weather%20benchmarks%20show%20EW-DETR%20outperforms%20other%20methods%2C%20improving%20FOGS%20by%2057.24%25.&entry.18386 {"title": "CG-DMER: Hybrid Contrastive-Generative Framework for Disentangled Multimodal ECG Representation Learning", "author": "Ziwei Niu and Hao Sun and Shujun Bian and Xihong Yang and Lanfen Lin and Yuxin Liu and Yueming Jin", "abstract": "Accurate interpretation of electrocardiogram (ECG) signals is crucial for diagnosing cardiovascular diseases. Recent multimodal approaches that integrate ECGs with accompanying clinical reports show strong potential, but they still face two main concerns from a modality perspective: (1) intra-modality: existing models process ECGs in a lead-agnostic manner, overlooking spatial-temporal dependencies across leads, which restricts their effectiveness in modeling fine-grained diagnostic patterns; (2) inter-modality: existing methods directly align ECG signals with clinical reports, introducing modality-specific biases due to the free-text nature of the reports. In light of these two issues, we propose CG-DMER, a contrastive-generative framework for disentangled multimodal ECG representation learning, powered by two key designs: (1) Spatial-temporal masked modeling is designed to better capture fine-grained temporal dynamics and inter-lead spatial dependencies by applying masking across both spatial and temporal dimensions and reconstructing the missing information. (2) A representation disentanglement and alignment strategy is designed to mitigate unnecessary noise and modality-specific biases by introducing modality-specific and modality-shared encoders, ensuring a clearer separation between modality-invariant and modality-specific representations. Experiments on three public datasets demonstrate that CG-DMER achieves state-of-the-art performance across diverse downstream tasks.", "link": "http://arxiv.org/abs/2602.21154v1", "date": "2026-02-24", "relevancy": 2.1098, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5303}, {"title": " {"title": "Motivation is Something You Need", "author": "Mehdi Acheli and Walid Gaaloul", "abstract": "This work introduces a novel training paradigm that draws from affective neuroscience. Inspired by the interplay of emotions and cognition in the human brain and more specifically the SEEKING motivational state, we design a dual-model framework where a smaller base model is trained continuously, while a larger motivated model is activated intermittently during predefined \"motivation conditions\". The framework mimics the emotional state of high curiosity and anticipation of reward in which broader brain regions are recruited to enhance cognitive performance. Exploiting scalable architectures where larger models extend smaller ones, our method enables shared weight updates and selective expansion of network capacity during noteworthy training steps. Empirical evaluation on the image classification task demonstrates that, not only does the alternating training scheme efficiently and effectively enhance the base model compared to a traditional scheme, in some cases, the motivational model also surpasses its standalone counterpart despite seeing less data per epoch. This opens the possibility of simultaneously training two models tailored to different deployment constraints with competitive or superior performance while keeping training cost lower than when training the larger model.", "link": "http://arxiv.org/abs/2602.21064v1", "date": "2026-02-24", "relevancy": 2.1097, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5383}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5206}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5173}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Motivation%20is%20Something%20You%20Need&body=Title%3A%20Motivation%20is%20Something%20You%20Need%0AAuthor%3A%20Mehdi%20Acheli%20and%20Walid%20Gaaloul%0AAbstract%3A%20This%20work%20introduces%20a%20novel%20training%20paradigm%20that%20draws%20from%20affective%20neuroscience.%20Inspired%20by%20the%20interplay%20of%20emotions%20and%20cognition%20in%20the%20human%20brain%20and%20more%20specifically%20the%20SEEKING%20motivational%20state%2C%20we%20design%20a%20dual-model%20framework%20where%20a%20smaller%20base%20model%20is%20trained%20continuously%2C%20while%20a%20larger%20motivated%20model%20is%20activated%20intermittently%20during%20predefined%20%22motivation%20conditions%22.%20The%20framework%20mimics%20the%20emotional%20state%20of%20high%20curiosity%20and%20anticipation%20of%20reward%20in%20which%20broader%20brain%20regions%20are%20recruited%20to%20enhance%20cognitive%20performance.%20Exploiting%20scalable%20architectures%20where%20larger%20models%20extend%20smaller%20ones%2C%20our%20method%20enables%20shared%20weight%20updates%20and%20selective%20expansion%20of%20network%20capacity%20during%20noteworthy%20training%20steps.%20Empirical%20evaluation%20on%20the%20image%20classification%20task%20demonstrates%20that%2C%20not%20only%20does%20the%20alternating%20training%20scheme%20efficiently%20and%20effectively%20enhance%20the%20base%20model%20compared%20to%20a%20traditional%20scheme%2C%20in%20some%20cases%2C%20the%20motivational%20model%20also%20surpasses%20its%20standalone%20counterpart%20despite%20seeing%20less%20data%20per%20epoch.%20This%20opens%20the%20possibility%20of%20simultaneously%20training%20two%20models%20tailored%20to%20different%20deployment%20constraints%20with%20competitive%20or%20superior%20performance%20while%20keeping%20training%20cost%20lower%20than%20when%20training%20the%20larger%20model.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21064v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7G 0models%2520tailored%2520to%2520different%2520deployment%2520constraints%2520with%2520competitive%2520or%2520superior%2520performance%2520while%2520keeping%2520training%2520cost%2520lower%2520than%2520when%2520training%2520the%2520larger%2520model.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21064v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Motivation%20is%20Something%20You%20Need&entry.906535625=Mehdi%20Acheli%20and%20Walid%20Gaaloul&entry.1292438233=This%20work%20introduces%20a%20novel%20training%20paradigm%20that%20draws%20from%20affective%20neuroscience.%20Inspired%20by%20the%20interplay%20of%20emotions%20and%20cognition%20in%20the%20human%20brain%20and%20more%20specifically%20the%20SEEKING%20motivational%20state%2C%20we%20design%20a%20dual-model%20framework%20where%20a%20smaller%20base%20model%20is%20trained%20continuously%2C%20while%20a%20larger%20motivated%20model%20is%20activated%20intermittently%20during%20predefined%20%22motivation%20conditions%22.%20The%20framework%20mimics%20the%20emotional%20state%20of%20high%20curiosity%20and%20anticipation%20of%20reward%20in%20which%20broader%20brain%20regions%20are%20recruited%20to%20enhance%20cognitive%20performance.%20Exploiting%20scalable%20architectures%20where%20larger%20models%20extend%20smaller%20ones%2C%20our%20method%20enables%20shared%20weight%20updates%20and%20selective%20expansion%20of%20network%20capacity%20during%20noteworthy%20training%20steps.%20Empirical%20evaluation%20on%20the%20image%20classification%20task%20demonstrates%20that%2C%20not%20only%20does%20the%20alternating%20training%20scheme%20efficiently%20and%20effectively%20enhance%20the%20base%20model%20compared%20to%20a%20traditional%20scheme%2C%20in%20some%20cases%2C%20the%20motivational%20model%20also%20surpasses%20its%20standalone%20counterpart%20despite%20seeing%20less%20data%20per%20epoch.%20This%20opens%20the%20possibility%20of%20simultaneously%20training%20two%20models%20tailored%20to%20different%20deployment%20constraints%20with%20competitive%20or%20superior%20performance%20while%20keeping%20training%20cost%20lower%20than%20when%20training%20the%20larger%20model.&entry.1838667208=http%3A//arxiv.org/abs/2602.21064v1&entry.124074799=Read"},
{"title": "Uncertainty Propagation Networks for Neural Ordinary Differential Equations", "author": "Hadi Jahanshahi and Zheng H. Zhu", "abstract": "This paper introduces Uncertainty Propagation Network (UPN), a novel family of neural differential equations that naturally incorporate uncertainty quantification into continuous-time modeling. Unlike existing neural ODEs that predict only state trajectories, UPN simultaneously model both state evolution and its associated uncertainty by parameterizing coupled differential equations for mean and covariance dynamics. The architecture efficiently propagates uncertainty through nonlinear dynamics without discretization artifacts by solving coupled ODEs for state and covariance evolution while enabling state-dependent, learnable process noise. The continuous-depth formulation adapts its evaluation strategy to each input's complexity, provides principled uncertainty quantification, and handles irregularly-sampled observations naturally. Experimental results demonstrate UPN's effectiveness across multiple domains: continuous normalizing flows (CNFs) with uncertainty quantification, time-series forecasting with well-calibrated confidence intervals, and robust trajectory prediction in both stable and chaotic dynamical systems.", "link": "http://arxiv.org/abs/2508.16815v2", "date": "2026-02-24", "relevancy": 2.1049, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5482}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5209}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uncertainty%20Propagation%20Networks%20for%20Neural%20Ordinary%20Differential {"title": "Towards Attributions of Input Variables in a Coalition", "author": "Xinhao Zheng and Huiqi Deng and Quanshi Zhang", "abstract": "This paper focuses on the fundamental challenge of partitioning input variables in attribution methods for Explainable AI, particularly in Shapley value-based approaches. Previous methods always compute attributions given a predefined partition but lack theoretical guidance on how to form meaningful variable partitions. We identify that attribution conflicts arise when the attribution of a coalition differs from the sum of its individual variables' attributions. To address this, we analyze the numerical effects of AND-OR interactions in AI models and extend the Shapley value to a new attribution metric for variable coalitions. Our theoretical findings reveal that specific interactions cause attribution conflicts, and we propose three metrics to evaluate coalition faithfulness. Experiments on synthetic data, NLP, image classification, and the game of Go validate our approach, demonstrating consistency with human intuition and practical applicability.", "link": "http://arxiv.org/abs/2309.13411v3", "date": "2026-02-24", "relevancy": 1.2855, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4484}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.428}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4097}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Attributions%20of%20Input%20Variables%20in%20a%20Coalition&body=Title%3A%20Towards%20Attributions%2 {"title": "Scaling State-Space Models on Multiple GPUs with Tensor Parallelism", "author": "Anurag Dutt and Nimit Shah and Hazem Masarani and Anshul Gandhi", "abstract": "Selective state space models (SSMs) have rapidly become a compelling backbone for large language models, especially for long-context workloads. Yet in deployment, their inference performance is often bounded by the memory capacity, bandwidth, and latency limits of a single GPU, making multi-GPU execution increasingly necessary. Although tensor parallelism (TP) is widely used to scale Transformer inference, applying it to selective SSM blocks is non-trivial because the SSM mixer couples large projections with a sequence-wise recurrent state update and local mixing whose efficiency depends on preserving locality and avoiding synchronization in the critical path.\n  This paper presents a communication-efficient TP design for selective SSM inference that addresses three practical engineering challenges: enabling TTFT improvements via an SSM state cache across prefill and decode, partitioning the mixer's packed parameter tensor so that recurrent updates remain local while minimizing communication, and reducing TP aggregation overhead with quantized AllReduce. We evaluate on three representative SSM-based LLMs spanning pure-SSM and hybrid architectures - Mamba, Falcon-Mamba, and Zamba - on NVIDIA A6000 and A100 clusters. Our experiments show substantial throughput gains from tensor-parallel SSM inference, improving batch-request throughput by ~1.6-2.1x on 2 GPUs and ~2.6-4.0x on 4 GPUs for Mamba, with the largest benefits at long context lengths, and achieving a further ~10-18% throughput improvement from quantized all-reduce by lowering synchronization bandwidth overhead.", "link": "http://arxiv.org/abs/2602.21144v1", "date": "2026-02-24", "relevancy": 1.5339, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5293}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5179}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5014}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scaling%20State-Space%20Models%20on%20Multiple%20GPUs%20with%20Tensor%20Parallelism&body=Title%3A%20Scaling%20State-Space%20Models%20on%20Multiple%20GPUs%20with%20Tensor%20Parallelism%0AAuthor%3A%20Anurag%20Dutt%20and%20Nimit%20Shah%20and%20Hazem%20Masarani%20and%20Anshul%20Gandhi%0AAbstract%3A%20Selective%20state%20space%20models%20%28SSMs%29%20have%20rapidly%20become%20a%20compelling%20backbone%20for%20large%20language%20models%2C%20especially%20for%20long-context%20workloads.%20Yet%20in%20deployment%2C%20their%20inference%20performance%20is%20often%20bounded%20by%20the%20memory%20capacity%2C%20bandwidth%2C%20and%20latency%20limits%20of%20a%20single%20GPU%2C%20making%20multi-GPU%20execution%20increasingly%20necessary.%20Although%20tensor%20parallelism%20%28TP%29%20is%20widely%20used%20to%20scale%20Transformer%20inference%2C%20applying%20it%20to%20selective%20SSM%20blocks%20is%20non-trivial%20because%20the%20SSM%20mixer%20couples%20large%20projections%20with%20a%20sequence-wise%20recurrent%20state%20update%20and%20local%20mixing%20whose%20efficiency%20depends%20on%20preserving%20locality%20and%20avoiding%20synchronization%20in%20the%20critical%20path.%0A%20%20This%20paper%20presents%20a%20communication-efficient%20TP%20design%20for%20selective%20SSM%20inference%20that%20addresses%20three%20practical%20engineering%20challenges%3A%20enabling%20TTFT%20improvements%20via%20an%20SSM%20state%20cache%20across%20prefill%20and%20decode%2C%20partitioning%20the%20mixer%27s%20packed%20parameter%20tensor%20so%20that%20recurrent%20updates%20remain%20local%20while%20minimizing%20communication%2C%20and%20reducing%20TP%20aggregation%20overhead%20with%20quantized%20AllReduce.%20We%20evaluate%20on%20three%20representative%20SSM-based%20LLMs%20spanning%20pure-SSM%20and%20hybrid%20architectures%20-%20Mamba%2C%20Falcon-Mamba%2C%20and%20Zamba%20-%20on%20NVIDIA%20A6000%20and%20A100%20clusters.%20Our%20experiments%20show%20substantial%20throughput%20gains%20from%20tensor-parallel%20SSM%20inference%2C%20improving%20batch-request%20throughput%20by%20~1.6-2.1x%20on%202%20GPUs%20and%20~2.6-4.0x%20on%204%20GPUs%20for%20Mamba%2C%20with%20the%20largest%20benefits%20at%20long%20context%20lengths%2C%20and%20achieving%20a%20further%20~10-18%25%20throughput%20improvement%20from%20quantized%20all-reduce%20by%20lowering%20synchronization%20bandwidth%20overhead.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21144v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScaling%2520State-Space%2520Models%2520on%2520Multiple%2520GPUs%2520with%2520Tensor%2520Parallelism%26entry.906535625%3DAnurag%2520Dutt%2520and%2520Nimit%2520Shah%2520and%2520Hazem%2520Masarani%2520and%2520Anshul%2520Gandhi%26entry.1292438233%3DSelective%2520state%2520space%2520models%2520%2528SSMs%2529%2520have%2520rapidly%2520become%2520a%2520compelling%2520backbone%2520for%2520large%2520language%2520models%252C%2520especially%2520for%2520long-context%2520workloads.%2520Yet%2520in%2520deployment%252C%2520their%2520inference%2520performance%2520is%2520often%2520bounded%2520by%2520the%2520memory%2520capacity%252C%2520bandwidth%252C%2520and%2520latency%2520limits%2520of%2520a%2520single%2520GPU%252C%2520making%2520multi-GPU%2520execution%2520increasingly%2520necessary.%2520Although%2520tensor%2520parallelism%2520%2528TP%2529%2520is%2520widely%2520used%2520to%2520scale%2520Transformer%2520inference%252C%2520applying%2520it%2520to%2520selective%2520SSM%2520blocks%2520is%2520non-trivial%2520because%2520the%2520SSM%2520mixer%2520couples%2520large%2 {"title": "Sequential Counterfactual Inference for Temporal Clinical Data: Addressing the Time Traveler Dilemma", "author": "Jingya Cheng and Alaleh Azhir and Jiazi Tian and Hossein Estiri", "abstract": "Counterfactual inference enables clinicians to ask \"what if\" questions about patient outcomes, but standard methods assume feature independence and simultaneous modifiability -- assumptions violated by longitudinal clinical data. We introduce the Sequential Counterfactual Framework, which respects temporal dependencies in electronic health records by distinguishing immutable features (chronic diagnoses) from controllable features (lab values) and modeling how interventions propagate through time. Applied to 2,723 COVID-19 patients (383 Long COVID heart failure cases, 2,340 matched controls), we demonstrate that 38-67% of patients with chronic conditions would require biologically impossible counterfactuals under naive methods. We identify a cardiorenal cascade (CKD -> AKI -> HF) with relative risks of 2.27 and 1.19 at each step, illustrating temporal propagation that sequential -- but not naive -- counterfactuals can capture. Our framework transforms counterfactual explanation from \"what if this feature were different?\" to \"what if we had intervened earlier, and how would that propagate forward?\" --  yielding clinically actionable insights grounded in biological plausibility.", "link": "http://arxiv.org/abs/2602.21168v1", "date": "2026-02-24", "relevancy": 1.1779, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4042}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.3923}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", {"title": "Task-oriented grasping for dexterous robots using postural synergies and reinforcement learning", "author": "Dimitrios Dimou and Jos\u00e9 Santos-Victor and Plinio Moreno", "abstract": "In this paper, we address the problem of task-oriented grasping for humanoid robots, emphasizing the need to align with human social norms and task-specific objectives. Existing methods, employ a variety of open-loop and closed-loop approaches but lack an end-to-end solution that can grasp several objects while taking into account the downstream task's constraints. Our proposed approach employs reinforcement learning to enhance task-oriented grasping, prioritizing the post-grasp intention of the agent. We extract human grasp preferences from the ContactPose dataset, and train a hand synergy model based on the Variational Autoencoder (VAE) to imitate the participant's grasping actions. Based on this data, we train an agent able to grasp multiple objects while taking into account distinct post-grasp intentions that are task-specific. By combining data-driven insights from human grasping behavior with learning by exploration provided by reinforcement learning, we can develop humanoid robots capable of context-aware manipulation actions, facilitating collaboration in human-centered environments.", "link": "http://arxiv.org/abs/2602.20915v1", "date": "2026-02-24", "relevancy": 1.862, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6564}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.59}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.562}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Task-oriented%20grasping%20for%20dexterous%20robots {"title": "Test-Time Training with KV Binding Is Secretly Linear Attention", "author": "Junchen Liu and Sven Elflein and Or Litany and Zan Gojcic and Ruilong Li", "abstract": "Test-time training (TTT) with KV binding as sequence modeling layer is commonly interpreted as a form of online meta-learning that memorizes a key-value mapping at test time. However, our analysis reveals multiple phenomena that contradict this memorization-based interpretation. Motivated by these findings, we revisit the formulation of TTT and show that a broad class of TTT architectures can be expressed as a form of learned linear attention operator. Beyond explaining previously puzzling model behaviors, this perspective yields multiple practical benefits: it enables principled architectural simplifications, admits fully parallel formulations that preserve performance while improving efficiency, and provides a systematic reduction of diverse TTT variants to a standard linear attention form. Overall, our results reframe TTT not as test-time memorization, but as learned linear attention with enhanced representational capacity.", "link": "http://arxiv.org/abs/2602.21204v1", "date": "2026-02-24", "relevancy": 1.8924, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4892}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4713}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4577}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Test-Time%20Training%20with%20KV%20Binding%20Is%20Secretly%20Linear%20Attention&body=Title%3A%20Test-Time%20Training%20with%20KV%20Binding%20Is%20Secretly%20Linear%20Attention%0AAuthor%3A%20Junchen%20Liu%20and%20Sven%20Elflein%20and%20Or%20Litany%20and%20Zan%20Gojcic%20and%20Ruilong%20Li%0AAbstract%3A%20Test-time%20training%20%28TTT%29%20with%20KV%20binding%20as%20sequence%20modeling%20layer%20is%20commonly%20interpreted%20as%20a%20form%20of%20online%20meta-learning%20that%20memorizes%20a%20key-value%20mapping%20at%20test%20time.%20However%2C%20our%20analysis%20reveals%20multiple%20phenomena%20that%20contradict%20this%20memorization-based%20interpretation.%20Motivated%20by%20these%20findings%2C%20we%20revisit%20the%20formulation%20of%20TTT%20and%20show%20that%20a%20broad%20class%20of%20TTT%20architectures%20can%20be%20expressed%20as%20a%20form%20of%20learned%20linear%20attention%20operator.%20Beyond%20explaining%20previously%20puzzling%20model%20behaviors%2C%20this%20perspective%20yields%20multiple%20practical%20benefits%3A%20it%20enables%20principled%20architectural%20simplifications%2C%20admits%20fully%20parallel%20formulations%20that%20preserve%20performance%20while%20improving%20efficiency%2C%20and%20provides%20a%20systematic%20reduction%20of%20diverse%20TTT%20variants%20to%20a%20standard%20linear%20attention%20form.%20Overall%2C%20our%20results%20reframe%20TTT%20not%20as%20test-time%20memorization%2C%20but%20as%20learned%20linear%20attention%20with%20enhanced%20representational%20capacity.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21204v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTest-Time%2520Training%2520with%2520KV%2520Binding%2520Is%2520Secretly%2520Linear%2520Attention%26entry.906535625%3DJunchen%2520Liu%2520and%2520Sven%2520Elflein%2520and%2520Or%2520Litany%2520and%2520Zan%2520Gojcic%2520and%2520Ruilong%2520Li%26entry.1292438233%3DTest-time%2520training%2520%2528TTT%2529%2520with%2520KV%2520binding%2520as%2520sequence%2520modeling%2520layer%2520is%2520commonly%2520interpreted%2520as%2520a%2520form%2520of%2520online%2520meta-learning%2520that%2520memorizes%2520a%2520key-value%2520mapping%2520at%2520test%2520time.%2520However%252C%2520our%2520analysis%2520reveals%2520multiple%2520phenomena%2520that%2520contradict%2520this%2520memorization-based%2520interpretation.%2520Motivated%2520by%2520these%2520findings%252C%2520we%2520revisit%2520the%2520formulation%2520of%2520TTT%2520and%2520show%2520that%2520a%2520broad%2520class%2520of%2520TTT%2520architectures%2520can%2520be%2520expressed%2520as%2520a%2520form%2520of%2520learned%2520linear%2520attention%2520operator.%2520Beyond%2520explaining%2520previously%2520puzzling%2520model%2520behaviors%252C%2520this%2520perspective%2520yields%2520multiple%2520practical%2520benefits%253A%2520it%2520enables%2520principled%2520architectural%2520simplifications%252C%2520admits%2520fully%2520parallel%2520formulations%2520that%2520preserve%2520performance%2520while%2520improving%2520efficiency%252C%2520and%2520provides%2520a%2520systematic%2520reduction%2520of%2520diverse%2520TTT%2520variants%2520to%2520a%2520standard%2520linear%2520attention%2520form.%2520Overall%252C%2520our%2520results%2520reframe%2520TTT%2520not%2520as%2520test-time%2520memorization%252C%2520but%2520as%2520learned%2520linear%2520attention%2520with%2520enhanced%2520representational%2520capacity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21204v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Test-Time%20Training%20with%20KV%20Binding%20Is%20Secretly%20Linear%20Attention&entry.906535625=Junchen%20Liu%20and%20Sven%20Elflein%20and%20Or%20Litany%20and%20Zan%20Gojcic%20and%20Ruilong%20Li&entry.1292438233=Test-time%20training%20%28TTT%29%20with%20KV%20binding%20as%20sequence%20modeling%20layer%20is%20commonly%20interpreted%20as%20a%20form%20of%20online%20meta-learning%20that%20memorizes%20a%20key-value%20mapping%20at%20test%20time.%20However%2C%20our%20analysis%20reveals%20multiple%20phenomena%20that%20contradict%20this%20memorization-based%20interpretation.%20Motivated%20by%20these%20findings%2C%20we%20revisit%20the%20formulation%20of%20TTT%20and%20show%20that%20a%20broad%20class%20of%20TTT%20architectures%20can%20be%20expressed%20as%20a%20form%20of%20learned%20linear%20attention%20operator.%20Beyond%20explaining%20previously%20puzzling%20model%20behaviors%2C%20this%20perspective%20yields%20multiple%20practical%20benefits%3A%20it%20enables%20principled%20architectural%20simplifications%2C%20admits%20fully%20parallel%20formulations%20that%20preserve%20performance%20while%20improving%20efficiency%2C%20and%20provides%20a%20systematic%20reduction%20of%20diverse%20TTT%20variants%20to%20a%20standard%20linear%20attention%20form.%20Overall%2C%20our%20results%20reframe%20TTT%20not%20as%20test-time%20memorization%2C%20but%20as%20learned%20linear%20attention%20with%20enhanced%20representational%20capacity.&entry.1838667208=http%3A//arxiv.org/abs/2602.21204v1&entry.124074799=Read"},
{"title": "Does Order Matter : Connecting The Law of Robustness to Robust Generalization", "author": "Himadri Mandal and Vishnu Varadarajan and Jaee Ponde and Aritra Das and Mihir More and Debayan Gupta", "abstract": "Bubeck and Sellke (2021) pose as an open problem the connection between the law of robustness and robust generalization. The law of robustness states that overparameterization is necessary for models to interpolate robustly; in particular, robust interpolation requires the learned function to be Lipschitz. Robust generalization asks whether small robust training loss implies small robust test loss. We resolve this problem by explicitly connecting the two for arbitrary data distributions. Specifically, we introduce a nontrivial notion of robust generalization error and convert it into a lower bound on the expected Rademacher complexity of the induced robust loss class. Our bounds recover the $\u03a9(n^{1/d})$ regime of Wu et al.\\ (2023) and show that, up to constants, robust generalization does not change the order of the Lipschitz constant required for smooth interpolation. We conduct experiments to probe the predicted scaling with dataset size and model capacity, testing whether empirical behavior aligns more closely with the predictions of Bubeck and Sellke (2021) or Wu et al.\\ (2023). For MNIST, we find that the lower-bound Lipschitz constant scales on the order predicted by Wu et al.\\ (2023). Informally, to obtain low robust generalization error, the Lipschitz constant must lie in a range that we bound, and the allowable perturbation radius is linked to the Lipschitz scale.", "link": "http://arxiv.org/abs/2602.20971v1", "date": "2026-02-24", "relevancy": 1.3356, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4493}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4444}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4431}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Does%20Order%20Matter%20%3A%20Connecting%20The%20Law%20of%20Robustness%20to%20Robust%20Generalization&body=Title%3A%20Does%20Order%20Matter%20%3A%20Connecting%20The%20Law%20of%20Robustness%20to%20Robust%20Generalization%0AAuthor%3A%20Himadri%20Mandal%20and%20Vishnu%20Varadarajan%20and%20Jaee%20Ponde%20and%20Aritra%20Das%20and%20Mihir%20More%20and%20Debayan%20Gupta%0AAbstract%3A%20Bubeck%20and%20Sellke%20%282021%29%20pose%20as%20an%20open%20problem%20the%20connection%20between%20the%20law%20of%20robustness%20and%20robust%20generalization.%20The%20law%20of%20robustness%20states%20that%20overparameterization%20is%20necessary%20for%20models%20to%20interpolate%20robustly%3B%20in%20particular%2C%20robust%20interpolation%20requires%20the%20learned%20function%20to%20be%20Lipschitz.%20Robust%20generalization%20asks%20whether%20small%20robust%20training%20loss%20implies%20small%20robust%20test%20loss.%20We%20resolve%20this%20problem%20by%20explicitly%20connecting%20the%20two%20for%20arbitrary%20data%20distributions.%20Specifically%2C%20we%20introduce%20a%20nontrivial%20notion%20of%20robust%20generalization%20error%20and%20convert%20it%20into%20a%20lower%20bound%20on%20the%20expected%20Rademacher%20complexity%20of%20the%20induced%20robust%20loss%20class.%20Our%20bounds%20recover%20the%20%24%CE%A9%28n%5E%7B1/d%7D%29%24%20regime%20of%20Wu%20et%20al.%5C%20%282023%29%20and%20show%20that%2C%20up%20to%20constants%2C%20robust%20generalization%20does%20not%20change%20the%20order%20of%20the%20Lipschitz%20constant%20required%20for%20smooth%20interpolation.%20We%20conduct%20experiments%20to%20probe%20the%20predicted%20scaling%20with%20dataset%20size%20and%20model%20capacity%2C%20testing%20whether%20empirical%20behavior%20aligns%20more%20closely%20with%20the%20predictions%20of%20Bubeck%20and%20Sellke%20%282021%29%20or%20Wu%20et%20al.%5C%20%282023%29.%20For%20MNIST%2C%20we%20find%20that%20the%20lower-bound%20Lipschitz%20constant%20scales%20on%20the%20order%20predicted%20by%20Wu%20et%20al.%5C%20%282023%29.%20Informally%2C%20to%20obtain%20low%20robust%20generalization%20error%2C%20the%20Lipschitz%20constant%20must%20lie%20in%20a%20range%20that%20we%20bound%2C%20and%20the%20allowable%20perturbation%20radius%20is%20linked%20to%20the%20Lipschitz%20scale.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20971v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDoes%2520Order%2520Matter%2520%253A%2520Connecting%2520The%2520Law%2520of%2520Robustness%2520to%2520Robust%2520Generalization%26entry.906535625%3DHimadri%2520Mandal%2520and%2520Vishnu%2520Varadarajan%2520and%2520Jaee%2520Ponde%2520and%2520Aritra%2520Das%2520and%2520Mihir%2520More%2520and%2520Debayan%2520Gupta%26entry.1292438233%3DBubeck%2520and%2520Sellke%2520%25282021%2529%2520pose%2520as%2520an%2520open%2520problem%2520the%2520connection%2520between%2520the%2520law%2520of%2520robustness%2520and%2520robust%2520generalization.%2520The%2520law%2520of%2520robustness%2520states%2520that%2520overparameterization%2520is%2520necessary%2520for%2520models%2520to%2520interpolate%2520robustly%253B%2520in%2520particular%252C%2520robust%2520interpolation%2520requires%2520the%2520learned%2520function%2520to%2520be%2520Lipschitz.%2520Robust%2520generalization%2520asks%2520whether%2520small%2520robust%2520training%2520loss%2520implies%2520small%2520robust%2520test%2520loss.%2520We%2520resolve%2520this%2520problem%2520by%2520explicitly%2520connecting%2520the%2520two%2520for%2520arbitrary%2520data%2520distributions.%2520Specifically%252C%2520we%2520introduce%2520a%2520nontrivial%2520notion%2520of%2520robust%2520generalization%2520error%2520and%2520convert%2520it%2520into%2520a%2520lower%2520bound%2520on%2520the%2520expected%2520Rademacher%2520complexity%2520of%2520the%2520induced%2520robust%2520loss%2520class.%2520Our%2520bounds%2520recover%2520the%2520%2524%25CE%25A9%2528n%255E%257B1/d%257D%2529%2524%2520regime%2520of%2520Wu%2520et%2520al.%255C%2520%25282023%2529%2520and%2520show%2520that%252C%2520up%2520to%2520constants%252C%2520robust%2520generalization%2520does%2520not%2520change%2520the%2520order%2520of%2520the%2520Lipschitz%2520constant%2520required%2520for%2520smooth%2520interpolation.%2520We%2520conduct%2520experiments%2520to%2520probe%2520the%2520predicted%2520scaling%2520with%2520dataset%2520size%2520and%2520model%2520capacity%252C%2520testing%2520whether%2520empirical%2520behavior%2520aligns%2520more%2520closely%2520with%2520the%2520predictions%2520of%2520Bubeck%2520and%2520Sellke%2520%25282021%2529%2520or%2520Wu%2520et%2520al.%255C%2520%25282023%2529.%2520For%2520MNIST%252C%2520we%2520find%2520that%2520the%2520lower-bound%2520Lipschitz%2520constant%2520scales%2520on%2520the%2520order%2520predicted%2520by%2520Wu%2520et%2520al.%255C%2520%25282023%2529.%2520Informally%252C%2520to%2520obtain%2520low%2520robust%2520generalization%2520error%252C%2520the%2520Lipschitz%2520constant%2520must%2520lie%2520in%2520a%2520range%2520that%2520we%2520bound%252C%2520and%2520the%2520allowable%2520perturbation%2520radius%2520is%2520linked%2520to%2520the%2520Lipschitz%2520scale.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20971v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Does%20Order%20Matter%20%3A%20Connecting%20The%20Law%20of%20Robustness%20to%20Robust%20Generalization&entry.906535625=Himadri%20Mandal%20and%20Vishnu%20Varadarajan%20and%20Jaee%20Ponde%20and%20Aritra%20Das%20and%20Mihir%20More%20and%20Debayan%20Gupta&entry.1292438233=Bubeck%20and%20Sellke%20%282021%29%20pose%20as%20an%20open%20problem%2 {"title": "Fuz-RL: A Fuzzy-Guided Robust Framework for Safe Reinforcement Learning under Uncertainty", "author": "Xu Wan and Chao Yang and Cheng Yang and Jie Song and Mingyang Sun", "abstract": "Safe Reinforcement Learning (RL) is crucial for achieving high performance while ensuring safety in real-world applications. However, the complex interplay of multiple uncertainty sources in real environments poses significant challenges for interpretable risk assessment and robust decision-making. To address these challenges, we propose Fuz-RL, a fuzzy measure-guided robust framework for safe RL. Specifically, our framework develops a novel fuzzy Bellman operator for estimating robust value functions using Choquet integrals. Theoretically, we prove that solving the Fuz-RL problem (in Constrained Markov Decision Process (CMDP) form) is equivalent to solving distributionally robust safe RL problems (in robust CMDP form), effectively avoiding min-max optimization. Empirical analyses on safe-control-gym and safety-gymnasium scenarios demonstrate that Fuz-RL effectively integrates with existing safe RL baselines in a model-free manner, significantly improving both safety and control performance under various types of uncertainties in observation, action, and dynamics.", "link": "http://arxiv.org/abs/2602.20729v1", "date": "2026-02-24", "relevancy": 1.99, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5013}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4958}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4922}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fuz-RL%3A%20A%20Fuzzy-Guided%20Robust%20Framework%20for%20Safe%20Reinforcement%20Learning%20under%20Uncertainty&body=Title%3A%20Fuz-RL%3A%20A%20Fuzzy-Guided%20Robust%20Framework%20for%20Safe%20Reinforcement%20Learning%20under%20Uncertainty%0AAuthor%3A%20Xu%20Wan%20and%20Chao%20Yang%20and%20Cheng%20Yang%20and%20Jie%20Song%20and%20Mingyang%20Sun%0AAbstract%3A%20Safe%20Reinforcement%20Learning%20%28RL%29%20is%20crucial%20for%20achieving%20high%20performance%20while%20ensuring%20safety%20in%20real-world%20applications.%20However%2C%20the%20complex%20interplay%20of%20multiple%20uncertainty%20sources%20in%20real%20environments%20poses%20significant%20challenges%20for%20interpretable%20risk%20assessment%20and%20robust%20decision-making.%20To%20address%20these%20challenges%2C%20we%20propose%20Fuz-RL%2C%20a%20fuzzy%20measure-guided%20robust%20framework%20for%20safe%20RL.%20Specifically%2C%20our%20framework%20develops%20a%20novel%20fuzzy%20Bellman%20operator%20for%20estimating%20robust%20value%20functions%20using%20Choquet%20integrals.%20Theoretically%2C%20we%20prove%20that%20solving%20the%20Fuz-RL%20problem%20%28in%20Constrained%20Markov%20Decision%20Process%20%28CMDP%29%20form%29%20is%20equivalent%20to%20solving%20distributionally%20robust%20safe%20RL%20problems%20%28in%20robust%20CMDP%20form%29%2C%20effectively%20avoiding%20min-max%20optimization.%20Empirical%20analyses%20on%20safe-control-gym%20and%20safety-gymnasium%20scenarios%20demonstrate%20that%20Fuz-RL%20effectively%20integrates%20with%20existing%20safe%20RL%20baselines%20in%20a%20model-free%20manner%2C%20significantly%20improving%20both%20safety%20and%20control%20performance%20under%20various%20types%20of%20uncertainties%20in%20observation%2C%20action%2C%20and%20dynamics.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20729v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFuz-RL% {"title": "KCFRC: Kinematic Collision-Aware Foothold Reachability Criteria for Legged Locomotion", "author": "Lei Ye and Haibo Gao and Huaiguang Yang and Peng Xu and Haoyu Wang and Tie Liu and Junqi Shan and Zongquan Deng and Liang Ding", "abstract": "Legged robots face significant challenges in navigating complex environments, as they require precise real-time decisions for foothold selection and contact planning. While existing research has explored methods to select footholds based on terrain geometry or kinematics, a critical gap remains: few existing methods efficiently validate the existence of a non-collision swing trajectory. This paper addresses this gap by introducing KCFRC, a novel approach for efficient foothold reachability analysis. We first formally define the foothold reachability problem and establish a sufficient condition for foothold reachability. Based on this condition, we develop the KCFRC algorithm, which enables robots to validate foothold reachability in real time. Our experimental results demonstrate that KCFRC achieves remarkable time efficiency, completing foothold reachability checks for a single leg across 900 potential footholds in an average of 2 ms. Furthermore, we show that KCFRC can accelerate trajectory optimization and is particularly beneficial for contact planning in confined spaces, enhancing the adaptability and robustness of legged robots in challenging environments.", "link": "http://arxiv.org/abs/2602.20850v1", "date": "2026-02-24", "relevancy": 1.5874, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5523}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5233}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KCFRC%3A%20Kinematic%20Collision-Aware%20Foothold%20Reachability%20Criteria%20for%20Legged%20Locomotion&body=Title%3A%20KCFRC%3A%20Kinematic%20Collision-Aware%20Foothold%20Reachability%20Criteria%20for%20Legged%20Locomotion%0AAuthor%3A%20Lei%20Ye%20and%20Haibo%20Gao%20and%20Huaiguang%20Yang%20and%20Peng%20Xu%20and%20Haoyu%20Wang%20and%20Tie%20Liu%20and%20Junqi%20Shan%20and%20Zongquan%20Deng%20and%20Liang%20Ding%0AAbstract%3A%20Legged%20robots%20face%20significant%20challenges%20in%20navigating%20complex%20environments%2C%20as%20they%20require%20precise%20real-time%20decisions%20for%20foothold%20selection%20and%20contact%20planning.%20While%20existing%20research%20has%20explored%20methods%20to%20select%20footholds%20based%20on%20terrain%20geometry%20or%20kinematics%2C%20a%20critical%20gap%20remains%3A%20few%20existing%20methods%20efficiently%20validate%20the%20existence%20of%20a%20non-collision%20swing%20trajectory.%20This%20paper%20addresses%20this%20gap%20by%20introducing%20KCFRC%2C%20a%20novel%20approach%20for%20efficient%20foothold%20reachability%20analysis.%20We%20first%20formally%20define%20the%20foothold%20reachability%20problem%20and%20establish%20a%20sufficient%20condition%20for%20foothold%20reachability.%20Based%20on%20this%20condition%2C%20we%20develop%20the%20KCFRC%20algorithm%2C%20which%20enables%20robots%20to%20validate%20foothold%20reachability%20in%20real%20time.%20Our%20experimental%20results%20demonstrate%20that%20KCFRC%20achieves%20remarkable%20time%20efficiency%2C%20completing%20foothold%20reachability%20checks%20for%20a%20single%20leg%20across%20900%20potential%20footholds%20in%20an%20average%20of%202%20ms.%20Furthermore%2C%20we%20show%20that%20KCFRC%20can%20accelerate%20trajectory%20optimization%20and%20is%20particularly%20beneficial%20for%20contact%20planning%20in%20confined%20spaces%2C%20enhancing%20the%20adaptability%20and%20robustness%20of%20legged%20robots%20in%20challenging%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20850v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKCFRC%253A%2520Kinematic%2520Collision-Aware%2520Foothold%2520Reachability%2520Criteria%2520for%2520Legged%2520Locomotion%26entry.906535625%3DLei%2520Ye%2520and%2520Haibo%2520Gao%2520and%2520Huaiguang%2520Yang%2520and%2520Peng%2520Xu%2520and%2520Haoyu%2520Wang%2520and%2520Tie%2520Liu%2520and%2520Junqi%2520Shan%2520and%2520Zongquan%2520Deng%2520and%2520Liang%2520Ding%26entry.1292438233%3DLegged%2520robots%2520face%2520significant%2520challenges%2520in%2520navigating%2520complex%2520environments%252C%2520as%2520they%2520require%2520precise%2520real-time%2520decisions%2520for%2520foothold%2520selection%2520and%2520contact%2520planning.%2520While%2520existing%2520research%2520has%2520explored%2520methods%2520to%2520select%2520footholds%2520based%2520on%2520terrain%2520geometry%2520or%2520kinematics%252C%2520a%2520critical%2520gap%2520remains%253A%2520few%2520existing%2520methods%2520efficiently%2520validate%2520the%2520existence%2520of%2520a%2520non-collision%2520swing%2520trajectory.%2520This%2520paper%2520addresses%2520this%2520gap%2520by%2520introducing%2520KCFRC%252C%2520a%2520novel%2520approach%2520for%2520efficient%2520foothold%2520reachability%2520analysis.%2520We%2520first%2520formally%2520define%2520the%2520foothold%2520reachability%2520problem%2520and%2520establish%2520a%2520sufficient%2520condition%2520for%2520foothold%2520reachability.%2520Based%2520on%2520this%2520condition%252C%2520we%2520develop%2520the%2520KCFRC%2520algorithm%252C%2520which%2520enables%2520robots%2520to%2520validate%2520foothold%2520reachability%2520in%2520real%2520time.%2520Our%2520experimental%2520results%2520demonstrate%2520that%2520KCFRC%2520achieves%2520remarkable%2520time%2520efficiency%252C%2520completing%2520foothold%2520reachability%2520checks%2520for%2520a%2520single%2520leg%2520across%2520900%2520potential%2520footholds%2520in%2520an%2520average%2520of%25202%2520ms.%2520Furthermore%252C%2520we%2520show%2520that%2520KCFRC%2520can%2520accelerate%2520trajectory%2520optimization%2520and%2520is%2520particularly%2520beneficial%2520for%2520contact%2520planning%2520in%2520confined%2520spaces%252C%2520enhancing%2520the%2520adaptability%2520and%2520robustness%2520of%2520legged%2520robots%2520in%2520challenging%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20850v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=KCFRC%3A%20Kinematic%20Collision-Aware%20Foothold%20Reachability%20Criteria%20for%20Legged%20Locomotion&entry.906535625=Lei%20Ye%20and%20Haibo%20Gao%20and%20Huaiguang%20Yang%20and%20Peng%20Xu%20and%20Haoyu%20Wang%20and%20Tie%20Liu%20and%20Junqi%20Shan%20and%20Zongquan%20Deng%20and%20Liang%20Ding&entry.1292438233=Legged%20robots%20face%20significant%20challenges%20in%20navigating%20complex%20environments%2C%20as%20they%20require%20precise%20real-time%20decisions%20for%20foothold%20selection%20and%20contact%20planning.%20While%20existing%20research%20has%20explored%20methods%20to%20select%20footholds%20based%20on%20terrain%20geometry%20or%20kinematics%2C%20a%20critical%20gap%20remains%3A%20few%20existing%20methods%20efficiently%20validate%20the%20existence%20of%20a%20non-collision%20swing%20trajectory.%20This%20paper%20addresses%20this%20gap%20by%20introducing%20KCFRC%2C%20a%20novel%20approach%20for%20efficient%20foothold%20reachability%20analysis.%20We%20first%20formally%20define%20the%20foothold%20reachability%20problem%20and%20establish%20a%20sufficient%20condition%20for%20foothold%20reachability.%20Based%20on%20this%20condition%2C%20we%20develop%20the%20KCFRC%20algorithm%2C%20which%20enables%20robots%20to%20validate%20foothold%20reachabili {"title": "SELAUR: Self Evolving LLM Agent via Uncertainty-aware Rewards", "author": "Dengjia Zhang and Xiaoou Liu and Lu Cheng and Yaqing Wang and Kenton Murray and Hua Wei", "abstract": "Large language models (LLMs) are increasingly deployed as multi-step decision-making agents, where effective reward design is essential for guiding learning. Although recent work explores various forms of reward shaping and step-level credit assignment, a key signal remains largely overlooked: the intrinsic uncertainty of LLMs. Uncertainty reflects model confidence, reveals where exploration is needed, and offers valuable learning cues even in failed trajectories. We introduce SELAUR: Self Evolving LLM Agent via Uncertainty-aware Rewards, a reinforcement learning framework that incorporates uncertainty directly into the reward design. SELAUR integrates entropy-, least-confidence-, and margin-based metrics into a combined token-level uncertainty estimate, providing dense confidence-aligned supervision, and employs a failure-aware reward reshaping mechanism that injects these uncertainty signals into step- and trajectory-level rewards to improve exploration efficiency and learning stability. Experiments on two benchmarks, ALFWorld and WebShop, show that our method consistently improves success rates over strong baselines. Ablation studies further demonstrate how uncertainty signals enhance exploration and robustness.", "link": "http://arxiv.org/abs/2602.21158v1", "date": "2026-02-24", "relevancy": 2.1045, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5644}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5306}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5063}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SELAUR%3A%20Self%20Evolving%20LLM%20Agent%20via%20Uncertainty-aware%20Rewards&body=Title%3A%20SELAUR%3A%20Self%20Evolving%20LLM%20Agent%20via%20Uncertainty-aware%20Rewards%0AAuthor%3A%20Dengjia%20Zhang%20and%20Xiaoou%20Liu%20and%20Lu%20Cheng%20and%20Yaqing%20Wang%20and%20Kenton%20Murray%20and%20Hua%20Wei%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20increasingly%20deployed%20as%20multi-step%20decision-making%20agents%2C%20where%20effective%20reward%20design%20is%20essential%20for%20guiding%20learning.%20Although%20recent%20work%20explores%20various%20forms%20of%20reward%20shaping%20and%20step-level%20credit%20assignment%2C%20a%20key%20signal%20remains%20largely%20overlooked%3A%20the%20intrinsic%20uncertainty%20of%20LLMs.%20Uncertainty%20reflects%20model%20confidence%2C%20reveals%20where%20exploration%20is%20needed%2C%20and%20offers%20valuable%20learning%20cues%20even%20in%20failed%20trajectories.%20We%20introduce%20SELAUR%3A%20Self%20Evolving%20LLM%20Agent%20via%20Uncertainty-aware%20Rewards%2C%20a%20reinforcement%20learning%20framework%20that%20incorporates%20uncertainty%20directly%20into%20the%20reward%20design.%20SELAUR%20integrates%20entropy-%2C%20least-confidence-%2C%20and%20margin-based%20metrics%20into%20a%20combined%20token-level%20uncertainty%20estimate%2C%20providing%20dense%20confidence-aligned%20supervision%2C%20and%20employs%20a%20failure-aware%20reward%20reshaping%20mechanism%20that%20injects%20these%20uncertainty%20signals%20into%20step-%20and%20trajectory-level%20rewards%20to%20improve%20exploration%20efficiency%20and%20learning%20stability.%20Experiments%20on%20two%20benchmarks%2C%20ALFWorld%20and%20WebShop%2C%20show%20that%20our%20method%20consistently%20improves%20success%20rates%20over%20strong%20baselines.%20Ablation%20studie       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

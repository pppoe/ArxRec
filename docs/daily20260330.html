{"title": "Beyond Language: Grounding Referring Expressions with Hand Pointing in Egocentric Vision", "author": "Ling Li and Bowen Liu and Zinuo Zhan and Peng Jie and Jianhui Zhong and Kenglun Chang and Zhidong Deng", "abstract": "Traditional Visual Grounding (VG) predominantly relies on textual descriptions to localize objects, a paradigm that inherently struggles with linguistic ambiguity and often ignores non-verbal deictic cues prevalent in real-world interactions. In natural egocentric engagements, hand-pointing combined with speech forms the most intuitive referring mechanism. To bridge this gap, we introduce EgoPoint-Ground, the first large-scale multimodal dataset dedicated to egocentric deictic visual grounding. Comprising over \\textbf{15k} interactive samples in complex scenes, the dataset provides rich, multi-grained annotations including hand-target bounding box pairs and dense semantic captions. We establish a comprehensive benchmark for hand-pointing referring expression resolution, evaluating a wide spectrum of mainstream Multimodal Large Language Models (MLLMs) and state-of-the-art VG architectures. Furthermore, we propose SV-CoT, a novel baseline framework that reformulates grounding as a structured inference process, synergizing gestural and linguistic cues through a Visual Chain-of-Thought paradigm. Extensive experiments demonstrate that SV-CoT achieves an $\\textbf{11.7\\%}$ absolute improvement over existing methods, effectively mitigating semantic ambiguity and advancing the capability of agents to comprehend multimodal physical intents. The dataset and code will be made publicly available.", "link": "http://arxiv.org/abs/2603.26646v1", "date": "2026-03-27", "relevancy": 2.1534, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5394}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5376}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5376}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Language%3A%20Grounding%20Referring%20Expressions%20with%20Hand%20Pointing%20in%20Egocentric%20Vision&body=Title%3A%20Beyond%20Language%3A%20Grounding%20Referring%20Expressions%20with%20Hand%20Pointing%20in%20Egocentric%20Vision%0AAuthor%3A%20Ling%20Li%20and%20Bowen%20Liu%20and%20Zinuo%20Zhan%20and%20Peng%20Jie%20and%20Jianhui%20Zhong%20and%20Kenglun%20Chang%20and%20Zhidong%20Deng%0AAbstract%3A%20Traditional%20Visual%20Grounding%20%28VG%29%20predominantly%20relies%20on%20textual%20descriptions%20to%20localize%20objects%2C%20a%20paradigm%20that%20inherently%20struggles%20with%20linguistic%20ambiguity%20and%20often%20ignores%20non-verbal%20deictic%20cues%20prevalent%20in%20real-world%20interactions.%20In%20natural%20egocentric%20engagements%2C%20hand-pointing%20combined%20with%20speech%20forms%20the%20most%20intuitive%20referring%20mechanism.%20To%20bridge%20this%20gap%2C%20we%20introduce%20EgoPoint-Ground%2C%20the%20first%20large-scale%20multimodal%20dataset%20dedicated%20to%20egocentric%20deictic%20visual%20grounding.%20Comprising%20over%20%5Ctextbf%7B15k%7D%20interactive%20samples%20in%20complex%20scenes%2C%20the%20dataset%20provides%20rich%2C%20multi-grained%20annotations%20including%20hand-target%20bounding%20box%20pairs%20and%20dense%20semantic%20captions.%20We%20establish%20a%20comprehensive%20benchmark%20for%20hand-pointing%20referring%20expression%20resolution%2C%20evaluating%20a%20wide%20spectrum%20of%20mainstream%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20and%20state-of-the-art%20VG%20architectures.%20Furthermore%2C%20we%20propose%20SV-CoT%2C%20a%20novel%20baseline%20framework%20that%20reformulates%20grounding%20as%20a%20structured%20inference%20process%2C%20synergizing%20gestural%20and%20linguistic%20cues%20through%20a%20Visual%20Chain-of-Thought%20paradigm.%20Extensive%20experiments%20demonstrate%20that%20SV-CoT%20achieves%20an%20%24%5Ctextbf%7B11.7%5C%25%7D%24%20absolute%20improvement%20over%20existing%20methods%2C%20effectively%20mitigating%20semantic%20ambiguity%20and%20advancing%20the%20capability%20of%20agents%20to%20comprehend%20multimodal%20physical%20intents.%20The%20dataset%20and%20code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26646v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Language%253A%2520Grounding%2520Referring%2520Expressions%2520with%2520Hand%2520Pointing%2520in%2520Egocentric%2520Vision%26entry.906535625%3DLing%2520Li%2520and%2520Bowen%2520Liu%2520and%2520Zinuo%2520Zhan%2520and%2520Peng%2520Jie%2520and%2520Jianhui%2520Zhong%2520and%2520Kenglun%2520Chang%2520and%2520Zhidong%2520Deng%26entry.1292438233%3DTraditional%2520Visual%2520Grounding%2520%2528VG%2529%2520predominantly%2520relies%2520on%2520textual%2520descriptions%2520to%2520localize%2520objects%252C%2520a%2520paradigm%2520that%2520inherently%2520struggles%2520with%2520linguistic%2520ambiguity%2520and%2520often%2520ignores%2520non-verbal%2520deictic%2520cues%2520prevalent%2520in%2520real-world%2520interactions.%2520In%2520natural%2520egocentric%2520engagements%252C%2520hand-pointing%2520combined%2520with%2520speech%2520forms%2520the%2520most%2520intuitive%2520referring%2520mechanism.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520EgoPoint-Ground%252C%2520the%2520first%2520large-scale%2520multimodal%2520dataset%2520dedicated%2520to%2520egocentric%2520deictic%2520visual%2520grounding.%2520Comprising%2520over%2520%255Ctextbf%257B15k%257D%2520interactive%2520samples%2520in%2520complex%2520scenes%252C%2520the%2520dataset%2520provides%2520rich%252C%2520multi-grained%2520annot {"title": "AMALIA Technical Report: A Fully Open Source Large Language Model for European Portuguese", "author": "Afonso Simpl\u00edcio and Gon\u00e7alo Vinagre and Miguel Moura Ramos and Diogo Tavares and Rafael Ferreira and Giuseppe Attanasio and Duarte M. Alves and In\u00eas Calvo and In\u00eas Vieira and Rui Guerra and James Furtado and Beatriz Canaverde and Iago Paulo and Vasco Ramos and Diogo Gl\u00f3ria-Silva and Miguel Faria and Marcos Treviso and Daniel Gomes and Pedro Gomes and David Semedo and Andr\u00e9 Martins and Jo\u00e3o Magalh\u00e3es", "abstract": "Despite rapid progress in open large language models (LLMs), European Portuguese (pt-PT) remains underrepresented in both training data and native evaluation, with machine-translated benchmarks likely missing the variant's linguistic and cultural nuances. We introduce AMALIA, a fully open LLM that prioritizes pt-PT by using more high-quality pt-PT data during both the mid- and post-training stages. To evaluate pt-PT more faithfully, we release a suite of pt-PT benchmarks that includes translated standard tasks and four new datasets targeting pt-PT generation, linguistic competence, and pt-PT/pt-BR bias. Experiments show that AMALIA matches strong baselines on translated benchmarks while substantially improving performance on pt-PT-specific evaluations, supporting the case for targeted training and native benchmarking for European Portuguese.", "link": "http://arxiv.org/abs/2603.26511v1", "date": "2026-03-27", "relevancy": 2.1443, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4327}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4327}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-0 {"title": "Massive Redundancy in Gradient Transport Enables Sparse Online Learning", "author": "Aur Shalev Merin", "abstract": "Real-time recurrent learning (RTRL) computes exact online gradients by propagating a Jacobian tensor forward through recurrent dynamics, but at O(n^4) cost per step. Prior work has sought structured approximations (rank-1 compression, graph-based sparsity, Kronecker factorization). We show that, in the continuous error signal regime, the recurrent Jacobian is massively redundant:propagating through a random 6% of paths (k=4 of n=64) recovers 84 +/- 6% of full RTRL's adaptation ability across five seeds, and the absolute count k=4 remains effective from n=64 to n=256 (6% to 1.6%, recovery 84 to 78%), meaning sparse RTRL becomes relatively cheaper as networks grow. In RNNs, the recovery is selection-invariant (even adversarial path selection works) and exhibits a step-function transition from zero to any nonzero propagation. Spectral analysis reveals the mechanism: the Jacobian is full-rank but near-isotropic (condition numbers 2.6-6.5), so any random subset provides a directionally representative gradient estimate. On chaotic dynamics (Lorenz attractor), sparse propagation is more numerically stable than full RTRL (CV 13% vs. 88%), as subsampling avoids amplifying pathological spectral modes. The redundancy extends to LSTMs (k=4 matches full RTRL) and to transformers via sparse gradient transport (50% head sparsity outperforms the dense reference; 33% is borderline), with higher thresholds reflecting head specialization rather than isotropy. On real primate neural data, sparse RTRL (k=4) adapts online to cross-session electrode drift (80 +/- 11% recovery, 5 seeds), where sparse propagation is again more stable than full RTRL. Without continuous error signal, Jacobian propagation accumulates numerical drift and degrades all RTRL variants, a scope condition for all forward-mode methods. Results hold with SGD (92 +/- 1% recovery), suggesting in {"title": "HolisticSemGes: Semantic Grounding of Holistic Co-Speech Gesture Generation with Contrastive Flow-Matching", "author": "Lanmiao Liu and Esam Ghaleb and Asl\u0131 \u00d6zy\u00fcrek and Zerrin Yumak", "abstract": "While the field of co-speech gesture generation has seen significant advances, producing holistic, semantically grounded gestures remains a challenge. Existing approaches rely on external semantic retrieval methods, which limit their generalisation capability due to dependency on predefined linguistic rules. Flow-matching-based methods produce promising results; however, the network is optimised using only semantically congruent samples without exposure to negative examples, leading to learning rhythmic gestures rather than sparse motion, such as iconic and metaphoric gestures. Furthermore, by modelling body parts in isolation, the majority of methods fail to maintain crossmodal consistency. We introduce a Contrastive Flow Matching-based co-speech gesture generation model that uses mismatched audio-text conditions as negatives, training the velocity field to follow the correct motion trajectory while repelling semantically incongruent trajectories. Our model ensures cross-modal coherence by embedding text, audio, and holistic motion into a composite latent space via cosine and contrastive objectives. Extensive experiments and a user study demonstrate that our proposed approach outperforms state-of-the-art methods on two datasets, BEAT2 and SHOW.", "link": "http://arxiv.org/abs/2603.26553v1", "date": "2026-03-27", "relevancy": 2.1293, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5498}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5405}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5116}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HolisticSemGes%3A%20Semantic%20Grounding%20of%20Holistic%20Co-Speech%20Gesture%20Generation%20with%20Contrastive%20Flow-Matching&body=Title%3A%20HolisticSemGes%3A%20Semantic%20Grounding%20of%20Holistic%20Co-Speech%20Gesture%20Generation%20with%20Contrastive%20Flow-Matching%0AAuthor%3A%20Lanmiao%20Liu%20and%20Esam%20Ghaleb%20and%20Asl%C4%B1%20%C3%96zy%C3%BCrek%20and%20Zerrin%20Yumak%0AAbstract%3A%20While%20the%20field%20of%20co-speech%20gesture%20generation%20has%20seen%20significant%20advances%2C%20producing%20holistic%2C%20semantically%20grounded%20gestures%20remains%20a%20challenge.%20Existing%20approaches%20rely%20on%20external%20semantic%20retrieval%20methods%2C%20which%20limit%20their%20generalisation%20capability%20due%20to%20dependency%20on%20predefined%20linguistic%20rules.%20Flow-matching-based%20methods%20produce%20promising%20results%3B%20however%2C%20the%20network%20is%20optimised%20using%20only%20semantically%20congruent%20samples%20without%20exposure%20to%20negative%20examples%2C%20leading%20to%20learning%20rhythmic%20gestures%20rather%20than%20sparse%20motion%2C%20such%20as%20iconic%20and%20metaphoric%20gestures.%20Furthermore%2C%20by%20modelling%20body%20parts%20in%20isolation%2C%20the%20majority%20of%20methods%20fail%20to%20maintain%20crossmodal%20consistency.%20We%20introduce%20a%20Contrastive%20Flow%20Matching-based%20co-speech%20gesture%20generation%20model%20that%20uses%20mismatched%20audio-text%20conditions%20as%20negatives%2C%20training%20the%20velocity%20field%20to%20follow%20the%20correct%20motion%20trajectory%20while%20repelling%20semantically%20incongruent%20trajectories.%20Our%20model%20ensures%20cross-modal%20coherence%20by%20embedding%20text%2C%20audio%2C%20and%20holistic%20motion%20into%20a%20composite%20latent%20space%20via%20cosine%20and%20contrastive%20objectives.%20Extensive%20experiments%20and%20a%20user%20study%20demonstrate%20that%20our%20proposed%20approach%20outperforms%20state-of-the-art%20methods%20on%20two%20datasets%2C%20BEAT2%20and%20SHOW.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26553v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHolisticSemGes%253A%2520Semantic%2520Grounding%2520of%2520Holistic%2520Co-Speech%2520Gesture%2520Generation%2520with%2520Contrastive%2520Flow-Matching%26entry.906535625%3DLanmiao%2520Liu%2520and%2520Esam%2520Ghaleb%2520and%2520Asl%25C4%25B1%2520%25C3%2596zy%25C3%25BCrek%2520and%2520Zerrin%2520Yumak%26entry.1292438233%3DWhile%2520the%2520field%2520of%2520co-speech%2520gesture%2520generation%2520has%2520seen%2520significant%2520advances%252C%2520producing%2520holistic%252C%2520semantically%2520grounded%2520gestures%2520remains%2520a%2520challenge.%2520Existing%2520approaches%2520rely%2520on%2520external%2520semantic%2520retrieval%2520methods%252C%2520which%2520limit%2520their%2520generalisation%2520capability%2520due%2520to%2520dependency%2520on%2520predefined%2520linguistic%2520rules.%2520Flow-matching-based%2520methods%2520produce%2520promising%2520results%253B%2520however%252C%2520the%2520network%2520is%2520optimised%2520using%2520only%2520semantically%2520congruent%2520samples%2520without%2520exposure%2520to%2520negative%2520examples%252C%2520leading%2520to%2520learning%2520rhythmic%2520gestures%2520rather%2520than%2520sparse%2520motion%252C%2520such%2520as%2520iconic%2520and%2520metaphoric%2520gestures.%2520Furthermore%252C%2520by%2520modelling%2520body%2520parts%2520in%2520isolation%252C%2520the%2520majority%2520of%2520methods%2520fail%2520to%2520maintain%2520crossmodal%2520consistency.%2520We%2520introduce%2520a%2520Contrastive%2520Flow%2520Matching-based%2520co-speech%2520gesture%2520generation%2520model%2520that%2520uses%2520mismatched%2520audio-text%2520conditions%2520as%2520negatives%252C%2520training%2520the%2520velocity%2520field%2520to%2520follow%2520the%2520correct%2520motion%2520trajectory%2520while%2520repel {"title": "Efficient Continual Learning in Language Models via Thalamically Routed Cortical Columns", "author": "Afshin Khadangi", "abstract": "Large language models deployed in the wild must adapt to evolving data, user behavior, and task mixtures without erasing previously acquired capabilities. In practice, this remains difficult: sequential updates induce catastrophic forgetting, while many stabilization methods rely on external procedures that are costly, brittle, or difficult to scale. We present TRC$^{2}$ (Thalamically Routed Cortical Columns), a decoder-only architecture that makes continual learning a property of the backbone itself. TRC$^{2}$ combines stacked cortical columns with a thalamic modulatory pathway for selective inter-column communication and a hippocampal pathway for event selective retrieval, delayed surprise-based writing, and replay-driven consolidation. This design localizes fast plasticity while preserving a slower stable computation pathway. We further introduce a causal memory-update scheme and an online replay controller that adjusts consolidation strength from measured forgetting. Across a task-sequential language-modeling stream over C4, WikiText-103, and GSM8K, TRC$^{2}$ consistently improves task-boundary modeling quality and substantially reduces cumulative forgetting relative to Transformer, Mamba, MoE, DeepSeek and continual learning baselines trained under the same pipeline. Ablations show that the thalamic and hippocampal components are central to the retention gains, while the full model remains competitive in throughput and training cost.", "link": "http://arxiv.org/abs/2602.22479v5", "date": "2026-03-27", "relevancy": 2.1257, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5676}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5265}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4972}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Continual%20Learning%20in%20Language%20Models%20via%20Thalamically%20Routed%20Cortical%20Columns&body=Title%3A%20Efficient%20Continual%20Learning%20in%20Language%20Models%20via%20Thalamically%20Routed%20Cortical%20Columns%0AAuthor%3A%20Afshin%20Khadangi%0AAbstract%3A%20Large%20language%20models%20deployed%20in%20the%20wild%20must%20adapt%20to%20evolving%20data%2C%20user%20behavior%2C%20and%20task%20mixtures%20without%20erasing%20previously%20acquired%20capabilities.%20In%20practice%2C%20this%20remains%20difficult%3A%20sequential%20updates%20induce%20catastrophic%20forgetting%2C%20while%20many%20stabilization%20methods%20rely%20on%20external%20procedures%20that%20are%20costly%2C%20brittle%2C%20or%20difficult%20to%20scale.%20We%20present%20TRC%24%5E%7B2%7D%24%20%28Thalamically%20Routed%20Cortical%20Columns%29%2C%20a%20decoder-only%20architecture%20that%20makes%20continual%20learning%20a%20property%20of%20the%20backbone%20itself.%20TRC%24%5E%7B2%7D%24%20combines%20stacked%20cortical%20columns%20with%20a%20thalamic%20modulatory%20pathway%20for%20selective%20inter-column%20communication%20and%20a%20hippocampal%20pathway%20for%20event%20selective%20retrieval%2C%20delayed%20surprise-based%20writing%2C%20and%20replay-driven%20consolidation.%20This%20design%20localizes%20fast%20plasticity%20while%20preserving%20a%20slower%20stable%20computation%20pathway.%20We%20further%20introduce%20a%20causal%20memory-update%20scheme%20and%20an%20online%20replay%20controller%20that%20adjusts%20consolidation%20strength%20from%20measured%20forgetting.%20Across%20a%20task-sequential%20language-modeling%20stream%20over%20C4%2C%20WikiText-103%2C%20and%20GSM8K%2C%20TRC%24%5E%7B2%7D%24%20consistently%20improves%20task-boundary%20modeling%20quality%20and%20substantially%20reduces%20cumulative%20forgetting%20relative%20to%20Transformer%2C%20Mamba%2C%20MoE%2C%20DeepSeek%20and%20continual%20learning%20baselines%20trained%20under%20the%20same%20pipeline.%20Ablations%20show%20that%20the%20thalamic%20and%20hippocampal%20components%20are%20central%20to%20the%20retention%20gains%2C%20while%20the%20full%20model%20remains%20competitive%20in%20throughput%20and%20training%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22479v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Continual%2520Learning%2520in%2520Language%2520Models%2520via%2520Thalamically%2520Routed%2520Cortical%2520Columns%26entry.906535625%3DAfshin%2520Khadangi%26entry.1292438233%3DLarge%2520language%2520models%2520deployed%2520in%2520the%2520wild%2520must%2520adapt%2520to%2520evolving%2520data%252C%2520user%2520behavior%252C%2520and%2520task%2520mixtures%2520without%2520erasing%2520previously%2520acquired%2520capabilities.%2520In%2520practice%252C%2520this%2520remains%2520difficult%253A%2520sequential%2520updates%2520induce%2520catastrophic%2520forgetting%252C%2520while%2520many%2520stabilization%2520methods%2520rely%2520on%2520external%2520procedures%2520that%2520are%2520costly%252C%2520brittle%252C%2520or%2520difficult%2520to%2520scale.%2520We%2520present%2520TRC%2524%255E%257B2%257D%2524%2520%2528Thalamically%2520Routed%2520Cortical%2520Columns%2529%252C%2520a%2520decoder-only%2520architecture%2520that%2520makes%2520continual%2520learning%2520a%2520property%2520of%2520the%2520backbone%2520itself.%2520TRC%2524%255E%257B2%257D%2524%2520combines%2520stacked%2520cortical%2520columns%2520with%2520a%2520thalamic%2520modulatory%2520pathway%2520for%2520selective%2520inter-column%2520communication%2520and%2520a%2520hippocampal%2520pathway%2520for%2520event%2520selective%2520retrieval%252C%2520delayed%2520surprise-based%2520writing%252C%2520and%2520replay-driven%2520consolidation.%2520This%2520design%2520localizes%2520fast%2520plasticity%2520while%2520preserving%2520a%2520slower%2520stable%2520computation%2520pathway.%2520We%2520further%2520introduce%2520a%2520causal%2520memory-update%2520scheme%2520and%2520an%2520online%2520replay%2520controller%2520that%2520adjusts%2520consolidation%2520strength%2520from%2520measured%2520forgetting.%2520Across%2520a%2520task-sequential%2520language-modeling%2520stream%2520over%2520C4%252C%2520WikiText-103%252C%2520and%2520GSM8K%252C%2520TRC%2524%255E%257B2%257D%2524%2520consistently%2520improves%2520task-boundary%2520modeling%2520quality%2520and%2520substantially%2520reduces%2520cumulative%2520forgetting%2520relative%2520to%2520Transformer%252C%2520Mamba%252C%2520MoE%252C%2520DeepSeek%2520and%2520continual%2520learning%2520baselines%2520trained%2520under%2520the%2520same%2520pipeline.%2520Ablations%2520show%2520that%2520the%2520thalamic%2520and%2520hippocampal%2520components%2520are%2520central%2520to%2520the%2520retention%2520gains%252C%2520while%2520the%2520full%2520model%2520remains%2520competitive%2520in%2520throughput%2520and%2520training%2520cost.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22479v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Efficient%20Continual%20Learning%20in%20Language%20Models%20via%20Thalamically%20Routed%20Cortical%20Columns&entry.906535625=Afshin%20Khadangi&entry.1292438233=Large%20language%20models%20deployed%20in%20the%20wild%20must%20adapt%20to%20evolving%20data%2C%20user%20behavior%2C%20and%20task%20mixtures%20without%20erasing%20previously%20acquired%20capabilities.%20In%20practice%2C%20this%20remains%20difficult%3A%20sequential%20updates%20induce%20catastrophic%20forgetting%2C%20while%20many%20stabilization%20methods%20rely%20on%20external%20procedures%20that%20are%20costly%2C%20brittle%2C%20or%20difficult%20to%20scale.%20We%20present%20TRC%24 {"title": "MA-Bench: Towards Fine-grained Micro-Action Understanding", "author": "Kun Li and Jihao Gu and Fei Wang and Zhiliang Wu and Hehe Fan and Dan Guo", "abstract": "With the rapid development of Multimodal Large Language Models (MLLMs), their potential in Micro-Action understanding, a vital role in human emotion analysis, remains unexplored due to the absence of specialized benchmarks. To tackle this issue, we present MA-Bench, a benchmark comprising 1,000 videos and a three-tier evaluation architecture that progressively examines micro-action perception, relational comprehension, and interpretive reasoning. MA-Bench contains 12,000 structured question-answer pairs, enabling systematic assessment of both recognition accuracy and action interpretation. The results of 23 representative MLLMs reveal that there are significant challenges in capturing motion granularity and fine-grained body-part dynamics. To address these challenges, we further construct MA-Bench-Train, a large-scale training corpus with 20.5K videos annotated with structured micro-action captions for fine-tuning MLLMs. The results of Qwen3-VL-8B fine-tuned on MA-Bench-Train show clear performance improvements across micro-action reasoning and explanation tasks. Our work aims to establish a foundation benchmark for advancing MLLMs in understanding subtle micro-action and human-related behaviors. Project Page: https://MA-Bench.github.io", "link": "http://arxiv.org/abs/2603.26586v1", "date": "2026-03-27", "relevancy": 2.1216, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5316}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5316}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5244}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MA-Bench%3A%20Towards%20Fine-grained%20Micro-Action%20Understanding&body=Title%3A%20MA-Bench%3A%20Towards%20Fine-grained%20Micro-Action%20Understanding%0AAuthor%3A%20Kun%20Li%20and%20Jihao%20Gu%20and%20Fei%20Wang%20and%20Zhiliang%20Wu%20and%20Hehe%20Fan%20and%20Dan%20Guo%0AAbstract%3A%20With%20the%20rapid%20development%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20their%20potential%20in%20Micro-Action%20understanding%2C%20a%20vital%20role%20in%20human%20emotion%20analysis%2C%20remains%20unexplored%20due%20to%20the%20absence%20of%20specialized%20benchmarks.%20To%20tackle%20this%20issue%2C%20we%20present%20MA-Bench%2C%20a%20benchmark%20comprising%201%2C000%20videos%20and%20a%20three-tier%20evaluation%20architecture%20that%20progressively%20examines%20micro-action%20perception%2C%20relational%20comprehension%2C%20and%20interpretive%20reasoning.%20MA-Bench%20contains%2012%2C000%20structured%20question-answer%20pairs%2C%20enabling%20systematic%20assessment%20of%20both%20recognition%20accuracy%20and%20action%20interpretation.%20The%20results%20of%2023%20representative%20MLLMs%20reveal%20that%20there%20are%20significant%20challenges%20in%20capturing%20motion%20granularity%20and%20fine-grained%20body-part%20dynamics.%20To%20address%20these%20challenges%2C%20we%20further%20construct%20MA-Bench-Train%2C%20a%20large-scale%20training%20corpus%20with%2020.5K%20videos%20annotated%20with%20structured%20micro-action%20captions%20for%20fine-tuning%20MLLMs.%20The%20results%20of%20Qwen3-VL-8B%20fine-tuned%20on%20MA-Bench-Train%20show%20clear%20performance%20improvements%20across%20micro-action%20reasoning%20and%20explanation%20tasks.%20Our%20work%20aims%20to%20establish%20a%20foundation%20benchmark%20for%20advancing%20MLLMs%20in%20understanding%20subtle%20micro-action%20and%20human-related%20behaviors.%20Project%20Page%3A%20https%3A//MA-Bench.github.io%0ALi {"title": "HyVIC: A Metric-Driven Spatio-Spectral Hyperspectral Image Compression Architecture Based on Variational Autoencoders", "author": "Martin Hermann Paul Fuchs and Behnood Rasti and Beg\u00fcm Demir", "abstract": "The rapid growth of hyperspectral data archives in remote sensing (RS) necessitates effective compression methods for storage and transmission. Recent advances in learning-based hyperspectral image (HSI) compression have significantly enhanced both reconstruction fidelity and compression efficiency. However, existing methods typically adapt variational image compression models designed for natural images, without adequately accounting for the distinct spatio-spectral redundancies inherent in HSIs. In particular, they lack explicit architectural designs to balance spatial and spectral feature learning, limiting their ability to effectively leverage the unique characteristics of hyperspectral data. To address this issue, we introduce spatio-spectral variational hyperspectral image compression architecture (HyVIC). The proposed model comprises four main components: 1) adjustable spatio-spectral encoder; 2) spatio-spectral hyperencoder; 3) spatio-spectral hyperdecoder; and 4) adjustable spatio-spectral decoder. We demonstrate that the trade-off between spatial and spectral feature learning is crucial for the reconstruction fidelity, and therefore present a metric-driven strategy to systematically select the hyperparameters of the proposed model. Extensive experiments on two benchmark datasets demonstrate the effectiveness of the proposed model, achieving high spatial and spectral reconstruction fidelity across a wide range of compression ratios (CRs) and improving the state of the art by up to 4.66dB in terms of BD-PSNR. Based on our results, we offer insights and derive practical guidelines to guide future research directions in learning-based variational HSI compression. Our code and pre-trained model weights are publicly available at https://git.tu-berlin.de/rsim/hyvic .", "link": "http://arxiv.org/abs/2603.26468v1", "date": "2026-03-27", "relevancy": 2.1073, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5361}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5276}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5172}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyVIC%3A%20A%20Metric-Driven%20Spatio-Spectral%20Hyperspectral%20Image%20Compression%20Architecture%20Based%20on%20Variational%20Autoencoders&body=Title%3A%20HyVIC%3A%20A%20Metric-Driven%20Spatio-Spectral%20Hyperspectral%20Image%20Compression%20Architecture%20Based%20on%20Variational%20Autoencoders%0AAuthor%3A%20Martin%20Hermann%20Paul%20Fuchs%20and%20Behnood%20Rasti%20and%20Beg%C3%BCm%20Demir%0AAbstract%3A%20The%20rapid%20growth%20of%20hyperspectral%20data%20archives%20in%20remote%20sensing%20%28RS%29%20necessitates%20effective%20compression%20methods%20for%20storage%20and%20transmission.%20Recent%20advances%20in%20learning-based%20hyperspectral%20image%20%28HSI%29%20compression%20have%20significantly%20enhanced%20both%20reconstruction%20fidelity%20and%20compression%20efficiency.%20However%2C%20existing%20methods%20typically%20adapt%20variational%20image%20compression%20models%20designed%20for%20natural%20images%2C%20without%20adequately%20accounting%20for%20the%20distinct%20spatio-spectral%20redundancies%20inherent%20in%20HSIs.%20In%20particular%2C%20they%20lack%20explicit%20architectural%20designs%20to%20balance%20spatial%20and%20spectral%20feature%20learning%2C%20limiting%20their%20ability%20to%20effectively%20leverage%20the%20unique%20characteristics%20of%20hyperspectral%20data.%20To%20address%20this%20issue%2C%20we%20introduce%20spatio-spectral%20variational%20hyperspectral%20image%20compression%20architecture%20%28HyVIC%29.%20The%20proposed%20model%20comprises%20four%20main%20components%3A%201%29%20adjustable%20spatio-spectral%20encoder%3B%202%29%20spatio-spectral%20hyperencoder%3B%203%29%20spatio-spectral%20hyperdecoder%3B%20and%204%29%20adjustable%20spatio-spectral%20decoder.%20We%20demonstrate%20that%20the%20trade-off%20between%20spatial%20and%20spectral%20feature%20learning%20is%20crucial%20for%20the%20reconstruction%20fidelity%2C%20and%20therefore%20present%20a%20metric-driven%20strategy%20to%20systematically%20select%20the%20hyperparameters%20of%20the%20proposed%20model.%20Extensive%20experiments%20on%20two%20benchmark%20datasets%20demonstrate%20the%20effectiveness%20of%20the%20proposed%20model%2C%20achieving%20high%20spatial%20and%20spectral%20reconstruction%20fidelity%20across%20a%20wide%20range%20of%20compression%20ratios%20%28CRs%29%20and%20improving%20the%20state%20of%20the%20art%20by%20up%20to%204.66dB%20in%20terms%20of%20BD-PSNR.%20Based%20on%20our%20results%2C%20we%20offer%20insights%20and%20derive%20practical%20guidelines%20to%20guide%20future%20research%20directions%20in%20learning-based%20variational%20HSI%20compression.%20Our%20code%20and%20pre-trained%20model%20weights%20are%20publicly%20available%20at%20https%3A//git.tu-berlin.de/rsim/hyvic%20.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26468v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyVIC%253A%2520A%2520Metric-Driven%2520Spatio-Spectral%2520Hyperspectral%2520Image%2520Compression%2520Architecture%2520Based%2520on%2520Variational%2520Autoencoders%26entry.906535625%3DMartin%2520Hermann%2520Paul%2520Fuchs%2520and%2520Behnood%2520Rasti%2520and%2520Beg%25C3%25BCm%2520Demir%26entry.1292438233%3DThe%2520rapid%2520growth%2520of%2520hyperspectral%2520data%2520archives%2520in%2520remote%2520sensing%2520%2528RS%2529%2520necessitat {"title": "A Formal Framework for Uncertainty Analysis of Text Generation with Large Language Models", "author": "Steffen Herbold and Florian Lemmerich", "abstract": "The generation of texts using Large Language Models (LLMs) is inherently uncertain, with sources of uncertainty being not only the generation of texts, but also the prompt used and the downstream interpretation. Within this work, we provide a formal framework for the measurement of uncertainty that takes these different aspects into account. Our framework models prompting, generation, and interpretation as interconnected autoregressive processes that can be combined into a single sampling tree. We introduce filters and objective functions to describe how different aspects of uncertainty can be expressed over the sampling tree and demonstrate how to express existing approaches towards uncertainty through these functions. With our framework we show not only how different methods are formally related and can be reduced to a common core, but also point out additional aspects of uncertainty that have not yet been studied.", "link": "http://arxiv.org/abs/2603.26363v1", "date": "2026-03-27", "relevancy": 1.544, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5404}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5161}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4853}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Formal%20Framework%20for%20Uncertainty%20Analysis%20of%20Text%20Generation%20with%20Large%20Language%20Models&body=Title%3A%20A%20Formal%20Framework%20for%20Uncertainty%20Analysis%20of%20Text%20Generation%20with%20Large%20Language%20Models%0AAuthor {"title": "Kantorovich--Kernel Neural Operators: Approximation Theory, Asymptotics, and Neural Network Interpretation", "author": "Tian-Xiao He", "abstract": "This paper studies a class of multivariate Kantorovich-kernel neural network operators, including the deep Kantorovich-type neural network operators studied by Sharma and Singh. We prove density results, establish quantitative convergence estimates, derive Voronovskaya-type theorems, analyze the limits of partial differential equations for deep composite operators, prove Korovkin-type theorems, and propose inversion theorems. This paper studies a class of multivariate Kantorovich-kernel neural network operators, including the deep Kantorovich-type neural network operators studied by Sharma and Singh. We prove density results, establish quantitative convergence estimates, derive Voronovskaya-type theorems, analyze the limits of partial differential equations for deep composite operators, prove Korovkin-type theorems, and propose inversion theorems. Furthermore, this paper discusses the connection between neural network architectures and the classical positive operators proposed by Chui, Hsu, He, Lorentz, and Korovkin.", "link": "http://arxiv.org/abs/2603.26418v1", "date": "2026-03-27", "relevancy": 1.6379, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4131}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4095}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4059}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kantorovich--Kernel%20Neural%20Operators%3A%20Approximation%20Theory%2C%20Asymptotics%2C%20and%20Neural%20Network%20Interpretation&body=Title%3A%20Kantorovich--Kernel%20Neural%20Operat {"title": "Revisiting Diffusion Model Predictions Through Dimensionality", "author": "Qing Jin and Chaoyang Wang", "abstract": "Recent advances in diffusion and flow matching models have highlighted a shift in the preferred prediction target -- moving from noise ($\\varepsilon$) and velocity (v) to direct data (x) prediction -- particularly in high-dimensional settings. However, a formal explanation of why the optimal target depends on the specific properties of the data remains elusive. In this work, we provide a theoretical framework based on a generalized prediction formulation that accommodates arbitrary output targets, of which $\\varepsilon$-, v-, and x-prediction are special cases. We derive the analytical relationship between data's geometry and the optimal prediction target, offering a rigorous justification for why x-prediction becomes superior when the ambient dimension significantly exceeds the data's intrinsic dimension. Furthermore, while our theory identifies dimensionality as the governing factor for the optimal prediction target, the intrinsic dimension of manifold-bound data is typically intractable to estimate in practice. To bridge this gap, we propose k-Diff, a framework that employs a data-driven approach to learn the optimal prediction parameter k directly from data, bypassing the need for explicit dimension estimation. Extensive experiments in both latent-space and pixel-space image generation demonstrate that k-Diff consistently outperforms fixed-target baselines across varying architectures and data scales, providing a principled and automated approach to enhancing generative performance.", "link": "http://arxiv.org/abs/2601.21419v2", "date": "2026-03-27", "relevancy": 1.2033, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6196}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv. {"title": "CALRK-Bench: Evaluating Context-Aware Legal Reasoning in Korean Law", "author": "JiHyeok Jung and TaeYoung Yoon and HyunSouk Cho", "abstract": "Legal reasoning requires not only the application of legal rules but also an understanding of the context in which those rules operate. However, existing legal benchmarks primarily evaluate rule application under the assumption of fixed norms, and thus fail to capture situations where legal judgments shift or where multiple norms interact. In this work, we propose CALRK-Bench, a context-aware legal reasoning benchmark based on the legal system in Korean. CALRK-Bench evaluates whether models can identify the temporal validity of legal norms, determine whether sufficient legal information is available for a given case, and understand the reasons behind shifts in legal judgments. The dataset is constructed from legal precedents and legal consultation records, and is validated by legal experts. Experimental results show that even recent large language models consistently exhibit low performance on these three tasks. CALRK-Bench provides a new stress test for evaluating context-aware legal reasoning rather than simple memorization of legal knowledge. Our code is available at https://github.com/jhCOR/CALRKBench.", "link": "http://arxiv.org/abs/2603.26332v1", "date": "2026-03-27", "relevancy": 1.8214, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4557}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4557}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4537}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CALRK-Bench%3A%20Evaluating%20Context- /forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CALRK-Bench%3A%20Evaluating%20Context-Aware%20Legal%20Reasoning%20in%20Korean%20Law&entry.906535625=JiHyeok%20Jung%20and%20TaeYoung%20Yoon%20and%20HyunSouk%20Cho&entry.1292438233=Legal%20reasoning%20requires%20not%20only%20the%20application%20of%20legal%20rules%20but%20also%20an%20understanding%20of%20the%20context%20in%20which%20those%20rules%20operate.%20However%2C%20existing%20legal%20benchmarks%20primarily%20evaluate%20rule%20application%20under%20the%20assumption%20of%20fixed%20norms%2C%20and%20thus%20fail%20to%20capture%20situations%20where%20legal%20judgments%20shift%20or%20where%20multiple%20norms%20interact.%20In%20this%20work%2C%20we%20propose%20CALRK-Bench%2C%20a%20context-aware%20legal%20reasoning%20benchmark%20based%20on%20the%20legal%20system%20in%20Korean.%20CALRK-Bench%20evaluates%20whether%20models%20can%20identify%20the%20temporal%20validity%20of%20legal%20norms%2C%20determine%20whether%20sufficient%20legal%20information%20is%20available%20for%20a%20given%20case%2C%20and%20understand%20the%20reasons%20behind%20shifts%20in%20legal%20judgments.%20The%20dataset%20is%20constructed%20from%20legal%20precedents%20and%20legal%20consultation%20records%2C%20and%20is%20validated%20by%20legal%20experts.%20Experimental%20results%20show%20that%20even%20recent%20large%20language%20models%20consistently%20exhibit%20low%20performance%20on%20these%20three%20tasks.%20CALRK-Bench%20provides%20a%20new%20stress%20test%20for%20evaluating%20context-aware%20legal%20reasoning%20rather%20than%20simple%20memorization%20of%20legal%20knowledge.%20Our%20code%20is%20available%20at%20https%3A//github.com/jhCOR/CALRKBench.&entry.1838667208=http%3A//arxiv.org/abs/2603.26332v1&entry.124074799=Read"},
{"title": "Label-Free Cross-Task LoRA Merging with Null-Space Compression", "author": "Wonyoung Lee and Wooseong Jeong and Kuk-Jin Yoon", "abstract": "Model merging combines independently fine-tuned checkpoints without joint multi-task training. In the era of foundation-model, fine-tuning with Low-Rank Adaptation (LoRA) is prevalent, making LoRA merging a promising target. Existing approaches can work in homogeneous settings where all target tasks are classification but often fail when tasks span classification and regression. Approaches using entropy-based surrogates do not apply to regression and are costly for large language models due to long token sequences. We introduce Null-Space Compression (NSC) Merging, a label-free, output-agnostic method that sets merge weights from adapter geometry. Our key observation is that during LoRA finetuning the down-projection factor $A$ in $\u0394W = BA$ compresses its null space, and the compression correlates with performance. NSC uses this as an optimization signal for merging that can generalize across classification, regression, and sequence generation. NSC achieves state-of-the-art performance across twenty heterogeneous vision tasks with balanced gains where prior methods overfit subsets of tasks. It also outperforms baselines on six NLI benchmarks and on vision-language evaluations for VQA and image captioning, demonstrating scalability and effectiveness.", "link": "http://arxiv.org/abs/2603.26317v1", "date": "2026-03-27", "relevancy": 1.9619, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5031}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4822}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4811}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Label-Free%20Cross-Task%20LoRA%20Merging%20with%20Null-Space%20Compression&body=Title%3A%20Label-Free%20Cross-Task%20LoRA%20Merging%20with%20Null-Space%20Compression%0AAuthor%3A%20Wonyoung%20Lee%20and%20Wooseong%20Jeong%20and%20Kuk-Jin%20Yoon%0AAbstract%3A%20Model%20merging%20combines%20independently%20fine-tuned%20checkpoints%20without%20joint%20multi-task%20training.%20In%20the%20era%20of%20foundation-model%2C%20fine-tuning%20with%20Low-Rank%20Adaptation%20%28LoRA%29%20is%20prevalent%2C%20making%20LoRA%20merging%20a%20promising%20target.%20Existing%20approaches%20can%20work%20in%20homogeneous%20settings%20where%20all%20target%20tasks%20are%20classification%20but%20often%20fail%20when%20tasks%20span%20classification%20and%20regression.%20Approaches%20using%20entropy-based%20surrogates%20do%20not%20apply%20to%20regression%20and%20are%20costly%20for%20large%20language%20models%20due%20to%20long%20token%20sequences.%20We%20introduce%20Null-Space%20Compression%20%28NSC%29%20Merging%2C%20a%20label-free%2C%20output-agnostic%20method%20that%20sets%20merge%20weights%20from%20adapter%20geometry.%20Our%20key%20observation%20is%20that%20during%20LoRA%20finetuning%20the%20down-projection%20factor%20%24A%24%20in%20%24%CE%94W%20%3D%20BA%24%20compresses%20its%20null%20space%2C%20and%20the%20compression%20correlates%20with%20performance.%20NSC%20uses%20this%20as%20an%20optimization%20signal%20for%20merging%20that%20can%20generalize%20across%20classification%2C%20regression%2C%20and%20sequence%20generation.%20NSC%20achieves%20state-of-the-art%20performance%20across%20twenty%20heterogeneous%20vision%20tasks%20with%20balanced%20gains%20where%20prior%20methods%20overfit%20subsets%20of%20tasks.%20It%20also%20outperforms%20baselines%20on%20six%20NLI%20benchmarks%20and%20on%20vision-language%20evaluations%20for%20VQA%20and%20image%20captioning%2C%20demonstrating%20scalability%20and%20effectiveness.%0ALink%3A%20http%3A//arxiv.org/abs/ eneous%2520vision%2520tasks%2520with%2520balanced%2520gains%2520where%2520prior%2520methods%2520overfit%2520subsets%2520of%2520tasks.%2520It%2520also%2520outperforms%2520baselines%2520on%2520six%2520NLI%2520benchmarks%2520and%2520on%2520vision-language%2520evaluations%2520for%2520VQA%2520and%2520image%2520captioning%252C%2520demonstrating%2520scalability%2520and%2520effectiveness.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26317v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Label-Free%20Cross-Task%20LoRA%20Merging%20with%20Null-Space%20Compression&entry.906535625=Wonyoung%20Lee%20and%20Wooseong%20Jeong%20and%20Kuk-Jin%20Yoon&entry.1292438233=Model%20merging%20combines%20independently%20fine-tuned%20checkpoints%20without%20joint%20multi-task%20training.%20In%20the%20era%20of%20foundation-model%2C%20fine-tuning%20with%20Low-Rank%20Adaptation%20%28LoRA%29%20is%20prevalent%2C%20making%20LoRA%20merging%20a%20promising%20target.%20Existing%20approaches%20can%20work%20in%20homogeneous%20settings%20where%20all%20target%20tasks%20are%20classification%20but%20often%20fail%20when%20tasks%20span%20classification%20and%20regression.%20Approaches%20using%20entropy-based%20surrogates%20do%20not%20apply%20to%20regression%20and%20are%20costly%20for%20large%20language%20models%20due%20to%20long%20token%20sequences.%20We%20introduce%20Null-Space%20Compression%20%28NSC%29%20Merging%2C%20a%20label-free%2C%20output-agnostic%20method%20that%20sets%20merge%20weights%20from%20adapter%20geometry.%20Our%20key%20observation%20is%20that%20during%20LoRA%20finetuning%20the%20down-projection%20factor%20%24A%24%20in%20%24%CE%94W%20%3D%20BA%24%20compresses%20its%20null%20space%2C%20and%20the%20compression%20correlates%20with%20performance.%20NSC%20uses%20this%20as%20an%20optimization%20signal%20for%20merging%20that%20can%20generalize%20across%20classification%2C%20regression%2C%20and% {"title": "PQuantML: A Tool for End-to-End Hardware-aware Model Compression", "author": "Roope Niemi and Anastasiia Petrovych and Arghya Ranjan Das and Enrico Lupi and Chang Sun and Dimitrios Danopoulos and Marlon Joshua Helbing and Mia Liu and Sebastian Dittmeier and Michael Kagan and Vladimir Loncar and Maurizio Pierini", "abstract": "PQuantML is a new open-source, hardware-aware neural network model compression library tailored to end-to-end workflows. Motivated by the need to deploy performant models to environments with strict latency constraints, PQuantML simplifies training of compressed models by providing a unified interface to apply pruning and quantization, either jointly or individually. The library implements multiple pruning methods with different granularities, as well as fixed-point quantization with support for High-Granularity Quantization. We evaluate PQuantML on representative tasks such as the jet substructure classification, so-called jet tagging, an on-edge problem related to real-time LHC data processing. Using various pruning methods with fixed-point quantization, PQuantML achieves substantial parameter and bit-width reductions while maintaining accuracy. The resulting compression is further compared against existing tools, such as QKeras and HGQ.", "link": "http://arxiv.org/abs/2603.26595v1", "date": "2026-03-27", "relevancy": 1.3801, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4903}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4563}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4494}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PQuantML%3A%20A%20Tool%20for%20End-to-End%20Hardware-aware%20Model%20Compression&body=Title%3A%20PQuantML%3A%20A%20Tool%20for%20End-to-End%20Hardware-aware%20Model%20Compression%0AAuthor%3A%20Roope%20Niemi%20and%20Anastasiia%20Petrovych%20and%20Arghya%20Ranjan%20Das%20and%20Enrico%20Lupi%20and%20Chang%20Sun%20and%20Dimitrios%20Danopoulos%20and%20Marlon%20Joshua%20Helbing%20and%20Mia%20Liu%20and%20Sebastian%20Dittmeier%20and%20Michael%20Kagan%20and%20Vladimir%20Loncar%20and%20Maurizio%20Pierini%0AAbstract%3A%20PQuantML%20is%20a%20new%20open-source%2C%20hardware-aware%20neural%20network%20model%20compression%20library%20tailored%20to%20end-to-end%20workflows.%20Motivated%20by%20the%20need%20to%20deploy%20performant%20models%20to%20environments%20with%20strict%20latency%20constraints%2C%20PQuantML%20simplifies%20training%20of%20compressed%20models%20by%20providing%20a%20unified%20interface%20to%20apply%20pruning%20and%20quantization%2C%20either%20jointly%20or%20individually.%20The%20library%20implements%20multiple%20pruning%20methods%20with%20different%20granularities%2C%20as%20well%20as%20fixed-point%20quantization%20with%20support%20for%20High-Granularity%20Quantization.%20We%20evaluate%20PQuantML%20on%20representative%20tasks%20such%20as%20the%20jet%20substructure%20classification%2C%20so-called%20jet%20tagging%2C%20an%20on-edge%20problem%20related%20to%20real-time%20LHC%20data%20processing.%20Using%20various%20pruning%20methods%20with%20fixed-point%20quantization%2C%20PQuantML%20achieves%20substantial%20parameter%20and%20bit-width%20reductions%20while%20maintaining%20accuracy.%20The%20resulting%20compression%20is%20further%20compared%20against%20existing%20tools%2C%20such%20as%20QKeras%20and%20HGQ.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26595v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPQuantML%253A%2520A%2520Tool%2520for%2520End-to-End%2520Hardware-aware%2520Model%2520Compression%26entry.906535625%3DRoope%2520Niemi%2520and%2 {"title": "Making Multi-Axis Models Robust to Multiplicative Noise: How, and Why?", "author": "Bailey Andrew and David R. Westhead and Luisa Cutillo", "abstract": "In this paper we develop a graph-learning algorithm, MED-MAGMA, to fit multi-axis (Kronecker-sum-structured) models corrupted by multiplicative noise. This type of noise is natural in many application domains, such as that of single-cell RNA sequencing, in which it naturally captures technical biases of RNA sequencing platforms. Our work is evaluated against prior work on each and every public dataset in the Single Cell Expression Atlas under a certain size, demonstrating that our methodology learns networks with better local and global structure. MED-MAGMA is made available as a Python package (MED-MAGMA).", "link": "http://arxiv.org/abs/2603.26327v1", "date": "2026-03-27", "relevancy": 1.4895, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5015}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4932}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4874}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Making%20Multi-Axis%20Models%20Robust%20to%20Multiplicative%20Noise%3A%20How%2C%20and%20Why%3F&body=Title%3A%20Making%20Multi-Axis%20Models%20Robust%20to%20Multiplicative%20Noise%3A%20How%2C%20and%20Why%3F%0AAuthor%3A%20Bailey%20Andrew%20and%20David%20R.%20Westhead%20and%20Luisa%20Cutillo%0AAbstract%3A%20In%20this%20paper%20we%20develop%20a%20graph-learning%20algorithm%2C%20MED-MAGMA%2C%20to%20fit%20multi-axis%20%28Kronecker-sum-structured%29%20models%20corrupted%20by%20multiplicative%20noise.%20This%20type%20of%20noise%20is%20natural%20in%20many%20application%20domains%2C%20such%20as%20that%20of%20single-cell%20RNA%20sequencing%2C%20in%20which%20it%20naturally%20captures%20technical%20biases%20of%20RNA%20sequencing%20platforms.%20Our%20work%20is%20evaluated%20against%20prior%20work%20on%20each%20and%20every%20public%20dataset%20in%20the%20Single%20Cell%20Expression%20Atlas%20under%20a%20certain%20size%2C%20demonstrating%20that%20our%20methodology%20learns%20networks%20with%20better%20local%20and%20global%20structure.%20MED-MAGMA%20is%20made%20available%20as%20a%20Python%20package%20%28MED-MAGMA%29.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26327v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMaking%2520Multi-Axis%2520Models%2520Robust%2520to%2520Multiplicative%2520Noise%253A%2520How%252C%2520and%2520Why%253F%26entry.906535625%3DBailey%2520Andrew%2520and%2520David%2520R.%2520Westhead%2520and%2520Luisa%2520Cutillo%26entry.1292438233%3DIn%2520this%2520paper%2520we%2520develop%2520a%2520graph-learning%2520algorithm%252C%2520MED-MAGMA%252C%2520to%2520fit%2520multi-axis%2520%2528Kronecker-sum-structured%2529%2520models%2520corrupted%2520by%2520multiplicative%2520noise.%2520This%2520type%2520of%2520noise%2520is%2520natural%2520in%2520many%2520application%2520domains%252C%2520such%2520as%2520that%2520of%2520single-cell%2520RNA%2520sequencing%252C%2520in%2520which%2520it%2520naturally%2520captures%2520technical%2520biases%2520of%2520RNA%2520sequencing%2520platforms.%2520Our%2520work%2520is%2520evaluated%2520against%2520prior%2520work%2520on%2520each%2520and%2520every%2520public%2520dataset%2520in%2520the%2520Single%2520Cell%2520Expression%2520Atlas%2520under%2520a%2520certain%2520size%252C%2520demonstrating%2520that%2520our%2520methodology%2520learns%2520networks%2520with%2520better%2520local%2520and%2520global%2520structure.%2520MED-MAGMA%2520is%2520made%2520available%2520as%2520a%2520Python%2520package%2520%2528MED-MAGMA%2529.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26327v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Making%20Multi-Axis%20Models%20Robust%20to%20Multiplicative%20Noise%3A%20How%2C%20and%20Why%3F&entry.906535625=Bailey%20Andrew%20and%20David%20R.%20Westhead%20and%20Luisa%20Cutillo&entry.1292438233=In%20this%20paper%20we%20develop%20a%20graph-learning%20algorithm%2C%20MED-MAGMA%2C%20to%20fit%20multi-axis%20%28Kronecker-sum-structured%29%20models%20corrupted%20by%20multiplicative%20noise.%20This%20type%20of%20noise%20is%20natural%20in%20many%20application%20domains%2C%20such%20as%20that%20of%20single-cell%20RNA%20sequencing%2C%20in%20which%20it%20naturally%20captures%20technical%20biases%20of%20RNA%20sequencing%20platforms.%20Our%20work%20is%20evaluated%20against%20prior%20work%20on%20each%20and%20every%20public%20dataset%20in%20the%20Single%20Cell%20Expression%20Atlas%20under%20a%20certain%20size%2C%20demonstrating%20that%20our%20methodology%20learns%20networks%20with%20better%20local%20and%20global%20structure.%20MED-MAGMA%20is%20made%20available%20as%20a%20Python%20package%20%28MED-MAGMA%29.&entry.1838667208=http%3A//arxiv.org/abs/2603.26327v1&entry.124074799=Read"},
{"title": "Interpretable long-term traffic modelling on national road networks using theory-informed deep learning", "author": "Yue Li and Shujuan Chen and Akihiro Shimoda and Ying Jin", "abstract": "Long-term traffic modelling is fundamental to transport planning, but existing approaches often trade off interpretability, transferability, and predictive accuracy. Classical travel demand models provide behavioural structure but rely on strong assumptions and extensive calibration, whereas generic deep learning models capture complex patterns but often lack theoretical grounding and spatial transferability, limiting their usefulness for long-term planning applications. We propose DeepDemand, a theory-informed deep learning framework that embeds key components of travel demand theory to predict long-term highway traffic volumes using external socioeconomic features and road-network structure. The framework integrates a competitive two-source Dijkstra procedure for local origin-destination (OD) region extraction and OD pair screening with a differentiable architecture modelling OD interactions and travel-time deterrence. The model is evaluated using eight years (2017-2024) of observations on the UK strategic road network, covering 5088 highway segments. Under random cross-validation, DeepDemand achieves an R2 of 0.718 and an MAE of 7406 vehicles, outperforming linear, ridge, random forest, and gravity-style baselines. Performance remains strong under spatial cross-validation (R2 = 0.665), indicating good geographic transferability. Interpretability analysis reveals a stable nonlinear travel-time deterrence pattern, key socioeconomic drivers of demand, and polycentric OD interaction structures aligned with major employment centres and transport hubs. These results highlight the value of integrating transport theory with deep learning for interpretable highway traffic modelling and practical planning applications.", "link": "http://arxiv.org/abs/2603.26440v1", "date": "2026-03-27", "relevancy": 0.9676, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4913}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4811}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interpretable%20long-term%20traffic%20modelling%20on%20national%20road%20networks%20using%20theory-informed%20deep%20learning&body=Title%3A%20Interpretable%20long-term%20traffic%20modelling%20on%20national%20road%20networks%20using%20theory-informed%20deep%20learning%0AAuthor%3A%20Yue%20Li%20and%20Shujuan%20Chen%20and%20Akihiro%20Shimoda%20and%20Ying%20Jin%0AAbstract%3A%20Long-term%20traffic%20modelling%20is%20fundamental%20to%20transport%20planning%2C%20but%20existing%20approaches%20often%20trade%20off%20interpretability%2C%20transferability%2C%20and%20predictive%20accuracy.%20Classical%20travel%20demand%20models%20provide%20behavioural%20structure%20but%20rely%20on%20strong%20assumptions%20and%20extensive%20calibration%2C%20whereas%20generic%20deep%20learning%20models%20capture%20complex%20patterns%20but%20often%20lack%20theoretical%20grounding%20and%20spatial%20transferability%2C%20limiting%20their%20usefulness%20for%20long-term%20planning%20applications.%20We%20propose%20DeepDemand%2C%20a%20theory-informed%20deep%20learning%20framework%20that%20embeds%20key%20components%20of%20travel%20demand%20theory%20to%20predict%20long-term%20highway%20traffic%20volumes%20using%20external%20socioeconomic%20features%20and%20road-network%20structure.%20The%20framework%20integrates%20a%20competitive%20two-source%20Dijkstra%20procedure%20for%20local%20origin-destination%20%28OD%29%20region%20extraction%20and%20OD%20pair%20screening%20with%20a%20differentiable%20architecture%20modelling%20OD%20interactions%20and%20travel-time%20deterrence.%20The%20model%20is%20evaluated%20using%20eight%20years%20%282017-2024%29%20of%20observations%20on%20the%20UK%20strategic%20road%20network%2C%20covering%205088%20highway%20segments.%20Under%20random%20cross-validation%2C%20DeepDemand%20achieves%20an%20R2%20of%200.718%20and%20an%20MAE%20of%207406%20vehicles%2C%20outperforming%20linear%2C%20ridge%2C%20random%20forest%2C%20and%20gravity-style%20baselines.%20Performance%20remains%20strong%20under%20spatial%20cross-validation%20%28R2%20%3D%200.665%29%2C%20indicating%20good%20geographic%20transferability.%20Interpretability%20analysis%20reveals%20a%20stable%20nonlinear%20travel-time%20deterrence%20pattern%2C%20key%20socioeconomic%20drivers%20of%20demand%2C%20and%20polycentric%20OD%20interaction%20structures%20aligned%20with%20major%20employment%20centres%20and%20transport%20hubs.%20These%20results%20highlight%20the%20value%20of%20integrating%20transport%20theory%20with%20deep%20learning%20for%20interpretable%20highway%20traffic%20modelling%20and%20practical%20planning%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26440v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInterpretable%2520long-term%2520traffic%2520modelling%2520on%2520national%2520road%2520networks%2520using%2520theory-informed%2520deep%2520learning%26entry.906535625%3DYue%2520Li%2520and%2520Shujuan%2520Chen%2520and%2520Akihiro%2520Shimoda%2520and%2520Ying%2520Jin%26entry.1292438233%3DLong-term%2520traffic%2520modelling%2520is%2520fundamental%2520to%2520transport%2520planning%252C%2520but%2520existing%2520approaches%2520often%2520trade%2520off%2520interpretability%252C%2520transferability%252C%2520and%2520predictive%2520accuracy.%2520Classical%2520travel%2520demand%2520models%2520provide%2520behavioural%2520stru {"title": "Realtime-VLA V2: Learning to Run VLAs Fast, Smooth, and Accurate", "author": "Chen Yang and Yucheng Hu and Yunchao Ma and Yunhuan Yang and Jing Tan and Haoqiang Fan", "abstract": "In deployment of the VLA models to real-world robotic tasks, execution speed matters. In previous work arXiv:2510.26742 we analyze how to make neural computation of VLAs on GPU fast. However, we leave the question of how to actually deploy the VLA system on the real robots open. In this report we describe a set of practical techniques to achieve the end-to-end result of running a VLA-driven robot at an impressive speed in real world tasks that require both accuracy and dexterity. The stack of technology ranges across calibration, planning & control, and learning based method to identify optimal execution speed. In the tasks we show, the robot even executes in a speed on par with casual human operation and approaching the hardware limit of our lightweight arm. The unaccelerated videos and inference traces are provided in https://dexmal.github.io/realtime-vla-v2/.", "link": "http://arxiv.org/abs/2603.26360v1", "date": "2026-03-27", "relevancy": 1.5936, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5404}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5216}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5176}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Realtime-VLA%20V2%3A%20Learning%20to%20Run%20VLAs%20Fast%2C%20Smooth%2C%20and%20Accurate&body=Title%3A%20Realtime-VLA%20V2%3A%20Learning%20to%20Run%20VLAs%20Fast%2C%20Smooth%2C%20and%20Accurate%0AAuthor%3A%20Chen%20Yang%20and%20Yucheng%20Hu%20and%20Yunchao%20Ma%20and%20Yu {"title": "Wanderland: Geometrically Grounded Simulation for Open-World Embodied AI", "author": "Xinhao Liu and Jiaqi Li and Youming Deng and Ruxin Chen and Yingjia Zhang and Yifei Ma and Li Guo and Yiming Li and Jing Zhang and Chen Feng", "abstract": "Reproducible closed-loop evaluation remains a major bottleneck in Embodied AI such as visual navigation. A promising path forward is high-fidelity simulation that combines photorealistic sensor rendering with geometrically grounded interaction in complex, open-world urban environments. Although recent video-3DGS methods ease open-world scene capturing, they are still unsuitable for benchmarking due to large visual and geometric sim-to-real gaps. To address these challenges, we introduce Wanderland, a real-to-sim framework that features multi-sensor capture, reliable reconstruction, accurate geometry, and robust view synthesis. Using this pipeline, we curate a diverse dataset of indoor-outdoor urban scenes and systematically demonstrate how image-only pipelines scale poorly, how geometry quality impacts novel view synthesis, and how all of these adversely affect navigation policy learning and evaluation reliability. Beyond serving as a trusted testbed for embodied navigation, Wanderland's rich raw sensor data further allows benchmarking of 3D reconstruction and novel view synthesis models. Our work establishes a new foundation for reproducible research in open-world embodied AI. Project website is at https://ai4ce.github.io/wanderland/.", "link": "http://arxiv.org/abs/2511.20620v2", "date": "2026-03-27", "relevancy": 1.7874, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.664}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5793}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

{"title": "DuSCN-FusionNet: An Interpretable Dual-Channel Structural Covariance Fusion Framework for ADHD Classification Using Structural MRI", "author": "Qurat Ul Ain and Alptekin Temizel and Soyiba Jawed", "abstract": "Attention Deficit Hyperactivity Disorder (ADHD) is a highly prevalent neurodevelopmental condition; however, its neurobiological diagnosis remains challenging due to the lack of reliable imaging-based biomarkers, particularly anatomical markers. Structural MRI (sMRI) provides a non-invasive modality for investigating brain alterations associated with ADHD; nevertheless, most deep learning approaches function as black-box systems, limiting clinical trust and interpretability. In this work, we propose DuSCN-FusionNet, an interpretable sMRI-based framework for ADHD classification that leverages dual-channel Structural Covariance Networks (SCNs) to capture inter-regional morphological relationships. ROI-wise mean intensity and intra-regional variability descriptors are used to construct intensity-based and heterogeneity-based SCNs, which are processed through an SCN-CNN encoder. In parallel, auxiliary ROI-wise variability features and global statistical descriptors are integrated via late-stage fusion to enhance performance. The model is evaluated using stratified 10-fold cross-validation with a 5-seed ensemble strategy, achieving a mean balanced accuracy of 80.59% and an AUC of 0.778 on the Peking University site of the ADHD-200 dataset. DuSCN-FusionNet further achieves precision, recall, and F1-scores of 81.66%, 80.59%, and 80.27%, respectively. Moreover, Grad-CAM is adapted to the SCN domain to derive ROI-level importance scores, enabling the identification of structurally relevant brain regions as potential biomarkers.", "link": "http://arxiv.org/abs/2603.26351v1", "date": "2026-03-27", "relevancy": 2.4509, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4958}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4911}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4837}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DuSCN-FusionNet%3A%20An%20Interpretable%20Dual-Channel%20Structural%20Covariance%20Fusion%20Framework%20for%20ADHD%20Classification%20Using%20Structural%20MRI&body=Title%3A%20DuSCN-FusionNet%3A%20An%20Interpretable%20Dual-Channel%20Structural%20Covariance%20Fusion%20Framework%20for%20ADHD%20Classification%20Using%20Structural%20MRI%0AAuthor%3A%20Qurat%20Ul%20Ain%20and%20Alptekin%20Temizel%20and%20Soyiba%20Jawed%0AAbstract%3A%20Attention%20Deficit%20Hyperactivity%20Disorder%20%28ADHD%29%20is%20a%20highly%20prevalent%20neurodevelopmental%20condition%3B%20however%2C%20its%20neurobiological%20diagnosis%20remains%20challenging%20due%20to%20the%20lack%20of%20reliable%20imaging-based%20biomarkers%2C%20particularly%20anatomical%20markers.%20Structural%20MRI%20%28sMRI%29%20provides%20a%20non-invasive%20modality%20for%20investigating%20brain%20alterations%20associated%20with%20ADHD%3B%20nevertheless%2C%20most%20deep%20learning%20approaches%20function%20as%20black-box%20systems%2C%20limiting%20clinical%20trust%20and%20interpretability.%20In%20this%20work%2C%20we%20propose%20DuSCN-FusionNet%2C%20an%20interpretable%20sMRI-based%20framework%20for%20ADHD%20classification%20that%20leverages%20dual-channel%20Structural%20Covariance%20Networks%20%28SCNs%29%20to%20capture%20inter-regional%20morphological%20relationships.%20ROI-wise%20mean%20intensity%20and%20intra-regional%20variability%20descriptors%20are%20used%20to%20construct%20intensity-based%20and%20heterogeneity-based%20SCNs%2C%20which%20are%20processed%20through%20an%20SCN-CNN%20encoder.%20In%20parallel%2C%20auxiliary%20ROI-wise%20variability%20features%20and%20global%20statistical%20descriptors%20are%20integrated%20via%20late-stage%20fusion%20to%20enhance%20performance.%20The%20model%20is%20evaluated%20using%20stratified%2010-fold%20cross-validation%20with%20a%205-seed%20ensemble%20strategy%2C%20achieving%20a%20mean%20balanced%20accuracy%20of%2080.59%25%20and%20an%20AUC%20of%200.778%20on%20the%20Peking%20University%20site%20of%20the%20ADHD-200%20dataset.%20DuSCN-FusionNet%20further%20achieves%20precision%2C%20recall%2C%20and%20F1-scores%20of%2081.66%25%2C%2080.59%25%2C%20and%2080.27%25%2C%20respectively.%20Moreover%2C%20Grad-CAM%20is%20adapted%20to%20the%20SCN%20domain%20to%20derive%20ROI-level%20importance%20scores%2C%20enabling%20the%20identification%20of%20structurally%20relevant%20brain%20regions%20as%20potential%20biomarkers.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26351v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDuSCN-FusionNet%253A%2520An%2520Interpretable%2520Dual-Channel%2520Structural%2520Covariance%2520Fusion%2520Framework%2520for%2520ADHD%2520Classification%2520Using%2520Structural%2520MRI%26entry.906535625%3DQurat%2520Ul%2520Ain%2520and%2520Alptekin%2520Temizel%2520and%2520Soyiba%2520Jawed%26entry.1292438233%3DAttention%2520Deficit%2520Hyperactivity%2520Disorder%2520%2528ADHD%2529%2520is%2520a%2520highly%2520prevalent%2520neurodevelopmental%2520condition%253B%2520however%252C%2520its%2520neurobiological%2520diagnosis%2520remains%2520challenging%2520due%2520to%2520the%2520lack%2520of%2520reliable%2520imaging-based%2520biomarkers%252C%2520particularly%2520anatomical%2520markers.%2520Structural%2520MRI%2520%2528sMRI%2529%2520provides%2520a%2520non-invasive%2520modality%2520for%2520investigating%2520brain%2520alterations%2520associated%2520with%2520ADHD%253B%2520nevertheless%252C%2520most%2520deep%2520learning%2520approaches%2520function%2520as%2520black-box%2520systems%252C%2520limiting%2520cl {"title": "From Human Cognition to Neural Activations: Probing the Computational Primitives of Spatial Reasoning in LLMs", "author": "Jiyuan An and Liner Yang and Mengyan Wang and Luming Lu and Weihua An and Erhong Yang", "abstract": "As spatial intelligence becomes an increasingly important capability for foundation models, it remains unclear whether large language models' (LLMs) performance on spatial reasoning benchmarks reflects structured internal spatial representations or reliance on linguistic heuristics. We address this question from a mechanistic perspective by examining how spatial information is internally represented and used. Drawing on computational theories of human spatial cognition, we decompose spatial reasoning into three primitives, relational composition, representational transformation, and stateful spatial updating, and design controlled task families for each. We evaluate multilingual LLMs in English, Chinese, and Arabic under single pass inference, and analyze internal representations using linear probing, sparse autoencoder based feature analysis, and causal interventions. We find that task relevant spatial information is encoded in intermediate layers and can causally influence behavior, but these representations are transient, fragmented across task families, and weakly integrated into final predictions. Cross linguistic analysis further reveals mechanistic degeneracy, where similar behavioral performance arises from distinct internal pathways. Overall, our results suggest that current LLMs exhibit limited and context dependent spatial representations rather than robust, general purpose spatial reasoning, highlighting the need for mechanistic evaluation beyond benchmark accuracy.", "link": "http://arxiv.org/abs/2603.26323v1", "date": "2026-03-27", "relevancy": 2.4171, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.62}, {" {"title": "Line-of-Sight-Constrained Multi-Robot Mapless Navigation via Polygonal Visible Regions", "author": "Ruofei Bai and Shenghai Yuan and Xinhang Xu and Xingyu Ji and Xiaowei Li and Hongliang Guo and Wei-Yun Yau and Lihua Xie", "abstract": "Multi-robot systems rely on underlying connectivity to ensure reliable communication and timely coordination. This paper studies the line-of-sight (LoS) connectivity maintenance problem in multi-robot navigation with unknown obstacles. Prior works typically assume known environment maps to formulate LoS constraints between robots, which hinders their practical deployment. To overcome this limitation, we propose an inherently distributed approach where each robot only constructs an egocentric visible region based on its real-time LiDAR scans, instead of endeavoring to build a global map online. The individual visible regions are shared through distributed communication to establish inter-robot LoS constraints, which are then incorporated into a multi-robot navigation framework to ensure LoS-connectivity. Moreover, we enhance the robustness of connectivity maintenance by proposing a more accurate LoS-distance metric, which further enables flexible topology optimization that eliminates redundant and effort-demanding connections. The proposed framework is evaluated through extensive multi-robot navigation and exploration tasks in both simulation and real-world experiments. Results show that it reliably maintains LoS-connectivity between robots in challenging environments cluttered with obstacles, even under large visible ranges and fragile minimal topologies, where existing methods consistently fail. Ablation studies also reveal that topology optimization boosts navigation efficiency by around $20\\%$, demonstrating the framework's potential for efficient navigation under connectivity constraints.", "link": "http://arxiv.org/abs/2603.26314v1", "date": "2026-03-27", "relevancy": 2.3722, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6065}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.59}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5669}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Line-of-Sight-Constrained%20Multi-Robot%20Mapless%20Navigation%20via%20Polygonal%20Visible%20Regions&body=Title%3A%20Line-of-Sight-Constrained%20Multi-Robot%20Mapless%20Navigation%20via%20Polygonal%20Visible%20Regions%0AAuthor%3A%20Ruofei%20Bai%20and%20Shenghai%20Yuan%20and%20Xinhang%20Xu%20and%20Xingyu%20Ji%20and%20Xiaowei%20Li%20and%20Hongliang%20Guo%20and%20Wei-Yun%20Yau%20and%20Lihua%20Xie%0AAbstract%3A%20Multi-robot%20systems%20rely%20on%20underlying%20connectivity%20to%20ensure%20reliable%20communication%20and%20timely%20coordination.%20This%20paper%20studies%20the%20line-of-sight%20%28LoS%29%20connectivity%20maintenance%20problem%20in%20multi-robot%20navigation%20with%20unknown%20obstacles.%20Prior%20works%20typically%20assume%20known%20environment%20maps%20to%20formulate%20LoS%20constraints%20between%20robots%2C%20which%20hinders%20their%20practical%20deployment.%20To%20overcome%20this%20limitation%2C%20we%20propose%20an%20inherently%20distributed%20approach%20where%20each%20robot%20only%20constructs%20an%20egocentric%20visible%20region%20based%20on%20its%20real-time%20LiDAR%20scans%2C%20instead%20of%20endeavoring%20to%20build%20a%20global%20map%20online.%20The%20individual%20visible%20regions%20are%20shared%20through%20distributed%20communication%20to%20establish%20inter-robot%20LoS%20constraints%2C%20which%20are%20then%20incorporated%20into%20a%20multi-robot%20navigation%20framework%20to%20ensure%20LoS-connectivity.%20Moreover%2C%20we%20enhance%20the%20robustness%20of%20connectivity%20maintenance%20by%20proposing%20a%20more%20accurate%20LoS-distance%20metric%2C%20which%20further%20enables%20flexible%20topology%20optimization%20that%20eliminates%20redundant%20and%20effort-demanding%20connections.%20The%20proposed%20framework%20is%20evaluated%20through%20extensive%20multi-robot%20navigation%20and%20exploration%20tasks%20in%20both%20simulation%20and%20real-world%20experiments.%20Results%20show%20that%20it%20reliably%20maintains%20LoS-connectivity%20between%20robots%20in%20challenging%20environments%20cluttered%20with%20obstacles%2C%20even%20under%20large%20visible%20ranges%20and%20fragile%20minimal%20topologies%2C%20where%20existing%20methods%20consistently%20fail.%20Ablation%20studies%20also%20reveal%20that%20topology%20optimization%20boosts%20navigation%20efficiency%20by%20around%20%2420%5C%25%24%2C%20demonstrating%20the%20framework%27s%20potential%20for%20efficient%20navigation%20under%20connectivity%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26314v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLine-of-Sight-Constrained%2520Multi-Robot%2520Mapless%2520Navigation%2520via%2520Polygonal%2520Visible%2520Regions%26entry.906535625%3DRuofei%2520Bai%2520and%2520Shenghai%2520Yuan%2520and%2520Xinhang%2520Xu%2520and%2520Xingyu%2520Ji%2520and%2520Xiaowei%2520Li%2520and%2520Hongliang%2520Guo%2520and%2520Wei-Yun%2520Yau%2520and%2520Lihua%2520Xie%26entry.1292438233%3DMulti-robot%2520systems%2520rely%2520on%2520underlying%2520connectivity%2520to%2520ensure%2520reliable%2520communication%2520and%2520timely%2520coordination.%2520This%2520paper%2520studies%2520the%2520line-of-sight%2520%2528LoS%2529%2520connectivity%2520maintenance%2520problem%2520in%2520multi-robot%2520navigation%2520with%2520unknown%2520obstacles.%2520Prior%2520works%2520typically%2520assume%2520known%2520e {"title": "KALAVAI: Predicting When Independent Specialist Fusion Works -- A Quantitative Model for Post-Hoc Cooperative LLM Training", "author": "Ramchand Kumaresan", "abstract": "Independently trained domain specialists can be fused post-hoc into a single model that outperforms any individual specialist, and the gain is predictable: gain = 0.82 x divergence - 2.72 (R^2 = 0.856, n=6, 3-26% divergence). This enables practitioners to estimate cooperative value before committing compute. Below ~3.3% divergence, gains approach zero.In the KALAVAI protocol, contributors fine-tune copies of a shared checkpoint independently, then submit for lightweight MoE routing (500 steps). Gains are consistent: +7.72% at 410M (+/-0.02%, 3 seeds), +7.49% at 1B (+/-0.01%, 3 seeds), +6.53% at 6.9B, each over the best specialist. The router matches domain-oracle routing within <10^{-5} nats. Cross-lingual fusion (Tamil/Yoruba/Welsh/Code) achieves +21.76%, with Yoruba perplexity falling 41.9 to 7.7. A 20-contributor federation achieves +16.71% (+/-0.07pp, 3 seeds).Three requirements bound the protocol. Shared initialisation is necessary: checkpoint mismatch degrades routing. Frozen layers are optional below ~10,000 steps and beneficial beyond. Learned routing is essential: uniform averaging degrades by -1.2% vs. best specialist, while any trained router achieves oracle-optimal assignment.", "link": "http://arxiv.org/abs/2603.22755v2", "date": "2026-03-27", "relevancy": 2.3718, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4699}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4699}], "mailto": "mailto:haoxiang.li.2024@gmail. outer%20achieves%20oracle-optimal%20assignment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22755v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKALAVAI%253A%2520Predicting%2520When%2520Independent%2520Specialist%2520Fusion%2520Works%2520--%2520A%2520Quantitative%2520Model%2520for%2520Post-Hoc%2520Cooperative%2520LLM%2520Training%26entry.906535625%3DRamchand%2520Kumaresan%26entry.1292438233%3DIndependently%2520trained%2520domain%2520specialists%2520can%2520be%2520fused%2520post-hoc%2520into%2520a%2520single%2520model%2520that%2520outperforms%2520any%2520individual%2520specialist%252C%2520and%2520the%2520gain%2520is%2520predictable%253A%2520gain%2520%253D%25200.82%2520x%2520divergence%2520-%25202.72%2520%2528R%255E2%2520%253D%25200.856%252C%2520n%253D6%252C%25203-26%2525%2520divergence%2529.%2520This%2520enables%2520practitioners%2520to%2520estimate%2520cooperative%2520value%2520before%2520committing%2520compute.%2520Below%2520~3.3%2525%2520divergence%252C%2520gains%2520approach%2520zero.In%2520the%2520KALAVAI%2520protocol%252C%2520contributors%2520fine-tune%2520copies%2520of%2520a%2520shared%2520checkpoint%2520independently%252C%2520then%2520submit%2520for%2520lightweight%2520MoE%2520routing%2520%2528500%2520steps%2529.%2520Gains%2520are%2520consistent%253A%2520%252B7.72%2525%2520at%2520410M%2520%2528%252B/-0.02%2525%252C%25203%2520seeds%2529%252C%2520%252B7.49%2525%2520at%25201B%2520%2528%252B/-0.01%2525%252C%25203%2520seeds%2529%252C%2520%252B6.53%2525%2520at%25206.9B%252C%2520each%2520over%2520the%2520best%2520specialist.%2520The%2520router%2520matches%2520domain-oracle%2520routing%2520within%2520%253C10%255E%257B-5%257D%2520nats.%2520Cross-lingual%2520fusion%2520%2528Tamil/Yoruba/Welsh/Code%2529%2520achieves%2520%252B21.76%2525%252C%2520with%2520Yoruba%2520perplexity%2520falling%252041.9%2520to%25207.7.%2520A%252020-contributor%2520federation%2520achieves%2520%252B16.71%2525%25 {"title": "Does Audio Deepfake Detection Generalize?", "author": "Nicolas M. M\u00fcller and Pavel Czempin and Franziska Dieckmann and Adam Froghyar and Konstantin B\u00f6ttinger", "abstract": "Current text-to-speech algorithms produce realistic fakes of human voices, making deepfake detection a much-needed area of research. While researchers have presented various techniques for detecting audio spoofs, it is often unclear exactly why these architectures are successful: Preprocessing steps, hyperparameter settings, and the degree of fine-tuning are not consistent across related work. Which factors contribute to success, and which are accidental? In this work, we address this problem: We systematize audio spoofing detection by re-implementing and uniformly evaluating architectures from related work. We identify overarching features for successful audio deepfake detection, such as using cqtspec or logspec features instead of melspec features, which improves performance by 37% EER on average, all other factors constant. Additionally, we evaluate generalization capabilities: We collect and publish a new dataset consisting of 37.9 hours of found audio recordings of celebrities and politicians, of which 17.2 hours are deepfakes. We find that related work performs poorly on such real-world data (performance degradation of up to one thousand percent). This may suggest that the community has tailored its solutions too closely to the prevailing ASVSpoof benchmark and that deepfakes are much harder to detect outside the lab than previously thought.", "link": "http://arxiv.org/abs/2203.16263v5", "date": "2026-03-27", "relevancy": 2.3636, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4849}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4689}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Does%20Audio%20Deepfake%20Detection%20Generalize%3F&body=Title%3A%20Does%20Audio%20Deepfake%20Detection%20Generalize%3F%0AAuthor%3A%20Nicolas%20M.%20M%C3%BCller%20and%20Pavel%20Czempin%20and%20Franziska%20Dieckmann%20and%20Adam%20Froghyar%20and%20Konstantin%20B%C3%B6ttinger%0AAbstract%3A%20Current%20text-to-speech%20algorithms%20produce%20realistic%20fakes%20of%20human%20voices%2C%20making%20deepfake%20detection%20a%20much-needed%20area%20of%20research.%20While%20researchers%20have%20presented%20various%20techniques%20for%20detecting%20audio%20spoofs%2C%20it%20is%20often%20unclear%20exactly%20why%20these%20architectures%20are%20successful%3A%20Preprocessing%20steps%2C%20hyperparameter%20settings%2C%20and%20the%20degree%20of%20fine-tuning%20are%20not%20consistent%20across%20related%20work.%20Which%20factors%20contribute%20to%20success%2C%20and%20which%20are%20accidental%3F%20In%20this%20work%2C%20we%20address%20this%20problem%3A%20We%20systematize%20audio%20spoofing%20detection%20by%20re-implementing%20and%20uniformly%20evaluating%20architectures%20from%20related%20work.%20We%20identify%20overarching%20features%20for%20successful%20audio%20deepfake%20detection%2C%20such%20as%20using%20cqtspec%20or%20logspec%20features%20instead%20of%20melspec%20features%2C%20which%20improves%20performance%20by%2037%25%20EER%20on%20average%2C%20all%20other%20factors%20constant.%20Additionally%2C%20we%20evaluate%20generalization%20capabilities%3A%20We%20collect%20and%20publish%20a%20new%20dataset%20consisting%20of%2037.9%20hours%20of%20found%20audio%20recordings%20of%20celebrities%20and%20politicians%2C%20of%20which%2017.2%20hours%20are%20deepfakes.%20We%20find%20that%20related%20work%20performs%20poorly%20on%20such%20real-world%20data%20%28performance%20degradation%20of%20up%20to%20one%20thousand%20percent%29.%20This%20may%20suggest%20that%20the%20community%20has%20tailored%20its%20solutions%20too%20closely%20to%20the%20prevailing%20ASVSpoof%20benchmark%20and%20that%20deepfakes%20are%20much%20harder%20to%20detect%20outside%20the%20lab%20than%20previously%20thought.%0ALink%3A%20http%3A//arxiv.org/abs/2203.16263v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDoes%2520Audio%2520Deepfake%2520Detection%2520Generalize%253F%26entry.906535625%3DNicolas%2520M.%2520M%25C3%25BCller%2520and%2520Pavel%2520Czempin%2520and%2520Franziska%2520Dieckmann%2520and%2520Adam%2520Froghyar%2520and%2520Konstantin%2520B%25C3%25B6ttinger%26entry.1292438233%3DCurrent%2520text-to-speech%2520algorithms%2520produce%2520realistic%2520fakes%2520of%2520human%2520voices%252C%2520making%2520deepfake%2520detection%2520a%2520much-needed%2520area%2520of%2520research.%2520While%2520researchers%2520have%2520presented%2520various%2520techniques%2520for%2520detecting%2520audio%2520spoofs%252C%2520it%2520is%2520often%2520unclear%2520exactly%2520why%2520these%2520architectures%2520are%2520successful%253A%2520Preprocessing%2520steps%252C%2520hyperparameter%2520settings%252C%2520and%2520the%2520degree%2520of%2520fine-tuning%2520are%2520not%2520consistent%2520across%2520related%2520work.%2520Which%2520factors%2520contribute%2520to%2520success%252C%2520and%2520which%2520are%2520accidental%253F%2520In%2520this%2520work%252C%2520we%2520address%2520this%2520problem%253A%2520We%2520systematize%2520audio%2520spoofing%2520detection%2520by%2520re-implementing%2520and%2520uniformly%2520evaluating%2520architectures%2520from%2520related%2520work.%2520We%2520identify%2520overarching%2520features%2520for%2520successful%2520audio%2520deepfake%2520detection%252C%2520such%2520as%2520using%2520cqtspec%2520or%2520logspec%2520features%2520instead%2520of%2520melspec%2520features%252C%2520which%2520improves%2520performance% {"title": "Dynamic Token Compression for Efficient Video Understanding through Reinforcement Learning", "author": "Shida Wang and YongXiang Hua and Zhou Tao and Haoyu Cao and Linli Xu", "abstract": "Multimodal Large Language Models have demonstrated remarkable capabilities in video understanding, yet face prohibitive computational costs and performance degradation from ''context rot'' due to massive visual token redundancy. Existing compression strategies typically rely on heuristics or fixed transformations that are often decoupled from the downstream task objectives, limiting their adaptability and effectiveness. To address this, we propose SCORE (Surprise-augmented token COmpression via REinforcement learning), a unified framework that learns an adaptive token compression policy. SCORE introduces a lightweight policy network conditioned on a surprise-augmented state representation that incorporates inter-frame residuals to explicitly capture temporal dynamics and motion saliency. We optimize this policy using a group-wise reinforcement learning scheme with a split-advantage estimator, stabilized by a two-stage curriculum transferring from static pseudo-videos to real dynamic videos. Extensive experiments on diverse video understanding benchmarks demonstrate that SCORE significantly outperforms state-of-the-art baselines. Notably, SCORE achieves a 16x prefill speedup while preserving 99.5% of original performance at a 10% retention ratio, offering a scalable solution for efficient long-form video understanding.", "link": "http://arxiv.org/abs/2603.26365v1", "date": "2026-03-27", "relevancy": 2.3579, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5957}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5923}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dynamic%20Token%20Compression%20for%20Efficient%20Video%20Understanding%20through%20Reinforcement%20Learning&body=Title%3A%20Dynamic%20Token%20Compression%20for%20Efficient%20Video%20Understanding%20through%20Reinforcement%20Learning%0AAuthor%3A%20Shida%20Wang%20and%20YongXiang%20Hua%20and%20Zhou%20Tao%20and%20Haoyu%20Cao%20and%20Linli%20Xu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20have%20demonstrated%20remarkable%20capabilities%20in%20video%20understanding%2C%20yet%20face%20prohibitive%20computational%20costs%20and%20performance%20degradation%20from%20%27%27context%20rot%27%27%20due%20to%20massive%20visual%20token%20redundancy.%20Existing%20compression%20strategies%20typically%20rely%20on%20heuristics%20or%20fixed%20transformations%20that%20are%20often%20decoupled%20from%20the%20downstream%20task%20objectives%2C%20limiting%20their%20adaptability%20and%20effectiveness.%20To%20address%20this%2C%20we%20propose%20SCORE%20%28Surprise-augmented%20token%20COmpression%20via%20REinforcement%20learning%29%2C%20a%20unified%20framework%20that%20learns%20an%20adaptive%20token%20compression%20policy.%20SCORE%20introduces%20a%20lightweight%20policy%20network%20conditioned%20on%20a%20surprise-augmented%20state%20representation%20that%20incorporates%20inter-frame%20residuals%20to%20explicitly%20capture%20temporal%20dynamics%20and%20motion%20saliency.%20We%20optimize%20this%20policy%20using%20a%20group-wise%20reinforcement%20learning%20scheme%20with%20a%20split-advantage%20estimator%2C%20stabilized%20by%20a%20two-stage%20curriculum%20transferring%20from%20static%20pseudo-videos%20to%20real%20dynamic%20videos.%20Extensive%20experiments%20on%20diverse%20video%20understanding%20benchmarks%20demonstrate%20that%20SCORE%20significantly%20outperforms%20state-of-the-art%20baselines.%20Notably%2C%20SCORE%20achieves%20a%2016x%20prefill%20speedup%20while%20preserving%2099.5%25%20of%20original%20performance%20at%20a%2010%25%20retention%20ratio%2C%20offering%20a%20scalable%20solution%20for%20efficient%20long-form%20video%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26365v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDynamic%2520Token%2520Compression%2520for%2520Efficient%2520Video%2520Understanding%2520through%2520Reinforcement%2520Learning%26entry.906535625%3DShida%2520Wang%2520and%2520YongXiang%2520Hua%2520and%2520Zhou%2520Tao%2520and%2520Haoyu%2520Cao%2520and%2520Linli%2520Xu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520have%2520demonstrated%2520remarkable%2520capabilities%2520in%2520video%2520understanding%252C%2520yet%2520face%2520prohibitive%2520computational%2520costs%2520and%2520performance%2520degradation%2520from%2520%2527%2527context%2520rot%2527%2527%2520due%2520to%2520massive%2520visual%2520token%2520redundancy.%2520Existing%2520compression%2520strategies%2520typically%2520rely%2520on%2520heuristics%2520or%2520fixed%2520transformations%2520that%2520are%2520often%2520decoupled%2520from%2520the%2520downstream%2520task%2520objectives%252C%2520limiting%2520their%2520adaptability%2520and%2520effectiveness.%2520To%2520address%2520this%252C%2520we%2520propose%2520SCORE%2520%2528Surprise-augmented%2520token%2520COmpression%2520via%2520REinforcement%2520learning%2529%252C%2520a%2520unified%2520framework%2520that%2520learns%2520an%2520adaptive%2520token%2520compression%2520policy.%2520SCORE%2520introduces%2520a%2520lightweight%2520policy%2520network%2520conditioned%2520on%2520a%2520surprise-augmented%2520state%2520representation%2520that%2520incorporates%2520inter-frame%2520residuals%2520to%2520explicitly%2520capture%2520temporal%2520dynamics%2520and%2520motion%2520saliency.%2520We%2520optimize%2520this%2520policy%2520using%2520a%2520group-wise%2520reinforcement%2520learning%2520scheme%2520with%2520a%2520split-advantage%2520estimator%252C%2520stabilized%2520by%2520a%2520two-stage%2520curriculum%2520transferring%2520from%2520static%2520pseudo-videos%2520to%2520real%2520dynamic%2520videos.%2520Extensive%2520experiments%2520on%2520diverse%2520video%2520understanding%2520benchmarks%2520demonstrate%2520that%2520SCORE%2520significantly%2520outperforms%2520state-of-the-art%2520baselines.%2520Notably%252C%2520SCORE%2520achieves%2520a%252016x%2520prefill%2520speedup%2520while%2520preserving%252099.5%2525%2520of%2520original%2520performance%2520at%2520a%252010%2525%2520retention%2520ratio%252C%2520offering%2520a%2520scalable%2520solution%2520for%2520efficient%2520long-form%2520video%2520understanding.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26365v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Dynamic%20Token%20Compression%20for%20Efficient%20Video%20Understanding%20through%20Reinforcement%20Learning&entry.906535625=Shida%20Wang%20and%20YongXiang%20Hua%20and%20Zhou%20Tao%20and%20Haoyu%20Cao%20and%20Linli%20Xu&entry.1292438233=Multimodal%20Large%20Language%20Models%20have%20demonstrated%20remarkable%20capabilities%20in%20video%20understanding%2C%20yet%20face%20prohibitive%20computational%20costs%20and%20performance%20degradation%20from%20%27%27context%20rot%27%27%20due%20to%20massive%20visual%20token%20redundancy.%20Existing%20compression%20strategies%20typically%20rely%20on%20heuristics%20or%20fixed%20transformations%20that%20are%20often%20decoupled%20from%20the%20downstream%20task%20objectives%2C%20limiting%20their%20adaptability%20and%20effectiveness.%20To%20address%20this%2C%20we%20propose%20SCORE%20%28Surprise-augmented%20token%20COmpression%20via%20REinforcement%20learning%29%2C%20a%20unified%20framework%20that%20learns%20an%20adaptive%20token%20compression%20policy.%20 {"title": "A Power-Weighted Noncentral Complex Gaussian Distribution", "author": "Toru Nakashika", "abstract": "The complex Gaussian distribution has been widely used as a fundamental spectral and noise model in signal processing and communication. However, its Gaussian structure often limits its ability to represent the diverse amplitude characteristics observed in individual source signals. On the other hand, many existing non-Gaussian amplitude distributions derived from hyperspherical models achieve good empirical fit due to their power-law structures, while they do not explicitly account for the complex-plane geometry inherent in complex-valued observations. In this paper, we propose a new probabilistic model for complex-valued random variables, which can be interpreted as a power-weighted noncentral complex Gaussian distribution. Unlike conventional hyperspherical amplitude models, the proposed model is formulated directly on the complex plane and preserves the geometric structure of complex-valued observations while retaining a higher-dimensional interpretation. The model introduces a nonlinear phase diffusion through a single shape parameter, enabling continuous control of the distributional geometry from arc-shaped diffusion along the phase direction to concentration of probability mass toward the origin. We formulate the proposed distribution and analyze the statistical properties of the induced amplitude distribution. The derived amplitude and power distributions provide a unified framework encompassing several widely used distributions in signal modeling, including the Rice, Nakagami, and gamma distributions. Experimental results on speech power spectra demonstrate that the proposed model consistently outperforms conventional distributions in terms of log-likelihood.", "link": "http://arxiv.org/abs/2603.26344v1", "date": "2026-03-27", "relevancy": 2.3513, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/ab {"title": "Attention-Aligned Reasoning for Large Language Models", "author": "Hongxiang Zhang and Yuan Tian and Tianyi Zhang", "abstract": "Large Language Models (LLMs) tend to generate a long reasoning chain when solving complex tasks. However, as the reasoning chain extends, critical intermediate steps and the original prompt will be buried in the context, receiving insufficient attention and leading to errors. In this work, we present ATAR, a novel reasoning method that leverages the inherent reasoning structure to steer LLM attention. Our experiments show that ATAR outperforms SOTA methods across six benchmarks, achieving up to 15.39% absolute improvement. Furthermore, with ATAR, \"non-reasoning\" models achieve comparable or even better performance compared to reasoning models of the same size in most benchmarks. Finally, our ablation studies show that the attention alignment component contributes significantly, and that these improvements are persist under different attentionsteering backends.", "link": "http://arxiv.org/abs/2510.03223v2", "date": "2026-03-27", "relevancy": 2.3488, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.472}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4686}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4686}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attention-Aligned%20Reasoning%20for%20Large%20Language%20Models&body=Title%3A%20Attention-Aligned%20Reasoning%20for%20Large%20Language%20Models%0AAuthor%3A%20Hongxiang%20Zhang%20and%20Yuan%20Tian%20and%20Tianyi%20Zhang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20tend%20to%20generate%20a%20long%20reasoning%20chain%20when%20solving%20complex%20tasks.%20However%2C%20as%20the%20reasoning%20chain%20extends%2C%20critical%20intermediate%20steps%20and%20the%20original%20prompt%20will%20be%20buried%20in%20the%20context%2C%20receiving%20insufficient%20attention%20and%20leading%20to%20errors.%20In%20this%20work%2C%20we%20present%20ATAR%2C%20a%20novel%20reasoning%20method%20that%20leverages%20the%20inherent%20reasoning%20structure%20to%20steer%20LLM%20attention.%20Our%20experiments%20show%20that%20ATAR%20outperforms%20SOTA%20methods%20across%20six%20benchmarks%2C%20achieving%20up%20to%2015.39%25%20absolute%20improvement.%20Furthermore%2C%20with%20ATAR%2C%20%22non-reasoning%22%20models%20achieve%20comparable%20or%20even%20better%20performance%20compared%20to%20reasoning%20models%20of%20the%20same%20size%20in%20most%20benchmarks.%20Finally%2C%20our%20ablation%20studies%20show%20that%20the%20attention%20alignment%20component%20contributes%20significantly%2C%20and%20that%20these%20improvements%20are%20persist%20under%20different%20attentionsteering%20backends.%0ALink%3A%20http%3A//arxiv.org/abs/2510.03223v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttention-Aligned%2520Reasoning%2520for%2520Large%2520Language%2520Models%26entry.906535625%3DHongxiang%2520Zhang%2520and%2520Yuan%2520Tian%2520and%2520Tianyi%2520Zhang%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520tend%2520to%2520generate%2520a%2520long%2520reasoning%2520chain%2520when%2520solving%2520complex%2520tasks.%2520However%252C%2520as%2520the%2520reasoning%2520chain%2520extends%252C%2520critical%2520intermediate%2520steps%2520and%2520the%2520original%2520prompt%2520will%2520be%2520buried%2520in%2520the%2520context%252C%2520receiving%2520insufficient%2520attention%2520and%2520leading%2520to%2520errors.%2520In%2520this%2520work%252C%2520we%2520present%2520ATAR%252C%2520a%2520novel%2520reasoning%2520method%2520that%2520lever {"title": "LagerNVS: Latent Geometry for Fully Neural Real-time Novel View Synthesis", "author": "Stanislaw Szymanowicz and Minghao Chen and Jianyuan Wang and Christian Rupprecht and Andrea Vedaldi", "abstract": "Recent work has shown that neural networks can perform 3D tasks such as Novel View Synthesis (NVS) without explicit 3D reconstruction. Even so, we argue that strong 3D inductive biases are still helpful in the design of such networks. We show this point by introducing LagerNVS, an encoder-decoder neural network for NVS that builds on `3D-aware' latent features. The encoder is initialized from a 3D reconstruction network pre-trained using explicit 3D supervision. This is paired with a lightweight decoder, and trained end-to-end with photometric losses. LagerNVS achieves state-of-the-art deterministic feed-forward Novel View Synthesis (including 31.4 PSNR on Re10k), with and without known cameras, renders in real time, generalizes to in-the-wild data, and can be paired with a diffusion decoder for generative extrapolation.", "link": "http://arxiv.org/abs/2603.20176v2", "date": "2026-03-27", "relevancy": 2.3269, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6016}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5739}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5649}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LagerNVS%3A%20Latent%20Geometry%20for%20Fully%20Neural%20Real-time%20Novel%20View%20Synthesis&body=Title%3A%20LagerNVS%3A%20Latent%20Geometry%20for%20Fully%20Neural%20Real-time%20Novel%20View%20Synthesis%0AAuthor%3A%20Stanislaw%20Szymanowicz%20and%20Minghao%20Chen%20and%20Jianyuan%20Wang%20and%20Christian%20Rupprecht%20and%20Andrea%20Vedaldi%0AAbstract%3A%20Recent%20work%20has%20shown%20that%20neural%20networks%20can%20perform%203D%20tasks%20such%20as%20Novel%20View%20Synthesis%20%28NVS%29%20without%20explicit%203D%20reconstruction.%20Even%20so%2C%20we%20argue%20that%20strong%203D%20inductive%20biases%20are%20still%20helpful%20in%20the%20design%20of%20such%20networks.%20We%20show%20this%20point%20by%20introducing%20LagerNVS%2C%20an%20encoder-decoder%20neural%20network%20for%20NVS%20that%20builds%20on%20%603D-aware%27%20latent%20features.%20The%20encoder%20is%20initialized%20from%20a%203D%20reconstruction%20network%20pre-trained%20using%20explicit%203D%20supervision.%20This%20is%20paired%20with%20a%20lightweight%20decoder%2C%20and%20trained%20end-to-end%20with%20photometric%20losses.%20LagerNVS%20achieves%20state-of-the-art%20deterministic%20feed-forward%20Novel%20View%20Synthesis%20%28including%2031.4%20PSNR%20on%20Re10k%29%2C%20with%20and%20without%20known%20cameras%2C%20renders%20in%20real%20time%2C%20generalizes%20to%20in-the-wild%20data%2C%20and%20can%20be%20paired%20with%20a%20diffusion%20decoder%20for%20generative%20extrapolation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20176v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLagerNVS%253A%2520Latent%2520Geometry%2520for%2520Fully%2520Neural%2520Real-time%2520Novel%2520View%2520Synthesis%26entry.906535625%3DStanislaw%2520Szymanowicz%2520and%2520Minghao%2520Chen%2520and%2520Jianyuan%2520Wang%2520and%2520Christian%2520Rupprecht%2520and%2520Andrea%2520Vedaldi%26entry.1292438233%3DRecent%2520work%2520has%2520shown%2520that%2520neural%2520networks%2520can%2520perform%25203D%2520tasks%2520such%2520as%2520Novel%2520View%2520Synthesis%2520%2528NVS%2529%2520without%2520explicit%25203D%2520reconstruction.%2520Even%2520so%252C%2520we%2520argue%2520that%2520strong%25203D%2520inductive%2520biases%2520are%2520still%2520helpful%2520in%2520the%2520desig {"title": "UniPart: Part-Level 3D Generation with Unified 3D Geom-Seg Latents", "author": "Xufan He and Yushuang Wu and Xiaoyang Guo and Chongjie Ye and Jiaqing Zhou and Tianlei Hu and Xiaoguang Han and Dong Du", "abstract": "Part-level 3D generation is essential for applications requiring decomposable and structured 3D synthesis. However, existing methods either rely on implicit part segmentation with limited granularity control or depend on strong external segmenters trained on large annotated datasets. In this work, we observe that part awareness emerges naturally during whole-object geometry learning and propose Geom-Seg VecSet, a unified geometry-segmentation latent representation that jointly encodes object geometry and part-level structure. Building on this representation, we introduce UniPart, a two-stage latent diffusion framework for image-guided part-level 3D generation. The first stage performs joint geometry generation and latent part segmentation, while the second stage conditions part-level diffusion on both whole-object and part-specific latents. A dual-space generation scheme further enhances geometric fidelity by predicting part latents in both global and canonical spaces. Extensive experiments demonstrate that UniPart achieves superior segmentation controllability and part-level geometric quality compared with existing approaches.", "link": "http://arxiv.org/abs/2512.09435v3", "date": "2026-03-27", "relevancy": 2.326, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5969}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5751}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniPart%3A% th%20existing%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2512.09435v3&entry.124074799=Read"},
{"title": "PerceptionComp: A Video Benchmark for Complex Perception-Centric Reasoning", "author": "Shaoxuan Li and Zhixuan Zhao and Hanze Deng and Zirun Ma and Shulin Tian and Zuyan Liu and Yushi Hu and Haoning Wu and Yuhao Dong and Benlin Liu and Ziwei Liu and Ranjay Krishna", "abstract": "We introduce PerceptionComp, a manually annotated benchmark for complex, long-horizon, perception-centric video reasoning. PerceptionComp is designed so that no single moment is sufficient: answering each question requires multiple temporally separated pieces of visual evidence and compositional constraints under conjunctive and sequential logic, spanning perceptual subtasks such as objects, attributes, relations, locations, actions, and events, and requiring skills including semantic recognition, visual correspondence, temporal reasoning, and spatial reasoning. The benchmark contains 1,114 highly complex questions on 279 videos from diverse domains including city walk tours, indoor villa tours, video games, and extreme outdoor sports, with 100% manual annotation. Human studies show that PerceptionComp requires substantial test-time thinking and repeated perception steps: participants take much longer than on prior benchmarks, and accuracy drops to near chance (18.97%) when rewatching is disallowed. State-of-the-art MLLMs also perform substantially worse on PerceptionComp than on existing benchmarks: the best model in our evaluation, Gemini-3-Flash, reaches only 45.96% accuracy in the five-choice setting, while open-source models remain below 40%. These results suggest that perception-centric long-horizon video reasoning remains a major bottleneck, and we hope PerceptionComp will help drive progress in perceptual reasoning.", "link": "http://arxiv.org/abs/2603.26653v1", "date": "2026-03-27", "relevancy": 2.3242, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5914}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5914}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5292}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PerceptionComp%3A%20A%20Video%20Benchmark%20for%20Complex%20Perception-Centric%20Reasoning&body=Title%3A%20PerceptionComp%3A%20A%20Video%20Benchmark%20for%20Complex%20Perception-Centric%20Reasoning%0AAuthor%3A%20Shaoxuan%20Li%20and%20Zhixuan%20Zhao%20and%20Hanze%20Deng%20and%20Zirun%20Ma%20and%20Shulin%20Tian%20and%20Zuyan%20Liu%20and%20Yushi%20Hu%20and%20Haoning%20Wu%20and%20Yuhao%20Dong%20and%20Benlin%20Liu%20and%20Ziwei%20Liu%20and%20Ranjay%20Krishna%0AAbstract%3A%20We%20introduce%20PerceptionComp%2C%20a%20manually%20annotated%20benchmark%20for%20complex%2C%20long-horizon%2C%20perception-centric%20video%20reasoning.%20PerceptionComp%20is%20designed%20so%20that%20no%20single%20moment%20is%20sufficient%3A%20answering%20each%20question%20requires%20multiple%20temporally%20separated%20pieces%20of%20visual%20evidence%20and%20compositional%20constraints%20under%20conjunctive%20and%20sequential%20logic%2C%20spanning%20perceptual%20subtasks%20such%20as%20objects%2C%20attributes%2C%20relations%2C%20locations%2C%20actions%2C%20and%20events%2C%20and%20requiring%20skills%20including%20semantic%20recognition%2C%20visual%20correspondence%2C%20temporal%20reasoning%2C%20and%20spatial%20reasoning.%20The%20benchmark%20contains%201%2C114%20highly%20complex%20questions%20on%20279%20videos%20from%20diverse%20domains%20including%20city%20walk%20tours%2C%20indoor%20villa%20tours%2C%20video%20games%2C%20and%20extreme%20outdoor%20sports%2C%20with%20100%25%20manual%20annotation.%20Human%20studies%20show%20that%20PerceptionComp%20requires%20substantial%20test-time%20thinking%20and%20repeated%20perception%20steps%3A%20participants%20take%20much%20longer%20than%20on%20prior%20benchmarks%2C%20and%20accuracy%20drops%20to%20near%20chance%20%2818.97%25%29%20when%20rewatching%20is%20disallowed.%20State-of-the-art%20MLLMs%20also%20perform%20substantially%20worse%20on%20PerceptionComp%20than%20on%20existing%20benchmarks%3A%20the%20best%20model%20in%20our%20evaluation%2C%20Gemini-3-Flash%2C%20reaches%20only%2045.96%25%20accuracy%20in%20the%20five-choice%20setting%2C%20while%20open-source%20models%20remain%20below%2040%25.%20These%20results%20suggest%20that%20perception-centric%20long-horizon%20video%20reasoning%20remains%20a%20major%20bottleneck%2C%20and%20we%20hope%20PerceptionComp%20will%20help%20drive%20progress%20in%20perceptual%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26653v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPerceptionComp%253A%2520A%2520Video%2520Benchmark%2520for%2520Complex%2520Perception-Centric%2520Reasoning%26entry.906535625%3DShaoxuan%2520Li%2520and%2520Zhixuan%2520Zhao%2520and%2520Hanze%2520Deng%2520and%2520Zirun%2520Ma%2520and%2520Shulin%2520Tian%2520and%2520Zuyan%2520Liu%2520and%2520Yushi%2520Hu%2520and%2520Haoning%2520Wu%2520and%2520Yuhao%2520Dong%2520and%2520Benlin%2520Liu%2520and%2520Ziwei%2520Liu%2520and%2520Ranjay%2520Krishna%26entry.1292438233%3DWe%2520introduce%2520PerceptionComp%252C%2520a%2520manually%2520annotated%2520benchmark%2520for%2520complex%252C%2520long-horizon%252C%2520perception-centric%2520video%2520reasoning.%2520PerceptionComp%2520is%2520designed%2520so%2520that%2520no%2520single%2520moment%2520is%2520sufficient%253A%2520answering%2520each%2520question%2520requires%2520multiple%2520temporally%2520separated%2520pieces%2520of%2520visual%2520evidence%2520and%2520compositional%2520constraints%2520under%2520conjunctive%2520and%2520sequential%2520logic%252C%2520spanning%2520perceptual%2520subtasks%2520 {"title": "From Pixels to Privacy: Temporally Consistent Video Anonymization via Token Pruning for Privacy Preserving Action Recognition", "author": "Nazia Aslam and Abhisek Ray and Joakim Bruslund Haurum and Lukas Esterle and Kamal Nasrollahi", "abstract": "Recent advances in large-scale video models have significantly improved video understanding across domains such as surveillance, healthcare, and entertainment. However, these models also amplify privacy risks by encoding sensitive attributes, including facial identity, race, and gender. While image anonymization has been extensively studied, video anonymization remains relatively underexplored, even though modern video models can leverage spatiotemporal motion patterns as biometric identifiers. To address this challenge, we propose a novel attention-driven spatiotemporal video anonymization framework based on systematic disentanglement of utility and privacy features. Our key insight is that attention mechanisms in Vision Transformers (ViTs) can be explicitly structured to separate action-relevant information from privacy-sensitive content. Building on this insight, we introduce two task-specific classification tokens, an action CLS token and a privacy CLS token, that learn complementary representations within a shared Transformer backbone. We contrast their attention distributions to compute a utility-privacy score for each spatiotemporal tubelet, and keep the top-k tubelets with the highest scores. This selectively prunes tubelets dominated by privacy cues while preserving those most critical for action recognition. Extensive experiments demonstrate that our approach maintains action recognition performance comparable to models trained on raw videos, while substantially reducing privacy leakage. These results indicate that attention-driven spatiotemporal pruning offers an effective and principled solution for privacy-preserving video analytics.", "link": "http://arxiv.org/abs/2603.26336v1", "date": "2026-03-27", "relevancy": 2.3205, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5985}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5862}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5667}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Pixels%20to%20Privacy%3A%20Temporally%20Consistent%20Video%20Anonymization%20via%20Token%20Pruning%20for%20Privacy%20Preserving%20Action%20Recognition&body=Title%3A%20From%20Pixels%20to%20Privacy%3A%20Temporally%20Consistent%20Video%20Anonymization%20via%20Token%20Pruning%20for%20Privacy%20Preserving%20Action%20Recognition%0AAuthor%3A%20Nazia%20Aslam%20and%20Abhisek%20Ray%20and%20Joakim%20Bruslund%20Haurum%20and%20Lukas%20Esterle%20and%20Kamal%20Nasrollahi%0AAbstract%3A%20Recent%20advances%20in%20large-scale%20video%20models%20have%20significantly%20improved%20video%20understanding%20across%20domains%20such%20as%20surveillance%2C%20healthcare%2C%20and%20entertainment.%20However%2C%20these%20models%20also%20amplify%20privacy%20risks%20by%20encoding%20sensitive%20attributes%2C%20including%20facial%20identity%2C%20race%2C%20and%20gender.%20While%20image%20anonymization%20has%20been%20extensively%20studied%2C%20video%20anonymization%20remains%20relatively%20underexplored%2C%20even%20though%20modern%20video%20models%20can%20leverage%20spatiotemporal%20motion%20patterns%20as%20biometric%20identifiers.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20attention-driven%20spatiotemporal%20video%20anonymization%20framework%20based%20on%20systematic%20disentanglement%20of%20utility%20and%20privacy%20features.%20Our%20key%20insight%20is%20that%20attention%20mechanisms%20in%20Vision%20Transformers%20%28ViTs%29%20can%20be%20explicitly%20structured%20to%20separate%20action-relevant%20information%20from%20privacy-sensitive%20content.%20Building%20on%20this%20insight%2C%20we%20introduce%20two%20task-specific%20classification%20tokens%2C%20an%20action%20CLS%20token%20and%20a%20privacy%20CLS%20token%2C%20that%20learn%20complementary%20representations%20within%20a%20shared%20Transformer%20backbone.%20We%20contrast%20their%20attention%20distributions%20to%20compute%20a%20utility-privacy%20score%20for%20each%20spatiotemporal%20tubelet%2C%20and%20keep%20the%20top-k%20tubelets%20with%20the%20highest%20scores.%20This%20selectively%20prunes%20tubelets%20dominated%20by%20privacy%20cues%20while%20preserving%20those%20most%20critical%20for%20action%20recognition.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20maintains%20action%20recognition%20performance%20comparable%20to%20models%20trained%20on%20raw%20videos%2C%20while%20substantially%20reducing%20privacy%20leakage.%20These%20results%20indicate%20that%20attention-driven%20spatiotemporal%20pruning%20offers%20an%20effective%20and%20principled%20solution%20for%20privacy-preserving%20video%20analytics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26336v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Pixels%2520to%2520Privacy%253A%2520Temporally%2520Consistent%2520Video%2520Anonymization%2520via%2520Token%2520Pruning%2520for%2520Privacy%2520Preserving%2520Action%2520Recognition%26entry.906535625%3DNazia%2520Aslam%2520and%2520Abhisek%2520Ray%2520and%2520Joakim%2520Bruslund%2520Haurum%2520and%2520Lukas%2520Esterle%2520and%2520Kamal%2520Nasrollahi%26entry.1292438233%3DRecent%2520advances%2520in%2520large-scale%2520video%2520models%2520have%2520significantly%2520improved%2520video%2520understanding%2520across%2520domains%2520such%2520as%2520surveillance%252C%2520healthcare%252C%2520and%2520entertainment.%2520 odels%2520trained%2520on%2520raw%2520videos%252C%2520while%2520substantially%2520reducing%2520privacy%2520leakage.%2520These%2520results%2520indicate%2520that%2520attention-driven%2520spatiotemporal%2520pruning%2520offers%2520an%2520effective%2520and%2520principled%2520solution%2520for%2520privacy-preserving%2520video%2520analytics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26336v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Pixels%20to%20Privacy%3A%20Temporally%20Consistent%20Video%20Anonymization%20via%20Token%20Pruning%20for%20Privacy%20Preserving%20Action%20Recognition&entry.906535625=Nazia%20Aslam%20and%20Abhisek%20Ray%20and%20Joakim%20Bruslund%20Haurum%20and%20Lukas%20Esterle%20and%20Kamal%20Nasrollahi&entry.1292438233=Recent%20advances%20in%20large-scale%20video%20models%20have%20significantly%20improved%20video%20understanding%20across%20domains%20such%20as%20surveillance%2C%20healthcare%2C%20and%20entertainment.%20However%2C%20these%20models%20also%20amplify%20privacy%20risks%20by%20encoding%20sensitive%20attributes%2C%20including%20facial%20identity%2C%20race%2C%20and%20gender.%20While%20image%20anonymization%20has%20been%20extensively%20studied%2C%20video%20anonymization%20remains%20relatively%20underexplored%2C%20even%20though%20modern%20video%20models%20can%20leverage%20spatiotemporal%20motion%20patterns%20as%20biometric%20identifiers.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20attention-driven%20spatiotemporal%20video%20anonymization%20framework%20based%20on%20systematic%20disentanglement%20of%20utility%20and%20privacy%20features.%20Our%20key%20insight%20is%20that%20attention%20mechanisms%20in%20Vision%20Transformers%20%28ViTs%29%20can%20be%20explicitly%20structured%20to%20separate%20action-relevant%20information%20from%20privacy-sensitive%20content.%20Building%20on%20this%20insight%2C%20we%20introduce%20tw {"title": "INSIGHT: Enhancing Autonomous Driving Safety through Vision-Language Models on Context-Aware Hazard Detection and Edge Case Evaluation", "author": "Dianwei Chen and Zifan Zhang and Lei Cheng and Yuchen Liu and Xianfeng Terry Yang", "abstract": "Autonomous driving systems face significant challenges in handling unpredictable edge-case scenarios, such as adversarial pedestrian movements, dangerous vehicle maneuvers, and sudden environmental changes. Current end-to-end driving models struggle with generalization to these rare events due to limitations in traditional detection and prediction approaches. To address this, we propose INSIGHT (Integration of Semantic and Visual Inputs for Generalized Hazard Tracking), a hierarchical vision-language model (VLM) framework designed to enhance hazard detection and edge-case evaluation. By using multimodal data fusion, our approach integrates semantic and visual representations, enabling precise interpretation of driving scenarios and accurate forecasting of potential dangers. Through supervised fine-tuning of VLMs, we optimize spatial hazard localization using attention-based mechanisms and coordinate regression techniques. Experimental results on the BDD100K dataset demonstrate a substantial improvement in hazard prediction straightforwardness and accuracy over existing models, achieving a notable increase in generalization performance. This advancement enhances the robustness and safety of autonomous driving systems, ensuring improved situational awareness and potential decision-making in complex real-world scenarios.", "link": "http://arxiv.org/abs/2502.00262v4", "date": "2026-03-27", "relevancy": 2.3146, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5959}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer. {"title": "Why Models Know But Don't Say: Chain-of-Thought Faithfulness Divergence Between Thinking Tokens and Answers in Open-Weight Reasoning Models", "author": "Richard J. Young", "abstract": "Extended-thinking models expose a second text-generation channel (\"thinking tokens\") alongside the user-visible answer. This study examines 12 open-weight reasoning models on MMLU and GPQA questions paired with misleading hints. Among the 10,506 cases where models actually followed the hint (choosing the hint's target over the ground truth), each case is classified by whether the model acknowledges the hint in its thinking tokens, its answer text, both, or neither. In 55.4% of these cases the model's thinking tokens contain hint-related keywords that the visible answer omits entirely, a pattern termed *thinking-answer divergence*. The reverse (answer-only acknowledgment) is near-zero (0.5%), confirming that the asymmetry is directional. Hint type shapes the pattern sharply: sycophancy is the most *transparent* hint, with 58.8% of sycophancy-influenced cases acknowledging the professor's authority in both channels, while consistency (72.2%) and unethical (62.7%) hints are dominated by thinking-only acknowledgment. Models also vary widely, from near-total divergence (Step-3.5-Flash: 94.7%) to relative transparency (Qwen3.5-27B: 19.6%). These results show that answer-text-only monitoring misses more than half of all hint-influenced reasoning and that thinking-token access, while necessary, still leaves 11.8% of cases with no verbalized acknowledgment in either channel.", "link": "http://arxiv.org/abs/2603.26410v1", "date": "2026-03-27", "relevancy": 2.3097, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4728}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4565}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20Models%20Know%20But%20Don%27t%20Say%3A%20Chain-of-Thought%20Faithfulness%20Divergence%20Between%20Thinking%20Tokens%20and%20Answers%20in%20Open-Weight%20Reasoning%20Models&body=Title%3A%20Why%20Models%20Know%20But%20Don%27t%20Say%3A%20Chain-of-Thought%20Faithfulness%20Divergence%20Between%20Thinking%20Tokens%20and%20Answers%20in%20Open-Weight%20Reasoning%20Models%0AAuthor%3A%20Richard%20J.%20Young%0AAbstract%3A%20Extended-thinking%20models%20expose%20a%20second%20text-generation%20channel%20%28%22thinking%20tokens%22%29%20alongside%20the%20user-visible%20answer.%20This%20study%20examines%2012%20open-weight%20reasoning%20models%20on%20MMLU%20and%20GPQA%20questions%20paired%20with%20misleading%20hints.%20Among%20the%2010%2C506%20cases%20where%20models%20actually%20followed%20the%20hint%20%28choosing%20the%20hint%27s%20target%20over%20the%20ground%20truth%29%2C%20each%20case%20is%20classified%20by%20whether%20the%20model%20acknowledges%20the%20hint%20in%20its%20thinking%20tokens%2C%20its%20answer%20text%2C%20both%2C%20or%20neither.%20In%2055.4%25%20of%20these%20cases%20the%20model%27s%20thinking%20tokens%20contain%20hint-related%20keywords%20that%20the%20visible%20answer%20omits%20entirely%2C%20a%20pattern%20termed%20%2Athinking-answer%20divergence%2A.%20The%20reverse%20%28answer-only%20acknowledgment%29%20is%20near-zero%20%280.5%25%29%2C%20confirming%20that%20the%20asymmetry%20is%20directional.%20Hint%20type%20shapes%20the%20pattern%20sharply%3A%20sycophancy%20is%20the%20most%20%2Atransparent%2A%20hint%2C%20with%2058.8%25%20of%20sycophancy-influenced%20cases%20acknowledging%20the%20professor%27s%20authority%2 {"title": "ARTA: Adaptive Mixed-Resolution Token Allocation for Efficient Dense Feature Extraction", "author": "David Hagerman and Roman Naeem and Erik Brorsson and Fredrik Kahl and Lennart Svensson", "abstract": "We present ARTA, a mixed-resolution coarse-to-fine vision transformer for efficient dense feature extraction. Unlike models that begin with dense high-resolution (fine) tokens, ARTA starts with low-resolution (coarse) tokens and uses a lightweight allocator to predict which regions require more fine tokens. The allocator iteratively predicts a semantic (class) boundary score and allocates additional tokens to patches above a low threshold, concentrating token density near boundaries while maintaining high sensitivity to weak boundary evidence. This targeted allocation encourages tokens to represent a single semantic class rather than a mixture of classes. Mixed-resolution attention enables interaction between coarse and fine tokens, focusing computation on semantically complex areas while avoiding redundant processing in homogeneous regions. Experiments demonstrate that ARTA achieves state-of-the-art results on ADE20K and COCO-Stuff with substantially fewer FLOPs, and delivers competitive performance on Cityscapes at markedly lower compute. For example, ARTA-Base attains 54.6 mIoU on ADE20K in the ~100M-parameter class while using fewer FLOPs and less memory than comparable backbones.", "link": "http://arxiv.org/abs/2603.26258v1", "date": "2026-03-27", "relevancy": 2.3053, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6415}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5314}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5291}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ARTA%3A%20Adaptive%20Mixed-Resolution%20Token%20Allocation%20for%20Efficient%20Dense%20Feature%20Extraction&body=Title%3A%20ARTA%3A%20Adaptive%20Mixed-Resolution%20Token%20Allocation%20for%20Efficient%20Dense%20Feature%20Extraction%0AAuthor%3A%20David%20Hagerman%20and%20Roman%20Naeem%20and%20Erik%20Brorsson%20and%20Fredrik%20Kahl%20and%20Lennart%20Svensson%0AAbstract%3A%20We%20present%20ARTA%2C%20a%20mixed-resolution%20coarse-to-fine%20vision%20transformer%20for%20efficient%20dense%20feature%20extraction.%20Unlike%20models%20that%20begin%20with%20dense%20high-resolution%20%28fine%29%20tokens%2C%20ARTA%20starts%20with%20low-resolution%20%28coarse%29%20tokens%20and%20uses%20a%20lightweight%20allocator%20to%20predict%20which%20regions%20require%20more%20fine%20tokens.%20The%20allocator%20iteratively%20predicts%20a%20semantic%20%28class%29%20boundary%20score%20and%20allocates%20additional%20tokens%20to%20patches%20above%20a%20low%20threshold%2C%20concentrating%20token%20density%20near%20boundaries%20while%20maintaining%20high%20sensitivity%20to%20weak%20boundary%20evidence.%20This%20targeted%20allocation%20encourages%20tokens%20to%20represent%20a%20single%20semantic%20class%20rather%20than%20a%20mixture%20of%20classes.%20Mixed-resolution%20attention%20enables%20interaction%20between%20coarse%20and%20fine%20tokens%2C%20focusing%20computation%20on%20semantically%20complex%20areas%20while%20avoiding%20redundant%20processing%20in%20homogeneous%20regions.%20Experiments%20demonstrate%20that%20ARTA%20achieves%20state-of-the-art%20results%20on%20ADE20K%20and%20COCO-Stuff%20with%20substantially%20fewer%20FLOPs%2C%20and%20delivers%20competitive%20performance%20on%20Cityscapes%20at%20markedly%20lower%20compute.%20For%20example%2C%20ARTA-Base%20attains%2054.6%20mIoU%20on%20ADE20K%20in%20the%20~100M-parameter%20class%20while%20using%20fewer%20FLOPs%20and%20less%20memory%20than%20comparable%20backbones.%0ALink%3A%20http%3A//arxiv.org/abs/2 rs%2520competitive%2520performance%2520on%2520Cityscapes%2520at%2520markedly%2520lower%2520compute.%2520For%2520example%252C%2520ARTA-Base%2520attains%252054.6%2520mIoU%2520on%2520ADE20K%2520in%2520the%2520~100M-parameter%2520class%2520while%2520using%2520fewer%2520FLOPs%2520and%2520less%2520memory%2520than%2520comparable%2520backbones.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26258v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ARTA%3A%20Adaptive%20Mixed-Resolution%20Token%20Allocation%20for%20Efficient%20Dense%20Feature%20Extraction&entry.906535625=David%20Hagerman%20and%20Roman%20Naeem%20and%20Erik%20Brorsson%20and%20Fredrik%20Kahl%20and%20Lennart%20Svensson&entry.1292438233=We%20present%20ARTA%2C%20a%20mixed-resolution%20coarse-to-fine%20vision%20transformer%20for%20efficient%20dense%20feature%20extraction.%20Unlike%20models%20that%20begin%20with%20dense%20high-resolution%20%28fine%29%20tokens%2C%20ARTA%20starts%20with%20low-resolution%20%28coarse%29%20tokens%20and%20uses%20a%20lightweight%20allocator%20to%20predict%20which%20regions%20require%20more%20fine%20tokens.%20The%20allocator%20iteratively%20predicts%20a%20semantic%20%28class%29%20boundary%20score%20and%20allocates%20additional%20tokens%20to%20patches%20above%20a%20low%20threshold%2C%20concentrating%20token%20density%20near%20boundaries%20while%20maintaining%20high%20sensitivity%20to%20weak%20boundary%20evidence.%20This%20targeted%20allocation%20encourages%20tokens%20to%20represent%20a%20single%20semantic%20class%20rather%20than%20a%20mixture%20of%20classes.%20Mixed-resolution%20attention%20enables%20interaction%20between%20coarse%20and%20fine%20tokens%2C%20focusing%20computation%20on%20semantically%20complex%20areas%20while%20avoiding%20redundant%20processing%20in%20homogeneous%20regions.%20Experiments%20demonstrate%20that%20ARTA%20achieves%20state-of-the-art%20results%20on%20ADE20K%20a {"title": "Adapting Frozen Mono-modal Backbones for Multi-modal Registration via Contrast-Agnostic Instance Optimization", "author": "Yi Zhang and Yidong Zhao and Qian Tao", "abstract": "Deformable image registration remains a central challenge in medical image analysis, particularly under multi-modal scenarios where intensity distributions vary significantly across scans. While deep learning methods provide efficient feed-forward predictions, they often fail to generalize robustly under distribution shifts at test time. A straightforward remedy is full network fine-tuning, yet for modern architectures such as Transformers or deep U-Nets, this adaptation is prohibitively expensive in both memory and runtime when operating in 3D. Meanwhile, the naive fine-tuning struggles more with potential degradation in performance in the existence of drastic domain shifts. In this work, we propose a registration framework that integrates a frozen pretrained \\textbf{mono-modal} registration model with a lightweight adaptation pipeline for \\textbf{multi-modal} image registration. Specifically, we employ style transfer based on contrast-agnostic representation generation and refinement modules to bridge modality and domain gaps with instance optimization at test time. This design is orthogonal to the choice of backbone mono-modal model, thus avoids the computational burden of full fine-tuning while retaining the flexibility to adapt to unseen domains. We evaluate our approach on the Learn2Reg 2025 LUMIR validation set and observe consistent improvements over the pretrained state-of-the-art mono-modal backbone. In particular, the method ranks second on the multi-modal subset, third on the out-of-domain subset, and achieves fourth place overall in Dice score. These results demonstrate that combining frozen mono-modal models with modality adaptation and lightweight instance optimization offers an effective and practical pathway toward robust multi-modal registration.", "link": "http://arxiv.org/abs/2603.26393v1", "date": "2026-03-27", "relevancy": 2.2923, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6088}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5559}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5267}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adapting%20Frozen%20Mono-modal%20Backbones%20for%20Multi-modal%20Registration%20via%20Contrast-Agnostic%20Instance%20Optimization&body=Title%3A%20Adapting%20Frozen%20Mono-modal%20Backbones%20for%20Multi-modal%20Registration%20via%20Contrast-Agnostic%20Instance%20Optimization%0AAuthor%3A%20Yi%20Zhang%20and%20Yidong%20Zhao%20and%20Qian%20Tao%0AAbstract%3A%20Deformable%20image%20registration%20remains%20a%20central%20challenge%20in%20medical%20image%20analysis%2C%20particularly%20under%20multi-modal%20scenarios%20where%20intensity%20distributions%20vary%20significantly%20across%20scans.%20While%20deep%20learning%20methods%20provide%20efficient%20feed-forward%20predictions%2C%20they%20often%20fail%20to%20generalize%20robustly%20under%20distribution%20shifts%20at%20test%20time.%20A%20straightforward%20remedy%20is%20full%20network%20fine-tuning%2C%20yet%20for%20modern%20architectures%20such%20as%20Transformers%20or%20deep%20U-Nets%2C%20this%20adaptation%20is%20prohibitively%20expensive%20in%20both%20memory%20and%20runtime%20when%20operating%20in%203D.%20Meanwhile%2C%20the%20naive%20fine-tuning%20struggles%20more%20with%20potential%20degradation%20in%20performance%20in%20the%20existence%20of%20drastic%20domain%20shifts.%20In%20this%20work%2C%20we%20propose%20a%20registration%20framework%20that%20integrates%20a%20frozen%20pretrained%20%5Ctextbf%7Bmono-modal%7D%20registration%20model%20with%20a%20lightweight%20adaptation%20pipeline%20for%20%5Ctextbf%7Bmulti-modal%7D%20image%20registration.%20Specifically%2C%20we%20employ%20style%20transfer%20based%20on%20contrast-agnostic%20representation%20generation%20and%20refinement%20modules%20to%20bridge%20modality%20and%20domain%20gaps%20with%20instance%20optimization%20at%20test%20time.%20This%20design%20is%20orthogonal%20to%20the%20choice%20of%20backbone%20mono-modal%20model%2C%20thus%20avoids%20the%20computational%20burden%20of%20full%20fine-tuning%20while%20retaining%20the%20flexibility%20to%20adapt%20to%20unseen%20domains.%20We%20evaluate%20our%20approach%20on%20the%20Learn2Reg%202025%20LUMIR%20validation%20set%20and%20observe%20consistent%20improvements%20over%20the%20pretrained%20state-of-the-art%20mono-modal%20backbone.%20In%20particular%2C%20the%20method%20ranks%20second%20on%20the%20multi-modal%20subset%2C%20third%20on%20the%20out-of-domain%20subset%2C%20and%20achieves%20fourth%20place%20overall%20in%20Dice%20score.%20These%20results%20demonstrate%20that%20combining%20frozen%20mono-modal%20models%20with%20modality%20adaptation%20and%20lightweight%20instance%20optimization%20offers%20an%20effective%20and%20practical%20pathway%20toward%20robust%20multi-modal%20registration.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26393v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdapting%2520Frozen%2520Mono-modal%2520Backbones%2520for%2520Multi-modal%2520Registration%2520via%2520Contrast-Agnostic%2520Instance%2520Optimization%26entry.906535625%3DYi%2520Zhang%2520and%2520Yidong%2520Zhao%2520and%2520Qian%2520Tao%26entry.1292438233%3DDeformable%2520image%2520registration%2520remains%2520a%2520central%2520challenge%2520in%2520medical%2520image%2520analysis%252C%2520particularly%2520under%2520multi-modal%2520scenarios%2520where%2520intensity%2520distributions%2520vary%2520significantly%2520acr cular%252C%2520the%2520method%2520ranks%2520second%2520on%2520the%2520multi-modal%2520subset%252C%2520third%2520on%2520the%2520out-of-domain%2520subset%252C%2520and%2520achieves%2520fourth%2520place%2520overall%2520in%2520Dice%2520score.%2520These%2520results%2520demonstrate%2520that%2520combining%2520frozen%2520mono-modal%2520models%2520with%2520modality%2520adaptation%2520and%2520lightweight%2520instance%2520optimization%2520offers%2520an%2520effective%2520and%2520practical%2520pathway%2520toward%2520robust%2520multi-modal%2520registration.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26393v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Adapting%20Frozen%20Mono-modal%20Backbones%20for%20Multi-modal%20Registration%20via%20Contrast-Agnostic%20Instance%20Optimization&entry.906535625=Yi%20Zhang%20and%20Yidong%20Zhao%20and%20Qian%20Tao&entry.1292438233=Deformable%20image%20registration%20remains%20a%20central%20challenge%20in%20medical%20image%20analysis%2C%20particularly%20under%20multi-modal%20scenarios%20where%20intensity%20distributions%20vary%20significantly%20across%20scans.%20While%20deep%20learning%20methods%20provide%20efficient%20feed-forward%20predictions%2C%20they%20often%20fail%20to%20generalize%20robustly%20under%20distribution%20shifts%20at%20test%20time.%20A%20straightforward%20remedy%20is%20full%20network%20fine-tuning%2C%20yet%20for%20modern%20architectures%20such%20as%20Transformers%20or%20deep%20U-Nets%2C%20this%20adaptation%20is%20prohibitively%20expensive%20in%20both%20memory%20and%20runtime%20when%20operating%20in%203D.%20Meanwhile%2C%20the%20naive%20fine-tuning%20struggles%20more%20with%20potential%20degradation%20in%20performance%20in%20the%20existence%20of%20drastic%20domain%20shifts.%20In%20this%20work%2C%20we%20propose%20a%20registration%20framework%20that%20integrates%20a%20frozen%20pretrained%20%5Ctextbf%7Bmono-modal%7D%20regis

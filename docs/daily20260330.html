{"title": "Skullptor: High Fidelity 3D Head Reconstruction in Seconds with Multi-View Normal Prediction", "author": "No\u00e9 Artru and Rukhshanda Hussain and Emeline Got and Alexandre Messier and David B. Lindell and Abdallah Dib", "abstract": "Reconstructing high-fidelity 3D head geometry from images is critical for a wide range of applications, yet existing methods face fundamental limitations. Traditional photogrammetry achieves exceptional detail but requires extensive camera arrays (25-200+ views), substantial computation, and manual cleanup in challenging areas like facial hair. Recent alternatives present a fundamental trade-off: foundation models enable efficient single-image reconstruction but lack fine geometric detail, while optimization-based methods achieve higher fidelity but require dense views and expensive computation. We bridge this gap with a hybrid approach that combines the strengths of both paradigms. Our method introduces a multi-view surface normal prediction model that extends monocular foundation models with cross-view attention to produce geometrically consistent normals in a feed-forward pass. We then leverage these predictions as strong geometric priors within an inverse rendering optimization framework to recover high-frequency surface details. Our approach outperforms state-of-the-art single-image and multi-view methods, achieving high-fidelity reconstruction on par with dense-view photogrammetry while reducing camera requirements and computational cost.", "link": "http://arxiv.org/abs/2602.21100v3", "date": "2026-03-27", "relevancy": 3.2693, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6601}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6601}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "lin ing%20high-fidelity%20reconstruction%20on%20par%20with%20dense-view%20photogrammetry%20while%20reducing%20camera%20requirements%20and%20computational%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21100v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSkullptor%253A%2520High%2520Fidelity%25203D%2520Head%2520Reconstruction%2520in%2520Seconds%2520with%2520Multi-View%2520Normal%2520Prediction%26entry.906535625%3DNo%25C3%25A9%2520Artru%2520and%2520Rukhshanda%2520Hussain%2520and%2520Emeline%2520Got%2520and%2520Alexandre%2520Messier%2520and%2520David%2520B.%2520Lindell%2520and%2520Abdallah%2520Dib%26entry.1292438233%3DReconstructing%2520high-fidelity%25203D%2520head%2520geometry%2520from%2520images%2520is%2520critical%2520for%2520a%2520wide%2520range%2520of%2520applications%252C%2520yet%2520existing%2520methods%2520face%2520fundamental%2520limitations.%2520Traditional%2520photogrammetry%2520achieves%2520exceptional%2520detail%2520but%2520requires%2520extensive%2520camera%2520arrays%2520%252825-200%252B%2520views%2529%252C%2520substantial%2520computation%252C%2520and%2520manual%2520cleanup%2520in%2520challenging%2520areas%2520like%2520facial%2520hair.%2520Recent%2520alternatives%2520present%2520a%2520fundamental%2520trade-off%253A%2520foundation%2520models%2520enable%2520efficient%2520single-image%2520reconstruction%2520but%2520lack%2520fine%2520geometric%2520detail%252C%2520while%2520optimization-based%2520methods%2520achieve%2520higher%2520fidelity%2520but%2520require%2520dense%2520views%2520and%2520expensive%2520computation.%2520We%2520bridge%2520this%2520gap%2520with%2520a%2520hybrid%2520approach%2520that%2520combines%2520the%2520strengths%2520of%2520both%2520paradigms.%2520Our%2520method%2520introduces%2520a%2520multi-view%2520surface%2520normal%2520prediction%2520model%2520that%2520extends%2520monocular%2520foundation%2520models%2520with%2520cross-view%2520attention%2520to%2520pr {"title": "PhysVid: Physics Aware Local Conditioning for Generative Video Models", "author": " Saurabh and  Pathak and Elahe Arani and Mykola Pechenizkiy and Bahram Zonooz", "abstract": "Generative video models achieve high visual fidelity but often violate basic physical principles, limiting reliability in real-world settings. Prior attempts to inject physics rely on conditioning: frame-level signals are domain-specific and short-horizon, while global text prompts are coarse and noisy, missing fine-grained dynamics. We present PhysVid, a physics-aware local conditioning scheme that operates over temporally contiguous chunks of frames. Each chunk is annotated with physics-grounded descriptions of states, interactions, and constraints, which are fused with the global prompt via chunk-aware cross-attention during training. At inference, we introduce negative physics prompts (descriptions of locally relevant law violations) to steer generation away from implausible trajectories. On VideoPhy, PhysVid improves physical commonsense scores by $\\approx 33\\%$ over baseline video generators, and by up to $\\approx 8\\%$ on VideoPhy2. These results show that local, physics-aware guidance substantially increases physical plausibility in generative video and marks a step toward physics-grounded video models.", "link": "http://arxiv.org/abs/2603.26285v1", "date": "2026-03-27", "relevancy": 3.2374, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7444}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6401}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhysVid%3A%20Physics%20Aware%20Local%20Conditioning%20for%20Generative%20Video%20Models&body=Title%3A%20PhysVid%3A%20Physics%20Aware%20Local%20Conditioning%20for%20Generative%20Video%20Models%0AAuthor%3A%20%20Saurabh%20and%20%20Pathak%20and%20Elahe%20Arani%20and%20Mykola%20Pechenizkiy%20and%20Bahram%20Zonooz%0AAbstract%3A%20Generative%20video%20models%20achieve%20high%20visual%20fidelity%20but%20often%20violate%20basic%20physical%20principles%2C%20limiting%20reliability%20in%20real-world%20settings.%20Prior%20attempts%20to%20inject%20physics%20rely%20on%20conditioning%3A%20frame-level%20signals%20are%20domain-specific%20and%20short-horizon%2C%20while%20global%20text%20prompts%20are%20coarse%20and%20noisy%2C%20missing%20fine-grained%20dynamics.%20We%20present%20PhysVid%2C%20a%20physics-aware%20local%20conditioning%20scheme%20that%20operates%20over%20temporally%20contiguous%20chunks%20of%20frames.%20Each%20chunk%20is%20annotated%20with%20physics-grounded%20descriptions%20of%20states%2C%20interactions%2C%20and%20constraints%2C%20which%20are%20fused%20with%20the%20global%20prompt%20via%20chunk-aware%20cross-attention%20during%20training.%20At%20inference%2C%20we%20introduce%20negative%20physics%20prompts%20%28descriptions%20of%20locally%20relevant%20law%20violations%29%20to%20steer%20generation%20away%20from%20implausible%20trajectories.%20On%20VideoPhy%2C%20PhysVid%20improves%20physical%20commonsense%20scores%20by%20%24%5Capprox%2033%5C%25%24%20over%20baseline%20video%20generators%2C%20and%20by%20up%20to%20%24%5Capprox%208%5C%25%24%20on%20VideoPhy2.%20These%20results%20show%20that%20local%2C%20physics-aware%20guidance%20substantially%20increases%20physical%20plausibility%20in%20generative%20video%20and%20marks%20a%20step%20toward%20physics-grounded%20video%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26285v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysVid%253A%2520Physics%2520Aware%2520Local%2520Conditioning%2520for%2520Generative%2520Video {"title": "EOGS++: Earth Observation Gaussian Splatting with Internal Camera Refinement and Direct Panchromatic Rendering", "author": "Pierrick Bournez and Luca Savant Aira and Thibaud Ehret and Gabriele Facciolo", "abstract": "Recently, 3D Gaussian Splatting has been introduced as a compelling alternative to NeRF for Earth observation, offering competitive reconstruction quality with significantly reduced training times. In this work, we extend the Earth Observation Gaussian Splatting (EOGS) framework to propose EOGS++, a novel method tailored for satellite imagery that directly operates on raw high-resolution panchromatic data without requiring external preprocessing. Furthermore, leveraging optical flow techniques we embed bundle adjustment directly within the training process, avoiding reliance on external optimization tools while improving camera pose estimation. We also introduce several improvements to the original implementation, including early stopping and TSDF post-processing, all contributing to sharper reconstructions and better geometric accuracy. Experiments on the IARPA 2016 and DFC2019 datasets demonstrate that EOGS++ achieves state-of-the-art performance in terms of reconstruction quality and efficiency, outperforming the original EOGS method and other NeRF-based methods while maintaining the computational advantages of Gaussian Splatting. Our model demonstrates an improvement from 1.33 to 1.19 mean MAE errors on buildings compared to the original EOGS models", "link": "http://arxiv.org/abs/2511.16542v2", "date": "2026-03-27", "relevancy": 3.2029, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6999}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6171}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EOGS%2B%2B%3A%20Earth%20Observation%20Gaussian%20Splatting%20with%20Internal%20Camera%20Refinement%20and%20Direct%20Panchromatic%20Rendering&body=Title%3A%20EOGS%2B%2B%3A%20Earth%20Observation%20Gaussian%20Splatting%20with%20Internal%20Camera%20Refinement%20and%20Direct%20Panchromatic%20Rendering%0AAuthor%3A%20Pierrick%20Bournez%20and%20Luca%20Savant%20Aira%20and%20Thibaud%20Ehret%20and%20Gabriele%20Facciolo%0AAbstract%3A%20Recently%2C%203D%20Gaussian%20Splatting%20has%20been%20introduced%20as%20a%20compelling%20alternative%20to%20NeRF%20for%20Earth%20observation%2C%20offering%20competitive%20reconstruction%20quality%20with%20significantly%20reduced%20training%20times.%20In%20this%20work%2C%20we%20extend%20the%20Earth%20Observation%20Gaussian%20Splatting%20%28EOGS%29%20framework%20to%20propose%20EOGS%2B%2B%2C%20a%20novel%20method%20tailored%20for%20satellite%20imagery%20that%20directly%20operates%20on%20raw%20high-resolution%20panchromatic%20data%20without%20requiring%20external%20preprocessing.%20Furthermore%2C%20leveraging%20optical%20flow%20techniques%20we%20embed%20bundle%20adjustment%20directly%20within%20the%20training%20process%2C%20avoiding%20reliance%20on%20external%20optimization%20tools%20while%20improving%20camera%20pose%20estimation.%20We%20also%20introduce%20several%20improvements%20to%20the%20original%20implementation%2C%20including%20early%20stopping%20and%20TSDF%20post-processing%2C%20all%20contributing%20to%20sharper%20reconstructions%20and%20better%20geometric%20accuracy.%20Experiments%20on%20the%20IARPA%202016%20and%20DFC2019%20datasets%20demonstrate%20that%20EOGS%2B%2B%20achieves%20state-of-the-art%20performance%20in%20terms%20of%20reconstruction%20quality%20and%20efficiency%2C%20outperforming%20the%20original%20EOGS%20method%20and%20other%20NeRF-based%20methods%20while%20maintaining%20the%20computational%20advantages%20of% %2520geometric%2520accuracy.%2520Experiments%2520on%2520the%2520IARPA%25202016%2520and%2520DFC2019%2520datasets%2520demonstrate%2520that%2520EOGS%252B%252B%2520achieves%2520state-of-the-art%2520performance%2520in%2520terms%2520of%2520reconstruction%2520quality%2520and%2520efficiency%252C%2520outperforming%2520the%2520original%2520EOGS%2520method%2520and%2520other%2520NeRF-based%2520methods%2520while%2520maintaining%2520the%2520computational%2520advantages%2520of%2520Gaussian%2520Splatting.%2520Our%2520model%2520demonstrates%2520an%2520improvement%2520from%25201.33%2520to%25201.19%2520mean%2520MAE%2520errors%2520on%2520buildings%2520compared%2520to%2520the%2520original%2520EOGS%2520models%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.16542v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EOGS%2B%2B%3A%20Earth%20Observation%20Gaussian%20Splatting%20with%20Internal%20Camera%20Refinement%20and%20Direct%20Panchromatic%20Rendering&entry.906535625=Pierrick%20Bournez%20and%20Luca%20Savant%20Aira%20and%20Thibaud%20Ehret%20and%20Gabriele%20Facciolo&entry.1292438233=Recently%2C%203D%20Gaussian%20Splatting%20has%20been%20introduced%20as%20a%20compelling%20alternative%20to%20NeRF%20for%20Earth%20observation%2C%20offering%20competitive%20reconstruction%20quality%20with%20significantly%20reduced%20training%20times.%20In%20this%20work%2C%20we%20extend%20the%20Earth%20Observation%20Gaussian%20Splatting%20%28EOGS%29%20framework%20to%20propose%20EOGS%2B%2B%2C%20a%20novel%20method%20tailored%20for%20satellite%20imagery%20that%20directly%20operates%20on%20raw%20high-resolution%20panchromatic%20data%20without%20requiring%20external%20preprocessing.%20Furthermore%2C%20leveraging%20optical%20flow%20techniques%20we%20embed%20bundle%20adjustment%20directly%20within%20the%20training%20process%2C%20avoiding%20reliance%20on%20external%20optimization%20tools%20while%20improving%20camera {"title": "Detailed Geometry and Appearance from Opportunistic Motion", "author": "Ryosuke Hirai and Kohei Yamashita and Antoine Gu\u00e9don and Ryo Kawahara and Vincent Lepetit and Ko Nishino", "abstract": "Reconstructing 3D geometry and appearance from a sparse set of fixed cameras is a foundational task with broad applications, yet it remains fundamentally constrained by the limited viewpoints. We show that this bound can be broken by exploiting opportunistic object motion: as a person manipulates an object~(e.g., moving a chair or lifting a mug), the static cameras effectively ``orbit'' the object in its local coordinate frame, providing additional virtual viewpoints. Harnessing this object motion, however, poses two challenges: the tight coupling of object pose and geometry estimation and the complex appearance variations of a moving object under static illumination. We address these by formulating a joint pose and shape optimization using 2D Gaussian splatting with alternating minimization of 6DoF trajectories and primitive parameters, and by introducing a novel appearance model that factorizes diffuse and specular components with reflected directional probing within the spherical harmonics space. Extensive experiments on synthetic and real-world datasets with extremely sparse viewpoints demonstrate that our method recovers significantly more accurate geometry and appearance than state-of-the-art baselines.", "link": "http://arxiv.org/abs/2603.26665v1", "date": "2026-03-27", "relevancy": 3.1996, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6585}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6361}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6251}], "mailto": {"title": "ExtrinSplat: Decoupling Geometry and Semantics for Open-Vocabulary Understanding in 3D Gaussian Splatting", "author": "Jiayu Ding and Xinpeng Liu and Zhiyi Pan and Shiqiang Long and Ge Li", "abstract": "Lifting 2D open-vocabulary understanding into 3D Gaussian Splatting (3DGS) scenes is a critical challenge. Mainstream methods, built on an embedding paradigm, suffer from three key flaws: (i) geometry-semantic inconsistency, where points, rather than objects, serve as the semantic basis, limiting semantic fidelity; (ii) semantic bloat from injecting gigabytes of feature data into the geometry; and (iii) semantic rigidity, as one feature per Gaussian struggles to capture rich polysemy. To overcome these limitations, we introduce ExtrinSplat, a framework built on the extrinsic paradigm that decouples geometry from semantics. Instead of embedding features, ExtrinSplat clusters Gaussians into multi-granularity, overlapping 3D object groups. A Vision-Language Model (VLM) then interprets these groups to generate lightweight textual hypotheses, creating an extrinsic index layer that natively supports complex polysemy. By replacing costly feature embedding with lightweight indices, ExtrinSplat reduces scene adaptation time from hours to minutes and lowers storage overhead by several orders of magnitude. On benchmark tasks for open-vocabulary 3D object selection and semantic segmentation, ExtrinSplat outperforms established embedding-based frameworks, validating the efficacy and efficiency of the proposed extrinsic paradigm.", "link": "http://arxiv.org/abs/2509.22225v2", "date": "2026-03-27", "relevancy": 3.1564, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6592}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6415}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ExtrinSplat%3A%20Decoupling%20Geometry%20and%20Semantics%20for%20Open-Vocabulary%20Understanding%20in%203D%20Gaussian%20Splatting&body=Title%3A%20ExtrinSplat%3A%20Decoupling%20Geometry%20and%20Semantics%20for%20Open-Vocabulary%20Understanding%20in%203D%20Gaussian%20Splatting%0AAuthor%3A%20Jiayu%20Ding%20and%20Xinpeng%20Liu%20and%20Zhiyi%20Pan%20and%20Shiqiang%20Long%20and%20Ge%20Li%0AAbstract%3A%20Lifting%202D%20open-vocabulary%20understanding%20into%203D%20Gaussian%20Splatting%20%283DGS%29%20scenes%20is%20a%20critical%20challenge.%20Mainstream%20methods%2C%20built%20on%20an%20embedding%20paradigm%2C%20suffer%20from%20three%20key%20flaws%3A%20%28i%29%20geometry-semantic%20inconsistency%2C%20where%20points%2C%20rather%20than%20objects%2C%20serve%20as%20the%20semantic%20basis%2C%20limiting%20semantic%20fidelity%3B%20%28ii%29%20semantic%20bloat%20from%20injecting%20gigabytes%20of%20feature%20data%20into%20the%20geometry%3B%20and%20%28iii%29%20semantic%20rigidity%2C%20as%20one%20feature%20per%20Gaussian%20struggles%20to%20capture%20rich%20polysemy.%20To%20overcome%20these%20limitations%2C%20we%20introduce%20ExtrinSplat%2C%20a%20framework%20built%20on%20the%20extrinsic%20paradigm%20that%20decouples%20geometry%20from%20semantics.%20Instead%20of%20embedding%20features%2C%20ExtrinSplat%20clusters%20Gaussians%20into%20multi-granularity%2C%20overlapping%203D%20object%20groups.%20A%20Vision-Language%20Model%20%28VLM%29%20then%20interprets%20these%20groups%20to%20generate%20lightweight%20textual%20hypotheses%2C%20creating%20an%20extrinsic%20index%20layer%20that%20natively%20supports%20complex%20polysemy.%20By%20replacing%20costly%20feature%20embedding%20with%20lightweight%20indices%2C%20ExtrinSplat%20reduces%20scene%20adaptation%20time%20from%20hours%20to%20minutes%20and%20lowe {"title": "Drive-Through 3D Vehicle Exterior Reconstruction via Dynamic-Scene SfM and Distortion-Aware Gaussian Splatting", "author": "Nitin Kulkarni and Akhil Devarashetti and Charlie Cluss and Livio Forte and Philip Schneider and Chunming Qiao and Alina Vereshchaka", "abstract": "High-fidelity 3D reconstruction of vehicle exteriors improves buyer confidence in online automotive marketplaces, but generating these models in cluttered dealership drive-throughs presents severe technical challenges. Unlike static-scene photogrammetry, this setting features a dynamic vehicle moving against heavily cluttered, static backgrounds. This problem is further compounded by wide-angle lens distortion, specular automotive paint, and non-rigid wheel rotations that violate classical epipolar constraints. We propose an end-to-end pipeline utilizing a two-pillar camera rig. First, we resolve dynamic-scene ambiguities by coupling SAM 3 for instance segmentation with motion-gating to cleanly isolate the moving vehicle, explicitly masking out non-rigid wheels to enforce strict epipolar geometry. Second, we extract robust correspondences directly on raw, distorted 4K imagery using the RoMa v2 learned matcher guided by semantic confidence masks. Third, these matches are integrated into a rig-aware SfM optimization that utilizes CAD-derived relative pose priors to eliminate scale drift. Finally, we use a distortion-aware 3D Gaussian Splatting framework (3DGUT) coupled with a stochastic Markov Chain Monte Carlo (MCMC) densification strategy to render reflective surfaces. Evaluations on 25 real-world vehicles across 10 dealerships demonstrate that our full pipeline achieves a PSNR of 28.66 dB, an SSIM of 0.89, and an LPIPS of 0.21 on held-out views, representing a 3.85 dB improvement over standard 3D-GS, delivering inspection-grade interactive 3D models without controlled studio infrastructure.", "link": "http://arxiv.org/abs/2603.26638v1", "date": "2026-03-27", "relevancy": 3.1482, "topK": {"title": "The Limits of Learning from Pictures and Text: Vision-Language Models and Embodied Scene Understanding", "author": "Gillian Rosenberg and Skylar Stadhard and Bruce C. Hansen and Michelle R. Greene", "abstract": "What information is sufficient to learn the full richness of human scene understanding? The distributional hypothesis holds that the statistical co-occurrence of language and images captures the conceptual knowledge underlying visual cognition. Vision-language models (VLMs) are trained on massive paired text-image corpora but lack embodied experience, making them an ideal test of the distributional hypothesis. We report two experiments comparing descriptions generated by 18 VLMs to those of over 2000 human observers across 15 high-level scene understanding tasks, spanning general knowledge, affordances, sensory experiences, affective responses, and future prediction. Because many tasks lack ground truth answers, we developed a Human-Calibrated Cosine Distance (HCD) metric that measures VLM output similarity to the distribution of human responses, scaled by within-human variability. In Experiment 1, VLMs approached human-level performance on general knowledge tasks, but showed a robust deficit for affordance tasks that resisted prompt engineering and did not improve with newer model releases. In Experiment 2, we tested six mechanistic hypotheses for explaining this affordance gap, finding that the deficit was structural rather than stylistic and was not resolved by providing explicit spatial information. Corpus analyses revealed that image captioning datasets contain sparse agent-addressed affordance language, consistent with Gricean accounts of why embodied knowledge may be systematically underrepresented in language. Together, these findings suggest that distributional learning from images and text is insufficient for affordance-based scene understanding, implying that some dimensions of human visual cognition may require the kind of agent-centered, three-dimensional experience that no photograph or caption can encode.", "link": "http://arxiv.org/abs/2603.26589v1", "date": "2026-03-27", "relevancy": 3.107, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6574}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6574}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5494}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Limits%20of%20Learning%20from%20Pictures%20and%20Text%3A%20Vision-Language%20Models%20and%20Embodied%20Scene%20Understanding&body=Title%3A%20The%20Limits%20of%20Learning%20from%20Pictures%20and%20Text%3A%20Vision-Language%20Models%20and%20Embodied%20Scene%20Understanding%0AAuthor%3A%20Gillian%20Rosenberg%20and%20Skylar%20Stadhard%20and%20Bruce%20C.%20Hansen%20and%20Michelle%20R.%20Greene%0AAbstract%3A%20What%20information%20is%20sufficient%20to%20learn%20the%20full%20richness%20of%20human%20scene%20understanding%3F%20The%20distributional%20hypothesis%20holds%20that%20the%20statistical%20co-occurrence%20of%20language%20and%20images%20captures%20the%20conceptual%20knowledge%20underlying%20visual%20cognition.%20Vision-language%20models%20%28VLMs%29%20are%20trained%20on%20massive%20paired%20text-image%20corpora%20but%20lack%20embodied%20experience%2C%20making%20them%20an%20ideal%20test%20of%20the%20distributional%20hypothesis.%20We%20report%20two%20experiments%20comparing%20descriptions%20generated%20by%2018%20VLMs%20to%20those%20of%20over%202000%20human%20observers%20across%2015%20high-level%20scene%20understanding%20tasks%2C%20spanning%20general%20knowledge%2C%20affordances%2C%20sensory%20experiences%2C%20affective%20responses%2C%20and%20future%20prediction.%20Because%20many%20tasks%20lack%20ground%20truth%20answers%2C%20we%20developed%20a%20Human-Calibrated%20Cosine%20Distance%20%28HCD%29%20metric%20that%20measures%20VLM%20output%20similarity%20to%20the%20distribution%20of%20human%20responses%2C%20scaled%20by%20within-human%20variability.%20In%20Experiment%201%2C%20VLMs%20approached%20human-level%20performance%20on%20general%20knowledge%20tasks%2C%20but%20showed%20a%20robust%20deficit%20for%20affordance%20tasks%20that%20resisted%20prompt%20engineering%20and%20did%20not%20improve%20with%20newer%20model%20releases.%20In%20Experiment%202%2C%20we%20tested%20six%20mechanistic%20hypotheses%20for%20explaining%20this%20affordance%20gap%2C%20finding%20that%20the%20deficit%20was%20structural%20rather%20than%20stylistic%20and%20was%20not%20resolved%20by%20providing%20explicit%20spatial%20information.%20Corpus%20analyses%20revealed%20that%20image%20captioning%20datasets%20contain%20sparse%20agent-addressed%20affordance%20language%2C%20consistent%20with%20Gricean%20accounts%20of%20why%20embodied%20knowledge%20may%20be%20systematically%20underrepresented%20in%20language.%20Together%2C%20these%20findings%20suggest%20that%20distributional%20learning%20from%20images%20and%20text%20is%20insufficient%20for%20affordance-based%20scene%20understanding%2C%20implying%20that%20some%20dimensions%20of%20human%20visual%20cognition%20may%20require%20the%20kind%20of%20agent-centered%2C%20three-dimensional%20experience%20that%20no%20photograph%20or%20caption%20can%20encode.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26589v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Limits%2520of%2520Learning%2520from%2520Pictures%2520and%2520Text%253A%2520Vision-Language%2520Models%2520and%2520Embodied%2520Scene%2520Understanding%26entry.906535625%3DGillian%2520Rosenberg%2520and%2520Skylar%2520Stadhard%2520and%2520Bruce%2520C.%2520Hansen%2520and%2520Michelle%2520R.%2520Gre g%20descriptions%20generated%20by%2018%20VLMs%20to%20those%20of%20over%202000%20human%20observers%20across%2015%20high-level%20scene%20understanding%20tasks%2C%20spanning%20general%20knowledge%2C%20affordances%2C%20sensory%20experiences%2C%20affective%20responses%2C%20and%20future%20prediction.%20Because%20many%20tasks%20lack%20ground%20truth%20answers%2C%20we%20developed%20a%20Human-Calibrated%20Cosine%20Distance%20%28HCD%29%20metric%20that%20measures%20VLM%20output%20similarity%20to%20the%20distribution%20of%20human%20responses%2C%20scaled%20by%20within-human%20variability.%20In%20Experiment%201%2C%20VLMs%20approached%20human-level%20performance%20on%20general%20knowledge%20tasks%2C%20but%20showed%20a%20robust%20deficit%20for%20affordance%20tasks%20that%20resisted%20prompt%20engineering%20and%20did%20not%20improve%20with%20newer%20model%20releases.%20In%20Experiment%202%2C%20we%20tested%20six%20mechanistic%20hypotheses%20for%20explaining%20this%20affordance%20gap%2C%20finding%20that%20the%20deficit%20was%20structural%20rather%20than%20stylistic%20and%20was%20not%20resolved%20by%20providing%20explicit%20spatial%20information.%20Corpus%20analyses%20revealed%20that%20image%20captioning%20datasets%20contain%20sparse%20agent-addressed%20affordance%20language%2C%20consistent%20with%20Gricean%20accounts%20of%20why%20embodied%20knowledge%20may%20be%20systematically%20underrepresented%20in%20language.%20Together%2C%20these%20findings%20suggest%20that%20distributional%20learning%20from%20images%20and%20text%20is%20insufficient%20for%20affordance-based%20scene%20understanding%2C%20implying%20that%20some%20dimensions%20of%20human%20visual%20cognition%20may%20require%20the%20kind%20of%20agent-centered%2C%20three-dimensional%20experience%20that%20no%20photograph%20or%20caption%20can%20encode.&entry.1838667208=http%3A//arxiv.org/abs/2603.26589v1&entry.124074799=Read"},
{"title": "PiLoT: Neural Pixel-to-3D Registration for UAV-based Ego and Target Geo-localization", "author": "Xiaoya Cheng and Long Wang and Yan Liu and Xinyi Liu and Hanlin Tan and Yu Liu and Maojun Zhang and Shen Yan", "abstract": "We present PiLoT, a unified framework that tackles UAV-based ego and target geo-localization. Conventional approaches rely on decoupled pipelines that fuse GNSS and Visual-Inertial Odometry (VIO) for ego-pose estimation, and active sensors like laser rangefinders for target localization. However, these methods are susceptible to failure in GNSS-denied environments and incur substantial hardware costs and complexity. PiLoT breaks this paradigm by directly registering live video stream against a geo-referenced 3D map. To achieve robust, accurate, and real-time performance, we introduce three key contributions: 1) a Dual-Thread Engine that decouples map rendering from core localization thread, ensuring both low latency while maintaining drift-free accuracy; 2) a large-scale synthetic dataset with precise geometric annotations (camera pose, depth maps). This dataset enables the training of a lightweight network that generalizes in a zero-shot manner from simulation to real data; and 3) a Joint Neural-Guided Stochastic-Gradient Optimizer (JNGO) that achieves robust convergence even under aggressive motion. Evaluations on a comprehensive set of public and newly collected benchmarks show that PiLoT outperforms state-of-the-art methods while running over 25 FPS on NVIDIA Jetson Orin platform. Our code and dataset is available at: https://github.com/Choyaa/PiLoT.", "link": "http://arxiv.org/abs/2603.20778v3", "date": "2026-03-27", "relevancy": 3.0864, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6527}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6193}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5799}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PiLoT%3A%20Neural%20Pixel-to-3D%20Registration%20for%20UAV-based%20Ego%20and%20Target%20Geo-localization&body=Title%3A%20PiLoT%3A%20Neural%20Pixel-to-3D%20Registration%20for%20UAV-based%20Ego%20and%20Target%20Geo-localization%0AAuthor%3A%20Xiaoya%20Cheng%20and%20Long%20Wang%20and%20Yan%20Liu%20and%20Xinyi%20Liu%20and%20Hanlin%20Tan%20and%20Yu%20Liu%20and%20Maojun%20Zhang%20and%20Shen%20Yan%0AAbstract%3A%20We%20present%20PiLoT%2C%20a%20unified%20framework%20that%20tackles%20UAV-based%20ego%20and%20target%20geo-localization.%20Conventional%20approaches%20rely%20on%20decoupled%20pipelines%20that%20fuse%20GNSS%20and%20Visual-Inertial%20Odometry%20%28VIO%29%20for%20ego-pose%20estimation%2C%20and%20active%20sensors%20like%20laser%20rangefinders%20for%20target%20localization.%20However%2C%20these%20methods%20are%20susceptible%20to%20failure%20in%20GNSS-denied%20environments%20and%20incur%20substantial%20hardware%20costs%20and%20complexity.%20PiLoT%20breaks%20this%20paradigm%20by%20directly%20registering%20live%20video%20stream%20against%20a%20geo-referenced%203D%20map.%20To%20achieve%20robust%2C%20accurate%2C%20and%20real-time%20performance%2C%20we%20introduce%20three%20key%20contributions%3A%201%29%20a%20Dual-Thread%20Engine%20that%20decouples%20map%20rendering%20from%20core%20localization%20thread%2C%20ensuring%20both%20low%20latency%20while%20maintaining%20drift-free%20accuracy%3B%202%29%20a%20large-scale%20synthetic%20dataset%20with%20precise%20geometric%20annotations%20%28camera%20pose%2C%20depth%20maps%29.%20This%20dataset%20enables%20the%20training%20of%20a%20lightweight%20network%20that%20generalizes%20in%20a%20zero-shot%20manner%20from%20simulation%20to%20real%20data%3B%20and%203%29%20 {"title": "VGGRPO: Towards World-Consistent Video Generation with 4D Latent Reward", "author": "Zhaochong An and Orest Kupyn and Th\u00e9o Uscidda and Andrea Colaco and Karan Ahuja and Serge Belongie and Mar Gonzalez-Franco and Marta Tintore Gazulla", "abstract": "Large-scale video diffusion models achieve impressive visual quality, yet often fail to preserve geometric consistency. Prior approaches improve consistency either by augmenting the generator with additional modules or applying geometry-aware alignment. However, architectural modifications can compromise the generalization of internet-scale pretrained models, while existing alignment methods are limited to static scenes and rely on RGB-space rewards that require repeated VAE decoding, incurring substantial compute overhead and failing to generalize to highly dynamic real-world scenes. To preserve the pretrained capacity while improving geometric consistency, we propose VGGRPO (Visual Geometry GRPO), a latent geometry-guided framework for geometry-aware video post-training. VGGRPO introduces a Latent Geometry Model (LGM) that stitches video diffusion latents to geometry foundation models, enabling direct decoding of scene geometry from the latent space. By constructing LGM from a geometry model with 4D reconstruction capability, VGGRPO naturally extends to dynamic scenes, overcoming the static-scene limitations of prior methods. Building on this, we perform latent-space Group Relative Policy Optimization with two complementary rewards: a camera motion smoothness reward that penalizes jittery trajectories, and a geometry reprojection consistency reward that enforces cross-view geometric coherence. Experiments on both static and dynamic benchmarks show that VGGRPO improves camera stability, geometry consistency, and overall quality while eliminating costly VAE decoding, making latent-space geometry-guided reinforcement an efficient and flexible approach to world-consistent video generation.", "link": "http://arxiv.org/abs/2603.26599v1", "date": "2026-03-27", "relevancy": 3.0754, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6372}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6083}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5997}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VGGRPO%3A%20Towards%20World-Consistent%20Video%20Generation%20with%204D%20Latent%20Reward&body=Title%3A%20VGGRPO%3A%20Towards%20World-Consistent%20Video%20Generation%20with%204D%20Latent%20Reward%0AAuthor%3A%20Zhaochong%20An%20and%20Orest%20Kupyn%20and%20Th%C3%A9o%20Uscidda%20and%20Andrea%20Colaco%20and%20Karan%20Ahuja%20and%20Serge%20Belongie%20and%20Mar%20Gonzalez-Franco%20and%20Marta%20Tintore%20Gazulla%0AAbstract%3A%20Large-scale%20video%20diffusion%20models%20achieve%20impressive%20visual%20quality%2C%20yet%20often%20fail%20to%20preserve%20geometric%20consistency.%20Prior%20approaches%20improve%20consistency%20either%20by%20augmenting%20the%20generator%20with%20additional%20modules%20or%20applying%20geometry-aware%20alignment.%20However%2C%20architectural%20modifications%20can%20compromise%20the%20generalization%20of%20internet-scale%20pretrained%20models%2C%20while%20existing%20alignment%20methods%20are%20limited%20to%20static%20scenes%20and%20rely%20on%20RGB-space%20rewards%20that%20require%20repeated%20VAE%20decoding%2C%20incurring%20substantial%20compute%20overhead%20and%20failing%20to%20generalize%20to%20highly%20dynamic%20real-world%20scenes.%20To%20preserve%20the%20pretrained%20capacity%20while%20improving%20geometric%20consistency%2C%20we%20propose%20VGGRPO%20%28Visual%20Geometry%20GRPO%29%2C%20a%20latent%20geometry-guided%20framework%20for%20geometry-aware%20video%20post-training.%20VGGRPO%20introduces%20a%20Latent%20Geometry%20Model%20%28LGM%29%20that%20stitches%20video%20diffusion%20latents%20to%20geometry%20foundation%20models%2C%20enabling%20direct%20decoding%20of%20scene%20geometry%20from%20the%20latent%20space.%20By%20constructing%20LGM%20from%20a%20geometry%20model%20with%204D%20reconstruction%20capability%2C%20VGGRPO%20naturally%20extends%20to%20dynamic%20scenes%2C%20overcoming%20the%20static-scene%20limitations%20of%20prior%20methods.%20Building%20on%20this%2C%20we%20perform%20latent-space%20Group%20Relative%20Policy%20Optimization%20with%20two%20complementary%20rewards%3A%20a%20camera%20motion%20smoothness%20reward%20that%20penalizes%20jittery%20trajectories%2C%20and%20a%20geometry%20reprojection%20consistency%20reward%20that%20enforces%20cross-view%20geometric%20coherence.%20Experiments%20on%20both%20static%20and%20dynamic%20benchmarks%20show%20that%20VGGRPO%20improves%20camera%20stability%2C%20geometry%20consistency%2C%20and%20overall%20quality%20while%20eliminating%20costly%20VAE%20decoding%2C%20making%20latent-space%20geometry-guided%20reinforcement%20an%20efficient%20and%20flexible%20approach%20to%20world-consistent%20video%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26599v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVGGRPO%253A%2520Towards%2520World-Consistent%2520Video%2520Generation%2520with%25204D%2520Latent%2520Reward%26entry.906535625%3DZhaochong%2520An%2520and%2520Orest%2520Kupyn%2520and%2520Th%25C3%25A9o%2520Uscidda%2520and%2520Andrea%2520Colaco%2520and%2520Karan%2520Ahuja%2520and%2520Serge%2520Belongie%2520and%2520Mar%2520Gonzalez-Franco%2520and%2520Marta%2520Tintore%2520Gazulla%26entry.1292438233%3DLarge-scale%2520video%2520diffusion%2520models%2520achieve%2520impressive%2520visual%2520quality%252C%2520yet%2520often%2520fail%2520to%2520preserve%2520geometric%2520consistency. ing.%20VGGRPO%20introduces%20a%20Latent%20Geometry%20Model%20%28LGM%29%20that%20stitches%20video%20diffusion%20latents%20to%20geometry%20foundation%20models%2C%20enabling%20direct%20decoding%20of%20scene%20geometry%20from%20the%20latent%20space.%20By%20constructing%20LGM%20from%20a%20geometry%20model%20with%204D%20reconstruction%20capability%2C%20VGGRPO%20naturally%20extends%20to%20dynamic%20scenes%2C%20overcoming%20the%20static-scene%20limitations%20of%20prior%20methods.%20Building%20on%20this%2C%20we%20perform%20latent-space%20Group%20Relative%20Policy%20Optimization%20with%20two%20complementary%20rewards%3A%20a%20camera%20motion%20smoothness%20reward%20that%20penalizes%20jittery%20trajectories%2C%20and%20a%20geometry%20reprojection%20consistency%20reward%20that%20enforces%20cross-view%20geometric%20coherence.%20Experiments%20on%20both%20static%20and%20dynamic%20benchmarks%20show%20that%20VGGRPO%20improves%20camera%20stability%2C%20geometry%20consistency%2C%20and%20overall%20quality%20while%20eliminating%20costly%20VAE%20decoding%2C%20making%20latent-space%20geometry-guided%20reinforcement%20an%20efficient%20and%20flexible%20approach%20to%20world-consistent%20video%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2603.26599v1&entry.124074799=Read"},
{"title": "GLASS: Geometry-aware Local Alignment and Structure Synchronization Network for 2D-3D Registration", "author": "Zhixin Cheng and Jiacheng Deng and Xinjun Li and Bohao Liao and Li Liu and Xiaotian Yin and Baoqun Yin and Tianzhu Zhang", "abstract": "Image-to-point cloud registration methods typically follow a coarse-to-fine pipeline, extracting patch-level correspondences and refining them into dense pixel-to-point matches. However, in scenes with repetitive patterns, images often lack sufficient 3D structural cues and alignment with point clouds, leading to incorrect matches. Moreover, prior methods usually overlook structural consistency, limiting the full exploitation of correspondences. To address these issues, we propose two novel modules: the Local Geometry Enhancement (LGE) module and the Graph Distribution Consistency (GDC) module. LGE enhances both image and point cloud features with normal vectors, injecting geometric structure into image features to reduce mismatches. GDC constructs a graph from matched points to update features and explicitly constrain similarity distributions. Extensive experiments and ablations on two benchmarks, RGB-D Scenes v2 and 7-Scenes, demonstrate that our approach achieves state-of-the-art performance in image-to-point cloud registration.", "link": "http://arxiv.org/abs/2603.26262v1", "date": "2026-03-27", "relevancy": 3.0629, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.65}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5969}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5908}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GLASS%3A%20Geometry-aware%20Local%20Alignment%20and%20Structure%20Synchronization%20Network%20for%202D-3D%20Registration&body=Title%3A%20GLASS%3A%20Geometry-aware%20Local%20Alignment%20and%20Structure%20Synchronization%20Network%20for%202D-3D%20Registration%0AAuthor%3A%20Zhixin%20Cheng%20and%20Jiacheng%20Deng%20and%20Xinjun%20Li%20and%20Bohao%20Liao%20and%20Li%20Liu%20and%20Xiaotian%20Yin%20and%20Baoqun%20Yin%20and%20Tianzhu%20Zhang%0AAbstract%3A%20Image-to-point%20cloud%20registration%20methods%20typically%20follow%20a%20coarse-to-fine%20pipeline%2C%20extracting%20patch-level%20correspondences%20and%20refining%20them%20into%20dense%20pixel-to-point%20matches.%20However%2C%20in%20scenes%20with%20repetitive%20patterns%2C%20images%20often%20lack%20sufficient%203D%20structural%20cues%20and%20alignment%20with%20point%20clouds%2C%20leading%20to%20incorrect%20matches.%20Moreover%2C%20prior%20methods%20usually%20overlook%20structural%20consistency%2C%20limiting%20the%20full%20exploitation%20of%20correspondences.%20To%20address%20these%20issues%2C%20we%20propose%20two%20novel%20modules%3A%20the%20Local%20Geometry%20Enhancement%20%28LGE%29%20module%20and%20the%20Graph%20Distribution%20Consistency%20%28GDC%29%20module.%20LGE%20enhances%20both%20image%20and%20point%20cloud%20features%20with%20normal%20vectors%2C%20injecting%20geometric%20structure%20into%20image%20features%20to%20reduce%20mismatches.%20GDC%20constructs%20a%20graph%20from%20matched%20points%20to%20update%20features%20and%20explicitly%20constrain%20similarity%20distributions.%20Extensive%20experiments%20and%20ablations%20on%20two%20benchmarks%2C%20RGB-D%20Scenes%20v2%20and%207-Scenes%2C%20demonstrate%20that%20our%20approach%20achieves%20state-of-the-art%20performance%20in%20image-to-point%20cloud%20registration.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26262v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGLASS%253A%2520Geometry-aware%2520Local%2520Alignment%2520and%2520Structure%2520Synchronization%2520Network%2520for%25202D-3D%2520Registration%26entry.906535625%3DZhixin%2520Cheng%2520and%2520Jiacheng%2520Deng%2520and%2520Xinjun%2520Li%2520and%2520Bohao%2520Liao%2520and%2520Li%2520Liu%2520and%2520Xiaotian%2520Yin%2520and%2520Baoqun%2520Yin%2520and%2520Tianzhu%2520Zhang%26entry.1292438233%3DImage-to-point%2520cloud%2520registration%2520methods%2520typically%2520follow%2520a%2520coarse-to-fine%2520pipeline%252C%2520extracting%2520patch-level%2520correspondences%2520and%2520refining%2520them%2520into%2520dense%2520pixel-to-point%2520matches.%2520However%252C%2520in%2520scenes%2520with%2520repetitive%2520patterns%252C%2520images%2520often%2520lack%2520sufficient%25203D%2520structural%2520cues%2520and%2520alignment%2520with%2520point%2520clouds%252C%2520leading%2520to%2520incorrect%2520matches.%2520Moreover%252C%2520prior%2520methods%2520usually%2520overlook%2520structural%2520consistency%252C%2520limiting%2520the%2520full%2520exploitation%2520of%2520correspondences.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520two%2520novel%2520modules%253A%2520the%2520Local%2520Geometry%2520Enhancement%2520%2528LGE%2529%2520module%2520and%2520the%2520Graph%2520Distribution%2520Consistency%2520%2528GDC%2529%2520module.%2520LGE%2520enhances%2520both%2520image%2520and%2520point%2520cloud%2520features%2520with%2520normal%2520vectors%252C%2520injecting%2520geometric%2520structure%2520into%2520image%2520features%2520to%2520reduce%2520mismatches.%2520GDC%2520constructs%2520a%2520graph%2520from%2520matched%2520points%2520to%2520update%2520features%2520and%2520explicitly%2520constrain%2520similarity%2520distributions.%2520Extensive%2520experiments%2520and%2520ablations%2520on%2520two%2520benchmarks%252C%2520RGB-D%2520Scenes%2520v2%2520and%25207-Scenes%252C%2520demonstrate%2520that%2520our%2520approach%2520achieves%2520state-of-the-art%2520performance%2520in%2520image-to-point%2520cloud%2520registration.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26262v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GLASS%3A%20Geometry-aware%20Local%20Alignment%20and%20Structure%20Synchronization%20Network%20for%202D-3D%20Registration&entry.906535625=Zhixin%20Cheng%20and%20Jiacheng%20Deng%20and%20Xinjun%20Li%20and%20Bohao%20Liao%20and%20Li%20Liu%20and%20Xiaotian%20Yin%20and%20Baoqun%20Yin%20and%20Tianzhu%20Zhang&entry.1292438233=Image-to-point%20cloud%20registration%20methods%20typically%20follow%20a%20coarse-to-fine%20pipeline%2C%20extracting%20patch-level%20correspondences%20and%20refining%20them%20into%20dense%20pixel-to-point%20matches.%20However%2C%20in%20scenes%20with%20repetitive%20patterns%2C%20images%20often%20lack%20sufficient%203D%20structural%20cues%20and%20alignment%20with%20point%20clouds%2C%20leading%20to%20incorrect%20matches.%20Moreover%2C%20prior%20methods%20usually%20overlook%20structural%20consistency%2C%20limiting%20the%20full%20exploitation%20of%20correspondences.%20To%20address%20these%20issues%2C%20we%20propose%20two%20novel%20modules%3A%20the%20Local%20Geometry%20Enhancement%20%28LGE%29%20module%20and%20the%20Graph%20Distribution%20Consistency%20%28GDC%29%20module.%20LGE%20enhances%20both%20image%20and%20point%20cloud%20features%20with%20normal%20vectors%2C%20injecting%20geometric%20structure%20into%20image%20features%20to%20reduce%20mismatches.%20GDC%20constructs%20a%20graph%20from%20matched%20points%20to%20update%20features%20and%20explicitly%20constrain%20similarity%20distributions.%20Extensive%20experiments%20and%20ablations%20on%20two%20benchmarks%2C%20RGB-D%20Scenes%20v2%20and%207-Scenes%2C%20demonstrate%20that%20our%20approach%20achieves%20state-of-the-art%20performance%20in%20image-to-point%20cloud%20registration.&entry.1838667208=http%3A//arxiv.org/abs/2603.26262v1&entry.124074799=Read"},
{"title": "GeoGuide: Hierarchical Geometric Guidance for Open-Vocabulary 3D Semantic Segmentation", "author": "Xujing Tao and Chuxin Wang and Yubo Ai and Zhixin Cheng and Zhuoyuan Li and Liangsheng Liu and Yujia Chen and Xinjun Li and Qiao Li and Wenfei Yang and Tianzhu Zhang", "abstract": "Open-vocabulary 3D semantic segmentation aims to segment arbitrary categories beyond the training set. Existing methods predominantly rely on distilling knowledge from 2D open-vocabulary models. However, aligning 3D features to the 2D representation space restricts intrinsic 3D geometric learning and inherits errors from 2D predictions. To address these limitations, we propose GeoGuide, a novel framework that leverages pretrained 3D models to integrate hierarchical geometry-semantic consistency for open-vocabulary 3D segmentation. Specifically, we introduce an Uncertainty-based Superpoint Distillation module to fuse geometric and semantic features for estimating per-point uncertainty, adaptively weighting 2D features within superpoints to suppress noise while preserving discriminative information to enhance local semantic consistency. Furthermore, our Instance-level Mask Reconstruction module leverages geometric priors to enforce semantic consistency within instances by reconstructing complete instance masks. Additionally, our Inter-Instance Relation Consistency module aligns geometric and semantic similarity matrices to calibrate cross-instance consistency for same-category objects, mitigating viewpoint-induced semantic drift. Extensive experiments on ScanNet v2, Matterport3D, and nuScenes demonstrate the superior performance of GeoGuide.", "link": "http://arxiv.org/abs/2603.26260v1", "date": "2026-03-27", "relevancy": 3.0303, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6218}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5982}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoGuide%3A%20Hierarchical%20Geometric%20Guidance%20for%20Open-Vocabulary%203D%20Semantic%20Segmentation&body=Title%3A%20GeoGuide%3A%20Hierarchical%20Geometric%20Guidance%20for%20Open-Vocabulary%203D%20Semantic%20Segmentation%0AAuthor%3A%20Xujing%20Tao%20and%20Chuxin%20Wang%20and%20Yubo%20Ai%20and%20Zhixin%20Cheng%20and%20Zhuoyuan%20Li%20and%20Liangsheng%20Liu%20and%20Yujia%20Chen%20and%20Xinjun%20Li%20and%20Qiao%20Li%20and%20Wenfei%20Yang%20and%20Tianzhu%20Zhang%0AAbstract%3A%20Open-vocabulary%203D%20semantic%20segmentation%20aims%20to%20segment%20arbitrary%20categories%20beyond%20the%20training%20set.%20Existing%20methods%20predominantly%20rely%20on%20distilling%20knowledge%20from%202D%20open-vocabulary%20models.%20However%2C%20aligning%203D%20features%20to%20the%202D%20representation%20space%20restricts%20intrinsic%203D%20geometric%20learning%20and%20inherits%20errors%20from%202D%20predictions.%20To%20address%20these%20limitations%2C%20we%20propose%20GeoGuide%2C%20a%20novel%20framework%20that%20leverages%20pretrained%203D%20models%20to%20integrate%20hierarchical%20geometry-semantic%20consistency%20for%20open-vocabulary%203D%20segmentation.%20Specifically%2C%20we%20introduce%20an%20Uncertainty-based%20Superpoint%20Distillation%20module%20to%20fuse%20geometric%20and%20semantic%20features%20for%20estimating%20per-point%20uncertainty%2C%20adaptively%20weighting%202D%20features%20within%20superpoints%20to%20suppress%20noise%20while%20preserving%20discriminative%20information%20to%20enhance%20local%20semantic%20consistency.%20Furthermore%2C%20our%20Instance-level%20Mask%20Reconstruction%20module%20leverages%20geometric%20priors%20to%20enforce%20semantic%20consistency%20within%20instances%20by%20reconstructing%20complete%20instance%20masks.%20Additionally%2C%20our%20Inter-Instance%20Relation%20Consistency%20module%20aligns%20geometric%20and%20semantic%20similarity%20matrices%20to%20calibrate%20cross-instance%20consistency%20for%20same-category%20objects%2C%20mitigating%20viewpoint-induced%20semantic%20drift.%20Extensive%20experiments%20on%20ScanNet%20v2%2C%20Matterport3D%2C%20and%20nuScenes%20demonstrate%20the%20superior%20performance%20of%20GeoGuide.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26260v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoGuide%253A%2520Hierarchical%2520Geometric%2520Guidance%2520for%2520Open-Vocabulary%25203D%2520Semantic%2520Segmentation%26entry.906535625%3DXujing%2520Tao%2520and%2520Chuxin%2520Wang%2520and%2520Yubo%2520Ai%2520and%2520Zhixin%2520Cheng%2520and%2520Zhuoyuan%2520Li%2520and%2520Liangsheng%2520Liu%2520and%2520Yujia%2520Chen%2520and%2520Xinjun%2520Li%2520and%2520Qiao%2520Li%2520and%2520Wenfei%2520Yang%2520and%2520Tianzhu%2520Zhang%26entry.1292438233%3DOpen-vocabulary%25203D%2520semantic%2520segmentation%2520aims%2520to%2520segment%2520arbitrary%2520categories%2520beyond%2520the%2520training%2520set.%2520Existing%2520methods%2520predominantly%2520rely%2520on%2520distilling%2520knowledge%2520from%25202D%2520open-vocabulary%2520models.%2520However%252C%2520aligning%25203D%2520features%2520to%2520the%25202D%2520representation%2520space%2520restricts%2520intrinsic%25203D%2520geometric%2520learning%2520and%2520inherits%2520errors%2520from%25202D%2520predictions.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520GeoGuide%252C%2520a%2520novel%2520framework%2520that%2520leverages%2520pretrained%25203D%2520models%2520to%2520integrate%2520hierarchical%2520geometry-semantic%2520consistency%2520for%2520open-vocabulary%25203D%2520segmentation.%2520Specifically%252C%2520we%2520introduce%2520an%2520Uncertainty-based%2520Superpoint%2520Distillation%2520module%2520to%2520fuse%2520geometric%2520and%2520semantic%2520features%2520for%2520estimating%2520per-point%2520uncertainty%252C%2520adaptively%2520weighting%25202D%2520features%2520within%2520superpoints%2520to%2520suppress%2520noise%2520while%2520preserving%2520discriminative%2520information%2520to%2520enhance%2520local%2520semantic%2520consistency.%2520Furthermore%252C%2520our%2520Instance-level%2520Mask%2520Reconstruction%2520module%2520leverages%2520geometric%2520priors%2520to%2520enforce%2520semantic%2520consistency%2520within%2520instances%2520by%2520reconstructing%2520complete%2520instance%2520masks.%2520Additionally%252C%2520our%2520Inter-Instance%2520Relation%2520Consistency%2520module%2520aligns%2520geometric%2520and%2520semantic%2520similarity%2520matrices%2520to%2520calibrate%2520cross-instance%2520consistency%2520for%2520same-category%2520objects%252C%2520mitigating%2520viewpoint-induced%2520semantic%2520drift.%2520Extensive%2520experiments%2520on%2520ScanNet%2520v2%252C%2520Matterport3D%252C%2520and%2520nuScenes%2520demonstrate%2520the%2520superior%2520performance%2520of%2520GeoGuide.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26260v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GeoGuide%3A%20Hierarchical%20Geometric%20Guidance%20for%20Open-Vocabulary%203D%20Semantic%20Segmentation&entry.906535625=Xujing%20Tao%20and%20Chuxin%20Wang%20and%20Yubo%20Ai%20and%20Zhixin%20Cheng%20and%20Zhuoyuan%20Li%20and%20Liangsheng%20Liu%20and%20Yujia%20Chen%20and%20Xinjun%20Li%20and%20Qiao%20Li%20and%20Wenfei%20Yang%20and%20Tianzhu%20Zhang&entry.1292438233=Open-vocabulary%203D%20semantic%20segmentation%20aims%20to%20segment%20arbitrary%20categories%20beyond%20the%20training%20set.%20Existing%20methods%20predominantly%20rely%20on%20distilling%20knowledge%20from%202D%20open-vocabulary%20models.%20However%2C%20aligning%203D%20features%20to%20the%202D%20representation%20space%20restricts%20intrinsic%203D%20geometric%20learning%20and%20inherits%20errors%20from%202D%20predictions.%20To%20address%20these%20limitations%2C%20we%20propose%20GeoGuide%2C%20a%20novel%20framework%20that%20leverages%20pretrained%203D%20models%20to%20integrate%20hierarchical%20geometry-semantic%20consistency%20for%20open-vocabulary%203D%20segmentation.%20Specifically%2C%20we%20introduce%20an%20Uncertainty-based%20Superpoint%20Distillation%20module%20to%20fuse%20geometric%20and%20semantic%20features%20for%20estimating%20per-point%20uncertainty%2C%20adaptively%20weighting%202D%20features%20within%20superpoints%20to%20suppress%20noise%20while%20preserving%20discriminative%20information%20to%20enhance%20local%20semantic%20consistency.%20Furthermore%2C%20our%20Instance-level%20Mask%20Reconstruction%20module%20leverages%20geometric%20priors%20to%20enforce%20semantic%20consistency%20within%20instances%20by%20reconstructing%20complete%20instance%20masks.%20Additionally%2C%20our%20Inter-Instance%20Relation%20Consistency%20module%20aligns%20geometric%20and%20semantic%20similarity%20matrices%20to%20calibrate%20cross-instance%20consistency%20for%20same-category%20objects%2C%20mitigating%20viewpoint-induced%20semantic%20drift.%20Extensive%20experiments%20on%20ScanNet%20v2%2C%20Matterport3D%2C%20and%20nuScenes%20demonstrate%20the%20superior%20performance%20of%20GeoGuide.&entry.1838667208=http%3A//arxiv.org/abs/2603.26260v1&entry.124074799=Read"},
{"title": "OVI-MAP:Open-Vocabulary Instance-Semantic Mapping", "author": "Zilong Deng and Federico Tombari and Marc Pollefeys and Johanna Wald and Daniel Barath", "abstract": "Incremental open-vocabulary 3D instance-semantic mapping is essential for autonomous agents operating in complex everyday environments. However, it remains challenging due to the need for robust instance segmentation, real-time processing, and flexible open-set reasoning. Existing methods often rely on the closed-set assumption or dense per-pixel language fusion, which limits scalability and temporal consistency. We introduce OVI-MAP that decouples instance reconstruction from semantic inference. We propose to build a class-agnostic 3D instance map that is incrementally constructed from RGB-D input, while semantic features are extracted only from a small set of automatically selected views using vision-language models. This design enables stable instance tracking and zero-shot semantic labeling throughout online exploration. Our system operates in real time and outperforms state-of-the-art open-vocabulary mapping baselines on standard benchmarks.", "link": "http://arxiv.org/abs/2603.26541v1", "date": "2026-03-27", "relevancy": 3.0106, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6069}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6069}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5926}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OVI-MAP%3AOpen-Vocabulary%20Instance-Semantic%20Mapping&body=Title%3A%20OVI-MAP%3AOpen-Vocabulary%20Instance-Semantic%20Mapping%0AAuthor%3A%20Zilong%20Deng%20and%20Federico%20Tombari%20and%20Marc%20Pollefeys%20and%20Johanna%20Wald%20and%20Daniel%20Barath%0AAbstract%3A%20Incremental%20open-vocabulary%203D%20instance-semantic%20mapping%20is%20essential%20for%20autonomous%20agents%20operating%20in%20complex%20everyday%20environments.%20However%2C%20it%20remains%20challenging%20due%20to%20the%20need%20for%20robust%20instance%20segmentation%2C%20real-time%20processing%2C%20and%20flexible%20open-set%20reasoning.%20Existing%20methods%20often%20rely%20on%20the%20closed-set%20assumption%20or%20dense%20per-pixel%20language%20fusion%2C%20which%20limits%20scalability%20and%20temporal%20consistency.%20We%20introduce%20OVI-MAP%20that%20decouples%20instance%20reconstruction%20from%20semantic%20inference.%20We%20propose%20to%20build%20a%20class-agnostic%203D%20instance%20map%20that%20is%20incrementally%20constructed%20from%20RGB-D%20input%2C%20while%20semantic%20features%20are%20extracted%20only%20from%20a%20small%20set%20of%20automatically%20selected%20views%20using%20vision-language%20models.%20This%20design%20enables%20stable%20instance%20tracking%20and%20zero-shot%20semantic%20labeling%20throughout%20online%20exploration.%20Our%20system%20operates%20in%20real%20time%20and%20outperforms%20state-of-the-art%20open-vocabulary%20mapping%20baselines%20on%20standard%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26541v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOVI-MAP%253AOpen-Vocabulary%2520Instance-Semantic%2520Mapping%26entry.906535625%3DZilong%2520Deng%2520and%2520Federico%2520Tombari%2520and%2520Marc%2520Pollefeys%2520and%2520Johanna%2520Wald%2520and%2520Daniel%2520Barath%26entry.1292438233%3DIncremental%2520open-vocabulary%25203D%2520instance-semantic%2520mapping%2520is%2520essential%2520for%2520autonomous%2520agents%2520operating%2520in%2520complex%2520everyday%2520environments.%2520However%252C%2520it%2520remains%2520challenging%2520due%2520to%2520the%2520need%2520for%2520ro sumption%20or%20dense%20per-pixel%20language%20fusion%2C%20which%20limits%20scalability%20and%20temporal%20consistency.%20We%20introduce%20OVI-MAP%20that%20decouples%20instance%20reconstruction%20from%20semantic%20inference.%20We%20propose%20to%20build%20a%20class-agnostic%203D%20instance%20map%20that%20is%20incrementally%20constructed%20from%20RGB-D%20input%2C%20while%20semantic%20features%20are%20extracted%20only%20from%20a%20small%20set%20of%20automatically%20selected%20views%20using%20vision-language%20models.%20This%20design%20enables%20stable%20instance%20tracking%20and%20zero-shot%20semantic%20labeling%20throughout%20online%20exploration.%20Our%20system%20operates%20in%20real%20time%20and%20outperforms%20state-of-the-art%20open-vocabulary%20mapping%20baselines%20on%20standard%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2603.26541v1&entry.124074799=Read"},
{"title": "Generation Is Compression: Zero-Shot Video Coding via Stochastic Rectified Flow", "author": "Ziyue Zeng and Xun Su and Haoyuan Liu and Bingyu Lu and Yui Tatsumi and Hiroshi Watanabe", "abstract": "Existing generative video compression methods use generative models only as post-hoc reconstruction modules atop conventional codecs. We propose \\emph{Generative Video Codec} (GVC), a zero-shot framework that turns a pretrained video generative model into the codec itself: the transmitted bitstream directly specifies the generative decoding trajectory, with no retraining required. To enable this, we convert the deterministic rectified-flow ODE of modern video foundation models into an equivalent SDE at inference time, unlocking per-step stochastic injection points for codebook-driven compression. Building on this unified backbone, we instantiate three complementary conditioning strategies -- \\emph{Image-to-Video} (I2V) with adaptive tail-frame atom allocation, \\emph{Text-to-Video} (T2V) operating at near-zero side information as a pure generative prior, and \\emph{First-Last-Frame-to-Video} (FLF2V) with boundary-sharing GOP chaining for dual-anchor temporal control. Together, these variants span a principled trade-off space between spatial fidelity, temporal coherence, and compression efficiency. Experiments on standard benchmarks show that GVC achieves high-quality reconstruction below 0.002\\,bpp while supporting flexible bitrate control through a single hyperparameter.", "link": "http://arxiv.org/abs/2603.26571v1", "date": "2026-03-27", "relevancy": 2.991, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5999}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5982}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5965}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generation%20Is%20Compression%3A%20Zero-Shot%20Video%20Coding%20via%20Stochastic%20Rectified%20Flow&body=Title%3A%20Generation%20Is%20Compression%3A%20Zero-Shot%20Video%20Coding%20via%20Stochastic%20Rectified%20Flow%0AAuthor%3A%20Ziyue%20Zeng%20and%20Xun%20Su%20and%20Haoyuan%20Liu%20and%20Bingyu%20Lu%20and%20Yui%20Tatsumi%20and%20Hiroshi%20Watanabe%0AAbstract%3A%20Existing%20generative%20video%20compression%20methods%20use%20generative%20models%20only%20as%20post-hoc%20reconstruction%20modules%20atop%20conventional%20codecs.%20We%20propose%20%5Cemph%7BGenerative%20Video%20Codec%7D%20%28GVC%29%2C%20a%20zero-shot%20framework%20that%20turns%20a%20pretrained%20video%20generative%20model%20into%20the%20codec%20itself%3A%20the%20transmitted%20bitstream%20directly%20specifies%20the%20generative%20decoding%20trajectory%2C%20with%20no%20retraining%20required.%20To%20enable%20this%2C%20we%20convert%20the%20deterministic%20rectified-flow%20ODE%20of%20modern%20video%20foundation%20models%20into%20an%20equivalent%20SDE%20at%20inference%20time%2C%20unlocking%20per-step%20stochastic%20injection%20points%20for%20codebook-driven%20compression.%20Building%20on%20this%20unified%20backbone%2C%20we%20instantiate%20three%20complementary%20conditioning%20strategies%20--%20%5Cemph%7BImage-to-Video%7D%20%28I2V%29%20with%20adaptive%20tail-frame%20atom%20allocation%2C%20%5Cemph%7BText-to-Video%7D%20%28T2V%29%20operating%20at%20near-zero%20side%20information%20as%20a%20pure%20generative%20prior%2C%20and%20%5Cemph%7BFirst-Last-Frame-to-Video%7D%20%28FLF2V%29%20with%20boundary-sharing%20GOP%20chaining%20for%20dual-anchor%20temporal%20control.%20Together%2C%20these%20variants%20span%20a%20principled%20trade-off%20space%20between%20spatial%20fidelity%2C%20temporal%20coherence%2C%20and%20compression%20efficiency.%20Experiments%20on%20standard%20benchmarks%20show%20that%20GVC%20achieves%20high-quality%20reconstruction%20below%200.002%5C%2Cbpp%20while%20supporting%20flexible%20bitrate%20control%20through%20a%20single%20hyperparameter.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26571v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneration%2520Is%2520Compression%253A%2520Zero-Shot%2520Video%2520Coding%2520via%2520Stochastic%2520Rectified%2520Flow%26entry.906535625%3DZiyue%2520Zeng%2520and%2520Xun%2520Su%2520and%2520Haoyuan%2520Liu%2520and%2520Bingyu%2520Lu%2520and%2520Yui%2520Tatsumi%2520and%2520Hiroshi%2520Watanabe%26entry.1292438233%3DExisting%2520generative%2520video%2520compression%2520methods%2520use%2520generative%2520models%2520only%2520as%2520post-hoc%2520reconstruction%2520modules%2520atop%2520conventional%2520codecs.%2520We%2520propose%2520%255Cemph%257BGenerative%2520Video%2520Codec%257D%2520%2528GVC%2529%252C%2520a%2520zero-shot%2520framework%2520that%2520turns%2520a%2520pretrained%2520video%2520generative%2520model%2520into%2520the%2520codec%2520itself%253A%2520the%2520transmitted%2520bitstream%2520directly%2520specifies%2520the%2520generative%2520decoding%2520trajectory%252C%2520with%2520no%2520retraining%2520required.%2520To%2520enable%2520this%252C%2520we%2520convert%2520the%2520deterministic%2520rectified-flow%2520ODE%2520of%2520modern%2520video%2520foundation%2520models%2520into%2520an%2520equivalent%2520SDE%2520at%2520inference%2520time%252C%2520unlocking%2520per-step%2520stochastic%2520injection%2520points%2520for%2520codebook-driven%2520compression.%2520Building%2520on%2520this%2520unified%2520backbone%252C%2520we%2520instantiate%2520three%2520complementary%2520conditioning%2520strategies%2520--%2520%255Cemph%257BImage-to-Video%257D%2520%2528I2V%2529%2520with%2520adaptive%2520tail-frame%2520atom%2520allocation%252C%2520%255Cemph%257BText-to-Video%257D%2520%2528T2V%2529%2520operating%2520at%2520near-zero%2520side%2520information%2520as%2520a%2520pure%2520generative%2520prior%252C%2520and%2520%255Cemph%257BFirst-Last-Frame-to-Video%257D%2520%2528FLF2V%2529%2520with%2520boundary-sharing%2520GOP%2520chaining%2520for%2520dual-anchor%2520temporal%2520control.%2520Together%252C%2520these%2520variants%2520span%2520a%2520principled%2520trade-off%2520space%2520between%2520spatial%2520fidelity%252C%2520temporal%2520coherence%252C%2520and%2520compression%2520efficiency.%2520Experiments%2520on%2520standard%2520benchmarks%2520show%2520that%2520GVC%2520achieves%2520high-quality%2520reconstruction%2520below%25200.002%255C%252Cbpp%2520while%2520supporting%2520flexible%2520bitrate%2520control%2520through%2520a%2520single%2520hyperparameter.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26571v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generation%20Is%20Compression%3A%20Zero-Shot%20Video%20Coding%20via%20Stochastic%20Rectified%20Flow&entry.906535625=Ziyue%20Zeng%20and%20Xun%20Su%20and%20Haoyuan%20Liu%20and%20Bingyu%20Lu%20and%20Yui%20Tatsumi%20and%20Hiroshi%20Watanabe&entry.1292438233=Existing%20generative%20video%20compression%20methods%20use%20generative%20models%20only%20as%20post-hoc%20reconstruction%20modules%20atop%20conventional%20codecs.%20We%20propose%20%5Cemph%7BGenerative%20Video%20Codec%7D%20%28GVC%29%2C%20a%20zero-shot%20framework%20that%20turns%20a%20pretrained%20video%20generative%20model%20into%20the%20codec%20itself%3A%20the%20transmitted%20bitstream%20directly%20specifies%20the%20generative%20decoding%20trajectory%2C%20with%20no%20retraining%20required.%20To%20enable%20this%2C%20we%20convert%20the%20deterministic%20rectified-flow%20ODE%20of%20modern%20video%20foundation%20models%20into%20an%20equivalent%20SDE%20at%20inference%20time%2C%20unlocking%20per-step%20stochastic%20injection%20points%20for%20codebook-driven%20compression.%20Building%20on%20this%20unified%20backbone%2C%20we%20instantiate {"title": "Learning Neural Parametric 3D Breast Shape Models for Metrical Surface Reconstruction From Monocular RGB Videos", "author": "Maximilian Weiherer and Antonia von Riedheim and Vanessa Br\u00e9bant and Bernhard Egger and Christoph Palm", "abstract": "We present a neural parametric 3D breast shape model and, based on this model, introduce a low-cost and accessible 3D surface reconstruction pipeline capable of recovering accurate breast geometry from a monocular RGB video. In contrast to widely used, commercially available yet prohibitively expensive 3D breast scanning solutions and existing low-cost alternatives, our method requires neither specialized hardware nor proprietary software and can be used with any device that is able to record RGB videos. The key building blocks of our pipeline are a state-of-the-art, off-the-shelf Structure-from-motion pipeline, paired with a parametric breast model for robust and metrically correct surface reconstruction. Our model, similarly to the recently proposed implicit Regensburg Breast Shape Model (iRBSM), leverages implicit neural representations to model breast shapes. However, unlike the iRBSM, which employs a single global neural signed distance function (SDF), our approach -- inspired by recent state-of-the-art face models -- decomposes the implicit breast domain into multiple smaller regions, each represented by a local neural SDF anchored at anatomical landmark positions. When incorporated into our surface reconstruction pipeline, the proposed model, dubbed liRBSM (short for localized iRBSM), significantly outperforms the iRBSM in terms of reconstruction quality, yielding more detailed surface reconstruction than its global counterpart. Overall, we find that the introduced pipeline is able to recover high-quality 3D breast geometry within an error margin of less than 2 mm. Our method is fast (requires less than six minutes), fully transparent and open-source, and -- together with the model -- publicly available at https://rbsm.re-mic.de/local-implicit.", "link": "http://arxiv.org/abs/2510.13540v2", "date": "2026-03-27", "relevancy": 2.8995, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6019}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5691}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Neural%20Parametric%203D%20Breast%20Shape%20Models%20for%20Metrical%20Surface%20Reconstruction%20From%20Monocular%20RGB%20Videos&body=Title%3A%20Learning%20Neural%20Parametric%203D%20Breast%20Shape%20Models%20for%20Metrical%20Surface%20Reconstruction%20From%20Monocular%20RGB%20Videos%0AAuthor%3A%20Maximilian%20Weiherer%20and%20Antonia%20von%20Riedheim%20and%20Vanessa%20Br%C3%A9bant%20and%20Bernhard%20Egger%20and%20Christoph%20Palm%0AAbstract%3A%20We%20present%20a%20neural%20parametric%203D%20breast%20shape%20model%20and%2C%20based%20on%20this%20model%2C%20introduce%20a%20low-cost%20and%20accessible%203D%20surface%20reconstruction%20pipeline%20capable%20of%20recovering%20accurate%20breast%20geometry%20from%20a%20monocular%20RGB%20video.%20In%20contrast%20to%20widely%20used%2C%20commercially%20available%20yet%20prohibitively%20expensive%203D%20breast%20scanning%20solutions%20and%20existing%20low-cost%20alternatives%2C%20our%20method%20requires%20neither%20specialized%20hardware%20nor%20proprietary%20software%20and%20can%20be%20used%20with%20any%20device%20that%20is%20able%20to%20record%20RGB%20videos.%20The%20key%20building%20blocks%20of%20our%20pipeline%20are%20a%20state-of-the-art%2C%20off-the-shelf%20Structure-from-motion%20pipeline%2C%20paired%20with%20a%20parametric%20breast%20model%20for%20robust%20and%20metrically%20correct%20surface%20reconstruction.%20Our%20model%2C%20similarly%20to%20the%20recently%20proposed%20implicit%20Regensburg%20Breast%20Shape%20Model%20%28iRBSM%29%2C%20leverages%20implicit%20neural%20representations%20to%20model%20breast%20shapes.%20However%2C%20unlike%20the%20iRBSM%2C%20which%20employs%20a%20single%20global%20neural%20signed%20distance%20function%20%28SDF%29%2C%20our%20approach%20--%20inspired%20by%20recent%20state-of-the-art%20face%20models%20--%20decomposes%20the%20implicit%20breast%20domain%20into%20multiple%20smaller%20regions%2C%20each%20represented%20by%20a%20local%20neural%20SDF%20anchored%20at%20anatomical%20landmark%20positions.%20When%20incorporated%20into%20our%20surface%20reconstruction%20pipeline%2C%20the%20proposed%20model%2C%20dubbed%20liRBSM%20%28short%20for%20localized%20iRBSM%29%2C%20significantly%20outperforms%20the%20iRBSM%20in%20terms%20of%20reconstruction%20quality%2C%20yielding%20more%20detailed%20surface%20reconstruction%20than%20its%20global%20counterpart.%20Overall%2C%20we%20find%20that%20the%20introduced%20pipeline%20is%20able%20to%20recover%20high-quality%203D%20breast%20geometry%20within%20an%20error%20margin%20of%20less%20than%202%20mm.%20Our%20method%20is%20fast%20%28requires%20less%20than%20six%20minutes%29%2C%20fully%20transparent%20and%20open-source%2C%20and%20--%20together%20with%20the%20model%20--%20publicly%20available%20at%20https%3A//rbsm.re-mic.de/local-implicit.%0ALink%3A%20http%3A//arxiv.org/abs/2510.13540v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Neural%2520Parametric%25203D%2520Breast%2520Shape%2520Models%2520for%2520Metrical%2520Surface%2520Reconstruction%2520From%2520Monocular%2520RGB%2520Videos%26entry.906535625%3DMaximilian%2520Weiherer%2520and%2520Antonia%2520von%2520Riedheim%2520and%2520Vanessa%2520Br%25C3%25A9bant%2520and%2520Bernhard%2520Egger%2520a

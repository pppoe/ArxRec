{"title": "DRUM: Diffusion-based Raydrop-aware Unpaired Mapping for Sim2Real LiDAR Segmentation", "author": "Tomoya Miyawaki and Kazuto Nakashima and Yumi Iwashita and Ryo Kurazume", "abstract": "LiDAR-based semantic segmentation is a key component for autonomous mobile robots, yet large-scale annotation of LiDAR point clouds is prohibitively expensive and time-consuming. Although simulators can provide labeled synthetic data, models trained on synthetic data often underperform on real-world data due to a data-level domain gap. To address this issue, we propose DRUM, a novel Sim2Real translation framework. We leverage a diffusion model pre-trained on unlabeled real-world data as a generative prior and translate synthetic data by reproducing two key measurement characteristics: reflectance intensity and raydrop noise. To improve sample fidelity, we introduce a raydrop-aware masked guidance mechanism that selectively enforces consistency with the input synthetic data while preserving realistic raydrop noise induced by the diffusion prior. Experimental results demonstrate that DRUM consistently improves Sim2Real performance across multiple representations of LiDAR data. The project page is available at https://miya-tomoya.github.io/drum.", "link": "http://arxiv.org/abs/2603.26263v1", "date": "2026-03-27", "relevancy": 2.2922, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5882}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5638}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DRUM%3A%20Diffusion-based%20Raydrop-aware%20Unpaired%20Mapping%20for%20Sim2Real%20LiDAR%20Segmentation&body=Title%3A%20DRUM%3A%20Diffusion-based%20Raydrop-aware%20Unpaired%20Mapping%20for%20Sim2Real%20LiDAR%20Segmentation%0AAuthor%3A%20Tomoya%20Miyawaki%20and%20Kazuto%20Nakashima%20and%20Yumi%20Iwashita%20and%20Ryo%20Kurazume%0AAbstract%3A%20LiDAR-based%20semantic%20segmentation%20is%20a%20key%20component%20for%20autonomous%20mobile%20robots%2C%20yet%20large-scale%20annotation%20of%20LiDAR%20point%20clouds%20is%20prohibitively%20expensive%20and%20time-consuming.%20Although%20simulators%20can%20provide%20labeled%20synthetic%20data%2C%20models%20trained%20on%20synthetic%20data%20often%20underperform%20on%20real-world%20data%20due%20to%20a%20data-level%20domain%20gap.%20To%20address%20this%20issue%2C%20we%20propose%20DRUM%2C%20a%20novel%20Sim2Real%20translation%20framework.%20We%20leverage%20a%20diffusion%20model%20pre-trained%20on%20unlabeled%20real-world%20data%20as%20a%20generative%20prior%20and%20translate%20synthetic%20data%20by%20reproducing%20two%20key%20measurement%20characteristics%3A%20reflectance%20intensity%20and%20raydrop%20noise.%20To%20improve%20sample%20fidelity%2C%20we%20introduce%20a%20raydrop-aware%20masked%20guidance%20mechanism%20that%20selectively%20enforces%20consistency%20with%20the%20input%20synthetic%20data%20while%20preserving%20realistic%20raydrop%20noise%20induced%20by%20the%20diffusion%20prior.%20Experimental%20results%20demonstrate%20that%20DRUM%20consistently%20improves%20Sim2Real%20performance%20across%20multiple%20representations%20of%20LiDAR%20data.%20The%20project%20page%20is%20available%20at%20https%3A//miya-tomoya.github.io/drum.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26263v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDRUM%253A%2520Diffusion-based%2520Raydrop-aware%2520Unpaired%2520Mapping%2520for%2520Sim2Real%2520LiDAR%2520Segmentation%26entry.906535625%3DTomoya%2520Miyawaki%2520and%2520Kazuto%2520Nakashima%2520and%2520Yumi%2520Iwashita%2520and%2520Ryo%2520Kurazume%26entry.1292438233%3DLiDAR-based%2520semantic%2520segmentation%2520is%2520a%2520key%2520component%2520for%2520autonomous%2520mobile%2520robots%252C%2520yet%2520large-scale%2520annotation%2520of%2520LiDAR%2520point%2520clouds%2520is%2520prohibitively%2520expensive%2520and%2520time-consuming.%2520Although%2520simulators%2520can%2520provide%2520labeled%2520synthetic%2520data%252C%2520models%2520trained%2520on%2520synthetic%2520data%2520often%2520underperform%2520on%2520real-world%2520data%2520due%2520to%2520a%2520data-level%2520domain%2520gap.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520DRUM%252C%2520a%2520novel%2520Sim2Real%2520translation%2520framework.%2520We%2520leverage%2520a%2520diffusion%2520model%2520pre-trained%2520on%2520unlabeled%2520real-world%2520data%2520as%2520a%2520generative%2520prior%2520and%2520translate%2520synthetic%2520data%2520by%2520reproducing%2520two%2520key%2520measurement%2520characteristics%253A%2520reflectance%2520intensity%2520and%2520raydrop%2520noise.%2520To%2520improve%2520sample%2520fidelity%252C%2520we%2520introduce%2520a%2520raydrop-aware%2520masked%2520guidance%2520mechanism%2520that%2520selectively%2520enforces%2520consistency%2520with%2520the%2520input%2520synthetic%2520data%2520while%2520preserving%2520realistic%2520raydrop%2520noise%2520induced%2520by%2520the%2520diffusion%2520prior.%2520Experimental%2520results%2520demonstrate%2520that%2520DRUM%2520consistently%2520improves%2520Sim2Real%2520performance%2520across%2520multiple%2520representations%2520of%2520LiDAR%2520data.%2520The%2520project%2520page%2520is%2520available%2520at%2520https%253A//miya-tomoya.github.io/drum.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26263v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DRUM%3A%20Diffusion-based%20Raydrop-aware%20Unpaired%20Mapping%20for%20Sim2Real%20LiDAR%20Segmentation&entry.906535625=Tomoya%20Miyawaki%20and%20Kazuto%20Nakashima%20and%20Yumi%20Iwashita%20and%20Ryo%20Kurazume&entry.1292438233=LiDAR-based%20semantic%20segmentation%20is%20a%20key%20component%20for%20autonomous%20mobile%20robots%2C%20yet%20large-scale%20annotation%20of%20LiDAR%20point%20clouds%20is%20prohibitively%20expensive%20and%20time-consuming.%20Although%20simulators%20can%20provide%20labeled%20synthetic%20data%2C%20models%20trained%20on%20synthetic%20data%20often%20underperform%20on%20real-world%20data%20due%20to%20a%20data-level%20domain%20gap.%20To%20address%20this%20issue%2C%20we%20propose%20DRUM%2C%20a%20novel%20Sim2Real%20translation%20framework.%20We%20leverage%20a%20diffusion%20model%20pre-trained%20on%20unlabeled%20real-world%20data%20as%20a%20generative%20prior%20and%20translate%20synthetic%20data%20by%20reproducing%20two%20key%20measurement%20characteristics%3A%20reflectance%20intensity%20and%20raydrop%20noise.%20To%20improve%20sample%20fidelity%2C%20we%20introduce%20a%20raydrop-aware%20masked%20guidance%20mechanism%20that%20selectively%20enforces%20consistency%20with%20the%20input%20synthetic%20data%20while%20preserving%20realistic%20raydrop%20noise%20induced%20by%20the%20diffusion%20prior.%20Experimental%20results%20demonstrate%20that%20DRUM%20consistently%20improves%20Sim2Real%20performance%20across%20multiple%20representations%20of%20LiDAR%20data.%20The%20project%20page%20is%20available%20at%20https%3A//miya-tomoya.github.io/drum.&entry.1838667208=http%3A//arxiv.org/abs/2603.26263v1&entry.124074799=Read"},
{"title": "Meta-Learned Adaptive Optimization for Robust Human Mesh Recovery with Uncertainty-Aware Parameter Updates", "author": "Shaurjya Mandal and Nutan Sharma and John Galeotti", "abstract": "Human mesh recovery from single images remains challenging due to inherent depth ambiguity and limited generalization across domains. While recent methods combine regression and optimization approaches, they struggle with poor initialization for test-time refinement and inefficient parameter updates during optimization. We propose a novel meta-learning framework that trains models to produce optimization-friendly initializations while incorporating uncertainty-aware adaptive updates during test-time refinement. Our approach introduces three key innovations: (1) a meta-learning strategy that simulates test-time optimization during training to learn better parameter initializations, (2) a selective parameter caching mechanism that identifies and freezes converged joints to reduce computational overhead, and (3) distribution-based adaptive updates that sample parameter changes from learned distributions, enabling robust exploration while quantifying uncertainty. Additionally, we employ stochastic approximation techniques to handle intractable gradients in complex loss landscapes. Extensive experiments on standard benchmarks demonstrate that our method achieves state-of-the-art performance, reducing MPJPE by 10.3 on 3DPW and 8.0 on Human3.6M compared to strong baselines. Our approach shows superior domain adaptation capabilities with minimal performance degradation across different environmental conditions, while providing meaningful uncertainty estimates that correlate with actual prediction errors. Combining meta-learning and adaptive optimization enables accurate mesh recovery and robust generalization to challenging scenarios.", "link": "http://arxiv.org/abs/2603.26447v1", "date": "2026-03-27", "relevancy": 2.2858, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5819}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5779}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5584}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Meta-Learned%20Adaptive%20Optimization%20for%20Robust%20Human%20Mesh%20Recovery%20with%20Uncertainty-Aware%20Parameter%20Updates&body=Title%3A%20Meta-Learned%20Adaptive%20Optimization%20for%20Robust%20Human%20Mesh%20Recovery%20with%20Uncertainty-Aware%20Parameter%20Updates%0AAuthor%3A%20Shaurjya%20Mandal%20and%20Nutan%20Sharma%20and%20John%20Galeotti%0AAbstract%3A%20Human%20mesh%20recovery%20from%20single%20images%20remains%20challenging%20due%20to%20inherent%20depth%20ambiguity%20and%20limited%20generalization%20across%20domains.%20While%20recent%20methods%20combine%20regression%20and%20optimization%20approaches%2C%20they%20struggle%20with%20poor%20initialization%20for%20test-time%20refinement%20and%20inefficient%20parameter%20updates%20during%20optimization.%20We%20propose%20a%20novel%20meta-learning%20framework%20that%20trains%20models%20to%20produce%20optimization-friendly%20initializations%20while%20incorporating%20uncertainty-aware%20adaptive%20updates%20during%20test-time%20refinement.%20Our%20approach%20introduces%20three%20key%20innovations%3A%20%281%29%20a%20meta-learning%20strategy%20that%20simulates%20test-time%20optimization%20during%20training%20to%20learn%20better%20parameter%20initializations%2C%20%282%29%20a%20selective%20parameter%20caching%20mechanism%20that%20identifies%20and%20freezes%20converged%20joints%20to%20reduce%20computational%20overhead%2C%20and%20%283%29%20distribution-based%20adaptive%20updates%20that%20sample%20parameter%20changes%20from%20learned%20distributions%2C%20enabling%20robust%20exploration%20while%20quantifying%20uncertainty.%20Additionally%2C%20we%20employ%20stochastic%20approximation%20techniques%20to%20handle%20intractable%20gradients%20in%20complex%20loss%20landscapes.%20Extensive%20experiments%20on%20standard%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%2C%20reducing%20MPJPE%20by%2010.3%20on%203DPW%20and%208.0%20on%20Human3.6M%20compared%20to%20strong%20baselines.%20Our%20approach%20shows%20superior%20domain%20adaptation%20capabilities%20with%20minimal%20performance%20degradation%20across%20different%20environmental%20conditions%2C%20while%20providing%20meaningful%20uncertainty%20estimates%20that%20correlate%20with%20actual%20prediction%20errors.%20Combining%20meta-learning%20and%20adaptive%20optimization%20enables%20accurate%20mesh%20recovery%20and%20robust%20generalization%20to%20challenging%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26447v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMeta-Learned%2520Adaptive%2520Optimization%2520for%2520Robust%2520Human%2520Mesh%2520Recovery%2520with%2520Uncertainty-Aware%2520Parameter%2520Updates%26entry.906535625%3DShaurjya%2520Mandal%2520and%2520Nutan%2520Sharma%2520and%2520John%2520Galeotti%26entry.1292438233%3DHuman%2520mesh%2520recovery%2520from%2520single%2520images%2520remains%2520challenging%2520due%2520to%2520inherent%2520depth%2520ambiguity%2520and%2520limited%2520generalization%2520across%2520domains.%2520While%2520recent%2520methods%2520combine%2520regression%2520and%2520optimization%2520approaches%252C%2520they%2520struggle%2520with%2520poor%2520initialization%2520for%2520test-time%2520refinement%2520and%2520inefficient%2520parameter%2520updates%2520during%2520optimization.%2520We%2520propose%2520a%2520novel%2520meta-learning%2520framework%2520that%2520trains%2520models%2520t {"title": "Clinical Metadata Guided Limited-Angle CT Image Reconstruction", "author": "Yu Shi and Shuyi Fan and Changsheng Fang and Shuo Han and Haodong Li and Li Zhou and Bahareh Morovati and Dayang Wang and Hengyong Yu", "abstract": "Limited-angle computed tomography (LACT) offers improved temporal resolution and reduced radiation dose for cardiac imaging, but suffers from severe artifacts due to truncated projections. To address the ill-posedness of LACT reconstruction, we propose a two-stage diffusion framework guided by structured clinical metadata. In the first stage, a transformer-based diffusion model conditioned exclusively on metadata, including acquisition parameters, patient demographics, and diagnostic impressions, generates coarse anatomical priors from noise. The second stage further refines the images by integrating both the coarse prior and metadata to produce high-fidelity results. Physics-based data consistency is enforced at each sampling step in both stages using an Alternating Direction Method of Multipliers module, ensuring alignment with the measured projections. Extensive experiments on both synthetic and real cardiac CT datasets demonstrate that incorporating metadata significantly improves reconstruction fidelity, particularly under severe angular truncation. Compared to existing metadata-free baselines, our method achieves superior performance in SSIM, PSNR, nMI, and PCC. Ablation studies confirm that different types of metadata contribute complementary benefits, particularly diagnostic and demographic priors under limited-angle conditions. These findings highlight the dual role of clinical metadata in improving both reconstruction quality and efficiency, supporting their integration into future metadata-guided medical imaging frameworks.", "link": "http://arxiv.org/abs/2509.01752v2", "date": "2026-03-27", "relevancy": 2.2691, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5751}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5751}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5281}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Clinical%20Metadata%20Guided%20Limited-Angle%20CT%20Image%20Reconstruction&body=Title%3A%20Clinical%20Metadata%20Guided%20Limited-Angle%20CT%20Image%20Reconstruction%0AAuthor%3A%20Yu%20Shi%20and%20Shuyi%20Fan%20and%20Changsheng%20Fang%20and%20Shuo%20Han%20and%20Haodong%20Li%20and%20Li%20Zhou%20and%20Bahareh%20Morovati%20and%20Dayang%20Wang%20and%20Hengyong%20Yu%0AAbstract%3A%20Limited-angle%20computed%20tomography%20%28LACT%29%20offers%20improved%20temporal%20resolution%20and%20reduced%20radiation%20dose%20for%20cardiac%20imaging%2C%20but%20suffers%20from%20severe%20artifacts%20due%20to%20truncated%20projections.%20To%20address%20the%20ill-posedness%20of%20LACT%20reconstruction%2C%20we%20propose%20a%20two-stage%20diffusion%20framework%20guided%20by%20structured%20clinical%20metadata.%20In%20the%20first%20stage%2C%20a%20transformer-based%20diffusion%20model%20conditioned%20exclusively%20on%20metadata%2C%20including%20acquisition%20parameters%2C%20patient%20demographics%2C%20and%20diagnostic%20impressions%2C%20generates%20coarse%20anatomical%20priors%20from%20noise.%20The%20second%20stage%20further%20refines%20the%20images%20by%20integrating%20both%20the%20coarse%20prior%20and%20metadata%20to%20produce%20high-fidelity%20results.%20Physics-based%20data%20consistency%20is%20enforced%20at%20each%20sampling%20step%20in%20both%20stages%20using%20an%20Alternating%20Direction%20Method%20of%20Multipliers%20module%2C%20ensuring%20alignment%20with%20the%20measured%20projections.%20Extensive%20experiments%20on%20both%20synthetic%20and%20real%20cardiac%20CT%20datasets%20demonstrate%20that%20incorporating%20metadata%20significantly%20improves%20reconstruction%20fidelity%2C%20particularly%20under%20severe%20angular%20truncation.%20Compared%20to%20existing%20metadata-free%20baselines%2C%20our%20method%20achieves%20superior%20performance%20in%20SSIM%2C%20PSNR%2C%20nMI%2C%20and%20PCC.%20Ablation%20studies%20confirm%20that%20different%20types%20of%20metadata%20contribute%20complementary%20benefits%2C%20particularly%20diagnostic%20and%20demographic%20priors%20under%20limited-angle%20conditions.%20These%20findings%20highlight%20the%20dual%20role%20of%20clinical%20metadata%20in%20improving%20both%20reconstruction%20quality%20and%20efficiency%2C%20supporting%20their%20integration%20into%20future%20metadata-guided%20medical%20imaging%20frameworks.%0ALink%3A%20http%3A//arxiv.org/abs/2509.01752v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClinical%2520Metadata%2520Guided%2520Limited-Angle%2520CT%2520Image%2520Reconstruction%26entry.906535625%3DYu%2520Shi%2520and%2520Shuyi%2520Fan%2520and%2520Changsheng%2520Fang%2520and%2520Shuo%2520Han%2520and%2520Haodong%2520Li%2520and%2520Li%2520Zhou%2520and%2520Bahareh%2520Morovati%2520and%2520Dayang%2520Wang%2520and%2520Hengyong%2520Yu%26entry.1292438233%3DLimited-angle%2520computed%2520tomography%2520%2528LACT%2529%2520offers%2520improved%2520temporal%2520resolution%2520and%2520reduced%2520radiation%2520dose%2520for%2520cardiac%2520imaging%252C%2520but%2520suffers%2520from%2520severe%2520artifacts%2520due%2520to%2520truncated%2520projections.%2520To%2520address%2520the%2520ill-posedness%2520of%2520LACT%2520reconstruction%252C%2520we%2520propose%2520a%2520two-stage%2520diffusion%2520framework%2520guided%2520by%2520structured%2520clinical%2520metadata.%2520In%2520the%2520first%2520stage%252C%2520a%2520transformer-based%2520diffusion%2520model%2520conditioned%2520exclusively%2520on%2520metadata%252C%2520including%2520acquisition%2 {"title": "Generalizable task-oriented object grasping through LLM-guided ontology and similarity-based planning", "author": "Hao Chen and Takuya Kiyokawa and Weiwei Wan and Kensuke Harada", "abstract": "Task-oriented grasping (TOG) is more challenging than simple object grasping because it requires precise identification of object parts and careful selection of grasping areas to ensure effective and robust manipulation. While recent approaches have trained large-scale vision-language models to integrate part-level object segmentation with task-aware grasp planning, their instability in part recognition and grasp inference limits their ability to generalize across diverse objects and tasks. To address this issue, we introduce a novel, geometry-centric strategy for more generalizable TOG that does not rely on semantic features from visual recognition, effectively overcoming the viewpoint sensitivity of model-based approaches. Our main proposals include: 1) an object-part-task ontology for functional part selection based on intuitive human commands, constructed using a Large Language Model (LLM); 2) a sampling-based geometric analysis method for identifying the selected object part from observed point clouds, incorporating multiple point distribution and distance metrics; and 3) a similarity matching framework for imitative grasp planning, utilizing similar known objects with pre-existing segmentation and grasping knowledge as references to guide the planning for unknown targets. We validate the high accuracy of our approach in functional part selection, identification, and grasp generation through real-world experiments. Additionally, we demonstrate the method's generalization capabilities to novel-category objects by extending existing ontological knowledge, showcasing its adaptability to a broad range of objects and tasks.", "link": "http://arxiv.org/abs/2603.26412v1", "date": "2026-03-27", "relevancy": 2.2673, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6169}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5447}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5256}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalizable%20task-oriented%20object%20grasping%20through%20LLM-guided%20ontology%20and%20similarity-based%20planning&body=Title%3A%20Generalizable%20task-oriented%20object%20grasping%20through%20LLM-guided%20ontology%20and%20similarity-based%20planning%0AAuthor%3A%20Hao%20Chen%20and%20Takuya%20Kiyokawa%20and%20Weiwei%20Wan%20and%20Kensuke%20Harada%0AAbstract%3A%20Task-oriented%20grasping%20%28TOG%29%20is%20more%20challenging%20than%20simple%20object%20grasping%20because%20it%20requires%20precise%20identification%20of%20object%20parts%20and%20careful%20selection%20of%20grasping%20areas%20to%20ensure%20effective%20and%20robust%20manipulation.%20While%20recent%20approaches%20have%20trained%20large-scale%20vision-language%20models%20to%20integrate%20part-level%20object%20segmentation%20with%20task-aware%20grasp%20planning%2C%20their%20instability%20in%20part%20recognition%20and%20grasp%20inference%20limits%20their%20ability%20to%20generalize%20across%20diverse%20objects%20and%20tasks.%20To%20address%20this%20issue%2C%20we%20introduce%20a%20novel%2C%20geometry-centric%20strategy%20for%20more%20generalizable%20TOG%20that%20does%20not%20rely%20on%20semantic%20features%20from%20visual%20recognition%2C%20effectively%20overcoming%20the%20viewpoint%20sensitivity%20of%20model-based%20approaches.%20Our%20main%20proposals%20include%3A%201%29%20an%20object-part-task%20ontology%20for%20functional%20part%20selection%20based%20on%20intuitive%20human%20commands%2C%20constructed%20using%20a%20Large%20Language%20Model%20%28LLM%29%3B%202%29%20a%20sampling-based%20geometric%20analysis%20method%20for%20identifying%20the%20selected%20object%20part%20from%20observed%20point%20clouds%2C%20incorporating%20multiple%20point%20distribution%20and%20distance%20metrics%3B%20and%203%29%20a%20similarity%20matching%20framework%20for%20imitative%20grasp%20planning%2C%20utilizing%20similar%20known%20objects%20with%20pre-existing%20segmentation%20and%20grasping%20knowledge%20as%20references%20to%20guide%20the%20planning%20for%20unknown%20targets.%20We%20validate%20the%20high%20accuracy%20of%20our%20approach%20in%20functional%20part%20selection%2C%20identification%2C%20and%20grasp%20generation%20through%20real-world%20experiments.%20Additionally%2C%20we%20demonstrate%20the%20method%27s%20generalization%20capabilities%20to%20novel-category%20objects%20by%20extending%20existing%20ontological%20knowledge%2C%20showcasing%20its%20adaptability%20to%20a%20broad%20range%20of%20objects%20and%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26412v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneralizable%2520task-oriented%2520object%2520grasping%2520through%2520LLM-guided%2520ontology%2520and%2520similarity-based%2520planning%26entry.906535625%3DHao%2520Chen%2520and%2520Takuya%2520Kiyokawa%2520and%2520Weiwei%2520Wan%2520and%2520Kensuke%2520Harada%26entry.1292438233%3DTask-oriented%2520grasping%2520%2528TOG%2529%2520is%2520more%2520challenging%2520than%2520simple%2520object%2520grasping%2520because%2520it%2520requires%2520precise%2520identification%2520of%2520object%2520parts%2520and%2520careful%2520selection%2520of%2520grasping%2520areas%2520to%2520ensure%2520effective%2520and%2520robust%2520manipulation.%2520While%2520recent%2520approaches%2520have%2520trained%2520large-scale%2520vision-language%2520models%2520to%2520integrate%2520part-level%2520object%2520segmentation%2520with%2520task-aware%2520grasp%2520planning%252C%2520their%2 %2520objects%2520and%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26412v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generalizable%20task-oriented%20object%20grasping%20through%20LLM-guided%20ontology%20and%20similarity-based%20planning&entry.906535625=Hao%20Chen%20and%20Takuya%20Kiyokawa%20and%20Weiwei%20Wan%20and%20Kensuke%20Harada&entry.1292438233=Task-oriented%20grasping%20%28TOG%29%20is%20more%20challenging%20than%20simple%20object%20grasping%20because%20it%20requires%20precise%20identification%20of%20object%20parts%20and%20careful%20selection%20of%20grasping%20areas%20to%20ensure%20effective%20and%20robust%20manipulation.%20While%20recent%20approaches%20have%20trained%20large-scale%20vision-language%20models%20to%20integrate%20part-level%20object%20segmentation%20with%20task-aware%20grasp%20planning%2C%20their%20instability%20in%20part%20recognition%20and%20grasp%20inference%20limits%20their%20ability%20to%20generalize%20across%20diverse%20objects%20and%20tasks.%20To%20address%20this%20issue%2C%20we%20introduce%20a%20novel%2C%20geometry-centric%20strategy%20for%20more%20generalizable%20TOG%20that%20does%20not%20rely%20on%20semantic%20features%20from%20visual%20recognition%2C%20effectively%20overcoming%20the%20viewpoint%20sensitivity%20of%20model-based%20approaches.%20Our%20main%20proposals%20include%3A%201%29%20an%20object-part-task%20ontology%20for%20functional%20part%20selection%20based%20on%20intuitive%20human%20commands%2C%20constructed%20using%20a%20Large%20Language%20Model%20%28LLM%29%3B%202%29%20a%20sampling-based%20geometric%20analysis%20method%20for%20identifying%20the%20selected%20object%20part%20from%20observed%20point%20clouds%2C%20incorporating%20multiple%20point%20distribution%20and%20distance%20metrics%3B%20and%203%29%20a%20similarity%20matching%20framework%20for%20imitative%20grasp%20planning%2C%20utilizing%20similar%20 {"title": "Hear What Matters! Text-conditioned Selective Video-to-Audio Generation", "author": "Junwon Lee and Juhan Nam and Jiyoung Lee", "abstract": "This work introduces a new task, text-conditioned selective video-to-audio (V2A) generation, which produces only the user-intended sound from a multi-object video. This capability is especially crucial in multimedia production, where audio tracks are handled individually for each sound source for precise editing, mixing, and creative control. We propose SELVA, a novel text-conditioned V2A model that treats the text prompt as an explicit selector to distinctly extract prompt-relevant sound-source visual features from the video encoder. To suppress text-irrelevant activations with efficient video encoder finetuning, the proposed supplementary tokens promote cross-attention to yield robust semantic and temporal grounding. SELVA further employs an autonomous video-mixing scheme in a self-supervised manner to overcome the lack of mono audio track supervision. We evaluate SELVA on VGG-MONOAUDIO, a curated benchmark of clean single-source videos for such a task. Extensive experiments and ablations consistently verify its effectiveness across audio quality, semantic alignment, and temporal synchronization.", "link": "http://arxiv.org/abs/2512.02650v2", "date": "2026-03-27", "relevancy": 2.2484, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5657}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5657}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.557}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hear%20What%20Matters%21%20Text-conditioned%20Selective%20Video-to-Audio%20Generation&body=Title%3A% itioned%20Selective%20Video-to-Audio%20Generation&entry.906535625=Junwon%20Lee%20and%20Juhan%20Nam%20and%20Jiyoung%20Lee&entry.1292438233=This%20work%20introduces%20a%20new%20task%2C%20text-conditioned%20selective%20video-to-audio%20%28V2A%29%20generation%2C%20which%20produces%20only%20the%20user-intended%20sound%20from%20a%20multi-object%20video.%20This%20capability%20is%20especially%20crucial%20in%20multimedia%20production%2C%20where%20audio%20tracks%20are%20handled%20individually%20for%20each%20sound%20source%20for%20precise%20editing%2C%20mixing%2C%20and%20creative%20control.%20We%20propose%20SELVA%2C%20a%20novel%20text-conditioned%20V2A%20model%20that%20treats%20the%20text%20prompt%20as%20an%20explicit%20selector%20to%20distinctly%20extract%20prompt-relevant%20sound-source%20visual%20features%20from%20the%20video%20encoder.%20To%20suppress%20text-irrelevant%20activations%20with%20efficient%20video%20encoder%20finetuning%2C%20the%20proposed%20supplementary%20tokens%20promote%20cross-attention%20to%20yield%20robust%20semantic%20and%20temporal%20grounding.%20SELVA%20further%20employs%20an%20autonomous%20video-mixing%20scheme%20in%20a%20self-supervised%20manner%20to%20overcome%20the%20lack%20of%20mono%20audio%20track%20supervision.%20We%20evaluate%20SELVA%20on%20VGG-MONOAUDIO%2C%20a%20curated%20benchmark%20of%20clean%20single-source%20videos%20for%20such%20a%20task.%20Extensive%20experiments%20and%20ablations%20consistently%20verify%20its%20effectiveness%20across%20audio%20quality%2C%20semantic%20alignment%2C%20and%20temporal%20synchronization.&entry.1838667208=http%3A//arxiv.org/abs/2512.02650v2&entry.124074799=Read"},
{"title": "GUIDE: Resolving Domain Bias in GUI Agents through Real-Time Web Video Retrieval and Plug-and-Play Annotation", "author": "Rui Xie and Zhi Gao and Chenrui Shi and Zirui Shang and Lu Chen and Qing Li", "abstract": "Large vision-language models have endowed GUI agents with strong general capabilities for interface understanding and interaction. However, due to insufficient exposure to domain-specific software operation data during training, these agents exhibit significant domain bias - they lack familiarity with the specific operation workflows (planning) and UI element layouts (grounding) of particular applications, limiting their real-world task performance. In this paper, we present GUIDE (GUI Unbiasing via Instructional-Video Driven Expertise), a training-free, plug-and-play framework that resolves GUI agent domain bias by autonomously acquiring domain-specific expertise from web tutorial videos through a retrieval-augmented automated annotation pipeline. GUIDE introduces two key innovations. First, a subtitle-driven Video-RAG pipeline unlocks video semantics through subtitle analysis, performing progressive three-stage retrieval - domain classification, topic extraction, and relevance matching - to identify task-relevant tutorial videos. Second, a fully automated annotation pipeline built on an inverse dynamics paradigm feeds consecutive keyframes enhanced with UI element detection into VLMs, inferring the required planning and grounding knowledge that are injected into the agent's corresponding modules to address both manifestations of domain bias. Extensive experiments on OSWorld demonstrate GUIDE's generality as a plug-and-play component for both multi-agent systems and single-model agents. It consistently yields over 5% improvements and reduces execution steps - without modifying any model parameters or architecture - validating GUIDE as an architecture-agnostic enhancement to bridge GUI agent domain bias.", "link": "http://arxiv.org/abs/2603.26266v1", "date": "2026-03-27", "relevancy": 2.2365, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5798}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.546}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GUIDE%3A%20Resolving%20Domain%20Bias%20in%20GUI%20Agents%20through%20Real-Time%20Web%20Video%20Retrieval%20and%20Plug-and-Play%20Annotation&body=Title%3A%20GUIDE%3A%20Resolving%20Domain%20Bias%20in%20GUI%20Agents%20through%20Real-Time%20Web%20Video%20Retrieval%20and%20Plug-and-Play%20Annotation%0AAuthor%3A%20Rui%20Xie%20and%20Zhi%20Gao%20and%20Chenrui%20Shi%20and%20Zirui%20Shang%20and%20Lu%20Chen%20and%20Qing%20Li%0AAbstract%3A%20Large%20vision-language%20models%20have%20endowed%20GUI%20agents%20with%20strong%20general%20capabilities%20for%20interface%20understanding%20and%20interaction.%20However%2C%20due%20to%20insufficient%20exposure%20to%20domain-specific%20software%20operation%20data%20during%20training%2C%20these%20agents%20exhibit%20significant%20domain%20bias%20-%20they%20lack%20familiarity%20with%20the%20specific%20operation%20workflows%20%28planning%29%20and%20UI%20element%20layouts%20%28grounding%29%20of%20particular%20applications%2C%20limiting%20their%20real-world%20task%20performance.%20In%20this%20paper%2C%20we%20present%20GUIDE%20%28GUI%20Unbiasing%20via%20Instructional-Video%20Driven%20Expertise%29%2C%20a%20training-free%2C%20plug-and-play%20framework%20that%20resolves%20GUI%20agent%20domain%20bias%20by%20autonomously%20acquiring%20domain-specific%20expertise%20from%20web%20tutorial%20videos%20through%20a%20retrieval-augmented%20automated%20annotation%20pipeline.%20GUIDE%20introduces%20two%20key%20innovations.%20First%2C%20a%20subtitle-driven%20Video-RAG%20pipeline%20unlocks%20video%20semantics%20through%20subtitle%20analysis%2C%20performing%20progressive%20three-stage%20retrieval%20-%20domain%20classification%2C%20topic%20extraction%2C%20and%20relevance%20matching%20-%20to%20identify%20task-relevant%20tutorial%20videos.%20Second%2C%20a%20fully%20automated%20annotation%20pipeline%20built%20on%20an%20inverse%20dynamics%20paradigm%20feeds%20consecutive%20keyframes%20enhanced%20with%20UI%20element%20detection%20into%20VLMs%2C%20inferring%20the%20required%20planning%20and%20grounding%20knowledge%20that%20are%20injected%20into%20the%20agent%27s%20corresponding%20modules%20to%20address%20both%20manifestations%20of%20domain%20bias.%20Extensive%20experiments%20on%20OSWorld%20demonstrate%20GUIDE%27s%20generality%20as%20a%20plug-and-play%20component%20for%20both%20multi-agent%20systems%20and%20single-model%20agents.%20It%20consistently%20yields%20over%205%25%20improvements%20and%20reduces%20execution%20steps%20-%20without%20modifying%20any%20model%20parameters%20or%20architecture%20-%20validating%20GUIDE%20as%20an%20architecture-agnostic%20enhancement%20to%20bridge%20GUI%20agent%20domain%20bias.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26266v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGUIDE%253A%2520Resolving%2520Domain%2520Bias%2520in%2520GUI%2520Agents%2520through%2520Real-Time%2520Web%2520Video%2520Retrieval%2520and%2520Plug-and-Play%2520Annotation%26entry.906535625%3DRui%2520Xie%2520and%2520Zhi%2520Gao%2520and%2520Chenrui%2520Shi%2520and%2520Zirui%2520Shang%2520and%2520Lu%2520Chen%2520and%2520Qing%2520Li%26entry.1292438233%3DLarge%2520vision-language%2520models%2520have%2520endowed%2520GUI%2520agents%2520with%2520strong%2520general%2520capabilities%2520for%2520interface%2520understanding%2520and%2520interaction.%2520However%252C%2520due%2520to%2520insufficient%2520e {"title": "XNNTab -- Interpretable Neural Networks for Tabular Data using Sparse Autoencoders", "author": "Khawla Elhadri and J\u00f6rg Schl\u00f6tterer and Christin Seifert", "abstract": "In data-driven applications relying on tabular data, where interpretability is key, machine learning models such as decision trees and linear regression are applied. Although neural networks can provide higher predictive performance, they are not used because of their blackbox nature. In this work, we present XNNTab, a neural architecture that combines the expressiveness of neural networks and interpretability. XNNTab first learns highly non-linear feature representations, which are decomposed into monosemantic features using a sparse autoencoder (SAE). These features are then assigned human-interpretable concepts, making the overall model prediction intrinsically interpretable. XNNTab outperforms interpretable predictive models, and achieves comparable performance to its non-interpretable counterparts.", "link": "http://arxiv.org/abs/2512.13442v3", "date": "2026-03-27", "relevancy": 2.2214, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4576}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4457}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4296}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20XNNTab%20--%20Interpretable%20Neural%20Networks%20for%20Tabular%20Data%20using%20Sparse%20Autoencoders&body=Title%3A%20XNNTab%20--%20Interpretable%20Neural%20Networks%20for%20Tabular%20Data%20using%20Sparse%20Autoencoders%0AAuthor%3A%20Khawla%20Elhadri%20and%20J%C3%B6rg%20Schl%C3%B6tterer%20and%20Christin%20Seifert%0AAbstract%3A%20In%20data-driven%20applications%20relying%20on%20tabular%20data%2C%20where%20interpretability%20is%20key%2C%20machine%20learning%20models%20such%20as%20decision%20trees%20and%20linear%20regression%20are%20applied.%20Although%20neural%20networks%20can%20provide%20higher%20predictive%20performance%2C%20they%20are%20not%20used%20because%20of%20their%20blackbox%20nature.%20In%20this%20work%2C%20we%20present%20XNNTab%2C%20a%20neural%20architecture%20that%20combines%20the%20expressiveness%20of%20neural%20networks%20and%20interpretability.%20XNNTab%20first%20learns%20highly%20non-linear%20feature%20representations%2C%20which%20are%20decomposed%20into%20monosemantic%20features%20using%20a%20sparse%20autoencoder%20%28SAE%29.%20These%20features%20are%20then%20assigned%20human-interpretable%20concepts%2C%20making%20the%20overall%20model%20prediction%20intrinsically%20interpretable.%20XNNTab%20outperforms%20interpretable%20predictive%20models%2C%20and%20achieves%20comparable%20performance%20to%20its%20non-interpretable%20counterparts.%0ALink%3A%20http%3A//arxiv.org/abs/2512.13442v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXNNTab%2520--%2520Interpretable%2520Neural%2520Networks%2520for%2520Tabular%2520Data%2520using%2520Sparse%2520Autoencoders%26entry.906535625%3DKhawla%2520Elhadri%2520and%2520J%25C3%25B6rg%2520Schl%25C3%25B6tterer%2520and%2520Christin%2520Seifert%26entry.1292438233%3DIn%2520data-driven%2520applications%2520relying%2520on%2520tabular%2520data%252C%2520where%2520interpretability%2520is%2520key%252C%2520machine%2520learning%2520models%2520such%2520as%2520decision%2520trees%2520and%2520linear%2520regression%2520are%2520applied.%2520Although%2520neural%2520networks%2520can%2520provide%2520higher%2520predictive%2520performance%252C%2520they%2520are%2520not%2520used%2520because%2520of%2520their%2520blackbox%2520nature.%2520In%2520this%2520work%252C%2520we%2520present%2520XNNTab%252C%2520a%2520neural%2520architecture%2520that%2520combines%2520the%2520expressiveness%2520of%2520neural%2520networks%2520and%2520interpretability.%2520XNNTab%2520first%2520learns%2520highly%2520non-linear%2520feature%2520representations%252C%2520which%2520are%2520decomposed%2520into%2520monosemantic%2520features%2520using%2520a%2520sparse%2520autoencoder%2520%2528SAE%2529.%2520These%2520features%2520are%2520then%2520assigned%2520human-interpretable%2520concepts%252C%2520making%2520the%2520overall%2520model%2520prediction%2520intrinsically%2520interpretable.%2520XNNTab%2520outperforms%2520interpretable%2520predictive%2520models%252C%2520and%2520achieves%2520comparable%2520performance%2520to%2520its%2520non-interpretable%2520counterparts.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.13442v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=XNNTab%20--%20Interpretable%20Neural%20Networks%20for%20Tabular%20Data%20using%20Sparse%20Autoencoders&entry.906535625=Khawla%20Elhadri%20and%20J%C3%B6rg%20Schl%C3%B6tterer%20and%20Christin%20Seifert&entry.1292438233=In%20data-driven%20applications%20relying%20on%20tabular%20data%2C%20where%20interpretability%20is%20key%2C%20machine%20learning%20models%20such%20as%20decision%20trees%20and%20linear%20regression%20are%20applied.%20Although%20neural%20networks%20can%20provide%20higher%20predictive%20performance%2C%20they%20are%20not%20used%20because%20of%20their%20blackbox%20nature.%20In%20this%20work%2C%20we%20present%20XNNTab%2C%20a%20neural%20architecture%20that%20combines%20the%20expressiveness%20of%20neural%20networks%20and%20interpretability.%20XNNTab%20first%20learns%20highly%20non-linear%20feature%20representations%2C%20which%20are%20decomposed%20into%20monosemantic%20features%20using%20a%20sparse%20autoencoder%20%28SAE%29.%20These%20features%20are%20then%20assigned%20human-interpretable%20concepts%2C%20making%20the%20overall%20model%20prediction%20intrinsically%20in {"title": "From Synthetic Data to Real Restorations: Diffusion Model for Patient-specific Dental Crown Completion", "author": "D\u00e1vid Pukanec and Tibor Kub\u00edk and Michal \u0160pan\u011bl", "abstract": "We present ToothCraft, a diffusion-based model for the contextual generation of tooth crowns, trained on artificially created incomplete teeth. Building upon recent advancements in conditioned diffusion models for 3D shapes, we developed a model capable of an automated tooth crown completion conditioned on local anatomical context. To address the lack of training data for this task, we designed an augmentation pipeline that generates incomplete tooth geometries from a publicly available dataset of complete dental arches (3DS, ODD). By synthesising a diverse set of training examples, our approach enables robust learning across a wide spectrum of tooth defects. Experimental results demonstrate the strong capability of our model to reconstruct complete tooth crowns, achieving an intersection over union (IoU) of 81.8% and a Chamfer Distance (CD) of 0.00034 on synthetically damaged testing restorations. Our experiments demonstrate that the model can be applied directly to real-world cases, effectively filling in incomplete teeth, while generated crowns show minimal intersection with the opposing dentition, thus reducing the risk of occlusal interference. Access to the code, model weights, and dataset information will be available at: https://github.com/ikarus1211/VISAPP_ToothCraft", "link": "http://arxiv.org/abs/2603.26588v1", "date": "2026-03-27", "relevancy": 2.2201, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5626}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5626}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5171}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Synthetic%20Data%20to%20Real%20Restorations%3A%20Diffusion%20Model%20for%20Patient-specific%20Dental%20Crown%20Completion&body=Title%3A%20From%20Synthetic%20Data%20to%20Real%20Restorations%3A%20Diffusion%20Model%20for%20Patient-specific%20Dental%20Crown%20Completion%0AAuthor%3A%20D%C3%A1vid%20Pukanec%20and%20Tibor%20Kub%C3%ADk%20and%20Michal%20%C5%A0pan%C4%9Bl%0AAbstract%3A%20We%20present%20ToothCraft%2C%20a%20diffusion-based%20model%20for%20the%20contextual%20generation%20of%20tooth%20crowns%2C%20trained%20on%20artificially%20created%20incomplete%20teeth.%20Building%20upon%20recent%20advancements%20in%20conditioned%20diffusion%20models%20for%203D%20shapes%2C%20we%20developed%20a%20model%20capable%20of%20an%20automated%20tooth%20crown%20completion%20conditioned%20on%20local%20anatomical%20context.%20To%20address%20the%20lack%20of%20training%20data%20for%20this%20task%2C%20we%20designed%20an%20augmentation%20pipeline%20that%20generates%20incomplete%20tooth%20geometries%20from%20a%20publicly%20available%20dataset%20of%20complete%20dental%20arches%20%283DS%2C%20ODD%29.%20By%20synthesising%20a%20diverse%20set%20of%20training%20examples%2C%20our%20approach%20enables%20robust%20learning%20across%20a%20wide%20spectrum%20of%20tooth%20defects.%20Experimental%20results%20demonstrate%20the%20strong%20capability%20of%20our%20model%20to%20reconstruct%20complete%20tooth%20crowns%2C%20achieving%20an%20intersection%20over%20union%20%28IoU%29%20of%2081.8%25%20and%20a%20Chamfer%20Distance%20%28CD%29%20of%200.00034%20on%20synthetically%20damaged%20testing%20restorations.%20Our%20experiments%20demonstrate%20that%20the%20model%20can%20be%20applied%20directly%20to%20real-world%20cases%2C%20effectively%20filling%20in%20incomplete%20teeth%2C%20while%20generated%20crowns%20show%20minimal%20intersection%20with%20the%20opposing%20dentition%2C%20thus%20reducing%20the%20risk% {"title": "From Static to Dynamic: Exploring Self-supervised Image-to-Video Representation Transfer Learning", "author": "Yang Liu and Qianqian Xu and Peisong Wen and Siran Dai and Xilin Zhao and Qingming Huang", "abstract": "Recent studies have made notable progress in video representation learning by transferring image-pretrained models to video tasks, typically with complex temporal modules and video fine-tuning. However, fine-tuning heavy modules may compromise inter-video semantic separability, i.e., the essential ability to distinguish objects across videos. While reducing the tunable parameters hinders their intra-video temporal consistency, which is required for stable representations of the same object within a video. This dilemma indicates a potential trade-off between the intra-video temporal consistency and inter-video semantic separability during image-to-video transfer. To this end, we propose the Consistency-Separability Trade-off Transfer Learning (Co-Settle) framework, which applies a lightweight projection layer on top of the frozen image-pretrained encoder to adjust representation space with a temporal cycle consistency objective and a semantic separability constraint. We further provide a theoretical support showing that the optimized projection yields a better trade-off between the two properties under appropriate conditions. Experiments on eight image-pretrained models demonstrate consistent improvements across multiple levels of video tasks with only five epochs of self-supervised training. The code is available at https://github.com/yafeng19/Co-Settle.", "link": "http://arxiv.org/abs/2603.26597v1", "date": "2026-03-27", "relevancy": 2.2089, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5544}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.554}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5422}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Static%20to%20Dynamic%3A%20Exploring%20Self-supervised%20Image-to-Video%20Representation%20Transfer%20Learning&body=Title%3A%20From%20Static%20to%20Dynamic%3A%20Exploring%20Self-supervised%20Image-to-Video%20Representation%20Transfer%20Learning%0AAuthor%3A%20Yang%20Liu%20and%20Qianqian%20Xu%20and%20Peisong%20Wen%20and%20Siran%20Dai%20and%20Xilin%20Zhao%20and%20Qingming%20Huang%0AAbstract%3A%20Recent%20studies%20have%20made%20notable%20progress%20in%20video%20representation%20learning%20by%20transferring%20image-pretrained%20models%20to%20video%20tasks%2C%20typically%20with%20complex%20temporal%20modules%20and%20video%20fine-tuning.%20However%2C%20fine-tuning%20heavy%20modules%20may%20compromise%20inter-video%20semantic%20separability%2C%20i.e.%2C%20the%20essential%20ability%20to%20distinguish%20objects%20across%20videos.%20While%20reducing%20the%20tunable%20parameters%20hinders%20their%20intra-video%20temporal%20consistency%2C%20which%20is%20required%20for%20stable%20representations%20of%20the%20same%20object%20within%20a%20video.%20This%20dilemma%20indicates%20a%20potential%20trade-off%20between%20the%20intra-video%20temporal%20consistency%20and%20inter-video%20semantic%20separability%20during%20image-to-video%20transfer.%20To%20this%20end%2C%20we%20propose%20the%20Consistency-Separability%20Trade-off%20Transfer%20Learning%20%28Co-Settle%29%20framework%2C%20which%20applies%20a%20lightweight%20projection%20layer%20on%20top%20of%20the%20frozen%20image-pretrained%20encoder%20to%20adjust%20representation%20space%20with%20a%20temporal%20cycle%20consistency%20objective%20and%20a%20semantic%20separability%20constraint.%20We%20further%20provide%20a%20theoretical%20support%20showing%20that%20the%20optimized%20projection%20yields%20a%20better%20trade-off%20between%20the%20two%20properties%20under%20appropriate%20conditions.%20Experiments%20on%20eight%20image-pretrained%20models%20demonstrate%20consistent%20improvements%20across%20multiple%20levels%20of%20video%20tasks%20with%20only%20five%20epochs%20of%20self-supervised%20training.%20The%20code%20is%20available%20at%20https%3A//github.com/yafeng19/Co-Settle.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26597v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Static%2520to%2520Dynamic%253A%2520Exploring%2520Self-supervised%2520Image-to-Video%2520Representation%2520Transfer%2520Learning%26entry.906535625%3DYang%2520Liu%2520and%2520Qianqian%2520Xu%2520and%2520Peisong%2520Wen%2520and%2520Siran%2520Dai%2520and%2520Xilin%2520Zhao%2520and%2520Qingming%2520Huang%26entry.1292438233%3DRecent%2520studies%2520have%2520made%2520notable%2520progress%2520in%2520video%2520representation%2520learning%2520by%2520transferring%2520image-pretrained%2520models%2520to%2520video%2520tasks%252C%2520typically%2520with%2520complex%2520temporal%2520modules%2520and%2520video%2520fine-tuning.%2520However%252C%2520fine-tuning%2520heavy%2520modules%2520may%2520compromise%2520inter-video%2520semantic%2520separability%252C%2520i.e.%252C%2520the%2520essential%2520ability%2520to%2520distinguish%2520objects%2520across%2520videos.%2520While%2520reducing%2520the%2520tunable%2520parameters%2520hinders%2520their%2520intra-video%2520temporal%2520consistency%252C%2520which%2520is%2520required%2520for%2520stable%2520representations%2520of%2520the%2520same%2520object%2520within%2520a%2520video.%2520This%2520dilemma%2520indicates%2520a%2520potential%2520trade-off%2520between%2520the%2520intra-video%2520temporal%2520consistency%2520and%2520inter-video%2520semantic%2520separability%2520during%2520image-to-video%2520transfer.%2520To%2520this%2520end%252C%2520we%2520propose%2520the%2520Consisten 20intra-video%20temporal%20consistency%2C%20which%20is%20required%20for%20stable%20representations%20of%20the%20same%20object%20within%20a%20video.%20This%20dilemma%20indicates%20a%20potential%20trade-off%20between%20the%20intra-video%20temporal%20consistency%20and%20inter-video%20semantic%20separability%20during%20image-to-video%20transfer.%20To%20this%20end%2C%20we%20propose%20the%20Consistency-Separability%20Trade-off%20Transfer%20Learning%20%28Co-Settle%29%20framework%2C%20which%20applies%20a%20lightweight%20projection%20layer%20on%20top%20of%20the%20frozen%20image-pretrained%20encoder%20to%20adjust%20representation%20space%20with%20a%20temporal%20cycle%20consistency%20objective%20and%20a%20semantic%20separability%20constraint.%20We%20further%20provide%20a%20theoretical%20support%20showing%20that%20the%20optimized%20projection%20yields%20a%20better%20trade-off%20between%20the%20two%20properties%20under%20appropriate%20conditions.%20Experiments%20on%20eight%20image-pretrained%20models%20demonstrate%20consistent%20improvements%20across%20multiple%20levels%20of%20video%20tasks%20with%20only%20five%20epochs%20of%20self-supervised%20training.%20The%20code%20is%20available%20at%20https%3A//github.com/yafeng19/Co-Settle.&entry.1838667208=http%3A//arxiv.org/abs/2603.26597v1&entry.124074799=Read"},
{"title": "Maintaining Difficulty: A Margin Scheduler for Triplet Loss in Siamese Networks Training", "author": "Roberto Sprengel Minozzo Tomchak and Oge Marques and Lucas Garcia Pedroso and Luiz Eduardo Oliveira and Paulo Lisboa de Almeida", "abstract": "The Triplet Margin Ranking Loss is one of the most widely used loss functions in Siamese Networks for solving Distance Metric Learning (DML) problems. This loss function depends on a margin parameter \u03bc, which defines the minimum distance that should separate positive and negative pairs during training. In this work, we show that, during training, the effective margin of many triplets often exceeds the predefined value of \u03bc, provided that a sufficient number of triplets violating this margin is observed. This behavior indicates that fixing the margin throughout training may limit the learning process. Based on this observation, we propose a margin scheduler that adjusts the value of \u03bc according to the proportion of easy triplets observed at each epoch, with the goal of maintaining training difficulty over time. We show that the proposed strategy leads to improved performance when compared to both a constant margin and a monotonically increasing margin scheme. Experimental results on four different datasets show consistent gains in verification performance.", "link": "http://arxiv.org/abs/2603.26389v1", "date": "2026-03-27", "relevancy": 2.1996, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4503}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4364}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4331}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Maintaining%20Difficulty%3A%20A%20Margin%20Scheduler%20for%20Triplet%20Loss%20in%20Siamese%20Networks%20Training&body=Title%3A%20Maintaining%20Difficulty%3A%20A%20Margin%20Scheduler%20for%20Triplet%20Loss%20in%20Siamese%20Networks%20Training%0AAuthor%3A%20Roberto%20Sprengel%20Minozzo%20Tomchak%20and%20Oge%20Marques%20and%20Lucas%20Garcia%20Pedroso%20and%20Luiz%20Eduardo%20Oliveira%20and%20Paulo%20Lisboa%20de%20Almeida%0AAbstract%3A%20The%20Triplet%20Margin%20Ranking%20Loss%20is%20one%20of%20the%20most%20widely%20used%20loss%20functions%20in%20Siamese%20Networks%20for%20solving%20Distance%20Metric%20Learning%20%28DML%29%20problems.%20This%20loss%20function%20depends%20on%20a%20margin%20parameter%20%CE%BC%2C%20which%20defines%20the%20minimum%20distance%20that%20should%20separate%20positive%20and%20negative%20pairs%20during%20training.%20In%20this%20work%2C%20we%20show%20that%2C%20during%20training%2C%20the%20effective%20margin%20of%20many%20triplets%20often%20exceeds%20the%20predefined%20value%20of%20%CE%BC%2C%20provided%20that%20a%20sufficient%20number%20of%20triplets%20violating%20this%20margin%20is%20observed.%20This%20behavior%20indicates%20that%20fixing%20the%20margin%20throughout%20training%20may%20limit%20the%20learning%20process.%20Based%20on%20this%20observation%2C%20we%20propose%20a%20margin%20scheduler%20that%20adjusts%20the%20value%20of%20%CE%BC%20according%20to%20the%20proportion%20of%20easy%20triplets%20observed%20at%20each%20epoch%2C%20with%20the%20goal%20of%20maintaining%20training%20difficulty%20over%20time.%20We%20show%20that%20the%20proposed%20strategy%20leads%20to%20improved%20performance%20when%20compared%20to%20both%20a%20constant%20margin%20and%20a%20monotonically%20increasing%20margin%20scheme.%20Experimental%20results%20on%20four%20different%20datasets%20show%20consistent%20gains%20in%20verification%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26389v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQ th%2520a%2520constant%2520margin%2520and%2520a%2520monotonically%2520increasing%2520margin%2520scheme.%2520Experimental%2520results%2520on%2520four%2520different%2520datasets%2520show%2520consistent%2520gains%2520in%2520verification%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26389v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Maintaining%20Difficulty%3A%20A%20Margin%20Scheduler%20for%20Triplet%20Loss%20in%20Siamese%20Networks%20Training&entry.906535625=Roberto%20Sprengel%20Minozzo%20Tomchak%20and%20Oge%20Marques%20and%20Lucas%20Garcia%20Pedroso%20and%20Luiz%20Eduardo%20Oliveira%20and%20Paulo%20Lisboa%20de%20Almeida&entry.1292438233=The%20Triplet%20Margin%20Ranking%20Loss%20is%20one%20of%20the%20most%20widely%20used%20loss%20functions%20in%20Siamese%20Networks%20for%20solving%20Distance%20Metric%20Learning%20%28DML%29%20problems.%20This%20loss%20function%20depends%20on%20a%20margin%20parameter%20%CE%BC%2C%20which%20defines%20the%20minimum%20distance%20that%20should%20separate%20positive%20and%20negative%20pairs%20during%20training.%20In%20this%20work%2C%20we%20show%20that%2C%20during%20training%2C%20the%20effective%20margin%20of%20many%20triplets%20often%20exceeds%20the%20predefined%20value%20of%20%CE%BC%2C%20provided%20that%20a%20sufficient%20number%20of%20triplets%20violating%20this%20margin%20is%20observed.%20This%20behavior%20indicates%20that%20fixing%20the%20margin%20throughout%20training%20may%20limit%20the%20learning%20process.%20Based%20on%20this%20observation%2C%20we%20propose%20a%20margin%20scheduler%20that%20adjusts%20the%20value%20of%20%CE%BC%20according%20to%20the%20proportion%20of%20easy%20triplets%20observed%20at%20each%20epoch%2C%20with%20the%20goal%20of%20maintaining%20training%20difficulty%20over%20time.%20We%20show%20that%20the%20proposed%20strategy%20leads%20to%20improved%20performance%20when%20compared%20to%20both% {"title": "Partial Motion Imitation for Learning Cart Pushing with Legged Manipulators", "author": "Mili Das and Morgan Byrd and Donghoon Baek and Sehoon Ha", "abstract": "Loco-manipulation is a key capability for legged robots to perform practical mobile manipulation tasks, such as transporting and pushing objects, in real-world environments. However, learning robust loco-manipulation skills remains challenging due to the difficulty of maintaining stable locomotion while simultaneously performing precise manipulation behaviors. This work proposes a partial imitation learning approach that transfers the locomotion style learned from a locomotion task to cart loco-manipulation. A robust locomotion policy is first trained with extensive domain and terrain randomization, and a loco-manipulation policy is then learned by imitating only lower-body motions using a partial adversarial motion prior. We conduct experiments demonstrating that the learned policy successfully pushes a cart along diverse trajectories in IsaacLab and transfers effectively to MuJoCo. We also compare our method to several baselines and show that the proposed approach achieves more stable and accurate loco-manipulation behaviors.", "link": "http://arxiv.org/abs/2603.26659v1", "date": "2026-03-27", "relevancy": 2.1846, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5884}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5392}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5362}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Partial%20Motion%20Imitation%20for%20Learning%20Cart%20Pushing%20with%20Legged%20Manipulators&body=Title%3A%20Partial%20Motion%20Imitation%20for%20Learning%20Cart%20Pushing%20with%20Legged%20Manipulators%0AAuthor%3A%20Mili%20Das%20and%20Morgan%20Byrd%20and%20Donghoon%20Baek%20and%20Sehoon%20Ha%0AAbstract%3A%20Loco-manipulation%20is%20a%20key%20capability%20for%20legged%20robots%20to%20perform%20practical%20mobile%20manipulation%20tasks%2C%20such%20as%20transporting%20and%20pushing%20objects%2C%20in%20real-world%20environments.%20However%2C%20learning%20robust%20loco-manipulation%20skills%20remains%20challenging%20due%20to%20the%20difficulty%20of%20maintaining%20stable%20locomotion%20while%20simultaneously%20performing%20precise%20manipulation%20behaviors.%20This%20work%20proposes%20a%20partial%20imitation%20learning%20approach%20that%20transfers%20the%20locomotion%20style%20learned%20from%20a%20locomotion%20task%20to%20cart%20loco-manipulation.%20A%20robust%20locomotion%20policy%20is%20first%20trained%20with%20extensive%20domain%20and%20terrain%20randomization%2C%20and%20a%20loco-manipulation%20policy%20is%20then%20learned%20by%20imitating%20only%20lower-body%20motions%20using%20a%20partial%20adversarial%20motion%20prior.%20We%20conduct%20experiments%20demonstrating%20that%20the%20learned%20policy%20successfully%20pushes%20a%20cart%20along%20diverse%20trajectories%20in%20IsaacLab%20and%20transfers%20effectively%20to%20MuJoCo.%20We%20also%20compare%20our%20method%20to%20several%20baselines%20and%20show%20that%20the%20proposed%20approach%20achieves%20more%20stable%20and%20accurate%20loco-manipulation%20behaviors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26659v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPartial%2520Motion%2520Imitation%2520for%2520Learning%2520Cart%2520Pushing%2520with%2520Legged%2520Manipulators%26entry.906535625%3DMili%2520Das%2520and%2520Morgan%2520Byrd%2520and%2520Donghoon%2520Baek%2520and%2520Sehoon%2520Ha%26entry.1292438233%3DLoco-manipulation%2520is%2520a%2520key%2520capabili {"title": "MM-OVSeg:Multimodal Optical-SAR Fusion for Open-Vocabulary Segmentation in Remote Sensing", "author": "Yimin Wei and Aoran Xiao and Hongruixuan Chen and Junshi Xia and Naoto Yokoya", "abstract": "Open-vocabulary segmentation enables pixel-level recognition from an open set of textual categories, allowing generalization beyond fixed classes. Despite great potential in remote sensing, progress in this area remains largely limited to clear-sky optical data and struggles under cloudy or haze-contaminated conditions. We present MM-OVSeg, a multimodal Optical-SAR fusion framework for resilient open-vocabulary segmentation under adverse weather conditions. MM-OVSeg leverages the complementary strengths of the two modalities--optical imagery provides rich spectral semantics, while synthetic aperture radar (SAR) offers cloud-penetrating structural cues. To address the cross-modal domain gap and the limited dense prediction capability of current vision-language models, we propose two key designs: a cross-modal unification process for multi-sensor representation alignment, and a dual-encoder fusion module that integrates hierarchical features from multiple vision foundation models for text-aligned multimodal segmentation. Extensive experiments demonstrate that MM-OVSeg achieves superior robustness and generalization across diverse cloud conditions. The source dataset and code are available at https://github.com/Jimmyxichen/MM-OVSeg.", "link": "http://arxiv.org/abs/2603.17528v2", "date": "2026-03-27", "relevancy": 2.1825, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5717}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.543}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MM-OVSeg%3AMultimodal%20Optical-SAR%20Fusion%20for%20Open-Vocabulary%20Segmentation%20in%20Remote%20Sensing&body=Title%3A%20MM-OVSeg%3AMultimodal%20Optical-SAR%20Fusion%20for%20Open-Vocabulary%20Segmentation%20in%20Remote%20Sensing%0AAuthor%3A%20Yimin%20Wei%20and%20Aoran%20Xiao%20and%20Hongruixuan%20Chen%20and%20Junshi%20Xia%20and%20Naoto%20Yokoya%0AAbstract%3A%20Open-vocabulary%20segmentation%20enables%20pixel-level%20recognition%20from%20an%20open%20set%20of%20textual%20categories%2C%20allowing%20generalization%20beyond%20fixed%20classes.%20Despite%20great%20potential%20in%20remote%20sensing%2C%20progress%20in%20this%20area%20remains%20largely%20limited%20to%20clear-sky%20optical%20data%20and%20struggles%20under%20cloudy%20or%20haze-contaminated%20conditions.%20We%20present%20MM-OVSeg%2C%20a%20multimodal%20Optical-SAR%20fusion%20framework%20for%20resilient%20open-vocabulary%20segmentation%20under%20adverse%20weather%20conditions.%20MM-OVSeg%20leverages%20the%20complementary%20strengths%20of%20the%20two%20modalities--optical%20imagery%20provides%20rich%20spectral%20semantics%2C%20while%20synthetic%20aperture%20radar%20%28SAR%29%20offers%20cloud-penetrating%20structural%20cues.%20To%20address%20the%20cross-modal%20domain%20gap%20and%20the%20limited%20dense%20prediction%20capability%20of%20current%20vision-language%20models%2C%20we%20propose%20two%20key%20designs%3A%20a%20cross-modal%20unification%20process%20for%20multi-sensor%20representation%20alignment%2C%20and%20a%20dual-encoder%20fusion%20module%20that%20integrates%20hierarchical%20features%20from%20multiple%20vision%20foundation%20models%20for%20text-aligned%20multimodal%20segmentation.%20Extensive%20experiments%20demonstrate%20that%20MM-OVSeg%20achieves%20superior%20robustness%20and%20generalization%20across%20diverse%20cloud%20conditions.%20The%20source%20dataset%20a {"title": "Ruka-v2: Tendon Driven Open-Source Dexterous Hand with Wrist and Abduction for Robot Learning", "author": " Xinqi and  Liu and Ruoxi Hu and Alejandro Ojeda Olarte and Zhuoran Chen and Kenny Ma and Charles Cheng Ji and Lerrel Pinto and Raunaq Bhirangi and Irmak Guzey", "abstract": "Lack of accessible and dexterous robot hardware has been a significant bottleneck to achieving human-level dexterity in robots. Last year, we released Ruka, a fully open-sourced, tendon-driven humanoid hand with 11 degrees of freedom - 2 per finger and 3 at the thumb - buildable for under $1,300. It was one of the first fully open-sourced humanoid hands, and introduced a novel data-driven approach to finger control that captures tendon dynamics within the control system. Despite these contributions, Ruka lacked two degrees of freedom essential for closely imitating human behavior: wrist mobility and finger adduction/abduction. In this paper, we introduce Ruka-v2: a fully open-sourced, tendon-driven humanoid hand featuring a decoupled 2-DOF parallel wrist and abduction/adduction at the fingers. The parallel wrist adds smooth, independent flexion/extension and radial/ulnar deviation, enabling manipulation in confined environments such as cabinets. Abduction enables motions such as grasping thin objects, in-hand rotation, and calligraphy. We present the design of Ruka-v2 and evaluate it against Ruka through user studies on teleoperated tasks, finding a 51.3% reduction in completion time and a 21.2% increase in success rate. We further demonstrate its full range of applications for robot learning: bimanual and single-arm teleoperation across 13 dexterous tasks, and autonomous policy learning on 3 tasks. All 3D print files, assembly instructions, controller software, and videos are available at https://ruka-hand-v2.github.io/ .", "link": "http://arxiv.org/abs/2603.26660v1", "date": "2026-03-27", "relevancy": 2.1766, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5658}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5396}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5013}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ruka-v2%3A%20Tendon%20Driven%20Open-Source%20Dexterous%20Hand%20with%20Wrist%20and%20Abduction%20for%20Robot%20Learning&body=Title%3A%20Ruka-v2%3A%20Tendon%20Driven%20Open-Source%20Dexterous%20Hand%20with%20Wrist%20and%20Abduction%20for%20Robot%20Learning%0AAuthor%3A%20%20Xinqi%20and%20%20Liu%20and%20Ruoxi%20Hu%20and%20Alejandro%20Ojeda%20Olarte%20and%20Zhuoran%20Chen%20and%20Kenny%20Ma%20and%20Charles%20Cheng%20Ji%20and%20Lerrel%20Pinto%20and%20Raunaq%20Bhirangi%20and%20Irmak%20Guzey%0AAbstract%3A%20Lack%20of%20accessible%20and%20dexterous%20robot%20hardware%20has%20been%20a%20significant%20bottleneck%20to%20achieving%20human-level%20dexterity%20in%20robots.%20Last%20year%2C%20we%20released%20Ruka%2C%20a%20fully%20open-sourced%2C%20tendon-driven%20humanoid%20hand%20with%2011%20degrees%20of%20freedom%20-%202%20per%20finger%20and%203%20at%20the%20thumb%20-%20buildable%20for%20under%20%241%2C300.%20It%20was%20one%20of%20the%20first%20fully%20open-sourced%20humanoid%20hands%2C%20and%20introduced%20a%20novel%20data-driven%20approach%20to%20finger%20control%20that%20captures%20tendon%20dynamics%20within%20the%20control%20system.%20Despite%20these%20contributions%2C%20Ruka%20lacked%20two%20degrees%20of%20freedom%20essential%20for%20closely%20imitating%20human%20behavior%3A%20wrist%20mobility%20and%20finger%20adduction/abduction.%20In%20this%20paper%2C%20we%20introduce%20Ruka-v2%3A%20a%20fully%20open-sourced%2C%20tendon-driven%20humanoid%20hand%20featuring%20a%20decoupled%202-DOF%20parallel%20wrist%20a {"title": "EdgeCrafter: Compact ViTs for Edge Dense Prediction via Task-Specialized Distillation", "author": "Longfei Liu and Yongjie Hou and Yang Li and Qirui Wang and Youyang Sha and Yongjun Yu and Yinzhi Wang and Peizhe Ru and Xuanlong Yu and Xi Shen", "abstract": "Deploying high-performance dense prediction models on resource-constrained edge devices remains challenging due to strict limits on computation and memory. In practice, lightweight systems for object detection, instance segmentation, and pose estimation are still dominated by CNN-based architectures such as YOLO, while compact Vision Transformers (ViTs) often struggle to achieve similarly strong accuracy efficiency tradeoff, even with large scale pretraining. We argue that this gap is largely due to insufficient task specific representation learning in small scale ViTs, rather than an inherent mismatch between ViTs and edge dense prediction. To address this issue, we introduce EdgeCrafter, a unified compact ViT framework for edge dense prediction centered on ECDet, a detection model built from a distilled compact backbone and an edge-friendly encoder decoder design. On the COCO dataset, ECDet-S achieves 51.7 AP with fewer than 10M parameters using only COCO annotations. For instance segmentation, ECInsSeg achieves performance comparable to RF-DETR while using substantially fewer parameters. For pose estimation, ECPose-X reaches 74.8 AP, significantly outperforming YOLO26Pose-X (71.6 AP). These results show that compact ViTs, when paired with task-specialized distillation and edge-aware design, can be a practical and competitive option for edge dense prediction. Code is available at: https://intellindust-ai-lab.github.io/projects/EdgeCrafter/", "link": "http://arxiv.org/abs/2603.18739v3", "date": "2026-03-27", "relevancy": 2.161, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5446}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5403}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5385}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EdgeCrafter%3A%20Compact%20ViTs%20for%20Edge%20Dense%20Prediction%20via%20Task-Specialized%20Distillation&body=Title%3A%20EdgeCrafter%3A%20Compact%20ViTs%20for%20Edge%20Dense%20Prediction%20via%20Task-Specialized%20Distillation%0AAuthor%3A%20Longfei%20Liu%20and%20Yongjie%20Hou%20and%20Yang%20Li%20and%20Qirui%20Wang%20and%20Youyang%20Sha%20and%20Yongjun%20Yu%20and%20Yinzhi%20Wang%20and%20Peizhe%20Ru%20and%20Xuanlong%20Yu%20and%20Xi%20Shen%0AAbstract%3A%20Deploying%20high-performance%20dense%20prediction%20models%20on%20resource-constrained%20edge%20devices%20remains%20challenging%20due%20to%20strict%20limits%20on%20computation%20and%20memory.%20In%20practice%2C%20lightweight%20systems%20for%20object%20detection%2C%20instance%20segmentation%2C%20and%20pose%20estimation%20are%20still%20dominated%20by%20CNN-based%20architectures%20such%20as%20YOLO%2C%20while%20compact%20Vision%20Transformers%20%28ViTs%29%20often%20struggle%20to%20achieve%20similarly%20strong%20accuracy%20efficiency%20tradeoff%2C%20even%20with%20large%20scale%20pretraining.%20We%20argue%20that%20this%20gap%20is%20largely%20due%20to%20insufficient%20task%20specific%20representation%20learning%20in%20small%20scale%20ViTs%2C%20rather%20than%20an%20inherent%20mismatch%20between%20ViTs%20and%20edge%20dense%20prediction.%20To%20address%20this%20issue%2C%20we%20introduce%20EdgeCrafter%2C%20a%20unified%20compact%20ViT%20framework%20for%20edge%20dense%20prediction%20centered%20on%20ECDet%2C%20a%20detection%20model%20built%20from%20a%20distilled%20compact%20backbone%20and%20an%20edge-friendly%20encoder%20decoder%20design.%20On%20the%20COCO%20dataset%2C%20ECDet-S%20achieves%2051.7%20AP%20with%20fe

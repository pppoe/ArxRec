{"title": "GeoSURGE: Geo-localization using Semantic Fusion with Hierarchy of Geographic Embeddings", "author": "Angel Daruna and Nicholas Meegan and Han-Pang Chiu and Supun Samarasekera and Rakesh Kumar", "abstract": "Worldwide visual geo-localization aims to determine the geographic location of an image anywhere on Earth using only its visual content. Despite recent progress, learning expressive representations of geographic space remains challenging due to the inherently low-dimensional nature of geographic coordinates. We formulate global geo-localization as aligning the visual representation of a query image with a learned geographic representation. Our approach explicitly models the world as a hierarchy of learned geographic embeddings, enabling a distributed and multi-scale representation of geographic space. In addition, we introduce a semantic fusion module that efficiently integrates appearance features with semantic segmentation through latent cross-attention, producing a more robust visual representation for localization. Experiments on five widely used geo-localization benchmarks demonstrate that our method achieves new state-of-the-art results on 22 of 25 reported metrics. Ablation studies show that these improvements are primarily driven by the proposed geographic representation and semantic fusion mechanism.", "link": "http://arxiv.org/abs/2510.01448v2", "date": "2026-03-27", "relevancy": 2.6694, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5668}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5387}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4961}], "mailto": "mailto:haoxiang.li.202 presentation%2520and%2520semantic%2520fusion%2520mechanism.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.01448v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GeoSURGE%3A%20Geo-localization%20using%20Semantic%20Fusion%20with%20Hierarchy%20of%20Geographic%20Embeddings&entry.906535625=Angel%20Daruna%20and%20Nicholas%20Meegan%20and%20Han-Pang%20Chiu%20and%20Supun%20Samarasekera%20and%20Rakesh%20Kumar&entry.1292438233=Worldwide%20visual%20geo-localization%20aims%20to%20determine%20the%20geographic%20location%20of%20an%20image%20anywhere%20on%20Earth%20using%20only%20its%20visual%20content.%20Despite%20recent%20progress%2C%20learning%20expressive%20representations%20of%20geographic%20space%20remains%20challenging%20due%20to%20the%20inherently%20low-dimensional%20nature%20of%20geographic%20coordinates.%20We%20formulate%20global%20geo-localization%20as%20aligning%20the%20visual%20representation%20of%20a%20query%20image%20with%20a%20learned%20geographic%20representation.%20Our%20approach%20explicitly%20models%20the%20world%20as%20a%20hierarchy%20of%20learned%20geographic%20embeddings%2C%20enabling%20a%20distributed%20and%20multi-scale%20representation%20of%20geographic%20space.%20In%20addition%2C%20we%20introduce%20a%20semantic%20fusion%20module%20that%20efficiently%20integrates%20appearance%20features%20with%20semantic%20segmentation%20through%20latent%20cross-attention%2C%20producing%20a%20more%20robust%20visual%20representation%20for%20localization.%20Experiments%20on%20five%20widely%20used%20geo-localization%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20new%20state-of-the-art%20results%20on%2022%20of%2025%20reported%20metrics.%20Ablation%20studies%20show%20that%20these%20improvements%20are%20primarily%20driven%20by%20the%20proposed%20geographic%20representation%20and%20semantic%20fusion%20mechanism.&entry.1838667208=http%3A//arxiv.org/abs/2510 {"title": "LoGSAM: Parameter-Efficient Cross-Modal Grounding for MRI Segmentation", "author": "Mohammad Robaitul Islam Bhuiyan and Sheethal Bhat and Melika Qahqaie and Tri-Thien Nguyen and Paula Andrea Perez-Toro and Tomas Arias-Vergara and Andreas Maier", "abstract": "Precise localization and delineation of brain tumors using Magnetic Resonance Imaging (MRI) are essential for planning therapy and guiding surgical decisions. However, most existing approaches rely on task-specific supervised models and are constrained by the limited availability of annotated data. To address this, we propose LoGSAM, a parameter-efficient, detection-driven framework that transforms radiologist dictation into text prompts for foundation-model-based localization and segmentation. Radiologist speech is first transcribed and translated using a pretrained Whisper ASR model, followed by negation-aware clinical NLP to extract tumor-specific textual prompts. These prompts guide text-conditioned tumor localization via a LoRA-adapted vision-language detection model, Grounding DINO (GDINO). The LoRA adaptation updates using 5% of the model parameters, thereby enabling computationally efficient domain adaptation while preserving pretrained cross-modal knowledge. The predicted bounding boxes are used as prompts for MedSAM to generate pixel-level tumor masks without any additional fine-tuning. Conditioning the frozen MedSAM on LoGSAM-derived priors yields a state-of-the-art dice score of 80.32% on BRISC 2025. In addition, we evaluate the full pipeline using German dictations from a board-certified radiologist on 12 unseen MRI scans, achieving 91.7% case-level accuracy. These results highlight the feasibility of constructing a modular, speech-to-segmentation pipeline by intelligently leveraging pretrained foundation models with minimal parameter updates.", "link": "http://arxiv.org/abs/2603.17576v2", "date": "2026-03-27", "relevancy": 2.6359, "topK": [{"title": "Lexicon3D: Probing Visual Foundation {"title": "Mitigating the Reasoning Tax in Vision-Language Fine-Tuning with Input-Adaptive Depth Aggregation", "author": "Yiming Ren and Yujiu Yang and Junjie Wang", "abstract": "Supervised fine-tuning (SFT) on visual instruction data often improves perceptual capabilities in vision-language models (VLMs) while degrading reasoning performance, creating a persistent reasoning tax during post-training. We investigate whether this degradation is related to disrupted access to depth-wise representations, and find that even fixed cross-depth aggregation substantially restores reasoning, suggesting that preserved cross-depth access is an important missing factor in VLM fine-tuning. Building on this observation, we propose Input-Adaptive Depth Aggregation (IADA), a lightweight mechanism that makes cross-depth retrieval input-adaptive, modality-aware, and efficiently parameterized through a low-rank bottleneck. On Qwen3-VL-2B, IADA improves the average reasoning score by 9.5 points and the average perception score by $3.3$ points over LoRA-only fine-tuning with only 0.14M additional parameters, with the strongest gains appearing in parameter-efficient low-rank settings.", "link": "http://arxiv.org/abs/2603.26330v1", "date": "2026-03-27", "relevancy": 2.629, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5263}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5263}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5247}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mitigating%20the%20Reasoning%20Tax%20in%20Vision-Language%20Fine-Tuning%20with%20Input-Adaptive%20Depth%20Aggregation&body=Title%3A%20Mitigating%20the%20Reasoning%20T {"title": "T-800: An 800 Hz Data Glove for Precise Hand Gesture Tracking", "author": "Haoyang Luo and Zihang Zhao and Leiyao Cui and Saiyao Zhang and Liu Yang and Zhi Han and Xiyuan Tang and Yixin Zhu", "abstract": "Human dexterity relies on rapid, sub-second motor adjustments, yet capturing these high-frequency dynamics remains an enduring challenge in biomechanics and robotics. Existing motion capture paradigms are compromised by a trade-off between temporal resolution and visual occlusion, failing to record the fine-grained hand motion of fast, contact-rich manipulation. Here we introduce T-800, a high-bandwidth data glove system that achieves synchronized, full-hand motion tracking at 800 Hz. By integrating a novel broadcast-based synchronization mechanism with a mechanical stress isolation architecture, our system maintains sub-frame temporal alignment across 18 distributed inertial measurement units (IMUs) during extended, vigorous movements. We demonstrate that T-800 recovers fine-grained manipulation details previously lost to temporal undersampling. Our analysis reveals that human dexterity exhibits significantly high-frequency motion energy (>100 Hz) that was fundamentally inaccessible due to the Nyquist sampling limit imposed by previous hardware constraints. To validate the system's utility for robotic manipulation, we implement a kinematic retargeting algorithm that maps T-800's high-fidelity human gestures onto dexterous robotic hand models. This demonstrates that the high-frequency motion data can be accurately translated while respecting the kinematic constraints of robotic hands, providing the rich behavioral data necessary for training robust control policies in the future.", "link": "http://arxiv.org/abs/2603.26403v1", "date": "2026-03-27", "relevancy": 2.6259, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5449}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5336}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.497}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20T-800%3A%20An%20800%20Hz%20Data%20Glove%20for%20Precise%20Hand%20Gesture%20Tracking&body=Title%3A%20T-800%3A%20An%20800%20Hz%20Data%20Glove%20for%20Precise%20Hand%20Gesture%20Tracking%0AAuthor%3A%20Haoyang%20Luo%20and%20Zihang%20Zhao%20and%20Leiyao%20Cui%20and%20Saiyao%20Zhang%20and%20Liu%20Yang%20and%20Zhi%20Han%20and%20Xiyuan%20Tang%20and%20Yixin%20Zhu%0AAbstract%3A%20Human%20dexterity%20relies%20on%20rapid%2C%20sub-second%20motor%20adjustments%2C%20yet%20capturing%20these%20high-frequency%20dynamics%20remains%20an%20enduring%20challenge%20in%20biomechanics%20and%20robotics.%20Existing%20motion%20capture%20paradigms%20are%20compromised%20by%20a%20trade-off%20between%20temporal%20resolution%20and%20visual%20occlusion%2C%20failing%20to%20record%20the%20fine-grained%20hand%20motion%20of%20fast%2C%20contact-rich%20manipulation.%20Here%20we%20introduce%20T-800%2C%20a%20high-bandwidth%20data%20glove%20system%20that%20achieves%20synchronized%2C%20full-hand%20motion%20tracking%20at%20800%20Hz.%20By%20integrating%20a%20novel%20broadcast-based%20synchronization%20mechanism%20with%20a%20mechanical%20stress%20isolation%20architecture%2C%20our%20system%20maintains%20sub-frame%20temporal%20alignment%20across%2018%20distributed%20inertial%20measurement%20units%20%28IMUs%29%20during%20extended%2C%20vigorous%20movements.%20We%20demonstrate%20that%20T-800%20recovers%20fine-grained%20manipulation%20details%20previously%20lost%20to%20temporal%20undersampling.%20Our%20analysis%20reveals%20that%20human%20dexterity%20exhibits%20significantly%20high-frequency%20motion%20energy%20%28%3E100%20Hz%29%20that%20was%20fundamentally%20inaccessible%20due%20to%20the%20Nyquist%20sampling%20limit%20imposed%20by%20previous%20hardware%20constraints.%20To%20validate%20the%20system%27s%20utility%20for%20robotic%20manipulation%2C%20we%20implement%20a%20kinematic%20retargeting%20algorithm%20that%20maps%20T-800%27s%20high-fidelity%20human%20gestures%20onto%20dexterous%20robotic%20hand%20models.%20This%20demonstrates%20that%20the%20high-frequency%20motion%20data%20can%20be%20accurately%20translated%20while%20respecting%20the%20kinematic%20constraints%20of%20robotic%20hands%2C%20providing%20the%20rich%20behavioral%20data%20necessary%20for%20training%20robust%20control%20policies%20in%20the%20future.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26403v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DT-800%253A%2520An%2520800%2520Hz%2520Data%2520Glove%2520for%2520Precise%2520Hand%2520Gesture%2520Tracking%26entry.906535625%3DHaoyang%2520Luo%2520and%2520Zihang%2520Zhao%2520and%2520Leiyao%2520Cui%2520and%2520Saiyao%2520Zhang%2520and%2520Liu%2520Yang%2520and%2520Zhi%2520Han%2520and%2520Xiyuan%2520Tang%2520and%2520Yixin%2520Zhu%26entry.1292438233%3DHuman%2520dexterity%2520relies%2520on%2520rapid%252C%2520sub-second%2520motor%2520adjustments%252C%2520yet%2520capturing%2520these%2520high-frequency%2520dynamics%2520remains%2520an%2520enduring%2520challenge%2520in%2520biomechanics%2520and%2520robotics.%2520Existing%2520motion%2520capture%2520paradigms%2520are%2520compromised%2520by%2520a%2520trade-off%2520between%2520temporal%2520resolution%2520and%2520visual%2520occlusion%252C%2520failing%2520to%2520record%2520the%2520fine-grained%2520hand%2520motion%2520of%2520fast%252C%2520contact-rich%2520manipulation.%2520Here%2520we%2520introduce%2520T-800%252C%2520a%2520high-bandwidth%2520data%2520glove%2520system%2520that%2520achieves%2520synchronized%252C%2520full-hand%2520motion%2520tracking%2520at%2520800%2520Hz.%2520By%2520integrating%2520a%2520novel%2520broadcast-based%2520synchronization%2520mechanism%2 {"title": "Vision2Web: A Hierarchical Benchmark for Visual Website Development with Agent Verification", "author": "Zehai He and Wenyi Hong and Zhen Yang and Ziyang Pan and Mingdao Liu and Xiaotao Gu and Jie Tang", "abstract": "Recent advances in large language models have improved the capabilities of coding agents, yet systematic evaluation of complex, end-to-end website development remains limited. To address this gap, we introduce Vision2Web, a hierarchical benchmark for visual website development, spanning from static UI-to-code generation, interactive multi-page frontend reproduction, to long-horizon full-stack website development. The benchmark is constructed from real-world websites and comprises a total of 193 tasks across 16 categories, with 918 prototype images and 1,255 test cases. To support flexible, thorough and reliable evaluation, we propose workflow-based agent verification paradigm based on two complementary components: a GUI agent verifier and a VLM-based judge. We evaluate multiple visual language models instantiated under different coding-agent frameworks, revealing substantial performance gaps at all task levels, with state-of-the-art models still struggling on full-stack development.", "link": "http://arxiv.org/abs/2603.26648v1", "date": "2026-03-27", "relevancy": 2.6174, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vision2Web%3A%20A%20Hierarchical%20Benchmark%20for%20Visual%20Website%20Development%20with%20Agent%20 {"title": "SparseCam4D: Spatio-Temporally Consistent 4D Reconstruction from Sparse Cameras", "author": "Weihong Pan and Xiaoyu Zhang and Zhuang Zhang and Zhichao Ye and Nan Wang and Haomin Liu and Guofeng Zhang", "abstract": "High-quality 4D reconstruction enables photorealistic and immersive rendering of the dynamic real world. However, unlike static scenes that can be fully captured with a single camera, high-quality dynamic scenes typically require dense arrays of tens or even hundreds of synchronized cameras. Dependence on such costly lab setups severely limits practical scalability. The reliance on such costly lab setups severely limits practical scalability. To this end, we propose a sparse-camera dynamic reconstruction framework that exploits abundant yet inconsistent generative observations. Our key innovation is the Spatio-Temporal Distortion Field, which provides a unified mechanism for modeling inconsistencies in generative observations across both spatial and temporal dimensions. Building on this, we develop a complete pipeline that enables 4D reconstruction from sparse and uncalibrated camera inputs. We evaluate our method on multi-camera dynamic scene benchmarks, achieving spatio-temporally consistent high-fidelity renderings and significantly outperforming existing approaches.", "link": "http://arxiv.org/abs/2603.26481v1", "date": "2026-03-27", "relevancy": 2.6138, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6568}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6538}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6518}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SparseCam4D%3A%20Spatio-Temporally%20Consistent%204D%20Reconstruction%20from%20Sparse%20Cameras&body=Title%3A%20SparseCam4D%3A%20Spatio-Temporally%20Consistent%204D%20Reconstruction%20from%20Sparse%20Cameras%0AAuthor%3A%20Weihong%20Pan%20and%20Xiaoyu%20Zhang%20and%20Zhuang%20Zhang%20and%20Zhichao%20Ye%20and%20Nan%20Wang%20and%20Haomin%20Liu%20and%20Guofeng%20Zhang%0AAbstract%3A%20High-quality%204D%20reconstruction%20enables%20photorealistic%20and%20immersive%20rendering%20of%20the%20dynamic%20real%20world.%20However%2C%20unlike%20static%20scenes%20that%20can%20be%20fully%20captured%20with%20a%20single%20camera%2C%20high-quality%20dynamic%20scenes%20typically%20require%20dense%20arrays%20of%20tens%20or%20even%20hundreds%20of%20synchronized%20cameras.%20Dependence%20on%20such%20costly%20lab%20setups%20severely%20limits%20practical%20scalability.%20The%20reliance%20on%20such%20costly%20lab%20setups%20severely%20limits%20practical%20scalability.%20To%20this%20end%2C%20we%20propose%20a%20sparse-camera%20dynamic%20reconstruction%20framework%20that%20exploits%20abundant%20yet%20inconsistent%20generative%20observations.%20Our%20key%20innovation%20is%20the%20Spatio-Temporal%20Distortion%20Field%2C%20which%20provides%20a%20unified%20mechanism%20for%20modeling%20inconsistencies%20in%20generative%20observations%20across%20both%20spatial%20and%20temporal%20dimensions.%20Building%20on%20this%2C%20we%20develop%20a%20complete%20pipeline%20that%20enables%204D%20reconstruction%20from%20sparse%20and%20uncalibrated%20camera%20inputs.%20We%20evaluate%20our%20method%20on%20multi-camera%20dynamic%20scene%20benchmarks%2C%20achieving%20spatio-temporally%20consistent%20high-fidelity%20renderings%20and%20significantly%20outperforming%20existing%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26481v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSparseCam4D%253A%2520Spatio-Temporally%2520Consistent%25204D%2520Reconstruction%2520from%2520Sparse%2520Cameras%26entry.9065 {"title": "Zero-Shot Depth from Defocus", "author": "Yiming Zuo and Hongyu Wen and Venkat Subramanian and Patrick Chen and Karhan Kayan and Mario Bijelic and Felix Heide and Jia Deng", "abstract": "Depth from Defocus (DfD) is the task of estimating a dense metric depth map from a focus stack. Unlike previous works overfitting to a certain dataset, this paper focuses on the challenging and practical setting of zero-shot generalization. We first propose a new real-world DfD benchmark ZEDD, which contains 8.3x more scenes and significantly higher quality images and ground-truth depth maps compared to previous benchmarks. We also design a novel network architecture named FOSSA. FOSSA is a Transformer-based architecture with novel designs tailored to the DfD task. The key contribution is a stack attention layer with a focus distance embedding, allowing efficient information exchange across the focus stack. Finally, we develop a new training data pipeline allowing us to utilize existing large-scale RGBD datasets to generate synthetic focus stacks. Experiment results on ZEDD and other benchmarks show a significant improvement over the baselines, reducing errors by up to 55.7%. The ZEDD benchmark is released at https://zedd.cs.princeton.edu. The code and checkpoints are released at https://github.com/princeton-vl/FOSSA.", "link": "http://arxiv.org/abs/2603.26658v1", "date": "2026-03-27", "relevancy": 2.613, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5243}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5217}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5217}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5B {"title": "D-GATNet: Interpretable Temporal Graph Attention Learning for ADHD Identification Using Dynamic Functional Connectivity", "author": "Qurat Ul Ain and Alptekin Temizel and Soyiba Jawed", "abstract": "Attention Deficit Hyperactivity Disorder (ADHD) is a prevalent neurodevelopmental disorder whose neuroimaging-based diagnosis remains challenging due to complex time-varying disruptions in brain connectivity. Functional MRI (fMRI) provides a powerful non-invasive modality for identifying functional alterations. Existing deep learning (DL) studies employ diverse neuroimaging features; however, static functional connectivity remains widely used, whereas dynamic connectivity modeling is comparatively underexplored. Moreover, many DL models lack interpretability. In this work, we propose D-GATNet, an interpretable temporal graph-based framework for automated ADHD classification using dynamic functional connectivity (dFC). Sliding-window Pearson correlation constructs sequences of functional brain graphs with regions of interest as nodes and connectivity strengths as edges. Spatial dependencies are learned via a multi-layer Graph Attention Network, while temporal dynamics are modeled using 1D convolution followed by temporal attention. Interpretability is achieved through graph attention weights revealing dominant ROI interactions, ROI importance scores identifying influential regions, and temporal attention emphasizing informative connectivity segments. Experiments on the Peking University site of the ADHD-200 dataset using stratified 10-fold cross-validation with a 5-seed ensemble achieved 85.18% +_5.64 balanced accuracy and 0.881 AUC, outperforming state-of-the-art methods. Attention analysis reveals cerebellar and default mode network disruptions, indicating potential neuroimaging biomarkers.", "link": "http://arxiv.org/abs/2603.26308v1", "date": "2026-03-27", "relevancy": 2.5916, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.o dependencies%20are%20learned%20via%20a%20multi-layer%20Graph%20Attention%20Network%2C%20while%20temporal%20dynamics%20are%20modeled%20using%201D%20convolution%20followed%20by%20temporal%20attention.%20Interpretability%20is%20achieved%20through%20graph%20attention%20weights%20revealing%20dominant%20ROI%20interactions%2C%20ROI%20importance%20scores%20identifying%20influential%20regions%2C%20and%20temporal%20attention%20emphasizing%20informative%20connectivity%20segments.%20Experiments%20on%20the%20Peking%20University%20site%20of%20the%20ADHD-200%20dataset%20using%20stratified%2010-fold%20cross-validation%20with%20a%205-seed%20ensemble%20achieved%2085.18%25%20%2B_5.64%20balanced%20accuracy%20and%200.881%20AUC%2C%20outperforming%20state-of-the-art%20methods.%20Attention%20analysis%20reveals%20cerebellar%20and%20default%20mode%20network%20disruptions%2C%20indicating%20potential%20neuroimaging%20biomarkers.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26308v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DD-GATNet%253A%2520Interpretable%2520Temporal%2520Graph%2520Attention%2520Learning%2520for%2520ADHD%2520Identification%2520Using%2520Dynamic%2520Functional%2520Connectivity%26entry.906535625%3DQurat%2520Ul%2520Ain%2520and%2520Alptekin%2520Temizel%2520and%2520Soyiba%2520Jawed%26entry.1292438233%3DAttention%2520Deficit%2520Hyperactivity%2520Disorder%2520%2528ADHD%2529%2520is%2520a%2520prevalent%2520neurodevelopmental%2520disorder%2520whose%2520neuroimaging-based%2520diagnosis%2520remains%2520challenging%2520due%2520to%2520complex%2520time-varying%2520disruptions%2520in%2520brain%2520connectivity.%2520Functional%2520MRI%2520%2528fMRI%2529%2520provides%2520a%2520powerful%2520non-invasive%2520modality%2520for%2520identifying%2520functional%2520alterations.%2520Existing%2520deep%2520learning%2520%2528DL%2529%2520studies%2520employ%2520diverse%2520neuroimaging%2520features%253B%2520however%252C%25 {"title": "CADSmith: Multi-Agent CAD Generation with Programmatic Geometric Validation", "author": "Jesse Barkley and Rumi Loghmani and Amir Barati Farimani", "abstract": "Existing methods for text-to-CAD generation either operate in a single pass with no geometric verification or rely on lossy visual feedback that cannot resolve dimensional errors. We present CADSmith, a multi-agent pipeline that generates CadQuery code from natural language. It then undergoes an iterative refinement process through two nested correction loops: an inner loop that resolves execution errors and an outer loop grounded in programmatic geometric validation. The outer loop combines exact measurements from the OpenCASCADE kernel (bounding box dimensions, volume, solid validity) with holistic visual assessment from an independent vision-language model Judge. This provides both the numerical precision and the high-level shape awareness needed to converge on the correct geometry. The system uses retrieval-augmented generation over API documentation rather than fine-tuning, maintaining a current database as the underlying CAD library evolves. We evaluate on a custom benchmark of 100 prompts in three difficulty tiers (T1 through T3) with three ablation configurations. Against a zero-shot baseline, CADSmith achieves a 100% execution rate (up from 95%), improves the median F1 score from 0.9707 to 0.9846, the median IoU from 0.8085 to 0.9629, and reduces the mean Chamfer Distance from 28.37 to 0.74, demonstrating that closed-loop refinement with programmatic geometric feedback substantially improves the quality and reliability of LLM-generated CAD models.", "link": "http://arxiv.org/abs/2603.26512v1", "date": "2026-03-27", "relevancy": 2.5872, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5272}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "ht {"title": "Large Language Models Can Perform Automatic Modulation Classification via Discretized Self-supervised Candidate Retrieval", "author": "Mohammad Rostami and Atik Faysal and Reihaneh Gh. Roshan and Huaxia Wang and Nikhil Muralidhar and Yu-Dong Yao", "abstract": "Identifying wireless modulation schemes is essential for cognitive radio, but standard supervised models often degrade under distribution shift, and training domain-specific wireless foundation models from scratch is computationally prohibitive. Large Language Models (LLMs) offer a promising training-free alternative via in-context learning, yet feeding raw floating-point signal statistics into LLMs overwhelms models with numerical noise and exhausts token budgets. We introduce DiSC-AMC, a framework that reformulates Automatic Modulation Classification (AMC) as an LLM reasoning task by combining aggressive feature discretization with nearest-neighbor retrieval over self-supervised embeddings. By mapping continuous features to coarse symbolic tokens, DiSC-AMC aligns abstract signal patterns with LLM reasoning capabilities and reduces prompt length by over $50$\\%. Simultaneously, utilizing a DINOv2 visual encoder to retrieve the $k_\\text{NN}$ most similar labeled exemplars provides highly relevant, query-specific context rather than generic class averages. On a 10-class benchmark, a fine-tuned 7B-parameter LLM using DiSC-AMC achieves $83.0$\\% in-distribution accuracy ($-10$\\,to\\,$+10$\\,dB) and $82.50$\\% out-of-distribution (OOD) accuracy ($-11$\\,to\\,$-15$\\,dB), outperforming supervised baselines.\n  Comprehensive ablations on vanilla LLMs demonstrate the token efficiency of DiSC-AMC. A training-free $7$B LLM achieves $71$\\% accuracy using only $0.5$\\,K-token prompt,surpassing a $200$B-parameter baseline that relies on a $2.9$K-token prompt. Furthermore, similarity-based exemplar retrieval outperforms naive class-average selection by over $20$\\%. Finally, we identify a fundamental limitation of this pipeline. At extreme OOD noise levels ($-30$\\,dB), the underlying self-supervised representations collapse, degrading retrieval quality and reducing classification to random chance.", "link": "http://arxiv.org/abs/2510.00316v2", "date": "2026-03-27", "relevancy": 2.58, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5225}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5128}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5128}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Large%20Language%20Models%20Can%20Perform%20Automatic%20Modulation%20Classification%20via%20Discretized%20Self-supervised%20Candidate%20Retrieval&body=Title%3A%20Large%20Language%20Models%20Can%20Perform%20Automatic%20Modulation%20Classification%20via%20Discretized%20Self-supervised%20Candidate%20Retrieval%0AAuthor%3A%20Mohammad%20Rostami%20and%20Atik%20Faysal%20and%20Reihaneh%20Gh.%20Roshan%20and%20Huaxia%20Wang%20and%20Nikhil%20Muralidhar%20and%20Yu-Dong%20Yao%0AAbstract%3A%20Identifying%20wireless%20modulation%20schemes%20is%20essential%20for%20cognitive%20radio%2C%20but%20standard%20supervised%20models%20often%20degrade%20under%20distribution%20shift%2C%20and%20training%20domain-specific%20wireless%20foundation%20models%20from%20scratch%20is%20computationally%20prohibitive.%20Large%20Language%20Models%20%28LLMs%29%20offer%20a%20promising%20training-free%20alternative%20via%20in-context%20learning%2C%20yet%20feeding%20raw%20floating-point%20signal%20statistics%20into%20LLMs%20overwhelms%20models%20with%20numerical%20noise%20and%20exhausts%20token%20budgets.%20We%20introduce%20DiSC-AMC%2C%20a%20framework%20that%20reformulates%20Automatic%20Modulati {"title": "SHANDS: A Multi-View Dataset and Benchmark for Surgical Hand-Gesture and Error Recognition Toward Medical Training", "author": "Le Ma and Thiago Freitas dos Santos and Nadia Magnenat-Thalmann and Katarzyna Wac", "abstract": "In surgical training for medical students, proficiency development relies on expert-led skill assessment, which is costly, time-limited, difficult to scale, and its expertise remains confined to institutions with available specialists. Automated AI-based assessment offers a viable alternative, but progress is constrained by the lack of datasets containing realistic trainee errors and the multi-view variability needed to train robust computer vision approaches. To address this gap, we present Surgical-Hands (SHands), a large-scale multi-view video dataset for surgical hand-gesture and error recognition for medical training. \\textsc{SHands} captures linear incision and suturing using five RGB cameras from complementary viewpoints, performed by 52 participants (20 experts and 32 trainees), each completing three standardized trials per procedure. The videos are annotated at the frame level with 15 gesture primitives and include a validated taxonomy of 8 trainee error types, enabling both gesture recognition and error detection. We further define standardized evaluation protocols for single-view, multi-view, and cross-view generalization, and benchmark state-of-the-art deep learning models on the dataset. SHands is publicly released to support the development of robust and scalable AI systems for surgical training grounded in clinically curated domain knowledge.", "link": "http://arxiv.org/abs/2603.26400v1", "date": "2026-03-27", "relevancy": 2.5638, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5195}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/ ypes%2C%20enabling%20both%20gesture%20recognition%20and%20error%20detection.%20We%20further%20define%20standardized%20evaluation%20protocols%20for%20single-view%2C%20multi-view%2C%20and%20cross-view%20generalization%2C%20and%20benchmark%20state-of-the-art%20deep%20learning%20models%20on%20the%20dataset.%20SHands%20is%20publicly%20released%20to%20support%20the%20development%20of%20robust%20and%20scalable%20AI%20systems%20for%20surgical%20training%20grounded%20in%20clinically%20curated%20domain%20knowledge.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26400v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSHANDS%253A%2520A%2520Multi-View%2520Dataset%2520and%2520Benchmark%2520for%2520Surgical%2520Hand-Gesture%2520and%2520Error%2520Recognition%2520Toward%2520Medical%2520Training%26entry.906535625%3DLe%2520Ma%2520and%2520Thiago%2520Freitas%2520dos%2520Santos%2520and%2520Nadia%2520Magnenat-Thalmann%2520and%2520Katarzyna%2520Wac%26entry.1292438233%3DIn%2520surgical%2520training%2520for%2520medical%2520students%252C%2520proficiency%2520development%2520relies%2520on%2520expert-led%2520skill%2520assessment%252C%2520which%2520is%2520costly%252C%2520time-limited%252C%2520difficult%2520to%2520scale%252C%2520and%2520its%2520expertise%2520remains%2520confined%2520to%2520institutions%2520with%2520available%2520specialists.%2520Automated%2520AI-based%2520assessment%2520offers%2520a%2520viable%2520alternative%252C%2520but%2520progress%2520is%2520constrained%2520by%2520the%2520lack%2520of%2520datasets%2520containing%2520realistic%2520trainee%2520errors%2520and%2520the%2520multi-view%2520variability%2520needed%2520to%2520train%2520robust%2520computer%2520vision%2520approaches.%2520To%2520address%2520this%2520gap%252C%2520we%2520present%2520Surgical-Hands%2520%2528SHands%2529%252C%2520a%2520large-scale%2520multi-view%2520video%2520dataset%2520for%2520surgical%2520hand-gesture%2520and%2520error%2520recogni {"title": "Conditional Diffusion for 3D CT Volume Reconstruction from 2D X-rays", "author": "Martin Rath and Morteza Ghahremani and Yitong Li and Ashkan Taghipour and Marcus Makowski and Christian Wachinger", "abstract": "Computed tomography (CT) provides rich 3D anatomical details but is often constrained by high radiation exposure, substantial costs, and limited availability. While standard chest X-rays are cost-effective and widely accessible, they only provide 2D projections with limited pathological information. Reconstructing 3D CT volumes from 2D X-rays offers a transformative solution to increase diagnostic accessibility, yet existing methods predominantly rely on synthetic X-ray projections, limiting clinical generalization. In this work, we propose AXON, a multi-stage diffusion-based framework that reconstructs high-fidelity 3D CT volumes directly from real X-rays. AXON employs a coarse-to-fine strategy, with a Brownian Bridge diffusion model-based initial stage for global structural synthesis, followed by a ControlNet-based refinement stage for local intensity optimization. It also supports bi-planar X-ray input to mitigate depth ambiguities inherent in 2D-to-3D reconstruction. A super-resolution network is integrated to upscale the generated volumes to achieve diagnostic-grade resolution. Evaluations on both public and external datasets demonstrate that AXON significantly outperforms state-of-the-art baselines, achieving a 11.9% improvement in PSNR and a 11.0% increase in SSIM with robust generalizability across disparate clinical distributions. Our code is available at https://github.com/ai-med/AXON.", "link": "http://arxiv.org/abs/2603.26509v1", "date": "2026-03-27", "relevancy": 2.5541, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6528}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6528}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5673}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Conditional%20Diffusion%20for%203D%20CT%20Volume%20Reconstruction%20from%202D%20X-rays&body=Title%3A%20Conditional%20Diffusion%20for%203D%20CT%20Volume%20Reconstruction%20from%202D%20X-rays%0AAuthor%3A%20Martin%20Rath%20and%20Morteza%20Ghahremani%20and%20Yitong%20Li%20and%20Ashkan%20Taghipour%20and%20Marcus%20Makowski%20and%20Christian%20Wachinger%0AAbstract%3A%20Computed%20tomography%20%28CT%29%20provides%20rich%203D%20anatomical%20details%20but%20is%20often%20constrained%20by%20high%20radiation%20exposure%2C%20substantial%20costs%2C%20and%20limited%20availability.%20While%20standard%20chest%20X-rays%20are%20cost-effective%20and%20widely%20accessible%2C%20they%20only%20provide%202D%20projections%20with%20limited%20pathological%20information.%20Reconstructing%203D%20CT%20volumes%20from%202D%20X-rays%20offers%20a%20transformative%20solution%20to%20increase%20diagnostic%20accessibility%2C%20yet%20existing%20methods%20predominantly%20rely%20on%20synthetic%20X-ray%20projections%2C%20limiting%20clinical%20generalization.%20In%20this%20work%2C%20we%20propose%20AXON%2C%20a%20multi-stage%20diffusion-based%20framework%20that%20reconstructs%20high-fidelity%203D%20CT%20volumes%20directly%20from%20real%20X-rays.%20AXON%20employs%20a%20coarse-to-fine%20strategy%2C%20with%20a%20Brownian%20Bridge%20diffusion%20model-based%20initial%20stage%20for%20global%20structural%20synthesis%2C%20followed%20by%20a%20ControlNet-based%20refinement%20stage%20for%20local%20intensity%20optimization.%20It%20also%20supports%20bi-planar%20X-ray%20input%20to%20mitigate%20depth%20ambiguities%20inherent%20in%202D-to-3D%20reconstruction.%20A%20super-resolution%20network%20is%20integrated%20to%20upscale%20the%20generated%20volumes%20to%20achieve%20diagnostic-grade%20resolution.%20Evaluations%20on%20both%20public%20and%20external%20datasets%20demonstrate%20that%20AXON%20significantly%20outperforms%20state-of-the-art%20baselines%2C%20achieving%20a%2011.9%25%20improvement%20in%20PSNR%20and%20a%2011.0%25%20increase%20in%20SSIM%20with%20robust%20generalizability%20across%20disparate%20clinical%20distributions.%20Our%20code%20is%20available%20at%20https%3A//github.com/ai-med/AXON.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26509v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConditional%2520Diffusion%2520for%25203D%2520CT%2520Volume%2520Reconstruction%2520from%25202D%2520X-rays%26entry.906535625%3DMartin%2520Rath%2520and%2520Morteza%2520Ghahremani%2520and%2520Yitong%2520Li%2520and%2520Ashkan%2520Taghipour%2520and%2520Marcus%2520Makowski%2520and%2520Christian%2520Wachinger%26entry.1292438233%3DComputed%2520tomography%2520%2528CT%2529%2520provides%2520rich%25203D%2520anatomical%2520details%2520but%2520is%2520often%2520constrained%2520by%2520high%2520radiation%2520exposure%252C%2520substantial%2520costs%252C%2520and%2520limited%2520availability.%2520While%2520standard%2520chest%2520X-rays%2520are%2520cost-effective%2520and%2520widely%2520accessible%252C%2520they%2520only%2520provide%25202D%2520projections%2520with%2520limited%2520pathological%2520information.%2520Reconstructing%25203D%2520CT%2520volumes%2520from%25202D%2520X-rays%2520offers%2520a%2520transformative%2520solution%2520to%2520increase%2520diagnostic%2520accessibility%252C%2520yet%2520existing%2520methods%2520predominantly%2520rely%2520on%2520synthetic%2520X-ray%2520projections%252C%2520limiting%2520clinical%2520generalization.%2520In%2520this%2520work%252C%2520we%2520propose%2520AXON%252C%2520a%2520multi-stage%2520diffusion-based%2520framework%2520that%2520reconstructs%2520high-fidelity%25203D%2520CT%2520volumes%2520directly%2520from%2520real%2520X-rays.%2520AXON%2520employs%2520a%2520 {"title": "Gelina: Unified Speech and Gesture Synthesis via Interleaved Token Prediction", "author": "T\u00e9o Guichoux and Th\u00e9odor Lemerle and Shivam Mehta and Jonas Beskow and Gustav Eje Henter and Laure Soulier and Catherine Pelachaud and Nicolas Obin", "abstract": "Human communication is multimodal, with speech and gestures tightly coupled, yet most computational methods for generating speech and gestures synthesize them sequentially, weakening synchrony and prosody alignment. We introduce Gelina, a unified framework that jointly synthesizes speech and co-speech gestures from text using interleaved token sequences in a discrete autoregressive backbone, with modality-specific decoders. Gelina supports multi-speaker and multi-style cloning and enables gesture-only synthesis from speech inputs. Subjective and objective evaluations demonstrate competitive speech quality and improved gesture generation over unimodal baselines.", "link": "http://arxiv.org/abs/2510.12834v3", "date": "2026-03-27", "relevancy": 2.5432, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5122}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.507}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gelina%3A%20Unified%20Speech%20and%20Gesture%20Synthesis%20via%20Interleaved%20Token%20Prediction&body=Title%3A%20Gelina%3A%20Unified%20Speech%20and%20Gesture%20Synthesis%20via%20Interleaved%20Token%20Prediction%0AAuthor%3A%20T%C3%A9o%20Guichoux%20and%20Th%C3%A9odor%20Lemerle%20and%20Shivam%20Mehta%20and%20Jonas%20Beskow%20and%20Gustav%20Eje%20Henter%20and%20Laure%20Soulier%20and%20Catherine%20Pelachaud%20and%20Nicolas%20Obin%0AAbstract%3A%20Human%20communication%20is%20multimodal%2C% {"title": "Scene Grounding In the Wild", "author": "Tamir Cohen and Leo Segre and Shay Shomer-Chai and Shai Avidan and Hadar Averbuch-Elor", "abstract": "Reconstructing accurate 3D models of large-scale real-world scenes from unstructured, in-the-wild imagery remains a core challenge in computer vision, especially when the input views have little or no overlap. In such cases, existing reconstruction pipelines often produce multiple disconnected partial reconstructions or erroneously merge non-overlapping regions into overlapping geometry. In this work, we propose a framework that grounds each partial reconstruction to a complete reference model of the scene, enabling globally consistent alignment even in the absence of visual overlap. We obtain reference models from dense, geospatially accurate pseudo-synthetic renderings derived from Google Earth Studio. These renderings provide full scene coverage but differ substantially in appearance from real-world photographs. Our key insight is that, despite this significant domain gap, both domains share the same underlying scene semantics. We represent the reference model using 3D Gaussian Splatting, augmenting each Gaussian with semantic features, and formulate alignment as an inverse feature-based optimization scheme that estimates a global 6DoF pose and scale while keeping the reference model fixed. Furthermore, we introduce the WikiEarth dataset, which registers existing partial 3D reconstructions with pseudo-synthetic reference models. We demonstrate that our approach consistently improves global alignment when initialized with various classical and learning-based pipelines, while mitigating failure modes of state-of-the-art end-to-end models. All code and data will be released.", "link": "http://arxiv.org/abs/2603.26584v1", "date": "2026-03-27", "relevancy": 2.5429, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6441}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6373}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6308}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scene%20Grounding%20In%20the%20Wild&body=Title%3A%20Scene%20Grounding%20In%20the%20Wild%0AAuthor%3A%20Tamir%20Cohen%20and%20Leo%20Segre%20and%20Shay%20Shomer-Chai%20and%20Shai%20Avidan%20and%20Hadar%20Averbuch-Elor%0AAbstract%3A%20Reconstructing%20accurate%203D%20models%20of%20large-scale%20real-world%20scenes%20from%20unstructured%2C%20in-the-wild%20imagery%20remains%20a%20core%20challenge%20in%20computer%20vision%2C%20especially%20when%20the%20input%20views%20have%20little%20or%20no%20overlap.%20In%20such%20cases%2C%20existing%20reconstruction%20pipelines%20often%20produce%20multiple%20disconnected%20partial%20reconstructions%20or%20erroneously%20merge%20non-overlapping%20regions%20into%20overlapping%20geometry.%20In%20this%20work%2C%20we%20propose%20a%20framework%20that%20grounds%20each%20partial%20reconstruction%20to%20a%20complete%20reference%20model%20of%20the%20scene%2C%20enabling%20globally%20consistent%20alignment%20even%20in%20the%20absence%20of%20visual%20overlap.%20We%20obtain%20reference%20models%20from%20dense%2C%20geospatially%20accurate%20pseudo-synthetic%20renderings%20derived%20from%20Google%20Earth%20Studio.%20These%20renderings%20provide%20full%20scene%20coverage%20but%20differ%20substantially%20in%20appearance%20from%20real-world%20photographs.%20Our%20key%20insight%20is%20that%2C%20despite%20this%20significant%20domain%20gap%2C%20both%20domains%20share%20the%20same%20underlying%20scene%20semantics.%20We%20represent%20the%20reference%20model%20using%203D%20Gaussian%20Splatting%2C%20augmenting%20each%20Gaussian%20with%20semantic%20features%2C%20and%20formulate%20alignment%20as%20an%20inverse%20feature-based%20optimization%20scheme%20that%20estimates%20a%20global%206DoF%20pose%20and%20scale%20while%20keeping%20the%20reference%20model%20fixed.%20Furthermore%2C%20we%20introduce%20the%20WikiEarth%20dataset%2C%20which%20registers%20existing%20partial%203D%20reconstructions%20with%20pseudo-synthetic%20reference%20models.%20We%20demonstrate%20that%20our%20approach%20consistently%20improves%20global%20alignment%20when%20initialized%20with%20various%20classical%20and%20learning-based%20pipelines%2C%20while%20mitigating%20failure%20modes%20of%20state-of-the-art%20end-to-end%20models.%20All%20code%20and%20data%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26584v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScene%2520Grounding%2520In%2520the%2520Wild%26entry.906535625%3DTamir%2520Cohen%2520and%2520Leo%2520Segre%2520and%2520Shay%2520Shomer-Chai%2520and%2520Shai%2520Avidan%2520and%2520Hadar%2520Averbuch-Elor%26entry.1292438233%3DReconstructing%2520accurate%25203D%2520models%2520of%2520large-scale%2520real-world%2520scenes%2520from%2520unstructured%252C%2520in-the-wild%2520imagery%2520remains%2520a%2520core%2520challenge%2520in%2520computer%2520vision%252C%2520especially%2520when%2520the%2520input%2520views%2520have%2520little%2520or%2520no%2520overlap.%2520In%2520such%2520cases%252C%2520existing%2520reconstruction%2520pipelines%2520often%2520produce%2520multiple%2520disconnected%2520partial%2520reconstructions%2520or%2520erroneously%2520merge%2520non-overlapping%2520regions%2520into%2520overlapping%2520geometry.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520framework%2520that%2520grounds%2520each%2520partial%2520reconstruction%2520to%2520a%2520complete%2520reference%2520model%2520of%2520the%2520scene%252C%2520enabling%2520globally%2520consistent%2520alignment%2520even%2520in%2520the%2520absence%2520of%2520visual%2520overla {"title": "Interact2Ar: Full-Body Human-Human Interaction Generation via Autoregressive Diffusion Models", "author": "Pablo Ruiz-Ponce and Sergio Escalera and Jos\u00e9 Garc\u00eda-Rodr\u00edguez and Jiankang Deng and Rolandos Alexandros Potamias", "abstract": "Generating realistic human-human interactions is a challenging task that requires not only high-quality individual body and hand motions, but also coherent coordination among all interactants. Due to limitations in available data and increased learning complexity, previous methods tend to ignore hand motions, limiting the realism and expressivity of the interactions. Additionally, current diffusion-based approaches generate entire motion sequences simultaneously, limiting their ability to capture the reactive and adaptive nature of human interactions. To address these limitations, we introduce Interact2Ar, the first end-to-end text-conditioned autoregressive diffusion model for generating full-body, human-human interactions. Interact2Ar incorporates detailed hand kinematics through dedicated parallel branches, enabling high-fidelity full-body generation. Furthermore, we introduce an autoregressive pipeline coupled with a novel memory technique that facilitates adaptation to the inherent variability of human interactions using efficient large context windows. The adaptability of our model enables a series of downstream applications, including temporal motion composition, real-time adaptation to disturbances, and extension beyond dyadic to multi-person scenarios. To validate the generated motions, we introduce a set of robust evaluators and extended metrics designed specifically for assessing full-body interactions. Through quantitative and qualitative experiments, we demonstrate the state-of-the-art performance of Interact2Ar.", "link": "http://arxiv.org/abs/2512.19692v2", "date": "2026-03-27", "relevancy": 2.5272, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6947}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5909}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5766}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interact2Ar%3A%20Full-Body%20Human-Human%20Interaction%20Generation%20via%20Autoregressive%20Diffusion%20Models&body=Title%3A%20Interact2Ar%3A%20Full-Body%20Human-Human%20Interaction%20Generation%20via%20Autoregressive%20Diffusion%20Models%0AAuthor%3A%20Pablo%20Ruiz-Ponce%20and%20Sergio%20Escalera%20and%20Jos%C3%A9%20Garc%C3%ADa-Rodr%C3%ADguez%20and%20Jiankang%20Deng%20and%20Rolandos%20Alexandros%20Potamias%0AAbstract%3A%20Generating%20realistic%20human-human%20interactions%20is%20a%20challenging%20task%20that%20requires%20not%20only%20high-quality%20individual%20body%20and%20hand%20motions%2C%20but%20also%20coherent%20coordination%20among%20all%20interactants.%20Due%20to%20limitations%20in%20available%20data%20and%20increased%20learning%20complexity%2C%20previous%20methods%20tend%20to%20ignore%20hand%20motions%2C%20limiting%20the%20realism%20and%20expressivity%20of%20the%20interactions.%20Additionally%2C%20current%20diffusion-based%20approaches%20generate%20entire%20motion%20sequences%20simultaneously%2C%20limiting%20their%20ability%20to%20capture%20the%20reactive%20and%20adaptive%20nature%20of%20human%20interactions.%20To%20address%20these%20limitations%2C%20we%20introduce%20Interact2Ar%2C%20the%20first%20end-to-end%20text-conditioned%20autoregressive%20diffusion%20model%20for%20generating%20full-body%2C%20human-human%20interactions.%20Interact2Ar%20incorporates%20detailed%20hand%20kinematics%20through%20dedicated%20parallel%20branches%2C%20enabling%20high-fidelity%20full-body%20generation.%20Furthermore%2C%20we%20introduce%20an%20autoregressive%20pipeline%20coupled%20with%20a%20novel%20memory%20technique%20that%20facilitates%20adaptation%20to%20the%20inherent%20variability%20of%20human%20interactions%20using%20efficient%20large%20context%20windows.%20The%20adaptability%20of%20our%20model%20enables%20a%20series%20of%20downstream%20applications%2C%20including%20temporal%20motion%20composition%2C%20real-time%20adaptation%20to%20disturbances%2C%20and%20extension%20beyond%20dyadic%20to%20multi-person%20scenarios.%20To%20validate%20the%20generated%20motions%2C%20we%20introduce%20a%20set%20of%20robust%20evaluators%20and%20extended%20metrics%20designed%20specifically%20for%20assessing%20full-body%20interactions.%20Through%20quantitative%20and%20qualitative%20experiments%2C%20we%20demonstrate%20the%20state-of-the-art%20performance%20of%20Interact2Ar.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19692v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInteract2Ar%253A%2520Full-Body%2520Human-Human%2520Interaction%2520Generation%2520via%2520Autoregressive%2520Diffusion%2520Models%26entry.906535625%3DPablo%2520Ruiz-Ponce%2520and%2520Sergio%2520Escalera%2520and%2520Jos%25C3%25A9%2520Garc%25C3%25ADa-Rodr%25C3%25ADguez%2520and%2520Jiankang%2520Deng%2520and%2520Rolandos%2520Alexandros%2520Potamias%26entry.1292438233%3DGenerating%2520realistic%2520human-human%2520interactions%2520is%2520a%2520challenging%2520task%2520that%2520requires%2520not%2520only%2520high-quality%2520individual%2520body%2520and%2520hand%2520motions%252C%2520but%2520also%2520coherent%2520coordination%2520among%2520all%2520interactants.%2520Due%2520to%2520limitations%2520in%2520available%2520data%2520and%2520increased%2520learning%2520complexity%252C%2520previous%2520methods%2520tend%2520to%2520ignore%2520hand%2520motions%252C%2520limiting%2520the%2520realism%2520and%2520expressivity%2520of%2520the%2520interactions.%2520Add {"title": "Distilling Conversations: Abstract Compression of Conversational Audio Context for LLM-based ASR", "author": "Shashi Kumar and Esa\u00fa Villatoro-Tello and Sergio Burdisso and Kadri Hacioglu and Thibault Ba\u00f1eras-Roux and Hasindri Watawana and Dairazalia Sanchez-Cortes and Srikanth Madikeri and Petr Motlicek and Andreas Stolcke", "abstract": "Standard LLM-based speech recognition systems typically process utterances in isolation, limiting their ability to leverage conversational context. In this work, we study whether multimodal context from prior turns improves LLM-based ASR and how to represent that context efficiently. We find that, after supervised multi-turn training, conversational context mainly helps with the recognition of contextual entities. However, conditioning on raw context is expensive because the prior-turn audio token sequence grows rapidly with conversation length. To address this, we propose Abstract Compression, which replaces the audio portion of prior turns with a fixed number of learned latent tokens while retaining corresponding transcripts explicitly. On both in-domain and out-of-domain test sets, the compressed model recovers part of the gains of raw-context conditioning with a smaller prior-turn audio footprint. We also provide targeted analyses of the compression setup and its trade-offs.", "link": "http://arxiv.org/abs/2603.26246v1", "date": "2026-03-27", "relevancy": 2.5096, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5106}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5106}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4845}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Distilling%20Conversations%3A%20Abstract%20Compression%20of%20Conversational%20Audio%20Context%20for%20LLM-based%20ASR&body=Title%3A%20Distilling%20Conversations%3A%20Abstract%20Compression%20of%20Conversational%20Audio%20Context%20for%20LLM-based%20ASR%0AAuthor%3A%20Shashi%20Kumar%20and%20Esa%C3%BA%20Villatoro-Tello%20and%20Sergio%20Burdisso%20and%20Kadri%20Hacioglu%20and%20Thibault%20Ba%C3%B1eras-Roux%20and%20Hasindri%20Watawana%20and%20Dairazalia%20Sanchez-Cortes%20and%20Srikanth%20Madikeri%20and%20Petr%20Motlicek%20and%20Andreas%20Stolcke%0AAbstract%3A%20Standard%20LLM-based%20speech%20recognition%20systems%20typically%20process%20utterances%20in%20isolation%2C%20limiting%20their%20ability%20to%20leverage%20conversational%20context.%20In%20this%20work%2C%20we%20study%20whether%20multimodal%20context%20from%20prior%20turns%20improves%20LLM-based%20ASR%20and%20how%20to%20represent%20that%20context%20efficiently.%20We%20find%20that%2C%20after%20supervised%20multi-turn%20training%2C%20conversational%20context%20mainly%20helps%20with%20the%20recognition%20of%20contextual%20entities.%20However%2C%20conditioning%20on%20raw%20context%20is%20expensive%20because%20the%20prior-turn%20audio%20token%20sequence%20grows%20rapidly%20with%20conversation%20length.%20To%20address%20this%2C%20we%20propose%20Abstract%20Compression%2C%20which%20replaces%20the%20audio%20portion%20of%20prior%20turns%20with%20a%20fixed%20number%20of%20learned%20latent%20tokens%20while%20retaining%20corresponding%20transcripts%20explicitly.%20On%20both%20in-domain%20and%20out-of-domain%20test%20sets%2C%20the%20compressed%20model%20recovers%20part%20of%20the%20gains%20of%20raw-context%20conditioning%20with%20a%20smaller%20prior-turn%20audio%20footprint.%20We%20also%20provide%20targeted%20analyses%20of%20the%20compression%20setup%20and%20its%20trade-offs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26246v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewf %20compression%20setup%20and%20its%20trade-offs.&entry.1838667208=http%3A//arxiv.org/abs/2603.26246v1&entry.124074799=Read"},
{"title": "Beyond Code Snippets: Benchmarking LLMs on Repository-Level Question Answering", "author": "Yoseph Berhanu Alebachew and Hunter Leary and Swanand Vaishampayan and Chris Brown", "abstract": "Large Language Models (LLMs) have shown impressive capabilities across software engineering tasks, including question answering (QA). However, most studies and benchmarks focus on isolated functions or single-file snippets, overlooking the challenges of real-world program comprehension, which often spans multiple files and system-level dependencies. In this work, we introduce StackRepoQA, the first multi-project, repository-level question answering dataset constructed from 1,318 real developer questions and accepted answers across 134 open-source Java projects. Using this dataset, we systematically evaluate two widely used LLMs (Claude 3.5 Sonnet and GPT-4o) under both direct prompting and agentic configurations. We compare baseline performance with retrieval-augmented generation methods that leverage file-level retrieval and graph-based representations of structural dependencies. Our results show that LLMs achieve moderate accuracy at baseline, with performance improving when structural signals are incorporated. Nonetheless, overall accuracy remains limited for repository-scale comprehension. The analysis reveals that high scores often result from verbatim reproduction of Stack Overflow answers rather than genuine reasoning. To our knowledge, this is the first empirical study to provide such evidence in repository-level QA. We release StackRepoQA to encourage further research into benchmarks, evaluation protocols, and augmentation strategies that disentangle memorization from reasoning, advancing LLMs as reliable tool for repository-scale program comprehension.", "link": "http://arxiv.org/abs/2603.26567v1", "date": "2026-03-27", "relevancy": 2.5091, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http:// e%2C%20with%20performance%20improving%20when%20structural%20signals%20are%20incorporated.%20Nonetheless%2C%20overall%20accuracy%20remains%20limited%20for%20repository-scale%20comprehension.%20The%20analysis%20reveals%20that%20high%20scores%20often%20result%20from%20verbatim%20reproduction%20of%20Stack%20Overflow%20answers%20rather%20than%20genuine%20reasoning.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20empirical%20study%20to%20provide%20such%20evidence%20in%20repository-level%20QA.%20We%20release%20StackRepoQA%20to%20encourage%20further%20research%20into%20benchmarks%2C%20evaluation%20protocols%2C%20and%20augmentation%20strategies%20that%20disentangle%20memorization%20from%20reasoning%2C%20advancing%20LLMs%20as%20reliable%20tool%20for%20repository-scale%20program%20comprehension.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26567v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Code%2520Snippets%253A%2520Benchmarking%2520LLMs%2520on%2520Repository-Level%2520Question%2520Answering%26entry.906535625%3DYoseph%2520Berhanu%2520Alebachew%2520and%2520Hunter%2520Leary%2520and%2520Swanand%2520Vaishampayan%2520and%2520Chris%2520Brown%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520shown%2520impressive%2520capabilities%2520across%2520software%2520engineering%2520tasks%252C%2520including%2520question%2520answering%2520%2528QA%2529.%2520However%252C%2520most%2520studies%2520and%2520benchmarks%2520focus%2520on%2520isolated%2520functions%2520or%2520single-file%2520snippets%252C%2520overlooking%2520the%2520challenges%2520of%2520real-world%2520program%2520comprehension%252C%2520which%2520often%2520spans%2520multiple%2520files%2520and%2520system-level%2520dependencies.%2520In%2520this%2520work%252C%2520we%2520introduce%2520StackRepoQA%252C%2520the%2520first%2520multi-project%252C%2520repository-level%2520question%2520answering%2520dataset%2520con {"title": "GaussianGPT: Towards Autoregressive 3D Gaussian Scene Generation", "author": "Nicolas von L\u00fctzow and Barbara R\u00f6ssle and Katharina Schmid and Matthias Nie\u00dfner", "abstract": "Most recent advances in 3D generative modeling rely on diffusion or flow-matching formulations. We instead explore a fully autoregressive alternative and introduce GaussianGPT, a transformer-based model that directly generates 3D Gaussians via next-token prediction, thus facilitating full 3D scene generation. We first compress Gaussian primitives into a discrete latent grid using a sparse 3D convolutional autoencoder with vector quantization. The resulting tokens are serialized and modeled using a causal transformer with 3D rotary positional embedding, enabling sequential generation of spatial structure and appearance. Unlike diffusion-based methods that refine scenes holistically, our formulation constructs scenes step-by-step, naturally supporting completion, outpainting, controllable sampling via temperature, and flexible generation horizons. This formulation leverages the compositional inductive biases and scalability of autoregressive modeling while operating on explicit representations compatible with modern neural rendering pipelines, positioning autoregressive transformers as a complementary paradigm for controllable and context-aware 3D generation.", "link": "http://arxiv.org/abs/2603.26661v1", "date": "2026-03-27", "relevancy": 2.5019, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6318}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6235}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec% le%2520and%2520context-aware%25203D%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26661v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GaussianGPT%3A%20Towards%20Autoregressive%203D%20Gaussian%20Scene%20Generation&entry.906535625=Nicolas%20von%20L%C3%BCtzow%20and%20Barbara%20R%C3%B6ssle%20and%20Katharina%20Schmid%20and%20Matthias%20Nie%C3%9Fner&entry.1292438233=Most%20recent%20advances%20in%203D%20generative%20modeling%20rely%20on%20diffusion%20or%20flow-matching%20formulations.%20We%20instead%20explore%20a%20fully%20autoregressive%20alternative%20and%20introduce%20GaussianGPT%2C%20a%20transformer-based%20model%20that%20directly%20generates%203D%20Gaussians%20via%20next-token%20prediction%2C%20thus%20facilitating%20full%203D%20scene%20generation.%20We%20first%20compress%20Gaussian%20primitives%20into%20a%20discrete%20latent%20grid%20using%20a%20sparse%203D%20convolutional%20autoencoder%20with%20vector%20quantization.%20The%20resulting%20tokens%20are%20serialized%20and%20modeled%20using%20a%20causal%20transformer%20with%203D%20rotary%20positional%20embedding%2C%20enabling%20sequential%20generation%20of%20spatial%20structure%20and%20appearance.%20Unlike%20diffusion-based%20methods%20that%20refine%20scenes%20holistically%2C%20our%20formulation%20constructs%20scenes%20step-by-step%2C%20naturally%20supporting%20completion%2C%20outpainting%2C%20controllable%20sampling%20via%20temperature%2C%20and%20flexible%20generation%20horizons.%20This%20formulation%20leverages%20the%20compositional%20inductive%20biases%20and%20scalability%20of%20autoregressive%20modeling%20while%20operating%20on%20explicit%20representations%20compatible%20with%20modern%20neural%20rendering%20pipelines%2C%20positioning%20autoregressive%20transformers%20as%20a%20complementary%20paradigm%20for%20controllable%20and%20context-aware%203D%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2603.26661v1&entry.124074799=Read"},
{"title": "Foundation Model for Cardiac Time Series via Masked Latent Attention", "author": "Moritz Vandenhirtz and Samuel Ruip\u00e9rez-Campillo and Simon B\u00f6hi and Sonia Laguna and Irene Cannistraci and Andrea Agostini and Ece Ozkan and Thomas M. Sutter and Julia E. Vogt", "abstract": "Electrocardiograms (ECGs) are among the most widely available clinical signals and play a central role in cardiovascular diagnosis. While recent foundation models (FMs) have shown promise for learning transferable ECG representations, most existing pretraining approaches treat leads as independent channels and fail to explicitly leverage their strong structural redundancy. We introduce the latent attention masked autoencoder (LAMAE) FM that directly exploits this structure by learning cross-lead connection mechanisms during self-supervised pretraining. Our approach models higher-order interactions across leads through latent attention, enabling permutation-invariant aggregation and adaptive weighting of lead-specific representations. We provide empirical evidence on the Mimic-IV-ECG database that leveraging the cross-lead connection constitutes an effective form of structural supervision, improving representation quality and transferability. Our method shows strong performance in predicting ICD-10 codes, outperforming independent-lead masked modeling and alignment-based baselines.", "link": "http://arxiv.org/abs/2603.26475v1", "date": "2026-03-27", "relevancy": 2.474, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5107}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4895}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4843}], " {"title": "Preference-Aligned LoRA Merging: Preserving Subspace Coverage and Addressing Directional Anisotropy", "author": "Wooseong Jeong and Wonyoung Lee and Kuk-Jin Yoon", "abstract": "Merging multiple Low-Rank Adaptation (LoRA) modules is promising for constructing general-purpose systems, yet challenging because LoRA update directions span different subspaces and contribute unevenly. When merged naively, such mismatches can weaken the directions most critical to certain task losses while overemphasizing relatively less important ones, ultimately reducing the model's ability to represent all tasks faithfully. We revisit this problem through two perspectives: subspace coverage, which captures how broadly LoRA directions cover diverse representational directions, and anisotropy, which reflects the imbalance of influence across those directions. We propose TARA-Merging (Task-Rank Anisotropy Alignment), which aligns merging weights using a preference-weighted cross-entropy pseudo-loss while preserving task-relevant LoRA subspaces. This ensures broad subspace coverage and mitigates anisotropy via direction-wise reweighting. Across eight vision and six NLI benchmarks, TARA-Merging consistently outperforms vanilla and LoRA-aware baselines, demonstrating strong robustness and generalization, and highlighting the importance of addressing both subspace coverage and anisotropy in LoRA merging.", "link": "http://arxiv.org/abs/2603.26299v1", "date": "2026-03-27", "relevancy": 2.4713, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5172}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4916}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": Merging%20consistently%20outperforms%20vanilla%20and%20LoRA-aware%20baselines%2C%20demonstrating%20strong%20robustness%20and%20generalization%2C%20and%20highlighting%20the%20importance%20of%20addressing%20both%20subspace%20coverage%20and%20anisotropy%20in%20LoRA%20merging.&entry.1838667208=http%3A//arxiv.org/abs/2603.26299v1&entry.124074799=Read"},
{"title": "Hearing to Translate: The Effectiveness of Speech Modality Integration into LLMs", "author": "Sara Papi and Javier Garcia Gilabert and Zachary Hopton and Vil\u00e9m Zouhar and Carlos Escolano and Gerard I. G\u00e1llego and Jorge Iranzo-S\u00e1nchez and Ahrii Kim and Dominik Mach\u00e1\u010dek and Patricia Schmidtova and Maike Z\u00fcfle", "abstract": "As Large Language Models (LLMs) expand beyond text, integrating speech as a native modality has given rise to SpeechLLMs, which directly process spoken language and enable speech-to-text translation (ST) and other downstream tasks, bypassing traditional transcription-based pipelines. Whether this integration improves ST quality over established cascaded architectures, however, remains an open question. We present Hearing to Translate, the first comprehensive test suite rigorously benchmarking 6 state-of-the-art SpeechLLMs against 16 strong direct and cascade systems that couple leading speech foundation models (SFM), with multilingual LLMs. Our analysis spans 16 benchmarks, 13 language pairs, and 9 challenging conditions, including disfluent, noisy, and long-form speech. Across this extensive evaluation, we find that cascaded systems remain the most reliable solution overall, but most recent SpeechLLMs can match or even outperform cascades in various settings while SFMs lag behind both, highlighting that integrating an LLM, either within the model or in a pipeline, is essential for high-quality speech translation.", "link": "http://arxiv.org/abs/2512.16378v3", "date": "2026-03-27", "relevancy": 2.4705, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding",

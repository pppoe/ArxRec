{"title": "DUET-VLM: Dual stage Unified Efficient Token reduction for VLM Training and Inference", "author": "Aditya Kumar Singh and Hitesh Kandala and Pratik Prabhanjan Brahma and Zicheng Liu and Emad Barsoum", "abstract": "Vision-language models (VLMs) have achieved remarkable multimodal understanding and reasoning capabilities, yet remain computationally expensive due to dense visual tokenization. Existing efficiency approaches either merge redundant visual tokens or drop them progressively in language backbone, often trading accuracy for speed. In this work, we propose DUET-VLM, a versatile plug-and-play dual compression framework that consists of (a) vision-only redundancy aware compression of vision encoder's output into information-preserving tokens, followed by (b) layer-wise, salient text-guided dropping of visual tokens within the language backbone to progressively prune less informative tokens. This coordinated token management enables aggressive compression while retaining critical semantics. On LLaVA-1.5-7B, our approach maintains over 99% of baseline accuracy with 67% fewer tokens, and still retains >97% even at 89% reduction. With this dual-stage compression during training, it achieves 99.7% accuracy at 67% and 97.6% at 89%, surpassing prior SoTA visual token reduction methods across multiple benchmarks. When integrated into Video-LLaVA-7B, it even surpasses the baseline -- achieving >100% accuracy with a substantial 53.1% token reduction and retaining 97.6% accuracy under an extreme 93.4% setting. These results highlight end-to-end training with DUET-VLM, enabling robust adaptation to reduced visual (image/video) input without sacrificing accuracy, producing compact yet semantically rich representations within the same computational budget. Our code is available at https://github.com/AMD-AGI/DUET-VLM.", "link": "http://arxiv.org/abs/2602.18846v2", "date": "2026-03-27", "relevancy": 2.8946, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5749}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5749}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DUET-VLM%3A%20Dual%20stage%20Unified%20Efficient%20Token%20reduction%20for%20VLM%20Training%20and%20Inference&body=Title%3A%20DUET-VLM%3A%20Dual%20stage%20Unified%20Efficient%20Token%20reduction%20for%20VLM%20Training%20and%20Inference%0AAuthor%3A%20Aditya%20Kumar%20Singh%20and%20Hitesh%20Kandala%20and%20Pratik%20Prabhanjan%20Brahma%20and%20Zicheng%20Liu%20and%20Emad%20Barsoum%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20have%20achieved%20remarkable%20multimodal%20understanding%20and%20reasoning%20capabilities%2C%20yet%20remain%20computationally%20expensive%20due%20to%20dense%20visual%20tokenization.%20Existing%20efficiency%20approaches%20either%20merge%20redundant%20visual%20tokens%20or%20drop%20them%20progressively%20in%20language%20backbone%2C%20often%20trading%20accuracy%20for%20speed.%20In%20this%20work%2C%20we%20propose%20DUET-VLM%2C%20a%20versatile%20plug-and-play%20dual%20compression%20framework%20that%20consists%20of%20%28a%29%20vision-only%20redundancy%20aware%20compression%20of%20vision%20encoder%27s%20output%20into%20information-preserving%20tokens%2C%20followed%20by%20%28b%29%20layer-wise%2C%20salient%20text-guided%20dropping%20of%20visual%20tokens%20within%20the%20language%20backbone%20to%20progressively%20prune%20less%20informative%20tokens.%20This%20coordinated%20token%20management%20enables%20aggressive%20compression%20while%20retaining%20critical%20semantics.%20On%20LLaVA-1.5-7B%2C%20our%20approach%20maintains%20over%2099%25%20of%20baseline%20accuracy%20with%2067%25%20fewer%20tokens%2C%20and%20still%20retains%20%3E97%25%20even%20at%2089%25%20reduction.%20With%20this%20dual-stage%20compression%20during%20training%2C%20it%20achieves%2099.7%25%20accuracy%20at%2067%25%20and%2097.6%25%20at%2089%25%2C%20surpassing%20prior%20SoTA%20visual%20token%20reduction%20methods%20across%20multiple%20benchmarks.%20When%20integrated%20into%20Video-LLaVA-7B%2C%20it%20even%20surpasses%20the%20baseline%20--%20achieving%20%3E100%25%20accuracy%20with%20a%20substantial%2053.1%25%20token%20reduction%20and%20retaining%2097.6%25%20accuracy%20under%20an%20extreme%2093.4%25%20setting.%20These%20results%20highlight%20end-to-end%20training%20with%20DUET-VLM%2C%20enabling%20robust%20adaptation%20to%20reduced%20visual%20%28image/video%29%20input%20without%20sacrificing%20accuracy%2C%20producing%20compact%20yet%20semantically%20rich%20representations%20within%20the%20same%20computational%20budget.%20Our%20code%20is%20available%20at%20https%3A//github.com/AMD-AGI/DUET-VLM.%0ALink%3A%20http%3A//arxiv.org/abs/2602.18846v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDUET-VLM%253A%2520Dual%2520stage%2520Unified%2520Efficient%2520Token%2520reduction%2520for%2520VLM%2520Training%2520and%2520Inference%26entry.906535625%3DAditya%2520Kumar%2520Singh%2520and%2520Hitesh%2520Kandala%2520and%2520Pratik%2520Prabhanjan%2520Brahma%2520and%2520Zicheng%2520Liu%2520and%2520Emad%2520Barsoum%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520multimodal%2520understanding%2520and%2520reasoning%2520capabilities%252C%2520yet%2520remain%2520computationally%2520expensive%2520due%2520to%2520dense%2520visual%2520tokenization.%2520Existing%2520efficiency%2520approaches%2520either%2520merge%2520redundant%2520visual%2520tokens%2520or%2520drop%2520them%2520progressively%2520in%2520language%2520backbone%252C%2520often%2520tradin %20SoTA%20visual%20token%20reduction%20methods%20across%20multiple%20benchmarks.%20When%20integrated%20into%20Video-LLaVA-7B%2C%20it%20even%20surpasses%20the%20baseline%20--%20achieving%20%3E100%25%20accuracy%20with%20a%20substantial%2053.1%25%20token%20reduction%20and%20retaining%2097.6%25%20accuracy%20under%20an%20extreme%2093.4%25%20setting.%20These%20results%20highlight%20end-to-end%20training%20with%20DUET-VLM%2C%20enabling%20robust%20adaptation%20to%20reduced%20visual%20%28image/video%29%20input%20without%20sacrificing%20accuracy%2C%20producing%20compact%20yet%20semantically%20rich%20representations%20within%20the%20same%20computational%20budget.%20Our%20code%20is%20available%20at%20https%3A//github.com/AMD-AGI/DUET-VLM.&entry.1838667208=http%3A//arxiv.org/abs/2602.18846v2&entry.124074799=Read"},
{"title": "Particulate: Feed-Forward 3D Object Articulation", "author": "Ruining Li and Yuxin Yao and Chuanxia Zheng and Christian Rupprecht and Joan Lasenby and Shangzhe Wu and Andrea Vedaldi", "abstract": "We introduce Particulate, a feed-forward model that, given a 3D mesh of an object, infers its articulations, including its 3D parts, their kinematic structure, and the motion constraints. The model is based on a transformer network, the Part Articulation Transformer, which predicts all these parameters for all joints. We train the network end-to-end on a diverse collection of articulated 3D assets from public datasets. During inference, Particulate maps the output of the network back to the input mesh, yielding a fully articulated 3D model in seconds, much faster than prior approaches that require per-object optimization. Particulate also works on AI-generated 3D assets, enabling the generation of articulated 3D objects from a single (real or synthetic) image when combined with an off-the-shelf image-to-3D model. We further introduce a new challenging benchmark for 3D articulation estimation curated from high-quality public 3D assets, and redesign the evaluation protocol to be more consistent with human preferences. Empirically, Particulate significantly outperforms state-of-the-art approaches.", "link": "http://arxiv.org/abs/2512.11798v2", "date": "2026-03-27", "relevancy": 2.8785, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6153}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5559}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Particulate%3A%20Feed-Forward%203D%20Object%20Articulation&body=Title%3A%20Particulate%3A%20Feed-Forward%203D%20Object%20Articulation%0AAuthor%3A%20Ruining%20Li%20and%20Yuxin%20Yao%20and%20Chuanxia%20Zheng%20and%20Christian%20Rupprecht%20and%20Joan%20Lasenby%20and%20Shangzhe%20Wu%20and%20Andrea%20Vedaldi%0AAbstract%3A%20We%20introduce%20Particulate%2C%20a%20feed-forward%20model%20that%2C%20given%20a%203D%20mesh%20of%20an%20object%2C%20infers%20its%20articulations%2C%20including%20its%203D%20parts%2C%20their%20kinematic%20structure%2C%20and%20the%20motion%20constraints.%20The%20model%20is%20based%20on%20a%20transformer%20network%2C%20the%20Part%20Articulation%20Transformer%2C%20which%20predicts%20all%20these%20parameters%20for%20all%20joints.%20We%20train%20the%20network%20end-to-end%20on%20a%20diverse%20collection%20of%20articulated%203D%20assets%20from%20public%20datasets.%20During%20inference%2C%20Particulate%20maps%20the%20output%20of%20the%20network%20back%20to%20the%20input%20mesh%2C%20yielding%20a%20fully%20articulated%203D%20model%20in%20seconds%2C%20much%20faster%20than%20prior%20approaches%20that%20require%20per-object%20optimization.%20Particulate%20also%20works%20on%20AI-generated%203D%20assets%2C%20enabling%20the%20generation%20of%20articulated%203D%20objects%20from%20a%20single%20%28real%20or%20synthetic%29%20image%20when%20combined%20with%20an%20off-the-shelf%20image-to-3D%20model.%20We%20further%20introduce%20a%20new%20challenging%20benchmark%20for%203D%20articulation%20estimation%20curated%20from%20high-quality%20public%203D%20assets%2C%20and%20redesign%20the%20evaluation%20protocol%20to%20be%20more%20consistent%20with%20human%20preferences.%20Empirically%2C%20Particulate%20significantly%20outperforms%20state-of-the-art%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2512.11798v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParticulate%253A%2520Feed-Forward%25203D%2520Object%2520Articulation%26entry.906535625%3DRuining%2520Li%2520and%2520Yuxin%2520Yao%2520and%2 A//arxiv.org/abs/2512.11798v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Particulate%3A%20Feed-Forward%203D%20Object%20Articulation&entry.906535625=Ruining%20Li%20and%20Yuxin%20Yao%20and%20Chuanxia%20Zheng%20and%20Christian%20Rupprecht%20and%20Joan%20Lasenby%20and%20Shangzhe%20Wu%20and%20Andrea%20Vedaldi&entry.1292438233=We%20introduce%20Particulate%2C%20a%20feed-forward%20model%20that%2C%20given%20a%203D%20mesh%20of%20an%20object%2C%20infers%20its%20articulations%2C%20including%20its%203D%20parts%2C%20their%20kinematic%20structure%2C%20and%20the%20motion%20constraints.%20The%20model%20is%20based%20on%20a%20transformer%20network%2C%20the%20Part%20Articulation%20Transformer%2C%20which%20predicts%20all%20these%20parameters%20for%20all%20joints.%20We%20train%20the%20network%20end-to-end%20on%20a%20diverse%20collection%20of%20articulated%203D%20assets%20from%20public%20datasets.%20During%20inference%2C%20Particulate%20maps%20the%20output%20of%20the%20network%20back%20to%20the%20input%20mesh%2C%20yielding%20a%20fully%20articulated%203D%20model%20in%20seconds%2C%20much%20faster%20than%20prior%20approaches%20that%20require%20per-object%20optimization.%20Particulate%20also%20works%20on%20AI-generated%203D%20assets%2C%20enabling%20the%20generation%20of%20articulated%203D%20objects%20from%20a%20single%20%28real%20or%20synthetic%29%20image%20when%20combined%20with%20an%20off-the-shelf%20image-to-3D%20model.%20We%20further%20introduce%20a%20new%20challenging%20benchmark%20for%203D%20articulation%20estimation%20curated%20from%20high-quality%20public%203D%20assets%2C%20and%20redesign%20the%20evaluation%20protocol%20to%20be%20more%20consistent%20with%20human%20preferences.%20Empirically%2C%20Particulate%20significantly%20outperforms%20state-of-the-art%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2512.11798v2&entry.124074799=Read"},
{"title": "Make Geometry Matter for Spatial Reasoning", "author": "Shihua Zhang and Qiuhong Shen and Shizun Wang and Tianbo Pan and Xinchao Wang", "abstract": "Empowered by large-scale training, vision-language models (VLMs) achieve strong image and video understanding, yet their ability to perform spatial reasoning in both static scenes and dynamic videos remains limited. Recent advances try to handle this limitation by injecting geometry tokens from pretrained 3D foundation models into VLMs. Nevertheless, we observe that naive token fusion followed by standard fine-tuning in this line of work often leaves such geometric cues underutilized for spatial reasoning, as VLMs tend to rely heavily on 2D visual cues. In this paper, we propose GeoSR, a framework designed to make geometry matter by encouraging VLMs to actively reason with geometry tokens. GeoSR introduces two key components: (1) Geometry-Unleashing Masking, which strategically masks portions of 2D vision tokens during training to weaken non-geometric shortcuts and force the model to consult geometry tokens for spatial reasoning; and (2) Geometry-Guided Fusion, a gated routing mechanism that adaptively amplifies geometry token contributions in regions where geometric evidence is critical. Together, these designs unleash the potential of geometry tokens for spatial reasoning tasks. Extensive experiments on both static and dynamic spatial reasoning benchmarks demonstrate that GeoSR consistently outperforms prior methods and establishes new state-of-the-art performance by effectively leveraging geometric information. The project page is available at https://suhzhang.github.io/GeoSR/.", "link": "http://arxiv.org/abs/2603.26639v1", "date": "2026-03-27", "relevancy": 2.8713, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5796}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5796}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5636}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Make%20Geometry%20Matter%20for%20Spatial%20Reasoning&body=Title%3A%20Make%20Geometry%20Matter%20for%20Spatial%20Reasoning%0AAuthor%3A%20Shihua%20Zhang%20and%20Qiuhong%20Shen%20and%20Shizun%20Wang%20and%20Tianbo%20Pan%20and%20Xinchao%20Wang%0AAbstract%3A%20Empowered%20by%20large-scale%20training%2C%20vision-language%20models%20%28VLMs%29%20achieve%20strong%20image%20and%20video%20understanding%2C%20yet%20their%20ability%20to%20perform%20spatial%20reasoning%20in%20both%20static%20scenes%20and%20dynamic%20videos%20remains%20limited.%20Recent%20advances%20try%20to%20handle%20this%20limitation%20by%20injecting%20geometry%20tokens%20from%20pretrained%203D%20foundation%20models%20into%20VLMs.%20Nevertheless%2C%20we%20observe%20that%20naive%20token%20fusion%20followed%20by%20standard%20fine-tuning%20in%20this%20line%20of%20work%20often%20leaves%20such%20geometric%20cues%20underutilized%20for%20spatial%20reasoning%2C%20as%20VLMs%20tend%20to%20rely%20heavily%20on%202D%20visual%20cues.%20In%20this%20paper%2C%20we%20propose%20GeoSR%2C%20a%20framework%20designed%20to%20make%20geometry%20matter%20by%20encouraging%20VLMs%20to%20actively%20reason%20with%20geometry%20tokens.%20GeoSR%20introduces%20two%20key%20components%3A%20%281%29%20Geometry-Unleashing%20Masking%2C%20which%20strategically%20masks%20portions%20of%202D%20vision%20tokens%20during%20training%20to%20weaken%20non-geometric%20shortcuts%20and%20force%20the%20model%20to%20consult%20geometry%20tokens%20for%20spatial%20reasoning%3B%20and%20%282%29%20Geometry-Guided%20Fusion%2C%20a%20gated%20routing%20mechanism%20that%20adaptively%20amplifies%20geometry%20token%20contributions%20in%20regions%20where%20geometric%20evidence%20is%20critical.%20Together%2C%20these%20designs%20unleash%20the%20potential%20of%20geometry%20tokens%20for%20spatial%20reasoning%20tasks.%20Extensive%20experiments%20on%20both%20static%20and%20dynamic%20spatial%20reasoning%20benchmarks%20demonstrate%20that%20GeoSR%20consistently%20outperforms%20prior%20methods%20and%20establishes%20new%20state-of-the-art%20performance%20by%20effectively%20leveraging%20geometric%20information.%20The%20project%20page%20is%20available%20at%20https%3A//suhzhang.github.io/GeoSR/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26639v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMake%2520Geometry%2520Matter%2520for%2520Spatial%2520Reasoning%26entry.906535625%3DShihua%2520Zhang%2520and%2520Qiuhong%2520Shen%2520and%2520Shizun%2520Wang%2520and%2520Tianbo%2520Pan%2520and%2520Xinchao%2520Wang%26entry.1292438233%3DEmpowered%2520by%2520large-scale%2520training%252C%2520vision-language%2520models%2520%2528VLMs%2529%2520achieve%2520strong%2520image%2520and%2520video%2520understanding%252C%2520yet%2520their%2520ability%2520to%2520perform%2520spatial%2520reasoning%2520in%2520both%2520static%2520scenes%2520and%2520dynamic%2520videos%2520remains%2520limited.%2520Recent%2520advances%2520try%2520to%2520handle%2520this%2520limitation%2520by%2520injecting%2520geometry%2520tokens%2520from%2520pretrained%25203D%2520foundation%2520models%2520into%2520VLMs.%2520Nevertheless%252C%2520we%2520observe%2520that%2520naive%2520token%2520fusion%2520followed%2520by%2520standard%2520fine-tuning%2520in%2520this%2520line%2520of%2520work%2520often%2520leaves%2520such%2520geometric%2520cues%2520underutilized%2520for%2520spatial%2520reasoning%252C%2520as%2520VLMs%2520tend%2520to%2520rely%2520heavily%2520on%25202D%2520visual%2520cues.%2520In%2520this%2520paper%252C%2520we%2520propose%2520GeoSR%252C%2520a%2520framework%2520designed%2520to%2520make%2520geometry%2520matter%2520by%2520encoura {"title": "ORION: ORthonormal Text Encoding for Universal VLM AdaptatION", "author": "Omprakash Chakraborty and Jose Dolz and Ismail Ben Ayed", "abstract": "Vision language models (VLMs) have demonstrated remarkable generalization across diverse tasks, yet their performance remains constrained by the quality and geometry of the textual prototypes used to represent classes. Standard zero shot classifiers, derived from frozen text encoders and handcrafted prompts, may yield correlated or weakly separated embeddings that limit task specific discriminability. We introduce ORION, a text encoder fine tuning framework that improves pretrained VLMs using only class names. Our method optimizes, via low rank adaptation, a novel loss integrating two terms, one promoting pairwise orthogonality between the textual representations of the classes of a given task and the other penalizing deviations from the initial class prototypes. Furthermore, we provide a probabilistic interpretation of our orthogonality penalty, connecting it to the general maximum likelihood estimation (MLE) principle via Huygens theorem. We report extensive experiments on 11 benchmarks and three large VLM backbones, showing that the refined textual embeddings yield powerful replacements for the standard CLIP prototypes. Added as plug and play module on top of various state of the art methods, and across different prediction settings (zero shot, few shot and test time adaptation), ORION improves the performance consistently and significantly.", "link": "http://arxiv.org/abs/2602.19530v2", "date": "2026-03-27", "relevancy": 2.8567, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5767}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5767}, {"title": "TAMM: TriAdapter Multi-Modal Learning fo {"title": "HandVQA: Diagnosing and Improving Fine-Grained Spatial Reasoning about Hands in Vision-Language Models", "author": "MD Khalequzzaman Chowdhury Sayem and Mubarrat Tajoar Chowdhury and Yihalem Yimolal Tiruneh and Muneeb A. Khan and Muhammad Salman Ali and Binod Bhattarai and Seungryul Baek", "abstract": "Understanding the fine-grained articulation of human hands is critical in high-stakes settings such as robot-assisted surgery, chip manufacturing, and AR/VR-based human-AI interaction. Despite achieving near-human performance on general vision-language benchmarks, current vision-language models (VLMs) struggle with fine-grained spatial reasoning, especially in interpreting complex and articulated hand poses. We introduce HandVQA, a large-scale diagnostic benchmark designed to evaluate VLMs' understanding of detailed hand anatomy through visual question answering. Built upon high-quality 3D hand datasets (FreiHAND, InterHand2.6M, FPHA), our benchmark includes over 1.6M controlled multiple-choice questions that probe spatial relationships between hand joints, such as angles, distances, and relative positions. We evaluate several state-of-the-art VLMs (LLaVA, DeepSeek and Qwen-VL) in both base and fine-tuned settings, using lightweight fine-tuning via LoRA. Our findings reveal systematic limitations in current models, including hallucinated finger parts, incorrect geometric interpretations, and poor generalization. HandVQA not only exposes these critical reasoning gaps but provides a validated path to improvement. We demonstrate that the 3D-grounded spatial knowledge learned from our benchmark transfers in a zero-shot setting, significantly improving accuracy of model on novel downstream tasks like hand gesture recognition (+10.33%) and hand-object interaction (+2.63%).", "link": "http://arxiv.org/abs/2603.26362v1", "date": "2026-03-27", "relevancy": 2.827, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", {"title": "Reflect to Inform: Boosting Multimodal Reasoning via Information-Gain-Driven Verification", "author": "Shuai Lv and Chang Liu and Feng Tang and Yujie Yuan and Aojun Zhou and Kui Zhang and Xi Yang and Yangqiu Song", "abstract": "Multimodal Large Language Models (MLLMs) achieve strong multimodal reasoning performance, yet we identify a recurring failure mode in long-form generation: as outputs grow longer, models progressively drift away from image evidence and fall back on textual priors, resulting in ungrounded reasoning and hallucinations. Interestingly, Based on attention analysis, we find that MLLMs have a latent capability for late-stage visual verification that is present but not consistently activated. Motivated by this observation, we propose Visual Re-Examination (VRE), a self-evolving training framework that enables MLLMs to autonomously perform visual introspection during reasoning without additional visual inputs. Rather than distilling visual capabilities from a stronger teacher, VRE promotes iterative self-improvement by leveraging the model itself to generate reflection traces, making visual information actionable through information gain. Extensive experiments across diverse multimodal benchmarks demonstrate that VRE consistently improves reasoning accuracy and perceptual reliability, while substantially reducing hallucinations, especially in long-chain settings. Code is available at https://github.com/Xiaobu-USTC/VRE.", "link": "http://arxiv.org/abs/2603.26348v1", "date": "2026-03-27", "relevancy": 2.8103, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5867}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": {"title": "When to Think and When to Look: Uncertainty-Guided Lookback", "author": "Jing Bi and Filippos Bellos and Junjia Guo and Yayuan Li and Chao Huang and Yolo Y. Tang and Luchuan Song and Susan Liang and Zhongfei Mark Zhang and Jason J. Corso and Chenliang Xu", "abstract": "Test-time thinking (that is, generating explicit intermediate reasoning chains) is known to boost performance in large language models and has recently shown strong gains for large vision language models (LVLMs). However, despite these promising results, there is still no systematic analysis of how thinking actually affects visual reasoning. We provide the first such analysis with a large scale, controlled comparison of thinking for LVLMs, evaluating ten variants from the InternVL3.5 and Qwen3-VL families on MMMU-val under generous token budgets and multi pass decoding. We show that more thinking is not always better; long chains often yield long wrong trajectories that ignore the image and underperform the same models run in standard instruct mode. A deeper analysis reveals that certain short lookback phrases, which explicitly refer back to the image, are strongly enriched in successful trajectories and correlate with better visual grounding. Building on this insight, we propose uncertainty guided lookback, a training free decoding strategy that combines an uncertainty signal with adaptive lookback prompts and breadth search. Our method improves overall MMMU performance, delivers the largest gains in categories where standard thinking is weak, and outperforms several strong decoding baselines, setting a new state of the art under fixed model families and token budgets. We further show that this decoding strategy generalizes, yielding consistent improvements on five additional benchmarks, including two broad multimodal suites and math focused visual reasoning datasets.", "link": "http://arxiv.org/abs/2511.15613v3", "date": "2026-03-27", "relevancy": 2.78, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5737}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5737}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5207}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20to%20Think%20and%20When%20to%20Look%3A%20Uncertainty-Guided%20Lookback&body=Title%3A%20When%20to%20Think%20and%20When%20to%20Look%3A%20Uncertainty-Guided%20Lookback%0AAuthor%3A%20Jing%20Bi%20and%20Filippos%20Bellos%20and%20Junjia%20Guo%20and%20Yayuan%20Li%20and%20Chao%20Huang%20and%20Yolo%20Y.%20Tang%20and%20Luchuan%20Song%20and%20Susan%20Liang%20and%20Zhongfei%20Mark%20Zhang%20and%20Jason%20J.%20Corso%20and%20Chenliang%20Xu%0AAbstract%3A%20Test-time%20thinking%20%28that%20is%2C%20generating%20explicit%20intermediate%20reasoning%20chains%29%20is%20known%20to%20boost%20performance%20in%20large%20language%20models%20and%20has%20recently%20shown%20strong%20gains%20for%20large%20vision%20language%20models%20%28LVLMs%29.%20However%2C%20despite%20these%20promising%20results%2C%20there%20is%20still%20no%20systematic%20analysis%20of%20how%20thinking%20actually%20affects%20visual%20reasoning.%20We%20provide%20the%20first%20such%20analysis%20with%20a%20large%20scale%2C%20controlled%20comparison%20of%20thinking%20for%20LVLMs%2C%20evaluating%20ten%20variants%20from%20the%20InternVL3.5%20and%20Qwen3-VL%20families%20on%20MMMU-val%20under%20generous%20token%20budgets%20and%20multi%20pass%20decoding.%20We%20show%20that%20more%20thinking%20is%20not%20always%20better%3B%20long%20chains%20often%20yield%20long%20wrong%20trajectories%20that%20ignore%20the%20image%20and%20underperform%20the%20same%20models%20run%20in%20standard%20instruct%20mode.%20A%20deeper%20analysis%20reveals%20that%20certain%20short%20lookback%20phrases%2C%20which%20explicitly%20refer%20back%20to%20the%20image%2C%20are%20strongly%20enriched%20in%20successful%20trajectories%20and%20correlate%20with%20better%20visual%20grounding.%20Building%20on%20this%20insight%2C%20we%20propose%20uncertainty%20guided%20lookback%2C%20a%20training%20free%20decoding%20strategy%20that%20combines%20an%20uncertainty%20signal%20with%20adaptive%20lookback%20prompts%20and%20breadth%20search.%20Our%20method%20improves%20overall%20MMMU%20performance%2C%20delivers%20the%20largest%20gains%20in%20categories%20where%20standard%20thinking%20is%20weak%2C%20and%20outperforms%20several%20strong%20decoding%20baselines%2C%20setting%20a%20new%20state%20of%20the%20art%20under%20fixed%20model%20families%20and%20token%20budgets.%20We%20further%20show%20that%20this%20decoding%20strategy%20generalizes%2C%20yielding%20consistent%20improvements%20on%20five%20additional%20benchmarks%2C%20including%20two%20broad%20multimodal%20suites%20and%20math%20focused%20visual%20reasoning%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15613v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520to%2520Think%2520and%2520When%2520to%2520Look%253A%2520Uncertainty-Guided%2520Lookback%26entry.906535625%3DJing%2520Bi%2520and%2520Filippos%2520Bellos%2520and%2520Junjia%2520Guo%2520and%2520Yayuan%2520Li%2520and%2520Chao%2520Huang%2520and%2520Yolo%2520Y.%2520Tang%2520and%2520Luchuan%2520Song%2520and%2520Susan%2520Liang%2520and%2520Zhongfei%2520Mark%2520Zhang%2520and%2520Jason%2520J.%2520Corso%2520and%2520Chenliang%2520Xu%26entry.1292438233%3DTest-time%2520thinking%2520%2528that%2520is%252C%2520generating%2520explicit%2520intermediate%2520reasoning%2520chains%2529%2520is%2520known%2520to%2520boost%2520performa state%2520of%2520the%2520art%2520under%2520fixed%2520model%2520families%2520and%2520token%2520budgets.%2520We%2520further%2520show%2520that%2520this%2520decoding%2520strategy%2520generalizes%252C%2520yielding%2520consistent%2520improvements%2520on%2520five%2520additional%2520benchmarks%252C%2520including%2520two%2520broad%2520multimodal%2520suites%2520and%2520math%2520focused%2520visual%2520reasoning%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.15613v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20to%20Think%20and%20When%20to%20Look%3A%20Uncertainty-Guided%20Lookback&entry.906535625=Jing%20Bi%20and%20Filippos%20Bellos%20and%20Junjia%20Guo%20and%20Yayuan%20Li%20and%20Chao%20Huang%20and%20Yolo%20Y.%20Tang%20and%20Luchuan%20Song%20and%20Susan%20Liang%20and%20Zhongfei%20Mark%20Zhang%20and%20Jason%20J.%20Corso%20and%20Chenliang%20Xu&entry.1292438233=Test-time%20thinking%20%28that%20is%2C%20generating%20explicit%20intermediate%20reasoning%20chains%29%20is%20known%20to%20boost%20performance%20in%20large%20language%20models%20and%20has%20recently%20shown%20strong%20gains%20for%20large%20vision%20language%20models%20%28LVLMs%29.%20However%2C%20despite%20these%20promising%20results%2C%20there%20is%20still%20no%20systematic%20analysis%20of%20how%20thinking%20actually%20affects%20visual%20reasoning.%20We%20provide%20the%20first%20such%20analysis%20with%20a%20large%20scale%2C%20controlled%20comparison%20of%20thinking%20for%20LVLMs%2C%20evaluating%20ten%20variants%20from%20the%20InternVL3.5%20and%20Qwen3-VL%20families%20on%20MMMU-val%20under%20generous%20token%20budgets%20and%20multi%20pass%20decoding.%20We%20show%20that%20more%20thinking%20is%20not%20always%20better%3B%20long%20chains%20often%20yield%20long%20wrong%20trajectories%20that%20ignore%20the%20image%20and%20underperform%20the%20same%20models%20run%20in%20standard%20instruct%20mode.%20A%2 {"title": "One Patch to Caption Them All: A Unified Zero-Shot Captioning Framework", "author": "Lorenzo Bianchi and Giacomo Pacini and Fabio Carrara and Nicola Messina and Giuseppe Amato and Fabrizio Falchi", "abstract": "Zero-shot captioners are recently proposed models that utilize common-space vision-language representations to caption images without relying on paired image-text data. To caption an image, they proceed by textually decoding a text-aligned image feature, but they limit their scope to global representations and whole-image captions. We present a unified framework for zero-shot captioning that shifts from an image-centric to a patch-centric paradigm, enabling the captioning of arbitrary regions without the need of region-level supervision. Instead of relying on global image representations, we treat individual patches as atomic captioning units and aggregate them to describe arbitrary regions, from single patches to non-contiguous areas and entire images. We analyze the key ingredients that enable current latent captioners to work in our novel proposed framework. Experiments demonstrate that backbones producing meaningful, dense visual features, such as DINO, are key to achieving state-of-the-art performance in multiple region-based captioning tasks. Compared to other baselines and state-of-the-art competitors, our models achieve better performance on zero-shot dense captioning and region-set captioning. We also introduce a new trace captioning task that further demonstrates the effectiveness of patch-wise semantic representations for flexible caption generation. Project page at https://paciosoft.com/Patch-ioner/ .", "link": "http://arxiv.org/abs/2510.02898v4", "date": "2026-03-27", "relevancy": 2.7726, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5831}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5402}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5402}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Patch%20to%20Caption%20Them%20All%3A%20A%20Unified%20Zero-Shot%20Captioning%20Framework&body=Title%3A%20One%20Patch%20to%20Caption%20Them%20All%3A%20A%20Unified%20Zero-Shot%20Captioning%20Framework%0AAuthor%3A%20Lorenzo%20Bianchi%20and%20Giacomo%20Pacini%20and%20Fabio%20Carrara%20and%20Nicola%20Messina%20and%20Giuseppe%20Amato%20and%20Fabrizio%20Falchi%0AAbstract%3A%20Zero-shot%20captioners%20are%20recently%20proposed%20models%20that%20utilize%20common-space%20vision-language%20representations%20to%20caption%20images%20without%20relying%20on%20paired%20image-text%20data.%20To%20caption%20an%20image%2C%20they%20proceed%20by%20textually%20decoding%20a%20text-aligned%20image%20feature%2C%20but%20they%20limit%20their%20scope%20to%20global%20representations%20and%20whole-image%20captions.%20We%20present%20a%20unified%20framework%20for%20zero-shot%20captioning%20that%20shifts%20from%20an%20image-centric%20to%20a%20patch-centric%20paradigm%2C%20enabling%20the%20captioning%20of%20arbitrary%20regions%20without%20the%20need%20of%20region-level%20supervision.%20Instead%20of%20relying%20on%20global%20image%20representations%2C%20we%20treat%20individual%20patches%20as%20atomic%20captioning%20units%20and%20aggregate%20them%20to%20describe%20arbitrary%20regions%2C%20from%20single%20patches%20to%20non-contiguous%20areas%20and%20entire%20images.%20We%20analyze%20the%20key%20ingredients%20that%20enable%20current%20latent%20captioners%20to%20work%20in%20our%20novel%20proposed%20framework.%20Experiments%20demonstrate%20that%20backbones%20producing%20meaningful%2C%20dense%20visual%20features%2C%20such%20as%20DINO%2C%20are%20key%20to%20achieving%20state-of-the-art%20performance%20in%20multiple%20region-based%20captioning%20tasks.%20Compared%20to%20other%20baselines%20and%20state-of-the-art%20competitors%2C%20our%20models%20achieve%20better%20performance%20on%20zero-shot%20dense%20captioning%20and%20region-set%20captioning.%20We%20also%20introduce%20a%20new%20trace%20captioning%20task%20that%20further%20demonstrates%20the%20effectiveness%20of%20patch-wise%20semantic%20representations%20for%20flexible%20caption%20generation.%20Project%20page%20at%20https%3A//paciosoft.com/Patch-ioner/%20.%0ALink%3A%20http%3A//arxiv.org/abs/2510.02898v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520Patch%2520to%2520Caption%2520Them%2520All%253A%2520A%2520Unified%2520Zero-Shot%2520Captioning%2520Framework%26entry.906535625%3DLorenzo%2520Bianchi%2520and%2520Giacomo%2520Pacini%2520and%2520Fabio%2520Carrara%2520and%2520Nicola%2520Messina%2520and%2520Giuseppe%2520Amato%2520and%2520Fabrizio%2520Falchi%26entry.1292438233%3DZero-shot%2520captioners%2520are%2520recently%2520proposed%2520models%2520that%2520utilize%2520common-space%2520vision-language%2520representations%2520to%2520caption%2520images%2520without%2520relying%2520on%2520paired%2520image-text%2520data.%2520To%2520caption%2520an%2520image%252C%2520they%2520proceed%2520by%2520textually%2520decoding%2520a%2520text-aligned%2520image%2520feature%252C%2520but%2520they%2520limit%2520their%2520scope%2520to%2520global%2520representations%2520and%2520whole-image%2520captions.%2520We%2520present%2520a%2520unified%2520framework%2520for%2520zero-shot%2520captioning%2520that%2520shifts%2520from%2520an%2520image-centric%2520to%2520a%2520patch-centric%2520paradigm%252C%2520enabling%2520the%2520captioning%2520of%2520arbitrary%2520regions%2520without%2520the%2520need%2520of%2520region-level%2520supervision.%2520Instead%2520of%2520relying%2520on%2520global%2520image%2520representations%252C%2520we%2520treat%2520individual%252 {"title": "Local Precise Refinement: A Dual-Gated Mixture-of-Experts for Enhancing Foundation Model Generalization against Spectral Shifts", "author": "Xi Chen and Maojun Zhang and Yu Liu and Shen Yan", "abstract": "Domain Generalization Semantic Segmentation (DGSS) in spectral remote sensing is severely challenged by spectral shifts across diverse acquisition conditions, which cause significant performance degradation for models deployed in unseen domains. While fine-tuning foundation models is a promising direction, existing methods employ global, homogeneous adjustments. This \"one-size-fits-all\" tuning struggles with the spatial heterogeneity of land cover, causing semantic confusion. We argue that the key to robust DGSS lies not in a single global adaptation, but in performing fine-grained, spatially-adaptive refinement of a foundation model's features. To achieve this, we propose SpectralMoE, a novel fine-tuning framework for DGSS. It operationalizes this principle by utilizing a Mixture-of-Experts (MoE) architecture to perform \\textbf{local precise refinement} on the foundation model's features, incorporating depth features estimated from selected RGB bands of the spectral remote sensing imagery to guide the fine-tuning process. Specifically, SpectralMoE employs a dual-gated MoE architecture that independently routes visual and depth features to top-k selected experts for specialized refinement, enabling modality-specific adjustments. A subsequent cross-attention mechanism then judiciously fuses the refined structural cues into the visual stream, mitigating semantic ambiguities caused by spectral variations. Extensive experiments show that SpectralMoE sets a new state-of-the-art on multiple DGSS benchmarks across hyperspectral, multispectral, and RGB remote sensing imagery.", "link": "http://arxiv.org/abs/2603.13352v3", "date": "2026-03-27", "relevancy": 2.7677, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and 5Ctextbf%7Blocal%20precise%20refinement%7D%20on%20the%20foundation%20model%27s%20features%2C%20incorporating%20depth%20features%20estimated%20from%20selected%20RGB%20bands%20of%20the%20spectral%20remote%20sensing%20imagery%20to%20guide%20the%20fine-tuning%20process.%20Specifically%2C%20SpectralMoE%20employs%20a%20dual-gated%20MoE%20architecture%20that%20independently%20routes%20visual%20and%20depth%20features%20to%20top-k%20selected%20experts%20for%20specialized%20refinement%2C%20enabling%20modality-specific%20adjustments.%20A%20subsequent%20cross-attention%20mechanism%20then%20judiciously%20fuses%20the%20refined%20structural%20cues%20into%20the%20visual%20stream%2C%20mitigating%20semantic%20ambiguities%20caused%20by%20spectral%20variations.%20Extensive%20experiments%20show%20that%20SpectralMoE%20sets%20a%20new%20state-of-the-art%20on%20multiple%20DGSS%20benchmarks%20across%20hyperspectral%2C%20multispectral%2C%20and%20RGB%20remote%20sensing%20imagery.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13352v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLocal%2520Precise%2520Refinement%253A%2520A%2520Dual-Gated%2520Mixture-of-Experts%2520for%2520Enhancing%2520Foundation%2520Model%2520Generalization%2520against%2520Spectral%2520Shifts%26entry.906535625%3DXi%2520Chen%2520and%2520Maojun%2520Zhang%2520and%2520Yu%2520Liu%2520and%2520Shen%2520Yan%26entry.1292438233%3DDomain%2520Generalization%2520Semantic%2520Segmentation%2520%2528DGSS%2529%2520in%2520spectral%2520remote%2520sensing%2520is%2520severely%2520challenged%2520by%2520spectral%2520shifts%2520across%2520diverse%2520acquisition%2520conditions%252C%2520which%2520cause%2520significant%2520performance%2520degradation%2520for%2520models%2520deployed%2520in%2520unseen%2520domains.%2520While%2520fine-tuning%2520foundation%2520models%2520is%2520a%2520promising%2520direction%252C%2520existing%2520methods%2520employ%2520global%252C%2520homogene .org/abs/2603.13352v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Local%20Precise%20Refinement%3A%20A%20Dual-Gated%20Mixture-of-Experts%20for%20Enhancing%20Foundation%20Model%20Generalization%20against%20Spectral%20Shifts&entry.906535625=Xi%20Chen%20and%20Maojun%20Zhang%20and%20Yu%20Liu%20and%20Shen%20Yan&entry.1292438233=Domain%20Generalization%20Semantic%20Segmentation%20%28DGSS%29%20in%20spectral%20remote%20sensing%20is%20severely%20challenged%20by%20spectral%20shifts%20across%20diverse%20acquisition%20conditions%2C%20which%20cause%20significant%20performance%20degradation%20for%20models%20deployed%20in%20unseen%20domains.%20While%20fine-tuning%20foundation%20models%20is%20a%20promising%20direction%2C%20existing%20methods%20employ%20global%2C%20homogeneous%20adjustments.%20This%20%22one-size-fits-all%22%20tuning%20struggles%20with%20the%20spatial%20heterogeneity%20of%20land%20cover%2C%20causing%20semantic%20confusion.%20We%20argue%20that%20the%20key%20to%20robust%20DGSS%20lies%20not%20in%20a%20single%20global%20adaptation%2C%20but%20in%20performing%20fine-grained%2C%20spatially-adaptive%20refinement%20of%20a%20foundation%20model%27s%20features.%20To%20achieve%20this%2C%20we%20propose%20SpectralMoE%2C%20a%20novel%20fine-tuning%20framework%20for%20DGSS.%20It%20operationalizes%20this%20principle%20by%20utilizing%20a%20Mixture-of-Experts%20%28MoE%29%20architecture%20to%20perform%20%5Ctextbf%7Blocal%20precise%20refinement%7D%20on%20the%20foundation%20model%27s%20features%2C%20incorporating%20depth%20features%20estimated%20from%20selected%20RGB%20bands%20of%20the%20spectral%20remote%20sensing%20imagery%20to%20guide%20the%20fine-tuning%20process.%20Specifically%2C%20SpectralMoE%20employs%20a%20dual-gated%20MoE%20architecture%20that%20independently%20routes%20visual%20and%20depth%20features%20to%20top-k%20selected%20experts%20for%20specialized%20refinement%2C%20en {"title": "Generative Modeling in Protein Design: Neural Representations, Conditional Generation, and Evaluation Standards", "author": "Senura Hansaja Wanasekara and Minh-Duong Nguyen and Xiaochen Liu and Nguyen H. Tran and Ken-Tye Yong", "abstract": "Generative modeling has become a central paradigm in protein research, extending machine learning beyond structure prediction toward sequence design, backbone generation, inverse folding, and biomolecular interaction modeling. However, the literature remains fragmented across representations, model classes, and task formulations, making it difficult to compare methods or identify appropriate evaluation standards. This survey provides a systematic synthesis of generative AI in protein research, organized around (i) foundational representations spanning sequence, geometric, and multimodal encodings; (ii) generative architectures including $\\mathrm{SE}(3)$-equivariant diffusion, flow matching, and hybrid predictor-generator systems; and (iii) task settings from structure prediction and de novo design to protein-ligand and protein-protein interactions. Beyond cataloging methods, we compare assumptions, conditioning mechanisms, and controllability, and we synthesize evaluation best practices that emphasize leakage-aware splits, physical validity checks, and function-oriented benchmarks. We conclude with critical open challenges: modeling conformational dynamics and intrinsically disordered regions, scaling to large assemblies while maintaining efficiency, and developing robust safety frameworks for dual-use biosecurity risks. By unifying architectural advances with practical evaluation standards and responsible development considerations, this survey aims to accelerate the transition from predictive modeling to reliable, function-driven protein engineering.", "link": "http://arxiv.org/abs/2603.26378v1", "date": "2026-03-27", "relevancy": 2.7454, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http {"title": "Image-based Quantification of Postural Deviations on Patients with Cervical Dystonia: A Machine Learning Approach Using Synthetic Training Data", "author": "Roland Stenger and Sebastian L\u00f6ns and Nele Br\u00fcgge and Feline Hamami and Alexander M\u00fcnchau and Theresa Paulus and Anne Weissbach and Tatiana Usnich and Max Borsche and Martje G. Pauly and Lara M. Lange and Markus A. Hobert and Rebecca Herzog and Ana Lu\u00edsa de Almeida Marcelino and Tina Mainka and Friederike Schumann and Lukas L. Goede and Johanna Reimer and Julienne Haas and Jos Becktepe and Alexander Baumann and Robin Wolke and Chi Wang Ip and Thorsten Odorfer and Daniel Zeller and Lisa Harder-Rauschenberger and John-Ih Lee and Philipp Albrecht and Tristan K\u00f6lsche and Joachim K. Krauss and Johanna M. Nagel and Joachim Runge and Johanna Doll-Lee and Simone Zittel and Kai Grimm and Pawel Tacik and Andr\u00e9 Lee and Tobias B\u00e4umer and Sebastian Fudickar", "abstract": "Cervical dystonia (CD) is the most common form of dystonia, yet current assessment relies on subjective clinical rating scales, such as the Toronto Western Spasmodic Torticollis Rating Scale (TWSTRS), which requires expertise, is subjective and faces low inter-rater reliability some items of the score. To address the lack of established objective tools for monitoring disease severity and treatment response, this study validates an automated image-based head pose and shift estimation system for patients with CD. We developed an assessment tool that combines a pretrained head-pose estimation algorithm for rotational symptoms with a deep learning model trained exclusively on ~16,000 synthetic avatar images to evaluate rare translational symptoms, specifically lateral shift. This synthetic data approach overcomes the scarcity of clinical training examples. The system's performance was validated in a multicenter study by comparing its predicted scores against the consensus ratings of 20 clinical experts using a dataset of 100 real patient images and 100 labeled synthetic avatars. The automated system demonstrated strong agreement with expert clinical ratings for rotational symptoms, achieving high correlations for torticollis (r=0.91), laterocollis (r=0.81), and anteroretrocollis (r=0.78). For lateral shift, the tool achieved a moderate correlation (r=0.55) with clinical ratings and demonstrated higher accuracy than human raters in controlled benchmark tests on avatars. By leveraging synthetic training data to bridge the clinical data gap, this model successfully generalizes to real-world patients, providing a validated, objective tool for CD postural assessment that can enable standardized clinical decision-making and trial evaluation.", "link": "http://arxiv.org/abs/2603.26444v1", "date": "2026-03-27", "relevancy": 2.7364, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5651}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5386}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5382}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Image-based%20Quantification%20of%20Postural%20Deviations%20on%20Patients%20with%20Cervical%20Dystonia%3A%20A%20Machine%20Learning%20Approach%20Using%20Synthetic%20Training%20Data&body=Title%3A%20Image-based%20Quantification%20of%20Postural%20Deviations%20on%20Patients%20with%20Cervical%20Dystonia%3A%20A%20Machine%20Learning%20Approach%20Using%20Synthetic%20Training%20Data%0AAuthor%3A%20Roland%20Stenger%20and%20Sebastian%20L%C3%B6ns%20and%20Nele%20Br%C3%BCgge%20and%20Feline%20Hamami%20and%20Alexander%20M%C3%BCnchau%20and%20Theresa%20Paulus%20and%20Anne%20Weissbach%20and%20Tatiana%20Usnich%20and%20Max%20Borsche%20and%2 {"title": "TimeSenCLIP: A Time Series Vision-Language Model for Remote Sensing", "author": "Pallavi Jain and Diego Marcos and Dino Ienco and Roberto Interdonato and Tristan Berchoux", "abstract": "Vision-language models (VLMs) have shown significant promise in remote sensing applications, particularly for land-use and land-cover (LULC) mapping via zero-shot classification and retrieval. However, current approaches face several key challenges, such as the dependence on caption-based supervision, which is often not available or very limited in terms of the covered semantics, and the fact of being adapted from generic VLM architectures that are suitable for very high resolution images. Consequently, these models tend to prioritize spatial context over spectral and temporal information, limiting their effectiveness for medium-resolution remote sensing imagery. In this work, we present TimeSenCLIP, a lightweight VLM for remote sensing time series, using a cross-view temporal contrastive framework to align multispectral Sentinel-2 time series with geo-tagged ground-level imagery, without requiring textual annotations. Unlike prior VLMs, TimeSenCLIP emphasizes temporal and spectral signals over spatial context, investigating whether single-pixel time series contain sufficient information for solving a variety of tasks.", "link": "http://arxiv.org/abs/2508.11919v3", "date": "2026-03-27", "relevancy": 2.7067, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5428}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5428}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5383}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TimeSenCLIP%3A%20A%20Time% 2520solving%2520a%2520variety%2520of%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.11919v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TimeSenCLIP%3A%20A%20Time%20Series%20Vision-Language%20Model%20for%20Remote%20Sensing&entry.906535625=Pallavi%20Jain%20and%20Diego%20Marcos%20and%20Dino%20Ienco%20and%20Roberto%20Interdonato%20and%20Tristan%20Berchoux&entry.1292438233=Vision-language%20models%20%28VLMs%29%20have%20shown%20significant%20promise%20in%20remote%20sensing%20applications%2C%20particularly%20for%20land-use%20and%20land-cover%20%28LULC%29%20mapping%20via%20zero-shot%20classification%20and%20retrieval.%20However%2C%20current%20approaches%20face%20several%20key%20challenges%2C%20such%20as%20the%20dependence%20on%20caption-based%20supervision%2C%20which%20is%20often%20not%20available%20or%20very%20limited%20in%20terms%20of%20the%20covered%20semantics%2C%20and%20the%20fact%20of%20being%20adapted%20from%20generic%20VLM%20architectures%20that%20are%20suitable%20for%20very%20high%20resolution%20images.%20Consequently%2C%20these%20models%20tend%20to%20prioritize%20spatial%20context%20over%20spectral%20and%20temporal%20information%2C%20limiting%20their%20effectiveness%20for%20medium-resolution%20remote%20sensing%20imagery.%20In%20this%20work%2C%20we%20present%20TimeSenCLIP%2C%20a%20lightweight%20VLM%20for%20remote%20sensing%20time%20series%2C%20using%20a%20cross-view%20temporal%20contrastive%20framework%20to%20align%20multispectral%20Sentinel-2%20time%20series%20with%20geo-tagged%20ground-level%20imagery%2C%20without%20requiring%20textual%20annotations.%20Unlike%20prior%20VLMs%2C%20TimeSenCLIP%20emphasizes%20temporal%20and%20spectral%20signals%20over%20spatial%20context%2C%20investigating%20whether%20single-pixel%20time%20series%20contain%20sufficient%20information%20for%20solving%20a%20variety%20of%20tasks.&entry.1838667208=http%3A//arxiv.org/ {"title": "SPECTRA: An Efficient Spectral-Informed Neural Network for Sensor-Based Activity Recognition", "author": "Deepika Gurung and Lala Shakti Swarup Ray and Mengxi Liu and Bo Zhou and Paul Lukowicz", "abstract": "Real time sensor based applications in pervasive computing require edge deployable models to ensure low latency privacy and efficient interaction. A prime example is sensor based human activity recognition where models must balance accuracy with stringent resource constraints. Yet many deep learning approaches treat temporal sensor signals as black box sequences overlooking spectral temporal structure while demanding excessive computation. We present SPECTRA a deployment first co designed spectral temporal architecture that integrates short time Fourier transform STFT feature extraction depthwise separable convolutions and channel wise self attention to capture spectral temporal dependencies under real edge runtime and memory constraints. A compact bidirectional GRU with attention pooling summarizes within window dynamics at low cost reducing downstream model burden while preserving accuracy. Across five public HAR datasets SPECTRA matches or approaches larger CNN LSTM and Transformer baselines while substantially reducing parameters latency and energy. Deployments on a Google Pixel 9 smartphone and an STM32L4 microcontroller further demonstrate end to end deployable realtime private and efficient HAR.", "link": "http://arxiv.org/abs/2603.26482v1", "date": "2026-03-27", "relevancy": 2.6904, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5666}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5319}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5158}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPECTRA%3A%20An%20Efficient%20Spectral-Informed%20Neural%20Network%20for%20Sensor-Based%20Activity%20Recognition&body=Title%3A%20SPECTRA%3A%20An%20Efficient%20Spectral-Informed%20Neural%20Network%20for%20Sensor-Based%20Activity%20Recognition%0AAuthor%3A%20Deepika%20Gurung%20and%20Lala%20Shakti%20Swarup%20Ray%20and%20Mengxi%20Liu%20and%20Bo%20Zhou%20and%20Paul%20Lukowicz%0AAbstract%3A%20Real%20time%20sensor%20based%20applications%20in%20pervasive%20computing%20require%20edge%20deployable%20models%20to%20ensure%20low%20latency%20privacy%20and%20efficient%20interaction.%20A%20prime%20example%20is%20sensor%20based%20human%20activity%20recognition%20where%20models%20must%20balance%20accuracy%20with%20stringent%20resource%20constraints.%20Yet%20many%20deep%20learning%20approaches%20treat%20temporal%20sensor%20signals%20as%20black%20box%20sequences%20overlooking%20spectral%20temporal%20structure%20while%20demanding%20excessive%20computation.%20We%20present%20SPECTRA%20a%20deployment%20first%20co%20designed%20spectral%20temporal%20architecture%20that%20integrates%20short%20time%20Fourier%20transform%20STFT%20feature%20extraction%20depthwise%20separable%20convolutions%20and%20channel%20wise%20self%20attention%20to%20capture%20spectral%20temporal%20dependencies%20under%20real%20edge%20runtime%20and%20memory%20constraints.%20A%20compact%20bidirectional%20GRU%20with%20attention%20pooling%20summarizes%20within%20window%20dynamics%20at%20low%20cost%20reducing%20downstream%20model%20burden%20while%20preserving%20accuracy.%20Across%20five%20public%20HAR%20datasets%20SPECTRA%20matches%20or%20approaches%20larger%20CNN%20LSTM%20and%20Transformer%20baselines%20while%20substantially%20reducing%20parameters%20latency%20and%20energy.%20Deployments%20on%20a%20Google%20Pixel%209%20smartphone%20and%20an%20STM32L4%20microcontroller%20further%20demonstrate%20end%20to%20end%20deployable%20realtime%20private%20and%20efficient%20HAR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26482v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSPECTRA%253A%2520An%2520Efficient%2520Spectral-Informed%2520Neural%2520Network%2520for%2520Sensor-Based%2520Activity%2520Recognition%26entry.906535625%3DDeepika%2520Gurung%2520and%2520Lala%2520Shakti%2520Swarup%2520Ray%2520and%2520Mengxi%2520Liu%2520and%2520Bo%2520Zhou%2520and%2520Paul%2520Lukowicz%26entry.1292438233%3DReal%2520time%2520sensor%2520based%2520applications%2520in%2520pervasive%2520computing%2520require%2520edge%2520deployable%2520models%2520to%2520ensure%2520low%2520latency%2520privacy%2520and%2520efficient%2520interaction.%2520A%2520prime%2520example%2520is%2520sensor%2520based%2520human%2520activity%2520recognition%2520where%2520models%2520must%2520balance%2520accuracy%2520with%2520stringent%2520resource%2520constraints.%2520Yet%2520many%2520deep%2520learning%2520approaches%2520treat%2520temporal%2520sensor%2520signals%2520as%2520black%2520box%2520sequences%2520overlooking%2520spectral%2520temporal%2520structure%2520while%2520demanding%2520excessive%2520computation.%2520We%2520present%2520SPECTRA%2520a%2520deployment%2520first%2520co%2520designed%2520spectral%2520temporal%2520architecture%2520that%2520integrates%2520short%2520time%2520Fourier%2520transform%2520STFT%2520feature%2520extraction%2520depthwise%2520separable%2520convolutions%2520and%2520channel%2520wise%2520self%2520attention%2520to%2520capture%2520spectral%2520temporal%2520dependencies%2520under%2520real%2520edge%2520runtime%2520and%2520memory%2520constraints.%2520A%2520compact%2520bidirectional%2520GRU%2520with%2520attention%2520pooling%2520summarizes%2520within%2520window%2520dynamics%2520at%2520low%2520cost%2520reducing%2520downstream%2520model%2520burden%2520while%2520preserving%2520accuracy.%2520Across%2520five%2520public%2520HAR%2520datasets%2520SPECTRA%2520matches%2520or%2520approaches%2520larger%2520CNN%2520LSTM%2520and%2520Transformer%2520baselines%2520while%2520substantially%2520reducing%2520parameters%2520latency%2520and%2520energy.%2520Deployments%2520on%2520a%2520Google%2520Pixel%25209%2520smartphone%2520and%2520an%2520STM32L4%2520microcontroller%2520further%2520demonstrate%2520end%2520to%2520end%2520deployable%2520realtime%2520private%2520and%2520efficient%2520HAR.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26482v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SPECTRA%3A%20An%20Efficient%20Spectral-Informed%20Neural%20Network%20for%20Sensor-Based%20Activity%20Recognition&entry.906535625=Deepika%20Gurung%20and%20Lala%20Shakti%20Swarup%20Ray%20and%20Mengxi%20Liu%20and%20Bo%20Zhou%20and%20Paul%20Lukowicz&entry.1292438233=Real%20time%20sensor%20based%20applications%20in%20pervasive%20computing%20require%20edge%20deployable%20models%20to%20ensure%20low%20latency%20privacy%20and%20efficient%20interaction.%20A%20prime%20example%20is%20sensor%20based%20human%20activity%20recognition%20where%20models%20must%20balance%20accuracy%20with%20stringent%20resource%20constraints.%20Yet%20many%20deep%20learning%20approaches%20treat%20temporal%20sensor%20signals%20as%20black%20box%20sequences%20overlooking%20spectral%20temporal%20structure%20while%20demanding%20excessive%20computation.%20We%20present%20SPECTRA%20a%20deployment%20first%20co%20designed%20spectral%20temporal%20architecture%20that%20integrates%20short%20time%20Fourier%20transform%20STFT%20feature%20extraction%20depthwise%20separable%20convolutions%20and%20channel%20wise%20self%20attention%20to%20capture%20spectral%20temporal%20dependencies%20under%20real%20edge%20runtime%20and%20memory%20constraints.%20A%20compact%20bidirectional%20GRU%20with%20attention%20pooling%20summarizes%20within%20window%20dynamics%20at%20low%20cost%20reducing%20downstream%20model%20 {"title": "MS-ISSM: Objective Quality Assessment of Point Clouds Using Multi-scale Implicit Structural Similarity", "author": "Zhang Chen and Shuai Wan and Yuezhe Zhang and Siyu Ren and Fuzheng Yang and Junhui Hou", "abstract": "The unstructured and irregular nature of points poses a significant challenge for accurate point cloud quality assessment (PCQA), particularly in establishing accurate perceptual feature correspondence. To tackle this, we propose the Multi-scale Implicit Structural Similarity Measurement (MS-ISSM). Unlike traditional point-to-point matching, MS-ISSM utilizes radial basis function (RBF) to represent local features continuously, transforming distortion measurement into a comparison of implicit function coefficients. This approach effectively circumvents matching errors inherent in irregular data. Additionally, we propose a ResGrouped-MLP quality assessment network, which robustly maps multi-scale feature differences to perceptual scores. The network architecture departs from traditional flat multi-layer perceptron (MLP) by adopting a grouped encoding strategy integrated with residual blocks and channel-wise attention mechanisms. This hierarchical design allows the model to preserve the distinct physical semantics of luma, chroma, and geometry while adaptively focusing on the most salient distortion features across High, Medium, and Low scales. Experimental results on multiple benchmarks demonstrate that MS-ISSM outperforms state-of-the-art metrics in both reliability and generalization. The source code is available at: https://github.com/ZhangChen2022/MS-ISSM.", "link": "http://arxiv.org/abs/2601.01200v2", "date": "2026-03-27", "relevancy": 2.6887, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5445}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5419}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5268}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MS-ISSM%3A%20Objective%20Quality%20Assessment%20of%20Point%20Clouds%20Using%20Multi-scale%20Implicit%20Structural%20Similarity&body=Title%3A%20MS-ISSM%3A%20Objective%20Quality%20Assessment%20of%20Point%20Clouds%20Using%20Multi-scale%20Implicit%20Structural%20Similarity%0AAuthor%3A%20Zhang%20Chen%20and%20Shuai%20Wan%20and%20Yuezhe%20Zhang%20and%20Siyu%20Ren%20and%20Fuzheng%20Yang%20and%20Junhui%20Hou%0AAbstract%3A%20The%20unstructured%20and%20irregular%20nature%20of%20points%20poses%20a%20significant%20challenge%20for%20accurate%20point%20cloud%20quality%20assessment%20%28PCQA%29%2C%20particularly%20in%20establishing%20accurate%20perceptual%20feature%20correspondence.%20To%20tackle%20this%2C%20we%20propose%20the%20Multi-scale%20Implicit%20Structural%20Similarity%20Measurement%20%28MS-ISSM%29.%20Unlike%20traditional%20point-to-point%20matching%2C%20MS-ISSM%20utilizes%20radial%20basis%20function%20%28RBF%29%20to%20represent%20local%20features%20continuously%2C%20transforming%20distortion%20measurement%20into%20a%20comparison%20of%20implicit%20function%20coefficients.%20This%20approach%20effectively%20circumvents%20matching%20errors%20inherent%20in%20irregular%20data.%20Additionally%2C%20we%20propose%20a%20ResGrouped-MLP%20quality%20assessment%20network%2C%20which%20robustly%20maps%20multi-scale%20feature%20differences%20to%20perceptual%20scores.%20The%20network%20architecture%20departs%20from%20traditional%20flat%20multi-layer%20perceptron%20%28MLP%29%20by%20adopting%20a%20grouped%20encoding%20strategy%20integrated%20with%20residual%20blocks%20and%20channel-wise%20attention%20mechanisms.%20This%20hierarchical%20design%20allows%20the%20model%20to%20preserve%20the%20distinct%20physical%20semantics%20of%20luma%2C%20chroma%2C%20and%20geometry%20while%20adaptively%20focusing%20on%20the%20most%20salient%20distortion%20features%20across%20High%2C%20Medium%2C%20and%20Low%20scales.%20Experimental%20results%20on%20multiple%20benchmarks%20demonstrate%20that%20MS-ISSM%20outperforms%20state-of-the-art%20metrics%20in%20both%20reliability%20and%20generalization.%20The%20source%20code%20is%20available%20at%3A%20https%3A//github.com/ZhangChen2022/MS-ISSM.%0ALink%3A%20http%3A//arxiv.org/abs/2601.01200v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMS-ISSM%253A%2520Objective%2520Quality%2520Assessment%2520of%2520Point%2520Clouds%2520Using%2520Multi-scale%2520Implicit%2520Structural%2520Similarity%26entry.906535625%3DZhang%2520Chen%2520and%2520Shuai%2520Wan%2520and%2520Yuezhe%2520Zhang%2520and%2520Siyu%2520Ren%2520and%2520Fuzheng%2520Yang%2520and%2520Junhui%2520Hou%26entry.1292438233%3DThe%2520unstructured%2520and%2520irregular%2520nature%2520of%2520points%2520poses%2520a%2520significant%2520challenge%2520for%2520accurate%2520point%2520cloud%2520quality%2520assessment%2520%2528PCQA%2529%252C%2520particularly%2520in%2520establishing%2520accurate%2520perceptual%2520feature%2520correspondence.%2520To%2520tackle%2520this%252C%2520we%2520propose%2520the%2520Multi-scale%2520Implicit%2520Structural%2520Similarity%2520Measurement%2520%2528MS-ISSM%2529.%2520Unlike%2520traditional%2520point-to-point%2520matching%252C%2520MS-ISSM%2520utilizes%2520radial%2520basis%2520function%2520%2528RBF%2529%2520to%2520represent%2520local%2520features%2520continuously%252C%2520transforming%2520distortion%2520measurement%2520into%2520a%2520comparison%2520of%2520implicit%2520function%2520coefficients.%2520This%2520approach%2520effectively%2520circumvents%2520matching%2520errors%2520inherent%2520in%2520irregular%2520data.%2520Additionally%252C%2520we%2520propose%2520a%2520ResGrouped-MLP%2520quality%2520assess {"title": "PriVi: Towards A General-Purpose Video Model For Primate Behavior In The Wild", "author": "Felix B. Mueller and Jan F. Meier and Timo Lueddecke and Richard Vogg and Roger L. Freixanet and Valentin Hassler and Tiffany Bosshard and Elif Karakoc and William J. O'Hearn and Sofia M. Pereira and Sandro Sehner and Kaja Wierucka and Judith Burkart and Claudia Fichtel and Julia Fischer and Alexander Gail and Catherine Hobaiter and Julia Ostner and Liran Samuni and Oliver Sch\u00fclke and Neda Shahidi and Erin G. Wessling and Alexander S. Ecker", "abstract": "Non-human primates are our closest living relatives, and analyzing their behavior is central to research in cognition, evolution, and conservation. Computer vision could greatly aid this research, but existing methods often rely on human-centric pretrained models and focus on single datasets, which limits generalization. We address this limitation by shifting from a model-centric to a data-centric approach and introduce PriVi, a large-scale primate-centric video pretraining dataset. PriVi contains 424 hours of curated video, combining 174 hours from behavioral research across 11 settings with 250 hours of diverse web-sourced footage, assembled through a scalable data curation pipeline. We continue pretraining V-JEPA, a large-scale video model, on PriVi to learn primate-specific representations and evaluate it using a lightweight frozen classifier. Across four benchmark datasets, ChimpACT, PanAf500, BaboonLand, and ChimpBehave, our approach consistently outperforms prior work, including fully finetuned baselines, and scales favorably with fewer labels. These results demonstrate for the first time that domain-level pretraining, where pretraining is conducted on similar data but not the target dataset itself, works for video models. Our primate-centric pretraining substantially improves data efficiency and generalization, making it a promising approach for low-label applications. Dataset, code, and models are available: https://privi.eckerlab.org", "link": "http://arxiv.org/abs/2511.09675v3", "date": "2026-03-27", "relevancy": 2.688, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5423}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PriVi%3A%20Towards%20A%20General-Purpose%20Video%20Model%20For%20Primate%20Behavior%20In%20The%20Wild&body=Title%3A%20PriVi%3A%20Towards%20A%20General-Purpose%20Video%20Model%20For%20Primate%20Behavior%20In%20The%20Wild%0AAuthor%3A%20Felix%20B.%20Mueller%20and%20Jan%20F.%20Meier%20and%20Timo%20Lueddecke%20and%20Richard%20Vogg%20and%20Roger%20L.%20Freixanet%20and%20Valentin%20Hassler%20and%20Tiffany%20Bosshard%20and%20Elif%20Karakoc%20and%20William%20J.%20O%27Hearn%20and%20Sofia%20M.%20Pereira%20and%20Sandro%20Sehner%20and%20Kaja%20Wierucka%20and%20Judith%20Burkart%20and%20Claudia%20Fichtel%20and%20Julia%20Fischer%20and%20Alexander%20Gail%20and%20Catherine%20Hobaiter%20and%20Julia%20Ostner%20and%20Liran%20Samuni%20and%20Oliver%20Sch%C3%BClke%20and%20Neda%20Shahidi%20and%20Erin%20G.%20Wessling%20and%20Alexander%20S.%20Ecker%0AAbstract%3A%20Non-human%20primates%20are%20our%20closest%20living%20relatives%2C%20and%20analyzing%20their%20behavior%20is%20central%20to%20research%20in%20cognition%2C%20evolution%2C%20and%20conservation.%20Computer%20vision%20could%20greatly%20aid%20this%20research%2C%20but%20existing%20methods%20often%20rely%20on%20human-centric%20pretrained%20models%20and%20focus%20on%20single%20datasets%2C%20which%20limits%20generalization.%20We%20address%20this%20limitation%20by%2 {"title": "StreamGaze: Gaze-Guided Temporal Reasoning and Proactive Understanding in Streaming Videos", "author": "Daeun Lee and Subhojyoti Mukherjee and Branislav Kveton and Ryan A. Rossi and Viet Dac Lai and Seunghyun Yoon and Trung Bui and Franck Dernoncourt and Mohit Bansal", "abstract": "Streaming video understanding requires models not only to process temporally incoming frames, but also to anticipate user intention for realistic applications such as Augmented Reality (AR) glasses. While prior streaming benchmarks evaluate temporal reasoning, none measure whether Multimodal Large Language Models (MLLMs) can interpret or leverage human gaze signals within a streaming setting. To fill this gap, we introduce StreamGaze, the first benchmark designed to evaluate how effectively MLLMs utilize gaze for temporal and proactive reasoning in streaming videos. StreamGaze introduces gaze-guided past, present, and proactive tasks that comprehensively assess streaming video understanding. These tasks evaluate whether models can use real-time gaze signals to follow shifting attention and infer user intentions based only on past and currently observed frames. To build StreamGaze, we develop a gaze-video Question Answering (QA) generation pipeline that aligns egocentric videos with raw gaze trajectories through fixation extraction, region-specific visual prompting, and scanpath construction. This pipeline produces spatio-temporally grounded QA pairs that reflect human perceptual dynamics. Across all StreamGaze tasks, we observe substantial performance gaps between state-of-the-art MLLMs and human performance, highlighting key limitations in gaze-based temporal reasoning, intention modeling, and proactive prediction. We further provide detailed analyses of gaze prompting strategies, reasoning behaviors, and task-specific failure modes, offering insights into current limitations and directions for future research. All data and code are publicly available to support continued research in gaze-guided streaming video understanding.", "link": "http://arxiv.org/abs/2512.01707v2", "date": "2026-03-27", "relevancy": 2.6704, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5405}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5309}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5309}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20StreamGaze%3A%20Gaze-Guided%20Temporal%20Reasoning%20and%20Proactive%20Understanding%20in%20Streaming%20Videos&body=Title%3A%20StreamGaze%3A%20Gaze-Guided%20Temporal%20Reasoning%20and%20Proactive%20Understanding%20in%20Streaming%20Videos%0AAuthor%3A%20Daeun%20Lee%20and%20Subhojyoti%20Mukherjee%20and%20Branislav%20Kveton%20and%20Ryan%20A.%20Rossi%20and%20Viet%20Dac%20Lai%20and%20Seunghyun%20Yoon%20and%20Trung%20Bui%20and%20Franck%20Dernoncourt%20and%20Mohit%20Bansal%0AAbstract%3A%20Streaming%20video%20understanding%20requires%20models%20not%20only%20to%20process%20temporally%20incoming%20frames%2C%20but%20also%20to%20anticipate%20user%20intention%20for%20realistic%20applications%20such%20as%20Augmented%20Reality%20%28AR%29%20glasses.%20While%20prior%20streaming%20benchmarks%20evaluate%20temporal%20reasoning%2C%20none%20measure%20whether%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20can%20interpret%20or%20leverage%20human%20gaze%20signals%20within%20a%20streaming%20setting.%20To%20fill%20this%20gap%2C%20we%20introduce%20StreamGaze%2C%20the%20first%20benchmark%20designed%20to%20evaluate%20how%20effectively%20MLLMs%20utilize%20gaze%20for%20temporal%20and%20proactive%20reasoning%20in%20streaming%20videos.%20StreamGaze%20introduces%20gaze-guided%20past%2C%20present%2C%20and%20proactive%20tasks%20that%20comprehensively%20assess%20streaming%20video%20understanding.%20These%20tasks%20evaluate%20whether%20models%20can%20use%20real-time%20gaze%20signals%20to%20follow%20shifting%20attention%20and%20infer%20user%20intentions%20based%20only%20on%20past%20and%20currently%20observed%20frames.%20To%20build%20StreamGaze%2C%20we%20develop%20a%20gaze-video%20Question%20Answering%20%28QA%29%20generation%20pipeline%20that%20aligns%20egocentric%20videos%20with%20raw%20gaze%20trajectories%20through%20fixation%20extraction%2C%20region-specific%20visual%20prompting%2C%20and%20scanpath%20construction.%20This%20pipeline%20produces%20spatio-temporally%20grounded%20QA%20pairs%20that%20reflect%20human%20perceptual%20dynamics.%20Across%20all%20StreamGaze%20tasks%2C%20we%20observe%20substantial%20performance%20gaps%20between%20state-of-the-art%20MLLMs%20and%20human%20performance%2C%20highlighting%20key%20limitations%20in%20gaze-based%20temporal%20reasoning%2C%20intention%20modeling%2C%20and%20proactive%20prediction.%20We%20further%20provide%20detailed%20analyses%20of%20gaze%20prompting%20strategies%2C%20reasoning%20behaviors%2C%20and%20task-specific%20failure%20modes%2C%20offering%20insights%20into%20current%20limitations%20and%20directions%20for%20future%20research.%20All%20data%20and%20code%20are%20publicly%20available%20to%20support%20continued%20research%20in%20gaze-guided%20streaming%20video%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2512.01707v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStreamGaze%253A%2520Gaze-Guided%2520Temporal%2520Reasoning%2520and%2520Proactive%2520Understanding%2520in%2520Streaming%2520Videos%26entry.906535625%3DDaeun%2520Lee%2520and%2520Subhojyoti%2520Mukherjee%2520and%2520Branislav%2520Kveton%2520and%2520Ryan%2520A.%2520Rossi%2520and%2520Viet%2520Dac%2520Lai%2520and%2520Seunghyun%2520Yoon%2520and%2520Trung%2520Bui%2520and%25

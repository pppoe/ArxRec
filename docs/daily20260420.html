{"title": "(Weighted) Adaptive Radius Near Neighbor Search: Evaluation for WiFi Fingerprint-based Positioning", "author": "Khang Le and Joaqu\u00edn Torres-Sospedra and Philipp M\u00fcller", "abstract": "Fixed Radius Near Neighbor (FRNN) search is an alternative to the widely used k Nearest Neighbors (kNN) search. Unlike kNN, FRNN determines a label or an estimate for a test sample based on all training samples within a predefined distance. While this approach is beneficial in certain scenarios, assuming a fixed maximum distance for all training samples can decrease the accuracy of the FRNN. Therefore, in this paper we propose the Adaptive Radius Near Neighbor (ARNN) and the Weighted ARNN (WARNN), which employ adaptive distances and in latter case weights. All three methods are compared to kNN and twelve of its variants for a regression problem, namely WiFi fingerprinting indoor positioning, using 22 different datasets to provide a comprehensive analysis. While the performances of the tested FRNN and ARNN versions were amongst the worse, three of the four best methods in the test were WARNN versions, indicating that using weights together with adaptive distances achieves performance comparable or even better than kNN variants.", "link": "http://arxiv.org/abs/2604.15940v1", "date": "2026-04-17", "relevancy": 2.1924, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4627}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4283}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4245}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%28Weighted%29%20Adaptive%20Radius%20Near%20Neighbor%20Search%3A%20Evaluation%20for%20WiFi%20Fingerprint-based%20Positioning&body=Title%3A%20%28Weighted%29%20Adaptive%20Radius%20Near%20Neighbor%20Search%3A%20Evaluation%20for%20WiFi%20Fingerprint-based%20Positioning%0AAuthor%3A%20Khang%20Le%20and%20Joaqu%C3%ADn%20Torres-Sospedra%20and%20Philipp%20M%C3%BCller%0AAbstract%3A%20Fixed%20Radius%20Near%20Neighbor%20%28FRNN%29%20search%20is%20an%20alternative%20to%20the%20widely%20used%20k%20Nearest%20Neighbors%20%28kNN%29%20search.%20Unlike%20kNN%2C%20FRNN%20determines%20a%20label%20or%20an%20estimate%20for%20a%20test%20sample%20based%20on%20all%20training%20samples%20within%20a%20predefined%20distance.%20While%20this%20approach%20is%20beneficial%20in%20certain%20scenarios%2C%20assuming%20a%20fixed%20maximum%20distance%20for%20all%20training%20samples%20can%20decrease%20the%20accuracy%20of%20the%20FRNN.%20Therefore%2C%20in%20this%20paper%20we%20propose%20the%20Adaptive%20Radius%20Near%20Neighbor%20%28ARNN%29%20and%20the%20Weighted%20ARNN%20%28WARNN%29%2C%20which%20employ%20adaptive%20distances%20and%20in%20latter%20case%20weights.%20All%20three%20methods%20are%20compared%20to%20kNN%20and%20twelve%20of%20its%20variants%20for%20a%20regression%20problem%2C%20namely%20WiFi%20fingerprinting%20indoor%20positioning%2C%20using%2022%20different%20datasets%20to%20provide%20a%20comprehensive%20analysis.%20While%20the%20performances%20of%20the%20tested%20FRNN%20and%20ARNN%20versions%20were%20amongst%20the%20worse%2C%20three%20of%20the%20four%20best%20methods%20in%20the%20test%20were%20WARNN%20versions%2C%20indicating%20that%20using%20weights%20together%20with%20adaptive%20distances%20achieves%20performance%20comparable%20or%20even%20better%20than%20kNN%20variants.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15940v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2528Weighted%2529%2520Adaptive%2520Radius%2520Near%2520Neighbor%2520Search%253A%2520Ev {"title": "Neural Distribution Prior for LiDAR Out-of-Distribution Detection", "author": "Zizhao Li and Zhengkang Xiang and Jiayang Ao and Feng Liu and Joseph West and Kourosh Khoshelham", "abstract": "LiDAR-based perception is critical for autonomous driving due to its robustness to poor lighting and visibility conditions. Yet, current models operate under the closed-set assumption and often fail to recognize unexpected out-of-distribution (OOD) objects in the open world. Existing OOD scoring functions exhibit limited performance because they ignore the pronounced class imbalance inherent in LiDAR OOD detection and assume a uniform class distribution. To address this limitation, we propose the Neural Distribution Prior (NDP), a framework that models the distributional structure of network predictions and adaptively reweights OOD scores based on alignment with a learned distribution prior. NDP dynamically captures the logit distribution patterns of training data and corrects class-dependent confidence bias through an attention-based module. We further introduce a Perlin noise-based OOD synthesis strategy that generates diverse auxiliary OOD samples from input scans, enabling robust OOD training without external datasets. Extensive experiments on the SemanticKITTI and STU benchmarks demonstrate that NDP substantially improves OOD detection performance, achieving a point-level AP of 61.31% on the STU test set, which is more than 10$\\times$ higher than the previous best result. Our framework is compatible with various existing OOD scoring formulations, providing an effective solution for open-world LiDAR perception.", "link": "http://arxiv.org/abs/2604.09232v2", "date": "2026-04-17", "relevancy": 2.1835, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5501}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perc ernal%20datasets.%20Extensive%20experiments%20on%20the%20SemanticKITTI%20and%20STU%20benchmarks%20demonstrate%20that%20NDP%20substantially%20improves%20OOD%20detection%20performance%2C%20achieving%20a%20point-level%20AP%20of%2061.31%25%20on%20the%20STU%20test%20set%2C%20which%20is%20more%20than%2010%24%5Ctimes%24%20higher%20than%20the%20previous%20best%20result.%20Our%20framework%20is%20compatible%20with%20various%20existing%20OOD%20scoring%20formulations%2C%20providing%20an%20effective%20solution%20for%20open-world%20LiDAR%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09232v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Distribution%2520Prior%2520for%2520LiDAR%2520Out-of-Distribution%2520Detection%26entry.906535625%3DZizhao%2520Li%2520and%2520Zhengkang%2520Xiang%2520and%2520Jiayang%2520Ao%2520and%2520Feng%2520Liu%2520and%2520Joseph%2520West%2520and%2520Kourosh%2520Khoshelham%26entry.1292438233%3DLiDAR-based%2520perception%2520is%2520critical%2520for%2520autonomous%2520driving%2520due%2520to%2520its%2520robustness%2520to%2520poor%2520lighting%2520and%2520visibility%2520conditions.%2520Yet%252C%2520current%2520models%2520operate%2520under%2520the%2520closed-set%2520assumption%2520and%2520often%2520fail%2520to%2520recognize%2520unexpected%2520out-of-distribution%2520%2528OOD%2529%2520objects%2520in%2520the%2520open%2520world.%2520Existing%2520OOD%2520scoring%2520functions%2520exhibit%2520limited%2520performance%2520because%2520they%2520ignore%2520the%2520pronounced%2520class%2520imbalance%2520inherent%2520in%2520LiDAR%2520OOD%2520detection%2520and%2520assume%2520a%2520uniform%2520class%2520distribution.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520the%2520Neural%2520Distribution%2520Prior%2520%2528NDP%2529%252C%2520a%2520framework%2520that%2520models%2520the%2520distributional%2520structure%2520of%2520network%2520predictions%2520and%25 {"title": "Benchmarking Optimizers for MLPs in Tabular Deep Learning", "author": "Yury Gorishniy and Ivan Rubachev and Dmitrii Feoktistov and Artem Babenko", "abstract": "MLP is a heavily used backbone in modern deep learning (DL) architectures for supervised learning on tabular data, and AdamW is the go-to optimizer used to train tabular DL models. Unlike architecture design, however, the choice of optimizer for tabular DL has not been examined systematically, despite new optimizers showing promise in other domains. To fill this gap, we benchmark 15 optimizers on 17 tabular datasets for training MLP-based models in the standard supervised learning setting under a shared experiment protocol. Our main finding is that the Muon optimizer consistently outperforms AdamW, and thus should be considered a strong and practical choice for practitioners and researchers, if the associated training efficiency overhead is affordable. Additionally, we find exponential moving average of model weights to be a simple yet effective technique that improves AdamW on vanilla MLPs, though its effect is less consistent across model variants.", "link": "http://arxiv.org/abs/2604.15297v2", "date": "2026-04-17", "relevancy": 2.1779, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.501}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4063}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.3994}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20Optimizers%20for%20MLPs%20in%20Tabular%20Deep%20Learning&body=Title%3A%20Benchmarking%20Optimizers%20for%20MLPs%20in%20Tabular%20Deep%20Learning%0AAuthor%3A%20Yury%20Gorishniy%20and%20Ivan%20Rubachev%20and%20Dmitrii%20Feoktistov%20and%20Artem%20Babenko%0AAbstract%3A%20MLP%20is%20a%20heavily%20used%20backbone%20in%20modern%20deep%20learning%20%28DL%29%20architectures%20for%20supervised%20learning%20on%20tabular%20data%2C%20and%20AdamW%20is%20the%20go-to%20optimizer%20used%20to%20train%20tabular%20DL%20models.%20Unlike%20architecture%20design%2C%20however%2C%20the%20choice%20of%20optimizer%20for%20tabular%20DL%20has%20not%20been%20examined%20systematically%2C%20despite%20new%20optimizers%20showing%20promise%20in%20other%20domains.%20To%20fill%20this%20gap%2C%20we%20benchmark%2015%20optimizers%20on%2017%20tabular%20datasets%20for%20training%20MLP-based%20models%20in%20the%20standard%20supervised%20learning%20setting%20under%20a%20shared%20experiment%20protocol.%20Our%20main%20finding%20is%20that%20the%20Muon%20optimizer%20consistently%20outperforms%20AdamW%2C%20and%20thus%20should%20be%20considered%20a%20strong%20and%20practical%20choice%20for%20practitioners%20and%20researchers%2C%20if%20the%20associated%20training%20efficiency%20overhead%20is%20affordable.%20Additionally%2C%20we%20find%20exponential%20moving%20average%20of%20model%20weights%20to%20be%20a%20simple%20yet%20effective%20technique%20that%20improves%20AdamW%20on%20vanilla%20MLPs%2C%20though%20its%20effect%20is%20less%20consistent%20across%20model%20variants.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15297v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Optimizers%2520for%2520MLPs%2520in%2520Tabular%2520Deep%2520Learning%26entry.906535625%3DYury%2520Gorishniy%2520and%2520Ivan%2520Rubachev%2520and%2520Dmitrii%2520Feoktistov%2520and%2520Artem%2520Babenko%26entry.1292438233%3DMLP%2520is%2520a%2520heavily%2520used%2520backbone%2520in%2520modern%2520deep%2520learning%2520%2528DL%2529%2520architectures%2520for%2520supervised%2520learning%2520on%2520tabular%2520data%252C%2520and%2520AdamW%2520is%2520the%2520go-to%2520optimizer%2520used%2520to%2520train%2520tabular%2520DL%2520models.%2520Unlike%2520architecture%2520design%252C%2520however%252C%2520the%2520choice%2520of%2520optimizer%2520for%2520tabular%2520DL%2520has%2520not%2520been%2520examined%2520systematically%252C%2520despite%2520new%2520optimizers%2520showing%2520promise%2520in%2520other%2520domains.%2520To%2520fill%2520this%2520gap%252C%2520we%2520benchmark%252015%2520optimizers%2520on%252017%2520tabular%2520datasets%2520for%2520training%2520MLP-based%2520models%2520in%2520the%2520standard%2520supervised%2520learning%2520setting%2520under%2520a%2520shared%2520experiment%2520protocol.%2520Our%2520main%2520finding%2520is%2520that%2520the%2520Muon%2520optimizer%2520consistently%2520outperforms%2520AdamW%252C%2520and%2520thus%2520should%2520be%2520considered%2520a%2520strong%2520and%2520practical%2520choice%2520for%2520practitioners%2520and%2520researchers%252C%2520if%2520the%2520associated%2520training%2520efficiency%2520overhead%2520is%2520affordable.%2520Additionally%252C%2520we%2520find%2520exponential%2520moving%2520average%2520of%2520model%2520weights%2520to%2520be%2520a%2520simple%2520yet%2520effective%2520technique%2520that%2520improves%2520AdamW%2520on%2520vanilla%2520MLPs%252C%2520though%2520its%2520effect%2520is%2520less%2520consistent%2520across%2520model%2520variants.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15297v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Benchmarking%20Optimizers%20for%20MLPs%20in%20Tabular%20Deep%20Learning&entry.906535625=Yury%20Gorishniy%20and%20Ivan%20Rubachev%20and%20Dmitrii%20Feoktistov%20and%20Artem%20Babenko&entry.1292438233=MLP%20is%20a%20heavily%20used%20backbone%20in%20modern%20deep%20learning%20%28DL%29%20architectures%20for%20supervised%20learning%20on%20tabular%20data%2C%20and%20AdamW%20is%20the%20go-to%20optimizer%20used%20to%20train%20tabular%20DL%20models.%20Unl {"title": "CollideNet: Hierarchical Multi-scale Video Representation Learning with Disentanglement for Time-To-Collision Forecasting", "author": "Nishq Poorav Desai and Ali Etemad and Michael Greenspan", "abstract": "Time-to-Collision (TTC) forecasting is a critical task in collision prevention, requiring precise temporal prediction and comprehending both local and global patterns encapsulated in a video, both spatially and temporally. To address the multi-scale nature of video, we introduce a novel spatiotemporal hierarchical transformer-based architecture called CollideNet, specifically catered for effective TTC forecasting. In the spatial stream, CollideNet aggregates information for each video frame simultaneously at multiple resolutions. In the temporal stream, along with multi-scale feature encoding, CollideNet also disentangles the non-stationarity, trend, and seasonality components. Our method achieves state-of-the-art performance in comparison to prior works on three commonly used public datasets, setting a new state-of-the-art by a considerable margin. We conduct cross-dataset evaluations to analyze the generalization capabilities of our method, and visualize the effects of disentanglement of the trend and seasonality components of the video data. We release our code at https://github.com/DeSinister/CollideNet/.", "link": "http://arxiv.org/abs/2604.16240v1", "date": "2026-04-17", "relevancy": 2.1734, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5872}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5376}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5315}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CollideNet%3A%20Hierarchical%20Multi-scale%20Video%20Representation%20Learning%20with%20Disentanglement%20for%20Time-To-Collision%20Forecasting&body=Title%3A%20CollideNet%3A%20Hierarchical%20Multi-scale%20Video%20Representation%20Learning%20with%20Disentanglement%20for%20Time-To-Collision%20Forecasting%0AAuthor%3A%20Nishq%20Poorav%20Desai%20and%20Ali%20Etemad%20and%20Michael%20Greenspan%0AAbstract%3A%20Time-to-Collision%20%28TTC%29%20forecasting%20is%20a%20critical%20task%20in%20collision%20prevention%2C%20requiring%20precise%20temporal%20prediction%20and%20comprehending%20both%20local%20and%20global%20patterns%20encapsulated%20in%20a%20video%2C%20both%20spatially%20and%20temporally.%20To%20address%20the%20multi-scale%20nature%20of%20video%2C%20we%20introduce%20a%20novel%20spatiotemporal%20hierarchical%20transformer-based%20architecture%20called%20CollideNet%2C%20specifically%20catered%20for%20effective%20TTC%20forecasting.%20In%20the%20spatial%20stream%2C%20CollideNet%20aggregates%20information%20for%20each%20video%20frame%20simultaneously%20at%20multiple%20resolutions.%20In%20the%20temporal%20stream%2C%20along%20with%20multi-scale%20feature%20encoding%2C%20CollideNet%20also%20disentangles%20the%20non-stationarity%2C%20trend%2C%20and%20seasonality%20components.%20Our%20method%20achieves%20state-of-the-art%20performance%20in%20comparison%20to%20prior%20works%20on%20three%20commonly%20used%20public%20datasets%2C%20setting%20a%20new%20state-of-the-art%20by%20a%20considerable%20margin.%20We%20conduct%20cross-dataset%20evaluations%20to%20analyze%20the%20generalization%20capabilities%20of%20our%20method%2C%20and%20visualize%20the%20effects%20of%20disentanglement%20of%20the%20trend%20and%20seasonality%20components%20of%20the%20video%20data.%20We%20release%20our%20code%20at%20https%3A//github.com/DeSinister/CollideNet/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16240v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewf our%2520code%2520at%2520https%253A//github.com/DeSinister/CollideNet/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16240v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CollideNet%3A%20Hierarchical%20Multi-scale%20Video%20Representation%20Learning%20with%20Disentanglement%20for%20Time-To-Collision%20Forecasting&entry.906535625=Nishq%20Poorav%20Desai%20and%20Ali%20Etemad%20and%20Michael%20Greenspan&entry.1292438233=Time-to-Collision%20%28TTC%29%20forecasting%20is%20a%20critical%20task%20in%20collision%20prevention%2C%20requiring%20precise%20temporal%20prediction%20and%20comprehending%20both%20local%20and%20global%20patterns%20encapsulated%20in%20a%20video%2C%20both%20spatially%20and%20temporally.%20To%20address%20the%20multi-scale%20nature%20of%20video%2C%20we%20introduce%20a%20novel%20spatiotemporal%20hierarchical%20transformer-based%20architecture%20called%20CollideNet%2C%20specifically%20catered%20for%20effective%20TTC%20forecasting.%20In%20the%20spatial%20stream%2C%20CollideNet%20aggregates%20information%20for%20each%20video%20frame%20simultaneously%20at%20multiple%20resolutions.%20In%20the%20temporal%20stream%2C%20along%20with%20multi-scale%20feature%20encoding%2C%20CollideNet%20also%20disentangles%20the%20non-stationarity%2C%20trend%2C%20and%20seasonality%20components.%20Our%20method%20achieves%20state-of-the-art%20performance%20in%20comparison%20to%20prior%20works%20on%20three%20commonly%20used%20public%20datasets%2C%20setting%20a%20new%20state-of-the-art%20by%20a%20considerable%20margin.%20We%20conduct%20cross-dataset%20evaluations%20to%20analyze%20the%20generalization%20capabilities%20of%20our%20method%2C%20and%20visualize%20the%20effects%20of%20disentanglement%20of%20the%20trend%20and%20seasonality%20components%20of%20the%20video%20data.%20We%20release%20our%20code%20at%20https%3A//github.com/DeSinister/CollideNet/.&entry.1838667208=http%3A//arx {"title": "GAViD: A Large-Scale Multimodal Dataset for Context-Aware Group Affect Recognition from Videos", "author": "Deepak Kumar and Abhishek Pratap Singh and Puneet Kumar and Xiaobai Li and Balasubramanian Raman", "abstract": "Understanding affective dynamics in real-world social systems is fundamental to modeling and analyzing human-human interactions in complex environments. Group affect emerges from intertwined human-human interactions, contextual influences, and behavioral cues, making its quantitative modeling a challenging computational social systems problem. However, computational modeling of group affect in in-the-wild scenarios remains challenging due to limited large-scale annotated datasets and the inherent complexity of multimodal social interactions shaped by contextual and behavioral variability. The lack of comprehensive datasets annotated with multimodal and contextual information further limits advances in the field. To address this, we introduce the Group Affect from ViDeos (GAViD) dataset, comprising 5091 video clips with multimodal data (video, audio and context), annotated with ternary valence and discrete emotion labels and enriched with VideoGPT-generated contextual metadata and human-annotated action cues. We also present Context-Aware Group Affect Recognition Network (CAGNet) for multimodal context-aware group affect recognition. CAGNet achieves 63.20\\% test accuracy on GAViD, comparable to state-of-the-art performance. The dataset and code are available at github.com/deepakkumar-iitr/GAViD.", "link": "http://arxiv.org/abs/2604.16214v1", "date": "2026-04-17", "relevancy": 2.1718, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5804}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5229}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4994}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GAViD%3A%20A%20Large-Scale%20Multimodal%20Dataset%20for%20Context-Aware%20Group%20Affect%20Recognition%20from%20Videos&body=Title%3A%20GAViD%3A%20A%20Large-Scale%20Multimodal%20Dataset%20for%20Context-Aware%20Group%20Affect%20Recognition%20from%20Videos%0AAuthor%3A%20Deepak%20Kumar%20and%20Abhishek%20Pratap%20Singh%20and%20Puneet%20Kumar%20and%20Xiaobai%20Li%20and%20Balasubramanian%20Raman%0AAbstract%3A%20Understanding%20affective%20dynamics%20in%20real-world%20social%20systems%20is%20fundamental%20to%20modeling%20and%20analyzing%20human-human%20interactions%20in%20complex%20environments.%20Group%20affect%20emerges%20from%20intertwined%20human-human%20interactions%2C%20contextual%20influences%2C%20and%20behavioral%20cues%2C%20making%20its%20quantitative%20modeling%20a%20challenging%20computational%20social%20systems%20problem.%20However%2C%20computational%20modeling%20of%20group%20affect%20in%20in-the-wild%20scenarios%20remains%20challenging%20due%20to%20limited%20large-scale%20annotated%20datasets%20and%20the%20inherent%20complexity%20of%20multimodal%20social%20interactions%20shaped%20by%20contextual%20and%20behavioral%20variability.%20The%20lack%20of%20comprehensive%20datasets%20annotated%20with%20multimodal%20and%20contextual%20information%20further%20limits%20advances%20in%20the%20field.%20To%20address%20this%2C%20we%20introduce%20the%20Group%20Affect%20from%20ViDeos%20%28GAViD%29%20dataset%2C%20comprising%205091%20video%20clips%20with%20multimodal%20data%20%28video%2C%20audio%20and%20context%29%2C%20annotated%20with%20ternary%20valence%20and%20discrete%20emotion%20labels%20and%20enriched%20with%20VideoGPT-generated%20contextual%20metadata%20and%20human-annotated%20action%20cues.%20We%20also%20present%20Context-Aware%20Group%20Affect%20Recognition%20Network%20%28CAGNet%29%20for%20mult {"title": "PILOT: A Promptable Interleaved Layout-aware OCR Transformer", "author": "Laziz Hamdi and Amine Tamasna and Pascal Boisson and Thierry Paquet", "abstract": "Classical OCR pipelines decompose document reading into detection, segmentation, and recognition stages, which makes them sensitive to localization errors and difficult to extend to interactive querying. This work investigates whether a single compact model can jointly perform text recognition and spatial grounding on both handwritten and printed documents. We introduce PILOT, a 155M-parameter prompt-conditioned generative model that formulates document OCR as unified sequence generation. A lightweight depthwise-separable CNN encodes the page, and a Transformer decoder autoregressively emits a single stream of subword and quantized absolute-coordinate tokens on a 10\\,px grid, enabling full-page OCR, region-conditioned reading, and query-by-string spotting within the same architecture. A three-stage curriculum, progressing from plain transcription to joint text-and-box generation and finally to prompt-controlled extraction, stabilizes training and improves spatial grounding. Experiments on IAM, RIMES~2009, SROIE~2019, and the heterogeneous MAURDOR benchmark show that PILOT achieves competitive or superior performance in text recognition and line-level detection compared with traditional OCR systems, recent end-to-end HTR models, and compact vision--language models, while remaining substantially smaller than billion-scale multimodal models. Additional evaluations on fine-grained OCR and query-by-string spotting further confirm that a unified text--layout decoder can provide accurate and efficient promptable OCR in a compact setting. To support reproducibility, we release the synthetic SROIE generator, the 500k annotated IDL/PDFA pages, the harmonized line-level annotations for IAM, RIMES~2009, and MAURDOR, and the source code at https://github.com/hamdilaziz/PILOT.", "link": "http://arxiv.org/abs/2504.03621v2", "date": "2026-04-17", "relevancy": 2.1711, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5552}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5482}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5324}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PILOT%3A%20A%20Promptable%20Interleaved%20Layout-aware%20OCR%20Transformer&body=Title%3A%20PILOT%3A%20A%20Promptable%20Interleaved%20Layout-aware%20OCR%20Transformer%0AAuthor%3A%20Laziz%20Hamdi%20and%20Amine%20Tamasna%20and%20Pascal%20Boisson%20and%20Thierry%20Paquet%0AAbstract%3A%20Classical%20OCR%20pipelines%20decompose%20document%20reading%20into%20detection%2C%20segmentation%2C%20and%20recognition%20stages%2C%20which%20makes%20them%20sensitive%20to%20localization%20errors%20and%20difficult%20to%20extend%20to%20interactive%20querying.%20This%20work%20investigates%20whether%20a%20single%20compact%20model%20can%20jointly%20perform%20text%20recognition%20and%20spatial%20grounding%20on%20both%20handwritten%20and%20printed%20documents.%20We%20introduce%20PILOT%2C%20a%20155M-parameter%20prompt-conditioned%20generative%20model%20that%20formulates%20document%20OCR%20as%20unified%20sequence%20generation.%20A%20lightweight%20depthwise-separable%20CNN%20encodes%20the%20page%2C%20and%20a%20Transformer%20decoder%20autoregressively%20emits%20a%20single%20stream%20of%20subword%20and%20quantized%20absolute-coordinate%20tokens%20on%20a%2010%5C%2Cpx%20grid%2C%20enabling%20full-page%20OCR%2C%20region-conditioned%20reading%2C%20and%20query-by-string%20spotting%20within%20the%20same%20architecture.%20A%20three-stage%20curriculum%2C%20progressing%20from%20plain%20transcription%20to%20joint%20text-and-box%20generation%2 {"title": "MMGait: Towards Multi-Modal Gait Recognition", "author": "Chenye Wang and Qingyuan Cai and Saihui Hou and Aoqi Li and Yongzhen Huang", "abstract": "Gait recognition has emerged as a powerful biometric technique for identifying individuals at a distance without requiring user cooperation. Most existing methods focus primarily on RGB-derived modalities, which fall short in real-world scenarios requiring multi-modal collaboration and cross-modal retrieval. To overcome these challenges, we present MMGait, a comprehensive multi-modal gait benchmark integrating data from five heterogeneous sensors, including an RGB camera, a depth camera, an infrared camera, a LiDAR scanner, and a 4D Radar system. MMGait contains twelve modalities and 334,060 sequences from 725 subjects, enabling systematic exploration across geometric, photometric, and motion domains. Based on MMGait, we conduct extensive evaluations on single-modal, cross-modal, and multi-modal paradigms to analyze modality robustness and complementarity. Furthermore, we introduce a new task, Omni Multi-Modal Gait Recognition, which aims to unify the above three gait recognition paradigms within a single model. We also propose a simple yet powerful baseline, OmniGait, which learns a shared embedding space across diverse modalities and achieves promising recognition performance. The MMGait benchmark, codebase, and pretrained checkpoints are publicly available at https://github.com/BNU-IVC/MMGait.", "link": "http://arxiv.org/abs/2604.15979v1", "date": "2026-04-17", "relevancy": 2.1652, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5868}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5419}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "lin {"title": "Sketching the Readout of Large Language Models for Scalable Data Attribution and Valuation", "author": "Yide Ran and Jianwen Xie and Minghui Wang and Wenjin Zheng and Denghui Zhang and Chuan Li and Zhaozhuo Xu", "abstract": "Data attribution and valuation are critical for understanding data-model synergy for Large Language Models (LLMs), yet existing gradient-based methods suffer from scalability challenges on LLMs. Inspired by human cognition, where decision making relies on a focused readout of relevant memories rather than replaying all pathways, we introduce RISE (Readout Influence Sketching Estimator). Instead of computing and indexing gradients across the entire LLM, RISE focuses on influence hotspots at the output layer, where influence signals concentrate, and the gradient admits a decomposed outer-product form. This enables a dual-channel representation combining a lexical residual channel (RH) and a semantic projected-error channel (GH). Applying CountSketch projections to these channels achieves strong compression while maintaining accurate attribution. Across the OLMo (1B-32B) and Pythia (14M-6.9B) families, RISE reduces index storage by up to 112$\\times$ compared to RapidIn and scales to 32B parameters LLM, where gradient-based baselines such as RapidIn and ZO-Inf become memory-infeasible. We evaluate RISE on two paradigms: (1) retrospective attribution, retrieving influential training examples for specific predictions, and (2) prospective valuation, scoring candidate data utility zero-shot. We validate RISE on three tasks: Howdy backdoor data detection, Finance-Medical domain separation, and Brain Rot high-quality data selection. In a closed-loop Brain Rot study, continued pretraining on RISE-selected data yields consistent downstream improvements. Overall, RISE provides a practical and scalable primitive for influence analysis and training-data selection in modern large language models.", "link": "http://arxiv.org/abs/2604.16197v1", "date": "2026-04-17", "relevancy": 2.1617, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5434}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sketching%20the%20Readout%20of%20Large%20Language%20Models%20for%20Scalable%20Data%20Attribution%20and%20Valuation&body=Title%3A%20Sketching%20the%20Readout%20of%20Large%20Language%20Models%20for%20Scalable%20Data%20Attribution%20and%20Valuation%0AAuthor%3A%20Yide%20Ran%20and%20Jianwen%20Xie%20and%20Minghui%20Wang%20and%20Wenjin%20Zheng%20and%20Denghui%20Zhang%20and%20Chuan%20Li%20and%20Zhaozhuo%20Xu%0AAbstract%3A%20Data%20attribution%20and%20valuation%20are%20critical%20for%20understanding%20data-model%20synergy%20for%20Large%20Language%20Models%20%28LLMs%29%2C%20yet%20existing%20gradient-based%20methods%20suffer%20from%20scalability%20challenges%20on%20LLMs.%20Inspired%20by%20human%20cognition%2C%20where%20decision%20making%20relies%20on%20a%20focused%20readout%20of%20relevant%20memories%20rather%20than%20replaying%20all%20pathways%2C%20we%20introduce%20RISE%20%28Readout%20Influence%20Sketching%20Estimator%29.%20Instead%20of%20computing%20and%20indexing%20gradients%20across%20the%20entire%20LLM%2C%20RISE%20focuses%20on%20influence%20hotspots%20at%20the%20output%20layer%2C%20where%20influence%20signals%20concentrate%2C%20and%20the%20gradient%20admits%20a%20decomposed%20outer-product%20form.%20This%20enables%20a%20dual-channel%20representation%20combining%20a%20lexical%20residual%20channel%20%28RH%29%20and%20a%20semantic%20projected-error%20channel%20%28GH%29.%20Applying%20CountSketch%20projections%20to%20these%20channels%20achieves%20strong%20compression%20while%20maintaining%20accurate%20attribution.%20Across%20the%20OLMo%20%281B-32B%29%20and%20Pythia%20%2814M-6.9B%29%20families%2C%20RISE%20reduces%20index%20storage%20by%20up%20to%20112%24%5Ctimes%24%20compared%20to%20RapidIn%20and%20scales%20to%2032B%20parameters%20LLM%2C%20where%20gradient-based%20baselines%20such%20as%20RapidIn%20and%20ZO-Inf%20become%20memory-infeasible.%20We%20evaluate%20RISE%20on%20two%20paradigms%3A%20%281%29%20retrospective%20attribution%2C%20retrieving%20influential%20training%20examples%20for%20specific%20predictions%2C%20and%20%282%29%20prospective%20valuation%2C%20scoring%20candidate%20data%20utility%20zero-shot.%20We%20validate%20RISE%20on%20three%20tasks%3A%20Howdy%20backdoor%20data%20detection%2C%20Finance-Medical%20domain%20separation%2C%20and%20Brain%20Rot%20high-quality%20data%20selection.%20In%20a%20closed-loop%20Brain%20Rot%20study%2C%20continued%20pretraining%20on%20RISE-selected%20data%20yields%20consistent%20downstream%20improvements.%20Overall%2C%20RISE%20provides%20a%20practical%20and%20scalable%20primitive%20for%20influence%20analysis%20and%20training-data%20selection%20in%20modern%20large%20language%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16197v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSketching%2520the%2520Readout%2520of%2520Large%2520Language%2520Models%2520for%2520Scalable%2520Data%2520Attribution%2520and%2520Valuation%26entry.906535625%3DYide%2520Ran%2520and%2520Jianwen%2520Xie%2520and%2520Minghui%2520Wang%2520and%2520Wenjin%2520Zheng%2520and%2520Denghui%2520Zhang%2520and%2520Chuan%2520Li%2520and%2520Zhaozhuo%2520Xu%26entry.1292438233%3DData%2520attribution%2520and%2520valuation%2520are%2520critical%2520for%2520understanding%2520data-model%2520synergy%2520for%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520yet%2520existing%2520g %2520detection%252C%2520Finance-Medical%2520domain%2520separation%252C%2520and%2520Brain%2520Rot%2520high-quality%2520data%2520selection.%2520In%2520a%2520closed-loop%2520Brain%2520Rot%2520study%252C%2520continued%2520pretraining%2520on%2520RISE-selected%2520data%2520yields%2520consistent%2520downstream%2520improvements.%2520Overall%252C%2520RISE%2520provides%2520a%2520practical%2520and%2520scalable%2520primitive%2520for%2520influence%2520analysis%2520and%2520training-data%2520selection%2520in%2520modern%2520large%2520language%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16197v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sketching%20the%20Readout%20of%20Large%20Language%20Models%20for%20Scalable%20Data%20Attribution%20and%20Valuation&entry.906535625=Yide%20Ran%20and%20Jianwen%20Xie%20and%20Minghui%20Wang%20and%20Wenjin%20Zheng%20and%20Denghui%20Zhang%20and%20Chuan%20Li%20and%20Zhaozhuo%20Xu&entry.1292438233=Data%20attribution%20and%20valuation%20are%20critical%20for%20understanding%20data-model%20synergy%20for%20Large%20Language%20Models%20%28LLMs%29%2C%20yet%20existing%20gradient-based%20methods%20suffer%20from%20scalability%20challenges%20on%20LLMs.%20Inspired%20by%20human%20cognition%2C%20where%20decision%20making%20relies%20on%20a%20focused%20readout%20of%20relevant%20memories%20rather%20than%20replaying%20all%20pathways%2C%20we%20introduce%20RISE%20%28Readout%20Influence%20Sketching%20Estimator%29.%20Instead%20of%20computing%20and%20indexing%20gradients%20across%20the%20entire%20LLM%2C%20RISE%20focuses%20on%20influence%20hotspots%20at%20the%20output%20layer%2C%20where%20influence%20signals%20concentrate%2C%20and%20the%20gradient%20admits%20a%20decomposed%20outer-product%20form.%20This%20enables%20a%20dual-channel%20representation%20combining%20a%20lexical%20residual%20channel%20%28RH%29%20and%20a%20semantic%20projected-error%20channel% {"title": "TwinTrack: Post-hoc Multi-Rater Calibration for Medical Image Segmentation", "author": "Tristan Kirscher and Alexandra Ertl and Klaus Maier-Hein and Xavier Coubez and Philippe Meyer and Sylvain Faisan", "abstract": "Pancreatic ductal adenocarcinoma (PDAC) segmentation on contrast-enhanced CT is inherently ambiguous: inter-rater disagreement among experts reflects genuine uncertainty rather than annotation noise. Standard deep learning approaches assume a single ground truth, producing probabilistic outputs that can be poorly calibrated and difficult to interpret under such ambiguity. We present TwinTrack, a framework that addresses this gap through post-hoc calibration of ensemble segmentation probabilities to the empirical mean human response (MHR) -the fraction of expert annotators labeling a voxel as tumor. Calibrated probabilities are thus directly interpretable as the expected proportion of annotators assigning the tumor label, explicitly modeling inter-rater disagreement. The proposed post-hoc calibration procedure is simple and requires only a small multi-rater calibration set. It consistently improves calibration metrics over standard approaches when evaluated on the MICCAI 2025 CURVAS-PDACVI multi-rater benchmark.", "link": "http://arxiv.org/abs/2604.15950v1", "date": "2026-04-17", "relevancy": 2.1435, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5697}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5307}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5275}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TwinTrack%3A%20Post-hoc%20Multi-Rater%20Calibration%20for%20Medical%20Image%20Segmentation&body=Title%3A%20TwinTrack%3A%20Post-hoc%20Multi-Rater%20Calibration%20for%20Medical%20Image%20Segmentation%0AAuthor%3A%20Tristan%20Kirscher%20and%20Alexandra%20Ertl%20and%20Klaus%20Maier-Hein%20and%20Xavier%20Coubez%20and%20Philippe%20Meyer%20and%20Sylvain%20Faisan%0AAbstract%3A%20Pancreatic%20ductal%20adenocarcinoma%20%28PDAC%29%20segmentation%20on%20contrast-enhanced%20CT%20is%20inherently%20ambiguous%3A%20inter-rater%20disagreement%20among%20experts%20reflects%20genuine%20uncertainty%20rather%20than%20annotation%20noise.%20Standard%20deep%20learning%20approaches%20assume%20a%20single%20ground%20truth%2C%20producing%20probabilistic%20outputs%20that%20can%20be%20poorly%20calibrated%20and%20difficult%20to%20interpret%20under%20such%20ambiguity.%20We%20present%20TwinTrack%2C%20a%20framework%20that%20addresses%20this%20gap%20through%20post-hoc%20calibration%20of%20ensemble%20segmentation%20probabilities%20to%20the%20empirical%20mean%20human%20response%20%28MHR%29%20-the%20fraction%20of%20expert%20annotators%20labeling%20a%20voxel%20as%20tumor.%20Calibrated%20probabilities%20are%20thus%20directly%20interpretable%20as%20the%20expected%20proportion%20of%20annotators%20assigning%20the%20tumor%20label%2C%20explicitly%20modeling%20inter-rater%20disagreement.%20The%20proposed%20post-hoc%20calibration%20procedure%20is%20simple%20and%20requires%20only%20a%20small%20multi-rater%20calibration%20set.%20It%20consistently%20improves%20calibration%20metrics%20over%20standard%20approaches%20when%20evaluated%20on%20the%20MICCAI%202025%20CURVAS-PDACVI%20multi-rater%20benchmark.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15950v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTwinTrack%253A%2520Post-hoc%2520Multi-Rater%2520Calibration%2520for%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DTristan%2520Kirscher%2520and%2520Alexandra%2520Ertl%2520and%2520Klaus%2520Maier-Hein%2520and%2520Xavier%2520Coubez%2520and%2520Philippe%2520Meyer%2520and%2520Sylvain%2520Faisan%26entry.1292438233%3DPancreatic%2520ductal%2520adenocarcinoma%2520%2528PDAC%2529%2520segmentation%2520on%2520contrast-enhanced%2520CT%2520is%2520inherently%2520ambiguous%253A%2520inter-rater%2520disagreement%2520among%2520experts%2520reflects%2520genuine%2520uncertainty%2520rather%2520than%2520annotation%2520noise.%2520Standard%2520deep%2520learning%2520approaches%2520assume%2520a%2520single%2520ground%2520truth%252C%2520producing%2520probabilistic%2520outputs%2520that%2520can%2520be%2520poorly%2520calibrated%2520and%2520difficult%2520to%2520interpret%2520under%2520such%2520ambiguity.%2520We%2520present%2520TwinTrack%252C%2520a%2520framework%2520that%2520addresses%2520this%2520gap%2520through%2520post-hoc%2520calibration%2520of%2520ensemble%2520segmentation%2520probabilities%2520to%2520the%2520empirical%2520mean%2520human%2520response%2520%2528MHR%2529%2520-the%2520fraction%2520of%2520expert%2520annotators%2520labeling%2520a%2520voxel%2520as%2520tumor.%2520Calibrated%2520probabilities%2520are%2520thus%2520directly%2520interpretable%2520as%2520the%2520expected%2520proportion%2520of%2520annotators%2520assigning%2520the%2520tumor%2520label%252C%2520explicitly%2520modeling%2520inter-rater%2520disagreement.%2520The%2520proposed%2520post-hoc%2520calibration%2520procedure%2520is%2520simple%2520and%2520requires%2520only%2520a%2520small%2520multi-rater%2520calibration%2520set.%2520It%2520consistently%2520improves%2520calibration%2520metrics%2520over%2520standard%2520approaches%2520when%2520evaluated%2520on%2520the%2520MICCAI%25202025%2520CURVAS-PDACVI%2520multi-rater%2520benchmark.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15950v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TwinTrack%3A%20Post-hoc%20Multi-Rater%20Calibration%20for%20Medical%20Image%20Segmentation&entry.906535625=Tristan%20Kirs {"title": "AEGIS: Anchor-Enforced Gradient Isolation for Knowledge-Preserving Vision-Language-Action Fine-Tuning", "author": "Guransh Singh", "abstract": "Adapting pre-trained vision-language models (VLMs) for robotic control requires injecting high-magnitude continuous gradients from a flow-matching action expert into a backbone trained exclusively with cross-entropy. This cross-modal gradient asymmetry - the spectral dimensionality mismatch between low-rank MSE regression gradients and the high-dimensional semantic manifold sculpted by CE pre-training, causes rapid, severe erosion of the VLM's visual-question-answering (VQA) capability. Industry-standard defences either sever the gradient pathway entirely via stop gradient, discarding the rich continuous supervision, or restrict parameter capacity through low-rank adapters (LoRA) that constrain the rank of updates but not their direction, and thus still overwrite the pre-trained manifold. We introduce AEGIS (Anchor-Enforced Gradient Isolation System): a buffer-free, layer-wise orthogonal gradient projection framework that enables direct continuous MSE learning while preserving the pre-trained VQA manifold - without any co-training data or replay buffer. AEGIS pre-computes a static Gaussian reference anchor from masked VQA forward passes across all transformer layers, then at each training step constructs a Wasserstein-2 transport penalty that generates an anchor restoration gradient. A sequential dual-backward decomposes the task and anchor gradients; for each transformer layer, AEGIS applies a single Gram-Schmidt orthogonal projection that bends the task gradient away from the destructive direction while preserving its constructive content. The projection sheds less than 1% of gradient energy on average, yet eliminates the cumulative activation drift that drives severe forgetting.", "link": "http://arxiv.org/abs/2604.16067v1", "date": "2026-04-17", "relevancy": 2.1396, "topK": [{"title": "UGG: Unified Generative e%20pre-trained%20VQA%20manifold%20-%20without%20any%20co-training%20data%20or%20replay%20buffer.%20AEGIS%20pre-computes%20a%20static%20Gaussian%20reference%20anchor%20from%20masked%20VQA%20forward%20passes%20across%20all%20transformer%20layers%2C%20then%20at%20each%20training%20step%20constructs%20a%20Wasserstein-2%20transport%20penalty%20that%20generates%20an%20anchor%20restoration%20gradient.%20A%20sequential%20dual-backward%20decomposes%20the%20task%20and%20anchor%20gradients%3B%20for%20each%20transformer%20layer%2C%20AEGIS%20applies%20a%20single%20Gram-Schmidt%20orthogonal%20projection%20that%20bends%20the%20task%20gradient%20away%20from%20the%20destructive%20direction%20while%20preserving%20its%20constructive%20content.%20The%20projection%20sheds%20less%20than%201%25%20of%20gradient%20energy%20on%20average%2C%20yet%20eliminates%20the%20cumulative%20activation%20drift%20that%20drives%20severe%20forgetting.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16067v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAEGIS%253A%2520Anchor-Enforced%2520Gradient%2520Isolation%2520for%2520Knowledge-Preserving%2520Vision-Language-Action%2520Fine-Tuning%26entry.906535625%3DGuransh%2520Singh%26entry.1292438233%3DAdapting%2520pre-trained%2520vision-language%2520models%2520%2528VLMs%2529%2520for%2520robotic%2520control%2520requires%2520injecting%2520high-magnitude%2520continuous%2520gradients%2520from%2520a%2520flow-matching%2520action%2520expert%2520into%2520a%2520backbone%2520trained%2520exclusively%2520with%2520cross-entropy.%2520This%2520cross-modal%2520gradient%2520asymmetry%2520-%2520the%2520spectral%2520dimensionality%2520mismatch%2520between%2520low-rank%2520MSE%2520regression%2520gradients%2520and%2520the%2520high-dimensional%2520semantic%2520manifold%2520sculpted%2520by%2520CE%2520pre-training%252C%2520causes%2520rapid%252C%2520severe%2520erosion%2520of%2520the%2520VLM%2527s%2520visual-ques {"title": "When Missing Becomes Structure: Intent-Preserving Policy Completion from Financial KOL Discourse", "author": "Yuncong Liu and Yuan Wan and Zhou Jiang and Yao Lu", "abstract": "Key Opinion Leader (KOL) discourse on social media is widely consumed as investment guidance, yet turning it into executable trading strategies without injecting assumptions about unspecified execution decisions remains an open problem. We observe that the gaps in KOL statements are not random deficiencies but a structured separation: KOLs express directional intent (what to buy or sell and why) while leaving execution decisions (when, how much, how long) systematically unspecified. Building on this observation, we propose an intent-preserving policy completion framework that treats KOL discourse as a partial trading policy and uses offline reinforcement learning to complete the missing execution decisions around the KOL-expressed intent. Experiments on multimodal KOL discourse from YouTube and X (2022-2025) show that KICL achieves the best return and Sharpe ratio on both platforms while maintaining zero unsupported entries and zero directional reversals, and ablations confirm that the full framework yields an 18.9% return improvement over the KOL-aligned baseline.", "link": "http://arxiv.org/abs/2604.14333v2", "date": "2026-04-17", "relevancy": 2.1395, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4465}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4186}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4186}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Missing%20Becomes%20Structure%3A%20Intent-Preserving%20Policy%20Completion%20from%20Financial%20KOL%20Discourse&body=Title%3A%20When%20Missing%20Becomes%20Structure%3A%20Intent-Preserving%20Policy%20Completion%20from%20Financial%20KOL%20Discourse%0AAuthor%3A%20Yuncong%20Liu%20and%20Yuan%20Wan%20and%20Zhou%20Jiang%20and%20Yao%20Lu%0AAbstract%3A%20Key%20Opinion%20Leader%20%28KOL%29%20discourse%20on%20social%20media%20is%20widely%20consumed%20as%20investment%20guidance%2C%20yet%20turning%20it%20into%20executable%20trading%20strategies%20without%20injecting%20assumptions%20about%20unspecified%20execution%20decisions%20remains%20an%20open%20problem.%20We%20observe%20that%20the%20gaps%20in%20KOL%20statements%20are%20not%20random%20deficiencies%20but%20a%20structured%20separation%3A%20KOLs%20express%20directional%20intent%20%28what%20to%20buy%20or%20sell%20and%20why%29%20while%20leaving%20execution%20decisions%20%28when%2C%20how%20much%2C%20how%20long%29%20systematically%20unspecified.%20Building%20on%20this%20observation%2C%20we%20propose%20an%20intent-preserving%20policy%20completion%20framework%20that%20treats%20KOL%20discourse%20as%20a%20partial%20trading%20policy%20and%20uses%20offline%20reinforcement%20learning%20to%20complete%20the%20missing%20execution%20decisions%20around%20the%20KOL-expressed%20intent.%20Experiments%20on%20multimodal%20KOL%20discourse%20from%20YouTube%20and%20X%20%282022-2025%29%20show%20that%20KICL%20achieves%20the%20best%20return%20and%20Sharpe%20ratio%20on%20both%20platforms%20while%20maintaining%20zero%20unsupported%20entries%20and%20zero%20directional%20reversals%2C%20and%20ablations%20confirm%20that%20the%20full%20framework%20yields%20an%2018.9%25%20return%20improvement%20over%20the%20KOL-aligned%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14333v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen gned%2520baseline.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14333v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Missing%20Becomes%20Structure%3A%20Intent-Preserving%20Policy%20Completion%20from%20Financial%20KOL%20Discourse&entry.906535625=Yuncong%20Liu%20and%20Yuan%20Wan%20and%20Zhou%20Jiang%20and%20Yao%20Lu&entry.1292438233=Key%20Opinion%20Leader%20%28KOL%29%20discourse%20on%20social%20media%20is%20widely%20consumed%20as%20investment%20guidance%2C%20yet%20turning%20it%20into%20executable%20trading%20strategies%20without%20injecting%20assumptions%20about%20unspecified%20execution%20decisions%20remains%20an%20open%20problem.%20We%20observe%20that%20the%20gaps%20in%20KOL%20statements%20are%20not%20random%20deficiencies%20but%20a%20structured%20separation%3A%20KOLs%20express%20directional%20intent%20%28what%20to%20buy%20or%20sell%20and%20why%29%20while%20leaving%20execution%20decisions%20%28when%2C%20how%20much%2C%20how%20long%29%20systematically%20unspecified.%20Building%20on%20this%20observation%2C%20we%20propose%20an%20intent-preserving%20policy%20completion%20framework%20that%20treats%20KOL%20discourse%20as%20a%20partial%20trading%20policy%20and%20uses%20offline%20reinforcement%20learning%20to%20complete%20the%20missing%20execution%20decisions%20around%20the%20KOL-expressed%20intent.%20Experiments%20on%20multimodal%20KOL%20discourse%20from%20YouTube%20and%20X%20%282022-2025%29%20show%20that%20KICL%20achieves%20the%20best%20return%20and%20Sharpe%20ratio%20on%20both%20platforms%20while%20maintaining%20zero%20unsupported%20entries%20and%20zero%20directional%20reversals%2C%20and%20ablations%20confirm%20that%20the%20full%20framework%20yields%20an%2018.9%25%20return%20improvement%20over%20the%20KOL-aligned%20baseline.&entry.1838667208=http%3A//arxiv.org/abs/2604.14333v2&entry.124074799=Read"},
{"title": "Robust Real-Time Coordination of CAVs: A Distributed Optimization Framework under Uncertainty", "author": "Haojie Bai and Tingting Zhang and Cong Guo and Yang Wang and Xiongwei Zhao and Hai Zhu", "abstract": "Achieving both safety guarantees and real-time performance in cooperative vehicle coordination remains a fundamental challenge, particularly in dynamic and uncertain environments. Existing methods often suffer from insufficient uncertainty treatment in safety modeling, which intertwines with the heavy computational burden under complex multi-vehicle coupling. This paper presents a novel coordination framework that resolves this challenge through three key innovations: 1) direct control of vehicles' trajectory distributions during coordination, formulated as a robust cooperative planning problem with adaptive enhanced safety constraints, ensuring a specified level of safety regarding the uncertainty of the interactive trajectory, 2) a fully parallel ADMM-based distributed trajectory negotiation (ADMM-DTN) algorithm that efficiently solves the optimization problem while allowing configurable negotiation rounds to balance solution quality and computational resources, and 3) an interactive attention mechanism that selectively focuses on critical interactive participants to further enhance computational efficiency. Simulation results demonstrate that our framework achieves significant advantages in safety (reducing collision rates by up to 40.79\\% in various scenarios) and real-time performance compared to representative benchmarks, while maintaining strong scalability with increasing vehicle numbers. The proposed interactive attention mechanism further reduces the computational demand by 15.4\\%. Real-world experiments further validate robustness and real-time feasibility with unexpected dynamic obstacles, demonstrating reliable coordination in complex traffic scenes. The experiment demo could be found at https://youtu.be/4PZwBnCsb6Q.", "link": "http://arxiv.org/abs/2508.21322v3", "date": "2026-04-17", "relevancy": 2.1385, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.539}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5374}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5301}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20Real-Time%20Coordination%20of%20CAVs%3A%20A%20Distributed%20Optimization%20Framework%20under%20Uncertainty&body=Title%3A%20Robust%20Real-Time%20Coordination%20of%20CAVs%3A%20A%20Distributed%20Optimization%20Framework%20under%20Uncertainty%0AAuthor%3A%20Haojie%20Bai%20and%20Tingting%20Zhang%20and%20Cong%20Guo%20and%20Yang%20Wang%20and%20Xiongwei%20Zhao%20and%20Hai%20Zhu%0AAbstract%3A%20Achieving%20both%20safety%20guarantees%20and%20real-time%20performance%20in%20cooperative%20vehicle%20coordination%20remains%20a%20fundamental%20challenge%2C%20particularly%20in%20dynamic%20and%20uncertain%20environments.%20Existing%20methods%20often%20suffer%20from%20insufficient%20uncertainty%20treatment%20in%20safety%20modeling%2C%20which%20intertwines%20with%20the%20heavy%20computational%20burden%20under%20complex%20multi-vehicle%20coupling.%20This%20paper%20presents%20a%20novel%20coordination%20framework%20that%20resolves%20this%20challenge%20through%20three%20key%20innovations%3A%201%29%20direct%20control%20of%20vehicles%27%20trajectory%20distributions%20during%20coordination%2C%20formulated%20as%20a%20robust%20cooperative%20planning%20problem%20with%20adaptive%20enhanced%20safety%20constraints%2C%20ensuring%20a%20specified%20level%20of%20safety%20regarding%20the%20uncertainty%20of%20the%20interactive%20trajectory%2C%202%29%20a%20fully%20parallel%20ADMM-based%20distributed%20trajectory%20negotiation%20%28ADMM-DTN%29%20algorithm%20that%20efficiently%20solves%20the%20optimization%20problem%20while%20allowing%20configurable%20negotiation%20rounds%20to%20balance%20solution%20quality%20and%20computational%20resources%2C%20and%203%29%20an%20interactive%20attention%20mechanism%20that%20selectively%20focuses%20on%20critical%20interactive%20participants%20to%20further%20enhance%20computational%20efficiency.%20Simulation%20results%20demonstrate%20that%20our%20framework%20achieves%20significant%20advantages%20in%20safety%20%28reducing%20collision%20rates%20by%20up%20to%2040.79%5C%25%20in%20various%20scenarios%29%20and%20real-time%20performance%20compared%20to%20representative%20benchmarks%2C%20while%20maintaining%20strong%20scalability%20with%20increasing%20vehicle%20numbers.%20The%20proposed%20interactive%20attention%20mechanism%20further%20reduces%20the%20computational%20demand%20by%2015.4%5C%25.%20Real-world%20experiments%20further%20validate%20robustness%20and%20real-time%20feasibility%20with%20unexpected%20dynamic%20obstacles%2C%20demonstrating%20reliable%20coordination%20in%20complex%20traffic%20scenes.%20The%20experiment%20demo%20could%20be%20found%20at%20https%3A//youtu.be/4PZwBnCsb6Q.%0ALink%3A%20http%3A//arxiv.org/abs/2508.21322v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobust%2520Real-Time%2520Coordination%2520of%2520CAVs%253A%2520A%2520Distributed%2520Optimization%2520Framework%2520under%2520Uncertainty%26entry.906535625%3DHaojie%2520Bai%2520and%2520Tingting%2520Zhang%2520and%2520Cong%2520Guo%2520and%2520Yang%2520Wang%2520and%2520Xiongwei%2520Zhao%2520and%2520Hai%2520Zhu%26entry.1292438233%3DAchieving%2520both%2520safety%2520guarantees%2520and%2520real-time%2520performance%2520in%2520cooperative%2520vehicle%2520coordination%2520remains%2520a%2520fundamental%2520challenge%252C%2520particularly%2520in% {"title": "neuralCAD-Edit: An Expert Benchmark for Multimodal-Instructed 3D CAD Model Editing", "author": "Toby Perrett and Matthew Bouchard and William McCarthy", "abstract": "We introduce neuralCAD-Edit, the first benchmark for editing 3D CAD models collected from expert CAD engineers. Instead of text conditioning as in prior works, we collect realistic CAD editing requests by capturing videos of professional designers, interacting directly with CAD models in CAD software, while talking, pointing and drawing. We recruited ten consenting designers to contribute to this contained study. We benchmark leading foundation models against human CAD experts carrying out edits, and find a large performance gap in both automatic metrics and human evaluations. Even the best foundation model (GPT 5.2) scores 53% lower (absolute) than CAD experts in human acceptance trials, demonstrating the challenge of neuralCAD-Edit. We hope neuralCAD-Edit will provide a solid foundation against which 3D CAD editing approaches and foundation models can be developed. Code/data: https://autodeskailab.github.io/neuralCAD-Edit", "link": "http://arxiv.org/abs/2604.16170v1", "date": "2026-04-17", "relevancy": 2.1282, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5338}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5317}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5317}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20neuralCAD-Edit%3A%20An%20Expert%20Benchmark%20for%20Multimodal-Instructed%203D%20CAD%20Model%20Editing&body=Title%3A%20neuralCAD-Edit%3A%20An%20Expert%20Benchmark%20for%20Multimodal-Instructed%203D%20CAD%20Model%20Editing%0AAuthor%3A%20Toby%20Perrett%20and%20Matthew%20Bouchard%20and%20William%20McCarthy%0AAbstract%3A%20We%20introduce%20neuralCAD-Edit%2C%20the%20first%20benchmark%20for%20editing%203D%20CAD%20models%20collected%20from%20expert%20CAD%20engineers.%20Instead%20of%20text%20conditioning%20as%20in%20prior%20works%2C%20we%20collect%20realistic%20CAD%20editing%20requests%20by%20capturing%20videos%20of%20professional%20designers%2C%20interacting%20directly%20with%20CAD%20models%20in%20CAD%20software%2C%20while%20talking%2C%20pointing%20and%20drawing.%20We%20recruited%20ten%20consenting%20designers%20to%20contribute%20to%20this%20contained%20study.%20We%20benchmark%20leading%20foundation%20models%20against%20human%20CAD%20experts%20carrying%20out%20edits%2C%20and%20find%20a%20large%20performance%20gap%20in%20both%20automatic%20metrics%20and%20human%20evaluations.%20Even%20the%20best%20foundation%20model%20%28GPT%205.2%29%20scores%2053%25%20lower%20%28absolute%29%20than%20CAD%20experts%20in%20human%20acceptance%20trials%2C%20demonstrating%20the%20challenge%20of%20neuralCAD-Edit.%20We%20hope%20neuralCAD-Edit%20will%20provide%20a%20solid%20foundation%20against%20which%203D%20CAD%20editing%20approaches%20and%20foundation%20models%20can%20be%20developed.%20Code/data%3A%20https%3A//autodeskailab.github.io/neuralCAD-Edit%0ALink%3A%20http%3A//arxiv.org/abs/2604.16170v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DneuralCAD-Edit%253A%2520An%2520Expert%2520Benchmark%2520for%2520Multimodal-Instructed%25203D%2520CAD%2520Model%2520Editing%26entry.906535625%3DToby%2520Perrett%2520and%2520Matthew%2520Bouchard%2520and%2520William%2520McCarthy%26entry.1292438233%3DWe%2520introduce%2520neuralCAD-Edit%252C%2520the%2520first%2520benchmark%2520for%2520editing%25203D%2520CAD%2520models%2520collected%2520from%2520expert%2520CAD%2520engineers.%2520Instead%2520of%2520text%2520conditioning%2520as%2520in%2520prior%2520works%252C%25 {"title": "Efficient Continual Learning in Language Models via Thalamically Routed Cortical Columns", "author": "Afshin Khadangi", "abstract": "Large language models deployed in the wild must adapt to evolving data, user behavior, and task mixtures without erasing previously acquired capabilities. In practice, this remains difficult: sequential updates induce catastrophic forgetting, while many stabilization methods rely on external procedures that are costly, brittle, or difficult to scale. We present TRC$^{2}$ (Thalamically Routed Cortical Columns), a decoder-only architecture that makes continual learning a property of the backbone itself. TRC$^{2}$ combines stacked cortical columns with a thalamic modulatory pathway for selective inter-column communication and a hippocampal pathway for event selective retrieval, delayed surprise-based writing, and replay-driven consolidation. This design localizes fast plasticity while preserving a slower stable computation pathway. We further introduce a causal memory-update scheme and an online replay controller that adjusts consolidation strength from measured forgetting. Across a task-sequential language-modeling stream over C4, WikiText-103, and GSM8K, TRC$^{2}$ consistently improves task-boundary modeling quality and substantially reduces cumulative forgetting relative to Transformer, Mamba, MoE, DeepSeek and continual learning baselines trained under the same pipeline. Ablations show that the thalamic and hippocampal components are central to the retention gains, while the full model remains competitive in throughput and training cost.", "link": "http://arxiv.org/abs/2602.22479v6", "date": "2026-04-17", "relevancy": 2.1257, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5676}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5265}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4972}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Continual%20Learning%20in%20Language%20Models%20via%20Thalamically%20Routed%20Cortical%20Columns&body=Title%3A%20Efficient%20Continual%20Learning%20in%20Language%20Models%20via%20Thalamically%20Routed%20Cortical%20Columns%0AAuthor%3A%20Afshin%20Khadangi%0AAbstract%3A%20Large%20language%20models%20deployed%20in%20the%20wild%20must%20adapt%20to%20evolving%20data%2C%20user%20behavior%2C%20and%20task%20mixtures%20without%20erasing%20previously%20acquired%20capabilities.%20In%20practice%2C%20this%20remains%20difficult%3A%20sequential%20updates%20induce%20catastrophic%20forgetting%2C%20while%20many%20stabilization%20methods%20rely%20on%20external%20procedures%20that%20are%20costly%2C%20brittle%2C%20or%20difficult%20to%20scale.%20We%20present%20TRC%24%5E%7B2%7D%24%20%28Thalamically%20Routed%20Cortical%20Columns%29%2C%20a%20decoder-only%20architecture%20that%20makes%20continual%20learning%20a%20property%20of%20the%20backbone%20itself.%20TRC%24%5E%7B2%7D%24%20combines%20stacked%20cortical%20columns%20with%20a%20thalamic%20modulatory%20pathway%20for%20selective%20inter-column%20communication%20and%20a%20hippocampal%20pathway%20for%20event%20selective%20retrieval%2C%20delayed%20surprise-based%20writing%2C%20and%20replay-driven%20consolidation.%20This%20design%20localizes%20fast%20plasticity%20while%20preserving%20a%20slower%20stable%20computation%20pathway.%20We%20further%20introduce%20a%20causal%20memory-update%20scheme%20and%20an%20online%20replay%20controller%20that%20adjusts%20consolidation%20strength%20from%20measured%20forgetting.%20Across%20a%20task-sequential%20language-modeling%20stream%20over%20C4%2C%20WikiText-103%2C%20and%20GSM8K%2C%20TRC%24%5E%7B2%7D%24%20consistently%20improves%20task-boundary%20modeling%20quality%20and%20substantially%20reduces%20cumulative%20forgetting%20relative%20to%20Transformer%2C%20Mamba%2C%20MoE%2C%20DeepSeek%20and%20continual%20learning%20baselines%20trained%20under%20the%20same%20pipeline.%20Ablations%20show%20that%20the%20thalamic%20and%20hippocampal%20components%20are%20central%20to%20the%20retention%20gains%2C%20while%20the%20full%20model%20remains%20competitive%20in%20throughput%20and%20training%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22479v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Continual%2520Learning%2520in%2520Language%2520Models%2520via%2520Thalamically%2520Routed%2520Cortical%2520Columns%26entry.906535625%3DAfshin%2520Khadangi%26entry.1292438233%3DLarge%2520language%2520models%2520deployed%2520in%2520the%2520wild%2520must%2520adapt%2520to%2520evolving%2520data%252C%2520user%2520behavior%252C%2520and%2520task%2520mixtures%2520without%2520erasing%2520previously%2520acquired%2520capabilities.%2520In%2520practice%252C%2520this%2520remains%2520difficult%253A%2520sequential%2520updates%2520induce%2520catastrophic%2520forgetting%252C%2520while%2520many%2520stabilization%2520methods%2520rely%2520on%2520external%2520procedures%2520that%2520are%2520costly%252C%2520brittle%252C%2520or%2520difficult%2520to%2520scale.%2520We%2520present%2520TRC%2524%255E%257B2%257D%2524%2520%2528Thalamically%2520Routed%2520Cortical%2520Columns%2529%252C%2520a%2520decoder-only%2520architecture%2520that%2520makes%2520continual%2520learning%2520a%2520property%2520of%2520the%2520backbone%2520itself.%2520TRC%2524%255E%257B2%257D%2524%2520combines%2520stacked%2520cortical%2520columns%2520with%2520a%2520thalamic%2520modulatory%2520pathway%2520for%2520selective%2520inter-column%2520communication%2520and%2520a%2520hippocampal%2520pathway%2520for%2520event%2520selective%2520retrieval%252C%2520delayed%2520surprise-based%2520writing%252C%2520and%2520replay-driven%2520c {"title": "Structural Evaluation Metrics for SVG Generation via Leave-One-Out Analysis", "author": "Haonan Zhu and Adrienne Deganutti and Elad Hirsch and Purvanshi Mehta", "abstract": "SVG generation is typically evaluated by comparing rendered outputs to reference images, which captures visual similarity but not the structural properties that make SVG editable, decomposable, and reusable. Inspired by the classical jackknife, we introduce element-level leave-one-out (LOO) analysis. The procedure renders the SVG with and without each element, which yields element-level signals for quality assessment and structural analysis. From this single mechanism, we derive (i) per-element quality scores that enable zero-shot artifact detection; (ii) element-concept attribution via LOO footprints crossed with VLM-grounded concept heatmaps; and (iii) four structural metrics: purity, coverage, compactness, and locality, which quantify SVG modularity from complementary angles. These metrics extend SVG evaluation from image similarity to code structure, enabling element-level diagnosis and comparison of how visual concepts are represented, partitioned, and organized within SVG code. Their practical relevance is validated on over 19,000 edits (5 types) across 5 generation systems and 3 complexity tiers.", "link": "http://arxiv.org/abs/2604.08809v2", "date": "2026-04-17", "relevancy": 2.1173, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4317}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4194}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Structural%20Evaluation%20Metrics%20for%20SVG%20Generation%20via%20Leave-One-Out%20Analysis&body=Title%3A%20Structural%20Evaluation%20Metrics%20for%20SVG%20Generation%20via%20Leave-One-Out%20Analysis%0AAuthor%3A%20Haonan%20Zhu%20and%20Adrienne%20Deganutti%20and%20Elad%20Hirsch%20and%20Purvanshi%20Mehta%0AAbstract%3A%20SVG%20generation%20is%20typically%20evaluated%20by%20comparing%20rendered%20outputs%20to%20reference%20images%2C%20which%20captures%20visual%20similarity%20but%20not%20the%20structural%20properties%20that%20make%20SVG%20editable%2C%20decomposable%2C%20and%20reusable.%20Inspired%20by%20the%20classical%20jackknife%2C%20we%20introduce%20element-level%20leave-one-out%20%28LOO%29%20analysis.%20The%20procedure%20renders%20the%20SVG%20with%20and%20without%20each%20element%2C%20which%20yields%20element-level%20signals%20for%20quality%20assessment%20and%20structural%20analysis.%20From%20this%20single%20mechanism%2C%20we%20derive%20%28i%29%20per-element%20quality%20scores%20that%20enable%20zero-shot%20artifact%20detection%3B%20%28ii%29%20element-concept%20attribution%20via%20LOO%20footprints%20crossed%20with%20VLM-grounded%20concept%20heatmaps%3B%20and%20%28iii%29%20four%20structural%20metrics%3A%20purity%2C%20coverage%2C%20compactness%2C%20and%20locality%2C%20which%20quantify%20SVG%20modularity%20from%20complementary%20angles.%20These%20metrics%20extend%20SVG%20evaluation%20from%20image%20similarity%20to%20code%20structure%2C%20enabling%20element-level%20diagnosis%20and%20comparison%20of%20how%20visual%20concepts%20are%20represented%2C%20partitioned%2C%20and%20organized%20within%20SVG%20code.%20Their%20practical%20relevance%20is%20validated%20on%20over%2019%2C000%20edits%20%285%20types%29%20across%205%20generation%20systems%20and%203%20complexity%20tiers.%0ALink%3A%20http%3A//arxiv.org/abs/2604.08809v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructural%2520Evaluation%2520Metrics%2520for%2520SVG%2520Generation%2520via%25

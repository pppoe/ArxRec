{"title": "Stylistic-STORM (ST-STORM) : Perceiving the Semantic Nature of Appearance", "author": "Hamed Ouattara and Pierre Duthon and Pascal Houssam Salmane and Fr\u00e9d\u00e9ric Bernardin and Omar Ait Aider", "abstract": "One of the dominant paradigms in self-supervised learning (SSL), illustrated by MoCo or DINO, aims to produce robust representations by capturing features that are insensitive to certain image transformations such as illumination, or geometric changes. This strategy is appropriate when the objective is to recognize objects independently of their appearance. However, it becomes counterproductive as soon as appearance itself constitutes the discriminative signal. In weather analysis, for example, rain streaks, snow granularity, atmospheric scattering, as well as reflections and halos, are not noise: they carry the essential information. In critical applications such as autonomous driving, ignoring these cues is risky, since grip and visibility depend directly on ground conditions and atmospheric conditions. We introduce ST-STORM, a hybrid SSL framework that treats appearance (style) as a semantic modality to be disentangled from content. Our architecture explicitly separates two latent streams, regulated by gating mechanisms. The Content branch aims at a stable semantic representation through a JEPA scheme coupled with a contrastive objective, promoting invariance to appearance variations. In parallel, the Style branch is constrained to capture appearance signatures (textures, contrasts, scattering) through feature prediction and reconstruction under an adversarial constraint. We evaluate ST-STORM on several tasks, including object classification (ImageNet-1K), fine-grained weather characterization, and melanoma detection (ISIC 2024 Challenge). The results show that the Style branch effectively isolates complex appearance phenomena (F1=97% on Multi-Weather and F1=94% on ISIC 2024 with 10% labeled data), without degrading the semantic performance (F1=80% on ImageNet-1K) of the Content branch, and improves the preservation of critical appearance", "link": "http://arxiv.org/abs/2604.16086v1", "date": "2026-04-17", "relevancy": 2.024, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5308}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5146}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4875}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stylistic-STORM%20%28ST-STORM%29%20%3A%20Perceiving%20the%20Semantic%20Nature%20of%20Appearance&body=Title%3A%20Stylistic-STORM%20%28ST-STORM%29%20%3A%20Perceiving%20the%20Semantic%20Nature%20of%20Appearance%0AAuthor%3A%20Hamed%20Ouattara%20and%20Pierre%20Duthon%20and%20Pascal%20Houssam%20Salmane%20and%20Fr%C3%A9d%C3%A9ric%20Bernardin%20and%20Omar%20Ait%20Aider%0AAbstract%3A%20One%20of%20the%20dominant%20paradigms%20in%20self-supervised%20learning%20%28SSL%29%2C%20illustrated%20by%20MoCo%20or%20DINO%2C%20aims%20to%20produce%20robust%20representations%20by%20capturing%20features%20that%20are%20insensitive%20to%20certain%20image%20transformations%20such%20as%20illumination%2C%20or%20geometric%20changes.%20This%20strategy%20is%20appropriate%20when%20the%20objective%20is%20to%20recognize%20objects%20independently%20of%20their%20appearance.%20However%2C%20it%20becomes%20counterproductive%20as%20soon%20as%20appearance%20itself%20constitutes%20the%20discriminative%20signal.%20In%20weather%20analysis%2C%20for%20example%2C%20rain%20streaks%2C%20snow%20granularity%2C%20atmospheric%20scattering%2C%20as%20well%20as%20reflections%20and%20halos%2C%20are%20not%20noise%3A%20they%20carry%20the%20essential%20information.%20In%20critical%20applications%20such%20as%20autonomous%20driving%2C%20ignoring%20these%20cues%20is%20risky%2C%20since%20grip%20and%20visibility%20depend%20directly%20on%20ground%20conditions%20and%20atmospheric%20conditions.%20We%20introduce%20ST-STORM%2C%20a%20hybrid%20SSL%20framework%20that%20treats%20appearance%20%28style%29%20as%20a%20semantic%20modality%20to%20be%20disentangled%20from%20content.%20Our%20architecture%20explicitly%20separates%20two%20latent%20streams%2C%20regulated%20by%20gating%20mechanisms.%20The%20Content%20branch%20aims%20at%20a%20stable%20semantic%20representation%20through%20a%20JEPA%20scheme%20coupled%20with%20a%20contrastive%20objective%2C%20promoting%20invariance%20to%20appearance%20variations.%20In%20parallel%2C%20the%20Style%20branch%20is%20constrained%20to%20capture%20appearance%20signatures%20%28textures%2C%20contrasts%2C%20scattering%29%20through%20feature%20prediction%20and%20reconstruction%20under%20an%20adversarial%20constraint.%20We%20evaluate%20ST-STORM%20on%20several%20tasks%2C%20including%20object%20classification%20%28ImageNet-1K%29%2C%20fine-grained%20weather%20characterization%2C%20and%20melanoma%20detection%20%28ISIC%202024%20Challenge%29.%20The%20results%20show%20that%20the%20Style%20branch%20effectively%20isolates%20complex%20appearance%20phenomena%20%28F1%3D97%25%20on%20Multi-Weather%20and%20F1%3D94%25%20on%20ISIC%202024%20with%2010%25%20labeled%20data%29%2C%20without%20degrading%20the%20semantic%20performance%20%28F1%3D80%25%20on%20ImageNet-1K%29%20of%20the%20Content%20branch%2C%20and%20improves%20the%20preservation%20of%20critical%20appearance%0ALink%3A%20http%3A//arxiv.org/abs/2604.16086v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStylistic-STORM%2520%2528ST-STORM%2529%2520%253A%2520Perceiving%2520the%2520Semantic%2520Nature%2520of%2520Appearance%26entry.906535625%3DHamed%2520Ouattara%2520and%2520Pierre%2520Duthon%2520and%2520Pascal%2520Houssam%2520Salmane%2520and%2520Fr%25C3%25A9d%25C3 {"title": "TableSeq: Unified Generation of Structure, Content, and Layout", "author": "Laziz Hamdi and Amine Tamasna and Pascal Boisson and Thierry Paquet", "abstract": "We present TableSeq, an image-only, end-to-end framework for joint table structure recognition, content recognition, and cell localization. The model formulates these tasks as a single sequence-generation problem: one decoder produces an interleaved stream of \\texttt{HTML} tags, cell text, and discretized coordinate tokens, thereby aligning logical structure, textual content, and cell geometry within a unified autoregressive sequence. This design avoids external OCR, auxiliary decoders, and complex multi-stage post-processing. TableSeq combines a lightweight high-resolution FCN-H16 encoder with a minimal structure-prior head and a single-layer transformer encoder, yielding a compact architecture that remains effective on challenging layouts. Across standard benchmarks, TableSeq achieves competitive or state-of-the-art results while preserving architectural simplicity. It reaches 95.23 TEDS / 96.83 S-TEDS on PubTabNet, 97.45 TEDS / 98.69 S-TEDS on FinTabNet, and 99.79 / 99.54 / 99.66 precision / recall / F1 on SciTSR under the CAR protocol, while remaining competitive on PubTables-1M under GriTS. Beyond TSR/TCR, the same sequence interface generalizes to index-based table querying without task-specific heads, achieving the best IRDR score and competitive ICDR/ICR performance. We also study multi-token prediction for faster blockwise decoding and show that it reduces inference latency with only limited accuracy degradation. Overall, TableSeq provides a practical and reproducible single-stream baseline for unified table recognition, and the source code will be made publicly available at https://github.com/hamdilaziz/TableSeq.", "link": "http://arxiv.org/abs/2604.16070v1", "date": "2026-04-17", "relevancy": 2.0189, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5119}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5014}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4989}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TableSeq%3A%20Unified%20Generation%20of%20Structure%2C%20Content%2C%20and%20Layout&body=Title%3A%20TableSeq%3A%20Unified%20Generation%20of%20Structure%2C%20Content%2C%20and%20Layout%0AAuthor%3A%20Laziz%20Hamdi%20and%20Amine%20Tamasna%20and%20Pascal%20Boisson%20and%20Thierry%20Paquet%0AAbstract%3A%20We%20present%20TableSeq%2C%20an%20image-only%2C%20end-to-end%20framework%20for%20joint%20table%20structure%20recognition%2C%20content%20recognition%2C%20and%20cell%20localization.%20The%20model%20formulates%20these%20tasks%20as%20a%20single%20sequence-generation%20problem%3A%20one%20decoder%20produces%20an%20interleaved%20stream%20of%20%5Ctexttt%7BHTML%7D%20tags%2C%20cell%20text%2C%20and%20discretized%20coordinate%20tokens%2C%20thereby%20aligning%20logical%20structure%2C%20textual%20content%2C%20and%20cell%20geometry%20within%20a%20unified%20autoregressive%20sequence.%20This%20design%20avoids%20external%20OCR%2C%20auxiliary%20decoders%2C%20and%20complex%20multi-stage%20post-processing.%20TableSeq%20combines%20a%20lightweight%20high-resolution%20FCN-H16%20encoder%20with%20a%20minimal%20structure-prior%20head%20and%20a%20single-layer%20transformer%20encoder%2C%20yielding%20a%20compact%20architecture%20that%20remains%20effective%20on%20challenging%20layouts.%20Across%20standard%20benchmarks%2C%20TableSeq%20achieves%20competitive%20or%20state-of-the-art%20results%20while%20preserving%20architectural%20simplicity.%20It%20reaches%2095.23%20TEDS%20/%2096.83%20S-TEDS%20on%20PubTabNet%2C%2097.45%20TEDS%20/%2098.69%20S-TEDS%20on%20FinTabNet%2C%20and%2099.79%20/%2099.54%20/%2099.66%20precision%20/%20recall%20/%20F1%20on%20SciTSR%20under%20the%20CAR%20protocol%2C%20while%20remaining%20competitive%20on%20PubTables-1M%20under%20GriTS.%20Beyond%20TSR/TCR%2C%20the%20same%20sequence%20interface%20generalizes%20to%20index-based%20table%20querying%20without%20task-specific%20heads%2C%20achieving%20the%20best%20IRDR%20score%20and%20competitive%20ICDR/ICR%20performance.%20We%20also%20study%20multi-token%20prediction%20for%20faster%20blockwise%20decoding%20and%20show%20that%20it%20reduces%20inference%20latency%20with%20only%20limited%20accuracy%20degradation.%20Overall%2C%20TableSeq%20provides%20a%20practical%20and%20reproducible%20single-stream%20baseline%20for%20unified%20table%20recognition%2C%20and%20the%20source%20code%20will%20be%20made%20publicly%20available%20at%20https%3A//github.com/hamdilaziz/TableSeq.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16070v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTableSeq%253A%2520Unified%2520Generation%2520of%2520Structure%252C%2520Content%252C%2520and%2520Layout%26entry.906535625%3DLaziz%2520Hamdi%2520and%2520Amine%2520Tamasna%2520and%2520Pascal%2520Boisson%2520and%2520Thierry%2520Paquet%26entry.1292438233%3DWe%2520present%2520TableSeq%252C%2520an%2520image-only%252C%2520end-to-end%2520framework%2520for%2520joint%2520table%2520structure%2520recognition%252C%2520content%2520recognition%252C%2520and%2520cell%2520localization.%2520The%2520model%2520formulates%2520these%2520tasks%2520as%2520a%2520single%2520sequence-generation%2520problem%253A%2520one%2520decoder%2520produces%2520an%2520interleaved%2520stream%2520of%2520%255Ctexttt%257BHTML%257D%2520tags%252C%2520cell%2520text%252C%2520and%2520discretized%2520coordinate%2520tokens%252C%2520thereby%2520aligning%2520logical%2520structure%252C%2520textual%2520content%252C%2520and%2520cell%2520geometry%2520within%2520a%2520unified%2520autoregressi {"title": "Scaling Behaviors of LLM Reinforcement Learning Post-Training: An Empirical Study in Mathematical Reasoning", "author": "Zelin Tan and Hejia Geng and Xiaohang Yu and Mulei Zhang and Guancheng Wan and Yifan Zhou and Qiang He and Xiangyuan Xue and Heng Zhou and Yutao Fan and Zhongzhi Li and Zaibin Zhang and Guibin Zhang and Chen Zhang and Zhenfei Yin and Philip Torr and Lei Bai", "abstract": "While scaling laws for large language models (LLMs) during pre-training have been extensively studied, their behavior under reinforcement learning (RL) post-training remains largely unexplored. This paper presents a systematic empirical investigation of scaling behaviors in RL-based post-training, with a particular focus on mathematical reasoning. Based on a set of experiments across the full Qwen2.5 dense model series (0.5B to 72B), we characterize how model scale, data volume, and computational budget interact to shape performance. Our analysis leads to four key findings: 1. Larger models consistently exhibit superior learning efficiency on both compute and data metrics. 2. The relationship between test loss, compute, and data can be modeled by a predictive power-law which is robust across both base and instruction-tuned models. 3. Although larger models exhibit higher learning efficiency, the analytical learning efficiency term k(N) in the power-law reveals a latent saturation trend in learning efficiency as model size continues to increase. 4. In data-constrained regimes, repeated reuse of high-quality data proves highly effective, as final performance is primarily governed by the total number of optimization steps rather than the uniqueness of samples. Collectively, these results provide a principled foundation and practical guidelines for efficiently scaling the reasoning capabilities of LLMs through RL post-training.", "link": "http://arxiv.org/abs/2509.25300v4", "date": "2026-04-17", "relevancy": 2.0171, "topK": [{"title": "Scaling Rectified Flow Transformers f ning%20efficiency%20on%20both%20compute%20and%20data%20metrics.%202.%20The%20relationship%20between%20test%20loss%2C%20compute%2C%20and%20data%20can%20be%20modeled%20by%20a%20predictive%20power-law%20which%20is%20robust%20across%20both%20base%20and%20instruction-tuned%20models.%203.%20Although%20larger%20models%20exhibit%20higher%20learning%20efficiency%2C%20the%20analytical%20learning%20efficiency%20term%20k%28N%29%20in%20the%20power-law%20reveals%20a%20latent%20saturation%20trend%20in%20learning%20efficiency%20as%20model%20size%20continues%20to%20increase.%204.%20In%20data-constrained%20regimes%2C%20repeated%20reuse%20of%20high-quality%20data%20proves%20highly%20effective%2C%20as%20final%20performance%20is%20primarily%20governed%20by%20the%20total%20number%20of%20optimization%20steps%20rather%20than%20the%20uniqueness%20of%20samples.%20Collectively%2C%20these%20results%20provide%20a%20principled%20foundation%20and%20practical%20guidelines%20for%20efficiently%20scaling%20the%20reasoning%20capabilities%20of%20LLMs%20through%20RL%20post-training.%0ALink%3A%20http%3A//arxiv.org/abs/2509.25300v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScaling%2520Behaviors%2520of%2520LLM%2520Reinforcement%2520Learning%2520Post-Training%253A%2520An%2520Empirical%2520Study%2520in%2520Mathematical%2520Reasoning%26entry.906535625%3DZelin%2520Tan%2520and%2520Hejia%2520Geng%2520and%2520Xiaohang%2520Yu%2520and%2520Mulei%2520Zhang%2520and%2520Guancheng%2520Wan%2520and%2520Yifan%2520Zhou%2520and%2520Qiang%2520He%2520and%2520Xiangyuan%2520Xue%2520and%2520Heng%2520Zhou%2520and%2520Yutao%2520Fan%2520and%2520Zhongzhi%2520Li%2520and%2520Zaibin%2520Zhang%2520and%2520Guibin%2520Zhang%2520and%2520Chen%2520Zhang%2520and%2520Zhenfei%2520Yin%2520and%2520Philip%2520Torr%2520and%2520Lei%2520Bai%26entry.1292438233%3DWhile%2520scaling%2520laws%2520for%2520large%2520language%2520models%2520%2528LLMs%2529%2520during%2 {"title": "BAGEL: Benchmarking Animal Knowledge Expertise in Language Models", "author": "Jiacheng Shen and Masato Hagiwara and Milad Alizadeh and Ellen Gilsenan-McMahon and Marius Miron and David Robinson and Emmanuel Chemla and Sara Keen and Gagan Narula and Mathieu Lauri\u00e8re and Matthieu Geist and Olivier Pietquin", "abstract": "Large language models have shown strong performance on broad-domain knowledge and reasoning benchmarks, but it remains unclear how well language models handle specialized animal-related knowledge under a unified closed-book evaluation protocol. We introduce BAGEL, a benchmark for evaluating animal knowledge expertise in language models. BAGEL is constructed from diverse scientific and reference sources, including bioRxiv, Global Biotic Interactions, Xeno-canto, and Wikipedia, using a combination of curated examples and automatically generated closed-book question-answer pairs. The benchmark covers multiple aspects of animal knowledge, including taxonomy, morphology, habitat, behavior, vocalization, geographic distribution, and species interactions. By focusing on closed-book evaluation, BAGEL measures animal-related knowledge of models without external retrieval at inference time. BAGEL further supports fine-grained analysis across source domains, taxonomic groups, and knowledge categories, enabling a more precise characterization of model strengths and systematic failure modes. Our benchmark provides a new testbed for studying domain-specific knowledge generalization in language models and for improving their reliability in biodiversity-related applications.", "link": "http://arxiv.org/abs/2604.16241v1", "date": "2026-04-17", "relevancy": 2.0135, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5122}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org {"title": "Hero-Mamba: Mamba-based Dual Domain Learning for Underwater Image Enhancement", "author": "Tejeswar Pokuri and Shivarth Rai", "abstract": "Underwater images often suffer from severe degradation, such as color distortion, low contrast, and blurred details, due to light absorption and scattering in water. While learning-based methods like CNNs and Transformers have shown promise, they face critical limitations: CNNs struggle to model the long-range dependencies needed for non-uniform degradation, and Transformers incur quadratic computational complexity, making them inefficient for high-resolution images. To address these challenges, we propose Hero-Mamba, a novel Mamba-based network that achieves efficient dual-domain learning for underwater image enhancement. Our approach uniquely processes information from both the spatial domain (RGB image) and the spectral domain (FFT components) in parallel. This dual-domain input allows the network to decouple degradation factors, separating color/brightness information from texture/noise. The core of our network utilizes Mamba-based SS2D blocks to capture global receptive fields and long-range dependencies with linear complexity, overcoming the limitations of both CNNs and Transformers. Furthermore, we introduce a ColorFusion block, guided by a background light prior, to restore color information with high fidelity. Extensive experiments on the LSUI and UIEB benchmark datasets demonstrate that Hero-Mamba outperforms state-of-the-art methods. Notably, our model achieves a PSNR of 25.802 and an SSIM of 0.913 on LSUI, validating its superior performance and generalization capabilities.", "link": "http://arxiv.org/abs/2604.16266v1", "date": "2026-04-17", "relevancy": 2.0133, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5188}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5016}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4989}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hero-Mamba%3A%20Mamba-based%20Dual%20Domain%20Learning%20for%20Underwater%20Image%20Enhancement&body=Title%3A%20Hero-Mamba%3A%20Mamba-based%20Dual%20Domain%20Learning%20for%20Underwater%20Image%20Enhancement%0AAuthor%3A%20Tejeswar%20Pokuri%20and%20Shivarth%20Rai%0AAbstract%3A%20Underwater%20images%20often%20suffer%20from%20severe%20degradation%2C%20such%20as%20color%20distortion%2C%20low%20contrast%2C%20and%20blurred%20details%2C%20due%20to%20light%20absorption%20and%20scattering%20in%20water.%20While%20learning-based%20methods%20like%20CNNs%20and%20Transformers%20have%20shown%20promise%2C%20they%20face%20critical%20limitations%3A%20CNNs%20struggle%20to%20model%20the%20long-range%20dependencies%20needed%20for%20non-uniform%20degradation%2C%20and%20Transformers%20incur%20quadratic%20computational%20complexity%2C%20making%20them%20inefficient%20for%20high-resolution%20images.%20To%20address%20these%20challenges%2C%20we%20propose%20Hero-Mamba%2C%20a%20novel%20Mamba-based%20network%20that%20achieves%20efficient%20dual-domain%20learning%20for%20underwater%20image%20enhancement.%20Our%20approach%20uniquely%20processes%20information%20from%20both%20the%20spatial%20domain%20%28RGB%20image%29%20and%20the%20spectral%20domain%20%28FFT%20components%29%20in%20parallel.%20This%20dual-domain%20input%20allows%20the%20network%20to%20decouple%20degradation%20factors%2C%20separating%20color/brightness%20information%20from%20texture/noise.%20The%20core%20of%20our%20network%20utilizes%20Mamba-based%20SS2D%20blocks%20to%20capture%20global%20receptive%20fields%20and%20long-range%20dependencies%20with%20linear%20complexity%2C%20overcoming%20the%20limitations%20of%20both%20CNNs%20and%20Transformers.%20Furthermore%2C%20we%20introduce%20a%20ColorFusion%20block%2C%20guided%20by%20a%20background%20light%20prior%2C%20to%20restore%20color%20information%20with%20high%20fidelity.%20Extensive%20experiments%20on%20the%20LSUI%20and%20UIEB%20benchmark%20datasets%20demonstrate%20that%20Hero-Mamba%20outperforms%20state-of-the-art%20methods.%20Notably%2C%20our%20model%20achieves%20a%20PSNR%20of%2025.802%20and%20an%20SSIM%20of%200.913%20on%20LSUI%2C%20validating%20its%20superior%20performance%20and%20generalization%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16266v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHero-Mamba%253A%2520Mamba-based%2520Dual%2520Domain%2520Learning%2520for%2520Underwater%2520Image%2520Enhancement%26entry.906535625%3DTejeswar%2520Pokuri%2520and%2520Shivarth%2520Rai%26entry.1292438233%3DUnderwater%2520images%2520often%2520suffer%2520from%2520severe%2520degradation%252C%2520such%2520as%2520color%2520distortion%252C%2520low%2520contrast%252C%2520and%2520blurred%2520details%252C%2520due%2520to%2520light%2520absorption%2520and%2520scattering%2520in%2520water.%2520While%2520learning-based%2520methods%2520like%2520CNNs%2520and%2520Transformers%2520have%2520shown%2520promise%252C%2520they%2520face%2520critical%2520limitations%253A%2520CNNs%2520struggle%2520to%2520model%2520the%2520long-range%2520dependencies%2520needed%2520for%2520non-uniform%2520degradation%252C%2520and%2520Transformers%2520incur%2520quadratic%2520computational%2520complexity%252C%2520making%2520them%2520inefficient%2520for%2520high-resolution%2520images.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520Hero-Mamba%252C%2520a%2520novel%2520Mamba-based%2520network%2520that%2520achieves%2520efficient%2520dual-domain%2520learning%2520for%2520underwater%2520image%2520enhancement.%2520Our%2520approach%2520uniquely%2520processes%2520information%2520from%2520bot {"title": "Evaluating the Progression of Large Language Model Capabilities for Small-Molecule Drug Design", "author": "Shriram Chennakesavalu and Kirill Shmilovich and Hayley Weir and Colin Grambow and John Bradshaw and Patricia Suriana and Chen Cheng and Kangway Chuang", "abstract": "Large Language Models (LLMs) have the potential to accelerate small molecule drug design due to their ability to reason about information from diverse sources and formats. However, their practical utility remains unclear due to the lack of benchmarks that reflect real-world scenarios. In this work, we introduce a suite of chemically-grounded tasks spanning molecular property prediction, molecular representation transformations, and molecular design. Importantly, we formulate these tasks as reinforcement learning (RL) environments, enabling a unified approach for evaluation and post-training. Across three model families, we find that frontier models are increasingly proficient at chemical tasks, but that there is significant room for improvement, especially in experimental settings with low data. Critically, we show that RL-based post-training can substantially improve performance. A smaller model post-trained on our environments becomes competitive with state-of-the-art frontier models, despite a significantly weaker base model. This suggests a practical route toward employing LLMs in drug discovery; by combining carefully-designed evaluation tasks with targeted post-training, we can both elucidate and close critical capability gaps.", "link": "http://arxiv.org/abs/2604.16279v1", "date": "2026-04-17", "relevancy": 2.0084, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5066}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5066}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20the%20Progression%20of%20Large%20Language%20Model%20Capabilities%20for%20Small-Molecule%20Drug%20Design&body=Title%3A%20Evaluating%20the%20Progression%20of%20Large%20Language%20Model%20Capabilities%20for%20Small-Molecule%20Drug%20Design%0AAuthor%3A%20Shriram%20Chennakesavalu%20and%20Kirill%20Shmilovich%20and%20Hayley%20Weir%20and%20Colin%20Grambow%20and%20John%20Bradshaw%20and%20Patricia%20Suriana%20and%20Chen%20Cheng%20and%20Kangway%20Chuang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20the%20potential%20to%20accelerate%20small%20molecule%20drug%20design%20due%20to%20their%20ability%20to%20reason%20about%20information%20from%20diverse%20sources%20and%20formats.%20However%2C%20their%20practical%20utility%20remains%20unclear%20due%20to%20the%20lack%20of%20benchmarks%20that%20reflect%20real-world%20scenarios.%20In%20this%20work%2C%20we%20introduce%20a%20suite%20of%20chemically-grounded%20tasks%20spanning%20molecular%20property%20prediction%2C%20molecular%20representation%20transformations%2C%20and%20molecular%20design.%20Importantly%2C%20we%20formulate%20these%20tasks%20as%20reinforcement%20learning%20%28RL%29%20environments%2C%20enabling%20a%20unified%20approach%20for%20evaluation%20and%20post-training.%20Across%20three%20model%20families%2C%20we%20find%20that%20frontier%20models%20are%20increasingly%20proficient%20at%20chemical%20tasks%2C%20but%20that%20there%20is%20significant%20room%20for%20improvement%2C%20especially%20in%20experimental%20settings%20with%20low%20data.%20Critically%2C%20we%20show%20that%20RL-based%20post-training%20can%20substantially%20improve%20performance.%20A%20smaller%20model%20post-trained%20on%20our%20environments%20becomes%20competitive%20with%20state-of-the-art%20frontier%20models%2C%20despite%20a%20significantly%20weaker%20base%20model.%20This%20suggests%20a%20practical%20route%20toward%20employing%20LLMs%20in%20drug%20discovery%3B%20by%20combining%20carefully-designed%20evaluation%20tasks%20with%20targeted%20post-training%2C%20we%20can%20both%20elucidate%20and%20close%20critical%20capability%20gaps.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16279v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520the%2520Progression%2520of%2520Large%2520Language%2520Model%2520Capabilities%2520for%2520Small-Molecule%2520Drug%2520Design%26entry.906535625%3DShriram%2520Chennakesavalu%2520and%2520Kirill%2520Shmilovich%2520and%2520Hayley%2520Weir%2520and%2520Colin%2520Grambow%2520and%2520John%2520Bradshaw%2520and%2520Patricia%2520Suriana%2520and%2520Chen%2520Cheng%2520and%2520Kangway%2520Chuang%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520the%2520potential%2520to%2520accelerate%2520small%2520molecule%2520drug%2520design%2520due%2520to%2520their%2520ability%2520to%2520reason%2520about%2520information%2520from%2520diverse%2520sources%2520and%2520formats.%2520However%252C%2520their%2520practical%2520utility%2520remains%2520unclear%2520due%2520to%2520the%2520lack%2520of%2520benchmarks%2520that%2520reflect%2520real-world%2520scenarios.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520suite%2520of%2520chemically-grounded%2520tasks%2520spanning%2520molecular%2520property%2520prediction%252C%2520molecular%2520representation%2520transformations%252C%2520and%2520molecular%2520design.%2520Importantly%252C%2520we%2520formulate%2520these%2520tasks%2520as%2520reinforcement%2520learning%2520%2528RL%2529%2520environments%252C%2520enabling%2520a%2520unified%2520approach%2520for%2520evaluation%2520and%2520post-training.%2520Across%2520three%2520model%2520families%252C%2520we%2520find%2520that%2520frontier%2520models%2520are%2520increasingly% {"title": "Differential privacy representation geometry for medical image analysis", "author": "Soroosh Tayebi Arasteh and Marziyeh Mohammadi and Sven Nebelung and Daniel Truhn", "abstract": "Differential privacy (DP)'s effect in medical imaging is typically evaluated only through end-to-end performance, leaving the mechanism of privacy-induced utility loss unclear. We introduce Differential Privacy Representation Geometry for Medical Imaging (DP-RGMI), a framework that interprets DP as a structured transformation of representation space and decomposes performance degradation into encoder geometry and task-head utilization. Geometry is quantified by representation displacement from initialization and spectral effective dimension, while utilization is measured as the gap between linear-probe and end-to-end utility. Across over 594,000 images from four chest X-ray datasets and multiple pretrained initializations, we show that DP is consistently associated with a utilization gap even when linear separability is largely preserved. At the same time, displacement and spectral dimension exhibit non-monotonic, initialization- and dataset-dependent reshaping, indicating that DP alters representation anisotropy rather than uniformly collapsing features. Correlation analysis reveals that the association between end-to-end performance and utilization is robust across datasets but can vary by initialization, while geometric quantities capture additional prior- and dataset-conditioned variation. These findings position DP-RGMI as a reproducible framework for diagnosing privacy-induced failure modes and informing privacy model selection.", "link": "http://arxiv.org/abs/2603.01098v2", "date": "2026-04-17", "relevancy": 2.0036, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.512}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org sociation%20between%20end-to-end%20performance%20and%20utilization%20is%20robust%20across%20datasets%20but%20can%20vary%20by%20initialization%2C%20while%20geometric%20quantities%20capture%20additional%20prior-%20and%20dataset-conditioned%20variation.%20These%20findings%20position%20DP-RGMI%20as%20a%20reproducible%20framework%20for%20diagnosing%20privacy-induced%20failure%20modes%20and%20informing%20privacy%20model%20selection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01098v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDifferential%2520privacy%2520representation%2520geometry%2520for%2520medical%2520image%2520analysis%26entry.906535625%3DSoroosh%2520Tayebi%2520Arasteh%2520and%2520Marziyeh%2520Mohammadi%2520and%2520Sven%2520Nebelung%2520and%2520Daniel%2520Truhn%26entry.1292438233%3DDifferential%2520privacy%2520%2528DP%2529%2527s%2520effect%2520in%2520medical%2520imaging%2520is%2520typically%2520evaluated%2520only%2520through%2520end-to-end%2520performance%252C%2520leaving%2520the%2520mechanism%2520of%2520privacy-induced%2520utility%2520loss%2520unclear.%2520We%2520introduce%2520Differential%2520Privacy%2520Representation%2520Geometry%2520for%2520Medical%2520Imaging%2520%2528DP-RGMI%2529%252C%2520a%2520framework%2520that%2520interprets%2520DP%2520as%2520a%2520structured%2520transformation%2520of%2520representation%2520space%2520and%2520decomposes%2520performance%2520degradation%2520into%2520encoder%2520geometry%2520and%2520task-head%2520utilization.%2520Geometry%2520is%2520quantified%2520by%2520representation%2520displacement%2520from%2520initialization%2520and%2520spectral%2520effective%2520dimension%252C%2520while%2520utilization%2520is%2520measured%2520as%2520the%2520gap%2520between%2520linear-probe%2520and%2520end-to-end%2520utility.%2520Across%2520over%2520594%252C000%2520images%2520from%2520four%2520chest%2520X-ray%2520datasets%2520and%2520multiple%2520pretrained%2520initiali {"title": "AdaBoost Does Not Always Cycle: A Computer-Assisted Counterexample", "author": "Erik Y. Wang", "abstract": "We give a computer-assisted counterexample to the open question, posed by Rudin, Schapire, and Daubechies in COLT 2012, of whether exhaustive AdaBoost always converges to a finite cycle. The construction is based on a block-product gadget whose two factors share an exact period-2 orbit for their 5-step branch maps, but whose linearized return maps have dominant eigenvalues with an irrational logarithmic ratio. This irrationality forces the burst-winner sequence to have an irrational asymptotic frequency, precluding eventual periodicity. All assertions are certified by exact rational arithmetic. This work was developed in collaboration with GPT-5.4 Pro and Claude Opus 4.6.", "link": "http://arxiv.org/abs/2604.07055v2", "date": "2026-04-17", "relevancy": 2.0006, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4119}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4035}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.3849}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaBoost%20Does%20Not%20Always%20Cycle%3A%20A%20Computer-Assisted%20Counterexample&body=Title%3A%20AdaBoost%20Does%20Not%20Always%20Cycle%3A%20A%20Computer-Assisted%20Counterexample%0AAuthor%3A%20Erik%20Y.%20Wang%0AAbstract%3A%20We%20give%20a%20computer-assisted%20counterexample%20to%20the%20open%20question%2C%20posed%20by%20Rudin%2C%20Schapire%2C%20and%20Daubechies%20in%20COLT%202012%2C%20of%20whether%20exhaustive%20AdaBoost%20always%20converges%20to%20a%20finite%20cycle.%20The%20construction%20is%20based%20on%20a%20block-product%20gadget%20whose%20two%20factors%20share%20an%20exact%20period-2%20orbit%20for%20their%205-step%20branch%20maps%2C%20but%20whose%20linearized%20return%20maps%20have%20dominant%20eigenvalues%20with%20an%20irrational%20logarithmic%20ratio.%20This%20irrationality%20forces%20the%20burst-winner%20sequence%20to%20have%20an%20irrational%20asymptotic%20frequency%2C%20precluding%20eventual%20periodicity.%20All%20assertions%20are%20certified%20by%20exact%20rational%20arithmetic.%20This%20work%20was%20developed%20in%20collaboration%20with%20GPT-5.4%20Pro%20and%20Claude%20Opus%204.6.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07055v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaBoost%2520Does%2520Not%2520Always%2520Cycle%253A%2520A%2520Computer-Assisted%2520Counterexample%26entry.906535625%3DErik%2520Y.%2520Wang%26entry.1292438233%3DWe%2520give%2520a%2520computer-assisted%2520counterexample%2520to%2520the%2520open%2520question%252C%2520posed%2520by%2520Rudin%252C%2520Schapire%252C%2520and%2520Daubechies%2520in%2520COLT%25202012%252C%2520of%2520whether%2520exhaustive%2520AdaBoost%2520always%2520converges%2520to%2520a%2520finite%2520cycle.%2520The%2520construction%2520is%2520based%2520on%2520a%2520block-product%2520gadget%2520whose%2520two%2520factors%2520share%2520an%2520exact%2520period-2%2520orbit%2520for%2520their%25205-step%2520branch%2520maps%252C%2520but%2520whose%2520linearized%2520return%2520maps%2520have%2520dominant%2520eigenvalues%2520with%2520an%2520irrational%2520logarithmic%2520ratio.%2520This%2520irrationality%2520forces%2520the%2520burst-winner%2520sequence%2520to%2520have%2520an%2520irrational%2520asymptotic%2520frequency%252C%2520precluding%2520eventual%2520periodicity.%2520All%2520assertions%2520are%2520certified%2520by%2520exact%2520rational%2520arithmetic.%2520This%2520work%2520was%2520developed%2520in%2520collaboration%2520with%2520GPT-5.4%2520Pro%2520and%2520Claude%2520Opus%25204.6 {"title": "Beyond LLMs, Sparse Distributed Memory, and Neuromorphics <A Hyper-Dimensional SRAM-CAM \"VaCoAl\" for Ultra-High Speed, Ultra-Low Power, and Low Cost>", "author": "Hiroyuki Chuma and Kanji Otsuka and Yoichi Sato", "abstract": "This paper reports an unexpected finding: in a deterministic hyperdimensional computing (HDC) architecture **that inverts the conventional role of Galois-field algebra -- employing it not for error correction toward a unique answer but as an engine for relative similarity and path-quality ranking -- **a path-dependent semantic selection mechanism emerges, equivalent to spike-timing-dependent plasticity (STDP), with magnitude predictable a priori from a closed-form expression matching measured values. Addressing catastrophic forgetting, learning stagnation, and the Binding Problem at an algebraic level, we propose VaCoAl (Vague Coincident Algorithm) and its Python implementation PyVaCoAl on ultra-high-dimensional SRAM/DRAM-CAM. Rooted in Sparse Distributed Memory, it resolves orthogonalisation and retrieval in high-dimensional binary spaces via Galois-field diffusion, enabling low-load deployment. Crucially, VaCoAl embeds a cognitive bound -- the Frontier Size -- into its architecture, ranking candidates by path-integral confidence (CR2) to achieve compositional generalisation; this bounded-rationality design produces STDP-like selection that error-correction paradigms structurally cannot attain. We evaluated multi-hop reasoning on about 470k mentor-student relations from Wikidata, tracing up to 57 generations (over 25.5M paths). HDC bundling and unbinding with CR-based denoising quantify concept propagation over DAGs. Results show a reinterpretation of the Newton-Leibniz dispute and a phase transition from sparse convergence to a post-Leibniz \"superhighway\", with structural indicators supporting a Kuhnian paradigm shift. VaCoAl thus defines a third paradigm, HDC-AI, complementing LLMs with reversible, auditable multi-hop reasoning.", "link": "http://arxiv.org/abs/2604.11665v4", "date": "2026-04-17", "relevancy": 1.9956, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.524}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4939}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4939}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20LLMs%2C%20Sparse%20Distributed%20Memory%2C%20and%20Neuromorphics%20%3CA%20Hyper-Dimensional%20SRAM-CAM%20%22VaCoAl%22%20for%20Ultra-High%20Speed%2C%20Ultra-Low%20Power%2C%20and%20Low%20Cost%3E&body=Title%3A%20Beyond%20LLMs%2C%20Sparse%20Distributed%20Memory%2C%20and%20Neuromorphics%20%3CA%20Hyper-Dimensional%20SRAM-CAM%20%22VaCoAl%22%20for%20Ultra-High%20Speed%2C%20Ultra-Low%20Power%2C%20and%20Low%20Cost%3E%0AAuthor%3A%20Hiroyuki%20Chuma%20and%20Kanji%20Otsuka%20and%20Yoichi%20Sato%0AAbstract%3A%20This%20paper%20reports%20an%20unexpected%20finding%3A%20in%20a%20deterministic%20hyperdimensional%20computing%20%28HDC%29%20architecture%20%2A%2Athat%20inverts%20the%20conventional%20role%20of%20Galois-field%20algebra%20--%20employing%20it%20not%20for%20error%20correction%20toward%20a%20unique%20answer%20but%20as%20an%20engine%20for%20relative%20similarity%20and%20path-quality%20ranking%20--%20%2A%2Aa%20path-dependent%20semantic%20selection%20mechanism%20emerges%2C%20equivalent%20to%20spike-timing-dependent%20plasticity%20%28STDP%29%2C%20with%20magnitude%20predictable%20a%20priori%20from%20a%20closed-form%20expression%20matching%20measured%20values.%20Addressing%20catastrophic%20forgetting%2C%20learning%20stagnation%2C%20and%20the%20Binding%20Problem%20at%20an%20algebraic%20level%2C%20we%20propose%20VaCoAl%20%28Vague%20Coincident%20Algorithm%29%20and%20its%20Python%20implementation%20PyVaCoAl%20on%20ultra-high-dimensional%20SRAM/DRAM-CAM.%20Rooted%20in%20Sparse%20Distributed%20Memory%2C%20it%20resolves%20orthogonalisation%20and%20retrieval%20in%20high-dimensional%20binary%20spaces%20via%20Galois-field%20diffusion%2C%20enabling%20low-load%20deployment.%20Crucially%2C%20VaCoAl%20embeds%20a%20cognitive%20bound%20--%20the%20Frontier%20Size%20--%20into%20its%20architecture%2C%20ranking%20candidates%20by%20path-integral%20confidence%20%28CR2%29%20to%20achieve%20compositional%20generalisation%3B%20this%20bounded-rationality%20design%20produces%20STDP-like%20selection%20that%20error-correction%20paradigms%20structurally%20cannot%20attain.%20We%20evaluated%20multi-hop%20reasoning%20on%20about%20470k%20mentor-student%20relations%20from%20Wikidata%2C%20tracing%20up%20to%2057%20generations%20%28over%2025.5M%20paths%29.%20HDC%20bundling%20and%20unbinding%20with%20CR-based%20denoising%20quantify%20concept%20propagation%20over%20DAGs.%20Results%20show%20a%20reinterpretation%20of%20the%20Newton-Leibniz%20dispute%20and%20a%20phase%20transition%20from%20sparse%20convergence%20to%20a%20post-Leibniz%20%22superhighway%22%2C%20with%20structural%20indicators%20supporting%20a%20Kuhnian%20paradigm%20shift.%20VaCoAl%20thus%20defines%20a%20third%20paradigm%2C%20HDC-AI%2C%20complementing%20LLMs%20with%20reversible%2C%20auditable%20multi-hop%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11665v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520LLMs%252C%2520Sparse%2520Distributed%2520Memory%252C%2520and%2520Neuromorphics%2520%253CA%2520Hyper-Dimensional%2520SRAM-CAM%2520%2522VaCoAl%2522%2520for%2520Ultra-High%2520Speed%252C%2520Ultra-Low%2520Power%252C%2520and%2520Low%2520Cost%253E%26entry.906535625%3DHiroyuki%2520Chuma%2520and%2520Kanji%2520Otsuka%2520and%2520Yoichi%2520Sato%26en {"title": "Sequential Regression Learning with Randomized Algorithms", "author": "Dorival Le\u00e3o and Reiko Aoki and Alberto Ohashi and Teh Led Red", "abstract": "This paper presents ``randomized SINDy\", a sequential machine learning algorithm designed for dynamic data that has a time-dependent structure. It employs a probabilistic approach, with its PAC learning property rigorously proven through the mathematical theory of functional analysis. The algorithm dynamically predicts using a learned probability distribution of predictors, updating weights via gradient descent and a proximal algorithm to maintain a valid probability density. Inspired by SINDy (Brunton et al. 2016), it incorporates feature augmentation and Tikhonov regularization. For multivariate normal weights, the proximal step is omitted to focus on parameter estimation. The algorithm's effectiveness is demonstrated through experimental results in regression and binary classification using real-world data.", "link": "http://arxiv.org/abs/2507.03759v2", "date": "2026-04-17", "relevancy": 1.3644, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4768}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.462}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4149}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sequential%20Regression%20Learning%20with%20Randomized%20Algorithms&body=Title%3A%20Sequential%20Regression%20Learning%20with%20Randomized%20Algorithms%0AAuthor%3A%20Dorival%20Le%C3%A3o%20and%20Reiko%20Aoki%20and%20Alberto%20Ohashi%20and%20Teh%20Led%20Red%0AAbstract%3A%20This%20paper%20presents%20%60%60randomized%20SINDy%22%2C%20a%20sequential%20machine%20learning%20algorithm%20designed%20for%20dynamic%20data%20that%20has%20a%20time-dependent%20structure.%20It%20employs%20a%20probabilistic%20approach%2C%20with%20its%20PAC%20learning%20property%20rigorously%20proven%20through%20the%20mathematical%20theory%20of%20functional%20analysis.%20The%20algorithm%20dynamically%20predicts%20using%20a%20learned%20probability%20distribution%20of%20predictors%2C%20updating%20weights%20via%20gradient%20descent%20and%20a%20proximal%20algorithm%20to%20maintain%20a%20valid%20probability%20density.%20Inspired%20by%20SINDy%20%28Brunton%20et%20al.%202016%29%2C%20it%20incorporates%20feature%20augmentation%20and%20Tikhonov%20regularization.%20For%20multivariate%20normal%20weights%2C%20the%20proximal%20step%20is%20omitted%20to%20focus%20on%20parameter%20estimation.%20The%20algorithm%27s%20effectiveness%20is%20demonstrated%20through%20experimental%20results%20in%20regression%20and%20binary%20classification%20using%20real-world%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2507.03759v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSequential%2520Regression%2520Learning%2520with%2520Randomized%2520Algorithms%26entry.906535625%3DDorival%2520Le%25C3%25A3o%2520and%2520Reiko%2520Aoki%2520and%2520Alberto%2520Ohashi%2520and%2520Teh%2520Led%2520Red%26entry.1292438233%3DThis%2520paper%2520presents%2520%2560%2560randomized%2520SINDy%2522%252C%2520a%2520sequential%2520machine%2520learning%2520algorithm%2520designed%2520for%2520dynamic%2520data%2520that%2520has%2520a%2520time-dependent%2520structure.%2520It%2520employs%2520a%2520probabilistic%2520approach%252C%2520with%2520its%2520PAC%2520learning%2520property%2520rigorously%2520proven%2520through%2520the%2520mathematical%2520theory%2520of%2520functional%2520analysis.%2520The%2520algorithm%2520dynamically%2520predicts%2520using%2520a%2520learned%2520probability%2520distribution%2520of%2520predictors%252C%2520updating%2520weights%2520via%2520gradient%2520descent%2520and%2520a%2520proximal%2520algorithm%2520to%2520maintain%2520a%2520valid%2520probability%2520density.%2520Inspired%2520by%2520SINDy%2520%2528Brunton%2520et%2520al.%25202016%2529%252C%2520it%2520incorporates%2520feature%2520augmentation%2520and%2520Tikhonov%2520regularization.%2520For%2520multivariate%2520normal%2520weights%252C%2520the%2520proximal%2520step%2520is%2520omitted%2520to%2520focus%2520on%2520parameter%2520estimation.%2520The%2520algorithm%2527s%2520effectiveness%2520is%2520demonstrated%2520through%2520experimental%2520results%2520in%2520regression%2520and%2520binary%2520classification%2520using%2520real-world%2520data.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.03759v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sequential%20Regression%20Learning%20with%20Randomized%20Algorithms&entry.906535625=Dorival%20Le%C3%A3o%20and%20Reiko%20Aoki%20and%20Alberto%20Ohashi%20and%20Teh%20Led%20Red&entry.1292438233=This%20paper%20presents%20%60%60randomized%20SINDy%22%2C%20a%20sequential%20machine%20learning%20algorithm%20designed%20for%20dynamic%20data%20that%20has%20a%20time-dependent%20structure.%20It%20employs%20a%20probabilistic%20approach%2C%20with%20its%20PAC%20learning%20property%20rigorously%20proven%20through%20the%20mathematical%20theory%20of%20functional%20analysis.%20The%20algorithm%20dynamically%20predicts%20using%20a%20learned%20probability%20distribution%20of%20predictors%2C%20updating%20weights%20via%20gradient%20descent%20and%20a%20proximal%20algorithm%20to%20maintain%20a%20valid%20probability%20density.%20Inspired%20by%20SINDy%20%28Brunton%20et%20al.%202016%29%2C%20it%20incorporates%20feature%20augmentation%20and%20Tikhonov%20regularization.%20For%20multivariate%20normal%20weights%2C%20the%20proximal%20step%20is%20omitted%20to%20focus%20on%20parameter%20estimation.%20The%20algorithm%27s%20effectiveness%2 {"title": "From Multi-Agent to Single-Agent: When Is Skill Distillation Beneficial?", "author": "Binyan Xu and Dong Fang and Haitao Li and Kehuan Zhang", "abstract": "Multi-agent systems (MAS) tackle complex tasks by distributing expertise, though this often comes at the cost of heavy coordination overhead, context fragmentation, and brittle phase ordering. Distilling a MAS into a single-agent skill can bypass these costs, but this conversion lacks a principled answer for when and what to distill. Instead, the empirical outcome is surprisingly inconsistent: skill lift ranges from a 28% improvement to a 2% degradation across metrics of the exact same task. In this work, we reveal that skill utility is governed not by the task, but by the evaluation metric. We introduce Metric Freedom (F), the first a priori predictor of skill utility. F measures the topological rigidity of a metric's scoring landscape by quantifying how output diversity couples with score variance via a Mantel test. Guided by F, we propose AdaSkill, a two-stage adaptive distillation framework. Stage 1 acts as a selective extraction mechanism, extracting tools and knowledge while discarding restrictive structures on \"free\" metrics to preserve exploration. Stage 2 applies iterative refinement on free metrics, exploiting their flat scoring landscape to safely maximize remaining headroom without oscillation. Evaluating across 4 tasks, 11 datasets, and 6 metrics, F strongly predicts skill utility (r=-0.85, p<0.0001). Strikingly, identical agent trajectories yield diametrically opposite skill lifts under rigid versus free metrics, demonstrating that skill utility is fundamentally a metric-level property. Driven by this signal, AdaSkill matches or exceeds the original MAS while reducing cost up to 8x and latency by up to 15x.", "link": "http://arxiv.org/abs/2604.01608v2", "date": "2026-04-17", "relevancy": 1.8505, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4877}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4667}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4359}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Multi-Agent%20to%20Single-Agent%3A%20When%20Is%20Skill%20Distillation%20Beneficial%3F&body=Title%3A%20From%20Multi-Agent%20to%20Single-Agent%3A%20When%20Is%20Skill%20Distillation%20Beneficial%3F%0AAuthor%3A%20Binyan%20Xu%20and%20Dong%20Fang%20and%20Haitao%20Li%20and%20Kehuan%20Zhang%0AAbstract%3A%20Multi-agent%20systems%20%28MAS%29%20tackle%20complex%20tasks%20by%20distributing%20expertise%2C%20though%20this%20often%20comes%20at%20the%20cost%20of%20heavy%20coordination%20overhead%2C%20context%20fragmentation%2C%20and%20brittle%20phase%20ordering.%20Distilling%20a%20MAS%20into%20a%20single-agent%20skill%20can%20bypass%20these%20costs%2C%20but%20this%20conversion%20lacks%20a%20principled%20answer%20for%20when%20and%20what%20to%20distill.%20Instead%2C%20the%20empirical%20outcome%20is%20surprisingly%20inconsistent%3A%20skill%20lift%20ranges%20from%20a%2028%25%20improvement%20to%20a%202%25%20degradation%20across%20metrics%20of%20the%20exact%20same%20task.%20In%20this%20work%2C%20we%20reveal%20that%20skill%20utility%20is%20governed%20not%20by%20the%20task%2C%20but%20by%20the%20evaluation%20metric.%20We%20introduce%20Metric%20Freedom%20%28F%29%2C%20the%20first%20a%20priori%20predictor%20of%20skill%20utility.%20F%20measures%20the%20topological%20rigidity%20of%20a%20metric%27s%20scoring%20landscape%20by%20quantifying%20how%20output%20diversity%20couples%20with%20score%20variance%20via%20a%20Mantel%20test.%20Guided%20by%20F%2C%20we%20propose%20AdaSkill%2C%20a%20two-stage%20adaptive%20distillation%20framework.%20Stage%201%20acts%20as%20a%20selective%20extraction%20mechanism%2C%20extracting%20tools%20and%20knowledge%20while%20discarding%20restrictive%20structures%20on%20%22free%22%20metrics%20to%20preserve%20exploration.%20Stage%202%20applies%20iterative%20refinement%20on%20free%20metrics%2C%20exploiting%20their%20flat%20scoring%20landscape%20to%20safely%20maximize%20remaining%20headroom%20without%20oscillation.%20Evaluating%20across%204%20tasks%2C%2011%20datasets%2C%20and%206%20metrics%2C%20F%20strongly%20predicts%20skill%20utility%20%28r%3D-0.85%2C%20p%3C0.0001%29.%20Strikingly%2C%20identical%20agent%20trajectories%20yield%20diametrically%20opposite%20skill%20lifts%20under%20rigid%20versus%20free%20metrics%2C%20demonstrating%20that%20skill%20utility%20is%20fundamentally%20a%20metric-level%20property.%20Driven%20by%20this%20signal%2C%20AdaSkill%20matches%20or%20exceeds%20the%20original%20MAS%20while%20reducing%20cost%20up%20to%208x%20and%20latency%20by%20up%20to%2015x.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01608v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Multi-Agent%2520to%2520Single-Agent%253A%2520When%2520Is%2520Skill%2520Distillation%2520Beneficial%253F%26entry.906535625%3DBinyan%2520Xu%2520and%2520Dong%2520Fang%2520and%2520Haitao%2520Li%2520and%2520Kehuan%2520Zhang%26entry.1292438233%3DMulti-agent%2520systems%2520%2528MAS%2529%2520tackle%2520complex%2520tasks%2520by%2520distributing%2520expertise%252C%2520though%2520this%2520often%2520comes%2520at%2520the%2520cost%2520of%2520heavy%2520coordination%2520overhead%252C%2520context%2520fragmentation%252C%2520and%2520brittle%2520phase%2520ordering.%2520Distilling%2520a%2520MAS%2520into%2520a%2520single-agent%2520skill%2520can%2520bypass%2520these%2520costs%252C%2520but%2520this%2520conversion%2520lacks%2520a%2520principled%2520answer%2520for%2520when%2520and%2520what%2520to%2520distill.%2520Instead%252C%2520th {"title": "OXtal: An All-Atom Diffusion Model for Organic Crystal Structure Prediction", "author": "Emily Jin and Andrei Cristian Nica and Mikhail Galkin and Jarrid Rector-Brooks and Kin Long Kelvin Lee and Santiago Miret and Frances H. Arnold and Michael Bronstein and Avishek Joey Bose and Alexander Tong and Cheng-Hao Liu", "abstract": "Accurately predicting experimentally realizable 3D molecular crystal structures from their 2D chemical graphs is a long-standing open challenge in computational chemistry called crystal structure prediction (CSP). Efficiently solving this problem has implications ranging from pharmaceuticals to organic semiconductors, as crystal packing directly governs the physical and chemical properties of organic solids. In this paper, we introduce OXtal, a large-scale 100M parameter all-atom diffusion model that directly learns the conditional joint distribution over intramolecular conformations and periodic packing. To efficiently scale OXtal, we abandon explicit equivariant architectures imposing inductive bias arising from crystal symmetries in favor of data augmentation strategies. We further propose a novel crystallization-inspired lattice-free training scheme, Stoichiometric Stochastic Shell Sampling ($S^4$), that efficiently captures long-range interactions while sidestepping explicit lattice parametrization -- thus enabling more scalable architectural choices at all-atom resolution. By leveraging a large dataset of 600K experimentally validated crystal structures (including rigid and flexible molecules, co-crystals, and solvates), OXtal achieves orders-of-magnitude improvements over prior ab initio machine learning CSP methods, while remaining orders of magnitude cheaper than traditional quantum-chemical approaches. Specifically, OXtal recovers experimental structures with conformer $\\text{RMSD}_1<0.5$ \u00c5 and attains over 80\\% packing similarity rate, demonstrating its ability to model both thermodynamic and kinetic regularities of molecular crystallization.", "link": "http://arxiv.org/abs/2512.06987v2", "date": "2026-04-17", "relevancy": 1.8994, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4996}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4699}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4699}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OXtal%3A%20An%20All-Atom%20Diffusion%20Model%20for%20Organic%20Crystal%20Structure%20Prediction&body=Title%3A%20OXtal%3A%20An%20All-Atom%20Diffusion%20Model%20for%20Organic%20Crystal%20Structure%20Prediction%0AAuthor%3A%20Emily%20Jin%20and%20Andrei%20Cristian%20Nica%20and%20Mikhail%20Galkin%20and%20Jarrid%20Rector-Brooks%20and%20Kin%20Long%20Kelvin%20Lee%20and%20Santiago%20Miret%20and%20Frances%20H.%20Arnold%20and%20Michael%20Bronstein%20and%20Avishek%20Joey%20Bose%20and%20Alexander%20Tong%20and%20Cheng-Hao%20Liu%0AAbstract%3A%20Accurately%20predicting%20experimentally%20realizable%203D%20molecular%20crystal%20structures%20from%20their%202D%20chemical%20graphs%20is%20a%20long-standing%20open%20challenge%20in%20computational%20chemistry%20called%20crystal%20structure%20prediction%20%28CSP%29.%20Efficiently%20solving%20this%20problem%20has%20implications%20ranging%20from%20pharmaceuticals%20to%20organic%20semiconductors%2C%20as%20crystal%20packing%20directly%20governs%20the%20physical%20and%20chemical%20properties%20of%20organic%20solids.%20In%20this%20paper%2C%20we%20introduce%20OXtal%2C%20a%20large-scale%20100M%20parameter%20all-atom%20diffusion%20model%20that%20directly%20learns%20the%20conditional%20joint%20distribution%20over%20intramolecular%20conformations%20and%20periodic%20packing.%20To%20efficiently%20scale%20OXtal%2C%20we%20abandon%20explicit%20equivariant%20architectures%20imposing%20inductive%20bias%20arising%20from%20crystal%20symmetries%20in%20favor%20of%20data%20augmentation%20strategies.%20We%20further%20propose%20a%20novel%20crystallization-inspired%20lattice-free%20training%20scheme%2C%20Stoichiometric%20Stochastic%20Shell%20Sampling%20%28%24S%5E4%24%29%2C%20that%20efficiently%20captures%20long-range%20interactions%20while%20sidestepping%20explicit%20lattice%20parametrization%20--%20thus%20enabling%20more%20scalable%20architectural%20choices%20at%20all-atom%20resolution.%20By%20leveraging%20a%20large%20dataset%20of%20600K%20experimentally%20validated%20crystal%20structures%20%28including%20rigid%20and%20flexible%20molecules%2C%20co-crystals%2C%20and%20solvates%29%2C%20OXtal%20achieves%20orders-of-magnitude%20improvements%20over%20prior%20ab%20initio%20machine%20learning%20CSP%20methods%2C%20while%20remaining%20orders%20of%20magnitude%20cheaper%20than%20traditional%20quantum-chemical%20approaches.%20Specifically%2C%20OXtal%20recovers%20experimental%20structures%20with%20conformer%20%24%5Ctext%7BRMSD%7D_1%3C0.5%24%20%C3%85%20and%20attains%20over%2080%5C%25%20packing%20similarity%20rate%2C%20demonstrating%20its%20ability%20to%20model%20both%20thermodynamic%20and%20kinetic%20regularities%20of%20molecular%20crystallization.%0ALink%3A%20http%3A//arxiv.org/abs/2512.06987v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOXtal%253A%2520An%2520All-Atom%2520Diffusion%2520Model%2520for%2520Organic%2520Crystal%2520Structure%2520Prediction%26entry.906535625%3DEmily%2520Jin%2520and%2520Andrei%2520Cristian%2520Nica%2520and%2520Mikhail%2520Galkin%2520and%2520Jarrid%2520Rector-Brooks%2520and%2520Kin%2520Long%2520Kelvin%2520Lee%2520and%2520Santiago%2520Miret%2520and%2520Frances%2520H.%2520Arnold%2520and%2520Michael%2520Bronstein%2520and%2520Avishek%2520Joey%2520Bose%2520and%2520Alexander%2520Tong%2520and%2520Cheng-Hao%2 {"title": "Estimating Joint Interventional Distributions from Marginal Interventional Data", "author": "Sergio Hernan Garrido Mejia and Elke Kirschbaum and Armin Keki\u0107 and Bernhard Sch\u00f6lkopf and Atalanti Mastakouri", "abstract": "In this paper we show how to exploit interventional data to acquire the joint conditional distribution of all the variables using the Maximum Entropy principle. To this end, we extend the Causal Maximum Entropy method to make use of interventional data in addition to observational data. Using Lagrange duality, we prove that the solution to the Causal Maximum Entropy problem with interventional constraints lies in the exponential family, as in the Maximum Entropy solution. Our method allows us to perform two tasks of interest when marginal interventional distributions are provided for any subset of the variables. First, we show how to perform causal feature selection from a mixture of observational and single-variable interventional data, and, second, how to infer joint interventional distributions. For the former task, we show on synthetically generated data, that our proposed method outperforms the state-of-the-art method on merging datasets, and yields comparable results to the KCI-test which requires access to joint observations of all variables.", "link": "http://arxiv.org/abs/2409.01794v2", "date": "2026-04-17", "relevancy": 0.8111, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4105}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.4063}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.3998}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Estimating%20Joint%20Interventional%20Distributions%20from%20Marginal%20Interventional%20Data&body=Title%3A%20Estimating%20Joint%20Interventional%20Distributions%20from%20Marginal%20Interventional%20Data%0AAuthor%3A%20Sergio%20Hernan%20Garrido%20Mejia%20and%20Elke%20Kirschbaum%20and%20Armin%20Keki%C4%87%20and%20Bernhard%20Sch%C3%B6lkopf%20and%20Atalanti%20Mastakouri%0AAbstract%3A%20In%20this%20paper%20we%20show%20how%20to%20exploit%20interventional%20data%20to%20acquire%20the%20joint%20conditional%20distribution%20of%20all%20the%20variables%20using%20the%20Maximum%20Entropy%20principle.%20To%20this%20end%2C%20we%20extend%20the%20Causal%20Maximum%20Entropy%20method%20to%20make%20use%20of%20interventional%20data%20in%20addition%20to%20observational%20data.%20Using%20Lagrange%20duality%2C%20we%20prove%20that%20the%20solution%20to%20the%20Causal%20Maximum%20Entropy%20problem%20with%20interventional%20constraints%20lies%20in%20the%20exponential%20family%2C%20as%20in%20the%20Maximum%20Entropy%20solution.%20Our%20method%20allows%20us%20to%20perform%20two%20tasks%20of%20interest%20when%20marginal%20interventional%20distributions%20are%20provided%20for%20any%20subset%20of%20the%20variables.%20First%2C%20we%20show%20how%20to%20perform%20causal%20feature%20selection%20from%20a%20mixture%20of%20observational%20and%20single-variable%20interventional%20data%2C%20and%2C%20second%2C%20how%20to%20infer%20joint%20interventional%20distributions.%20For%20the%20former%20task%2C%20we%20show%20on%20synthetically%20generated%20data%2C%20that%20our%20proposed%20method%20outperforms%20the%20state-of-the-art%20method%20on%20merging%20datasets%2C%20and%20yields%20comparable%20results%20to%20the%20KCI-test%20which%20requires%20access%20to%20joint%20observations%20of%20all%20variables.%0ALink%3A%20http%3A//arxiv.org/abs/2409.01794v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEstimating%2520Joint%2520Interventional%2520D {"title": "Semantic Area Graph Reasoning for Multi-Robot Language-Guided Search", "author": "Ruiyang Wang and Hao-Lun Hsu and Jiwoo Kim and Miroslav Pajic", "abstract": "Coordinating multi-robot systems (MRS) to search in unknown environments is particularly challenging for tasks that require semantic reasoning beyond geometric exploration. Classical coordination strategies rely on frontier coverage or information gain and cannot incorporate high-level task intent, such as searching for objects associated with specific room types. We propose \\textit{Semantic Area Graph Reasoning} (SAGR), a hierarchical framework that enables Large Language Models (LLMs) to coordinate multi-robot exploration and semantic search through a structured semantic-topological abstraction of the environment. SAGR incrementally constructs a semantic area graph from a semantic occupancy map, encoding room instances, connectivity, frontier availability, and robot states into a compact task-relevant representation for LLM reasoning. The LLM performs high-level semantic room assignment based on spatial structure and task context, while deterministic frontier planning and local navigation handle geometric execution within assigned rooms. Experiments on the Habitat-Matterport3D dataset across 100 scenarios show that SAGR remains competitive with state-of-the-art exploration methods while consistently improving semantic target search efficiency, with up to 18.8\\% in large environments. These results highlight the value of structured semantic abstractions as an effective interface between LLM-based reasoning and multi-robot coordination in complex indoor environments.", "link": "http://arxiv.org/abs/2604.16263v1", "date": "2026-04-17", "relevancy": 1.7302, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6543}, {"title": "You've Got to Feel It To Believe It: Multi-Modal {"title": "Towards Universal Convergence of Backward Error in Linear System Solvers", "author": "Micha\u0142 Derezi\u0144ski and Yuji Nakatsukasa and Elizaveta Rebrova", "abstract": "The quest for an algorithm that solves an $n\\times n$ linear system in $O(n^2)$ time complexity, or $O(n^2 \\text{poly}(1/\u03b5))$ when solving up to $\u03b5$ relative error, is a long-standing open problem in numerical linear algebra and theoretical computer science. There are two predominant paradigms for measuring relative error: forward error (i.e., distance from the output to the optimum solution) and backward error (i.e., distance to the nearest problem solved by the output). In most prior studies, convergence of iterative linear system solvers is measured via various notions of forward error, and as a result, depends heavily on the conditioning of the input. Yet, the numerical analysis literature has long advocated for backward error as the more practically relevant notion of approximation. In this work, we show that -- surprisingly -- the classical and simple Richardson iteration incurs at most $1/k$ (relative) backward error after $k$ iterations on any positive semidefinite (PSD) linear system, irrespective of its condition number. This universal convergence rate implies an $O(n^2/\u03b5)$ complexity algorithm for solving a PSD linear system to $\u03b5$ backward error, and we establish similar or better complexity when using a variety of Krylov solvers beyond Richardson. Then, by directly minimizing backward error over a Krylov subspace, we attain an even faster $O(1/k^2)$ universal rate, and we turn this into an efficient algorithm, MINBERR, with complexity $O(n^2/\\sqrt\u03b5)$. We extend this approach via normal equations to solving general linear systems, for which we empirically observe $O(1/k)$ convergence. We report strong numerical performance of our algorithms on benchmark problems.", "link": "http://arxiv.org/abs/2604.16075v1", "date": "2026-04-17", "relevancy": 1.186, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.3971}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.3939}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3924}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Universal%20Convergence%20of%20Backward%20Error%20in%20Linear%20System%20Solvers&body=Title%3A%20Towards%20Universal%20Convergence%20of%20Backward%20Error%20in%20Linear%20System%20Solvers%0AAuthor%3A%20Micha%C5%82%20Derezi%C5%84ski%20and%20Yuji%20Nakatsukasa%20and%20Elizaveta%20Rebrova%0AAbstract%3A%20The%20quest%20for%20an%20algorithm%20that%20solves%20an%20%24n%5Ctimes%20n%24%20linear%20system%20in%20%24O%28n%5E2%29%24%20time%20complexity%2C%20or%20%24O%28n%5E2%20%5Ctext%7Bpoly%7D%281/%CE%B5%29%29%24%20when%20solving%20up%20to%20%24%CE%B5%24%20relative%20error%2C%20is%20a%20long-standing%20open%20problem%20in%20numerical%20linear%20algebra%20and%20theoretical%20computer%20science.%20There%20are%20two%20predominant%20paradigms%20for%20measuring%20relative%20error%3A%20forward%20error%20%28i.e.%2C%20distance%20from%20the%20output%20to%20the%20optimum%20solution%29%20and%20backward%20error%20%28i.e.%2C%20distance%20to%20the%20nearest%20problem%20solved%20by%20the%20output%29.%20In%20most%20prior%20studies%2C%20convergence%20of%20iterative%20linear%20system%20solvers%20is%20measured%20via%20various%20notions%20of%20forward%20error%2C%20and%20as%20a%20result%2C%20depends%20heavily%20on%20the%20conditioning%20of%20the%20input.%20Yet%2C%20the%20numerical%20analysis%20literature%20has%20long%20advocated%20for%20backward%20error%20as%20the%20more%20practically%20relevant%20notion%20of%20approximation.%20In%20this%20work%2C%20we%20show%20that%20--%20surprisingly%20--%20the%20classical%20and%20simple%20Richardson%20iteration%20incurs%20at%20most%20%241/k%24%20%28relative%29%20backward%20error%20after%20%24k%24%20iterations%20on%20any%20positive%20semidefinite%20%28PSD%29%20linear%20system%2C%20irrespective%20of%20its%20condition%20number.%20This%20universal%20convergence%20rate%20implies%20an%20%24O%28n%5E2/%CE%B5%29%24%20complexity%20algorithm%20for%20solving%20a%20PSD%20linear%20system%20to%20%24%CE%B5%24%20backward%20error%2C%20and%20we%20establish%20similar%20or%20better%20complexity%20when%20using%20a%20variety%20of%20Krylov%20solvers%20beyond%20Richardson.%20Then%2C%20by%20directly%20minimizing%20backward%20error%20over%20a%20Krylov%20subspace%2C%20we%20attain%20an%20even%20faster%20%24O%281/k%5E2%29%24%20universal%20rate%2C%20and%20we%20turn%20this%20into%20an%20efficient%20algorithm%2C%20MINBERR%2C%20with%20complexity%20%24O%28n%5E2/%5Csqrt%CE%B5%29%24.%20We%20extend%20this%20approach%20via%20normal%20equations%20to%20solving%20general%20linear%20systems%2C%20for%20which%20we%20empirically%20observe%20%24O%281/k%29%24%20convergence.%20We%20report%20strong%20numerical%20performance%20of%20our%20algorithms%20on%20benchmark%20problems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16075v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Universal%2520Convergence%2520of%2520Backward%2520Error%2520in%2520Linear%2520System%2520Solvers%26entry.906535625%3DMicha%25C5%2582%2520Derezi%25C5%2584ski%2520and%2520Yuji%2520Nakatsukasa%2520and%2520Elizaveta%2520Rebrova%26entry.1292438233%3DThe%2520quest%2520for%2520an%2520algorithm%2520that%2520solves%2520an%2520%2524n%255Ctimes%2520n%2524%2520linear%2520system%2520in%2520%2524O%2528n%255E2%2529%2524%2520time%2520complexity%252C%2520or%2520%2524O%2528n%255E2%2520%255Ctext%257Bpoly%257D%25281/%25CE%25B5%2529%2529%2 {"title": "Towards In-Context Tone Style Transfer with A Large-Scale Triplet Dataset", "author": "Yuhai Deng and Huimin She and Wei Shen and Meng Li and Ruoxi Wu and Lunxi Yuan and Xiang Li", "abstract": "Tone style transfer for photo retouching aims to adapt the stylistic tone of the reference image to a given content image. However, the lack of high-quality large-scale triplet datasets with stylized ground truth forces existing methods to rely on self-supervised or proxy objectives, which limits model capability. To mitigate this gap, we design a data construction pipeline to build TST100K, a large-scale dataset of 100,000 content-reference-stylized triplets. At the core of this pipeline, we train a tone style scorer to ensure strict stylistic consistency for each triplet. In addition, existing methods typically extract content and reference features independently and then fuse them in a decoder, which may cause semantic loss and lead to inappropriate color transfer and degraded visual aesthetics. Instead, we propose ICTone, a diffusion-based framework that performs tone transfer in an in-context manner by jointly conditioning on both images, leveraging the semantic priors of generative models for semantic-aware transfer. Reward feedback learning using the tone style scorer is further incorporated to improve stylistic fidelity and visual quality. Experiments demonstrate the effectiveness of TST100K, and ICTone achieves state-of-the-art performance on both quantitative metrics and human evaluations.", "link": "http://arxiv.org/abs/2604.16114v1", "date": "2026-04-17", "relevancy": 1.5148, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5128}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5044}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4985}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20In-Context%20Tone%20Style%20Transfer%20with%20A%20Large-Scale%20Triplet%20Dataset&body=Title%3A%20Towards%20In-Context%20Tone%20Style%20Transfer%20with%20A%20Large-Scale%20Triplet%20Dataset%0AAuthor%3A%20Yuhai%20Deng%20and%20Huimin%20She%20and%20Wei%20Shen%20and%20Meng%20Li%20and%20Ruoxi%20Wu%20and%20Lunxi%20Yuan%20and%20Xiang%20Li%0AAbstract%3A%20Tone%20style%20transfer%20for%20photo%20retouching%20aims%20to%20adapt%20the%20stylistic%20tone%20of%20the%20reference%20image%20to%20a%20given%20content%20image.%20However%2C%20the%20lack%20of%20high-quality%20large-scale%20triplet%20datasets%20with%20stylized%20ground%20truth%20forces%20existing%20methods%20to%20rely%20on%20self-supervised%20or%20proxy%20objectives%2C%20which%20limits%20model%20capability.%20To%20mitigate%20this%20gap%2C%20we%20design%20a%20data%20construction%20pipeline%20to%20build%20TST100K%2C%20a%20large-scale%20dataset%20of%20100%2C000%20content-reference-stylized%20triplets.%20At%20the%20core%20of%20this%20pipeline%2C%20we%20train%20a%20tone%20style%20scorer%20to%20ensure%20strict%20stylistic%20consistency%20for%20each%20triplet.%20In%20addition%2C%20existing%20methods%20typically%20extract%20content%20and%20reference%20features%20independently%20and%20then%20fuse%20them%20in%20a%20decoder%2C%20which%20may%20cause%20semantic%20loss%20and%20lead%20to%20inappropriate%20color%20transfer%20and%20degraded%20visual%20aesthetics.%20Instead%2C%20we%20propose%20ICTone%2C%20a%20diffusion-based%20framework%20that%20performs%20tone%20transfer%20in%20an%20in-context%20manner%20by%20jointly%20conditioning%20on%20both%20images%2C%20leveraging%20the%20semantic%20priors%20of%20generative%20models%20for%20semantic-aware%20transfer.%20Reward%20feedback%20learning%20using%20the%20tone%20style%20scorer%20is%20further%20incorporated%20to%20improve%20stylistic%20fidelity%20and%20visual%20quality.%20Experiments%20demonstrate%20the%20effectiveness%20of%20TST100K%2C%20and%20ICTone%20achieves%20state-of-the-art%20performance%20on%20both%20quantitative%20metrics%20and%20human%20evaluations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520In-Context%2520Tone%2520Style%2520Transfer%2520with%2520A%2520Large-Scale%2520Triplet%2520Dataset%26entry.906535625%3DYuhai%2520Deng%2520and%2520Huimin%2520She%2520and%2520Wei%2520Shen%2520and%2520Meng%2520Li%2520and%2520Ruoxi%2520Wu%2520and%2520Lunxi%2520Yuan%2520and%2520Xiang%2520Li%26entry.1292438233%3DTone%2520style%2520transfer%2520for%2520photo%2520retouching%2520aims%2520to%2520adapt%2520the%2520stylistic%2520tone%2520of%2520the%2520reference%2520image%2520to%2520a%2520given%2520content%2520image.%2520However%252C%2520the%2520lack%2520of%2520high-quality%2520large-scale%2520triplet%2520datasets%2520with%2520stylized%2520ground%2520truth%2520forces%2520existing%2520methods%2520to%2520rely%2520on%2520self-supervised%2520or%2520proxy%2520objectives%252C%2520which%2520limits%2520model%2520capability.%2520To%2520mitigate%2520this%2520gap%252C%2520we%2520design%2520a%2520data%2520construction%2520pipeline%2520to%2520build%2520TST100K%252C%2520a%2520large-scale%2520dataset%2520of%2520100%252C000%2520content-reference-stylized%2520triplets.%2520At%2520the%2520core%2520of%2520this%2520pipeline%252C%2520we%2520train%2520a%2520tone%2520style%2520scorer%2520to%2520ensure%2520strict%2520stylistic%2520consistency%2520for%2520each%2520triplet.%2520In%2520addition%252C%2520existing%2520methods%2520typically%2520extract%2520content%2520and%2520reference%2520features%2520independently%2520and%2520then%2520fuse%2520them%2520in%2520a%2520decoder%252C%2520which%2520may%2520cause%2520semantic%2520loss%2520and%2520lead%2520to%2520inappropriate%2520color%252

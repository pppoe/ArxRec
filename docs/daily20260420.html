%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08809v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Structural%20Evaluation%20Metrics%20for%20SVG%20Generation%20via%20Leave-One-Out%20Analysis&entry.906535625=Haonan%20Zhu%20and%20Adrienne%20Deganutti%20and%20Elad%20Hirsch%20and%20Purvanshi%20Mehta&entry.1292438233=SVG%20generation%20is%20typically%20evaluated%20by%20comparing%20rendered%20outputs%20to%20reference%20images%2C%20which%20captures%20visual%20similarity%20but%20not%20the%20structural%20properties%20that%20make%20SVG%20editable%2C%20decomposable%2C%20and%20reusable.%20Inspired%20by%20the%20classical%20jackknife%2C%20we%20introduce%20element-level%20leave-one-out%20%28LOO%29%20analysis.%20The%20procedure%20renders%20the%20SVG%20with%20and%20without%20each%20element%2C%20which%20yields%20element-level%20signals%20for%20quality%20assessment%20and%20structural%20analysis.%20From%20this%20single%20mechanism%2C%20we%20derive%20%28i%29%20per-element%20quality%20scores%20that%20enable%20zero-shot%20artifact%20detection%3B%20%28ii%29%20element-concept%20attribution%20via%20LOO%20footprints%20crossed%20with%20VLM-grounded%20concept%20heatmaps%3B%20and%20%28iii%29%20four%20structural%20metrics%3A%20purity%2C%20coverage%2C%20compactness%2C%20and%20locality%2C%20which%20quantify%20SVG%20modularity%20from%20complementary%20angles.%20These%20metrics%20extend%20SVG%20evaluation%20from%20image%20similarity%20to%20code%20structure%2C%20enabling%20element-level%20diagnosis%20and%20comparison%20of%20how%20visual%20concepts%20are%20represented%2C%20partitioned%2C%20and%20organized%20within%20SVG%20code.%20Their%20practical%20relevance%20is%20validated%20on%20over%2019%2C000%20edits%20%285%20types%29%20across%205%20generation%20systems%20and%203%20complexity%20tiers.&entry.1838667208=http%3A//arxiv.org/abs/2604.08809v2&entry.124074799=Read"},
{"title": "Find, Fix, Reason: Context Repair for Video Reasoning", "author": "Haojian Huang and Chuanyu Qin and Yinchuan Li and Yingcong Chen", "abstract": "Reinforcement learning has advanced video reasoning in large multi-modal models, yet dominant pipelines either rely on on-policy self-exploration, which plateaus at the model's knowledge boundary, or hybrid replay that mixes policies and demands careful regularization. Dynamic context methods zoom into focused evidence but often require curated pretraining and two-stage tuning, and their context remains bounded by a small model's capability. In contrast, larger models excel at instruction following and multi-modal understanding, can supply richer context to smaller models, and rapidly zoom in on target regions via simple tools. Building on this capability, we introduce an observation-level intervention: a frozen, tool-integrated teacher identifies the missing spatiotemporal dependency and provides a minimal evidence patch (e.g., timestamps, regions etc.) from the original video while the question remains unchanged. The student answers again with the added context, and training updates with a chosen-rollout scheme integrated into Group Relative Policy Optimization (GRPO). We further propose a Robust Improvement Reward (RIR) that aligns optimization with two goals: outcome validity through correct answers and dependency alignment through rationales that reflect the cited evidence. Advantages are group-normalized across the batch, preserving on-policy exploration while directing it along causally meaningful directions with minimal changes to the training stack. Experiments on various related benchmarks show consistent accuracy gains and strong generalization. Web page and source code will be available at https://github.com/JethroJames/FFR.git.", "link": "http://arxiv.org/abs/2604.16243v1", "date": "2026-04-17", "relevancy": 2.1169, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5475}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Find%2C%20Fix%2C%20Reason%3A%20Context%20Repair%20for%20Video%20Reasoning&body=Title%3A%20Find%2C%20Fix%2C%20Reason%3A%20Context%20Repair%20for%20Video%20Reasoning%0AAuthor%3A%20Haojian%20Huang%20and%20Chuanyu%20Qin%20and%20Yinchuan%20Li%20and%20Yingcong%20Chen%0AAbstract%3A%20Reinforcement%20learning%20has%20advanced%20video%20reasoning%20in%20large%20multi-modal%20models%2C%20yet%20dominant%20pipelines%20either%20rely%20on%20on-policy%20self-exploration%2C%20which%20plateaus%20at%20the%20model%27s%20knowledge%20boundary%2C%20or%20hybrid%20replay%20that%20mixes%20policies%20and%20demands%20careful%20regularization.%20Dynamic%20context%20methods%20zoom%20into%20focused%20evidence%20but%20often%20require%20curated%20pretraining%20and%20two-stage%20tuning%2C%20and%20their%20context%20remains%20bounded%20by%20a%20small%20model%27s%20capability.%20In%20contrast%2C%20larger%20models%20excel%20at%20instruction%20following%20and%20multi-modal%20understanding%2C%20can%20supply%20richer%20context%20to%20smaller%20models%2C%20and%20rapidly%20zoom%20in%20on%20target%20regions%20via%20simple%20tools.%20Building%20on%20this%20capability%2C%20we%20introduce%20an%20observation-level%20intervention%3A%20a%20frozen%2C%20tool-integrated%20teacher%20identifies%20the%20missing%20spatiotemporal%20dependency%20and%20provides%20a%20minimal%20evidence%20patch%20%28e.g.%2C%20timestamps%2C%20regions%20etc.%29%20from%20the%20original%20video%20while%20the%20question%20remains%20unchanged.%20The%20student%20answers%20again%20with%20the%20added%20context%2C%20and%20training%20updates%20with%20a%20chosen-rollout%20scheme%20integrated%20into%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29.%20We%20further%20propose%20a%20Robust%20Improvement%20Reward%20%28RIR%29%20that%20aligns%20optimization%20with%20two%20goals%3A%20outcome%20validity%20through%20correct%20answers%20and%20dependency%20alignment%20through%20rationales%20that%20reflect%20the%20cited%20evidence.%20Advantages%20are%20group-normalized%20across%20the%20batch%2C%20preserving%20on-policy%20exploration%20while%20directing%20it%20along%20causally%20meaningful%20directions%20with%20minimal%20changes%20to%20the%20training%20stack.%20Experiments%20on%20various%20related%20benchmarks%20show%20consistent%20accuracy%20gains%20and%20strong%20generalization.%20Web%20page%20and%20source%20code%20will%20be%20available%20at%20https%3A//github.com/JethroJames/FFR.git.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16243v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFind%252C%2520Fix%252C%2520Reason%253A%2520Context%2520Repair%2520for%2520Video%2520Reasoning%26entry.906535625%3DHaojian%2520Huang%2520and%2520Chuanyu%2520Qin%2520and%2520Yinchuan%2520Li%2520and%2520Yingcong%2520Chen%26entry.1292438233%3DReinforcement%2520learning%2520has%2520advanced%2520video%2520reasoning%2520in%2520large%2520multi-modal%2520models%252C%2520yet%2520dominant%2520pipelines%2520either%2520rely%2520on%2520on-policy%2520self-exploration%252C%2520which%2520plateaus%2520at%2520the%2520model%2527s%2520knowledge%2520boundary%252C%2520or%2520hybrid%2520replay%2520that%2520mixes%2520policies%2520and%2520demands%2520careful%2520regularization.%2520Dynamic%2520context%2520methods%2520zoom%2520into%2520focused%2520evidence%2520but%2520often%2520require%2520curated%2520pretraining%2520and%2520two-stage%2520tuning%252C%2520and%2520their%2520context%2520remains%2520bou {"title": "Synthetic data in cryptocurrencies using generative models", "author": "Andr\u00e9 Saimon S. Sousa and Otto Pires and Frank Acasiete and Oscar M. Granados and Val\u00e9ria Loureiro da Silva and Hugo Saba", "abstract": "Data plays a fundamental role in consolidating markets, services, and products in the digital financial ecosystem. However, the use of real data, especially in the financial context, can lead to privacy risks and access restrictions, affecting institutions, research, and modeling processes. Although not all financial datasets present such limitations, this work proposes the use of deep learning techniques for generating synthetic data applied to cryptocurrency price time series. The approach is based on Conditional Generative Adversarial Networks (CGANs), combining an LSTM-type recurrent generator and an MLP discriminator to produce statistically consistent synthetic data. The experiments consider different crypto-assets and demonstrate that the model is capable of reproducing relevant temporal patterns, preserving market trends and dynamics. The generation of synthetic series through GANs is an efficient alternative for simulating financial data, showing potential for applications such as market behavior analysis and anomaly detection, with lower computational cost compared to more complex generative approaches.", "link": "http://arxiv.org/abs/2604.16182v1", "date": "2026-04-17", "relevancy": 2.1156, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5416}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5224}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5188}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Synthetic%20data%20in%20cryptocurrencies%20using%20generative%20models&body=Title%3A%20Synthetic%20data%20in%20cryptocurrencies%20using%20generative%20models%0AAuthor%3A%20Andr%C3%A9%20Saimon%20S.%20Sousa%20and%20Otto%20Pires%20and%20Frank%20Acasiete%20and%20Oscar%20M.%20Granados%20and%20Val%C3%A9ria%20Loureiro%20da%20Silva%20and%20Hugo%20Saba%0AAbstract%3A%20Data%20plays%20a%20fundamental%20role%20in%20consolidating%20markets%2C%20services%2C%20and%20products%20in%20the%20digital%20financial%20ecosystem.%20However%2C%20the%20use%20of%20real%20data%2C%20especially%20in%20the%20financial%20context%2C%20can%20lead%20to%20privacy%20risks%20and%20access%20restrictions%2C%20affecting%20institutions%2C%20research%2C%20and%20modeling%20processes.%20Although%20not%20all%20financial%20datasets%20present%20such%20limitations%2C%20this%20work%20proposes%20the%20use%20of%20deep%20learning%20techniques%20for%20generating%20synthetic%20data%20applied%20to%20cryptocurrency%20price%20time%20series.%20The%20approach%20is%20based%20on%20Conditional%20Generative%20Adversarial%20Networks%20%28CGANs%29%2C%20combining%20an%20LSTM-type%20recurrent%20generator%20and%20an%20MLP%20discriminator%20to%20produce%20statistically%20consistent%20synthetic%20data.%20The%20experiments%20consider%20different%20crypto-assets%20and%20demonstrate%20that%20the%20model%20is%20capable%20of%20reproducing%20relevant%20temporal%20patterns%2C%20preserving%20market%20trends%20and%20dynamics.%20The%20generation%20of%20synthetic%20series%20through%20GANs%20is%20an%20efficient%20alternative%20for%20simulating%20financial%20data%2C%20showing%20potential%20for%20applications%20such%20as%20market%20behavior%20analysis%20and%20anomaly%20detection%2C%20with%20lower%20computational%20cost%20compared%20to%20more%20complex%20generative%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16182v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSynthetic%2520data%2520in {"title": "Geometric regularization of autoencoders via observed stochastic dynamics", "author": "Sean Hill and Felix X. -F. Ye", "abstract": "Stochastic dynamical systems with slow or metastable behavior evolve, on long time scales, on an unknown low-dimensional manifold in high-dimensional ambient space. Building a reduced simulator from short-burst ambient ensembles is a long-standing problem: local-chart methods like ATLAS suffer from exponential landmark scaling and per-step reprojection, while autoencoder alternatives leave tangent-bundle geometry poorly constrained, and the errors propagate into the learned drift and diffusion. We observe that the ambient covariance~$\u039b$ already encodes coordinate-invariant tangent-space information, its range spanning the tangent bundle. Using this, we construct a tangent-bundle penalty and an inverse-consistency penalty for a three-stage pipeline (chart learning, latent drift, latent diffusion) that learns a single nonlinear chart and the latent SDE. The penalties induce a function-space metric, the $\u03c1$-metric, strictly weaker than the Sobolev $H^1$ norm yet achieving the same chart-quality generalization rate up to logarithmic factors. For the drift, we derive an encoder-pullback target via It\u00f4's formula on the learned encoder and prove a bias decomposition showing the standard decoder-side formula carries systematic error for any imperfect chart. Under a $W^{2,\\infty}$ chart-convergence assumption, chart-level error propagates controllably to weak convergence of the ambient dynamics and to convergence of radial mean first-passage times. Experiments on four surfaces embedded in up to $201$ ambient dimensions reduce radial MFPT error by $50$--$70\\%$ under rotation dynamics and achieve the lowest inter-well MFPT error on most surface--transition pairs under metastable M\u00fcller--Brown Langevin dynamics, while reducing end-to-end ambient coefficient errors by up to an order of magnitude relative to an unregularized autoencoder.", "link": "http://arxiv.org/abs/2604.16282v1", "date": "2026-04-17", "relevancy": 2.1112, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5308}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5272}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.525}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geometric%20regularization%20of%20autoencoders%20via%20observed%20stochastic%20dynamics&body=Title%3A%20Geometric%20regularization%20of%20autoencoders%20via%20observed%20stochastic%20dynamics%0AAuthor%3A%20Sean%20Hill%20and%20Felix%20X.%20-F.%20Ye%0AAbstract%3A%20Stochastic%20dynamical%20systems%20with%20slow%20or%20metastable%20behavior%20evolve%2C%20on%20long%20time%20scales%2C%20on%20an%20unknown%20low-dimensional%20manifold%20in%20high-dimensional%20ambient%20space.%20Building%20a%20reduced%20simulator%20from%20short-burst%20ambient%20ensembles%20is%20a%20long-standing%20problem%3A%20local-chart%20methods%20like%20ATLAS%20suffer%20from%20exponential%20landmark%20scaling%20and%20per-step%20reprojection%2C%20while%20autoencoder%20alternatives%20leave%20tangent-bundle%20geometry%20poorly%20constrained%2C%20and%20the%20errors%20propagate%20into%20the%20learned%20drift%20and%20diffusion.%20We%20observe%20that%20the%20ambient%20covariance~%24%CE%9B%24%20already%20encodes%20coordinate-invariant%20tangent-space%20information%2C%20its%20range%20spanning%20the%20tangent%20bundle.%20Using%20this%2C%20we%20construct%20a%20tangent-bundle%20penalty%20and%20an%20inverse-consistency%20penalty%20for%20a%20three-stage%20pipeline%20%28chart%20learning%2C%20latent%20drift%2C%20latent%20diffusion%29%20that%20learns%20a%20single%20n {"title": "OT on the Map: Quantifying Domain Shifts in Geographic Space", "author": "Haoran Zhang and Livia Betti and Konstantin Klemmer and Esther Rolf and David Alvarez-Melis", "abstract": "In computer vision and machine learning for geographic data, out-of-domain generalization is a pervasive challenge, arising from uneven global data coverage and distribution shifts across geographic regions. Though models are frequently trained in one region and deployed in another, there is no principled method for determining when this cross-region adaptation will be successful. A well-defined notion of distance between distributions can effectively quantify how different a new target domain is compared to the domains used for model training, which in turn could support model training and deployment decisions. In this paper, we propose a strategy for computing distances between geospatial domains that leverages geographic information with Optimal Transport methods (GeoSpOT). In our experiments, GeoSpOT distances emerge as effective predictors of cross-domain transfer difficulty. We further demonstrate that embeddings from pretrained location encoders provide information comparable to image/text embeddings, despite relying solely on longitude-latitude pairs as input. This allows users to get an approximation of out-of-domain performance for geospatial models, even when the exact downstream task is unknown, or no task-specific data is available. Building on these findings, we show that GeoSpOT distances can preemptively guide data selection and enable predictive tools to analyze regions where a model is likely to underperform.", "link": "http://arxiv.org/abs/2604.16220v1", "date": "2026-04-17", "relevancy": 2.1018, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5385}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Per ude-latitude%20pairs%20as%20input.%20This%20allows%20users%20to%20get%20an%20approximation%20of%20out-of-domain%20performance%20for%20geospatial%20models%2C%20even%20when%20the%20exact%20downstream%20task%20is%20unknown%2C%20or%20no%20task-specific%20data%20is%20available.%20Building%20on%20these%20findings%2C%20we%20show%20that%20GeoSpOT%20distances%20can%20preemptively%20guide%20data%20selection%20and%20enable%20predictive%20tools%20to%20analyze%20regions%20where%20a%20model%20is%20likely%20to%20underperform.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16220v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOT%2520on%2520the%2520Map%253A%2520Quantifying%2520Domain%2520Shifts%2520in%2520Geographic%2520Space%26entry.906535625%3DHaoran%2520Zhang%2520and%2520Livia%2520Betti%2520and%2520Konstantin%2520Klemmer%2520and%2520Esther%2520Rolf%2520and%2520David%2520Alvarez-Melis%26entry.1292438233%3DIn%2520computer%2520vision%2520and%2520machine%2520learning%2520for%2520geographic%2520data%252C%2520out-of-domain%2520generalization%2520is%2520a%2520pervasive%2520challenge%252C%2520arising%2520from%2520uneven%2520global%2520data%2520coverage%2520and%2520distribution%2520shifts%2520across%2520geographic%2520regions.%2520Though%2520models%2520are%2520frequently%2520trained%2520in%2520one%2520region%2520and%2520deployed%2520in%2520another%252C%2520there%2520is%2520no%2520principled%2520method%2520for%2520determining%2520when%2520this%2520cross-region%2520adaptation%2520will%2520be%2520successful.%2520A%2520well-defined%2520notion%2520of%2520distance%2520between%2520distributions%2520can%2520effectively%2520quantify%2520how%2520different%2520a%2520new%2520target%2520domain%2520is%2520compared%2520to%2520the%2520domains%2520used%2520for%2520model%2520training%252C%2520which%2520in%2520turn%2520could%2520support%2520model%2520training%2520and%2520deployment%2520decisions.%2520In%2520this%2520paper%252C {"title": "Cross-modal learning for plankton recognition", "author": "Joona Kareinen and Veikka Immonen and Tuomas Eerola and Lumi Haraguchi and Lasse Lensu and Kaisa Kraft and Sanna Suikkanen and Heikki K\u00e4lvi\u00e4inen", "abstract": "This paper considers self-supervised cross-modal coordination as a strategy enabling utilization of multiple modalities and large volumes of unlabeled plankton data to build models for plankton recognition. Automated imaging instruments facilitate the continuous collection of plankton image data on a large scale. Current methods for automatic plankton image recognition rely primarily on supervised approaches, which require labeled training sets that are labor-intensive to collect. On the other hand, some modern plankton imaging instruments complement image information with optical measurement data, such as scatter and fluorescence profiles, which currently are not widely utilized in plankton recognition. In this work, we explore the possibility of using such measurement data to guide the learning process without requiring manual labeling. Inspired by the concepts behind Contrastive Language-Image Pre-training, we train encoders for both modalities using only binary supervisory information indicating whether a given image and profile originate from the same particle or from different particles. For plankton recognition, we employ a small labeled gallery of known plankton species combined with a $k$-NN classifier. This approach yields a recognition model that is inherently multimodal, i.e., capable of utilizing information extracted from both image and profile data. We demonstrate that the proposed method achieves high recognition accuracy while requiring only a minimal number of labeled images. Furthermore, we show that the approach outperforms an image-only self-supervised baseline. Code available at https://github.com/Jookare/cross-modal-plankton.", "link": "http://arxiv.org/abs/2603.16427v2", "date": "2026-04-17", "relevancy": 2.0956, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5415}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.518}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4948}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-modal%20learning%20for%20plankton%20recognition&body=Title%3A%20Cross-modal%20learning%20for%20plankton%20recognition%0AAuthor%3A%20Joona%20Kareinen%20and%20Veikka%20Immonen%20and%20Tuomas%20Eerola%20and%20Lumi%20Haraguchi%20and%20Lasse%20Lensu%20and%20Kaisa%20Kraft%20and%20Sanna%20Suikkanen%20and%20Heikki%20K%C3%A4lvi%C3%A4inen%0AAbstract%3A%20This%20paper%20considers%20self-supervised%20cross-modal%20coordination%20as%20a%20strategy%20enabling%20utilization%20of%20multiple%20modalities%20and%20large%20volumes%20of%20unlabeled%20plankton%20data%20to%20build%20models%20for%20plankton%20recognition.%20Automated%20imaging%20instruments%20facilitate%20the%20continuous%20collection%20of%20plankton%20image%20data%20on%20a%20large%20scale.%20Current%20methods%20for%20automatic%20plankton%20image%20recognition%20rely%20primarily%20on%20supervised%20approaches%2C%20which%20require%20labeled%20training%20sets%20that%20are%20labor-intensive%20to%20collect.%20On%20the%20other%20hand%2C%20some%20modern%20plankton%20imaging%20instruments%20complement%20image%20information%20with%20optical%20measurement%20data%2C%20such%20as%20scatter%20and%20fluorescence%20profiles%2C%20which%20currently%20are%20not%20widely%20utilized%20in%20plankton%20recognition.%20In%20this%20work%2C%20we%20explore%20the%20possibility%20of%20using%20such%20measurement%20data%20to%20guide%20the%20learning%20process%20without%20requiring%20manual%20labeling.%20Inspired%20by%20the%20concepts%20behind%20Contrastive%20Language-Image%20Pre-training%2C%20we%20train%20encoders%20for%20both%20modalities%20using%20only%20binary%20supervisory%20information%20indicating%20whether%20a%20given%20image%20and%20profile%20originate%20from%20the%20same%20particle%20or%20from%20different%20particles.%20For%20plankton%20recognition%2C%20we%20employ%20a%20small%20labeled%20gallery%20of%20known%20plankton%20species%20combined%20with%20a%20%24k%24-NN%20classifier.%20This%20approach%20yields%20a%20recognition%20model%20that%20is%20inherently%20multimodal%2C%20i.e.%2C%20capable%20of%20utilizing%20information%20extracted%20from%20both%20image%20and%20profile%20data.%20We%20demonstrate%20that%20the%20proposed%20method%20achieves%20high%20recognition%20accuracy%20while%20requiring%20only%20a%20minimal%20number%20of%20labeled%20images.%20Furthermore%2C%20we%20show%20that%20the%20approach%20outperforms%20an%20image-only%20self-supervised%20baseline.%20Code%20available%20at%20https%3A//github.com/Jookare/cross-modal-plankton.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16427v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-modal%2520learning%2520for%2520plankton%2520recognition%26entry.906535625%3DJoona%2520Kareinen%2520and%2520Veikka%2520Immonen%2520and%2520Tuomas%2520Eerola%2520and%2520Lumi%2520Haraguchi%2520and%2520Lasse%2520Lensu%2520and%2520Kaisa%2520Kraft%2520and%2520Sanna%2520Suikkanen%2520and%2520Heikki%2520K%25C3%25A4lvi%25C3%25A4inen%26entry.1292438233%3DThis%2520paper%2520considers%2520self-supervised%2520cross-modal%2520coordination%2520as%2520a%2520strategy%2520enabling%2520utilization%2520of%2520multiple%2520modalities%2520and%2520large%2520volumes%2520of%2520unlabeled%2520plankton%2520data%2520to%2520build%2520models%2520for%2520plankton%2520recognition.%2520Automated%2520imaging%2520instruments%2520facilitate%2520the%2520continuous%2520collection%2520of%2520plankton%2520image%2520data%2520on%2520a%2520large%2520scale.%2520Current%2520methods%2520for%2520automatic%2520plankton%2520image%2520recognition%2520rely%2520primarily%2520on%2520supervised%2520approaches%252C%2520which%2520require%2520labeled%2520training%2520sets%2520that%2520are%2520labor-intensive%2520to%2520collect.%2520On%2520the%2520other%2520hand%252C%2520some%2520modern%2520plankton%2520imaging%2520instruments%2520complement%2520image%2520information%2520with%2520optical%2520measurement%2520data%252C%2520such%2520as%2520scatter%2520and%2520fluorescence%2520profiles%252C%2520which%2520currently%2520are%2520not%2520widely%2520utilized%2520in%2520plankton%2520recognition.%2520In%2520this%2520work%252C%2520we%2520explore%2520the%2520possibility%2520of%2520using%2520such%2520measurement%2520data%2520to%2520guide%2520the%2520learning%2520process%2520without%2520requiring%2520manual%2520labeling.%2520Inspired%2520by%2520the%2520concepts%2520behind%2520Contrastive%2520Language-Image%2520Pre-training%252C%2520we%2520train%2520encoders%2520for%2520both%2520modalities%2520using%2520only%2520binary%2520supervisory%2520information%2520indicating%2520whether%2520a%2520given%2520image%2520and%2520profile%2520originate%2520from%2520the%2520same%2520particle%2520or%2520from%2520different%2520particles.%2520For%2520plankton%2520recognition%252C%2520we%2520employ%2520a%2520small%2520labeled%2520gallery%2520of%2520known%2520plankton%2520species%2520combined%2520with%2520a%2520%2524k%2524-NN%2520classifier.%2520This%2520approach%2520yields%2520a%2520recognition%2520model%2520that%2520is%2520inherently%2520multimodal%252C%2520i.e.%252C%2520capable%2520of%2520utilizing%2520information%2520extracted%2520from%2520both%2520image%2520and%2520profile%2520data.%2520We%2520demonstrate%2520that%2520the%2520proposed%2520method%2520achieves%2520high%2520recognition%2520accuracy%2520while%2520requiring%2520only%2520a%2520minimal%2520number%2520of%2520labeled%2520im {"title": "Designing Synthetic Discussion Generation Systems: A Case Study for Online Facilitation", "author": "Dimitris Tsirmpas and Ion Androutsopoulos and John Pavlopoulos", "abstract": "A critical challenge in social science research is the high cost associated with experiments involving human participants. We identify Synthetic Discussion Generation (SDG), a novel Natural Language Processing (NLP) direction aimed at creating simulated discussions that enable cost-effective pilot experiments and develop a theoretical, task-agnostic framework for designing, evaluating, and implementing these simulations. We argue that the use of proprietary models such as the OpenAI GPT family for such experiments is often unjustified in terms of both cost and capability, despite its prevalence in current research. Our experiments demonstrate that smaller quantized models (7B-8B) can produce effective simulations at a cost more than 44 times lower compared to their proprietary counterparts. We use our framework in the context of online facilitation, where humans actively engage in discussions to improve them, unlike more conventional content moderation. By treating this problem as a downstream task for our framework, we show that synthetic simulations can yield generalizable results at least by revealing limitations before engaging human discussants. In LLM facilitators, a critical limitation is that they are unable to determine when to intervene in a discussion, leading to undesirable frequent interventions and, consequently, derailment patterns similar to those observed in human interactions. Additionally, we find that different facilitation strategies influence conversational dynamics to some extent. Beyond our theoretical SDG framework, we also present a cost-comparison methodology for experimental design, an exploration of available models and algorithms, an open-source Python framework, and a large, publicly available dataset of LLM-generated discussions across multiple models.", "link": "http://arxiv.org/abs/2503.16505v4", "date": "2026-04-17", "relevancy": 2.0932, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5427}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.51}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5079}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Designing%20Synthetic%20Discussion%20Generation%20Systems%3A%20A%20Case%20Study%20for%20Online%20Facilitation&body=Title%3A%20Designing%20Synthetic%20Discussion%20Generation%20Systems%3A%20A%20Case%20Study%20for%20Online%20Facilitation%0AAuthor%3A%20Dimitris%20Tsirmpas%20and%20Ion%20Androutsopoulos%20and%20John%20Pavlopoulos%0AAbstract%3A%20A%20critical%20challenge%20in%20social%20science%20research%20is%20the%20high%20cost%20associated%20with%20experiments%20involving%20human%20participants.%20We%20identify%20Synthetic%20Discussion%20Generation%20%28SDG%29%2C%20a%20novel%20Natural%20Language%20Processing%20%28NLP%29%20direction%20aimed%20at%20creating%20simulated%20discussions%20that%20enable%20cost-effective%20pilot%20experiments%20and%20develop%20a%20theoretical%2C%20task-agnostic%20framework%20for%20designing%2C%20evaluating%2C%20and%20implementing%20these%20simulations.%20We%20argue%20that%20the%20use%20of%20proprietary%20models%20such%20as%20the%20OpenAI%20GPT%20family%20for%20such%20experiments%20is%20often%20unjustified%20in%20terms%20of%20both%20cost%20and%20capability%2C%20despite%20its%20prevalence%20in%20current%20research.%20Our%20experiments%20demonstrate%20that%20smaller%20quantized%20models%20%287B-8B%29%20can%20produce%20effective%20simulations%20at%20a%20cost%20more%20than%2044%20times%20lower%20compared%20to%20their%20proprietary%20counterparts.%20We%20use%20our%20framework%20in%20the%20context%20of%20online%20facilitation%2C%20where%20humans%20actively%20engage%20in%20discussions%20to%20improve%20them%2C%20unlike%20more%20conventional%20content%20moderation.%20By%20treating%20this%20problem%20as%20a%20downstream%20task%20for%20our%20framework%2C%20we%20show%20that%20synthetic%20simulations%20can%20yield%20generalizable%20results%20at%20least%20by%20revealing%20limitations%20before%20engaging%20human%20discussants.%20In%20LLM%20facilitators%2C%20a%20critical%20limitation%20is%20that%20they%20are%20unable%20to%20determine%20when%20to%20intervene%20in%20a%20discussion%2C%20leading%20to%20undesirable%20frequent%20interventions%20and%2C%20consequently%2C%20derailment%20patterns%20similar%20to%20those%20observed%20in%20human%20interactions.%20Additionally%2C%20we%20find%20that%20different%20facilitation%20strategies%20influence%20conversational%20dynamics%20to%20some%20extent.%20Beyond%20our%20theoretical%20SDG%20framework%2C%20we%20also%20present%20a%20cost-comparison%20methodology%20for%20experimental%20design%2C%20an%20exploration%20of%20available%20models%20and%20algorithms%2C%20an%20open-source%20Python%20framework%2C%20and%20a%20large%2C%20publicly%20available%20dataset%20of%20LLM-generated%20discussions%20across%20multiple%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2503.16505v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDesigning%2520Synthetic%2520Discussion%2520Generation%2520Systems%253A%2520A%2520Case%2520Study%2520for%2520Online%2520Facilitation%26entry.906535625%3DDimitris%2520Tsirmpas%2520and%2520Ion%2520Androutsopoulos%2520and%2520John%2520Pavlopoulos%26entry.1292438233%3DA%2520critical%2520challenge%2520in%2520social%2520science%2520research%2520is%2520the%2520high%2520cost%2520associated%2520with%2520experiments%2520involving%2520human%2520participants.%2520We%2520identi {"title": "Angle-based Localization and Rigidity Maintenance Control for Multi-Robot Networks", "author": "J. Francisco Presenza and Leonardo J. Colombo and Juan I. Giribet and Ignacio Mas", "abstract": "In this work, we study angle-based localization and rigidity maintenance control for multi-robot networks. First, we establish the relationship between angle rigidity and bearing rigidity considering \\textit{directed} sensing graphs and \\textit{body-frame} bearing measurements in both $2$ and $3$-\\textit{dimensional space}. In particular, we demonstrate that a framework in $\\mathrm{SE}(d)$ is infinitesimally bearing rigid if and only if it is infinitesimally angle rigid and each robot obtains at least $d-1$ bearing measurements ($d \\in \\{2, 3\\}$). Building on these findings, this paper proposes a distributed angle-based localization scheme and establishes local exponential stability under switching sensing graphs, requiring only infinitesimal angle rigidity across the visited topologies. Then, since the set of available angles strongly depends on the robots' spatial configuration due to sensing constraints, we investigate rigidity maintenance control. The \\textit{angle rigidity eigenvalue} is presented as a metric for the degree of rigidity. A decentralized gradient-based controller capable of executing mission-specific commands while maintaining a sufficient level of angle rigidity is proposed. Simulations were conducted to evaluate the scheme's effectiveness and practicality.", "link": "http://arxiv.org/abs/2604.11754v2", "date": "2026-04-17", "relevancy": 2.0928, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5579}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5228}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5097}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Angle-based%20Localization%20and%20Rigidity%20Maintenance%20Control%20for%20Multi-Robot%20Networks&body=Title%3A%20Angle-based%20Localization%20and%20Rigidity%20Maintenance%20Control%20for%20Multi-Robot%20Networks%0AAuthor%3A%20J.%20Francisco%20Presenza%20and%20Leonardo%20J.%20Colombo%20and%20Juan%20I.%20Giribet%20and%20Ignacio%20Mas%0AAbstract%3A%20In%20this%20work%2C%20we%20study%20angle-based%20localization%20and%20rigidity%20maintenance%20control%20for%20multi-robot%20networks.%20First%2C%20we%20establish%20the%20relationship%20between%20angle%20rigidity%20and%20bearing%20rigidity%20considering%20%5Ctextit%7Bdirected%7D%20sensing%20graphs%20and%20%5Ctextit%7Bbody-frame%7D%20bearing%20measurements%20in%20both%20%242%24%20and%20%243%24-%5Ctextit%7Bdimensional%20space%7D.%20In%20particular%2C%20we%20demonstrate%20that%20a%20framework%20in%20%24%5Cmathrm%7BSE%7D%28d%29%24%20is%20infinitesimally%20bearing%20rigid%20if%20and%20only%20if%20it%20is%20infinitesimally%20angle%20rigid%20and%20each%20robot%20obtains%20at%20least%20%24d-1%24%20bearing%20measurements%20%28%24d%20%5Cin%20%5C%7B2%2C%203%5C%7D%24%29.%20Building%20on%20these%20findings%2C%20this%20paper%20proposes%20a%20distributed%20angle-based%20localization%20scheme%20and%20establishes%20local%20exponential%20stability%20under%20switching%20sensing%20graphs%2C%20requiring%20only%20infinitesimal%20angle%20rigidity%20across%20the%20visited%20topologies.%20Then%2C%20since%20the%20set%20of%20available%20angles%20strongly%20depends%20on%20the%20robots%27%20spatial%20configuration%20due%20to%20sensing%20constraints%2C%20we%20investigate%20rigidity%20maintenance%20control.%20The%20%5Ctextit%7Bangle%20rigidity%20eigenvalue%7D%20is%20presented%20as%20a%20metric%20for%20the%20degree%20of%20rigidity.%20A%20decentralized%20gradient-based%20controller%20capable%20of%20executing%20mission-specific%20commands%20while%20maintaining%20a%20sufficient%20level%20of%20angle%20rigidity%20is%20proposed.%20Simulations%20were%20conducted%20to%20evaluate%20the%20scheme%27s%20effectiveness%20and%20practicality.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11754v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAngle-based%2520Localization%2520and%2520Rigidity%2520Maintenance%2520Control%2520for%2520Multi-Robot%2520Networks%26entry.906535625%3DJ.%2520Francisco%2520Presenza%2520and%2520Leonardo%2520J.%2520Colombo%2520and%2520Juan%2520I.%2520Giribet%2520and%2520Ignacio%2520Mas%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520study%2520angle-based%2520localization%2520and%2520rigidity%2520maintenance%2520control%2520for%2520multi-robot%2520networks.%2520First%252C%2520we%2520establish%2520the%2520relationship%2520between%2520angle%2520rigidity%2520and%2520bearing%2520rigidity%2520considering%2520%255Ctextit%257Bdirected%257D%2520sensing%2520graphs%2520and%2520%255Ctextit%257Bbody-frame%257D%2520bearing%2520measurements%2520in%2520both%2520%25242%2524%2520and%2520%25243%2524-%255Ctextit%257Bdimensional%2520space%257D.%2520In%2520particular%252C%2520we%2520demonstrate%2520that%2520a%2520framework%2520in%2520%2524%255Cmathrm%257BSE%257D%2528d%2529%2524%2520is%2520infinitesimally%2520bearing%2520rigid%2520if%2520and%2520only%2520if%2520it%2520is%2520infinitesimally%2520angle%2520rigid%2520and%2520each%2520robot%2520obtains%2520at%2520least%2520%2524d-1%2524%2520bearing%2520measurements%2520%2528%2524d%2520%255Cin%2520%255C%257B2%252C%25203%255C%257D%2524%2529.%2520Building%2520on%2520these%2520findings%252C%2520this%2520paper%2520proposes%2520a%2520distributed%2520angle-based%2520localization%2520scheme%2520and%2520establishes%2520local%2520exponential%2520stability%2520under%2520switching%2520sensi {"title": "VRAG-DFD: Verifiable Retrieval-Augmentation for MLLM-based Deepfake Detection", "author": "Hui Han and Shunli Wang and Yandan Zhao and Taiping Yao and Shouhong Ding", "abstract": "In Deepfake Detection (DFD) tasks, researchers proposed two types of MLLM-based methods: complementary combination with small DFD detectors, or static forgery knowledge injection. The lack of professional forgery knowledge hinders the performance of these DFD-MLLMs. To solve this, we deeply considered two insightful issues: How to provide high-quality associated forgery knowledge for MLLMs? AND How to endow MLLMs with critical reasoning abilities given noisy reference information? Notably, we attempted to address above two questions with preliminary answers by leveraging the combination of Retrieval-Augmented Generation (RAG) and Reinforcement Learning (RL). Through RAG and RL techniques, we propose the VRAG-DFD framework with accurate dynamic forgery knowledge retrieval and powerful critical reasoning capabilities. Specifically, in terms of data, we constructed two datasets with RAG: Forensic Knowledge Database (FKD) for DFD knowledge annotation, and Forensic Chain-of-Thought Dataset (F-CoT), for critical CoT construction. In terms of model training, we adopt a three-stage training method (Alignment->SFT->GRPO) to gradually cultivate the critical reasoning ability of the MLLM. In terms of performance, VRAG-DFD achieved SOTA and competitive performance on DFD generalization testing.", "link": "http://arxiv.org/abs/2604.13660v3", "date": "2026-04-17", "relevancy": 2.0893, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5587}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_ {"title": "Learning to Reason with Insight for Informal Theorem Proving", "author": "Yunhe Li and Hao Shi and Bowen Deng and Wei Wang and Mengzhe Ruan and Hanxu Hou and Zhongxiang Dai and Siyang Gao and Chao Wang and Shuang Qiu and Linqi Song", "abstract": "Although most of the automated theorem-proving approaches depend on formal proof systems, informal theorem proving can align better with large language models' (LLMs) strength in natural language processing. In this work, we identify a primary bottleneck in informal theorem proving as a lack of insight, namely the difficulty of recognizing the core techniques required to solve complex problems. To address this, we propose a novel framework designed to cultivate this essential reasoning skill and enable LLMs to perform insightful reasoning. We propose $\\mathtt{DeepInsightTheorem}$, a hierarchical dataset that structures informal proofs by explicitly extracting core techniques and proof sketches alongside the final proof. To fully exploit this dataset, we design a Progressive Multi-Stage SFT strategy that mimics the human learning process, guiding the model from basic proof writing to insightful thinking. Our experiments on challenging mathematical benchmarks demonstrate that this insight-aware generation strategy significantly outperforms baselines. These results demonstrate that teaching models to identify and apply core techniques can substantially improve their mathematical reasoning.", "link": "http://arxiv.org/abs/2604.16278v1", "date": "2026-04-17", "relevancy": 2.0803, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5268}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5268}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4865}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Reason%20with%20Insight%20for%20Informal%20Theorem%20Proving&body=Title%3A%20Learning%20to%20Reason%20with%20Insight%20for%20Informal%20Theorem%20Proving%0AAuthor%3A%20Yunhe%20Li%20and%20Hao%20Shi%20and%20Bowen%20Deng%20and%20Wei%20Wang%20and%20Mengzhe%20Ruan%20and%20Hanxu%20Hou%20and%20Zhongxiang%20Dai%20and%20Siyang%20Gao%20and%20Chao%20Wang%20and%20Shuang%20Qiu%20and%20Linqi%20Song%0AAbstract%3A%20Although%20most%20of%20the%20automated%20theorem-proving%20approaches%20depend%20on%20formal%20proof%20systems%2C%20informal%20theorem%20proving%20can%20align%20better%20with%20large%20language%20models%27%20%28LLMs%29%20strength%20in%20natural%20language%20processing.%20In%20this%20work%2C%20we%20identify%20a%20primary%20bottleneck%20in%20informal%20theorem%20proving%20as%20a%20lack%20of%20insight%2C%20namely%20the%20difficulty%20of%20recognizing%20the%20core%20techniques%20required%20to%20solve%20complex%20problems.%20To%20address%20this%2C%20we%20propose%20a%20novel%20framework%20designed%20to%20cultivate%20this%20essential%20reasoning%20skill%20and%20enable%20LLMs%20to%20perform%20insightful%20reasoning.%20We%20propose%20%24%5Cmathtt%7BDeepInsightTheorem%7D%24%2C%20a%20hierarchical%20dataset%20that%20structures%20informal%20proofs%20by%20explicitly%20extracting%20core%20techniques%20and%20proof%20sketches%20alongside%20the%20final%20proof.%20To%20fully%20exploit%20this%20dataset%2C%20we%20design%20a%20Progressive%20Multi-Stage%20SFT%20strategy%20that%20mimics%20the%20human%20learning%20process%2C%20guiding%20the%20model%20from%20basic%20proof%20writing%20to%20insightful%20thinking.%20Our%20experiments%20on%20challenging%20mathematical%20benchmarks%20demonstrate%20that%20this%20insight-aware%20generation%20strategy%20significantly%20outperforms%20baselines.%20These%20results%20demonstrate%20that%20teaching {"title": "Tabular foundation models for in-context prediction of molecular properties", "author": "Karim K. Ben Hicham and Jan G. Rittig and Martin Grohe and Alexander Mitsos", "abstract": "Accurate molecular property prediction is central to drug discovery, catalysis, and process design, yet real-world applications are often limited by small datasets. Molecular foundation models provide a promising direction by learning transferable molecular representations; however, they typically involve task-specific fine-tuning, require machine learning expertise, and often fail to outperform classical baselines. Tabular foundation models (TFMs) offer a fundamentally different paradigm: they perform predictions through in-context learning, enabling inference without task-specific training. Here, we evaluate TFMs in the low- to medium-data regime across both standardized pharmaceutical benchmarks and chemical engineering datasets. We evaluate both frozen molecular foundation model representations, as well as classical descriptors and fingerprints. Across the benchmarks, the approach shows excellent predictive performance while reducing computational cost, compared to fine-tuning, with these advantages also transferring to practical engineering data settings. In particular, combining TFMs with CheMeleon embeddings yields up to 100\\% win rates on 30 MoleculeACE tasks, while compact RDKit2d and Mordred descriptors provide strong descriptor-based alternatives. Molecular representation emerges as a key determinant in TFM performance, with molecular foundation model embeddings and 2D descriptor sets both providing substantial gains over classic molecular fingerprints on many tasks. These results suggest that in-context learning with TFMs provides a highly accurate and cost-efficient alternative for property prediction in practical applications.", "link": "http://arxiv.org/abs/2604.16123v1", "date": "2026-04-17", "relevancy": 2.0742, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5405}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5219}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5064}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tabular%20foundation%20models%20for%20in-context%20prediction%20of%20molecular%20properties&body=Title%3A%20Tabular%20foundation%20models%20for%20in-context%20prediction%20of%20molecular%20properties%0AAuthor%3A%20Karim%20K.%20Ben%20Hicham%20and%20Jan%20G.%20Rittig%20and%20Martin%20Grohe%20and%20Alexander%20Mitsos%0AAbstract%3A%20Accurate%20molecular%20property%20prediction%20is%20central%20to%20drug%20discovery%2C%20catalysis%2C%20and%20process%20design%2C%20yet%20real-world%20applications%20are%20often%20limited%20by%20small%20datasets.%20Molecular%20foundation%20models%20provide%20a%20promising%20direction%20by%20learning%20transferable%20molecular%20representations%3B%20however%2C%20they%20typically%20involve%20task-specific%20fine-tuning%2C%20require%20machine%20learning%20expertise%2C%20and%20often%20fail%20to%20outperform%20classical%20baselines.%20Tabular%20foundation%20models%20%28TFMs%29%20offer%20a%20fundamentally%20different%20paradigm%3A%20they%20perform%20predictions%20through%20in-context%20learning%2C%20enabling%20inference%20without%20task-specific%20training.%20Here%2C%20we%20evaluate%20TFMs%20in%20the%20low-%20to%20medium-data%20regime%20across%20both%20standardized%20pharmaceutical%20benchmarks%20and%20chemical%20engineering%20datasets.%20We%20evaluate%20both%20frozen%20molecular%20foundation%20model%20representations%2C%20as%20well%20as%20classical%20descriptors%20and%20fingerprints.%20Across%20the%20benchmarks%2C%20the%20approach%20shows%20excellent%20predictive%20performance%20while%20reducing%20computational%20cost%2C%20compared%20to%20fine-tuning%2C%20with%20these%20advantages%20also%20transferring%20to%20practical%20engineering%20data%20settings.%20In%20particular%2C%20combining%20TFMs%20with%20CheMeleon%20embeddings%20yields%20up%20to%20100%5C%25%20win%20rates%20on%2030%20MoleculeACE%20tasks%2C%20while%20compact%20RDKit2d%20and%20Mordred%20descriptors%20provide%20strong%20descriptor-based%20alternatives.%20Molecular%20representation%20emerges%20as%20a%20key%20determinant%20in%20TFM%20performance%2C%20with%20molecular%20foundation%20model%20embeddings%20and%202D%20descriptor%20sets%20both%20providing%20substantial%20gains%20over%20classic%20molecular%20fingerprints%20on%20many%20tasks.%20These%20results%20suggest%20that%20in-context%20learning%20with%20TFMs%20provides%20a%20highly%20accurate%20and%20cost-efficient%20alternative%20for%20property%20prediction%20in%20practical%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16123v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTabular%2520foundation%2520models%2520for%2520in-context%2520prediction%2520of%2520molecular%2520properties%26entry.906535625%3DKarim%2520K.%2520Ben%2520Hicham%2520and%2520Jan%2520G.%2520Rittig%2520and%2520Martin%2520Grohe%2520and%2520Alexander%2520Mitsos%26entry.1292438233%3DAccurate%2520molecular%2520property%2520prediction%2520is%2520central%2520to%2520drug%2520discovery%252C%2520catalysis%252C%2520and%2520process%2520design%252C%2520yet%2520real-world%2520applications%2520are%2520often%2520limited%2520by%2520small%2520datasets.%2520Molecular%2520foundation%2520models%2520provide%2520a%2520promising%2520direction%2520by%2520learning%2520transferable%2520molecular%2520representations%253B%2520however%252C%2520they%2520typically%2520involve%2520task-specific%2520fine-tuning%252C%2520require%2520machine%2520learning%252 {"title": "Can LLMs Understand the Impact of Trauma? Costs and Benefits of LLMs Coding the Interviews of Firearm Violence Survivors", "author": "Jessica H. Zhu and Shayla Stringfield and Vahe Zaprosyan and Michael Wagner and Michel Cukier and Joseph B. Richardson", "abstract": "Firearm violence is a pressing public health issue, yet research into survivors' lived experiences remains underfunded and difficult to scale. Qualitative research, including in-depth interviews, is a valuable tool for understanding the personal and societal consequences of community firearm violence and designing effective interventions. However, manually analyzing these narratives through thematic analysis and inductive coding is time-consuming and labor-intensive. Recent advancements in large language models (LLMs) have opened the door to automating this process, though concerns remain about whether these models can accurately and ethically capture the experiences of vulnerable populations. In this study, we assess the use of open-source LLMs to inductively code interviews with 21 Black men who have survived community firearm violence. Our results demonstrate that while some configurations of LLMs can identify important codes, overall relevance remains low and is highly sensitive to data processing. Furthermore, LLM guardrails lead to substantial narrative erasure. These findings highlight both the potential and limitations of LLM-assisted qualitative coding and underscore the ethical challenges of applying AI in research involving marginalized communities.", "link": "http://arxiv.org/abs/2604.16132v1", "date": "2026-04-17", "relevancy": 2.0613, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4163}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4163}, {"title": "TAMM {"title": "ReactBench: A Benchmark for Topological Reasoning in MLLMs on Chemical Reaction Diagrams", "author": "Qiang Xu and Shengyuan Bai and Yu Wang and He Cao and Leqing Chen and Yuanyuan Liu and Bin Feng and Zijing Liu and Yu Li", "abstract": "Multimodal Large Language Models (MLLMs) excel at recognizing individual visual elements and reasoning over simple linear diagrams. However, when faced with complex topological structures involving branching paths, converging flows, and cyclic dependencies, their reasoning capabilities degrade sharply, even on tasks as basic as counting endpoints. Existing benchmarks fail to probe this gap, focusing on semantic comprehension rather than structural reasoning. We introduce ReactBench, a benchmark that reveals fundamental limitations in structural reasoning through chemical reaction diagrams. These real-world scientific diagrams offer an ideal testbed because they naturally span diverse structures from linear chains to cyclic graphs, while requiring both precise local recognition and coherent global reasoning. Our benchmark comprises 1,618 expert-annotated QA pairs across four hierarchical task dimensions. Extensive evaluation across 17 MLLMs reveals a significant performance gap exceeding 30% between anchor-based tasks and holistic structural reasoning tasks. Controlled ablations confirm this bottleneck lies in reasoning, not perception. These findings expose a fundamental deficit in structural understanding and establish directions for advancing visual reasoning.", "link": "http://arxiv.org/abs/2604.15994v1", "date": "2026-04-17", "relevancy": 2.0565, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5182}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5182}, {"title": "RoboEXP: Action-Conditioned Scen {"title": "TokenLight: Precise Lighting Control in Images using Attribute Tokens", "author": "Sumit Chaturvedi and Yannick Hold-Geoffroy and Mengwei Ren and Jingyuan Liu and He Zhang and Yiqun Mei and Julie Dorsey and Zhixin Shu", "abstract": "This paper presents a method for image relighting that enables precise and continuous control over multiple illumination attributes in a photograph. We formulate relighting as a conditional image generation task and introduce attribute tokens to encode distinct lighting factors such as intensity, color, ambient illumination, diffuse level, and 3D light positions. The model is trained on a large-scale synthetic dataset with ground-truth lighting annotations, supplemented by a small set of real captures to enhance realism and generalization. We validate our approach across a variety of relighting tasks, including controlling in-scene lighting fixtures and editing environment illumination using virtual light sources, on synthetic and real images. Our method achieves state-of-the-art quantitative and qualitative performance compared to prior work. Remarkably, without explicit inverse rendering supervision, the model exhibits an inherent understanding of how light interacts with scene geometry, occlusion, and materials, yielding convincing lighting effects even in traditionally challenging scenarios such as placing lights within objects or relighting transparent materials plausibly. Project page: vrroom.github.io/tokenlight/", "link": "http://arxiv.org/abs/2604.15310v2", "date": "2026-04-17", "relevancy": 2.0515, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.538}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5203}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "htt {"title": "Unveiling Stochasticity: Universal Multi-modal Probabilistic Modeling for Traffic Forecasting", "author": "Weijiang Xiong and Robert Fonod and Nikolas Geroliminis", "abstract": "Traffic forecasting is a challenging spatio-temporal modeling task and a critical component of urban transportation management. Current studies mainly focus on deterministic predictions, with limited considerations on the uncertainty and stochasticity in traffic dynamics. Therefore, this paper proposes an elegant yet universal approach that transforms existing models into probabilistic predictors by replacing only the final output layer with a novel Gaussian Mixture Model (GMM) layer. The modified model requires no changes to the training pipeline and can be trained using only the Negative Log-Likelihood (NLL) loss, without any auxiliary or regularization terms. Experiments on multiple traffic datasets show that our approach generalizes from classic to modern model architectures while preserving deterministic performance. Furthermore, we propose a systematic evaluation procedure based on cumulative distributions and confidence intervals, and demonstrate that our approach is considerably more accurate and informative than unimodal or deterministic baselines. Finally, a more detailed study on a real-world dense urban traffic network is presented to examine the impact of data quality on uncertainty quantification and to show the robustness of our approach under imperfect data conditions. Code available at https://github.com/Weijiang-Xiong/OpenSkyTraffic", "link": "http://arxiv.org/abs/2604.16084v1", "date": "2026-04-17", "relevancy": 2.0392, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5399}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.504}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5035}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unveiling%20Stochasticity%3A%20Universal%20Multi-modal%20Probabilistic%20Modeling%20for%20Traffic%20Forecasting&body=Title%3A%20Unveiling%20Stochasticity%3A%20Universal%20Multi-modal%20Probabilistic%20Modeling%20for%20Traffic%20Forecasting%0AAuthor%3A%20Weijiang%20Xiong%20and%20Robert%20Fonod%20and%20Nikolas%20Geroliminis%0AAbstract%3A%20Traffic%20forecasting%20is%20a%20challenging%20spatio-temporal%20modeling%20task%20and%20a%20critical%20component%20of%20urban%20transportation%20management.%20Current%20studies%20mainly%20focus%20on%20deterministic%20predictions%2C%20with%20limited%20considerations%20on%20the%20uncertainty%20and%20stochasticity%20in%20traffic%20dynamics.%20Therefore%2C%20this%20paper%20proposes%20an%20elegant%20yet%20universal%20approach%20that%20transforms%20existing%20models%20into%20probabilistic%20predictors%20by%20replacing%20only%20the%20final%20output%20layer%20with%20a%20novel%20Gaussian%20Mixture%20Model%20%28GMM%29%20layer.%20The%20modified%20model%20requires%20no%20changes%20to%20the%20training%20pipeline%20and%20can%20be%20trained%20using%20only%20the%20Negative%20Log-Likelihood%20%28NLL%29%20loss%2C%20without%20any%20auxiliary%20or%20regularization%20terms.%20Experiments%20on%20multiple%20traffic%20datasets%20show%20that%20our%20approach%20generalizes%20from%20classic%20to%20modern%20model%20architectures%20while%20preserving%20deterministic%20performance.%20Furthermore%2C%20we%20propose%20a%20systematic%20evaluation%20procedure%20based%20on%20cumulative%20distributions%20and%20confidence%20intervals%2C%20and%20demonstrate%20that%20our%20approach%20is%20considerably%20more%20accurate%20and%20informative%20than%20unimodal%20or%20deterministic%20baselines.%20Finally%2C%20a%20more%20detailed%20study%20on%20a%20real-world%20dense%20urban%20traffic%20network%20is%20presented%20to%20examine%20the%20impact%20of%20data%20quality%20on%20uncertainty%20quantification%20and%20to%20show%20the%20robustness%20of%20our%20approach%20under%20imperfect%20data%20conditions.%20Code%20available%20at%20https%3A//github.com/Weijiang-Xiong/OpenSkyTraffic%0ALink%3A%20http%3A//arxiv.org/abs/2604.16084v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnveiling%2520Stochasticity%253A%2520Universal%2520Multi-modal%2520Probabilistic%2520Modeling%2520for%2520Traffic%2520Forecasting%26entry.906535625%3DWeijiang%2520Xiong%2520and%2520Robert%2520Fonod%2520and%2520Nikolas%2520Geroliminis%26entry.1292438233%3DTraffic%2520forecasting%2520is%2520a%2520challenging%2520spatio-temporal%2520modeling%2520task%2520and%2520a%2520critical%2520component%2520of%2520urban%2520transportation%2520management.%2520Current%2520studies%2520mainly%2520focus%2520on%2520deterministic%2520predictions%252C%2520with%2520limited%2520considerations%2520on%2520the%2520uncertainty%2520and%2520stochasticity%2520in%2520traffic%2520dynamics.%2520Therefore%252C%2520this%2520paper%2520proposes%2520an%2520elegant%2520yet%2520universal%2520approach%2520that%2520transforms%2520existing%2520models%2520into%2520probabilistic%2520predictors%2520by%2520replacing%2520only%2520the%2520final%2520output%2520layer%2520with%2520a%2520novel%2520Gaussian%2520Mixture%2520Model%2520%2528GMM%2529%2520layer.%2520The%2520modified%2520model%2520requires%2520no%2520changes%2520to%2520the%2520training%2520pipeline%2520and%2520can%2520be%2520trained%2520using%2520only%2520the%2520Negative%2520Log-Likelihood%2520%2528NLL%2529%2520loss%252C%2520without%2520any%2520auxiliary%2520or%2520regularization%2520terms.%2520Experiments%2520on%2520multiple%2 {"title": "The Harder Path: Last Iterate Convergence for Uncoupled Learning in Zero-Sum Games with Bandit Feedback", "author": "C\u00f4me Fiegel and Pierre M\u00e9nard and Tadashi Kozuno and Michal Valko and Vianney Perchet", "abstract": "We study the problem of learning in zero-sum matrix games with repeated play and bandit feedback. Specifically, we focus on developing uncoupled algorithms that guarantee, without communication between players, the convergence of the last-iterate to a Nash equilibrium. Although the non-bandit case has been studied extensively, this setting has only been explored recently, with a bound of $\\mathcal{O}(T^{-1/8})$ on the exploitability gap. We show that, for uncoupled algorithms, guaranteeing convergence of the policy profiles to a Nash equilibrium is detrimental to the performance, with the best attainable rate being $\u03a9(T^{-1/4})$ in contrast to the usual $\u03a9(T^{-1/2})$ rate for convergence of the average iterates. We then propose two algorithms that achieve this optimal rate up to constant and logarithmic factors. The first algorithm leverages a straightforward trade-off between exploration and exploitation, while the second employs a regularization technique based on a two-step mirror descent approach.", "link": "http://arxiv.org/abs/2604.16087v1", "date": "2026-04-17", "relevancy": 2.0292, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4203}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.399}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.3982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Harder%20Path%3A%20Last%20Iterate%20Convergence%20for%20Uncoupled%20Learning%20in%20Zero-Sum%20Games%20with%20Bandit%20Feedback&body=Title%3A%20The%20Harder%20Path%3A%20Last%20Iterate%20Convergence%20for%20Uncoupled%20Learning%20in%20Zero-Sum%20Games%20with%20Bandit%20Feedback%0AAuthor%3A%20C%C3%B4me%20Fiegel%20and%20Pierre%20M%C3%A9nard%20and%20Tadashi%20Kozuno%20and%20Michal%20Valko%20and%20Vianney%20Perchet%0AAbstract%3A%20We%20study%20the%20problem%20of%20learning%20in%20zero-sum%20matrix%20games%20with%20repeated%20play%20and%20bandit%20feedback.%20Specifically%2C%20we%20focus%20on%20developing%20uncoupled%20algorithms%20that%20guarantee%2C%20without%20communication%20between%20players%2C%20the%20convergence%20of%20the%20last-iterate%20to%20a%20Nash%20equilibrium.%20Although%20the%20non-bandit%20case%20has%20been%20studied%20extensively%2C%20this%20setting%20has%20only%20been%20explored%20recently%2C%20with%20a%20bound%20of%20%24%5Cmathcal%7BO%7D%28T%5E%7B-1/8%7D%29%24%20on%20the%20exploitability%20gap.%20We%20show%20that%2C%20for%20uncoupled%20algorithms%2C%20guaranteeing%20convergence%20of%20the%20policy%20profiles%20to%20a%20Nash%20equilibrium%20is%20detrimental%20to%20the%20performance%2C%20with%20the%20best%20attainable%20rate%20being%20%24%CE%A9%28T%5E%7B-1/4%7D%29%24%20in%20contrast%20to%20the%20usual%20%24%CE%A9%28T%5E%7B-1/2%7D%29%24%20rate%20for%20convergence%20of%20the%20average%20iterates.%20We%20then%20propose%20two%20algorithms%20that%20achieve%20this%20optimal%20rate%20up%20to%20constant%20and%20logarithmic%20factors.%20The%20first%20algorithm%20leverages%20a%20straightforward%20trade-off%20between%20exploration%20and%20exploitation%2C%20while%20the%20second%20employs%20a%20regularization%20technique%20based%20on%20a%20two-step%20mirror%20descent%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16087v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Harder%2520Path%253A%2520Last%2520Iterate%2520Convergence%2520for%252 0descent%2520approach.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16087v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Harder%20Path%3A%20Last%20Iterate%20Convergence%20for%20Uncoupled%20Learning%20in%20Zero-Sum%20Games%20with%20Bandit%20Feedback&entry.906535625=C%C3%B4me%20Fiegel%20and%20Pierre%20M%C3%A9nard%20and%20Tadashi%20Kozuno%20and%20Michal%20Valko%20and%20Vianney%20Perchet&entry.1292438233=We%20study%20the%20problem%20of%20learning%20in%20zero-sum%20matrix%20games%20with%20repeated%20play%20and%20bandit%20feedback.%20Specifically%2C%20we%20focus%20on%20developing%20uncoupled%20algorithms%20that%20guarantee%2C%20without%20communication%20between%20players%2C%20the%20convergence%20of%20the%20last-iterate%20to%20a%20Nash%20equilibrium.%20Although%20the%20non-bandit%20case%20has%20been%20studied%20extensively%2C%20this%20setting%20has%20only%20been%20explored%20recently%2C%20with%20a%20bound%20of%20%24%5Cmathcal%7BO%7D%28T%5E%7B-1/8%7D%29%24%20on%20the%20exploitability%20gap.%20We%20show%20that%2C%20for%20uncoupled%20algorithms%2C%20guaranteeing%20convergence%20of%20the%20policy%20profiles%20to%20a%20Nash%20equilibrium%20is%20detrimental%20to%20the%20performance%2C%20with%20the%20best%20attainable%20rate%20being%20%24%CE%A9%28T%5E%7B-1/4%7D%29%24%20in%20contrast%20to%20the%20usual%20%24%CE%A9%28T%5E%7B-1/2%7D%29%24%20rate%20for%20convergence%20of%20the%20average%20iterates.%20We%20then%20propose%20two%20algorithms%20that%20achieve%20this%20optimal%20rate%20up%20to%20constant%20and%20logarithmic%20factors.%20The%20first%20algorithm%20leverages%20a%20straightforward%20trade-off%20between%20exploration%20and%20exploitation%2C%20while%20the%20second%20employs%20a%20regularization%20technique%20based%20on%20a%20two-step%20mirror%20descent%20approach.&entry.1838667208=http%3A//arxiv.org/abs/2604.16087v1&entry.124074799=Read"},
{"title": "A Two-Stage, Object-Centric Deep Learning Framework for Robust Exam Cheating Detection", "author": "Van-Truong Le and Le-Khanh Nguyen and Trong-Doanh Nguyen", "abstract": "Academic integrity continues to face the persistent challenge of examination cheating. Traditional invigilation relies on human observation, which is inefficient, costly, and prone to errors at scale. Although some existing AI-powered monitoring systems have been deployed and trusted, many lack transparency or require multi-layered architectures to achieve the desired performance. To overcome these challenges, we propose an improvement over a simple two-stage framework for exam cheating detection that integrates object detection and behavioral analysis using well-known technologies. First, the state-of-the-art YOLOv8n model is used to localize students in exam-room images. Each detected region is cropped and preprocessed, then classified by a fine-tuned RexNet-150 model as either normal or cheating behavior. The system is trained on a dataset compiled from 10 independent sources with a total of 273,897 samples, achieving 0.95 accuracy, 0.94 recall, 0.96 precision, and 0.95 F1-score - a 13\\% increase over a baseline accuracy of 0.82 in video-based cheating detection. In addition, with an average inference time of 13.9 ms per sample, the proposed approach demonstrates robustness and scalability for deployment in large-scale environments. Beyond the technical contribution, the AI-assisted monitoring system also addresses ethical concerns by ensuring that final outcomes are delivered privately to individual students after the examination, for example, via personal email. This prevents public exposure or shaming and offers students an opportunity to reflect on their behavior. For further improvement, it is possible to incorporate additional factors, such as audio data and consecutive frames, to achieve greater accuracy. This study provides a foundation for developing real-time, scalable, ethical, and open-source solutions.", "link": "http://arxiv.org/abs/2604.16234v1", "date": "2026-04-17", "relevancy": 2.0268, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5164}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5086}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Two-Stage%2C%20Object-Centric%20Deep%20Learning%20Framework%20for%20Robust%20Exam%20Cheating%20Detection&body=Title%3A%20A%20Two-Stage%2C%20Object-Centric%20Deep%20Learning%20Framework%20for%20Robust%20Exam%20Cheating%20Detection%0AAuthor%3A%20Van-Truong%20Le%20and%20Le-Khanh%20Nguyen%20and%20Trong-Doanh%20Nguyen%0AAbstract%3A%20Academic%20integrity%20continues%20to%20face%20the%20persistent%20challenge%20of%20examination%20cheating.%20Traditional%20invigilation%20relies%20on%20human%20observation%2C%20which%20is%20inefficient%2C%20costly%2C%20and%20prone%20to%20errors%20at%20scale.%20Although%20some%20existing%20AI-powered%20monitoring%20systems%20have%20been%20deployed%20and%20trusted%2C%20many%20lack%20transparency%20or%20require%20multi-layered%20architectures%20to%20achieve%20the%20desired%20performance.%20To%20overcome%20these%20challenges%2C%20we%20propose%20an%20improvement%20over%20a%20simple%20two-stage%20framework%20for%20exam%20cheating%20detection%20that%20integrates%20object%20detection%20and%20behavioral%20analysis%20using%20well-known%20technologies.%20First%2C%20the%20state-of-the-art%20YOLOv8n%20model%20is%20used%20to%20localize%20students%20in%20exam-room%20images.%20Each%20detected%20region%20is%20cropped%20and%20preprocessed%2C%20then%20classified%20by%20a%20fine-tuned%20RexNet-150%20model%20as%20either%20normal%20or%20cheating%20behavior.%20The%20system%20is%20trained%20on%20a%20dataset%20compiled%20from%2010%20independent%20sources%20with%20a%20total%20of%20273%2C897%20samples%2C%20achieving%200.95%20accuracy%2C%200.94%20recall%2C%200.96%20precision%2C%20and%200.95%20F1-score%20-%20a%2013%5C%25%20increase%20over%20a%20baseline%20accuracy%20of%200.82%20in%20video-based%20cheating%20detection.%20In%20addition%2C%20with%20an%20average%20inference%20time%20of%2013.9%20ms%20per%20sample%2C%20the%20proposed%20approach%20demonstrates%20robustness%20and%20scalability%20for%20deployment%20in%20large-scale%20environments.%20Beyond%20the%20technical%20contribution%2C%20the%20AI-assisted%20monitoring%20system%20also%20addresses%20ethical%20concerns%20by%20ensuring%20that%20final%20outcomes%20are%20delivered%20privately%20to%20individual%20students%20after%20the%20examination%2C%20for%20example%2C%20via%20personal%20email.%20This%20prevents%20public%20exposure%20or%20shaming%20and%20offers%20students%20an%20opportunity%20to%20reflect%20on%20their%20behavior.%20For%20further%20improvement%2C%20it%20is%20possible%20to%20incorporate%20additional%20factors%2C%20such%20as%20audio%20data%20and%20consecutive%20frames%2C%20to%20achieve%20greater%20accuracy.%20This%20study%20provides%20a%20foundation%20for%20developing%20real-time%2C%20scalable%2C%20ethical%2C%20and%20open-source%20solutions.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16234v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Two-Stage%252C%2520Object-Centric%2520Deep%2520Learning%2520Framework%2520for%2520Robust%2520Exam%2520Cheating%2520Detection%26entry.906535625%3DVan-Truong%2520Le%2520and%2520Le-Khanh%2520Nguyen%2520and%2520Trong-Doanh%2520Nguyen%2 {"title": "AtManRL: Towards Faithful Reasoning via Differentiable Attention Saliency", "author": "Max Henning H\u00f6th and Kristian Kersting and Bj\u00f6rn Deiseroth and Letitia Parcalabescu", "abstract": "Large language models (LLMs) increasingly rely on chain-of-thought (CoT) reasoning to solve complex tasks. Yet ensuring that the reasoning trace both contributes to and faithfully reflects the processes underlying the model's final answer, rather than merely accompanying it, remains challenging. We introduce AtManRL, a method that leverages differentiable attention manipulation to learn more faithful reasoning through reinforcement learning. By training an additive attention mask that identifies tokens in the CoT crucial for producing correct answers, we derive a saliency reward signal that encourages the model to generate reasoning traces that genuinely influence its final predictions. We integrate this saliency reward with outcome-based rewards within the GRPO framework to jointly optimize for correctness and interpretability. Experiments on GSM8K and MMLU with Llama-3.2-3B-Instruct demonstrate that our approach can identify influential reasoning tokens and enable training more transparent reasoning models.", "link": "http://arxiv.org/abs/2604.16158v1", "date": "2026-04-17", "relevancy": 2.0258, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5125}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5034}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.499}], "mailto": "mailto:haoxiang.li.2024@gmail.

{"title": "DINOv3 Beats Specialized Detectors: A Simple Foundation Model Baseline for Image Forensics", "author": "Jieming Yu and Qiuxiao Feng and Zhuohan Wang and Xiaochen Ma", "abstract": "With the rapid advancement of deep generative models, realistic fake images have become increasingly accessible, yet existing localization methods rely on complex designs and still struggle to generalize across manipulation types and imaging conditions. We present a simple but strong baseline based on DINOv3 with LoRA adaptation and a lightweight convolutional decoder. Under the CAT-Net protocol, our best model improves average pixel-level F1 by 17.0 points over the previous state of the art on four standard benchmarks using only 9.1\\,M trainable parameters on top of a frozen ViT-L backbone, and even our smallest variant surpasses all prior specialized methods. LoRA consistently outperforms full fine-tuning across all backbone scales. Under the data-scarce MVSS-Net protocol, LoRA reaches an average F1 of 0.774 versus 0.530 for the strongest prior method, while full fine-tuning becomes highly unstable, suggesting that pre-trained representations encode forensic information that is better preserved than overwritten. The baseline also exhibits strong robustness to Gaussian noise, JPEG re-compression, and Gaussian blur. We hope this work can serve as a reliable baseline for the research community and a practical starting point for future image-forensic applications. Code is available at https://github.com/Irennnne/DINOv3-IML.", "link": "http://arxiv.org/abs/2604.16083v1", "date": "2026-04-17", "relevancy": 2.9784, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5982}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5982}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5907}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DINOv3%20Beats%20Specialized%20Detectors%3A%20A%20Simple%20Foundation%20Model%20Baseline%20for%20Image%20Forensics&body=Title%3A%20DINOv3%20Beats%20Specialized%20Detectors%3A%20A%20Simple%20Foundation%20Model%20Baseline%20for%20Image%20Forensics%0AAuthor%3A%20Jieming%20Yu%20and%20Qiuxiao%20Feng%20and%20Zhuohan%20Wang%20and%20Xiaochen%20Ma%0AAbstract%3A%20With%20the%20rapid%20advancement%20of%20deep%20generative%20models%2C%20realistic%20fake%20images%20have%20become%20increasingly%20accessible%2C%20yet%20existing%20localization%20methods%20rely%20on%20complex%20designs%20and%20still%20struggle%20to%20generalize%20across%20manipulation%20types%20and%20imaging%20conditions.%20We%20present%20a%20simple%20but%20strong%20baseline%20based%20on%20DINOv3%20with%20LoRA%20adaptation%20and%20a%20lightweight%20convolutional%20decoder.%20Under%20the%20CAT-Net%20protocol%2C%20our%20best%20model%20improves%20average%20pixel-level%20F1%20by%2017.0%20points%20over%20the%20previous%20state%20of%20the%20art%20on%20four%20standard%20benchmarks%20using%20only%209.1%5C%2CM%20trainable%20parameters%20on%20top%20of%20a%20frozen%20ViT-L%20backbone%2C%20and%20even%20our%20smallest%20variant%20surpasses%20all%20prior%20specialized%20methods.%20LoRA%20consistently%20outperforms%20full%20fine-tuning%20across%20all%20backbone%20scales.%20Under%20the%20data-scarce%20MVSS-Net%20protocol%2C%20LoRA%20reaches%20an%20average%20F1%20of%200.774%20versus%200.530%20for%20the%20strongest%20prior%20method%2C%20while%20full%20fine-tuning%20becomes%20highly%20unstable%2C%20suggesting%20that%20pre-trained%20representations%20encode%20forensic%20information%20that%20is%20better%20preserved%20than%20overwritten.%20The%20baseline%20also%20exhibits%20strong%20robustness%20to%20Gaussian%20noise%2C%20JPEG {"title": "Do Vision-Language Models Truly Perform Vision Reasoning? A Rigorous Study of the Modality Gap", "author": "Yige Xu and Yongjie Wang and Zizhuo Wu and Kaisong Song and Jun Lin and Zhiqi Shen", "abstract": "Reasoning in vision-language models (VLMs) has recently attracted significant attention due to its broad applicability across diverse downstream tasks. However, it remains unclear whether the superior performance of VLMs stems from genuine vision-grounded reasoning or relies predominantly on the reasoning capabilities of their textual backbones. To systematically measure this, we introduce CrossMath, a novel multimodal reasoning benchmark designed for controlled cross-modal comparisons. Specifically, we construct each problem in text-only, image-only, and image+text formats guaranteeing identical task-relevant information, verified by human annotators. This rigorous alignment effectively isolates modality-specific reasoning differences while eliminating confounding factors such as information mismatch. Extensive evaluation of state-of-the-art VLMs reveals a consistent phenomenon: a substantial performance gap between textual and visual reasoning. Notably, VLMs excel with text-only inputs, whereas incorporating visual data (image+text) frequently degrades performance compared to the text-only baseline. These findings indicate that current VLMs conduct reasoning primarily in the textual space, with limited genuine reliance on visual evidence. To mitigate this limitation, we curate a CrossMath training set for VLM fine-tuning. Empirical evaluations demonstrate that fine-tuning on this training set significantly boosts reasoning performance across all individual and joint modalities, while yielding robust gains on two general visual reasoning tasks. Source code is available at https://github.com/xuyige/CrossMath.", "link": "http://arxiv.org/abs/2604.16256v1", "date": "2026-04-17", "relevancy": 2.9715, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6212}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6212}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Vision-Language%20Models%20Truly%20Perform%20Vision%20Reasoning%3F%20A%20Rigorous%20Study%20of%20the%20Modality%20Gap&body=Title%3A%20Do%20Vision-Language%20Models%20Truly%20Perform%20Vision%20Reasoning%3F%20A%20Rigorous%20Study%20of%20the%20Modality%20Gap%0AAuthor%3A%20Yige%20Xu%20and%20Yongjie%20Wang%20and%20Zizhuo%20Wu%20and%20Kaisong%20Song%20and%20Jun%20Lin%20and%20Zhiqi%20Shen%0AAbstract%3A%20Reasoning%20in%20vision-language%20models%20%28VLMs%29%20has%20recently%20attracted%20significant%20attention%20due%20to%20its%20broad%20applicability%20across%20diverse%20downstream%20tasks.%20However%2C%20it%20remains%20unclear%20whether%20the%20superior%20performance%20of%20VLMs%20stems%20from%20genuine%20vision-grounded%20reasoning%20or%20relies%20predominantly%20on%20the%20reasoning%20capabilities%20of%20their%20textual%20backbones.%20To%20systematically%20measure%20this%2C%20we%20introduce%20CrossMath%2C%20a%20novel%20multimodal%20reasoning%20benchmark%20designed%20for%20controlled%20cross-modal%20comparisons.%20Specifically%2C%20we%20construct%20each%20problem%20in%20text-only%2C%20image-only%2C%20and%20image%2Btext%20formats%20guaranteeing%20identical%20task-relevant%20information%2C%20verified%20by%20human%20annotators.%20This%20rigorous%20alignment%20effectively%20isolates%20modality-specific%20reasoning%20differences%20while%20eliminating%20confounding%20factors%20such%20as%20information%20mismatch.%20Extensive%20evaluation%20of%20state-of-the-art%20VLMs%20reveals%20a%20consistent%20phenomenon%3A%20a%20substantial%20performance%20gap%20between%20textual%20and%20visual%20reasoning.%20Notably%2C%20VLMs%20excel%20with%20text-only%20inputs%2C%20whereas%20incorporating%20visual%20data%20%28image%2Btext%29%20frequently%20degrades%20performance%20compared%20to%20the%20text-only%20baseline.%20These%20findings%20indicate%20that%20current%20VLMs%20conduct%20reasoning%20primarily%20in%20the%20textual%20space%2C%20with%20limited%20genuine%20reliance%20on%20visual%20evidence.%20To%20mitigate%20this%20limitation%2C%20we%20curate%20a%20CrossMath%20training%20set%20for%20VLM%20fine-tuning.%20Empirical%20evaluations%20demonstrate%20that%20fine-tuning%20on%20this%20training%20set%20significantly%20boosts%20reasoning%20performance%20across%20all%20individual%20and%20joint%20modalities%2C%20while%20yielding%20robust%20gains%20on%20two%20general%20visual%20reasoning%20tasks.%20Source%20code%20is%20available%20at%20https%3A//github.com/xuyige/CrossMath.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16256v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520Vision-Language%2520Models%2520Truly%2520Perform%2520Vision%2520Reasoning%253F%2520A%2520Rigorous%2520Study%2520of%2520the%2520Modality%2520Gap%26entry.906535625%3DYige%2520Xu%2520and%2520Yongjie%2520Wang%2520and%2520Zizhuo%2520Wu%2520and%2520Kaisong%2520Song%2520and%2520Jun%2520Lin%2520and%2520Zhiqi%2520Shen%26entry.1292438233%3DReasoning%2520in%2520vision-language%2520models%2520%2528VLMs%2529%2520has%2520recently%2520attracted%2520significant%2520attention%2520due%2520to%2520its%2520broad%2520applicability%2520across%2520diverse%2520downstream%2520tasks.%2520However%252C%2520it%2520remains%2520unclear%2520whether%2520the%2520superior%2520performance%2520of%2520VLMs%2520stems%2520from%2520genuine%2520vision-grounded%2520reasoning%2520or%2520relies%2520predominantly%2520on%2520the%2520reasoning%2520capabilities%2520of .com/xuyige/CrossMath.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16256v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Do%20Vision-Language%20Models%20Truly%20Perform%20Vision%20Reasoning%3F%20A%20Rigorous%20Study%20of%20the%20Modality%20Gap&entry.906535625=Yige%20Xu%20and%20Yongjie%20Wang%20and%20Zizhuo%20Wu%20and%20Kaisong%20Song%20and%20Jun%20Lin%20and%20Zhiqi%20Shen&entry.1292438233=Reasoning%20in%20vision-language%20models%20%28VLMs%29%20has%20recently%20attracted%20significant%20attention%20due%20to%20its%20broad%20applicability%20across%20diverse%20downstream%20tasks.%20However%2C%20it%20remains%20unclear%20whether%20the%20superior%20performance%20of%20VLMs%20stems%20from%20genuine%20vision-grounded%20reasoning%20or%20relies%20predominantly%20on%20the%20reasoning%20capabilities%20of%20their%20textual%20backbones.%20To%20systematically%20measure%20this%2C%20we%20introduce%20CrossMath%2C%20a%20novel%20multimodal%20reasoning%20benchmark%20designed%20for%20controlled%20cross-modal%20comparisons.%20Specifically%2C%20we%20construct%20each%20problem%20in%20text-only%2C%20image-only%2C%20and%20image%2Btext%20formats%20guaranteeing%20identical%20task-relevant%20information%2C%20verified%20by%20human%20annotators.%20This%20rigorous%20alignment%20effectively%20isolates%20modality-specific%20reasoning%20differences%20while%20eliminating%20confounding%20factors%20such%20as%20information%20mismatch.%20Extensive%20evaluation%20of%20state-of-the-art%20VLMs%20reveals%20a%20consistent%20phenomenon%3A%20a%20substantial%20performance%20gap%20between%20textual%20and%20visual%20reasoning.%20Notably%2C%20VLMs%20excel%20with%20text-only%20inputs%2C%20whereas%20incorporating%20visual%20data%20%28image%2Btext%29%20frequently%20degrades%20performance%20compared%20to%20the%20text-only%20baseline.%20These%20findings%20indicate%20that%20current%20VLMs%20conduct%20reasoning%20primarily%20in%20the%20textual%20space%2C%20with%20limited%20genuine%20reliance%20on%20visual%20evidence.%20To%20mitigate%20this%20limitation%2C%20we%20curate%20a%20CrossMath%20training%20set%20for%20VLM%20fine-tuning.%20Empirical%20evaluations%20demonstrate%20that%20fine-tuning%20on%20this%20training%20set%20significantly%20boosts%20reasoning%20performance%20across%20all%20individual%20and%20joint%20modalities%2C%20while%20yielding%20robust%20gains%20on%20two%20general%20visual%20reasoning%20tasks.%20Source%20code%20is%20available%20at%20https%3A//github.com/xuyige/CrossMath.&entry.1838667208=http%3A//arxiv.org/abs/2604.16256v1&entry.124074799=Read"},
{"title": "Mind's Eye: A Benchmark of Visual Abstraction, Transformation and Composition for Multimodal LLMs", "author": "Rohit Sinha and Aditya Kanade and Sai Srinivas Kancheti and Vineeth N Balasubramanian and Tanuja Ganu", "abstract": "Multimodal large language models (MLLMs) have achieved impressive progress on vision language benchmarks, yet their capacity for visual cognitive and visuospatial reasoning remains less understood. We introduce \"Mind's Eye\", a multiple-choice benchmark of eight visuo-cognitive tasks inspired by classic human intelligence tests and organized under a novel \"A-R-T\" taxonomy: Abstraction, Relation, and Transformation. The tasks probe core processes of fluid intelligence such as pattern induction, analogical relation mapping, and mental transformation. We evaluate a diverse suite of closed-source and open-source MLLMs and compare their performance with human participants. Humans achieve 80% accuracy, while top performing MLLMs remain below 50%. Error analysis reveals failures in: (i) visual attention allocation, (ii) internal perceptual manipulation, and (iii) weak abstraction of underlying visual concepts. Our findings suggest that current MLLMs exhibit limited visuospatial reasoning capabilities, when compared with human participants, highlighting the need for more cognitively grounded evaluation frameworks.", "link": "http://arxiv.org/abs/2604.16054v1", "date": "2026-04-17", "relevancy": 2.9144, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5887}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5887}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec {"title": "Where Do Vision-Language Models Fail? World Scale Analysis for Image Geolocalization", "author": "Siddhant Bharadwaj and Ashish Vashist and Fahimul Aleem and Shruti Vyas", "abstract": "Image geolocalization has traditionally been addressed through retrieval-based place recognition or geometry-based visual localization pipelines. Recent advances in Vision-Language Models (VLMs) have demonstrated strong zero-shot reasoning capabilities across multimodal tasks, yet their performance in geographic inference remains underexplored. In this work, we present a systematic evaluation of multiple state-of-the-art VLMs for country-level image geolocalization using ground-view imagery only. Instead of relying on image matching, GPS metadata, or task-specific training, we evaluate prompt-based country prediction in a zero-shot setting. The selected models are tested on three geographically diverse datasets to assess their robustness and generalization ability. Our results reveal substantial variation across models, highlighting the potential of semantic reasoning for coarse geolocalization and the limitations of current VLMs in capturing fine-grained geographic cues. This study provides the first focused comparison of modern VLMs for country-level geolocalization and establishes a foundation for future research at the intersection of multimodal reasoning and geographic understanding.", "link": "http://arxiv.org/abs/2604.16248v1", "date": "2026-04-17", "relevancy": 2.8725, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5927}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5927}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5381}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Where%20Do%20Vision-Language%20Models%20Fail%3F%20World%20Scale%20Analysis%20for%20Image%20Geolocalization&body=Title%3A%20Where%20Do%20Vision-Language%20Models%20Fail%3F%20World%20Scale%20Analysis%20for%20Image%20Geolocalization%0AAuthor%3A%20Siddhant%20Bharadwaj%20and%20Ashish%20Vashist%20and%20Fahimul%20Aleem%20and%20Shruti%20Vyas%0AAbstract%3A%20Image%20geolocalization%20has%20traditionally%20been%20addressed%20through%20retrieval-based%20place%20recognition%20or%20geometry-based%20visual%20localization%20pipelines.%20Recent%20advances%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20strong%20zero-shot%20reasoning%20capabilities%20across%20multimodal%20tasks%2C%20yet%20their%20performance%20in%20geographic%20inference%20remains%20underexplored.%20In%20this%20work%2C%20we%20present%20a%20systematic%20evaluation%20of%20multiple%20state-of-the-art%20VLMs%20for%20country-level%20image%20geolocalization%20using%20ground-view%20imagery%20only.%20Instead%20of%20relying%20on%20image%20matching%2C%20GPS%20metadata%2C%20or%20task-specific%20training%2C%20we%20evaluate%20prompt-based%20country%20prediction%20in%20a%20zero-shot%20setting.%20The%20selected%20models%20are%20tested%20on%20three%20geographically%20diverse%20datasets%20to%20assess%20their%20robustness%20and%20generalization%20ability.%20Our%20results%20reveal%20substantial%20variation%20across%20models%2C%20highlighting%20the%20potential%20of%20semantic%20reasoning%20for%20coarse%20geolocalization%20and%20the%20limitations%20of%20current%20VLMs%20in%20capturing%20fine-grained%20geographic%20cues.%20This%20study%20provides%20the%20first%20focused%20comparison%20of%20modern%20VLMs%20for%20country-level%20geolocalization%20and%20establishes%20a%20foundation%20for%20future%20research%20at%20the%20intersection%20of%20multimodal%20reasoning%20and%20geographic%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16248v1%0AForm%3A% dern%2520VLMs%2520for%2520country-level%2520geolocalization%2520and%2520establishes%2520a%2520foundation%2520for%2520future%2520research%2520at%2520the%2520intersection%2520of%2520multimodal%2520reasoning%2520and%2520geographic%2520understanding.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16248v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Where%20Do%20Vision-Language%20Models%20Fail%3F%20World%20Scale%20Analysis%20for%20Image%20Geolocalization&entry.906535625=Siddhant%20Bharadwaj%20and%20Ashish%20Vashist%20and%20Fahimul%20Aleem%20and%20Shruti%20Vyas&entry.1292438233=Image%20geolocalization%20has%20traditionally%20been%20addressed%20through%20retrieval-based%20place%20recognition%20or%20geometry-based%20visual%20localization%20pipelines.%20Recent%20advances%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20strong%20zero-shot%20reasoning%20capabilities%20across%20multimodal%20tasks%2C%20yet%20their%20performance%20in%20geographic%20inference%20remains%20underexplored.%20In%20this%20work%2C%20we%20present%20a%20systematic%20evaluation%20of%20multiple%20state-of-the-art%20VLMs%20for%20country-level%20image%20geolocalization%20using%20ground-view%20imagery%20only.%20Instead%20of%20relying%20on%20image%20matching%2C%20GPS%20metadata%2C%20or%20task-specific%20training%2C%20we%20evaluate%20prompt-based%20country%20prediction%20in%20a%20zero-shot%20setting.%20The%20selected%20models%20are%20tested%20on%20three%20geographically%20diverse%20datasets%20to%20assess%20their%20robustness%20and%20generalization%20ability.%20Our%20results%20reveal%20substantial%20variation%20across%20models%2C%20highlighting%20the%20potential%20of%20semantic%20reasoning%20for%20coarse%20geolocalization%20and%20the%20limitations%20of%20current%20VLMs%20in%20capturing%20fine-grained%20geographic%20cues.%20This%20study%20provides%20the%20first%20focused%20comparison%2 {"title": "ChatENV: An Interactive Vision-Language Model for Sensor-Guided Environmental Monitoring and Scenario Simulation", "author": "Hosam Elgendy and Ahmed Sharshar and Ahmed Aboeitta and Mohsen Guizani", "abstract": "Understanding environmental changes from remote sensing imagery is vital for climate resilience, urban planning, and ecosystem monitoring. Yet, current vision language models (VLMs) overlook causal signals from environmental sensors, rely on single-source captions prone to stylistic bias, and lack interactive scenario-based reasoning. We present ChatENV, the first interactive VLM that jointly reasons over satellite image pairs and real-world sensor data. Our framework: (i) creates a 177k-image dataset forming 152k temporal pairs across 62 land-use classes in 197 countries with rich sensor metadata (e.g., temperature, PM10, CO); (ii) annotates data using GPT4o and Gemini 2.0 for stylistic and semantic diversity; and (iii) fine-tunes Qwen-2.5-VL using efficient Low-Rank Adaptation (LoRA) adapters for chat purposes. ChatENV achieves strong performance in temporal and \"what-if\" reasoning (e.g., BERTF1 0.902) and rivals or outperforms state-of-the-art temporal models, while supporting interactive scenario-based analysis. This positions ChatENV as a powerful tool for grounded, sensor-aware environmental monitoring.", "link": "http://arxiv.org/abs/2508.10635v3", "date": "2026-04-17", "relevancy": 2.8404, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5702}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5702}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5639}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ChatENV%3A%20An%20Interactive% {"title": "VeRVE: Versatile Retrieval for Videos via Unified Embeddings", "author": "Shaunak Halbe and Bhagyashree Puranik and Jayakrishnan Unnikrishnan and Kushan Thakkar and Vimal Bhat and Toufiq Parag", "abstract": "Modern video retrieval systems are expected to handle diverse tasks ranging from corpus-level retrieval, fine-grained moment localization to flexible multimodal querying. Specialized architectures achieve strong retrieval performance by training modality-specific encoders on massive datasets, but they lack the ability to process composed multimodal queries. In contrast, multimodal LLM (MLLM)-based methods support rich multimodal search but their retrieval performance remains well below that of specialized systems. We present VeRVE, an MLLM-based versatile video retrieval framework that integrates corpus and moment-level retrieval capabilities while accommodating composed multimodal queries within a single architecture. We use contrastive alignment of visual and textual embeddings generated using a shared MLLM backbone to facilitate efficient embedding-based candidate search. Our embedding model, trained efficiently using low-rank adaptation (LoRA) on 700K paired visual-text data samples, surpasses other MLLM-based methods on zero-shot video retrieval tasks. Additionally, we demonstrate that the same model can be adapted without further training to achieve competitive results on zero-shot moment retrieval, and state of the art results for zero-shot composed video retrieval. With additional training for reranking candidates identified in the embedding-based search, our model substantially outperforms existing MLLM-based retrieval systems and achieves retrieval performance comparable to state of the art specialized models.", "link": "http://arxiv.org/abs/2601.12193v3", "date": "2026-04-17", "relevancy": 2.7769, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5305}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VeRVE%3A%20Versatile%20Retrieval%20for%20Videos%20via%20Unified%20Embeddings&body=Title%3A%20VeRVE%3A%20Versatile%20Retrieval%20for%20Videos%20via%20Unified%20Embeddings%0AAuthor%3A%20Shaunak%20Halbe%20and%20Bhagyashree%20Puranik%20and%20Jayakrishnan%20Unnikrishnan%20and%20Kushan%20Thakkar%20and%20Vimal%20Bhat%20and%20Toufiq%20Parag%0AAbstract%3A%20Modern%20video%20retrieval%20systems%20are%20expected%20to%20handle%20diverse%20tasks%20ranging%20from%20corpus-level%20retrieval%2C%20fine-grained%20moment%20localization%20to%20flexible%20multimodal%20querying.%20Specialized%20architectures%20achieve%20strong%20retrieval%20performance%20by%20training%20modality-specific%20encoders%20on%20massive%20datasets%2C%20but%20they%20lack%20the%20ability%20to%20process%20composed%20multimodal%20queries.%20In%20contrast%2C%20multimodal%20LLM%20%28MLLM%29-based%20methods%20support%20rich%20multimodal%20search%20but%20their%20retrieval%20performance%20remains%20well%20below%20that%20of%20specialized%20systems.%20We%20present%20VeRVE%2C%20an%20MLLM-based%20versatile%20video%20retrieval%20framework%20that%20integrates%20corpus%20and%20moment-level%20retrieval%20capabilities%20while%20accommodating%20composed%20multimodal%20queries%20within%20a%20single%20architecture.%20We%20use%20contrastive%20alignment%20of%20visual%20and%20textual%20embeddings%20generated%20using%20a%20shared%20MLLM%20backbone%20to%20facilitate%20efficient%20embedding-based%20candidate%20search.%20Our%20embedding%20model%2C%20trained%20efficiently%20using%20low-rank%20adaptation%20%28LoRA%29%20on%20700K%20paired%20visual-text%20data%20samples%2C%20surpasses%20other%20MLLM-based%20methods%20on%20zero-shot%20video%20retrieval%20tasks.%20Additionally%2C%20we%20demonstrate%20that%20the%20same%20model%20can%20be%20adapted%20without%20further%20training%20to%20achieve%20competitive%20results%20on%20zero-shot%20moment%20retrieval%2C%20and%20state%20of%20the%20art%20results%20for%20zero-shot%20composed%20video%20retrieval.%20With%20additional%20training%20for%20reranking%20candidates%20identified%20in%20the%20embedding-based%20search%2C%20our%20model%20substantially%20outperforms%20existing%20MLLM-based%20retrieval%20systems%20and%20achieves%20retrieval%20performance%20comparable%20to%20state%20of%20the%20art%20specialized%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2601.12193v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVeRVE%253A%2520Versatile%2520Retrieval%2520for%2520Videos%2520via%2520Unified%2520Embeddings%26entry.906535625%3DShaunak%2520Halbe%2520and%2520Bhagyashree%2520Puranik%2520and%2520Jayakrishnan%2520Unnikrishnan%2520and%2520Kushan%2520Thakkar%2520and%2520Vimal%2520Bhat%2520and%2520Toufiq%2520Parag%26entry.1292438233%3DModern%2520video%2520retrieval%2520systems%2520are%2520expected%2520to%2520handle%2520diverse%2520tasks%2520ranging%2520from%2520corpus-level%2520retrieval%252C%2520fine-grained%2520moment%2520localization%2520to%2520flexible%2520multimodal%2520querying.%2520Specialized%2520architectures%2520achieve%2520strong%2520retrieval%2520performance%2520by%2520training%2520modality-specific%2520encoders%2520on%2520massive%2520datasets%252C%2520but%2520they%2520lack%2520the%2520ability%2520to%2520process%2520composed%2520multimodal%2520queries.%2520In%2520contrast%252C%2520multimodal%2520LLM%2520%2528MLLM%2529-based%2520methods%2520support%2520rich%2520multimodal%2520search%2520but%2520their%2520retrieval%2520performance%2520remains%2520well%2520below%2520that%2520of%2520special {"title": "Information Router for Mitigating Modality Dominance in Vision-Language Models", "author": "Seulgi Kim and Mohit Prabhushankar and Ghassan AlRegib", "abstract": "Vision Language models (VLMs) have demonstrated strong performance across a wide range of benchmarks, yet they often suffer from modality dominance, where predictions rely disproportionately on a single modality. Prior approaches primarily address this issue by steering model's attention allocation, implicitly assuming that all modalities provide sufficient information. However, attention only determines where the model focuses, and cannot enrich information that is missing or ambiguous. In the real world, input modalities often differ in information density and their signal-to-noise ratios. In such cases, simply adjusting model's attention does not resolve the underlying lack of information. In this paper, we propose \\textsc{MoIR}: \\textit{Multi-modal Information Router}, an information-level fusion method that explicitly reduces information disparity prior to fusion. \\textsc{MoIR} identifies less informative tokens and routes complementary information from a stronger modality, constructing information-dense token representations before they are processed by a large language model. By modifying information availability, \\textsc{MoIR} enables reliable shifts in modality dominance, even when one modality is degraded. We evaluate \\textsc{MoIR} on three widely used multi-modal benchmarks across multiple model backbones. Experimental results show that \\textsc{MoIR} consistently demonstrates more balanced modality contribution, and improves robustness and downstream performance, particularly even under modality degradation. These findings demonstrate that explicitly modifying cross-modal information is an effective and complementary strategy for mitigating modality dominance in multi-modal reasoning models.", "link": "http://arxiv.org/abs/2604.16264v1", "date": "2026-04-17", "relevancy": 2.7562, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5532}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5532}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Information%20Router%20for%20Mitigating%20Modality%20Dominance%20in%20Vision-Language%20Models&body=Title%3A%20Information%20Router%20for%20Mitigating%20Modality%20Dominance%20in%20Vision-Language%20Models%0AAuthor%3A%20Seulgi%20Kim%20and%20Mohit%20Prabhushankar%20and%20Ghassan%20AlRegib%0AAbstract%3A%20Vision%20Language%20models%20%28VLMs%29%20have%20demonstrated%20strong%20performance%20across%20a%20wide%20range%20of%20benchmarks%2C%20yet%20they%20often%20suffer%20from%20modality%20dominance%2C%20where%20predictions%20rely%20disproportionately%20on%20a%20single%20modality.%20Prior%20approaches%20primarily%20address%20this%20issue%20by%20steering%20model%27s%20attention%20allocation%2C%20implicitly%20assuming%20that%20all%20modalities%20provide%20sufficient%20information.%20However%2C%20attention%20only%20determines%20where%20the%20model%20focuses%2C%20and%20cannot%20enrich%20information%20that%20is%20missing%20or%20ambiguous.%20In%20the%20real%20world%2C%20input%20modalities%20often%20differ%20in%20information%20density%20and%20their%20signal-to-noise%20ratios.%20In%20such%20cases%2C%20simply%20adjusting%20model%27s%20attention%20does%20not%20resolve%20the%20underlying%20lack%20of%20information.%20In%20this%20paper%2C%20we%20propose%20%5Ctextsc%7BMoIR%7D%3A%20%5Ctextit%7BMulti-modal%20Information%20Router%7D%2C%20an%20information-level%20fusion%20method%20that%20explicitly%20reduces%20information%20disparity%20prior%20to%20 {"title": "VEFX-Bench: A Holistic Benchmark for Generic Video Editing and Visual Effects", "author": "Xiangbo Gao and Sicong Jiang and Bangya Liu and Xinghao Chen and Minglai Yang and Siyuan Yang and Mingyang Wu and Jiongze Yu and Qi Zheng and Haozhi Wang and Jiayi Zhang and Jared Yang and Jie Yang and Zihan Wang and Qing Yin and Zhengzhong Tu", "abstract": "As AI-assisted video creation becomes increasingly practical, instruction-guided video editing has become essential for refining generated or captured footage to meet professional requirements. Yet the field still lacks both a large-scale human-annotated dataset with complete editing examples and a standardized evaluator for comparing editing systems. Existing resources are limited by small scale, missing edited outputs, or the absence of human quality labels, while current evaluation often relies on expensive manual inspection or generic vision-language model judges that are not specialized for editing quality. We introduce VEFX-Dataset, a human-annotated dataset containing 5,049 video editing examples across 9 major editing categories and 32 subcategories, each labeled along three decoupled dimensions: Instruction Following, Rendering Quality, and Edit Exclusivity. Building on VEFX-Dataset, we propose VEFX-Reward, a reward model designed specifically for video editing quality assessment. VEFX-Reward jointly processes the source video, the editing instruction, and the edited video, and predicts per-dimension quality scores via ordinal regression. We further release VEFX-Bench, a benchmark of 300 curated video-prompt pairs for standardized comparison of editing systems. Experiments show that VEFX-Reward aligns more strongly with human judgments than generic VLM judges and prior reward models on both standard IQA/VQA metrics and group-wise preference evaluation. Using VEFX-Reward as an evaluator, we benchmark representative commercial and open-source video editing systems, revealing a persistent gap between visual plausibility, instruction following, and edit locality in current models.", "link": "http://arxiv.org/abs/2604.16272v1", "date": "2026-04-17", "relevancy": 2.7114, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5827}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5221}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5221}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VEFX-Bench%3A%20A%20Holistic%20Benchmark%20for%20Generic%20Video%20Editing%20and%20Visual%20Effects&body=Title%3A%20VEFX-Bench%3A%20A%20Holistic%20Benchmark%20for%20Generic%20Video%20Editing%20and%20Visual%20Effects%0AAuthor%3A%20Xiangbo%20Gao%20and%20Sicong%20Jiang%20and%20Bangya%20Liu%20and%20Xinghao%20Chen%20and%20Minglai%20Yang%20and%20Siyuan%20Yang%20and%20Mingyang%20Wu%20and%20Jiongze%20Yu%20and%20Qi%20Zheng%20and%20Haozhi%20Wang%20and%20Jiayi%20Zhang%20and%20Jared%20Yang%20and%20Jie%20Yang%20and%20Zihan%20Wang%20and%20Qing%20Yin%20and%20Zhengzhong%20Tu%0AAbstract%3A%20As%20AI-assisted%20video%20creation%20becomes%20increasingly%20practical%2C%20instruction-guided%20video%20editing%20has%20become%20essential%20for%20refining%20generated%20or%20captured%20footage%20to%20meet%20professional%20requirements.%20Yet%20the%20field%20still%20lacks%20both%20a%20large-scale%20human-annotated%20dataset%20with%20complete%20editing%20examples%20and%20a%20standardized%20evaluator%20for%20comparing%20editing%20systems.%20Existing%20resources%20are%20limited%20by%20small%20scale%2C%20missing%20edited%20outputs%2C%20or%20the%20absence%20of%20human%20quality%20labels%2C%20while%20current%20evaluation%20often%20relies%20on%20expensive%20manual%20inspection%20or%20generic%20vision-language%20model%20judges%20that%20are%20not%20specialized%20for%20editing%20quality.%20We%20introduce%20VEFX-Dataset%2C%20a%20human-annotated%20dataset%20containing%205%2C049%20video%20editing%20examples%20across%209%20major%20editing%20categories%20and%2032%20subcategories%2C%20each%20labeled%20along%20three%20decoupled%20dimensions%3A%20Instruction%20Following%2C%20Rendering%20Quality%2C%20and%20Edit%20Exclusivity.%20Building%20on%20VEFX-Dataset%2C%20we%20propose%20VEFX-Reward%2C%20a%20reward%20model%20designed%20specifically%20for%20video%20editing%20quality%20assessment.%20VEFX-Reward%20jointly%20processes%20the%20source%20video%2C%20the%20editing%20instruction%2C%20and%20the%20edited%20video%2C%20and%20predicts%20per-dimension%20quality%20scores%20via%20ordinal%20regression.%20We%20further%20release%20VEFX-Bench%2C%20a%20benchmark%20of%20300%20curated%20video-prompt%20pairs%20for%20standardized%20comparison%20of%20editing%20systems.%20Experiments%20show%20that%20VEFX-Reward%20aligns%20more%20strongly%20with%20human%20judgments%20than%20generic%20VLM%20judges%20and%20prior%20reward%20models%20on%20both%20standard%20IQA/VQA%20metrics%20and%20group-wise%20preference%20evaluation.%20Using%20VEFX-Reward%20as%20an%20evaluator%2C%20we%20benchmark%20representative%20commercial%20and%20open-source%20video%20editing%20systems%2C%20revealing%20a%20persistent%20gap%20between%20visual%20plausibility%2C%20instruction%20following%2C%20and%20edit%20locality%20in%20current%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16272v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVEFX-Bench%253A%2520A%2520Holistic%2520Benchmark%2520for%2520Generic%2520Video%2520Editing%2520and%2520Visual%2520Effects%26entry.906535625%3DXiangbo%2520Gao%2520and%2520Sicong%2520Jiang%2520and%2520Bangya%2520Liu%2520and%2520Xinghao%2520Chen%2520and%2520Minglai%2520Yang%2520and%2520Siyuan%2520Yang% {"title": "AstroVLM: Expert Multi-agent Collaborative Reasoning for Astronomical Imaging Quality Diagnosis", "author": "Yaohui Han and Tianshuo Wang and Zixi Zhao and Zhengchun Zhu and Shuo Ren and Yiru Wang and Rongliang Fu and Tinghuan Chen and Tsung-Yi Ho", "abstract": "Vision Language Models (VLMs) have been applied to several specific domains and have shown strong problem-solving capabilities. However, astronomical imaging, a quite complex problem involving multidisciplinary knowledge and several subtasks, has not been adequately studied. Due to the complexity of the astronomical imaging process, both world-class astronomical organizations, such as NASA, and expert enthusiasts devote a great deal of time and effort. This is because the processes in astronomical imaging have complex underlying correlations that significantly influence one another, making the quality diagnosis and error localization of astronomical images challenging. To address this problem, we propose AstroVLM, a collaborative multi-agent system for diagnosing the quality of astronomical images. Experiment results show that AstroVLM outperforms all baselines on real-world astronomical imaging quality diagnosis tasks, providing a reference for language models to handle complicated multi-process tasks.", "link": "http://arxiv.org/abs/2604.16024v1", "date": "2026-04-17", "relevancy": 2.6979, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AstroVLM%3A%20Expert%20Multi-agent%20Collaborative%20Reasoning%20for%20Astronomical%20Imaging%20Quality%20Diagnosis&body=Title%3A%20AstroVLM%3A%20Expert%20Multi-agent%20Collaborative%20Reasoning%20for%20Astronomical%20Imaging%20Quality%20Diagnosis%0AAuthor%3A%20Yaohui%20Han%20and%20Tianshuo%20Wang%20and%20Zixi%20Zhao%20and%20Zhengchun%20Zhu%20and%20Shuo%20Ren%20and%20Yiru%20Wang%20and%20Rongliang%20Fu%20and%20Tinghuan%20Chen%20and%20Tsung-Yi%20Ho%0AAbstract%3A%20Vision%20Language%20Models%20%28VLMs%29%20have%20been%20applied%20to%20several%20specific%20domains%20and%20have%20shown%20strong%20problem-solving%20capabilities.%20However%2C%20astronomical%20imaging%2C%20a%20quite%20complex%20problem%20involving%20multidisciplinary%20knowledge%20and%20several%20subtasks%2C%20has%20not%20been%20adequately%20studied.%20Due%20to%20the%20complexity%20of%20the%20astronomical%20imaging%20process%2C%20both%20world-class%20astronomical%20organizations%2C%20such%20as%20NASA%2C%20and%20expert%20enthusiasts%20devote%20a%20great%20deal%20of%20time%20and%20effort.%20This%20is%20because%20the%20processes%20in%20astronomical%20imaging%20have%20complex%20underlying%20correlations%20that%20significantly%20influence%20one%20another%2C%20making%20the%20quality%20diagnosis%20and%20error%20localization%20of%20astronomical%20images%20challenging.%20To%20address%20this%20problem%2C%20we%20propose%20AstroVLM%2C%20a%20collaborative%20multi-agent%20system%20for%20diagnosing%20the%20quality%20of%20astronomical%20images.%20Experiment%20results%20show%20that%20AstroVLM%20outperforms%20all%20baselines%20on%20real-world%20astronomical%20imaging%20quality%20diagnosis%20tasks%2C%20providing%20a%20reference%20for%20language%20models%20to%20handle%20complicated%20multi-process%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16024v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAstroVLM%253A%2520Expert%2520Multi-agent%2520Collaborative%2520Reasoning%2520for%2520Astronomical%2520Imagin {"title": "Chain-of-Thought Degrades Visual Spatial Reasoning Capabilities of Multimodal LLMs", "author": "Sai Srinivas Kancheti and Aditya Sanjiv Kanade and Vineeth N. Balasubramanian and Tanuja Ganu", "abstract": "Multimodal Reasoning Models (MRMs) leveraging Chain-of-Thought (CoT) based thinking have revolutionized mathematical and logical problem-solving. However, we show that this paradigm struggles with generalized spatial intelligence. We perform a comprehensive evaluation of seventeen models across thirteen spatial benchmarks and identify a critical gap: CoT prompting consistently degrades performance in visual spatial reasoning. Furthermore, through a novel No-Image++ ablation, we demonstrate that MRMs and CoT prompted MLMs suffer from severe shortcut learning, and hallucinate visual details from textual priors even when the image is absent. These findings challenge the efficacy of text-only CoT for spatial tasks and underscore the need for vision-centric reasoning paradigms.", "link": "http://arxiv.org/abs/2604.16060v1", "date": "2026-04-17", "relevancy": 2.668, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5166}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Chain-of-Thought%20Degrades%20Visual%20Spatial%20Reasoning%20Capabilities%20of%20Multimodal%20LLMs&body=Title%3A%20Chain-of-Thought%20Degrades%20Visual%20Spatial%20Reasoning%20Capabilities%20of%20Multimodal%20LLMs%0AAuthor%3A%20Sai%20Srinivas%20Kancheti%20and%20Aditya%20Sanjiv%20Kanade%20and%20Vineeth%20N.%20Balasubramanian%20and%20Tanuja%20Ganu%0AAbstract%3A%20Multimodal%20Reasoning%20Models%20%28MRMs%29%20leveraging%20Chain-of-Thought%20%28CoT%29%20based%20thinking%20have%20revolutionized%20mathematical%20and%20logical%20problem-solving.%20However%2C%20we%20show%20that%20this%20paradigm%20struggles%20with%20generalized%20spatial%20intelligence.%20We%20perform%20a%20comprehensive%20evaluation%20of%20seventeen%20models%20across%20thirteen%20spatial%20benchmarks%20and%20identify%20a%20critical%20gap%3A%20CoT%20prompting%20consistently%20degrades%20performance%20in%20visual%20spatial%20reasoning.%20Furthermore%2C%20through%20a%20novel%20No-Image%2B%2B%20ablation%2C%20we%20demonstrate%20that%20MRMs%20and%20CoT%20prompted%20MLMs%20suffer%20from%20severe%20shortcut%20learning%2C%20and%20hallucinate%20visual%20details%20from%20textual%20priors%20even%20when%20the%20image%20is%20absent.%20These%20findings%20challenge%20the%20efficacy%20of%20text-only%20CoT%20for%20spatial%20tasks%20and%20underscore%20the%20need%20for%20vision-centric%20reasoning%20paradigms.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16060v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChain-of-Thought%2520Degrades%2520Visual%2520Spatial%2520Reasoning%2520Capabilities%2520of%2520Multimodal%2520LLMs%26entry.906535625%3DSai%2520Srinivas%2520Kancheti%2520and%2520Aditya%2520Sanjiv%2520Kanade%2520and%2520Vineeth%2520N.%2520Balasubramanian%2520and%2520Tanuja%2520Ganu%26entry.1292438233%3DMultimodal%2520Reasoning%2520Models%2520%2528MRMs%2529%2520leveraging%2520Chain-of-Thought%2520%2528CoT%2529%2520based%2520thinking%2520have%2520revolutionized%2520mathematical%2520and%2520logical%2520problem-solving.%2520However%252C%2520we%2520show%2520that%2520this%2520paradigm%2520struggles%2520with%2520generalized%2520spatial%2520intelligence.%2520We%2520perform%2520a%2520comprehensive%2520evaluation%2520of%2520seventeen%2520models%2520across%2520thirteen%2520spatial%2520benchmarks%2520and%2520identify%2520a%2520critical%2520gap%253A%2520CoT%2520prompting%2520consistently%2520degrades%2520performance%2520in%2520visual%2520spatial%2520reasoning.%2520Furthermore%252C%2520through%2520a%2520novel%2520No-Image%252B%252B%2520ablation%252C%2520we%2520demonstrate%2520that%2520MRMs%2520and%2520CoT%2520prompted%2520MLMs%2520suffer%2520from%2520severe%2520shortcut%2520learning%252C%2520and%2520hallucinate%2520visual%2520details%2520from%2520textual%2520priors%2520even%2520when%2520the%2520image%2520is%2520absent.%2520These%2520findings%2520challenge%2520the%2520efficacy%2520of%2520text-only%2520CoT%2520for%2520spatial%2520tasks%2520and%2520underscore%2520the%2520need%2520for%2520vision-centric%2520reasoning%2520paradigms.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16060v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Chain-of-Thought%20Degrades%20Visual%20Spatial%20Reasoning%20Capabilities%20of%20Multimodal%20LLMs&entry.906535625=Sai%20Srinivas%20Kancheti%20and%20Aditya%20Sanjiv%20Kanade%20and%20Vineeth%20N.%20Balasubramanian%20and%20Tanuja%20Ganu&entry.1292438233=Multimodal%20Reasoning%20Models%20%28MRMs%29%20leveraging%20Chain-of-Thought%20%28CoT%29%20based%20thinking%20have%20revolutionized%20mathematical%20and%20logical%20problem-solving.%20However%2C%20we%20show%20that%20this%20paradigm%20struggles%20with%20generalized%20spatial%20intelligence.%20We%20perform%20a%20comprehensive%20evaluation%20of%20seventeen%20models%20across%20thirteen%20spatial%20benchmarks%20and%20identify%20a%20critical%20gap%3A%20CoT%20prompting%20consistently%20degrades%20performance%20in%20visual%20spatial%20reasoning.%20Furthermore%2C%20through%20a%20novel%20No-Image%2B%2B%20ablation%2C%20we%20demonstrate%20that%20MRMs%20and%20CoT%20prompted%20MLMs%20suffer%20from%20severe%20shortcut%20learning%2C%20and%20hallucinate%20visual%20details%20from%20textual%20priors%20even%20w {"title": "MMAudioSep: Taming Video-to-Audio Generative Model Towards Video/Text-Queried Sound Separation", "author": "Akira Takahashi and Shusuke Takahashi and Yuki Mitsufuji", "abstract": "We introduce MMAudioSep, a generative model for video/text-queried sound separation that is founded on a pretrained video-to-audio model. By leveraging knowledge about the relationship between video/text and audio learned through a pretrained audio generative model, we can train the model more efficiently, i.e., the model does not need to be trained from scratch. We evaluate the performance of MMAudioSep by comparing it to existing separation models, including models based on both deterministic and generative approaches, and find it is superior to the baseline models. Furthermore, we demonstrate that even after acquiring functionality for sound separation via fine-tuning, the model retains the ability for original video-to-audio generation. This highlights the potential of foundational sound generation models to be adopted for sound-related downstream tasks. Our code is available at https://github.com/sony/mmaudiosep.", "link": "http://arxiv.org/abs/2510.09065v2", "date": "2026-04-17", "relevancy": 2.6311, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5562}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5154}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MMAudioSep%3A%20Taming%20Video-to-Audio%20Generative%20Model%20Towards%20Video/Text-Queried%20Sound%20Separation&body=Title%3A%20MMAudioSep%3A%20Taming%20Video-to-Audio%20Generative%20Model%20Towards%20Video/Text-Queried%20Sound%20Separation%0AAuthor%3A%20Akira%20Takahashi%20and%20Shusuke%20Takahashi%20and%20Yuki%20Mitsufuji%0AAbstract%3A%20We%20introduce%20MMAudioSep%2C%20a%20generative%20model%20for%20video/text-queried%20sound%20separation%20that%20is%20founded%20on%20a%20pretrained%20video-to-audio%20model.%20By%20leveraging%20knowledge%20about%20the%20relationship%20between%20video/text%20and%20audio%20learned%20through%20a%20pretrained%20audio%20generative%20model%2C%20we%20can%20train%20the%20model%20more%20efficiently%2C%20i.e.%2C%20the%20model%20does%20not%20need%20to%20be%20trained%20from%20scratch.%20We%20evaluate%20the%20performance%20of%20MMAudioSep%20by%20comparing%20it%20to%20existing%20separation%20models%2C%20including%20models%20based%20on%20both%20deterministic%20and%20generative%20approaches%2C%20and%20find%20it%20is%20superior%20to%20the%20baseline%20models.%20Furthermore%2C%20we%20demonstrate%20that%20even%20after%20acquiring%20functionality%20for%20sound%20separation%20via%20fine-tuning%2C%20the%20model%20retains%20the%20ability%20for%20original%20video-to-audio%20generation.%20This%20highlights%20the%20potential%20of%20foundational%20sound%20generation%20models%20to%20be%20adopted%20for%20sound-related%20downstream%20tasks.%20Our%20code%20is%20available%20at%20https%3A//github.com/sony/mmaudiosep.%0ALink%3A%20http%3A//arxiv.org/abs/2510.09065v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMMAudioSep%253A%2520Taming%2520Video-to-Audio%2520Generative%2520Model%2520Towards%2520Video/Text-Queried%2520Sound%2520Separation%26entry.906535625%3DAkira%2520Takahashi%2520and%2520Shusuke%2520Takahashi%2520and%2520Yuki%2520Mitsufuji%26entry.1292438233%3DWe%2520introduce%2520MMAudioSep%252C%2520a%2520generative%2520model%2520for%2520video/text-queried%2520sound%2520separation%2520that%2520is%2520founded%2520on%2520a%2520pretrained%2520video-to-audio%2520model.%2520By%2520leveraging%2520knowledge%2520about%2520the%2520relationship%2520between%2520video/text%2520and%2520audio%2520learned%2520through%2520a%2520pretrained%2520audio%2520generative%2520model%252C%2520we%2520can%2520train%2520the%2520model%2520more%2520efficiently%252C%2520i.e.%252C%2520the%2520model%2520does%2520not%2520need%2520to%2520be%2520trained%2520from%2520scratch.%2520We%2520evaluate%2520the%2520performance%2520of%2520MMAudioSep%2520by%2520comparing%2520it%2520to%2520existing%2520separation%2520models%252C%2520including%2520models%2520based%2520on%2520both%2520deterministic%2520and%2520generative%2520approaches%252C%2520and%2520find%2520it%2520is%2520superior%2520to%2520the%2520baseline%2520models.%2520Furthermore%252C%2520we%2520demonstrate%2520that%2520even%2520after%2520acquiring%2520functionality%2520for%2520sound%2520separation%2520via%2520fine-tuning%252C%2520the%2520model%2520retains%2520the%2520ability%2520for%2520original%2520video-to-audio%2520generation.%2520This%2520highlights%2520the%2520potential%2520of%2520foundational%2520sound%2520generation%2520models%2520to%2520be%2520adopted%2520for%2520sound-related%2520downstream%2520tasks.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/sony/mmaudiosep.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.09065v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MMAudioSep%3A%20Taming%20Video-to-Audio%20Generative%20Model%20Towards%20Video/Text-Queried%20Sound%20Separation&entry.906535625=Akira%20Takahashi%20and%20Shusuke%20Takahashi%20and%20Yuki%20Mitsufuji&entry.1292438233=We%20introduce%20MMAudioSep%2C%20a%20generative%20model%20for%20video/text-queried%20sound%20separation%20that%20is%20founded%20on%20a%20pretrained%20video-to-audio%20model.%20By%20leveraging%20knowledge%20about%20the%20relationship%20between%20video/text%20and%20audio%20learned%20through%20a%20pretrained%20audio%20generative%20model%2C%20we%20can%20train%20the%20model%20more%20efficiently%2C% {"title": "Joint-Centric Dual Contrastive Alignment with Structure-Preserving and Information-Balanced Regularization", "author": "Habibeh Naderi and Behrouz Haji Soleimani and Stan Matwin", "abstract": "We propose HILBERT (HIerarchical Long-sequence Balanced Embedding with Reciprocal contrastive Training), a cross-attentive multimodal framework for learning document-level audio-text representations from long, segmented sequences in low-resource data settings. HILBERT leverages frozen pre-trained speech and language encoders to extract segment-level features, which are aggregated via cross-modal attention and self-attentive pooling to form modality-specific document representations and a joint cross-attentive embedding. To align modalities while preserving modality-specific structure under severe audio-text dimensional imbalance, we introduce a reciprocal dual contrastive objective that simultaneously aligns audio-to-joint and text-to-joint representations, rather than directly contrasting audio and text alone. Two auxiliary regularizers further stabilize long-sequence fusion: a Centered Kernel Alignment (CKA) loss that preserves structural consistency between each modality and the joint embedding, and a mutual information balancing loss that prevents dominance of a single modality by equalizing information flow from audio and text into the joint space. For downstream prediction, HILBERT employs a Mixture-of-Experts (MoE) classifier over concatenated audio, text, and joint representations to accommodate heterogeneous label regimes. Extensive evaluation across multiple audio-text backbone combinations demonstrates that HILBERT learns semantically meaningful long-sequence representations and achieves superior performance on highly imbalanced multi-class settings.", "link": "http://arxiv.org/abs/2604.16247v1", "date": "2026-04-17", "relevancy": 2.6289, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5598}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5125}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.505}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Joint-Centric%20Dual%20Contrastive%20Alignment%20with%20Structure-Preserving%20and%20Information-Balanced%20Regularization&body=Title%3A%20Joint-Centric%20Dual%20Contrastive%20Alignment%20with%20Structure-Preserving%20and%20Information-Balanced%20Regularization%0AAuthor%3A%20Habibeh%20Naderi%20and%20Behrouz%20Haji%20Soleimani%20and%20Stan%20Matwin%0AAbstract%3A%20We%20propose%20HILBERT%20%28HIerarchical%20Long-sequence%20Balanced%20Embedding%20with%20Reciprocal%20contrastive%20Training%29%2C%20a%20cross-attentive%20multimodal%20framework%20for%20learning%20document-level%20audio-text%20representations%20from%20long%2C%20segmented%20sequences%20in%20low-resource%20data%20settings.%20HILBERT%20leverages%20frozen%20pre-trained%20speech%20and%20language%20encoders%20to%20extract%20segment-level%20features%2C%20which%20are%20aggregated%20via%20cross-modal%20attention%20and%20self-attentive%20pooling%20to%20form%20modality-specific%20document%20representations%20and%20a%20joint%20cross-attentive%20embedding.%20To%20align%20modalities%20while%20preserving%20modality-specific%20structure%20under%20severe%20audio-text%20dimensional%20imbalance%2C%20we%20introduce%20a%20reciprocal%20dual%20contrastive%20objective%20that%20simultaneously%20aligns%20audio-to-joint%20and%20text-to-joint%20representations%2C%20rather%20than%20directly%20contrasting%20audio%20and%20text%20alone.%20Two%20auxiliary%20regularizers%20further%20stabilize%20long-sequence%20fusion%3A%20a%20Centered%20Kernel%20Alignment%20%28CKA%29%20loss%20that%20preserves%20structural%20consistency%20between%20each%20modality%20and%20the%20joint%20embedding%2C%20and%20a%20mutual%20information%20balancing%20loss%20that%20prevents%20dominance%20of%20a%20single%20modality%20by%20equalizing%20information%20flow%20from%20audio%20and%20text%20into%20the%20joint%20space.%20For%20downstream%20prediction%2C%20HILBERT%20employs%20a%20Mixture-of-Experts%20%28MoE%29%20classifier%20over%20concatenated%20audio%2C%20text%2C%20and%20joint%20representations%20to%20accommodate%20heterogeneous%20label%20regimes.%20Extensive%20evaluation%20across%20multiple%20audio-text%20backbone%20combinations%20demonstrates%20that%20HILBERT%20learns%20semantically%20meaningful%20long-sequence%20representations%20and%20achieves%20superior%20performance%20on%20highly%20imbalanced%20multi-class%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16247v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJoint-Centric%2520Dual%2520Contrastive%2520Alignment%2520with%2520Structure-Preserving%2520and%2520Information-Balanced%2520Regularization%26entry.906535625%3DHabibeh%2520Naderi%2520and%2520Behrouz%2520Haji%2520Soleimani%2520and%2520Stan%2520Matwin%26entry.1292438233%3DWe%2520propose%2520HILBERT%2520%2528HIerarchical%2520Long-sequence%2520Balanced%2520Embedding%2520with%2520Reciprocal%2520contrastive%2520Training%2529%252C%2520a%2520cross-attentive%2520multimodal%2520framework%2520for%2520learning%2520document-level%2520audio-text%2520representations%2520from%2520long%252C%2520segmented%2520sequences%2520in%2520low-resource%2520data%2520settings.%2520HILBERT%2520leverages%2520frozen%2520pre-trained%2520speech%2520and%2520language%2520encoders%2520to%2520extract%2520segment-level%2520features%252C%2520which%2520are%2520aggregated%2520via%2520cross-modal%2520attention%2520and%2520self-attentive%2520pooling%2520to%2520form%2520modality-specific%2520document%2520represent {"title": "Enhancing Visual Representation with Textual Semantics: Textual Semantics-Powered Prototypes for Heterogeneous Federated Learning", "author": "Xinghao Wu and Jianwei Niu and Xuefeng Liu and Guogang Zhu and Jiayuan Zhang and Shaojie Tang and Wei Chen", "abstract": "Federated Prototype Learning (FedPL) has emerged as an effective strategy for handling data heterogeneity in Federated Learning (FL). In FedPL, clients collaboratively construct a set of global feature centers (prototypes), and let local features align with these prototypes to mitigate the effects of data heterogeneity. The performance of FedPL highly depends on the quality of prototypes. Existing methods assume that larger inter-class distances among prototypes yield better performance, and thus design different methods to increase these distances. However, we observe that while these methods increase prototype distances to enhance class discrimination, they inevitably disrupt essential semantic relationships among classes, which are crucial for model generalization. This raises an important question: how to construct prototypes that inherently preserve semantic relationships among classes? Directly learning these relationships from limited and heterogeneous client data can be problematic in FL. Recently, the success of pre-trained language models (PLMs) demonstrates their ability to capture semantic relationships from vast textual corpora. Motivated by this, we propose FedTSP, a novel method that leverages PLMs to construct semantically enriched prototypes from the textual modality, enabling more effective collaboration in heterogeneous data settings. We first use a large language model (LLM) to generate fine-grained textual descriptions for each class, which are then processed by a PLM on the server to form textual prototypes. To address the modality gap between client image models and the PLM, we introduce trainable prompts, allowing prototypes to adapt better to client tasks. Extensive experiments demonstrate that FedTSP mitigates data heterogeneity while significantly accelerating convergence.", "link": "http://arxiv.org/abs/2503.13543v2", "date": "2026-04-17", "relevancy": 2.6266, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5669}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5045}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5045}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Visual%20Representation%20with%20Textual%20Semantics%3A%20Textual%20Semantics-Powered%20Prototypes%20for%20Heterogeneous%20Federated%20Learning&body=Title%3A%20Enhancing%20Visual%20Representation%20with%20Textual%20Semantics%3A%20Textual%20Semantics-Powered%20Prototypes%20for%20Heterogeneous%20Federated%20Learning%0AAuthor%3A%20Xinghao%20Wu%20and%20Jianwei%20Niu%20and%20Xuefeng%20Liu%20and%20Guogang%20Zhu%20and%20Jiayuan%20Zhang%20and%20Shaojie%20Tang%20and%20Wei%20Chen%0AAbstract%3A%20Federated%20Prototype%20Learning%20%28FedPL%29%20has%20emerged%20as%20an%20effective%20strategy%20for%20handling%20data%20heterogeneity%20in%20Federated%20Learning%20%28FL%29.%20In%20FedPL%2C%20clients%20collaboratively%20construct%20a%20set%20of%20global%20feature%20centers%20%28prototypes%29%2C%20and%20let%20local%20features%20align%20with%20these%20prototypes%20to%20mitigate%20the%20effects%20of%20data%20heterogeneity.%20The%20performance%20of%20FedPL%20highly%20depends%20on%20the%20quality%20of%20prototypes.%20Existing%20methods%20assume%20that%20larger%20inter-class%20distances%20among%20prototypes%20yield%20better%20performance%2C%20and%20thus%20design%20different%20methods%20to%20increase%20these%20distances.%20However%2C%20we%20observe%20that%20while%20these%20methods%20increase%20prototype%20distances%20to%20enhance%20class%20discrimination%2C%20they%20inevitably%20disrupt%20essential%20semantic%20relationships%20among%20classes%2C%20which%20are%20crucial%20for%20model%20generalization.%20This%20raises%20an%20important%20question%3A%20how%20to%20construct%20prototypes%20that%20inherently%20preserve%20semantic%20relationships%20among%20classes%3F%20Directly%20learning%20these%20relationships%20from%20limited%20and%20heterogeneous%20client%20data%20can%20be%20problematic%20in%20FL.%20Recently%2C%20the%20success%20of%20pre-trained%20language%20models%20%28PLMs%29%20demonstrates%20their%20ability%20to%20capture%20semantic%20relationships%20from%20vast%20textual%20corpora.%20Motivated%20by%20this%2C%20we%20propose%20FedTSP%2C%20a%20novel%20method%20that%20leverages%20PLMs%20to%20construct%20semantically%20enriched%20prototypes%20from%20the%20textual%20modality%2C%20enabling%20more%20effective%20collaboration%20in%20heterogeneous%20data%20settings.%20We%20first%20use%20a%20large%20language%20model%20%28LLM%29%20to%20generate%20fine-grained%20textual%20descriptions%20for%20each%20class%2C%20which%20are%20then%20processed%20by%20a%20PLM%20on%20the%20server%20to%20form%20textual%20prototypes.%20To%20address%20the%20modality%20gap%20between%20client%20image%20models%20and%20the%20PLM%2C%20we%20introduce%20trainable%20prompts%2C%20allowing%20prototypes%20to%20adapt%20better%20to%20client%20tasks.%20Extensive%20experiments%20demonstrate%20that%20FedTSP%20mitigates%20data%20heterogeneity%20while%20significantly%20accelerating%20convergence.%0ALink%3A%20http%3A//arxiv.org/abs/2503.13543v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Visual%2520Representation%2520with%2520Textual%2520Semantics%253A%2520Textual%2520Semantics-Powered%2520Prototypes%2520for%2520Heterogeneous%2520Federated%2520Learning%26entr {"title": "MARCH: Multi-Agent Radiology Clinical Hierarchy for CT Report Generation", "author": "Yi Lin and Yihao Ding and Yonghui Wu and Yifan Peng", "abstract": "Automated 3D radiology report generation often suffers from clinical hallucinations and a lack of the iterative verification found in human practice. While recent Vision-Language Models (VLMs) have advanced the field, they typically operate as monolithic \"black-box\" systems without the collaborative oversight characteristic of clinical workflows. To address these challenges, we propose MARCH (Multi-Agent Radiology Clinical Hierarchy), a multi-agent framework that emulates the professional hierarchy of radiology departments and assigns specialized roles to distinct agents. MARCH utilizes a Resident Agent for initial drafting with multi-scale CT feature extraction, multiple Fellow Agents for retrieval-augmented revision, and an Attending Agent that orchestrates an iterative, stance-based consensus discourse to resolve diagnostic discrepancies. On the RadGenome-ChestCT dataset, MARCH significantly outperforms state-of-the-art baselines in both clinical fidelity and linguistic accuracy. Our work demonstrates that modeling human-like organizational structures enhances the reliability of AI in high-stakes medical domains.", "link": "http://arxiv.org/abs/2604.16175v1", "date": "2026-04-17", "relevancy": 2.6122, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5269}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5202}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5202}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MARCH%3A%20Multi-Agent%20Radiology%20Clinical%20Hierarchy%20for%20CT%20Report%20Generation&body=Title%3A%20MARCH%3A%20Multi-Agent%20Radiology%20Clinical%20Hierarchy%20for%20CT%20Report%20Generation%0AAuthor%3A%20Yi%20Lin%20and%20Yihao%20Ding%20and%20Yonghui%20Wu%20and%20Yifan%20Peng%0AAbstract%3A%20Automated%203D%20radiology%20report%20generation%20often%20suffers%20from%20clinical%20hallucinations%20and%20a%20lack%20of%20the%20iterative%20verification%20found%20in%20human%20practice.%20While%20recent%20Vision-Language%20Models%20%28VLMs%29%20have%20advanced%20the%20field%2C%20they%20typically%20operate%20as%20monolithic%20%22black-box%22%20systems%20without%20the%20collaborative%20oversight%20characteristic%20of%20clinical%20workflows.%20To%20address%20these%20challenges%2C%20we%20propose%20MARCH%20%28Multi-Agent%20Radiology%20Clinical%20Hierarchy%29%2C%20a%20multi-agent%20framework%20that%20emulates%20the%20professional%20hierarchy%20of%20radiology%20departments%20and%20assigns%20specialized%20roles%20to%20distinct%20agents.%20MARCH%20utilizes%20a%20Resident%20Agent%20for%20initial%20drafting%20with%20multi-scale%20CT%20feature%20extraction%2C%20multiple%20Fellow%20Agents%20for%20retrieval-augmented%20revision%2C%20and%20an%20Attending%20Agent%20that%20orchestrates%20an%20iterative%2C%20stance-based%20consensus%20discourse%20to%20resolve%20diagnostic%20discrepancies.%20On%20the%20RadGenome-ChestCT%20dataset%2C%20MARCH%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20clinical%20fidelity%20and%20linguistic%20accuracy.%20Our%20work%20demonstrates%20that%20modeling%20human-like%20organizational%20structures%20enhances%20the%20reliability%20of%20AI%20in%20high-stakes%20medical%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16175v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMARCH%253A%2520Multi-Agent%2520Radiology%2520Clinical%2520Hierarchy%2520for%2520CT%2520Report%2520Generation%26entry.906535625%3DYi%2520Lin%2520and%2520Yihao%2520Ding%2520and%25 wform?entry.1380929848=MARCH%3A%20Multi-Agent%20Radiology%20Clinical%20Hierarchy%20for%20CT%20Report%20Generation&entry.906535625=Yi%20Lin%20and%20Yihao%20Ding%20and%20Yonghui%20Wu%20and%20Yifan%20Peng&entry.1292438233=Automated%203D%20radiology%20report%20generation%20often%20suffers%20from%20clinical%20hallucinations%20and%20a%20lack%20of%20the%20iterative%20verification%20found%20in%20human%20practice.%20While%20recent%20Vision-Language%20Models%20%28VLMs%29%20have%20advanced%20the%20field%2C%20they%20typically%20operate%20as%20monolithic%20%22black-box%22%20systems%20without%20the%20collaborative%20oversight%20characteristic%20of%20clinical%20workflows.%20To%20address%20these%20challenges%2C%20we%20propose%20MARCH%20%28Multi-Agent%20Radiology%20Clinical%20Hierarchy%29%2C%20a%20multi-agent%20framework%20that%20emulates%20the%20professional%20hierarchy%20of%20radiology%20departments%20and%20assigns%20specialized%20roles%20to%20distinct%20agents.%20MARCH%20utilizes%20a%20Resident%20Agent%20for%20initial%20drafting%20with%20multi-scale%20CT%20feature%20extraction%2C%20multiple%20Fellow%20Agents%20for%20retrieval-augmented%20revision%2C%20and%20an%20Attending%20Agent%20that%20orchestrates%20an%20iterative%2C%20stance-based%20consensus%20discourse%20to%20resolve%20diagnostic%20discrepancies.%20On%20the%20RadGenome-ChestCT%20dataset%2C%20MARCH%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20clinical%20fidelity%20and%20linguistic%20accuracy.%20Our%20work%20demonstrates%20that%20modeling%20human-like%20organizational%20structures%20enhances%20the%20reliability%20of%20AI%20in%20high-stakes%20medical%20domains.&entry.1838667208=http%3A//arxiv.org/abs/2604.16175v1&entry.124074799=Read"},
{"title": "CoMeT: Collaborative Memory Transformer for Efficient Long Context Modeling", "author": "Runsong Zhao and Shilei Liu and Jiwei Tang and Langming Liu and Haibin Chen and Weidong Zhang and Yujin Yuan and Tong Xiao and Jingbo Zhu and Wenbo Su and Bo Zheng", "abstract": "The quadratic complexity and indefinitely growing key-value (KV) cache of standard Transformers pose a major barrier to long-context processing. To overcome this, we introduce the Collaborative Memory Transformer (CoMeT), a novel architecture that enables LLMs to handle arbitrarily long sequences with constant memory usage and linear time complexity. Designed as an efficient, plug-in module, CoMeT can be integrated into pre-trained models with only minimal fine-tuning. It operates on sequential data chunks, using a dual-memory system to manage context: a temporary memory on a FIFO queue for recent events, and a global memory with a gated update rule for long-range dependencies. These memories then act as a dynamic soft prompt for the next chunk. To enable efficient fine-tuning on extremely long contexts, we introduce a novel layer-level pipeline parallelism strategy. The effectiveness of our approach is remarkable: a model equipped with CoMeT and fine-tuned on 32k contexts can accurately retrieve a passkey from any position within a 1M token sequence. On the SCROLLS benchmark, CoMeT surpasses other efficient methods and achieves performance comparable to a full-attention baseline on summarization tasks. Its practical effectiveness is further validated on real-world agent and user behavior QA tasks. The code is available at: https://github.com/LivingFutureLab/Comet", "link": "http://arxiv.org/abs/2602.01766v2", "date": "2026-04-17", "relevancy": 2.5568, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5367}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4987}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4987}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoMeT%3A%20Collaborative%20Memory%20Transformer%20for%20Efficient%20Long%20Context%20Modeling&body=Title%3A%20CoMeT%3A%20Collaborative%20Memory%20Transformer%20for%20Efficient%20Long%20Context%20Modeling%0AAuthor%3A%20Runsong%20Zhao%20and%20Shilei%20Liu%20and%20Jiwei%20Tang%20and%20Langming%20Liu%20and%20Haibin%20Chen%20and%20Weidong%20Zhang%20and%20Yujin%20Yuan%20and%20Tong%20Xiao%20and%20Jingbo%20Zhu%20and%20Wenbo%20Su%20and%20Bo%20Zheng%0AAbstract%3A%20The%20quadratic%20complexity%20and%20indefinitely%20growing%20key-value%20%28KV%29%20cache%20of%20standard%20Transformers%20pose%20a%20major%20barrier%20to%20long-context%20processing.%20To%20overcome%20this%2C%20we%20introduce%20the%20Collaborative%20Memory%20Transformer%20%28CoMeT%29%2C%20a%20novel%20architecture%20that%20enables%20LLMs%20to%20handle%20arbitrarily%20long%20sequences%20with%20constant%20memory%20usage%20and%20linear%20time%20complexity.%20Designed%20as%20an%20efficient%2C%20plug-in%20module%2C%20CoMeT%20can%20be%20integrated%20into%20pre-trained%20models%20with%20only%20minimal%20fine-tuning.%20It%20operates%20on%20sequential%20data%20chunks%2C%20using%20a%20dual-memory%20system%20to%20manage%20context%3A%20a%20temporary%20memory%20on%20a%20FIFO%20queue%20for%20recent%20events%2C%20and%20a%20global%20memory%20with%20a%20gated%20update%20rule%20for%20long-range%20dependencies.%20These%20memories%20then%20act%20as%20a%20dynamic%20soft%20prompt%20for%20the%20next%20chunk.%20To%20enable%20efficient%20fine-tuning%20on%20extremely%20long%20contexts%2C%20we%20introduce%20a%20novel%20layer-level%20pipeline%20parallelism%20strategy.%20The%20effectiveness%20of%20our%20approach%20is%20remarkable%3A%20a%20model%20equipped%20with%20CoMeT%20and%20fine-tuned%20on%2032k%20contexts%20can%20accurately%20retrieve%20a%20passkey%20from%20any%20position%20within%20a%201M%20token%20sequence.%20On%20the%20SCROLLS%20benchmark%2C%20CoMeT%20surpasses%20other%20efficient%20methods%20and%20achieves%20performance%20comparable%20to%20a%20full-attention%20baseline%20on%20summarization%20tasks.%20Its%20practical%20effectiveness%20is%20further%20validated%20on%20real-world%20agent%20and%20user%20behavior%20QA%20tasks.%20The%20code%20is%20available%20at%3A%20https%3A//github.com/LivingFutureLab/Comet%0ALink%3A%20http%3A//arxiv.org/abs/2602.01766v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoMeT%253A%2520Collaborative%2520Memory%2520Transformer%2520for%2520Efficient%2520Long%2520Context%2520Modeling%26entry.906535625%3DRunsong%2520Zhao%2520and%2520Shilei%2520Liu%2520and%2520Jiwei%2520Tang%2520and%2520Langming%2520Liu%2520and%2520Haibin%2520Chen%2520and%2520Weidong%2520Zhang%2520and%2520Yujin%2520Yuan%2520and%2520Tong%2520Xiao%2520and%2520Jingbo%2520Zhu%2520and%2520Wenbo%2520Su%2520and%2520Bo%2520Zheng%26entry.1292438233%3DThe%2520quadratic%2520complexity%2520and%2520indefinitely%2520growing%2520key-value%2520%2528KV%2529%2520cache%2520of%2520standard%2520Transformers%2520pose%2520a%2520major%2520barrier%2520to%2520long-context%2520processing.%2520To%2520overcome%2520this%252C%2520we%2520introduce%2520the%2520Collaborative%2520Memory%2520Transformer%2520%2528CoMeT%2529%252C%2520a%2520novel%2520architecture%2520that%2520enables%2520LLMs%2520to%2520handle%2520arbitrarily%2520long%2520sequences%2520with%2520constant%2520memory%2520usage%2520and%2520linear%2520time%2520complexity.%2520Designed%2520as%2520an%2520efficient%252C%2520plug-in%2520module%252C%2520CoMeT%2520can%2520be%2520integrated%2520into%2520pre-trained%2520models%2520with%2520only%2520minimal%2520fine-tuning.%2520It%2520operates%2520on%2520se

{"title": "A Tale of Two Learning Algorithms: Multiple Stream Random Walk and Asynchronous Gossip", "author": "Peyman Gholami and Hulya Seferoglu", "abstract": "Although gossip and random walk-based learning algorithms are widely known for decentralized learning, there has been limited theoretical and experimental analysis to understand their relative performance for different graph topologies and data heterogeneity. We first design and analyze a random walk-based learning algorithm with multiple streams (walks), which we name asynchronous \"Multi-Walk (MW)\". We provide a convergence analysis for MW w.r.t iteration (computation), wall-clock time, and communication. We also present a convergence analysis for \"Asynchronous Gossip\", noting the lack of a comprehensive analysis of its convergence, along with the computation and communication overhead, in the literature. Our results show that MW has better convergence in terms of iterations as compared to Asynchronous Gossip in graphs with large diameters (e.g., cycles), while its relative performance, as compared to Asynchronous Gossip, depends on the number of walks and the data heterogeneity in graphs with small diameters (e.g., complete graphs). In wall-clock time analysis, we observe a linear speed-up with the number of walks and nodes in MW and Asynchronous Gossip, respectively. Finally, we show that MW outperforms Asynchronous Gossip in communication overhead, except in small-diameter topologies with extreme data heterogeneity. These results highlight the effectiveness of each algorithm in different graph topologies and data heterogeneity. Our codes are available for reproducibility.", "link": "http://arxiv.org/abs/2504.09792v2", "date": "2026-04-17", "relevancy": 1.6909, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4377}, {"title": "Dynamic Gaussians Mesh: Consistent mall%20diameters%20%28e.g.%2C%20complete%20graphs%29.%20In%20wall-clock%20time%20analysis%2C%20we%20observe%20a%20linear%20speed-up%20with%20the%20number%20of%20walks%20and%20nodes%20in%20MW%20and%20Asynchronous%20Gossip%2C%20respectively.%20Finally%2C%20we%20show%20that%20MW%20outperforms%20Asynchronous%20Gossip%20in%20communication%20overhead%2C%20except%20in%20small-diameter%20topologies%20with%20extreme%20data%20heterogeneity.%20These%20results%20highlight%20the%20effectiveness%20of%20each%20algorithm%20in%20different%20graph%20topologies%20and%20data%20heterogeneity.%20Our%20codes%20are%20available%20for%20reproducibility.%0ALink%3A%20http%3A//arxiv.org/abs/2504.09792v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Tale%2520of%2520Two%2520Learning%2520Algorithms%253A%2520Multiple%2520Stream%2520Random%2520Walk%2520and%2520Asynchronous%2520Gossip%26entry.906535625%3DPeyman%2520Gholami%2520and%2520Hulya%2520Seferoglu%26entry.1292438233%3DAlthough%2520gossip%2520and%2520random%2520walk-based%2520learning%2520algorithms%2520are%2520widely%2520known%2520for%2520decentralized%2520learning%252C%2520there%2520has%2520been%2520limited%2520theoretical%2520and%2520experimental%2520analysis%2520to%2520understand%2520their%2520relative%2520performance%2520for%2520different%2520graph%2520topologies%2520and%2520data%2520heterogeneity.%2520We%2520first%2520design%2520and%2520analyze%2520a%2520random%2520walk-based%2520learning%2520algorithm%2520with%2520multiple%2520streams%2520%2528walks%2529%252C%2520which%2520we%2520name%2520asynchronous%2520%2522Multi-Walk%2520%2528MW%2529%2522.%2520We%2520provide%2520a%2520convergence%2520analysis%2520for%2520MW%2520w.r.t%2520iteration%2520%2528computation%2529%252C%2520wall-clock%2520time%252C%2520and%2520communication.%2520We%2520also%2520present%2520a%2520convergence%2520analysis%2520for%2520%2522Asynchronous%2520Gossip%2522%252C%2520noting%2 {"title": "Integrating Graphs, Large Language Models, and Agents: Reasoning and Retrieval", "author": "Hamed Jelodar and Samita Bai and Mohammad Meymani and Parisa Hamedi and Roozbeh Razavi-Far and Ali Ghorbani", "abstract": "Generative AI, particularly Large Language Models, increasingly integrates graph-based representations to enhance reasoning, retrieval, and structured decision-making. Despite rapid advances, there remains limited clarity regarding when, why, where, and what types of graph-LLM integrations are most appropriate across applications. This survey provides a concise, structured overview of the design choices underlying the integration of graphs with LLMs. We categorize existing methods based on their purpose (reasoning, retrieval, generation, recommendation), graph modality (knowledge graphs, scene graphs, interaction graphs, causal graphs, dependency graphs), and integration strategies (prompting, augmentation, training, or agent-based use). By mapping representative works across domains such as cybersecurity, healthcare, materials science, finance, robotics, and multimodal environments, we highlight the strengths, limitations, and best-fit scenarios for each technique. This survey aims to offer researchers a practical guide for selecting the most suitable graph-LLM approach depending on task requirements, data characteristics, and reasoning complexity.", "link": "http://arxiv.org/abs/2604.15951v1", "date": "2026-04-17", "relevancy": 1.9385, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5135}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4788}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4788}], "ma       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

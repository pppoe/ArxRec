{"title": "StreamCacheVGGT: Streaming Visual Geometry Transformers with Robust Scoring and Hybrid Cache Compression", "author": "Xuanyi Liu and Chunan Yu and Deyi Ji and Qi Zhu and Lingyun Sun and Xuanfu Li and Jin Ma and Tianrun Chen and Lanyun Zhu", "abstract": "Reconstructing dense 3D geometry from continuous video streams requires stable inference under a constant memory budget. Existing $O(1)$ frameworks primarily rely on a ``pure eviction'' paradigm, which suffers from significant information destruction due to binary token deletion and evaluation noise from localized, single-layer scoring. To address these bottlenecks, we propose StreamCacheVGGT, a training-free framework that reimagines cache management through two synergistic modules: Cross-Layer Consistency-Enhanced Scoring (CLCES) and Hybrid Cache Compression (HCC). CLCES mitigates activation noise by tracking token importance trajectories across the Transformer hierarchy, employing order-statistical analysis to identify sustained geometric salience. Leveraging these robust scores, HCC transcends simple eviction by introducing a three-tier triage strategy that merges moderately important tokens into retained anchors via nearest-neighbor assignment on the key-vector manifold. This approach preserves essential geometric context that would otherwise be lost. Extensive evaluations on five benchmarks (7-Scenes, NRGBD, ETH3D, Bonn, and KITTI) demonstrate that StreamCacheVGGT sets a new state-of-the-art, delivering superior reconstruction accuracy and long-term stability while strictly adhering to constant-cost constraints.", "link": "http://arxiv.org/abs/2604.15237v2", "date": "2026-04-17", "relevancy": 2.382, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6059}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6002}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20StreamCacheVGGT%3A%20Streaming%20Visual%20Geometry%20Transformers%20with%20Robust%20Scoring%20and%20Hybrid%20Cache%20Compression&body=Title%3A%20StreamCacheVGGT%3A%20Streaming%20Visual%20Geometry%20Transformers%20with%20Robust%20Scoring%20and%20Hybrid%20Cache%20Compression%0AAuthor%3A%20Xuanyi%20Liu%20and%20Chunan%20Yu%20and%20Deyi%20Ji%20and%20Qi%20Zhu%20and%20Lingyun%20Sun%20and%20Xuanfu%20Li%20and%20Jin%20Ma%20and%20Tianrun%20Chen%20and%20Lanyun%20Zhu%0AAbstract%3A%20Reconstructing%20dense%203D%20geometry%20from%20continuous%20video%20streams%20requires%20stable%20inference%20under%20a%20constant%20memory%20budget.%20Existing%20%24O%281%29%24%20frameworks%20primarily%20rely%20on%20a%20%60%60pure%20eviction%27%27%20paradigm%2C%20which%20suffers%20from%20significant%20information%20destruction%20due%20to%20binary%20token%20deletion%20and%20evaluation%20noise%20from%20localized%2C%20single-layer%20scoring.%20To%20address%20these%20bottlenecks%2C%20we%20propose%20StreamCacheVGGT%2C%20a%20training-free%20framework%20that%20reimagines%20cache%20management%20through%20two%20synergistic%20modules%3A%20Cross-Layer%20Consistency-Enhanced%20Scoring%20%28CLCES%29%20and%20Hybrid%20Cache%20Compression%20%28HCC%29.%20CLCES%20mitigates%20activation%20noise%20by%20tracking%20token%20importance%20trajectories%20across%20the%20Transformer%20hierarchy%2C%20employing%20order-statistical%20analysis%20to%20identify%20sustained%20geometric%20salience.%20Leveraging%20these%20robust%20scores%2C%20HCC%20transcends%20simple%20eviction%20by%20introducing%20a%20three-tier%20triage%20strategy%20that%20merges%20moderately%20important%20tokens%20into%20retained%20anchors%20via%20nearest-neighbor%20assignment%20on%20the%20key-vector%20manifold.%20This%20approach%20preserves%20essential%20geometric%20context%20that%20would%20otherwise%20be%20lost.%20Extensive%20evaluations%20on%20five%20benchmarks%20%287-Scenes%2C%20NRGBD%2C%20ETH3D%2C%20Bonn%2C%20and%20KITTI%29%20demonstrate%20that%20StreamCacheVGGT%20sets%20a%20new%20state-of-the-art%2C%20delivering%20superior%20reconstruction%20accuracy%20and%20long-term%20stability%20while%20strictly%20adhering%20to%20constant-cost%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15237v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStreamCacheVGGT%253A%2520Streaming%2520Visual%2520Geometry%2520Transformers%2520with%2520Robust%2520Scoring%2520and%2520Hybrid%2520Cache%2520Compression%26entry.906535625%3DXuanyi%2520Liu%2520and%2520Chunan%2520Yu%2520and%2520Deyi%2520Ji%2520and%2520Qi%2520Zhu%2520and%2520Lingyun%2520Sun%2520and%2520Xuanfu%2520Li%2520and%2520Jin%2520Ma%2520and%2520Tianrun%2520Chen%2520and%2520Lanyun%2520Zhu%26entry.1292438233%3DReconstructing%2520dense%25203D%2520geometry%2520from%2520continuous%2520video%2520streams%2520requires%2520stable%2520inference%2520under%2520a%2520constant%2520memory%2520budget.%2520Existing%2520%2524O%25281%2529%2524%2520frameworks%2520primarily%2520rely%2520on%2520a%2520%2560%2560pure%2520eviction%2527%2527%2520paradigm%252C%2520which%2520suffers%2520from%2520significant%2520information%2520destruction%2520due%2520to%2520binary%2520token%2520deletion%2520and%2520evaluation%2520noise%2520from%2520localized%252C%2520single-layer%2520scoring.%2520To%2520address%2520these%2520bottlenecks%252C%2520we%2520propose%2520StreamCacheVGGT%252C%2520a%2520training-free%2520framework%2520that%2520reimagines%2520cache%2520management%2520through%2520two%2520synergistic%2520modules%253A%2520Cross-Layer%2520Consistency-Enhanced%2520Scoring%2520%2528CLCES%2529%2520and%2520Hybrid%2520Cache%2520Compression%2520%2528HCC%2529.%2520CLCES%2520mitigates%2520activation%2520noise% {"title": "TabularMath: Understanding Math Reasoning over Tables with Large Language Models", "author": "Shi-Yu Tian and Zhi Zhou and Wei Dong and Kun-Yang Yu and Ming Yang and Zi-Jian Cheng and Lan-Zhe Guo and Yu-Feng Li", "abstract": "Mathematical reasoning has long been a key benchmark for evaluating large language models. Although substantial progress has been made on math word problems, the need for reasoning over tabular data in real-world applications has been overlooked. For instance, applications such as business intelligence demand not only multi-step numerical reasoning with tables but also robustness to incomplete or inconsistent information. However, comprehensive evaluation in this area is severely limited, constrained by the reliance on manually collected tables that are difficult to scale and the lack of coverage for potential traps encountered in real-world scenarios. To address this problem, we propose AutoT2T, a neuro-symbolic framework that controllably transforms math word problems into scalable and verified tabular reasoning tasks. Building on this pipeline, we develop TabularMath, a benchmark comprising four subsets that include both text-based and image-based tables, covering table complexity, table quality, and table representation dimensions. Our study reveals three key observations: (1) Table complexity and reasoning difficulty impact reasoning performance jointly; (2) Low-quality tables pose severe risks to reliable reasoning in current LLMs; (3) Different table modalities show similar trends, with text-based tables typically being easier for models to reason over. In-depth analyses are conducted for each observation to guide future research.", "link": "http://arxiv.org/abs/2505.19563v4", "date": "2026-04-17", "relevancy": 2.381, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4796}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4796}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4694}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TabularMath%3A%20Understanding%20Math%20Reasoning%20over%20Tables%20with%20Large%20Language%20Models&body=Title%3A%20TabularMath%3A%20Understanding%20Math%20Reasoning%20over%20Tables%20with%20Large%20Language%20Models%0AAuthor%3A%20Shi-Yu%20Tian%20and%20Zhi%20Zhou%20and%20Wei%20Dong%20and%20Kun-Yang%20Yu%20and%20Ming%20Yang%20and%20Zi-Jian%20Cheng%20and%20Lan-Zhe%20Guo%20and%20Yu-Feng%20Li%0AAbstract%3A%20Mathematical%20reasoning%20has%20long%20been%20a%20key%20benchmark%20for%20evaluating%20large%20language%20models.%20Although%20substantial%20progress%20has%20been%20made%20on%20math%20word%20problems%2C%20the%20need%20for%20reasoning%20over%20tabular%20data%20in%20real-world%20applications%20has%20been%20overlooked.%20For%20instance%2C%20applications%20such%20as%20business%20intelligence%20demand%20not%20only%20multi-step%20numerical%20reasoning%20with%20tables%20but%20also%20robustness%20to%20incomplete%20or%20inconsistent%20information.%20However%2C%20comprehensive%20evaluation%20in%20this%20area%20is%20severely%20limited%2C%20constrained%20by%20the%20reliance%20on%20manually%20collected%20tables%20that%20are%20difficult%20to%20scale%20and%20the%20lack%20of%20coverage%20for%20potential%20traps%20encountered%20in%20real-world%20scenarios.%20To%20address%20this%20problem%2C%20we%20propose%20AutoT2T%2C%20a%20neuro-symbolic%20framework%20that%20controllably%20transforms%20math%20word%20problems%20into%20scalable%20and%20verified%20tabular%20reasoning%20tasks.%20Building%20on%20this%20pipeline%2C%20we%20develop%20TabularMath%2C%20a%20benchmark%20comprising%20four%20subsets%20that%20include%20both%20text-based%20and%20image-based%20tables%2C%20covering%20table%20complexity%2C%20table%20quality%2C%20and%20table%20representation%20dimensions.%20Our%20study%20reveals%20three%20key%20observations%3A%20%281%29%20Table%20complexity%20and%20reasoning%20difficulty%20impact%20reasoning%20performance%20jointly%3B%20%282%29%20Low-quality%20tables%20pose%20severe%20risks%20to%20reliable%20reasoning%20in%20current%20LLMs%3B%20%283%29%20Different%20table%20modalities%20show%20similar%20trends%2C%20with%20text-based%20tables%20typically%20being%20easier%20for%20models%20to%20reason%20over.%20In-depth%20analyses%20are%20conducted%20for%20each%20observation%20to%20guide%20future%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2505.19563v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTabularMath%253A%2520Understanding%2520Math%2520Reasoning%2520over%2520Tables%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DShi-Yu%2520Tian%2520and%2520Zhi%2520Zhou%2520and%2520Wei%2520Dong%2520and%2520Kun-Yang%2520Yu%2520and%2520Ming%2520Yang%2520and%2520Zi-Jian%2520Cheng%2520and%2520Lan-Zhe%2520Guo%2520and%2520Yu-Feng%2520Li%26entry.1292438233%3DMathematical%2520reasoning%2520has%2520long%2520been%2520a%2520key%2520benchmark%2520for%2520evaluating%2520large%2520language%2520models.%2520Although%2520substantial%2520progress%2520has%2520been%2520made%2520on%2520math%2520word%2520problems%252C%2520the%2520need%2520for%2520reasoning%2520over%2520tabular%2520data%2520in%2520real-world%2520applications%2520has%2520been%2520overlooked.%2520For%2520instance%252C%2520applications%2520such%2520as%2520business%2520intelligence%2520demand%2520not%2520only%2520multi-step%2520numerical%2520reasoning%2520with%2520tables%2520but%2520also%2520robustness%2520to%2520incomplete%2520or%2520inconsistent%2520information.%2520However%252C%2520comprehensive%2520evaluation%2520in%2520this%2520area%2520is%2520severely%2520limited%252C%2520constrained%2520b {"title": "Hierarchical Codec Diffusion for Video-to-Speech Generation", "author": "Jiaxin Ye and Gaoxiang Cong and Chenhui Wang and Xin-Cheng Wen and Zhaoyang Li and Boyuan Cao and Hongming Shan", "abstract": "Video-to-Speech (VTS) generation aims to synthesize speech from a silent video without auditory signals. However, existing VTS methods disregard the hierarchical nature of speech, which spans coarse speaker-aware semantics to fine-grained prosodic details. This oversight hinders direct alignment between visual and speech features at specific hierarchical levels during property matching. In this paper, leveraging the hierarchical structure of Residual Vector Quantization (RVQ)-based codec, we propose HiCoDiT, a novel Hierarchical Codec Diffusion Transformer that exploits the inherent hierarchy of discrete speech tokens to achieve strong audio-visual alignment. Specifically, since lower-level tokens encode coarse speaker-aware semantics and higher-level tokens capture fine-grained prosody, HiCoDiT employs low-level and high-level blocks to generate tokens at different levels. The low-level blocks condition on lip-synchronized motion and facial identity to capture speaker-aware content, while the high-level blocks use facial expression to modulate prosodic dynamics. Finally, to enable more effective coarse-to-fine conditioning, we propose a dual-scale adaptive instance layer normalization that jointly captures global vocal style through channel-wise normalization and local prosody dynamics through temporal-wise normalization. Extensive experiments demonstrate that HiCoDiT outperforms baselines in fidelity and expressiveness, highlighting the potential of discrete modelling for VTS. The code and speech demo are both available at https://github.com/Jiaxin-Ye/HiCoDiT.", "link": "http://arxiv.org/abs/2604.15923v1", "date": "2026-04-17", "relevancy": 2.3805, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6274}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5763}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5704}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20Codec%20Diffusion%20for%20Video-to-Speech%20Generation&body=Title%3A%20Hierarchical%20Codec%20Diffusion%20for%20Video-to-Speech%20Generation%0AAuthor%3A%20Jiaxin%20Ye%20and%20Gaoxiang%20Cong%20and%20Chenhui%20Wang%20and%20Xin-Cheng%20Wen%20and%20Zhaoyang%20Li%20and%20Boyuan%20Cao%20and%20Hongming%20Shan%0AAbstract%3A%20Video-to-Speech%20%28VTS%29%20generation%20aims%20to%20synthesize%20speech%20from%20a%20silent%20video%20without%20auditory%20signals.%20However%2C%20existing%20VTS%20methods%20disregard%20the%20hierarchical%20nature%20of%20speech%2C%20which%20spans%20coarse%20speaker-aware%20semantics%20to%20fine-grained%20prosodic%20details.%20This%20oversight%20hinders%20direct%20alignment%20between%20visual%20and%20speech%20features%20at%20specific%20hierarchical%20levels%20during%20property%20matching.%20In%20this%20paper%2C%20leveraging%20the%20hierarchical%20structure%20of%20Residual%20Vector%20Quantization%20%28RVQ%29-based%20codec%2C%20we%20propose%20HiCoDiT%2C%20a%20novel%20Hierarchical%20Codec%20Diffusion%20Transformer%20that%20exploits%20the%20inherent%20hierarchy%20of%20discrete%20speech%20tokens%20to%20achieve%20strong%20audio-visual%20alignment.%20Specifically%2C%20since%20lower-level%20tokens%20encode%20coarse%20speaker-aware%20semantics%20and%20higher-level%20tokens%20capture%20fine-grained%20prosody%2C%20HiCoDiT%20employs%20low-level%20and%20high-level%20blocks%20to%20generate%20tokens%20at%20different%20levels.%20The%20low-level%20blocks%20condition%20on%20lip-synchronized%20motion%20and%20facial%20identity%20to%20capture%20speaker-aware%20content%2C%20while%20the%20high-level%20blocks%20use%20facial%20expression%20to%20modulate%20prosodic%20dynamics.%20Finally%2C%20to%20enable%20more%20effective%20coarse-to-fine%20conditioning%2C%20we%20propose%20a%20dual-scale%20adaptive%20instance%20layer%20normalization%20that%20jointly%20captures%20global%20vocal%20style%20through%20channel-wise%20normalization%20and%20local%20prosody%20dynamics%20through%20temporal-wise%20normalization.%20Extensive%20experiments%20demonstrate%20that%20HiCoDiT%20outperforms%20baselines%20in%20fidelity%20and%20expressiveness%2C%20highlighting%20the%20potential%20of%20discrete%20modelling%20for%20VTS.%20The%20code%20and%20speech%20demo%20are%20both%20available%20at%20https%3A//github.com/Jiaxin-Ye/HiCoDiT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15923v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520Codec%2520Diffusion%2520for%2520Video-to-Speech%2520Generation%26entry.906535625%3DJiaxin%2520Ye%2520and%2520Gaoxiang%2520Cong%2520and%2520Chenhui%2520Wang%2520and%2520Xin-Cheng%2520Wen%2520and%2520Zhaoyang%2520Li%2520and%2520Boyuan%2520Cao%2520and%2520Hongming%2520Shan%26entry.1292438233%3DVideo-to-Speech%2520%2528VTS%2529%2520generation%2520aims%2520to%2520synthesize%2520speech%2520from%2520a%2520silent%2520video%2520without%2520auditory%2520signals.%2520However%252C%2520existing%2520VTS%2520methods%2520disregard%2520the%2520hierarchical%2520nature%2520of%2520speech%252C%2520which%2520spans%2520coarse%2520speaker-aware%2520semantics%2520to%2520fine-grained%2520prosodic%2520details.%2520This%2520oversight%2520hinders%2520direct%2520alignment%2520between%2520visual%2520and%2520speech%2520features%2520at%2520specific%2520hierarchical%2520levels%2520during%2520property%2520matching.%2520In%2520this%2520paper%252C%2520leveraging%2520the%2520hierarchical%2520structure%2520of%2520Residual%2520Vector%2520Quanti {"title": "SENSE: Stereo OpEN Vocabulary SEmantic Segmentation", "author": "Thomas Campagnolo and Ezio Malis and Philippe Martinet and Ga\u00e9tan Bahl", "abstract": "Open-vocabulary semantic segmentation enables models to segment objects or image regions beyond fixed class sets, offering flexibility in dynamic environments. However, existing methods often rely on single-view images and struggle with spatial precision, especially under occlusions and near object boundaries. We propose SENSE, the first work on Stereo OpEN Vocabulary SEmantic Segmentation, which leverages stereo vision and vision-language models to enhance open-vocabulary semantic segmentation. By incorporating stereo image pairs, we introduce geometric cues that improve spatial reasoning and segmentation accuracy. Trained on the PhraseStereo dataset, our approach achieves strong performance in phrase-grounded tasks and demonstrates generalization in zero-shot settings. On PhraseStereo, we show a +2.9% improvement in Average Precision over the baseline method and +0.76% over the best competing method. SENSE also provides a relative improvement of +3.5% mIoU on Cityscapes and +18% on KITTI compared to the baseline work. By jointly reasoning over semantics and geometry, SENSE supports accurate scene understanding from natural language, essential for autonomous robots and Intelligent Transportation Systems.", "link": "http://arxiv.org/abs/2604.15946v1", "date": "2026-04-17", "relevancy": 2.3604, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5994}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5994}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SENSE%3A%20Stereo%20OpEN%20Vocabulary%20SEmantic%20Segmentation&body=Title%3A%20SENSE%3A%20Stereo%20OpEN%20Vocabulary%20SEmantic%20Segmentation%0AAuthor%3A%20Thomas%20Campagnolo%20and%20Ezio%20Malis%20and%20Philippe%20Martinet%20and%20Ga%C3%A9tan%20Bahl%0AAbstract%3A%20Open-vocabulary%20semantic%20segmentation%20enables%20models%20to%20segment%20objects%20or%20image%20regions%20beyond%20fixed%20class%20sets%2C%20offering%20flexibility%20in%20dynamic%20environments.%20However%2C%20existing%20methods%20often%20rely%20on%20single-view%20images%20and%20struggle%20with%20spatial%20precision%2C%20especially%20under%20occlusions%20and%20near%20object%20boundaries.%20We%20propose%20SENSE%2C%20the%20first%20work%20on%20Stereo%20OpEN%20Vocabulary%20SEmantic%20Segmentation%2C%20which%20leverages%20stereo%20vision%20and%20vision-language%20models%20to%20enhance%20open-vocabulary%20semantic%20segmentation.%20By%20incorporating%20stereo%20image%20pairs%2C%20we%20introduce%20geometric%20cues%20that%20improve%20spatial%20reasoning%20and%20segmentation%20accuracy.%20Trained%20on%20the%20PhraseStereo%20dataset%2C%20our%20approach%20achieves%20strong%20performance%20in%20phrase-grounded%20tasks%20and%20demonstrates%20generalization%20in%20zero-shot%20settings.%20On%20PhraseStereo%2C%20we%20show%20a%20%2B2.9%25%20improvement%20in%20Average%20Precision%20over%20the%20baseline%20method%20and%20%2B0.76%25%20over%20the%20best%20competing%20method.%20SENSE%20also%20provides%20a%20relative%20improvement%20of%20%2B3.5%25%20mIoU%20on%20Cityscapes%20and%20%2B18%25%20on%20KITTI%20compared%20to%20the%20baseline%20work.%20By%20jointly%20reasoning%20over%20semantics%20and%20geometry%2C%20SENSE%20supports%20accurate%20scene%20understanding%20from%20natural%20language%2C%20essential%20for%20autonomous%20robots%20and%20Intelligent%20Transportation%20Systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15946v1%0AForm%3A%20https%3A// {"title": "FineCog-Nav: Integrating Fine-grained Cognitive Modules for Zero-shot Multimodal UAV Navigation", "author": "Dian Shao and Zhengzheng Xu and Peiyang Wang and Like Liu and Yule Wang and Jieqi Shi and Jing Huo", "abstract": "UAV vision-language navigation (VLN) requires an agent to navigate complex 3D environments from an egocentric perspective while following ambiguous multi-step instructions over long horizons. Existing zero-shot methods remain limited, as they often rely on large base models, generic prompts, and loosely coordinated modules. In this work, we propose FineCog-Nav, a top-down framework inspired by human cognition that organizes navigation into fine-grained modules for language processing, perception, attention, memory, imagination, reasoning, and decision-making. Each module is driven by a moderate-sized foundation model with role-specific prompts and structured input-output protocols, enabling effective collaboration and improved interpretability. To support fine-grained evaluation, we construct AerialVLN-Fine, a curated benchmark of 300 trajectories derived from AerialVLN, with sentence-level instruction-trajectory alignment and refined instructions containing explicit visual endpoints and landmark references. Experiments show that FineCog-Nav consistently outperforms zero-shot baselines in instruction adherence, long-horizon planning, and generalization to unseen environments. These results suggest the effectiveness of fine-grained cognitive modularization for zero-shot aerial navigation. Project page: https://smartdianlab.github.io/projects-FineCogNav.", "link": "http://arxiv.org/abs/2604.16298v1", "date": "2026-04-17", "relevancy": 2.3352, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5982}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/ {"title": "Cut Your Losses! Learning to Prune Paths Early for Efficient Parallel Reasoning", "author": "Jiaxi Bi and Tongxu Luo and Wenyu Du and Zhengyang Tang and Benyou Wang", "abstract": "Parallel reasoning enhances Large Reasoning Models (LRMs) but incurs prohibitive costs due to futile paths caused by early errors. To mitigate this, path pruning at the prefix level is essential, yet existing research remains fragmented without a standardized framework. In this work, we propose the first systematic taxonomy of path pruning, categorizing methods by their signal source (internal vs. external) and learnability (learnable vs. non-learnable). This classification reveals the unexplored potential of learnable internal methods, motivating our proposal of STOP (Super TOken for Pruning). Extensive evaluations across LRMs ranging from 1.5B to 20B parameters demonstrate that STOP achieves superior effectiveness and efficiency compared to existing baselines. Furthermore, we rigorously validate the scalability of STOP under varying compute budgets - for instance, boosting GPT-OSS-20B accuracy on AIME25 from 84% to nearly 90% under fixed compute budgets. Finally, we distill our findings into formalized empirical guidelines to facilitate optimal real-world deployment. Code, data and models are available at https://bijiaxihh.github.io/STOP", "link": "http://arxiv.org/abs/2604.16029v1", "date": "2026-04-17", "relevancy": 2.3271, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.466}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.466}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4643}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cut%20Your%2 {"title": "A Triadic Suffix Tokenization Scheme for Numerical Reasoning", "author": "Olga Chetverina", "abstract": "Standard subword tokenization methods fragment numbers inconsistently, causing large language models (LLMs) to lose positional and decimal structure - a primary driver of errors in arithmetic and scientific reasoning. We introduce Triadic Suffix Tokenization (TST), a deterministic scheme that partitions digits into three-digit triads and annotates each triad with an explicit magnitude marker. Critically, the scheme defines a fixed, one-to-one mapping between suffixes and orders of magnitude for the integer part (thousands, millions, billions, etc.) and a parallel system of replicated markers for fractional depth (tenths, thousandths, millionths, etc.). Unlike approaches that rely on positional inference, this method provides a consistent gradient signal, which should ensure stable convergence. Two implementation variants are proposed: (1) a vocabulary-based approach that adds at most 10,000 fixed tokens to an existing vocabulary, covering 33 orders of magnitude ($10^{-15}$ to $10^{18}$); and (2) a suffix-marker approach that uses a small set of special tokens to denote magnitude dynamically. Both variants preserve exact digits while making order-of-magnitude relationships transparent at the token level. While we focus on 3-digit groups (Triadic), the framework is inherently scalable to any group size for precise vocabulary optimization. Furthermore, it allows for linear vocabulary expansion to accommodate arbitrary precision and range. TST is architecture-agnostic and can be integrated as a drop-in preprocessing step. Experimental validation is deferred to future work.", "link": "http://arxiv.org/abs/2604.11582v2", "date": "2026-04-17", "relevancy": 2.3258, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4842}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4658}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4454}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Triadic%20Suffix%20Tokenization%20Scheme%20for%20Numerical%20Reasoning&body=Title%3A%20A%20Triadic%20Suffix%20Tokenization%20Scheme%20for%20Numerical%20Reasoning%0AAuthor%3A%20Olga%20Chetverina%0AAbstract%3A%20Standard%20subword%20tokenization%20methods%20fragment%20numbers%20inconsistently%2C%20causing%20large%20language%20models%20%28LLMs%29%20to%20lose%20positional%20and%20decimal%20structure%20-%20a%20primary%20driver%20of%20errors%20in%20arithmetic%20and%20scientific%20reasoning.%20We%20introduce%20Triadic%20Suffix%20Tokenization%20%28TST%29%2C%20a%20deterministic%20scheme%20that%20partitions%20digits%20into%20three-digit%20triads%20and%20annotates%20each%20triad%20with%20an%20explicit%20magnitude%20marker.%20Critically%2C%20the%20scheme%20defines%20a%20fixed%2C%20one-to-one%20mapping%20between%20suffixes%20and%20orders%20of%20magnitude%20for%20the%20integer%20part%20%28thousands%2C%20millions%2C%20billions%2C%20etc.%29%20and%20a%20parallel%20system%20of%20replicated%20markers%20for%20fractional%20depth%20%28tenths%2C%20thousandths%2C%20millionths%2C%20etc.%29.%20Unlike%20approaches%20that%20rely%20on%20positional%20inference%2C%20this%20method%20provides%20a%20consistent%20gradient%20signal%2C%20which%20should%20ensure%20stable%20convergence.%20Two%20implementation%20variants%20are%20proposed%3A%20%281%29%20a%20vocabulary-based%20approach%20that%20adds%20at%20most%2010%2C000%20fixed%20tokens%20to%20an%20existing%20vocabulary%2C%20covering%2033%20orders%20of%20magnitude%20%28%2410%5E%7B-15%7D%24%20to%20%2410%5E%7B18%7D%24%29%3B%20and%20%282%29%20a%20suffix-marker%20approach%20that%20uses%20a%20small%20set%20of%20special%20tokens%20to%20denote%20magnitude%20dynamically.%20Both%20variants%20preserve%20exact%20digits%20while%20making%20order-of-magnitude%20relationships%20transparent%20at%20the%20token%20level.%20While%20we%20focus%20on%203-digit%20groups%20%28Triadic%29%2C%20the%20framework%20is%20inherently%20scalable%20to%20any%20group%20size%20for%20precise%20vocabulary%20optimization.%20Furthermore%2C%20it%20allows%20for%20linear%20vocabulary%20expansion%20to%20accommodate%20arbitrary%20precision%20and%20range.%20TST%20is%20architecture-agnostic%20and%20can%20be%20integrated%20as%20a%20drop-in%20preprocessing%20step.%20Experimental%20validation%20is%20deferred%20to%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11582v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Triadic%2520Suffix%2520Tokenization%2520Scheme%2520for%2520Numerical%2520Reasoning%26entry.906535625%3DOlga%2520Chetverina%26entry.1292438233%3DStandard%2520subword%2520tokenization%2520methods%2520fragment%2520numbers%2520inconsistently%252C%2520causing%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520lose%2520positional%2520and%2520decimal%2520structure%2520-%2520a%2520primary%2520driver%2520of%2520errors%2520in%2520arithmetic%2520and%2520scientific%2520reasoning.%2520We%2520introduce%2520Triadic%2520Suffix%2520Tokenization%2520%2528TST%2529%252C%2520a%2520deterministic%2520scheme%2520that%2520partitions%2520digits%2520into%2520three-digit%2520triads%2520and%2520annotates%2520each%2520triad%2520with%2520an%2520explicit%2520magnitude%2520marker.%2520Critically%252C%2520the%2520scheme%2520defines%2520a%2520fixed%252C%2520one-to-one%2520mapping%2520between%2520suffixes%2520and%2520orders%2520of%2520magnitude%2520for%2520the%2520integer%2520part%2520%2528thousands%252C%2520millions%252C%2520billions%252C%2520etc.%2529%2520and%2520a%2520parallel%2520system%2520of%2520replicated%2520markers%2520for%2 {"title": "AutoNFS: Automatic Neural Feature Selection", "author": "Witold Wydma\u0144ski and Marek \u015amieja", "abstract": "Feature selection (FS) is a fundamental challenge in machine learning, particularly for high-dimensional tabular data, where interpretability and computational efficiency are critical. Existing FS methods often cannot automatically detect the number of attributes required to solve a given task and involve user intervention or model retraining with different feature budgets. Additionally, they either neglect feature relationships (filter methods) or require time-consuming optimization (wrapper methods). To address these limitations, we propose AutoNFS, which combines the FS module based on Gumbel-Sigmoid sampling with a predictive model evaluating the relevance of the selected attributes. The model is trained end-to-end using a differentiable loss and automatically determines the minimal set of features essential to solve a given downstream task. Unlike many wrapper-style approaches, AutoNFS introduces a low and predictable training overhead and avoids repeated model retraining across feature budgets. In practice, the additional cost of the masking module is largely independent of the number of input features (beyond the unavoidable cost of processing the input itself), making the method scalable to high-dimensional tabular data. We evaluate AutoNFS on well-established classification and regression benchmarks as well as real-world metagenomic datasets. The results show that AutoNFS is competitive with, and often improves upon, strong classical and neural FS baselines while selecting fewer features on average across the evaluated benchmarks.", "link": "http://arxiv.org/abs/2503.13304v2", "date": "2026-04-17", "relevancy": 2.3076, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4717}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.463}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AutoNFS%3A%20Automatic%20Neural%20Feature%20Selection&body=Title%3A%20AutoNFS%3A%20Automatic%20Neural%20Feature%20Selection%0AAuthor%3A%20Witold%20Wydma%C5%84ski%20and%20Marek%20%C5%9Amieja%0AAbstract%3A%20Feature%20selection%20%28FS%29%20is%20a%20fundamental%20challenge%20in%20machine%20learning%2C%20particularly%20for%20high-dimensional%20tabular%20data%2C%20where%20interpretability%20and%20computational%20efficiency%20are%20critical.%20Existing%20FS%20methods%20often%20cannot%20automatically%20detect%20the%20number%20of%20attributes%20required%20to%20solve%20a%20given%20task%20and%20involve%20user%20intervention%20or%20model%20retraining%20with%20different%20feature%20budgets.%20Additionally%2C%20they%20either%20neglect%20feature%20relationships%20%28filter%20methods%29%20or%20require%20time-consuming%20optimization%20%28wrapper%20methods%29.%20To%20address%20these%20limitations%2C%20we%20propose%20AutoNFS%2C%20which%20combines%20the%20FS%20module%20based%20on%20Gumbel-Sigmoid%20sampling%20with%20a%20predictive%20model%20evaluating%20the%20relevance%20of%20the%20selected%20attributes.%20The%20model%20is%20trained%20end-to-end%20using%20a%20differentiable%20loss%20and%20automatically%20determines%20the%20minimal%20set%20of%20features%20essential%20to%20solve%20a%20given%20downstream%20task.%20Unlike%20many%20wrapper-style%20approaches%2C%20AutoNFS%20introduces%20a%20low%20and%20predictable%20training%20overhead%20and%20avoids%20repeated%20model%20retraining%20across%20feature%20budgets.%20In%20practice%2C%20the%20additional%20cost%20of%20the%20masking%20module%20is%20largely%20independent%20of%20the%20number%20of%20input%20features%20%28beyond%20the%20unavoidable%20cost%20of%20processing%20the%20input%20itself%29%2C%20making%20the%20method%20scalable%20to%20high-dimensional%20tabular%20data.%20We%20evaluate%20AutoNFS%20on%20well-established%20classification%20and%20regression%20benchmarks%20as%20well%20as%20real-world%20metagenomic%20datasets.%20The%20results%20show%20that%20AutoNFS%20is%20competitive%20with%2C%20and%20often%20improves%20upon%2C%20strong%20classical%20and%20neural%20FS%20baselines%20while%20selecting%20fewer%20features%20on%20average%20across%20the%20evaluated%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2503.13304v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoNFS%253A%2520Automatic%2520Neural%2520Feature%2520Selection%26entry.906535625%3DWitold%2520Wydma%25C5%2584ski%2520and%2520Marek%2520%25C5%259Amieja%26entry.1292438233%3DFeature%2520selection%2520%2528FS%2529%2520is%2520a%2520fundamental%2520challenge%2520in%2520machine%2520learning%252C%2520particularly%2520for%2520high-dimensional%2520tabular%2520data%252C%2520where%2520interpretability%2520and%2520computational%2520efficiency%2520are%2520critical.%2520Existing%2520FS%2520methods%2520often%2520cannot%2520automatically%2520detect%2520the%2520number%2520of%2520attributes%2520required%2520to%2520solve%2520a%2520given%2520task%2520and%2520involve%2520user%2520intervention%2520or%2520model%2520retraining%2520with%2520different%2520feature%2520budgets.%2520Additionally%252C%2520they%2520either%2520neglect%2520feature%2520relationships%2520%2528filter%2520methods%2529%2520or%2520require%2520time-consuming%2520optimization%2520%2528wrapper%2520methods%2529.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520AutoNFS%252C%2520which%2520combines%2520the%2520FS%2520module%2520based%2520on%2520Gumbel-Sigmoid%2520sampling%2520with%2520a%2520predictive%2520model%2520evaluating%2520the%2520relevance%2520of%2520t l.%20Existing%20FS%20methods%20often%20cannot%20automatically%20detect%20the%20number%20of%20attributes%20required%20to%20solve%20a%20given%20task%20and%20involve%20user%20intervention%20or%20model%20retraining%20with%20different%20feature%20budgets.%20Additionally%2C%20they%20either%20neglect%20feature%20relationships%20%28filter%20methods%29%20or%20require%20time-consuming%20optimization%20%28wrapper%20methods%29.%20To%20address%20these%20limitations%2C%20we%20propose%20AutoNFS%2C%20which%20combines%20the%20FS%20module%20based%20on%20Gumbel-Sigmoid%20sampling%20with%20a%20predictive%20model%20evaluating%20the%20relevance%20of%20the%20selected%20attributes.%20The%20model%20is%20trained%20end-to-end%20using%20a%20differentiable%20loss%20and%20automatically%20determines%20the%20minimal%20set%20of%20features%20essential%20to%20solve%20a%20given%20downstream%20task.%20Unlike%20many%20wrapper-style%20approaches%2C%20AutoNFS%20introduces%20a%20low%20and%20predictable%20training%20overhead%20and%20avoids%20repeated%20model%20retraining%20across%20feature%20budgets.%20In%20practice%2C%20the%20additional%20cost%20of%20the%20masking%20module%20is%20largely%20independent%20of%20the%20number%20of%20input%20features%20%28beyond%20the%20unavoidable%20cost%20of%20processing%20the%20input%20itself%29%2C%20making%20the%20method%20scalable%20to%20high-dimensional%20tabular%20data.%20We%20evaluate%20AutoNFS%20on%20well-established%20classification%20and%20regression%20benchmarks%20as%20well%20as%20real-world%20metagenomic%20datasets.%20The%20results%20show%20that%20AutoNFS%20is%20competitive%20with%2C%20and%20often%20improves%20upon%2C%20strong%20classical%20and%20neural%20FS%20baselines%20while%20selecting%20fewer%20features%20on%20average%20across%20the%20evaluated%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2503.13304v2&entry.124074799=Read"},
{"title": "CLewR: Curriculum Learning with Restarts for Machine Translation Preference Learning", "author": "Alexandra Dragomir and Florin Brad and Radu Tudor Ionescu", "abstract": "Large language models (LLMs) have demonstrated competitive performance in zero-shot multilingual machine translation (MT). Some follow-up works further improved MT performance via preference optimization, but they leave a key aspect largely underexplored: the order in which data samples are given during training. We address this topic by integrating curriculum learning into various state-of-the-art preference optimization algorithms to boost MT performance. We introduce a novel curriculum learning strategy with restarts (CLewR), which reiterates easy-to-hard curriculum multiple times during training to effectively mitigate the catastrophic forgetting of easy examples. We demonstrate consistent gains across several model families (Gemma2, Qwen2.5, Llama3.1) and preference optimization techniques. We publicly release our code at https://github.com/alexandra-dragomir/CLewR.", "link": "http://arxiv.org/abs/2601.05858v2", "date": "2026-04-17", "relevancy": 2.3047, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5012}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4424}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4392}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLewR%3A%20Curriculum%20Learning%20with%20Restarts%20for%20Machine%20Translation%20Preference%20Learning&body=Title%3A%20CLewR%3A%20Curriculum%20Learning%20with%20Restarts%20for%20Machine%20Translation%20Preference%20Learning%0AAuthor%3A%20Alexandra%20Dragomir%20and%20F largely%2520underexplored%253A%2520the%2520order%2520in%2520which%2520data%2520samples%2520are%2520given%2520during%2520training.%2520We%2520address%2520this%2520topic%2520by%2520integrating%2520curriculum%2520learning%2520into%2520various%2520state-of-the-art%2520preference%2520optimization%2520algorithms%2520to%2520boost%2520MT%2520performance.%2520We%2520introduce%2520a%2520novel%2520curriculum%2520learning%2520strategy%2520with%2520restarts%2520%2528CLewR%2529%252C%2520which%2520reiterates%2520easy-to-hard%2520curriculum%2520multiple%2520times%2520during%2520training%2520to%2520effectively%2520mitigate%2520the%2520catastrophic%2520forgetting%2520of%2520easy%2520examples.%2520We%2520demonstrate%2520consistent%2520gains%2520across%2520several%2520model%2520families%2520%2528Gemma2%252C%2520Qwen2.5%252C%2520Llama3.1%2529%2520and%2520preference%2520optimization%2520techniques.%2520We%2520publicly%2520release%2520our%2520code%2520at%2520https%253A//github.com/alexandra-dragomir/CLewR.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.05858v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CLewR%3A%20Curriculum%20Learning%20with%20Restarts%20for%20Machine%20Translation%20Preference%20Learning&entry.906535625=Alexandra%20Dragomir%20and%20Florin%20Brad%20and%20Radu%20Tudor%20Ionescu&entry.1292438233=Large%20language%20models%20%28LLMs%29%20have%20demonstrated%20competitive%20performance%20in%20zero-shot%20multilingual%20machine%20translation%20%28MT%29.%20Some%20follow-up%20works%20further%20improved%20MT%20performance%20via%20preference%20optimization%2C%20but%20they%20leave%20a%20key%20aspect%20largely%20underexplored%3A%20the%20order%20in%20which%20data%20samples%20are%20given%20during%20training.%20We%20address%20this%20topic%20by%20integrating%20curriculum%20learning%20into%20various%20state-of-the-art%20preference%20optimization%20algorithms%20to%20boost%20MT% {"title": "EnvScaler: Scaling Tool-Interactive Environments for LLM Agent via Programmatic Synthesis", "author": "Xiaoshuai Song and Haofei Chang and Guanting Dong and Yutao Zhu and Ji-Rong Wen and Zhicheng Dou", "abstract": "Large language models (LLMs) are expected to be trained to act as agents in various real-world environments, but this process relies on rich and varied tool-interaction sandboxes. However, access to real systems is often restricted; LLM-simulated environments are prone to hallucinations and inconsistencies; and manually built sandboxes are hard to scale. In this paper, we propose EnvScaler, an automated framework for scalable tool-interaction environments via programmatic synthesis. EnvScaler comprises two components. First, SkelBuilder constructs diverse environment skeletons through topic mining, logic modeling, and quality evaluation. Then, ScenGenerator generates multiple task scenarios and rule-based trajectory validation functions for each environment. With EnvScaler, we synthesize 191 environments and about 7K scenarios, and apply them to Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL) for Qwen3 series models. Results on three benchmarks show that EnvScaler significantly improves LLMs' ability to solve tasks in complex environments involving multi-turn, multi-tool interactions. We release our code and data at https://github.com/RUC-NLPIR/EnvScaler.", "link": "http://arxiv.org/abs/2601.05808v2", "date": "2026-04-17", "relevancy": 2.2612, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6052}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5437}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EnvScaler%3A%20Scaling%20Tool-Interactive%20Environments%20for%20LLM%20Agent%20via%20Programmatic%20Synthesis&body=Title%3A%20EnvScaler%3A%20Scaling%20Tool-Interactive%20Environments%20for%20LLM%20Agent%20via%20Programmatic%20Synthesis%0AAuthor%3A%20Xiaoshuai%20Song%20and%20Haofei%20Chang%20and%20Guanting%20Dong%20and%20Yutao%20Zhu%20and%20Ji-Rong%20Wen%20and%20Zhicheng%20Dou%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20expected%20to%20be%20trained%20to%20act%20as%20agents%20in%20various%20real-world%20environments%2C%20but%20this%20process%20relies%20on%20rich%20and%20varied%20tool-interaction%20sandboxes.%20However%2C%20access%20to%20real%20systems%20is%20often%20restricted%3B%20LLM-simulated%20environments%20are%20prone%20to%20hallucinations%20and%20inconsistencies%3B%20and%20manually%20built%20sandboxes%20are%20hard%20to%20scale.%20In%20this%20paper%2C%20we%20propose%20EnvScaler%2C%20an%20automated%20framework%20for%20scalable%20tool-interaction%20environments%20via%20programmatic%20synthesis.%20EnvScaler%20comprises%20two%20components.%20First%2C%20SkelBuilder%20constructs%20diverse%20environment%20skeletons%20through%20topic%20mining%2C%20logic%20modeling%2C%20and%20quality%20evaluation.%20Then%2C%20ScenGenerator%20generates%20multiple%20task%20scenarios%20and%20rule-based%20trajectory%20validation%20functions%20for%20each%20environment.%20With%20EnvScaler%2C%20we%20synthesize%20191%20environments%20and%20about%207K%20scenarios%2C%20and%20apply%20them%20to%20Supervised%20Fine-Tuning%20%28SFT%29%20and%20Reinforcement%20Learning%20%28RL%29%20for%20Qwen3%20series%20models.%20Results%20on%20three%20benchmarks%20show%20that%20EnvScaler%20significantly%20improves%20LLMs%27%20ability%20to%20solve%20tasks%20in%20complex%20environments%20involving%20multi-turn%2C%20multi-tool%20interactions.%20We%20release%20our%20code%20and%20data%20at%20https%3A//github.com/RUC-NLPIR/EnvScaler.%0ALink%3A%20http%3A//arxiv.org/abs/2601.05808v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnvScaler%253A%2520Scaling%2520Tool-Interactive%2520Environments%2520for%2520LLM%2520Agent%2520via%2520Programmatic%2520Synthesis%26entry.906535625%3DXiaoshuai%2520Song%2520and%2520Haofei%2520Chang%2520and%2520Guanting%2520Dong%2520and%2520Yutao%2520Zhu%2520and%2520Ji-Rong%2520Wen%2520and%2520Zhicheng%2520Dou%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520are%2520expected%2520to%2520be%2520trained%2520to%2520act%2520as%2520agents%2520in%2520various%2520real-world%2520environments%252C%2520but%2520this%2520process%2520relies%2520on%2520rich%2520and%2520varied%2520tool-interaction%2520sandboxes.%2520However%252C%2520access%2520to%2520real%2520systems%2520is%2520often%2520restricted%253B%2520LLM-simulated%2520environments%2520are%2520prone%2520to%2520hallucinations%2520and%2520inconsistencies%253B%2520and%2520manually%2520built%2520sandboxes%2520are%2520hard%2520to%2520scale.%2520In%2520this%2520paper%252C%2520we%2520propose%2520EnvScaler%252C%2520an%2520automated%2520framework%2520for%2520scalable%2520tool-interaction%2520environments%2520via%2520programmatic%2520synthesis.%2520EnvScaler%2520comprises%2520two%2520components.%2520First%252C%2520SkelBuilder%2520constructs%2520diverse%2520environment%2520skeletons%2520through%2520topic%2520mining%252C%2520logic%2520modeling%252C%2520and%2520quality%2520evaluation.%2520Then%252C%2520ScenGenerator%2520generates%2520multiple%2520task%2520scenarios%2520and%2520rule-based%2520trajectory%2520validation%2520functions%2520for%2520each%2520environment.%2520With%2520EnvScaler%252C%2520we%2520synthesize%2520191%2520environments%2520and%2520about%25207K%2520scenarios%252C%2520and%2520apply%2520them%2520to%2520Supervised%2520Fine-Tuning%2520%2528SFT%2529%2520and%2520Reinforcement%2520Learning%2520%2528RL%2529%2520for%2520Qwen3%2520series%2520models.%2520R 0and%20Reinforcement%20Learning%20%28RL%29%20for%20Qwen3%20series%20models.%20Results%20on%20three%20benchmarks%20show%20that%20EnvScaler%20significantly%20improves%20LLMs%27%20ability%20to%20solve%20tasks%20in%20complex%20environments%20involving%20multi-turn%2C%20multi-tool%20interactions.%20We%20release%20our%20code%20and%20data%20at%20https%3A//github.com/RUC-NLPIR/EnvScaler.&entry.1838667208=http%3A//arxiv.org/abs/2601.05808v2&entry.124074799=Read"},
{"title": "DENALI: A Dataset Enabling Non-Line-of-Sight Spatial Reasoning with Low-Cost LiDARs", "author": "Nikhil Behari and Diego Rivero and Luke Apostolides and Suman Ghosh and Paul Pu Liang and Ramesh Raskar", "abstract": "Consumer LiDARs in mobile devices and robots typically output a single depth value per pixel. Yet internally, they record full time-resolved histograms containing direct and multi-bounce light returns; these multi-bounce returns encode rich non-line-of-sight (NLOS) cues that can enable perception of hidden objects in a scene. However, severe hardware limitations of consumer LiDARs make NLOS reconstruction with conventional methods difficult. In this work, we motivate a complementary direction: enabling NLOS perception with low-cost LiDARs through data-driven inference. We present DENALI, the first large-scale real-world dataset of space-time histograms from low-cost LiDARs capturing hidden objects. We capture time-resolved LiDAR histograms for 72,000 hidden-object scenes across diverse object shapes, positions, lighting conditions, and spatial resolutions. Using our dataset, we show that consumer LiDARs can enable accurate, data-driven NLOS perception. We further identify key scene and modeling factors that limit performance, as well as simulation-fidelity gaps that hinder current sim-to-real transfer, motivating future work toward scalable NLOS vision with consumer LiDARs.", "link": "http://arxiv.org/abs/2604.16201v1", "date": "2026-04-17", "relevancy": 2.2508, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5683}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5675}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.0587 {"title": "Breakout-picker: Reducing false positives in deep learning-based borehole breakout characterization from acoustic image logs", "author": "Guangyu Wang and Xiaodong Ma and Xinming Wu", "abstract": "Borehole breakouts are stress-induced spalling on the borehole wall, which are identifiable in acoustic image logs as paired zones with near-symmetry azimuths, low acoustic amplitudes, and increased borehole radius. Accurate breakout characterization is crucial for in-situ stress analysis. In recent years, deep learning has been introduced to automate the time-consuming and labor-intensive breakout picking process. However, existing approaches often suffer from misclassification of non-breakout features, leading to high false positive rates. To address this limitation, this study develops a deep learning framework, termed Breakout-picker, with a specific focus on reducing false positives in automatic breakout characterization. Breakout-picker reduces false positives through two strategies. First, the training of Breakout-picker incorporates negative samples of non-breakout features, including natural fractures, keyseats, and logging artifacts. They share similar characteristics with breakouts, such as low acoustic amplitude or locally enlarged borehole radius. These negative training samples enables Breakout-picker to better discriminate true breakouts and similar non-breakout features. Second, candidate breakouts identified by Breakout-picker are further validated by azimuthal symmetry criteria, whereby detections that do not exhibit the near-symmetry characteristics of breakout azimuth are excluded. The performance of Breakout-picker is evaluated using three acoustic image log datasets from different regions. The results demonstrate that Breakout-picker outperforms other automatic methods with higher accuracy and substantially lower false positive rates. By reducing false positives, Breakout-picker enhances the reliability of automatic breakout characterization from acoustic image logs, which in turn benefits in-situ stress analysis based on borehole breakouts.", "link": "http://arxiv.org/abs/2604.16011v1", "date": "2026-04-17", "relevancy": 2.2467, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4828}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.433}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4323}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Breakout-picker%3A%20Reducing%20false%20positives%20in%20deep%20learning-based%20borehole%20breakout%20characterization%20from%20acoustic%20image%20logs&body=Title%3A%20Breakout-picker%3A%20Reducing%20false%20positives%20in%20deep%20learning-based%20borehole%20breakout%20characterization%20from%20acoustic%20image%20logs%0AAuthor%3A%20Guangyu%20Wang%20and%20Xiaodong%20Ma%20and%20Xinming%20Wu%0AAbstract%3A%20Borehole%20breakouts%20are%20stress-induced%20spalling%20on%20the%20borehole%20wall%2C%20which%20are%20identifiable%20in%20acoustic%20image%20logs%20as%20paired%20zones%20with%20near-symmetry%20azimuths%2C%20low%20acoustic%20amplitudes%2C%20and%20increased%20borehole%20radius.%20Accurate%20breakout%20characterization%20is%20crucial%20for%20in-situ%20stress%20analysis.%20In%20recent%20years%2C%20deep%20learning%20has%20been%20introduced%20to%20automate%20the%20time-consuming%20and%20labor-intensive%20breakout%20picking%20process.%20However%2C%20existing%20approaches%20often%20suffer%20from%20misclassification%20of%20non-breakout%20features%2C%20leading%20to%20high%20false%20positive%20rates.%20To%20address%20this%20limitation%2C%20this%20study%20develops%20a%20deep%20learning%20framework%2C%20termed%20Breakout-picker%2C%20with%20a%20specific%20focus%20on%20reducing%20false%20positives%20in%20automatic%20breakout%20characterization.%20Breakout-picker%20reduces%20false%20positives%20through%20two%20strategies.%20First%2C%20the%20training%20of%20Breakout-picker%20incorporates%20negative%20samples%20of%20non-breakout%20features%2C%20including%20natural%20fractures%2C%20keyseats%2C%20and%20logging%20artifacts.%20They%20share%20similar%20characteristics%20with%20breakouts%2C%20such%20as%20low%20acoustic%20amplitude%20or%20locally%20enlarged%20borehole%20radius.%20These%20negative%20training%20samples%20enables%20Breakout-picker%20to%20better%20discriminate%20true%20breakouts%20and%20similar%20non-breakout%20features.%20Second%2C%20candidate%20breakouts%20identified%20by%20Breakout-picker%20are%20further%20validated%20by%20azimuthal%20symmetry%20criteria%2C%20whereby%20detections%20that%20do%20not%20exhibit%20the%20near-symmetry%20characteristics%20of%20breakout%20azimuth%20are%20excluded.%20The%20performance%20of%20Breakout-picker%20is%20evaluated%20using%20three%20acoustic%20image%20log%20datasets%20from%20different%20regions.%20The%20results%20demonstrate%20that%20Breakout-picker%20outperforms%20other%20automatic%20methods%20with%20higher%20accuracy%20and%20substantially%20lower%20false%20positive%20rates.%20By%20reducing%20false%20positives%2C%20Breakout-picker%20enhances%20the%20reliability%20of%20automatic%20breakout%20characterization%20from%20acoustic%20image%20logs%2C%20which%20in%20turn%20benefits%20in-situ%20stress%20analysis%20based%20on%20borehole%20breakouts.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16011v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBreakout-picker%253A%2520Reducing%2520false%2520positives%2520in%2520deep%2520learning-based%2520borehole%2520breakout%2520characterization%2520from%2520acoustic%2520image%2520logs%26entry.906535625%3DGuangyu%2520Wang%2520and% ng%20approaches%20often%20suffer%20from%20misclassification%20of%20non-breakout%20features%2C%20leading%20to%20high%20false%20positive%20rates.%20To%20address%20this%20limitation%2C%20this%20study%20develops%20a%20deep%20learning%20framework%2C%20termed%20Breakout-picker%2C%20with%20a%20specific%20focus%20on%20reducing%20false%20positives%20in%20automatic%20breakout%20characterization.%20Breakout-picker%20reduces%20false%20positives%20through%20two%20strategies.%20First%2C%20the%20training%20of%20Breakout-picker%20incorporates%20negative%20samples%20of%20non-breakout%20features%2C%20including%20natural%20fractures%2C%20keyseats%2C%20and%20logging%20artifacts.%20They%20share%20similar%20characteristics%20with%20breakouts%2C%20such%20as%20low%20acoustic%20amplitude%20or%20locally%20enlarged%20borehole%20radius.%20These%20negative%20training%20samples%20enables%20Breakout-picker%20to%20better%20discriminate%20true%20breakouts%20and%20similar%20non-breakout%20features.%20Second%2C%20candidate%20breakouts%20identified%20by%20Breakout-picker%20are%20further%20validated%20by%20azimuthal%20symmetry%20criteria%2C%20whereby%20detections%20that%20do%20not%20exhibit%20the%20near-symmetry%20characteristics%20of%20breakout%20azimuth%20are%20excluded.%20The%20performance%20of%20Breakout-picker%20is%20evaluated%20using%20three%20acoustic%20image%20log%20datasets%20from%20different%20regions.%20The%20results%20demonstrate%20that%20Breakout-picker%20outperforms%20other%20automatic%20methods%20with%20higher%20accuracy%20and%20substantially%20lower%20false%20positive%20rates.%20By%20reducing%20false%20positives%2C%20Breakout-picker%20enhances%20the%20reliability%20of%20automatic%20breakout%20characterization%20from%20acoustic%20image%20logs%2C%20which%20in%20turn%20benefits%20in-situ%20stress%20analysis%20based%20on%20borehole%20breakouts.&entry.1838667208=http%3A//arxiv.org/abs/2604.16011v1&entry.124074799=Read"},
{"title": "EchoVLM: Dynamic Mixture-of-Experts Vision-Language Model for Universal Ultrasound Intelligence", "author": "Chaoyin She and Ruifang Lu and Lida Chen and Wei Wang and Qinghua Huang", "abstract": "Ultrasound imaging has become the preferred imaging modality for early cancer screening due to its advantages of non-ionizing radiation, low cost, and real-time imaging capabilities. However, conventional ultrasound diagnosis heavily relies on physician expertise, presenting challenges of high subjectivity and low diagnostic efficiency. Vision-language models (VLMs) offer promising solutions for this issue, but existing general-purpose models demonstrate limited knowledge in ultrasound medical tasks, with poor generalization in multi-organ lesion recognition and low efficiency across multi-task diagnostics. To address these limitations, we propose EchoVLM, a vision-language model specifically designed for ultrasound medical imaging. The model employs a Mixture of Experts (MoE) architecture trained on data spanning seven anatomical regions. This design enables the model to perform multiple tasks, including ultrasound report generation, diagnosis and visual question-answering (VQA). The experimental results demonstrated that EchoVLM achieved significant improvements of 10.15 and 4.77 points in BLEU-1 scores and ROUGE-1 scores respectively compared to Qwen2-VL on the ultrasound report generation task. These findings suggest that EchoVLM has substantial potential to enhance diagnostic accuracy in ultrasound imaging, thereby providing a viable technical solution for future clinical applications. Source code and model weights are available at https://github.com/Asunatan/EchoVLM.", "link": "http://arxiv.org/abs/2509.14977v2", "date": "2026-04-17", "relevancy": 2.2282, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EchoVLM%3A%20Dynamic%20Mixture-of-Experts%20Vision-Language%20Model%20for%20Universal%20Ultrasound%20Intelligence&body=Title%3A%20EchoVLM%3A%20Dynamic%20Mixture-of-Experts%20Vision-Language%20Model%20for%20Universal%20Ultrasound%20Intelligence%0AAuthor%3A%20Chaoyin%20She%20and%20Ruifang%20Lu%20and%20Lida%20Chen%20and%20Wei%20Wang%20and%20Qinghua%20Huang%0AAbstract%3A%20Ultrasound%20imaging%20has%20become%20the%20preferred%20imaging%20modality%20for%20early%20cancer%20screening%20due%20to%20its%20advantages%20of%20non-ionizing%20radiation%2C%20low%20cost%2C%20and%20real-time%20imaging%20capabilities.%20However%2C%20conventional%20ultrasound%20diagnosis%20heavily%20relies%20on%20physician%20expertise%2C%20presenting%20challenges%20of%20high%20subjectivity%20and%20low%20diagnostic%20efficiency.%20Vision-language%20models%20%28VLMs%29%20offer%20promising%20solutions%20for%20this%20issue%2C%20but%20existing%20general-purpose%20models%20demonstrate%20limited%20knowledge%20in%20ultrasound%20medical%20tasks%2C%20with%20poor%20generalization%20in%20multi-organ%20lesion%20recognition%20and%20low%20efficiency%20across%20multi-task%20diagnostics.%20To%20address%20these%20limitations%2C%20we%20propose%20EchoVLM%2C%20a%20vision-language%20model%20specifically%20designed%20for%20ultrasound%20medical%20imaging.%20The%20model%20employs%20a%20Mixture%20of%20Experts%20%28MoE%29%20architecture%20trained%20on%20data%20spanning%20seven%20anatomical%20regions.%20This%20design%20enables%20the%20model%20to%20perform%20multiple%20tasks%2C%20including%20ultrasound%20report%20generation%2C%20diagnosis%20and%20visual%20question-answering%20%28VQA%29.%20The%20experimental%20results%20demonstrated%20that%20EchoVLM%20achieved%20significant%20improvements%20of%2010.15%20and%204.77%20points%20in%20BLEU-1%20scores%20and%20ROUGE-1%20scores%20respectively%20compared%20to%20Qwen2-VL%20on%20the%20ultrasound%20report%20generation%20task.%20These%20findings%20suggest%20that%20EchoVLM%20has%20substantial%20potential%20to%20enhance%20diagnostic%20accuracy%20in%20ultrasound%20imaging%2C%20thereby%20providing%20a%20viable%20technical%20solution%20for%20future%20clinical%20applications.%20Source%20code%20and%20model%20weights%20are%20available%20at%20https%3A//github.com/Asunatan/EchoVLM.%0ALink%3A%20http%3A//arxiv.org/abs/2509.14977v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEchoVLM%253A%2520Dynamic%2520Mixture-of-Experts%2520Vision-Language%2520Model%2520for%2520Universal%2520Ultrasound%2520Intelligence%26entry.906535625%3DChaoyin%2520She%2520and%2520Ruifang%2520Lu%2520and%2520Lida%2520Chen%2520and%2520Wei%2520Wang%2520and%2520Qinghua%2520Huang%26entry.1292438233%3DUltrasound%2520imaging%2520has%2520become%2520the%2520preferred%2520imaging%2520modality%2520for%2520early%2520cancer%2520screening%2520due%2520to%2520its%2520advantages%2520of%2520non-ionizing%2520radiation%252C%2520low%2520cost%252C%2520and%2520real-time%2520imaging%2520capabilities.%2520However%252C%2520conventional%2520ultrasound%2520diagnosis%2520heavily%2520relies%2520on%2520physician%2520expertise%252C%2520presenting%2520challenges%2520of%2520high%2520subjectivity%2520and%2520low%2520diagnostic%2520efficiency.%2520Vision-language%2520models%2520%2528VLMs%2529%2520offer%2520promising%2520solutions%2520for%2520this%2520issue%252C%2520but%2520existing%2520general-purpose%2520models%2520demonstrate%2520limited%2520knowledge%2520in%2520ultrasound%2520medical%2520tasks%252C%2520with%2520poor%2520generalization%2520in%2520multi-organ%2520lesion%2520recognit {"title": "When Cultures Meet: Multicultural Text-to-Image Generation", "author": "Parth Bhalerao and Mounika Yalamarty and Brian Trinh and Oana Ignat", "abstract": "Text-to-image generation models have achieved strong performance in culturally homogeneous settings, yet their ability to generate multicultural scenes, where people and landmarks originate from different cultures, remains largely unexplored.\n  We introduce multicultural text-to-image generation as a new task and present the first benchmark designed to study this setting. Our dataset contains 9,000 images spanning five countries, three age groups, two genders, 25 historical landmarks, and five languages. Using this benchmark, we analyze the behavior of state-of-the-art text-to-image models across multiple dimensions, including alignment, image quality, aesthetics, knowledge, and fairness.\n  As one strategy for composing cultural and demographic information, we explore MosAIG, a Multi-Agent framework that enhances multicultural Image Generation by leveraging LLMs with distinct cultural personas. Our analysis shows that richer prompt composition can improve image quality and cultural grounding compared to simple prompts, while revealing substantial disparities across languages and demographic groups. We release our dataset and code at https://github.com/AIM-SCU/MosAIG.", "link": "http://arxiv.org/abs/2502.15972v2", "date": "2026-04-17", "relevancy": 2.2189, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5654}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5551}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Cultures%20Meet%3A%20Multicultural%20Text-to-Image%20Generation&body=Title%3A%20When%20Cultures%20Meet%3A%20Multicultural%20Text-to-Image%20Generation%0AAuthor%3A%20Parth%20Bhalerao%20and%20Mounika%20Yalamarty%20and%20Brian%20Trinh%20and%20Oana%20Ignat%0AAbstract%3A%20Text-to-image%20generation%20models%20have%20achieved%20strong%20performance%20in%20culturally%20homogeneous%20settings%2C%20yet%20their%20ability%20to%20generate%20multicultural%20scenes%2C%20where%20people%20and%20landmarks%20originate%20from%20different%20cultures%2C%20remains%20largely%20unexplored.%0A%20%20We%20introduce%20multicultural%20text-to-image%20generation%20as%20a%20new%20task%20and%20present%20the%20first%20benchmark%20designed%20to%20study%20this%20setting.%20Our%20dataset%20contains%209%2C000%20images%20spanning%20five%20countries%2C%20three%20age%20groups%2C%20two%20genders%2C%2025%20historical%20landmarks%2C%20and%20five%20languages.%20Using%20this%20benchmark%2C%20we%20analyze%20the%20behavior%20of%20state-of-the-art%20text-to-image%20models%20across%20multiple%20dimensions%2C%20including%20alignment%2C%20image%20quality%2C%20aesthetics%2C%20knowledge%2C%20and%20fairness.%0A%20%20As%20one%20strategy%20for%20composing%20cultural%20and%20demographic%20information%2C%20we%20explore%20MosAIG%2C%20a%20Multi-Agent%20framework%20that%20enhances%20multicultural%20Image%20Generation%20by%20leveraging%20LLMs%20with%20distinct%20cultural%20personas.%20Our%20analysis%20shows%20that%20richer%20prompt%20composition%20can%20improve%20image%20quality%20and%20cultural%20grounding%20compared%20to%20simple%20prompts%2C%20while%20revealing%20substantial%20disparities%20across%20languages%20and%20demographic%20groups.%20We%20release%20our%20dataset%20and%20code%20at%20https%3A//github.com/AIM-SCU/MosAIG.%0ALink%3A%20http%3A//arxiv.org/abs/2502.15972v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Cultures%2520Meet%253A%2520Mul 2520and%2520code%2520at%2520https%253A//github.com/AIM-SCU/MosAIG.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2502.15972v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Cultures%20Meet%3A%20Multicultural%20Text-to-Image%20Generation&entry.906535625=Parth%20Bhalerao%20and%20Mounika%20Yalamarty%20and%20Brian%20Trinh%20and%20Oana%20Ignat&entry.1292438233=Text-to-image%20generation%20models%20have%20achieved%20strong%20performance%20in%20culturally%20homogeneous%20settings%2C%20yet%20their%20ability%20to%20generate%20multicultural%20scenes%2C%20where%20people%20and%20landmarks%20originate%20from%20different%20cultures%2C%20remains%20largely%20unexplored.%0A%20%20We%20introduce%20multicultural%20text-to-image%20generation%20as%20a%20new%20task%20and%20present%20the%20first%20benchmark%20designed%20to%20study%20this%20setting.%20Our%20dataset%20contains%209%2C000%20images%20spanning%20five%20countries%2C%20three%20age%20groups%2C%20two%20genders%2C%2025%20historical%20landmarks%2C%20and%20five%20languages.%20Using%20this%20benchmark%2C%20we%20analyze%20the%20behavior%20of%20state-of-the-art%20text-to-image%20models%20across%20multiple%20dimensions%2C%20including%20alignment%2C%20image%20quality%2C%20aesthetics%2C%20knowledge%2C%20and%20fairness.%0A%20%20As%20one%20strategy%20for%20composing%20cultural%20and%20demographic%20information%2C%20we%20explore%20MosAIG%2C%20a%20Multi-Agent%20framework%20that%20enhances%20multicultural%20Image%20Generation%20by%20leveraging%20LLMs%20with%20distinct%20cultural%20personas.%20Our%20analysis%20shows%20that%20richer%20prompt%20composition%20can%20improve%20image%20quality%20and%20cultural%20grounding%20compared%20to%20simple%20prompts%2C%20while%20revealing%20substantial%20disparities%20across%20languages%20and%20demographic%20groups.%20We%20release%20our%20dataset%20and%20code%20at%20https%3A//github.com/AIM-SCU/MosAIG. {"title": "Predicting Video Slot Attention Queries from Random Slot-Feature Pairs", "author": "Rongzhen Zhao and Jian Li and Juho Kannala and Joni Pajarinen", "abstract": "Unsupervised video Object-Centric Learning (OCL) is promising as it enables object-level scene representation and understanding as we humans do. Mainstream video OCL methods adopt a recurrent architecture: An aggregator aggregates current video frame into object features, termed slots, under some queries; A transitioner transits current slots to queries for the next frame. This is an effective architecture but all existing implementations both (\\textit{i1}) neglect to incorporate next frame features, the most informative source for query prediction, and (\\textit{i2}) fail to learn transition dynamics, the knowledge essential for query prediction. To address these issues, we propose Random Slot-Feature pair for learning Query prediction (RandSF.Q): (\\textit{t1}) We design a new transitioner to incorporate both slots and features, which provides more information for query prediction; (\\textit{t2}) We train the transitioner to predict queries from slot-feature pairs randomly sampled from available recurrences, which drives it to learn transition dynamics. Experiments on scene representation demonstrate that our method surpass existing video OCL methods significantly, e.g., up to 10 points on object discovery, setting new state-of-the-art. Such superiority also benefits downstream tasks like scene understanding. Source Code, Model Checkpoints, Training Logs: https://github.com/Genera1Z/RandSF.Q", "link": "http://arxiv.org/abs/2508.01345v7", "date": "2026-04-17", "relevancy": 2.1938, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5502}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Predicting%20Video%20Slot%20Attention%20Queries%20from%20Random%20Slot-Feature%20Pairs&body=Title%3A%20Predicting%20Video%20Slot%20Attention%20Queries%20from%20Random%20Slot-Feature%20Pairs%0AAuthor%3A%20Rongzhen%20Zhao%20and%20Jian%20Li%20and%20Juho%20Kannala%20and%20Joni%20Pajarinen%0AAbstract%3A%20Unsupervised%20video%20Object-Centric%20Learning%20%28OCL%29%20is%20promising%20as%20it%20enables%20object-level%20scene%20representation%20and%20understanding%20as%20we%20humans%20do.%20Mainstream%20video%20OCL%20methods%20adopt%20a%20recurrent%20architecture%3A%20An%20aggregator%20aggregates%20current%20video%20frame%20into%20object%20features%2C%20termed%20slots%2C%20under%20some%20queries%3B%20A%20transitioner%20transits%20current%20slots%20to%20queries%20for%20the%20next%20frame.%20This%20is%20an%20effective%20architecture%20but%20all%20existing%20implementations%20both%20%28%5Ctextit%7Bi1%7D%29%20neglect%20to%20incorporate%20next%20frame%20features%2C%20the%20most%20informative%20source%20for%20query%20prediction%2C%20and%20%28%5Ctextit%7Bi2%7D%29%20fail%20to%20learn%20transition%20dynamics%2C%20the%20knowledge%20essential%20for%20query%20prediction.%20To%20address%20these%20issues%2C%20we%20propose%20Random%20Slot-Feature%20pair%20for%20learning%20Query%20prediction%20%28RandSF.Q%29%3A%20%28%5Ctextit%7Bt1%7D%29%20We%20design%20a%20new%20transitioner%20to%20incorporate%20both%20slots%20and%20features%2C%20which%20provides%20more%20information%20for%20query%20prediction%3B%20%28%5Ctextit%7Bt2%7D%29%20We%20train%20the%20transitioner%20to%20predict%20queries%20from%20slot-feature%20pairs%20randomly%20sampled%20from%20available%20recurrences%2C%20which%20drives%20it%20to%20learn%20transition%20dynamics.%20Experiments%20on

{"title": "Language Models as Semantic Teachers: Post-Training Alignment for Medical Audio Understanding", "author": "Tsai-Ning Wang and Lin-Lin Chen and Neil Zeghidour and Aaqib Saeed", "abstract": "Pre-trained audio models excel at detecting acoustic patterns in auscultation sounds but often fail to grasp their clinical significance, limiting their use and performance in diagnostic tasks. To bridge this gap, we introduce AcuLa (Audio-Clinical Understanding via Language Alignment), a lightweight post-training framework that instills semantic understanding into any audio encoder by aligning it with a medical language model, which acts as a \"semantic teacher.\" To enable alignment at scale, we construct a large-scale dataset by leveraging off-the-shelf large language models to translate the rich, structured metadata accompanying existing audio recordings into coherent clinical reports. Our alignment strategy combines a representation-level contrastive objective with a self-supervised modeling, ensuring that the model learns clinical semantics while preserving fine-grained temporal cues. AcuLa achieves state-of-the-art results across 18 diverse cardio-respiratory tasks from 10 different datasets, improving the mean AUROC on classification benchmarks from 0.68 to 0.79 and, on the most challenging COVID-19 cough detection task, boosting the AUROC from 0.55 to 0.89. Our work demonstrates that this audio-language alignment transforms purely acoustic models into clinically-aware diagnostic tools, establishing a novel paradigm for enhancing physiological understanding in audio-based health monitoring.", "link": "http://arxiv.org/abs/2512.04847v2", "date": "2026-04-17", "relevancy": 2.5523, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5208}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5053}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5053}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Language%20Models%20as%20Semantic%20Teachers%3A%20Post-Training%20Alignment%20for%20Medical%20Audio%20Understanding&body=Title%3A%20Language%20Models%20as%20Semantic%20Teachers%3A%20Post-Training%20Alignment%20for%20Medical%20Audio%20Understanding%0AAuthor%3A%20Tsai-Ning%20Wang%20and%20Lin-Lin%20Chen%20and%20Neil%20Zeghidour%20and%20Aaqib%20Saeed%0AAbstract%3A%20Pre-trained%20audio%20models%20excel%20at%20detecting%20acoustic%20patterns%20in%20auscultation%20sounds%20but%20often%20fail%20to%20grasp%20their%20clinical%20significance%2C%20limiting%20their%20use%20and%20performance%20in%20diagnostic%20tasks.%20To%20bridge%20this%20gap%2C%20we%20introduce%20AcuLa%20%28Audio-Clinical%20Understanding%20via%20Language%20Alignment%29%2C%20a%20lightweight%20post-training%20framework%20that%20instills%20semantic%20understanding%20into%20any%20audio%20encoder%20by%20aligning%20it%20with%20a%20medical%20language%20model%2C%20which%20acts%20as%20a%20%22semantic%20teacher.%22%20To%20enable%20alignment%20at%20scale%2C%20we%20construct%20a%20large-scale%20dataset%20by%20leveraging%20off-the-shelf%20large%20language%20models%20to%20translate%20the%20rich%2C%20structured%20metadata%20accompanying%20existing%20audio%20recordings%20into%20coherent%20clinical%20reports.%20Our%20alignment%20strategy%20combines%20a%20representation-level%20contrastive%20objective%20with%20a%20self-supervised%20modeling%2C%20ensuring%20that%20the%20model%20learns%20clinical%20semantics%20while%20preserving%20fine-grained%20temporal%20cues.%20AcuLa%20achieves%20state-of-the-art%20results%20across%2018%20diverse%20cardio-respiratory%20tasks%20from%2010%20different%20datasets%2C%20improving%20the%20mean%20AUROC%20on%20classification%20benchmarks%20from%200.68%20to%200.79%20and%2C%20on%20the%20most%20challenging%20COVID-19%20cough%20detection%20task%2C%20boosting%20the%20AUROC%20from%200.55%20to%200.89.%20Our%20work%20demonstrates%20that%20this%20audio-language%20alignment%20transforms%20purely%20acoustic%20models%20into%20clinically-aware%20diagnostic%20tools%2C%20establishing%20a%20novel%20paradigm%20for%20enhancing%20physiological%20understanding%20in%20audio-based%20health%20monitoring.%0ALink%3A%20http%3A//arxiv.org/abs/2512.04847v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLanguage%2520Models%2520as%2520Semantic%2520Teachers%253A%2520Post-Training%2520Alignment%2520for%2520Medical%2520Audio%2520Understanding%26entry.906535625%3DTsai-Ning%2520Wang%2520and%2520Lin-Lin%2520Chen%2520and%2520Neil%2520Zeghidour%2520and%2520Aaqib%2520Saeed%26entry.1292438233%3DPre-trained%2520audio%2520models%2520excel%2520at%2520detecting%2520acoustic%2520patterns%2520in%2520auscultation%2520sounds%2520but%2520often%2520fail%2520to%2520grasp%2520their%2520clinical%2520significance%252C%2520limiting%2520their%2520use%2520and%2520performance%2520in%2520diagnostic%2520tasks.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520AcuLa%2520%2528Audio-Clinical%2520Understanding%2520via%2520Language%2520Alignment%2529%252C%2520a%2520lightweight%2520post-training%2520framework%2520that%2520instills%2520semantic%2520understanding%2520into%2520any%2520audio%2520encoder%2520by%2520aligning%2520it%2520with%2520a%2520medical%2520language%2520model%252C%2520which%2520acts%2520as%2520a%2520%2522semantic%2520teacher.%2522%2520To%2520enable%2520alignment%2520at%2520scale%252C%2520we%2520construct%2520a%2520large-scale%2520dataset%2520by%2520leveraging%2520off-the-shelf%2520large%2520language%2520models%2520to%2520translate%2520the%2520rich%252C%2520structured%2520metadata%2520accompanying%2520existing%2520audio%2520recordings%2520into%2520coherent%2520clinical%2520reports.%2520Our%2520alignment%2520strategy%2520combines%2520a%2520representation-level%2520contrastive%2520objective%2520with%2520a%2520self-supervised%2520modeling%252C%2520ensuring%2520that%2520the%2520model%2520learns%2520clinical%2520semantics%2520while%2520preserving%2520fine-grained%2520temporal%2520cues.%2520AcuLa%2520achieves%2520state-of-the-art%2520results%2520across%252018%2520diverse%2520cardio-respiratory%2520tasks%2520from%252010%2520different%2520datasets%252C%2520improving%2520the%2520mean%2520AUROC%2520on%2520classification%2520benchmarks%2520from%25200.68%2520to%25200.79%2520and%252C%2520on%2520the%2520most%2520challenging%2520COVID-19%2520cough%2520detection%2520task%252C%2520boosting%2520the%2520AUROC%2520from%25200.55%2520to%25200.89.%2520Our%2520work%2520demonstrates%2520that%2520this%2520audio-language%2520alignment%2520transforms%2520purely%2520acoustic%2520models%2520into%2520clinically-aware%2520diagnostic%2520tools%252C%2520establishing%2520a%2520novel%2520paradigm%2520for%2520enhancing%2520physiological%2520understanding%2520in%2520audio-based%2520health%2520monitoring.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.04847v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Language%20Models%20as%20Semantic%20Teachers%3A%20Post-Training%20Alignment%20for%20Medical%20Audio%20Understanding&entry.906535625=Tsai-Ning%20Wang%20and%20Lin-Lin%20Chen%20and%20Neil%20Zeghidour%20and%20Aaqib%20Saeed&entry.1292438233=Pre-trained%20audio%20models%20excel%20at%20detecting%20acoustic%20patterns%20in%20auscultation%20sounds%20but%20often%20fail%20to%20grasp%20their%20clinical%20significance%2C%20limiting%20their%20use%20and%20performance%20in%20diagnostic%20tasks.%20To%20bridge%20this%20gap%2C%20we%20introduce%20AcuLa%20%28Audio-Clinical%20Understanding%20via%20Language%20Alignment%29%2C%20a%20lightweight%20post-training%20framew {"title": "Towards Intrinsic Interpretability of Large Language Models:A Survey of Design Principles and Architectures", "author": "Yutong Gao and Qinglin Meng and Yuan Zhou and Liangming Pan", "abstract": "While Large Language Models (LLMs) have achieved strong performance across many NLP tasks, their opaque internal mechanisms hinder trustworthiness and safe deployment. Existing surveys in explainable AI largely focus on post-hoc explanation methods that interpret trained models through external approximations. In contrast, intrinsic interpretability, which builds transparency directly into model architectures and computations, has recently emerged as a promising alternative. This paper presents a systematic review of the recent advances in intrinsic interpretability for LLMs, categorizing existing approaches into five design paradigms: functional transparency, concept alignment, representational decomposability, explicit modularization, and latent sparsity induction. We further discuss open challenges and outline future research directions in this emerging field. The paper list is available at: https://github.com/PKU-PILLAR-Group/Survey-Intrinsic-Interpretability-of-LLMs.", "link": "http://arxiv.org/abs/2604.16042v1", "date": "2026-04-17", "relevancy": 2.5266, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5277}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5277}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4606}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Intrinsic%20Interpretability%20of%20Large%20Language%20Models%3AA%20Survey%20of%20Design%20Principles%20and%20Architectures&body=Title%3A%20Towards%20Intrin {"title": "Proper Body Landmark Subset Enables More Accurate and 5X Faster Recognition of Isolated Signs in LIBRAS", "author": "Daniele L. V. dos Santos and Thiago B. Pereira and Carlos Eduardo G. R. Alves and Richard J. M. G. Tello and Francisco de A. Boldt and Thiago M. Paix\u00e3o", "abstract": "This paper examines the feasibility of utilizing lightweight body landmark detection for recognizing isolated signs in Brazilian Sign Language (LIBRAS). Although the use of skeleton-image representation has enabled substantial improvements in recognition performance, the use of OpenPose for landmark extraction hindered time performance. In a preliminary investigation, we observed that simply replacing OpenPose with lightweight MediaPipe, while improving processing speed, significantly reduced accuracy. To overcome this limitation, we explored landmark subset selection strategies to optimize recognition performance. Experimental results show that a proper landmark subset achieves comparable or superior performance to state-of-the-art methods while reducing processing time by more than 5X. As an additional contribution, we demonstrate that spline-based imputation effectively mitigates missing landmark issues, leading to substantial accuracy gains.", "link": "http://arxiv.org/abs/2510.24887v4", "date": "2026-04-17", "relevancy": 2.4998, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5166}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4922}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4911}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Proper%20Body%20Landmark%20Subset%20Enables%20More%20Accurate%20and%205X%20Faster%20Recognition%20of%20Isolated%20Signs%20in%20LIBRAS&body=Title%3A%20Proper%20Body%20Landmark%20Subset%20Enables%20More%20Accurate%20and%205X%20Faster%20Recognition%20of%20Isolated%20Signs%20in%20LIBRAS%0AAuthor%3A%20Daniele%20L.%20V.%20dos%20Santos%20and%20Thiago%20B.%20Pereira%20and%20Carlos%20Eduardo%20G.%20R.%20Alves%20and%20Richard%20J.%20M.%20G.%20Tello%20and%20Francisco%20de%20A.%20Boldt%20and%20Thiago%20M.%20Paix%C3%A3o%0AAbstract%3A%20This%20paper%20examines%20the%20feasibility%20of%20utilizing%20lightweight%20body%20landmark%20detection%20for%20recognizing%20isolated%20signs%20in%20Brazilian%20Sign%20Language%20%28LIBRAS%29.%20Although%20the%20use%20of%20skeleton-image%20representation%20has%20enabled%20substantial%20improvements%20in%20recognition%20performance%2C%20the%20use%20of%20OpenPose%20for%20landmark%20extraction%20hindered%20time%20performance.%20In%20a%20preliminary%20investigation%2C%20we%20observed%20that%20simply%20replacing%20OpenPose%20with%20lightweight%20MediaPipe%2C%20while%20improving%20processing%20speed%2C%20significantly%20reduced%20accuracy.%20To%20overcome%20this%20limitation%2C%20we%20explored%20landmark%20subset%20selection%20strategies%20to%20optimize%20recognition%20performance.%20Experimental%20results%20show%20that%20a%20proper%20landmark%20subset%20achieves%20comparable%20or%20superior%20performance%20to%20state-of-the-art%20methods%20while%20reducing%20processing%20time%20by%20more%20than%205X.%20As%20an%20additional%20contribution%2C%20we%20demonstrate%20that%20spline-based%20imputation%20effectively%20mitigates%20missing%20landmark%20issues%2C%20leading%20to%20substantial%20accuracy%20gains.%0ALink%3A%20http%3A//arxiv.org/abs/2510.24887v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProper%2520Body%2520Landmark%2520Subset%2520Enables%2520More%2520Accurate%2520and%25205X%2520Faster%2520Recognition%2520o {"title": "Mechanisms of Prompt-Induced Hallucination in Vision-Language Models", "author": "William Rudman and Michal Golovanevsky and Dana Arad and Yonatan Belinkov and Ritambhara Singh and Carsten Eickhoff and Kyle Mahowald", "abstract": "Large vision-language models (VLMs) are highly capable, yet often hallucinate by favoring textual prompts over visual evidence. We study this failure mode in a controlled object-counting setting, where the prompt overstates the number of objects in the image (e.g., asking a model to describe four waterlilies when only three are present). At low object counts, models often correct the overestimation, but as the number of objects increases, they increasingly conform to the prompt regardless of the discrepancy. Through mechanistic analysis of three VLMs, we identify a small set of attention heads whose ablation substantially reduces prompt-induced hallucinations (PIH) by at least 40% without additional training. Across models, PIH-heads mediate prompt copying in model-specific ways. We characterize these differences and show that PIH ablation increases correction toward visual evidence. Our findings offer insights into the internal mechanisms driving prompt-induced hallucinations, revealing model-specific differences in how these behaviors are implemented.", "link": "http://arxiv.org/abs/2601.05201v2", "date": "2026-04-17", "relevancy": 2.4896, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5124}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5124}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "simila ed.&entry.1838667208=http%3A//arxiv.org/abs/2601.05201v2&entry.124074799=Read"},
{"title": "Motion-Adapter: A Diffusion Model Adapter for Text-to-Motion Generation of Compound Actions", "author": "Yue Jiang and Mingyu Yang and Liuyuxin Yang and Yang Xu and Bingxin Yun and Yuhe Zhang", "abstract": "Recent advances in generative motion synthesis have enabled the production of realistic human motions from diverse input modalities. However, synthesizing compound actions from texts, which integrate multiple concurrent actions into coherent full-body sequences, remains a major challenge. We identify two key limitations in current text-to-motion diffusion models: (i) catastrophic neglect, where earlier actions are overwritten by later ones due to improper handling of temporal information, and (ii) attention collapse, which arises from excessive feature fusion in cross-attention mechanisms. As a result, existing approaches often depend on overly detailed textual descriptions (e.g., raising right hand), explicit body-part specifications (e.g., editing the upper body), or the use of large language models (LLMs) for body-part interpretation. These strategies lead to deficient semantic representations of physical structures and kinematic mechanisms, limiting the ability to incorporate natural behaviors such as greeting while walking. To address these issues, we propose the Motion-Adapter, a plug-and-play module that guides text-to-motion diffusion models in generating compound actions by computing decoupled cross-attention maps, which serve as structural masks during the denoising process. Extensive experiments demonstrate that our method consistently produces more faithful and coherent compound motions across diverse textual prompts, surpassing state-of-the-art approaches.", "link": "http://arxiv.org/abs/2604.16135v1", "date": "2026-04-17", "relevancy": 2.481, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6753}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6668}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Motion-Adapter%3A%20A%20Diffusion%20Model%20Adapter%20for%20Text-to-Motion%20Generation%20of%20Compound%20Actions&body=Title%3A%20Motion-Adapter%3A%20A%20Diffusion%20Model%20Adapter%20for%20Text-to-Motion%20Generation%20of%20Compound%20Actions%0AAuthor%3A%20Yue%20Jiang%20and%20Mingyu%20Yang%20and%20Liuyuxin%20Yang%20and%20Yang%20Xu%20and%20Bingxin%20Yun%20and%20Yuhe%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20generative%20motion%20synthesis%20have%20enabled%20the%20production%20of%20realistic%20human%20motions%20from%20diverse%20input%20modalities.%20However%2C%20synthesizing%20compound%20actions%20from%20texts%2C%20which%20integrate%20multiple%20concurrent%20actions%20into%20coherent%20full-body%20sequences%2C%20remains%20a%20major%20challenge.%20We%20identify%20two%20key%20limitations%20in%20current%20text-to-motion%20diffusion%20models%3A%20%28i%29%20catastrophic%20neglect%2C%20where%20earlier%20actions%20are%20overwritten%20by%20later%20ones%20due%20to%20improper%20handling%20of%20temporal%20information%2C%20and%20%28ii%29%20attention%20collapse%2C%20which%20arises%20from%20excessive%20feature%20fusion%20in%20cross-attention%20mechanisms.%20As%20a%20result%2C%20existing%20approaches%20often%20depend%20on%20overly%20detailed%20textual%20descriptions%20%28e.g.%2C%20raising%20right%20hand%29%2C%20explicit%20body-part%20specifications%20%28e.g.%2C%20editing%20the%20upper%20body%29%2C%20or%20the%20use%20of%20large%20language%20models%20%28LLMs%29%20for%20body-part%20interpretation.%20These%20strategies%20lead%20to%20deficient%20semantic%20representations%20of%20physical%20structures%20and%20kinematic%20mechanisms%2C%20limiting%20the%20ability%20to%20incorporate%20natural%20behaviors%20such%20as%20greeting%20while%20walking.%20To%20address%20these%20issues%2C%20we%20propose%20the%20Motion-Adapter%2C%20a%20plug-and-play%20module%20that%20guides%20text-to-motion%20diffusion%20models%20in%20generating%20compound%20actions%20by%20computing%20decoupled%20cross-attention%20maps%2C%20which%20serve%20as%20structural%20masks%20during%20the%20denoising%20process.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20consistently%20produces%20more%20faithful%20and%20coherent%20compound%20motions%20across%20diverse%20textual%20prompts%2C%20surpassing%20state-of-the-art%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16135v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMotion-Adapter%253A%2520A%2520Diffusion%2520Model%2520Adapter%2520for%2520Text-to-Motion%2520Generation%2520of%2520Compound%2520Actions%26entry.906535625%3DYue%2520Jiang%2520and%2520Mingyu%2520Yang%2520and%2520Liuyuxin%2520Yang%2520and%2520Yang%2520Xu%2520and%2520Bingxin%2520Yun%2520and%2520Yuhe%2520Zhang%26entry.1292438233%3DRecent%2520advances%2520in%2520generative%2520motion%2520synthesis%2520have%2520enabled%2520the%2520production%2520of%2520realistic%2520human%2520motions%2520from%2520diverse%2520input%2520modalities.%2520However%252C%2520synthesizing%2520compound%2520actions%2520from%2520texts%252C%2520which%2520integrate%2520multiple%2520concurrent%2520actions%2520into%2520coherent%2520full-body%2520sequences%252C%2520remains%2520a%2520major%2520challenge.%2520We%2520identify%2520two%2520key%2520limitations%2520in%2520current%2520text-to-motion%2520diffusion%2520models%253A%2520%2528i%2529%2520catastrophic%2520neglect%252C%2520where%2520earlier%2520actions%2520are%2520overwritten%2520by%2520later%2520ones%2520due%2520to%2520improper%2520handling%2520of%2520temporal%2520information%252C%2520and%2520%2528ii%2529%2520attention%2520collapse%252C%2520which%2520arises%2520from%2520excessive%2520feature%2520fusion%2520in%2520cross-attention%2520mechanisms.%2520As%2520a%2520result%252C%2520existing%2520approaches%2520often%2520depend%2520on%2520overly%2520detailed%2520textual%2520descriptions%2520%2528e.g.%252C%2520raising%2520right%2520hand%2529%252C%2520explicit%2520body-part%2520specifications%2520%2528e.g.%252C%2520editing%2520the%2520upper%2520body%2529%252C%2520or%2520the%2520use%2520of%2520large%2520language%2520models%2520%2528LLMs%2529%2520for%2520body-part%2520interpretation.%2520These%2520strategies%2520lead%2520to%2520deficient%2520semantic%2520representations%2520of%2520physical%2520structures%2520and%2520kinematic%2520mechanisms%252C%2520limiting%2520the%2520ability%2520to%2520incorporate%2520natural%2520behaviors%2520such%2520as%2520greeting%2520while%2520walking.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520the%2520Motion-Adapter%252C%2520a%2520plug-and-play%2520module%2520that%2520guides%2520text-to-motion%2520diffusion%2520models%2520in%2520generating%2520compound%2520actions%2520by%2520computing%2520decoupled%2520cross-attention%2520maps%252C%2520which%2520serve%2520as%2520structural%2520masks%2520during%2520the%2520denoising%2520process.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520method%2520consistently%2520produces%2520more%2520faithful%2520and%2520coherent%2520compound%2520motions%2520across%2520diverse%2520textual%2520prompts%252C%2520surpassing%2520state-of-the-art%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16135v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Motion-Adapter%3A%20A%20Diffusion%20Model%20Adapter%20for%20Text-to-Motion%20Generation%20of%20Compound%20Actions&entry.906535625=Yue%20Jiang%20and%20Mingyu%20Yang%20and%20Liuyuxin%20Yang%20and%20Yang%20Xu%20and%20Bingxin%20Yun%20and%20Yuhe%20Zhang&entry.1292438233=Recent%20advances%20in%20generative%20motion%20synthesis%20have%20enabled%20the%20production%20of%20realistic%20human%20motions%20from%20diverse%20input%20modalities.%20However%2C%20synthesizing%20compound%20actions%20from%20texts%2C%20which%20integrate%20multiple%20concurrent%20actions%20into%20coherent%20full-body%20sequences%2C%20remains%20a%20major%20challenge.%20We%20identify%20two%20key%20limitations%20in%20current%20text-to-motion%20diffusion%20models%3A%20%28i%29%20catastrophic%20neglect%2C%20where%20earlier%20actions%20are%20overwritten%20by%20later%20ones%20due%20to%20improper%20handling%20of%20temporal%20information%2C%20and%20%28ii%29%20attention%20collapse%2C%20which%20arises%20from%20excessive%20feature%20fusion%20in%20cross-attention%20mechanisms.%20As%20a%20result%2C%20existing%20approaches%20often%20depend%20on%20overly%20detailed%20textual%20descriptions%20%28e.g.%2C%20raising%20right%20hand%29%2C%20explicit%20body-part%20specifications%20%28e.g.%2C%20editing%20the%20upper%20body%29%2C%20or%20the%20use%20of%20large%20language%20models%20%28LLMs%29%20for%20body-part%20interpretation.%20These%20strategies%20lead%20to%20deficient%20semantic%20representations%20of%20physical%20structures%20and%20kinematic%20mechanisms%2C%20limiting%20the%20ability%20to%20incorporate%20natural%20behaviors%20such%20as%20greeting%20while%20walking.%20To%20address%20these%20issues%2C%20we%20propose%20the%20Motion-Adapter%2C%20a%20plug-and-play%20module%20that%20guides%20text-to-motion%20diffusion%20models%20in%20generating%20compound%20actions%20by%20computing%20decoupled%20cross-attention%20maps%2C%20which%20serve%20as%20structural%20masks%20during%20the%20denoising%20process.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20consistently%20produces%20more%20faithful%20and%20coherent%20compound%20motions%20across%20diverse%20textual%20prompts%2C%20surpassing%20state-of-the-art%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2604.16135v1&entry.124074799=Read"},
{"title": "Automatic Combination of Sample Selection Strategies for Few-Shot Learning", "author": "Branislav Pecher and Ivan Srba and Maria Bielikova and Joaquin Vanschoren", "abstract": "In few-shot learning, the selection of samples has a significant impact on the performance of the model. While effective sample selection strategies are well-established in supervised settings, research on large language models largely overlooks them, favouring strategies specifically tailored to individual in-context learning settings. In this paper, we propose a new method for Automatic Combination of SamplE Selection Strategies (ACSESS) to leverage the strengths and complementarity of various well-established selection objectives. We investigate and compare the impact of 23 sample selection strategies on the performance of 5 in-context learning models and 3 few-shot learning approaches (meta-learning, few-shot fine-tuning) over 6 text and 8 image datasets. The experimental results show that the combination of strategies through the ACSESS method consistently outperforms all individual selection strategies and performs on par or exceeds the in-context learning specific baselines. Lastly, we demonstrate that sample selection remains effective even on smaller datasets, yielding the greatest benefits when only a few shots are selected, while its advantage diminishes as the number of shots increases.", "link": "http://arxiv.org/abs/2402.03038v2", "date": "2026-04-17", "relevancy": 2.4697, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5133}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4868}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4817}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20Combination%20of%20Sample%20Selection%20Strategies%20for%20Few-Shot%20Learning&body=Title%3A%20Automatic%20Combination%20of%20Sample%20Selection%20Strategies%20for%20Few-Shot%20Learning%0AAuthor%3A%20Branislav%20Pecher%20and%20Ivan%20Srba%20and%20Maria%20Bielikova%20and%20Joaquin%20Vanschoren%0AAbstract%3A%20In%20few-shot%20learning%2C%20the%20selection%20of%20samples%20has%20a%20significant%20impact%20on%20the%20performance%20of%20the%20model.%20While%20effective%20sample%20selection%20strategies%20are%20well-established%20in%20supervised%20settings%2C%20research%20on%20large%20language%20models%20largely%20overlooks%20them%2C%20favouring%20strategies%20specifically%20tailored%20to%20individual%20in-context%20learning%20settings.%20In%20this%20paper%2C%20we%20propose%20a%20new%20method%20for%20Automatic%20Combination%20of%20SamplE%20Selection%20Strategies%20%28ACSESS%29%20to%20leverage%20the%20strengths%20and%20complementarity%20of%20various%20well-established%20selection%20objectives.%20We%20investigate%20and%20compare%20the%20impact%20of%2023%20sample%20selection%20strategies%20on%20the%20performance%20of%205%20in-context%20learning%20models%20and%203%20few-shot%20learning%20approaches%20%28meta-learning%2C%20few-shot%20fine-tuning%29%20over%206%20text%20and%208%20image%20datasets.%20The%20experimental%20results%20show%20that%20the%20combination%20of%20strategies%20through%20the%20ACSESS%20method%20consistently%20outperforms%20all%20individual%20selection%20strategies%20and%20performs%20on%20par%20or%20exceeds%20the%20in-context%20learning%20specific%20baselines.%20Lastly%2C%20we%20demonstrate%20that%20sample%20selection%20remains%20effective%20even%20on%20smaller%20datasets%2C%20yielding%20the%20greatest%20benefits%20when%20only%20a%20few%20shots%20are%20selected%2C%20while%20its%20advantage%20diminishes%20as%20the%20number%20of%20shots%20increases.%0ALink%3A%20http%3A//arxiv.org/abs/2402.03038v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomatic%2520Combination%2520of%2520Sample%2520Selection%2520Strategies%2520for%2520Few-Shot%2520Learning%26entry.906535625%3DBranislav%2520Pecher%2520and%2520Ivan%2520Srba%2520and%2520Maria%2520Bielikova%2520and%2520Joaquin%2520Vanschoren%26entry.1292438233%3DIn%2520few-shot%2520learning%252C%2520the%2520selection%2520of%2520samples%2520has%2520a%2520significant%2520impact%2520on%2520the%2520performance%2520of%2520the%2520model.%2520While%2520effective%2520sample%2520selection%2520strategies%2520are%2520well-established%2520in%2520supervised%2520settings%252C%2520research%2520on%2520large%2520language%2520models%2520largely%2520overlooks%2520them%252C%2520favouring%2520strategies%2520specifically%2520tailored%2520to%2520individual%2520in-context%2520learning%2520settings.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520new%2520method%2520for%2520Automatic%2520Combination%2520of%2520SamplE%2520Selection%2520Strategies%2520%2528ACSESS%2529%2520to%2520leverage%2520the%2520strengths%2520and%2520complementarity%2520of%2520various%2520well-established%2520selection%2520objectives.%2520We%2520investigate%2520and%2520compare%2520the%2520impact%2520of%252023%2520sample%2520selection%2520strategies%2520on%2520the%2520performance%2520of%25205%2520in-context%2520learning%2520models%2520and%25203%2520few-shot%2520learning%2520approaches%2520%2528meta-learning%252C%2520few-shot%2520fine-tuning%2529%2520over%25206%2520text%2520and%25208%2520image%2520datasets.%2520The%2520experimental%2520results%2520show%2520that%2520the%2520combination%2520of%2520strategies%2520through%2520the%2520ACSESS%2520method%2520consistently%2520outperforms%2520all%2520individual%2520selection%2520strategies%2520and%2520performs%2520on%2520par%2520or%2520exceeds%2520the%2520in-context%2520learning%2520specific%2520baselines.%2520Lastly%252C%2520we%2520demonstrate%2520that%2520sample%2520selection%2520remains%2520effective%2520even%2520on%2520smaller%2520datasets%252C%2520yielding%2520the%2520greatest%2520benefits%2520when%2520only%2520a%2520few%2520shots%2520are%2520selected%252C%2520while%2520its%2520advantage%2520diminishes%2520as%2520the%2520number%2520of%2520shots%2520increases.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2402.03038v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Automatic%20Combination%20of%20Sample%20Selection%20Strategies%20for%20Few-Shot%20Learning&entry.906535625=Branislav%20Pecher%20and%20Ivan%20Srba%20and%20Maria%20Bielikova%20and%20Joaquin%20Vanschoren&entry.1292438233=In%20few-shot%20learning%2C%20the%20selection%20of%20samples%20has%20a%20significant%20impact%20on%20the%20performance%20of%20the%20model.%20While%20effective%20sample%20selection%20strategies%20are%20well-established%20in%20supervised%20settings%2C%20research%20on%20large%20language%20models%20largely%20overlooks%20them%2C%20favouring%20strategies%20specifically%20tailored%20to%20individual%20in-context%20learning%20settings.%20In%20this%20paper%2C%20we%20propose%20a%20new%20method%20for%20Automatic%20Combination%20of%20SamplE%20Selection%20Strategies%20%28ACSESS%29%20to%20leverage%20the%20strengths%20and%20complementarity%20of%20various%20well-established%20selection%20objectives.%20We%20investigate%20and%20compare%20the%20impact%20of%2023%20sample%20selection%20strategies%20on%20the%20performance%20of%205%20in-context%20learning%20models%20and%203%20few-shot%20learning%20approaches%20%28meta-learning%2C%20few-shot%20fine-tuning%29%20over%206%20text%20and%208%20image%20datasets.%20The%20experimental%20results%20show%20that%20the%20combination%20of%20strategies%20through%20the%20ACSESS%20method%20consistently%20outperforms%20all%20individual%20selection%20strategies%20and%20performs%20on%20par%20or%20exc {"title": "From Benchmarking to Reasoning: A Dual-Aspect, Large-Scale Evaluation of LLMs on Vietnamese Legal Text", "author": "Van-Truong Le", "abstract": "The complexity of Vietnam's legal texts presents a significant barrier to public access to justice. While Large Language Models offer a promising solution for legal text simplification, evaluating their true capabilities requires a multifaceted approach that goes beyond surface-level metrics. This paper introduces a comprehensive dual-aspect evaluation framework to address this need. First, we establish a performance benchmark for four state-of-the-art large language models (GPT-4o, Claude 3 Opus, Gemini 1.5 Pro, and Grok-1) across three key dimensions: Accuracy, Readability, and Consistency. Second, to understand the \"why\" behind these performance scores, we conduct a large-scale error analysis on a curated dataset of 60 complex Vietnamese legal articles, using a novel, expert-validated error typology. Our results reveal a crucial trade-off: models like Grok-1 excel in Readability and Consistency but compromise on fine-grained legal Accuracy, while models like Claude 3 Opus achieve high Accuracy scores that mask a significant number of subtle but critical reasoning errors. The error analysis pinpoints \\textit{Incorrect Example} and \\textit{Misinterpretation} as the most prevalent failures, confirming that the primary challenge for current LLMs is not summarization but controlled, accurate legal reasoning. By integrating a quantitative benchmark with a qualitative deep dive, our work provides a holistic and actionable assessment of LLMs for legal applications.", "link": "http://arxiv.org/abs/2604.16270v1", "date": "2026-04-17", "relevancy": 2.4555, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding" %2C%20while%20models%20like%20Claude%203%20Opus%20achieve%20high%20Accuracy%20scores%20that%20mask%20a%20significant%20number%20of%20subtle%20but%20critical%20reasoning%20errors.%20The%20error%20analysis%20pinpoints%20%5Ctextit%7BIncorrect%20Example%7D%20and%20%5Ctextit%7BMisinterpretation%7D%20as%20the%20most%20prevalent%20failures%2C%20confirming%20that%20the%20primary%20challenge%20for%20current%20LLMs%20is%20not%20summarization%20but%20controlled%2C%20accurate%20legal%20reasoning.%20By%20integrating%20a%20quantitative%20benchmark%20with%20a%20qualitative%20deep%20dive%2C%20our%20work%20provides%20a%20holistic%20and%20actionable%20assessment%20of%20LLMs%20for%20legal%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16270v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Benchmarking%2520to%2520Reasoning%253A%2520A%2520Dual-Aspect%252C%2520Large-Scale%2520Evaluation%2520of%2520LLMs%2520on%2520Vietnamese%2520Legal%2520Text%26entry.906535625%3DVan-Truong%2520Le%26entry.1292438233%3DThe%2520complexity%2520of%2520Vietnam%2527s%2520legal%2520texts%2520presents%2520a%2520significant%2520barrier%2520to%2520public%2520access%2520to%2520justice.%2520While%2520Large%2520Language%2520Models%2520offer%2520a%2520promising%2520solution%2520for%2520legal%2520text%2520simplification%252C%2520evaluating%2520their%2520true%2520capabilities%2520requires%2520a%2520multifaceted%2520approach%2520that%2520goes%2520beyond%2520surface-level%2520metrics.%2520This%2520paper%2520introduces%2520a%2520comprehensive%2520dual-aspect%2520evaluation%2520framework%2520to%2520address%2520this%2520need.%2520First%252C%2520we%2520establish%2520a%2520performance%2520benchmark%2520for%2520four%2520state-of-the-art%2520large%2520language%2520models%2520%2528GPT-4o%252C%2520Claude%25203%2520Opus%252C%2520Gemini%25201.5%2520Pro%252C%2520and%2520Grok-1%2529%2520across%2520three%2520key%2520dimensions%253A% to%20public%20access%20to%20justice.%20While%20Large%20Language%20Models%20offer%20a%20promising%20solution%20for%20legal%20text%20simplification%2C%20evaluating%20their%20true%20capabilities%20requires%20a%20multifaceted%20approach%20that%20goes%20beyond%20surface-level%20metrics.%20This%20paper%20introduces%20a%20comprehensive%20dual-aspect%20evaluation%20framework%20to%20address%20this%20need.%20First%2C%20we%20establish%20a%20performance%20benchmark%20for%20four%20state-of-the-art%20large%20language%20models%20%28GPT-4o%2C%20Claude%203%20Opus%2C%20Gemini%201.5%20Pro%2C%20and%20Grok-1%29%20across%20three%20key%20dimensions%3A%20Accuracy%2C%20Readability%2C%20and%20Consistency.%20Second%2C%20to%20understand%20the%20%22why%22%20behind%20these%20performance%20scores%2C%20we%20conduct%20a%20large-scale%20error%20analysis%20on%20a%20curated%20dataset%20of%2060%20complex%20Vietnamese%20legal%20articles%2C%20using%20a%20novel%2C%20expert-validated%20error%20typology.%20Our%20results%20reveal%20a%20crucial%20trade-off%3A%20models%20like%20Grok-1%20excel%20in%20Readability%20and%20Consistency%20but%20compromise%20on%20fine-grained%20legal%20Accuracy%2C%20while%20models%20like%20Claude%203%20Opus%20achieve%20high%20Accuracy%20scores%20that%20mask%20a%20significant%20number%20of%20subtle%20but%20critical%20reasoning%20errors.%20The%20error%20analysis%20pinpoints%20%5Ctextit%7BIncorrect%20Example%7D%20and%20%5Ctextit%7BMisinterpretation%7D%20as%20the%20most%20prevalent%20failures%2C%20confirming%20that%20the%20primary%20challenge%20for%20current%20LLMs%20is%20not%20summarization%20but%20controlled%2C%20accurate%20legal%20reasoning.%20By%20integrating%20a%20quantitative%20benchmark%20with%20a%20qualitative%20deep%20dive%2C%20our%20work%20provides%20a%20holistic%20and%20actionable%20assessment%20of%20LLMs%20for%20legal%20applications.&entry.1838667208=http%3A//arxiv.org/abs/2604.16270v1&entry.124074799=Read"},
{"title": "DualTrack: Sensorless 3D Ultrasound needs Local and Global Context", "author": "Paul F. R. Wilson and Matteo Ronchetti and R\u00fcdiger G\u00f6bl and Viktoria Markova and Sebastian Rosenzweig and Raphael Prevost and Parvin Mousavi and Oliver Zettinig", "abstract": "Three-dimensional ultrasound (US) offers many clinical advantages over conventional 2D imaging, yet its widespread adoption is limited by the cost and complexity of traditional 3D systems. Sensorless 3D US, which uses deep learning to estimate a 3D probe trajectory from a sequence of 2D US images, is a promising alternative. Local features, such as speckle patterns, can help predict frame-to-frame motion, while global features, such as coarse shapes and anatomical structures, can situate the scan relative to anatomy and help predict its general shape. In prior approaches, global features are either ignored or tightly coupled with local feature extraction, restricting the ability to robustly model these two complementary aspects. We propose DualTrack, a novel dual-encoder architecture that leverages decoupled local and global encoders specialized for their respective scales of feature extraction. The local encoder uses dense spatiotemporal convolutions to capture fine-grained features, while the global encoder utilizes an image backbone (e.g., a 2D CNN or foundation model) and temporal attention layers to embed high-level anatomical features and long-range dependencies. A lightweight fusion module then combines these features to estimate the trajectory. Experimental results on a large public benchmark show that DualTrack achieves state-of-the-art accuracy and globally consistent 3D reconstructions, outperforming previous methods and yielding an average reconstruction error below 5 mm.", "link": "http://arxiv.org/abs/2509.09530v2", "date": "2026-04-17", "relevancy": 2.4398, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization coders%20specialized%20for%20their%20respective%20scales%20of%20feature%20extraction.%20The%20local%20encoder%20uses%20dense%20spatiotemporal%20convolutions%20to%20capture%20fine-grained%20features%2C%20while%20the%20global%20encoder%20utilizes%20an%20image%20backbone%20%28e.g.%2C%20a%202D%20CNN%20or%20foundation%20model%29%20and%20temporal%20attention%20layers%20to%20embed%20high-level%20anatomical%20features%20and%20long-range%20dependencies.%20A%20lightweight%20fusion%20module%20then%20combines%20these%20features%20to%20estimate%20the%20trajectory.%20Experimental%20results%20on%20a%20large%20public%20benchmark%20show%20that%20DualTrack%20achieves%20state-of-the-art%20accuracy%20and%20globally%20consistent%203D%20reconstructions%2C%20outperforming%20previous%20methods%20and%20yielding%20an%20average%20reconstruction%20error%20below%205%20mm.%0ALink%3A%20http%3A//arxiv.org/abs/2509.09530v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDualTrack%253A%2520Sensorless%25203D%2520Ultrasound%2520needs%2520Local%2520and%2520Global%2520Context%26entry.906535625%3DPaul%2520F.%2520R.%2520Wilson%2520and%2520Matteo%2520Ronchetti%2520and%2520R%25C3%25BCdiger%2520G%25C3%25B6bl%2520and%2520Viktoria%2520Markova%2520and%2520Sebastian%2520Rosenzweig%2520and%2520Raphael%2520Prevost%2520and%2520Parvin%2520Mousavi%2520and%2520Oliver%2520Zettinig%26entry.1292438233%3DThree-dimensional%2520ultrasound%2520%2528US%2529%2520offers%2520many%2520clinical%2520advantages%2520over%2520conventional%25202D%2520imaging%252C%2520yet%2520its%2520widespread%2520adoption%2520is%2520limited%2520by%2520the%2520cost%2520and%2520complexity%2520of%2520traditional%25203D%2520systems.%2520Sensorless%25203D%2520US%252C%2520which%2520uses%2520deep%2520learning%2520to%2520estimate%2520a%25203D%2520probe%2520trajectory%2520from%2520a%2520sequence%2520of%25202D%2520US%2520images%252C%2520is%2520a%2520promising%2520alternative. {"title": "Topology-Driven Fusion of nnU-Net and MedNeXt for Accurate Brain Tumor Segmentation on Sub-Saharan Africa Dataset", "author": "Prabin Bohara and Pralhad Kumar Shrestha and Arpan Rai and Usha Poudel Lamgade and Confidence Raymond and Dong Zhang and Aondona Lorumbu and Craig Jones and Mahesh Shakya and Bishesh Khanal and Pratibha Kulung", "abstract": "Accurate automatic brain tumor segmentation in Low and Middle-Income (LMIC) countries is challenging due to the lack of defined national imaging protocols, diverse imaging data, extensive use of low-field Magnetic Resonance Imaging (MRI) scanners and limited health-care resources. As part of the Brain Tumor Segmentation (BraTS) Africa 2025 Challenge, we applied topology refinement to the state-of-the-art segmentation models like nnU-Net, MedNeXt, and a combination of both. Since the BraTS-Africa dataset has low MRI image quality, we incorporated the BraTS 2025 challenge data of pre-treatment adult glioma (Task 1) to pre-train the segmentation model and use it to fine-tune on the BraTS-Africa dataset. We added an extra topology refinement module to address the issue of deformation in prediction that arose due to topological error. With the introduction of this module, we achieved a better Normalized Surface Distance (NSD) of 0.810, 0.829, and 0.895 on Surrounding Non-Enhancing FLAIR Hyperintensity (SNFH) , Non-Enhancing Tumor Core (NETC) and Enhancing tumor (ET).", "link": "http://arxiv.org/abs/2604.15964v1", "date": "2026-04-17", "relevancy": 2.4377, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4953}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4875}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link" on%20of%20both.%20Since%20the%20BraTS-Africa%20dataset%20has%20low%20MRI%20image%20quality%2C%20we%20incorporated%20the%20BraTS%202025%20challenge%20data%20of%20pre-treatment%20adult%20glioma%20%28Task%201%29%20to%20pre-train%20the%20segmentation%20model%20and%20use%20it%20to%20fine-tune%20on%20the%20BraTS-Africa%20dataset.%20We%20added%20an%20extra%20topology%20refinement%20module%20to%20address%20the%20issue%20of%20deformation%20in%20prediction%20that%20arose%20due%20to%20topological%20error.%20With%20the%20introduction%20of%20this%20module%2C%20we%20achieved%20a%20better%20Normalized%20Surface%20Distance%20%28NSD%29%20of%200.810%2C%200.829%2C%20and%200.895%20on%20Surrounding%20Non-Enhancing%20FLAIR%20Hyperintensity%20%28SNFH%29%20%2C%20Non-Enhancing%20Tumor%20Core%20%28NETC%29%20and%20Enhancing%20tumor%20%28ET%29.&entry.1838667208=http%3A//arxiv.org/abs/2604.15964v1&entry.124074799=Read"},
{"title": "DASB -- Discrete Audio and Speech Benchmark", "author": "Pooneh Mousavi and Jarod Duret and Darius Petermann and Artem Ploujnikov and Luca Della Libera and Anastasia Kuznetsova and Cem Subakan and Mirco Ravanelli", "abstract": "Discrete audio tokens have recently gained considerable attention for their potential to bridge audio and language processing, enabling multimodal language models that can both generate and understand audio. However, preserving key information such as phonetic content, speaker identity, and paralinguistic cues remains a major challenge. Identifying the optimal tokenizer and configuration is further complicated by inconsistent evaluation settings across existing studies. To address this, we introduce the Discrete Audio and Speech Benchmark (DASB), a comprehensive framework for benchmarking discrete audio tokens across speech, general audio, and music domains on a range of discriminative and generative tasks. Our results show that discrete representations are less robust than continuous ones and require careful tuning of factors such as model architecture, data size, learning rate, and capacity. Semantic tokens generally outperform acoustic tokens, but a gap remains between discrete tokens and continuous features, highlighting the need for further research. DASB codes, evaluation setup, and leaderboards are publicly available at https://poonehmousavi.github.io/DASB-website/.", "link": "http://arxiv.org/abs/2406.14294v3", "date": "2026-04-17", "relevancy": 2.4211, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4893}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.48}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DASB%20--%20Discrete%20Audio%20and%20Speech%20Benchmark&body=Title%3A%20DASB%20--%20Discrete%20Audio%20and%20Speech%20Benchmark%0AAuthor%3A%20Pooneh%20Mousavi%20and%20Jarod%20Duret%20and%20Darius%20Petermann%20and%20Artem%20Ploujnikov%20and%20Luca%20Della%20Libera%20and%20Anastasia%20Kuznetsova%20and%20Cem%20Subakan%20and%20Mirco%20Ravanelli%0AAbstract%3A%20Discrete%20audio%20tokens%20have%20recently%20gained%20considerable%20attention%20for%20their%20potential%20to%20bridge%20audio%20and%20language%20processing%2C%20enabling%20multimodal%20language%20models%20that%20can%20both%20generate%20and%20understand%20audio.%20However%2C%20preserving%20key%20information%20such%20as%20phonetic%20content%2C%20speaker%20identity%2C%20and%20paralinguistic%20cues%20remains%20a%20major%20challenge.%20Identifying%20the%20optimal%20tokenizer%20and%20configuration%20is%20further%20complicated%20by%20inconsistent%20evaluation%20settings%20across%20existing%20studies.%20To%20address%20this%2C%20we%20introduce%20the%20Discrete%20Audio%20and%20Speech%20Benchmark%20%28DASB%29%2C%20a%20comprehensive%20framework%20for%20benchmarking%20discrete%20audio%20tokens%20across%20speech%2C%20general%20audio%2C%20and%20music%20domains%20on%20a%20range%20of%20discriminative%20and%20generative%20tasks.%20Our%20results%20show%20that%20discrete%20representations%20are%20less%20robust%20than%20continuous%20ones%20and%20require%20careful%20tuning%20of%20factors%20such%20as%20model%20architecture%2C%20data%20size%2C%20learning%20rate%2C%20and%20capacity.%20Semantic%20tokens%20generally%20outperform%20acoustic%20tokens%2C%20but%20a%20gap%20remains%20between%20discrete%20tokens%20and%20continuous%20features%2C%20highlighting%20the%20need%20for%20further%20research.%20DASB%20codes%2C%20evaluation%20setup%2C%20and%20leaderboards%20are%20publicly%20available%20at%20https%3A//poonehmousavi.github.io/DASB-website/.%0ALink%3A%20http%3A//arxiv.org/abs/2406.14294v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDASB%2520--%2520Discrete%2520Audio%2520and%2520Speech%2520Benchmark%26entry.906535625%3DPooneh%2520Mousavi%2520and%2520Jarod%2520Duret%2520and%2520Darius%2520Petermann%2520and%2520Artem%2520Ploujnikov%2520and%2520Luca%2520Della%2520Libera%2520and%2520Anastasia%2520Kuznetsova%2520and%2520Cem%2520Subakan%2520and%2520Mirco%2520Ravanelli%26entry.1292438233%3DDiscrete%2520audio%2520tokens%2520have%2520recently%2520gained%2520considerable%2520attention%2520for%2520their%2520potential%2520to%2520bridge%2520audio%2520and%2520language%2520processing%252C%2520enabling%2520multimodal%2520language%2520models%2520that%2520can%2520both%2520generate%2520and%2520understand%2520audio.%2520However%252C%2520preserving%2520key%2520information%2520such%2520as%2520phonetic%2520content%252C%2520speaker%2520identity%252C%2520and%2520paralinguistic%2520cues%2520remains%2520a%2520major%2520challenge.%2520Identifying%2520the%2520optimal%2520tokenizer%2520and%2520configuration%2520is%2520further%2520complicated%2520by%2520inconsistent%2520evaluation%2520settings%2520across%2520existing%2520studies.%2520To%2520address%2520this%252C%2520we%2520introduce%2520the%2520Discrete%2520Audio%2520and%2520Speech%2520Benchmark%2520%2528DASB%2529%252C%2520a%2520comprehensive%2520framework%2520for%2520benchmarking%2520discrete%2520audio%2520tokens%2520across%2520speech%252C%2520general%2520audio%252C%2520and%2520music%2520domains%2520on%2520a%2520range%2520of%2520discriminative%2520and%2520generative%2520tasks.%2520Our%2520results%2520show%2520that%2520discrete%2520representations%2520are%2520less%2520robust%2520than%2520continuous%2520ones%2520and%2520require%2520careful%2520tuning%2520of%2520factors%2520such%2520as%2520model%2520architecture%252C%2520data%2520size%252C%2520learning%2520rate%252C%2520and%2520capacity.%2520Semantic%2520tokens%2520generally%2520outperform%2520acoustic%2520tokens%252C%2520but%2520a%2520gap%2520remains%2520between%2520discrete%2520tokens%2520and%2520continuous%2520features%252C%2520highlighting%2520the%2520need%2520for%2520further%2520research.%2520DASB%2520codes%252C%2520evaluation%2520setup%252C%2520and%2520leaderboards%2520are%2520publicly%2520available%2520at%2520https%253A//poonehmousavi.github.io/DASB-website/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2406.14294v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DASB%20--%20Discrete%20Audio%20and%20Speech%20Benchmark&entry.906535625=Pooneh%20Mousavi%20and%20Jarod%20Duret%20and%20Darius%20Petermann%20and%20Artem%20Ploujnikov%20and%20Luca%20Della%20Libera%20and%20Anastasia%20Kuznetsova%20and%20Cem%20Subakan%20and%20Mirco%20Ravanelli&entry.1292438233=Discrete%20audio%20tokens%20have%20recently%20gained%20considerable%20attention%20for%20their%20potential%20to%20bridge%20audio%20and%20language%20processing%2C%20enabling%20multimodal%20language%20models%20that%20can%20both%20generate%20and%20understand%20audio.%20However%2C%20preserving%20key%20information%20such%20as%20phonetic%20content%2C%20speaker%20identity%2C%20and%20paralinguistic%20cues%20remains%20a%20major%20challenge.%20Identifying%20the%20optimal%20tokenizer%20and%20configuration%20is%20further%20complicated%20by%20inconsistent%20evaluation%20settings%20across%20existing%20studies.%20To%20address%20this%2C%20we%20introduce%20the%20Discrete%20Audio%20and%20Speech%20Benchmark%20%28DASB%29%2C%20a%20comprehensive%20framework%20for%20benchmarking%20discrete%20audio%20tokens%20across%20speech%2C%20general%20audio%2C%20and%20music%20domains%20on%20a%20range%20of%20discriminative%20and%20generative%20tasks.%20Our%20results%20show%20that%20discrete%20representations%20are%20less%20robust%20than%20continuous%20ones%20and%20require%20careful%20tuning%20of%20factors%20such%20as%20model%20architecture%2C%20data%20size%2C%20learning%20rate%2C%20and%20capacity.%20Semantic%20tokens%20generally%20outperform%20acoustic%20tokens%2C%20but%20a%20gap%20remains%20between%20discrete%20tokens%20and%20continuous%20features%2C%20highlighting%20the%20need%20for%20further%20research.%20DASB%20codes%2C%20evaluation%20setup%2C%20and%20leaderboards%20are%20publicly%20available%20at%20https%3A//poonehmousavi.github.io/DASB-website/.&entry.1838667208=http%3A//arxiv.org/abs/2406.14294v3&entry.124074799=Read"},
{"title": "JumpLoRA: Sparse Adapters for Continual Learning in Large Language Models", "author": "Alexandra Dragomir and Ioana Pintilie and Antonio Barbalau and Marius Dragoi and Florin Brad and Cristian Daniel Paduraru and Alexandru Tifrea and Elena Burceanu and Radu Tudor Ionescu", "abstract": "Adapter-based methods have become a cost-effective approach to continual learning (CL) for Large Language Models (LLMs), by sequentially learning a low-rank update matrix for each task. To mitigate catastrophic forgetting, state-of-the-art approaches impose constraints on new adapters with respect to the previous ones, by targeting either subspace or coordinate-wise interference. In this paper, we propose JumpLoRA, a novel framework to adaptively induce sparsity in the Low-Rank Adaptation (LoRA) blocks through the use of JumpReLU gating. The method achieves dynamic parameter isolation, which helps prevent task interference. We demonstrate that our method is highly modular and compatible with LoRA-based CL approaches. Specifically, it significantly boosts the performance of IncLoRA and outperforms the leading state-of-the-art CL method, ELLA.", "link": "http://arxiv.org/abs/2604.16171v1", "date": "2026-04-17", "relevancy": 2.4057, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5073}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4759}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4602}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JumpLoRA%3A%20Sparse%20Adapters%20for%20Continual%20Learning%20in%20Large%20Language%20Models&body=Title%3A%20JumpLoRA%3A%20Sparse%20Adapters%20for%20Continual%20Learning%20in%20Large%20Language%20Mod {"title": "Characterising LLM-Generated Competency Questions: a Cross-Domain Empirical Study using Open and Closed Models", "author": "Reham Alharbi and Valentina Tamma and Terry R. Payne and Jacopo de Berardinis", "abstract": "Competency Questions (CQs) are a cornerstone of requirement elicitation in ontology engineering. CQs represent requirements as a set of natural language questions that an ontology should satisfy; they are traditionally modelled by ontology engineers together with domain experts as part of a human-centred, manual elicitation process. The use of Generative AI automates CQ creation at scale, therefore democratising the process of generation, widening stakeholder engagement, and ultimately broadening access to ontology engineering. However, given the large and heterogeneous landscape of LLMs, varying in dimensions such as parameter scale, task and domain specialisation, and accessibility, it is crucial to characterise and understand the intrinsic, observable properties of the CQs they produce (e.g., readability, structural complexity) through a systematic, cross-domain analysis. This paper introduces a set of quantitative measures for the systematic comparison of CQs across multiple dimensions. Using CQs generated from well defined use cases and scenarios, we identify their salient properties, including readability, relevance with respect to the input text and structural complexity of the generated questions. We conduct our experiments over a set of use cases and requirements using a range of LLMs, including both open (KimiK2-1T, LLama3.1-8B, LLama3.2-3B) and closed models (Gemini 2.5 Pro, GPT 4.1). Our analysis demonstrates that LLM performance reflects distinct generation profiles shaped by the use case.", "link": "http://arxiv.org/abs/2604.16258v1", "date": "2026-04-17", "relevancy": 2.4003, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simi ve%20measures%20for%20the%20systematic%20comparison%20of%20CQs%20across%20multiple%20dimensions.%20Using%20CQs%20generated%20from%20well%20defined%20use%20cases%20and%20scenarios%2C%20we%20identify%20their%20salient%20properties%2C%20including%20readability%2C%20relevance%20with%20respect%20to%20the%20input%20text%20and%20structural%20complexity%20of%20the%20generated%20questions.%20We%20conduct%20our%20experiments%20over%20a%20set%20of%20use%20cases%20and%20requirements%20using%20a%20range%20of%20LLMs%2C%20including%20both%20open%20%28KimiK2-1T%2C%20LLama3.1-8B%2C%20LLama3.2-3B%29%20and%20closed%20models%20%28Gemini%202.5%20Pro%2C%20GPT%204.1%29.%20Our%20analysis%20demonstrates%20that%20LLM%20performance%20reflects%20distinct%20generation%20profiles%20shaped%20by%20the%20use%20case.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16258v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCharacterising%2520LLM-Generated%2520Competency%2520Questions%253A%2520a%2520Cross-Domain%2520Empirical%2520Study%2520using%2520Open%2520and%2520Closed%2520Models%26entry.906535625%3DReham%2520Alharbi%2520and%2520Valentina%2520Tamma%2520and%2520Terry%2520R.%2520Payne%2520and%2520Jacopo%2520de%2520Berardinis%26entry.1292438233%3DCompetency%2520Questions%2520%2528CQs%2529%2520are%2520a%2520cornerstone%2520of%2520requirement%2520elicitation%2520in%2520ontology%2520engineering.%2520CQs%2520represent%2520requirements%2520as%2520a%2520set%2520of%2520natural%2520language%2520questions%2520that%2520an%2520ontology%2520should%2520satisfy%253B%2520they%2520are%2520traditionally%2520modelled%2520by%2520ontology%2520engineers%2520together%2520with%2520domain%2520experts%2520as%2520part%2520of%2520a%2520human-centred%252C%2520manual%2520elicitation%2520process.%2520The%2520use%2520of%2520Generative%2520AI%2520automates%2520CQ%2520creation%2520at%2520scale%252C%2520therefore%2520democratising%2520the%2520process%2520of%2 {"title": "KRONE: Scalable LLM-Augmented Log Anomaly Detection via Hierarchical Abstraction", "author": "Lei Ma and Jinyang Liu and Tieying Zhang and Peter M. VanNostrand and Dennis M. Hofmann and Lei Cao and Elke A. Rundensteiner and Jianjun Chen", "abstract": "Log anomaly detection is crucial for uncovering system failures and security risks. Although logs originate from nested component executions with clear boundaries, this structure is lost when stored as flat sequences. As a result, state-of-the-art methods often miss true dependencies within executions while learning spurious correlations across unrelated events. We propose KRONE, the first hierarchical anomaly detection framework that automatically derives execution hierarchies from flat logs to enable modular, multi-level anomaly detection. At its core, the KRONE Log Abstraction Model extracts application-specific semantic hierarchies, which are used to recursively decompose log sequences into coherent execution units, referred to as KRONE Seqs. This transforms sequence-level detection into a set of modular KRONE Seq-level detection tasks. For each test KRONE Seq, KRONE adopts a hybrid modular detection strategy that routes between an efficient level-independent Local-Context detector for rapid filtering and a Nested-Aware detector that captures cross-level semantic dependencies, augmented with LLM-based anomaly detection and explanation. KRONE further optimizes detection through cached result reuse and early-exit strategies along the hierarchy. Experiments on three public benchmarks and one industrial dataset from ByteDance Cloud demonstrate that KRONE achieves substantial improvements in accuracy (42.49% to 87.98%), F1 score, data efficiency (117.3x reduction), resource efficiency (43.7x reduction), and interpretability. KRONE improves F1-score by 10.07% (82.76% to 92.83%) over prior methods while reducing LLM usage to only 1.1% to 3.3% of the test data. Code: https://github.com/LeiMa0324/KRONE Demo: http {"title": "IA-CLAHE: Image-Adaptive Clip Limit Estimation for CLAHE", "author": "Rikuto Otsuka and Yuho Shoji and Yuka Ogino and Takahiro Toizumi and Atsushi Ito", "abstract": "This paper proposes image-adaptive contrast limited adaptive histogram equalization (IA-CLAHE). Conventional CLAHE is widely used to boost the performance of various computer vision tasks and to improve visual quality for human perception in practical industrial applications. CLAHE applies contrast limited histogram equalization to each local region to enhance local contrast. However, CLAHE often leads to over-enhancement, because the contrast-limiting parameter clip limit is fixed regardless of the histogram distribution of each local region. Our IA-CLAHE addresses this limitation by adaptively estimating tile-wise clip limits from the input image. To achieve this, we train a lightweight clip limits estimator with a differentiable extension of CLAHE, enabling end-to-end optimization. Unlike prior learning-based CLAHE methods, IA-CLAHE does not require pre-searched ground-truth clip limits or task-specific datasets, because it learns to map input image histograms toward a domain-invariant uniform distribution, enabling zero-shot generalization across diverse conditions. Experimental results show that IA-CLAHE consistently improves recognition performance, while simultaneously enhancing visual quality for human perception, without requiring any task-specific training data.", "link": "http://arxiv.org/abs/2604.16010v1", "date": "2026-04-17", "relevancy": 2.3981, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4993}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4727}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "lin {"title": "Sentiment Analysis of German Sign Language Fairy Tales", "author": "Fabrizio Nunnari and Siddhant Jain and Patrick Gebhard", "abstract": "We present a dataset and a model for sentiment analysis of German sign language (DGS) fairy tales. First, we perform sentiment analysis for three levels of valence (negative, neutral, positive) on German fairy tales text segments using four large language models (LLMs) and majority voting, reaching an inter-annotator agreement of 0.781 Krippendorff's alpha. Second, we extract face and body motion features from each corresponding DGS video segment using MediaPipe. Finally, we train an explainable model (based on XGBoost) to predict negative, neutral or positive sentiment from video features. Results show an average balanced accuracy of 0.631. A thorough analysis of the most important features reveal that, in addition to eyebrows and mouth motion on the face, also the motion of hips, elbows, and shoulders considerably contribute in the discrimination of the conveyed sentiment, indicating an equal importance of face and body for sentiment communication in sign language.", "link": "http://arxiv.org/abs/2604.16138v1", "date": "2026-04-17", "relevancy": 2.3929, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5003}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4677}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sentiment%20Analysis%20of%20German%20Sign%20Language%20Fairy%20Tales&body=Title%3A%20Sentiment%20Analysis%20of%20German%20Sign%20Language%20Fairy%20Tales%0AAuthor%3A%20Fabrizio%20Nunnari%20and%20Siddhant%20Jain%20 levels%2520of%2520valence%2520%2528negative%252C%2520neutral%252C%2520positive%2529%2520on%2520German%2520fairy%2520tales%2520text%2520segments%2520using%2520four%2520large%2520language%2520models%2520%2528LLMs%2529%2520and%2520majority%2520voting%252C%2520reaching%2520an%2520inter-annotator%2520agreement%2520of%25200.781%2520Krippendorff%2527s%2520alpha.%2520Second%252C%2520we%2520extract%2520face%2520and%2520body%2520motion%2520features%2520from%2520each%2520corresponding%2520DGS%2520video%2520segment%2520using%2520MediaPipe.%2520Finally%252C%2520we%2520train%2520an%2520explainable%2520model%2520%2528based%2520on%2520XGBoost%2529%2520to%2520predict%2520negative%252C%2520neutral%2520or%2520positive%2520sentiment%2520from%2520video%2520features.%2520Results%2520show%2520an%2520average%2520balanced%2520accuracy%2520of%25200.631.%2520A%2520thorough%2520analysis%2520of%2520the%2520most%2520important%2520features%2520reveal%2520that%252C%2520in%2520addition%2520to%2520eyebrows%2520and%2520mouth%2520motion%2520on%2520the%2520face%252C%2520also%2520the%2520motion%2520of%2520hips%252C%2520elbows%252C%2520and%2520shoulders%2520considerably%2520contribute%2520in%2520the%2520discrimination%2520of%2520the%2520conveyed%2520sentiment%252C%2520indicating%2520an%2520equal%2520importance%2520of%2520face%2520and%2520body%2520for%2520sentiment%2520communication%2520in%2520sign%2520language.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16138v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sentiment%20Analysis%20of%20German%20Sign%20Language%20Fairy%20Tales&entry.906535625=Fabrizio%20Nunnari%20and%20Siddhant%20Jain%20and%20Patrick%20Gebhard&entry.1292438233=We%20present%20a%20dataset%20and%20a%20model%20for%20sentiment%20analysis%20of%20German%20sign%20language%20%28DGS%29%20fairy%20tales.%20First%2C%20we%20perform%20sentiment%20analysis%20for%20three%20levels%20of%20valence {"title": "AIFIND: Artifact-Aware Interpreting Fine-Grained Alignment for Incremental Face Forgery Detection", "author": "Hao Wang and Beichen Zhang and Yanpei Gong and Shaoyi Fang and Zhaobo Qi and Yuanrong Xu and Xinyan Liu and Weigang Zhang", "abstract": "As forgery types continue to emerge consistently, Incremental Face Forgery Detection (IFFD) has become a crucial paradigm. However, existing methods typically rely on data replay or coarse binary supervision, which fails to explicitly constrain the feature space, leading to severe feature drift and catastrophic forgetting. To address this, we propose AIFIND, Artifact-Aware Interpreting Fine-Grained Alignment for Incremental Face Forgery Detection, which leverages semantic anchors to stabilize incremental learning. We design the Artifact-Driven Semantic Prior Generator to instantiate invariant semantic anchors, establishing a fixed coordinate system from low-level artifact cues. These anchors are injected into the image encoder via Artifact-Probe Attention, which explicitly constrains volatile visual features to align with stable semantic anchors. Adaptive Decision Harmonizer harmonizes the classifiers by preserving angular relationships of semantic anchors, maintaining geometric consistency across tasks. Extensive experiments on multiple incremental protocols validate the superiority of AIFIND.", "link": "http://arxiv.org/abs/2604.16207v1", "date": "2026-04-17", "relevancy": 2.3823, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4779}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4758}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4757}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AIFIND%3A%20Artifact-Aware%20Interpreting%20Fine-Grained%20Alignment%20for%20Incremental%20Face%20Forgery%20Detection&body=Title%3A%20AIFIND%3A%20Artifact-Aware%20Interpreting%20Fine-Grained%20Alignment%20for%20Incremental%20Face%20Forgery%20Detection%0AAuthor%3A%20Hao%20Wang%20and%20Beichen%20Zhang%20and%20Yanpei%20Gong%20and%20Shaoyi%20Fang%20and%20Zhaobo%20Qi%20and%20Yuanrong%20Xu%20and%20Xinyan%20Liu%20and%20Weigang%20Zhang%0AAbstract%3A%20As%20forgery%20types%20continue%20to%20emerge%20consistently%2C%20Incremental%20Face%20Forgery%20Detection%20%28IFFD%29%20has%20become%20a%20crucial%20paradigm.%20However%2C%20existing%20methods%20typically%20rely%20on%20data%20replay%20or%20coarse%20binary%20supervision%2C%20which%20fails%20to%20explicitly%20constrain%20the%20feature%20space%2C%20leading%20to%20severe%20feature%20drift%20and%20catastrophic%20forgetting.%20To%20address%20this%2C%20we%20propose%20AIFIND%2C%20Artifact-Aware%20Interpreting%20Fine-Grained%20Alignment%20for%20Incremental%20Face%20Forgery%20Detection%2C%20which%20leverages%20semantic%20anchors%20to%20stabilize%20incremental%20learning.%20We%20design%20the%20Artifact-Driven%20Semantic%20Prior%20Generator%20to%20instantiate%20invariant%20semantic%20anchors%2C%20establishing%20a%20fixed%20coordinate%20system%20from%20low-level%20artifact%20cues.%20These%20anchors%20are%20injected%20into%20the%20image%20encoder%20via%20Artifact-Probe%20Attention%2C%20which%20explicitly%20constrains%20volatile%20visual%20features%20to%20align%20with%20stable%20semantic%20anchors.%20Adaptive%20Decision%20Harmonizer%20harmonizes%20the%20classifiers%20by%20preserving%20angular%20relationships%20of%20semantic%20anchors%2C%20maintaining%20geometric%20consistency%20across%20tasks.%20Extensive%20experiments%20on%20multiple%20incremental%20protocols%20validate%20the%20superiority%20of%20AIFIND.%0ALink%3A%20http%3A//arxiv.org/abs/2604.16207v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9 ric%2520consistency%2520across%2520tasks.%2520Extensive%2520experiments%2520on%2520multiple%2520incremental%2520protocols%2520validate%2520the%2520superiority%2520of%2520AIFIND.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.16207v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AIFIND%3A%20Artifact-Aware%20Interpreting%20Fine-Grained%20Alignment%20for%20Incremental%20Face%20Forgery%20Detection&entry.906535625=Hao%20Wang%20and%20Beichen%20Zhang%20and%20Yanpei%20Gong%20and%20Shaoyi%20Fang%20and%20Zhaobo%20Qi%20and%20Yuanrong%20Xu%20and%20Xinyan%20Liu%20and%20Weigang%20Zhang&entry.1292438233=As%20forgery%20types%20continue%20to%20emerge%20consistently%2C%20Incremental%20Face%20Forgery%20Detection%20%28IFFD%29%20has%20become%20a%20crucial%20paradigm.%20However%2C%20existing%20methods%20typically%20rely%20on%20data%20replay%20or%20coarse%20binary%20supervision%2C%20which%20fails%20to%20explicitly%20constrain%20the%20feature%20space%2C%20leading%20to%20severe%20feature%20drift%20and%20catastrophic%20forgetting.%20To%20address%20this%2C%20we%20propose%20AIFIND%2C%20Artifact-Aware%20Interpreting%20Fine-Grained%20Alignment%20for%20Incremental%20Face%20Forgery%20Detection%2C%20which%20leverages%20semantic%20anchors%20to%20stabilize%20incremental%20learning.%20We%20design%20the%20Artifact-Driven%20Semantic%20Prior%20Generator%20to%20instantiate%20invariant%20semantic%20anchors%2C%20establishing%20a%20fixed%20coordinate%20system%20from%20low-level%20artifact%20cues.%20These%20anchors%20are%20injected%20into%20the%20image%20encoder%20via%20Artifact-Probe%20Attention%2C%20which%20explicitly%20constrains%20volatile%20visual%20features%20to%20align%20with%20stable%20semantic%20anchors.%20Adaptive%20Decision%20Harmonizer%20harmonizes%20the%20classifiers%20by%20preserving%20angular%20relationships%20of%20semantic%20anchors%2C%20maintaining%20geometric%20consistency%20across%

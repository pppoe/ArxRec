{"title": "TiCo: Time-Controllable Training for Spoken Dialogue Models", "author": "Kai-Wei Chang and Wei-Chih Chen and En-Pei Hu and Hung-yi Lee and James Glass", "abstract": "We propose TiCo, a simple post-training method for enabling spoken dialogue models (SDMs) to follow time-constrained instructions and generate responses with controllable duration. This capability is valuable for real-world spoken language systems such as voice assistants and interactive agents, where controlling response duration can improve interaction quality. However, despite their strong ability to generate natural spoken responses, existing models lack time awareness and struggle to follow duration-related instructions (e.g., \"Please generate a response lasting about 15 seconds\"). Through an empirical evaluation of both open-source and commercial SDMs, we show that they frequently fail to satisfy such time-control requirements. TiCo addresses this limitation by enabling models to estimate elapsed speaking time during generation through Spoken Time Markers (STM) (e.g., <10.6 seconds>). These markers help the model maintain awareness of time and adjust the remaining content to meet the target duration. TiCo is simple and efficient: it requires only a small amount of data and no additional question-answer pairs, relying instead on self-generation and reinforcement learning. Experimental results show that TiCo significantly improves adherence to duration constraints while preserving response quality.", "link": "http://arxiv.org/abs/2603.22267v1", "date": "2026-03-23", "relevancy": 2.3405, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5084}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4479}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TiCo%3A%20Time-Controllable%20Training%20for%20Spoken%20Dialogue%20Models&body=Title%3A%20TiCo%3A%20Time-Controllable%20Training%20for%20Spoken%20Dialogue%20Models%0AAuthor%3A%20Kai-Wei%20Chang%20and%20Wei-Chih%20Chen%20and%20En-Pei%20Hu%20and%20Hung-yi%20Lee%20and%20James%20Glass%0AAbstract%3A%20We%20propose%20TiCo%2C%20a%20simple%20post-training%20method%20for%20enabling%20spoken%20dialogue%20models%20%28SDMs%29%20to%20follow%20time-constrained%20instructions%20and%20generate%20responses%20with%20controllable%20duration.%20This%20capability%20is%20valuable%20for%20real-world%20spoken%20language%20systems%20such%20as%20voice%20assistants%20and%20interactive%20agents%2C%20where%20controlling%20response%20duration%20can%20improve%20interaction%20quality.%20However%2C%20despite%20their%20strong%20ability%20to%20generate%20natural%20spoken%20responses%2C%20existing%20models%20lack%20time%20awareness%20and%20struggle%20to%20follow%20duration-related%20instructions%20%28e.g.%2C%20%22Please%20generate%20a%20response%20lasting%20about%2015%20seconds%22%29.%20Through%20an%20empirical%20evaluation%20of%20both%20open-source%20and%20commercial%20SDMs%2C%20we%20show%20that%20they%20frequently%20fail%20to%20satisfy%20such%20time-control%20requirements.%20TiCo%20addresses%20this%20limitation%20by%20enabling%20models%20to%20estimate%20elapsed%20speaking%20time%20during%20generation%20through%20Spoken%20Time%20Markers%20%28STM%29%20%28e.g.%2C%20%3C10.6%20seconds%3E%29.%20These%20markers%20help%20the%20model%20maintain%20awareness%20of%20time%20and%20adjust%20the%20remaining%20content%20to%20meet%20the%20target%20duration.%20TiCo%20is%20simple%20and%20efficient%3A%20it%20requires%20only%20a%20small%20amount%20of%20data%20and%20no%20additional%20question-answer%20pairs%2C%20relying%20instead%20on%20self-generation%20and%20reinforcement%20learning.%20Experimental%20results%20show%20that%20TiCo%20significantly%20improves%20adherence%20to%20duration%20constraints%20while%20preserving%20response%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22267v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTiCo%253A%2520Time-Controllable%2520Training%2520for%2520Spoken%2520Dialogue%2520Models%26entry.906535625%3DKai-Wei%2520Chang%2520and%2520Wei-Chih%2520Chen%2520and%2520En-Pei%2520Hu%2520and%2520Hung-yi%2520Lee%2520and%2520James%2520Glass%26entry.1292438233%3DWe%2520propose%2520TiCo%252C%2520a%2520simple%2520post-training%2520method%2520for%2520enabling%2520spoken%2520dialogue%2520models%2520%2528SDMs%2529%2520to%2520follow%2520time-constrained%2520instructions%2520and%2520generate%2520responses%2520with%2520controllable%2520duration.%2520This%2520capability%2520is%2520valuable%2520for%2520real-world%2520spoken%2520language%2520systems%2520such%2520as%2520voice%2520assistants%2520and%2520interactive%2520agents%252C%2520where%2520controlling%2520response%2520duration%2520can%2520improve%2520interaction%2520quality.%2520However%252C%2520despite%2520their%2520strong%2520ability%2520to%2520generate%2520natural%2520spoken%2520responses%252C%2520existing%2520models%2520lack%2520time%2520awareness%2520and%2520struggle%2520to%2520follow%2520duration-related%2520instructions%2520%2528e.g.%252C%2520%2522Please%2520generate%2520a%2520response%2520lasting%2520about%252015%2520seconds%2522%2529.%2520Through%2520an%2520empirical%2520evaluation%2520of%2520both%2520open-source%2520and%2520commercial%2520SDMs%252C%2520we%2520show%2520that%2520they%2520frequently%2520fail%2520to%2520satisfy%2520such%2520time-control%2520requirements.%2520TiCo%2520addresses%2520this%2520limitation%2520by%2520enabling%2520models%2520to%2520estimate%2520elapsed%2520speaking%2520time%2520during%2520generation%2520through%2520Spoken%2520Time%2520Markers%2520%2528STM%2529%2520%2528e.g.%252C%2520 t%20they%20frequently%20fail%20to%20satisfy%20such%20time-control%20requirements.%20TiCo%20addresses%20this%20limitation%20by%20enabling%20models%20to%20estimate%20elapsed%20speaking%20time%20during%20generation%20through%20Spoken%20Time%20Markers%20%28STM%29%20%28e.g.%2C%20%3C10.6%20seconds%3E%29.%20These%20markers%20help%20the%20model%20maintain%20awareness%20of%20time%20and%20adjust%20the%20remaining%20content%20to%20meet%20the%20target%20duration.%20TiCo%20is%20simple%20and%20efficient%3A%20it%20requires%20only%20a%20small%20amount%20of%20data%20and%20no%20additional%20question-answer%20pairs%2C%20relying%20instead%20on%20self-generation%20and%20reinforcement%20learning.%20Experimental%20results%20show%20that%20TiCo%20significantly%20improves%20adherence%20to%20duration%20constraints%20while%20preserving%20response%20quality.&entry.1838667208=http%3A//arxiv.org/abs/2603.22267v1&entry.124074799=Read"},
{"title": "Mamba-VMR: Multimodal Query Augmentation via Generated Videos for Precise Temporal Grounding", "author": "Yunzhuo Sun and Xinyue Liu and Yanyang Li and Nanding Wu and Yifang Xu and Linlin Zong and Xianchao Zhang and Wenxin Liang", "abstract": "Text-driven video moment retrieval (VMR) remains challenging due to limited capture of hidden temporal dynamics in untrimmed videos, leading to imprecise grounding in long sequences. Traditional methods rely on natural language queries (NLQs) or static image augmentations, overlooking motion sequences and suffering from high computational costs in Transformer-based architectures. Existing approaches fail to integrate subtitle contexts and generated temporal priors effectively, we therefore propose a novel two-stage framework for enhanced temporal grounding. In the first stage, LLM-guided subtitle matching identifies relevant textual cues from video subtitles, fused with the query to generate auxiliary short videos via text-to-video models, capturing implicit motion information as temporal priors. In the second stage, augmented queries are processed through a multi-modal controlled Mamba network, extending text-controlled selection with video-guided gating for efficient fusion of generated priors and long sequences while filtering noise. Our framework is agnostic to base retrieval models and widely applicable for multimodal VMR. Experimental evaluations on the TVR benchmark demonstrate significant improvements over state-of-the-art methods, including reduced computational overhead and higher recall in long-sequence grounding.", "link": "http://arxiv.org/abs/2603.22121v1", "date": "2026-03-23", "relevancy": 2.3342, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6041}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5845}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5743}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mamba-VMR%3A%20Multimodal%20Query%20Augmentation%20via%20Generated%20Videos%20for%20Precise%20Temporal%20Grounding&body=Title%3A%20Mamba-VMR%3A%20Multimodal%20Query%20Augmentation%20via%20Generated%20Videos%20for%20Precise%20Temporal%20Grounding%0AAuthor%3A%20Yunzhuo%20Sun%20and%20Xinyue%20Liu%20and%20Yanyang%20Li%20and%20Nanding%20Wu%20and%20Yifang%20Xu%20and%20Linlin%20Zong%20and%20Xianchao%20Zhang%20and%20Wenxin%20Liang%0AAbstract%3A%20Text-driven%20video%20moment%20retrieval%20%28VMR%29%20remains%20challenging%20due%20to%20limited%20capture%20of%20hidden%20temporal%20dynamics%20in%20untrimmed%20videos%2C%20leading%20to%20imprecise%20grounding%20in%20long%20sequences.%20Traditional%20methods%20rely%20on%20natural%20language%20queries%20%28NLQs%29%20or%20static%20image%20augmentations%2C%20overlooking%20motion%20sequences%20and%20suffering%20from%20high%20computational%20costs%20in%20Transformer-based%20architectures.%20Existing%20approaches%20fail%20to%20integrate%20subtitle%20contexts%20and%20generated%20temporal%20priors%20effectively%2C%20we%20therefore%20propose%20a%20novel%20two-stage%20framework%20for%20enhanced%20temporal%20grounding.%20In%20the%20first%20stage%2C%20LLM-guided%20subtitle%20matching%20identifies%20relevant%20textual%20cues%20from%20video%20subtitles%2C%20fused%20with%20the%20query%20to%20generate%20auxiliary%20short%20videos%20via%20text-to-video%20models%2C%20capturing%20implicit%20motion%20information%20as%20temporal%20priors.%20In%20the%20second%20stage%2C%20augmented%20queries%20are%20processed%20through%20a%20multi-modal%20controlled%20Mamba%20network%2C%20extending%20text-controlled%20selection%20with%20video-guided%20gating%20for%20efficient%20fusion%20of%20generated%20priors%20and%20long%20sequences%20 {"title": "Uncertainty-guided Compositional Alignment with Part-to-Whole Semantic Representativeness in Hyperbolic Vision-Language Models", "author": "Hayeon Kim and Ji Ha Jang and Junghun James Kim and Se Young Chun", "abstract": "While Vision-Language Models (VLMs) have achieved remarkable performance, their Euclidean embeddings remain limited in capturing hierarchical relationships such as part-to-whole or parent-child structures, and often face challenges in multi-object compositional scenarios. Hyperbolic VLMs mitigate this issue by better preserving hierarchical structures and modeling part-whole relations (i.e., whole scene and its part images) through entailment. However, existing approaches do not model that each part has a different level of semantic representativeness to the whole. We propose UNcertainty-guided Compositional Hyperbolic Alignment (UNCHA) for enhancing hyperbolic VLMs. UNCHA models part-to-whole semantic representativeness with hyperbolic uncertainty, by assigning lower uncertainty to more representative parts and higher uncertainty to less representative ones for the whole scene. This representativeness is then incorporated into the contrastive objective with uncertainty-guided weights. Finally, the uncertainty is further calibrated with an entailment loss regularized by entropy-based term. With the proposed losses, UNCHA learns hyperbolic embeddings with more accurate part-whole ordering, capturing the underlying compositional structure in an image and improving its understanding of complex multi-object scenes. UNCHA achieves state-of-the-art performance on zero-shot classification, retrieval, and multi-label classification benchmarks. Our code and models are available at: https://github.com/jeeit17/UNCHA.git.", "link": "http://arxiv.org/abs/2603.22042v1", "date": "2026-03-23", "relevancy": 2.3301, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6033}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5916}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5581}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uncertainty-guided%20Compositional%20Alignment%20with%20Part-to-Whole%20Semantic%20Representativeness%20in%20Hyperbolic%20Vision-Language%20Models&body=Title%3A%20Uncertainty-guided%20Compositional%20Alignment%20with%20Part-to-Whole%20Semantic%20Representativeness%20in%20Hyperbolic%20Vision-Language%20Models%0AAuthor%3A%20Hayeon%20Kim%20and%20Ji%20Ha%20Jang%20and%20Junghun%20James%20Kim%20and%20Se%20Young%20Chun%0AAbstract%3A%20While%20Vision-Language%20Models%20%28VLMs%29%20have%20achieved%20remarkable%20performance%2C%20their%20Euclidean%20embeddings%20remain%20limited%20in%20capturing%20hierarchical%20relationships%20such%20as%20part-to-whole%20or%20parent-child%20structures%2C%20and%20often%20face%20challenges%20in%20multi-object%20compositional%20scenarios.%20Hyperbolic%20VLMs%20mitigate%20this%20issue%20by%20better%20preserving%20hierarchical%20structures%20and%20modeling%20part-whole%20relations%20%28i.e.%2C%20whole%20scene%20and%20its%20part%20images%29%20through%20entailment.%20However%2C%20existing%20approaches%20do%20not%20model%20that%20each%20part%20has%20a%20different%20level%20of%20semantic%20representativeness%20to%20the%20whole.%20We%20propose%20UNcertainty-guided%20Compositional%20Hyperbolic%20Alignment%20%28UNCHA%29%20for%20enhancing%20hyperbolic%20VLMs.%20UNCHA%20models%20part-to-whole%20semantic%20representativeness%20with%20hyperbolic%20uncertainty%2C%20by%20assigning%20lower%20uncertainty%20to%20more%20representative%20parts%20and%20higher%20uncertainty%20to%20less%20representative%20ones%20for%20the%20whole%20scene.%20This%20representativeness%20is%20then%20incorporated%20into%20the%20contrastive%20objective%20with%20uncertainty-guided%20weights.%20Finally%2C%20the%20uncertainty%20is%20further%20calibrated%20with%20an%20entailment%20loss%20regularized%20by%20entropy-based%20term.%20With%20the%20proposed%20losses%2C%20UNCHA%20learns%20hyperbolic%20embeddings%20with%20more%20accurate%20part-whole%20ordering%2C%20capturing%20the%20underlying%20compositional%20structure%20in%20an%20image%20and%20improving%20its%20understanding%20of%20complex%20multi-object%20scenes.%20UNCHA%20achieves%20state-of-the-art%20performance%20on%20zero-shot%20classification%2C%20retrieval%2C%20and%20multi-label%20classification%20benchmarks.%20Our%20code%20and%20models%20are%20available%20at%3A%20https%3A//github.com/jeeit17/UNCHA.git.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22042v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUncertainty-guided%2520Compositional%2520Alignment%2520with%2520Part-to-Whole%2520Semantic%2520Representativeness%2520in%2520Hyperbolic%2520Vision-Language%2520Models%26entry.906535625%3DHayeon%2520Kim%2520and%2520Ji%2520Ha%2520Jang%2520and%2520Junghun%2520James%2520Kim%2520and%2520Se%2520Young%2520Chun%26entry.1292438233%3DWhile%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520performance%252C%2520their%2520Euclidean%2520embeddings%2520remain%2520limited%2520in%2520capturing%2520hierarchical%2520relationships%2520such%2520as%2520part-to-whole%2520or%2520parent-child%2520structures%252C%2520and%2520often%2520face%2520challenges%2520in%2520multi-object%2520compositional%2520scenarios.%2520Hyperbolic%2520VLMs%2520mitigate%2520this%2520issue%2520by%2520better%2520preserving%2520hierarchical%2520structures%2520and%2520modeling%2520part-whole%2520relations%2520%2528i.e.%252C%2520whole%2520scene%2520and%2520its%2520part%2520images%2529%2520through%2520entail {"title": "SelfMOTR: Revisiting MOTR with Self-Generating Detection Priors", "author": "Fabian G\u00fclhan and Emil Mededovic and Yuli Wu and Johannes Stegmaier", "abstract": "End-to-end transformer architectures have driven significant progress in multi-object tracking by unifying detection and association into a single, heuristic-free framework. Despite these benefits, poor detection performance and the inherent conflict between detection and association in a joint architecture remain critical concerns. Recent approaches aim to mitigate these issues by employing advanced denoising or label assignment strategies, or by incorporating detection priors from external object detectors. In this paper, we propose SelfMOTR, a simple yet highly effective detector-free alternative that decouples proposal discovery from association using self-generated internal detection priors. Through extensive analysis and ablation studies, we show that end-to-end transformer trackers with joint detection-association decoding retain substantial hidden detection capacity, and we provide a practical detector-free mechanism for leveraging it. To shed light on these joint decoding dynamics, we draw inspiration from attention sink analyses in large language models, leveraging Track Attention Mass to show that standard generic queries exhibit unbalanced attention, frequently struggling to weigh track context against novel object discovery. SelfMOTR achieves highly competitive performance in complex, dynamic environments, yielding 69.2 HOTA on DanceTrack and leading with 71.1 HOTA on the Bird Flock Tracking (BFT) dataset. Project page: https://medem23.github.io/SM", "link": "http://arxiv.org/abs/2511.20279v2", "date": "2026-03-23", "relevancy": 2.3275, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.6374}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.549}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SelfMOTR%3A%20Revisiting%20MOTR%20with%20Self-Generating%20Detection%20Priors&body=Title%3A%20SelfMOTR%3A%20Revisiting%20MOTR%20with%20Self-Generating%20Detection%20Priors%0AAuthor%3A%20Fabian%20G%C3%BClhan%20and%20Emil%20Mededovic%20and%20Yuli%20Wu%20and%20Johannes%20Stegmaier%0AAbstract%3A%20End-to-end%20transformer%20architectures%20have%20driven%20significant%20progress%20in%20multi-object%20tracking%20by%20unifying%20detection%20and%20association%20into%20a%20single%2C%20heuristic-free%20framework.%20Despite%20these%20benefits%2C%20poor%20detection%20performance%20and%20the%20inherent%20conflict%20between%20detection%20and%20association%20in%20a%20joint%20architecture%20remain%20critical%20concerns.%20Recent%20approaches%20aim%20to%20mitigate%20these%20issues%20by%20employing%20advanced%20denoising%20or%20label%20assignment%20strategies%2C%20or%20by%20incorporating%20detection%20priors%20from%20external%20object%20detectors.%20In%20this%20paper%2C%20we%20propose%20SelfMOTR%2C%20a%20simple%20yet%20highly%20effective%20detector-free%20alternative%20that%20decouples%20proposal%20discovery%20from%20association%20using%20self-generated%20internal%20detection%20priors.%20Through%20extensive%20analysis%20and%20ablation%20studies%2C%20we%20show%20that%20end-to-end%20transformer%20trackers%20with%20joint%20detection-association%20decoding%20retain%20substantial%20hidden%20detection%20capacity%2C%20and%20we%20provide%20a%20practical%20detector-free%20mechanism%20for%20leveraging%20it.%20To%20shed%20light%20on%20these%20joint%20decoding%20dynamics%2C%20we%20draw%20inspiration%20from%20attention%20sink%20analyses%20in%20large%20language%20models%2C%20leveraging%20Track%20Attention%20Mass%20to%20show%20that%20standard%20generic%20queries%20exhibit%20unbalanced%20attention%2C%20frequently%20struggling%20to%20weigh%20track%20context%20against%20novel%20object%20discovery.%20SelfMOTR%20achieves%20highly%20competitive%20performance%20in%20complex%2C%20dynamic%20environments%2C%20yielding%2069.2%20HOTA%20on%20DanceTrack%20and%20leading%20with%2071.1%20HOTA%20on%20the%20Bird%20Flock%20Tracking%20%28BFT%29%20dataset.%20Project%20page%3A%20https%3A//medem23.github.io/SM%0ALink%3A%20http%3A//arxiv.org/abs/2511.20279v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelfMOTR%253A%2520Revisiting%2520MOTR%2520with%2520Self-Generating%2520Detection%2520Priors%26entry.906535625%3DFabian%2520G%25C3%25BClhan%2520and%2520Emil%2520Mededovic%2520and%2520Yuli%2520Wu%2520and%2520Johannes%2520Stegmaier%26entry.1292438233%3DEnd-to-end%2520transformer%2520architectures%2520have%2520driven%2520significant%2520progress%2520in%2520multi-object%2520tracking%2520by%2520unifying%2520detection%2520and%2520association%2520into%2520a%2520single%252C%2520heuristic-free%2520framework.%2520Despite%2520these%2520benefits%252C%2520poor%2520detection%2520performance%2520and%2520the%2520inherent%2520conflict%2520between%2520detection%2520and%2520association%2520in%2520a%2520joint%2520architecture%2520remain%2520critical%2520concerns.%2520Recent%2520approaches%2520aim%2520to%2520mitigate%2520these%2520issues%2520by%2520employing%2520advanced%2520denoising%2520or%2520label%2520assignment%2520strategies%252C%2520or%2520by%2520incorporating%2520detection%2520priors%2520from%2520external%2520object%2520detectors.%2520In%2520this%2520paper%252C%2520we%2520propose%2520SelfMOTR%252C%2520a%2520simple%2520yet%2520highly%2520effective%2520detector-free%2520alternative%2520that%2520decouples%2520proposal%2520discovery%2520from%2 {"title": "Dyadic: A Scalable Platform for Human-Human and Human-AI Conversation Research", "author": "David M. Markowitz", "abstract": "Conversation is ubiquitous in social life, but the empirical study of this interactive process has been thwarted by tools that are insufficiently modular and unadaptive to researcher needs. To relieve many constraints in conversation research, the current tutorial presents an overview and introduction to a new tool, Dyadic (https://www.chatdyadic.com/), a web-based platform for studying human-human and human-AI conversations using text-based or voice-based chats. Dyadic is distinct from other platforms by offering studies with multiple modalities, AI suggestions (e.g., in human-human studies, AI can suggest responses to a participant), live monitoring (e.g., researchers can evaluate, in real time, chats between communicators), and survey deployment (e.g., Likert-type scales, feeling thermometers, and open-ended text boxes can be sent to humans for in situ evaluations of the interaction), among other consequential features. No coding is required to operate Dyadic directly, and integrations with existing survey platforms are offered.", "link": "http://arxiv.org/abs/2603.22227v1", "date": "2026-03-23", "relevancy": 2.3268, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4668}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4665}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4627}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dyadic%3A%20A%20Scalable%20Platform%20for%20Human-Human%20and%20Human-AI%20Conversation%20Research&body=Title%3A%20Dyadic%3A%20A%20Scalable%20Platform%20for%20Human-Human%20and%20Human-AI%20Conversation%20Research%0 {"title": "Omni-WorldBench: Towards a Comprehensive Interaction-Centric Evaluation for World Models", "author": "Meiqi Wu and Zhixin Cai and Fufangchen Zhao and Xiaokun Feng and Rujing Dang and Bingze Song and Ruitian Tian and Jiashu Zhu and Jiachen Lei and Hao Dou and Jing Tang and Lei Sun and Jiahong Wu and Xiangxiang Chu and Zeming Liu and Kaiqi Huang", "abstract": "Video--based world models have emerged along two dominant paradigms: video generation and 3D reconstruction. However, existing evaluation benchmarks either focus narrowly on visual fidelity and text--video alignment for generative models, or rely on static 3D reconstruction metrics that fundamentally neglect temporal dynamics. We argue that the future of world modeling lies in 4D generation, which jointly models spatial structure and temporal evolution. In this paradigm, the core capability is interactive response: the ability to faithfully reflect how interaction actions drive state transitions across space and time. Yet no existing benchmark systematically evaluates this critical dimension. To address this gap, we propose Omni--WorldBench, a comprehensive benchmark specifically designed to evaluate the interactive response capabilities of world models in 4D settings. Omni--WorldBench comprises two key components: Omni--WorldSuite, a systematic prompt suite spanning diverse interaction levels and scene types; and Omni--Metrics, an agent-based evaluation framework that quantifies world modeling capabilities by measuring the causal impact of interaction actions on both final outcomes and intermediate state evolution trajectories. We conduct extensive evaluations of 18 representative world models across multiple paradigms. Our analysis reveals critical limitations of current world models in interactive response, providing actionable insights for future research. Omni-WorldBench will be publicly released to foster progress in interactive 4D world modeling.", "link": "http://arxiv.org/abs/2603.22212v1", " {"title": "EZ-SP: Fast and Lightweight Superpoint-Based 3D Segmentation", "author": "Louis Geist and Loic Landrieu and Damien Robert", "abstract": "Superpoint-based pipelines provide an efficient alternative to point- or voxel-based 3D semantic segmentation, but are often bottlenecked by their CPU-bound partition step. We propose a learnable, fully GPU partitioning algorithm that generates geometrically and semantically coherent superpoints 13$\\times$ faster than prior methods. Our module is compact (under 60k parameters), trains in under 20 minutes with a differentiable surrogate loss, and requires no handcrafted features. Combine with a lightweight superpoint classifier, the full pipeline fits in $<$2 MB of VRAM, scales to multi-million-point scenes, and supports real-time inference. With 72$\\times$ faster inference and 120$\\times$ fewer parameters, EZ-SP matches the accuracy of point-based SOTA models across three domains: indoor scans (S3DIS), autonomous driving (KITTI-360), and aerial LiDAR (DALES). Code and pretrained models are accessible at github.com/drprojects/superpoint_transformer.", "link": "http://arxiv.org/abs/2512.00385v2", "date": "2026-03-23", "relevancy": 2.3137, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5877}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5816}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EZ-SP%3A%20Fast%20and%20Lightweight%20Superpoint-Based%203D%20Segmentation&body=Title%3A%20EZ-SP%3A%20Fast%20and%20Lightweight%20Superpoint-Based%203D%20Segmentation%0AAuthor%3A%20Louis%20Geist%20and%20Loic%20Landrieu%20and%20Damien%20Robert%0AA {"title": "Automatic Essay Scoring and Feedback Generation in Basque Language Learning", "author": "Ekhi Azurmendi and Xabier Arregi and Oier Lopez de Lacalle", "abstract": "This paper introduces the first publicly available dataset for Automatic Essay Scoring (AES) and feedback generation in Basque, targeting the CEFR C1 proficiency level. The dataset comprises 3,200 essays from HABE, each annotated by expert evaluators with criterion specific scores covering correctness, richness, coherence, cohesion, and task alignment enriched with detailed feedback and error examples. We fine-tune open-source models, including RoBERTa-EusCrawl and Latxa 8B/70B, for both scoring and explanation generation. Our experiments show that encoder models remain highly reliable for AES, while supervised fine-tuning (SFT) of Latxa significantly enhances performance, surpassing state-of-the-art (SoTA) closed-source systems such as GPT-5 and Claude Sonnet 4.5 in scoring consistency and feedback quality. We also propose a novel evaluation methodology for assessing feedback generation, combining automatic consistency metrics with expert-based validation of extracted learner errors. Results demonstrate that the fine-tuned Latxa model produces criterion-aligned, pedagogically meaningful feedback and identifies a wider range of error types than proprietary models. This resource and benchmark establish a foundation for transparent, reproducible, and educationally grounded NLP research in low-resource languages such as Basque.", "link": "http://arxiv.org/abs/2512.08713v2", "date": "2026-03-23", "relevancy": 2.2981, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4967}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4429}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4392}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20Essay%20Scoring%20and%20Feedback%20Generation%20in%20Basque%20Language%20Learning&body=Title%3A%20Automatic%20Essay%20Scoring%20and%20Feedback%20Generation%20in%20Basque%20Language%20Learning%0AAuthor%3A%20Ekhi%20Azurmendi%20and%20Xabier%20Arregi%20and%20Oier%20Lopez%20de%20Lacalle%0AAbstract%3A%20This%20paper%20introduces%20the%20first%20publicly%20available%20dataset%20for%20Automatic%20Essay%20Scoring%20%28AES%29%20and%20feedback%20generation%20in%20Basque%2C%20targeting%20the%20CEFR%20C1%20proficiency%20level.%20The%20dataset%20comprises%203%2C200%20essays%20from%20HABE%2C%20each%20annotated%20by%20expert%20evaluators%20with%20criterion%20specific%20scores%20covering%20correctness%2C%20richness%2C%20coherence%2C%20cohesion%2C%20and%20task%20alignment%20enriched%20with%20detailed%20feedback%20and%20error%20examples.%20We%20fine-tune%20open-source%20models%2C%20including%20RoBERTa-EusCrawl%20and%20Latxa%208B/70B%2C%20for%20both%20scoring%20and%20explanation%20generation.%20Our%20experiments%20show%20that%20encoder%20models%20remain%20highly%20reliable%20for%20AES%2C%20while%20supervised%20fine-tuning%20%28SFT%29%20of%20Latxa%20significantly%20enhances%20performance%2C%20surpassing%20state-of-the-art%20%28SoTA%29%20closed-source%20systems%20such%20as%20GPT-5%20and%20Claude%20Sonnet%204.5%20in%20scoring%20consistency%20and%20feedback%20quality.%20We%20also%20propose%20a%20novel%20evaluation%20methodology%20for%20assessing%20feedback%20generation%2C%20combining%20automatic%20consistency%20metrics%20with%20expert-based%20validation%20of%20extracted%20learner%20errors.%20Results%20demonstrate%20that%20the%20fine-tuned%20Latxa%20model%20produces%20criterion-aligned%2C%20pedagogically%20meaningful%20feedback%20and%20identifies%20a%20wider%20range%20of%20error%20 {"title": "Data Scaling for Navigation in Unknown Environments", "author": "Lauri Suomela and Naoki Takahata and Sasanka Kuruppu Arachchige and Harry Edelman and Joni-Kristian K\u00e4m\u00e4r\u00e4inen", "abstract": "Generalization of imitation-learned navigation policies to environments unseen in training remains a major challenge. We address this by conducting the first large-scale study of how data quantity and data diversity affect real-world generalization in end-to-end, map-free visual navigation. Using a curated 4,565-hour crowd-sourced dataset collected across 161 locations in 35 countries, we train policies for point goal navigation and evaluate their closed-loop control performance on sidewalk robots operating in four countries, covering 125 km of autonomous driving.\n  Our results show that large-scale training data enables zero-shot navigation in unknown environments, approaching the performance of policies trained with environment-specific demonstrations. Critically, we find that data diversity is far more important than data quantity. Doubling the number of geographical locations in a training set decreases navigation errors by ~15%, while performance benefit from adding data from existing locations saturates with very little data. We also observe that, with noisy crowd-sourced data, simple regression-based models outperform generative and sequence-based architectures. We release our policies, evaluation setup and example videos at https://lasuomela.github.io/navigation_scaling/.", "link": "http://arxiv.org/abs/2601.09444v2", "date": "2026-03-23", "relevancy": 2.2964, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5891}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5636}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5628}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Data%20Scaling%20for%20Navigation%20in%20Unknown%20Environments&body=Title%3A%20Data%20Scaling%20for%20Navigation%20in%20Unknown%20Environments%0AAuthor%3A%20Lauri%20Suomela%20and%20Naoki%20Takahata%20and%20Sasanka%20Kuruppu%20Arachchige%20and%20Harry%20Edelman%20and%20Joni-Kristian%20K%C3%A4m%C3%A4r%C3%A4inen%0AAbstract%3A%20Generalization%20of%20imitation-learned%20navigation%20policies%20to%20environments%20unseen%20in%20training%20remains%20a%20major%20challenge.%20We%20address%20this%20by%20conducting%20the%20first%20large-scale%20study%20of%20how%20data%20quantity%20and%20data%20diversity%20affect%20real-world%20generalization%20in%20end-to-end%2C%20map-free%20visual%20navigation.%20Using%20a%20curated%204%2C565-hour%20crowd-sourced%20dataset%20collected%20across%20161%20locations%20in%2035%20countries%2C%20we%20train%20policies%20for%20point%20goal%20navigation%20and%20evaluate%20their%20closed-loop%20control%20performance%20on%20sidewalk%20robots%20operating%20in%20four%20countries%2C%20covering%20125%20km%20of%20autonomous%20driving.%0A%20%20Our%20results%20show%20that%20large-scale%20training%20data%20enables%20zero-shot%20navigation%20in%20unknown%20environments%2C%20approaching%20the%20performance%20of%20policies%20trained%20with%20environment-specific%20demonstrations.%20Critically%2C%20we%20find%20that%20data%20diversity%20is%20far%20more%20important%20than%20data%20quantity.%20Doubling%20the%20number%20of%20geographical%20locations%20in%20a%20training%20set%20decreases%20navigation%20errors%20by%20~15%25%2C%20while%20performance%20benefit%20from%20adding%20data%20from%20existing%20locations%20saturates%20with%20very%20little%20data.%20We%20also%20observe%20that%2C%20with%20noisy%20crowd-sourced%20data%2C%20simple%20regression-based%20models%20outperform%20generative%20and%20sequ {"title": "CayleyPy-4: AI-Holography. Towards analogs of holographic string dualities for AI tasks", "author": "A. Chervov and F. Levkovich-Maslyuk and A. Smolensky and F. Khafizov and I. Kiselev and D. Melnikov and I. Koltsov and S. Kudashev and D. Shiltsov and M. Obozov and S. Krymskii and V. Kirova and E. V. Konstantinova and A. Soibelman and S. Galkin and L. Grunwald and A. Kotov and A. Alexandrov and S. Lytkin and D. Fedoriaka and A. Chevychelov and Z. Kogan and A. Natyrova and L. Cheldieva and O. Nikitina and S. Fironov and A. Vakhrushev and A. Lukyanenko and V. Ilin and D. Gorodkov and N. Bogachev and I. Gaiur and M. Zaitsev and F. Petrov and L. Petrov and T. Gaintseva and A. Gavrilova and M. N. Smirnov and N. Kalinin and A. Khan and K. Jung and H. Mousset and H. Isambert and O. Debeaupuis", "abstract": "This is the fourth paper in the CayleyPy project, which applies AI methods to the exploration of large graphs. In this work, we suggest the existence of a new discrete version of holographic string dualities for this setup, and discuss their relevance to AI systems and mathematics. Many modern AI tasks -- such as those addressed by GPT-style language models or RL systems -- can be viewed as direct analogues of predicting particle trajectories on graphs. We investigate this problem for a large family of Cayley graphs, for which we show that surprisingly it admits a dual description in terms of discrete strings. We hypothesize that such dualities may extend to a range of AI systems where they can lead to more efficient computational approaches. In particular, string holographic images of states are proposed as natural candidates for data embeddings, motivated by the \"complexity = volume\" principle in AdS/CFT.\n  For Cayley graphs of the symmetric group S_n, our results indicate that the corresponding dual objects are flat, planar polygons. The diameter of the graph is equal to the number of integer points inside the polygon scaled by n. Vertices of the graph can be mapped holographically to paths inside the polygon, and the usual graph distances correspond to the area under the paths, thus directly realising the \"complexity = volume\" paradigm. We also find evidence for continuous CFTs and dual strings in the large n limit. We confirm this picture and other aspects of the duality in a large initial set of examples. We also present new datasets (obtained by a combination of ML and conventional tools) which should be instrumental in establishing the duality for more general cases.", "link": "http://arxiv.org/abs/2603.22195v1", "date": "2026-03-23", "relevancy": 2.2856, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4712}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4537}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4465}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CayleyPy-4%3A%20AI-Holography.%20Towards%20analogs%20of%20holographic%20string%20dualities%20for%20AI%20tasks&body=Title%3A%20CayleyPy-4%3A%20AI-Holography.%20Towards%20analogs%20of%20holographic%20string%20dualities%20for%20AI%20tasks%0AAuthor%3A%20A.%20Chervov%20and%20F.%20Levkovich-Maslyuk%20and%20A.%20Smolensky%20and%20F.%20Khafizov%20and%20I.%20Kiselev%20and%20D.%20Melnikov%20and%20I.%20Koltsov%20and%20S.%20Kudashev%20and%20D.%20Shiltsov%20and%20M.%20Obozov%20and%20S.%20Krymskii%20and%20V.%20Kirova%20and%20E.%20V.%20Konstantinova%20and%20A.%20Soibelman%20and%20S.%20Galkin%20and%20L.%20Grunwald%20and%20A.%20Kotov%20and%20A.%20Alexandrov%20and%20S.%20Lytkin%20and%20D.%20Fedoriaka%20and%20A.%20Chevychelov%20and%20Z.%20Kogan%20and%20A.%20Natyrova%20and%20L.%20Cheldieva%20and%20O.%20Nikitina%20and%20S.%20Fironov%20and%20A.%20Vakhrushev%20and {"title": "SegMaFormer: A Hybrid State-Space and Transformer Model for Efficient Segmentation", "author": "Duy D. Nguyen and Phat T. Tran-Truong", "abstract": "The advent of Transformer and Mamba-based architectures has significantly advanced 3D medical image segmentation by enabling global contextual modeling, a capability traditionally limited in Convolutional Neural Networks (CNNs). However, state-of-the-art Transformer models often entail substantial computational complexity and parameter counts, which is particularly prohibitive for volumetric data and further exacerbated by the limited availability of annotated medical imaging datasets. To address these limitations, this work introduces SegMaFormer, a lightweight hybrid architecture that synergizes Mamba and Transformer modules within a hierarchical volumetric encoder for efficient long-range dependency modeling. The model strategically employs Mamba-based layers in early, high-resolution stages to reduce computational overhead while capturing essential spatial context, and reserves self-attention mechanisms for later, lower-resolution stages to refine feature representation. This design is augmented with generalized rotary position embeddings to enhance spatial awareness. Despite its compact structure, SegMaFormer achieves competitive performance on three public benchmarks (Synapse, BraTS, and ACDC), matching the Dice coefficient of significantly larger models. Empirically, our approach reduces parameters by up to 75x and substantially decreases FLOPs compared to current state-of-the-art models, establishing an efficient and high-performing solution for 3D medical image segmentation.", "link": "http://arxiv.org/abs/2603.22002v1", "date": "2026-03-23", "relevancy": 2.2814, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5811}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5664}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5533}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SegMaFormer%3A%20A%20Hybrid%20State-Space%20and%20Transformer%20Model%20for%20Efficient%20Segmentation&body=Title%3A%20SegMaFormer%3A%20A%20Hybrid%20State-Space%20and%20Transformer%20Model%20for%20Efficient%20Segmentation%0AAuthor%3A%20Duy%20D.%20Nguyen%20and%20Phat%20T.%20Tran-Truong%0AAbstract%3A%20The%20advent%20of%20Transformer%20and%20Mamba-based%20architectures%20has%20significantly%20advanced%203D%20medical%20image%20segmentation%20by%20enabling%20global%20contextual%20modeling%2C%20a%20capability%20traditionally%20limited%20in%20Convolutional%20Neural%20Networks%20%28CNNs%29.%20However%2C%20state-of-the-art%20Transformer%20models%20often%20entail%20substantial%20computational%20complexity%20and%20parameter%20counts%2C%20which%20is%20particularly%20prohibitive%20for%20volumetric%20data%20and%20further%20exacerbated%20by%20the%20limited%20availability%20of%20annotated%20medical%20imaging%20datasets.%20To%20address%20these%20limitations%2C%20this%20work%20introduces%20SegMaFormer%2C%20a%20lightweight%20hybrid%20architecture%20that%20synergizes%20Mamba%20and%20Transformer%20modules%20within%20a%20hierarchical%20volumetric%20encoder%20for%20efficient%20long-range%20dependency%20modeling.%20The%20model%20strategically%20employs%20Mamba-based%20layers%20in%20early%2C%20high-resolution%20stages%20to%20reduce%20computational%20overhead%20while%20capturing%20essential%20spatial%20context%2C%20and%20reserves%20self-attention%20mechanisms%20for%20later%2C%20lower-resolution%20stages%20to%20refine%20feature%20representation.%20This%20design%20is%20augmented%20with%20generalized%20rotary%20position%20embeddings%20to%20enhance%20spatial%20awareness.%20Despite%20its%20compact {"title": "BHDD: A Burmese Handwritten Digit Dataset", "author": "Swan Htet Aung and Hein Htet and Htoo Say Wah Khaing and Thuya Myo Nyunt", "abstract": "We introduce the Burmese Handwritten Digit Dataset (BHDD), a collection of 87,561 grayscale images of handwritten Burmese digits in ten classes. Each image is 28x28 pixels, following the MNIST format. The training set has 60,000 samples split evenly across classes; the test set has 27,561 samples with class frequencies as they arose during collection. Over 150 people of different ages and backgrounds contributed samples. We analyze the dataset's class distribution, pixel statistics, and morphological variation, and identify digit pairs that are easily confused due to the round shapes of the Myanmar script. Simple baselines (an MLP, a two-layer CNN, and an improved CNN with batch normalization and augmentation) reach 99.40%, 99.75%, and 99.83% test accuracy respectively. BHDD is available under CC BY-SA 4.0 at https://github.com/baseresearch/BHDD", "link": "http://arxiv.org/abs/2603.21966v1", "date": "2026-03-23", "relevancy": 2.2794, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4597}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4571}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BHDD%3A%20A%20Burmese%20Handwritten%20Digit%20Dataset&body=Title%3A%20BHDD%3A%20A%20Burmese%20Handwritten%20Digit%20Dataset%0AAuthor%3A%20Swan%20Htet%20Aung%20and%20Hein%20Htet%20and%20Htoo%20Say%20Wah%20Khaing%20and%20Thuya%20Myo%20Nyunt%0AAbstract%3A%20We%20introduce%20the%20Burmese%20Handwritten%20Digit%20Dataset%20%28BHDD%29%2C%20a%20collection%20of%2087%2C561%20grayscale%20images%20of%20handwritten%20Burmese%20digits%20in%20ten%20classes.%20Each%20image%20is%2028x28%20pixels%2C%20following%20the%20MNIST%20format.%20The%20training%20set%20has%2060%2C000%20samples%20split%20evenly%20across%20classes%3B%20the%20test%20set%20has%2027%2C561%20samples%20with%20class%20frequencies%20as%20they%20arose%20during%20collection.%20Over%20150%20people%20of%20different%20ages%20and%20backgrounds%20contributed%20samples.%20We%20analyze%20the%20dataset%27s%20class%20distribution%2C%20pixel%20statistics%2C%20and%20morphological%20variation%2C%20and%20identify%20digit%20pairs%20that%20are%20easily%20confused%20due%20to%20the%20round%20shapes%20of%20the%20Myanmar%20script.%20Simple%20baselines%20%28an%20MLP%2C%20a%20two-layer%20CNN%2C%20and%20an%20improved%20CNN%20with%20batch%20normalization%20and%20augmentation%29%20reach%2099.40%25%2C%2099.75%25%2C%20and%2099.83%25%20test%20accuracy%20respectively.%20BHDD%20is%20available%20under%20CC%20BY-SA%204.0%20at%20https%3A//github.com/baseresearch/BHDD%0ALink%3A%20http%3A//arxiv.org/abs/2603.21966v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBHDD%253A%2520A%2520Burmese%2520Handwritten%2520Digit%2520Dataset%26entry.906535625%3DSwan%2520Htet%2520Aung%2520and%2520Hein%2520Htet%2520and%2520Htoo%2520Say%2520Wah%2520Khaing%2520and%2520Thuya%2520Myo%2520Nyunt%26entry.1292438233%3DWe%2520introduce%2520the%2520Burmese%2520Handwritten%2520Digit%2520Dataset%2520%2528BHDD%2529%252C%2520a%2520collection%2520of%252087%252C561%2520grayscale%2520images%2520of%2520handwritten%2520Burmese%2520digits%2520in%2520ten%2520classes.%2520Each%2520image%2520is%252028x28%2520pixels%252C%2520following%2520the%2520MNIST%2520format.%2520The%2520training%2520set%2520has%252060%252C000%2520samples%2520split%2520evenly%2520across%2520classes%253B%2520the%2520test%2520set%2520has%252027%252C561%2520samples%2520with%2520class%2520frequencies%2520as%2520they%2520arose%2520during%2520collection.%2520Over%2520150%2520people%2520of%2520different%2520ages%2520and%2520backgrounds%2520contributed%2520samples.%2520We%2520analyze%2520the%2520dataset%2527s%2520class%2520distribution%252C%2520pixel%2520statistics%252C%2520and%2520morphological%2520variation%252C%2520and%2520identify%2520digit%2520pairs%2520that%2520are%2520easily%2520confused%2520due%2520to%2520the%2520round%2520shapes%2520of%2520the%2520Myanmar%2520script.%2520Simple%2520baselines%2520%2528an%2520MLP%252C%2520a%2520two-layer%2520CNN%252C%2520and%2520an%2520improved%2520CNN%2520with%2520batch%2520normalization%2520and%2520augmentation%2529%2520reach%252099.40%2525%252C%252099.75%2525%252C%2520and%252099.83%2525%2520test%2520accuracy%2520respectively.%2520BHDD%2520is%2520available%2520under%2520CC%2520BY-SA%25204.0%2520at%2520https%253A//github.com/baseresearch/BHDD%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21966v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BHDD%3A%20A%20Burmese%20Handwritten%20Digit%20Dataset&entry.906535625=Swan%20Htet%20Aung%20and%20Hein%20Htet%20and%20Htoo%20Say%20Wah%20Khaing%20and%20Thuya%20Myo%20Nyunt&entry.1292438233=We%20introduce%20the%20Burmese%20Handwritten%20Digit%20Dataset%20%28BHDD%29%2C%20a%20collection%20of%2087%2C561%20grayscale%20images%20of%20handwritten%20Burmese%20digits%20in%20ten%20classes.%20Each%20image%20is%2028x28%20pixels%2C%20following%20the%20MNIST%20format.%20The%20training%20set%20has%2060%2C000%20samples%20split%20evenly%20across%20classes%3B%20the%20test%20set%20has%2027%2C561%20samples%20with%20class%20frequencies%20as%20they%20arose%20during%20collection.%20Over%20150%20people%20of%20different%20ages%20and%20backgrounds%20contributed%20samples.%20We%20analyze%20the%20dataset%27s%20class%20distribution%2C%20pixel%20statistics%2C%20and%20morphological%20variation%2C%20and {"title": "SHAPE: Structure-aware Hierarchical Unsupervised Domain Adaptation with Plausibility Evaluation for Medical Image Segmentation", "author": "Linkuan Zhou and Yinghao Xia and Yufei Shen and Xiangyu Li and Wenjie Du and Cong Cong and Leyi Wei and Ran Su and Qiangguo Jin", "abstract": "Unsupervised Domain Adaptation (UDA) is essential for deploying medical segmentation models across diverse clinical environments. Existing methods are fundamentally limited, suffering from semantically unaware feature alignment that results in poor distributional fidelity and from pseudo-label validation that disregards global anatomical constraints, thus failing to prevent the formation of globally implausible structures. To address these issues, we propose SHAPE (Structure-aware Hierarchical Unsupervised Domain Adaptation with Plausibility Evaluation), a framework that reframes adaptation towards global anatomical plausibility. Built on a DINOv3 foundation, its Hierarchical Feature Modulation (HFM) module first generates features with both high fidelity and class-awareness. This shifts the core challenge to robustly validating pseudo-labels. To augment conventional pixel-level validation, we introduce Hypergraph Plausibility Estimation (HPE), which leverages hypergraphs to assess the global anatomical plausibility that standard graphs cannot capture. This is complemented by Structural Anomaly Pruning (SAP) to purge remaining artifacts via cross-view stability. SHAPE significantly outperforms prior methods on cardiac and abdominal cross-modality benchmarks, achieving state-of-the-art average Dice scores of 90.08% (MRI->CT) and 78.51% (CT->MRI) on cardiac data, and 87.48% (MRI->CT) and 86.89% (CT->MRI) on abdominal data. The code is available at https://github.com/BioMedIA-repo/SHAPE.", "link": "http://arxiv.org/abs/2603.21904v1", "date": "2026-03-23", "relevancy": 2.2719, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6014}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5759}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SHAPE%3A%20Structure-aware%20Hierarchical%20Unsupervised%20Domain%20Adaptation%20with%20Plausibility%20Evaluation%20for%20Medical%20Image%20Segmentation&body=Title%3A%20SHAPE%3A%20Structure-aware%20Hierarchical%20Unsupervised%20Domain%20Adaptation%20with%20Plausibility%20Evaluation%20for%20Medical%20Image%20Segmentation%0AAuthor%3A%20Linkuan%20Zhou%20and%20Yinghao%20Xia%20and%20Yufei%20Shen%20and%20Xiangyu%20Li%20and%20Wenjie%20Du%20and%20Cong%20Cong%20and%20Leyi%20Wei%20and%20Ran%20Su%20and%20Qiangguo%20Jin%0AAbstract%3A%20Unsupervised%20Domain%20Adaptation%20%28UDA%29%20is%20essential%20for%20deploying%20medical%20segmentation%20models%20across%20diverse%20clinical%20environments.%20Existing%20methods%20are%20fundamentally%20limited%2C%20suffering%20from%20semantically%20unaware%20feature%20alignment%20that%20results%20in%20poor%20distributional%20fidelity%20and%20from%20pseudo-label%20validation%20that%20disregards%20global%20anatomical%20constraints%2C%20thus%20failing%20to%20prevent%20the%20formation%20of%20globally%20implausible%20structures.%20To%20address%20these%20issues%2C%20we%20propose%20SHAPE%20%28Structure-aware%20Hierarchical%20Unsupervised%20Domain%20Adaptation%20with%20Plausibility%20Evaluation%29%2C%20a%20framework%20that%20reframes%20adaptation%20towards%20global%20anatomical%20plausibility.%20Built%20on%20a%20DINOv3%20foundation%2C%20its%20Hierarchical%20Feature%20Modulation%20%28HFM%29%20module%20first%20generates%20features%20with%20both%20high%20fidelity%20and%20class-awareness.%20This%20shifts%20the%20core%20challenge%20to%20robustly%20validating%20pseudo-labels.%20To%20augment%20conventional%20pixel-level%20validation%2C%20we%20introduce%20Hypergraph%20Plausibility%20Estimation%20%28HPE%29%2C%20which%20leverages%20hypergraphs%20to%20assess%20the%20global%20anatomical%20plausibility%20that%20standard%20graphs%20cannot%20capture.%20This%20is%20complemented%20by%20Structural%20Anomaly%20Pruning%20%28SAP%29%20to%20purge%20remaining%20artifacts%20via%20cross-view%20stability.%20SHAPE%20significantly%20outperforms%20prior%20methods%20on%20cardiac%20and%20abdominal%20cross-modality%20benchmarks%2C%20achieving%20state-of-the-art%20average%20Dice%20scores%20of%2090.08%25%20%28MRI-%3ECT%29%20and%2078.51%25%20%28CT-%3EMRI%29%20on%20cardiac%20data%2C%20and%2087.48%25%20%28MRI-%3ECT%29%20and%2086.89%25%20%28CT-%3EMRI%29%20on%20abdominal%20data.%20The%20code%20is%20available%20at%20https%3A//github.com/BioMedIA-repo/SHAPE.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21904v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSHAPE%253A%2520Structure-aware%2520Hierarchical%2520Unsupervised%2520Domain%2520Adaptation%2520with%2520Plausibility%2520Evaluation%2520for%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DLinkuan%2520Zhou%2520and%2520Yinghao%2520Xia%2520and%2520Yufei%2520Shen%2520and%2520Xiangyu%2520Li%2520and%2520Wenjie%2520Du%2520and%2520Cong%2520Cong%2520and%2520Leyi%2520Wei%2520and%2520Ran%2520Su%2520and%2520Qiangguo%2520Jin%26entry.1292438233%3DUnsupervised%2520Domain%2520Adaptation%2520%2528UDA%2529%2520is%2520essential%2520for%2520deploying%2520medical%2520segmentation%2520models%2520across%2520diverse%2520clinical%2520environments.%2520Existing%2520methods%2520are%2520fundamentally%2520limited%252C%2520suffering%2520from%2520semantically%2520unaware%2520feature%2520alignment%2520that%2520results%2520in%2520poor%2520distributional%2520fidelity%2520and%2520from%2520pseudo- {"title": "ThinkJEPA: Empowering Latent World Models with Large Vision-Language Reasoning Model", "author": "Haichao Zhang and Yijiang Li and Shwai He and Tushar Nagarajan and Mingfei Chen and Jianglin Lu and Ang Li and Yun Fu", "abstract": "Recent progress in latent world models (e.g., V-JEPA2) has shown promising capability in forecasting future world states from video observations. Nevertheless, dense prediction from a short observation window limits temporal context and can bias predictors toward local, low-level extrapolation, making it difficult to capture long-horizon semantics and reducing downstream utility. Vision--language models (VLMs), in contrast, provide strong semantic grounding and general knowledge by reasoning over uniformly sampled frames, but they are not ideal as standalone dense predictors due to compute-driven sparse sampling, a language-output bottleneck that compresses fine-grained interaction states into text-oriented representations, and a data-regime mismatch when adapting to small action-conditioned datasets. We propose a VLM-guided JEPA-style latent world modeling framework that combines dense-frame dynamics modeling with long-horizon semantic guidance via a dual-temporal pathway: a dense JEPA branch for fine-grained motion and interaction cues, and a uniformly sampled VLM \\emph{thinker} branch with a larger temporal stride for knowledge-rich guidance. To transfer the VLM's progressive reasoning signals effectively, we introduce a hierarchical pyramid representation extraction module that aggregates multi-layer VLM representations into guidance features compatible with latent prediction. Experiments on hand-manipulation trajectory prediction show that our method outperforms both a strong VLM-only baseline and a JEPA-predictor baseline, and yields more robust long-horizon rollout behavior.", "link": "http://arxiv.org/abs/2603.22281v1", "date": "2026-03-23", "relevancy": 2.2712, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.568}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ThinkJEPA%3A%20Empowering%20Latent%20World%20Models%20with%20Large%20Vision-Language%20Reasoning%20Model&body=Title%3A%20ThinkJEPA%3A%20Empowering%20Latent%20World%20Models%20with%20Large%20Vision-Language%20Reasoning%20Model%0AAuthor%3A%20Haichao%20Zhang%20and%20Yijiang%20Li%20and%20Shwai%20He%20and%20Tushar%20Nagarajan%20and%20Mingfei%20Chen%20and%20Jianglin%20Lu%20and%20Ang%20Li%20and%20Yun%20Fu%0AAbstract%3A%20Recent%20progress%20in%20latent%20world%20models%20%28e.g.%2C%20V-JEPA2%29%20has%20shown%20promising%20capability%20in%20forecasting%20future%20world%20states%20from%20video%20observations.%20Nevertheless%2C%20dense%20prediction%20from%20a%20short%20observation%20window%20limits%20temporal%20context%20and%20can%20bias%20predictors%20toward%20local%2C%20low-level%20extrapolation%2C%20making%20it%20difficult%20to%20capture%20long-horizon%20semantics%20and%20reducing%20downstream%20utility.%20Vision--language%20models%20%28VLMs%29%2C%20in%20contrast%2C%20provide%20strong%20semantic%20grounding%20and%20general%20knowledge%20by%20reasoning%20over%20uniformly%20sampled%20frames%2C%20but%20they%20are%20not%20ideal%20as%20standalone%20dense%20predictors%20due%20to%20compute-driven%20sparse%20sampling%2C%20a%20language-output%20bottleneck%20that%20compresses%20fine-grained%20interaction%20states%20into%20text-oriented%20representations%2C%20and%20a%20data-regime%20mismatch%20when%20adapting%20to%20small%20action-conditioned%20datasets.%20We%20propose%20a%20VLM-guided%20JEPA-style%20latent%20world%20modeling%20framework%20that%20combines%20dense-frame%20dynamics%20modeling%20with%20long-horizon%20semantic%20guidance%20via%20a%20dual-temporal%20pathway%3A%20a%20dense%20JEPA%20branch%20for%20fine-grained%20motion%20and%20interaction%20cues%2C%20and%20a%20uniformly%20sampled%20VLM%20%5Cemph%7Bthinker%7D%20branch%20with%20a%20larger%20temporal%20stride%20for%20knowledge-rich%20guidance.%20To%20transfer%20the%20VLM%27s%20progressive%20reasoning%20signals%20effectively%2C%20we%20introduce%20a%20hierarchical%20pyramid%20representation%20extraction%20module%20that%20aggregates%20multi-layer%20VLM%20representations%20into%20guidance%20features%20compatible%20with%20latent%20prediction.%20Experiments%20on%20hand-manipulation%20trajectory%20prediction%20show%20that%20our%20method%20outperforms%20both%20a%20strong%20VLM-only%20baseline%20and%20a%20JEPA-predictor%20baseline%2C%20and%20yields%20more%20robust%20long-horizon%20rollout%20behavior.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22281v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinkJEPA%253A%2520Empowering%2520Latent%2520World%2520Models%2520with%2520Large%2520Vision-Language%2520Reasoning%2520Model%26entry.906535625%3DHaichao%2520Zhang%2520and%2520Yijiang%2520Li%2520and%2520Shwai%2520He%2520and%2520Tushar%2520Nagarajan%2520and%2520Mingfei%2520Chen%2520and%2520Jianglin%2520Lu%2520and%2520Ang%2520Li%2520and%2520Yun%2520Fu%26entry.1292438233%3DRecent%2520progress%2520in%2520latent%2520world%2520models%2520%2528e.g.%252C%2520V-JEPA2%2529%2520has%2520shown%2520promising%2520capability%2520in%2520forecasting%2520future%2520world%2520states%2520from%2520video%2520observations.%2520Nevertheless%252C%2520dense%2520prediction%2520from%2520a%2520short%2520observation%2520window%2520limits%2520temporal%2520context%2520and%2520can%2520bias%2520predictors%2520toward%2520local%252C%2 ields%2520more%2520robust%2520long-horizon%2520rollout%2520behavior.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22281v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ThinkJEPA%3A%20Empowering%20Latent%20World%20Models%20with%20Large%20Vision-Language%20Reasoning%20Model&entry.906535625=Haichao%20Zhang%20and%20Yijiang%20Li%20and%20Shwai%20He%20and%20Tushar%20Nagarajan%20and%20Mingfei%20Chen%20and%20Jianglin%20Lu%20and%20Ang%20Li%20and%20Yun%20Fu&entry.1292438233=Recent%20progress%20in%20latent%20world%20models%20%28e.g.%2C%20V-JEPA2%29%20has%20shown%20promising%20capability%20in%20forecasting%20future%20world%20states%20from%20video%20observations.%20Nevertheless%2C%20dense%20prediction%20from%20a%20short%20observation%20window%20limits%20temporal%20context%20and%20can%20bias%20predictors%20toward%20local%2C%20low-level%20extrapolation%2C%20making%20it%20difficult%20to%20capture%20long-horizon%20semantics%20and%20reducing%20downstream%20utility.%20Vision--language%20models%20%28VLMs%29%2C%20in%20contrast%2C%20provide%20strong%20semantic%20grounding%20and%20general%20knowledge%20by%20reasoning%20over%20uniformly%20sampled%20frames%2C%20but%20they%20are%20not%20ideal%20as%20standalone%20dense%20predictors%20due%20to%20compute-driven%20sparse%20sampling%2C%20a%20language-output%20bottleneck%20that%20compresses%20fine-grained%20interaction%20states%20into%20text-oriented%20representations%2C%20and%20a%20data-regime%20mismatch%20when%20adapting%20to%20small%20action-conditioned%20datasets.%20We%20propose%20a%20VLM-guided%20JEPA-style%20latent%20world%20modeling%20framework%20that%20combines%20dense-frame%20dynamics%20modeling%20with%20long-horizon%20semantic%20guidance%20via%20a%20dual-temporal%20pathway%3A%20a%20dense%20JEPA%20branch%20for%20fine-grained%20motion%20and%20interaction%20cues%2C%20and%20a%20uniformly%20sampled%20VLM%20%5Cemph%7Bthinker%7D%20bra {"title": "Foundation Models for Trajectory Planning in Autonomous Driving: A Review of Progress and Open Challenges", "author": "Kemal Oksuz and Alexandru Buburuzan and Anthony Knittel and Yuhan Yao and Puneet K. Dokania", "abstract": "The emergence of multi-modal foundation models has markedly transformed the technology for autonomous driving, shifting away from conventional and mostly hand-crafted design choices towards unified, foundation-model-based approaches, capable of directly inferring motion trajectories from raw sensory inputs. This new class of methods can also incorporate natural language as an additional modality, with Vision-Language-Action (VLA) models serving as a representative example. In this review, we provide a comprehensive examination of such methods through a unifying taxonomy to critically evaluate their architectural design choices, methodological strengths, and their inherent capabilities and limitations. Our survey covers 37 recently proposed approaches that span the landscape of trajectory planning with foundation models. Furthermore, we assess these approaches with respect to the openness of their source code and datasets, offering valuable information to practitioners and researchers. We provide an accompanying webpage that catalogues the methods based on our taxonomy, available at: https://github.com/fiveai/FMs-for-driving-trajectories", "link": "http://arxiv.org/abs/2512.00021v2", "date": "2026-03-23", "relevancy": 2.2553, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5654}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5654}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5 {"title": "DualCoT-VLA: Visual-Linguistic Chain of Thought via Parallel Reasoning for Vision-Language-Action Models", "author": "Zhide Zhong and Junfeng Li and Junjie He and Haodong Yan and Xin Gong and Guanyi Zhao and Yingjie Cai and Jiantao Gao and Xu Yan and Bingbing Liu and Yingcong Chen and Liuqing Yang and Haoang Li", "abstract": "Vision-Language-Action (VLA) models map visual observations and language instructions directly to robotic actions. While effective for simple tasks, standard VLA models often struggle with complex, multi-step tasks requiring logical planning, as well as precise manipulations demanding fine-grained spatial perception. Recent efforts have incorporated Chain-of-Thought (CoT) reasoning to endow VLA models with a ``thinking before acting'' capability. However, current CoT-based VLA models face two critical limitations: 1) an inability to simultaneously capture low-level visual details and high-level logical planning due to their reliance on isolated, single-modal CoT; 2) high inference latency with compounding errors caused by step-by-step autoregressive decoding. To address these limitations, we propose DualCoT-VLA, a visual-linguistic CoT method for VLA models with a parallel reasoning mechanism. To achieve comprehensive multi-modal reasoning, our method integrates a visual CoT for low-level spatial understanding and a linguistic CoT for high-level task planning. Furthermore, to overcome the latency bottleneck, we introduce a parallel CoT mechanism that incorporates two sets of learnable query tokens, shifting autoregressive reasoning to single-step forward reasoning. Extensive experiments demonstrate that our DualCoT-VLA achieves state-of-the-art performance on the LIBERO and RoboCasa GR1 benchmarks, as well as in real-world platforms.", "link": "http://arxiv.org/abs/2603.22280v1", "date": "2026-03-23", "relevancy": 2.2506, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": " {"title": "Thalia: A Global, Multi-Modal Dataset for Volcanic Activity Monitoring", "author": "Nikolas Papadopoulos and Nikolaos Ioannis Bountos and Maria Sdraka and Andreas Karavias and Gustau Camps-Valls and Ioannis Papoutsis", "abstract": "Monitoring volcanic activity is of paramount importance to safeguarding lives, infrastructure, and ecosystems. However, only a small fraction of known volcanoes are continuously monitored. Satellite-based Interferometric Synthetic Aperture Radar (InSAR) enables systematic, global-scale deformation monitoring. However, its complex data challenge traditional remote sensing methods. Deep learning offers a powerful means to automate and enhance InSAR interpretation, advancing volcanology and geohazard assessment. Despite its promise, progress has been limited by the scarcity of well-curated datasets. In this work, we build on the existing Hephaestus dataset and introduce Thalia, addressing crucial limitations and enriching its scope with higher-resolution, multi-source, and multi-temporal data. Thalia is a global collection of 38 spatiotemporal datacubes covering 7 years and integrating InSAR products, topographic data, as well as atmospheric variables, known to introduce signal delays that can mimic ground deformation in InSAR imagery. Each sample includes expert annotations detailing the type, intensity, and extent of deformation, accompanied by descriptive text. To enable fair and consistent evaluation, we provide a comprehensive benchmark using state-of-the-art models for classification and segmentation. This work fosters collaboration between machine learning and Earth science, advancing volcanic monitoring and promoting data-driven approaches in geoscience. See https://github.com/Orion-AI-Lab/Thalia", "link": "http://arxiv.org/abs/2505.17782v3", "date": "2026-03-23", "relevancy": 2.2428, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4505}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4505}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Thalia%3A%20A%20Global%2C%20Multi-Modal%20Dataset%20for%20Volcanic%20Activity%20Monitoring&body=Title%3A%20Thalia%3A%20A%20Global%2C%20Multi-Modal%20Dataset%20for%20Volcanic%20Activity%20Monitoring%0AAuthor%3A%20Nikolas%20Papadopoulos%20and%20Nikolaos%20Ioannis%20Bountos%20and%20Maria%20Sdraka%20and%20Andreas%20Karavias%20and%20Gustau%20Camps-Valls%20and%20Ioannis%20Papoutsis%0AAbstract%3A%20Monitoring%20volcanic%20activity%20is%20of%20paramount%20importance%20to%20safeguarding%20lives%2C%20infrastructure%2C%20and%20ecosystems.%20However%2C%20only%20a%20small%20fraction%20of%20known%20volcanoes%20are%20continuously%20monitored.%20Satellite-based%20Interferometric%20Synthetic%20Aperture%20Radar%20%28InSAR%29%20enables%20systematic%2C%20global-scale%20deformation%20monitoring.%20However%2C%20its%20complex%20data%20challenge%20traditional%20remote%20sensing%20methods.%20Deep%20learning%20offers%20a%20powerful%20means%20to%20automate%20and%20enhance%20InSAR%20interpretation%2C%20advancing%20volcanology%20and%20geohazard%20assessment.%20Despite%20its%20promise%2C%20progress%20has%20been%20limited%20by%20the%20scarcity%20of%20well-curated%20datasets.%20In%20this%20work%2C%20we%20build%20on%20the%20existing%20Hephaestus%20dataset%20and%20introduce%20Thalia%2C%20addressing%20crucial%20limitations%20and%20enriching%20its%20scope%20with%20higher-resolution%2C%20multi-source%2C%20and%20multi-temporal%20data.%20Thalia%20is%20a%20global%20collection%20of%2038%20spatiotemporal%20datacubes%20covering%207%20years%20and%20integrating%20InSAR%20products%2C%20topographic%20data%2C%20as%20well%20as%20atmospheric%20variables%2C%20known%20to%20introduce%20signal%20delays%20that%20can%20mimic%20ground%20deformation%20in%20InSAR%20imagery.%20Each%20sample%20includes%20expert%20annotations%20detailing%20the%20type%2C%20intensity%2C%20and%20extent%20of%20deformation%2C%20accompanied%20by%20descriptive%20text.%20To%20enable%20fair%20and%20consistent%20evaluation%2C%20we%20provide%20a%20comprehensive%20benchmark%20using%20state-of-the-art%20models%20for%20classification%20and%20segmentation.%20This%20work%20fosters%20collaboration%20between%20machine%20learning%20and%20Earth%20science%2C%20advancing%20volcanic%20monitoring%20and%20promoting%20data-driven%20approaches%20in%20geoscience.%20See%20https%3A//github.com/Orion-AI-Lab/Thalia%0ALink%3A%20http%3A//arxiv.org/abs/2505.17782v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThalia%253A%2520A%2520Global%252C%2520Multi-Modal%2520Dataset%2520for%2520Volcanic%2520Activity%2520Monitoring%26entry.906535625%3DNikolas%2520Papadopoulos%2520and%2520Nikolaos%2520Ioannis%2520Bountos%2520and%2520Maria%2520Sdraka%2520and%2520Andreas%2520Karavias%2520and%2520Gustau%2520Camps-Valls%2520and%2520Ioannis%2520Papoutsis%26entry.1292438233%3DMonitoring%2520volcanic%2520activity%2520is%2520of%2520paramount%2520importance%2520to%2520safeguarding%2520lives%252C%2520infrastructure%252C%2520and%2520ecosystems.%2520However%252C%2520only%2520a%2520small%2520fraction%2520of%2520known%2520volcanoes%2520are%2520continuously%2520monitored.%2520Satellite-based%2520Interferometric%2520Synthetic%2520Aperture%2520Radar%2520%2528InSAR%2529%2520enables%2520systematic%252C%2520global-scale%2520deformation%2520monitoring.%2520However%252C%2520its%2520complex%2520data%2520challenge%2520traditional%2520remote%2520sensing%2520methods.%2520Deep%2520learning%2520offers%2520a%2520powerful%2520means%2520to%2520automate%2520and%2520enhance%2520InSAR%2520interpretation%252C%2520advancing%2520volcanolo {"title": "Cross-Modal Reinforcement Learning for Navigation with Degraded Depth Measurements", "author": "Omkar Sawant and Luca Zanatta and Grzegorz Malczyk and Kostas Alexis", "abstract": "This paper presents a cross-modal learning framework that exploits complementary information from depth and grayscale images for robust navigation. We introduce a Cross-Modal Wasserstein Autoencoder that learns shared latent representations by enforcing cross-modal consistency, enabling the system to infer depth-relevant features from grayscale observations when depth measurements are corrupted. The learned representations are integrated with a Reinforcement Learning-based policy for collision-free navigation in unstructured environments when depth sensors experience degradation due to adverse conditions such as poor lighting or reflective surfaces. Simulation and real-world experiments demonstrate that our approach maintains robust performance under significant depth degradation and successfully transfers to real environments.", "link": "http://arxiv.org/abs/2603.22182v1", "date": "2026-03-23", "relevancy": 2.2404, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.566}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5591}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5587}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-Modal%20Reinforcement%20Learning%20for%20Navigation%20with%20Degraded%20Depth%20Measurements&body=Title%3A%20Cross-Modal%20Reinforcement%20Learning%20for%20Navigation%20with%20Degraded%20Depth%20Measurements%0AAuthor%3A%20Omkar%20Sawant%20and%20Luca%20Za

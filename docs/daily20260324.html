icit%20Neural%20Representation%20of%20Spherical%20Data%20with%20Harmonic%20Positional%20Encoding&entry.906535625=Th%C3%A9o%20Hanon%20and%20Nicolas%20Mil-Homens%20Cavaco%20and%20John%20Kiely%20and%20Laurent%20Jacques&entry.1292438233=Representing%20and%20processing%20data%20in%20spherical%20domains%20presents%20unique%20challenges%2C%20primarily%20due%20to%20the%20curvature%20of%20the%20domain%2C%20which%20complicates%20the%20application%20of%20classical%20Euclidean%20techniques.%20Implicit%20neural%20representations%20%28INRs%29%20have%20emerged%20as%20a%20promising%20alternative%20for%20high-fidelity%20data%20representation%3B%20however%2C%20to%20effectively%20handle%20spherical%20domains%2C%20these%20methods%20must%20be%20adapted%20to%20the%20inherent%20geometry%20of%20the%20sphere%20to%20maintain%20both%20accuracy%20and%20stability.%20In%20this%20context%2C%20we%20propose%20Herglotz-NET%20%28HNET%29%2C%20a%20novel%20INR%20architecture%20that%20employs%20a%20harmonic%20positional%20encoding%20based%20on%20complex%20Herglotz%20mappings.%20This%20encoding%20yields%20a%20well-posed%20representation%20on%20the%20sphere%20with%20interpretable%20and%20robust%20spectral%20properties.%20Moreover%2C%20we%20present%20a%20unified%20expressivity%20analysis%20showing%20that%20any%20spherical-based%20INR%20satisfying%20a%20mild%20condition%20exhibits%20a%20predictable%20spectral%20expansion%20that%20scales%20with%20network%20depth.%20Our%20results%20establish%20HNET%20as%20a%20scalable%20and%20flexible%20framework%20for%20accurate%20modeling%20of%20spherical%20data.&entry.1838667208=http%3A//arxiv.org/abs/2502.13777v3&entry.124074799=Read"},
{"title": "SatGeo-NeRF: Geometrically Regularized NeRF for Satellite Imagery", "author": "Valentin Wagner and Sebastian Bullinger and Michael Arens and Rainer Stiefelhagen", "abstract": "We present SatGeo-NeRF, a geometrically regularized NeRF for satellite imagery that mitigates overfitting-induced geometric artifacts observed in current state-of-the-art models using three model-agnostic regularizers. Gravity-Aligned Planarity Regularization aligns depth-inferred, approximated surface normals with the gravity axis to promote local planarity, coupling adjacent rays via a corresponding surface approximation to facilitate cross-ray gradient flow. Granularity Regularization enforces a coarse-to-fine geometry-learning scheme, and Depth-Supervised Regularization stabilizes early training for improved geometric accuracy. On the DFC2019 satellite reconstruction benchmark, SatGeo-NeRF improves the Mean Altitude Error by 13.9% and 11.7% relative to state-of-the-art baselines such as EO-NeRF and EO-GS.", "link": "http://arxiv.org/abs/2603.21931v1", "date": "2026-03-23", "relevancy": 2.5697, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5396}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5142}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.488}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SatGeo-NeRF%3A%20Geometrically%20Regularized%20NeRF%20for%20Satellite%20Imagery&body=Title%3A%20SatGeo-NeRF%3A%20Geometrically%20Regularized%20NeRF%20for%20Satellite%20Imagery%0AAuthor%3A%20Valentin%20Wagner%20and%20Sebastian%20Bullinger%20and%20Michael%20Arens%20and%20Rainer%20Stiefelhagen%0AAbstract%3A%20We%20present%20SatGeo-NeRF%2C%20a%20geometrically%20regularized%20NeRF%20for%20satellite%20imagery%20that%20mitigates%20overfitting-induced%20geometric%20artifacts%20observed%20in%20current%20state-of-the-art%20models%20using%20three%20model-agnostic%20regularizers.%20Gravity-Aligned%20Planarity%20Regularization%20aligns%20depth-inferred%2C%20approximated%20surface%20normals%20with%20the%20gravity%20axis%20to%20promote%20local%20planarity%2C%20coupling%20adjacent%20rays%20via%20a%20corresponding%20surface%20approximation%20to%20facilitate%20cross-ray%20gradient%20flow.%20Granularity%20Regularization%20enforces%20a%20coarse-to-fine%20geometry-learning%20scheme%2C%20and%20Depth-Supervised%20Regularization%20stabilizes%20early%20training%20for%20improved%20geometric%20accuracy.%20On%20the%20DFC2019%20satellite%20reconstruction%20benchmark%2C%20SatGeo-NeRF%20improves%20the%20Mean%20Altitude%20Error%20by%2013.9%25%20and%2011.7%25%20relative%20to%20state-of-the-art%20baselines%20such%20as%20EO-NeRF%20and%20EO-GS.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21931v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSatGeo-NeRF%253A%2520Geometrically%2520Regularized%2520NeRF%2520for%2520Satellite%2520Imagery%26entry.906535625%3DValentin%2520Wagner%2520and%2520Sebastian%2520Bullinger%2520and%2520Michael%2520Arens%2520and%2520Rainer%2520Stiefelhagen%26entry.1292438233%3DWe%2520present%2520SatGeo-NeRF%252C%2520a%2520geometrically%2520regularized%2520NeRF%2520for%2520satellite%2520imagery%2520that%2520mitigates%2520overfitting-induced%2520geometric%2520artifacts%2520observed%2520in%2520current%2520state-of-the-art%2520models%2520using%2520three%2520model-agnostic%2520regularizers.%2520Gravity-Aligned%2520Planarity%2520Regularization%2520aligns%2520depth-inferred%252C%2520approximated%2520surface%2520normals%2520with%2520the%2520gravity%2520axis%2520to%2520promote%2520local%2520planarity%252C%2520coupling%2520adjacent%2520rays%2520via%2520a%2520corresponding%2520surface%2520approximation%2520to%2520facilitate%2520cross-ray%2520gradient%2520flow.%2520Granularity%2520Regularization%2520enforces%2520a%2520coarse-to-fine%2520geometry-learning%2520scheme%252C%2520and%2520Depth-Supervised%2520Regularization%2520stabilizes%2520early%2520training%2520for%2520improved%2520geometric%2520accuracy.%2520On%2520the%2520DFC2019%2520satellite%2520reconstruction%2520benchmark%252C%2520SatGeo-NeRF%2520improves%2520the%2520Mean%2520Altitude%2520Error%2520by%252013.9%2525%2520and%252011.7%2525%2520relative%2520to%2520state-of-the-art%2520baselines%2520such%2520as%2520EO-NeRF%2520and%2520EO-GS.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21931v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SatGeo-NeRF%3A%20Geometrically%20Regularized%20NeRF%20for%20Satellite%20Imagery&entry.906535625=Valentin%20Wagner%20and%20Sebastian%20Bullinger%20and%20Michael%20Arens%20and%20Rainer%20Stiefelhagen&entry.1292438233=We%20present%20SatGeo-NeRF%2C%20a%20geometrically%20regularized%20NeRF%20for%20satellite%20imagery%20that%20mitigates%20overfitting-induced%20geometric%20artifacts%20observed%20in%20current%20state-of-the-art%20models%20using%20three%20model-agnostic%20regularizers.%20Gravity-Aligned%20Planarity%20Regularization%20aligns%20depth-inferred%2C%20approximated%20surface%20normals%20with%20the%20gravity%20axis%20to%20promote%20local%20planarity%2C%20coupling%20adjacent%20rays%20via%20a%20corresponding%20surface%20approximation%20to%20facilitate%20cross-ray%20gradient%20flow.%20Granularity%20Regularization%20enforces%20a%20coarse-to-fine%20geometry-learning%20scheme%2C%20and%20Depth-Supervised%20Regularization%20stabilizes%20early%20training%20for%20improved%20geometric%20accuracy.%20On%20the%20DFC2019%20satellite%20reconstruction%20benchmark%2C%20SatGeo-NeRF%20improves%20the%20Mean%20Altitude%20Error%20by%2013.9%25%20and%20 {"title": "Beyond Strict Pairing: Arbitrarily Paired Training for High-Performance Infrared and Visible Image Fusion", "author": "Yanglin Deng and Tianyang Xu and Chunyang Cheng and Hui Li and Xiao-jun Wu and Josef Kittler", "abstract": "Infrared and visible image fusion(IVIF) combines complementary modalities while preserving natural textures and salient thermal signatures. Existing solutions predominantly rely on extensive sets of rigidly aligned image pairs for training. However, acquiring such data is often impractical due to the costly and labour-intensive alignment process. Besides, maintaining a rigid pairing setting during training restricts the volume of cross-modal relationships, thereby limiting generalisation performance. To this end, this work challenges the necessity of Strictly Paired Training Paradigm (SPTP) by systematically investigating UnPaired and Arbitrarily Paired Training Paradigms (UPTP and APTP) for high-performance IVIF. We establish a theoretical objective of APTP, reflecting the complementary nature between UPTP and SPTP. More importantly, we develop a practical framework capable of significantly enriching cross-modal relationships even with severely limited and unaligned training data. To validate our propositions, three end-to-end lightweight baselines, alongside a set of innovative loss functions, are designed to cover three classic frameworks (CNN, Transformer, GAN). Comprehensive experiments demonstrate that the proposed APTP and UPTP are feasible and capable of training models on a severely limited and content-inconsistent infrared and visible dataset, achieving performance comparable to that of a dataset 100$\\times$ larger in SPTP. This finding fundamentally alleviates the cost and difficulty of data collection while enhancing model robustness from the data perspective, delivering a feasible solution for IVIF studies. The code is available at \\href{https://github.com/yanglinDeng/IVIF_unpair}{\\textcolor{blue}{https://github.com/yanglinDeng/IVIF\\_unpair}}.", "link": "http://arxiv.org/abs/2603.21820v1", "date": "2026-03-23", "relevancy": 2.5665, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5162}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5131}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5105}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Strict%20Pairing%3A%20Arbitrarily%20Paired%20Training%20for%20High-Performance%20Infrared%20and%20Visible%20Image%20Fusion&body=Title%3A%20Beyond%20Strict%20Pairing%3A%20Arbitrarily%20Paired%20Training%20for%20High-Performance%20Infrared%20and%20Visible%20Image%20Fusion%0AAuthor%3A%20Yanglin%20Deng%20and%20Tianyang%20Xu%20and%20Chunyang%20Cheng%20and%20Hui%20Li%20and%20Xiao-jun%20Wu%20and%20Josef%20Kittler%0AAbstract%3A%20Infrared%20and%20visible%20image%20fusion%28IVIF%29%20combines%20complementary%20modalities%20while%20preserving%20natural%20textures%20and%20salient%20thermal%20signatures.%20Existing%20solutions%20predominantly%20rely%20on%20extensive%20sets%20of%20rigidly%20aligned%20image%20pairs%20for%20training.%20However%2C%20acquiring%20such%20data%20is%20often%20impractical%20due%20to%20the%20costly%20and%20labour-intensive%20alignment%20process.%20Besides%2C%20maintaining%20a%20rigid%20pairing%20setting%20during%20training%20restricts%20the%20volume%20of%20cross-modal%20relationships%2C%20thereby%20limiting%20generalisation%20performance.%20To%20this%20end%2C%20this%20work%20challenges%20the%20necessity%20of%20Strictly%20Paired%20Training%20Paradigm%20%28SPTP%29%20by%20systematically%20investigating%20UnPaired%20and%20Arbitrarily%20Paired%20Training%20Paradigms%20%28UPTP% {"title": "Make Tracking Easy: Neural Motion Retargeting for Humanoid Whole-body Control", "author": "Qingrui Zhao and Kaiyue Yang and Xiyu Wang and Shiqi Zhao and Yi Lu and Xinfang Zhang and Wei Yin and Qiu Shen and Xiao-Xiao Long and Xun Cao", "abstract": "Humanoid robots require diverse motor skills to integrate into complex environments, but bridging the kinematic and dynamic embodiment gap from human data remains a major bottleneck. We demonstrate through Hessian analysis that traditional optimization-based retargeting is inherently non-convex and prone to local optima, leading to physical artifacts like joint jumps and self-penetration. To address this, we reformulate the targeting problem as learning data distribution rather than optimizing optimal solutions, where we propose NMR, a Neural Motion Retargeting framework that transforms static geometric mapping into a dynamics-aware learned process. We first propose Clustered-Expert Physics Refinement (CEPR), a hierarchical data pipeline that leverages VAE-based motion clustering to group heterogeneous movements into latent motifs. This strategy significantly reduces the computational overhead of massively parallel reinforcement learning experts, which project and repair noisy human demonstrations onto the robot's feasible motion manifold. The resulting high-fidelity data supervises a non-autoregressive CNN-Transformer architecture that reasons over global temporal context to suppress reconstruction noise and bypass geometric traps. Experiments on the Unitree G1 humanoid across diverse dynamic tasks (e.g., martial arts, dancing) show that NMR eliminates joint jumps and significantly reduces self-collisions compared to state-of-the-art baselines. Furthermore, NMR-generated references accelerate the convergence of downstream whole-body control policies, establishing a scalable path for bridging the human-robot embodiment gap.", "link": "http://arxiv.org/abs/2603.22201v1", "date": "2026-03-23", "relevancy": 2.5576, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6645}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6478}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.611}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Make%20Tracking%20Easy%3A%20Neural%20Motion%20Retargeting%20for%20Humanoid%20Whole-body%20Control&body=Title%3A%20Make%20Tracking%20Easy%3A%20Neural%20Motion%20Retargeting%20for%20Humanoid%20Whole-body%20Control%0AAuthor%3A%20Qingrui%20Zhao%20and%20Kaiyue%20Yang%20and%20Xiyu%20Wang%20and%20Shiqi%20Zhao%20and%20Yi%20Lu%20and%20Xinfang%20Zhang%20and%20Wei%20Yin%20and%20Qiu%20Shen%20and%20Xiao-Xiao%20Long%20and%20Xun%20Cao%0AAbstract%3A%20Humanoid%20robots%20require%20diverse%20motor%20skills%20to%20integrate%20into%20complex%20environments%2C%20but%20bridging%20the%20kinematic%20and%20dynamic%20embodiment%20gap%20from%20human%20data%20remains%20a%20major%20bottleneck.%20We%20demonstrate%20through%20Hessian%20analysis%20that%20traditional%20optimization-based%20retargeting%20is%20inherently%20non-convex%20and%20prone%20to%20local%20optima%2C%20leading%20to%20physical%20artifacts%20like%20joint%20jumps%20and%20self-penetration.%20To%20address%20this%2C%20we%20reformulate%20the%20targeting%20problem%20as%20learning%20data%20distribution%20rather%20than%20optimizing%20optimal%20solutions%2C%20where%20we%20propose%20NMR%2C%20a%20Neural%20Motion%20Retargeting%20framework%20that%20transforms%20static%20geometric%20mapping%20into%20a%20dynamics-aware%20learned%20process.%20We%20first%20propose%20Clustered-Expert%20Physics%20Refinement%20%28CEPR%29%2C%20a%20hierarchical%20data%20pipeline%20that%20leverages%20VAE-based%20motion%20clustering%20to%20group%20heterogeneous%20movements%20into%20latent%20motifs.%20This%20strategy%20significantly%20reduces%20the%20computational%20overhead%20of%20massively%20parallel%20reinforcement%20learning%20experts%2C%20which%20project%20and%20repair%20noisy%20human%20demonstrations%20onto%20the%20robot%27s%20feasible%20motion%20manifold.%20The%20resulting%20high-fidelity%20data%20supervises%20a%20non-autoregressive%20CNN-Transformer%20architecture%20that%20reasons%20over%20global%20temporal%20context%20to%20suppress%20reconstruction%20noise%20and%20bypass%20geometric%20traps.%20Experiments%20on%20the%20Unitree%20G1%20humanoid%20across%20diverse%20dynamic%20tasks%20%28e.g.%2C%20martial%20arts%2C%20dancing%29%20show%20that%20NMR%20eliminates%20joint%20jumps%20and%20significantly%20reduces%20self-collisions%20compared%20to%20state-of-the-art%20baselines.%20Furthermore%2C%20NMR-generated%20references%20accelerate%20the%20convergence%20of%20downstream%20whole-body%20control%20policies%2C%20establishing%20a%20scalable%20path%20for%20bridging%20the%20human-robot%20embodiment%20gap.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22201v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMake%2520Tracking%2520Easy%253A%2520Neural%2520Motion%2520Retargeting%2520for%2520Humanoid%2520Whole-body%2520Control%26entry.906535625%3DQingrui%2520Zhao%2520and%2520Kaiyue%2520Yang%2520and%2520Xiyu%2520Wang%2520and%2520Shiqi%2520Zhao%2520and%2520Yi%2520Lu%2520and%2520Xinfang%2520Zhang%2520and%2520Wei%2520Yin%2520and%2520Qiu%2520Shen%2520and%2520Xiao-Xiao%2520Long%2520and%2520Xun%2520Cao%26entry.1292438233%3DHumanoid%2520robots%2520require%2520diverse%2520motor%2520skills%2520to%2520integrate%2520into%2520complex%2520environments%252C%2520but%2520bridging%2520the%2520kinematic%2520and%2520dynamic%2520embodiment%2520gap%2520from%2520human%2520data%2520remains%2520a%2520major%2520bottleneck.%2520We {"title": "Goal Force: Teaching Video Models To Accomplish Physics-Conditioned Goals", "author": "Nate Gillman and Yinghua Zhou and Zitian Tang and Evan Luo and Arjan Chakravarthy and Daksh Aggarwal and Michael Freeman and Charles Herrmann and Chen Sun", "abstract": "Recent advancements in video generation have enabled the development of ``world models'' capable of simulating potential futures for robotics and planning. However, specifying precise goals for these models remains a challenge; text instructions are often too abstract to capture physical nuances, while target images are frequently infeasible to specify for dynamic tasks. To address this, we introduce Goal Force, a novel framework that allows users to define goals via explicit force vectors and intermediate dynamics, mirroring how humans conceptualize physical tasks. We train a video generation model on a curated dataset of synthetic causal primitives-such as elastic collisions and falling dominos-teaching it to propagate forces through time and space. Despite being trained on simple physics data, our model exhibits remarkable zero-shot generalization to complex, real-world scenarios, including tool manipulation and multi-object causal chains. Our results suggest that by grounding video generation in fundamental physical interactions, models can emerge as implicit neural physics simulators, enabling precise, physics-aware planning without reliance on external engines. We release all datasets, code, model weights, and interactive video demos at our project page.", "link": "http://arxiv.org/abs/2601.05848v2", "date": "2026-03-23", "relevancy": 2.5325, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7079}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.583}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n {"title": "DepthFocus: Controllable Depth Estimation for See-Through Scenes", "author": "Junhong Min and Jimin Kim and Minwook Kim and Cheol-Hui Min and Youngpil Jeon and Minyong Choi", "abstract": "Depth in the real world is rarely singular. Transmissive materials create layered ambiguities that confound conventional perception systems. Existing models remain passive; conventional approaches typically estimate static depth maps anchored to the nearest surface, and even recent multi-head extensions suffer from a representational bottleneck due to fixed feature representations. This stands in contrast to human vision, which actively shifts focus to perceive a desired depth. We introduce \\textbf{DepthFocus}, a steerable Vision Transformer that redefines stereo depth estimation as condition-aware control. Instead of extracting fixed features, our model dynamically modulates its computation based on a physical reference depth, integrating dual conditional mechanisms to selectively perceive geometry aligned with the desired focus. Leveraging a newly curated large-scale synthetic dataset, \\textbf{DepthFocus} achieves state-of-the-art results across all evaluated benchmarks, including both standard single-layer and complex multi-layered scenarios. While maintaining high precision in opaque regions, our approach effectively resolves depth ambiguities in transparent and reflective scenes by selectively reconstructing geometry at a target distance. This capability enables robust, intent-driven perception that significantly outperforms existing multi-layer methods, marking a substantial step toward active 3D perception. \\noindent \\textbf{Project page}: \\href{https://junhong-3dv.github.io/depthfocus-project/}{\\textbf{this https URL}}.", "link": "http://arxiv.org/abs/2511.16993v2", "date": "2026-03-23", "relevancy": 2.5322, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6615}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6274}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6274}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DepthFocus%3A%20Controllable%20Depth%20Estimation%20for%20See-Through%20Scenes&body=Title%3A%20DepthFocus%3A%20Controllable%20Depth%20Estimation%20for%20See-Through%20Scenes%0AAuthor%3A%20Junhong%20Min%20and%20Jimin%20Kim%20and%20Minwook%20Kim%20and%20Cheol-Hui%20Min%20and%20Youngpil%20Jeon%20and%20Minyong%20Choi%0AAbstract%3A%20Depth%20in%20the%20real%20world%20is%20rarely%20singular.%20Transmissive%20materials%20create%20layered%20ambiguities%20that%20confound%20conventional%20perception%20systems.%20Existing%20models%20remain%20passive%3B%20conventional%20approaches%20typically%20estimate%20static%20depth%20maps%20anchored%20to%20the%20nearest%20surface%2C%20and%20even%20recent%20multi-head%20extensions%20suffer%20from%20a%20representational%20bottleneck%20due%20to%20fixed%20feature%20representations.%20This%20stands%20in%20contrast%20to%20human%20vision%2C%20which%20actively%20shifts%20focus%20to%20perceive%20a%20desired%20depth.%20We%20introduce%20%5Ctextbf%7BDepthFocus%7D%2C%20a%20steerable%20Vision%20Transformer%20that%20redefines%20stereo%20depth%20estimation%20as%20condition-aware%20control.%20Instead%20of%20extracting%20fixed%20features%2C%20our%20model%20dynamically%20modulates%20its%20computation%20based%20on%20a%20physical%20reference%20depth%2C%20integrating%20dual%20conditional%20mechanisms%20to%20selectively%20perceive%20geometry%20aligned%20with%20the%20desired%20focus.%20Leveraging%20a%20newly%20curated%20large-scale%20synthetic%20dataset%2C%20%5Ctextbf%7BDepthFocus%7D%20achieves%20state-of-the-art%20results%20across%20all%20evaluated%20benchmarks%2C%20including%20both%20standard%20single-layer%20and%20complex%20multi-layered%20scenarios.%20While%20maintaining%20high%20precision%20in%20opaque%20regions%2C%20our%20approach%20effectively%20resolves%20depth%20ambiguities%20in%20transparent%20and%20reflective%20scenes%20by%20selectively%20reconstructing%20geometry%20at%20a%20target%20distance.%20This%20capability%20enables%20robust%2C%20intent-driven%20perception%20that%20significantly%20outperforms%20existing%20multi-layer%20methods%2C%20marking%20a%20substantial%20step%20toward%20active%203D%20perception.%20%5Cnoindent%20%5Ctextbf%7BProject%20page%7D%3A%20%5Chref%7Bhttps%3A//junhong-3dv.github.io/depthfocus-project/%7D%7B%5Ctextbf%7Bthis%20https%20URL%7D%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2511.16993v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDepthFocus%253A%2520Controllable%2520Depth%2520Estimation%2520for%2520See-Through%2520Scenes%26entry.906535625%3DJunhong%2520Min%2520and%2520Jimin%2520Kim%2520and%2520Minwook%2520Kim%2520and%2520Cheol-Hui%2520Min%2520and%2520Youngpil%2520Jeon%2520and%2520Minyong%2520Choi%26entry.1292438233%3DDepth%2520in%2520the%2520real%2520world%2520is%2520rarely%2520singular.%2520Transmissive%2520materials%2520create%2520layered%2520ambiguities%2520that%2520confound%2520conventional%2520perception%2520systems.%2520Existing%2520models%2520remain%2520passive%253B%2520conventional%2520approaches%2520typically%2520estimate%2520static%2520depth%2520maps%2520anchored%2520to%2520the%2520nearest%2520surface%252C%2520and%2520even%2520recent%2520multi-head%2520extensions%2520suffer%2520from%2520a%2520representational%2520bottleneck%2520due%2520to%2520fixed%2520feature%2520representations.%2520This%2520stands%2520in%2520contrast%2520to%2520human%2520vision%252C%2520which%2520actively%2520shifts%2520focus%2520to%2520perceive%2520a%2520desired%2520depth.%2520We%2520introduce%2520%255Ctextbf%257BDepthFocus {"title": "PAUL: Uncertainty-Guided Partition and Augmentation for Robust Cross-View Geo-Localization under Noisy Correspondence", "author": "Zheng Li and Xueyi Zhang and Yanming Guo and Yuxiang Xie and Ding Zhaoyun and Siqi Cai and Haizhou Li and Mingrui Lao", "abstract": "Cross-view geo-localization is a critical task for UAV navigation, event detection, and aerial surveying, as it enables matching between drone-captured and satellite imagery. Most existing approaches embed multi-modal data into a joint feature space to maximize the similarity of paired images. However, these methods typically assume perfect alignment of image pairs during training, which rarely holds true in real-world scenarios. In practice, factors such as urban canyon effects, electromagnetic interference, and adverse weather frequently induce GPS drift, resulting in systematic alignment shifts where only partial correspondences exist between pairs. Despite its prevalence, this source of noisy correspondence has received limited attention in current research. In this paper, we formally introduce and address the Noisy Correspondence on Cross-View Geo-Localization (NC-CVGL) problem, aiming to bridge the gap between idealized benchmarks and practical applications. To this end, we propose PAUL (Partition and Augmentation by Uncertainty Learning), a novel framework that partitions and augments training data based on estimated data uncertainty through uncertainty-aware co-augmentation and evidential co-training. Specifically, PAUL selectively augments regions with high correspondence confidence and utilizes uncertainty estimation to refine feature learning, effectively suppressing noise from misaligned pairs. Distinct from traditional filtering or label correction, PAUL leverages both data uncertainty and loss discrepancy for targeted partitioning and augmentation, thus providing robust supervision for noisy samples. Comprehensive experiments validate the effectiveness of individual components in PAUL,which consistently achieves superior performance over other competitive noisy-correspondence-driven methods in various noise ratios.", "link": "http://arxiv.org/abs/2508.20066v2", "date": "2026-03-23", "relevancy": 2.525, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6931}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5955}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5837}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAUL%3A%20Uncertainty-Guided%20Partition%20and%20Augmentation%20for%20Robust%20Cross-View%20Geo-Localization%20under%20Noisy%20Correspondence&body=Title%3A%20PAUL%3A%20Uncertainty-Guided%20Partition%20and%20Augmentation%20for%20Robust%20Cross-View%20Geo-Localization%20under%20Noisy%20Correspondence%0AAuthor%3A%20Zheng%20Li%20and%20Xueyi%20Zhang%20and%20Yanming%20Guo%20and%20Yuxiang%20Xie%20and%20Ding%20Zhaoyun%20and%20Siqi%20Cai%20and%20Haizhou%20Li%20and%20Mingrui%20Lao%0AAbstract%3A%20Cross-view%20geo-localization%20is%20a%20critical%20task%20for%20UAV%20navigation%2C%20event%20detection%2C%20and%20aerial%20surveying%2C%20as%20it%20enables%20matching%20between%20drone-captured%20and%20satellite%20imagery.%20Most%20existing%20approaches%20embed%20multi-modal%20data%20into%20a%20joint%20feature%20space%20to%20maximize%20the%20similarity%20of%20paired%20images.%20However%2C%20these%20methods%20typically%20assume%20perfect%20alignment%20of%20image%20pairs%20during%20training%2C%20which%20rarely%20holds%20true%20in%20real-world%20scenarios.%20In%20practice%2C%20factors%20such%20as%20urban%20canyon%20effects%2C%20electromagnetic%20interference%2C%20and%20adverse%20weather%20frequently%20induce%20GPS%20drift%2C%20resulting%20in%20systematic%20alignment%20shifts%20where%20only%20partial%20correspondences%20exist%20between%20pairs.%20Despite%20its%20prevalence%2C%20this%20source%20of%20noisy%20correspondence%20has%20received%20limited%20attention%20in%20current%20research.%20In%20this%20paper%2C%20we%20formally%20introduce%20and%20address%20the%20Noisy%20Correspondence%20on%20Cross-View%20Geo-Localization%20%28NC-CVGL%29%20problem%2C%20aiming%20to%20bridge%20the%20gap%20between%20idealized%20benchmarks%20and%20practical%20applications.%20To%20this%20end%2C%20we%20propose%20PAUL%20%28Partition%20and%20Augmentation%20by%20Uncertainty%20Learning%29%2C%20a%20novel%20framework%20that%20partitions%20and%20augments%20training%20data%20based%20on%20estimated%20data%20uncertainty%20through%20uncertainty-aware%20co-augmentation%20and%20evidential%20co-training.%20Specifically%2C%20PAUL%20selectively%20augments%20regions%20with%20high%20correspondence%20confidence%20and%20utilizes%20uncertainty%20estimation%20to%20refine%20feature%20learning%2C%20effectively%20suppressing%20noise%20from%20misaligned%20pairs.%20Distinct%20from%20traditional%20filtering%20or%20label%20correction%2C%20PAUL%20leverages%20both%20data%20uncertainty%20and%20loss%20discrepancy%20for%20targeted%20partitioning%20and%20augmentation%2C%20thus%20providing%20robust%20supervision%20for%20noisy%20samples.%20Comprehensive%20experiments%20validate%20the%20effectiveness%20of%20individual%20components%20in%20PAUL%2Cwhich%20consistently%20achieves%20superior%20performance%20over%20other%20competitive%20noisy-correspondence-driven%20methods%20in%20various%20noise%20ratios.%0ALink%3A%20http%3A//arxiv.org/abs/2508.20066v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPAUL%253A%2520Uncertainty-Guided%2520Partition%2520and%2520Augmentation%2520for%2520Robust%2520Cross-View%2520Geo-Localization%2520under%2520Noisy%2520Correspondence%26entry.906535625%3DZheng%2520Li%2520and%2520Xueyi%2520Zhang%2520and%2520Yanming%2520Guo%2520and%2520Yuxiang%2520Xie%2520and%2520Ding%2520Zhaoyun%2520and%2520Siqi%2520Cai%2520and%2520Haizhou%2520Li%2520and%2520Mingrui%2520Lao%26entry.1292438233%3DCross-view%2520geo-localization%2520is%2520a%2520critical%2520task%2520for%2520UAV%2520navigation%252C%2520event%2520detection%252C%2520and%2520aerial%2520surveying%252C%2520as%2520it%2520enables%2520matching%2520between%2520drone-captured%2520and%2520satellite%2520imagery.%2520Most%2520existing%2520approaches%2520embed%2520multi-modal%2520data%2520into%2520a%2520joint%2520feature%2520space%2520to%2520maximize%2520the%2520similarity%2520of%2520paired%2520images.%2520However%252C%2520these%2520methods%2520typically%2520assume%2520perfect%2520alignment%2520of%2520image%2520pairs%2520during%2520training%252C%2520which%2520rarely%2520holds%2520true%2520in%2520real-world%2520scenarios.%2520In%2520practice%252C%2520factors%2520such%2520as%2520urban%2520canyon%2520effects%252C%2520electromagnetic%2520interference%252C%2520and%2520adverse%2520weather%2520frequently%2520induce%2520GPS%2520drift%252C%2520resulting%2520in%2520systematic%2520alignment%2520shifts%2520where%2520only%2520partial%2520correspondences%2520exist%2520between%2520pairs.%2520Despite%2520its%2520prevalence%252C%2520this%2520source%2520of%2520noisy%2520correspondence%2520has%2520received%2520limited%2520attention%2520in%2520current%2520research.%2520In%2520this%2520paper%252C%2520we%2520formally%2520introduce%2520and%2520address%2520the%2520Noisy%2520Correspondence%2520on%2520Cross-View%2520Geo-Localization%2520%2528NC-CVGL%2529%2520problem%252C%2520aiming%2520to%2520bridge%2520the%2520gap%2520between%2520idealized%2520benchmarks%2520and%2520practical%2520applications.%2520To%2520this%2520end%252C%2520we%2520propose%2520PAUL%2520%2528Partition%2520and%2520Augmentation%2520by%2520Uncertainty%2520Learning%2529%252C%2520a%2520novel%2520framework%2520that%2520partitions%2520and%2520augments%2520training%2520data%2520based%2520on%2520estimated%2520data%2520uncertainty%2520through%2520uncertainty-aware%2520co-augmentation%2520and%2520evidential%2520co-training.%2520Specifically%252C%2520PAUL%2520selectively%2520augments%2520regions%2520with%2520high%2520correspondence%2520confidence%2520and%2520utilizes%2520uncertainty%2520estimation%2520to%2520refine%2520feature%2520learning%252C%2520effectively%2520suppressing%2520noise%2520from%2520misaligned%2520pairs.%2520Distinct%2520from%2520traditional%2520filtering%2520or%2520label%2520correction%252C%2520PAUL%2520leverages%2520both%2520data%2520uncertainty%2520and%2520loss%2520discrepancy%2520for%2520targeted%2520partitioning%2520and%2520augmentation%252C%2520thus%2520providing%2520robust%2520supervision%2520for%2520noisy%2520samples.%2520Comprehensive%2520experiments%2520validate%2520the%2520effectiveness%2520of%2520individual%2520components%2520in%2520PAUL%252Cwhich%2520consistently%2520achieves%2520superior%2520performance%2520over%2520other%2520competitive%2520noisy-correspondence-driven%2520methods%2520in%2520various%2520noise%2520ratios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.20066v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PAUL%3A%20Uncertainty-Guided%20Partition%20and%20Augmentation%20for%20Robust%20Cross-View%20Geo-Localization%20under%20Noisy%20Correspondence&entry.906535625=Zheng%20Li%20and%20Xueyi%20Zhang%20and%20Yanming%20Guo%20and%20Yuxiang%20Xie%20and%20Ding%20Zhaoyun%20and%20Siqi%20Cai%20and%20Haizhou%20Li%20and%20Mingrui%20Lao&entry.1292438233=Cross-view%20geo-localization%20is%20a%20critical%20task%20for%20UAV%20navigation%2C%20event%20detection%2C%20and%20aerial%20surveying%2C%20as%20it%20enables%20matching%20between%20drone-captured%20and%20satellite%20imagery.%20Most%20existing%20approaches%20embed%20mul mance%20over%20other%20competitive%20noisy-correspondence-driven%20methods%20in%20various%20noise%20ratios.&entry.1838667208=http%3A//arxiv.org/abs/2508.20066v2&entry.124074799=Read"},
{"title": "Cascade-Free Mandarin Visual Speech Recognition via Semantic-Guided Cross-Representation Alignment", "author": "Lei Yang and Yi He and Fei Wu and Shilin Wang", "abstract": "Chinese mandarin visual speech recognition (VSR) is a task that has advanced in recent years, yet still lags behind the performance on non-tonal languages such as English. One primary challenge arises from the tonal nature of Mandarin, which limits the effectiveness of conventional sequence-to-sequence modeling approaches. To alleviate this issue, existing Chinese VSR systems commonly incorporate intermediate representations, most notably pinyin, within cascade architectures to enhance recognition accuracy. While beneficial, in these cascaded designs, the subsequent stage during inference depends on the output of the preceding stage, leading to error accumulation and increased inference latency. To address these limitations, we propose a cascade-free architecture based on multitask learning that jointly integrates multiple intermediate representations, including phoneme and viseme, to better exploit contextual information. The proposed semantic-guided local contrastive loss temporally aligns the features, enabling on-demand activation during inference, thereby providing a trade-off between inference efficiency and performance while mitigating error accumulation caused by projection and re-embedding. Experiments conducted on publicly available datasets demonstrate that our method achieves superior recognition performance.", "link": "http://arxiv.org/abs/2603.21808v1", "date": "2026-03-23", "relevancy": 2.5193, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5063}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5026}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5026}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cascade-Free%20Mandarin%20Visual%20Speech%20Recognition%20via%20Semantic-Guided%20Cross-Representation%20Alignment&body=Title%3A%20Cascade-Free%20Mandarin%20Visual%20Speech%20Recognition%20via%20Semantic-Guided%20Cross-Representation%20Alignment%0AAuthor%3A%20Lei%20Yang%20and%20Yi%20He%20and%20Fei%20Wu%20and%20Shilin%20Wang%0AAbstract%3A%20Chinese%20mandarin%20visual%20speech%20recognition%20%28VSR%29%20is%20a%20task%20that%20has%20advanced%20in%20recent%20years%2C%20yet%20still%20lags%20behind%20the%20performance%20on%20non-tonal%20languages%20such%20as%20English.%20One%20primary%20challenge%20arises%20from%20the%20tonal%20nature%20of%20Mandarin%2C%20which%20limits%20the%20effectiveness%20of%20conventional%20sequence-to-sequence%20modeling%20approaches.%20To%20alleviate%20this%20issue%2C%20existing%20Chinese%20VSR%20systems%20commonly%20incorporate%20intermediate%20representations%2C%20most%20notably%20pinyin%2C%20within%20cascade%20architectures%20to%20enhance%20recognition%20accuracy.%20While%20beneficial%2C%20in%20these%20cascaded%20designs%2C%20the%20subsequent%20stage%20during%20inference%20depends%20on%20the%20output%20of%20the%20preceding%20stage%2C%20leading%20to%20error%20accumulation%20and%20increased%20inference%20latency.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20cascade-free%20architecture%20based%20on%20multitask%20learning%20that%20jointly%20integrates%20multiple%20intermediate%20representations%2C%20including%20phoneme%20and%20viseme%2C%20to%20better%20exploit%20contextual%20information.%20The%20proposed%20semantic-guided%20local%20contrastive%20loss%20temporally%20aligns%20the%20features%2C%20enabling%20on-demand%20activation%20during%20inference%2C%20thereby%20providing%20a%20trade-off%20between%20inference%20efficiency%20and%20performance%20while%20mitigating%20error%20accumulation%20caused%20by%20projection%20and%20re-embedding.%20Experiments%20conducted%20on%20publicly%20available%20datasets%20demonstrate%20that%20our%20method%20achieves%20superior%20recognition%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21808v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCascade-Free%2520Mandarin%2520Visual%2520Speech%2520Recognition%2520via%2520Semantic-Guided%2520Cross-Representation%2520Alignment%26entry.906535625%3DLei%2520Yang%2520and%2520Yi%2520He%2520and%2520Fei%2520Wu%2520and%2520Shilin%2520Wang%26entry.1292438233%3DChinese%2520mandarin%2520visual%2520speech%2520recognition%2520%2528VSR%2529%2520is%2520a%2520task%2520that%2520has%2520advanced%2520in%2520recent%2520years%252C%2520yet%2520still%2520lags%2520behind%2520the%2520performance%2520on%2520non-tonal%2520languages%2520such%2520as%2520English.%2520One%2520primary%2520challenge%2520arises%2520from%2520the%2520tonal%2520nature%2520of%2520Mandarin%252C%2520which%2520limits%2520the%2520effectiveness%2520of%2520conventional%2520sequence-to-sequence%2520modeling%2520approaches.%2520To%2520alleviate%2520this%2520issue%252C%2520existing%2520Chinese%2520VSR%2520systems%2520commonly%2520incorporate%2520intermediate%2520representations%252C%2520most%2520notably%2520pinyin%252C%2520within%2520cascade%2520architectures%2520to%2520enhance%2520recognition%2520accuracy.%2520While%2520beneficial%252C%2520in%2520these%2520cascaded%2520designs%252C%2520the%2520subsequent%2520stage%2520during%2520inference%2520depends%2520on%2520the%2520output%2520of%2520the%2520preceding%2520stage%252C%2520leading%2520to%2520error%2520accumulation%2520and%2520increased%2520inference%2520latency.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520a%2520cascade-free%2520architecture%2520based%2520on%2520multitask%2520learning%2520that%2520jointly%2520integrates%2520multiple%2520intermediate%2520representations%252C%2520including%2520phoneme%2520and%2520viseme%252C%2520to%2520better%2520exploit%2520contextual%2520information.%2520The%2520proposed%2520semantic-guided%2520local%2520contrastive%2520loss%2520temporally%2520aligns%2520the%2520features%252C%2520enabling%2520on-demand%2520activation%2520during%2520inference%252C%2520thereby%2520providing%2520a%2520trade-off%2520between%2520inference%2520efficiency%2520and%2520performance%2520while%2520mitigating%2520error%2520accumulation%2520caused%2520by%2520projection%2520and%2520re-embedding.%2520Experiments%2520conducted%2520on%2520publicly%2520available%2520datasets%2520demonstrate%2520that%2520our%2520method%2520achieves%2520superior%2520recognition%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21808v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Cascade-Free%20Mandarin%20Visual%20Speech%20Recognition%20via%20Semantic-Guided%20Cross-Representation%20Alignment&entry.906535625=Lei%20Yang%20and%20Yi%20He%20and%20Fei%20Wu%20and%20Shilin%20Wang&entry.1292438233=Chinese%20mandarin%20visual%20speech%20recognition%20%28VSR%29%20is%20a%20task%20that%20has%20advanced%20in%20recent%20years%2C%20yet%20still%20lags%20behind%20the%20performance%20on%20non-tonal%20languages%20such%20as%20English.%20One%20primary%20challenge%20arises%20from%20the%20tonal%20nature%20of%20Mandarin%2C%20which%20limits%20the%20effectiveness%20of%20conventional%20sequence-to-sequence%20modeling%20approaches.%20To%20alleviate%20this%20issue%2C%20existing%20Chinese%20VSR%20systems%20commonly%20incorporate%20intermediate%20representations%2C%20most%20notably%20pinyin%2C%20within%20cascade%20architectures%20to%20enhance%20recognition%20accuracy.%20While%20beneficial%2C%20in%20these%20cascaded%20designs%2C%20the%20subsequent%20stage%20during%20inference%20depends%20on%20the%20output%20of%20the%20preceding%20stage%2C%20leading%20to%20error%20accumulation%20and%20increased%20inference%20latency.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20cascade-free%20architecture%20based%20on%20multitask%20learning%20that%20jointly%20integrates%20multiple%20intermediate%20representations%2C%20including%20phoneme%20and%20viseme%2C%20to%20better%20exploit%20contextual%20information.%20The%20proposed%20semantic-guided%20local%20contrastive%20loss%20temporally%20aligns%20the%20features%2C%20enabling%20on-demand%20activation%20during%20inference%2C%20thereby%20providing%20a%20trade-off%20between%20inference%20efficiency%20and%20performance%20while%20mitigating%20error%20accumulation%20caused%20by%20projection%20and%20re-embedding.%20Experiments%20conducted%20on%20publicly%20available%20datasets%20demonstrate%20that%20our%20method%20achieves%20superior%20recognition%20performance.&entry.1838667208=http%3A//arxiv.org/abs/2603.21808v1&entry.124074799=Read"},
{"title": "The Dual Mechanisms of Spatial Reasoning in Vision-Language Models", "author": "Kelly Cui and Nikhil Prakash and Ayush Raina and David Bau and Antonio Torralba and Tamar Rott Shaham", "abstract": "Many multimodal tasks, such as image captioning and visual question answering, require vision-language models (VLMs) to associate objects with their properties and spatial relations. Yet it remains unclear where and how such associations are computed within VLMs. In this work, we show that VLMs rely on two concurrent mechanisms to represent such associations. In the language model backbone, intermediate layers represent content-independent spatial relations on top of visual tokens corresponding to objects. However, this mechanism plays only a secondary role in shaping model predictions. Instead, the dominant source of spatial information originates in the vision encoder, whose representations encode the layout of objects and are directly exploited by the language model backbone. Notably, this spatial signal is distributed globally across visual tokens, extending beyond object regions into surrounding background areas. We show that enhancing these vision-derived spatial representations globally across all image tokens improves spatial reasoning performance on naturalistic images. Together, our results clarify how spatial association is computed within VLMs and highlight the central role of vision encoders in enabling spatial reasoning.", "link": "http://arxiv.org/abs/2603.22278v1", "date": "2026-03-23", "relevancy": 2.5185, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6411}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6411}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5721}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Dual%20Mechanisms%20of%20Spatial%20Reasoning%20in%20Vision-Language%20Models&body=Title%3A%20The%20Dual%20Mechanisms%20of%20Spatial%20Reasoning%20in%20Vision-Language%20Models%0AAuthor%3A%20Kelly%20Cui%20and%20Nikhil%20Prakash%20and%20Ayush%20Raina%20and%20David%20Bau%20and%20Antonio%20Torralba%20and%20Tamar%20Rott%20Shaham%0AAbstract%3A%20Many%20multimodal%20tasks%2C%20such%20as%20image%20captioning%20and%20visual%20question%20answering%2C%20require%20vision-language%20models%20%28VLMs%29%20to%20associate%20objects%20with%20their%20properties%20and%20spatial%20relations.%20Yet%20it%20remains%20unclear%20where%20and%20how%20such%20associations%20are%20computed%20within%20VLMs.%20In%20this%20work%2C%20we%20show%20that%20VLMs%20rely%20on%20two%20concurrent%20mechanisms%20to%20represent%20such%20associations.%20In%20the%20language%20model%20backbone%2C%20intermediate%20layers%20represent%20content-independent%20spatial%20relations%20on%20top%20of%20visual%20tokens%20corresponding%20to%20objects.%20However%2C%20this%20mechanism%20plays%20only%20a%20secondary%20role%20in%20shaping%20model%20predictions.%20Instead%2C%20the%20dominant%20source%20of%20spatial%20information%20originates%20in%20the%20vision%20encoder%2C%20whose%20representations%20encode%20the%20layout%20of%20objects%20and%20are%20directly%20exploited%20by%20the%20language%20model%20backbone.%20Notably%2C%20this%20spatial%20signal%20is%20distributed%20globally%20across%20visual%20tokens%2C%20extending%20beyond%20object%20regions%20into%20surrounding%20background%20areas.%20We%20show%20that%20enhancing%20these%20vision-derived%20spatial%20representations%20globally%20across%20all%20image%20tokens%20improves%20spatial%20reasoning%20performance%20on%20naturalistic%20images.%20Together%2C%20our%20results%20clarify%20how%20spatial%20association%20is%20computed%20within%20VLMs%20and%20highlight%20the%20central%20role%20of%20vision%20encoders%20in%20enabling%20spatial%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22278v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Dual%2520Mechanisms%2520of%2520Spatial%2520Reasoning%2520in%2520Vision-Language%2520Models%26entry.906535625%3DKelly%2520Cui%2520and%2520Nikhil%2520Prakash%2520and%2520Ayush%2520Raina%2520and%2520David%2520Bau%2520and%2520Antonio%2520Torralba%2520and%2520Tamar%2520Rott%2520Shaham%26entry.1292438233%3DMany%2520multimodal%2520tasks%252C%2520such%2520as%2520image%2520captioning%2520and%2520visual%2520question%2520answering%252C%2520require%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520associate%2520objects%2520with%2520their%2520properties%2520and%2520spatial%2520relations.%2520Yet%2520it%2520remains%2520unclear%2520where%2520and%2520how%2520such%2520associations%2520are%2520computed%2520within%2520VLMs.%2520In%2520this%2520work%252C%2520we%2520show%2520that%2520VLMs%2520rely%2520on%2520two%2520concurrent%2520mechanisms%2520to%2520represent%2520such%2520associations.%2520In%2520the%2520language%2520model%2520backbone%252C%2520intermediate%2520layers%2520represent%2520content-independent%2520spatial%2520relations%2520on%2520top%2520of%2520visual%2520tokens%2520corresponding%2520to%2520objects.%2520However%252C%2520this%2520mechanism%2520plays%2520only%2520a%2520secondary%2520role%2520in%2520shaping%2520model%2520predictions.%2520Instead%252C%2520the%2520dominant%2520source%2520of%2520spatial%2520information%2520originates%2520in%2520the%2520vision%2520encoder%252C%2520whose%2520representations%2520encode%2520the%2520layout%2520of%2520objects%2520and%2520are%2520directly%2520exploited%2520by%2520the%2520language%2520model%2520backbone.%2520Notably%252C%2520this%2520spatial%2520signal%2520is%2520distributed%2520globally%2520across%2520visual%2520tokens%252C%2520extending%2520beyond%2520object%2520regions%2520into%2520surrounding%2520background%2520areas.%2520We%2520show%2520that%2520enhancing%2520these%2520vision-derived%2520spatial%2520representations%2520globally%2520across%2520all%2520image%2520tokens%2520improves%2520spatial%2520reasoning%2520performance%2520on%2520naturalistic%2520images.%2520Together%252C%2520our%2520results%2520clarify%2520how%2520spatial%2520association%2520is%2520computed%2520within%2520VLMs%2520and%2520highlight%2520the%2520central%2520role%2520of%2520vision%2520encoders%2520in%2520enabling%2520spatial%2520reasoning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22278v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Dual%20Mechanisms%20of%20Spatial%20Reasoning%20in%20Vision-Language%20Models&entry.906535625=Kelly%20Cui%20and%20Nikhil%20Prakash%20and%20Ayush%20Raina%20and%20David%20Bau%20and%20Antonio%20Torralba%20and%20Tamar%20Rott%20Shaham&entry.1292438233=Many%20multimodal%20tasks%2C%20such%20as%20image%20captioning%20and%20visual%20question%20answering%2C%20require%20vision-language%20models%20%28VLMs%29%20to%20associate%20objects%20with%20their%20properties%20and%20spatial%20relations.%20Yet%20it%20remains%20unclear%20where%20and%20how%20such%20associations%20are%20computed%20within%20VLMs.%20In%20this%20work%2C%20we%20show%20that%20VLMs%20rely%20on%20two%20concurrent%20mechanisms%20to%20represent%20such%20associations.%20In%20the%20language%20model%20backbone%2C%20intermediate%20layers%20represent%20content-independent%20spatial%20relations%20on%20top%20of%20visual%20tokens%20corresponding%20to%20objects.%20However%2C%20this%20mechanism%20plays%20only%20a%20secondary%20role%20in%20shaping%20model%20predictions.%20Instead%2C%20the%20dominant%20source%20of%20spatial%20information%20originates%20in%20the%20vision%20encoder%2C%20whose%20representations%20encode%20the%20layout%20of%20objects%20and%20are%20directly%20exploited%20by%20the%20language%20model%20backbone.%20Notably%2C%20this%20spatial%20signal%20is%20distributed%20globally%20across%20visual%20tokens%2C%20extending%20beyond%20object%20regions%20into%20surrounding%20background%20areas.%20We%20show%20that%20enhancing%20these%20vision-derived%20spatial%20representations%20globally%20across%20all%20image%20tokens%20improves%20spatial%20reasoning%20performance%20on%20naturalistic%20images.%20Together%2C%20our%20results%20clarify%20how%20spatial%20association%20is%20computed%20within%20VLMs%20and%20highlight%20the%20central%20role%20of%20vision%20encoders%20in%20enabling%20spatial%20reasoning.&entry.1838667208=http%3A//arxiv.org/abs/2603.22278v1&entry.124074799=Read"},
{"title": "AnimalCLAP: Taxonomy-Aware Language-Audio Pretraining for Species Recognition and Trait Inference", "author": "Risa Shinoda and Kaede Shiohara and Nakamasa Inoue and Hiroaki Santo and Fumio Okura", "abstract": "Animal vocalizations provide crucial insights for wildlife assessment, particularly in complex environments such as forests, aiding species identification and ecological monitoring. Recent advances in deep learning have enabled automatic species classification from their vocalizations. However, classifying species unseen during training remains challenging. To address this limitation, we introduce AnimalCLAP, a taxonomy-aware language-audio framework comprising a new dataset and model that incorporate hierarchical biological information. Specifically, our vocalization dataset consists of 4,225 hours of recordings covering 6,823 species, annotated with 22 ecological traits. The AnimalCLAP model is trained on this dataset to align audio and textual representations using taxonomic structures, improving the recognition of unseen species. We demonstrate that our proposed model effectively infers ecological and biological attributes of species directly from their vocalizations, achieving superior performance compared to CLAP. Our dataset, code, and models will be publicly available at https://dahlian00.github.io/AnimalCLAP_Page/.", "link": "http://arxiv.org/abs/2603.22053v1", "date": "2026-03-23", "relevancy": 2.5078, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5261}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4925}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4861}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AnimalCLAP%3A%20Taxonomy-Aware%20Language-Audio%20Pretraining%20for%20Species%20Recognition%20and%20Trait%20Inference&body=Title%3A%20AnimalCLAP%3A%20Taxonomy-Aware%20Language-Audio%20Pretraining%20for%20Species%20Recognition%20and%20Trait%20Inference%0AAuthor%3A%20Risa%20Shinoda%20and%20Kaede%20Shiohara%20and%20Nakamasa%20Inoue%20and%20Hiroaki%20Santo%20and%20Fumio%20Okura%0AAbstract%3A%20Animal%20vocalizations%20provide%20crucial%20insights%20for%20wildlife%20assessment%2C%20particularly%20in%20complex%20environments%20such%20as%20forests%2C%20aiding%20species%20identification%20and%20ecological%20monitoring.%20Recent%20advances%20in%20deep%20learning%20have%20enabled%20automatic%20species%20classification%20from%20their%20vocalizations.%20However%2C%20classifying%20species%20unseen%20during%20training%20remains%20challenging.%20To%20address%20this%20limitation%2C%20we%20introduce%20AnimalCLAP%2C%20a%20taxonomy-aware%20language-audio%20framework%20comprising%20a%20new%20dataset%20and%20model%20that%20incorporate%20hierarchical%20biological%20information.%20Specifically%2C%20our%20vocalization%20dataset%20consists%20of%204%2C225%20hours%20of%20recordings%20covering%206%2C823%20species%2C%20annotated%20with%2022%20ecological%20traits.%20The%20AnimalCLAP%20model%20is%20trained%20on%20this%20dataset%20to%20align%20audio%20and%20textual%20representations%20using%20taxonomic%20structures%2C%20improving%20the%20recognition%20of%20unseen%20species.%20We%20demonstrate%20that%20our%20proposed%20model%20effectively%20infers%20ecological%20and%20biological%20attributes%20of%20species%20directly%20from%20their%20vocalizations%2C%20achieving%20superior%20performance%20compared%20to%20CLAP.%20Our%20dataset%2C%20code%2C%20and%20models%20will%20be%20publicly%20available%20at%20https%3A//dahlian00.github.io/AnimalCLAP_Page/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22053v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7 20code%252C%2520and%2520models%2520will%2520be%2520publicly%2520available%2520at%2520https%253A//dahlian00.github.io/AnimalCLAP_Page/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22053v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AnimalCLAP%3A%20Taxonomy-Aware%20Language-Audio%20Pretraining%20for%20Species%20Recognition%20and%20Trait%20Inference&entry.906535625=Risa%20Shinoda%20and%20Kaede%20Shiohara%20and%20Nakamasa%20Inoue%20and%20Hiroaki%20Santo%20and%20Fumio%20Okura&entry.1292438233=Animal%20vocalizations%20provide%20crucial%20insights%20for%20wildlife%20assessment%2C%20particularly%20in%20complex%20environments%20such%20as%20forests%2C%20aiding%20species%20identification%20and%20ecological%20monitoring.%20Recent%20advances%20in%20deep%20learning%20have%20enabled%20automatic%20species%20classification%20from%20their%20vocalizations.%20However%2C%20classifying%20species%20unseen%20during%20training%20remains%20challenging.%20To%20address%20this%20limitation%2C%20we%20introduce%20AnimalCLAP%2C%20a%20taxonomy-aware%20language-audio%20framework%20comprising%20a%20new%20dataset%20and%20model%20that%20incorporate%20hierarchical%20biological%20information.%20Specifically%2C%20our%20vocalization%20dataset%20consists%20of%204%2C225%20hours%20of%20recordings%20covering%206%2C823%20species%2C%20annotated%20with%2022%20ecological%20traits.%20The%20AnimalCLAP%20model%20is%20trained%20on%20this%20dataset%20to%20align%20audio%20and%20textual%20representations%20using%20taxonomic%20structures%2C%20improving%20the%20recognition%20of%20unseen%20species.%20We%20demonstrate%20that%20our%20proposed%20model%20effectively%20infers%20ecological%20and%20biological%20attributes%20of%20species%20directly%20from%20their%20vocalizations%2C%20achieving%20superior%20performance%20compared%20to%20CLAP.%20Our%20dataset%2C%20code%2C%20and%20models%20will%20be%20publicly%20availabl {"title": "One Model, Two Markets: Bid-Aware Generative Recommendation", "author": "Yanchen Jiang and Zhe Feng and Christopher P. Mah and Aranyak Mehta and Di Wang", "abstract": "Generative Recommender Systems using semantic ids, such as TIGER (Rajput et al., 2023), have emerged as a widely adopted competitive paradigm in sequential recommendation. However, existing architectures are designed solely for semantic retrieval and do not address concerns such as monetization via ad revenue and incorporation of bids for commercial retrieval. We propose GEM-Rec, a unified framework that integrates commercial relevance and monetization objectives directly into the generative sequence. We introduce control tokens to decouple the decision of whether to show an ad from which item to show. This allows the model to learn valid placement patterns directly from interaction logs, which inherently reflect past successful ad placements. Complementing this, we devise a Bid-Aware Decoding mechanism that handles real-time pricing, injecting bids directly into the inference process to steer the generation toward high-value items. We prove that this approach guarantees allocation monotonicity, ensuring that higher bids weakly increase an ad's likelihood of being shown without requiring model retraining. Experiments demonstrate that GEM-Rec allows platforms to dynamically optimize for semantic relevance and platform revenue.", "link": "http://arxiv.org/abs/2603.22231v1", "date": "2026-03-23", "relevancy": 2.5049, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5347}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4931}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4752}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Model%2C%20Two%20Markets%3A%20Bid-Aware%20Generative%20Recommendation&body=Title%3A%20One%20Model%2C%20Two%20Markets%3A%20Bid-Aware%20Generative%20Recommendation%0AAuthor%3A%20Yanchen%20Jiang%20and%20Zhe%20Feng%20and%20Christopher%20P.%20Mah%20and%20Aranyak%20Mehta%20and%20Di%20Wang%0AAbstract%3A%20Generative%20Recommender%20Systems%20using%20semantic%20ids%2C%20such%20as%20TIGER%20%28Rajput%20et%20al.%2C%202023%29%2C%20have%20emerged%20as%20a%20widely%20adopted%20competitive%20paradigm%20in%20sequential%20recommendation.%20However%2C%20existing%20architectures%20are%20designed%20solely%20for%20semantic%20retrieval%20and%20do%20not%20address%20concerns%20such%20as%20monetization%20via%20ad%20revenue%20and%20incorporation%20of%20bids%20for%20commercial%20retrieval.%20We%20propose%20GEM-Rec%2C%20a%20unified%20framework%20that%20integrates%20commercial%20relevance%20and%20monetization%20objectives%20directly%20into%20the%20generative%20sequence.%20We%20introduce%20control%20tokens%20to%20decouple%20the%20decision%20of%20whether%20to%20show%20an%20ad%20from%20which%20item%20to%20show.%20This%20allows%20the%20model%20to%20learn%20valid%20placement%20patterns%20directly%20from%20interaction%20logs%2C%20which%20inherently%20reflect%20past%20successful%20ad%20placements.%20Complementing%20this%2C%20we%20devise%20a%20Bid-Aware%20Decoding%20mechanism%20that%20handles%20real-time%20pricing%2C%20injecting%20bids%20directly%20into%20the%20inference%20process%20to%20steer%20the%20generation%20toward%20high-value%20items.%20We%20prove%20that%20this%20approach%20guarantees%20allocation%20monotonicity%2C%20ensuring%20that%20higher%20bids%20weakly%20increase%20an%20ad%27s%20likelihood%20of%20being%20shown%20without%20requiring%20model%20retraining.%20Experiments%20demonstrate%20that%20GEM-Rec%20allows%20platforms%20to%20dynamically%20optimize%20for%20semantic%20relevance%20and%20platform%20revenue.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22231v {"title": "KeySG: Hierarchical Keyframe-Based 3D Scene Graphs", "author": "Abdelrhman Werby and Dennis Rotondi and Fabio Scaparro and Kai O. Arras", "abstract": "In recent years, 3D scene graphs have emerged as a powerful world representation, offering both geometric accuracy and semantic richness. Combining 3D scene graphs with large language models enables robots to reason, plan, and navigate in complex human-centered environments. However, current approaches for constructing 3D scene graphs are semantically limited to a predefined set of relationships, and their serialization in large environments can easily exceed an LLM's context window. We introduce KeySG, a framework that represents 3D scenes as a hierarchical graph consisting of floors, rooms, objects, and functional elements, where nodes are augmented with multi-modal information extracted from keyframes selected to optimize geometric and visual coverage. The keyframes allow us to efficiently leverage VLMs to extract scene information, alleviating the need to explicitly model relationship edges between objects, enabling more general, task-agnostic reasoning and planning. Our approach can process complex and ambiguous queries while mitigating the scalability issues associated with large scene graphs by utilizing a hierarchical multi-modal retrieval-augmented generation (RAG) pipeline to extract relevant context from the graph. Evaluated across three distinct benchmarks, 3D object semantic segmentation, functional element segmentation, and complex query retrieval, KeySG outperforms prior approaches on most metrics, demonstrating its superior semantic richness and efficiency.", "link": "http://arxiv.org/abs/2510.01049v2", "date": "2026-03-23", "relevancy": 2.5042, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6268}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6259}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KeySG%3A%20Hierarchical%20Keyframe-Based%203D%20Scene%20Graphs&body=Title%3A%20KeySG%3A%20Hierarchical%20Keyframe-Based%203D%20Scene%20Graphs%0AAuthor%3A%20Abdelrhman%20Werby%20and%20Dennis%20Rotondi%20and%20Fabio%20Scaparro%20and%20Kai%20O.%20Arras%0AAbstract%3A%20In%20recent%20years%2C%203D%20scene%20graphs%20have%20emerged%20as%20a%20powerful%20world%20representation%2C%20offering%20both%20geometric%20accuracy%20and%20semantic%20richness.%20Combining%203D%20scene%20graphs%20with%20large%20language%20models%20enables%20robots%20to%20reason%2C%20plan%2C%20and%20navigate%20in%20complex%20human-centered%20environments.%20However%2C%20current%20approaches%20for%20constructing%203D%20scene%20graphs%20are%20semantically%20limited%20to%20a%20predefined%20set%20of%20relationships%2C%20and%20their%20serialization%20in%20large%20environments%20can%20easily%20exceed%20an%20LLM%27s%20context%20window.%20We%20introduce%20KeySG%2C%20a%20framework%20that%20represents%203D%20scenes%20as%20a%20hierarchical%20graph%20consisting%20of%20floors%2C%20rooms%2C%20objects%2C%20and%20functional%20elements%2C%20where%20nodes%20are%20augmented%20with%20multi-modal%20information%20extracted%20from%20keyframes%20selected%20to%20optimize%20geometric%20and%20visual%20coverage.%20The%20keyframes%20allow%20us%20to%20efficiently%20leverage%20VLMs%20to%20extract%20scene%20information%2C%20alleviating%20the%20need%20to%20explicitly%20model%20relationship%20edges%20between%20objects%2C%20enabling%20more%20general%2C%20task-agnostic%20reasoning%20and%20planning.%20Our%20approach%20can%20process%20complex%20and%20ambiguous%20queries%20while%20mitigating%20the%20scalability%20issues%20associated%20with%20large%20scene%20graphs%20by%20utilizing%20a%20hierarchical%20multi-modal%20retrieval-augmented%20generation%20%28RAG%29%20pipeline%20to%20extract%20relevant%20context%20from%20the%20graph.%20Evaluated%20across%20three%20distinct%20benchmarks%2C%203D%20object%20semantic%20segmentation%2C%20functional%20element%20segmentation%2C%20and%20complex%20query%20retrieval%2C%20KeySG%20outperforms%20prior%20approaches%20on%20most%20metrics%2C%20demonstrating%20its%20superior%20semantic%20richness%20and%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2510.01049v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKeySG%253A%2520Hierarchical%2520Keyframe-Based%25203D%2520Scene%2520Graphs%26entry.906535625%3DAbdelrhman%2520Werby%2520and%2520Dennis%2520Rotondi%2520and%2520Fabio%2520Scaparro%2520and%2520Kai%2520O.%2520Arras%26entry.1292438233%3DIn%2520recent%2520years%252C%25203D%2520scene%2520graphs%2520have%2520emerged%2520as%2520a%2520powerful%2520world%2520representation%252C%2520offering%2520both%2520geometric%2520accuracy%2520and%2520semantic%2520richness.%2520Combining%25203D%2520scene%2520graphs%2520with%2520large%2520language%2520models%2520enables%2520robots%2520to%2520reason%252C%2520plan%252C%2520and%2520navigate%2520in%2520complex%2520human-centered%2520environments.%2520However%252C%2520current%2520approaches%2520for%2520constructing%25203D%2520scene%2520graphs%2520are%2520semantically%2520limited%2520to%2520a%2520predefined%2520set%2520of%2520relationships%252C%2520and%2520their%2520serialization%2520in%2520large%2520environments%2520can%2520easily%2520exceed%2520an%2520LLM%2527s%2520context%2520window.%2520We%2520introduce%2520KeySG%252C%2520a%2520framework%2520that%2520represents%25203D%2520scenes%2520as%2520a%2520hierarchical%2520graph%2520consisting%2520of%2520floors%252C%2520rooms%252C%2520objects%252C%2520and%2520functional%2520elements%252C%2520where% {"title": "Principled Steering via Null-space Projection for Jailbreak Defense in Vision-Language Models", "author": "Xingyu Zhu and Beier Zhu and Shuo Wang and Junfeng Fang and Kesen Zhao and Hanwang Zhang and Xiangnan He", "abstract": "As vision-language models (VLMs) are increasingly deployed in open-world scenarios, they can be easily induced by visual jailbreak attacks to generate harmful content, posing serious risks to model safety and trustworthy usage. Recent activation steering methods inject directional vectors into model activations during inference to induce refusal behaviors and have demonstrated effectiveness. However, a steering vector may both enhance refusal ability and cause over-refusal, thereby degrading model performance on benign inputs. Moreover, due to the lack of theoretical interpretability, these methods still suffer from limited robustness and effectiveness. To better balance safety and utility, we propose NullSteer, a null-space projected activation defense framework. Our method constructs refusal directions within model activations through a linear transformation: it maintains zero perturbation within the benign subspace while dynamically inducing refusal along potentially harmful directions, thereby theoretically achieving safety enhancement without impairing the model's general capabilities. Extensive experiments show that NullSteer significantly reduces harmful outputs under various jailbreak attacks (average ASR reduction over 15 percent on MiniGPT-4) while maintaining comparable performance to the original model on general benchmarks.", "link": "http://arxiv.org/abs/2603.22094v1", "date": "2026-03-23", "relevancy": 2.4884, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5073}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5073}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4784}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Principled%20Steering%20via%20Null-space%20Projection%20for%20Jailbreak%20Defense%20in%20Vision-Language%20Models&body=Title%3A%20Principled%20Steering%20via%20Null-space%20Projection%20for%20Jailbreak%20Defense%20in%20Vision-Language%20Models%0AAuthor%3A%20Xingyu%20Zhu%20and%20Beier%20Zhu%20and%20Shuo%20Wang%20and%20Junfeng%20Fang%20and%20Kesen%20Zhao%20and%20Hanwang%20Zhang%20and%20Xiangnan%20He%0AAbstract%3A%20As%20vision-language%20models%20%28VLMs%29%20are%20increasingly%20deployed%20in%20open-world%20scenarios%2C%20they%20can%20be%20easily%20induced%20by%20visual%20jailbreak%20attacks%20to%20generate%20harmful%20content%2C%20posing%20serious%20risks%20to%20model%20safety%20and%20trustworthy%20usage.%20Recent%20activation%20steering%20methods%20inject%20directional%20vectors%20into%20model%20activations%20during%20inference%20to%20induce%20refusal%20behaviors%20and%20have%20demonstrated%20effectiveness.%20However%2C%20a%20steering%20vector%20may%20both%20enhance%20refusal%20ability%20and%20cause%20over-refusal%2C%20thereby%20degrading%20model%20performance%20on%20benign%20inputs.%20Moreover%2C%20due%20to%20the%20lack%20of%20theoretical%20interpretability%2C%20these%20methods%20still%20suffer%20from%20limited%20robustness%20and%20effectiveness.%20To%20better%20balance%20safety%20and%20utility%2C%20we%20propose%20NullSteer%2C%20a%20null-space%20projected%20activation%20defense%20framework.%20Our%20method%20constructs%20refusal%20directions%20within%20model%20activations%20through%20a%20linear%20transformation%3A%20it%20maintains%20zero%20perturbation%20within%20the%20benign%20subspace%20while%20dynamically%20inducing%20refusal%20along%20potentially%20harmful%20directions%2C%20thereby%20theoretically%20achieving%20safety%20enhancement%20without%20impairing%20the%20model%27s%20general%20capabilities.%20Extensive%20experiments%20show%20that%20NullSteer%20significantly%20reduces%20harmful%20outputs%20under%20various%20jailbreak%20attacks%20%28average%20ASR%20reduction%20over%2015%20percent%20on%20MiniGPT-4%29%20while%20maintaining%20comparable%20performance%20to%20the%20original%20model%20on%20general%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22094v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrincipled%2520Steering%2520via%2520Null-space%2520Projection%2520for%2520Jailbreak%2520Defense%2520in%2520Vision-Language%2520Models%26entry.906535625%3DXingyu%2520Zhu%2520and%2520Beier%2520Zhu%2520and%2520Shuo%2520Wang%2520and%2520Junfeng%2520Fang%2520and%2520Kesen%2520Zhao%2520and%2520Hanwang%2520Zhang%2520and%2520Xiangnan%2520He%26entry.1292438233%3DAs%2520vision-language%2520models%2520%2528VLMs%2529%2520are%2520increasingly%2520deployed%2520in%2520open-world%2520scenarios%252C%2520they%2520can%2520be%2520easily%2520induced%2520by%2520visual%2520jailbreak%2520attacks%2520to%2520generate%2520harmful%2520content%252C%2520posing%2520serious%2520risks%2520to%2520model%2520safety%2520and%2520trustworthy%2520usage.%2520Recent%2520activation%2520steering%2520methods%2520inject%2520directional%2520vectors%2520into%2520model%2520activations%2520during%2520inference%2520to%2520induce%2520refusal%2520behaviors%2520and%2520have%2520demonstrated%2520effectiveness.%2520However%252C%2520a%2520steering%2520vector%2520may%2520both%2520enhance%2520refusal%2520ability%2520and%2520cause%2520over-refusal%252C%2520thereby%2520degrading%2520model%2520performance%2520on%2520benign%2520inputs.%2520Moreover%252C%2520due%2520to%2520the%2520lack%2520of%2520theoretical%2520interpretability%252C%2520these%2520methods%2520still%2520suffer%2520from%2520limited%2520robustness%2520and%2520effectivene

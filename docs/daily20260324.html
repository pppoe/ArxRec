tions%20such%20as%20poor%20lighting%20or%20reflective%20surfaces.%20Simulation%20and%20real-world%20experiments%20demonstrate%20that%20our%20approach%20maintains%20robust%20performance%20under%20significant%20depth%20degradation%20and%20successfully%20transfers%20to%20real%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2603.22182v1&entry.124074799=Read"},
{"title": "Understanding Temporal Logic Consistency in Video-Language Models through Cross-Modal Attention Discriminability", "author": "Chengzhi Li and Heyan Huang and Ping Jian and Zhen Yang and Yaning Tian and Zhongbin Guo", "abstract": "Large language models (LLMs) often generate self-contradictory outputs, which severely impacts their reliability and hinders their adoption in practical applications. In video-language models (Video-LLMs), this phenomenon recently draws the attention of researchers. Specifically, these models fail to provide logically consistent responses to rephrased questions based on their grounding outputs. However, the underlying causes of this phenomenon remain underexplored. In this work, we adopt an interpretability-driven approach to analyze, statistically summarize, and intervention the potential factors of the phenomenon. We find that one of the primary reasons for the inconsistency in responses lies in the inability of cross-modal attention heads to effectively distinguish video tokens across different timestamps. To address this, we propose an attention enhancement method called Temporally Conditioned Attention Sharpening (TCAS), which constructs an enhancement objective based on attention distinctions to enhance the model's temporal resolution capability, thereby improving its temporal understanding logic consistency. Experimental results demonstrate that our method significantly enhances the temporal logic consistency of Video-LLMs. Further analyses reveal that our method indeed improves the temporal discriminability of attention heads, validating our conclusions. Additionally, our method even achieves performance improvements in general video temporal grounding tasks, suggesting that temporal logic consistency is an important factor in temporal understanding.", "link": "http://arxiv.org/abs/2510.08138v2", "date": "2026-03-23", "relevancy": 2.2341, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5656}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5539}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5524}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20Temporal%20Logic%20Consistency%20in%20Video-Language%20Models%20through%20Cross-Modal%20Attention%20Discriminability&body=Title%3A%20Understanding%20Temporal%20Logic%20Consistency%20in%20Video-Language%20Models%20through%20Cross-Modal%20Attention%20Discriminability%0AAuthor%3A%20Chengzhi%20Li%20and%20Heyan%20Huang%20and%20Ping%20Jian%20and%20Zhen%20Yang%20and%20Yaning%20Tian%20and%20Zhongbin%20Guo%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20often%20generate%20self-contradictory%20outputs%2C%20which%20severely%20impacts%20their%20reliability%20and%20hinders%20their%20adoption%20in%20practical%20applications.%20In%20video-language%20models%20%28Video-LLMs%29%2C%20this%20phenomenon%20recently%20draws%20the%20attention%20of%20researchers.%20Specifically%2C%20these%20models%20fail%20to%20provide%20logically%20consistent%20responses%20to%20rephrased%20questions%20based%20on%20their%20grounding%20outputs.%20However%2C%20the%20underlying%20causes%20of%20this%20phenomenon%20remain%20underexplored.%20In%20this%20work%2C%20we%20adopt%20an%20interpretability-driven%20approach%20to%20analyze%2C%20statistically%20summarize%2C%20and%20intervention%20the%20potential%20factors%20of%20the%20phenomenon.%20We%20find%20that%20one%20of%20the%20primary%20reasons%20for%20the%20inconsistency%20in%20responses%20lies%20in%20the%20inability%20of%20cross-modal%20attention%20heads%20to%20effectively%20distinguish%20video%20tokens%20across%20different%20timestamps.%20To%20address%20this%2C%20we%20propose%20an%20attention%20enhancement%20method%20called%20Temporally%20Conditioned%20Attention%20Sharpening%20%28TCAS%29%2C%20which%20constructs%20an%20enhancement%20objective%20based%20on%20attention%20distinctions%20to%20enhance%20the%20model%27s%20temporal%20resolution%20capability%2C%20thereby%20improving%20its%20temporal%20understanding%20logic%20consistency.%20Experimental%20results%20demonstrate%20that%20our%20method%20significantly%20enhances%20the%20temporal%20logic%20consistency%20of%20Video-LLMs.%20Further%20analyses%20reveal%20that%20our%20method%20indeed%20improves%20the%20temporal%20discriminability%20of%20attention%20heads%2C%20validating%20our%20conclusions.%20Additionally%2C%20our%20method%20even%20achieves%20performance%20improvements%20in%20general%20video%20temporal%20grounding%20tasks%2C%20suggesting%20that%20temporal%20logic%20consistency%20is%20an%20important%20factor%20in%20temporal%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2510.08138v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnderstanding%2520Temporal%2520Logic%2520Consistency%2520in%2520Video-Language%2520Models%2520through%2520Cross-Modal%2520Attention%2520Discriminability%26entry.906535625%3DChengzhi%2520Li%2520and%2520Heyan%2520Huang%2520and%2520Ping%2520Jian%2520and%2520Zhen%2520Yang%2520and%2520Yaning%2520Tian%2520and%2520Zhongbin%2520Guo%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520often%2520generate%2520self-contradictory%2520outputs%252C%2520which%2520severely%2520impacts%2520their%2520reliability%2520and%2520hinders%2520their%2520adoption%2520in%2520practical%2520applications.%2520In%2520video-language%2520models%2520%2528Video-LLMs%2529%252C%2520this%2520phenomenon%2520recently%2520draws%2520the%2520attention%2520of%2520researchers.%2520Specifi imental%20results%20demonstrate%20that%20our%20method%20significantly%20enhances%20the%20temporal%20logic%20consistency%20of%20Video-LLMs.%20Further%20analyses%20reveal%20that%20our%20method%20indeed%20improves%20the%20temporal%20discriminability%20of%20attention%20heads%2C%20validating%20our%20conclusions.%20Additionally%2C%20our%20method%20even%20achieves%20performance%20improvements%20in%20general%20video%20temporal%20grounding%20tasks%2C%20suggesting%20that%20temporal%20logic%20consistency%20is%20an%20important%20factor%20in%20temporal%20understanding.&entry.1838667208=http%3A//arxiv.org/abs/2510.08138v2&entry.124074799=Read"},
{"title": "Reasoning-Aligned Perception Decoupling for Scalable Multi-modal Reasoning", "author": "Yunhao Gou and Kai Chen and Zhili Liu and Lanqing Hong and Xin Jin and Zhenguo Li and James T. Kwok and Yu Zhang", "abstract": "Recent breakthroughs in reasoning language models have significantly advanced text-based reasoning. On the other hand, Multi-modal Large Language Models (MLLMs) still lag behind, hindered by their outdated internal LLMs. Upgrading these LLMs is often prohibitively expensive, as it requires costly vision-language alignment retraining. To address this issue, we introduce Perception-Reasoning Decoupling, which modularizes the MLLM's reasoning component and makes it easily replaceable. This approach redefines the MLLM's role to convert multi-modal inputs into detailed textual outputs that can be processed by any powerful, external, text-only LLM reasoners. To align the MLLM's perceptual output with the final reasoning task, we propose a novel reinforcement learning algorithm called Visual Perception Optimization (VPO). VPO rewards the MLLM based on the correctness of answers generated by the external reasoner to produce faithful and query-relevant captions. Together, this decoupling pipeline and VPO form our Reasoning-Aligned PerceptIon Decoupling (RAPID) approach. Empirical results show that RAPID achieves significant performance gains on multi-modal reasoning benchmarks. Crucially, RAPID enables a novel inference-time scaling paradigm: Once trained with VPO, the MLLM can be paired with any state-of-the-art LLM reasoner for consistent performance improvement without retraining.", "link": "http://arxiv.org/abs/2506.04559v3", "date": "2026-03-23", "relevancy": 2.2217, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5562}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5562}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reasoning-Aligned%20Perception%20Decoupling%20for%20Scalable%20Multi-modal%20Reasoning&body=Title%3A%20Reasoning-Aligned%20Perception%20Decoupling%20for%20Scalable%20Multi-modal%20Reasoning%0AAuthor%3A%20Yunhao%20Gou%20and%20Kai%20Chen%20and%20Zhili%20Liu%20and%20Lanqing%20Hong%20and%20Xin%20Jin%20and%20Zhenguo%20Li%20and%20James%20T.%20Kwok%20and%20Yu%20Zhang%0AAbstract%3A%20Recent%20breakthroughs%20in%20reasoning%20language%20models%20have%20significantly%20advanced%20text-based%20reasoning.%20On%20the%20other%20hand%2C%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29%20still%20lag%20behind%2C%20hindered%20by%20their%20outdated%20internal%20LLMs.%20Upgrading%20these%20LLMs%20is%20often%20prohibitively%20expensive%2C%20as%20it%20requires%20costly%20vision-language%20alignment%20retraining.%20To%20address%20this%20issue%2C%20we%20introduce%20Perception-Reasoning%20Decoupling%2C%20which%20modularizes%20the%20MLLM%27s%20reasoning%20component%20and%20makes%20it%20easily%20replaceable.%20This%20approach%20redefines%20the%20MLLM%27s%20role%20to%20convert%20multi-modal%20inputs%20into%20detailed%20textual%20outputs%20that%20can%20be%20processed%20by%20any%20powerful%2C%20external%2C%20text-only%20LLM%20reasoners.%20To%20align%20the%20MLLM%27s%20perceptual%20output%20with%20the%20final%20reasoning%20task%2C%20we%20propose%20a%20novel%20reinforcement%20learning%20algorithm%20called%20Visual%20Perception%20Optimization%20%28VPO%29.%20VPO%20rewards%20the%20MLLM%20based%20on%20the%20correctness%20of%20answers%20generated%20by%20the%20external%20reasoner%20to%20produce%20faithful%20and%20query-relevant%20captions.%20Together%2C%20this%20decoupling%20pipeline%20and%20VPO%20form%20our%20Reasoning-Aligned%20PerceptIon%20Decoupling%20%28RAPID%29%20approach.%20Empirical%20results%20show%20that%20RAPID%20achieves%20significant%20performance%20gains%20on%20multi-modal%20reasoning%20benchmarks.%20Crucially%2C%20RAPID%20enables%20a%20novel%20inference-time%20scaling%20paradigm%3A%20Once%20trained%20with%20VPO%2C%20the%20MLLM%20can%20be%20paired%20with%20any%20state-of-the-art%20LLM%20reasoner%20for%20consistent%20performance%20improvement%20without%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2506.04559v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReasoning-Aligned%2520Perception%2520Decoupling%2520for%2520Scalable%2520Multi-modal%2520Reasoning%26entry.906535625%3DYunhao%2520Gou%2520and%2520Kai%2520Chen%2520and%2520Zhili%2520Liu%2520and%2520Lanqing%2520Hong%2520and%2520Xin%2520Jin%2520and%2520Zhenguo%2520Li%2520and%2520James%2520T.%2520Kwok%2520and%2520Yu%2520Zhang%26entry.1292438233%3DRecent%2520breakthroughs%2520in%2520reasoning%2520language%2520models%2520have%2520significantly%2520advanced%2520text-based%2520reasoning.%2520On%2520the%2520other%2520hand%252C%2520Multi-modal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520still%2520lag%2520behind%252C%2520hindered%2520by%2520their%2520outdated%2520internal%2520LLMs.%2520Upgrading%2520these%2520LLMs%2520is%2520often%2520prohibitively%2520expensive%252C%2520as%2520it%2520requires%2520costly%2520vision-language%2520alignment%2520retraining.%2520To%2520address%2520this%2520issue%252C%2520we%2520introduce%2520Perception-Reasoning%2520Decoupling%252C%2520which%2520modularizes%2520the%2520MLLM%2527s%2520reasoning%2520component%2520and%2520makes%2520it%2520easily%2520replaceable.%2520This%2520approach%2520redefines%2520the%2520MLLM%2527s%2520role%2520to%2520convert%2520multi-modal%2520inputs%2520into%2520detailed%2520textual%2520outputs%2520that%2520can%2520be%2520processed%2520by%2520any%2 {"title": "Partial Attention in Deep Reinforcement Learning for Safe Multi-Agent Control", "author": "Turki Bin Mohaya and Peter Seiler", "abstract": "Attention mechanisms excel at learning sequential patterns by discriminating data based on relevance and importance. This provides state-of-the-art performance in advanced generative artificial intelligence models. This paper applies this concept of an attention mechanism for multi-agent safe control. We specifically consider the design of a neural network to control autonomous vehicles in a highway merging scenario. The environment is modeled as a Decentralized Partially Observable Markov Decision Process (Dec-POMDP). Within a QMIX framework, we include partial attention for each autonomous vehicle, thus allowing each ego vehicle to focus on the most relevant neighboring vehicles. Moreover, we propose a comprehensive reward signal that considers the global objectives of the environment (e.g., safety and vehicle flow) and the individual interests of each agent. Simulations are conducted in the Simulation of Urban Mobility (SUMO). The results show better performance compared to other driving algorithms in terms of safety, driving speed, and reward.", "link": "http://arxiv.org/abs/2603.21810v1", "date": "2026-03-23", "relevancy": 2.2069, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.6027}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5425}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5044}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Partial%20Attention%20in%20Deep%20Reinforcement%20Learning%20for%20Safe%20Multi-Agent%20Control&body=Title%3A%20Partial%20Attention%20in%20Deep%20Reinforcement%20Learning%20for%20Safe%20Multi-Agent%20Control%0AAuthor%3A%20Turki%20Bin%20Mohaya%20and%20Peter%20Seiler%0AAbstract%3A%20Attention%20mechanisms%20excel%20at%20learning%20sequential%20patterns%20by%20discriminating%20data%20based%20on%20relevance%20and%20importance.%20This%20provides%20state-of-the-art%20performance%20in%20advanced%20generative%20artificial%20intelligence%20models.%20This%20paper%20applies%20this%20concept%20of%20an%20attention%20mechanism%20for%20multi-agent%20safe%20control.%20We%20specifically%20consider%20the%20design%20of%20a%20neural%20network%20to%20control%20autonomous%20vehicles%20in%20a%20highway%20merging%20scenario.%20The%20environment%20is%20modeled%20as%20a%20Decentralized%20Partially%20Observable%20Markov%20Decision%20Process%20%28Dec-POMDP%29.%20Within%20a%20QMIX%20framework%2C%20we%20include%20partial%20attention%20for%20each%20autonomous%20vehicle%2C%20thus%20allowing%20each%20ego%20vehicle%20to%20focus%20on%20the%20most%20relevant%20neighboring%20vehicles.%20Moreover%2C%20we%20propose%20a%20comprehensive%20reward%20signal%20that%20considers%20the%20global%20objectives%20of%20the%20environment%20%28e.g.%2C%20safety%20and%20vehicle%20flow%29%20and%20the%20individual%20interests%20of%20each%20agent.%20Simulations%20are%20conducted%20in%20the%20Simulation%20of%20Urban%20Mobility%20%28SUMO%29.%20The%20results%20show%20better%20performance%20compared%20to%20other%20driving%20algorithms%20in%20terms%20of%20safety%2C%20driving%20speed%2C%20and%20reward.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21810v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPartial%2520Attention%2520in%2520Deep%2520Reinforcement%2520Learning%2520for%2520Safe%2520Multi-Agent%2520Control%26entry.906535625%3DTurki%2520Bin%2520Mohaya%2520and%2520Peter%2520Seiler%26entry.1292438233%3DAttention%2520mechanisms%2520excel%2520at%2520learning%252 {"title": "DUO-VSR: Dual-Stream Distillation for One-Step Video Super-Resolution", "author": "Zhengyao Lv and Menghan Xia and Xintao Wang and Kwan-Yee K. Wong", "abstract": "Diffusion-based video super-resolution (VSR) has recently achieved remarkable fidelity but still suffers from prohibitive sampling costs. While distribution matching distillation (DMD) can accelerate diffusion models toward one-step generation, directly applying it to VSR often results in training instability alongside degraded and insufficient supervision. To address these issues, we propose DUO-VSR, a three-stage framework built upon a Dual-Stream Distillation strategy that unifies distribution matching and adversarial supervision for one-step VSR. Firstly, a Progressive Guided Distillation Initialization is employed to stabilize subsequent training through trajectory-preserving distillation. Next, the Dual-Stream Distillation jointly optimizes the DMD and Real-Fake Score Feature GAN (RFS-GAN) streams, with the latter providing complementary adversarial supervision leveraging discriminative features from both real and fake score models. Finally, a Preference-Guided Refinement stage further aligns the student with perceptual quality preferences. Extensive experiments demonstrate that DUO-VSR achieves superior visual quality and efficiency over previous one-step VSR approaches.", "link": "http://arxiv.org/abs/2603.22271v1", "date": "2026-03-23", "relevancy": 2.2032, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.597}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.542}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5412}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DUO-VSR%3A%20Dual-Stream%20Distillation%20for%20One-Step%20Video%20Super-Resolution&body=Title%3A%20DUO-VSR%3A%20Dual-Stream%20Distillation%20for%20One-Step%20Video%20Super-Resolution%0AAuthor%3A%20Zhengyao%20Lv%20and%20Menghan%20Xia%20and%20Xintao%20Wang%20and%20Kwan-Yee%20K.%20Wong%0AAbstract%3A%20Diffusion-based%20video%20super-resolution%20%28VSR%29%20has%20recently%20achieved%20remarkable%20fidelity%20but%20still%20suffers%20from%20prohibitive%20sampling%20costs.%20While%20distribution%20matching%20distillation%20%28DMD%29%20can%20accelerate%20diffusion%20models%20toward%20one-step%20generation%2C%20directly%20applying%20it%20to%20VSR%20often%20results%20in%20training%20instability%20alongside%20degraded%20and%20insufficient%20supervision.%20To%20address%20these%20issues%2C%20we%20propose%20DUO-VSR%2C%20a%20three-stage%20framework%20built%20upon%20a%20Dual-Stream%20Distillation%20strategy%20that%20unifies%20distribution%20matching%20and%20adversarial%20supervision%20for%20one-step%20VSR.%20Firstly%2C%20a%20Progressive%20Guided%20Distillation%20Initialization%20is%20employed%20to%20stabilize%20subsequent%20training%20through%20trajectory-preserving%20distillation.%20Next%2C%20the%20Dual-Stream%20Distillation%20jointly%20optimizes%20the%20DMD%20and%20Real-Fake%20Score%20Feature%20GAN%20%28RFS-GAN%29%20streams%2C%20with%20the%20latter%20providing%20complementary%20adversarial%20supervision%20leveraging%20discriminative%20features%20from%20both%20real%20and%20fake%20score%20models.%20Finally%2C%20a%20Preference-Guided%20Refinement%20stage%20further%20aligns%20the%20student%20with%20perceptual%20quality%20preferences.%20Extensive%20experiments%20demonstrate%20that%20DUO-VSR%20achieves%20superior%20visual%20quality%20and%20efficiency%20over%20previous%20one-step%20VSR%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22271v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.138092984 nd%2520efficiency%2520over%2520previous%2520one-step%2520VSR%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22271v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DUO-VSR%3A%20Dual-Stream%20Distillation%20for%20One-Step%20Video%20Super-Resolution&entry.906535625=Zhengyao%20Lv%20and%20Menghan%20Xia%20and%20Xintao%20Wang%20and%20Kwan-Yee%20K.%20Wong&entry.1292438233=Diffusion-based%20video%20super-resolution%20%28VSR%29%20has%20recently%20achieved%20remarkable%20fidelity%20but%20still%20suffers%20from%20prohibitive%20sampling%20costs.%20While%20distribution%20matching%20distillation%20%28DMD%29%20can%20accelerate%20diffusion%20models%20toward%20one-step%20generation%2C%20directly%20applying%20it%20to%20VSR%20often%20results%20in%20training%20instability%20alongside%20degraded%20and%20insufficient%20supervision.%20To%20address%20these%20issues%2C%20we%20propose%20DUO-VSR%2C%20a%20three-stage%20framework%20built%20upon%20a%20Dual-Stream%20Distillation%20strategy%20that%20unifies%20distribution%20matching%20and%20adversarial%20supervision%20for%20one-step%20VSR.%20Firstly%2C%20a%20Progressive%20Guided%20Distillation%20Initialization%20is%20employed%20to%20stabilize%20subsequent%20training%20through%20trajectory-preserving%20distillation.%20Next%2C%20the%20Dual-Stream%20Distillation%20jointly%20optimizes%20the%20DMD%20and%20Real-Fake%20Score%20Feature%20GAN%20%28RFS-GAN%29%20streams%2C%20with%20the%20latter%20providing%20complementary%20adversarial%20supervision%20leveraging%20discriminative%20features%20from%20both%20real%20and%20fake%20score%20models.%20Finally%2C%20a%20Preference-Guided%20Refinement%20stage%20further%20aligns%20the%20student%20with%20perceptual%20quality%20preferences.%20Extensive%20experiments%20demonstrate%20that%20DUO-VSR%20achieves%20superior%20visual%20quality%20and%20efficiency%20over%20previous%20one-step%20VSR%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2603.22271v1&entry.124074799=Read"},
{"title": "DTVI: Dual-Stage Textual and Visual Intervention for Safe Text-to-Image Generation", "author": "Binhong Tan and Zhaoxin Wang and Handing Wang", "abstract": "Text-to-Image (T2I) diffusion models have demonstrated strong generation ability, but their potential to generate unsafe content raises significant safety concerns. Existing inference-time defense methods typically perform category-agnostic token-level intervention in the text embedding space, which fails to capture malicious semantics distributed across the full token sequence and remains vulnerable to adversarial prompts. In this paper, we propose DTVI, a dual-stage inference-time defense framework for safe T2I generation. Unlike existing methods that intervene on specific token embeddings, our method introduces category-aware sequence-level intervention on the full prompt embedding to better capture distributed malicious semantics, and further attenuates the remaining unsafe influences during the visual generation stage. Experimental results on real-world unsafe prompts, adversarial prompts, and multiple harmful categories show that our method achieves effective and robust defense while preserving reasonable generation quality on benign prompts, obtaining an average Defense Success Rate (DSR) of 94.43% across sexual-category benchmarks and 88.56 across seven unsafe categories, while maintaining generation quality on benign prompts.", "link": "http://arxiv.org/abs/2603.22041v1", "date": "2026-03-23", "relevancy": 2.2022, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6009}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5284}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DTVI%3A%20Dual-Stage%20Textual%20and%20Visual%20Intervention%20for%20Safe%20Text-to-Image%20Generation&body=Title%3A%20DTVI%3A%20Dual-Stage%20Textual%20and%20Visual%20Intervention%20for%20Safe%20Text-to-Image%20Generation%0AAuthor%3A%20Binhong%20Tan%20and%20Zhaoxin%20Wang%20and%20Handing%20Wang%0AAbstract%3A%20Text-to-Image%20%28T2I%29%20diffusion%20models%20have%20demonstrated%20strong%20generation%20ability%2C%20but%20their%20potential%20to%20generate%20unsafe%20content%20raises%20significant%20safety%20concerns.%20Existing%20inference-time%20defense%20methods%20typically%20perform%20category-agnostic%20token-level%20intervention%20in%20the%20text%20embedding%20space%2C%20which%20fails%20to%20capture%20malicious%20semantics%20distributed%20across%20the%20full%20token%20sequence%20and%20remains%20vulnerable%20to%20adversarial%20prompts.%20In%20this%20paper%2C%20we%20propose%20DTVI%2C%20a%20dual-stage%20inference-time%20defense%20framework%20for%20safe%20T2I%20generation.%20Unlike%20existing%20methods%20that%20intervene%20on%20specific%20token%20embeddings%2C%20our%20method%20introduces%20category-aware%20sequence-level%20intervention%20on%20the%20full%20prompt%20embedding%20to%20better%20capture%20distributed%20malicious%20semantics%2C%20and%20further%20attenuates%20the%20remaining%20unsafe%20influences%20during%20the%20visual%20generation%20stage.%20Experimental%20results%20on%20real-world%20unsafe%20prompts%2C%20adversarial%20prompts%2C%20and%20multiple%20harmful%20categories%20show%20that%20our%20method%20achieves%20effective%20and%20robust%20defense%20while%20preserving%20reasonable%20generation%20quality%20on%20benign%20prompts%2C%20obtaining%20an%20average%20Defense%20Success%20Rate%20%28DSR%29%20of%2094.43%25%20across%20sexual-category%20benchmarks%20and%2088.56%20across%20seven%20unsafe%20categories%2C%20while%20maintaining%20generation%20quality%20on%20benign%20prompts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22041v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDTVI%253A%2520Dual-Stage%2520Textual%2520and%2520Visual%2520Intervention%2520for%2520Safe%2520Text-to-Image%2520Generation%26entry.906535625%3DBinhong%2520Tan%2520and%2520Zhaoxin%2520Wang%2520and%2520Handing%2520Wang%26entry.1292438233%3DText-to-Image%2520%2528T2I%2529%2520diffusion%2520models%2520have%2520demonstrated%2520strong%2520generation%2520ability%252C%2520but%2520their%2520potential%2520to%2520generate%2520unsafe%2520content%2520raises%2520significant%2520safety%2520concerns.%2520Existing%2520inference-time%2520defense%2520methods%2520typically%2520perform%2520category-agnostic%2520token-level%2520intervention%2520in%2520the%2520text%2520embedding%2520space%252C%2520which%2520fails%2520to%2520capture%2520malicious%2520semantics%2520distributed%2520across%2520the%2520full%2520token%2520sequence%2520and%2520remains%2520vulnerable%2520to%2520adversarial%2520prompts.%2520In%2520this%2520paper%252C%2520we%2520propose%2520DTVI%252C%2520a%2520dual-stage%2520inference-time%2520defense%2520framework%2520for%2520safe%2520T2I%2520generation.%2520Unlike%2520existing%2520methods%2520that%2520intervene%2520on%2520specific%2520token%2520embeddings%252C%2520our%2520method%2520introduces%2520category-aware%2520sequence-level%2520intervention%2520on%2520the%2520full%2520prompt%2520embedding%2520to%2520better%2520capture%2520distributed%2520malicious%2520semantics%252C%2520and%2520further%2520attenuates%2520the%2520remaining%2520unsafe%2520influences%2520during%2520the%2520visual%2520generation%2520stage.%2520Experimental%2520results%2520on%2520real-world%2520unsafe%2520prompts%252C%2520adversarial%2520prompts%252C%2520and%2520multiple%2520harmful%2520categories%2520show%2520that%2520our%2520method%2520achieves%2520effective%2520and%2520robust%2520defense%2520while%2520preserving%2520reasonable%2520generation%2520quality%2520on%2520benign%2520prompts%252C%2520obtaining%2520an%2520average%2520Defense%2520Success%2520Rate%2520%2528DSR%2529%2520of%252094.43%2525%2520across%2520sexual-category%2520benchmarks%2520and%252088.56%2520across%2520seven%2520unsafe%2520categories%252C%2520while%2520maintaining%2520generation%2520quality%2520on%2520benign%2520prompts.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22041v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DTVI%3A%20Dual-Stage%20Textual%20and%20Visual%20Intervention%20for%20Safe%20Text-to-Image%20Generation&entry.906535625=Binhong%20Tan%20and%20Zhaoxin%20Wang%20and%20Handing%20Wang&entry.1292438233=Text-to-Image%20%28T2I%29%20diffusion%20models%20have%20demonstrated%20strong%20generation%20ability%2C%20but%20their%20potential%20to%20generate%20unsafe%20content%20raises%20significant%20safety%20concerns.%20Existing%20inference-time%20defense%20methods%20typically%20perform%20category-agnostic%20token-level%20intervention%20in%20the%20text%20embedding%20space%2C%20which%20fails%20to%20capture%20malicious%20semantics%20distributed%20across%20the%20full%20token%20sequence%20and%20remains%20vulnerable%20to%20adversarial%20prompts.%20In%20this%20paper%2C%20we%20propose%20DTVI%2C%20a%20dual-stage%20inference-time%20defense%20framework%20for%20safe%20T2I%20generation.%20Unlike%20existing%20methods%20that%20intervene%20on%20specific%20token%20embeddings%2C%20our%20method%20introduces%20category-aware%20sequence-level%20intervention%20on%20the%20full%20prompt%20embedding%20to%20better%20capture%20distributed%20malicious%20semantics%2C%20and%20further%20attenuates%20the%20remaining%20unsafe%20influences%20during%20the%20visual%20generation%20stage.%20Experimental%20results%20on%20real-world%20unsafe%20prompts%2C%20adversarial%20prompts%2C%20and%20multiple%20harmful%20categories%20show%20that%20our%20method%20achieves%20effective%20and%20robust%20defense%20while%20preserving%20reasonable%20generation%20quality%20on%20benign%20prompts%2C%20obtaining%20an%20average%20Defense%20Success%20Rate%20%28DSR%29%20of%2094.43%25%20across%20sexual-category%20benchmarks%20and%2088.56%20across%20seven%20unsafe%20categories%2C%20while%20maintaining%20generation%20quality%20on%20benign%20prompts.&entry.1838667208=http%3A//arxiv.org/abs/2603.22041v1&entry.124074799=Read"},
{"title": "A plug-and-play approach with fast uncertainty quantification for weak lensing mass mapping", "author": "Hubert Leterme and Andreas Tersenov and Jalal Fadili and Jean-Luc Starck", "abstract": "Upcoming stage-IV surveys such as Euclid and Rubin will deliver vast amounts of high-precision data, opening new opportunities to constrain cosmological models with unprecedented accuracy. A key step in this process is the reconstruction of the dark matter distribution from noisy weak lensing shear measurements.\n  Current deep learning-based mass mapping methods achieve high reconstruction accuracy, but either require retraining a model for each new observed sky region (limiting practicality) or rely on slow MCMC sampling. Efficient exploitation of future survey data therefore calls for a new method that is accurate, flexible, and fast at inference. In addition, uncertainty quantification with coverage guarantees is essential for reliable cosmological parameter estimation.\n  We introduce PnPMass, a plug-and-play approach for weak lensing mass mapping. The algorithm produces point estimates by alternating between a gradient descent step with a carefully chosen data fidelity term, and a denoising step implemented with a single deep learning model trained on simulated data corrupted by Gaussian white noise. We also propose a fast, sampling-free uncertainty quantification scheme based on moment networks, with calibrated error bars obtained through conformal prediction to ensure coverage guarantees. Finally, we benchmark PnPMass against both model-driven and data-driven mass mapping techniques.\n  PnPMass achieves performance close to that of state-of-the-art deep-learning methods while offering fast inference (converging in just a few iterations) and requiring only a single training phase, independently of the noise covariance of the observations. It therefore combines flexibility, efficiency, and reconstruction accuracy, while delivering tighter error bars than existing approaches, making it well suited for upcoming weak lensing surveys.", "link": "http://arxiv.org/abs/2603.22006v1", "date": "2026-03-23", "relevancy": 2.2006, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5894}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5437}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5135}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20plug-and-play%20approach%20with%20fast%20uncertainty%20quantification%20for%20weak%20lensing%20mass%20mapping&body=Title%3A%20A%20plug-and-play%20approach%20with%20fast%20uncertainty%20quantification%20for%20weak%20lensing%20mass%20mapping%0AAuthor%3A%20Hubert%20Leterme%20and%20Andreas%20Tersenov%20and%20Jalal%20Fadili%20and%20Jean-Luc%20Starck%0AAbstract%3A%20Upcoming%20stage-IV%20surveys%20such%20as%20Euclid%20and%20Rubin%20will%20deliver%20vast%20amounts%20of%20high-precision%20data%2C%20opening%20new%20opportunities%20to%20constrain%20cosmological%20models%20with%20unprecedented%20accuracy.%20A%20key%20step%20in%20this%20process%20is%20the%20reconstruction%20of%20the%20dark%20matter%20distribution%20from%20noisy%20weak%20lensing%20shear%20measurements.%0A%20%20Current%20deep%20learning-based%20mass%20mapping%20methods%20achieve%20high%20reconstruction%20accuracy%2C%20but%20either%20require%20retraining%20a%20model%20for%20each%20new%20observed%20sky%20region%20%28limiting%20practicality%29%20or%20rely%20on%20slow%20MCMC%20sampling.%20Efficient%20exploitation%20of%20future%20survey%20data%20therefore%20calls%20for%20a%20new%20method%20that%20is%20accurate%2C%20flexible%2C%20and%20fast%20at%20inference.%20In%20addition%2C%20uncertainty%20quantification%20with%20coverage%20guarantees%20is%20essential%20for%20reliable%20cosmological%20parameter%20estimation.%0A%20%20We%20introduce%20PnPMass%2C%20a%20plug-and-play%20approach%20for%20weak%20lensing%20mass%20mapping.%20The%20algorithm%20produces%20point%20estimates%20by%20alternating%20between%20a%20gradient%20descent%20step%20with%20a%20carefully%20chosen%20data%20fidelity%20term%2C%20and%20a%20denoising%20step%20implemented%20with%20a%20single%20deep%20learning%20model%20trained%20on%20simulated%20data%20corrupted%20by%20Gaussian%20white%20noise.%20We%20also%20propose%20a%20fast%2C%20sampling-free%20uncertainty%20quantification%20scheme%20based%20on%20moment%20networks%2C%20with%20calibrated%20error%20bars%20obtained%20through%20conformal%20prediction%20to%20ensure%20coverage%20guarantees.%20Finally%2C%20we%20benchmark%20PnPMass%20against%20both%20model-driven%20and%20data-driven%20mass%20mapping%20techniques.%0A%20%20PnPMass%20achieves%20performance%20close%20to%20that%20of%20state-of-the-art%20deep-learning%20methods%20while%20offering%20fast%20inference%20%28converging%20in%20just%20a%20few%20iterations%29%20and%20requiring%20only%20a%20single%20training%20phase%2C%20independently%20of%20the%20noise%20covariance%20of%20the%20observations.%20It%20therefore%20combines%20flexibility%2C%20efficiency%2C%20and%20reconstruction%20accuracy%2C%20while%20delivering%20tighter%20error%20bars%20than%20existing%20approaches%2C%20making%20it%20well%20suited%20for%20upcoming%20weak%20lensing%20surveys.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22006v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520plug-and-play%2520approach%2520with%2520fast%2520uncertainty%2520quantification%2520for%2520weak%2520lensing%2520mass%2520mapping%26entry.906535625%3DHubert%2520Leterme%2520and%2520Andreas%2520Tersenov%2520and%2520Jalal%2520Fadili%2520and%2520Jean-Luc%2520Starck%26entry.129243823 {"title": "MAGPI: Multifidelity-Augmented Gaussian Process Inputs for Surrogate Modeling from Scarce Data", "author": "Atticus Rex and Elizabeth Qian and David Peterson", "abstract": "Supervised machine learning describes the practice of fitting a parameterized model to labeled input-output data. Supervised machine learning methods have demonstrated promise in learning efficient surrogate models that can (partially) replace expensive high-fidelity models, making many-query analyses, such as optimization, uncertainty quantification, and inference, tractable. However, when training data must be obtained through the evaluation of an expensive model or experiment, the amount of training data that can be obtained is often limited, which can make learned surrogate models unreliable. However, in many engineering and scientific settings, cheaper \\emph{low-fidelity} models may be available, for example arising from simplified physics modeling or coarse grids. These models may be used to generate additional low-fidelity training data. The goal of \\emph{multifidelity} machine learning is to use both high- and low-fidelity training data to learn a surrogate model which is cheaper to evaluate than the high-fidelity model, but more accurate than any available low-fidelity model. This work proposes a new multifidelity training approach for Gaussian process regression which uses low-fidelity data to define additional features that augment the input space of the learned model. The approach unites desirable properties from two separate classes of existing multifidelity GPR approaches, cokriging and autoregressive estimators. Numerical experiments on several test problems demonstrate both increased predictive accuracy and reduced computational cost relative to the state of the art.", "link": "http://arxiv.org/abs/2603.22050v1", "date": "2026-03-23", "relevancy": 2.1952, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5589}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5429}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAGPI%3A%20Multifidelity-Augmented%20Gaussian%20Process%20Inputs%20for%20Surrogate%20Modeling%20from%20Scarce%20Data&body=Title%3A%20MAGPI%3A%20Multifidelity-Augmented%20Gaussian%20Process%20Inputs%20for%20Surrogate%20Modeling%20from%20Scarce%20Data%0AAuthor%3A%20Atticus%20Rex%20and%20Elizabeth%20Qian%20and%20David%20Peterson%0AAbstract%3A%20Supervised%20machine%20learning%20describes%20the%20practice%20of%20fitting%20a%20parameterized%20model%20to%20labeled%20input-output%20data.%20Supervised%20machine%20learning%20methods%20have%20demonstrated%20promise%20in%20learning%20efficient%20surrogate%20models%20that%20can%20%28partially%29%20replace%20expensive%20high-fidelity%20models%2C%20making%20many-query%20analyses%2C%20such%20as%20optimization%2C%20uncertainty%20quantification%2C%20and%20inference%2C%20tractable.%20However%2C%20when%20training%20data%20must%20be%20obtained%20through%20the%20evaluation%20of%20an%20expensive%20model%20or%20experiment%2C%20the%20amount%20of%20training%20data%20that%20can%20be%20obtained%20is%20often%20limited%2C%20which%20can%20make%20learned%20surrogate%20models%20unreliable.%20However%2C%20in%20many%20engineering%20and%20scientific%20settings%2C%20cheaper%20%5Cemph%7Blow-fidelity%7D%20models%20may%20be%20available%2C%20for%20example%20arising%20from%20simplified%20physics%20modeling%20or%20coarse%20grids.%20These%20models%20may%20be%20used%20to%20generate%20additional%20low-fidelity%20training%20data.%20The%20goal%20of%20%5Cemph%7Bmultifidelity%7D%20machine%20learning%20is%20to%20use%20both%20high-%20and%20low-fidelity%20training%20data%20to%20learn%20a%20surrogate%20model%20which%20is%20cheaper%20to%20evaluate%20than%20the%20high-fidelity%20model%2C%20but%20more%20accurate%20than%20any%20available%20low-fidelity%20model.%20This%20work%20proposes%20a%20new%20multifidelity%20training%20approach%20for%20Gaussian%20process%20regression%20which%20uses%20low-fidelity%20data%20to%20define%20additional%20features%20that%20augment%20the%20input%20space%20of%20the%20learned%20model.%20The%20approach%20unites%20desirable%20properties%20from%20two%20separate%20classes%20of%20existing%20multifidelity%20GPR%20approaches%2C%20cokriging%20and%20autoregressive%20estimators.%20Numerical%20experiments%20on%20several%20test%20problems%20demonstrate%20both%20increased%20predictive%20accuracy%20and%20reduced%20computational%20cost%20relative%20to%20the%20state%20of%20the%20art.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22050v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAGPI%253A%2520Multifidelity-Augmented%2520Gaussian%2520Process%2520Inputs%2520for%2520Surrogate%2520Modeling%2520from%2520Scarce%2520Data%26entry.906535625%3DAtticus%2520Rex%2520and%2520Elizabeth%2520Qian%2520and%2520David%2520Peterson%26entry.1292438233%3DSupervised%2520machine%2520learning%2520describes%2520the%2520practice%2520of%2520fitting%2520a%2520parameterized%2520model%2520to%2520labeled%2520input-output%2520data.%2520Supervised%2520machine%2520learning%2520methods%2520have%2520demonstrated%2520promise%2520in%2520learning%2520efficient%2520surrogate%2520models%2520that%2520can%2520%2528partially%2529%2520replace%2520expensive%2520high-fidelity%2520models%252C%2520making%2520many-query%2520analyses%252C%2520such%2520as%2520optimization%252C%2520uncertainty%2520quantification%252C%2520and%2520inference%252C%2520tractable.%2520However%252C%2520when%2520training%2520data%2520must%25 {"title": "VP-VLA: Visual Prompting as an Interface for Vision-Language-Action Models", "author": "Zixuan Wang and Yuxin Chen and Yuqi Liu and Jinhui Ye and Pengguang Chen and Changsheng Lu and Shu Liu and Jiaya Jia", "abstract": "Vision-Language-Action (VLA) models typically map visual observations and linguistic instructions directly to robotic control signals. This \"black-box\" mapping forces a single forward pass to simultaneously handle instruction interpretation, spatial grounding, and low-level control, often leading to poor spatial precision and limited robustness in out-of-distribution scenarios. To address these limitations, we propose VP-VLA, a dual-system framework that decouples high-level reasoning and low-level execution via a structured visual prompting interface. Specifically, a \"System 2 Planner\" decomposes complex instructions into sub-tasks and identifies relevant target objects and goal locations. These spatial anchors are then overlaid directly onto visual observations as structured visual prompts, such as crosshairs and bounding boxes. Guided by these prompts and enhanced by a novel auxiliary visual grounding objective during training, a \"System 1 Controller\" reliably generates precise low-level execution motions. Experiments on the Robocasa-GR1-Tabletop benchmark and SimplerEnv simulation demonstrate that VP-VLA improves success rates by 5% and 8.3%, surpassing competitive baselines including QwenOFT and GR00T-N1.6.", "link": "http://arxiv.org/abs/2603.22003v1", "date": "2026-03-23", "relevancy": 2.1831, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5671}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5415}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding s%20by%205%25%20and%208.3%25%2C%20surpassing%20competitive%20baselines%20including%20QwenOFT%20and%20GR00T-N1.6.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22003v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVP-VLA%253A%2520Visual%2520Prompting%2520as%2520an%2520Interface%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DZixuan%2520Wang%2520and%2520Yuxin%2520Chen%2520and%2520Yuqi%2520Liu%2520and%2520Jinhui%2520Ye%2520and%2520Pengguang%2520Chen%2520and%2520Changsheng%2520Lu%2520and%2520Shu%2520Liu%2520and%2520Jiaya%2520Jia%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520typically%2520map%2520visual%2520observations%2520and%2520linguistic%2520instructions%2520directly%2520to%2520robotic%2520control%2520signals.%2520This%2520%2522black-box%2522%2520mapping%2520forces%2520a%2520single%2520forward%2520pass%2520to%2520simultaneously%2520handle%2520instruction%2520interpretation%252C%2520spatial%2520grounding%252C%2520and%2520low-level%2520control%252C%2520often%2520leading%2520to%2520poor%2520spatial%2520precision%2520and%2520limited%2520robustness%2520in%2520out-of-distribution%2520scenarios.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520VP-VLA%252C%2520a%2520dual-system%2520framework%2520that%2520decouples%2520high-level%2520reasoning%2520and%2520low-level%2520execution%2520via%2520a%2520structured%2520visual%2520prompting%2520interface.%2520Specifically%252C%2520a%2520%2522System%25202%2520Planner%2522%2520decomposes%2520complex%2520instructions%2520into%2520sub-tasks%2520and%2520identifies%2520relevant%2520target%2520objects%2520and%2520goal%2520locations.%2520These%2520spatial%2520anchors%2520are%2520then%2520overlaid%2520directly%2520onto%2520visual%2520observations%2520as%2520structured%2520visual%2520prompts%252C%2520such%2520as%2520crosshairs%2520and%2520bounding%2520boxes.%2520Guided%2520by%2520these%2520 {"title": "FeatDistill: A Feature Distillation Enhanced Multi-Expert Ensemble Framework for Robust AI-generated Image Detection", "author": "Zhilin Tu and Kemou Li and Fengpeng Li and Jianwei Fei and Jiamin Zhang and Haiwei Wu", "abstract": "The rapid iteration and widespread dissemination of deepfake technology have posed severe challenges to information security, making robust and generalizable detection of AI-generated forged images increasingly important. In this paper, we propose FeatDistill, an AI-generated image detection framework that integrates feature distillation with a multi-expert ensemble, developed for the NTIRE Challenge on Robust AI-Generated Image Detection in the Wild. The framework explicitly targets three practical bottlenecks in real-world forensics: degradation interference, insufficient feature representation, and limited generalization.\n  Concretely, we build a four-backbone Vision Transformer (ViT) ensemble composed of CLIP and SigLIP variants to capture complementary forensic cues. To improve data coverage, we expand the training set and introduce comprehensive degradation modeling, which exposes the detector to diverse quality variations and synthesis artifacts commonly encountered in unconstrained scenarios. We further adopt a two-stage training paradigm: the model is first optimized with a standard binary classification objective, then refined by dense feature-level self-distillation for representation alignment. This design effectively mitigates overfitting and enhances semantic consistency of learned features.\n  At inference time, the final prediction is obtained by averaging the probabilities from four independently trained experts, yielding stable and reliable decisions across unseen generators and complex degradations. Despite the ensemble design, the framework remains efficient, requiring only about 10 GB peak GPU memory. Extensive evaluations in the NTIRE challenge setting demonstrate that FeatDistill achieves strong robustness and generalization under diverse ``in-the-wild'' conditions, offering an effective and practical solution for real-world deepfake image detection.", "link": "http://arxiv.org/abs/2603.21939v1", "date": "2026-03-23", "relevancy": 2.147, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.551}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5402}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FeatDistill%3A%20A%20Feature%20Distillation%20Enhanced%20Multi-Expert%20Ensemble%20Framework%20for%20Robust%20AI-generated%20Image%20Detection&body=Title%3A%20FeatDistill%3A%20A%20Feature%20Distillation%20Enhanced%20Multi-Expert%20Ensemble%20Framework%20for%20Robust%20AI-generated%20Image%20Detection%0AAuthor%3A%20Zhilin%20Tu%20and%20Kemou%20Li%20and%20Fengpeng%20Li%20and%20Jianwei%20Fei%20and%20Jiamin%20Zhang%20and%20Haiwei%20Wu%0AAbstract%3A%20The%20rapid%20iteration%20and%20widespread%20dissemination%20of%20deepfake%20technology%20have%20posed%20severe%20challenges%20to%20information%20security%2C%20making%20robust%20and%20generalizable%20detection%20of%20AI-generated%20forged%20images%20increasingly%20important.%20In%20this%20paper%2C%20we%20propose%20FeatDistill%2C%20an%20AI-generated%20image%20detection%20framework%20that%20integrates%20feature%20distillation%20with%20a%20multi-expert%20ensemble%2C%20developed%20for%20the%20NTIRE%20Challenge%20on%20Robust%20AI-Generated%20Image%20Detection%20in%20the%20Wild.%20The%20framework%20explicitly%20targets%20three%20practical%20bottlenecks%20in%20real-world%20forensics%3A%20degradation%20interference%2C%20insufficient%20feature%20representation%2C%20and%20limited%20generalization.%0A%20%20Concretely%2C%20we%20build%20a%20four-backbone%20Vision%20Transformer%20%28ViT%29%20ensemble%20composed%20of%20CLIP%20and%20SigLIP%20variants%20to%20capture%20complementary%20forensic%20cues.%20To%20improve%20data%20coverage%2C%20we%20expand%20the%20training%20set%20and%20introduce%20comprehensive%20degradation%20modeling%2C%20which%20exposes%20the%20detector%20to%20diverse%20quality%20variations%20and%20synthesis%20artifacts%20commonly%20encountered%20in%20unconstrained%20scenarios.%20We%20further%20adopt%20a%20two-stage%20training%20paradigm%3A%20the%20model%20is%20first%20optimized%20with%20a%20standard%20binary%20classification%20objective%2C%20then%20refined%20by%20dense%20feature-level%20self-distillation%20for%20representation%20alignment.%20This%20design%20effectively%20mitigates%20overfitting%20and%20enhances%20semantic%20consistency%20of%20learned%20features.%0A%20%20At%20inference%20time%2C%20the%20final%20prediction%20is%20obtained%20by%20averaging%20the%20probabilities%20from%20four%20independently%20trained%20experts%2C%20yielding%20stable%20and%20reliable%20decisions%20across%20unseen%20generators%20and%20complex%20degradations.%20Despite%20the%20ensemble%20design%2C%20the%20framework%20remains%20efficient%2C%20requiring%20only%20about%2010%20GB%20peak%20GPU%20memory.%20Extensive%20evaluations%20in%20the%20NTIRE%20challenge%20setting%20demonstrate%20that%20FeatDistill%20achieves%20strong%20robustness%20and%20generalization%20under%20diverse%20%60%60in-the-wild%27%27%20conditions%2C%20offering%20an%20effective%20and%20practical%20solution%20for%20real-world%20deepfake%20image%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21939v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFeatDistill%253A%2520A%2520Feature%2520Distillation%2520Enhanced%2520Multi-Expert%2520Ensemble%2520Framework%2520for%2520Robust%2520AI-generated%2520Im {"title": "On the Failure of Topic-Matched Contrast Baselines in Multi-Directional Refusal Abliteration", "author": "Valentin Petrov", "abstract": "Inasmuch as the removal of refusal behavior from instruction-tuned language models by directional abliteration requires the extraction of refusal-mediating directions from the residual stream activation space, and inasmuch as the construction of the contrast baseline against which harmful prompt activations are compared has been treated in the existing literature as an implementation detail rather than a methodological concern, the present work investigates whether a topically matched contrast baseline yields superior refusal directions. The investigation is carried out on the Qwen~3.5 2B model using per-category matched prompt pairs, per-class Self-Organizing Map extraction, and Singular Value Decomposition orthogonalization. It was found that topic-matched contrast produces no functional refusal directions at any tested weight level on any tested layer, while unmatched contrast on the same model, same extraction code, and same evaluation protocol achieves complete refusal elimination on six layers. The geometric analysis of the failure establishes that topic-matched subtraction cancels the dominant activation component shared between harmful and harmless prompts of the same subject, reducing the extracted direction magnitude below the threshold at which weight-matrix projection perturbs the residual stream. The implications for the design of contrast baselines in abliteration research are discussed.", "link": "http://arxiv.org/abs/2603.22061v1", "date": "2026-03-23", "relevancy": 2.1296, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4314}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4314}, {" {"title": "C$^2$-Cite: Contextual-Aware Citation Generation for Attributed Large Language Models", "author": "Yue Yu and Ting Bai and HengZhi Lan and Li Qian and Li Peng and Jie Wu and Wei Liu and Jian Luan and Chuan Shi", "abstract": "The attribution technique enhances the credibility of LLMs by adding citations to the generated sentences, enabling users to trace back to the original sources and verify the reliability of the output. However, existing instruction-tuned attributed LLMs often fail to properly interpret the contextual semantics of citation symbols (e.g., [i]) during text generation. This shortcoming arises from their insufficient awareness of the context information surrounding citation markers, which in turn leads to disjointed references and poor integration of retrieved knowledge into the generated content. To address this issue, we propose a novel \\textbf{C}ontextual-aware \\textbf{C}itation generation framework (\\textbf{C$^2$}-\\textbf{Cite}) that explicitly integrates the semantic relationships between citation markers and their referenced content. Specifically, a contextual citation alignment mechanism is adopted: it first encodes the retrieved document contexts into the symbol representation of citations, then aligns the marker numbers by decoding information from a citation router function. This mechanism enables the transformation of citation markers from generic placeholders into active knowledge pointers that link to the referenced source information. Experimental results on the ALCE benchmark across three datasets validate our framework C$^2$-Cite++: it outperforms the SOTA baseline by an average of 5.8\\% in citation quality and 17.4\\% in response correctness. The implementation is publicly available at https://github.com/BAI-LAB/c2cite", "link": "http://arxiv.org/abs/2602.00004v2", "date": "2026-03-23", "relevancy": 1.3089, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4393}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4381}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4344}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20C%24%5E2%24-Cite%3A%20Contextual-Aware%20Citation%20Generation%20for%20Attributed%20Large%20Language%20Models&body=Title%3A%20C%24%5E2%24-Cite%3A%20Contextual-Aware%20Citation%20Generation%20for%20Attributed%20Large%20Language%20Models%0AAuthor%3A%20Yue%20Yu%20and%20Ting%20Bai%20and%20HengZhi%20Lan%20and%20Li%20Qian%20and%20Li%20Peng%20and%20Jie%20Wu%20and%20Wei%20Liu%20and%20Jian%20Luan%20and%20Chuan%20Shi%0AAbstract%3A%20The%20attribution%20technique%20enhances%20the%20credibility%20of%20LLMs%20by%20adding%20citations%20to%20the%20generated%20sentences%2C%20enabling%20users%20to%20trace%20back%20to%20the%20original%20sources%20and%20verify%20the%20reliability%20of%20the%20output.%20However%2C%20existing%20instruction-tuned%20attributed%20LLMs%20often%20fail%20to%20properly%20interpret%20the%20contextual%20semantics%20of%20citation%20symbols%20%28e.g.%2C%20%5Bi%5D%29%20during%20text%20generation.%20This%20shortcoming%20arises%20from%20their%20insufficient%20awareness%20of%20the%20context%20information%20surrounding%20citation%20markers%2C%20which%20in%20turn%20leads%20to%20disjointed%20references%20and%20poor%20integration%20of%20retrieved%20knowledge%20into%20the%20generated%20content.%20To%20address%20this%20issue%2C%20we%20propose%20a%20novel%20%5Ctextbf%7BC%7Dontextual-aware%20%5Ctextbf%7BC%7Ditation%20generation%20framework%20%28%5Ctextbf%7BC%24%5E2%24%7D-%5Ctextbf%7BCite%7D%29%20that%20explicitly%20integrates%20the%20semantic%20relationships%20between%20citation%20markers%20and%20their%20referenced%20content.%20Specifically%2C%20a%20contextual%20citation%20alignment%20mechanism%20is%20adopted%3A%20it%20first%20encodes%20the%20retrieved%20document%20contexts%20into%20the%20symbol%20representation%20of%20citations%2C%20then%20aligns%20the%20marker%20numbers%20by%20decoding%20information%20from%20a%20citation%20router%20function.%20This%20mechanism%20enables%20the%20transformation%20of%20citation%20markers%20from%20generic%20placeholders%20into%20active%20knowledge%20pointers%20that%20link%20to%20the%20referenced%20source%20information.%20Experimental%20results%20on%20the%20ALCE%20benchmark%20across%20three%20datasets%20validate%20our%20framework%20C%24%5E2%24-Cite%2B%2B%3A%20it%20outperforms%20the%20SOTA%20baseline%20by%20an%20average%20of%205.8%5C%25%20in%20citation%20quality%20and%2017.4%5C%25%20in%20response%20correctness.%20The%20implementation%20is%20publicly%20available%20at%20https%3A//github.com/BAI-LAB/c2cite%0ALink%3A%20http%3A//arxiv.org/abs/2602.00004v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DC%2524%255E2%2524-Cite%253A%2520Contextual-Aware%2520Citation%2520Generation%2520for%2520Attributed%2520Large%2520Language%2520Models%26entry.906535625%3DYue%2520Yu%2520and%2520Ting%2520Bai%2520and%2520HengZhi%2520Lan%2520and%2520Li%2520Qian%2520and%2520Li%2520Peng%2520and%2520Jie%2520Wu%2520and%2520Wei%2520Liu%2520and%2520Jian%2520Luan%2520and%2520Chuan%2520Shi%26entry.1292438233%3DThe%2520attribution%2520technique%2520enhances%2520the%2520credibility%2520of%2520LLMs%2520by%2520adding%2520citations%2520to%2520the%2520generated%2520sentences%252C%2520enabling%2520users%2520to%2520trace%2520back%2520to%2520the%2520original%2520sources%2520and%2520verify%2520the%2520reliability%2520of%2520the%2520output.%2520However%252C%2520existing%2520instruction-tuned%2520attributed%2520LLMs%2520often%2520fail%2520to%2520properly%2520interpret%2520the%2520contextual% {"title": "Spectral Alignment in Forward-Backward Representations via Temporal Abstraction", "author": "Seyed Mahdi B. Azad and Jasper Hoffmann and Iman Nematollahi and Hao Zhu and Abhinav Valada and Joschka Boedecker", "abstract": "Forward-backward (FB) representations provide a powerful framework for learning the successor representation (SR) in continuous spaces by enforcing a low-rank factorization. However, a fundamental spectral mismatch often exists between the high-rank transition dynamics of continuous environments and the low-rank bottleneck of the FB architecture, making accurate low-rank representation learning difficult. In this work, we analyze temporal abstraction as a mechanism to mitigate this mismatch. By characterizing the spectral properties of the transition operator, we show that temporal abstraction acts as a low-pass filter that suppresses high-frequency spectral components. This suppression reduces the effective rank of the induced SR while preserving a formal bound on the resulting value function error. Empirically, we show that this alignment is a key factor for stable FB learning, particularly at high discount factors where bootstrapping becomes error-prone. Our results identify temporal abstraction as a principled mechanism for shaping the spectral structure of the underlying MDP and enabling effective long-horizon representations in continuous control.", "link": "http://arxiv.org/abs/2603.20103v2", "date": "2026-03-23", "relevancy": 2.0128, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.517}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4946}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4903}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Alignment%20in%20Forward-Backward%20Representations%20via%20Temporal%20Abstraction&body=Title%3A%20Spectral%20Alignment%20in%20Forward-Backward%20Representations%20via%20Temporal%20Abstraction%0AAuthor%3A%20Seyed%20Mahdi%20B.%20Azad%20and%20Jasper%20Hoffmann%20and%20Iman%20Nematollahi%20and%20Hao%20Zhu%20and%20Abhinav%20Valada%20and%20Joschka%20Boedecker%0AAbstract%3A%20Forward-backward%20%28FB%29%20representations%20provide%20a%20powerful%20framework%20for%20learning%20the%20successor%20representation%20%28SR%29%20in%20continuous%20spaces%20by%20enforcing%20a%20low-rank%20factorization.%20However%2C%20a%20fundamental%20spectral%20mismatch%20often%20exists%20between%20the%20high-rank%20transition%20dynamics%20of%20continuous%20environments%20and%20the%20low-rank%20bottleneck%20of%20the%20FB%20architecture%2C%20making%20accurate%20low-rank%20representation%20learning%20difficult.%20In%20this%20work%2C%20we%20analyze%20temporal%20abstraction%20as%20a%20mechanism%20to%20mitigate%20this%20mismatch.%20By%20characterizing%20the%20spectral%20properties%20of%20the%20transition%20operator%2C%20we%20show%20that%20temporal%20abstraction%20acts%20as%20a%20low-pass%20filter%20that%20suppresses%20high-frequency%20spectral%20components.%20This%20suppression%20reduces%20the%20effective%20rank%20of%20the%20induced%20SR%20while%20preserving%20a%20formal%20bound%20on%20the%20resulting%20value%20function%20error.%20Empirically%2C%20we%20show%20that%20this%20alignment%20is%20a%20key%20factor%20for%20stable%20FB%20learning%2C%20particularly%20at%20high%20discount%20factors%20where%20bootstrapping%20becomes%20error-prone.%20Our%20results%20identify%20temporal%20abstraction%20as%20a%20principled%20mechanism%20for%20shaping%20the%20spectral%20structure%20of%20the%20underlying%20MDP%20and%20enabling%20effective%20long-horizon%20representations%20in%20continuous%20control.%0A here%2520bootstrapping%2520becomes%2520error-prone.%2520Our%2520results%2520identify%2520temporal%2520abstraction%2520as%2520a%2520principled%2520mechanism%2520for%2520shaping%2520the%2520spectral%2520structure%2520of%2520the%2520underlying%2520MDP%2520and%2520enabling%2520effective%2520long-horizon%2520representations%2520in%2520continuous%2520control.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20103v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spectral%20Alignment%20in%20Forward-Backward%20Representations%20via%20Temporal%20Abstraction&entry.906535625=Seyed%20Mahdi%20B.%20Azad%20and%20Jasper%20Hoffmann%20and%20Iman%20Nematollahi%20and%20Hao%20Zhu%20and%20Abhinav%20Valada%20and%20Joschka%20Boedecker&entry.1292438233=Forward-backward%20%28FB%29%20representations%20provide%20a%20powerful%20framework%20for%20learning%20the%20successor%20representation%20%28SR%29%20in%20continuous%20spaces%20by%20enforcing%20a%20low-rank%20factorization.%20However%2C%20a%20fundamental%20spectral%20mismatch%20often%20exists%20between%20the%20high-rank%20transition%20dynamics%20of%20continuous%20environments%20and%20the%20low-rank%20bottleneck%20of%20the%20FB%20architecture%2C%20making%20accurate%20low-rank%20representation%20learning%20difficult.%20In%20this%20work%2C%20we%20analyze%20temporal%20abstraction%20as%20a%20mechanism%20to%20mitigate%20this%20mismatch.%20By%20characterizing%20the%20spectral%20properties%20of%20the%20transition%20operator%2C%20we%20show%20that%20temporal%20abstraction%20acts%20as%20a%20low-pass%20filter%20that%20suppresses%20high-frequency%20spectral%20components.%20This%20suppression%20reduces%20the%20effective%20rank%20of%20the%20induced%20SR%20while%20preserving%20a%20formal%20bound%20on%20the%20resulting%20value%20function%20error.%20Empirically%2C%20we%20show%20that%20this%20alignment%20is%20a%20key%20factor%20for%20stable%20FB%20learning%2 {"title": "Gradient Structure Estimation under Label-Only Oracles via Spectral Sensitivity", "author": "Jun Liu and Leo Yu Zhang and Fengpeng Li and Isao Echizen and Jiantao Zhou", "abstract": "Hard-label black-box settings, where only top-1 predicted labels are observable, pose a fundamentally constrained yet practically important feedback model for understanding model behavior. A central challenge in this regime is whether meaningful gradient information can be recovered from such discrete responses. In this work, we develop a unified theoretical perspective showing that a wide range of existing sign-flipping hard-label attacks can be interpreted as implicitly approximating the sign of the true loss gradient. This observation reframes hard-label attacks from heuristic search procedures into instances of gradient sign recovery under extremely limited feedback. Motivated by this first-principles understanding, we propose a new attack framework that combines a zero-query frequency-domain initialization with a Pattern-Driven Optimization (PDO) strategy. We establish theoretical guarantees demonstrating that, under mild assumptions, our initialization achieves higher expected cosine similarity to the true gradient sign compared to random baselines, while the proposed PDO procedure attains substantially lower query complexity than existing structured search approaches. We empirically validate our framework through extensive experiments on CIFAR-10, ImageNet, and ObjectNet, covering standard and adversarially trained models, commercial APIs, and CLIP-based models. The results show that our method consistently surpasses SOTA hard-label attacks in both attack success rate and query efficiency, particularly in low-query regimes. Beyond image classification, our approach generalizes effectively to corrupted data, biomedical datasets, and dense prediction tasks. Notably, it also successfully circumvents Blacklight, a SOTA stateful defense, resulting in a $0\\%$ detection rate. Our code will be released publicly soon at https://github.com/csjunjun/DPAttack.git.", "link": "http://arxiv.org/abs/2601.14300v2", "date": "2026-03-23", "relevancy": 2.0109, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5162}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4934}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4924}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gradient%20Structure%20Estimation%20under%20Label-Only%20Oracles%20via%20Spectral%20Sensitivity&body=Title%3A%20Gradient%20Structure%20Estimation%20under%20Label-Only%20Oracles%20via%20Spectral%20Sensitivity%0AAuthor%3A%20Jun%20Liu%20and%20Leo%20Yu%20Zhang%20and%20Fengpeng%20Li%20and%20Isao%20Echizen%20and%20Jiantao%20Zhou%0AAbstract%3A%20Hard-label%20black-box%20settings%2C%20where%20only%20top-1%20predicted%20labels%20are%20observable%2C%20pose%20a%20fundamentally%20constrained%20yet%20practically%20important%20feedback%20model%20for%20understanding%20model%20behavior.%20A%20central%20challenge%20in%20this%20regime%20is%20whether%20meaningful%20gradient%20information%20can%20be%20recovered%20from%20such%20discrete%20responses.%20In%20this%20work%2C%20we%20develop%20a%20unified%20theoretical%20perspective%20showing%20that%20a%20wide%20range%20of%20existing%20sign-flipping%20hard-label%20attacks%20can%20be%20interpreted%20as%20implicitly%20approximating%20the%20sign%20of%20the%20true%20loss%20gradient.%20This%20observation%20reframes%20hard-label%20attacks%20from%20heuristic%20search%20procedures%20into%20instances%20of%20gradient%20sign%20recovery%20under%20extremely%20limited%20feedback.%20Motivated%20by%20this%20first-principles%20understanding%2C%2 {"title": "Closed-Loop Verbal Reinforcement Learning for Task-Level Robotic Planning", "author": "Dmitrii Plotnikov and Iaroslav Kolomiets and Dmitrii Maliukov and Dmitrij Kosenkov and Daniia Zinniatullina and Artem Trandofilov and Georgii Gazaryan and Kirill Bogatikov and Timofei Kozlov and Igor Duchinskii and Mikhail Konenkov and Miguel Altamirano Cabrera and Dzmitry Tsetserukou", "abstract": "We propose a new Verbal Reinforcement Learning (VRL) framework for interpretable task-level planning in mobile robotic systems operating under execution uncertainty. The framework follows a closed-loop architecture that enables iterative policy improvement through interaction with the physical environment. In our framework, executable Behavior Trees are repeatedly refined by a Large Language Model actor using structured natural-language feedback produced by a Vision-Language Model critic that observes the physical robot and execution traces. Unlike conventional reinforcement learning, policy updates in VRL occur directly at the symbolic planning level, without gradient-based optimization. This enables transparent reasoning, explicit causal feedback, and human-interpretable policy evolution. We validate the proposed framework on a real mobile robot performing a multi-stage manipulation and navigation task under execution uncertainty. Experimental results show that the framework supports explainable policy improvements, closed-loop adaptation to execution failures, and reliable deployment on physical robotic systems.", "link": "http://arxiv.org/abs/2603.22169v1", "date": "2026-03-23", "relevancy": 1.5599, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5556}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5479}, {"t {"title": "Anatomical Token Uncertainty for Transformer-Guided Active MRI Acquisition", "author": "Lev Ayzenberg and Shady Abu-Hussein and Raja Giryes and Hayit Greenspan", "abstract": "Full data acquisition in MRI is inherently slow, which limits clinical throughput and increases patient discomfort. Compressed Sensing MRI (CS-MRI) seeks to accelerate acquisition by reconstructing images from under-sampled k-space data, requiring both an optimal sampling trajectory and a high-fidelity reconstruction model. In this work, we propose a novel active sampling framework that leverages the inherent discrete structure of a pretrained medical image tokenizer and a latent transformer. By representing anatomy through a dictionary of quantized visual tokens, the model provides a well-defined probability distribution over the latent space. We utilize this distribution to derive a principled uncertainty measure via token entropy, which guides the active sampling process. We introduce two strategies to exploit this latent uncertainty: (1) Latent Entropy Selection (LES), projecting patch-wise token entropy into the $k$-space domain to identify informative sampling lines, and (2) Gradient-based Entropy Optimization (GEO), which identifies regions of maximum uncertainty reduction via the $k$-space gradient of a total latent entropy loss. We evaluate our framework on the fastMRI singlecoil Knee and Brain datasets at $\\times 8$ and $\\times 16$ acceleration. Our results demonstrate that our active policies outperform state-of-the-art baselines in perceptual metrics, and feature-based distances. Our code is available at https://github.com/levayz/TRUST-MRI.", "link": "http://arxiv.org/abs/2603.21806v1", "date": "2026-03-23", "relevancy": 2.1635, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5684}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.537}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anatomical%20Token%20Uncertainty%20for%20Transformer-Guided%20Active%20MRI%20Acquisition&body=Title%3A%20Anatomical%20Token%20Uncertainty%20for%20Transformer-Guided%20Active%20MRI%20Acquisition%0AAuthor%3A%20Lev%20Ayzenberg%20and%20Shady%20Abu-Hussein%20and%20Raja%20Giryes%20and%20Hayit%20Greenspan%0AAbstract%3A%20Full%20data%20acquisition%20in%20MRI%20is%20inherently%20slow%2C%20which%20limits%20clinical%20throughput%20and%20increases%20patient%20discomfort.%20Compressed%20Sensing%20MRI%20%28CS-MRI%29%20seeks%20to%20accelerate%20acquisition%20by%20reconstructing%20images%20from%20under-sampled%20k-space%20data%2C%20requiring%20both%20an%20optimal%20sampling%20trajectory%20and%20a%20high-fidelity%20reconstruction%20model.%20In%20this%20work%2C%20we%20propose%20a%20novel%20active%20sampling%20framework%20that%20leverages%20the%20inherent%20discrete%20structure%20of%20a%20pretrained%20medical%20image%20tokenizer%20and%20a%20latent%20transformer.%20By%20representing%20anatomy%20through%20a%20dictionary%20of%20quantized%20visual%20tokens%2C%20the%20model%20provides%20a%20well-defined%20probability%20distribution%20over%20the%20latent%20space.%20We%20utilize%20this%20distribution%20to%20derive%20a%20principled%20uncertainty%20measure%20via%20token%20entropy%2C%20which%20guides%20the%20active%20sampling%20process.%20We%20introduce%20two%20strategies%20to%20exploit%20this%20latent%20uncertainty%3A%20%281%29%20Latent%20Entropy%20Selection%20%28LES%29%2C%20projecting%20patch-wise%20token%20entropy%20into%20the%20%24k%24-space%20domain%20to%20identify%20informative%20sampling%20lines%2C%20and%20%282%29%20Gradient-based%20Entropy%20Optimization%20%28GEO%29%2C%20which%20identifies%20regions%20of%20maximum%20uncertainty%20reduction%20via%20the%20%24k%24-space%20gradient%20of%20a%20total%20latent%20entropy%20loss.%20We%20evaluate%20our%20framework%20on%20the%20fastMRI%20singlecoil%20Knee%20and%20Brain%20datasets%20at%20%24%5Ctimes%208%24%20and%20%24%5Ctimes%2016%24%20acceleration.%20Our%20results%20demonstrate%20that%20our%20active%20policies%20outperform%20state-of-the-art%20baselines%20in%20perceptual%20metrics%2C%20and%20feature-based%20distances.%20Our%20code%20is%20available%20at%20https%3A//github.com/levayz/TRUST-MRI.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21806v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAnatomical%2520Token%2520Uncertainty%2520for%2520Transformer-Guided%2520Active%2520MRI%2520Acquisition%26entry.906535625%3DLev%2520Ayzenberg%2520and%2520Shady%2520Abu-Hussein%2520and%2520Raja%2520Giryes%2520and%2520Hayit%2520Greenspan%26entry.1292438233%3DFull%2520data%2520acquisition%2520in%2520MRI%2520is%2520inherently%2520slow%252C%2520which%2520limits%2520clinical%2520throughput%2520and%2520increases%2520patient%2520discomfort.%2520Compressed%2520Sensing%2520MRI%2520%2528CS-MRI%2529%2520seeks%2520to%2520accelerate%2520acquisition%2520by%2520reconstructing%2520images%2520from%2520under-sampled%2520k-space%2520data%252C%2520requiring%2520both%2520an%2520optimal%2520sampling%2520trajectory%2520and%2520a%2520high-fidelity%2520reconstruction%2520model.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%2520active%2520sampling%2520framework%2520that%2520leverages%2520the%2520inherent%2520discrete%2520structure%2520of%2520a%2520pretrained%2520medical%2520image%2520tokenizer%2520and%2520a%2520latent%2520transformer.%2520By%2520representing%2520anatomy%2520through%2520a%2520dictionary%2520of%2520quantized%2520visual%2520tokens%252C%2520the%2520model%2520provides%2520a%2520well-defined%2520probability%2520distr

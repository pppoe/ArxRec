79v2", "similarity": 0.6931}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6825}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FreeArtGS%3A%20Articulated%20Gaussian%20Splatting%20Under%20Free-moving%20Scenario&body=Title%3A%20FreeArtGS%3A%20Articulated%20Gaussian%20Splatting%20Under%20Free-moving%20Scenario%0AAuthor%3A%20Hang%20Dai%20and%20Hongwei%20Fan%20and%20Han%20Zhang%20and%20Duojin%20Wu%20and%20Jiyao%20Zhang%20and%20Hao%20Dong%0AAbstract%3A%20The%20increasing%20demand%20for%20augmented%20reality%20and%20robotics%20is%20driving%20the%20need%20for%20articulated%20object%20reconstruction%20with%20high%20scalability.%20However%2C%20existing%20settings%20for%20reconstructing%20from%20discrete%20articulation%20states%20or%20casual%20monocular%20videos%20require%20non-trivial%20axis%20alignment%20or%20suffer%20from%20insufficient%20coverage%2C%20limiting%20their%20applicability.%20In%20this%20paper%2C%20we%20introduce%20FreeArtGS%2C%20a%20novel%20method%20for%20reconstructing%20articulated%20objects%20under%20free-moving%20scenario%2C%20a%20new%20setting%20with%20a%20simple%20setup%20and%20high%20scalability.%20FreeArtGS%20combines%20free-moving%20part%20segmentation%20with%20joint%20estimation%20and%20end-to-end%20optimization%2C%20taking%20only%20a%20monocular%20RGB-D%20video%20as%20input.%20By%20optimizing%20with%20the%20priors%20from%20off-the-shelf%20point-tracking%20and%20feature%20models%2C%20the%20free-moving%20part%20segmentation%20module%20identifies%20rigid%20parts%20from%20relative%20motion%20under%20unconstrained%20capture.%20The%20joint%20estimation%20module%20calibrates%20the%20unified%20object-to-camera%20poses%20and%20recovers%20joint%20type%20and%20axis%20robust {"title": "LEO-VL: Efficient Scene Representation for Scalable 3D Vision-Language Learning", "author": "Jiangyong Huang and Xiaojian Ma and Xiongkun Linghu and Junchao He and Qing Li and Song-Chun Zhu and Yixin Chen and Baoxiong Jia and Siyuan Huang", "abstract": "Developing vision-language models (VLMs) capable of understanding 3D scenes has been a longstanding research goal. Despite recent progress, 3D VLMs still struggle with spatial reasoning and robustness. We identify three key obstacles hindering their progress: (1) scene representation is constrained by a capacity-efficiency trade-off, which impedes scalable learning; (2) training data lacks a comprehensive scheme, with limited diversity across tasks and scene domains; and (3) models exhibit robustness deficiencies and lack effective post-training. To address these challenges, we first propose condensed feature grid (CFG), an efficient scene representation that significantly reduces token overhead while preserving strong perceptual capacity. Building on CFG, we introduce LEO-VL, a 3D VLM trained on over 700k 3D vision-language (3D-VL) data spanning four real-world indoor domains and five tasks such as captioning and dialogue. To further improve robustness, we propose SceneDPO, a novel post-training objective that incorporates contrastive signals across both answers and scenes. LEO-VL achieves state-of-the-art performance on various 3D-VL benchmarks, such as SQA3D, Beacon3D, and Scan2Cap. Extensive analyses highlight the efficiency of CFG and provide key insights such as the importance of task and scene diversity, the priority of data quality for effective scaling, and the advantages of SceneDPO.", "link": "http://arxiv.org/abs/2506.09935v3", "date": "2026-03-23", "relevancy": 3.4101, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.7283}, {"title": "Lexicon3D: Probing Visual Foundation Models f {"title": "IDSplat: Instance-Decomposed 3D Gaussian Splatting for Driving Scenes", "author": "Carl Lindstr\u00f6m and Mahan Rafidashti and Maryam Fatemi and Lars Hammarstrand and Martin R. Oswald and Lennart Svensson", "abstract": "Reconstructing dynamic driving scenes is essential for developing autonomous systems through sensor-realistic simulation. Although recent methods achieve high-fidelity reconstructions, they either rely on costly human annotations for object trajectories or use time-varying representations without explicit object-level decomposition, leading to intertwined static and dynamic elements that hinder scene separation. We present IDSplat, a self-supervised 3D Gaussian Splatting framework that reconstructs dynamic scenes with explicit instance decomposition and learnable motion trajectories, without requiring human annotations. Our key insight is to model dynamic objects as coherent instances undergoing rigid transformations, rather than unstructured time-varying primitives. For instance decomposition, we employ zero-shot, language-grounded video tracking anchored to 3D using lidar, and estimate consistent poses via feature correspondences. We introduce a coordinated-turn smoothing scheme to obtain temporally and physically consistent motion trajectories, mitigating pose misalignments and tracking failures, followed by joint optimization of object poses and Gaussian parameters. Experiments on the Waymo Open Dataset demonstrate that our method achieves competitive reconstruction quality while maintaining instance-level decomposition and generalizes across diverse sequences and view densities without retraining, making it practical for large-scale autonomous driving applications. Code will be released.", "link": "http://arxiv.org/abs/2511.19235v2", "date": "2026-03-23", "relevancy": 3.3511, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6838} n%20smoothing%20scheme%20to%20obtain%20temporally%20and%20physically%20consistent%20motion%20trajectories%2C%20mitigating%20pose%20misalignments%20and%20tracking%20failures%2C%20followed%20by%20joint%20optimization%20of%20object%20poses%20and%20Gaussian%20parameters.%20Experiments%20on%20the%20Waymo%20Open%20Dataset%20demonstrate%20that%20our%20method%20achieves%20competitive%20reconstruction%20quality%20while%20maintaining%20instance-level%20decomposition%20and%20generalizes%20across%20diverse%20sequences%20and%20view%20densities%20without%20retraining%2C%20making%20it%20practical%20for%20large-scale%20autonomous%20driving%20applications.%20Code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2511.19235v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIDSplat%253A%2520Instance-Decomposed%25203D%2520Gaussian%2520Splatting%2520for%2520Driving%2520Scenes%26entry.906535625%3DCarl%2520Lindstr%25C3%25B6m%2520and%2520Mahan%2520Rafidashti%2520and%2520Maryam%2520Fatemi%2520and%2520Lars%2520Hammarstrand%2520and%2520Martin%2520R.%2520Oswald%2520and%2520Lennart%2520Svensson%26entry.1292438233%3DReconstructing%2520dynamic%2520driving%2520scenes%2520is%2520essential%2520for%2520developing%2520autonomous%2520systems%2520through%2520sensor-realistic%2520simulation.%2520Although%2520recent%2520methods%2520achieve%2520high-fidelity%2520reconstructions%252C%2520they%2520either%2520rely%2520on%2520costly%2520human%2520annotations%2520for%2520object%2520trajectories%2520or%2520use%2520time-varying%2520representations%2520without%2520explicit%2520object-level%2520decomposition%252C%2520leading%2520to%2520intertwined%2520static%2520and%2520dynamic%2520elements%2520that%2520hinder%2520scene%2520separation.%2520We%2520present%2520IDSplat%252C%2520a%2520self-supervised%25203D%2520Gaussian%2520Splatting%2520framework%2520that%2520reconstructs%2520dynamic%2520scenes%2520with%2520explicit%2520ins ic%20driving%20scenes%20is%20essential%20for%20developing%20autonomous%20systems%20through%20sensor-realistic%20simulation.%20Although%20recent%20methods%20achieve%20high-fidelity%20reconstructions%2C%20they%20either%20rely%20on%20costly%20human%20annotations%20for%20object%20trajectories%20or%20use%20time-varying%20representations%20without%20explicit%20object-level%20decomposition%2C%20leading%20to%20intertwined%20static%20and%20dynamic%20elements%20that%20hinder%20scene%20separation.%20We%20present%20IDSplat%2C%20a%20self-supervised%203D%20Gaussian%20Splatting%20framework%20that%20reconstructs%20dynamic%20scenes%20with%20explicit%20instance%20decomposition%20and%20learnable%20motion%20trajectories%2C%20without%20requiring%20human%20annotations.%20Our%20key%20insight%20is%20to%20model%20dynamic%20objects%20as%20coherent%20instances%20undergoing%20rigid%20transformations%2C%20rather%20than%20unstructured%20time-varying%20primitives.%20For%20instance%20decomposition%2C%20we%20employ%20zero-shot%2C%20language-grounded%20video%20tracking%20anchored%20to%203D%20using%20lidar%2C%20and%20estimate%20consistent%20poses%20via%20feature%20correspondences.%20We%20introduce%20a%20coordinated-turn%20smoothing%20scheme%20to%20obtain%20temporally%20and%20physically%20consistent%20motion%20trajectories%2C%20mitigating%20pose%20misalignments%20and%20tracking%20failures%2C%20followed%20by%20joint%20optimization%20of%20object%20poses%20and%20Gaussian%20parameters.%20Experiments%20on%20the%20Waymo%20Open%20Dataset%20demonstrate%20that%20our%20method%20achieves%20competitive%20reconstruction%20quality%20while%20maintaining%20instance-level%20decomposition%20and%20generalizes%20across%20diverse%20sequences%20and%20view%20densities%20without%20retraining%2C%20making%20it%20practical%20for%20large-scale%20autonomous%20driving%20applications.%20Code%20will%20be%20released.&entry.1838667208=http%3A//arxiv.org/abs/2511.19235v2&entry.124074799=Read"},
{"title": "Cross-Instance Gaussian Splatting Registration via Geometry-Aware Feature-Guided Alignment", "author": "Roy Amoyal and Oren Freifeld and Chaim Baskin", "abstract": "We present Gaussian Splatting Alignment (GSA), a novel method for aligning two independent 3D Gaussian Splatting (3DGS) models via a similarity transformation (rotation, translation, and scale), even when they are of different objects in the same category (e.g., different cars). In contrast, existing methods can only align 3DGS models of the same object (e.g., the same car) and often must be given true scale as input, while we estimate it successfully. GSA leverages viewpoint-guided spherical map features to obtain robust correspondences and introduces a two-step optimization framework that aligns 3DGS models while keeping them fixed. First, we apply an iterative feature-guided absolute orientation solver as our coarse registration, which is robust to poor initialization (e.g., 180 degrees misalignment or a 10x scale gap). Next, we use a fine registration step that enforces multi-view feature consistency, inspired by inverse radiance-field formulations. The first step already achieves state-of-the-art performance, and the second further improves results. In the same-object case, GSA outperforms prior works, often by a large margin, even when the other methods are given the true scale. In the harder case of different objects in the same category, GSA vastly surpasses them, providing the first effective solution for category-level 3DGS registration and unlocking new applications. Project webpage: https://bgu-cs-vil.github.io/GSA-project/", "link": "http://arxiv.org/abs/2603.21936v1", "date": "2026-03-23", "relevancy": 3.2932, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6913}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "htt urther%20improves%20results.%20In%20the%20same-object%20case%2C%20GSA%20outperforms%20prior%20works%2C%20often%20by%20a%20large%20margin%2C%20even%20when%20the%20other%20methods%20are%20given%20the%20true%20scale.%20In%20the%20harder%20case%20of%20different%20objects%20in%20the%20same%20category%2C%20GSA%20vastly%20surpasses%20them%2C%20providing%20the%20first%20effective%20solution%20for%20category-level%203DGS%20registration%20and%20unlocking%20new%20applications.%20Project%20webpage%3A%20https%3A//bgu-cs-vil.github.io/GSA-project/%0ALink%3A%20http%3A//arxiv.org/abs/2603.21936v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-Instance%2520Gaussian%2520Splatting%2520Registration%2520via%2520Geometry-Aware%2520Feature-Guided%2520Alignment%26entry.906535625%3DRoy%2520Amoyal%2520and%2520Oren%2520Freifeld%2520and%2520Chaim%2520Baskin%26entry.1292438233%3DWe%2520present%2520Gaussian%2520Splatting%2520Alignment%2520%2528GSA%2529%252C%2520a%2520novel%2520method%2520for%2520aligning%2520two%2520independent%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520models%2520via%2520a%2520similarity%2520transformation%2520%2528rotation%252C%2520translation%252C%2520and%2520scale%2529%252C%2520even%2520when%2520they%2520are%2520of%2520different%2520objects%2520in%2520the%2520same%2520category%2520%2528e.g.%252C%2520different%2520cars%2529.%2520In%2520contrast%252C%2520existing%2520methods%2520can%2520only%2520align%25203DGS%2520models%2520of%2520the%2520same%2520object%2520%2528e.g.%252C%2520the%2520same%2520car%2529%2520and%2520often%2520must%2520be%2520given%2520true%2520scale%2520as%2520input%252C%2520while%2520we%2520estimate%2520it%2520successfully.%2520GSA%2520leverages%2520viewpoint-guided%2520spherical%2520map%2520features%2520to%2520obtain%2520robust%2520correspondences%2520and%2520introduces%2520a%2520two-step%2520optimization%2520framework%2520that%2520aligns%25203DGS%2520m {"title": "3DSceneEditor: Controllable 3D Scene Editing with Gaussian Splatting", "author": "Ziyang Yan and Yihua Shao and Minwen Liao and Siyu Chen and Nan Wang and Muyuan Lin and Jenq-Neng Hwang and Hao Zhao and Fabio Remondino and Lei Li", "abstract": "The creation of 3D scenes has traditionally been both labor-intensive and costly, requiring designers to meticulously configure 3D assets and environments. Recent advancements in generative AI, including text-to-3D and image-to-3D methods, have dramatically reduced the complexity and cost of this process. However, current techniques for editing complex 3D scenes continue to rely on generally interactive multi-step, 2D-to-3D projection methods and diffusion-based techniques, which often lack precision in control and hamper interactive-rate performance. In this work, we propose ***3DSceneEditor***, a fully 3D-based paradigm for interactive-rate, precise editing of intricate 3D scenes using Gaussian Splatting. Unlike conventional methods, 3DSceneEditor operates through a streamlined 3D pipeline, enabling direct Gaussian-based manipulation for efficient, high-quality edits based on input prompts. The proposed framework (i) integrates a pre-trained instance segmentation model for semantic labeling; (ii) employs a zero-shot grounding approach with CLIP to align target objects with user prompts; and (iii) applies scene modifications, such as object addition, repositioning, recoloring, replacing, and removal--directly on Gaussians. Extensive experimental results show that 3DSceneEditor surpasses existing state-of-the-art techniques in terms of both editing precision and efficiency, establishing a new benchmark for efficient and interactive 3D scene customization.", "link": "http://arxiv.org/abs/2412.01583v3", "date": "2026-03-23", "relevancy": 3.2627, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6629}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6483}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6464}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203DSceneEditor%3A%20Controllable%203D%20Scene%20Editing%20with%20Gaussian%20Splatting&body=Title%3A%203DSceneEditor%3A%20Controllable%203D%20Scene%20Editing%20with%20Gaussian%20Splatting%0AAuthor%3A%20Ziyang%20Yan%20and%20Yihua%20Shao%20and%20Minwen%20Liao%20and%20Siyu%20Chen%20and%20Nan%20Wang%20and%20Muyuan%20Lin%20and%20Jenq-Neng%20Hwang%20and%20Hao%20Zhao%20and%20Fabio%20Remondino%20and%20Lei%20Li%0AAbstract%3A%20The%20creation%20of%203D%20scenes%20has%20traditionally%20been%20both%20labor-intensive%20and%20costly%2C%20requiring%20designers%20to%20meticulously%20configure%203D%20assets%20and%20environments.%20Recent%20advancements%20in%20generative%20AI%2C%20including%20text-to-3D%20and%20image-to-3D%20methods%2C%20have%20dramatically%20reduced%20the%20complexity%20and%20cost%20of%20this%20process.%20However%2C%20current%20techniques%20for%20editing%20complex%203D%20scenes%20continue%20to%20rely%20on%20generally%20interactive%20multi-step%2C%202D-to-3D%20projection%20methods%20and%20diffusion-based%20techniques%2C%20which%20often%20lack%20precision%20in%20control%20and%20hamper%20interactive-rate%20performance.%20In%20this%20work%2C%20we%20propose%20%2A%2A%2A3DSceneEditor%2A%2A%2A%2C%20a%20fully%203D-based%20paradigm%20for%20interactive-rate%2C%20precise%20editing%20of%20intricate%203D%20scenes%20using%20Gaussian%20Splatting.%20Unlike%20conventional%20methods%2C%203DSceneEditor%20operates%20through%20a%20streamlined%203D%20pipeline%2C%20enabling%20direct%20Gaussian-based%20manipulation%20for%20efficient%2C%20high-quality%20edits%20based%20on%20input%20prompts.%20The%20proposed%20framework%20%28i%29%20integrates% {"title": "SpatialBoost: Enhancing Visual Representation through Language-Guided Reasoning", "author": "Byungwoo Jeon and Dongyoung Kim and Huiwon Jang and Insoo Kim and Jinwoo Shin", "abstract": "Despite the remarkable success of large-scale pre-trained image representation models (i.e., vision encoders) across various vision tasks, they are predominantly trained on 2D image data and therefore often fail to capture 3D spatial relationships between objects and backgrounds in the real world, constraining their effectiveness in many downstream applications. To address this, we propose SpatialBoost, a scalable framework that enhances the spatial awareness of existing pre-trained vision encoders by injecting 3D spatial knowledge expressed in linguistic descriptions. The core idea involves converting dense 3D spatial information from 2D images into linguistic expressions, which is then used to inject such spatial knowledge into vision encoders through a Large Language Model (LLM). To this end, we adopt a multi-turn Chain-of-Thought (CoT) reasoning process that progressively incorporates dense spatial knowledge and builds hierarchical spatial understanding. To validate effectiveness, we adapt SpatialBoost to state-of-the-art vision encoders such as DINOv3, and evaluate its performance gains on a wide range of benchmarks requiring both 3D perception and general vision abilities. For instance, SpatialBoost improves DINOv3 performance from 55.9 to 59.7 mIoU on ADE20K, achieving state-of-the-art performance with 3.8% gain over the pre-trained DINOv3.", "link": "http://arxiv.org/abs/2603.22057v1", "date": "2026-03-23", "relevancy": 3.2237, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6683}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6683}, {"title" {"title": "GTSR: Subsurface Scattering Awared 3D Gaussians for Translucent Surface Reconstruction", "author": "Youwen Yuan and Xi Zhao", "abstract": "Reconstructing translucent objects from multi-view images is a difficult problem. Previously, researchers have used differentiable path tracing and the neural implicit field, which require relatively large computational costs. Recently, many works have achieved good reconstruction results for opaque objects based on a 3DGS pipeline with much higher efficiency. However, such methods have difficulty dealing with translucent objects, because they do not consider the optical properties of translucent objects. In this paper, we propose a novel 3DGS-based pipeline (GTSR) to reconstruct the surface geometry of translucent objects. GTSR combines two sets of Gaussians, surface and interior Gaussians, which are used to model the surface and scattering color when lights pass translucent objects. To render the appearance of translucent objects, we introduce a method that uses the Fresnel term to blend two sets of Gaussians. Furthermore, to improve the reconstructed details of non-contour areas, we introduce the Disney BSDF model with deferred rendering to enhance constraints of the normal and depth. Experimental results demonstrate that our method outperforms baseline reconstruction methods on the NeuralTO Syn dataset while showing great real-time rendering performance. We also extend the dataset with new translucent objects of varying material properties and demonstrate our method can adapt to different translucent materials.", "link": "http://arxiv.org/abs/2603.22036v1", "date": "2026-03-23", "relevancy": 3.1796, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6883}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": {"title": "Group3D: MLLM-Driven Semantic Grouping for Open-Vocabulary 3D Object Detection", "author": "Youbin Kim and Jinho Park and Hogun Park and Eunbyung Park", "abstract": "Open-vocabulary 3D object detection aims to localize and recognize objects beyond a fixed training taxonomy. In multi-view RGB settings, recent approaches often decouple geometry-based instance construction from semantic labeling, generating class-agnostic fragments and assigning open-vocabulary categories post hoc. While flexible, such decoupling leaves instance construction governed primarily by geometric consistency, without semantic constraints during merging. When geometric evidence is view-dependent and incomplete, this geometry-only merging can lead to irreversible association errors, including over-merging of distinct objects or fragmentation of a single instance. We propose Group3D, a multi-view open-vocabulary 3D detection framework that integrates semantic constraints directly into the instance construction process. Group3D maintains a scene-adaptive vocabulary derived from a multimodal large language model (MLLM) and organizes it into semantic compatibility groups that encode plausible cross-view category equivalence. These groups act as merge-time constraints: 3D fragments are associated only when they satisfy both semantic compatibility and geometric consistency. This semantically gated merging mitigates geometry-driven over-merging while absorbing multi-view category variability. Group3D supports both pose-known and pose-free settings, relying only on RGB observations. Experiments on ScanNet and ARKitScenes demonstrate that Group3D achieves state-of-the-art performance in multi-view open-vocabulary 3D detection, while exhibiting strong generalization in zero-shot scenarios. The project page is available at https://ubin108.github.io/Group3D/.", "link": "http://arxiv.org/abs/2603.21944v1", "date": "2026-03-23", "relevancy": 3.1648, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6349}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.632}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.632}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Group3D%3A%20MLLM-Driven%20Semantic%20Grouping%20for%20Open-Vocabulary%203D%20Object%20Detection&body=Title%3A%20Group3D%3A%20MLLM-Driven%20Semantic%20Grouping%20for%20Open-Vocabulary%203D%20Object%20Detection%0AAuthor%3A%20Youbin%20Kim%20and%20Jinho%20Park%20and%20Hogun%20Park%20and%20Eunbyung%20Park%0AAbstract%3A%20Open-vocabulary%203D%20object%20detection%20aims%20to%20localize%20and%20recognize%20objects%20beyond%20a%20fixed%20training%20taxonomy.%20In%20multi-view%20RGB%20settings%2C%20recent%20approaches%20often%20decouple%20geometry-based%20instance%20construction%20from%20semantic%20labeling%2C%20generating%20class-agnostic%20fragments%20and%20assigning%20open-vocabulary%20categories%20post%20hoc.%20While%20flexible%2C%20such%20decoupling%20leaves%20instance%20construction%20governed%20primarily%20by%20geometric%20consistency%2C%20without%20semantic%20constraints%20during%20merging.%20When%20geometric%20evidence%20is%20view-dependent%20and%20incomplete%2C%20this%20geometry-only%20merging%20can%20lead%20to%20irreversible%20association%20errors%2C%20including%20over-merging%20of%20distinct%20objects%20or%20fragmentation%20of%20a%20single%20instance.%20We%20propose%20Group3D%2C%20a%20multi-view%20open-vocabulary%203D%20detection%20framework%20that%20integrates%20semantic%20constraints%20directly%20into%20the%20instance%20construction%20process.%20Group3D%20maintains%20a%20scene-adaptive%20vocabulary%20derived%20from%20a%20multimodal%20large%20language%20model%20%28MLLM%29%20and%20organizes%20it%20into%20semantic%20compatibility%20groups%20that%20encode%20plausible%20cross-view%20category%20equivalence.%20These%20groups%20act%20as%20merge-time%20constraints%3A%203D%20fragments%20are%20associated%20only%20when%20they%20satisfy%20both%20semantic%20compatibility%20and%20geometric%20consistency.%20This%20semantically%20gated%20merging%20mitigates%20geometry-driven%20over-merging%20while%20absorbing%20multi-view%20category%20variability.%20Group3D%20supports%20both%20pose-known%20and%20pose-free%20settings%2C%20relying%20only%20on%20RGB%20observations.%20Experiments%20on%20ScanNet%20and%20ARKitScenes%20demonstrate%20that%20Group3D%20achieves%20state-of-the-art%20performance%20in%20multi-view%20open-vocabulary%203D%20detection%2C%20while%20exhibiting%20strong%20generalization%20in%20zero-shot%20scenarios.%20The%20project%20page%20is%20available%20at%20https%3A//ubin108.github.io/Group3D/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21944v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGroup3D%253A%2520MLLM-Driven%2520Semantic%2520Grouping%2520for%2520Open-Vocabulary%25203D%2520Object%2520Detection%26entry.906535625%3DYoubin%2520Kim%2520and%2520Jinho%2520Park%2520and%2520Hogun%2520Park%2520and%2520Eunbyung%2520Park%26entry.1292438233%3DOpen-vocabulary%25203D%2520object%2520detection%2520aims%2520to%2520localize%2520and%2520recognize%2520objects%2520beyond%2520a%2520fixed%2520training%2520taxonomy.%2520In%2520multi-view%2520RGB%2520settings%252C%2520recent%2520approaches%2520often%2520decouple%2520geometry-based%2520instance%2520construction%2520from%2520semantic%2520labeling%252C%2520generating%2520class-agnostic%2520fragments%2520and%2520assigning%2520open-vocabulary%2520categories%2520post%2520hoc.%2520While%2520flexible%252C%2520such%2520decoupling%2520leaves%2520instance%2520construction%2520governed%2520primarily {"title": "PAM: A Pose-Appearance-Motion Engine for Sim-to-Real HOI Video Generation", "author": "Mingju Gao and Kaisen Yang and Huan-ang Gao and Bohan Li and Ao Ding and Wenyi Li and Yangcheng Yu and Jinkun Liu and Shaocong Xu and Yike Niu and Haohan Chi and Hao Chen and Hao Tang and Li Yi and Hao Zhao", "abstract": "Hand-object interaction (HOI) reconstruction and synthesis are becoming central to embodied AI and AR/VR. Yet, despite rapid progress, existing HOI generation research remains fragmented across three disjoint tracks: (1) pose-only synthesis that predicts MANO trajectories without producing pixels; (2) single-image HOI generation that hallucinates appearance from masks or 2D cues but lacks dynamics; and (3) video generation methods that require both the entire pose sequence and the ground-truth first frame as inputs, preventing true sim-to-real deployment. Inspired by the philosophy of Joo et al. (2018), we think that HOI generation requires a unified engine that brings together pose, appearance, and motion within one coherent framework. Thus we introduce PAM: a Pose-Appearance-Motion Engine for controllable HOI video generation. The performance of our engine is validated by: (1) On DexYCB, we obtain an FVD of 29.13 (vs. 38.83 for InterDyn), and MPJPE of 19.37 mm (vs. 30.05 mm for CosHand), while generating higher-resolution 480x720 videos compared to 256x256 and 256x384 baselines. (2) On OAKINK2, our full multi-condition model improves FVD from 68.76 to 46.31. (3) An ablation over input conditions on DexYCB shows that combining depth, segmentation, and keypoints consistently yields the best results. (4) For a downstream hand pose estimation task using SimpleHand, augmenting training with 3,400 synthetic videos (207k frames) allows a model trained on only 50% of the real data plus our synthetic data to match the 100% real baseline.", "link": "http://arxiv.org/abs/2603.22193v1", "date": "2026-03-23", "relevancy": 3.123, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6487}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6446}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5805}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation&body=Title%3A%20PAM%3A%20A%20Pose-Appearance-Motion%20Engine%20for%20Sim-to-Real%20HOI%20Video%20Generation%0AAuthor%3A%20Mingju%20Gao%20and%20Kaisen%20Yang%20and%20Huan-ang%20Gao%20and%20Bohan%20Li%20and%20Ao%20Ding%20and%20Wenyi%20Li%20and%20Yangcheng%20Yu%20and%20Jinkun%20Liu%20and%20Shaocong%20Xu%20and%20Yike%20Niu%20and%20Haohan%20Chi%20and%20Hao%20Chen%20and%20Hao%20Tang%20and%20Li%20Yi%20and%20Hao%20Zhao%0AAbstract%3A%20Hand-object%20interaction%20%28HOI%29%20reconstruction%20and%20synthesis%20are%20becoming%20central%20to%20embodied%20AI%20and%20AR/VR.%20Yet%2C%20despite%20rapid%20progress%2C%20existing%20HOI%20generation%20research%20remains%20fragmented%20across%20three%20disjoint%20tracks%3A%20%281%29%20pose-only%20synthesis%20that%20predicts%20MANO%20trajectories%20without%20producing%20pixels%3B%20%282%29%20single-image%20HOI%20generation%20that%20hallucinates%20appearance%20from%20masks%20or%202D%20cues%20but%20lacks%20dynamics%3B%20and%20%283%29%20video%20generation%20methods%20that%20require%20both%20the%20entire%20pose%20sequence%20and%20the%20ground-truth%20first%20frame%20as%20inputs%2C%20preventing%20true%20sim-to-real%20deployment.%20Inspired%20by%20the%20philosophy%20of%20Joo%20et%20al.%20%282018%29%2C%20we%20think%20that%20HOI%20generation%20requires%20a%20unified%20engine%20that%20brings%20together%20pose%2C%20appearance%2C%20and%20motion%20within%20one%20coherent%20framework.%20Thus%20we%2 {"title": "3D-Layout-R1: Structured Reasoning for Language-Instructed Spatial Editing", "author": "Haoyu Zhen and Xiaolong Li and Yilin Zhao and Han Zhang and Sifei Liu and Kaichun Mo and Chuang Gan and Subhashree Radhakrishnan", "abstract": "Large Language Models (LLMs) and Vision Language Models (VLMs) have shown impressive reasoning abilities, yet they struggle with spatial understanding and layout consistency when performing fine-grained visual editing. We introduce a Structured Reasoning framework that performs text-conditioned spatial layout editing via scene-graph reasoning. Given an input scene graph and a natural-language instruction, the model reasons over the graph to generate an updated scene graph that satisfies the text condition while maintaining spatial coherence. By explicitly guiding the reasoning process through structured relational representations, our approach improves both interpretability and control over spatial relationships. We evaluate our method on a new text-guided layout editing benchmark encompassing sorting, spatial alignment, and room-editing tasks. Our training paradigm yields an average 15% improvement in IoU and 25% reduction in center-distance error compared to Chain of Thought Fine-tuning (CoT-SFT) and vanilla GRPO baselines. Compared to SOTA zero-shot LLMs, our best models achieve up to 20% higher mIoU, demonstrating markedly improved spatial precision.", "link": "http://arxiv.org/abs/2603.22279v1", "date": "2026-03-23", "relevancy": 3.1183, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6256}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6256}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6198}], "mailto": " {"title": "Speed by Simplicity: A Single-Stream Architecture for Fast Audio-Video Generative Foundation Model", "author": " SII-GAIR and Sand. ai and  : and Ethan Chern and Hansi Teng and Hanwen Sun and Hao Wang and Hong Pan and Hongyu Jia and Jiadi Su and Jin Li and Junjie Yu and Lijie Liu and Lingzhi Li and Lyumanshan Ye and Min Hu and Qiangang Wang and Quanwei Qi and Steffi Chern and Tao Bu and Taoran Wang and Teren Xu and Tianning Zhang and Tiantian Mi and Weixian Xu and Wenqiang Zhang and Wentai Zhang and Xianping Yi and Xiaojie Cai and Xiaoyang Kang and Yan Ma and Yixiu Liu and Yunbo Zhang and Yunpeng Huang and Yutong Lin and Zewei Tao and Zhaoliang Liu and Zheng Zhang and Zhiyao Cen and Zhixuan Yu and Zhongshu Wang and Zhulin Hu and Zijin Zhou and Zinan Guo and Yue Cao and Pengfei Liu", "abstract": "We present daVinci-MagiHuman, an open-source audio-video generative foundation model for human-centric generation. daVinci-MagiHuman jointly generates synchronized video and audio using a single-stream Transformer that processes text, video, and audio within a unified token sequence via self-attention only. This single-stream design avoids the complexity of multi-stream or cross-attention architectures while remaining easy to optimize with standard training and inference infrastructure. The model is particularly strong in human-centric scenarios, producing expressive facial performance, natural speech-expression coordination, realistic body motion, and precise audio-video synchronization. It supports multilingual spoken generation across Chinese (Mandarin and Cantonese), English, Japanese, Korean, German, and French. For efficient inference, we combine the single-stream backbone with model distillation, latent-space super-resolution, and a Turbo VAE decoder, enabling generation of a 5-second 256p video in 2 seconds on a single H100 GPU. In automatic evaluation, daVinci-MagiHuman achieves the highest visual quality and text alignment among leading open models, along with the lowest word error rate (14.60%) for speech intelligibility. In pairwise human evaluation, it achieves win rates of 80.0% against Ovi 1.1 and 60.9% against LTX 2.3 over 2000 comparisons. We open-source the complete model stack, including the base model, the distilled model, the super-resolution model, and the inference codebase.", "link": "http://arxiv.org/abs/2603.21986v1", "date": "2026-03-23", "relevancy": 3.094, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.632}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6261}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5983}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Speed%20by%20Simplicity%3A%20A%20Single-Stream%20Architecture%20for%20Fast%20Audio-Video%20Generative%20Foundation%20Model&body=Title%3A%20Speed%20by%20Simplicity%3A%20A%20Single-Stream%20Architecture%20for%20Fast%20Audio-Video%20Generative%20Foundation%20Model%0AAuthor%3A%20%20SII-GAIR%20and%20Sand.%20ai%20and%20%20%3A%20and%20Ethan%20Chern%20and%20Hansi%20Teng%20and%20Hanwen%20Sun%20and%20Hao%20Wang%20and%20Hong%20Pan%20and%20Hongyu%20Jia%20and%20Jiadi%20Su%20and%20Jin%20Li%20and%20Junjie%20Yu%20and%20Lijie%20Liu%20and%20Lingzhi%20Li%20and%20Lyumanshan%20Ye%20and%20Min%20Hu%20and%20Qiangang%20Wang%20and%20Quanwei%20Qi%20and%20Steffi%20Chern%20and%20Tao%20Bu%20and%20Taoran%20Wang%20and%20Teren%20Xu%20and%20Tianning%20Zhang%20and%20Tiantian%20Mi%20and%20Weixian%20Xu%20and%20Wenqiang%20Zhang%20and%20Wentai%20Zhang%20and%20Xianping%20Yi%20and%20Xiaojie%20Cai%20and%20Xiaoyang%20Kang%20and%20Yan%20Ma%20and%20Yixiu%20Liu%20and%20Yunbo%20Zhang%20and%20Yunpeng%20Huang%20and%20Yutong%20Lin%20and%20Zewei%20Tao%20and%20Zhaoliang%20Liu%20and%20Zheng%20Zhang%20and%20 {"title": "From Synthetic Scenes to Real Performance: Enhancing Spatial Reasoning in VLMs", "author": "Massimo Rizzoli and Simone Alghisi and Seyed Mahed Mousavi and Giuseppe Riccardi", "abstract": "Fine-tuning Vision-Language Models (VLMs) is a common strategy to improve performance following an ad-hoc data collection and annotation of real-world scenes. However, this process is often prone to biases, errors, and distribution imbalance, resulting in overfitting and imbalanced performance. Although a few studies have tried to address this problem by generating synthetic data, they lacked control over distribution bias and annotation quality. To address these challenges, we redesign the fine-tuning process in two ways. First, we control the generation of data and its annotations, ensuring it is free from bias, distribution imbalance, and annotation errors. We automatically construct the dataset by comprehensively sampling objects' attributes, including color, shape, size, and position within the scene. Secondly, using this annotated dataset, we fine-tune state-of-the-art VLMs and assess performance transferability to real-world data on the absolute position task. We conduct exhaustive evaluations on both synthetic and real-world benchmarks. Our experiments reveal two key findings: 1) fine-tuning on balanced synthetic data yields uniform performance across the visual scene and mitigates common biases; and 2) fine-tuning on synthetic stimuli improves performance by 13% on real-world data (COCO), outperforming models fine-tuned on the full COCO train set.", "link": "http://arxiv.org/abs/2511.11440v2", "date": "2026-03-23", "relevancy": 3.0324, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.621}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.621}, dings%3A%201%29%20fine-tuning%20on%20balanced%20synthetic%20data%20yields%20uniform%20performance%20across%20the%20visual%20scene%20and%20mitigates%20common%20biases%3B%20and%202%29%20fine-tuning%20on%20synthetic%20stimuli%20improves%20performance%20by%2013%25%20on%20real-world%20data%20%28COCO%29%2C%20outperforming%20models%20fine-tuned%20on%20the%20full%20COCO%20train%20set.%0ALink%3A%20http%3A//arxiv.org/abs/2511.11440v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Synthetic%2520Scenes%2520to%2520Real%2520Performance%253A%2520Enhancing%2520Spatial%2520Reasoning%2520in%2520VLMs%26entry.906535625%3DMassimo%2520Rizzoli%2520and%2520Simone%2520Alghisi%2520and%2520Seyed%2520Mahed%2520Mousavi%2520and%2520Giuseppe%2520Riccardi%26entry.1292438233%3DFine-tuning%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520is%2520a%2520common%2520strategy%2520to%2520improve%2520performance%2520following%2520an%2520ad-hoc%2520data%2520collection%2520and%2520annotation%2520of%2520real-world%2520scenes.%2520However%252C%2520this%2520process%2520is%2520often%2520prone%2520to%2520biases%252C%2520errors%252C%2520and%2520distribution%2520imbalance%252C%2520resulting%2520in%2520overfitting%2520and%2520imbalanced%2520performance.%2520Although%2520a%2520few%2520studies%2520have%2520tried%2520to%2520address%2520this%2520problem%2520by%2520generating%2520synthetic%2520data%252C%2520they%2520lacked%2520control%2520over%2520distribution%2520bias%2520and%2520annotation%2520quality.%2520To%2520address%2520these%2520challenges%252C%2520we%2520redesign%2520the%2520fine-tuning%2520process%2520in%2520two%2520ways.%2520First%252C%2520we%2520control%2520the%2520generation%2520of%2520data%2520and%2520its%2520annotations%252C%2520ensuring%2520it%2520is%2520free%2520from%2520bias%252C%2520distribution%2520imbalance%252C%2520and%2520annotation%2520errors.%2520We%2520automatically%2520construct%2520the%2520data {"title": "The Universal Normal Embedding", "author": "Chen Tasker and Roy Betser and Eyal Gofer and Meir Yossef Levi and Guy Gilboa", "abstract": "Generative models and vision encoders have largely advanced on separate tracks, optimized for different goals and grounded in different mathematical principles. Yet, they share a fundamental property: latent space Gaussianity. Generative models map Gaussian noise to images, while encoders map images to semantic embeddings whose coordinates empirically behave as Gaussian. We hypothesize that both are views of a shared latent source, the Universal Normal Embedding (UNE): an approximately Gaussian latent space from which encoder embeddings and DDIM-inverted noise arise as noisy linear projections. To test our hypothesis, we introduce NoiseZoo, a dataset of per-image latents comprising DDIM-inverted diffusion noise and matching encoder representations (CLIP, DINO). On CelebA, linear probes in both spaces yield strong, aligned attribute predictions, indicating that generative noise encodes meaningful semantics along linear directions. These directions further enable faithful, controllable edits (e.g., smile, gender, age) without architectural changes, where simple orthogonalization mitigates spurious entanglements. Taken together, our results provide empirical support for the UNE hypothesis and reveal a shared Gaussian-like latent geometry that concretely links encoding and generation. Code and data are available https://rbetser.github.io/UNE/", "link": "http://arxiv.org/abs/2603.21786v1", "date": "2026-03-23", "relevancy": 2.8987, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5878}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5841}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5674}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Universal%20Normal%20Embedding&body=Title%3A%20The%20Universal%20Normal%20Embedding%0AAuthor%3A%20Chen%20Tasker%20and%20Roy%20Betser%20and%20Eyal%20Gofer%20and%20Meir%20Yossef%20Levi%20and%20Guy%20Gilboa%0AAbstract%3A%20Generative%20models%20and%20vision%20encoders%20have%20largely%20advanced%20on%20separate%20tracks%2C%20optimized%20for%20different%20goals%20and%20grounded%20in%20different%20mathematical%20principles.%20Yet%2C%20they%20share%20a%20fundamental%20property%3A%20latent%20space%20Gaussianity.%20Generative%20models%20map%20Gaussian%20noise%20to%20images%2C%20while%20encoders%20map%20images%20to%20semantic%20embeddings%20whose%20coordinates%20empirically%20behave%20as%20Gaussian.%20We%20hypothesize%20that%20both%20are%20views%20of%20a%20shared%20latent%20source%2C%20the%20Universal%20Normal%20Embedding%20%28UNE%29%3A%20an%20approximately%20Gaussian%20latent%20space%20from%20which%20encoder%20embeddings%20and%20DDIM-inverted%20noise%20arise%20as%20noisy%20linear%20projections.%20To%20test%20our%20hypothesis%2C%20we%20introduce%20NoiseZoo%2C%20a%20dataset%20of%20per-image%20latents%20comprising%20DDIM-inverted%20diffusion%20noise%20and%20matching%20encoder%20representations%20%28CLIP%2C%20DINO%29.%20On%20CelebA%2C%20linear%20probes%20in%20both%20spaces%20yield%20strong%2C%20aligned%20attribute%20predictions%2C%20indicating%20that%20generative%20noise%20encodes%20meaningful%20semantics%20along%20linear%20directions.%20These%20directions%20further%20enable%20faithful%2C%20controllable%20edits%20%28e.g.%2C%20smile%2C%20gender%2C%20age%29%20without%20architectural%20changes%2C%20where%20simple%20orthogonalization%20mitigates%20spurious%20entanglements.%20Taken%20together%2C%20our%20results%20provide%20empirical%20support%20for%20the%20UNE%20hypothesis%20and%20reveal%20a%20shared%20Gaussian-like%20latent%20geometry%20that%20concretely%20links%20encoding%20and%20generation.%20Code%20and%20data%20are%20available%20https%3A//rbetser.github.io/UNE/%0ALink%3A%20http%3A//arxiv.org/abs/2603.21786v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Universal%2520Normal%2520Embedding%26entry.906535625%3DChen%2520Tasker%2520and%2520Roy%2520Betser%2520and%2520Eyal%2520Gofer%2520and%2520Meir%2520Yossef%2520Levi%2520and%2520Guy%2520Gilboa%26entry.1292438233%3DGenerative%2520models%2520and%2520vision%2520encoders%2520have%2520largely%2520advanced%2520on%2520separate%2520tracks%252C%2520optimized%2520for%2520different%2520goals%2520and%2520grounded%2520in%2520different%2520mathematical%2520principles.%2520Yet%252C%2520they%2520share%2520a%2520fundamental%2520property%253A%2520latent%2520space%2520Gaussianity.%2520Generative%2520models%2520map%2520Gaussian%2520noise%2520to%2520images%252C%2520while%2520encoders%2520map%2520images%2520to%2520semantic%2520embeddings%2520whose%2520coordinates%2520empirically%2520behave%2520as%2520Gaussian.%2520We%2520hypothesize%2520that%2520both%2520are%2520views%2520of%2520a%2520shared%2520latent%2520source%252C%2520the%2520Universal%2520Normal%2520Embedding%2520%2528UNE%2529%253A%2520an%2520approximately%2520Gaussian%2520latent%2520space%2520from%2520which%2520encoder%2520embeddings%2520and%2520DDIM-inverted%2520noise%2520arise%2520as%2520noisy%2520linear%2520projections.%2520To%2520test%2520our%2520hypothesis%252C%2520we%2520introduce%2520NoiseZoo%252C%2520a%2520dataset%2520of%2520per-image%2520latents%2520comprising%2520DDIM-inverted%2520diffusion%2520noise%2520and%2520matching%2520encoder%2520representations%2520%2528CLIP%252C%2520DINO%2529.%2520On%2520CelebA%252C%2520linear%2520probes%2520in%2520both%2520spaces%2520yield%2520strong%252C%2520aligned%2520attribute%2520predictions%252C%2520indicating%2520that%2520generative%2520noise%2520encodes%2520meaningful%2520semantics%2520along%2520linear%2520directions.%2520These%2520directions%2520further%2520enable%2520faithful%252C%2520controllable%2520edits%2520%2528e.g.%252C%2520smile%252C%2520gender%252C%2520age%2529%2520without%2520architectural%2520changes%252C%2520where%2520simple%2520orthogonalization%2520mitigates%2520spurious%2520entanglements.%2520Taken%2520together%252C%2520our%2520results%2520provide%2520empirical%2520support%2520for%2520the%2520UNE%2520hypothesis%2520and%2520reveal%2520a%2520shared%2520Gaussian-like%2520latent%2520geometry%2520that%2520concretely%2520links%2520encoding%2520and%2520generation.%2520Code%2520and%2520data%2520are%2520available%2520https%253A//rbetser.github.io/UNE/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21786v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Universal%20Normal%20Embedding&entry.906535625=Chen%20Tasker%20and%20Roy%20Betser%20and%20Eyal%20Gofer%20and%20Meir%20Yossef%20Levi%20and%20Guy%20Gilboa&entry.1292438233=Generative%20models%20and%20vision%20encoders%20have%20largely%20advanced%20on%20separate%20tracks%2C%20optimized%20for%20different%20goals%20and%20grounded%20in%20different%20mathematical%20principles.%20Yet%2C%20they%20share%20a%20fundamental%20property%3A%20latent%20space%20Gaussianity.%20Generative%20models%20map%20Gaussian%20noise%20to%20images%2C%20while%20encoders%20map%20images%20to%20semantic%20embeddings%20whose%20coordinates%20empirically%20behave%20as%20Gaussian.%20We%20hypothesize%20that%20both%20are%20views%20of%20a%20shared%20latent%20source%2C%20the%20Universal%20Normal%20Embedding%20%28UNE%29%3A%20an%20approximately%20Gaussian%20latent%20space%20from%20which%20encoder%20embeddings%20and%20DDIM-inverted%20noise%20arise%20as%20noisy%20linear%20projections.%20To%20test%20our%20hypothesis%2C%20we%20introduce%20NoiseZoo%2C%20a%20dataset%20of%20per-image%20latents%20comprising%20DDIM-inverted%20diffusion%20noise%20and%20matching%20encoder%20representations {"title": "GeoFusion-CAD: Structure-Aware Diffusion with Geometric State Space for Parametric 3D Design", "author": "Xiaolei Zhou and Chuangjie Fang and Jie Wu and Jingyi Yang and Boyi Lin and Jianwei Zheng", "abstract": "Parametric Computer-Aided Design (CAD) is fundamental to modern 3D modeling, yet existing methods struggle to generate long command sequences, especially under complex geometric and topological dependencies. Transformer-based architectures dominate CAD sequence generation due to their strong dependency modeling, but their quadratic attention cost and limited context windowing hinder scalability to long programs. We propose GeoFusion-CAD, an end-to-end diffusion framework for scalable and structure-aware generation. Our proposal encodes CAD programs as hierarchical trees, jointly capturing geometry and topology within a state-space diffusion process. Specifically, a lightweight C-Mamba block models long-range structural dependencies through selective state transitions, enabling coherent generation across extended command sequences. To support long-sequence evaluation, we introduce DeepCAD-240, an extended benchmark that increases the sequence length ranging from 40 to 240 while preserving sketch-extrusion semantics from the ABC dataset. Extensive experiments demonstrate that GeoFusion-CAD achieves superior performance on both short and long command ranges, maintaining high geometric fidelity and topological consistency where Transformer-based models degrade. Our approach sets new state-of-the-art scores for long-sequence parametric CAD generation, establishing a scalable foundation for next-generation CAD modeling systems. Code and datasets are available at GitHub.", "link": "http://arxiv.org/abs/2603.21978v1", "date": "2026-03-23", "relevancy": 2.8964, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5976}, {"title": "CAT3D: Create Anything in 3D with Mu etch-extrusion%20semantics%20from%20the%20ABC%20dataset.%20Extensive%20experiments%20demonstrate%20that%20GeoFusion-CAD%20achieves%20superior%20performance%20on%20both%20short%20and%20long%20command%20ranges%2C%20maintaining%20high%20geometric%20fidelity%20and%20topological%20consistency%20where%20Transformer-based%20models%20degrade.%20Our%20approach%20sets%20new%20state-of-the-art%20scores%20for%20long-sequence%20parametric%20CAD%20generation%2C%20establishing%20a%20scalable%20foundation%20for%20next-generation%20CAD%20modeling%20systems.%20Code%20and%20datasets%20are%20available%20at%20GitHub.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21978v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoFusion-CAD%253A%2520Structure-Aware%2520Diffusion%2520with%2520Geometric%2520State%2520Space%2520for%2520Parametric%25203D%2520Design%26entry.906535625%3DXiaolei%2520Zhou%2520and%2520Chuangjie%2520Fang%2520and%2520Jie%2520Wu%2520and%2520Jingyi%2520Yang%2520and%2520Boyi%2520Lin%2520and%2520Jianwei%2520Zheng%26entry.1292438233%3DParametric%2520Computer-Aided%2520Design%2520%2528CAD%2529%2520is%2520fundamental%2520to%2520modern%25203D%2520modeling%252C%2520yet%2520existing%2520methods%2520struggle%2520to%2520generate%2520long%2520command%2520sequences%252C%2520especially%2520under%2520complex%2520geometric%2520and%2520topological%2520dependencies.%2520Transformer-based%2520architectures%2520dominate%2520CAD%2520sequence%2520generation%2520due%2520to%2520their%2520strong%2520dependency%2520modeling%252C%2520but%2520their%2520quadratic%2520attention%2520cost%2520and%2520limited%2520context%2520windowing%2520hinder%2520scalability%2520to%2520long%2520programs.%2520We%2520propose%2520GeoFusion-CAD%252C%2520an%2520end-to-end%2520diffusion%2520framework%2520for%2520scalable%2520and%2520structure-aware%2520generation.%2520Our%2520proposal%2520encodes%2520CAD%2520programs%2520as%2520hierarchical%2520tr {"title": "Manifold-Aware Exploration for Reinforcement Learning in Video Generation", "author": "Mingzhe Zheng and Weijie Kong and Yue Wu and Dengyang Jiang and Yue Ma and Xuanhua He and Bin Lin and Kaixiong Gong and Zhao Zhong and Liefeng Bo and Qifeng Chen and Harry Yang", "abstract": "Group Relative Policy Optimization (GRPO) methods for video generation like FlowGRPO remain far less reliable than their counterparts for language models and images. This gap arises because video generation has a complex solution space, and the ODE-to-SDE conversion used for exploration can inject excess noise, lowering rollout quality and making reward estimates less reliable, which destabilizes post-training alignment. To address this problem, we view the pre-trained model as defining a valid video data manifold and formulate the core problem as constraining exploration within the vicinity of this manifold, ensuring that rollout quality is preserved and reward estimates remain reliable. We propose SAGE-GRPO (Stable Alignment via Exploration), which applies constraints at both micro and macro levels. At the micro level, we derive a precise manifold-aware SDE with a logarithmic curvature correction and introduce a gradient norm equalizer to stabilize sampling and updates across timesteps. At the macro level, we use a dual trust region with a periodic moving anchor and stepwise constraints so that the trust region tracks checkpoints that are closer to the manifold and limits long-horizon drift. We evaluate SAGE-GRPO on HunyuanVideo1.5 using the original VideoAlign as the reward model and observe consistent gains over previous methods in VQ, MQ, TA, and visual metrics (CLIPScore, PickScore), demonstrating superior performance in both reward maximization and overall video quality. The code and visual gallery are available at https://dungeonmassster.github.io/SAGE-GRPO-Page/.", "link": "http://arxiv.org/abs/2603.21872v1", "date": "2026-03-23", "relevancy": 2.8852, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5862}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5812}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5638}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Manifold-Aware%20Exploration%20for%20Reinforcement%20Learning%20in%20Video%20Generation&body=Title%3A%20Manifold-Aware%20Exploration%20for%20Reinforcement%20Learning%20in%20Video%20Generation%0AAuthor%3A%20Mingzhe%20Zheng%20and%20Weijie%20Kong%20and%20Yue%20Wu%20and%20Dengyang%20Jiang%20and%20Yue%20Ma%20and%20Xuanhua%20He%20and%20Bin%20Lin%20and%20Kaixiong%20Gong%20and%20Zhao%20Zhong%20and%20Liefeng%20Bo%20and%20Qifeng%20Chen%20and%20Harry%20Yang%0AAbstract%3A%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20methods%20for%20video%20generation%20like%20FlowGRPO%20remain%20far%20less%20reliable%20than%20their%20counterparts%20for%20language%20models%20and%20images.%20This%20gap%20arises%20because%20video%20generation%20has%20a%20complex%20solution%20space%2C%20and%20the%20ODE-to-SDE%20conversion%20used%20for%20exploration%20can%20inject%20excess%20noise%2C%20lowering%20rollout%20quality%20and%20making%20reward%20estimates%20less%20reliable%2C%20which%20destabilizes%20post-training%20alignment.%20To%20address%20this%20problem%2C%20we%20view%20the%20pre-trained%20model%20as%20defining%20a%20valid%20video%20data%20manifold%20and%20formulate%20the%20core%20problem%20as%20constraining%20exploration%20within%20the%20vicinity%20of%20this%20manifold%2C%20ensuring%20that%20rollout%20quality%20is%20preserved%20and%20reward%20estimates%20remain%20reliable.%20We%20propose%20SAGE-GRPO%20%28Stable%20Alignment%20via%20Exploration%29%2C%20which%20applies%20constraints%20at%20both%20micro%20and%20macro%20levels.%20At%20the%20micro%20level%2C%20we%20derive%20a%20precise%20manifold-aware%20SDE%20with%20a%20logarithmic%20curvature%20correction%20and%20introduce%20a%20gradient%20norm%20equalizer%20to%20stabilize%20sampling%20and%20updates%20across%20timesteps.%20At%20the%20macro%20level%2C%20we%20use%20a%20dual%20trust%20region%20with%20a%20periodic%20moving%20anchor%20and%20stepwise%20constraints%20so%20that%20the%20trust%20region%20tracks%20checkpoints%20that%20are%20closer%20to%20the%20manifold%20and%20limits%20long-horizon%20drift.%20We%20evaluate%20SAGE-GRPO%20on%20HunyuanVideo1.5%20using%20the%20original%20VideoAlign%20as%20the%20reward%20model%20and%20observe%20consistent%20gains%20over%20previous%20methods%20in%20VQ%2C%20MQ%2C%20TA%2C%20and%20visual%20metrics%20%28CLIPScore%2C%20PickScore%29%2C%20demonstrating%20superior%20performance%20in%20both%20reward%20maximization%20and%20overall%20video%20quality.%20The%20code%20and%20visual%20gallery%20are%20available%20at%20https%3A//dungeonmassster.github.io/SAGE-GRPO-Page/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21872v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DManifold-Aware%2520Exploration%2520for%2520Reinforcement%2520Learning%2520in%2520Video%2520Generation%26entry.906535625%3DMingzhe%2520Zheng%2520and%2520Weijie%2520Kong%2520and%2520Yue%2520Wu%2520and%2520Dengyang%2520Jiang%2520and%2520Yue%2520Ma%2520and%2520Xuanhua%2520He%2520and%2520Bin%2520Lin%2520and%2520Kaixiong%2520Gong%2520and%2520Zhao%2520Zhong%2520and%2520Liefeng%2520Bo%2520and%2520Qifeng%2520Chen%2520and%2520Harry%2520Yang%26entry.1292438233%3DGroup%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520methods%2520for%2520video%2520generation%2520like%2520FlowGRPO%2520remain%2520far%2520less%2520reliable%2520than%2520their%2520counterparts%2520for%2520language%2520models%2520and%2520images.%2520This%2520gap%2520arises%2520because%2520video%2520generation%2520has%2520a%2520co ction%20and%20introduce%20a%20gradient%20norm%20equalizer%20to%20stabilize%20sampling%20and%20updates%20across%20timesteps.%20At%20the%20macro%20level%2C%20we%20use%20a%20dual%20trust%20region%20with%20a%20periodic%20moving%20anchor%20and%20stepwise%20constraints%20so%20that%20the%20trust%20region%20tracks%20checkpoints%20that%20are%20closer%20to%20the%20manifold%20and%20limits%20long-horizon%20drift.%20We%20evaluate%20SAGE-GRPO%20on%20HunyuanVideo1.5%20using%20the%20original%20VideoAlign%20as%20the%20reward%20model%20and%20observe%20consistent%20gains%20over%20previous%20methods%20in%20VQ%2C%20MQ%2C%20TA%2C%20and%20visual%20metrics%20%28CLIPScore%2C%20PickScore%29%2C%20demonstrating%20superior%20performance%20in%20both%20reward%20maximization%20and%20overall%20video%20quality.%20The%20code%20and%20visual%20gallery%20are%20available%20at%20https%3A//dungeonmassster.github.io/SAGE-GRPO-Page/.&entry.1838667208=http%3A//arxiv.org/abs/2603.21872v1&entry.124074799=Read"},
{"title": "Benchmarking Deep Learning Models for Aerial LiDAR Point Cloud Semantic Segmentation under Real Acquisition Conditions: A Case Study in Navarre", "author": "Alex Salvatierra and Jos\u00e9 Antonio Sanz and Christian Guti\u00e9rrez and Mikel Galar", "abstract": "Recent advances in deep learning have significantly improved 3D semantic segmentation, but most models focus on indoor or terrestrial datasets. Their behavior under real aerial acquisition conditions remains insufficiently explored, and although a few studies have addressed similar scenarios, they differ in dataset design, acquisition conditions, and model selection. To address this gap, we conduct an experimental benchmark evaluating several state-of-the-art architectures on a large-scale aerial LiDAR dataset acquired under operational flight conditions in Navarre, Spain, covering heterogeneous urban, rural, and industrial landscapes. This study compares four representative deep learning models, including KPConv, RandLA-Net, Superpoint Transformer, and Point Transformer V3, across five semantic classes commonly found in airborne surveys, such as ground, vegetation, buildings, and vehicles, highlighting the inherent challenges of class imbalance and geometric variability in aerial data. Results show that all tested models achieve high overall accuracy exceeding 93%, with KPConv attaining the highest mean IoU (78.51%) through consistent performance across classes, particularly on challenging and underrepresented categories. Point Transformer V3 demonstrates superior performance on the underrepresented vehicle class (75.11% IoU), while Superpoint Transformer and RandLA-Net trade off segmentation robustness for computational efficiency.", "link": "http://arxiv.org/abs/2603.22229v1", "date": "2026-03-23", "relevancy": 2.8758, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5775}, {"t %20surveys%2C%20such%20as%20ground%2C%20vegetation%2C%20buildings%2C%20and%20vehicles%2C%20highlighting%20the%20inherent%20challenges%20of%20class%20imbalance%20and%20geometric%20variability%20in%20aerial%20data.%20Results%20show%20that%20all%20tested%20models%20achieve%20high%20overall%20accuracy%20exceeding%2093%25%2C%20with%20KPConv%20attaining%20the%20highest%20mean%20IoU%20%2878.51%25%29%20through%20consistent%20performance%20across%20classes%2C%20particularly%20on%20challenging%20and%20underrepresented%20categories.%20Point%20Transformer%20V3%20demonstrates%20superior%20performance%20on%20the%20underrepresented%20vehicle%20class%20%2875.11%25%20IoU%29%2C%20while%20Superpoint%20Transformer%20and%20RandLA-Net%20trade%20off%20segmentation%20robustness%20for%20computational%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22229v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Deep%2520Learning%2520Models%2520for%2520Aerial%2520LiDAR%2520Point%2520Cloud%2520Semantic%2520Segmentation%2520under%2520Real%2520Acquisition%2520Conditions%253A%2520A%2520Case%2520Study%2520in%2520Navarre%26entry.906535625%3DAlex%2520Salvatierra%2520and%2520Jos%25C3%25A9%2520Antonio%2520Sanz%2520and%2520Christian%2520Guti%25C3%25A9rrez%2520and%2520Mikel%2520Galar%26entry.1292438233%3DRecent%2520advances%2520in%2520deep%2520learning%2520have%2520significantly%2520improved%25203D%2520semantic%2520segmentation%252C%2520but%2520most%2520models%2520focus%2520on%2520indoor%2520or%2520terrestrial%2520datasets.%2520Their%2520behavior%2520under%2520real%2520aerial%2520acquisition%2520conditions%2520remains%2520insufficiently%2520explored%252C%2520and%2520although%2520a%2520few%2520studies%2520have%2520addressed%2520similar%2520scenarios%252C%2520they%2520differ%2520in%2520dataset%2520design%252C%2520acquisition%2520conditions%252C%2520and%2520model%2520selection.%2520To%2520address%2520this% {"title": "CIGPose: Causal Intervention Graph Neural Network for Whole-Body Pose Estimation", "author": "Bohao Li and Zhicheng Cao and Huixian Li and Yangming Guo", "abstract": "State-of-the-art whole-body pose estimators often lack robustness, producing anatomically implausible predictions in challenging scenes. We posit this failure stems from spurious correlations learned from visual context, a problem we formalize using a Structural Causal Model (SCM). The SCM identifies visual context as a confounder that creates a non-causal backdoor path, corrupting the model's reasoning. We introduce the Causal Intervention Graph Pose (CIGPose) framework to address this by approximating the true causal effect between visual evidence and pose. The core of CIGPose is a novel Causal Intervention Module: it first identifies confounded keypoint representations via predictive uncertainty and then replaces them with learned, context-invariant canonical embeddings. These deconfounded embeddings are processed by a hierarchical graph neural network that reasons over the human skeleton at both local and global semantic levels to enforce anatomical plausibility. Extensive experiments show CIGPose achieves a new state-of-the-art on COCO-WholeBody. Notably, our CIGPose-x model achieves 67.0\\% AP, surpassing prior methods that rely on extra training data. With the additional UBody dataset, CIGPose-x is further boosted to 67.5\\% AP, demonstrating superior robustness and data efficiency. The codes and models are publicly available at https://github.com/53mins/CIGPose.", "link": "http://arxiv.org/abs/2603.09418v2", "date": "2026-03-23", "relevancy": 2.8637, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5771}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.575}, {"title": "PoseAnimate: Zero-shot high {"title": "VideoDetective: Clue Hunting via both Extrinsic Query and Intrinsic Relevance for Long Video Understanding", "author": "Ruoliu Yang and Chu Wu and Caifeng Shan and Ran He and Chaoyou Fu", "abstract": "Long video understanding remains challenging for multimodal large language models (MLLMs) due to limited context windows, which necessitate identifying sparse query-relevant video segments. However, existing methods predominantly localize clues based solely on the query, overlooking the video's intrinsic structure and varying relevance across segments. To address this, we propose VideoDetective, a framework that integrates query-to-segment relevance and inter-segment affinity for effective clue hunting in long-video question answering. Specifically, we divide a video into various segments and represent them as a visual-temporal affinity graph built from visual similarity and temporal proximity. We then perform a Hypothesis-Verification-Refinement loop to estimate relevance scores of observed segments to the query and propagate them to unseen segments, yielding a global relevance distribution that guides the localization of the most critical segments for final answering with sparse observation. Experiments show our method consistently achieves substantial gains across a wide range of mainstream MLLMs on representative benchmarks, with accuracy improvements of up to 7.5% on VideoMME-long. Our code is available at https://videodetective.github.io/", "link": "http://arxiv.org/abs/2603.22285v1", "date": "2026-03-23", "relevancy": 2.8488, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5854}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5854}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoDetective%3A%20Clue%20Hunting%20via%20both%20Extrinsic%20Query%20and%20Intrinsic%20Relevance%20for%20Long%20Video%20Understanding&body=Title%3A%20VideoDetective%3A%20Clue%20Hunting%20via%20both%20Extrinsic%20Query%20and%20Intrinsic%20Relevance%20for%20Long%20Video%20Understanding%0AAuthor%3A%20Ruoliu%20Yang%20and%20Chu%20Wu%20and%20Caifeng%20Shan%20and%20Ran%20He%20and%20Chaoyou%20Fu%0AAbstract%3A%20Long%20video%20understanding%20remains%20challenging%20for%20multimodal%20large%20language%20models%20%28MLLMs%29%20due%20to%20limited%20context%20windows%2C%20which%20necessitate%20identifying%20sparse%20query-relevant%20video%20segments.%20However%2C%20existing%20methods%20predominantly%20localize%20clues%20based%20solely%20on%20the%20query%2C%20overlooking%20the%20video%27s%20intrinsic%20structure%20and%20varying%20relevance%20across%20segments.%20To%20address%20this%2C%20we%20propose%20VideoDetective%2C%20a%20framework%20that%20integrates%20query-to-segment%20relevance%20and%20inter-segment%20affinity%20for%20effective%20clue%20hunting%20in%20long-video%20question%20answering.%20Specifically%2C%20we%20divide%20a%20video%20into%20various%20segments%20and%20represent%20them%20as%20a%20visual-temporal%20affinity%20graph%20built%20from%20visual%20similarity%20and%20temporal%20proximity.%20We%20then%20perform%20a%20Hypothesis-Verification-Refinement%20loop%20to%20estimate%20relevance%20scores%20of%20observed%20segments%20to%20the%20query%20and%20propagate%20them%20to%20unseen%20segments%2C%20yielding%20a%20global%20relevance%20distribution%20that%20guides%20the%20localization%20of%20the%20most%20critical%20segments%20for%20final%20answering%20with%20sparse%20observation.%20Experiments%20show%20our%20method%20consistently%20achieves%20substantial%20gains%20across%20a%20wide%20range%20of%20mainstream%20MLLMs%20on%20representative%20benchmarks%2C%20with%20accuracy%20improvements%20of%20up%20to%207.5%25%20on%20VideoMME-long.%20Our%20code%20is%20available%20at%20https%3A//videodetective.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2603.22285v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoDetective%253A%2520Clue%2520Hunting%2520via%2520both%2520Extrinsic%2520Query%2520and%2520Intrinsic%2520Relevance%2520for%2520Long%2520Video%2520Understanding%26entry.906535625%3DRuoliu%2520Yang%2520and%2520Chu%2520Wu%2520and%2520Caifeng%2520Shan%2520and%2520Ran%2520He%2520and%2520Chaoyou%2520Fu%26entry.1292438233%3DLong%2520video%2520understanding%2520remains%2520challenging%2520for%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520due%2520to%2520limited%2520context%2520windows%252C%2520which%2520necessitate%2520identifying%2520sparse%2520query-relevant%2520video%2520segments.%2520However%252C%2520existing%2520methods%2520predominantly%2520localize%2520clues%2520based%2520solely%2520on%2520the%2520query%252C%2520overlooking%2520the%2520video%2527s%2520intrinsic%2520structure%2520and%2520varying%2520relevance%2520across%2520segments.%2520To%2520address%2520this%252C%2520we%2520propose%2520VideoDetective%252C%2520a%2520framework%2520that%2520integrates%2520query-to-segment%2520relevance%2520and%2520inter-segment%2520affinity%2520for%2520effective%2520clue%2520hunting%2520in%2520long-video%2520question%2520answering.%2520Specifically%252C%2520we%2520divide%2520a%2520video%2520into%2520various%2520segments%2520and%2520represent%2520them%2520as%2520a%2520visual-temporal%2520affinity%2520graph%2520built%2520from%2520visual%2520similarity%2520and%2520temporal%2520proximity.%2520We%2520then%2520perform%2520a%2520Hypothesis-Verification-Refinement%2520loop%2520to%2520estimate%2520relevance%2520scores%2520of%2520observed%2520segments%2520to%2520the%2520query%2520and%2520propagate%2520them% {"title": "GeoFlow: Real-Time Fine-Grained Cross-View Geolocalization via Iterative Flow Prediction", "author": "Ayesh Abu Lehyeh and Xiaohan Zhang and Ahmad Arrabi and Waqas Sultani and Chen Chen and Safwan Wshah", "abstract": "Accurate and fast localization is vital for safe autonomous navigation in GPS-denied areas. Fine-Grained Cross-View Geolocalization (FG-CVG) aims to estimate the precise 2-Degree-of-Freedom (2-DoF) location of a ground image relative to a satellite image. However, current methods force a difficult trade-off, with high-accuracy models being slow for real-time use. In this paper, we introduce GeoFlow, a new approach that offers a lightweight and highly efficient framework that breaks this accuracy-speed trade-off. Our technique learns a direct probabilistic mapping, predicting the displacement (in distance and direction) required to correct any given location hypothesis. This is complemented by our novel inference algorithm, Iterative Refinement Sampling (IRS). Instead of trusting a single prediction, IRS refines a population of hypotheses, allowing them to iteratively 'flow' from random starting points to a robust, converged consensus. Even its iterative nature, this approach offers flexible inference-time scaling, allowing a direct trade-off between performance and computation without any re-training. Experiments on the KITTI and VIGOR datasets show that GeoFlow achieves state-of-the-art efficiency, running at real-time speeds of 29 FPS while maintaining competitive localization accuracy. This work opens a new path for the development of practical real-time geolocalization systems.", "link": "http://arxiv.org/abs/2603.21943v1", "date": "2026-03-23", "relevancy": 2.818, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5832}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http:/ {"title": "ELVIS: Enhance Low-Light for Video Instance Segmentation in the Dark", "author": "Joanne Lin and Ruirui Lin and Yini Li and David Bull and Nantheera Anantrasirichai", "abstract": "Video instance segmentation (VIS) for low-light content remains highly challenging for both humans and machines alike, due to noise, blur and other adverse conditions. The lack of large-scale annotated datasets and the limitations of current synthetic pipelines, particularly in modeling temporal degradations, further hinder progress. Moreover, existing VIS methods are not robust to the degradations found in low-light videos and, consequently, perform poorly even after finetuning. In this paper, we introduce \\textbf{ELVIS} (\\textbf{E}nhance \\textbf{L}ow-Light for \\textbf{V}ideo \\textbf{I}nstance \\textbf{S}egmentation), a framework that enables domain adaptation of state-of-the-art VIS models to low-light scenarios. ELVIS is comprised of an unsupervised synthetic low-light video pipeline that models both spatial and temporal degradations, a calibration-free degradation profile estimation network (VDP-Net) and an enhancement decoder head that disentangles degradations from content features. ELVIS improves performances by up to \\textbf{+3.7AP} on the synthetic low-light YouTube-VIS 2019 dataset and beats two-stage baselines by at least \\textbf{+2.8AP} on real low-light videos. Code and dataset available at: \\href{https://joannelin168.github.io/research/ELVIS}{https://joannelin168.github.io/research/ELVIS}", "link": "http://arxiv.org/abs/2512.01495v2", "date": "2026-03-23", "relevancy": 2.7881, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5581}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5574}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "Unleashing Video Language Models for Fine-grained HRCT Report Generation", "author": "Yingying Fang and Huichi Zhou and KinHei Lee and Yijia Wang and Zhenxuan Zhang and Jiahao Huang and Guang Yang", "abstract": "Generating precise diagnostic reports from High-Resolution Computed Tomography (HRCT) is critical for clinical workflow, yet it remains a formidable challenge due to the high pathological diversity and spatial sparsity within 3D volumes. While Video Language Models (VideoLMs) have demonstrated remarkable spatio-temporal reasoning in general domains, their adaptability to domain-specific, high-volume medical interpretation remains underexplored. In this work, we present AbSteering, an abnormality-centric framework that steers VideoLMs toward precise HRCT report generation. Specifically, AbSteering introduces: (i) an abnormality-centric Chain-of-Thought scheme that enforces abnormality reasoning, and (ii) a Direct Preference Optimization objective that utilizes clinically confusable abnormalities as hard negatives to enhance fine-grained discrimination. Our results demonstrate that general-purpose VideoLMs possess strong transferability to high-volume medical imaging when guided by this paradigm. Notably, AbSteering outperforms state-of-the-art domain-specific CT foundation models, which are pretrained with large-scale CTs, achieving superior detection sensitivity while simultaneously mitigating hallucinations.", "link": "http://arxiv.org/abs/2603.12469v2", "date": "2026-03-23", "relevancy": 2.7788, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5615}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5615}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1",

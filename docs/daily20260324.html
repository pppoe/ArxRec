{"title": "STENet: Superpixel Token Enhancing Network for RGB-D Salient Object Detection", "author": "Jianlin Chen and Gongyang Li and Zhijiang Zhang and Liang Chang and Dan Zeng", "abstract": "Transformer-based methods for RGB-D Salient Object Detection (SOD) have gained significant interest, owing to the transformer's exceptional capacity to capture long-range pixel dependencies. Nevertheless, current RGB-D SOD methods face challenges, such as the quadratic complexity of the attention mechanism and the limited local detail extraction. To overcome these limitations, we propose a novel Superpixel Token Enhancing Network (STENet), which introduces superpixels into cross-modal interaction. STENet follows the two-stream encoder-decoder structure. Its cores are two tailored superpixel-driven cross-modal interaction modules, responsible for global and local feature enhancement. Specifically, we update the superpixel generation method by expanding the neighborhood range of each superpixel, allowing for flexible transformation between pixels and superpixels. With the updated superpixel generation method, we first propose the Superpixel Attention Global Enhancing Module to model the global pixel-to-superpixel relationship rather than the traditional global pixel-to-pixel relationship, which can capture region-level information and reduce computational complexity. We also propose the Superpixel Attention Local Refining Module, which leverages pixel similarity within superpixels to filter out a subset of pixels (i.e., local pixels) and then performs feature enhancement on these local pixels, thereby capturing concerned local details. Furthermore, we fuse the globally and locally enhanced features along with the cross-scale features to achieve comprehensive feature representation. Experiments on seven RGB-D SOD datasets reveal that our STENet achieves competitive performance compared to state-of-the-art methods. The code and results of our method are available at https://github.com/Mark9010/STENet.", "link": "http://arxiv.org/abs/2603.21999v1", "date": "2026-03-23", "relevancy": 2.7574, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.567}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.546}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5415}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20STENet%3A%20Superpixel%20Token%20Enhancing%20Network%20for%20RGB-D%20Salient%20Object%20Detection&body=Title%3A%20STENet%3A%20Superpixel%20Token%20Enhancing%20Network%20for%20RGB-D%20Salient%20Object%20Detection%0AAuthor%3A%20Jianlin%20Chen%20and%20Gongyang%20Li%20and%20Zhijiang%20Zhang%20and%20Liang%20Chang%20and%20Dan%20Zeng%0AAbstract%3A%20Transformer-based%20methods%20for%20RGB-D%20Salient%20Object%20Detection%20%28SOD%29%20have%20gained%20significant%20interest%2C%20owing%20to%20the%20transformer%27s%20exceptional%20capacity%20to%20capture%20long-range%20pixel%20dependencies.%20Nevertheless%2C%20current%20RGB-D%20SOD%20methods%20face%20challenges%2C%20such%20as%20the%20quadratic%20complexity%20of%20the%20attention%20mechanism%20and%20the%20limited%20local%20detail%20extraction.%20To%20overcome%20these%20limitations%2C%20we%20propose%20a%20novel%20Superpixel%20Token%20Enhancing%20Network%20%28STENet%29%2C%20which%20introduces%20superpixels%20into%20cross-modal%20interaction.%20STENet%20follows%20the%20two-stream%20encoder-decoder%20structure.%20Its%20cores%20are%20two%20tailored%20superpixel-driven%20cross-modal%20interaction%20modules%2C%20responsible%20for%20global%20and%20local%20feature%20enhancement.%20Specifically%2C%20we%20update%20the%20superpixel%20generation%20method%20by%20expanding%20the%20neighborhood%20range%20of%20each%20superpixel%2C%20allowing%20for%20flexible%20transformation%20between%20pixels%20and%20superpixels.%20With%20the%20updated%20superpixel%20generation%20method%2C%20we%20first%20propose%20the%20Superpixel%20Attention%20Global%20Enhancing%20Module%20to%20model%20the%20global%20pixel-to-superpixel%20relationship%20rather%20than%20the%20traditional%20global%20pixel-to-pixel%20relationship%2C%20which%20can%20capture%20region-level%20information%20and%20reduce%20computational%20complexity.%20We%20also%20propose%20the%20Superpixel%20Attention%20Local%20Refining%20Module%2C%20which%20leverages%20pixel%20similarity%20within%20superpixels%20to%20filter%20out%20a%20subset%20of%20pixels%20%28i.e.%2C%20local%20pixels%29%20and%20then%20performs%20feature%20enhancement%20on%20these%20local%20pixels%2C%20thereby%20capturing%20concerned%20local%20details.%20Furthermore%2C%20we%20fuse%20the%20globally%20and%20locally%20enhanced%20features%20along%20with%20the%20cross-scale%20features%20to%20achieve%20comprehensive%20feature%20representation.%20Experiments%20on%20seven%20RGB-D%20SOD%20datasets%20reveal%20that%20our%20STENet%20achieves%20competitive%20performance%20compared%20to%20state-of-the-art%20methods.%20The%20code%20and%20results%20of%20our%20method%20are%20available%20at%20https%3A//github.com/Mark9010/STENet.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21999v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTENet%253A%2520Superpixel%2520Token%2520Enhancing%2520Network%2520for%2520RGB-D%2520Salient%2520Object%2520Detection%26entry.906535625%3DJianlin%2520Chen%2520and%2520Gongyang%2520Li%2520and%2520Zhijiang%2520Zhang%2520and%2520Liang%2520Chang%2520and%2520Dan%2520Zeng%26entry.1292438233%3DTransformer-based%2520methods%2520for%2520RGB-D%2520Salient%2520Object%2520Detection%2520%2528SOD%2529%2520have%2520gained%2520significant%2520interest%252C%2520owing%2520to%2520the ese%2520local%2520pixels%252C%2520thereby%2520capturing%2520concerned%2520local%2520details.%2520Furthermore%252C%2520we%2520fuse%2520the%2520globally%2520and%2520locally%2520enhanced%2520features%2520along%2520with%2520the%2520cross-scale%2520features%2520to%2520achieve%2520comprehensive%2520feature%2520representation.%2520Experiments%2520on%2520seven%2520RGB-D%2520SOD%2520datasets%2520reveal%2520that%2520our%2520STENet%2520achieves%2520competitive%2520performance%2520compared%2520to%2520state-of-the-art%2520methods.%2520The%2520code%2520and%2520results%2520of%2520our%2520method%2520are%2520available%2520at%2520https%253A//github.com/Mark9010/STENet.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21999v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=STENet%3A%20Superpixel%20Token%20Enhancing%20Network%20for%20RGB-D%20Salient%20Object%20Detection&entry.906535625=Jianlin%20Chen%20and%20Gongyang%20Li%20and%20Zhijiang%20Zhang%20and%20Liang%20Chang%20and%20Dan%20Zeng&entry.1292438233=Transformer-based%20methods%20for%20RGB-D%20Salient%20Object%20Detection%20%28SOD%29%20have%20gained%20significant%20interest%2C%20owing%20to%20the%20transformer%27s%20exceptional%20capacity%20to%20capture%20long-range%20pixel%20dependencies.%20Nevertheless%2C%20current%20RGB-D%20SOD%20methods%20face%20challenges%2C%20such%20as%20the%20quadratic%20complexity%20of%20the%20attention%20mechanism%20and%20the%20limited%20local%20detail%20extraction.%20To%20overcome%20these%20limitations%2C%20we%20propose%20a%20novel%20Superpixel%20Token%20Enhancing%20Network%20%28STENet%29%2C%20which%20introduces%20superpixels%20into%20cross-modal%20interaction.%20STENet%20follows%20the%20two-stream%20encoder-decoder%20structure.%20Its%20cores%20are%20two%20tailored%20superpixel-driven%20cross-modal%20interaction%20modules%2C%20responsible%20for%20global%20and%20local%20feature%20enhancement.%20Specifically%2C%20we%20update%20the%20superpixel%20generation%20method%20by%20expanding%20the%20neighborhood%20range%20of%20each%20superpixel%2C%20allowing%20for%20flexible%20transformation%20between%20pixels%20and%20superpixels.%20With%20the%20updated%20superpixel%20generation%20method%2C%20we%20first%20propose%20the%20Superpixel%20Attention%20Global%20Enhancing%20Module%20to%20model%20the%20global%20pixel-to-superpixel%20relationship%20rather%20than%20the%20traditional%20global%20pixel-to-pixel%20relationship%2C%20which%20can%20capture%20region-level%20information%20and%20reduce%20computational%20complexity.%20We%20also%20propose%20the%20Superpixel%20Attention%20Local%20Refining%20Module%2C%20which%20leverages%20pixel%20similarity%20within%20superpixels%20to%20filter%20out%20a%20subset%20of%20pixels%20%28i.e.%2C%20local%20pixels%29%20and%20then%20performs%20feature%20enhancement%20on%20these%20local%20pixels%2C%20thereby%20capturing%20concerned%20local%20details.%20Furthermore%2C%20we%20fuse%20the%20globally%20and%20locally%20enhanced%20features%20along%20with%20the%20cross-scale%20features%20to%20achieve%20comprehensive%20feature%20representation.%20Experiments%20on%20seven%20RGB-D%20SOD%20datasets%20reveal%20that%20our%20STENet%20achieves%20competitive%20performance%20compared%20to%20state-of-the-art%20methods.%20The%20code%20and%20results%20of%20our%20method%20are%20available%20at%20https%3A//github.com/Mark9010/STENet.&entry.1838667208=http%3A//arxiv.org/abs/2603.21999v1&entry.124074799=Read"},
{"title": "TPCL: Task Progressive Curriculum Learning for Robust Visual Question Answering", "author": "Ahmed Akl and Abdelwahed Khamis and Zhe Wang and Ali Cheraghian and Sara Khalifa and Kewen Wang", "abstract": "Visual Question Answering (VQA) systems are notoriously brittle under distribution shifts and data scarcity. While previous solutions-such as ensemble methods and data augmentation-can improve performance in isolation, they fail to generalise well across in-distribution (IID), out-of-distribution (OOD), and low-data settings simultaneously. We argue that this limitation stems from the suboptimal training strategies employed. Specifically, treating all training samples uniformly-without accounting for question difficulty or semantic structure-leaves the models vulnerable to dataset biases. Thus, they struggle to generalise beyond the training distribution. To address this issue, we introduce Task-Progressive Curriculum Learning (TPCL)-a simple, model-agnostic framework that progressively trains VQA models using a curriculum built by jointly considering question type and difficulty. Specifically, TPCL first groups questions based on their semantic type (e.g., yes/no, counting) and then orders them using a novel Optimal Transport-based difficulty measure. Without relying on data augmentation or explicit debiasing, TPCL improves generalisation across IID, OOD, and low-data regimes and achieves state-of-the-art performance on VQA-CP v2, VQA-CP v1, and VQA v2. It outperforms the most competitive robust VQA baselines by over 5% and 7% on VQA-CP v2 and v1, respectively, and boosts backbone performance by up to 28.5%.", "link": "http://arxiv.org/abs/2411.17292v2", "date": "2026-03-23", "relevancy": 2.7526, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5558}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "htt {"title": "ACPO: Counteracting Likelihood Displacement in Vision-Language Alignment with Asymmetric Constraints", "author": "Kaili Huang and Hongming Zhang and Rui Shen and Linjun Dai and Jiahao Wang and Hanming Deng and Lewei Lu", "abstract": "While Direct Preference Optimization (DPO) has become the de facto approach for aligning Large Vision-Language Models (LVLMs), it suffers from Likelihood Displacement, where the probability of both chosen and rejected responses collapses. This optimization flaw is especially detrimental in multimodal settings: the erosion of chosen likelihoods -- a failure we term Visual Anchor Collapse -- causes models to abandon visual evidence for strong language priors, precipitating significant hallucinations. To address this, we propose Asymmetric Constrained Preference Optimization (ACPO), a modality-agnostic alignment mechanism that applies dynamic, target-oriented scaling to preference optimization. ACPO derives a complexity-aware scaling coefficient applied exclusively to the rejected reward, asymmetrically suppressing the gradient flow on the rejected term while preserving the chosen distribution as a gradient-stable reference. While fundamentally a general-purpose objective, breaking this gradient symmetry is crucial for multimodal tasks, as it mitigates the suppression of visual tokens by language priors. Experiments on InternVL models demonstrate that ACPO effectively reverses the chosen-reward degradation of standard DPO. By halting Visual Anchor Collapse, ACPO generally outperforms baselines on hallucination benchmarks (HallusionBench, MM-IFEval) and general leaderboards (MMBench, MMStar, OCRBenchV2) while driving concurrent improvements in general capabilities.", "link": "http://arxiv.org/abs/2603.22165v1", "date": "2026-03-23", "relevancy": 2.7463, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5284}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ACPO%3A%20Counteracting%20Likelihood%20Displacement%20in%20Vision-Language%20Alignment%20with%20Asymmetric%20Constraints&body=Title%3A%20ACPO%3A%20Counteracting%20Likelihood%20Displacement%20in%20Vision-Language%20Alignment%20with%20Asymmetric%20Constraints%0AAuthor%3A%20Kaili%20Huang%20and%20Hongming%20Zhang%20and%20Rui%20Shen%20and%20Linjun%20Dai%20and%20Jiahao%20Wang%20and%20Hanming%20Deng%20and%20Lewei%20Lu%0AAbstract%3A%20While%20Direct%20Preference%20Optimization%20%28DPO%29%20has%20become%20the%20de%20facto%20approach%20for%20aligning%20Large%20Vision-Language%20Models%20%28LVLMs%29%2C%20it%20suffers%20from%20Likelihood%20Displacement%2C%20where%20the%20probability%20of%20both%20chosen%20and%20rejected%20responses%20collapses.%20This%20optimization%20flaw%20is%20especially%20detrimental%20in%20multimodal%20settings%3A%20the%20erosion%20of%20chosen%20likelihoods%20--%20a%20failure%20we%20term%20Visual%20Anchor%20Collapse%20--%20causes%20models%20to%20abandon%20visual%20evidence%20for%20strong%20language%20priors%2C%20precipitating%20significant%20hallucinations.%20To%20address%20this%2C%20we%20propose%20Asymmetric%20Constrained%20Preference%20Optimization%20%28ACPO%29%2C%20a%20modality-agnostic%20alignment%20mechanism%20that%20applies%20dynamic%2C%20target-oriented%20scaling%20to%20preference%20optimization.%20ACPO%20derives%20a%20complexity-aware%20scaling%20coefficient%20applied%20exclusively%20to%20the%20rejected%20reward%2C%20asymmetrically%20suppressing%20the%20gradient%20flow%20on%20the%20rejected%20term%20while%20preserving%20the%20chosen%20distribution%20as%20a%20gradient-stable%20reference.%20While%20fundamentally%20a%20general-purpose%20objective%2C%20breaking%20this%20gradient%20symmetry%20is%20crucial%20for%20multimodal%20tasks%2C%20as%20it%20mitigates%20the%20suppression%20of%20visual%20tokens%20by%20language%20priors.%20Experiments%20on%20InternVL%20models%20demonstrate%20that%20ACPO%20effectively%20reverses%20the%20chosen-reward%20degradation%20of%20standard%20DPO.%20By%20halting%20Visual%20Anchor%20Collapse%2C%20ACPO%20generally%20outperforms%20baselines%20on%20hallucination%20benchmarks%20%28HallusionBench%2C%20MM-IFEval%29%20and%20general%20leaderboards%20%28MMBench%2C%20MMStar%2C%20OCRBenchV2%29%20while%20driving%20concurrent%20improvements%20in%20general%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22165v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DACPO%253A%2520Counteracting%2520Likelihood%2520Displacement%2520in%2520Vision-Language%2520Alignment%2520with%2520Asymmetric%2520Constraints%26entry.906535625%3DKaili%2520Huang%2520and%2520Hongming%2520Zhang%2520and%2520Rui%2520Shen%2520and%2520Linjun%2520Dai%2520and%2520Jiahao%2520Wang%2520and%2520Hanming%2520Deng%2520and%2520Lewei%2520Lu%26entry.1292438233%3DWhile%2520Direct%2520Preference%2520Optimization%2520%2528DPO%2529%2520has%2520become%2520the%2520de%2520facto%2520approach%2520for%2520aligning%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%252C%2520it%2520suffers%2520from%2520Likelihood%2520Displacement%252C%2520where%2520the%2520probability%2520of%2520both%2520chosen%2520and%2520rejected%2520responses%2520collapses.%2520This%2520optimization%2520flaw%2520is%2520especially%2520detrimental%2520in%2520multimodal%2520settings%253A%2520the%2520erosion%2520of%2520chosen%2520likelihoods%2520--%2520a%2520failure%2520we%2520term%2520Visual%2520Anchor%2520Collapse%2520--%2520causes%2520models%2520to%2520abandon%2520visual%2520evidence%2520for%2520strong%2520language%2520priors%2 {"title": "BERnaT: Basque Encoders for Representing Natural Textual Diversity", "author": "Ekhi Azurmendi and Joseba Fernandez de Landa and Jaione Bengoetxea and Maite Heredia and Julen Etxaniz and Mikel Zubillaga and Ander Soraluze and Aitor Soroa", "abstract": "Language models depend on massive text corpora that are often filtered for quality, a process that can unintentionally exclude non-standard linguistic varieties, reduce model robustness and reinforce representational biases. In this paper, we argue that language models should aim to capture the full spectrum of language variation (dialectal, historical, informal, etc.) rather than relying solely on standardized text. Focusing on the Basque language, we construct new corpora combining standard, social media, and historical sources, and pre-train the BERnaT family of encoder-only models in three configurations: standard, diverse, and combined. We further propose an evaluation framework that separates Natural Language Understanding (NLU) tasks into standard and diverse subsets to assess linguistic generalization. Results show that models trained on both standard and diverse data consistently outperform those trained on standard corpora, improving performance across all task types without compromising standard benchmark accuracy. These findings highlight the importance of linguistic diversity in building inclusive, generalizable language models.", "link": "http://arxiv.org/abs/2512.03903v2", "date": "2026-03-23", "relevancy": 2.7061, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5555}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5555}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity" {"title": "Adversarial Camouflage", "author": "Pawe\u0142 Borsukiewicz and Daniele Lunghi and Melissa Tessa and Jacques Klein and Tegawend\u00e9 F. Bissyand\u00e9", "abstract": "While the rapid development of facial recognition algorithms has enabled numerous beneficial applications, their widespread deployment has raised significant concerns about the risks of mass surveillance and threats to individual privacy. In this paper, we introduce \\textit{Adversarial Camouflage} as a novel solution for protecting users' privacy. This approach is designed to be efficient and simple to reproduce for users in the physical world. The algorithm starts by defining a low-dimensional pattern space parameterized by color, shape, and angle. Optimized patterns, once found, are projected onto semantically valid facial regions for evaluation. Our method maximizes recognition error across multiple architectures, ensuring high cross-model transferability even against black-box systems. It significantly degrades the performance of all tested state-of-the-art face recognition models during simulations and demonstrates promising results in real-world human experiments, while revealing differences in model robustness and evidence of attack transferability across architectures.", "link": "http://arxiv.org/abs/2603.21867v1", "date": "2026-03-23", "relevancy": 2.672, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5406}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5386}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.524}], "mailto": "mailto {"title": "SCAIL: Towards Studio-Grade Character Animation via In-Context Learning of 3D-Consistent Pose Representations", "author": "Wenhao Yan and Sheng Ye and Zhuoyi Yang and Jiayan Teng and ZhenHui Dong and Kairui Wen and Xiaotao Gu and Yong-Jin Liu and Jie Tang", "abstract": "Achieving controllable character animation that meets studio-grade standards remains challenging despite recent progress. Existing approaches can transfer motion from a driving video to a reference image, but often fail to preserve structural fidelity and temporal consistency in wild scenarios involving complex motion and cross-identity animations. In this work, we present \\textbf{SCAIL} (a framework toward \\textbf{S}tudio-grade \\textbf{C}haracter \\textbf{A}nimation via \\textbf{I}n-context \\textbf{L}earning), which is designed to address these challenges from two key innovations. First, we propose a novel 3D pose representation, providing a robust and flexible motion signal. Second, we introduce a full-context pose injection mechanism within a diffusion-transformer, enabling effective spatio-temporal reasoning over full motion sequences. To align with studio-grade requirements, we develop a curated data pipeline ensuring both diversity and quality, and establish a comprehensive benchmark for systematic evaluation. Experiments show that \\textbf{SCAIL} achieves state-of-the-art performance and advances character animation toward studio-grade controlling. Code and model are available at \\href{https://github.com/zai-org/SCAIL}{zai-org/SCAIL}.", "link": "http://arxiv.org/abs/2512.05905v3", "date": "2026-03-23", "relevancy": 2.6562, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6938}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6708}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5728}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCAIL%3A%20Towards%20Studio-Grade%20Character%20Animation%20via%20In-Context%20Learning%20of%203D-Consistent%20Pose%20Representations&body=Title%3A%20SCAIL%3A%20Towards%20Studio-Grade%20Character%20Animation%20via%20In-Context%20Learning%20of%203D-Consistent%20Pose%20Representations%0AAuthor%3A%20Wenhao%20Yan%20and%20Sheng%20Ye%20and%20Zhuoyi%20Yang%20and%20Jiayan%20Teng%20and%20ZhenHui%20Dong%20and%20Kairui%20Wen%20and%20Xiaotao%20Gu%20and%20Yong-Jin%20Liu%20and%20Jie%20Tang%0AAbstract%3A%20Achieving%20controllable%20character%20animation%20that%20meets%20studio-grade%20standards%20remains%20challenging%20despite%20recent%20progress.%20Existing%20approaches%20can%20transfer%20motion%20from%20a%20driving%20video%20to%20a%20reference%20image%2C%20but%20often%20fail%20to%20preserve%20structural%20fidelity%20and%20temporal%20consistency%20in%20wild%20scenarios%20involving%20complex%20motion%20and%20cross-identity%20animations.%20In%20this%20work%2C%20we%20present%20%5Ctextbf%7BSCAIL%7D%20%28a%20framework%20toward%20%5Ctextbf%7BS%7Dtudio-grade%20%5Ctextbf%7BC%7Dharacter%20%5Ctextbf%7BA%7Dnimation%20via%20%5Ctextbf%7BI%7Dn-context%20%5Ctextbf%7BL%7Dearning%29%2C%20which%20is%20designed%20to%20address%20these%20challenges%20from%20two%20key%20innovations.%20First%2C%20we%20propose%20a%20novel%203D%20pose%20representation%2C%20providing%20a%20robust%20and%20flexible%20motion%20signal.%20Second%2C%20we%20introduce%20a%20full-context%20pose%20injection%20mechanism%20within%20a%20diffusion-transformer%2C%20enabling%20effective%20spatio-temporal%20reasoning%20over%20full%20motion%20sequences.%20To%20align%20with%20studio-grade%20requirements%2C%20we%20develop%20a%20curated%20data%20pipeline%20ensuring%20both%20diversity%20and%20quality%2C%20and%20establish%20a%20comprehensive%20benchmark%20for%20systematic%20evaluation.%20Exp {"title": "6D Robotic OCT Scanning of Curved Tissue Surfaces", "author": "Suresh Guttikonda and Maximilian Neidhardt and Vidas Raudonis and Alexander Schlaefer", "abstract": "Optical coherence tomography (OCT) is a non-invasive volumetric imaging modality with high spatial and temporal resolution. For imaging larger tissue structures, OCT probes need to be moved to scan the respective area. For handheld scanning, stitching of the acquired OCT volumes requires overlap to register the images. For robotic scanning and stitching, a typical approach is to restrict the motion to translations, as this avoids a full hand-eye calibration, which is complicated by the small field of view of most OCT probes. However, stitching by registration or by translational scanning are limited when curved tissue surfaces need to be scanned. We propose a marker for full six-dimensional hand-eye calibration of a robot mounted OCT probe. We show that the calibration results in highly repeatable estimates of the transformation. Moreover, we evaluate robotic scanning of two phantom surfaces to demonstrate that the proposed calibration allows for consistent scanning of large, curved tissue surfaces. As the proposed approach is not relying on image registration, it does not suffer from a potential accumulation of errors along a scan path. We also illustrate the improvement compared to conventional 3D-translational robotic scanning.", "link": "http://arxiv.org/abs/2603.22012v1", "date": "2026-03-23", "relevancy": 2.6504, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5554}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5174}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5174}], "mailto" {"title": "Deep S2P: Integrating Learning Based Stereo Matching Into the Satellite Stereo Pipeline", "author": "El\u00edas Masquil and Thibaud Ehret and Pablo Mus\u00e9 and Gabriele Facciolo", "abstract": "Digital Surface Model generation from satellite imagery is a core task in Earth observation and is commonly addressed using classical stereoscopic matching algorithms in satellite pipelines as in the Satellite Stereo Pipeline (S2P). While recent learning-based stereo matchers achieve state-of-the-art performance on standard benchmarks, their integration into operational satellite pipelines remains challenging due to differences in viewing geometry and disparity assumptions. In this work, we integrate several modern learning-based stereo matchers, including StereoAnywhere, MonSter, Foundation Stereo, and a satellite fine-tuned variant of MonSter, into the Satellite Stereo Pipeline, adapting the rectification stage to enforce compatible disparity polarity and range. We release the corresponding code to enable reproducible use of these methods in large-scale Earth observation workflows. Experiments on satellite imagery show consistent improvements over classical cost-volume-based approaches in terms of Digital Surface Model accuracy, although commonly used metrics such as mean absolute error exhibit saturation effects. Qualitative results reveal substantially improved geometric detail and sharper structures, highlighting the need for evaluation strategies that better reflect perceptual and structural fidelity. At the same time, performance over challenging surface types such as vegetation remains limited across all evaluated models, indicating open challenges for learning-based stereo in natural environments.", "link": "http://arxiv.org/abs/2603.21882v1", "date": "2026-03-23", "relevancy": 2.6479, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", " {"title": "Adaptive Video Distillation: Mitigating Oversaturation and Temporal Collapse in Few-Step Generation", "author": "Yuyang You and Yongzhi Li and Jiahui Li and Yadong Mu and Quan Chen and Peng Jiang", "abstract": "Video generation has recently emerged as a central task in the field of generative AI. However, the substantial computational cost inherent in video synthesis makes model distillation a critical technique for efficient deployment. Despite its significance, there is a scarcity of methods specifically designed for video diffusion models. Prevailing approaches often directly adapt image distillation techniques, which frequently lead to artifacts such as oversaturation, temporal inconsistency, and mode collapse. To address these challenges, we propose a novel distillation framework tailored specifically for video diffusion models. Its core innovations include: (1) an adaptive regression loss that dynamically adjusts spatial supervision weights to prevent artifacts arising from excessive distribution shifts; (2) a temporal regularization loss to counteract temporal collapse, promoting smooth and physically plausible sampling trajectories; and (3) an inference-time frame interpolation strategy that reduces sampling overhead while preserving perceptual quality. Extensive experiments and ablation studies on the VBench and VBench2 benchmarks demonstrate that our method achieves stable few-step video synthesis, significantly enhancing perceptual fidelity and motion realism. It consistently outperforms existing distillation baselines across multiple metrics.", "link": "http://arxiv.org/abs/2603.21864v1", "date": "2026-03-23", "relevancy": 2.6391, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.664}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6575}, {"title": "Cus lity.%20Extensive%20experiments%20and%20ablation%20studies%20on%20the%20VBench%20and%20VBench2%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20stable%20few-step%20video%20synthesis%2C%20significantly%20enhancing%20perceptual%20fidelity%20and%20motion%20realism.%20It%20consistently%20outperforms%20existing%20distillation%20baselines%20across%20multiple%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21864v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaptive%2520Video%2520Distillation%253A%2520Mitigating%2520Oversaturation%2520and%2520Temporal%2520Collapse%2520in%2520Few-Step%2520Generation%26entry.906535625%3DYuyang%2520You%2520and%2520Yongzhi%2520Li%2520and%2520Jiahui%2520Li%2520and%2520Yadong%2520Mu%2520and%2520Quan%2520Chen%2520and%2520Peng%2520Jiang%26entry.1292438233%3DVideo%2520generation%2520has%2520recently%2520emerged%2520as%2520a%2520central%2520task%2520in%2520the%2520field%2520of%2520generative%2520AI.%2520However%252C%2520the%2520substantial%2520computational%2520cost%2520inherent%2520in%2520video%2520synthesis%2520makes%2520model%2520distillation%2520a%2520critical%2520technique%2520for%2520efficient%2520deployment.%2520Despite%2520its%2520significance%252C%2520there%2520is%2520a%2520scarcity%2520of%2520methods%2520specifically%2520designed%2520for%2520video%2520diffusion%2520models.%2520Prevailing%2520approaches%2520often%2520directly%2520adapt%2520image%2520distillation%2520techniques%252C%2520which%2520frequently%2520lead%2520to%2520artifacts%2520such%2520as%2520oversaturation%252C%2520temporal%2520inconsistency%252C%2520and%2520mode%2520collapse.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520novel%2520distillation%2520framework%2520tailored%2520specifically%2520for%2520video%2520diffusion%2520models.%2520Its%2520core%2520innovations%2520include%253A%2520%25281%2529%2520an%2520adaptive%2520regression%2520loss%2 {"title": "LEAF: Language-EEG Aligned Foundation Model for Brain-Computer Interfaces", "author": "Muyun Jiang and Shuailei Zhang and Zhenjie Yang and Mengjun Wu and Weibang Jiang and Zhiwei Guo and Wei Zhang and Rui Liu and Shangen Zhang and Yong Li and Yi Ding and Cuntai Guan", "abstract": "Recent advances in electroencephalography (EEG) foundation models, which capture transferable EEG representations, have greatly accelerated the development of brain-computer interfaces (BCIs). However, existing approaches still struggle to incorporate language instructions as prior constraints for EEG representation learning, limiting their ability to leverage the semantic knowledge inherent in language to unify different labels and tasks. To address this challenge, we present LEAF, a foundation model for EEG--Language Alignment with Semantic Task Instruction and Querying. LEAF integrates task-aware semantic guidance to produce structured and linguistically aligned EEG embeddings, thereby enhancing decoding robustness and transferability. In the pretraining stage, we introduce a joint Spectral--Temporal Reconstruction (STR) framework that captures the coupled spectral rhythms and temporal dynamics of EEG signals. STR applies randomized spectral perturbation to enhance frequency robustness and uses two complementary temporal objectives to learn both contextual and sequential structure. In the EEG-Language alignment stage, we propose the Instruction-conditioned Q-Former (IQF). This query-based cross-attention transformer injects instruction embeddings into EEG tokens and achieves semantic alignment with textual label embeddings through learnable queries. We evaluate LEAF on 16 downstream datasets spanning motor imagery, emotion recognition, steady-state visual evoked potentials, covert speech, and healthcare tasks. LEAF achieves state-of-the-art performance on 12 of the 16 datasets and obtains the best average results across all five task categories. Importantly, our analyses reveal for the first time that explicit task instructions serve as semantic priors guiding EEG embeddings into coherent and linguistically grounded spaces. The code and pre-trained weights will be released.", "link": "http://arxiv.org/abs/2509.24302v2", "date": "2026-03-23", "relevancy": 2.6251, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5443}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5443}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4864}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LEAF%3A%20Language-EEG%20Aligned%20Foundation%20Model%20for%20Brain-Computer%20Interfaces&body=Title%3A%20LEAF%3A%20Language-EEG%20Aligned%20Foundation%20Model%20for%20Brain-Computer%20Interfaces%0AAuthor%3A%20Muyun%20Jiang%20and%20Shuailei%20Zhang%20and%20Zhenjie%20Yang%20and%20Mengjun%20Wu%20and%20Weibang%20Jiang%20and%20Zhiwei%20Guo%20and%20Wei%20Zhang%20and%20Rui%20Liu%20and%20Shangen%20Zhang%20and%20Yong%20Li%20and%20Yi%20Ding%20and%20Cuntai%20Guan%0AAbstract%3A%20Recent%20advances%20in%20electroencephalography%20%28EEG%29%20foundation%20models%2C%20which%20capture%20transferable%20EEG%20representations%2C%20have%20greatly%20accelerated%20the%20development%20of%20brain-computer%20interfaces%20%28BCIs%29.%20However%2C%20existing%20approaches%20still%20struggle%20to%20incorporate%20language%20instructions%20as%20prior%20constraints%20for%20EEG%20representation%20learning%2C%20limiting%20their%20ability%20to%20leverage%20the%20semantic%20knowledge%20inherent%20in%20language%20to%20unify%20different%20labels%20and%20tasks.%20To%20address%20this%20challenge%2C%20we%20present%20LEAF%2C%20a%20foundation%20model%20for%20EEG--Language%20Alignment%20with%20Semantic%20Task%20Instruction%20and%20Querying.%20LEAF%20integrates%20task-aware%20semantic%20guidance%20to%20produce%20structured%20and%20linguistically%20aligned%20EEG%20embeddings%2C%20thereby%20enhancing%20decoding%20robustness%20and%20transferability.%20In%20the%20pretraining%20stage%2C%20we%20introduce%20a%20joint%20Spectral--Temporal%20Reconstruction%20%28STR%29%20framework%20that%20captures%20the%20coupled%20spectral%20rhythms%20and%20temporal%20dynamics%20of%20EEG%20signals.%20STR%20applies%20randomized%20spectral%20perturbation%20to%20enhance%20frequency%20robustness%20and%20uses%20two%20complementary%20temporal%20objectives%20to%20learn%20both%20contextual%20and%20sequential%20structure.%20In%20the%20EEG-Language%20alignment%20stage%2C%20we%20propose%20the%20Instruction-conditioned%20Q-Former%20%28IQF%29.%20This%20query-based%20cross-attention%20transformer%20injects%20instruction%20embeddings%20into%20EEG%20tokens%20and%20achieves%20semantic%20alignment%20with%20textual%20label%20embeddings%20through%20learnable%20queries.%20We%20evaluate%20LEAF%20on%2016%20downstream%20datasets%20spanning%20motor%20imagery%2C%20emotion%20recognition%2C%20steady-state%20visual%20evoked%20potentials%2C%20covert%20speech%2C%20and%20healthcare%20tasks.%20LEAF%20achieves%20state-of-the-art%20performance%20on%2012%20of%20the%2016%20datasets%20and%20obtains%20the%20best%20average%20results%20across%20all%20five%20task%20categories.%20Importantly%2C%20our%20analyses%20reveal%20for%20the%20first%20time%20that%20explicit%20task%20instructions%20serve%20as%20semantic%20priors%20guiding%20EEG%20embeddings%20into%20coherent%20and%20linguistically%20grounded%20spaces.%20The%20code%20and%20pre-trained%20weights%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2509.24302v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLEAF%253A%2520Language-EEG%2520Aligned%2520Foundation%2520 {"title": "Gen3R: 3D Scene Generation Meets Feed-Forward Reconstruction", "author": "Jiaxin Huang and Yuanbo Yang and Bangbang Yang and Lin Ma and Yuewen Ma and Yiyi Liao", "abstract": "We present Gen3R, a method that bridges the strong priors of foundational reconstruction models and video diffusion models for scene-level 3D generation. We repurpose the VGGT reconstruction model to produce geometric latents by training an adapter on its tokens, which are regularized to align with the appearance latents of pre-trained video diffusion models. By jointly generating these disentangled yet aligned latents, Gen3R produces both RGB videos and corresponding 3D geometry, including camera poses, depth maps, and global point clouds. Experiments demonstrate that our approach achieves state-of-the-art results in single- and multi-image conditioned 3D scene generation. Additionally, our method can enhance the robustness of reconstruction by leveraging generative priors, demonstrating the mutual benefit of tightly coupling reconstruction and generative models.", "link": "http://arxiv.org/abs/2601.04090v2", "date": "2026-03-23", "relevancy": 2.6219, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6583}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6583}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6413}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gen3R%3A%203D%20Scene%20Generation%20Meets%20Feed-Forward%20Reconstruction&body=Title%3A%20Gen3R%3A%203D%20Scene%20Generation%20Meets%20Feed-Forward%20Reconstruction%0AAuthor%3A%20Jiaxin%20Huang%20and%20Yuanbo%20Yang%20and%20Bangbang%20Yang%20and%20Lin%20Ma%20and%20Yuewen%20Ma%20and%20Yiyi%20Liao%0AAbstract%3A%20We%20present%20Gen3R%2C%20a%20method%20that%20bridges%20the%20strong%20priors%20of%20foundational%20reconstruction%20models%20and%20video%20diffusion%20models%20for%20scene-level%203D%20generation.%20We%20repurpose%20the%20VGGT%20reconstruction%20model%20to%20produce%20geometric%20latents%20by%20training%20an%20adapter%20on%20its%20tokens%2C%20which%20are%20regularized%20to%20align%20with%20the%20appearance%20latents%20of%20pre-trained%20video%20diffusion%20models.%20By%20jointly%20generating%20these%20disentangled%20yet%20aligned%20latents%2C%20Gen3R%20produces%20both%20RGB%20videos%20and%20corresponding%203D%20geometry%2C%20including%20camera%20poses%2C%20depth%20maps%2C%20and%20global%20point%20clouds.%20Experiments%20demonstrate%20that%20our%20approach%20achieves%20state-of-the-art%20results%20in%20single-%20and%20multi-image%20conditioned%203D%20scene%20generation.%20Additionally%2C%20our%20method%20can%20enhance%20the%20robustness%20of%20reconstruction%20by%20leveraging%20generative%20priors%2C%20demonstrating%20the%20mutual%20benefit%20of%20tightly%20coupling%20reconstruction%20and%20generative%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2601.04090v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGen3R%253A%25203D%2520Scene%2520Generation%2520Meets%2520Feed-Forward%2520Reconstruction%26entry.906535625%3DJiaxin%2520Huang%2520and%2520Yuanbo%2520Yang%2520and%2520Bangbang%2520Yang%2520and%2520Lin%2520Ma%2520and%2520Yuewen%2520Ma%2520and%2520Yiyi%2520Liao%26entry.1292438233%3DWe%2520present%2520Gen3R%252C%2520a%2520method%2520that%2520bridges%2520the%2520strong%2520priors%2520of%2520foundational%2520reconstruction%2520models%2520and%2520video%2520diffusion%2520models%2520for%2520scene-level%25203D%2520generation.%2520We%2520repurpose%2520the%2520VGGT%2520reconstruction%2520model%2520to%2520produce%2520geometric%2520latents%2520by%2520training%2520an%2520adapter%2520on%2520its%2520tokens%252C%2520which%2520are%2520regularized%2520to%2520align%2520with%2520the%2520appearance%2520latents%2520of%2520pre-trained%2520video%2520diffusion%2520models.%2520By%2520jointly%2520generating%2520these%2520disentangled%2520yet%2520aligned%2520latents%252C%2520Gen3R%2520produces%2520both%2520RGB%2520videos%2520and%2520corresponding%25203D%2520geometry%252C%2520including%2520camera%2520poses%252C%2520depth%2520maps%252C%2520and%2520global%2520point%2520clouds.%2520Experiments%2520demonstrate%2520that%2520our%2520approach%2520achieves%2520state-of-the-art%2520results%2520in%2520single-%2520and%2520multi-image%2520conditioned%25203D%2520scene%2520generation.%2520Additionally%252C%2520our%2520method%2520can%2520enhance%2520the%2520robustness%2520of%2520reconstruction%2520by%2520leveraging%2520generative%2520priors%252C%2520demonstrating%2520the%2520mutual%2520benefit%2520of%2520tightly%2520coupling%2520reconstruction%2520and%2520generative%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.04090v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Gen3R%3A%203D%20Scene%20Generation%20Meets%20Feed-Forward%20Reconstruction&entry.906535625=Jiaxin%20Huang%20and%20Yuanbo%20Yang%20and%20Bangbang%20Yang%20and%20Lin%20Ma%20and%20Yuewen%20Ma%20and%20Yiyi%20Liao&entry.1292438233=We%20present%20Gen3R%2C%20a%20method%20that%20bridges%20the%20strong%20priors%20of%20foundational%20reconstruction%20models%20and%20video%20diffusion%20models%20for%20scene-level%203D%20generation.%20We%20repurpose%20the%20VGGT%20reconstruction%20model%20to%20produce%20geometric%20latents%20by%20training%20an%20adapter%20on%20its%20tokens%2C%20which%20are%20regularized%20to%20align%20with%20the%20appearance%20latents%20of%20pre-trained%20video%20diffusion%20models.%20By%20jointly%20generating%20these%20disentangled%20yet%20aligned%20latents%2C%20Gen3R%20produces%20both%20RGB%20videos%20and%20corresponding%203D {"title": "A Backbone Benchmarking Study on Self-supervised Learning as a Auxiliary Task with Texture-based Local Descriptors for Face Analysis", "author": "Shukesh Reddy and Abhijit Das", "abstract": "In this work, we benchmark with different backbones and study their impact for self-supervised learning (SSL) as an auxiliary task to blend texture-based local descriptors into feature modelling for efficient face analysis. It is established in previous work that combining a primary task and a self-supervised auxiliary task enables more robust and discriminative representation learning.\n  We employed different shallow to deep backbones for the SSL task of Masked Auto-Encoder (MAE) as an auxiliary objective to reconstruct texture features such as local patterns alongside the primary task in local pattern SSAT (L-SSAT), ensuring robust and unbiased face analysis.\n  To expand the benchmark, we conducted a comprehensive comparative analysis across multiple model configurations within the proposed framework. To this end, we address the three research questions: \"What is the role of the backbone in performance L-SSAT?\", \"What type of backbone is effective for different face analysis tasks?\", and \"Is there any generalized backbone for effective face analysis with L-SSAT?\".\n  Towards answering these questions, we provide a detailed study and experiments. The performance evaluation demonstrates that the backbone for the proposed method is highly dependent on the downstream task, achieving average accuracies of 0.94 on FaceForensics++, 0.87 on CelebA, and 0.88 on AffectNet.\n  For consistency of feature representation quality and generalisation capability across various face analysis paradigms, including face attribute prediction, emotion classification, and deepfake detection, there is no unified backbone.", "link": "http://arxiv.org/abs/2603.22190v1", "date": "2026-03-23", "relevancy": 2.609, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5344}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5155}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5155}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Backbone%20Benchmarking%20Study%20on%20Self-supervised%20Learning%20as%20a%20Auxiliary%20Task%20with%20Texture-based%20Local%20Descriptors%20for%20Face%20Analysis&body=Title%3A%20A%20Backbone%20Benchmarking%20Study%20on%20Self-supervised%20Learning%20as%20a%20Auxiliary%20Task%20with%20Texture-based%20Local%20Descriptors%20for%20Face%20Analysis%0AAuthor%3A%20Shukesh%20Reddy%20and%20Abhijit%20Das%0AAbstract%3A%20In%20this%20work%2C%20we%20benchmark%20with%20different%20backbones%20and%20study%20their%20impact%20for%20self-supervised%20learning%20%28SSL%29%20as%20an%20auxiliary%20task%20to%20blend%20texture-based%20local%20descriptors%20into%20feature%20modelling%20for%20efficient%20face%20analysis.%20It%20is%20established%20in%20previous%20work%20that%20combining%20a%20primary%20task%20and%20a%20self-supervised%20auxiliary%20task%20enables%20more%20robust%20and%20discriminative%20representation%20learning.%0A%20%20We%20employed%20different%20shallow%20to%20deep%20backbones%20for%20the%20SSL%20task%20of%20Masked%20Auto-Encoder%20%28MAE%29%20as%20an%20auxiliary%20objective%20to%20reconstruct%20texture%20features%20such%20as%20local%20patterns%20alongside%20the%20primary%20task%20in%20local%20pattern%20SSAT%20%28L-SSAT%29%2C%20ensuring%20robust%20and%20unbiased%20face%20analysis.%0A%20%20To%20expand%20the%20benchmark%2C%20we%20conducted%20a%20comprehensive%20comparative%20analysis%20across%20multiple%20model%20configurations%20within%20the%20proposed%20framework.%20To%20this%20end%2C%20we%20address%20the%20three%20research%20questions%3A%20%22What%20is%20the%20role%20of%20the%20backbone%20in%20performance%20L-SSAT%3F%22%2C%20%22What%20type%20of%20backbone%20is%20effective%20for%20different%20face%20analysis%20tasks%3F%22%2C%20and%20%22Is%20there%20any%20generalized%20backbone%20for%20effective%20face%20analysis%20with%20L-SSAT%3F%22.%0A%20%20Towards%20answering%20these%20questions%2C%20we%20provide%20a%20detailed%20study%20and%20experiments.%20The%20performance%20evaluation%20demonstrates%20that%20the%20backbone%20for%20the%20proposed%20method%20is%20highly%20dependent%20on%20the%20downstream%20task%2C%20achieving%20average%20accuracies%20of%200.94%20on%20FaceForensics%2B%2B%2C%200.87%20on%20CelebA%2C%20and%200.88%20on%20AffectNet.%0A%20%20For%20consistency%20of%20feature%20representation%20quality%20and%20generalisation%20capability%20across%20various%20face%20analysis%20paradigms%2C%20including%20face%20attribute%20prediction%2C%20emotion%20classification%2C%20and%20deepfake%20detection%2C%20there%20is%20no%20unified%20backbone.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22190v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Backbone%2520Benchmarking%2520Study%2520on%2520Self-supervised%2520Learning%2520as%2520a%2520Auxiliary%2520Task%2520with%2520Texture-based%2520Local%2520Descriptors%2520for%2520Face%2520Analysis%26entry.906535625%3DShukesh%2520Reddy%2520and%2520Abhijit%2520Das%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520benchmark%2520with%2520different%2520backbones%2520and%2520study%2520their%2520impact%2520for%2520self-supervised%2520learning%2520%2528SSL%2529%2520as%2520an%2520auxiliary%2520task%2520to%2520blend%2520texture-based%2520local%2520descriptors%2520into%2520feature%2520modelling%2520for%2520efficient%2520face%2520analysis.%2520It%2520is%2520established%2520in%2520previous%2520work%2520that%2520combining%2520a%2520primary%2520task%2520and% {"title": "What \"Not\" to Detect: Negation-Aware VLMs via Structured Reasoning and Token Merging", "author": "Inha Kang and Youngsun Lim and Seonho Lee and Jiho Choi and Junsuk Choe and Hyunjung Shim", "abstract": "State-of-the-art vision-language models (VLMs) suffer from a critical failure in understanding negation, often referred to as affirmative bias. This limitation is particularly severe in described object detection (DOD) tasks. To address this, we propose two primary contributions: (1) a new dataset pipeline and (2) a novel, lightweight adaptation recipe. First, we introduce CoVAND, a dataset constructed with a systematic chain-of-thought (CoT) and VQA-based pipeline to generate high-quality, instance-grounded negation data. Second, we propose NegToMe, a novel text token merging module that directly tackles the architectural cause of affirmative bias. NegToMe fundamentally addresses the structural loss of negation cues in tokenization, grouping them with attributes into coherent semantic phrases. It maintains correct polarity at the input level, enabling robust negation understanding even with limited data. For instance, to prevent a model from treating the fragmented tokens \"not\" and \"girl\" as simply \"girl\", NegToMe binds them into a single token whose meaning is correctly distinguished from that of \"girl\" alone. This module is integrated with a parameter-efficient and strategic LoRA fine-tuning approach. Our method significantly improves performance on challenging negation benchmarks with a lowered false positive rate, boosting NMS-AP by up to +10.8 points on OVDEval and demonstrating generalization to SoTA VLMs. This work marks a crucial step forward in addressing negation understanding for real-world detection applications.", "link": "http://arxiv.org/abs/2510.13232v2", "date": "2026-03-23", "relevancy": 2.6013, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5262}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5262}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5083}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20%22Not%22%20to%20Detect%3A%20Negation-Aware%20VLMs%20via%20Structured%20Reasoning%20and%20Token%20Merging&body=Title%3A%20What%20%22Not%22%20to%20Detect%3A%20Negation-Aware%20VLMs%20via%20Structured%20Reasoning%20and%20Token%20Merging%0AAuthor%3A%20Inha%20Kang%20and%20Youngsun%20Lim%20and%20Seonho%20Lee%20and%20Jiho%20Choi%20and%20Junsuk%20Choe%20and%20Hyunjung%20Shim%0AAbstract%3A%20State-of-the-art%20vision-language%20models%20%28VLMs%29%20suffer%20from%20a%20critical%20failure%20in%20understanding%20negation%2C%20often%20referred%20to%20as%20affirmative%20bias.%20This%20limitation%20is%20particularly%20severe%20in%20described%20object%20detection%20%28DOD%29%20tasks.%20To%20address%20this%2C%20we%20propose%20two%20primary%20contributions%3A%20%281%29%20a%20new%20dataset%20pipeline%20and%20%282%29%20a%20novel%2C%20lightweight%20adaptation%20recipe.%20First%2C%20we%20introduce%20CoVAND%2C%20a%20dataset%20constructed%20with%20a%20systematic%20chain-of-thought%20%28CoT%29%20and%20VQA-based%20pipeline%20to%20generate%20high-quality%2C%20instance-grounded%20negation%20data.%20Second%2C%20we%20propose%20NegToMe%2C%20a%20novel%20text%20token%20merging%20module%20that%20directly%20tackles%20the%20architectural%20cause%20of%20affirmative%20bias.%20NegToMe%20fundamentally%20addresses%20the%20structural%20loss%20of%20negation%20cues%20in%20tokenization%2C%20grouping%20them%20with%20attributes%20into%20coherent%20semantic%20phrases.%20It%20maintains%20correct%20polarity%20at%20the%20input%20level%2C%20enabling%20robust%20negation%20understanding%20even%20with%20limited%20data.%20For%20instance%2C%20to%20prevent%20a%20model%20from%20treating%20the%20fragmented%20tokens%20%22not%22%20and%20%22girl%22%20as%20simply%20%22girl%22%2C%20NegToMe%20binds%20them%20into%20a%20single%20token%20whose%20meaning%20is%20correctly%20distinguished%20from%20that%20of%20%22girl%22%20alone.%20This%20module%20is%20integrated%20with%20a%20parameter-efficient%20and%20strategic%20LoRA%20fine-tuning%20approach.%20Our%20method%20significantly%20improves%20performance%20on%20challenging%20negation%20benchmarks%20with%20a%20lowered%20false%20positive%20rate%2C%20boosting%20NMS-AP%20by%20up%20to%20%2B10.8%20points%20on%20OVDEval%20and%20demonstrating%20generalization%20to%20SoTA%20VLMs.%20This%20work%20marks%20a%20crucial%20step%20forward%20in%20addressing%20negation%20understanding%20for%20real-world%20detection%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2510.13232v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520%2522Not%2522%2520to%2520Detect%253A%2520Negation-Aware%2520VLMs%2520via%2520Structured%2520Reasoning%2520and%2520Token%2520Merging%26entry.906535625%3DInha%2520Kang%2520and%2520Youngsun%2520Lim%2520and%2520Seonho%2520Lee%2520and%2520Jiho%2520Choi%2520and%2520Junsuk%2520Choe%2520and%2520Hyunjung%2520Shim%26entry.1292438233%3DState-of-the-art%2520vision-language%2520models%2520%2528VLMs%2529%2520suffer%2520from%2520a%2520critical%2520failure%2520in%2520understanding%2520negation%252C%2520often%2520referred%2520to%2520as%2520affirmative%2520bias.%2520This%2520limitation%2520is%2520particularly%2520severe%2520in%2520described%2520object%2520detection%2520%2528DOD%2529%2520tasks.%2520To%2520address%2520this%252C%2520we%2520propose%2520two%2520primary%2520contributions%253A%2520%25281%2529%2520a%2520new%2520dataset%2520pipeline%2520and%2520%25282%2529%2520a%2520novel%252C%2520lightweight%2520adaptation%2520recipe.%2520First%252C%2520we%2520int {"title": "SpecTM: Spectral Targeted Masking for Trustworthy Foundation Models", "author": "Syed Usama Imtiaz and Mitra Nasr Azadani and Nasrin Alamdari", "abstract": "Foundation models are now increasingly being developed for Earth observation (EO), yet they often rely on stochastic masking that do not explicitly enforce physics constraints; a critical trustworthiness limitation, in particular for predictive models that guide public health decisions. In this work, we propose SpecTM (Spectral Targeted Masking), a physics-informed masking design that encourages the reconstruction of targeted bands from cross-spectral context during pretraining. To achieve this, we developed an adaptable multi-task (band reconstruction, bio-optical index inference, and 8-day-ahead temporal prediction) self-supervised learning (SSL) framework that encodes spectrally intrinsic representations via joint optimization, and evaluated it on a downstream microcystin concentration regression model using NASA PACE hyperspectral imagery over Lake Erie. SpecTM achieves R^2 = 0.695 (current week) and R^2 = 0.620 (8-day-ahead) predictions surpassing all baseline models by (+34% (0.51 Ridge) and +99% (SVR 0.31)) respectively. Our ablation experiments show targeted masking improves predictions by +0.037 R^2 over random masking. Furthermore, it outperforms strong baselines with 2.2x superior label efficiency under extreme scarcity. SpecTM enables physics-informed representation learning across EO domains and improves the interpretability of foundation models.", "link": "http://arxiv.org/abs/2603.22097v1", "date": "2026-03-23", "relevancy": 2.5929, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.521}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5174}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5174}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpecTM%3A%20Spectral%20Targeted%20Masking%20for%20Trustworthy%20Foundation%20Models&body=Title%3A%20SpecTM%3A%20Spectral%20Targeted%20Masking%20for%20Trustworthy%20Foundation%20Models%0AAuthor%3A%20Syed%20Usama%20Imtiaz%20and%20Mitra%20Nasr%20Azadani%20and%20Nasrin%20Alamdari%0AAbstract%3A%20Foundation%20models%20are%20now%20increasingly%20being%20developed%20for%20Earth%20observation%20%28EO%29%2C%20yet%20they%20often%20rely%20on%20stochastic%20masking%20that%20do%20not%20explicitly%20enforce%20physics%20constraints%3B%20a%20critical%20trustworthiness%20limitation%2C%20in%20particular%20for%20predictive%20models%20that%20guide%20public%20health%20decisions.%20In%20this%20work%2C%20we%20propose%20SpecTM%20%28Spectral%20Targeted%20Masking%29%2C%20a%20physics-informed%20masking%20design%20that%20encourages%20the%20reconstruction%20of%20targeted%20bands%20from%20cross-spectral%20context%20during%20pretraining.%20To%20achieve%20this%2C%20we%20developed%20an%20adaptable%20multi-task%20%28band%20reconstruction%2C%20bio-optical%20index%20inference%2C%20and%208-day-ahead%20temporal%20prediction%29%20self-supervised%20learning%20%28SSL%29%20framework%20that%20encodes%20spectrally%20intrinsic%20representations%20via%20joint%20optimization%2C%20and%20evaluated%20it%20on%20a%20downstream%20microcystin%20concentration%20regression%20model%20using%20NASA%20PACE%20hyperspectral%20imagery%20over%20Lake%20Erie.%20SpecTM%20achieves%20R%5E2%20%3D%200.695%20%28current%20week%29%20and%20R%5E2%20%3D%200.620%20%288-day-ahead%29%20predictions%20surpassing%20all%20baseline%20models%20by%20%28%2B34%25%20%280.51%20Ridge%29%20and%20%2B99%25%20%28SVR%200.31%29%29%20respectively.%20Our%20ablation%20experiments%20show%20targeted%20masking%20improves%20predictions%20by%20%2B0.037%20R%5E2%20over%20random%20masking.%20Furthermore%2C%20it%20outperforms%20strong%20baselines%20with%202.2x%20superior%20label%20efficiency%20under%20extreme%20scarcity.%20SpecTM%20enables%20physics-informed%20representation%20learning%20across%20EO%20domains%20and%20improves%20the%20interpretability%20of%20foundation%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22097v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpecTM%253A%2520Spectral%2520Targeted%2520Masking%2520for%2520Trustworthy%2520Foundation%2520Models%26entry.906535625%3DSyed%2520Usama%2520Imtiaz%2520and%2520Mitra%2520Nasr%2520Azadani%2520and%2520Nasrin%2520Alamdari%26entry.1292438233%3DFoundation%2520models%2520are%2520now%2520increasingly%2520being%2520developed%2520for%2520Earth%2520observation%2520%2528EO%2529%252C%2520yet%2520they%2520often%2520rely%2520on%2520stochastic%2520masking%2520that%2520do%2520not%2520explicitly%2520enforce%2520physics%2520constraints%253B%2520a%2520critical%2520trustworthiness%2520limitation%252C%2520in%2520particular%2520for%2520predictive%2520models%2520that%2520guide%2520public%2520health%2520decisions.%2520In%2520this%2520work%252C%2520we%2520propose%2520SpecTM%2520%2528Spectral%2520Targeted%2520Masking%2529%252C%2520a%2520physics-informed%2520masking%2520design%2520that%2520encourages%2520the%2520reconstruction%2520of%2520targeted%2520bands%2520from%2520cross-spectral%2520context%2520during%2520pretraining.%2520To%2520achieve%2520this%252C%2520we%2520developed%2520an%2520adaptable%2520multi-task%2520%2528band%2520reconstruction%252C%2520bio-optical%2520index%2520inference%252C%2520and%25208-day-ahead%2520temporal%2520prediction%2529%2520self-supervised%2520learning%2520%2528SSL%2529%2520framework%2520that%2520encodes%2520spectrally%2520intrinsic%2520representations%2520via%2520joint%2520optimization%252C%2520and%2520evaluated%2520it%2520on%2520a%2520downstream%2520microcystin%2520concent {"title": "HMS-VesselNet: Hierarchical Multi-Scale Attention Network with Topology-Preserving Loss for Retinal Vessel Segmentation", "author": "Amarnath R", "abstract": "Retinal vessel segmentation methods based on standard overlap losses tend to miss thin peripheral vessels because these structures occupy very few pixels and have low contrast against the background. We propose HMS-VesselNet, a hierarchical multi-scale network that processes fundus images across four parallel branches at different resolutions and combines their outputs using learned fusion weights. The training loss combines Dice, binary cross-entropy, and centerline Dice to jointly optimize area overlap and vessel continuity. Hard example mining is applied from epoch 20 onward to concentrate gradient updates on the most difficult training images. Tested on 68 images from DRIVE, STARE, and CHASE_DB1 using 5-fold cross-validation, the model achieves a mean Dice of 88.72 +/- 0.67%, Sensitivity of 90.78 +/- 1.42%, and AUC of 98.25 +/- 0.21%. In leave-one-dataset-out experiments, AUC remains above 95% on each unseen dataset. The largest improvement is in the recall of thin peripheral vessels, which are the structures most frequently missed by standard methods and most critical for early detection of diabetic retinopathy.", "link": "http://arxiv.org/abs/2603.21891v1", "date": "2026-03-23", "relevancy": 2.581, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5323}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5116}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5047}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HMS-VesselNet%3A%20Hierarchical%20Multi-Scale%20Attention%20Net 1891v1&entry.124074799=Read"},
{"title": "SAGE: Shape-Adapting Gated Experts for Adaptive Histopathology Image Segmentation", "author": "Gia Huy Thai and Hoang-Nguyen Vu and Anh-Minh Phan and Quang-Thinh Ly and Tram Dinh and Thi-Ngoc-Truc Nguyen and Nhat Ho", "abstract": "The significant variability in cell size and shape continues to pose a major obstacle in computer-assisted cancer detection on gigapixel Whole Slide Images (WSIs), due to cellular heterogeneity. Current CNN-Transformer hybrids use static computation graphs with fixed routing. This leads to extra computation and makes it harder to adapt to changes in input. We propose Shape-Adapting Gated Experts (SAGE), an input-adaptive framework that enables dynamic expert routing in heterogeneous visual networks. SAGE reconfigures static backbones into dynamically routed expert architectures via a dual-path design with hierarchical gating and a Shape-Adapting Hub (SA-Hub) that harmonizes feature representations across convolutional and transformer modules. Embodied as SAGE with ConvNeXt and Vision Transformer UNet (SAGE-ConvNeXt+ViT-UNet), our model achieves a Dice score of 95.23\\% on EBHI, 92.78\\%/91.42\\% DSC on GlaS Test A/Test B, and 91.26\\% DSC at the WSI level on DigestPath, while exhibiting robust generalization under distribution shifts by adaptively balancing local refinement and global context. SAGE establishes a scalable foundation for dynamic expert routing in visual networks, thereby facilitating flexible visual reasoning.", "link": "http://arxiv.org/abs/2511.18493v3", "date": "2026-03-23", "relevancy": 2.5799, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5234}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5219}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5026}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAGE%3A%20Shape-Adapting%20Gated%20Experts%20for%20Adaptive%20Histopathology%20Image%20Segmentation&body=Title%3A%20SAGE%3A%20Shape-Adapting%20Gated%20Experts%20for%20Adaptive%20Histopathology%20Image%20Segmentation%0AAuthor%3A%20Gia%20Huy%20Thai%20and%20Hoang-Nguyen%20Vu%20and%20Anh-Minh%20Phan%20and%20Quang-Thinh%20Ly%20and%20Tram%20Dinh%20and%20Thi-Ngoc-Truc%20Nguyen%20and%20Nhat%20Ho%0AAbstract%3A%20The%20significant%20variability%20in%20cell%20size%20and%20shape%20continues%20to%20pose%20a%20major%20obstacle%20in%20computer-assisted%20cancer%20detection%20on%20gigapixel%20Whole%20Slide%20Images%20%28WSIs%29%2C%20due%20to%20cellular%20heterogeneity.%20Current%20CNN-Transformer%20hybrids%20use%20static%20computation%20graphs%20with%20fixed%20routing.%20This%20leads%20to%20extra%20computation%20and%20makes%20it%20harder%20to%20adapt%20to%20changes%20in%20input.%20We%20propose%20Shape-Adapting%20Gated%20Experts%20%28SAGE%29%2C%20an%20input-adaptive%20framework%20that%20enables%20dynamic%20expert%20routing%20in%20heterogeneous%20visual%20networks.%20SAGE%20reconfigures%20static%20backbones%20into%20dynamically%20routed%20expert%20architectures%20via%20a%20dual-path%20design%20with%20hierarchical%20gating%20and%20a%20Shape-Adapting%20Hub%20%28SA-Hub%29%20that%20harmonizes%20feature%20representations%20across%20convolutional%20and%20transformer%20modules.%20Embodied%20as%20SAGE%20with%20ConvNeXt%20and%20Vision%20Transformer%20UNet%20%28SAGE-ConvNeXt%2BViT-UNet%29%2C%20our%20model%20achieves%20a%20Dice%20score%20of%2095.23%5C%25%20on%20EBHI%2C%2092.78%5C%25/91.42%5C%25%20DSC%20on%20GlaS%20Test%20A/Test%20B%2C%20and%2091.26%5C%25%20DSC%20at%20the%20WSI%20level%20on%20DigestPath%2C%20while%20exhibiting%20robust%20generalization%20under%20distribution%20shifts%20by%20adaptively%20balancing%20local%20refinement%20and%20global%20context.%20SAGE%20establishes%20a%20scalable%20foundation%20for%20dynamic%20expert%20routing%20in%20visual%20networks%2C%20thereby%20facilitating%20flexible%20visual%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2511.18493v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAGE%253A%2520Shape-Adapting%2520Gated%2520Experts%2520for%2520Adaptive%2520Histopathology%2520Image%2520Segmentation%26entry.906535625%3DGia%2520Huy%2520Thai%2520and%2520Hoang-Nguyen%2520Vu%2520and%2520Anh-Minh%2520Phan%2520and%2520Quang-Thinh%2520Ly%2520and%2520Tram%2520Dinh%2520and%2520Thi-Ngoc-Truc%2520Nguyen%2520and%2520Nhat%2520Ho%26entry.1292438233%3DThe%2520significant%2520variability%2520in%2520cell%2520size%2520and%2520shape%2520continues%2520to%2520pose%2520a%2520major%2520obstacle%2520in%2520computer-assisted%2520cancer%2520detection%2520on%2520gigapixel%2520Whole%2520Slide%2520Images%2520%2528WSIs%2529%252C%2520due%2520to%2520cellular%2520heterogeneity.%2520Current%2520CNN-Transformer%2520hybrids%2520use%2520static%2520computation%2520graphs%2520with%2520fixed%2520routing.%2520This%2520leads%2520to%2520extra%2520computation%2520and%2520makes%2520it%2520harder%2520to%2520adapt%2520to%2520changes%2520in%2520input.%2520We%2520propose%2520Shape-Adapting%2520Gated%2520Experts%2520%2528SAGE%2529%252C%2520an%2520input-adaptive%2520framework%2520that%2520enables%2520dynamic%2520expert%2520routing%2520in%2520heterogeneous%2520visual%2520networks.%2520SAGE%2520reconfigures%2520static%2520backbones%2520into%2520dynamically%2520routed%2520expert%2520architectures%2520via%2520a%2520dual-path%2520design%2520with%2520hierarchical%2520gating%2520and%2520a%2520Shape-Adapting%2520Hub%2520%2528SA-Hub%2529%2520that%2520harmonizes%2520feature%2520representations%2520across%2520convolutional%2520and%2520transformer%2520modules.%2520Embodied%2520as%2520SAGE%2520with%2520ConvNeXt%2520and%2520Vision%2520Transformer%2520UNet%2520%2528SAGE-ConvNeXt%252BViT-UNet%2529%2 {"title": "Herglotz-NET: Implicit Neural Representation of Spherical Data with Harmonic Positional Encoding", "author": "Th\u00e9o Hanon and Nicolas Mil-Homens Cavaco and John Kiely and Laurent Jacques", "abstract": "Representing and processing data in spherical domains presents unique challenges, primarily due to the curvature of the domain, which complicates the application of classical Euclidean techniques. Implicit neural representations (INRs) have emerged as a promising alternative for high-fidelity data representation; however, to effectively handle spherical domains, these methods must be adapted to the inherent geometry of the sphere to maintain both accuracy and stability. In this context, we propose Herglotz-NET (HNET), a novel INR architecture that employs a harmonic positional encoding based on complex Herglotz mappings. This encoding yields a well-posed representation on the sphere with interpretable and robust spectral properties. Moreover, we present a unified expressivity analysis showing that any spherical-based INR satisfying a mild condition exhibits a predictable spectral expansion that scales with network depth. Our results establish HNET as a scalable and flexible framework for accurate modeling of spherical data.", "link": "http://arxiv.org/abs/2502.13777v3", "date": "2026-03-23", "relevancy": 2.5771, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5628}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4946}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4889}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Herglotz-NET%3A%20Implicit%20Neural%20Representation%20of%20Spherical%20Data%20with%20Harmonic%20Positional%20Encoding&

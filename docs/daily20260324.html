{"title": "Training-Free Layout-to-Image Generation with Marginal Attention Constraints", "author": "Huancheng Chen and Jingtao Li and Weiming Zhuang and Haris Vikalo and Lingjuan Lyu", "abstract": "Recently, many text-to-image diffusion models have excelled at generating high-resolution images from text but struggle with precise control over spatial composition and object counting. To address these challenges, prior works have developed layout-to-image (L2I) approaches that incorporate layout instructions into text-to-image models. However, existing L2I methods typically require fine-tuning of pre-trained parameters or training additional control modules for diffusion models. In this work, we propose a training-free L2I approach, MAC (Marginal Attention Constrained Generation), which eliminates the need for additional modules or fine-tuning. Specifically, we use text-visual cross-attention feature maps to quantify inconsistencies between the layout of the generated images and the provided instructions, and then compute loss functions to optimize latent features during the diffusion reverse process. To enhance spatial controllability and mitigate semantic failures under complex layout instructions, we leverage pixel-to-pixel correlations in self-attention feature maps to align cross-attention maps and combine three loss functions constrained by boundary attention to update latent features. Comprehensive experimental results on both L2I and non-L2I pretrained diffusion models demonstrate that our method outperforms existing training-free L2I techniques, both quantitatively and qualitatively, in terms of image composition on the DrawBench and HRS benchmarks.", "link": "http://arxiv.org/abs/2411.10495v3", "date": "2026-03-23", "relevancy": 2.4845, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6322}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6133}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-Free%20Layout-to-Image%20Generation%20with%20Marginal%20Attention%20Constraints&body=Title%3A%20Training-Free%20Layout-to-Image%20Generation%20with%20Marginal%20Attention%20Constraints%0AAuthor%3A%20Huancheng%20Chen%20and%20Jingtao%20Li%20and%20Weiming%20Zhuang%20and%20Haris%20Vikalo%20and%20Lingjuan%20Lyu%0AAbstract%3A%20Recently%2C%20many%20text-to-image%20diffusion%20models%20have%20excelled%20at%20generating%20high-resolution%20images%20from%20text%20but%20struggle%20with%20precise%20control%20over%20spatial%20composition%20and%20object%20counting.%20To%20address%20these%20challenges%2C%20prior%20works%20have%20developed%20layout-to-image%20%28L2I%29%20approaches%20that%20incorporate%20layout%20instructions%20into%20text-to-image%20models.%20However%2C%20existing%20L2I%20methods%20typically%20require%20fine-tuning%20of%20pre-trained%20parameters%20or%20training%20additional%20control%20modules%20for%20diffusion%20models.%20In%20this%20work%2C%20we%20propose%20a%20training-free%20L2I%20approach%2C%20MAC%20%28Marginal%20Attention%20Constrained%20Generation%29%2C%20which%20eliminates%20the%20need%20for%20additional%20modules%20or%20fine-tuning.%20Specifically%2C%20we%20use%20text-visual%20cross-attention%20feature%20maps%20to%20quantify%20inconsistencies%20between%20the%20layout%20of%20the%20generated%20images%20and%20the%20provided%20instructions%2C%20and%20then%20compute%20loss%20functions%20to%20optimize%20latent%20features%20during%20the%20diffusion%20reverse%20process.%20To%20enhance%20spatial%20controllability%20and%20mitigate%20semantic%20failures%20under%20complex%20layout%20instructions%2C%20we%20leverage%20pixel-to-pixel%20correlations%20in%20self-attention%20feature%20maps%20to%20align%20cross-attention%20maps%20and%20combine%20three%20loss%20functions%20constrained%20by%20boundary%20attention%20to%20update%20latent%20features.%20Comprehensive%20experimental%20results%20on%20both%20L2I%20and%20non-L2I%20pretrained%20diffusion%20models%20demonstrate%20that%20our%20method%20outperforms%20existing%20training-free%20L2I%20techniques%2C%20both%20quantitatively%20and%20qualitatively%2C%20in%20terms%20of%20image%20composition%20on%20the%20DrawBench%20and%20HRS%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2411.10495v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraining-Free%2520Layout-to-Image%2520Generation%2520with%2520Marginal%2520Attention%2520Constraints%26entry.906535625%3DHuancheng%2520Chen%2520and%2520Jingtao%2520Li%2520and%2520Weiming%2520Zhuang%2520and%2520Haris%2520Vikalo%2520and%2520Lingjuan%2520Lyu%26entry.1292438233%3DRecently%252C%2520many%2520text-to-image%2520diffusion%2520models%2520have%2520excelled%2520at%2520generating%2520high-resolution%2520images%2520from%2520text%2520but%2520struggle%2520with%2520precise%2520control%2520over%2520spatial%2520composition%2520and%2520object%2520counting.%2520To%2520address%2520these%2520challenges%252C%2520prior%2520works%2520have%2520developed%2520layout-to-image%2520%2528L2I%2529%2520approaches%2520that%2520incorporate%2520layout%2520instructions%2520into%2520text-to-image%2520models.%2520However%252C%2520existing%2520L2I%2520methods%2520typically%2520require%2520fine-tuning%2520of%2520pre-trained%2520parameters%2520or%2520training%2520additional%2520control%2520modules%2520for%2520diffusion%2520models.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520training-free%2520L2I%2520approach%252C%2520MAC%2520%2528Marginal%2520Attention%2520Constrained%2520Generation%2529%252C%2520which%2520eliminates%2520the%2520need%2520for%2520additional%2520modules%2 {"title": "UniDex: A Robot Foundation Suite for Universal Dexterous Hand Control from Egocentric Human Videos", "author": "Gu Zhang and Qicheng Xu and Haozhe Zhang and Jianhan Ma and Long He and Yiming Bao and Zeyu Ping and Zhecheng Yuan and Chenhao Lu and Chengbo Yuan and Tianhai Liang and Xiaoyu Tian and Maanping Shao and Feihong Zhang and Mingyu Ding and Yang Gao and Hao Zhao and Hang Zhao and Huazhe Xu", "abstract": "Dexterous manipulation remains challenging due to the cost of collecting real-robot teleoperation data, the heterogeneity of hand embodiments, and the high dimensionality of control. We present UniDex, a robot foundation suite that couples a large-scale robot-centric dataset with a unified vision-language-action (VLA) policy and a practical human-data capture setup for universal dexterous hand control. First, we construct UniDex-Dataset, a robot-centric dataset over 50K trajectories across eight dexterous hands (6--24 DoFs), derived from egocentric human video datasets. To transform human data into robot-executable trajectories, we employ a human-in-the-loop retargeting procedure to align fingertip trajectories while preserving plausible hand-object contacts, and we operate on explicit 3D pointclouds with human hands masked to narrow kinematic and visual gaps. Second, we introduce the Function-Actuator-Aligned Space (FAAS), a unified action space that maps functionally similar actuators to shared coordinates, enabling cross-hand transfer. Leveraging FAAS as the action parameterization, we train UniDex-VLA, a 3D VLA policy pretrained on UniDex-Dataset and finetuned with task demonstrations. In addition, we build UniDex-Cap, a simple portable capture setup that records synchronized RGB-D streams and human hand poses and converts them into robot-executable trajectories to enable human-robot data co-training that reduces reliance on costly robot demonstrations. On challenging tool-use tasks across two different hands, UniDex-VLA achieves 81% average task progress and outperforms prior VLA baselines by a large margin, while exhibiting strong spatial, object, and zero-shot cross-hand generalization. Together, UniDex-Dataset, UniDex-VLA, and UniDex-Cap provide a scalable foundation suite for universal dexterous manipulation.", "link": "http://arxiv.org/abs/2603.22264v1", "date": "2026-03-23", "relevancy": 2.4551, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6702}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5845}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniDex%3A%20A%20Robot%20Foundation%20Suite%20for%20Universal%20Dexterous%20Hand%20Control%20from%20Egocentric%20Human%20Videos&body=Title%3A%20UniDex%3A%20A%20Robot%20Foundation%20Suite%20for%20Universal%20Dexterous%20Hand%20Control%20from%20Egocentric%20Human%20Videos%0AAuthor%3A%20Gu%20Zhang%20and%20Qicheng%20Xu%20and%20Haozhe%20Zhang%20and%20Jianhan%20Ma%20and%20Long%20He%20and%20Yiming%20Bao%20and%20Zeyu%20Ping%20and%20Zhecheng%20Yuan%20and%20Chenhao%20Lu%20and%20Chengbo%20Yuan%20and%20Tianhai%20Liang%20and%20Xiaoyu%20Tian%20and%20Maanping%20Shao%20and%20Feihong%20Zhang%20and%20Mingyu%20Ding%20and%20Yang%20Gao%20and%20Hao%20Zhao%20and%20Hang%20Zhao%20and%20Huazhe%20Xu%0AAbstract%3A%20Dexterous%20manipulation%20remains%20challenging%20due%20to%20the%20cost%20of%20collecting%20real-robot%20teleoperation%20data%2C%20the%20heterogeneity%20of%20hand%20embodiments%2C%20and%20the%20high%20dimensionality%20of%20control.%20We%20present%20UniDex%2C%20a%20robot%20foundation%20suite%20that%20couples%20a%20large-scale%20robot-centric%20dataset%20with%20a%20unified%20vision-language-action%20%28VLA%29%20policy%20and%20a%20practical%20human-data%20capture%20setup%20for%20universal%20dexterous%20hand%20control.%20First%2C%20we%20construct%20UniDex-Dataset%2C%20a%20robot-centric%20dataset%20over%2050K%20trajectories%20across%20eight%20dexterous%20hands%20%286--24%20DoFs%29%2C%20derived%20from%20egocentric%20human%20video%20datasets.%20To%20transform%20human%20data%20into%20robot-executable%20trajectories%2C%20we%20employ%20a%20human-in-the-loop%20retargeting%20procedure%20to%20align%20fingertip%20trajectories%20while%20preserving%20plausible%20hand-object%20contacts%2C%20and%20we%20operate%20on%20explicit%203D%20pointclouds%20with%20human%20hands%20masked%20to%20narrow%20kinematic%20and%20visual%20gaps.%20Second%2C%20we%20introduce%20the%20Function-Actuator-Aligned%20Space%20%28FAAS%29%2C%20a%20unified%20action%20space%20that%20maps%20functionally%20similar%20actuators%20to%20shared%20coordinates%2C%20enabling%20cross-hand%20transfer.%20Leveraging%20FAAS%20as%20the%20action%20parameterization%2C%20we%20train%20UniDex-VLA%2C%20a%203D%20VLA%20policy%20pretrained%20on%20UniDex-Dataset%20and%20finetuned%20with%20task%20demonstrations.%20In%20addition%2C%20we%20build%20UniDex-Cap%2C%20a%20simple%20portable%20capture%20setup%20that%20records%20synchronized%20RGB-D%20streams%20and%20human%20hand%20poses%20and%20converts%20them%20into%20robot-executable%20trajectories%20to%20enable%20human-robot%20data%20co-training%20that%20reduces%20reliance%20on%20costly%20robot%20demonstrations.%20On%20challenging%20tool-use%20tasks%20across%20two%20different%20hands%2C%20UniDex-VLA%20achieves%2081%25%20average%20task%20progress%20and%20outperforms%20prior%20VLA%20baselines%20by%20a%20large%20margin%2C%20while%20exhibiting%20strong%20spatial%2C%20object%2C%20and%20zero-shot%20cross-hand%20generalization.%20Together%2C%20UniDex-Dataset%2C%20UniDex-VLA%2C%20and%20UniDex-Cap%20provide%20a%20scalable%20foundation%20suite%20for%20universal%20dexterous%20manipulation.%0AL {"title": "SteelDefectX: A Coarse-to-Fine Vision-Language Dataset and Benchmark for Generalizable Steel Surface Defect Detection", "author": "Shuxian Zhao and Jie Gui and Baosheng Yu and Lu Dong and Zhipeng Gui", "abstract": "Steel surface defect detection is essential for ensuring product quality and reliability in modern manufacturing. Current methods often rely on basic image classification models trained on label-only datasets, which limits their interpretability and generalization. To address these challenges, we introduce SteelDefectX, a vision-language dataset containing 7,778 images across 25 defect categories, annotated with coarse-to-fine textual descriptions. At the coarse-grained level, the dataset provides class-level information, including defect categories, representative visual attributes, and associated industrial causes. At the fine-grained level, it captures sample-specific attributes, such as shape, size, depth, position, and contrast, enabling models to learn richer and more detailed defect representations. We further establish a benchmark comprising four tasks, vision-only classification, vision-language classification, few/zero-shot recognition, and zero-shot transfer, to evaluate model performance and generalization. Experiments with several baseline models demonstrate that coarse-to-fine textual annotations significantly improve interpretability, generalization, and transferability. We hope that SteelDefectX will serve as a valuable resource for advancing research on explainable, generalizable steel surface defect detection. The data will be publicly available on https://github.com/Zhaosxian/SteelDefectX.", "link": "http://arxiv.org/abs/2603.21824v1", "date": "2026-03-23", "relevancy": 2.4332, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.488}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Un {"title": "Feasibility of Augmented Reality-Guided Robotic Ultrasound with Cone-Beam CT Integration for Spine Procedures", "author": "Tianyu Song and Felix Pabst and Feng Li and Yordanka Velikova and Miruna-Alexandra Gafencu and Yuan Bi and Ulrich Eck and Nassir Navab", "abstract": "Accurate needle placement in spine interventions is critical for effective pain management, yet it depends on reliable identification of anatomical landmarks and careful trajectory planning. Conventional imaging guidance often relies both on CT and X-ray fluoroscopy, exposing patients and staff to high dose of radiation while providing limited real-time 3D feedback. We present an optical see-through augmented reality (OST-AR)-guided robotic system for spine procedures that provides in situ visualization of spinal structures to support needle trajectory planning. We integrate a cone-beam CT (CBCT)-derived 3D spine model which is co-registered with live ultrasound, enabling users to combine global anatomical context with local, real-time imaging. We evaluated the system in a phantom user study involving two representative spine procedures: facet joint injection and lumbar puncture. Sixteen participants performed insertions under two visualization conditions: conventional screen vs. AR. Results show that AR significantly reduces execution time and across-task placement error, while also improving usability, trust, and spatial understanding and lowering cognitive workload. These findings demonstrate the feasibility of AR-guided robotic ultrasound for spine interventions, highlighting its potential to enhance accuracy, efficiency, and user experience in image-guided procedures.", "link": "http://arxiv.org/abs/2603.22174v1", "date": "2026-03-23", "relevancy": 2.4305, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5066}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4881}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4636}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Feasibility%20of%20Augmented%20Reality-Guided%20Robotic%20Ultrasound%20with%20Cone-Beam%20CT%20Integration%20for%20Spine%20Procedures&body=Title%3A%20Feasibility%20of%20Augmented%20Reality-Guided%20Robotic%20Ultrasound%20with%20Cone-Beam%20CT%20Integration%20for%20Spine%20Procedures%0AAuthor%3A%20Tianyu%20Song%20and%20Felix%20Pabst%20and%20Feng%20Li%20and%20Yordanka%20Velikova%20and%20Miruna-Alexandra%20Gafencu%20and%20Yuan%20Bi%20and%20Ulrich%20Eck%20and%20Nassir%20Navab%0AAbstract%3A%20Accurate%20needle%20placement%20in%20spine%20interventions%20is%20critical%20for%20effective%20pain%20management%2C%20yet%20it%20depends%20on%20reliable%20identification%20of%20anatomical%20landmarks%20and%20careful%20trajectory%20planning.%20Conventional%20imaging%20guidance%20often%20relies%20both%20on%20CT%20and%20X-ray%20fluoroscopy%2C%20exposing%20patients%20and%20staff%20to%20high%20dose%20of%20radiation%20while%20providing%20limited%20real-time%203D%20feedback.%20We%20present%20an%20optical%20see-through%20augmented%20reality%20%28OST-AR%29-guided%20robotic%20system%20for%20spine%20procedures%20that%20provides%20in%20situ%20visualization%20of%20spinal%20structures%20to%20support%20needle%20trajectory%20planning.%20We%20integrate%20a%20cone-beam%20CT%20%28CBCT%29-derived%203D%20spine%20model%20which%20is%20co-registered%20with%20live%20ultrasound%2C%20enabling%20users%20to%20combine%20global%20anatomical%20context%20with%20local%2C%20real-time%20imaging.%20We%20evaluated%20the%20system%20in%20a%20phantom%20user%20study%20involving%20two%20representative%20spine%20procedures%3A%20facet%20joint%20injection%20and%20lumbar%20puncture.%20Sixteen%20participants%20p {"title": "P-Flow: Prompting Visual Effects Generation", "author": "Rui Zhao and Mike Zheng Shou", "abstract": "Recent advancements in video generation models have significantly improved their ability to follow text prompts. However, the customization of dynamic visual effects, defined as temporally evolving and appearance-driven visual phenomena like object crushing or explosion, remains underexplored. Prior works on motion customization or control mainly focus on low-level motions of the subject or camera, which can be guided using explicit control signals such as motion trajectories. In contrast, dynamic visual effects involve higher-level semantics that are more naturally suited for control via text prompts. However, it is hard and time-consuming for humans to craft a single prompt that accurately specifies these effects, as they require complex temporal reasoning and iterative refinement over time. To address this challenge, we propose P-Flow, a novel training-free framework for customizing dynamic visual effects in video generation without modifying the underlying model. By leveraging the semantic and temporal reasoning capabilities of vision-language models, P-Flow performs test-time prompt optimization, refining prompts based on the discrepancy between the visual effects of the reference video and the generated output. Through iterative refinement, the prompts evolve to better induce the desired dynamic effect in novel scenes. Experiments demonstrate that P-Flow achieves high-fidelity and diverse visual effect customization and outperforms other models on both text-to-video and image-to-video generation tasks. Code is available at https://github.com/showlab/P-Flow.", "link": "http://arxiv.org/abs/2603.22091v1", "date": "2026-03-23", "relevancy": 2.4229, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6587}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5966}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5936}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20P-Flow%3A%20Prompting%20Visual%20Effects%20Generation&body=Title%3A%20P-Flow%3A%20Prompting%20Visual%20Effects%20Generation%0AAuthor%3A%20Rui%20Zhao%20and%20Mike%20Zheng%20Shou%0AAbstract%3A%20Recent%20advancements%20in%20video%20generation%20models%20have%20significantly%20improved%20their%20ability%20to%20follow%20text%20prompts.%20However%2C%20the%20customization%20of%20dynamic%20visual%20effects%2C%20defined%20as%20temporally%20evolving%20and%20appearance-driven%20visual%20phenomena%20like%20object%20crushing%20or%20explosion%2C%20remains%20underexplored.%20Prior%20works%20on%20motion%20customization%20or%20control%20mainly%20focus%20on%20low-level%20motions%20of%20the%20subject%20or%20camera%2C%20which%20can%20be%20guided%20using%20explicit%20control%20signals%20such%20as%20motion%20trajectories.%20In%20contrast%2C%20dynamic%20visual%20effects%20involve%20higher-level%20semantics%20that%20are%20more%20naturally%20suited%20for%20control%20via%20text%20prompts.%20However%2C%20it%20is%20hard%20and%20time-consuming%20for%20humans%20to%20craft%20a%20single%20prompt%20that%20accurately%20specifies%20these%20effects%2C%20as%20they%20require%20complex%20temporal%20reasoning%20and%20iterative%20refinement%20over%20time.%20To%20address%20this%20challenge%2C%20we%20propose%20P-Flow%2C%20a%20novel%20training-free%20framework%20for%20customizing%20dynamic%20visual%20effects%20in%20video%20generation%20without%20modifying%20the%20underlying%20model.%20By%20leveraging%20the%20semantic%20and%20temporal%20reasoning%20capabilities%20of%20vision-language%20models%2C%20P-Flow%20performs%20test-time%20prompt%20optimization%2C%20refining%20prompts%20based%20on%20the%20discrepancy%20between%20the%20visual%20effects%20of%20the%20reference%20video%20and%20the%20generated%20output.%20Through%20iterative%20refinement%2C%20the%20prompts%20evolve%20to%20better%20induce%20the%20desired%20dynamic%20effect%20in%20novel%20scenes.%20Experiments%20demonstrate%20that%20P-Flow%20achieves%20high-fidelity%20and%20diverse%20visual%20effect%20customization%20and%20outperforms%20other%20models%20on%20both%20text-to-video%20and%20image-to-video%20generation%20tasks.%20Code%20is%20available%20at%20https%3A//github.com/showlab/P-Flow.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22091v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DP-Flow%253A%2520Prompting%2520Visual%2520Effects%2520Generation%26entry.906535625%3DRui%2520Zhao%2520and%2520Mike%2520Zheng%2520Shou%26entry.1292438233%3DRecent%2520advancements%2520in%2520video%2520generation%2520models%2520have%2520significantly%2520improved%2520their%2520ability%2520to%2520follow%2520text%2520prompts.%2520However%252C%2520the%2520customization%2520of%2520dynamic%2520visual%2520effects%252C%2520defined%2520as%2520temporally%2520evolving%2520and%2520appearance-driven%2520visual%2520phenomena%2520like%2520object%2520crushing%2520or%2520explosion%252C%2520remains%2520underexplored.%2520Prior%2520works%2520on%2520motion%2520customization%2520or%2520control%2520mainly%2520focus%2520on%2520low-level%2520motions%2520of%2520the%2520subject%2520or%2520camera%252C%2520which%2520can%2520be%2520guided%2520using%2520explicit%2520control%2520signals%2520such%2520as%2520motion%2520trajectories.%2520In%2520contrast%252C%2520dynamic%2520visual%2520effects%2520involve%2520higher-level%2520semantics%2520that%2520are%2520more%2520naturally%2520suited%2520for%2520control%2520via%2520text%2520prompts.%2520However%252C%2520it%2520is%2520hard%2520and%2520time-consuming%2520for%2520humans%2520to%2520craft%2520a%2520single%2520prompt%2520that%2520accur 0visual%20phenomena%20like%20object%20crushing%20or%20explosion%2C%20remains%20underexplored.%20Prior%20works%20on%20motion%20customization%20or%20control%20mainly%20focus%20on%20low-level%20motions%20of%20the%20subject%20or%20camera%2C%20which%20can%20be%20guided%20using%20explicit%20control%20signals%20such%20as%20motion%20trajectories.%20In%20contrast%2C%20dynamic%20visual%20effects%20involve%20higher-level%20semantics%20that%20are%20more%20naturally%20suited%20for%20control%20via%20text%20prompts.%20However%2C%20it%20is%20hard%20and%20time-consuming%20for%20humans%20to%20craft%20a%20single%20prompt%20that%20accurately%20specifies%20these%20effects%2C%20as%20they%20require%20complex%20temporal%20reasoning%20and%20iterative%20refinement%20over%20time.%20To%20address%20this%20challenge%2C%20we%20propose%20P-Flow%2C%20a%20novel%20training-free%20framework%20for%20customizing%20dynamic%20visual%20effects%20in%20video%20generation%20without%20modifying%20the%20underlying%20model.%20By%20leveraging%20the%20semantic%20and%20temporal%20reasoning%20capabilities%20of%20vision-language%20models%2C%20P-Flow%20performs%20test-time%20prompt%20optimization%2C%20refining%20prompts%20based%20on%20the%20discrepancy%20between%20the%20visual%20effects%20of%20the%20reference%20video%20and%20the%20generated%20output.%20Through%20iterative%20refinement%2C%20the%20prompts%20evolve%20to%20better%20induce%20the%20desired%20dynamic%20effect%20in%20novel%20scenes.%20Experiments%20demonstrate%20that%20P-Flow%20achieves%20high-fidelity%20and%20diverse%20visual%20effect%20customization%20and%20outperforms%20other%20models%20on%20both%20text-to-video%20and%20image-to-video%20generation%20tasks.%20Code%20is%20available%20at%20https%3A//github.com/showlab/P-Flow.&entry.1838667208=http%3A//arxiv.org/abs/2603.22091v1&entry.124074799=Read"},
{"title": "TRI-DEP: A Trimodal Comparative Study for Depression Detection Using Speech, Text, and EEG", "author": "Annisaa Fitri Nurfidausi and Eleonora Mancini and Paolo Torroni", "abstract": "Depression is a widespread mental health disorder, yet its automatic detection remains challenging. Prior work has explored unimodal and multimodal approaches, with multimodal systems showing promise by leveraging complementary signals. However, existing studies are limited in scope, lack systematic comparisons of features, and suffer from inconsistent evaluation protocols. We address these gaps by systematically exploring feature representations and modelling strategies across EEG, together with speech and text. We evaluate handcrafted features versus pre-trained embeddings, assess the effectiveness of different neural encoders, compare unimodal, bimodal, and trimodal configurations, and analyse fusion strategies with attention to the role of EEG. Consistent subject-independent splits are applied to ensure robust, reproducible benchmarking. Our results show that (i) the combination of EEG, speech and text modalities enhances multimodal detection, (ii) pretrained embeddings outperform handcrafted features, and (iii) carefully designed trimodal models achieve state-of-the-art performance. Our work lays the groundwork for future research in multimodal depression detection.", "link": "http://arxiv.org/abs/2510.14922v2", "date": "2026-03-23", "relevancy": 2.3963, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5044}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4667}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4667}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TRI-DEP%3A%20A%20Trimodal%20Comparative%20Study%20for%20Depression%20Detection%20Using%20Speech%2C%20Text%2C%20and%20EEG&body=Title%3A%20TRI-DEP%3A%20A%20Trimodal%20Comparative%20Study%20for%20Depression%20Detection%20Using%20Speech%2C%20Text%2C%20and%20EEG%0AAuthor%3A%20Annisaa%20Fitri%20Nurfidausi%20and%20Eleonora%20Mancini%20and%20Paolo%20Torroni%0AAbstract%3A%20Depression%20is%20a%20widespread%20mental%20health%20disorder%2C%20yet%20its%20automatic%20detection%20remains%20challenging.%20Prior%20work%20has%20explored%20unimodal%20and%20multimodal%20approaches%2C%20with%20multimodal%20systems%20showing%20promise%20by%20leveraging%20complementary%20signals.%20However%2C%20existing%20studies%20are%20limited%20in%20scope%2C%20lack%20systematic%20comparisons%20of%20features%2C%20and%20suffer%20from%20inconsistent%20evaluation%20protocols.%20We%20address%20these%20gaps%20by%20systematically%20exploring%20feature%20representations%20and%20modelling%20strategies%20across%20EEG%2C%20together%20with%20speech%20and%20text.%20We%20evaluate%20handcrafted%20features%20versus%20pre-trained%20embeddings%2C%20assess%20the%20effectiveness%20of%20different%20neural%20encoders%2C%20compare%20unimodal%2C%20bimodal%2C%20and%20trimodal%20configurations%2C%20and%20analyse%20fusion%20strategies%20with%20attention%20to%20the%20role%20of%20EEG.%20Consistent%20subject-independent%20splits%20are%20applied%20to%20ensure%20robust%2C%20reproducible%20benchmarking.%20Our%20results%20show%20that%20%28i%29%20the%20combination%20of%20EEG%2C%20speech%20and%20text%20modalities%20enhances%20multimodal%20detection%2C%20%28ii%29%20pretrained%20embeddings%20outperform%20handcrafted%20features%2C%20and%20%28iii%29%20carefully%20designed%20trimodal%20models%20achieve%20state-of-the-art%20performance.%20Our%20work%20lays%20the%20groundwork%20for%20future%20research%20in%20multimodal%20depression%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2510.14922v2%0AForm%3A%20https%3A//docs.g form%20handcrafted%20features%2C%20and%20%28iii%29%20carefully%20designed%20trimodal%20models%20achieve%20state-of-the-art%20performance.%20Our%20work%20lays%20the%20groundwork%20for%20future%20research%20in%20multimodal%20depression%20detection.&entry.1838667208=http%3A//arxiv.org/abs/2510.14922v2&entry.124074799=Read"},
{"title": "Memory-V2V: Memory-Augmented Video-to-Video Diffusion for Consistent Multi-Turn Editing", "author": "Dohun Lee and Chun-Hao Paul Huang and Xuelin Chen and Jong Chul Ye and Duygu Ceylan and Hyeonho Jeong", "abstract": "Video-to-video diffusion models achieve impressive single-turn editing performance, but practical editing workflows are inherently iterative. When edits are applied sequentially, existing models treat each turn independently, often causing previously generated regions to drift or be overwritten. We identify this failure mode as the problem of cross-turn consistency in multi-turn video editing. We introduce Memory-V2V, a memory-augmented framework that treats prior edits as structured constraints for subsequent generations. Memory-V2V maintains an external memory of previous outputs, retrieves task-relevant edits, and integrates them through relevance-aware tokenization and adaptive compression. These technical ingredients enable scalable conditioning without linear growth in computation. We demonstrate Memory-V2V on iterative video novel view synthesis and text-guided long video editing. Memory-V2V substantially enhances cross-turn consistency while maintaining visual quality, outperforming strong baselines with modest overhead.", "link": "http://arxiv.org/abs/2601.16296v2", "date": "2026-03-23", "relevancy": 2.3894, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6557}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.617}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Memory-V2V%3A%20Memory-Augmented%20Video-to-Video%20Diffusion%20for%20Consistent%20Multi-Turn%20 {"title": "Camera-Agnostic Pruning of 3D Gaussian Splats via Descriptor-Based Beta Evidence", "author": "Peter Fasogbon and Ugurcan Budak and Patrice Rondao Alface and Hamed Rezazadegan Tavakoli", "abstract": "The pruning of 3D Gaussian splats is essential for reducing their complexity to enable efficient storage, transmission, and downstream processing. However, most of the existing pruning strategies depend on camera parameters, rendered images, or view-dependent measures. This dependency becomes a hindrance in emerging camera-agnostic exchange settings, where splats are shared directly as point-based representations (e.g., .ply). In this paper, we propose a camera-agnostic, one-shot, post-training pruning method for 3D Gaussian splats that relies solely on attribute-derived neighbourhood descriptors. As our primary contribution, we introduce a hybrid descriptor framework that captures structural and appearance consistency directly from the splat representation. Building on these descriptors, we formulate pruning as a statistical evidence estimation problem and introduce a Beta evidence model that quantifies per-splat reliability through a probabilistic confidence score.\n  Experiments conducted on standardized test sequences defined by the ISO/IEC MPEG Common Test Conditions (CTC) demonstrate that our approach achieves substantial pruning while preserving reconstruction quality, establishing a practical and generalizable alternative to existing camera-dependent pruning strategies.", "link": "http://arxiv.org/abs/2603.21933v1", "date": "2026-03-23", "relevancy": 2.3884, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6196}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5865}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5672}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Camera-Agnostic%20Pruning%20of%203D%20Gaussian%20Splats%20via%20Descriptor-Based%20Beta%20Evidence&body=Title%3A%20Camera-Agnostic%20Pruning%20of%203D%20Gaussian%20Splats%20via%20Descriptor-Based%20Beta%20Evidence%0AAuthor%3A%20Peter%20Fasogbon%20and%20Ugurcan%20Budak%20and%20Patrice%20Rondao%20Alface%20and%20Hamed%20Rezazadegan%20Tavakoli%0AAbstract%3A%20The%20pruning%20of%203D%20Gaussian%20splats%20is%20essential%20for%20reducing%20their%20complexity%20to%20enable%20efficient%20storage%2C%20transmission%2C%20and%20downstream%20processing.%20However%2C%20most%20of%20the%20existing%20pruning%20strategies%20depend%20on%20camera%20parameters%2C%20rendered%20images%2C%20or%20view-dependent%20measures.%20This%20dependency%20becomes%20a%20hindrance%20in%20emerging%20camera-agnostic%20exchange%20settings%2C%20where%20splats%20are%20shared%20directly%20as%20point-based%20representations%20%28e.g.%2C%20.ply%29.%20In%20this%20paper%2C%20we%20propose%20a%20camera-agnostic%2C%20one-shot%2C%20post-training%20pruning%20method%20for%203D%20Gaussian%20splats%20that%20relies%20solely%20on%20attribute-derived%20neighbourhood%20descriptors.%20As%20our%20primary%20contribution%2C%20we%20introduce%20a%20hybrid%20descriptor%20framework%20that%20captures%20structural%20and%20appearance%20consistency%20directly%20from%20the%20splat%20representation.%20Building%20on%20these%20descriptors%2C%20we%20formulate%20pruning%20as%20a%20statistical%20evidence%20estimation%20problem%20and%20introduce%20a%20Beta%20evidence%20model%20that%20quantifies%20per-splat%20reliability%20through%20a%20probabilistic%20confidence%20score.%0A%20%20Experiments%20conducted%20on%20standardized%20test%20sequences%20defined%20by%20the%20ISO/IEC%20MPEG%20Common%20Test%20Conditions%20%28CTC%29%20demonstrate%20that%20our%20approach%20achieves%20substantial%20pruning%20while%20preserving%20reconstruction%20quality%2C%20establishing%20a%20practical%20and%20generalizable%20alternative%20to%20existing%20camera-dependent%20pruning%20strategies.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21933v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCamera-Agnostic%2520Pruning%2520of%25203D%2520Gaussian%2520Splats%2520via%2520Descriptor-Based%2520Beta%2520Evidence%26entry.906535625%3DPeter%2520Fasogbon%2520and%2520Ugurcan%2520Budak%2520and%2520Patrice%2520Rondao%2520Alface%2520and%2520Hamed%2520Rezazadegan%2520Tavakoli%26entry.1292438233%3DThe%2520pruning%2520of%25203D%2520Gaussian%2520splats%2520is%2520essential%2520for%2520reducing%2520their%2520complexity%2520to%2520enable%2520efficient%2520storage%252C%2520transmission%252C%2520and%2520downstream%2520processing.%2520However%252C%2520most%2520of%2520the%2520existing%2520pruning%2520strategies%2520depend%2520on%2520camera%2520parameters%252C%2520rendered%2520images%252C%2520or%2520view-dependent%2520measures.%2520This%2520dependency%2520becomes%2520a%2520hindrance%2520in%2520emerging%2520camera-agnostic%2520exchange%2520settings%252C%2520where%2520splats%2520are%2520shared%2520directly%2520as%2520point-based%2520representations%2520%2528e.g.%252C%2520.ply%2529.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520camera-agnostic%252C%2520one-shot%252C%2520post-training%2520pruning%2520method%2520for%25203D%2520Gaussian%2520splats%2520that%2520relies%2520solely%2520on%2520attribute-derived%2520neighbourhood%2520descriptors.%2520As%2520our%2520primary%2520contribution%252C%2520we%2520introduce%2520a%2520hybrid%2520descriptor%2520framework%2520that%2520captures%2520structural%2520and%2520appearance%2520consistency%2520directly%2520from%2520the%2520splat%2520representation.%2520Building%2520on%2520these%2520descriptors%252C%2520we%2520formulate%2520pruning%2520as%2520a%2520statistical%2520evidence%2520estimation%2520problem%2520and%2520introduce%2520a%2520Beta%2520evidence%2520model%2520that%2520quantifies%2520per-splat%2520reliability%2520through%2520a%2520probabilistic%2520confidence%2520score.%250A%2520%2520Experiments%2520conducted%2520on%2520standardized%2520test%2520sequences%2520defined%2520by%2520the%2520ISO/IEC%2520MPEG%2520Common%2520Test%2520Conditions%2520%2528CTC%2529%2520demonstrate%2520that%2520our%2520approach%2520achieves%2520substantial%2520pruning%2520while%2520preserving%2520reconstruction%2520quality%252C%2520establishing%2520a%2520practical%2520and%2520generalizable%2520alternative%2520to%2520existing%2520camera-dependent%2520pruning%2520strategies.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.21933v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Camera-Agnostic%20Pruning%20of%203D%20Gaussian%20Splats%20via%20Descriptor-Based%20Beta%20Evidence&entry.906535625=Peter%20Fasogbon%20and%20Ugurcan%20Budak%20and%20Patrice%20Rondao%20Alface%20and%20Hamed%20Rezazadegan%20Tavakoli&entry.1292438233=The%20pruning%20of%203D%20Gaussian%20splats%20is%20essential%20for%20reducing%20their%20complexity%20to%20enable%20efficient%20storage%2C%20transmission%2C%20and%20downstream%20processing.%20However%2C%20most%20of%20the%20existing%20pruning%20strategies%20depend%20on%20camera%20parameters%2C%20rendered%20images%2C%20or%20view-dependent%20measures.%20This%20dependency%20becomes%20a%20hindrance%20in%20emerging%20camera-agnostic%20exchange%20settings%2C%20where%20splats%20are%20shared%20directly%20as%20point-based%20representations%20%28e.g.%2C%20.ply%29.%20In%20this%20paper%2C%20we%20propose%20a%20camera-agnostic%2C%20one-shot%2C%20post-training%20pruning%20method%20for%203D%20Gaussian%20splats%20that%20relies%20solely%20on%20attribute-derived%20neighbourhood%20descriptors.%20As%20our%20primary%20contribution%2C%20we%20introduce%20a%20hybrid%20descriptor% {"title": "Beyond Matching to Tiles: Bridging Unaligned Aerial and Satellite Views for Vision-Only UAV Navigation", "author": "Kejia Liu and Haoyang Zhou and Ruoyu Xu and Peicheng Wang and Mingli Song and Haofei Zhang", "abstract": "Recent advances in cross-view geo-localization (CVGL) methods have shown strong potential for supporting unmanned aerial vehicle (UAV) navigation in GNSS-denied environments. However, existing work predominantly focuses on matching UAV views to onboard map tiles, which introduces an inherent trade-off between accuracy and storage overhead, and overlooks the importance of the UAV's heading during navigation. Moreover, the substantial discrepancies and varying overlaps in cross-view scenarios have been insufficiently considered, limiting their generalization to real-world scenarios. In this paper, we present Bearing-UAV, a purely vision-driven cross-view navigation method that jointly predicts UAV absolute location and heading from neighboring features, enabling accurate, lightweight, and robust navigation in the wild. Our method leverages global and local structural features and explicitly encodes relative spatial relationships, making it robust to cross-view variations, misalignment, and feature-sparse conditions. We also present Bearing-UAV-90k, a multi-city benchmark for evaluating cross-view localization and navigation. Extensive experiments show encouraging results that Bearing-UAV yields lower localization error than previous matching/retrieval paradigm across diverse terrains. Our code and dataset will be made publicly available.", "link": "http://arxiv.org/abs/2603.22153v1", "date": "2026-03-23", "relevancy": 2.3749, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6232}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.584}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5445}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Matching%20to%20Tiles%3A%20Bridging%20Unaligned%20Aerial%20and%20Satellite%20Views%20for%20Vision-Only%20UAV%20Navigation&body=Title%3A%20Beyond%20Matching%20to%20Tiles%3A%20Bridging%20Unaligned%20Aerial%20and%20Satellite%20Views%20for%20Vision-Only%20UAV%20Navigation%0AAuthor%3A%20Kejia%20Liu%20and%20Haoyang%20Zhou%20and%20Ruoyu%20Xu%20and%20Peicheng%20Wang%20and%20Mingli%20Song%20and%20Haofei%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20cross-view%20geo-localization%20%28CVGL%29%20methods%20have%20shown%20strong%20potential%20for%20supporting%20unmanned%20aerial%20vehicle%20%28UAV%29%20navigation%20in%20GNSS-denied%20environments.%20However%2C%20existing%20work%20predominantly%20focuses%20on%20matching%20UAV%20views%20to%20onboard%20map%20tiles%2C%20which%20introduces%20an%20inherent%20trade-off%20between%20accuracy%20and%20storage%20overhead%2C%20and%20overlooks%20the%20importance%20of%20the%20UAV%27s%20heading%20during%20navigation.%20Moreover%2C%20the%20substantial%20discrepancies%20and%20varying%20overlaps%20in%20cross-view%20scenarios%20have%20been%20insufficiently%20considered%2C%20limiting%20their%20generalization%20to%20real-world%20scenarios.%20In%20this%20paper%2C%20we%20present%20Bearing-UAV%2C%20a%20purely%20vision-driven%20cross-view%20navigation%20method%20that%20jointly%20predicts%20UAV%20absolute%20location%20and%20heading%20from%20neighboring%20features%2C%20enabling%20accurate%2C%20lightweight%2C%20and%20robust%20navigation%20in%20the%20wild.%20Our%20method%20leverages%20global%20and%20local%20structural%20features%20and%20explicitly%20encodes%20relative%20spatial%20relationships%2C%20making%20it%20robust%20to%20cross-view%20variations%2C%20misalignment%2C%20and%20feature-sparse%20conditions.%20We%20also%20present%20Bearing-UAV-90k%2C%20a%20multi-city%20benchmark%20for%20evaluating%20cross-view%20localization%20and%20navigation.%20Extensive%20experiments%20show%20encouraging%20results%20that%20Bearing-UAV%20yields%20lower%20localization%20error%20than%20previous%20matching/retrieval%20paradigm%20across%20diverse%20terrains.%20Our%20code%20and%20dataset%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22153v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Matching%2520to%2520Tiles%253A%2520Bridging%2520Unaligned%2520Aerial%2520and%2520Satellite%2520Views%2520for%2520Vision-Only%2520UAV%2520Navigation%26entry.906535625%3DKejia%2520Liu%2520and%2520Haoyang%2520Zhou%2520and%2520Ruoyu%2520Xu%2520and%2520Peicheng%2520Wang%2520and%2520Mingli%2520Song%2520and%2520Haofei%2520Zhang%26entry.1292438233%3DRecent%2520advances%2520in%2520cross-view%2520geo-localization%2520%2528CVGL%2529%2520methods%2520have%2520shown%2520strong%2520potential%2520for%2520supporting%2520unmanned%2520aerial%2520vehicle%2520%2528UAV%2529%2520navigation%2520in%2520GNSS-denied%2520environments.%2520However%252C%2520existing%2520work%2520predominantly%2520focuses%2520on%2520matching%2520UAV%2520views%2520to%2520onboard%2520map%2520tiles%252C%2520which%2520introduces%2520an%2520inherent%2520trade-off%2520between%2520accuracy%2520and%2520storage%2520overhead%252C%2520and%2520overlooks%2520the%2520importance%2520of%2520the%2520UAV%2527s%2520heading%2520during%2520navigation.%2520Moreover%252C%2520the%2520substantial%2520discrepancies%2520and%2520varying%2520overlaps%2520in%2520cross-view%2520scenarios%2520have%2520been%2520insufficiently%2520considered%252C%2520limiting%2520their%2520generalization%2520to%2520real-world%2520scenarios.%2520In%2520this%2520paper%252C%2520we%2520present%2520Bearing-UAV%252C%2520a%2520purely%2520vision-driven%2520cross-view%2520navigation%2520method%2520that%2520jointly%2520predicts%2520UAV%2520absolute%2520location%2520and%2520heading%2520from%2520neighboring%2520features%252C%2520enabling%2520accurate%252C%2520lightweight%252C%2520and%2520robust%2520navigation%2520in%2520the%2520wild.%2520Our%2520method%2520leverages%2520global%2520and%2520local%2520structural%2520features%2520and%2520explicitly%2520encodes%2520relative%2520spatial%2520relationships%252C%2520making%2520it%2520robust%2520to%2520cross-view%2520variations%252C%2520misalignment%252C%2520and%2520feature-sparse%2520conditions.%2520We%2520also%2520present%2520Bearing-UAV-90k%252C%2520a%2520multi-city%2520benchmark%2520for%2520evaluating%2520cross-view%2520localization%2520and%2520navigation.%2520Extensive%2520experiments%2520show%2520encouraging%2520results%2520that%2520Bearing-UAV%2520yields%2520lower%2520localization%2520error%2520than%2520previous%2520matching/retrieval%2520paradigm%2520across%2520diverse%2520terrains.%2520Our%2520code%2520and%2520dataset%2520will%2520be%2520made%2520publicly%2520available.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22153v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Matching%20to%20Tiles%3A%20Bridging%20Unaligned%20Aerial%20and%20Satellite%20Views%20for%20Vision-Only%20UAV%20Navigation&entry.906535625=Kejia%20Liu%20and%20Haoyang%20Zhou%20and%20Ruoyu%20Xu%20and%20Peicheng%20Wang%20and%20Mingli%20Song%20and%20Haofei%20Zhang&entry.1292438233=Recent%20advances%20in%20cross-view%20geo-localization%20%28CVGL%29%20methods%20have%20shown%20strong%20potential%20for%20supporting%20unmanned%20aerial%20vehicle%20%28UAV%29%20navigation%20in%20GNSS-denied%20environments.%20However%2C%20existing%20work%20predominantly%20focuses%20on%20matching%20UAV%20views%20to%20onboard%20map%20tiles%2C%20which%20introduces%20an%20inherent%20trade-off%20between%20accuracy%20and%20storage%20overhead%2C%20and%20overlooks%20the%20importance%20of%20the%20UAV%27s%20heading%20during%20navigation.%20Moreover%2C%20the%20substantial%20discrepancies%20and%20varying%20overlaps%20in%20cross-view%20scenarios%20have%20been%20insufficiently%20considered%2C%20limiting%20their%20generalization%20to%20real-world%20scenarios.%20In%20this%20paper%2C%20we%20present%20Bearing-UAV%2C%20a%20purely%20vision-driven%20cross-view%20navigation%20method%20that%20jointly%20predicts%20UAV%20absolute%20location%20and%20heading%20from%20neighboring%20features%2C%20enabling%20accurate%2C%20lightweight%2C%20and%20robust%20navigation%20in%20the%20wild.%20Our%20method%20leverages%20global%20and%20local%20structural%20features%20and%20explicitly%20encodes%20relative%20spatial%20relationships%2C%20making%20it%20robust%20to%20cross-view%20variations%2C%20misalignment%2C%20and%20feature-sparse%20conditions.%20We%20also%20present%20Bearing-UAV-90k%2C%20a%20multi-city%20benchmark%20for%20evaluating%20cross-view%20localization%20and%20navigation.%20Extensive%20experiments%20show%20encouraging%20results%20that%20Bearing-UAV%20yields%20lower%20localization%20error%20than%20previous%20matching/retrieval%20paradigm%20across%20diverse%20terrains.%20Our%20code%20and%20dataset%20will%20be%20made%20publicly%20available.&entry.1838667208=http%3A//arxiv.org/abs/2603.22153v1&entry.124074799=Read"},
{"title": "Revisiting Quantum Code Generation: Where Should Domain Knowledge Live?", "author": "Oscar Novo and Oscar Bastidas-Jossa and Alberto Calvo and Antonio Peris and Carlos Kuchkovsky", "abstract": "Recent advances in large language models (LLMs) have enabled the automation of an increasing number of programming tasks, including code generation for scientific and engineering domains. In rapidly evolving software ecosystems such as quantum software development, where frameworks expose complex abstractions, a central question is how best to incorporate domain knowledge into LLM-based assistants while preserving maintainability as libraries evolve.\n  In this work, we study specialization strategies for Qiskit code generation using the Qiskit-HumanEval benchmark. We compare a parameter-specialized fine-tuned baseline introduced in prior work against a range of recent general-purpose LLMs enhanced with retrieval-augmented generation (RAG) and agent-based inference with execution feedback.\n  Our results show that modern general-purpose LLMs consistently outperform the parameter-specialized baseline. While the fine-tuned model achieves approximately 47% pass@1 on Qiskit-HumanEval, recent general-purpose models reach 60-65% under zero-shot and retrieval-augmented settings, and up to 85% for the strongest evaluated model when combined with iterative execution-feedback agents -representing an improvement of more than 20% over zero-shot general-purpose performance and more than 35% over the parameter-specialized baseline.\n  Agentic execution feedback yields the most consistent improvements, albeit at increased runtime cost, while RAG provides modest and model-dependent gains. These findings indicate that performance gains can be achieved without domain-specific fine-tuning, instead relying on inference-time augmentation, thereby enabling a more flexible and maintainable approach to LLM-assisted quantum software development.", "link": "http://arxiv.org/abs/2603.22184v1", "date": "2026-03-23", "relevancy": 2.3705, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4784}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4784}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4655}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Quantum%20Code%20Generation%3A%20Where%20Should%20Domain%20Knowledge%20Live%3F&body=Title%3A%20Revisiting%20Quantum%20Code%20Generation%3A%20Where%20Should%20Domain%20Knowledge%20Live%3F%0AAuthor%3A%20Oscar%20Novo%20and%20Oscar%20Bastidas-Jossa%20and%20Alberto%20Calvo%20and%20Antonio%20Peris%20and%20Carlos%20Kuchkovsky%0AAbstract%3A%20Recent%20advances%20in%20large%20language%20models%20%28LLMs%29%20have%20enabled%20the%20automation%20of%20an%20increasing%20number%20of%20programming%20tasks%2C%20including%20code%20generation%20for%20scientific%20and%20engineering%20domains.%20In%20rapidly%20evolving%20software%20ecosystems%20such%20as%20quantum%20software%20development%2C%20where%20frameworks%20expose%20complex%20abstractions%2C%20a%20central%20question%20is%20how%20best%20to%20incorporate%20domain%20knowledge%20into%20LLM-based%20assistants%20while%20preserving%20maintainability%20as%20libraries%20evolve.%0A%20%20In%20this%20work%2C%20we%20study%20specialization%20strategies%20for%20Qiskit%20code%20generation%20using%20the%20Qiskit-HumanEval%20benchmark.%20We%20compare%20a%20parameter-specialized%20fine-tuned%20baseline%20introduced%20in%20prior%20work%20against%20a%20range%20of%20recent%20general-purpose%20LLMs%20enhanced%20with%20retrieval-augmented%20generation%20%28RAG%29%20and%20agent-based%20inference%20with%20execution%20feedback.%0A%20%20Our%20results%20show%20that%20modern%20general-purpose%20LLMs%20consistently%20outperform%20the%20parameter-specialized%20baseline.%20While%20the%20fine-tuned%20model%20achieves%20approximately%2047%25%20pass%401%20on%20Qiskit-HumanEval%2C%20recent%20general-purpose%20models%20reach%2060-65%25%20under%20zero-shot%20and%20retrieval-augmented%20settings%2C%20and%20up%20to%2085%25%20for%20the%20strongest%20evaluated%20model%20when%20combined%20with%20iterative%20execution-feedback%20agents%20-representing%20an%20improvement%20of%20more%20than%2020%25%20over%20zero-shot%20general-purpose%20performance%20and%20more%20than%2035%25%20over%20the%20parameter-specialized%20baseline.%0A%20%20Agentic%20execution%20feedback%20yields%20the%20most%20consistent%20improvements%2C%20albeit%20at%20increased%20runtime%20cost%2C%20while%20RAG%20provides%20modest%20and%20model-dependent%20gains.%20These%20findings%20indicate%20that%20performance%20gains%20can%20be%20achieved%20without%20domain-specific%20fine-tuning%2C%20instead%20relying%20on%20inference-time%20augmentation%2C%20thereby%20enabling%20a%20more%20flexible%20and%20maintainable%20approach%20to%20LLM-assisted%20quantum%20software%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22184v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Quantum%2520Code%2520Generation%253A%2520Where%2520Should%2520Domain%2520Knowledge%2520Live%253F%26entry.906535625%3DOscar%2520Novo%2520and%2520Oscar%2520Bastidas-Jossa%2520and%2520Alberto%2520Calvo%2520and%2520Antonio%2520Peris%2520and%2520Carlos%2520Kuchkovsky%26entry.1292438233%3DRecent%2520advances%2520in%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520enabled%2520the%2520automation%2520of%2520an%2520increasing%2520number%2520of%2520programming%2520tasks%252C%2520including%2520code%2520generation%2520for%2520scientific%2520and%2520engineering%2520domains.%2520In%2520rapidly%2520evolving%2520software%2520ecosystem indings%2520indicate%2520that%2520performance%2520gains%2520can%2520be%2520achieved%2520without%2520domain-specific%2520fine-tuning%252C%2520instead%2520relying%2520on%2520inference-time%2520augmentation%252C%2520thereby%2520enabling%2520a%2520more%2520flexible%2520and%2520maintainable%2520approach%2520to%2520LLM-assisted%2520quantum%2520software%2520development.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22184v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Revisiting%20Quantum%20Code%20Generation%3A%20Where%20Should%20Domain%20Knowledge%20Live%3F&entry.906535625=Oscar%20Novo%20and%20Oscar%20Bastidas-Jossa%20and%20Alberto%20Calvo%20and%20Antonio%20Peris%20and%20Carlos%20Kuchkovsky&entry.1292438233=Recent%20advances%20in%20large%20language%20models%20%28LLMs%29%20have%20enabled%20the%20automation%20of%20an%20increasing%20number%20of%20programming%20tasks%2C%20including%20code%20generation%20for%20scientific%20and%20engineering%20domains.%20In%20rapidly%20evolving%20software%20ecosystems%20such%20as%20quantum%20software%20development%2C%20where%20frameworks%20expose%20complex%20abstractions%2C%20a%20central%20question%20is%20how%20best%20to%20incorporate%20domain%20knowledge%20into%20LLM-based%20assistants%20while%20preserving%20maintainability%20as%20libraries%20evolve.%0A%20%20In%20this%20work%2C%20we%20study%20specialization%20strategies%20for%20Qiskit%20code%20generation%20using%20the%20Qiskit-HumanEval%20benchmark.%20We%20compare%20a%20parameter-specialized%20fine-tuned%20baseline%20introduced%20in%20prior%20work%20against%20a%20range%20of%20recent%20general-purpose%20LLMs%20enhanced%20with%20retrieval-augmented%20generation%20%28RAG%29%20and%20agent-based%20inference%20with%20execution%20feedback.%0A%20%20Our%20results%20show%20that%20modern%20general-purpose%20LLMs%20consistently%20outperform%20the%20parameter-specialized%20baseline.%20While%20the {"title": "Guideline-grounded retrieval-augmented generation for ophthalmic clinical decision support", "author": "Shuying Chen and Sen Cui and Zhong Cao", "abstract": "In this work, we propose Oph-Guid-RAG, a multimodal visual RAG system for ophthalmology clinical question answering and decision support. We treat each guideline page as an independent evidence unit and directly retrieve page images, preserving tables, flowcharts, and layout information. We further design a controllable retrieval framework with routing and filtering, which selectively introduces external evidence and reduces noise. The system integrates query decomposition, query rewriting, retrieval, reranking, and multimodal reasoning, and provides traceable outputs with guideline page references. We evaluate our method on HealthBench using a doctor-based scoring protocol. On the hard subset, our approach improves the overall score from 0.2969 to 0.3861 (+0.0892, +30.0%) compared to GPT-5.2, and achieves higher accuracy, improving from 0.5956 to 0.6576 (+0.0620, +10.4%). Compared to GPT-5.4, our method achieves a larger accuracy gain of +0.1289 (+24.4%). These results show that our method is more effective on challenging cases that require precise, evidence-based reasoning. Ablation studies further show that reranking, routing, and retrieval design are critical for stable performance, especially under difficult settings. Overall, we show how combining visionbased retrieval with controllable reasoning can improve evidence grounding and robustness in clinical AI applications,while pointing out that further work is needed to be more complete.", "link": "http://arxiv.org/abs/2603.21925v1", "date": "2026-03-23", "relevancy": 2.3658, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4844}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4717}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Guideline-grounded%20retrieval-augmented%20generation%20for%20ophthalmic%20clinical%20decision%20support&body=Title%3A%20Guideline-grounded%20retrieval-augmented%20generation%20for%20ophthalmic%20clinical%20decision%20support%0AAuthor%3A%20Shuying%20Chen%20and%20Sen%20Cui%20and%20Zhong%20Cao%0AAbstract%3A%20In%20this%20work%2C%20we%20propose%20Oph-Guid-RAG%2C%20a%20multimodal%20visual%20RAG%20system%20for%20ophthalmology%20clinical%20question%20answering%20and%20decision%20support.%20We%20treat%20each%20guideline%20page%20as%20an%20independent%20evidence%20unit%20and%20directly%20retrieve%20page%20images%2C%20preserving%20tables%2C%20flowcharts%2C%20and%20layout%20information.%20We%20further%20design%20a%20controllable%20retrieval%20framework%20with%20routing%20and%20filtering%2C%20which%20selectively%20introduces%20external%20evidence%20and%20reduces%20noise.%20The%20system%20integrates%20query%20decomposition%2C%20query%20rewriting%2C%20retrieval%2C%20reranking%2C%20and%20multimodal%20reasoning%2C%20and%20provides%20traceable%20outputs%20with%20guideline%20page%20references.%20We%20evaluate%20our%20method%20on%20HealthBench%20using%20a%20doctor-based%20scoring%20protocol.%20On%20the%20hard%20subset%2C%20our%20approach%20improves%20the%20overall%20score%20from%200.2969%20to%200.3861%20%28%2B0.0892%2C%20%2B30.0%25%29%20compared%20to%20GPT-5.2%2C%20and%20achieves%20higher%20accuracy%2C%20improving%20from%200.5956%20to%200.6576%20%28%2B0.0620%2C%20%2B10.4%25%29.%20Compared%20to%20GPT-5.4%2C%20our%20method%20achieves%20a%20larger%20accuracy%20gain%20of%20%2B0.1289%20%28%2B24.4%25%29.%20These%20results%20show%20that%20our%20method%20is%20more%20effective%20on%20challenging%20cases%20that%20require%20precise%2C%20evidence-based%20reasoning.%20Ablation%20studies%20further%20show%20that%20reranking%2C%20routing%2C%20and%20retrieval%20design%20are%20critical%20for%20stable%20performance%2C%20especially%20under%20difficult%20settings.%20Overall%2C%20we%20show%20how%20combining%20visionbased%20retrieval%20with%20controllable%20reasoning%20can%20improve%20evidence%20grounding%20and%20robustness%20in%20clinical%20AI%20applications%2Cwhile%20pointing%20out%20that%20further%20work%20is%20needed%20to%20be%20more%20complete.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21925v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGuideline-grounded%2520retrieval-augmented%2520generation%2520for%2520ophthalmic%2520clinical%2520decision%2520support%26entry.906535625%3DShuying%2520Chen%2520and%2520Sen%2520Cui%2520and%2520Zhong%2520Cao%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520propose%2520Oph-Guid-RAG%252C%2520a%2520multimodal%2520visual%2520RAG%2520system%2520for%2520ophthalmology%2520clinical%2520question%2520answering%2520and%2520decision%2520support.%2520We%2520treat%2520each%2520guideline%2520page%2520as%2520an%2520independent%2520evidence%2520unit%2520and%2520directly%2520retrieve%2520page%2520images%252C%2520preserving%2520tables%252C%2520flowcharts%252C%2520and%2520layout%2520information.%2520We%2520further%2520design%2520a%2520controllable%2520retrieval%2520framework%2520with%2520routing%2520and%2520filtering%252C%2520which%2520selectively%2520introduces%2520external%2520evidence%2520and%2520reduces%2520noise.%2520The%2520system%2520integrates%2520query%2520decomposition%252C%2520query%2520rewriting%252C%2520retrieval%252C%2520reranking%252C%2520and%2520multimodal%2520reasoning%252C%2520and%2520provides%2520traceable%2520outputs%2520with%2520guideline%2520page%2520references.%252 {"title": "First Frame Is the Place to Go for Video Content Customization", "author": "Jingxi Chen and Zongxia Li and Zhichao Liu and Guangyao Shi and Xiyang Wu and Fuxiao Liu and Cornelia Fermuller and Brandon Y. Feng and Yiannis Aloimonos", "abstract": "What role does the first frame play in video generation models? Traditionally, it's viewed as the spatial-temporal starting point of a video, merely a seed for subsequent animation. In this work, we reveal a fundamentally different perspective: video models implicitly treat the first frame as a conceptual memory buffer that stores visual entities for later reuse during generation. Leveraging this insight, we show that it's possible to achieve robust and generalized video content customization in diverse scenarios, using only 20-50 training examples without architectural changes or large-scale finetuning. This unveils a powerful, overlooked capability of video generation models for reference-based video customization.", "link": "http://arxiv.org/abs/2511.15700v2", "date": "2026-03-23", "relevancy": 2.3519, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6721}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6102}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5321}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20First%20Frame%20Is%20the%20Place%20to%20Go%20for%20Video%20Content%20Customization&body=Title%3A%20First%20Frame%20Is%20the%20Place%20to%20Go%20for%20Video%20Content%20Customization%0AAuthor%3A%20Jingxi%20Chen%20and%20Zongxia%20Li%20and%20Zhichao%20Liu%20and%20Guangyao%20Shi%20and%20Xiyang%20Wu%20and%20Fuxiao%20Liu%20and%20Cornelia%20Fermuller%20and%20Brandon%20Y.%20Feng%20and%20Yiannis%20Aloimonos%0AAbstract%3A%20What%20role%20does%20the%20first%20frame%20play%20in%20video%20generation%20models%3F%20Traditionally%2C%20it%27s%20viewed%20as%20the%20spatial-temporal%20starting%20point%20of%20a%20video%2C%20merely%20a%20seed%20for%20subsequent%20animation.%20In%20this%20work%2C%20we%20reveal%20a%20fundamentally%20different%20perspective%3A%20video%20models%20implicitly%20treat%20the%20first%20frame%20as%20a%20conceptual%20memory%20buffer%20that%20stores%20visual%20entities%20for%20later%20reuse%20during%20generation.%20Leveraging%20this%20insight%2C%20we%20show%20that%20it%27s%20possible%20to%20achieve%20robust%20and%20generalized%20video%20content%20customization%20in%20diverse%20scenarios%2C%20using%20only%2020-50%20training%20examples%20without%20architectural%20changes%20or%20large-scale%20finetuning.%20This%20unveils%20a%20powerful%2C%20overlooked%20capability%20of%20video%20generation%20models%20for%20reference-based%20video%20customization.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15700v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFirst%2520Frame%2520Is%2520the%2520Place%2520to%2520Go%2520for%2520Video%2520Content%2520Customization%26entry.906535625%3DJingxi%2520Chen%2520and%2520Zongxia%2520Li%2520and%2520Zhichao%2520Liu%2520and%2520Guangyao%2520Shi%2520and%2520Xiyang%2520Wu%2520and%2520Fuxiao%2520Liu%2520and%2520Cornelia%2520Fermuller%2520and%2520Brandon%2520Y.%2520Feng%2520and%2520Yiannis%2520Aloimonos%26entry.1292438233%3DWhat%2520role%2520does%2520the%2520first%2520frame%2520play%2520in%2520video%2520generation%2520models%253F%2520Traditionally%252C%2520it%2527s%2520viewed%2520as%2520the%2520spatial-temporal%2520starting%2520point%2520of%2520a%2520video%252C%2520merely%2520a%2520seed%2520for%2520subsequent%2520animation.%2520In%2520this%2520work%252C%2520we%2520reveal%2520a%2520fundamentally%2520different%2520perspective%253A%2520video%2520models%2520implicitly%2520treat%2520the%252 {"title": "AlphaZero-Edu: Democratizing Access to AlphaZero", "author": "Ruitong Li and Aisheng Mo and Guowei Su and Ru Zhang and Binjie Guo and Haohan Jiang and Xurong Lin and Hongyan Wei and Jie Li and Zhiyuan Qian and Zhuhao Zhang and Xiaoyuan Cheng", "abstract": "Recent years have witnessed significant progress in reinforcement learning, especially with Zero-like paradigms, which have greatly boosted the generalization and reasoning abilities of large-scale language models. Nevertheless, existing frameworks are often plagued by high implementation complexity and poor reproducibility. To tackle these challenges, we present AlphaZero-Edu, a lightweight, education-focused implementation built upon the mathematical framework of AlphaZero. It boasts a modular architecture that disentangles key components, enabling transparent visualization of the algorithmic processes. Additionally, it is optimized for resource-efficient training on a single NVIDIA RTX 3090 GPU and features highly parallelized self-play data generation, achieving a 3.2-fold speedup with 8 processes. In Gomoku matches, the framework has demonstrated exceptional performance, achieving a consistently high win rate against human opponents. AlphaZero-Edu has been open-sourced at https://github.com/StarLight1212/AlphaZero_Edu, providing an accessible and practical benchmark for both academic research and industrial applications.", "link": "http://arxiv.org/abs/2504.14636v2", "date": "2026-03-23", "relevancy": 2.3517, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.477}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4672}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AlphaZero-Edu%3A%20Democratizing%20Access%20to%20A {"title": "MolLangBench: A Comprehensive Benchmark for Language-Prompted Molecular Structure Recognition, Editing, and Generation", "author": "Feiyang Cai and Jiahui Bai and Tao Tang and Guijuan He and Joshua Luo and Tianyu Zhu and Srikanth Pilla and Gang Li and Ling Liu and Feng Luo", "abstract": "Precise recognition, editing, and generation of molecules are essential prerequisites for both chemists and AI systems tackling various chemical tasks. We present MolLangBench, a comprehensive benchmark designed to evaluate fundamental molecule-language interface tasks: language-prompted molecular structure recognition, editing, and generation. To ensure high-quality, unambiguous, and deterministic outputs, we construct the recognition tasks using automated cheminformatics tools, and curate editing and generation tasks through rigorous expert annotation and validation. MolLangBench supports the evaluation of models that interface language with different molecular representations, including linear strings, molecular images, and molecular graphs. Evaluations of state-of-the-art models reveal significant limitations: the strongest model (GPT-5) achieves $86.2\\%$ and $85.5\\%$ accuracy on recognition and editing tasks, which are intuitively simple for humans, and performs even worse on the generation task, reaching only $43.0\\%$ accuracy. These results highlight the shortcomings of current AI systems in handling even preliminary molecular recognition and manipulation tasks. We hope MolLangBench will catalyze further research toward more effective and reliable AI systems for chemical applications.The dataset and code can be accessed at https://huggingface.co/datasets/ChemFM/MolLangBench and https://github.com/TheLuoFengLab/MolLangBench, respectively.", "link": "http://arxiv.org/abs/2505.15054v4", "date": "2026-03-23", "relevancy": 2.3472, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4791}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4646}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4646}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MolLangBench%3A%20A%20Comprehensive%20Benchmark%20for%20Language-Prompted%20Molecular%20Structure%20Recognition%2C%20Editing%2C%20and%20Generation&body=Title%3A%20MolLangBench%3A%20A%20Comprehensive%20Benchmark%20for%20Language-Prompted%20Molecular%20Structure%20Recognition%2C%20Editing%2C%20and%20Generation%0AAuthor%3A%20Feiyang%20Cai%20and%20Jiahui%20Bai%20and%20Tao%20Tang%20and%20Guijuan%20He%20and%20Joshua%20Luo%20and%20Tianyu%20Zhu%20and%20Srikanth%20Pilla%20and%20Gang%20Li%20and%20Ling%20Liu%20and%20Feng%20Luo%0AAbstract%3A%20Precise%20recognition%2C%20editing%2C%20and%20generation%20of%20molecules%20are%20essential%20prerequisites%20for%20both%20chemists%20and%20AI%20systems%20tackling%20various%20chemical%20tasks.%20We%20present%20MolLangBench%2C%20a%20comprehensive%20benchmark%20designed%20to%20evaluate%20fundamental%20molecule-language%20interface%20tasks%3A%20language-prompted%20molecular%20structure%20recognition%2C%20editing%2C%20and%20generation.%20To%20ensure%20high-quality%2C%20unambiguous%2C%20and%20deterministic%20outputs%2C%20we%20construct%20the%20recognition%20tasks%20using%20automated%20cheminformatics%20tools%2C%20and%20curate%20editing%20and%20generation%20tasks%20through%20rigorous%20expert%20annotation%20and%20validation.%20MolLangBench%20supports%20the%20evaluation%20of%20models%20that%20interface%20language%20with%20different%20molecular%20representations%2C%20including%20linear%20strings%2C%20molecular%20images%2C%20and%20molecular%20graphs.%20Evaluations%20of%20state-of-the-art%20models%20reveal%20significant%20limitations%3A%20the%20strongest%20model%20%28GPT-5%29%20achieves%20%2486.2%5C%25%24%20and%20%2485.5%5C%25%24%20accuracy%20on%20recognition%20and%20editing%20tasks%2C%20which%20are%20intuitively%20simple%20for%20humans%2C%20and%20performs%20even%20worse%20on%20the%20generation%20task%2C%20reaching%20only%20%2443.0%5C%25%24%20accuracy.%20These%20results%20highlight%20the%20shortcomings%20of%20current%20AI%20systems%20in%20handling%20even%20preliminary%20molecular%20recognition%20and%20manipulation%20tasks.%20We%20hope%20MolLangBench%20will%20catalyze%20further%20research%20toward%20more%20effective%20and%20reliable%20AI%20systems%20for%20chemical%20applications.The%20dataset%20and%20code%20can%20be%20accessed%20at%20https%3A//huggingface.co/datasets/ChemFM/MolLangBench%20and%20https%3A//github.com/TheLuoFengLab/MolLangBench%2C%20respectively.%0ALink%3A%20http%3A//arxiv.org/abs/2505.15054v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMolLangBench%253A%2520A%2520Comprehensive%2520Benchmark%2520for%2520Language-Prompted%2520Molecular%2520Structure%2520Recognition%252C%2520Editing%252C%2520and%2520Generation%26entry.906535625%3DFeiyang%2520Cai%2520and%2520Jiahui%2520Bai%2520and%2520Tao%2520Tang%2520and%2520Guijuan%2520He%2520and%2520Joshua%2520Luo%2520and%2520Tianyu%2520Zhu%2520and%2520Srikanth%2520Pilla%2520and%2520Gang%2520Li%2520and%2520Ling%2520Liu%2520and%2520Feng%2520Luo%26entry.1292438233%3DPrecise%2520recognition%252C%2520editing%252C%2520and%2520generation%2520of%2520molecules%2520are%2520essential%2520prerequisites%2520for%2520both%2520chemists%2520and%2520AI%2520systems%2520tackling%2520various%2520chemical%2520tasks.%2520We%2520present%2520MolLangBench%252C%2520a%2520comprehensive%2520benchmark%2520designed%2520to%2520evaluate%2520fundamental%2520molecule-language%2520interface%2520tasks%253A%2520language-prompted%2520molecular%2520structure%2520recognition%252C%2520editing%

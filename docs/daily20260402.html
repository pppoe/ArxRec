{"title": "When Agents Persuade: Rhetoric Generation and Mitigation in LLMs", "author": "Julia Jose and Ritik Roongta and Rachel Greenstadt", "abstract": "Despite their wide-ranging benefits, LLM-based agents deployed in open environments can be exploited to produce manipulative material. In this study, we task LLMs with propaganda objectives and analyze their outputs using two domain-specific models: one that classifies text as propaganda or non-propaganda, and another that detects rhetorical techniques of propaganda (e.g., loaded language, appeals to fear, flag-waving, name-calling). Our findings show that, when prompted, LLMs exhibit propagandistic behaviors and use a variety of rhetorical techniques in doing so. We also explore mitigation via Supervised Fine-Tuning (SFT), Direct Preference Optimization (DPO), and ORPO (Odds Ratio Preference Optimization). We find that fine-tuning significantly reduces their tendency to generate such content, with ORPO proving most effective.", "link": "http://arxiv.org/abs/2603.04636v2", "date": "2026-04-01", "relevancy": 1.3052, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4477}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4274}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4112}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Agents%20Persuade%3A%20Rhetoric%20Generation%20and%20Mitigation%20in%20LLMs&body=Title%3A%20When%20Agents%20Persuade%3A%20Rhetoric%20Generation%20and%20Mitigation%20in%20LLMs%0AAuthor%3A%20Julia%20Jose%20and%20Ritik%20Roongta%20and%20Rachel%20Greenstadt%0AAbstract%3A%20Despite%20their%20wide-ranging%20benefits%2C%20LLM-based%20agents%20deployed%20in%20open%20environments%20can%20be%20exploited%20to%20produce%20manipulative%20material.%20In%20this%20study%2C%20we%20task%20LLMs%20with%20propaganda%20objectives%20and%20analyze%20their%20outputs%20using%20two%20domain-specific%20models%3A%20one%20that%20classifies%20text%20as%20propaganda%20or%20non-propaganda%2C%20and%20another%20that%20detects%20rhetorical%20techniques%20of%20propaganda%20%28e.g.%2C%20loaded%20language%2C%20appeals%20to%20fear%2C%20flag-waving%2C%20name-calling%29.%20Our%20findings%20show%20that%2C%20when%20prompted%2C%20LLMs%20exhibit%20propagandistic%20behaviors%20and%20use%20a%20variety%20of%20rhetorical%20techniques%20in%20doing%20so.%20We%20also%20explore%20mitigation%20via%20Supervised%20Fine-Tuning%20%28SFT%29%2C%20Direct%20Preference%20Optimization%20%28DPO%29%2C%20and%20ORPO%20%28Odds%20Ratio%20Preference%20Optimization%29.%20We%20find%20that%20fine-tuning%20significantly%20reduces%20their%20tendency%20to%20generate%20such%20content%2C%20with%20ORPO%20proving%20most%20effective.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04636v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Agents%2520Persuade%253A%2520Rhetoric%2520Generation%2520and%2520Mitigation%2520in%2520LLMs%26entry.906535625%3DJulia%2520Jose%2520and%2520Ritik%2520Roongta%2520and%2520Rachel%2520Greenstadt%26entry.1292438233%3DDespite%2520their%2520wide-ranging%2520benefits%252C%2520LLM-based%2520agents%2520deployed%2520in%2520open%2520environments%2520can%2520be%2520exploited%2520to%2520produce%2520manipulative%2520material.%2520In%2520this%2520study%252C%2520we%2520task%2520LLMs%2520with%2520propaganda%2520objectives%2520and%2520analyze%2520their%2520outputs%2520using%2520two%2520domain-specific%2520models%253A%2520one%2520that%2520classifies%2520text%2520as%2520propaganda%2520or%2520non-propaganda%252C%2520and%2520another%2520that%2520detects%2520rhetorica {"title": "EmoScene: A Dual-space Dataset for Controllable Affective Image Generation", "author": "Li He and Longtai Zhang and Wenqiang Zhang and Yan Wang and Lizhe Qi", "abstract": "Text-to-image diffusion models have achieved high visual fidelity, yet precise control over scene semantics and fine-grained affective tone remains challenging. Human visual affect arises from the rapid integration of contextual meaning, including valence, arousal, and dominance, with perceptual cues such as color harmony, luminance contrast, texture variation, curvature, and spatial layout. However, current text-to-image models rarely represent affective and perceptual factors within a unified representation, which limits their ability to synthesize scenes with coherent and nuanced emotional intent. To address this gap, we construct EmoScene, a large-scale dual-space emotion dataset that jointly encodes affective dimensions and perceptual attributes, with contextual semantics provided as supporting annotations. EmoScene contains 1.2M images across more than three hundred real-world scene categories, each annotated with discrete emotion labels, continuous VAD values, perceptual descriptors and textual captions. Multi-space analyses reveal how discrete emotions occupy the VAD space and how affect systematically correlates with scene-level perceptual factors. To benchmark EmoScene, we provide a lightweight reference baseline that injects dual-space controls into a frozen diffusion backbone via shallow cross-attention modulation, serving as a reproducible probe of affect controllability enabled by dual-space supervision.", "link": "http://arxiv.org/abs/2604.00933v1", "date": "2026-04-01", "relevancy": 1.1222, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5839}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5507}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EmoScene%3A%20A%20Dual-space%20Dataset%20for%20Controllable%20Affective%20Image%20Generation&body=Title%3A%20EmoScene%3A%20A%20Dual-space%20Dataset%20for%20Controllable%20Affective%20Image%20Generation%0AAuthor%3A%20Li%20He%20and%20Longtai%20Zhang%20and%20Wenqiang%20Zhang%20and%20Yan%20Wang%20and%20Lizhe%20Qi%0AAbstract%3A%20Text-to-image%20diffusion%20models%20have%20achieved%20high%20visual%20fidelity%2C%20yet%20precise%20control%20over%20scene%20semantics%20and%20fine-grained%20affective%20tone%20remains%20challenging.%20Human%20visual%20affect%20arises%20from%20the%20rapid%20integration%20of%20contextual%20meaning%2C%20including%20valence%2C%20arousal%2C%20and%20dominance%2C%20with%20perceptual%20cues%20such%20as%20color%20harmony%2C%20luminance%20contrast%2C%20texture%20variation%2C%20curvature%2C%20and%20spatial%20layout.%20However%2C%20current%20text-to-image%20models%20rarely%20represent%20affective%20and%20perceptual%20factors%20within%20a%20unified%20representation%2C%20which%20limits%20their%20ability%20to%20synthesize%20scenes%20with%20coherent%20and%20nuanced%20emotional%20intent.%20To%20address%20this%20gap%2C%20we%20construct%20EmoScene%2C%20a%20large-scale%20dual-space%20emotion%20dataset%20that%20jointly%20encodes%20affective%20dimensions%20and%20perceptual%20attributes%2C%20with%20contextual%20semantics%20provided%20as%20supporting%20annotations.%20EmoScene%20contains%201.2M%20images%20across%20more%20than%20three%20hundred%20real-world%20scene%20categories%2C%20each%20annotated%20with%20discrete%20emotion%20labels%2C%20continuous%20VAD%20values%2C%20perceptual%20descriptors%20and%20textual%20captions.%20Multi-space%20analyses%20reveal%20how%20discrete%20emotions%20occupy%20the%20VAD%20space%20and%20how%20affect%20systematically%20correlates%20with%20scene-level%20perceptual%20factors.%20To%20benchmark%20EmoScene%2C%20we%20provide%20a%20lightweight%20reference%20baseline%20that%20injects%20dual-space%20controls%20into%20a%20frozen%20diffusion%20backbone%20via%20shallow%20cross-attention%20modulation%2C%20serving%20as%20a%20reproducible%20probe%20of%20affect%20controllability%20enabled%20by%20dual-space%20supervision.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00933v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmoScene%253A%2520A%2520Dual-space%2520Dataset%2520for%2520Controllable%2520Affective%2520Image%2520Generation%26entry.906535625%3DLi%2520He%2520and%2520Longtai%2520Zhang%2520and%2520Wenqiang%2520Zhang%2520and%2520Yan%2520Wang%2520and%2520Lizhe%2520Qi%26entry.1292438233%3DText-to-image%2520diffusion%2520models%2520have%2520achieved%2520high%2520visual%2520fidelity%252C%2520yet%2520precise%2520control%2520over%2520scene%2520semantics%2520and%2520fine-grained%2520affective%2520tone%2520remains%2520challenging.%2520Human%2520visual%2520affect%2520arises%2520from%2520the%2520rapid%2520integration%2520of%2520contextual%2520meaning%252C%2520including%2520valence%252C%2520arousal%252C%2520and%2520dominance%252C%2520with%2520perceptual%2520cues%2520such%2520as%2520color%2520harmony%252C%2520luminance%2520contrast%252C%2520texture%2520variation%252C%2520curvature%252C%2520and%2520spatial%2520layout.%2520However%252C%2520current%2520text-to-image%2520models%2520rarely%2520represent%2520affective%2520and%2520perceptual%2520factors%2520within%2520a%2520unified%2520representation%252C%2520which%2520limits%2520their%2520ability%2520to%2520synthesize%2520scenes%2520with%2520coherent%2520and%2520nuanced%2520emotional%2520intent.%2520To%2520address%2520this%2520gap%252C%2520we%2520construct%2520EmoScene%252C%2520a%2520large-scale%2520dual-space%2520emotion%2520dataset%25 %20luminance%20contrast%2C%20texture%20variation%2C%20curvature%2C%20and%20spatial%20layout.%20However%2C%20current%20text-to-image%20models%20rarely%20represent%20affective%20and%20perceptual%20factors%20within%20a%20unified%20representation%2C%20which%20limits%20their%20ability%20to%20synthesize%20scenes%20with%20coherent%20and%20nuanced%20emotional%20intent.%20To%20address%20this%20gap%2C%20we%20construct%20EmoScene%2C%20a%20large-scale%20dual-space%20emotion%20dataset%20that%20jointly%20encodes%20affective%20dimensions%20and%20perceptual%20attributes%2C%20with%20contextual%20semantics%20provided%20as%20supporting%20annotations.%20EmoScene%20contains%201.2M%20images%20across%20more%20than%20three%20hundred%20real-world%20scene%20categories%2C%20each%20annotated%20with%20discrete%20emotion%20labels%2C%20continuous%20VAD%20values%2C%20perceptual%20descriptors%20and%20textual%20captions.%20Multi-space%20analyses%20reveal%20how%20discrete%20emotions%20occupy%20the%20VAD%20space%20and%20how%20affect%20systematically%20correlates%20with%20scene-level%20perceptual%20factors.%20To%20benchmark%20EmoScene%2C%20we%20provide%20a%20lightweight%20reference%20baseline%20that%20injects%20dual-space%20controls%20into%20a%20frozen%20diffusion%20backbone%20via%20shallow%20cross-attention%20modulation%2C%20serving%20as%20a%20reproducible%20probe%20of%20affect%20controllability%20enabled%20by%20dual-space%20supervision.&entry.1838667208=http%3A//arxiv.org/abs/2604.00933v1&entry.124074799=Read"},
{"title": "Learning to Hint for Reinforcement Learning", "author": "Yu Xia and Canwen Xu and Zhewei Yao and Julian McAuley and Yuxiong He", "abstract": "Group Relative Policy Optimization (GRPO) is widely used for reinforcement learning with verifiable rewards, but it often suffers from advantage collapse: when all rollouts in a group receive the same reward, the group yields zero relative advantage and thus no learning signal. For example, if a question is too hard for the reasoner, all sampled rollouts can be incorrect and receive zero reward. Recent work addresses this issue by adding hints or auxiliary scaffolds to such hard questions so that the reasoner produces mixed outcomes and recovers a non-zero update. However, existing hints are usually fixed rather than adapted to the current reasoner, and a hint that creates learning signal under the hinted input does not necessarily improve the no-hint policy used at test time. To this end, we propose Hint Learning for Reinforcement Learning (HiLL), a framework that jointly trains a hinter policy and a reasoner policy during RL. For each hard question, the hinter generates hints online conditioned on the current reasoner's incorrect rollout, allowing hint generation to adapt to the reasoner's evolving errors. We further introduce hint reliance, which measures how strongly correct hinted trajectories depend on the hint. We derive a transferability result showing that lower hint reliance implies stronger transfer from hinted success to no-hint success, and we use this result to define a transfer-weighted reward for training the hinter. Therefore, HiLL favors hints that not only recover informative GRPO groups, but also produce signals that are more likely to improve the original no-hint policy. Experiments across multiple benchmarks show that HiLL consistently outperforms GRPO and prior hint-based baselines, demonstrating the value of adaptive and transfer-aware hint learning for RL. The code is available at https://github.com/Andree-9/HiLL.", "link": "http://arxiv.org/abs/2604.00698v1", "date": "2026-04-01", "relevancy": 1.7831, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4654}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4333}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4312}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Hint%20for%20Reinforcement%20Learning&body=Title%3A%20Learning%20to%20Hint%20for%20Reinforcement%20Learning%0AAuthor%3A%20Yu%20Xia%20and%20Canwen%20Xu%20and%20Zhewei%20Yao%20and%20Julian%20McAuley%20and%20Yuxiong%20He%0AAbstract%3A%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20is%20widely%20used%20for%20reinforcement%20learning%20with%20verifiable%20rewards%2C%20but%20it%20often%20suffers%20from%20advantage%20collapse%3A%20when%20all%20rollouts%20in%20a%20group%20receive%20the%20same%20reward%2C%20the%20group%20yields%20zero%20relative%20advantage%20and%20thus%20no%20learning%20signal.%20For%20example%2C%20if%20a%20question%20is%20too%20hard%20for%20the%20reasoner%2C%20all%20sampled%20rollouts%20can%20be%20incorrect%20and%20receive%20zero%20reward.%20Recent%20work%20addresses%20this%20issue%20by%20adding%20hints%20or%20auxiliary%20scaffolds%20to%20such%20hard%20questions%20so%20that%20the%20reasoner%20produces%20mixed%20outcomes%20and%20recovers%20a%20non-zero%20update.%20However%2C%20existing%20hints%20are%20usually%20fixed%20rather%20than%20adapted%20to%20the%20current%20reasoner%2C%20and%20a%20hint%20that%20creates%20learning%20signal%20under%20the%20hinted%20input%20does%20not%20necessarily%20improve%20the%20no-hint%20policy%20used%20at%20test%20time.%20To%20this%20end%2C%20we%20propose%20Hint%20Learning%20for%20Reinforcement%20Learning%20%28HiLL%29%2C%20a%20framework%20that%20jointly%20trains%20a%20hinter%20policy%20and%20a%20reasoner%20policy%20during%20RL.%20For%20each%20hard%20question%2C%20the%20hinter%20generates%20hints%20online%20conditioned%20on%20the%20current%20reasoner%27s%20incorrect%20rollout%2C%20allowing%20hint%20generation%20to%20adapt%20to%20the%20reasoner%27s%20evolving%20errors.%20We%20further%20introduce%20hint%20reliance%2C%20which%20measures%20how%20strongly%20correct%20hinted%20trajectories%20depend%20on%20the%20hint.%20We%20derive%20a%20transferability%20result%20showing%20that%20lower%20hint%20reliance%20implies%20stronger%20transfer%20from%20hinted%20success%20to%20no-hint%20success%2C%20and%20we%20use%20this%20result%20to%20define%20a%20transfer-weighted%20reward%20for%20training%20the%20hinter.%20Therefore%2C%20HiLL%20favors%20hints%20that%20not%20only%20recover%20informative%20GRPO%20groups%2C%20but%20also%20produce%20signals%20that%20are%20more%20likely%20to%20improve%20the%20original%20no-hint%20policy.%20Experiments%20across%20multiple%20benchmarks%20show%20that%20HiLL%20consistently%20outperforms%20GRPO%20and%20prior%20hint-based%20baselines%2C%20demonstrating%20the%20value%20of%20adaptive%20and%20transfer-aware%20hint%20learning%20for%20RL.%20The%20code%20is%20available%20at%20https%3A//github.com/Andree-9/HiLL.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00698v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Hint%2520for%2520Reinforcement%2520Learning%26entry.906535625%3DYu%2520Xia%2520and%2520Canwen%2520Xu%2520and%2520Zhewei%2520Yao%2520and%2520Julian%2520McAuley%2520and%2520Yuxiong%2520He%26entry.1292438233%3DGroup%2520Relative%2520Policy%2520Optimization%2520%2528GRPO%2529%2520is%2520widely%2520used%2520for%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%252C%2520but%2520it%2520often%2520suffers%2520from%2520ad       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();

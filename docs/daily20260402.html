ocheng%20Feng%20and%20Wei%20He%20and%20Kaisiyuan%20Wang%20and%20Hang%20Zhou%20and%20Angela%20Yao&entry.1292438233=Recent%20advances%20in%20Video%20Foundation%20Models%20%28VFMs%29%20have%20revolutionized%20human-centric%20video%20synthesis%2C%20yet%20fine-grained%20and%20independent%20editing%20of%20subjects%20and%20scenes%20remains%20a%20critical%20challenge.%20Recent%20attempts%20to%20incorporate%20richer%20environment%20control%20through%20rigid%203D%20geometric%20compositions%20often%20encounter%20a%20stark%20trade-off%20between%20precise%20control%20and%20generative%20flexibility.%20Furthermore%2C%20the%20heavy%203D%20pre-processing%20still%20limits%20practical%20scalability.%20In%20this%20paper%2C%20we%20propose%20ONE-SHOT%2C%20a%20parameter-efficient%20framework%20for%20compositional%20human-environment%20video%20generation.%20Our%20key%20insight%20is%20to%20factorize%20the%20generative%20process%20into%20disentangled%20signals.%20Specifically%2C%20we%20introduce%20a%20canonical-space%20injection%20mechanism%20that%20decouples%20human%20dynamics%20from%20environmental%20cues%20via%20cross-attention.%20We%20also%20propose%20Dynamic-Grounded-RoPE%2C%20a%20novel%20positional%20embedding%20strategy%20that%20establishes%20spatial%20correspondences%20between%20disparate%20spatial%20domains%20without%20any%20heuristic%203D%20alignments.%20To%20support%20long-horizon%20synthesis%2C%20we%20introduce%20a%20Hybrid%20Context%20Integration%20mechanism%20to%20maintain%20subject%20and%20scene%20consistency%20across%20minute-level%20generations.%20Experiments%20demonstrate%20that%20our%20method%20significantly%20outperforms%20state-of-the-art%20methods%2C%20offering%20superior%20structural%20control%20and%20creative%20diversity%20for%20video%20synthesis.%20Our%20project%20has%20been%20available%20on%3A%20https%3A//martayang.github.io/ONE-SHOT/.&entry.1838667208=http%3A//arxiv.org/abs/2604.01043v1&entry.124074799=Read"},
{"title": "OmniFusion: Simultaneous Multilingual Multimodal Translations via Modular Fusion", "author": "Sai Koneru and Matthias Huck and Jan Niehues", "abstract": "There has been significant progress in open-source text-only translation large language models (LLMs) with better language coverage and quality. However, these models can be only used in cascaded pipelines for speech translation (ST), performing automatic speech recognition first followed by translation. This introduces additional latency, which is particularly critical in simultaneous ST (SimulST), and prevents the model from exploiting multimodal context, such as images, which can aid disambiguation. Pretrained multimodal foundation models (MMFMs) already possess strong perception and reasoning capabilities across multiple modalities, but generally lack the multilingual coverage and specialized translation performance of dedicated translation LLMs. To build an effective multimodal translation system, we propose an end-to-end approach that fuses MMFMs with translation LLMs. We introduce a novel fusion strategy that connects hidden states from multiple layers of a pretrained MMFM to a translation LLM, enabling joint end-to-end training. The resulting model, OmniFusion, built on Omni 2.5-7B as the MMFM and SeedX PPO-7B as the translation LLM, can perform speech-to-text, speech-and-image-to-text, and text-and-image-to-text translation. Experiments demonstrate that OmniFusion effectively leverages both audio and visual inputs, achieves a 1-second latency reduction in SimulST compared to cascaded pipelines and also improves the overall translation quality\\footnote{Code is available at https://github.com/saikoneru/OmniFusion}.", "link": "http://arxiv.org/abs/2512.00234v2", "date": "2026-04-01", "relevancy": 2.5469, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5238}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5022}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5022}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniFusion%3A%20Simultaneous%20Multilingual%20Multimodal%20Translations%20via%20Modular%20Fusion&body=Title%3A%20OmniFusion%3A%20Simultaneous%20Multilingual%20Multimodal%20Translations%20via%20Modular%20Fusion%0AAuthor%3A%20Sai%20Koneru%20and%20Matthias%20Huck%20and%20Jan%20Niehues%0AAbstract%3A%20There%20has%20been%20significant%20progress%20in%20open-source%20text-only%20translation%20large%20language%20models%20%28LLMs%29%20with%20better%20language%20coverage%20and%20quality.%20However%2C%20these%20models%20can%20be%20only%20used%20in%20cascaded%20pipelines%20for%20speech%20translation%20%28ST%29%2C%20performing%20automatic%20speech%20recognition%20first%20followed%20by%20translation.%20This%20introduces%20additional%20latency%2C%20which%20is%20particularly%20critical%20in%20simultaneous%20ST%20%28SimulST%29%2C%20and%20prevents%20the%20model%20from%20exploiting%20multimodal%20context%2C%20such%20as%20images%2C%20which%20can%20aid%20disambiguation.%20Pretrained%20multimodal%20foundation%20models%20%28MMFMs%29%20already%20possess%20strong%20perception%20and%20reasoning%20capabilities%20across%20multiple%20modalities%2C%20but%20generally%20lack%20the%20multilingual%20coverage%20and%20specialized%20translation%20performance%20of%20dedicated%20translation%20LLMs.%20To%20build%20an%20effective%20multimodal%20translation%20system%2C%20we%20propose%20an%20end-to-end%20approach%20that%20fuses%20MMFMs%20with%20translation%20LLMs.%20We%20introduce%20a%20novel%20fusion%20strategy%20that%20connects%20hidden%20states%20from%20multiple%20layers%20of%20a%20pretrained%20MMFM%20to%20a%20translation%20LLM%2C%20enabling%20joint%20end-to-end%20training.%20The%20resulting%20model%2C%20OmniFusion%2C%20built%20on%20Omni%202.5-7B%20as%20the%20MMFM%20and%20SeedX%20PPO-7B%20as%20the%20translation%20LLM%2C%20can%20perform%20speech-to-text%2C%20speech-and-image-to-text%2C%20and%20text-and-image-to-text%20translation.%20Experiments%20demonstrate%20that%20OmniFusion%20effectively%20leverages%20both%20audio%20and%20visual%20inputs%2C%20achieves%20a%201-second%20latency%20reduction%20in%20SimulST%20compared%20to%20cascaded%20pipelines%20and%20also%20improves%20the%20overall%20translation%20quality%5Cfootnote%7BCode%20is%20available%20at%20https%3A//github.com/saikoneru/OmniFusion%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2512.00234v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniFusion%253A%2520Simultaneous%2520Multilingual%2520Multimodal%2520Translations%2520via%2520Modular%2520Fusion%26entry.906535625%3DSai%2520Koneru%2520and%2520Matthias%2520Huck%2520and%2520Jan%2520Niehues%26entry.1292438233%3DThere%2520has%2520been%2520significant%2520progress%2520in%2520open-source%2520text-only%2520translation%2520large%2520language%2520models%2520%2528LLMs%2529%2520with%2520better%2520language%2520coverage%2520and%2520quality.%2520However%252C%2520these%2520models%2520can%2520be%2520only%2520used%2520in%2520cascaded%2520pipelines%2520for%2520speech%2520translation%2520%2528ST%2529%252C%2520performing%2520automatic%2520speech%2520recognition%2520first%2520followed%2520by%2520translation.%2520This%2520introduces%2520additional%2520latency%252C%2520which%2520is%2520particularly%2520critical%2520in%2520simultaneous%2520ST%2520%2528SimulST%2529%252C%2520and%2520prevents%2520the%2520model%2520from%2520exploiting%2520multimodal%2520context%252C%2520such%2520as%2520images%252C%2520which%2520can%2520aid%2520disambiguation.%2520Pretrained%2520multimodal%2520foundation%2520models%2520%2528MMFMs%2529%2520already%2520possess%2520strong%2520pe {"title": "Learning to Learn-at-Test-Time: Language Agents with Learnable Adaptation Policies", "author": "Zhanzhi Lou and Hui Chen and Yibo Li and Qian Wang and Bryan Hooi", "abstract": "Test-Time Learning (TTL) enables language agents to iteratively refine their performance through repeated interactions with the environment at inference time. At the core of TTL is an adaptation policy that updates the actor policy based on experience from previous episodes, thereby improving future behavior. Existing methods rely on fixed, hand-crafted adaptation policies rather than optimizing them for downstream improvement. We argue that optimal adaptation policies should be learned from task environments, not hand-engineered based on human intuition. To achieve this, we introduce Meta-TTL, a framework that formulates the discovery of effective adaptation policies as a bi-level optimization problem. Within this framework, the inner loop executes the standard TTL process, measuring how effectively a candidate adaptation policy helps an agent correct errors across sequential episodes. Guided by the agent's performance, the outer loop employs evolutionary search over a diverse distribution of training tasks to iteratively refine the adaptation policy. We evaluate Meta-TTL on Jericho and WebArena-Lite across both in-distribution (ID) and out-of-distribution (OOD) settings, using multiple meta-agent backbones. Results on both benchmarks show that Meta-TTL consistently outperforms hand-crafted baselines, suggesting that the optimized adaptation policy encodes transferable strategies that generalize beyond the training task distribution.", "link": "http://arxiv.org/abs/2604.00830v1", "date": "2026-04-01", "relevancy": 2.5358, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5596}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5073}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4546}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Learn-at-Test-Time%3A%20Language%20Agents%20with%20Learnable%20Adaptation%20Policies&body=Title%3A%20Learning%20to%20Learn-at-Test-Time%3A%20Language%20Agents%20with%20Learnable%20Adaptation%20Policies%0AAuthor%3A%20Zhanzhi%20Lou%20and%20Hui%20Chen%20and%20Yibo%20Li%20and%20Qian%20Wang%20and%20Bryan%20Hooi%0AAbstract%3A%20Test-Time%20Learning%20%28TTL%29%20enables%20language%20agents%20to%20iteratively%20refine%20their%20performance%20through%20repeated%20interactions%20with%20the%20environment%20at%20inference%20time.%20At%20the%20core%20of%20TTL%20is%20an%20adaptation%20policy%20that%20updates%20the%20actor%20policy%20based%20on%20experience%20from%20previous%20episodes%2C%20thereby%20improving%20future%20behavior.%20Existing%20methods%20rely%20on%20fixed%2C%20hand-crafted%20adaptation%20policies%20rather%20than%20optimizing%20them%20for%20downstream%20improvement.%20We%20argue%20that%20optimal%20adaptation%20policies%20should%20be%20learned%20from%20task%20environments%2C%20not%20hand-engineered%20based%20on%20human%20intuition.%20To%20achieve%20this%2C%20we%20introduce%20Meta-TTL%2C%20a%20framework%20that%20formulates%20the%20discovery%20of%20effective%20adaptation%20policies%20as%20a%20bi-level%20optimization%20problem.%20Within%20this%20framework%2C%20the%20inner%20loop%20executes%20the%20standard%20TTL%20process%2C%20measuring%20how%20effectively%20a%20candidate%20adaptation%20policy%20helps%20an%20agent%20correct%20errors%20across%20sequential%20episodes.%20Guided%20by%20the%20agent%27s%20performance%2C%20the%20outer%20loop%20employs%20evolutionary%20search%20over%20a%20diverse%20distribution%20of%20training%20tasks%20to%20iteratively%20refine%20the%20adaptation%20policy.%20We%20evaluate%20Meta-TTL%20on%20Jericho%20and%20WebArena-Lite%20across%20both%20in-distribution%20%28ID%29%20and%20out-of-distribution%20%28OOD%29%20settings%2C%20using%20multiple%20meta-agent%20backbones.%20Results%20on%20both%20benchmarks%20show%20that%20Meta-TTL%20consistently%20outperforms%20hand-crafted%20baselines%2C%20suggesting%20that%20the%20optimized%20adaptation%20policy%20encodes%20transferable%20strategies%20that%20generalize%20beyond%20the%20training%20task%20distribution.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00830v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Learn-at-Test-Time%253A%2520Language%2520Agents%2520with%2520Learnable%2520Adaptation%2520Policies%26entry.906535625%3DZhanzhi%2520Lou%2520and%2520Hui%2520Chen%2520and%2520Yibo%2520Li%2520and%2520Qian%2520Wang%2520and%2520Bryan%2520Hooi%26entry.1292438233%3DTest-Time%2520Learning%2520%2528TTL%2529%2520enables%2520language%2520agents%2520to%2520iteratively%2520refine%2520their%2520performance%2520through%2520repeated%2520interactions%2520with%2520the%2520environment%2520at%2520inference%2520time.%2520At%2520the%2520core%2520of%2520TTL%2520is%2520an%2520adaptation%2520policy%2520that%2520updates%2520the%2520actor%2520policy%2520based%2520on%2520experience%2520from%2520previous%2520episodes%252C%2520thereby%2520improving%2520future%2520behavior.%2520Existing%2520methods%2520rely%2520on%2520fixed%252C%2520hand-crafted%2520adaptation%2520policies%2520rather%2520than%2520optimizing%2520them%2520for%2520downstream%2520improvement.%2520We%2520argue%2520that%2520optimal%2520adaptation%2520policies%2520should%2520be%2520learned%2520from%2520task%2520environments%252C%2520not%2520hand-engineered%2520based%2520on%2520human%2520intuition.%2520To%2520achieve%2520this%252C%2520we%2520introduce%2520Meta-TTL%252C%2520a%2520framework%2520that%2520formulates%2520the%2520discovery%2520of%2520effective%2520adaptation%2520policies%2520as%2520a%2520bi-level%2520optimization%2520problem.%2520Within%2520this%2520framework%252C%2520the%2520inner%2520loop%2520executes%2520the%2520standard%2520TTL%2520process%252C%2520measuring%2520how%2520effectively%2520a%2520candidate%2520adaptation%2520policy%2520helps%2520an%2520agent%2520correct%2520errors%2520across%2520sequential%2520episodes.%2520Guided%2520by%2520the%2520agent%2527s%2520performance%252C%2520the%2520outer%2520loop%2520employs%2520evolutionary%2520search%2520over%2520a%2520diverse%2520distribution%2520of%2520training%2520tasks%2520to%2520iteratively%2520refine%2520the%2520adaptation%2520policy.%2520We%2520evaluate%2520Meta-TTL%2520on%2520Jericho%2520and%2520WebArena-Lite%2520across%2520both%2520in-distribution%2520%2528ID%2529%2520and%2520out-of-distribution%2520%2528OOD%2529%2520settings%252C%2520using%2520multiple%2520meta-agent%2520backbones.%2520Results%2520on%2520both%2520benchmarks%2520show%2520that%2520Meta-TTL%2520consistently%2520outperforms%2520hand-crafted%2520baselines%252C%2520suggesting%2520that%2520the%2520optimized%2520adaptation%2520policy%2520encodes%2520transferable%2520strategies%2520that%2520generalize%2520beyond%2520the%2520training%2520task%2520distribution.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00830v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20to%20Learn-at-Test-Time%3A%20Language%20Agents%20with%20Learnable%20Adaptation%20Policies&entry.906535625=Zhanzhi%20Lou%20and%20Hui%20Chen%20and%20Yibo%20Li%20and%20Qian%20Wang%20and%20Bryan%20Hooi&entry.1292438233=Test-Time%20Learning%20%28TTL%29%20enables%20language%20agents%20to%20iteratively%20refine%20their%20performance%20through%20repeated%20interactions%20with%20the%20environment%20at%20inference%20time.%20At%20the%20core%20of%20TTL%20is%20an%20adaptation%20policy%20that%20updates%20the%20actor%20policy%20based%20on%20experience%20from%20previous%20episodes%2C%20thereby%20improving%20future%20behavior.%20Existing%20methods%20rely%20on%20fixed%2C%20hand-crafted%20adaptation%20policies%20rather%20than%20optimizing%20them%20for%20downstream%20improvement.%20We%20argue%20that%20optimal%20adaptation%20policies%20should%20be%20learned%20from%20task%20environments%2C%20not%20hand-engineered%20based%20on%20human%20intuition.%20To%20achieve%20this%2C%20we%20introduce%20Meta-TTL%2C%20a%20framework%20that%20formulates%20the%20discovery%20of%20effective%20adaptation%20policies%20as%20a%20bi-level%20optimization%20problem.%20Within%20this%20framework%2C%20the%20inner%20loop%20executes%20the%20standard%20TTL%20process%2C%20measuring%20how%20effectively%20a%20candidate%20adaptation%20policy%20helps%20an%20agent%20correct%20errors%20across%20sequential%20episodes.%20Guided%20by%20the%20agent%27s%20performance%2C%20the%20outer%20loop%20employs%20evolutionary%20search%20over%20a%20diverse%20distribution%20of%20training%20tasks%20to%20iteratively%20refine%20the%20adaptation%20policy.%20We%20evaluate%20Meta-TTL%20on%20Jericho%20and%20WebArena-Lite%20across%20both%20in-distribution%20%28ID%29%20and%20out-of-distribution%20%28OOD%29%20settings%2C%20using%20multiple%20meta-agent%20backbones.%20Results%20on%20both%20benchmarks%20show%20that%20Meta-TTL%20consistently%20outperforms%20hand-crafted%20baselines%2C%20suggesting%20that%20the%20optimized%20adaptation%20policy%20encodes%20transferable%20strategies%20that%20generalize%20beyond%20the%20training%20task%20distribution.&entry.1838667208=http%3A//arxiv.org/abs/2604.00830v1&entry.124074799=Read"},
{"title": "Natural Hypergradient Descent: Algorithm Design, Convergence Analysis, and Parallel Implementation", "author": "Deyi Kong and Zaiwei Chen and Shuzhong Zhang and Shancong Mou", "abstract": "In this work, we propose Natural Hypergradient Descent (NHGD), a new method for solving bilevel optimization problems. To address the computational bottleneck in hypergradient estimation--namely, the need to compute or approximate Hessian inverse--we exploit the statistical structure of the inner optimization problem and use the empirical Fisher information matrix as an asymptotically consistent surrogate for the Hessian. This design enables a parallel optimize-and-approximate framework in which the Hessian-inverse approximation is updated synchronously with the stochastic inner optimization, reusing gradient information at negligible additional cost. Our main theoretical contribution establishes high-probability error bounds and sample complexity guarantees for NHGD that match those of state-of-the-art optimize-then-approximate methods, while significantly reducing computational time overhead. Empirical evaluations on representative bilevel learning tasks further demonstrate the practical advantages of NHGD, highlighting its scalability and effectiveness in large-scale machine learning settings.", "link": "http://arxiv.org/abs/2602.10905v2", "date": "2026-04-01", "relevancy": 2.5315, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5343}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5045}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4801}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Natural%20Hypergradient%20Descent%3A%20Algorithm%20Design%2C%20Convergence%20Analysis%2C%20and%20Parallel%20Im YQ/viewform?entry.1380929848=Natural%20Hypergradient%20Descent%3A%20Algorithm%20Design%2C%20Convergence%20Analysis%2C%20and%20Parallel%20Implementation&entry.906535625=Deyi%20Kong%20and%20Zaiwei%20Chen%20and%20Shuzhong%20Zhang%20and%20Shancong%20Mou&entry.1292438233=In%20this%20work%2C%20we%20propose%20Natural%20Hypergradient%20Descent%20%28NHGD%29%2C%20a%20new%20method%20for%20solving%20bilevel%20optimization%20problems.%20To%20address%20the%20computational%20bottleneck%20in%20hypergradient%20estimation--namely%2C%20the%20need%20to%20compute%20or%20approximate%20Hessian%20inverse--we%20exploit%20the%20statistical%20structure%20of%20the%20inner%20optimization%20problem%20and%20use%20the%20empirical%20Fisher%20information%20matrix%20as%20an%20asymptotically%20consistent%20surrogate%20for%20the%20Hessian.%20This%20design%20enables%20a%20parallel%20optimize-and-approximate%20framework%20in%20which%20the%20Hessian-inverse%20approximation%20is%20updated%20synchronously%20with%20the%20stochastic%20inner%20optimization%2C%20reusing%20gradient%20information%20at%20negligible%20additional%20cost.%20Our%20main%20theoretical%20contribution%20establishes%20high-probability%20error%20bounds%20and%20sample%20complexity%20guarantees%20for%20NHGD%20that%20match%20those%20of%20state-of-the-art%20optimize-then-approximate%20methods%2C%20while%20significantly%20reducing%20computational%20time%20overhead.%20Empirical%20evaluations%20on%20representative%20bilevel%20learning%20tasks%20further%20demonstrate%20the%20practical%20advantages%20of%20NHGD%2C%20highlighting%20its%20scalability%20and%20effectiveness%20in%20large-scale%20machine%20learning%20settings.&entry.1838667208=http%3A//arxiv.org/abs/2602.10905v2&entry.124074799=Read"},
{"title": "Disentanglement of Sources in a Multi-Stream Variational Autoencoder", "author": "Veranika Boukun and J\u00f6rg L\u00fccke", "abstract": "Variational autoencoders (VAEs) are among leading approaches to address the problem of learning disentangled representations. Typically a single VAE is used and disentangled representations are sought within its single continuous latent space. In this paper, we propose and provide a proof of concept for a novel Multi-Stream Variational Autoencoder (MS-VAE) that achieves disentanglement of sources by combining discrete and continuous latents. The discrete latents are used in an explicit source combination model, that superimposes a set of sources as part of the MS-VAE decoder. We formally define the MS-VAE approach, derive its inference and learning equations, and numerically investigate its principled functionality. The MS-VAE model is very flexible and can be trained using little supervision (we use fully unsupervised learning after pretraining with some labels). In our numerical experiments, we explored the ability of the MS-VAE approach in separating both superimposed hand-written digits as well as sound sources. For the former task we used superimposed MNIST digits (an increasingly common benchmark). For sound separation, our experiments focused on the task of speaker diarization in a recording conversation between two speakers. In all cases, we observe a clear separation of sources and competitive performance after training. For digit superpositions, performance is particularly competitive in complex mixtures (e.g., three and four digits). For the speaker diarization task, we observe an especially low rate of missed speakers and a more precise speaker attribution. Numerical experiments confirm the flexibility of the approach across varying amounts of supervision, and we observed high performance, e.g., when using just 10% of the labels for pretraining.", "link": "http://arxiv.org/abs/2510.15669v2", "date": "2026-04-01", "relevancy": 2.5214, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5194}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5047}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4888}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Disentanglement%20of%20Sources%20in%20a%20Multi-Stream%20Variational%20Autoencoder&body=Title%3A%20Disentanglement%20of%20Sources%20in%20a%20Multi-Stream%20Variational%20Autoencoder%0AAuthor%3A%20Veranika%20Boukun%20and%20J%C3%B6rg%20L%C3%BCcke%0AAbstract%3A%20Variational%20autoencoders%20%28VAEs%29%20are%20among%20leading%20approaches%20to%20address%20the%20problem%20of%20learning%20disentangled%20representations.%20Typically%20a%20single%20VAE%20is%20used%20and%20disentangled%20representations%20are%20sought%20within%20its%20single%20continuous%20latent%20space.%20In%20this%20paper%2C%20we%20propose%20and%20provide%20a%20proof%20of%20concept%20for%20a%20novel%20Multi-Stream%20Variational%20Autoencoder%20%28MS-VAE%29%20that%20achieves%20disentanglement%20of%20sources%20by%20combining%20discrete%20and%20continuous%20latents.%20The%20discrete%20latents%20are%20used%20in%20an%20explicit%20source%20combination%20model%2C%20that%20superimposes%20a%20set%20of%20sources%20as%20part%20of%20the%20MS-VAE%20decoder.%20We%20formally%20define%20the%20MS-VAE%20approach%2C%20derive%20its%20inference%20and%20learning%20equations%2C%20and%20numerically%20investigate%20its%20principled%20functionality.%20The%20MS-VAE%20model%20is%20very%20flexible%20and%20can%20be%20trained%20using%20little%20supervision%20%28we%20use%20fully%20unsupervised%20learning%20after%20pretraining%20with%20some%20labels%29.%20In%20our%20numerical%20experiments%2C%20we%20explored%20the%20ability%20of%20the%20MS-VAE%20approach%20in%20separating%20both%20superimposed%20hand-written%20digits%20as%20well%20as%20sound%20sources.%20For%20the%20former%20task%20we%20used%20superimposed%20MNIST%20digits%20%28an%20increasingly%20common%20benchmark%29.%20For%20sound%20separation%2C%20our%20experiments%20focused%20on%20the%20task%20of%20speaker%20diarization%20in%20a%20recording%20conversation%20between%20two%20speakers.%20In%20all%20cases%2C%20we%20observe%20a%20clear%20separation%20of%20sources%20and%20competitive%20performance%20after%20training.%20For%20digit%20superpositions%2C%20performance%20is%20particularly%20competitive%20in%20complex%20mixtures%20%28e.g.%2C%20three%20and%20four%20digits%29.%20For%20the%20speaker%20diarization%20task%2C%20we%20observe%20an%20especially%20low%20rate%20of%20missed%20speakers%20and%20a%20more%20precise%20speaker%20attribution.%20Numerical%20experiments%20confirm%20the%20flexibility%20of%20the%20approach%20across%20varying%20amounts%20of%20supervision%2C%20and%20we%20observed%20high%20performance%2C%20e.g.%2C%20when%20using%20just%2010%25%20of%20the%20labels%20for%20pretraining.%0ALink%3A%20http%3A//arxiv.org/abs/2510.15669v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDisentanglement%2520of%2520Sources%2520in%2520a%2520Multi-Stream%2520Variational%2520Autoencoder%26entry.906535625%3DVeranika%2520Boukun%2520and%2520J%25C3%25B6rg%2520L%25C3%25BCcke%26entry.1292438233%3DVariational%2520autoencoders%2520%2528VAEs%2529%2520are%2520among%2520leading%2520approaches%2520to%2520address%2520the%2520problem%2520of%2520learning%2520disentangled%2520representations.%2520Typically%2520a%2520single%2520VAE%2520is%2520used%2520and%2520disentangled%2520representations%2520are%2520sought%2520within%2520its%2520single%2520continuous%2520latent%2520space.%2520In%2520this%2520paper%252C%2520we%2520propose%2520and%252 {"title": "To Memorize or to Retrieve: Scaling Laws for RAG-Considerate Pretraining", "author": "Karan Singh and Michael Yu and Varun Gangal and Zhuofu Tao and Sachin Kumar and Emmy Liu and Steven Y. Feng", "abstract": "Retrieval-augmented generation (RAG) improves language model (LM) performance by providing relevant context at test time for knowledge-intensive situations. However, the relationship between parametric knowledge acquired during pretraining and non-parametric knowledge accessed via retrieval remains poorly understood, especially under fixed data budgets. In this work, we systematically study the trade-off between pretraining corpus size and retrieval store size across a wide range of model and data scales. We train OLMo-2-based LMs ranging from 30M to 3B parameters on up to 100B tokens of DCLM data, while varying both pretraining data scale (1-150x the number of parameters) and retrieval store size (1-20x), and evaluate performance across a diverse suite of benchmarks spanning reasoning, scientific QA, and open-domain QA. We find that retrieval consistently improves performance over parametric-only baselines across model scales and introduce a three-dimensional scaling framework that models performance as a function of model size, pretraining tokens, and retrieval corpus size. This scaling manifold enables us to estimate optimal allocations of a fixed data budget between pretraining and retrieval, revealing that the marginal utility of retrieval depends strongly on model scale, task type, and the degree of pretraining saturation. Our results provide a quantitative foundation for understanding when and how retrieval should complement pretraining, offering practical guidance for allocating data resources in the design of scalable language modeling systems.", "link": "http://arxiv.org/abs/2604.00715v1", "date": "2026-04-01", "relevancy": 2.5111, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5061}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5003}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5003}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20To%20Memorize%20or%20to%20Retrieve%3A%20Scaling%20Laws%20for%20RAG-Considerate%20Pretraining&body=Title%3A%20To%20Memorize%20or%20to%20Retrieve%3A%20Scaling%20Laws%20for%20RAG-Considerate%20Pretraining%0AAuthor%3A%20Karan%20Singh%20and%20Michael%20Yu%20and%20Varun%20Gangal%20and%20Zhuofu%20Tao%20and%20Sachin%20Kumar%20and%20Emmy%20Liu%20and%20Steven%20Y.%20Feng%0AAbstract%3A%20Retrieval-augmented%20generation%20%28RAG%29%20improves%20language%20model%20%28LM%29%20performance%20by%20providing%20relevant%20context%20at%20test%20time%20for%20knowledge-intensive%20situations.%20However%2C%20the%20relationship%20between%20parametric%20knowledge%20acquired%20during%20pretraining%20and%20non-parametric%20knowledge%20accessed%20via%20retrieval%20remains%20poorly%20understood%2C%20especially%20under%20fixed%20data%20budgets.%20In%20this%20work%2C%20we%20systematically%20study%20the%20trade-off%20between%20pretraining%20corpus%20size%20and%20retrieval%20store%20size%20across%20a%20wide%20range%20of%20model%20and%20data%20scales.%20We%20train%20OLMo-2-based%20LMs%20ranging%20from%2030M%20to%203B%20parameters%20on%20up%20to%20100B%20tokens%20of%20DCLM%20data%2C%20while%20varying%20both%20pretraining%20data%20scale%20%281-150x%20the%20number%20of%20parameters%29%20and%20retrieval%20store%20size%20%281-20x%29%2C%20and%20evaluate%20performance%20across%20a%20diverse%20suite%20of%20benchmarks%20spanning%20reasoning%2C%20scientific%20QA%2C%20and%20open-domain%20QA.%20We%20find%20that%20retrieval%20consistently%20improves%20performance%20over%20parametric-only%20baselines%20across%20model%20scales%20and%20introduce%20a%20three-dimensional%20scaling%20framework%20that%20models%20performance%20as%20a%20function%20of%20model%20size%2C%20pretraining%20tokens%2C%20and%20retrieval%20corpus%20size.%20This%20scaling%20manifold%20enables%20us%20to%20estimate%20optimal%20allocations%20of%20a%20fixed%20data%20budget%20between%20pretraining%20and%20retrieval%2C%20revealing%20that%20the%20marginal%20utility%20of%20retrieval%20depends%20strongly%20on%20model%20scale%2C%20task%20type%2C%20and%20the%20degree%20of%20pretraining%20saturation.%20Our%20results%20provide%20a%20quantitative%20foundation%20for%20understanding%20when%20and%20how%20retrieval%20should%20complement%20pretraining%2C%20offering%20practical%20guidance%20for%20allocating%20data%20resources%20in%20the%20design%20of%20scalable%20language%20modeling%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00715v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTo%2520Memorize%2520or%2520to%2520Retrieve%253A%2520Scaling%2520Laws%2520for%2520RAG-Considerate%2520Pretraining%26entry.906535625%3DKaran%2520Singh%2520and%2520Michael%2520Yu%2520and%2520Varun%2520Gangal%2520and%2520Zhuofu%2520Tao%2520and%2520Sachin%2520Kumar%2520and%2520Emmy%2520Liu%2520and%2520Steven%2520Y.%2520Feng%26entry.1292438233%3DRetrieval-augmented%2520generation%2520%2528RAG%2529%2520improves%2520language%2520model%2520%2528LM%2529%2520performance%2520by%2520providing%2520relevant%2520context%2520at%2520test%2520time%2520for%2520knowledge-intensive%2520situations.%2520However%252C%2520the%2520relationship%2520between%2520parametric%2520knowledge%2520acquired%2520during%2520pretraining%2520and%2520non-parametric%2520knowledge%2520accessed%2520via%2520retrieval%2520remains%2520poorly%2520understood%252C%2520especially%2520under%2520fixed%2520data%2520budgets.%2520In%2520this%2520work%252C%2520we%2520systematically%252 {"title": "SoftHand Model-W: A 3D-Printed, Anthropomorphic, Underactuated Robot Hand with Integrated Wrist and Carpal Tunnel", "author": "Dhillon B. Merritt and Christopher J. Ford and Haoran Li and Malia Smith and Zhixing Chen and Efi Psomopoulou and Nathan F. Lepora", "abstract": "This paper presents the SoftHand Model-W: a 3D-printed, underactuated, anthropomorphic robot hand based on the Pisa/IIT SoftHand, with an integrated antagonistic tendon mechanism and 2 degree-of-freedom tendon-driven wrist. These four degrees-of-acuation provide active flexion and extension to the five fingers, and active flexion/extension and radial/ulnar deviation of the palm through the wrist, while preserving the synergistic and self-adaptive features of such SoftHands. A carpal tunnel-inspired tendon routing allows remote motor placement in the forearm, reducing distal inertia and maintaining a compact form factor. The SoftHand-W is mounted on a 6-axis robot arm and tested with two reorientation tasks requiring coordination between the hand and arm's pose: cube stacking and in-plane disc rotation. Results comparing task time, arm joint travel, and configuration changes with and without wrist actuation show that adding the wrist reduces compensatory and reconfiguration movements of the arm for a quicker task-completion time. Moreover, the wrist enables pick-and-place operations that would be impossible otherwise. Overall, the SoftHand Model-W demonstrates how proximal degrees of freedom are key to achieving versatile, human-like manipulation in real world robotic applications, with a compact design enabling deployment in research and assistive settings.", "link": "http://arxiv.org/abs/2604.00738v1", "date": "2026-04-01", "relevancy": 2.497, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5303}, {"title": "UGG: Unified Generative Grasping", "link": "htt {"title": "A Gaussian Process View on Observation Noise and Initialization in Wide Neural Networks", "author": "Sergio Calvo-Ordo\u00f1ez and Jonathan Plenk and Richard Bergna and Alvaro Cartea and Jose Miguel Hernandez-Lobato and Konstantina Palla and Kamil Ciosek", "abstract": "Performing gradient descent in a wide neural network is equivalent to computing the posterior mean of a Gaussian Process with the Neural Tangent Kernel (NTK-GP), for a specific prior mean and with zero observation noise. However, existing formulations have two limitations: (i) the NTK-GP assumes noiseless targets, leading to misspecification on noisy data; (ii) the equivalence does not extend to arbitrary prior means, which are essential for well-specified models. To address (i), we introduce a regularizer into the training objective, showing its correspondence to incorporating observation noise in the NTK-GP. To address (ii), we propose a \\textit{shifted network} that enables arbitrary prior means and allows obtaining the posterior mean with gradient descent on a single network, without ensembling or kernel inversion. We validate our results with experiments across datasets and architectures, showing that this approach removes key obstacles to the practical use of NTK-GP equivalence in applied Gaussian process modeling.", "link": "http://arxiv.org/abs/2502.01556v3", "date": "2026-04-01", "relevancy": 2.4888, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5063}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4984}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Gaussian%20Process%20View%20on%20Observation%20Noise%20and%20Initialization%20in%20Wide%20Neural%20Networks&body=Title%3A%20A%20Gaussian%20Process%20View%20on%20Observation%20Noise%20and%20Initialization%20in%20Wide%20Neural%20Networks%0AAuthor%3A%20Sergio%20Calvo-Ordo%C3%B1ez%20and%20Jonathan%20Plenk%20and%20Richard%20Bergna%20and%20Alvaro%20Cartea%20and%20Jose%20Miguel%20Hernandez-Lobato%20and%20Konstantina%20Palla%20and%20Kamil%20Ciosek%0AAbstract%3A%20Performing%20gradient%20descent%20in%20a%20wide%20neural%20network%20is%20equivalent%20to%20computing%20the%20posterior%20mean%20of%20a%20Gaussian%20Process%20with%20the%20Neural%20Tangent%20Kernel%20%28NTK-GP%29%2C%20for%20a%20specific%20prior%20mean%20and%20with%20zero%20observation%20noise.%20However%2C%20existing%20formulations%20have%20two%20limitations%3A%20%28i%29%20the%20NTK-GP%20assumes%20noiseless%20targets%2C%20leading%20to%20misspecification%20on%20noisy%20data%3B%20%28ii%29%20the%20equivalence%20does%20not%20extend%20to%20arbitrary%20prior%20means%2C%20which%20are%20essential%20for%20well-specified%20models.%20To%20address%20%28i%29%2C%20we%20introduce%20a%20regularizer%20into%20the%20training%20objective%2C%20showing%20its%20correspondence%20to%20incorporating%20observation%20noise%20in%20the%20NTK-GP.%20To%20address%20%28ii%29%2C%20we%20propose%20a%20%5Ctextit%7Bshifted%20network%7D%20that%20enables%20arbitrary%20prior%20means%20and%20allows%20obtaining%20the%20posterior%20mean%20with%20gradient%20descent%20on%20a%20single%20network%2C%20without%20ensembling%20or%20kernel%20inversion.%20We%20validate%20our%20results%20with%20experiments%20across%20datasets%20and%20architectures%2C%20showing%20that%20this%20approach%20removes%20key%20obstacles%20to%20the%20practical%20use%20of%20NTK-GP%20equivalence%20in%20applied%20Gaussian%20process%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2502.01556v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Gaussian%2520Process%2520View%2520on%2520Observation%2520Noise%2520and%2520Initialization%2520in%2520Wide%2520Neural%2520Networks%26entry.906535625%3DSergio%2520Calvo-Ordo%25C3%25B1ez%2520and%2520Jonathan%2520Plenk%2520and%2520Richard%2520Bergna%2520and%2520Alvaro%2520Cartea%2520and%2520Jose%2520Miguel%2520Hernandez-Lobato%2520and%2520Konstantina%2520Palla%2520and%2520Kamil%2520Ciosek%26entry.1292438233%3DPerforming%2520gradient%2520descent%2520in%2520a%2520wide%2520neural%2520network%2520is%2520equivalent%2520to%2520computing%2520the%2520posterior%2520mean%2520of%2520a%2520Gaussian%2520Process%2520with%2520the%2520Neural%2520Tangent%2520Kernel%2520%2528NTK-GP%2529%252C%2520for%2520a%2520specific%2520prior%2520mean%2520and%2520with%2520zero%2520observation%2520noise.%2520However%252C%2520existing%2520formulations%2520have%2520two%2520limitations%253A%2520%2528i%2529%2520the%2520NTK-GP%2520assumes%2520noiseless%2520targets%252C%2520leading%2520to%2520misspecification%2520on%2520noisy%2520data%253B%2520%2528ii%2529%2520the%2520equivalence%2520does%2520not%2520extend%2520to%2520arbitrary%2520prior%2520means%252C%2520which%2520are%2520essential%2520for%2520well-specified%2520models.%2520To%2520address%2520%2528i%2529%252C%2520we%2520introduce%2520a%2520regularizer%2520into%2520the%2520training%2520objective%252C%2520showing%2520its%2520correspondence%2520to%2520incorporating%2520observation%2520noise%2520in%2520the%2520NTK-GP.%2520To%2520address%2520%2528ii%2529%252C%2520we%2520propose%2520a%2520%255Ctextit%257Bshifted%2520network%257D%2520that%2520enables%2520arbitrary%2520prior%2520means%2520and%2520allows%2520obtaining%2520the%2520posterior%2520mean%2520with%2520gradient%2520descent%2520on%2520a%2520single%2520network%252C%2520without%2520ensembling%2520or%2520kernel%2520inversion.%2520We%2520validate%2520our%2520results%2520with%2520experiments%2520across%2520datasets%2520and%2520architectures%252C%2520showing%2520that%2520this%2520approach%2520removes%2520key%2520obstacles%2520to%2520the%2520practical%2520use%252 {"title": "Code Comprehension then Auditing for Unsupervised LLM Evaluation", "author": "Bhrij Patel and Souradip Chakraborty and Mengdi Wang and Dinesh Manocha and Amrit Singh Bedi", "abstract": "Large Language Models (LLMs) for unsupervised code correctness evaluation have recently gained attention because they can judge if code runs as intended without requiring reference implementations or unit tests, which may be unavailable, sparse, or unreliable. However, most prior approaches condition LLM evaluators directly on the full code implementation, forcing the model to jointly infer program behavior and evaluate correctness in a single step. This entanglement leads to misinterpretations of code behavior and unreliable judgments. To mitigate this issue, we introduce CoCoA, an unsupervised Code Comprehension then Auditing framework that first comprehends functionality to generate a natural-language explanation. Then it evaluates task alignment based on this explanation. By sequentially sampling comprehension before evaluation, CoCoA improves the quality of inferred program behavior and enables the evaluator to focus on behavioral alignment rather than raw implementation details. Across multiple datasets, programming languages, and models, CoCoA achieves up to $68\\%$ increased F1 score and up to $20\\%$ increased accuracy over the best-performing baselines.", "link": "http://arxiv.org/abs/2410.03131v4", "date": "2026-04-01", "relevancy": 2.4817, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5108}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5108}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4674}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Code%20Comprehension%20then%20Auditing%20for%20Unsupervised%20LLM%20Evaluation&body=Title%3A%20Code%20Comprehension%20then%20Auditing%20for%20Unsupervised%20LLM%20Evaluation%0AAuthor%3A%20Bhrij%20Patel%20and%20Souradip%20Chakraborty%20and%20Mengdi%20Wang%20and%20Dinesh%20Manocha%20and%20Amrit%20Singh%20Bedi%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20for%20unsupervised%20code%20correctness%20evaluation%20have%20recently%20gained%20attention%20because%20they%20can%20judge%20if%20code%20runs%20as%20intended%20without%20requiring%20reference%20implementations%20or%20unit%20tests%2C%20which%20may%20be%20unavailable%2C%20sparse%2C%20or%20unreliable.%20However%2C%20most%20prior%20approaches%20condition%20LLM%20evaluators%20directly%20on%20the%20full%20code%20implementation%2C%20forcing%20the%20model%20to%20jointly%20infer%20program%20behavior%20and%20evaluate%20correctness%20in%20a%20single%20step.%20This%20entanglement%20leads%20to%20misinterpretations%20of%20code%20behavior%20and%20unreliable%20judgments.%20To%20mitigate%20this%20issue%2C%20we%20introduce%20CoCoA%2C%20an%20unsupervised%20Code%20Comprehension%20then%20Auditing%20framework%20that%20first%20comprehends%20functionality%20to%20generate%20a%20natural-language%20explanation.%20Then%20it%20evaluates%20task%20alignment%20based%20on%20this%20explanation.%20By%20sequentially%20sampling%20comprehension%20before%20evaluation%2C%20CoCoA%20improves%20the%20quality%20of%20inferred%20program%20behavior%20and%20enables%20the%20evaluator%20to%20focus%20on%20behavioral%20alignment%20rather%20than%20raw%20implementation%20details.%20Across%20multiple%20datasets%2C%20programming%20languages%2C%20and%20models%2C%20CoCoA%20achieves%20up%20to%20%2468%5C%25%24%20increased%20F1%20score%20and%20up%20to%20%2420%5C%25%24%20increased%20accuracy%20over%20the%20best-performing%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2410.03131v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ss 2C%2520and%2520models%252C%2520CoCoA%2520achieves%2520up%2520to%2520%252468%255C%2525%2524%2520increased%2520F1%2520score%2520and%2520up%2520to%2520%252420%255C%2525%2524%2520increased%2520accuracy%2520over%2520the%2520best-performing%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2410.03131v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Code%20Comprehension%20then%20Auditing%20for%20Unsupervised%20LLM%20Evaluation&entry.906535625=Bhrij%20Patel%20and%20Souradip%20Chakraborty%20and%20Mengdi%20Wang%20and%20Dinesh%20Manocha%20and%20Amrit%20Singh%20Bedi&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20for%20unsupervised%20code%20correctness%20evaluation%20have%20recently%20gained%20attention%20because%20they%20can%20judge%20if%20code%20runs%20as%20intended%20without%20requiring%20reference%20implementations%20or%20unit%20tests%2C%20which%20may%20be%20unavailable%2C%20sparse%2C%20or%20unreliable.%20However%2C%20most%20prior%20approaches%20condition%20LLM%20evaluators%20directly%20on%20the%20full%20code%20implementation%2C%20forcing%20the%20model%20to%20jointly%20infer%20program%20behavior%20and%20evaluate%20correctness%20in%20a%20single%20step.%20This%20entanglement%20leads%20to%20misinterpretations%20of%20code%20behavior%20and%20unreliable%20judgments.%20To%20mitigate%20this%20issue%2C%20we%20introduce%20CoCoA%2C%20an%20unsupervised%20Code%20Comprehension%20then%20Auditing%20framework%20that%20first%20comprehends%20functionality%20to%20generate%20a%20natural-language%20explanation.%20Then%20it%20evaluates%20task%20alignment%20based%20on%20this%20explanation.%20By%20sequentially%20sampling%20comprehension%20before%20evaluation%2C%20CoCoA%20improves%20the%20quality%20of%20inferred%20program%20behavior%20and%20enables%20the%20evaluator%20to%20focus%20on%20behavioral%20alignment%20rather%20than%20raw%20implementation%20details.%20Across%20multiple%20datasets%2C%20programming%20languages%2C%20and%20models%2C%20CoCoA%20achieves%20up%20to%20%2468%5C%25%24%20increased%20F1%20score%20and%20up%20to%20%2420%5C%25%24%20increased%20accuracy%20over%20the%20best-performing%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2410.03131v4&entry.124074799=Read"},
{"title": "Pulp Motion: Framing-aware multimodal camera and human motion generation", "author": "Robin Courant and Xi Wang and David Loiseaux and Marc Christie and Vicky Kalogeiton", "abstract": "Treating human motion and camera trajectory generation separately overlooks a core principle of cinematography: the tight interplay between actor performance and camera work in the screen space. In this paper, we are the first to cast this task as a text-conditioned joint generation, aiming to maintain consistent on-screen framing while producing two heterogeneous, yet intrinsically linked, modalities: human motion and camera trajectories. We propose a simple, model-agnostic framework that enforces multimodal coherence via an auxiliary modality: the on-screen framing induced by projecting human joints onto the camera. This on-screen framing provides a natural and effective bridge between modalities, promoting consistency and leading to more precise joint distribution. We first design a joint autoencoder that learns a shared latent space, together with a lightweight linear transform from the human and camera latents to a framing latent. We then introduce auxiliary sampling, which exploits this linear transform to steer generation toward a coherent framing modality. To support this task, we also introduce the PulpMotion dataset, a human-motion and camera-trajectory dataset with rich captions, and high-quality human motions. Extensive experiments across DiT- and MAR-based architectures show the generality and effectiveness of our method in generating on-frame coherent human-camera motions, while also achieving gains on textual alignment for both modalities. Our qualitative results yield more cinematographically meaningful framings setting the new state of the art for this task. Code, models and data are available in our \\href{https://www.lix.polytechnique.fr/vista/projects/2025_pulpmotion_courant/}{project page}.", "link": "http://arxiv.org/abs/2510.05097v2", "date": "2026-04-01", "relevancy": 2.4797, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6794}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5863}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5738}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pulp%20Motion%3A%20Framing-aware%20multimodal%20camera%20and%20human%20motion%20generation&body=Title%3A%20Pulp%20Motion%3A%20Framing-aware%20multimodal%20camera%20and%20human%20motion%20generation%0AAuthor%3A%20Robin%20Courant%20and%20Xi%20Wang%20and%20David%20Loiseaux%20and%20Marc%20Christie%20and%20Vicky%20Kalogeiton%0AAbstract%3A%20Treating%20human%20motion%20and%20camera%20trajectory%20generation%20separately%20overlooks%20a%20core%20principle%20of%20cinematography%3A%20the%20tight%20interplay%20between%20actor%20performance%20and%20camera%20work%20in%20the%20screen%20space.%20In%20this%20paper%2C%20we%20are%20the%20first%20to%20cast%20this%20task%20as%20a%20text-conditioned%20joint%20generation%2C%20aiming%20to%20maintain%20consistent%20on-screen%20framing%20while%20producing%20two%20heterogeneous%2C%20yet%20intrinsically%20linked%2C%20modalities%3A%20human%20motion%20and%20camera%20trajectories.%20We%20propose%20a%20simple%2C%20model-agnostic%20framework%20that%20enforces%20multimodal%20coherence%20via%20an%20auxiliary%20modality%3A%20the%20on-screen%20framing%20induced%20by%20projecting%20human%20joints%20onto%20the%20camera.%20This%20on-screen%20framing%20provides%20a%20natural%20and%20effective%20bridge%20between%20modalities%2C%20promoting%20consistency%20and%20leading%20to%20more%20precise%20joint%20distribution.%20We%20first%20design%20a%20joint%20autoencoder%20that%20learns%20a%20shared%20latent%20space%2C%20together%20with%20a%20lightweight%20linear%20transform%20from%20the%20human%20and%20camera%20latents%20to%20a%20framing%20latent.%20We%20then%20introduce%20auxiliary%20sampling%2C%20which%20exploits%20this%20linear%20transform%20to%20steer%20generation%20toward%20a%20coherent%20framing%20modality.%20To%20support%20this%20task%2C%20we%20also%20introduce%20the%20PulpMotion%20dataset%2C%20a%20human-motion%20and%20camera-trajectory%20dataset%20with%20rich%20captions%2C%20and%20high-quality%20human%20motions.%20Extensive%20experiments%20across%20DiT-%20and%20MAR-based%20architectures%20show%20the%20generality%20and%20effectiveness%20of%20our%20method%20in%20generating%20on-frame%20coherent%20human-camera%20motions%2C%20while%20also%20achieving%20gains%20on%20textual%20alignment%20for%20both%20modalities.%20Our%20qualitative%20results%20yield%20more%20cinematographically%20meaningful%20framings%20setting%20the%20new%20state%20of%20the%20art%20for%20this%20task.%20Code%2C%20models%20and%20data%20are%20available%20in%20our%20%5Chref%7Bhttps%3A//www.lix.polytechnique.fr/vista/projects/2025_pulpmotion_courant/%7D%7Bproject%20page%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2510.05097v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPulp%2520Motion%253A%2520Framing-aware%2520multimodal%2520camera%2520and%2520human%2520motion%2520generation%26entry.906535625%3DRobin%2520Courant%2520and%2520Xi%2520Wang%2520and%2520David%2520Loiseaux%2520and%2520Marc%2520Christie%2520and%2520Vicky%2520Kalogeiton%26entry.1292438233%3DTreating%2520human%2520motion%2520and%2520camera%2520trajectory%2520generation%2520separately%2520overlooks%2520a%2520core%2520principle%2520of%2520cinematography%253A%2520the%2520tight%2520interplay%2520between%2520actor%2520performance%2520and%2520camera%2520work%2520in%2520the%2520screen%2520space.%2520In%2520this%2520paper%252C%2520we%2520are%2520the%2520first%2520to%2520cast%2520this%2520task% {"title": "PanoAir: A Panoramic Visual-Inertial SLAM with Cross-Time Real-World UAV Dataset", "author": "Yiyang Wu and Xiaohu Zhang and Yanjin Du and Tongsu Zhang and Chujun Li and Siyang Chen and Guoyi Zhang and Xiangpeng Xu", "abstract": "Accurate pose estimation is fundamental for unmanned aerial vehicle (UAV) applications, where Visual-Inertial SLAM (VI-SLAM) provides a cost-effective solution for localization and mapping. However, existing VI-SLAM methods mainly rely on sensors with limited fields of view (FoV), which can lead to drift and even failure in complex UAV scenarios. Although panoramic cameras provide omnidirectional perception to improve robustness, panoramic VI-SLAM and corresponding real-world datasets for UAVs remain underexplored. To address this limitation, we first construct a real-world panoramic visual-inertial dataset covering diverse flight conditions, including varying illumination, altitudes, trajectory lengths, and motion dynamics. To achieve accurate and robust pose estimation under such challenging UAV scenarios, we propose a panoramic VI-SLAM framework that exploits the omnidirectional FoV via the proposed panoramic feature extraction and panoramic loop closure, enhancing feature constraints and ensuring global consistency. Extensive experiments on both the proposed dataset and public benchmarks demonstrate that our method achieves superior accuracy, robustness, and consistency compared to existing approaches. Moreover, deployment on embedded platform validates its practical applicability, achieving comparable computational efficiency to PC implementations.\n  The source code and dataset are publicly available at https://drive.google.com/file/d/1lG1Upn6yi-N6tYpEHAt6dfR1uhzNtWbT/view", "link": "http://arxiv.org/abs/2604.00852v1", "date": "2026-04-01", "relevancy": 2.476, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity" ature%20extraction%20and%20panoramic%20loop%20closure%2C%20enhancing%20feature%20constraints%20and%20ensuring%20global%20consistency.%20Extensive%20experiments%20on%20both%20the%20proposed%20dataset%20and%20public%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20superior%20accuracy%2C%20robustness%2C%20and%20consistency%20compared%20to%20existing%20approaches.%20Moreover%2C%20deployment%20on%20embedded%20platform%20validates%20its%20practical%20applicability%2C%20achieving%20comparable%20computational%20efficiency%20to%20PC%20implementations.%0A%20%20The%20source%20code%20and%20dataset%20are%20publicly%20available%20at%20https%3A//drive.google.com/file/d/1lG1Upn6yi-N6tYpEHAt6dfR1uhzNtWbT/view%0ALink%3A%20http%3A//arxiv.org/abs/2604.00852v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPanoAir%253A%2520A%2520Panoramic%2520Visual-Inertial%2520SLAM%2520with%2520Cross-Time%2520Real-World%2520UAV%2520Dataset%26entry.906535625%3DYiyang%2520Wu%2520and%2520Xiaohu%2520Zhang%2520and%2520Yanjin%2520Du%2520and%2520Tongsu%2520Zhang%2520and%2520Chujun%2520Li%2520and%2520Siyang%2520Chen%2520and%2520Guoyi%2520Zhang%2520and%2520Xiangpeng%2520Xu%26entry.1292438233%3DAccurate%2520pose%2520estimation%2520is%2520fundamental%2520for%2520unmanned%2520aerial%2520vehicle%2520%2528UAV%2529%2520applications%252C%2520where%2520Visual-Inertial%2520SLAM%2520%2528VI-SLAM%2529%2520provides%2520a%2520cost-effective%2520solution%2520for%2520localization%2520and%2520mapping.%2520However%252C%2520existing%2520VI-SLAM%2520methods%2520mainly%2520rely%2520on%2520sensors%2520with%2520limited%2520fields%2520of%2520view%2520%2528FoV%2529%252C%2520which%2520can%2520lead%2520to%2520drift%2520and%2520even%2520failure%2520in%2520complex%2520UAV%2520scenarios.%2520Although%2520panoramic%2520cameras%2520provide%2520omnidirectional%2520perception%2520to%2520improve%2520robustness%252C%2520panoramic%2520VI-SLAM%252 %2520tasks%252C%2520EvalBlocks%2520streamlines%2520model%2520evaluation%252C%2520enabling%2520researchers%2520to%2520iterate%2520faster%2520and%2520focus%2520on%2520model%2520innovation%2520rather%2520than%2520evaluation%2520logistics.%2520The%2520framework%2520is%2520released%2520as%2520open%2520source%2520software%2520at%2520https%253A//github.com/DIAGNijmegen/eval-blocks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.03811v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EvalBlocks%3A%20A%20Modular%20Pipeline%20for%20Rapidly%20Evaluating%20Foundation%20Models%20in%20Medical%20Imaging&entry.906535625=Jan%20Tagscherer%20and%20Sarah%20de%20Boer%20and%20Lena%20Philipp%20and%20Fennie%20van%20der%20Graaf%20and%20Dr%C3%A9%20Peeters%20and%20Joeran%20Bosma%20and%20Lars%20Leijten%20and%20Bogdan%20Obreja%20and%20Ewoud%20Smit%20and%20Alessa%20Hering&entry.1292438233=Developing%20foundation%20models%20in%20medical%20imaging%20requires%20continuous%20monitoring%20of%20downstream%20performance.%20Researchers%20are%20burdened%20with%20tracking%20numerous%20experiments%2C%20design%20choices%2C%20and%20their%20effects%20on%20performance%2C%20often%20relying%20on%20ad-hoc%2C%20manual%20workflows%20that%20are%20inherently%20slow%20and%20error-prone.%20We%20introduce%20EvalBlocks%2C%20a%20modular%2C%20plug-and-play%20framework%20for%20efficient%20evaluation%20of%20foundation%20models%20during%20development.%20Built%20on%20Snakemake%2C%20EvalBlocks%20supports%20seamless%20integration%20of%20new%20datasets%2C%20foundation%20models%2C%20aggregation%20methods%2C%20and%20evaluation%20strategies.%20All%20experiments%20and%20results%20are%20tracked%20centrally%20and%20are%20reproducible%20with%20a%20single%20command%2C%20while%20efficient%20caching%20and%20parallel%20execution%20enable%20scalable%20use%20on%20shared%20compute%20infrastructure.%20Demonstrated%20on%20five%20state-of- {"title": "IDDM: Identity-Decoupled Personalized Diffusion Models with a Tunable Privacy-Utility Trade-off", "author": "Linyan Dai and Xinwei Zhang and Haoyang Li and Qingqing Ye and Haibo Hu", "abstract": "Personalized text-to-image diffusion models (e.g., DreamBooth, LoRA) enable users to synthesize high-fidelity avatars from a few reference photos for social expression. However, once these generations are shared on social media platforms (e.g., Instagram, Facebook), they can be linked to the real user via face recognition systems, enabling identity tracking and profiling. Existing defenses mainly follow an anti-personalization strategy that protects publicly released reference photos by disrupting model fine-tuning. While effective against unauthorized personalization, they do not address another practical setting in which personalization is authorized, but the resulting public outputs still leak identity information.\n  To address this problem, we introduce a new defense setting, termed model-side output immunization, whose goal is to produce a personalized model that supports authorized personalization while reducing the identity linkability of public generations, with tunable control over the privacy-utility trade-off to accommodate diverse privacy needs. To this end, we propose Identity-Decoupled personalized Diffusion Models (IDDM), a model-side defense that integrates identity decoupling into the personalization pipeline. Concretely, IDDM follows an alternating procedure that interleaves short personalization updates with identity-decoupled data optimization, using a two-stage schedule to balance identity linkability suppression and generation utility. Extensive experiments across multiple datasets, diverse prompts, and state-of-the-art face recognition systems show that IDDM consistently reduces identity linkability while preserving high-quality personalized generation.", "link": "http://arxiv.org/abs/2604.00903v1", "date": "2026-04-01", "relevancy": 2.4681, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6644}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5891}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IDDM%3A%20Identity-Decoupled%20Personalized%20Diffusion%20Models%20with%20a%20Tunable%20Privacy-Utility%20Trade-off&body=Title%3A%20IDDM%3A%20Identity-Decoupled%20Personalized%20Diffusion%20Models%20with%20a%20Tunable%20Privacy-Utility%20Trade-off%0AAuthor%3A%20Linyan%20Dai%20and%20Xinwei%20Zhang%20and%20Haoyang%20Li%20and%20Qingqing%20Ye%20and%20Haibo%20Hu%0AAbstract%3A%20Personalized%20text-to-image%20diffusion%20models%20%28e.g.%2C%20DreamBooth%2C%20LoRA%29%20enable%20users%20to%20synthesize%20high-fidelity%20avatars%20from%20a%20few%20reference%20photos%20for%20social%20expression.%20However%2C%20once%20these%20generations%20are%20shared%20on%20social%20media%20platforms%20%28e.g.%2C%20Instagram%2C%20Facebook%29%2C%20they%20can%20be%20linked%20to%20the%20real%20user%20via%20face%20recognition%20systems%2C%20enabling%20identity%20tracking%20and%20profiling.%20Existing%20defenses%20mainly%20follow%20an%20anti-personalization%20strategy%20that%20protects%20publicly%20released%20reference%20photos%20by%20disrupting%20model%20fine-tuning.%20While%20effective%20against%20unauthorized%20personalization%2C%20they%20do%20not%20address%20another%20practical%20setting%20in%20which%20personalization%20is%20authorized%2C%20but%20the%20resulting%20public%20outputs%20still%20leak%20identity%20information.%0A%20%20To%20address%20this%20problem%2C%20we%20introduce%20a%20new%20defense%20setting%2C%20termed%20model-side%20output%20immunization%2C%20whose%20goal%20is%20to%20produce%20a%20personalized%20model%20that%20supports%20authorized%20personalization%20while%20reducing%20the%20identity%20linkability%20of%20public%20generations%2C%20with%20tunable%20control%20over%20the%20privacy-utility%20trade-off%20to%20accommodate%20diverse%20privacy%20needs.%20To%20this%20end%2C%20we%20propose%20Identity-Decoupled%20personalized%20Diffusion%20Models%20%28IDDM%29%2C%20a%20model-side%20defense%20that%20integrates%20identity%20decoupling%20into%20the%20personalization%20pipeline.%20Concretely%2C%20IDDM%20follows%20an%20alternating%20procedure%20that%20interleaves%20short%20personalization%20updates%20with%20identity-decoupled%20data%20optimization%2C%20using%20a%20two-stage%20schedule%20to%20balance%20identity%20linkability%20suppression%20and%20generation%20utility.%20Extensive%20experiments%20across%20multiple%20datasets%2C%20diverse%20prompts%2C%20and%20state-of-the-art%20face%20recognition%20systems%20show%20that%20IDDM%20consistently%20reduces%20identity%20linkability%20while%20preserving%20high-quality%20personalized%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00903v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIDDM%253A%2520Identity-Decoupled%2520Personalized%2520Diffusion%2520Models%2520with%2520a%2520Tunable%2520Privacy-Utility%2520Trade-off%26entry.906535625%3DLinyan%2520Dai%2520and%2520Xinwei%2520Zhang%2520and%2520Haoyang%2520Li%2520and%2520Qingqing%2520Ye%2520and%2520Haibo%2520Hu%26entry.1292438233%3DPersonalized%2520text-to-image%2520diffusion%2520models%2520%2528e.g.%252C%2520DreamBooth%252C%2520LoRA%2529%2520enable%2520users%2520to%2520synthesize%2520high-fidelity%2520avatars%2520from%2520a%2520few%2520reference%2520photos%2520for%2520social%2520expression.%2520However%252C%2520once%2520these%2520generations%2520are%2520shared%2520on%2520social%2520media%2520pla {"title": "ORBIT: Scalable and Verifiable Data Generation for Search Agents on a Tight Budget", "author": "Nandan Thakur and Zijian Chen and Xueguang Ma and Jimmy Lin", "abstract": "Search agents, which integrate language models (LMs) with web search, are becoming crucial for answering complex user queries. Constructing training datasets for deep research tasks, involving multi-step retrieval and reasoning, remains challenging due to expensive human annotation, or cumbersome prerequisites. In this work, we introduce ORBIT, a training dataset with 20K reasoning-intensive queries with short verifiable answers, generated using a frugal framework without relying on paid API services. The modular framework relies on four stages: seed creation, question--answer pair generation, and two stages of verification: self and external. ORBIT spans 15 domains and each training pair requires 4--5 reasoning steps, with external search verification required from the complete web. We train Qwen3-4B as the base model on ORBIT using GRPO and evaluate it on Wikipedia question answering tasks. Extensive experiment results demonstrate that ORBIT-4B achieves strong performance among sub-4B LLMs as search agents, proving the utility of synthetic datasets. Our framework, code and datasets are open-sourced and available publicly.", "link": "http://arxiv.org/abs/2604.01195v1", "date": "2026-04-01", "relevancy": 2.4655, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.494}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.494}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4914}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ORBIT%3A%20Scalable%20and%20Verifiable%20Data%20Generation%2 iable%2520Data%2520Generation%2520for%2520Search%2520Agents%2520on%2520a%2520Tight%2520Budget%26entry.906535625%3DNandan%2520Thakur%2520and%2520Zijian%2520Chen%2520and%2520Xueguang%2520Ma%2520and%2520Jimmy%2520Lin%26entry.1292438233%3DSearch%2520agents%252C%2520which%2520integrate%2520language%2520models%2520%2528LMs%2529%2520with%2520web%2520search%252C%2520are%2520becoming%2520crucial%2520for%2520answering%2520complex%2520user%2520queries.%2520Constructing%2520training%2520datasets%2520for%2520deep%2520research%2520tasks%252C%2520involving%2520multi-step%2520retrieval%2520and%2520reasoning%252C%2520remains%2520challenging%2520due%2520to%2520expensive%2520human%2520annotation%252C%2520or%2520cumbersome%2520prerequisites.%2520In%2520this%2520work%252C%2520we%2520introduce%2520ORBIT%252C%2520a%2520training%2520dataset%2520with%252020K%2520reasoning-intensive%2520queries%2520with%2520short%2520verifiable%2520answers%252C%2520generated%2520using%2520a%2520frugal%2520framework%2520without%2520relying%2520on%2520paid%2520API%2520services.%2520The%2520modular%2520framework%2520relies%2520on%2520four%2520stages%253A%2520seed%2520creation%252C%2520question--answer%2520pair%2520generation%252C%2520and%2520two%2520stages%2520of%2520verification%253A%2520self%2520and%2520external.%2520ORBIT%2520spans%252015%2520domains%2520and%2520each%2520training%2520pair%2520requires%25204--5%2520reasoning%2520steps%252C%2520with%2520external%2520search%2520verification%2520required%2520from%2520the%2520complete%2520web.%2520We%2520train%2520Qwen3-4B%2520as%2520the%2520base%2520model%2520on%2520ORBIT%2520using%2520GRPO%2520and%2520evaluate%2520it%2520on%2520Wikipedia%2520question%2520answering%2520tasks.%2520Extensive%2520experiment%2520results%2520demonstrate%2520that%2520ORBIT-4B%2520achieves%2520strong%2520performance%2520among%2520sub-4B%2520LLMs%2520as%2520search%2520agents%252C%2520proving%2520the%2520utility%2520of%2520synthetic%2520datasets.%2520Our%2520framework%252C%2520code%2520a {"title": "TRACE: Training-Free Partial Audio Deepfake Detection via Embedding Trajectory Analysis of Speech Foundation Models", "author": "Awais Khan and Muhammad Umar Farooq and Kutub Uddin and Khalid Malik", "abstract": "Partial audio deepfakes, where synthesized segments are spliced into genuine recordings, are particularly deceptive because most of the audio remains authentic. Existing detectors are supervised: they require frame-level annotations, overfit to specific synthesis pipelines, and must be retrained as new generative models emerge. We argue that this supervision is unnecessary. We hypothesize that speech foundation models implicitly encode a forensic signal: genuine speech forms smooth, slowly varying embedding trajectories, while splice boundaries introduce abrupt disruptions in frame-level transitions. Building on this, we propose TRACE (Training-free Representation-based Audio Countermeasure via Embedding dynamics), a training-free framework that detects partial audio deepfakes by analyzing the first-order dynamics of frozen speech foundation model representations without any training, labeled data, or architectural modification. We evaluate TRACE on four benchmarks that span two languages using six speech foundation models. In PartialSpoof, TRACE achieves 8.08% EER, competitive with fine-tuned supervised baselines. In LlamaPartialSpoof, the most challenging benchmark featuring LLM-driven commercial synthesis, TRACE surpasses a supervised baseline outright (24.12% vs. 24.49% EER) without any target-domain data. These results show that temporal dynamics in speech foundation models provide an effective, generalize signal for training-free audio forensics.", "link": "http://arxiv.org/abs/2604.01083v1", "date": "2026-04-01", "relevancy": 2.4583, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5156}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4797}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4797}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TRACE%3A%20Training-Free%20Partial%20Audio%20Deepfake%20Detection%20via%20Embedding%20Trajectory%20Analysis%20of%20Speech%20Foundation%20Models&body=Title%3A%20TRACE%3A%20Training-Free%20Partial%20Audio%20Deepfake%20Detection%20via%20Embedding%20Trajectory%20Analysis%20of%20Speech%20Foundation%20Models%0AAuthor%3A%20Awais%20Khan%20and%20Muhammad%20Umar%20Farooq%20and%20Kutub%20Uddin%20and%20Khalid%20Malik%0AAbstract%3A%20Partial%20audio%20deepfakes%2C%20where%20synthesized%20segments%20are%20spliced%20into%20genuine%20recordings%2C%20are%20particularly%20deceptive%20because%20most%20of%20the%20audio%20remains%20authentic.%20Existing%20detectors%20are%20supervised%3A%20they%20require%20frame-level%20annotations%2C%20overfit%20to%20specific%20synthesis%20pipelines%2C%20and%20must%20be%20retrained%20as%20new%20generative%20models%20emerge.%20We%20argue%20that%20this%20supervision%20is%20unnecessary.%20We%20hypothesize%20that%20speech%20foundation%20models%20implicitly%20encode%20a%20forensic%20signal%3A%20genuine%20speech%20forms%20smooth%2C%20slowly%20varying%20embedding%20trajectories%2C%20while%20splice%20boundaries%20introduce%20abrupt%20disruptions%20in%20frame-level%20transitions.%20Building%20on%20this%2C%20we%20propose%20TRACE%20%28Training-free%20Representation-based%20Audio%20Countermeasure%20via%20Embedding%20dynamics%29%2C%20a%20training-free%20framework%20that%20detects%20partial%20audio%20deepfakes%20by%20analyzing%20the%20first-order%20dynamics%20of%20frozen%20speech%20foundation%20model%20representations%20without%20any%20training%2C%20labeled%20data%2C%20or%20architectural%20modification.%20We%20evaluate%20TRACE%20on%20four%20benchmarks%20that%20span%20two%20languages%20using%20six%20speech%20foundation%20models.%20In%20PartialSpoof%2C%20TRACE%20achieves%208.08%25%20EER%2C%20competitive%20with%20fine-tuned%20supervised%20baselines.%20In%20LlamaPartialSpoof%2C%20the%20most%20challenging%20benchmark%20featuring%20LLM-driven%20commercial%20synthesis%2C%20TRACE%20surpasses%20a%20supervised%20baseline%20outright%20%2824.12%25%20vs.%2024.49%25%20EER%29%20without%20any%20target-domain%20data.%20These%20results%20show%20that%20temporal%20dynamics%20in%20speech%20foundation%20models%20provide%20an%20effective%2C%20generalize%20signal%20for%20training-free%20audio%20forensics.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01083v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTRACE%253A%2520Training-Free%2520Partial%2520Audio%2520Deepfake%2520Detection%2520via%2520Embedding%2520Trajectory%2520Analysis%2520of%2520Speech%2520Foundation%2520Models%26entry.906535625%3DAwais%2520Khan%2520and%2520Muhammad%2520Umar%2520Farooq%2520and%2520Kutub%2520Uddin%2520and%2520Khalid%2520Malik%26entry.1292438233%3DPartial%2520audio%2520deepfakes%252C%2520where%2520synthesized%2520segments%2520are%2520spliced%2520into%2520genuine%2520recordings%252C%2520are%2520particularly%2520deceptive%2520because%2520most%2520of%2520the%2520audio%2520remains%2520authentic.%2520Existing%2520detectors%2520are%2520supervised%253A%2520they%2520require%2520frame-level%2520annotations%252C%2520overfit%2520to%2520specific%2520synthesis%2520pipelines%252C%2520and%2520must%2520be%2520retrained%2520as%2520new%2520generative%2520models%2520emerge.%2520We%2520argue%2520that%2520this%2520supervision%2520is%2520unnecessary.%2520We%2520hypothesize%2520that%2520speech%2520foundation%2520models%2520implicitly%2520encode%2520a%2520forensic%2520signal%253A%2520genuine%2520speech%2520forms%2520smooth%252C%2520slowly%2520varying%252 {"title": "Learning Hyperparameters via a Data-Emphasized Variational Objective", "author": "Ethan Harvey and Mikhail Petrov and Michael C. Hughes", "abstract": "When training large models on limited data, avoiding overfitting is paramount. Common grid search or smarter search methods rely on expensive separate runs for each candidate hyperparameter, while carving out a validation set that reduces available training data. In this paper, we study gradient-based learning of hyperparameters via the evidence lower bound (ELBO) objective from Bayesian variational methods. This avoids the need for any validation set. We focus on scenarios where the model is over-parameterized for flexibility and the approximate posterior is chosen to be Gaussian with isotropic covariance for tractability, even though it cannot match the true posterior. In such scenarios, we find the ELBO prioritizes posteriors that match the prior, leading to severe underfitting. Instead, we recommend a data-emphasized ELBO that upweights the likelihood but not the prior. In Bayesian transfer learning of image and text classifiers, our method reduces the 88+ hour grid search of past work to under 3 hours while delivering comparable accuracy. We further demonstrate how our approach enables efficient yet accurate approximations of Gaussian processes with learnable lengthscale kernels.", "link": "http://arxiv.org/abs/2502.01861v3", "date": "2026-04-01", "relevancy": 2.4542, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.494}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4919}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confus

{"title": "Sub-metre Lunar DEM Generation and Validation from Chandrayaan-2 OHRC Multi-View Imagery Using Open-Source Photogrammetry", "author": "Aaranay Aadi and Jai Singla and Nitant Dube and Oleg Alexandrov", "abstract": "High-resolution digital elevation models (DEMs) of the lunar surface are essential for surface mobility planning, landing site characterization, and planetary science. The Orbiter High Resolution Camera (OHRC) on board Chandrayaan-2 has the best ground sampling capabilities of any lunar orbital imaging currently in use by acquiring panchromatic imagery at a resolution of roughly 20-30 cm per pixel. This work presents, for the first time, the generation of sub-metre DEMs from OHRC multi-view imagery using an exclusively open-source pipeline. Candidate stereo pairs are identified from non-paired OHRC archives through geometric analysis of image metadata, employing baseline-to-height (B/H) ratio computation and convergence angle estimation. Dense stereo correspondence and ray triangulation are then applied to generate point clouds, which are gridded into DEMs at effective spatial resolutions between approximately 24 and 54 cm across five geographically distributed lunar sites. Absolute elevation consistency is established through Iterative Closest Point (ICP) alignment against Lunar Reconnaissance Orbiter Narrow Angle Camera (NAC) Digital Terrain Models, followed by constant-bias offset correction. Validation against NAC reference terrain yields a vertical RMSE of 5.85 m (at native OHRC resolution), and a horizontal accuracy of less than 30 cm assessed by planimetric feature matching.", "link": "http://arxiv.org/abs/2604.01032v1", "date": "2026-04-01", "relevancy": 2.314, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4657}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4657}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sub-metre%20Lunar%20DEM%20Generation%20and%20Validation%20from%20Chandrayaan-2%20OHRC%20Multi-View%20Imagery%20Using%20Open-Source%20Photogrammetry&body=Title%3A%20Sub-metre%20Lunar%20DEM%20Generation%20and%20Validation%20from%20Chandrayaan-2%20OHRC%20Multi-View%20Imagery%20Using%20Open-Source%20Photogrammetry%0AAuthor%3A%20Aaranay%20Aadi%20and%20Jai%20Singla%20and%20Nitant%20Dube%20and%20Oleg%20Alexandrov%0AAbstract%3A%20High-resolution%20digital%20elevation%20models%20%28DEMs%29%20of%20the%20lunar%20surface%20are%20essential%20for%20surface%20mobility%20planning%2C%20landing%20site%20characterization%2C%20and%20planetary%20science.%20The%20Orbiter%20High%20Resolution%20Camera%20%28OHRC%29%20on%20board%20Chandrayaan-2%20has%20the%20best%20ground%20sampling%20capabilities%20of%20any%20lunar%20orbital%20imaging%20currently%20in%20use%20by%20acquiring%20panchromatic%20imagery%20at%20a%20resolution%20of%20roughly%2020-30%20cm%20per%20pixel.%20This%20work%20presents%2C%20for%20the%20first%20time%2C%20the%20generation%20of%20sub-metre%20DEMs%20from%20OHRC%20multi-view%20imagery%20using%20an%20exclusively%20open-source%20pipeline.%20Candidate%20stereo%20pairs%20are%20identified%20from%20non-paired%20OHRC%20archives%20through%20geometric%20analysis%20of%20image%20metadata%2C%20employing%20baseline-to-height%20%28B/H%29%20ratio%20computation%20and%20convergence%20angle%20estimation.%20Dense%20stereo%20correspondence%20and%20ray%20triangulation%20are%20then%20applied%20to%20generate%20point%20clouds%2C%20which%20are%20gridded%20into%20DEMs%20at%20effective%20spatial%20resolutions%20between%20approximately%2024%20and%2054%20cm%20across%20five%20geographically%20distributed%20lunar%20sites.%20Absolute%20elevation%20consistency%20is%20established%20through%20Iterative%20Closest%20Point%20%28ICP%29%20alignment%20against%20Lunar%20Reconnaissance%20Orbiter%20Narrow%20Angle%20Camera%20%28NAC%29%20Digital%20Terrain%20Models%2C%20followed%20by%20constant-bias%20offset%20correction.%20Validation%20against%20NAC%20reference%20terrain%20yields%20a%20vertical%20RMSE%20of%205.85%20m%20%28at%20native%20OHRC%20resolution%29%2C%20and%20a%20horizontal%20accuracy%20of%20less%20than%2030%20cm%20assessed%20by%20planimetric%20feature%20matching.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01032v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSub-metre%2520Lunar%2520DEM%2520Generation%2520and%2520Validation%2520from%2520Chandrayaan-2%2520OHRC%2520Multi-View%2520Imagery%2520Using%2520Open-Source%2520Photogrammetry%26entry.906535625%3DAaranay%2520Aadi%2520and%2520Jai%2520Singla%2520and%2520Nitant%2520Dube%2520and%2520Oleg%2520Alexandrov%26entry.1292438233%3DHigh-resolution%2520digital%2520elevation%2520models%2520%2528DEMs%2529%2520of%2520the%2520lunar%2520surface%2520are%2520essential%2520for%2520surface%2520mobility%2520planning%252C%2520landing%2520site%2520characterization%252C%2520and%2520planetary%2520science.%2520The%2520Orbiter%2520High%2520Resolution%2520Camera%2520%2528OHRC%2529%2520on%2520board%2520Chandrayaan-2%2520has%2520the%2520best%2520ground%2520sampling%2520capabilities%2520of%2520any%2520lunar%2520orbital%2520imaging%2520currently%2520in%2520use%2520by%2520acquiring%2520panchromatic%2520imagery%2520at%2520a%2520resolution%2520of%2520roughly%252020-30%2520cm%2520per%2520pixel.%2520This%2520work%2520presents%252C%2520for%2520the%2520first%2520time%252C%2520the%2520generation%2520of%2520sub-metre%2520DEMs%2520from%2520OHRC%2520multi-view%2520imagery%2520using%2520an%2520exclusively%2520open-source%2520pipeline.%2520Candidate%2520stereo%2520pairs%2520are%2520identified%2520from%2520non-paired%2520OHRC%2520archives%2520through%2520 {"title": "A 3D Cross-modal Keypoint Descriptor for MR-US Matching and Registration", "author": "Daniil Morozov and Reuben Dorent and Nazim Haouchine", "abstract": "Intraoperative registration of real-time ultrasound (iUS) to preoperative Magnetic Resonance Imaging (MRI) remains an unsolved problem due to severe modality-specific differences in appearance, resolution, and field-of-view. To address this, we propose a novel 3D cross-modal keypoint descriptor for MRI-iUS matching and registration. Our approach employs a patient-specific matching-by-synthesis approach, generating synthetic iUS volumes from preoperative MRI. This enables supervised contrastive training to learn a shared descriptor space. A probabilistic keypoint detection strategy is then employed to identify anatomically salient and modality-consistent locations. During training, a curriculum-based triplet loss with dynamic hard negative mining is used to learn descriptors that are i) robust to iUS artifacts such as speckle noise and limited coverage, and ii) rotation-invariant. At inference, the method detects keypoints in MR and real iUS images and identifies sparse matches, which are then used to perform rigid registration. Our approach is evaluated using 3D MRI-iUS pairs from the ReMIND dataset. Experiments show that our approach outperforms state-of-the-art keypoint matching methods across 11 patients, with an average precision of 69.8%. For image registration, our method achieves a competitive mean Target Registration Error of 2.39 mm on the ReMIND2Reg benchmark. Compared to existing iUS-MR registration approaches, our framework is interpretable, requires no manual initialization, and shows robustness to iUS field-of-view variation. Code, data and model weights are available at https://github.com/morozovdd/CrossKEY.", "link": "http://arxiv.org/abs/2507.18551v2", "date": "2026-04-01", "relevancy": 2.3135, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6558}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5359}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5179}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%203D%20Cross-modal%20Keypoint%20Descriptor%20for%20MR-US%20Matching%20and%20Registration&body=Title%3A%20A%203D%20Cross-modal%20Keypoint%20Descriptor%20for%20MR-US%20Matching%20and%20Registration%0AAuthor%3A%20Daniil%20Morozov%20and%20Reuben%20Dorent%20and%20Nazim%20Haouchine%0AAbstract%3A%20Intraoperative%20registration%20of%20real-time%20ultrasound%20%28iUS%29%20to%20preoperative%20Magnetic%20Resonance%20Imaging%20%28MRI%29%20remains%20an%20unsolved%20problem%20due%20to%20severe%20modality-specific%20differences%20in%20appearance%2C%20resolution%2C%20and%20field-of-view.%20To%20address%20this%2C%20we%20propose%20a%20novel%203D%20cross-modal%20keypoint%20descriptor%20for%20MRI-iUS%20matching%20and%20registration.%20Our%20approach%20employs%20a%20patient-specific%20matching-by-synthesis%20approach%2C%20generating%20synthetic%20iUS%20volumes%20from%20preoperative%20MRI.%20This%20enables%20supervised%20contrastive%20training%20to%20learn%20a%20shared%20descriptor%20space.%20A%20probabilistic%20keypoint%20detection%20strategy%20is%20then%20employed%20to%20identify%20anatomically%20salient%20and%20modality-consistent%20locations.%20During%20training%2C%20a%20curriculum-based%20triplet%20loss%20with%20dynamic%20hard%20negative%20mining%20is%20used%20to%20learn%20descriptors%20that%20are%20i%29%20robust%20to%20iUS%20artifacts%20such%20as%20speckle%20noise%20and%20limited%20coverage%2C%20and%20ii%29%20rotation-invariant.%20At%20inference%2C%20the%20method%20detects%20keypoints%20in%20MR%20and%20real%20iUS%20images%20and%20identifies%20sparse%20matches%2C%20which%20are%20then%20used%20to%20perform%20rigid%20registration.%20Our%20approach%20is%20evaluated%20using%203D%20MRI-iUS%20pairs%20from%20the%20ReMIND%20dataset.%20Experiments%20show%20that%20our%20approach%20outperforms%20state-of-the-art%20keypoint%20matching%20methods%20across%2011%20patients%2C%20with%20an%20average%20precision%20of%2069.8%25.%20For%20image%20registration%2C%20our%20method%20achieves%20a%20competitive%20mean%20Target%20Registration%20Error%20of%202.39%20mm%20on%20the%20ReMIND2Reg%20benchmark.%20Compared%20to%20existing%20iUS-MR%20registration%20approaches%2C%20our%20framework%20is%20interpretable%2C%20requires%20no%20manual%20initialization%2C%20and%20shows%20robustness%20to%20iUS%20field-of-view%20variation.%20Code%2C%20data%20and%20model%20weights%20are%20available%20at%20https%3A//github.com/morozovdd/CrossKEY.%0ALink%3A%20http%3A//arxiv.org/abs/2507.18551v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%25203D%2520Cross-modal%2520Keypoint%2520Descriptor%2520for%2520MR-US%2520Matching%2520and%2520Registration%26entry.906535625%3DDaniil%2520Morozov%2520and%2520Reuben%2520Dorent%2520and%2520Nazim%2520Haouchine%26entry.1292438233%3DIntraoperative%2520registration%2520of%2520real-time%2520ultrasound%2520%2528iUS%2529%2520to%2520preoperative%2520Magnetic%2520Resonance%2520Imaging%2520%2528MRI%2529%2520remains%2520an%2520unsolved%2520problem%2520due%2520to%2520severe%2520modality-specific%2520differences%2520in%2520appearance%252C%2520resolution%252C%2520and%2520field-of-view.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520novel%25203D%2520cross-modal%2520keypoint%2520descriptor%2520for%2520MRI-iUS%2520matching%2520and%2520registration.%2520Our%2520approach%2520employs%2520a%2520patient-specific%2520matching-by-synthesis%2520approach%252C%2520generating%2520synthetic%2520iUS%2520volum {"title": "HUMOF: Human Motion Forecasting in Interactive Social Scenes", "author": "Caiyi Sun and Yujing Sun and Xiao Han and Zemin Yang and Jiawei Liu and Xinge Zhu and Siu Ming Yiu and Yuexin Ma", "abstract": "Complex scenes present significant challenges for predicting human behaviour due to the abundance of interaction information, such as human-human and humanenvironment interactions. These factors complicate the analysis and understanding of human behaviour, thereby increasing the uncertainty in forecasting human motions. Existing motion prediction methods thus struggle in these complex scenarios. In this paper, we propose an effective method for human motion forecasting in interactive scenes. To achieve a comprehensive representation of interactions, we design a hierarchical interaction feature representation so that high-level features capture the overall context of the interactions, while low-level features focus on fine-grained details. Besides, we propose a coarse-to-fine interaction reasoning module that leverages both spatial and frequency perspectives to efficiently utilize hierarchical features, thereby enhancing the accuracy of motion predictions. Our method achieves state-of-the-art performance across four public datasets. The source code will be available at https://github.com/scy639/HUMOF.", "link": "http://arxiv.org/abs/2506.03753v3", "date": "2026-04-01", "relevancy": 2.3111, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6293}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5688}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5298}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HUMOF%3A%20Human%20Motion%20Forecasting%20in%20Interactive%20Social%20Scenes&body=Title%3A%20HUMOF%3A%20Human%20Motion%20Forecasting%20in%20Interactive%20Social%20Scenes%0AAuthor%3A%20Caiyi%20Sun%20and%20Yujing%20Sun%20and%20Xiao%20Han%20and%20Zemin%20Yang%20and%20Jiawei%20Liu%20and%20Xinge%20Zhu%20and%20Siu%20Ming%20Yiu%20and%20Yuexin%20Ma%0AAbstract%3A%20Complex%20scenes%20present%20significant%20challenges%20for%20predicting%20human%20behaviour%20due%20to%20the%20abundance%20of%20interaction%20information%2C%20such%20as%20human-human%20and%20humanenvironment%20interactions.%20These%20factors%20complicate%20the%20analysis%20and%20understanding%20of%20human%20behaviour%2C%20thereby%20increasing%20the%20uncertainty%20in%20forecasting%20human%20motions.%20Existing%20motion%20prediction%20methods%20thus%20struggle%20in%20these%20complex%20scenarios.%20In%20this%20paper%2C%20we%20propose%20an%20effective%20method%20for%20human%20motion%20forecasting%20in%20interactive%20scenes.%20To%20achieve%20a%20comprehensive%20representation%20of%20interactions%2C%20we%20design%20a%20hierarchical%20interaction%20feature%20representation%20so%20that%20high-level%20features%20capture%20the%20overall%20context%20of%20the%20interactions%2C%20while%20low-level%20features%20focus%20on%20fine-grained%20details.%20Besides%2C%20we%20propose%20a%20coarse-to-fine%20interaction%20reasoning%20module%20that%20leverages%20both%20spatial%20and%20frequency%20perspectives%20to%20efficiently%20utilize%20hierarchical%20features%2C%20thereby%20enhancing%20the%20accuracy%20of%20motion%20predictions.%20Our%20method%20achieves%20state-of-the-art%20performance%20across%20four%20public%20datasets.%20The%20source%20code%20will%20be%20available%20at%20https%3A//github.com/scy639/HUMOF.%0ALink%3A%20http%3A//arxiv.org/abs/2506.03753v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHUMOF%253A%2520Human%2520Motion%2520Forecasting%2520in%2 {"title": "HISA: Efficient Hierarchical Indexing for Fine-Grained Sparse Attention", "author": "Yufei Xu and Fanxu Meng and Fan Jiang and Yuxuan Wang and Ruijie Zhou and Zhaohui Wang and Jiexi Wu and Zhixin Pan and Xiaojuan Tang and Wenjie Pei and Tongxuan Liu and Di yin and Xing Sun and Muhan Zhang", "abstract": "Token-level sparse attention mechanisms, exemplified by DeepSeek Sparse Attention (DSA), achieve fine-grained key selection by scoring every historical key for each query through a lightweight indexer, then computing attention only on the selected subset. While the downstream sparse attention itself scales favorably, the indexer must still scan the entire prefix for every query, introducing an per-layer bottleneck that grows prohibitively with context length. We propose HISA (Hierarchical Indexed Sparse Attention), a plug-and-play replacement for the indexer that rewrites the search path from a flat token scan into a two-stage hierarchical procedure: (1) a block-level coarse filtering stage that scores pooled block representations to discard irrelevant regions, followed by (2) a token-level refinement stage that applies the original indexer exclusively within the retained candidate blocks. HISA preserves the identical token-level top-sparse pattern consumed by the downstream Sparse MLA operator and requires no additional training. On kernel-level benchmarks, HISA achieves up to speedup at 64K context. On Needle-in-a-Haystack and LongBench, we directly replace the indexer in DeepSeek-V3.2 and GLM-5 with our HISA indexer, without any finetuning. HISA closely matches the original DSA in quality, while substantially outperforming block-sparse baselines.", "link": "http://arxiv.org/abs/2603.28458v2", "date": "2026-04-01", "relevancy": 2.304, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5223}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4321}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.428}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HISA%3A%20Efficient%20Hierarchical%20Indexing%20for%20Fine-Grained%20Sparse%20Attention&body=Title%3A%20HISA%3A%20Efficient%20Hierarchical%20Indexing%20for%20Fine-Grained%20Sparse%20Attention%0AAuthor%3A%20Yufei%20Xu%20and%20Fanxu%20Meng%20and%20Fan%20Jiang%20and%20Yuxuan%20Wang%20and%20Ruijie%20Zhou%20and%20Zhaohui%20Wang%20and%20Jiexi%20Wu%20and%20Zhixin%20Pan%20and%20Xiaojuan%20Tang%20and%20Wenjie%20Pei%20and%20Tongxuan%20Liu%20and%20Di%20yin%20and%20Xing%20Sun%20and%20Muhan%20Zhang%0AAbstract%3A%20Token-level%20sparse%20attention%20mechanisms%2C%20exemplified%20by%20DeepSeek%20Sparse%20Attention%20%28DSA%29%2C%20achieve%20fine-grained%20key%20selection%20by%20scoring%20every%20historical%20key%20for%20each%20query%20through%20a%20lightweight%20indexer%2C%20then%20computing%20attention%20only%20on%20the%20selected%20subset.%20While%20the%20downstream%20sparse%20attention%20itself%20scales%20favorably%2C%20the%20indexer%20must%20still%20scan%20the%20entire%20prefix%20for%20every%20query%2C%20introducing%20an%20per-layer%20bottleneck%20that%20grows%20prohibitively%20with%20context%20length.%20We%20propose%20HISA%20%28Hierarchical%20Indexed%20Sparse%20Attention%29%2C%20a%20plug-and-play%20replacement%20for%20the%20indexer%20that%20rewrites%20the%20search%20path%20from%20a%20flat%20token%20scan%20into%20a%20two-stage%20hierarchical%20procedure%3A%20%281%29%20a%20block-level%20coarse%20filtering%20stage%20that%20scores%20pooled%20block%20representations%20to%20discard%20irrelevant%20regions%2C%20followed%20by%20%282%29%20a%20token-level%20refinement%20stage%20that%20applies%20the%20original%20indexer%20exclusively%20within%20the%20retained%20candidate%20blocks.%20HISA%20preserves%20the%20identical%20token-level%20top-sparse%20pattern%20consumed%20by%20the%20downstream%20Sparse%20MLA%20operator%20and%20requires%20no%20additional%20training.%20On%20kernel-level%20benchmarks%2C%20HISA%20achieves%20up%20to%20speedup%20at%2064K%20context.%20On%20Needle-in-a-Haystack%20and%20LongBench%2C%20we%20directly%20replace%20the%20indexer%20in%20DeepSeek-V3.2%20and%20GLM-5%20with%20our%20HISA%20indexer%2C%20without%20any%20finetuning.%20HISA%20closely%20matches%20the%20original%20DSA%20in%20quality%2C%20while%20substantially%20outperforming%20block-sparse%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28458v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHISA%253A%2520Efficient%2520Hierarchical%2520Indexing%2520for%2520Fine-Grained%2520Sparse%2520Attention%26entry.906535625%3DYufei%2520Xu%2520and%2520Fanxu%2520Meng%2520and%2520Fan%2520Jiang%2520and%2520Yuxuan%2520Wang%2520and%2520Ruijie%2520Zhou%2520and%2520Zhaohui%2520Wang%2520and%2520Jiexi%2520Wu%2520and%2520Zhixin%2520Pan%2520and%2520Xiaojuan%2520Tang%2520and%2520Wenjie%2520Pei%2520and%2520Tongxuan%2520Liu%2520and%2520Di%2520yin%2520and%2520Xing%2520Sun%2520and%2520Muhan%2520Zhang%26entry.1292438233%3DToken-level%2520sparse%2520attention%2520mechanisms%252C%2520exemplified%2520by%2520DeepSeek%2520Sparse%2520Attention%2520%2528DSA%2529%252C%2520achieve%2520fine-grained%2520key%2520selection%2520by%2520scoring%2520every%2520historical%2520key%2520for%2520each%2520query%2520through%2520a%2520lightweight%2520indexer%252C%2520then%2520computing%2520attention%2520only%2520on%2520the%2520selected%2520subset.%2520While%2520the%2520downstream%2520sparse%2520attention%2520itself%2520scales%2520favorably%252C%2520the%2520indexer%2520must%2520still%2520scan%2520the%2520entire%2520prefix%2520for%2520every%2520query%252C%2520introducing%2520an%2520per-layer%2520bottl {"title": "Emotion Entanglement and Bayesian Inference for Multi-Dimensional Emotion Understanding", "author": "Hemanth Kotaprolu and Kishan Maharaj and Raey Zhao and Abhijit Mishra and Pushpak Bhattacharyya", "abstract": "Understanding emotions in natural language is inherently a multi-dimensional reasoning problem, where multiple affective signals interact through context, interpersonal relations, and situational cues. However, most existing emotion understanding benchmarks rely on short texts and predefined emotion labels, reducing this process to independent label prediction and ignoring the structured dependencies among emotions. To address this limitation, we introduce Emotional Scenarios (EmoScene), a theory-grounded benchmark of 4,731 context-rich scenarios annotated with an 8-dimensional emotion vector derived from Plutchik's basic emotions. We evaluate six instruction-tuned large language models in a zero-shot setting and observe modest performance, with the best model achieving a Macro F1 of 0.501, highlighting the difficulty of context-aware multi-label emotion prediction. Motivated by the observation that emotions rarely occur independently, we further propose an entanglement-aware Bayesian inference framework that incorporates emotion co-occurrence statistics to perform joint posterior inference over the emotion vector. This lightweight post-processing improves structural consistency of predictions and yields notable gains for weaker models (e.g., +0.051 Macro F1 for Qwen2.5-7B). EmoScene therefore provides a challenging benchmark for studying multi-dimensional emotion understanding and the limitations of current language models.", "link": "http://arxiv.org/abs/2604.00819v1", "date": "2026-04-01", "relevancy": 2.2988, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6053}, {"title": "Lexicon3D: Probing Visual Fou {"title": "Scalable Pretraining of Large Mixture of Experts Language Models on Aurora Super Computer", "author": "Dharma Teja Vooturi and Dhiraj Kalamkar and Dipankar Das and Bharat Kaul", "abstract": "Pretraining Large Language Models (LLMs) from scratch requires massive amount of compute. Aurora super computer is an ExaScale machine with 127,488 Intel PVC (Ponte Vechio) GPU tiles. In this work, we showcase LLM pretraining on Aurora at the scale of 1000s of GPU tiles. Towards this effort, we developed Optimus, an inhouse training library with support for standard large model training techniques. Using Optimus, we first pretrained Mula-1B, a 1 Billion dense model and Mula-7B-A1B, a 7 Billion Mixture of Experts (MoE) model from scratch on 3072 GPU tiles for the full 4 trillion tokens of the OLMoE-mix-0924 dataset. We then demonstrated model scaling by pretraining three large MoE models Mula-20B-A2B, Mula-100B-A7B, and Mula-220B-A10B till 100 Billion tokens on the same dataset. On our largest model Mula-220B-A10B, we pushed the compute scaling from 384 to 12288 GPU tiles and observed scaling efficiency of around 90% at 12288 GPU tiles. We significantly improved the runtime performance of MoE models using custom GPU kernels for expert computation, and a novel EP-Aware sharded optimizer resulting in training speedups up to 1.71x. As part of the Optimus library, we also developed a robust set of reliability and fault tolerant features to improve training stability and continuity at scale.", "link": "http://arxiv.org/abs/2604.00785v1", "date": "2026-04-01", "relevancy": 2.2945, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4671}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4571}, {"title": "Lexicon3D: Probing Visual Foundation Models for {"title": "Optimal Brain Decomposition for Accurate LLM Low-Rank Approximation", "author": "Yuhang Li and Donghyun Lee and Ruokai Yin and Priyadarshini Panda", "abstract": "Low-rank decomposition has emerged as an important problem in Large Language Model (LLM) fine-tuning and inference. Through Singular Value Decomposition (SVD), the weight matrix can be factorized into low-rank spaces optimally. Previously, a common practice was to decompose the weight in the activation-whitened space, and then achieve satisfying results. In this work, we propose Optimal Brain Decomposition LLM (OBD-LLM), which studies the decomposition problem in the model space by utilizing second-order Hessian information. Through a rigorous Kronecker-factorization of the Hessian, we show that the decomposition needs to consider both input and output information of the layer, and achieves much better decomposition results compared to input only method. Our loss-aware decomposition method involves a bi-directional whitening on the weight matrix. As a result, OBD-LLM is a closed-form solution for the optimal decomposition of weights in the language model. Remarkably, we achieve ~20-40\\% better results than previous state-of-the-art decomposition methods, the SVD-LLM.", "link": "http://arxiv.org/abs/2604.00821v1", "date": "2026-04-01", "relevancy": 2.2932, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4807}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4476}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Optimal%20Brain%20Decomposition%20for%20Accurate%20LLM%20Low-Rank%20Approximation&body=Title%3A%20Opt 48=Optimal%20Brain%20Decomposition%20for%20Accurate%20LLM%20Low-Rank%20Approximation&entry.906535625=Yuhang%20Li%20and%20Donghyun%20Lee%20and%20Ruokai%20Yin%20and%20Priyadarshini%20Panda&entry.1292438233=Low-rank%20decomposition%20has%20emerged%20as%20an%20important%20problem%20in%20Large%20Language%20Model%20%28LLM%29%20fine-tuning%20and%20inference.%20Through%20Singular%20Value%20Decomposition%20%28SVD%29%2C%20the%20weight%20matrix%20can%20be%20factorized%20into%20low-rank%20spaces%20optimally.%20Previously%2C%20a%20common%20practice%20was%20to%20decompose%20the%20weight%20in%20the%20activation-whitened%20space%2C%20and%20then%20achieve%20satisfying%20results.%20In%20this%20work%2C%20we%20propose%20Optimal%20Brain%20Decomposition%20LLM%20%28OBD-LLM%29%2C%20which%20studies%20the%20decomposition%20problem%20in%20the%20model%20space%20by%20utilizing%20second-order%20Hessian%20information.%20Through%20a%20rigorous%20Kronecker-factorization%20of%20the%20Hessian%2C%20we%20show%20that%20the%20decomposition%20needs%20to%20consider%20both%20input%20and%20output%20information%20of%20the%20layer%2C%20and%20achieves%20much%20better%20decomposition%20results%20compared%20to%20input%20only%20method.%20Our%20loss-aware%20decomposition%20method%20involves%20a%20bi-directional%20whitening%20on%20the%20weight%20matrix.%20As%20a%20result%2C%20OBD-LLM%20is%20a%20closed-form%20solution%20for%20the%20optimal%20decomposition%20of%20weights%20in%20the%20language%20model.%20Remarkably%2C%20we%20achieve%20~20-40%5C%25%20better%20results%20than%20previous%20state-of-the-art%20decomposition%20methods%2C%20the%20SVD-LLM.&entry.1838667208=http%3A//arxiv.org/abs/2604.00821v1&entry.124074799=Read"},
{"title": "Processing and acquisition traces in visual encoders: What does CLIP know about your camera?", "author": "Ryan Ramos and Vladan Stojni\u0107 and Giorgos Kordopatis-Zilos and Yuta Nakashima and Giorgos Tolias and Noa Garcia", "abstract": "Prior work has analyzed the robustness of visual encoders to image transformations and corruptions, particularly in cases where such alterations are not seen during training. When this occurs, they introduce a form of distribution shift at test time, often leading to performance degradation. The primary focus has been on severe corruptions that, when applied aggressively, distort useful signals necessary for accurate semantic predictions.\n  We take a different perspective by analyzing parameters of the image acquisition process and transformations that may be subtle or even imperceptible to the human eye. We find that such parameters are systematically encoded in the learned visual representations and can be easily recovered. More strikingly, their presence can have a profound impact, either positively or negatively, on semantic predictions. This effect depends on whether there is a strong correlation or anti-correlation between semantic labels and these acquisition-based or processing-based labels. Our code and data are available at: https://github.com/ryan-caesar-ramos/visual-encoder-traces", "link": "http://arxiv.org/abs/2508.10637v2", "date": "2026-04-01", "relevancy": 2.2821, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5772}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5772}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5371}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Processing%20and%20acquisition%20traces%20in%20visual%20encoders%3A%20What%20does%20CLIP%20know%20about%20your%20camera%3F&body=Title%3A%20Processing%20and%20acquisition%20traces%20in%20visual%20encoders%3A%20What%20does%20CLIP%20know%20about%20your%20camera%3F%0AAuthor%3A%20Ryan%20Ramos%20and%20Vladan%20Stojni%C4%87%20and%20Giorgos%20Kordopatis-Zilos%20and%20Yuta%20Nakashima%20and%20Giorgos%20Tolias%20and%20Noa%20Garcia%0AAbstract%3A%20Prior%20work%20has%20analyzed%20the%20robustness%20of%20visual%20encoders%20to%20image%20transformations%20and%20corruptions%2C%20particularly%20in%20cases%20where%20such%20alterations%20are%20not%20seen%20during%20training.%20When%20this%20occurs%2C%20they%20introduce%20a%20form%20of%20distribution%20shift%20at%20test%20time%2C%20often%20leading%20to%20performance%20degradation.%20The%20primary%20focus%20has%20been%20on%20severe%20corruptions%20that%2C%20when%20applied%20aggressively%2C%20distort%20useful%20signals%20necessary%20for%20accurate%20semantic%20predictions.%0A%20%20We%20take%20a%20different%20perspective%20by%20analyzing%20parameters%20of%20the%20image%20acquisition%20process%20and%20transformations%20that%20may%20be%20subtle%20or%20even%20imperceptible%20to%20the%20human%20eye.%20We%20find%20that%20such%20parameters%20are%20systematically%20encoded%20in%20the%20learned%20visual%20representations%20and%20can%20be%20easily%20recovered.%20More%20strikingly%2C%20their%20presence%20can%20have%20a%20profound%20impact%2C%20either%20positively%20or%20negatively%2C%20on%20semantic%20predictions.%20This%20effect%20depends%20on%20whether%20there%20is%20a%20strong%20correlation%20or%20anti-correlation%20between%20semantic%20labels%20and%20these%20acquisition-based%20or%20processing-based%20labels.%20Our%20code%20and%20data%20are%20available%20at%3A%20https%3A//github.com/ryan-caesar-ramos/visual-encoder-traces%0ALink%3A%20http%3A//arxiv.org/abs/2508.10637v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9s d%2520these%2520acquisition-based%2520or%2520processing-based%2520labels.%2520Our%2520code%2520and%2520data%2520are%2520available%2520at%253A%2520https%253A//github.com/ryan-caesar-ramos/visual-encoder-traces%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.10637v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Processing%20and%20acquisition%20traces%20in%20visual%20encoders%3A%20What%20does%20CLIP%20know%20about%20your%20camera%3F&entry.906535625=Ryan%20Ramos%20and%20Vladan%20Stojni%C4%87%20and%20Giorgos%20Kordopatis-Zilos%20and%20Yuta%20Nakashima%20and%20Giorgos%20Tolias%20and%20Noa%20Garcia&entry.1292438233=Prior%20work%20has%20analyzed%20the%20robustness%20of%20visual%20encoders%20to%20image%20transformations%20and%20corruptions%2C%20particularly%20in%20cases%20where%20such%20alterations%20are%20not%20seen%20during%20training.%20When%20this%20occurs%2C%20they%20introduce%20a%20form%20of%20distribution%20shift%20at%20test%20time%2C%20often%20leading%20to%20performance%20degradation.%20The%20primary%20focus%20has%20been%20on%20severe%20corruptions%20that%2C%20when%20applied%20aggressively%2C%20distort%20useful%20signals%20necessary%20for%20accurate%20semantic%20predictions.%0A%20%20We%20take%20a%20different%20perspective%20by%20analyzing%20parameters%20of%20the%20image%20acquisition%20process%20and%20transformations%20that%20may%20be%20subtle%20or%20even%20imperceptible%20to%20the%20human%20eye.%20We%20find%20that%20such%20parameters%20are%20systematically%20encoded%20in%20the%20learned%20visual%20representations%20and%20can%20be%20easily%20recovered.%20More%20strikingly%2C%20their%20presence%20can%20have%20a%20profound%20impact%2C%20either%20positively%20or%20negatively%2C%20on%20semantic%20predictions.%20This%20effect%20depends%20on%20whether%20there%20is%20a%20strong%20correlation%20or%20anti-correlation%20between%20semantic%20labels%20and%20these%20acquisition-based%20or%20processing-based%20labels.%20Our%20code%20and%20data%20are%20available%20at%3A%20https%3A//github.com/ryan-caesar-ramos/visual-encoder-traces&entry.1838667208=http%3A//arxiv.org/abs/2508.10637v2&entry.124074799=Read"},
{"title": "Le MuMo JEPA: Multi-Modal Self-Supervised Representation Learning with Learnable Fusion Tokens", "author": "Ciem Cornelissen and Sam Leroux and Pieter Simoens", "abstract": "Self-supervised learning has emerged as a powerful paradigm for learning visual representations without manual annotations, yet most methods still operate on a single modality and therefore miss the complementary structure available from heterogeneous sensors. We present Le MuMo JEPA, a self-supervised framework that learns unified representations from RGB images and aligned companion modalities. In our driving experiments, the second modality is camera-aligned LiDAR depth; we also evaluate RGB-thermal training and transfer on the Teledyne FLIR ADAS benchmark. Our approach extends LeJEPA to the multi-modal setting by learning fusion tokens that act as a latent bottleneck between modality-specific patch stems inside a shared transformer. Our default model employs a pruned fusion strategy: after an initial cross-modal attention layer, modality-specific tokens are dropped, forcing cross-modal information into the shared fusion-token grid as an efficient latent bottleneck before Sketched Isotropic Gaussian Regularization (SIGReg) is applied to the joint multimodal CLS embedding. On Waymo, Le MuMo JEPA gives the strongest performance-efficiency trade-off on downstream patch probes among the from-scratch multimodal baselines, improving CenterNet detection and dense depth while remaining competitive on segmentation. Under from-scratch training on nuScenes, Le MuMo JEPA remains the strongest model, and it also gives the best FLIR results, especially after Waymo-initialized fine-tuning. It also retains the best overall accuracy-efficiency balance in our study at substantially lower compute, memory, and estimated training time.", "link": "http://arxiv.org/abs/2603.24327v2", "date": "2026-04-01", "relevancy": 2.2814, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5997}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5835}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5358}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Le%20MuMo%20JEPA%3A%20Multi-Modal%20Self-Supervised%20Representation%20Learning%20with%20Learnable%20Fusion%20Tokens&body=Title%3A%20Le%20MuMo%20JEPA%3A%20Multi-Modal%20Self-Supervised%20Representation%20Learning%20with%20Learnable%20Fusion%20Tokens%0AAuthor%3A%20Ciem%20Cornelissen%20and%20Sam%20Leroux%20and%20Pieter%20Simoens%0AAbstract%3A%20Self-supervised%20learning%20has%20emerged%20as%20a%20powerful%20paradigm%20for%20learning%20visual%20representations%20without%20manual%20annotations%2C%20yet%20most%20methods%20still%20operate%20on%20a%20single%20modality%20and%20therefore%20miss%20the%20complementary%20structure%20available%20from%20heterogeneous%20sensors.%20We%20present%20Le%20MuMo%20JEPA%2C%20a%20self-supervised%20framework%20that%20learns%20unified%20representations%20from%20RGB%20images%20and%20aligned%20companion%20modalities.%20In%20our%20driving%20experiments%2C%20the%20second%20modality%20is%20camera-aligned%20LiDAR%20depth%3B%20we%20also%20evaluate%20RGB-thermal%20training%20and%20transfer%20on%20the%20Teledyne%20FLIR%20ADAS%20benchmark.%20Our%20approach%20extends%20LeJEPA%20to%20the%20multi-modal%20setting%20by%20learning%20fusion%20tokens%20that%20act%20as%20a%20latent%20bottleneck%20between%20modality-specific%20patch%20stems%20inside%20a%20shared%20transformer.%20Our%20default%20model%20employs%20a%20pruned%20fusion%20strategy%3A%20after%20an%20initial%20cross-modal%20attention%20layer%2C%20modality-specific%20tokens%20are%20dropped%2C%20forcing%20cross-modal%20information%20into%20the%20shared%20fusion-token%20grid%20as%20an%20efficient%20latent%20bottleneck%20before%20Sketched%20Isotropic%20Gaussian%20Regularization%20%28SIGReg%29%20is%20applied%20to%20the%20joint%20multimodal%20CLS%20embedding.%20On%20Waymo%2C%20Le%20MuMo%20JEPA%20gives%20the%20strongest%20performance-efficiency%20trade-off%20on%20downstream%20patch%20probes%20among%20the%20from-scratch%20multimodal%20baselines%2C%20improving%20CenterNet%20detection%20and%20dense%20depth%20while%20remaining%20competitive%20on%20segmentation.%20Under%20from-scratch%20training%20on%20nuScenes%2C%20Le%20MuMo%20JEPA%20remains%20the%20strongest%20model%2C%20and%20it%20also%20gives%20the%20best%20FLIR%20results%2C%20especially%20after%20Waymo-initialized%20fine-tuning.%20It%20also%20retains%20the%20best%20overall%20accuracy-efficiency%20balance%20in%20our%20study%20at%20substantially%20lower%20compute%2C%20memory%2C%20and%20estimated%20training%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24327v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLe%2520MuMo%2520JEPA%253A%2520Multi-Modal%2520Self-Supervised%2520Representation%2520Learning%2520with%2520Learnable%2520Fusion%2520Tokens%26entry.906535625%3DCiem%2520Cornelissen%2520and%2520Sam%2520Leroux%2520and%2520Pieter%2520Simoens%26entry.1292438233%3DSelf-supervised%2520learning%2520has%2520emerged%2520as%2520a%2520powerful%2520paradigm%2520for%2520learning%2520visual%2520representations%2520without%2520manual%2520annotations%252C%2520yet%2520most%2520methods%2520still%2520operate%2520on%2520a%2520single%2520modality%2520and%2520therefore%2520miss%2520the%2520complementary%2520structure%2520available%2520from%2520heterogeneous%2520sensors.%2520We%2520present%2520Le%2520MuMo%2520JEPA%252C%2520a%2520self-supervised%2520framework%2520that%2520learns%2520unified%2520representations%2520from%2520RGB%2520images%2520and%2520aligned%2520companion%2520modaliti {"title": "TTA-Vid: Generalized Test-Time Adaptation for Video Reasoning", "author": "Soumya Shamarao Jahagirdar and Edson Araujo and Anna Kukleva and M. Jehanzeb Mirza and Saurabhchand Bhati and Samuel Thomas and Brian Kingsbury and Rogerio Feris and James R. Glass and Hilde Kuehne", "abstract": "Recent video reasoning models have shown strong results on temporal and multimodal understanding, yet they depend on large-scale supervised data and multi-stage training pipelines, making them costly to train and difficult to adapt to new domains. In this work, we leverage the paradigm of Test-Time Reinforcement Learning on video-language data to allow for adapting a pretrained model to incoming video samples at test-time without explicit labels. The proposed test-time adaptation for video approach (TTA-Vid) combines two components that work simultaneously: (1) a test-time adaptation that performs step-by-step reasoning at inference time on multiple frame subsets. We then use a batch-aware frequency-based reward computed across different frame subsets as pseudo ground truth to update the model. It shows that the resulting model trained on a single batch or even a single sample from a dataset, is able to generalize at test-time to the whole dataset and even across datasets. Because the adaptation occurs entirely at test time, our method requires no ground-truth annotations or dedicated training splits. Additionally, we propose a multi-armed bandit strategy for adaptive frame selection that learns to prioritize informative frames, guided by the same reward formulation. Our evaluation shows that TTA-Vid yields consistent improvements across various video reasoning tasks and is able to outperform current state-of-the-art methods trained on large-scale data. This highlights the potential of test-time reinforcement learning for temporal multimodal understanding.", "link": "http://arxiv.org/abs/2604.00696v1", "date": "2026-04-01", "relevancy": 2.275, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5856}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5687}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5621}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TTA-Vid%3A%20Generalized%20Test-Time%20Adaptation%20for%20Video%20Reasoning&body=Title%3A%20TTA-Vid%3A%20Generalized%20Test-Time%20Adaptation%20for%20Video%20Reasoning%0AAuthor%3A%20Soumya%20Shamarao%20Jahagirdar%20and%20Edson%20Araujo%20and%20Anna%20Kukleva%20and%20M.%20Jehanzeb%20Mirza%20and%20Saurabhchand%20Bhati%20and%20Samuel%20Thomas%20and%20Brian%20Kingsbury%20and%20Rogerio%20Feris%20and%20James%20R.%20Glass%20and%20Hilde%20Kuehne%0AAbstract%3A%20Recent%20video%20reasoning%20models%20have%20shown%20strong%20results%20on%20temporal%20and%20multimodal%20understanding%2C%20yet%20they%20depend%20on%20large-scale%20supervised%20data%20and%20multi-stage%20training%20pipelines%2C%20making%20them%20costly%20to%20train%20and%20difficult%20to%20adapt%20to%20new%20domains.%20In%20this%20work%2C%20we%20leverage%20the%20paradigm%20of%20Test-Time%20Reinforcement%20Learning%20on%20video-language%20data%20to%20allow%20for%20adapting%20a%20pretrained%20model%20to%20incoming%20video%20samples%20at%20test-time%20without%20explicit%20labels.%20The%20proposed%20test-time%20adaptation%20for%20video%20approach%20%28TTA-Vid%29%20combines%20two%20components%20that%20work%20simultaneously%3A%20%281%29%20a%20test-time%20adaptation%20that%20performs%20step-by-step%20reasoning%20at%20inference%20time%20on%20multiple%20frame%20subsets.%20We%20then%20use%20a%20batch-aware%20frequency-based%20reward%20computed%20across%20different%20frame%20subsets%20as%20pseudo%20ground%20truth%20to%20update%20the%20model.%20It%20shows%20that%20the%20resulting%20model%20trained%20on%20a%20single%20batch%20or%20even%20a%20single%20sample%20from%20a%20dataset%2C%20is%20able%20to%20generalize%20at%20test-time%20to%20the%20whole%20dataset%20and%20even%20across%20datasets.%20Because%20the%20adaptation%20occurs%20entirely%20at%20test%20time%2C%20our%20method%20requires%20no%20ground-truth%20annotations%20or%20dedicated%20training%20splits.%20Additionally%2C%20we%20propose%20a%20multi-armed%20bandit%20strategy%20for%20adaptive%20frame%20selection%20that%20learns%20to%20prioritize%20informative%20frames%2C%20guided%20by%20the%20same%20reward%20formulation.%20Our%20evaluation%20shows%20that%20TTA-Vid%20yields%20consistent%20improvements%20across%20various%20video%20reasoning%20tasks%20and%20is%20able%20to%20outperform%20current%20state-of-the-art%20methods%20trained%20on%20large-scale%20data.%20This%20highlights%20the%20potential%20of%20test-time%20reinforcement%20learning%20for%20temporal%20multimodal%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00696v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTTA-Vid%253A%2520Generalized%2520Test-Time%2520Adaptation%2520for%2520Video%2520Reasoning%26entry.906535625%3DSoumya%2520Shamarao%2520Jahagirdar%2520and%2520Edson%2520Araujo%2520and%2520Anna%2520Kukleva%2520and%2520M.%2520Jehanzeb%2520Mirza%2520and%2520Saurabhchand%2520Bhati%2520and%2520Samuel%2520Thomas%2520and%2520Brian%2520Kingsbury%2520and%2520Rogerio%2520Feris%2520and%2520James%2520R.%2520Glass%2520and%2520Hilde%2520Kuehne%26entry.1292438233%3DRecent%2520video%2520reasoning%2520models%2520have%2520shown%2520strong%2520results%2520on%2520temporal%2520and%2520multimodal%2520understanding%252C%2520yet%2520they%2520depend%2520on%2520large-scale%2520supervised%2520data%2520and%2520multi-stage%2520training%2520pipelines%252C%2520making%2520them%2520costly f-the-art%2520methods%2520trained%2520on%2520large-scale%2520data.%2520This%2520highlights%2520the%2520potential%2520of%2520test-time%2520reinforcement%2520learning%2520for%2520temporal%2520multimodal%2520understanding.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00696v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TTA-Vid%3A%20Generalized%20Test-Time%20Adaptation%20for%20Video%20Reasoning&entry.906535625=Soumya%20Shamarao%20Jahagirdar%20and%20Edson%20Araujo%20and%20Anna%20Kukleva%20and%20M.%20Jehanzeb%20Mirza%20and%20Saurabhchand%20Bhati%20and%20Samuel%20Thomas%20and%20Brian%20Kingsbury%20and%20Rogerio%20Feris%20and%20James%20R.%20Glass%20and%20Hilde%20Kuehne&entry.1292438233=Recent%20video%20reasoning%20models%20have%20shown%20strong%20results%20on%20temporal%20and%20multimodal%20understanding%2C%20yet%20they%20depend%20on%20large-scale%20supervised%20data%20and%20multi-stage%20training%20pipelines%2C%20making%20them%20costly%20to%20train%20and%20difficult%20to%20adapt%20to%20new%20domains.%20In%20this%20work%2C%20we%20leverage%20the%20paradigm%20of%20Test-Time%20Reinforcement%20Learning%20on%20video-language%20data%20to%20allow%20for%20adapting%20a%20pretrained%20model%20to%20incoming%20video%20samples%20at%20test-time%20without%20explicit%20labels.%20The%20proposed%20test-time%20adaptation%20for%20video%20approach%20%28TTA-Vid%29%20combines%20two%20components%20that%20work%20simultaneously%3A%20%281%29%20a%20test-time%20adaptation%20that%20performs%20step-by-step%20reasoning%20at%20inference%20time%20on%20multiple%20frame%20subsets.%20We%20then%20use%20a%20batch-aware%20frequency-based%20reward%20computed%20across%20different%20frame%20subsets%20as%20pseudo%20ground%20truth%20to%20update%20the%20model.%20It%20shows%20that%20the%20resulting%20model%20trained%20on%20a%20single%20batch%20or%20even%20a%20single%20sample%20from%20a%20dataset%2C%20is%20ab {"title": "Accurate and Scalable Matrix Mechanisms via Divide and Conquer", "author": "Guanlin He and Yingtai Xiao and Jiamu Bai and Xin Gu and Zeyu Ding and Wenpeng Yin and Daniel Kifer", "abstract": "Matrix mechanisms are often used to provide unbiased differentially private query answers when publishing statistics or creating synthetic data. Recent work has developed matrix mechanisms, such as ResidualPlanner and Weighted Fourier Factorizations, that scale to high dimensional datasets while providing optimality guarantees for workloads such as marginals and circular product queries. They operate by adding noise to a linearly independent set of queries that can compactly represent the desired workloads.\n  In this paper, we present QuerySmasher, an alternative scalable approach based on a divide-and-conquer strategy. Given a workload that can be answered from various data marginals, QuerySmasher splits each query into sub-queries and re-assembles the pieces into mutually orthogonal sub-workloads. These sub-workloads represent small, low-dimensional problems that can be independently and optimally answered by existing low-dimensional matrix mechanisms. QuerySmasher then stitches these solutions together to answer queries in the original workload.\n  We show that QuerySmasher subsumes prior work, like ResidualPlanner (RP), ResidualPlanner+ (RP+), and Weighted Fourier Factorizations (WFF). We prove that it can dominate those approaches, under sum squared error, for all workloads. We also experimentally demonstrate the scalability and accuracy of QuerySmasher.", "link": "http://arxiv.org/abs/2604.00868v1", "date": "2026-04-01", "relevancy": 2.2196, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4573}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4564}, {" {"title": "TeFlow: Enabling Multi-frame Supervision for Self-Supervised Feed-forward Scene Flow Estimation", "author": "Qingwen Zhang and Chenhan Jiang and Xiaomeng Zhu and Yunqi Miao and Yushan Zhang and Olov Andersson and Patric Jensfelt", "abstract": "Self-supervised feed-forward methods for scene flow estimation offer real-time efficiency, but their supervision from two-frame point correspondences is unreliable and often breaks down under occlusions. Multi-frame supervision has the potential to provide more stable guidance by incorporating motion cues from past frames, yet naive extensions of two-frame objectives are ineffective because point correspondences vary abruptly across frames, producing inconsistent signals. In the paper, we present TeFlow, enabling multi-frame supervision for feed-forward models by mining temporally consistent supervision. TeFlow introduces a temporal ensembling strategy that forms reliable supervisory signals by aggregating the most temporally consistent motion cues from a candidate pool built across multiple frames. Extensive evaluations demonstrate that TeFlow establishes a new state-of-the-art for self-supervised feed-forward methods, achieving performance gains of up to 33\\% on the challenging Argoverse 2 and nuScenes datasets. Our method performs on par with leading optimization-based methods, yet speeds up 150 times. The code is open-sourced at https://github.com/Kin-Zhang/TeFlow along with trained model weights.", "link": "http://arxiv.org/abs/2602.19053v2", "date": "2026-04-01", "relevancy": 1.7137, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5863}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5727}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5525}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TeFlow%3A%20Enabling%20Multi-frame%20Supervision%20for%20Self-Supervised%20Feed-forward%20Scene%20Flow%20Estimation&body=Title%3A%20TeFlow%3A%20Enabling%20Multi-frame%20Supervision%20for%20Self-Supervised%20Feed-forward%20Scene%20Flow%20Estimation%0AAuthor%3A%20Qingwen%20Zhang%20and%20Chenhan%20Jiang%20and%20Xiaomeng%20Zhu%20and%20Yunqi%20Miao%20and%20Yushan%20Zhang%20and%20Olov%20Andersson%20and%20Patric%20Jensfelt%0AAbstract%3A%20Self-supervised%20feed-forward%20methods%20for%20scene%20flow%20estimation%20offer%20real-time%20efficiency%2C%20but%20their%20supervision%20from%20two-frame%20point%20correspondences%20is%20unreliable%20and%20often%20breaks%20down%20under%20occlusions.%20Multi-frame%20supervision%20has%20the%20potential%20to%20provide%20more%20stable%20guidance%20by%20incorporating%20motion%20cues%20from%20past%20frames%2C%20yet%20naive%20extensions%20of%20two-frame%20objectives%20are%20ineffective%20because%20point%20correspondences%20vary%20abruptly%20across%20frames%2C%20producing%20inconsistent%20signals.%20In%20the%20paper%2C%20we%20present%20TeFlow%2C%20enabling%20multi-frame%20supervision%20for%20feed-forward%20models%20by%20mining%20temporally%20consistent%20supervision.%20TeFlow%20introduces%20a%20temporal%20ensembling%20strategy%20that%20forms%20reliable%20supervisory%20signals%20by%20aggregating%20the%20most%20temporally%20consistent%20motion%20cues%20from%20a%20candidate%20pool%20built%20across%20multiple%20frames.%20Extensive%20evaluations%20demonstrate%20that%20TeFlow%20establishes%20a%20new%20state-of-the-art%20for%20self-supervised%20feed-forward%20methods%2C%20achieving%20performance%20gains%20of%20up%20to%2033%5C%25%20on%20the%20challenging%20Argoverse%202%20and%20nuScenes%20datasets.%20Our%20method%20performs%20on%20par%20with%20leading%20optimization-based%20methods%2C%20yet%20speeds%20up%20150%20times.%20The%20code%20is%20open-sourced%20at%20https%3A//github.com/Kin-Zhang/TeFlow%20along%20with%20trained%20model%20weights.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19053v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTeFlow%253A%2520Enabling%2520Multi-frame%2520Supervision%2520for%2520Self-Supervised%2520Feed-forward%2520Scene%2520Flow%2520Estimation%26entry.906535625%3DQingwen%2520Zhang%2520and%2520Chenhan%2520Jiang%2520and%2520Xiaomeng%2520Zhu%2520and%2520Yunqi%2520Miao%2520and%2520Yushan%2520Zhang%2520and%2520Olov%2520Andersson%2520and%2520Patric%2520Jensfelt%26entry.1292438233%3DSelf-supervised%2520feed-forward%2520methods%2520for%2520scene%2520flow%2520estimation%2520offer%2520real-time%2520efficiency%252C%2520but%2520their%2520supervision%2520from%2520two-frame%2520point%2520correspondences%2520is%2520unreliable%2520and%2520often%2520breaks%2520down%2520under%2520occlusions.%2520Multi-frame%2520supervision%2520has%2520the%2520potential%2520to%2520provide%2520more%2520stable%2520guidance%2520by%2520incorporating%2520motion%2520cues%2520from%2520past%2520frames%252C%2520yet%2520naive%2520extensions%2520of%2520two-frame%2520objectives%2520are%2520ineffective%2520because%2520point%2520correspondences%2520vary%2520abruptly%2520across%2520frames%252C%2520producing%2520inconsistent%2520signals.%2520In%2520the%2520paper%252C%2520we%2520present%2520TeFlow%252C%2520enabling%2520multi-frame%2520supervision%2520for%2520feed-forward%2520models%2520by%2520mining%2520temporally%2520consistent%2520supervision.%2520TeFlow%2520introduces%2520a%2520temporal%2520ensembling%2520strategy%2520that%2520forms%2520reliable%2520supervisory%2520signals%2520by%2520aggregating%2520the%2520most%2520temporally%2520consistent%2520motion%2520cues%2520from%2520a%2520candidate%2520pool%2520built%2520across%2520multiple%2520frames.%2520Extensive%2520evaluations%2520demonstrate%2520that%2520TeFlow%2520establishes%25 {"title": "A CEFR-Inspired Classification Framework with Fuzzy C-Means To Automate Assessment of Programming Skills in Scratch", "author": "Ricardo Hidalgo-Arag\u00f3n and Jes\u00fas M. Gonz\u00e1lez-Barahona and Gregorio Robles", "abstract": "Context: Schools, training platforms, and technology firms increasingly need to assess programming proficiency at scale with transparent, reproducible methods that support personalized learning pathways. Objective: This study introduces a pedagogical framework for Scratch project assessment, aligned with the Common European Framework of Reference (CEFR), providing universal competency levels for students and teachers alongside actionable insights for curriculum design. Method: We apply Fuzzy C-Means clustering to 2008246 Scratch projects evaluated via Dr.Scratch, implementing an ordinal criterion to map clusters to CEFR levels (A1-C2), and introducing enhanced classification metrics that identify transitional learners, enable continuous progress tracking, and quantify classification certainty to balance automated feedback with instructor review. Impact: The framework enables diagnosis of systemic curriculum gaps-notably a \"B2 bottleneck\" where only 13.3% of learners reside due to the cognitive load of integrating Logic Synchronization, and Data Representation--while providing certainty--based triggers for human intervention.", "link": "http://arxiv.org/abs/2604.00730v1", "date": "2026-04-01", "relevancy": 1.7326, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4428}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4402}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexib eview.%20Impact%3A%20The%20framework%20enables%20diagnosis%20of%20systemic%20curriculum%20gaps-notably%20a%20%22B2%20bottleneck%22%20where%20only%2013.3%25%20of%20learners%20reside%20due%20to%20the%20cognitive%20load%20of%20integrating%20Logic%20Synchronization%2C%20and%20Data%20Representation--while%20providing%20certainty--based%20triggers%20for%20human%20intervention.&entry.1838667208=http%3A//arxiv.org/abs/2604.00730v1&entry.124074799=Read"},
{"title": "OrgAgent: Organize Your Multi-Agent System like a Company", "author": "Yiru Wang and Xinyue Shen and Yaohui Han and Michael Backes and Pin-Yu Chen and Tsung-Yi Ho", "abstract": "While large language model-based multi-agent systems have shown strong potential for complex reasoning, how to effectively organize multiple agents remains an open question. In this paper, we introduce OrgAgent, a company-style hierarchical multi-agent framework that separates collaboration into governance, execution, and compliance layers. OrgAgent decomposes multi-agent reasoning into three layers: a governance layer for planning and resource allocation, an execution layer for task solving and review, and a compliance layer for final answer control. By evaluating the framework across reasoning tasks, LLMs, execution modes, and execution policies, we find that multi-agent systems organized in a company-style hierarchy generally outperform other organizational structures. Besides, hierarchical coordination also reduces token consumption relative to flat collaboration in most settings. For example, for GPT-OSS-120B, the hierarchical setting improves performance over flat multi-agent system by 102.73% while reducing token usage by 74.52% on SQuAD 2.0. Further analysis shows that hierarchy helps most when tasks benefit from stable skill assignment, controlled information flow, and layered verification. Overall, our findings highlight organizational structure as an important factor in multi-agent reasoning, shaping not only effectiveness and cost, but also coordination behavior.", "link": "http://arxiv.org/abs/2604.01020v1", "date": "2026-04-01", "relevancy": 1.5339, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5218}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5214}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4749}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OrgAgent%3A%20Organize%20Your%20Multi-Agent%20System%20like%20a%20Company&body=Title%3A%20OrgAgent%3A%20Organize%20Your%20Multi-Agent%20System%20like%20a%20Company%0AAuthor%3A%20Yiru%20Wang%20and%20Xinyue%20Shen%20and%20Yaohui%20Han%20and%20Michael%20Backes%20and%20Pin-Yu%20Chen%20and%20Tsung-Yi%20Ho%0AAbstract%3A%20While%20large%20language%20model-based%20multi-agent%20systems%20have%20shown%20strong%20potential%20for%20complex%20reasoning%2C%20how%20to%20effectively%20organize%20multiple%20agents%20remains%20an%20open%20question.%20In%20this%20paper%2C%20we%20introduce%20OrgAgent%2C%20a%20company-style%20hierarchical%20multi-agent%20framework%20that%20separates%20collaboration%20into%20governance%2C%20execution%2C%20and%20compliance%20layers.%20OrgAgent%20decomposes%20multi-agent%20reasoning%20into%20three%20layers%3A%20a%20governance%20layer%20for%20planning%20and%20resource%20allocation%2C%20an%20execution%20layer%20for%20task%20solving%20and%20review%2C%20and%20a%20compliance%20layer%20for%20final%20answer%20control.%20By%20evaluating%20the%20framework%20across%20reasoning%20tasks%2C%20LLMs%2C%20execution%20modes%2C%20and%20execution%20policies%2C%20we%20find%20that%20multi-agent%20systems%20organized%20in%20a%20company-style%20hierarchy%20generally%20outperform%20other%20organizational%20structures.%20Besides%2C%20hierarchical%20coordination%20also%20reduces%20token%20consumption%20relative%20to%20flat%20collaboration%20in%20most%20settings.%20For%20example%2C%20for%20GPT-OSS-120B%2C%20the%20hierarchical%20setting%20improves%20performance%20over%20flat%20multi-agent%20system%20by%20102.73%25%20while%20reducing%20token%20usage%20by%2074.52%25%20on%20SQuAD%202.0.%20Further%20analysis%20shows%20that%20hierarchy%20helps%20most%20when%20tasks%20benefit%20from%20stable%20skill%20assignment%2C%20controlled%20information%20flow%2C%20and%20layered%20verification.%20Overall%2C%20our%20findings%20highlight%20organizational%20structure%20as%20an%20important%20factor%20in%20multi-agent%20reasoning%2C%20shaping%20not%20only%20effectiveness%20and%20cost%2C%20but%20also%20coordination%20behavior.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01020v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOrgAgent%253A%2520Organize%2520Your%2520Multi-Agent%2520System%2520like%2520a%2520Company%26entry.906535625%3DYiru%2520Wang%2520and%2520Xinyue%2520Shen%2520and%2520Yaohui%2520Han%2520and%2520Michael%2520Backes%2520and%2520Pin-Yu%2520Chen%2520and%2520Tsung-Yi%2520Ho%26entry.1292438233%3DWhile%2520large%2520language%2520model-based%2520multi-agent%2520systems%2520have%2520shown%2520strong%2520potential%2520for%2520complex%2520reasoning%252C%2520how%2520to%2520effectively%2520organize%2520multiple%2520agents%2520remains%2520an%2520open%2520question.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520OrgAgent%252C%2520a%2520company-style%2520hierarchical%2520multi-agent%2520framework%2520that%2520separates%2520collaboration%2520into%2520governance%252C%2520execution%252C%2520and%2520compliance%2520layers.%2520OrgAgent%2520decomposes%2520multi-agent%2520reasoning%2520into%2520three%2520layers%253A%2520a%2520governance%2520layer%2520for%2520planning%2520and%2520resource%2520allocation%252C%2520an%2520execution%2520layer%2520for%2520task%2520solving%2520and%2520review%252C%2520and%2520a%2520compliance%2520layer%2520for%2520final%2520answer%2520control.%2520By%2520evaluating%2520the%2520framework%2520across%2520reasoning%2520tasks%252C%2520LLMs%252C%2520execution%2520modes%252C%2520and%2520execution%2520policies%252C%2520we%2520find%2520that%2520multi-agent%2520systems%2520organized%2520in%2520a%2520company- {"title": "Stein Variational Uncertainty-Adaptive Model Predictive Control", "author": "Hrishikesh Sathyanarayan and Ian Abraham", "abstract": "We propose a Stein variational distributionally robust controller for nonlinear dynamical systems with latent parametric uncertainty. The method is an alternative to conservative worst-case ambiguity-set optimization with a deterministic particle-based approximation of a task-dependent uncertainty distribution, enabling the controller to concentrate on parameter sensitivities that most strongly affect closed-loop performance. Our method yields a controller that is robust to latent parameter uncertainty by coupling optimal control with Stein variational inference, and avoiding restrictive parametric assumptions on the uncertainty model while preserving computational parallelism. In contrast to classical DRO, which can sacrifice nominal performance through worst-case design, we find our approach achieves robustness by shaping the control law around relevant uncertainty that are most critical to the task objective. The proposed framework therefore reconciles robust control and variational inference in a single decision-theoretic formulation for broad classes of control systems with parameter uncertainty. We demonstrate our approach on representative control problems that empirically illustrate improved performance-robustness tradeoffs over nominal, ensemble, and classical distributionally robust baselines.", "link": "http://arxiv.org/abs/2604.01034v1", "date": "2026-04-01", "relevancy": 2.0565, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5395}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5285}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion {"title": "View-oriented Conversation Compiler for Agent Trace Analysis", "author": "Lvmin Zhang and Maneesh Agrawala", "abstract": "Agent traces carry increasing analytical value in agentic systems and context engineering, yet most prior work treats conversation format as a trivial implementation detail. Modern agent conversations, however, contain deeply structured content, including nested tool calls and results, chain-of-thought reasoning blocks, sub-agent invocations, context-window compaction boundaries, and harness-injected system directives, whose complexity far exceeds that of simple user-assistant exchanges. Feeding such traces to a reflector or other analytical mechanism in plain text, JSON, YAML, or via grep can materially degrade analysis quality. This paper presents VCC (View-oriented Conversation Compiler), a compiler (lex, parse, IR, lower, emit) that transforms raw agent JSONL logs into a family of structured views: a full view (lossless transcript serving as the canonical line-number coordinate system), a user-interface (UI) view (reconstructing the interaction as the user actually perceived it), and an adaptive view (a structure-preserving projection governed by a relevance predicate). In a context-engineering experiment on AppWorld, replacing only the reflector's input format, from raw JSONL to VCC-compiled views, leads to higher pass rates across all three model configurations tested, while cutting reflector token consumption by half to two-thirds and producing more concise learned memory. These results suggest that message format functions as infrastructure for context engineering, not as an incidental implementation choice.", "link": "http://arxiv.org/abs/2603.29678v2", "date": "2026-04-01", "relevancy": 1.7776, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.445}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.445}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4416}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20View-oriented%20Conversation%20Compiler%20for%20Agent%20Trace%20Analysis&body=Title%3A%20View-oriented%20Conversation%20Compiler%20for%20Agent%20Trace%20Analysis%0AAuthor%3A%20Lvmin%20Zhang%20and%20Maneesh%20Agrawala%0AAbstract%3A%20Agent%20traces%20carry%20increasing%20analytical%20value%20in%20agentic%20systems%20and%20context%20engineering%2C%20yet%20most%20prior%20work%20treats%20conversation%20format%20as%20a%20trivial%20implementation%20detail.%20Modern%20agent%20conversations%2C%20however%2C%20contain%20deeply%20structured%20content%2C%20including%20nested%20tool%20calls%20and%20results%2C%20chain-of-thought%20reasoning%20blocks%2C%20sub-agent%20invocations%2C%20context-window%20compaction%20boundaries%2C%20and%20harness-injected%20system%20directives%2C%20whose%20complexity%20far%20exceeds%20that%20of%20simple%20user-assistant%20exchanges.%20Feeding%20such%20traces%20to%20a%20reflector%20or%20other%20analytical%20mechanism%20in%20plain%20text%2C%20JSON%2C%20YAML%2C%20or%20via%20grep%20can%20materially%20degrade%20analysis%20quality.%20This%20paper%20presents%20VCC%20%28View-oriented%20Conversation%20Compiler%29%2C%20a%20compiler%20%28lex%2C%20parse%2C%20IR%2C%20lower%2C%20emit%29%20that%20transforms%20raw%20agent%20JSONL%20logs%20into%20a%20family%20of%20structured%20views%3A%20a%20full%20view%20%28lossless%20transcript%20serving%20as%20the%20canonical%20line-number%20coordinate%20system%29%2C%20a%20user-interface%20%28UI%29%20view%20%28reconstructing%20the%20interaction%20as%20the%20user%20actually%20perceived%20it%29%2C%20and%20an%20adaptive%20view%20%28a%20structure-preserving%20projection%20governed%20by%20a%20relevance%20predicate%29.%20In%20a%20context-engineering%20experiment%20on%20AppWorld%2C%20replacing%20only%20the%20reflector%27s%20input%20format%2C%20from%20raw%20JSONL%20to%20VCC-compiled%20views%2C%20leads%20to%20higher%20pass%20rates%20across%20all%20three%20model%20configurations%20tested%2C%20while%20cutting%20reflector%20token%20consumption%20by%20half%20to%20two-thirds%20and%20producing%20more%20concise%20learned%20memory.%20These%20results%20suggest%20that%20message%20format%20functions%20as%20infrastructure%20for%20context%20engineering%2C%20not%20as%20an%20incidental%20implementation%20choice.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29678v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DView-oriented%2520Conversation%2520Compiler%2520for%2520Agent%2520Trace%2520Analysis%26entry.906535625%3DLvmin%2520Zhang%2520and%2520Maneesh%2520Agrawala%26entry.1292438233%3DAgent%2520traces%2520carry%2520increasing%2520analytical%2520value%2520in%2520agentic%2520systems%2520and%2520context%2520engineering%252C%2520yet%2520most%2520prior%2520work%2520treats%2520conversation%2520format%2520as%2520a%2520trivial%2520implementation%2520detail.%2520Modern%2520agent%2520conversations%252C%2520however%252C%2520contain%2520deeply%2520structured%2520content%252C%2520including%2520nested%2520tool%2520calls%2520and%2520results%252C%2520chain-of-thought%2520reasoning%2520blocks%252C%2520sub-agent%2520invocations%252C%2520context-window%2520compaction%2520boundaries%252C%2520and%2520harness-injected%2520system%2520directives%252C%2520whose%2520complexity%2520far%2520exceeds%2520that%2520of%2520simple%2520user-assistant%2520exchanges.%2520Feeding%2520such%2520traces%2520to%2520a%2520reflector%2520or%2520other%2520analytical%2520mechanism%2520in%2520plain%2520text%252C%2520JSON%252C%2520YAML%252C%2520or%2520via%2520grep%2520can%2520materially%2520degrade%2520analysis%2520quality.%2520This%2520paper%2520pr {"title": "SetONet: A Set-Based Operator Network for Solving PDEs with Variable-Input Sampling", "author": "Stepan Tretiakov and Xingjian Li and Krishna Kumar", "abstract": "Most neural-operator surrogates for PDEs inherit from DeepONet-style formulations the requirement that the input function be sampled at a fixed, ordered set of sensors. This assumption limits applicability to problems with variable sensor layouts, missing data, point sources, and sample-based representations of densities. We propose SetONet, which addresses this gap by recasting the operator input as an unordered set of coordinate-value observations and encoding it with permutation-invariant aggregation inside a standard branch-trunk operator network while preserving the DeepONet synthesis mechanism and lightweight end-to-end training. A structured variant, SetONet-Key, aggregates sensor information through learnable query tokens and a position-only key pathway, thereby decoupling sampling geometry from sensor values. The method is assessed on four classical operator-learning benchmarks under fixed layouts, variable layouts, and evaluation-time sensor drop-off, and on four problems with inherently unstructured point-cloud inputs, including heat conduction with multiple point sources, advection-diffusion, phase-screen diffraction, and optimal transport problems. In parameter-matched studies, SetONet-Key achieves lower error than the DeepONet baseline on fixed-sensor benchmarks and remains reliable when layouts vary or sensors are dropped at evaluation. Comparisons across pooling rules show that attention-based aggregation is typically more robust than mean or sum pooling. On the point-cloud problems, SetONet operates directly on the native input representation, without rasterization or multi-stage preprocessing, and outperforms the larger VIDON baseline.", "link": "http://arxiv.org/abs/2505.04738v3", "date": "2026-04-01", "relevancy": 1.9428, "topK": [{"title": "Boosted dynamic neural networks",

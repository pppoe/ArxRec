{"title": "Diff3R: Feed-forward 3D Gaussian Splatting with Uncertainty-aware Differentiable Optimization", "author": "Yueh-Cheng Liu and Jozef Hladk\u00fd and Matthias Nie\u00dfner and Angela Dai", "abstract": "Recent advances in 3D Gaussian Splatting (3DGS) present two main directions: feed-forward models offer fast inference in sparse-view settings, while per-scene optimization yields high-quality renderings but is computationally expensive. To combine the benefits of both, we introduce Diff3R, a novel framework that explicitly bridges feed-forward prediction and test-time optimization. By incorporating a differentiable 3DGS optimization layer directly into the training loop, our network learns to predict an optimal initialization for test-time optimization rather than a conventional zero-shot result. To overcome the computational cost of backpropagating through the optimization steps, we propose computing gradients via the Implicit Function Theorem and a scalable, matrix-free PCG solver tailored for 3DGS optimization. Additionally, we incorporate a data-driven uncertainty model into the optimization process by adaptively controlling how much the parameters are allowed to change during optimization. This approach effectively mitigates overfitting in under-constrained regions and increases robustness against input outliers. Since our proposed optimization layer is model-agnostic, we show that it can be seamlessly integrated into existing feed-forward 3DGS architectures for both pose-given and pose-free methods, providing improvements for test-time optimization.", "link": "http://arxiv.org/abs/2604.01030v1", "date": "2026-04-01", "relevancy": 3.1871, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.645}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0 st%20input%20outliers.%20Since%20our%20proposed%20optimization%20layer%20is%20model-agnostic%2C%20we%20show%20that%20it%20can%20be%20seamlessly%20integrated%20into%20existing%20feed-forward%203DGS%20architectures%20for%20both%20pose-given%20and%20pose-free%20methods%2C%20providing%20improvements%20for%20test-time%20optimization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01030v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiff3R%253A%2520Feed-forward%25203D%2520Gaussian%2520Splatting%2520with%2520Uncertainty-aware%2520Differentiable%2520Optimization%26entry.906535625%3DYueh-Cheng%2520Liu%2520and%2520Jozef%2520Hladk%25C3%25BD%2520and%2520Matthias%2520Nie%25C3%259Fner%2520and%2520Angela%2520Dai%26entry.1292438233%3DRecent%2520advances%2520in%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520present%2520two%2520main%2520directions%253A%2520feed-forward%2520models%2520offer%2520fast%2520inference%2520in%2520sparse-view%2520settings%252C%2520while%2520per-scene%2520optimization%2520yields%2520high-quality%2520renderings%2520but%2520is%2520computationally%2520expensive.%2520To%2520combine%2520the%2520benefits%2520of%2520both%252C%2520we%2520introduce%2520Diff3R%252C%2520a%2520novel%2520framework%2520that%2520explicitly%2520bridges%2520feed-forward%2520prediction%2520and%2520test-time%2520optimization.%2520By%2520incorporating%2520a%2520differentiable%25203DGS%2520optimization%2520layer%2520directly%2520into%2520the%2520training%2520loop%252C%2520our%2520network%2520learns%2520to%2520predict%2520an%2520optimal%2520initialization%2520for%2520test-time%2520optimization%2520rather%2520than%2520a%2520conventional%2520zero-shot%2520result.%2520To%2520overcome%2520the%2520computational%2520cost%2520of%2520backpropagating%2520through%2520the%2520optimization%2520steps%252C%2520we%2520propose%2520computing%2520gradients%2520via%2520the%2520Implicit%2520Function%2520Theorem%2520and%2520a% {"title": "LG-HCC: Local Geometry-Aware Hierarchical Context Compression for 3D Gaussian Splatting", "author": "Xuan Deng and Xiandong Meng and Hengyu Man and Qiang Zhu and Tiange Zhang and Debin Zhao and Xiaopeng Fan", "abstract": "Although 3D Gaussian Splatting (3DGS) enables high-fidelity real-time rendering, its prohibitive storage overhead severely hinders practical deployment. Recent anchor-based 3DGS compression schemes reduce gaussian redundancy through some advanced context models. However, they overlook explicit geometric dependencies, leading to structural degradation and suboptimal ratedistortion performance. In this paper, we propose a Local Geometry-aware Hierarchical Context Compression framework for 3DGS(LG-HCC) that incorporates inter-anchor geometric correlations into anchor pruning and entropy coding for compact representation. Specifically, we introduce an Neighborhood-Aware Anchor Pruning (NAAP) strategy, which evaluates anchor importance via weighted neighborhood feature aggregation and then merges low-contribution anchors into salient neighbors, yielding a compact yet geometry-consistent anchor set. Moreover, we further develop a hierarchical entropy coding scheme, in which coarse-to-fine priors are exploited through a lightweight Geometry-Guided Convolution(GG-Conv) operator to enable spatially adaptive context modeling and rate-distortion optimization. Extensive experiments show that LG-HCC effectively alleviates structural preservation issues,achieving superior geometric integrity and rendering fidelity while reducing storage by up to 30.85x compared to the Scaffold-GS baseline on the Mip-NeRF360 dataset", "link": "http://arxiv.org/abs/2603.28431v3", "date": "2026-04-01", "relevancy": 3.1442, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6379}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6372}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6115}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LG-HCC%3A%20Local%20Geometry-Aware%20Hierarchical%20Context%20Compression%20for%203D%20Gaussian%20Splatting&body=Title%3A%20LG-HCC%3A%20Local%20Geometry-Aware%20Hierarchical%20Context%20Compression%20for%203D%20Gaussian%20Splatting%0AAuthor%3A%20Xuan%20Deng%20and%20Xiandong%20Meng%20and%20Hengyu%20Man%20and%20Qiang%20Zhu%20and%20Tiange%20Zhang%20and%20Debin%20Zhao%20and%20Xiaopeng%20Fan%0AAbstract%3A%20Although%203D%20Gaussian%20Splatting%20%283DGS%29%20enables%20high-fidelity%20real-time%20rendering%2C%20its%20prohibitive%20storage%20overhead%20severely%20hinders%20practical%20deployment.%20Recent%20anchor-based%203DGS%20compression%20schemes%20reduce%20gaussian%20redundancy%20through%20some%20advanced%20context%20models.%20However%2C%20they%20overlook%20explicit%20geometric%20dependencies%2C%20leading%20to%20structural%20degradation%20and%20suboptimal%20ratedistortion%20performance.%20In%20this%20paper%2C%20we%20propose%20a%20Local%20Geometry-aware%20Hierarchical%20Context%20Compression%20framework%20for%203DGS%28LG-HCC%29%20that%20incorporates%20inter-anchor%20geometric%20correlations%20into%20anchor%20pruning%20and%20entropy%20coding%20for%20compact%20representation.%20Specifically%2C%20we%20introduce%20an%20Neighborhood-Aware%20Anchor%20Pruning%20%28NAAP%29%20strategy%2C%20which%20evaluates%20anchor%20importance%20via%20weighted%20neighborhood%20feature%20aggregation%20and%20then%20merges%20low-contribution%20anchors%20into%20salient%20neighbors%2C%20yielding%20a%20compact%20yet%20geometry-consistent%20anchor%20set.%20Moreover%2C%20we%20further%20develop%20a%20hierarchical%20entropy%20coding%20scheme%2C%20in%20which%20coarse-to-fine%20priors%20are%20exploited%20through%20a%20lightweight%20Geometry-Guided%20Convolution%28GG-Conv%29%20operator%20to%20enable%20spatially%20adaptive%20context%20modeling%20and%20rate-distortion%20optimization.%20Extensive%20experiments%20show%20that%20LG-HCC%20effectively%20alleviates%20structural%20preservation%20issues%2Cachieving%20superior%20geometric%20integrity%20and%20rendering%20fidelity%20while%20reducing%20storage%20by%20up%20to%2030.85x%20compared%20to%20the%20Scaffold-GS%20baseline%20on%20the%20Mip-NeRF360%20dataset%0ALink%3A%20http%3A//arxiv.org/abs/2603.28431v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLG-HCC%253A%2520Local%2520Geometry-Aware%2520Hierarchical%2520Context%2520Compression%2520for%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DXuan%2520Deng%2520and%2520Xiandong%2520Meng%2520and%2520Hengyu%2520Man%2520and%2520Qiang%2520Zhu%2520and%2520Tiange%2520Zhang%2520and%2520Debin%2520Zhao%2520and%2520Xiaopeng%2520Fan%26entry.1292438233%3DAlthough%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520enables%2520high-fidelity%2520real-time%2520rendering%252C%2520its%2520prohibitive%2520storage%2520overhead%2520severely%2520hinders%2520practical%2520deployment.%2520Recent%2520anchor-based%25203DGS%2520compression%2520schemes%2520reduce%2520gaussian%2520redundancy%2520through%2520some%2520advanced%2520context%2520models.%2520However%252C%2520they%2520overlook%2520explicit%2520geometric%2520dependencies%252C%2520leading%2520to%2520structural%2520degradation%2520and%2520suboptimal%2520ratedistortion%2520performance.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520Local%2520Geometry-aware%2520Hierarchical%2520Context%2520Compression%2520framework%2520for%25203DGS%2528LG-HCC%2529%2520that%2520incorporates%2520inter-anchor%2520geometric%2520correlations%2520into%2520anchor%2520pruning%2520and%2520entropy%2520coding%2520for%2520compact%2520representation.%2520Specifically% {"title": "CLoD-GS: Continuous Level-of-Detail via 3D Gaussian Splatting", "author": "Zhigang Cheng and Mingchao Sun and Yu Liu and Zengye Ge and Luyang Tang and Mu Xu and Yangyan Li and Peng Pan", "abstract": "Level of Detail (LoD) is a fundamental technique in real-time computer graphics for managing the rendering costs of complex scenes while preserving visual fidelity. Traditionally, LoD is implemented using discrete levels (DLoD), where multiple, distinct versions of a model are swapped out at different distances. This long-standing paradigm, however, suffers from two major drawbacks: it requires significant storage for multiple model copies and causes jarring visual ``popping\" artifacts during transitions, degrading the user experience. We argue that the explicit, primitive-based nature of the emerging 3D Gaussian Splatting (3DGS) technique enables a more ideal paradigm: Continuous LoD (CLoD). A CLoD approach facilitates smooth, seamless quality scaling within a single, unified model, thereby circumventing the core problems of DLOD. To this end, we introduce CLoD-GS, a framework that integrates a continuous LoD mechanism directly into a 3DGS representation. Our method introduces a learnable, distance-dependent decay parameter for each Gaussian primitive, which dynamically adjusts its opacity based on viewpoint proximity. This allows for the progressive and smooth filtering of less significant primitives, effectively creating a continuous spectrum of detail within one model. To train this model to be robust across all distances, we introduce a virtual distance scaling mechanism and a novel coarse-to-fine training strategy with rendered point count regularization. Our approach not only eliminates the storage overhead and visual artifacts of discrete methods but also reduces the primitive count and memory footprint of the final model. Extensive experiments demonstrate that CLoD-GS achieves smooth, quality-scalable rendering from a single model, delivering high-fidelity results across a wide range of performance targets.", "link": "http://arxiv.org/abs/2510.09997v2", "date": "2026-04-01", "relevancy": 3.0125, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6249}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6051}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5776}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLoD-GS%3A%20Continuous%20Level-of-Detail%20via%203D%20Gaussian%20Splatting&body=Title%3A%20CLoD-GS%3A%20Continuous%20Level-of-Detail%20via%203D%20Gaussian%20Splatting%0AAuthor%3A%20Zhigang%20Cheng%20and%20Mingchao%20Sun%20and%20Yu%20Liu%20and%20Zengye%20Ge%20and%20Luyang%20Tang%20and%20Mu%20Xu%20and%20Yangyan%20Li%20and%20Peng%20Pan%0AAbstract%3A%20Level%20of%20Detail%20%28LoD%29%20is%20a%20fundamental%20technique%20in%20real-time%20computer%20graphics%20for%20managing%20the%20rendering%20costs%20of%20complex%20scenes%20while%20preserving%20visual%20fidelity.%20Traditionally%2C%20LoD%20is%20implemented%20using%20discrete%20levels%20%28DLoD%29%2C%20where%20multiple%2C%20distinct%20versions%20of%20a%20model%20are%20swapped%20out%20at%20different%20distances.%20This%20long-standing%20paradigm%2C%20however%2C%20suffers%20from%20two%20major%20drawbacks%3A%20it%20requires%20significant%20storage%20for%20multiple%20model%20copies%20and%20causes%20jarring%20visual%20%60%60popping%22%20artifacts%20during%20transitions%2C%20degrading%20the%20user%20experience.%20We%20argue%20that%20the%20explicit%2C%20primitive-based%20nature%20of%20the%20emerging%203D%20Gaussian%20Splatting%20%283DGS%29%20technique%20enables%20a%20more%20ideal%20paradigm%3A%20Continuous%20LoD%20%28CLoD%29.%20A%20CLoD%20approach%20facilitates%20smooth%2C%20seamless%20quality%20scaling%20within%20a%20single%2C%20unified%20model%2C%20thereby%20circumventing%20the%20core%20problems%20of%20DLOD.%20To%20this%20end%2C%20we%20introduce%20CLoD-GS%2C%20a%20framework%20that%20integrates%20a%20continuous%20LoD%20mechanism%20directly%20into%20a%203DGS%20representation.%20Our%20method%20introduces%20a%20learnable%2C%20distance-dependent%20decay%20parameter%20for%20each%20Gaussian%20primitive%2C%20which%20dynamically%20adjusts%20its%20opacity%20based%20on%20viewpoint%20proximity.%20This%20allows%20for%20the%20progressive%20and%20smooth%20filtering%20of%20less%20significant%20primitives%2C%20effectively%20creating%20a%20continuous%20spectrum%20of%20detail%20within%20one%20model.%20To%20train%20this%20model%20to%20be%20robust%20across%20all%20distances%2C%20we%20introduce%20a%20virtual%20distance%20scaling%20mechanism%20and%20a%20novel%20coarse-to-fine%20training%20strategy%20with%20rendered%20point%20count%20regularization.%20Our%20approach%20not%20only%20eliminates%20the%20storage%20overhead%20and%20visual%20artifacts%20of%20discrete%20methods%20but%20also%20reduces%20the%20primitive%20count%20and%20memory%20footprint%20of%20the%20final%20model.%20Extensive%20experiments%20demonstrate%20that%20CLoD-GS%20achieves%20smooth%2C%20quality-scalable%20rendering%20from%20a%20single%20model%2C%20delivering%20high-fidelity%20results%20across%20a%20wide%20range%20of%20performance%20targets.%0ALink%3A%20http%3A//arxiv.org/abs/2510.09997v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLoD-GS%253A%2520Continuous%2520Level-of-Detail%2520via%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DZhigang%2520Cheng%2520and%2520Mingchao%2520Sun%2520and%2520Yu%2520Liu%2520and%2520Zengye%2520Ge%2520and%2520Luyang%2520Tang%2520and%2520Mu%2520Xu%2520and%2520Yangyan%2520Li%2520and%2520Peng%2520Pan%26entry.1292438233%3DLeve {"title": "Shape Representation using Gaussian Process mixture models", "author": "Panagiotis Sapoutzoglou and George Terzakis and Georgios Floros and Maria Pateraki", "abstract": "Traditional explicit 3D representations, such as point clouds and meshes, demand significant storage to capture fine geometric details and require complex indexing systems for surface lookups, making functional representations an efficient, compact, and continuous alternative. In this work, we propose a novel, object-specific functional shape representation that models surface geometry with Gaussian Process (GP) mixture models. Rather than relying on computationally heavy neural architectures, our method is lightweight, leveraging GPs to learn continuous directional distance fields from sparsely sampled point clouds. We capture complex topologies by anchoring local GP priors at strategic reference points, which can be flexibly extracted using any structural decomposition method (e.g. skeletonization, distance-based clustering). Extensive evaluations on the ShapeNetCore and IndustryShapes datasets demonstrate that our method can efficiently and accurately represent complex geometries.", "link": "http://arxiv.org/abs/2604.00862v1", "date": "2026-04-01", "relevancy": 2.9977, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6007}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6007}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5971}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Shape%20Representation%20using%20Gaussian%20Process%20mixture%20models&body=Title%3A%20Shape%20Representation%20using%20Gaussian%20Process%20mixture%20models%0AAuthor%3A%20Panagiotis%20Sapoutzoglou%20and%20George%20Terzaki 520require%2520complex%2520indexing%2520systems%2520for%2520surface%2520lookups%252C%2520making%2520functional%2520representations%2520an%2520efficient%252C%2520compact%252C%2520and%2520continuous%2520alternative.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%252C%2520object-specific%2520functional%2520shape%2520representation%2520that%2520models%2520surface%2520geometry%2520with%2520Gaussian%2520Process%2520%2528GP%2529%2520mixture%2520models.%2520Rather%2520than%2520relying%2520on%2520computationally%2520heavy%2520neural%2520architectures%252C%2520our%2520method%2520is%2520lightweight%252C%2520leveraging%2520GPs%2520to%2520learn%2520continuous%2520directional%2520distance%2520fields%2520from%2520sparsely%2520sampled%2520point%2520clouds.%2520We%2520capture%2520complex%2520topologies%2520by%2520anchoring%2520local%2520GP%2520priors%2520at%2520strategic%2520reference%2520points%252C%2520which%2520can%2520be%2520flexibly%2520extracted%2520using%2520any%2520structural%2520decomposition%2520method%2520%2528e.g.%2520skeletonization%252C%2520distance-based%2520clustering%2529.%2520Extensive%2520evaluations%2520on%2520the%2520ShapeNetCore%2520and%2520IndustryShapes%2520datasets%2520demonstrate%2520that%2520our%2520method%2520can%2520efficiently%2520and%2520accurately%2520represent%2520complex%2520geometries.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00862v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Shape%20Representation%20using%20Gaussian%20Process%20mixture%20models&entry.906535625=Panagiotis%20Sapoutzoglou%20and%20George%20Terzakis%20and%20Georgios%20Floros%20and%20Maria%20Pateraki&entry.1292438233=Traditional%20explicit%203D%20representations%2C%20such%20as%20point%20clouds%20and%20meshes%2C%20demand%20significant%20storage%20to%20capture%20fine%20geometric%20details%20and%20require%20complex%20indexing%20systems%20for%20surface%20 {"title": "Spatial Reasoning is Not a Free Lunch: A Controlled Study on LLaVA", "author": "Nahid Alam and Leema Krishna Murali and Siddhant Bharadwaj and Patrick Liu and Timothy Chung and Drishti Sharma and Akshata A. and Kranthi Kiran and Wesley Tam and Bala Krishna S Vegesna", "abstract": "Vision-language models (VLMs) have advanced rapidly, yet they still struggle with basic spatial reasoning. Despite strong performance on general benchmarks, modern VLMs remain brittle at understanding 2D spatial relationships such as relative position, layout, and counting. We argue that this failure is not merely a data problem, but is closely tied to dominant design choices in current VLM pipelines: reliance on CLIP-style image encoders and the flattening of images into 1D token sequences with 1D positional encoding. We present a controlled diagnostic study within the LLaVA framework to isolate how these choices affect spatial grounding. We evaluate frontier models and LLaVA variants on a suite of spatial benchmarks, comparing CLIP-based encoders against alternatives trained with denser or generative objectives, as well as variants augmented with 2D positional encoding. Our results show consistent spatial performance gaps across models, and indicate that encoder objectives and positional structure shape spatial behavior, but do not fully resolve it.", "link": "http://arxiv.org/abs/2603.12545v2", "date": "2026-04-01", "relevancy": 2.9867, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6195}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6195}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatial%20Reasoning%20is%20Not%20a%20Free%20Lunch%3A%20A%20Controlled%20Study%20on%20LLaVA&body=Title%3A%20Spatial%20Reasoning%20is%20Not%20a%20Free%20Lunch%3A%20A%20Controlled%20Study%20on%20LLaVA%0AAuthor%3A%20Nahid%20Alam%20and%20Leema%20Krishna%20Murali%20and%20Siddhant%20Bharadwaj%20and%20Patrick%20Liu%20and%20Timothy%20Chung%20and%20Drishti%20Sharma%20and%20Akshata%20A.%20and%20Kranthi%20Kiran%20and%20Wesley%20Tam%20and%20Bala%20Krishna%20S%20Vegesna%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20have%20advanced%20rapidly%2C%20yet%20they%20still%20struggle%20with%20basic%20spatial%20reasoning.%20Despite%20strong%20performance%20on%20general%20benchmarks%2C%20modern%20VLMs%20remain%20brittle%20at%20understanding%202D%20spatial%20relationships%20such%20as%20relative%20position%2C%20layout%2C%20and%20counting.%20We%20argue%20that%20this%20failure%20is%20not%20merely%20a%20data%20problem%2C%20but%20is%20closely%20tied%20to%20dominant%20design%20choices%20in%20current%20VLM%20pipelines%3A%20reliance%20on%20CLIP-style%20image%20encoders%20and%20the%20flattening%20of%20images%20into%201D%20token%20sequences%20with%201D%20positional%20encoding.%20We%20present%20a%20controlled%20diagnostic%20study%20within%20the%20LLaVA%20framework%20to%20isolate%20how%20these%20choices%20affect%20spatial%20grounding.%20We%20evaluate%20frontier%20models%20and%20LLaVA%20variants%20on%20a%20suite%20of%20spatial%20benchmarks%2C%20comparing%20CLIP-based%20encoders%20against%20alternatives%20trained%20with%20denser%20or%20generative%20objectives%2C%20as%20well%20as%20variants%20augmented%20with%202D%20positional%20encoding.%20Our%20results%20show%20consistent%20spatial%20performance%20gaps%20across%20models%2C%20and%20indicate%20that%20encoder%20objectives%20and%20positional%20structure%20shape%20spatial%20behavior%2C%20but%20do%20not%20fully%20resolve%20it.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12545v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatial%2520Reasoning%2520is%2520Not%2520a%2520Free%2520Lunch%253A%2520A%2520Controlled%2520Study%2520on%2520LLaVA%26entry.906535625%3DNahid%2520Alam%2520and%2520Leema%2520Krishna%2520Murali%2520and%2520Siddhant%2520Bharadwaj%2520and%2520Patrick%2520Liu%2520and%2520Timothy%2520Chung%2520and%2520Drishti%2520Sharma%2520and%2520Akshata%2520A.%2520and%2520Kranthi%2520Kiran%2520and%2520Wesley%2520Tam%2520and%2520Bala%2520Krishna%2520S%2520Vegesna%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520have%2520advanced%2520rapidly%252C%2520yet%2520they%2520still%2520struggle%2520with%2520basic%2520spatial%2520reasoning.%2520Despite%2520strong%2520performance%2520on%2520general%2520benchmarks%252C%2520modern%2520VLMs%2520remain%2520brittle%2520at%2520understanding%25202D%2520spatial%2520relationships%2520such%2520as%2520relative%2520position%252C%2520layout%252C%2520and%2520counting.%2520We%2520argue%2520that%2520this%2520failure%2520is%2520not%2520merely%2520a%2520data%2520problem%252C%2520but%2520is%2520closely%2520tied%2520to%2520dominant%2520design%2520choices%2520in%2520current%2520VLM%2520pipelines%253A%2520reliance%2520on%2520CLIP-style%2520image%2520encoders%2520and%2520the%2520flattening%2520of%2520images%2520into%25201D%2520token%2520sequences%2520with%25201D%2520positional%2520encoding.%2520We%2520present%2520a%2520controlled%2520diagnostic%2520study%2520within%2520the%2520LLaVA%2520framework%2520to%2520isolate%2520how%2520these%2520choices%2520affect%2520spatial%2520grounding.%2520We%2520evaluate%2520frontier%2520models%2520and%2520LLaVA%2520variants%2520on%2520a%2520suite%2520of%2520spatial%2520benchmarks%252C%2520comparing%2520CLIP-based%2520encoders%2520against%2520alternatives%2520trained%2520with%2520denser%2520or%2520generative%2520objectives%252C%2520as%2520well%2520as%2520variants%2520augmented%2520with%25202D%2520positional%2520encoding.%2520Our%2520results%2520show%2520consistent%2520spatial%2520performance%2520gaps%2520across%2520models%252C%2520and%2520indicate%2520that%2520encoder%2520objectives%2520and%2520positional%2520structure%2520shape%2520spatial%2520behavior%252C%2520but%2520do%2520not%2520fully%2520resolve%2520it.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12545v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spatial%20Reasoning%20is%20Not%20a%20Free%20Lunch%3A%20A%20Controlled%20Study%20on%20LLaVA&entry.906535625=Nahid%20Alam%20and%20Leema%20Krishna%20Murali%20and%20Siddhant%20Bharadwaj%20and%20Patrick%20Liu%20and%20Timothy%20Chung%20and%20Drishti%20Sharma%20and%20Akshata%20A.%20and%20Kranthi%20Kiran%20and%20Wesley%20Tam%20and%20Bala%20Krishna%20S%20Vegesna&entry.1292438233=Vision-language%20models%20%28VLMs%29%20have%20advanced%20rapidly%2C%20yet%20they%20still%20struggle%20with%20basic%20spatial%20reasoning.%20Despite%20strong%20performance%20on%20general%20benchmarks%2C%20modern%20VLMs%20remain%20brittle%20at%20understanding%202D%20spatial%20relationships%20such%20as%20relative%20position%2C%20layout%2C%20and%20counting.%20We%20argue%20that%20this%20failure%20is%20not%20merely%20a%20data%20problem%2C%20but%20is%20closely%20tied%20to%20dominant%20design%20choices%20in%20current%20VLM%20pipelines%3A%20reliance%20on%20CLIP-style%20image%20encoders%20and%20the%20flattening%20of%20images%20into%201D%20token%20sequences%20with%201D%20positional%20encoding.%20We%20present%20a%20controlled%20diagnostic%20study%20within%20the%20LLaVA%20framework%20to%20isolate%20how%20these%20choices%20affect%20spatial%20grounding.%20We%20evaluate%20frontier%20models%20and%20LLaVA%20variants%20on%20a%20suite%20of%20spatial%20benchmarks%2C%20comparing%20CLIP-based%20encoders%20against%20alternatives%20trained%20with%20denser%20or%20generative%20objectives%2C%20as%20well%20as%20variants%20augmented%20with%202D%20positional%20encoding.%20 {"title": "ReMoGen: Real-time Human Interaction-to-Reaction Generation via Modular Learning from Diverse Data", "author": "Yaoqin Ye and Yiteng Xu and Qin Sun and Xinge Zhu and Yujing Sun and Yuexin Ma", "abstract": "Human behaviors in real-world environments are inherently interactive, with an individual's motion shaped by surrounding agents and the scene. Such capabilities are essential for applications in virtual avatars, interactive animation, and human-robot collaboration. We target real-time human interaction-to-reaction generation, which generates the ego's future motion from dynamic multi-source cues, including others' actions, scene geometry, and optional high-level semantic inputs. This task is fundamentally challenging due to (i) limited and fragmented interaction data distributed across heterogeneous single-person, human-human, and human-scene domains, and (ii) the need to produce low-latency yet high-fidelity motion responses during continuous online interaction. To address these challenges, we propose ReMoGen (Reaction Motion Generation), a modular learning framework for real-time interaction-to-reaction generation. ReMoGen leverages a universal motion prior learned from large-scale single-person motion datasets and adapts it to target interaction domains through independently trained Meta-Interaction modules, enabling robust generalization under data-scarce and heterogeneous supervision. To support responsive online interaction, ReMoGen performs segment-level generation together with a lightweight Frame-wise Segment Refinement module that incorporates newly observed cues at the frame level, improving both responsiveness and temporal coherence without expensive full-sequence inference. Extensive experiments across human-human, human-scene, and mixed-modality interaction settings show that ReMoGen produces high-quality, coherent, and responsive reactions, while generalizing effectively across diverse interaction scenarios.", "link": "http://arxiv.org/abs/2604.01082v1", "date": "2026-04-01", "relevancy": 2.9688, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.604}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5982}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReMoGen%3A%20Real-time%20Human%20Interaction-to-Reaction%20Generation%20via%20Modular%20Learning%20from%20Diverse%20Data&body=Title%3A%20ReMoGen%3A%20Real-time%20Human%20Interaction-to-Reaction%20Generation%20via%20Modular%20Learning%20from%20Diverse%20Data%0AAuthor%3A%20Yaoqin%20Ye%20and%20Yiteng%20Xu%20and%20Qin%20Sun%20and%20Xinge%20Zhu%20and%20Yujing%20Sun%20and%20Yuexin%20Ma%0AAbstract%3A%20Human%20behaviors%20in%20real-world%20environments%20are%20inherently%20interactive%2C%20with%20an%20individual%27s%20motion%20shaped%20by%20surrounding%20agents%20and%20the%20scene.%20Such%20capabilities%20are%20essential%20for%20applications%20in%20virtual%20avatars%2C%20interactive%20animation%2C%20and%20human-robot%20collaboration.%20We%20target%20real-time%20human%20interaction-to-reaction%20generation%2C%20which%20generates%20the%20ego%27s%20future%20motion%20from%20dynamic%20multi-source%20cues%2C%20including%20others%27%20actions%2C%20scene%20geometry%2C%20and%20optional%20high-level%20semantic%20inputs.%20This%20task%20is%20fundamentally%20challenging%20due%20to%20%28i%29%20limited%20and%20fragmented%20interaction%20data%20distributed%20across%20heterogeneous%20single-person%2C%20human-human%2C%20and%20human-scene%20domains%2C%20and%20%28ii%29%20the%20need%20to%20produce%20low-latency%20yet%20high-fidelity%20motion%20responses%20during%20continuous%20online%20interaction.%20To%20address%20these%20challenges%2C%20we%20propose%20ReMoGen%20%28Reaction%20Motion%20Generation%29%2C%20a%20modular%20learning%20framework%20for%20real-time%20interaction-to-reaction%20generation.%20ReMoGen%20leverages%20a%20universal%20motion%20prior%20learned%20from%20large-scale%20single-person%20motion%20datasets%20and%20adapts%20it%20to%20target%20interaction%20domains%20through%20independently%20trained%20Meta-Interaction%20modules%2C%20enabling%20robust%20generalization%20under%20data-scarce%20and%20heterogeneous%20supervision.%20To%20support%20responsive%20online%20interaction%2C%20ReMoGen%20performs%20segment-level%20generation%20together%20with%20a%20lightweight%20Frame-wise%20Segment%20Refinement%20module%20that%20incorporates%20newly%20observed%20cues%20at%20the%20frame%20level%2C%20improving%20both%20responsiveness%20and%20temporal%20coherence%20without%20expensive%20full-sequence%20inference.%20Extensive%20experiments%20across%20human-human%2C%20human-scene%2C%20and%20mixed-modality%20interaction%20settings%20show%20that%20ReMoGen%20produces%20high-quality%2C%20coherent%2C%20and%20responsive%20reactions%2C%20while%20generalizing%20effectively%20across%20diverse%20interaction%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01082v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReMoGen%253A%2520Real-time%2520Human%2520Interaction-to-Reaction%2520Generation%2520via%2520Modular%2520Learning%2520from%2520Diverse%2520Data%26entry.906535625%3DYaoqin%2520Ye%2520and%2520Yiteng%2520Xu%2520and%2520Qin%2520Sun%2520and%2520Xinge%2520Zhu%2520and%2520Yujing%2520Sun%2520and%2520Yuexin%2520Ma%26entry.1292438233%3DHuman%2520behaviors%2520in%2520real-world%2520environments%2520are%2520inherently%2520interactive%252C%2520with%2520an%2520individual%2527s%2520motion%2520shaped%2520by%2520surrounding%2520agents%2520and%2520the%2520scene.%2520Such%2520capabilities%2520are%2520essential%2520for%2520applications%2520in%2520virtual%2520avatars%252C%2520inter %2520experiments%2520across%2520human-human%252C%2520human-scene%252C%2520and%2520mixed-modality%2520interaction%2520settings%2520show%2520that%2520ReMoGen%2520produces%2520high-quality%252C%2520coherent%252C%2520and%2520responsive%2520reactions%252C%2520while%2520generalizing%2520effectively%2520across%2520diverse%2520interaction%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01082v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ReMoGen%3A%20Real-time%20Human%20Interaction-to-Reaction%20Generation%20via%20Modular%20Learning%20from%20Diverse%20Data&entry.906535625=Yaoqin%20Ye%20and%20Yiteng%20Xu%20and%20Qin%20Sun%20and%20Xinge%20Zhu%20and%20Yujing%20Sun%20and%20Yuexin%20Ma&entry.1292438233=Human%20behaviors%20in%20real-world%20environments%20are%20inherently%20interactive%2C%20with%20an%20individual%27s%20motion%20shaped%20by%20surrounding%20agents%20and%20the%20scene.%20Such%20capabilities%20are%20essential%20for%20applications%20in%20virtual%20avatars%2C%20interactive%20animation%2C%20and%20human-robot%20collaboration.%20We%20target%20real-time%20human%20interaction-to-reaction%20generation%2C%20which%20generates%20the%20ego%27s%20future%20motion%20from%20dynamic%20multi-source%20cues%2C%20including%20others%27%20actions%2C%20scene%20geometry%2C%20and%20optional%20high-level%20semantic%20inputs.%20This%20task%20is%20fundamentally%20challenging%20due%20to%20%28i%29%20limited%20and%20fragmented%20interaction%20data%20distributed%20across%20heterogeneous%20single-person%2C%20human-human%2C%20and%20human-scene%20domains%2C%20and%20%28ii%29%20the%20need%20to%20produce%20low-latency%20yet%20high-fidelity%20motion%20responses%20during%20continuous%20online%20interaction.%20To%20address%20these%20challenges%2C%20we%20propose%20ReMoGen%20%28Reaction%20Motion%20Generation%29%2C%20a%20modular%20learning%20framework%20for%20real-time%20interaction-to-r {"title": "Multimodal Language Models Cannot Spot Spatial Inconsistencies", "author": "Om Khangaonkar and Hadi J. Rad and Hamed Pirsiavash", "abstract": "Spatial consistency is a fundamental property of the visual world and a key requirement for models that aim to understand physical reality. Despite recent advances, multimodal large language models (MLLMs) often struggle to reason about 3D geometry across multiple views. Rather than asking models to describe scene attributes, we introduce a more challenging task: given two views of the same scene, identify the object that violates 3D motion consistency. We propose a simple and scalable method for generating realistic, spatially inconsistent image pairs from multi-view scenes, enabling systematic evaluation of this capability. Our results show that state-of-the-art MLLMs significantly underperform human observers and exhibit substantial variability across different scene attributes, revealing a fragile and incomplete understanding of 3D structure. We hope our findings underscore the need for approaches that develop a more deeply grounded understanding of the physical world.", "link": "http://arxiv.org/abs/2604.00799v1", "date": "2026-04-01", "relevancy": 2.9499, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5948}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5948}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5802}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Language%20Models%20Cannot%20Spot%20Spatial%20Inconsistencies&body=Title%3A%20Multimodal%20Language%20Models%20Cannot%20Spot%20Spatial%20Inconsistencies%0AAuthor%3A%20Om%20Khangaonkar%20and%20Hadi%20J.%20R {"title": "Benchmarking and Mechanistic Analysis of Vision-Language Models for Cross-Depiction Assembly Instruction Alignment", "author": "Zhuchenyang Liu and Yao Zhang and Yu Xiao", "abstract": "2D assembly diagrams are often abstract and hard to follow, creating a need for intelligent assistants that can monitor progress, detect errors, and provide step-by-step guidance. In mixed reality settings, such systems must recognize completed and ongoing steps from the camera feed and align them with the diagram instructions. Vision Language Models (VLMs) show promise for this task, but face a depiction gap because assembly diagrams and video frames share few visual features. To systematically assess this gap, we construct IKEA-Bench, a benchmark of 1,623 questions across 6 task types on 29 IKEA furniture products, and evaluate 19 VLMs (2B-38B) under three alignment strategies. Our key findings: (1) assembly instruction understanding is recoverable via text, but text simultaneously degrades diagram-to-video alignment; (2) architecture family predicts alignment accuracy more strongly than parameter count; (3) video understanding remains a hard bottleneck unaffected by strategy. A three-level mechanistic analysis further reveals that diagrams and video occupy disjoint ViT subspaces, and that adding text shifts models from visual to text-driven reasoning. These results identify visual encoding as the primary target for improving cross-depiction robustness. Project page: https://ryenhails.github.io/IKEA-Bench/", "link": "http://arxiv.org/abs/2604.00913v1", "date": "2026-04-01", "relevancy": 2.9483, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6133}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6133}, {"title": "TAMM: TriAdapter Multi-Modal Learning {"title": "Lightweight Prompt-Guided CLIP Adaptation for Monocular Depth Estimation", "author": "Reyhaneh Ahani Manghotay and Jie Liang", "abstract": "Leveraging the rich semantic features of vision-language models (VLMs) like CLIP for monocular depth estimation tasks is a promising direction, yet often requires extensive fine-tuning or lacks geometric precision. We present a parameter-efficient framework, named MoA-DepthCLIP, that adapts pretrained CLIP representations for monocular depth estimation with minimal supervision. Our method integrates a lightweight Mixture-of-Adapters (MoA) module into the pretrained Vision Transformer (ViT-B/32) backbone combined with selective fine-tuning of the final layers. This design enables spatially-aware adaptation, guided by a global semantic context vector and a hybrid prediction architecture that synergizes depth bin classification with direct regression. To enhance structural accuracy, we employ a composite loss function that enforces geometric constraints. On the NYU Depth V2 benchmark, MoA-DepthCLIP achieves competitive results, significantly outperforming the DepthCLIP baseline by improving the $\u03b4_1$ accuracy from 0.390 to 0.745 and reducing the RMSE from 1.176 to 0.520. These results are achieved while requiring substantially few trainable parameters, demonstrating that lightweight, prompt-guided MoA is a highly effective strategy for transferring VLM knowledge to fine-grained monocular depth estimation tasks.", "link": "http://arxiv.org/abs/2604.01118v1", "date": "2026-04-01", "relevancy": 2.9362, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6432}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5592}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "ht {"title": "Continual Vision-Language Learning for Remote Sensing: Benchmarking and Analysis", "author": "Xingxing Weng and Ruifeng Ni and Chao Pang and XiangYu Hao and Yishan Wang and Xiaokang Zhang and Wei Xu and Gui-Song Xia", "abstract": "Current remote sensing vision-language models (RS VLMs) demonstrate impressive performance in image interpretation but rely on static training data, limiting their ability to accommodate continuously emerging sensing modalities and downstream tasks. This exposes a fundamental challenge: enabling RS VLMs to continually adapt without catastrophic forgetting. Despite its practical importance, the continual learning capability of RS VLMs remains underexplored, and no dedicated benchmark currently exists. In this work, we present CLeaRS, a comprehensive benchmark for continual vision-language learning in remote sensing. CLeaRS comprises 10 curated subsets with over 207k image-text pairs, spanning diverse interpretation tasks, sensing modalities, and application scenarios. We further define three evaluation protocols: long-horizon, modality-incremental, and task-incremental settings, to systematically assess continual adaptation. Extensive benchmarking of diverse vision-language models reveals catastrophic forgetting across all settings. Moreover, representative continual learning methods, when adapted to RS VLMs, exhibit limited effectiveness in handling task, instruction, and modality transitions. Our findings underscore the need for developing continual learning methods tailored to RS VLMs.", "link": "http://arxiv.org/abs/2604.00820v1", "date": "2026-04-01", "relevancy": 2.9326, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6154}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6154}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5287}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continual%20Vision-Language%20Learning%20for%20Remote%20Sensing%3A%20Benchmarking%20and%20Analysis&body=Title%3A%20Continual%20Vision-Language%20Learning%20for%20Remote%20Sensing%3A%20Benchmarking%20and%20Analysis%0AAuthor%3A%20Xingxing%20Weng%20and%20Ruifeng%20Ni%20and%20Chao%20Pang%20and%20XiangYu%20Hao%20and%20Yishan%20Wang%20and%20Xiaokang%20Zhang%20and%20Wei%20Xu%20and%20Gui-Song%20Xia%0AAbstract%3A%20Current%20remote%20sensing%20vision-language%20models%20%28RS%20VLMs%29%20demonstrate%20impressive%20performance%20in%20image%20interpretation%20but%20rely%20on%20static%20training%20data%2C%20limiting%20their%20ability%20to%20accommodate%20continuously%20emerging%20sensing%20modalities%20and%20downstream%20tasks.%20This%20exposes%20a%20fundamental%20challenge%3A%20enabling%20RS%20VLMs%20to%20continually%20adapt%20without%20catastrophic%20forgetting.%20Despite%20its%20practical%20importance%2C%20the%20continual%20learning%20capability%20of%20RS%20VLMs%20remains%20underexplored%2C%20and%20no%20dedicated%20benchmark%20currently%20exists.%20In%20this%20work%2C%20we%20present%20CLeaRS%2C%20a%20comprehensive%20benchmark%20for%20continual%20vision-language%20learning%20in%20remote%20sensing.%20CLeaRS%20comprises%2010%20curated%20subsets%20with%20over%20207k%20image-text%20pairs%2C%20spanning%20diverse%20interpretation%20tasks%2C%20sensing%20modalities%2C%20and%20application%20scenarios.%20We%20further%20define%20three%20evaluation%20protocols%3A%20long-horizon%2C%20modality-incremental%2C%20and%20task-incremental%20settings%2C%20to%20systematically%20assess%20continual%20adaptation.%20Extensive%20benchmarking%20of%20diverse%20vision-language%20models%20reveals%20catastrophic%20forgetting%20across%20all%20settings.%20Moreover%2C%20representative%20continual%20learning%20methods%2C%20when%20adapted%20to%20RS%20VLMs%2C%20exhibit%20limited%20effectiveness%20in%20handling%20task%2C%20instruction%2C%20and%20modality%20transitions.%20Our%20findings%20underscore%20the%20need%20for%20developing%20continual%20learning%20methods%20tailored%20to%20RS%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00820v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContinual%2520Vision-Language%2520Learning%2520for%2520Remote%2520Sensing%253A%2520Benchmarking%2520and%2520Analysis%26entry.906535625%3DXingxing%2520Weng%2520and%2520Ruifeng%2520Ni%2520and%2520Chao%2520Pang%2520and%2520XiangYu%2520Hao%2520and%2520Yishan%2520Wang%2520and%2520Xiaokang%2520Zhang%2520and%2520Wei%2520Xu%2520and%2520Gui-Song%2520Xia%26entry.1292438233%3DCurrent%2520remote%2520sensing%2520vision-language%2520models%2520%2528RS%2520VLMs%2529%2520demonstrate%2520impressive%2520performance%2520in%2520image%2520interpretation%2520but%2520rely%2520on%2520static%2520training%2520data%252C%2520limiting%2520their%2520ability%2520to%2520accommodate%2520continuously%2520emerging%2520sensing%2520modalities%2520and%2520downstream%2520tasks.%2520This%2520exposes%2520a%2520fundamental%2520challenge%253A%2520enabling%2520RS%2520VLMs%2520to%2520continually%2520adapt%2520without%2520catastrophic%2520forgetting.%2520Despite%2520its%2520practical%2520importance%252C%2520the%2520continual%2520learning%2520capability%2520of%2520RS%2520VLMs%2520remains%2520underexplored%252C%2520and%2520no%2520dedicated%2520benchmark%2520currently%2520exists.%2520In%2520this%2520work%252C%2520we%2520present%2520CLeaRS%252C%2520a%2520comprehensive%2520benchmark%2520for%2520continual%2520vision-language%2520learning%2520in%2520remote%2520sensing.%2520CLeaRS%2520comprises%252010%2520curated%2520subsets%2520with%2520over%2520207k%2520image-text%2520pairs%252C%2520spanning%2520diverse%2520interpretation%2520tasks%252C%2520sensing%2520modalities%252C%2520 {"title": "RefTon: Reference person shot assist virtual Try-on", "author": "Liuzhuozheng Li and Yue Gong and Shanyuan Liu and Bo Cheng and Yuhang Ma and Leibucha Wu and Dengyang Jiang and Zanyi Wang and Dawei Leng and Yuhui Yin", "abstract": "We introduce RefTon, a flux-based person-to-person virtual try-on framework that enhances garment realism through unpaired visual references. Unlike conventional approaches that rely on complex auxiliary inputs such as body parsing and warped mask or require finely designed extract branches to process various input conditions, RefTon streamlines the process by directly generating try-on results from a source image and a target garment, without the need for structural guidance or auxiliary components to handle diverse inputs. Moreover, inspired by human clothing selection behavior, RefTon leverages additional reference images (the target garment worn on different individuals) to provide powerful guidance for refining texture alignment and maintaining the garment details. To enable this capability, we built a dataset containing unpaired reference images for training. Extensive experiments on public benchmarks demonstrate that RefTon achieves competitive or superior performance compared to state-of-the-art methods, while maintaining a simple and efficient person-to-person design.", "link": "http://arxiv.org/abs/2511.00956v5", "date": "2026-04-01", "relevancy": 2.9135, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5915}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5796}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.577}], "mailt {"title": "DLWM: Dual Latent World Models enable Holistic Gaussian-centric Pre-training in Autonomous Driving", "author": "Yiyao Zhu and Ying Xue and Haiming Zhang and Guangfeng Jiang and Wending Zhou and Xu Yan and Jiantao Gao and Yingjie Cai and Bingbing Liu and Zhen Li and Shaojie Shen", "abstract": "Vision-based autonomous driving has gained much attention due to its low costs and excellent performance. Compared with dense BEV (Bird's Eye View) or sparse query models, Gaussian-centric method is a comprehensive yet sparse representation by describing scene with 3D semantic Gaussians. In this paper, we introduce DLWM, a novel paradigm with Dual Latent World Models specifically designed to enable holistic gaussian-centric pre-training in autonomous driving using two stages. In the first stage, DLWM predicts 3D Gaussians from queries by self-supervised reconstructing multi-view semantic and depth images. Equipped with fine-grained contextual features, in the second stage, two latent world models are trained separately for temporal feature learning, including Gaussian-flow-guided latent prediction for downstream occupancy perception and forecasting tasks, and ego-planning-guided latent prediction for motion planning. Extensive experiments in SurroundOcc and nuScenes benchmarks demonstrate that DLWM shows significant performance gains across Gaussian-centric 3D occupancy perception, 4D occupancy forecasting and motion planning tasks.", "link": "http://arxiv.org/abs/2604.00969v1", "date": "2026-04-01", "relevancy": 2.9116, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5909}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5834}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization" {"title": "ProCap: Projection-Aware Captioning for Spatial Augmented Reality", "author": "Zimo Cao and Yuchen Deng and Haibin Ling and Bingyao Huang", "abstract": "Spatial augmented reality (SAR) directly projects digital content onto physical scenes using projectors, creating immersive experience without head-mounted displays. However, for SAR to support intelligent interaction, such as reasoning about the scene or answering user queries, it must semantically distinguish between the physical scene and the projected content. Standard Vision Language Models (VLMs) struggle with this virtual-physical ambiguity, often confusing the two contexts. To address this issue, we introduce ProCap, a novel framework that explicitly decouples projected content from physical scenes. ProCap employs a two-stage pipeline: first it visually isolates virtual and physical layers via automated segmentation; then it uses region-aware retrieval to avoid ambiguous semantic context due to projection distortion. To support this, we present RGBP (RGB + Projections), the first large-scale SAR semantic benchmark dataset, featuring 65 diverse physical scenes and over 180,000 projections with dense, decoupled annotations. Finally, we establish a dual-captioning evaluation protocol using task-specific tokens to assess physical scene and projection descriptions independently. Our experiments show that ProCap provides a robust semantic foundation for future SAR research. The source code, pre-trained models and the RGBP dataset are available on the project page: https://ZimoCao.github.io/ProCap/.", "link": "http://arxiv.org/abs/2604.00912v1", "date": "2026-04-01", "relevancy": 2.9085, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5896}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5896}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.566}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProCap%3A%20Projection-Aware%20Captioning%20for%20Spatial%20Augmented%20Reality&body=Title%3A%20ProCap%3A%20Projection-Aware%20Captioning%20for%20Spatial%20Augmented%20Reality%0AAuthor%3A%20Zimo%20Cao%20and%20Yuchen%20Deng%20and%20Haibin%20Ling%20and%20Bingyao%20Huang%0AAbstract%3A%20Spatial%20augmented%20reality%20%28SAR%29%20directly%20projects%20digital%20content%20onto%20physical%20scenes%20using%20projectors%2C%20creating%20immersive%20experience%20without%20head-mounted%20displays.%20However%2C%20for%20SAR%20to%20support%20intelligent%20interaction%2C%20such%20as%20reasoning%20about%20the%20scene%20or%20answering%20user%20queries%2C%20it%20must%20semantically%20distinguish%20between%20the%20physical%20scene%20and%20the%20projected%20content.%20Standard%20Vision%20Language%20Models%20%28VLMs%29%20struggle%20with%20this%20virtual-physical%20ambiguity%2C%20often%20confusing%20the%20two%20contexts.%20To%20address%20this%20issue%2C%20we%20introduce%20ProCap%2C%20a%20novel%20framework%20that%20explicitly%20decouples%20projected%20content%20from%20physical%20scenes.%20ProCap%20employs%20a%20two-stage%20pipeline%3A%20first%20it%20visually%20isolates%20virtual%20and%20physical%20layers%20via%20automated%20segmentation%3B%20then%20it%20uses%20region-aware%20retrieval%20to%20avoid%20ambiguous%20semantic%20context%20due%20to%20projection%20distortion.%20To%20support%20this%2C%20we%20present%20RGBP%20%28RGB%20%2B%20Projections%29%2C%20the%20first%20large-scale%20SAR%20semantic%20benchmark%20dataset%2C%20featuring%2065%20diverse%20physical%20scenes%20and%20over%20180%2C000%20projections%20with%20dense%2C%20decoupled%20annotations.%20Finally%2C%20we%20establish%20a%20dual-captioning%20evaluation%20protocol%20using%20task-specific%20tokens%20to%2 {"title": "Revisiting Human-in-the-Loop Object Retrieval with Pre-Trained Vision Transformers", "author": "Kawtar Zaher and Olivier Buisson and Alexis Joly", "abstract": "Building on existing approaches, we revisit Human-in-the-Loop Object Retrieval, a task that consists of iteratively retrieving images containing objects of a class-of-interest, specified by a user-provided query. Starting from a large unlabeled image collection, the aim is to rapidly identify diverse instances of an object category relying solely on the initial query and the user's Relevance Feedback, with no prior labels. The retrieval process is formulated as a binary classification task, where the system continuously learns to distinguish between relevant and non-relevant images to the query, through iterative user interaction. This interaction is guided by an Active Learning loop: at each iteration, the system selects informative samples for user annotation, thereby refining the retrieval performance. This task is particularly challenging in multi-object datasets, where the object of interest may occupy only a small region of the image within a complex, cluttered scene. Unlike object-centered settings where global descriptors often suffice, multi-object images require more adapted, localized descriptors. In this work, we formulate and revisit the Human-in-the-Loop Object Retrieval task by leveraging pre-trained ViT representations, and addressing key design questions, including which object instances to consider in an image, what form the annotations should take, how Active Selection should be applied, and which representation strategies best capture the object's features. We compare several representation strategies across multi-object datasets highlighting trade-offs between capturing the global context and focusing on fine-grained local object details. Our results offer practical insights for the design of effective interactive retrieval pipelines based on Active Learning for object class retrieval.", "link": "http://arxiv.org/abs/2604.00809v1", "date": "2026-04-01", "relevancy": 2.903, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5902}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5818}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5699}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Human-in-the-Loop%20Object%20Retrieval%20with%20Pre-Trained%20Vision%20Transformers&body=Title%3A%20Revisiting%20Human-in-the-Loop%20Object%20Retrieval%20with%20Pre-Trained%20Vision%20Transformers%0AAuthor%3A%20Kawtar%20Zaher%20and%20Olivier%20Buisson%20and%20Alexis%20Joly%0AAbstract%3A%20Building%20on%20existing%20approaches%2C%20we%20revisit%20Human-in-the-Loop%20Object%20Retrieval%2C%20a%20task%20that%20consists%20of%20iteratively%20retrieving%20images%20containing%20objects%20of%20a%20class-of-interest%2C%20specified%20by%20a%20user-provided%20query.%20Starting%20from%20a%20large%20unlabeled%20image%20collection%2C%20the%20aim%20is%20to%20rapidly%20identify%20diverse%20instances%20of%20an%20object%20category%20relying%20solely%20on%20the%20initial%20query%20and%20the%20user%27s%20Relevance%20Feedback%2C%20with%20no%20prior%20labels.%20The%20retrieval%20process%20is%20formulated%20as%20a%20binary%20classification%20task%2C%20where%20the%20system%20continuously%20learns%20to%20distinguish%20between%20relevant%20and%20non-relevant%20images%20to%20the%20query%2C%20through%20iterative%20user%20interaction.%20This%20interaction%20is%20guided%20by%20an%20Active%20Learning%20loop%3A%20at%20each%20iteration%2C%20the%20system%20selects%20informative%20samples%20for%20user%20annotatio {"title": "CDH-Bench: A Commonsense-Driven Hallucination Benchmark for Evaluating Visual Fidelity in Vision-Language Models", "author": "Kesheng Chen and Yamin Hu and Qi Zhou and Zhenqian Zhu and Wenjian Luo", "abstract": "Vision-language models (VLMs) achieve strong performance on many benchmarks, yet a basic reliability question remains underexplored: when visual evidence conflicts with commonsense, do models follow what is shown or what commonsense suggests? A characteristic failure in this setting is that the model overrides visual evidence and outputs the commonsense alternative. We term this phenomenon \\textbf{commonsense-driven hallucination} (CDH). To evaluate it, we introduce \\textbf{CDH-Bench}, a benchmark designed to create explicit \\textbf{visual evidence--commonsense conflicts}. CDH-Bench covers three dimensions: \\textit{counting anomalies}, \\textit{relational anomalies}, and \\textit{attribute anomalies}. We evaluate frontier VLMs under \\textit{binary Question Answering (QA)} and \\textit{multiple-choice QA}, and report metrics including \\textit{Counterfactual Accuracy} (CF-Acc), \\textit{Commonsense Accuracy} (CS-Acc), \\textit{Counterfactual Accuracy Drop} (CFAD), \\textit{Commonsense Collapse Rate} (CCR), and \\textit{Relative Prior Dependency} (RPD). Results show that even strong models remain vulnerable to prior-driven normalization under visual evidence--commonsense conflict. CDH-Bench provides a controlled diagnostic of visual fidelity under visual evidence--commonsense conflict.", "link": "http://arxiv.org/abs/2603.27982v2", "date": "2026-04-01", "relevancy": 2.8823, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5869}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5869}, {"title": "Flexible Visual Recognition by {"title": "The Prism Hypothesis: Harmonizing Semantic and Pixel Representations via Unified Autoencoding", "author": "Weichen Fan and Haiwen Diao and Quan Wang and Dahua Lin and Ziwei Liu", "abstract": "Deep representations across modalities are inherently intertwined. In this paper, we systematically analyze the spectral characteristics of various semantic and pixel encoders. Interestingly, our study uncovers a highly inspiring and rarely explored correspondence between an encoder's feature spectrum and its functional role: semantic encoders primarily capture low-frequency components that encode abstract meaning, whereas pixel encoders additionally retain high-frequency information that conveys fine-grained detail. This heuristic finding offers a unifying perspective that ties encoder behavior to its underlying spectral structure. We define it as the Prism Hypothesis, where each data modality can be viewed as a projection of the natural world onto a shared feature spectrum, just like the prism. Building on this insight, we propose Unified Autoencoding (UAE), a model that harmonizes semantic structure and pixel details via an innovative frequency-band modulator, enabling their seamless coexistence. Extensive experiments demonstrate that UAE effectively unifies semantic abstraction and pixel-level fidelity within a single latent space, achieving state-of-the-art performance. Moreover, we show that UAE can be directly applied to pixel-space modeling, significantly improving both FID and IS over the vanilla JIT baseline. Our code is avaliable at: https://github.com/WeichenFan/UAE.", "link": "http://arxiv.org/abs/2512.19693v5", "date": "2026-04-01", "relevancy": 2.8609, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.6131}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5517}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Prism%20Hypothesis%3A%20Harmonizing%20Semantic%20and%20Pixel%20Representations%20via%20Unified%20Autoencoding&body=Title%3A%20The%20Prism%20Hypothesis%3A%20Harmonizing%20Semantic%20and%20Pixel%20Representations%20via%20Unified%20Autoencoding%0AAuthor%3A%20Weichen%20Fan%20and%20Haiwen%20Diao%20and%20Quan%20Wang%20and%20Dahua%20Lin%20and%20Ziwei%20Liu%0AAbstract%3A%20Deep%20representations%20across%20modalities%20are%20inherently%20intertwined.%20In%20this%20paper%2C%20we%20systematically%20analyze%20the%20spectral%20characteristics%20of%20various%20semantic%20and%20pixel%20encoders.%20Interestingly%2C%20our%20study%20uncovers%20a%20highly%20inspiring%20and%20rarely%20explored%20correspondence%20between%20an%20encoder%27s%20feature%20spectrum%20and%20its%20functional%20role%3A%20semantic%20encoders%20primarily%20capture%20low-frequency%20components%20that%20encode%20abstract%20meaning%2C%20whereas%20pixel%20encoders%20additionally%20retain%20high-frequency%20information%20that%20conveys%20fine-grained%20detail.%20This%20heuristic%20finding%20offers%20a%20unifying%20perspective%20that%20ties%20encoder%20behavior%20to%20its%20underlying%20spectral%20structure.%20We%20define%20it%20as%20the%20Prism%20Hypothesis%2C%20where%20each%20data%20modality%20can%20be%20viewed%20as%20a%20projection%20of%20the%20natural%20world%20onto%20a%20shared%20feature%20spectrum%2C%20just%20like%20the%20prism.%20Building%20on%20this%20insight%2C%20we%20propose%20Unified%20Autoencoding%20%28UAE%29%2C%20a%20model%20that%20harmonizes%20semantic%20structure%20and%20pixel%20details%20via%20an%20innovative%20frequency-band%20modulator%2C%20enabling%20their%20seamless%20coexistence.%20Extensive%20experiments%20demonstrate%20that%20UAE%20effectively%20unifies%20semantic%20abstraction%20and%20pixel-level%20fidelity%20within%20a%20single%20latent%20space%2C%20achieving%20state-of-the-art%20performance.%20Moreover%2C%20we%20show%20that%20UAE%20can%20be%20directly%20applied%20to%20pixel-space%20modeling%2C%20significantly%20improving%20both%20FID%20and%20IS%20over%20the%20vanilla%20JIT%20baseline.%20Our%20code%20is%20avaliable%20at%3A%20https%3A//github.com/WeichenFan/UAE.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19693v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Prism%2520Hypothesis%253A%2520Harmonizing%2520Semantic%2520and%2520Pixel%2520Representations%2520via%2520Unified%2520Autoencoding%26entry.906535625%3DWeichen%2520Fan%2520and%2520Haiwen%2520Diao%2520and%2520Quan%2520Wang%2520and%2520Dahua%2520Lin%2520and%2520Ziwei%2520Liu%26entry.1292438233%3DDeep%2520representations%2520across%2520modalities%2520are%2520inherently%2520intertwined.%2520In%2520this%2520paper%252C%2520we%2520systematically%2520analyze%2520the%2520spectral%2520characteristics%2520of%2520various%2520semantic%2520and%2520pixel%2520encoders.%2520Interestingly%252C%2520our%2520study%2520uncovers%2520a%2520highly%2520inspiring%2520and%2520rarely%2520explored%2520correspondence%2520between%2520an%2520encoder%2527s%2520feature%2520spectrum%2520and%2520its%2520functional%2520role%253A%2520semantic%2520encoders%2520primarily%2520capture%2520low-frequency%2520components%2520that%2520encode%2520abstract%2520meaning%252C%2520whereas%2520pixel%2520encoders%2520additionally%2520retain%2520high-frequency%2520information%2520that%2520conveys%2520fine-grained%2520detail.%2520This%2520heuristic%2520finding%2520offers%2520a%2520unifying%2520perspective%2520that%2520ties%2520encoder%2520behavior%2520to%2520its%2520underlying%2520spectral%2520structure.%2520We%2520define%2520it%2520as%2520the%2520Prism%2520Hypothesis%252C%2520where%2520each%2520data%2520modality%2520can%2520be%2520viewed%2520as%2520a%2520projection%2520of%2520the%2520natural%2520world%2520onto%2520a%2520shared%2520feature%2520spectrum%252C%2520just%2520like%2520the%2520prism.%2520Building%2520on%2520this%2520insight%252C%2520we%2520propose%2520Unified%2520Autoencoding%2520%2528UAE%2529%252C%2520a%2520model%2520that%2520harmonizes%2520semantic%2520structure%2520and%2520pixel%2520details%2520via%2520an%2520innovative%2520frequency-band%2520modulator%252C%2520enabling%2520their%2520seamless%2520coexistence.%2520Extensive%2520experiments%2520demonstrate%2520that%2520UAE%2520effectively%2520unifies%2520semantic%2520abstraction%2520and%2520pixel-level%2520fidelity%2520within%2520a%2520single%2520latent%2520space%252C%2520achieving%2520state-of-the-art%2520performance.%2520Moreover%252C%2520we%2520show%2520that%2520UAE%2520can%2520be%2520directly%2520applied%2520to%2520pixel-space%2520modeling%252C%2520significantly%2520improving%2520both%2520FID%2520and%2520IS%2520over%2520the%2520vanilla%2520JIT%2520baseline.%2520Our%2520code%2520is%2520avaliable%2520at%253A%2520https%253A//github.com/WeichenFan/UAE.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.19693v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Prism%20Hypothesis%3A%20Harmonizing%20Semantic%20and%20Pixel%20Representations%20via%20Unified%20Autoencoding&entry.906535625=Weichen%20Fan%20and%20Haiwen%20Diao%20and%20Quan%20Wang%20and%20Dahua%20Lin%20and%20Ziwei%20Liu&entry.1292438233=Deep%20representations%20across%20modalities%20are%20inherently%20intertwined.%20In%20this%20paper%2C%20we%20systematically%20analyze%20the%20spectral%20characteristics%20of%20various%20semantic%20and%20pixel%20encoders.%20Interestingly%2C%20our%20study%20uncovers%20a%20highly%20inspiring%20and%20rarely%20explored%20correspondence%20between%20an%20encoder%27s%20feature%20spectrum%20and%20its%20functional%20role {"title": "How Blind and Low-Vision Individuals Prefer Large Vision-Language Model-Generated Scene Descriptions", "author": "Na Min An and Eunki Kim and Wan Ju Kang and Sangryul Kim and James Thorne and Hyunjung Shim", "abstract": "For individuals with blindness or low vision (BLV), navigating complex environments can pose serious risks. Large Vision-Language Models (LVLMs) show promise for generating scene descriptions, but their effectiveness for BLV users remains underexplored. To address this gap, we conducted a user study with eight BLV participants to systematically evaluate preferences for six types of LVLM descriptions. While they helped to reduce fear and improve actionability, user ratings showed wide variation in sufficiency and conciseness. Furthermore, GPT-4o--despite its strong potential to refine descriptions--was not consistently preferred by participants. We use the insights obtained from the user study to build training data for building our new automatic evaluation metric that can capture BLV preferences effectively. Our findings underscore the urgent need for BLV-centered evaluation metrics and human-in-the-loop feedback to advance LVLM description quality for accessibility.", "link": "http://arxiv.org/abs/2502.14883v3", "date": "2026-04-01", "relevancy": 2.8488, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5996}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5996}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.51}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20Blind%20and%20Low-Vision%20Individuals%20Prefer%20Large%20Vision-Language%20Model-Generated%20Scene%20Descriptions&body=Title%3A%20How%20Blind%20and%20Low-Vision%20Individuals%20Prefer%20Large%20Vision-Language%20Model-Generated%20Scene%20Descriptions%0AAuthor%3A%20Na%20Min%20An%20and%20Eunki%20Kim%20and%20Wan%20Ju%20Kang%20and%20Sangryul%20Kim%20and%20James%20Thorne%20and%20Hyunjung%20Shim%0AAbstract%3A%20For%20individuals%20with%20blindness%20or%20low%20vision%20%28BLV%29%2C%20navigating%20complex%20environments%20can%20pose%20serious%20risks.%20Large%20Vision-Language%20Models%20%28LVLMs%29%20show%20promise%20for%20generating%20scene%20descriptions%2C%20but%20their%20effectiveness%20for%20BLV%20users%20remains%20underexplored.%20To%20address%20this%20gap%2C%20we%20conducted%20a%20user%20study%20with%20eight%20BLV%20participants%20to%20systematically%20evaluate%20preferences%20for%20six%20types%20of%20LVLM%20descriptions.%20While%20they%20helped%20to%20reduce%20fear%20and%20improve%20actionability%2C%20user%20ratings%20showed%20wide%20variation%20in%20sufficiency%20and%20conciseness.%20Furthermore%2C%20GPT-4o--despite%20its%20strong%20potential%20to%20refine%20descriptions--was%20not%20consistently%20preferred%20by%20participants.%20We%20use%20the%20insights%20obtained%20from%20the%20user%20study%20to%20build%20training%20data%20for%20building%20our%20new%20automatic%20evaluation%20metric%20that%20can%20capture%20BLV%20preferences%20effectively.%20Our%20findings%20underscore%20the%20urgent%20need%20for%20BLV-centered%20evaluation%20metrics%20and%20human-in-the-loop%20feedback%20to%20advance%20LVLM%20description%20quality%20for%20accessibility.%0ALink%3A%20http%3A//arxiv.org/abs/2502.14883v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520Blind%2520and%2520Low-Vision%2520Individuals%2520Prefer%2520Large%2520Vision-Language%2520Model-Generated%2520Scene%2520Descriptions%26entry.906535625%3DNa%2520Min%2520An%2520and%2520Eunki%2520Kim%2520and%2520Wan%2520Ju%2520Kang%2520and%2520Sa {"title": "Learning to Infer Parameterized Representations of Plants from 3D Scans", "author": "Samara Ghrer and Christophe Godin and Stefanie Wuhrer", "abstract": "Plants frequently contain numerous organs, organized in 3D branching systems defining the plant's architecture. Reconstructing the architecture of plants from unstructured observations is challenging because of self-occlusion and spatial proximity between organs, which are often thin structures. To achieve the challenging task, we propose an approach that allows to infer a parameterized representation of the plant's architecture from a given 3D scan of a plant. In addition to the plant's branching structure, this representation contains parametric information for each plant organ, and can therefore be used directly in a variety of tasks. In this data-driven approach, we train a recursive neural network with virtual plants generated using a procedural model. After training, the network allows to infer a parametric tree-like representation based on an input 3D point cloud. Our method is applicable to any plant that can be represented as binary axial tree. We quantitatively evaluate our approach on Chenopodium Album plants on reconstruction, segmentation and skeletonization, which are important problems in plant phenotyping. In addition to carrying out several tasks at once, our method achieves results on-par with strong baselines for each task. We apply our method, trained exclusively on synthetic data, to 3D scans and show that it generalizes well.", "link": "http://arxiv.org/abs/2505.22337v3", "date": "2026-04-01", "relevancy": 2.8487, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5773}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5773}, {"title": "Synthesizing Moving People wi

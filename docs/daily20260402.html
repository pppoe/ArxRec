{"title": "SMASH: Mastering Scalable Whole-Body Skills for Humanoid Ping-Pong with Egocentric Vision", "author": "Junli Ren and Yinghui Li and Kai Zhang and Penglin Fu and Haoran Jiang and Yixuan Pan and Guangjun Zeng and Tao Huang and Weizhong Guo and Peng Lu and Tianyu Li and Jingbo Wang and Li Chen and Hongyang Li and Ping Luo", "abstract": "Existing humanoid table tennis systems remain limited by their reliance on external sensing and their inability to achieve agile whole-body coordination for precise task execution. These limitations stem from two core challenges: achieving low-latency and robust onboard egocentric perception under fast robot motion, and obtaining sufficiently diverse task-aligned strike motions for learning precise yet natural whole-body behaviors. In this work, we present \\methodname, a modular system for agile humanoid table tennis that unifies scalable whole-body skill learning with onboard egocentric perception, eliminating the need for external cameras during deployment. Our work advances prior humanoid table-tennis systems in three key aspects. First, we achieve agile and precise ball interaction with tightly coordinated whole-body control, rather than relying on decoupled upper- and lower-body behaviors. This enables the system to exhibit diverse strike motions, including explosive whole-body smashes and low crouching shots. Second, by augmenting and diversifying strike motions with a generative model, our framework benefits from scalable motion priors and produces natural, robust striking behaviors across a wide workspace. Third, to the best of our knowledge, we demonstrate the first humanoid table-tennis system capable of consecutive strikes using onboard sensing alone, despite the challenges of low-latency perception, ego-motion-induced instability, and limited field of view. Extensive real-world experiments demonstrate stable and precise ball exchanges under high-speed conditions, validating scalable, perception-driven whole-body skill learning for dynamic humanoid interaction tasks.", "link": "http://arxiv.org/abs/2604.01158v1", "date": "2026-04-01", "relevancy": 2.8397, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5722}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5682}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5634}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SMASH%3A%20Mastering%20Scalable%20Whole-Body%20Skills%20for%20Humanoid%20Ping-Pong%20with%20Egocentric%20Vision&body=Title%3A%20SMASH%3A%20Mastering%20Scalable%20Whole-Body%20Skills%20for%20Humanoid%20Ping-Pong%20with%20Egocentric%20Vision%0AAuthor%3A%20Junli%20Ren%20and%20Yinghui%20Li%20and%20Kai%20Zhang%20and%20Penglin%20Fu%20and%20Haoran%20Jiang%20and%20Yixuan%20Pan%20and%20Guangjun%20Zeng%20and%20Tao%20Huang%20and%20Weizhong%20Guo%20and%20Peng%20Lu%20and%20Tianyu%20Li%20and%20Jingbo%20Wang%20and%20Li%20Chen%20and%20Hongyang%20Li%20and%20Ping%20Luo%0AAbstract%3A%20Existing%20humanoid%20table%20tennis%20systems%20remain%20limited%20by%20their%20reliance%20on%20external%20sensing%20and%20their%20inability%20to%20achieve%20agile%20whole-body%20coordination%20for%20precise%20task%20execution.%20These%20limitations%20stem%20from%20two%20core%20challenges%3A%20achieving%20low-latency%20and%20robust%20onboard%20egocentric%20perception%20under%20fast%20robot%20motion%2C%20and%20obtaining%20sufficiently%20diverse%20task-aligned%20strike%20motions%20for%20learning%20precise%20yet%20natural%20whole-body%20behaviors.%20In%20this%20work%2C%20we%20present%20%5Cmethodname%2C%20a%20modular%20system%20for%20agile%20humanoid%20table%20tennis%20that%20unifies%20scalable%20whole-body%20skill%20learning%20with%20onboard%20egocentric%20perception%2C%20eliminating%20the%20need%20for%20external%20cameras%20during%20deployment.%20Our%20work%20advances%20prior%20humanoid%20table-tennis%20systems%20in%20three%20key%20aspects.%20First%2C%20we%20achieve%20agile%20and%20precise%20ball%20interaction%20with%20tightly%20coordinated%20whole-body%20control%2C%20rather%20than%20relying%20on%20decoupled%20upper-%20and%20lower-body%20behaviors.%20This%20enables%20the%20system%20to%20exhibit%20diverse%20strike%20motions%2C%20including%20explosive%20whole-body%20smashes%20and%20low%20crouching%20shots.%20Second%2C%20by%20augmenting%20and%20diversifying%20strike%20motions%20with%20a%20generative%20model%2C%20our%20framework%20benefits%20from%20scalable%20motion%20priors%20and%20produces%20natural%2C%20robust%20striking%20behaviors%20across%20a%20wide%20workspace.%20Third%2C%20to%20the%20best%20of%20our%20knowledge%2C%20we%20demonstrate%20the%20first%20humanoid%20table-tennis%20system%20capable%20of%20consecutive%20strikes%20using%20onboard%20sensing%20alone%2C%20despite%20the%20challenges%20of%20low-latency%20perception%2C%20ego-motion-induced%20instability%2C%20and%20limited%20field%20of%20view.%20Extensive%20real-world%20experiments%20demonstrate%20stable%20and%20precise%20ball%20exchanges%20under%20high-speed%20conditions%2C%20validating%20scalable%2C%20perception-driven%20whole-body%20skill%20learning%20for%20dynamic%20humanoid%20interaction%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01158v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSMASH%253A%2520Mastering%2520Scalable%2520Whole-Body%2520Skills%2520for%2520Humanoid%2520Ping-Pong%2520with%2520Egocentric%2520Vision%26entry.906535625%3DJunli%2520Ren%2520and%2520Yinghui%2520Li%2520and%2520Kai%2520Zhang%2520and%2520Penglin%2520Fu%2520and%2520Haoran%2520Jiang%2520and%2520Yixuan%2520Pan%2520and%2520Guangjun%2520Zeng%2520and%2520Tao%2520Huang%2520and%2520Weizhong%2520Guo%2520and%2520Peng%2520 {"title": "Communicating about Space: Language-Mediated Spatial Integration Across Partial Views", "author": "Ankur Sikarwar and Debangan Mishra and Sudarshan Nikhil and Ponnurangam Kumaraguru and Aishwarya Agrawal", "abstract": "Humans build shared spatial understanding by communicating partial, viewpoint-dependent observations. We ask whether Multimodal Large Language Models (MLLMs) can do the same, aligning distinct egocentric views through dialogue to form a coherent, allocentric mental model of a shared environment. To study this systematically, we introduce COSMIC, a benchmark for Collaborative Spatial Communication. In this setting, two static MLLM agents observe a 3D indoor environment from different viewpoints and exchange natural-language messages to solve spatial queries. COSMIC contains 899 diverse scenes and 1250 question-answer pairs spanning five tasks. We find a capability hierarchy, MLLMs are most reliable at identifying shared anchor objects across views, perform worse on relational reasoning, and largely fail at building globally consistent maps, performing near chance, even for frontier models. Moreover, we find thinking capability yields gains in anchor grounding, but is insufficient for higher-level spatial communication. To contextualize model behavior, we collect 250 human-human dialogues. Humans achieve 95% aggregate accuracy, while the best model, Gemini-3-Pro-Thinking, reaches 72%, leaving substantial room for improvement. Moreover, human conversations grow more precise as partners align on a shared spatial understanding, whereas MLLMs keep exploring without converging, suggesting limited capacity to form and sustain a robust shared mental model throughout the dialogue. Our code and data is available at https://github.com/ankursikarwar/Cosmic.", "link": "http://arxiv.org/abs/2603.27183v2", "date": "2026-04-01", "relevancy": 2.8378, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5714}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5714}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5598}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Communicating%20about%20Space%3A%20Language-Mediated%20Spatial%20Integration%20Across%20Partial%20Views&body=Title%3A%20Communicating%20about%20Space%3A%20Language-Mediated%20Spatial%20Integration%20Across%20Partial%20Views%0AAuthor%3A%20Ankur%20Sikarwar%20and%20Debangan%20Mishra%20and%20Sudarshan%20Nikhil%20and%20Ponnurangam%20Kumaraguru%20and%20Aishwarya%20Agrawal%0AAbstract%3A%20Humans%20build%20shared%20spatial%20understanding%20by%20communicating%20partial%2C%20viewpoint-dependent%20observations.%20We%20ask%20whether%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20can%20do%20the%20same%2C%20aligning%20distinct%20egocentric%20views%20through%20dialogue%20to%20form%20a%20coherent%2C%20allocentric%20mental%20model%20of%20a%20shared%20environment.%20To%20study%20this%20systematically%2C%20we%20introduce%20COSMIC%2C%20a%20benchmark%20for%20Collaborative%20Spatial%20Communication.%20In%20this%20setting%2C%20two%20static%20MLLM%20agents%20observe%20a%203D%20indoor%20environment%20from%20different%20viewpoints%20and%20exchange%20natural-language%20messages%20to%20solve%20spatial%20queries.%20COSMIC%20contains%20899%20diverse%20scenes%20and%201250%20question-answer%20pairs%20spanning%20five%20tasks.%20We%20find%20a%20capability%20hierarchy%2C%20MLLMs%20are%20most%20reliable%20at%20identifying%20shared%20anchor%20objects%20across%20views%2C%20perform%20worse%20on%20relational%20reasoning%2C%20and%20largely%20fail%20at%20building%20globally%20consistent%20maps%2C%20performing%20near%20chance%2C%20even%20for%20frontier%20models.%20Moreover%2C%20we%20find%20thinking%20capability%20yields%20gains%20in%20anchor%20grounding%2C%20but%20is%20insufficient%20for%20higher-level%20spatial%20communication.%20To%20contextualize%20model%20behavior%2C%20we%20collect%20250%20human-human%20dialogues.%20Humans%20achieve%2095%25%20aggregate%20accuracy%2C%20while%20the%20best%20model%2C%20Gemini-3-Pro-Thinking%2C%20reaches%2072%25%2C%20leaving%20substantial%20room%20for%20improvement.%20Moreover%2C%20human%20conversations%20grow%20more%20precise%20as%20partners%20align%20on%20a%20shared%20spatial%20understanding%2C%20whereas%20MLLMs%20keep%20exploring%20without%20converging%2C%20suggesting%20limited%20capacity%20to%20form%20and%20sustain%20a%20robust%20shared%20mental%20model%20throughout%20the%20dialogue.%20Our%20code%20and%20data%20is%20available%20at%20https%3A//github.com/ankursikarwar/Cosmic.%0ALink%3A%20http%3A//arxiv.org/abs/2603.27183v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCommunicating%2520about%2520Space%253A%2520Language-Mediated%2520Spatial%2520Integration%2520Across%2520Partial%2520Views%26entry.906535625%3DAnkur%2520Sikarwar%2520and%2520Debangan%2520Mishra%2520and%2520Sudarshan%2520Nikhil%2520and%2520Ponnurangam%2520Kumaraguru%2520and%2520Aishwarya%2520Agrawal%26entry.1292438233%3DHumans%2520build%2520shared%2520spatial%2520understanding%2520by%2520communicating%2520partial%252C%2520viewpoint-dependent%2520observations.%2520We%2520ask%2520whether%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520can%2520do%2520the%2520same%252C%2520aligning%2520distinct%2520egocentric%2520views%2520through%2520dialogue%2520to%2520form%2520a%2520coherent%252C%2520allocentric%2520mental%2520model%2520of%2520a%2520shared%2520environment.%2520To%2520study%2520this%2520systematically%252C%2520we%2520introduce%2520COSMIC%252C%2520a%2520benchmark%2520for%2520Collaborative%2520Spatial%2520Communication.%2520In%2520this%2520setting%252C%2520two%2520static%2520MLLM%2520agents%2520observe%2520a%25203D%2520indoor%2520environment%2520from%2520different%2520viewpoints%2520and%2520exchange%2520natural-language%2520messages%2520to%2520solve%2520spatial%2520queries.%2520COSMIC%2520contains%2520899%2520diverse%2520scenes%2520and%25201250%2520question-answer%2520pairs%2520spanning%2520five%2520tasks.%2520We%2520find%2520a%2520capability%2520hierarchy%252C%2520MLLMs%2520are%2520most%2520reliable%2520at%2520identifying%2520shared%2520anchor%2520objects%2520across%2520views%252C%2520perform%2520worse%2520on%2520relational%2520reasoning%252C%2520and%2520largely%2520fail%2520at%2520building%2520globally%2520consistent%2520maps%252C%2520performing%2520near%2520chance%252C%2520even%2520for%2520frontier%2520models.%2520Moreover%252C%2520we%2520find%2520thinking%2520capability%2520yields%2520gains%2520in%2520anchor%2520grounding%252C%2520but%2520is%2520insufficient%2520for%2520higher-level%2520spatial%2520communication.%2520To%2520contextualize%2520model%2520behavior%252C%2520we%2520collect%2520250%2520human-human%2520dialogues.%2520Humans%2520achieve%252095%2525%2520aggregate%2520accuracy%252C%2520while%2520the%2520best%2520model%252C%2520Gemini-3-Pro-Thinking%252C%2520reaches%252072%2525%252C%2520leaving%2520substantial%2520room%2520for%2520improvement.%2520Moreover%252C%2520human%2520conversations%2520grow%2520more%2520precise%2520as%2520partners%2520align%2520on%2520a%2520shared%2520spatial%2520understanding%252C%2520whereas%2520MLLMs%2520keep%2520exploring%2520without%2520converging%252C%2520suggesting%2520limited%2520capacity%2520to%2520form%2520and%2520sustain%2520a%2520robust%2520shared%2520mental%2520model%2520throughout%2520the%2520dialogue.%2520Our%2520code%2520and%2520data%2520is%2520available%2520at%2520https%253A//github.com/ankursikarwar/Cosmic.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.27183v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/ {"title": "Are Large Vision-Language Models Ready to Guide Blind and Low-Vision Individuals?", "author": "Eunki Kim and Na Min An and Wan Ju Kang and Sangryul Kim and James Thorne and Hyunjung Shim", "abstract": "Large Vision-Language Models (LVLMs) demonstrate a promising direction for assisting individuals with blindness or low-vision (BLV). Yet, measuring their true utility in real-world scenarios is challenging because evaluating whether their descriptions are BLV-informative requires a fundamentally different approach from assessing standard scene descriptions. While the \"VLM-as-a-metric\" or \"LVLM-as-a-judge\" paradigm has emerged, existing evaluators still fall short of capturing the unique requirements of BLV-centric evaluation, lacking at least one of the following key properties: (1) High correlation with human judgments, (2) Long instruction understanding, (3) Score generation efficiency, and (4) Multi-dimensional assessment. To this end, we propose a unified framework to bridge the gap between automated evaluation and actual BLV needs. First, we conduct an in-depth user study with BLV participants to understand and quantify their navigational preferences, curating VL-GUIDEDATA, a large-scale BLV user-simulated preference dataset containing image-request-response-score pairs. We then leverage the dataset to develop an accessibility-aware evaluator, VL-GUIDE-S, which outperforms existing (L)VLM judges in both human alignment and inference efficiency. Notably, its effectiveness extends beyond a single domain, demonstrating strong performance across multiple fine-grained, BLV-critical dimensions. We hope our work lays as a foundation for automatic AI judges that advance safe, barrier-free navigation for BLV users.", "link": "http://arxiv.org/abs/2510.00766v2", "date": "2026-04-01", "relevancy": 2.8276, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simila ticipants%20to%20understand%20and%20quantify%20their%20navigational%20preferences%2C%20curating%20VL-GUIDEDATA%2C%20a%20large-scale%20BLV%20user-simulated%20preference%20dataset%20containing%20image-request-response-score%20pairs.%20We%20then%20leverage%20the%20dataset%20to%20develop%20an%20accessibility-aware%20evaluator%2C%20VL-GUIDE-S%2C%20which%20outperforms%20existing%20%28L%29VLM%20judges%20in%20both%20human%20alignment%20and%20inference%20efficiency.%20Notably%2C%20its%20effectiveness%20extends%20beyond%20a%20single%20domain%2C%20demonstrating%20strong%20performance%20across%20multiple%20fine-grained%2C%20BLV-critical%20dimensions.%20We%20hope%20our%20work%20lays%20as%20a%20foundation%20for%20automatic%20AI%20judges%20that%20advance%20safe%2C%20barrier-free%20navigation%20for%20BLV%20users.%0ALink%3A%20http%3A//arxiv.org/abs/2510.00766v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520Large%2520Vision-Language%2520Models%2520Ready%2520to%2520Guide%2520Blind%2520and%2520Low-Vision%2520Individuals%253F%26entry.906535625%3DEunki%2520Kim%2520and%2520Na%2520Min%2520An%2520and%2520Wan%2520Ju%2520Kang%2520and%2520Sangryul%2520Kim%2520and%2520James%2520Thorne%2520and%2520Hyunjung%2520Shim%26entry.1292438233%3DLarge%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520demonstrate%2520a%2520promising%2520direction%2520for%2520assisting%2520individuals%2520with%2520blindness%2520or%2520low-vision%2520%2528BLV%2529.%2520Yet%252C%2520measuring%2520their%2520true%2520utility%2520in%2520real-world%2520scenarios%2520is%2520challenging%2520because%2520evaluating%2520whether%2520their%2520descriptions%2520are%2520BLV-informative%2520requires%2520a%2520fundamentally%2520different%2520approach%2520from%2520assessing%2520standard%2520scene%2520descriptions.%2520While%2520the%2520%2522VLM-as-a-metric%2522%2520or%2520%2522LVLM-as-a-judge%2522%2520paradigm%2520has%2520emerged%252C%2520ex {"title": "Sparkle: A Robust and Versatile Representation for Point Cloud based Human Motion Capture", "author": "Yiming Ren and Yujing Sun and Aoru Xue and Kwok-Yan Lam and Yuexin Ma", "abstract": "Point cloud-based motion capture leverages rich spatial geometry and privacy-preserving sensing, but learning robust representations from noisy, unstructured point clouds remains challenging. Existing approaches face a struggle trade-off between point-based methods (geometrically detailed but noisy) and skeleton-based ones (robust but oversimplified). We address the fundamental challenge: how to construct an effective representation for human motion capture that can balance expressiveness and robustness. In this paper, we propose Sparkle, a structured representation unifying skeletal joints and surface anchors with explicit kinematic-geometric factorization. Our framework, SparkleMotion, learns this representation through hierarchical modules embedding geometric continuity and kinematic constraints. By explicitly disentangling internal kinematic structure from external surface geometry, SparkleMotion achieves state-of-the-art performance not only in accuracy but crucially in robustness and generalization under severe domain shifts, noise, and occlusion. Extensive experiments demonstrate our superiority across diverse sensor types and challenging real-world scenarios.", "link": "http://arxiv.org/abs/2604.00857v1", "date": "2026-04-01", "relevancy": 2.7789, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5862}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5472}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.534}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sparkle%3A%20A%20Robust%20and%20Versatile%20Representation%20for%20Point%20Cloud%20based%20Human%20Motion%20Capture&body=Title%3A%20Sparkle%3A%20A%20Robust%20and%20Versatile%20Representation%20for%20Point%20Cloud%20based%20Human%20Motion%20Capture%0AAuthor%3A%20Yiming%20Ren%20and%20Yujing%20Sun%20and%20Aoru%20Xue%20and%20Kwok-Yan%20Lam%20and%20Yuexin%20Ma%0AAbstract%3A%20Point%20cloud-based%20motion%20capture%20leverages%20rich%20spatial%20geometry%20and%20privacy-preserving%20sensing%2C%20but%20learning%20robust%20representations%20from%20noisy%2C%20unstructured%20point%20clouds%20remains%20challenging.%20Existing%20approaches%20face%20a%20struggle%20trade-off%20between%20point-based%20methods%20%28geometrically%20detailed%20but%20noisy%29%20and%20skeleton-based%20ones%20%28robust%20but%20oversimplified%29.%20We%20address%20the%20fundamental%20challenge%3A%20how%20to%20construct%20an%20effective%20representation%20for%20human%20motion%20capture%20that%20can%20balance%20expressiveness%20and%20robustness.%20In%20this%20paper%2C%20we%20propose%20Sparkle%2C%20a%20structured%20representation%20unifying%20skeletal%20joints%20and%20surface%20anchors%20with%20explicit%20kinematic-geometric%20factorization.%20Our%20framework%2C%20SparkleMotion%2C%20learns%20this%20representation%20through%20hierarchical%20modules%20embedding%20geometric%20continuity%20and%20kinematic%20constraints.%20By%20explicitly%20disentangling%20internal%20kinematic%20structure%20from%20external%20surface%20geometry%2C%20SparkleMotion%20achieves%20state-of-the-art%20performance%20not%20only%20in%20accuracy%20but%20crucially%20in%20robustness%20and%20generalization%20under%20severe%20domain%20shifts%2C%20noise%2C%20and%20occlusion.%20Extensive%20experiments%20demonstrate%20our%20superiority%20across%20diverse%20sensor%20types%20and%20challenging%20real-world%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00857v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7 {"title": "Harnessing the Power of Local Representations for Few-Shot Classification", "author": "Shi Tang and Guiming Luo and Xinchen Ye and Zhiyi Xia", "abstract": "Generalizing to novel classes unseen during training is a key challenge of few-shot classification. Recent metric-based methods try to address this by local representations. However, they are unable to take full advantage of them due to (i) improper supervision for pretraining the feature extractor, and (ii) lack of adaptability in the metric for handling various possible compositions of local feature sets. In this work, we harness the power of local representations in improving novel-class generalization. For the feature extractor, we design a novel pretraining paradigm that learns randomly cropped patches by soft labels. It utilizes the class-level diversity of patches while diminishing the impact of their semantic misalignments to hard labels. To align network output with soft labels, we also propose a UniCon KL-Divergence that emphasizes the equal contribution of each base class in describing \"non-base\" patches. For the metric, we formulate measuring local feature sets as an entropy-regularized optimal transport problem to introduce the ability to handle sets consisting of homogeneous elements. Furthermore, we design a Modulate Module to endow the metric with the necessary adaptability. Our method achieves new state-of-the-art performance on three popular benchmarks. Moreover, it exceeds state-of-the-art transductive and cross-modal methods in the fine-grained scenario.", "link": "http://arxiv.org/abs/2407.01967v2", "date": "2026-04-01", "relevancy": 2.7727, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5921}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5376}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Harnessing%20the%20Power%20of%20Local%20Representations%20for%20Few-Shot%20Classification&body=Title%3A%20Harnessing%20the%20Power%20of%20Local%20Representations%20for%20Few-Shot%20Classification%0AAuthor%3A%20Shi%20Tang%20and%20Guiming%20Luo%20and%20Xinchen%20Ye%20and%20Zhiyi%20Xia%0AAbstract%3A%20Generalizing%20to%20novel%20classes%20unseen%20during%20training%20is%20a%20key%20challenge%20of%20few-shot%20classification.%20Recent%20metric-based%20methods%20try%20to%20address%20this%20by%20local%20representations.%20However%2C%20they%20are%20unable%20to%20take%20full%20advantage%20of%20them%20due%20to%20%28i%29%20improper%20supervision%20for%20pretraining%20the%20feature%20extractor%2C%20and%20%28ii%29%20lack%20of%20adaptability%20in%20the%20metric%20for%20handling%20various%20possible%20compositions%20of%20local%20feature%20sets.%20In%20this%20work%2C%20we%20harness%20the%20power%20of%20local%20representations%20in%20improving%20novel-class%20generalization.%20For%20the%20feature%20extractor%2C%20we%20design%20a%20novel%20pretraining%20paradigm%20that%20learns%20randomly%20cropped%20patches%20by%20soft%20labels.%20It%20utilizes%20the%20class-level%20diversity%20of%20patches%20while%20diminishing%20the%20impact%20of%20their%20semantic%20misalignments%20to%20hard%20labels.%20To%20align%20network%20output%20with%20soft%20labels%2C%20we%20also%20propose%20a%20UniCon%20KL-Divergence%20that%20emphasizes%20the%20equal%20contribution%20of%20each%20base%20class%20in%20describing%20%22non-base%22%20patches.%20For%20the%20metric%2C%20we%20formulate%20measuring%20local%20feature%20sets%20as%20an%20entropy-regularized%20optimal%20transport%20problem%20to%20introduce%20the%20ability%20to%20handle%20sets%20consisting%20of%20homogen {"title": "Multicentric thrombus segmentation using an attention-based recurrent network with gradual modality dropout", "author": "Sofia Vargas-Ibarra and Vincent Vigneron and Hichem Maaref and Sonia Garcia-Salicetti", "abstract": "Detecting and delineating tiny targets in 3D brain scans is a central yet under-addressed challenge in medical imaging.In ischemic stroke, for instance, the culprit thrombus is small, low-contrast, and variably expressed across modalities(e.g., susceptibility-weighted T2 blooming, diffusion restriction on DWI/ADC), while real-world multi-center dataintroduce domain shifts, anisotropy, and frequent missing sequences. We introduce a methodology that couples an attention-based recurrent segmentation network (UpAttLLSTM), a training schedule that progressively increases the difficulty of hetero-modal learning, with gradual modality dropout, UpAttLLSTM aggregates context across slices via recurrent units (2.5D) and uses attention gates to fuse complementary cues across available sequences, making it robust to anisotropy and class imbalance. Gradual modality dropout systematically simulates site heterogeneity,noise, and missing modalities during training, acting as both augmentation and regularization to improve multi-center generalization. On a monocentric cohort, our approach detects thrombi in >90% of cases with a Dice score of 0.65. In a multi-center setting with missing modalities, it achieves-80% detection with a Dice score around 0.35. Beyond stroke, the proposed methodology directly transfers to other small-lesion tasks in 3D medical imaging where targets are scarce, subtle, and modality-dependent", "link": "http://arxiv.org/abs/2604.00817v1", "date": "2026-04-01", "relevancy": 2.7556, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5599}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5504}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5431}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multicentric%20thrombus%20segmentation%20using%20an%20attention-based%20recurrent%20network%20with%20gradual%20modality%20dropout&body=Title%3A%20Multicentric%20thrombus%20segmentation%20using%20an%20attention-based%20recurrent%20network%20with%20gradual%20modality%20dropout%0AAuthor%3A%20Sofia%20Vargas-Ibarra%20and%20Vincent%20Vigneron%20and%20Hichem%20Maaref%20and%20Sonia%20Garcia-Salicetti%0AAbstract%3A%20Detecting%20and%20delineating%20tiny%20targets%20in%203D%20brain%20scans%20is%20a%20central%20yet%20under-addressed%20challenge%20in%20medical%20imaging.In%20ischemic%20stroke%2C%20for%20instance%2C%20the%20culprit%20thrombus%20is%20small%2C%20low-contrast%2C%20and%20variably%20expressed%20across%20modalities%28e.g.%2C%20susceptibility-weighted%20T2%20blooming%2C%20diffusion%20restriction%20on%20DWI/ADC%29%2C%20while%20real-world%20multi-center%20dataintroduce%20domain%20shifts%2C%20anisotropy%2C%20and%20frequent%20missing%20sequences.%20We%20introduce%20a%20methodology%20that%20couples%20an%20attention-based%20recurrent%20segmentation%20network%20%28UpAttLLSTM%29%2C%20a%20training%20schedule%20that%20progressively%20increases%20the%20difficulty%20of%20hetero-modal%20learning%2C%20with%20gradual%20modality%20dropout%2C%20UpAttLLSTM%20aggregates%20context%20across%20slices%20via%20recurrent%20units%20%282.5D%29%20and%20uses%20attention%20gates%20to%20fuse%20complementary%20cues%20across%20available%20sequences%2C%20making%20it%20robust%20to%20anisotropy%20and%20class%20imbalance.%20Gradual%20modality%20dropout%20systematically%20simulates%20site%20heterogeneity%2Cnoise%2C%20and%20missing%20modalities%20during%20training%2C%20acting%20as%20both%20augmentation%20and%20regularization%20to%20improve%20multi-center%20generalization.%20On%20a%20monocentric%20cohort%2C%20our%20approach%20detects%20thrombi%20in%20%3E90%25%20of%20cases%20with%20a%20Dice%20score%20of%200.65.%20In%20a%20multi-center%20setting%20with%20missing%20modalities%2C%20it%20achieves-80%25%20detection%20with%20a%20Dice%20score%20around%200.35.%20Beyond%20stroke%2C%20the%20proposed%20methodology%20directly%20transfers%20to%20other%20small-lesion%20tasks%20in%203D%20medical%20imaging%20where%20targets%20are%20scarce%2C%20subtle%2C%20and%20modality-dependent%0ALink%3A%20http%3A//arxiv.org/abs/2604.00817v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulticentric%2520thrombus%2520segmentation%2520using%2520an%2520attention-based%2520recurrent%2520network%2520with%2520gradual%2520modality%2520dropout%26entry.906535625%3DSofia%2520Vargas-Ibarra%2520and%2520Vincent%2520Vigneron%2520and%2520Hichem%2520Maaref%2520and%2520Sonia%2520Garcia-Salicetti%26entry.1292438233%3DDetecting%2520and%2520delineating%2520tiny%2520targets%2520in%25203D%2520brain%2520scans%2520is%2520a%2520central%2520yet%2520under-addressed%2520challenge%2520in%2520medical%2520imaging.In%2520ischemic%2520stroke%252C%2520for%2520instance%252C%2520the%2520culprit%2520thrombus%2520is%2520small%252C%2520low-contrast%252C%2520and%2520variably%2520expressed%2520across%2520modalities%2528e.g.%252C%2520susceptibility-weighted%2520T2%2520blooming%252C%2520diffusion%2520restriction%2520on%2520DWI/ADC%2529%252C%2520while%2520real-world%2520multi-center%2520dataintroduce%2520domain%2520shifts%252C%2520anisotropy%252C%2520and%2520frequent%2520missing%2520sequences.%2520We%2520introduce%2520a%2520methodology%2520that%2520couples%2520an%2520attention-based%2520recurrent%2520segmentation%2520network%2520%2528UpAttLLSTM%2529%252C%2520a%2520training%2520schedule%2520that%2520progressively%2520increases%2520the%2520difficult {"title": "Attention-guided reference point shifting for Gaussian-mixture-based partial point set registration", "author": "Mizuki Kikkawa and Tatsuya Yatagawa and Yutaka Ohtake and Hiromasa Suzuki", "abstract": "This study investigates the impact of the invariance of feature vectors for partial-to-partial point set registration under translation and rotation of input point sets, particularly in the realm of techniques based on deep learning and Gaussian mixture models (GMMs). We reveal both theoretical and practical problems associated with such deep-learning-based registration methods using GMMs, with a particular focus on the limitations of DeepGMR, a pioneering study in this line, to the partial-to-partial point set registration. Our primary goal is to uncover the causes behind such methods and propose a comprehensible solution for that. To address this, we introduce an attention-based reference point shifting (ARPS) layer, which robustly identifies a common reference point of two partial point sets, thereby acquiring transformation-invariant features. The ARPS layer employs a well-studied attention module to find a common reference point rather than the overlap region. Owing to this, it significantly enhances the performance of DeepGMR and its recent variant, UGMMReg. Furthermore, these extension models outperform even prior deep learning methods using attention blocks and Transformer to extract the overlap region or common reference points. We believe these findings provide deeper insights into registration methods using deep learning and GMMs.", "link": "http://arxiv.org/abs/2512.02496v2", "date": "2026-04-01", "relevancy": 2.7548, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5743}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5447}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5339}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attention-guided%20reference%20point%20shifting%20for%20Gaussian-mixture-based%20partial%20point%20set%20registration&body=Title%3A%20Attention-guided%20reference%20point%20shifting%20for%20Gaussian-mixture-based%20partial%20point%20set%20registration%0AAuthor%3A%20Mizuki%20Kikkawa%20and%20Tatsuya%20Yatagawa%20and%20Yutaka%20Ohtake%20and%20Hiromasa%20Suzuki%0AAbstract%3A%20This%20study%20investigates%20the%20impact%20of%20the%20invariance%20of%20feature%20vectors%20for%20partial-to-partial%20point%20set%20registration%20under%20translation%20and%20rotation%20of%20input%20point%20sets%2C%20particularly%20in%20the%20realm%20of%20techniques%20based%20on%20deep%20learning%20and%20Gaussian%20mixture%20models%20%28GMMs%29.%20We%20reveal%20both%20theoretical%20and%20practical%20problems%20associated%20with%20such%20deep-learning-based%20registration%20methods%20using%20GMMs%2C%20with%20a%20particular%20focus%20on%20the%20limitations%20of%20DeepGMR%2C%20a%20pioneering%20study%20in%20this%20line%2C%20to%20the%20partial-to-partial%20point%20set%20registration.%20Our%20primary%20goal%20is%20to%20uncover%20the%20causes%20behind%20such%20methods%20and%20propose%20a%20comprehensible%20solution%20for%20that.%20To%20address%20this%2C%20we%20introduce%20an%20attention-based%20reference%20point%20shifting%20%28ARPS%29%20layer%2C%20which%20robustly%20identifies%20a%20common%20reference%20point%20of%20two%20partial%20point%20sets%2C%20thereby%20acquiring%20transformation-invariant%20features.%20The%20ARPS%20layer%20employs%20a%20well-studied%20attention%20module%20to%20find%20a%20common%20reference%20point%20rather%20than%20the%20overlap%20region.%20Owing%20to%20this%2C%20it%20significantly%20enhances%20the%20performance%20of%20DeepGMR%20a ration%20methods%20using%20GMMs%2C%20with%20a%20particular%20focus%20on%20the%20limitations%20of%20DeepGMR%2C%20a%20pioneering%20study%20in%20this%20line%2C%20to%20the%20partial-to-partial%20point%20set%20registration.%20Our%20primary%20goal%20is%20to%20uncover%20the%20causes%20behind%20such%20methods%20and%20propose%20a%20comprehensible%20solution%20for%20that.%20To%20address%20this%2C%20we%20introduce%20an%20attention-based%20reference%20point%20shifting%20%28ARPS%29%20layer%2C%20which%20robustly%20identifies%20a%20common%20reference%20point%20of%20two%20partial%20point%20sets%2C%20thereby%20acquiring%20transformation-invariant%20features.%20The%20ARPS%20layer%20employs%20a%20well-studied%20attention%20module%20to%20find%20a%20common%20reference%20point%20rather%20than%20the%20overlap%20region.%20Owing%20to%20this%2C%20it%20significantly%20enhances%20the%20performance%20of%20DeepGMR%20and%20its%20recent%20variant%2C%20UGMMReg.%20Furthermore%2C%20these%20extension%20models%20outperform%20even%20prior%20deep%20learning%20methods%20using%20attention%20blocks%20and%20Transformer%20to%20extract%20the%20overlap%20region%20or%20common%20reference%20points.%20We%20believe%20these%20findings%20provide%20deeper%20insights%20into%20registration%20methods%20using%20deep%20learning%20and%20GMMs.&entry.1838667208=http%3A//arxiv.org/abs/2512.02496v2&entry.124074799=Read"},
{"title": "SA-CycleGAN-2.5D: Self-Attention CycleGAN with Tri-Planar Context for Multi-Site MRI Harmonization", "author": "Ishrith Gowda and Chunwei Liu", "abstract": "Multi-site neuroimaging analysis is fundamentally confounded by scanner-induced covariate shifts, where the marginal distribution of voxel intensities $P(\\mathbf{x})$ varies non-linearly across acquisition protocols while the conditional anatomy $P(\\mathbf{y}|\\mathbf{x})$ remains constant. This is particularly detrimental to radiomic reproducibility, where acquisition variance often exceeds biological pathology variance. Existing statistical harmonization methods (e.g., ComBat) operate in feature space, precluding spatial downstream tasks, while standard deep learning approaches are theoretically bounded by local effective receptive fields (ERF), failing to model the global intensity correlations characteristic of field-strength bias.\n  We propose SA-CycleGAN-2.5D, a domain adaptation framework motivated by the $H\u0394H$-divergence bound of Ben-David et al., integrating three architectural innovations: (1) A 2.5D tri-planar manifold injection preserving through-plane gradients $\\nabla_z$ at $O(HW)$ complexity; (2) A U-ResNet generator with dense voxel-to-voxel self-attention, surpassing the $O(\\sqrt{L})$ receptive field limit of CNNs to model global scanner field biases; and (3) A spectrally-normalized discriminator constraining the Lipschitz constant ($K_D \\le 1$) for stable adversarial optimization. Evaluated on 654 glioma patients across two institutional domains (BraTS and UPenn-GBM), our method reduces Maximum Mean Discrepancy (MMD) by 99.1% ($1.729 \\to 0.015$) and degrades domain classifier accuracy to near-chance (59.7%). Ablation confirms that global attention is statistically essential (Cohen's $d = 1.32$, $p < 0.001$) for the harder heterogeneous-to-homogeneous translation direction. By bridging 2D efficiency and 3D consistency, our framework yields voxel-level harmonized images that preserve tumor pathophysiology, enabling reproducible multi-center radiomic analysis.", "link": "http://arxiv.org/abs/2603.17219v2", "date": "2026-04-01", "relevancy": 2.7419, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5611}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5502}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5339}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SA-CycleGAN-2.5D%3A%20Self-Attention%20CycleGAN%20with%20Tri-Planar%20Context%20for%20Multi-Site%20MRI%20Harmonization&body=Title%3A%20SA-CycleGAN-2.5D%3A%20Self-Attention%20CycleGAN%20with%20Tri-Planar%20Context%20for%20Multi-Site%20MRI%20Harmonization%0AAuthor%3A%20Ishrith%20Gowda%20and%20Chunwei%20Liu%0AAbstract%3A%20Multi-site%20neuroimaging%20analysis%20is%20fundamentally%20confounded%20by%20scanner-induced%20covariate%20shifts%2C%20where%20the%20marginal%20distribution%20of%20voxel%20intensities%20%24P%28%5Cmathbf%7Bx%7D%29%24%20varies%20non-linearly%20across%20acquisition%20protocols%20while%20the%20conditional%20anatomy%20%24P%28%5Cmathbf%7By%7D%7C%5Cmathbf%7Bx%7D%29%24%20remains%20constant.%20This%20is%20particularly%20detrimental%20to%20radiomic%20reproducibility%2C%20where%20acquisition%20variance%20often%20exceeds%20biological%20pathology%20variance.%20Existing%20statistical%20harmonization%20methods%20%28e.g.%2C%20ComBat%29%20operate%20in%20feature%20space%2C%20precluding%20spatial%20downstream%20tasks%2C%20while%20standard%20deep%20learning%20approaches%20are%20theoretically%20bounded%20by%20local%20effective%20receptive%20fields%20%28ERF%29%2C%20failing%20to%20model%20the%20global%20intensity%20correlations%20characteristic%20of%20field-strength%20bias.%0A%20%20We%20propose%20SA-CycleGAN-2.5D%2C%20a%20domain%20adaptation%20framework%20motivated%20by%20the%20%24H%CE%94H%24-divergence%20bound%20of%20Ben-David%20et%20al.%2C%20integrating%20three%20architectural%20innovations%3A%20%281%29%20A%202.5D%20tri-planar%20manifold%20injection%20preserving%20through-plane%20gradients%20%24%5Cnabla_z%24%20at%20%24O%28HW%29%24%20complexity%3B%20%282%29%20A%20U-ResNet%20generator%20with%20dense%20voxel-to-voxel%20self-attention%2C%20surpassing%20the%20%24O%28%5Csqrt%7BL%7D%29%24%20receptive%20field%20limit%20of%20CNNs%20to%20model%20global%20scanner%20field%20biases%3B%20and%20%283%29%20A%20spectrally-normalized%20discriminator%20constraining%20the%20Lipschitz%20constant%20%28%24K_D%20%5Cle%201%24%29%20for%20stable%20adversarial%20optimization.%20Evaluated%20on%20654%20glioma%20patients%20across%20two%20institutional%20domains%20%28BraTS%20and%20UPenn-GBM%29%2C%20our%20method%20reduces%20Maximum%20Mean%20Discrepancy%20%28MMD%29%20by%2099.1%25%20%28%241.729%20%5Cto%200.015%24%29%20and%20degrades%20domain%20classifier%20accuracy%20to%20near-chance%20%2859.7%25%29.%20Ablation%20confirms%20that%20global%20attention%20is%20statistically%20essential%20%28Cohen%27s%20%24d%20%3D%201.32%24%2C%20%24p%20%3C%200.001%24%29%20for%20the%20harder%20heterogeneous-to-homogeneous%20translation%20direction.%20By%20bridging%202D%20efficiency%20and%203D%20consistency%2C%20our%20framework%20yields%20voxel-level%20harmonized%20images%20that%20preserve%20tumor%20pathophysiology%2C%20enabling%20reproducible%20multi-center%20radiomic%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17219v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSA-CycleGAN-2.5D%253A%2520Self-Attention%2520CycleGAN%2520with%2520Tri-Planar%2520Context%2520for%2520Multi-Site%2520MRI%2520Harmonization%26entry.906535625%3DIshrith%2520Gowda%2520and%2520Chu {"title": "CHEEM: Continual Learning by Reuse, New, Adapt and Skip -- A Hierarchical Exploration-Exploitation Approach", "author": "Chinmay Savadikar and Michelle Dai and Tianfu Wu", "abstract": "To effectively manage the complexities of real-world dynamic environments, continual learning must incrementally acquire, update, and accumulate knowledge from a stream of tasks of different nature without suffering from catastrophic forgetting of prior knowledge. While this capability is innate to human cognition, it remains a significant challenge for modern deep learning systems. At the heart of this challenge lies the stability-plasticity dilemma: the need to balance leveraging prior knowledge, integrating novel information, and allocating model capacity adaptively based on task complexity and synergy. In this paper, we propose a novel exemplar-free class-incremental continual learning (ExfCCL) framework that addresses these issues through a Hierarchical Exploration-Exploitation (HEE) approach. The core of our method is a HEE-guided efficient neural architecture search (HEE-NAS) that enables a learning-to-adapt backbone via four primitive operations - reuse, new, adapt, and skip - thereby serving as an internal memory that dynamically updates selected components across streaming tasks. To address the task ID inference problem in ExfCCL, we exploit an external memory of task centroids proposed in the prior art. We term our method CHEEM (Continual Hierarchical-Exploration-Exploitation Memory). CHEEM is evaluated on the challenging MTIL and VDD benchmarks using both Tiny and Base Vision Transformers and a proposed holistic Figure-of-Merit (FoM) metric. It significantly outperforms state-of-the-art prompting-based continual learning methods, closely approaching full fine-tuning upper bounds. Furthermore, it learns adaptive model structures tailored to individual tasks in a semantically meaningful way. Our code is available at https://github.com/savadikarc/cheem .", "link": "http://arxiv.org/abs/2303.08250v5", "date": "2026-04-01", "relevancy": 2.725, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.551}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5461}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CHEEM%3A%20Continual%20Learning%20by%20Reuse%2C%20New%2C%20Adapt%20and%20Skip%20--%20A%20Hierarchical%20Exploration-Exploitation%20Approach&body=Title%3A%20CHEEM%3A%20Continual%20Learning%20by%20Reuse%2C%20New%2C%20Adapt%20and%20Skip%20--%20A%20Hierarchical%20Exploration-Exploitation%20Approach%0AAuthor%3A%20Chinmay%20Savadikar%20and%20Michelle%20Dai%20and%20Tianfu%20Wu%0AAbstract%3A%20To%20effectively%20manage%20the%20complexities%20of%20real-world%20dynamic%20environments%2C%20continual%20learning%20must%20incrementally%20acquire%2C%20update%2C%20and%20accumulate%20knowledge%20from%20a%20stream%20of%20tasks%20of%20different%20nature%20without%20suffering%20from%20catastrophic%20forgetting%20of%20prior%20knowledge.%20While%20this%20capability%20is%20innate%20to%20human%20cognition%2C%20it%20remains%20a%20significant%20challenge%20for%20modern%20deep%20learning%20systems.%20At%20the%20heart%20of%20this%20challenge%20lies%20the%20stability-plasticity%20dilemma%3A%20the%20need%20to%20balance%20leveraging%20prior%20knowledge%2C%20integrating%20novel%20information%2C%20and%20allocating%20model%20capacity%20adaptively%20based%20on%20task%20complexity%20and%20synergy.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20exemplar-free%20class-incremental%20continual%20learning%20%28ExfCCL%29%20framework%20that%20addresses%20these%20issues%20through%20a%20Hierarchical%20Exploration-Exploitation%20%28HEE%29%20approach.%20The%20core%20of%20our%20method%20is%20a%20HEE-guided%20efficient%20neural%20architecture%20search%20%28HEE-NAS%29%20that%20enables%20a%20learning-to-adapt%20backbone%20via%20four%20primitive%20operations%20-%20reuse%2C%20new%2C%20adapt%2C%20and%20skip%20-%20thereby%20serving%20as%20an%20internal%20memory%20that%20dynamically%20updates%20selected%20components%20across%20streaming%20tasks.%20To%20address%20the%20task%20ID%20inference%20problem%20in%20ExfCCL%2C%20we%20exploit%20an%20external%20memory%20of%20task%20centroids%20proposed%20in%20the%20prior%20art.%20We%20term%20our%20method%20CHEEM%20%28Continual%20Hierarchical-Exploration-Exploitation%20Memory%29.%20CHEEM%20is%20evaluated%20on%20the%20challenging%20MTIL%20and%20VDD%20benchmarks%20using%20both%20Tiny%20and%20Base%20Vision%20Transformers%20and%20a%20proposed%20holistic%20Figure-of-Merit%20%28FoM%29%20metric.%20It%20significantly%20outperforms%20state-of-the-art%20prompting-based%20continual%20learning%20methods%2C%20closely%20approaching%20full%20fine-tuning%20upper%20bounds.%20Furthermore%2C%20it%20learns%20adaptive%20model%20structures%20tailored%20to%20individual%20tasks%20in%20a%20semantically%20meaningful%20way.%20Our%20code%20is%20available%20at%20https%3A//github.com/savadikarc/cheem%20.%0ALink%3A%20http%3A//arxiv.org/abs/2303.08250v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCHEEM%253A%2520Continual%2520Learning%2520by%2520Reuse%252C%2520New%252C%2520Adapt%2520and%2520Skip%2520--%2520A%2520Hierarchical%2520Exploration-Exploitation%2520Approach%26entry.906535625%3DChinmay%2520Savadikar%2520and%2520Michelle%2520Dai%2520and%2520Tianfu%2520Wu%26entry.1292438233%3DTo%2520effectively%2520manage%2520the%2520complexities%2520of%2520real-world%2520dynamic%2520environments%252C%2520continual%2520learning%2520must%2520incrementally%2520acquire%252C%2520update%25 {"title": "A 4D Representation for Training-Free Agentic Reasoning from Monocular Laparoscopic Video", "author": "Maximilian Fehrentz and Nicolas Stellwag and Robert Wiebe and Nicole Thorisch and Fabian Grob and Patrick Remerscheid and Ken-Joel Simmoteit and Benjamin D. Killeen and Christian Heiliger and Nassir Navab", "abstract": "Spatiotemporal reasoning is a fundamental capability for artificial intelligence (AI) in soft tissue surgery, paving the way for intelligent assistive systems and autonomous robotics. While 2D vision-language models show increasing promise at understanding surgical video, the spatial complexity of surgical scenes suggests that reasoning systems may benefit from explicit 4D representations. Here, we propose a framework for equipping surgical agents with spatiotemporal tools based on an explicit 4D representation, enabling AI systems to ground their natural language reasoning in both time and 3D space. Leveraging models for point tracking, depth, and segmentation, we develop a coherent 4D model with spatiotemporally consistent tool and tissue semantics. A Multimodal Large Language Model (MLLM) then acts as an agent on tools derived from the explicit 4D representation (e.g., trajectories) without any fine-tuning. We evaluate our method on a new dataset of 134 clinically relevant questions and find that the combination of a general purpose reasoning backbone and our 4D representation significantly improves spatiotemporal understanding and allows for 4D grounding. We demonstrate that spatiotemporal intelligence can be \"assembled\" from 2D MLLMs and 3D computer vision models without additional training. Code, data, and examples are available at https://tum-ai.github.io/surg4d/", "link": "http://arxiv.org/abs/2604.00867v1", "date": "2026-04-01", "relevancy": 2.7108, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5443}, {"title": rom%20the%20explicit%204D%20representation%20%28e.g.%2C%20trajectories%29%20without%20any%20fine-tuning.%20We%20evaluate%20our%20method%20on%20a%20new%20dataset%20of%20134%20clinically%20relevant%20questions%20and%20find%20that%20the%20combination%20of%20a%20general%20purpose%20reasoning%20backbone%20and%20our%204D%20representation%20significantly%20improves%20spatiotemporal%20understanding%20and%20allows%20for%204D%20grounding.%20We%20demonstrate%20that%20spatiotemporal%20intelligence%20can%20be%20%22assembled%22%20from%202D%20MLLMs%20and%203D%20computer%20vision%20models%20without%20additional%20training.%20Code%2C%20data%2C%20and%20examples%20are%20available%20at%20https%3A//tum-ai.github.io/surg4d/%0ALink%3A%20http%3A//arxiv.org/abs/2604.00867v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%25204D%2520Representation%2520for%2520Training-Free%2520Agentic%2520Reasoning%2520from%2520Monocular%2520Laparoscopic%2520Video%26entry.906535625%3DMaximilian%2520Fehrentz%2520and%2520Nicolas%2520Stellwag%2520and%2520Robert%2520Wiebe%2520and%2520Nicole%2520Thorisch%2520and%2520Fabian%2520Grob%2520and%2520Patrick%2520Remerscheid%2520and%2520Ken-Joel%2520Simmoteit%2520and%2520Benjamin%2520D.%2520Killeen%2520and%2520Christian%2520Heiliger%2520and%2520Nassir%2520Navab%26entry.1292438233%3DSpatiotemporal%2520reasoning%2520is%2520a%2520fundamental%2520capability%2520for%2520artificial%2520intelligence%2520%2528AI%2529%2520in%2520soft%2520tissue%2520surgery%252C%2520paving%2520the%2520way%2520for%2520intelligent%2520assistive%2520systems%2520and%2520autonomous%2520robotics.%2520While%25202D%2520vision-language%2520models%2520show%2520increasing%2520promise%2520at%2520understanding%2520surgical%2520video%252C%2520the%2520spatial%2520complexity%2520of%2520surgical%2520scenes%2520suggests%2520that%2520reasoning%2520systems%2520may%2520benefit%2520from%2520explicit%25204D%2520representations.%2520 {"title": "PHASOR: Anatomy- and Phase-Consistent Volumetric Diffusion for CT Virtual Contrast Enhancement", "author": "Zilong Li and Dongyang Li and Chenglong Ma and Zhan Feng and Dakai Jin and Junping Zhang and Hao Luo and Fan Wang and Hongming Shan", "abstract": "Contrast-enhanced computed tomography (CECT) is pivotal for highlighting tissue perfusion and vascularity, yet its clinical ubiquity is impeded by the invasive nature of contrast agents and radiation risks. While virtual contrast enhancement (VCE) offers an alternative to synthesizing CECT from non-contrast CT (NCCT), existing methods struggle with anatomical heterogeneity and spatial misalignment, leading to inconsistent enhancement patterns and incorrect details. This paper introduces PHASOR, a volumetric diffusion framework for high-fidelity CT VCE. By treating CT volumes as coherent sequences, we leverage a video diffusion model to enhance structural coherence and volumetric accuracy. To ensure anatomy-phase consistent synthesis, we introduce two complementary modules. First, anatomy-routed mixture-of-experts (AR-MoE) anchors distinct enhancement patterns to anatomical semantics, with organ-specific memory to capture salient details. Second, intensity-phase aware representation alignment (IP-REPA) highlights intricate contrast signals while mitigating the impact of imperfect spatial alignment. Extensive experiments across three datasets demonstrate that PHASOR significantly outperforms state-of-the-art methods in both synthesis quality and enhancement accuracy.", "link": "http://arxiv.org/abs/2604.01053v1", "date": "2026-04-01", "relevancy": 2.7072, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5567}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5567}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PHASOR%3A%20Anatomy-%20and%20Phase-Consistent%20Volumetric%20Diffusion%20for%20CT%20Virtual%20Contrast%20Enhancement&body=Title%3A%20PHASOR%3A%20Anatomy-%20and%20Phase-Consistent%20Volumetric%20Diffusion%20for%20CT%20Virtual%20Contrast%20Enhancement%0AAuthor%3A%20Zilong%20Li%20and%20Dongyang%20Li%20and%20Chenglong%20Ma%20and%20Zhan%20Feng%20and%20Dakai%20Jin%20and%20Junping%20Zhang%20and%20Hao%20Luo%20and%20Fan%20Wang%20and%20Hongming%20Shan%0AAbstract%3A%20Contrast-enhanced%20computed%20tomography%20%28CECT%29%20is%20pivotal%20for%20highlighting%20tissue%20perfusion%20and%20vascularity%2C%20yet%20its%20clinical%20ubiquity%20is%20impeded%20by%20the%20invasive%20nature%20of%20contrast%20agents%20and%20radiation%20risks.%20While%20virtual%20contrast%20enhancement%20%28VCE%29%20offers%20an%20alternative%20to%20synthesizing%20CECT%20from%20non-contrast%20CT%20%28NCCT%29%2C%20existing%20methods%20struggle%20with%20anatomical%20heterogeneity%20and%20spatial%20misalignment%2C%20leading%20to%20inconsistent%20enhancement%20patterns%20and%20incorrect%20details.%20This%20paper%20introduces%20PHASOR%2C%20a%20volumetric%20diffusion%20framework%20for%20high-fidelity%20CT%20VCE.%20By%20treating%20CT%20volumes%20as%20coherent%20sequences%2C%20we%20leverage%20a%20video%20diffusion%20model%20to%20enhance%20structural%20coherence%20and%20volumetric%20accuracy.%20To%20ensure%20anatomy-phase%20consistent%20synthesis%2C%20we%20introduce%20two%20complementary%20modules.%20First%2C%20anatomy-routed%20mixture-of-experts%20%28AR-MoE%29%20anchors%20distinct%20enhancement%20patterns%20to%20anatomical%20semantics%2C%20with%20organ-specific%20memory%20to%20capture%20salient%20details.%20Second%2C%20intensity-phase%20aware%20representation%20alignment%20%28IP-REPA%29%20highlights%20intricate%20contrast%20signals%20while%20mitigating%20the%20impact%20of%20imperfect%20spatial%20alignment.%20Extensive%20experiments%20across%20three%20datasets%20demonstrate%20that%20PHASOR%20significantly%20outperforms%20state-of-the-art%20methods%20in%20both%20synthesis%20quality%20and%20enhancement%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01053v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPHASOR%253A%2520Anatomy-%2520and%2520Phase-Consistent%2520Volumetric%2520Diffusion%2520for%2520CT%2520Virtual%2520Contrast%2520Enhancement%26entry.906535625%3DZilong%2520Li%2520and%2520Dongyang%2520Li%2520and%2520Chenglong%2520Ma%2520and%2520Zhan%2520Feng%2520and%2520Dakai%2520Jin%2520and%2520Junping%2520Zhang%2520and%2520Hao%2520Luo%2520and%2520Fan%2520Wang%2520and%2520Hongming%2520Shan%26entry.1292438233%3DContrast-enhanced%2520computed%2520tomography%2520%2528CECT%2529%2520is%2520pivotal%2520for%2520highlighting%2520tissue%2520perfusion%2520and%2520vascularity%252C%2520yet%2520its%2520clinical%2520ubiquity%2520is%2520impeded%2520by%2520the%2520invasive%2520nature%2520of%2520contrast%2520agents%2520and%2520radiation%2520risks.%2520While%2520virtual%2520contrast%2520enhancement%2520%2528VCE%2529%2520offers%2520an%2520alternative%2520to%2520synthesizing%2520CECT%2520from%2520non-contrast%2520CT%2520%2528NCCT%2529%252C%2520existing%2520methods%2520struggle%2520with%2520anatomical%2520heterogeneity%2520and%2520spatial%2520misalignment%252C%2520leading%2520to%2520inconsistent%2520enhancement%2520patterns%2520and%2520incorrect%2520details.%2520This%2520paper%2520introduces%2520PHASOR%252C%2520a%2520volumetric%2520diffusion%2520framework%2520for%2520high-fidelity%2520CT%2520VCE.%2520By%2520treating%2520CT%2520volumes%2520as%2520coherent%2520sequences%252C%2520we%2520leverage%2520a%2520video%2520diffusion%2520model%2520to%2520enhance%2520structural%2520coherence%2520and%2520volumetric%2520accuracy.%2520To%2520ensure%2520anatomy-phase%2520consistent%2520synthesis%252C%2520we%2520introduce%2520two%2520complementary%2520modules.%2520First%252C%2520anatomy-routed%2520mixture-of-experts%2520%2528AR-MoE%2529%2520anchors%2520distinct%2520enhancement%2520patterns%2520to%2520anatomical%2520semantics%252C%2520with%2520organ-specific%2520memory%2520to%2520capture%2520salient%2520details.%2520Second%252C%2520intensity-phase%2520aware%2520representation%2520alignment%2520%2528IP-REPA%2529%2520highlights%2520intricate%2520contrast%2520signals%2520while%2520mitigating%2520the%2520impact%2520of%2520imperfect%2520spatial%2520alignment.%2520Extensive%2520experiments%2520across%2520three%2520datasets%2520demonstrate%2520that%2520PHASOR%2520significantly%2520outperforms%2520state-of-the-art%2520methods%2520in%2520both%2520synthesis%2520quality%2520and%2520enhancement%2520accuracy.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01053v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PHASOR%3A%20Anatomy-%20and%20Phase-Consistent%20Volumetric%20Diffusion%20for%20CT%20Virtual%20Contrast%20Enhancement&entry.906535625=Zilong%20Li%20and%20Dongyang%20Li%20and%20Chenglong%20Ma%20and%20Zhan%20Feng%20and%20Dakai%20Jin%20and%20Junping%20Zhang%20and%20Hao%20Luo%20and%20Fan%20Wang%20and%20Hongming%20Shan&entry.1292438233=Contrast-enhanced%20computed%20tomography%20%28CECT%29%20is%20pivotal%20for%20highlighting%20tissue%20perfusion%20and%20vascularity%2C%20yet%20its%20clinical%20ubiquity%20is%20impeded%20by%20the%20invasive%20nature%20of%20contrast%20agents%20and%20radiation%20risks.%20While%20virtual%20contrast%20enhancement%20%28VCE%29%20offers%20an%20alternative%20to%20synthesizing%20CECT%20from%20non-contrast%20CT%20%28NCCT%29%2C%20existing%20methods%20struggle%20with%20anatomical%20heterogeneity%20and%20spatial%20misalignment%2C%20leading%20to%20inconsistent%20enhancement%20patterns%20and%20incorrect%20details.%20This%20paper%20introduces%20PHASOR%2C%20 {"title": "ACT Now: Preempting LVLM Hallucinations via Adaptive Context Integration", "author": "Bei Yan and Yuecong Min and Jie Zhang and Shiguang Shan and Xilin Chen", "abstract": "Large Vision-Language Models (LVLMs) frequently suffer from severe hallucination issues. Existing mitigation strategies predominantly rely on isolated, single-step states to enhance visual focus or suppress strong linguistic priors. However, these static approaches neglect dynamic context changes across the generation process and struggles to correct inherited information loss. To address this limitation, we propose Adaptive Context inTegration (ACT), a training-free inference intervention method that mitigates hallucination through the adaptive integration of contextual information. Specifically, we first propose visual context exploration, which leverages spatio-temporal profiling to adaptively amplify attention heads responsible for visual exploration. To further facilitate vision-language alignment, we propose semantic context aggregation that marginalizes potential semantic queries to effectively aggregate visual evidence, thereby resolving the information loss caused by the discrete nature of token prediction. Extensive experiments across diverse LVLMs demonstrate that ACT significantly reduces hallucinations and achieves competitive results on both discriminative and generative benchmarks, acting as a robust and highly adaptable solution without compromising fundamental generation capabilities.", "link": "http://arxiv.org/abs/2604.00983v1", "date": "2026-04-01", "relevancy": 2.6967, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5511}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5511}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5158}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ACT%20Now%3A%20Preempting%20LVLM%20Hallucinations%20via%20Adaptive%20Context%20Integration&body=Title%3A%20ACT%20Now%3A%20Preempting%20LVLM%20Hallucinations%20via%20Adaptive%20Context%20Integration%0AAuthor%3A%20Bei%20Yan%20and%20Yuecong%20Min%20and%20Jie%20Zhang%20and%20Shiguang%20Shan%20and%20Xilin%20Chen%0AAbstract%3A%20Large%20Vision-Language%20Models%20%28LVLMs%29%20frequently%20suffer%20from%20severe%20hallucination%20issues.%20Existing%20mitigation%20strategies%20predominantly%20rely%20on%20isolated%2C%20single-step%20states%20to%20enhance%20visual%20focus%20or%20suppress%20strong%20linguistic%20priors.%20However%2C%20these%20static%20approaches%20neglect%20dynamic%20context%20changes%20across%20the%20generation%20process%20and%20struggles%20to%20correct%20inherited%20information%20loss.%20To%20address%20this%20limitation%2C%20we%20propose%20Adaptive%20Context%20inTegration%20%28ACT%29%2C%20a%20training-free%20inference%20intervention%20method%20that%20mitigates%20hallucination%20through%20the%20adaptive%20integration%20of%20contextual%20information.%20Specifically%2C%20we%20first%20propose%20visual%20context%20exploration%2C%20which%20leverages%20spatio-temporal%20profiling%20to%20adaptively%20amplify%20attention%20heads%20responsible%20for%20visual%20exploration.%20To%20further%20facilitate%20vision-language%20alignment%2C%20we%20propose%20semantic%20context%20aggregation%20that%20marginalizes%20potential%20semantic%20queries%20to%20effectively%20aggregate%20visual%20evidence%2C%20thereby%20resolving%20the%20information%20loss%20caused%20by%20the%20discrete%20nature%20of%20token%20prediction.%20Extensive%20experiments%20across%20diverse%20LVLMs%20demonstrate%20that%20ACT%20significantly%20reduces%20hallucinations%20and%20achieves%20competitive%20results%20on%20both%20discriminative%20and%20generative%20benchmarks%2C%20acting%20as%20a%20robust%20and%20highly%20adaptable%20solution%20without%20compromising%20fundamental%20generation%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00983v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DACT%2520Now%253A%2520Preempting%2520LVLM%2520Hallucinations%2520via%2520Adaptive%2520Context%2520Integration%26entry.906535625%3DBei%2520Yan%2520and%2520Yuecong%2520Min%2520and%2520Jie%2520Zhang%2520and%2520Shiguang%2520Shan%2520and%2520Xilin%2520Chen%26entry.1292438233%3DLarge%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520frequently%2520suffer%2520from%2520severe%2520hallucination%2520issues.%2520Existing%2520mitigation%2520strategies%2520predominantly%2520rely%2520on%2520isolated%252C%2520single-step%2520states%2520to%2520enhance%2520visual%2520focus%2520or%2520suppress%2520strong%2520linguistic%2520priors.%2520However%252C%2520these%2520static%2520approaches%2520neglect%2520dynamic%2520context%2520changes%2520across%2520the%2520generation%2520process%2520and%2520struggles%2520to%2520correct%2520inherited%2520information%2520loss.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Adaptive%2520Context%2520inTegration%2520%2528ACT%2529%252C%2520a%2520training-free%2520inference%2520intervention%2520method%2520that%2520mitigates%2520hallucination%2520through%2520the%2520adaptive%2520integration%2520of%2520contextual%2520information.%2520Specifically%252C%2520we%2520first%2520propose%2520visual%2520context%2520exploration%252C%2520which%2520leverages%2520spatio-temporal%2520profiling%2520to%2520adaptively%2520amplify%2520attention%2520heads%2520responsible%2520for%2520visual%2520exploration.%2520To%2520further%2520facilitate%2520vision-language%2520alignment%252C%2520we%2520propose%2520semantic%2520context%2520aggregation%2520that%2520marginalizes%2520potential%2520semantic%2520queries%2520to%2520effectively%2520aggregate%2520visual%2520evidence%252C%2520thereby%2520resolving%2520the%2520information%2520loss%2520caused%2520by%2520the%2520discrete%2520nature%2520of%2520token%2520prediction.%2520Extensive%2520experiments%2520across%2520diverse%2520LVLMs%2520demonstrate%2520that%2520ACT%2520significantly%2520reduces%2520hallucinations%2520and%2520achieves%2520competitive%2520results%2520on%2520both%2520discriminative%2520and%2520generative%2520benchmarks%252C%2520acting%2520as%2520a%2520robust%2520and%2520highly%2520adaptable%2520solution%2520without%2520compromising%2520fundamental%2520generation%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00983v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ACT%20Now%3A%20Preempting%20LVLM%20Hallucinations%20via%20Adaptive%20Context%20Integration&entry.906535625=Bei%20Yan%20and%20Yuecong%20Min%20and%20Jie%20Zhang%20and%20Shiguang%20Shan%20and%20Xilin%20Chen&entry.1292438233=Large%20Vision-Language%20Models%20%28LVLMs%29%20frequently%20suffer%20from%20severe%20hallucination%20issues.%20Existing%20mitigation%20strategies%20predominantly%20rely%20on%20isolated%2C%20single-step%20states%20to%20enhance%20visual%20focus%20or%20suppress%20strong%20linguistic%20priors.%20However%2C%20these%20static%20approaches%20neglect%20dynamic%20context%20changes%20across%20the%20generation%20process%20and%20struggles%20to%20correct%20inherited%20information%20loss.%20To%20address%20this%20limitation%2C%20we%20propose%20Adaptive%20Context%20inTegration%20%28ACT%29%2C%20a%20training-free%20inference%20intervention%20method%20that%20mitigates%20hallucination%20through%20the%20adaptive%20integration%20of%20contextual%20information.%20Specifically%2C%20we%20first%20propose%20visual%20context%20exploration%2C%20which%20leverages%20spatio-temporal%20profiling%20to%20adaptively%20amplify%20attention%20heads%20responsible%20for%20visual%20exploration.% {"title": "An Approach to Enriching Surgical Video Datasets for Fine-Grained Spatial-Temporal Understanding of Vision-Language Models", "author": "Lennart Maack and Alexander Schlaefer", "abstract": "Surgical video understanding is a crucial prerequisite for advancing Computer-Assisted Surgery. While vision-language models (VLMs) have recently been applied to the surgical domain, existing surgical vision-language datasets lack in capturing and evaluating complex, interleaved spatial-temporal dynamics. Creating large scale datasets that accurately represent fine-grained spatial-temporal relationships in surgical videos is challenging due to costly manual annotations or error-prone generation using large language models. To address this gap, we introduce the SurgSTU-Pipeline, a deterministic generation pipeline featuring temporal and spatial continuity filtering to reliably create surgical datasets for fine-grained spatial-temporal multimodal understanding. Applying this pipeline to publicly available surgical datasets, we create the SurgSTU dataset, comprising 7515 video clips densely extended with 150k fine-grained spatial-temporal question-answer samples. Our comprehensive evaluation shows that while state-of-the-art generalist VLMs struggle in zero-shot settings, their spatial-temporal capabilities can be improved through in-context learning. A fine-tuned VLM on the SurgSTU training dataset achieves highest performance among all spatial-temporal tasks, validating the dataset's efficacy to improve spatial-temporal understanding of VLMs in surgical videos. Code will be made publicly available.", "link": "http://arxiv.org/abs/2604.00784v1", "date": "2026-04-01", "relevancy": 2.6912, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5361}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Approach%20to%20Enriching%20Surgical%20Video%20Datasets%20for%20Fine-Grained%20Spatial-Temporal%20Understanding%20of%20Vision-Language%20Models&body=Title%3A%20An%20Approach%20to%20Enriching%20Surgical%20Video%20Datasets%20for%20Fine-Grained%20Spatial-Temporal%20Understanding%20of%20Vision-Language%20Models%0AAuthor%3A%20Lennart%20Maack%20and%20Alexander%20Schlaefer%0AAbstract%3A%20Surgical%20video%20understanding%20is%20a%20crucial%20prerequisite%20for%20advancing%20Computer-Assisted%20Surgery.%20While%20vision-language%20models%20%28VLMs%29%20have%20recently%20been%20applied%20to%20the%20surgical%20domain%2C%20existing%20surgical%20vision-language%20datasets%20lack%20in%20capturing%20and%20evaluating%20complex%2C%20interleaved%20spatial-temporal%20dynamics.%20Creating%20large%20scale%20datasets%20that%20accurately%20represent%20fine-grained%20spatial-temporal%20relationships%20in%20surgical%20videos%20is%20challenging%20due%20to%20costly%20manual%20annotations%20or%20error-prone%20generation%20using%20large%20language%20models.%20To%20address%20this%20gap%2C%20we%20introduce%20the%20SurgSTU-Pipeline%2C%20a%20deterministic%20generation%20pipeline%20featuring%20temporal%20and%20spatial%20continuity%20filtering%20to%20reliably%20create%20surgical%20datasets%20for%20fine-grained%20spatial-temporal%20multimodal%20understanding.%20Applying%20this%20pipeline%20to%20publicly%20available%20surgical%20datasets%2C%20we%20create%20the%20SurgSTU%20dataset%2C%20comprising%207515%20video%20clips%20densely%20extended%20with%20150k%20fine-grained%20spatial-temporal%20question-answer%20samples.%20Our%20comprehensive%20evaluation%20shows%20that%20while%20state-of-the-art%20generalist%20VLMs%20struggle%20in%20zero-shot%20settings%2C%20their%20spatial-temporal%20capabilities%20can%20be%20improved%20through%20in-context%20learning.%20A%20fine-tuned%20VLM%20on%20the%20SurgSTU%20training%20dataset%20achieves%20highest%20performance%20among%20all%20spatial-temporal%20tasks%2C%20validating%20the%20dataset%27s%20efficacy%20to%20improve%20spatial-temporal%20understanding%20of%20VLMs%20in%20surgical%20videos.%20Code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00784v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Approach%2520to%2520Enriching%2520Surgical%2520Video%2520Datasets%2520for%2520Fine-Grained%2520Spatial-Temporal%2520Understanding%2520of%2520Vision-Language%2520Models%26entry.906535625%3DLennart%2520Maack%2520and%2520Alexander%2520Schlaefer%26entry.1292438233%3DSurgical%2520video%2520understanding%2520is%2520a%2520crucial%2520prerequisite%2520for%2520advancing%2520Computer-Assisted%2520Surgery.%2520While%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520recently%2520been%2520applied%2520to%2520the%2520surgical%2520domain%252C%2520existing%2520surgical%2520vision-language%2520datasets%2520lack%2520in%2520capturing%2520and%2520evaluating%2520complex%252C%2520interleaved%2520spatial-temporal%2520dynamics.%2520Creating%2520large%2520scale%2520datasets%2520that%2520accurately%2520represent%2520fine-grained%2520spatial-temporal%2520relationships%2520in%2520surgical%2520videos%2520is%2520challenging%2520due%2520to%2520costly%2520manual%2520annotations%2520or%2520error-prone%2520generation%2520using%2520large%2520language%2520models.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520the%2520SurgSTU-Pipeline%252C%2520a%2520deterministic%2520generation%2520pipeline%2520featuring%2520temporal%2520and%2520spatial%2520continuity%2520filtering%2520to%2520reliably%2520create%2520surgical%2520datasets%2520for%2520fine-grai {"title": "Learning Quantised Structure-Preserving Motion Representations for Dance Fingerprinting", "author": "Arina Kharlamova and Bowei He and Chen Ma and Xue Liu", "abstract": "We present DANCEMATCH, an end-to-end framework for motion-based dance retrieval, the task of identifying semantically similar choreographies directly from raw video, defined as DANCE FINGERPRINTING. While existing motion analysis and retrieval methods can compare pose sequences, they rely on continuous embeddings that are difficult to index, interpret, or scale. In contrast, DANCEMATCH constructs compact, discrete motion signatures that capture the spatio-temporal structure of dance while enabling efficient large-scale retrieval. Our system integrates Skeleton Motion Quantisation (SMQ) with Spatio-Temporal Transformers (STT) to encode human poses, extracted via Apple CoMotion, into a structured motion vocabulary. We further design DANCE RETRIEVAL ENGINE (DRE), which performs sub-linear retrieval using a histogram-based index followed by re-ranking for refined matching. To facilitate reproducible research, we release DANCETYPESBENCHMARK, a pose-aligned dataset annotated with quantised motion tokens. Experiments demonstrate robust retrieval across diverse dance styles and strong generalisation to unseen choreographies, establishing a foundation for scalable motion fingerprinting and quantitative choreographic analysis.", "link": "http://arxiv.org/abs/2604.00927v1", "date": "2026-04-01", "relevancy": 2.6807, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5765}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5228}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5091}], "mailto": "mai

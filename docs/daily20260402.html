{"title": "From Hindsight to Foresight: Self-Encouraged Hindsight Distillation for Knowledge-based Visual Question Answering", "author": "Yu Zhao and Ying Zhang and Xuhui Sui and Baohang Zhou and Li Shen and Dacheng Tao", "abstract": "Knowledge-based Visual Question Answering (KBVQA) necessitates external knowledge incorporation beyond cross-modal understanding. Existing KBVQA methods either utilize implicit knowledge in multimodal large language models (MLLMs) via in-context learning or explicit knowledge via retrieval augmented generation. However, their reasoning processes remain implicit, without explicit multi-step trajectories from MLLMs. To address this gap, we provide a Hindsight Distilled Reasoning (HinD) framework with Knowledge Encouragement Preference Optimization, aiming at self-encouraging the knowledge reasoning ability inside the MLLM. First, we construct the Hindsight Teacher by prompting the MLLM to complete the reasoning process with knowing the right answer, obtaining Hindsight-Zero training data. Then, the Foresight Student, without knowing the answer, learns the golden trajectories from Hindsight: (1) Hindsight Distillation Fine-Tuning (HDFT) to self-distill the Hindsight-Zero into a modularized Chain-of-Thought (CoT) Generator and a Knowledge Generator for sequential steps and discrete facts generation, respectively; (2) Knowledge Encouragement Preference Optimization (KEPO) to encourage the under-confident but relevant knowledge inside the MLLM and suppress the over-confident but irrelevant one. Experiments on OK-VQA and A-OKVQA validate the effectiveness of HinD, showing that HinD with 7-8B MLLM achieves superior performance without commercial model APIs or retrieved knowledge.", "link": "http://arxiv.org/abs/2511.11132v2", "date": "2026-04-01", "relevancy": 2.4473, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5026}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4829}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4829}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Hindsight%20to%20Foresight%3A%20Self-Encouraged%20Hindsight%20Distillation%20for%20Knowledge-based%20Visual%20Question%20Answering&body=Title%3A%20From%20Hindsight%20to%20Foresight%3A%20Self-Encouraged%20Hindsight%20Distillation%20for%20Knowledge-based%20Visual%20Question%20Answering%0AAuthor%3A%20Yu%20Zhao%20and%20Ying%20Zhang%20and%20Xuhui%20Sui%20and%20Baohang%20Zhou%20and%20Li%20Shen%20and%20Dacheng%20Tao%0AAbstract%3A%20Knowledge-based%20Visual%20Question%20Answering%20%28KBVQA%29%20necessitates%20external%20knowledge%20incorporation%20beyond%20cross-modal%20understanding.%20Existing%20KBVQA%20methods%20either%20utilize%20implicit%20knowledge%20in%20multimodal%20large%20language%20models%20%28MLLMs%29%20via%20in-context%20learning%20or%20explicit%20knowledge%20via%20retrieval%20augmented%20generation.%20However%2C%20their%20reasoning%20processes%20remain%20implicit%2C%20without%20explicit%20multi-step%20trajectories%20from%20MLLMs.%20To%20address%20this%20gap%2C%20we%20provide%20a%20Hindsight%20Distilled%20Reasoning%20%28HinD%29%20framework%20with%20Knowledge%20Encouragement%20Preference%20Optimization%2C%20aiming%20at%20self-encouraging%20the%20knowledge%20reasoning%20ability%20inside%20the%20MLLM.%20First%2C%20we%20construct%20the%20Hindsight%20Teacher%20by%20prompting%20the%20MLLM%20to%20complete%20the%20reasoning%20process%20with%20knowing%20the%20right%20answer%2C%20obtaining%20Hindsight-Zero%20training%20data.%20Then%2C%20the%20Foresight%20Student%2C%20 {"title": "Scale-adaptive and robust intrinsic dimension estimation via optimal neighbourhood identification", "author": "Antonio Di Noia and Iuri Macocco and Aldo Glielmo and Alessandro Laio and Antonietta Mira", "abstract": "The Intrinsic Dimension (ID) is a key concept in unsupervised learning and feature selection, as it is a lower bound to the number of variables which are necessary to describe a system. However, in almost any real-world dataset the ID depends on the scale at which the data are analysed. Quite typically at a small scale, the ID is very large, as the data are affected by measurement errors. At large scale, the ID can also appear erroneously large, due to the curvature and the topology of the manifold containing the data. In this work, we introduce an automatic protocol to select the sweet spot, namely the correct range of scales in which the ID is meaningful and useful. This protocol is based on imposing that for distances smaller than the correct scale the density of the data is constant. In the presented framework, to estimate the density it is necessary to know the ID, therefore, this condition is imposed self-consistently. We illustrate the usefulness and robustness of this procedure to noise by benchmarks on artificial and real-world datasets.", "link": "http://arxiv.org/abs/2405.15132v5", "date": "2026-04-01", "relevancy": 2.4442, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5165}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4753}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4748}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scale-adaptive%20and%20robust%20intrinsic%20dime of%2520this%2520procedure%2520to%2520noise%2520by%2520benchmarks%2520on%2520artificial%2520and%2520real-world%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2405.15132v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Scale-adaptive%20and%20robust%20intrinsic%20dimension%20estimation%20via%20optimal%20neighbourhood%20identification&entry.906535625=Antonio%20Di%20Noia%20and%20Iuri%20Macocco%20and%20Aldo%20Glielmo%20and%20Alessandro%20Laio%20and%20Antonietta%20Mira&entry.1292438233=The%20Intrinsic%20Dimension%20%28ID%29%20is%20a%20key%20concept%20in%20unsupervised%20learning%20and%20feature%20selection%2C%20as%20it%20is%20a%20lower%20bound%20to%20the%20number%20of%20variables%20which%20are%20necessary%20to%20describe%20a%20system.%20However%2C%20in%20almost%20any%20real-world%20dataset%20the%20ID%20depends%20on%20the%20scale%20at%20which%20the%20data%20are%20analysed.%20Quite%20typically%20at%20a%20small%20scale%2C%20the%20ID%20is%20very%20large%2C%20as%20the%20data%20are%20affected%20by%20measurement%20errors.%20At%20large%20scale%2C%20the%20ID%20can%20also%20appear%20erroneously%20large%2C%20due%20to%20the%20curvature%20and%20the%20topology%20of%20the%20manifold%20containing%20the%20data.%20In%20this%20work%2C%20we%20introduce%20an%20automatic%20protocol%20to%20select%20the%20sweet%20spot%2C%20namely%20the%20correct%20range%20of%20scales%20in%20which%20the%20ID%20is%20meaningful%20and%20useful.%20This%20protocol%20is%20based%20on%20imposing%20that%20for%20distances%20smaller%20than%20the%20correct%20scale%20the%20density%20of%20the%20data%20is%20constant.%20In%20the%20presented%20framework%2C%20to%20estimate%20the%20density%20it%20is%20necessary%20to%20know%20the%20ID%2C%20therefore%2C%20this%20condition%20is%20imposed%20self-consistently.%20We%20illustrate%20the%20usefulness%20and%20robustness%20of%20this%20procedure%20to%20noise%20by%20benchmarks%2 {"title": "HICT: High-precision 3D CBCT reconstruction from a single X-ray", "author": "Wen Ma and Jiaxiang Liu and Zikai Xiao and Ziyang Wang and Feng Yang and Zuozhu Liu", "abstract": "Accurate 3D dental imaging is vital for diagnosis and treatment planning, yet CBCT's high radiation dose and cost limit its accessibility. Reconstructing 3D volumes from a single low-dose panoramic X-ray is a promising alternative but remains challenging due to geometric inconsistencies and limited accuracy. We propose HiCT, a two-stage framework that first generates geometrically consistent multi-view projections from a single panoramic image using a video diffusion model, and then reconstructs high-fidelity CBCT from the projections using a ray-based dynamic attention network and an X-ray sampling strategy. To support this, we built XCT, a large-scale dataset combining public CBCT data with 500 paired PX-CBCT cases. Extensive experiments show that HiCT achieves state-of-the-art performance, delivering accurate and geometrically consistent reconstructions for clinical use.", "link": "http://arxiv.org/abs/2604.00792v1", "date": "2026-04-01", "relevancy": 2.4356, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6271}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6271}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5177}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HICT%3A%20High-precision%203D%20CBCT%20reconstruction%20from%20a%20single%20X-ray&body=Title%3A%20HICT%3A%20High-precision%203D%20CBCT%20reconstruction%20from%20a%20single%20X-ray%0AAuthor%3A%20Wen%20Ma%20and%20Jiaxiang%20Liu%20and%20Zikai%20Xiao%20and%20Ziyang%20Wang%20and%20Feng%20Yang%20and%20Zuozhu%20Liu%0AAbstra {"title": "Object Affordance Recognition and Grounding via Multi-scale Cross-modal Representation Learning", "author": "Xinhang Wan and Dongqiang Gou and Xinwang Liu and En Zhu and Xuming He", "abstract": "A core problem of Embodied AI is to learn object manipulation from observation, as humans do. To achieve this, it is important to localize 3D object affordance areas through observation such as images (3D affordance grounding) and understand their functionalities (affordance classification). Previous attempts usually tackle these two tasks separately, leading to inconsistent predictions due to lacking proper modeling of their dependency. In addition, these methods typically only ground the incomplete affordance areas depicted in images, failing to predict the full potential affordance areas, and operate at a fixed scale, resulting in difficulty in coping with affordances significantly varying in scale with respect to the whole object. To address these issues, we propose a novel approach that learns an affordance-aware 3D representation and employs a stage-wise inference strategy leveraging the dependency between grounding and classification tasks. Specifically, we first develop a cross-modal 3D representation through efficient fusion and multi-scale geometric feature propagation, enabling inference of full potential affordance areas at a suitable regional scale. Moreover, we adopt a simple two-stage prediction mechanism, effectively coupling grounding and classification for better affordance understanding. Experiments demonstrate the effectiveness of our method, showing improved performance in both affordance grounding and classification.", "link": "http://arxiv.org/abs/2508.01184v2", "date": "2026-04-01", "relevancy": 2.4349, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6462}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6145}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.588}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Object%20Affordance%20Recognition%20and%20Grounding%20via%20Multi-scale%20Cross-modal%20Representation%20Learning&body=Title%3A%20Object%20Affordance%20Recognition%20and%20Grounding%20via%20Multi-scale%20Cross-modal%20Representation%20Learning%0AAuthor%3A%20Xinhang%20Wan%20and%20Dongqiang%20Gou%20and%20Xinwang%20Liu%20and%20En%20Zhu%20and%20Xuming%20He%0AAbstract%3A%20A%20core%20problem%20of%20Embodied%20AI%20is%20to%20learn%20object%20manipulation%20from%20observation%2C%20as%20humans%20do.%20To%20achieve%20this%2C%20it%20is%20important%20to%20localize%203D%20object%20affordance%20areas%20through%20observation%20such%20as%20images%20%283D%20affordance%20grounding%29%20and%20understand%20their%20functionalities%20%28affordance%20classification%29.%20Previous%20attempts%20usually%20tackle%20these%20two%20tasks%20separately%2C%20leading%20to%20inconsistent%20predictions%20due%20to%20lacking%20proper%20modeling%20of%20their%20dependency.%20In%20addition%2C%20these%20methods%20typically%20only%20ground%20the%20incomplete%20affordance%20areas%20depicted%20in%20images%2C%20failing%20to%20predict%20the%20full%20potential%20affordance%20areas%2C%20and%20operate%20at%20a%20fixed%20scale%2C%20resulting%20in%20difficulty%20in%20coping%20with%20affordances%20significantly%20varying%20in%20scale%20with%20respect%20to%20the%20whole%20object.%20To%20address%20these%20issues%2C%20we%20propose%20a%20novel%20approach%20that%20learns%20an%20affordance-aware%203D%20representation%20and%20employs%20a%20stage-wise%20inference%20strategy%20leveraging%20the%20dependency%20between%20grounding%20and%20classification%20tasks.%20Specifically%2C%20we%20first%20develop%20a%20cross-modal%203D%20representation%20through%20efficient%20fusion%20and%20multi-scale%20geometric%20feature%20propagation%2C%20enabling%20inference%20of%20full%20potential%20affordance%20areas%20at%20a%20suitable%20regional%20scale.%20Moreover%2C%20we%20adopt%20a%20simple%20two-stage%20prediction%20mechanism%2C%20effectively%20coupling%20grounding%20and%20classification%20for%20better%20affordance%20understanding.%20Experiments%20demonstrate%20the%20effectiveness%20of%20our%20method%2C%20showing%20improved%20performance%20in%20both%20affordance%20grounding%20and%20classification.%0ALink%3A%20http%3A//arxiv.org/abs/2508.01184v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DObject%2520Affordance%2520Recognition%2520and%2520Grounding%2520via%2520Multi-scale%2520Cross-modal%2520Representation%2520Learning%26entry.906535625%3DXinhang%2520Wan%2520and%2520Dongqiang%2520Gou%2520and%2520Xinwang%2520Liu%2520and%2520En%2520Zhu%2520and%2520Xuming%2520He%26entry.1292438233%3DA%2520core%2520problem%2520of%2520Embodied%2520AI%2520is%2520to%2520learn%2520object%2520manipulation%2520from%2520observation%252C%2520as%2520humans%2520do.%2520To%2520achieve%2520this%252C%2520it%2520is%2520important%2520to%2520localize%25203D%2520object%2520affordance%2520areas%2520through%2520observation%2520such%2520as%2520images%2520%25283D%2520affordance%2520grounding%2529%2520and%2520understand%2520their%2520functionalities%2520%2528affordance%2520classification%2529.%2520Previous%2520attempts%2520usually%2520tackle%2520these%2520two%2520tasks%2520separately%252C%2520leading%2520to%2520inconsistent%2520predictions%2520due%2520to%2520lacking%2520proper%2520modeling%2520of%2520their%2520dependency.%2520In%2520addition%252C%2520these%2520methods%2520typically%2520only%2520ground%2520the%2520incomplete%2520affordance%2520areas%2520depicted%2520in%2520images%252C%2520failing%2520to%2520pre {"title": "Temporal Dependencies in In-Context Learning: The Role of Induction Heads", "author": "Anooshka Bajaj and Deven Mahesh Mistry and Sahaj Singh Maini and Yash Aggarwal and Billy Dickson and Zoran Tiganj", "abstract": "Large language models (LLMs) exhibit strong in-context learning capabilities, but how they track and retrieve information from context remains underexplored. Drawing on the free recall paradigm in cognitive science (where participants recall list items in any order), we show that several open-source LLMs consistently display a serial-recall-like pattern, assigning peak probability to tokens that immediately follow a repeated token in the input sequence. Through systematic ablation experiments, we show that induction heads, specialized attention heads that attend to the token following a previous occurrence of the current token, play an important role in this phenomenon. Removing heads with a high induction score substantially reduces the +1 lag bias, whereas ablating random heads does not reproduce the same reduction. We also show that removing heads with high induction scores impairs the performance of models prompted to do serial recall using few-shot learning to a larger extent than removing random heads. Our findings highlight a mechanistically specific connection between induction heads and temporal context processing in transformers, suggesting that these heads are especially important for ordered retrieval and serial-recall-like behavior during in-context learning.", "link": "http://arxiv.org/abs/2604.01094v1", "date": "2026-04-01", "relevancy": 2.4334, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4944}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4828}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4828}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Temporal%20Dependencies%20in%20In-Context%20Learning%3A%20The%20Role%20of%20Induction%20Heads&body=Title%3A%20Temporal%20Dependencies%20in%20In-Context%20Learning%3A%20The%20Role%20of%20Induction%20Heads%0AAuthor%3A%20Anooshka%20Bajaj%20and%20Deven%20Mahesh%20Mistry%20and%20Sahaj%20Singh%20Maini%20and%20Yash%20Aggarwal%20and%20Billy%20Dickson%20and%20Zoran%20Tiganj%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20exhibit%20strong%20in-context%20learning%20capabilities%2C%20but%20how%20they%20track%20and%20retrieve%20information%20from%20context%20remains%20underexplored.%20Drawing%20on%20the%20free%20recall%20paradigm%20in%20cognitive%20science%20%28where%20participants%20recall%20list%20items%20in%20any%20order%29%2C%20we%20show%20that%20several%20open-source%20LLMs%20consistently%20display%20a%20serial-recall-like%20pattern%2C%20assigning%20peak%20probability%20to%20tokens%20that%20immediately%20follow%20a%20repeated%20token%20in%20the%20input%20sequence.%20Through%20systematic%20ablation%20experiments%2C%20we%20show%20that%20induction%20heads%2C%20specialized%20attention%20heads%20that%20attend%20to%20the%20token%20following%20a%20previous%20occurrence%20of%20the%20current%20token%2C%20play%20an%20important%20role%20in%20this%20phenomenon.%20Removing%20heads%20with%20a%20high%20induction%20score%20substantially%20reduces%20the%20%2B1%20lag%20bias%2C%20whereas%20ablating%20random%20heads%20does%20not%20reproduce%20the%20same%20reduction.%20We%20also%20show%20that%20removing%20heads%20with%20high%20induction%20scores%20impairs%20the%20performance%20of%20models%20prompted%20to%20do%20serial%20recall%20using%20few-shot%20learning%20to%20a%20larger%20extent%20than%20removing%20random%20heads.%20Our%20findings%20highlight%20a%20mechanistically%20specific%20connection%20betwe {"title": "Unregistered Spectral Image Fusion: Unmixing, Adversarial Learning, and Recoverability", "author": "Jiahui Song and Sagar Shrestha and Xiao Fu", "abstract": "This paper addresses the fusion of a pair of spatially unregistered hyperspectral image (HSI) and multispectral image (MSI) covering roughly overlapping regions. HSIs offer high spectral but low spatial resolution, while MSIs provide the opposite. The goal is to integrate their complementary information to enhance both HSI spatial resolution and MSI spectral resolution. While hyperspectral-multispectral fusion (HMF) has been widely studied, the unregistered setting remains challenging. Many existing methods focus solely on MSI super-resolution, leaving HSI unchanged. Supervised deep learning approaches were proposed for HSI super-resolution, but rely on accurate training data, which is often unavailable. Moreover, theoretical analyses largely address the co-registered case, leaving unregistered HMF poorly understood. In this work, an unsupervised framework is proposed to simultaneously super-resolve both MSI and HSI. The method integrates coupled spectral unmixing for MSI super-resolution with latent-space adversarial learning for HSI super-resolution. Theoretical guarantees on the recoverability of the super-resolution MSI and HSI are established under reasonable generative models -- providing, to our best knowledge, the first such insights for unregistered HMF. The approach is validated on semi-real and real HSI-MSI pairs across diverse conditions.", "link": "http://arxiv.org/abs/2603.21510v2", "date": "2026-04-01", "relevancy": 2.4046, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4817}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.481}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4801}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unregistered%20Spectral%20Image%20Fusion%3A%20Unmixing%2C%20Adversarial%20Learning%2C%20and%20Recoverability&body=Title%3A%20Unregistered%20Spectral%20Image%20Fusion%3A%20Unmixing%2C%20Adversarial%20Learning%2C%20and%20Recoverability%0AAuthor%3A%20Jiahui%20Song%20and%20Sagar%20Shrestha%20and%20Xiao%20Fu%0AAbstract%3A%20This%20paper%20addresses%20the%20fusion%20of%20a%20pair%20of%20spatially%20unregistered%20hyperspectral%20image%20%28HSI%29%20and%20multispectral%20image%20%28MSI%29%20covering%20roughly%20overlapping%20regions.%20HSIs%20offer%20high%20spectral%20but%20low%20spatial%20resolution%2C%20while%20MSIs%20provide%20the%20opposite.%20The%20goal%20is%20to%20integrate%20their%20complementary%20information%20to%20enhance%20both%20HSI%20spatial%20resolution%20and%20MSI%20spectral%20resolution.%20While%20hyperspectral-multispectral%20fusion%20%28HMF%29%20has%20been%20widely%20studied%2C%20the%20unregistered%20setting%20remains%20challenging.%20Many%20existing%20methods%20focus%20solely%20on%20MSI%20super-resolution%2C%20leaving%20HSI%20unchanged.%20Supervised%20deep%20learning%20approaches%20were%20proposed%20for%20HSI%20super-resolution%2C%20but%20rely%20on%20accurate%20training%20data%2C%20which%20is%20often%20unavailable.%20Moreover%2C%20theoretical%20analyses%20largely%20address%20the%20co-registered%20case%2C%20leaving%20unregistered%20HMF%20poorly%20understood.%20In%20this%20work%2C%20an%20unsupervised%20framework%20is%20proposed%20to%20simultaneously%20super-resolve%20both%20MSI%20and%20HSI.%20The%20method%20integrates%20coupled%20spectral%20unmixing%20for%20MSI%20super-resolution%20with%20latent-space%20adversarial%20learning%20for%20HSI%20super-resolution.%20Theoretical%20guarantees%20on%20the%20recoverability%20of%20the%20super-resolution%20MSI%20and%20HSI%20are%20established%20under%20reasonable%20generative%20models%20--%20providing%2C%20to%20our%20best%20knowledge%2C%20the%20first%20such%20insights%20for%20unregistered%20HMF.%20The%20approach%20is%20validated%20on%20semi-real%20and%20real%20HSI-MSI%20pairs%20across%20diverse%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.21510v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnregistered%2520Spectral%2520Image%2520Fusion%253A%2520Unmixing%252C%2520Adversarial%2520Learning%252C%2520and%2520Recoverability%26entry.906535625%3DJiahui%2520Song%2520and%2520Sagar%2520Shrestha%2520and%2520Xiao%2520Fu%26entry.1292438233%3DThis%2520paper%2520addresses%2520the%2520fusion%2520of%2520a%2520pair%2520of%2520spatially%2520unregistered%2520hyperspectral%2520image%2520%2528HSI%2529%2520and%2520multispectral%2520image%2520%2528MSI%2529%2520covering%2520roughly%2520overlapping%2520regions.%2520HSIs%2520offer%2520high%2520spectral%2520but%2520low%2520spatial%2520resolution%252C%2520while%2520MSIs%2520provide%2520the%2520opposite.%2520The%2520goal%2520is%2520to%2520integrate%2520their%2520complementary%2520information%2520to%2520enhance%2520both%2520HSI%2520spatial%2520resolution%2520and%2520MSI%2520spectral%2520resolution.%2520While%2520hyperspectral-multispectral%2520fusion%2520%2528HMF%2529%2520has%2520been%2520widely%2520studied%252C%2520the%2520unregistered%2520setting%2520remains%2520challenging.%2520Many%2520existing%2520methods%2520focus%2520solely%2520on%2520MSI%2520super-resolution%252C%2520leaving%2520HSI%2520unchanged.%2520Supervised%2520deep%2520learning%2520approaches%2520were%2520proposed%2520for%2520HSI%2520super-resolution%252C%2520but%2520rely%2520on%2520accurate%2520training%2520data%252C%2520which%2520is%2520often%2520unavailable.%2520M %20studied%2C%20the%20unregistered%20setting%20remains%20challenging.%20Many%20existing%20methods%20focus%20solely%20on%20MSI%20super-resolution%2C%20leaving%20HSI%20unchanged.%20Supervised%20deep%20learning%20approaches%20were%20proposed%20for%20HSI%20super-resolution%2C%20but%20rely%20on%20accurate%20training%20data%2C%20which%20is%20often%20unavailable.%20Moreover%2C%20theoretical%20analyses%20largely%20address%20the%20co-registered%20case%2C%20leaving%20unregistered%20HMF%20poorly%20understood.%20In%20this%20work%2C%20an%20unsupervised%20framework%20is%20proposed%20to%20simultaneously%20super-resolve%20both%20MSI%20and%20HSI.%20The%20method%20integrates%20coupled%20spectral%20unmixing%20for%20MSI%20super-resolution%20with%20latent-space%20adversarial%20learning%20for%20HSI%20super-resolution.%20Theoretical%20guarantees%20on%20the%20recoverability%20of%20the%20super-resolution%20MSI%20and%20HSI%20are%20established%20under%20reasonable%20generative%20models%20--%20providing%2C%20to%20our%20best%20knowledge%2C%20the%20first%20such%20insights%20for%20unregistered%20HMF.%20The%20approach%20is%20validated%20on%20semi-real%20and%20real%20HSI-MSI%20pairs%20across%20diverse%20conditions.&entry.1838667208=http%3A//arxiv.org/abs/2603.21510v2&entry.124074799=Read"},
{"title": "Screening Is Enough", "author": "Ken M. Nakanishi", "abstract": "A core limitation of standard softmax attention is that it does not define a notion of absolute query--key relevance: attention weights are obtained by redistributing a fixed unit mass across all keys according to their relative scores. As a result, relevance is defined only relative to competing keys, and irrelevant keys cannot be explicitly rejected. We introduce Multiscreen, a language-model architecture built around a mechanism we call screening, which enables absolute query--key relevance. Instead of redistributing attention across all keys, screening evaluates each key against an explicit threshold, discarding irrelevant keys and aggregating the remaining keys, thereby removing global competition among keys. Across experiments, Multiscreen achieves comparable validation loss with approximately 40% fewer parameters than a Transformer baseline, enables stable optimization at substantially larger learning rates, maintains strong performance in long-context perplexity, shows little to no degradation in retrieval performance even far beyond the training context length, and reduces inference latency by up to 3.2$\\times$ at 100K context length.", "link": "http://arxiv.org/abs/2604.01178v1", "date": "2026-04-01", "relevancy": 2.4001, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4879}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4761}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4761}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Screening%20Is%20Enough&body=Title%3A%20Screening%20Is%20Enough%0AAuthor%3A%20Ken%20M.%20Nakanishi%0AAbstra {"title": "TRACE: High-Fidelity 3D Scene Editing via Tangible Reconstruction and Geometry-Aligned Contextual Video Masking", "author": "Jiyuan Hu and Zechuan Zhang and Zongxin Yang and Yi Yang", "abstract": "We present TRACE, a mesh-guided 3DGS editing framework that achieves automated, high-fidelity scene transformation. By anchoring video diffusion with explicit 3D geometry, TRACE uniquely enables fine-grained, part-level manipulatio--such as local pose shifting or component replacemen--while preserving the structural integrity of the central subject, a capability largely absent in existing editing methods. Our approach comprises three key stages: (1) Multi-view 3D-Anchor Synthesis, which leverages a sparse-view editor trained on our MV-TRACE datase--the first multi-view consistent dataset dedicated to scene-coherent object addition and modificatio--to generate spatially consistent 3D-anchors; (2) Tangible Geometry Anchoring (TGA), which ensures precise spatial synchronization between inserted meshes and the 3DGS scene via two-phase registration; and (3) Contextual Video Masking (CVM), which integrates 3D projections into an autoregressive video pipeline to achieve temporally stable, physically-grounded rendering. Extensive experiments demonstrate that TRACE consistently outperforms existing methods especially in editing versatility and structural integrity.", "link": "http://arxiv.org/abs/2604.01207v1", "date": "2026-04-01", "relevancy": 2.3992, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6064}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.596}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5948}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXr 2520rendering.%2520Extensive%2520experiments%2520demonstrate%2520that%2520TRACE%2520consistently%2520outperforms%2520existing%2520methods%2520especially%2520in%2520editing%2520versatility%2520and%2520structural%2520integrity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01207v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TRACE%3A%20High-Fidelity%203D%20Scene%20Editing%20via%20Tangible%20Reconstruction%20and%20Geometry-Aligned%20Contextual%20Video%20Masking&entry.906535625=Jiyuan%20Hu%20and%20Zechuan%20Zhang%20and%20Zongxin%20Yang%20and%20Yi%20Yang&entry.1292438233=We%20present%20TRACE%2C%20a%20mesh-guided%203DGS%20editing%20framework%20that%20achieves%20automated%2C%20high-fidelity%20scene%20transformation.%20By%20anchoring%20video%20diffusion%20with%20explicit%203D%20geometry%2C%20TRACE%20uniquely%20enables%20fine-grained%2C%20part-level%20manipulatio--such%20as%20local%20pose%20shifting%20or%20component%20replacemen--while%20preserving%20the%20structural%20integrity%20of%20the%20central%20subject%2C%20a%20capability%20largely%20absent%20in%20existing%20editing%20methods.%20Our%20approach%20comprises%20three%20key%20stages%3A%20%281%29%20Multi-view%203D-Anchor%20Synthesis%2C%20which%20leverages%20a%20sparse-view%20editor%20trained%20on%20our%20MV-TRACE%20datase--the%20first%20multi-view%20consistent%20dataset%20dedicated%20to%20scene-coherent%20object%20addition%20and%20modificatio--to%20generate%20spatially%20consistent%203D-anchors%3B%20%282%29%20Tangible%20Geometry%20Anchoring%20%28TGA%29%2C%20which%20ensures%20precise%20spatial%20synchronization%20between%20inserted%20meshes%20and%20the%203DGS%20scene%20via%20two-phase%20registration%3B%20and%20%283%29%20Contextual%20Video%20Masking%20%28CVM%29%2C%20which%20integrates%203D%20projections%20into%20an%20autoregressive%20video%20pipeline%20to%20achieve%20temporally%20stable%2C%20physically-grounded%20rendering.%20Extensive%20experiments%20demonstrate%20that%20TRACE%20consistently%20outperforms%20existing%20methods%20especially%20in%20editing%20versatility%20and%20structural%20integrity.&entry.1838667208=http%3A//arxiv.org/abs/2604.01207v1&entry.124074799=Read"},
{"title": "Adversarial Attenuation Patch Attack for SAR Object Detection", "author": "Yiming Zhang and Weibo Qin and Feng Wang", "abstract": "Deep neural networks have demonstrated excellent performance in SAR target detection tasks but remain susceptible to adversarial attacks. Existing SAR-specific attack methods can effectively deceive detectors; however, they often introduce noticeable perturbations and are largely confined to digital domain, neglecting physical implementation constrains for attacking SAR systems. In this paper, a novel Adversarial Attenuation Patch (AAP) method is proposed that employs energy-constrained optimization strategy coupled with an attenuation-based deployment framework to achieve a seamless balance between attack effectiveness and stealthiness. More importantly, AAP exhibits strong potential for physical realization by aligning with signal-level electronic jamming mechanisms. Experimental results show that AAP effectively degrades detection performance while preserving high imperceptibility, and shows favorable transferability across different models. This study provides a physical grounded perspective for adversarial attacks on SAR target detection systems and facilitates the design of more covert and practically deployable attack strategies. The source code is made available at https://github.com/boremycin/SAAP.", "link": "http://arxiv.org/abs/2604.00887v1", "date": "2026-04-01", "relevancy": 2.3828, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.505}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.468}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4566}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adversarial%20Attenuation%20Patch%20Attack%20for%20SAR%20Object%20Detection&body=Title%3A%20Adversarial%20Attenuation%20Patch%20Attack%20for%20SAR%20Object%20Detection%0AAuthor%3A%20Yiming%20Zhang%20and%20Weibo%20Qin%20and%20Feng%20Wang%0AAbstract%3A%20Deep%20neural%20networks%20have%20demonstrated%20excellent%20performance%20in%20SAR%20target%20detection%20tasks%20but%20remain%20susceptible%20to%20adversarial%20attacks.%20Existing%20SAR-specific%20attack%20methods%20can%20effectively%20deceive%20detectors%3B%20however%2C%20they%20often%20introduce%20noticeable%20perturbations%20and%20are%20largely%20confined%20to%20digital%20domain%2C%20neglecting%20physical%20implementation%20constrains%20for%20attacking%20SAR%20systems.%20In%20this%20paper%2C%20a%20novel%20Adversarial%20Attenuation%20Patch%20%28AAP%29%20method%20is%20proposed%20that%20employs%20energy-constrained%20optimization%20strategy%20coupled%20with%20an%20attenuation-based%20deployment%20framework%20to%20achieve%20a%20seamless%20balance%20between%20attack%20effectiveness%20and%20stealthiness.%20More%20importantly%2C%20AAP%20exhibits%20strong%20potential%20for%20physical%20realization%20by%20aligning%20with%20signal-level%20electronic%20jamming%20mechanisms.%20Experimental%20results%20show%20that%20AAP%20effectively%20degrades%20detection%20performance%20while%20preserving%20high%20imperceptibility%2C%20and%20shows%20favorable%20transferability%20across%20different%20models.%20This%20study%20provides%20a%20physical%20grounded%20perspective%20for%20adversarial%20attacks%20on%20SAR%20target%20detection%20systems%20and%20facilitates%20the%20design%20of%20more%20covert%20and%20practically%20deployable%20attack%20strategies.%20The%20source%20code%20is%20made%20available%20at%20https%3A//github.com/boremycin/SAAP.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00887v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K_ .%2520The%2520source%2520code%2520is%2520made%2520available%2520at%2520https%253A//github.com/boremycin/SAAP.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00887v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Adversarial%20Attenuation%20Patch%20Attack%20for%20SAR%20Object%20Detection&entry.906535625=Yiming%20Zhang%20and%20Weibo%20Qin%20and%20Feng%20Wang&entry.1292438233=Deep%20neural%20networks%20have%20demonstrated%20excellent%20performance%20in%20SAR%20target%20detection%20tasks%20but%20remain%20susceptible%20to%20adversarial%20attacks.%20Existing%20SAR-specific%20attack%20methods%20can%20effectively%20deceive%20detectors%3B%20however%2C%20they%20often%20introduce%20noticeable%20perturbations%20and%20are%20largely%20confined%20to%20digital%20domain%2C%20neglecting%20physical%20implementation%20constrains%20for%20attacking%20SAR%20systems.%20In%20this%20paper%2C%20a%20novel%20Adversarial%20Attenuation%20Patch%20%28AAP%29%20method%20is%20proposed%20that%20employs%20energy-constrained%20optimization%20strategy%20coupled%20with%20an%20attenuation-based%20deployment%20framework%20to%20achieve%20a%20seamless%20balance%20between%20attack%20effectiveness%20and%20stealthiness.%20More%20importantly%2C%20AAP%20exhibits%20strong%20potential%20for%20physical%20realization%20by%20aligning%20with%20signal-level%20electronic%20jamming%20mechanisms.%20Experimental%20results%20show%20that%20AAP%20effectively%20degrades%20detection%20performance%20while%20preserving%20high%20imperceptibility%2C%20and%20shows%20favorable%20transferability%20across%20different%20models.%20This%20study%20provides%20a%20physical%20grounded%20perspective%20for%20adversarial%20attacks%20on%20SAR%20target%20detection%20systems%20and%20facilitates%20the%20design%20of%20more%20covert%20and%20practically%20deployable%20attack%20strategies.%20The%20source%20code%20is%20made%20available%20at%20https% {"title": "EmbedPart: Embedding-Driven Graph Partitioning for Scalable Graph Neural Network Training", "author": "Nikolai Merkel and Ruben Mayer and Volker Markl and Hans-Arno Jacobsen", "abstract": "Graph Neural Networks (GNNs) are widely used for learning on graph-structured data, but scaling GNN training to massive graphs remains challenging. To enable scalable distributed training, graphs are divided into smaller partitions that are distributed across multiple machines such that inter-machine communication is minimized and computational load is balanced. In practice, existing partitioning approaches face a fundamental trade-off between partitioning overhead and partitioning quality. We propose EmbedPart, an embedding-driven partitioning approach that achieves both speed and quality. Instead of operating directly on irregular graph structures, EmbedPart leverages node embeddings produced during the actual GNN training workload and clusters these dense embeddings to derive a partitioning. EmbedPart achieves more than 100x speedup over Metis while maintaining competitive partitioning quality and accelerating distributed GNN training. Moreover, EmbedPart naturally supports graph updates and fast repartitioning, and can be applied to graph reordering to improve data locality and accelerate single-machine GNN training. By shifting partitioning from irregular graph structures to dense embeddings, EmbedPart enables scalable and high-quality graph data optimization.", "link": "http://arxiv.org/abs/2604.01000v1", "date": "2026-04-01", "relevancy": 2.3802, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5103}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.467}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EmbedPart%3A%20Embedding-Driven%20Graph%20Partitioning%20for%20Scalable%20Graph%20Neural%20Network%20Training&body=Title%3A%20EmbedPart%3A%20Embedding-Driven%20Graph%20Partitioning%20for%20Scalable%20Graph%20Neural%20Network%20Training%0AAuthor%3A%20Nikolai%20Merkel%20and%20Ruben%20Mayer%20and%20Volker%20Markl%20and%20Hans-Arno%20Jacobsen%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20are%20widely%20used%20for%20learning%20on%20graph-structured%20data%2C%20but%20scaling%20GNN%20training%20to%20massive%20graphs%20remains%20challenging.%20To%20enable%20scalable%20distributed%20training%2C%20graphs%20are%20divided%20into%20smaller%20partitions%20that%20are%20distributed%20across%20multiple%20machines%20such%20that%20inter-machine%20communication%20is%20minimized%20and%20computational%20load%20is%20balanced.%20In%20practice%2C%20existing%20partitioning%20approaches%20face%20a%20fundamental%20trade-off%20between%20partitioning%20overhead%20and%20partitioning%20quality.%20We%20propose%20EmbedPart%2C%20an%20embedding-driven%20partitioning%20approach%20that%20achieves%20both%20speed%20and%20quality.%20Instead%20of%20operating%20directly%20on%20irregular%20graph%20structures%2C%20EmbedPart%20leverages%20node%20embeddings%20produced%20during%20the%20actual%20GNN%20training%20workload%20and%20clusters%20these%20dense%20embeddings%20to%20derive%20a%20partitioning.%20EmbedPart%20achieves%20more%20than%20100x%20speedup%20over%20Metis%20while%20maintaining%20competitive%20partitioning%20quality%20and%20accelerating%20distributed%20GNN%20training.%20Moreover%2C%20EmbedPart%20naturally%20supports%20graph%20updates%20and%20fast%20repartitioning%2C%20and%20can%20be%20applied%20to%20graph%20reordering%20to%20improve%20data%20locality%20and%20accelerate%20single-machine%20GNN%20training.%20By%20shifting%20partitioning%20from%20irregular%20graph%20structures%20to%20dense%20embeddings%2C%20EmbedPart%20enables%20scalable%20and%20high-quality%20graph%20data%20optimization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01000v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmbedPart%253A%2520Embedding-Driven%2520Graph%2520Partitioning%2520for%2520Scalable%2520Graph%2520Neural%2520Network%2520Training%26entry.906535625%3DNikolai%2520Merkel%2520and%2520Ruben%2520Mayer%2520and%2520Volker%2520Markl%2520and%2520Hans-Arno%2520Jacobsen%26entry.1292438233%3DGraph%2520Neural%2520Networks%2520%2528GNNs%2529%2520are%2520widely%2520used%2520for%2520learning%2520on%2520graph-structured%2520data%252C%2520but%2520scaling%2520GNN%2520training%2520to%2520massive%2520graphs%2520remains%2520challenging.%2520To%2520enable%2520scalable%2520distributed%2520training%252C%2520graphs%2520are%2520divided%2520into%2520smaller%2520partitions%2520that%2520are%2520distributed%2520across%2520multiple%2520machines%2520such%2520that%2520inter-machine%2520communication%2520is%2520minimized%2520and%2520computational%2520load%2520is%2520balanced.%2520In%2520practice%252C%2520existing%2520partitioning%2520approaches%2520face%2520a%2520fundamental%2520trade-off%2520between%2520partitioning%2520overhead%2520and%2520partitioning%2520quality.%2520We%2520propose%2520EmbedPart%252C%2520an%2520embedding-driven%2520partitioning%2520approach%2520that%2520achieves%2520both%2520speed%2520and%2520quality.%2520Instead%2520of%2520operating%2520directly%2520on%2520irregular%2520graph%2520structures%252C%2520EmbedPart%2520leverages%2520node%2520embeddings%2520produced%2520during%2520the%2520actual%2520GNN%2520training%2520workload%2520and%2520clusters%2520these%2520dense%2520embeddings%2520to%2520derive%2520a%2520partitioning.%2520EmbedPart%2520achieves%2520more%2520than%2520100x%2520speedup%2520over%2520Metis%2520while%2520maintaining%2520competitive%2520partitioning%2520quality%2520and%2520accelerating%2520distributed%2520GNN%2520training.%2520Moreover%252C%2520EmbedPart%2520naturally%2520supports%2520graph%2520updates%2520and%2520fast%2520repartitioning%252C%2520and%2520can%2520be%2520applied%2520to%2520graph%2520reordering%2520to%2520improve%2520data%2520locality%2520and%2520accelerate%2520single-machine%2520GNN%2520training.%2520By%2520shifting%2520partitioning%2520from%2520irregular%2520graph%2520structures%2520to%2520dense%2520embeddings%252C%2520EmbedPart%2520enables%2520scalable%2520and%2520high-quality%2520graph%2520data%2520optimization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01000v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EmbedPart%3A%20Embedding-Driven%20Graph%20Partitioning%20for%20Scalable%20Graph%20Neural%20Network%20Training&entry.906535625=Nikolai%20Merkel%20and%20Ruben%20Mayer%20and%20Volker%20Markl%20and%20Hans-Arno%20Jacobsen&entry.1292438233=Graph%20Neural%20Networks%20%28GNNs%29%20are%20widely%20used%20for%20learning%20on%20graph-structured%20data%2C%20but%20scaling%20GNN%20training%20to%20massive%20graphs%20remains%20challenging.%20To%20enable%20scalable%20distributed%20training%2C%20graphs%20are%20divided%20into%20smaller%20partitions%20that%20are%20distributed%20across%20multiple%20machines%20such%20that%20inter-machine%20communication%20is%20minimized%20and%20computational%20load%20is%20balanced.%20In%20practice%2C%20existing%20partitioning%20approaches%20face%20a%20fundamental%20trade-off%20between%20partitioning%20overhead%20and%20partitioning%20quality.%20We%20propose%20EmbedPart%2C%20an%20embedding-driven%20partitioning%20approach%20that%20achieves%20both%20speed%20and%20quality.%20Instead%20of%20operating%20directly%20on%20irregular%20graph%20structures%2C%20EmbedPart%20leverages%20node%20embeddings%20produced%20during%20the%20actual%20GNN%20training%20workload%20and%20clusters%20these%20dense%20embeddings%20to%20derive%20a%20p {"title": "Perturb-and-Restore: Simulation-driven Structural Augmentation Framework for Imbalance Chromosomal Anomaly Detection", "author": "Yilan Zhang and Hanbiao Chen and Changchun Yang and Yuetan Chu and Siyuan Chen and Jing Wu and Jingdong Hu and Na Li and Junkai Su and Yuxuan Chen and Ao Xu and Xin Gao and Aihua Yin", "abstract": "Detecting structural chromosomal abnormalities is crucial for accurate diagnosis and management of genetic disorders. However, collecting sufficient structural abnormality data is extremely challenging and costly in clinical practice, and not all abnormal types can be readily collected. As a result, deep learning approaches face significant performance degradation due to the severe imbalance and scarcity of abnormal chromosome data. To address this challenge, we propose a Perturb-and-Restore (P&R), a simulation-driven structural augmentation framework that effectively alleviates data imbalance in chromosome anomaly detection. The P&R framework comprises two key components: (1) Structure Perturbation and Restoration Simulation, which generates synthetic abnormal chromosomes by perturbing chromosomal banding patterns of normal chromosomes followed by a restoration diffusion network that reconstructs continuous chromosome content and edges, thus eliminating reliance on rare abnormal samples; and (2) Energy-guided Adaptive Sampling, an energy score-based online selection strategy that dynamically prioritizes high-quality synthetic samples by referencing the energy distribution of real samples. To evaluate our method, we construct a comprehensive structural anomaly dataset consisting of over 260,000 chromosome images, including 4,242 abnormal samples spanning 24 categories. Experimental results demonstrate that the P&R framework achieves state-of-the-art (SOTA) performance, surpassing existing methods with an average improvement of 8.92% in sensitivity, 8.89% in precision, and 13.79% in F1-score across all categories.", "link": "http://arxiv.org/abs/2604.00854v1", "date": "2026-04-01", "relevancy": 2.3726, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4861}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4707}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perturb-and-Restore%3A%20Simulation-driven%20Structural%20Augmentation%20Framework%20for%20Imbalance%20Chromosomal%20Anomaly%20Detection&body=Title%3A%20Perturb-and-Restore%3A%20Simulation-driven%20Structural%20Augmentation%20Framework%20for%20Imbalance%20Chromosomal%20Anomaly%20Detection%0AAuthor%3A%20Yilan%20Zhang%20and%20Hanbiao%20Chen%20and%20Changchun%20Yang%20and%20Yuetan%20Chu%20and%20Siyuan%20Chen%20and%20Jing%20Wu%20and%20Jingdong%20Hu%20and%20Na%20Li%20and%20Junkai%20Su%20and%20Yuxuan%20Chen%20and%20Ao%20Xu%20and%20Xin%20Gao%20and%20Aihua%20Yin%0AAbstract%3A%20Detecting%20structural%20chromosomal%20abnormalities%20is%20crucial%20for%20accurate%20diagnosis%20and%20management%20of%20genetic%20disorders.%20However%2C%20collecting%20sufficient%20structural%20abnormality%20data%20is%20extremely%20challenging%20and%20costly%20in%20clinical%20practice%2C%20and%20not%20all%20abnormal%20types%20can%20be%20readily%20collected.%20As%20a%20result%2C%20deep%20learning%20approaches%20face%20significant%20performance%20degradation%20due%20to%20the%20severe%20imbalance%20and%20scarcity%20of%20abnormal%20chromosome%20data.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20Perturb-and-Restore%20%28P%26R%29%2C%20a%20simulation-driven%20structural%20augmentation%20framework%20that%20effectively%20alleviates%20data%20imbalance%20in%20chromosome%20anomaly%20detection.%20The%20P%26R%20framework%20comprises%20two%20key%20components%3A%20%281%29%20Structure%20Perturbation%20and%20Restoration%20Simulation%2C%20which%20generates%20synthetic%20abnormal%20chromosomes%20by%20perturbing%20chromosomal%20banding%20patterns%20of%20normal%20chromosomes%20followed%20by%20a%20restoration%20diffusion%20network%20that%20reconstructs%20continuous%20chromosome%20content%20and%20edges%2C%20thus%20eliminating%20reliance%20on%20rare%20abnormal%20samples%3B%20and%20%282%29%20Energy-guided%20Adaptive%20Sampling%2C%20an%20energy%20score-based%20online%20selection%20strategy%20that%20dynamically%20prioritizes%20high-quality%20synthetic%20samples%20by%20referencing%20the%20energy%20distribution%20of%20real%20samples.%20To%20evaluate%20our%20method%2C%20we%20construct%20a%20comprehensive%20structural%20anomaly%20dataset%20consisting%20of%20over%20260%2C000%20chromosome%20images%2C%20including%204%2C242%20abnormal%20samples%20spanning%2024%20categories.%20Experimental%20results%20demonstrate%20that%20the%20P%26R%20framework%20achieves%20state-of-the-art%20%28SOTA%29%20performance%2C%20surpassing%20existing%20methods%20with%20an%20average%20improvement%20of%208.92%25%20in%20sensitivity%2C%208.89%25%20in%20precision%2C%20and%2013.79%25%20in%20F1-score%20across%20all%20categories.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00854v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPerturb-and-Restore%253A%2520Simulation-driven%2520Structural%2520Augmentation%2520Framework%2520for%2520Imbalance%2520Chromosomal%2520Anomaly%2520Detection%26entry.906535625%3DYilan%2520Zhang%2520and%2520Hanbiao%2520Chen%2520and%2520Changchun%2520Yang%2520and%2520Yuetan%2520Chu%2520and%2520Siyuan%2520Chen%2520and%2520Jing%2520Wu%2520and%2520Jingdong%2520Hu%2520and%2520Na%2520Li%2520and%2520Junkai%2520Su%2520and%2520Yuxuan%2520Chen%2520and%2520Ao%2520Xu%25 {"title": "Neural Harmonic Textures for High-Quality Primitive Based Neural Reconstruction", "author": "Jorge Condor and Nicolas Moenne-Loccoz and Merlin Nimier-David and Piotr Didyk and Zan Gojcic and Qi Wu", "abstract": "Primitive-based methods such as 3D Gaussian Splatting have recently become the state-of-the-art for novel-view synthesis and related reconstruction tasks. Compared to neural fields, these representations are more flexible, adaptive, and scale better to large scenes. However, the limited expressivity of individual primitives makes modeling high-frequency detail challenging. We introduce Neural Harmonic Textures, a neural representation approach that anchors latent feature vectors on a virtual scaffold surrounding each primitive. These features are interpolated within the primitive at ray intersection points. Inspired by Fourier analysis, we apply periodic activations to the interpolated features, turning alpha blending into a weighted sum of harmonic components. The resulting signal is then decoded in a single deferred pass using a small neural network, significantly reducing computational cost. Neural Harmonic Textures yield state-of-the-art results in real-time novel view synthesis while bridging the gap between primitive- and neural-field-based reconstruction. Our method integrates seamlessly into existing primitive-based pipelines such as 3DGUT, Triangle Splatting, and 2DGS. We further demonstrate its generality with applications to 2D image fitting and semantic reconstruction.", "link": "http://arxiv.org/abs/2604.01204v1", "date": "2026-04-01", "relevancy": 2.3652, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.608}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5839}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5681}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Harmonic%20Textures%20for%20High-Quality%20Primitive%20Based%20Neural%20Reconstruction&body=Title%3A%20Neural%20Harmonic%20Textures%20for%20High-Quality%20Primitive%20Based%20Neural%20Reconstruction%0AAuthor%3A%20Jorge%20Condor%20and%20Nicolas%20Moenne-Loccoz%20and%20Merlin%20Nimier-David%20and%20Piotr%20Didyk%20and%20Zan%20Gojcic%20and%20Qi%20Wu%0AAbstract%3A%20Primitive-based%20methods%20such%20as%203D%20Gaussian%20Splatting%20have%20recently%20become%20the%20state-of-the-art%20for%20novel-view%20synthesis%20and%20related%20reconstruction%20tasks.%20Compared%20to%20neural%20fields%2C%20these%20representations%20are%20more%20flexible%2C%20adaptive%2C%20and%20scale%20better%20to%20large%20scenes.%20However%2C%20the%20limited%20expressivity%20of%20individual%20primitives%20makes%20modeling%20high-frequency%20detail%20challenging.%20We%20introduce%20Neural%20Harmonic%20Textures%2C%20a%20neural%20representation%20approach%20that%20anchors%20latent%20feature%20vectors%20on%20a%20virtual%20scaffold%20surrounding%20each%20primitive.%20These%20features%20are%20interpolated%20within%20the%20primitive%20at%20ray%20intersection%20points.%20Inspired%20by%20Fourier%20analysis%2C%20we%20apply%20periodic%20activations%20to%20the%20interpolated%20features%2C%20turning%20alpha%20blending%20into%20a%20weighted%20sum%20of%20harmonic%20components.%20The%20resulting%20signal%20is%20then%20decoded%20in%20a%20single%20deferred%20pass%20using%20a%20small%20neural%20network%2C%20significantly%20reducing%20computational%20cost.%20Neural%20Harmonic%20Textures%20yield%20state-of-the-art%20results%20in%20real-time%20novel%20view%20synthesis%20while%20bridging%20the%20gap%20between%20primitive-%20and%20neural-field-based%20reconstruction.%20Our%20method%20integrates%20seamlessly%20into%20existing%20primitive-based%20pipelines%20such%20as%203DGUT%2C%20Triangle%20Splatting%2C%20and%202DGS.%20We%20further%20demonstrate%20its%20generality%20with%20applications%20to%202D%20image%20fitting%20and%20semantic%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01204v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Harmonic%2520Textures%2520for%2520High-Quality%2520Primitive%2520Based%2520Neural%2520Reconstruction%26entry.906535625%3DJorge%2520Condor%2520and%2520Nicolas%2520Moenne-Loccoz%2520and%2520Merlin%2520Nimier-David%2520and%2520Piotr%2520Didyk%2520and%2520Zan%2520Gojcic%2520and%2520Qi%2520Wu%26entry.1292438233%3DPrimitive-based%2520methods%2520such%2520as%25203D%2520Gaussian%2520Splatting%2520have%2520recently%2520become%2520the%2520state-of-the-art%2520for%2520novel-view%2520synthesis%2520and%2520related%2520reconstruction%2520tasks.%2520Compared%2520to%2520neural%2520fields%252C%2520these%2520representations%2520are%2520more%2520flexible%252C%2520adaptive%252C%2520and%2520scale%2520better%2520to%2520large%2520scenes.%2520However%252C%2520the%2520limited%2520expressivity%2520of%2520individual%2520primitives%2520makes%2520modeling%2520high-frequency%2520detail%2520challenging.%2520We%2520introduce%2520Neural%2520Harmonic%2520Textures%252C%2520a%2520neural%2520representation%2520approach%2520that%2520anchors%2520latent%2520feature%2520vectors%2520on%2520a%2520virtual%2520scaffold%2520surrounding%2520each%2520primitive.%2520These%2520features%2520are%2520interpolated%2520within%2520the%2520primitive%2520at%2520ray%2520intersection%2520points.%2520Inspired%2520by%2520Fourier%2520analysis%252C%2520we%2520apply%2520periodic%2520activations%2520to%2520the%2520interpolated%2520features%252C%2520turning%2520alpha%2520blending%2520into%2520a%2520weighted%2520sum%2520of%2520harmonic%2520components.%2520The%2520resulting%2520signal%2520is%2520then%2520decoded%2520in%2520a%2520single%2520deferred%2520pass%2520using%2520a%2520small%2520neural%2520network%252C%2520significantly%2520reducing%2520computational%2520cost.%2520Neural%2520Harmonic%2520Textures%2520yield%2520state-of-the-art%2520results%2520in%2520real-time%2520novel%2520view%2520synthesis%2520while%2520bridging%2520the%2520gap%2520between%2520primitive-%2520and%2520neural-field-based%2520reconstruction.%2520Our%2520method%2520integrates%2520seamlessly%2520into%2520existing%2520primitive-based%2520pipelines%2520such%2520as%25203DGUT%252C%2520Triangle%2520Splatting%252C%2520and%25202DGS.%2520We%2520further%2520demonstrate%2520its%2520generality%2520with%2520applications%2520to%25202D%2520image%2520fitting%2520and%2520semantic%2520reconstruction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01204v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Neural%20Harmonic%20Textures%20for%20High-Quality%20Primitive%20Based%20Neural%20Reconstruction&entry.906535625=Jorge%20Condor%20and%20Nicolas%20Moenne-Loccoz%20and%20Merlin%20Nimier-David%20and%20Piotr%20Didyk%20and%20Zan%20Gojcic%20and%20Qi%20Wu&entry.1292438233=Primitive-based%20methods%20such%20as%203D%20Gaussian%20Splatting%20have%20recently%20become%20the%20state-of-the-art%20for%20novel-view%20synthesis%20and%20related%20reconstruction%20tasks.%20Compared%20to%20neural%20fields%2C%20these%20representations%20are%20more%20flexible%2C%20adaptive%2C%20and%20scale%20better%20to%20large%20scenes.%20However%2C%20the%20limited%20expressivity%20of%20individual%20primitives%20makes%20modeling%20high-frequency%20detail%20challenging.%20We%20introduce%20Neural%20Harmonic%20Textures%2C%20a%20neural%20representation%20approach%20that%20anchors%20latent%20feature%20vectors%20on%20a%20virtual%20scaffold%20surrounding%20each%20primitive.%20These%20features%20are%20interpolated%20within%20the%20primitive%20at%20ray%20intersection%20points.%20Inspired%20by%20Fourier%20analysis%2C%20we%20apply%20periodic%20activations%20to%20the%20interpolated%20features%2C%20turning%20alpha%20blending%20into%20a%20weighted%20sum%20of%20harmonic%20components.%20The%20resulting%20signal%20is%20then%20decoded%20in%20a%20single%20deferred%20pass%20using%20a%20small%20neural%20network%2C%20significantly%20reducing%20computational%20cost.%20Neural%20Harmonic%20Textures%20yield%20state-of-the-art%20results%20in%20real-time%20novel%20view%20synthesis%20while%20bridging%20the%20gap%20between%20primitive-%20and%20neural-field-based%20reconstruction.%20Our%20method%20integrates%20seamlessly%20into%20existing%20primitive-based%20pipelines%20such%20as%203DGUT%2C%20Triangle%20Splatting%2C%20and%202DGS.%20We%20further%20demonstrate%20its%20generality%20with%20applications%20to%202D%20image%20fitting%20and%20semantic%20reconstruction.&entry.1838667208=http%3A//arxiv.org/abs/2604.01204v1&entry.124074799=Read"},
{"title": "Beyond the Golden Data: Resolving the Motion-Vision Quality Dilemma via Timestep Selective Training", "author": "Xiangyang Luo and Qingyu Li and Yuming Li and Guanbo Huang and Yongjie Zhu and Wenyu Qin and Meng Wang and Pengfei Wan and Shao-Lun Huang", "abstract": "Recent advances in video generation models have achieved impressive results. However, these models heavily rely on the use of high-quality data that combines both high visual quality and high motion quality. In this paper, we identify a key challenge in video data curation: the Motion-Vision Quality Dilemma. We discovered that visual quality and motion intensity inherently exhibit a negative correlation, making it hard to obtain golden data that excels in both aspects. To address this challenge, we first examine the hierarchical learning dynamics of video diffusion models and conduct gradient-based analysis on quality-degraded samples. We discover that quality-imbalanced data can produce gradients similar to golden data at appropriate timesteps. Based on this, we introduce the novel concept of Timestep selection in Training Process. We propose Timestep-aware Quality Decoupling (TQD), which modifies the data sampling distribution to better match the model's learning process. For certain types of data, the sampling distribution is skewed toward higher timesteps for motion-rich data, while high visual quality data is more likely to be sampled during lower timesteps. Through extensive experiments, we demonstrate that TQD enables training exclusively on separated imbalanced data to achieve performance surpassing conventional training with better data, challenging the necessity of perfect data in video generation. Moreover, our method also boosts model performance when trained on high-quality data, showcasing its effectiveness across different data scenarios.", "link": "http://arxiv.org/abs/2603.25527v2", "date": "2026-04-01", "relevancy": 2.3462, "topK": [{"title": "Customize-A-Video: One-Shot Motio %20novel%20concept%20of%20Timestep%20selection%20in%20Training%20Process.%20We%20propose%20Timestep-aware%20Quality%20Decoupling%20%28TQD%29%2C%20which%20modifies%20the%20data%20sampling%20distribution%20to%20better%20match%20the%20model%27s%20learning%20process.%20For%20certain%20types%20of%20data%2C%20the%20sampling%20distribution%20is%20skewed%20toward%20higher%20timesteps%20for%20motion-rich%20data%2C%20while%20high%20visual%20quality%20data%20is%20more%20likely%20to%20be%20sampled%20during%20lower%20timesteps.%20Through%20extensive%20experiments%2C%20we%20demonstrate%20that%20TQD%20enables%20training%20exclusively%20on%20separated%20imbalanced%20data%20to%20achieve%20performance%20surpassing%20conventional%20training%20with%20better%20data%2C%20challenging%20the%20necessity%20of%20perfect%20data%20in%20video%20generation.%20Moreover%2C%20our%20method%20also%20boosts%20model%20performance%20when%20trained%20on%20high-quality%20data%2C%20showcasing%20its%20effectiveness%20across%20different%20data%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.25527v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520the%2520Golden%2520Data%253A%2520Resolving%2520the%2520Motion-Vision%2520Quality%2520Dilemma%2520via%2520Timestep%2520Selective%2520Training%26entry.906535625%3DXiangyang%2520Luo%2520and%2520Qingyu%2520Li%2520and%2520Yuming%2520Li%2520and%2520Guanbo%2520Huang%2520and%2520Yongjie%2520Zhu%2520and%2520Wenyu%2520Qin%2520and%2520Meng%2520Wang%2520and%2520Pengfei%2520Wan%2520and%2520Shao-Lun%2520Huang%26entry.1292438233%3DRecent%2520advances%2520in%2520video%2520generation%2520models%2520have%2520achieved%2520impressive%2520results.%2520However%252C%2520these%2520models%2520heavily%2520rely%2520on%2520the%2520use%2520of%2520high-quality%2520data%2520that%2520combines%2520both%2520high%2520visual%2520quality%2520and%2520high%2520motion%2520quality.%2520In%2520this%2520paper {"title": "Two-stage Vision Transformers and Hard Masking offer Robust Object Representations", "author": "Ananthu Aniraj and Cassio F. Dantas and Dino Ienco and Diego Marcos", "abstract": "Context can strongly affect object representations, sometimes leading to undesired biases, particularly when objects appear in out-of-distribution backgrounds at inference. At the same time, many object-centric tasks require to leverage the context for identifying the relevant image regions. We posit that this conundrum, in which context is simultaneously needed and a potential nuisance, can be addressed by an attention-based approach that uses learned binary attention masks to ensure that only attended image regions influence the prediction. To test this hypothesis, we evaluate a two-stage framework: stage 1 processes the full image to discover object parts and identify task-relevant regions, for which context cues are likely to be needed, while stage 2 leverages input attention masking to restrict its receptive field to these regions, enabling a focused analysis while filtering out potentially spurious information. Both stages are trained jointly, allowing stage 2 to refine stage 1. The explicit nature of the semantic masks also makes the model's reasoning auditable, enabling powerful test-time interventions to further enhance robustness. Extensive experiments across diverse benchmarks demonstrate that this approach significantly improves robustness against spurious correlations and out-of-distribution backgrounds. Code: https://github.com/ananthu-aniraj/ifam", "link": "http://arxiv.org/abs/2506.08915v4", "date": "2026-04-01", "relevancy": 2.3414, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.602}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5828}, {"title": "Lexicon3D: Probing {"title": "D4C: Data-Free Quantization for Contrastive Language-Image Pre-training Models", "author": "Wenlun Zhang and Yunshan Zhong and Zihao Ding and Xinyu Li and Kentaro Yoshioka", "abstract": "Data-Free Quantization (DFQ) offers a practical solution for model compression without requiring access to real data, making it particularly attractive in privacy-sensitive scenarios. While DFQ has shown promise for unimodal models, its extension to Vision-Language Models such as Contrastive Language-Image Pre-training (CLIP) models remains underexplored. In this work, we reveal that directly applying existing DFQ techniques to CLIP results in substantial performance degradation due to two key limitations: insufficient semantic content and low intra-image diversity in synthesized samples. To tackle these challenges, we propose D4C, the first DFQ framework tailored for CLIP. D4C synthesizes semantically rich and structurally diverse pseudo images through three key components: 1) Prompt-Guided Semantic Injection aligns generated images with real-world semantics using text prompts; 2) Structural Contrastive Generation reproduces compositional structures of natural images by leveraging foreground-background contrastive synthesis; and 3) Perturbation-Aware Enhancement applies controlled perturbations to improve sample diversity and robustness. These components jointly empower D4C to synthesize images that are both semantically informative and structurally diverse, effectively bridging the performance gap of DFQ on CLIP. Extensive experiments validate the effectiveness of D4C, showing significant performance improvements on various bit-widths and models.", "link": "http://arxiv.org/abs/2511.15411v2", "date": "2026-04-01", "relevancy": 2.326, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.582}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.582}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20D4C%3A%20Data-Free%20Quantization%20for%20Contrastive%20Language-Image%20Pre-training%20Models&body=Title%3A%20D4C%3A%20Data-Free%20Quantization%20for%20Contrastive%20Language-Image%20Pre-training%20Models%0AAuthor%3A%20Wenlun%20Zhang%20and%20Yunshan%20Zhong%20and%20Zihao%20Ding%20and%20Xinyu%20Li%20and%20Kentaro%20Yoshioka%0AAbstract%3A%20Data-Free%20Quantization%20%28DFQ%29%20offers%20a%20practical%20solution%20for%20model%20compression%20without%20requiring%20access%20to%20real%20data%2C%20making%20it%20particularly%20attractive%20in%20privacy-sensitive%20scenarios.%20While%20DFQ%20has%20shown%20promise%20for%20unimodal%20models%2C%20its%20extension%20to%20Vision-Language%20Models%20such%20as%20Contrastive%20Language-Image%20Pre-training%20%28CLIP%29%20models%20remains%20underexplored.%20In%20this%20work%2C%20we%20reveal%20that%20directly%20applying%20existing%20DFQ%20techniques%20to%20CLIP%20results%20in%20substantial%20performance%20degradation%20due%20to%20two%20key%20limitations%3A%20insufficient%20semantic%20content%20and%20low%20intra-image%20diversity%20in%20synthesized%20samples.%20To%20tackle%20these%20challenges%2C%20we%20propose%20D4C%2C%20the%20first%20DFQ%20framework%20tailored%20for%20CLIP.%20D4C%20synthesizes%20semantically%20rich%20and%20structurally%20diverse%20pseudo%20images%20through%20three%20key%20components%3A%201%29%20Prompt-Guided%20Semantic%20Injection%20aligns%20generated%20images%20with%20real-world%20semantics%20using%20text%20prompts%3B%202%29%20Structural%20Contrastive%20Generation%20reproduces%20compositional%20structures%20of%20natural%20images%20by%20leveraging%20foreground-background%20contrastive%20synthesis%3B%20and%203%29%20Perturbation-Aware%20Enhancement%20applies%20controlled%20perturbations%20to%20improve%20sample%20diversity%20and%20robustness.%20These%20components%20jointly%20empower%20D4C%20to%20synthesize%20images%20that%20are%20both%20semantically%20informative%20and%20structurally%20diverse%2C%20effectively%20bridging%20the%20performance%20gap%20of%20DFQ%20on%20CLIP.%20Extensive%20experiments%20validate%20the%20effectiveness%20of%20D4C%2C%20showing%20significant%20performance%20improvements%20on%20various%20bit-widths%20and%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2511.15411v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DD4C%253A%2520Data-Free%2520Quantization%2520for%2520Contrastive%2520Language-Image%2520Pre-training%2520Models%26entry.906535625%3DWenlun%2520Zhang%2520and%2520Yunshan%2520Zhong%2520and%2520Zihao%2520Ding%2520and%2520Xinyu%2520Li%2520and%2520Kentaro%2520Yoshioka%26entry.1292438233%3DData-Free%2520Quantization%2520%2528DFQ%2529%2520offers%2520a%2520practical%2520solution%2520for%2520model%2520compression%2520without%2520requiring%2520access%2520to%2520real%2520data%252C%2520making%2520it%2520particularly%2520attractive%2520in%2520privacy-sensitive%2520scenarios.%2520While%2520DFQ%2520has%2520shown%2520promise%2520for%2520unimodal%2520models%252C%2520its%2520extension%2520to%2520Vision-Language%2520Models%2520such%2520as%2520Contrastive%2520Language-Image%2520Pre-training%2520%2528CLIP%2529%2520models%2520remains%2520underexplored.%2520In%2520this%2520work%252C%2520we%2520reveal%2520that%2520directly%2520applying%2520existing%2520DFQ%2520techniques%2520to%2520CLIP%2520results%2520in%2520substantial%2520performance%2520degradation%2520due%2520to%2520two%2520key%2520limitations%253A%2520insufficient%2520semantic%2520content%2520and%2520low%2520intra-image%2520diversity%2520in%2520synthesized%2520samples.%2520To%2520tackle%2520these%2520challenges%252C%2520we%2520p

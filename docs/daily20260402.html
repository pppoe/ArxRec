et%20annotated%20with%20quantised%20motion%20tokens.%20Experiments%20demonstrate%20robust%20retrieval%20across%20diverse%20dance%20styles%20and%20strong%20generalisation%20to%20unseen%20choreographies%2C%20establishing%20a%20foundation%20for%20scalable%20motion%20fingerprinting%20and%20quantitative%20choreographic%20analysis.&entry.1838667208=http%3A//arxiv.org/abs/2604.00927v1&entry.124074799=Read"},
{"title": "Query-Conditioned Evidential Keyframe Sampling for MLLM-Based Long-Form Video Understanding", "author": "Yiheng Wang and Lichen Zhu and Yueqian Lin and Yudong Liu and Jingyang Zhang and Hai \"Helen\" Li and Yiran Chen", "abstract": "Multimodal Large Language Models (MLLMs) have shown strong performance on video question answering, but their application to long-form videos is constrained by limited context length and computational cost, making keyframe sampling essential. Existing approaches typically rely on semantic relevance or reinforcement learning, which either fail to capture evidential clues or suffer from inefficient combinatorial optimization. In this work, we propose an evidence-driven keyframe sampling framework grounded in information bottleneck theory. We formulate keyframe selection as maximizing the conditional mutual information between selected frames and the query, providing a principled objective that reflects each frame's contribution to answering the question. To make this objective tractable, we exploit its structure to derive a decomposed optimization that reduces subset selection to independent frame-level scoring. We further introduce a query-conditioned evidence scoring network trained with a contrastive objective to estimate evidential importance efficiently. Experiments on long-form video understanding benchmarks show that our method consistently outperforms prior sampling strategies under strict token budgets, while significantly improving training efficiency.", "link": "http://arxiv.org/abs/2604.01002v1", "date": "2026-04-01", "relevancy": 2.6689, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5423}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5423}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5167}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Query-Conditioned%20Evidential%20Keyframe%20Sampling%20for%20MLLM-Based%20Long-Form%20Video%20Understanding&body=Title%3A%20Query-Conditioned%20Evidential%20Keyframe%20Sampling%20for%20MLLM-Based%20Long-Form%20Video%20Understanding%0AAuthor%3A%20Yiheng%20Wang%20and%20Lichen%20Zhu%20and%20Yueqian%20Lin%20and%20Yudong%20Liu%20and%20Jingyang%20Zhang%20and%20Hai%20%22Helen%22%20Li%20and%20Yiran%20Chen%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20shown%20strong%20performance%20on%20video%20question%20answering%2C%20but%20their%20application%20to%20long-form%20videos%20is%20constrained%20by%20limited%20context%20length%20and%20computational%20cost%2C%20making%20keyframe%20sampling%20essential.%20Existing%20approaches%20typically%20rely%20on%20semantic%20relevance%20or%20reinforcement%20learning%2C%20which%20either%20fail%20to%20capture%20evidential%20clues%20or%20suffer%20from%20inefficient%20combinatorial%20optimization.%20In%20this%20work%2C%20we%20propose%20an%20evidence-driven%20keyframe%20sampling%20framework%20grounded%20in%20information%20bottleneck%20theory.%20We%20formulate%20keyframe%20selection%20as%20maximizing%20the%20conditional%20mutual%20information%20between%20selected%20frames%20and%20the%20query%2C%20providing%20a%20principled%20objective%20that%20reflects%20each%20frame%27s%20contribution%20to%20answering%20the%20question.%20To%20make%20this%20objective%20tractable%2C%20we%20exploit%20its%20structure%20to%20derive%20a%20decomposed%20optimization%20that%20reduces%20subset%20selection%20to%20independent%20frame-level%20scoring.%20We%20further%20introduce%20a%20query-conditioned%20evidence%20scoring%20network%20trained%20with%20a%20contrastive%20objective%20to%20estimate%20evidential%20importance%20efficiently.%20Experiments%20on%20long-form%20video%20understanding%20benchmarks%20show%20that%20our%20method%20consistently%20outperforms%20prior%20sampling%20strategies%20under%20strict%20token%20budgets%2C%20while%20significantly%20improving%20training%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01002v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQuery-Conditioned%2520Evidential%2520Keyframe%2520Sampling%2520for%2520MLLM-Based%2520Long-Form%2520Video%2520Understanding%26entry.906535625%3DYiheng%2520Wang%2520and%2520Lichen%2520Zhu%2520and%2520Yueqian%2520Lin%2520and%2520Yudong%2520Liu%2520and%2520Jingyang%2520Zhang%2520and%2520Hai%2520%2522Helen%2522%2520Li%2520and%2520Yiran%2520Chen%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520shown%2520strong%2520performance%2520on%2520video%2520question%2520answering%252C%2520but%2520their%2520application%2520to%2520long-form%2520videos%2520is%2520constrained%2520by%2520limited%2520context%2520length%2520and%2520computational%2520cost%252C%2520making%2520keyframe%2520sampling%2520essential.%2520Existing%2520approaches%2520typically%2520rely%2520on%2520semantic%2520relevance%2520or%2520reinforcement%2520learning%252C%2520which%2520either%2520fail%2520to%2520capture%2520evidential%2520clues%2520or%2520suffer%2520from%2520inefficient%2520combinatorial%2520optimization.%2520In%2520this%2520work%252C%2520we%2520propose%2520an%2520evidence-driven%2520keyframe%2520sampling%2520framework%2520grounded%2520in%2520information%2520bottleneck%2520theory.%2520We%2520formulate%2520keyframe%2520selection%2520as%2520maximizing%2520the%2520conditional%2520mutual%2520information%2520between%2520selected%2520frames%2520and%2520the%2520query%252C%2520providing%2520a%2520principled%2520objective%2520that%2520reflects%2520each%2520frame%2527s%2520contribution%2520to%2520answering%2520the%2520question.%2520To%2520make%25 {"title": "PDA: Text-Augmented Defense Framework for Robust Vision-Language Models against Adversarial Image Attacks", "author": "Jingning Xu and Haochen Luo and Chen Liu", "abstract": "Vision-language models (VLMs) are vulnerable to adversarial image perturbations. Existing works based on adversarial training against task-specific adversarial examples are computationally expensive and often fail to generalize to unseen attack types. To address these limitations, we introduce Paraphrase-Decomposition-Aggregation (PDA), a training-free defense framework that leverages text augmentation to enhance VLM robustness under diverse adversarial image attacks. PDA performs prompt paraphrasing, question decomposition, and consistency aggregation entirely at test time, thus requiring no modification on the underlying models. To balance robustness and efficiency, we instantiate PDA as invariants that reduce the inference cost while retaining most of its robustness gains. Experiments on multiple VLM architectures and benchmarks for visual question answering, classification, and captioning show that PDA achieves consistent robustness gains against various adversarial perturbations while maintaining competitive clean accuracy, establishing a generic, strong and practical defense framework for VLMs during inference.", "link": "http://arxiv.org/abs/2604.01010v1", "date": "2026-04-01", "relevancy": 2.666, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5258}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PDA%3A%20Text-Augmented%20Defense%20Framework%20for%20Robust%20Vision-Language%20Models%20against%20Adversarial%20Image%20Attacks&body=Title%3A%20PDA%3A%20Text-Augmented%20Defense%20Framework%20for%20Robust%20Vision-Language%20Models%20against%20Adversarial%20Image%20Attacks%0AAuthor%3A%20Jingning%20Xu%20and%20Haochen%20Luo%20and%20Chen%20Liu%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20are%20vulnerable%20to%20adversarial%20image%20perturbations.%20Existing%20works%20based%20on%20adversarial%20training%20against%20task-specific%20adversarial%20examples%20are%20computationally%20expensive%20and%20often%20fail%20to%20generalize%20to%20unseen%20attack%20types.%20To%20address%20these%20limitations%2C%20we%20introduce%20Paraphrase-Decomposition-Aggregation%20%28PDA%29%2C%20a%20training-free%20defense%20framework%20that%20leverages%20text%20augmentation%20to%20enhance%20VLM%20robustness%20under%20diverse%20adversarial%20image%20attacks.%20PDA%20performs%20prompt%20paraphrasing%2C%20question%20decomposition%2C%20and%20consistency%20aggregation%20entirely%20at%20test%20time%2C%20thus%20requiring%20no%20modification%20on%20the%20underlying%20models.%20To%20balance%20robustness%20and%20efficiency%2C%20we%20instantiate%20PDA%20as%20invariants%20that%20reduce%20the%20inference%20cost%20while%20retaining%20most%20of%20its%20robustness%20gains.%20Experiments%20on%20multiple%20VLM%20architectures%20and%20benchmarks%20for%20visual%20question%20answering%2C%20classification%2C%20and%20captioning%20show%20that%20PDA%20achieves%20consistent%20robustness%20gains%20against%20various%20adversarial%20perturbations%20while%20maintaining%20competitive%20clean%20accuracy%2C%20establishing%20a%20generic%2C%20strong%20and%20practical%20defense%20framework%20for%20VLMs%20during%20inference.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01010v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPDA%253A%2520Text-Augmented%2520Defense%2520Framework {"title": "Meta-Learning and Meta-Reinforcement Learning -- Tracing the Path towards DeepMind's Adaptive Agent", "author": "Bj\u00f6rn Hoppmann and Christoph Scholz", "abstract": "Humans are highly effective at utilizing prior knowledge to adapt to novel tasks, a capability that standard machine learning models struggle to replicate due to their reliance on task-specific training. Meta-learning overcomes this limitation by allowing models to acquire transferable knowledge from various tasks, enabling rapid adaptation to new challenges with minimal data. This survey provides a rigorous, task-based formalization of meta-learning and meta-reinforcement learning and uses that paradigm to chronicle the landmark algorithms that paved the way for DeepMind's Adaptive Agent, consolidating the essential concepts needed to understand the Adaptive Agent and other generalist approaches.", "link": "http://arxiv.org/abs/2602.19837v2", "date": "2026-04-01", "relevancy": 2.6472, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5592}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5224}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Meta-Learning%20and%20Meta-Reinforcement%20Learning%20--%20Tracing%20the%20Path%20towards%20DeepMind%27s%20Adaptive%20Agent&body=Title%3A%20Meta-Learning%20and%20Meta-Reinforcement%20Learning%20--%20Tracing%20the%20Path%20towards%20DeepMind%27s%20Adaptive%20Agent%0AAuthor%3A%20Bj%C3%B6rn%20Hoppmann%20and%20Christoph%20Scholz%0AAbstract%3A%20Humans%20are%20highly%20effective%20at%20utilizing%20prior%20knowledge%20to%20adapt%20to%20novel%20tasks%2C%20a%20capability%20that%20standard%20machine%20learning%20models%20struggle%20to {"title": "Representation Selection via Cross-Model Agreement using Canonical Correlation Analysis", "author": "Dylan B. Lewis and Jens Gregor and Hector Santos-Villalobos", "abstract": "Modern vision pipelines increasingly rely on pretrained image encoders whose representations are reused across tasks and models, yet these representations are often overcomplete and model-specific. We propose a simple, training-free method to improve the efficiency of image representations via a post-hoc canonical correlation analysis (CCA) operator. By leveraging the shared structure between representations produced by two pre-trained image encoders, our method finds linear projections that serve as a principled form of representation selection and dimensionality reduction, retaining shared semantic content while discarding redundant dimensions. Unlike standard dimensionality reduction techniques such as PCA, which operate on a single embedding space, our approach leverages cross-model agreement to guide representation distillation and refinement. The technique allows representations to be reduced by more than 75% in dimensionality with improved downstream performance, or enhanced at fixed dimensionality via post-hoc representation transfer from larger or fine-tuned models. Empirical results on ImageNet-1k, CIFAR-100, MNIST, and additional benchmarks show consistent improvements over both baseline and PCA-projected representations, with accuracy gains of up to 12.6%.", "link": "http://arxiv.org/abs/2604.00921v1", "date": "2026-04-01", "relevancy": 2.6403, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5438}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5363}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5041}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representation%20Selection%20via%20Cross-Model%20Agreement%20using%20Canonical%20Correlation%20Analysis&body=Title%3A%20Representation%20Selection%20via%20Cross-Model%20Agreement%20using%20Canonical%20Correlation%20Analysis%0AAuthor%3A%20Dylan%20B.%20Lewis%20and%20Jens%20Gregor%20and%20Hector%20Santos-Villalobos%0AAbstract%3A%20Modern%20vision%20pipelines%20increasingly%20rely%20on%20pretrained%20image%20encoders%20whose%20representations%20are%20reused%20across%20tasks%20and%20models%2C%20yet%20these%20representations%20are%20often%20overcomplete%20and%20model-specific.%20We%20propose%20a%20simple%2C%20training-free%20method%20to%20improve%20the%20efficiency%20of%20image%20representations%20via%20a%20post-hoc%20canonical%20correlation%20analysis%20%28CCA%29%20operator.%20By%20leveraging%20the%20shared%20structure%20between%20representations%20produced%20by%20two%20pre-trained%20image%20encoders%2C%20our%20method%20finds%20linear%20projections%20that%20serve%20as%20a%20principled%20form%20of%20representation%20selection%20and%20dimensionality%20reduction%2C%20retaining%20shared%20semantic%20content%20while%20discarding%20redundant%20dimensions.%20Unlike%20standard%20dimensionality%20reduction%20techniques%20such%20as%20PCA%2C%20which%20operate%20on%20a%20single%20embedding%20space%2C%20our%20approach%20leverages%20cross-model%20agreement%20to%20guide%20representation%20distillation%20and%20refinement.%20The%20technique%20allows%20representations%20to%20be%20reduced%20by%20more%20than%2075%25%20in%20dimensionality%20with%20improved%20downstream%20performance%2C%20or%20enhanced%20at%20fixed%20dimensionality%20via%20post-hoc%20representation%20transfer%20from%20larger%20or%20fine-tuned%20models.%20Empirical%20results%20on%20ImageNet-1k%2C%20CIFAR-100%2C%20MNIST%2C%20and%20additional%20benchmarks%20show%20consistent%20improvements%20over%20both%20baseline%20and%20PCA-proje proved%2520downstream%2520performance%252C%2520or%2520enhanced%2520at%2520fixed%2520dimensionality%2520via%2520post-hoc%2520representation%2520transfer%2520from%2520larger%2520or%2520fine-tuned%2520models.%2520Empirical%2520results%2520on%2520ImageNet-1k%252C%2520CIFAR-100%252C%2520MNIST%252C%2520and%2520additional%2520benchmarks%2520show%2520consistent%2520improvements%2520over%2520both%2520baseline%2520and%2520PCA-projected%2520representations%252C%2520with%2520accuracy%2520gains%2520of%2520up%2520to%252012.6%2525.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.00921v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Representation%20Selection%20via%20Cross-Model%20Agreement%20using%20Canonical%20Correlation%20Analysis&entry.906535625=Dylan%20B.%20Lewis%20and%20Jens%20Gregor%20and%20Hector%20Santos-Villalobos&entry.1292438233=Modern%20vision%20pipelines%20increasingly%20rely%20on%20pretrained%20image%20encoders%20whose%20representations%20are%20reused%20across%20tasks%20and%20models%2C%20yet%20these%20representations%20are%20often%20overcomplete%20and%20model-specific.%20We%20propose%20a%20simple%2C%20training-free%20method%20to%20improve%20the%20efficiency%20of%20image%20representations%20via%20a%20post-hoc%20canonical%20correlation%20analysis%20%28CCA%29%20operator.%20By%20leveraging%20the%20shared%20structure%20between%20representations%20produced%20by%20two%20pre-trained%20image%20encoders%2C%20our%20method%20finds%20linear%20projections%20that%20serve%20as%20a%20principled%20form%20of%20representation%20selection%20and%20dimensionality%20reduction%2C%20retaining%20shared%20semantic%20content%20while%20discarding%20redundant%20dimensions.%20Unlike%20standard%20dimensionality%20reduction%20techniques%20such%20as%20PCA%2C%20which%20operate%20on%20a%20single%20embedding%20space%2C%20our%20approach%20leverages%20cross-model%20agreement%20to%20guide%20represe {"title": "EoS-FM: Can an Ensemble of Specialist Models act as a Generalist Feature Extractor?", "author": "Pierre Adorni and Minh-Tan Pham and St\u00e9phane May and S\u00e9bastien Lef\u00e8vre", "abstract": "Recent advances in foundation models have shown great promise in domains such as natural language processing and computer vision, and similar efforts are now emerging in the Earth Observation community. These models aim to generalize across tasks with limited supervision, reducing the need for training separate models for each task. However, current strategies, which largely focus on scaling model size and dataset volume, require prohibitive computational and data resources, limiting accessibility to only a few large institutions. Moreover, this paradigm of ever-larger models stands in stark contrast with the principles of sustainable and environmentally responsible AI, as it leads to immense carbon footprints and resource inefficiency. In this work, we present a novel and efficient alternative: an Ensemble-of-Specialists framework for building Remote Sensing Foundation Models (RSFMs). Our method decomposes the training process into lightweight, task-specific ConvNeXtV2 specialists that can be frozen and reused. This modular approach offers strong advantages in efficiency, interpretability, and extensibility. Moreover, it naturally supports federated training, pruning, and continuous specialist integration, making it particularly well-suited for collaborative and resource-constrained settings. Our framework sets a new direction for building scalable and efficient RSFMs. All codes and pretrained models are available on the public repo at https://github.com/pierreadorni/EoS-FM .", "link": "http://arxiv.org/abs/2511.21523v3", "date": "2026-04-01", "relevancy": 2.6284, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5516}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5516}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4737}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EoS-FM%3A%20Can%20an%20Ensemble%20of%20Specialist%20Models%20act%20as%20a%20Generalist%20Feature%20Extractor%3F&body=Title%3A%20EoS-FM%3A%20Can%20an%20Ensemble%20of%20Specialist%20Models%20act%20as%20a%20Generalist%20Feature%20Extractor%3F%0AAuthor%3A%20Pierre%20Adorni%20and%20Minh-Tan%20Pham%20and%20St%C3%A9phane%20May%20and%20S%C3%A9bastien%20Lef%C3%A8vre%0AAbstract%3A%20Recent%20advances%20in%20foundation%20models%20have%20shown%20great%20promise%20in%20domains%20such%20as%20natural%20language%20processing%20and%20computer%20vision%2C%20and%20similar%20efforts%20are%20now%20emerging%20in%20the%20Earth%20Observation%20community.%20These%20models%20aim%20to%20generalize%20across%20tasks%20with%20limited%20supervision%2C%20reducing%20the%20need%20for%20training%20separate%20models%20for%20each%20task.%20However%2C%20current%20strategies%2C%20which%20largely%20focus%20on%20scaling%20model%20size%20and%20dataset%20volume%2C%20require%20prohibitive%20computational%20and%20data%20resources%2C%20limiting%20accessibility%20to%20only%20a%20few%20large%20institutions.%20Moreover%2C%20this%20paradigm%20of%20ever-larger%20models%20stands%20in%20stark%20contrast%20with%20the%20principles%20of%20sustainable%20and%20environmentally%20responsible%20AI%2C%20as%20it%20leads%20to%20immense%20carbon%20footprints%20and%20resource%20inefficiency.%20In%20this%20work%2C%20we%20present%20a%20novel%20and%20efficient%20alternative%3A%20an%20Ensemble-of-Specialists%20framework%20for%20building%20Remote%20Sensing%20Foundation%20Models%20%28RSFMs%29.%20Our%20method%20decomposes%20the%20training%20process%20into%20lightweight%2C%20task-specific%20ConvNeXtV2%20specialists%20that%20can%20be%20frozen%20and%20reused.%20This%20modular%20approach%20offers%20strong%20advantages%20in%20efficiency%2C%20interpretability%2C%20and%20extensibility.%20Moreover%2C%20it%20naturally%20supports%20federated%20training%2C%20pruning%2C%20and%20continuous%20specialist%20integration%2C%20making%20it%20particularly%20well-suited%20for%20collaborative%20and%20resource-constrained%20settings.%20Our%20framework%20sets%20a%20new%20direction%20for%20building%20scalable%20and%20efficient%20RSFMs.%20All%20codes%20and%20pretrained%20models%20are%20available%20on%20the%20public%20repo%20at%20https%3A//github.com/pierreadorni/EoS-FM%20.%0ALink%3A%20http%3A//arxiv.org/abs/2511.21523v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEoS-FM%253A%2520Can%2520an%2520Ensemble%2520of%2520Specialist%2520Models%2520act%2520as%2520a%2520Generalist%2520Feature%2520Extractor%253F%26entry.906535625%3DPierre%2520Adorni%2520and%2520Minh-Tan%2520Pham%2520and%2520St%25C3%25A9phane%2520May%2520and%2520S%25C3%25A9bastien%2520Lef%25C3%25A8vre%26entry.1292438233%3DRecent%2520advances%2520in%2520foundation%2520models%2520have%2520shown%2520great%2520promise%2520in%2520domains%2520such%2520as%2520natural%2520language%2520processing%2520and%2520computer%2520vision%252C%2520and%2520similar%2520efforts%2520are%2520now%2520emerging%2520in%2520the%2520Earth%2520Observation%2520community.%2520These%2520models%2520aim%2520to%2520generalize%2520across%2520tasks%2520with%2520limited%2520supervision%252C%2520reducing%2520the%2520need%2520for%2520training%2520separate%2520models%2520for%2520each%2520task.%2520However%252C%2520current%2520strategies%252C%2520which%2520largely%2520focus%2520on%2520scaling%2520model%2520size%2520and%2520dataset%2520volume%252C%2520require%2520prohibitive%2520computational%2520and%2520data%2520resources%252C%2520limiting%2520accessibility%2520to%2520only%2520a%2520few%2520large%2520in {"title": "ProTPS: Prototype-Guided Text Prompt Selection for Continual Learning", "author": "Jie Mei and Li-Leng Peng and Keith Fuller and Jenq-Neng Hwang", "abstract": "For continual learning, text-prompt-based methods leverage text encoders and learnable prompts to encode semantic features for sequentially arrived classes over time. A common challenge encountered by existing works is how to learn unique text prompts, which implicitly carry semantic information of new classes, so that the semantic features of newly arrived classes do not overlap with those of trained classes, thereby mitigating the catastrophic forgetting problem. To address this challenge, we propose a novel approach Prototype-guided Text Prompt Selection (ProTPS)'' to intentionally increase the training flexibility thus encouraging the learning of unique text prompts. Specifically, our ProTPS learns class-specific vision prototypes and text prompts. Vision prototypes guide the selection and learning of text prompts for each class. We first evaluate our ProTPS in both class incremental (CI) setting and cross-datasets continual (CDC) learning setting. Because our ProTPS achieves performance close to the upper bounds, we further collect a real-world dataset with 112 marine species collected over a span of six years, named Marine112, to bring new challenges to the community. Marine112 is authentically suited for the class and domain incremental (CDI) learning setting and is under natural long-tail distribution. The results under three settings show that our ProTPS performs favorably against the recent state-of-the-art methods. The implementation code and Marine112 dataset will be released upon the acceptance of our paper.", "link": "http://arxiv.org/abs/2604.01116v1", "date": "2026-04-01", "relevancy": 2.6257, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.538}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProTPS%3A%20Prototype-Guided%20Text%20Prompt%20Selection%20for%20Continual%20Learning&body=Title%3A%20ProTPS%3A%20Prototype-Guided%20Text%20Prompt%20Selection%20for%20Continual%20Learning%0AAuthor%3A%20Jie%20Mei%20and%20Li-Leng%20Peng%20and%20Keith%20Fuller%20and%20Jenq-Neng%20Hwang%0AAbstract%3A%20For%20continual%20learning%2C%20text-prompt-based%20methods%20leverage%20text%20encoders%20and%20learnable%20prompts%20to%20encode%20semantic%20features%20for%20sequentially%20arrived%20classes%20over%20time.%20A%20common%20challenge%20encountered%20by%20existing%20works%20is%20how%20to%20learn%20unique%20text%20prompts%2C%20which%20implicitly%20carry%20semantic%20information%20of%20new%20classes%2C%20so%20that%20the%20semantic%20features%20of%20newly%20arrived%20classes%20do%20not%20overlap%20with%20those%20of%20trained%20classes%2C%20thereby%20mitigating%20the%20catastrophic%20forgetting%20problem.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20novel%20approach%20Prototype-guided%20Text%20Prompt%20Selection%20%28ProTPS%29%27%27%20to%20intentionally%20increase%20the%20training%20flexibility%20thus%20encouraging%20the%20learning%20of%20unique%20text%20prompts.%20Specifically%2C%20our%20ProTPS%20learns%20class-specific%20vision%20prototypes%20and%20text%20prompts.%20Vision%20prototypes%20guide%20the%20selection%20and%20learning%20of%20text%20prompts%20for%20each%20class.%20We%20first%20evaluate%20our%20ProTPS%20in%20both%20class%20incremental%20%28CI%29%20setting%20and%20cross-datasets%20continual%20%28CDC%29%20learning%20setting.%20Because%20our%20ProTPS%20achieves%20performance%20close%20to%20the%20upper%20bou {"title": "Vision2Web: A Hierarchical Benchmark for Visual Website Development with Agent Verification", "author": "Zehai He and Wenyi Hong and Zhen Yang and Ziyang Pan and Mingdao Liu and Xiaotao Gu and Jie Tang", "abstract": "Recent advances in large language models have improved the capabilities of coding agents, yet systematic evaluation of complex, end-to-end website development remains limited. To address this gap, we introduce Vision2Web, a hierarchical benchmark for visual website development, spanning from static UI-to-code generation, interactive multi-page frontend reproduction, to long-horizon full-stack website development. The benchmark is constructed from real-world websites and comprises a total of 193 tasks across 16 categories, with 918 prototype images and 1,255 test cases. To support flexible, thorough and reliable evaluation, we propose workflow-based agent verification paradigm based on two complementary components: a GUI agent verifier and a VLM-based judge. We evaluate multiple visual language models instantiated under different coding-agent frameworks, revealing substantial performance gaps at all task levels, with state-of-the-art models still struggling on full-stack development.", "link": "http://arxiv.org/abs/2603.26648v2", "date": "2026-04-01", "relevancy": 2.6174, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vision2Web%3A%20A%20Hierarchical%20Benchmark%20for%20Visual%20Website%20Development%20with%20Agent%20Verification&body=Title%3A%20Vision2Web%3A%20A%20Hierarchical%20Benchmark%20for%20Visual%20Website%20Development%20with%20Agent%20Verification%0AAuthor%3A%20Zehai%20He%20and%20Wenyi%20Hong%20and%20Zhen%20Yang%20and%20Ziyang%20Pan%20and%20Mingdao%20Liu%20and%20Xiaotao%20Gu%20and%20Jie%20Tang%0AAbstract%3A%20Recent%20advances%20in%20large%20language%20models%20have%20improved%20the%20capabilities%20of%20coding%20agents%2C%20yet%20systematic%20evaluation%20of%20complex%2C%20end-to-end%20website%20development%20remains%20limited.%20To%20address%20this%20gap%2C%20we%20introduce%20Vision2Web%2C%20a%20hierarchical%20benchmark%20for%20visual%20website%20development%2C%20spanning%20from%20static%20UI-to-code%20generation%2C%20interactive%20multi-page%20frontend%20reproduction%2C%20to%20long-horizon%20full-stack%20website%20development.%20The%20benchmark%20is%20constructed%20from%20real-world%20websites%20and%20comprises%20a%20total%20of%20193%20tasks%20across%2016%20categories%2C%20with%20918%20prototype%20images%20and%201%2C255%20test%20cases.%20To%20support%20flexible%2C%20thorough%20and%20reliable%20evaluation%2C%20we%20propose%20workflow-based%20agent%20verification%20paradigm%20based%20on%20two%20complementary%20components%3A%20a%20GUI%20agent%20verifier%20and%20a%20VLM-based%20judge.%20We%20evaluate%20multiple%20visual%20language%20models%20instantiated%20under%20different%20coding-agent%20frameworks%2C%20revealing%20substantial%20performance%20gaps%20at%20all%20task%20levels%2C%20with%20state-of-the-art%20models%20still%20struggling%20on%20full-stack%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26648v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVision2Web%253A%2520A%2520Hierarchical%2520Benchmark%2520for%2520Visual%2520Website%2520Development%2520with%2520Agent%2520Verification%26entry.906535625%3DZehai%2520He%2520and%2520Wenyi%2520Hong%2520and%2520Zhen%2520Yang%2520a {"title": "Inverse-Free Sparse Variational Gaussian Processes", "author": "Stefano Cortinovis and Laurence Aitchison and Stefanos Eleftheriadis and Mark van der Wilk", "abstract": "Gaussian processes (GPs) offer appealing properties but are costly to train at scale. Sparse variational GP (SVGP) approximations reduce cost yet still rely on Cholesky decompositions of kernel matrices, ill-suited to low-precision, massively parallel hardware. While one can construct valid variational bounds that rely only on matrix multiplications (matmuls) via an auxiliary matrix parameter, optimising them with off-the-shelf first-order methods is challenging. We make the inverse-free approach practical by proposing a better-conditioned bound and deriving a matmul-only natural-gradient update for the auxiliary parameter, markedly improving stability and convergence. We further provide simple heuristics, such as step-size schedules and stopping criteria, that make the overall optimisation routine fit seamlessly into existing workflows. Across regression and classification benchmarks, we demonstrate that our method 1) serves as a drop-in replacement in SVGP-based models (e.g., deep GPs), 2) recovers similar performance to traditional methods, and 3) can be faster than baselines when well tuned.", "link": "http://arxiv.org/abs/2604.00697v1", "date": "2026-04-01", "relevancy": 2.5926, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5197}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5195}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5164}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inverse-Free%20Sparse%20Variational%20Gaussian%20Processes&body=Title%3A%20Inverse-Free%20Sparse%20Variational%20Gaussian%20Processes%0AAuthor%3A%20Stefano%20Cortinovis%20and%20Laurence%20Aitchison%20and%20Stefanos%20Eleftheriadis%20and%20Mark%20van%20der%20Wilk%0AAbstract%3A%20Gaussian%20processes%20%28GPs%29%20offer%20appealing%20properties%20but%20are%20costly%20to%20train%20at%20scale.%20Sparse%20variational%20GP%20%28SVGP%29%20approximations%20reduce%20cost%20yet%20still%20rely%20on%20Cholesky%20decompositions%20of%20kernel%20matrices%2C%20ill-suited%20to%20low-precision%2C%20massively%20parallel%20hardware.%20While%20one%20can%20construct%20valid%20variational%20bounds%20that%20rely%20only%20on%20matrix%20multiplications%20%28matmuls%29%20via%20an%20auxiliary%20matrix%20parameter%2C%20optimising%20them%20with%20off-the-shelf%20first-order%20methods%20is%20challenging.%20We%20make%20the%20inverse-free%20approach%20practical%20by%20proposing%20a%20better-conditioned%20bound%20and%20deriving%20a%20matmul-only%20natural-gradient%20update%20for%20the%20auxiliary%20parameter%2C%20markedly%20improving%20stability%20and%20convergence.%20We%20further%20provide%20simple%20heuristics%2C%20such%20as%20step-size%20schedules%20and%20stopping%20criteria%2C%20that%20make%20the%20overall%20optimisation%20routine%20fit%20seamlessly%20into%20existing%20workflows.%20Across%20regression%20and%20classification%20benchmarks%2C%20we%20demonstrate%20that%20our%20method%201%29%20serves%20as%20a%20drop-in%20replacement%20in%20SVGP-based%20models%20%28e.g.%2C%20deep%20GPs%29%2C%202%29%20recovers%20similar%20performance%20to%20traditional%20methods%2C%20and%203%29%20can%20be%20faster%20than%20baselines%20when%20well%20tuned.%0ALink%3A%20http%3A//arxiv.org/abs/2604.00697v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInverse-Free%2520Sparse%2520Variational%2520Gaussian%2520Processes%26entry.906535625%3DStefano%2520Cortinovis%2520and%2520Laurence%2520Aitchi {"title": "True (VIS) Lies: Analyzing How Generative AI Recognizes Intentionality, Rhetoric, and Misleadingness in Visualization Lies", "author": "Graziano Blasilli and Marco Angelini", "abstract": "This study investigates the ability of multimodal Large Language Models (LLMs) to identify and interpret misleading visualizations, and recognize these observations along with their underlying causes and potential intentionality. Our analysis leverages concepts from visualization rhetoric and a newly developed taxonomy of authorial intents as explanatory lenses. We formulated three research questions and addressed them experimentally using a dataset of 2,336 COVID-19-related tweets, half of which contain misleading visualizations, and supplemented it with real-world examples of perceptual, cognitive, and conceptual errors drawn from VisLies, the IEEE VIS community event dedicated to showcasing deceptive and misleading visualizations. To ensure broad coverage of the current LLM landscape, we evaluated 16 state-of-the-art models. Among them, 15 are open-weight models, spanning a wide range of model sizes, architectural families, and reasoning capabilities. The selection comprises small models, namely Nemotron-Nano-V2-VL (12B parameters), Mistral-Small-3.2 (24B), DeepSeek-VL2 (27B), Gemma3 (27B), and GTA1 (32B); medium-sized models, namely Qianfan-VL (70B), Molmo (72B), GLM-4.5V (108B), LLaVA-NeXT (110B), and Pixtral-Large (124B); and large models, namely Qwen3-VL (235B), InternVL3.5 (241B), Step3 (321B), Llama-4-Maverick (400B), and Kimi-K2.5 (1000B). In addition, we employed OpenAI GPT-5.4, a frontier proprietary model. To establish a human perspective on these tasks, we also conducted a user study with visualization experts to assess how people perceive rhetorical techniques and the authorial intentions behind the same misleading visualizations. This allows comparison between model and expert behavior, revealing similarities and differences that provide insights into where LLMs align with human judgment and where they diverge.", "link": "http://arxiv.org/abs/2604.01181v1", "date": "2026-04-01", "relevancy": 2.591, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5324}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5111}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5111}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20True%20%28VIS%29%20Lies%3A%20Analyzing%20How%20Generative%20AI%20Recognizes%20Intentionality%2C%20Rhetoric%2C%20and%20Misleadingness%20in%20Visualization%20Lies&body=Title%3A%20True%20%28VIS%29%20Lies%3A%20Analyzing%20How%20Generative%20AI%20Recognizes%20Intentionality%2C%20Rhetoric%2C%20and%20Misleadingness%20in%20Visualization%20Lies%0AAuthor%3A%20Graziano%20Blasilli%20and%20Marco%20Angelini%0AAbstract%3A%20This%20study%20investigates%20the%20ability%20of%20multimodal%20Large%20Language%20Models%20%28LLMs%29%20to%20identify%20and%20interpret%20misleading%20visualizations%2C%20and%20recognize%20these%20observations%20along%20with%20their%20underlying%20causes%20and%20potential%20intentionality.%20Our%20analysis%20leverages%20concepts%20from%20visualization%20rhetoric%20and%20a%20newly%20developed%20taxonomy%20of%20authorial%20intents%20as%20explanatory%20lenses.%20We%20formulated%20three%20research%20questions%20and%20addressed%20them%20experimentally%20using%20a%20dataset%20of%202%2C336%20COVID-19-related%20tweets%2C%20half%20of%20which%20contain%20misleading%20visualizations%2C%20and%20supplemented%20it%20with%20real-world%20examples%20of%20perceptual%2C%20cognitive%2C%20and%20conceptual%20errors%20drawn%20from%20VisLies%2C%20the%20IEEE%20VIS%20community%20event%20dedicated%20to%20showcasing%20deceptive%20and%20misleading%20visualizations.%20To%20ensure%20broad%20coverage%20of%20the%20current%20LLM%20landscape%2C%20we%20evaluated%2016%20state-of-the-art%20models.%20Among%20them%2C%2015%20are%20open-weight%20models%2C%20spanning%20a%20wide%20range%20of%20model%20sizes%2C%20architectural%20families%2C%20and%20reasoning%20capabilities.%20The%20selection%20comprises%20small%20models%2C%20namely%20Nemotron-Nano-V2-VL%20%2812B%20parameters%29%2C%20Mistral-Small-3.2%20%2824B%29%2C%20DeepSeek-VL2%20%2827B%29%2C%20Gemma3%20%2827B%29%2C%20and%20GTA1%20%2832B%29%3B%20medium-sized%20models%2C%20namely%20Qianfan-VL%20%2870B%29%2C%20Molmo%20%2872B%29%2C%20GLM-4.5V%20%28108B%29%2C%20LLaVA-NeXT%20%28110B%29%2C%20and%20Pixtral-Large%20%28124B%29%3B%20and%20large%20models%2C%20namely%20Qwen3-VL%20%28235B%29%2C%20InternVL3.5%20%28241B%29%2C%20Step3%20%28321B%29%2C%20Llama-4-Maverick%20%28400B%29%2C%20and%20Kimi-K2.5%20%281000B%29.%20In%20addition%2C%20we%20employed%20OpenAI%20GPT-5.4%2C%20a%20frontier%20proprietary%20model.%20To%20establish%20a%20human%20perspective%20on%20these%20tasks%2C%20we%20also%20conducted%20a%20user%20study%20with%20visualization%20experts%20to%20assess%20how%20people%20perceive%20rhetorical%20techniques%20and%20the%20authorial%20intentions%20behind%20the%20same%20misleading%20visualizations.%20This%20allows%20comparison%20between%20model%20and%20expert%20behavior%2C%20revealing%20similarities%20and%20differences%20that%20provide%20insights%20into%20where%20LLMs%20align%20with%20human%20judgment%20and%20where%20they%20diverge.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01181v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrue%2520%2528VIS%2529%2520Lies%253A%2520Analyzing%2520How%2520Generative%2520AI%2520Recognizes%252 {"title": "Toward Physically Consistent Driving Video World Models under Challenging Trajectories", "author": "Jiawei Zhou and Zhenxin Zhu and Lingyi Du and Linye Lyu and Lijun Zhou and Zhanqian Wu and Hongcheng Luo and Zhuotao Tian and Bing Wang and Guang Chen and Hangjun Ye and Haiyang Sun and Yu Li", "abstract": "Video generation models have shown strong potential as world models for autonomous driving simulation. However, existing approaches are primarily trained on real-world driving datasets, which mostly contain natural and safe driving scenarios. As a result, current models often fail when conditioned on challenging or counterfactual trajectories-such as imperfect trajectories generated by simulators or planning systems-producing videos with severe physical inconsistencies and artifacts. To address this limitation, we propose PhyGenesis, a world model designed to generate driving videos with high visual fidelity and strong physical consistency. Our framework consists of two key components: (1) a physical condition generator that transforms potentially invalid trajectory inputs into physically plausible conditions, and (2) a physics-enhanced video generator that produces high-fidelity multi-view driving videos under these conditions. To effectively train these components, we construct a large-scale, physics-rich heterogeneous dataset. Specifically, in addition to real-world driving videos, we generate diverse challenging driving scenarios using the CARLA simulator, from which we derive supervision signals that guide the model to learn physically grounded dynamics under extreme conditions. This challenging-trajectory learning strategy enables trajectory correction and promotes physically consistent video generation. Extensive experiments demonstrate that PhyGenesis consistently outperforms state-of-the-art methods, especially on challenging trajectories. Our project page is available at: https://wm-research.github.io/PhyGenesis/.", "link": "http://arxiv.org/abs/2603.24506v2", "date": "2026-04-01", "relevancy": 2.5866, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7005}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6386}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.596}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Physically%20Consistent%20Driving%20Video%20World%20Models%20under%20Challenging%20Trajectories&body=Title%3A%20Toward%20Physically%20Consistent%20Driving%20Video%20World%20Models%20under%20Challenging%20Trajectories%0AAuthor%3A%20Jiawei%20Zhou%20and%20Zhenxin%20Zhu%20and%20Lingyi%20Du%20and%20Linye%20Lyu%20and%20Lijun%20Zhou%20and%20Zhanqian%20Wu%20and%20Hongcheng%20Luo%20and%20Zhuotao%20Tian%20and%20Bing%20Wang%20and%20Guang%20Chen%20and%20Hangjun%20Ye%20and%20Haiyang%20Sun%20and%20Yu%20Li%0AAbstract%3A%20Video%20generation%20models%20have%20shown%20strong%20potential%20as%20world%20models%20for%20autonomous%20driving%20simulation.%20However%2C%20existing%20approaches%20are%20primarily%20trained%20on%20real-world%20driving%20datasets%2C%20which%20mostly%20contain%20natural%20and%20safe%20driving%20scenarios.%20As%20a%20result%2C%20current%20models%20often%20fail%20when%20conditioned%20on%20challenging%20or%20counterfactual%20trajectories-such%20as%20imperfect%20trajectories%20generated%20by%20simulators%20or%20planning%20systems-producing%20videos%20with%20severe%20physical%20inconsistencies%20and%20artifacts.%20To%20address%20this%20limitation%2C%20we%20propose%20PhyGenesis%2C%20a%20world%20model%20designed%20to%20generate%20driving%20videos%20with%20high%20visual%20fidelity%20and%20strong%20physical%20consistency.%20Our%20framework%20consists%20of%20two%20key%20components%3A%20%281%29%20a%20physical%20condition%20generator%20that%20transforms%20potentially%20invalid%20trajectory%20inputs%20into%20physically%20plausible%20conditions%2C%20and%20%282%29%20a%20physics-enhanced%20video%20generator%20that%20produces%20high-fidelity%20multi-view%20driving%20videos%20under%20these%20conditions.%20To%20effectively%20train%20these%20components%2C%20we%20construct%20a%20large-scale%2C%20physics-rich%20heterogeneous%20dataset.%20Specifically%2C%20in%20addition%20to%20real-world%20driving%20videos%2C%20we%20generate%20diverse%20challenging%20driving%20scenarios%20using%20the%20CARLA%20simulator%2C%20from%20which%20we%20derive%20supervision%20signals%20that%20guide%20the%20model%20to%20learn%20physically%20grounded%20dynamics%20under%20extreme%20conditions.%20This%20challenging-trajectory%20learning%20strategy%20enables%20trajectory%20correction%20and%20promotes%20physically%20consistent%20video%20generation.%20Extensive%20experiments%20demonstrate%20that%20PhyGenesis%20consistently%20outperforms%20state-of-the-art%20methods%2C%20especially%20on%20challenging%20trajectories.%20Our%20project%20page%20is%20available%20at%3A%20https%3A//wm-research.github.io/PhyGenesis/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24506v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToward%2520Physically%2520Consistent%2520Driving%2520Video%2520World%2520Models%2520under%2520Challenging%2520Trajectories%26entry.906535625%3DJiawei%2520Zhou%2520and%2520Zhenxin%2520Zhu%2520and%2520Lingyi%2520Du%2520and%2520Linye%2520Lyu%2520and%2520Lijun%2520Zhou%2520and%2520Zhanqian%2520Wu%2520and%2520Hongcheng%2520Luo%2520and%2520Zhuotao%2520Tian%2520and%2520Bing%2520Wang%2520and%2520Guang%2520Chen%2520and%2520Hangjun%2520Ye%2520and%2520Haiyang%2520Sun%2520and%2520Yu%2520Li%26entry.1292438233%3DVideo%2520generation%2520models%2520have%2520shown%2520strong%2520potential%2520as%2520world%2520models%2520for%252 {"title": "Can We Go Beyond Visual Features? Neural Tissue Relation Modeling for Relational Graph Analysis in Non-Melanoma Skin Histology", "author": "Shravan Venkatraman and Muthu Subash Kavitha and Joe Dhanith P R and V Manikandarajan and Jia Wu", "abstract": "Histopathology image segmentation is essential for delineating tissue structures in skin cancer diagnostics, but modeling spatial context and inter-tissue relationships remains a challenge, especially in regions with overlapping or morphologically similar tissues. Current convolutional neural network (CNN)-based approaches operate primarily on visual texture, often treating tissues as independent regions and failing to encode biological context. To this end, we introduce Neural Tissue Relation Modeling (NTRM), a novel segmentation framework that augments CNNs with a tissue-level graph neural network to model spatial and functional relationships across tissue types. NTRM constructs a graph over predicted regions, propagates contextual information via message passing, and refines segmentation through spatial projection. Unlike prior methods, NTRM explicitly encodes inter-tissue dependencies, enabling structurally coherent predictions in boundary-dense zones. On the benchmark Histopathology Non-Melanoma Skin Cancer Segmentation Dataset, NTRM outperforms state-of-the-art methods, achieving a robust Dice similarity coefficient that is 4.9\\% to 31.25\\% higher than the best-performing models among the evaluated approaches. Our experiments indicate that relational modeling offers a principled path toward more context-aware and interpretable histological segmentation, compared to local receptive-field architectures that lack tissue-level structural awareness. Our code is available at https://github.com/shravan-18/NTRM.", "link": "http://arxiv.org/abs/2512.06949v2", "date": "2026-04-01", "relevancy": 2.5785, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5365}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.506}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5046}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20We%20Go%20Beyond%20Visual%20Features%3F%20Neural%20Tissue%20Relation%20Modeling%20for%20Relational%20Graph%20Analysis%20in%20Non-Melanoma%20Skin%20Histology&body=Title%3A%20Can%20We%20Go%20Beyond%20Visual%20Features%3F%20Neural%20Tissue%20Relation%20Modeling%20for%20Relational%20Graph%20Analysis%20in%20Non-Melanoma%20Skin%20Histology%0AAuthor%3A%20Shravan%20Venkatraman%20and%20Muthu%20Subash%20Kavitha%20and%20Joe%20Dhanith%20P%20R%20and%20V%20Manikandarajan%20and%20Jia%20Wu%0AAbstract%3A%20Histopathology%20image%20segmentation%20is%20essential%20for%20delineating%20tissue%20structures%20in%20skin%20cancer%20diagnostics%2C%20but%20modeling%20spatial%20context%20and%20inter-tissue%20relationships%20remains%20a%20challenge%2C%20especially%20in%20regions%20with%20overlapping%20or%20morphologically%20similar%20tissues.%20Current%20convolutional%20neural%20network%20%28CNN%29-based%20approaches%20operate%20primarily%20on%20visual%20texture%2C%20often%20treating%20tissues%20as%20independent%20regions%20and%20failing%20to%20encode%20biological%20context.%20To%20this%20end%2C%20we%20introduce%20Neural%20Tissue%20Relation%20Modeling%20%28NTRM%29%2C%20a%20novel%20segmentation%20framework%20that%20augments%20CNNs%20with%20a%20tissue-level%20graph%20neural%20network%20to%20model%20spatial%20and%20functional%20relationships%20across%20tissue%20types.%20NTRM%20constructs%20a%20graph%20over%20predicted%20regions%2C%20propagates%20contextual%20information%20via%20message%20passing%2C%20and%20refines%20segmentation%20through%20spatial%20projection.%20Unlike%20prior%20methods%2C%20NTRM%20explicitly%20encodes%20inter-tissue%20dependencies%2C%20enabling%20structurally%20coherent%20predictions%20in%20boundary-dense%20zones.%20On%20the%20benchmark%20Histopathology%20Non-Melanoma%20Skin%20Cancer%20Segmentation%20Dataset%2C%20NTRM%20outperforms%20state-of-the-art%20methods%2C%20achieving%20a%20robust%20Dice%20similarity%20coefficient%20that%20is%204.9%5C%25%20to%2031.25%5C%25%20higher%20than%20the%20best-performing%20models%20among%20the%20evaluated%20approaches.%20Our%20experiments%20indicate%20that%20relational%20modeling%20offers%20a%20principled%20path%20toward%20more%20context-aware%20and%20interpretable%20histological%20segmentation%2C%20compared%20to%20local%20receptive-field%20architectures%20that%20lack%20tissue-level%20structural%20awareness.%20Our%20code%20is%20available%20at%20https%3A//github.com/shravan-18/NTRM.%0ALink%3A%20http%3A//arxiv.org/abs/2512.06949v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520We%2520Go%2520Beyond%2520Visual%2520Features%253F%2520Neural%2520Tissue%2520Relation%2520Modeling%2520for%2520Relational%2520Graph%2520Analysis%2520in%2520Non-Melanoma%2520Skin%2520Histology%26entry.906535625%3DShravan%2520Venkatraman%2520and%2520Muthu%2520Subash%2520Kavitha%2520and%2520Joe%2520Dhanith%2520P%2520R%2520and%2520V%2520Manikandarajan%2520and%2520Jia%2520Wu%26entry.1292438233%3DHistopathology%2520image%2520segmentation%2520is%2520essential%2520for%2520delineating%2520tissue%2520structures%2520in%2520skin%2520cancer%2520diagnostics%252C%2520but%2520modeling%2520spatial%2520context%2520and%2520inter-tissue%2520relationships%2520remains%2520a%2520challenge%252C%2520especially%2520in%2520regions%2520with%2520overlapping%2520or%2520morphologically%2520similar%2520tissues.%2520Current%2520convolutional%2520neural%2520network%2520%2528CNN%2529-based%2520approaches%2520operate%25 fFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Can%20We%20Go%20Beyond%20Visual%20Features%3F%20Neural%20Tissue%20Relation%20Modeling%20for%20Relational%20Graph%20Analysis%20in%20Non-Melanoma%20Skin%20Histology&entry.906535625=Shravan%20Venkatraman%20and%20Muthu%20Subash%20Kavitha%20and%20Joe%20Dhanith%20P%20R%20and%20V%20Manikandarajan%20and%20Jia%20Wu&entry.1292438233=Histopathology%20image%20segmentation%20is%20essential%20for%20delineating%20tissue%20structures%20in%20skin%20cancer%20diagnostics%2C%20but%20modeling%20spatial%20context%20and%20inter-tissue%20relationships%20remains%20a%20challenge%2C%20especially%20in%20regions%20with%20overlapping%20or%20morphologically%20similar%20tissues.%20Current%20convolutional%20neural%20network%20%28CNN%29-based%20approaches%20operate%20primarily%20on%20visual%20texture%2C%20often%20treating%20tissues%20as%20independent%20regions%20and%20failing%20to%20encode%20biological%20context.%20To%20this%20end%2C%20we%20introduce%20Neural%20Tissue%20Relation%20Modeling%20%28NTRM%29%2C%20a%20novel%20segmentation%20framework%20that%20augments%20CNNs%20with%20a%20tissue-level%20graph%20neural%20network%20to%20model%20spatial%20and%20functional%20relationships%20across%20tissue%20types.%20NTRM%20constructs%20a%20graph%20over%20predicted%20regions%2C%20propagates%20contextual%20information%20via%20message%20passing%2C%20and%20refines%20segmentation%20through%20spatial%20projection.%20Unlike%20prior%20methods%2C%20NTRM%20explicitly%20encodes%20inter-tissue%20dependencies%2C%20enabling%20structurally%20coherent%20predictions%20in%20boundary-dense%20zones.%20On%20the%20benchmark%20Histopathology%20Non-Melanoma%20Skin%20Cancer%20Segmentation%20Dataset%2C%20NTRM%20outperforms%20state-of-the-art%20methods%2C%20achieving%20a%20robust%20Dice%20similarity%20coefficient%20that%20is%204.9%5C%25%20to%2031.25%5C%25%20higher%20than%20the%20best-performing%20models%20among%20the%20evaluated%20approaches.%20Our%20experiments%20 {"title": "Brainstacks: Cross-Domain Cognitive Capabilities via Frozen MoE-LoRA Stacks for Continual LLM Learning", "author": "Mohammad R. Abu Ayyash", "abstract": "We present Brainstacks, a modular architecture for continual multi-domain fine-tuning of large language models that packages domain expertise as frozen adapter stacks composing additively on a shared frozen base at inference. Five interlocking components: (1) MoE-LoRA with Shazeer-style noisy top-2 routing across all seven transformer projections under QLoRA 4-bit quantization with rsLoRA scaling; (2) an inner loop performing residual boosting by freezing trained stacks and adding new ones; (3) an outer loop training sequential domain-specific stacks with curriculum-ordered dependencies; (4) null-space projection via randomized SVD constraining new stacks to subspaces orthogonal to prior directions, achieving zero forgetting in isolation; (5) an outcome-based sigmoid meta-router trained on empirically discovered domain-combination targets that selectively weights stacks, enabling cross-domain composition. Two boundary experiments: (6) PSN pretraining on a randomly initialized model; (7) per-domain RL (DPO/GRPO) validating compatibility with post-SFT alignment. Validated on TinyLlama-1.1B (4 domains, 9 stacks) and Gemma 3 12B IT (5 domains, 10 stacks), MoE-LoRA achieves 2.5x faster convergence than parameter-matched single LoRA, residual boosting breaks through the single-stack ceiling, and the routed system recovers generation quality destroyed by ungated stack accumulation. The central finding: the outcome-based router discovers that domain stacks encode transferable cognitive primitives (instruction-following clarity, numerical reasoning, procedural logic, chain-of-thought structure) rather than domain-specific knowledge, with medical prompts routing to chat+math stacks in 97% of cases despite zero medical data in those stacks.", "link": "http://arxiv.org/abs/2604.01152v1", "date": "2026-04-01", "relevancy": 2.578, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.532}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5074}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5074}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Brainstacks%3A%20Cross-Domain%20Cognitive%20Capabilities%20via%20Frozen%20MoE-LoRA%20Stacks%20for%20Continual%20LLM%20Learning&body=Title%3A%20Brainstacks%3A%20Cross-Domain%20Cognitive%20Capabilities%20via%20Frozen%20MoE-LoRA%20Stacks%20for%20Continual%20LLM%20Learning%0AAuthor%3A%20Mohammad%20R.%20Abu%20Ayyash%0AAbstract%3A%20We%20present%20Brainstacks%2C%20a%20modular%20architecture%20for%20continual%20multi-domain%20fine-tuning%20of%20large%20language%20models%20that%20packages%20domain%20expertise%20as%20frozen%20adapter%20stacks%20composing%20additively%20on%20a%20shared%20frozen%20base%20at%20inference.%20Five%20interlocking%20components%3A%20%281%29%20MoE-LoRA%20with%20Shazeer-style%20noisy%20top-2%20routing%20across%20all%20seven%20transformer%20projections%20under%20QLoRA%204-bit%20quantization%20with%20rsLoRA%20scaling%3B%20%282%29%20an%20inner%20loop%20performing%20residual%20boosting%20by%20freezing%20trained%20stacks%20and%20adding%20new%20ones%3B%20%283%29%20an%20outer%20loop%20training%20sequential%20domain-specific%20stacks%20with%20curriculum-ordered%20dependencies%3B%20%284%29%20null-space%20projection%20via%20randomized%20SVD%20constraining%20new%20stacks%20to%20subspaces%20orthogonal%20to%20prior%20directions%2C%20achieving%20zero%20forgetting%20in%20isolation%3B%20%285%29%20an%20outcome-based%20sigmoid%20meta-router%20trained%20on%20empirically%20discovered%20domain-combination%20targets%20that%20selectively%20weights%20stacks%2C%20enabling%20cross-domain%20composition.%20Two%20boundary%20experiments%3A%20%286%29%20PSN%20pretraining%20on%20a%20randomly%20initialized%20model%3B%20%287%29%20per-domain%20RL%20%28DPO/GRPO%29%20validating%20compatibility%20with%20post-SFT%20alignment.%20Validated%20on%20TinyLlama-1.1B%20%284%20domains%2C%209%20stacks%29%20and%20Gemma%203%2012B%20IT%20%285%20domains%2C%2010%20stacks%29%2C%20MoE-LoRA%20achieves%202.5x%20faster%20convergence%20than%20parameter-matched%20single%20LoRA%2C%20residual%20boosting%20breaks%20through%20the%20single-stack%20ceiling%2C%20and%20the%20routed%20system%20recovers%20generation%20quality%20destroyed%20by%20ungated%20stack%20accumulation.%20The%20central%20finding%3A%20the%20outcome-based%20router%20discovers%20that%20domain%20stacks%20encode%20transferable%20cognitive%20primitives%20%28instruction-following%20clarity%2C%20numerical%20reasoning%2C%20procedural%20logic%2C%20chain-of-thought%20structure%29%20rather%20than%20domain-specific%20knowledge%2C%20with%20medical%20prompts%20routing%20to%20chat%2Bmath%20stacks%20in%2097%25%20of%20cases%20despite%20zero%20medical%20data%20in%20those%20stacks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01152v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrainstacks%253A%2520Cross-Domain%2520Cognitive%2520Capabilities%2520via%2520Frozen%2520MoE-LoRA%2520Stacks%2520for%2520Continual%2520LLM%2520Learning%26entry.906535625%3DMohammad%2520R.%2520Abu%2520Ayyash%26entry.1292438233%3DWe%2520present%2520Brainstacks%252C%2520a%2520modular%2520architecture%2520for%2520continual%2520multi-domain%2520fine-tuning%2520of%2520large%2520language%2520models%2520that%2520packages%2520domain%2520expertise%2520as%2520frozen%2520adapter%2520stacks%2520composing%2520additively%2520on%2520a%2520shared%2520frozen%2520base%2520at%2520inference.%2520Five%2520interlocking%2520components%253A%2520%2 {"title": "IWP: Token Pruning as Implicit Weight Pruning in Large Vision Language Models", "author": "Dong-Jae Lee and Sunghyun Baek and Junmo Kim", "abstract": "Large Vision Language Models show impressive performance across image and video understanding tasks, yet their computational cost grows rapidly with the number of visual tokens. Existing token pruning methods mitigate this issue through empirical approaches while overlooking the internal mechanism of attention. In this paper, we propose a novel training free token pruning framework grounded in the dual form perspective of attention. We reformulate attention as an implicit linear layer whose weight matrix is the sum of rank 1 outer products, each generated by a single token's key value pair. Token pruning thus reduces to selecting an optimal subset of these rank 1 updates that best approximates the original dual weight matrix. Extending this perspective to standard softmax attention in LVLMs, we derive a novel metric quantifying both a token's information magnitude and information duplication. To efficiently select the subset with the proposed metric, we introduce Progressive Chunked Maximal Marginal Relevance. Extensive experiments demonstrate that our method achieves a better trade off between performance and efficiency, while providing another perspective on existing pruning approaches.", "link": "http://arxiv.org/abs/2604.00757v1", "date": "2026-04-01", "relevancy": 2.5659, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5674}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4861}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4861}], "mailto": "mailto:haoxiang.li.2024@gmail.com {"title": "OTPrune: Distribution-Aligned Visual Token Pruning via Optimal Transport", "author": "Xiwen Chen and Wenhui Zhu and Gen Li and Xuanzhao Dong and Yujian Xiong and Hao Wang and Peijie Qiu and Qingquan Song and Zhipeng Wang and Shao Tang and Yalin Wang and Abolfazl Razi", "abstract": "Multi-modal large language models (MLLMs) achieve strong visual-language reasoning but suffer from high inference cost due to redundant visual tokens. Recent work explores visual token pruning to accelerate inference, while existing pruning methods overlook the underlying distributional structure of visual representations. We propose OTPrune, a training-free framework that formulates pruning as distribution alignment via optimal transport (OT). By minimizing the 2-Wasserstein distance between the full and pruned token distributions, OTPrune preserves both local diversity and global representativeness while reducing inference cost. Moreover, we derive a tractable submodular objective that enables efficient optimization, and theoretically prove its monotonicity and submodularity, providing a principled foundation for stable and efficient pruning. We further provide a comprehensive analysis that explains how distributional alignment contributes to stable and semantically faithful pruning. Comprehensive experiments on wider benchmarks demonstrate that OTPrune achieves superior performance-efficiency tradeoffs compared to state-of-the-art methods. The code is available at https://github.com/xiwenc1/OTPrune.", "link": "http://arxiv.org/abs/2602.20205v3", "date": "2026-04-01", "relevancy": 2.5638, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5274}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5168}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4941}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OTPrune%3A%20Distribution-Aligned%20Visual%20Token%20Pruning%20via%20Optimal%20Transport&body=Title%3A%20OTPrune%3A%20Distribution-Aligned%20Visual%20Token%20Pruning%20via%20Optimal%20Transport%0AAuthor%3A%20Xiwen%20Chen%20and%20Wenhui%20Zhu%20and%20Gen%20Li%20and%20Xuanzhao%20Dong%20and%20Yujian%20Xiong%20and%20Hao%20Wang%20and%20Peijie%20Qiu%20and%20Qingquan%20Song%20and%20Zhipeng%20Wang%20and%20Shao%20Tang%20and%20Yalin%20Wang%20and%20Abolfazl%20Razi%0AAbstract%3A%20Multi-modal%20large%20language%20models%20%28MLLMs%29%20achieve%20strong%20visual-language%20reasoning%20but%20suffer%20from%20high%20inference%20cost%20due%20to%20redundant%20visual%20tokens.%20Recent%20work%20explores%20visual%20token%20pruning%20to%20accelerate%20inference%2C%20while%20existing%20pruning%20methods%20overlook%20the%20underlying%20distributional%20structure%20of%20visual%20representations.%20We%20propose%20OTPrune%2C%20a%20training-free%20framework%20that%20formulates%20pruning%20as%20distribution%20alignment%20via%20optimal%20transport%20%28OT%29.%20By%20minimizing%20the%202-Wasserstein%20distance%20between%20the%20full%20and%20pruned%20token%20distributions%2C%20OTPrune%20preserves%20both%20local%20diversity%20and%20global%20representativeness%20while%20reducing%20inference%20cost.%20Moreover%2C%20we%20derive%20a%20tractable%20submodular%20objective%20that%20enables%20efficient%20optimization%2C%20and%20theoretically%20prove%20its%20monotonicity%20and%20submodularity%2C%20providing%20a%20principled%20foundation%20for%20stable%20and%20efficient%20pruning.%20We%20further%20provide%20a%20comprehensive%20analysis%20that%20explains%20how%20distributional%20alignment%20contributes%20to%20stable%20and%20semantically%20faithful%20pruning.%20Comprehensive%20experiments%20on%20wider%20benchmarks%20demonstrate%20that%20OTPrune%20achieves%20superior%20performance-efficiency%20tradeoffs%20compared%20to%20state-of-the-art%20methods.%20The%20code%20is%20available%20at%20https%3A//github.com/xiwenc1/OTPrune.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20205v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOTPrune%253A%2520Distribution-Aligned%2520Visual%2520Token%2520Pruning%2520via%2520Optimal%2520Transport%26entry.906535625%3DXiwen%2520Chen%2520and%2520Wenhui%2520Zhu%2520and%2520Gen%2520Li%2520and%2520Xuanzhao%2520Dong%2520and%2520Yujian%2520Xiong%2520and%2520Hao%2520Wang%2520and%2520Peijie%2520Qiu%2520and%2520Qingquan%2520Song%2520and%2520Zhipeng%2520Wang%2520and%2520Shao%2520Tang%2520and%2520Yalin%2520Wang%2520and%2520Abolfazl%2520Razi%26entry.1292438233%3DMulti-modal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520achieve%2520strong%2520visual-language%2520reasoning%2520but%2520suffer%2520from%2520high%2520inference%2520cost%2520due%2520to%2520redundant%2520visual%2520tokens.%2520Recent%2520work%2520explores%2520visual%2520token%2520pruning%2520to%2520accelerate%2520inference%252C%2520while%2520existing%2520pruning%2520methods%2520overlook%2520the%2520underlying%2520distributional%2520structure%2520of%2520visual%2520representations.%2520We%2520propose%2520OTPrune%252C%2520a%2520training-free%2520framework%2520that%2520formulates%2520pruning%2520as%2520distribution%2520alignment%2520via%2520optimal%2520transport%2520%2528OT%2529.%2520By%2520minimizing%2520the%25202-Wasserstein%2520distance%2520between%2520the%2520full%2520and%2520pruned%2520token%2520distributions%252C%2520OTPrune%2520preserves%2520both%2520local%2520diversity%2520and%2520global%2520representativeness%2520while%2520reducing%2520inference%2520cost.%2520Moreover%252C%2520we%2520derive%2520a%2520tractable%2520submodular%2520objective%2520that%2520enables%2520efficient%2520optimization%252C%2520and%2520theoretically%2520prove%2520its%2520monotonicity%2520and%2520submodularity%252C%2520providing%2520a%2520principled%2520foundation%2520for%2520stable%2520and%2520efficient%2520pruning.%2520We%2520further%2520provide%2520a%2520comprehensive%2520analysis%2520that%2520explains%2520how%2520distributional%2520alignment%2520contributes%2520to%2520stable%2520and%2520semantically%2520faithful%2520pruning.%2520Comprehensive%2520experiments%2520on%2520wider%2520benchmarks%2520demonstrate%2520that%2520OTPrune%2520achieves%2520superior%2520performance-efficiency%2520tradeoffs%2520compared%2520to%2520state-of-the-art%2520methods.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/xiwenc1/OTPrune.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20205v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=OTPrune%3A%20Distribution-Aligned%20Visual%20Token%20Pruning%20via%20Optimal%20Transport&entry.906535625=Xiwen%20Chen%20and%20Wenhui%20Zhu%20and%20Gen%20Li%20and%20Xuanzhao%20Dong%20and%20Yujian%20Xiong%20and%20Hao%20Wang%20and%20Peijie%20Qiu%20and%20Qingquan%20Song%20and%20Zhipeng%20Wang%20and%20Shao%20Tang%20and%20Yalin%20Wang%20and%20Abolfazl%20Razi&entry.1292438233=Multi-modal%20large%20language%20models%20%28MLLMs%29%20achieve%20strong%20visual-language%20reasoning%20but%20suffer%20from%20high%20inference%20cost%20due%20to%20redundant%20visual%20tokens.%20Recent%20work%20explores%20visual%20token%20pruning%20to%20accelerate%20inference%2C%20while%20existing%20pruning%20methods%20overlook%20the%20underlying%20distributional%20structure%20of%20visual%20representations.%20We%20propose%20OTPrune%2C%20a%20training-free%20framework%20that%20formulates%20pruning%20as%20distribution%20alignment%20via%20optimal%20transport%20%28OT%29.%20By%20minimizing%20the%202-Wasserstein%20distance%20between%20the%20full%20and%20pruned%20token%20distributions%2C%20OTPrune%20preserves%20both%20local%20diversity%20and%20glob {"title": "SurgTEMP: Temporal-Aware Surgical Video Question Answering with Text-guided Visual Memory for Laparoscopic Cholecystectomy", "author": "Shi Li and Vinkle Srivastav and Nicolas Chanel and Saurav Sharma and Nabani Banik and Lorenzo Arboit and Kun Yuan and Pietro Mascagni and Nicolas Padoy", "abstract": "Surgical procedures are inherently complex and risky, requiring extensive expertise and constant focus to well navigate evolving intraoperative scenes. Computer-assisted systems such as surgical visual question answering (VQA) offer promises for education and intraoperative support. Current surgical VQA research largely focuses on static frame analysis, overlooking rich temporal semantics. Surgical video question answering is further challenged by low visual contrast, its highly knowledge-driven nature, diverse analytical needs spanning scattered temporal windows, and the hierarchy from basic perception to high-level intraoperative assessment. To address these challenges, we propose SurgTEMP, a multimodal LLM framework featuring (i) a query-guided token selection module that builds hierarchical visual memory (spatial and temporal memory banks) and (ii) a Surgical Competency Progression (SCP) training scheme. Together, these components enable effective modeling of variable-length surgical videos while preserving procedure-relevant cues and temporal coherence, and better support diverse downstream assessment tasks. To support model development, we introduce CholeVidQA-32K, a surgical video question answering dataset comprising 32K open-ended QA pairs and 3,855 video segments (approximately 128 h total) from laparoscopic cholecystectomy. The dataset is organized into a three-level hierarchy -- Perception, Assessment, and Reasoning -- spanning 11 tasks from instrument/action/anatomy perception to Critical View of Safety (CVS), intraoperative difficulty, skill proficiency, and adverse event assessment. In comprehensive evaluations against state-of-the-art open-source multimodal and video LLMs (fine-tuned and zero-shot), SurgTEMP achieves substantial performance improvements, advancing the state of video-based surgical VQA.", "link": "http://arxiv.org/abs/2603.29962v2", "date": "2026-04-01", "relevancy": 2.5581, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5227}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5061}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SurgTEMP%3A%20Temporal-Aware%20Surgical%20Video%20Question%20Answering%20with%20Text-guided%20Visual%20Memory%20for%20Laparoscopic%20Cholecystectomy&body=Title%3A%20SurgTEMP%3A%20Temporal-Aware%20Surgical%20Video%20Question%20Answering%20with%20Text-guided%20Visual%20Memory%20for%20Laparoscopic%20Cholecystectomy%0AAuthor%3A%20Shi%20Li%20and%20Vinkle%20Srivastav%20and%20Nicolas%20Chanel%20and%20Saurav%20Sharma%20and%20Nabani%20Banik%20and%20Lorenzo%20Arboit%20and%20Kun%20Yuan%20and%20Pietro%20Mascagni%20and%20Nicolas%20Padoy%0AAbstract%3A%20Surgical%20procedures%20are%20inherently%20complex%20and%20risky%2C%20requiring%20extensive%20expertise%20and%20constant%20focus%20to%20well%20navigate%20evolving%20intraoperative%20scenes.%20Computer-assisted%20systems%20such%20as%20surgical%20visual%20question%20answering%20%28VQA%29%20offer%20promises%20for%20education%20and%20intraoperative%20support.%20Current%20surgical%20VQA%20research%20largely%20focuses%20on%20static%20frame%20analysis%2C%20overlooking%20rich%20temporal%20semantics.%20Surgical%20video%20question%20answering%20is%20further%20challenged%20by%20low%20visual%20contrast%2C%20its%20highly%20knowledge-driven%20nature%2C%20d {"title": "ONE-SHOT: Compositional Human-Environment Video Synthesis via Spatial-Decoupled Motion Injection and Hybrid Context Integration", "author": "Fengyuan Yang and Luying Huang and Jiazhi Guan and Quanwei Yang and Dongwei Pan and Jianglin Fu and Haocheng Feng and Wei He and Kaisiyuan Wang and Hang Zhou and Angela Yao", "abstract": "Recent advances in Video Foundation Models (VFMs) have revolutionized human-centric video synthesis, yet fine-grained and independent editing of subjects and scenes remains a critical challenge. Recent attempts to incorporate richer environment control through rigid 3D geometric compositions often encounter a stark trade-off between precise control and generative flexibility. Furthermore, the heavy 3D pre-processing still limits practical scalability. In this paper, we propose ONE-SHOT, a parameter-efficient framework for compositional human-environment video generation. Our key insight is to factorize the generative process into disentangled signals. Specifically, we introduce a canonical-space injection mechanism that decouples human dynamics from environmental cues via cross-attention. We also propose Dynamic-Grounded-RoPE, a novel positional embedding strategy that establishes spatial correspondences between disparate spatial domains without any heuristic 3D alignments. To support long-horizon synthesis, we introduce a Hybrid Context Integration mechanism to maintain subject and scene consistency across minute-level generations. Experiments demonstrate that our method significantly outperforms state-of-the-art methods, offering superior structural control and creative diversity for video synthesis. Our project has been available on: https://martayang.github.io/ONE-SHOT/.", "link": "http://arxiv.org/abs/2604.01043v1", "date": "2026-04-01", "relevancy": 2.5534, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6525}, {"title": "Thinking Outside the BBox: U

{"title": "LLM2CLIP: Powerful Language Model Unlocks Richer Cross-Modality Representation", "author": "Weiquan Huang and Aoqi Wu and Yifan Yang and Xufang Luo and Yuqing Yang and Usman Naseem and Chunyu Wang and Chunyu Wang and Qi Dai and Xiyang Dai and Dongdong Chen and Chong Luo and Lili Qiu and Liang Hu", "abstract": "CLIP is a seminal multimodal model that maps images and text into a shared representation space through contrastive learning on billions of image-caption pairs. Inspired by the rapid progress of large language models (LLMs), we investigate how the superior linguistic understanding and broad world knowledge of LLMs can further strengthen CLIP, particularly in handling long and complex captions. We introduce an efficient fine-tuning framework that embeds an LLM into a pretrained CLIP while incurring nearly the same training cost as standard CLIP fine-tuning. Our method first converts the LLM into an embedding-compatible form for the CLIP setting, and then couples it with the pretrained CLIP vision encoder through a lightweight adaptor trained on only a few million image-caption pairs. With this strategy, we achieve large performance gains without large-scale retraining, outperforming state-of-the-art CLIP variants such as EVA02 and SigLIP-2. The LLM-enhanced CLIP delivers consistent improvements across a wide range of downstream tasks, including linear-probe classification, zero-shot image-text retrieval with both short and long captions (in English and other languages), zero-shot and supervised image segmentation, object detection, and serving as a tokenizer backbone for multimodal large-model benchmarks. Code and models are available at: https://aka.ms/llm2clip", "link": "http://arxiv.org/abs/2411.04997v6", "date": "2026-02-25", "relevancy": 2.9947, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6449}, {"title": "Lexicon3D: Probing Visual Foundation {"title": "UniVBench: Towards Unified Evaluation for Video Foundation Models", "author": "Jianhui Wei and Xiaotian Zhang and Yichen Li and Yuan Wang and Yan Zhang and Ziyi Chen and Zhihang Tang and Wei Xu and Zuozhu Liu", "abstract": "Video foundation models aim to integrate video understanding, generation, editing, and instruction following within a single framework, making them a central direction for next-generation multimodal systems. However, existing evaluation benchmarks remain fragmented and limited in scope, as they each target a single task, rely on task-specific metrics, and typically use short or simple video clips. As a result, they do not capture the unified capabilities that these models are designed to deliver. To address this gap, we introduce UniVBench, a benchmark purpose-built for evaluating video foundation models across four core abilities: video understanding, video generation, video editing, and a newly proposed task, video reconstruction, which assesses how faithfully a model can reproduce video content it has encountered. Our benchmark substantially expands the complexity of evaluation by incorporating 200 high-quality, diverse and multi-shot videos, each paired with detailed captions, multi-format editing instructions, and reference images. All videos are human-created and carefully validated, offering richer cinematic information than prior benchmarks. In addition, we develop a unified agentic evaluation system (UniV-Eval) that standardizes prompting, instruction parsing, and scoring across all tasks, enabling fair, scalable, and reproducible comparisons of unified video models. By grounding evaluation in instruction-based multi-shot video tasks, UniVBench provides the first framework for measuring the integrated capabilities that video foundation models aim to achieve. Extensive human annotations ensure our evaluation aligns with human judgment, enabling rigorous assessment and accelerating progress toward robust video intelligence.", "link": "http://arxiv.org/abs/2602.21835v1", "date": "2026-02-25", "relevancy": 2.965, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6062}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6062}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5665}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniVBench%3A%20Towards%20Unified%20Evaluation%20for%20Video%20Foundation%20Models&body=Title%3A%20UniVBench%3A%20Towards%20Unified%20Evaluation%20for%20Video%20Foundation%20Models%0AAuthor%3A%20Jianhui%20Wei%20and%20Xiaotian%20Zhang%20and%20Yichen%20Li%20and%20Yuan%20Wang%20and%20Yan%20Zhang%20and%20Ziyi%20Chen%20and%20Zhihang%20Tang%20and%20Wei%20Xu%20and%20Zuozhu%20Liu%0AAbstract%3A%20Video%20foundation%20models%20aim%20to%20integrate%20video%20understanding%2C%20generation%2C%20editing%2C%20and%20instruction%20following%20within%20a%20single%20framework%2C%20making%20them%20a%20central%20direction%20for%20next-generation%20multimodal%20systems.%20However%2C%20existing%20evaluation%20benchmarks%20remain%20fragmented%20and%20limited%20in%20scope%2C%20as%20they%20each%20target%20a%20single%20task%2C%20rely%20on%20task-specific%20metrics%2C%20and%20typically%20use%20short%20or%20simple%20video%20clips.%20As%20a%20result%2C%20they%20do%20not%20capture%20the%20unified%20capabilities%20that%20these%20models%20are%20designed%20to%20deliver.%20To%20address%20this%20gap%2C%20we%20introduce%20UniVBench%2C%20a%20benchmark%20purpose-built%20for%20evaluating%20video%20foundation%20models%20across%20four%20core%20abilities%3A%20video%20understanding%2C%20video%20generation%2C%20video%20editing%2C%20and%20a%20newly%20proposed%20task%2C%20video%20reconstruction%2C%20which%20assesses%20how%20faithfully%20a%20model%20can%20reproduce%20video%20content%20it%20has%20encountered.%20Our%20benchmark%20substantially%20expands%20the%20complexity%20of%20evaluation%20by%20incorporating%20200%20high-quality%2C%20diverse%20and%20multi-shot%20videos%2C%20each%20paired%20with%20detailed%20captions%2C%20multi-format%20editing%20instructions%2C%20and%20reference%20images.%20All%20videos%20are%20human-created%20and%20carefully%20validated%2C%20offering%20richer%20cinematic%20information%20than%20prior%20benchmarks.%20In%20addition%2C%20we%20develop%20a%20unified%20agentic%20evaluation%20system%20%28UniV-Eval%29%20that%20standardizes%20prompting%2C%20instruction%20parsing%2C%20and%20scoring%20across%20all%20tasks%2C%20enabling%20fair%2C%20scalable%2C%20and%20reproducible%20comparisons%20of%20unified%20video%20models.%20By%20grounding%20evaluation%20in%20instruction-based%20multi-shot%20video%20tasks%2C%20UniVBench%20provides%20the%20first%20framework%20for%20measuring%20the%20integrated%20capabilities%20that%20video%20foundation%20models%20aim%20to%20achieve.%20Extensive%20human%20annotations%20ensure%20our%20evaluation%20aligns%20with%20human%20judgment%2C%20enabling%20rigorous%20assessment%20and%20accelerating%20progress%20toward%20robust%20video%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21835v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniVBench%253A%2520Towards%2520Unified%2520Evaluation%2520for%2520Video%2520Foundation%2520Models%26entry.906535625%3DJianhui%2520Wei%2520and%2520Xiaotian%2520Zhang%2520and%2520Yichen%2520Li%2520and%2520Yuan%2520Wang%2520and%2520Yan%2520Zhang%2520and%2520Ziyi%2520Chen%2520and%2520Zhihang%2520Tang%2520and%2520Wei%2520Xu%2520and%2520Zuozhu%2520Liu%26entry.1292438233%3DVideo%2520foundation%2520models%2520aim%2520to%2520integrate%2520video%2520understanding%252C%2520generation%252C%2520 {"title": "WHOLE: World-Grounded Hand-Object Lifted from Egocentric Videos", "author": "Yufei Ye and Jiaman Li and Ryan Rong and C. Karen Liu", "abstract": "Egocentric manipulation videos are highly challenging due to severe occlusions during interactions and frequent object entries and exits from the camera view as the person moves. Current methods typically focus on recovering either hand or object pose in isolation, but both struggle during interactions and fail to handle out-of-sight cases. Moreover, their independent predictions often lead to inconsistent hand-object relations. We introduce WHOLE, a method that holistically reconstructs hand and object motion in world space from egocentric videos given object templates. Our key insight is to learn a generative prior over hand-object motion to jointly reason about their interactions. At test time, the pretrained prior is guided to generate trajectories that conform to the video observations. This joint generative reconstruction substantially outperforms approaches that process hands and objects separately followed by post-processing. WHOLE achieves state-of-the-art performance on hand motion estimation, 6D object pose estimation, and their relative interaction reconstruction. Project website: https://judyye.github.io/whole-www", "link": "http://arxiv.org/abs/2602.22209v1", "date": "2026-02-25", "relevancy": 2.9543, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6086}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5845}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WHOLE%3A%20World-Grounded%20Hand-Object%20Lifted%20from%20Egocentric%20Videos&body=Title%3A%20WHOLE%3A%20World-Grounded%20Hand-Object%20Lifted%20from%20Egocentric%20Videos%0AAuthor%3A%20Yufei%20Ye%20and%20Jiaman%20Li%20and%20Ryan%20Rong%20and%20C.%20Karen%20Liu%0AAbstract%3A%20Egocentric%20manipulation%20videos%20are%20highly%20challenging%20due%20to%20severe%20occlusions%20during%20interactions%20and%20frequent%20object%20entries%20and%20exits%20from%20the%20camera%20view%20as%20the%20person%20moves.%20Current%20methods%20typically%20focus%20on%20recovering%20either%20hand%20or%20object%20pose%20in%20isolation%2C%20but%20both%20struggle%20during%20interactions%20and%20fail%20to%20handle%20out-of-sight%20cases.%20Moreover%2C%20their%20independent%20predictions%20often%20lead%20to%20inconsistent%20hand-object%20relations.%20We%20introduce%20WHOLE%2C%20a%20method%20that%20holistically%20reconstructs%20hand%20and%20object%20motion%20in%20world%20space%20from%20egocentric%20videos%20given%20object%20templates.%20Our%20key%20insight%20is%20to%20learn%20a%20generative%20prior%20over%20hand-object%20motion%20to%20jointly%20reason%20about%20their%20interactions.%20At%20test%20time%2C%20the%20pretrained%20prior%20is%20guided%20to%20generate%20trajectories%20that%20conform%20to%20the%20video%20observations.%20This%20joint%20generative%20reconstruction%20substantially%20outperforms%20approaches%20that%20process%20hands%20and%20objects%20separately%20followed%20by%20post-processing.%20WHOLE%20achieves%20state-of-the-art%20performance%20on%20hand%20motion%20estimation%2C%206D%20object%20pose%20estimation%2C%20and%20their%20relative%20interaction%20reconstruction.%20Project%20website%3A%20https%3A//judyye.github.io/whole-www%0ALink%3A%20http%3A//arxiv.org/abs/2602.22209v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWHOLE%253A%2520World-Grounded%2520Hand-Object%2520Lifted%2520from%2520Egocentric%2520Videos%26entry.906535625%3DYufei%2520Ye%2520and%2520Jiaman%2520Li%2520and%2520Ryan%2520Rong%2520and%2520 rNNxUPYQ/viewform?entry.1380929848=WHOLE%3A%20World-Grounded%20Hand-Object%20Lifted%20from%20Egocentric%20Videos&entry.906535625=Yufei%20Ye%20and%20Jiaman%20Li%20and%20Ryan%20Rong%20and%20C.%20Karen%20Liu&entry.1292438233=Egocentric%20manipulation%20videos%20are%20highly%20challenging%20due%20to%20severe%20occlusions%20during%20interactions%20and%20frequent%20object%20entries%20and%20exits%20from%20the%20camera%20view%20as%20the%20person%20moves.%20Current%20methods%20typically%20focus%20on%20recovering%20either%20hand%20or%20object%20pose%20in%20isolation%2C%20but%20both%20struggle%20during%20interactions%20and%20fail%20to%20handle%20out-of-sight%20cases.%20Moreover%2C%20their%20independent%20predictions%20often%20lead%20to%20inconsistent%20hand-object%20relations.%20We%20introduce%20WHOLE%2C%20a%20method%20that%20holistically%20reconstructs%20hand%20and%20object%20motion%20in%20world%20space%20from%20egocentric%20videos%20given%20object%20templates.%20Our%20key%20insight%20is%20to%20learn%20a%20generative%20prior%20over%20hand-object%20motion%20to%20jointly%20reason%20about%20their%20interactions.%20At%20test%20time%2C%20the%20pretrained%20prior%20is%20guided%20to%20generate%20trajectories%20that%20conform%20to%20the%20video%20observations.%20This%20joint%20generative%20reconstruction%20substantially%20outperforms%20approaches%20that%20process%20hands%20and%20objects%20separately%20followed%20by%20post-processing.%20WHOLE%20achieves%20state-of-the-art%20performance%20on%20hand%20motion%20estimation%2C%206D%20object%20pose%20estimation%2C%20and%20their%20relative%20interaction%20reconstruction.%20Project%20website%3A%20https%3A//judyye.github.io/whole-www&entry.1838667208=http%3A//arxiv.org/abs/2602.22209v1&entry.124074799=Read"},
{"title": "LatentLens: Revealing Highly Interpretable Visual Tokens in LLMs", "author": "Benno Krojer and Shravan Nayak and Oscar Ma\u00f1as and Vaibhav Adlakha and Desmond Elliott and Siva Reddy and Marius Mosbach", "abstract": "Transforming a large language model (LLM) into a Vision-Language Model (VLM) can be achieved by mapping the visual tokens from a vision encoder into the embedding space of an LLM. Intriguingly, this mapping can be as simple as a shallow MLP transformation. To understand why LLMs can so readily process visual tokens, we need interpretability methods that reveal what is encoded in the visual token representations at every layer of LLM processing. In this work, we introduce LatentLens, a novel approach for mapping latent representations to descriptions in natural language. LatentLens works by encoding a large text corpus and storing contextualized token representations for each token in that corpus. Visual token representations are then compared to their contextualized textual representations, with the top-k nearest neighbor representations providing descriptions of the visual token. We evaluate this method on 10 different VLMs, showing that commonly used methods, such as LogitLens, substantially underestimate the interpretability of visual tokens. With LatentLens instead, the majority of visual tokens are interpretable across all studied models and all layers. Qualitatively, we show that the descriptions produced by LatentLens are semantically meaningful and provide more fine-grained interpretations for humans compared to individual tokens. More broadly, our findings contribute new evidence on the alignment between vision and language representations, opening up new directions for analyzing latent representations.", "link": "http://arxiv.org/abs/2602.00462v3", "date": "2026-02-25", "relevancy": 2.9451, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6017}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6017}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5636}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LatentLens%3A%20Revealing%20Highly%20Interpretable%20Visual%20Tokens%20in%20LLMs&body=Title%3A%20LatentLens%3A%20Revealing%20Highly%20Interpretable%20Visual%20Tokens%20in%20LLMs%0AAuthor%3A%20Benno%20Krojer%20and%20Shravan%20Nayak%20and%20Oscar%20Ma%C3%B1as%20and%20Vaibhav%20Adlakha%20and%20Desmond%20Elliott%20and%20Siva%20Reddy%20and%20Marius%20Mosbach%0AAbstract%3A%20Transforming%20a%20large%20language%20model%20%28LLM%29%20into%20a%20Vision-Language%20Model%20%28VLM%29%20can%20be%20achieved%20by%20mapping%20the%20visual%20tokens%20from%20a%20vision%20encoder%20into%20the%20embedding%20space%20of%20an%20LLM.%20Intriguingly%2C%20this%20mapping%20can%20be%20as%20simple%20as%20a%20shallow%20MLP%20transformation.%20To%20understand%20why%20LLMs%20can%20so%20readily%20process%20visual%20tokens%2C%20we%20need%20interpretability%20methods%20that%20reveal%20what%20is%20encoded%20in%20the%20visual%20token%20representations%20at%20every%20layer%20of%20LLM%20processing.%20In%20this%20work%2C%20we%20introduce%20LatentLens%2C%20a%20novel%20approach%20for%20mapping%20latent%20representations%20to%20descriptions%20in%20natural%20language.%20LatentLens%20works%20by%20encoding%20a%20large%20text%20corpus%20and%20storing%20contextualized%20token%20representations%20for%20each%20token%20in%20that%20corpus.%20Visual%20token%20representations%20are%20then%20compared%20to%20their%20contextualized%20textual%20representations%2C%20with%20the%20top-k%20nearest%20neighbor%20representations%20providing%20descriptions%20of%20the%20visual%20token.%20We%20evaluate%20this%20method%20on%2010%20di {"title": "SemVideo: Reconstructs What You Watch from Brain Activity via Hierarchical Semantic Guidance", "author": "Minghan Yang and Lan Yang and Ke Li and Honggang Zhang and Kaiyue Pang and Yizhe Song", "abstract": "Reconstructing dynamic visual experiences from brain activity provides a compelling avenue for exploring the neural mechanisms of human visual perception. While recent progress in fMRI-based image reconstruction has been notable, extending this success to video reconstruction remains a significant challenge. Current fMRI-to-video reconstruction approaches consistently encounter two major shortcomings: (i) inconsistent visual representations of salient objects across frames, leading to appearance mismatches; (ii) poor temporal coherence, resulting in motion misalignment or abrupt frame transitions. To address these limitations, we introduce SemVideo, a novel fMRI-to-video reconstruction framework guided by hierarchical semantic information. At the core of SemVideo is SemMiner, a hierarchical guidance module that constructs three levels of semantic cues from the original video stimulus: static anchor descriptions, motion-oriented narratives, and holistic summaries. Leveraging this semantic guidance, SemVideo comprises three key components: a Semantic Alignment Decoder that aligns fMRI signals with CLIP-style embeddings derived from SemMiner, a Motion Adaptation Decoder that reconstructs dynamic motion patterns using a novel tripartite attention fusion architecture, and a Conditional Video Render that leverages hierarchical semantic guidance for video reconstruction. Experiments conducted on the CC2017 and HCP datasets demonstrate that SemVideo achieves superior performance in both semantic alignment and temporal consistency, setting a new state-of-the-art in fMRI-to-video reconstruction.", "link": "http://arxiv.org/abs/2602.21819v1", "date": "2026-02-25", "relevancy": 2.8932, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D %20original%20video%20stimulus%3A%20static%20anchor%20descriptions%2C%20motion-oriented%20narratives%2C%20and%20holistic%20summaries.%20Leveraging%20this%20semantic%20guidance%2C%20SemVideo%20comprises%20three%20key%20components%3A%20a%20Semantic%20Alignment%20Decoder%20that%20aligns%20fMRI%20signals%20with%20CLIP-style%20embeddings%20derived%20from%20SemMiner%2C%20a%20Motion%20Adaptation%20Decoder%20that%20reconstructs%20dynamic%20motion%20patterns%20using%20a%20novel%20tripartite%20attention%20fusion%20architecture%2C%20and%20a%20Conditional%20Video%20Render%20that%20leverages%20hierarchical%20semantic%20guidance%20for%20video%20reconstruction.%20Experiments%20conducted%20on%20the%20CC2017%20and%20HCP%20datasets%20demonstrate%20that%20SemVideo%20achieves%20superior%20performance%20in%20both%20semantic%20alignment%20and%20temporal%20consistency%2C%20setting%20a%20new%20state-of-the-art%20in%20fMRI-to-video%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21819v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemVideo%253A%2520Reconstructs%2520What%2520You%2520Watch%2520from%2520Brain%2520Activity%2520via%2520Hierarchical%2520Semantic%2520Guidance%26entry.906535625%3DMinghan%2520Yang%2520and%2520Lan%2520Yang%2520and%2520Ke%2520Li%2520and%2520Honggang%2520Zhang%2520and%2520Kaiyue%2520Pang%2520and%2520Yizhe%2520Song%26entry.1292438233%3DReconstructing%2520dynamic%2520visual%2520experiences%2520from%2520brain%2520activity%2520provides%2520a%2520compelling%2520avenue%2520for%2520exploring%2520the%2520neural%2520mechanisms%2520of%2520human%2520visual%2520perception.%2520While%2520recent%2520progress%2520in%2520fMRI-based%2520image%2520reconstruction%2520has%2520been%2520notable%252C%2520extending%2520this%2520success%2520to%2520video%2520reconstruction%2520remains%2520a%2520significant%2520challenge.%2520Current%2520fMRI-to-video%2520reconstruction%2520approaches%2520consiste {"title": "AutoSew: A Geometric Approach to Stitching Prediction with Graph Neural Networks", "author": "Pablo R\u00edos-Navarro and Elena Garces and Jorge Lopez-Moreno", "abstract": "Automating garment assembly from sewing patterns remains a significant challenge due to the lack of standardized annotation protocols and the frequent absence of semantic cues. Existing methods often rely on panel labels or handcrafted heuristics, which limit their applicability to real-world, non-conforming patterns. We present AutoSew, a fully automatic, geometry-based approach for predicting stitch correspondences directly from 2D pattern contours. AutoSew formulates the problem as a graph matching task, leveraging a Graph Neural Network to capture local and global geometric context, and employing a differentiable optimal transport solver to infer stitching relationships-including multi-edge connections. To support this task, we update the GarmentCodeData dataset modifying over 18k patterns with realistic multi-edge annotations, reflecting industrial assembly scenarios. AutoSew achieves 96% F1-score and successfully assembles 73.3% of test garments without error, outperforming existing methods while relying solely on geometric input. Our results demonstrate that geometry alone can robustly guide stitching prediction, enabling scalable garment assembly without manual input.", "link": "http://arxiv.org/abs/2602.22052v1", "date": "2026-02-25", "relevancy": 2.8931, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.6766}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5408}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5185}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AutoSew%3A%20A%20Geometric%20Approach%20to%20Stitching%20Prediction%20with%20Graph%20Neural%20Networks&body=Title%3A%20AutoSew%3A%20A%20Geometric%20Approach%20to%20Stitching%20Prediction%20with%20Graph%20Neural%20Networks%0AAuthor%3A%20Pablo%20R%C3%ADos-Navarro%20and%20Elena%20Garces%20and%20Jorge%20Lopez-Moreno%0AAbstract%3A%20Automating%20garment%20assembly%20from%20sewing%20patterns%20remains%20a%20significant%20challenge%20due%20to%20the%20lack%20of%20standardized%20annotation%20protocols%20and%20the%20frequent%20absence%20of%20semantic%20cues.%20Existing%20methods%20often%20rely%20on%20panel%20labels%20or%20handcrafted%20heuristics%2C%20which%20limit%20their%20applicability%20to%20real-world%2C%20non-conforming%20patterns.%20We%20present%20AutoSew%2C%20a%20fully%20automatic%2C%20geometry-based%20approach%20for%20predicting%20stitch%20correspondences%20directly%20from%202D%20pattern%20contours.%20AutoSew%20formulates%20the%20problem%20as%20a%20graph%20matching%20task%2C%20leveraging%20a%20Graph%20Neural%20Network%20to%20capture%20local%20and%20global%20geometric%20context%2C%20and%20employing%20a%20differentiable%20optimal%20transport%20solver%20to%20infer%20stitching%20relationships-including%20multi-edge%20connections.%20To%20support%20this%20task%2C%20we%20update%20the%20GarmentCodeData%20dataset%20modifying%20over%2018k%20patterns%20with%20realistic%20multi-edge%20annotations%2C%20reflecting%20industrial%20assembly%20scenarios.%20AutoSew%20achieves%2096%25%20F1-score%20and%20successfully%20assembles%2073.3%25%20of%20test%20garments%20without%20error%2C%20outperforming%20existing%20methods%20while%20relying%20solely%20on%20geometric%20input.%20Our%20results%20demonstrate%20that%20geometry%20alone%20can%20robustly%20guide%20stitching%20prediction%2C%20enabling%20scalable%20garment%20assembly%20without%20manual%20input.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22052v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoSew%253A%2520A%2520Geometric%2520Approach%2520to%2520Stitching%2520Prediction%2520with%2520Graph%2520Neural%2520Networks%26entry.906535625%3DPablo%2520R%25C3%25ADos-Navarro%2520and%2520Elena%2520Garces%2520and%2520Jorge%2520Lopez-Moreno%26entry.1292438233%3DAutomating%2520garment%2520assembly%2520from%2520sewing%2520patterns%2520remains%2520a%2520significant%2520challenge%2520due%2520to%2520the%2520lack%2520of%2520standardized%2520annotation%2520protocols%2520and%2520the%2520frequent%2520absence%2520of%2520semantic%2520cues.%2520Existing%2520methods%2520often%2520rely%2520on%2520panel%2520labels%2520or%2520handcrafted%2520heuristics%252C%2520which%2520limit%2520their%2520applicability%2520to%2520real-world%252C%2520non-conforming%2520patterns.%2520We%2520present%2520AutoSew%252C%2520a%2520fully%2520automatic%252C%2520geometry-based%2520approach%2520for%2520predicting%2520stitch%2520correspondences%2520directly%2520from%25202D%2520pattern%2520contours.%2520AutoSew%2520formulates%2520the%2520problem%2520as%2520a%2520graph%2520matching%2520task%252C%2520leveraging%2520a%2520Graph%2520Neural%2520Network%2520to%2520capture%2520local%2520and%2520global%2520geometric%2520context%252C%2520and%2520employing%2520a%2520differentiable%2520optimal%2520transport%2520solver%2520to%2520infer%2520stitching%2520relationships-including%2520multi-edge%2520connections.%2520To%2520support%2520this%2520task%252C%2520we%2520update%2520the%2520GarmentCodeData%2520dataset%2520modifying%2520over%252018k%2520patterns%2520with%2520realistic%2520multi-edge%2520annotations%252C%2520reflecting%2520industrial%2520assembly%2520scenarios.%2520AutoSew%2520achieves%252096%2525%2520F1-score%2520and%2520successfully%2520assembles%252073.3%2525%2520of%2520test%2520garments%2520without%2520error%252C%2520outperforming%2520existing%2520methods%2520while%2520relying%2520solely%2520on%2520geometric%2520input.%2520Our%2520results%2520demonstrate%2520that%2520geometry%2520alone%2520can%2520robustly%2520guide%2520stitching%2520prediction%252C%2520enabling%2520scalable%2520garment%2520assembly%2520without%2520manual%2520input.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22052v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AutoSew%3A%20A%20Geometric%20Approach%20to%20Stitching%20Prediction%20with%20Graph%20Neural%20Networks&entry.906535625=Pablo%20R%C3%ADos-Navarro%20and%20Elena%20Garces%20and%20Jorge%20Lopez-Moreno&entry.1292438233=Automating%20garment%20assembly%20from%20sewing%20patterns%20remains%20a%20significant%20challenge%20due%20to%20the%20lack%20of%20standardized%20annotation%20protocols%20and%20the%20frequent%20absence%20of%20semantic%20cues.%20Existing%20methods%20often%20rely%20on%20panel%20labels%20or%20handcrafted%20heuristics%2C%20which%20limit%20their%20applicability%20to%20real-world%2C%20non-conforming%20patterns.%20We%20present%20AutoSew%2C%20a%20fully%20automatic%2C%20geometry-based%20approach%20for%20predicting%20stitch%20correspondences%20directly%20from%202D%20pattern%20contours.%20AutoSew%20formulates%20the%20problem%20as%20a%20graph%20matching%20task%2C%20leveraging%20a%20Graph%20Neural%20Network%20to%20capture%20local%20and%20global%20geometric%20context%2C%20and%20employing%20a%20differentiable%20optimal%20transport%20solver%20to%20infer%20stitching%20relationships-including%20multi-edge%20connections.%20To%20support%20this%20task%2C%20we%20update%20the%20GarmentCodeData%20dataset%20modifying%20over%2018k%20patterns%20with%20realistic%20multi-edge%20annotations%2C%20reflecting%20industrial%20assembly%20scenarios.%20AutoSew%20achieves%2096%25%20F1-score%20and%20successfully%20assembles%2073.3%25%20of%20test%20garments%20without%20error%2C%20outperforming%20existing%20methods%20while%20relying%20solely%20on%20geometric%20input.%20Our%20results%20demonstrate%20that%20geometry%20alone%20can%20robustly%20guide%20stitching%20prediction%2C%20enabling%20scalable%20garment%20assembly%20without%20manual%20input.&entry.1838667208=http%3A//arxiv.org/abs/2602.22052v1&entry.124074799=Read"},
{"title": "Unified Reward Model for Multimodal Understanding and Generation", "author": "Yibin Wang and Yuhang Zang and Hao Li and Cheng Jin and Jiaqi Wang", "abstract": "Recent advances in human preference alignment have significantly improved multimodal generation and understanding. A key approach is to train reward models that provide supervision signals for preference optimization. However, existing reward models are often task-specific, limiting their adaptability across diverse visual applications. We also argue that a reward model that jointly learning to assess multiple vision tasks may foster a synergistic effect, where improved image understanding enhances image generation assessment, and refined image evaluation benefits video assessment through better frame analysis. To this end, this paper proposes UnifiedReward, the first unified reward model for multimodal understanding and generation assessment. It supports both pairwise ranking and pointwise scoring, providing effective reward signals for vision model preference alignment. Specifically, (1) we first train UnifiedReward on our constructed large-scale human preference dataset, which covers both image and video generation/understanding tasks. (2) Then, we leverage it to automatically construct high-quality pairwise preference data from vision models by progressively filtering their outputs through our two-stage strategy, i.e., pair ranking and point sifting. (3) Finally, we use these data to align vision models with human preferences via Direct Preference Optimization (DPO). Experimental results show that jointly learning to assess diverse visual tasks yields substantial mutual benefits. We further apply our pipeline to both vision understanding and generation, achieving consistent improvements across each domain.", "link": "http://arxiv.org/abs/2503.05236v2", "date": "2026-02-25", "relevancy": 2.8133, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5798}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5541}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unified%20Reward%20Model%20for%20Multimodal%20Understanding%20and%20Generation&body=Title%3A%20Unified%20Reward%20Model%20for%20Multimodal%20Understanding%20and%20Generation%0AAuthor%3A%20Yibin%20Wang%20and%20Yuhang%20Zang%20and%20Hao%20Li%20and%20Cheng%20Jin%20and%20Jiaqi%20Wang%0AAbstract%3A%20Recent%20advances%20in%20human%20preference%20alignment%20have%20significantly%20improved%20multimodal%20generation%20and%20understanding.%20A%20key%20approach%20is%20to%20train%20reward%20models%20that%20provide%20supervision%20signals%20for%20preference%20optimization.%20However%2C%20existing%20reward%20models%20are%20often%20task-specific%2C%20limiting%20their%20adaptability%20across%20diverse%20visual%20applications.%20We%20also%20argue%20that%20a%20reward%20model%20that%20jointly%20learning%20to%20assess%20multiple%20vision%20tasks%20may%20foster%20a%20synergistic%20effect%2C%20where%20improved%20image%20understanding%20enhances%20image%20generation%20assessment%2C%20and%20refined%20image%20evaluation%20benefits%20video%20assessment%20through%20better%20frame%20analysis.%20To%20this%20end%2C%20this%20paper%20proposes%20UnifiedReward%2C%20the%20first%20unified%20reward%20model%20for%20multimodal%20understanding%20and%20generation%20assessment.%20It%20supports%20both%20pairwise%20ranking%20and%20pointwise%20scoring%2C%20providing%20effective%20reward%20signals%20for%20vision%20model%20preference%20alignment.%20Specifically%2C%20%281%29%20we%20first%20train%20UnifiedReward%20on%20our%20constructed%20large-scale%20human%20preference%20dataset%2C%20which%20covers%20both%20image%20and%20video%20generation/understanding%20tasks.%20%282%29%20Then%2C%20we%20leverage%20it%20to%20automatically%20construct%20high-quality%20pairwise%20preference%20data%20from%20vision%20models%20by%20progressively%20filtering%20their%20outputs%20through%20our%20two-stage%20strategy%2C%20i.e.%2C%20pair%20ranking%20and%20point%20sifting.%20%283%29%20Finally%2C%20we%20use%20these%20data%20to%20align%20vision%20models%20with%20human%20preferences%20via%20Direct%20Preference%20Optimization%20%28DPO%29.%20Experimental%20results%20show%20that%20jointly%20learning%20to%20assess%20diverse%20visual%20tasks%20yields%20substantial%20mutual%20benefits.%20We%20further%20apply%20our%20pipeline%20to%20both%20vision%20understanding%20and%20generation%2C%20achieving%20consistent%20improvements%20across%20each%20domain.%0ALink%3A%20http%3A//arxiv.org/abs/2503.05236v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Reward%2520Model%2520for%2520Multimodal%2520Understanding%2520and%2520Generation%26entry.906535625%3DYibin%2520Wang%2520and%2520Yuhang%2520Zang%2520and%2520Hao%2520Li%2520and%2520Cheng%2520Jin%2520and%2520Jiaqi%2520Wang%26entry.1292438233%3DRecent%2520advances%2520in%2520human%2520preference%2520alignment%2520have%2520significantly%2520improved%2520multimodal%2520generation%2520and%2520understanding.%2520A%2520key%2520approach%2520is%2520to%2520train%2520reward%2520models%2520that%2520provide%2520supervision%2520signals%2520for%2520preference%2520optimization.%2520However%252C%2520existing%2520reward%2520models%2520are%2520often%2520task-specific%252C%2520limiting%2520their%2520adaptability%2520across%2520diverse%2520visual%2520applications.%2520We%2520also%2520argue%2520that%2520a%2520reward%2520model%2520that%2520jointly%2520learning%2520to%2520assess%2520multiple%2520vision%2520tasks%2520may%2520foster%2520a%2520synergistic%2520effect%252C%2520where%2520improve {"title": "Beyond Static Artifacts: A Forensic Benchmark for Video Deepfake Reasoning in Vision Language Models", "author": "Zheyuan Gu and Qingsong Zhao and Yusong Wang and Zhaohong Huang and Xinqi Li and Cheng Yuan and Jiaowei Shao and Chi Zhang and Xuelong Li", "abstract": "Current Vision-Language Models (VLMs) for deepfake detection excel at identifying spatial artifacts but overlook a critical dimension: temporal inconsistencies in video forgeries. Adapting VLMs to reason about these dynamic cues remains a distinct challenge. To bridge this gap, we propose Forensic Answer-Questioning (FAQ), a large-scale benchmark that formulates temporal deepfake analysis as a multiple-choice task. FAQ introduces a three-level hierarchy to progressively evaluate and equip VLMs with forensic capabilities: (1) Facial Perception, testing the ability to identify static visual artifacts; (2) Temporal Deepfake Grounding, requiring the localization of dynamic forgery artifacts across frames; and (3) Forensic Reasoning, challenging models to synthesize evidence for final authenticity verdicts. We evaluate a range of VLMs on FAQ and generate a corresponding instruction-tuning set, FAQ-IT. Extensive experiments show that models fine-tuned on FAQ-IT achieve advanced performance on both in-domain and cross-dataset detection benchmarks. Ablation studies further validate the impact of our key design choices, confirming that FAQ is the driving force behind the temporal reasoning capabilities of these VLMs.", "link": "http://arxiv.org/abs/2602.21779v1", "date": "2026-02-25", "relevancy": 2.8094, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5641}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5641}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5575}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Static%20Artifacts%3A%20A%20Forensic%20Benchmark%20for%20Video%20Deepfake%20Reasoning%20in%20Vision%20Language%20Models&body=Title%3A%20Beyond%20Static%20Artifacts%3A%20A%20Forensic%20Benchmark%20for%20Video%20Deepfake%20Reasoning%20in%20Vision%20Language%20Models%0AAuthor%3A%20Zheyuan%20Gu%20and%20Qingsong%20Zhao%20and%20Yusong%20Wang%20and%20Zhaohong%20Huang%20and%20Xinqi%20Li%20and%20Cheng%20Yuan%20and%20Jiaowei%20Shao%20and%20Chi%20Zhang%20and%20Xuelong%20Li%0AAbstract%3A%20Current%20Vision-Language%20Models%20%28VLMs%29%20for%20deepfake%20detection%20excel%20at%20identifying%20spatial%20artifacts%20but%20overlook%20a%20critical%20dimension%3A%20temporal%20inconsistencies%20in%20video%20forgeries.%20Adapting%20VLMs%20to%20reason%20about%20these%20dynamic%20cues%20remains%20a%20distinct%20challenge.%20To%20bridge%20this%20gap%2C%20we%20propose%20Forensic%20Answer-Questioning%20%28FAQ%29%2C%20a%20large-scale%20benchmark%20that%20formulates%20temporal%20deepfake%20analysis%20as%20a%20multiple-choice%20task.%20FAQ%20introduces%20a%20three-level%20hierarchy%20to%20progressively%20evaluate%20and%20equip%20VLMs%20with%20forensic%20capabilities%3A%20%281%29%20Facial%20Perception%2C%20testing%20the%20ability%20to%20identify%20static%20visual%20artifacts%3B%20%282%29%20Temporal%20Deepfake%20Grounding%2C%20requiring%20the%20localization%20of%20dynamic%20forgery%20artifacts%20across%20frames%3B%20and%20%283%29%20Forensic%20Reasoning%2C%20challenging%20models%20to%20synthesize%20evidence%20for%20final%20authenticity%20verdicts.%20We%20evaluate%20a%20range%20of%20VLMs%20on%20FAQ%20and%20generate%20a%20corresponding%20instruction-tuning%20set%2C%20FAQ-IT.%20Extensive%20experiments%20show%20that%20models%20fine-tuned%20on%20FAQ-IT%20achieve%20advanced%20performance%20on%20both%20in-domain%20and%20cross-dataset%20detection%20benchmarks.%20Ablation%20studies%20further%20validate%20the%20impact%20of%20our%20key%20design%20choices%2C%20confirming%20that%20FAQ%20is%20the%20driving%20force%20behind%20the%20temporal%20reasoning%20capabilities%20of%20these%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21779v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Static%2520Artifacts%253A%2520A%2520Forensic%2520Benchmark%2520for%2520Video%2520Deepfake%2520Reasoning%2520in%2520Vision%2520Language%2520Models%26entry.906535625%3DZheyuan%2520Gu%2520and%2520Qingsong%2520Zhao%2520and%2520Yusong%2520Wang%2520and%2520Zhaohong%2520Huang%2520and%2520Xinqi%2520Li%2520and%2520Cheng%2520Yuan%2520and%2520Jiaowei%2520Shao%2520and%2520Chi%2520Zhang%2520and%2520Xuelong%2520Li%26entry.1292438233%3DCurrent%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520for%2520deepfake%2520detection%2520excel%2520at%2520identifying%2520spatial%2520artifacts%2520but%2520overlook%2520a%2520critical%2520dimension%253A%2520temporal%2520inconsistencies%2520in%2520video%2520forgeries.%2520Adapting%2520VLMs%2520to%2520reason%2520about%2520these%2520dynamic%2520cues%2520remains%2520a%2520distinct%2520challenge.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520Forensic%2520Answer-Questioning%2520%2528FAQ%2529%252C%2520a%2520large-scale%2520benchmark%2520that%2520formulates%2520temporal%2520deepfake%2520analysis%2520as%2520a%2520multiple-choice%2520task.%2520FAQ%2520introduces%2520a%2520three-level%2520hierarchy%2520to%2520progressively%2520evaluate%2520and%2520equip%2520VLMs%2520with%2520forensic%2520capabilities%253A%2520%25281%2529%2520Facial%2520Perception%252C%2520testing%2520the%2520ability%2520to%2520identify%2520static%2520visual%2520artifacts%253B%2520%25282%2529%2520Temporal%2520Deepfake%2520Grounding%252C%2520requiring%2520the%2520localization%2520of%2520dynamic%2520forgery%2520artifacts%2520across%25 {"title": "SPGen: Stochastic scanpath generation for paintings using unsupervised domain adaptation", "author": "Mohamed Amine Kerkouri and Marouane Tliba and Aladine Chetouani and Alessandro Bruno", "abstract": "Understanding human visual attention is key to preserving cultural heritage We introduce SPGen a novel deep learning model to predict scanpaths the sequence of eye movementswhen viewers observe paintings.\n  Our architecture uses a Fully Convolutional Neural Network FCNN with differentiable fixation selection and learnable Gaussian priors to simulate natural viewing biases To address the domain gap between photographs and artworks we employ unsupervised domain adaptation via a gradient reversal layer allowing the model to transfer knowledge from natural scenes to paintings Furthermore a random noise sampler models the inherent stochasticity of eyetracking data.\n  Extensive testing shows SPGen outperforms existing methods offering a powerful tool to analyze gaze behavior and advance the preservation and appreciation of artistic treasures.", "link": "http://arxiv.org/abs/2602.22049v1", "date": "2026-02-25", "relevancy": 2.787, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5599}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5564}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SPGen%3A%20Stochastic%20scanpath%20generation%20for%20paintings%20using%20unsupervised%20domain%20adaptation&body=Title%3A%20SPGen%3A%20Stochastic%20scanpath%20generation%20for%20paintings%20using%20unsupervised%20domain%20adaptation%0AAuthor%3A%20Mohamed%20Amine%20Kerkouri%20and%20Marouane%20Tliba%20and%20Aladine%20Chetouani%20and%20Alessandro%20Bruno%0AAbstrac {"title": "V-Retrver: Evidence-Driven Agentic Reasoning for Universal Multimodal Retrieval", "author": "Dongyang Chen and Chaoyang Wang and Dezhao Su and Xi Xiao and Zeyu Zhang and Jing Xiong and Qing Li and Yuzhang Shang and Shichao Kan", "abstract": "Multimodal Large Language Models (MLLMs) have recently been applied to universal multimodal retrieval, where Chain-of-Thought (CoT) reasoning improves candidate reranking. However, existing approaches remain largely language-driven, relying on static visual encodings and lacking the ability to actively verify fine-grained visual evidence, which often leads to speculative reasoning in visually ambiguous cases. We propose V-Retrver, an evidence-driven retrieval framework that reformulates multimodal retrieval as an agentic reasoning process grounded in visual inspection. V-Retrver enables an MLLM to selectively acquire visual evidence during reasoning via external visual tools, performing a multimodal interleaved reasoning process that alternates between hypothesis generation and targeted visual verification.To train such an evidence-gathering retrieval agent, we adopt a curriculum-based learning strategy combining supervised reasoning activation, rejection-based refinement, and reinforcement learning with an evidence-aligned objective. Experiments across multiple multimodal retrieval benchmarks demonstrate consistent improvements in retrieval accuracy (with 23.0% improvements on average), perception-driven reasoning reliability, and generalization.", "link": "http://arxiv.org/abs/2602.06034v2", "date": "2026-02-25", "relevancy": 2.7782, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5651}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link" 0with%20an%20evidence-aligned%20objective.%20Experiments%20across%20multiple%20multimodal%20retrieval%20benchmarks%20demonstrate%20consistent%20improvements%20in%20retrieval%20accuracy%20%28with%2023.0%25%20improvements%20on%20average%29%2C%20perception-driven%20reasoning%20reliability%2C%20and%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2602.06034v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DV-Retrver%253A%2520Evidence-Driven%2520Agentic%2520Reasoning%2520for%2520Universal%2520Multimodal%2520Retrieval%26entry.906535625%3DDongyang%2520Chen%2520and%2520Chaoyang%2520Wang%2520and%2520Dezhao%2520Su%2520and%2520Xi%2520Xiao%2520and%2520Zeyu%2520Zhang%2520and%2520Jing%2520Xiong%2520and%2520Qing%2520Li%2520and%2520Yuzhang%2520Shang%2520and%2520Shichao%2520Kan%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520recently%2520been%2520applied%2520to%2520universal%2520multimodal%2520retrieval%252C%2520where%2520Chain-of-Thought%2520%2528CoT%2529%2520reasoning%2520improves%2520candidate%2520reranking.%2520However%252C%2520existing%2520approaches%2520remain%2520largely%2520language-driven%252C%2520relying%2520on%2520static%2520visual%2520encodings%2520and%2520lacking%2520the%2520ability%2520to%2520actively%2520verify%2520fine-grained%2520visual%2520evidence%252C%2520which%2520often%2520leads%2520to%2520speculative%2520reasoning%2520in%2520visually%2520ambiguous%2520cases.%2520We%2520propose%2520V-Retrver%252C%2520an%2520evidence-driven%2520retrieval%2520framework%2520that%2520reformulates%2520multimodal%2520retrieval%2520as%2520an%2520agentic%2520reasoning%2520process%2520grounded%2520in%2520visual%2520inspection.%2520V-Retrver%2520enables%2520an%2520MLLM%2520to%2520selectively%2520acquire%2520visual%2520evidence%2520during%2520reasoning%2520via%2520external%2520visual%2520tools%252C%2520performing%2520a%2520multimodal%2520interleaved%2520reasoning%2520process%2520that%2520alternates%2520between%2520hypothesis%2520generation%2520and%2520targeted%2520visual%2520verification.To%2520train%2520such%2520an%2520evidence-gathering%2520retrieval%2520agent%252C%2520we%2520adopt%2520a%2520curriculum-based%2520learning%2520strategy%2520combining%2520supervised%2520reasoning%2520activation%252C%2520rejection-based%2520refinement%252C%2520and%2520reinforcement%2520learning%2520with%2520an%2520evidence-aligned%2520objective.%2520Experiments%2520across%2520multiple%2520multimodal%2520retrieval%2520benchmarks%2520demonstrate%2520consistent%2520improvements%2520in%2520retrieval%2520accuracy%2520%2528with%252023.0%2525%2520improvements%2520on%2520average%2529%252C%2520perception-driven%2520reasoning%2520reliability%252C%2520and%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.06034v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=V-Retrver%3A%20Evidence-Driven%20Agentic%20Reasoning%20for%20Universal%20Multimodal%20Retrieval&entry.906535625=Dongyang%20Chen%20and%20Chaoyang%20Wang%20and%20Dezhao%20Su%20and%20Xi%20Xiao%20and%20Zeyu%20Zhang%20and%20Jing%20Xiong%20and%20Qing%20Li%20and%20Yuzhang%20Shang%20and%20Shichao%20Kan&entry.1292438233=Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20recently%20been%20applied%20to%20universal%20multimodal%20retrieval%2C%20where%20Chain-of-Thought%20%28CoT%29%20reasoning%20improves%20candidate%20reranking.%20However%2C%20existing%20approaches%20remain%20largely%20language-driven%2C%20relying%20on%20static%20visual%20encodings%20and%20lacking%20the%20ability%20to%20actively%20verify%20fine-grained%20visual%20evidence%2C%20which%20often%20leads%20to%20speculative%20reasoning%20in%20visually%20ambiguous%20cases.%20We%20propose%20V-Retrver%2C%20an%20evidence-driven%20retrieval%20framework%20that%20reformulates%20multimodal%20retrieval%20as%20an% {"title": "RobustVisRAG: Causality-Aware Vision-Based Retrieval-Augmented Generation under Visual Degradations", "author": "I-Hsiang Chen and Yu-Wei Liu and Tse-Yu Wu and Yu-Chien Chiang and Jen-Chien Yang and Wei-Ting Chen", "abstract": "Vision-based Retrieval-Augmented Generation (VisRAG) leverages vision-language models (VLMs) to jointly retrieve relevant visual documents and generate grounded answers based on multimodal evidence. However, existing VisRAG models degrade in performance when visual inputs suffer from distortions such as blur, noise, low light, or shadow, where semantic and degradation factors become entangled within pretrained visual encoders, leading to errors in both retrieval and generation stages. To address this limitation, we introduce RobustVisRAG, a causality-guided dual-path framework that improves VisRAG robustness while preserving efficiency and zero-shot generalization. RobustVisRAG uses a non-causal path to capture degradation signals through unidirectional attention and a causal path to learn purified semantics guided by these signals. Together with the proposed Non-Causal Distortion Modeling and Causal Semantic Alignment objectives, the framework enforces a clear separation between semantics and degradations, enabling stable retrieval and generation under challenging visual conditions. To evaluate robustness under realistic conditions, we introduce the Distortion-VisRAG dataset, a large-scale benchmark containing both synthetic and real-world degraded documents across seven domains, with 12 synthetic and 5 real distortion types that comprehensively reflect practical visual degradations. Experimental results show that RobustVisRAG improves retrieval, generation, and end-to-end performance by 7.35%, 6.35%, and 12.40%, respectively, on real-world degradations, while maintaining comparable accuracy on clean inputs.", "link": "http://arxiv.org/abs/2602.22013v1", "date": "2026-02-25", "relevancy": 2.7729, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5702}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5482}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5453}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RobustVisRAG%3A%20Causality-Aware%20Vision-Based%20Retrieval-Augmented%20Generation%20under%20Visual%20Degradations&body=Title%3A%20RobustVisRAG%3A%20Causality-Aware%20Vision-Based%20Retrieval-Augmented%20Generation%20under%20Visual%20Degradations%0AAuthor%3A%20I-Hsiang%20Chen%20and%20Yu-Wei%20Liu%20and%20Tse-Yu%20Wu%20and%20Yu-Chien%20Chiang%20and%20Jen-Chien%20Yang%20and%20Wei-Ting%20Chen%0AAbstract%3A%20Vision-based%20Retrieval-Augmented%20Generation%20%28VisRAG%29%20leverages%20vision-language%20models%20%28VLMs%29%20to%20jointly%20retrieve%20relevant%20visual%20documents%20and%20generate%20grounded%20answers%20based%20on%20multimodal%20evidence.%20However%2C%20existing%20VisRAG%20models%20degrade%20in%20performance%20when%20visual%20inputs%20suffer%20from%20distortions%20such%20as%20blur%2C%20noise%2C%20low%20light%2C%20or%20shadow%2C%20where%20semantic%20and%20degradation%20factors%20become%20entangled%20within%20pretrained%20visual%20encoders%2C%20leading%20to%20errors%20in%20both%20retrieval%20and%20generation%20stages.%20To%20address%20this%20limitation%2C%20we%20introduce%20RobustVisRAG%2C%20a%20causality-guided%20dual-path%20framework%20that%20improves%20VisRAG%20robustness%20while%20preserving%20efficiency%20and%20zero-shot%20generalization.%20RobustVisRAG%20uses%20a%20non-causal%20path%20to%20capture%20degradation%20signals%20through%20unidirectional%20attention%20and%20a%20causal%20path%20to%20learn%20purified%20semantics%20guided%20by%20these%20signals.%20Together%20with%20the%20proposed%20Non-Causal%20Distortion%20Modeling%20and%20Causal%20Semantic%20Alignment%20objectives%2C%20the%20framework%20enforces%20a%20clear%20separation%20between%20semantics%20and%20degradations%2C%20enabling%20stable%20retrieval%20and%20generation%20under%20challenging%20visual%20conditions.%20To%20evaluate%20robustness%20under%20realistic%20conditions%2C%20we%20introduce%20the%20Distortion-VisRAG%20dataset%2C%20a%20large-scale%20benchmark%20containing%20both%20synthetic%20and%20real-world%20degraded%20documents%20across%20seven%20domains%2C%20with%2012%20synthetic%20and%205%20real%20distortion%20types%20that%20comprehensively%20reflect%20practical%20visual%20degradations.%20Experimental%20results%20show%20that%20RobustVisRAG%20improves%20retrieval%2C%20generation%2C%20and%20end-to-end%20performance%20by%207.35%25%2C%206.35%25%2C%20and%2012.40%25%2C%20respectively%2C%20on%20real-world%20degradations%2C%20while%20maintaining%20comparable%20accuracy%20on%20clean%20inputs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22013v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobustVisRAG%253A%2520Causality-Aware%2520Vision-Based%2520Retrieval-Augmented%2520Generation%2520under%2520Visual%2520Degradations%26entry.906535625%3DI-Hsiang%2520Chen%2520and%2520Yu-Wei%2520Liu%2520and%2520Tse-Yu%2520Wu%2520and%2520Yu-Chien%2520Chiang%2520and%2520Jen-Chien%2520Yang%2520and%2520Wei-Ting%2520Chen%26entry.1292438233%3DVision-based%2520Retrieval-Augmented%2520Generation%2520%2528VisRAG%2529%2520leverages%2520vision-language%2520models%2520%2528VLMs%2529%2520to%2520jointly%2520retrieve%2520relevant%2520visual%2520documents%2520and%2520generate%2520grounded%2520answers%2520based%2520on%2520multimodal%2520evidence.%2520However%252C%2520existing%2520VisRAG%2520models%2520degrade%2520in%2520performance%2520when%2520visual%2520inputs%2520suffer%2520from%2520distortions%2520such%2520as%2520blur%252C%2520noise%252C%2520low%2520light%25 0accuracy%2520on%2520clean%2520inputs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22013v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RobustVisRAG%3A%20Causality-Aware%20Vision-Based%20Retrieval-Augmented%20Generation%20under%20Visual%20Degradations&entry.906535625=I-Hsiang%20Chen%20and%20Yu-Wei%20Liu%20and%20Tse-Yu%20Wu%20and%20Yu-Chien%20Chiang%20and%20Jen-Chien%20Yang%20and%20Wei-Ting%20Chen&entry.1292438233=Vision-based%20Retrieval-Augmented%20Generation%20%28VisRAG%29%20leverages%20vision-language%20models%20%28VLMs%29%20to%20jointly%20retrieve%20relevant%20visual%20documents%20and%20generate%20grounded%20answers%20based%20on%20multimodal%20evidence.%20However%2C%20existing%20VisRAG%20models%20degrade%20in%20performance%20when%20visual%20inputs%20suffer%20from%20distortions%20such%20as%20blur%2C%20noise%2C%20low%20light%2C%20or%20shadow%2C%20where%20semantic%20and%20degradation%20factors%20become%20entangled%20within%20pretrained%20visual%20encoders%2C%20leading%20to%20errors%20in%20both%20retrieval%20and%20generation%20stages.%20To%20address%20this%20limitation%2C%20we%20introduce%20RobustVisRAG%2C%20a%20causality-guided%20dual-path%20framework%20that%20improves%20VisRAG%20robustness%20while%20preserving%20efficiency%20and%20zero-shot%20generalization.%20RobustVisRAG%20uses%20a%20non-causal%20path%20to%20capture%20degradation%20signals%20through%20unidirectional%20attention%20and%20a%20causal%20path%20to%20learn%20purified%20semantics%20guided%20by%20these%20signals.%20Together%20with%20the%20proposed%20Non-Causal%20Distortion%20Modeling%20and%20Causal%20Semantic%20Alignment%20objectives%2C%20the%20framework%20enforces%20a%20clear%20separation%20between%20semantics%20and%20degradations%2C%20enabling%20stable%20retrieval%20and%20generation%20under%20challenging%20visual%20conditions.%20To%20evaluate%20robustness%20under%20realistic%20conditions%2 {"title": "Seeing the Forest and the Trees: Query-Aware Tokenizer for Long-Video Multimodal Language Models", "author": "Siyou Li and Huanan Wu and Juexi Shao and Yinghao Ma and Yujian Gan and Yihao Luo and Yuwei Wang and Dong Nie and Lu Wang and Wenqing Wu and Le Zhang and Massimo Poesio and Juntao Yu", "abstract": "Despite the recent advances in the video understanding ability of multimodal large language models (MLLMs), long video understanding remains a challenge. One of the main issues is that the number of vision tokens grows linearly with video length, which causes an explosion in attention cost, memory, and latency. To solve this challenge, we present Query-aware Token Selector (\\textbf{QTSplus}), a lightweight yet powerful visual token selection module that serves as an information gate between the vision encoder and LLMs. Given a text query and video tokens, QTSplus dynamically selects the most important visual evidence for the input text query by (i) scoring visual tokens via cross-attention, (ii) \\emph{predicting} an instance-specific retention budget based on the complexity of the query, and (iii) \\emph{selecting} Top-$n$ tokens with a differentiable straight-through estimator during training and a hard gate at inference. Furthermore, a small re-encoder preserves temporal order using absolute time information, enabling second-level localization while maintaining global coverage.\n  Integrated into Qwen2.5-VL, QTSplus compresses the vision stream by up to \\textbf{89\\%} and reduces end-to-end latency by \\textbf{28\\%} on long videos. The evaluation on eight long video understanding benchmarks shows near-parity accuracy overall when compared with the original Qwen models and outperforms the original model by \\textbf{+20.5} and \\textbf{+5.6} points respectively on TempCompass direction and order accuracies. These results show that QTSplus is an effective, general mechanism for scaling MLLMs to real-world long-video scenarios while preserving task-relevant evidence.", "link": "http://arxiv.org/abs/2511.11910v3", "date": "2026-02-25", "relevancy": 2.7595, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5589}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5589}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seeing%20the%20Forest%20and%20the%20Trees%3A%20Query-Aware%20Tokenizer%20for%20Long-Video%20Multimodal%20Language%20Models&body=Title%3A%20Seeing%20the%20Forest%20and%20the%20Trees%3A%20Query-Aware%20Tokenizer%20for%20Long-Video%20Multimodal%20Language%20Models%0AAuthor%3A%20Siyou%20Li%20and%20Huanan%20Wu%20and%20Juexi%20Shao%20and%20Yinghao%20Ma%20and%20Yujian%20Gan%20and%20Yihao%20Luo%20and%20Yuwei%20Wang%20and%20Dong%20Nie%20and%20Lu%20Wang%20and%20Wenqing%20Wu%20and%20Le%20Zhang%20and%20Massimo%20Poesio%20and%20Juntao%20Yu%0AAbstract%3A%20Despite%20the%20recent%20advances%20in%20the%20video%20understanding%20ability%20of%20multimodal%20large%20language%20models%20%28MLLMs%29%2C%20long%20video%20understanding%20remains%20a%20challenge.%20One%20of%20the%20main%20issues%20is%20that%20the%20number%20of%20vision%20tokens%20grows%20linearly%20with%20video%20length%2C%20which%20causes%20an%20explosion%20in%20attention%20cost%2C%20memory%2C%20and%20latency.%20To%20solve%20this%20challenge%2C%20we%20present%20Query-aware%20Token%20Selector%20%28%5Ctextbf%7BQTSplus%7D%29%2C%20a%20lightweight%20yet%20powerful%20visual%20token%20selection%20module%20that%20serves%20as%20an%20information%20gate%20between%20the%20vision%20encoder%20and%20LLMs.%20Given%20a%20text%20query%20and%20video%20tokens%2C%20QTSplus%20dynamically%20selects%20the%20most%20important%20visual%20evidence%20for%20the%20input%20text%20query%20by%20%28i%29%20scoring%20visual%20tokens%20via%20cross-attention%2C%20%28ii%29%20%5Cemph%7Bpredicting%7D%20an%20instance-specific%20retention%20budget%20based%20on%20the%20complexity%20of%20the%20query%2C%20and%20%28iii%29%20%5Cemph%7Bselecting%7D%20Top-%24n%24%20tokens%20with%20a%20differentiable%20straight-through%20estimator%20during%20training%20and%20a%20hard%20gate%20at%20inference.%20Furthermore%2C%20a%20small%20re-encoder%20preserves%20temporal%20order%20using%20absolute%20time%20information%2C%20enabling%20second-level%20localization%20while%20maintaining%20global%20coverage.%0A%20%20Integrated%20into%20Qwen2.5-VL%2C%20QTSplus%20compresses%20the%20vision%20stream%20by%20up%20to%20%5Ctextbf%7B89%5C%25%7D%20and%20reduces%20end-to-end%20latency%20by%20%5Ctextbf%7B28%5C%25%7D%20on%20long%20videos.%20The%20evaluation%20on%20eight%20long%20video%20understanding%20benchmarks%20shows%20near-parity%20accuracy%20overall%20when%20compared%20with%20the%20original%20Qwen%20models%20and%20outperforms%20the%20original%20model%20by%20%5Ctextbf%7B%2B20.5%7D%20and%20%5Ctextbf%7B%2B5.6%7D%20points%20respectively%20on%20TempCompass%20direction%20and%20order%20accuracies.%20These%20results%20show%20that%20QTSplus%20is%20an%20effective%2C%20general%20mechanism%20for%20scaling%20MLLMs%20to%20real-world%20long-video%20scenarios%20while%20preserving%20task-relevant%20evidence.%0ALink%3A%20http%3A//arxiv.org/abs/2511.11910v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeeing%2520the%2520Forest%2520and%2520the%2520Trees%253A%2520Query-Aware%2520Tokenizer%2520for%2520Long-Video%2520Multimodal%2520Language%2520Models%26entry.906535625%3DSiyou%2520Li%2520and%2520Huanan%2520Wu%2520and%2520Juexi%2520Shao%2520and%2520Yinghao%2520Ma%2520and%2520Yujian%2520Gan%2520and%2520Yihao%2520Luo%2520and%2520Yuwei%2520Wang%2520and%252 {"title": "Uni-MMMU: A Massive Multi-discipline Multimodal Unified Benchmark", "author": "Kai Zou and Ziqi Huang and Yuhao Dong and Shulin Tian and Dian Zheng and Hongbo Liu and Jingwen He and Bin Liu and Yu Qiao and Ziwei Liu", "abstract": "Unified multimodal models aim to jointly enable visual understanding and generation, yet current benchmarks rarely examine their true integration. Existing evaluations either treat the two abilities in isolation or overlook tasks that inherently couple them. To address this gap, we present Uni-MMMU, a comprehensive and discipline-aware benchmark that systematically unfolds the bidirectional synergy between generation and understanding across eight reasoning-centric domains, including science, coding, mathematics, and puzzles. Each task is bidirectionally coupled, demanding models to (i) leverage conceptual understanding to guide precise visual synthesis, or (ii) utilize generation as a cognitive scaffold for analytical reasoning. Uni-MMMU incorporates verifiable intermediate reasoning steps, unique ground truths, and a reproducible scoring protocol for both textual and visual outputs. Through extensive evaluation of state-of-the-art unified, generation-only, and understanding-only models, we reveal substantial performance disparities and cross-modal dependencies, offering new insights into when and how these abilities reinforce one another, and establishing a reliable foundation for advancing unified models.", "link": "http://arxiv.org/abs/2510.13759v2", "date": "2026-02-25", "relevancy": 2.7504, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5519}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uni-MMMU%3A%20A%20Massive%20Multi-discipline%20Multimodal%20Unified%20Benchmark&body=Title%3A%20Uni-MMMU%3A%20A%20Massive%20Multi-discipline%20Multimodal%20Unified%20Benchmark%0AAuthor%3A%20Kai%20Zou%20and%20Ziqi%20Huang%20and%20Yuhao%20Dong%20and%20Shulin%20Tian%20and%20Dian%20Zheng%20and%20Hongbo%20Liu%20and%20Jingwen%20He%20and%20Bin%20Liu%20and%20Yu%20Qiao%20and%20Ziwei%20Liu%0AAbstract%3A%20Unified%20multimodal%20models%20aim%20to%20jointly%20enable%20visual%20understanding%20and%20generation%2C%20yet%20current%20benchmarks%20rarely%20examine%20their%20true%20integration.%20Existing%20evaluations%20either%20treat%20the%20two%20abilities%20in%20isolation%20or%20overlook%20tasks%20that%20inherently%20couple%20them.%20To%20address%20this%20gap%2C%20we%20present%20Uni-MMMU%2C%20a%20comprehensive%20and%20discipline-aware%20benchmark%20that%20systematically%20unfolds%20the%20bidirectional%20synergy%20between%20generation%20and%20understanding%20across%20eight%20reasoning-centric%20domains%2C%20including%20science%2C%20coding%2C%20mathematics%2C%20and%20puzzles.%20Each%20task%20is%20bidirectionally%20coupled%2C%20demanding%20models%20to%20%28i%29%20leverage%20conceptual%20understanding%20to%20guide%20precise%20visual%20synthesis%2C%20or%20%28ii%29%20utilize%20generation%20as%20a%20cognitive%20scaffold%20for%20analytical%20reasoning.%20Uni-MMMU%20incorporates%20verifiable%20intermediate%20reasoning%20steps%2C%20unique%20ground%20truths%2C%20and%20a%20reproducible%20scoring%20protocol%20for%20both%20textual%20and%20visual%20outputs.%20Through%20extensive%20evaluation%20of%20state-of-the-art%20unified%2C%20generation-only%2C%20and%20understanding-only%20models%2C%20we%20reveal%20substantial%20performance%20disparities%20and%20cross-modal%20dependencies%2C%20offering%20new%20insights%20into%20when%20and%20how%20these%20abilities%20reinforce%20one%20another%2C%20and%20establishing%20a%20reliable%2 asoning.%20Uni-MMMU%20incorporates%20verifiable%20intermediate%20reasoning%20steps%2C%20unique%20ground%20truths%2C%20and%20a%20reproducible%20scoring%20protocol%20for%20both%20textual%20and%20visual%20outputs.%20Through%20extensive%20evaluation%20of%20state-of-the-art%20unified%2C%20generation-only%2C%20and%20understanding-only%20models%2C%20we%20reveal%20substantial%20performance%20disparities%20and%20cross-modal%20dependencies%2C%20offering%20new%20insights%20into%20when%20and%20how%20these%20abilities%20reinforce%20one%20another%2C%20and%20establishing%20a%20reliable%20foundation%20for%20advancing%20unified%20models.&entry.1838667208=http%3A//arxiv.org/abs/2510.13759v2&entry.124074799=Read"},
{"title": "TimeBlind: A Spatio-Temporal Compositionality Benchmark for Video LLMs", "author": "Baiqi Li and Kangyi Zhao and Ce Zhang and Chancharik Mitra and Jean de Dieu Nyandwi and Gedas Bertasius", "abstract": "Fine-grained spatio-temporal understanding is essential for video reasoning and embodied AI. Yet, while Multimodal Large Language Models (MLLMs) master static semantics, their grasp of temporal dynamics remains brittle. We present TimeBlind, a diagnostic benchmark for compositional spatio-temporal understanding. Inspired by cognitive science, TimeBlind categorizes fine-grained temporal understanding into three levels: recognizing atomic events, characterizing event properties, and reasoning about event interdependencies. Unlike benchmarks that conflate recognition with temporal reasoning, TimeBlind leverages a minimal-pairs paradigm: video pairs share identical static visual content but differ solely in temporal structure, utilizing complementary questions to neutralize language priors. Evaluating over 20 state-of-the-art MLLMs (e.g., GPT-5, Gemini 3 Pro) on 600 curated instances (2400 video-question pairs), reveals that the Instance Accuracy (correctly distinguishing both videos in a pair) of the best performing MLLM is only 48.2%, far below the human performance (98.2%). These results demonstrate that even frontier models rely heavily on static visual shortcuts rather than genuine temporal logic, positioning TimeBlind as a vital diagnostic tool for next-generation video understanding. Dataset and code are available at https://baiqi-li.github.io/timeblind_project/ .", "link": "http://arxiv.org/abs/2602.00288v3", "date": "2026-02-25", "relevancy": 2.7271, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.558}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/a w%20the%20human%20performance%20%2898.2%25%29.%20These%20results%20demonstrate%20that%20even%20frontier%20models%20rely%20heavily%20on%20static%20visual%20shortcuts%20rather%20than%20genuine%20temporal%20logic%2C%20positioning%20TimeBlind%20as%20a%20vital%20diagnostic%20tool%20for%20next-generation%20video%20understanding.%20Dataset%20and%20code%20are%20available%20at%20https%3A//baiqi-li.github.io/timeblind_project/%20.%0ALink%3A%20http%3A//arxiv.org/abs/2602.00288v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTimeBlind%253A%2520A%2520Spatio-Temporal%2520Compositionality%2520Benchmark%2520for%2520Video%2520LLMs%26entry.906535625%3DBaiqi%2520Li%2520and%2520Kangyi%2520Zhao%2520and%2520Ce%2520Zhang%2520and%2520Chancharik%2520Mitra%2520and%2520Jean%2520de%2520Dieu%2520Nyandwi%2520and%2520Gedas%2520Bertasius%26entry.1292438233%3DFine-grained%2520spatio-temporal%2520understanding%2520is%2520essential%2520for%2520video%2520reasoning%2520and%2520embodied%2520AI.%2520Yet%252C%2520while%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520master%2520static%2520semantics%252C%2520their%2520grasp%2520of%2520temporal%2520dynamics%2520remains%2520brittle.%2520We%2520present%2520TimeBlind%252C%2520a%2520diagnostic%2520benchmark%2520for%2520compositional%2520spatio-temporal%2520understanding.%2520Inspired%2520by%2520cognitive%2520science%252C%2520TimeBlind%2520categorizes%2520fine-grained%2520temporal%2520understanding%2520into%2520three%2520levels%253A%2520recognizing%2520atomic%2520events%252C%2520characterizing%2520event%2520properties%252C%2520and%2520reasoning%2520about%2520event%2520interdependencies.%2520Unlike%2520benchmarks%2520that%2520conflate%2520recognition%2520with%2520temporal%2520reasoning%252C%2520TimeBlind%2520leverages%2520a%2520minimal-pairs%2520paradigm%253A%2520video%2520pairs%2520share%2520identical%2520static%2520visual%2520content%2520but%2520diff {"title": "Chain-of-Thought Compression Should Not Be Blind: V-Skip for Efficient Multimodal Reasoning via Dual-Path Anchoring", "author": "Dongxu Zhang and Yiding Sun and Cheng Tan and Wenbiao Yan and Ning Yang and Jihua Zhu and Haijun Zhang", "abstract": "While Chain-of-Thought (CoT) reasoning significantly enhances the performance of Multimodal Large Language Models (MLLMs), its autoregressive nature incurs prohibitive latency constraints. Current efforts to mitigate this via token compression often fail by blindly applying text-centric metrics to multimodal contexts. We identify a critical failure mode termed Visual Amnesia, where linguistically redundant tokens are erroneously pruned, leading to hallucinations. To address this, we introduce V-Skip that reformulates token pruning as a Visual-Anchored Information Bottleneck (VA-IB) optimization problem. V-Skip employs a dual-path gating mechanism that weighs token importance through both linguistic surprisal and cross-modal attention flow, effectively rescuing visually salient anchors. Extensive experiments on Qwen2-VL and Llama-3.2 families demonstrate that V-Skip achieves a $2.9\\times$ speedup with negligible accuracy loss. Specifically, it preserves fine-grained visual details, outperforming other baselines over 30\\% on the DocVQA.", "link": "http://arxiv.org/abs/2601.13879v3", "date": "2026-02-25", "relevancy": 2.7231, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5464}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5464}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Chain-of-Thought%20Compression%20Should%20Not%20Be%20Blind%3A%20V-Skip%20for%20Efficient%20Multimodal%20Reasoning%20via%20Dual-Path%20Anchoring&body=Title%3A%20Chain-of-Thought%20Compression%20Should%20Not%20Be%20Blind%3A%20V-Skip%20for%20Efficient%20Multimodal%20Reasoning%20via%20Dual-Path%20Anchoring%0AAuthor%3A%20Dongxu%20Zhang%20and%20Yiding%20Sun%20and%20Cheng%20Tan%20and%20Wenbiao%20Yan%20and%20Ning%20Yang%20and%20Jihua%20Zhu%20and%20Haijun%20Zhang%0AAbstract%3A%20While%20Chain-of-Thought%20%28CoT%29%20reasoning%20significantly%20enhances%20the%20performance%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%2C%20its%20autoregressive%20nature%20incurs%20prohibitive%20latency%20constraints.%20Current%20efforts%20to%20mitigate%20this%20via%20token%20compression%20often%20fail%20by%20blindly%20applying%20text-centric%20metrics%20to%20multimodal%20contexts.%20We%20identify%20a%20critical%20failure%20mode%20termed%20Visual%20Amnesia%2C%20where%20linguistically%20redundant%20tokens%20are%20erroneously%20pruned%2C%20leading%20to%20hallucinations.%20To%20address%20this%2C%20we%20introduce%20V-Skip%20that%20reformulates%20token%20pruning%20as%20a%20Visual-Anchored%20Information%20Bottleneck%20%28VA-IB%29%20optimization%20problem.%20V-Skip%20employs%20a%20dual-path%20gating%20mechanism%20that%20weighs%20token%20importance%20through%20both%20linguistic%20surprisal%20and%20cross-modal%20attention%20flow%2C%20effectively%20rescuing%20visually%20salient%20anchors.%20Extensive%20experiments%20on%20Qwen2-VL%20and%20Llama-3.2%20families%20demonstrate%20that%20V-Skip%20achieves%20a%20%242.9%5Ctimes%24%20speedup%20with%20negligible%20accuracy%20loss.%20Specifically%2C%20it%20preserves%20fine-grained%20visual%20details%2C%20outperforming%20other%20baselines%20over%2030%5C%25%20on%20the%20DocVQA.%0ALink%3A%20http%3A//arxiv.org/abs/2601.13879v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChain-of-Thought%2520Compression%2520Should%2520Not%2520Be%2520Blind%253A%2520V-Skip%2520for%2520Efficient%2520Multimodal%2520Reasoning%2520via%2520Dual-Path%2520Anchoring%26entry.906535625%3DDongxu%2520Zhang%2520and%2520Yiding%2520Sun%2520and%2520Cheng%2520Tan%2520and%2520Wenbiao%2520Yan%2520and%2520Ning%2520Yang%2520and%2520Jihua%2520Zhu%2520and%2520Haijun%2520Zhang%26entry.1292438233%3DWhile%2520Chain-of-Thought%2520%2528CoT%2529%2520reasoning%2520significantly%2520enhances%2520the%2520performance%2520of%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%252C%2520its%2520autoregressive%2520nature%2520incurs%2520prohibitive%2520latency%2520constraints.%2520Current%2520efforts%2520to%2520mitigate%2520this%2520via%2520token%2520compression%2520often%2520fail%2520by%2520blindly%2520applying%2520text-centric%2520metrics%2520to%2520multimodal%2520contexts.%2520We%2520identify%2520a%2520critical%2520failure%2520mode%2520termed%2520Visual%2520Amnesia%252C%2520where%2520linguistically%2520redundant%2520tokens%2520are%2520erroneously%2520pruned%252C%2520leading%2520to%2520hallucinations.%2520To%2520address%2520this%252C%2520we%2520introduce%2520V-Skip%2520that%2520reformulates%2520token%2520pruning%2520as%2520a%2520Visual-Anchored%2520Information%2520Bottleneck%2520%2528VA-IB%2529%2520optimization%2520problem.%2520V-Skip%2520employs%2520a%2520dual-path%2520gating%2520mechanism%2520that%2520weighs%2520token%2520importance%2520through%2520both%2520linguistic%2520surprisal%2520and%2520cross-modal%2520attention%2520flow%252C%2520effectively%2520rescuing%2520visually%2520salient%2520anchors.%2520Extensive%2520experiments%2520on%2520Qwen2-VL%2520and%2520Llama-3.2%2520families%2520demonstrate%2520that%2520V-Skip%2520achieves%2520a%2520%25242.9%255Ctimes%2524%2520speedup%2520with%2520negligible%2520accuracy%2520loss.%2520Specifically%252C%2520it%2520preserves%2520fine-grained%2520visual%2520details%252C%2520outperforming%2520other%2520baselines%2520over%252030%255C%2525%2520on%2520the%2520DocVQA.%26entry.18

ages%20in%20practical%20applications.&entry.1838667208=http%3A//arxiv.org/abs/2602.22039v1&entry.124074799=Read"},
{"title": "Perception-Control Coupled Visual Servoing for Textureless Objects Using Keypoint-Based EKF", "author": "Allen Tao and Jun Yang and Stanko Oparnica and Wenjie Xue", "abstract": "Visual servoing is fundamental to robotic applications, enabling precise positioning and control. However, applying it to textureless objects remains a challenge due to the absence of reliable visual features. Moreover, adverse visual conditions, such as occlusions, often corrupt visual feedback, leading to reduced accuracy and instability in visual servoing. In this work, we build upon learning-based keypoint detection for textureless objects and propose a method that enhances robustness by tightly integrating perception and control in a closed loop. Specifically, we employ an Extended Kalman Filter (EKF) that integrates per-frame keypoint measurements to estimate 6D object pose, which drives pose-based visual servoing (PBVS) for control. The resulting camera motion, in turn, enhances the tracking of subsequent keypoints, effectively closing the perception-control loop. Additionally, unlike standard PBVS, we propose a probabilistic control law that computes both camera velocity and its associated uncertainty, enabling uncertainty-aware control for safe and reliable operation. We validate our approach on real-world robotic platforms using quantitative metrics and grasping experiments, demonstrating that our method outperforms traditional visual servoing techniques in both accuracy and practical application.", "link": "http://arxiv.org/abs/2602.06834v2", "date": "2026-02-25", "relevancy": 2.347, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5972}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5918}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5776}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perception-Control%20Coupled%20Visual%20Servoing%20for%20Textureless%20Objects%20Using%20Keypoint-Based%20EKF&body=Title%3A%20Perception-Control%20Coupled%20Visual%20Servoing%20for%20Textureless%20Objects%20Using%20Keypoint-Based%20EKF%0AAuthor%3A%20Allen%20Tao%20and%20Jun%20Yang%20and%20Stanko%20Oparnica%20and%20Wenjie%20Xue%0AAbstract%3A%20Visual%20servoing%20is%20fundamental%20to%20robotic%20applications%2C%20enabling%20precise%20positioning%20and%20control.%20However%2C%20applying%20it%20to%20textureless%20objects%20remains%20a%20challenge%20due%20to%20the%20absence%20of%20reliable%20visual%20features.%20Moreover%2C%20adverse%20visual%20conditions%2C%20such%20as%20occlusions%2C%20often%20corrupt%20visual%20feedback%2C%20leading%20to%20reduced%20accuracy%20and%20instability%20in%20visual%20servoing.%20In%20this%20work%2C%20we%20build%20upon%20learning-based%20keypoint%20detection%20for%20textureless%20objects%20and%20propose%20a%20method%20that%20enhances%20robustness%20by%20tightly%20integrating%20perception%20and%20control%20in%20a%20closed%20loop.%20Specifically%2C%20we%20employ%20an%20Extended%20Kalman%20Filter%20%28EKF%29%20that%20integrates%20per-frame%20keypoint%20measurements%20to%20estimate%206D%20object%20pose%2C%20which%20drives%20pose-based%20visual%20servoing%20%28PBVS%29%20for%20control.%20The%20resulting%20camera%20motion%2C%20in%20turn%2C%20enhances%20the%20tracking%20of%20subsequent%20keypoints%2C%20effectively%20closing%20the%20perception-control%20loop.%20Additionally%2C%20unlike%20standard%20PBVS%2C%20we%20propose%20a%20probabilistic%20control%20law%20that%20computes%20both%20camera%20velocity%20and%20its%20associated%20uncertainty%2C%20enabling%20uncertainty-aware%20control%20for%20safe%20and%20reliable%20operation.%20We%20validate%20our%20approach%20on%20real-world%20robotic%20platforms%20using%20quantitative%20metrics%20and%20grasping%20experiments%2C%20demonstrating%20that%20our%20method%20outperforms%20traditional%20visual%20servoing%20techniques%20in%20both%20accuracy%20and%20practical%20application.%0ALink%3A%20http%3A//arxiv.org/abs/2602.06834v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPerception-Control%2520Coupled%2520Visual%2520Servoing%2520for%2520Textureless%2520Objects%2520Using%2520Keypoint-Based%2520EKF%26entry.906535625%3DAllen%2520Tao%2520and%2520Jun%2520Yang%2520and%2520Stanko%2520Oparnica%2520and%2520Wenjie%2520Xue%26entry.1292438233%3DVisual%2520servoing%2520is%2520fundamental%2520to%2520robotic%2520applications%252C%2520enabling%2520precise%2520positioning%2520and%2520control.%2520However%252C%2520applying%2520it%2520to%2520textureless%2520objects%2520remains%2520a%2520challenge%2520due%2520to%2520the%2520absence%2520of%2520reliable%2520visual%2520features.%2520Moreover%252C%2520adverse%2520visual%2520conditions%252C%2520such%2520as%2520occlusions%252C%2520often%2520corrupt%2520visual%2520feedback%252C%2520leading%2520to%2520reduced%2520accuracy%2520and%2520instability%2520in%2520visual%2520servoing.%2520In%2520this%2520work%252C%2520we%2520build%2520upon%2520learning-based%2520keypoint%2520detection%2520for%2520textureless%2520objects%2520and%2520propose%2520a%2520method%2520that%2520enhances%2520robustness%2520by%2520tightly%2520integrating%2520perception%2520and%2520control%2520in%2520a%2520closed%2520loop.%2520Specifically%252C%2520we%2520employ%2520an%2520Extended%2520Kalman%2520Filter%2520%2528EKF%2529%2520that%2520integrates%2520per-frame%2520keypoint%2520measurements%2520to%2520estimate%25206D%2520object%2520pose%252C%2520which%2520drives%2520pose-based%2520visual%2520servoing%2520%2528PBVS%2529%2520for%2520control.%2520The%2520resulting%2520camera%2520motion%252C%2520in%2520turn%252C%2520enhances%2520the%2520tracking%2520of%2520subsequent%2520keypoints%252C%2520effectively%2520closing%2520the%2520perception-control%2520loop.%2520Additionally%252C%2520unlike%2520standard%2520PBVS%252C%2520we%2520propose%2520a%2520probabilistic%2520control%2520law%2520that%2520computes%2520both%2520camera%2520velocity%2520and%2520its%2520associated%2520uncertainty%252C%2520enabling%2520uncertainty-aware%2520control%2520for%2520safe%2520and%2520reliable%2520operation.%2520We%2520validate%2520our%2520approach%2520on%2520real-world%2520robotic%2520platforms%2520using%2520quantitative%2520metrics%2520and%2520grasping%2520experiments%252C%2520demonstrating%2520that%2520our%2520method%2520outperforms%2520traditional%2520visual%2520servoing%2520techniques%2520in%2520both%2520accuracy%2520and%2520practical%2520application.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.06834v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Perception-Control%20Coupled%20Visual%20Servoing%20for%20Textureless%20Objects%20Using%20Keypoint-Based%20EKF&entry.906535625=Allen%20Tao%20and%20Jun%20Yang%20and%20Stanko%20Oparnica%20and%20Wenjie%20Xue&entry.1292438233=Visual%20servoing%20is%20fundamental%20to%20robotic%20applications%2C%20enabling%20precise%20positioning%20and%20control.%20However%2C%20applying%20it%20to%20textureless%20objects%20remains%20a%20challenge%20due%20to%20the%20absence%20of%20reliable%20visual%20features.%20Moreover%2C%20adverse%20visual%20conditions%2C%20such%20as%20occlusions%2C%20often%20corrupt%20visual%20feedback%2C%20leading%20to%20reduced%20accuracy%20and%20instability%20in%20visual%20servoing.%20In%20this%20work%2C%20we%20build%20upon%20learning-based%20keypoint%20detection%20for%20textureless%20objects%20and%20propose%20a%20method%20that%20enhances%20robustness%20by%20tightly%20integrating%20perception%20and%20control%20in%20a%20closed {"title": "Enhancing Spatio-Temporal Forecasting with Spatial Neighbourhood Fusion:A Case Study on COVID-19 Mobility in Peru", "author": "Chuan Li and Jiang You and Hassine Moungla and Vincent Gauthier and Miguel Nunez-del-Prado and Hugo Alatrista-Salas", "abstract": "Accurate modeling of human mobility is critical for understanding epidemic spread and deploying timely interventions. In this work, we leverage a large-scale spatio-temporal dataset collected from Peru's national Digital Contact Tracing (DCT) application during the COVID-19 pandemic to forecast mobility flows across urban regions. A key challenge lies in the spatial sparsity of hourly mobility counts across hexagonal grid cells, which limits the predictive power of conventional time series models. To address this, we propose a lightweight and model-agnostic Spatial Neighbourhood Fusion (SPN) technique that augments each cell's features with aggregated signals from its immediate H3 neighbors. We evaluate this strategy on three forecasting backbones: NLinear, PatchTST, and K-U-Net, under various historical input lengths. Experimental results show that SPN consistently improves forecasting performance, achieving up to 9.85 percent reduction in test MSE. Our findings demonstrate that spatial smoothing of sparse mobility signals provides a simple yet effective path toward robust spatio-temporal forecasting during public health crises.", "link": "http://arxiv.org/abs/2507.00031v2", "date": "2026-02-25", "relevancy": 2.3352, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4992}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4552}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Spatio-Temporal%20Forecasting%20with%20Spatial%20Neighbourhood%20Fusion%3AA%20Case%20Study%20on%20COVID-19%20Mobility%20in%20Peru&body=Title%3A%20Enhancing%20Spatio-Temporal%20Forecasting%20with%20Spatial%20Neighbourhood%20Fusion%3AA%20Case%20Study%20on%20COVID-19%20Mobility%20in%20Peru%0AAuthor%3A%20Chuan%20Li%20and%20Jiang%20You%20and%20Hassine%20Moungla%20and%20Vincent%20Gauthier%20and%20Miguel%20Nunez-del-Prado%20and%20Hugo%20Alatrista-Salas%0AAbstract%3A%20Accurate%20modeling%20of%20human%20mobility%20is%20critical%20for%20understanding%20epidemic%20spread%20and%20deploying%20timely%20interventions.%20In%20this%20work%2C%20we%20leverage%20a%20large-scale%20spatio-temporal%20dataset%20collected%20from%20Peru%27s%20national%20Digital%20Contact%20Tracing%20%28DCT%29%20application%20during%20the%20COVID-19%20pandemic%20to%20forecast%20mobility%20flows%20across%20urban%20regions.%20A%20key%20challenge%20lies%20in%20the%20spatial%20sparsity%20of%20hourly%20mobility%20counts%20across%20hexagonal%20grid%20cells%2C%20which%20limits%20the%20predictive%20power%20of%20conventional%20time%20series%20models.%20To%20address%20this%2C%20we%20propose%20a%20lightweight%20and%20model-agnostic%20Spatial%20Neighbourhood%20Fusion%20%28SPN%29%20technique%20that%20augments%20each%20cell%27s%20features%20with%20aggregated%20signals%20from%20its%20immediate%20H3%20neighbors.%20We%20evaluate%20this%20strategy%20on%20three%20forecasting%20backbones%3A%20NLinear%2C%20PatchTST%2C%20and%20K-U-Net%2C%20under%20various%20historical%20input%20lengths.%20Experimental%20results%20show%20that%20SPN%20consistently%20improves%20forecasting%20performance%2C%20achieving%20up%20to%209.85%20percent%20reduction%20in%20test%20MSE.%20Our%20findings%20demonstrate%20that%20spatial%20smoothing%20of%20sparse%20mobility%20signals%20provides%20a%20simple%20yet%20effective%20path%20toward%20robust%20spatio-temporal%20forecasting%20during%20public%20health%20crises.%0ALink%3A%20http%3A//arxiv.org/abs/2507.00031v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Spatio-Temporal%2520Forecasting%2520with%2520Spatial%2520Neighbourhood%2520Fusion%253AA%2520Case%2520Study%2520on%2520COVID-19%2520Mobility%2520in%2520Peru%26entry.906535625%3DChuan%2520Li%2520and%2520Jiang%2520You%2520and%2520Hassine%2520Moungla%2520and%2520Vincent%2520Gauthier%2520and%2520Miguel%2520Nunez-del-Prado%2520and%2520Hugo%2520Alatrista-Salas%26entry.1292438233%3DAccurate%2520modeling%2520of%2520human%2520mobility%2520is%2520critical%2520for%2520understanding%2520epidemic%2520spread%2520and%2520deploying%2520timely%2520interventions.%2520In%2520this%2520work%252C%2520we%2520leverage%2520a%2520large-scale%2520spatio-temporal%2520dataset%2520collected%2520from%2520Peru%2527s%2520national%2520Digital%2520Contact%2520Tracing%2520%2528DCT%2529%2520application%2520during%2520the%2520COVID-19%2520pandemic%2520to%2520forecast%2520mobility%2520flows%2520across%2520urban%2520regions.%2520A%2520key%2520challenge%2520lies%2520in%2520the%2520spatial%2520sparsity%2520of%2520hourly%2520mobility%2520counts%2520across%2520hexagonal%2520grid%2520cells%252C%2520which%2520limits%2520the%2520predictive%2520power%2520of%2520conventional%2520time%2520series%2520models.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520lightweight%2520and%2520model-agnostic%2520Spatial%2520Neighbourhood%2520Fusion%2520%2528SPN%2529%2520technique%2520that%2520augments%2520each%2520cell%2527s%2520features%2520with%2520aggregated%2520signals%2520from%2520its%2520immediate%2520H3%2520neighbors.%2520We%2520evaluate%2520this%2520strategy%2520on%2520three%2520forecasting%2520backbones%253A%2520NLinear%252C%2520PatchTST%252C%2520and%2520K-U-Net%252C%2520under%2520various%2520historical%2520input%2520lengths.%2520Experimental%2520results%2520show%2520that%2520SPN%2520consistently%2520improv {"title": "DocDjinn: Controllable Synthetic Document Generation with VLMs and Handwriting Diffusion", "author": "Marcel Lamott and Saifullah Saifullah and Nauman Riaz and Yves-Noel Weweler and Tobias Alt-Veit and Ahmad Sarmad Ali and Muhammad Armaghan Shakir and Adrian Kalwa and Momina Moetesum and Andreas Dengel and Sheraz Ahmed and Faisal Shafait and Ulrich Schwanecke and Adrian Ulges", "abstract": "Effective document intelligence models rely on large amounts of annotated training data. However, procuring sufficient and high-quality data poses significant challenges due to the labor-intensive and costly nature of data acquisition. Additionally, leveraging language models to annotate real documents raises concerns about data privacy. Synthetic document generation has emerged as a promising, privacy-preserving alternative. We propose DocDjinn, a novel framework for controllable synthetic document generation using Vision-Language Models (VLMs) that produces annotated documents from unlabeled seed samples. Our approach generates visually plausible and semantically consistent synthetic documents that follow the distribution of an existing source dataset through clustering-based seed selection with parametrized sampling. By enriching documents with realistic diffusion-based handwriting and contextual visual elements via semantic-visual decoupling, we generate diverse, high-quality annotated synthetic documents. We evaluate across eleven benchmarks spanning key information extraction, question answering, document classification, and document layout analysis. To our knowledge, this is the first work demonstrating that VLMs can generate faithful annotated document datasets at scale from unlabeled seeds that can effectively enrich or approximate real, manually annotated data for diverse document understanding tasks. We show that with only 100 real training samples, our framework achieves on average $87\\%$ of the performance of the full real-world dataset. We publicly release our code and 140k+ synthetic document samples.", "link": "http://arxiv.org/abs/2602.21824v1", "date": "2026-02-25", "relevancy": 2.3342, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5997}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5822}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5467}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DocDjinn%3A%20Controllable%20Synthetic%20Document%20Generation%20with%20VLMs%20and%20Handwriting%20Diffusion&body=Title%3A%20DocDjinn%3A%20Controllable%20Synthetic%20Document%20Generation%20with%20VLMs%20and%20Handwriting%20Diffusion%0AAuthor%3A%20Marcel%20Lamott%20and%20Saifullah%20Saifullah%20and%20Nauman%20Riaz%20and%20Yves-Noel%20Weweler%20and%20Tobias%20Alt-Veit%20and%20Ahmad%20Sarmad%20Ali%20and%20Muhammad%20Armaghan%20Shakir%20and%20Adrian%20Kalwa%20and%20Momina%20Moetesum%20and%20Andreas%20Dengel%20and%20Sheraz%20Ahmed%20and%20Faisal%20Shafait%20and%20Ulrich%20Schwanecke%20and%20Adrian%20Ulges%0AAbstract%3A%20Effective%20document%20intelligence%20models%20rely%20on%20large%20amounts%20of%20annotated%20training%20data.%20However%2C%20procuring%20sufficient%20and%20high-quality%20data%20poses%20significant%20challenges%20due%20to%20the%20labor-intensive%20and%20costly%20nature%20of%20data%20acquisition.%20Additionally%2C%20leveraging%20language%20models%20to%20annotate%20real%20documents%20raises%20concerns%20about%20data%20privacy.%20Synthetic%20document%20generation%20has%20emerged%20as%20a%20promising%2C%20privacy-preserving%20alternative.%20We%20propose%20DocDjinn%2C%20a%20novel%20framework%20for%20controllable%20synthetic%20document%20generation%20using%20Vision-Language%20Models%20%28VLMs%29%20that%20produces%20annotated%20documents%20from%20unlabeled%20seed%20samples.%20Our%20approach%20generates%20visually%20plausible%20and%20semantically%20consistent%20synthetic%20documents%20that%20follow%20the%20distribution%20of%20an%20existing%20source%20dataset%20through%20clustering-based%20seed%20selection%20with%20parametrized%20sampling.%20By%20enriching%20documents%20with%20realistic%20diffusion-based%20handwriting%20and%20contextual%20visual%20elements%20via%20semantic-visual%20decoupling%2C%20we%20generate%20diverse%2C%20high-quality%20annotated%20synthetic%20documents.%20We%20evaluate%20across%20eleven%20benchmarks%20spanning%20key%20information%20extraction%2C%20question%20answering%2C%20document%20classification%2C%20and%20document%20layout%20analysis.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20work%20demonstrating%20that%20VLMs%20can%20generate%20faithful%20annotated%20document%20datasets%20at%20scale%20from%20unlabeled%20seeds%20that%20can%20effectively%20enrich%20or%20approximate%20real%2C%20manually%20annotated%20data%20for%20diverse%20document%20understanding%20tasks.%20We%20show%20that%20with%20only%20100%20real%20training%20samples%2C%20our%20framework%20achieves%20on%20average%20%2487%5C%25%24%20of%20the%20performance%20of%20the%20full%20real-world%20dataset.%20We%20publicly%20release%20our%20code%20and%20140k%2B%20synthetic%20document%20samples.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21824v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDocDjinn%253A%2520Controllable%2520Synthetic%2520Document%2520Generation%2520with%2520VLMs%2520and%2520Handwriting%2520Diffusion%26entry.906535625%3DMarcel%2520Lamott%2520and%2520Saifullah%2520Saifullah%2520and%2520Nauman%2520Riaz%2520and%2520Yves-Noel%2520Weweler%2520and%2520Tobias%2520Alt-Veit%2520and%2520Ahmad%2520Sarmad%2520Ali%2520and%2520Muhammad%2520Armaghan%2520Shakir%2520and%2520Adrian%2520Kalwa%2520and%2520 {"title": "Beyond Calibration: Confounding Pathology Limits Foundation Model Specificity in Abdominal Trauma CT", "author": "Jineel H Raythatha and Shuchang Ye and Jeremy Hsu and Jinman Kim", "abstract": "Purpose: Translating foundation models into clinical practice requires evaluating their performance under compound distribution shift, where severe class imbalance coexists with heterogeneous imaging appearances. This challenge is relevant for traumatic bowel injury, a rare but high-mortality diagnosis. We investigated whether specificity deficits in foundation models are associated with heterogeneity in the negative class. Methods: This retrospective study used the multi-institutional, RSNA Abdominal Traumatic Injury CT dataset (2019-2023), comprising scans from 23 centres. Two foundation models (MedCLIP, zero-shot; RadDINO, linear probe) were compared against three task-specific approaches (CNN, Transformer, Ensemble). Models were trained on 3,147 patients (2.3% bowel injury prevalence) and evaluated on an enriched 100-patient test set. To isolate negative-class effects, specificity was assessed in patients without bowel injury who had concurrent solid organ injury (n=58) versus no abdominal pathology (n=50). Results: Foundation models achieved equivalent discrimination to task-specific models (AUC, 0.64-0.68 versus 0.58-0.64) with higher sensitivity (79-91% vs 41-74%) but lower specificity (33-50% vs 50-88%). All models demonstrated high specificity in patients without abdominal pathology (84-100%). When solid organ injuries were present, specificity declined substantially for foundation models (50-51 percentage points) compared with smaller reductions of 12-41 percentage points for task-specific models. Conclusion: Foundation models matched task-specific discrimination without task-specific training, but their specificity deficits were driven primarily by confounding negative-class heterogeneity rather than prevalence alone. Susceptibility to negative-class heterogeneity decreased progressively with labelled training, suggesting adaptation is required before clinical implementation.", "link": "http://arxiv.org/abs/2602.10359v2", "date": "2026-02-25", "relevancy": 2.3341, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.479}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.479}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Calibration%3A%20Confounding%20Pathology%20Limits%20Foundation%20Model%20Specificity%20in%20Abdominal%20Trauma%20CT&body=Title%3A%20Beyond%20Calibration%3A%20Confounding%20Pathology%20Limits%20Foundation%20Model%20Specificity%20in%20Abdominal%20Trauma%20CT%0AAuthor%3A%20Jineel%20H%20Raythatha%20and%20Shuchang%20Ye%20and%20Jeremy%20Hsu%20and%20Jinman%20Kim%0AAbstract%3A%20Purpose%3A%20Translating%20foundation%20models%20into%20clinical%20practice%20requires%20evaluating%20their%20performance%20under%20compound%20distribution%20shift%2C%20where%20severe%20class%20imbalance%20coexists%20with%20heterogeneous%20imaging%20appearances.%20This%20challenge%20is%20relevant%20for%20traumatic%20bowel%20injury%2C%20a%20rare%20but%20high-mortality%20diagnosis.%20We%20investigated%20whether%20specificity%20deficits%20in%20foundation%20models%20are%20associated%20with%20heterogeneity%20in%20the%20negative%20class.%20Methods%3A%20This%20retrospective%20study%20used%20the%20multi-institutional%2C%20RSNA%20Abdominal%20Traumatic%20Injury%20CT%20dataset%20%282019-2023%29%2C%20comprising%20scans%20from%2023%20centres.%20Two%20foundation%20models%20%28MedCLIP%2C%20zero-shot%3B%20RadDINO%2C%20linear%20probe%29%20were%20compared%20against%20three%20task-specific%20approaches%20%28CNN%2C%20Transformer%2C%20Ensemble%29.%20Models%20were%20trained%20on%203%2C147%20patients%20%282.3%25%20bowel%20injury%20prevalence%29%20and%20evaluated%20on%20an%20enriched%20100-patient%20test%20set.%20To%20isolate%20negative-class%20effects%2C%20specificity%20was%20assessed%20in%20patients%20without%20bowel%20injury%20who%20had%20concurrent%20solid%20organ%20injury%20%28n%3D58%29%20versus%20no%20abdominal%20pathology%20%28n%3D50%29.%20Results%3A%20Foundation%20models%20achieved%20equivalent%20discrimination%20to%20task-specific%20models%20%28AUC%2C%200.64-0.68%20versus%200.58-0.64%29%20with%20higher%20sensitivity%20%2879-91%25%20vs%2041-74%25%29%20but%20lower%20specificity%20%2833-50%25%20vs%2050-88%25%29.%20All%20models%20demonstrated%20high%20specificity%20in%20patients%20without%20abdominal%20pathology%20%2884-100%25%29.%20When%20solid%20organ%20injuries%20were%20present%2C%20specificity%20declined%20substantially%20for%20foundation%20models%20%2850-51%20percentage%20points%29%20compared%20with%20smaller%20reductions%20of%2012-41%20percentage%20points%20for%20task-specific%20models.%20Conclusion%3A%20Foundation%20models%20matched%20task-specific%20discrimination%20without%20task-specific%20training%2C%20but%20their%20specificity%20deficits%20were%20driven%20primarily%20by%20confounding%20negative-class%20heterogeneity%20rather%20than%20prevalence%20alone.%20Susceptibility%20to%20negative-class%20heterogeneity%20decreased%20progressively%20with%20labelled%20training%2C%20suggesting%20adaptation%20is%20required%20before%20clinical%20implementation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.10359v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Calibration%253A%2520Confounding%2520Pathology%2520Limits%2520Foundation%2520Model%2520Specificity%2520in%2520Abdominal%2520Trauma%2520CT%26entry.906535625%3DJineel%2520H%2520Ray {"title": "CoLoGen: Progressive Learning of Concept`-`Localization Duality for Unified Image Generation", "author": "YuXin Song and Yu Lu and Haoyuan Sun and Huanjin Yao and Fanglong Liu and Yifan Sun and Haocheng Feng and Hang Zhou and Jingdong Wang", "abstract": "Unified conditional image generation remains difficult because different tasks depend on fundamentally different internal representations. Some require conceptual understanding for semantic synthesis, while others rely on localization cues for spatial precision. Forcing these heterogeneous tasks to share a single representation leads to concept`-`localization representational conflict. To address this issue, we propose CoLoGen, a unified diffusion framework that progressively learns and reconciles this concept`-`localization duality. CoLoGen uses a staged curriculum that first builds core conceptual and localization abilities, then adapts them to diverse visual conditions, and finally refines their synergy for complex instruction`-`driven tasks. Central to this process is the Progressive Representation Weaving (PRW) module, which dynamically routes features to specialized experts and stably integrates their outputs across stages. Experiments on editing, controllable generation, and customized generation show that CoLoGen achieves competitive or superior performance, offering a principled representational perspective for unified image generation.", "link": "http://arxiv.org/abs/2602.22150v1", "date": "2026-02-25", "relevancy": 2.3312, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6158}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5864}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.566}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoLoGen%3A%20Progressive%20Learning%20of%20Concept%60-%60Localization%20Duality%20for%20Unified%20Image%20Generation&body=Title%3A%20CoLoGen%3A%20Progressive%20Learning%20of%20Concept%60-%60Localization%20Duality%20for%20Unified%20Image%20Generation%0AAuthor%3A%20YuXin%20Song%20and%20Yu%20Lu%20and%20Haoyuan%20Sun%20and%20Huanjin%20Yao%20and%20Fanglong%20Liu%20and%20Yifan%20Sun%20and%20Haocheng%20Feng%20and%20Hang%20Zhou%20and%20Jingdong%20Wang%0AAbstract%3A%20Unified%20conditional%20image%20generation%20remains%20difficult%20because%20different%20tasks%20depend%20on%20fundamentally%20different%20internal%20representations.%20Some%20require%20conceptual%20understanding%20for%20semantic%20synthesis%2C%20while%20others%20rely%20on%20localization%20cues%20for%20spatial%20precision.%20Forcing%20these%20heterogeneous%20tasks%20to%20share%20a%20single%20representation%20leads%20to%20concept%60-%60localization%20representational%20conflict.%20To%20address%20this%20issue%2C%20we%20propose%20CoLoGen%2C%20a%20unified%20diffusion%20framework%20that%20progressively%20learns%20and%20reconciles%20this%20concept%60-%60localization%20duality.%20CoLoGen%20uses%20a%20staged%20curriculum%20that%20first%20builds%20core%20conceptual%20and%20localization%20abilities%2C%20then%20adapts%20them%20to%20diverse%20visual%20conditions%2C%20and%20finally%20refines%20their%20synergy%20for%20complex%20instruction%60-%60driven%20tasks.%20Central%20to%20this%20process%20is%20the%20Progressive%20Representation%20Weaving%20%28PRW%29%20module%2C%20which%20dynamically%20routes%20features%20to%20specialized%20experts%20and%20stably%20integrates%20their%20outputs%20across%20stages.%20Experiments%20on%20editing%2C%20controllable%20generation%2C%20and%20customized%20generation%20show%20that%20CoLoGen%20achieves%20competitive%20or%20superior%20performance%2C%20offering%20a%20principled%20representational%20perspec essive%20Representation%20Weaving%20%28PRW%29%20module%2C%20which%20dynamically%20routes%20features%20to%20specialized%20experts%20and%20stably%20integrates%20their%20outputs%20across%20stages.%20Experiments%20on%20editing%2C%20controllable%20generation%2C%20and%20customized%20generation%20show%20that%20CoLoGen%20achieves%20competitive%20or%20superior%20performance%2C%20offering%20a%20principled%20representational%20perspective%20for%20unified%20image%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2602.22150v1&entry.124074799=Read"},
{"title": "MindDriver: Introducing Progressive Multimodal Reasoning for Autonomous Driving", "author": "Lingjun Zhang and Yujian Yuan and Changjie Wu and Xinyuan Chang and Xin Cai and Shuang Zeng and Linzhe Shi and Sijin Wang and Hang Zhang and Mu Xu", "abstract": "Vision-Language Models (VLM) exhibit strong reasoning capabilities, showing promise for end-to-end autonomous driving systems. Chain-of-Thought (CoT), as VLM's widely used reasoning strategy, is facing critical challenges. Existing textual CoT has a large gap between text semantic space and trajectory physical space. Although the recent approach utilizes future image to replace text as CoT process, it lacks clear planning-oriented objective guidance to generate images with accurate scene evolution. To address these, we innovatively propose MindDriver, a progressive multimodal reasoning framework that enables VLM to imitate human-like progressive thinking for autonomous driving. MindDriver presents semantic understanding, semantic-to-physical space imagination, and physical-space trajectory planning. To achieve aligned reasoning processes in MindDriver, we develop a feedback-guided automatic data annotation pipeline to generate aligned multimodal reasoning training data. Furthermore, we develop a progressive reinforcement fine-tuning method to optimize the alignment through progressive high- level reward-based learning. MindDriver demonstrates superior performance in both nuScences open-loop and Bench2Drive closed-loop evaluation. Codes are available at https://github.com/hotdogcheesewhite/MindDriver.", "link": "http://arxiv.org/abs/2602.21952v1", "date": "2026-02-25", "relevancy": 2.3188, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.611}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/artic {"title": "XStreamVGGT: Extremely Memory-Efficient Streaming Vision Geometry Grounded Transformer with KV Cache Compression", "author": "Zunhai Su and Weihao Ye and Hansen Feng and Keyu Fan and Jing Zhang and Dahai Yu and Zhengwu Liu and Ngai Wong", "abstract": "Learning-based 3D visual geometry models have significantly advanced with the advent of large-scale transformers. Among these, StreamVGGT leverages frame-wise causal attention to deliver robust and efficient streaming 3D reconstruction. However, it suffers from unbounded growth in the Key-Value (KV) cache due to the massive influx of vision tokens from multi-image and long-video inputs, leading to increased memory consumption and inference latency as input frames accumulate. This ultimately limits its scalability for long-horizon applications. To address this gap, we propose XStreamVGGT, a tuning-free approach that seamlessly integrates pruning and quantization to systematically compress the KV cache, enabling extremely memory-efficient streaming inference. Specifically, redundant KVs generated from multi-frame inputs are initially pruned to conform to a fixed KV memory budget using an efficient token-importance identification mechanism that maintains full compatibility with high-performance attention kernels (e.g., FlashAttention). Additionally, leveraging the inherent distribution patterns of KV tensors, we apply dimension-adaptive KV quantization within the pruning pipeline to further minimize memory overhead while preserving numerical accuracy. Extensive evaluations show that XStreamVGGT achieves mostly negligible performance degradation while substantially reducing memory usage by 4.42$\\times$ and accelerating inference by 5.48$\\times$, enabling practical and scalable streaming 3D applications. The code is available at https://github.com/ywh187/XStreamVGGT/.", "link": "http://arxiv.org/abs/2602.21780v1", "date": "2026-02-25", "relevancy": 2.318, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5967}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5705}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5588}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20XStreamVGGT%3A%20Extremely%20Memory-Efficient%20Streaming%20Vision%20Geometry%20Grounded%20Transformer%20with%20KV%20Cache%20Compression&body=Title%3A%20XStreamVGGT%3A%20Extremely%20Memory-Efficient%20Streaming%20Vision%20Geometry%20Grounded%20Transformer%20with%20KV%20Cache%20Compression%0AAuthor%3A%20Zunhai%20Su%20and%20Weihao%20Ye%20and%20Hansen%20Feng%20and%20Keyu%20Fan%20and%20Jing%20Zhang%20and%20Dahai%20Yu%20and%20Zhengwu%20Liu%20and%20Ngai%20Wong%0AAbstract%3A%20Learning-based%203D%20visual%20geometry%20models%20have%20significantly%20advanced%20with%20the%20advent%20of%20large-scale%20transformers.%20Among%20these%2C%20StreamVGGT%20leverages%20frame-wise%20causal%20attention%20to%20deliver%20robust%20and%20efficient%20streaming%203D%20reconstruction.%20However%2C%20it%20suffers%20from%20unbounded%20growth%20in%20the%20Key-Value%20%28KV%29%20cache%20due%20to%20the%20massive%20influx%20of%20vision%20tokens%20from%20multi-image%20and%20long-video%20inputs%2C%20leading%20to%20increased%20memory%20consumption%20and%20inference%20latency%20as%20input%20frames%20accumulate.%20This%20ultimately%20limits%20its%20scalability%20for%20long-horizon%20applications.%20To%20address%20this%20gap%2C%20we%20propose%20XStreamVGGT%2C%20a%20tuning-free%20approach%20that%20seamlessly%20integrates%20pruning%20and%20quantization%20to%20systematically%20compress%20the%20KV%20cache%2C%20enabling%20extremely%20memory-efficient%20streaming%20inference.%20Specifically%2C%20redundant%20KVs%20generated%20from%20multi-frame%20inputs%20are%20initially%20pruned%20to%20conform%20to%20a%20fixed%20KV%20memory%20budget%20using%20an%20efficient%20token-importance%20identification%20mechanism%20that%20maintains%20full%20compatibility%20with%20high-performance%20attention%20kernels%20%28e.g.%2C%20FlashAttention%29.%20Additionally%2C%20leveraging%20the%20inherent%20distribution%20patterns%20of%20KV%20tensors%2C%20we%20apply%20dimension-adaptive%20KV%20quantization%20within%20the%20pruning%20pipeline%20to%20further%20minimize%20memory%20overhead%20while%20preserving%20numerical%20accuracy.%20Extensive%20evaluations%20show%20that%20XStreamVGGT%20achieves%20mostly%20negligible%20performance%20degradation%20while%20substantially%20reducing%20memory%20usage%20by%204.42%24%5Ctimes%24%20and%20accelerating%20inference%20by%205.48%24%5Ctimes%24%2C%20enabling%20practical%20and%20scalable%20streaming%203D%20applications.%20The%20code%20is%20available%20at%20https%3A//github.com/ywh187/XStreamVGGT/.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21780v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXStreamVGGT%253A%2520Extremely%2520Memory-Efficient%2520Streaming%2520Vision%2520Geometry%2520Grounded%2520Transformer%2520with%2520KV%2520Cache%2520Compression%26entry.906535625%3DZunhai%2520Su%2520and%2520Weihao%2520Ye%2520and%2520Hansen%2520Feng%2520and%2520Keyu%2520Fan%2520and%2520Jing%2520Zhang%2520and%2520Dahai%2520Yu%2520and%2520Zhengwu%2520Liu%2520and%2520Ngai%2520Wong%26entry.1292438233%3DLearning-based%25203D%2520visual%2520geometry%2520models%2520have%2520significantly%2520advanced%2520with%2520the%2520advent%2520of%2520large-scale%2520transformers.%2520Among%2520these%252C%2520StreamVGGT%2520leverages%2520frame-wise%2520causal%2520attention%2520to%2520deliver%2520robust%2520and%2520efficient%2520streaming%25203D%2520reconstruction.%2520However%252C%2520it%2520suffers%2520from%2520unbounded%2520growt {"title": "Discrete Optimal Transport and Voice Conversion", "author": "Anton Selitskiy and Maitreya Kocharekar", "abstract": "We propose kDOT, a discrete optimal transport (OT) framework for voice conversion (VC) operating in a pretrained speech embedding space. In contrast to the averaging strategies used in kNN-VC and SinkVC, and the independence assumption adopted in MKL, our method employs the barycentric projection of the discrete OT plan to construct a transport map between source and target speaker embedding distributions.\n  We conduct a comprehensive ablation study over the number of transported embeddings and systematically analyze the impact of source and target utterance duration. Experiments on LibriSpeech demonstrate that OT with barycentric projection consistently improves distribution alignment and often outperforms averaging-based approaches in terms of WER, MOS, and FAD.\n  Furthermore, we show that applying discrete OT as a post-processing step can transform spoofed speech into samples that are misclassified as bona fide by a state-of-the-art spoofing detector. This demonstrates the strong domain adaptation capability of OT in embedding space, while also revealing important security implications for spoof detection systems.", "link": "http://arxiv.org/abs/2505.04382v4", "date": "2026-02-25", "relevancy": 2.3077, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4636}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4619}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4591}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Discrete%20Optimal%20Transport%20and%20Voice%20Conversion&body=Title%3A%20Discrete%20Optimal%20Transport%20and%20Voice%20Conversion%0AAuthor%3A%20Anton%20Selitskiy%20and%20Maitreya%20Kocharekar%0AAbstract%3A%20We%20propose%20kDOT%2C%20a%20discrete%20optimal%20transport%20%28OT%29%20framework%20for%20voice%20conversion%20%28VC%29%20operating%20in%20a%20pretrained%20speech%20embedding%20space.%20In%20contrast%20to%20the%20averaging%20strategies%20used%20in%20kNN-VC%20and%20SinkVC%2C%20and%20the%20independence%20assumption%20adopted%20in%20MKL%2C%20our%20method%20employs%20the%20barycentric%20projection%20of%20the%20discrete%20OT%20plan%20to%20construct%20a%20transport%20map%20between%20source%20and%20target%20speaker%20embedding%20distributions.%0A%20%20We%20conduct%20a%20comprehensive%20ablation%20study%20over%20the%20number%20of%20transported%20embeddings%20and%20systematically%20analyze%20the%20impact%20of%20source%20and%20target%20utterance%20duration.%20Experiments%20on%20LibriSpeech%20demonstrate%20that%20OT%20with%20barycentric%20projection%20consistently%20improves%20distribution%20alignment%20and%20often%20outperforms%20averaging-based%20approaches%20in%20terms%20of%20WER%2C%20MOS%2C%20and%20FAD.%0A%20%20Furthermore%2C%20we%20show%20that%20applying%20discrete%20OT%20as%20a%20post-processing%20step%20can%20transform%20spoofed%20speech%20into%20samples%20that%20are%20misclassified%20as%20bona%20fide%20by%20a%20state-of-the-art%20spoofing%20detector.%20This%20demonstrates%20the%20strong%20domain%20adaptation%20capability%20of%20OT%20in%20embedding%20space%2C%20while%20also%20revealing%20important%20security%20implications%20for%20spoof%20detection%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2505.04382v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiscrete%2520Optimal%2520Transport%2520and%2520Voice%2520Conversion%26entry.906535625%3DAnton%2520Selitskiy%2520and%2520Maitreya%2520Kocharekar%26entry.1292438233%3DWe%2520propose%2520kDOT%252C%2520a%2520discrete%2520optimal%252 {"title": "Rethinking Evaluation in the Era of Time Series Foundation Models: (Un)known Information Leakage Challenges", "author": "Marcel Meyer and Sascha Kaltenpoth and Kevin Zalipski and Oliver M\u00fcller", "abstract": "Time Series Foundation Models (TSFMs) represent a new paradigm for time-series forecasting, promising zero-shot predictions without the need for task-specific training or fine-tuning. However, similar to Large Language Models (LLMs), the evaluation of TSFMs is challenging: as training corpora grow increasingly large, it becomes difficult to ensure the integrity of the test sets used for benchmarking. An investigation of existing TSFM evaluation studies identifies two kinds of information leakage: (1) train-test sample overlaps arising from the multi-purpose reuse of datasets and (2) temporal overlap of correlated train and test series. Ignoring these forms of information leakage when benchmarking TSFMs risks producing overly optimistic performance estimates that fail to generalize to real-world settings. We therefore argue for the development of novel evaluation methodologies that avoid pitfalls already observed in both LLM and classical time-series benchmarking, and we call on the research community to adopt principled approaches to safeguard the integrity of TSFM evaluation.", "link": "http://arxiv.org/abs/2510.13654v3", "date": "2026-02-25", "relevancy": 2.2966, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.469}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4545}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rethinking%20Evaluation%20in%20the%20Era%20of%20Time%20Series%20Foundation%20Models%3A%20%28Un%29known%20Information%20Leakage%20Challenges&body=Title%3A%20Rethinking%20Evaluation%20in%20the%20Era%20of%20Time%20Series%20Foundation%20Models%3A%20%28Un%29known%20Information%20Leakage%20Challenges%0AAuthor%3A%20Marcel%20Meyer%20and%20Sascha%20Kaltenpoth%20and%20Kevin%20Zalipski%20and%20Oliver%20M%C3%BCller%0AAbstract%3A%20Time%20Series%20Foundation%20Models%20%28TSFMs%29%20represent%20a%20new%20paradigm%20for%20time-series%20forecasting%2C%20promising%20zero-shot%20predictions%20without%20the%20need%20for%20task-specific%20training%20or%20fine-tuning.%20However%2C%20similar%20to%20Large%20Language%20Models%20%28LLMs%29%2C%20the%20evaluation%20of%20TSFMs%20is%20challenging%3A%20as%20training%20corpora%20grow%20increasingly%20large%2C%20it%20becomes%20difficult%20to%20ensure%20the%20integrity%20of%20the%20test%20sets%20used%20for%20benchmarking.%20An%20investigation%20of%20existing%20TSFM%20evaluation%20studies%20identifies%20two%20kinds%20of%20information%20leakage%3A%20%281%29%20train-test%20sample%20overlaps%20arising%20from%20the%20multi-purpose%20reuse%20of%20datasets%20and%20%282%29%20temporal%20overlap%20of%20correlated%20train%20and%20test%20series.%20Ignoring%20these%20forms%20of%20information%20leakage%20when%20benchmarking%20TSFMs%20risks%20producing%20overly%20optimistic%20performance%20estimates%20that%20fail%20to%20generalize%20to%20real-world%20settings.%20We%20therefore%20argue%20for%20the%20development%20of%20novel%20evaluation%20methodologies%20that%20avoid%20pitfalls%20already%20observed%20in%20both%20LLM%20and%20classical%20time-series%20benchmarking%2C%20and%20we%20call%20on%20the%20research%20community%20to%20adopt%20principled%20approaches%20to%20safeguard%20the%20integrity%20of%20TSFM%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2510.13654v3%0AForm%3A%20h ies%2520benchmarking%252C%2520and%2520we%2520call%2520on%2520the%2520research%2520community%2520to%2520adopt%2520principled%2520approaches%2520to%2520safeguard%2520the%2520integrity%2520of%2520TSFM%2520evaluation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.13654v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Rethinking%20Evaluation%20in%20the%20Era%20of%20Time%20Series%20Foundation%20Models%3A%20%28Un%29known%20Information%20Leakage%20Challenges&entry.906535625=Marcel%20Meyer%20and%20Sascha%20Kaltenpoth%20and%20Kevin%20Zalipski%20and%20Oliver%20M%C3%BCller&entry.1292438233=Time%20Series%20Foundation%20Models%20%28TSFMs%29%20represent%20a%20new%20paradigm%20for%20time-series%20forecasting%2C%20promising%20zero-shot%20predictions%20without%20the%20need%20for%20task-specific%20training%20or%20fine-tuning.%20However%2C%20similar%20to%20Large%20Language%20Models%20%28LLMs%29%2C%20the%20evaluation%20of%20TSFMs%20is%20challenging%3A%20as%20training%20corpora%20grow%20increasingly%20large%2C%20it%20becomes%20difficult%20to%20ensure%20the%20integrity%20of%20the%20test%20sets%20used%20for%20benchmarking.%20An%20investigation%20of%20existing%20TSFM%20evaluation%20studies%20identifies%20two%20kinds%20of%20information%20leakage%3A%20%281%29%20train-test%20sample%20overlaps%20arising%20from%20the%20multi-purpose%20reuse%20of%20datasets%20and%20%282%29%20temporal%20overlap%20of%20correlated%20train%20and%20test%20series.%20Ignoring%20these%20forms%20of%20information%20leakage%20when%20benchmarking%20TSFMs%20risks%20producing%20overly%20optimistic%20performance%20estimates%20that%20fail%20to%20generalize%20to%20real-world%20settings.%20We%20therefore%20argue%20for%20the%20development%20of%20novel%20evaluation%20methodologies%20that%20avoid%20pitfalls%20already%20observed%20in%20both%20LLM%20and%20classical%20time-series%20benchmarking%2C%20and%20we%20call%20on%20the%20research%20community%20to%20adopt%20principled%20approaches%20to%20safeguard%20the%20integrity%20of%20TSFM%20evaluation.&entry.1838667208=http%3A//arxiv.org/abs/2510.13654v3&entry.124074799=Read"},
{"title": "LiREC-Net: A Target-Free and Learning-Based Network for LiDAR, RGB, and Event Calibration", "author": "Aditya Ranjan Dash and Ramy Battrawy and Ren\u00e9 Schuster and Didier Stricker", "abstract": "Advanced autonomous systems rely on multi-sensor fusion for safer and more robust perception. To enable effective fusion, calibrating directly from natural driving scenes (i.e., target-free) with high accuracy is crucial for precise multi-sensor alignment. Existing learning-based calibration methods are typically designed for only a single pair of sensor modalities (i.e., a bi-modal setup). Unlike these methods, we propose LiREC-Net, a target-free, learning-based calibration network that jointly calibrates multiple sensor modality pairs, including LiDAR, RGB, and event data, within a unified framework. To reduce redundant computation and improve efficiency, we introduce a shared LiDAR representation that leverages features from both its 3D nature and projected depth map, ensuring better consistency across modalities. Trained and evaluated on established datasets, such as KITTI and DSEC, our LiREC-Net achieves competitive performance to bi-modal models and sets a new strong baseline for the tri-modal use case.", "link": "http://arxiv.org/abs/2602.21754v1", "date": "2026-02-25", "relevancy": 2.2962, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.607}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.552}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5499}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LiREC-Net%3A%20A%20Target-Free%20and%20Learning-Based%20Network%20for%20LiDAR%2C%20RGB%2C%20and%20Event%20Calibration&body=Title%3A%20LiREC-Net%3A%20A%20Target-Free%20and%20Learning-Based%20Network%20for%20LiDAR%2C%20RGB%2C%20and%20Event%20Calibration%0AAuthor%3A%20Aditya%20Ranjan%20Dash%20and%20Ramy%20Battrawy%20and%20Ren%C3%A9%20Schuster%20and%20Didier%20Stricker%0AAbstract%3A%20Advanced%20autonomous%20systems%20rely%20on%20multi-sensor%20fusion%20for%20safer%20and%20more%20robust%20perception.%20To%20enable%20effective%20fusion%2C%20calibrating%20directly%20from%20natural%20driving%20scenes%20%28i.e.%2C%20target-free%29%20with%20high%20accuracy%20is%20crucial%20for%20precise%20multi-sensor%20alignment.%20Existing%20learning-based%20calibration%20methods%20are%20typically%20designed%20for%20only%20a%20single%20pair%20of%20sensor%20modalities%20%28i.e.%2C%20a%20bi-modal%20setup%29.%20Unlike%20these%20methods%2C%20we%20propose%20LiREC-Net%2C%20a%20target-free%2C%20learning-based%20calibration%20network%20that%20jointly%20calibrates%20multiple%20sensor%20modality%20pairs%2C%20including%20LiDAR%2C%20RGB%2C%20and%20event%20data%2C%20within%20a%20unified%20framework.%20To%20reduce%20redundant%20computation%20and%20improve%20efficiency%2C%20we%20introduce%20a%20shared%20LiDAR%20representation%20that%20leverages%20features%20from%20both%20its%203D%20nature%20and%20projected%20depth%20map%2C%20ensuring%20better%20consistency%20across%20modalities.%20Trained%20and%20evaluated%20on%20established%20datasets%2C%20such%20as%20KITTI%20and%20DSEC%2C%20our%20LiREC-Net%20achieves%20competitive%20performance%20to%20bi-modal%20models%20and%20sets%20a%20new%20strong%20baseline%20for%20the%20tri-modal%20use%20case.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21754v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLiREC-Net%253A%2520A%2520Target-Free%2520and%2520Learning-Based%2520Network%2520for%2520LiDAR%252C%2520RGB%252C%2520and%2520Event%2520Calibration%26en {"title": "SkyReels-V4: Multi-modal Video-Audio Generation, Inpainting and Editing model", "author": "Guibin Chen and Dixuan Lin and Jiangping Yang and Youqiang Zhang and Zhengcong Fei and Debang Li and Sheng Chen and Chaofeng Ao and Nuo Pang and Yiming Wang and Yikun Dou and Zheng Chen and Mingyuan Fan and Tuanhui Li and Mingshan Chang and Hao Zhang and Xiaopeng Sun and Jingtao Xu and Yuqiang Xie and Jiahua Wang and Zhiheng Xu and Weiming Xiong and Yuzhe Jin and Baoxuan Gu and Binjie Mao and Yunjie Yu and Jujie He and Yuhao Feng and Shiwen Tu and Chaojie Wang and Rui Yan and Wei Shen and Jingchen Wu and Peng Zhao and Xuanyue Zhong and Zhuangzhuang Liu and Kaifei Wang and Fuxiang Zhang and Weikai Xu and Wenyan Liu and Binglu Zhang and Yu Shen and Tianhui Xiong and Bin Peng and Liang Zeng and Xuchen Song and Haoxiang Guo and Peiyu Wang and Yahui Zhou", "abstract": "SkyReels V4 is a unified multi modal video foundation model for joint video audio generation, inpainting, and editing. The model adopts a dual stream Multimodal Diffusion Transformer (MMDiT) architecture, where one branch synthesizes video and the other generates temporally aligned audio, while sharing a powerful text encoder based on the Multimodal Large Language Models (MMLM). SkyReels V4 accepts rich multi modal instructions, including text, images, video clips, masks, and audio references. By combining the MMLMs multi modal instruction following capability with in context learning in the video branch MMDiT, the model can inject fine grained visual guidance under complex conditioning, while the audio branch MMDiT simultaneously leverages audio references to guide sound generation. On the video side, we adopt a channel concatenation formulation that unifies a wide range of inpainting style tasks, such as image to video, video extension, and video editing under a single interface, and naturally extends to vision referenced inpainting and editing via multi modal prompts. SkyReels V4 supports up to 1080p resolution, 32 FPS, and 15 second duration, enabling high fidelity, multi shot, cinema level video generation with synchronized audio. To make such high resolution, long-duration generation computationally feasible, we introduce an efficiency strategy: Joint generation of low resolution full sequences and high-resolution keyframes, followed by dedicated super-resolution and frame interpolation models. To our knowledge, SkyReels V4 is the first video foundation model that simultaneously supports multi-modal input, joint video audio generation, and a unified treatment of generation, inpainting, and editing, while maintaining strong efficiency and quality at cinematic resolutions and durations.", "link": "http://arxiv.org/abs/2602.21818v1", "date": "2026-02-25", "relevancy": 2.2846, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5881}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5855}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.55}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SkyReels-V4%3A%20Multi-modal%20Video-Audio%20Generation%2C%20Inpainting%20and%20Editing%20model&body=Title%3A%20SkyReels-V4%3A%20Multi-modal%20Video-Audio%20Generation%2C%20Inpainting%20and%20Editing%20model%0AAuthor%3A%20Guibin%20Chen%20and%20Dixuan%20Lin%20and%20Jiangping%20Yang%20and%20Youqiang%20Zhang%20and%20Zhengcong%20Fei%20and%20Debang%20Li%20and%20Sheng%20Chen%20and%20Chaofeng%20Ao%20and%20Nuo%20Pang%20and%20Yiming%20Wang%20and%20Yikun%20Dou%20and%20Zheng%20Chen%20and%20Mingyuan%20Fan%20and%20Tuanhui%20Li%20and%20Mingshan%20Chang%20and%20Hao%20Zhang%20and%20Xiaopeng%20Sun%20and%20Jingtao%20Xu%20and%20Yuqiang%20Xie%20and%20Jiahua%20Wang%20and%20Zhiheng%20Xu%20and%20Weiming%20Xiong%20and%20Yuzhe%20Jin%20and%20Baoxuan%20Gu%20and%20Binjie%20Mao%20and%20Yunjie%20Yu%20and%20Jujie%20He%20and%20Yuhao%20Feng%20and%20Shiwen%20Tu%20and%20Chaojie%20Wang%20and%20Rui%20Yan%20and%20Wei%20Shen%20and%20Jingchen%20Wu%20and%20Peng%20Zhao%20and%20Xuanyue%20Zhong%20and%20Zhuangzhuang%20Liu%20and%20Kaifei%20Wang%20and%20Fuxiang%20Zhang%20and%20Weikai%20Xu%20and%20Wenyan%20Liu%20and%20Binglu%20Zhang%20and%20Yu%20Shen%20and%20Tianhui%20Xiong%20and%20Bin%20Peng%20and%20Liang%20Zeng%20and%20Xuchen%20Song%20and%20Haoxiang%20Guo%20and%20Peiyu%20Wang%20and%20Yahui%20Zhou%0AAbstract%3A%20SkyReels%20V4%20is%20a%20unified%20multi%20modal%20video%20foundation%20model%20for%20joint%20video%20audio%20generation%2C%20inpainting%2C%20and%20editing.%20The%20model%20adopts%20a%20dual%20stream%20Multimodal%20Diffusion%20Transformer%20%28MMDiT%29%20architecture%2C%20where%20one%20branch%20synthesizes%20video%20and%20the%20other%20generates%20temporally%20aligned%20audio%2C%20while%20sharing%20a%20powerful%20text%20encoder%20based%20on%20the%20Multimodal%20Large%20Language%20Models%20%28MMLM%29.%20SkyReels%20V4%20accepts%20rich%20multi%20modal%20instructions%2C%20including%20text%2C%20images%2C%20video%20clips%2C%20masks%2C%20and%20audio%20references.%20By%20combining%20the%20MMLMs%20multi%20modal%20instruction%20following%20capability%20with%20in%20context%20learning%20in%20the%20video%20branch%20MMDiT%2C%20the%20model%20can%20inject%20fine%20grained%20visual%20guidance%20under%20complex%20conditioning%2C%20while%20the%20audio%20branch%20MMDiT%20simultaneously%20leverages%20audio%20references%20to%20guide%20sound%20generation.%20On%20the%20video%20side%2C%20we%20adopt%20a%20channel%20concatenation%20formulation%20that%20unifies%20a%20wide%20range%20of%20inpainting%20style%20tasks%2C%20such%20as%20image%20to%20video%2C%20video%20extension%2C%20and%20video%20editing%20under%20a%20single%20interface%2C%20and%20naturally%20extends%20to%20vision%20referenced%20inpainting%20and%20editing%20via%20multi%20modal%20prompts.%20SkyReels%20V4%20supports%20up%20to%201080p%20resolution%2C%2032%20FPS%2C%20and%2015%20second%20duration%2C%20enabling%20high%20fidelity%2C%20multi%20shot%2C%20cinema%20level%20video%20generation%20with%20synchronized%20audio.%20To%20make%20such%20high%20resolution%2C%20long-duration%20generation%20computationally%20feasible%2C%20we%20introduce%20an%20efficiency%20strategy%3A%20Joint%20generation%20of%20low%20resolution%20full%20sequences%20and%20high-resolution%20keyframes%2C%20followed%20by%20dedicated%20super-resolution%20and%20frame%20interpolation%20models.%20To%20our%20knowledge%2C%20SkyReels%20V4%20is%20the%20first%20video%20foundation%20model%20that%20simultaneously%20supports%20multi-modal%20input%2C%20joint%20video%20audio%20generation%2C%20and%20a%20unified%20treatment%20of%20generation%2C%20inpainting%2C%20and%20editing%2C%20while%20maintaining%20strong%20efficiency%20and%20quality%20at%20cinematic%20resolutions%20and%20durations.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21818v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSkyReels-V4%253A%2520Multi-modal%2520Video-Audio%2520Generation%252C%2520Inpainting%2520and%2520Editing%2520model%26entry.906535625%3DGuibin%2520Chen%2520and%2520Dixuan%2520Lin%2520and%2520Jiangping%2520Yang%2520and%2520Youqiang%2520Zhang%2520and%2520Zhengcong%2520Fei%2520and%2520Debang%2520Li%2520and%2520Sheng%2520Chen%2520and%2520Chaofeng%2520Ao%2520and%2520Nuo%2520Pang%2520and%2520Yiming%2520Wang%2520and%2520Yikun%2520Dou%2520and%2520Zheng%2520Chen%2520and%2520Mingyuan%2520Fan%2520and%2520Tuanhui%2520Li%2520and%2520Mingshan%2520Chang%2520and%2520Hao%2520Zhang%2520and%2520Xiaopeng%2520Sun%2520and%2520Jingtao%2520Xu%2520and%2520Yuqiang%2520Xie%2520and%2520Jiahua%2520Wang%2520and%2520Zhiheng%2520Xu%2520and%2520Weiming%2520Xiong%2520and%2520Yuzhe%2520Jin%2520and%2520Baoxuan%2520Gu%2520and% {"title": "Global-Local Dual Perception for MLLMs in High-Resolution Text-Rich Image Translation", "author": "Junxin Lu and Tengfei Song and Zhanglin Wu and Pengfei Li and Xiaowei Liang and Hui Yang and Kun Chen and Ning Xie and Yunfei Lu and Jing Zhao and Shiliang Sun and Daimeng Wei", "abstract": "Text Image Machine Translation (TIMT) aims to translate text embedded in images in the source-language into target-language, requiring synergistic integration of visual perception and linguistic understanding. Existing TIMT methods, whether cascaded pipelines or end-to-end multimodal large language models (MLLMs),struggle with high-resolution text-rich images due to cluttered layouts, diverse fonts, and non-textual distractions, resulting in text omission, semantic drift, and contextual inconsistency. To address these challenges, we propose GLoTran, a global-local dual visual perception framework for MLLM-based TIMT. GLoTran integrates a low-resolution global image with multi-scale region-level text image slices under an instruction-guided alignment strategy, conditioning MLLMs to maintain scene-level contextual consistency while faithfully capturing fine-grained textual details. Moreover, to realize this dual-perception paradigm, we construct GLoD, a large-scale text-rich TIMT dataset comprising 510K high-resolution global-local image-text pairs covering diverse real-world scenarios. Extensive experiments demonstrate that GLoTran substantially improves translation completeness and accuracy over state-of-the-art MLLMs, offering a new paradigm for fine-grained TIMT under high-resolution and text-rich conditions.", "link": "http://arxiv.org/abs/2602.21956v1", "date": "2026-02-25", "relevancy": 2.2836, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6028}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "li {"title": "RT-RMOT: A Dataset and Framework for RGB-Thermal Referring Multi-Object Tracking", "author": "Yanqiu Yu and Zhifan Jin and Sijia Chen and Tongfei Chu and En Yu and Liman Liu and Wenbing Tao", "abstract": "Referring Multi-Object Tracking has attracted increasing attention due to its human-friendly interactive characteristics, yet it exhibits limitations in low-visibility conditions, such as nighttime, smoke, and other challenging scenarios. To overcome this limitation, we propose a new RGB-Thermal RMOT task, named RT-RMOT, which aims to fuse RGB appearance features with the illumination robustness of the thermal modality to enable all-day referring multi-object tracking. To promote research on RT-RMOT, we construct the first Referring Multi-Object Tracking dataset under RGB-Thermal modality, named RefRT. It contains 388 language descriptions, 1,250 tracked targets, and 166,147 Language-RGB-Thermal (L-RGB-T) triplets. Furthermore, we propose RTrack, a framework built upon a multimodal large language model (MLLM) that integrates RGB, thermal, and textual features. Since the initial framework still leaves room for improvement, we introduce a Group Sequence Policy Optimization (GSPO) strategy to further exploit the model's potential. To alleviate training instability during RL fine-tuning, we introduce a Clipped Advantage Scaling (CAS) strategy to suppress gradient explosion. In addition, we design Structured Output Reward and Comprehensive Detection Reward to balance exploration and exploitation, thereby improving the completeness and accuracy of target perception. Extensive experiments on the RefRT dataset demonstrate the effectiveness of the proposed RTrack framework.", "link": "http://arxiv.org/abs/2602.22033v1", "date": "2026-02-25", "relevancy": 2.2788, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5501}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5431}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RT-RMOT%3A%20A%20Dataset%20and%20Framework%20for%20RGB-Thermal%20Referring%20Multi-Object%20Tracking&body=Title%3A%20RT-RMOT%3A%20A%20Dataset%20and%20Framework%20for%20RGB-Thermal%20Referring%20Multi-Object%20Tracking%0AAuthor%3A%20Yanqiu%20Yu%20and%20Zhifan%20Jin%20and%20Sijia%20Chen%20and%20Tongfei%20Chu%20and%20En%20Yu%20and%20Liman%20Liu%20and%20Wenbing%20Tao%0AAbstract%3A%20Referring%20Multi-Object%20Tracking%20has%20attracted%20increasing%20attention%20due%20to%20its%20human-friendly%20interactive%20characteristics%2C%20yet%20it%20exhibits%20limitations%20in%20low-visibility%20conditions%2C%20such%20as%20nighttime%2C%20smoke%2C%20and%20other%20challenging%20scenarios.%20To%20overcome%20this%20limitation%2C%20we%20propose%20a%20new%20RGB-Thermal%20RMOT%20task%2C%20named%20RT-RMOT%2C%20which%20aims%20to%20fuse%20RGB%20appearance%20features%20with%20the%20illumination%20robustness%20of%20the%20thermal%20modality%20to%20enable%20all-day%20referring%20multi-object%20tracking.%20To%20promote%20research%20on%20RT-RMOT%2C%20we%20construct%20the%20first%20Referring%20Multi-Object%20Tracking%20dataset%20under%20RGB-Thermal%20modality%2C%20named%20RefRT.%20It%20contains%20388%20language%20descriptions%2C%201%2C250%20tracked%20targets%2C%20and%20166%2C147%20Language-RGB-Thermal%20%28L-RGB-T%29%20triplets.%20Furthermore%2C%20we%20propose%20RTrack%2C%20a%20framework%20built%20upon%20a%20multimodal%20large%20language%20model%20%28MLLM%29%20that%20integrates%20RGB%2C%20thermal%2C%20and%20textual%20features.%20Since%20the%20initial%20framework%20still%20leaves%20room%20for%20improvement%2C%20we%20introduce%20a%20Group%20Sequ {"title": "Learning to Drive is a Free Gift: Large-Scale Label-Free Autonomy Pretraining from Unposed In-The-Wild Videos", "author": "Matthew Strong and Wei-Jer Chang and Quentin Herau and Jiezhi Yang and Yihan Hu and Chensheng Peng and Wei Zhan", "abstract": "Ego-centric driving videos available online provide an abundant source of visual data for autonomous driving, yet their lack of annotations makes it difficult to learn representations that capture both semantic structure and 3D geometry. Recent advances in large feedforward spatial models demonstrate that point maps and ego-motion can be inferred in a single forward pass, suggesting a promising direction for scalable driving perception. We therefore propose a label-free, teacher-guided framework for learning autonomous driving representations directly from unposed videos. Unlike prior self-supervised approaches that focus primarily on frame-to-frame consistency, we posit that safe and reactive driving depends critically on temporal context. To this end, we leverage a feedforward architecture equipped with a lightweight autoregressive module, trained using multi-modal supervisory signals that guide the model to jointly predict current and future point maps, camera poses, semantic segmentation, and motion masks. Multi-modal teachers provide sequence-level pseudo-supervision, enabling LFG to learn a unified pseudo-4D representation from raw YouTube videos without poses, labels, or LiDAR. The resulting encoder not only transfers effectively to downstream autonomous driving planning on the NAVSIM benchmark, surpassing multi-camera and LiDAR baselines with only a single monocular camera, but also yields strong performance when evaluated on a range of semantic, geometric, and qualitative motion prediction tasks. These geometry and motion-aware features position LFG as a compelling video-centric foundation model for autonomous driving.", "link": "http://arxiv.org/abs/2602.22091v1", "date": "2026-02-25", "relevancy": 2.2768, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5751}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5663}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5617}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Drive%20is%20a%20Free%20Gift%3A%20Large-Scale%20Label-Free%20Autonomy%20Pretraining%20from%20Unposed%20In-The-Wild%20Videos&body=Title%3A%20Learning%20to%20Drive%20is%20a%20Free%20Gift%3A%20Large-Scale%20Label-Free%20Autonomy%20Pretraining%20from%20Unposed%20In-The-Wild%20Videos%0AAuthor%3A%20Matthew%20Strong%20and%20Wei-Jer%20Chang%20and%20Quentin%20Herau%20and%20Jiezhi%20Yang%20and%20Yihan%20Hu%20and%20Chensheng%20Peng%20and%20Wei%20Zhan%0AAbstract%3A%20Ego-centric%20driving%20videos%20available%20online%20provide%20an%20abundant%20source%20of%20visual%20data%20for%20autonomous%20driving%2C%20yet%20their%20lack%20of%20annotations%20makes%20it%20difficult%20to%20learn%20representations%20that%20capture%20both%20semantic%20structure%20and%203D%20geometry.%20Recent%20advances%20in%20large%20feedforward%20spatial%20models%20demonstrate%20that%20point%20maps%20and%20ego-motion%20can%20be%20inferred%20in%20a%20single%20forward%20pass%2C%20suggesting%20a%20promising%20direction%20for%20scalable%20driving%20perception.%20We%20therefore%20propose%20a%20label-free%2C%20teacher-guided%20framework%20for%20learning%20autonomous%20driving%20representations%20directly%20from%20unposed%20videos.%20Unlike%20prior%20self-supervised%20approaches%20that%20focus%20primarily%20on%20frame-to-frame%20consistency%2C%20we%20posit%20that%20safe%20and%20reactive%20driving%20depends%20critically%20on%20temporal%20context.%20To%20this%20end%2C%20we%20leverage%20a%20feedforward%20architecture%20equipped%20with%20a%20lightweight%20autoregressive%20module%2C%20trained%20using%20multi-modal%20supervisory%20signals%20that%20guide%20the%20model%20to%20jointly%20predict%20current%20and%20future%20point%20maps%2C%20camera%20poses%2C%20semantic%20segmentation%2C%20and%20motion%20masks.%20Multi-modal%20teachers%20provide%20sequence-level%20pseudo-supervision%2C%20enabling%20LFG%20to%20learn%20a%20unified%20pseudo-4D%20representation%20from%20raw%20YouTube%20videos%20without%20poses%2C%20labels%2C%20or%20LiDAR.%20The%20resulting%20encoder%20not%20only%20transfers%20effectively%20to%20downstream%20autonomous%20driving%20planning%20on%20the%20NAVSIM%20benchmark%2C%20surpassing%20multi-camera%20and%20LiDAR%20baselines%20with%20only%20a%20single%20monocular%20camera%2C%20but%20also%20yields%20strong%20performance%20when%20evaluated%20on%20a%20range%20of%20semantic%2C%20geometric%2C%20and%20qualitative%20motion%20prediction%20tasks.%20These%20geometry%20and%20motion-aware%20features%20position%20LFG%20as%20a%20compelling%20video-centric%20foundation%20model%20for%20autonomous%20driving.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22091v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Drive%2520is%2520a%2520Free%2520Gift%253A%2520Large-Scale%2520Label-Free%2520Autonomy%2520Pretraining%2520from%2520Unposed%2520In-The-Wild%2520Videos%26entry.906535625%3DMatthew%2520Strong%2520and%2520Wei-Jer%2520Chang%2520and%2520Quentin%2520Herau%2520and%2520Jiezhi%2520Yang%2520and%2520Yihan%2520Hu%2520and%2520Chensheng%2520Peng%2520and%2520Wei%2520Zhan%26entry.1292438233%3DEgo-centric%2520driving%2520videos%2520available%2520online%2520provide%2520an%2520abundant%2520source%2520of%2520visual%2520data%2520for%2520autonomous%2520driving%252C%2520yet%2520their%2520lack%2520of%2520annotations%2520makes%2520it%2520diffi

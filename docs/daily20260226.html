{"title": "GUI-Libra: Training Native GUI Agents to Reason and Act with Action-aware Supervision and Partially Verifiable RL", "author": "Rui Yang and Qianhui Wu and Zhaoyang Wang and Hanyang Chen and Ke Yang and Hao Cheng and Huaxiu Yao and Baoling Peng and Huan Zhang and Jianfeng Gao and Tong Zhang", "abstract": "Open-source native GUI agents still lag behind closed-source systems on long-horizon navigation tasks. This gap stems from two limitations: a shortage of high-quality, action-aligned reasoning data, and the direct adoption of generic post-training pipelines that overlook the unique challenges of GUI agents. We identify two fundamental issues in these pipelines: (i) standard SFT with CoT reasoning often hurts grounding, and (ii) step-wise RLVR-tyle training faces partial verifiability, where multiple actions can be correct but only a single demonstrated action is used for verification. This makes offline step-wise metrics weak predictors of online task success. In this work, we present GUI-Libra, a tailored training recipe that addresses these challenges. First, to mitigate the scarcity of action-aligned reasoning data, we introduce a data construction and filtering pipeline and release a curated 81K GUI reasoning dataset. Second, to reconcile reasoning with grounding, we propose action-aware SFT that mixes reasoning-then-action and direct-action data and reweights tokens to emphasize action and grounding. Third, to stabilize RL under partial verifiability, we identify the overlooked importance of KL regularization in RLVR and show that a KL trust region is critical for improving offline-to-online predictability; we further introduce success-adaptive scaling to downweight unreliable negative gradients. Across diverse web and mobile benchmarks, GUI-Libra consistently improves both step-wise accuracy and end-to-end task completion. Our results suggest that carefully designed post-training and data curation can unlock significantly stronger task-solving capabilities without costly online data collection. We release our dataset, code, and models to facilitate further research on data-efficient post-training for reasoning-capable GUI agents.", "link": "http://arxiv.org/abs/2602.22190v1", "date": "2026-02-25", "relevancy": 2.1456, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5524}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5435}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5175}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GUI-Libra%3A%20Training%20Native%20GUI%20Agents%20to%20Reason%20and%20Act%20with%20Action-aware%20Supervision%20and%20Partially%20Verifiable%20RL&body=Title%3A%20GUI-Libra%3A%20Training%20Native%20GUI%20Agents%20to%20Reason%20and%20Act%20with%20Action-aware%20Supervision%20and%20Partially%20Verifiable%20RL%0AAuthor%3A%20Rui%20Yang%20and%20Qianhui%20Wu%20and%20Zhaoyang%20Wang%20and%20Hanyang%20Chen%20and%20Ke%20Yang%20and%20Hao%20Cheng%20and%20Huaxiu%20Yao%20and%20Baoling%20Peng%20and%20Huan%20Zhang%20and%20Jianfeng%20Gao%20and%20Tong%20Zhang%0AAbstract%3A%20Open-source%20native%20GUI%20agents%20still%20lag%20behind%20closed-source%20systems%20on%20long-horizon%20navigation%20tasks.%20This%20gap%20stems%20from%20two%20limitations%3A%20a%20shortage%20of%20high-quality%2C%20action-aligned%20reasoning%20data%2C%20and%20the%20direct%20adoption%20of%20generic%20post-training%20pipelines%20that%20overlook%20the%20unique%20challenges%20of%20GUI%20agents.%20We%20identify%20two%20fundamental%20issues%20in%20these%20pipelines%3A%20%28i%29%20standard%20SFT%20with%20CoT%20reasoning%20often%20hurts%20grounding%2C%20and%20%28ii%29%20step-wise%20RLVR-tyle%20training%20faces%20partial%20verifiability%2C%20where%20multiple%20actions%20can%20be%20correct%20but%20only%20a%20single%20demonstrated%20action%20is%20used%20for%20verification.%20This%20makes%20offline%20step-wise%20metrics%20weak%20predictors%20of%20online%20task%20success.%20In%20this%20work%2C%20we%20present%20GUI-Libra%2C%20a%20tailored%20training%20recipe%20that%20addresses%20these%20challenges.%20First%2C%20to%20mitigate%20the%20scarcity%20of%20action-aligned%20reasoning%20data%2C%20we%20introduce%20a%20data%20construction%20and%20filtering%20pipeline%20and%20release%20a%20curated%2081K%20GUI%20reasoning%20dataset.%20Second%2C%20to%20reconcile%20reasoning%20with%20grounding%2C%20we%20propose%20action-aware%20SFT%20that%20mixes%20reasoning-then-action%20and%20direct-action%20data%20and%20reweights%20tokens%20to%20emphasize%20action%20and%20grounding.%20Third%2C%20to%20stabilize%20RL%20under%20partial%20verifiability%2C%20we%20identify%20the%20overlooked%20importance%20of%20KL%20regularization%20in%20RLVR%20and%20show%20that%20a%20KL%20trust%20region%20is%20critical%20for%20improving%20offline-to-online%20predictability%3B%20we%20further%20introduce%20success-adaptive%20scaling%20to%20downweight%20unreliable%20negative%20gradients.%20Across%20diverse%20web%20and%20mobile%20benchmarks%2C%20GUI-Libra%20consistently%20improves%20both%20step-wise%20accuracy%20and%20end-to-end%20task%20completion.%20Our%20results%20suggest%20that%20carefully%20designed%20post-training%20and%20data%20curation%20can%20unlock%20significantly%20stronger%20task-solving%20capabilities%20without%20costly%20online%20data%20collection.%20We%20release%20our%20dataset%2C%20code%2C%20and%20models%20to%20facilitate%20further%20research%20on%20data-efficient%20post-training%20for%20reasoning-capable%20GUI%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22190v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGUI-Libra%253A%2520Training%2520Native%25 {"title": "Solaris: Building a Multiplayer Video World Model in Minecraft", "author": "Georgy Savva and Oscar Michel and Daohan Lu and Suppakit Waiwitlikhit and Timothy Meehan and Dhairya Mishra and Srivats Poddar and Jack Lu and Saining Xie", "abstract": "Existing action-conditioned video generation models (video world models) are limited to single-agent perspectives, failing to capture the multi-agent interactions of real-world environments. We introduce Solaris, a multiplayer video world model that simulates consistent multi-view observations. To enable this, we develop a multiplayer data system designed for robust, continuous, and automated data collection on video games such as Minecraft. Unlike prior platforms built for single-player settings, our system supports coordinated multi-agent interaction and synchronized videos + actions capture. Using this system, we collect 12.64 million multiplayer frames and propose an evaluation framework for multiplayer movement, memory, grounding, building, and view consistency. We train Solaris using a staged pipeline that progressively transitions from single-player to multiplayer modeling, combining bidirectional, causal, and Self Forcing training. In the final stage, we introduce Checkpointed Self Forcing, a memory-efficient Self Forcing variant that enables a longer-horizon teacher. Results show our architecture and training design outperform existing baselines. Through open-sourcing our system and models, we hope to lay the groundwork for a new generation of multi-agent world models.", "link": "http://arxiv.org/abs/2602.22208v1", "date": "2026-02-25", "relevancy": 2.1453, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5779}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5447}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5113}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Solaris%3A%20Building%20a%20Multiplayer%20Video%20World%20Model%20in%20Minecraft&body=Title%3A%20Solaris%3A%20Building%20a%20Multiplayer%20Video%20World%20Model%20in%20Minecraft%0AAuthor%3A%20Georgy%20Savva%20and%20Oscar%20Michel%20and%20Daohan%20Lu%20and%20Suppakit%20Waiwitlikhit%20and%20Timothy%20Meehan%20and%20Dhairya%20Mishra%20and%20Srivats%20Poddar%20and%20Jack%20Lu%20and%20Saining%20Xie%0AAbstract%3A%20Existing%20action-conditioned%20video%20generation%20models%20%28video%20world%20models%29%20are%20limited%20to%20single-agent%20perspectives%2C%20failing%20to%20capture%20the%20multi-agent%20interactions%20of%20real-world%20environments.%20We%20introduce%20Solaris%2C%20a%20multiplayer%20video%20world%20model%20that%20simulates%20consistent%20multi-view%20observations.%20To%20enable%20this%2C%20we%20develop%20a%20multiplayer%20data%20system%20designed%20for%20robust%2C%20continuous%2C%20and%20automated%20data%20collection%20on%20video%20games%20such%20as%20Minecraft.%20Unlike%20prior%20platforms%20built%20for%20single-player%20settings%2C%20our%20system%20supports%20coordinated%20multi-agent%20interaction%20and%20synchronized%20videos%20%2B%20actions%20capture.%20Using%20this%20system%2C%20we%20collect%2012.64%20million%20multiplayer%20frames%20and%20propose%20an%20evaluation%20framework%20for%20multiplayer%20movement%2C%20memory%2C%20grounding%2C%20building%2C%20and%20view%20consistency.%20We%20train%20Solaris%20using%20a%20staged%20pipeline%20that%20progressively%20transitions%20from%20single-player%20to%20multiplayer%20modeling%2C%20combining%20bidirectional%2C%20causal%2C%20and%20Self%20Forcing%20training.%20In%20the%20final%20stage%2C%20we%20introduce%20Checkpointed%20Self%20Forcing%2C%20a%20memory-efficient%20Self%20Forcing%20variant%20that%20enables%20a%20longer-horizon%20teacher.%20Results%20show%20our%20a {"title": "Robustness in sparse artificial neural networks trained with adaptive topology", "author": "Bendeg\u00faz Sulyok and Gergely Palla and Filippo Radicchi and Santo Fortunato", "abstract": "We investigate the robustness of sparse artificial neural networks trained with adaptive topology. We focus on a simple yet effective architecture consisting of three sparse layers with 99% sparsity followed by a dense layer, applied to image classification tasks such as MNIST and Fashion MNIST. By updating the topology of the sparse layers between each epoch, we achieve competitive accuracy despite the significantly reduced number of weights. Our primary contribution is a detailed analysis of the robustness of these networks, exploring their performance under various perturbations including random link removal, adversarial attack, and link weight shuffling. Through extensive experiments, we demonstrate that adaptive topology not only enhances efficiency but also maintains robustness. This work highlights the potential of adaptive sparse networks as a promising direction for developing efficient and reliable deep learning models.", "link": "http://arxiv.org/abs/2602.21961v1", "date": "2026-02-25", "relevancy": 1.9635, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5157}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.481}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robustness%20in%20sparse%20artificial%20neural%20networks%20trained%20with%20adaptive%20topology&body=Title%3A%20Robustness%20in%20sparse%20artificial%20neural%20networks%20trained%20with%20adaptive%20topology%0AAuthor%3A%20Bendeg%C3%BAz%20Suly {"title": "Data-Augmented Deep Learning for Downhole Depth Sensing and Validation", "author": "Si-Yu Xiao and Xin-Di Zhao and Tian-Hao Mao and Yi-Wei Wang and Yu-Qiao Chen and Hong-Yun Zhang and Jian Wang and Jun-Jie Wang and Shuang Liu and Tu-Pei Chen and Yang Liu", "abstract": "Accurate downhole depth measurement is essential for oil and gas well operations, directly influencing reservoir contact, production efficiency, and operational safety. Collar correlation using a casing collar locator (CCL) is fundamental for precise depth calibration. While neural network has achieved significant progress in collar recognition, preprocessing methods for such applications remain underdeveloped. Moreover, the limited availability of real well data poses substantial challenges for training neural network models that require extensive datasets. This paper presents a system integrated into a downhole toolstring for CCL log acquisition to facilitate dataset construction. Comprehensive preprocessing methods for data augmentation are proposed, and their effectiveness is evaluated using baseline neural network models. Through systematic experimentation across diverse configurations, the contribution of each augmentation method is analyzed. Results demonstrate that standardization, label distribution smoothing, and random cropping are fundamental prerequisites for model training, while label smoothing regularization, time scaling, and multiple sampling significantly enhance model generalization capabilities. Incorporating the proposed augmentation methods into the two baseline models results in maximum F1 score improvements of 0.027 and 0.024 for the TAN and MAN models, respectively. Furthermore, applying these techniques yields F1 score gains of up to 0.045 for the TAN model and 0.057 for the MAN model compared to prior studies. Performance evaluation on real CCL waveforms confirms the effectiveness and practical applicability of our approach. This work addresses the existing gaps in data augmentation methodologies for training casing collar recognition models under CCL data-limited conditions, and provides a technical foundation for the future automation of downhole operations.", "link": "http://arxiv.org/abs/2511.00129v4", "date": "2026-02-25", "relevancy": 2.0197, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5259}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.503}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4985}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Data-Augmented%20Deep%20Learning%20for%20Downhole%20Depth%20Sensing%20and%20Validation&body=Title%3A%20Data-Augmented%20Deep%20Learning%20for%20Downhole%20Depth%20Sensing%20and%20Validation%0AAuthor%3A%20Si-Yu%20Xiao%20and%20Xin-Di%20Zhao%20and%20Tian-Hao%20Mao%20and%20Yi-Wei%20Wang%20and%20Yu-Qiao%20Chen%20and%20Hong-Yun%20Zhang%20and%20Jian%20Wang%20and%20Jun-Jie%20Wang%20and%20Shuang%20Liu%20and%20Tu-Pei%20Chen%20and%20Yang%20Liu%0AAbstract%3A%20Accurate%20downhole%20depth%20measurement%20is%20essential%20for%20oil%20and%20gas%20well%20operations%2C%20directly%20influencing%20reservoir%20contact%2C%20production%20efficiency%2C%20and%20operational%20safety.%20Collar%20correlation%20using%20a%20casing%20collar%20locator%20%28CCL%29%20is%20fundamental%20for%20precise%20depth%20calibration.%20While%20neural%20network%20has%20achieved%20significant%20progress%20in%20collar%20recognition%2C%20preprocessing%20methods%20for%20such%20applications%20remain%20underdeveloped.%20Moreover%2C%20the%20limited%20availability%20of%20real%20well%20data%20poses%20substantial%20challenges%20f {"title": "DexRepNet++: Learning Dexterous Robotic Manipulation with Geometric and Spatial Hand-Object Representations", "author": "Qingtao Liu and Zhengnan Sun and Yu Cui and Haoming Li and Gaofeng Li and Lin Shao and Jiming Chen and Qi Ye", "abstract": "Robotic dexterous manipulation is a challenging problem due to high degrees of freedom (DoFs) and complex contacts of multi-fingered robotic hands. Many existing deep reinforcement learning (DRL) based methods aim at improving sample efficiency in high-dimensional output action spaces. However, existing works often overlook the role of representations in achieving generalization of a manipulation policy in the complex input space during the hand-object interaction. In this paper, we propose DexRep, a novel hand-object interaction representation to capture object surface features and spatial relations between hands and objects for dexterous manipulation skill learning. Based on DexRep, policies are learned for three dexterous manipulation tasks, i.e. grasping, in-hand reorientation, bimanual handover, and extensive experiments are conducted to verify the effectiveness. In simulation, for grasping, the policy learned with 40 objects achieves a success rate of 87.9% on more than 5000 unseen objects of diverse categories, significantly surpassing existing work trained with thousands of objects; for the in-hand reorientation and handover tasks, the policies also boost the success rates and other metrics of existing hand-object representations by 20% to 40%. The grasp policies with DexRep are deployed to the real world under multi-camera and single-camera setups and demonstrate a small sim-to-real gap.", "link": "http://arxiv.org/abs/2602.21811v1", "date": "2026-02-25", "relevancy": 1.8729, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6613}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "li h%2040%20objects%20achieves%20a%20success%20rate%20of%2087.9%25%20on%20more%20than%205000%20unseen%20objects%20of%20diverse%20categories%2C%20significantly%20surpassing%20existing%20work%20trained%20with%20thousands%20of%20objects%3B%20for%20the%20in-hand%20reorientation%20and%20handover%20tasks%2C%20the%20policies%20also%20boost%20the%20success%20rates%20and%20other%20metrics%20of%20existing%20hand-object%20representations%20by%2020%25%20to%2040%25.%20The%20grasp%20policies%20with%20DexRep%20are%20deployed%20to%20the%20real%20world%20under%20multi-camera%20and%20single-camera%20setups%20and%20demonstrate%20a%20small%20sim-to-real%20gap.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21811v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDexRepNet%252B%252B%253A%2520Learning%2520Dexterous%2520Robotic%2520Manipulation%2520with%2520Geometric%2520and%2520Spatial%2520Hand-Object%2520Representations%26entry.906535625%3DQingtao%2520Liu%2520and%2520Zhengnan%2520Sun%2520and%2520Yu%2520Cui%2520and%2520Haoming%2520Li%2520and%2520Gaofeng%2520Li%2520and%2520Lin%2520Shao%2520and%2520Jiming%2520Chen%2520and%2520Qi%2520Ye%26entry.1292438233%3DRobotic%2520dexterous%2520manipulation%2520is%2520a%2520challenging%2520problem%2520due%2520to%2520high%2520degrees%2520of%2520freedom%2520%2528DoFs%2529%2520and%2520complex%2520contacts%2520of%2520multi-fingered%2520robotic%2520hands.%2520Many%2520existing%2520deep%2520reinforcement%2520learning%2520%2528DRL%2529%2520based%2520methods%2520aim%2520at%2520improving%2520sample%2520efficiency%2520in%2520high-dimensional%2520output%2520action%2520spaces.%2520However%252C%2520existing%2520works%2520often%2520overlook%2520the%2520role%2520of%2520representations%2520in%2520achieving%2520generalization%2520of%2520a%2520manipulation%2520policy%2520in%2520the%2520complex%2520input%2520space%2520during%2520the%2520hand-object%2520interaction.%2520In%2520this%2520paper%252C% {"title": "Quantum feedback control with a transformer neural network architecture", "author": "Pranav Vaidhyanathan and Florian Marquardt and Mark T. Mitchison and Natalia Ares", "abstract": "Attention-based neural networks such as transformers have revolutionized various fields such as natural language processing, genomics, and vision. Here, we demonstrate the use of transformers for quantum feedback control through both a supervised and reinforcement learning approach. In particular, due to the transformer's ability to capture long-range temporal correlations and training efficiency, we show that it can surpass some of the limitations of previous control approaches, e.g.~those based on recurrent neural networks trained using a similar approach or policy based reinforcement learning. We numerically show, for the example of state stabilization of a two-level system, that our bespoke transformer architecture can achieve near unit fidelity to a target state in a short time even in the presence of inefficient measurement and Hamiltonian perturbations that were not included in the training set as well as the control of non-Markovian systems. We also demonstrate that our transformer can perform energy minimization of non-integrable many-body quantum systems when trained for reinforcement learning tasks. Our approach can be used for quantum error correction, fast control of quantum states in the presence of colored noise, as well as real-time tuning, and characterization of quantum devices.", "link": "http://arxiv.org/abs/2411.19253v2", "date": "2026-02-25", "relevancy": 1.5268, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5456}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5049}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": {"title": "Optimizer choice matters for the emergence of Neural Collapse", "author": "Jim Zhao and Tin Sum Cheng and Wojciech Masarczyk and Aurelien Lucchi", "abstract": "Neural Collapse (NC) refers to the emergence of highly symmetric geometric structures in the representations of deep neural networks during the terminal phase of training. Despite its prevalence, the theoretical understanding of NC remains limited. Existing analyses largely ignore the role of the optimizer, thereby suggesting that NC is universal across optimization methods. In this work, we challenge this assumption and demonstrate that the choice of optimizer plays a critical role in the emergence of NC. The phenomenon is typically quantified through NC metrics, which, however, are difficult to track and analyze theoretically. To overcome this limitation, we introduce a novel diagnostic metric, NC0, whose convergence to zero is a necessary condition for NC. Using NC0, we provide theoretical evidence that NC cannot emerge under decoupled weight decay in adaptive optimizers, as implemented in AdamW. Concretely, we prove that SGD, SignGD with coupled weight decay (a special case of Adam), and SignGD with decoupled weight decay (a special case of AdamW) exhibit qualitatively different NC0 dynamics. Also, we show the accelerating effect of momentum on NC (beyond convergence of train loss) when trained with SGD, being the first result concerning momentum in the context of NC. Finally, we conduct extensive empirical experiments consisting of 3,900 training runs across various datasets, architectures, optimizers, and hyperparameters, confirming our theoretical results. This work provides the first theoretical explanation for optimizer-dependent emergence of NC and highlights the overlooked role of weight-decay coupling in shaping the implicit biases of optimizers.", "link": "http://arxiv.org/abs/2602.16642v3", "date": "2026-02-25", "relevancy": 1.8982, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5335}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4353}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4254}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Optimizer%20choice%20matters%20for%20the%20emergence%20of%20Neural%20Collapse&body=Title%3A%20Optimizer%20choice%20matters%20for%20the%20emergence%20of%20Neural%20Collapse%0AAuthor%3A%20Jim%20Zhao%20and%20Tin%20Sum%20Cheng%20and%20Wojciech%20Masarczyk%20and%20Aurelien%20Lucchi%0AAbstract%3A%20Neural%20Collapse%20%28NC%29%20refers%20to%20the%20emergence%20of%20highly%20symmetric%20geometric%20structures%20in%20the%20representations%20of%20deep%20neural%20networks%20during%20the%20terminal%20phase%20of%20training.%20Despite%20its%20prevalence%2C%20the%20theoretical%20understanding%20of%20NC%20remains%20limited.%20Existing%20analyses%20largely%20ignore%20the%20role%20of%20the%20optimizer%2C%20thereby%20suggesting%20that%20NC%20is%20universal%20across%20optimization%20methods.%20In%20this%20work%2C%20we%20challenge%20this%20assumption%20and%20demonstrate%20that%20the%20choice%20of%20optimizer%20plays%20a%20critical%20role%20in%20the%20emergence%20of%20NC.%20The%20phenomenon%20is%20typically%20quantified%20through%20NC%20metrics%2C%20which%2C%20however%2C%20are%20difficult%20to%20track%20and%20analyze%20theoretically.%20To%20overcome%20this%20limitation%2C%20we%20introduce%20a%20novel%20diagnostic%20metric%2C%20NC0%2C%20whose%20convergence%20to%20zero%20is%20a%20necessary%20condition%20for%20NC.%20Using%20NC0%2C%20we%20provide%20theoretical%20evidence%20that%20NC%20cannot%20emerge%20under%20decoupled%20weight%20decay%20in%20adaptive%20optimizers%2C%20as%20implemented%20in%20AdamW.%20Concretely%2C%20we%20prove%20that%20SGD%2C%20SignGD%20with%20coupled%20weight%20decay%20%28a%20special%20case%20of%20Adam%29%2C%20and%20SignGD%20with%20decoupled%20weight%20decay%20%28a%20special%20case%20of%20AdamW%29%20exhibit%20qualitatively%20different%20NC0%20dynamics.%20Also%2C%20we%20show%20the%20accelerating%20effect%20of%20momentum%20on%20NC%20%28beyond%20convergence%20of%20train%20loss%29%20when%20trained%20with%20SGD%2C%20being%20the%20first%20result%20concerning%20momentum%20in%20the%20context%20of%20NC.%20Finally%2C%20we%20conduct%20extensive%20empirical%20experiments%20consisting%20of%203%2C900%20training%20runs%20across%20various%20datasets%2C%20architectures%2C%20optimizers%2C%20and%20hyperparameters%2C%20confirming%20our%20theoretical%20results.%20This%20work%20provides%20the%20first%20theoretical%20explanation%20for%20optimizer-dependent%20emergence%20of%20NC%20and%20highlights%20the%20overlooked%20role%20of%20weight-decay%20coupling%20in%20shaping%20the%20implicit%20biases%20of%20optimizers.%0ALink%3A%20http%3A//arxiv.org/abs/2602.16642v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOptimizer%2520choice%2520matters%2520for%2520the%2520emergence%2520of%2520Neural%2520Collapse%26entry.906535625%3DJim%2520Zhao%2520and%2520Tin%2520Sum%2520Cheng%2520and%2520Wojciech%2520Masarczyk%2520and%2520Aurelien%2520Lucchi%26entry.1292438233%3DNeural%2520Collapse%2520%2528NC%2529%2520refers%2520to%2520the%2520emergence%2520of%2520highly%2520symmetric%2520geometric%2520structures%2520in%2520the%2520representations%2520of%2520deep%2520neural%2520networks%2520during%2520the%2520terminal%2520phase%2520of%2520training.%2520Despite%2520its%2520prevalence%252C%2520the%2520theoretical%2520understanding%2520of%2520NC%2520remains%2520limited.%2520Existing%2520analyses%2520largely%2520ignore%2520the%2520role%2520of%2520the%2520optimizer%252C%2520thereby%2520suggesting%2520that%2520NC%2520is%2520universal%2520a ed%20weight%20decay%20%28a%20special%20case%20of%20AdamW%29%20exhibit%20qualitatively%20different%20NC0%20dynamics.%20Also%2C%20we%20show%20the%20accelerating%20effect%20of%20momentum%20on%20NC%20%28beyond%20convergence%20of%20train%20loss%29%20when%20trained%20with%20SGD%2C%20being%20the%20first%20result%20concerning%20momentum%20in%20the%20context%20of%20NC.%20Finally%2C%20we%20conduct%20extensive%20empirical%20experiments%20consisting%20of%203%2C900%20training%20runs%20across%20various%20datasets%2C%20architectures%2C%20optimizers%2C%20and%20hyperparameters%2C%20confirming%20our%20theoretical%20results.%20This%20work%20provides%20the%20first%20theoretical%20explanation%20for%20optimizer-dependent%20emergence%20of%20NC%20and%20highlights%20the%20overlooked%20role%20of%20weight-decay%20coupling%20in%20shaping%20the%20implicit%20biases%20of%20optimizers.&entry.1838667208=http%3A//arxiv.org/abs/2602.16642v3&entry.124074799=Read"},
{"title": "Training-Free Generative Modeling via Kernelized Stochastic Interpolants", "author": "Florentin Coeurdoux and Etienne Lempereur and Nathana\u00ebl Cuvelle-Magar and Thomas Eboli and St\u00e9phane Mallat and Anastasia Borovykh and Eric Vanden-Eijnden", "abstract": "We develop a kernel method for generative modeling within the stochastic interpolant framework, replacing neural network training with linear systems. The drift of the generative SDE is $\\hat b_t(x) = \\nabla\u03c6(x)^\\top\u03b7_t$, where $\u03b7_t\\in\\R^P$ solves a $P\\times P$ system computable from data, with $P$ independent of the data dimension $d$. Since estimates are inexact, the diffusion coefficient $D_t$ affects sample quality; the optimal $D_t^*$ from Girsanov diverges at $t=0$, but this poses no difficulty and we develop an integrator that handles it seamlessly. The framework accommodates diverse feature maps -- scattering transforms, pretrained generative models etc. -- enabling training-free generation and model combination. We demonstrate the approach on financial time series, turbulence, and image generation.", "link": "http://arxiv.org/abs/2602.20070v2", "date": "2026-02-25", "relevancy": 1.5733, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.57}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5124}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5089}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-Free%20Generative%20Modeling%20via%20Kernelized%20Stochastic%20Interpolants&body=Title%3A%20Training-Free%20Generative%20Modeling%20via%20Kernelized%20Stochastic%20Interpolants%0AAuthor%3A%20Florentin%20Coeurdoux%20and%20Etienne%20Lempereur%20and%20Nathana%C3%ABl%20Cuvelle-Magar% {"title": "A study on the effects of mixed explicit and implicit communications in human-artificial-agent interactions", "author": "Ana Christina Almada Campos and Bruno Vilhena Adorno", "abstract": "Communication between humans and artificial agents is essential for their interaction. This is often inspired by human communication, which uses gestures, facial expressions, gaze direction, and other explicit and implicit means. This work presents interaction experiments where humans and artificial agents interact through explicit and implicit communication to evaluate the effect of mixed explicit-implicit communication against purely explicit communication and the impact of the task difficulty in this evaluation. Results obtained using Bayesian parameter estimation show that the task execution time did not significantly change when mixed explicit and implicit communications were used in neither of our experiments, which varied in the type of artificial agent (virtual agent and humanoid robot) used and task difficulty. The number of errors was affected by the communication only when the human was executing a more difficult task, and an impact on the perceived efficiency of the interaction was only observed in the interaction with the robot, for both easy and difficult tasks. In contrast, acceptance, sociability, and transparency of the artificial agent increased when using mixed communication modalities in both our experiments and task difficulty levels. This suggests that task-related measures, such as time, number of errors, and perceived efficiency of the interaction, as well as the impact of the communication on them, are more sensitive to the type of task and the difficulty level, whereas the combination of explicit and implicit communications more consistently improves human perceptions about artificial agents.", "link": "http://arxiv.org/abs/2409.18745v4", "date": "2026-02-25", "relevancy": 1.365, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4765}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4603}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20study%20on%20the%20effects%20of%20mixed%20explicit%20and%20implicit%20communications%20in%20human-artificial-agent%20interactions&body=Title%3A%20A%20study%20on%20the%20effects%20of%20mixed%20explicit%20and%20implicit%20communications%20in%20human-artificial-agent%20interactions%0AAuthor%3A%20Ana%20Christina%20Almada%20Campos%20and%20Bruno%20Vilhena%20Adorno%0AAbstract%3A%20Communication%20between%20humans%20and%20artificial%20agents%20is%20essential%20for%20their%20interaction.%20This%20is%20often%20inspired%20by%20human%20communication%2C%20which%20uses%20gestures%2C%20facial%20expressions%2C%20gaze%20direction%2C%20and%20other%20explicit%20and%20implicit%20means.%20This%20work%20presents%20interaction%20experiments%20where%20humans%20and%20artificial%20agents%20interact%20through%20explicit%20and%20implicit%20communication%20to%20evaluate%20the%20effect%20of%20mixed%20explicit-implicit%20communication%20against%20purely%20explicit%20communication%20and%20the%20impact%20of%20the%20task%20difficulty%20in%20this%20evaluation.%20Results%20obtained%20using%20Bayesian%20parameter%20estimation%20show%20that%20the%20task%20execution%20time%20did%20not%20significantly%20change%20when%20mixed%20explicit%20and%20implicit%20communications%20were%20used%20in%20neither%20of%20our%20experiments%2C%20which%20varied%20in%20the%20type%20of%20artificial%20agent%20%28virtual%20agent%20and%20humanoid%20robot%29%20used%20and%20task%20difficulty.%20The%20number%20of%20errors%20was%20affec {"title": "InsightX Agent: An LMM-based Agentic Framework with Integrated Tools for Reliable X-ray NDT Analysis", "author": "Jiale Liu and Huan Wang and Yue Zhang and Xiaoyu Luo and Jiaxiang Hu and Zhiliang Liu and Min Xie", "abstract": "Non-destructive testing (NDT), particularly X-ray inspection, is vital for industrial quality assurance, yet existing deep-learning-based approaches often lack interactivity, interpretability, and the capacity for critical self-assessment, limiting their reliability and operator trust. To address these shortcomings, this paper proposes InsightX Agent, a novel LMM-based agentic framework designed to deliver reliable, interpretable, and interactive X-ray NDT analysis. Unlike typical sequential pipelines, InsightX Agent positions a Large Multimodal Model (LMM) as a central orchestrator, coordinating between the Sparse Deformable Multi-Scale Detector (SDMSD) and the Evidence-Grounded Reflection (EGR) tool. The SDMSD generates dense defect region proposals from multi-scale feature maps and sparsifies them through Non-Maximum Suppression (NMS), optimizing detection of small, dense targets in X-ray images while maintaining computational efficiency. The EGR tool guides the LMM agent through a chain-of-thought-inspired review process, incorporating context assessment, individual defect analysis, false positive elimination, confidence recalibration and quality assurance to validate and refine the SDMSD's initial proposals. By strategically employing and intelligently using tools, InsightX Agent moves beyond passive data processing to active reasoning, enhancing diagnostic reliability and providing interpretations that integrate diverse information sources. Experimental evaluations on the GDXray+ dataset demonstrate that InsightX Agent not only achieves a high object detection F1-score of 96.54\\% but also offers significantly improved interpretability and trustworthiness in its analyses, highlighting the transformative potential of LMM-based {"title": "Quantifying the Expectation-Realisation Gap for Agentic AI Systems", "author": "Sebastian Lobentanzer", "abstract": "Agentic AI systems are deployed with expectations of substantial productivity gains, yet rigorous empirical evidence reveals systematic discrepancies between pre-deployment expectations and post-deployment outcomes. We review controlled trials and independent validations across software engineering, clinical documentation, and clinical decision support to quantify this expectation-realisation gap. In software development, experienced developers expected a 24% speedup from AI tools but were slowed by 19% -- a 43 percentage-point calibration error. In clinical documentation, vendor claims of multi-minute time savings contrast with measured reductions of less than one minute per note, and one widely deployed tool showed no statistically significant effect. In clinical decision support, externally validated performance falls substantially below developer-reported metrics. These shortfalls are driven by workflow integration friction, verification burden, measurement construct mismatches, and systematic variation in who benefits and who does not. The evidence motivates structured planning frameworks that require explicit, quantified benefit expectations with human oversight costs factored in.", "link": "http://arxiv.org/abs/2602.20292v2", "date": "2026-02-25", "relevancy": 0.8955, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4573}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4433}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4427}], "mailto": "mailto:haoxiang.li.20 {"title": "Coarsening Bias from Variable Discretization in Causal Functionals", "author": "Xiaxian Ou and Razieh Nabi", "abstract": "A class of causal effect functionals requires integration over conditional densities of continuous variables, as in mediation effects and nonparametric identification in causal graphical models. Estimating such densities and evaluating the resulting integrals can be statistically and computationally demanding. A common workaround is to discretize the variable and replace integrals with finite sums. Although convenient, discretization alters the population-level functional and can induce non-negligible approximation bias, even under correct identification. Under smoothness conditions, we show that this coarsening bias is first order in the bin width and arises at the level of the target functional, distinct from statistical estimation error. We propose a simple bias-reduced functional that evaluates the outcome regression at within-bin conditional means, eliminating the leading term and yielding a second-order approximation error. We derive plug-in and one-step estimators for the bias-reduced functional. Simulations demonstrate substantial bias reduction and near-nominal confidence interval coverage, even under coarse binning. Our results provide a simple framework for controlling the impact of variable discretization on parameter approximation and estimation.", "link": "http://arxiv.org/abs/2602.22083v1", "date": "2026-02-25", "relevancy": 1.2523, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4458}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4137}, {"title": "Multimoda       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>
